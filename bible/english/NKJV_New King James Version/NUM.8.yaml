verses:
  '1':
  - type: heading
    content: Arrangement of the Lamps
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '10':
  - type: text
    content: 'So you shall bring the Levites before the '
  - type: heading
    content: Lord
  - type: text
    content: ', and the children of Israel '
  - type: note
    content: Lev. 1:4
  - type: text
    content: 'shall lay their hands on the Levites; '
  '11':
  - type: text
    content: 'and Aaron shall offer the Levites before the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: like
  - type: text
    content: ' a '
  - type: note
    content: Num. 18:6
  - type: text
    content: 'wave offering from the children of Israel, that they may perform the work of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: note
    content: Ex. 29:10
  - type: text
    content: 'Then the Levites shall lay their hands on the heads of the young bulls, and you shall offer one as a sin offering and the other as a burnt offering to the '
  - type: heading
    content: Lord
  - type: text
    content: ', to make atonement for the Levites.'
  '13':
  - type: text
    content: '“And you shall stand the Levites before Aaron and his sons, and then offer them '
  - type: text
    content: like
  - type: text
    content: ' a wave offering to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Thus you shall '
  - type: note
    content: Num. 16:9
  - type: text
    content: 'separate the Levites from among the children of Israel, and the Levites shall be '
  - type: note
    content: Num. 3:12, 45; 16:9
  - type: text
    content: 'Mine. '
  '15':
  - type: text
    content: 'After that the Levites shall go in to service the tabernacle of meeting. So you shall cleanse them and '
  - type: note
    content: Num. 8:11, 13
  - type: text
    content: 'offer them '
  - type: text
    content: like
  - type: text
    content: ' a wave offering. '
  '16':
  - type: text
    content: 'For they '
  - type: text
    content: are
  - type: text
    content: ' '
  - type: note
    content: Num. 3:9
  - type: text
    content: 'wholly given to Me from among the children of Israel; I have taken them for Myself '
  - type: note
    content: Ex. 13:2; Num. 3:12, 45
  - type: text
    content: 'instead of all who open the womb, the firstborn of all the children of Israel. '
  '17':
  - type: note
    content: Ex. 12:2, 12, 13, 15; Num. 3:13; Luke 2:23
  - type: text
    content: 'For all the firstborn among the children of Israel '
  - type: text
    content: are
  - type: text
    content: ' Mine, '
  - type: text
    content: both
  - type: text
    content: ' man and beast; on the day that I struck all the firstborn in the land of Egypt I sanctified them to Myself. '
  '18':
  - type: text
    content: 'I have taken the Levites instead of all the firstborn of the children of Israel. '
  '19':
  - type: text
    content: 'And '
  - type: note
    content: Num. 3:9
  - type: text
    content: 'I have given the Levites as a gift to Aaron and his sons from among the children of Israel, to do the work for the children of Israel in the tabernacle of meeting, and to make atonement for the children of Israel, '
  - type: note
    content: Num. 1:53; 16:46; 18:5; 2 Chr. 26:16
  - type: text
    content: that there be no plague among the children of Israel when the children of Israel come near the sanctuary.”
  '2':
  - type: text
    content: '“Speak to Aaron, and say to him, ‘When you '
  - type: note
    content: Lev. 24:2–4
  - type: text
    content: 'arrange the lamps, the seven '
  - type: note
    content: Ex. 25:37; 40:25
  - type: text
    content: 'lamps shall give light in front of the lampstand.’ ” '
  '20':
  - type: text
    content: 'Thus Moses and Aaron and all the congregation of the children of Israel did to the Levites; according to all that the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses concerning the Levites, so the children of Israel did to them. '
  '21':
  - type: note
    content: Num. 8:7
  - type: text
    content: 'And the Levites purified themselves and washed their clothes; then Aaron presented them '
  - type: text
    content: like
  - type: text
    content: ' a wave offering before the '
  - type: heading
    content: Lord
  - type: text
    content: ', and Aaron made atonement for them to cleanse them. '
  '22':
  - type: note
    content: Num. 8:15
  - type: text
    content: 'After that the Levites went in to do their work in the tabernacle of meeting before Aaron and his sons; '
  - type: note
    content: Num. 8:5
  - type: text
    content: 'as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses concerning the Levites, so they did to them.'
  '23':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '24':
  - type: text
    content: '“This '
  - type: text
    content: is
  - type: text
    content: ' what '
  - type: text
    content: pertains
  - type: text
    content: ' to the Levites: '
  - type: note
    content: Num. 4:3; 1 Chr. 23:3, 24, 27
  - type: text
    content: 'From twenty-five years old and above one may enter to perform service in the work of the tabernacle of meeting; '
  '25':
  - type: text
    content: 'and at the age of fifty years they must cease performing this work, and shall work no more. '
  '26':
  - type: text
    content: 'They may minister with their brethren in the tabernacle of meeting, '
  - type: note
    content: Num. 1:53
  - type: text
    content: 'to attend to needs, but they '
  - type: text
    content: themselves
  - type: text
    content: ' shall do no work. Thus you shall do to the Levites regarding their duties.”'
  '3':
  - type: text
    content: 'And Aaron did so; he arranged the lamps to face toward the front of the lampstand, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses. '
  '4':
  - type: note
    content: Ex. 25:31
  - type: text
    content: 'Now this workmanship of the lampstand '
  - type: text
    content: was
  - type: text
    content: ' hammered gold; from its shaft to its flowers it '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: Ex. 25:18
  - type: text
    content: 'hammered work. '
  - type: note
    content: Ex. 25:40; Acts 7:44
  - type: text
    content: 'According to the pattern which the '
  - type: heading
    content: Lord
  - type: text
    content: ' had shown Moses, so he made the lampstand.'
  - type: heading
    content: Cleansing and Dedication of the Levites
  '5':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '6':
  - type: text
    content: '“Take the Levites from among the children of Israel and cleanse them '
  - type: text
    content: ceremonially.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Thus you shall do to them to cleanse them: '
  - type: note
    content: Num. 19:9, 13, 17, 20; Ps. 51:2, 7; (Heb. 9:13, 14)
  - type: text
    content: 'Sprinkle water of purification on them, and '
  - type: note
    content: Lev. 14:8, 9
  - type: text
    content: 'let them shave all their body, and let them wash their clothes, and '
  - type: text
    content: so
  - type: text
    content: ' make themselves clean. '
  '8':
  - type: text
    content: 'Then let them take a young bull with '
  - type: note
    content: Lev. 2:1; Num. 15:8–10
  - type: text
    content: 'its grain offering of fine flour mixed with oil, and you shall take another young bull as a sin offering. '
  '9':
  - type: note
    content: Ex. 29:4; 40:12
  - type: text
    content: 'And you shall bring the Levites before the tabernacle of meeting, '
  - type: note
    content: Lev. 8:3
  - type: text
    content: 'and you shall gather together the whole congregation of the children of Israel. '
