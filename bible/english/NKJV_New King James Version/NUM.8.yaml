document_id: NUM.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Arrangement of the Lamps
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Speak to Aaron, and say to him, ‘When you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 24:2–4
    marker-yv: yv-n
  - type: text
    text: 'arrange the lamps, the seven '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:37; 40:25
    marker-yv: yv-n
  - type: text
    text: 'lamps shall give light in front of the lampstand.’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Aaron did so; he arranged the lamps to face toward the front of the lampstand, as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:31
    marker-yv: yv-n
  - type: text
    text: 'Now this workmanship of the lampstand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' hammered gold; from its shaft to its flowers it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:18
    marker-yv: yv-n
  - type: text
    text: 'hammered work. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:40; Acts 7:44
    marker-yv: yv-n
  - type: text
    text: 'According to the pattern which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had shown Moses, so he made the lampstand.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cleansing and Dedication of the Levites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Take the Levites from among the children of Israel and cleanse them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ceremonially.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Thus you shall do to them to cleanse them: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 19:9, 13, 17, 20; Ps. 51:2, 7; (Heb. 9:13, 14)
    marker-yv: yv-n
  - type: text
    text: 'Sprinkle water of purification on them, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 14:8, 9
    marker-yv: yv-n
  - type: text
    text: 'let them shave all their body, and let them wash their clothes, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so
  - type: text
    text: ' make themselves clean. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then let them take a young bull with '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 2:1; Num. 15:8–10
    marker-yv: yv-n
  - type: text
    text: 'its grain offering of fine flour mixed with oil, and you shall take another young bull as a sin offering. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:4; 40:12
    marker-yv: yv-n
  - type: text
    text: 'And you shall bring the Levites before the tabernacle of meeting, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 8:3
    marker-yv: yv-n
  - type: text
    text: 'and you shall gather together the whole congregation of the children of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So you shall bring the Levites before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and the children of Israel '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 1:4
    marker-yv: yv-n
  - type: text
    text: 'shall lay their hands on the Levites; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and Aaron shall offer the Levites before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like
  - type: text
    text: ' a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 18:6
    marker-yv: yv-n
  - type: text
    text: 'wave offering from the children of Israel, that they may perform the work of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:10
    marker-yv: yv-n
  - type: text
    text: 'Then the Levites shall lay their hands on the heads of the young bulls, and you shall offer one as a sin offering and the other as a burnt offering to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', to make atonement for the Levites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“And you shall stand the Levites before Aaron and his sons, and then offer them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like
  - type: text
    text: ' a wave offering to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Thus you shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 16:9
    marker-yv: yv-n
  - type: text
    text: 'separate the Levites from among the children of Israel, and the Levites shall be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 3:12, 45; 16:9
    marker-yv: yv-n
  - type: text
    text: 'Mine. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'After that the Levites shall go in to service the tabernacle of meeting. So you shall cleanse them and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 8:11, 13
    marker-yv: yv-n
  - type: text
    text: 'offer them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like
  - type: text
    text: ' a wave offering. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 3:9
    marker-yv: yv-n
  - type: text
    text: 'wholly given to Me from among the children of Israel; I have taken them for Myself '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 13:2; Num. 3:12, 45
    marker-yv: yv-n
  - type: text
    text: 'instead of all who open the womb, the firstborn of all the children of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 12:2, 12, 13, 15; Num. 3:13; Luke 2:23
    marker-yv: yv-n
  - type: text
    text: 'For all the firstborn among the children of Israel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' Mine, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: both
  - type: text
    text: ' man and beast; on the day that I struck all the firstborn in the land of Egypt I sanctified them to Myself. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I have taken the Levites instead of all the firstborn of the children of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 3:9
    marker-yv: yv-n
  - type: text
    text: 'I have given the Levites as a gift to Aaron and his sons from among the children of Israel, to do the work for the children of Israel in the tabernacle of meeting, and to make atonement for the children of Israel, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 1:53; 16:46; 18:5; 2 Chr. 26:16
    marker-yv: yv-n
  - type: text
    text: that there be no plague among the children of Israel when the children of Israel come near the sanctuary.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Thus Moses and Aaron and all the congregation of the children of Israel did to the Levites; according to all that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses concerning the Levites, so the children of Israel did to them. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 8:7
    marker-yv: yv-n
  - type: text
    text: 'And the Levites purified themselves and washed their clothes; then Aaron presented them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like
  - type: text
    text: ' a wave offering before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and Aaron made atonement for them to cleanse them. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 8:15
    marker-yv: yv-n
  - type: text
    text: 'After that the Levites went in to do their work in the tabernacle of meeting before Aaron and his sons; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 8:5
    marker-yv: yv-n
  - type: text
    text: 'as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses concerning the Levites, so they did to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pertains
  - type: text
    text: ' to the Levites: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 4:3; 1 Chr. 23:3, 24, 27
    marker-yv: yv-n
  - type: text
    text: 'From twenty-five years old and above one may enter to perform service in the work of the tabernacle of meeting; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and at the age of fifty years they must cease performing this work, and shall work no more. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'They may minister with their brethren in the tabernacle of meeting, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 1:53
    marker-yv: yv-n
  - type: text
    text: 'to attend to needs, but they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: themselves
  - type: text
    text: ' shall do no work. Thus you shall do to the Levites regarding their duties.”'
