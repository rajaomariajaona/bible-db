  - type: text
    content: 'put dust on their heads. '
  '7':
  - type: text
    content: 'And Joshua said, “Alas, Lord '
  - type: heading
    content: God
  - type: text
    content: ', '
  - type: note
    content: Ex. 17:3; Num. 21:5
  - type: text
    content: 'why have You brought this people over the Jordan at all—to deliver us into the hand of the Amorites, to destroy us? Oh, that we had been content, and dwelt on the other side of the Jordan! '
  '8':
  - type: text
    content: 'O Lord, what shall I say when Israel turns its back before its enemies? '
  '9':
  - type: text
    content: 'For the Canaanites and all the inhabitants of the land will hear '
  - type: text
