  '16':
  - type: text
    content: 'So Joshua rose early in the morning and brought Israel by their tribes, and the tribe of Judah was taken. '
  '17':
  - type: text
    content: 'He brought the clan of Judah, and he took the family of the Zarhites; and he brought the family of the Zarhites man by man, and Zabdi was taken. '
  '18':
