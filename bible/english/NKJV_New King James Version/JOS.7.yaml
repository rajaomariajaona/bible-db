  - type: text
    text: 'But the children of Israel committed a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 7:20, 21
    marker-yv: yv-n
  - type: text
    text: 'trespass regarding the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 6:17–19
    marker-yv: yv-n
  - type: text
    text: 'accursed things, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 22:20
    marker-yv: yv-n
  - type: text
    text: 'Achan the son of Carmi, the son of Zabdi, the son of Zerah, of the tribe of Judah, took of the accursed things; so the anger of the '
  - type: usfm
    marker: sc
    children:
    - type: text
