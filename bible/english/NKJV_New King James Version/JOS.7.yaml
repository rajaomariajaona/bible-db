- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now Joshua sent men from Jericho to Ai, which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' beside Beth Aven, on the east side of Bethel, and spoke to them, saying, “Go up and spy out the country.” So the men went up and spied out Ai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And they returned to Joshua and said to him, “Do not let all the people go up, but let about two or three thousand men go up and attack Ai. Do not weary all the people there, for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: people
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ai
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' few.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So about three thousand men went up there from the people, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:17; Deut. 28:25
    marker-yv: yv-n
  - type: text
    text: 'but they fled before the men of Ai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the men of Ai struck down about thirty-six men, for they chased them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from
  - type: text
    text: ' before the gate as far as Shebarim, and struck them down on the descent; therefore '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:36; Josh. 2:9, 11
    marker-yv: yv-n
  - type: text
    text: the hearts of the people melted and became like water.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Joshua '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 37:29, 34
    marker-yv: yv-n
  - type: text
    text: 'tore his clothes, and fell to the earth on his face before the ark of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' until evening, he and the elders of Israel; and they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 4:12
    marker-yv: yv-n
  - type: text
    text: 'put dust on their heads. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Joshua said, “Alas, Lord '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: God
  - type: text
    text: ', '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 17:3; Num. 21:5
    marker-yv: yv-n
  - type: text
    text: 'why have You brought this people over the Jordan at all—to deliver us into the hand of the Amorites, to destroy us? Oh, that we had been content, and dwelt on the other side of the Jordan! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'O Lord, what shall I say when Israel turns its back before its enemies? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For the Canaanites and all the inhabitants of the land will hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it,
  - type: text
    text: ' and surround us, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 32:26
    marker-yv: yv-n
  - type: text
    text: 'cut off our name from the earth. Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 32:12; Num. 14:13
    marker-yv: yv-n
  - type: text
    text: what will You do for Your great name?”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sin of Achan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Joshua: “Get up! Why do you lie thus on your face? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Israel has sinned, and they have also transgressed My covenant which I commanded them. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 6:17–19
    marker-yv: yv-n
  - type: text
    text: 'For they have even taken some of the accursed things, and have both stolen and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 5:1, 2
    marker-yv: yv-n
  - type: text
    text: 'deceived; and they have also put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' among their own stuff. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 2:14
    marker-yv: yv-n
  - type: text
    text: 'Therefore the children of Israel could not stand before their enemies, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but
  - type: text
    text: ' turned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' backs before their enemies, because '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 7:26; (Hag. 2:13, 14)
    marker-yv: yv-n
  - type: text
    text: 'they have become doomed to destruction. Neither will I be with you anymore, unless you destroy the accursed from among you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Get up, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 19:10
    marker-yv: yv-n
  - type: text
    text: 'sanctify the people, and say, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 3:5
    marker-yv: yv-n
  - type: text
    text: '‘Sanctify yourselves for tomorrow, because thus says the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Israel: “'
  - type: usfm
    marker: it
    children:
    - type: text
      text: There
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' an accursed thing in your midst, O Israel; you cannot stand before your enemies until you take away the accursed thing from among you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'In the morning therefore you shall be brought according to your tribes. And it shall be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' the tribe which '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Prov. 16:33)
    marker-yv: yv-n
  - type: text
    text: 'the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' takes shall come according to families; and the family which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' takes shall come by households; and the household which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' takes shall come man by man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 14:38, 39
    marker-yv: yv-n
  - type: text
    text: 'Then it shall be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' he who is taken with the accursed thing shall be burned with fire, he and all that he has, because he has '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 7:11
    marker-yv: yv-n
  - type: text
    text: 'transgressed the covenant of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and because he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 34:7; Judg. 20:6
    marker-yv: yv-n
  - type: text
    text: has done a disgraceful thing in Israel.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Joshua rose early in the morning and brought Israel by their tribes, and the tribe of Judah was taken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He brought the clan of Judah, and he took the family of the Zarhites; and he brought the family of the Zarhites man by man, and Zabdi was taken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then he brought his household man by man, and Achan the son of Carmi, the son of Zabdi, the son of Zerah, of the tribe of Judah, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 14:42
    marker-yv: yv-n
  - type: text
    text: was taken.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now Joshua said to Achan, “My son, I beg you, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 6:5; Jer. 13:16; John 9:24
    marker-yv: yv-n
  - type: text
    text: 'give glory to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Israel, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 5:6, 7; 2 Chr. 30:22; Ezra 10:10, 11; Ps. 32:5; Prov. 28:13; Jer. 3:12, 13; Dan. 9:4
    marker-yv: yv-n
  - type: text
    text: 'and make confession to Him, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 14:43
    marker-yv: yv-n
  - type: text
    text: 'tell me now what you have done; do not hide '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' from me.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Achan answered Joshua and said, “Indeed '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 22:34; 1 Sam. 15:24
    marker-yv: yv-n
  - type: text
    text: 'I have sinned against the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Israel, and this is what I have done: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: When I saw among the spoils a beautiful Babylonian garment, two hundred shekels of silver, and a wedge of gold weighing fifty shekels, I coveted them and took them. And there they are, hidden in the earth in the midst of my tent, with the silver under it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So Joshua sent messengers, and they ran to the tent; and there it was, hidden in his tent, with the silver under it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And they took them from the midst of the tent, brought them to Joshua and to all the children of Israel, and laid them out before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then Joshua, and all Israel with him, took Achan the son of Zerah, the silver, the garment, the wedge of gold, his sons, his daughters, his oxen, his donkeys, his sheep, his tent, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 16:32, 33; Dan. 6:24
    marker-yv: yv-n
  - type: text
    text: 'all that he had, and they brought them to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 7:26; 15:7
    marker-yv: yv-n
  - type: text
    text: 'the Valley of Achor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And Joshua said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 6:18; 1 Chr. 2:7; (Gal. 5:12)
    marker-yv: yv-n
  - type: text
    text: '“Why have you troubled us? The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will trouble you this day.” '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 17:5
    marker-yv: yv-n
  - type: text
    text: So all Israel stoned him with stones; and they burned them with fire after they had stoned them with stones.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 8:29; 2 Sam. 18:17; Lam. 3:53
    marker-yv: yv-n
  - type: text
    text: 'raised over him a great heap of stones, still there to this day. So '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 13:17
    marker-yv: yv-n
  - type: text
    text: 'the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' turned from the fierceness of His anger. Therefore the name of that place has been called '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 7:24; Is. 65:10; Hos. 2:15
    marker-yv: yv-n
  - type: text
    text: the Valley of Achor to this day.
