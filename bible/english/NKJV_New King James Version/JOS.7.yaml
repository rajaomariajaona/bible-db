  - type: text
    content: 'I have sinned against the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel, and this is what I have done: '
  '21':
  - type: text
    content: When I saw among the spoils a beautiful Babylonian garment, two hundred shekels of silver, and a wedge of gold weighing fifty shekels, I coveted them and took them. And there they are, hidden in the earth in the midst of my tent, with the silver under it.”
  '22':
  - type: text
    content: 'So Joshua sent messengers, and they ran to the tent; and there it was, hidden in his tent, with the silver under it. '
  '23':
  - type: text
    content: 'And they took them from the midst of the tent, brought them to Joshua and to all the children of Israel, and laid them out before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Then Joshua, and all Israel with him, took Achan the son of Zerah, the silver, the garment, the wedge of gold, his sons, his daughters, his oxen, his donkeys, his sheep, his tent, and '
  - type: note
    content: Num. 16:32, 33; Dan. 6:24
  - type: text
    content: 'all that he had, and they brought them to '
  - type: note
