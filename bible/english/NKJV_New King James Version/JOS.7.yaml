  - type: text
    content: it
  - type: text
    content: ' from me.”'
  '2':
  - type: text
    content: 'Now Joshua sent men from Jericho to Ai, which '
  - type: text
    content: is
  - type: text
    content: ' beside Beth Aven, on the east side of Bethel, and spoke to them, saying, “Go up and spy out the country.” So the men went up and spied out Ai. '
  '20':
  - type: text
    content: 'And Achan answered Joshua and said, “Indeed '
  - type: note
