  - type: text
    content: 'the Valley of Achor. '
  '25':
  - type: text
    content: 'And Joshua said, '
  - type: note
    content: Josh. 6:18; 1 Chr. 2:7; (Gal. 5:12)
  - type: text
    content: '“Why have you troubled us? The '
  - type: heading
    content: Lord
  - type: text
    content: ' will trouble you this day.” '
  - type: note
    content: Deut. 17:5
  - type: text
    content: So all Israel stoned him with stones; and they burned them with fire after they had stoned them with stones.
  '26':
  - type: text
    content: 'Then they '
  - type: note
    content: Josh. 8:29; 2 Sam. 18:17; Lam. 3:53
  - type: text
    content: 'raised over him a great heap of stones, still there to this day. So '
  - type: note
    content: Deut. 13:17
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' turned from the fierceness of His anger. Therefore the name of that place has been called '
  - type: note
    content: Josh. 7:24; Is. 65:10; Hos. 2:15
  - type: text
    content: the Valley of Achor to this day.
  '3':
  - type: text
    content: 'And they returned to Joshua and said to him, “Do not let all the people go up, but let about two or three thousand men go up and attack Ai. Do not weary all the people there, for '
  - type: text
