  - type: text
    content: ' she saw the child, and behold, the baby wept. So she had compassion on him, and said, “This is one of the Hebrews’ children.”'
  '7':
  - type: text
    content: Then his sister said to Pharaoh’s daughter, “Shall I go and call a nurse for you from the Hebrew women, that she may nurse the child for you?”
  '8':
  - type: text
    content: 'And Pharaoh’s daughter said to her, “Go.” So the maiden went and called the child’s mother. '
  '9':
  - type: text
    content: 'Then Pharaoh’s daughter said to her, “Take this child away and nurse him for me, and I will give '
  - type: text
    content: you
  - type: text
