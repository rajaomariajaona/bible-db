verses:
  '1':
  - type: heading
    content: Qualifications of Overseers
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' a faithful saying: If a man desires the position of a bishop, he desires a good work. '
  '10':
  - type: text
    content: 'But let these also first be tested; then let them serve as deacons, being '
  - type: text
    content: found
  - type: text
    content: ' blameless. '
  '11':
  - type: text
    content: 'Likewise, '
  - type: text
    content: their
  - type: text
    content: ' wives '
  - type: text
    content: must
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' reverent, not slanderers, temperate, faithful in all things. '
  '12':
  - type: text
    content: 'Let deacons be the husbands of one wife, ruling '
  - type: text
    content: their
  - type: text
    content: ' children and their own houses well. '
  '13':
  - type: text
    content: 'For those who have served well as deacons '
  - type: note
    content: Matt. 25:21
  - type: text
    content: obtain for themselves a good standing and great boldness in the faith which is in Christ Jesus.
  - type: heading
    content: The Great Mystery
  '14':
  - type: text
    content: 'These things I write to you, though I hope to come to you shortly; '
  '15':
  - type: text
    content: 'but if I am delayed, '
  - type: text
    content: I
  - type: text
    content: ' '
  - type: text
    content: write
  - type: text
    content: ' so that you may know how you ought to conduct yourself in the house of God, which is the church of the living God, the pillar and ground of the truth. '
  '16':
  - type: text
    content: 'And without controversy great is the mystery of godliness:'
  - type: note
    content: (John 1:14; 1 Pet. 1:20; 1 John 1:2; 3:5, 8)
  - type: text
    content: God was manifested in the flesh,
  - type: note
    content: (Matt. 3:16; Rom. 1:4)
  - type: text
    content: Justified in the Spirit,
  - type: note
    content: Matt. 28:2
  - type: text
    content: Seen by angels,
  - type: note
    content: Acts 10:34; Rom. 10:18
  - type: text
    content: Preached among the Gentiles,
  - type: note
    content: Rom. 16:26; 2 Cor. 1:19; Col. 1:6, 23
  - type: text
    content: Believed on in the world,
  - type: note
    content: Luke 24:51
  - type: text
    content: Received up in glory.
  '2':
  - type: text
    content: 'A bishop then must be blameless, the husband of one wife, temperate, sober-minded, of good behavior, hospitable, able to teach; '
  '3':
  - type: text
    content: 'not given to wine, not violent, not greedy for money, but gentle, not quarrelsome, not covetous; '
  '4':
  - type: text
    content: 'one who rules his own house well, having '
  - type: text
    content: his
  - type: text
    content: ' children in submission with all reverence '
  '5':
  - type: text
    content: '(for if a man does not know how to rule his own house, how will he take care of the church of God?); '
  '6':
  - type: text
    content: 'not a novice, lest being puffed up with pride he fall into the '
  - type: text
    content: same
  - type: text
    content: ' condemnation as the devil. '
  '7':
  - type: text
    content: 'Moreover he must have a good testimony among those who are outside, lest he fall into reproach and the '
  - type: note
    content: 1 Tim. 6:9; 2 Tim. 2:26
  - type: text
    content: snare of the devil.
  - type: heading
    content: Qualifications of Deacons
  '8':
  - type: text
    content: 'Likewise deacons '
  - type: text
    content: must
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' reverent, not double-tongued, '
  - type: note
    content: Ezek. 44:21
  - type: text
    content: 'not given to much wine, not greedy for money, '
  '9':
  - type: text
    content: 'holding the mystery of the faith with a pure conscience. '
