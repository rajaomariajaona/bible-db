document_id: 1TI.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Qualifications of Overseers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a faithful saying: If a man desires the position of a bishop, he desires a good work. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A bishop then must be blameless, the husband of one wife, temperate, sober-minded, of good behavior, hospitable, able to teach; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'not given to wine, not violent, not greedy for money, but gentle, not quarrelsome, not covetous; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'one who rules his own house well, having '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' children in submission with all reverence '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '(for if a man does not know how to rule his own house, how will he take care of the church of God?); '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'not a novice, lest being puffed up with pride he fall into the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: same
  - type: text
    text: ' condemnation as the devil. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moreover he must have a good testimony among those who are outside, lest he fall into reproach and the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Tim. 6:9; 2 Tim. 2:26
    marker-yv: yv-n
  - type: text
    text: snare of the devil.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Qualifications of Deacons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Likewise deacons '
  - type: usfm
    marker: it
    children:
    - type: text
      text: must
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' reverent, not double-tongued, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 44:21
    marker-yv: yv-n
  - type: text
    text: 'not given to much wine, not greedy for money, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'holding the mystery of the faith with a pure conscience. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But let these also first be tested; then let them serve as deacons, being '
  - type: usfm
    marker: it
    children:
    - type: text
      text: found
  - type: text
    text: ' blameless. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Likewise, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' wives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: must
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' reverent, not slanderers, temperate, faithful in all things. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Let deacons be the husbands of one wife, ruling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' children and their own houses well. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For those who have served well as deacons '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 25:21
    marker-yv: yv-n
  - type: text
    text: obtain for themselves a good standing and great boldness in the faith which is in Christ Jesus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Great Mystery
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'These things I write to you, though I hope to come to you shortly; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'but if I am delayed, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: write
  - type: text
    text: ' so that you may know how you ought to conduct yourself in the house of God, which is the church of the living God, the pillar and ground of the truth. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And without controversy great is the mystery of godliness:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 1:14; 1 Pet. 1:20; 1 John 1:2; 3:5, 8)
    marker-yv: yv-n
  - type: text
    text: God was manifested in the flesh,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Matt. 3:16; Rom. 1:4)
    marker-yv: yv-n
  - type: text
    text: Justified in the Spirit,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 28:2
    marker-yv: yv-n
  - type: text
    text: Seen by angels,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 10:34; Rom. 10:18
    marker-yv: yv-n
  - type: text
    text: Preached among the Gentiles,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:26; 2 Cor. 1:19; Col. 1:6, 23
    marker-yv: yv-n
  - type: text
    text: Believed on in the world,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 24:51
    marker-yv: yv-n
  - type: text
    text: Received up in glory.
