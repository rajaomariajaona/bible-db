verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The burden which the prophet Habakkuk saw.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Prophet’s Question
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They scoff at kings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And princes are scorned by them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They deride every stronghold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For they heap up earthen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mounds
    - type: text
      text: ' and seize it.'
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' mind changes, and he transgresses;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He commits offense,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 5:4
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ascribing
    - type: text
      text: ' this power to his god.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Prophet’s Second Question
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Are You not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 33:27; Ps. 90:2; 93:2; Mal. 3:6
      marker-yv: yv-n
    - type: text
      text: from everlasting,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, my Holy One?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We shall not die.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 10:5–7; Mal. 3:5
      marker-yv: yv-n
    - type: text
      text: You have appointed them for judgment;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O Rock, You have marked them for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 25:9
      marker-yv: yv-n
    - type: text
      text: correction.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: it
      children:
      - type: text
        text: You
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' of purer eyes than to behold evil,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And cannot look on wickedness.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do You look on those who deal treacherously,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' hold Your tongue when the wicked devours'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: it
      children:
      - type: text
        text: person
    - type: text
      text: ' more righteous than he?'
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Why
    - type: text
      text: ' do You make men like fish of the sea,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Like creeping things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' no ruler over them?'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: They take up all of them with a hook,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They catch them in their net,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And gather them in their dragnet.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore they rejoice and are glad.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 8:17
      marker-yv: yv-n
    - type: text
      text: they sacrifice to their net,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And burn incense to their dragnet;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because by them their share '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' sumptuous'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their food plentiful.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Shall they therefore empty their net,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And continue to slay nations without pity?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', how long shall I cry,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lam. 3:8
      marker-yv: yv-n
    - type: text
      text: And You will not hear?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Even cry out to You, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mic. 2:1, 2; 3:1–3
      marker-yv: yv-n
    - type: text
      text: “Violence!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And You will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 21:5–16)
      marker-yv: yv-n
    - type: text
      text: not save.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Why do You show me iniquity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And cause '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' to see trouble?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For plundering and violence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' before me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There is strife, and contention arises.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Therefore the law is powerless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And justice never goes forth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 12:1
      marker-yv: yv-n
    - type: text
      text: wicked surround the righteous;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore perverse judgment proceeds.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Reply
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Look
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 29:14; Ezek. 12:22–28
      marker-yv: yv-n
    - type: text
      text: ' among the nations and watch—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Be utterly astounded!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' work a work in your days'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Which
    - type: text
      text: ' you would not believe, though it were told '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For indeed I am '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:49, 50; 2 Kin. 24:2; 2 Chr. 36:17; Jer. 4:11–13; Mic. 4:10
      marker-yv: yv-n
    - type: text
      text: raising up the Chaldeans,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'A bitter and hasty '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 7:24; 21:31
      marker-yv: yv-n
    - type: text
      text: nation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which marches through the breadth of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To possess dwelling places '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' not theirs.'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: They are terrible and dreadful;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their judgment and their dignity proceed from themselves.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Their horses also are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 4:13
      marker-yv: yv-n
    - type: text
      text: swifter than leopards,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And more fierce than evening wolves.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their chargers charge ahead;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their cavalry comes from afar;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They fly as the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:26; 39:29, 30; Lam. 4:19; Ezek. 17:3; Hos. 8:1; Matt. 24:28; Luke 17:37
      marker-yv: yv-n
    - type: text
      text: 'eagle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' hastens to eat.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “They all come for violence;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Their faces are set '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' the east wind.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They gather captives like sand.
