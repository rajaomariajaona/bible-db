    - type: text
      text: '1'
  - type: text
    text: Paul, Silvanus, and Timothy,
- type: usfm
  marker: p
  children:
  - type: text
    text: 'To the church of the Thessalonians in God our Father and the Lord Jesus Christ:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 1:3
    marker-yv: yv-n
  - type: text
    text: Grace to you and peace from God our Father and the Lord Jesus Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Final Judgment and Glory
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'We are bound to thank God always for you, brethren, as it is fitting, because your faith grows exceedingly, and the love of every one of you all abounds toward each other, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'so that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 7:4; (1 Thess. 2:19)
    marker-yv: yv-n
  - type: text
    text: 'we ourselves boast of you among the churches of God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 1:3
    marker-yv: yv-n
  - type: text
    text: 'for your patience and faith '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 2:14
    marker-yv: yv-n
  - type: text
    text: 'in all your persecutions and tribulations that you endure, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: it
    children:
    - type: text
      text: which
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 1:28
    marker-yv: yv-n
  - type: text
    text: 'manifest evidence of the righteous judgment of God, that you may be counted worthy of the kingdom of God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 2:14
    marker-yv: yv-n
  - type: text
    text: 'for which you also suffer; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 6:10
    marker-yv: yv-n
  - type: text
    text: 'since '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a righteous thing with God to repay with tribulation those who trouble you, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: give
  - type: text
    text: ' you who are troubled '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 14:13
    marker-yv: yv-n
  - type: text
    text: 'rest with us when '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Thess. 4:16); Jude 14
    marker-yv: yv-n
  - type: text
    text: 'the Lord Jesus is revealed from heaven with His mighty angels, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'in flaming fire taking vengeance on those who do not know God, and on those who do not obey the gospel of our Lord Jesus Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 3:19; 1 Thess. 5:3
    marker-yv: yv-n
  - type: text
    text: 'These shall be punished with everlasting destruction from the presence of the Lord and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 33:2
    marker-yv: yv-n
  - type: text
    text: 'from the glory of His power, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'when He comes, in that Day, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 25:31
    marker-yv: yv-n
  - type: text
    text: 'to be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 49:3; John 17:10; 1 Thess. 2:12
    marker-yv: yv-n
  - type: text
    text: glorified in His saints and to be admired among all those who believe, because our testimony among you was believed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Therefore we also pray always for you that our God would '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 1:12
    marker-yv: yv-n
  - type: text
    text: 'count you worthy of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' calling, and fulfill all the good pleasure of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His
  - type: text
    text: ' goodness and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 1:3
    marker-yv: yv-n
  - type: text
    text: 'the work of faith with power, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Col. 3:17)
    marker-yv: yv-n
  - type: text
    text: that the name of our Lord Jesus Christ may be glorified in you, and you in Him, according to the grace of our God and the Lord Jesus Christ.
