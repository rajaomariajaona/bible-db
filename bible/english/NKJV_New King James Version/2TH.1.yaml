verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: Paul, Silvanus, and Timothy,
  - type: text
    content: 'To the church of the Thessalonians in God our Father and the Lord Jesus Christ:'
  '10':
  - type: text
    content: 'when He comes, in that Day, '
  - type: note
    content: Matt. 25:31
  - type: text
    content: 'to be '
  - type: note
    content: Is. 49:3; John 17:10; 1 Thess. 2:12
  - type: text
    content: glorified in His saints and to be admired among all those who believe, because our testimony among you was believed.
  '11':
  - type: text
    content: 'Therefore we also pray always for you that our God would '
  - type: note
    content: Col. 1:12
  - type: text
    content: 'count you worthy of '
  - type: text
    content: this
  - type: text
    content: ' calling, and fulfill all the good pleasure of '
  - type: text
    content: His
  - type: text
    content: ' goodness and '
  - type: note
    content: 1 Thess. 1:3
  - type: text
    content: 'the work of faith with power, '
  '12':
  - type: note
    content: (Col. 3:17)
  - type: text
    content: that the name of our Lord Jesus Christ may be glorified in you, and you in Him, according to the grace of our God and the Lord Jesus Christ.
  '2':
  - type: note
    content: 1 Cor. 1:3
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: God’s Final Judgment and Glory
  '3':
  - type: text
    content: 'We are bound to thank God always for you, brethren, as it is fitting, because your faith grows exceedingly, and the love of every one of you all abounds toward each other, '
  '4':
  - type: text
    content: 'so that '
  - type: note
    content: 2 Cor. 7:4; (1 Thess. 2:19)
  - type: text
    content: 'we ourselves boast of you among the churches of God '
  - type: note
    content: 1 Thess. 1:3
  - type: text
    content: 'for your patience and faith '
  - type: note
    content: 1 Thess. 2:14
  - type: text
    content: 'in all your persecutions and tribulations that you endure, '
  '5':
  - type: text
    content: which
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: Phil. 1:28
  - type: text
    content: 'manifest evidence of the righteous judgment of God, that you may be counted worthy of the kingdom of God, '
  - type: note
    content: 1 Thess. 2:14
  - type: text
    content: 'for which you also suffer; '
  '6':
  - type: note
    content: Rev. 6:10
  - type: text
    content: 'since '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' a righteous thing with God to repay with tribulation those who trouble you, '
  '7':
  - type: text
    content: 'and to '
  - type: text
    content: give
  - type: text
    content: ' you who are troubled '
  - type: note
    content: Rev. 14:13
  - type: text
    content: 'rest with us when '
  - type: note
    content: (1 Thess. 4:16); Jude 14
  - type: text
    content: 'the Lord Jesus is revealed from heaven with His mighty angels, '
  '8':
  - type: text
    content: 'in flaming fire taking vengeance on those who do not know God, and on those who do not obey the gospel of our Lord Jesus Christ. '
  '9':
  - type: note
    content: Phil. 3:19; 1 Thess. 5:3
  - type: text
    content: 'These shall be punished with everlasting destruction from the presence of the Lord and '
  - type: note
    content: Deut. 33:2
  - type: text
    content: 'from the glory of His power, '
