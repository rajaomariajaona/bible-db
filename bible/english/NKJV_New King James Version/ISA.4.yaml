      marker-yv: yv-n
    - type: text
      text: in that day seven women shall take hold of one man, saying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“We will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Thess. 3:12
      marker-yv: yv-n
    - type: text
      text: eat our own food and wear our own apparel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Only let us be called by your name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To take away '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 1:25
      marker-yv: yv-n
    - type: text
      text: our reproach.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Renewal of Zion
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'In that day '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 12:1–6; (Jer. 23:5); Zech. 3:8
      marker-yv: yv-n
    - type: text
      text: 'the Branch of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shall be beautiful and glorious;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the fruit of the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' excellent and appealing'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For those of Israel who have escaped.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And it shall come to pass that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' left in Zion and remains in Jerusalem '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 60:21
      marker-yv: yv-n
    - type: text
      text: 'will be called holy—everyone who is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 4:3
      marker-yv: yv-n
    - type: text
      text: 'recorded among the living in Jerusalem. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'When '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 3:2, 3
      marker-yv: yv-n
    - type: text
      text: 'the Lord has washed away the filth of the daughters of Zion, and purged the blood of Jerusalem from her midst, by the spirit of judgment and by the spirit of burning, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will create above every dwelling place of Mount Zion, and above her assemblies, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 13:21, 22; Num. 9:15–23
      marker-yv: yv-n
    - type: text
      text: 'a cloud and smoke by day and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 2:5
      marker-yv: yv-n
    - type: text
      text: 'the shining of a flaming fire by night. For over all the glory there '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' a covering. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And there will be a tabernacle for shade in the daytime from the heat, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 27:5; Is. 25:4
      marker-yv: yv-n
    - type: text
      text: for a place of refuge, and for a shelter from storm and rain.
