  '16':
  - type: text
    content: 'And he drove them from the judgment seat. '
  '17':
  - type: text
    content: 'Then all the Greeks took '
  - type: note
    content: 1 Cor. 1:1
  - type: text
    content: 'Sosthenes, the ruler of the synagogue, and beat '
  - type: text
    content: him
  - type: text
