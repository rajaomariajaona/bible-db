  '12':
  - type: text
    content: 'When Gallio was proconsul of Achaia, the Jews with one accord rose up against Paul and brought him to the judgment seat, '
  '13':
  - type: text
    content: 'saying, “This '
  - type: text
    content: fellow
  - type: text
