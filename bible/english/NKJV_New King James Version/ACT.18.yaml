  - type: heading
    content: Paul Returns to Antioch
  '18':
  - type: text
    content: 'So Paul still remained a good while. Then he took leave of the brethren and sailed for Syria, and Priscilla and Aquila '
  - type: text
    content: were
  - type: text
    content: ' with him. '
  - type: note
    content: Num. 6:2, 5, 9, 18; Acts 21:24
  - type: text
    content: 'He had '
  - type: text
    content: his
  - type: text
    content: ' hair cut off at '
  - type: note
    content: Rom. 16:1
  - type: text
    content: 'Cenchrea, for he had taken a vow. '
  '19':
  - type: text
    content: 'And he came to Ephesus, and left them there; but he himself entered the synagogue and reasoned with the Jews. '
  '2':
  - type: text
    content: 'And he found a certain Jew named '
  - type: note
    content: Rom. 16:3; 1 Cor. 16:19; 2 Tim. 4:19
  - type: text
    content: 'Aquila, born in Pontus, who had recently come from Italy with his wife Priscilla (because Claudius had commanded all the Jews to depart from Rome); and he came to them. '
  '20':
  - type: text
    content: 'When they asked '
  - type: text
    content: him
  - type: text
    content: ' to stay a longer time with them, he did not consent, '
  '21':
  - type: text
    content: 'but took leave of them, saying, '
  - type: note
    content: Acts 19:21; 20:16
  - type: text
    content: '“I must by all means keep this coming feast in Jerusalem; but I will return again to you, '
  - type: note
    content: 1 Cor. 4:19; Heb. 6:3; James 4:15
  - type: text
    content: God willing.” And he sailed from Ephesus.
  '22':
  - type: text
    content: 'And when he had landed at '
  - type: note
    content: Acts 8:40
  - type: text
    content: 'Caesarea, and gone up and greeted the church, he went down to Antioch. '
  '23':
  - type: text
    content: 'After he had spent some time '
  - type: text
    content: there,
  - type: text
    content: ' he departed and went over the region of '
  - type: note
    content: Gal. 1:2
  - type: text
    content: 'Galatia and Phrygia in order, '
  - type: note
    content: Acts 14:22; 15:32, 41
  - type: text
    content: strengthening all the disciples.
  - type: heading
    content: Ministry of Apollos
  '24':
  - type: note
    content: Acts 19:1; 1 Cor. 1:12; 3:4; 16:12; Titus 3:13
  - type: text
    content: 'Now a certain Jew named Apollos, born at Alexandria, an eloquent man '
  - type: text
    content: and
  - type: text
    content: ' mighty in the Scriptures, came to Ephesus. '
  '25':
  - type: text
    content: 'This man had been instructed in the way of the Lord; and being '
  - type: note
    content: Rom. 12:11
  - type: text
    content: 'fervent in spirit, he spoke and taught accurately the things of the Lord, '
  - type: note
    content: (Matt. 3:1–11; Mark 1:7, 8; Luke 3:16, 17; 7:29; John 1:26, 33); Acts 19:3
  - type: text
    content: 'though he knew only the baptism of John. '
  '26':
  - type: text
    content: 'So he began to speak boldly in the synagogue. When Aquila and Priscilla heard him, they took him aside and explained to him the way of God more accurately. '
  '27':
  - type: text
    content: 'And when he desired to cross to Achaia, the brethren wrote, exhorting the disciples to receive him; and when he arrived, '
  - type: note
    content: 1 Cor. 3:6
  - type: text
    content: 'he greatly helped those who had believed through grace; '
  '28':
  - type: text
    content: 'for he vigorously refuted the Jews publicly, '
  - type: note
    content: Acts 9:22; 17:3; 18:5
  - type: text
    content: showing from the Scriptures that Jesus is the Christ.
  '3':
  - type: text
    content: 'So, because he was of the same trade, he stayed with them '
  - type: note
    content: Acts 20:34; 1 Cor. 4:12; 9:14; 2 Cor. 11:7; 12:13; 1 Thess. 2:9; 4:11; 2 Thess. 3:8
  - type: text
    content: 'and worked; for by occupation they were tentmakers. '
  '4':
  - type: note
    content: Acts 17:2
  - type: text
    content: And he reasoned in the synagogue every Sabbath, and persuaded both Jews and Greeks.
  '5':
  - type: note
    content: Acts 17:14, 15
  - type: text
    content: 'When Silas and Timothy had come from Macedonia, Paul was '
  - type: note
    content: Acts 18:28
  - type: text
