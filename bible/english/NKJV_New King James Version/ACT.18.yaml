    content: Ministering at Corinth
  - type: text
    content: 'After these things Paul departed from Athens and went to Corinth. '
  '10':
  - type: note
    content: Jer. 1:18, 19
  - type: text
    content: for I am with you, and no one will attack you to hurt you; for I have many people in this city.”
