document_id: ACT.18,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ministering at Corinth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After these things Paul departed from Athens and went to Corinth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 1:18, 19
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for I am with you, and no one will attack you to hurt you; for I have many people in this city.”
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And he continued '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' a year and six months, teaching the word of God among them.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When Gallio was proconsul of Achaia, the Jews with one accord rose up against Paul and brought him to the judgment seat, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'saying, “This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fellow
    - type: text
      text: ' persuades men to worship God contrary to the law.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And when Paul was about to open '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' mouth, Gallio said to the Jews, “If it were a matter of wrongdoing or wicked crimes, O Jews, there would be reason why I should bear with you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But if it is a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 23:29; 25:19
      marker-yv: yv-n
    - type: text
      text: 'question of words and names and your own law, look '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' yourselves; for I do not want to be a judge of such '
    - type: usfm
      marker: it
      children:
      - type: text
        text: matters.
    - type: text
      text: '” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And he drove them from the judgment seat. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then all the Greeks took '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 1:1
      marker-yv: yv-n
    - type: text
      text: 'Sosthenes, the ruler of the synagogue, and beat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' before the judgment seat. But Gallio took no notice of these things.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Returns to Antioch
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'So Paul still remained a good while. Then he took leave of the brethren and sailed for Syria, and Priscilla and Aquila '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with him. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 6:2, 5, 9, 18; Acts 21:24
      marker-yv: yv-n
    - type: text
      text: 'He had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' hair cut off at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 16:1
      marker-yv: yv-n
    - type: text
      text: 'Cenchrea, for he had taken a vow. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And he came to Ephesus, and left them there; but he himself entered the synagogue and reasoned with the Jews. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he found a certain Jew named '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 16:3; 1 Cor. 16:19; 2 Tim. 4:19
      marker-yv: yv-n
    - type: text
      text: 'Aquila, born in Pontus, who had recently come from Italy with his wife Priscilla (because Claudius had commanded all the Jews to depart from Rome); and he came to them. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'When they asked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' to stay a longer time with them, he did not consent, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'but took leave of them, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:21; 20:16
      marker-yv: yv-n
    - type: text
      text: '“I must by all means keep this coming feast in Jerusalem; but I will return again to you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 4:19; Heb. 6:3; James 4:15
      marker-yv: yv-n
    - type: text
      text: God willing.” And he sailed from Ephesus.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And when he had landed at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 8:40
      marker-yv: yv-n
    - type: text
      text: 'Caesarea, and gone up and greeted the church, he went down to Antioch. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'After he had spent some time '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there,
    - type: text
      text: ' he departed and went over the region of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 1:2
      marker-yv: yv-n
    - type: text
      text: 'Galatia and Phrygia in order, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 14:22; 15:32, 41
      marker-yv: yv-n
    - type: text
      text: strengthening all the disciples.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ministry of Apollos
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:1; 1 Cor. 1:12; 3:4; 16:12; Titus 3:13
      marker-yv: yv-n
    - type: text
      text: 'Now a certain Jew named Apollos, born at Alexandria, an eloquent man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mighty in the Scriptures, came to Ephesus. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'This man had been instructed in the way of the Lord; and being '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:11
      marker-yv: yv-n
    - type: text
      text: 'fervent in spirit, he spoke and taught accurately the things of the Lord, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 3:1–11; Mark 1:7, 8; Luke 3:16, 17; 7:29; John 1:26, 33); Acts 19:3
      marker-yv: yv-n
    - type: text
      text: 'though he knew only the baptism of John. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'So he began to speak boldly in the synagogue. When Aquila and Priscilla heard him, they took him aside and explained to him the way of God more accurately. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And when he desired to cross to Achaia, the brethren wrote, exhorting the disciples to receive him; and when he arrived, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 3:6
      marker-yv: yv-n
    - type: text
      text: 'he greatly helped those who had believed through grace; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'for he vigorously refuted the Jews publicly, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:22; 17:3; 18:5
      marker-yv: yv-n
    - type: text
      text: showing from the Scriptures that Jesus is the Christ.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So, because he was of the same trade, he stayed with them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:34; 1 Cor. 4:12; 9:14; 2 Cor. 11:7; 12:13; 1 Thess. 2:9; 4:11; 2 Thess. 3:8
      marker-yv: yv-n
    - type: text
      text: 'and worked; for by occupation they were tentmakers. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 17:2
      marker-yv: yv-n
    - type: text
      text: And he reasoned in the synagogue every Sabbath, and persuaded both Jews and Greeks.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 17:14, 15
      marker-yv: yv-n
    - type: text
      text: 'When Silas and Timothy had come from Macedonia, Paul was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:28
      marker-yv: yv-n
    - type: text
      text: 'compelled by the Spirit, and testified to the Jews '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' Jesus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the Christ. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:45
      marker-yv: yv-n
    - type: text
      text: 'when they opposed him and blasphemed, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 5:13; Matt. 10:14; Acts 13:51
      marker-yv: yv-n
    - type: text
      text: 'he shook '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' garments and said to them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 20:9, 11, 12; 2 Sam. 1:16; 1 Kin. 2:33; Ezek. 18:13; 33:4, 6, 8; Matt. 27:25; Acts 20:26
      marker-yv: yv-n
    - type: text
      text: '“Your blood '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' upon your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' heads; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ezek. 3:18, 19)
      marker-yv: yv-n
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' clean. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:46–48; 28:28
      marker-yv: yv-n
    - type: text
      text: 'From now on I will go to the Gentiles.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And he departed from there and entered the house of a certain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' named Justus, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' who worshiped God, whose house was next door to the synagogue. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 1:14
      marker-yv: yv-n
    - type: text
      text: Then Crispus, the ruler of the synagogue, believed on the Lord with all his household. And many of the Corinthians, hearing, believed and were baptized.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 23:11
      marker-yv: yv-n
    - type: text
      text: 'the Lord spoke to Paul in the night by a vision, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do not be afraid, but speak, and do not keep silent;
    - type: text
      text: ' '
