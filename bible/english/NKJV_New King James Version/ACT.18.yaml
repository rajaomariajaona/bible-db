  - type: text
    content: his
  - type: text
    content: ' mouth, Gallio said to the Jews, “If it were a matter of wrongdoing or wicked crimes, O Jews, there would be reason why I should bear with you. '
  '15':
  - type: text
    content: 'But if it is a '
  - type: note
