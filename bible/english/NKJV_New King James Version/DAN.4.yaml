    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' food for all, under which the beasts of the field dwelt, and in whose branches the birds of the heaven had their home— '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 2:37, 38
      marker-yv: yv-n
    - type: text
      text: 'it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' you, O king, who have grown and become strong; for your greatness has grown and reaches to the heavens, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 27:6–8
      marker-yv: yv-n
    - type: text
      text: and your dominion to the end of the earth.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 4:13–15
      marker-yv: yv-n
    - type: text
      text: '“And inasmuch as the king saw a watcher, a holy one, coming down from heaven and saying, ‘Chop down the tree and destroy it, but leave its stump and roots in the earth, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bound
    - type: text
      text: ' with a band of iron and bronze in the tender grass of the field; let it be wet with the dew of heaven, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 5:21
      marker-yv: yv-n
    - type: text
      text: 'and let him graze with the beasts of the field, till seven times pass over him’; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'this is the interpretation, O king, and this is the decree of the Most High, which has come upon my lord the king: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 4:32; 5:21
      marker-yv: yv-n
    - type: text
      text: 'drive you from men, your dwelling shall be with the beasts of the field, and they shall make you '
    - type: usfm
      marker: x
      children:
      - type: text
