    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 5:5; Luke 12:20
      marker-yv: yv-n
    - type: text
      text: 'While the word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: still
    - type: text
      text: ' in the king’s mouth, '
    - type: usfm
