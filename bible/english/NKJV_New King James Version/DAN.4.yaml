      marker-yv: yv-n
    - type: text
      text: 'eat grass like oxen. They shall wet you with the dew of heaven, and seven times shall pass over you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 83:18; Dan. 4:2, 17, 32
      marker-yv: yv-n
    - type: text
      text: 'till you know that the Most High rules in the kingdom of men, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 27:5
      marker-yv: yv-n
    - type: text
      text: gives it to whomever He chooses.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And inasmuch as they gave the command to leave the stump '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' roots of the tree, your kingdom shall be assured to you, after you come to know that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 21:25; Luke 15:18
      marker-yv: yv-n
    - type: text
      text: 'Heaven rules. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, O king, let my advice be acceptable to you; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 28:13); Is. 55:7; Ezek. 18:21, 22; (Rom. 2:9–11; 1 Pet. 4:8)
      marker-yv: yv-n
    - type: text
      text: 'break off your sins by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: being
    - type: text
      text: ' righteous, and your iniquities by showing mercy to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' poor. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 41:1–3); Is. 58:6, 7, 10
      marker-yv: yv-n
    - type: text
      text: 'Perhaps there may be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 21:29
      marker-yv: yv-n
    - type: text
      text: a lengthening of your prosperity.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nebuchadnezzar’s Humiliation
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this
    - type: text
      text: ' came upon King Nebuchadnezzar. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
