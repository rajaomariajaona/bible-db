      marker-yv: yv-n
    - type: text
      text: 'How great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' His signs,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And how mighty His wonders!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His kingdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Dan. 2:44; 4:34; 6:26)
      marker-yv: yv-n
    - type: text
      text: an everlasting kingdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And His dominion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' from generation to generation.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king '
    - type: usfm
