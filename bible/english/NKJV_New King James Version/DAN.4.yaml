  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 27:5–7; Ezek. 29:18–20; Dan. 2:37; 5:18
      marker-yv: yv-n
    - type: text
      text: Gives it to whomever He will,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And sets over it the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 2:8; Dan. 11:21
      marker-yv: yv-n
    - type: text
      text: lowest of men.’
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This dream I, King Nebuchadnezzar, have seen. Now you, Belteshazzar, declare its interpretation, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:8, 15; Dan. 5:8, 15
      marker-yv: yv-n
    - type: text
      text: 'since all the wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' of my kingdom are not able to make known to me the interpretation; but you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' able, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 4:8, 9; 5:11, 14
      marker-yv: yv-n
    - type: text
      text: 'for the Spirit of the Holy God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in you.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Daniel Explains the Second Dream
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Daniel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 4:8
      marker-yv: yv-n
    - type: text
      text: 'whose name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Belteshazzar, was astonished for a time, and his thoughts '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 4:19; Dan. 7:15, 28; 8:27
      marker-yv: yv-n
    - type: text
      text: 'troubled him. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: So
    - type: text
      text: ' the king spoke, and said, “Belteshazzar, do not let the dream or its interpretation trouble you.” Belteshazzar answered and said, “My lord, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: may
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 18:32; Jer. 29:7; Dan. 4:24; 10:16
      marker-yv: yv-n
    - type: text
      text: the dream concern those who hate you, and its interpretation concern your enemies!
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I thought it good to declare the signs and wonders '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 3:26
      marker-yv: yv-n
    - type: text
