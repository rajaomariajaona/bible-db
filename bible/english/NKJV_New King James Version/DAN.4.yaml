      marker-yv: yv-n
    - type: text
      text: 'they shall drive you from men, and your dwelling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' with the beasts of the field. They shall make you eat grass like oxen; and seven times shall pass over you, until you know that the Most High rules in the kingdom of men, and gives it to whomever He chooses.”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That very hour the word was fulfilled concerning Nebuchadnezzar; he was driven from men and ate grass like oxen; his body was wet with the dew of heaven till his hair had grown like eagles’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: feathers
    - type: text
      text: ' and his nails like birds’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: claws.
  - type: usfm
    marker: s1
    children:
