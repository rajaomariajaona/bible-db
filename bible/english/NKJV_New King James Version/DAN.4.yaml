      - type: text
        text: Jer. 27:6; Ezek. 17:23; 31:6; Lam. 4:20
      marker-yv: yv-n
    - type: text
      text: The beasts of the field found shade under it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The birds of the heavens dwelt in its branches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all flesh was fed from it.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I saw in the visions of my head '
    - type: usfm
      marker: it
      children:
      - type: text
