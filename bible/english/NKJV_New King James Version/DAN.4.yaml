  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 115:3; 135:6; Dan. 6:27
      marker-yv: yv-n
    - type: text
      text: He does according to His will in the army of heaven
  - type: usfm
    marker: q2
    children:
    - type: text
