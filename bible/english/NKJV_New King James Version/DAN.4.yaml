  - type: usfm
    marker: q2
    children:
    - type: text
      text: Its fruit abundant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And in it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' food for all.'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
