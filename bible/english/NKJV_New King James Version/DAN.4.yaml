      marker-yv: yv-n
    - type: text
      text: 'who lives forever:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For His dominion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 10:16); Dan. 2:44; 7:14; Mic. 4:7; (Luke 1:33)
      marker-yv: yv-n
    - type: text
      text: an everlasting dominion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And His kingdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' from generation to generation.'
  '35':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 39:5; Is. 40:15, 17
      marker-yv: yv-n
    - type: text
      text: 'All the inhabitants of the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
