    - type: text
      text: times pass over him.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘This decision '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' by the decree of the watchers,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the sentence by the word of the holy ones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In order '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 9:16; 83:18
      marker-yv: yv-n
    - type: text
      text: that the living may know
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 2:21; 4:25, 32; 5:21
      marker-yv: yv-n
    - type: text
