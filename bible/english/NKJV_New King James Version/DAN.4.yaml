      marker-yv: yv-n
    - type: text
      text: ‘Chop down the tree and cut off its branches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Strip off its leaves and scatter its fruit.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 31:12, 13; Dan. 4:12
      marker-yv: yv-n
    - type: text
      text: Let the beasts get out from under it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the birds from its branches.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nevertheless leave the stump and roots in the earth,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bound
    - type: text
      text: ' with a band of iron and bronze,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the tender grass of the field.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let it be wet with the dew of heaven,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: let
    - type: text
      text: ' him graze with the beasts'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: On the grass of the earth.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let his heart be changed from '
    - type: usfm
      marker: it
      children:
      - type: text
