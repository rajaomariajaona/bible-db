  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 4:10–12
      marker-yv: yv-n
    - type: text
      text: '“The tree that you saw, which grew and became strong, whose height reached to the heavens and which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: could
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' seen by all the earth, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
