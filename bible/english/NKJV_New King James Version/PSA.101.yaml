document_id: PSA.101,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Promised Faithfulness to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing of mercy and justice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To You, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I will sing praises.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will behave wisely in a perfect way.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, when will You come to me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:4
      marker-yv: yv-n
    - type: text
      text: walk within my house with a perfect heart.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will set nothing wicked before my eyes;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 97:10
      marker-yv: yv-n
    - type: text
      text: 'I hate the work of those '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 23:6
      marker-yv: yv-n
    - type: text
      text: who fall away;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It shall not cling to me.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A perverse heart shall depart from me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 119:115)
      marker-yv: yv-n
    - type: text
      text: know wickedness.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever secretly slanders his neighbor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Him I will destroy;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 6:17
      marker-yv: yv-n
    - type: text
      text: The one who has a haughty look and a proud heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Him I will not endure.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My eyes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' on the faithful of the land,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That they may dwell with me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He who walks in a perfect way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall serve me.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He who works deceit shall not dwell within my house;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He who tells lies shall not continue in my presence.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 75:10); Jer. 21:12
      marker-yv: yv-n
    - type: text
      text: Early I will destroy all the wicked of the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That I may cut off all the evildoers '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 48:2, 8
      marker-yv: yv-n
    - type: text
      text: 'from the city of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
