document_id: JOB.3,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job Deplores His Birth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this Job opened his mouth and cursed the day of his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: birth.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because it did not shut up the doors of my '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mother’s
    - type: text
      text: ' womb,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor hide sorrow from my eyes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 10:18, 19
      marker-yv: yv-n
    - type: text
      text: ' did I not die at birth?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Why
    - type: text
      text: ' did I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: not
    - type: text
      text: ' perish when I came from the womb?'
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 30:3
      marker-yv: yv-n
    - type: text
      text: Why did the knees receive me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or why the breasts, that I should nurse?
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For now I would have lain still and been quiet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would have been asleep;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then I would have been at rest
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With kings and counselors of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 15:28; Is. 58:12
      marker-yv: yv-n
    - type: text
      text: built ruins for themselves,
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or with princes who had gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who filled their houses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' silver;'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or '
    - type: usfm
      marker: it
      children:
      - type: text
        text: why
    - type: text
      text: ' was I not hidden '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 58:8
      marker-yv: yv-n
    - type: text
      text: like a stillborn child,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like infants who never saw light?
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'There the wicked cease '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' troubling,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And there the weary are at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 17:16
      marker-yv: yv-n
    - type: text
      text: rest.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: There
    - type: text
      text: ' the prisoners rest together;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 39:7
      marker-yv: yv-n
    - type: text
      text: They do not hear the voice of the oppressor.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The small and great are there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the servant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' free from his master.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Job spoke, and said:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 20:18
      marker-yv: yv-n
    - type: text
      text: ' is light given to him who is in misery,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And life to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 4:27
      marker-yv: yv-n
    - type: text
      text: bitter of soul,
  '21':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 9:6
      marker-yv: yv-n
    - type: text
      text: 'long for death, but it does not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And search for it more than '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 2:4
      marker-yv: yv-n
    - type: text
      text: hidden treasures;
  '22':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who rejoice exceedingly,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' are glad when they can find the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 7:15, 16
      marker-yv: yv-n
    - type: text
      text: grave?
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Why
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: light
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: given
    - type: text
      text: ' to a man whose way is hidden,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 19:8; Ps. 88:8; Lam. 3:7
      marker-yv: yv-n
    - type: text
      text: And whom God has hedged in?
  '24':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For my sighing comes before I eat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my groanings pour out like water.
  '25':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the thing I greatly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 9:28; 30:15)
      marker-yv: yv-n
    - type: text
      text: feared has come upon me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And what I dreaded has happened to me.
  '26':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am not at ease, nor am I quiet;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have no rest, for trouble comes.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “May
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 10:18, 19; Jer. 20:14–18
      marker-yv: yv-n
    - type: text
      text: ' the day perish on which I was born,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the night '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' it was said,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘A male child is conceived.’
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May that day be darkness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May God above not seek it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor the light shine upon it.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'May darkness and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 10:21, 22; Jer. 13:16; Amos 5:8
      marker-yv: yv-n
    - type: text
      text: the shadow of death claim it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May a cloud settle on it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May the blackness of the day terrify it.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' that night, may darkness seize it;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May it not rejoice among the days of the year,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May it not come into the number of the months.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, may that night be barren!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May no joyful shout come into it!
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May those curse it who curse the day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Those '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 9:17
      marker-yv: yv-n
    - type: text
      text: who are ready to arouse Leviathan.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May the stars of its morning be dark;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'May it look for light, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' none,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And not see the dawning of the day;
