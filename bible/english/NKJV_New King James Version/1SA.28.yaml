      children:
      - type: text
        text: 1 Sam. 25:1
      marker-yv: yv-n
    - type: text
      text: 'Ramah, in his own city. And Saul had put '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 1:19
      marker-yv: yv-n
    - type: text
      text: the mediums and the spiritists out of the land.
  '4':
  - type: usfm
