    children:
    - type: text
      text: 'So she brought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' before Saul and his servants, and they ate. Then they rose and went away that night.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 29:1, 2
      marker-yv: yv-n
    - type: text
      text: 'Samuel had died, and all Israel had lamented for him and buried him in '
    - type: usfm
