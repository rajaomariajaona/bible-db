  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his servants said to him, “In fact, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a woman who is a medium at En Dor.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Saul disguised himself and put on other clothes, and he went, and two men with him; and they came to the woman by night. And '
    - type: usfm
