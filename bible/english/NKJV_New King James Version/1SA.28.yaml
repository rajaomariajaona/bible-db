  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul Consults a Medium
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Immediately Saul fell full length on the ground, and was dreadfully afraid because of the words of Samuel. And there was no strength in him, for he had eaten no food all day or all night.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the woman came to Saul and saw that he was severely troubled, and said to him, “Look, your maidservant has obeyed your voice, and I have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 31:1–6; Job 3:17–19
      marker-yv: yv-n
    - type: text
      text: 'put my life in my hands and heeded the words which you spoke to me. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, please, heed also the voice of your maidservant, and let me set a piece of bread before you; and eat, that you may have strength when you go on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' way.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But he refused and said, “I will not eat.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So his servants, together with the woman, urged him; and he heeded their voice. Then he arose from the ground and sat on the bed. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the woman had a fatted calf in the house, and she hastened to kill it. And she took flour and kneaded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' and baked unleavened bread from it. '
  '25':
  - type: usfm
