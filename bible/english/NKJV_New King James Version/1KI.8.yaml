  '62':
  - type: text
    content: 'Then '
  - type: note
    content: 2 Chr. 7:4–10
  - type: text
    content: 'the king and all Israel with him offered sacrifices before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '63':
  - type: text
    content: 'And Solomon offered a sacrifice of peace offerings, which he offered to the '
  - type: heading
    content: Lord
  - type: text
    content: ', twenty-two thousand bulls and one hundred and twenty thousand sheep. So the king and all the children of Israel dedicated the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '64':
  - type: text
    content: 'On '
  - type: note
    content: 2 Chr. 7:7
  - type: text
    content: 'the same day the king consecrated the middle of the court that '
  - type: text
    content: was
  - type: text
    content: ' in front of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '; for there he offered burnt offerings, grain offerings, and the fat of the peace offerings, because the '
  - type: note
    content: 2 Chr. 4:1
