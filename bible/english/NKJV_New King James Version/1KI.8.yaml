  '46':
  - type: text
    content: '“When they sin against You '
  - type: note
    content: 2 Chr. 6:36; Ps. 130:3; Prov. 20:9; Eccl. 7:20; (Rom. 3:23; 1 John 1:8, 10)
  - type: text
    content: '(for '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
