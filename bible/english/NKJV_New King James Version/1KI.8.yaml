  '54':
  - type: note
    content: 2 Chr. 7:1
  - type: text
    content: 'And so it was, when Solomon had finished praying all this prayer and supplication to the '
  - type: heading
    content: Lord
  - type: text
    content: ', that he arose from before the altar of the '
  - type: heading
    content: Lord
  - type: text
    content: ', from kneeling on his knees with his hands spread up to heaven. '
  '55':
  - type: text
    content: 'Then he stood '
  - type: note
    content: Num. 6:23–26; 2 Sam. 6:18; 1 Kin. 8:14
  - type: text
    content: 'and blessed all the assembly of Israel with a loud voice, saying: '
  '56':
  - type: text
    content: '“Blessed '
  - type: text
    content: be
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ', who has given '
  - type: note
    content: 1 Chr. 22:18
  - type: text
    content: 'rest to His people Israel, according to all that He promised. '
  - type: note
    content: Deut. 12:10; Josh. 21:45; 23:14
  - type: text
    content: 'There has not failed one word of all His good promise, which He promised through His servant Moses. '
  '57':
  - type: text
    content: 'May the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God be with us, as He was with our fathers. '
  - type: note
    content: Deut. 31:6; Josh. 1:5; 1 Sam. 12:22; (Rom. 8:31–37); Heb. 13:5
  - type: text
    content: 'May He not leave us nor forsake us, '
  '58':
  - type: text
    content: 'that He may '
  - type: note
    content: Ps. 119:36; Jer. 31:33
  - type: text
    content: 'incline our hearts to Himself, to walk in all His ways, and to keep His commandments and His statutes and His judgments, which He commanded our fathers. '
  '59':
  - type: text
    content: 'And may these words of mine, with which I have made supplication before the '
  - type: heading
    content: Lord
  - type: text
    content: ', be near the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God day and night, that He may maintain the cause of His servant and the cause of His people Israel, as each day may require, '
  '6':
  - type: text
    content: 'Then the priests '
  - type: note
    content: 2 Sam. 6:17
  - type: text
    content: 'brought in the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' to '
  - type: note
    content: Ex. 26:33, 34; 1 Kin. 6:19
  - type: text
