  - type: text
    content: is
  - type: text
    content: ' the seventh month. '
  '20':
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' has fulfilled His word which He spoke; and I have filled the position of my father David, and sit on the throne of Israel, '
  - type: note
    content: 1 Chr. 28:5, 6
  - type: text
    content: 'as the '
  - type: heading
    content: Lord
  - type: text
    content: ' promised; and I have built a temple for the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel. '
