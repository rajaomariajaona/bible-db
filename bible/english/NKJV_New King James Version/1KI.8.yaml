  '18':
  - type: note
    content: 2 Chr. 6:8, 9
  - type: text
    content: 'But the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to my father David, ‘Whereas it was in your heart to build a temple for My name, you did well that it was in your heart. '
  '19':
  - type: text
