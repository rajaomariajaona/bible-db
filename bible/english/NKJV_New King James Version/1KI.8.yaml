  - type: text
    content: ' covenant and mercy with Your servants who '
  - type: note
    content: (Gen. 17:1; 1 Kin. 3:6); 2 Kin. 20:3
  - type: text
    content: 'walk before You with all their hearts. '
  '24':
  - type: text
    content: 'You have kept what You promised Your servant David my father; You have both spoken with Your mouth and fulfilled '
  - type: text
    content: it
  - type: text
    content: ' with Your hand, as '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' this day. '
  '25':
  - type: text
    content: 'Therefore, '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel, now keep what You promised Your servant David my father, saying, '
  - type: note
    content: 2 Sam. 7:12, 16; 1 Kin. 2:4; 9:5
  - type: text
    content: '‘You shall not fail to have a man sit before Me on the throne of Israel, only if your sons take heed to their way, that they walk before Me as you have walked before Me.’ '
  '26':
  - type: note
    content: 2 Sam. 7:25
  - type: text
    content: And now I pray, O God of Israel, let Your word come true, which You have spoken to Your servant David my father.
  '27':
  - type: text
    content: '“But '
  - type: note
    content: (2 Chr. 2:6; Is. 66:1; Acts 7:49; 17:24)
  - type: text
    content: 'will God indeed dwell on the earth? Behold, heaven and the '
  - type: note
    content: 2 Cor. 12:2
  - type: text
    content: 'heaven of heavens cannot contain You. How much less this temple which I have built! '
  '28':
  - type: text
    content: 'Yet regard the prayer of Your servant and his supplication, O '
  - type: heading
    content: Lord
  - type: text
    content: ' my God, and listen to the cry and the prayer which Your servant is praying before You today: '
  '29':
  - type: text
