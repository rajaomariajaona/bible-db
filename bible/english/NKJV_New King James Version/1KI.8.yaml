  - type: note
    content: Dan. 6:10; Jon. 2:4
  - type: text
    content: 'pray to You toward their land which You gave to their fathers, the city which You have chosen and the temple which I have built for Your name: '
  '49':
  - type: text
    content: 'then hear in heaven Your dwelling place their prayer and their supplication, and maintain their cause, '
  '5':
  - type: text
    content: 'Also King Solomon, and all the congregation of Israel who were assembled with him, '
  - type: text
    content: were
  - type: text
