  '30':
  - type: note
    content: Neh. 1:6
  - type: text
    content: And may You hear the supplication of Your servant and of Your people Israel, when they pray toward this place. Hear in heaven Your dwelling place; and when You hear, forgive.
  '31':
  - type: text
    content: '“When anyone sins against his neighbor, and is forced to take '
  - type: note
    content: Ex. 22:8–11
  - type: text
    content: 'an oath, and comes '
  - type: text
    content: and
  - type: text
    content: ' takes an oath before Your altar in this temple, '
  '32':
  - type: text
    content: 'then hear in heaven, and act, and judge Your servants, '
  - type: note
    content: Deut. 25:1
  - type: text
    content: condemning the wicked, bringing his way on his head, and justifying the righteous by giving him according to his righteousness.
  '33':
  - type: note
    content: Lev. 26:17; Deut. 28:25
  - type: text
    content: '“When Your people Israel are defeated before an enemy because they have sinned against You, and '
  - type: note
    content: Lev. 26:39, 40
  - type: text
    content: 'when they turn back to You and confess Your name, and pray and make supplication to You in this temple, '
  '34':
  - type: text
    content: 'then hear in heaven, and forgive the sin of Your people Israel, and bring them back to the land which You gave to their '
  - type: note
    content: (Lev. 26:40–42; Deut. 30:1–3)
  - type: text
    content: fathers.
  '35':
  - type: note
    content: Lev. 26:19; Deut. 28:23
  - type: text
    content: '“When the heavens are shut up and there is no rain because they have sinned against You, when they pray toward this place and confess Your name, and turn from their sin because You afflict them, '
  '36':
  - type: text
    content: 'then hear in heaven, and forgive the sin of Your servants, Your people Israel, that You may '
  - type: note
    content: Ps. 25:4; 27:11; 94:12
  - type: text
    content: 'teach them '
  - type: note
    content: 1 Sam. 12:23
  - type: text
    content: the good way in which they should walk; and send rain on Your land which You have given to Your people as an inheritance.
  '37':
  - type: note
    content: Lev. 26:16, 25, 26; Deut. 28:21, 22, 27, 38, 42, 52
  - type: text
    content: '“When there is famine in the land, pestilence '
  - type: text
    content: or
  - type: text
    content: ' blight '
  - type: text
    content: or
  - type: text
    content: ' mildew, locusts '
  - type: text
    content: or
  - type: text
    content: ' grasshoppers; when their enemy besieges them in the land of their cities; whatever plague or whatever sickness '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is;
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'whatever prayer, whatever supplication is made by anyone, '
  - type: text
    content: or
  - type: text
    content: ' by all Your people Israel, when each one knows the plague of his own heart, and spreads out his hands toward this temple: '
  '39':
  - type: text
