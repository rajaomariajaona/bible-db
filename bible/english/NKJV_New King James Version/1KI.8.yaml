  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' no other. '
  '61':
  - type: text
    content: 'Let your '
  - type: note
    content: Deut. 18:13; 1 Kin. 11:4; 15:3, 14; 2 Kin. 20:3
  - type: text
    content: 'heart therefore be loyal to the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God, to walk in His statutes and keep His commandments, as at this day.”'
