  - type: note
    content: (1 Sam. 16:7; 1 Chr. 28:9; Jer. 17:10); Acts 1:24
  - type: text
    content: 'know the hearts of all the sons of men), '
  '4':
  - type: text
    content: 'Then they brought up the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 1 Kin. 3:4; 2 Chr. 1:3
  - type: text
    content: 'the tabernacle of meeting, and all the holy furnishings that '
  - type: text
    content: were
  - type: text
    content: ' in the tabernacle. The priests and the Levites brought them up. '
  '40':
  - type: note
    content: (Ps. 130:4)
  - type: text
    content: that they may fear You all the days that they live in the land which You gave to our fathers.
  '41':
  - type: text
    content: '“Moreover, concerning a foreigner, who '
  - type: text
    content: is
  - type: text
    content: ' not of Your people Israel, but has come from a far country for Your name’s sake '
  '42':
  - type: text
    content: '(for they will hear of Your great name and Your '
  - type: note
    content: Ex. 13:3; Deut. 3:24
  - type: text
    content: 'strong hand and Your outstretched arm), when he comes and prays toward this temple, '
  '43':
  - type: text
    content: 'hear in heaven Your dwelling place, and do according to all for which the foreigner calls to You, '
  - type: note
    content: (Ex. 9:16; 1 Sam. 17:46; 2 Kin. 19:19)
  - type: text
    content: 'that all peoples of the earth may know Your name and '
  - type: note
    content: Ps. 102:15
  - type: text
    content: 'fear You, as '
  - type: text
    content: do
  - type: text
    content: ' Your people Israel, and that they may know that this temple which I have built is called by Your name.'
  '44':
  - type: text
    content: '“When Your people go out to battle against their enemy, wherever You send them, and when they pray to the '
  - type: heading
    content: Lord
  - type: text
    content: ' toward the city which You have chosen and the temple which I have built for Your name, '
  '45':
  - type: text
