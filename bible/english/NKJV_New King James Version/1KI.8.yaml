  '23':
  - type: text
    content: 'and he said: “'
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel, '
  - type: note
    content: Ex. 15:11; 2 Sam. 7:22
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' no God in heaven above or on earth below like You, '
  - type: note
    content: (Deut. 7:9; Neh. 1:5; Dan. 9:4)
  - type: text
    content: 'who keep '
  - type: text
