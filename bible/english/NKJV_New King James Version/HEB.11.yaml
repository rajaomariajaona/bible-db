document_id: HEB.11,114
type_code: eng
verses:
  '1':
  - type: heading
    content: By Faith We Understand
  - type: text
    content: 'Now faith is the substance of things hoped for, the evidence '
  - type: note
    content: Rom. 8:24; (2 Cor. 4:18; 5:7); Heb. 11:7, 27
  - type: text
    content: 'of things not seen. '
  '10':
  - type: text
    content: 'for he waited for '
  - type: note
    content: (Heb. 12:22; 13:14)
  - type: text
    content: 'the city which has foundations, '
  - type: note
    content: (Rev. 21:10)
  - type: text
    content: 'whose builder and maker '
  - type: text
    content: is
  - type: text
    content: ' God.'
  '11':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 17:19; 18:11–14; 21:1, 2
  - type: text
    content: 'Sarah herself also received strength to conceive seed, and '
  - type: note
    content: Luke 1:36
  - type: text
    content: 'she bore a child when she was past the age, because she judged Him '
  - type: note
    content: Heb. 10:23
  - type: text
    content: 'faithful who had promised. '
  '12':
  - type: text
    content: 'Therefore from one man, and him as good as '
  - type: note
    content: Rom. 4:19
  - type: text
    content: 'dead, were born '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: many
  - type: text
    content: ' as the '
  - type: note
    content: Gen. 15:5; 22:17; 32:12
  - type: text
    content: stars of the sky in multitude—innumerable as the sand which is by the seashore.
  - type: heading
    content: The Heavenly Hope
  '13':
  - type: text
    content: 'These all died in faith, '
  - type: note
    content: Heb. 11:39
  - type: text
    content: 'not having received the '
  - type: note
    content: Gen. 12:7
  - type: text
    content: 'promises, but '
  - type: note
    content: John 8:56; Heb. 11:27
  - type: text
    content: 'having seen them afar off were assured of them, embraced '
  - type: text
    content: them
  - type: text
    content: ' and '
  - type: note
    content: Gen. 23:4; 47:9; 1 Chr. 29:15; Ps. 39:12; Eph. 2:19; 1 Pet. 1:17; 2:11
  - type: text
    content: 'confessed that they were strangers and pilgrims on the earth. '
  '14':
  - type: text
    content: 'For those who say such things '
  - type: note
    content: Heb. 13:14
  - type: text
    content: 'declare plainly that they seek a homeland. '
  '15':
  - type: text
    content: 'And truly if they had called to mind '
  - type: note
    content: Gen. 11:31
  - type: text
    content: 'that '
  - type: text
    content: country
  - type: text
    content: ' from which they had come out, they would have had opportunity to return. '
  '16':
  - type: text
    content: 'But now they desire a better, that is, a heavenly '
  - type: text
    content: country.
  - type: text
    content: ' Therefore God is not ashamed '
  - type: note
    content: Gen. 26:24; 28:13; Ex. 3:6, 15; 4:5
  - type: text
    content: 'to be called their God, for He has '
  - type: note
    content: (John 14:2); Heb. 11:10; (Rev. 21:2)
  - type: text
    content: prepared a city for them.
  - type: heading
    content: The Faith of the Patriarchs
  '17':
  - type: text
    content: 'By faith Abraham, '
  - type: note
    content: Gen. 22:1–14; James 2:21
  - type: text
    content: 'when he was tested, offered up Isaac, and he who had received the promises offered up his only begotten '
  - type: text
    content: son,
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'of whom it was said, '
  - type: note
    content: Gen. 21:12; Rom. 9:7
  - type: text
    content: '“In Isaac your seed shall be called,” '
  '19':
  - type: text
    content: 'concluding that God '
  - type: note
    content: Rom. 4:17
  - type: text
    content: was
  - type: text
    content: ' able to raise '
  - type: text
    content: him
  - type: text
    content: ' up, even from the dead, from which he also received him in a figurative sense.'
  '2':
  - type: text
    content: 'For by it the elders obtained a '
  - type: text
    content: good
  - type: text
    content: ' testimony.'
  '20':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 27:26–40
  - type: text
    content: Isaac blessed Jacob and Esau concerning things to come.
  '21':
  - type: text
    content: 'By faith Jacob, when he was dying, '
  - type: note
    content: Gen. 48:1, 5, 16, 20
  - type: text
    content: 'blessed each of the sons of Joseph, and worshiped, '
  - type: text
    content: leaning
  - type: text
    content: ' on the top of his staff.'
  '22':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 50:24, 25; Ex. 13:19
  - type: text
    content: Joseph, when he was dying, made mention of the departure of the children of Israel, and gave instructions concerning his bones.
  - type: heading
    content: The Faith of Moses
  '23':
  - type: text
    content: 'By faith '
  - type: note
    content: Ex. 2:1–3
  - type: text
    content: 'Moses, when he was born, was hidden three months by his parents, because they saw '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' a beautiful child; and they were not afraid of the king’s '
  - type: note
    content: Ex. 1:16, 22
  - type: text
    content: command.
  '24':
  - type: text
    content: 'By faith '
  - type: note
    content: Ex. 2:11–15
  - type: text
    content: 'Moses, when he became of age, refused to be called the son of Pharaoh’s daughter, '
  '25':
  - type: text
    content: 'choosing rather to suffer affliction with the people of God than to enjoy the passing pleasures of sin, '
  '26':
  - type: text
    content: 'esteeming '
  - type: note
    content: Heb. 13:13
  - type: text
    content: 'the reproach of Christ greater riches than the treasures in Egypt; for he looked to the '
  - type: note
    content: Rom. 8:18; 2 Cor. 4:17
  - type: text
    content: reward.
  '27':
  - type: text
    content: 'By faith '
  - type: note
    content: Ex. 10:28
  - type: text
    content: 'he forsook Egypt, not fearing the wrath of the king; for he endured as seeing Him who is invisible. '
  '28':
  - type: text
    content: 'By faith '
  - type: note
    content: Ex. 12:21
  - type: text
    content: he kept the Passover and the sprinkling of blood, lest he who destroyed the firstborn should touch them.
  '29':
  - type: text
    content: 'By faith '
  - type: note
    content: Ex. 14:22–29; Jude 5
  - type: text
    content: 'they passed through the Red Sea as by dry '
  - type: text
    content: land, whereas
  - type: text
    content: ' the Egyptians, attempting to do so, were drowned.'
  - type: heading
    content: By Faith They Overcame
  '3':
  - type: text
    content: 'By faith we understand that '
  - type: note
    content: Gen. 1:1; Ps. 33:6; (John 1:3); 2 Pet. 3:5
  - type: text
    content: the worlds were framed by the word of God, so that the things which are seen were not made of things which are visible.
  - type: heading
    content: Faith at the Dawn of History
  '30':
  - type: text
    content: 'By faith '
  - type: note
    content: Josh. 6:20
  - type: text
    content: 'the walls of Jericho fell down after they were encircled for seven days. '
  '31':
  - type: text
    content: 'By faith '
  - type: note
    content: Josh. 2:9; 6:23; James 2:25
  - type: text
    content: 'the harlot Rahab did not perish with those who did not believe, when '
  - type: note
    content: Josh. 2:1
  - type: text
    content: she had received the spies with peace.
  '32':
  - type: text
    content: 'And what more shall I say? For the time would fail me to tell of '
  - type: note
    content: Judg. 6:11; 7:1–25
  - type: text
    content: 'Gideon and '
  - type: note
    content: Judg. 4:6–24
  - type: text
    content: 'Barak and '
  - type: note
    content: Judg. 13:24—16:31
  - type: text
    content: 'Samson and '
  - type: note
    content: Judg. 11:1–29; 12:1–7
  - type: text
    content: 'Jephthah, also '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 16; 17
  - type: text
    content: 'David and '
  - type: note
    content: 1 Sam. 7:9–14
  - type: text
    content: 'Samuel and the prophets: '
  '33':
  - type: text
    content: 'who through faith subdued kingdoms, worked righteousness, obtained promises, '
  - type: note
    content: Judg. 14:6; 1 Sam. 17:34; Dan. 6:22
  - type: text
    content: 'stopped the mouths of lions, '
  '34':
  - type: note
    content: Dan. 3:23–28
  - type: text
    content: 'quenched the violence of fire, escaped the edge of the sword, out of weakness were made strong, became valiant in battle, turned to flight the armies of the aliens. '
  '35':
  - type: note
    content: 1 Kin. 17:22; 2 Kin. 4:35–37
  - type: text
    content: Women received their dead raised to life again.
  - type: text
    content: 'Others were '
  - type: note
    content: Acts 22:25
  - type: text
    content: 'tortured, not accepting deliverance, that they might obtain a better resurrection. '
  '36':
  - type: text
    content: 'Still others had trial of mockings and scourgings, yes, and '
  - type: note
    content: Gen. 39:20; 1 Kin. 22:27; 2 Chr. 18:26; Jer. 20:2; 37:15
  - type: text
    content: 'of chains and imprisonment. '
  '37':
  - type: note
    content: 1 Kin. 21:13; 2 Chr. 24:21; Acts 7:58
  - type: text
    content: 'They were stoned, they were sawn in two, were tempted, were slain with the sword. '
  - type: note
    content: 2 Kin. 1:8; Matt. 3:4
  - type: text
    content: 'They wandered about '
  - type: note
    content: 1 Kin. 19:13, 19; 2 Kin. 2:8, 13; Zech. 13:4
  - type: text
    content: 'in sheepskins and goatskins, being destitute, afflicted, tormented— '
  '38':
  - type: text
    content: 'of whom the world was not worthy. They wandered in deserts and mountains, '
  - type: note
    content: 1 Kin. 18:4, 13; 19:9
  - type: text
    content: in
  - type: text
    content: ' dens and caves of the earth.'
  '39':
  - type: text
    content: 'And all these, '
  - type: note
    content: Heb. 11:2, 13
  - type: text
    content: 'having obtained a good testimony through faith, did not receive the promise, '
  '4':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 4:3–5; Matt. 23:35; 1 John 3:12
  - type: text
    content: 'Abel offered to God a more excellent sacrifice than Cain, through which he obtained witness that he was righteous, God testifying of his gifts; and through it he being dead still '
  - type: note
    content: Gen. 4:8–10; Heb. 12:24
  - type: text
    content: speaks.
  '40':
  - type: text
    content: 'God having provided something better for us, that they should not be '
  - type: note
    content: Heb. 5:9
  - type: text
    content: made perfect apart from us.
  '5':
  - type: text
    content: 'By faith Enoch was taken away so that he did not see death, '
  - type: note
    content: Gen. 5:21–24
  - type: text
    content: '“and was not found, because God had taken him”; for before he was taken he had this testimony, that he pleased God. '
  '6':
  - type: text
    content: 'But without faith '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' impossible to please '
  - type: text
    content: Him,
  - type: text
    content: ' for he who comes to God must believe that He is, and '
  - type: text
    content: that
  - type: text
    content: ' He is a rewarder of those who diligently seek Him.'
  '7':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 6:13–22
  - type: text
    content: 'Noah, being divinely warned of things not yet seen, moved with godly fear, '
  - type: note
    content: 1 Pet. 3:20
  - type: text
    content: 'prepared an ark for the saving of his household, by which he condemned the world and became heir of '
  - type: note
    content: Rom. 3:22
  - type: text
    content: the righteousness which is according to faith.
  - type: heading
    content: Faithful Abraham
  '8':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 12:1–4; Acts 7:2–4
  - type: text
    content: 'Abraham obeyed when he was called to go out to the place which he would receive as an inheritance. And he went out, not knowing where he was going. '
  '9':
  - type: text
    content: 'By faith he dwelt in the land of promise as '
  - type: text
    content: in
  - type: text
    content: ' a foreign country, '
  - type: note
    content: Gen. 12:8; 13:3, 18; 18:1, 9
  - type: text
    content: 'dwelling in tents with Isaac and Jacob, '
  - type: note
    content: Heb. 6:17
  - type: text
    content: 'the heirs with him of the same promise; '
