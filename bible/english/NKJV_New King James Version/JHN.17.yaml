document_id: JHN.17,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Prays for Himself
  - type: text
    content: 'Jesus spoke these words, lifted up His eyes to heaven, and said: '
  - type: text
    content: '“Father, '
  - type: note
    content: John 12:23
  - type: text
    content: the hour has come. Glorify Your Son, that Your Son also may glorify You,
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'And all Mine are Yours, and '
  - type: note
    content: John 16:15
  - type: text
    content: Yours are Mine, and I am glorified in them.
  - type: text
    content: ' '
  '11':
  - type: note
    content: (Mark 16:19; Luke 24:51); John 13:1; (Acts 1:9; Heb. 4:14; 9:24; 1 Pet. 3:22)
  - type: text
    content: 'Now I am no longer in the world, but these are in the world, and I come to You. Holy Father, '
  - type: note
    content: (1 Pet. 1:5); Jude 1
  - type: text
    content: keep
  - type: text
    content: ' through Your name those whom You have given Me,'
  - type: text
    content: ' that they may be one '
  - type: note
    content: John 10:30
  - type: text
    content: 'as We '
  - type: text
    content: are.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'While I was with them '
  - type: text
    content: in the world,
  - type: text
    content: ' '
  - type: note
    content: Heb. 2:13
  - type: text
    content: 'I kept them in '
  - type: text
    content: Your name. Those whom You gave Me I have kept;
  - type: text
    content: ' and '
  - type: note
    content: (John 6:39; 18:9); 1 John 2:19
  - type: text
    content: 'none of them is '
  - type: text
    content: 'lost '
  - type: note
    content: Matt. 27:4, 5; John 6:70; Acts 1:16–20
  - type: text
    content: 'except the son of '
  - type: text
    content: 'perdition, '
  - type: note
    content: Ps. 41:9; 109:8; John 13:18; Acts 1:20
  - type: text
    content: that the Scripture might be fulfilled.
  - type: text
    content: ' '
  '13':
  - type: text
    content: But now I come to You, and these things I speak in the world, that they may have My joy fulfilled in themselves.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'I have given them Your word; '
  - type: note
    content: Matt. 24:9; Luke 6:22; 21:17; John 15:19; 1 John 3:13
  - type: text
    content: 'and the world has hated them because they are not of the world, '
  - type: note
    content: John 8:23
  - type: text
    content: just as I am not of the world.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'I do not pray that You should take them out of the world, but '
  - type: note
    content: Matt. 6:13; Gal. 1:4; 2 Thess. 3:3; (2 Tim. 4:18); 2 Pet. 2:9; 1 John 5:18
  - type: text
    content: that You should keep them from the evil one.
  - type: text
    content: ' '
  '16':
  - type: text
    content: They are not of the world, just as I am not of the world.
  - type: text
    content: ' '
  '17':
  - type: note
    content: (Acts 15:9; Eph. 5:26; 1 Pet. 1:22)
  - type: text
    content: Sanctify
  - type: text
    content: ' them by Your truth. '
  - type: note
    content: Ps. 119:9, 142, 151
  - type: text
    content: Your word is truth.
  - type: text
    content: ' '
  '18':
  - type: note
    content: John 4:38; 20:21
  - type: text
    content: As You sent Me into the world, I also have sent them into the world.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And '
  - type: note
    content: 1 Cor. 1:2; 1 Thess. 4:7; (Heb. 10:10)
  - type: text
    content: for their sakes I sanctify Myself, that they also may be sanctified by the truth.
  - type: heading
    content: Jesus Prays for All Believers
  '2':
  - type: note
    content: Dan. 7:14; Matt. 11:27; John 3:35; (Phil. 2:10; Heb. 2:8)
  - type: text
    content: 'as You have given Him authority over all flesh, that He '
  - type: text
    content: should
  - type: text
    content: ' give eternal life to as many '
  - type: note
    content: John 6:37, 39; 17:6, 9, 24
  - type: text
    content: as You have given Him.
  - type: text
    content: ' '
  '20':
  - type: text
    content: '“I do not pray for these alone, but also for those who '
  - type: text
    content: will
  - type: text
    content: ' believe in Me through their word;'
  - type: text
    content: ' '
  '21':
  - type: note
    content: (John 10:16; Rom. 12:5; Gal. 3:28); Eph. 4:4, 6
  - type: text
    content: 'that they all may be one, as '
  - type: note
    content: John 10:38; 17:11, 23
  - type: text
    content: 'You, Father, '
  - type: text
    content: are
  - type: text
    content: ' in Me, and I in You; that they also may be one in Us, that the world may believe that You sent Me.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And the '
  - type: note
    content: John 14:20; 1 John 1:3
  - type: text
    content: 'glory which You gave Me I have given them, '
  - type: note
    content: (2 Cor. 3:18)
  - type: text
    content: 'that they may be one just as We are one:'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'I in them, and You in Me; '
  - type: note
    content: (Col. 3:14)
  - type: text
    content: that they may be made perfect in one, and that the world may know that You have sent Me, and have loved them as You have loved Me.
  '24':
  - type: note
    content: (John 12:26; 14:3; 1 Thess. 4:17)
  - type: text
    content: '“Father, I desire that they also whom You gave Me may be with Me where I am, that they may behold My glory which You have given Me; '
  - type: note
    content: Matt. 25:34; John 17:5
  - type: text
    content: for You loved Me before the foundation of the world.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'O righteous Father! '
  - type: note
    content: John 15:21
  - type: text
    content: 'The world has not known You, but '
  - type: note
    content: John 7:29; 8:55; 10:15
  - type: text
    content: 'I have known You; and '
  - type: note
    content: John 3:17; 17:3, 8, 18, 21, 23
  - type: text
    content: these have known that You sent Me.
  - type: text
    content: ' '
  '26':
  - type: note
    content: Ex. 34:5–7; John 17:6
  - type: text
    content: 'And I have declared to them Your name, and will declare '
  - type: text
    content: it,
  - type: text
    content: ' that the love '
  - type: note
    content: John 15:9; (Eph. 3:17–19)
  - type: text
    content: with which You loved Me may be in them, and I in them.”
  '3':
  - type: text
    content: 'And '
  - type: note
    content: (Is. 53:11); Jer. 9:23, 24
  - type: text
    content: 'this is eternal life, that they may know You, '
  - type: note
    content: 1 Cor. 8:4; 1 Thess. 1:9
  - type: text
    content: 'the only true God, and Jesus Christ '
  - type: note
    content: John 3:34
  - type: text
    content: whom You have sent.
  - type: text
    content: ' '
  '4':
  - type: note
    content: John 13:31
  - type: text
    content: 'I have glorified You on the earth. '
  - type: note
    content: (Dan. 9:24); John 4:34; 19:30
  - type: text
    content: 'I have finished the work '
  - type: note
    content: Is. 49:3; 50:5; John 14:31
  - type: text
    content: which You have given Me to do.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And now, O Father, glorify Me together '
  - type: text
    content: 'with Yourself, with the glory '
  - type: note
    content: Prov. 8:22–30; John 1:1, 2; Phil. 2:6; Col. 1:15; Heb. 1:3
  - type: text
    content: which I had with You before the world was.
  - type: heading
    content: Jesus Prays for His Disciples
  '6':
  - type: note
    content: Ps. 22:22
  - type: text
    content: '“I have '
  - type: text
    content: 'manifested Your name to the men '
  - type: note
    content: John 6:37
  - type: text
    content: 'whom You have given Me out of the world. '
  - type: note
    content: Ezek. 18:4; Rom. 14:8
  - type: text
    content: They were Yours, You gave them to Me, and they have kept Your word.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Now they have known that all things which You have given Me are from You.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'For I have given to them the words '
  - type: note
    content: John 8:28
  - type: text
    content: 'which You have given Me; and they have received '
  - type: text
    content: them,
  - type: text
    content: ' '
  - type: note
    content: John 8:42; 16:27, 30
  - type: text
    content: 'and have known surely that I came forth from You; and they have believed that '
  - type: note
    content: Deut. 18:15, 18
  - type: text
    content: You sent Me.
  '9':
  - type: text
    content: '“I pray for them. '
  - type: note
    content: (1 John 5:19)
  - type: text
    content: I do not pray for the world but for those whom You have given Me, for they are Yours.
  - type: text
    content: ' '
