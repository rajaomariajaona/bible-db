  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it happened about this time, when Joseph went into the house to do his work, and none of the men of the house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' inside, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that she '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 7:13
      marker-yv: yv-n
    - type: text
      text: 'caught him by his garment, saying, “Lie with me.” But he left his garment in her hand, and fled and ran outside. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so it was, when she saw that he had left his garment in her hand and fled outside, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that she called to the men of her house and spoke to them, saying, “See, he has brought in to us a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:13; 41:12
      marker-yv: yv-n
    - type: text
      text: 'Hebrew to mock us. He came in to me to lie with me, and I cried out with a loud voice. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And it happened, when he heard that I lifted my voice and cried out, that he left his garment with me, and fled and went outside.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she kept his garment with her until his master came home. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she '
    - type: usfm
