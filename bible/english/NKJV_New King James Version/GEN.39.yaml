      marker-yv: yv-n
    - type: text
      text: 'spoke to him with words like these, saying, “The Hebrew servant whom you brought to us came in to me to mock me; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so it happened, as I lifted my voice and cried out, that he left his garment with me and fled outside.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it was, when his master heard the words which his wife spoke to him, saying, “Your servant did to me after this manner,” that his '
