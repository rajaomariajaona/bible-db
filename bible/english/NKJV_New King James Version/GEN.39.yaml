  - type: text
    content: “Lie with me.”
  '8':
  - type: text
    content: 'But he refused and said to his master’s wife, “Look, my master does not know what '
  - type: text
    content: is
  - type: text
    content: ' with me in the house, and he has committed all that he has to my hand. '
  '9':
  - type: text
    content: There
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' no one greater in this house than I, nor has he kept back anything from me but you, because you '
  - type: text
    content: are
  - type: text
    content: ' his wife. '
  - type: note
    content: Lev. 20:10; Prov. 6:29, 32
  - type: text
