  '1':
  - type: heading
    content: Joseph a Slave in Egypt
  - type: text
    content: 'Now Joseph had been taken '
  - type: note
    content: Gen. 12:10; 43:15
  - type: text
    content: 'down to Egypt. And '
  - type: note
    content: Gen. 37:36; Ps. 105:17
  - type: text
    content: 'Potiphar, an officer of Pharaoh, captain of the guard, an Egyptian, '
  - type: note
    content: Gen. 37:28; 45:4
  - type: text
    content: 'bought him from the Ishmaelites who had taken him down there. '
  '10':
  - type: text
    content: 'So it was, as she spoke to Joseph day by day, that he '
  - type: note
    content: Prov. 1:10
  - type: text
    content: 'did not heed her, to lie with her '
  - type: text
    content: or
  - type: text
    content: ' to be with her.'
  '11':
  - type: text
    content: 'But it happened about this time, when Joseph went into the house to do his work, and none of the men of the house '
  - type: text
    content: was
  - type: text
    content: ' inside, '
  '12':
  - type: text
    content: 'that she '
  - type: note
    content: Prov. 7:13
  - type: text
    content: 'caught him by his garment, saying, “Lie with me.” But he left his garment in her hand, and fled and ran outside. '
  '13':
  - type: text
    content: 'And so it was, when she saw that he had left his garment in her hand and fled outside, '
  '14':
  - type: text
    content: 'that she called to the men of her house and spoke to them, saying, “See, he has brought in to us a '
  - type: note
    content: Gen. 14:13; 41:12
  - type: text
    content: 'Hebrew to mock us. He came in to me to lie with me, and I cried out with a loud voice. '
  '15':
  - type: text
    content: And it happened, when he heard that I lifted my voice and cried out, that he left his garment with me, and fled and went outside.”
  '16':
  - type: text
    content: 'So she kept his garment with her until his master came home. '
  '17':
  - type: text
    content: 'Then she '
  - type: note
    content: Ex. 23:1; Ps. 120:3; Prov. 26:28
  - type: text
    content: 'spoke to him with words like these, saying, “The Hebrew servant whom you brought to us came in to me to mock me; '
  '18':
  - type: text
    content: so it happened, as I lifted my voice and cried out, that he left his garment with me and fled outside.”
  '19':
  - type: text
    content: 'So it was, when his master heard the words which his wife spoke to him, saying, “Your servant did to me after this manner,” that his '
  - type: note
    content: Prov. 6:34, 35
  - type: text
    content: 'anger was aroused. '
  '2':
  - type: note
    content: Gen. 26:24, 28; 28:15; 35:3; 39:3, 21, 23; 1 Sam. 16:18; 18:14, 28; Acts 7:9
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' was with Joseph, and he was a successful man; and he was in the house of his master the Egyptian. '
  '20':
  - type: text
    content: 'Then Joseph’s master took him and '
  - type: note
    content: Ps. 105:18; (1 Pet. 2:19)
  - type: text
    content: 'put him into the '
  - type: note
    content: Gen. 40:3, 15; 41:14
  - type: text
    content: 'prison, a place where the king’s prisoners '
  - type: text
    content: were
  - type: text
    content: ' confined. And he was there in the prison. '
  '21':
  - type: text
    content: 'But the '
  - type: heading
    content: Lord
  - type: text
    content: ' was with Joseph and showed him mercy, and He '
  - type: note
    content: Gen. 39:2; Ex. 3:21; Ps. 105:19; (Prov. 16:7); Dan. 1:9; Acts 7:9, 10
  - type: text
    content: 'gave him favor in the sight of the keeper of the prison. '
  '22':
  - type: text
    content: 'And the keeper of the prison '
  - type: note
    content: Gen. 39:4; 40:3, 4
  - type: text
    content: 'committed to Joseph’s hand all the prisoners who '
  - type: text
    content: were
  - type: text
    content: ' in the prison; whatever they did there, it was his doing. '
  '23':
  - type: text
    content: 'The keeper of the prison did not look into anything '
  - type: text
