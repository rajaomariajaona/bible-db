  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he refused and said to his master’s wife, “Look, my master does not know what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' with me in the house, and he has committed all that he has to my hand. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
