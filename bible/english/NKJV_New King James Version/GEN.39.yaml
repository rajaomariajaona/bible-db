  - type: text
    content: ' was on all that he had in the house and in the field. '
  '6':
  - type: text
    content: Thus he left all that he had in Joseph’s hand, and he did not know what he had except for the bread which he ate.
  - type: text
    content: 'Now Joseph '
  - type: note
    content: Gen. 29:17; 1 Sam. 16:12
  - type: text
    content: was handsome in form and appearance.
  '7':
  - type: text
    content: 'And it came to pass after these things that his master’s wife cast longing eyes on Joseph, and she said, '
  - type: note
