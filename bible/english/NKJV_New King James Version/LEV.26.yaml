document_id: LEV.26,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Promise of Blessing and Retribution
  - type: text
    content: '‘You shall '
  - type: note
    content: Ex. 20:4, 5; Deut. 4:15–18; 5:8
  - type: text
    content: not make idols for yourselves;
  - type: text
    content: neither a carved image nor a sacred pillar shall you rear up for yourselves;
  - type: text
    content: nor shall you set up an engraved stone in your land, to bow down to it;
  - type: text
    content: 'for I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.'
  '10':
  - type: text
    content: 'You shall eat the '
  - type: note
    content: Lev. 25:22
  - type: text
    content: old harvest, and clear out the old because of the new.
  '11':
  - type: note
    content: Ex. 25:8; 29:45, 46; Josh. 22:19; Ps. 76:2; Ezek. 37:26; Rev. 21:3
  - type: text
    content: I will set My tabernacle among you, and My soul shall not abhor you.
  '12':
  - type: note
    content: Deut. 23:14; (2 Cor. 6:16)
  - type: text
    content: I will walk among you and be your God, and you shall be My people.
  '13':
  - type: text
    content: 'I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, who brought you out of the land of Egypt, that you should not be their slaves;'
  - type: text
    content: 'I have broken the bands of your '
  - type: note
    content: Gen. 27:40
  - type: text
    content: yoke and made you walk upright.
  '14':
  - type: text
    content: ‘But if you do not obey Me, and do not observe all these commandments,
  '15':
  - type: text
    content: and if you despise My statutes, or if your soul abhors My judgments, so that you do not perform all My commandments, but break My covenant,
  '16':
  - type: text
    content: 'I also will do this to you:'
  - type: text
    content: 'I will even appoint terror over you, '
  - type: note
    content: Deut. 28:22
  - type: text
    content: 'wasting disease and fever which shall '
  - type: note
    content: 1 Sam. 2:33
  - type: text
    content: 'consume the eyes and '
  - type: note
    content: Ezek. 24:23; 33:10
  - type: text
    content: cause sorrow of heart.
  - type: text
    content: 'And '
  - type: note
    content: Judg. 6:3–6; Job 31:8; Mic. 6:15
  - type: text
    content: you shall sow your seed in vain, for your enemies shall eat it.
  '17':
  - type: text
    content: 'I will set '
  - type: note
    content: Ps. 34:16
  - type: text
    content: 'My face against you, and '
  - type: note
    content: Deut. 28:25; 1 Sam. 4:10; 31:1
  - type: text
    content: you shall be defeated by your enemies.
  - type: note
    content: Ps. 106:41
  - type: text
    content: 'Those who hate you shall reign over you, and you shall '
  - type: note
    content: Prov. 28:1
  - type: text
    content: flee when no one pursues you.
  '18':
  - type: text
    content: '‘And after all this, if you do not obey Me, then I will punish you '
  - type: note
    content: 1 Sam. 2:5
  - type: text
    content: seven times more for your sins.
  '19':
  - type: text
    content: 'I will '
  - type: note
    content: Is. 25:11
  - type: text
    content: break the pride of your power;
  - type: text
    content: 'I '
  - type: note
    content: Deut. 28:23
  - type: text
    content: will make your heavens like iron and your earth like bronze.
  '2':
  - type: note
    content: Lev. 19:30
  - type: text
    content: 'You shall keep My Sabbaths and reverence My sanctuary:'
  - type: text
    content: 'I am the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '20':
  - type: text
    content: 'And your '
  - type: note
    content: Ps. 127:1; Is. 17:10, 11; 49:4; Jer. 12:13
  - type: text
    content: strength shall be spent in vain;
  - type: text
    content: 'for your '
  - type: note
    content: Gen. 4:12; Deut. 11:17
  - type: text
    content: land shall not yield its produce, nor shall the trees of the land yield their fruit.
  '21':
  - type: text
    content: ‘Then, if you walk contrary to Me, and are not willing to obey Me, I will bring on you seven times more plagues, according to your sins.
  '22':
  - type: note
    content: Deut. 32:24; Ezek. 14:21
  - type: text
    content: I will also send wild beasts among you, which shall rob you of your children, destroy your livestock, and make you few in number;
  - type: text
    content: 'and '
  - type: note
    content: Judg. 5:6; 2 Chr. 15:5; Zech. 7:14
  - type: text
    content: your highways shall be desolate.
  '23':
  - type: text
    content: '‘And if '
  - type: note
    content: Jer. 2:30; Amos 4:6–12
  - type: text
    content: by these things you are not reformed by Me, but walk contrary to Me,
  '24':
  - type: note
    content: Lev. 26:28, 41; Ps. 18:26
  - type: text
    content: then I also will walk contrary to you, and I will punish you yet seven times for your sins.
  '25':
  - type: text
    content: 'And '
  - type: note
    content: Ezek. 5:17
  - type: text
    content: I will bring a sword against you that will execute the vengeance of the covenant;
  - type: text
    content: 'when you are gathered together within your cities '
  - type: note
    content: Num. 16:49; Deut. 28:21; 2 Sam. 24:15
  - type: text
    content: I will send pestilence among you;
  - type: text
    content: and you shall be delivered into the hand of the enemy.
  '26':
  - type: note
    content: Ps. 105:16; Is. 3:1; Ezek. 4:16, 17; 5:16
  - type: text
    content: 'When I have cut off your supply of bread, ten women shall bake your bread in one oven, and they shall bring back your bread by weight, '
  - type: note
    content: Mic. 6:14; Hag. 1:6
  - type: text
    content: and you shall eat and not be satisfied.
  '27':
  - type: text
    content: ‘And after all this, if you do not obey Me, but walk contrary to Me,
  '28':
  - type: text
    content: then I also will walk contrary to you in fury;
  - type: text
    content: and I, even I, will chastise you seven times for your sins.
  '29':
  - type: note
    content: Deut. 28:53; 2 Kin. 6:28, 29
  - type: text
    content: You shall eat the flesh of your sons, and you shall eat the flesh of your daughters.
  '3':
  - type: note
    content: Deut. 28:1–14
  - type: text
    content: ‘If you walk in My statutes and keep My commandments, and perform them,
  '30':
  - type: note
    content: 1 Kin. 13:2; 2 Chr. 34:3; Is. 27:9; Ezek. 6:3–6, 13
  - type: text
    content: I will destroy your high places, cut down your incense altars, and cast your carcasses on the lifeless forms of your idols;
  - type: text
    content: and My soul shall abhor you.
  '31':
  - type: text
    content: 'I will lay your '
  - type: note
    content: 2 Kin. 25:4, 10
  - type: text
    content: 'cities waste and '
  - type: note
    content: 2 Chr. 36:19; Ps. 74:7
  - type: text
    content: 'bring your sanctuaries to desolation, and I will not '
  - type: note
    content: Is. 1:11–15
  - type: text
    content: smell the fragrance of your sweet aromas.
  '32':
  - type: note
    content: Jer. 9:11; 18:16
  - type: text
    content: I will bring the land to desolation, and your enemies who dwell in it shall be astonished at it.
  '33':
  - type: note
    content: Deut. 4:27; Ps. 44:11; Ezek. 12:15; 20:23; 22:15; Zech. 7:14
  - type: text
    content: I will scatter you among the nations and draw out a sword after you;
  - type: text
    content: your land shall be desolate and your cities waste.
  '34':
  - type: note
    content: Lev. 26:43; 2 Chr. 36:21
  - type: text
    content: Then the land shall enjoy its sabbaths as long as it lies desolate and you are in your enemies’ land;
  - type: text
    content: then the land shall rest and enjoy its sabbaths.
  '35':
  - type: text
    content: As long as it lies desolate it shall rest—
  - type: text
    content: 'for the time it did not rest on your '
  - type: note
    content: Lev. 25:2
  - type: text
    content: sabbaths when you dwelt in it.
  '36':
  - type: text
    content: '‘And as for those of you who are left, I will send '
  - type: note
    content: Is. 30:17; Lam. 1:3, 6; 4:19; Ezek. 21:7, 12, 15
  - type: text
    content: faintness into their hearts in the lands of their enemies;
  - type: text
    content: the sound of a shaken leaf shall cause them to flee;
  - type: text
    content: they shall flee as though fleeing from a sword, and they shall fall when no one pursues.
  '37':
  - type: note
    content: Judg. 7:22; 1 Sam. 14:15, 16; Is. 10:4
  - type: text
    content: They shall stumble over one another, as it were before a sword, when no one pursues;
  - type: text
    content: 'and '
  - type: note
    content: Josh. 7:12, 13; Judg. 2:14
  - type: text
    content: you shall have no power to stand before your enemies.
  '38':
  - type: text
    content: 'You shall '
  - type: note
    content: Deut. 4:26
  - type: text
    content: perish among the nations, and the land of your enemies shall eat you up.
  '39':
  - type: text
    content: 'And those of you who are left '
  - type: note
    content: Deut. 28:65; Ezek. 4:17; 33:10; Zech. 10:9
  - type: text
    content: shall waste away in their iniquity in your enemies’ lands;
  - type: text
    content: 'also in their '
  - type: note
    content: Ex. 34:7
  - type: text
    content: fathers’ iniquities, which are with them, they shall waste away.
  '4':
  - type: note
    content: Is. 30:23
  - type: text
    content: 'then I will give you rain in its season, '
  - type: note
    content: Ps. 67:6
  - type: text
    content: the land shall yield its produce, and the trees of the field shall yield their fruit.
  '40':
  - type: text
    content: '‘But '
  - type: note
    content: Num. 5:7; 1 Kin. 8:33, 34; Neh. 9:2; Luke 15:18; (1 John 1:9)
  - type: text
    content: if they confess their iniquity and the iniquity of their fathers, with their unfaithfulness in which they were unfaithful to Me, and that they also have walked contrary to Me,
  '41':
  - type: text
    content: and that I also have walked contrary to them and have brought them into the land of their enemies;
  - type: text
    content: 'if their '
  - type: note
    content: Acts 7:51; Rom. 2:29
  - type: text
    content: 'uncircumcised hearts are '
  - type: note
    content: 2 Chr. 12:6, 7, 12; 1 Pet. 5:5, 6
  - type: text
    content: 'humbled, and they '
  - type: note
    content: Ps. 39:9; 51:3, 4; Dan. 9:7
  - type: text
    content: accept their guilt—
  '42':
  - type: text
    content: 'then I will '
  - type: note
    content: Ex. 2:24; 6:5; Ps. 106:45; Ezek. 16:60
  - type: text
    content: remember My covenant with Jacob, and My covenant with Isaac and My covenant with Abraham I will remember;
  - type: text
    content: 'I will '
  - type: note
    content: Ps. 136:23
  - type: text
    content: remember the land.
  '43':
  - type: note
    content: Lev. 26:34, 35
  - type: text
    content: The land also shall be left empty by them, and will enjoy its sabbaths while it lies desolate without them;
  - type: text
    content: 'they will accept their guilt, because they '
  - type: note
    content: Lev. 26:15
  - type: text
    content: despised My judgments and because their soul abhorred My statutes.
  '44':
  - type: text
    content: 'Yet for all that, when they are in the land of their enemies, '
  - type: note
    content: Deut. 4:31; 2 Kin. 13:23; Jer. 30:11; (Rom. 11:1–36)
  - type: text
    content: I will not cast them away, nor shall I abhor them, to utterly destroy them and break My covenant with them;
  - type: text
    content: 'for I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' their God.'
  '45':
  - type: text
    content: 'But '
  - type: note
    content: (Rom. 11:28)
  - type: text
    content: 'for their sake I will remember the covenant of their ancestors, '
  - type: note
    content: Lev. 22:33; 25:38
  - type: text
    content: 'whom I brought out of the land of Egypt '
  - type: note
    content: Ps. 98:2; Ezek. 20:9, 14, 22
  - type: text
    content: 'in the sight of the nations, that I might be their God:'
  - type: text
    content: 'I am the '
  - type: heading
    content: Lord
  - type: text
    content: .’ ”
  '46':
  - type: note
    content: Lev. 27:34; Deut. 6:1; 12:1; (John 1:17)
  - type: text
    content: 'These are the statutes and judgments and laws which the '
  - type: heading
    content: Lord
  - type: text
    content: ' made between Himself and the children of Israel '
  - type: note
    content: Lev. 25:1
  - type: text
    content: on Mount Sinai by the hand of Moses.
  '5':
  - type: note
    content: Deut. 11:15; Joel 2:19, 26; Amos 9:13
  - type: text
    content: Your threshing shall last till the time of vintage, and the vintage shall last till the time of sowing;
  - type: text
    content: 'you shall eat your bread to the full, and '
  - type: note
    content: Lev. 25:18, 19; Ezek. 34:25
  - type: text
    content: dwell in your land safely.
  '6':
  - type: note
    content: Is. 45:7
  - type: text
    content: 'I will give peace in the land, and '
  - type: note
    content: Job 11:19; Ps. 4:8; Zeph. 3:13
  - type: text
    content: you shall lie down, and none will make you afraid;
  - type: text
    content: 'I will rid the land of '
  - type: note
    content: 2 Kin. 17:25; Hos. 2:18
  - type: text
    content: evil beasts,
  - type: text
    content: 'and '
  - type: note
    content: Ezek. 14:17
  - type: text
    content: the sword will not go through your land.
  '7':
  - type: text
    content: You will chase your enemies, and they shall fall by the sword before you.
  '8':
  - type: note
    content: Deut. 32:30; Judg. 7:7–12
  - type: text
    content: Five of you shall chase a hundred, and a hundred of you shall put ten thousand to flight;
  - type: text
    content: your enemies shall fall by the sword before you.
  '9':
  - type: text
    content: '‘For I will '
  - type: note
    content: Ex. 2:25; 2 Kin. 13:23
  - type: text
    content: 'look on you favorably and '
  - type: note
    content: Gen. 17:6, 7; Ps. 107:38
  - type: text
    content: 'make you fruitful, multiply you and confirm My '
  - type: note
    content: Gen. 17:1–7
  - type: text
    content: covenant with you.
