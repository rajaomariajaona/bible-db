  - type: note
    content: 2 Kin. 17:16; Jer. 7:18
  - type: text
    content: 'queen of heaven and pour out drink offerings to her, as we have done, we and our fathers, our kings and our princes, in the cities of Judah and in the streets of Jerusalem. For '
  - type: text
    content: then
  - type: text
    content: ' we had plenty of food, were well-off, and saw no trouble. '
  '18':
  - type: text
    content: But since we stopped burning incense to the queen of heaven and pouring out drink offerings to her, we have lacked everything and have been consumed by the sword and by famine.”
