  - type: note
    content: Is. 65:15; Jer. 42:18
  - type: text
    content: 'they shall be an oath, an astonishment, a curse and a reproach! '
  '13':
  - type: note
    content: Jer. 43:11
  - type: text
    content: 'For I will punish those who dwell in the land of Egypt, as I have punished Jerusalem, by the sword, by famine, and by pestilence, '
  '14':
  - type: text
    content: 'so that none of the remnant of Judah who have gone into the land of Egypt to dwell there shall escape or survive, lest they return to the land of Judah, to which they '
  - type: note
