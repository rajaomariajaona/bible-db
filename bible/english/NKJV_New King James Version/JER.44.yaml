  - type: text
    content: 'desire to return and dwell. For '
  - type: note
    content: (Is. 4:2; 10:20); Jer. 44:28; (Rom. 9:27)
  - type: text
    content: none shall return except those who escape.’ ”
  '15':
  - type: text
    content: 'Then all the men who knew that their wives had burned incense to other gods, with all the women who stood by, a great multitude, and all the people who dwelt in the land of Egypt, in Pathros, answered Jeremiah, saying: '
