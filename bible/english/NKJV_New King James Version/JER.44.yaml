  - type: text
    content: ' this day.”'
  '24':
  - type: text
    content: 'Moreover Jeremiah said to all the people and to all the women, “Hear the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', all Judah who '
  - type: text
    content: are
  - type: text
    content: ' in the land of Egypt! '
  '25':
  - type: text
    content: 'Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel, saying: ‘You and your wives have spoken with your mouths and fulfilled with your hands, saying, “We will surely keep our vows that we have made, to burn incense to the queen of heaven and pour out drink offerings to her.” You will surely keep your vows and perform your vows!’ '
  '26':
  - type: text
    content: 'Therefore hear the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', all Judah who dwell in the land of Egypt: ‘Behold, '
  - type: note
    content: Gen. 22:16; Deut. 32:40, 41; Jer. 22:5; Amos 6:8; Heb. 6:13
  - type: text
    content: 'I have sworn by My '
  - type: note
    content: Jer. 10:6
  - type: text
    content: 'great name,’ says the '
  - type: heading
    content: Lord
  - type: text
    content: ', ‘that '
  - type: note
    content: Neh. 9:5; Ps. 50:16; Ezek. 20:39
  - type: text
    content: 'My name shall no more be named in the mouth of any man of Judah in all the land of Egypt, saying, “The Lord '
  - type: heading
    content: God
  - type: text
    content: ' lives.” '
  '27':
  - type: text
    content: 'Behold, I will watch over them for adversity and not for good. And all the men of Judah who '
  - type: text
    content: are
  - type: text
    content: ' in the land of Egypt '
  - type: note
    content: Jer. 1:10; 31:28; Ezek. 7:6
  - type: text
    content: 'shall be consumed by the sword and by famine, until there is an end to them. '
  '28':
  - type: text
    content: 'Yet '
  - type: note
    content: Is. 10:19; 27:12, 13
  - type: text
    content: 'a small number who escape the sword shall return from the land of Egypt to the land of Judah; and all the remnant of Judah, who have gone to the land of Egypt to dwell there, shall know whose words will stand, Mine or theirs. '
  '29':
  - type: text
    content: 'And this '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' a sign to you,’ says the '
  - type: heading
    content: Lord
  - type: text
    content: ', ‘that I will punish you in this place, that you may know that My words will surely '
  - type: note
    content: (Ps. 33:11)
  - type: text
    content: stand against you for adversity.’
  '3':
  - type: text
    content: 'because of their wickedness which they have committed to provoke Me to anger, in that they went '
  - type: note
    content: Jer. 19:4
  - type: text
    content: 'to burn incense '
  - type: text
    content: and
  - type: text
    content: ' to '
  - type: note
    content: Deut. 13:6; 32:17
  - type: text
    content: 'serve other gods whom they did not know, they nor you nor your fathers. '
  '30':
  - type: text
    content: '“Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘Behold, '
  - type: note
    content: Jer. 46:25, 26; Ezek. 29:3; 30:21
  - type: text
    content: 'I will give Pharaoh Hophra king of Egypt into the hand of his enemies and into the hand of those who seek his life, as I gave '
  - type: note
    content: 2 Kin. 25:4–7; Jer. 39:5
  - type: text
    content: Zedekiah king of Judah into the hand of Nebuchadnezzar king of Babylon, his enemy who sought his life.’ ”
  '4':
  - type: text
    content: 'However '
  - type: note
    content: 2 Chr. 36:15; Jer. 7:25; 25:4; 26:5; 29:19; Zech. 7:7
  - type: text
    content: 'I have sent to you all My servants the prophets, rising early and sending '
  - type: text
    content: them,
  - type: text
    content: ' saying, “Oh, do not do this abominable thing that I hate!” '
  '5':
  - type: text
    content: 'But they did not listen or incline their ear to turn from their wickedness, to burn no incense to other gods. '
  '6':
  - type: text
    content: 'So My fury and My anger were poured out and kindled in the cities of Judah and in the streets of Jerusalem; and they are wasted '
  - type: text
    content: and
  - type: text
    content: ' desolate, as it is this day.’'
  '7':
  - type: text
    content: '“Now therefore, thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ', the God of hosts, the God of Israel: ‘Why do you commit '
  - type: text
    content: this
  - type: text
    content: ' great evil '
  - type: note
    content: Num. 16:38; Jer. 7:19; (Ezek. 33:11); Hab. 2:10
  - type: text
    content: 'against yourselves, to cut off from you man and woman, child and infant, out of Judah, leaving none to remain, '
  '8':
  - type: text
    content: 'in that you '
  - type: note
    content: 2 Kin. 17:15–17; Jer. 25:6, 7; 44:3; 1 Cor. 10:21, 22
  - type: text
    content: 'provoke Me to wrath with the works of your hands, burning incense to other gods in the land of Egypt where you have gone to dwell, that you may cut yourselves off and be '
  - type: note
    content: 1 Kin. 9:7, 8; 2 Chr. 7:20; Jer. 42:18
  - type: text
    content: 'a curse and a reproach among all the nations of the earth? '
  '9':
  - type: text
    content: 'Have you forgotten the wickedness of your fathers, the wickedness of the kings of Judah, the wickedness of their wives, your own wickedness, and the wickedness of your wives, which they committed in the land of Judah and in the streets of Jerusalem? '
