  '11':
  - type: text
    content: '“Therefore thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: ‘Behold, '
  - type: note
    content: Lev. 17:10; 20:5, 6; Jer. 21:10; Amos 9:4
  - type: text
    content: 'I will set My face against you for catastrophe and for cutting off all Judah. '
  '12':
  - type: text
    content: 'And I will take the remnant of Judah who have set their faces to go into the land of Egypt to dwell there, and '
  - type: note
