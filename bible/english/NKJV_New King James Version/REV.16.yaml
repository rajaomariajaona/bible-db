document_id: REV.16,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then I heard a loud voice from the temple saying '
  - type: note
    content: Rev. 15:1
  - type: text
    content: 'to the seven angels, “Go and pour out the bowls '
  - type: note
    content: Rev. 14:10
  - type: text
    content: of the wrath of God on the earth.”
  - type: heading
    content: 'First Bowl: Loathsome Sores'
  '10':
  - type: text
    content: 'Then the fifth angel poured out his bowl '
  - type: note
    content: Rev. 13:2
  - type: text
    content: 'on the throne of the beast, '
  - type: note
    content: Ex. 10:21; Is. 8:22; Rev. 8:12; 9:2
  - type: text
    content: 'and his kingdom became full of darkness; '
  - type: note
    content: Rev. 11:10
  - type: text
    content: 'and they gnawed their tongues because of the pain. '
  '11':
  - type: text
    content: They blasphemed the God of heaven because of their pains and their sores, and did not repent of their deeds.
  - type: heading
    content: 'Sixth Bowl: Euphrates Dried Up'
  '12':
  - type: text
    content: 'Then the sixth angel poured out his bowl '
  - type: note
    content: Rev. 9:14
  - type: text
    content: 'on the great river Euphrates, '
  - type: note
    content: Jer. 50:38
  - type: text
    content: 'and its water was dried up, '
  - type: note
    content: Is. 41:2, 25; 46:11
  - type: text
    content: 'so that the way of the kings from the east might be prepared. '
  '13':
  - type: text
    content: 'And I saw three unclean '
  - type: note
    content: 1 John 4:1
  - type: text
    content: 'spirits like frogs '
  - type: text
    content: coming
  - type: text
    content: ' out of the mouth of '
  - type: note
    content: Rev. 12:3, 9
  - type: text
    content: 'the dragon, out of the mouth of the beast, and out of the mouth of '
  - type: note
    content: Rev. 13:11, 14; 19:20; 20:10
  - type: text
    content: 'the false prophet. '
  '14':
  - type: text
    content: 'For they are spirits of demons, '
  - type: note
    content: 2 Thess. 2:9
  - type: text
    content: 'performing signs, '
  - type: text
    content: which
  - type: text
    content: ' go out to the kings of the earth and of '
  - type: note
    content: Luke 2:1
  - type: text
    content: 'the whole world, to gather them to '
  - type: note
    content: 1 Kin. 22:21–23; Rev. 17:14; 19:19; 20:8
  - type: text
    content: the battle of that great day of God Almighty.
  '15':
  - type: note
    content: Matt. 24:43; Luke 12:39; Rev. 3:3, 11
  - type: text
    content: '“Behold, I am coming as a thief. Blessed '
  - type: text
    content: is
  - type: text
    content: ' he who watches, and keeps his garments, '
  - type: note
    content: 2 Cor. 5:3
  - type: text
    content: lest he walk naked and they see his shame.”
  '16':
  - type: note
    content: Rev. 19:19
  - type: text
    content: And they gathered them together to the place called in Hebrew, Armageddon.
  - type: heading
    content: 'Seventh Bowl: The Earth Utterly Shaken'
  '17':
  - type: text
    content: 'Then the seventh angel poured out his bowl into the air, and a loud voice came out of the temple of heaven, from the throne, saying, '
  - type: note
    content: Rev. 10:6; 21:6
  - type: text
    content: '“It is done!” '
  '18':
  - type: text
    content: 'And '
  - type: note
    content: Rev. 4:5
  - type: text
    content: 'there were noises and thunderings and lightnings; '
  - type: note
    content: Rev. 11:13
  - type: text
    content: 'and there was a great earthquake, such a mighty and great earthquake '
  - type: note
    content: Dan. 12:1; Matt. 24:21
  - type: text
    content: 'as had not occurred since men were on the earth. '
  '19':
  - type: text
    content: 'Now '
  - type: note
    content: Rev. 14:8
  - type: text
    content: 'the great city was divided into three parts, and the cities of the nations fell. And '
  - type: note
    content: Rev. 17:5, 18
  - type: text
    content: 'great Babylon '
  - type: note
    content: Rev. 14:8; 18:5
  - type: text
    content: 'was remembered before God, '
  - type: note
    content: Is. 51:17; Rev. 14:10
  - type: text
    content: 'to give her the cup of the wine of the fierceness of His wrath. '
  '2':
  - type: text
    content: 'So the first went and poured out his bowl '
  - type: note
    content: Rev. 8:7
  - type: text
    content: 'upon the earth, and a foul and '
  - type: note
    content: Ex. 9:9–11; Deut. 28:35; Rev. 16:11
  - type: text
    content: 'loathsome sore came upon the men '
  - type: note
    content: Rev. 13:15–17; 14:9
  - type: text
    content: 'who had the mark of the beast and those '
  - type: note
    content: Rev. 13:14
  - type: text
    content: who worshiped his image.
  - type: heading
    content: 'Second Bowl: The Sea Turns to Blood'
  '20':
  - type: text
    content: 'Then '
  - type: note
    content: Rev. 6:14; 20:11
  - type: text
    content: 'every island fled away, and the mountains were not found. '
  '21':
  - type: text
    content: 'And great hail from heaven fell upon men, '
  - type: text
    content: each
  - type: text
    content: ' '
  - type: text
    content: hailstone
  - type: text
    content: ' about the weight of a talent. Men blasphemed God because of the plague of the hail, since that plague was exceedingly great.'
  '3':
  - type: text
    content: 'Then the second angel poured out his bowl '
  - type: note
    content: Rev. 8:8; 11:6
  - type: text
    content: 'on the sea, and '
  - type: note
    content: Ex. 7:17–21
  - type: text
    content: 'it became blood as of a dead '
  - type: text
    content: man;
  - type: text
    content: ' '
  - type: note
    content: Rev. 8:9
  - type: text
    content: and every living creature in the sea died.
  - type: heading
    content: 'Third Bowl: The Waters Turn to Blood'
  '4':
  - type: text
    content: 'Then the third angel poured out his bowl '
  - type: note
    content: Rev. 8:10
  - type: text
    content: 'on the rivers and springs of water, '
  - type: note
    content: Ex. 7:17–20; Ps. 78:44; Rev. 11:6
  - type: text
    content: 'and they became blood. '
  '5':
  - type: text
    content: 'And I heard the angel of the waters saying:'
  - type: note
    content: Rev. 15:3, 4
  - type: text
    content: “You are righteous, O Lord,
  - type: text
    content: 'The One '
  - type: note
    content: Rev. 1:4, 8
  - type: text
    content: who is and who was and who is to be,
  - type: text
    content: Because You have judged these things.
  '6':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 23:34
  - type: text
    content: 'they have shed the blood '
  - type: note
    content: Rev. 11:18
  - type: text
    content: of saints and prophets,
  - type: note
    content: Is. 49:26; Luke 11:49–51
  - type: text
    content: And You have given them blood to drink.
  - type: text
    content: For it is their just due.”
  '7':
  - type: text
    content: 'And I heard another from the altar saying, “Even so, '
  - type: note
    content: Rev. 15:3
  - type: text
    content: 'Lord God Almighty, '
  - type: note
    content: Rev. 13:10; 19:2
  - type: text
    content: 'true and righteous '
  - type: text
    content: are
  - type: text
    content: ' Your judgments.”'
  - type: heading
    content: 'Fourth Bowl: Men Are Scorched'
  '8':
  - type: text
    content: 'Then the fourth angel poured out his bowl '
  - type: note
    content: Rev. 8:12
  - type: text
    content: 'on the sun, '
  - type: note
    content: Rev. 9:17, 18
  - type: text
    content: 'and power was given to him to scorch men with fire. '
  '9':
  - type: text
    content: 'And men were scorched with great heat, and they '
  - type: note
    content: Rev. 16:11
  - type: text
    content: 'blasphemed the name of God who has power over these plagues; '
  - type: note
    content: Dan. 5:22
  - type: text
    content: 'and they did not repent '
  - type: note
    content: Rev. 11:13
  - type: text
    content: and give Him glory.
  - type: heading
    content: 'Fifth Bowl: Darkness and Pain'
