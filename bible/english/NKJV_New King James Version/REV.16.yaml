document_id: REV.16,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then I heard a loud voice from the temple saying '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 15:1
      marker-yv: yv-n
    - type: text
      text: 'to the seven angels, “Go and pour out the bowls '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 14:10
      marker-yv: yv-n
    - type: text
      text: of the wrath of God on the earth.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'First Bowl: Loathsome Sores'
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then the fifth angel poured out his bowl '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 13:2
      marker-yv: yv-n
    - type: text
      text: 'on the throne of the beast, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 10:21; Is. 8:22; Rev. 8:12; 9:2
      marker-yv: yv-n
    - type: text
      text: 'and his kingdom became full of darkness; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 11:10
      marker-yv: yv-n
    - type: text
      text: 'and they gnawed their tongues because of the pain. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They blasphemed the God of heaven because of their pains and their sores, and did not repent of their deeds.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Sixth Bowl: Euphrates Dried Up'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then the sixth angel poured out his bowl '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 9:14
      marker-yv: yv-n
    - type: text
      text: 'on the great river Euphrates, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 50:38
      marker-yv: yv-n
    - type: text
      text: 'and its water was dried up, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 41:2, 25; 46:11
      marker-yv: yv-n
    - type: text
      text: 'so that the way of the kings from the east might be prepared. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And I saw three unclean '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 John 4:1
      marker-yv: yv-n
    - type: text
      text: 'spirits like frogs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: coming
    - type: text
      text: ' out of the mouth of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 12:3, 9
      marker-yv: yv-n
    - type: text
      text: 'the dragon, out of the mouth of the beast, and out of the mouth of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 13:11, 14; 19:20; 20:10
      marker-yv: yv-n
    - type: text
      text: 'the false prophet. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For they are spirits of demons, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Thess. 2:9
      marker-yv: yv-n
    - type: text
      text: 'performing signs, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' go out to the kings of the earth and of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 2:1
      marker-yv: yv-n
    - type: text
      text: 'the whole world, to gather them to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 22:21–23; Rev. 17:14; 19:19; 20:8
      marker-yv: yv-n
    - type: text
      text: the battle of that great day of God Almighty.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 24:43; Luke 12:39; Rev. 3:3, 11
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Behold, I am coming as a thief. Blessed '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: is
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' he who watches, and keeps his garments, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 5:3
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: lest he walk naked and they see his shame.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 19:19
      marker-yv: yv-n
    - type: text
      text: And they gathered them together to the place called in Hebrew, Armageddon.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Seventh Bowl: The Earth Utterly Shaken'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then the seventh angel poured out his bowl into the air, and a loud voice came out of the temple of heaven, from the throne, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 10:6; 21:6
      marker-yv: yv-n
    - type: text
      text: '“It is done!” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:5
      marker-yv: yv-n
    - type: text
      text: 'there were noises and thunderings and lightnings; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 11:13
      marker-yv: yv-n
    - type: text
      text: 'and there was a great earthquake, such a mighty and great earthquake '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 12:1; Matt. 24:21
      marker-yv: yv-n
    - type: text
      text: 'as had not occurred since men were on the earth. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 14:8
      marker-yv: yv-n
    - type: text
      text: 'the great city was divided into three parts, and the cities of the nations fell. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 17:5, 18
      marker-yv: yv-n
    - type: text
      text: 'great Babylon '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 14:8; 18:5
      marker-yv: yv-n
    - type: text
      text: 'was remembered before God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 51:17; Rev. 14:10
      marker-yv: yv-n
    - type: text
      text: 'to give her the cup of the wine of the fierceness of His wrath. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So the first went and poured out his bowl '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 8:7
      marker-yv: yv-n
    - type: text
      text: 'upon the earth, and a foul and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 9:9–11; Deut. 28:35; Rev. 16:11
      marker-yv: yv-n
    - type: text
      text: 'loathsome sore came upon the men '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 13:15–17; 14:9
      marker-yv: yv-n
    - type: text
      text: 'who had the mark of the beast and those '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 13:14
      marker-yv: yv-n
    - type: text
      text: who worshiped his image.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Second Bowl: The Sea Turns to Blood'
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 6:14; 20:11
      marker-yv: yv-n
    - type: text
      text: 'every island fled away, and the mountains were not found. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And great hail from heaven fell upon men, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: each
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hailstone
    - type: text
      text: ' about the weight of a talent. Men blasphemed God because of the plague of the hail, since that plague was exceedingly great.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then the second angel poured out his bowl '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 8:8; 11:6
      marker-yv: yv-n
    - type: text
      text: 'on the sea, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 7:17–21
      marker-yv: yv-n
    - type: text
      text: 'it became blood as of a dead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 8:9
      marker-yv: yv-n
    - type: text
      text: and every living creature in the sea died.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Third Bowl: The Waters Turn to Blood'
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then the third angel poured out his bowl '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 8:10
      marker-yv: yv-n
    - type: text
      text: 'on the rivers and springs of water, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 7:17–20; Ps. 78:44; Rev. 11:6
      marker-yv: yv-n
    - type: text
      text: 'and they became blood. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And I heard the angel of the waters saying:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 15:3, 4
      marker-yv: yv-n
    - type: text
      text: “You are righteous, O Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The One '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 1:4, 8
      marker-yv: yv-n
    - type: text
      text: who is and who was and who is to be,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because You have judged these things.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 23:34
      marker-yv: yv-n
    - type: text
      text: 'they have shed the blood '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 11:18
      marker-yv: yv-n
    - type: text
      text: of saints and prophets,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 49:26; Luke 11:49–51
      marker-yv: yv-n
    - type: text
      text: And You have given them blood to drink.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For it is their just due.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And I heard another from the altar saying, “Even so, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 15:3
      marker-yv: yv-n
    - type: text
      text: 'Lord God Almighty, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 13:10; 19:2
      marker-yv: yv-n
    - type: text
      text: 'true and righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' Your judgments.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fourth Bowl: Men Are Scorched'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then the fourth angel poured out his bowl '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 8:12
      marker-yv: yv-n
    - type: text
      text: 'on the sun, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 9:17, 18
      marker-yv: yv-n
    - type: text
      text: 'and power was given to him to scorch men with fire. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And men were scorched with great heat, and they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 16:11
      marker-yv: yv-n
    - type: text
      text: 'blasphemed the name of God who has power over these plagues; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 5:22
      marker-yv: yv-n
    - type: text
      text: 'and they did not repent '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 11:13
      marker-yv: yv-n
    - type: text
      text: and give Him glory.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fifth Bowl: Darkness and Pain'
    marker-yv: yv-h
