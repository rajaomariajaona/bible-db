document_id: EZR.4,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Resistance to Rebuilding the Temple
  - type: text
    content: 'Now when '
  - type: note
    content: Ezra 4:7–9
  - type: text
    content: 'the adversaries of Judah and Benjamin heard that the descendants of the captivity were building the temple of the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel, '
  '10':
  - type: note
    content: 2 Kin. 17:24; Ezra 4:1
  - type: text
    content: and the rest of the nations whom the great and noble Osnapper took captive and settled in the cities of Samaria and the remainder beyond the River —
  - type: note
    content: Ezra 4:11, 17; 7:12
  - type: text
    content: and so forth.
  '11':
  - type: text
    content: '(This '
  - type: text
    content: is
  - type: text
    content: ' a copy of the letter that they sent him)'
  - type: text
    content: 'To King Artaxerxes from your servants, the men '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: region
  - type: text
    content: ' beyond the River, and so forth:'
  '12':
  - type: text
    content: 'Let it be known to the king that the Jews who came up from you have come to us at Jerusalem, and are building the '
  - type: note
    content: 2 Chr. 36:13
  - type: text
    content: 'rebellious and evil city, and are finishing '
  - type: text
    content: its
  - type: text
    content: ' '
  - type: note
    content: Ezra 5:3, 9
  - type: text
    content: 'walls and repairing the foundations. '
  '13':
  - type: text
    content: 'Let it now be known to the king that, if this city is built and the walls completed, they will not pay '
  - type: note
    content: Ezra 4:20; 7:24
  - type: text
    content: tax, tribute, or custom, and the king’s treasury will be diminished.
  '14':
  - type: text
    content: Now because we receive support from the palace, it was not proper for us to see the king’s dishonor; therefore we have sent and informed the king,
  '15':
  - type: text
    content: 'that search may be made in the book of the records of your fathers. And you will find in the book of the records and know that this city '
  - type: text
    content: is
  - type: text
    content: ' a rebellious city, harmful to kings and provinces, and that they have incited sedition within the city in former times, for which cause this city was destroyed.'
  '16':
  - type: text
    content: We inform the king that if this city is rebuilt and its walls are completed, the result will be that you will have no dominion beyond the River.
  '17':
  - type: text
    content: 'The king sent an answer:'
  - type: text
    content: 'To Rehum the commander, '
  - type: text
    content: to
  - type: text
    content: ' Shimshai the scribe, '
  - type: text
    content: to
  - type: text
    content: ' the rest of their companions who dwell in Samaria, and '
  - type: text
    content: to
  - type: text
    content: ' the remainder beyond the River:'
  - type: text
    content: Peace, and so forth.
  '18':
  - type: text
    content: 'The letter which you sent to us has been clearly read before me. '
  '19':
  - type: text
    content: And I gave the command, and a search has been made, and it was found that this city in former times has revolted against kings, and rebellion and sedition have been fostered in it.
  '2':
  - type: text
    content: 'they came to Zerubbabel and the heads of the fathers’ '
  - type: text
    content: houses,
  - type: text
    content: ' and said to them, “Let us build with you, for we seek your God as you '
  - type: text
    content: do;
  - type: text
    content: ' and we have sacrificed to Him '
  - type: note
    content: 2 Kin. 17:24; 19:37; Ezra 4:10
  - type: text
    content: 'since the days of Esarhaddon king of Assyria, who brought us here.” '
  '20':
  - type: text
    content: 'There have also been mighty kings over Jerusalem, who have '
  - type: note
    content: 1 Kin. 4:21; 1 Chr. 18:3; Ps. 72:8
  - type: text
    content: 'ruled over all '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: region
  - type: text
    content: ' '
  - type: note
    content: Gen. 15:18; Josh. 1:4
  - type: text
    content: beyond the River; and tax, tribute, and custom were paid to them.
  '21':
  - type: text
    content: Now give the command to make these men cease, that this city may not be built until the command is given by me.
  '22':
  - type: text
    content: Take heed now that you do not fail to do this. Why should damage increase to the hurt of the kings?
  '23':
  - type: text
    content: 'Now when the copy of King Artaxerxes’ letter '
  - type: text
    content: was
  - type: text
    content: ' read before Rehum, Shimshai the scribe, and their companions, they went up in haste to Jerusalem against the Jews, and by force of arms made them cease. '
  '24':
  - type: text
    content: 'Thus the work of the house of God which '
  - type: text
    content: is
  - type: text
    content: ' at Jerusalem ceased, and it was discontinued until the second year of the reign of Darius king of Persia.'
  '3':
  - type: text
    content: 'But Zerubbabel and Jeshua and the rest of the heads of the fathers’ '
  - type: text
    content: houses
  - type: text
    content: ' of Israel said to them, '
  - type: note
    content: Neh. 2:20
  - type: text
    content: '“You may do nothing with us to build a house for our God; but we alone will build to the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel, as '
  - type: note
    content: Ezra 1:1–4
  - type: text
    content: 'King Cyrus the king of Persia has commanded us.” '
  '4':
  - type: text
    content: 'Then '
  - type: note
    content: Ezra 3:3
  - type: text
    content: 'the people of the land tried to discourage the people of Judah. They troubled them in building, '
  '5':
  - type: text
    content: 'and hired counselors against them to frustrate their purpose all the days of Cyrus king of Persia, even until the reign of '
  - type: note
    content: Ezra 5:5; 6:1
  - type: text
    content: Darius king of Persia.
  - type: heading
    content: Rebuilding of Jerusalem Opposed
  '6':
  - type: text
    content: In the reign of Ahasuerus, in the beginning of his reign, they wrote an accusation against the inhabitants of Judah and Jerusalem.
  '7':
  - type: text
    content: 'In the days of '
  - type: note
    content: Ezra 7:1, 7, 21
  - type: text
    content: 'Artaxerxes also, Bishlam, Mithredath, Tabel, and the rest of their companions wrote to Artaxerxes king of Persia; and the letter '
  - type: text
    content: was
  - type: text
    content: ' written in '
  - type: note
    content: 2 Kin. 18:26
  - type: text
    content: 'Aramaic script, and translated into the Aramaic language. '
  '8':
  - type: text
    content: 'Rehum the commander and Shimshai the scribe wrote a letter against Jerusalem to King Artaxerxes in this fashion:'
  '9':
  - type: text
    content: From Rehum the commander, Shimshai the scribe, and the rest of their companions—
  - type: text
    content: representatives
  - type: text
    content: ' of '
  - type: note
    content: 2 Kin. 17:30, 31
  - type: text
    content: 'the Dinaites, the Apharsathchites, the Tarpelites, the people of Persia and Erech and Babylon and Shushan, the Dehavites, the Elamites, '
