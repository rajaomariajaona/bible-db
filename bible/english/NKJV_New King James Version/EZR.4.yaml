document_id: EZR.4,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Resistance to Rebuilding the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now when '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 4:7–9
      marker-yv: yv-n
    - type: text
      text: 'the adversaries of Judah and Benjamin heard that the descendants of the captivity were building the temple of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 17:24; Ezra 4:1
      marker-yv: yv-n
    - type: text
      text: and the rest of the nations whom the great and noble Osnapper took captive and settled in the cities of Samaria and the remainder beyond the River —
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 4:11, 17; 7:12
      marker-yv: yv-n
    - type: text
      text: and so forth.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '(This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a copy of the letter that they sent him)'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To King Artaxerxes from your servants, the men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: region
    - type: text
      text: ' beyond the River, and so forth:'
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Let it be known to the king that the Jews who came up from you have come to us at Jerusalem, and are building the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 36:13
      marker-yv: yv-n
    - type: text
      text: 'rebellious and evil city, and are finishing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: its
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 5:3, 9
      marker-yv: yv-n
    - type: text
      text: 'walls and repairing the foundations. '
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Let it now be known to the king that, if this city is built and the walls completed, they will not pay '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 4:20; 7:24
      marker-yv: yv-n
    - type: text
      text: tax, tribute, or custom, and the king’s treasury will be diminished.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Now because we receive support from the palace, it was not proper for us to see the king’s dishonor; therefore we have sent and informed the king,
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'that search may be made in the book of the records of your fathers. And you will find in the book of the records and know that this city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a rebellious city, harmful to kings and provinces, and that they have incited sedition within the city in former times, for which cause this city was destroyed.'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: We inform the king that if this city is rebuilt and its walls are completed, the result will be that you will have no dominion beyond the River.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The king sent an answer:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To Rehum the commander, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' Shimshai the scribe, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' the rest of their companions who dwell in Samaria, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' the remainder beyond the River:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Peace, and so forth.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The letter which you sent to us has been clearly read before me. '
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: And I gave the command, and a search has been made, and it was found that this city in former times has revolted against kings, and rebellion and sedition have been fostered in it.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'they came to Zerubbabel and the heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses,
    - type: text
      text: ' and said to them, “Let us build with you, for we seek your God as you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do;
    - type: text
      text: ' and we have sacrificed to Him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 17:24; 19:37; Ezra 4:10
      marker-yv: yv-n
    - type: text
      text: 'since the days of Esarhaddon king of Assyria, who brought us here.” '
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'There have also been mighty kings over Jerusalem, who have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 4:21; 1 Chr. 18:3; Ps. 72:8
      marker-yv: yv-n
    - type: text
      text: 'ruled over all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: region
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:18; Josh. 1:4
      marker-yv: yv-n
    - type: text
      text: beyond the River; and tax, tribute, and custom were paid to them.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Now give the command to make these men cease, that this city may not be built until the command is given by me.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Take heed now that you do not fail to do this. Why should damage increase to the hurt of the kings?
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Now when the copy of King Artaxerxes’ letter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' read before Rehum, Shimshai the scribe, and their companions, they went up in haste to Jerusalem against the Jews, and by force of arms made them cease. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Thus the work of the house of God which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' at Jerusalem ceased, and it was discontinued until the second year of the reign of Darius king of Persia.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But Zerubbabel and Jeshua and the rest of the heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses
    - type: text
      text: ' of Israel said to them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 2:20
      marker-yv: yv-n
    - type: text
      text: '“You may do nothing with us to build a house for our God; but we alone will build to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel, as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 1:1–4
      marker-yv: yv-n
    - type: text
      text: 'King Cyrus the king of Persia has commanded us.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 3:3
      marker-yv: yv-n
    - type: text
      text: 'the people of the land tried to discourage the people of Judah. They troubled them in building, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and hired counselors against them to frustrate their purpose all the days of Cyrus king of Persia, even until the reign of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 5:5; 6:1
      marker-yv: yv-n
    - type: text
      text: Darius king of Persia.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rebuilding of Jerusalem Opposed
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: In the reign of Ahasuerus, in the beginning of his reign, they wrote an accusation against the inhabitants of Judah and Jerusalem.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In the days of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 7:1, 7, 21
      marker-yv: yv-n
    - type: text
      text: 'Artaxerxes also, Bishlam, Mithredath, Tabel, and the rest of their companions wrote to Artaxerxes king of Persia; and the letter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' written in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 18:26
      marker-yv: yv-n
    - type: text
      text: 'Aramaic script, and translated into the Aramaic language. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Rehum the commander and Shimshai the scribe wrote a letter against Jerusalem to King Artaxerxes in this fashion:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: From Rehum the commander, Shimshai the scribe, and the rest of their companions—
    - type: usfm
      marker: it
      children:
      - type: text
        text: representatives
    - type: text
      text: ' of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 17:30, 31
      marker-yv: yv-n
    - type: text
      text: 'the Dinaites, the Apharsathchites, the Tarpelites, the people of Persia and Erech and Babylon and Shushan, the Dehavites, the Elamites, '
