  - type: heading
    content: Jesus Casts Out an Unclean Spirit
  '31':
  - type: text
    content: 'Then '
  - type: note
    content: Is. 9:1; Matt. 4:13; Mark 1:21
  - type: text
    content: 'He went down to Capernaum, a city of Galilee, and was teaching them on the Sabbaths. '
  '32':
  - type: text
    content: 'And they were '
  - type: note
    content: Matt. 7:28, 29
  - type: text
    content: 'astonished at His teaching, '
  - type: note
    content: Luke 4:36; (John 6:63; 7:46; 8:26, 28, 38, 47; 12:49, 50)
  - type: text
    content: 'for His word was with authority. '
  '33':
  - type: note
    content: Mark 1:23
  - type: text
    content: 'Now in the synagogue there was a man who had a spirit of an unclean demon. And he cried out with a loud voice, '
  '34':
  - type: text
    content: 'saying, “Let '
  - type: text
    content: us
  - type: text
    content: ' alone! What have we to do with You, Jesus of Nazareth? Did You come to destroy us? '
  - type: note
    content: Luke 4:41
  - type: text
    content: I know who You are—
  - type: note
    content: Ps. 16:10; Is. 49:7; Dan. 9:24; Luke 1:35
  - type: text
    content: the Holy One of God!”
  '35':
  - type: text
    content: 'But Jesus rebuked him, saying, '
  - type: text
    content: “Be quiet, and come out of him!”
  - type: text
    content: ' And when the demon had thrown him in '
  - type: text
    content: their
  - type: text
    content: ' midst, it came out of him and did not hurt him. '
  '36':
  - type: text
    content: 'Then they were all amazed and spoke among themselves, saying, “What a word this '
  - type: text
    content: is!
  - type: text
    content: ' For with authority and power He commands the unclean spirits, and they come out.” '
  '37':
  - type: text
    content: And the report about Him went out into every place in the surrounding region.
  - type: heading
    content: Peter’s Mother-in-Law Healed
  '38':
  - type: note
    content: Matt. 8:14, 15; Mark 1:29–31
  - type: text
    content: 'Now He arose from the synagogue and entered Simon’s house. But Simon’s wife’s mother was sick with a high fever, and they '
  - type: note
    content: Mark 5:23
  - type: text
    content: 'made request of Him concerning her. '
  '39':
  - type: text
    content: 'So He stood over her and '
  - type: note
    content: Luke 8:24
  - type: text
    content: rebuked the fever, and it left her. And immediately she arose and served them.
  - type: heading
    content: Many Healed After Sabbath Sunset
  '4':
  - type: text
    content: 'But Jesus answered him, saying, '
  - type: text
    content: '“It is written, '
  - type: note
    content: Deut. 8:3
  - type: text
    content: '‘Man shall not live by bread alone, '
  - type: text
    content: but by every word of God.’
  - type: text
    content: ' ”'
  '40':
  - type: note
    content: Matt. 8:16, 17; Mark 1:32–34
  - type: text
    content: 'When the sun was setting, all those who had any that were sick with various diseases brought them to Him; and He laid His hands on every one of them and healed them. '
  '41':
  - type: note
    content: Mark 1:34; 3:11; Acts 8:7
  - type: text
    content: 'And demons also came out of many, crying out and saying, '
  - type: note
    content: Mark 8:29
  - type: text
    content: “You are the Christ, the Son of God!”
  - type: text
    content: 'And He, '
  - type: note
    content: Mark 1:25, 34; 3:11; Luke 4:34, 35
  - type: text
    content: 'rebuking '
  - type: text
    content: them,
  - type: text
    content: ' did not allow them to speak, for they knew that He was the Christ.'
  - type: heading
    content: Jesus Preaches in Galilee
  '42':
  - type: note
    content: Mark 1:35–38; Luke 9:10
  - type: text
    content: 'Now when it was day, He departed and went into a deserted place. And the crowd sought Him and came to Him, and tried to keep Him from leaving them; '
  '43':
  - type: text
    content: 'but He said to them, '
  - type: text
    content: '“I must '
  - type: note
    content: Mark 1:14; (John 9:4)
  - type: text
    content: preach the kingdom of God to the other cities also, because for this purpose I have been sent.”
  - type: text
    content: ' '
  '44':
  - type: note
    content: Matt. 4:23; 9:35; Mark 1:39
  - type: text
    content: And He was preaching in the synagogues of Galilee.
  '5':
  - type: text
    content: 'Then the devil, taking Him up on a high mountain, showed Him all the kingdoms of the world in a moment of time. '
  '6':
  - type: text
    content: 'And the devil said to Him, “All this authority I will give You, and their glory; for '
  - type: note
    content: (John 12:31; 14:30; Rev. 13:2, 7)
  - type: text
    content: this
  - type: text
    content: ' has been delivered to me, and I give it to whomever I wish. '
  '7':
  - type: text
    content: Therefore, if You will worship before me, all will be Yours.”
  '8':
  - type: text
    content: 'And Jesus answered and said to him, '
  - type: text
    content: “Get behind Me, Satan!
  - type: text
    content: ' '
  - type: text
    content: For
  - type: text
    content: ' it is written, '
  - type: note
    content: Deut. 6:13; 10:20; Matt. 4:10
  - type: text
    content: '‘You shall worship the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, and Him only you shall serve.’'
  - type: text
    content: ' '
  - type: text
    content: ”
  '9':
  - type: note
    content: Matt. 4:5–7
  - type: text
    content: 'Then he brought Him to Jerusalem, set Him on the pinnacle of the temple, and said to Him, “If You are the Son of God, throw Yourself down from here. '
