document_id: PSA.82,114
type_code: eng
verses:
  '1':
  - type: heading
    content: A Plea for Justice
  - type: text
    content: A Psalm of Asaph.
  - type: text
    content: 'God '
  - type: note
    content: (2 Chr. 19:6; Eccl. 5:8)
  - type: text
    content: stands in the congregation of the mighty;
  - type: text
    content: 'He judges among '
  - type: note
    content: Ps. 82:6
  - type: text
    content: the gods.
  '2':
  - type: text
    content: How long will you judge unjustly,
  - type: text
    content: 'And '
  - type: note
    content: (Deut. 1:17); Prov. 18:5
  - type: text
    content: show partiality to the wicked?
  - type: text
    content: Selah
  '3':
  - type: text
    content: Defend the poor and fatherless;
  - type: text
    content: 'Do justice to the afflicted and '
  - type: note
    content: (Deut. 24:17; Is. 11:4; Jer. 22:16)
  - type: text
    content: needy.
  '4':
  - type: text
    content: Deliver the poor and needy;
  - type: text
    content: 'Free '
  - type: text
    content: them
  - type: text
    content: ' from the hand of the wicked.'
  '5':
  - type: text
    content: They do not know, nor do they understand;
  - type: text
    content: They walk about in darkness;
  - type: text
    content: 'All the '
  - type: note
    content: Ps. 11:3
  - type: text
    content: foundations of the earth are unstable.
  '6':
  - type: text
    content: 'I said, '
  - type: note
    content: John 10:34
  - type: text
    content: '“You '
  - type: text
    content: are
  - type: text
    content: ' gods,'
  - type: text
    content: 'And all of you '
  - type: text
    content: are
  - type: text
    content: ' children of the Most High.'
  '7':
  - type: text
    content: But you shall die like men,
  - type: text
    content: And fall like one of the princes.”
  '8':
  - type: text
    content: Arise, O God, judge the earth;
  - type: note
    content: Ps. 2:8; (Rev. 11:15)
  - type: text
    content: For You shall inherit all nations.
