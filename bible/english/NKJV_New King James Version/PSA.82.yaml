verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Plea for Justice
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Chr. 19:6; Eccl. 5:8)
      marker-yv: yv-n
    - type: text
      text: stands in the congregation of the mighty;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He judges among '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 82:6
      marker-yv: yv-n
    - type: text
      text: the gods.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will you judge unjustly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 1:17); Prov. 18:5
      marker-yv: yv-n
    - type: text
      text: show partiality to the wicked?
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Defend the poor and fatherless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Do justice to the afflicted and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 24:17; Is. 11:4; Jer. 22:16)
      marker-yv: yv-n
    - type: text
      text: needy.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Deliver the poor and needy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Free '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' from the hand of the wicked.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They do not know, nor do they understand;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They walk about in darkness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 11:3
      marker-yv: yv-n
    - type: text
      text: foundations of the earth are unstable.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 10:34
      marker-yv: yv-n
    - type: text
      text: '“You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' gods,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And all of you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' children of the Most High.'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But you shall die like men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And fall like one of the princes.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arise, O God, judge the earth;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 2:8; (Rev. 11:15)
      marker-yv: yv-n
    - type: text
      text: For You shall inherit all nations.
