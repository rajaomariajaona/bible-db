      text: God Judges the Nations
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“For behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 30:3; Ezek. 38:14
      marker-yv: yv-n
    - type: text
      text: in those days and at that time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When I bring back the captives of Judah and Jerusalem,
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 2:4; Mic. 4:3)
      marker-yv: yv-n
    - type: text
      text: Beat your plowshares into swords
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your pruning hooks into spears;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 12:8
      marker-yv: yv-n
    - type: text
      text: 'Let the weak say, ‘I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' strong.’ ”'
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Assemble and come, all you nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And gather together all around.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Cause '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 103:20; Is. 13:3
      marker-yv: yv-n
    - type: text
      text: 'Your mighty ones to go down there, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Let the nations be wakened, and come up to the Valley of Jehoshaphat;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For there I will sit to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 96:13); Is. 2:4
      marker-yv: yv-n
    - type: text
      text: judge all the surrounding nations.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 13:39); Rev. 14:15
      marker-yv: yv-n
    - type: text
      text: 'Put in the sickle, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 51:33; Hos. 6:11
      marker-yv: yv-n
    - type: text
      text: the harvest is ripe.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Come, go down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 63:3); Lam. 1:5; Rev. 14:19
      marker-yv: yv-n
    - type: text
      text: winepress is full,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The vats overflow—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For their wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' great.”'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Multitudes, multitudes in the valley of decision!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Joel 2:1
      marker-yv: yv-n
    - type: text
      text: 'the day of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' near in the valley of decision.'
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The sun and moon will grow dark,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the stars will diminish their brightness.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' also will roar from Zion,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And utter His voice from Jerusalem;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The heavens and earth will shake;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 51:5, 6)
      marker-yv: yv-n
    - type: text
      text: 'But the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be a shelter for His people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the strength of the children of Israel.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“So you shall know that I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Dwelling in Zion My '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Obad. 16; Zech. 8:3
      marker-yv: yv-n
    - type: text
      text: holy mountain.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then Jerusalem shall be holy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And no aliens shall ever pass through her again.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Blesses His People
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And it will come to pass in that day
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That
    - type: text
      text: ' the mountains shall drip with new wine,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The hills shall flow with milk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the brooks of Judah shall be flooded with water;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 46:4; Ezek. 47:1; Zech. 14:8; (Rev. 22:1)
      marker-yv: yv-n
    - type: text
      text: 'fountain shall flow from the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And water the Valley of Acacias.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “Egypt shall be a desolation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And Edom a desolate wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because of violence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: against
    - type: text
      text: ' the people of Judah,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For they have shed innocent blood in their land.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 66:18; Mic. 4:12; Zech. 14:2
      marker-yv: yv-n
    - type: text
      text: I will also gather all nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And bring them down to the Valley of Jehoshaphat;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 66:16; Jer. 25:31; Ezek. 38:22
      marker-yv: yv-n
    - type: text
      text: will enter into judgment with them there
  - type: usfm
    marker: q2
    children:
    - type: text
      text: On account of My people, My heritage Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whom they have scattered among the nations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have also divided up My land.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: But Judah shall abide forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And Jerusalem from generation to generation.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 4:4
      marker-yv: yv-n
    - type: text
      text: acquit them of the guilt of bloodshed, whom I had not acquitted;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' dwells in Zion.”'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'They have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Obad. 11; Nah. 3:10
      marker-yv: yv-n
    - type: text
      text: cast lots for My people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Have given a boy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: payment
    - type: text
      text: ' for a harlot,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And sold a girl for wine, that they may drink.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Indeed, what have you to do with Me,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 14:29–31; Jer. 47:1–7; Ezek. 25:15–17; Amos 1:6–8; Zech. 9:5–7
      marker-yv: yv-n
    - type: text
      text: O Tyre and Sidon, and all the coasts of Philistia?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you retaliate against Me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But if you retaliate against Me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Swiftly and speedily I will return your retaliation upon your own head;
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Because you have taken My silver and My gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And have carried into your temples My prized possessions.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Also the people of Judah and the people of Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have sold to the Greeks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That you may remove them far from their borders.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“Behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 43:5, 6; Jer. 23:8; Zech. 9:13
      marker-yv: yv-n
    - type: text
      text: I will raise them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Out of the place to which you have sold them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And will return your retaliation upon your own head.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I will sell your sons and your daughters
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Into the hand of the people of Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And they will sell them to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 23:42
      marker-yv: yv-n
    - type: text
      text: Sabeans,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To a people '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 6:20
      marker-yv: yv-n
    - type: text
      text: far off;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken.”'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 6:4; Ezek. 38:7; Mic. 3:5
      marker-yv: yv-n
    - type: text
      text: 'Proclaim this among the nations:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Prepare for war!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wake up the mighty men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let all the men of war draw near,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them come up.
