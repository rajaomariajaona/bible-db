    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' devoured, broke in pieces, and trampled the residue with its feet; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Daniel spoke, saying, “I saw in my vision by night, and behold, the four winds of heaven were stirring up the Great Sea. '
  '20':
