verses:
  '1':
  - type: heading
    content: Praise to God for His Salvation and Providence
  - type: text
    content: To the Chief Musician. A Psalm of David. A Song.
  - type: text
    content: Praise is awaiting You, O God, in Zion;
  - type: text
    content: And to You the vow shall be performed.
  '10':
  - type: text
    content: You water its ridges abundantly,
  - type: text
    content: You settle its furrows;
  - type: text
    content: You make it soft with showers,
  - type: text
    content: You bless its growth.
  '11':
  - type: text
    content: You crown the year with Your goodness,
  - type: text
    content: 'And Your paths drip '
  - type: text
    content: with
  - type: text
    content: ' abundance.'
  '12':
  - type: text
    content: 'They drop '
  - type: text
    content: on
  - type: text
    content: ' the pastures of the wilderness,'
  - type: text
    content: And the little hills rejoice on every side.
  '13':
  - type: text
    content: The pastures are clothed with flocks;
  - type: note
    content: Is. 44:23; 55:12
  - type: text
    content: The valleys also are covered with grain;
  - type: text
    content: They shout for joy, they also sing.
  '2':
  - type: text
    content: O You who hear prayer,
  - type: note
    content: (Is. 66:23)
  - type: text
    content: To You all flesh will come.
  '3':
  - type: text
    content: Iniquities prevail against me;
