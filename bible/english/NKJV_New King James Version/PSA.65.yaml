  '8':
  - type: text
    content: They also who dwell in the farthest parts are afraid of Your signs;
  - type: text
    content: You make the outgoings of the morning and evening rejoice.
  '9':
  - type: text
    content: 'You visit the earth and '
  - type: note
    content: (Deut. 11:12); Jer. 5:24
  - type: text
