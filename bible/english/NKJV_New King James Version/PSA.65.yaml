  - type: text
    content: ' our transgressions,'
  - type: text
    content: 'You will '
  - type: note
    content: Ps. 51:2; 79:9; Is. 6:7; (Heb. 9:14; 1 John 1:7, 9)
  - type: text
    content: provide atonement for them.
