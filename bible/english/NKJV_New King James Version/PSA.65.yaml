  - type: text
    text: Praise to God for His Salvation and Providence
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David. A Song.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Praise is awaiting You, O God, in Zion;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And to You the vow shall be performed.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O You who hear prayer,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 66:23)
    marker-yv: yv-n
  - type: text
    text: To You all flesh will come.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Iniquities prevail against me;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: As
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for
  - type: text
    text: ' our transgressions,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'You will '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 51:2; 79:9; Is. 6:7; (Heb. 9:14; 1 John 1:7, 9)
    marker-yv: yv-n
  - type: text
    text: provide atonement for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 33:12
    marker-yv: yv-n
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: man
  - type: text
    text: ' You '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 4:3
    marker-yv: yv-n
  - type: text
    text: choose,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And cause to approach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: You,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: That
  - type: text
    text: ' he may dwell in Your courts.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 36:8
    marker-yv: yv-n
  - type: text
    text: We shall be satisfied with the goodness of Your house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Of Your holy temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: it
    children:
    - type: text
      text: By
  - type: text
    text: ' awesome deeds in righteousness You will answer us,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: O God of our salvation,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: You
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' the confidence of all the ends of the earth,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And of the far-off seas;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Who established the mountains by His strength,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 93:1
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Being
  - type: text
    text: ' clothed with power;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 8:26
    marker-yv: yv-n
  - type: text
    text: You who still the noise of the seas,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The noise of their waves,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 17:12, 13
    marker-yv: yv-n
  - type: text
    text: And the tumult of the peoples.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They also who dwell in the farthest parts are afraid of Your signs;
- type: usfm
  marker: q2
  children:
  - type: text
    text: You make the outgoings of the morning and evening rejoice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'You visit the earth and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 11:12); Jer. 5:24
    marker-yv: yv-n
  - type: text
    text: water it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: You greatly enrich it;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 46:4; 104:13; 147:8
    marker-yv: yv-n
  - type: text
    text: The river of God is full of water;
- type: usfm
  marker: q2
  children:
  - type: text
    text: You provide their grain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: For so You have prepared it.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You water its ridges abundantly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: You settle its furrows;
- type: usfm
  marker: q2
  children:
  - type: text
    text: You make it soft with showers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: You bless its growth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You crown the year with Your goodness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And Your paths drip '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' abundance.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They drop '
  - type: usfm
    marker: it
    children:
    - type: text
      text: on
  - type: text
    text: ' the pastures of the wilderness,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the little hills rejoice on every side.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The pastures are clothed with flocks;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 44:23; 55:12
    marker-yv: yv-n
  - type: text
    text: The valleys also are covered with grain;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They shout for joy, they also sing.
