      text: “Be strong, do not fear!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Behold, your God will come '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
