  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The parched ground shall become a pool,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the thirsty land springs of water;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 34:13
      marker-yv: yv-n
    - type: text
      text: the habitation of jackals, where each lay,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: There
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' grass with reeds and rushes.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 19:23
      marker-yv: yv-n
    - type: text
      text: highway shall be there, and a road,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And it shall be called the Highway of Holiness.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 52:1; Joel 3:17; (Matt. 7:13, 14); 1 Pet. 1:15, 16; Rev. 21:27
      marker-yv: yv-n
    - type: text
      text: The unclean shall not pass over it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' for others.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whoever walks the road, although a fool,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall not go astray.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:6; (Is. 11:7, 9); Ezek. 34:25
      marker-yv: yv-n
    - type: text
      text: No lion shall be there,
  - type: usfm
    marker: q2
    children:
