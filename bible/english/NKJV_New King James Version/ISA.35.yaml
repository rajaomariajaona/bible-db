  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 32:15
      marker-yv: yv-n
    - type: text
      text: It shall blossom abundantly and rejoice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even with joy and singing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The glory of Lebanon shall be given to it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The excellence of Carmel and Sharon.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They shall see the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 40:5
      marker-yv: yv-n
    - type: text
      text: 'glory of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The excellency of our God.
