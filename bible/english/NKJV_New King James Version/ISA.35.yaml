      text: 'Nor shall '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' ravenous beast go up on it;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It shall not be found there.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the redeemed shall walk '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there,
