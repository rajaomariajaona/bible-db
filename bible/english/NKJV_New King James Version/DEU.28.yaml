      - type: text
        text: Ps. 119:82
      marker-yv: yv-n
    - type: text
      text: 'fail '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: longing
    - type: text
      text: ' for them all day long; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' no strength in your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 5:5
      marker-yv: yv-n
    - type: text
      text: 'hand. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'A nation whom you have not known shall eat '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:16; Jer. 5:15, 17
      marker-yv: yv-n
    - type: text
      text: 'the fruit of your land and the produce of your labor, and you shall be only oppressed and crushed continually. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'So you shall be driven mad because of the sight which your eyes see. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will strike you in the knees and on the legs with severe boils which cannot be healed, and from the sole of your foot to the top of your head.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 17:4, 6; 24:12, 14; 25:7, 11; 2 Chr. 36:1–21; Jer. 39:1–9
      marker-yv: yv-n
    - type: text
      text: 'bring you and the king whom you set over you to a nation which neither you nor your fathers have known, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:28; Jer. 16:13
      marker-yv: yv-n
    - type: text
      text: 'there you shall serve other gods—wood and stone. '
  '37':
