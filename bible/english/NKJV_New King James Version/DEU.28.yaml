  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' when you come in, and cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' when you go out.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And all these blessings shall come upon you and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:15
      marker-yv: yv-n
    - type: text
      text: 'overtake you, because you obey the voice of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will send on you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 2:2
      marker-yv: yv-n
    - type: text
      text: 'cursing, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 65:14
      marker-yv: yv-n
    - type: text
      text: 'confusion, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 80:16; Is. 30:17
      marker-yv: yv-n
    - type: text
      text: 'rebuke in all that you set your hand to do, until you are destroyed and until you perish quickly, because of the wickedness of your doings in which you have forsaken Me. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will make the plague cling to you until He has consumed you from the land which you are going to possess. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:16
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will strike you with consumption, with fever, with inflammation, with severe burning fever, with the sword, with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Amos 4:9
      marker-yv: yv-n
    - type: text
      text: 'scorching, and with mildew; they shall pursue you until you perish. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:19
      marker-yv: yv-n
    - type: text
      text: 'your heavens which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' over your head shall be bronze, and the earth which is under you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' iron. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will change the rain of your land to powder and dust; from the heaven it shall come down on you until you are destroyed.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:30
      marker-yv: yv-n
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will cause you to be defeated before your enemies; you shall go out one way against them and flee seven ways before them; and you shall become troublesome to all the kingdoms of the earth. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 17:44; Ps. 79:2
      marker-yv: yv-n
    - type: text
      text: 'Your carcasses shall be food for all the birds of the air and the beasts of the earth, and no one shall frighten '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' away. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will strike you with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:26
      marker-yv: yv-n
    - type: text
      text: 'the boils of Egypt, with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 5:6
      marker-yv: yv-n
    - type: text
      text: 'tumors, with the scab, and with the itch, from which you cannot be healed. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will strike you with madness and blindness and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 4:9
      marker-yv: yv-n
    - type: text
      text: 'confusion of heart. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And you shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:14
      marker-yv: yv-n
    - type: text
      text: 'grope at noonday, as a blind man gropes in darkness; you shall not prosper in your ways; you shall be only oppressed and plundered continually, and no one shall save '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
