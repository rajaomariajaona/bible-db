document_id: DEU.28,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Blessings on Obedience
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“Now it shall come to pass, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:26; Lev. 26:3–13; Deut. 7:12–26; 11:13
      marker-yv: yv-n
    - type: text
      text: 'if you diligently obey the voice of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, to observe carefully all His commandments which I command you today, that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 26:19; 1 Chr. 14:2
      marker-yv: yv-n
    - type: text
      text: 'will set you high above all nations of the earth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then all peoples of the earth shall see that you are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 6:27; 2 Chr. 7:14; Is. 63:19; Dan. 9:18, 19
      marker-yv: yv-n
    - type: text
      text: 'called by the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and they shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 11:25
      marker-yv: yv-n
    - type: text
      text: 'afraid of you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 30:9
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will grant you plenty of goods, in the fruit of your body, in the increase of your livestock, and in the produce of your ground, in the land of which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' swore to your fathers to give you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will open to you His good treasure, the heavens, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:4; Deut. 11:14
      marker-yv: yv-n
    - type: text
      text: 'to give the rain to your land in its season, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 14:29
      marker-yv: yv-n
    - type: text
      text: 'to bless all the work of your hand. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 15:6
      marker-yv: yv-n
    - type: text
      text: 'You shall lend to many nations, but you shall not borrow. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will make '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 9:14, 15)
      marker-yv: yv-n
    - type: text
      text: 'you the head and not the tail; you shall be above only, and not be beneath, if you heed the commandments of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, which I command you today, and are careful to observe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 5:32; Josh. 1:7
      marker-yv: yv-n
    - type: text
      text: 'So you shall not turn aside from any of the words which I command you this day, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' the right or the left, to go after other gods to serve them.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Curses on Disobedience
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“But it shall come to pass, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:14–39; Josh. 23:15; Dan. 9:10–14; Mal. 2:2
      marker-yv: yv-n
    - type: text
      text: 'if you do not obey the voice of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, to observe carefully all His commandments and His statutes which I command you today, that all these curses will come upon you and overtake you:'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' in the city, and cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' in the country.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' your basket and your kneading bowl.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
