      children:
      - type: text
        text: 2 Sam. 12:11; Job 31:10; Jer. 8:10
      marker-yv: yv-n
    - type: text
      text: '“You shall betroth a wife, but another man shall lie with her; '
    - type: usfm
      marker: x
      children:
      - type: text
