      marker: x
      children:
      - type: text
        text: Deut. 4:9; 6:7; Ps. 78:3, 4
      marker-yv: yv-n
    - type: text
      text: The father shall make known Your truth to the children.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then Hezekiah turned his face toward the wall, and prayed to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ready
    - type: text
      text: ' to save me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore we will sing my songs with stringed instruments
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All the days of our life, in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 20:7
      marker-yv: yv-n
    - type: text
      text: 'Isaiah had said, “Let them take a lump of figs, and apply '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' as a poultice on the boil, and he shall recover.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 20:8
      marker-yv: yv-n
    - type: text
      text: 'Hezekiah had said, “What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the sign that I shall go up to the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 13:14
      marker-yv: yv-n
    - type: text
      text: '“Remember now, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I pray, how I have walked before You in truth and with a loyal heart, and have done '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good in Your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 18:5, 6; Ps. 26:3
      marker-yv: yv-n
    - type: text
      text: sight.” And Hezekiah wept bitterly.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Isaiah, saying, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“Go and tell Hezekiah, ‘Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of David your father: “I have heard your prayer, I have seen your tears; surely I will add to your days fifteen years. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I will deliver you and this city from the hand of the king of Assyria, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 19:35–37; 2 Chr. 32:21; Is. 31:5; 37:35
      marker-yv: yv-n
    - type: text
      text: 'I will defend this city.” ’ '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 6:17, 21, 36–40; 2 Kin. 20:8; Is. 7:11
      marker-yv: yv-n
    - type: text
      text: 'the sign to you from the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will do this thing which He has spoken: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Behold, I will bring the shadow on the sundial, which has gone down with the sun on the sundial of Ahaz, ten degrees backward.” So the sun returned ten degrees on the dial by which it had gone down.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'This is the writing of Hezekiah king of Judah, when he had been sick and had recovered from his sickness:'
