  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “In the prime of my life
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I shall go to the gates of Sheol;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am deprived of the remainder of my years.”
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
