    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' peace'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That
    - type: text
      text: ' I had great bitterness;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But You have lovingly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: delivered
    - type: text
      text: ' my soul from the pit of corruption,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For You have cast all my sins behind Your back.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 6:5; 30:9; 88:11; 115:17; (Eccl. 9:10)
      marker-yv: yv-n
    - type: text
      text: Sheol cannot thank You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Death cannot praise You;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Those who go down to the pit cannot hope for Your truth.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The living, the living man, he shall praise You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do
    - type: text
      text: ' this day;'
  - type: usfm
    marker: q2
    children:
