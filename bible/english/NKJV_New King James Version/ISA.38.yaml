      children:
      - type: text
        text: 2 Kin. 20:1–6, 9–11; 2 Chr. 32:24; Is. 38:1–8
      marker-yv: yv-n
    - type: text
      text: 'those days Hezekiah was sick and near death. And Isaiah the prophet, the son of Amoz, went to him and said to him, “Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
    - type: usfm
      marker: x
      children:
      - type: text
