  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“I shall not see '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Yah
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 27:13; 116:9
      marker-yv: yv-n
    - type: text
      text: in the land of the living;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I shall observe man no more among the inhabitants of the world.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 7:6
      marker-yv: yv-n
    - type: text
      text: My life span is gone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Taken from me like a shepherd’s tent;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have cut off my life like a weaver.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He cuts me off from the loom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From day until night You make an end of me.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I have considered until morning—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like a lion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So He breaks all my bones;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From day until night You make an end of me.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Like a crane '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a swallow, so I chattered;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 59:11; Ezek. 7:16; Nah. 2:7
      marker-yv: yv-n
    - type: text
      text: I mourned like a dove;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My eyes fail '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: looking
    - type: text
      text: ' upward.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I am oppressed;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Undertake for me!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “What shall I say?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has both spoken to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And He Himself has done '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I shall walk carefully all my years
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 7:11; 10:1; Is. 38:17
      marker-yv: yv-n
    - type: text
      text: In the bitterness of my soul.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'O Lord, by these '
