document_id: PHM.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greeting
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Paul, a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 3:1
      marker-yv: yv-n
    - type: text
      text: 'prisoner of Christ Jesus, and Timothy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' brother,'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To Philemon our beloved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: friend
    - type: text
      text: ' and fellow laborer, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I appeal to you for my son '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 4:9
      marker-yv: yv-n
    - type: text
      text: 'Onesimus, whom I have begotten '
    - type: usfm
      marker: it
      children:
      - type: text
        text: while
    - type: text
      text: ' in my chains, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: who once was unprofitable to you, but now is profitable to you and to me.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I am sending him back. You therefore receive him, that is, my own heart, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'whom I wished to keep with me, that on your behalf he might minister to me in my chains for the gospel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But without your consent I wanted to do nothing, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 9:7; 1 Pet. 5:2
      marker-yv: yv-n
    - type: text
      text: that your good deed might not be by compulsion, as it were, but voluntary.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For perhaps he departed for a while for this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: purpose,
    - type: text
      text: ' that you might receive him forever, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'no longer as a slave but more than a slave—a beloved brother, especially to me but how much more to you, both in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:5; Col. 3:22
      marker-yv: yv-n
    - type: text
      text: flesh and in the Lord.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Philemon’s Obedience Encouraged
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'If then you count me as a partner, receive him as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: would
    - type: text
      text: ' me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But if he has wronged you or owes anything, put that on my account. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'I, Paul, am writing with my own '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:21; Gal. 6:11; 2 Thess. 3:17
      marker-yv: yv-n
    - type: text
      text: 'hand. I will repay—not to mention to you that you owe me even your own self besides. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'to the beloved Apphia, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 4:17
      marker-yv: yv-n
    - type: text
      text: 'Archippus our fellow soldier, and to the church in your house:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Yes, brother, let me have joy from you in the Lord; refresh my heart in the Lord.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 7:16
      marker-yv: yv-n
    - type: text
      text: 'Having confidence in your obedience, I write to you, knowing that you will do even more than I say. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But, meanwhile, also prepare a guest room for me, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 1:25; 2:24
      marker-yv: yv-n
    - type: text
      text: 'I trust that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 1:11
      marker-yv: yv-n
    - type: text
      text: through your prayers I shall be granted to you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Farewell
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 1:7; 4:12
      marker-yv: yv-n
    - type: text
      text: 'Epaphras, my fellow prisoner in Christ Jesus, greets you, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 12:12, 25; 15:37–39; Col. 4:10
      marker-yv: yv-n
    - type: text
      text: 'Mark, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:29; 27:2; Col. 4:10
      marker-yv: yv-n
    - type: text
      text: 'Aristarchus, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 4:14; 2 Tim. 4:10
      marker-yv: yv-n
    - type: text
      text: 'Demas, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 4:11
      marker-yv: yv-n
    - type: text
      text: Luke, my fellow laborers.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 4:22
      marker-yv: yv-n
    - type: text
      text: 'The grace of our Lord Jesus Christ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' with your spirit. Amen.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Philemon’s Love and Faith
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 1:16; 1 Thess. 1:2; 2 Thess. 1:3
      marker-yv: yv-n
    - type: text
      text: 'I thank my God, making mention of you always in my prayers, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 1:15; Col. 1:4; 1 Thess. 3:6
      marker-yv: yv-n
    - type: text
      text: 'hearing of your love and faith which you have toward the Lord Jesus and toward all the saints, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'that the sharing of your faith may become effective '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 1:9; (Col. 1:9; 3:10; James 2:14–17)
      marker-yv: yv-n
    - type: text
      text: 'by the acknowledgment of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Thess. 5:18)
      marker-yv: yv-n
    - type: text
      text: 'every good thing which is in you in Christ Jesus. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For we have great joy and consolation in your love, because the hearts of the saints have been refreshed by you, brother.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Plea for Onesimus
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Therefore, though I might be very bold in Christ to command you what is fitting, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: it
      children:
      - type: text
        text: yet
    - type: text
      text: ' for love’s sake I rather appeal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: '—being such a one as Paul, the aged, and now also a prisoner of Jesus Christ— '
