document_id: AMO.3,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Authority of the Prophet’s Message
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear this word that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken against you, O children of Israel, against the whole family which I brought up from the land of Egypt, saying:'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 14:4; Jer. 4:22; Amos 5:7; 6:12
      marker-yv: yv-n
    - type: text
      text: do not know to do right,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Who store up violence and robbery in their palaces.’ ”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thus says the Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“An adversary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' all around the land;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall sap your strength from you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your palaces shall be plundered.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “As a shepherd takes from the mouth of a lion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Two legs or a piece of an ear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So shall the children of Israel be taken out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who dwell in Samaria—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the corner of a bed and on the edge of a couch!
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hear and testify against the house of Jacob,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Says the Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of hosts,'
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “That in the day I punish Israel for their transgressions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will also visit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: destruction
    - type: text
      text: ' on the altars of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:15; Hos. 10:5–8, 14, 15; Amos 4:4
      marker-yv: yv-n
    - type: text
      text: Bethel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the horns of the altar shall be cut off
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And fall to the ground.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will destroy '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 36:22
      marker-yv: yv-n
    - type: text
      text: 'the winter house along with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 3:20
      marker-yv: yv-n
    - type: text
      text: the summer house;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 22:39; Ps. 45:8
      marker-yv: yv-n
    - type: text
      text: houses of ivory shall perish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the great houses shall have an end,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 18:19; Ex. 19:5, 6; Deut. 7:6; Ps. 147:19)
      marker-yv: yv-n
    - type: text
      text: ' only have I known of all the families of the earth;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 14:10; Ezek. 20:36; Dan. 9:12; Matt. 11:22; (Rom. 2:9)
      marker-yv: yv-n
    - type: text
      text: Therefore I will punish you for all your iniquities.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can two walk together, unless they are agreed?
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will a lion roar in the forest, when he has no prey?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will a young lion cry out of his den, if he has caught nothing?
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will a bird fall into a snare on the earth, where there is no trap for it?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will a snare spring up from the earth, if it has caught nothing at all?
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If a trumpet is blown in a city, will not the people be afraid?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 45:7
      marker-yv: yv-n
    - type: text
      text: 'If there is calamity in a city, will not the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' have done '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Surely the Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: ' does nothing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Unless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 6:13; 18:17; (Jer. 23:22); Dan. 9:22; (John 15:15)
      marker-yv: yv-n
    - type: text
      text: He reveals His secret to His servants the prophets.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A lion has roared!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will not fear?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: ' has spoken!'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 20:9; (Mic. 3:8); Acts 4:20; 1 Cor. 9:16
      marker-yv: yv-n
    - type: text
      text: Who can but prophesy?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Punishment of Israel’s Sins
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Proclaim in the palaces at Ashdod,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And in the palaces in the land of Egypt, and say:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Assemble on the mountains of Samaria;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: See great tumults in her midst,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the oppressed within her.
