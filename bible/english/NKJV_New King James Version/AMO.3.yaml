  - type: heading
    content: Authority of the Prophet’s Message
  - type: text
    content: 'Hear this word that the '
  - type: heading
    content: Lord
  - type: text
    content: ' has spoken against you, O children of Israel, against the whole family which I brought up from the land of Egypt, saying:'
  '10':
  - type: text
    content: 'For they '
  - type: note
    content: Ps. 14:4; Jer. 4:22; Amos 5:7; 6:12
  - type: text
    content: do not know to do right,’
  - type: text
    content: 'Says the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: ‘Who store up violence and robbery in their palaces.’ ”
  '11':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: heading
    content: God
  - type: text
    content: ':'
  - type: text
    content: '“An adversary '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' all around the land;'
  - type: text
    content: He shall sap your strength from you,
  - type: text
    content: And your palaces shall be plundered.”
  '12':
  - type: text
    content: 'Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “As a shepherd takes from the mouth of a lion
  - type: text
    content: Two legs or a piece of an ear,
  - type: text
    content: So shall the children of Israel be taken out
  - type: text
    content: Who dwell in Samaria—
  - type: text
    content: In the corner of a bed and on the edge of a couch!
  '13':
  - type: text
    content: Hear and testify against the house of Jacob,”
  - type: text
    content: 'Says the Lord '
  - type: heading
    content: God
  - type: text
    content: ', the God of hosts,'
  '14':
  - type: text
    content: “That in the day I punish Israel for their transgressions,
  - type: text
    content: 'I will also visit '
  - type: text
    content: destruction
  - type: text
    content: ' on the altars of '
  - type: note
    content: 2 Kin. 23:15; Hos. 10:5–8, 14, 15; Amos 4:4
  - type: text
    content: Bethel;
  - type: text
    content: And the horns of the altar shall be cut off
  - type: text
    content: And fall to the ground.
  '15':
  - type: text
    content: 'I will destroy '
  - type: note
    content: Jer. 36:22
  - type: text
    content: 'the winter house along with '
  - type: note
    content: Judg. 3:20
  - type: text
    content: the summer house;
  - type: text
    content: 'The '
  - type: note
    content: 1 Kin. 22:39; Ps. 45:8
  - type: text
    content: houses of ivory shall perish,
  - type: text
    content: And the great houses shall have an end,”
  - type: text
    content: 'Says the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: “You
  - type: note
    content: (Gen. 18:19; Ex. 19:5, 6; Deut. 7:6; Ps. 147:19)
  - type: text
    content: ' only have I known of all the families of the earth;'
  - type: note
    content: Jer. 14:10; Ezek. 20:36; Dan. 9:12; Matt. 11:22; (Rom. 2:9)
  - type: text
    content: Therefore I will punish you for all your iniquities.”
  '3':
  - type: text
    content: Can two walk together, unless they are agreed?
  '4':
  - type: text
    content: Will a lion roar in the forest, when he has no prey?
  - type: text
    content: Will a young lion cry out of his den, if he has caught nothing?
  '5':
  - type: text
    content: Will a bird fall into a snare on the earth, where there is no trap for it?
  - type: text
    content: Will a snare spring up from the earth, if it has caught nothing at all?
  '6':
  - type: text
    content: If a trumpet is blown in a city, will not the people be afraid?
  - type: note
    content: Is. 45:7
  - type: text
    content: 'If there is calamity in a city, will not the '
  - type: heading
    content: Lord
  - type: text
    content: ' have done '
  - type: text
    content: it?
  '7':
  - type: text
    content: 'Surely the Lord '
  - type: heading
    content: God
  - type: text
    content: ' does nothing,'
  - type: text
    content: 'Unless '
  - type: note
    content: Gen. 6:13; 18:17; (Jer. 23:22); Dan. 9:22; (John 15:15)
  - type: text
    content: He reveals His secret to His servants the prophets.
  '8':
  - type: text
    content: A lion has roared!
  - type: text
    content: Who will not fear?
  - type: text
    content: 'The Lord '
  - type: heading
    content: God
  - type: text
    content: ' has spoken!'
  - type: note
    content: Jer. 20:9; (Mic. 3:8); Acts 4:20; 1 Cor. 9:16
  - type: text
    content: Who can but prophesy?
  - type: heading
    content: Punishment of Israel’s Sins
  '9':
  - type: text
    content: “Proclaim in the palaces at Ashdod,
  - type: text
    content: 'And in the palaces in the land of Egypt, and say:'
  - type: text
    content: ‘Assemble on the mountains of Samaria;
  - type: text
    content: See great tumults in her midst,
  - type: text
    content: And the oppressed within her.
