      marker-yv: yv-n
    - type: text
      text: 'but on your part He is glorified. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But let none of you suffer as a murderer, a thief, an evildoer, or as a busybody in other people’s matters. '
