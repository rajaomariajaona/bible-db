    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spent
    - type: text
      text: ' enough of our past lifetime in doing the will of the Gentiles—when we walked in lewdness, lusts, drunkenness, revelries, drinking parties, and abominable idolatries. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In regard to these, they think it strange that you do not run with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' in the same flood of dissipation, speaking evil of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
