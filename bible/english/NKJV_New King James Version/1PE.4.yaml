      marker-yv: yv-n
    - type: text
      text: 'to the extent that you partake of Christ’s sufferings, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 2:12
      marker-yv: yv-n
    - type: text
      text: 'when His glory is revealed, you may also be glad with exceeding joy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you are reproached for the name of Christ, '
