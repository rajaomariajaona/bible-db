  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved, do not think it strange concerning the fiery trial which is to try you, as though some strange thing happened to you; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but rejoice '
    - type: usfm
      marker: x
      children:
