  '4':
  - type: text
    content: 'If then you have judgments concerning things pertaining to this life, do you appoint those who are least esteemed by the church to judge? '
  '5':
  - type: text
    content: 'I say this to your shame. Is it so, that there is not a wise man among you, not even one, who will be able to judge between his brethren? '
  '6':
