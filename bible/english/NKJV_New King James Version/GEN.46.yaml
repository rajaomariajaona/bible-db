  - type: heading
    content: Jacob Settles in Goshen
  '28':
  - type: text
    content: 'Then he sent Judah before him to Joseph, '
  - type: note
    content: Gen. 31:21
  - type: text
    content: 'to point out before him '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: way
  - type: text
    content: ' to Goshen. And they came '
  - type: note
    content: Gen. 47:1
  - type: text
    content: 'to the land of Goshen. '
  '29':
  - type: text
    content: 'So Joseph made ready his '
  - type: note
    content: Gen. 41:43
  - type: text
    content: 'chariot and went up to Goshen to meet his father Israel; and he presented himself to him, and '
  - type: note
    content: Gen. 45:14, 15
  - type: text
    content: fell on his neck and wept on his neck a good while.
  '3':
  - type: text
    content: 'So He said, “I '
  - type: text
    content: am
  - type: text
    content: ' God, '
  - type: note
    content: Gen. 17:1; 28:13
  - type: text
    content: 'the God of your father; do not fear to go down to Egypt, for I will '
  - type: note
    content: Gen. 12:2; Ex. 1:9; 12:37; Deut. 26:5
  - type: text
    content: 'make of you a great nation there. '
  '30':
  - type: text
    content: 'And Israel said to Joseph, '
  - type: note
    content: Luke 2:29, 30
  - type: text
    content: '“Now let me die, since I have seen your face, because you '
  - type: text
    content: are
  - type: text
    content: ' still alive.”'
  '31':
  - type: text
    content: 'Then Joseph said to his brothers and to his father’s household, '
  - type: note
    content: Gen. 47:1
  - type: text
    content: '“I will go up and tell Pharaoh, and say to him, ‘My brothers and those of my father’s house, who '
  - type: text
    content: were
  - type: text
    content: ' in the land of Canaan, have come to me. '
  '32':
  - type: text
    content: 'And the men '
  - type: text
    content: are
  - type: text
    content: ' '
  - type: note
    content: Gen. 47:3
  - type: text
    content: 'shepherds, for their occupation has been to feed livestock; and they have brought their flocks, their herds, and all that they have.’ '
  '33':
  - type: text
    content: 'So it shall be, when Pharaoh calls you and says, '
  - type: note
    content: Gen. 47:2, 3
  - type: text
    content: '‘What is your '
  - type: note
    content: Gen. 47:3
  - type: text
    content: 'occupation?’ '
  '34':
  - type: text
    content: 'that you shall say, ‘Your servants’ occupation has been with livestock '
  - type: note
    content: Gen. 30:35; 34:5; 37:17
  - type: text
    content: 'from our youth even till now, both we '
  - type: text
    content: and
  - type: text
    content: ' also our fathers,’ that you may dwell in the land of Goshen; for every shepherd '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: Gen. 43:32; Ex. 8:26
  - type: text
    content: an abomination to the Egyptians.”
  '4':
  - type: note
    content: Gen. 28:15; 31:3; 48:21; Ex. 3:12
  - type: text
    content: 'I will go down with you to Egypt, and I will also surely '
  - type: note
    content: Gen. 15:16; 50:12, 24, 25; Ex. 3:8
  - type: text
    content: 'bring you up '
  - type: text
    content: again;
  - type: text
    content: ' and '
  - type: note
    content: Gen. 50:1
  - type: text
    content: Joseph will put his hand on your eyes.”
  '5':
  - type: text
    content: 'Then '
  - type: note
    content: Gen. 47:9; Acts 7:15
  - type: text
    content: 'Jacob arose from Beersheba; and the sons of Israel carried their father Jacob, their little ones, and their wives, in the carts '
  - type: note
    content: Gen. 45:19–21
  - type: text
    content: 'which Pharaoh had sent to carry him. '
  '6':
  - type: text
    content: 'So they took their livestock and their goods, which they had acquired in the land of Canaan, and went to Egypt, '
  - type: note
    content: Deut. 26:5; Josh. 24:4; Ps. 105:23; Is. 52:4; Acts 7:15
  - type: text
    content: 'Jacob and all his descendants with him. '
  '7':
  - type: text
    content: His sons and his sons’ sons, his daughters and his sons’ daughters, and all his descendants he brought with him to Egypt.
  '8':
  - type: text
    content: 'Now '
  - type: note
    content: Ex. 1:1–4
  - type: text
    content: 'these '
  - type: text
    content: were
  - type: text
    content: ' the names of the children of Israel, Jacob and his sons, who went to Egypt: '
  - type: note
    content: Num. 26:4, 5; 1 Chr. 2:1
  - type: text
    content: 'Reuben '
  - type: text
    content: was
  - type: text
    content: ' Jacob’s firstborn. '
  '9':
  - type: text
    content: 'The '
  - type: note
    content: Ex. 6:14
  - type: text
    content: 'sons of Reuben '
  - type: text
    content: were
  - type: text
    content: ' Hanoch, Pallu, Hezron, and Carmi. '
