document_id: LUK.16,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Unjust Steward
  - type: text
    content: 'He also said to His disciples: '
  - type: text
    content: '“There was a certain rich man who had a steward, and an accusation was brought to him that this man was '
  - type: text
    content: wasting his goods.
  - type: text
    content: ' '
  '10':
  - type: note
    content: Matt. 25:21; Luke 19:17
  - type: text
    content: 'He who '
  - type: text
    content: is
  - type: text
    content: ' faithful in '
  - type: text
    content: what is
  - type: text
    content: ' least is faithful also in much; and he who is unjust in '
  - type: text
    content: what is
  - type: text
    content: ' least is unjust also in much.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Therefore if you have not been faithful in the unrighteous mammon, who will commit to your trust the true '
  - type: text
    content: riches?
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And if you have not been faithful in what is another man’s, who will give you what is your '
  - type: note
    content: (1 Pet. 1:3, 4)
  - type: text
    content: own?
  '13':
  - type: note
    content: Matt. 6:24; Gal. 1:10
  - type: text
    content: “No servant can serve two masters; for either he will hate the one and love the other, or else he will be loyal to the one and despise the other. You cannot serve God and mammon.”
  - type: heading
    content: The Law, the Prophets, and the Kingdom
  '14':
  - type: text
    content: 'Now the Pharisees, '
  - type: note
    content: Matt. 23:14
  - type: text
    content: 'who were lovers of money, also heard all these things, and they derided Him. '
  '15':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: '“You are those who '
  - type: note
    content: Luke 10:29
  - type: text
    content: 'justify yourselves '
  - type: note
    content: (Matt. 6:2, 5, 16)
  - type: text
    content: 'before men, but '
  - type: note
    content: 1 Chr. 28:9; 2 Chr. 6:30; Ps. 7:9; Prov. 15:11; Jer. 17:10
  - type: text
    content: 'God knows your hearts. For '
  - type: note
    content: 1 Sam. 16:7; Ps. 10:3; Prov. 6:16–19; 16:5
  - type: text
    content: what is highly esteemed among men is an abomination in the sight of God.
  '16':
  - type: note
    content: Matt. 3:1–12; 4:17; 11:12, 13; Luke 7:29
  - type: text
    content: '“The law and the prophets '
  - type: text
    content: were
  - type: text
    content: ' until John. Since that time the kingdom of God has been preached, and everyone is pressing into it.'
  - type: text
    content: ' '
  '17':
  - type: note
    content: Ps. 102:26, 27; Is. 40:8; 51:6; Matt. 5:18; 1 Pet. 1:25
  - type: text
    content: 'And it is easier for heaven and earth to pass away than for one '
  - type: text
    content: tittle of the law to fail.
  '18':
  - type: note
    content: Matt. 5:32; 19:9; Mark 10:11; 1 Cor. 7:10, 11
  - type: text
    content: '“Whoever divorces his wife and marries another commits adultery; and whoever marries her who is divorced from '
  - type: text
    content: her
  - type: text
    content: ' husband commits adultery.'
  - type: heading
    content: The Rich Man and Lazarus
  '19':
  - type: text
    content: '“There was a certain rich man who was clothed in purple and fine linen and '
  - type: text
    content: fared sumptuously every day.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'So he called him and said to him, ‘What is this I hear about you? Give an '
  - type: note
    content: (Rom. 14:12; 2 Cor. 5:10; 1 Pet. 4:5, 6)
  - type: text
    content: account of your stewardship, for you can no longer be steward.’
  '20':
  - type: text
    content: But there was a certain beggar named Lazarus, full of sores, who was laid at his gate,
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'desiring to be fed with '
  - type: text
    content: the crumbs which fell
  - type: text
    content: ' from the rich man’s table. Moreover the dogs came and licked his sores.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'So it was that the beggar died, and was carried by the angels to '
  - type: note
    content: Matt. 8:11
  - type: text
    content: Abraham’s bosom. The rich man also died and was buried.
  - type: text
    content: ' '
  '23':
  - type: text
    content: And being in torments in Hades, he lifted up his eyes and saw Abraham afar off, and Lazarus in his bosom.
  '24':
  - type: text
    content: '“Then he cried and said, ‘Father Abraham, have mercy on me, and send Lazarus that he may dip the tip of his finger in water and '
  - type: note
    content: Zech. 14:12
  - type: text
    content: 'cool my tongue; for I '
  - type: note
    content: (Is. 66:24; Mark 9:42–48)
  - type: text
    content: am tormented in this flame.’
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'But Abraham said, ‘Son, '
  - type: note
    content: Job 21:13; Luke 6:24; James 5:5
  - type: text
    content: remember that in your lifetime you received your good things, and likewise Lazarus evil things; but now he is comforted and you are tormented.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And besides all this, between us and you there is a great gulf fixed, so that those who want to pass from here to you cannot, nor can those from there pass to us.’
  '27':
  - type: text
    content: '“Then he said, '
  - type: text
    content: ‘I beg you therefore, father, that you would send him to my father’s house,
  - type: text
    content: ' '
  '28':
  - type: text
    content: for I have five brothers, that he may testify to them, lest they also come to this place of torment.’
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Abraham said to him, '
  - type: note
    content: Is. 8:20; 34:16; (John 5:39, 45); Acts 15:21; 17:11; (2 Tim. 3:15)
  - type: text
    content: ‘They have Moses and the prophets; let them hear them.’
  - type: text
    content: ' '
  '3':
  - type: text
    content: “Then the steward said within himself, ‘What shall I do? For my master is taking the stewardship away from me. I cannot dig; I am ashamed to beg.
  - type: text
    content: ' '
  '30':
  - type: text
    content: And he said, ‘No, father Abraham; but if one goes to them from the dead, they will repent.’
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'But he said to him, '
  - type: note
    content: (John 5:46)
  - type: text
    content: '‘If they do not hear Moses and the prophets, '
  - type: note
    content: John 12:10, 11
  - type: text
    content: neither will they be persuaded though one rise from the dead.’ ”
  '4':
  - type: text
    content: I have resolved what to do, that when I am put out of the stewardship, they may receive me into their houses.’
  '5':
  - type: text
    content: '“So he called every one of his master’s debtors to '
  - type: text
    content: him,
  - type: text
    content: ' and said to the first, ‘How much do you owe my master?’'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And he said, ‘A hundred '
  - type: text
    content: measures
  - type: text
    content: ' of oil.’ So he said to him, ‘Take your bill, and sit down quickly and write fifty.’'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Then he said to another, ‘And how much do you owe?’ So he said, ‘A hundred '
  - type: text
    content: measures
  - type: text
    content: ' of wheat.’ And he said to him, ‘Take your bill, and write eighty.’'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'So the master commended the unjust steward because he had dealt shrewdly. For the sons of this world are more shrewd in their generation than '
  - type: note
    content: (John 12:36; Eph. 5:8); 1 Thess. 5:5
  - type: text
    content: the sons of light.
  '9':
  - type: text
    content: '“And I say to you, '
  - type: note
    content: Dan. 4:27; (Matt. 6:19; 19:21); Luke 11:41; (1 Tim. 6:17–19)
  - type: text
    content: 'make friends for yourselves by unrighteous '
  - type: text
    content: 'mammon, that when '
  - type: text
    content: you fail,
  - type: text
    content: ' they may receive you into an everlasting home.'
  - type: text
    content: ' '
