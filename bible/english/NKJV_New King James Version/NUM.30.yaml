document_id: NUM.30
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Law Concerning Vows
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Moses spoke to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 1:4, 16; 7:2
    marker-yv: yv-n
  - type: text
    text: 'the heads of the tribes concerning the children of Israel, saying, “This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the thing which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 27:2; Deut. 23:21–23; Judg. 11:30, 31, 35; Eccl. 5:4
    marker-yv: yv-n
  - type: text
    text: 'If a man makes a vow to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', or '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 5:4; Matt. 14:9; Acts 23:14
    marker-yv: yv-n
  - type: text
    text: 'swears an oath to bind himself by some agreement, he shall not break his word; he shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 22:27; Ps. 22:25; 50:14; 66:13, 14; Nah. 1:15
    marker-yv: yv-n
  - type: text
    text: do according to all that proceeds out of his mouth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Or if a woman makes a vow to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and binds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: herself
  - type: text
    text: ' by some agreement while in her father’s house in her youth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and her father hears her vow and the agreement by which she has bound herself, and her father holds his peace, then all her vows shall stand, and every agreement with which she has bound herself shall stand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But if her father overrules her on the day that he hears, then none of her vows nor her agreements by which she has bound herself shall stand; and the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will release her, because her father overruled her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“If indeed she takes a husband, while bound by her vows or by a rash utterance from her lips by which she bound herself, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and her husband hears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it,
  - type: text
    text: ' and makes no response to her on the day that he hears, then her vows shall stand, and her agreements by which she bound herself shall stand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But if her husband '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Gen. 3:16)
    marker-yv: yv-n
  - type: text
    text: 'overrules her on the day that he hears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it,
  - type: text
    text: ' he shall make void her vow which she took and what she uttered with her lips, by which she bound herself, and the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will release her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Also any vow of a widow or a divorced woman, by which she has bound herself, shall stand against her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“If she vowed in her husband’s house, or bound herself by an agreement with an oath, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and her husband heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it,
  - type: text
    text: ' and made no response to her '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' did not overrule her, then all her vows shall stand, and every agreement by which she bound herself shall stand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But if her husband truly made them void on the day he heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them,
  - type: text
    text: ' then whatever proceeded from her lips concerning her vows or concerning the agreement binding her, it shall not stand; her husband has made them void, and the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will release her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Every vow and every binding oath to afflict her soul, her husband may confirm it, or her husband may make it void. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now if her husband makes no response whatever to her from day to day, then he confirms all her vows or all the agreements that bind her; he confirms them, because he made no response to her on the day that he heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But if he does make them void after he has heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them,
  - type: text
    text: ' then he shall bear her guilt.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' the statutes which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses, between a man and his wife, and between a father and his daughter in her youth in her father’s house.'
