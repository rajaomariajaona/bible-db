document_id: NUM.30,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Law Concerning Vows
  - type: text
    content: 'Then Moses spoke to '
  - type: note
    content: Num. 1:4, 16; 7:2
  - type: text
    content: 'the heads of the tribes concerning the children of Israel, saying, “This '
  - type: text
    content: is
  - type: text
    content: ' the thing which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has commanded: '
  '10':
  - type: text
    content: '“If she vowed in her husband’s house, or bound herself by an agreement with an oath, '
  '11':
  - type: text
    content: 'and her husband heard '
  - type: text
    content: it,
  - type: text
    content: ' and made no response to her '
  - type: text
    content: and
  - type: text
    content: ' did not overrule her, then all her vows shall stand, and every agreement by which she bound herself shall stand. '
  '12':
  - type: text
    content: 'But if her husband truly made them void on the day he heard '
  - type: text
    content: them,
  - type: text
    content: ' then whatever proceeded from her lips concerning her vows or concerning the agreement binding her, it shall not stand; her husband has made them void, and the '
  - type: heading
    content: Lord
  - type: text
    content: ' will release her. '
  '13':
  - type: text
    content: 'Every vow and every binding oath to afflict her soul, her husband may confirm it, or her husband may make it void. '
  '14':
  - type: text
    content: 'Now if her husband makes no response whatever to her from day to day, then he confirms all her vows or all the agreements that bind her; he confirms them, because he made no response to her on the day that he heard '
  - type: text
    content: them.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'But if he does make them void after he has heard '
  - type: text
    content: them,
  - type: text
    content: ' then he shall bear her guilt.”'
  '16':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the statutes which the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses, between a man and his wife, and between a father and his daughter in her youth in her father’s house.'
  '2':
  - type: note
    content: Lev. 27:2; Deut. 23:21–23; Judg. 11:30, 31, 35; Eccl. 5:4
  - type: text
    content: 'If a man makes a vow to the '
  - type: heading
    content: Lord
  - type: text
    content: ', or '
  - type: note
    content: Lev. 5:4; Matt. 14:9; Acts 23:14
  - type: text
    content: 'swears an oath to bind himself by some agreement, he shall not break his word; he shall '
  - type: note
    content: Job 22:27; Ps. 22:25; 50:14; 66:13, 14; Nah. 1:15
  - type: text
    content: do according to all that proceeds out of his mouth.
  '3':
  - type: text
    content: '“Or if a woman makes a vow to the '
  - type: heading
    content: Lord
  - type: text
    content: ', and binds '
  - type: text
    content: herself
  - type: text
    content: ' by some agreement while in her father’s house in her youth, '
  '4':
  - type: text
    content: 'and her father hears her vow and the agreement by which she has bound herself, and her father holds his peace, then all her vows shall stand, and every agreement with which she has bound herself shall stand. '
  '5':
  - type: text
    content: 'But if her father overrules her on the day that he hears, then none of her vows nor her agreements by which she has bound herself shall stand; and the '
  - type: heading
    content: Lord
  - type: text
    content: ' will release her, because her father overruled her.'
  '6':
  - type: text
    content: '“If indeed she takes a husband, while bound by her vows or by a rash utterance from her lips by which she bound herself, '
  '7':
  - type: text
    content: 'and her husband hears '
  - type: text
    content: it,
  - type: text
    content: ' and makes no response to her on the day that he hears, then her vows shall stand, and her agreements by which she bound herself shall stand. '
  '8':
  - type: text
    content: 'But if her husband '
  - type: note
    content: (Gen. 3:16)
  - type: text
    content: 'overrules her on the day that he hears '
  - type: text
    content: it,
  - type: text
    content: ' he shall make void her vow which she took and what she uttered with her lips, by which she bound herself, and the '
  - type: heading
    content: Lord
  - type: text
    content: ' will release her.'
  '9':
  - type: text
    content: “Also any vow of a widow or a divorced woman, by which she has bound herself, shall stand against her.
