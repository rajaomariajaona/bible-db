  - type: text
    text: The Mighty Angel with the Little Book
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I saw still another mighty angel coming down from heaven, clothed with a cloud. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 1:26–28; Rev. 4:3
    marker-yv: yv-n
  - type: text
    text: 'And a rainbow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' on '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 17:2; Rev. 1:16
    marker-yv: yv-n
  - type: text
    text: 'his head, his face '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' like the sun, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 1:15
    marker-yv: yv-n
  - type: text
    text: 'his feet like pillars of fire. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He had a little book open in his hand. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 95:5; Matt. 28:18
    marker-yv: yv-n
  - type: text
    text: 'And he set his right foot on the sea and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' left '
  - type: usfm
    marker: it
    children:
    - type: text
      text: foot
  - type: text
    text: ' on the land, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and cried with a loud voice, as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: when
  - type: text
    text: ' a lion roars. When he cried out, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 29:3–9; Rev. 4:5; 8:5
    marker-yv: yv-n
  - type: text
    text: 'seven thunders uttered their voices. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now when the seven thunders uttered their voices, I was about to write; but I heard a voice from heaven saying to me, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 8:26; 12:4, 9; Rev. 22:10
    marker-yv: yv-n
  - type: text
    text: “Seal up the things which the seven thunders uttered, and do not write them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The angel whom I saw standing on the sea and on the land '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 6:8; Deut. 32:40; Dan. 12:7
    marker-yv: yv-n
  - type: text
    text: 'raised up his hand to heaven '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and swore by Him who lives forever and ever, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 1:1; Ex. 20:11; Neh. 9:6; Rev. 4:11
    marker-yv: yv-n
  - type: text
    text: 'who created heaven and the things that are in it, the earth and the things that are in it, and the sea and the things that are in it, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 12:7; Rev. 16:17
    marker-yv: yv-n
  - type: text
    text: 'that there should be delay no longer, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 11:15
    marker-yv: yv-n
  - type: text
    text: in the days of the sounding of the seventh angel, when he is about to sound, the mystery of God would be finished, as He declared to His servants the prophets.
- type: usfm
  marker: s1
  children:
  - type: text
    text: John Eats the Little Book
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then the voice which I heard from heaven spoke to me again and said, “Go, take the little book which is open in the hand of the angel who stands on the sea and on the earth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So I went to the angel and said to him, “Give me the little book.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And he said to me, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 15:16; Ezek. 2:8; 3:1–3
    marker-yv: yv-n
  - type: text
    text: “Take and eat it; and it will make your stomach bitter, but it will be as sweet as honey in your mouth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then I took the little book out of the angel’s hand and ate it, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 3:3
    marker-yv: yv-n
  - type: text
    text: 'and it was as sweet as honey in my mouth. But when I had eaten it, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 2:10
    marker-yv: yv-n
  - type: text
    text: 'my stomach became bitter. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And he said to me, “You must prophesy again about many peoples, nations, tongues, and kings.”
