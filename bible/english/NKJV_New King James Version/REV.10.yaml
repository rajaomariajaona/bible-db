verses:
  '1':
  - type: heading
    content: The Mighty Angel with the Little Book
  - type: text
    content: 'I saw still another mighty angel coming down from heaven, clothed with a cloud. '
  - type: note
    content: Ezek. 1:26–28; Rev. 4:3
  - type: text
    content: 'And a rainbow '
  - type: text
    content: was
  - type: text
    content: ' on '
  - type: note
    content: Matt. 17:2; Rev. 1:16
  - type: text
    content: 'his head, his face '
  - type: text
    content: was
  - type: text
    content: ' like the sun, and '
  - type: note
    content: Rev. 1:15
  - type: text
    content: 'his feet like pillars of fire. '
  '10':
  - type: text
    content: 'Then I took the little book out of the angel’s hand and ate it, '
  - type: note
    content: Ezek. 3:3
  - type: text
    content: 'and it was as sweet as honey in my mouth. But when I had eaten it, '
  - type: note
    content: Ezek. 2:10
  - type: text
    content: 'my stomach became bitter. '
  '11':
  - type: text
    content: And he said to me, “You must prophesy again about many peoples, nations, tongues, and kings.”
  '2':
  - type: text
    content: 'He had a little book open in his hand. '
  - type: note
    content: Ps. 95:5; Matt. 28:18
  - type: text
    content: 'And he set his right foot on the sea and '
  - type: text
    content: his
  - type: text
    content: ' left '
  - type: text
    content: foot
  - type: text
    content: ' on the land, '
  '3':
  - type: text
    content: 'and cried with a loud voice, as '
  - type: text
    content: when
  - type: text
    content: ' a lion roars. When he cried out, '
  - type: note
    content: Ps. 29:3–9; Rev. 4:5; 8:5
  - type: text
    content: 'seven thunders uttered their voices. '
  '4':
  - type: text
    content: 'Now when the seven thunders uttered their voices, I was about to write; but I heard a voice from heaven saying to me, '
  - type: note
    content: Dan. 8:26; 12:4, 9; Rev. 22:10
  - type: text
    content: “Seal up the things which the seven thunders uttered, and do not write them.”
  '5':
  - type: text
    content: 'The angel whom I saw standing on the sea and on the land '
  - type: note
    content: Ex. 6:8; Deut. 32:40; Dan. 12:7
  - type: text
    content: 'raised up his hand to heaven '
  '6':
  - type: text
    content: 'and swore by Him who lives forever and ever, '
  - type: note
    content: Gen. 1:1; Ex. 20:11; Neh. 9:6; Rev. 4:11
  - type: text
    content: 'who created heaven and the things that are in it, the earth and the things that are in it, and the sea and the things that are in it, '
  - type: note
    content: Dan. 12:7; Rev. 16:17
  - type: text
    content: 'that there should be delay no longer, '
  '7':
  - type: text
    content: 'but '
  - type: note
    content: Rev. 11:15
  - type: text
    content: in the days of the sounding of the seventh angel, when he is about to sound, the mystery of God would be finished, as He declared to His servants the prophets.
  - type: heading
    content: John Eats the Little Book
  '8':
  - type: text
    content: Then the voice which I heard from heaven spoke to me again and said, “Go, take the little book which is open in the hand of the angel who stands on the sea and on the earth.”
  '9':
  - type: text
    content: So I went to the angel and said to him, “Give me the little book.”
  - type: text
    content: 'And he said to me, '
  - type: note
    content: Jer. 15:16; Ezek. 2:8; 3:1–3
  - type: text
    content: “Take and eat it; and it will make your stomach bitter, but it will be as sweet as honey in your mouth.”
