document_id: GEN.15,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Covenant with Abram
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After these things the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Abram '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:4; 46:2; 1 Sam. 15:10; Dan. 10:1
      marker-yv: yv-n
    - type: text
      text: 'in a vision, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 21:17; 26:24; Is. 41:10; Dan. 10:12
      marker-yv: yv-n
    - type: text
      text: '“Do not be afraid, Abram. I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 33:29; Ps. 3:3; 84:11; 91:4
      marker-yv: yv-n
    - type: text
      text: 'shield, your exceedingly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 18:20; Ps. 58:11; Prov. 11:18
      marker-yv: yv-n
    - type: text
      text: great reward.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he brought all these to Him and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:17; Jer. 34:18
      marker-yv: yv-n
    - type: text
      text: 'cut them in two, down the middle, and placed each piece opposite the other; but he did not cut '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:17
      marker-yv: yv-n
    - type: text
      text: 'the birds in two. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when the vultures came down on the carcasses, Abram drove them away.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when the sun was going down, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 2:21; 28:11; Job 33:15
      marker-yv: yv-n
    - type: text
      text: 'a deep sleep fell upon Abram; and behold, horror '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' great darkness fell upon him. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He said to Abram: “Know certainly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 1:11; Acts 7:6
      marker-yv: yv-n
    - type: text
      text: 'that your descendants will be strangers in a land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not theirs, and will serve them, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:40
      marker-yv: yv-n
    - type: text
      text: 'they will afflict them four hundred years. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And also the nation whom they serve '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 6:6
      marker-yv: yv-n
    - type: text
      text: 'I will judge; afterward '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:36
      marker-yv: yv-n
    - type: text
      text: 'they shall come out with great possessions. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now as for you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:26
      marker-yv: yv-n
    - type: text
      text: 'you shall go '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 25:8; 47:30
      marker-yv: yv-n
    - type: text
      text: 'to your fathers in peace; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 25:8
      marker-yv: yv-n
    - type: text
      text: 'you shall be buried at a good old age. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:13; Ex. 12:41
      marker-yv: yv-n
    - type: text
      text: 'in the fourth generation they shall return here, for the iniquity '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 48:22; Lev. 18:24–28; 1 Kin. 21:26
      marker-yv: yv-n
    - type: text
      text: 'of the Amorites '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:12; Matt. 23:32
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not yet complete.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when the sun went down and it was dark, that behold, there appeared a smoking oven and a burning torch that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 34:18, 19
      marker-yv: yv-n
    - type: text
      text: 'passed between those pieces. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the same day the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 24:7
      marker-yv: yv-n
    - type: text
      text: 'made a covenant with Abram, saying:'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:7; 17:8; Ex. 23:31; Num. 34:3; Deut. 11:24; Josh. 1:4; 21:43; Acts 7:5
      marker-yv: yv-n
    - type: text
      text: '“To your descendants I have given this land, from the river of Egypt to the great river, the River Euphrates— '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the Kenites, the Kenezzites, the Kadmonites, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:18
      marker-yv: yv-n
    - type: text
      text: 'But Abram said, “Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: ', what will You give me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 7:5
      marker-yv: yv-n
    - type: text
      text: 'seeing I go childless, and the heir of my house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Eliezer of Damascus?” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the Hittites, the Perizzites, the Rephaim, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the Amorites, the Canaanites, the Girgashites, and the Jebusites.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abram said, “Look, You have given me no offspring; indeed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:14
      marker-yv: yv-n
    - type: text
      text: one born in my house is my heir!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And behold, the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: came
    - type: text
      text: ' to him, saying, “This one shall not be your heir, but one who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:12; Gal. 4:28
      marker-yv: yv-n
    - type: text
      text: 'will come from your own body shall be your heir.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He brought him outside and said, “Look now toward heaven, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 22:17; 26:4; Deut. 1:10; Ps. 147:4
      marker-yv: yv-n
    - type: text
      text: 'count the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 33:22
      marker-yv: yv-n
    - type: text
      text: 'stars if you are able to number them.” And He said to him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 32:13; Rom. 4:18; Heb. 11:12
      marker-yv: yv-n
    - type: text
      text: '“So shall your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:19
      marker-yv: yv-n
    - type: text
      text: descendants be.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 21:1; Rom. 4:3, 9, 22; Gal. 3:6; James 2:23
      marker-yv: yv-n
    - type: text
      text: 'believed in the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 32:2; 106:31
      marker-yv: yv-n
    - type: text
      text: accounted it to him for righteousness.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He said to him, “I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:1
      marker-yv: yv-n
    - type: text
      text: 'brought you out of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 11:28, 31
      marker-yv: yv-n
    - type: text
      text: 'Ur of the Chaldeans, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 13:15, 17; Ps. 105:42, 44
      marker-yv: yv-n
    - type: text
      text: to give you this land to inherit it.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, “Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 24:13, 14; Judg. 6:36–40; 1 Sam. 14:9, 10; Luke 1:18
      marker-yv: yv-n
    - type: text
      text: how shall I know that I will inherit it?”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So He said to him, “Bring Me a three-year-old heifer, a three-year-old female goat, a three-year-old ram, a turtledove, and a young pigeon.” '
