document_id: PSA.9,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Prayer and Thanksgiving for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Righteous Judgments
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. To '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tune
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' “Death of the Son.” A Psalm of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You,
    - type: text
      text: ' O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', with my whole heart;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will tell of all Your marvelous works.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And those who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 91:14
      marker-yv: yv-n
    - type: text
      text: know Your name will put their trust in You;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For You, '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have not forsaken those who seek You.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing praises to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who dwells in Zion!'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 66:16; 107:22
      marker-yv: yv-n
    - type: text
      text: Declare His deeds among the people.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 9:5; Ps. 72:14)
      marker-yv: yv-n
    - type: text
      text: When He avenges blood, He remembers them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He does not forget the cry of the humble.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Have mercy on me, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Consider my trouble from those who hate me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You who lift me up from the gates of death,
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I may tell of all Your praise
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the gates of the daughter of Zion.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 13:5; 20:5; 35:9
      marker-yv: yv-n
    - type: text
      text: rejoice in Your salvation.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 7:15, 16
      marker-yv: yv-n
    - type: text
      text: 'The nations have sunk down in the pit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' they made;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the net which they hid, their own foot is caught.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 7:5
      marker-yv: yv-n
    - type: text
      text: 'known '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by
    - type: text
      text: ' the judgment He executes;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The wicked is snared in the work of his own hands.
  - type: usfm
    marker: pc
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 92:3
      marker-yv: yv-n
    - type: text
      text: Meditation.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked shall be turned into hell,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' all the nations '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 8:13; Ps. 50:22
      marker-yv: yv-n
    - type: text
      text: that forget God.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 9:12; 12:5
      marker-yv: yv-n
    - type: text
      text: For the needy shall not always be forgotten;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 62:5; 71:5); Prov. 23:18
      marker-yv: yv-n
    - type: text
      text: 'The expectation of the poor shall '
    - type: usfm
      marker: it
      children:
      - type: text
        text: not
    - type: text
      text: ' perish forever.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Arise, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not let man prevail;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the nations be judged in Your sight.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will be glad and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 5:11; 104:34
      marker-yv: yv-n
    - type: text
      text: rejoice in You;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will sing praise to Your name, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 83:18; 92:1)
      marker-yv: yv-n
    - type: text
      text: O Most High.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Put them in fear, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That
    - type: text
      text: ' the nations may know themselves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' men.'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When my enemies turn back,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They shall fall and perish at Your presence.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For You have maintained my right and my cause;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You sat on the throne judging in righteousness.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have rebuked the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have destroyed the wicked;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 10:7
      marker-yv: yv-n
    - type: text
      text: blotted out their name forever and ever.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O enemy, destructions are finished forever!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And you have destroyed cities;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Even their memory has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 34:16)
      marker-yv: yv-n
    - type: text
      text: perished.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 102:12, 26; Heb. 1:11
      marker-yv: yv-n
    - type: text
      text: 'But the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shall endure forever;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has prepared His throne for judgment.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 96:13; 98:9; Acts 17:31)
      marker-yv: yv-n
    - type: text
      text: He shall judge the world in righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And He shall administer judgment for the peoples in uprightness.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' also will be a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 32:7; 46:1; 91:2
      marker-yv: yv-n
    - type: text
      text: refuge for the oppressed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A refuge in times of trouble.
