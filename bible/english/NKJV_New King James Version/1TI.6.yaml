document_id: 1TI.6,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Honor Masters
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Let as many '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:5; Titus 2:9; 1 Pet. 2:18
      marker-yv: yv-n
    - type: text
      text: 'bondservants as are under the yoke count their own masters worthy of all honor, so that the name of God and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' doctrine may not be blasphemed. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For the love of money is a root of all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kinds
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' evil, for which some have strayed from the faith in their greediness, and pierced themselves through with many sorrows.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Good Confession
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But you, O man of God, flee these things and pursue righteousness, godliness, faith, love, patience, gentleness. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fight the good fight of faith, lay hold on eternal life, to which you were also called and have confessed the good confession in the presence of many witnesses. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'I urge you in the sight of God who gives life to all things, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: before
    - type: text
      text: ' Christ Jesus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:2; John 18:36, 37
      marker-yv: yv-n
    - type: text
      text: 'who witnessed the good confession before Pontius Pilate, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'that you keep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this
    - type: text
      text: ' commandment without spot, blameless until our Lord Jesus Christ’s appearing, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'which He will manifest in His own time, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the blessed and only Potentate, the King of kings and Lord of lords, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'who alone has immortality, dwelling in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 2:22
      marker-yv: yv-n
    - type: text
      text: 'unapproachable light, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 6:46
      marker-yv: yv-n
    - type: text
      text: 'whom no man has seen or can see, to whom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' honor and everlasting power. Amen.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Instructions to the Rich
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Command those who are rich in this present age not to be haughty, nor to trust in uncertain '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 9:23; 48:7
      marker-yv: yv-n
    - type: text
      text: 'riches but in the living God, who gives us richly all things '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 5:18, 19
      marker-yv: yv-n
    - type: text
      text: 'to enjoy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Let
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' do good, that they be rich in good works, ready to give, willing to share, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 6:20, 21; 19:21)
      marker-yv: yv-n
    - type: text
      text: storing up for themselves a good foundation for the time to come, that they may lay hold on eternal life.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guard the Faith
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And those who have believing masters, let them not despise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' because they are brethren, but rather serve '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' because those who are benefited are believers and beloved. Teach and exhort these things.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Error and Greed
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'O Timothy! '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Tim. 1:12, 14)
      marker-yv: yv-n
    - type: text
      text: 'Guard what was committed to your trust, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Titus 1:14
      marker-yv: yv-n
    - type: text
      text: 'avoiding the profane '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' idle babblings and contradictions of what is falsely called knowledge— '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: by professing it some have strayed concerning the faith.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Grace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' with you. Amen.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'If anyone teaches otherwise and does not consent to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 1:13
      marker-yv: yv-n
    - type: text
      text: 'wholesome words, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' the words of our Lord Jesus Christ, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Titus 1:1
      marker-yv: yv-n
    - type: text
      text: 'and to the doctrine which accords with godliness, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'he is proud, knowing nothing, but is obsessed with disputes and arguments over words, from which come envy, strife, reviling, evil suspicions, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'useless wranglings of men of corrupt minds and destitute of the truth, who suppose that godliness is a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: means
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' gain. From '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 3:5
      marker-yv: yv-n
    - type: text
      text: such withdraw yourself.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now godliness with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 4:11; Heb. 13:5
      marker-yv: yv-n
    - type: text
      text: 'contentment is great gain. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For we brought nothing into '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this
    - type: text
      text: ' world, and it is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:21; Ps. 49:17; Eccl. 5:15
      marker-yv: yv-n
    - type: text
      text: 'certain we can carry nothing out. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And having food and clothing, with these we shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 30:8, 9
      marker-yv: yv-n
    - type: text
      text: 'content. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But those who desire to be rich fall into temptation and a snare, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: into
    - type: text
      text: ' many foolish and harmful lusts which drown men in destruction and perdition. '
