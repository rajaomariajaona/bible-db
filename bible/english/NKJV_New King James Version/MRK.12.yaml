  - type: text
    content: And they sought to lay hands on Him, but feared the multitude, for they knew He had spoken the parable against them. So they left Him and went away.
  - type: heading
    content: 'The Pharisees: Is It Lawful to Pay Taxes to Caesar?'
  '13':
  - type: note
    content: Matt. 22:15–22; Luke 20:20–26
  - type: text
    content: 'Then they sent to Him some of the Pharisees and the Herodians, to catch Him in '
  - type: text
    content: His
  - type: text
    content: ' words. '
  '14':
  - type: text
    content: 'When they had come, they said to Him, “Teacher, we know that You are true, and care about no one; for You do not regard the person of men, but teach the '
  - type: note
    content: Acts 18:26
  - type: text
    content: 'way of God in truth. Is it lawful to pay taxes to Caesar, or not? '
  '15':
  - type: text
    content: Shall we pay, or shall we not pay?”
  - type: text
    content: 'But He, knowing their '
  - type: note
    content: Matt. 23:28; Luke 12:1
  - type: text
    content: 'hypocrisy, said to them, '
  - type: text
    content: '“Why do you test Me? Bring Me a denarius that I may see '
  - type: text
    content: it.
  - type: text
    content: ”
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'So they brought '
  - type: text
    content: it.
  - type: text
    content: 'And He said to them, '
  - type: text
    content: '“Whose image and inscription '
  - type: text
    content: is
  - type: text
    content: ' this?”'
  - type: text
    content: ' They said to Him, “Caesar’s.”'
  '17':
  - type: text
    content: 'And Jesus answered and said to them, '
  - type: text
    content: '“Render to Caesar the things that are Caesar’s, and to '
  - type: note
    content: (Eccl. 5:4, 5)
  - type: text
    content: God the things that are God’s.”
  - type: text
    content: And they marveled at Him.
  - type: heading
    content: 'The Sadducees: What About the Resurrection?'
  '18':
  - type: note
    content: Matt. 22:23–33; Luke 20:27–38
  - type: text
    content: 'Then '
  - type: text
    content: some
  - type: text
    content: ' Sadducees, '
  - type: note
    content: Acts 23:8
  - type: text
    content: 'who say there is no resurrection, came to Him; and they asked Him, saying: '
  '19':
  - type: text
    content: '“Teacher, '
  - type: note
    content: Deut. 25:5
  - type: text
    content: 'Moses wrote to us that if a man’s brother dies, and leaves '
  - type: text
    content: his
  - type: text
    content: ' wife behind, and leaves no children, his brother should take his wife and raise up offspring for his brother. '
  '2':
  - type: text
    content: Now at vintage-time he sent a servant to the vinedressers, that he might receive some of the fruit of the vineyard from the vinedressers.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Now there were seven brothers. The first took a wife; and dying, he left no offspring. '
  '21':
  - type: text
    content: 'And the second took her, and he died; nor did he leave any offspring. And the third likewise. '
  '22':
  - type: text
    content: 'So the seven had her and left no offspring. Last of all the woman died also. '
  '23':
  - type: text
    content: Therefore, in the resurrection, when they rise, whose wife will she be? For all seven had her as wife.”
  '24':
  - type: text
    content: 'Jesus answered and said to them, '
  - type: text
    content: '“Are you not therefore '
  - type: text
    content: mistaken, because you do not know the Scriptures nor the power of God?
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'For when they rise from the dead, they neither marry nor are given in marriage, but '
  - type: note
    content: (1 Cor. 15:42, 49, 52)
  - type: text
    content: are like angels in heaven.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'But concerning the dead, that they '
  - type: note
    content: (John 5:25, 28, 29); Acts 26:8; Rom. 4:17; (Rev. 20:12, 13)
  - type: text
    content: 'rise, have you not read in the book of Moses, in the '
  - type: text
    content: burning
  - type: text
    content: ' bush '
  - type: text
    content: passage,
  - type: text
    content: ' how God spoke to him, saying, '
  - type: note
    content: Ex. 3:6, 15
  - type: text
    content: ‘I
  - type: text
    content: ' '
  - type: text
    content: am
  - type: text
    content: ' '
  - type: text
    content: the God of Abraham, the God of Isaac, and the God of Jacob’?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'He is not the God of the dead, but the God of the living. You are therefore greatly '
  - type: text
    content: mistaken.”
  - type: heading
    content: 'The Scribes: Which Is the First Commandment of All?'
  '28':
  - type: note
    content: Matt. 22:34–40; Luke 10:25–28; 20:39
  - type: text
    content: Then one of the scribes came, and having heard them reasoning together, perceiving that He had answered them well, asked Him, “Which is the first commandment of all?”
  '29':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: '“The '
  - type: text
    content: 'first of all the commandments '
  - type: text
    content: 'is:'
  - type: text
    content: ' '
  - type: note
    content: Deut. 6:4, 5; Is. 44:8; 45:22; 46:9; 1 Cor. 8:6
  - type: text
    content: '‘Hear, O Israel, the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God, the '
  - type: heading
    content: Lord
  - type: text
    content: ' is one.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And they took '
  - type: text
    content: him
  - type: text
