  '34':
  - type: text
    content: 'Now when Jesus saw that he answered wisely, He said to him, '
  - type: text
    content: “You are not far from the kingdom of God.”
  - type: note
    content: Matt. 22:46
  - type: text
    content: But after that no one dared question Him.
  - type: heading
    content: 'Jesus: How Can David Call His Descendant Lord?'
