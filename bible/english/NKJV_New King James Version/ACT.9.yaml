document_id: ACT.9,114
type_code: eng
verses:
  '1':
  - type: heading
    content: 'The Damascus Road: Saul Converted'
  - type: text
    content: 'Then '
  - type: note
    content: Acts 7:57; 8:1, 3; 26:10, 11; Gal. 1:13; 1 Tim. 1:13
  - type: text
    content: 'Saul, still breathing threats and murder against the disciples of the Lord, went to the high priest '
  '10':
  - type: text
    content: 'Now there was a certain disciple at Damascus '
  - type: note
    content: Acts 22:12
  - type: text
    content: 'named Ananias; and to him the Lord said in a vision, '
  - type: text
    content: “Ananias.”
  - type: text
    content: And he said, “Here I am, Lord.”
  '11':
  - type: text
    content: 'So the Lord '
  - type: text
    content: said
  - type: text
    content: ' to him, '
  - type: text
    content: '“Arise and go to the street called Straight, and inquire at the house of Judas for '
  - type: text
    content: one
  - type: text
    content: ' called Saul '
  - type: note
    content: Acts 21:39; 22:3
  - type: text
    content: of Tarsus, for behold, he is praying.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And in a vision he has seen a man named Ananias coming in and putting '
  - type: text
    content: his
  - type: text
    content: ' hand on him, so that he might receive his sight.”'
  '13':
  - type: text
    content: 'Then Ananias answered, “Lord, I have heard from many about this man, '
  - type: note
    content: Acts 9:1
  - type: text
    content: 'how much harm he has done to Your saints in Jerusalem. '
  '14':
  - type: text
    content: 'And here he has authority from the chief priests to bind all '
  - type: note
    content: Acts 7:59; 9:2, 21; 1 Cor. 1:2; 2 Tim. 2:22
  - type: text
    content: who call on Your name.”
  '15':
  - type: text
    content: 'But the Lord said to him, '
  - type: text
    content: '“Go, for '
  - type: note
    content: Acts 13:2; 22:21; Rom. 1:1; 1 Cor. 15:10; Gal. 1:15; Eph. 3:7, 8; 1 Tim. 2:7; 2 Tim. 1:11
  - type: text
    content: 'he is a chosen vessel of Mine to bear My name before '
  - type: note
    content: Rom. 1:5; 11:13; Gal. 2:7, 8
  - type: text
    content: 'Gentiles, '
  - type: note
    content: Acts 25:22, 23; 26:1
  - type: text
    content: 'kings, and the '
  - type: note
    content: Acts 21:40; Rom. 1:16; 9:1–5
  - type: text
    content: children
  - type: text
    content: ' of Israel.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'For '
  - type: note
    content: Acts 20:23; 2 Cor. 11:23–28; 12:7–10; Gal. 6:17; Phil. 1:29, 30
  - type: text
    content: 'I will show him how many things he must suffer for My '
  - type: note
    content: 2 Cor. 4:11
  - type: text
    content: name’s sake.”
  '17':
  - type: note
    content: Acts 22:12, 13
  - type: text
    content: 'And Ananias went his way and entered the house; and '
  - type: note
    content: Acts 8:17
  - type: text
    content: 'laying his hands on him he said, “Brother Saul, the Lord Jesus, who appeared to you on the road as you came, has sent me that you may receive your sight and '
  - type: note
    content: Acts 2:4; 4:31; 8:17; 13:52
  - type: text
    content: 'be filled with the Holy Spirit.” '
  '18':
  - type: text
    content: 'Immediately there fell from his eyes '
  - type: text
    content: something
  - type: text
    content: ' like scales, and he received his sight at once; and he arose and was baptized.'
  '19':
  - type: text
    content: 'So when he had received food, he was strengthened. '
  - type: note
    content: Acts 26:20
  - type: text
    content: Then Saul spent some days with the disciples at Damascus.
  - type: heading
    content: Saul Preaches Christ
  '2':
  - type: text
    content: 'and asked '
  - type: note
    content: Acts 22:5
  - type: text
    content: letters from him to the synagogues of Damascus, so that if he found any who were of the Way, whether men or women, he might bring them bound to Jerusalem.
  '20':
  - type: text
    content: Immediately he preached the Christ in the synagogues, that He is the Son of God.
  '21':
  - type: text
    content: 'Then all who heard were amazed, and said, '
  - type: note
    content: Acts 8:3; 9:13; Gal. 1:13, 23
  - type: text
    content: “Is this not he who destroyed those who called on this name in Jerusalem, and has come here for that purpose, so that he might bring them bound to the chief priests?”
  '22':
  - type: text
    content: 'But Saul increased all the more in strength, '
  - type: note
    content: Acts 18:28
  - type: text
    content: 'and confounded the Jews who dwelt in Damascus, proving that this '
  - type: text
    content: Jesus
  - type: text
    content: ' is the Christ.'
  - type: heading
    content: Saul Escapes Death
  '23':
  - type: text
    content: 'Now after many days were past, '
  - type: note
    content: Acts 23:12; 2 Cor. 11:26
  - type: text
    content: 'the Jews plotted to kill him. '
  '24':
  - type: note
    content: 2 Cor. 11:32
  - type: text
    content: 'But their plot became known to Saul. And they watched the gates day and night, to kill him. '
  '25':
  - type: text
    content: 'Then the disciples took him by night and '
  - type: note
    content: Josh. 2:15; 1 Sam. 19:12
  - type: text
    content: 'let '
  - type: text
    content: him
  - type: text
    content: ' down through the wall in a large basket.'
  - type: heading
    content: Saul at Jerusalem
  '26':
  - type: text
    content: 'And '
  - type: note
    content: Acts 22:17–20; 26:20; Gal. 1:17, 18
  - type: text
    content: 'when Saul had come to Jerusalem, he tried to join the disciples; but they were all afraid of him, and did not believe that he was a disciple. '
  '27':
  - type: note
    content: Acts 4:36; 13:2
  - type: text
    content: 'But Barnabas took him and brought '
  - type: text
    content: him
  - type: text
    content: ' to the apostles. And he declared to them how he had seen the Lord on the road, and that He had spoken to him, '
  - type: note
    content: Acts 9:20, 22
  - type: text
    content: 'and how he had preached boldly at Damascus in the name of Jesus. '
  '28':
  - type: text
    content: 'So '
  - type: note
    content: Gal. 1:18
  - type: text
    content: 'he was with them at Jerusalem, coming in and going out. '
  '29':
  - type: text
    content: 'And he spoke boldly in the name of the Lord Jesus and disputed against the '
  - type: note
    content: Acts 6:1; 11:20
  - type: text
    content: 'Hellenists, '
  - type: note
    content: Acts 9:23; 2 Cor. 11:26
  - type: text
    content: 'but they attempted to kill him. '
  '3':
  - type: note
    content: Acts 22:6; 26:12, 13; 1 Cor. 15:8
  - type: text
    content: 'As he journeyed he came near Damascus, and suddenly a light shone around him from heaven. '
  '30':
  - type: text
    content: When the brethren found out, they brought him down to Caesarea and sent him out to Tarsus.
  - type: heading
    content: The Church Prospers
  '31':
  - type: note
    content: Acts 5:11; 8:1; 16:5
  - type: text
    content: 'Then the churches throughout all Judea, Galilee, and Samaria had peace and were '
  - type: note
    content: (Eph. 4:16, 29)
  - type: text
    content: 'edified. And walking in the '
  - type: note
    content: Ps. 34:9
  - type: text
    content: 'fear of the Lord and in the '
  - type: note
    content: John 14:16
  - type: text
    content: 'comfort of the Holy Spirit, they were '
  - type: note
    content: Acts 16:5
  - type: text
    content: multiplied.
  - type: heading
    content: Aeneas Healed
  '32':
  - type: text
    content: 'Now it came to pass, as Peter went '
  - type: note
    content: Acts 8:14
  - type: text
    content: 'through all '
  - type: text
    content: parts
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: country,
  - type: text
    content: ' that he also came down to the saints who dwelt in Lydda. '
  '33':
  - type: text
    content: 'There he found a certain man named Aeneas, who had been bedridden eight years and was paralyzed. '
  '34':
  - type: text
    content: 'And Peter said to him, “Aeneas, '
  - type: note
    content: (Acts 3:6, 16; 4:10)
  - type: text
    content: 'Jesus the Christ heals you. Arise and make your bed.” Then he arose immediately. '
  '35':
  - type: text
    content: 'So all who dwelt at Lydda and '
  - type: note
    content: 1 Chr. 5:16; 27:29; Is. 33:9; 35:2; 65:10
  - type: text
    content: 'Sharon saw him and '
  - type: note
    content: Acts 11:21; 15:19
  - type: text
    content: turned to the Lord.
  - type: heading
    content: Dorcas Restored to Life
  '36':
  - type: text
    content: 'At Joppa there was a certain disciple named Tabitha, which is translated Dorcas. This woman was full '
  - type: note
    content: 1 Tim. 2:10; Titus 3:8
  - type: text
    content: 'of good works and charitable deeds which she did. '
  '37':
  - type: text
    content: 'But it happened in those days that she became sick and died. When they had washed her, they laid '
  - type: text
    content: her
  - type: text
    content: ' in '
  - type: note
    content: Acts 1:13; 9:39
  - type: text
    content: 'an upper room. '
  '38':
  - type: text
    content: 'And since Lydda was near Joppa, and the disciples had heard that Peter was there, they sent two men to him, imploring '
  - type: text
    content: him
  - type: text
    content: ' not to delay in coming to them. '
  '39':
  - type: text
    content: 'Then Peter arose and went with them. When he had come, they brought '
  - type: text
    content: him
  - type: text
    content: ' to the upper room. And all the widows stood by him weeping, showing the tunics and garments which Dorcas had made while she was with them. '
  '4':
  - type: text
    content: 'Then he fell to the ground, and heard a voice saying to him, '
  - type: text
    content: '“Saul, Saul, '
  - type: note
    content: (Matt. 25:40)
  - type: text
    content: why are you persecuting Me?”
  '40':
  - type: text
    content: 'But Peter '
  - type: note
    content: Matt. 9:25
  - type: text
    content: 'put them all out, and '
  - type: note
    content: Luke 22:41; Acts 7:60
  - type: text
    content: 'knelt down and prayed. And turning to the body he '
  - type: note
    content: Mark 5:41, 42; John 11:43
  - type: text
    content: 'said, “Tabitha, arise.” And she opened her eyes, and when she saw Peter she sat up. '
  '41':
  - type: text
    content: 'Then he gave her '
  - type: text
    content: his
  - type: text
    content: ' hand and lifted her up; and when he had called the saints and widows, he presented her alive. '
  '42':
  - type: text
    content: 'And it became known throughout all Joppa, '
  - type: note
    content: John 11:45
  - type: text
    content: 'and many believed on the Lord. '
  '43':
  - type: text
    content: 'So it was that he stayed many days in Joppa with '
  - type: note
    content: Acts 10:6
  - type: text
    content: Simon, a tanner.
  '5':
  - type: text
    content: And he said, “Who are You, Lord?”
  - type: text
    content: 'Then the Lord said, '
  - type: text
    content: “I am Jesus, whom you are persecuting.
  - type: text
    content: ' '
  - type: text
    content: 'It '
  - type: text
    content: is
  - type: text
    content: ' hard for you to kick against the goads.”'
  '6':
  - type: text
    content: So he, trembling and astonished, said, “Lord, what do You want me to do?”
  - type: text
    content: 'Then the Lord '
  - type: text
    content: said
  - type: text
    content: ' to him, '
  - type: text
    content: “Arise and go into the city, and you will be told what you must do.”
  '7':
  - type: text
    content: 'And '
  - type: note
    content: Dan. 10:7; John 12:29; (Acts 22:9; 26:13)
  - type: text
    content: 'the men who journeyed with him stood speechless, hearing a voice but seeing no one. '
  '8':
  - type: text
    content: 'Then Saul arose from the ground, and when his eyes were opened he saw no one. But they led him by the hand and brought '
  - type: text
    content: him
  - type: text
    content: ' into Damascus. '
  '9':
  - type: text
    content: And he was three days without sight, and neither ate nor drank.
  - type: heading
    content: Ananias Baptizes Saul
