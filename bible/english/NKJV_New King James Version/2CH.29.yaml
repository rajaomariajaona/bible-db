      - type: text
        text: Lev. 4:3–14
      marker-yv: yv-n
    - type: text
      text: 'sin offering for the kingdom, for the sanctuary, and for Judah. Then he commanded the priests, the sons of Aaron, to offer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' on the altar of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '22':
  - type: usfm
