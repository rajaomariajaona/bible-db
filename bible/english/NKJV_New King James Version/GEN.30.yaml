  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Leah conceived again and bore Jacob a sixth son. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Leah said, “God has endowed me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
