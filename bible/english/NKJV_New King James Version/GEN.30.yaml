document_id: GEN.30,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'Now when Rachel saw that '
  - type: note
    content: Gen. 16:1, 2; 29:31
  - type: text
    content: 'she bore Jacob no children, Rachel '
  - type: note
    content: Gen. 37:11
  - type: text
    content: 'envied her sister, and said to Jacob, “Give me children, '
  - type: note
    content: 1 Sam. 1:5, 6; (Job 5:2)
  - type: text
    content: or else I die!”
  '10':
  - type: text
    content: 'And Leah’s maid Zilpah bore Jacob a son. '
  '11':
  - type: text
    content: 'Then Leah said, “A troop comes!” So she called his name Gad. '
  '12':
  - type: text
    content: 'And Leah’s maid Zilpah bore Jacob a second son. '
  '13':
  - type: text
    content: 'Then Leah said, “I am happy, for the daughters '
  - type: note
    content: Prov. 31:28; Luke 1:48
  - type: text
    content: will call me blessed.” So she called his name Asher.
  '14':
  - type: text
    content: 'Now Reuben went in the days of wheat harvest and found mandrakes in the field, and brought them to his mother Leah. Then Rachel said to Leah, '
  - type: note
    content: Gen. 25:30
  - type: text
    content: '“Please give me '
  - type: text
    content: some
  - type: text
    content: ' of your son’s mandrakes.”'
  '15':
  - type: text
    content: 'But she said to her, '
  - type: note
    content: (Num. 16:9, 13)
  - type: text
    content: “
  - type: text
    content: Is
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' a small matter that you have taken away my husband? Would you take away my son’s mandrakes also?”'
  - type: text
    content: And Rachel said, “Therefore he will lie with you tonight for your son’s mandrakes.”
  '16':
  - type: text
    content: When Jacob came out of the field in the evening, Leah went out to meet him and said, “You must come in to me, for I have surely hired you with my son’s mandrakes.” And he lay with her that night.
  '17':
  - type: text
    content: 'And God listened to Leah, and she conceived and bore Jacob a fifth son. '
  '18':
  - type: text
    content: 'Leah said, “God has given me my wages, because I have given my maid to my husband.” So she called his name Issachar. '
  '19':
  - type: text
    content: 'Then Leah conceived again and bore Jacob a sixth son. '
  '2':
  - type: text
    content: 'And Jacob’s anger was aroused against Rachel, and he said, '
  - type: note
    content: Gen. 16:2; 1 Sam. 1:5
  - type: text
    content: “
  - type: text
    content: Am
  - type: text
    content: ' I in the place of God, who has withheld from you the fruit of the womb?”'
  '20':
  - type: text
    content: 'And Leah said, “God has endowed me '
  - type: text
    content: with
  - type: text
    content: ' a good endowment; now my husband will dwell with me, because I have borne him six sons.” So she called his name Zebulun. '
  '21':
  - type: text
    content: 'Afterward she bore a '
  - type: note
    content: Gen. 34:1
  - type: text
    content: daughter, and called her name Dinah.
  '22':
  - type: text
    content: 'Then God '
  - type: note
    content: Gen. 19:29; 1 Sam. 1:19, 20
  - type: text
    content: 'remembered Rachel, and God listened to her and '
  - type: note
    content: Gen. 29:31
  - type: text
    content: 'opened her womb. '
  '23':
  - type: text
    content: 'And she conceived and bore a son, and said, “God has taken away '
  - type: note
    content: 1 Sam. 1:6; Is. 4:1; Luke 1:25
  - type: text
    content: 'my reproach.” '
  '24':
  - type: text
    content: 'So she called his name Joseph, and said, '
  - type: note
    content: Gen. 35:16–18
  - type: text
    content: '“The '
  - type: heading
    content: Lord
  - type: text
    content: ' shall add to me another son.”'
  - type: heading
    content: Jacob’s Agreement with Laban
  '25':
  - type: text
    content: 'And it came to pass, when Rachel had borne Joseph, that Jacob said to Laban, '
  - type: note
    content: Gen. 24:54, 56
  - type: text
    content: '“Send me away, that I may go to '
  - type: note
    content: Gen. 18:33
  - type: text
    content: 'my own place and to my country. '
  '26':
  - type: text
    content: 'Give '
  - type: text
    content: me
  - type: text
    content: ' my wives and my children '
  - type: note
    content: Gen. 29:18–20, 27, 30; Hos. 12:12
  - type: text
    content: 'for whom I have served you, and let me go; for you know my service which '
  - type: note
    content: Gen. 26:24; 39:3; Is. 61:9
  - type: text
    content: I have done for you.”
  '27':
  - type: text
    content: 'And Laban said to him, “Please '
  - type: text
    content: stay,
  - type: text
    content: ' if I have found favor in your eyes, '
  - type: text
    content: for
  - type: text
    content: ' I have learned by experience that the '
  - type: heading
    content: Lord
  - type: text
    content: ' has blessed me for your sake.” '
  '28':
  - type: text
    content: 'Then he said, '
  - type: note
    content: Gen. 29:15; 31:7, 41
  - type: text
    content: '“Name me your wages, and I will give '
  - type: text
    content: it.
  - type: text
    content: ”
  '29':
  - type: text
    content: 'So '
  - type: text
    content: Jacob
  - type: text
    content: ' said to him, '
  - type: note
    content: Gen. 31:6, 38–40; Matt. 24:45; Titus 2:10
  - type: text
    content: '“You know how I have served you and how your livestock has been with me. '
  '3':
  - type: text
    content: 'So she said, “Here is '
  - type: note
    content: Gen. 16:2
  - type: text
    content: 'my maid Bilhah; go in to her, '
  - type: note
    content: Gen. 50:23; Job 3:12
  - type: text
    content: 'and she will bear '
  - type: text
    content: a
  - type: text
    content: ' '
  - type: text
    content: child
  - type: text
    content: ' on my knees, '
  - type: note
    content: Gen. 16:2, 3
  - type: text
    content: 'that I also may have children by her.” '
  '30':
  - type: text
    content: 'For what you had before I '
  - type: text
    content: came
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' little, and it has increased to a great amount; the '
  - type: heading
    content: Lord
  - type: text
    content: ' has blessed you since my coming. And now, when shall I also '
  - type: note
    content: (1 Tim. 5:8)
  - type: text
    content: provide for my own house?”
  '31':
  - type: text
    content: So he said, “What shall I give you?”
  - type: text
    content: 'And Jacob said, “You shall not give me anything. If you will do this thing for me, I will again feed and keep your flocks: '
  '32':
  - type: text
    content: 'Let me pass through all your flock today, removing from there all the speckled and spotted sheep, and all the brown ones among the lambs, and the spotted and speckled among the goats; and '
  - type: note
    content: Gen. 31:8
  - type: text
    content: these
  - type: text
    content: ' shall be my wages. '
  '33':
  - type: text
    content: 'So my '
  - type: note
    content: Ps. 37:6
  - type: text
    content: 'righteousness will answer for me in time to come, when the subject of my wages comes before you: every one that '
  - type: text
    content: is
  - type: text
    content: ' not speckled and spotted among the goats, and brown among the lambs, will be considered stolen, if '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' with me.”'
  '34':
  - type: text
    content: 'And Laban said, “Oh, that it were according to your word!” '
  '35':
  - type: text
    content: 'So he removed that day the male goats that were '
  - type: note
    content: Gen. 31:9–12
  - type: text
    content: 'speckled and spotted, all the female goats that were speckled and spotted, every one that had '
  - type: text
    content: some
  - type: text
    content: ' white in it, and all the brown ones among the lambs, and gave '
  - type: text
    content: them
  - type: text
    content: ' into the hand of his sons. '
  '36':
  - type: text
    content: Then he put three days’ journey between himself and Jacob, and Jacob fed the rest of Laban’s flocks.
  '37':
  - type: text
    content: 'Now '
  - type: note
    content: Gen. 31:9–12
  - type: text
    content: 'Jacob took for himself rods of green poplar and of the almond and chestnut trees, peeled white strips in them, and exposed the white which '
  - type: text
    content: was
  - type: text
    content: ' in the rods. '
  '38':
  - type: text
    content: 'And the rods which he had peeled, he set before the flocks in the gutters, in the watering troughs where the flocks came to drink, so that they should conceive when they came to drink. '
  '39':
  - type: text
    content: 'So the flocks conceived before the rods, and the flocks brought forth streaked, speckled, and spotted. '
  '4':
  - type: text
    content: 'Then she gave him Bilhah her maid '
  - type: note
    content: Gen. 16:3, 4
  - type: text
    content: 'as wife, and Jacob went in to her. '
  '40':
  - type: text
    content: Then Jacob separated the lambs, and made the flocks face toward the streaked and all the brown in the flock of Laban; but he put his own flocks by themselves and did not put them with Laban’s flock.
  '41':
  - type: text
    content: 'And it came to pass, whenever the stronger livestock conceived, that Jacob placed the rods before the eyes of the livestock in the gutters, that they might conceive among the rods. '
  '42':
  - type: text
    content: 'But when the flocks were feeble, he did not put '
  - type: text
    content: them
  - type: text
    content: ' in; so the feebler were Laban’s and the stronger Jacob’s. '
  '43':
  - type: text
    content: 'Thus the man '
  - type: note
    content: Gen. 12:16; 30:30
  - type: text
    content: 'became exceedingly prosperous, and '
  - type: note
    content: Gen. 13:2; 24:35; 26:13, 14
  - type: text
    content: had large flocks, female and male servants, and camels and donkeys.
  '5':
  - type: text
    content: 'And Bilhah conceived and bore Jacob a son. '
  '6':
  - type: text
    content: 'Then Rachel said, “God has '
  - type: note
    content: Gen. 18:25; Ps. 35:24; 43:1; Lam. 3:59
  - type: text
    content: 'judged my case; and He has also heard my voice and given me a son.” Therefore she called his name Dan. '
  '7':
  - type: text
    content: 'And Rachel’s maid Bilhah conceived again and bore Jacob a second son. '
  '8':
  - type: text
    content: 'Then Rachel said, “With great wrestlings I have wrestled with my sister, '
  - type: text
    content: and
  - type: text
    content: ' indeed I have prevailed.” So she called his name Naphtali.'
  '9':
  - type: text
    content: 'When Leah saw that she had stopped bearing, she took Zilpah her maid and '
  - type: note
    content: Gen. 30:4
  - type: text
    content: 'gave her to Jacob as wife. '
