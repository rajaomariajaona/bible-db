  - type: text
    text: So he said, “What shall I give you?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And Jacob said, “You shall not give me anything. If you will do this thing for me, I will again feed and keep your flocks: '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Let me pass through all your flock today, removing from there all the speckled and spotted sheep, and all the brown ones among the lambs, and the spotted and speckled among the goats; and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 31:8
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: these
  - type: text
    text: ' shall be my wages. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'So my '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 37:6
    marker-yv: yv-n
  - type: text
    text: 'righteousness will answer for me in time to come, when the subject of my wages comes before you: every one that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' not speckled and spotted among the goats, and brown among the lambs, will be considered stolen, if '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' with me.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
