  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 31:9–12
    marker-yv: yv-n
  - type: text
    text: 'Jacob took for himself rods of green poplar and of the almond and chestnut trees, peeled white strips in them, and exposed the white which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in the rods. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And the rods which he had peeled, he set before the flocks in the gutters, in the watering troughs where the flocks came to drink, so that they should conceive when they came to drink. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'So the flocks conceived before the rods, and the flocks brought forth streaked, speckled, and spotted. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Then Jacob separated the lambs, and made the flocks face toward the streaked and all the brown in the flock of Laban; but he put his own flocks by themselves and did not put them with Laban’s flock.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And it came to pass, whenever the stronger livestock conceived, that Jacob placed the rods before the eyes of the livestock in the gutters, that they might conceive among the rods. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'But when the flocks were feeble, he did not put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' in; so the feebler were Laban’s and the stronger Jacob’s. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Thus the man '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 12:16; 30:30
    marker-yv: yv-n
