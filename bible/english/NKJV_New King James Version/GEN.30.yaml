  - type: usfm
    marker: it
    children:
    - type: text
      text: Is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' a small matter that you have taken away my husband? Would you take away my son’s mandrakes also?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: And Rachel said, “Therefore he will lie with you tonight for your son’s mandrakes.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When Jacob came out of the field in the evening, Leah went out to meet him and said, “You must come in to me, for I have surely hired you with my son’s mandrakes.” And he lay with her that night.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
