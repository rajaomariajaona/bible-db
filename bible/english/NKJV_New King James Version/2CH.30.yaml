      marker-yv: yv-n
    - type: text
      text: 'that the fierceness of His wrath may turn away from you. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if you return to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', your brethren and your children '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: treated
    - type: text
      text: ' with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 106:46
      marker-yv: yv-n
    - type: text
      text: 'compassion by those who lead them captive, so that they may come back to this land; for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
