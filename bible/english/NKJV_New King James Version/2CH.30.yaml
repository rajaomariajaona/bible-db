document_id: 2CH.30,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hezekiah Keeps the Passover
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hezekiah sent to all Israel and Judah, and also wrote letters to Ephraim and Manasseh, that they should come to the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at Jerusalem, to keep the Passover to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the runners passed from city to city through the country of Ephraim and Manasseh, as far as Zebulun; but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 36:16
      marker-yv: yv-n
    - type: text
      text: 'they laughed at them and mocked them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 11:16; 30:18, 21
      marker-yv: yv-n
    - type: text
      text: 'some from Asher, Manasseh, and Zebulun humbled themselves and came to Jerusalem. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 3:5; Phil. 2:13; Heb. 13:20, 21)
      marker-yv: yv-n
    - type: text
      text: 'the hand of God was on Judah to give them singleness of heart to obey the command of the king and the leaders, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 29:25
      marker-yv: yv-n
    - type: text
      text: 'at the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now many people, a very great assembly, gathered at Jerusalem to keep the Feast of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 23:6; Num. 9:11
      marker-yv: yv-n
    - type: text
      text: 'Unleavened Bread in the second month. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They arose and took away the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 28:24
      marker-yv: yv-n
    - type: text
      text: 'altars that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in Jerusalem, and they took away all the incense altars and cast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' into the Brook '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 29:16
      marker-yv: yv-n
    - type: text
      text: 'Kidron. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they slaughtered the Passover '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lambs
    - type: text
      text: ' on the fourteenth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the second month. The priests and the Levites were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 29:34
      marker-yv: yv-n
    - type: text
      text: 'ashamed, and sanctified themselves, and brought the burnt offerings to the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They stood in their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 35:10, 15
      marker-yv: yv-n
    - type: text
      text: 'place according to their custom, according to the Law of Moses the man of God; the priests sprinkled the blood '
    - type: usfm
      marker: it
      children:
      - type: text
        text: received
    - type: text
      text: ' from the hand of the Levites. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' many in the assembly who had not sanctified themselves; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 29:34
      marker-yv: yv-n
    - type: text
      text: 'therefore the Levites had charge of the slaughter of the Passover '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lambs
    - type: text
      text: ' for everyone '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' not clean, to sanctify '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For a multitude of the people, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 30:1, 11, 25
      marker-yv: yv-n
    - type: text
      text: 'many from Ephraim, Manasseh, Issachar, and Zebulun, had not cleansed themselves, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:43–49; (Num. 9:10)
      marker-yv: yv-n
    - type: text
      text: 'yet they ate the Passover contrary to what was written. But Hezekiah prayed for them, saying, “May the good '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' provide atonement for everyone '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 19:3
      marker-yv: yv-n
    - type: text
      text: 'prepares his heart to seek God, the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of his fathers, though '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cleansed
    - type: text
      text: ' according to the purification of the sanctuary.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the king and his leaders and all the assembly in Jerusalem had agreed to keep the Passover in the second '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 9:10, 11; 2 Chr. 30:13, 15
      marker-yv: yv-n
    - type: text
      text: 'month. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' listened to Hezekiah and healed the people.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the children of Israel who were present at Jerusalem kept '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:15; 13:6; 1 Kin. 8:65
      marker-yv: yv-n
    - type: text
      text: 'the Feast of Unleavened Bread seven days with great gladness; and the Levites and the priests praised the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' day by day, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: singing
    - type: text
      text: ' to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', accompanied by loud instruments. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hezekiah gave encouragement to all the Levites '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 33:10); 2 Chr. 17:9; 35:3
      marker-yv: yv-n
    - type: text
      text: 'who taught the good knowledge of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '; and they ate throughout the feast seven days, offering peace offerings and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 10:11
      marker-yv: yv-n
    - type: text
      text: 'making confession to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of their fathers.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the whole assembly agreed to keep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: feast
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:65; 2 Chr. 35:17, 18
      marker-yv: yv-n
    - type: text
      text: 'another seven days, and they kept it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: another
    - type: text
      text: ' seven days with gladness. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Hezekiah king of Judah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 35:7, 8
      marker-yv: yv-n
    - type: text
      text: 'gave to the assembly a thousand bulls and seven thousand sheep, and the leaders gave to the assembly a thousand bulls and ten thousand sheep; and a great number of priests '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 29:34
      marker-yv: yv-n
    - type: text
      text: 'sanctified themselves. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The whole assembly of Judah rejoiced, also the priests and Levites, all the assembly that came from Israel, the sojourners '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 30:11, 18
      marker-yv: yv-n
    - type: text
      text: 'who came from the land of Israel, and those who dwelt in Judah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So there was great joy in Jerusalem, for since the time of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 7:8–10
      marker-yv: yv-n
    - type: text
      text: 'Solomon the son of David, king of Israel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' been nothing like this in Jerusalem. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the priests, the Levites, arose and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 6:23
      marker-yv: yv-n
    - type: text
      text: 'blessed the people, and their voice was heard; and their prayer came '
    - type: usfm
      marker: it
      children:
      - type: text
        text: up
    - type: text
      text: ' to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 26:15; Ps. 68:5
      marker-yv: yv-n
    - type: text
