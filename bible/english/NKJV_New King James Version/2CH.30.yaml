  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For they could not keep it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:6, 18
      marker-yv: yv-n
    - type: text
      text: 'at the regular time, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 29:17, 34
      marker-yv: yv-n
    - type: text
      text: 'because a sufficient number of priests had not consecrated themselves, nor had the people gathered together at Jerusalem. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the matter pleased the king and all the assembly. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they resolved to make a proclamation throughout all Israel, from Beersheba to Dan, that they should come to keep the Passover to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel at Jerusalem, since they had not done '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' for a long '
    - type: usfm
      marker: it
      children:
      - type: text
        text: time
    - type: text
      text: ' in the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: prescribed
    - type: text
      text: ' manner.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 8:14; Job 9:25; Jer. 51:31
      marker-yv: yv-n
    - type: text
      text: 'runners went throughout all Israel and Judah with the letters from the king and his leaders, and spoke according to the command of the king: “Children of Israel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Jer. 4:1; Joel 2:13)
      marker-yv: yv-n
    - type: text
      text: 'return to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
