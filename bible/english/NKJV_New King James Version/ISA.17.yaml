document_id: ISA.17,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Proclamation Against Syria and Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:15; 15:2; 2 Kin. 16:9; Jer. 49:23; Amos 1:3–5; Zech. 9:1; Acts 9:2
      marker-yv: yv-n
    - type: text
      text: burden against Damascus.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Behold, Damascus will cease from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: being
    - type: text
      text: ' a city,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And it will be a ruinous heap.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Because you have forgotten '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 68:19; Is. 51:13
      marker-yv: yv-n
    - type: text
      text: the God of your salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And have not been mindful of the Rock of your stronghold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore you will plant pleasant plants
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And set out foreign seedlings;
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: In the day you will make your plant to grow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in the morning you will make your seed to flourish;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But
    - type: text
      text: ' the harvest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' a heap of ruins'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the day of grief and desperate sorrow.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Woe to the multitude of many people
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Who
    - type: text
      text: ' make a noise '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 5:30; Jer. 6:23; Ezek. 43:2; Luke 21:25
      marker-yv: yv-n
    - type: text
      text: like the roar of the seas,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to the rushing of nations
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That
    - type: text
      text: ' make a rushing like the rushing of mighty waters!'
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The nations will rush like the rushing of many waters;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 9:5; Is. 41:11
      marker-yv: yv-n
    - type: text
      text: rebuke them and they will flee far away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 83:13; Hos. 13:3
      marker-yv: yv-n
    - type: text
      text: be chased like the chaff of the mountains before the wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like a rolling thing before the whirlwind.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then behold, at eventide, trouble!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' before the morning, he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no more.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the portion of those who plunder us,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the lot of those who rob us.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The cities of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:34
      marker-yv: yv-n
    - type: text
      text: 'Aroer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' forsaken;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be for flocks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Which lie down, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 7:33
      marker-yv: yv-n
    - type: text
      text: 'no one will make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' afraid.'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 7:16; 8:4
      marker-yv: yv-n
    - type: text
      text: The fortress also will cease from Ephraim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The kingdom from Damascus,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the remnant of Syria;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be as the glory of the children of Israel,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “In that day it shall come to pass
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That
    - type: text
      text: ' the glory of Jacob will wane,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 10:16
      marker-yv: yv-n
    - type: text
      text: the fatness of his flesh grow lean.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 17:11; Jer. 51:33; Joel 3:13; Matt. 13:30
      marker-yv: yv-n
    - type: text
      text: It shall be as when the harvester gathers the grain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And reaps the heads with his arm;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It shall be as he who gathers heads of grain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the Valley of Rephaim.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:27; Is. 24:13; Obad. 5
      marker-yv: yv-n
    - type: text
      text: Yet gleaning grapes will be left in it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like the shaking of an olive tree,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Two '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' three olives at the top of the uppermost bough,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Four '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' five in its most fruitful branches,”'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In that day a man will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 10:20; Hos. 3:5; Mic. 7:7
      marker-yv: yv-n
    - type: text
      text: look to his Maker,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his eyes will have respect for the Holy One of Israel.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He will not look to the altars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The work of his hands;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He will not respect what his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 2:8; 31:7
      marker-yv: yv-n
    - type: text
      text: fingers have made,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor the wooden images nor the incense altars.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: In that day his strong cities will be as a forsaken bough
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And an uppermost branch,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which they left because of the children of Israel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And there will be desolation.
