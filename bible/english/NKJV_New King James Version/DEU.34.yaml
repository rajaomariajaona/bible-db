document_id: DEU.34,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses Dies on Mount Nebo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Moses went up from the plains of Moab to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 27:12; Deut. 32:49
      marker-yv: yv-n
    - type: text
      text: 'Mount Nebo, to the top of Pisgah, which is across from Jericho. And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' showed him all the land of Gilead as far as Dan, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But since then there '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 18:15, 18
      marker-yv: yv-n
    - type: text
      text: 'has not arisen in Israel a prophet like Moses, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 33:11; Num. 12:8; Deut. 5:4
      marker-yv: yv-n
    - type: text
      text: 'whom the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' knew face to face, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'in all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:19
      marker-yv: yv-n
    - type: text
      text: 'the signs and wonders which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent him to do in the land of Egypt, before Pharaoh, before all his servants, and in all his land, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: and by all that mighty power and all the great terror which Moses performed in the sight of all Israel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'all Naphtali and the land of Ephraim and Manasseh, all the land of Judah as far as the Western Sea, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'the South, and the plain of the Valley of Jericho, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 28:15
      marker-yv: yv-n
    - type: text
      text: 'the city of palm trees, as far as Zoar. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:7
      marker-yv: yv-n
    - type: text
      text: '“This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the land of which I swore to give Abraham, Isaac, and Jacob, saying, ‘I will give it to your descendants.’ '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 3:27
      marker-yv: yv-n
    - type: text
      text: 'I have caused you to see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' with your eyes, but you shall not cross over there.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:12; Deut. 32:50; Josh. 1:1, 2
      marker-yv: yv-n
    - type: text
      text: 'So Moses the servant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' died there in the land of Moab, according to the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And He buried him in a valley in the land of Moab, opposite Beth Peor; but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jude 9
      marker-yv: yv-n
    - type: text
      text: 'no one knows his grave to this day. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 31:2
      marker-yv: yv-n
    - type: text
      text: 'Moses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' one hundred and twenty years old when he died. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 27:1; 48:10
      marker-yv: yv-n
    - type: text
      text: 'His eyes were not dim nor his natural vigor diminished. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the children of Israel wept for Moses in the plains of Moab '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 50:3, 10
      marker-yv: yv-n
    - type: text
      text: 'thirty days. So the days of weeping '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mourning for Moses ended.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now Joshua the son of Nun was full of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 11:2
      marker-yv: yv-n
    - type: text
      text: 'spirit of wisdom, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 27:18, 23
      marker-yv: yv-n
    - type: text
      text: 'Moses had laid his hands on him; so the children of Israel heeded him, and did as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses.'
