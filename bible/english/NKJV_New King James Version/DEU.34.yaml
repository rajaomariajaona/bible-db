document_id: DEU.34,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Moses Dies on Mount Nebo
  - type: text
    content: 'Then Moses went up from the plains of Moab to '
  - type: note
    content: Num. 27:12; Deut. 32:49
  - type: text
    content: 'Mount Nebo, to the top of Pisgah, which is across from Jericho. And the '
  - type: heading
    content: Lord
  - type: text
    content: ' showed him all the land of Gilead as far as Dan, '
  '10':
  - type: text
    content: 'But since then there '
  - type: note
    content: Deut. 18:15, 18
  - type: text
    content: 'has not arisen in Israel a prophet like Moses, '
  - type: note
    content: Ex. 33:11; Num. 12:8; Deut. 5:4
  - type: text
    content: 'whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' knew face to face, '
  '11':
  - type: text
    content: 'in all '
  - type: note
    content: Deut. 7:19
  - type: text
    content: 'the signs and wonders which the '
  - type: heading
    content: Lord
  - type: text
    content: ' sent him to do in the land of Egypt, before Pharaoh, before all his servants, and in all his land, '
  '12':
  - type: text
    content: and by all that mighty power and all the great terror which Moses performed in the sight of all Israel.
  '2':
  - type: text
    content: 'all Naphtali and the land of Ephraim and Manasseh, all the land of Judah as far as the Western Sea, '
  '3':
  - type: text
    content: 'the South, and the plain of the Valley of Jericho, '
  - type: note
    content: 2 Chr. 28:15
  - type: text
    content: 'the city of palm trees, as far as Zoar. '
  '4':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to him, '
  - type: note
    content: Gen. 12:7
  - type: text
    content: '“This '
  - type: text
    content: is
  - type: text
    content: ' the land of which I swore to give Abraham, Isaac, and Jacob, saying, ‘I will give it to your descendants.’ '
  - type: note
    content: Deut. 3:27
  - type: text
    content: 'I have caused you to see '
  - type: text
    content: it
  - type: text
    content: ' with your eyes, but you shall not cross over there.”'
  '5':
  - type: note
    content: Num. 20:12; Deut. 32:50; Josh. 1:1, 2
  - type: text
    content: 'So Moses the servant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' died there in the land of Moab, according to the word of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And He buried him in a valley in the land of Moab, opposite Beth Peor; but '
  - type: note
    content: Jude 9
  - type: text
    content: 'no one knows his grave to this day. '
  '7':
  - type: note
    content: Deut. 31:2
  - type: text
    content: 'Moses '
  - type: text
    content: was
  - type: text
    content: ' one hundred and twenty years old when he died. '
  - type: note
    content: Gen. 27:1; 48:10
  - type: text
    content: 'His eyes were not dim nor his natural vigor diminished. '
  '8':
  - type: text
    content: 'And the children of Israel wept for Moses in the plains of Moab '
  - type: note
    content: Gen. 50:3, 10
  - type: text
    content: 'thirty days. So the days of weeping '
  - type: text
    content: and
  - type: text
    content: ' mourning for Moses ended.'
  '9':
  - type: text
    content: 'Now Joshua the son of Nun was full of the '
  - type: note
    content: Is. 11:2
  - type: text
    content: 'spirit of wisdom, for '
  - type: note
    content: Num. 27:18, 23
  - type: text
    content: 'Moses had laid his hands on him; so the children of Israel heeded him, and did as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded Moses.'
