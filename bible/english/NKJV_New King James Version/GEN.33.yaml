    - type: text
      text: Jacob and Esau Meet
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Jacob lifted his eyes and looked, and there, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 32:6
      marker-yv: yv-n
    - type: text
      text: 'Esau was coming, and with him were four hundred men. So he divided the children among Leah, Rachel, and the two maidservants. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob said, “No, please, if I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 43:3; 2 Sam. 3:13; 14:24, 28, 32
      marker-yv: yv-n
    - type: text
      text: 'have now found favor in your sight, then receive my present from my hand, inasmuch as I have seen your face as though I had seen the face of God, and you were pleased with me. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Please, take '
    - type: usfm
      marker: x
      children:
      - type: text
