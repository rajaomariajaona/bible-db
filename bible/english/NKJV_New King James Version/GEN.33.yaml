      children:
      - type: text
        text: Gen. 48:9; (Ps. 127:3); Is. 8:18
      marker-yv: yv-n
    - type: text
      text: 'whom God has graciously given your servant.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the maidservants came near, they and their children, and bowed down. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Leah also came near with her children, and they bowed down. Afterward Joseph and Rachel came near, and they bowed down.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Esau said, “What '
    - type: usfm
