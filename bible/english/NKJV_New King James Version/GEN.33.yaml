      marker-yv: yv-n
    - type: text
      text: 'Shechem, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in the land of Canaan, when he came from Padan Aram; and he pitched his tent before the city. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 24:32; John 4:5
      marker-yv: yv-n
    - type: text
      text: 'he bought the parcel of land, where he had pitched his tent, from the children of Hamor, Shechem’s father, for one hundred pieces of money. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he put the maidservants and their children in front, Leah and her children behind, and Rachel and Joseph last. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he erected an altar there and called it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 35:7
      marker-yv: yv-n
    - type: text
      text: El Elohe Israel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he crossed over before them and '
