      marker-yv: yv-n
    - type: text
      text: Succoth, built himself a house, and made booths for his livestock. Therefore the name of the place is called Succoth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Comes to Canaan
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
