      marker-yv: yv-n
    - type: text
      text: 'my blessing that is brought to you, because God has dealt '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 30:43; Ex. 33:19
      marker-yv: yv-n
    - type: text
      text: 'graciously with me, and because I have enough.” '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 5:23
      marker-yv: yv-n
    - type: text
      text: 'So he urged him, and he took '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Esau said, “Let us take our journey; let us go, and I will go before you.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jacob said to him, “My lord knows that the children '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' weak, and the flocks and herds which are nursing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' with me. And if the men should drive them hard one day, all the flock will die. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Please let my lord go on ahead before his servant. I will lead on slowly at a pace which the livestock that go before me, and the children, are able to endure, until I come to my lord '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 32:3; 36:8
      marker-yv: yv-n
    - type: text
      text: in Seir.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Esau said, “Now let me leave with you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' with me.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he said, “What need is there? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 34:11; 47:25; Ruth 2:13
      marker-yv: yv-n
    - type: text
      text: 'Let me find favor in the sight of my lord.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Esau returned that day on his way to Seir. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob journeyed to '
    - type: usfm
      marker: x
      children:
      - type: text
