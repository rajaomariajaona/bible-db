      children:
      - type: text
        text: Gen. 18:2; 42:6
      marker-yv: yv-n
    - type: text
      text: bowed himself to the ground seven times, until he came near to his brother.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 32:28
      marker-yv: yv-n
    - type: text
      text: 'But Esau ran to meet him, and embraced him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 45:14, 15
      marker-yv: yv-n
    - type: text
      text: 'and fell on his neck and kissed him, and they wept. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he lifted his eyes and saw the women and children, and said, “Who '
    - type: usfm
