verses:
  '1':
  - type: heading
    content: The Queen of Sheba’s Praise of Solomon
  - type: text
    content: 'Now '
  - type: note
    content: 1 Kin. 10:1; Ps. 72:10; (Matt. 12:42; Luke 11:31)
  - type: text
    content: 'when the queen of Sheba heard of the fame of Solomon, she came to Jerusalem to test Solomon with hard questions, '
  - type: text
    content: having
  - type: text
    content: ' a very great retinue, camels that bore spices, gold in abundance, and precious stones; and when she came to Solomon, she spoke with him about all that was in her heart. '
  '10':
  - type: text
    content: 'Also, the servants of Hiram and the servants of Solomon, '
  - type: note
    content: 2 Chr. 8:18
  - type: text
    content: 'who brought gold from Ophir, brought algum wood and precious stones. '
  '11':
  - type: text
    content: 'And the king made walkways '
  - type: text
    content: of
  - type: text
    content: ' the algum wood for the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and for the king’s house, also harps and stringed instruments for singers; and there were none such '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: these
  - type: text
    content: ' seen before in the land of Judah.'
  '12':
  - type: text
    content: 'Now King Solomon gave to the queen of Sheba all she desired, whatever she asked, '
  - type: text
    content: much
  - type: text
    content: ' '
  - type: text
    content: more
  - type: text
    content: ' than she had brought to the king. So she turned and went to her own country, she and her servants.'
  - type: heading
    content: Solomon’s Great Wealth
  '13':
  - type: note
    content: 1 Kin. 10:14–29
  - type: text
    content: 'The weight of gold that came to Solomon yearly was six hundred and sixty-six talents of gold, '
  '14':
  - type: text
    content: 'besides '
  - type: text
    content: what
  - type: text
    content: ' the traveling merchants and traders brought. And all the kings of Arabia and governors of the country brought gold and silver to Solomon. '
  '15':
  - type: text
    content: 'And King Solomon made two hundred large shields of hammered gold; six hundred '
  - type: text
    content: shekels
  - type: text
    content: ' of hammered gold went into each shield. '
  '16':
  - type: text
    content: He
  - type: text
    content: ' also '
  - type: text
    content: made
  - type: text
    content: ' three hundred shields of hammered gold; three hundred '
  - type: text
    content: shekels
  - type: text
    content: ' of gold went into each shield. The king put them in the '
  - type: note
    content: 1 Kin. 7:2
  - type: text
    content: House of the Forest of Lebanon.
  '17':
  - type: text
    content: 'Moreover the king made a great throne of ivory, and overlaid it with pure gold. '
  '18':
  - type: text
    content: 'The throne '
  - type: text
    content: had
  - type: text
    content: ' six steps, with a footstool of gold, '
  - type: text
    content: which
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' fastened to the throne; there were armrests on either side of the place of the seat, and two lions stood beside the armrests. '
  '19':
  - type: text
    content: 'Twelve lions stood there, one on each side of the six steps; nothing like '
  - type: text
    content: this
  - type: text
    content: ' had been made for any '
  - type: text
    content: other
  - type: text
    content: ' kingdom.'
  '2':
  - type: text
    content: 'So Solomon answered all her questions; there was nothing so difficult for Solomon that he could not explain it to her. '
  '20':
  - type: text
    content: 'All King Solomon’s drinking vessels '
  - type: text
    content: were
  - type: text
    content: ' gold, and all the vessels of the House of the Forest of Lebanon '
  - type: text
    content: were
  - type: text
    content: ' pure gold. Not '
  - type: text
    content: one
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' silver, for this was accounted as nothing in the days of Solomon. '
  '21':
  - type: text
    content: 'For the king’s ships went to '
  - type: note
    content: 2 Chr. 20:36, 37; Ps. 72:10
  - type: text
    content: Tarshish with the servants of Hiram. Once every three years the merchant ships came, bringing gold, silver, ivory, apes, and monkeys.
  '22':
  - type: text
    content: 'So King Solomon surpassed all the kings of the earth in riches and wisdom. '
  '23':
  - type: text
    content: 'And all the kings of the earth sought the presence of Solomon to hear his wisdom, which God had put in his heart. '
  '24':
  - type: text
    content: 'Each man brought his present: articles of silver and gold, garments, '
  - type: note
    content: 1 Kin. 20:11
  - type: text
    content: armor, spices, horses, and mules, at a set rate year by year.
  '25':
  - type: text
    content: 'Solomon '
  - type: note
    content: Deut. 17:16; 1 Kin. 4:26; 10:26; 2 Chr. 1:14; Is. 2:7
  - type: text
    content: had four thousand stalls for horses and chariots, and twelve thousand horsemen whom he stationed in the chariot cities and with the king at Jerusalem.
  '26':
  - type: note
    content: 1 Kin. 4:21
  - type: text
    content: 'So he reigned over all the kings '
  - type: note
    content: Gen. 15:18; Ps. 72:8
  - type: text
    content: 'from the River to the land of the Philistines, as far as the border of Egypt. '
  '27':
  - type: note
    content: 1 Kin. 10:27
  - type: text
    content: 'The king made silver '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: common
  - type: text
    content: ' in Jerusalem as stones, and he made cedar trees '
  - type: note
    content: 2 Chr. 1:15–17
  - type: text
    content: 'as abundant as the sycamores which '
  - type: text
    content: are
  - type: text
    content: ' in the lowland. '
  '28':
  - type: note
    content: 1 Kin. 10:28; 2 Chr. 1:16
  - type: text
    content: And they brought horses to Solomon from Egypt and from all lands.
  - type: heading
    content: Death of Solomon
  '29':
  - type: note
    content: 1 Kin. 11:41
  - type: text
    content: 'Now the rest of the acts of Solomon, first and last, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of Nathan the prophet, in the prophecy of '
  - type: note
    content: 1 Kin. 11:29
  - type: text
    content: 'Ahijah the Shilonite, and in the visions of '
  - type: note
    content: 2 Chr. 12:15; 13:22
  - type: text
    content: 'Iddo the seer concerning Jeroboam the son of Nebat? '
  '3':
  - type: text
    content: 'And when the queen of Sheba had seen the wisdom of Solomon, the house that he had built, '
  '30':
  - type: note
    content: 1 Kin. 4:21; 11:42, 43; 1 Chr. 29:28
  - type: text
    content: 'Solomon reigned in Jerusalem over all Israel forty years. '
  '31':
  - type: text
    content: Then Solomon rested with his fathers, and was buried in the City of David his father. And Rehoboam his son reigned in his place.
  '4':
  - type: text
    content: 'the food on his table, the seating of his servants, the service of his waiters and their apparel, his '
  - type: note
    content: Neh. 1:11
  - type: text
    content: 'cupbearers and their apparel, and his entryway by which he went up to the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', there was no more spirit in her.'
  '5':
  - type: text
    content: 'Then she said to the king: “'
  - type: text
    content: It
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' a true report which I heard in my own land about your words and your wisdom. '
  '6':
  - type: text
    content: 'However I did not believe their words until I came and saw with my own eyes; and indeed the half of the greatness of your wisdom was not told me. You exceed the fame of which I heard. '
  '7':
  - type: text
    content: 'Happy '
  - type: text
    content: are
  - type: text
    content: ' your men and happy '
  - type: text
    content: are
  - type: text
    content: ' these your servants, who stand continually before you and hear your wisdom! '
  '8':
  - type: text
    content: 'Blessed be the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, who delighted in you, setting you on His throne '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' king for the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God! Because your God has '
  - type: note
    content: Deut. 7:8; 2 Chr. 2:11; (Ps. 44:3)
  - type: text
    content: loved Israel, to establish them forever, therefore He made you king over them, to do justice and righteousness.”
  '9':
  - type: text
    content: And she gave the king one hundred and twenty talents of gold, spices in great abundance, and precious stones; there never were any spices such as those the queen of Sheba gave to King Solomon.
