document_id: 2CH.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Queen of Sheba’s Praise of Solomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 10:1; Ps. 72:10; (Matt. 12:42; Luke 11:31)
    marker-yv: yv-n
  - type: text
    text: 'when the queen of Sheba heard of the fame of Solomon, she came to Jerusalem to test Solomon with hard questions, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: having
  - type: text
    text: ' a very great retinue, camels that bore spices, gold in abundance, and precious stones; and when she came to Solomon, she spoke with him about all that was in her heart. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So Solomon answered all her questions; there was nothing so difficult for Solomon that he could not explain it to her. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And when the queen of Sheba had seen the wisdom of Solomon, the house that he had built, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'the food on his table, the seating of his servants, the service of his waiters and their apparel, his '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 1:11
    marker-yv: yv-n
  - type: text
    text: 'cupbearers and their apparel, and his entryway by which he went up to the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', there was no more spirit in her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then she said to the king: “'
  - type: usfm
    marker: it
    children:
    - type: text
      text: It
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a true report which I heard in my own land about your words and your wisdom. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'However I did not believe their words until I came and saw with my own eyes; and indeed the half of the greatness of your wisdom was not told me. You exceed the fame of which I heard. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' your men and happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' these your servants, who stand continually before you and hear your wisdom! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Blessed be the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, who delighted in you, setting you on His throne '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' king for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God! Because your God has '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 7:8; 2 Chr. 2:11; (Ps. 44:3)
    marker-yv: yv-n
  - type: text
    text: loved Israel, to establish them forever, therefore He made you king over them, to do justice and righteousness.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And she gave the king one hundred and twenty talents of gold, spices in great abundance, and precious stones; there never were any spices such as those the queen of Sheba gave to King Solomon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Also, the servants of Hiram and the servants of Solomon, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 8:18
    marker-yv: yv-n
  - type: text
    text: 'who brought gold from Ophir, brought algum wood and precious stones. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the king made walkways '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' the algum wood for the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and for the king’s house, also harps and stringed instruments for singers; and there were none such '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: these
  - type: text
    text: ' seen before in the land of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now King Solomon gave to the queen of Sheba all she desired, whatever she asked, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: much
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: more
  - type: text
    text: ' than she had brought to the king. So she turned and went to her own country, she and her servants.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Great Wealth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 10:14–29
    marker-yv: yv-n
  - type: text
    text: 'The weight of gold that came to Solomon yearly was six hundred and sixty-six talents of gold, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'besides '
  - type: usfm
    marker: it
    children:
    - type: text
      text: what
  - type: text
    text: ' the traveling merchants and traders brought. And all the kings of Arabia and governors of the country brought gold and silver to Solomon. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And King Solomon made two hundred large shields of hammered gold; six hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shekels
  - type: text
    text: ' of hammered gold went into each shield. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: it
    children:
    - type: text
      text: He
  - type: text
    text: ' also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: made
  - type: text
    text: ' three hundred shields of hammered gold; three hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shekels
  - type: text
    text: ' of gold went into each shield. The king put them in the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 7:2
    marker-yv: yv-n
  - type: text
    text: House of the Forest of Lebanon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Moreover the king made a great throne of ivory, and overlaid it with pure gold. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The throne '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had
  - type: text
    text: ' six steps, with a footstool of gold, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' fastened to the throne; there were armrests on either side of the place of the seat, and two lions stood beside the armrests. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Twelve lions stood there, one on each side of the six steps; nothing like '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' had been made for any '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'All King Solomon’s drinking vessels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' gold, and all the vessels of the House of the Forest of Lebanon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' pure gold. Not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' silver, for this was accounted as nothing in the days of Solomon. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For the king’s ships went to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 20:36, 37; Ps. 72:10
    marker-yv: yv-n
  - type: text
    text: Tarshish with the servants of Hiram. Once every three years the merchant ships came, bringing gold, silver, ivory, apes, and monkeys.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So King Solomon surpassed all the kings of the earth in riches and wisdom. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And all the kings of the earth sought the presence of Solomon to hear his wisdom, which God had put in his heart. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Each man brought his present: articles of silver and gold, garments, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 20:11
    marker-yv: yv-n
  - type: text
    text: armor, spices, horses, and mules, at a set rate year by year.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Solomon '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 17:16; 1 Kin. 4:26; 10:26; 2 Chr. 1:14; Is. 2:7
    marker-yv: yv-n
  - type: text
    text: had four thousand stalls for horses and chariots, and twelve thousand horsemen whom he stationed in the chariot cities and with the king at Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 4:21
    marker-yv: yv-n
  - type: text
    text: 'So he reigned over all the kings '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 15:18; Ps. 72:8
    marker-yv: yv-n
  - type: text
    text: 'from the River to the land of the Philistines, as far as the border of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 10:27
    marker-yv: yv-n
  - type: text
    text: 'The king made silver '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: common
  - type: text
    text: ' in Jerusalem as stones, and he made cedar trees '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 1:15–17
    marker-yv: yv-n
  - type: text
    text: 'as abundant as the sycamores which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' in the lowland. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 10:28; 2 Chr. 1:16
    marker-yv: yv-n
  - type: text
    text: And they brought horses to Solomon from Egypt and from all lands.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Death of Solomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:41
    marker-yv: yv-n
  - type: text
    text: 'Now the rest of the acts of Solomon, first and last, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' they not written in the book of Nathan the prophet, in the prophecy of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:29
    marker-yv: yv-n
  - type: text
    text: 'Ahijah the Shilonite, and in the visions of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 12:15; 13:22
    marker-yv: yv-n
  - type: text
    text: 'Iddo the seer concerning Jeroboam the son of Nebat? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 4:21; 11:42, 43; 1 Chr. 29:28
    marker-yv: yv-n
  - type: text
    text: 'Solomon reigned in Jerusalem over all Israel forty years. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Then Solomon rested with his fathers, and was buried in the City of David his father. And Rehoboam his son reigned in his place.
