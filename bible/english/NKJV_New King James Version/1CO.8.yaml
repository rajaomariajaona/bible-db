  - type: heading
    content: Be Sensitive to Conscience
  - type: text
    content: 'Now '
  - type: note
    content: Acts 15:20; 1 Cor. 8:4, 7, 10
  - type: text
    content: 'concerning things offered to idols: We know that we all have '
  - type: note
    content: Rom. 14:14
  - type: text
    content: 'knowledge. '
  - type: note
    content: Rom. 14:3
  - type: text
    content: 'Knowledge puffs up, but love edifies. '
  '10':
  - type: text
    content: 'For if anyone sees you who have knowledge eating in an idol’s temple, will not '
  - type: note
    content: 1 Cor. 10:28
  - type: text
    content: 'the conscience of him who is weak be emboldened to eat those things offered to idols? '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: Rom. 14:15, 20
  - type: text
    content: 'because of your knowledge shall the weak brother perish, for whom Christ died? '
  '12':
  - type: text
    content: 'But '
  - type: note
    content: Matt. 25:40
  - type: text
    content: 'when you thus sin against the brethren, and wound their weak conscience, you sin against Christ. '
  '13':
  - type: text
    content: 'Therefore, '
  - type: note
    content: Rom. 14:21; 1 Cor. 10:32; 2 Cor. 6:3; 11:29
  - type: text
    content: if food makes my brother stumble, I will never again eat meat, lest I make my brother stumble.
