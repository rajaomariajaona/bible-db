      children:
      - type: text
        text: Gen. 46:3
      marker-yv: yv-n
    - type: text
      text: 'make you fruitful and multiply you, and I will make of you a multitude of people, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 35:12; Ex. 6:8
      marker-yv: yv-n
    - type: text
      text: 'give this land to your descendants after you '
    - type: usfm
