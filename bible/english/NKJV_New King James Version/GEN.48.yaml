  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But his father refused and said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 48:14
      marker-yv: yv-n
    - type: text
      text: '“I know, my son, I know. He also shall become a people, and he also shall be great; but truly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 1:33, 35; Deut. 33:17
      marker-yv: yv-n
    - type: text
      text: his younger brother shall be greater than he, and his descendants shall become a multitude of nations.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob was told, “Look, your son Joseph is coming to you”; and Israel strengthened himself and sat up on the bed. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he blessed them that day, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 4:11, 12
      marker-yv: yv-n
    - type: text
      text: “By you Israel will bless, saying, ‘May God make you as Ephraim and as Manasseh!’ ” And thus he set Ephraim before Manasseh.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Israel said to Joseph, “Behold, I am dying, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 28:15; 46:4; 50:24
      marker-yv: yv-n
    - type: text
      text: 'God will be with you and bring you back to the land of your fathers. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:7; Josh. 24:32; John 4:5
      marker-yv: yv-n
    - type: text
      text: 'I have given to you one portion above your brothers, which I took from the hand '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 34:28
      marker-yv: yv-n
    - type: text
      text: of the Amorite with my sword and my bow.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jacob said to Joseph: “God '
    - type: usfm
      marker: x
      children:
