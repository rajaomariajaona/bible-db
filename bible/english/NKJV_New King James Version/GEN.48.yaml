      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' an everlasting possession.’ '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now your '
    - type: usfm
      marker: x
