      marker-yv: yv-n
    - type: text
      text: 'laid his right hand on the head of Ephraim, it displeased him; so he took hold of his father’s hand to remove it from Ephraim’s head to Manasseh’s head. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joseph said to his father, “Not so, my father, for this '
    - type: usfm
