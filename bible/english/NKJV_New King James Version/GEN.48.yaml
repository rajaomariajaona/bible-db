      - type: text
        text: Gen. 41:50; 46:20; 48:8; Josh. 13:7; 14:4
      marker-yv: yv-n
    - type: text
      text: 'two sons, Ephraim and Manasseh, who were born to you in the land of Egypt before I came to you in Egypt, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' mine; as Reuben and Simeon, they shall be mine. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your offspring whom you beget after them shall be yours; they will be called by the name of their brothers in their inheritance. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as for me, when I came from Padan, '
