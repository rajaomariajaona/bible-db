      - type: text
        text: Gen. 28:13, 19; 35:6, 9
      marker-yv: yv-n
    - type: text
      text: 'Luz in the land of Canaan and blessed me, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said to me, ‘Behold, I will '
    - type: usfm
