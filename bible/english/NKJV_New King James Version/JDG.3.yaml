    children:
    - type: text
      text: Judg. 1:1; 2:21, 22
    marker-yv: yv-n
  - type: text
    text: 'the nations which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' left, that He might test Israel by them, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is,
  - type: text
    text: ' all who had not known any of the wars in Canaan '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: (
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' only so that the generations of the children of Israel might be taught to know war, at least those who had not formerly known it), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: it
    children:
    - type: text
      text: namely,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 13:3
    marker-yv: yv-n
  - type: text
    text: 'five lords of the Philistines, all the Canaanites, the Sidonians, and the Hivites who dwelt in Mount Lebanon, from Mount Baal Hermon to the entrance of Hamath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And they were '
  - type: usfm
    marker: it
    children:
    - type: text
      text: left, that He might
  - type: text
    text: ' test Israel by them, to know whether they would obey the commandments of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', which He had commanded their fathers by the hand of Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 106:35
    marker-yv: yv-n
  - type: text
    text: 'Thus the children of Israel dwelt among the Canaanites, the Hittites, the Amorites, the Perizzites, the Hivites, and the Jebusites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 34:15, 16; Deut. 7:3, 4; Josh. 23:12
    marker-yv: yv-n
  - type: text
    text: they took their daughters to be their wives, and gave their daughters to their sons; and they served their gods.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Othniel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So the children of Israel did '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 2:11
    marker-yv: yv-n
  - type: text
    text: 'evil in the sight of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. They '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 32:18
    marker-yv: yv-n
  - type: text
    text: 'forgot the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God, and served the Baals and Asherahs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore the anger of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was hot against Israel, and He '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 32:30; Judg. 2:14
    marker-yv: yv-n
  - type: text
    text: 'sold them into the hand of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Hab. 3:7
    marker-yv: yv-n
  - type: text
    text: 'Cushan-Rishathaim king of Mesopotamia; and the children of Israel served Cushan-Rishathaim eight years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When the children of Israel '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 3:15
    marker-yv: yv-n
  - type: text
    text: 'cried out to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 2:16
    marker-yv: yv-n
  - type: text
    text: 'raised up a deliverer for the children of Israel, who delivered them: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 1:13
    marker-yv: yv-n
  - type: text
    text: 'Othniel the son of Kenaz, Caleb’s younger brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 27:18; 1 Sam. 11:6; 2 Chr. 15:1
    marker-yv: yv-n
  - type: text
    text: 'The Spirit of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came upon him, and he judged Israel. He went out to war, and the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' delivered Cushan-Rishathaim king of Mesopotamia into his hand; and his hand prevailed over Cushan-Rishathaim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So the land had rest for forty years. Then Othniel the son of Kenaz died.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ehud
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 2:19
    marker-yv: yv-n
  - type: text
    text: 'And the children of Israel again did evil in the sight of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. So the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' strengthened '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 12:9
    marker-yv: yv-n
  - type: text
    text: 'Eglon king of Moab against Israel, because they had done evil in the sight of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then he gathered to himself the people of Ammon and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 5:14
    marker-yv: yv-n
  - type: text
    text: 'Amalek, went and defeated Israel, and took possession of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 34:3; Judg. 1:16; 2 Chr. 28:15
    marker-yv: yv-n
  - type: text
    text: 'the City of Palms. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So the children of Israel '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 28:48
    marker-yv: yv-n
  - type: text
    text: served Eglon king of Moab eighteen years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But when the children of Israel '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 78:34
    marker-yv: yv-n
  - type: text
    text: 'cried out to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' raised up a deliverer for them: Ehud the son of Gera, the Benjamite, a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 20:16
    marker-yv: yv-n
  - type: text
    text: 'left-handed man. By him the children of Israel sent tribute to Eglon king of Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now Ehud made himself a dagger (it was double-edged and a cubit in length) and fastened it under his clothes on his right thigh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So he brought the tribute to Eglon king of Moab. (Now Eglon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a very fat man.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And when he had finished presenting the tribute, he sent away the people who had carried the tribute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But he himself turned back '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 4:20
    marker-yv: yv-n
  - type: text
    text: 'from the stone images that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' at Gilgal, and said, “I have a secret message for you, O king.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “Keep silence!” And all who attended him went out from him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So Ehud came to him (now he was sitting upstairs in his cool private chamber). Then Ehud said, “I have a message from God for you.” So he arose from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' seat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Ehud reached with his left hand, took the dagger from his right thigh, and thrust it into his belly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Even the hilt went in after the blade, and the fat closed over the blade, for he did not draw the dagger out of his belly; and his entrails came out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then Ehud went out through the porch and shut the doors of the upper room behind him and locked them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When he had gone out, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Eglon’s
  - type: text
    text: ' servants came to look, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' surprise, the doors of the upper room were locked. So they said, “He is probably '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 24:3
    marker-yv: yv-n
  - type: text
    text: 'attending to his needs in the cool chamber.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So they waited till they were '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 2:17; 8:11
    marker-yv: yv-n
  - type: text
    text: 'embarrassed, and still he had not opened the doors of the upper room. Therefore they took the key and opened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them.
  - type: text
    text: ' And there was their master, fallen dead on the floor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But Ehud had escaped while they delayed, and passed beyond the stone images and escaped to Seirah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And it happened, when he arrived, that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 6:34; 1 Sam. 13:3
    marker-yv: yv-n
  - type: text
    text: 'he blew the trumpet in the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 17:15
    marker-yv: yv-n
  - type: text
    text: 'mountains of Ephraim, and the children of Israel went down with him from the mountains; and he led them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then he said to them, “Follow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me,
  - type: text
    text: ' for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 7:9, 15; 1 Sam. 17:47
    marker-yv: yv-n
  - type: text
    text: 'the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has delivered your enemies the Moabites into your hand.” So they went down after him, seized the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 2:7; Judg. 12:5
    marker-yv: yv-n
  - type: text
    text: 'fords of the Jordan leading to Moab, and did not allow anyone to cross over. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And at that time they killed about ten thousand men of Moab, all stout men of valor; not a man escaped. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So Moab was subdued that day under the hand of Israel. And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 3:11
    marker-yv: yv-n
  - type: text
    text: the land had rest for eighty years.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Shamgar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'After him was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 5:6
    marker-yv: yv-n
  - type: text
    text: 'Shamgar the son of Anath, who killed six hundred men of the Philistines '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 17:47
    marker-yv: yv-n
  - type: text
    text: 'with an ox goad; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 2:16
    marker-yv: yv-n
  - type: text
    text: 'and he also delivered '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 4:1
    marker-yv: yv-n
  - type: text
    text: Israel.
