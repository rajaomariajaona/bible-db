  - type: text
    content: ' all who had not known any of the wars in Canaan '
  '10':
  - type: note
    content: Num. 27:18; 1 Sam. 11:6; 2 Chr. 15:1
  - type: text
    content: 'The Spirit of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came upon him, and he judged Israel. He went out to war, and the '
  - type: heading
    content: Lord
  - type: text
    content: ' delivered Cushan-Rishathaim king of Mesopotamia into his hand; and his hand prevailed over Cushan-Rishathaim. '
  '11':
  - type: text
    content: So the land had rest for forty years. Then Othniel the son of Kenaz died.
  - type: heading
    content: Ehud
  '12':
  - type: note
    content: Judg. 2:19
  - type: text
    content: 'And the children of Israel again did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: '. So the '
  - type: heading
    content: Lord
  - type: text
    content: ' strengthened '
  - type: note
    content: 1 Sam. 12:9
  - type: text
    content: 'Eglon king of Moab against Israel, because they had done evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Then he gathered to himself the people of Ammon and '
  - type: note
    content: Judg. 5:14
  - type: text
    content: 'Amalek, went and defeated Israel, and took possession of '
  - type: note
    content: Deut. 34:3; Judg. 1:16; 2 Chr. 28:15
  - type: text
    content: 'the City of Palms. '
  '14':
  - type: text
    content: 'So the children of Israel '
  - type: note
    content: Deut. 28:48
  - type: text
    content: served Eglon king of Moab eighteen years.
  '15':
  - type: text
    content: 'But when the children of Israel '
  - type: note
    content: Ps. 78:34
  - type: text
    content: 'cried out to the '
  - type: heading
    content: Lord
  - type: text
    content: ', the '
  - type: heading
    content: Lord
  - type: text
    content: ' raised up a deliverer for them: Ehud the son of Gera, the Benjamite, a '
  - type: note
    content: Judg. 20:16
  - type: text
    content: 'left-handed man. By him the children of Israel sent tribute to Eglon king of Moab. '
  '16':
  - type: text
    content: 'Now Ehud made himself a dagger (it was double-edged and a cubit in length) and fastened it under his clothes on his right thigh. '
  '17':
  - type: text
    content: 'So he brought the tribute to Eglon king of Moab. (Now Eglon '
  - type: text
    content: was
  - type: text
    content: ' a very fat man.) '
  '18':
  - type: text
    content: 'And when he had finished presenting the tribute, he sent away the people who had carried the tribute. '
  '19':
  - type: text
    content: 'But he himself turned back '
  - type: note
    content: Josh. 4:20
  - type: text
    content: 'from the stone images that '
  - type: text
    content: were
  - type: text
    content: ' at Gilgal, and said, “I have a secret message for you, O king.”'
  - type: text
    content: He said, “Keep silence!” And all who attended him went out from him.
  '2':
  - type: text
    content: (
  - type: text
    content: this
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' only so that the generations of the children of Israel might be taught to know war, at least those who had not formerly known it), '
  '20':
  - type: text
    content: 'So Ehud came to him (now he was sitting upstairs in his cool private chamber). Then Ehud said, “I have a message from God for you.” So he arose from '
  - type: text
    content: his
  - type: text
    content: ' seat. '
  '21':
  - type: text
    content: 'Then Ehud reached with his left hand, took the dagger from his right thigh, and thrust it into his belly. '
  '22':
  - type: text
    content: 'Even the hilt went in after the blade, and the fat closed over the blade, for he did not draw the dagger out of his belly; and his entrails came out. '
  '23':
  - type: text
    content: Then Ehud went out through the porch and shut the doors of the upper room behind him and locked them.
  '24':
  - type: text
    content: 'When he had gone out, '
  - type: text
    content: Eglon’s
  - type: text
    content: ' servants came to look, and '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: their
  - type: text
    content: ' surprise, the doors of the upper room were locked. So they said, “He is probably '
  - type: note
    content: 1 Sam. 24:3
  - type: text
    content: 'attending to his needs in the cool chamber.” '
  '25':
  - type: text
    content: 'So they waited till they were '
  - type: note
    content: 2 Kin. 2:17; 8:11
  - type: text
    content: 'embarrassed, and still he had not opened the doors of the upper room. Therefore they took the key and opened '
  - type: text
    content: them.
  - type: text
    content: ' And there was their master, fallen dead on the floor.'
  '26':
  - type: text
    content: 'But Ehud had escaped while they delayed, and passed beyond the stone images and escaped to Seirah. '
  '27':
  - type: text
    content: 'And it happened, when he arrived, that '
  - type: note
    content: Judg. 6:34; 1 Sam. 13:3
  - type: text
    content: 'he blew the trumpet in the '
  - type: note
    content: Josh. 17:15
  - type: text
    content: 'mountains of Ephraim, and the children of Israel went down with him from the mountains; and he led them. '
  '28':
  - type: text
    content: 'Then he said to them, “Follow '
  - type: text
    content: me,
  - type: text
    content: ' for '
  - type: note
    content: Judg. 7:9, 15; 1 Sam. 17:47
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' has delivered your enemies the Moabites into your hand.” So they went down after him, seized the '
  - type: note
    content: Josh. 2:7; Judg. 12:5
  - type: text
    content: 'fords of the Jordan leading to Moab, and did not allow anyone to cross over. '
  '29':
  - type: text
    content: 'And at that time they killed about ten thousand men of Moab, all stout men of valor; not a man escaped. '
  '3':
  - type: text
    content: namely,
  - type: text
    content: ' '
  - type: note
    content: Josh. 13:3
  - type: text
    content: 'five lords of the Philistines, all the Canaanites, the Sidonians, and the Hivites who dwelt in Mount Lebanon, from Mount Baal Hermon to the entrance of Hamath. '
  '30':
  - type: text
    content: 'So Moab was subdued that day under the hand of Israel. And '
  - type: note
    content: Judg. 3:11
  - type: text
    content: the land had rest for eighty years.
  - type: heading
    content: Shamgar
  '31':
  - type: text
    content: 'After him was '
  - type: note
    content: Judg. 5:6
  - type: text
    content: 'Shamgar the son of Anath, who killed six hundred men of the Philistines '
  - type: note
    content: 1 Sam. 17:47
  - type: text
    content: 'with an ox goad; '
  - type: note
    content: Judg. 2:16
  - type: text
    content: 'and he also delivered '
  - type: note
    content: 1 Sam. 4:1
  - type: text
    content: Israel.
  '4':
  - type: text
    content: 'And they were '
  - type: text
    content: left, that He might
  - type: text
    content: ' test Israel by them, to know whether they would obey the commandments of the '
  - type: heading
    content: Lord
  - type: text
    content: ', which He had commanded their fathers by the hand of Moses.'
  '5':
  - type: note
    content: Ps. 106:35
  - type: text
    content: 'Thus the children of Israel dwelt among the Canaanites, the Hittites, the Amorites, the Perizzites, the Hivites, and the Jebusites. '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 34:15, 16; Deut. 7:3, 4; Josh. 23:12
  - type: text
    content: they took their daughters to be their wives, and gave their daughters to their sons; and they served their gods.
  - type: heading
    content: Othniel
  '7':
  - type: text
    content: 'So the children of Israel did '
  - type: note
    content: Judg. 2:11
  - type: text
    content: 'evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: '. They '
  - type: note
    content: Deut. 32:18
  - type: text
    content: 'forgot the '
  - type: heading
    content: Lord
  - type: text
    content: ' their God, and served the Baals and Asherahs. '
  '8':
  - type: text
    content: 'Therefore the anger of the '
  - type: heading
    content: Lord
  - type: text
    content: ' was hot against Israel, and He '
  - type: note
    content: Deut. 32:30; Judg. 2:14
  - type: text
    content: 'sold them into the hand of '
  - type: note
    content: Hab. 3:7
  - type: text
    content: 'Cushan-Rishathaim king of Mesopotamia; and the children of Israel served Cushan-Rishathaim eight years. '
  '9':
  - type: text
    content: 'When the children of Israel '
  - type: note
    content: Judg. 3:15
  - type: text
    content: 'cried out to the '
  - type: heading
    content: Lord
  - type: text
