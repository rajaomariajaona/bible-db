document_id: JDG.21,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wives Provided for the Benjamites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:1
      marker-yv: yv-n
    - type: text
      text: 'the men of Israel had sworn an oath at Mizpah, saying, “None of us shall give his daughter to Benjamin as a wife.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the congregation sent out there twelve thousand of their most valiant men, and commanded them, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 31:17; Judg. 5:23; 1 Sam. 11:7
      marker-yv: yv-n
    - type: text
      text: '“Go and strike the inhabitants of Jabesh Gilead with the edge of the sword, including the women and children. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the thing that you shall do: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 31:17; Deut. 20:13, 14
      marker-yv: yv-n
    - type: text
      text: 'You shall utterly destroy every male, and every woman who has known a man intimately.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they found among the inhabitants of Jabesh Gilead four hundred young virgins who had not known a man intimately; and they brought them to the camp at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:1; Judg. 18:31
      marker-yv: yv-n
    - type: text
      text: Shiloh, which is in the land of Canaan.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the whole congregation sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to the children of Benjamin '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:47
      marker-yv: yv-n
    - type: text
      text: 'who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' at the rock of Rimmon, and announced peace to them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Benjamin came back at that time, and they gave them the women whom they had saved alive of the women of Jabesh Gilead; and yet they had not found enough for them.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 21:6
      marker-yv: yv-n
    - type: text
      text: 'grieved for Benjamin, because the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had made a void in the tribes of Israel.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the elders of the congregation said, “What shall we do for wives for those who remain, since the women of Benjamin have been destroyed?” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they said, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: There
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: must
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' an inheritance for the survivors of Benjamin, that a tribe may not be destroyed from Israel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, we cannot give them wives from our daughters, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 11:35; 21:1
      marker-yv: yv-n
    - type: text
      text: 'for the children of Israel have sworn an oath, saying, ‘Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the one who gives a wife to Benjamin.’ ” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they said, “In fact, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a yearly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 23:2
      marker-yv: yv-n
    - type: text
      text: 'feast of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:5; Josh. 18:1; Judg. 18:31; 1 Sam. 1:3
      marker-yv: yv-n
    - type: text
      text: 'Shiloh, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' north of Bethel, on the east side of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:31
      marker-yv: yv-n
    - type: text
      text: highway that goes up from Bethel to Shechem, and south of Lebonah.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the people came '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:18, 26
      marker-yv: yv-n
    - type: text
      text: 'to the house of God, and remained there before God till evening. They lifted up their voices and wept bitterly, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore they instructed the children of Benjamin, saying, “Go, lie in wait in the vineyards, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and watch; and just when the daughters of Shiloh come out '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:20; Judg. 11:34; 1 Sam. 18:6
      marker-yv: yv-n
    - type: text
      text: 'to perform their dances, then come out from the vineyards, and every man catch a wife for himself from the daughters of Shiloh; then go to the land of Benjamin. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then it shall be, when their fathers or their brothers come to us to complain, that we will say to them, ‘Be kind to them for our sakes, because we did not take a wife for any of them in the war; for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: though
    - type: text
      text: ' you have given the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: women
    - type: text
      text: ' to them at this time, making yourselves guilty of your oath.’ ”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Benjamin did so; they took enough wives for their number from those who danced, whom they caught. Then they went and returned to their inheritance, and they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:48
      marker-yv: yv-n
    - type: text
      text: 'rebuilt the cities and dwelt in them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the children of Israel departed from there at that time, every man to his tribe and family; they went out from there, every man to his inheritance.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 17:6; 18:1; 19:1
      marker-yv: yv-n
    - type: text
      text: 'In those days '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' no king in Israel; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:8; Judg. 17:6
      marker-yv: yv-n
    - type: text
      text: 'everyone did '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' right in his own eyes.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said, “O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel, why has this come to pass in Israel, that today there should be one tribe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: missing
    - type: text
      text: ' in Israel?”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it was, on the next morning, that the people rose early and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:5; 2 Sam. 24:25
      marker-yv: yv-n
    - type: text
      text: 'built an altar there, and offered burnt offerings and peace offerings. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The children of Israel said, “Who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' among all the tribes of Israel who did not come up with the assembly to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '?” '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:1–3
      marker-yv: yv-n
    - type: text
      text: 'For they had made a great oath concerning anyone who had not come up to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at Mizpah, saying, “He shall surely be put to death.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel grieved for Benjamin their brother, and said, “One tribe is cut off from Israel today. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What shall we do for wives for those who remain, seeing we have sworn by the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that we will not give them our daughters as wives?”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said, “What one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' from the tribes of Israel who did not come up to Mizpah to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '?” And, in fact, no one had come to the camp from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 11:1; 31:11
      marker-yv: yv-n
    - type: text
      text: 'Jabesh Gilead to the assembly. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For when the people were counted, indeed, not one of the inhabitants of Jabesh Gilead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' there. '
