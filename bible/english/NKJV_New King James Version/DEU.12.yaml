document_id: DEU.12,114
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prescribed Place of Worship
  - type: text
    content: '“These '
  - type: note
    content: Deut. 6:1
  - type: text
    content: are
  - type: text
    content: ' the statutes and judgments which you shall be careful to observe in the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of your fathers is giving you to possess, '
  - type: note
    content: Deut. 4:9, 10; 1 Kin. 8:40
  - type: text
    content: 'all the days that you live on the earth. '
  '10':
  - type: text
    content: 'But '
  - type: text
    content: when
  - type: text
    content: ' you cross over the Jordan and dwell in the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God is giving you to inherit, and He gives you '
  - type: note
    content: Josh. 11:23
  - type: text
    content: 'rest from all your enemies round about, so that you dwell in safety, '
  '11':
  - type: text
    content: 'then there will be the place where the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God chooses to make His name abide. There you shall bring all that I command you: your burnt offerings, your sacrifices, your tithes, the heave offerings of your hand, and all your choice offerings which you vow to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 12:18; 26:11
  - type: text
    content: 'you shall rejoice before the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, you and your sons and your daughters, your male and female servants, and the '
  - type: note
    content: Deut. 10:9; 14:29
  - type: text
    content: 'Levite who '
  - type: text
    content: is
  - type: text
    content: ' within your gates, since he has no portion nor inheritance with you. '
  '13':
  - type: text
    content: 'Take heed to yourself that you do not offer your burnt offerings in every place that you see; '
  '14':
  - type: text
    content: 'but in the place which the '
  - type: heading
    content: Lord
  - type: text
    content: ' chooses, in one of your tribes, there you shall offer your burnt offerings, and there you shall do all that I command you.'
  '15':
  - type: text
    content: '“However, '
  - type: note
    content: Deut. 12:21
  - type: text
    content: 'you may slaughter and eat meat within all your gates, whatever your heart desires, according to the blessing of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God which He has given you; '
  - type: note
    content: Deut. 12:22
  - type: text
    content: 'the unclean and the clean may eat of it, '
  - type: note
    content: Deut. 14:5
  - type: text
    content: 'of the gazelle and the deer alike. '
  '16':
  - type: note
    content: Gen. 9:4; Lev. 7:26; 17:10–12; 1 Sam. 14:33; Acts 15:20, 29
  - type: text
    content: 'Only you shall not eat the blood; you shall pour it on the earth like water. '
  '17':
  - type: text
    content: 'You may not eat within your gates the tithe of your grain or your new wine or your oil, of the firstborn of your herd or your flock, of any of your offerings which you vow, of your freewill offerings, or of the heave offering of your hand. '
  '18':
  - type: text
    content: 'But you must eat them before the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God in the place which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God chooses, you and your son and your daughter, your male servant and your female servant, and the Levite who '
  - type: text
    content: is
  - type: text
    content: ' within your gates; and you shall rejoice before the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God in all to which you put your hands. '
  '19':
  - type: text
    content: Take heed to yourself that you do not forsake the Levite as long as you live in your land.
  '2':
  - type: note
    content: Ex. 34:13
  - type: text
    content: 'You shall utterly destroy all the places where the nations which you shall dispossess served their gods, '
  - type: note
    content: 2 Kin. 16:4; 17:10, 11
  - type: text
    content: 'on the high mountains and on the hills and under every green tree. '
  '20':
  - type: text
    content: '“When the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: Gen. 15:18; Ex. 34:24; Deut. 11:24; 19:8
  - type: text
    content: 'enlarges your border as He has promised you, and you say, ‘Let me eat meat,’ because you long to eat meat, you may eat as much meat as your heart desires. '
  '21':
  - type: text
    content: 'If the place where the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God chooses to put His name is too far from '
  - type: note
    content: Deut. 14:24
  - type: text
    content: 'you, then you may slaughter from your herd and from your flock which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has given you, just as I have commanded you, and you may eat within your gates as much as your heart desires. '
  '22':
  - type: text
    content: 'Just as the gazelle and the deer are eaten, so you may eat them; the unclean and the clean alike may eat them. '
  '23':
  - type: text
    content: 'Only be sure that you do not eat the blood, '
  - type: note
    content: Gen. 9:4; Lev. 17:10–14; Deut. 12:16
  - type: text
    content: 'for the blood '
  - type: text
    content: is
  - type: text
    content: ' the life; you may not eat the life with the meat. '
  '24':
  - type: text
    content: 'You shall not eat it; you shall pour it on the earth like water. '
  '25':
  - type: text
    content: 'You shall not eat it, '
  - type: note
    content: Deut. 4:40; 6:18; Is. 3:10
  - type: text
    content: 'that it may go well with you and your children after you, '
  - type: note
    content: Ex. 15:26; 1 Kin. 11:38
  - type: text
    content: 'when you do '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' right in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Only the '
  - type: note
    content: Num. 5:9, 10; 18:19
  - type: text
    content: 'holy things which you have, and your vowed offerings, you shall take and go to the place which the '
  - type: heading
    content: Lord
  - type: text
    content: ' chooses. '
  '27':
  - type: text
    content: 'And '
  - type: note
    content: Lev. 1:5, 9, 13, 17
  - type: text
    content: 'you shall offer your burnt offerings, the meat and the blood, on the altar of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God; and the blood of your sacrifices shall be poured out on the altar of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, and you shall eat the meat. '
  '28':
  - type: text
    content: 'Observe and obey all these words which I command you, '
  - type: note
    content: Deut. 12:25
  - type: text
    content: 'that it may go well with you and your children after you forever, when you do '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' good and right in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.'
  - type: heading
    content: Beware of False Gods
  '29':
  - type: text
    content: '“When '
  - type: note
    content: Ex. 23:23; Deut. 19:1; Josh. 23:4
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God cuts off from before you the nations which you go to dispossess, and you displace them and dwell in their land, '
  '3':
  - type: text
    content: 'And '
  - type: note
    content: Num. 33:52; Deut. 7:5; Judg. 2:2
  - type: text
    content: 'you shall destroy their altars, break their '
  - type: text
    content: sacred
  - type: text
    content: ' pillars, and burn their wooden images with fire; you shall cut down the carved images of their gods and destroy their names from that place. '
  '30':
  - type: text
    content: 'take heed to yourself that you are not ensnared to follow them, after they are destroyed from before you, and that you do not inquire after their gods, saying, ‘How did these nations serve their gods? I also will do likewise.’ '
  '31':
  - type: note
    content: Lev. 18:3, 26, 30; 20:1, 2
  - type: text
    content: 'You shall not worship the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God in that way; for every abomination to the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He hates they have done to their gods; for '
  - type: note
    content: Deut. 18:10; Ps. 106:37; Jer. 32:35
  - type: text
    content: they burn even their sons and daughters in the fire to their gods.
  '32':
  - type: text
    content: '“Whatever I command you, be careful to observe it; '
  - type: note
    content: Deut. 4:2; 13:18; Josh. 1:7; Prov. 30:6; Rev. 22:18, 19
  - type: text
    content: you shall not add to it nor take away from it.
  '4':
  - type: text
    content: 'You shall not '
  - type: note
    content: Deut. 12:31
  - type: text
    content: 'worship the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: text
    content: with
  - type: text
    content: ' such '
  - type: text
    content: things.
  '5':
  - type: text
    content: '“But you shall seek the '
  - type: note
    content: Ex. 20:24
  - type: text
    content: 'place where the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God chooses, out of all your tribes, to put His name for His '
  - type: note
    content: Ex. 15:13; 1 Sam. 2:29
  - type: text
    content: 'dwelling place; and there you shall go. '
  '6':
  - type: note
    content: Lev. 17:3, 4
  - type: text
    content: 'There you shall take your burnt offerings, your sacrifices, your tithes, the heave offerings of your hand, your vowed offerings, your freewill offerings, and the '
  - type: note
    content: Deut. 14:23
  - type: text
    content: 'firstborn of your herds and flocks. '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 14:26
  - type: text
    content: 'there you shall eat before the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, and '
  - type: note
    content: Deut. 12:12, 18
  - type: text
    content: 'you shall rejoice in all to which you have put your hand, you and your households, in which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has blessed you.'
  '8':
  - type: text
    content: “You shall not at all do as we are doing here today—
  - type: note
    content: Judg. 17:6; 21:25
  - type: text
    content: 'every man doing whatever '
  - type: text
    content: is
  - type: text
    content: ' right in his own eyes— '
  '9':
  - type: text
    content: 'for as yet you have not come to the '
  - type: note
    content: Deut. 3:20; 25:19; Ps. 95:11
  - type: text
    content: 'rest and the inheritance which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God is giving you. '
