document_id: DEU.12,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prescribed Place of Worship
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“These '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 6:1
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the statutes and judgments which you shall be careful to observe in the land which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of your fathers is giving you to possess, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:9, 10; 1 Kin. 8:40
      marker-yv: yv-n
    - type: text
      text: 'all the days that you live on the earth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when
    - type: text
      text: ' you cross over the Jordan and dwell in the land which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you to inherit, and He gives you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 11:23
      marker-yv: yv-n
    - type: text
      text: 'rest from all your enemies round about, so that you dwell in safety, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then there will be the place where the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God chooses to make His name abide. There you shall bring all that I command you: your burnt offerings, your sacrifices, your tithes, the heave offerings of your hand, and all your choice offerings which you vow to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:18; 26:11
      marker-yv: yv-n
    - type: text
      text: 'you shall rejoice before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, you and your sons and your daughters, your male and female servants, and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 10:9; 14:29
      marker-yv: yv-n
    - type: text
      text: 'Levite who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' within your gates, since he has no portion nor inheritance with you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Take heed to yourself that you do not offer your burnt offerings in every place that you see; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but in the place which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' chooses, in one of your tribes, there you shall offer your burnt offerings, and there you shall do all that I command you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“However, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:21
      marker-yv: yv-n
    - type: text
      text: 'you may slaughter and eat meat within all your gates, whatever your heart desires, according to the blessing of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God which He has given you; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:22
      marker-yv: yv-n
    - type: text
      text: 'the unclean and the clean may eat of it, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 14:5
      marker-yv: yv-n
    - type: text
      text: 'of the gazelle and the deer alike. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:4; Lev. 7:26; 17:10–12; 1 Sam. 14:33; Acts 15:20, 29
      marker-yv: yv-n
    - type: text
      text: 'Only you shall not eat the blood; you shall pour it on the earth like water. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You may not eat within your gates the tithe of your grain or your new wine or your oil, of the firstborn of your herd or your flock, of any of your offerings which you vow, of your freewill offerings, or of the heave offering of your hand. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you must eat them before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God in the place which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God chooses, you and your son and your daughter, your male servant and your female servant, and the Levite who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' within your gates; and you shall rejoice before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God in all to which you put your hands. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Take heed to yourself that you do not forsake the Levite as long as you live in your land.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 34:13
      marker-yv: yv-n
    - type: text
      text: 'You shall utterly destroy all the places where the nations which you shall dispossess served their gods, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 16:4; 17:10, 11
      marker-yv: yv-n
    - type: text
      text: 'on the high mountains and on the hills and under every green tree. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:18; Ex. 34:24; Deut. 11:24; 19:8
      marker-yv: yv-n
    - type: text
      text: 'enlarges your border as He has promised you, and you say, ‘Let me eat meat,’ because you long to eat meat, you may eat as much meat as your heart desires. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the place where the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God chooses to put His name is too far from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 14:24
      marker-yv: yv-n
    - type: text
      text: 'you, then you may slaughter from your herd and from your flock which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given you, just as I have commanded you, and you may eat within your gates as much as your heart desires. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just as the gazelle and the deer are eaten, so you may eat them; the unclean and the clean alike may eat them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only be sure that you do not eat the blood, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:4; Lev. 17:10–14; Deut. 12:16
      marker-yv: yv-n
    - type: text
      text: 'for the blood '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the life; you may not eat the life with the meat. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall not eat it; you shall pour it on the earth like water. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall not eat it, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:40; 6:18; Is. 3:10
      marker-yv: yv-n
    - type: text
      text: 'that it may go well with you and your children after you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:26; 1 Kin. 11:38
      marker-yv: yv-n
    - type: text
      text: 'when you do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' right in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 5:9, 10; 18:19
      marker-yv: yv-n
    - type: text
      text: 'holy things which you have, and your vowed offerings, you shall take and go to the place which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' chooses. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:5, 9, 13, 17
      marker-yv: yv-n
    - type: text
      text: 'you shall offer your burnt offerings, the meat and the blood, on the altar of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God; and the blood of your sacrifices shall be poured out on the altar of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, and you shall eat the meat. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Observe and obey all these words which I command you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:25
      marker-yv: yv-n
    - type: text
      text: 'that it may go well with you and your children after you forever, when you do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good and right in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Beware of False Gods
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:23; Deut. 19:1; Josh. 23:4
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God cuts off from before you the nations which you go to dispossess, and you displace them and dwell in their land, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 33:52; Deut. 7:5; Judg. 2:2
      marker-yv: yv-n
    - type: text
      text: 'you shall destroy their altars, break their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sacred
    - type: text
      text: ' pillars, and burn their wooden images with fire; you shall cut down the carved images of their gods and destroy their names from that place. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'take heed to yourself that you are not ensnared to follow them, after they are destroyed from before you, and that you do not inquire after their gods, saying, ‘How did these nations serve their gods? I also will do likewise.’ '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:3, 26, 30; 20:1, 2
      marker-yv: yv-n
    - type: text
      text: 'You shall not worship the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God in that way; for every abomination to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' which He hates they have done to their gods; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 18:10; Ps. 106:37; Jer. 32:35
      marker-yv: yv-n
    - type: text
      text: they burn even their sons and daughters in the fire to their gods.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Whatever I command you, be careful to observe it; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:2; 13:18; Josh. 1:7; Prov. 30:6; Rev. 22:18, 19
      marker-yv: yv-n
    - type: text
      text: you shall not add to it nor take away from it.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:31
      marker-yv: yv-n
    - type: text
      text: 'worship the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' such '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But you shall seek the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:24
      marker-yv: yv-n
    - type: text
      text: 'place where the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God chooses, out of all your tribes, to put His name for His '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:13; 1 Sam. 2:29
      marker-yv: yv-n
    - type: text
      text: 'dwelling place; and there you shall go. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 17:3, 4
      marker-yv: yv-n
    - type: text
      text: 'There you shall take your burnt offerings, your sacrifices, your tithes, the heave offerings of your hand, your vowed offerings, your freewill offerings, and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 14:23
      marker-yv: yv-n
    - type: text
      text: 'firstborn of your herds and flocks. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 14:26
      marker-yv: yv-n
    - type: text
      text: 'there you shall eat before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:12, 18
      marker-yv: yv-n
    - type: text
      text: 'you shall rejoice in all to which you have put your hand, you and your households, in which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has blessed you.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You shall not at all do as we are doing here today—
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 17:6; 21:25
      marker-yv: yv-n
    - type: text
      text: 'every man doing whatever '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' right in his own eyes— '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for as yet you have not come to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 3:20; 25:19; Ps. 95:11
      marker-yv: yv-n
    - type: text
      text: 'rest and the inheritance which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you. '
