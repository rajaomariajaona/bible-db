document_id: LEV.5,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Trespass Offering
  - type: text
    content: '‘If a person sins in '
  - type: note
    content: Prov. 29:24; (Jer. 23:10)
  - type: text
    content: 'hearing the utterance of an oath, and is a witness, whether he has seen or known of the matter—if he does not tell it, he '
  - type: note
    content: Lev. 5:17; 7:18; 17:16; 19:8; 20:17; Num. 9:13
  - type: text
    content: bears guilt.
  '10':
  - type: text
    content: 'And he shall offer the second as a burnt offering according to the '
  - type: note
    content: Lev. 1:14–17
  - type: text
    content: 'prescribed manner. So '
  - type: note
    content: Lev. 4:20, 26; 5:13, 16
  - type: text
    content: the priest shall make atonement on his behalf for his sin which he has committed, and it shall be forgiven him.
  '11':
  - type: text
    content: '‘But if he is '
  - type: note
    content: Lev. 14:21–32
  - type: text
    content: 'not able to bring two turtledoves or two young pigeons, then he who sinned shall bring for his offering one-tenth of an ephah of fine flour as a sin offering. '
  - type: note
    content: Lev. 2:1, 2; 6:15; Num. 5:15
  - type: text
    content: 'He shall put no oil on it, nor shall he put frankincense on it, for it is a sin offering. '
  '12':
  - type: text
    content: 'Then he shall bring it to the priest, and the priest shall take his handful of it '
  - type: note
    content: Lev. 2:2
  - type: text
    content: 'as a memorial portion, and burn it on the altar '
  - type: note
    content: Lev. 4:35
  - type: text
    content: 'according to the offerings made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: '. It is a sin offering. '
  '13':
  - type: note
    content: Lev. 4:26
  - type: text
    content: 'The priest shall make atonement for him, for his sin that he has committed in any of these matters; and it shall be forgiven him. '
  - type: note
    content: Lev. 2:3; 6:17, 26
  - type: text
    content: The rest shall be the priest’s as a grain offering.’ ”
  - type: heading
    content: Offerings with Restitution
  '14':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '15':
  - type: note
    content: Lev. 4:2; 22:14; Num. 5:5–8
  - type: text
    content: '“If a person commits a trespass, and sins unintentionally in regard to the holy things of the '
  - type: heading
    content: Lord
  - type: text
    content: ', then '
  - type: note
    content: Ezra 10:19
  - type: text
    content: 'he shall bring to the '
  - type: heading
    content: Lord
  - type: text
    content: ' as his trespass offering a ram without blemish from the flocks, with your valuation in shekels of silver according to '
  - type: note
    content: Ex. 30:13; Lev. 27:25
  - type: text
    content: 'the shekel of the sanctuary, as a trespass offering. '
  '16':
  - type: text
    content: 'And he shall make restitution for the harm that he has done in regard to the holy thing, '
  - type: note
    content: Lev. 6:5; 22:14; 27:13, 15, 27, 31; Num. 5:7
  - type: text
    content: 'and shall add one-fifth to it and give it to the priest. '
  - type: note
    content: Lev. 4:26
  - type: text
    content: So the priest shall make atonement for him with the ram of the trespass offering, and it shall be forgiven him.
  '17':
  - type: text
    content: '“If a person sins, and commits any of these things which are forbidden to be done by the commandments of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Lev. 4:2, 13, 22, 27
  - type: text
    content: 'though he does not know it, yet he is '
  - type: note
    content: Lev. 5:1, 2
  - type: text
    content: 'guilty and shall bear his iniquity. '
  '18':
  - type: note
    content: Lev. 5:15
  - type: text
    content: 'And he shall bring to the priest a ram without blemish from the flock, with your valuation, as a trespass offering. So the priest shall make atonement for him regarding his ignorance in which he erred and did not know it, and it shall be forgiven him. '
  '19':
  - type: text
    content: 'It is a trespass offering; '
  - type: note
    content: Ezra 10:2
  - type: text
    content: 'he has certainly trespassed against the '
  - type: heading
    content: Lord
  - type: text
    content: .”
  '2':
  - type: text
    content: '‘Or '
  - type: note
    content: Lev. 11:24, 28, 31, 39; Num. 19:11–16; Deut. 14:8
  - type: text
    content: 'if a person touches any unclean thing, whether it is the carcass of an unclean beast, or the carcass of unclean livestock, or the carcass of unclean creeping things, and he is unaware of it, he also shall be unclean and '
  - type: note
    content: Lev. 5:17
  - type: text
    content: 'guilty. '
  '3':
  - type: text
    content: 'Or if he touches '
  - type: note
    content: Lev. 5:12, 13, 15
  - type: text
    content: human uncleanness—whatever uncleanness with which a man may be defiled, and he is unaware of it—when he realizes it, then he shall be guilty.
  '4':
  - type: text
    content: '‘Or if a person swears, speaking thoughtlessly with his lips '
  - type: note
    content: 1 Sam. 25:22; Acts 23:12
  - type: text
    content: 'to do evil or '
  - type: note
    content: (Matt. 5:33–37); Mark 6:23; (James 5:12)
  - type: text
    content: to do good, whatever it is that a man may pronounce by an oath, and he is unaware of it—when he realizes it, then he shall be guilty in any of these matters.
  '5':
  - type: text
    content: '‘And it shall be, when he is guilty in any of these matters, that he shall '
  - type: note
    content: Lev. 16:21; 26:40; Num. 5:7; Ezra 10:11, 12; Ps. 32:5; Prov. 28:13
  - type: text
    content: 'confess that he has sinned in that thing; '
  '6':
  - type: text
    content: 'and he shall bring his trespass offering to the '
  - type: heading
    content: Lord
  - type: text
    content: ' for his sin which he has committed, a female from the flock, a lamb or a kid of the goats as a sin offering. So the priest shall make atonement for him concerning his sin.'
  '7':
  - type: note
    content: Lev. 12:6, 8; 14:21
  - type: text
    content: '‘If he is not able to bring a lamb, then he shall bring to the '
  - type: heading
    content: Lord
  - type: text
    content: ', for his trespass which he has committed, two '
  - type: note
    content: Lev. 1:14
  - type: text
    content: 'turtledoves or two young pigeons: one as a sin offering and the other as a burnt offering. '
  '8':
  - type: text
    content: 'And he shall bring them to the priest, who shall offer that which is for the sin offering first, and '
  - type: note
    content: Lev. 1:15–17
  - type: text
    content: 'wring off its head from its neck, but shall not divide it completely. '
  '9':
  - type: text
    content: 'Then he shall sprinkle some of the blood of the sin offering on the side of the altar, and the '
  - type: note
    content: Lev. 4:7, 18, 30, 34
  - type: text
    content: 'rest of the blood shall be drained out at the base of the altar. It is a sin offering. '
