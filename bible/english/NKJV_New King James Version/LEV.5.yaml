document_id: LEV.5,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Trespass Offering
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '‘If a person sins in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 29:24; (Jer. 23:10)
      marker-yv: yv-n
    - type: text
      text: 'hearing the utterance of an oath, and is a witness, whether he has seen or known of the matter—if he does not tell it, he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:17; 7:18; 17:16; 19:8; 20:17; Num. 9:13
      marker-yv: yv-n
    - type: text
      text: bears guilt.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And he shall offer the second as a burnt offering according to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:14–17
      marker-yv: yv-n
    - type: text
      text: 'prescribed manner. So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:20, 26; 5:13, 16
      marker-yv: yv-n
    - type: text
      text: the priest shall make atonement on his behalf for his sin which he has committed, and it shall be forgiven him.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '‘But if he is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:21–32
      marker-yv: yv-n
    - type: text
      text: 'not able to bring two turtledoves or two young pigeons, then he who sinned shall bring for his offering one-tenth of an ephah of fine flour as a sin offering. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:1, 2; 6:15; Num. 5:15
      marker-yv: yv-n
    - type: text
      text: 'He shall put no oil on it, nor shall he put frankincense on it, for it is a sin offering. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then he shall bring it to the priest, and the priest shall take his handful of it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:2
      marker-yv: yv-n
    - type: text
      text: 'as a memorial portion, and burn it on the altar '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:35
      marker-yv: yv-n
    - type: text
      text: 'according to the offerings made by fire to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. It is a sin offering. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:26
      marker-yv: yv-n
    - type: text
      text: 'The priest shall make atonement for him, for his sin that he has committed in any of these matters; and it shall be forgiven him. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:3; 6:17, 26
      marker-yv: yv-n
    - type: text
      text: The rest shall be the priest’s as a grain offering.’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Offerings with Restitution
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:2; 22:14; Num. 5:5–8
      marker-yv: yv-n
    - type: text
      text: '“If a person commits a trespass, and sins unintentionally in regard to the holy things of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 10:19
      marker-yv: yv-n
    - type: text
      text: 'he shall bring to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as his trespass offering a ram without blemish from the flocks, with your valuation in shekels of silver according to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:13; Lev. 27:25
      marker-yv: yv-n
    - type: text
      text: 'the shekel of the sanctuary, as a trespass offering. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And he shall make restitution for the harm that he has done in regard to the holy thing, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 6:5; 22:14; 27:13, 15, 27, 31; Num. 5:7
      marker-yv: yv-n
    - type: text
      text: 'and shall add one-fifth to it and give it to the priest. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:26
      marker-yv: yv-n
    - type: text
      text: So the priest shall make atonement for him with the ram of the trespass offering, and it shall be forgiven him.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“If a person sins, and commits any of these things which are forbidden to be done by the commandments of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:2, 13, 22, 27
      marker-yv: yv-n
    - type: text
      text: 'though he does not know it, yet he is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:1, 2
      marker-yv: yv-n
    - type: text
      text: 'guilty and shall bear his iniquity. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:15
      marker-yv: yv-n
    - type: text
      text: 'And he shall bring to the priest a ram without blemish from the flock, with your valuation, as a trespass offering. So the priest shall make atonement for him regarding his ignorance in which he erred and did not know it, and it shall be forgiven him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'It is a trespass offering; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 10:2
      marker-yv: yv-n
    - type: text
      text: 'he has certainly trespassed against the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '‘Or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:24, 28, 31, 39; Num. 19:11–16; Deut. 14:8
      marker-yv: yv-n
    - type: text
      text: 'if a person touches any unclean thing, whether it is the carcass of an unclean beast, or the carcass of unclean livestock, or the carcass of unclean creeping things, and he is unaware of it, he also shall be unclean and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:17
      marker-yv: yv-n
    - type: text
      text: 'guilty. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Or if he touches '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:12, 13, 15
      marker-yv: yv-n
    - type: text
      text: human uncleanness—whatever uncleanness with which a man may be defiled, and he is unaware of it—when he realizes it, then he shall be guilty.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '‘Or if a person swears, speaking thoughtlessly with his lips '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 25:22; Acts 23:12
      marker-yv: yv-n
    - type: text
      text: 'to do evil or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 5:33–37); Mark 6:23; (James 5:12)
      marker-yv: yv-n
    - type: text
      text: to do good, whatever it is that a man may pronounce by an oath, and he is unaware of it—when he realizes it, then he shall be guilty in any of these matters.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '‘And it shall be, when he is guilty in any of these matters, that he shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 16:21; 26:40; Num. 5:7; Ezra 10:11, 12; Ps. 32:5; Prov. 28:13
      marker-yv: yv-n
    - type: text
      text: 'confess that he has sinned in that thing; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and he shall bring his trespass offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for his sin which he has committed, a female from the flock, a lamb or a kid of the goats as a sin offering. So the priest shall make atonement for him concerning his sin.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 12:6, 8; 14:21
      marker-yv: yv-n
    - type: text
      text: '‘If he is not able to bring a lamb, then he shall bring to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for his trespass which he has committed, two '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:14
      marker-yv: yv-n
    - type: text
      text: 'turtledoves or two young pigeons: one as a sin offering and the other as a burnt offering. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And he shall bring them to the priest, who shall offer that which is for the sin offering first, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:15–17
      marker-yv: yv-n
    - type: text
      text: 'wring off its head from its neck, but shall not divide it completely. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then he shall sprinkle some of the blood of the sin offering on the side of the altar, and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:7, 18, 30, 34
      marker-yv: yv-n
    - type: text
      text: 'rest of the blood shall be drained out at the base of the altar. It is a sin offering. '
