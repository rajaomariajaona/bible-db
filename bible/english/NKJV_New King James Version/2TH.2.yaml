  '1':
  - type: heading
    content: The Great Apostasy
  - type: text
    content: 'Now, brethren, '
  - type: note
    content: Mark 13:26; (1 Thess. 4:15–17)
  - type: text
    content: 'concerning the coming of our Lord Jesus Christ '
  - type: note
    content: Matt. 24:31
  - type: text
    content: 'and our gathering together to Him, we ask you, '
  '10':
  - type: text
    content: 'and with all unrighteous deception among '
  - type: note
    content: 2 Cor. 2:15
  - type: text
    content: 'those who perish, because they did not receive '
  - type: note
    content: 1 Cor. 16:22
  - type: text
    content: 'the love of the truth, that they might be saved. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: Rom. 1:28
  - type: text
    content: 'for this reason God will send them strong delusion, '
  - type: note
    content: 1 Tim. 4:1
  - type: text
    content: 'that they should believe the lie, '
  '12':
  - type: text
    content: 'that they all may be condemned who did not believe the truth but '
  - type: note
    content: Rom. 1:32; 1 Cor. 13:6
  - type: text
    content: had pleasure in unrighteousness.
  - type: heading
    content: Stand Fast
  '13':
  - type: text
    content: 'But we are bound to give thanks to God always for you, brethren beloved by the Lord, because God '
  - type: note
    content: Eph. 1:4
  - type: text
    content: 'from the beginning '
  - type: note
    content: 1 Thess. 1:4
  - type: text
    content: 'chose you for salvation '
  - type: note
    content: 1 Thess. 4:7; (1 Pet. 1:2)
  - type: text
    content: 'through sanctification by the Spirit and belief in the truth, '
  '14':
  - type: text
    content: 'to which He called you by our gospel, for '
  - type: note
    content: 1 Pet. 5:10
  - type: text
    content: 'the obtaining of the glory of our Lord Jesus Christ. '
  '15':
  - type: text
    content: 'Therefore, brethren, '
  - type: note
    content: 1 Cor. 16:13
  - type: text
    content: 'stand fast and hold '
  - type: note
    content: Rom. 6:17; 1 Cor. 11:2; 2 Thess. 3:6; Jude 3
  - type: text
    content: the traditions which you were taught, whether by word or our epistle.
  '16':
  - type: text
    content: 'Now may our Lord Jesus Christ Himself, and our God and Father, '
  - type: note
    content: (Rev. 1:5)
  - type: text
    content: 'who has loved us and given '
  - type: text
    content: us
  - type: text
    content: ' everlasting consolation and '
  - type: note
