    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Do you not remember that when I was still with you I told you these things? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And now you know what is restraining, that he may be revealed in his own time. '
  - type: usfm
    marker: vlbl
    children:
