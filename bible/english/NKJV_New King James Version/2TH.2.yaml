  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 1:4
    marker-yv: yv-n
  - type: text
    text: 'chose you for salvation '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 4:7; (1 Pet. 1:2)
    marker-yv: yv-n
  - type: text
    text: 'through sanctification by the Spirit and belief in the truth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'to which He called you by our gospel, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Pet. 5:10
    marker-yv: yv-n
  - type: text
    text: 'the obtaining of the glory of our Lord Jesus Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Therefore, brethren, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 16:13
    marker-yv: yv-n
  - type: text
    text: 'stand fast and hold '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 6:17; 1 Cor. 11:2; 2 Thess. 3:6; Jude 3
    marker-yv: yv-n
  - type: text
    text: the traditions which you were taught, whether by word or our epistle.
- type: usfm
  marker: p
  children:
