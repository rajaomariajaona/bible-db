    marker-yv: yv-n
  - type: text
    text: 'according to the working of Satan, with all power, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 13:1
    marker-yv: yv-n
  - type: text
    text: 'signs, and lying wonders, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and with all unrighteous deception among '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 2:15
    marker-yv: yv-n
  - type: text
    text: 'those who perish, because they did not receive '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 16:22
    marker-yv: yv-n
  - type: text
    text: 'the love of the truth, that they might be saved. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
