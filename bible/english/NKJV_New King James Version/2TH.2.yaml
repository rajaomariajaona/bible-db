    - type: text
      text: 1 Tim. 4:1
    marker-yv: yv-n
  - type: text
    text: 'unless the falling away comes first, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 7:25; 8:25; 11:36; 2 Thess. 2:8; Rev. 13:5
    marker-yv: yv-n
  - type: text
    text: 'the man of sin is revealed, '
  - type: usfm
    marker: x
