document_id: PSA.143,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: An Earnest Appeal for Guidance and Deliverance
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear my prayer, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give ear to my supplications!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In Your faithfulness answer me,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' in Your righteousness.'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 25:1
      marker-yv: yv-n
    - type: text
      text: Teach me to do Your will,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' my God;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 25:4, 5
      marker-yv: yv-n
    - type: text
      text: 'Your Spirit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Lead me in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 9:20
      marker-yv: yv-n
    - type: text
      text: the land of uprightness.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 26:10
      marker-yv: yv-n
    - type: text
      text: 'Revive me, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for Your name’s sake!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For Your righteousness’ sake bring my soul out of trouble.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In Your mercy '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:25
      marker-yv: yv-n
    - type: text
      text: cut off my enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And destroy all those who afflict my soul;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' Your servant.'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not enter into judgment with Your servant,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 34:1, 2
      marker-yv: yv-n
    - type: text
      text: For in Your sight no one living is righteous.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the enemy has persecuted my soul;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has crushed my life to the ground;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has made me dwell in darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like those who have long been dead.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 34:7); Job 4:17; 9:2; 25:4; Ps. 130:3; Eccl. 7:20; (Rom. 3:20–23; Gal. 2:16)
      marker-yv: yv-n
    - type: text
      text: Therefore my spirit is overwhelmed within me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My heart within me is distressed.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 77:3
      marker-yv: yv-n
    - type: text
      text: I remember the days of old;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I meditate on all Your works;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I muse on the work of Your hands.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I spread out my hands to You;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 77:5, 10, 11
      marker-yv: yv-n
    - type: text
      text: 'My soul '
    - type: usfm
      marker: it
      children:
      - type: text
        text: longs
    - type: text
      text: ' for You like a thirsty land.'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Answer me speedily, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My spirit fails!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not hide Your face from me,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 63:1
      marker-yv: yv-n
    - type: text
      text: Lest I be like those who go down into the pit.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Cause me to hear Your lovingkindness '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 28:1
      marker-yv: yv-n
    - type: text
      text: in the morning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For in You do I trust;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 46:5
      marker-yv: yv-n
    - type: text
      text: Cause me to know the way in which I should walk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 5:8
      marker-yv: yv-n
    - type: text
      text: I lift up my soul to You.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Deliver me, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', from my enemies;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In You I take shelter.
