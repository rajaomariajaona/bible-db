verses:
  '1':
  - type: heading
    content: An Earnest Appeal for Guidance and Deliverance
  - type: text
    content: A Psalm of David.
  - type: text
    content: 'Hear my prayer, O '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: Give ear to my supplications!
  - type: text
    content: In Your faithfulness answer me,
  - type: text
    content: And
  - type: text
    content: ' in Your righteousness.'
  '10':
  - type: note
    content: Ps. 25:1
  - type: text
    content: Teach me to do Your will,
  - type: text
    content: 'For You '
  - type: text
    content: are
  - type: text
    content: ' my God;'
  - type: note
    content: Ps. 25:4, 5
  - type: text
    content: 'Your Spirit '
  - type: text
    content: is
  - type: text
    content: ' good.'
  - type: text
    content: 'Lead me in '
  - type: note
    content: Neh. 9:20
  - type: text
    content: the land of uprightness.
  '11':
  - type: note
    content: Is. 26:10
  - type: text
    content: 'Revive me, O '
  - type: heading
    content: Lord
  - type: text
    content: ', for Your name’s sake!'
  - type: text
    content: For Your righteousness’ sake bring my soul out of trouble.
  '12':
  - type: text
    content: 'In Your mercy '
  - type: note
    content: Ps. 119:25
  - type: text
    content: cut off my enemies,
  - type: text
    content: And destroy all those who afflict my soul;
  - type: text
    content: 'For I '
  - type: text
    content: am
  - type: text
    content: ' Your servant.'
  '2':
  - type: text
    content: Do not enter into judgment with Your servant,
  - type: note
    content: Ps. 34:1, 2
  - type: text
    content: For in Your sight no one living is righteous.
  '3':
  - type: text
    content: For the enemy has persecuted my soul;
  - type: text
    content: He has crushed my life to the ground;
  - type: text
    content: He has made me dwell in darkness,
  - type: text
    content: Like those who have long been dead.
  '4':
  - type: note
    content: (Ex. 34:7); Job 4:17; 9:2; 25:4; Ps. 130:3; Eccl. 7:20; (Rom. 3:20–23; Gal. 2:16)
  - type: text
    content: Therefore my spirit is overwhelmed within me;
  - type: text
    content: My heart within me is distressed.
  '5':
  - type: note
    content: Ps. 77:3
  - type: text
    content: I remember the days of old;
  - type: text
    content: I meditate on all Your works;
  - type: text
    content: I muse on the work of Your hands.
  '6':
  - type: text
    content: I spread out my hands to You;
  - type: note
    content: Ps. 77:5, 10, 11
  - type: text
    content: 'My soul '
  - type: text
    content: longs
  - type: text
    content: ' for You like a thirsty land.'
  - type: text
    content: Selah
  '7':
  - type: text
    content: 'Answer me speedily, O '
  - type: heading
    content: Lord
  - type: text
    content: ;
  - type: text
    content: My spirit fails!
  - type: text
    content: Do not hide Your face from me,
  - type: note
    content: Ps. 63:1
  - type: text
    content: Lest I be like those who go down into the pit.
  '8':
  - type: text
    content: 'Cause me to hear Your lovingkindness '
  - type: note
    content: Ps. 28:1
  - type: text
    content: in the morning,
  - type: text
    content: For in You do I trust;
  - type: note
    content: Ps. 46:5
  - type: text
    content: Cause me to know the way in which I should walk,
  - type: text
    content: 'For '
  - type: note
    content: Ps. 5:8
  - type: text
    content: I lift up my soul to You.
  '9':
  - type: text
    content: 'Deliver me, O '
  - type: heading
    content: Lord
  - type: text
    content: ', from my enemies;'
  - type: text
    content: In You I take shelter.
