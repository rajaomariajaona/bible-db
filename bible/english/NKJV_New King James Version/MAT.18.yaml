document_id: MAT.18,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Who Is the Greatest?
  - type: text
    content: 'At '
  - type: note
    content: Mark 9:33–37; Luke 9:46–48; 22:24–27
  - type: text
    content: that time the disciples came to Jesus, saying, “Who then is greatest in the kingdom of heaven?”
  '10':
  - type: text
    content: '“Take heed that you do not despise one of these little ones, for I say to you that in heaven '
  - type: note
    content: (Ps. 34:7); Zech. 13:7; (Heb. 1:14)
  - type: text
    content: 'their angels always '
  - type: note
    content: Esth. 1:14; Luke 1:19; Acts 12:15; (Rev. 8:2)
  - type: text
    content: see the face of My Father who is in heaven.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Luke 9:56; John 3:17
  - type: text
    content: For
  - type: text
    content: ' the Son of Man has come to save that which was lost.'
  '12':
  - type: note
    content: Matt. 18:12–14; Luke 15:4–7
  - type: text
    content: “What do you think? If a man has a hundred sheep, and one of them goes astray, does he not leave the ninety-nine and go to the mountains to seek the one that is straying?
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And if he should find it, assuredly, I say to you, he rejoices more over that '
  - type: text
    content: sheep
  - type: text
    content: ' than over the ninety-nine that did not go astray.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Even so it is not the '
  - type: note
    content: (1 Tim. 2:4)
  - type: text
    content: will of your Father who is in heaven that one of these little ones should perish.
  - type: heading
    content: Dealing with a Sinning Brother
  '15':
  - type: text
    content: '“Moreover '
  - type: note
    content: Lev. 19:17; (Luke 17:3, 4; Gal. 6:1); 2 Thess. 3:15; (James 5:19)
  - type: text
    content: 'if your brother sins against you, go and tell him his fault between you and him alone. If he hears you, '
  - type: note
    content: (James 5:20); 1 Pet. 3:1
  - type: text
    content: you have gained your brother.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'But if he will not hear, take with you one or two more, that '
  - type: note
    content: Deut. 17:6; 19:15; John 8:17; 2 Cor. 13:1; 1 Tim. 5:19; Heb. 10:28
  - type: text
    content: ‘by the mouth of two or three witnesses every word may be established.’
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And if he refuses to hear them, tell '
  - type: text
    content: it
  - type: text
    content: ' to the church. But if he refuses even to hear the church, let him be to you like a '
  - type: note
    content: Rom. 16:17; 1 Cor. 5:9; (2 Thess. 3:6, 14; 2 John 10)
  - type: text
    content: heathen and a tax collector.
  '18':
  - type: text
    content: '“Assuredly, I say to you, '
  - type: note
    content: Matt. 16:19; (John 20:22, 23; 1 Cor. 5:4)
  - type: text
    content: whatever you bind on earth will be bound in heaven, and whatever you loose on earth will be loosed in heaven.
  '19':
  - type: note
    content: (1 Cor. 1:10)
  - type: text
    content: “Again
  - type: text
    content: ' I say'
  - type: text
    content: ' to you that if two of you agree on earth concerning anything that they ask, '
  - type: note
    content: (1 John 3:22; 5:14)
  - type: text
    content: it will be done for them by My Father in heaven.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Then Jesus called a little '
  - type: note
    content: Matt. 19:14; Mark 10:14; Luke 18:14–17
  - type: text
    content: 'child to Him, set him in the midst of them, '
  '20':
  - type: text
    content: 'For where two or three are gathered '
  - type: note
    content: Acts 20:7; 1 Cor. 14:26
  - type: text
    content: together in My name, I am there in the midst of them.”
  - type: heading
    content: The Parable of the Unforgiving Servant
  '21':
  - type: text
    content: 'Then Peter came to Him and said, “Lord, how often shall my brother sin against me, and I forgive him? '
  - type: note
    content: Luke 17:4
  - type: text
    content: Up to seven times?”
  '22':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“I do not say to you, '
  - type: note
    content: (Matt. 6:14; Mark 11:25); Col. 3:13
  - type: text
    content: up to seven times, but up to seventy times seven.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Therefore the kingdom of heaven is like a certain king who wanted to settle accounts with his servants.
  - type: text
    content: ' '
  '24':
  - type: text
    content: And when he had begun to settle accounts, one was brought to him who owed him ten thousand talents.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'But as he was not able to pay, his master commanded '
  - type: note
    content: Ex. 21:2; Lev. 25:39; 2 Kin. 4:1; Neh. 5:5, 8
  - type: text
    content: that he be sold, with his wife and children and all that he had, and that payment be made.
  - type: text
    content: ' '
  '26':
  - type: text
    content: The servant therefore fell down before him, saying, ‘Master, have patience with me, and I will pay you all.’
  - type: text
    content: ' '
  '27':
  - type: text
    content: Then the master of that servant was moved with compassion, released him, and forgave him the debt.
  '28':
  - type: text
    content: '“But that servant went out and found one of his fellow servants who owed him a hundred denarii; and he laid hands on him and took '
  - type: text
    content: him
  - type: text
    content: ' by the throat, saying, ‘Pay me what you owe!’'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'So his fellow servant fell down '
  - type: text
    content: at his feet
  - type: text
    content: ' and begged him, saying, ‘Have patience with me, and I will pay you '
  - type: text
    content: all.’
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'and said, '
  - type: text
    content: '“Assuredly, I say to you, '
  - type: note
    content: Ps. 131:2; Matt. 19:14; Mark 10:15; Luke 18:16; (1 Cor. 14:20; 1 Pet. 2:2)
  - type: text
    content: unless you are converted and become as little children, you will by no means enter the kingdom of heaven.
  - type: text
    content: ' '
  '30':
  - type: text
    content: And he would not, but went and threw him into prison till he should pay the debt.
  - type: text
    content: ' '
  '31':
  - type: text
    content: So when his fellow servants saw what had been done, they were very grieved, and came and told their master all that had been done.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Then his master, after he had called him, said to him, ‘You wicked servant! I forgave you '
  - type: note
    content: Luke 7:41–43
  - type: text
    content: all that debt because you begged me.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Should you not also have had compassion on your fellow servant, just as I had pity on you?’
  - type: text
    content: ' '
  '34':
  - type: text
    content: And his master was angry, and delivered him to the torturers until he should pay all that was due to him.
  '35':
  - type: note
    content: Prov. 21:13; Matt. 6:12; Mark 11:26; James 2:13
  - type: text
    content: '“So My heavenly Father also will do to you if each of you, from his heart, does not forgive his brother '
  - type: text
    content: his trespasses.”
  '4':
  - type: note
    content: (Matt. 20:27; 23:11)
  - type: text
    content: Therefore whoever humbles himself as this little child is the greatest in the kingdom of heaven.
  - type: text
    content: ' '
  '5':
  - type: note
    content: (Matt. 10:42); Luke 9:48
  - type: text
    content: Whoever receives one little child like this in My name receives Me.
  - type: heading
    content: Jesus Warns of Offenses
  '6':
  - type: note
    content: Mark 9:42; Luke 17:2; (1 Cor. 8:12)
  - type: text
    content: “Whoever causes one of these little ones who believe in Me to sin, it would be better for him if a millstone were hung around his neck, and he were drowned in the depth of the sea.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Woe to the world because of '
  - type: text
    content: 'offenses! For '
  - type: note
    content: Luke 17:1; (1 Cor. 11:19); 1 Tim. 4:1
  - type: text
    content: 'offenses must come, but '
  - type: note
    content: Matt. 26:24; 27:4, 5
  - type: text
    content: woe to that man by whom the offense comes!
  '8':
  - type: note
    content: Matt. 5:29, 30; Mark 9:43, 45
  - type: text
    content: '“If your hand or foot causes you to sin, cut it off and cast '
  - type: text
    content: it
  - type: text
    content: ' from you. It is better for you to enter into life lame or maimed, rather than having two hands or two feet, to be cast into the everlasting fire.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And if your eye causes you to sin, pluck it out and cast '
  - type: text
    content: it
  - type: text
    content: ' from you. It is better for you to enter into life with one eye, rather than having two eyes, to be cast into '
  - type: text
    content: hell fire.
  - type: heading
    content: The Parable of the Lost Sheep
