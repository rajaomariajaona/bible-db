    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 18:28; 84:11; (Is. 60:19, 20; Mic. 7:8)
      marker-yv: yv-n
    - type: text
      text: light and my salvation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whom shall I fear?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:2; Ps. 62:7; 118:14; Is. 12:2; 33:2
      marker-yv: yv-n
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the strength of my life;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Of whom shall I be afraid?
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 49:15
      marker-yv: yv-n
    - type: text
      text: When my father and my mother forsake me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will take care of me.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 25:4; 86:11; 119:33
      marker-yv: yv-n
    - type: text
      text: 'Teach me Your way, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And lead me in a smooth path, because of my enemies.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Do not deliver me to the will of my adversaries;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 19:18; Ps. 35:11; Matt. 26:60; Mark 14:56; John 19:33
      marker-yv: yv-n
    - type: text
      text: false witnesses have risen against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And such as breathe out violence.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: would
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lost
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: heart,
    - type: text
      text: ' unless I had believed'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That I would see the goodness of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 28:13; Ps. 52:5; 116:9; 142:5; Is. 38:11; Jer. 11:19; Ezek. 26:20
      marker-yv: yv-n
    - type: text
      text: In the land of the living.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 25:3; 37:34; 40:1; 62:5; 130:5; Prov. 20:22; Is. 25:9; (Hab. 2:3)
      marker-yv: yv-n
    - type: text
      text: 'Wait on the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Be of good courage,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And He shall strengthen your heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Wait, I say, on the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: When the wicked came against me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 14:4
      marker-yv: yv-n
    - type: text
      text: eat up my flesh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My enemies and foes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They stumbled and fell.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 3:6
      marker-yv: yv-n
    - type: text
      text: Though an army may encamp against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My heart shall not fear;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Though war may rise against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In this I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' confident.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 26:8; 65:4
      marker-yv: yv-n
    - type: text
      text: 'One '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thing
    - type: text
      text: ' I have desired of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That will I seek:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That I may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 2:37
      marker-yv: yv-n
    - type: text
      text: 'dwell in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the days of my life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To behold the beauty of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to inquire in His temple.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 31:20; 91:1
      marker-yv: yv-n
    - type: text
      text: in the time of trouble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall hide me in His pavilion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the secret place of His tabernacle
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall hide me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 40:2
      marker-yv: yv-n
    - type: text
      text: set me high upon a rock.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 3:3
      marker-yv: yv-n
    - type: text
      text: my head shall be lifted up above my enemies all around me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore I will offer sacrifices of joy in His tabernacle;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will sing, yes, I will sing praises to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Hear, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when
    - type: text
      text: ' I cry with my voice!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have mercy also upon me, and answer me.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: it
      children:
      - type: text
        text: When
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: said,
    - type: text
      text: ' “Seek My face,”'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My heart said to You, “Your face, '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I will seek.”'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 69:17; 143:7
      marker-yv: yv-n
    - type: text
      text: Do not hide Your face from me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not turn Your servant away in anger;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have been my help;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not leave me nor forsake me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O God of my salvation.
