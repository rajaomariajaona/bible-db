verses:
  '1':
  - type: heading
    content: Sending Out the Twelve
  - type: text
    content: 'Then '
  - type: note
    content: Matt. 10:1, 2; Mark 3:13; 6:7
  - type: text
    content: 'He called His twelve disciples together and '
  - type: note
    content: Mark 16:17, 18; (John 14:12)
  - type: text
    content: 'gave them power and authority over all demons, and to cure diseases. '
  '10':
  - type: note
    content: Mark 6:30
  - type: text
    content: 'And the apostles, when they had returned, told Him all that they had done. '
  - type: note
    content: Matt. 14:13
  - type: text
    content: 'Then He took them and went aside privately into a deserted place belonging to the city called Bethsaida. '
  '11':
  - type: text
    content: 'But when the multitudes knew '
  - type: text
    content: it,
  - type: text
    content: ' they followed Him; and He received them and spoke to them about the kingdom of God, and healed those who had need of healing. '
  '12':
  - type: note
    content: Matt. 14:15; Mark 6:35; John 6:1, 5
  - type: text
    content: When the day began to wear away, the twelve came and said to Him, “Send the multitude away, that they may go into the surrounding towns and country, and lodge and get provisions; for we are in a deserted place here.”
  '13':
  - type: text
    content: 'But He said to them, '
  - type: text
    content: “You give them something to eat.”
  - type: text
    content: 'And they said, “We have no more than five loaves and two fish, unless we go and buy food for all these people.” '
  '14':
  - type: text
    content: For there were about five thousand men.
  - type: text
    content: 'Then He said to His disciples, '
  - type: text
    content: “Make them sit down in groups of fifty.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: And they did so, and made them all sit down.
  '16':
  - type: text
    content: 'Then He took the five loaves and the two fish, and looking up to heaven, He '
  - type: note
    content: Luke 22:19; 24:30
  - type: text
    content: 'blessed and broke them, and gave '
  - type: text
    content: them
  - type: text
    content: ' to the disciples to set before the multitude. '
  '17':
  - type: text
    content: So they all ate and were filled, and twelve baskets of the leftover fragments were taken up by them.
  - type: heading
    content: Peter Confesses Jesus as the Christ
  '18':
  - type: note
    content: Matt. 16:13–16; Mark 8:27–29
  - type: text
    content: 'And it happened, as He was alone praying, '
  - type: text
    content: that
  - type: text
    content: ' His disciples joined Him, and He asked them, saying, '
  - type: text
    content: “Who do the crowds say that I am?”
  '19':
  - type: text
    content: 'So they answered and said, '
  - type: note
    content: Matt. 14:2
  - type: text
    content: '“John the Baptist, but some '
  - type: text
    content: say
  - type: text
    content: ' Elijah; and others '
  - type: text
    content: say
  - type: text
    content: ' that one of the old prophets has risen again.”'
  '2':
  - type: note
    content: Matt. 10:7, 8; Mark 6:12; Luke 10:1, 9
  - type: text
    content: 'He sent them to preach the kingdom of God and to heal the sick. '
  '20':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “But who do you say that I am?”
  - type: note
    content: Matt. 16:16; John 6:68, 69
  - type: text
    content: Peter answered and said, “The Christ of God.”
  - type: heading
    content: Jesus Predicts His Death and Resurrection
  '21':
  - type: note
    content: Matt. 8:4; 16:20; Mark 8:30
  - type: text
    content: 'And He strictly warned and commanded them to tell this to no one, '
  '22':
  - type: text
    content: 'saying, '
  - type: note
    content: Matt. 16:21; 17:22; Luke 18:31–33; 23:46; 24:46
  - type: text
    content: “The Son of Man must suffer many things, and be rejected by the elders and chief priests and scribes, and be killed, and be raised the third day.”
  - type: heading
    content: Take Up the Cross and Follow Him
  '23':
  - type: note
    content: Matt. 10:38; 16:24; Mark 8:34; Luke 14:27
  - type: text
    content: 'Then He said to '
  - type: text
    content: them
  - type: text
    content: ' all, '
  - type: text
    content: '“If anyone desires to come after Me, let him deny himself, and take up his cross '
  - type: text
    content: daily,
  - type: text
    content: ' and follow Me.'
  - type: text
    content: ' '
  '24':
  - type: note
    content: Matt. 10:39; Luke 17:33; (John 12:25)
  - type: text
    content: For whoever desires to save his life will lose it, but whoever loses his life for My sake will save it.
  - type: text
    content: ' '
  '25':
  - type: note
    content: Matt. 16:26; Mark 8:36; (Luke 16:19–31); Acts 1:18, 25
  - type: text
    content: For what profit is it to a man if he gains the whole world, and is himself destroyed or lost?
  - type: text
    content: ' '
  '26':
  - type: note
    content: (Rom. 1:16)
  - type: text
    content: 'For whoever is ashamed of Me and My words, of him the Son of Man will be '
  - type: note
    content: Matt. 10:33; Mark 8:38; Luke 12:9; 2 Tim. 2:12
  - type: text
    content: 'ashamed when He comes in His '
  - type: text
    content: own
  - type: text
    content: ' glory, and '
  - type: text
    content: in His
  - type: text
    content: ' Father’s, and of the holy angels.'
  - type: text
    content: ' '
  '27':
  - type: note
    content: Matt. 16:28; Mark 9:1; Acts 7:55, 56; Rev. 20:4
  - type: text
    content: But I tell you truly, there are some standing here who shall not taste death till they see the kingdom of God.”
  - type: heading
    content: Jesus Transfigured on the Mount
  '28':
  - type: note
    content: Matt. 17:1–8; Mark 9:2–8
  - type: text
    content: 'Now it came to pass, about eight days after these sayings, that He took Peter, John, and James and went up on the mountain to pray. '
  '29':
  - type: text
    content: 'As He prayed, the appearance of His face was altered, and His robe '
  - type: text
    content: became
  - type: text
    content: ' white '
  - type: text
    content: and
  - type: text
    content: ' glistening. '
  '3':
  - type: note
    content: Matt. 10:9–15; Mark 6:8–11; Luke 10:4–12; 22:35
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “Take nothing for the journey, neither staffs nor bag nor bread nor money; and do not have two tunics apiece.
  '30':
  - type: text
    content: 'And behold, two men talked with Him, who were '
  - type: note
    content: Heb. 11:23–29
  - type: text
    content: 'Moses and '
  - type: note
    content: 2 Kin. 2:1–11
  - type: text
    content: 'Elijah, '
  '31':
  - type: text
    content: 'who appeared in glory and spoke of His decease which He was about to accomplish at Jerusalem. '
  '32':
  - type: text
    content: 'But Peter and those with him '
  - type: note
    content: Dan. 8:18; 10:9; Matt. 26:40, 43; Mark 14:40
  - type: text
    content: 'were heavy with sleep; and when they were fully awake, they saw His glory and the two men who stood with Him. '
  '33':
  - type: text
    content: 'Then it happened, as they were parting from Him, '
  - type: text
    content: that
  - type: text
    content: ' Peter said to Jesus, “Master, it is good for us to be here; and let us make three tabernacles: one for You, one for Moses, and one for Elijah”—not knowing what he said.'
  '34':
  - type: text
    content: 'While he was saying this, a cloud came and overshadowed them; and they were fearful as they entered the '
  - type: note
    content: Ex. 13:21; Acts 1:9
  - type: text
    content: 'cloud. '
  '35':
  - type: text
    content: 'And a voice came out of the cloud, saying, '
  - type: note
    content: Ps. 2:7; (Is. 42:1; Matt. 3:17; 12:18); Mark 1:11; Luke 3:22
  - type: text
    content: '“This is My beloved Son. '
  - type: note
    content: Acts 3:22
  - type: text
    content: 'Hear Him!” '
  '36':
  - type: text
    content: 'When the voice had ceased, Jesus was found alone. '
  - type: note
    content: Matt. 17:9; Mark 9:9
  - type: text
    content: But they kept quiet, and told no one in those days any of the things they had seen.
  - type: heading
    content: A Boy Is Healed
  '37':
  - type: note
    content: Matt. 17:14–18; Mark 9:14–27
  - type: text
    content: 'Now it happened on the next day, when they had come down from the mountain, that a great multitude met Him. '
  '38':
  - type: text
    content: 'Suddenly a man from the multitude cried out, saying, “Teacher, I implore You, look on my son, for he is my only child. '
  '39':
  - type: text
    content: 'And behold, a spirit seizes him, and he suddenly cries out; it convulses him so that he foams '
  - type: text
    content: at
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: mouth;
  - type: text
    content: ' and it departs from him with great difficulty, bruising him. '
  '4':
  - type: note
    content: Matt. 10:11; Mark 6:10
  - type: text
    content: “Whatever house you enter, stay there, and from there depart.
  - type: text
    content: ' '
  '40':
  - type: text
    content: So I implored Your disciples to cast it out, but they could not.”
  '41':
  - type: text
    content: 'Then Jesus answered and said, '
  - type: text
    content: '“O '
  - type: text
    content: 'faithless and perverse generation, how long shall I be with you and '
  - type: text
    content: bear with you? Bring your son here.”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'And as he was still coming, the demon threw him down and convulsed '
  - type: text
    content: him.
  - type: text
    content: ' Then Jesus rebuked the unclean spirit, healed the child, and gave him back to his father.'
  - type: heading
    content: Jesus Again Predicts His Death
  '43':
  - type: text
    content: And they were all amazed at the majesty of God.
  - type: text
    content: 'But while everyone marveled at all the things which Jesus did, He said to His disciples, '
  '44':
  - type: note
    content: Matt. 17:22; Mark 10:33; 14:53; Luke 22:54; John 18:12
  - type: text
    content: “Let these words sink down into your ears, for the Son of Man is about to be betrayed into the hands of men.”
  - type: text
    content: ' '
  '45':
  - type: note
    content: Mark 9:32; Luke 2:50; 18:34
  - type: text
    content: But they did not understand this saying, and it was hidden from them so that they did not perceive it; and they were afraid to ask Him about this saying.
  - type: heading
    content: Who Is the Greatest?
  '46':
  - type: note
    content: Matt. 18:1–5; Mark 9:33–37; Luke 22:24
  - type: text
    content: 'Then a dispute arose among them as to which of them would be greatest. '
  '47':
  - type: text
    content: 'And Jesus, '
  - type: note
    content: Matt. 9:4; John 2:24, 25
  - type: text
    content: 'perceiving the thought of their heart, took a '
  - type: note
    content: Luke 18:17
  - type: text
    content: 'little child and set him by Him, '
  '48':
  - type: text
    content: 'and said to them, '
  - type: note
    content: Matt. 18:5
  - type: text
    content: '“Whoever receives this little child in My name receives Me; and '
  - type: note
    content: Matt. 10:40; Mark 9:37; John 12:44
  - type: text
    content: 'whoever receives Me '
  - type: note
    content: John 13:20
  - type: text
    content: 'receives Him who sent Me. '
  - type: note
    content: (Matt. 23:11, 12); 1 Cor. 15:9; Eph. 3:8
  - type: text
    content: For he who is least among you all will be great.”
  - type: heading
    content: Jesus Forbids Sectarianism
  '49':
  - type: note
    content: Mark 9:38–40
  - type: text
    content: Now John answered and said, “Master, we saw someone casting out demons in Your name, and we forbade him because he does not follow with us.”
  '5':
  - type: note
    content: Matt. 10:14
  - type: text
    content: 'And whoever will not receive you, when you go out of that city, '
  - type: note
    content: Luke 10:11; Acts 13:51
  - type: text
    content: shake off the very dust from your feet as a testimony against them.”
  '50':
  - type: text
    content: 'But Jesus said to him, '
  - type: text
    content: '“Do not forbid '
  - type: text
    content: him,
  - type: text
    content: ' for '
  - type: note
    content: Matt. 12:30; Luke 11:23
  - type: text
    content: 'he who is not against '
  - type: text
    content: us
  - type: text
    content: ' is on '
  - type: text
    content: our side.”
  - type: heading
    content: A Samaritan Village Rejects the Savior
  '51':
  - type: text
    content: 'Now it came to pass, when the time had come for '
  - type: note
    content: Is. 50:7; Mark 16:19; Acts 1:2
  - type: text
    content: 'Him to be received up, that He steadfastly set His face to go to Jerusalem, '
  '52':
  - type: text
    content: 'and sent messengers before His face. And as they went, they entered a village of the Samaritans, to prepare for Him. '
  '53':
  - type: text
    content: 'But '
  - type: note
    content: John 4:4, 9
  - type: text
    content: 'they did not receive Him, because His face was '
  - type: text
    content: set
  - type: text
    content: ' for the journey to Jerusalem. '
  '54':
  - type: text
    content: 'And when His disciples '
  - type: note
    content: Mark 3:17
  - type: text
    content: 'James and John saw '
  - type: text
    content: this,
  - type: text
    content: ' they said, “Lord, do You want us to command fire to come down from heaven and consume them, just as '
  - type: note
    content: 2 Kin. 1:10, 12
  - type: text
    content: Elijah did?”
  '55':
  - type: text
    content: 'But He turned and rebuked them, and said, '
  - type: text
    content: '“You do not know what manner of '
  - type: note
    content: (Rom. 8:15; 2 Tim. 1:7)
  - type: text
    content: spirit you are of.
  - type: text
    content: ' '
  '56':
  - type: text
    content: 'For '
  - type: note
    content: Luke 19:10; John 3:17; 12:47
  - type: text
    content: 'the Son of Man did not come to destroy men’s lives but to save '
  - type: text
    content: them.
  - type: text
    content: ”
  - type: text
    content: ' And they went to another village.'
  - type: heading
    content: The Cost of Discipleship
  '57':
  - type: note
    content: Matt. 8:19–22
  - type: text
    content: 'Now it happened as they journeyed on the road, '
  - type: text
    content: that
  - type: text
    content: ' someone said to Him, “Lord, I will follow You wherever You go.”'
  '58':
  - type: text
    content: 'And Jesus said to him, '
  - type: text
    content: '“Foxes have holes and birds of the air '
  - type: text
    content: have
  - type: text
    content: ' nests, but the Son of Man '
  - type: note
    content: Luke 2:7; 8:23
  - type: text
    content: 'has nowhere to lay '
  - type: text
    content: His
  - type: text
    content: ' head.”'
  '59':
  - type: note
    content: Matt. 8:21, 22
  - type: text
    content: 'Then He said to another, '
  - type: text
    content: “Follow Me.”
  - type: text
    content: But he said, “Lord, let me first go and bury my father.”
  '6':
  - type: note
    content: Mark 6:12; Luke 8:1
  - type: text
    content: So they departed and went through the towns, preaching the gospel and healing everywhere.
  - type: heading
    content: Herod Seeks to See Jesus
  '60':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “Let the dead bury their own dead, but you go and preach the kingdom of God.”
  '61':
  - type: text
    content: 'And another also said, “Lord, '
  - type: note
    content: 1 Kin. 19:20
  - type: text
    content: 'I will follow You, but let me first go '
  - type: text
    content: and
  - type: text
    content: ' bid them farewell who are at my house.”'
  '62':
  - type: text
    content: 'But Jesus said to him, '
  - type: text
    content: '“No one, having put his hand to the plow, and looking back, is '
  - type: note
    content: 2 Tim. 4:10
  - type: text
    content: fit for the kingdom of God.”
  '7':
  - type: note
    content: Matt. 14:1, 2; Mark 6:14
  - type: text
    content: 'Now Herod the tetrarch heard of all that was done by Him; and he was perplexed, because it was said by some that John had risen from the dead, '
  '8':
  - type: text
    content: 'and by some that Elijah had appeared, and by others that one of the old prophets had risen again. '
  '9':
  - type: text
    content: 'Herod said, “John I have beheaded, but who is this of whom I hear such things?” '
  - type: note
    content: Luke 23:8
  - type: text
    content: So he sought to see Him.
  - type: heading
    content: Feeding the Five Thousand
