  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said, “We have no more than five loaves and two fish, unless we go and buy food for all these people.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For there were about five thousand men.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He said to His disciples, '
    - type: usfm
      marker: wj
      children:
