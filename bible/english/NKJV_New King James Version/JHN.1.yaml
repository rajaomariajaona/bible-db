document_id: JHN.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Eternal Word
  - type: text
    content: 'In the beginning '
  - type: note
    content: Gen. 1:1; (Col. 1:17); 1 John 1:1
  - type: text
    content: 'was the Word, and the '
  - type: note
    content: (John 1:14); Rev. 19:13
  - type: text
    content: 'Word was '
  - type: note
    content: (John 17:5; 1 John 1:2)
  - type: text
    content: 'with God, and the Word was '
  - type: note
    content: (1 John 5:20)
  - type: text
    content: 'God. '
  '10':
  - type: text
    content: 'He was in the world, and the world was made through Him, and '
  - type: note
    content: Acts 13:27; 1 Cor. 8:6; Col. 1:16; Heb. 1:2
  - type: text
    content: 'the world did not know Him. '
  '11':
  - type: note
    content: Is. 53:3; (Luke 19:14)
  - type: text
    content: 'He came to His own, and His own did not receive Him. '
  '12':
  - type: text
    content: 'But '
  - type: note
    content: (John 11:52); Gal. 3:26
  - type: text
    content: 'as many as received Him, to them He gave the right to become children of God, to those who believe in His name: '
  '13':
  - type: note
    content: (John 3:5); James 1:18; (1 Pet. 1:23; 1 John 2:29; 3:9)
  - type: text
    content: who were born, not of blood, nor of the will of the flesh, nor of the will of man, but of God.
  - type: heading
    content: The Word Becomes Flesh
  '14':
  - type: note
    content: Matt. 1:16; Rev. 19:13
  - type: text
    content: 'And the Word '
  - type: note
    content: Rom. 1:3; Gal. 4:4; Phil. 2:7; 1 Tim. 3:16; Heb. 2:14; 1 John 1:1; 4:2; 2 John 7
  - type: text
    content: 'became '
  - type: note
    content: Heb. 2:11
  - type: text
    content: 'flesh and dwelt among us, and '
  - type: note
    content: Is. 40:5; 2 Pet. 1:16–18
  - type: text
    content: 'we beheld His glory, the glory as of the only begotten of the Father, '
  - type: note
    content: (John 8:32; 14:6; 18:37); Col. 1:19
  - type: text
    content: full of grace and truth.
  '15':
  - type: note
    content: Mal. 3:1; John 3:32
  - type: text
    content: 'John bore witness of Him and cried out, saying, “This was He of whom I said, '
  - type: note
    content: (Matt. 3:11)
  - type: text
    content: '‘He who comes after me is preferred before me, '
  - type: note
    content: (Col. 1:17)
  - type: text
    content: for He was before me.’ ”
  '16':
  - type: text
    content: 'And of His '
  - type: note
    content: (Eph. 1:23; 3:19; 4:13; Col. 1:19; 2:9)
  - type: text
    content: 'fullness we have all received, and grace for grace. '
  '17':
  - type: text
    content: 'For '
  - type: note
    content: (Ex. 20:1)
  - type: text
    content: 'the law was given through Moses, '
  - type: text
    content: but
  - type: text
    content: ' '
  - type: note
    content: John 1:14; (Rom. 5:21; 6:14)
  - type: text
    content: 'grace and '
  - type: note
    content: (John 8:32; 14:6; 18:37)
  - type: text
    content: 'truth came through Jesus Christ. '
  '18':
  - type: note
    content: Ex. 33:20; Matt. 11:27; 1 Tim. 6:16
  - type: text
    content: 'No one has seen God at any time. '
  - type: note
    content: Ps. 2:7; John 3:16, 18; 1 John 4:9
  - type: text
    content: 'The only begotten Son, who is in the bosom of the Father, He has declared '
  - type: text
    content: Him.
  - type: heading
    content: A Voice in the Wilderness
  '19':
  - type: text
    content: 'Now this is '
  - type: note
    content: John 5:33
  - type: text
    content: the testimony of John, when the Jews sent priests and Levites from Jerusalem to ask him, “Who are you?”
  '2':
  - type: note
    content: Gen. 1:1
  - type: text
    content: 'He was in the beginning with God. '
  '20':
  - type: note
    content: Luke 3:15; John 3:28; Acts 13:25
  - type: text
    content: He confessed, and did not deny, but confessed, “I am not the Christ.”
  '21':
  - type: text
    content: And they asked him, “What then? Are you Elijah?”
  - type: text
    content: He said, “I am not.”
  - type: text
    content: '“Are you '
  - type: note
    content: Deut. 18:15, 18; Matt. 21:11; John 6:14; 7:40
  - type: text
    content: the Prophet?”
  - type: text
    content: And he answered, “No.”
  '22':
  - type: text
    content: Then they said to him, “Who are you, that we may give an answer to those who sent us? What do you say about yourself?”
  '23':
  - type: text
    content: 'He said: '
  - type: note
    content: Matt. 3:3
  - type: text
    content: '“I '
  - type: text
    content: am
  - type: note
    content: Is. 40:3; Mal. 3:1
  - type: text
    content: '‘The voice of one crying in the wilderness:'
  - type: text
    content: '“Make straight the way of the '
  - type: heading
    content: Lord
  - type: text
    content: ',” ’'
  - type: text
    content: as the prophet Isaiah said.”
  '24':
  - type: text
    content: 'Now those who were sent were from the Pharisees. '
  '25':
  - type: text
    content: And they asked him, saying, “Why then do you baptize if you are not the Christ, nor Elijah, nor the Prophet?”
  '26':
  - type: text
    content: 'John answered them, saying, '
  - type: note
    content: Matt. 3:11; (Mark 1:8; Luke 3:16; Acts 1:5)
  - type: text
    content: '“I baptize with water, '
  - type: note
    content: Mal. 3:1; John 4:10; 8:19; 9:30; Acts 13:27
  - type: text
    content: 'but there stands One among you whom you do not know. '
  '27':
  - type: note
    content: (John 3:31); Acts 19:4; (Col. 1:17)
  - type: text
    content: It is He who, coming after me, is preferred before me, whose sandal strap I am not worthy to loose.”
  '28':
  - type: text
    content: 'These things were done '
  - type: note
    content: Judg. 7:24
  - type: text
    content: in Bethabara beyond the Jordan, where John was baptizing.
  - type: heading
    content: The Lamb of God
  '29':
  - type: text
    content: 'The next day John saw Jesus coming toward him, and said, “Behold! '
  - type: note
    content: (Ex. 12:3); Acts 8:32; (1 Pet. 1:19); Rev. 5:6–14
  - type: text
    content: 'The Lamb of God '
  - type: note
    content: (Is. 53:11; 1 Cor. 15:3; Gal. 1:4; 1 Pet. 2:24; 1 John 2:2; Rev. 1:5)
  - type: text
    content: 'who takes away the sin of the world! '
  '3':
  - type: note
    content: Ps. 33:6; (Eph. 3:9; Col. 1:16, 17; Heb. 1:2)
  - type: text
    content: 'All things were made through Him, and without Him nothing was made that was made. '
  '30':
  - type: text
    content: 'This is He of whom I said, ‘After me comes a Man who is preferred before me, for He was before me.’ '
  '31':
  - type: text
    content: 'I did not know Him; but that He should be revealed to Israel, '
  - type: note
    content: Mal. 3:1; Matt. 3:6
  - type: text
    content: therefore I came baptizing with water.”
  '32':
  - type: note
    content: Is. 42:1; 61:1; Matt. 3:16; Mark 1:10; Luke 3:22
  - type: text
    content: 'And John bore witness, saying, “I saw the Spirit descending from heaven like a dove, and He remained upon Him. '
  '33':
  - type: text
    content: 'I did not know Him, but He who sent me to baptize with water said to me, ‘Upon whom you see the Spirit descending, and remaining on Him, '
  - type: note
    content: Matt. 3:11; Mark 1:8; Luke 3:16; Acts 1:5
  - type: text
    content: 'this is He who baptizes with the Holy Spirit.’ '
  '34':
  - type: text
    content: 'And I have seen and testified that this is the '
  - type: note
    content: Ps. 2:7; Luke 1:35; John 11:27
  - type: text
    content: Son of God.”
  - type: heading
    content: The First Disciples
  '35':
  - type: text
    content: 'Again, the next day, John stood with two of his disciples. '
  '36':
  - type: text
    content: 'And looking at Jesus as He walked, he said, '
  - type: note
    content: John 1:29
  - type: text
    content: “Behold the Lamb of God!”
  '37':
  - type: text
    content: 'The two disciples heard him speak, and they '
  - type: note
    content: Matt. 4:20, 22
  - type: text
    content: 'followed Jesus. '
  '38':
  - type: text
    content: 'Then Jesus turned, and seeing them following, said to them, '
  - type: text
    content: “What do you seek?”
  - type: text
    content: They said to Him, “Rabbi” (which is to say, when translated, Teacher), “where are You staying?”
  '39':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Come and see.”
  - type: text
    content: ' They came and saw where He was staying, and remained with Him that day (now it was about the tenth hour).'
  '4':
  - type: note
    content: (1 John 5:11)
  - type: text
    content: 'In Him was life, and '
  - type: note
    content: John 8:12; 9:5; 12:46
  - type: text
    content: 'the life was the light of men. '
  '40':
  - type: text
    content: 'One of the two who heard John '
  - type: text
    content: speak,
  - type: text
    content: ' and followed Him, was '
  - type: note
    content: Matt. 4:18; Mark 1:29; 13:3; John 6:8; 12:22
  - type: text
    content: 'Andrew, Simon Peter’s brother. '
  '41':
  - type: text
    content: 'He first found his own brother Simon, and said to him, “We have found the Messiah” (which is translated, the Christ). '
  '42':
  - type: text
    content: And he brought him to Jesus.
  - type: text
    content: 'Now when Jesus looked at him, He said, '
  - type: text
    content: '“You are Simon the son of '
  - type: text
    content: Jonah.
  - type: text
    content: ' '
  - type: note
    content: Matt. 16:18
  - type: text
    content: You shall be called Cephas”
  - type: text
    content: ' (which is translated, A Stone).'
  - type: heading
    content: Philip and Nathanael
  '43':
  - type: text
    content: 'The following day Jesus wanted to go to Galilee, and He found '
  - type: note
    content: Matt. 10:3; John 6:5; 12:21, 22; 14:8, 9
  - type: text
    content: 'Philip and said to him, '
  - type: text
    content: “Follow Me.”
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Now '
  - type: note
    content: John 12:21
  - type: text
    content: 'Philip was from Bethsaida, the city of Andrew and Peter. '
  '45':
  - type: text
    content: 'Philip found '
  - type: note
    content: John 21:2
  - type: text
    content: 'Nathanael and said to him, “We have found Him of whom '
  - type: note
    content: (Gen. 3:15; Deut. 18:18); Luke 24:27
  - type: text
    content: 'Moses in the law, and also the '
  - type: note
    content: (Is. 4:2; 7:14; 9:6; Mic. 5:2; Zech. 6:12); Luke 24:27
  - type: text
    content: 'prophets, wrote—Jesus '
  - type: note
    content: (Matt. 2:23); Luke 2:4
  - type: text
    content: 'of Nazareth, the '
  - type: note
    content: Luke 3:23
  - type: text
    content: son of Joseph.”
  '46':
  - type: text
    content: 'And Nathanael said to him, '
  - type: note
    content: John 7:41, 42, 52
  - type: text
    content: “Can anything good come out of Nazareth?”
  - type: text
    content: Philip said to him, “Come and see.”
  '47':
  - type: text
    content: 'Jesus saw Nathanael coming toward Him, and said of him, '
  - type: text
    content: '“Behold, '
  - type: note
    content: Ps. 32:2; 73:1
  - type: text
    content: an Israelite indeed, in whom is no deceit!”
  '48':
  - type: text
    content: Nathanael said to Him, “How do You know me?”
  - type: text
    content: 'Jesus answered and said to him, '
  - type: text
    content: “Before Philip called you, when you were under the fig tree, I saw you.”
  '49':
  - type: text
    content: 'Nathanael answered and said to Him, “Rabbi, '
  - type: note
    content: Ps. 2:7; Matt. 14:33; Luke 1:35
  - type: text
    content: 'You are the Son of God! You are '
  - type: note
    content: Matt. 21:5
  - type: text
    content: the King of Israel!”
  '5':
  - type: text
    content: 'And '
  - type: note
    content: (John 3:19)
  - type: text
    content: the light shines in the darkness, and the darkness did not comprehend it.
  - type: heading
    content: 'John’s Witness: The True Light'
  '50':
  - type: text
    content: 'Jesus answered and said to him, '
  - type: text
    content: “Because I said to you, ‘I saw you under the fig tree,’ do you believe? You will see greater things than these.”
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'And He said to him, '
  - type: text
    content: '“Most assuredly, I say to you, '
  - type: note
    content: Gen. 28:12; (Luke 2:9, 13); Acts 1:10; 7:55, 56
  - type: text
    content: hereafter
  - type: text
    content: ' you shall see heaven open, and the angels of God ascending and descending upon the Son of Man.”'
  '6':
  - type: text
    content: 'There was a '
  - type: note
    content: Mal. 3:1; Matt. 3:1–17; Mark 1:1–11; Luke 3:1–22
  - type: text
    content: 'man sent from God, whose name '
  - type: text
    content: was
  - type: text
    content: ' John. '
  '7':
  - type: text
    content: 'This man came for a '
  - type: note
    content: John 3:25–36; 5:33–35
  - type: text
    content: 'witness, to bear witness of the Light, that all through him might '
  - type: note
    content: (John 3:16)
  - type: text
    content: 'believe. '
  '8':
  - type: text
    content: 'He was not that Light, but '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: text
    content: sent
  - type: text
    content: ' to bear witness of that '
  - type: note
    content: Is. 9:2; 49:6
  - type: text
    content: 'Light. '
  '9':
  - type: note
    content: Is. 49:6
  - type: text
    content: That was the true Light which gives light to every man coming into the world.
