verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 22:8; 2 Sam. 11:2; Luke 5:19; Acts 10:9
      marker-yv: yv-n
    - type: text
      text: 'Samuel took a flask of oil and poured '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' on his head, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:23–33; 1 Sam. 9:16; 16:13; 2 Kin. 9:3, 6
      marker-yv: yv-n
    - type: text
      text: 'and kissed him and said: “'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' not because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 2:12
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has anointed you commander over '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:2; Acts 13:21
      marker-yv: yv-n
    - type: text
      text: 'His inheritance? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 13:8–10
      marker-yv: yv-n
    - type: text
      text: 'When they came there to the hill, there was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 10:5
      marker-yv: yv-n
    - type: text
      text: 'a group of prophets to meet him; then the Spirit of God came upon him, and he prophesied among them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And it happened, when all who knew him formerly saw that he indeed prophesied among the prophets, that the people said to one another, “What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' has come upon the son of Kish? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 19:20
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' Saul also among the prophets?” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then a man from there answered and said, “But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 19:24; Amos 7:14, 15; Matt. 13:54–57; John 7:15; Acts 4:13
      marker-yv: yv-n
    - type: text
      text: 'who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' their father?” Therefore it became a proverb: “'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' Saul also among the prophets?” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: And when he had finished prophesying, he went to the high place.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then Saul’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 5:30, 36
      marker-yv: yv-n
    - type: text
      text: uncle said to him and his servant, “Where did you go?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he said, “To look for the donkeys. When we saw that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' nowhere '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: found,
    - type: text
      text: ' we went to Samuel.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And Saul’s uncle said, “Tell me, please, what Samuel said to you.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So Saul said to his uncle, “He told us plainly that the donkeys had been '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 14:50
      marker-yv: yv-n
    - type: text
      text: found.” But about the matter of the kingdom, he did not tell him what Samuel had said.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul Proclaimed King
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Samuel called the people together '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 9:20
      marker-yv: yv-n
    - type: text
      text: 'to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:1
      marker-yv: yv-n
    - type: text
      text: 'at Mizpah, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and said to the children of Israel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 7:5, 6
      marker-yv: yv-n
    - type: text
      text: '“Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel: ‘I brought up Israel out of Egypt, and delivered you from the hand of the Egyptians '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' from the hand of all kingdoms and from those who oppressed you.’ '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 6:8, 9; 1 Sam. 8:8; 12:6, 8
      marker-yv: yv-n
    - type: text
      text: 'But you have today rejected your God, who Himself saved you from all your adversities and your tribulations; and you have said to Him, ‘No, set a king over us!’ Now therefore, present yourselves before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by your tribes and by your clans.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'When you have departed from me today, you will find two men by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 34:9; Deut. 32:9; Ps. 78:71
      marker-yv: yv-n
    - type: text
      text: 'Rachel’s tomb in the territory of Benjamin '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 35:16–20; 48:7
      marker-yv: yv-n
    - type: text
      text: 'at Zelzah; and they will say to you, ‘The donkeys which you went to look for have been found. And now your father has ceased caring about the donkeys and is worrying about '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:28
      marker-yv: yv-n
    - type: text
      text: 'you, saying, “What shall I do about my son?” ’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And when Samuel had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 8:7, 19; 12:12
      marker-yv: yv-n
    - type: text
      text: 'caused all the tribes of Israel to come near, the tribe of Benjamin was chosen. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'When he had caused the tribe of Benjamin to come near by their families, the family of Matri was chosen. And Saul the son of Kish was chosen. But when they sought him, he could not be found. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Therefore they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 1:24, 26
      marker-yv: yv-n
    - type: text
      text: 'inquired of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' further, “Has the man come here yet?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered, “There he is, hidden among the equipment.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So they ran and brought him from there; and when he stood among the people, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 23:2, 4, 10, 11
      marker-yv: yv-n
    - type: text
      text: 'he was taller than any of the people from his shoulders upward. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And Samuel said to all the people, “Do you see him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 9:2
      marker-yv: yv-n
    - type: text
      text: 'whom the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has chosen, that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no one like him among all the people?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all the people shouted and said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 17:15; 1 Sam. 9:16; 2 Sam. 21:6
      marker-yv: yv-n
    - type: text
      text: “Long live the king!”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then Samuel explained to the people '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 1:25, 39
      marker-yv: yv-n
    - type: text
      text: 'the behavior of royalty, and wrote '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' in a book and laid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' up before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. And Samuel sent all the people away, every man to his house. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And Saul also went home '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 17:14–20; 1 Sam. 8:11–18
      marker-yv: yv-n
    - type: text
      text: 'to Gibeah; and valiant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' went with him, whose hearts God had touched. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:14
      marker-yv: yv-n
    - type: text
      text: 'But some '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 11:12
      marker-yv: yv-n
    - type: text
      text: 'rebels said, “How can this man save us?” So they despised him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 13:13; 1 Sam. 25:17
      marker-yv: yv-n
    - type: text
      text: and brought him no presents. But he held his peace.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then you shall go on forward from there and come to the terebinth tree of Tabor. There three men going up '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 9:3–5
      marker-yv: yv-n
    - type: text
      text: 'to God at Bethel will meet you, one carrying three young goats, another carrying three loaves of bread, and another carrying a skin of wine. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And they will greet you and give you two '
    - type: usfm
      marker: it
      children:
      - type: text
        text: loaves
    - type: text
      text: ' of bread, which you shall receive from their hands. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'After that you shall come to the hill of God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 28:22; 35:1, 3, 7
      marker-yv: yv-n
    - type: text
      text: 'where the Philistine garrison '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is.
    - type: text
      text: ' And it will happen, when you have come there to the city, that you will meet a group of prophets coming down '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 13:2, 3
      marker-yv: yv-n
    - type: text
      text: 'from the high place with a stringed instrument, a tambourine, a flute, and a harp before them; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 19:12, 20; 2 Kin. 2:3, 5, 15
      marker-yv: yv-n
    - type: text
      text: 'and they will be prophesying. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:20, 21; 2 Kin. 3:15; 1 Chr. 25:1–6; 1 Cor. 14:1
      marker-yv: yv-n
    - type: text
      text: 'the Spirit of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will come upon you, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 11:25, 29; Judg. 14:6; 1 Sam. 16:13
      marker-yv: yv-n
    - type: text
      text: 'you will prophesy with them and be turned into another man. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And let it be, when these '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 10:10; 19:23, 24
      marker-yv: yv-n
    - type: text
      text: 'signs come to you, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' you do as the occasion demands; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 4:8; Luke 2:12
      marker-yv: yv-n
    - type: text
      text: 'God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' with you. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'You shall go down before me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 1:5; Judg. 6:12; 1 Sam. 3:19; (Heb. 13:5)
      marker-yv: yv-n
    - type: text
      text: 'to Gilgal; and surely I will come down to you to offer burnt offerings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make sacrifices of peace offerings. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 11:14, 15; 13:8
      marker-yv: yv-n
    - type: text
      text: Seven days you shall wait, till I come to you and show you what you should do.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So it was, when he had turned his back to go from Samuel, that God gave him another heart; and all those signs came to pass that day. '
