verses:
  '1':
  - type: heading
    content: Repent or Perish
  - type: text
    content: 'There were present at that season some who told Him about the Galileans whose blood Pilate had mingled with their sacrifices. '
  '10':
  - type: text
    content: 'Now He was teaching in one of the synagogues on the Sabbath. '
  '11':
  - type: text
    content: 'And behold, there was a woman who had a spirit of infirmity eighteen years, and was bent over and could in no way raise '
  - type: text
    content: herself
  - type: text
    content: ' up. '
  '12':
  - type: text
    content: 'But when Jesus saw her, He called '
  - type: text
    content: her
  - type: text
    content: ' to '
  - type: text
    content: Him
  - type: text
    content: ' and said to her, '
  - type: text
    content: '“Woman, you are loosed from your '
  - type: note
    content: Luke 7:21; 8:2
  - type: text
    content: infirmity.”
  - type: text
    content: ' '
  '13':
  - type: note
    content: Mark 16:18; Acts 9:17
  - type: text
    content: 'And He laid '
  - type: text
    content: His
  - type: text
    content: ' hands on her, and immediately she was made straight, and glorified God.'
  '14':
  - type: text
    content: 'But the ruler of the synagogue answered with indignation, because Jesus had '
  - type: note
    content: (Luke 6:6–11; 14:1–6); John 5:16
  - type: text
    content: 'healed on the Sabbath; and he said to the crowd, '
  - type: note
    content: Ex. 20:9; 23:12
  - type: text
    content: '“There are six days on which men ought to work; therefore come and be healed on them, and '
  - type: note
    content: Matt. 12:10; Mark 3:2; Luke 6:7; 14:3
  - type: text
    content: not on the Sabbath day.”
  '15':
  - type: text
    content: 'The Lord then answered him and said, '
  - type: text
    content: “Hypocrite!
  - type: text
    content: ' '
  - type: note
    content: (Matt. 7:5; 23:13); Luke 14:5
  - type: text
    content: 'Does not each one of you on the Sabbath loose his ox or donkey from the stall, and lead '
  - type: text
    content: it
  - type: text
    content: ' away to water it?'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'So ought not this woman, '
  - type: note
    content: Luke 19:9
  - type: text
    content: being a daughter of Abraham, whom Satan has bound—think of it—for eighteen years, be loosed from this bond on the Sabbath?”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And when He said these things, all His adversaries were put to shame; and all the multitude rejoiced for all the glorious things that were '
  - type: note
    content: Mark 5:19, 20
  - type: text
    content: done by Him.
  - type: heading
    content: The Parable of the Mustard Seed
  '18':
  - type: note
    content: Matt. 13:31, 32; Mark 4:30–32
  - type: text
    content: 'Then He said, '
  - type: text
    content: “What is the kingdom of God like? And to what shall I compare it?
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'It is like a mustard seed, which a man took and put in his garden; and it grew and became a '
  - type: text
    content: large
  - type: text
    content: ' tree, and the birds of the air nested in its branches.”'
  - type: heading
    content: The Parable of the Leaven
  '2':
  - type: text
    content: 'And Jesus answered and said to them, '
  - type: text
    content: '“Do you suppose that these Galileans were worse sinners than all '
  - type: text
    content: other
  - type: text
    content: ' Galileans, because they suffered such things?'
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'And again He said, '
  - type: text
    content: “To what shall I liken the kingdom of God?
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'It is like '
  - type: text
    content: 'leaven, which a woman took and hid in three '
  - type: note
    content: Matt. 13:33
  - type: text
    content: measures
  - type: text
    content: ' of meal till it was all leavened.”'
  - type: heading
    content: The Narrow Way
  '22':
  - type: note
    content: Matt. 9:35; Mark 6:6
  - type: text
    content: 'And He went through the cities and villages, teaching, and journeying toward Jerusalem. '
  '23':
  - type: text
    content: 'Then one said to Him, “Lord, are there '
  - type: note
    content: (Matt. 7:14; 20:16)
  - type: text
    content: few who are saved?”
  - type: text
    content: 'And He said to them, '
  '24':
  - type: note
    content: (Matt. 7:13)
  - type: text
    content: '“Strive to enter through the narrow gate, for '
  - type: note
    content: (John 7:34; 8:21; 13:33; Rom. 9:31)
  - type: text
    content: many, I say to you, will seek to enter and will not be able.
  - type: text
    content: ' '
  '25':
  - type: note
    content: (Ps. 32:6); Is. 55:6
  - type: text
    content: 'When once the Master of the house has risen up and '
  - type: note
    content: Matt. 25:10; Rev. 22:11
  - type: text
    content: 'shut the door, and you begin to stand outside and knock at the door, saying, '
  - type: note
    content: Luke 6:46
  - type: text
    content: '‘Lord, Lord, open for us,’ and He will answer and say to you, '
  - type: note
    content: Matt. 7:23; 25:12
  - type: text
    content: ‘I do not know you, where you are from,’
  - type: text
    content: ' '
  '26':
  - type: text
    content: then you will begin to say, ‘We ate and drank in Your presence, and You taught in our streets.’
  - type: text
    content: ' '
  '27':
  - type: note
    content: (Matt. 7:23; 25:41)
  - type: text
    content: 'But He will say, ‘I tell you I do not know you, where you are from. '
  - type: note
    content: Ps. 6:8; (Matt. 25:41); Titus 1:16
  - type: text
    content: Depart from Me, all you workers of iniquity.’
  - type: text
    content: ' '
  '28':
  - type: note
    content: Matt. 8:12; 13:42; 24:51
  - type: text
    content: 'There will be weeping and gnashing of teeth, '
  - type: note
    content: Matt. 8:11
  - type: text
    content: when you see Abraham and Isaac and Jacob and all the prophets in the kingdom of God, and yourselves thrust out.
  - type: text
    content: ' '
  '29':
  - type: text
    content: They will come from the east and the west, from the north and the south, and sit down in the kingdom of God.
  - type: text
    content: ' '
  '3':
  - type: text
    content: I tell you, no; but unless you repent you will all likewise perish.
  - type: text
    content: ' '
  '30':
  - type: note
    content: (Matt. 19:30; 20:16); Mark 10:31
  - type: text
    content: And indeed there are last who will be first, and there are first who will be last.”
  '31':
  - type: text
    content: On that very day some Pharisees came, saying to Him, “Get out and depart from here, for Herod wants to kill You.”
  '32':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: '“Go, tell that fox, ‘Behold, I cast out demons and perform cures today and tomorrow, and the third '
  - type: text
    content: day
  - type: text
    content: ' '
  - type: note
    content: Luke 24:46; Acts 10:40; 1 Cor. 15:4; (Heb. 2:10; 5:9; 7:28)
  - type: text
    content: 'I shall be '
  - type: text
    content: perfected.’
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Nevertheless I must journey today, tomorrow, and the '
  - type: text
    content: day
  - type: text
    content: ' following; for it cannot be that a prophet should perish outside of Jerusalem.'
  - type: heading
    content: Jesus Laments over Jerusalem
  '34':
  - type: note
    content: Matt. 23:37–39; 2 Chr. 24:20, 21; 36:15, 16
  - type: text
    content: '“O Jerusalem, Jerusalem, the one who kills the prophets and stones those who are sent to her! How often I wanted to gather your children together, as a hen '
  - type: text
    content: gathers
  - type: text
    content: ' her brood under '
  - type: text
    content: her
  - type: text
    content: ' wings, but you were not willing!'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'See! '
  - type: note
    content: Lev. 26:31, 32; Ps. 69:25; Is. 1:7; Jer. 22:5; Dan. 9:27; Mic. 3:12
  - type: text
    content: 'Your house is left to you desolate; and '
  - type: text
    content: assuredly,
  - type: text
    content: ' I say to you, you shall not see Me until '
  - type: text
    content: the time
  - type: text
    content: ' comes when you say, '
  - type: note
    content: Ps. 118:26; Matt. 21:9; Mark 11:10; Luke 19:38; John 12:13
  - type: text
    content: '‘Blessed is He who comes in the name of the '
  - type: heading
    content: Lord
  - type: text
    content: '!’ ”'
  '4':
  - type: text
    content: 'Or those eighteen on whom the tower in Siloam fell and killed them, do you think that they were worse sinners than all '
  - type: text
    content: other
  - type: text
    content: ' men who dwelt in Jerusalem?'
  - type: text
    content: ' '
  '5':
  - type: text
    content: I tell you, no; but unless you repent you will all likewise perish.”
  - type: heading
    content: The Parable of the Barren Fig Tree
  '6':
  - type: text
    content: 'He also spoke this parable: '
  - type: note
    content: Is. 5:2; Matt. 21:19
  - type: text
    content: '“A certain '
  - type: text
    content: man
  - type: text
    content: ' had a fig tree planted in his vineyard, and he came seeking fruit on it and found none.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Then he said to the keeper of his vineyard, ‘Look, for three years I have come seeking fruit on this fig tree and find none. Cut it down; why does it '
  - type: text
    content: use up the ground?’
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But he answered and said to him, ‘Sir, let it alone this year also, until I dig around it and fertilize '
  - type: text
    content: it.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And if it bears fruit, '
  - type: text
    content: well.
  - type: text
    content: ' But if not, after that'
  - type: text
    content: ' you can '
  - type: note
    content: (John 15:2)
  - type: text
    content: cut it down.’ ”
  - type: heading
    content: A Spirit of Infirmity
