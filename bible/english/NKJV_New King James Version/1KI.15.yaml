  - type: text
    content: So Abijam rested with his fathers, and they buried him in the City of David. Then Asa his son reigned in his place.
  - type: heading
    content: Asa Reigns in Judah
  '9':
  - type: text
    content: 'In the twentieth year of Jeroboam king of Israel, Asa became king over Judah. '
