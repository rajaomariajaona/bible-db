document_id: 1KI.15,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abijam Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 13:1
      marker-yv: yv-n
    - type: text
      text: 'In the eighteenth year of King Jeroboam the son of Nebat, Abijam became king over Judah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he reigned forty-one years in Jerusalem. His grandmother’s name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Maachah the granddaughter of Abishalom. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 14:2
      marker-yv: yv-n
    - type: text
      text: 'Asa did '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' right in the eyes of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: did
    - type: text
      text: ' his father David. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 23:17; 1 Kin. 14:24; 22:46
      marker-yv: yv-n
    - type: text
      text: 'And he banished the perverted persons from the land, and removed all the idols that his fathers had made. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also he removed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 15:16–18
      marker-yv: yv-n
    - type: text
      text: 'Maachah his grandmother from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: being
    - type: text
      text: ' queen mother, because she had made an obscene image of Asherah. And Asa cut down her obscene image and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 32:20
      marker-yv: yv-n
    - type: text
      text: 'burned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' by the Brook Kidron. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 3:2; 22:43; 2 Kin. 12:3; 2 Chr. 15:17, 18
      marker-yv: yv-n
    - type: text
      text: 'But the high places were not removed. Nevertheless Asa’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Sam. 16:7); 1 Kin. 8:61; 15:3
      marker-yv: yv-n
    - type: text
      text: 'heart was loyal to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' all his days. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also brought into the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the things which his father '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:51
      marker-yv: yv-n
    - type: text
      text: 'had dedicated, and the things which he himself had dedicated: silver and gold and utensils.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there was war between Asa and Baasha king of Israel all their days. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 16:1–6
      marker-yv: yv-n
    - type: text
      text: 'Baasha king of Israel came up against Judah, and built '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:25; 1 Kin. 15:21, 22
      marker-yv: yv-n
    - type: text
      text: 'Ramah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:26–29
      marker-yv: yv-n
    - type: text
      text: 'that he might let none go out or come in to Asa king of Judah. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Asa took all the silver and gold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' left in the treasuries of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the treasuries of the king’s house, and delivered them into the hand of his servants. And King Asa sent them to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 12:17, 18; 2 Chr. 16:2
      marker-yv: yv-n
    - type: text
      text: 'Ben-Hadad the son of Tabrimmon, the son of Hezion, king of Syria, who dwelt in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:15; 1 Kin. 11:23, 24
      marker-yv: yv-n
    - type: text
      text: 'Damascus, saying, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Let
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' a treaty between you and me, as there was between my father and your father. See, I have sent you a present of silver and gold. Come and break your treaty with Baasha king of Israel, so that he will withdraw from me.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He reigned three years in Jerusalem. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 11:20–22
      marker-yv: yv-n
    - type: text
      text: 'His mother’s name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 13:2
      marker-yv: yv-n
    - type: text
      text: 'Maachah the granddaughter of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 11:21
      marker-yv: yv-n
    - type: text
      text: 'Abishalom. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Ben-Hadad heeded King Asa, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 20:1
      marker-yv: yv-n
    - type: text
      text: 'sent the captains of his armies against the cities of Israel. He attacked '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 15:29
      marker-yv: yv-n
    - type: text
      text: 'Ijon, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 18:29; 1 Kin. 12:29
      marker-yv: yv-n
    - type: text
      text: 'Dan, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 20:14, 15
      marker-yv: yv-n
    - type: text
      text: 'Abel Beth Maachah, and all Chinneroth, with all the land of Naphtali. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it happened, when Baasha heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' that he stopped building Ramah, and remained in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:17; 16:15–18
      marker-yv: yv-n
    - type: text
      text: Tirzah.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 16:6
      marker-yv: yv-n
    - type: text
      text: 'Then King Asa made a proclamation throughout all Judah; none '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' exempted. And they took away the stones and timber of Ramah, which Baasha had used for building; and with them King Asa built '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 21:17
      marker-yv: yv-n
    - type: text
      text: 'Geba of Benjamin, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:26
      marker-yv: yv-n
    - type: text
      text: Mizpah.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of all the acts of Asa, all his might, all that he did, and the cities which he built, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Judah? But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 16:11–14
      marker-yv: yv-n
    - type: text
      text: 'in the time of his old age he was diseased in his feet. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Asa rested with his fathers, and was buried with his fathers in the City of David his father. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 17:1
      marker-yv: yv-n
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 22:41–44; Matt. 1:8
      marker-yv: yv-n
    - type: text
      text: Jehoshaphat his son reigned in his place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nadab Reigns in Israel
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:20
      marker-yv: yv-n
    - type: text
      text: 'Nadab the son of Jeroboam became king over Israel in the second year of Asa king of Judah, and he reigned over Israel two years. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and walked in the way of his father, and in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:28–33; 14:16
      marker-yv: yv-n
    - type: text
      text: his sin by which he had made Israel sin.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:14
      marker-yv: yv-n
    - type: text
      text: 'Then Baasha the son of Ahijah, of the house of Issachar, conspired against him. And Baasha killed him at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:44; 21:23; 1 Kin. 16:15
      marker-yv: yv-n
    - type: text
      text: 'Gibbethon, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belonged
    - type: text
      text: ' to the Philistines, while Nadab and all Israel laid siege to Gibbethon. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Baasha killed him in the third year of Asa king of Judah, and reigned in his place. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it was so, when he became king, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' he killed all the house of Jeroboam. He did not leave to Jeroboam anyone that breathed, until he had destroyed him, according to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:10–14
      marker-yv: yv-n
    - type: text
      text: 'the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' which He had spoken by His servant Ahijah the Shilonite, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he walked in all the sins of his father, which he had done before him; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:4; Ps. 119:80
      marker-yv: yv-n
    - type: text
      text: 'his heart was not loyal to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God, as was the heart of his father David. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:9, 16
      marker-yv: yv-n
    - type: text
      text: 'because of the sins of Jeroboam, which he had sinned and by which he had made Israel sin, because of his provocation with which he had provoked the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel to anger.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Nadab, and all that he did, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:16
      marker-yv: yv-n
    - type: text
      text: And there was war between Asa and Baasha king of Israel all their days.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Baasha Reigns in Israel
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the third year of Asa king of Judah, Baasha the son of Ahijah became king over all Israel in Tirzah, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reigned
    - type: text
      text: ' twenty-four years. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and walked in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 13:33; 14:16
      marker-yv: yv-n
    - type: text
      text: the way of Jeroboam, and in his sin by which he had made Israel sin.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 21:17; 1 Kin. 11:32, 36; 2 Chr. 21:7
      marker-yv: yv-n
    - type: text
      text: 'for David’s sake the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God gave him a lamp in Jerusalem, by setting up his son after him and by establishing Jerusalem; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 9:4; 14:8; Luke 1:6
      marker-yv: yv-n
    - type: text
      text: 'did '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' right in the eyes of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and had not turned aside from anything that He commanded him all the days of his life, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 11:3, 15–17; 12:9, 10
      marker-yv: yv-n
    - type: text
      text: 'except in the matter of Uriah the Hittite. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:30; 2 Chr. 12:15—13:20
      marker-yv: yv-n
    - type: text
      text: 'And there was war between Rehoboam and Jeroboam all the days of his life. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 13:2–22
      marker-yv: yv-n
    - type: text
      text: 'Now the rest of the acts of Abijam, and all that he did, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Judah? And there was war between Abijam and Jeroboam.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 14:1
      marker-yv: yv-n
    - type: text
      text: So Abijam rested with his fathers, and they buried him in the City of David. Then Asa his son reigned in his place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Asa Reigns in Judah
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the twentieth year of Jeroboam king of Israel, Asa became king over Judah. '
