  - type: heading
    content: Nadab Reigns in Israel
  '25':
  - type: text
    content: 'Now '
  - type: note
    content: 1 Kin. 14:20
  - type: text
    content: 'Nadab the son of Jeroboam became king over Israel in the second year of Asa king of Judah, and he reigned over Israel two years. '
  '26':
  - type: text
    content: 'And he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and walked in the way of his father, and in '
  - type: note
    content: 1 Kin. 12:28–33; 14:16
  - type: text
    content: his sin by which he had made Israel sin.
  '27':
  - type: note
    content: 1 Kin. 14:14
  - type: text
    content: 'Then Baasha the son of Ahijah, of the house of Issachar, conspired against him. And Baasha killed him at '
  - type: note
    content: Josh. 19:44; 21:23; 1 Kin. 16:15
  - type: text
    content: 'Gibbethon, which '
  - type: text
    content: belonged
  - type: text
    content: ' to the Philistines, while Nadab and all Israel laid siege to Gibbethon. '
  '28':
  - type: text
    content: 'Baasha killed him in the third year of Asa king of Judah, and reigned in his place. '
  '29':
  - type: text
    content: 'And it was so, when he became king, '
  - type: text
    content: that
  - type: text
    content: ' he killed all the house of Jeroboam. He did not leave to Jeroboam anyone that breathed, until he had destroyed him, according to '
  - type: note
    content: 1 Kin. 14:10–14
  - type: text
    content: 'the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He had spoken by His servant Ahijah the Shilonite, '
  '3':
  - type: text
    content: 'And he walked in all the sins of his father, which he had done before him; '
  - type: note
    content: 1 Kin. 11:4; Ps. 119:80
  - type: text
