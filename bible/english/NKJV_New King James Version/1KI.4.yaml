  - type: note
    content: Judg. 20:1
  - type: text
    content: from Dan as far as Beersheba, all the days of Solomon.
  '26':
  - type: note
    content: 1 Kin. 10:26; 2 Chr. 1:14
  - type: text
    content: 'Solomon had forty thousand stalls of '
  - type: note
    content: (Deut. 17:16)
  - type: text
    content: 'horses for his chariots, and twelve thousand horsemen. '
  '27':
  - type: text
    content: 'And '
  - type: note
    content: 1 Kin. 4:7
  - type: text
    content: 'these governors, each man in his month, provided food for King Solomon and for all who came to King Solomon’s table. There was no lack in their supply. '
  '28':
  - type: text
    content: They also brought barley and straw to the proper place, for the horses and steeds, each man according to his charge.
  '29':
  - type: text
    content: 'And '
  - type: note
    content: 1 Kin. 3:12
  - type: text
    content: 'God gave Solomon wisdom and exceedingly great understanding, and largeness of heart like the sand on the seashore. '
  '3':
  - type: text
    content: 'Elihoreph and Ahijah, the sons of Shisha, scribes; '
  - type: note
    content: 2 Sam. 8:16; 20:24
  - type: text
    content: 'Jehoshaphat the son of Ahilud, the recorder; '
  '30':
  - type: text
    content: 'Thus Solomon’s wisdom excelled the wisdom of all the men '
  - type: note
    content: Gen. 25:6
  - type: text
    content: 'of the East and all '
  - type: note
    content: Is. 19:11, 12; Acts 7:22
  - type: text
    content: 'the wisdom of Egypt. '
  '31':
  - type: text
    content: 'For he was '
  - type: note
    content: 1 Kin. 3:12
  - type: text
    content: wiser than all men—
  - type: note
    content: 1 Chr. 15:19; Ps. 89:title
  - type: text
    content: 'than Ethan the Ezrahite, '
  - type: note
    content: 1 Chr. 2:6; Ps. 88:title
  - type: text
    content: 'and Heman, Chalcol, and Darda, the sons of Mahol; and his fame was in all the surrounding nations. '
  '32':
  - type: note
    content: Prov. 1:1; 10:1; 25:1; Eccl. 12:9
  - type: text
    content: 'He spoke three thousand proverbs, and his '
  - type: note
    content: Song 1:1
  - type: text
    content: 'songs were one thousand and five. '
  '33':
  - type: text
    content: 'Also he spoke of trees, from the cedar tree of Lebanon even to the hyssop that springs out of the wall; he spoke also of animals, of birds, of creeping things, and of fish. '
  '34':
  - type: text
    content: 'And men of all nations, from all the kings of the earth who had heard of his wisdom, '
  - type: note
    content: 1 Kin. 10:1; 2 Chr. 9:1, 23
  - type: text
    content: came to hear the wisdom of Solomon.
