document_id: 1KI.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Administration
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So King Solomon was king over all Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' his officials: Azariah the son of Zadok, the priest; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elihoreph and Ahijah, the sons of Shisha, scribes; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 8:16; 20:24
    marker-yv: yv-n
  - type: text
    text: 'Jehoshaphat the son of Ahilud, the recorder; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 2:35
    marker-yv: yv-n
  - type: text
    text: 'Benaiah the son of Jehoiada, over the army; Zadok and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 2:27
    marker-yv: yv-n
  - type: text
    text: 'Abiathar, the priests; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Azariah the son of Nathan, over '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 4:7
    marker-yv: yv-n
  - type: text
    text: 'the officers; Zabud the son of Nathan, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 8:18; 20:26
    marker-yv: yv-n
  - type: text
    text: 'a priest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 15:37; 16:16; 1 Chr. 27:33
    marker-yv: yv-n
  - type: text
    text: 'the king’s friend; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ahishar, over the household; and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:14
    marker-yv: yv-n
  - type: text
    text: Adoniram the son of Abda, over the labor force.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Solomon had twelve governors over all Israel, who provided food for the king and his household; each one made provision for one month of the year. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' their names: Ben-Hur, in the mountains of Ephraim; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ben-Deker, in Makaz, Shaalbim, Beth Shemesh, and Elon Beth Hanan; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ben-Hesed, in Arubboth; to him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: belonged
  - type: text
    text: ' Sochoh and all the land of Hepher; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ben-Abinadab, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' all the regions of Dor; he had Taphath the daughter of Solomon as wife; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Baana the son of Ahilud, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' Taanach, Megiddo, and all Beth Shean, which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' beside Zaretan below Jezreel, from Beth Shean to Abel Meholah, as far as the other side of Jokneam; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ben-Geber, in Ramoth Gilead; to him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: belonged
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 32:41; 1 Chr. 2:22
    marker-yv: yv-n
  - type: text
    text: 'the towns of Jair the son of Manasseh, in Gilead; to him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: also
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: belonged
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 3:4
    marker-yv: yv-n
  - type: text
    text: 'the region of Argob in Bashan—sixty large cities with walls and bronze gate-bars; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ahinadab the son of Iddo, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' Mahanaim; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 15:27
    marker-yv: yv-n
  - type: text
    text: 'Ahimaaz, in Naphtali; he also took Basemath the daughter of Solomon as wife; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Baanah the son of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 15:32; 1 Chr. 27:33
    marker-yv: yv-n
  - type: text
    text: 'Hushai, in Asher and Aloth; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jehoshaphat the son of Paruah, in Issachar; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 1:8
    marker-yv: yv-n
  - type: text
    text: 'Shimei the son of Elah, in Benjamin; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Geber the son of Uri, in the land of Gilead, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 3:8–10
    marker-yv: yv-n
  - type: text
    text: 'the country of Sihon king of the Amorites, and of Og king of Bashan. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the only governor who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in the land.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prosperity and Wisdom of Solomon’s Reign
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Judah and Israel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' as numerous '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 22:17; 32:12; 1 Kin. 3:8; (Prov. 14:28)
    marker-yv: yv-n
  - type: text
    text: 'as the sand by the sea in multitude, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 72:3, 7; Mic. 4:4
    marker-yv: yv-n
  - type: text
    text: 'eating and drinking and rejoicing. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 34:24; 2 Chr. 9:26; Ps. 72:8
    marker-yv: yv-n
  - type: text
    text: 'Solomon reigned over all kingdoms from '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 15:18; Josh. 1:4
    marker-yv: yv-n
  - type: text
    text: 'the River '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' the land of the Philistines, as far as the border of Egypt. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 68:29
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: They
  - type: text
    text: ' brought tribute and served Solomon all the days of his life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 5:18
    marker-yv: yv-n
  - type: text
    text: 'Now Solomon’s provision for one day was thirty kors of fine flour, sixty kors of meal, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ten fatted oxen, twenty oxen from the pastures, and one hundred sheep, besides deer, gazelles, roebucks, and fatted fowl.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'For he had dominion over all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: region
  - type: text
    text: ' on this side of the River from Tiphsah even to Gaza, namely over '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 72:11
    marker-yv: yv-n
  - type: text
    text: 'all the kings on this side of the River; and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:4; 1 Chr. 22:9
    marker-yv: yv-n
  - type: text
    text: 'he had peace on every side all around him. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And Judah and Israel '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Jer. 23:6)
    marker-yv: yv-n
  - type: text
    text: 'dwelt safely, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Mic. 4:4; Zech. 3:10)
    marker-yv: yv-n
  - type: text
    text: 'each man under his vine and his fig tree, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 20:1
    marker-yv: yv-n
  - type: text
    text: from Dan as far as Beersheba, all the days of Solomon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 10:26; 2 Chr. 1:14
    marker-yv: yv-n
  - type: text
    text: 'Solomon had forty thousand stalls of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 17:16)
    marker-yv: yv-n
  - type: text
    text: 'horses for his chariots, and twelve thousand horsemen. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 4:7
    marker-yv: yv-n
  - type: text
    text: 'these governors, each man in his month, provided food for King Solomon and for all who came to King Solomon’s table. There was no lack in their supply. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They also brought barley and straw to the proper place, for the horses and steeds, each man according to his charge.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 3:12
    marker-yv: yv-n
  - type: text
    text: 'God gave Solomon wisdom and exceedingly great understanding, and largeness of heart like the sand on the seashore. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Thus Solomon’s wisdom excelled the wisdom of all the men '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 25:6
    marker-yv: yv-n
  - type: text
    text: 'of the East and all '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 19:11, 12; Acts 7:22
    marker-yv: yv-n
  - type: text
    text: 'the wisdom of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'For he was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 3:12
    marker-yv: yv-n
  - type: text
    text: wiser than all men—
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 15:19; Ps. 89:title
    marker-yv: yv-n
  - type: text
    text: 'than Ethan the Ezrahite, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 2:6; Ps. 88:title
    marker-yv: yv-n
  - type: text
    text: 'and Heman, Chalcol, and Darda, the sons of Mahol; and his fame was in all the surrounding nations. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 1:1; 10:1; 25:1; Eccl. 12:9
    marker-yv: yv-n
  - type: text
    text: 'He spoke three thousand proverbs, and his '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Song 1:1
    marker-yv: yv-n
  - type: text
    text: 'songs were one thousand and five. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Also he spoke of trees, from the cedar tree of Lebanon even to the hyssop that springs out of the wall; he spoke also of animals, of birds, of creeping things, and of fish. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And men of all nations, from all the kings of the earth who had heard of his wisdom, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 10:1; 2 Chr. 9:1, 23
    marker-yv: yv-n
  - type: text
    text: came to hear the wisdom of Solomon.
