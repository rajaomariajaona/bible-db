  - type: text
    content: 'Now Solomon’s provision for one day was thirty kors of fine flour, sixty kors of meal, '
  '23':
  - type: text
    content: ten fatted oxen, twenty oxen from the pastures, and one hundred sheep, besides deer, gazelles, roebucks, and fatted fowl.
  '24':
