  - type: note
    content: 1 Kin. 5:4; 1 Chr. 22:9
  - type: text
    content: 'he had peace on every side all around him. '
  '25':
  - type: text
    content: 'And Judah and Israel '
  - type: note
    content: (Jer. 23:6)
  - type: text
    content: 'dwelt safely, '
  - type: note
    content: (Mic. 4:4; Zech. 3:10)
  - type: text
