    content: Greeting
  - type: text
    content: 'Paul, '
  - type: note
    content: Rom. 1:1
  - type: text
    content: 'called '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' an apostle of Jesus Christ '
  - type: note
    content: 2 Cor. 1:1
  - type: text
    content: 'through the will of God, and '
  - type: note
    content: Acts 18:17
  - type: text
    content: 'Sosthenes '
  - type: text
    content: our
  - type: text
    content: ' brother,'
  '10':
  - type: text
    content: 'Now I plead with you, brethren, by the name of our Lord Jesus Christ, '
  - type: note
    content: 2 Cor. 13:11; 1 Pet. 3:8
  - type: text
    content: 'that you all speak the same thing, and '
  - type: text
    content: that
  - type: text
    content: ' there be no divisions among you, but '
  - type: text
    content: that
  - type: text
    content: ' you be perfectly joined together in the same mind and in the same judgment. '
  '11':
  - type: text
    content: 'For it has been declared to me concerning you, my brethren, by those of Chloe’s '
  - type: text
    content: household,
  - type: text
    content: ' that there are contentions among you. '
  '12':
  - type: text
    content: 'Now I say this, that '
  - type: note
    content: Matt. 3:8–10; 1 Cor. 3:4
  - type: text
    content: 'each of you says, “I am of Paul,” or “I am of '
  - type: note
    content: Acts 18:24; 1 Cor. 3:22
  - type: text
    content: 'Apollos,” or “I am of '
  - type: note
    content: John 1:42; 1 Cor. 3:22; 9:5; 15:5
  - type: text
    content: 'Cephas,” or “I am of Christ.” '
  '13':
  - type: note
    content: 2 Cor. 11:4
  - type: text
    content: Is Christ divided? Was Paul crucified for you? Or were you baptized in the name of Paul?
  '14':
  - type: text
    content: 'I thank God that I baptized '
  - type: note
    content: John 4:2
  - type: text
    content: 'none of you except '
  - type: note
    content: Acts 18:8
  - type: text
    content: 'Crispus and '
  - type: note
    content: Rom. 16:23
  - type: text
    content: 'Gaius, '
  '15':
  - type: text
    content: 'lest anyone should say that I had baptized in my own name. '
  '16':
  - type: text
    content: 'Yes, I also baptized the household of '
  - type: note
    content: 1 Cor. 16:15, 17
  - type: text
    content: 'Stephanas. Besides, I do not know whether I baptized any other. '
  '17':
  - type: text
    content: 'For Christ did not send me to baptize, but to preach the gospel, '
  - type: note
    content: (1 Cor. 2:1, 4, 13)
  - type: text
    content: not with wisdom of words, lest the cross of Christ should be made of no effect.
  - type: heading
    content: Christ the Power and Wisdom of God
  '18':
  - type: text
    content: 'For the message of the cross is '
  - type: note
    content: 1 Cor. 2:14
  - type: text
    content: 'foolishness to '
  - type: note
    content: 2 Cor. 2:15
  - type: text
    content: 'those who are perishing, but to us '
  - type: note
    content: (1 Cor. 15:2)
  - type: text
    content: 'who are being saved it is the '
  - type: note
    content: Rom. 1:16; 1 Cor. 1:24
  - type: text
    content: 'power of God. '
  '19':
  - type: text
    content: 'For it is written:'
  - type: note
    content: Is. 29:14
  - type: text
    content: “I will destroy the wisdom of the wise,
  - type: text
    content: And bring to nothing the understanding of the prudent.”
  '2':
  - type: text
    content: 'To the church of God which is at Corinth, to those who '
  - type: note
    content: (Acts 15:9)
  - type: text
    content: 'are sanctified in Christ Jesus, '
  - type: note
    content: Rom. 1:7; Eph. 4:1; 1 Thess. 2:12
  - type: text
    content: 'called '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' saints, with all who in every place call on the name of Jesus Christ '
  - type: note
    content: (1 Cor. 8:6)
  - type: text
    content: 'our Lord, '
  - type: note
    content: (Rom. 3:22)
  - type: text
    content: 'both theirs and ours:'
  '20':
  - type: note
    content: Is. 19:12; 33:18
  - type: text
    content: 'Where '
  - type: text
    content: is
  - type: text
    content: ' the wise? Where '
  - type: text
    content: is
  - type: text
    content: ' the scribe? Where '
  - type: text
    content: is
  - type: text
    content: ' the disputer of this age? '
  - type: note
    content: Job 12:17; Matt. 13:22; 1 Cor. 2:6, 8; 3:18, 19
  - type: text
    content: 'Has not God made foolish the wisdom of this world? '
  '21':
  - type: text
    content: 'For since, in the '
  - type: note
    content: Dan. 2:20; (Rom. 11:33)
  - type: text
    content: 'wisdom of God, the world through wisdom did not know God, it pleased God through the foolishness of the message preached to save those who believe. '
  '22':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 12:38; Mark 8:11; John 2:18; 4:48
  - type: text
    content: 'Jews request a sign, and Greeks seek after wisdom; '
  '23':
  - type: text
    content: 'but we preach Christ crucified, '
  - type: note
    content: Is. 8:14; Luke 2:34; John 6:60; Gal. 5:11; (1 Pet. 2:8)
  - type: text
    content: 'to the Jews a stumbling block and to the Greeks '
  - type: note
    content: (1 Cor. 2:14)
  - type: text
    content: 'foolishness, '
  '24':
  - type: text
    content: 'but to those who are called, both Jews and Greeks, Christ '
  - type: note
    content: (Rom. 1:4)
  - type: text
    content: 'the power of God and '
  - type: note
    content: Col. 2:3
  - type: text
    content: 'the wisdom of God. '
  '25':
  - type: text
    content: Because the foolishness of God is wiser than men, and the weakness of God is stronger than men.
  - type: heading
    content: Glory Only in the Lord
  '26':
  - type: text
    content: 'For you see your calling, brethren, '
  - type: note
    content: John 7:48
  - type: text
    content: 'that not many wise according to the flesh, not many mighty, not many noble, '
  - type: text
    content: are
  - type: text
    content: ' '
  - type: text
    content: called.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'But '
  - type: note
    content: Ps. 8:2; Matt. 11:25
  - type: text
    content: 'God has chosen the foolish things of the world to put to shame the wise, and God has chosen the weak things of the world to put to shame the things which are mighty; '
  '28':
  - type: text
    content: 'and the base things of the world and the things which are despised God has chosen, and the things which are not, to bring to nothing the things that are, '
  '29':
  - type: text
    content: 'that no flesh should glory in His presence. '
  '3':
  - type: note
    content: Rom. 1:7
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Spiritual Gifts at Corinth
  '30':
  - type: text
    content: 'But of Him you are in Christ Jesus, who became for us wisdom from God—and '
  - type: note
    content: Jer. 23:5; 33:16; (2 Cor. 5:21; Phil. 3:9)
  - type: text
    content: 'righteousness and sanctification and redemption— '
  '31':
  - type: text
    content: 'that, as it is written, '
  - type: note
    content: Jer. 9:23, 24; 2 Cor. 10:17
  - type: text
    content: '“He who glories, let him glory in the '
  - type: heading
    content: Lord
  - type: text
    content: .”
  '4':
  - type: note
    content: Rom. 1:8
  - type: text
    content: 'I thank my God always concerning you for the grace of God which was given to you by Christ Jesus, '
  '5':
  - type: text
    content: 'that you were enriched in everything by Him '
  - type: note
    content: (1 Cor. 12:8)
  - type: text
    content: 'in all utterance and all knowledge, '
  '6':
  - type: text
    content: 'even as '
  - type: note
    content: 2 Thess. 1:10; 1 Tim. 2:6; 2 Tim. 1:8; Rev. 1:2
  - type: text
    content: 'the testimony of Christ was confirmed in you, '
  '7':
  - type: text
    content: 'so that you come short in no gift, eagerly '
  - type: note
    content: Luke 17:30; Rom. 8:19, 23; Phil. 3:20; Titus 2:13; (2 Pet. 3:12)
  - type: text
    content: 'waiting for the revelation of our Lord Jesus Christ, '
  '8':
  - type: note
    content: 1 Thess. 3:13; 5:23
  - type: text
    content: 'who will also confirm you to the end, '
  - type: note
    content: Phil. 1:6; Col. 1:22; 2:7
