  - type: text
    content: ' blameless in the day of our Lord Jesus Christ. '
  '9':
  - type: note
    content: Deut. 7:9; Is. 49:7; 1 Cor. 10:13; 2 Cor. 1:18; 1 Thess. 5:24; 2 Thess. 3:3
  - type: text
    content: 'God '
  - type: text
