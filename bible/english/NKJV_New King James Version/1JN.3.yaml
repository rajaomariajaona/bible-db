document_id: 1JN.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Behold '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 3:16; Eph. 2:4–7; 1 John 4:10)
    marker-yv: yv-n
  - type: text
    text: 'what manner of love the Father has bestowed on us, that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 1:12)
    marker-yv: yv-n
  - type: text
    text: 'we should be called children of God! Therefore the world does not know us, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 15:18, 21; 16:3
    marker-yv: yv-n
  - type: text
    text: 'because it did not know Him. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Beloved, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 56:5; Rom. 8:15, 16)
    marker-yv: yv-n
  - type: text
    text: 'now we are children of God; and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 8:18, 19, 23)
    marker-yv: yv-n
  - type: text
    text: 'it has not yet been revealed what we shall be, but we know that when He is revealed, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 8:29; 2 Pet. 1:4
    marker-yv: yv-n
  - type: text
    text: 'we shall be like Him, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 16:11)
    marker-yv: yv-n
  - type: text
    text: 'we shall see Him as He is. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 John 4:17
    marker-yv: yv-n
  - type: text
    text: And everyone who has this hope in Him purifies himself, just as He is pure.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sin and the Child of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Whoever commits sin also commits lawlessness, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 4:15; 1 John 5:17
    marker-yv: yv-n
  - type: text
    text: 'sin is lawlessness. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And you know '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 John 1:2; 3:8
    marker-yv: yv-n
  - type: text
    text: 'that He was manifested '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 53:5, 6); John 1:29; (2 Cor. 5:21; Heb. 9:26)
    marker-yv: yv-n
  - type: text
    text: 'to take away our sins, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Cor. 5:21); 1 John 2:29
    marker-yv: yv-n
  - type: text
    text: 'in Him there is no sin. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Whoever abides in Him does not sin. Whoever sins has neither seen Him nor known Him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Little children, let no one deceive you. He who practices righteousness is righteous, just as He is righteous. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 13:38; John 8:44; 1 John 3:10
    marker-yv: yv-n
  - type: text
    text: 'He who sins is of the devil, for the devil has sinned from the beginning. For this purpose the Son of God was manifested, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 10:18; (Heb. 2:14)
    marker-yv: yv-n
  - type: text
    text: 'that He might destroy the works of the devil. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Whoever has been '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 1:3; 3:3; (1 John 2:29; 4:7; 5:1, 4, 18); 3 John 11
    marker-yv: yv-n
  - type: text
    text: 'born of God does not sin, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Pet. 1:23
    marker-yv: yv-n
  - type: text
    text: His seed remains in him; and he cannot sin, because he has been born of God.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Imperative of Love
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In this the children of God and the children of the devil are manifest: Whoever does not practice righteousness is not of God, nor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' he who does not love his brother. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For this is the message that you heard from the beginning, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 13:34; 15:12); 1 John 4:7, 11, 21; 2 John 5
    marker-yv: yv-n
  - type: text
    text: 'that we should love one another, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'not as '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 4:4, 8
    marker-yv: yv-n
  - type: text
    text: 'Cain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' was of the wicked one and murdered his brother. And why did he murder him? Because his works were evil and his brother’s righteous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Do not marvel, my brethren, if '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 15:18; 17:14)
    marker-yv: yv-n
  - type: text
    text: 'the world hates you. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'We know that we have passed from death to life, because we love the brethren. He who does not love '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' brother abides in death. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 5:21; John 8:44
    marker-yv: yv-n
  - type: text
    text: 'Whoever hates his brother is a murderer, and you know that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Gal. 5:20, 21; Rev. 21:8)
    marker-yv: yv-n
  - type: text
    text: no murderer has eternal life abiding in him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Outworking of Love
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 3:16)
    marker-yv: yv-n
  - type: text
    text: 'By this we know love, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 10:11; 15:13; Gal. 2:20
    marker-yv: yv-n
  - type: text
    text: 'because He laid down His life for us. And we also ought to lay down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our
  - type: text
    text: ' lives for the brethren. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 15:7
    marker-yv: yv-n
  - type: text
    text: whoever has this world’s goods, and sees his brother in need, and shuts up his heart from him, how does the love of God abide in him?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'My little children, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 33:31
    marker-yv: yv-n
  - type: text
    text: 'let us not love in word or in tongue, but in deed and in truth. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And by this we know '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 18:37
    marker-yv: yv-n
  - type: text
    text: 'that we are of the truth, and shall assure our hearts before Him. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 4:4, 5)
    marker-yv: yv-n
  - type: text
    text: 'For if our heart condemns us, God is greater than our heart, and knows all things. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Beloved, if our heart does not condemn us, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Heb. 10:22; 1 John 2:28; 5:14)
    marker-yv: yv-n
  - type: text
    text: 'we have confidence toward God. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 34:15; (John 15:7); 1 John 5:14, 15
    marker-yv: yv-n
  - type: text
    text: 'whatever we ask we receive from Him, because we keep His commandments '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 8:29; Heb. 13:21
    marker-yv: yv-n
  - type: text
    text: 'and do those things that are pleasing in His sight. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And this is His commandment: that we should believe on the name of His Son Jesus Christ '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 22:39
    marker-yv: yv-n
  - type: text
    text: and love one another, as He gave us commandment.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Spirit of Truth and the Spirit of Error
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 14:23
    marker-yv: yv-n
  - type: text
    text: 'he who keeps His commandments '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 14:21; 17:21
    marker-yv: yv-n
  - type: text
    text: 'abides in Him, and He in him. And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 14:17; Rom. 8:9, 14, 16; 1 Thess. 4:8; 1 John 4:13
    marker-yv: yv-n
  - type: text
    text: by this we know that He abides in us, by the Spirit whom He has given us.
