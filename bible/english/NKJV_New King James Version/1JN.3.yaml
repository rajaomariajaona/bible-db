document_id: 1JN.3,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'Behold '
  - type: note
    content: (John 3:16; Eph. 2:4–7; 1 John 4:10)
  - type: text
    content: 'what manner of love the Father has bestowed on us, that '
  - type: note
    content: (John 1:12)
  - type: text
    content: 'we should be called children of God! Therefore the world does not know us, '
  - type: note
    content: John 15:18, 21; 16:3
  - type: text
    content: 'because it did not know Him. '
  '10':
  - type: text
    content: 'In this the children of God and the children of the devil are manifest: Whoever does not practice righteousness is not of God, nor '
  - type: text
    content: is
  - type: text
    content: ' he who does not love his brother. '
  '11':
  - type: text
    content: 'For this is the message that you heard from the beginning, '
  - type: note
    content: (John 13:34; 15:12); 1 John 4:7, 11, 21; 2 John 5
  - type: text
    content: 'that we should love one another, '
  '12':
  - type: text
    content: 'not as '
  - type: note
    content: Gen. 4:4, 8
  - type: text
    content: 'Cain '
  - type: text
    content: who
  - type: text
    content: ' was of the wicked one and murdered his brother. And why did he murder him? Because his works were evil and his brother’s righteous.'
  '13':
  - type: text
    content: 'Do not marvel, my brethren, if '
  - type: note
    content: (John 15:18; 17:14)
  - type: text
    content: 'the world hates you. '
  '14':
  - type: text
    content: 'We know that we have passed from death to life, because we love the brethren. He who does not love '
  - type: text
    content: his
  - type: text
    content: ' brother abides in death. '
  '15':
  - type: note
    content: Matt. 5:21; John 8:44
  - type: text
    content: 'Whoever hates his brother is a murderer, and you know that '
  - type: note
    content: (Gal. 5:20, 21; Rev. 21:8)
  - type: text
    content: no murderer has eternal life abiding in him.
  - type: heading
    content: The Outworking of Love
  '16':
  - type: note
    content: (John 3:16)
  - type: text
    content: 'By this we know love, '
  - type: note
    content: John 10:11; 15:13; Gal. 2:20
  - type: text
    content: 'because He laid down His life for us. And we also ought to lay down '
  - type: text
    content: our
  - type: text
    content: ' lives for the brethren. '
  '17':
  - type: text
    content: 'But '
  - type: note
    content: Deut. 15:7
  - type: text
    content: whoever has this world’s goods, and sees his brother in need, and shuts up his heart from him, how does the love of God abide in him?
  '18':
  - type: text
    content: 'My little children, '
  - type: note
    content: Ezek. 33:31
  - type: text
    content: 'let us not love in word or in tongue, but in deed and in truth. '
  '19':
  - type: text
    content: 'And by this we know '
  - type: note
    content: John 18:37
  - type: text
    content: 'that we are of the truth, and shall assure our hearts before Him. '
  '2':
  - type: text
    content: 'Beloved, '
  - type: note
    content: (Is. 56:5; Rom. 8:15, 16)
  - type: text
    content: 'now we are children of God; and '
  - type: note
    content: (Rom. 8:18, 19, 23)
  - type: text
    content: 'it has not yet been revealed what we shall be, but we know that when He is revealed, '
  - type: note
    content: Rom. 8:29; 2 Pet. 1:4
  - type: text
    content: 'we shall be like Him, for '
  - type: note
    content: (Ps. 16:11)
  - type: text
    content: 'we shall see Him as He is. '
  '20':
  - type: note
    content: (1 Cor. 4:4, 5)
  - type: text
    content: 'For if our heart condemns us, God is greater than our heart, and knows all things. '
  '21':
  - type: text
    content: 'Beloved, if our heart does not condemn us, '
  - type: note
    content: (Heb. 10:22; 1 John 2:28; 5:14)
  - type: text
    content: 'we have confidence toward God. '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 34:15; (John 15:7); 1 John 5:14, 15
  - type: text
    content: 'whatever we ask we receive from Him, because we keep His commandments '
  - type: note
    content: John 8:29; Heb. 13:21
  - type: text
    content: 'and do those things that are pleasing in His sight. '
  '23':
  - type: text
    content: 'And this is His commandment: that we should believe on the name of His Son Jesus Christ '
  - type: note
    content: Matt. 22:39
  - type: text
    content: and love one another, as He gave us commandment.
  - type: heading
    content: The Spirit of Truth and the Spirit of Error
  '24':
  - type: text
    content: 'Now '
  - type: note
    content: John 14:23
  - type: text
    content: 'he who keeps His commandments '
  - type: note
    content: John 14:21; 17:21
  - type: text
    content: 'abides in Him, and He in him. And '
  - type: note
    content: John 14:17; Rom. 8:9, 14, 16; 1 Thess. 4:8; 1 John 4:13
  - type: text
    content: by this we know that He abides in us, by the Spirit whom He has given us.
  '3':
  - type: note
    content: 1 John 4:17
  - type: text
    content: And everyone who has this hope in Him purifies himself, just as He is pure.
  - type: heading
    content: Sin and the Child of God
  '4':
  - type: text
    content: 'Whoever commits sin also commits lawlessness, and '
  - type: note
    content: Rom. 4:15; 1 John 5:17
  - type: text
    content: 'sin is lawlessness. '
  '5':
  - type: text
    content: 'And you know '
  - type: note
    content: 1 John 1:2; 3:8
  - type: text
    content: 'that He was manifested '
  - type: note
    content: (Is. 53:5, 6); John 1:29; (2 Cor. 5:21; Heb. 9:26)
  - type: text
    content: 'to take away our sins, and '
  - type: note
    content: (2 Cor. 5:21); 1 John 2:29
  - type: text
    content: 'in Him there is no sin. '
  '6':
  - type: text
    content: Whoever abides in Him does not sin. Whoever sins has neither seen Him nor known Him.
  '7':
  - type: text
    content: 'Little children, let no one deceive you. He who practices righteousness is righteous, just as He is righteous. '
  '8':
  - type: note
    content: Matt. 13:38; John 8:44; 1 John 3:10
  - type: text
    content: 'He who sins is of the devil, for the devil has sinned from the beginning. For this purpose the Son of God was manifested, '
  - type: note
    content: Luke 10:18; (Heb. 2:14)
  - type: text
    content: 'that He might destroy the works of the devil. '
  '9':
  - type: text
    content: 'Whoever has been '
  - type: note
    content: John 1:3; 3:3; (1 John 2:29; 4:7; 5:1, 4, 18); 3 John 11
  - type: text
    content: 'born of God does not sin, for '
  - type: note
    content: 1 Pet. 1:23
  - type: text
    content: His seed remains in him; and he cannot sin, because he has been born of God.
  - type: heading
    content: The Imperative of Love
