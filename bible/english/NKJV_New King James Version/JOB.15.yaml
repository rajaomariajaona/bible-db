    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 4:1
      marker-yv: yv-n
    - type: text
      text: 'Eliphaz the Temanite answered and said:'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 8:8–10; 12:12; 32:6, 7
      marker-yv: yv-n
    - type: text
      text: 'Both the gray-haired and the aged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' among us,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Much older than your father.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Are
    - type: text
      text: ' the consolations of God too small for you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spoken
    - type: text
      text: ' gently with you?'
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Why does your heart carry you away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And what do your eyes wink at,
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: That you turn your spirit against God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And let '
    - type: usfm
      marker: it
      children:
      - type: text
        text: such
    - type: text
      text: ' words go out of your mouth?'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “What
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 14:4; Prov. 20:9; (Eccl. 7:20; 1 John 1:8, 10)
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' man, that he could be pure?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' born of a woman, that he could be righteous?'
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 4:18; 25:5
      marker-yv: yv-n
    - type: text
      text: 'If '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' puts no trust in His saints,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the heavens are not pure in His sight,
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 4:19; Ps. 14:3; 53:3
      marker-yv: yv-n
    - type: text
      text: 'How much less man, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' abominable and filthy,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 34:7; Prov. 19:28
      marker-yv: yv-n
    - type: text
      text: Who drinks iniquity like water!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “I will tell you, hear me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What I have seen I will declare,
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: What wise men have told,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Not hiding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anything
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: received
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 8:8; 20:4
      marker-yv: yv-n
    - type: text
      text: from their fathers,
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: To whom alone the land was given,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Joel 3:17
      marker-yv: yv-n
    - type: text
      text: 'no alien passed among them:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Should a wise man answer with empty knowledge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And fill himself with the east wind?
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The wicked man writhes with pain all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' days,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 90:12
      marker-yv: yv-n
    - type: text
      text: And the number of years is hidden from the oppressor.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dreadful sounds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in his ears;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 20:21; 1 Thess. 5:3
      marker-yv: yv-n
    - type: text
      text: In prosperity the destroyer comes upon him.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'He does not believe that he will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 14:10–12
      marker-yv: yv-n
    - type: text
      text: return from darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For a sword is waiting for him.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 59:15; 109:10
      marker-yv: yv-n
    - type: text
      text: 'wanders about for bread, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
    - type: text
      text: ' ‘Where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it?
    - type: text
      text: ’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He knows '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 18:12
      marker-yv: yv-n
    - type: text
      text: that a day of darkness is ready at his hand.
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Trouble and anguish make him afraid;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They overpower him, like a king ready for battle.
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: For he stretches out his hand against God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And acts defiantly against the Almighty,
  '26':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Running stubbornly against Him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With his strong, embossed shield.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “Though
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 17:10; 73:7; 119:70
      marker-yv: yv-n
    - type: text
      text: ' he has covered his face with his fatness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And made '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' waist heavy with fat,'
  '28':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: He dwells in desolate cities,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In houses which no one inhabits,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which are destined to become ruins.
  '29':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: He will not be rich,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nor will his wealth '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 20:28; 27:16, 17
      marker-yv: yv-n
    - type: text
      text: continue,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor will his possessions overspread the earth.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Should he reason with unprofitable talk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or by speeches with which he can do no good?
  '30':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: He will not depart from darkness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The flame will dry out his branches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 4:9
      marker-yv: yv-n
    - type: text
      text: by the breath of His mouth he will go away.
  '31':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Let him not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 35:13; Is. 59:4
      marker-yv: yv-n
    - type: text
      text: 'trust in futile '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things,
    - type: text
      text: ' deceiving himself,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For futility will be his reward.
  '32':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'It will be accomplished '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 22:16; Ps. 55:23; Eccl. 7:17
      marker-yv: yv-n
    - type: text
      text: before his time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his branch will not be green.
  '33':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: He will shake off his unripe grape like a vine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And cast off his blossom like an olive tree.
  '34':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'For the company of hypocrites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' barren,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And fire will consume the tents of bribery.
  '35':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 7:14; Is. 59:4; (Hos. 10:13)
      marker-yv: yv-n
    - type: text
      text: They conceive trouble and bring forth futility;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their womb prepares deceit.”
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Yes, you cast off fear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And restrain prayer before God.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For your iniquity teaches your mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And you choose the tongue of the crafty.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:20; (Luke 19:22)
      marker-yv: yv-n
    - type: text
      text: Your own mouth condemns you, and not I;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, your own lips testify against you.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Are
    - type: text
      text: ' you the first man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' was born?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 38:4, 21; Ps. 90:2; Prov. 8:25
      marker-yv: yv-n
    - type: text
      text: Or were you made before the hills?
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 29:4; Rom. 11:34; (1 Cor. 2:11)
      marker-yv: yv-n
    - type: text
      text: Have you heard the counsel of God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you limit wisdom to yourself?
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 12:3; 13:2
      marker-yv: yv-n
    - type: text
      text: What do you know that we do not know?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: What
    - type: text
      text: ' do you understand that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not in us?'
