    content: 'Now the rest of the acts of Jehoiakim, the abominations which he did, and what was found against him, indeed they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the kings of Israel and Judah. Then Jehoiachin his son reigned in his place.'
