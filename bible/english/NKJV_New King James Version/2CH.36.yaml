  - type: note
    content: Jer. 29:10
  - type: text
    content: 'Jeremiah might be fulfilled, the '
  - type: heading
    content: Lord
  - type: text
    content: ' stirred up the spirit of '
  - type: note
    content: Is. 44:28; 45:1
  - type: text
    content: 'Cyrus king of Persia, so that he made a proclamation throughout all his kingdom, and also '
  - type: text
    content: put
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' in writing, saying,'
  '23':
  - type: note
    content: Ezra 1:2, 3
  - type: text
    content: 'Thus says Cyrus king of Persia:'
  - type: text
    content: 'All the kingdoms of the earth the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of heaven has given me. And He has commanded me to build Him a house at Jerusalem which is in Judah. Who '
  - type: text
    content: is
  - type: text
    content: ' among you of all His people? May the '
  - type: heading
    content: Lord
  - type: text
    content: ' his God '
  - type: text
    content: be
  - type: text
    content: ' with him, and let him go up!'
  '3':
  - type: text
    content: 'Now the king of Egypt deposed him at Jerusalem; and he imposed on the land a tribute of one hundred talents of silver and a talent of gold. '
  '4':
  - type: text
    content: 'Then the king of Egypt made '
  - type: text
    content: Jehoahaz’s
  - type: text
    content: ' brother Eliakim king over Judah and Jerusalem, and changed his name to Jehoiakim. And Necho took Jehoahaz his brother and carried him off to Egypt.'
  - type: heading
    content: The Reign and Captivity of Jehoiakim
