  - type: text
    content: 'had enjoyed her Sabbaths. As long as she lay desolate '
  - type: note
    content: Lev. 25:4, 5
  - type: text
    content: she kept Sabbath, to fulfill seventy years.
  - type: heading
    content: The Proclamation of Cyrus
  '22':
  - type: note
    content: Ezra 1:1–3
  - type: text
    content: 'Now in the first year of Cyrus king of Persia, that the word of the '
  - type: heading
    content: Lord
