  - type: note
    content: 2 Kin. 25:11; Jer. 5:19; Mic. 4:10
  - type: text
    content: 'those who escaped from the sword he carried away to Babylon, '
  - type: note
    content: Jer. 17:4; 27:7
  - type: text
    content: 'where they became servants to him and his sons until the rule of the kingdom of Persia, '
