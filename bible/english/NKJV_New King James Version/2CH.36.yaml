  - type: note
    content: 2 Kin. 23:36, 37; 1 Chr. 3:15
  - type: text
    content: 'Jehoiakim '
  - type: text
    content: was
  - type: text
    content: ' twenty-five years old when he became king, and he reigned eleven years in Jerusalem. And he did '
  - type: note
    content: (Jer. 22:13–19)
  - type: text
    content: 'evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ' his God. '
