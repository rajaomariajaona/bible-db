document_id: 2CH.36,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Reign and Captivity of Jehoahaz
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:30–34
      marker-yv: yv-n
    - type: text
      text: 'the people of the land took Jehoahaz the son of Josiah, and made him king in his father’s place in Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the turn of the year '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:10–17
      marker-yv: yv-n
    - type: text
      text: 'King Nebuchadnezzar summoned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' and took him to Babylon, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 1:1, 2
      marker-yv: yv-n
    - type: text
      text: 'with the costly articles from the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and made '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 37:1
      marker-yv: yv-n
    - type: text
      text: 'Zedekiah, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jehoiakim’s
    - type: text
      text: ' brother, king over Judah and Jerusalem.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zedekiah Reigns in Judah
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:18–20; Jer. 52:1
      marker-yv: yv-n
    - type: text
      text: 'Zedekiah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty-one years old when he became king, and he reigned eleven years in Jerusalem. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 21:3–7; 44:10
      marker-yv: yv-n
    - type: text
      text: 'did not humble himself before Jeremiah the prophet, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spoke
    - type: text
      text: ' from the mouth of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 52:3; Ezek. 17:15
      marker-yv: yv-n
    - type: text
      text: 'rebelled against King Nebuchadnezzar, who had made him swear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: an
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: oath
    - type: text
      text: ' by God; but he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 17:14; (2 Chr. 30:8)
      marker-yv: yv-n
    - type: text
      text: 'stiffened his neck and hardened his heart against turning to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover all the leaders of the priests and the people transgressed more and more, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: according
    - type: text
      text: ' to all the abominations of the nations, and defiled the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' which He had consecrated in Jerusalem.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Fall of Jerusalem
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 7:13; 25:3, 4
      marker-yv: yv-n
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of their fathers sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: warnings
    - type: text
      text: ' to them by His messengers, rising up early and sending '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
    - type: text
      text: ' because He had compassion on His people and on His dwelling place. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 30:10; Jer. 5:12, 13
      marker-yv: yv-n
    - type: text
      text: 'they mocked the messengers of God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 1:24–32)
      marker-yv: yv-n
    - type: text
      text: 'despised His words, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 38:6; Matt. 23:34
      marker-yv: yv-n
    - type: text
      text: 'scoffed at His prophets, until the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 34:25; Ps. 79:5
      marker-yv: yv-n
    - type: text
      text: 'wrath of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' arose against His people, till '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' no remedy.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 33:56; Deut. 4:26; 28:49; 2 Kin. 25:1; Ezra 9:7; Is. 3:8
      marker-yv: yv-n
    - type: text
      text: 'Therefore He brought against them the king of the Chaldeans, who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 74:20
      marker-yv: yv-n
    - type: text
      text: 'killed their young men with the sword in the house of their sanctuary, and had no compassion on young man or virgin, on the aged or the weak; He gave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' all into his hand. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:13–15; 2 Chr. 36:7, 10
      marker-yv: yv-n
    - type: text
      text: 'And all the articles from the house of God, great and small, the treasures of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the treasures of the king and of his leaders, all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' he took to Babylon. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:9; Ps. 79:1, 7; Is. 1:7, 8; Jer. 52:13
      marker-yv: yv-n
    - type: text
      text: 'Then they burned the house of God, broke down the wall of Jerusalem, burned all its palaces with fire, and destroyed all its precious possessions. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoahaz '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty-three years old when he became king, and he reigned three months in Jerusalem. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:11; Jer. 5:19; Mic. 4:10
      marker-yv: yv-n
    - type: text
      text: 'those who escaped from the sword he carried away to Babylon, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 17:4; 27:7
      marker-yv: yv-n
    - type: text
      text: 'where they became servants to him and his sons until the rule of the kingdom of Persia, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to fulfill the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by the mouth of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 25:9–12; 27:6–8; 29:10
      marker-yv: yv-n
    - type: text
      text: 'Jeremiah, until the land '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:34–43; Dan. 9:2
      marker-yv: yv-n
    - type: text
      text: 'had enjoyed her Sabbaths. As long as she lay desolate '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 25:4, 5
      marker-yv: yv-n
    - type: text
      text: she kept Sabbath, to fulfill seventy years.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Proclamation of Cyrus
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 1:1–3
      marker-yv: yv-n
    - type: text
      text: 'Now in the first year of Cyrus king of Persia, that the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by the mouth of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 29:10
      marker-yv: yv-n
    - type: text
      text: 'Jeremiah might be fulfilled, the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' stirred up the spirit of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 44:28; 45:1
      marker-yv: yv-n
    - type: text
      text: 'Cyrus king of Persia, so that he made a proclamation throughout all his kingdom, and also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: put
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' in writing, saying,'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 1:2, 3
      marker-yv: yv-n
    - type: text
      text: 'Thus says Cyrus king of Persia:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All the kingdoms of the earth the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of heaven has given me. And He has commanded me to build Him a house at Jerusalem which is in Judah. Who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' among you of all His people? May the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' with him, and let him go up!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the king of Egypt deposed him at Jerusalem; and he imposed on the land a tribute of one hundred talents of silver and a talent of gold. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king of Egypt made '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jehoahaz’s
    - type: text
      text: ' brother Eliakim king over Judah and Jerusalem, and changed his name to Jehoiakim. And Necho took Jehoahaz his brother and carried him off to Egypt.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Reign and Captivity of Jehoiakim
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:36, 37; 1 Chr. 3:15
      marker-yv: yv-n
    - type: text
      text: 'Jehoiakim '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty-five years old when he became king, and he reigned eleven years in Jerusalem. And he did '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Jer. 22:13–19)
      marker-yv: yv-n
    - type: text
      text: 'evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:1; Hab. 1:6
      marker-yv: yv-n
    - type: text
      text: 'Nebuchadnezzar king of Babylon came up against him, and bound him in bronze '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fetters
    - type: text
      text: ' to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 29:22–29); 2 Chr. 33:11; Jer. 36:30
      marker-yv: yv-n
    - type: text
      text: 'carry him off to Babylon. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:13; Dan. 1:1, 2
      marker-yv: yv-n
    - type: text
      text: 'Nebuchadnezzar also carried off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of the articles from the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to Babylon, and put them in his temple at Babylon. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Jehoiakim, the abominations which he did, and what was found against him, indeed they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' written in the book of the kings of Israel and Judah. Then Jehoiachin his son reigned in his place.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Reign and Captivity of Jehoiachin
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:8–17
      marker-yv: yv-n
    - type: text
      text: 'Jehoiachin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' eight years old when he became king, and he reigned in Jerusalem three months and ten days. And he did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
