  - type: text
    content: 'Then they burned the house of God, broke down the wall of Jerusalem, burned all its palaces with fire, and destroyed all its precious possessions. '
  '2':
  - type: text
    content: 'Jehoahaz '
  - type: text
    content: was
  - type: text
    content: ' twenty-three years old when he became king, and he reigned three months in Jerusalem. '
