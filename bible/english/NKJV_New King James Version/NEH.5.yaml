    children:
    - type: text
      text: '1'
  - type: text
    text: 'And there was a great '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 25:35–37; Neh. 5:7, 8
    marker-yv: yv-n
  - type: text
    text: 'outcry of the people and their wives against their '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 15:7
    marker-yv: yv-n
  - type: text
    text: 'Jewish brethren. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For there were those who said, “We, our sons, and our daughters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' many; therefore let us get grain, that we may eat and live.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'There were also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' who said, “We have mortgaged our lands and vineyards and houses, that we might buy grain because of the famine.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'There were also those who said, “We have borrowed money for the king’s tax '
  - type: usfm
    marker: it
    children:
    - type: text
      text: on
  - type: text
    text: ' our lands and vineyards. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Yet now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 58:7
    marker-yv: yv-n
  - type: text
    text: 'our flesh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' as the flesh of our brethren, our children as their children; and indeed we '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 21:7; (Lev. 25:39)
    marker-yv: yv-n
  - type: text
    text: 'are forcing our sons and our daughters to be slaves, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' of our daughters have been brought into slavery. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: It
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' not in our power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: redeem
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them,
  - type: text
    text: ' for other men have our lands and vineyards.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And I became very angry when I heard their outcry and these words. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'After serious thought, I rebuked the nobles and rulers, and said to them, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ex. 22:25; Lev. 25:36; Deut. 23:19, 20); Ezek. 22:12
    marker-yv: yv-n
  - type: text
    text: '“Each of you is exacting usury from his brother.” So I called a great assembly against them. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And I said to them, “According to our ability we have '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 25:48
    marker-yv: yv-n
  - type: text
    text: redeemed our Jewish brethren who were sold to the nations. Now indeed, will you even sell your brethren? Or should they be sold to us?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then they were silenced and found nothing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: say.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then I said, “What you are doing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' not good. Should you not walk '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 25:36
    marker-yv: yv-n
  - type: text
    text: 'in the fear of our God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 12:14; Rom. 2:24; (1 Pet. 2:12)
    marker-yv: yv-n
  - type: text
    text: 'because of the reproach of the nations, our enemies? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I also, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' my brethren and my servants, am lending them money and grain. Please, let us stop this usury! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Restore now to them, even this day, their lands, their vineyards, their olive groves, and their houses, also a hundredth of the money and the grain, the new wine and the oil, that you have charged them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So they said, “We will restore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it,
  - type: text
    text: ' and will require nothing from them; we will do as you say.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then I called the priests, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezra 10:5; Jer. 34:8, 9
    marker-yv: yv-n
  - type: text
    text: 'and required an oath from them that they would do according to this promise. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 10:14; Acts 13:51; 18:6
    marker-yv: yv-n
  - type: text
    text: I shook out the fold of my garment and said, “So may God shake out each man from his house, and from his property, who does not perform this promise. Even thus may he be shaken out and emptied.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And all the assembly said, “Amen!” and praised the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 23:3
    marker-yv: yv-n
  - type: text
    text: Then the people did according to this promise.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Generosity of Nehemiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Moreover, from the time that I was appointed to be their governor in the land of Judah, from the twentieth year '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 2:1; 13:6
    marker-yv: yv-n
  - type: text
    text: 'until the thirty-second year of King Artaxerxes, twelve years, neither I nor my brothers '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 9:4–15)
    marker-yv: yv-n
  - type: text
    text: 'ate the governor’s provisions. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But the former governors who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' before me laid burdens on the people, and took from them bread and wine, besides forty shekels of silver. Yes, even their servants bore rule over the people, but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 11:9; 12:13
    marker-yv: yv-n
  - type: text
    text: 'I did not do so, because of the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 5:9
    marker-yv: yv-n
  - type: text
    text: 'fear of God. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Indeed, I also continued the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 4:1; 6:1
    marker-yv: yv-n
  - type: text
    text: 'work on this wall, and we did not buy any land. All my servants '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' gathered there for the work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 9:7; 1 Kin. 18:19
    marker-yv: yv-n
  - type: text
    text: 'at my table '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' one hundred and fifty Jews and rulers, besides those who came to us from the nations around us. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 4:22
    marker-yv: yv-n
  - type: text
    text: 'which was prepared daily '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' one ox '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' six choice sheep. Also fowl were prepared for me, and once every ten days an abundance of all kinds of wine. Yet in spite of this I '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 5:14, 15
    marker-yv: yv-n
  - type: text
    text: did not demand the governor’s provisions, because the bondage was heavy on this people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 20:3; Neh. 13:14, 22, 31
    marker-yv: yv-n
  - type: text
    text: 'Remember me, my God, for good, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: according
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' all that I have done for this people.'
