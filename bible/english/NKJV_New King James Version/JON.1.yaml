      marker-yv: yv-n
    - type: text
      text: 'great city, and cry out against it; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 18:20; Hos. 7:2
      marker-yv: yv-n
    - type: text
      text: 'their wickedness has come up before Me.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jonah arose to flee to Tarshish from the presence of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. He went down to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:46; 2 Chr. 2:16; Ezra 3:7; Acts 9:36, 43
      marker-yv: yv-n
    - type: text
      text: 'Joppa, and found a ship going to Tarshish; so he paid the fare, and went down into it, to go with them to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 23:1
      marker-yv: yv-n
    - type: text
      text: 'Tarshish '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 4:16; Job 1:12; 2:7
      marker-yv: yv-n
    - type: text
      text: 'from the presence of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
