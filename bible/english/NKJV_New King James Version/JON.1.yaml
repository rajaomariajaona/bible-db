    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 107:25
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent out a great wind on the sea, and there was a mighty tempest on the sea, so that the ship was about to be broken up.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the mariners were afraid; and every man cried out to his god, and threw the cargo that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in the ship into the sea, to lighten the load. But Jonah had gone down '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 24:3
      marker-yv: yv-n
    - type: text
      text: into the lowest parts of the ship, had lain down, and was fast asleep.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the captain came to him, and said to him, “What do you mean, sleeper? Arise, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 107:28
      marker-yv: yv-n
    - type: text
      text: 'call on your God; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Joel 2:14
      marker-yv: yv-n
    - type: text
      text: perhaps your God will consider us, so that we may not perish.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said to one another, “Come, let us '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 7:14; 1 Sam. 14:41, 42; Prov. 16:33
      marker-yv: yv-n
    - type: text
      text: 'cast lots, that we may know for whose cause this trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' upon us.” So they cast lots, and the lot fell on Jonah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they said to him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 7:19; 1 Sam. 14:43
      marker-yv: yv-n
    - type: text
      text: '“Please tell us! For whose cause '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' this trouble upon us? What is your occupation? And where do you come from? What is your country? And of what people are you?”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he said to them, “I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' a Hebrew; and I fear the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of heaven, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Neh. 9:6); Ps. 146:6; Acts 17:24
      marker-yv: yv-n
    - type: text
      text: 'who made the sea and the dry '
    - type: usfm
