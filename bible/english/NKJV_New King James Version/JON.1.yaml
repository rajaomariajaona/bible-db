  '1':
  - type: heading
    content: Jonah’s Disobedience
  - type: text
    content: 'Now the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to '
  - type: note
    content: 2 Kin. 14:25; Matt. 12:39–41; 16:4; Luke 11:29, 30, 32
  - type: text
    content: 'Jonah the son of Amittai, saying, '
  '10':
  - type: text
    content: 'Then the men were exceedingly afraid, and said to him, “Why have you done this?” For the men knew that he fled from the presence of the '
  - type: heading
    content: Lord
  - type: text
    content: ', because he had told them. '
  '11':
  - type: text
    content: Then they said to him, “What shall we do to you that the sea may be calm for us?”—for the sea was growing more tempestuous.
  '12':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: John 11:50
  - type: text
    content: '“Pick me up and throw me into the sea; then the sea will become calm for you. For I know that this great tempest '
  - type: text
    content: is
  - type: text
    content: ' because of me.”'
  '13':
  - type: text
    content: 'Nevertheless the men rowed hard to return to land, '
  - type: note
    content: (Prov. 21:30)
  - type: text
    content: 'but they could not, for the sea continued to grow more tempestuous against them. '
  '14':
  - type: text
    content: 'Therefore they cried out to the '
  - type: heading
    content: Lord
  - type: text
    content: ' and said, “We pray, O '
  - type: heading
    content: Lord
  - type: text
    content: ', please do not let us perish for this man’s life, and '
  - type: note
    content: Deut. 21:8
  - type: text
    content: 'do not charge us with innocent blood; for You, O '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ps. 115:3; (Dan. 4:35)
  - type: text
    content: 'have done as it pleased You.” '
  '15':
  - type: text
    content: 'So they picked up Jonah and threw him into the sea, '
  - type: note
    content: (Ps. 89:9; 107:29); Luke 8:24
  - type: text
    content: 'and the sea ceased from its raging. '
  '16':
  - type: text
    content: 'Then the men '
  - type: note
    content: Mark 4:41; Acts 5:11
  - type: text
    content: 'feared the '
  - type: heading
    content: Lord
  - type: text
    content: ' exceedingly, and offered a sacrifice to the '
  - type: heading
    content: Lord
  - type: text
    content: ' and took vows.'
  - type: heading
    content: Jonah’s Prayer and Deliverance
  '17':
  - type: text
    content: 'Now the '
  - type: heading
    content: Lord
  - type: text
    content: ' had prepared a great fish to swallow Jonah. And '
  - type: note
    content: (Matt. 12:40; Luke 11:30)
  - type: text
    content: Jonah was in the belly of the fish three days and three nights.
  '2':
  - type: text
    content: '“Arise, go to '
  - type: note
    content: Is. 37:37
  - type: text
    content: 'Nineveh, that '
  - type: note
    content: Gen. 10:11, 12; 2 Kin. 19:36; Jon. 4:11; Nah. 1:1; Zeph. 2:13
  - type: text
    content: 'great city, and cry out against it; for '
  - type: note
    content: Gen. 18:20; Hos. 7:2
  - type: text
    content: 'their wickedness has come up before Me.” '
  '3':
  - type: text
    content: 'But Jonah arose to flee to Tarshish from the presence of the '
  - type: heading
    content: Lord
  - type: text
    content: '. He went down to '
  - type: note
    content: Josh. 19:46; 2 Chr. 2:16; Ezra 3:7; Acts 9:36, 43
  - type: text
    content: 'Joppa, and found a ship going to Tarshish; so he paid the fare, and went down into it, to go with them to '
  - type: note
    content: Is. 23:1
  - type: text
    content: 'Tarshish '
  - type: note
    content: Gen. 4:16; Job 1:12; 2:7
  - type: text
    content: 'from the presence of the '
  - type: heading
    content: Lord
  - type: text
    content: .
  - type: heading
    content: The Storm at Sea
  '4':
  - type: text
    content: 'But '
  - type: note
    content: Ps. 107:25
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' sent out a great wind on the sea, and there was a mighty tempest on the sea, so that the ship was about to be broken up.'
  '5':
  - type: text
    content: 'Then the mariners were afraid; and every man cried out to his god, and threw the cargo that '
  - type: text
    content: was
  - type: text
    content: ' in the ship into the sea, to lighten the load. But Jonah had gone down '
  - type: note
    content: 1 Sam. 24:3
  - type: text
    content: into the lowest parts of the ship, had lain down, and was fast asleep.
  '6':
  - type: text
    content: 'So the captain came to him, and said to him, “What do you mean, sleeper? Arise, '
  - type: note
    content: Ps. 107:28
  - type: text
    content: 'call on your God; '
  - type: note
    content: Joel 2:14
  - type: text
    content: perhaps your God will consider us, so that we may not perish.”
  '7':
  - type: text
    content: 'And they said to one another, “Come, let us '
  - type: note
    content: Josh. 7:14; 1 Sam. 14:41, 42; Prov. 16:33
  - type: text
    content: 'cast lots, that we may know for whose cause this trouble '
  - type: text
    content: has
  - type: text
    content: ' '
  - type: text
    content: come
  - type: text
    content: ' upon us.” So they cast lots, and the lot fell on Jonah. '
  '8':
  - type: text
    content: 'Then they said to him, '
  - type: note
    content: Josh. 7:19; 1 Sam. 14:43
  - type: text
    content: '“Please tell us! For whose cause '
  - type: text
    content: is
  - type: text
    content: ' this trouble upon us? What is your occupation? And where do you come from? What is your country? And of what people are you?”'
  '9':
  - type: text
    content: 'So he said to them, “I '
  - type: text
    content: am
  - type: text
    content: ' a Hebrew; and I fear the '
  - type: heading
    content: Lord
  - type: text
    content: ', the God of heaven, '
  - type: note
    content: (Neh. 9:6); Ps. 146:6; Acts 17:24
  - type: text
    content: 'who made the sea and the dry '
  - type: text
    content: land.
  - type: text
    content: ”
  - type: heading
    content: Jonah Thrown into the Sea
