      marker-yv: yv-n
    - type: text
      text: 'Jonah the son of Amittai, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the men were exceedingly afraid, and said to him, “Why have you done this?” For the men knew that he fled from the presence of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', because he had told them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they said to him, “What shall we do to you that the sea may be calm for us?”—for the sea was growing more tempestuous.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 11:50
      marker-yv: yv-n
    - type: text
      text: '“Pick me up and throw me into the sea; then the sea will become calm for you. For I know that this great tempest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' because of me.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless the men rowed hard to return to land, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 21:30)
      marker-yv: yv-n
    - type: text
      text: 'but they could not, for the sea continued to grow more tempestuous against them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore they cried out to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and said, “We pray, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', please do not let us perish for this man’s life, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 21:8
      marker-yv: yv-n
    - type: text
      text: 'do not charge us with innocent blood; for You, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 115:3; (Dan. 4:35)
      marker-yv: yv-n
    - type: text
      text: 'have done as it pleased You.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they picked up Jonah and threw him into the sea, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 89:9; 107:29); Luke 8:24
      marker-yv: yv-n
    - type: text
      text: 'and the sea ceased from its raging. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the men '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 4:41; Acts 5:11
      marker-yv: yv-n
    - type: text
      text: 'feared the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' exceedingly, and offered a sacrifice to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and took vows.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jonah’s Prayer and Deliverance
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had prepared a great fish to swallow Jonah. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 12:40; Luke 11:30)
      marker-yv: yv-n
    - type: text
      text: Jonah was in the belly of the fish three days and three nights.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Arise, go to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 37:37
      marker-yv: yv-n
    - type: text
      text: 'Nineveh, that '
    - type: usfm
      marker: x
      children:
      - type: text
