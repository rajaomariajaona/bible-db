document_id: 1CO.16,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Collection for the Saints
  - type: text
    content: 'Now concerning '
  - type: note
    content: Acts 11:29; Gal. 2:10
  - type: text
    content: 'the collection for the saints, as I have given orders to the churches of Galatia, so you must do also: '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: Acts 19:22; 2 Tim. 1:2
  - type: text
    content: 'if Timothy comes, see that he may be with you without fear; for '
  - type: note
    content: Phil. 2:20; 1 Thess. 3:2
  - type: text
    content: 'he does the work of the Lord, as I also '
  - type: text
    content: do.
  - type: text
    content: ' '
  '11':
  - type: note
    content: 1 Tim. 4:12; Titus 2:15
  - type: text
    content: 'Therefore let no one despise him. But send him on his journey '
  - type: note
    content: Acts 15:33
  - type: text
    content: in peace, that he may come to me; for I am waiting for him with the brethren.
  '12':
  - type: text
    content: 'Now concerning '
  - type: text
    content: our
  - type: text
    content: ' brother '
  - type: note
    content: Acts 18:24; 1 Cor. 1:12; 3:5
  - type: text
    content: Apollos, I strongly urged him to come to you with the brethren, but he was quite unwilling to come at this time; however, he will come when he has a convenient time.
  - type: heading
    content: Final Exhortations
  '13':
  - type: note
    content: Matt. 24:42
  - type: text
    content: 'Watch, '
  - type: note
    content: 1 Cor. 15:1; Gal. 5:1; Phil. 1:27; 4:1; 1 Thess. 3:8; 2 Thess. 2:15
  - type: text
    content: 'stand fast in the faith, be brave, '
  - type: note
    content: (Ps. 31:24; Eph. 3:16; 6:10; Col. 1:11)
  - type: text
    content: 'be strong. '
  '14':
  - type: note
    content: (1 Pet. 4:8)
  - type: text
    content: 'Let all '
  - type: text
    content: that
  - type: text
    content: ' you '
  - type: text
    content: do
  - type: text
    content: ' be done with love.'
  '15':
  - type: text
    content: 'I urge you, brethren—you know '
  - type: note
    content: 1 Cor. 1:16
  - type: text
    content: 'the household of Stephanas, that it is '
  - type: note
    content: Rom. 16:5
  - type: text
    content: 'the firstfruits of Achaia, and '
  - type: text
    content: that
  - type: text
    content: ' they have devoted themselves to '
  - type: note
    content: 2 Cor. 8:4
  - type: text
    content: 'the ministry of the saints— '
  '16':
  - type: note
    content: Eph. 5:21; 1 Thess. 5:12; Heb. 13:17
  - type: text
    content: 'that you also submit to such, and to everyone who works and '
  - type: note
    content: (Heb. 6:10)
  - type: text
    content: 'labors with '
  - type: text
    content: us.
  '17':
  - type: text
    content: 'I am glad about the coming of Stephanas, Fortunatus, and Achaicus, '
  - type: note
    content: 2 Cor. 11:9; Phil. 2:30
  - type: text
    content: 'for what was lacking on your part they supplied. '
  '18':
  - type: note
    content: Col. 4:8
  - type: text
    content: 'For they refreshed my spirit and yours. Therefore '
  - type: note
    content: Phil. 2:29
  - type: text
    content: acknowledge such men.
  - type: heading
    content: Greetings and a Solemn Farewell
  '19':
  - type: text
    content: 'The churches of Asia greet you. Aquila and Priscilla greet you heartily in the Lord, '
  - type: note
    content: Rom. 16:5
  - type: text
    content: 'with the church that is in their house. '
  '2':
  - type: note
    content: Acts 20:7
  - type: text
    content: 'On the first '
  - type: text
    content: day
  - type: text
    content: ' of the week let each one of you lay something aside, storing up as he may prosper, that there be no collections when I come. '
  '20':
  - type: text
    content: All the brethren greet you.
  - type: note
    content: Rom. 16:16
  - type: text
    content: Greet one another with a holy kiss.
  '21':
  - type: note
    content: Rom. 16:22; Gal. 6:11; Col. 4:18; 2 Thess. 3:17; Philem. 19
  - type: text
    content: The salutation with my own hand—Paul’s.
  '22':
  - type: text
    content: 'If anyone '
  - type: note
    content: Eph. 6:24
  - type: text
    content: 'does not love the Lord Jesus Christ, '
  - type: note
    content: Gal. 1:8, 9
  - type: text
    content: 'let him be accursed. '
  - type: note
    content: Jude 14, 15
  - type: text
    content: O Lord, come!
  '23':
  - type: note
    content: Rom. 16:20
  - type: text
    content: 'The grace of our Lord Jesus Christ '
  - type: text
    content: be
  - type: text
    content: ' with you. '
  '24':
  - type: text
    content: 'My love '
  - type: text
    content: be
  - type: text
    content: ' with you all in Christ Jesus. Amen.'
  '3':
  - type: text
    content: 'And when I come, '
  - type: note
    content: 2 Cor. 3:1; 8:18
  - type: text
    content: 'whomever you approve by '
  - type: text
    content: your
  - type: text
    content: ' letters I will send to bear your gift to Jerusalem. '
  '4':
  - type: note
    content: 2 Cor. 8:4, 19
  - type: text
    content: But if it is fitting that I go also, they will go with me.
  - type: heading
    content: Personal Plans
  '5':
  - type: text
    content: 'Now I will come to you '
  - type: note
    content: Acts 19:21; 2 Cor. 1:15, 16
  - type: text
    content: 'when I pass through Macedonia (for I am passing through Macedonia). '
  '6':
  - type: text
    content: 'And it may be that I will remain, or even spend the winter with you, that you may '
  - type: note
    content: Acts 15:3; Rom. 15:24; 1 Cor. 16:11
  - type: text
    content: 'send me on my journey, wherever I go. '
  '7':
  - type: text
    content: 'For I do not wish to see you now on the way; but I hope to stay a while with you, '
  - type: note
    content: Acts 18:21; James 4:15
  - type: text
    content: if the Lord permits.
  '8':
  - type: text
    content: 'But I will tarry in Ephesus until '
  - type: note
    content: Lev. 23:15–22
  - type: text
    content: 'Pentecost. '
  '9':
  - type: text
    content: 'For '
  - type: note
    content: Acts 14:27; 2 Cor. 2:12; Col. 4:3
  - type: text
    content: 'a great and effective door has opened to me, and '
  - type: note
    content: Acts 19:9
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' many adversaries.'
