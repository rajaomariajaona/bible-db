document_id: 1CO.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Collection for the Saints
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now concerning '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 11:29; Gal. 2:10
    marker-yv: yv-n
  - type: text
    text: 'the collection for the saints, as I have given orders to the churches of Galatia, so you must do also: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 20:7
    marker-yv: yv-n
  - type: text
    text: 'On the first '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day
  - type: text
    text: ' of the week let each one of you lay something aside, storing up as he may prosper, that there be no collections when I come. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And when I come, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 3:1; 8:18
    marker-yv: yv-n
  - type: text
    text: 'whomever you approve by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' letters I will send to bear your gift to Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 8:4, 19
    marker-yv: yv-n
  - type: text
    text: But if it is fitting that I go also, they will go with me.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Personal Plans
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now I will come to you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 19:21; 2 Cor. 1:15, 16
    marker-yv: yv-n
  - type: text
    text: 'when I pass through Macedonia (for I am passing through Macedonia). '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And it may be that I will remain, or even spend the winter with you, that you may '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 15:3; Rom. 15:24; 1 Cor. 16:11
    marker-yv: yv-n
  - type: text
    text: 'send me on my journey, wherever I go. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For I do not wish to see you now on the way; but I hope to stay a while with you, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:21; James 4:15
    marker-yv: yv-n
  - type: text
    text: if the Lord permits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But I will tarry in Ephesus until '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 23:15–22
    marker-yv: yv-n
  - type: text
    text: 'Pentecost. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 14:27; 2 Cor. 2:12; Col. 4:3
    marker-yv: yv-n
  - type: text
    text: 'a great and effective door has opened to me, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 19:9
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' many adversaries.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 19:22; 2 Tim. 1:2
    marker-yv: yv-n
  - type: text
    text: 'if Timothy comes, see that he may be with you without fear; for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 2:20; 1 Thess. 3:2
    marker-yv: yv-n
  - type: text
    text: 'he does the work of the Lord, as I also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: do.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Tim. 4:12; Titus 2:15
    marker-yv: yv-n
  - type: text
    text: 'Therefore let no one despise him. But send him on his journey '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 15:33
    marker-yv: yv-n
  - type: text
    text: in peace, that he may come to me; for I am waiting for him with the brethren.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now concerning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our
  - type: text
    text: ' brother '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:24; 1 Cor. 1:12; 3:5
    marker-yv: yv-n
  - type: text
    text: Apollos, I strongly urged him to come to you with the brethren, but he was quite unwilling to come at this time; however, he will come when he has a convenient time.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Final Exhortations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 24:42
    marker-yv: yv-n
  - type: text
    text: 'Watch, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 15:1; Gal. 5:1; Phil. 1:27; 4:1; 1 Thess. 3:8; 2 Thess. 2:15
    marker-yv: yv-n
  - type: text
    text: 'stand fast in the faith, be brave, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 31:24; Eph. 3:16; 6:10; Col. 1:11)
    marker-yv: yv-n
  - type: text
    text: 'be strong. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Pet. 4:8)
    marker-yv: yv-n
  - type: text
    text: 'Let all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: do
  - type: text
    text: ' be done with love.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I urge you, brethren—you know '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 1:16
    marker-yv: yv-n
  - type: text
    text: 'the household of Stephanas, that it is '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:5
    marker-yv: yv-n
  - type: text
    text: 'the firstfruits of Achaia, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' they have devoted themselves to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 8:4
    marker-yv: yv-n
  - type: text
    text: 'the ministry of the saints— '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 5:21; 1 Thess. 5:12; Heb. 13:17
    marker-yv: yv-n
  - type: text
    text: 'that you also submit to such, and to everyone who works and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Heb. 6:10)
    marker-yv: yv-n
  - type: text
    text: 'labors with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: us.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I am glad about the coming of Stephanas, Fortunatus, and Achaicus, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 11:9; Phil. 2:30
    marker-yv: yv-n
  - type: text
    text: 'for what was lacking on your part they supplied. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 4:8
    marker-yv: yv-n
  - type: text
    text: 'For they refreshed my spirit and yours. Therefore '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 2:29
    marker-yv: yv-n
  - type: text
    text: acknowledge such men.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greetings and a Solemn Farewell
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The churches of Asia greet you. Aquila and Priscilla greet you heartily in the Lord, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:5
    marker-yv: yv-n
  - type: text
    text: 'with the church that is in their house. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: All the brethren greet you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:16
    marker-yv: yv-n
  - type: text
    text: Greet one another with a holy kiss.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:22; Gal. 6:11; Col. 4:18; 2 Thess. 3:17; Philem. 19
    marker-yv: yv-n
  - type: text
    text: The salutation with my own hand—Paul’s.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'If anyone '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 6:24
    marker-yv: yv-n
  - type: text
    text: 'does not love the Lord Jesus Christ, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gal. 1:8, 9
    marker-yv: yv-n
  - type: text
    text: 'let him be accursed. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jude 14, 15
    marker-yv: yv-n
  - type: text
    text: O Lord, come!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:20
    marker-yv: yv-n
  - type: text
    text: 'The grace of our Lord Jesus Christ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' with you. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'My love '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' with you all in Christ Jesus. Amen.'
