document_id: PRO.8,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Excellence of Wisdom
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Does not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 1:20, 21; 9:3; (1 Cor. 1:24)
      marker-yv: yv-n
    - type: text
      text: wisdom cry out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And understanding lift up her voice?
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Receive my instruction, and not silver,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And knowledge rather than choice gold;
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 28:15; Ps. 19:10; 119:127; Prov. 3:14, 15; 4:5, 7; 16:16
      marker-yv: yv-n
    - type: text
      text: 'For wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' better than rubies,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the things one may desire cannot be compared with her.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “I, wisdom, dwell with prudence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And find out knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discretion.'
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:7; 16:6
      marker-yv: yv-n
    - type: text
      text: 'The fear of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' to hate evil;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 2:3; (Prov. 16:17, 18; Is. 13:11)
      marker-yv: yv-n
    - type: text
      text: Pride and arrogance and the evil way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 4:24
      marker-yv: yv-n
    - type: text
      text: the perverse mouth I hate.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Counsel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' mine, and sound wisdom;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' understanding, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 7:19; 9:16
      marker-yv: yv-n
    - type: text
      text: I have strength.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 1:10; Prov. 29:4; Dan. 2:21; (Matt. 28:18); Rom. 13:1
      marker-yv: yv-n
    - type: text
      text: By me kings reign,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And rulers decree justice.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: By me princes rule, and nobles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the judges of the earth.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 2:30; (Ps. 91:14); Prov. 4:6; (John 14:21)
      marker-yv: yv-n
    - type: text
      text: I love those who love me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 2:4, 5; John 7:37; James 1:5
      marker-yv: yv-n
    - type: text
      text: those who seek me diligently will find me.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:16; (Matt. 6:33)
      marker-yv: yv-n
    - type: text
      text: 'Riches and honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' with me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Enduring riches and righteousness.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'My fruit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' better than gold, yes, than fine gold,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my revenue than choice silver.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: She takes her stand on the top of the high hill,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Beside the way, where the paths meet.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: I traverse the way of righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the midst of the paths of justice,
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: That I may cause those who love me to inherit wealth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I may fill their treasuries.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “The
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 28:26–28; Ps. 104:24; Prov. 3:19; (John 1:1)
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' possessed me at the beginning of His way,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Before His works of old.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 2:6)
      marker-yv: yv-n
    - type: text
      text: I have been established from everlasting,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From the beginning, before there was ever an earth.
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'When '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' no depths I was brought forth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' no fountains abounding with water.'
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 15:7, 8
      marker-yv: yv-n
    - type: text
      text: Before the mountains were settled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Before the hills, I was brought forth;
  '26':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: While as yet He had not made the earth or the fields,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or the primal dust of the world.
  '27':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'When He prepared the heavens, I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' there,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When He drew a circle on the face of the deep,
  '28':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: When He established the clouds above,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When He strengthened the fountains of the deep,
  '29':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:9, 10; Job 38:8–11; Ps. 33:7; 104:9; Jer. 5:22
      marker-yv: yv-n
    - type: text
      text: When He assigned to the sea its limit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So that the waters would not transgress His command,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 28:4, 6; Ps. 104:5
      marker-yv: yv-n
    - type: text
      text: He marked out the foundations of the earth,
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: She cries out by the gates, at the entry of the city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'At the entrance of the doors:'
  '30':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 1:1–3, 18)
      marker-yv: yv-n
    - type: text
      text: Then I was beside Him
    - type: usfm
      marker: it
      children:
      - type: text
        text: ' as'
    - type: text
      text: ' a master craftsman;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 3:17)
      marker-yv: yv-n
    - type: text
      text: 'And I was daily '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' delight,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rejoicing always before Him,
  '31':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Rejoicing in His inhabited world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 16:3; John 13:1
      marker-yv: yv-n
    - type: text
      text: 'my delight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' with the sons of men.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: “Now therefore, listen to me,
    - type: usfm
      marker: it
      children:
      - type: text
        text: ' my'
    - type: text
      text: ' children,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:1, 2; 128:1; Prov. 29:18; Luke 11:28
      marker-yv: yv-n
    - type: text
      text: 'blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: those
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' keep my ways.'
  '33':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Hear instruction and be wise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And do not disdain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
  '34':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:13, 18
      marker-yv: yv-n
    - type: text
      text: Blessed is the man who listens to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Watching daily at my gates,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Waiting at the posts of my doors.
  '35':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: For whoever finds me finds life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:4; 12:2; (John 17:3)
      marker-yv: yv-n
    - type: text
      text: 'obtains favor from the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  '36':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'But he who sins against me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 20:2
      marker-yv: yv-n
    - type: text
      text: wrongs his own soul;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All those who hate me love death.”
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “To you, O men, I call,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And my voice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' to the sons of men.'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: O you simple ones, understand prudence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And you fools, be of an understanding heart.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Listen, for I will speak of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 22:20
      marker-yv: yv-n
    - type: text
      text: excellent things,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And from the opening of my lips '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' right things;'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For my mouth will speak truth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' an abomination to my lips.'
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'All the words of my mouth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' with righteousness;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nothing crooked or perverse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in them.'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'They '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' all plain to him who understands,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And right to those who find knowledge.
