  children:
  - type: text
    text: The Light of Christ’s Gospel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Therefore, since we have this ministry, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 7:25
    marker-yv: yv-n
  - type: text
    text: 'as we have received mercy, we '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 18:1; 2 Cor. 4:16; Gal. 6:9; Eph. 3:13; 2 Thess. 3:13
    marker-yv: yv-n
  - type: text
    text: 'do not lose heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But we have renounced the hidden things of shame, not walking in craftiness nor handling the word of God deceitfully, but by manifestation of the truth '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 5:11
    marker-yv: yv-n
  - type: text
    text: 'commending ourselves to every man’s conscience in the sight of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But even if our gospel is veiled, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 1:18); 2 Cor. 2:15
    marker-yv: yv-n
  - type: text
    text: 'it is veiled to those who are perishing, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'whose minds '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 12:31; (Eph. 6:12)
    marker-yv: yv-n
  - type: text
    text: 'the god of this age '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 12:40
    marker-yv: yv-n
  - type: text
    text: 'has blinded, who do not believe, lest '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Cor. 3:8, 9)
    marker-yv: yv-n
  - type: text
    text: 'the light of the gospel of the glory of Christ, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 1:18); Phil. 2:6; Col. 1:15; Heb. 1:3
    marker-yv: yv-n
  - type: text
    text: 'who is the image of God, should shine on them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 1:13
    marker-yv: yv-n
  - type: text
    text: 'For we do not preach ourselves, but Christ Jesus the Lord, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 9:19
    marker-yv: yv-n
  - type: text
    text: 'ourselves your bondservants for Jesus’ sake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For it is the God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 1:3
    marker-yv: yv-n
  - type: text
    text: 'who commanded light to shine out of darkness, who has '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 9:2; Mal. 4:2; Luke 1:78; 2 Pet. 1:19
    marker-yv: yv-n
  - type: text
    text: 'shone in our hearts to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: give
  - type: text
    text: ' the light of the knowledge of the glory of God in the face of Jesus Christ.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cast Down but Unconquered
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
