verses:
  '1':
  - type: heading
    content: The Light of Christ’s Gospel
  - type: text
    content: 'Therefore, since we have this ministry, '
  - type: note
    content: 1 Cor. 7:25
  - type: text
    content: 'as we have received mercy, we '
  - type: note
    content: Luke 18:1; 2 Cor. 4:16; Gal. 6:9; Eph. 3:13; 2 Thess. 3:13
  - type: text
    content: 'do not lose heart. '
  '10':
  - type: note
    content: Phil. 3:10
  - type: text
    content: 'always carrying about in the body the dying of the Lord Jesus, '
  - type: note
    content: Rom. 8:17
  - type: text
    content: 'that the life of Jesus also may be manifested in our body. '
  '11':
  - type: text
    content: 'For we who live '
  - type: note
    content: Rom. 8:36
  - type: text
    content: 'are always delivered to death for Jesus’ sake, that the life of Jesus also may be manifested in our mortal flesh. '
  '12':
  - type: text
    content: So then death is working in us, but life in you.
  '13':
  - type: text
    content: 'And since we have '
  - type: note
    content: 2 Pet. 1:1
  - type: text
    content: 'the same spirit of faith, according to what is written, '
  - type: note
    content: Ps. 116:10
  - type: text
    content: '“I believed and therefore I spoke,” we also believe and therefore speak, '
  '14':
  - type: text
    content: 'knowing that '
  - type: note
    content: (Rom. 8:11)
  - type: text
    content: 'He who raised up the Lord Jesus will also raise us up with Jesus, and will present '
  - type: text
    content: us
  - type: text
    content: ' with you. '
  '15':
  - type: text
    content: 'For '
  - type: note
    content: Col. 1:24
  - type: text
    content: 'all things '
  - type: text
    content: are
  - type: text
    content: ' for your sakes, that '
  - type: note
    content: 1 Cor. 9:19; 2 Cor. 1:11
  - type: text
    content: grace, having spread through the many, may cause thanksgiving to abound to the glory of God.
  - type: heading
    content: Seeing the Invisible
  '16':
  - type: text
    content: 'Therefore we '
  - type: note
    content: 2 Cor. 4:1; Gal. 6:9
  - type: text
    content: 'do not lose heart. Even though our outward '
  - type: text
    content: man
  - type: text
    content: ' is perishing, yet the inward man is '
  - type: note
    content: (Is. 40:29, 31; Col. 3:10)
  - type: text
    content: 'being renewed day by day. '
  '17':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 5:12; Rom. 8:18; 1 Pet. 1:6
  - type: text
    content: 'our light affliction, which is but for a moment, is working for us a far more exceeding '
  - type: text
    content: and
  - type: text
    content: ' eternal weight of glory, '
  '18':
  - type: note
    content: Rom. 8:24; (2 Cor. 5:7; Heb. 11:1, 13)
  - type: text
    content: 'while we do not look at the things which are seen, but at the things which are not seen. For the things which are seen '
  - type: text
    content: are
  - type: text
    content: ' temporary, but the things which '
  - type: text
    content: are
  - type: text
    content: ' not seen are eternal.'
  '2':
  - type: text
    content: 'But we have renounced the hidden things of shame, not walking in craftiness nor handling the word of God deceitfully, but by manifestation of the truth '
  - type: note
    content: 2 Cor. 5:11
  - type: text
    content: 'commending ourselves to every man’s conscience in the sight of God. '
  '3':
  - type: text
    content: 'But even if our gospel is veiled, '
  - type: note
    content: (1 Cor. 1:18); 2 Cor. 2:15
  - type: text
    content: 'it is veiled to those who are perishing, '
  '4':
  - type: text
    content: 'whose minds '
  - type: note
    content: John 12:31; (Eph. 6:12)
  - type: text
    content: 'the god of this age '
  - type: note
    content: John 12:40
  - type: text
    content: 'has blinded, who do not believe, lest '
  - type: note
    content: (2 Cor. 3:8, 9)
  - type: text
    content: 'the light of the gospel of the glory of Christ, '
  - type: note
    content: (John 1:18); Phil. 2:6; Col. 1:15; Heb. 1:3
  - type: text
    content: 'who is the image of God, should shine on them. '
  '5':
  - type: note
    content: 1 Cor. 1:13
  - type: text
    content: 'For we do not preach ourselves, but Christ Jesus the Lord, and '
  - type: note
    content: 1 Cor. 9:19
  - type: text
    content: 'ourselves your bondservants for Jesus’ sake. '
  '6':
  - type: text
    content: 'For it is the God '
  - type: note
    content: Gen. 1:3
  - type: text
    content: 'who commanded light to shine out of darkness, who has '
  - type: note
    content: Is. 9:2; Mal. 4:2; Luke 1:78; 2 Pet. 1:19
  - type: text
    content: 'shone in our hearts to '
  - type: text
    content: give
  - type: text
    content: ' the light of the knowledge of the glory of God in the face of Jesus Christ.'
  - type: heading
    content: Cast Down but Unconquered
