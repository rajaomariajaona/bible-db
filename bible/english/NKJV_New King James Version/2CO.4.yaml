    marker: x
    children:
    - type: text
      text: 2 Cor. 1:8; 7:5
    marker-yv: yv-n
  - type: text
    text: 'hard-pressed on every side, yet not crushed; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: we
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' perplexed, but not in despair; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'persecuted, but not '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 129:2; (Heb. 13:5)
    marker-yv: yv-n
  - type: text
    text: 'forsaken; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 37:24
    marker-yv: yv-n
  - type: text
    text: 'struck down, but not destroyed— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 3:10
    marker-yv: yv-n
  - type: text
    text: 'always carrying about in the body the dying of the Lord Jesus, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 8:17
    marker-yv: yv-n
  - type: text
    text: 'that the life of Jesus also may be manifested in our body. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For we who live '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 8:36
    marker-yv: yv-n
  - type: text
    text: 'are always delivered to death for Jesus’ sake, that the life of Jesus also may be manifested in our mortal flesh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So then death is working in us, but life in you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And since we have '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Pet. 1:1
    marker-yv: yv-n
  - type: text
    text: 'the same spirit of faith, according to what is written, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 116:10
    marker-yv: yv-n
  - type: text
    text: '“I believed and therefore I spoke,” we also believe and therefore speak, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'knowing that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 8:11)
    marker-yv: yv-n
  - type: text
    text: 'He who raised up the Lord Jesus will also raise us up with Jesus, and will present '
  - type: usfm
    marker: it
    children:
    - type: text
      text: us
  - type: text
    text: ' with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 1:24
    marker-yv: yv-n
  - type: text
    text: 'all things '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' for your sakes, that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 9:19; 2 Cor. 1:11
    marker-yv: yv-n
  - type: text
    text: grace, having spread through the many, may cause thanksgiving to abound to the glory of God.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Seeing the Invisible
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Therefore we '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 4:1; Gal. 6:9
    marker-yv: yv-n
  - type: text
    text: 'do not lose heart. Even though our outward '
  - type: usfm
    marker: it
    children:
    - type: text
      text: man
  - type: text
    text: ' is perishing, yet the inward man is '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 40:29, 31; Col. 3:10)
    marker-yv: yv-n
  - type: text
    text: 'being renewed day by day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 5:12; Rom. 8:18; 1 Pet. 1:6
    marker-yv: yv-n
  - type: text
    text: 'our light affliction, which is but for a moment, is working for us a far more exceeding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' eternal weight of glory, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 8:24; (2 Cor. 5:7; Heb. 11:1, 13)
    marker-yv: yv-n
  - type: text
    text: 'while we do not look at the things which are seen, but at the things which are not seen. For the things which are seen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' temporary, but the things which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' not seen are eternal.'
