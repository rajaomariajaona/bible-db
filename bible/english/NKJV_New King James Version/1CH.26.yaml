document_id: 1CH.26,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Gatekeepers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Concerning the divisions of the gatekeepers: of the Korahites, Meshelemiah the son of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 42:title
      marker-yv: yv-n
    - type: text
      text: 'Kore, of the sons of Asaph. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 16:38
      marker-yv: yv-n
    - type: text
      text: 'Hosah, of the children of Merari, had sons: Shimri the first (for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: though
    - type: text
      text: ' he was not the firstborn, his father made him the first), '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hilkiah the second, Tebaliah the third, Zechariah the fourth; all the sons and brethren of Hosah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' thirteen.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Among these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the divisions of the gatekeepers, among the chief men, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: having
    - type: text
      text: ' duties just like their brethren, to serve in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 24:5, 31; 25:8
      marker-yv: yv-n
    - type: text
      text: 'cast lots for each gate, the small as well as the great, according to their father’s house. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The lot for the East '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gate
    - type: text
      text: ' fell to Shelemiah. Then they cast lots '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' his son Zechariah, a wise counselor, and his lot came out for the North Gate; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'to Obed-Edom the South Gate, and to his sons the storehouse. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'To Shuppim and Hosah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lot
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: came
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: out
    - type: text
      text: ' for the West Gate, with the Shallecheth Gate on the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 10:5; 2 Chr. 9:4
      marker-yv: yv-n
    - type: text
      text: 'ascending highway—watchman opposite watchman. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'On the east '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' six Levites, on the north four each day, on the south four each day, and for the storehouse two by two. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'As for the Parbar on the west, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' four on the highway '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' two at the Parbar. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: These were the divisions of the gatekeepers among the sons of Korah and among the sons of Merari.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Treasuries and Other Duties
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the sons of Meshelemiah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 9:21
      marker-yv: yv-n
    - type: text
      text: 'Zechariah the firstborn, Jediael the second, Zebadiah the third, Jathniel the fourth, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Of the Levites, Ahijah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 9:26
      marker-yv: yv-n
    - type: text
      text: 'over the treasuries of the house of God and over the treasuries of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:11; 1 Chr. 26:22, 24, 26; 28:12; Ezra 2:69
      marker-yv: yv-n
    - type: text
      text: 'dedicated things. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The sons of Laadan, the descendants of the Gershonites of Laadan, heads of their fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses,
    - type: text
      text: ' of Laadan the Gershonite: Jehieli. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The sons of Jehieli, Zetham and Joel his brother, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' over the treasuries of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 6:18; Num. 3:19
      marker-yv: yv-n
    - type: text
      text: 'Amramites, the Izharites, the Hebronites, and the Uzzielites: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 23:16
      marker-yv: yv-n
    - type: text
      text: 'Shebuel the son of Gershom, the son of Moses, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' overseer of the treasuries. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And his brethren by Eliezer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' Rehabiah his son, Jeshaiah his son, Joram his son, Zichri his son, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 23:18
      marker-yv: yv-n
    - type: text
      text: Shelomith his son.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'This Shelomith and his brethren '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' over all the treasuries of the dedicated things '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:11
      marker-yv: yv-n
    - type: text
      text: 'which King David and the heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses,
    - type: text
      text: ' the captains over thousands and hundreds, and the captains of the army, had dedicated. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Some of the spoils won in battles they dedicated to maintain the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And all that Samuel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 9:9
      marker-yv: yv-n
    - type: text
      text: 'the seer, Saul the son of Kish, Abner the son of Ner, and Joab the son of Zeruiah had dedicated, every dedicated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thing,
    - type: text
      text: ' was under the hand of Shelomith and his brethren.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Of the Izharites, Chenaniah and his sons '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 11:16
      marker-yv: yv-n
    - type: text
      text: 'performed duties as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 23:4
      marker-yv: yv-n
    - type: text
      text: officials and judges over Israel outside Jerusalem.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Elam the fifth, Jehohanan the sixth, Eliehoenai the seventh.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Of the Hebronites, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 27:17
      marker-yv: yv-n
    - type: text
      text: 'Hashabiah and his brethren, one thousand seven hundred able men, had the oversight of Israel on the west side of the Jordan for all the business of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and in the service of the king. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Among the Hebronites, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 23:19
      marker-yv: yv-n
    - type: text
      text: 'Jerijah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' head of the Hebronites according to his genealogy of the fathers. In the fortieth year of the reign of David they were sought, and there were found among them capable men '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 21:39
      marker-yv: yv-n
    - type: text
      text: 'at Jazer of Gilead. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And his brethren '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' two thousand seven hundred able men, heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses,
    - type: text
      text: ' whom King David made officials over the Reubenites, the Gadites, and the half-tribe of Manasseh, for every matter pertaining to God and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 19:11
      marker-yv: yv-n
    - type: text
      text: affairs of the king.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Moreover the sons of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 15:18, 21
      marker-yv: yv-n
    - type: text
      text: 'Obed-Edom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' Shemaiah the firstborn, Jehozabad the second, Joah the third, Sacar the fourth, Nethanel the fifth, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ammiel the sixth, Issachar the seventh, Peulthai the eighth; for God blessed him.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Also to Shemaiah his son were sons born who governed their fathers’ houses, because they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' men of great ability. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The sons of Shemaiah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' Othni, Rephael, Obed, and Elzabad, whose brothers Elihu and Semachiah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' able men.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'All these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' of the sons of Obed-Edom, they and their sons and their brethren, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 9:13
      marker-yv: yv-n
    - type: text
      text: 'able men with strength for the work: sixty-two of Obed-Edom.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: And Meshelemiah had sons and brethren, eighteen able men.
