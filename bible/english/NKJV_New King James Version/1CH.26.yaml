document_id: 1CH.26,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Gatekeepers
  - type: text
    content: 'Concerning the divisions of the gatekeepers: of the Korahites, Meshelemiah the son of '
  - type: note
    content: Ps. 42:title
  - type: text
    content: 'Kore, of the sons of Asaph. '
  '10':
  - type: text
    content: 'Also '
  - type: note
    content: 1 Chr. 16:38
  - type: text
    content: 'Hosah, of the children of Merari, had sons: Shimri the first (for '
  - type: text
    content: though
  - type: text
    content: ' he was not the firstborn, his father made him the first), '
  '11':
  - type: text
    content: 'Hilkiah the second, Tebaliah the third, Zechariah the fourth; all the sons and brethren of Hosah '
  - type: text
    content: were
  - type: text
    content: ' thirteen.'
  '12':
  - type: text
    content: 'Among these '
  - type: text
    content: were
  - type: text
    content: ' the divisions of the gatekeepers, among the chief men, '
  - type: text
    content: having
  - type: text
    content: ' duties just like their brethren, to serve in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'And they '
  - type: note
    content: 1 Chr. 24:5, 31; 25:8
  - type: text
    content: 'cast lots for each gate, the small as well as the great, according to their father’s house. '
  '14':
  - type: text
    content: 'The lot for the East '
  - type: text
    content: Gate
  - type: text
    content: ' fell to Shelemiah. Then they cast lots '
  - type: text
    content: for
  - type: text
    content: ' his son Zechariah, a wise counselor, and his lot came out for the North Gate; '
  '15':
  - type: text
    content: 'to Obed-Edom the South Gate, and to his sons the storehouse. '
  '16':
  - type: text
    content: 'To Shuppim and Hosah '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: lot
  - type: text
    content: ' '
  - type: text
    content: came
  - type: text
    content: ' '
  - type: text
    content: out
  - type: text
    content: ' for the West Gate, with the Shallecheth Gate on the '
  - type: note
    content: 1 Kin. 10:5; 2 Chr. 9:4
  - type: text
    content: 'ascending highway—watchman opposite watchman. '
  '17':
  - type: text
    content: 'On the east '
  - type: text
    content: were
  - type: text
    content: ' six Levites, on the north four each day, on the south four each day, and for the storehouse two by two. '
  '18':
  - type: text
    content: 'As for the Parbar on the west, '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' four on the highway '
  - type: text
    content: and
  - type: text
    content: ' two at the Parbar. '
  '19':
  - type: text
    content: These were the divisions of the gatekeepers among the sons of Korah and among the sons of Merari.
  - type: heading
    content: The Treasuries and Other Duties
  '2':
  - type: text
    content: 'And the sons of Meshelemiah '
  - type: text
    content: were
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 9:21
  - type: text
    content: 'Zechariah the firstborn, Jediael the second, Zebadiah the third, Jathniel the fourth, '
  '20':
  - type: text
    content: 'Of the Levites, Ahijah '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 9:26
  - type: text
    content: 'over the treasuries of the house of God and over the treasuries of the '
  - type: note
    content: 2 Sam. 8:11; 1 Chr. 26:22, 24, 26; 28:12; Ezra 2:69
  - type: text
    content: 'dedicated things. '
  '21':
  - type: text
    content: 'The sons of Laadan, the descendants of the Gershonites of Laadan, heads of their fathers’ '
  - type: text
    content: houses,
  - type: text
    content: ' of Laadan the Gershonite: Jehieli. '
  '22':
  - type: text
    content: 'The sons of Jehieli, Zetham and Joel his brother, '
  - type: text
    content: were
  - type: text
    content: ' over the treasuries of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Of the '
  - type: note
    content: Ex. 6:18; Num. 3:19
  - type: text
    content: 'Amramites, the Izharites, the Hebronites, and the Uzzielites: '
  '24':
  - type: note
    content: 1 Chr. 23:16
  - type: text
    content: 'Shebuel the son of Gershom, the son of Moses, '
  - type: text
    content: was
  - type: text
    content: ' overseer of the treasuries. '
  '25':
  - type: text
    content: 'And his brethren by Eliezer '
  - type: text
    content: were
  - type: text
    content: ' Rehabiah his son, Jeshaiah his son, Joram his son, Zichri his son, and '
  - type: note
    content: 1 Chr. 23:18
  - type: text
    content: Shelomith his son.
  '26':
  - type: text
    content: 'This Shelomith and his brethren '
  - type: text
    content: were
  - type: text
    content: ' over all the treasuries of the dedicated things '
  - type: note
    content: 2 Sam. 8:11
  - type: text
    content: 'which King David and the heads of fathers’ '
  - type: text
    content: houses,
  - type: text
    content: ' the captains over thousands and hundreds, and the captains of the army, had dedicated. '
  '27':
  - type: text
    content: 'Some of the spoils won in battles they dedicated to maintain the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'And all that Samuel '
  - type: note
    content: 1 Sam. 9:9
  - type: text
    content: 'the seer, Saul the son of Kish, Abner the son of Ner, and Joab the son of Zeruiah had dedicated, every dedicated '
  - type: text
    content: thing,
  - type: text
    content: ' was under the hand of Shelomith and his brethren.'
  '29':
  - type: text
    content: 'Of the Izharites, Chenaniah and his sons '
  - type: note
    content: Neh. 11:16
  - type: text
    content: 'performed duties as '
  - type: note
    content: 1 Chr. 23:4
  - type: text
    content: officials and judges over Israel outside Jerusalem.
  '3':
  - type: text
    content: Elam the fifth, Jehohanan the sixth, Eliehoenai the seventh.
  '30':
  - type: text
    content: 'Of the Hebronites, '
  - type: note
    content: 1 Chr. 27:17
  - type: text
    content: 'Hashabiah and his brethren, one thousand seven hundred able men, had the oversight of Israel on the west side of the Jordan for all the business of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and in the service of the king. '
  '31':
  - type: text
    content: 'Among the Hebronites, '
  - type: note
    content: 1 Chr. 23:19
  - type: text
    content: 'Jerijah '
  - type: text
    content: was
  - type: text
    content: ' head of the Hebronites according to his genealogy of the fathers. In the fortieth year of the reign of David they were sought, and there were found among them capable men '
  - type: note
    content: Josh. 21:39
  - type: text
    content: 'at Jazer of Gilead. '
  '32':
  - type: text
    content: 'And his brethren '
  - type: text
    content: were
  - type: text
    content: ' two thousand seven hundred able men, heads of fathers’ '
  - type: text
    content: houses,
  - type: text
    content: ' whom King David made officials over the Reubenites, the Gadites, and the half-tribe of Manasseh, for every matter pertaining to God and the '
  - type: note
    content: 2 Chr. 19:11
  - type: text
    content: affairs of the king.
  '4':
  - type: text
    content: 'Moreover the sons of '
  - type: note
    content: 1 Chr. 15:18, 21
  - type: text
    content: 'Obed-Edom '
  - type: text
    content: were
  - type: text
    content: ' Shemaiah the firstborn, Jehozabad the second, Joah the third, Sacar the fourth, Nethanel the fifth, '
  '5':
  - type: text
    content: Ammiel the sixth, Issachar the seventh, Peulthai the eighth; for God blessed him.
  '6':
  - type: text
    content: 'Also to Shemaiah his son were sons born who governed their fathers’ houses, because they '
  - type: text
    content: were
  - type: text
    content: ' men of great ability. '
  '7':
  - type: text
    content: 'The sons of Shemaiah '
  - type: text
    content: were
  - type: text
    content: ' Othni, Rephael, Obed, and Elzabad, whose brothers Elihu and Semachiah '
  - type: text
    content: were
  - type: text
    content: ' able men.'
  '8':
  - type: text
    content: 'All these '
  - type: text
    content: were
  - type: text
    content: ' of the sons of Obed-Edom, they and their sons and their brethren, '
  - type: note
    content: 1 Chr. 9:13
  - type: text
    content: 'able men with strength for the work: sixty-two of Obed-Edom.'
  '9':
  - type: text
    content: And Meshelemiah had sons and brethren, eighteen able men.
