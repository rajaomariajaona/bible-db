verses:
  '1':
  - type: heading
    content: The Message of the Man of God
  - type: text
    content: 'And behold, '
  - type: note
    content: 2 Kin. 23:17
  - type: text
    content: 'a man of God went from Judah to Bethel by the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 1 Kin. 12:32, 33
  - type: text
    content: 'and Jeroboam stood by the altar to burn incense. '
  '10':
  - type: text
    content: So he went another way and did not return by the way he came to Bethel.
  - type: heading
    content: Death of the Man of God
  '11':
  - type: text
    content: 'Now an '
  - type: note
    content: 1 Kin. 13:25
  - type: text
    content: 'old prophet dwelt in Bethel, and his sons came and told him all the works that the man of God had done that day in Bethel; they also told their father the words which he had spoken to the king. '
  '12':
  - type: text
    content: 'And their father said to them, “Which way did he go?” For his sons had seen which way the man of God went who came from Judah. '
  '13':
  - type: text
    content: 'Then he said to his sons, “Saddle the donkey for me.” So they saddled the donkey for him; and he rode on it, '
  '14':
  - type: text
    content: and went after the man of God, and found him sitting under an oak. Then he said to him, “
  - type: text
    content: Are
  - type: text
    content: ' you the man of God who came from Judah?”'
  - type: text
    content: 'And he said, “I '
  - type: text
    content: am.
  - type: text
    content: ”
  '15':
  - type: text
    content: Then he said to him, “Come home with me and eat bread.”
  '16':
  - type: text
    content: 'And he said, '
  - type: note
    content: 1 Kin. 13:8, 9
  - type: text
    content: '“I cannot return with you nor go in with you; neither can I eat bread nor drink water with you in this place. '
  '17':
  - type: text
    content: 'For I have been told '
  - type: note
    content: 1 Kin. 20:35; 1 Thess. 4:15
  - type: text
    content: 'by the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', ‘You shall not eat bread nor drink water there, nor return by going the way you came.’ ”'
  '18':
  - type: text
    content: 'He said to him, “I too '
  - type: text
    content: am
  - type: text
    content: ' a prophet as you '
  - type: text
    content: are,
  - type: text
    content: ' and an angel spoke to me by the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying, ‘Bring him back with you to your house, that he may eat bread and drink water.’ ” (He was lying to him.)'
  '19':
  - type: text
    content: So he went back with him, and ate bread in his house, and drank water.
  '2':
  - type: text
    content: 'Then he cried out against the altar by the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and said, “O altar, altar! Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘Behold, a child, '
  - type: note
    content: 2 Kin. 23:15, 16
  - type: text
    content: 'Josiah by name, shall be born to the house of David; and on you he shall sacrifice the priests of the high places who burn incense on you, and men’s bones shall be '
  - type: note
    content: (Lev. 26:30)
  - type: text
    content: 'burned on you.’ ” '
  '20':
  - type: text
    content: 'Now it happened, as they sat at the table, that the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to the prophet who had brought him back; '
  '21':
  - type: text
    content: 'and he cried out to the man of God who came from Judah, saying, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘Because you have disobeyed the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and have not kept the commandment which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God commanded you, '
  '22':
  - type: text
    content: 'but you came back, ate bread, and drank water in the '
  - type: note
    content: 1 Kin. 13:9
  - type: text
    content: 'place of which '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: heading
    content: Lord
  - type: text
    content: ' said to you, “Eat no bread and drink no water,” your corpse shall not come to the tomb of your fathers.’ ”'
  '23':
  - type: text
    content: 'So it was, after he had eaten bread and after he had drunk, that he saddled the donkey for him, the prophet whom he had brought back. '
  '24':
  - type: text
    content: 'When he was gone, '
  - type: note
    content: 1 Kin. 20:36
  - type: text
    content: 'a lion met him on the road and killed him. And his corpse was thrown on the road, and the donkey stood by it. The lion also stood by the corpse. '
  '25':
  - type: text
    content: 'And there, men passed by and saw the corpse thrown on the road, and the lion standing by the corpse. Then they went and told '
  - type: text
    content: it
  - type: text
    content: ' in the city where the old prophet dwelt.'
  '26':
  - type: text
    content: 'Now when the prophet who had brought him back from the way heard '
  - type: text
    content: it,
  - type: text
    content: ' he said, “It '
  - type: text
    content: is
  - type: text
    content: ' the man of God who was disobedient to the word of the '
  - type: heading
    content: Lord
  - type: text
    content: '. Therefore the '
  - type: heading
    content: Lord
  - type: text
    content: ' has delivered him to the lion, which has torn him and killed him, according to the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He spoke to him.” '
  '27':
  - type: text
    content: 'And he spoke to his sons, saying, “Saddle the donkey for me.” So they saddled '
  - type: text
    content: it.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Then he went and found his corpse thrown on the road, and the donkey and the lion standing by the corpse. The lion had not eaten the corpse nor torn the donkey. '
  '29':
  - type: text
    content: 'And the prophet took up the corpse of the man of God, laid it on the donkey, and brought it back. So the old prophet came to the city to mourn, and to bury him. '
  '3':
  - type: text
    content: 'And he gave '
  - type: note
    content: Ex. 4:1–5; Judg. 6:17; Is. 7:14; 38:7; John 2:18; 1 Cor. 1:22
  - type: text
    content: 'a sign the same day, saying, “This '
  - type: text
    content: is
  - type: text
    content: ' the sign which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has spoken: Surely the altar shall split apart, and the ashes on it shall be poured out.”'
  '30':
  - type: text
    content: 'Then he laid the corpse in his own tomb; and they mourned over him, '
  - type: text
    content: saying,
  - type: text
    content: ' '
  - type: note
    content: Jer. 22:18
  - type: text
    content: '“Alas, my brother!” '
  '31':
  - type: text
    content: 'So it was, after he had buried him, that he spoke to his sons, saying, “When I am dead, then bury me in the tomb where the man of God '
  - type: text
    content: is
  - type: text
    content: ' buried; '
  - type: note
    content: Ruth 1:17; 2 Kin. 23:17, 18
  - type: text
    content: 'lay my bones beside his bones. '
  '32':
  - type: note
    content: 1 Kin. 13:2; 2 Kin. 23:16, 19
  - type: text
    content: 'For the saying which he cried out by the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' against the altar in Bethel, and against all the shrines on the high places which '
  - type: text
    content: are
  - type: text
    content: ' in the cities of '
  - type: note
    content: 1 Kin. 16:24; John 4:5; Acts 8:14
  - type: text
    content: Samaria, will surely come to pass.”
  '33':
  - type: note
    content: 1 Kin. 12:31, 32; 2 Chr. 11:15; 13:9
  - type: text
    content: 'After this event Jeroboam did not turn from his evil way, but again he made priests from every class of people for the high places; whoever wished, he consecrated him, and he became '
  - type: text
    content: one
  - type: text
    content: ' of the priests of the high places. '
  '34':
  - type: note
    content: 1 Kin. 12:30; 2 Kin. 17:21
  - type: text
    content: 'And this thing was the sin of the house of Jeroboam, so as '
  - type: note
    content: (1 Kin. 14:10; 15:29, 30)
  - type: text
    content: 'to exterminate and destroy '
  - type: text
    content: it
  - type: text
    content: ' from the face of the earth.'
  '4':
  - type: text
    content: 'So it came to pass when King Jeroboam heard the saying of the man of God, who cried out against the altar in Bethel, that he stretched out his hand from the altar, saying, “Arrest him!” Then his hand, which he stretched out toward him, withered, so that he could not pull it back to himself. '
  '5':
  - type: text
    content: 'The altar also was split apart, and the ashes poured out from the altar, according to the sign which the man of God had given by the word of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Then the king answered and said to the man of God, “Please '
  - type: note
    content: Ex. 8:8; 9:28; 10:17; Num. 21:7; Jer. 37:3; Acts 8:24; (James 5:16)
  - type: text
    content: 'entreat the favor of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, and pray for me, that my hand may be restored to me.”'
  - type: text
    content: 'So the man of God entreated the '
  - type: heading
    content: Lord
  - type: text
    content: ', and the king’s hand was restored to him, and became as before. '
  '7':
  - type: text
    content: 'Then the king said to the man of God, “Come home with me and refresh yourself, and '
  - type: note
    content: 1 Sam. 9:7; 2 Kin. 5:15
  - type: text
    content: I will give you a reward.”
  '8':
  - type: text
    content: 'But the man of God said to the king, '
  - type: note
    content: Num. 22:18; 24:13; 1 Kin. 13:16, 17
  - type: text
    content: '“If you were to give me half your house, I would not go in with you; nor would I eat bread nor drink water in this place. '
  '9':
  - type: text
    content: 'For so it was commanded me by the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying, '
  - type: note
    content: (1 Cor. 5:11)
  - type: text
    content: '‘You shall not eat bread, nor drink water, nor return by the same way you came.’ ” '
