document_id: EXO.28,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Garments for the Priesthood
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now take '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 3:10; 18:7
      marker-yv: yv-n
    - type: text
      text: 'Aaron your brother, and his sons with him, from among the children of Israel, that he may minister to Me as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 99:6; Heb. 5:4
      marker-yv: yv-n
    - type: text
      text: 'priest, Aaron '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Aaron’s sons: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 24:1, 9; Lev. 10:1
      marker-yv: yv-n
    - type: text
      text: 'Nadab, Abihu, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 6:23; Lev. 10:6, 16
      marker-yv: yv-n
    - type: text
      text: 'Eleazar, and Ithamar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'six of their names on one stone and six names on the other stone, in order of their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 29:31—30:24; 35:16–18
      marker-yv: yv-n
    - type: text
      text: 'birth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With the work of an '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 35:35
      marker-yv: yv-n
    - type: text
      text: 'engraver in stone, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' the engravings of a signet, you shall engrave the two stones with the names of the sons of Israel. You shall set them in settings of gold. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall put the two stones on the shoulders of the ephod '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' memorial stones for the sons of Israel. So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:29, 30; 39:6, 7
      marker-yv: yv-n
    - type: text
      text: 'Aaron shall bear their names before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on his two shoulders '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 24:7; Num. 31:54; Josh. 4:7; Zech. 6:14; 1 Cor. 11:24
      marker-yv: yv-n
    - type: text
      text: 'as a memorial. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall also make settings of gold, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and you shall make two chains of pure gold like braided cords, and fasten the braided chains to the settings.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Breastplate
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 39:8–21
      marker-yv: yv-n
    - type: text
      text: '“You shall make the breastplate of judgment. Artistically woven according to the workmanship of the ephod you shall make it: of gold, blue, purple, and scarlet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thread,
    - type: text
      text: ' and fine woven linen, you shall make it. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It shall be doubled into a square: a span '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' its length, and a span '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' its width. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 39:10
      marker-yv: yv-n
    - type: text
      text: 'And you shall put settings of stones in it, four rows of stones: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: first
    - type: text
      text: ' row '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' a sardius, a topaz, and an emerald; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the first row; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the second row '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' a turquoise, a sapphire, and a diamond; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the third row, a jacinth, an agate, and an amethyst; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:5, 29; 31:10; 39:1–31; Lev. 8:7–9, 30
      marker-yv: yv-n
    - type: text
      text: 'you shall make holy garments for Aaron your brother, for glory and for beauty. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the fourth row, a beryl, an onyx, and a jasper. They shall be set in gold settings. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the stones shall have the names of the sons of Israel, twelve according to their names, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' the engravings of a signet, each one with its own name; they shall be according to the twelve tribes.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You shall make chains for the breastplate at the end, like braided cords of pure gold. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall make two rings of gold for the breastplate, and put the two rings on the two ends of the breastplate. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you shall put the two braided '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chains
    - type: text
      text: ' of gold in the two rings which are on the ends of the breastplate; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' two ends of the two braided '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chains
    - type: text
      text: ' you shall fasten to the two settings, and put them on the shoulder straps of the ephod in the front.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You shall make two rings of gold, and put them on the two ends of the breastplate, on the edge of it, which is on the inner side of the ephod. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And two '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' rings of gold you shall make, and put them on the two shoulder straps, underneath the ephod toward its front, right at the seam above the intricately woven band of the ephod. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They shall bind the breastplate by means of its rings to the rings of the ephod, using a blue cord, so that it is above the intricately woven band of the ephod, and so that the breastplate does not come loose from the ephod.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So Aaron shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:12
      marker-yv: yv-n
    - type: text
      text: 'bear the names of the sons of Israel on the breastplate of judgment over his heart, when he goes into the holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: place,
    - type: text
      text: ' as a memorial before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' continually. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 31:6; 36:1
      marker-yv: yv-n
    - type: text
      text: 'you shall speak to all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' gifted artisans, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 31:3; 35:30, 31; Is. 11:2; Eph. 1:17
      marker-yv: yv-n
    - type: text
      text: 'whom I have filled with the spirit of wisdom, that they may make Aaron’s garments, to consecrate him, that he may minister to Me as priest. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 8:8; Num. 27:21; Deut. 33:8; 1 Sam. 28:6; Ezra 2:63; Neh. 7:65
      marker-yv: yv-n
    - type: text
      text: 'you shall put in the breastplate of judgment the Urim and the Thummim, and they shall be over Aaron’s heart when he goes in before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. So Aaron shall bear the judgment of the children of Israel over his heart before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' continually.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Other Priestly Garments
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 39:22–26
      marker-yv: yv-n
    - type: text
      text: '“You shall make the robe of the ephod all of blue. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There shall be an opening for his head in the middle of it; it shall have a woven binding all around its opening, like the opening in a coat of mail, so that it does not tear. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And upon its hem you shall make pomegranates of blue, purple, and scarlet, all around its hem, and bells of gold between them all around: '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'a golden bell and a pomegranate, a golden bell and a pomegranate, upon the hem of the robe all around. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be upon Aaron when he ministers, and its sound will be heard when he goes into the holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: place
    - type: text
      text: ' before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and when he comes out, that he may not die.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 39:30, 31; Lev. 8:9; Zech. 14:20
      marker-yv: yv-n
    - type: text
      text: '“You shall also make a plate of pure gold and engrave on it, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' the engraving of a signet:'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: HOLINESS TO THE LORD.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall put it on a blue cord, that it may be on the turban; it shall be on the front of the turban. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it shall be on Aaron’s forehead, that Aaron may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:43; Lev. 10:17; 22:9, 16; Num. 18:1; (Is. 53:11); Ezek. 4:4–6; (John 1:29; Heb. 9:28; 1 Pet. 2:24)
      marker-yv: yv-n
    - type: text
      text: 'bear the iniquity of the holy things which the children of Israel hallow in all their holy gifts; and it shall always be on his forehead, that they may be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:4; 22:27; 23:11; Is. 56:7
      marker-yv: yv-n
    - type: text
      text: 'accepted before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 35:35; 39:27–29
      marker-yv: yv-n
    - type: text
      text: 'skillfully weave the tunic of fine linen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thread,
    - type: text
      text: ' you shall make the turban of fine linen, and you shall make the sash of woven work.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the garments which they shall make: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:15
      marker-yv: yv-n
    - type: text
      text: 'a breastplate, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:6
      marker-yv: yv-n
    - type: text
      text: 'an ephod, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:31
      marker-yv: yv-n
    - type: text
      text: 'a robe, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:39
      marker-yv: yv-n
    - type: text
      text: 'a skillfully woven tunic, a turban, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 8:7
      marker-yv: yv-n
    - type: text
      text: a sash. So they shall make holy garments for Aaron your brother and his sons, that he may minister to Me as priest.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ephod
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:4; 39:27–29, 41; Ezek. 44:17, 18
      marker-yv: yv-n
    - type: text
      text: '“For Aaron’s sons you shall make tunics, and you shall make sashes for them. And you shall make hats for them, for glory and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:2
      marker-yv: yv-n
    - type: text
      text: 'beauty. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So you shall put them on Aaron your brother and on his sons with him. You shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:7–9; 30:30; 40:15; Lev. 10:7
      marker-yv: yv-n
    - type: text
      text: 'anoint them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:9; Lev. 8; Heb. 7:28
      marker-yv: yv-n
    - type: text
      text: 'consecrate them, and sanctify them, that they may minister to Me as priests. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall make '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 39:28; Lev. 6:10; 16:4; Ezek. 44:18
      marker-yv: yv-n
    - type: text
      text: 'for them linen trousers to cover their nakedness; they shall reach from the waist to the thighs. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall be on Aaron and on his sons when they come into the tabernacle of meeting, or when they come near '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:26
      marker-yv: yv-n
    - type: text
      text: 'the altar to minister in the holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: place,
    - type: text
      text: ' that they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:1, 17; 20:19, 20; 22:9; Num. 9:13; 18:22
      marker-yv: yv-n
    - type: text
      text: 'do not incur iniquity and die. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 27:21; Lev. 17:7
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' a statute forever to him and his descendants after him.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“They shall take the gold, blue, purple, and scarlet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thread,
    - type: text
      text: ' and the fine linen, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 39:2–7; Lev. 8:7
      marker-yv: yv-n
    - type: text
      text: 'and they shall make the ephod of gold, blue, purple, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scarlet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thread,
    - type: text
      text: ' and fine woven linen, artistically worked. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It shall have two shoulder straps joined at its two edges, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so
    - type: text
      text: ' it shall be joined together. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the intricately woven band of the ephod, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' on it, shall be of the same workmanship, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: made
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' gold, blue, purple, and scarlet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thread,
    - type: text
      text: ' and fine woven linen.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then you shall take two onyx '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 35:27
      marker-yv: yv-n
    - type: text
      text: 'stones and engrave on them the names of the sons of Israel: '
