  - type: heading
    content: Property Boundaries
  '14':
  - type: note
    content: Deut. 27:17; Job 24:2; Prov. 22:28; Hos. 5:10
  - type: text
    content: '“You shall not remove your neighbor’s landmark, which the men of old have set, in your inheritance which you will inherit in the land that the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God is giving you to possess.'
  - type: heading
    content: The Law Concerning Witnesses
  '15':
  - type: note
    content: Num. 35:30; Deut. 17:6; Matt. 18:16; John 8:17; 2 Cor. 13:1; 1 Tim. 5:19; Heb. 10:28
  - type: text
    content: '“One witness shall not rise against a man concerning any iniquity or any sin that he commits; by the mouth of two or three witnesses the matter shall be established. '
  '16':
  - type: text
    content: 'If a false witness '
  - type: note
    content: Ex. 23:1; Ps. 27:12; 35:11
  - type: text
    content: 'rises against any man to testify against him of wrongdoing, '
  '17':
  - type: text
    content: 'then both men in the controversy shall stand before the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Deut. 17:8–11; 21:5
  - type: text
    content: 'before the priests and the judges who serve in those days. '
  '18':
  - type: text
    content: 'And the judges shall make careful inquiry, and indeed, '
  - type: text
    content: if
  - type: text
    content: ' the witness '
  - type: text
    content: is
  - type: text
    content: ' a false witness, who has testified falsely against his brother, '
  '19':
  - type: note
    content: Prov. 19:5; Dan. 6:24
  - type: text
    content: 'then you shall do to him as he thought to have done to his brother; so '
  - type: note
    content: Deut. 13:5; 17:7; 21:21; 22:21
  - type: text
    content: 'you shall put away the evil from among you. '
  '2':
  - type: note
    content: Ex. 21:13; Num. 35:10–15; Deut. 4:41; Josh. 20:2
  - type: text
    content: 'you shall separate three cities for yourself in the midst of your land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God is giving you to possess. '
  '20':
  - type: note
    content: Deut. 17:13; 21:21
  - type: text
    content: 'And those who remain shall hear and fear, and hereafter they shall not again commit such evil among you. '
  '21':
  - type: note
    content: Deut. 19:13
  - type: text
    content: 'Your eye shall not pity: '
  - type: note
    content: Ex. 21:23, 24; Lev. 24:20; Matt. 5:38, 39
  - type: text
    content: 'life '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' for life, eye for eye, tooth for tooth, hand for hand, foot for foot.'
  '3':
  - type: text
    content: 'You shall prepare roads for yourself, and divide into three parts the territory of your land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God is giving you to inherit, that any manslayer may flee there.'
  '4':
  - type: text
    content: '“And '
  - type: note
    content: Num. 35:9–34; Deut. 4:42
  - type: text
    content: 'this '
  - type: text
    content: is
  - type: text
    content: ' the case of the manslayer who flees there, that he may live: Whoever kills his neighbor unintentionally, not having hated him in time past— '
  '5':
  - type: text
    content: 'as when '
  - type: text
    content: a
  - type: text
    content: ' '
  - type: text
    content: man
  - type: text
    content: ' goes to the woods with his neighbor to cut timber, and his hand swings a stroke with the ax to cut down the tree, and the head slips from the handle and strikes his neighbor so that he dies—he shall flee to one of these cities and live; '
  '6':
  - type: note
    content: Num. 35:12
  - type: text
    content: 'lest the avenger of blood, while his anger is hot, pursue the manslayer and overtake him, because the way is long, and kill him, though he '
  - type: text
    content: was
  - type: text
    content: ' not deserving of death, since he had not hated the victim in time past. '
  '7':
  - type: text
    content: Therefore I command you, saying, ‘You shall separate three cities for yourself.’
  '8':
  - type: text
    content: '“Now if the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: Deut. 12:20
  - type: text
    content: 'enlarges your territory, as He swore to '
  - type: note
    content: Gen. 15:18–21
  - type: text
    content: 'your fathers, and gives you the land which He promised to give to your fathers, '
  '9':
  - type: text
    content: 'and if you keep all these commandments and do them, which I command you today, to love the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God and to walk always in His ways, '
  - type: note
    content: Josh. 20:7–9
  - type: text
    content: 'then you shall add three more cities for yourself besides these three, '
