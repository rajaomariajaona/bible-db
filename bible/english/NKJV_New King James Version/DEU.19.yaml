      children:
      - type: text
        text: '1'
    - type: text
      text: '“When the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:29
      marker-yv: yv-n
    - type: text
      text: 'has cut off the nations whose land the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you, and you dispossess them and dwell in their cities and in their houses, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:33; Deut. 21:1–9
      marker-yv: yv-n
    - type: text
      text: 'lest innocent blood be shed in the midst of your land which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' an inheritance, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thus
    - type: text
      text: ' guilt of bloodshed be upon you.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:16, 24; Deut. 27:24; (1 John 3:15)
      marker-yv: yv-n
    - type: text
      text: 'if anyone hates his neighbor, lies in wait for him, rises against him and strikes him mortally, so that he dies, and he flees to one of these cities, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'then the elders of his city shall send and bring him from there, and deliver him over to the hand of the avenger of blood, that he may die. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 13:8
      marker-yv: yv-n
    - type: text
      text: 'Your eye shall not pity him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:33, 34; 1 Kin. 2:31
      marker-yv: yv-n
    - type: text
      text: 'but you shall put away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: guilt
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' innocent blood from Israel, that it may go well with you.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Property Boundaries
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 27:17; Job 24:2; Prov. 22:28; Hos. 5:10
      marker-yv: yv-n
    - type: text
      text: '“You shall not remove your neighbor’s landmark, which the men of old have set, in your inheritance which you will inherit in the land that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you to possess.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Law Concerning Witnesses
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:30; Deut. 17:6; Matt. 18:16; John 8:17; 2 Cor. 13:1; 1 Tim. 5:19; Heb. 10:28
      marker-yv: yv-n
    - type: text
      text: '“One witness shall not rise against a man concerning any iniquity or any sin that he commits; by the mouth of two or three witnesses the matter shall be established. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'If a false witness '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:1; Ps. 27:12; 35:11
      marker-yv: yv-n
    - type: text
      text: 'rises against any man to testify against him of wrongdoing, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'then both men in the controversy shall stand before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 17:8–11; 21:5
      marker-yv: yv-n
    - type: text
      text: 'before the priests and the judges who serve in those days. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And the judges shall make careful inquiry, and indeed, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: if
    - type: text
      text: ' the witness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a false witness, who has testified falsely against his brother, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 19:5; Dan. 6:24
      marker-yv: yv-n
    - type: text
      text: 'then you shall do to him as he thought to have done to his brother; so '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 13:5; 17:7; 21:21; 22:21
      marker-yv: yv-n
    - type: text
      text: 'you shall put away the evil from among you. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 21:13; Num. 35:10–15; Deut. 4:41; Josh. 20:2
      marker-yv: yv-n
    - type: text
      text: 'you shall separate three cities for yourself in the midst of your land which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you to possess. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 17:13; 21:21
      marker-yv: yv-n
    - type: text
      text: 'And those who remain shall hear and fear, and hereafter they shall not again commit such evil among you. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 19:13
      marker-yv: yv-n
    - type: text
      text: 'Your eye shall not pity: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 21:23, 24; Lev. 24:20; Matt. 5:38, 39
      marker-yv: yv-n
    - type: text
      text: 'life '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' for life, eye for eye, tooth for tooth, hand for hand, foot for foot.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'You shall prepare roads for yourself, and divide into three parts the territory of your land which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you to inherit, that any manslayer may flee there.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:9–34; Deut. 4:42
      marker-yv: yv-n
    - type: text
      text: 'this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the case of the manslayer who flees there, that he may live: Whoever kills his neighbor unintentionally, not having hated him in time past— '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'as when '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' goes to the woods with his neighbor to cut timber, and his hand swings a stroke with the ax to cut down the tree, and the head slips from the handle and strikes his neighbor so that he dies—he shall flee to one of these cities and live; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:12
      marker-yv: yv-n
    - type: text
      text: 'lest the avenger of blood, while his anger is hot, pursue the manslayer and overtake him, because the way is long, and kill him, though he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' not deserving of death, since he had not hated the victim in time past. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Therefore I command you, saying, ‘You shall separate three cities for yourself.’
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“Now if the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:20
      marker-yv: yv-n
    - type: text
      text: 'enlarges your territory, as He swore to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:18–21
      marker-yv: yv-n
    - type: text
      text: 'your fathers, and gives you the land which He promised to give to your fathers, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and if you keep all these commandments and do them, which I command you today, to love the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and to walk always in His ways, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 20:7–9
      marker-yv: yv-n
    - type: text
      text: 'then you shall add three more cities for yourself besides these three, '
