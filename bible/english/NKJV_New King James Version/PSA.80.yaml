document_id: PSA.80,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prayer for Israel’s Restoration
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 45:title
      marker-yv: yv-n
    - type: text
      text: Set to “The Lilies.” A Testimony of Asaph. A Psalm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give ear, O Shepherd of Israel,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 25:20–22); 1 Sam. 4:4; 2 Sam. 6:2
      marker-yv: yv-n
    - type: text
      text: 'You who lead Joseph '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 77:20
      marker-yv: yv-n
    - type: text
      text: like a flock;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You who dwell '
    - type: usfm
      marker: it
      children:
      - type: text
        text: between
    - type: text
      text: ' the cherubim, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 33:2
      marker-yv: yv-n
    - type: text
      text: shine forth!
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The hills were covered with its shadow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the mighty cedars with its '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 23:40
      marker-yv: yv-n
    - type: text
      text: boughs.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She sent out her boughs to the Sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And her branches to the River.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Why have You '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 5:5; Nah. 2:2
      marker-yv: yv-n
    - type: text
      text: broken down her hedges,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So that all who pass by the way pluck her '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fruit?
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The boar out of the woods uproots it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the wild beast of the field devours it.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Return, we beseech You, O God of hosts;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 63:15
      marker-yv: yv-n
    - type: text
      text: Look down from heaven and see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And visit this vine
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the vineyard which Your right hand has planted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the branch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' You made strong '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 49:5)
      marker-yv: yv-n
    - type: text
      text: for Yourself.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' burned with fire, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' cut down;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 39:11)
      marker-yv: yv-n
    - type: text
      text: They perish at the rebuke of Your countenance.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 89:21
      marker-yv: yv-n
    - type: text
      text: Let Your hand be upon the man of Your right hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Upon the son of man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: whom
    - type: text
      text: ' You made strong for Yourself.'
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then we will not turn back from You;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Revive us, and we will call upon Your name.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Restore us, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of hosts;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Cause Your face to shine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And we shall be saved!
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Before '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 78:9, 67
      marker-yv: yv-n
    - type: text
      text: Ephraim, Benjamin, and Manasseh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Stir up Your strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And come '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' save us!'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lam. 5:21
      marker-yv: yv-n
    - type: text
      text: Restore us, O God;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 6:25; Ps. 4:6
      marker-yv: yv-n
    - type: text
      text: Cause Your face to shine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And we shall be saved!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of hosts,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 79:5
      marker-yv: yv-n
    - type: text
      text: How long will You be angry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Against the prayer of Your people?
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 42:3; Is. 30:20
      marker-yv: yv-n
    - type: text
      text: You have fed them with the bread of tears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And given them tears to drink in great measure.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have made us a strife to our neighbors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And our enemies laugh among themselves.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Restore us, O God of hosts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Cause Your face to shine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And we shall be saved!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have brought '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 5:1, 7); Jer. 2:21; Ezek. 15:6; 17:6; 19:10
      marker-yv: yv-n
    - type: text
      text: a vine out of Egypt;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 44:2; Acts 7:45
      marker-yv: yv-n
    - type: text
      text: You have cast out the nations, and planted it.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You prepared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: room
    - type: text
      text: ' for it,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And caused it to take deep root,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And it filled the land.
