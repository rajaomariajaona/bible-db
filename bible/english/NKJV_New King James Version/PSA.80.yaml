verses:
  '1':
  - type: heading
    content: Prayer for Israel’s Restoration
  - type: text
    content: 'To the Chief Musician. '
  - type: note
    content: Ps. 45:title
  - type: text
    content: Set to “The Lilies.” A Testimony of Asaph. A Psalm.
  - type: text
    content: Give ear, O Shepherd of Israel,
  - type: note
    content: (Ex. 25:20–22); 1 Sam. 4:4; 2 Sam. 6:2
  - type: text
    content: 'You who lead Joseph '
  - type: note
    content: Ps. 77:20
  - type: text
    content: like a flock;
  - type: text
    content: 'You who dwell '
  - type: text
    content: between
  - type: text
    content: ' the cherubim, '
  - type: note
    content: Deut. 33:2
  - type: text
    content: shine forth!
  '10':
  - type: text
    content: The hills were covered with its shadow,
  - type: text
    content: 'And the mighty cedars with its '
  - type: note
    content: Lev. 23:40
  - type: text
    content: boughs.
  '11':
  - type: text
    content: She sent out her boughs to the Sea,
  - type: text
    content: And her branches to the River.
  '12':
  - type: text
    content: 'Why have You '
  - type: note
    content: Is. 5:5; Nah. 2:2
  - type: text
    content: broken down her hedges,
  - type: text
    content: 'So that all who pass by the way pluck her '
  - type: text
    content: fruit?
  '13':
  - type: text
    content: The boar out of the woods uproots it,
  - type: text
    content: And the wild beast of the field devours it.
  '14':
  - type: text
    content: Return, we beseech You, O God of hosts;
  - type: note
    content: Is. 63:15
  - type: text
    content: Look down from heaven and see,
  - type: text
    content: And visit this vine
  '15':
  - type: text
    content: And the vineyard which Your right hand has planted,
  - type: text
    content: 'And the branch '
  - type: text
    content: that
  - type: text
    content: ' You made strong '
  - type: note
    content: (Is. 49:5)
  - type: text
    content: for Yourself.
  '16':
  - type: text
    content: It
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' burned with fire, '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' cut down;'
  - type: note
    content: (Ps. 39:11)
  - type: text
    content: They perish at the rebuke of Your countenance.
  '17':
  - type: note
    content: Ps. 89:21
  - type: text
    content: Let Your hand be upon the man of Your right hand,
  - type: text
    content: 'Upon the son of man '
  - type: text
    content: whom
  - type: text
    content: ' You made strong for Yourself.'
  '18':
  - type: text
    content: Then we will not turn back from You;
  - type: text
    content: Revive us, and we will call upon Your name.
  '19':
  - type: text
    content: 'Restore us, O '
  - type: heading
    content: Lord
  - type: text
    content: ' God of hosts;'
  - type: text
    content: Cause Your face to shine,
  - type: text
    content: And we shall be saved!
  '2':
  - type: text
    content: 'Before '
  - type: note
    content: Ps. 78:9, 67
  - type: text
    content: Ephraim, Benjamin, and Manasseh,
  - type: text
    content: Stir up Your strength,
  - type: text
    content: 'And come '
  - type: text
    content: and
  - type: text
    content: ' save us!'
  '3':
  - type: note
    content: Lam. 5:21
  - type: text
    content: Restore us, O God;
  - type: note
    content: Num. 6:25; Ps. 4:6
  - type: text
    content: Cause Your face to shine,
  - type: text
    content: And we shall be saved!
  '4':
  - type: text
    content: 'O '
  - type: heading
    content: Lord
  - type: text
    content: ' God of hosts,'
  - type: note
    content: Ps. 79:5
  - type: text
    content: How long will You be angry
  - type: text
    content: Against the prayer of Your people?
  '5':
  - type: note
    content: Ps. 42:3; Is. 30:20
  - type: text
    content: You have fed them with the bread of tears,
  - type: text
    content: And given them tears to drink in great measure.
  '6':
  - type: text
    content: You have made us a strife to our neighbors,
  - type: text
    content: And our enemies laugh among themselves.
  '7':
  - type: text
    content: Restore us, O God of hosts;
  - type: text
    content: Cause Your face to shine,
  - type: text
    content: And we shall be saved!
  '8':
  - type: text
    content: 'You have brought '
  - type: note
    content: (Is. 5:1, 7); Jer. 2:21; Ezek. 15:6; 17:6; 19:10
  - type: text
    content: a vine out of Egypt;
  - type: note
    content: Ps. 44:2; Acts 7:45
  - type: text
    content: You have cast out the nations, and planted it.
  '9':
  - type: text
    content: 'You prepared '
  - type: text
    content: room
  - type: text
    content: ' for it,'
  - type: text
    content: And caused it to take deep root,
  - type: text
    content: And it filled the land.
