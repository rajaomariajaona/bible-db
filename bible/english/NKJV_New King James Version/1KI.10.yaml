document_id: 1KI.10,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Queen of Sheba’s Praise of Solomon
  - type: text
    content: 'Now when the '
  - type: note
    content: 2 Chr. 9:1; Matt. 12:42; Luke 11:31
  - type: text
    content: 'queen of Sheba heard of the fame of Solomon concerning the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ', she came '
  - type: note
    content: Judg. 14:12; Ps. 49:4; Prov. 1:6
  - type: text
    content: 'to test him with hard questions. '
  '10':
  - type: text
    content: 'Then she '
  - type: note
    content: Ps. 72:10, 15
  - type: text
    content: 'gave the king one hundred and twenty talents of gold, spices in great quantity, and precious stones. There never again came such abundance of spices as the queen of Sheba gave to King Solomon. '
  '11':
  - type: note
    content: 1 Kin. 9:27, 28; Job 22:24
  - type: text
    content: 'Also, the ships of Hiram, which brought gold from Ophir, brought great quantities of almug wood and precious stones from Ophir. '
  '12':
  - type: note
    content: 2 Chr. 9:11
  - type: text
    content: 'And the king made steps of the almug wood for the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and for the king’s house, also harps and stringed instruments for singers. There never again came such '
  - type: note
    content: 2 Chr. 9:10
  - type: text
    content: almug wood, nor has the like been seen to this day.
  '13':
  - type: text
    content: Now King Solomon gave the queen of Sheba all she desired, whatever she asked, besides what Solomon had given her according to the royal generosity. So she turned and went to her own country, she and her servants.
  - type: heading
    content: Solomon’s Great Wealth
  '14':
  - type: text
    content: 'The weight of gold that came to Solomon yearly was six hundred and sixty-six talents of gold, '
  '15':
  - type: text
    content: 'besides '
  - type: text
    content: that
  - type: text
    content: ' from the '
  - type: note
    content: 2 Chr. 1:16
  - type: text
    content: 'traveling merchants, from the income of traders, '
  - type: note
    content: 2 Chr. 9:24; Ps. 72:10
  - type: text
    content: from all the kings of Arabia, and from the governors of the country.
  '16':
  - type: text
    content: 'And King Solomon made two hundred large shields '
  - type: text
    content: of
  - type: text
    content: ' hammered gold; six hundred '
  - type: text
    content: shekels
  - type: text
    content: ' of gold went into each shield. '
  '17':
  - type: text
    content: 'He also '
  - type: text
    content: made
  - type: text
    content: ' '
  - type: note
    content: 1 Kin. 14:26
  - type: text
    content: 'three hundred shields '
  - type: text
    content: of
  - type: text
    content: ' hammered gold; three minas of gold went into each shield. The king put them in the '
  - type: note
    content: 1 Kin. 7:2
  - type: text
    content: House of the Forest of Lebanon.
  '18':
  - type: note
    content: 1 Kin. 10:22; 2 Chr. 9:17; Ps. 45:8
  - type: text
    content: 'Moreover the king made a great throne of ivory, and overlaid it with pure gold. '
  '19':
  - type: text
    content: 'The throne had six steps, and the top of the throne '
  - type: text
    content: was
  - type: text
    content: ' round at the back; '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' armrests on either side of the place of the seat, and two lions stood beside the armrests. '
  '2':
  - type: text
    content: 'She came to Jerusalem with a very great retinue, with camels that bore spices, very much gold, and precious stones; and when she came to Solomon, she spoke with him about all that was in her heart. '
  '20':
  - type: text
    content: 'Twelve lions stood there, one on each side of the six steps; nothing like '
  - type: text
    content: this
  - type: text
    content: ' had been made for any '
  - type: text
    content: other
  - type: text
    content: ' kingdom.'
  '21':
  - type: note
    content: 2 Chr. 9:20
  - type: text
    content: 'All King Solomon’s drinking vessels '
  - type: text
    content: were
  - type: text
    content: ' gold, and all the vessels of the House of the Forest of Lebanon '
  - type: text
    content: were
  - type: text
    content: ' pure gold. Not '
  - type: text
    content: one
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' silver, for this was accounted as nothing in the days of Solomon. '
  '22':
  - type: text
    content: 'For the king had '
  - type: note
    content: Gen. 10:4; 2 Chr. 20:36
  - type: text
    content: 'merchant ships at sea with the fleet of Hiram. Once every three years the merchant '
  - type: note
    content: 1 Kin. 9:26–28; 22:48; Ps. 72:10
  - type: text
    content: 'ships came bringing gold, silver, ivory, apes, and monkeys. '
  '23':
  - type: text
    content: 'So '
  - type: note
    content: 1 Kin. 3:12, 13; 4:30; 2 Chr. 1:12
  - type: text
    content: King Solomon surpassed all the kings of the earth in riches and wisdom.
  '24':
  - type: text
    content: 'Now all the earth sought the presence of Solomon to hear his wisdom, which God had put in his heart. '
  '25':
  - type: text
    content: 'Each man brought his present: articles of silver and gold, garments, armor, spices, horses, and mules, at a set rate year by year.'
  '26':
  - type: note
    content: 1 Kin. 4:26; 2 Chr. 1:14; 9:25
  - type: text
    content: 'And Solomon '
  - type: note
    content: (Deut. 17:16); 1 Kin. 9:19
  - type: text
    content: 'gathered chariots and horsemen; he had one thousand four hundred chariots and twelve thousand horsemen, whom he stationed in the chariot cities and with the king at Jerusalem. '
  '27':
  - type: note
    content: (Deut. 17:17); 2 Chr. 1:15–17
  - type: text
    content: 'The king made silver '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: common
  - type: text
    content: ' in Jerusalem as stones, and he made cedar trees as abundant as the sycamores which '
  - type: text
    content: are
  - type: text
    content: ' in the lowland.'
  '28':
  - type: note
    content: (Deut. 17:16); 2 Chr. 1:16; 9:28
  - type: text
    content: 'Also Solomon had horses imported from Egypt and Keveh; the king’s merchants bought them in Keveh at the '
  - type: text
    content: current
  - type: text
    content: ' price. '
  '29':
  - type: text
    content: 'Now a chariot that was imported from Egypt cost six hundred '
  - type: text
    content: shekels
  - type: text
    content: ' of silver, and a horse one hundred and fifty; '
  - type: note
    content: Josh. 1:4; 2 Kin. 7:6, 7
  - type: text
    content: 'and thus, through their agents, they exported '
  - type: text
    content: them
  - type: text
    content: ' to all the kings of the Hittites and the kings of Syria.'
  '3':
  - type: text
    content: 'So Solomon answered all her questions; there was nothing so difficult for the king that he could not explain '
  - type: text
    content: it
  - type: text
    content: ' to her. '
  '4':
  - type: text
    content: 'And when the queen of Sheba had seen all the wisdom of Solomon, the house that he had built, '
  '5':
  - type: text
    content: 'the food on his table, the seating of his servants, the service of his waiters and their apparel, his cupbearers, '
  - type: note
    content: 1 Chr. 26:16; 2 Chr. 9:4
  - type: text
    content: 'and his entryway by which he went up to the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', there was no more spirit in her. '
  '6':
  - type: text
    content: 'Then she said to the king: “It was a true report which I heard in my own land about your words and your wisdom. '
  '7':
  - type: text
    content: 'However I did not believe the words until I came and saw with my own eyes; and indeed the half was not told me. Your wisdom and prosperity exceed the fame of which I heard. '
  '8':
  - type: note
    content: Prov. 8:34
  - type: text
    content: 'Happy '
  - type: text
    content: are
  - type: text
    content: ' your men and happy '
  - type: text
    content: are
  - type: text
    content: ' these your servants, who stand continually before you '
  - type: text
    content: and
  - type: text
    content: ' hear your wisdom! '
  '9':
  - type: note
    content: 1 Kin. 5:7
  - type: text
    content: 'Blessed be the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, who '
  - type: note
    content: 2 Sam. 22:20
  - type: text
    content: 'delighted in you, setting you on the throne of Israel! Because the '
  - type: heading
    content: Lord
  - type: text
    content: ' has loved Israel forever, therefore He made you king, '
  - type: note
    content: 2 Sam. 8:15; Ps. 72:2; (Prov. 8:15)
  - type: text
    content: to do justice and righteousness.”
