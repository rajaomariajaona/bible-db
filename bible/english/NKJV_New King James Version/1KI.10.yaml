document_id: 1KI.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Queen of Sheba’s Praise of Solomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now when the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 9:1; Matt. 12:42; Luke 11:31
    marker-yv: yv-n
  - type: text
    text: 'queen of Sheba heard of the fame of Solomon concerning the name of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', she came '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 14:12; Ps. 49:4; Prov. 1:6
    marker-yv: yv-n
  - type: text
    text: 'to test him with hard questions. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'She came to Jerusalem with a very great retinue, with camels that bore spices, very much gold, and precious stones; and when she came to Solomon, she spoke with him about all that was in her heart. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Solomon answered all her questions; there was nothing so difficult for the king that he could not explain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' to her. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when the queen of Sheba had seen all the wisdom of Solomon, the house that he had built, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'the food on his table, the seating of his servants, the service of his waiters and their apparel, his cupbearers, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 26:16; 2 Chr. 9:4
    marker-yv: yv-n
  - type: text
    text: 'and his entryway by which he went up to the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', there was no more spirit in her. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then she said to the king: “It was a true report which I heard in my own land about your words and your wisdom. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'However I did not believe the words until I came and saw with my own eyes; and indeed the half was not told me. Your wisdom and prosperity exceed the fame of which I heard. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 8:34
    marker-yv: yv-n
  - type: text
    text: 'Happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' your men and happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' these your servants, who stand continually before you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hear your wisdom! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:7
    marker-yv: yv-n
  - type: text
    text: 'Blessed be the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 22:20
    marker-yv: yv-n
  - type: text
    text: 'delighted in you, setting you on the throne of Israel! Because the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has loved Israel forever, therefore He made you king, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 8:15; Ps. 72:2; (Prov. 8:15)
    marker-yv: yv-n
  - type: text
    text: to do justice and righteousness.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then she '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 72:10, 15
    marker-yv: yv-n
  - type: text
    text: 'gave the king one hundred and twenty talents of gold, spices in great quantity, and precious stones. There never again came such abundance of spices as the queen of Sheba gave to King Solomon. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 9:27, 28; Job 22:24
    marker-yv: yv-n
  - type: text
    text: 'Also, the ships of Hiram, which brought gold from Ophir, brought great quantities of almug wood and precious stones from Ophir. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 9:11
    marker-yv: yv-n
  - type: text
    text: 'And the king made steps of the almug wood for the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and for the king’s house, also harps and stringed instruments for singers. There never again came such '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 9:10
    marker-yv: yv-n
  - type: text
    text: almug wood, nor has the like been seen to this day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Now King Solomon gave the queen of Sheba all she desired, whatever she asked, besides what Solomon had given her according to the royal generosity. So she turned and went to her own country, she and her servants.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Great Wealth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The weight of gold that came to Solomon yearly was six hundred and sixty-six talents of gold, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'besides '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' from the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 1:16
    marker-yv: yv-n
  - type: text
    text: 'traveling merchants, from the income of traders, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 9:24; Ps. 72:10
    marker-yv: yv-n
  - type: text
    text: from all the kings of Arabia, and from the governors of the country.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And King Solomon made two hundred large shields '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' hammered gold; six hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shekels
  - type: text
    text: ' of gold went into each shield. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: made
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 14:26
    marker-yv: yv-n
  - type: text
    text: 'three hundred shields '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' hammered gold; three minas of gold went into each shield. The king put them in the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 7:2
    marker-yv: yv-n
  - type: text
    text: House of the Forest of Lebanon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 10:22; 2 Chr. 9:17; Ps. 45:8
    marker-yv: yv-n
  - type: text
    text: 'Moreover the king made a great throne of ivory, and overlaid it with pure gold. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The throne had six steps, and the top of the throne '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' round at the back; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' armrests on either side of the place of the seat, and two lions stood beside the armrests. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Twelve lions stood there, one on each side of the six steps; nothing like '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' had been made for any '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 9:20
    marker-yv: yv-n
  - type: text
    text: 'All King Solomon’s drinking vessels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' gold, and all the vessels of the House of the Forest of Lebanon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' pure gold. Not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' silver, for this was accounted as nothing in the days of Solomon. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For the king had '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 10:4; 2 Chr. 20:36
    marker-yv: yv-n
  - type: text
    text: 'merchant ships at sea with the fleet of Hiram. Once every three years the merchant '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 9:26–28; 22:48; Ps. 72:10
    marker-yv: yv-n
  - type: text
    text: 'ships came bringing gold, silver, ivory, apes, and monkeys. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 3:12, 13; 4:30; 2 Chr. 1:12
    marker-yv: yv-n
  - type: text
    text: King Solomon surpassed all the kings of the earth in riches and wisdom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Now all the earth sought the presence of Solomon to hear his wisdom, which God had put in his heart. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Each man brought his present: articles of silver and gold, garments, armor, spices, horses, and mules, at a set rate year by year.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 4:26; 2 Chr. 1:14; 9:25
    marker-yv: yv-n
  - type: text
    text: 'And Solomon '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 17:16); 1 Kin. 9:19
    marker-yv: yv-n
  - type: text
    text: 'gathered chariots and horsemen; he had one thousand four hundred chariots and twelve thousand horsemen, whom he stationed in the chariot cities and with the king at Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 17:17); 2 Chr. 1:15–17
    marker-yv: yv-n
  - type: text
    text: 'The king made silver '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: common
  - type: text
    text: ' in Jerusalem as stones, and he made cedar trees as abundant as the sycamores which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' in the lowland.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 17:16); 2 Chr. 1:16; 9:28
    marker-yv: yv-n
  - type: text
    text: 'Also Solomon had horses imported from Egypt and Keveh; the king’s merchants bought them in Keveh at the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: current
  - type: text
    text: ' price. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now a chariot that was imported from Egypt cost six hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shekels
  - type: text
    text: ' of silver, and a horse one hundred and fifty; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 1:4; 2 Kin. 7:6, 7
    marker-yv: yv-n
  - type: text
    text: 'and thus, through their agents, they exported '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' to all the kings of the Hittites and the kings of Syria.'
