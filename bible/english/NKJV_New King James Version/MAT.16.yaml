document_id: MAT.16,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Pharisees and Sadducees Seek a Sign
  - type: text
    content: 'Then the '
  - type: note
    content: Matt. 12:38; Mark 8:11; Luke 11:16; 12:54–56; 1 Cor. 1:22
  - type: text
    content: 'Pharisees and Sadducees came, and testing Him asked that He would show them a sign from heaven. '
  '10':
  - type: note
    content: Matt. 15:32–38; Mark 8:1–9
  - type: text
    content: Nor the seven loaves of the four thousand and how many large baskets you took up?
  - type: text
    content: ' '
  '11':
  - type: text
    content: How is it you do not understand that I did not speak to you concerning bread?—
  - type: text
    content: but
  - type: text
    content: ' to beware of the '
  - type: text
    content: leaven of the Pharisees and Sadducees.”
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Then they understood that He did not tell '
  - type: text
    content: them
  - type: text
    content: ' to beware of the leaven of bread, but of the doctrine of the Pharisees and Sadducees.'
  - type: heading
    content: Peter Confesses Jesus as the Christ
  '13':
  - type: text
    content: 'When Jesus came into the region of Caesarea Philippi, He asked His disciples, saying, '
  - type: note
    content: Mark 8:27; Luke 9:18
  - type: text
    content: “Who do men say that I, the Son of Man, am?”
  '14':
  - type: text
    content: 'So they said, '
  - type: note
    content: Matt. 14:2; Luke 9:7–9
  - type: text
    content: '“Some '
  - type: text
    content: say
  - type: text
    content: ' John the Baptist, some Elijah, and others Jeremiah or '
  - type: note
    content: Matt. 21:11
  - type: text
    content: one of the prophets.”
  '15':
  - type: text
    content: 'He said to them, '
  - type: text
    content: '“But who do '
  - type: note
    content: John 6:67
  - type: text
    content: you say that I am?”
  '16':
  - type: text
    content: 'Simon Peter answered and said, '
  - type: note
    content: Matt. 14:33; Mark 8:29; Luke 9:20; John 6:69; 11:27; Acts 8:37; 9:20; Heb. 1:2, 5; 1 John 4:15
  - type: text
    content: “You are the Christ, the Son of the living God.”
  '17':
  - type: text
    content: 'Jesus answered and said to him, '
  - type: text
    content: '“Blessed are you, Simon Bar-Jonah, '
  - type: note
    content: (Eph. 2:8)
  - type: text
    content: 'for flesh and blood has not revealed '
  - type: text
    content: this
  - type: text
    content: ' to you, but '
  - type: note
    content: (Matt. 11:27; 1 Cor. 2:10); Gal. 1:16
  - type: text
    content: My Father who is in heaven.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And I also say to you that '
  - type: note
    content: John 1:42
  - type: text
    content: 'you are Peter, and '
  - type: note
    content: Acts 2:41; (Eph. 2:20; Rev. 21:14)
  - type: text
    content: 'on this rock I will build My church, and '
  - type: note
    content: Job 33:17; Ps. 9:13; 107:18; Is. 38:10
  - type: text
    content: 'the gates of Hades shall not '
  - type: text
    content: prevail against it.
  - type: text
    content: ' '
  '19':
  - type: note
    content: Matt. 18:18; John 20:23
  - type: text
    content: 'And I will give you the keys of the kingdom of heaven, and whatever you bind on earth '
  - type: text
    content: will be bound in heaven, and whatever you loose on earth will be loosed
  - type: text
    content: ' in heaven.”'
  '2':
  - type: text
    content: 'He answered and said to them, '
  - type: text
    content: “When it is evening you say, ‘
  - type: text
    content: It will be
  - type: text
    content: ' fair weather, for the sky is red’;'
  - type: text
    content: ' '
  '20':
  - type: note
    content: Matt. 17:9; Mark 8:30; Luke 9:21
  - type: text
    content: Then He commanded His disciples that they should tell no one that He was Jesus the Christ.
  - type: heading
    content: Jesus Predicts His Death and Resurrection
  '21':
  - type: text
    content: 'From that time Jesus began '
  - type: note
    content: Matt. 20:17; Mark 8:31; 9:31; Luke 9:22; 18:31; 24:46; John 2:19
  - type: text
    content: to show to His disciples that He must go to Jerusalem, and suffer many things from the elders and chief priests and scribes, and be killed, and be raised the third day.
  '22':
  - type: text
    content: Then Peter took Him aside and began to rebuke Him, saying, “Far be it from You, Lord; this shall not happen to You!”
  '23':
  - type: text
    content: 'But He turned and said to Peter, '
  - type: text
    content: '“Get behind Me, '
  - type: note
    content: Matt. 4:10
  - type: text
    content: 'Satan! '
  - type: note
    content: (Rom. 8:7)
  - type: text
    content: 'You are '
  - type: text
    content: an offense to Me, for you are not mindful of the things of God, but the things of men.”
  - type: heading
    content: Take Up the Cross and Follow Him
  '24':
  - type: note
    content: Mark 8:34; Luke 9:23; (Acts 14:22; 2 Cor. 4:10, 11; 1 Thess. 3:3; 2 Tim. 3:12)
  - type: text
    content: 'Then Jesus said to His disciples, '
  - type: text
    content: '“If anyone desires to come after Me, let him deny himself, and take up his cross, and '
  - type: note
    content: (1 Pet. 2:21)
  - type: text
    content: follow Me.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'For '
  - type: note
    content: Luke 17:33; John 12:25
  - type: text
    content: whoever desires to save his life will lose it, but whoever loses his life for My sake will find it.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'For what '
  - type: note
    content: Luke 12:20, 21
  - type: text
    content: 'profit is it to a man if he gains the whole world, and loses his own soul? Or '
  - type: note
    content: Ps. 49:7, 8
  - type: text
    content: what will a man give in exchange for his soul?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 26:64; Mark 8:38; Luke 9:26
  - type: text
    content: 'the Son of Man will come in the glory of His Father '
  - type: note
    content: (Dan. 7:10); Zech. 14:5
  - type: text
    content: 'with His angels, '
  - type: note
    content: Job 34:11; Ps. 62:12; Prov. 24:12; Rom. 2:6; 2 Cor. 5:10; 1 Pet. 1:17; Rev. 2:23
  - type: text
    content: and then He will reward each according to his works.
  - type: text
    content: ' '
  '28':
  - type: text
    content: '“Assuredly, I say to you, '
  - type: note
    content: Mark 9:1; Luke 9:27; Acts 7:55, 56; Rev. 19:11
  - type: text
    content: there are some standing here who shall not taste death till they see the Son of Man coming in His kingdom.”
  '3':
  - type: text
    content: and in the morning, ‘
  - type: text
    content: It will be
  - type: text
    content: ' foul weather today, for the sky is red and threatening.’ '
  - type: text
    content: Hypocrites!
  - type: text
    content: ' You know how to discern the face of the sky, but you cannot '
  - type: text
    content: discern
  - type: text
    content: ' the signs of the times.'
  - type: text
    content: ' '
  '4':
  - type: note
    content: Prov. 30:12; Matt. 12:39; Luke 11:29; 24:46
  - type: text
    content: 'A wicked and adulterous generation seeks after a sign, and no sign shall be given to it except the sign of '
  - type: text
    content: the prophet
  - type: text
    content: ' Jonah.”'
  - type: text
    content: ' And He left them and departed.'
  - type: heading
    content: The Leaven of the Pharisees and Sadducees
  '5':
  - type: text
    content: 'Now '
  - type: note
    content: Mark 8:14
  - type: text
    content: 'when His disciples had come to the other side, they had forgotten to take bread. '
  '6':
  - type: text
    content: 'Then Jesus said to them, '
  - type: note
    content: Mark 8:15; Luke 12:1
  - type: text
    content: '“Take heed and beware of the '
  - type: text
    content: leaven of the Pharisees and the Sadducees.”
  '7':
  - type: text
    content: And they reasoned among themselves, saying, “
  - type: text
    content: It
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' because we have taken no bread.”'
  '8':
  - type: text
    content: 'But Jesus, being aware of '
  - type: text
    content: it,
  - type: text
    content: ' said to them, '
  - type: text
    content: '“O you of little faith, why do you reason among yourselves because you '
  - type: text
    content: have brought no bread?
  - type: text
    content: ' '
  '9':
  - type: note
    content: Matt. 14:15–21; Mark 6:30–44; Luke 9:10–17; John 6:1–14
  - type: text
    content: Do you not yet understand, or remember the five loaves of the five thousand and how many baskets you took up?
  - type: text
    content: ' '
