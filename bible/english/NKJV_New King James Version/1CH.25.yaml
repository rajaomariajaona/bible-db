  '2':
  - type: text
    content: 'Of the sons of Asaph: Zaccur, Joseph, Nethaniah, and Asharelah; the sons of Asaph '
  - type: text
    content: were
  - type: text
    content: ' under the direction of Asaph, who prophesied according to the order of the king. '
