segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Musicians
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moreover David and the captains of the army separated for the service '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' of the sons of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 6:30, 33, 39, 44; 2 Chr. 5:12
    marker-yv: yv-n
  - type: text
    text: 'Asaph, of Heman, and of Jeduthun, who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: should
  - type: text
    text: ' prophesy with harps, stringed instruments, and cymbals. And the number of the skilled men performing their service was: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Of the sons of Asaph: Zaccur, Joseph, Nethaniah, and Asharelah; the sons of Asaph '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' under the direction of Asaph, who prophesied according to the order of the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 16:41, 42
    marker-yv: yv-n
  - type: text
    text: 'Jeduthun, the sons of Jeduthun: Gedaliah, Zeri, Jeshaiah, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Shimei
  - type: text
    text: ', Hashabiah, and Mattithiah, six, under the direction of their father Jeduthun, who prophesied with a harp to give thanks and to praise the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Of Heman, the sons of Heman: Bukkiah, Mattaniah, Uzziel, Shebuel, Jerimoth, Hananiah, Hanani, Eliathah, Giddalti, Romamti-Ezer, Joshbekashah, Mallothi, Hothir, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Mahazioth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'All these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Heman the king’s seer in the words of God, to exalt his '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 16:42
    marker-yv: yv-n
  - type: text
    text: horn. For God gave Heman fourteen sons and three daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'All these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' under the direction of their father for the music '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', with cymbals, stringed instruments, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 15:16
    marker-yv: yv-n
  - type: text
    text: 'harps, for the service of the house of God. Asaph, Jeduthun, and Heman '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 15:19; 25:2
    marker-yv: yv-n
  - type: text
    text: 'under the authority of the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 23:5
    marker-yv: yv-n
  - type: text
    text: 'number of them, with their brethren who were instructed in the songs of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', all who were skillful, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' two hundred and eighty-eight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And they cast lots for their duty, the small as well as the great, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 23:13
    marker-yv: yv-n
  - type: text
    text: the teacher with the student.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now the first lot for Asaph came out for Joseph; the second for Gedaliah, him with his brethren and sons, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'the third for Zaccur, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'the fourth for Jizri, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'the fifth for Nethaniah, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'the sixth for Bukkiah, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'the seventh for Jesharelah, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'the eighth for Jeshaiah, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'the ninth for Mattaniah, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'the tenth for Shimei, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'the eleventh for Azarel, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'the twelfth for Hashabiah, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'the thirteenth for Shubael, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'the fourteenth for Mattithiah, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'the fifteenth for Jeremoth, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'the sixteenth for Hananiah, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'the seventeenth for Joshbekashah, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'the eighteenth for Hanani, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'the nineteenth for Mallothi, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'the twentieth for Eliathah, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'the twenty-first for Hothir, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'the twenty-second for Giddalti, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'the twenty-third for Mahazioth, his sons and his brethren, twelve; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: the twenty-fourth for Romamti-Ezer, his sons and his brethren, twelve.
