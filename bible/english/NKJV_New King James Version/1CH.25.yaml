  '3':
  - type: text
    content: 'Of '
  - type: note
    content: 1 Chr. 16:41, 42
  - type: text
    content: 'Jeduthun, the sons of Jeduthun: Gedaliah, Zeri, Jeshaiah, '
  - type: text
    content: Shimei
  - type: text
    content: ', Hashabiah, and Mattithiah, six, under the direction of their father Jeduthun, who prophesied with a harp to give thanks and to praise the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'the twenty-third for Mahazioth, his sons and his brethren, twelve; '
  '31':
  - type: text
    content: the twenty-fourth for Romamti-Ezer, his sons and his brethren, twelve.
  '4':
  - type: text
    content: 'Of Heman, the sons of Heman: Bukkiah, Mattaniah, Uzziel, Shebuel, Jerimoth, Hananiah, Hanani, Eliathah, Giddalti, Romamti-Ezer, Joshbekashah, Mallothi, Hothir, '
  - type: text
    content: and
  - type: text
    content: ' Mahazioth. '
  '5':
  - type: text
    content: 'All these '
  - type: text
    content: were
  - type: text
    content: ' the sons of Heman the king’s seer in the words of God, to exalt his '
  - type: note
    content: 1 Chr. 16:42
  - type: text
    content: horn. For God gave Heman fourteen sons and three daughters.
  '6':
  - type: text
    content: 'All these '
  - type: text
    content: were
  - type: text
    content: ' under the direction of their father for the music '
  - type: text
    content: in
  - type: text
    content: ' the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', with cymbals, stringed instruments, and '
  - type: note
    content: 1 Chr. 15:16
  - type: text
    content: 'harps, for the service of the house of God. Asaph, Jeduthun, and Heman '
  - type: text
    content: were
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 15:19; 25:2
  - type: text
    content: 'under the authority of the king. '
  '7':
  - type: text
    content: 'So the '
  - type: note
    content: 1 Chr. 23:5
  - type: text
    content: 'number of them, with their brethren who were instructed in the songs of the '
  - type: heading
    content: Lord
  - type: text
    content: ', all who were skillful, '
  - type: text
    content: was
  - type: text
    content: ' two hundred and eighty-eight.'
  '8':
  - type: text
    content: 'And they cast lots for their duty, the small as well as the great, '
  - type: note
    content: 2 Chr. 23:13
  - type: text
    content: the teacher with the student.
  '9':
  - type: text
    content: 'Now the first lot for Asaph came out for Joseph; the second for Gedaliah, him with his brethren and sons, twelve; '
