  '21':
  - type: text
    content: 'the fourteenth for Mattithiah, his sons and his brethren, twelve; '
  '22':
  - type: text
    content: 'the fifteenth for Jeremoth, his sons and his brethren, twelve; '
  '23':
  - type: text
    content: 'the sixteenth for Hananiah, his sons and his brethren, twelve; '
  '24':
  - type: text
    content: 'the seventeenth for Joshbekashah, his sons and his brethren, twelve; '
