    content: Ps. 78:67, 68
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' loves the gates of Zion'
  - type: text
    content: More than all the dwellings of Jacob.
  '3':
  - type: note
    content: Is. 60:1
  - type: text
    content: Glorious things are spoken of you,
  - type: text
    content: O city of God!
  - type: text
    content: Selah
  '4':
  - type: text
    content: “I will make mention of Rahab and Babylon to those who know Me;
  - type: text
    content: 'Behold, O Philistia and Tyre, with Ethiopia:'
  - type: text
    content: '‘This '
  - type: text
    content: one
  - type: text
    content: ' was born there.’ ”'
  '5':
  - type: text
    content: And of Zion it will be said,
  - type: text
    content: '“This '
  - type: text
    content: one
  - type: text
    content: ' and that '
  - type: text
    content: one
  - type: text
    content: ' were born in her;'
  - type: text
    content: And the Most High Himself shall establish her.”
  '6':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' will record,'
  - type: text
    content: 'When He '
  - type: note
    content: Is. 4:3
  - type: text
    content: 'registers the peoples:'
  - type: text
    content: '“This '
  - type: text
    content: one
  - type: text
    content: ' was born there.”'
  - type: text
    content: Selah
  '7':
  - type: text
    content: 'Both the singers and the players on instruments '
  - type: text
    content: say,
  - type: text
    content: '“All my springs '
  - type: text
    content: are
  - type: text
    content: ' in you.”'
