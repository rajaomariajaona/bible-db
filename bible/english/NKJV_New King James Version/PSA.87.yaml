document_id: PSA.87,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Glories of the City of God
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of the sons of Korah. A Song.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His foundation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in the holy mountains.'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 78:67, 68
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' loves the gates of Zion'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: More than all the dwellings of Jacob.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 60:1
      marker-yv: yv-n
    - type: text
      text: Glorious things are spoken of you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O city of God!
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will make mention of Rahab and Babylon to those who know Me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Behold, O Philistia and Tyre, with Ethiopia:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '‘This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' was born there.’ ”'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And of Zion it will be said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' and that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' were born in her;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the Most High Himself shall establish her.”
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will record,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 4:3
      marker-yv: yv-n
    - type: text
      text: 'registers the peoples:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' was born there.”'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Both the singers and the players on instruments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“All my springs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in you.”'
