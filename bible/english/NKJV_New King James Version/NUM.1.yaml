  - type: text
    content: '“Only the tribe of Levi you shall not number, nor take a census of them among the children of Israel; '
  '5':
  - type: text
    content: '“These are the names of the men who shall stand with you: from Reuben, Elizur the son of Shedeur; '
  '50':
  - type: note
    content: Ex. 38:21; Num. 3:7, 8; 4:15, 25–27, 33
  - type: text
    content: 'but you shall appoint the Levites over the tabernacle of the Testimony, over all its furnishings, and over all things that belong to it; they shall carry the tabernacle and all its furnishings; they shall attend to it '
  - type: note
    content: Num. 3:23, 29, 35, 38
  - type: text
    content: 'and camp around the tabernacle. '
  '51':
  - type: note
    content: Num. 4:5–15; 10:17, 21
  - type: text
    content: 'And when the tabernacle is to go forward, the Levites shall take it down; and when the tabernacle is to be set up, the Levites shall set it '
  - type: note
    content: Num. 10:21
  - type: text
    content: 'up. '
  - type: note
    content: Num. 3:10, 38; 4:15, 19, 20; 18:22
  - type: text
    content: 'The outsider who comes near shall be put to death. '
  '52':
  - type: text
    content: 'The children of Israel shall pitch their tents, everyone by his own camp, '
  - type: note
    content: Num. 2:2, 34; 24:2
  - type: text
    content: 'everyone by his own standard, according to their armies; '
  '53':
  - type: note
    content: Num. 1:50
  - type: text
    content: 'but the Levites shall camp around the tabernacle of the Testimony, that there may be no '
  - type: note
    content: Lev. 10:6; Num. 8:19; 16:46; 18:5; 1 Sam. 6:19
  - type: text
    content: 'wrath on the congregation of the children of Israel; and the Levites shall '
  - type: note
    content: Num. 8:24; 18:2–4; 1 Chr. 23:32
  - type: text
    content: keep charge of the tabernacle of the Testimony.”
