document_id: 1PE.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greeting to the Elect Pilgrims
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Peter, an apostle of Jesus Christ,
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the pilgrims '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 7:35; James 1:1
      marker-yv: yv-n
    - type: text
      text: 'of the Dispersion in Pontus, Galatia, Cappadocia, Asia, and Bithynia, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Of this salvation the prophets have inquired and searched carefully, who prophesied of the grace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: would
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' to you, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'searching what, or what manner of time, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Pet. 1:21
      marker-yv: yv-n
    - type: text
      text: 'the Spirit of Christ who was in them was indicating when He testified beforehand the sufferings of Christ and the glories that would follow. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'To them it was revealed that, not to themselves, but to us they were ministering the things which now have been reported to you through those who have preached the gospel to you by the Holy Spirit sent from heaven—things which '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 3:10
      marker-yv: yv-n
    - type: text
      text: angels desire to look into.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living Before God Our Father
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Therefore gird up the loins of your mind, be sober, and rest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' hope fully upon the grace that is to be brought to you at the revelation of Jesus Christ; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'as obedient children, not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 12:2); 1 Pet. 4:2
      marker-yv: yv-n
    - type: text
      text: 'conforming yourselves to the former lusts, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' in your ignorance; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 7:1)
      marker-yv: yv-n
    - type: text
      text: 'but as He who called you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' holy, you also be holy in all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' conduct, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'because it is written, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:44, 45; 19:2; 20:7
      marker-yv: yv-n
    - type: text
      text: “Be holy, for I am holy.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And if you call on the Father, who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 10:34
      marker-yv: yv-n
    - type: text
      text: 'without partiality judges according to each one’s work, conduct yourselves throughout the time of your stay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: here
    - type: text
      text: ' in fear; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'knowing that you were not redeemed with corruptible things, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' silver or gold, from your aimless conduct '
    - type: usfm
      marker: it
      children:
      - type: text
        text: received
    - type: text
      text: ' by tradition from your fathers, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:28; 1 Pet. 1:2
      marker-yv: yv-n
    - type: text
      text: 'with the precious blood of Christ, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:5; Is. 53:7
      marker-yv: yv-n
    - type: text
      text: 'as of a lamb without blemish and without spot. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 1:4
      marker-yv: yv-n
    - type: text
      text: 'elect '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 8:29); 1 Pet. 1:20
      marker-yv: yv-n
    - type: text
      text: 'according to the foreknowledge of God the Father, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Thess. 2:13
      marker-yv: yv-n
    - type: text
      text: 'in sanctification of the Spirit, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:5
      marker-yv: yv-n
    - type: text
      text: 'obedience and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 52:15; Heb. 10:22; 12:24
      marker-yv: yv-n
    - type: text
      text: 'sprinkling of the blood of Jesus Christ:'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:7
      marker-yv: yv-n
    - type: text
      text: Grace to you and peace be multiplied.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Heavenly Inheritance
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 3:25
      marker-yv: yv-n
    - type: text
      text: 'He indeed was foreordained before the foundation of the world, but was manifest '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 4:4
      marker-yv: yv-n
    - type: text
      text: 'in these last times for you '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'who through Him believe in God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:24
      marker-yv: yv-n
    - type: text
      text: 'who raised Him from the dead and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:33
      marker-yv: yv-n
    - type: text
      text: gave Him glory, so that your faith and hope are in God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Enduring Word
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Since you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 15:9
      marker-yv: yv-n
    - type: text
      text: 'have purified your souls in obeying the truth through the Spirit in sincere '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 13:34; Rom. 12:10; Heb. 13:1; 1 Pet. 2:17; 3:8
      marker-yv: yv-n
    - type: text
      text: 'love of the brethren, love one another fervently with a pure heart, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 1:13
      marker-yv: yv-n
    - type: text
      text: 'having been born again, not of corruptible seed but incorruptible, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 2:13; James 1:18
      marker-yv: yv-n
    - type: text
      text: 'through the word of God which lives and abides forever, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: because
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 40:6–8; James 1:10
      marker-yv: yv-n
    - type: text
      text: '“All flesh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' as grass,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the glory of man as the flower of the grass.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The grass withers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And its flower falls away,
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 40:8
      marker-yv: yv-n
    - type: text
      text: 'But the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' endures forever.”'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 1:1)
      marker-yv: yv-n
    - type: text
      text: Now this is the word which by the gospel was preached to you.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 1:3
      marker-yv: yv-n
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the God and Father of our Lord Jesus Christ, who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 6:16; Titus 3:5
      marker-yv: yv-n
    - type: text
      text: 'according to His abundant mercy '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 3:3, 5)
      marker-yv: yv-n
    - type: text
      text: 'has begotten us again to a living hope '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:20; 1 Pet. 3:21
      marker-yv: yv-n
    - type: text
      text: 'through the resurrection of Jesus Christ from the dead, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'to an inheritance incorruptible and undefiled and that does not fade away, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 1:5
      marker-yv: yv-n
    - type: text
      text: 'reserved in heaven for you, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 10:28; (Phil. 4:7)
      marker-yv: yv-n
    - type: text
      text: who are kept by the power of God through faith for salvation ready to be revealed in the last time.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 5:12
      marker-yv: yv-n
    - type: text
      text: 'In this you greatly rejoice, though now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 4:17
      marker-yv: yv-n
    - type: text
      text: 'for a little while, if need be, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: James 1:2; 1 Pet. 4:12
      marker-yv: yv-n
    - type: text
      text: 'you have been grieved by various trials, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: James 1:3
      marker-yv: yv-n
    - type: text
      text: 'the genuineness of your faith, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: being
    - type: text
      text: ' much more precious than gold that perishes, though '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 23:10
      marker-yv: yv-n
    - type: text
      text: 'it is tested by fire, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 2:7)
      marker-yv: yv-n
    - type: text
      text: 'may be found to praise, honor, and glory at the revelation of Jesus Christ, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 John 4:20
      marker-yv: yv-n
    - type: text
      text: 'whom having not seen you love. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 20:29
      marker-yv: yv-n
    - type: text
      text: 'Though now you do not see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him,
    - type: text
      text: ' yet believing, you rejoice with joy inexpressible and full of glory, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'receiving the end of your faith—the salvation of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' souls.'
