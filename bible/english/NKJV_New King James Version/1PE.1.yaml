document_id: 1PE.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting to the Elect Pilgrims
  - type: text
    content: Peter, an apostle of Jesus Christ,
  - type: text
    content: 'To the pilgrims '
  - type: note
    content: John 7:35; James 1:1
  - type: text
    content: 'of the Dispersion in Pontus, Galatia, Cappadocia, Asia, and Bithynia, '
  '10':
  - type: text
    content: 'Of this salvation the prophets have inquired and searched carefully, who prophesied of the grace '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: would
  - type: text
    content: ' '
  - type: text
    content: come
  - type: text
    content: ' to you, '
  '11':
  - type: text
    content: 'searching what, or what manner of time, '
  - type: note
    content: 2 Pet. 1:21
  - type: text
    content: 'the Spirit of Christ who was in them was indicating when He testified beforehand the sufferings of Christ and the glories that would follow. '
  '12':
  - type: text
    content: 'To them it was revealed that, not to themselves, but to us they were ministering the things which now have been reported to you through those who have preached the gospel to you by the Holy Spirit sent from heaven—things which '
  - type: note
    content: Eph. 3:10
  - type: text
    content: angels desire to look into.
  - type: heading
    content: Living Before God Our Father
  '13':
  - type: text
    content: 'Therefore gird up the loins of your mind, be sober, and rest '
  - type: text
    content: your
  - type: text
    content: ' hope fully upon the grace that is to be brought to you at the revelation of Jesus Christ; '
  '14':
  - type: text
    content: 'as obedient children, not '
  - type: note
    content: (Rom. 12:2); 1 Pet. 4:2
  - type: text
    content: 'conforming yourselves to the former lusts, '
  - type: text
    content: as
  - type: text
    content: ' in your ignorance; '
  '15':
  - type: note
    content: (2 Cor. 7:1)
  - type: text
    content: 'but as He who called you '
  - type: text
    content: is
  - type: text
    content: ' holy, you also be holy in all '
  - type: text
    content: your
  - type: text
    content: ' conduct, '
  '16':
  - type: text
    content: 'because it is written, '
  - type: note
    content: Lev. 11:44, 45; 19:2; 20:7
  - type: text
    content: “Be holy, for I am holy.”
  '17':
  - type: text
    content: 'And if you call on the Father, who '
  - type: note
    content: Acts 10:34
  - type: text
    content: 'without partiality judges according to each one’s work, conduct yourselves throughout the time of your stay '
  - type: text
    content: here
  - type: text
    content: ' in fear; '
  '18':
  - type: text
    content: 'knowing that you were not redeemed with corruptible things, '
  - type: text
    content: like
  - type: text
    content: ' silver or gold, from your aimless conduct '
  - type: text
    content: received
  - type: text
    content: ' by tradition from your fathers, '
  '19':
  - type: text
    content: 'but '
  - type: note
    content: Acts 20:28; 1 Pet. 1:2
  - type: text
    content: 'with the precious blood of Christ, '
  - type: note
    content: Ex. 12:5; Is. 53:7
  - type: text
    content: 'as of a lamb without blemish and without spot. '
  '2':
  - type: note
    content: Eph. 1:4
  - type: text
    content: 'elect '
  - type: note
    content: (Rom. 8:29); 1 Pet. 1:20
  - type: text
    content: 'according to the foreknowledge of God the Father, '
  - type: note
    content: 2 Thess. 2:13
  - type: text
    content: 'in sanctification of the Spirit, for '
  - type: note
    content: Rom. 1:5
  - type: text
    content: 'obedience and '
  - type: note
    content: Is. 52:15; Heb. 10:22; 12:24
  - type: text
    content: 'sprinkling of the blood of Jesus Christ:'
  - type: note
    content: Rom. 1:7
  - type: text
    content: Grace to you and peace be multiplied.
  - type: heading
    content: A Heavenly Inheritance
  '20':
  - type: note
    content: Rom. 3:25
  - type: text
    content: 'He indeed was foreordained before the foundation of the world, but was manifest '
  - type: note
    content: Gal. 4:4
  - type: text
    content: 'in these last times for you '
  '21':
  - type: text
    content: 'who through Him believe in God, '
  - type: note
    content: Acts 2:24
  - type: text
    content: 'who raised Him from the dead and '
  - type: note
    content: Acts 2:33
  - type: text
    content: gave Him glory, so that your faith and hope are in God.
  - type: heading
    content: The Enduring Word
  '22':
  - type: text
    content: 'Since you '
  - type: note
    content: Acts 15:9
  - type: text
    content: 'have purified your souls in obeying the truth through the Spirit in sincere '
  - type: note
    content: John 13:34; Rom. 12:10; Heb. 13:1; 1 Pet. 2:17; 3:8
  - type: text
    content: 'love of the brethren, love one another fervently with a pure heart, '
  '23':
  - type: note
    content: John 1:13
  - type: text
    content: 'having been born again, not of corruptible seed but incorruptible, '
  - type: note
    content: 1 Thess. 2:13; James 1:18
  - type: text
    content: 'through the word of God which lives and abides forever, '
  '24':
  - type: text
    content: because
  - type: note
    content: Is. 40:6–8; James 1:10
  - type: text
    content: '“All flesh '
  - type: text
    content: is
  - type: text
    content: ' as grass,'
  - type: text
    content: And all the glory of man as the flower of the grass.
  - type: text
    content: The grass withers,
  - type: text
    content: And its flower falls away,
  '25':
  - type: note
    content: Is. 40:8
  - type: text
    content: 'But the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' endures forever.”'
  - type: note
    content: (John 1:1)
  - type: text
    content: Now this is the word which by the gospel was preached to you.
  '3':
  - type: note
    content: Eph. 1:3
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' the God and Father of our Lord Jesus Christ, who '
  - type: note
    content: Gal. 6:16; Titus 3:5
  - type: text
    content: 'according to His abundant mercy '
  - type: note
    content: (John 3:3, 5)
  - type: text
    content: 'has begotten us again to a living hope '
  - type: note
    content: 1 Cor. 15:20; 1 Pet. 3:21
  - type: text
    content: 'through the resurrection of Jesus Christ from the dead, '
  '4':
  - type: text
    content: 'to an inheritance incorruptible and undefiled and that does not fade away, '
  - type: note
    content: Col. 1:5
  - type: text
    content: 'reserved in heaven for you, '
  '5':
  - type: note
    content: John 10:28; (Phil. 4:7)
  - type: text
    content: who are kept by the power of God through faith for salvation ready to be revealed in the last time.
  '6':
  - type: note
    content: Matt. 5:12
  - type: text
    content: 'In this you greatly rejoice, though now '
  - type: note
    content: 2 Cor. 4:17
  - type: text
    content: 'for a little while, if need be, '
  - type: note
    content: James 1:2; 1 Pet. 4:12
  - type: text
    content: 'you have been grieved by various trials, '
  '7':
  - type: text
    content: 'that '
  - type: note
    content: James 1:3
  - type: text
    content: 'the genuineness of your faith, '
  - type: text
    content: being
  - type: text
    content: ' much more precious than gold that perishes, though '
  - type: note
    content: Job 23:10
  - type: text
    content: 'it is tested by fire, '
  - type: note
    content: (Rom. 2:7)
  - type: text
    content: 'may be found to praise, honor, and glory at the revelation of Jesus Christ, '
  '8':
  - type: note
    content: 1 John 4:20
  - type: text
    content: 'whom having not seen you love. '
  - type: note
    content: John 20:29
  - type: text
    content: 'Though now you do not see '
  - type: text
    content: Him,
  - type: text
    content: ' yet believing, you rejoice with joy inexpressible and full of glory, '
  '9':
  - type: text
    content: 'receiving the end of your faith—the salvation of '
  - type: text
    content: your
  - type: text
    content: ' souls.'
