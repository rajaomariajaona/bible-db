    content: 1 Kin. 15:21, 33; 16:6, 8, 15, 23; Song 6:4
  - type: text
    content: 'Tirzah. '
  - type: note
    content: 1 Kin. 14:12
  - type: text
    content: 'When she came to the threshold of the house, the child died. '
  '18':
