  '1':
  - type: heading
    content: Judgment on the House of Jeroboam
  - type: text
    content: 'At that time Abijah the son of Jeroboam became sick. '
  '10':
  - type: text
    content: 'therefore behold! '
  - type: note
    content: 1 Kin. 15:29
  - type: text
    content: 'I will bring disaster on the house of Jeroboam, and '
  - type: note
    content: 1 Kin. 21:21; 2 Kin. 9:8
  - type: text
    content: 'will cut off from Jeroboam every male in Israel, '
  - type: note
    content: Deut. 32:36; 2 Kin. 14:26
  - type: text
    content: 'bond and free; I will take away the remnant of the house of Jeroboam, as one takes away refuse until it is all gone. '
  '11':
  - type: text
    content: 'The dogs shall eat '
  - type: note
    content: 1 Kin. 16:4; 21:24
  - type: text
    content: 'whoever belongs to Jeroboam and dies in the city, and the birds of the air shall eat whoever dies in the field; for the '
  - type: heading
    content: Lord
  - type: text
    content: ' has spoken!” ’ '
  '12':
  - type: text
    content: 'Arise therefore, go to your own house. '
  - type: note
    content: 1 Kin. 14:17
  - type: text
    content: 'When your feet enter the city, the child shall die. '
  '13':
  - type: text
    content: 'And all Israel shall mourn for him and bury him, for he is the only one of Jeroboam who shall come to the grave, because in him '
  - type: note
    content: 2 Chr. 12:12; 19:3
  - type: text
    content: 'there is found something good toward the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel in the house of Jeroboam.'
  '14':
  - type: note
    content: 1 Kin. 15:27–29
  - type: text
    content: '“Moreover the '
  - type: heading
    content: Lord
  - type: text
    content: ' will raise up for Himself a king over Israel who shall cut off the house of Jeroboam; this is the day. What? Even now! '
  '15':
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' will strike Israel, as a reed is shaken in the water. He will '
  - type: note
    content: Deut. 29:28; 2 Kin. 17:6; Ps. 52:5
  - type: text
    content: 'uproot Israel from this '
  - type: note
    content: (Josh. 23:15, 16)
  - type: text
    content: 'good land which He gave to their fathers, and will scatter them '
  - type: note
    content: 2 Kin. 15:29
  - type: text
    content: 'beyond the River, '
  - type: note
    content: (Ex. 34:13, 14; Deut. 12:3)
  - type: text
    content: 'because they have made their wooden images, provoking the '
  - type: heading
    content: Lord
  - type: text
    content: ' to anger. '
  '16':
  - type: text
    content: 'And He will give Israel up because of the sins of Jeroboam, '
  - type: note
    content: 1 Kin. 12:30; 13:34; 15:30, 34; 16:2
  - type: text
    content: who sinned and who made Israel sin.”
  '17':
  - type: text
    content: 'Then Jeroboam’s wife arose and departed, and came to '
