document_id: 1KI.14,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment on the House of Jeroboam
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'At that time Abijah the son of Jeroboam became sick. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'therefore behold! '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:29
      marker-yv: yv-n
    - type: text
      text: 'I will bring disaster on the house of Jeroboam, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 21:21; 2 Kin. 9:8
      marker-yv: yv-n
    - type: text
      text: 'will cut off from Jeroboam every male in Israel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:36; 2 Kin. 14:26
      marker-yv: yv-n
    - type: text
      text: 'bond and free; I will take away the remnant of the house of Jeroboam, as one takes away refuse until it is all gone. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The dogs shall eat '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 16:4; 21:24
      marker-yv: yv-n
    - type: text
      text: 'whoever belongs to Jeroboam and dies in the city, and the birds of the air shall eat whoever dies in the field; for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken!” ’ '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Arise therefore, go to your own house. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:17
      marker-yv: yv-n
    - type: text
      text: 'When your feet enter the city, the child shall die. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And all Israel shall mourn for him and bury him, for he is the only one of Jeroboam who shall come to the grave, because in him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 12:12; 19:3
      marker-yv: yv-n
    - type: text
      text: 'there is found something good toward the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel in the house of Jeroboam.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:27–29
      marker-yv: yv-n
    - type: text
      text: '“Moreover the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will raise up for Himself a king over Israel who shall cut off the house of Jeroboam; this is the day. What? Even now! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will strike Israel, as a reed is shaken in the water. He will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 29:28; 2 Kin. 17:6; Ps. 52:5
      marker-yv: yv-n
    - type: text
      text: 'uproot Israel from this '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Josh. 23:15, 16)
      marker-yv: yv-n
    - type: text
      text: 'good land which He gave to their fathers, and will scatter them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 15:29
      marker-yv: yv-n
    - type: text
      text: 'beyond the River, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 34:13, 14; Deut. 12:3)
      marker-yv: yv-n
    - type: text
      text: 'because they have made their wooden images, provoking the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to anger. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And He will give Israel up because of the sins of Jeroboam, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:30; 13:34; 15:30, 34; 16:2
      marker-yv: yv-n
    - type: text
      text: who sinned and who made Israel sin.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Jeroboam’s wife arose and departed, and came to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:21, 33; 16:6, 8, 15, 23; Song 6:4
      marker-yv: yv-n
    - type: text
      text: 'Tirzah. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:12
      marker-yv: yv-n
    - type: text
      text: 'When she came to the threshold of the house, the child died. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And they buried him; and all Israel mourned for him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:13
      marker-yv: yv-n
    - type: text
      text: 'according to the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' which He spoke through His servant Ahijah the prophet.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Death of Jeroboam
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Now the rest of the acts of Jeroboam, how he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:30; 2 Chr. 13:2–20
      marker-yv: yv-n
    - type: text
      text: 'made war and how he reigned, indeed they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' written in the book of the chronicles of the kings of Israel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Jeroboam said to his wife, “Please arise, and disguise yourself, that they may not recognize you as the wife of Jeroboam, and go to Shiloh. Indeed, Ahijah the prophet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' there, who told me that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:29–31
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: would
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' king over this people. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The period that Jeroboam reigned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty-two years. So he rested with his fathers. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:25
      marker-yv: yv-n
    - type: text
      text: Then Nadab his son reigned in his place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rehoboam Reigns in Judah
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And Rehoboam the son of Solomon reigned in Judah. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 12:13
      marker-yv: yv-n
    - type: text
      text: 'Rehoboam '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' forty-one years old when he became king. He reigned seventeen years in Jerusalem, the city '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:32, 36
      marker-yv: yv-n
    - type: text
      text: 'which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had chosen out of all the tribes of Israel, to put His name there. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:31
      marker-yv: yv-n
    - type: text
      text: 'His mother’s name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Naamah, an Ammonitess. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 12:1, 14
      marker-yv: yv-n
    - type: text
      text: 'Now Judah did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:21; Ps. 78:58; 1 Cor. 10:22
      marker-yv: yv-n
    - type: text
      text: 'provoked Him to jealousy with their sins which they committed, more than all that their fathers had done. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'For they also built for themselves '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:2; Ezek. 16:24, 25
      marker-yv: yv-n
    - type: text
      text: 'high places, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 16:22)
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: sacred
    - type: text
      text: ' pillars, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Kin. 17:9, 10)
      marker-yv: yv-n
    - type: text
      text: 'wooden images on every high hill and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 57:5; Jer. 2:20
      marker-yv: yv-n
    - type: text
      text: 'under every green tree. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:5; Deut. 23:17; 1 Kin. 15:12; 22:46; 2 Kin. 23:7
      marker-yv: yv-n
    - type: text
      text: 'And there were also perverted persons in the land. They did according to all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 20:18
      marker-yv: yv-n
    - type: text
      text: 'abominations of the nations which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had cast out before the children of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 9:4, 5)
      marker-yv: yv-n
    - type: text
      text: Israel.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:40; 2 Chr. 12:2
      marker-yv: yv-n
    - type: text
      text: 'It happened in the fifth year of King Rehoboam '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' Shishak king of Egypt came up against Jerusalem. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:18; 2 Chr. 12:9–11
      marker-yv: yv-n
    - type: text
      text: 'And he took away the treasures of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the treasures of the king’s house; he took away everything. He also took away all the gold shields '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 10:17
      marker-yv: yv-n
    - type: text
      text: 'which Solomon had made. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Then King Rehoboam made bronze shields in their place, and committed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to the hands of the captains of the guard, who guarded the doorway of the king’s house. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And whenever the king entered the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the guards carried them, then brought them back into the guardroom.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 12:15, 16
      marker-yv: yv-n
    - type: text
      text: 'Now the rest of the acts of Rehoboam, and all that he did, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Judah? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 9:7, 8; 1 Kin. 13:7; 2 Kin. 4:42
      marker-yv: yv-n
    - type: text
      text: 'Also take with you ten loaves, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' cakes, and a jar of honey, and go to him; he will tell you what will become of the child.” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And there was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:21–24; 15:6
      marker-yv: yv-n
    - type: text
      text: 'war between Rehoboam and Jeroboam all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' days. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 12:16
      marker-yv: yv-n
    - type: text
      text: 'So Rehoboam rested with his fathers, and was buried with his fathers in the City of David. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:21
      marker-yv: yv-n
    - type: text
      text: 'His mother’s name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Naamah, an Ammonitess. Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 12:16
      marker-yv: yv-n
    - type: text
      text: Abijam his son reigned in his place.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And Jeroboam’s wife did so; she arose '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:29
      marker-yv: yv-n
    - type: text
      text: and went to Shiloh, and came to the house of Ahijah. But Ahijah could not see, for his eyes were glazed by reason of his age.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said to Ahijah, “Here is the wife of Jeroboam, coming to ask you something about her son, for he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' sick. Thus and thus you shall say to her; for it will be, when she comes in, that she will pretend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' another '
    - type: usfm
      marker: it
      children:
      - type: text
        text: woman.
    - type: text
      text: ”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And so it was, when Ahijah heard the sound of her footsteps as she came through the door, he said, “Come in, wife of Jeroboam. Why do you pretend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' another '
    - type: usfm
      marker: it
      children:
      - type: text
        text: person?
    - type: text
      text: ' For I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: been
    - type: text
      text: ' sent to you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' bad '
    - type: usfm
      marker: it
      children:
      - type: text
        text: news.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Go, tell Jeroboam, ‘Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 12:7, 8; 1 Kin. 16:2
      marker-yv: yv-n
    - type: text
      text: '“Because I exalted you from among the people, and made you ruler over My people Israel, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:31
      marker-yv: yv-n
    - type: text
      text: 'tore the kingdom away from the house of David, and gave it to you; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yet
    - type: text
      text: ' you have not been as My servant David, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:33, 38; 15:5
      marker-yv: yv-n
    - type: text
      text: 'who kept My commandments and who followed Me with all his heart, to do only '
    - type: usfm
      marker: it
      children:
