document_id: ACT.22,114
type_code: eng
verses:
  '1':
  - type: text
    content: “Brethren
  - type: note
    content: Acts 7:2
  - type: text
    content: ' and fathers, hear my defense before you now.” '
  '10':
  - type: text
    content: 'So I said, ‘What shall I do, Lord?’ And the Lord said to me, '
  - type: text
    content: ‘Arise and go into Damascus, and there you will be told all things which are appointed for you to do.’
  - type: text
    content: ' '
  '11':
  - type: text
    content: And since I could not see for the glory of that light, being led by the hand of those who were with me, I came into Damascus.
  '12':
  - type: text
    content: '“Then '
  - type: note
    content: Acts 9:17
  - type: text
    content: 'a certain Ananias, a devout man according to the law, '
  - type: note
    content: Acts 10:22
  - type: text
    content: 'having a good testimony with all the '
  - type: note
    content: 1 Tim. 3:7
  - type: text
    content: 'Jews who dwelt '
  - type: text
    content: there,
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'came to me; and he stood and said to me, ‘Brother Saul, receive your sight.’ And at that same hour I looked up at him. '
  '14':
  - type: text
    content: 'Then he said, '
  - type: note
    content: Acts 3:13; 5:30
  - type: text
    content: '‘The God of our fathers '
  - type: note
    content: Acts 9:15; 26:16; Gal. 1:15
  - type: text
    content: 'has chosen you that you should '
  - type: note
    content: Acts 3:14; 7:52
  - type: text
    content: 'know His will, and '
  - type: note
    content: Acts 9:17; 26:16; 1 Cor. 9:1; 15:8
  - type: text
    content: 'see the Just One, '
  - type: note
    content: 1 Cor. 11:23; Gal. 1:12
  - type: text
    content: 'and hear the voice of His mouth. '
  '15':
  - type: note
    content: Acts 23:11
  - type: text
    content: 'For you will be His witness to all men of '
  - type: note
    content: Acts 4:20; 26:16
  - type: text
    content: 'what you have seen and heard. '
  '16':
  - type: text
    content: 'And now why are you waiting? Arise and be baptized, '
  - type: note
    content: Acts 2:38; 1 Cor. 6:11; (Eph. 5:26); Heb. 10:22
  - type: text
    content: 'and wash away your sins, '
  - type: note
    content: Acts 9:14; Rom. 10:13
  - type: text
    content: calling on the name of the Lord.’
  '17':
  - type: text
    content: '“Now '
  - type: note
    content: Acts 9:26; 26:20; 2 Cor. 12:2
  - type: text
    content: 'it happened, when I returned to Jerusalem and was praying in the temple, that I was in a trance '
  '18':
  - type: text
    content: 'and '
  - type: note
    content: Acts 22:14
  - type: text
    content: 'saw Him saying to me, '
  - type: note
    content: Matt. 10:14
  - type: text
    content: ‘Make haste and get out of Jerusalem quickly, for they will not receive your testimony concerning Me.’
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'So I said, ‘Lord, '
  - type: note
    content: Acts 8:3; 22:4
  - type: text
    content: 'they know that in every synagogue I imprisoned and '
  - type: note
    content: Matt. 10:17; Acts 26:11
  - type: text
    content: 'beat those who believe on You. '
  '2':
  - type: text
    content: 'And when they heard that he spoke to them in the '
  - type: note
    content: Acts 21:40
  - type: text
    content: Hebrew language, they kept all the more silent.
  - type: text
    content: 'Then he said: '
  '20':
  - type: note
    content: Acts 7:54—8:1
  - type: text
    content: 'And when the blood of Your martyr Stephen was shed, I also was standing by '
  - type: note
    content: Luke 11:48
  - type: text
    content: 'consenting to his death, and guarding the clothes of those who were killing him.’ '
  '21':
  - type: text
    content: 'Then He said to me, '
  - type: text
    content: '‘Depart, '
  - type: note
    content: Acts 9:15; Rom. 1:5; 11:13; Gal. 2:7, 8; Eph. 3:7, 8; 1 Tim. 2:7; 2 Tim. 1:11
  - type: text
    content: for I will send you far from here to the Gentiles.’
  - type: text
    content: ' ”'
  - type: heading
    content: Paul’s Roman Citizenship
  '22':
  - type: text
    content: 'And they listened to him until this word, and '
  - type: text
    content: then
  - type: text
    content: ' they raised their voices and said, '
  - type: note
    content: Acts 21:36; 1 Thess. 2:16
  - type: text
    content: '“Away with such a '
  - type: text
    content: fellow
  - type: text
    content: ' from the earth, for '
  - type: note
    content: Acts 25:24
  - type: text
    content: 'he is not fit to live!” '
  '23':
  - type: text
    content: 'Then, as they cried out and tore off '
  - type: text
    content: their
  - type: text
    content: ' clothes and threw dust into the air, '
  '24':
  - type: text
    content: 'the commander ordered him to be brought into the barracks, and said that he should be examined under scourging, so that he might know why they shouted so against him. '
  '25':
  - type: text
    content: 'And as they bound him with thongs, Paul said to the centurion who stood by, '
  - type: note
    content: Acts 16:37
  - type: text
    content: “Is it lawful for you to scourge a man who is a Roman, and uncondemned?”
  '26':
  - type: text
    content: 'When the centurion heard '
  - type: text
    content: that,
  - type: text
    content: ' he went and told the commander, saying, “Take care what you do, for this man is a Roman.”'
  '27':
  - type: text
    content: Then the commander came and said to him, “Tell me, are you a Roman?”
  - type: text
    content: He said, “Yes.”
  '28':
  - type: text
    content: The commander answered, “With a large sum I obtained this citizenship.”
  - type: text
    content: 'And Paul said, “But I was born '
  - type: text
    content: a
  - type: text
    content: ' '
  - type: text
    content: citizen.
  - type: text
    content: ”
  '29':
  - type: text
    content: Then immediately those who were about to examine him withdrew from him; and the commander was also afraid after he found out that he was a Roman, and because he had bound him.
  - type: heading
    content: The Sanhedrin Divided
  '3':
  - type: note
    content: Acts 21:39; 2 Cor. 11:22
  - type: text
    content: '“I am indeed a Jew, born in Tarsus of Cilicia, but brought up in this city '
  - type: note
    content: Deut. 33:3
  - type: text
    content: 'at the feet of '
  - type: note
    content: Acts 5:34
  - type: text
    content: 'Gamaliel, taught '
  - type: note
    content: Acts 23:6; 26:5; Phil. 3:6
  - type: text
    content: 'according to the strictness of our fathers’ law, and '
  - type: note
    content: Acts 21:20; Gal. 1:14
  - type: text
    content: 'was zealous toward God '
  - type: note
    content: (Rom. 10:2)
  - type: text
    content: 'as you all are today. '
  '30':
  - type: text
    content: 'The next day, because he wanted to know for certain why he was accused by the Jews, he released him from '
  - type: text
    content: his
  - type: text
    content: ' bonds, and commanded the chief priests and all their council to appear, and brought Paul down and set him before them.'
  '4':
  - type: note
    content: Acts 8:3; 26:9–11; Phil. 3:6; 1 Tim. 1:13
  - type: text
    content: 'I persecuted this Way to the death, binding and delivering into prisons both men and women, '
  '5':
  - type: text
    content: 'as also the high priest bears me witness, and '
  - type: note
    content: Acts 23:14; 24:1; 25:15
  - type: text
    content: 'all the council of the elders, '
  - type: note
    content: Luke 22:66; Acts 4:5; 1 Tim. 4:14
  - type: text
    content: 'from whom I also received letters to the brethren, and went to Damascus '
  - type: note
    content: Acts 9:2
  - type: text
    content: to bring in chains even those who were there to Jerusalem to be punished.
  '6':
  - type: text
    content: '“Now '
  - type: note
    content: Acts 9:3; 26:12, 13
  - type: text
    content: 'it happened, as I journeyed and came near Damascus at about noon, suddenly a great light from heaven shone around me. '
  '7':
  - type: text
    content: 'And I fell to the ground and heard a voice saying to me, '
  - type: text
    content: ‘Saul, Saul, why are you persecuting Me?’
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'So I answered, ‘Who are You, Lord?’ And He said to me, '
  - type: text
    content: ‘I am Jesus of Nazareth, whom you are persecuting.’
  '9':
  - type: text
    content: '“And '
  - type: note
    content: Dan. 10:7; Acts 9:7
  - type: text
    content: 'those who were with me indeed saw the light and were afraid, but they did not hear the voice of Him who spoke to me. '
