document_id: ACT.22,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Brethren
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 7:2
      marker-yv: yv-n
    - type: text
      text: ' and fathers, hear my defense before you now.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I said, ‘What shall I do, Lord?’ And the Lord said to me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Arise and go into Damascus, and there you will be told all things which are appointed for you to do.’
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And since I could not see for the glory of that light, being led by the hand of those who were with me, I came into Damascus.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:17
      marker-yv: yv-n
    - type: text
      text: 'a certain Ananias, a devout man according to the law, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 10:22
      marker-yv: yv-n
    - type: text
      text: 'having a good testimony with all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 3:7
      marker-yv: yv-n
    - type: text
      text: 'Jews who dwelt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there,
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'came to me; and he stood and said to me, ‘Brother Saul, receive your sight.’ And at that same hour I looked up at him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 3:13; 5:30
      marker-yv: yv-n
    - type: text
      text: '‘The God of our fathers '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:15; 26:16; Gal. 1:15
      marker-yv: yv-n
    - type: text
      text: 'has chosen you that you should '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 3:14; 7:52
      marker-yv: yv-n
    - type: text
      text: 'know His will, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:17; 26:16; 1 Cor. 9:1; 15:8
      marker-yv: yv-n
    - type: text
      text: 'see the Just One, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 11:23; Gal. 1:12
      marker-yv: yv-n
    - type: text
      text: 'and hear the voice of His mouth. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 23:11
      marker-yv: yv-n
    - type: text
      text: 'For you will be His witness to all men of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:20; 26:16
      marker-yv: yv-n
    - type: text
      text: 'what you have seen and heard. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now why are you waiting? Arise and be baptized, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:38; 1 Cor. 6:11; (Eph. 5:26); Heb. 10:22
      marker-yv: yv-n
    - type: text
      text: 'and wash away your sins, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:14; Rom. 10:13
      marker-yv: yv-n
    - type: text
      text: calling on the name of the Lord.’
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:26; 26:20; 2 Cor. 12:2
      marker-yv: yv-n
    - type: text
      text: 'it happened, when I returned to Jerusalem and was praying in the temple, that I was in a trance '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 22:14
      marker-yv: yv-n
    - type: text
      text: 'saw Him saying to me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:14
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Make haste and get out of Jerusalem quickly, for they will not receive your testimony concerning Me.’
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I said, ‘Lord, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 8:3; 22:4
      marker-yv: yv-n
    - type: text
      text: 'they know that in every synagogue I imprisoned and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:17; Acts 26:11
      marker-yv: yv-n
    - type: text
      text: 'beat those who believe on You. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they heard that he spoke to them in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 21:40
      marker-yv: yv-n
    - type: text
      text: Hebrew language, they kept all the more silent.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 7:54—8:1
      marker-yv: yv-n
    - type: text
      text: 'And when the blood of Your martyr Stephen was shed, I also was standing by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 11:48
      marker-yv: yv-n
    - type: text
      text: 'consenting to his death, and guarding the clothes of those who were killing him.’ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He said to me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '‘Depart, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:15; Rom. 1:5; 11:13; Gal. 2:7, 8; Eph. 3:7, 8; 1 Tim. 2:7; 2 Tim. 1:11
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for I will send you far from here to the Gentiles.’
    - type: text
      text: ' ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Roman Citizenship
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they listened to him until this word, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: then
    - type: text
      text: ' they raised their voices and said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 21:36; 1 Thess. 2:16
      marker-yv: yv-n
    - type: text
      text: '“Away with such a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fellow
    - type: text
      text: ' from the earth, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 25:24
      marker-yv: yv-n
    - type: text
      text: 'he is not fit to live!” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then, as they cried out and tore off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' clothes and threw dust into the air, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the commander ordered him to be brought into the barracks, and said that he should be examined under scourging, so that he might know why they shouted so against him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as they bound him with thongs, Paul said to the centurion who stood by, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 16:37
      marker-yv: yv-n
    - type: text
      text: “Is it lawful for you to scourge a man who is a Roman, and uncondemned?”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the centurion heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that,
    - type: text
      text: ' he went and told the commander, saying, “Take care what you do, for this man is a Roman.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the commander came and said to him, “Tell me, are you a Roman?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “Yes.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The commander answered, “With a large sum I obtained this citizenship.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Paul said, “But I was born '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: citizen.
    - type: text
      text: ”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then immediately those who were about to examine him withdrew from him; and the commander was also afraid after he found out that he was a Roman, and because he had bound him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sanhedrin Divided
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 21:39; 2 Cor. 11:22
      marker-yv: yv-n
    - type: text
      text: '“I am indeed a Jew, born in Tarsus of Cilicia, but brought up in this city '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 33:3
      marker-yv: yv-n
    - type: text
      text: 'at the feet of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 5:34
      marker-yv: yv-n
    - type: text
      text: 'Gamaliel, taught '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 23:6; 26:5; Phil. 3:6
      marker-yv: yv-n
    - type: text
      text: 'according to the strictness of our fathers’ law, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 21:20; Gal. 1:14
      marker-yv: yv-n
    - type: text
      text: 'was zealous toward God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 10:2)
      marker-yv: yv-n
    - type: text
      text: 'as you all are today. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day, because he wanted to know for certain why he was accused by the Jews, he released him from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' bonds, and commanded the chief priests and all their council to appear, and brought Paul down and set him before them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 8:3; 26:9–11; Phil. 3:6; 1 Tim. 1:13
      marker-yv: yv-n
    - type: text
      text: 'I persecuted this Way to the death, binding and delivering into prisons both men and women, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as also the high priest bears me witness, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 23:14; 24:1; 25:15
      marker-yv: yv-n
    - type: text
      text: 'all the council of the elders, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 22:66; Acts 4:5; 1 Tim. 4:14
      marker-yv: yv-n
    - type: text
      text: 'from whom I also received letters to the brethren, and went to Damascus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:2
      marker-yv: yv-n
    - type: text
      text: to bring in chains even those who were there to Jerusalem to be punished.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:3; 26:12, 13
      marker-yv: yv-n
    - type: text
      text: 'it happened, as I journeyed and came near Damascus at about noon, suddenly a great light from heaven shone around me. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I fell to the ground and heard a voice saying to me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Saul, Saul, why are you persecuting Me?’
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I answered, ‘Who are You, Lord?’ And He said to me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘I am Jesus of Nazareth, whom you are persecuting.’
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 10:7; Acts 9:7
      marker-yv: yv-n
    - type: text
      text: 'those who were with me indeed saw the light and were afraid, but they did not hear the voice of Him who spoke to me. '
