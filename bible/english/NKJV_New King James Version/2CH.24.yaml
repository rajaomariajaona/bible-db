    marker-yv: yv-n
  - type: text
    text: 'came with a small company of men; but the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:25; (Deut. 28:25)
    marker-yv: yv-n
  - type: text
