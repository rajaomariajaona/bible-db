document_id: 2CH.24,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Joash Repairs the Temple
  - type: text
    content: 'Joash '
  - type: note
    content: 2 Kin. 11:21; 12:1–15
  - type: text
    content: was
  - type: text
    content: ' seven years old when he became king, and he reigned forty years in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Zibiah of Beersheba. '
  '10':
  - type: text
    content: 'Then all the leaders and all the people rejoiced, brought their contributions, and put '
  - type: text
    content: them
  - type: text
    content: ' into the chest until all had given. '
  '11':
  - type: text
    content: 'So it was, at that time, when the chest was brought to the king’s official by the hand of the Levites, and '
  - type: note
    content: 2 Kin. 12:10
  - type: text
    content: 'when they saw that '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' much money, that the king’s scribe and the high priest’s officer came and emptied the chest, and took it and returned it to its place. Thus they did day by day, and gathered money in abundance.'
  '12':
  - type: text
    content: 'The king and Jehoiada gave it to those who did the work of the service of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '; and they hired masons and carpenters to '
  - type: note
    content: 2 Chr. 30:12
  - type: text
    content: 'repair the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and also those who worked in iron and bronze to restore the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'So the workmen labored, and the work was completed by them; they restored the house of God to its original condition and reinforced it. '
  '14':
  - type: text
    content: 'When they had finished, they brought the rest of the money before the king and Jehoiada; '
  - type: note
    content: 2 Kin. 12:13
  - type: text
    content: 'they made from it articles for the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', articles for serving and offering, spoons and vessels of gold and silver. And they offered burnt offerings in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' continually all the days of Jehoiada.'
  - type: heading
    content: Apostasy of Joash
  '15':
  - type: text
    content: 'But Jehoiada grew old and was full of days, and he died; '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' one hundred and thirty years old when he died. '
  '16':
  - type: text
    content: And they buried him in the City of David among the kings, because he had done good in Israel, both toward God and His house.
  '17':
  - type: text
    content: 'Now after the death of Jehoiada the leaders of Judah came and bowed down to the king. And the king listened to them. '
  '18':
  - type: text
    content: 'Therefore they left the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of their fathers, and served '
  - type: note
    content: 1 Kin. 14:23
  - type: text
    content: 'wooden images and idols; and '
  - type: note
    content: (Ex. 34:12–14); Judg. 5:8; 2 Chr. 19:2; 28:13; 29:8; 32:25
  - type: text
    content: 'wrath came upon Judah and Jerusalem because of their trespass. '
  '19':
  - type: text
    content: 'Yet He '
  - type: note
    content: 2 Kin. 17:13; 21:10–15; 2 Chr. 36:15, 16; Jer. 7:25, 26; 25:4
  - type: text
    content: 'sent prophets to them, to bring them back to the '
  - type: heading
    content: Lord
  - type: text
    content: ; and they testified against them, but they would not listen.
  '2':
  - type: text
    content: 'Joash '
  - type: note
    content: 2 Chr. 26:4, 5
  - type: text
    content: 'did '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' right in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ' all the days of Jehoiada the priest. '
  '20':
  - type: text
    content: 'Then the Spirit of God came upon '
  - type: note
    content: Judg. 6:34; Matt. 23:35
  - type: text
    content: 'Zechariah the son of Jehoiada the priest, who stood above the people, and said to them, “Thus says God: '
  - type: note
    content: Num. 14:41; (Prov. 28:13)
  - type: text
    content: '‘Why do you transgress the commandments of the '
  - type: heading
    content: Lord
  - type: text
    content: ', so that you cannot prosper? '
  - type: note
    content: (2 Chr. 15:2)
  - type: text
    content: 'Because you have forsaken the '
  - type: heading
    content: Lord
  - type: text
    content: ', He also has forsaken you.’ ” '
  '21':
  - type: text
    content: 'So they conspired against him, and at the command of the king they '
  - type: note
    content: (Neh. 9:26); Matt. 23:35; Acts 7:58, 59
  - type: text
    content: 'stoned him with stones in the court of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Thus Joash the king did not remember the kindness which Jehoiada his father had done to him, but killed his son; and as he died, he said, “The '
  - type: heading
    content: Lord
  - type: text
    content: ' look on '
  - type: text
    content: it,
  - type: text
    content: ' and '
  - type: note
    content: (Gen. 9:5)
  - type: text
    content: repay!”
  - type: heading
    content: Death of Joash
  '23':
  - type: text
    content: 'So it happened in the spring of the year '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: note
    content: 2 Kin. 12:17; Is. 7:2
  - type: text
    content: 'the army of Syria came up against him; and they came to Judah and Jerusalem, and destroyed all the leaders of the people from among the people, and sent all their spoil to the king of Damascus. '
  '24':
  - type: text
    content: 'For the army of the Syrians '
  - type: note
    content: Lev. 26:8; (Deut. 32:30); Is. 30:17
  - type: text
    content: 'came with a small company of men; but the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Lev. 26:25; (Deut. 28:25)
  - type: text
    content: 'delivered a very great army into their hand, because they had forsaken the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of their fathers. So they '
  - type: note
    content: 2 Chr. 22:8; Is. 10:5
  - type: text
    content: 'executed judgment against Joash. '
  '25':
  - type: text
    content: 'And when they had withdrawn from him (for they left him severely wounded), '
  - type: note
    content: 2 Kin. 12:20, 21; 2 Chr. 25:3
  - type: text
    content: his own servants conspired against him because of the blood of the sons of Jehoiada the priest, and killed him on his bed. So he died. And they buried him in the City of David, but they did not bury him in the tombs of the kings.
  '26':
  - type: text
    content: 'These are the ones who conspired against him: Zabad the son of Shimeath the Ammonitess, and Jehozabad the son of Shimrith the Moabitess. '
  '27':
  - type: text
    content: 'Now '
  - type: text
    content: concerning
  - type: text
    content: ' his sons, and '
  - type: note
    content: 2 Kin. 12:18
  - type: text
    content: 'the many oracles about him, and the repairing of the house of God, indeed they '
  - type: text
    content: are
  - type: text
    content: ' written in the annals of the book of the kings. '
  - type: note
    content: 2 Kin. 12:21
  - type: text
    content: Then Amaziah his son reigned in his place.
  '3':
  - type: text
    content: And Jehoiada took two wives for him, and he had sons and daughters.
  '4':
  - type: text
    content: 'Now it happened after this '
  - type: text
    content: that
  - type: text
    content: ' Joash set his heart on repairing the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Then he gathered the priests and the Levites, and said to them, “Go out to the cities of Judah, and '
  - type: note
    content: 2 Kin. 12:4
  - type: text
    content: gather from all Israel money to repair the house of your God from year to year, and see that you do it quickly.”
  - type: text
    content: 'However the Levites did not do it quickly. '
  '6':
  - type: note
    content: 2 Kin. 12:7
  - type: text
    content: 'So the king called Jehoiada the chief '
  - type: text
    content: priest,
  - type: text
    content: ' and said to him, “Why have you not required the Levites to bring in from Judah and from Jerusalem the collection, '
  - type: text
    content: according
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: commandment
  - type: text
    content: ' of '
  - type: note
    content: Ex. 30:12–16
  - type: text
    content: 'Moses the servant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and of the assembly of Israel, for the '
  - type: note
    content: Num. 1:50; Acts 7:44
  - type: text
    content: 'tabernacle of witness?” '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: 2 Chr. 21:17
  - type: text
    content: 'the sons of Athaliah, that wicked woman, had broken into the house of God, and had also presented all the '
  - type: note
    content: 2 Kin. 12:4
  - type: text
    content: 'dedicated things of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' to the Baals.'
  '8':
  - type: text
    content: 'Then at the king’s command '
  - type: note
    content: 2 Kin. 12:9
  - type: text
    content: 'they made a chest, and set it outside at the gate of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'And they made a proclamation throughout Judah and Jerusalem to bring to the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 24:6
  - type: text
    content: 'the collection '
  - type: text
    content: that
  - type: text
    content: ' Moses the servant of God '
  - type: text
    content: had
  - type: text
    content: ' '
  - type: text
    content: imposed
  - type: text
    content: ' on Israel in the wilderness. '
