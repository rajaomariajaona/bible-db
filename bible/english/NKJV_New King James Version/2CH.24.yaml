  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And when they had withdrawn from him (for they left him severely wounded), '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 12:20, 21; 2 Chr. 25:3
    marker-yv: yv-n
  - type: text
    text: his own servants conspired against him because of the blood of the sons of Jehoiada the priest, and killed him on his bed. So he died. And they buried him in the City of David, but they did not bury him in the tombs of the kings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
