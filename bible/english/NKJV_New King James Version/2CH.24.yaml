  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: concerning
  - type: text
    text: ' his sons, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 12:18
    marker-yv: yv-n
  - type: text
    text: 'the many oracles about him, and the repairing of the house of God, indeed they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' written in the annals of the book of the kings. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 12:21
    marker-yv: yv-n
  - type: text
    text: Then Amaziah his son reigned in his place.
