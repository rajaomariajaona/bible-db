    marker: x
    children:
    - type: text
      text: 2 Kin. 12:13
    marker-yv: yv-n
  - type: text
    text: 'they made from it articles for the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', articles for serving and offering, spoons and vessels of gold and silver. And they offered burnt offerings in the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' continually all the days of Jehoiada.'
- type: usfm
