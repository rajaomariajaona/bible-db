document_id: JOS.19,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Simeon’s Inheritance with Judah
  - type: text
    content: 'The '
  - type: note
    content: Judg. 1:3
  - type: text
    content: 'second lot came out for Simeon, for the tribe of the children of Simeon according to their families. '
  - type: note
    content: Josh. 19:9
  - type: text
    content: 'And their inheritance was within the inheritance of the children of Judah. '
  '10':
  - type: text
    content: 'The third lot came out for the children of Zebulun according to their families, and the border of their inheritance was as far as Sarid. '
  '11':
  - type: note
    content: Gen. 49:13
  - type: text
    content: 'Their border went toward the west and to Maralah, went to Dabbasheth, and extended along the brook that is '
  - type: note
    content: Josh. 12:22
  - type: text
    content: 'east of Jokneam. '
  '12':
  - type: text
    content: 'Then from Sarid it went eastward toward the sunrise along the border of Chisloth Tabor, and went out toward '
  - type: note
    content: 1 Chr. 6:72
  - type: text
    content: 'Daberath, bypassing Japhia. '
  '13':
  - type: text
    content: 'And from there it passed along on the east of '
  - type: note
    content: 2 Kin. 14:25
  - type: text
    content: 'Gath Hepher, toward Eth Kazin, and extended to Rimmon, which borders on Neah. '
  '14':
  - type: text
    content: 'Then the border went around it on the north side of Hannathon, and it ended in the Valley of Jiphthah El. '
  '15':
  - type: text
    content: 'Included were Kattath, Nahallal, Shimron, Idalah, and Bethlehem: twelve cities with their villages. '
  '16':
  - type: text
    content: 'This '
  - type: text
    content: was
  - type: text
    content: ' the inheritance of the children of Zebulun according to their families, these cities with their villages.'
  - type: heading
    content: The Land of Issachar
  '17':
  - type: text
    content: 'The fourth lot came out to Issachar, for the children of Issachar according to their families. '
  '18':
  - type: text
    content: 'And their territory went to Jezreel, and '
  - type: text
    content: included
  - type: text
    content: ' Chesulloth, Shunem, '
  '19':
  - type: text
    content: 'Haphraim, Shion, Anaharath, '
  '2':
  - type: note
    content: 1 Chr. 4:28
  - type: text
    content: 'They had in their inheritance Beersheba (Sheba), Moladah, '
  '20':
  - type: text
    content: 'Rabbith, Kishion, Abez, '
  '21':
  - type: text
    content: 'Remeth, En Gannim, En Haddah, and Beth Pazzez. '
  '22':
  - type: text
    content: 'And the border reached to Tabor, Shahazimah, and '
  - type: note
    content: Josh. 15:10; Judg. 1:33
  - type: text
    content: 'Beth Shemesh; their border ended at the Jordan: sixteen cities with their villages. '
  '23':
  - type: text
    content: 'This '
  - type: text
    content: was
  - type: text
    content: ' the inheritance of the tribe of the children of Issachar according to their families, the cities and their villages.'
  - type: heading
    content: The Land of Asher
  '24':
  - type: note
    content: Judg. 1:31, 32
  - type: text
    content: 'The fifth lot came out for the tribe of the children of Asher according to their families. '
  '25':
  - type: text
    content: 'And their territory included Helkath, Hali, Beten, Achshaph, '
  '26':
  - type: text
    content: 'Alammelech, Amad, and Mishal; it reached to '
  - type: note
    content: 1 Sam. 15:12; 1 Kin. 18:20; Is. 33:9; 35:2; Jer. 46:18
  - type: text
    content: 'Mount Carmel westward, along '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: Brook
  - type: text
    content: ' Shihor Libnath. '
  '27':
  - type: text
    content: 'It turned toward the sunrise to Beth Dagon; and it reached to Zebulun and to the Valley of Jiphthah El, then northward beyond Beth Emek and Neiel, bypassing '
  - type: note
    content: 1 Kin. 9:13
  - type: text
    content: 'Cabul '
  - type: text
    content: which
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' on the left, '
  '28':
  - type: text
    content: 'including Ebron, Rehob, Hammon, and Kanah, '
  - type: note
    content: Gen. 10:19; Josh. 11:8; Judg. 1:31; Acts 27:3
  - type: text
    content: 'as far as Greater Sidon. '
  '29':
  - type: text
    content: 'And the border turned to Ramah and to the fortified city of Tyre; then the border turned to Hosah, and ended at the sea by the region of '
  - type: note
    content: Judg. 1:31
  - type: text
    content: 'Achzib. '
  '3':
  - type: text
    content: 'Hazar Shual, Balah, Ezem, '
  '30':
  - type: text
    content: 'Also Ummah, Aphek, and Rehob '
  - type: text
    content: were
  - type: text
    content: ' '
  - type: text
    content: 'included:'
  - type: text
    content: ' twenty-two cities with their villages. '
  '31':
  - type: text
    content: 'This '
  - type: text
    content: was
  - type: text
    content: ' the inheritance of the tribe of the children of Asher according to their families, these cities with their villages.'
  - type: heading
    content: The Land of Naphtali
  '32':
  - type: note
    content: Josh. 19:32–39; Judg. 1:33
  - type: text
    content: 'The sixth lot came out to the children of Naphtali, for the children of Naphtali according to their families. '
  '33':
  - type: text
    content: 'And their border began at Heleph, enclosing the territory from the terebinth tree in Zaanannim, Adami Nekeb, and Jabneel, as far as Lakkum; it ended at the Jordan. '
  '34':
  - type: note
    content: Deut. 33:23
  - type: text
    content: 'From Heleph the border extended westward to Aznoth Tabor, and went out from there toward Hukkok; it adjoined Zebulun on the south side and Asher on the west side, and ended at Judah by the Jordan toward the sunrise. '
  '35':
  - type: text
    content: 'And the fortified cities '
  - type: text
    content: are
  - type: text
    content: ' Ziddim, Zer, Hammath, Rakkath, Chinnereth, '
  '36':
  - type: text
    content: 'Adamah, Ramah, Hazor, '
  '37':
  - type: note
    content: Josh. 20:7
  - type: text
    content: 'Kedesh, Edrei, En Hazor, '
  '38':
  - type: text
    content: 'Iron, Migdal El, Horem, Beth Anath, and Beth Shemesh: nineteen cities with their villages. '
  '39':
  - type: text
    content: 'This '
  - type: text
    content: was
  - type: text
    content: ' the inheritance of the tribe of the children of Naphtali according to their families, the cities and their villages.'
  - type: heading
    content: The Land of Dan
  '4':
  - type: text
    content: 'Eltolad, Bethul, Hormah, '
  '40':
  - type: note
    content: Josh. 19:40–48; Judg. 1:34–36
  - type: text
    content: 'The seventh lot came out for the tribe of the children of Dan according to their families. '
  '41':
  - type: text
    content: 'And the territory of their inheritance was Zorah, '
  - type: note
    content: Josh. 15:33
  - type: text
    content: 'Eshtaol, Ir Shemesh, '
  '42':
  - type: note
    content: Judg. 1:35; 1 Kin. 4:9
  - type: text
    content: 'Shaalabbin, '
  - type: note
    content: Josh. 10:12; 21:24
  - type: text
    content: 'Aijalon, Jethlah, '
  '43':
  - type: text
    content: 'Elon, Timnah, '
  - type: note
    content: Josh. 15:11; Judg. 1:18
  - type: text
    content: 'Ekron, '
  '44':
  - type: text
    content: 'Eltekeh, Gibbethon, Baalath, '
  '45':
  - type: text
    content: 'Jehud, Bene Berak, Gath Rimmon, '
  '46':
  - type: text
    content: 'Me Jarkon, and Rakkon, with the region near Joppa. '
  '47':
  - type: text
    content: 'And the '
  - type: note
    content: Judg. 18
  - type: text
    content: 'border of the children of Dan went beyond these, because the children of Dan went up to fight against Leshem and took it; and they struck it with the edge of the sword, took possession of it, and dwelt in it. They called Leshem, '
  - type: note
    content: Judg. 18:29
  - type: text
    content: 'Dan, after the name of Dan their father. '
  '48':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the inheritance of the tribe of the children of Dan according to their families, these cities with their villages.'
  - type: heading
    content: Joshua’s Inheritance
  '49':
  - type: text
    content: 'When they had made an end of dividing the land as an inheritance according to their borders, the children of Israel gave an inheritance among them to Joshua the son of Nun. '
  '5':
  - type: text
    content: 'Ziklag, Beth Marcaboth, Hazar Susah, '
  '50':
  - type: text
    content: 'According to the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' they gave him the city which he asked for, '
  - type: note
    content: Josh. 24:30
  - type: text
    content: 'Timnath '
  - type: note
    content: 1 Chr. 7:24
  - type: text
    content: Serah in the mountains of Ephraim; and he built the city and dwelt in it.
  '51':
  - type: note
    content: Num. 34:17; Josh. 14:1
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the inheritances which Eleazar the priest, Joshua the son of Nun, and the heads of the fathers of the tribes of the children of Israel divided as an inheritance by lot '
  - type: note
    content: Josh. 18:1, 10
  - type: text
    content: 'in Shiloh before the '
  - type: heading
    content: Lord
  - type: text
    content: ', at the door of the tabernacle of meeting. So they made an end of dividing the country.'
  '6':
  - type: text
    content: 'Beth Lebaoth, and Sharuhen: thirteen cities and their villages; '
  '7':
  - type: text
    content: 'Ain, Rimmon, Ether, and Ashan: four cities and their villages; '
  '8':
  - type: text
    content: 'and all the villages that '
  - type: text
    content: were
  - type: text
    content: ' all around these cities as far as Baalath Beer, '
  - type: note
    content: 1 Sam. 30:27
  - type: text
    content: 'Ramah of the South. This '
  - type: text
    content: was
  - type: text
    content: ' the inheritance of the tribe of the children of Simeon according to their families.'
  '9':
  - type: text
    content: 'The inheritance of the children of Simeon '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: text
    content: included
  - type: text
    content: ' in the share of the children of Judah, for the share of the children of Judah was too much for them. '
  - type: note
    content: Josh. 19:1
  - type: text
    content: 'Therefore the children of Simeon had '
  - type: text
    content: their
  - type: text
    content: ' inheritance within the inheritance of that people.'
  - type: heading
    content: The Land of Zebulun
