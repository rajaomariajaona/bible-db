document_id: JOS.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Simeon’s Inheritance with Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 1:3
    marker-yv: yv-n
  - type: text
    text: 'second lot came out for Simeon, for the tribe of the children of Simeon according to their families. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 19:9
    marker-yv: yv-n
  - type: text
    text: 'And their inheritance was within the inheritance of the children of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 4:28
    marker-yv: yv-n
  - type: text
    text: 'They had in their inheritance Beersheba (Sheba), Moladah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hazar Shual, Balah, Ezem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Eltolad, Bethul, Hormah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ziklag, Beth Marcaboth, Hazar Susah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Beth Lebaoth, and Sharuhen: thirteen cities and their villages; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ain, Rimmon, Ether, and Ashan: four cities and their villages; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and all the villages that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' all around these cities as far as Baalath Beer, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 30:27
    marker-yv: yv-n
  - type: text
    text: 'Ramah of the South. This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the inheritance of the tribe of the children of Simeon according to their families.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The inheritance of the children of Simeon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: included
  - type: text
    text: ' in the share of the children of Judah, for the share of the children of Judah was too much for them. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 19:1
    marker-yv: yv-n
  - type: text
    text: 'Therefore the children of Simeon had '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' inheritance within the inheritance of that people.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land of Zebulun
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The third lot came out for the children of Zebulun according to their families, and the border of their inheritance was as far as Sarid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 49:13
    marker-yv: yv-n
  - type: text
    text: 'Their border went toward the west and to Maralah, went to Dabbasheth, and extended along the brook that is '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 12:22
    marker-yv: yv-n
  - type: text
    text: 'east of Jokneam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then from Sarid it went eastward toward the sunrise along the border of Chisloth Tabor, and went out toward '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 6:72
    marker-yv: yv-n
  - type: text
    text: 'Daberath, bypassing Japhia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And from there it passed along on the east of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 14:25
    marker-yv: yv-n
  - type: text
    text: 'Gath Hepher, toward Eth Kazin, and extended to Rimmon, which borders on Neah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then the border went around it on the north side of Hannathon, and it ended in the Valley of Jiphthah El. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Included were Kattath, Nahallal, Shimron, Idalah, and Bethlehem: twelve cities with their villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the inheritance of the children of Zebulun according to their families, these cities with their villages.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land of Issachar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The fourth lot came out to Issachar, for the children of Issachar according to their families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And their territory went to Jezreel, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: included
  - type: text
    text: ' Chesulloth, Shunem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Haphraim, Shion, Anaharath, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rabbith, Kishion, Abez, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Remeth, En Gannim, En Haddah, and Beth Pazzez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the border reached to Tabor, Shahazimah, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 15:10; Judg. 1:33
    marker-yv: yv-n
  - type: text
    text: 'Beth Shemesh; their border ended at the Jordan: sixteen cities with their villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the inheritance of the tribe of the children of Issachar according to their families, the cities and their villages.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land of Asher
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 1:31, 32
    marker-yv: yv-n
  - type: text
    text: 'The fifth lot came out for the tribe of the children of Asher according to their families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And their territory included Helkath, Hali, Beten, Achshaph, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alammelech, Amad, and Mishal; it reached to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 15:12; 1 Kin. 18:20; Is. 33:9; 35:2; Jer. 46:18
    marker-yv: yv-n
  - type: text
    text: 'Mount Carmel westward, along '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Brook
  - type: text
    text: ' Shihor Libnath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'It turned toward the sunrise to Beth Dagon; and it reached to Zebulun and to the Valley of Jiphthah El, then northward beyond Beth Emek and Neiel, bypassing '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 9:13
    marker-yv: yv-n
  - type: text
    text: 'Cabul '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' on the left, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'including Ebron, Rehob, Hammon, and Kanah, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 10:19; Josh. 11:8; Judg. 1:31; Acts 27:3
    marker-yv: yv-n
  - type: text
    text: 'as far as Greater Sidon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And the border turned to Ramah and to the fortified city of Tyre; then the border turned to Hosah, and ended at the sea by the region of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 1:31
    marker-yv: yv-n
  - type: text
    text: 'Achzib. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Also Ummah, Aphek, and Rehob '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'included:'
  - type: text
    text: ' twenty-two cities with their villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the inheritance of the tribe of the children of Asher according to their families, these cities with their villages.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land of Naphtali
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 19:32–39; Judg. 1:33
    marker-yv: yv-n
  - type: text
    text: 'The sixth lot came out to the children of Naphtali, for the children of Naphtali according to their families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And their border began at Heleph, enclosing the territory from the terebinth tree in Zaanannim, Adami Nekeb, and Jabneel, as far as Lakkum; it ended at the Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 33:23
    marker-yv: yv-n
  - type: text
    text: 'From Heleph the border extended westward to Aznoth Tabor, and went out from there toward Hukkok; it adjoined Zebulun on the south side and Asher on the west side, and ended at Judah by the Jordan toward the sunrise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And the fortified cities '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' Ziddim, Zer, Hammath, Rakkath, Chinnereth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Adamah, Ramah, Hazor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 20:7
    marker-yv: yv-n
  - type: text
    text: 'Kedesh, Edrei, En Hazor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Iron, Migdal El, Horem, Beth Anath, and Beth Shemesh: nineteen cities with their villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the inheritance of the tribe of the children of Naphtali according to their families, the cities and their villages.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land of Dan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 19:40–48; Judg. 1:34–36
    marker-yv: yv-n
  - type: text
    text: 'The seventh lot came out for the tribe of the children of Dan according to their families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And the territory of their inheritance was Zorah, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 15:33
    marker-yv: yv-n
  - type: text
    text: 'Eshtaol, Ir Shemesh, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 1:35; 1 Kin. 4:9
    marker-yv: yv-n
  - type: text
    text: 'Shaalabbin, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 10:12; 21:24
    marker-yv: yv-n
  - type: text
    text: 'Aijalon, Jethlah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Elon, Timnah, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 15:11; Judg. 1:18
    marker-yv: yv-n
  - type: text
    text: 'Ekron, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Eltekeh, Gibbethon, Baalath, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Jehud, Bene Berak, Gath Rimmon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Me Jarkon, and Rakkon, with the region near Joppa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'And the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 18
    marker-yv: yv-n
  - type: text
    text: 'border of the children of Dan went beyond these, because the children of Dan went up to fight against Leshem and took it; and they struck it with the edge of the sword, took possession of it, and dwelt in it. They called Leshem, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 18:29
    marker-yv: yv-n
  - type: text
    text: 'Dan, after the name of Dan their father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the inheritance of the tribe of the children of Dan according to their families, these cities with their villages.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joshua’s Inheritance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'When they had made an end of dividing the land as an inheritance according to their borders, the children of Israel gave an inheritance among them to Joshua the son of Nun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'According to the word of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' they gave him the city which he asked for, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 24:30
    marker-yv: yv-n
  - type: text
    text: 'Timnath '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 7:24
    marker-yv: yv-n
  - type: text
    text: Serah in the mountains of Ephraim; and he built the city and dwelt in it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 34:17; Josh. 14:1
    marker-yv: yv-n
  - type: text
    text: 'These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the inheritances which Eleazar the priest, Joshua the son of Nun, and the heads of the fathers of the tribes of the children of Israel divided as an inheritance by lot '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 18:1, 10
    marker-yv: yv-n
  - type: text
    text: 'in Shiloh before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', at the door of the tabernacle of meeting. So they made an end of dividing the country.'
