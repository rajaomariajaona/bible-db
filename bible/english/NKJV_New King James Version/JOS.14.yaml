document_id: JOS.14,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land Divided West of the Jordan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: areas
    - type: text
      text: ' which the children of Israel inherited in the land of Canaan, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 34:16–29
      marker-yv: yv-n
    - type: text
      text: 'which Eleazar the priest, Joshua the son of Nun, and the heads of the fathers of the tribes of the children of Israel distributed as an inheritance to them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now, behold, the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has kept me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:24, 30, 38
      marker-yv: yv-n
    - type: text
      text: 'alive, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 5:6; Neh. 9:21
      marker-yv: yv-n
    - type: text
      text: 'as He said, these forty-five years, ever since the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke this word to Moses while Israel wandered in the wilderness; and now, here I am this day, eighty-five years old. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 34:7
      marker-yv: yv-n
    - type: text
      text: 'As yet I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' strong this day as on the day that Moses sent me; just as my strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' then, so now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my strength for war, both '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 31:2
      marker-yv: yv-n
    - type: text
      text: 'for going out and for coming in. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, give me this mountain of which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke in that day; for you heard in that day how '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:28, 33
      marker-yv: yv-n
    - type: text
      text: 'the Anakim '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' there, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' the cities '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fortified. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 8:31
      marker-yv: yv-n
    - type: text
      text: 'It may be that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' with me, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:14; Judg. 1:20
      marker-yv: yv-n
    - type: text
      text: 'I shall be able to drive them out as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 22:6
      marker-yv: yv-n
    - type: text
      text: 'blessed him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 10:37; 15:13
      marker-yv: yv-n
    - type: text
      text: 'and gave Hebron to Caleb the son of Jephunneh as an inheritance. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 21:12
      marker-yv: yv-n
    - type: text
      text: 'Hebron therefore became the inheritance of Caleb the son of Jephunneh the Kenizzite to this day, because he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 14:8, 9
      marker-yv: yv-n
    - type: text
      text: 'wholly followed the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 23:2; Josh. 15:13
      marker-yv: yv-n
    - type: text
      text: the name of Hebron formerly was Kirjath Arba (
    - type: usfm
      marker: it
      children:
      - type: text
        text: Arba
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the greatest man among the Anakim).'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 11:23
      marker-yv: yv-n
    - type: text
      text: Then the land had rest from war.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their inheritance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 26:55; 33:54; 34:13; Ps. 16:5
      marker-yv: yv-n
    - type: text
      text: 'by lot, as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded by the hand of Moses, for the nine tribes and the half-tribe. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:33; Josh. 13:8, 32, 33
      marker-yv: yv-n
    - type: text
      text: 'For Moses had given the inheritance of the two tribes and the half-tribe on the other side of the Jordan; but to the Levites he had given no inheritance among them. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:51; 46:20; 48:1, 5; Num. 26:28; 2 Chr. 30:1
      marker-yv: yv-n
    - type: text
      text: 'the children of Joseph were two tribes: Manasseh and Ephraim. And they gave no part to the Levites in the land, except '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:2–8; Josh. 21:1–42
      marker-yv: yv-n
    - type: text
      text: 'cities to dwell '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in,
    - type: text
      text: ' with their common-lands for their livestock and their property. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:2; Josh. 21:2
      marker-yv: yv-n
    - type: text
      text: 'As the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses, so the children of Israel did; and they divided the land.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Caleb Inherits Hebron
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the children of Judah came to Joshua in Gilgal. And Caleb the son of Jephunneh the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:11, 12
      marker-yv: yv-n
    - type: text
      text: 'Kenizzite said to him: “You know '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:24, 30
      marker-yv: yv-n
    - type: text
      text: 'the word which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses the man of God concerning '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:26
      marker-yv: yv-n
    - type: text
      text: 'you and me in Kadesh Barnea. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' forty years old when Moses the servant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:6, 17; 14:6
      marker-yv: yv-n
    - type: text
      text: 'sent me from Kadesh Barnea to spy out the land, and I brought back word to him as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in my heart. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:31, 32; Deut. 1:28
      marker-yv: yv-n
    - type: text
      text: 'my brethren who went up with me made the heart of the people melt, but I wholly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:24; Deut. 1:36
      marker-yv: yv-n
    - type: text
      text: 'followed the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses swore on that day, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:23, 24
      marker-yv: yv-n
    - type: text
      text: '‘Surely the land '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:22; Deut. 1:36
      marker-yv: yv-n
    - type: text
      text: 'where your foot has trodden shall be your inheritance and your children’s forever, because you have wholly followed the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God.’ '
