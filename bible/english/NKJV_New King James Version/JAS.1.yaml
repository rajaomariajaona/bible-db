document_id: JAS.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greeting to the Twelve Tribes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'James, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 12:17
    marker-yv: yv-n
  - type: text
    text: a bondservant of God and of the Lord Jesus Christ,
- type: usfm
  marker: p
  children:
  - type: text
    text: 'To the twelve tribes which are scattered abroad:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Greetings.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Profiting from Trials
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'My brethren, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 5:41
    marker-yv: yv-n
  - type: text
    text: 'count it all joy '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Pet. 1:6
    marker-yv: yv-n
  - type: text
    text: 'when you fall into various trials, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 5:3–5
    marker-yv: yv-n
  - type: text
    text: 'knowing that the testing of your faith produces patience. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But let patience have '
  - type: usfm
    marker: it
    children:
    - type: text
      text: its
  - type: text
    text: ' perfect work, that you may be perfect and complete, lacking nothing. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 3:9; James 3:17
    marker-yv: yv-n
  - type: text
    text: 'If any of you lacks wisdom, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 2:3–6; Matt. 7:7
    marker-yv: yv-n
  - type: text
    text: 'let him ask of God, who gives to all liberally and without reproach, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 29:12
    marker-yv: yv-n
  - type: text
    text: 'it will be given to him. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Mark 11:23, 24); Acts 10:20
    marker-yv: yv-n
  - type: text
    text: 'But let him ask in faith, with no doubting, for he who doubts is like a wave of the sea driven and tossed by the wind. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For let not that man suppose that he will receive anything from the Lord; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: it
    children:
    - type: text
      text: he
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: James 4:8
    marker-yv: yv-n
  - type: text
    text: a double-minded man, unstable in all his ways.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Perspective of Rich and Poor
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Let the lowly brother glory in his exaltation, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'but the rich in his humiliation, because '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 14:2
    marker-yv: yv-n
  - type: text
    text: 'as a flower of the field he will pass away. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For no sooner has the sun risen with a burning heat than it withers the grass; its flower falls, and its beautiful appearance perishes. So the rich man also will fade away in his pursuits.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loving God Under Trials
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 5:17; Luke 6:22; Heb. 10:36; James 5:11; (1 Pet. 3:14; 4:14)
    marker-yv: yv-n
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the man who endures temptation; for when he has been approved, he will receive '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 9:25)
    marker-yv: yv-n
  - type: text
    text: 'the crown of life '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 10:22
    marker-yv: yv-n
  - type: text
    text: 'which the Lord has promised to those who love Him. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Let no one say when he is tempted, “I am tempted by God”; for God cannot be tempted by evil, nor does He Himself tempt anyone. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But each one is tempted when he is drawn away by his own desires and enticed. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 15:35; Ps. 7:14; Is. 59:4
    marker-yv: yv-n
  - type: text
    text: 'when desire has conceived, it gives birth to sin; and sin, when it is full-grown, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 5:12; 6:23)
    marker-yv: yv-n
  - type: text
    text: brings forth death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Do not be deceived, my beloved brethren. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 3:27
    marker-yv: yv-n
  - type: text
    text: 'Every good gift and every perfect gift is from above, and comes down from the Father of lights, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 23:19
    marker-yv: yv-n
  - type: text
    text: 'with whom there is no variation or shadow of turning. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 1:13
    marker-yv: yv-n
  - type: text
    text: 'Of His own will He brought us forth by the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 6:7; 1 Thess. 2:13; 2 Tim. 2:15; (1 Pet. 1:3, 23)
    marker-yv: yv-n
  - type: text
    text: 'word of truth, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Eph. 1:12, 13); Heb. 12:23; Rev. 14:4
    marker-yv: yv-n
  - type: text
    text: that we might be a kind of firstfruits of His creatures.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Qualities Needed in Trials
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So then, my beloved brethren, let every man be swift to hear, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 10:19; 17:27
    marker-yv: yv-n
  - type: text
    text: 'slow to speak, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 14:17; 16:32; Eccl. 7:9
    marker-yv: yv-n
  - type: text
    text: 'slow to wrath; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: for the wrath of man does not produce the righteousness of God.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Doers—Not Hearers Only
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Therefore '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 3:8
    marker-yv: yv-n
  - type: text
    text: 'lay aside all filthiness and overflow of wickedness, and receive with meekness the implanted word, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 13:26
    marker-yv: yv-n
  - type: text
    text: which is able to save your souls.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 7:21–28; Luke 6:46–49; (Rom. 2:13; James 1:22–25; 2:14–20)
    marker-yv: yv-n
  - type: text
    text: 'be doers of the word, and not hearers only, deceiving yourselves. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 6:47
    marker-yv: yv-n
  - type: text
    text: 'if anyone is a hearer of the word and not a doer, he is like a man observing his natural face in a mirror; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'for he observes himself, goes away, and immediately forgets what kind of man he was. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 8:32; Rom. 8:2; 2 Cor. 3:17); Gal. 2:4; 6:2; James 2:12; 1 Pet. 2:16
    marker-yv: yv-n
  - type: text
    text: 'he who looks into the perfect law of liberty and continues '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it,
  - type: text
    text: ' and is not a forgetful hearer but a doer of the work, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 13:17
    marker-yv: yv-n
  - type: text
    text: this one will be blessed in what he does.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'If anyone among you thinks he is religious, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 34:13
    marker-yv: yv-n
  - type: text
    text: 'does not bridle his tongue but deceives his own heart, this one’s religion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' useless. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 25:34–36
    marker-yv: yv-n
  - type: text
    text: 'Pure and undefiled religion before God and the Father is this: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 1:17
    marker-yv: yv-n
  - type: text
    text: 'to visit orphans and widows in their trouble, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 12:2)
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to keep oneself unspotted from the world.'
