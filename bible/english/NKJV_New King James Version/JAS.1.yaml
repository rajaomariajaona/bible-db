document_id: JAS.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting to the Twelve Tribes
  - type: text
    content: 'James, '
  - type: note
    content: Acts 12:17
  - type: text
    content: a bondservant of God and of the Lord Jesus Christ,
  - type: text
    content: 'To the twelve tribes which are scattered abroad:'
  - type: text
    content: Greetings.
  - type: heading
    content: Profiting from Trials
  '10':
  - type: text
    content: 'but the rich in his humiliation, because '
  - type: note
    content: Job 14:2
  - type: text
    content: 'as a flower of the field he will pass away. '
  '11':
  - type: text
    content: For no sooner has the sun risen with a burning heat than it withers the grass; its flower falls, and its beautiful appearance perishes. So the rich man also will fade away in his pursuits.
  - type: heading
    content: Loving God Under Trials
  '12':
  - type: note
    content: Job 5:17; Luke 6:22; Heb. 10:36; James 5:11; (1 Pet. 3:14; 4:14)
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' the man who endures temptation; for when he has been approved, he will receive '
  - type: note
    content: (1 Cor. 9:25)
  - type: text
    content: 'the crown of life '
  - type: note
    content: Matt. 10:22
  - type: text
    content: 'which the Lord has promised to those who love Him. '
  '13':
  - type: text
    content: 'Let no one say when he is tempted, “I am tempted by God”; for God cannot be tempted by evil, nor does He Himself tempt anyone. '
  '14':
  - type: text
    content: 'But each one is tempted when he is drawn away by his own desires and enticed. '
  '15':
  - type: text
    content: 'Then, '
  - type: note
    content: Job 15:35; Ps. 7:14; Is. 59:4
  - type: text
    content: 'when desire has conceived, it gives birth to sin; and sin, when it is full-grown, '
  - type: note
    content: (Rom. 5:12; 6:23)
  - type: text
    content: brings forth death.
  '16':
  - type: text
    content: 'Do not be deceived, my beloved brethren. '
  '17':
  - type: note
    content: John 3:27
  - type: text
    content: 'Every good gift and every perfect gift is from above, and comes down from the Father of lights, '
  - type: note
    content: Num. 23:19
  - type: text
    content: 'with whom there is no variation or shadow of turning. '
  '18':
  - type: note
    content: John 1:13
  - type: text
    content: 'Of His own will He brought us forth by the '
  - type: note
    content: 2 Cor. 6:7; 1 Thess. 2:13; 2 Tim. 2:15; (1 Pet. 1:3, 23)
  - type: text
    content: 'word of truth, '
  - type: note
    content: (Eph. 1:12, 13); Heb. 12:23; Rev. 14:4
  - type: text
    content: that we might be a kind of firstfruits of His creatures.
  - type: heading
    content: Qualities Needed in Trials
  '19':
  - type: text
    content: 'So then, my beloved brethren, let every man be swift to hear, '
  - type: note
    content: Prov. 10:19; 17:27
  - type: text
    content: 'slow to speak, '
  - type: note
    content: Prov. 14:17; 16:32; Eccl. 7:9
  - type: text
    content: 'slow to wrath; '
  '2':
  - type: text
    content: 'My brethren, '
  - type: note
    content: Acts 5:41
  - type: text
    content: 'count it all joy '
  - type: note
    content: 1 Pet. 1:6
  - type: text
    content: 'when you fall into various trials, '
  '20':
  - type: text
    content: for the wrath of man does not produce the righteousness of God.
  - type: heading
    content: Doers—Not Hearers Only
  '21':
  - type: text
    content: 'Therefore '
  - type: note
    content: Col. 3:8
  - type: text
    content: 'lay aside all filthiness and overflow of wickedness, and receive with meekness the implanted word, '
  - type: note
    content: Acts 13:26
  - type: text
    content: which is able to save your souls.
  '22':
  - type: text
    content: 'But '
  - type: note
    content: Matt. 7:21–28; Luke 6:46–49; (Rom. 2:13; James 1:22–25; 2:14–20)
  - type: text
    content: 'be doers of the word, and not hearers only, deceiving yourselves. '
  '23':
  - type: text
    content: 'For '
  - type: note
    content: Luke 6:47
  - type: text
    content: 'if anyone is a hearer of the word and not a doer, he is like a man observing his natural face in a mirror; '
  '24':
  - type: text
    content: 'for he observes himself, goes away, and immediately forgets what kind of man he was. '
  '25':
  - type: text
    content: 'But '
  - type: note
    content: (John 8:32; Rom. 8:2; 2 Cor. 3:17); Gal. 2:4; 6:2; James 2:12; 1 Pet. 2:16
  - type: text
    content: 'he who looks into the perfect law of liberty and continues '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: text
    content: it,
  - type: text
    content: ' and is not a forgetful hearer but a doer of the work, '
  - type: note
    content: John 13:17
  - type: text
    content: this one will be blessed in what he does.
  '26':
  - type: text
    content: 'If anyone among you thinks he is religious, and '
  - type: note
    content: Ps. 34:13
  - type: text
    content: 'does not bridle his tongue but deceives his own heart, this one’s religion '
  - type: text
    content: is
  - type: text
    content: ' useless. '
  '27':
  - type: note
    content: Matt. 25:34–36
  - type: text
    content: 'Pure and undefiled religion before God and the Father is this: '
  - type: note
    content: Is. 1:17
  - type: text
    content: 'to visit orphans and widows in their trouble, '
  - type: note
    content: (Rom. 12:2)
  - type: text
    content: and
  - type: text
    content: ' to keep oneself unspotted from the world.'
  '3':
  - type: note
    content: Rom. 5:3–5
  - type: text
    content: 'knowing that the testing of your faith produces patience. '
  '4':
  - type: text
    content: 'But let patience have '
  - type: text
    content: its
  - type: text
    content: ' perfect work, that you may be perfect and complete, lacking nothing. '
  '5':
  - type: note
    content: 1 Kin. 3:9; James 3:17
  - type: text
    content: 'If any of you lacks wisdom, '
  - type: note
    content: Prov. 2:3–6; Matt. 7:7
  - type: text
    content: 'let him ask of God, who gives to all liberally and without reproach, and '
  - type: note
    content: Jer. 29:12
  - type: text
    content: 'it will be given to him. '
  '6':
  - type: note
    content: (Mark 11:23, 24); Acts 10:20
  - type: text
    content: 'But let him ask in faith, with no doubting, for he who doubts is like a wave of the sea driven and tossed by the wind. '
  '7':
  - type: text
    content: 'For let not that man suppose that he will receive anything from the Lord; '
  '8':
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: James 4:8
  - type: text
    content: a double-minded man, unstable in all his ways.
  - type: heading
    content: The Perspective of Rich and Poor
  '9':
  - type: text
    content: 'Let the lowly brother glory in his exaltation, '
