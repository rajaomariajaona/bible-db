document_id: GAL.5,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Christian Liberty
  - type: note
    content: Phil. 4:1
  - type: text
    content: 'Stand fast therefore in the liberty by which Christ has made us free, and do not be entangled again with a '
  - type: note
    content: Acts 15:10; Gal. 2:4
  - type: text
    content: 'yoke of bondage. '
  '10':
  - type: text
    content: I have confidence in you, in the Lord, that you will have no other mind; but he who troubles you shall bear his judgment, whoever he is.
  '11':
  - type: text
    content: 'And I, brethren, if I still preach circumcision, '
  - type: note
    content: 1 Cor. 15:30
  - type: text
    content: 'why do I still suffer persecution? Then '
  - type: note
    content: Rom. 9:33; (1 Cor. 1:23)
  - type: text
    content: 'the offense of the cross has ceased. '
  '12':
  - type: note
    content: Josh. 7:25
  - type: text
    content: 'I could wish that those '
  - type: note
    content: Acts 15:1, 2
  - type: text
    content: who trouble you would even cut themselves off!
  '13':
  - type: text
    content: 'For you, brethren, have been called to liberty; only '
  - type: note
    content: (Rom. 8:2); 1 Cor. 8:9; Gal. 5:1
  - type: text
    content: 'do not '
  - type: text
    content: use
  - type: text
    content: ' liberty as an '
  - type: note
    content: Rom. 6:1; 1 Pet. 2:16
  - type: text
    content: 'opportunity for the flesh, but '
  - type: note
    content: 1 Cor. 9:19; Eph. 5:21
  - type: text
    content: 'through love serve one another. '
  '14':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 7:12; 22:40; Rom. 13:8, 10; Gal. 6:2
  - type: text
    content: 'all the law is fulfilled in one word, '
  - type: text
    content: even
  - type: text
    content: ' in this: '
  - type: note
    content: Lev. 19:18; Matt. 22:39; Rom. 13:9
  - type: text
    content: '“You shall love your neighbor as yourself.” '
  '15':
  - type: text
    content: But if you bite and devour one another, beware lest you be consumed by one another!
  - type: heading
    content: Walking in the Spirit
  '16':
  - type: text
    content: 'I say then: '
  - type: note
    content: Rom. 6:12
  - type: text
    content: 'Walk in the Spirit, and you shall not fulfill the lust of the flesh. '
  '17':
  - type: text
    content: 'For '
  - type: note
    content: Rom. 7:18, 22, 23; 8:5
  - type: text
    content: 'the flesh lusts against the Spirit, and the Spirit against the flesh; and these are contrary to one another, '
  - type: note
    content: Rom. 7:15
  - type: text
    content: 'so that you do not do the things that you wish. '
  '18':
  - type: text
    content: 'But '
  - type: note
    content: (Rom. 6:14; 7:4; 8:14; 1 Tim. 1:9)
  - type: text
    content: if you are led by the Spirit, you are not under the law.
  '19':
  - type: text
    content: 'Now '
  - type: note
    content: Rom. 1:26–31; Eph. 5:3, 11; 2 Tim. 3:2–4
  - type: text
    content: 'the works of the flesh are evident, which are: adultery, fornication, uncleanness, lewdness, '
  '2':
  - type: text
    content: 'Indeed I, Paul, say to you that '
  - type: note
    content: Acts 15:1; Gal. 5:3, 6, 11
  - type: text
    content: 'if you become circumcised, Christ will profit you nothing. '
  '20':
  - type: text
    content: 'idolatry, sorcery, hatred, contentions, jealousies, outbursts of wrath, selfish ambitions, dissensions, heresies, '
  '21':
  - type: text
    content: 'envy, murders, drunkenness, revelries, and the like; of which I tell you beforehand, just as I also told '
  - type: text
    content: you
  - type: text
    content: ' in time past, that '
  - type: note
    content: 1 Cor. 6:9, 10
  - type: text
    content: those who practice such things will not inherit the kingdom of God.
  '22':
  - type: text
    content: 'But '
  - type: note
    content: (John 15:2)
  - type: text
    content: 'the fruit of the Spirit is '
  - type: note
    content: (Rom. 5:1–5; 1 Cor. 13:4; Col. 3:12–15)
  - type: text
    content: 'love, joy, peace, longsuffering, kindness, '
  - type: note
    content: Rom. 15:14
  - type: text
    content: 'goodness, '
  - type: note
    content: 1 Cor. 13:7
  - type: text
    content: 'faithfulness, '
  '23':
  - type: text
    content: 'gentleness, self-control. '
  - type: note
    content: 1 Tim. 1:9
  - type: text
    content: 'Against such there is no law. '
  '24':
  - type: text
    content: 'And those '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' Christ’s '
  - type: note
    content: Rom. 6:6; (Gal. 2:20; 6:14)
  - type: text
    content: 'have crucified the flesh with its passions and desires. '
  '25':
  - type: note
    content: (Rom. 8:4, 5)
  - type: text
    content: 'If we live in the Spirit, let us also walk in the Spirit. '
  '26':
  - type: note
    content: Phil. 2:3
  - type: text
    content: Let us not become conceited, provoking one another, envying one another.
  '3':
  - type: text
    content: 'And I testify again to every man who becomes circumcised '
  - type: note
    content: (Deut. 27:26; Rom. 2:25; Gal. 3:10)
  - type: text
    content: 'that he is a debtor to keep the whole law. '
  '4':
  - type: note
    content: (Rom. 9:31)
  - type: text
    content: 'You have become estranged from Christ, you who '
  - type: text
    content: attempt
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' be justified by law; '
  - type: note
    content: Heb. 12:15; 2 Pet. 3:17
  - type: text
    content: 'you have fallen from grace. '
  '5':
  - type: text
    content: 'For we through the Spirit eagerly '
  - type: note
    content: Rom. 8:24
  - type: text
    content: 'wait for the hope of righteousness by faith. '
  '6':
  - type: text
    content: 'For '
  - type: note
    content: (1 Cor. 7:19; Gal. 6:15; Col. 3:11)
  - type: text
    content: 'in Christ Jesus neither circumcision nor uncircumcision avails anything, but '
  - type: note
    content: Col. 1:4; 1 Thess. 1:3; (James 2:18, 20, 22)
  - type: text
    content: faith working through love.
  - type: heading
    content: Love Fulfills the Law
  '7':
  - type: text
    content: 'You '
  - type: note
    content: 1 Cor. 9:24
  - type: text
    content: 'ran well. Who hindered you from obeying the truth? '
  '8':
  - type: text
    content: 'This persuasion does not '
  - type: text
    content: come
  - type: text
    content: ' from Him who calls you. '
  '9':
  - type: note
    content: 1 Cor. 5:6
  - type: text
    content: 'A little leaven leavens the whole lump. '
