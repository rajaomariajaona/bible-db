document_id: GAL.5,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christian Liberty
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 4:1
      marker-yv: yv-n
    - type: text
      text: 'Stand fast therefore in the liberty by which Christ has made us free, and do not be entangled again with a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 15:10; Gal. 2:4
      marker-yv: yv-n
    - type: text
      text: 'yoke of bondage. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I have confidence in you, in the Lord, that you will have no other mind; but he who troubles you shall bear his judgment, whoever he is.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I, brethren, if I still preach circumcision, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:30
      marker-yv: yv-n
    - type: text
      text: 'why do I still suffer persecution? Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 9:33; (1 Cor. 1:23)
      marker-yv: yv-n
    - type: text
      text: 'the offense of the cross has ceased. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 7:25
      marker-yv: yv-n
    - type: text
      text: 'I could wish that those '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 15:1, 2
      marker-yv: yv-n
    - type: text
      text: who trouble you would even cut themselves off!
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you, brethren, have been called to liberty; only '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 8:2); 1 Cor. 8:9; Gal. 5:1
      marker-yv: yv-n
    - type: text
      text: 'do not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: use
    - type: text
      text: ' liberty as an '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 6:1; 1 Pet. 2:16
      marker-yv: yv-n
    - type: text
      text: 'opportunity for the flesh, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 9:19; Eph. 5:21
      marker-yv: yv-n
    - type: text
      text: 'through love serve one another. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 7:12; 22:40; Rom. 13:8, 10; Gal. 6:2
      marker-yv: yv-n
    - type: text
      text: 'all the law is fulfilled in one word, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' in this: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:18; Matt. 22:39; Rom. 13:9
      marker-yv: yv-n
    - type: text
      text: '“You shall love your neighbor as yourself.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if you bite and devour one another, beware lest you be consumed by one another!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Walking in the Spirit
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I say then: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 6:12
      marker-yv: yv-n
    - type: text
      text: 'Walk in the Spirit, and you shall not fulfill the lust of the flesh. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 7:18, 22, 23; 8:5
      marker-yv: yv-n
    - type: text
      text: 'the flesh lusts against the Spirit, and the Spirit against the flesh; and these are contrary to one another, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 7:15
      marker-yv: yv-n
    - type: text
      text: 'so that you do not do the things that you wish. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 6:14; 7:4; 8:14; 1 Tim. 1:9)
      marker-yv: yv-n
    - type: text
      text: if you are led by the Spirit, you are not under the law.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:26–31; Eph. 5:3, 11; 2 Tim. 3:2–4
      marker-yv: yv-n
    - type: text
      text: 'the works of the flesh are evident, which are: adultery, fornication, uncleanness, lewdness, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indeed I, Paul, say to you that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 15:1; Gal. 5:3, 6, 11
      marker-yv: yv-n
    - type: text
      text: 'if you become circumcised, Christ will profit you nothing. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'idolatry, sorcery, hatred, contentions, jealousies, outbursts of wrath, selfish ambitions, dissensions, heresies, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'envy, murders, drunkenness, revelries, and the like; of which I tell you beforehand, just as I also told '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' in time past, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 6:9, 10
      marker-yv: yv-n
    - type: text
      text: those who practice such things will not inherit the kingdom of God.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 15:2)
      marker-yv: yv-n
    - type: text
      text: 'the fruit of the Spirit is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 5:1–5; 1 Cor. 13:4; Col. 3:12–15)
      marker-yv: yv-n
    - type: text
      text: 'love, joy, peace, longsuffering, kindness, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 15:14
      marker-yv: yv-n
    - type: text
      text: 'goodness, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 13:7
      marker-yv: yv-n
    - type: text
      text: 'faithfulness, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'gentleness, self-control. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 1:9
      marker-yv: yv-n
    - type: text
      text: 'Against such there is no law. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And those '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' Christ’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 6:6; (Gal. 2:20; 6:14)
      marker-yv: yv-n
    - type: text
      text: 'have crucified the flesh with its passions and desires. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 8:4, 5)
      marker-yv: yv-n
    - type: text
      text: 'If we live in the Spirit, let us also walk in the Spirit. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 2:3
      marker-yv: yv-n
    - type: text
      text: Let us not become conceited, provoking one another, envying one another.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I testify again to every man who becomes circumcised '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 27:26; Rom. 2:25; Gal. 3:10)
      marker-yv: yv-n
    - type: text
      text: 'that he is a debtor to keep the whole law. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 9:31)
      marker-yv: yv-n
    - type: text
      text: 'You have become estranged from Christ, you who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: attempt
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' be justified by law; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 12:15; 2 Pet. 3:17
      marker-yv: yv-n
    - type: text
      text: 'you have fallen from grace. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we through the Spirit eagerly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 8:24
      marker-yv: yv-n
    - type: text
      text: 'wait for the hope of righteousness by faith. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 7:19; Gal. 6:15; Col. 3:11)
      marker-yv: yv-n
    - type: text
      text: 'in Christ Jesus neither circumcision nor uncircumcision avails anything, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 1:4; 1 Thess. 1:3; (James 2:18, 20, 22)
      marker-yv: yv-n
    - type: text
      text: faith working through love.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Love Fulfills the Law
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 9:24
      marker-yv: yv-n
    - type: text
      text: 'ran well. Who hindered you from obeying the truth? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This persuasion does not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' from Him who calls you. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 5:6
      marker-yv: yv-n
    - type: text
      text: 'A little leaven leavens the whole lump. '
