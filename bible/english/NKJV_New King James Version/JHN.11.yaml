document_id: JHN.11,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Lazarus
  - type: text
    content: 'Now a certain '
  - type: text
    content: man
  - type: text
    content: ' was sick, Lazarus of Bethany, the town of '
  - type: note
    content: Luke 10:38, 39; John 11:5, 19
  - type: text
    content: 'Mary and her sister Martha. '
  '10':
  - type: text
    content: 'But '
  - type: note
    content: John 12:35
  - type: text
    content: if one walks in the night, he stumbles, because the light is not in him.”
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'These things He said, and after that He said to them, '
  - type: text
    content: '“Our friend Lazarus '
  - type: note
    content: Deut. 31:16; (Dan. 12:2); Matt. 9:24; Acts 7:60; (1 Cor. 15:18, 51)
  - type: text
    content: sleeps, but I go that I may wake him up.”
  '12':
  - type: text
    content: 'Then His disciples said, “Lord, if he sleeps he will get well.” '
  '13':
  - type: text
    content: However, Jesus spoke of his death, but they thought that He was speaking about taking rest in sleep.
  '14':
  - type: text
    content: 'Then Jesus said to them plainly, '
  - type: text
    content: “Lazarus is dead.
  - type: text
    content: ' '
  '15':
  - type: text
    content: And I am glad for your sakes that I was not there, that you may believe. Nevertheless let us go to him.”
  '16':
  - type: text
    content: 'Then '
  - type: note
    content: Matt. 10:3; Mark 3:18; Luke 6:15; John 14:5; 20:26–28; Acts 1:13
  - type: text
    content: Thomas, who is called the Twin, said to his fellow disciples, “Let us also go, that we may die with Him.”
  - type: heading
    content: I Am the Resurrection and the Life
  '17':
  - type: text
    content: 'So when Jesus came, He found that he had already been in the tomb four days. '
  '18':
  - type: text
    content: 'Now Bethany was near Jerusalem, about two miles away. '
  '19':
  - type: text
    content: And many of the Jews had joined the women around Martha and Mary, to comfort them concerning their brother.
  '2':
  - type: note
    content: Matt. 26:7
  - type: text
    content: 'It was '
  - type: text
    content: that
  - type: text
    content: ' Mary who anointed the Lord with fragrant oil and wiped His feet with her hair, whose brother Lazarus was sick. '
  '20':
  - type: text
    content: 'Now Martha, as soon as she heard that Jesus was coming, went and met Him, but Mary was sitting in the house. '
  '21':
  - type: text
    content: 'Now Martha said to Jesus, “Lord, if You had been here, my brother would not have died. '
  '22':
  - type: text
    content: 'But even now I know that '
  - type: note
    content: (John 9:31; 11:41)
  - type: text
    content: whatever You ask of God, God will give You.”
  '23':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: “Your brother will rise again.”
  '24':
  - type: text
    content: 'Martha said to Him, '
  - type: note
    content: (Luke 14:14; John 5:29)
  - type: text
    content: “I know that he will rise again in the resurrection at the last day.”
  '25':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: '“I am '
  - type: note
    content: John 5:21; 6:39, 40, 44; (Rev. 1:18)
  - type: text
    content: 'the resurrection and the life. '
  - type: note
    content: John 3:16, 36; 1 John 5:10
  - type: text
    content: 'He who believes in Me, though he may '
  - type: note
    content: 1 Cor. 15:22; (Heb. 9:27)
  - type: text
    content: die, he shall live.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And whoever lives and believes in Me shall never die. Do you believe this?”
  '27':
  - type: text
    content: 'She said to Him, “Yes, Lord, '
  - type: note
    content: Matt. 16:16; Luke 2:11; John 4:42; 6:14, 69
  - type: text
    content: I believe that You are the Christ, the Son of God, who is to come into the world.”
  - type: heading
    content: Jesus and Death, the Last Enemy
  '28':
  - type: text
    content: 'And when she had said these things, she went her way and secretly called Mary her sister, saying, “The Teacher has come and is calling for you.” '
  '29':
  - type: text
    content: 'As soon as she heard '
  - type: text
    content: that,
  - type: text
    content: ' she arose quickly and came to Him. '
  '3':
  - type: text
    content: Therefore the sisters sent to Him, saying, “Lord, behold, he whom You love is sick.”
  '30':
  - type: text
    content: 'Now Jesus had not yet come into the town, but was in the place where Martha met Him. '
  '31':
  - type: note
    content: John 11:19, 33
  - type: text
    content: Then the Jews who were with her in the house, and comforting her, when they saw that Mary rose up quickly and went out, followed her, saying, “She is going to the tomb to weep there.”
  '32':
  - type: text
    content: 'Then, when Mary came where Jesus was, and saw Him, she '
  - type: note
    content: Mark 5:22; 7:25; Rev. 1:17
  - type: text
    content: 'fell down at His feet, saying to Him, '
  - type: note
    content: John 11:21
  - type: text
    content: “Lord, if You had been here, my brother would not have died.”
  '33':
  - type: text
    content: 'Therefore, when Jesus saw her weeping, and the Jews who came with her weeping, He groaned in the spirit and was troubled. '
  '34':
  - type: text
    content: 'And He said, '
  - type: text
    content: “Where have you laid him?”
  - type: text
    content: They said to Him, “Lord, come and see.”
  '35':
  - type: note
    content: Luke 19:41
  - type: text
    content: 'Jesus wept. '
  '36':
  - type: text
    content: Then the Jews said, “See how He loved him!”
  '37':
  - type: text
    content: 'And some of them said, “Could not this Man, '
  - type: note
    content: John 9:6, 7
  - type: text
    content: who opened the eyes of the blind, also have kept this man from dying?”
  - type: heading
    content: Lazarus Raised from the Dead
  '38':
  - type: text
    content: 'Then Jesus, again groaning in Himself, came to the tomb. It was a cave, and a '
  - type: note
    content: Matt. 27:60, 66; Mark 15:46; Luke 24:2; John 20:1
  - type: text
    content: 'stone lay against it. '
  '39':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Take away the stone.”
  - type: text
    content: 'Martha, the sister of him who was dead, said to Him, “Lord, by this time there is a stench, for he has been '
  - type: text
    content: dead
  - type: text
    content: ' four days.”'
  '4':
  - type: text
    content: 'When Jesus heard '
  - type: text
    content: that,
  - type: text
    content: ' He said, '
  - type: text
    content: “This sickness is not unto death, but for the glory of God, that the Son of God may be glorified through it.”
  '40':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: '“Did I not say to you that if you would believe you would '
  - type: note
    content: (John 11:4, 23)
  - type: text
    content: see the glory of God?”
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'Then they took away the stone '
  - type: text
    content: from
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: place
  - type: text
    content: ' where the dead man was lying. And Jesus lifted up '
  - type: text
    content: His
  - type: text
    content: ' eyes and said, '
  - type: text
    content: “Father, I thank You that You have heard Me.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'And I know that You always hear Me, but '
  - type: note
    content: John 12:30; 17:21
  - type: text
    content: 'because of the people who are standing by I said '
  - type: text
    content: this,
  - type: text
    content: ' that they may believe that You sent Me.”'
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Now when He had said these things, He cried with a loud voice, '
  - type: text
    content: “Lazarus, come forth!”
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'And he who had died came out bound hand and foot with '
  - type: note
    content: John 19:40
  - type: text
    content: 'graveclothes, and '
  - type: note
    content: John 20:7
  - type: text
    content: 'his face was wrapped with a cloth. Jesus said to them, '
  - type: text
    content: “Loose him, and let him go.”
  - type: heading
    content: The Plot to Kill Jesus
  '45':
  - type: text
    content: 'Then many of the Jews who had come to Mary, '
  - type: note
    content: John 2:23; 10:42; 12:11, 18
  - type: text
    content: 'and had seen the things Jesus did, believed in Him. '
  '46':
  - type: text
    content: 'But some of them went away to the Pharisees and '
  - type: note
    content: John 5:15
  - type: text
    content: 'told them the things Jesus did. '
  '47':
  - type: note
    content: Ps. 2:2; Matt. 26:3; Mark 14:1; Luke 22:2
  - type: text
    content: 'Then the chief priests and the Pharisees gathered a council and said, '
  - type: note
    content: John 12:19; Acts 4:16
  - type: text
    content: '“What shall we do? For this Man works many signs. '
  '48':
  - type: text
    content: If we let Him alone like this, everyone will believe in Him, and the Romans will come and take away both our place and nation.”
  '49':
  - type: text
    content: 'And one of them, '
  - type: note
    content: Matt. 26:3; Luke 3:2; John 18:14; Acts 4:6
  - type: text
    content: 'Caiaphas, being high priest that year, said to them, “You know nothing at all, '
  '5':
  - type: text
    content: 'Now Jesus loved Martha and her sister and Lazarus. '
  '50':
  - type: note
    content: John 18:14
  - type: text
    content: 'nor do you consider that it is expedient for us that one man should die for the people, and not that the whole nation should perish.” '
  '51':
  - type: text
    content: 'Now this he did not say on his own '
  - type: text
    content: authority;
  - type: text
    content: ' but being high priest that year he prophesied that Jesus would die for the nation, '
  '52':
  - type: text
    content: 'and '
  - type: note
    content: Is. 49:6; Acts 10:45; 11:18; 13:46; (1 John 2:2)
  - type: text
    content: 'not for that nation only, but '
  - type: note
    content: Ps. 22:27; John 10:16; (Eph. 2:14–17)
  - type: text
    content: also that He would gather together in one the children of God who were scattered abroad.
  '53':
  - type: text
    content: 'Then, from that day on, they plotted to '
  - type: note
    content: Matt. 26:4; Luke 6:11; 19:47; 22:2; John 5:16
  - type: text
    content: 'put Him to death. '
  '54':
  - type: note
    content: John 4:1, 3; 7:1
  - type: text
    content: 'Therefore Jesus no longer walked openly among the Jews, but went from there into the country near the wilderness, to a city called '
  - type: note
    content: 2 Chr. 13:19
  - type: text
    content: Ephraim, and there remained with His disciples.
  '55':
  - type: note
    content: Matt. 26:1; Mark 14:1; Luke 22:1; John 2:13; 5:1; 6:4
  - type: text
    content: 'And the Passover of the Jews was near, and many went from the country up to Jerusalem before the Passover, to '
  - type: note
    content: Num. 9:10, 13; 31:19, 20; 2 Chr. 30:17; Luke 2:22
  - type: text
    content: 'purify themselves. '
  '56':
  - type: note
    content: John 7:11
  - type: text
    content: 'Then they sought Jesus, and spoke among themselves as they stood in the temple, “What do you think—that He will not come to the feast?” '
  '57':
  - type: text
    content: 'Now both the chief priests and the Pharisees had given a command, that if anyone knew where He was, he should report '
  - type: text
    content: it,
  - type: text
    content: ' that they might '
  - type: note
    content: Matt. 26:14–16
  - type: text
    content: seize Him.
  '6':
  - type: text
    content: 'So, when He heard that he was sick, '
  - type: note
    content: John 10:40
  - type: text
    content: 'He stayed two more days in the place where He was. '
  '7':
  - type: text
    content: 'Then after this He said to '
  - type: text
    content: the
  - type: text
    content: ' disciples, '
  - type: text
    content: “Let us go to Judea again.”
  '8':
  - type: text
    content: The
  - type: text
    content: ' disciples said to Him, “Rabbi, lately the Jews sought to '
  - type: note
    content: John 8:59; 10:31
  - type: text
    content: stone You, and are You going there again?”
  '9':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“Are there not twelve hours in the day? '
  - type: note
    content: Luke 13:33; John 9:4; 12:35
  - type: text
    content: 'If anyone walks in the day, he does not stumble, because he sees the '
  - type: note
    content: Is. 9:2
  - type: text
    content: light of this world.
  - type: text
    content: ' '
