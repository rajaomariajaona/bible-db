document_id: JOS.23,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Joshua’s Farewell Address
  - type: text
    content: 'Now it came to pass, a long time after the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Josh. 21:44; 22:4
  - type: text
    content: 'had given rest to Israel from all their enemies round about, that Joshua '
  - type: note
    content: Josh. 13:1; 24:29
  - type: text
    content: 'was old, advanced in age. '
  '10':
  - type: note
    content: Lev. 26:8; Deut. 28:7; Is. 30:17
  - type: text
    content: 'One man of you shall chase a thousand, for the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: text
    content: is
  - type: text
    content: ' He who fights for you, '
  - type: note
    content: Ex. 14:14
  - type: text
    content: 'as He promised you. '
  '11':
  - type: note
    content: Josh. 22:5
  - type: text
    content: 'Therefore take careful heed to yourselves, that you love the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. '
  '12':
  - type: text
    content: 'Or else, if indeed you do '
  - type: note
    content: (2 Pet. 2:20, 21)
  - type: text
    content: 'go back, and cling to the remnant of these nations—these that remain among you—and '
  - type: note
    content: Deut. 7:3, 4; Ezra 9:2; Neh. 13:25
  - type: text
    content: 'make marriages with them, and go in to them and they to you, '
  '13':
  - type: text
    content: 'know for certain that '
  - type: note
    content: Judg. 2:3
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God will no longer drive out these nations from before you. '
  - type: note
    content: Ex. 23:33; 34:12; Deut. 7:16
  - type: text
    content: 'But they shall be snares and traps to you, and scourges on your sides and thorns in your eyes, until you perish from this good land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has given you.'
  '14':
  - type: text
    content: '“Behold, this day '
  - type: note
    content: 1 Kin. 2:2
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' going the way of all the earth. And you know in all your hearts and in all your souls that '
  - type: note
    content: Josh. 21:45; (Luke 21:33)
  - type: text
    content: 'not one thing has failed of all the good things which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God spoke concerning you. All have come to pass for you; not one word of them has failed. '
  '15':
  - type: note
    content: Deut. 28:63
  - type: text
    content: 'Therefore it shall come to pass, that as all the good things have come upon you which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God promised you, so the '
  - type: heading
    content: Lord
  - type: text
    content: ' will bring upon you '
  - type: note
    content: Lev. 26:14–39; Deut. 28:15–68
  - type: text
    content: 'all harmful things, until He has destroyed you from this good land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has given you. '
  '16':
  - type: text
    content: 'When you have transgressed the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, which He commanded you, and have gone and served other gods, and bowed down to them, then the '
  - type: note
    content: Deut. 4:24–28
  - type: text
    content: 'anger of the '
  - type: heading
    content: Lord
  - type: text
    content: ' will burn against you, and you shall perish quickly from the good land which He has given you.”'
  '2':
  - type: text
    content: 'And Joshua '
  - type: note
    content: Deut. 31:28
  - type: text
    content: 'called for all Israel, for their elders, for their heads, for their judges, and for their officers, and said to them:'
  - type: text
    content: '“I am old, advanced in age. '
  '3':
  - type: text
    content: 'You have seen all that the '
  - type: note
    content: Ps. 44:3
  - type: heading
    content: Lord
  - type: text
    content: ' your God has done to all these nations because of you, for the '
  - type: note
    content: Ex. 14:14; Deut. 1:30; Josh. 10:14, 42
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: text
    content: is
  - type: text
    content: ' He who has fought for you. '
  '4':
  - type: text
    content: 'See, '
  - type: note
    content: Josh. 13:2, 6; 18:10
  - type: text
    content: 'I have divided to you by lot these nations that remain, to be an inheritance for your tribes, from the Jordan, with all the nations that I have cut off, as far as the Great Sea westward. '
  '5':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: Ex. 23:30; 33:2
  - type: text
    content: 'will expel them from before you and drive them out of your sight. So you shall possess their land, '
  - type: note
    content: Num. 33:53
  - type: text
    content: 'as the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God promised you. '
  '6':
  - type: note
    content: Josh. 1:7
  - type: text
    content: 'Therefore be very courageous to keep and to do all that is written in the Book of the Law of Moses, '
  - type: note
    content: Deut. 5:32
  - type: text
    content: 'lest you turn aside from it to the right hand or to the left, '
  '7':
  - type: text
    content: and
  - type: text
    content: ' lest you '
  - type: note
    content: Ex. 23:33; Deut. 7:2, 3; (Prov. 4:14; Eph. 5:11)
  - type: text
    content: 'go among these nations, these who remain among you. You shall not '
  - type: note
    content: Ex. 23:13; Ps. 16:4; Jer. 5:7; Hos. 2:17
  - type: text
    content: 'make mention of the name of their gods, nor cause '
  - type: text
    content: anyone
  - type: text
    content: ' to '
  - type: note
    content: Deut. 6:13; 10:20
  - type: text
    content: 'swear '
  - type: text
    content: by
  - type: text
    content: ' '
  - type: text
    content: them;
  - type: text
    content: ' you shall not '
  - type: note
    content: Ex. 20:5
  - type: text
    content: 'serve them nor bow down to them, '
  '8':
  - type: text
    content: 'but you shall '
  - type: note
    content: Deut. 10:20
  - type: text
    content: 'hold fast to the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, as you have done to this day. '
  '9':
  - type: note
    content: Deut. 7:24; 11:23; Josh. 1:5
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' has driven out from before you great and strong nations; but '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: for
  - type: text
    content: ' you, no one has been able to stand against you to this day. '
