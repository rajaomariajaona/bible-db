document_id: 2CH.27,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jotham Reigns in Judah
  - type: text
    content: 'Jotham '
  - type: note
    content: 2 Kin. 15:32–35
  - type: text
    content: was
  - type: text
    content: ' twenty-five years old when he became king, and he reigned sixteen years in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Jerushah the daughter of Zadok. '
  '2':
  - type: text
    content: 'And he did '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' right in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', according to all that his father Uzziah had done (although he did not enter the temple of the '
  - type: heading
    content: Lord
  - type: text
    content: '). But still '
  - type: note
    content: 2 Kin. 15:35; Ezek. 20:44; 30:13
  - type: text
    content: the people acted corruptly.
  '3':
  - type: text
    content: 'He built the Upper Gate of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and he built extensively on the wall of '
  - type: note
    content: 2 Chr. 33:14; Neh. 3:26
  - type: text
    content: 'Ophel. '
  '4':
  - type: text
    content: 'Moreover he built cities in the mountains of Judah, and in the forests he built fortresses and towers. '
  '5':
  - type: text
    content: 'He also fought with the king of the '
  - type: note
    content: 2 Chr. 26:8
  - type: text
    content: 'Ammonites and defeated them. And the people of Ammon gave him in that year one hundred talents of silver, ten thousand kors of wheat, and ten thousand of barley. The people of Ammon paid this to him in the second and third years also. '
  '6':
  - type: text
    content: 'So Jotham became mighty, '
  - type: note
    content: 2 Chr. 26:5
  - type: text
    content: 'because he prepared his ways before the '
  - type: heading
    content: Lord
  - type: text
    content: ' his God.'
  '7':
  - type: text
    content: 'Now the rest of the acts of Jotham, and all his wars and his ways, indeed they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the kings of Israel and Judah. '
  '8':
  - type: text
    content: 'He was twenty-five years old when he became king, and he reigned sixteen years in Jerusalem. '
  '9':
  - type: note
    content: 2 Kin. 15:38
  - type: text
    content: 'So Jotham rested with his fathers, and they buried him in the City of David. Then '
  - type: note
    content: Is. 1:1; Hos. 1:1; Mic. 1:1
  - type: text
    content: Ahaz his son reigned in his place.
