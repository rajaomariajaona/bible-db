document_id: 2CH.27,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jotham Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jotham '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 15:32–35
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty-five years old when he became king, and he reigned sixteen years in Jerusalem. His mother’s name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Jerushah the daughter of Zadok. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he did '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' right in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', according to all that his father Uzziah had done (although he did not enter the temple of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '). But still '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 15:35; Ezek. 20:44; 30:13
      marker-yv: yv-n
    - type: text
      text: the people acted corruptly.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'He built the Upper Gate of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and he built extensively on the wall of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 33:14; Neh. 3:26
      marker-yv: yv-n
    - type: text
      text: 'Ophel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Moreover he built cities in the mountains of Judah, and in the forests he built fortresses and towers. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He also fought with the king of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 26:8
      marker-yv: yv-n
    - type: text
      text: 'Ammonites and defeated them. And the people of Ammon gave him in that year one hundred talents of silver, ten thousand kors of wheat, and ten thousand of barley. The people of Ammon paid this to him in the second and third years also. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So Jotham became mighty, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 26:5
      marker-yv: yv-n
    - type: text
      text: 'because he prepared his ways before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Now the rest of the acts of Jotham, and all his wars and his ways, indeed they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' written in the book of the kings of Israel and Judah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He was twenty-five years old when he became king, and he reigned sixteen years in Jerusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 15:38
      marker-yv: yv-n
    - type: text
      text: 'So Jotham rested with his fathers, and they buried him in the City of David. Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 1:1; Hos. 1:1; Mic. 1:1
      marker-yv: yv-n
    - type: text
      text: Ahaz his son reigned in his place.
