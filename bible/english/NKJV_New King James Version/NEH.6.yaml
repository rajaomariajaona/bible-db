    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' such as I who would go into the temple to save his life? I will not go in!” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
