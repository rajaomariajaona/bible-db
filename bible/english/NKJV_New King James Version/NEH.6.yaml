  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And you have also appointed prophets to proclaim concerning you at Jerusalem, saying, “
