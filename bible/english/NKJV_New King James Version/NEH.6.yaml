  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For this reason he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' hired, that I should be afraid and act that way and sin, so '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' they might have '
  - type: usfm
    marker: it
    children:
    - type: text
      text: cause
  - type: text
    text: ' for an evil report, that they might reproach me.'
- type: usfm
