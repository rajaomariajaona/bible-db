  - type: text
    text: ' written:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It is reported among the nations, and Geshem says, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' you and the Jews plan to rebel; therefore, according to these rumors, you are rebuilding the wall, '
