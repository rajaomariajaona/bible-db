  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Afterward I came to the house of Shemaiah the son of Delaiah, the son of Mehetabel, who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a secret informer; and he said, “Let us meet together in the house of God, within the temple, and let us close the doors of the temple, for they are coming to kill you; indeed, at night they will come to kill you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
