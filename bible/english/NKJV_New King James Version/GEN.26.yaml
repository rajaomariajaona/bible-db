document_id: GEN.26,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaac and Abimelech
  - type: text
    content: 'There was a famine in the land, besides '
  - type: note
    content: Gen. 12:10
  - type: text
    content: 'the first famine that was in the days of Abraham. And Isaac went to '
  - type: note
    content: Gen. 20:1, 2
  - type: text
    content: Abimelech king of the Philistines, in Gerar.
  '10':
  - type: text
    content: 'And Abimelech said, “What '
  - type: text
    content: is
  - type: text
    content: ' this you have done to us? One of the people might soon have lain with your wife, and '
  - type: note
    content: Gen. 20:9
  - type: text
    content: 'you would have brought guilt on us.” '
  '11':
  - type: text
    content: 'So Abimelech charged all '
  - type: text
    content: his
  - type: text
    content: ' people, saying, “He who '
  - type: note
    content: Ps. 105:15
  - type: text
    content: touches this man or his wife shall surely be put to death.”
  '12':
  - type: text
    content: 'Then Isaac sowed in that land, and reaped in the same year '
  - type: note
    content: Matt. 13:8, 23; Mark 4:8
  - type: text
    content: 'a hundredfold; and the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Gen. 24:1; 25:8, 11; 26:3; Job 42:12; Prov. 10:22
  - type: text
    content: 'blessed him. '
  '13':
  - type: text
    content: 'The man '
  - type: note
    content: Gen. 24:35; (Prov. 10:22)
  - type: text
    content: 'began to prosper, and continued prospering until he became very prosperous; '
  '14':
  - type: text
    content: 'for he had possessions of flocks and possessions of herds and a great number of servants. So the Philistines '
  - type: note
    content: Gen. 37:11; Eccl. 4:4
  - type: text
    content: 'envied him. '
  '15':
  - type: text
    content: 'Now the Philistines had stopped up all the wells '
  - type: note
    content: Gen. 21:25, 30
  - type: text
    content: 'which his father’s servants had dug in the days of Abraham his father, and they had filled them with earth. '
  '16':
  - type: text
    content: 'And Abimelech said to Isaac, “Go away from us, for '
  - type: note
    content: Ex. 1:9
  - type: text
    content: you are much mightier than we.”
  '17':
  - type: text
    content: 'Then Isaac departed from there and pitched his tent in the Valley of Gerar, and dwelt there. '
  '18':
  - type: text
    content: 'And Isaac dug again the wells of water which they had dug in the days of Abraham his father, for the Philistines had stopped them up after the death of Abraham. '
  - type: note
    content: Gen. 21:31
  - type: text
    content: He called them by the names which his father had called them.
  '19':
  - type: text
    content: 'Also Isaac’s servants dug in the valley, and found a well of running water there. '
  '2':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' appeared to him and said: '
  - type: note
    content: Gen. 12:7; 17:1; 18:1; 35:9
  - type: text
    content: '“Do not go down to Egypt; live in '
  - type: note
    content: Gen. 12:1
  - type: text
    content: 'the land of which I shall tell you. '
  '20':
  - type: text
    content: 'But the herdsmen of Gerar '
  - type: note
    content: Gen. 21:25
  - type: text
    content: 'quarreled with Isaac’s herdsmen, saying, “The water '
  - type: text
    content: is
  - type: text
    content: ' ours.” So he called the name of the well Esek, because they quarreled with him. '
  '21':
  - type: text
    content: 'Then they dug another well, and they quarreled over that '
  - type: text
    content: one
  - type: text
    content: ' also. So he called its name Sitnah. '
  '22':
  - type: text
    content: 'And he moved from there and dug another well, and they did not quarrel over it. So he called its name Rehoboth, because he said, “For now the '
  - type: heading
    content: Lord
  - type: text
    content: ' has made room for us, and we shall '
  - type: note
    content: Gen. 17:6; 28:3; 41:52; Ex. 1:7
  - type: text
    content: be fruitful in the land.”
  '23':
  - type: text
    content: 'Then he went up from there to Beersheba. '
  '24':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Gen. 26:2
  - type: text
    content: 'appeared to him the same night and said, '
  - type: note
    content: Gen. 17:7, 8; 24:12; Ex. 3:6; Acts 7:32
  - type: text
    content: '“I '
  - type: text
    content: am
  - type: text
    content: ' the God of your father Abraham; '
  - type: note
    content: Gen. 15:1
  - type: text
    content: 'do not fear, for '
  - type: note
    content: Gen. 26:3, 4
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' with you. I will bless you and multiply your descendants for My servant Abraham’s sake.” '
  '25':
  - type: text
    content: 'So he '
  - type: note
    content: Gen. 12:7, 8; 13:4, 18; 22:9; 33:20
  - type: text
    content: 'built an altar there and '
  - type: note
    content: Gen. 21:33; Ps. 116:17
  - type: text
    content: 'called on the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and he pitched his tent there; and there Isaac’s servants dug a well.'
  '26':
  - type: text
    content: 'Then Abimelech came to him from Gerar with Ahuzzath, one of his friends, '
  - type: note
    content: Gen. 21:22
  - type: text
    content: 'and Phichol the commander of his army. '
  '27':
  - type: text
    content: 'And Isaac said to them, “Why have you come to me, '
  - type: note
    content: Judg. 11:7
  - type: text
    content: 'since you hate me and have '
  - type: note
    content: Gen. 26:16
  - type: text
    content: sent me away from you?”
  '28':
  - type: text
    content: 'But they said, “We have certainly seen that the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Gen. 21:22, 23
  - type: text
    content: 'is with you. So we said, ‘Let there now be an oath between us, between you and us; and let us make a covenant with you, '
  '29':
  - type: text
    content: 'that you will do us no harm, since we have not touched you, and since we have done nothing to you but good and have sent you away in peace. '
  - type: note
    content: Gen. 24:31; Ps. 115:15
  - type: text
    content: 'You '
  - type: text
    content: are
  - type: text
    content: ' now the blessed of the '
  - type: heading
    content: Lord
  - type: text
    content: .’ ”
  '3':
  - type: note
    content: Gen. 20:1; Ps. 39:12; Heb. 11:9
  - type: text
    content: 'Dwell in this land, and '
  - type: note
    content: Gen. 28:13, 15
  - type: text
    content: 'I will be with you and '
  - type: note
    content: Gen. 12:2
  - type: text
    content: 'bless you; for to you and your descendants '
  - type: note
    content: Gen. 12:7; 13:15; 15:18
  - type: text
    content: 'I give all these lands, and I will perform '
  - type: note
    content: Gen. 22:16; Ps. 105:9
  - type: text
    content: 'the oath which I swore to Abraham your father. '
  '30':
  - type: note
    content: Gen. 19:3
  - type: text
    content: 'So he made them a feast, and they ate and drank. '
  '31':
  - type: text
    content: 'Then they arose early in the morning and '
  - type: note
    content: Gen. 21:31
  - type: text
    content: swore an oath with one another; and Isaac sent them away, and they departed from him in peace.
  '32':
  - type: text
    content: 'It came to pass the same day that Isaac’s servants came and told him about the well which they had dug, and said to him, “We have found water.” '
  '33':
  - type: text
    content: 'So he called it Shebah. '
  - type: note
    content: Gen. 21:31; 28:10
  - type: text
    content: 'Therefore the name of the city '
  - type: text
    content: is
  - type: text
    content: ' Beersheba to this day.'
  '34':
  - type: note
    content: Gen. 28:8; 36:2
  - type: text
    content: 'When Esau was forty years old, he took as wives Judith the daughter of Beeri the Hittite, and Basemath the daughter of Elon the Hittite. '
  '35':
  - type: text
    content: 'And '
  - type: note
    content: Gen. 27:46; 28:1, 8
  - type: text
    content: they were a grief of mind to Isaac and Rebekah.
  '4':
  - type: text
    content: 'And '
  - type: note
    content: Gen. 15:5; 22:17; Ex. 32:13
  - type: text
    content: 'I will make your descendants multiply as the stars of heaven; I will give to your descendants all these lands; '
  - type: note
    content: Gen. 12:3; 22:18; Gal. 3:8
  - type: text
    content: 'and in your seed all the nations of the earth shall be blessed; '
  '5':
  - type: note
    content: Gen. 22:16, 18
  - type: text
    content: because Abraham obeyed My voice and kept My charge, My commandments, My statutes, and My laws.”
  '6':
  - type: text
    content: 'So Isaac dwelt in Gerar. '
  '7':
  - type: text
    content: 'And the men of the place asked about his wife. And '
  - type: note
    content: Gen. 12:13; 20:2, 12, 13
  - type: text
    content: 'he said, “She '
  - type: text
    content: is
  - type: text
    content: ' my sister”; for '
  - type: note
    content: Prov. 29:25
  - type: text
    content: he was afraid to say, “
  - type: text
    content: She
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' my wife,” '
  - type: text
    content: because
  - type: text
    content: ' '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: thought,
  - type: text
    content: ' “lest the men of the place kill me for Rebekah, because she '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: Gen. 12:11; 24:16; 29:17
  - type: text
    content: 'beautiful to behold.” '
  '8':
  - type: text
    content: 'Now it came to pass, when he had been there a long time, that Abimelech king of the Philistines looked through a window, and saw, and there was Isaac, showing endearment to Rebekah his wife. '
  '9':
  - type: text
    content: 'Then Abimelech called Isaac and said, “Quite obviously she '
  - type: text
    content: is
  - type: text
    content: ' your wife; so how could you say, ‘She '
  - type: text
    content: is
  - type: text
    content: ' my sister’?”'
  - type: text
    content: Isaac said to him, “Because I said, ‘Lest I die on account of her.’ ”
