document_id: 2KI.21,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Manasseh Reigns in Judah
  - type: text
    content: 'Manasseh '
  - type: note
    content: 2 Chr. 33:1–9
  - type: text
    content: was
  - type: text
    content: ' twelve years old when he became king, and he reigned fifty-five years in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Hephzibah. '
  '10':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke '
  - type: note
    content: 2 Kin. 17:13
  - type: text
    content: 'by His servants the prophets, saying, '
  '11':
  - type: note
    content: 2 Kin. 23:26, 27; 24:3, 4
  - type: text
    content: “Because Manasseh king of Judah has done these abominations (
  - type: note
    content: 1 Kin. 21:26
  - type: text
    content: 'he has acted more wickedly than all the '
  - type: note
    content: Gen. 15:16
  - type: text
    content: 'Amorites who '
  - type: text
    content: were
  - type: text
    content: ' before him, and '
  - type: note
    content: 2 Kin. 21:9
  - type: text
    content: 'has also made Judah sin with his idols), '
  '12':
  - type: text
    content: 'therefore thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel: ‘Behold, '
  - type: text
    content: I
  - type: text
    content: ' am bringing '
  - type: text
    content: such
  - type: text
    content: ' calamity upon Jerusalem and Judah, that whoever hears of it, both '
  - type: note
    content: 1 Sam. 3:11; Jer. 19:3
  - type: text
    content: 'his ears will tingle. '
  '13':
  - type: text
    content: 'And I will stretch over Jerusalem '
  - type: note
    content: Lam. 2:8; Amos 7:7, 8
  - type: text
    content: 'the measuring line of Samaria and the plummet of the house of Ahab; '
  - type: note
    content: 2 Kin. 22:16–19; 25:4–11
  - type: text
    content: 'I will wipe Jerusalem as '
  - type: text
    content: one
  - type: text
    content: ' wipes a dish, wiping '
  - type: text
    content: it
  - type: text
    content: ' and turning '
  - type: text
    content: it
  - type: text
    content: ' upside down. '
  '14':
  - type: text
    content: 'So I will forsake the '
  - type: note
    content: Jer. 6:9
  - type: text
    content: 'remnant of My inheritance and deliver them into the hand of their enemies; and they shall become victims of plunder to all their enemies, '
  '15':
  - type: text
    content: because they have done evil in My sight, and have provoked Me to anger since the day their fathers came out of Egypt, even to this day.’ ”
  '16':
  - type: note
    content: 2 Kin. 24:4
  - type: text
    content: 'Moreover Manasseh shed very much innocent blood, till he had filled Jerusalem from one end to another, besides his sin by which he made Judah sin, in doing evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: 'Now '
  - type: note
    content: 2 Chr. 33:11–19
  - type: text
    content: 'the rest of the acts of '
  - type: note
    content: 2 Kin. 20:21
  - type: text
    content: Manasseh—all that he did, and the sin that he committed—
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '18':
  - type: text
    content: 'So '
  - type: note
    content: 2 Chr. 33:20
  - type: text
    content: Manasseh rested with his fathers, and was buried in the garden of his own house, in the garden of Uzza. Then his son Amon reigned in his place.
  - type: heading
    content: Amon’s Reign and Death
  '19':
  - type: note
    content: 2 Chr. 33:21–23
  - type: text
    content: 'Amon '
  - type: text
    content: was
  - type: text
    content: ' twenty-two years old when he became king, and he reigned two years in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Meshullemeth the daughter of Haruz of Jotbah. '
  '2':
  - type: text
    content: 'And he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 2 Kin. 16:3
  - type: text
    content: 'according to the abominations of the nations whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' had cast out before the children of Israel. '
  '20':
  - type: text
    content: 'And he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 2 Kin. 21:2–6, 11, 16
  - type: text
    content: 'as his father Manasseh had done. '
  '21':
  - type: text
    content: 'So he walked in all the ways that his father had walked; and he served the idols that his father had served, and worshiped them. '
  '22':
  - type: text
    content: 'He '
  - type: note
    content: Judg. 2:12, 13; 1 Kin. 11:33; 1 Chr. 28:9
  - type: text
    content: 'forsook the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of his fathers, and did not walk in the way of the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '23':
  - type: note
    content: 1 Chr. 3:14; 2 Chr. 33:24, 25; Matt. 1:10
  - type: text
    content: 'Then the servants of Amon '
  - type: note
    content: 2 Kin. 12:20; 14:19
  - type: text
    content: 'conspired against him, and killed the king in his own house. '
  '24':
  - type: text
    content: 'But the people of the land '
  - type: note
    content: 2 Kin. 14:5
  - type: text
    content: executed all those who had conspired against King Amon. Then the people of the land made his son Josiah king in his place.
  '25':
  - type: text
    content: 'Now the rest of the acts of Amon which he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '26':
  - type: text
    content: And he was buried in his tomb in the garden of Uzza. Then Josiah his son reigned in his place.
  '3':
  - type: text
    content: 'For he rebuilt the high places '
  - type: note
    content: 2 Kin. 18:4, 22
  - type: text
    content: 'which Hezekiah his father had destroyed; he raised up altars for Baal, and made a wooden image, '
  - type: note
    content: 1 Kin. 16:31–33
  - type: text
    content: 'as Ahab king of Israel had done; and he '
  - type: note
    content: (Deut. 4:19; 17:2–5); 2 Kin. 17:16; 23:5
  - type: text
    content: 'worshiped all the host of heaven and served them. '
  '4':
  - type: note
    content: Jer. 7:30; 32:34
  - type: text
    content: 'He also built altars in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', of which the '
  - type: heading
    content: Lord
  - type: text
    content: ' had said, '
  - type: note
    content: 1 Kin. 11:13
  - type: text
    content: '“In Jerusalem I will put My name.” '
  '5':
  - type: text
    content: 'And he built altars for all the host of heaven in the '
  - type: note
    content: 1 Kin. 6:36; 7:12; 2 Kin. 23:12
  - type: text
    content: 'two courts of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: note
    content: (Lev. 18:21; 20:2); 2 Kin. 16:3; 17:17
  - type: text
    content: 'Also he made his son pass through the fire, practiced '
  - type: note
    content: Lev. 19:26, 31; (Deut. 18:10–14); 2 Kin. 17:17
  - type: text
    content: 'soothsaying, used witchcraft, and consulted spiritists and mediums. He did much evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', to provoke '
  - type: text
    content: Him
  - type: text
    content: ' to anger. '
  '7':
  - type: text
    content: 'He even set a carved image of Asherah that he had made, in the house of which the '
  - type: heading
    content: Lord
  - type: text
    content: ' had said to David and to Solomon his son, '
  - type: note
    content: 2 Sam. 7:13; 1 Kin. 8:29; 9:3; 2 Kin. 23:27; 2 Chr. 7:12, 16; Jer. 32:34
  - type: text
    content: '“In this house and in Jerusalem, which I have chosen out of all the tribes of Israel, I will put My name forever; '
  '8':
  - type: note
    content: 2 Sam. 7:10; (2 Kin. 18:11, 12)
  - type: text
    content: 'and I will not make the feet of Israel wander anymore from the land which I gave their fathers—only if they are careful to do according to all that I have commanded them, and according to all the law that My servant Moses commanded them.” '
  '9':
  - type: text
    content: 'But they paid no attention, and Manasseh '
  - type: note
    content: (Prov. 29:12)
  - type: text
    content: 'seduced them to do more evil than the nations whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' had destroyed before the children of Israel.'
