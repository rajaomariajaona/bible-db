document_id: 2KI.21,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manasseh Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manasseh '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 33:1–9
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' twelve years old when he became king, and he reigned fifty-five years in Jerusalem. His mother’s name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Hephzibah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 17:13
      marker-yv: yv-n
    - type: text
      text: 'by His servants the prophets, saying, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:26, 27; 24:3, 4
      marker-yv: yv-n
    - type: text
      text: “Because Manasseh king of Judah has done these abominations (
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 21:26
      marker-yv: yv-n
    - type: text
      text: 'he has acted more wickedly than all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:16
      marker-yv: yv-n
    - type: text
      text: 'Amorites who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' before him, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 21:9
      marker-yv: yv-n
    - type: text
      text: 'has also made Judah sin with his idols), '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel: ‘Behold, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' am bringing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: such
    - type: text
      text: ' calamity upon Jerusalem and Judah, that whoever hears of it, both '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 3:11; Jer. 19:3
      marker-yv: yv-n
    - type: text
      text: 'his ears will tingle. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will stretch over Jerusalem '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lam. 2:8; Amos 7:7, 8
      marker-yv: yv-n
    - type: text
      text: 'the measuring line of Samaria and the plummet of the house of Ahab; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 22:16–19; 25:4–11
      marker-yv: yv-n
    - type: text
      text: 'I will wipe Jerusalem as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' wipes a dish, wiping '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' and turning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' upside down. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I will forsake the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 6:9
      marker-yv: yv-n
    - type: text
      text: 'remnant of My inheritance and deliver them into the hand of their enemies; and they shall become victims of plunder to all their enemies, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: because they have done evil in My sight, and have provoked Me to anger since the day their fathers came out of Egypt, even to this day.’ ”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:4
      marker-yv: yv-n
    - type: text
      text: 'Moreover Manasseh shed very much innocent blood, till he had filled Jerusalem from one end to another, besides his sin by which he made Judah sin, in doing evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 33:11–19
      marker-yv: yv-n
    - type: text
      text: 'the rest of the acts of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 20:21
      marker-yv: yv-n
    - type: text
      text: Manasseh—all that he did, and the sin that he committed—
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Judah? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 33:20
      marker-yv: yv-n
    - type: text
      text: Manasseh rested with his fathers, and was buried in the garden of his own house, in the garden of Uzza. Then his son Amon reigned in his place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amon’s Reign and Death
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 33:21–23
      marker-yv: yv-n
    - type: text
      text: 'Amon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty-two years old when he became king, and he reigned two years in Jerusalem. His mother’s name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Meshullemeth the daughter of Haruz of Jotbah. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 16:3
      marker-yv: yv-n
    - type: text
      text: 'according to the abominations of the nations whom the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had cast out before the children of Israel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 21:2–6, 11, 16
      marker-yv: yv-n
    - type: text
      text: 'as his father Manasseh had done. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he walked in all the ways that his father had walked; and he served the idols that his father had served, and worshiped them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 2:12, 13; 1 Kin. 11:33; 1 Chr. 28:9
      marker-yv: yv-n
    - type: text
      text: 'forsook the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of his fathers, and did not walk in the way of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 3:14; 2 Chr. 33:24, 25; Matt. 1:10
      marker-yv: yv-n
    - type: text
      text: 'Then the servants of Amon '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 12:20; 14:19
      marker-yv: yv-n
    - type: text
      text: 'conspired against him, and killed the king in his own house. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people of the land '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 14:5
      marker-yv: yv-n
    - type: text
      text: executed all those who had conspired against King Amon. Then the people of the land made his son Josiah king in his place.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Amon which he did, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Judah? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he was buried in his tomb in the garden of Uzza. Then Josiah his son reigned in his place.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he rebuilt the high places '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 18:4, 22
      marker-yv: yv-n
    - type: text
      text: 'which Hezekiah his father had destroyed; he raised up altars for Baal, and made a wooden image, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 16:31–33
      marker-yv: yv-n
    - type: text
      text: 'as Ahab king of Israel had done; and he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 4:19; 17:2–5); 2 Kin. 17:16; 23:5
      marker-yv: yv-n
    - type: text
      text: 'worshiped all the host of heaven and served them. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 7:30; 32:34
      marker-yv: yv-n
    - type: text
      text: 'He also built altars in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', of which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:13
      marker-yv: yv-n
    - type: text
      text: '“In Jerusalem I will put My name.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he built altars for all the host of heaven in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:36; 7:12; 2 Kin. 23:12
      marker-yv: yv-n
    - type: text
      text: 'two courts of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Lev. 18:21; 20:2); 2 Kin. 16:3; 17:17
      marker-yv: yv-n
    - type: text
      text: 'Also he made his son pass through the fire, practiced '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:26, 31; (Deut. 18:10–14); 2 Kin. 17:17
      marker-yv: yv-n
    - type: text
      text: 'soothsaying, used witchcraft, and consulted spiritists and mediums. He did much evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to provoke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him
    - type: text
      text: ' to anger. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He even set a carved image of Asherah that he had made, in the house of which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said to David and to Solomon his son, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:13; 1 Kin. 8:29; 9:3; 2 Kin. 23:27; 2 Chr. 7:12, 16; Jer. 32:34
      marker-yv: yv-n
    - type: text
      text: '“In this house and in Jerusalem, which I have chosen out of all the tribes of Israel, I will put My name forever; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:10; (2 Kin. 18:11, 12)
      marker-yv: yv-n
    - type: text
      text: 'and I will not make the feet of Israel wander anymore from the land which I gave their fathers—only if they are careful to do according to all that I have commanded them, and according to all the law that My servant Moses commanded them.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they paid no attention, and Manasseh '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 29:12)
      marker-yv: yv-n
    - type: text
      text: 'seduced them to do more evil than the nations whom the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had destroyed before the children of Israel.'
