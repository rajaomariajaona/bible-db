verses:
  '1':
  - type: heading
    content: Assurance of God’s Victory over Enemies
  - type: text
    content: A Song. A Psalm of David.
  - type: text
    content: 'O '
  - type: note
    content: Ps. 57:7–11
  - type: text
    content: God, my heart is steadfast;
  - type: text
    content: I will sing and give praise, even with my glory.
  '10':
  - type: note
    content: Ps. 60:9
  - type: text
    content: 'Who will bring me '
  - type: text
    content: into
  - type: text
    content: ' the strong city?'
  - type: text
    content: Who will lead me to Edom?
  '11':
  - type: text
    content: Is
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' not '
  - type: text
    content: You,
  - type: text
    content: ' O God, '
  - type: text
    content: who
  - type: text
    content: ' cast us off?'
  - type: text
    content: 'And '
  - type: text
    content: You,
  - type: text
    content: ' O God, '
  - type: text
    content: who
  - type: text
    content: ' did not go out with our armies?'
  '12':
  - type: text
    content: Give us help from trouble,
  - type: text
    content: For the help of man is useless.
  '13':
  - type: note
    content: Ps. 60:12
  - type: text
    content: Through God we will do valiantly,
  - type: text
    content: 'For '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' He '
  - type: text
    content: who
  - type: text
    content: ' shall tread down our enemies.'
  '2':
  - type: note
    content: Ps. 57:8–11
  - type: text
    content: Awake, lute and harp!
  - type: text
    content: I will awaken the dawn.
  '3':
  - type: text
    content: 'I will praise You, O '
  - type: heading
    content: Lord
  - type: text
    content: ', among the peoples,'
  - type: text
    content: And I will sing praises to You among the nations.
  '4':
  - type: text
    content: 'For Your mercy '
  - type: text
    content: is
  - type: text
    content: ' great above the heavens,'
  - type: text
    content: 'And Your truth '
  - type: text
    content: reaches
  - type: text
    content: ' to the clouds.'
  '5':
  - type: note
    content: Ps. 57:5, 11
  - type: text
    content: Be exalted, O God, above the heavens,
  - type: text
    content: And Your glory above all the earth;
  '6':
  - type: note
    content: Ps. 60:5–12
  - type: text
    content: That Your beloved may be delivered,
  - type: text
    content: 'Save '
  - type: text
    content: with
  - type: text
    content: ' Your right hand, and hear me.'
  '7':
  - type: text
    content: 'God has spoken in His holiness:'
  - type: text
    content: “I will rejoice;
  - type: text
    content: I will divide Shechem
  - type: text
    content: And measure out the Valley of Succoth.
  '8':
  - type: text
    content: 'Gilead '
  - type: text
    content: is
  - type: text
    content: ' Mine; Manasseh '
  - type: text
    content: is
  - type: text
    content: ' Mine;'
  - type: text
    content: 'Ephraim also '
  - type: text
    content: is
  - type: text
    content: ' the helmet for My head;'
  - type: note
    content: (Gen. 49:10)
  - type: text
    content: 'Judah '
  - type: text
    content: is
  - type: text
    content: ' My lawgiver.'
  '9':
  - type: text
    content: 'Moab '
  - type: text
    content: is
  - type: text
    content: ' My washpot;'
  - type: text
    content: Over Edom I will cast My shoe;
  - type: text
    content: Over Philistia I will triumph.”
