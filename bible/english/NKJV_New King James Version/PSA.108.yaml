document_id: PSA.108,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Assurance of God’s Victory over Enemies
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Song. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 57:7–11
      marker-yv: yv-n
    - type: text
      text: God, my heart is steadfast;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing and give praise, even with my glory.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 60:9
      marker-yv: yv-n
    - type: text
      text: 'Who will bring me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: into
    - type: text
      text: ' the strong city?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will lead me to Edom?
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You,
    - type: text
      text: ' O God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' cast us off?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You,
    - type: text
      text: ' O God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' did not go out with our armies?'
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Give us help from trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the help of man is useless.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 60:12
      marker-yv: yv-n
    - type: text
      text: Through God we will do valiantly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' shall tread down our enemies.'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 57:8–11
      marker-yv: yv-n
    - type: text
      text: Awake, lute and harp!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will awaken the dawn.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I will praise You, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', among the peoples,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I will sing praises to You among the nations.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For Your mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' great above the heavens,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And Your truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reaches
    - type: text
      text: ' to the clouds.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 57:5, 11
      marker-yv: yv-n
    - type: text
      text: Be exalted, O God, above the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And Your glory above all the earth;
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 60:5–12
      marker-yv: yv-n
    - type: text
      text: That Your beloved may be delivered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Save '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' Your right hand, and hear me.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'God has spoken in His holiness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I will rejoice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will divide Shechem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And measure out the Valley of Succoth.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Gilead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Mine; Manasseh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Mine;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Ephraim also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the helmet for My head;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 49:10)
      marker-yv: yv-n
    - type: text
      text: 'Judah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' My lawgiver.'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Moab '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' My washpot;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Over Edom I will cast My shoe;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Over Philistia I will triumph.”
