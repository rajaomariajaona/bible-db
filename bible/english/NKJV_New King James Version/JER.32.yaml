  - type: note
    content: Ex. 6:6; 2 Sam. 7:23; 1 Chr. 17:21; Ps. 136:11, 12
  - type: text
    content: 'have brought Your people Israel out of the land of Egypt with signs and wonders, with a strong hand and an outstretched arm, and with great terror; '
  '22':
  - type: text
    content: You have given them this land, of which You swore to their fathers to give them—
  - type: note
    content: Ex. 3:8, 17; Deut. 1:8; Ps. 105:9–11; Jer. 11:5
  - type: text
    content: '“a land flowing with milk and honey.” '
  '23':
  - type: text
    content: 'And they came in and took possession of it, but '
  - type: note
    content: (Neh. 9:26); Jer. 11:8; (Dan. 9:10–14)
  - type: text
    content: they have not obeyed Your voice or walked in Your law. They have done nothing of all that You commanded them to do; therefore You have caused all this calamity to come upon them.
  '24':
  - type: text
    content: '‘Look, the siege mounds! They have come to the city to take it; and the city has been given into the hand of the Chaldeans who fight against it, because of '
  - type: note
    content: Jer. 14:12; Ezek. 14:21
  - type: text
    content: 'the sword and famine and pestilence. What You have spoken has happened; there You see '
  - type: text
    content: it!
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'And You have said to me, O Lord '
  - type: heading
    content: God
  - type: text
    content: ', “Buy the field for money, and take witnesses”!—yet the city has been given into the hand of the Chaldeans.’ ”'
  - type: heading
    content: God’s Assurance of the People’s Return
  '26':
  - type: text
    content: 'Then the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to Jeremiah, saying, '
  '27':
  - type: text
    content: '“Behold, I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ', the '
  - type: note
    content: (Num. 16:22)
  - type: text
    content: 'God of all flesh. Is there anything too hard for Me? '
  '28':
  - type: text
    content: 'Therefore thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘Behold, I will give this city into the hand of the Chaldeans, into the hand of Nebuchadnezzar king of Babylon, and he shall take it. '
  '29':
  - type: text
    content: 'And the Chaldeans who fight against this city shall come and '
  - type: note
    content: 2 Chr. 36:19; Jer. 21:10; 37:8, 10; 52:13
  - type: text
    content: 'set fire to this city and burn it, with the houses '
  - type: note
    content: Jer. 19:13
  - type: text
    content: 'on whose roofs they have offered incense to Baal and poured out drink offerings to other gods, to provoke Me to anger; '
  '3':
  - type: text
    content: 'For Zedekiah king of Judah had shut him up, saying, “Why do you '
  - type: note
    content: Jer. 26:8, 9
  - type: text
    content: 'prophesy and say, ‘Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: Jer. 21:3–7; 34:2
  - type: text
    content: '“Behold, I will give this city into the hand of the king of Babylon, and he shall take it; '
  '30':
  - type: text
    content: 'because the children of Israel and the children of Judah '
  - type: note
    content: Deut. 9:7–12; Is. 63:10; Jer. 2:7; 3:25; 7:22–26; Ezek. 20:28
  - type: text
    content: 'have done only evil before Me from their youth. For the children of Israel have provoked Me only to anger with the work of their hands,’ says the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: '‘For this city has been to Me '
  - type: text
