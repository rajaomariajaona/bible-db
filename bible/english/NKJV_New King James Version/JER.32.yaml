  - type: note
    content: 2 Kin. 25:4–7; Jer. 34:3; 38:18, 23; 39:5; 52:9
  - type: text
    content: 'shall not escape from the hand of the Chaldeans, but shall surely be delivered into the hand of the king of Babylon, and shall speak with him face to face, and see him '
  - type: note
