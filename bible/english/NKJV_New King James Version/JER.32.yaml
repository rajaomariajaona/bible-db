  - type: text
    content: them,
  - type: text
    content: ' yet they have not listened to receive instruction. '
  '34':
  - type: text
    content: 'But they '
  - type: note
    content: 2 Kin. 21:1–7; Jer. 7:10–12, 30; 23:11; Ezek. 8:5, 6
  - type: text
    content: 'set their abominations in the house which is called by My name, to defile it. '
  '35':
  - type: text
    content: 'And they built the high places of Baal which '
  - type: text
    content: are
  - type: text
