  - type: text
    content: 'Baruch before them, saying, '
  '14':
  - type: text
    content: '‘Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: “Take these deeds, both this purchase deed which is sealed and this deed which is open, and put them in an earthen vessel, that they may last many days.” '
  '15':
  - type: text
    content: 'For thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: “Houses and fields and vineyards shall be '
  - type: note
