  '40':
  - type: text
    content: 'And '
  - type: note
    content: Is. 55:3; Jer. 31:31; Ezek. 37:26
  - type: text
    content: 'I will make an everlasting covenant with them, that I will not turn away from doing them good; but '
  - type: note
    content: Deut. 31:6, 8; (Ezek. 39:29; Jer. 31:33)
  - type: text
    content: 'I will put My fear in their hearts so that they will not depart from Me. '
  '41':
  - type: text
    content: 'Yes, '
  - type: note
    content: Deut. 30:9; Is. 62:5; 65:19; Zeph. 3:17
  - type: text
    content: 'I will rejoice over them to do them good, and '
  - type: note
    content: Jer. 24:6; 31:28; Amos 9:15
  - type: text
    content: I will assuredly plant them in this land, with all My heart and with all My soul.’
  '42':
  - type: text
