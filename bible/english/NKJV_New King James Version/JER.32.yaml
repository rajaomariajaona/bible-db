  - type: heading
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: Jer. 31:28; Zech. 8:14, 15
  - type: text
    content: '‘Just as I have brought all this great calamity on this people, so I will bring on them all the good that I have promised them. '
  '43':
