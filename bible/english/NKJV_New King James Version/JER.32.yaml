  - type: text
    content: 'in the tenth year of Zedekiah king of Judah, which was the eighteenth year of Nebuchadnezzar. '
  '10':
  - type: text
    content: 'And I signed the deed and sealed '
  - type: text
    content: it,
  - type: text
