  - type: text
    content: ' show '
  - type: note
    content: Ex. 20:6; 34:7; Deut. 5:9, 10
  - type: text
    content: 'lovingkindness to thousands, and repay the iniquity of the fathers into the bosom of their children after them—the Great, '
  - type: note
