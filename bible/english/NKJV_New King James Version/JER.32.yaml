  - type: text
    content: ' the king of Judah’s house. '
  '20':
  - type: text
    content: 'You have set signs and wonders in the land of Egypt, to this day, and in Israel and among '
  - type: text
    content: other
  - type: text
    content: ' men; and You have made Yourself '
  - type: note
