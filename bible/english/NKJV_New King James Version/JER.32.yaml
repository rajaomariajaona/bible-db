  - type: text
    content: 'their prophets, the men of Judah, and the inhabitants of Jerusalem. '
  '33':
  - type: text
    content: 'And they have turned to Me the '
  - type: note
    content: Jer. 2:27; 7:24
  - type: text
    content: 'back, and not the face; though I taught them, '
  - type: note
    content: Jer. 7:13
