  '36':
  - type: text
    content: '“Now therefore, thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ', the God of Israel, concerning this city of which you say, ‘It shall be delivered into the hand of the king of Babylon by the sword, by the famine, and by the pestilence’: '
  '37':
  - type: text
