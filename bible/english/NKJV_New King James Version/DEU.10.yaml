  '1':
  - type: heading
    content: The Second Pair of Tablets
  - type: text
    content: '“At that time the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to me, ‘Hew for yourself two tablets of stone like the first, and come up to Me on the mountain and make yourself an '
  - type: note
    content: Ex. 25:10
  - type: text
    content: 'ark of wood. '
  '10':
  - type: text
    content: '“As at the first time, '
  - type: note
    content: Ex. 34:28; Deut. 9:18
  - type: text
    content: 'I stayed in the mountain forty days and forty nights; '
  - type: note
    content: Ex. 32:14
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' also heard me at that time, '
  - type: text
    content: and
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' chose not to destroy you. '
  '11':
  - type: note
    content: Ex. 33:1
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to me, ‘Arise, begin '
  - type: text
    content: your
  - type: text
    content: ' journey before the people, that they may go in and possess the land which I swore to their fathers to give them.’'
  - type: heading
    content: The Essence of the Law
  '12':
  - type: text
    content: '“And now, Israel, '
  - type: note
    content: Mic. 6:8
  - type: text
    content: 'what does the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God require of you, but to fear the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, to walk in all His ways and to '
  - type: note
    content: Deut. 6:5; Matt. 22:37; 1 Tim. 1:5
  - type: text
    content: 'love Him, to serve the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God with all your heart and with all your soul, '
  '13':
  - type: text
    content: and
  - type: text
    content: ' to keep the commandments of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and His statutes which I command you today '
  - type: note
    content: Deut. 6:24
  - type: text
    content: 'for your good? '
  '14':
  - type: text
    content: 'Indeed heaven and the highest heavens belong to the '
  - type: note
    content: (Neh. 9:6; Ps. 68:33; 115:16)
  - type: heading
    content: Lord
  - type: text
    content: ' your God, '
  - type: text
    content: also
  - type: text
    content: ' the earth with all that '
  - type: text
    content: is
  - type: text
    content: ' in it. '
  '15':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' delighted only in your fathers, to love them; and He chose their descendants after them, you above all peoples, as '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' this day. '
  '16':
  - type: text
    content: 'Therefore circumcise the foreskin of your '
  - type: note
    content: Lev. 26:41; Deut. 30:6; Jer. 4:4; Rom. 2:28, 29
  - type: text
    content: 'heart, and be '
  - type: note
    content: Deut. 9:6, 13
  - type: text
    content: 'stiff-necked no longer. '
  '17':
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: Deut. 4:35, 39; Is. 44:8; 46:9; Dan. 2:47; 1 Cor. 8:5, 6
  - type: text
    content: 'God of gods and '
  - type: note
    content: Rev. 19:16
  - type: text
    content: 'Lord of lords, the great God, '
  - type: note
    content: Deut. 7:21
  - type: text
    content: 'mighty and awesome, who '
  - type: note
    content: Acts 10:34
  - type: text
    content: 'shows no partiality nor takes a bribe. '
  '18':
  - type: note
    content: Ex. 22:22–24; Ps. 68:5; 146:9
  - type: text
    content: 'He administers justice for the fatherless and the widow, and loves the stranger, giving him food and clothing. '
  '19':
  - type: text
    content: 'Therefore love the stranger, for you were strangers in the land of Egypt. '
  '2':
  - type: text
    content: 'And I will write on the tablets the words that were on the first tablets, which you broke; and '
  - type: note
    content: Ex. 25:16, 21
  - type: text
    content: you shall put them in the ark.’
  '20':
  - type: note
    content: Matt. 4:10
  - type: text
    content: 'You shall fear the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God; you shall serve Him, and to Him you shall hold fast, and take oaths in His name. '
  '21':
  - type: text
    content: 'He '
  - type: text
    content: is
  - type: text
    content: ' your praise, and He '
  - type: text
    content: is
  - type: text
    content: ' your God, who has done for you these great and awesome things which your eyes have seen. '
  '22':
  - type: text
    content: 'Your fathers went down to Egypt with seventy persons, and now the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has made you as the stars of heaven in multitude.'
  '3':
  - type: text
    content: '“So I made an ark of acacia wood, hewed two tablets of stone like the first, and went up the mountain, having the two tablets in my hand. '
  '4':
  - type: text
    content: 'And He wrote on the tablets according to the first writing, the Ten Commandments, '
  - type: note
    content: Ex. 20:1; 34:28
  - type: text
    content: 'which the '
  - type: heading
    content: Lord
  - type: text
    content: ' had spoken to you in the mountain from the midst of the fire in the day of the assembly; and the '
  - type: heading
    content: Lord
  - type: text
    content: ' gave them to me. '
  '5':
  - type: text
    content: 'Then I turned and '
  - type: note
    content: Ex. 34:29
  - type: text
    content: 'came down from the mountain, and '
  - type: note
    content: Ex. 40:20
  - type: text
    content: 'put the tablets in the ark which I had made; '
  - type: note
    content: 1 Kin. 8:9
  - type: text
    content: 'and there they are, just as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded me.”'
  '6':
  - type: text
    content: '(Now the children of Israel journeyed from the wells of Bene Jaakan to Moserah, where Aaron '
  - type: note
    content: Num. 20:25–28; 33:38
  - type: text
    content: 'died, and where he was buried; and Eleazar his son ministered as priest in his stead. '
  '7':
  - type: note
    content: Num. 33:32–34
  - type: text
    content: 'From there they journeyed to Gudgodah, and from Gudgodah to Jotbathah, a land of rivers of water. '
  '8':
  - type: text
    content: 'At that time '
  - type: note
    content: Num. 3:6
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' separated the tribe of Levi '
  - type: note
    content: Num. 4:5, 15; 10:21
  - type: text
    content: 'to bear the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Deut. 18:5
  - type: text
    content: 'to stand before the '
  - type: heading
    content: Lord
  - type: text
    content: ' to minister to Him and '
  - type: note
    content: Num. 6:23
  - type: text
    content: 'to bless in His name, to this day. '
  '9':
  - type: note
    content: Num. 18:20, 24; Deut. 18:1, 2; Ezek. 44:28
  - type: text
    content: 'Therefore Levi has no portion nor inheritance with his brethren; the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' his inheritance, just as the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God promised him.)'
