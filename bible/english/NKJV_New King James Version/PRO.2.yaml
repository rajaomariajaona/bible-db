document_id: PRO.2,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Value of Wisdom
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My son, if you receive my words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 4:21)
      marker-yv: yv-n
    - type: text
      text: treasure my commands within you,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: When wisdom enters your heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And knowledge is pleasant to your soul,
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Discretion will preserve you;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 4:6; 6:22
      marker-yv: yv-n
    - type: text
      text: Understanding will keep you,
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: To deliver you from the way of evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From the man who speaks perverse things,
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: From those who leave the paths of uprightness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 82:5; Prov. 4:19; (John 3:19, 20)
      marker-yv: yv-n
    - type: text
      text: walk in the ways of darkness;
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 10:23; Jer. 11:15; (Rom. 1:32)
      marker-yv: yv-n
    - type: text
      text: Who rejoice in doing evil,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' delight in the perversity of the wicked;'
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 125:5; (Prov. 21:8)
      marker-yv: yv-n
    - type: text
      text: 'Whose ways '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' crooked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' devious in their paths;'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'To deliver you from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 5:20; 6:24; 7:5
      marker-yv: yv-n
    - type: text
      text: the immoral woman,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 5:3
      marker-yv: yv-n
    - type: text
      text: 'From the seductress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' flatters with her words,'
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Who forsakes the companion of her youth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And forgets the covenant of her God.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 7:27
      marker-yv: yv-n
    - type: text
      text: her house leads down to death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And her paths to the dead;
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: None who go to her return,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor do they regain the paths of life—
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: So that you incline your ear to wisdom,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' apply your heart to understanding;'
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So you may walk in the way of goodness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And keep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' the paths of righteousness.'
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For the upright will dwell in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:3
      marker-yv: yv-n
    - type: text
      text: land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the blameless will remain in it;
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: But the wicked will be cut off from the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the unfaithful will be uprooted from it.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Yes, if you cry out for discernment,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' lift up your voice for understanding,'
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 3:14)
      marker-yv: yv-n
    - type: text
      text: If you seek her as silver,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And search for her as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' hidden treasures;'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (James 1:5, 6)
      marker-yv: yv-n
    - type: text
      text: 'Then you will understand the fear of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And find the knowledge of God.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 3:9, 12; (Job 32:8; James 1:5)
      marker-yv: yv-n
    - type: text
      text: 'For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gives wisdom;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From His mouth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' knowledge and understanding;'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He stores up sound wisdom for the upright;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 84:11); Prov. 30:5
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: He
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a shield to those who walk uprightly;'
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He guards the paths of justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Sam. 2:9); Ps. 66:9
      marker-yv: yv-n
    - type: text
      text: preserves the way of His saints.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then you will understand righteousness and justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Equity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' every good path.'
