document_id: PRO.2,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Value of Wisdom
  - type: text
    content: My son, if you receive my words,
  - type: text
    content: 'And '
  - type: note
    content: (Prov. 4:21)
  - type: text
    content: treasure my commands within you,
  '10':
  - type: text
    content: When wisdom enters your heart,
  - type: text
    content: And knowledge is pleasant to your soul,
  '11':
  - type: text
    content: Discretion will preserve you;
  - type: note
    content: Prov. 4:6; 6:22
  - type: text
    content: Understanding will keep you,
  '12':
  - type: text
    content: To deliver you from the way of evil,
  - type: text
    content: From the man who speaks perverse things,
  '13':
  - type: text
    content: From those who leave the paths of uprightness
  - type: text
    content: 'To '
  - type: note
    content: Ps. 82:5; Prov. 4:19; (John 3:19, 20)
  - type: text
    content: walk in the ways of darkness;
  '14':
  - type: note
    content: Prov. 10:23; Jer. 11:15; (Rom. 1:32)
  - type: text
    content: Who rejoice in doing evil,
  - type: text
    content: And
  - type: text
    content: ' delight in the perversity of the wicked;'
  '15':
  - type: note
    content: Ps. 125:5; (Prov. 21:8)
  - type: text
    content: 'Whose ways '
  - type: text
    content: are
  - type: text
    content: ' crooked,'
  - type: text
    content: 'And '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' devious in their paths;'
  '16':
  - type: text
    content: 'To deliver you from '
  - type: note
    content: Prov. 5:20; 6:24; 7:5
  - type: text
    content: the immoral woman,
  - type: note
    content: Prov. 5:3
  - type: text
    content: 'From the seductress '
  - type: text
    content: who
  - type: text
    content: ' flatters with her words,'
  '17':
  - type: text
    content: Who forsakes the companion of her youth,
  - type: text
    content: And forgets the covenant of her God.
  '18':
  - type: text
    content: 'For '
  - type: note
    content: Prov. 7:27
  - type: text
    content: her house leads down to death,
  - type: text
    content: And her paths to the dead;
  '19':
  - type: text
    content: None who go to her return,
  - type: text
    content: Nor do they regain the paths of life—
  '2':
  - type: text
    content: So that you incline your ear to wisdom,
  - type: text
    content: And
  - type: text
    content: ' apply your heart to understanding;'
  '20':
  - type: text
    content: So you may walk in the way of goodness,
  - type: text
    content: 'And keep '
  - type: text
    content: to
  - type: text
    content: ' the paths of righteousness.'
  '21':
  - type: text
    content: 'For the upright will dwell in the '
  - type: note
    content: Ps. 37:3
  - type: text
    content: land,
  - type: text
    content: And the blameless will remain in it;
  '22':
  - type: text
    content: But the wicked will be cut off from the earth,
  - type: text
    content: And the unfaithful will be uprooted from it.
  '3':
  - type: text
    content: Yes, if you cry out for discernment,
  - type: text
    content: And
  - type: text
    content: ' lift up your voice for understanding,'
  '4':
  - type: note
    content: (Prov. 3:14)
  - type: text
    content: If you seek her as silver,
  - type: text
    content: 'And search for her as '
  - type: text
    content: for
  - type: text
    content: ' hidden treasures;'
  '5':
  - type: note
    content: (James 1:5, 6)
  - type: text
    content: 'Then you will understand the fear of the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: And find the knowledge of God.
  '6':
  - type: note
    content: 1 Kin. 3:9, 12; (Job 32:8; James 1:5)
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' gives wisdom;'
  - type: text
    content: 'From His mouth '
  - type: text
    content: come
  - type: text
    content: ' knowledge and understanding;'
  '7':
  - type: text
    content: He stores up sound wisdom for the upright;
  - type: note
    content: (Ps. 84:11); Prov. 30:5
  - type: text
    content: He
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' a shield to those who walk uprightly;'
  '8':
  - type: text
    content: He guards the paths of justice,
  - type: text
    content: 'And '
  - type: note
    content: (1 Sam. 2:9); Ps. 66:9
  - type: text
    content: preserves the way of His saints.
  '9':
  - type: text
    content: Then you will understand righteousness and justice,
  - type: text
    content: 'Equity '
  - type: text
    content: and
  - type: text
    content: ' every good path.'
