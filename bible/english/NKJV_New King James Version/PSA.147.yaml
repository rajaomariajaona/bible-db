    children:
    - type: text
      text: Praise to God for His Word and Providence
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:18; Ps. 10:16; (Rev. 11:15)
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good to sing praises to our God;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 92:1
      marker-yv: yv-n
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' pleasant, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 135:3
      marker-yv: yv-n
    - type: text
      text: praise is beautiful.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 6:26)
      marker-yv: yv-n
    - type: text
      text: He does not delight in the strength of the horse;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He takes no pleasure in the legs of a man.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' takes pleasure in those who fear Him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In those who hope in His mercy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', O Jerusalem!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Praise your God, O Zion!
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For He has strengthened the bars of your gates;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has blessed your children within you.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 33:16, 17
      marker-yv: yv-n
    - type: text
      text: 'He makes peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' your borders,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 54:13; 60:17, 18
      marker-yv: yv-n
    - type: text
      text: fills you with the finest wheat.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 132:15
      marker-yv: yv-n
    - type: text
      text: 'He sends out His command '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' earth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His word runs very swiftly.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 107:20)
      marker-yv: yv-n
    - type: text
      text: He gives snow like wool;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He scatters the frost like ashes;
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He casts out His hail like morsels;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can stand before His cold?
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 37:6
      marker-yv: yv-n
    - type: text
      text: He sends out His word and melts them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He causes His wind to blow, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the waters flow.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 37:10
      marker-yv: yv-n
    - type: text
      text: He declares His word to Jacob,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 33:4; Ps. 103:7
      marker-yv: yv-n
    - type: text
      text: His statutes and His judgments to Israel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 33:1
      marker-yv: yv-n
    - type: text
      text: builds up Jerusalem;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 102:16
      marker-yv: yv-n
    - type: text
      text: He gathers together the outcasts of Israel.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 4:4
      marker-yv: yv-n
    - type: text
      text: He has not dealt thus with any nation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' judgments, they have not known them.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 30:3; Is. 11:12; 56:8; Ezek. 39:28
      marker-yv: yv-n
    - type: text
      text: He heals the brokenhearted
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And binds up their wounds.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 51:17); Is. 61:1; Luke 4:18
      marker-yv: yv-n
    - type: text
      text: He counts the number of the stars;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He calls them all by name.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 40:26
      marker-yv: yv-n
    - type: text
      text: 'Great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' our Lord, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 48:1
      marker-yv: yv-n
    - type: text
      text: mighty in power;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Nah. 1:3
      marker-yv: yv-n
    - type: text
      text: 'His understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' infinite.'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 40:28
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lifts up the humble;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He casts the wicked down to the ground.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with thanksgiving;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sing praises on the harp to our God,
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 146:8, 9
      marker-yv: yv-n
    - type: text
      text: Who covers the heavens with clouds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who prepares rain for the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who makes grass to grow on the mountains.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 38:26; Ps. 104:13
      marker-yv: yv-n
    - type: text
      text: He gives to the beast its food,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 38:41
      marker-yv: yv-n
    - type: text
      text: to the young ravens that cry.
