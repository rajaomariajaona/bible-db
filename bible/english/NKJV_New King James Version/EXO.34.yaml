  '3':
  - type: text
    content: 'And no man shall '
  - type: note
    content: Ex. 19:12, 13; 24:9–11
  - type: text
    content: come up with you, and let no man be seen throughout all the mountain; let neither flocks nor herds feed before that mountain.”
