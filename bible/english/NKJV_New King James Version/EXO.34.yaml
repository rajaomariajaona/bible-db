  - type: heading
    content: Lord
  - type: text
    content: ' to speak with Him, he would take the veil off until he came out; and he would come out and speak to the children of Israel whatever he had been commanded. '
  '35':
  - type: text
    content: And whenever the children of Israel saw the face of Moses, that the skin of Moses’ face shone, then Moses would put the veil on his face again, until he went in to speak with Him.
