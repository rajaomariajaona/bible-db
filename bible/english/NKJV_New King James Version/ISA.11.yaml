  '5':
  - type: text
    content: Righteousness shall be the belt of His loins,
  - type: text
    content: And faithfulness the belt of His waist.
  '6':
  - type: text
    content: “The
  - type: note
    content: Hos. 2:18
  - type: text
    content: ' wolf also shall dwell with the lamb,'
  - type: text
    content: The leopard shall lie down with the young goat,
  - type: text
    content: The calf and the young lion and the fatling together;
  - type: text
    content: And a little child shall lead them.
  '7':
  - type: text
    content: The cow and the bear shall graze;
  - type: text
    content: Their young ones shall lie down together;
  - type: text
    content: And the lion shall eat straw like the ox.
  '8':
  - type: text
    content: The nursing child shall play by the cobra’s hole,
  - type: text
    content: And the weaned child shall put his hand in the viper’s den.
  '9':
  - type: note
    content: Job 5:23; Is. 65:25; Ezek. 34:25; Hos. 2:18
  - type: text
