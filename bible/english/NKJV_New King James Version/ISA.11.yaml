    - type: text
      text: The Reign of Jesse’s Offspring
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Zech. 6:12); Rev. 5:5
      marker-yv: yv-n
    - type: text
      text: 'shall come forth a Rod from the stem of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 9:7; 11:10); Matt. 1:5; (Acts 13:23)
      marker-yv: yv-n
    - type: text
      text: Jesse,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 4:2
      marker-yv: yv-n
    - type: text
      text: a Branch shall grow out of his roots.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 2:11
      marker-yv: yv-n
    - type: text
      text: ' in that day '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 11:1; Rom. 15:12
      marker-yv: yv-n
    - type: text
      text: there shall be a Root of Jesse,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who shall stand as a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 27:12, 13
      marker-yv: yv-n
    - type: text
      text: banner to the people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 15:10
      marker-yv: yv-n
    - type: text
      text: Gentiles shall seek Him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And His resting place shall be glorious.”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It shall come to pass in that day
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That
    - type: text
      text: ' the Lord shall set His hand again the second time'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To recover the remnant of His people who are left,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 19:23–25; Hos. 11:11; Zech. 10:10
      marker-yv: yv-n
    - type: text
      text: From Assyria and Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From Pathros and Cush,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From Elam and Shinar,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From Hamath and the islands of the sea.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will set up a banner for the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And will assemble the outcasts of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And gather together '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 7:35
      marker-yv: yv-n
    - type: text
      text: the dispersed of Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From the four corners of the earth.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 9:21; Jer. 3:18; Ezek. 37:16, 17, 22; Hos. 1:11
      marker-yv: yv-n
    - type: text
      text: the envy of Ephraim shall depart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the adversaries of Judah shall be cut off;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ephraim shall not envy Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And Judah shall not harass Ephraim.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But they shall fly down upon the shoulder of the Philistines toward the west;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Together they shall plunder the people of the East;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 63:1; Dan. 11:41; Joel 3:19; Amos 9:12
      marker-yv: yv-n
    - type: text
      text: They shall lay their hand on Edom and Moab;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the people of Ammon shall obey them.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 50:2; 51:10, 11; Zech. 10:10, 11
      marker-yv: yv-n
    - type: text
      text: will utterly destroy the tongue of the Sea of Egypt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With His mighty wind He will shake His fist over the River,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And strike it in the seven streams,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' cross over dry-shod.'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 19:23
      marker-yv: yv-n
    - type: text
      text: There will be a highway for the remnant of His people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will be left from Assyria,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 14:29
      marker-yv: yv-n
    - type: text
      text: As it was for Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the day that he came up from the land of Egypt.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 42:1; 48:16; 61:1; Matt. 3:16); Mark 1:10; Luke 3:22; (John 1:32)
      marker-yv: yv-n
    - type: text
      text: 'The Spirit of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shall rest upon Him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Spirit of wisdom and understanding,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Spirit of counsel and might,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The Spirit of knowledge and of the fear of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His delight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in the fear of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And He shall not judge by the sight of His eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor decide by the hearing of His ears;
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 19:11
      marker-yv: yv-n
    - type: text
      text: with righteousness He shall judge the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And decide with equity for the meek of the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 4:9; Is. 30:28, 33; Mal. 4:6; 2 Thess. 2:8
      marker-yv: yv-n
    - type: text
      text: strike the earth with the rod of His mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And with the breath of His lips He shall slay the wicked.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Righteousness shall be the belt of His loins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And faithfulness the belt of His waist.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 2:18
      marker-yv: yv-n
    - type: text
      text: ' wolf also shall dwell with the lamb,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The leopard shall lie down with the young goat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The calf and the young lion and the fatling together;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a little child shall lead them.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The cow and the bear shall graze;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their young ones shall lie down together;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the lion shall eat straw like the ox.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The nursing child shall play by the cobra’s hole,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the weaned child shall put his hand in the viper’s den.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:23; Is. 65:25; Ezek. 34:25; Hos. 2:18
      marker-yv: yv-n
    - type: text
      text: They shall not hurt nor destroy in all My holy mountain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 98:2, 3; Is. 45:6; Hab. 2:14
      marker-yv: yv-n
    - type: text
      text: 'the earth shall be full of the knowledge of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As the waters cover the sea.
