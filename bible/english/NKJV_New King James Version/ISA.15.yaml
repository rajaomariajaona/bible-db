document_id: ISA.15,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Proclamation Against Moab
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 3:4
      marker-yv: yv-n
    - type: text
      text: burden against Moab.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because in the night '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 2:9; Num. 21:28
      marker-yv: yv-n
    - type: text
      text: 'Ar of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 15:1—16:14; Jer. 25:21; 48:1–47; Amos 2:1–3; Zeph. 2:8–11
      marker-yv: yv-n
    - type: text
      text: Moab is laid waste
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' destroyed,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because in the night Kir of Moab is laid waste
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' destroyed,'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has gone up to the temple and Dibon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To the high places to weep.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Moab will wail over Nebo and over Medeba;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 21:5; Jer. 48:37
      marker-yv: yv-n
    - type: text
      text: 'On all their heads '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' baldness,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' every beard cut off.'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In their streets they will clothe themselves with sackcloth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: On the tops of their houses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in their streets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Everyone will wail, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 48:38
      marker-yv: yv-n
    - type: text
      text: weeping bitterly.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Heshbon and Elealeh will cry out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Their voice shall be heard as far as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:28; 32:3; Jer. 48:34
      marker-yv: yv-n
    - type: text
      text: Jahaz;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore the armed soldiers of Moab will cry out;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His life will be burdensome to him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 16:11; Jer. 48:31
      marker-yv: yv-n
    - type: text
      text: ' heart will cry out for Moab;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His fugitives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: flee
    - type: text
      text: ' to Zoar,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Like
    - type: text
      text: ' a three-year-old heifer.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 48:5
      marker-yv: yv-n
    - type: text
      text: by the Ascent of Luhith
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will go up with weeping;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For in the way of Horonaim
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will raise up a cry of destruction,
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the waters '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:36
      marker-yv: yv-n
    - type: text
      text: of Nimrim will be desolate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the green grass has withered away;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The grass fails, there is nothing green.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore the abundance they have gained,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And what they have laid up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will carry away to the Brook of the Willows.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the cry has gone all around the borders of Moab,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Its wailing to Eglaim
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And its wailing to Beer Elim.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the waters of Dimon will be full of blood;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because I will bring more upon Dimon,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 17:25; Jer. 50:17
      marker-yv: yv-n
    - type: text
      text: Lions upon him who escapes from Moab,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And on the remnant of the land.”
