  - type: text
    content: by no means enter it.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And He took them up in His arms, laid '
  - type: text
    content: His
  - type: text
    content: ' hands on them, and blessed them.'
  - type: heading
    content: Jesus Counsels the Rich Young Ruler
  '17':
  - type: note
    content: Matt. 19:16–30; Luke 18:18–30
  - type: text
    content: 'Now as He was going out on the road, one came running, knelt before Him, and asked Him, “Good Teacher, what shall I '
  - type: note
    content: John 6:28; Acts 2:37
  - type: text
    content: do that I may inherit eternal life?”
  '18':
  - type: text
    content: 'So Jesus said to him, '
  - type: text
    content: '“Why do you call Me good? No one '
  - type: text
    content: is
  - type: text
    content: ' good but One, '
  - type: text
    content: that is,
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 2:2
  - type: text
    content: God.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'You know the commandments: '
  - type: note
    content: Ex. 20:12–16; Deut. 5:16–20; (Rom. 13:9; James 2:10, 11)
  - type: text
    content: ‘Do not commit adultery,’ ‘Do not murder,’ ‘Do not steal,’ ‘Do not bear false witness,’
  - type: text
    content: ' ‘Do not defraud,’ '
  - type: text
    content: ‘Honor your father and your mother.’
  - type: text
    content: ' ”'
  '2':
  - type: note
    content: Matt. 19:3
  - type: text
    content: 'The Pharisees came and asked Him, “Is it lawful for a man to divorce '
  - type: text
    content: his
  - type: text
    content: ' wife?” testing Him.'
  '20':
  - type: text
    content: 'And he answered and said to Him, “Teacher, all these things I have '
  - type: note
    content: Phil. 3:6
  - type: text
    content: kept from my youth.”
  '21':
  - type: text
    content: 'Then Jesus, looking at him, loved him, and said to him, '
  - type: text
    content: '“One thing you lack: Go your way, '
  - type: note
    content: (Luke 12:33; 16:9)
  - type: text
    content: 'sell whatever you have and give to the poor, and you will have '
  - type: note
    content: Matt. 6:19, 20; 19:21
  - type: text
    content: 'treasure in heaven; and come, '
  - type: note
    content: (Mark 8:34)
  - type: text
    content: take up the cross, and follow Me.”
  '22':
  - type: text
    content: But he was sad at this word, and went away sorrowful, for he had great possessions.
  - type: heading
    content: With God All Things Are Possible
  '23':
  - type: note
    content: Matt. 19:23; (Mark 4:19); Luke 18:24
  - type: text
    content: 'Then Jesus looked around and said to His disciples, '
  - type: text
    content: “How hard it is for those who have riches to enter the kingdom of God!”
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And the disciples were astonished at His words. But Jesus answered again and said to them, '
  - type: text
    content: '“Children, how hard it is '
  - type: text
    content: 'for those '
  - type: note
    content: Job 31:24; Ps. 52:7; 62:10; (Prov. 11:28; 1 Tim. 6:17)
  - type: text
    content: who trust in riches
  - type: text
    content: ' to enter the kingdom of God!'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'It is easier for a camel to go through the eye of a needle than for a '
  - type: note
    content: (Matt. 13:22; 19:24)
  - type: text
    content: rich man to enter the kingdom of God.”
  '26':
  - type: text
    content: And they were greatly astonished, saying among themselves, “Who then can be saved?”
  '27':
  - type: text
    content: 'But Jesus looked at them and said, '
  - type: text
    content: '“With men '
  - type: text
    content: it is
  - type: text
    content: ' impossible, but not '
  - type: note
    content: Job 42:2; Jer. 32:17; Matt. 19:26; Luke 1:37
  - type: text
    content: with God; for with God all things are possible.”
  '28':
  - type: note
    content: Matt. 19:27; Luke 18:28
  - type: text
    content: Then Peter began to say to Him, “See, we have left all and followed You.”
  '29':
  - type: text
    content: 'So Jesus answered and said, '
  - type: text
    content: '“Assuredly, I say to you, there is no one who has left house or brothers or sisters or father or mother '
  - type: text
    content: or wife
  - type: text
    content: ' or children or '
  - type: text
    content: lands, for My sake and the gospel’s,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And He answered and said to them, '
  - type: text
    content: “What did Moses command you?”
  '30':
  - type: note
    content: 2 Chr. 25:9; Luke 18:29, 30
  - type: text
    content: 'who shall not receive a hundredfold now in this time—houses and brothers and sisters and mothers and children and lands, with '
  - type: note
    content: 1 Thess. 3:3; 2 Tim. 3:12; (1 Pet. 4:12, 13)
  - type: text
    content: persecutions—and in the age to come, eternal life.
  - type: text
    content: ' '
  '31':
  - type: note
    content: Matt. 19:30; 20:16; Luke 13:30
  - type: text
    content: 'But many '
  - type: text
    content: who are
  - type: text
    content: ' first will be last, and the last first.”'
  - type: heading
    content: Jesus a Third Time Predicts His Death and Resurrection
  '32':
  - type: note
    content: Matt. 20:17–19; Luke 18:31–33
  - type: text
    content: 'Now they were on the road, going up to Jerusalem, and Jesus was going before them; and they were amazed. And as they followed they were afraid. '
  - type: note
    content: Mark 8:31; 9:31; Luke 9:22; 18:31
  - type: text
    content: 'Then He took the twelve aside again and began to tell them the things that would happen to Him: '
  '33':
  - type: text
    content: “Behold, we are going up to Jerusalem, and the Son of Man will be betrayed to the chief priests and to the scribes; and they will condemn Him to death and deliver Him to the Gentiles;
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'and they will mock Him, and '
  - type: text
    content: scourge Him, and spit on Him, and kill Him. And the third day He will rise again.”
  - type: heading
    content: Greatness Is Serving
  '35':
  - type: note
    content: (James 4:3)
  - type: text
    content: Then James and John, the sons of Zebedee, came to Him, saying, “Teacher, we want You to do for us whatever we ask.”
  '36':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “What do you want Me to do for you?”
  '37':
  - type: text
    content: They said to Him, “Grant us that we may sit, one on Your right hand and the other on Your left, in Your glory.”
  '38':
  - type: text
    content: 'But Jesus said to them, '
  - type: text
    content: '“You do not know what you ask. Are you able to drink the '
  - type: note
    content: Matt. 26:39, 42; Mark 14:36; Luke 22:42; John 18:11
  - type: text
    content: 'cup that I drink, and be baptized with the '
  - type: note
    content: Luke 12:50
  - type: text
    content: baptism that I am baptized with?”
  '39':
  - type: text
    content: They said to Him, “We are able.”
  - type: text
    content: 'So Jesus said to them, '
  - type: note
    content: Matt. 10:17, 18, 21, 22; 24:9; John 16:33; Acts 12:2; Rev. 1:9
  - type: text
    content: “You will indeed drink the cup that I drink, and with the baptism I am baptized with you will be baptized;
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'They said, '
  - type: note
    content: Deut. 24:1–4; Matt. 5:31; 19:7
  - type: text
    content: '“Moses permitted '
  - type: text
    content: a
  - type: text
    content: ' '
  - type: text
    content: man
  - type: text
    content: ' to write a certificate of divorce, and to dismiss '
  - type: text
    content: her.
  - type: text
    content: ”
  '40':
  - type: text
    content: 'but to sit on My right hand and on My left is not Mine to give, but '
  - type: text
    content: it is for those
  - type: text
    content: ' '
  - type: note
    content: (Matt. 25:34; John 17:2, 6, 24; Rom. 8:30; Heb. 11:16)
  - type: text
    content: for whom it is prepared.”
  '41':
  - type: note
    content: Matt. 20:24
  - type: text
    content: 'And when the ten heard '
  - type: text
    content: it,
  - type: text
    content: ' they began to be greatly displeased with James and John. '
  '42':
  - type: text
    content: 'But Jesus called them to '
  - type: text
    content: Himself
  - type: text
    content: ' and said to them, '
  - type: note
    content: Luke 22:25
  - type: text
    content: “You know that those who are considered rulers over the Gentiles lord it over them, and their great ones exercise authority over them.
  - type: text
    content: ' '
  '43':
  - type: note
    content: Matt. 20:26, 28; Mark 9:35; Luke 9:48
  - type: text
    content: Yet it shall not be so among you; but whoever desires to become great among you shall be your servant.
  - type: text
    content: ' '
  '44':
  - type: text
    content: And whoever of you desires to be first shall be slave of all.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'For even '
  - type: note
    content: Luke 22:27; John 13:14; (Phil. 2:7, 8)
  - type: text
    content: 'the Son of Man did not come to be served, but to serve, and '
  - type: note
    content: Matt. 20:28; (2 Cor. 5:21; 1 Tim. 2:5, 6; Titus 2:14)
  - type: text
    content: to give His life a ransom for many.”
  - type: heading
    content: Jesus Heals Blind Bartimaeus
  '46':
  - type: note
    content: Matt. 20:29–34; Luke 18:35–43
  - type: text
    content: 'Now they came to Jericho. As He went out of Jericho with His disciples and a great multitude, blind Bartimaeus, the son of Timaeus, sat by the road begging. '
  '47':
  - type: text
    content: 'And when he heard that it was Jesus of Nazareth, he began to cry out and say, “Jesus, '
  - type: note
    content: Jer. 23:5; Matt. 22:42; Rom. 1:3, 4; Rev. 22:16
  - type: text
    content: 'Son of David, '
  - type: note
    content: Matt. 15:22; Luke 17:13
  - type: text
    content: have mercy on me!”
  '48':
  - type: text
    content: Then many warned him to be quiet; but he cried out all the more, “Son of David, have mercy on me!”
  '49':
  - type: text
    content: So Jesus stood still and commanded him to be called.
  - type: text
    content: Then they called the blind man, saying to him, “Be of good cheer. Rise, He is calling you.”
  '5':
  - type: text
    content: 'And Jesus answered and said to them, '
  - type: text
    content: '“Because of the hardness of your heart he wrote you this '
  - type: text
    content: precept.
  - type: text
    content: ' '
  '50':
  - type: text
    content: And throwing aside his garment, he rose and came to Jesus.
  '51':
  - type: text
    content: 'So Jesus answered and said to him, '
  - type: text
    content: “What do you want Me to do for you?”
  - type: text
    content: The blind man said to Him, “Rabboni, that I may receive my sight.”
  '52':
  - type: text
    content: 'Then Jesus said to him, '
  - type: text
    content: '“Go your way; '
  - type: note
    content: Matt. 9:22; Mark 5:34
  - type: text
    content: 'your faith has '
  - type: text
    content: made you well.”
  - type: text
    content: ' And immediately he received his sight and followed Jesus on the road.'
  '6':
  - type: text
    content: 'But from the beginning of the creation, God '
  - type: note
    content: Gen. 1:27; 5:2
  - type: text
    content: ‘made them male and female.’
  - type: text
    content: ' '
  '7':
  - type: note
    content: Gen. 2:24; (1 Cor. 6:16); Eph. 5:31
  - type: text
    content: ‘For this reason a man shall leave his father and mother and be joined to his wife,
  - type: text
    content: ' '
  '8':
  - type: text
    content: and the two shall become one flesh’
  - type: text
    content: '; '
  - type: text
    content: so then they are no longer two, but one flesh.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Therefore what God has joined together, let not man separate.”
