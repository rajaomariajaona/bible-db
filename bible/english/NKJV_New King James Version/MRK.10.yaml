  '1':
  - type: heading
    content: Marriage and Divorce
  - type: text
    content: 'Then '
  - type: note
    content: Matt. 19:1–9; John 10:40; 11:7
  - type: text
    content: He arose from there and came to the region of Judea by the other side of the Jordan. And multitudes gathered to Him again, and as He was accustomed, He taught them again.
  '10':
  - type: text
    content: 'In the house His disciples also asked Him again about the same '
  - type: text
    content: matter.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'So He said to them, '
  - type: note
    content: Ex. 20:14; (Matt. 5:32; 19:9); Luke 16:18; (Rom. 7:3); 1 Cor. 7:10, 11
  - type: text
    content: “Whoever divorces his wife and marries another commits adultery against her.
  - type: text
    content: ' '
  '12':
  - type: text
    content: And if a woman divorces her husband and marries another, she commits adultery.”
  - type: heading
    content: Jesus Blesses Little Children
  '13':
  - type: note
    content: Matt. 19:13–15; Luke 18:15–17
  - type: text
    content: 'Then they brought little children to Him, that He might touch them; but the disciples rebuked those who brought '
  - type: text
    content: them.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'But when Jesus saw '
  - type: text
    content: it,
  - type: text
    content: ' He was greatly displeased and said to them, '
  - type: text
    content: '“Let the little children come to Me, and do not forbid them; for '
  - type: note
    content: (1 Cor. 14:20; 1 Pet. 2:2)
  - type: text
    content: of such is the kingdom of God.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Assuredly, I say to you, '
  - type: note
    content: Matt. 18:3, 4; 19:14; Luke 18:17
  - type: text
    content: 'whoever does not receive the kingdom of God as a little child will '
  - type: note
