  - type: text
    content: whirlwinds in the South pass through,
  - type: text
    content: So
  - type: text
    content: ' it comes from the desert, from a terrible land.'
  '10':
  - type: note
    content: Jer. 51:33; Mic. 4:13
  - type: text
    content: Oh, my threshing and the grain of my floor!
  - type: text
    content: 'That which I have heard from the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts,'
  - type: text
    content: The God of Israel,
  - type: text
    content: I have declared to you.
  - type: heading
    content: Proclamation Against Edom
  '11':
  - type: note
    content: Gen. 25:14; 1 Chr. 1:30; Josh. 15:52
  - type: text
    content: The burden against Dumah.
  - type: text
    content: 'He calls to me out of '
  - type: note
    content: Gen. 32:3; Jer. 49:7; Ezek. 35:2; Obad. 1
  - type: text
    content: Seir,
  - type: text
    content: “Watchman, what of the night?
  - type: text
    content: Watchman, what of the night?”
  '12':
  - type: text
    content: The watchman said,
  - type: text
    content: “The morning comes, and also the night.
  - type: text
    content: If you will inquire, inquire;
  - type: text
    content: Return! Come back!”
  - type: heading
    content: Proclamation Against Arabia
  '13':
  - type: note
    content: Jer. 25:24; 49:28
  - type: text
    content: The burden against Arabia.
  - type: text
    content: In the forest in Arabia you will lodge,
  - type: text
    content: 'O you traveling companies '
  - type: note
    content: Gen. 10:7; 1 Chr. 1:9, 32; Jer. 25:23; Ezek. 27:15
  - type: text
    content: of Dedanites.
  '14':
  - type: text
    content: O inhabitants of the land of Tema,
  - type: text
    content: Bring water to him who is thirsty;
  - type: text
    content: With their bread they met him who fled.
  '15':
  - type: text
    content: For they fled from the swords, from the drawn sword,
  - type: text
    content: From the bent bow, and from the distress of war.
  '16':
  - type: text
    content: 'For thus the '
  - type: heading
    content: Lord
  - type: text
    content: ' has said to me: “Within a year, '
  - type: note
    content: Is. 16:14
  - type: text
    content: 'according to the year of a hired man, all the glory of '
  - type: note
    content: Ps. 120:5; Song 1:5; Is. 42:11; 60:7; Ezek. 27:21
  - type: text
    content: 'Kedar will fail; '
  '17':
  - type: text
    content: 'and the remainder of the number of archers, the mighty men of the people of Kedar, will be diminished; for the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel has spoken '
  - type: text
    content: it.
  - type: text
    content: ”
  '2':
  - type: text
    content: A distressing vision is declared to me;
  - type: note
    content: Is. 33:1
  - type: text
    content: The treacherous dealer deals treacherously,
  - type: text
    content: And the plunderer plunders.
  - type: note
    content: Is. 13:17; 22:6; Jer. 49:34
  - type: text
    content: Go up, O Elam!
  - type: text
    content: Besiege, O Media!
  - type: text
    content: All its sighing I have made to cease.
  '3':
  - type: text
    content: 'Therefore '
  - type: note
    content: Is. 15:5; 16:11
  - type: text
    content: my loins are filled with pain;
  - type: note
    content: Is. 13:8
  - type: text
    content: Pangs have taken hold of me, like the pangs of a woman in labor.
  - type: text
    content: 'I was distressed when '
  - type: text
    content: I
  - type: text
    content: ' heard '
  - type: text
    content: it;
  - type: text
    content: 'I was dismayed when '
  - type: text
    content: I
  - type: text
    content: ' saw '
  - type: text
    content: it.
  '4':
  - type: text
    content: My heart wavered, fearfulness frightened me;
  - type: note
    content: Deut. 28:67
  - type: text
    content: The night for which I longed He turned into fear for me.
  '5':
  - type: note
    content: Jer. 51:39; Dan. 5:5
  - type: text
    content: Prepare the table,
  - type: text
    content: Set a watchman in the tower,
  - type: text
    content: Eat and drink.
  - type: text
    content: Arise, you princes,
  - type: text
    content: Anoint the shield!
  '6':
  - type: text
    content: 'For thus has the Lord said to me:'
  - type: text
    content: “Go, set a watchman,
  - type: text
    content: Let him declare what he sees.”
  '7':
  - type: text
    content: 'And he saw a chariot '
  - type: text
    content: with
  - type: text
    content: ' a pair of horsemen,'
  - type: text
    content: 'A chariot of donkeys, '
  - type: text
    content: and
  - type: text
    content: ' a chariot of camels,'
  - type: text
    content: And he listened earnestly with great care.
  '8':
  - type: text
    content: Then he cried, “A lion, my Lord!
  - type: text
    content: 'I stand continually on the '
  - type: note
    content: Hab. 2:1
  - type: text
    content: watchtower in the daytime;
  - type: text
    content: I have sat at my post every night.
  '9':
  - type: text
    content: 'And look, here comes a chariot of men '
  - type: text
    content: with
  - type: text
    content: ' a pair of horsemen!”'
  - type: text
    content: Then he answered and said,
  - type: note
    content: Is. 13:19; 47:5, 9; 48:14; Jer. 51:8; Dan. 5:28, 31; Rev. 14:8; 18:2
  - type: text
    content: “Babylon is fallen, is fallen!
  - type: text
    content: 'And '
  - type: note
    content: Is. 46:1; Jer. 50:2; 51:44
  - type: text
    content: all the carved images of her gods
  - type: text
    content: He has broken to the ground.”
