  '1':
  - type: heading
    content: A Prayer of Faith in Time of Distress
  - type: text
    content: 'To the Chief Musician. With stringed instruments. '
  - type: note
    content: Ps. 12:title
  - type: text
    content: On an eight-stringed harp. A Psalm of David.
  - type: text
    content: 'O '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ps. 38:1; 118:18; (Jer. 10:24)
  - type: text
    content: do not rebuke me in Your anger,
  - type: text
    content: Nor chasten me in Your hot displeasure.
  '10':
  - type: text
    content: Let all my enemies be ashamed and greatly troubled;
  - type: text
    content: 'Let them turn back '
  - type: text
    content: and
  - type: text
    content: ' be ashamed suddenly.'
  '2':
  - type: text
    content: 'Have mercy on me, O '
  - type: heading
    content: Lord
  - type: text
    content: ', for I '
  - type: text
    content: am
  - type: text
    content: ' weak;'
  - type: text
    content: 'O '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ps. 41:4; 147:3; (Hos. 6:1)
  - type: text
    content: heal me, for my bones are troubled.
  '3':
  - type: text
    content: 'My soul also is greatly '
  - type: note
    content: Ps. 88:3; John 12:27
  - type: text
    content: troubled;
  - type: text
    content: 'But You, O '
  - type: heading
    content: Lord
  - type: text
    content: —how long?
  '4':
  - type: text
    content: 'Return, O '
  - type: heading
    content: Lord
  - type: text
    content: ', deliver me!'
  - type: text
    content: Oh, save me for Your mercies’ sake!
  '5':
  - type: note
    content: Ps. 30:9; 88:10–12; 115:17; (Eccl. 9:10); Is. 38:18
  - type: text
    content: 'For in death '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' no remembrance of You;'
  - type: text
    content: In the grave who will give You thanks?
  '6':
  - type: text
    content: I am weary with my groaning;
  - type: text
    content: All night I make my bed swim;
  - type: text
    content: I drench my couch with my tears.
  '7':
  - type: note
    content: Job 17:7; Ps. 31:9
  - type: text
    content: My eye wastes away because of grief;
  - type: text
    content: It grows old because of all my enemies.
  '8':
  - type: note
    content: (Matt. 25:41)
  - type: text
    content: Depart from me, all you workers of iniquity;
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' has '
  - type: note
    content: Ps. 3:4; 28:6
  - type: text
    content: heard the voice of my weeping.
  '9':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' has heard my supplication;'
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' will receive my prayer.'
