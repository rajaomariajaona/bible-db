document_id: PSA.6,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prayer of Faith in Time of Distress
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. With stringed instruments. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 12:title
      marker-yv: yv-n
    - type: text
      text: On an eight-stringed harp. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 38:1; 118:18; (Jer. 10:24)
      marker-yv: yv-n
    - type: text
      text: do not rebuke me in Your anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor chasten me in Your hot displeasure.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let all my enemies be ashamed and greatly troubled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let them turn back '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be ashamed suddenly.'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Have mercy on me, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' weak;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 41:4; 147:3; (Hos. 6:1)
      marker-yv: yv-n
    - type: text
      text: heal me, for my bones are troubled.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My soul also is greatly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 88:3; John 12:27
      marker-yv: yv-n
    - type: text
      text: troubled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But You, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: —how long?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Return, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', deliver me!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, save me for Your mercies’ sake!
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 30:9; 88:10–12; 115:17; (Eccl. 9:10); Is. 38:18
      marker-yv: yv-n
    - type: text
      text: 'For in death '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no remembrance of You;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the grave who will give You thanks?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am weary with my groaning;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All night I make my bed swim;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I drench my couch with my tears.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 17:7; Ps. 31:9
      marker-yv: yv-n
    - type: text
      text: My eye wastes away because of grief;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It grows old because of all my enemies.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 25:41)
      marker-yv: yv-n
    - type: text
      text: Depart from me, all you workers of iniquity;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 3:4; 28:6
      marker-yv: yv-n
    - type: text
      text: heard the voice of my weeping.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has heard my supplication;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will receive my prayer.'
