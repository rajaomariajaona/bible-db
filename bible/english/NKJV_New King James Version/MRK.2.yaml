  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'When Jesus saw their faith, He said to the paralytic, '
    - type: usfm
      marker: wj
      children:
      - type: text
