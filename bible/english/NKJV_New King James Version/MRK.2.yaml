  '16':
  - type: text
    content: 'And when the scribes and Pharisees saw Him eating with the tax collectors and sinners, they said to His disciples, “How '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' that He eats and drinks with tax collectors and sinners?”'
  '17':
  - type: text
    content: 'When Jesus heard '
  - type: text
    content: it,
  - type: text
    content: ' He said to them, '
  - type: note
    content: Matt. 9:12, 13; 18:11; Luke 5:31, 32; 19:10
  - type: text
    content: '“Those who are well have no need of a physician, but those who are sick. I did not come to call '
  - type: text
    content: the
  - type: text
    content: ' righteous, but sinners, '
  - type: text
    content: to repentance.”
  - type: heading
    content: Jesus Is Questioned About Fasting
  '18':
  - type: note
    content: Matt. 9:14–17; Luke 5:33–38
  - type: text
    content: The disciples of John and of the Pharisees were fasting. Then they came and said to Him, “Why do the disciples of John and of the Pharisees fast, but Your disciples do not fast?”
  '19':
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: '“Can the '
  - type: text
    content: friends of the bridegroom fast while the bridegroom is with them? As long as they have the bridegroom with them they cannot fast.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Immediately many gathered together, so that there was no longer room to receive '
  - type: text
    content: them,
  - type: text
    content: ' not even near the door. And He preached the word to them. '
  '20':
  - type: text
    content: 'But the days will come when the bridegroom will be '
  - type: note
    content: Acts 1:9; 13:2, 3; 14:23
  - type: text
    content: taken away from them, and then they will fast in those days.
  - type: text
    content: ' '
  '21':
  - type: text
    content: No one sews a piece of unshrunk cloth on an old garment; or else the new piece pulls away from the old, and the tear is made worse.
  - type: text
    content: ' '
  '22':
  - type: text
    content: And no one puts new wine into old wineskins; or else the new wine bursts the wineskins, the wine is spilled, and the wineskins are ruined. But new wine must be put into new wineskins.”
  - type: heading
    content: Jesus Is Lord of the Sabbath
  '23':
  - type: note
    content: Matt. 12:1–8; Luke 6:1–5
  - type: text
    content: 'Now it happened that He went through the grainfields on the Sabbath; and as they went His disciples began '
  - type: note
    content: Deut. 23:25
  - type: text
    content: 'to pluck the heads of grain. '
  '24':
  - type: text
    content: 'And the Pharisees said to Him, “Look, why do they do what is '
  - type: note
    content: Ex. 20:10; 31:15
  - type: text
    content: not lawful on the Sabbath?”
  '25':
  - type: text
    content: 'But He said to them, '
  - type: text
    content: '“Have you never read '
  - type: note
    content: 1 Sam. 21:1–6
  - type: text
    content: 'what David did when he was in need and hungry, he and those with him:'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'how he went into the house of God '
  - type: text
    content: in the days
  - type: text
    content: ' of Abiathar the high priest, and ate the showbread, '
  - type: note
    content: Ex. 29:32, 33; Lev. 24:5–9
  - type: text
    content: which is not lawful to eat except for the priests, and also gave some to those who were with him?”
  '27':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: '“The Sabbath was made for man, and not man for the '
  - type: note
    content: Gen. 2:3; Ex. 23:12; Deut. 5:14; Neh. 9:14; Ezek. 20:12
  - type: text
    content: Sabbath.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Therefore '
  - type: note
    content: Matt. 12:8
  - type: text
    content: the Son of Man is also Lord of the Sabbath.”
  '3':
  - type: text
    content: 'Then they came to Him, bringing a '
  - type: note
    content: Matt. 4:24; 8:6; Acts 8:7; 9:33
  - type: text
    content: 'paralytic who was carried by four '
  - type: text
    content: men.
  - type: text
    content: ' '
  '4':
  - type: text
    content: And when they could not come near Him because of the crowd, they uncovered the roof where He was. So when they had broken through, they let down the bed on which the paralytic was lying.
  '5':
  - type: text
    content: 'When Jesus saw their faith, He said to the paralytic, '
  - type: text
    content: “Son, your sins are forgiven you.”
  '6':
  - type: text
    content: 'And some of the scribes were sitting there and reasoning in their hearts, '
  '7':
  - type: text
    content: '“Why does this '
  - type: text
    content: Man
  - type: text
    content: ' speak blasphemies like this? '
  - type: note
    content: Job 14:4; Is. 43:25; Dan. 9:9
  - type: text
    content: Who can forgive sins but God alone?”
  '8':
  - type: text
    content: 'But immediately, when Jesus perceived in His spirit that they reasoned thus within themselves, He said to them, '
  - type: text
    content: “Why do you reason about these things in your hearts?
  - type: text
    content: ' '
  '9':
  - type: note
    content: Matt. 9:5
  - type: text
    content: Which is easier, to say to the paralytic, ‘
  - type: text
    content: Your
  - type: text
