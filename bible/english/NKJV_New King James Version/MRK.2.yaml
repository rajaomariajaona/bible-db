      children:
      - type: text
        text: Matt. 9:10
      marker-yv: yv-n
    - type: text
      text: 'Now it happened, as He was dining in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Levi’s
    - type: text
      text: ' house, that many tax collectors and sinners also sat together with Jesus and His disciples; for there were many, and they followed Him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
