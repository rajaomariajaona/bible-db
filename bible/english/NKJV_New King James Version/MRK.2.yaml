    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But immediately, when Jesus perceived in His spirit that they reasoned thus within themselves, He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why do you reason about these things in your hearts?
    - type: text
      text: ' '
  '9':
  - type: usfm
