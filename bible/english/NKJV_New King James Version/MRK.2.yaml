      children:
      - type: text
        text: Acts 1:9; 13:2, 3; 14:23
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: taken away from them, and then they will fast in those days.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: No one sews a piece of unshrunk cloth on an old garment; or else the new piece pulls away from the old, and the tear is made worse.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And no one puts new wine into old wineskins; or else the new wine bursts the wineskins, the wine is spilled, and the wineskins are ruined. But new wine must be put into new wineskins.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Is Lord of the Sabbath
