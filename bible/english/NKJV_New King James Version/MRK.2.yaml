      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Those who are well have no need of a physician, but those who are sick. I did not come to call '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: the
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' righteous, but sinners, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to repentance.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Is Questioned About Fasting
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 9:14–17; Luke 5:33–38
      marker-yv: yv-n
    - type: text
      text: The disciples of John and of the Pharisees were fasting. Then they came and said to Him, “Why do the disciples of John and of the Pharisees fast, but Your disciples do not fast?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Can the '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: friends of the bridegroom fast while the bridegroom is with them? As long as they have the bridegroom with them they cannot fast.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Immediately many gathered together, so that there was no longer room to receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
    - type: text
      text: ' not even near the door. And He preached the word to them. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But the days will come when the bridegroom will be '
    - type: usfm
