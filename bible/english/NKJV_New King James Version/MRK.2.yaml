    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' that He eats and drinks with tax collectors and sinners?”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'When Jesus heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' He said to them, '
    - type: usfm
      marker: x
      children:
      - type: text
