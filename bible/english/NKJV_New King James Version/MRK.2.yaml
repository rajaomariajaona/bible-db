      - type: text
        text: Matt. 9:9–13; Luke 5:27–32
      marker-yv: yv-n
    - type: text
      text: 'As He passed by, He saw Levi the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: son
    - type: text
      text: ' of Alphaeus sitting at the tax office. And He said to him, '
    - type: usfm
