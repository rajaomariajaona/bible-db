  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And some of the scribes were sitting there and reasoning in their hearts, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“Why does this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Man
    - type: text
