    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“The Sabbath was made for man, and not man for the '
    - type: usfm
