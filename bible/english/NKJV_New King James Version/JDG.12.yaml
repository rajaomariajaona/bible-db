document_id: JDG.12,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jephthah’s Conflict with Ephraim
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 8:1
      marker-yv: yv-n
    - type: text
      text: the men of Ephraim gathered together, crossed over toward Zaphon, and said to Jephthah, “Why did you cross over to fight against the people of Ammon, and did not call us to go with you? We will burn your house down on you with fire!”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Ibzan died and was buried at Bethlehem.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After him, Elon the Zebulunite judged Israel. He judged Israel ten years. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Elon the Zebulunite died and was buried at Aijalon in the country of Zebulun.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After him, Abdon the son of Hillel the Pirathonite judged Israel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He had forty sons and thirty grandsons, who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 5:10; 10:4
      marker-yv: yv-n
    - type: text
      text: 'rode on seventy young donkeys. He judged Israel eight years. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abdon the son of Hillel the Pirathonite died and was buried in Pirathon in the land of Ephraim, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 3:13, 27; 5:14
      marker-yv: yv-n
    - type: text
      text: in the mountains of the Amalekites.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jephthah said to them, “My people and I were in a great struggle with the people of Ammon; and when I called you, you did not deliver me out of their hands. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when I saw that you would not deliver '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me,
    - type: text
      text: ' I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 19:5; 28:21; Job 13:14
      marker-yv: yv-n
    - type: text
      text: 'took my life in my hands and crossed over against the people of Ammon; and the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' delivered them into my hand. Why then have you come up to me this day to fight against me?” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Jephthah gathered together all the men of Gilead and fought against Ephraim. And the men of Gilead defeated Ephraim, because they said, “You Gileadites '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 25:10
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' fugitives of Ephraim among the Ephraimites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' among the Manassites.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Gileadites seized the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 22:11
      marker-yv: yv-n
    - type: text
      text: 'fords of the Jordan before the Ephraimites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: arrived.
    - type: text
      text: ' And when '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' Ephraimite who escaped said, “Let me cross over,” the men of Gilead would say to him, “'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Are
    - type: text
      text: ' you an Ephraimite?” If he said, “No,” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then they would say to him, “Then say, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 69:2, 15
      marker-yv: yv-n
    - type: text
      text: '‘Shibboleth’!” And he would say, “Sibboleth,” for he could not pronounce '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' right. Then they would take him and kill him at the fords of the Jordan. There fell at that time forty-two thousand Ephraimites.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Jephthah judged Israel six years. Then Jephthah the Gileadite died and was buried in among the cities of Gilead.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ibzan, Elon, and Abdon
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After him, Ibzan of Bethlehem judged Israel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He had thirty sons. And he gave away thirty daughters in marriage, and brought in thirty daughters from elsewhere for his sons. He judged Israel seven years. '
