document_id: JDG.12,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jephthah’s Conflict with Ephraim
  - type: text
    content: 'Then '
  - type: note
    content: Judg. 8:1
  - type: text
    content: the men of Ephraim gathered together, crossed over toward Zaphon, and said to Jephthah, “Why did you cross over to fight against the people of Ammon, and did not call us to go with you? We will burn your house down on you with fire!”
  '10':
  - type: text
    content: Then Ibzan died and was buried at Bethlehem.
  '11':
  - type: text
    content: 'After him, Elon the Zebulunite judged Israel. He judged Israel ten years. '
  '12':
  - type: text
    content: And Elon the Zebulunite died and was buried at Aijalon in the country of Zebulun.
  '13':
  - type: text
    content: 'After him, Abdon the son of Hillel the Pirathonite judged Israel. '
  '14':
  - type: text
    content: 'He had forty sons and thirty grandsons, who '
  - type: note
    content: Judg. 5:10; 10:4
  - type: text
    content: 'rode on seventy young donkeys. He judged Israel eight years. '
  '15':
  - type: text
    content: 'Then Abdon the son of Hillel the Pirathonite died and was buried in Pirathon in the land of Ephraim, '
  - type: note
    content: Judg. 3:13, 27; 5:14
  - type: text
    content: in the mountains of the Amalekites.
  '2':
  - type: text
    content: 'And Jephthah said to them, “My people and I were in a great struggle with the people of Ammon; and when I called you, you did not deliver me out of their hands. '
  '3':
  - type: text
    content: 'So when I saw that you would not deliver '
  - type: text
    content: me,
  - type: text
    content: ' I '
  - type: note
    content: 1 Sam. 19:5; 28:21; Job 13:14
  - type: text
    content: 'took my life in my hands and crossed over against the people of Ammon; and the '
  - type: heading
    content: Lord
  - type: text
    content: ' delivered them into my hand. Why then have you come up to me this day to fight against me?” '
  '4':
  - type: text
    content: 'Now Jephthah gathered together all the men of Gilead and fought against Ephraim. And the men of Gilead defeated Ephraim, because they said, “You Gileadites '
  - type: note
    content: 1 Sam. 25:10
  - type: text
    content: are
  - type: text
    content: ' fugitives of Ephraim among the Ephraimites '
  - type: text
    content: and
  - type: text
    content: ' among the Manassites.” '
  '5':
  - type: text
    content: 'The Gileadites seized the '
  - type: note
    content: Josh. 22:11
  - type: text
    content: 'fords of the Jordan before the Ephraimites '
  - type: text
    content: arrived.
  - type: text
    content: ' And when '
  - type: text
    content: any
  - type: text
    content: ' Ephraimite who escaped said, “Let me cross over,” the men of Gilead would say to him, “'
  - type: text
    content: Are
  - type: text
    content: ' you an Ephraimite?” If he said, “No,” '
  '6':
  - type: text
    content: 'then they would say to him, “Then say, '
  - type: note
    content: Ps. 69:2, 15
  - type: text
    content: '‘Shibboleth’!” And he would say, “Sibboleth,” for he could not pronounce '
  - type: text
    content: it
  - type: text
    content: ' right. Then they would take him and kill him at the fords of the Jordan. There fell at that time forty-two thousand Ephraimites.'
  '7':
  - type: text
    content: And Jephthah judged Israel six years. Then Jephthah the Gileadite died and was buried in among the cities of Gilead.
  - type: heading
    content: Ibzan, Elon, and Abdon
  '8':
  - type: text
    content: 'After him, Ibzan of Bethlehem judged Israel. '
  '9':
  - type: text
    content: 'He had thirty sons. And he gave away thirty daughters in marriage, and brought in thirty daughters from elsewhere for his sons. He judged Israel seven years. '
