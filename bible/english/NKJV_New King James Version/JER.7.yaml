  - type: note
    content: 1 Sam. 15:22; Ps. 51:16; (Hos. 6:6)
  - type: text
    content: 'For I did not speak to your fathers, or command them in the day that I brought them out of the land of Egypt, concerning burnt offerings or sacrifices. '
