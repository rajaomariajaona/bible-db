  - type: text
    content: 'I will be your God, and you shall be My people. And walk in all the ways that I have commanded you, that it may be well with you.’ '
  '24':
  - type: note
    content: Ps. 81:11; Jer. 11:8
  - type: text
    content: 'Yet they did not obey or incline their ear, but '
