    content: 2 Kin. 21:4; 2 Chr. 33:3–5, 7; Jer. 32:34, 35; Ezek. 7:20; Dan. 9:27; 11:31
  - type: text
    content: '“They have set their abominations in the house which is called by My name, to pollute it. '
