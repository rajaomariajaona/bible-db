  - type: text
    content: 'The '
  - type: note
    content: Jer. 9:22; 19:11; Ezek. 6:5
  - type: text
    content: 'corpses of this people will be food for the birds of the heaven and for the beasts of the earth. And no one will frighten '
  - type: text
    content: them
  - type: text
    content: ' '
  - type: text
    content: away.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Then I will cause to '
  - type: note
    content: Is. 24:7, 8; Jer. 16:9; 25:10; Ezek. 26:13; Hos. 2:11; Rev. 18:23
  - type: text
    content: 'cease from the cities of Judah and from the streets of Jerusalem the voice of mirth and the voice of gladness, the voice of the bridegroom and the voice of the bride. For '
  - type: note
    content: Lev. 26:33; Is. 1:7; Jer. 4:27
  - type: text
    content: the land shall be desolate.
  '4':
  - type: note
