document_id: JDG.4,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Deborah
  - type: text
    content: 'When Ehud was dead, '
  - type: note
    content: Judg. 2:19
  - type: text
    content: 'the children of Israel again did '
  - type: note
    content: Judg. 2:11
  - type: text
    content: 'evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'And Barak called '
  - type: note
    content: Judg. 5:18
  - type: text
    content: 'Zebulun and Naphtali to Kedesh; he went up with ten thousand men '
  - type: note
    content: Ex. 11:8; 1 Kin. 20:10
  - type: text
    content: under his command, and Deborah went up with him.
  '11':
  - type: text
    content: 'Now Heber '
  - type: note
    content: Judg. 1:16
  - type: text
    content: 'the Kenite, of the children of '
  - type: note
    content: Num. 10:29
  - type: text
    content: 'Hobab the father-in-law of Moses, had separated himself from the Kenites and pitched his tent near the terebinth tree at Zaanaim, '
  - type: note
    content: Judg. 4:6
  - type: text
    content: 'which '
  - type: text
    content: is
  - type: text
    content: ' beside Kedesh.'
  '12':
  - type: text
    content: 'And they reported to Sisera that Barak the son of Abinoam had gone up to Mount Tabor. '
  '13':
  - type: text
    content: 'So Sisera gathered together all his chariots, nine hundred chariots of iron, and all the people who '
  - type: text
    content: were
  - type: text
    content: ' with him, from Harosheth Hagoyim to the River Kishon.'
  '14':
  - type: text
    content: 'Then Deborah said to Barak, “Up! For this '
  - type: text
    content: is
  - type: text
    content: ' the day in which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has delivered Sisera into your hand. '
  - type: note
    content: Deut. 9:3; 31:3; 2 Sam. 5:24; Ps. 68:7; Is. 52:12
  - type: text
    content: 'Has not the '
  - type: heading
    content: Lord
  - type: text
    content: ' gone out before you?” So Barak went down from Mount Tabor with ten thousand men following him. '
  '15':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' routed Sisera and all '
  - type: text
    content: his
  - type: text
    content: ' chariots and all '
  - type: text
    content: his
  - type: text
    content: ' army with the edge of the sword before Barak; and Sisera alighted from '
  - type: text
    content: his
  - type: text
    content: ' chariot and fled away on foot. '
  '16':
  - type: text
    content: 'But Barak pursued the chariots and the army as far as Harosheth Hagoyim, and all the army of Sisera fell by the edge of the sword; not a man was '
  - type: note
    content: Ex. 14:28; Ps. 83:9
  - type: text
    content: left.
  '17':
  - type: text
    content: 'However, Sisera had fled away on foot to the tent of '
  - type: note
    content: Judg. 5:6
  - type: text
    content: 'Jael, the wife of Heber the Kenite; for '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' peace between Jabin king of Hazor and the house of Heber the Kenite. '
  '18':
  - type: text
    content: And Jael went out to meet Sisera, and said to him, “Turn aside, my lord, turn aside to me; do not fear.” And when he had turned aside with her into the tent, she covered him with a blanket.
  '19':
  - type: text
    content: 'Then he said to her, “Please give me a little water to drink, for I am thirsty.” So she opened '
  - type: note
    content: Judg. 5:24–27
  - type: text
    content: 'a jug of milk, gave him a drink, and covered him. '
  '2':
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Judg. 2:14
  - type: text
    content: 'sold them into the hand of Jabin king of Canaan, who reigned in '
  - type: note
    content: Josh. 11:1, 10
  - type: text
    content: 'Hazor. The commander of his army '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 12:9; Ps. 83:9
  - type: text
    content: 'Sisera, who dwelt in '
  - type: note
    content: Judg. 4:13, 16
  - type: text
    content: 'Harosheth Hagoyim. '
  '20':
  - type: text
    content: And he said to her, “Stand at the door of the tent, and if any man comes and inquires of you, and says, ‘Is there any man here?’ you shall say, ‘No.’ ”
  '21':
  - type: text
    content: 'Then Jael, Heber’s wife, '
  - type: note
    content: Judg. 5:24–27
  - type: text
    content: 'took a tent peg and took a hammer in her hand, and went softly to him and drove the peg into his temple, and it went down into the ground; for he was fast asleep and weary. So he died. '
  '22':
  - type: text
    content: 'And then, as Barak pursued Sisera, Jael came out to meet him, and said to him, “Come, I will show you the man whom you seek.” And when he went into her '
  - type: text
    content: tent,
  - type: text
    content: ' there lay Sisera, dead with the peg in his temple.'
  '23':
  - type: text
    content: 'So on that day God subdued Jabin king of Canaan in the presence of the children of Israel. '
  '24':
  - type: text
    content: And the hand of the children of Israel grew stronger and stronger against Jabin king of Canaan, until they had destroyed Jabin king of Canaan.
  '3':
  - type: text
    content: 'And the children of Israel cried out to the '
  - type: heading
    content: Lord
  - type: text
    content: '; for Jabin had nine hundred '
  - type: note
    content: Deut. 20:1; Judg. 1:19
  - type: text
    content: 'chariots of iron, and for twenty years '
  - type: note
    content: Ps. 106:42
  - type: text
    content: he had harshly oppressed the children of Israel.
  '4':
  - type: text
    content: 'Now Deborah, a prophetess, the wife of Lapidoth, was judging Israel at that time. '
  '5':
  - type: note
    content: Gen. 35:8
  - type: text
    content: 'And she would sit under the palm tree of Deborah between Ramah and Bethel in the mountains of Ephraim. And the children of Israel came up to her for judgment. '
  '6':
  - type: text
    content: 'Then she sent and called for '
  - type: note
    content: Heb. 11:32
  - type: text
    content: 'Barak the son of Abinoam from '
  - type: note
    content: Josh. 19:37; 21:32
  - type: text
    content: 'Kedesh in Naphtali, and said to him, “Has not the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel commanded, ‘Go and deploy '
  - type: text
    content: troops
  - type: text
    content: ' at Mount '
  - type: note
    content: Judg. 8:18
  - type: text
    content: 'Tabor; take with you ten thousand men of the sons of Naphtali and of the sons of Zebulun; '
  '7':
  - type: text
    content: 'and against you '
  - type: note
    content: Ex. 14:4
  - type: text
    content: 'I will deploy Sisera, the commander of Jabin’s army, with his chariots and his multitude at the '
  - type: note
    content: Judg. 5:21; 1 Kin. 18:40; Ps. 83:9, 10
  - type: text
    content: River Kishon; and I will deliver him into your hand’?”
  '8':
  - type: text
    content: And Barak said to her, “If you will go with me, then I will go; but if you will not go with me, I will not go!”
  '9':
  - type: text
    content: 'So she said, “I will surely go with you; nevertheless there will be no glory for you in the journey you are taking, for the '
  - type: heading
    content: Lord
  - type: text
    content: ' will '
  - type: note
    content: Judg. 2:14
  - type: text
    content: 'sell Sisera into the hand of a woman.” Then Deborah arose and went with Barak to Kedesh. '
