segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fall of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:1–12; Jer. 52:4; Ezek. 24:1, 2
    marker-yv: yv-n
  - type: text
    text: 'ninth year of Zedekiah king of Judah, in the tenth month, Nebuchadnezzar king of Babylon and all his army came against Jerusalem, and besieged it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'In the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 1:3
    marker-yv: yv-n
  - type: text
    text: 'eleventh year of Zedekiah, in the fourth month, on the ninth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month, the city was penetrated.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 1:15; 38:17
    marker-yv: yv-n
  - type: text
    text: 'Then all the princes of the king of Babylon came in and sat in the Middle Gate: Nergal-Sharezer, Samgar-Nebo, Sarsechim, Rabsaris, Nergal-Sarezer, Rabmag, with the rest of the princes of the king of Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:4; Is. 30:16; Jer. 52:7; Amos 2:14
    marker-yv: yv-n
  - type: text
    text: 'So it was, when Zedekiah the king of Judah and all the men of war saw them, that they fled and went out of the city by night, by way of the king’s garden, by the gate between the two walls. And he went out by way of the plain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But the Chaldean army pursued them and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 21:7; 32:4; 38:18, 23
    marker-yv: yv-n
  - type: text
    text: 'overtook Zedekiah in the plains of Jericho. And when they had captured him, they brought him up to Nebuchadnezzar king of Babylon, to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 23:33; Jer. 52:9, 26, 27
    marker-yv: yv-n
  - type: text
    text: 'Riblah in the land of Hamath, where he pronounced judgment on him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the king of Babylon killed the sons of Zedekiah before his '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 28:34
    marker-yv: yv-n
  - type: text
    text: 'eyes in Riblah; the king of Babylon also killed all the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 34:19–21
    marker-yv: yv-n
  - type: text
    text: 'nobles of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moreover '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:7; Jer. 52:11; Ezek. 12:13
    marker-yv: yv-n
  - type: text
    text: 'he put out Zedekiah’s eyes, and bound him with bronze fetters to carry him off to Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:9; Jer. 38:18; 52:13
    marker-yv: yv-n
  - type: text
    text: 'And the Chaldeans burned the king’s house and the houses of the people with '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 21:10
    marker-yv: yv-n
  - type: text
    text: 'fire, and broke down the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:10; Neh. 1:3; Jer. 52:14
    marker-yv: yv-n
  - type: text
    text: 'walls of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:8, 11, 12, 20
    marker-yv: yv-n
  - type: text
    text: 'Then Nebuzaradan the captain of the guard carried away captive to Babylon the remnant of the people who remained in the city and those who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 38:19
    marker-yv: yv-n
  - type: text
    text: 'defected to him, with the rest of the people who remained. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But Nebuzaradan the captain of the guard left in the land of Judah the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 40:7
    marker-yv: yv-n
  - type: text
    text: poor people, who had nothing, and gave them vineyards and fields at the same time.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah Goes Free
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now Nebuchadnezzar king of Babylon gave charge concerning Jeremiah to Nebuzaradan the captain of the guard, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Take him and look after him, and do him no '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 1:18, 19; 15:20, 21
    marker-yv: yv-n
  - type: text
    text: 'harm; but do to him just as he says to you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So Nebuzaradan the captain of the guard sent Nebushasban, Rabsaris, Nergal-Sharezer, Rabmag, and all the king of Babylon’s chief officers; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'then they sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: someone
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 38:28
    marker-yv: yv-n
  - type: text
    text: 'to take Jeremiah from the court of the prison, and committed him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 40:5
    marker-yv: yv-n
  - type: text
    text: 'to Gedaliah the son of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 22:12, 14; 2 Chr. 34:20; Jer. 26:24
    marker-yv: yv-n
  - type: text
    text: Ahikam, the son of Shaphan, that he should take him home. So he dwelt among the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Meanwhile the word of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had come to Jeremiah while he was shut up in the court of the prison, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Go and speak to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 38:7, 12
    marker-yv: yv-n
  - type: text
    text: 'Ebed-Melech the Ethiopian, saying, ‘Thus says the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of hosts, the God of Israel: “Behold, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 21:10; (Dan. 9:12; Zech. 1:6)
    marker-yv: yv-n
  - type: text
    text: 'I will bring My words upon this city for adversity and not for good, and they shall be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: performed
  - type: text
    text: ' in that day before you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But I will deliver you in that day,” says the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “and you shall not be given into the hand of the men of whom you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' afraid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For I will surely deliver you, and you shall not fall by the sword; but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 21:9; 45:5
    marker-yv: yv-n
  - type: text
    text: 'your life shall be as a prize to you, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 5:20; Ps. 37:40; (Jer. 17:7, 8)
    marker-yv: yv-n
  - type: text
    text: 'because you have put your trust in Me,” says the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: .’ ”
