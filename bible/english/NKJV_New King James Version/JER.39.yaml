document_id: JER.39,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Jerusalem
  - type: text
    content: 'In the '
  - type: note
    content: 2 Kin. 25:1–12; Jer. 52:4; Ezek. 24:1, 2
  - type: text
    content: 'ninth year of Zedekiah king of Judah, in the tenth month, Nebuchadnezzar king of Babylon and all his army came against Jerusalem, and besieged it. '
  '10':
  - type: text
    content: 'But Nebuzaradan the captain of the guard left in the land of Judah the '
  - type: note
    content: Jer. 40:7
  - type: text
    content: poor people, who had nothing, and gave them vineyards and fields at the same time.
  - type: heading
    content: Jeremiah Goes Free
  '11':
  - type: text
    content: 'Now Nebuchadnezzar king of Babylon gave charge concerning Jeremiah to Nebuzaradan the captain of the guard, saying, '
  '12':
  - type: text
    content: '“Take him and look after him, and do him no '
  - type: note
    content: Jer. 1:18, 19; 15:20, 21
  - type: text
    content: 'harm; but do to him just as he says to you.” '
  '13':
  - type: text
    content: 'So Nebuzaradan the captain of the guard sent Nebushasban, Rabsaris, Nergal-Sharezer, Rabmag, and all the king of Babylon’s chief officers; '
  '14':
  - type: text
    content: 'then they sent '
  - type: text
    content: someone
  - type: text
    content: ' '
  - type: note
    content: Jer. 38:28
  - type: text
    content: 'to take Jeremiah from the court of the prison, and committed him '
  - type: note
    content: Jer. 40:5
  - type: text
    content: 'to Gedaliah the son of '
  - type: note
    content: 2 Kin. 22:12, 14; 2 Chr. 34:20; Jer. 26:24
  - type: text
    content: Ahikam, the son of Shaphan, that he should take him home. So he dwelt among the people.
  '15':
  - type: text
    content: 'Meanwhile the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' had come to Jeremiah while he was shut up in the court of the prison, saying, '
  '16':
  - type: text
    content: '“Go and speak to '
  - type: note
    content: Jer. 38:7, 12
  - type: text
    content: 'Ebed-Melech the Ethiopian, saying, ‘Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: “Behold, '
  - type: note
    content: Jer. 21:10; (Dan. 9:12; Zech. 1:6)
  - type: text
    content: 'I will bring My words upon this city for adversity and not for good, and they shall be '
  - type: text
    content: performed
  - type: text
    content: ' in that day before you. '
  '17':
  - type: text
    content: 'But I will deliver you in that day,” says the '
  - type: heading
    content: Lord
  - type: text
    content: ', “and you shall not be given into the hand of the men of whom you '
  - type: text
    content: are
  - type: text
    content: ' afraid. '
  '18':
  - type: text
    content: 'For I will surely deliver you, and you shall not fall by the sword; but '
  - type: note
    content: Jer. 21:9; 45:5
  - type: text
    content: 'your life shall be as a prize to you, '
  - type: note
    content: 1 Chr. 5:20; Ps. 37:40; (Jer. 17:7, 8)
  - type: text
    content: 'because you have put your trust in Me,” says the '
  - type: heading
    content: Lord
  - type: text
    content: .’ ”
  '2':
  - type: text
    content: 'In the '
  - type: note
    content: Jer. 1:3
  - type: text
    content: 'eleventh year of Zedekiah, in the fourth month, on the ninth '
  - type: text
    content: day
  - type: text
    content: ' of the month, the city was penetrated.'
  '3':
  - type: note
    content: Jer. 1:15; 38:17
  - type: text
    content: 'Then all the princes of the king of Babylon came in and sat in the Middle Gate: Nergal-Sharezer, Samgar-Nebo, Sarsechim, Rabsaris, Nergal-Sarezer, Rabmag, with the rest of the princes of the king of Babylon.'
  '4':
  - type: note
    content: 2 Kin. 25:4; Is. 30:16; Jer. 52:7; Amos 2:14
  - type: text
    content: 'So it was, when Zedekiah the king of Judah and all the men of war saw them, that they fled and went out of the city by night, by way of the king’s garden, by the gate between the two walls. And he went out by way of the plain. '
  '5':
  - type: text
    content: 'But the Chaldean army pursued them and '
  - type: note
    content: Jer. 21:7; 32:4; 38:18, 23
  - type: text
    content: 'overtook Zedekiah in the plains of Jericho. And when they had captured him, they brought him up to Nebuchadnezzar king of Babylon, to '
  - type: note
    content: 2 Kin. 23:33; Jer. 52:9, 26, 27
  - type: text
    content: 'Riblah in the land of Hamath, where he pronounced judgment on him. '
  '6':
  - type: text
    content: 'Then the king of Babylon killed the sons of Zedekiah before his '
  - type: note
    content: Deut. 28:34
  - type: text
    content: 'eyes in Riblah; the king of Babylon also killed all the '
  - type: note
    content: Jer. 34:19–21
  - type: text
    content: 'nobles of Judah. '
  '7':
  - type: text
    content: 'Moreover '
  - type: note
    content: 2 Kin. 25:7; Jer. 52:11; Ezek. 12:13
  - type: text
    content: 'he put out Zedekiah’s eyes, and bound him with bronze fetters to carry him off to Babylon. '
  '8':
  - type: note
    content: 2 Kin. 25:9; Jer. 38:18; 52:13
  - type: text
    content: 'And the Chaldeans burned the king’s house and the houses of the people with '
  - type: note
    content: Jer. 21:10
  - type: text
    content: 'fire, and broke down the '
  - type: note
    content: 2 Kin. 25:10; Neh. 1:3; Jer. 52:14
  - type: text
    content: 'walls of Jerusalem. '
  '9':
  - type: note
    content: 2 Kin. 25:8, 11, 12, 20
  - type: text
    content: 'Then Nebuzaradan the captain of the guard carried away captive to Babylon the remnant of the people who remained in the city and those who '
  - type: note
    content: Jer. 38:19
  - type: text
    content: 'defected to him, with the rest of the people who remained. '
