document_id: 2TI.4,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Preach the Word
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 5:21; 2 Tim. 4:1
      marker-yv: yv-n
    - type: text
      text: 'charge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' therefore before God and the Lord Jesus Christ, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 10:42
      marker-yv: yv-n
    - type: text
      text: 'who will judge the living and the dead at His appearing and His kingdom: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 4:14; Philem. 24
      marker-yv: yv-n
    - type: text
      text: 'Demas has forsaken me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 John 2:15
      marker-yv: yv-n
    - type: text
      text: 'having loved this present world, and has departed for Thessalonica—Crescens for Galatia, Titus for Dalmatia. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only Luke is with me. Get '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 12:12, 25; 15:37–39; Col. 4:10
      marker-yv: yv-n
    - type: text
      text: 'Mark and bring him with you, for he is useful to me for ministry. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:4; Eph. 6:21, 22; Col. 4:7; Titus 3:12
      marker-yv: yv-n
    - type: text
      text: 'Tychicus I have sent to Ephesus. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Bring the cloak that I left with Carpus at Troas when you come—and the books, especially the parchments.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:33; 1 Tim. 1:20
      marker-yv: yv-n
    - type: text
      text: 'Alexander the coppersmith did me much harm. May the Lord repay him according to his works. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You also must beware of him, for he has greatly resisted our words.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At my first defense no one stood with me, but all forsook me. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 7:60; (1 Cor. 13:5)
      marker-yv: yv-n
    - type: text
      text: May it not be charged against them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Lord Is Faithful
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 31:6; Acts 23:11
      marker-yv: yv-n
    - type: text
      text: 'But the Lord stood with me and strengthened me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:15; Phil. 1:12
      marker-yv: yv-n
    - type: text
      text: 'so that the message might be preached fully through me, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' all the Gentiles might hear. Also I was delivered '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 17:37; Ps. 22:21
      marker-yv: yv-n
    - type: text
      text: 'out of the mouth of the lion. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 121:7; (2 Pet. 2:9)
      marker-yv: yv-n
    - type: text
      text: 'And the Lord will deliver me from every evil work and preserve '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' for His heavenly kingdom. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 11:36; Gal. 1:5; Heb. 13:21; 2 Pet. 3:18
      marker-yv: yv-n
    - type: text
      text: 'To Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' glory forever and ever. Amen!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Come Before Winter
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Greet '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:2; Rom. 16:3
      marker-yv: yv-n
    - type: text
      text: 'Prisca and Aquila, and the household of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 1:16
      marker-yv: yv-n
    - type: text
      text: 'Onesiphorus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Preach the word! Be ready in season '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' out of season. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Titus 2:15
      marker-yv: yv-n
    - type: text
      text: 'Convince, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 5:20; Titus 1:13; 2:15
      marker-yv: yv-n
    - type: text
      text: 'rebuke, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 4:13
      marker-yv: yv-n
    - type: text
      text: 'exhort, with all longsuffering and teaching. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:22; Rom. 16:23
      marker-yv: yv-n
    - type: text
      text: 'Erastus stayed in Corinth, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:4; 21:29
      marker-yv: yv-n
    - type: text
      text: Trophimus I have left in Miletus sick.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Do your utmost to come before winter.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eubulus greets you, as well as Pudens, Linus, Claudia, and all the brethren.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Farewell
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Lord Jesus Christ be with your spirit. Grace be with you. Amen.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 3:1
      marker-yv: yv-n
    - type: text
      text: 'For the time will come when they will not endure '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 1:10; 2 Tim. 1:13
      marker-yv: yv-n
    - type: text
      text: 'sound doctrine, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 30:9–11; Jer. 5:30, 31; 2 Tim. 3:6
      marker-yv: yv-n
    - type: text
      text: 'but according to their own desires, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: because
    - type: text
      text: ' they have itching ears, they will heap up for themselves teachers; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they will turn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' ears away from the truth, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 1:4
      marker-yv: yv-n
    - type: text
      text: 'be turned aside to fables. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you be watchful in all things, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 1:8
      marker-yv: yv-n
    - type: text
      text: 'endure afflictions, do the work of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 21:8
      marker-yv: yv-n
    - type: text
      text: an evangelist, fulfill your ministry.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Valedictory
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 2:17
      marker-yv: yv-n
    - type: text
      text: 'I am already being poured out as a drink offering, and the time of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Phil. 1:23); 2 Pet. 1:14
      marker-yv: yv-n
    - type: text
      text: 'my departure is at hand. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 9:24–27; Phil. 3:13, 14
      marker-yv: yv-n
    - type: text
      text: 'I have fought the good fight, I have finished the race, I have kept the faith. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finally, there is laid up for me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 9:25; 2 Tim. 2:5); James 1:12
      marker-yv: yv-n
    - type: text
      text: 'the crown of righteousness, which the Lord, the righteous '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 5:22
      marker-yv: yv-n
    - type: text
      text: 'Judge, will give to me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 1:12
      marker-yv: yv-n
    - type: text
      text: on that Day, and not to me only but also to all who have loved His appearing.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Abandoned Apostle
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be diligent to come to me quickly; '
