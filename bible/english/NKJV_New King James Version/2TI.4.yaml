document_id: 2TI.4,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Preach the Word
  - type: text
    content: 'I '
  - type: note
    content: 1 Tim. 5:21; 2 Tim. 4:1
  - type: text
    content: 'charge '
  - type: text
    content: you
  - type: text
    content: ' therefore before God and the Lord Jesus Christ, '
  - type: note
    content: Acts 10:42
  - type: text
    content: 'who will judge the living and the dead at His appearing and His kingdom: '
  '10':
  - type: text
    content: 'for '
  - type: note
    content: Col. 4:14; Philem. 24
  - type: text
    content: 'Demas has forsaken me, '
  - type: note
    content: 1 John 2:15
  - type: text
    content: 'having loved this present world, and has departed for Thessalonica—Crescens for Galatia, Titus for Dalmatia. '
  '11':
  - type: text
    content: 'Only Luke is with me. Get '
  - type: note
    content: Acts 12:12, 25; 15:37–39; Col. 4:10
  - type: text
    content: 'Mark and bring him with you, for he is useful to me for ministry. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: Acts 20:4; Eph. 6:21, 22; Col. 4:7; Titus 3:12
  - type: text
    content: 'Tychicus I have sent to Ephesus. '
  '13':
  - type: text
    content: Bring the cloak that I left with Carpus at Troas when you come—and the books, especially the parchments.
  '14':
  - type: note
    content: Acts 19:33; 1 Tim. 1:20
  - type: text
    content: 'Alexander the coppersmith did me much harm. May the Lord repay him according to his works. '
  '15':
  - type: text
    content: You also must beware of him, for he has greatly resisted our words.
  '16':
  - type: text
    content: 'At my first defense no one stood with me, but all forsook me. '
  - type: note
    content: Acts 7:60; (1 Cor. 13:5)
  - type: text
    content: May it not be charged against them.
  - type: heading
    content: The Lord Is Faithful
  '17':
  - type: note
    content: Deut. 31:6; Acts 23:11
  - type: text
    content: 'But the Lord stood with me and strengthened me, '
  - type: note
    content: Acts 9:15; Phil. 1:12
  - type: text
    content: 'so that the message might be preached fully through me, and '
  - type: text
    content: that
  - type: text
    content: ' all the Gentiles might hear. Also I was delivered '
  - type: note
    content: 1 Sam. 17:37; Ps. 22:21
  - type: text
    content: 'out of the mouth of the lion. '
  '18':
  - type: note
    content: Ps. 121:7; (2 Pet. 2:9)
  - type: text
    content: 'And the Lord will deliver me from every evil work and preserve '
  - type: text
    content: me
  - type: text
    content: ' for His heavenly kingdom. '
  - type: note
    content: Rom. 11:36; Gal. 1:5; Heb. 13:21; 2 Pet. 3:18
  - type: text
    content: 'To Him '
  - type: text
    content: be
  - type: text
    content: ' glory forever and ever. Amen!'
  - type: heading
    content: Come Before Winter
  '19':
  - type: text
    content: 'Greet '
  - type: note
    content: Acts 18:2; Rom. 16:3
  - type: text
    content: 'Prisca and Aquila, and the household of '
  - type: note
    content: 2 Tim. 1:16
  - type: text
    content: 'Onesiphorus. '
  '2':
  - type: text
    content: 'Preach the word! Be ready in season '
  - type: text
    content: and
  - type: text
    content: ' out of season. '
  - type: note
    content: Titus 2:15
  - type: text
    content: 'Convince, '
  - type: note
    content: 1 Tim. 5:20; Titus 1:13; 2:15
  - type: text
    content: 'rebuke, '
  - type: note
    content: 1 Tim. 4:13
  - type: text
    content: 'exhort, with all longsuffering and teaching. '
  '20':
  - type: note
    content: Acts 19:22; Rom. 16:23
  - type: text
    content: 'Erastus stayed in Corinth, but '
  - type: note
    content: Acts 20:4; 21:29
  - type: text
    content: Trophimus I have left in Miletus sick.
  '21':
  - type: text
    content: Do your utmost to come before winter.
  - type: text
    content: Eubulus greets you, as well as Pudens, Linus, Claudia, and all the brethren.
  - type: heading
    content: Farewell
  '22':
  - type: text
    content: The Lord Jesus Christ be with your spirit. Grace be with you. Amen.
  '3':
  - type: note
    content: 2 Tim. 3:1
  - type: text
    content: 'For the time will come when they will not endure '
  - type: note
    content: 1 Tim. 1:10; 2 Tim. 1:13
  - type: text
    content: 'sound doctrine, '
  - type: note
    content: Is. 30:9–11; Jer. 5:30, 31; 2 Tim. 3:6
  - type: text
    content: 'but according to their own desires, '
  - type: text
    content: because
  - type: text
    content: ' they have itching ears, they will heap up for themselves teachers; '
  '4':
  - type: text
    content: 'and they will turn '
  - type: text
    content: their
  - type: text
    content: ' ears away from the truth, and '
  - type: note
    content: 1 Tim. 1:4
  - type: text
    content: 'be turned aside to fables. '
  '5':
  - type: text
    content: 'But you be watchful in all things, '
  - type: note
    content: 2 Tim. 1:8
  - type: text
    content: 'endure afflictions, do the work of '
  - type: note
    content: Acts 21:8
  - type: text
    content: an evangelist, fulfill your ministry.
  - type: heading
    content: Paul’s Valedictory
  '6':
  - type: text
    content: 'For '
  - type: note
    content: Phil. 2:17
  - type: text
    content: 'I am already being poured out as a drink offering, and the time of '
  - type: note
    content: (Phil. 1:23); 2 Pet. 1:14
  - type: text
    content: 'my departure is at hand. '
  '7':
  - type: note
    content: 1 Cor. 9:24–27; Phil. 3:13, 14
  - type: text
    content: 'I have fought the good fight, I have finished the race, I have kept the faith. '
  '8':
  - type: text
    content: 'Finally, there is laid up for me '
  - type: note
    content: (1 Cor. 9:25; 2 Tim. 2:5); James 1:12
  - type: text
    content: 'the crown of righteousness, which the Lord, the righteous '
  - type: note
    content: John 5:22
  - type: text
    content: 'Judge, will give to me '
  - type: note
    content: 2 Tim. 1:12
  - type: text
    content: on that Day, and not to me only but also to all who have loved His appearing.
  - type: heading
    content: The Abandoned Apostle
  '9':
  - type: text
    content: 'Be diligent to come to me quickly; '
