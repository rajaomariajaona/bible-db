verses:
  '1':
  - type: heading
    content: Jesus Heals a Centurion’s Servant
  - type: text
    content: 'Now when He concluded all His sayings in the hearing of the people, He '
  - type: note
    content: Matt. 8:5–13
  - type: text
    content: 'entered Capernaum. '
  '10':
  - type: text
    content: And those who were sent, returning to the house, found the servant well who had been sick.
  - type: heading
    content: Jesus Raises the Son of the Widow of Nain
  '11':
  - type: text
    content: 'Now it happened, the day after, '
  - type: text
    content: that
  - type: text
    content: ' He went into a city called Nain; and many of His disciples went with Him, and a large crowd. '
  '12':
  - type: text
    content: 'And when He came near the gate of the city, behold, a dead man was being carried out, the only son of his mother; and she was a widow. And a large crowd from the city was with her. '
  '13':
  - type: text
    content: 'When the Lord saw her, He had '
  - type: note
    content: Lam. 3:32; John 11:35; (Heb. 4:15)
  - type: text
    content: 'compassion on her and said to her, '
  - type: note
    content: Luke 8:52
  - type: text
    content: “Do not weep.”
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Then He came and touched the open coffin, and those who carried '
  - type: text
    content: him
  - type: text
    content: ' stood still. And He said, '
  - type: text
    content: '“Young man, I say to you, '
  - type: note
    content: Mark 5:41; Luke 8:54; John 11:43; Acts 9:40; (Rom. 4:17)
  - type: text
    content: arise.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'So he who was dead '
  - type: note
    content: Matt. 11:5; Luke 8:55; John 11:44
  - type: text
    content: 'sat up and began to speak. And He '
  - type: note
    content: 1 Kin. 17:23; 2 Kin. 4:36
  - type: text
    content: presented him to his mother.
  '16':
  - type: note
    content: Luke 1:65
  - type: text
    content: 'Then fear came upon all, and they '
  - type: note
    content: Luke 5:26
  - type: text
    content: 'glorified God, saying, '
  - type: note
    content: Luke 24:19; John 4:19; 6:14; 9:17
  - type: text
    content: '“A great prophet has risen up among us”; and, '
  - type: note
    content: Luke 1:68
  - type: text
    content: '“God has visited His people.” '
  '17':
  - type: text
    content: And this report about Him went throughout all Judea and all the surrounding region.
  - type: heading
    content: John the Baptist Sends Messengers to Jesus
  '18':
  - type: note
    content: Matt. 11:2–19
  - type: text
    content: 'Then the disciples of John reported to him concerning all these things. '
  '19':
  - type: text
    content: 'And John, calling two of his disciples to '
  - type: text
    content: him,
  - type: text
    content: ' sent '
  - type: text
    content: them
  - type: text
    content: ' to Jesus, saying, “Are You '
  - type: note
    content: (Mic. 5:2; Zech. 9:9; Mal. 3:1–3)
  - type: text
    content: the Coming One, or do we look for another?”
  '2':
  - type: text
    content: 'And a certain centurion’s servant, who was dear to him, was sick and ready to die. '
  '20':
  - type: text
    content: 'When the men had come to Him, they said, “John the Baptist has sent us to You, saying, ‘Are You the Coming One, or do we look for another?’ ” '
  '21':
  - type: text
    content: And that very hour He cured many of infirmities, afflictions, and evil spirits; and to many blind He gave sight.
  '22':
  - type: note
    content: Matt. 11:4
  - type: text
    content: 'Jesus answered and said to them, '
  - type: text
    content: '“Go and tell John the things you have seen and heard: '
  - type: note
    content: Is. 35:5
  - type: text
    content: 'that '
  - type: text
    content: the
  - type: text
    content: ' blind '
  - type: note
    content: John 9:7
  - type: text
    content: 'see, '
  - type: text
    content: the
  - type: text
    content: ' lame '
  - type: note
    content: Matt. 15:31
  - type: text
    content: 'walk, '
  - type: text
    content: the
  - type: text
    content: ' lepers are '
  - type: note
    content: Luke 17:12–14
  - type: text
    content: 'cleansed, '
  - type: text
    content: the
  - type: text
    content: ' deaf '
  - type: note
    content: Mark 7:37
  - type: text
    content: 'hear, '
  - type: text
    content: the
  - type: text
    content: ' dead are raised, '
  - type: note
    content: (Is. 61:1–3; Luke 4:18)
  - type: text
    content: the
  - type: text
    content: ' poor have the gospel preached to them.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And blessed is '
  - type: text
    content: he
  - type: text
    content: ' who is not '
  - type: text
    content: offended because of Me.”
  '24':
  - type: note
    content: Matt. 11:7
  - type: text
    content: 'When the messengers of John had departed, He began to speak to the multitudes concerning John: '
  - type: text
    content: “What did you go out into the wilderness to see? A reed shaken by the wind?
  - type: text
    content: ' '
  '25':
  - type: text
    content: But what did you go out to see? A man clothed in soft garments? Indeed those who are gorgeously appareled and live in luxury are in kings’ courts.
  - type: text
    content: ' '
  '26':
  - type: text
    content: But what did you go out to see? A prophet? Yes, I say to you, and more than a prophet.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'This is '
  - type: text
    content: he
  - type: text
    content: ' of whom it is written:'
  - type: note
    content: Is. 40:3; Mal. 3:1; Matt. 11:10; Mark 1:2
  - type: text
    content: ‘Behold, I send My messenger before Your face,
  - type: text
    content: Who will prepare Your way before You.’
  '28':
  - type: text
    content: 'For I say to you, among those born of women there is '
  - type: text
    content: 'not a '
  - type: note
    content: (Luke 1:15)
  - type: text
    content: greater prophet than John the Baptist;
  - type: text
    content: ' but he who is least in the kingdom of God is greater than he.”'
  '29':
  - type: text
    content: 'And when all the people heard '
  - type: text
    content: Him,
  - type: text
    content: ' even the tax collectors justified God, '
  - type: note
    content: Matt. 3:5; Luke 3:12
  - type: text
    content: 'having been baptized with the baptism of John. '
  '3':
  - type: text
    content: 'So when he heard about Jesus, he sent elders of the Jews to Him, pleading with Him to come and heal his servant. '
  '30':
  - type: text
    content: 'But the Pharisees and lawyers rejected '
  - type: note
    content: Acts 20:27
  - type: text
    content: the will of God for themselves, not having been baptized by him.
  '31':
  - type: text
    content: 'And the Lord said, '
  - type: note
    content: Matt. 11:16
  - type: text
    content: “To what then shall I liken the men of this generation, and what are they like?
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'They are like children sitting in the marketplace and calling to one another, saying:'
  - type: text
    content: ‘We played the flute for you,
  - type: text
    content: And you did not dance;
  - type: text
    content: We mourned to you,
  - type: text
    content: And you did not weep.’
  '33':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 3:1
  - type: text
    content: 'John the Baptist came '
  - type: note
    content: (Matt. 3:4); Luke 1:15
  - type: text
    content: neither eating bread nor drinking wine, and you say, ‘He has a demon.’
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'The Son of Man has come '
  - type: note
    content: Luke 15:2
  - type: text
    content: 'eating and drinking, and you say, ‘Look, a glutton and a '
  - type: text
    content: winebibber, a friend of tax collectors and sinners!’
  - type: text
    content: ' '
  '35':
  - type: note
    content: Matt. 11:19
  - type: text
    content: But wisdom is justified by all her children.”
  - type: heading
    content: A Sinful Woman Forgiven
  '36':
  - type: note
    content: Matt. 26:6; Mark 14:3; John 11:2
  - type: text
    content: 'Then one of the Pharisees asked Him to eat with him. And He went to the Pharisee’s house, and sat down to eat. '
  '37':
  - type: text
    content: 'And behold, a woman in the city who was a sinner, when she knew that '
  - type: text
    content: Jesus
  - type: text
    content: ' sat at the table in the Pharisee’s house, brought an alabaster flask of fragrant oil, '
  '38':
  - type: text
    content: 'and stood at His feet behind '
  - type: text
    content: Him
  - type: text
    content: ' weeping; and she began to wash His feet with her tears, and wiped '
  - type: text
    content: them
  - type: text
    content: ' with the hair of her head; and she kissed His feet and anointed '
  - type: text
    content: them
  - type: text
    content: ' with the fragrant oil. '
  '39':
  - type: text
    content: 'Now when the Pharisee who had invited Him saw '
  - type: text
    content: this,
  - type: text
    content: ' he spoke to himself, saying, '
  - type: note
    content: Luke 15:2
  - type: text
    content: '“This Man, if He were a prophet, would know who and what manner of woman '
  - type: text
    content: this
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' who is touching Him, for she is a sinner.”'
  '4':
  - type: text
    content: 'And when they came to Jesus, they begged Him earnestly, saying that the one for whom He should do this was deserving, '
  '40':
  - type: text
    content: 'And Jesus answered and said to him, '
  - type: text
    content: “Simon, I have something to say to you.”
  - type: text
    content: So he said, “Teacher, say it.”
  '41':
  - type: text
    content: '“There was a certain creditor who had two debtors. One owed five hundred '
  - type: note
    content: Matt. 18:28; Mark 6:37
  - type: text
    content: denarii, and the other fifty.
  - type: text
    content: ' '
  '42':
  - type: text
    content: And when they had nothing with which to repay, he freely forgave them both. Tell Me, therefore, which of them will love him more?”
  '43':
  - type: text
    content: 'Simon answered and said, “I suppose the '
  - type: text
    content: one
  - type: text
    content: ' whom he forgave more.”'
  - type: text
    content: 'And He said to him, '
  - type: text
    content: “You have rightly judged.”
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Then He turned to the woman and said to Simon, '
  - type: text
    content: '“Do you see this woman? I entered your house; you gave Me no '
  - type: note
    content: Gen. 18:4; 19:2; 43:24; Judg. 19:21; 1 Tim. 5:10
  - type: text
    content: 'water for My feet, but she has washed My feet with her tears and wiped '
  - type: text
    content: them
  - type: text
    content: ' with the hair of her head.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'You gave Me no '
  - type: note
    content: Rom. 16:16
  - type: text
    content: kiss, but this woman has not ceased to kiss My feet since the time I came in.
  - type: text
    content: ' '
  '46':
  - type: note
    content: 2 Sam. 12:20; Ps. 23:5; Eccl. 9:8; Dan. 10:3
  - type: text
    content: You did not anoint My head with oil, but this woman has anointed My feet with fragrant oil.
  - type: text
    content: ' '
  '47':
  - type: note
    content: (1 Tim. 1:14)
  - type: text
    content: 'Therefore I say to you, her sins, which '
  - type: text
    content: are
  - type: text
    content: ' many, are forgiven, for she loved much. But to whom little is forgiven, '
  - type: text
    content: the same
  - type: text
    content: ' loves little.”'
  '48':
  - type: text
    content: 'Then He said to her, '
  - type: note
    content: Matt. 9:2; Mark 2:5
  - type: text
    content: “Your sins are forgiven.”
  '49':
  - type: text
    content: 'And those who sat at the table with Him began to say to themselves, '
  - type: note
    content: Matt. 9:3; (Mark 2:7); Luke 5:21
  - type: text
    content: “Who is this who even forgives sins?”
  '5':
  - type: text
    content: “for he loves our nation, and has built us a synagogue.”
  '50':
  - type: text
    content: 'Then He said to the woman, '
  - type: note
    content: Matt. 9:22; Mark 5:34; 10:52; Luke 8:48; 18:42
  - type: text
    content: “Your faith has saved you. Go in peace.”
  '6':
  - type: text
    content: 'Then Jesus went with them. And when He was already not far from the house, the centurion sent friends to Him, saying to Him, “Lord, do not trouble Yourself, for I am not worthy that You should enter under my roof. '
  '7':
  - type: text
    content: 'Therefore I did not even think myself worthy to come to You. But '
  - type: note
    content: Ps. 33:9; 107:20
  - type: text
    content: 'say the word, and my servant will be healed. '
  '8':
  - type: text
    content: 'For I also am a man placed under '
  - type: note
    content: (Mark 13:34)
  - type: text
    content: 'authority, having soldiers under me. And I say to one, ‘Go,’ and he goes; and to another, ‘Come,’ and he comes; and to my servant, ‘Do this,’ and he does '
  - type: text
    content: it.
  - type: text
    content: ”
  '9':
  - type: text
    content: 'When Jesus heard these things, He marveled at him, and turned around and said to the crowd that followed Him, '
  - type: text
    content: “I say to you, I have not found such great faith, not even in Israel!”
  - type: text
    content: ' '
