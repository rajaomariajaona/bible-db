verses:
  '1':
  - type: heading
    content: A Song of God’s Majesty and Love
  - type: note
    content: Deut. 33:29; (Ps. 33:12; Jer. 17:7)
  - type: text
    content: A Praise of David.
  - type: text
    content: I will extol You, my God, O King;
  - type: text
    content: And I will bless Your name forever and ever.
  '10':
  - type: note
    content: (Ps. 100:5); Jer. 33:11; Nah. 1:7; (Matt. 19:17; Mark 10:18)
  - type: text
    content: 'All Your works shall praise You, O '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: And Your saints shall bless You.
  '11':
  - type: text
    content: They shall speak of the glory of Your kingdom,
  - type: text
    content: And talk of Your power,
  '12':
  - type: text
    content: To make known to the sons of men His mighty acts,
  - type: text
    content: And the glorious majesty of His kingdom.
  '13':
  - type: note
    content: Ps. 19:1
  - type: text
    content: 'Your kingdom '
  - type: text
    content: is
  - type: text
    content: ' an everlasting kingdom,'
  - type: text
    content: 'And Your dominion '
  - type: text
    content: endures
  - type: text
    content: ' throughout all generations.'
  '14':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' upholds all who fall,'
  - type: text
    content: 'And '
  - type: note
    content: Dan. 2:44; 4:3; (1 Tim. 1:17; 2 Pet. 1:11)
  - type: text
    content: 'raises up all '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' bowed down.'
  '15':
  - type: note
    content: Ps. 146:8
  - type: text
    content: The eyes of all look expectantly to You,
  - type: text
    content: 'And '
  - type: note
    content: Ps. 104:27
  - type: text
    content: You give them their food in due season.
  '16':
  - type: text
    content: You open Your hand
  - type: note
    content: Ps. 136:25
  - type: text
    content: And satisfy the desire of every living thing.
  '17':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' righteous in all His ways,'
  - type: text
    content: Gracious in all His works.
  '18':
  - type: note
    content: Ps. 104:21, 28
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' near to all who call upon Him,'
  - type: text
    content: 'To all who call upon Him '
  - type: note
    content: (Deut. 4:7)
  - type: text
    content: in truth.
  '19':
  - type: text
    content: He will fulfill the desire of those who fear Him;
  - type: text
    content: He also will hear their cry and save them.
  '2':
  - type: text
    content: Every day I will bless You,
  - type: text
    content: And I will praise Your name forever and ever.
  '20':
  - type: note
    content: (John 4:24)
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' preserves all who love Him,'
  - type: text
    content: But all the wicked He will destroy.
  '21':
  - type: text
    content: 'My mouth shall speak the praise of the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: And all flesh shall bless His holy name
  - type: text
    content: Forever and ever.
  '3':
  - type: note
    content: Ps. 100:title
  - type: text
    content: 'Great '
  - type: text
    content: is
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ', and greatly to be praised;'
  - type: text
    content: 'And '
  - type: note
    content: (Ps. 147:5)
  - type: text
    content: 'His greatness '
  - type: text
    content: is
  - type: text
    content: ' unsearchable.'
  '4':
  - type: note
    content: Job 5:9; 9:10; 11:7; Is. 40:28; (Rom. 11:33)
  - type: text
    content: One generation shall praise Your works to another,
  - type: text
    content: And shall declare Your mighty acts.
  '5':
  - type: text
    content: I will meditate on the glorious splendor of Your majesty,
  - type: text
    content: And on Your wondrous works.
  '6':
  - type: text
    content: Men
  - type: text
    content: ' shall speak of the might of Your awesome acts,'
  - type: text
    content: And I will declare Your greatness.
  '7':
  - type: text
    content: They shall utter the memory of Your great goodness,
  - type: text
    content: And shall sing of Your righteousness.
  '8':
  - type: note
    content: Is. 38:19
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' gracious and full of compassion,'
  - type: text
    content: Slow to anger and great in mercy.
  '9':
  - type: note
    content: (Ex. 34:6, 7; Num. 14:18); Ps. 86:5, 15
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' good to all,'
  - type: text
    content: 'And His tender mercies '
  - type: text
    content: are
  - type: text
    content: ' over all His works.'
