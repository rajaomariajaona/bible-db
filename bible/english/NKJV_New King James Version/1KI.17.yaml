  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he arose and went to Zarephath. And when he came to the gate of the city, indeed a widow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' there gathering sticks. And he called to her and said, “Please bring me a little water in a cup, that I may drink.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as she was going to get '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' he called to her and said, “Please bring me a morsel of bread in your hand.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she said, “As the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God lives, I do not have bread, only a handful of flour in a bin, and a little oil in a jar; and see, I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' gathering a couple of sticks that I may go in and prepare it for myself and my son, that we may eat it, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:23, 24
      marker-yv: yv-n
    - type: text
      text: die.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Elijah said to her, “Do not fear; go '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' do as you have said, but make me a small cake from it first, and bring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' to me; and afterward make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' for yourself and your son. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel: ‘The bin of flour shall not be used up, nor shall the jar of oil run dry, until the day the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sends rain on the earth.’ ”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she went away and did according to the word of Elijah; and she and he and her household ate for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: many
    - type: text
      text: ' days. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The bin of flour was not used up, nor did the jar of oil run dry, according to the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' which He spoke by Elijah.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elijah Revives the Widow’s Son
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it happened after these things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' the son of the woman who owned the house became sick. And his sickness was so serious that there was no breath left in him. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she said to Elijah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 5:8
      marker-yv: yv-n
    - type: text
      text: “What have I to do with you, O man of God? Have you come to me to bring my sin to remembrance, and to kill my son?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to her, “Give me your son.” So he took him out of her arms and carried him to the upper room where he was staying, and laid him on his own bed. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to him, saying, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he cried out to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and said, “O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, have You also brought tragedy on the widow with whom I lodge, by killing her son?” '
  '21':
