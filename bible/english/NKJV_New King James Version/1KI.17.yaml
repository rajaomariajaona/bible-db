      children:
      - type: text
        text: 2 Kin. 4:34, 35; Acts 20:10
      marker-yv: yv-n
    - type: text
      text: 'And he stretched himself out on the child three times, and cried out to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and said, “O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, I pray, let this child’s soul come back to him.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' heard the voice of Elijah; and the soul of the child came back to him, and he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 7:14, 15; Heb. 11:35
      marker-yv: yv-n
    - type: text
      text: revived.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Elijah took the child and brought him down from the upper room into the house, and gave him to his mother. And Elijah said, “See, your son lives!”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the woman said to Elijah, “Now by this '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 2:11; 3:2; 16:30
      marker-yv: yv-n
    - type: text
      text: 'I know that you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a man of God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' that the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in your mouth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the truth.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Get away from here and turn eastward, and hide by the Brook Cherith, which flows into the Jordan. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it will be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' you shall drink from the brook, and I have commanded the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 38:41
      marker-yv: yv-n
    - type: text
      text: ravens to feed you there.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he went and did according to the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for he went and stayed by the Brook Cherith, which flows into the Jordan. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The ravens brought him bread and meat in the morning, and bread and meat in the evening; and he drank from the brook. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And it happened after a while that the brook dried up, because there had been no rain in the land.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elijah and the Widow
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to him, saying, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Arise, go to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Obad. 20; Luke 4:25, 26
      marker-yv: yv-n
    - type: text
      text: 'Zarephath, which '
    - type: usfm
