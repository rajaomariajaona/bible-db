document_id: MRK.15,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Faces Pilate
  - type: text
    content: 'Immediately, '
  - type: note
    content: Ps. 2:2; Matt. 27:1; Luke 22:66; 23:1; John 18:28; Acts 3:13; 4:26
  - type: text
    content: 'in the morning, the chief priests held a consultation with the elders and scribes and the whole council; and they bound Jesus, led '
  - type: text
    content: Him
  - type: text
    content: ' away, and '
  - type: note
    content: Luke 18:32; Acts 3:13
  - type: text
    content: 'delivered '
  - type: text
    content: Him
  - type: text
    content: ' to Pilate. '
  '10':
  - type: text
    content: For he knew that the chief priests had handed Him over because of envy.
  '11':
  - type: text
    content: 'But '
  - type: note
    content: Matt. 27:20; Acts 3:14
  - type: text
    content: 'the chief priests stirred up the crowd, so that he should rather release Barabbas to them. '
  '12':
  - type: text
    content: 'Pilate answered and said to them again, “What then do you want me to do '
  - type: text
    content: with
  - type: text
    content: ' '
  - type: text
    content: Him
  - type: text
    content: ' whom you call the '
  - type: note
    content: Ps. 2:6; (Is. 9:7); Jer. 23:5; 33:15; Mic. 5:2
  - type: text
    content: King of the Jews?”
  '13':
  - type: text
    content: So they cried out again, “Crucify Him!”
  '14':
  - type: text
    content: 'Then Pilate said to them, “Why, '
  - type: note
    content: Is. 53:9; John 8:46; 1 Pet. 2:21–23
  - type: text
    content: what evil has He done?”
  - type: text
    content: But they cried out all the more, “Crucify Him!”
  '15':
  - type: note
    content: Is. 50:6; Matt. 27:26; Mark 10:34; John 19:1, 16
  - type: text
    content: 'So Pilate, wanting to gratify the crowd, released Barabbas to them; and he delivered Jesus, after he had scourged '
  - type: text
    content: Him,
  - type: text
    content: ' to be '
  - type: note
    content: (Is. 53:8)
  - type: text
    content: crucified.
  - type: heading
    content: The Soldiers Mock Jesus
  '16':
  - type: note
    content: Matt. 27:27–31
  - type: text
    content: 'Then the soldiers led Him away into the hall called Praetorium, and they called together the whole garrison. '
  '17':
  - type: text
    content: 'And they clothed Him with purple; and they twisted a crown of thorns, put it on His '
  - type: text
    content: head,
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'and began to salute Him, “Hail, King of the Jews!” '
  '19':
  - type: text
    content: 'Then they '
  - type: note
    content: (Is. 50:6; 52:14; 53:5); Mic. 5:1; Mark 14:65
  - type: text
    content: 'struck Him on the head with a reed and spat on Him; and bowing the knee, they worshiped Him. '
  '2':
  - type: note
    content: Matt. 27:11–14; Luke 23:2, 3; John 18:29–38
  - type: text
    content: Then Pilate asked Him, “Are You the King of the Jews?”
  - type: text
    content: 'He answered and said to him, '
  - type: text
    content: “
  - type: text
    content: It is as
  - type: text
    content: ' you say.”'
  '20':
  - type: text
    content: 'And when they had '
  - type: note
    content: Ps. 35:16; 69:19; Is. 53:3; Matt. 20:19; Mark 10:34; Luke 22:63; 23:11
  - type: text
    content: mocked Him, they took the purple off Him, put His own clothes on Him, and led Him out to crucify Him.
  - type: heading
    content: The King on a Cross
  '21':
  - type: note
    content: Matt. 27:32; Luke 23:26
  - type: text
    content: 'Then they compelled a certain man, Simon a Cyrenian, the father of Alexander and Rufus, as he was coming out of the country and passing by, to bear His cross. '
  '22':
  - type: note
    content: Matt. 27:33–44; Luke 23:33–43; John 19:17–24; Heb. 13:12
  - type: text
    content: 'And they brought Him to the place Golgotha, which is translated, Place of a Skull. '
  '23':
  - type: note
    content: Ps. 69:21; Matt. 27:34
  - type: text
    content: 'Then they gave Him wine mingled with myrrh to drink, but He did not take '
  - type: text
    content: it.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And when they crucified Him, '
  - type: note
    content: Ps. 22:18; Luke 23:34; John 19:23
  - type: text
    content: 'they divided His garments, casting lots for them '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: determine
  - type: text
    content: ' what every man should take.'
  '25':
  - type: text
    content: 'Now '
  - type: note
    content: Matt. 27:45; Luke 23:44; John 19:14
  - type: text
    content: 'it was the third hour, and they crucified Him. '
  '26':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 27:37; John 19:19
  - type: text
    content: 'the inscription of His accusation was written above:'
  - type: text
    content: THE KING OF THE JEWS.
  '27':
  - type: note
    content: Is. 53:9, 12; Matt. 27:38; Luke 22:37
  - type: text
    content: 'With Him they also crucified two robbers, one on His right and the other on His left. '
  '28':
  - type: text
    content: 'So the Scripture was fulfilled which says, '
  - type: note
    content: Is. 53:12; Luke 22:37
  - type: text
    content: “And He was numbered with the transgressors.”
  '29':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 22:6, 7; 69:7
  - type: text
    content: 'those who passed by blasphemed Him, '
  - type: note
    content: Ps. 109:25
  - type: text
    content: 'wagging their heads and saying, “Aha! '
  - type: note
    content: Mark 14:58; John 2:19–21
  - type: text
    content: You
  - type: text
    content: ' who destroy the temple and build '
  - type: text
    content: it
  - type: text
    content: ' in three days, '
  '3':
  - type: text
    content: 'And the chief priests accused Him of many things, but He '
  - type: note
    content: Is. 53:7; John 19:9; Acts 8:32
  - type: text
    content: 'answered nothing. '
  '30':
  - type: text
    content: save Yourself, and come down from the cross!”
  '31':
  - type: text
    content: 'Likewise the chief priests also, '
  - type: note
    content: Luke 18:32
  - type: text
    content: 'mocking among themselves with the scribes, said, “He saved '
  - type: note
    content: Luke 7:14, 15; John 11:43, 44
  - type: text
    content: 'others; Himself He cannot save. '
  '32':
  - type: text
    content: Let the Christ, the King of Israel, descend now from the cross, that we may see and believe.”
  - type: text
    content: 'Even '
  - type: note
    content: Amos 8:9; Matt. 27:44; Luke 23:39
  - type: text
    content: those who were crucified with Him reviled Him.
  - type: heading
    content: Jesus Dies on the Cross
  '33':
  - type: text
    content: 'Now '
  - type: note
    content: Matt. 27:45–56; Luke 23:44–49
  - type: text
    content: 'when the sixth hour had come, there was darkness over the whole land until the ninth hour. '
  '34':
  - type: text
    content: 'And at the ninth hour Jesus cried out with a loud voice, saying, '
  - type: text
    content: “Eloi, Eloi, lama sabachthani?”
  - type: text
    content: ' which is translated, '
  - type: note
    content: Ps. 22:1; Matt. 27:46
  - type: text
    content: “My God, My God, why have You forsaken Me?”
  '35':
  - type: text
    content: 'Some of those who stood by, when they heard '
  - type: text
    content: that,
  - type: text
    content: ' said, “Look, He is calling for Elijah!” '
  '36':
  - type: text
    content: 'Then '
  - type: note
    content: Matt. 27:48; John 19:29
  - type: text
    content: 'someone ran and filled a sponge full of sour wine, put '
  - type: text
    content: it
  - type: text
    content: ' on a reed, and '
  - type: note
    content: Ps. 69:21
  - type: text
    content: 'offered '
  - type: text
    content: it
  - type: text
    content: ' to Him to drink, saying, “Let Him alone; let us see if Elijah will come to take Him down.”'
  '37':
  - type: note
    content: Dan. 9:26; Zech. 11:10, 11; Matt. 27:50; Mark 8:31; Luke 23:46; John 19:30
  - type: text
    content: And Jesus cried out with a loud voice, and breathed His last.
  '38':
  - type: text
    content: 'Then '
  - type: note
    content: Ex. 26:31–33; Matt. 27:51; Luke 23:45
  - type: text
    content: 'the veil of the temple was torn in two from top to bottom. '
  '39':
  - type: text
    content: 'So '
  - type: note
    content: Matt. 27:54; Luke 23:47
  - type: text
    content: when the centurion, who stood opposite Him, saw that He cried out like this and breathed His last, he said, “Truly this Man was the Son of God!”
  '4':
  - type: note
    content: Matt. 27:13
  - type: text
    content: 'Then Pilate asked Him again, saying, “Do You answer nothing? See how many things they testify against You!” '
  '40':
  - type: note
    content: Matt. 27:55; Luke 23:49; John 19:25
  - type: text
    content: 'There were also women looking on '
  - type: note
    content: Ps. 38:11
  - type: text
    content: 'from afar, among whom were Mary Magdalene, Mary the mother of James the Less and of Joses, and Salome, '
  '41':
  - type: text
    content: 'who also '
  - type: note
    content: Luke 8:2, 3
  - type: text
    content: followed Him and ministered to Him when He was in Galilee, and many other women who came up with Him to Jerusalem.
  - type: heading
    content: Jesus Buried in Joseph’s Tomb
  '42':
  - type: note
    content: Matt. 27:57–61; Luke 23:50–56; John 19:38–42
  - type: text
    content: 'Now when evening had come, because it was the Preparation Day, that is, the day before the Sabbath, '
  '43':
  - type: text
    content: 'Joseph of Arimathea, a prominent council member, who '
  - type: note
    content: Matt. 27:57; Luke 2:25, 38; 23:51; John 19:38
  - type: text
    content: 'was himself waiting for the kingdom of God, coming and taking courage, went in to Pilate and asked for the body of Jesus. '
  '44':
  - type: text
    content: 'Pilate marveled that He was already dead; and summoning the centurion, he asked him if He had been dead for some time. '
  '45':
  - type: text
    content: 'So when he found out from the centurion, he granted the body to Joseph. '
  '46':
  - type: note
    content: Is. 53:9; Matt. 27:59, 60; Luke 23:53; John 19:40
  - type: text
    content: 'Then he bought fine linen, took Him down, and wrapped Him in the linen. And he laid Him in a tomb which had been hewn out of the rock, and rolled a stone against the door of the tomb. '
  '47':
  - type: text
    content: 'And Mary Magdalene and Mary '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: mother
  - type: text
    content: ' of Joses observed where He was laid.'
  '5':
  - type: note
    content: Ps. 38:13, 14; Is. 53:7; John 19:9
  - type: text
    content: But Jesus still answered nothing, so that Pilate marveled.
  - type: heading
    content: Taking the Place of Barabbas
  '6':
  - type: text
    content: 'Now '
  - type: note
    content: Matt. 27:15–26; Luke 23:18–25; John 18:39—19:16
  - type: text
    content: 'at the feast he was accustomed to releasing one prisoner to them, whomever they requested. '
  '7':
  - type: text
    content: 'And there was one named Barabbas, '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' chained with his fellow rebels; they had committed murder in the rebellion. '
  '8':
  - type: text
    content: 'Then the multitude, crying aloud, began to ask '
  - type: text
    content: him
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: do
  - type: text
    content: ' just as he had always done for them. '
  '9':
  - type: text
    content: 'But Pilate answered them, saying, “Do you want me to release to you the King of the Jews?” '
