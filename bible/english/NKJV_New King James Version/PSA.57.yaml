document_id: PSA.57,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prayer for Safety from Enemies
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. Set to “Do Not Destroy.” A Michtam of David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 22:1
      marker-yv: yv-n
    - type: text
      text: when he fled from Saul into the cave.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Be merciful to me, O God, be merciful to me!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For my soul trusts in You;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 2:12; Ps. 17:8; 63:7
      marker-yv: yv-n
    - type: text
      text: And in the shadow of Your wings I will make my refuge,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 26:20
      marker-yv: yv-n
    - type: text
      text: 'Until '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' calamities have passed by.'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 103:11
      marker-yv: yv-n
    - type: text
      text: For Your mercy reaches unto the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And Your truth unto the clouds.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 57:5
      marker-yv: yv-n
    - type: text
      text: Be exalted, O God, above the heavens;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Let
    - type: text
      text: ' Your glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' above all the earth.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I will cry out to God Most High,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 138:8)
      marker-yv: yv-n
    - type: text
      text: 'who performs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: all
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' for me.'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 144:5, 7
      marker-yv: yv-n
    - type: text
      text: He shall send from heaven and save me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He reproaches the one who would swallow me up.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 43:3
      marker-yv: yv-n
    - type: text
      text: shall send forth His mercy and His truth.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'My soul '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' among lions;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I lie '
    - type: usfm
      marker: it
      children:
      - type: text
        text: among
    - type: text
      text: ' the sons of men'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who are set on fire,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 30:14
      marker-yv: yv-n
    - type: text
      text: 'Whose teeth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' spears and arrows,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their tongue a sharp sword.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 108:5
      marker-yv: yv-n
    - type: text
      text: Be exalted, O God, above the heavens;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Let
    - type: text
      text: ' Your glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' above all the earth.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 9:15
      marker-yv: yv-n
    - type: text
      text: They have prepared a net for my steps;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My soul is bowed down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have dug a pit before me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Into the midst of it they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: themselves
    - type: text
      text: ' have fallen.'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 108:1–5
      marker-yv: yv-n
    - type: text
      text: My heart is steadfast, O God, my heart is steadfast;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing and give praise.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Awake, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 16:9
      marker-yv: yv-n
    - type: text
      text: my glory!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Awake, lute and harp!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will awaken the dawn.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 108:3
      marker-yv: yv-n
    - type: text
      text: I will praise You, O Lord, among the peoples;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing to You among the nations.
