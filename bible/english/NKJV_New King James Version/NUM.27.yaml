document_id: NUM.27,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Inheritance Laws
  - type: text
    content: 'Then came the daughters of '
  - type: note
    content: Num. 26:33; 36:1, 11; Josh. 17:3
  - type: text
    content: 'Zelophehad the son of Hepher, the son of Gilead, the son of Machir, the son of Manasseh, from the families of Manasseh the son of Joseph; and these '
  - type: text
    content: were
  - type: text
    content: ' the names of his daughters: Mahlah, Noah, Hoglah, Milcah, and Tirzah. '
  '10':
  - type: text
    content: 'If he has no brothers, then you shall give his inheritance to his father’s brothers. '
  '11':
  - type: text
    content: 'And if his father has no brothers, then you shall give his inheritance to the relative closest to him in his family, and he shall possess it.’ ” And it shall be to the children of Israel '
  - type: note
    content: Num. 35:29
  - type: text
    content: 'a statute of judgment, just as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses.'
  - type: heading
    content: Joshua the Next Leader of Israel
  '12':
  - type: text
    content: 'Now the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses: '
  - type: note
    content: Num. 33:47; Deut. 3:23–27; 32:48–52; 34:1–4
  - type: text
    content: '“Go up into this Mount Abarim, and see the land which I have given to the children of Israel. '
  '13':
  - type: text
    content: 'And when you have seen it, you also '
  - type: note
    content: Num. 20:12, 24, 28; 31:2; Deut. 10:6; 34:5, 6
  - type: text
    content: 'shall be gathered to your people, as Aaron your brother was gathered. '
  '14':
  - type: text
    content: 'For in the Wilderness of Zin, during the strife of the congregation, you '
  - type: note
    content: Num. 20:12, 24; Deut. 1:37; 32:51; Ps. 106:32, 33
  - type: text
    content: 'rebelled against My command to hallow Me at the waters before their eyes.” (These '
  - type: text
    content: are
  - type: text
    content: ' the '
  - type: note
    content: Ex. 17:7
  - type: text
    content: waters of Meribah, at Kadesh in the Wilderness of Zin.)
  '15':
  - type: text
    content: 'Then Moses spoke to the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying: '
  '16':
  - type: text
    content: '“Let the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Num. 16:22; Heb. 12:9
  - type: text
    content: 'the God of the spirits of all flesh, set a man over the congregation, '
  '17':
  - type: note
    content: Deut. 31:2; 1 Sam. 8:20; 18:13; 2 Chr. 1:10
  - type: text
    content: 'who may go out before them and go in before them, who may lead them out and bring them in, that the congregation of the '
  - type: heading
    content: Lord
  - type: text
    content: ' may not be '
  - type: note
    content: 1 Kin. 22:17; Zech. 10:2; Matt. 9:36; Mark 6:34
  - type: text
    content: like sheep which have no shepherd.”
  '18':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses: “Take Joshua the son of Nun with you, a man '
  - type: note
    content: Gen. 41:38; Judg. 3:10; 1 Sam. 16:13, 18
  - type: text
    content: 'in whom '
  - type: text
    content: is
  - type: text
    content: ' the Spirit, and '
  - type: note
    content: Deut. 34:9
  - type: text
    content: 'lay your hand on him; '
  '19':
  - type: text
    content: 'set him before Eleazar the priest and before all the congregation, and '
  - type: note
    content: Deut. 3:28; 31:3, 7, 8, 23
  - type: text
    content: 'inaugurate him in their sight. '
  '2':
  - type: text
    content: 'And they stood before Moses, before Eleazar the priest, and before the leaders and all the congregation, '
  - type: text
    content: by
  - type: text
    content: ' the doorway of the tabernacle of meeting, saying: '
  '20':
  - type: text
    content: 'And '
  - type: note
    content: Num. 11:17
  - type: text
    content: 'you shall give '
  - type: text
    content: some
  - type: text
    content: ' of your authority to him, that all the congregation of the children of Israel '
  - type: note
    content: Josh. 1:16–18
  - type: text
    content: 'may be obedient. '
  '21':
  - type: note
    content: Judg. 20:18, 23, 26; 1 Sam. 23:9; 30:7
  - type: text
    content: 'He shall stand before Eleazar the priest, who shall inquire before the '
  - type: heading
    content: Lord
  - type: text
    content: ' for him '
  - type: note
    content: Ex. 28:30; 1 Sam. 28:6
  - type: text
    content: 'by the judgment of the Urim. '
  - type: note
    content: Josh. 9:14; 1 Sam. 22:10
  - type: text
    content: At his word they shall go out, and at his word they shall come in, he and all the children of Israel with him—all the congregation.”
  '22':
  - type: text
    content: 'So Moses did as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded him. He took Joshua and set him before Eleazar the priest and before all the congregation. '
  '23':
  - type: text
    content: 'And he laid his hands on him '
  - type: note
    content: Deut. 3:28; 31:7, 8
  - type: text
    content: 'and inaugurated him, just as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded by the hand of Moses.'
  '3':
  - type: text
    content: '“Our father '
  - type: note
    content: Num. 14:35; 26:64, 65
  - type: text
    content: 'died in the wilderness; but he was not in the company of those who gathered together against the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Num. 16:1, 2
  - type: text
    content: 'in company with Korah, but he died in his own sin; and he had no sons. '
  '4':
  - type: text
    content: 'Why should the name of our father be '
  - type: note
    content: Deut. 25:6
  - type: text
    content: 'removed from among his family because he had no son? '
  - type: note
    content: Josh. 17:4
  - type: text
    content: Give us a possession among our father’s brothers.”
  '5':
  - type: text
    content: 'So Moses '
  - type: note
    content: Ex. 18:13–26
  - type: text
    content: 'brought their case before the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '7':
  - type: text
    content: '“The daughters of Zelophehad speak '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' right; '
  - type: note
    content: Num. 36:2; Josh. 17:4
  - type: text
    content: 'you shall surely give them a possession of inheritance among their father’s brothers, and cause the inheritance of their father to pass to them. '
  '8':
  - type: text
    content: 'And you shall speak to the children of Israel, saying: ‘If a man dies and has no son, then you shall cause his inheritance to pass to his daughter. '
  '9':
  - type: text
    content: 'If he has no daughter, then you shall give his inheritance to his brothers. '
