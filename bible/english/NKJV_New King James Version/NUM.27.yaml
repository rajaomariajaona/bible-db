document_id: NUM.27,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Inheritance Laws
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then came the daughters of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 26:33; 36:1, 11; Josh. 17:3
      marker-yv: yv-n
    - type: text
      text: 'Zelophehad the son of Hepher, the son of Gilead, the son of Machir, the son of Manasseh, from the families of Manasseh the son of Joseph; and these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the names of his daughters: Mahlah, Noah, Hoglah, Milcah, and Tirzah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'If he has no brothers, then you shall give his inheritance to his father’s brothers. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And if his father has no brothers, then you shall give his inheritance to the relative closest to him in his family, and he shall possess it.’ ” And it shall be to the children of Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:29
      marker-yv: yv-n
    - type: text
      text: 'a statute of judgment, just as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joshua the Next Leader of Israel
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 33:47; Deut. 3:23–27; 32:48–52; 34:1–4
      marker-yv: yv-n
    - type: text
      text: '“Go up into this Mount Abarim, and see the land which I have given to the children of Israel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And when you have seen it, you also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:12, 24, 28; 31:2; Deut. 10:6; 34:5, 6
      marker-yv: yv-n
    - type: text
      text: 'shall be gathered to your people, as Aaron your brother was gathered. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For in the Wilderness of Zin, during the strife of the congregation, you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:12, 24; Deut. 1:37; 32:51; Ps. 106:32, 33
      marker-yv: yv-n
    - type: text
      text: 'rebelled against My command to hallow Me at the waters before their eyes.” (These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 17:7
      marker-yv: yv-n
    - type: text
      text: waters of Meribah, at Kadesh in the Wilderness of Zin.)
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then Moses spoke to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“Let the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:22; Heb. 12:9
      marker-yv: yv-n
    - type: text
      text: 'the God of the spirits of all flesh, set a man over the congregation, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 31:2; 1 Sam. 8:20; 18:13; 2 Chr. 1:10
      marker-yv: yv-n
    - type: text
      text: 'who may go out before them and go in before them, who may lead them out and bring them in, that the congregation of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' may not be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 22:17; Zech. 10:2; Matt. 9:36; Mark 6:34
      marker-yv: yv-n
    - type: text
      text: like sheep which have no shepherd.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses: “Take Joshua the son of Nun with you, a man '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:38; Judg. 3:10; 1 Sam. 16:13, 18
      marker-yv: yv-n
    - type: text
      text: 'in whom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the Spirit, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 34:9
      marker-yv: yv-n
    - type: text
      text: 'lay your hand on him; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'set him before Eleazar the priest and before all the congregation, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 3:28; 31:3, 7, 8, 23
      marker-yv: yv-n
    - type: text
      text: 'inaugurate him in their sight. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And they stood before Moses, before Eleazar the priest, and before the leaders and all the congregation, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by
    - type: text
      text: ' the doorway of the tabernacle of meeting, saying: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 11:17
      marker-yv: yv-n
    - type: text
      text: 'you shall give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of your authority to him, that all the congregation of the children of Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 1:16–18
      marker-yv: yv-n
    - type: text
      text: 'may be obedient. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:18, 23, 26; 1 Sam. 23:9; 30:7
      marker-yv: yv-n
    - type: text
      text: 'He shall stand before Eleazar the priest, who shall inquire before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:30; 1 Sam. 28:6
      marker-yv: yv-n
    - type: text
      text: 'by the judgment of the Urim. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 9:14; 1 Sam. 22:10
      marker-yv: yv-n
    - type: text
      text: At his word they shall go out, and at his word they shall come in, he and all the children of Israel with him—all the congregation.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So Moses did as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded him. He took Joshua and set him before Eleazar the priest and before all the congregation. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And he laid his hands on him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 3:28; 31:7, 8
      marker-yv: yv-n
    - type: text
      text: 'and inaugurated him, just as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded by the hand of Moses.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Our father '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:35; 26:64, 65
      marker-yv: yv-n
    - type: text
      text: 'died in the wilderness; but he was not in the company of those who gathered together against the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:1, 2
      marker-yv: yv-n
    - type: text
      text: 'in company with Korah, but he died in his own sin; and he had no sons. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Why should the name of our father be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 25:6
      marker-yv: yv-n
    - type: text
      text: 'removed from among his family because he had no son? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 17:4
      marker-yv: yv-n
    - type: text
      text: Give us a possession among our father’s brothers.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So Moses '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 18:13–26
      marker-yv: yv-n
    - type: text
      text: 'brought their case before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“The daughters of Zelophehad speak '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' right; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 36:2; Josh. 17:4
      marker-yv: yv-n
    - type: text
      text: 'you shall surely give them a possession of inheritance among their father’s brothers, and cause the inheritance of their father to pass to them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And you shall speak to the children of Israel, saying: ‘If a man dies and has no son, then you shall cause his inheritance to pass to his daughter. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'If he has no daughter, then you shall give his inheritance to his brothers. '
