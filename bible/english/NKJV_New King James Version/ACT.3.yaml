document_id: ACT.3,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Lame Man Healed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Peter and John went up together '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:46
      marker-yv: yv-n
    - type: text
      text: 'to the temple at the hour of prayer, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 55:17; Matt. 27:45; Acts 10:30
      marker-yv: yv-n
    - type: text
      text: 'the ninth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hour.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they knew that it was he who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 9:8; Acts 3:2
      marker-yv: yv-n
    - type: text
      text: sat begging alms at the Beautiful Gate of the temple; and they were filled with wonder and amazement at what had happened to him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Preaching in Solomon’s Portico
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now as the lame man who was healed held on to Peter and John, all the people ran together to them in the porch '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 10:23; Acts 5:12
      marker-yv: yv-n
    - type: text
      text: 'which is called Solomon’s, greatly amazed. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when Peter saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' he responded to the people: “Men of Israel, why do you marvel at this? Or why look so intently at us, as though by our own power or godliness we had made this man walk? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 5:30
      marker-yv: yv-n
    - type: text
      text: 'The God of Abraham, Isaac, and Jacob, the God of our fathers, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 49:3; John 7:39; 12:23; 13:31
      marker-yv: yv-n
    - type: text
      text: 'glorified His Servant Jesus, whom you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:2
      marker-yv: yv-n
    - type: text
      text: 'delivered up and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:20; Mark 15:11; Luke 23:18; John 18:40; Acts 13:28
      marker-yv: yv-n
    - type: text
      text: 'denied in the presence of Pilate, when he was determined to let '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him
    - type: text
      text: ' go. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you denied '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 16:10; Mark 1:24; Luke 1:35
      marker-yv: yv-n
    - type: text
      text: 'the Holy One '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 7:52; 2 Cor. 5:21
      marker-yv: yv-n
    - type: text
      text: 'and the Just, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 18:40
      marker-yv: yv-n
    - type: text
      text: 'asked for a murderer to be granted to you, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and killed the Prince of life, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:24
      marker-yv: yv-n
    - type: text
      text: 'whom God raised from the dead, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:32
      marker-yv: yv-n
    - type: text
      text: 'of which we are witnesses. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 9:22; Acts 4:10; 14:9
      marker-yv: yv-n
    - type: text
      text: 'And His name, through faith in His name, has made this man strong, whom you see and know. Yes, the faith which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: comes
    - type: text
      text: ' through Him has given him this perfect soundness in the presence of you all.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Yet now, brethren, I know that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 23:34; John 16:3; (Acts 13:27; 17:30); 1 Cor. 2:8; 1 Tim. 1:13
      marker-yv: yv-n
    - type: text
      text: 'you did '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' in ignorance, as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: did
    - type: text
      text: ' also your rulers. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:44; Acts 26:22
      marker-yv: yv-n
    - type: text
      text: 'those things which God foretold '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 22; Is. 50:6; 53:5; Dan. 9:26; Hos. 6:1; Zech. 13:6; 1 Pet. 1:10
      marker-yv: yv-n
    - type: text
      text: 'by the mouth of all His prophets, that the Christ would suffer, He has thus fulfilled. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 2:38; 26:20)
      marker-yv: yv-n
    - type: text
      text: 'Repent therefore and be converted, that your sins may be blotted out, so that times of refreshing may come from the presence of the Lord, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 14:8
      marker-yv: yv-n
    - type: text
      text: 'a certain man lame from his mother’s womb was carried, whom they laid daily at the gate of the temple which is called Beautiful, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 9:8; Acts 3:10
      marker-yv: yv-n
    - type: text
      text: 'to ask alms from those who entered the temple; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and that He may send Jesus Christ, who was preached to you before, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 1:11
      marker-yv: yv-n
    - type: text
      text: 'whom heaven must receive until the times of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 17:11; (Rom. 8:21)
      marker-yv: yv-n
    - type: text
      text: 'restoration of all things, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 1:70
      marker-yv: yv-n
    - type: text
      text: 'which God has spoken by the mouth of all His holy prophets since the world began. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Moses truly said to the fathers, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 18:15, 18, 19; Acts 7:37
      marker-yv: yv-n
    - type: text
      text: '‘The '
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Lord
    - type: text
      text: ' your God will raise up for you a Prophet like me from your brethren. Him you shall hear in all things, whatever He says to you. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' every soul who will not hear that Prophet shall be utterly destroyed from among the people.’ '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:12; Luke 24:25
      marker-yv: yv-n
    - type: text
      text: 'all the prophets, from Samuel and those who follow, as many as have spoken, have also foretold these days. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:39; (Rom. 9:4, 8; Gal. 3:26)
      marker-yv: yv-n
    - type: text
      text: 'You are sons of the prophets, and of the covenant which God made with our fathers, saying to Abraham, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:3; 18:18; 22:18; 26:4; 28:14
      marker-yv: yv-n
    - type: text
      text: '‘And in your seed all the families of the earth shall be blessed.’ '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 15:24; John 4:22; Acts 13:46; (Rom. 1:16; 2:9)
      marker-yv: yv-n
    - type: text
      text: 'first, God, having raised up His Servant Jesus, sent Him to bless you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 42:1; Matt. 1:21
      marker-yv: yv-n
    - type: text
      text: 'in turning away every one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' from your iniquities.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who, seeing Peter and John about to go into the temple, asked for alms. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And fixing his eyes on him, with John, Peter said, “Look at us.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he gave them his attention, expecting to receive something from them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Peter said, “Silver and gold I do not have, but what I do have I give you: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:10
      marker-yv: yv-n
    - type: text
      text: 'In the name of Jesus Christ of Nazareth, rise up and walk.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he took him by the right hand and lifted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' up, and immediately his feet and ankle bones received strength. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 35:6
      marker-yv: yv-n
    - type: text
      text: 'leaping up, stood and walked and entered the temple with them—walking, leaping, and praising God. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:16, 21
      marker-yv: yv-n
    - type: text
      text: 'And all the people saw him walking and praising God. '
