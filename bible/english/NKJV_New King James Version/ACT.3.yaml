document_id: ACT.3,114
type_code: eng
verses:
  '1':
  - type: heading
    content: A Lame Man Healed
  - type: text
    content: 'Now Peter and John went up together '
  - type: note
    content: Acts 2:46
  - type: text
    content: 'to the temple at the hour of prayer, '
  - type: note
    content: Ps. 55:17; Matt. 27:45; Acts 10:30
  - type: text
    content: 'the ninth '
  - type: text
    content: hour.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Then they knew that it was he who '
  - type: note
    content: John 9:8; Acts 3:2
  - type: text
    content: sat begging alms at the Beautiful Gate of the temple; and they were filled with wonder and amazement at what had happened to him.
  - type: heading
    content: Preaching in Solomon’s Portico
  '11':
  - type: text
    content: 'Now as the lame man who was healed held on to Peter and John, all the people ran together to them in the porch '
  - type: note
    content: John 10:23; Acts 5:12
  - type: text
    content: 'which is called Solomon’s, greatly amazed. '
  '12':
  - type: text
    content: 'So when Peter saw '
  - type: text
    content: it,
  - type: text
    content: ' he responded to the people: “Men of Israel, why do you marvel at this? Or why look so intently at us, as though by our own power or godliness we had made this man walk? '
  '13':
  - type: note
    content: John 5:30
  - type: text
    content: 'The God of Abraham, Isaac, and Jacob, the God of our fathers, '
  - type: note
    content: Is. 49:3; John 7:39; 12:23; 13:31
  - type: text
    content: 'glorified His Servant Jesus, whom you '
  - type: note
    content: Matt. 27:2
  - type: text
    content: 'delivered up and '
  - type: note
    content: Matt. 27:20; Mark 15:11; Luke 23:18; John 18:40; Acts 13:28
  - type: text
    content: 'denied in the presence of Pilate, when he was determined to let '
  - type: text
    content: Him
  - type: text
    content: ' go. '
  '14':
  - type: text
    content: 'But you denied '
  - type: note
    content: Ps. 16:10; Mark 1:24; Luke 1:35
  - type: text
    content: 'the Holy One '
  - type: note
    content: Acts 7:52; 2 Cor. 5:21
  - type: text
    content: 'and the Just, and '
  - type: note
    content: John 18:40
  - type: text
    content: 'asked for a murderer to be granted to you, '
  '15':
  - type: text
    content: 'and killed the Prince of life, '
  - type: note
    content: Acts 2:24
  - type: text
    content: 'whom God raised from the dead, '
  - type: note
    content: Acts 2:32
  - type: text
    content: 'of which we are witnesses. '
  '16':
  - type: note
    content: Matt. 9:22; Acts 4:10; 14:9
  - type: text
    content: 'And His name, through faith in His name, has made this man strong, whom you see and know. Yes, the faith which '
  - type: text
    content: comes
  - type: text
    content: ' through Him has given him this perfect soundness in the presence of you all.'
  '17':
  - type: text
    content: '“Yet now, brethren, I know that '
  - type: note
    content: Luke 23:34; John 16:3; (Acts 13:27; 17:30); 1 Cor. 2:8; 1 Tim. 1:13
  - type: text
    content: 'you did '
  - type: text
    content: it
  - type: text
    content: ' in ignorance, as '
  - type: text
    content: did
  - type: text
    content: ' also your rulers. '
  '18':
  - type: text
    content: 'But '
  - type: note
    content: Luke 24:44; Acts 26:22
  - type: text
    content: 'those things which God foretold '
  - type: note
    content: Ps. 22; Is. 50:6; 53:5; Dan. 9:26; Hos. 6:1; Zech. 13:6; 1 Pet. 1:10
  - type: text
    content: 'by the mouth of all His prophets, that the Christ would suffer, He has thus fulfilled. '
  '19':
  - type: note
    content: (Acts 2:38; 26:20)
  - type: text
    content: 'Repent therefore and be converted, that your sins may be blotted out, so that times of refreshing may come from the presence of the Lord, '
  '2':
  - type: text
    content: 'And '
  - type: note
    content: Acts 14:8
  - type: text
    content: 'a certain man lame from his mother’s womb was carried, whom they laid daily at the gate of the temple which is called Beautiful, '
  - type: note
    content: John 9:8; Acts 3:10
  - type: text
    content: 'to ask alms from those who entered the temple; '
  '20':
  - type: text
    content: 'and that He may send Jesus Christ, who was preached to you before, '
  '21':
  - type: note
    content: Acts 1:11
  - type: text
    content: 'whom heaven must receive until the times of '
  - type: note
    content: Matt. 17:11; (Rom. 8:21)
  - type: text
    content: 'restoration of all things, '
  - type: note
    content: Luke 1:70
  - type: text
    content: 'which God has spoken by the mouth of all His holy prophets since the world began. '
  '22':
  - type: text
    content: 'For Moses truly said to the fathers, '
  - type: note
    content: Deut. 18:15, 18, 19; Acts 7:37
  - type: text
    content: '‘The '
  - type: heading
    content: Lord
  - type: text
    content: ' your God will raise up for you a Prophet like me from your brethren. Him you shall hear in all things, whatever He says to you. '
  '23':
  - type: text
    content: 'And it shall be '
  - type: text
    content: that
  - type: text
    content: ' every soul who will not hear that Prophet shall be utterly destroyed from among the people.’ '
  '24':
  - type: text
    content: 'Yes, and '
  - type: note
    content: 2 Sam. 7:12; Luke 24:25
  - type: text
    content: 'all the prophets, from Samuel and those who follow, as many as have spoken, have also foretold these days. '
  '25':
  - type: note
    content: Acts 2:39; (Rom. 9:4, 8; Gal. 3:26)
  - type: text
    content: 'You are sons of the prophets, and of the covenant which God made with our fathers, saying to Abraham, '
  - type: note
    content: Gen. 12:3; 18:18; 22:18; 26:4; 28:14
  - type: text
    content: '‘And in your seed all the families of the earth shall be blessed.’ '
  '26':
  - type: text
    content: 'To you '
  - type: note
    content: Matt. 15:24; John 4:22; Acts 13:46; (Rom. 1:16; 2:9)
  - type: text
    content: 'first, God, having raised up His Servant Jesus, sent Him to bless you, '
  - type: note
    content: Is. 42:1; Matt. 1:21
  - type: text
    content: 'in turning away every one '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: you
  - type: text
    content: ' from your iniquities.”'
  '3':
  - type: text
    content: 'who, seeing Peter and John about to go into the temple, asked for alms. '
  '4':
  - type: text
    content: 'And fixing his eyes on him, with John, Peter said, “Look at us.” '
  '5':
  - type: text
    content: 'So he gave them his attention, expecting to receive something from them. '
  '6':
  - type: text
    content: 'Then Peter said, “Silver and gold I do not have, but what I do have I give you: '
  - type: note
    content: Acts 4:10
  - type: text
    content: 'In the name of Jesus Christ of Nazareth, rise up and walk.” '
  '7':
  - type: text
    content: 'And he took him by the right hand and lifted '
  - type: text
    content: him
  - type: text
    content: ' up, and immediately his feet and ankle bones received strength. '
  '8':
  - type: text
    content: 'So he, '
  - type: note
    content: Is. 35:6
  - type: text
    content: 'leaping up, stood and walked and entered the temple with them—walking, leaping, and praising God. '
  '9':
  - type: note
    content: Acts 4:16, 21
  - type: text
    content: 'And all the people saw him walking and praising God. '
