document_id: 2KI.12,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoash Repairs the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the seventh year of Jehu, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 24:1
      marker-yv: yv-n
    - type: text
      text: 'Jehoash became king, and he reigned forty years in Jerusalem. His mother’s name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Zibiah of Beersheba. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it was, whenever they saw that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' much money in the chest, that the king’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:17; 2 Kin. 19:2; 22:3, 4, 12
      marker-yv: yv-n
    - type: text
      text: 'scribe and the high priest came up and put it in bags, and counted the money that was found in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they gave the money, which had been apportioned, into the hands of those who did the work, who had the oversight of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '; and they paid it out to the carpenters and builders who worked on the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and to masons and stonecutters, and for buying timber and hewn stone, to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 22:5, 6
      marker-yv: yv-n
    - type: text
      text: 'repair the damage of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and for all that was paid out to repair the temple. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 24:14
      marker-yv: yv-n
    - type: text
      text: 'there were not made for the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' basins of silver, trimmers, sprinkling-bowls, trumpets, any articles of gold or articles of silver, from the money brought into the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they gave that to the workmen, and they repaired the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with it. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 22:7; (1 Cor. 4:2); 2 Cor. 8:20
      marker-yv: yv-n
    - type: text
      text: 'they did not require an account from the men into whose hand they delivered the money to be paid to workmen, for they dealt faithfully. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Lev. 5:15, 18)
      marker-yv: yv-n
    - type: text
      text: 'The money from the trespass offerings and the money from the sin offerings was not brought into the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Lev. 7:7; Num. 18:9)
      marker-yv: yv-n
    - type: text
      text: It belonged to the priests.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hazael Threatens Jerusalem
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 8:12
      marker-yv: yv-n
    - type: text
      text: 'Hazael king of Syria went up and fought against Gath, and took it; then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 24:23
      marker-yv: yv-n
    - type: text
      text: 'Hazael set his face to go up to Jerusalem. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoash king of Judah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:18; 2 Kin. 16:8; 18:15, 16
      marker-yv: yv-n
    - type: text
      text: 'took all the sacred things that his fathers, Jehoshaphat and Jehoram and Ahaziah, kings of Judah, had dedicated, and his own sacred things, and all the gold found in the treasuries of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and in the king’s house, and sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to Hazael king of Syria. Then he went away from Jerusalem.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Death of Joash
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Joash, and all that he did, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Judah?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoash did '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' right in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' all the days in which '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 11:4
      marker-yv: yv-n
    - type: text
      text: 'Jehoiada the priest instructed him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 14:5; 2 Chr. 24:25
      marker-yv: yv-n
    - type: text
      text: 'his servants arose and formed a conspiracy, and killed Joash in the house of the Millo, which goes down to Silla. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Jozachar the son of Shimeath and Jehozabad the son of Shomer, his servants, struck him. So he died, and they buried him with his fathers in the City of David. Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 24:27
      marker-yv: yv-n
    - type: text
      text: Amaziah his son reigned in his place.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:14; 22:43; 2 Kin. 14:4; 15:35
      marker-yv: yv-n
    - type: text
      text: the high places were not taken away; the people still sacrificed and burned incense on the high places.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoash said to the priests, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 22:4
      marker-yv: yv-n
    - type: text
      text: '“All the money of the dedicated gifts that are brought into the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '—each man’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:13–16
      marker-yv: yv-n
    - type: text
      text: 'census money, each man’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 27:2–28
      marker-yv: yv-n
    - type: text
      text: assessment money—
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' all the money that a man '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 35:5; 1 Chr. 29:3–9
      marker-yv: yv-n
    - type: text
      text: 'purposes in his heart to bring into the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'let the priests take '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' themselves, each from his constituency; and let them repair the damages of the temple, wherever any dilapidation is found.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it was so, by the twenty-third year of King Jehoash, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 24:5
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' the priests had not repaired the damages of the temple. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 24:6
      marker-yv: yv-n
    - type: text
      text: 'So King Jehoash called Jehoiada the priest and the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' priests, and said to them, “Why have you not repaired the damages of the temple? Now therefore, do not take '
    - type: usfm
      marker: it
      children:
      - type: text
        text: more
    - type: text
      text: ' money from your constituency, but deliver it for repairing the damages of the temple.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the priests agreed that they would neither receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: more
    - type: text
      text: ' money from the people, nor repair the damages of the temple.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jehoiada the priest took '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 23:1; 24:8
      marker-yv: yv-n
    - type: text
      text: 'a chest, bored a hole in its lid, and set it beside the altar, on the right side as one comes into the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '; and the priests who kept the door put '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 12:41; Luke 21:1
      marker-yv: yv-n
    - type: text
      text: 'there all the money brought into the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
