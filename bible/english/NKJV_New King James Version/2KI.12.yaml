document_id: 2KI.12,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoash Repairs the Temple
  - type: text
    content: 'In the seventh year of Jehu, '
  - type: note
    content: 2 Chr. 24:1
  - type: text
    content: 'Jehoash became king, and he reigned forty years in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Zibiah of Beersheba. '
  '10':
  - type: text
    content: 'So it was, whenever they saw that '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' much money in the chest, that the king’s '
  - type: note
    content: 2 Sam. 8:17; 2 Kin. 19:2; 22:3, 4, 12
  - type: text
    content: 'scribe and the high priest came up and put it in bags, and counted the money that was found in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Then they gave the money, which had been apportioned, into the hands of those who did the work, who had the oversight of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '; and they paid it out to the carpenters and builders who worked on the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  '12':
  - type: text
    content: 'and to masons and stonecutters, and for buying timber and hewn stone, to '
  - type: note
    content: 2 Kin. 22:5, 6
  - type: text
    content: 'repair the damage of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and for all that was paid out to repair the temple. '
  '13':
  - type: text
    content: 'However '
  - type: note
    content: 2 Chr. 24:14
  - type: text
    content: 'there were not made for the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' basins of silver, trimmers, sprinkling-bowls, trumpets, any articles of gold or articles of silver, from the money brought into the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'But they gave that to the workmen, and they repaired the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' with it. '
  '15':
  - type: text
    content: 'Moreover '
  - type: note
    content: 2 Kin. 22:7; (1 Cor. 4:2); 2 Cor. 8:20
  - type: text
    content: 'they did not require an account from the men into whose hand they delivered the money to be paid to workmen, for they dealt faithfully. '
  '16':
  - type: note
    content: (Lev. 5:15, 18)
  - type: text
    content: 'The money from the trespass offerings and the money from the sin offerings was not brought into the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: (Lev. 7:7; Num. 18:9)
  - type: text
    content: It belonged to the priests.
  - type: heading
    content: Hazael Threatens Jerusalem
  '17':
  - type: note
    content: 2 Kin. 8:12
  - type: text
    content: 'Hazael king of Syria went up and fought against Gath, and took it; then '
  - type: note
    content: 2 Chr. 24:23
  - type: text
    content: 'Hazael set his face to go up to Jerusalem. '
  '18':
  - type: text
    content: 'And Jehoash king of Judah '
  - type: note
    content: 1 Kin. 15:18; 2 Kin. 16:8; 18:15, 16
  - type: text
    content: 'took all the sacred things that his fathers, Jehoshaphat and Jehoram and Ahaziah, kings of Judah, had dedicated, and his own sacred things, and all the gold found in the treasuries of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and in the king’s house, and sent '
  - type: text
    content: them
  - type: text
    content: ' to Hazael king of Syria. Then he went away from Jerusalem.'
  - type: heading
    content: Death of Joash
  '19':
  - type: text
    content: 'Now the rest of the acts of Joash, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah?'
  '2':
  - type: text
    content: 'Jehoash did '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' right in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ' all the days in which '
  - type: note
    content: 2 Kin. 11:4
  - type: text
    content: 'Jehoiada the priest instructed him. '
  '20':
  - type: text
    content: 'And '
  - type: note
    content: 2 Kin. 14:5; 2 Chr. 24:25
  - type: text
    content: 'his servants arose and formed a conspiracy, and killed Joash in the house of the Millo, which goes down to Silla. '
  '21':
  - type: text
    content: 'For Jozachar the son of Shimeath and Jehozabad the son of Shomer, his servants, struck him. So he died, and they buried him with his fathers in the City of David. Then '
  - type: note
    content: 2 Chr. 24:27
  - type: text
    content: Amaziah his son reigned in his place.
  '3':
  - type: text
    content: 'But '
  - type: note
    content: 1 Kin. 15:14; 22:43; 2 Kin. 14:4; 15:35
  - type: text
    content: the high places were not taken away; the people still sacrificed and burned incense on the high places.
  '4':
  - type: text
    content: 'And Jehoash said to the priests, '
  - type: note
    content: 2 Kin. 22:4
  - type: text
    content: '“All the money of the dedicated gifts that are brought into the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '—each man’s '
  - type: note
    content: Ex. 30:13–16
  - type: text
    content: 'census money, each man’s '
  - type: note
    content: Lev. 27:2–28
  - type: text
    content: assessment money—
  - type: text
    content: and
  - type: text
    content: ' all the money that a man '
  - type: note
    content: Ex. 35:5; 1 Chr. 29:3–9
  - type: text
    content: 'purposes in his heart to bring into the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  '5':
  - type: text
    content: 'let the priests take '
  - type: text
    content: it
  - type: text
    content: ' themselves, each from his constituency; and let them repair the damages of the temple, wherever any dilapidation is found.”'
  '6':
  - type: text
    content: 'Now it was so, by the twenty-third year of King Jehoash, '
  - type: note
    content: 2 Chr. 24:5
  - type: text
    content: that
  - type: text
    content: ' the priests had not repaired the damages of the temple. '
  '7':
  - type: note
    content: 2 Chr. 24:6
  - type: text
    content: 'So King Jehoash called Jehoiada the priest and the '
  - type: text
    content: other
  - type: text
    content: ' priests, and said to them, “Why have you not repaired the damages of the temple? Now therefore, do not take '
  - type: text
    content: more
  - type: text
    content: ' money from your constituency, but deliver it for repairing the damages of the temple.” '
  '8':
  - type: text
    content: 'And the priests agreed that they would neither receive '
  - type: text
    content: more
  - type: text
    content: ' money from the people, nor repair the damages of the temple.'
  '9':
  - type: text
    content: 'Then Jehoiada the priest took '
  - type: note
    content: 2 Chr. 23:1; 24:8
  - type: text
    content: 'a chest, bored a hole in its lid, and set it beside the altar, on the right side as one comes into the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '; and the priests who kept the door put '
  - type: note
    content: Mark 12:41; Luke 21:1
  - type: text
    content: 'there all the money brought into the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
