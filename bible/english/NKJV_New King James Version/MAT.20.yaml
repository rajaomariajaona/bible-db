  '1':
  - type: heading
    content: The Parable of the Workers in the Vineyard
  - type: text
    content: “For the kingdom of heaven is like a landowner who went out early in the morning to hire laborers for his vineyard.
  - type: text
    content: ' '
  '10':
  - type: text
    content: But when the first came, they supposed that they would receive more; and they likewise received each a denarius.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And when they had received '
  - type: text
    content: it,
  - type: text
    content: ' they '
  - type: text
    content: complained against the landowner,
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'saying, ‘These last '
  - type: text
    content: men
  - type: text
    content: ' have worked '
  - type: text
