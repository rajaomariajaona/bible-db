  - type: text
    content: ' one hour, and you made them equal to us who have borne the burden and the heat of the day.’'
  - type: text
    content: ' '
  '13':
  - type: text
    content: But he answered one of them and said, ‘Friend, I am doing you no wrong. Did you not agree with me for a denarius?
  - type: text
    content: ' '
