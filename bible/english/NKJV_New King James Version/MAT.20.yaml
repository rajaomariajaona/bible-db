  - type: text
    content: And whoever desires to be first among you, let him be your slave—
  - type: text
    content: ' '
  '28':
  - type: note
    content: John 13:4
  - type: text
    content: 'just as the '
  - type: note
    content: (Matt. 26:28; John 13:13; 2 Cor. 8:9; Phil. 2:6, 7; 1 Tim. 2:5, 6; Titus 2:14; Heb. 9:28; Rev. 1:5)
  - type: text
    content: 'Son of Man did not come to be served, '
