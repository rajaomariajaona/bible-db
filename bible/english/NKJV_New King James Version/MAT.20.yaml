  - type: text
    content: for many.”
  - type: heading
    content: Two Blind Men Receive Their Sight
  '29':
  - type: note
    content: Mark 10:46–52; Luke 18:35–43
  - type: text
    content: 'Now as they went out of Jericho, a great multitude followed Him. '
  '3':
  - type: text
    content: And he went out about the third hour and saw others standing idle in the marketplace,
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And behold, '
  - type: note
    content: Matt. 9:27
  - type: text
    content: 'two blind men sitting by the road, when they heard that Jesus was passing by, cried out, saying, “Have mercy on us, O Lord, '
  - type: note
    content: (2 Sam. 7:14–17; Ps. 89:3–5, 19–37; Is. 11:10–12; Ezek. 37:21–25); Matt. 1:1; Luke 1:31, 32; (Acts 15:14–17)
  - type: text
    content: Son of David!”
  '31':
  - type: text
    content: 'Then the multitude '
  - type: note
    content: Matt. 19:13
  - type: text
    content: warned them that they should be quiet; but they cried out all the more, saying, “Have mercy on us, O Lord, Son of David!”
  '32':
  - type: text
    content: 'So Jesus stood still and called them, and said, '
  - type: text
    content: “What do you want Me to do for you?”
  '33':
  - type: text
    content: 'They said to Him, “Lord, that our eyes may be opened.” '
  '34':
  - type: text
    content: 'So Jesus had '
  - type: note
    content: Matt. 9:36; 14:14; 15:32; 18:27
  - type: text
    content: compassion and touched their eyes. And immediately their eyes received sight, and they followed Him.
  '4':
  - type: text
    content: and said to them, ‘You also go into the vineyard, and whatever is right I will give you.’ So they went.
  - type: text
    content: ' '
  '5':
  - type: text
    content: Again he went out about the sixth and the ninth hour, and did likewise.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And about the eleventh hour he went out and found others standing '
  - type: text
    content: idle,
  - type: text
    content: ' and said to them, ‘Why have you been standing here idle all day?’'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'They said to him, ‘Because no one hired us.’ He said to them, ‘You also go into the vineyard, '
  - type: text
    content: and whatever is right you will receive.’
  '8':
  - type: text
    content: '“So when evening had come, the owner of the vineyard said to his steward, ‘Call the laborers and give them '
  - type: text
