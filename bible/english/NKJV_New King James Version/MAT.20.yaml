  - type: heading
    content: Greatness Is Serving
  '2':
  - type: text
    content: Now when he had agreed with the laborers for a denarius a day, he sent them into his vineyard.
  - type: text
    content: ' '
  '20':
  - type: note
    content: Mark 10:35–45
  - type: text
    content: 'Then the mother of '
  - type: note
    content: Matt. 4:21; 10:2
  - type: text
    content: Zebedee’s sons came to Him with her sons, kneeling down and asking something from Him.
  '21':
  - type: text
    content: 'And He said to her, '
  - type: text
    content: “What do you wish?”
  - type: text
    content: 'She said to Him, “Grant that these two sons of mine '
  - type: note
    content: (Matt. 19:28)
  - type: text
    content: may sit, one on Your right hand and the other on the left, in Your kingdom.”
  '22':
  - type: text
    content: 'But Jesus answered and said, '
  - type: text
    content: '“You do not know what you ask. Are you able to drink '
  - type: note
    content: Is. 51:17, 22; Jer. 49:12; Matt. 26:39, 42; Mark 14:36; Luke 22:42; John 18:11
  - type: text
    content: 'the cup that I am about to drink, '
  - type: text
    content: 'and be baptized with '
  - type: note
    content: Luke 12:50
  - type: text
    content: the baptism that I am baptized with?”
  - type: text
    content: They said to Him, “We are able.”
  '23':
  - type: text
    content: 'So He said to them, '
  - type: note
    content: (Acts 12:2; Rom. 8:17; 2 Cor. 1:7; Rev. 1:9)
  - type: text
    content: '“You will indeed drink My cup, '
  - type: text
    content: and be baptized with the baptism that I am baptized with;
  - type: text
    content: ' but to sit on My right hand and on My left is not Mine to give, but '
  - type: text
    content: it is for those
  - type: text
    content: ' for whom it is prepared by My Father.”'
  '24':
  - type: note
    content: Mark 10:41; Luke 22:24, 25
  - type: text
    content: 'And when the ten heard '
  - type: text
    content: it,
  - type: text
    content: ' they were greatly displeased with the two brothers. '
  '25':
  - type: text
    content: 'But Jesus called them to '
  - type: text
    content: Himself
  - type: text
    content: ' and said, '
  - type: text
    content: “You know that the rulers of the Gentiles lord it over them, and those who are great exercise authority over them.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Yet '
  - type: note
