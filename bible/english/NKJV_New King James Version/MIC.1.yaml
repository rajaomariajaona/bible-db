  - type: text
    content: Are
  - type: text
    content: ' '
  - type: text
    content: they
  - type: text
    content: ' not Jerusalem?'
  '6':
  - type: text
    content: '“Therefore I will make Samaria '
  - type: note
    content: 2 Kin. 19:25; Mic. 3:12
  - type: text
    content: a heap of ruins in the field,
  - type: text
    content: Places for planting a vineyard;
  - type: text
    content: I will pour down her stones into the valley,
  - type: text
    content: 'And I will '
  - type: note
    content: Ezek. 13:14
  - type: text
    content: uncover her foundations.
  '7':
  - type: text
    content: All her carved images shall be beaten to pieces,
  - type: text
    content: 'And all her '
  - type: note
    content: Hos. 2:5
  - type: text
    content: pay as a harlot shall be burned with the fire;
  - type: text
    content: All her idols I will lay desolate,
  - type: text
    content: 'For she gathered '
  - type: text
    content: it
  - type: text
    content: ' from the pay of a harlot,'
  - type: text
    content: 'And they shall return to the '
  - type: note
    content: Deut. 23:18; Is. 23:17
  - type: text
    content: pay of a harlot.”
  - type: heading
    content: Mourning for Israel and Judah
  '8':
  - type: text
    content: Therefore I will wail and howl,
  - type: text
    content: I will go stripped and naked;
  - type: note
    content: Ps. 102:6
  - type: text
    content: I will make a wailing like the jackals
  - type: text
    content: And a mourning like the ostriches,
  '9':
  - type: text
    content: 'For her wounds '
  - type: text
    content: are
  - type: text
    content: ' incurable.'
  - type: text
    content: 'For '
  - type: note
    content: 2 Kin. 18:13; Is. 8:7, 8
  - type: text
    content: it has come to Judah;
  - type: text
