  '2':
  - type: text
    content: Hear, all you peoples!
  - type: text
    content: Listen, O earth, and all that is in it!
  - type: text
    content: 'Let the Lord '
  - type: heading
    content: God
  - type: text
    content: ' be a witness against you,'
  - type: text
    content: 'The Lord from '
  - type: note
    content: (Ps. 11:4)
  - type: text
    content: His holy temple.
  '3':
  - type: text
    content: 'For behold, the '
  - type: heading
    content: Lord
  - type: text
    content: ' is coming out of His place;'
  - type: text
    content: He will come down
  - type: text
    content: And tread on the high places of the earth.
  '4':
  - type: note
    content: Amos 9:5
  - type: text
    content: The mountains will melt under Him,
  - type: text
    content: And the valleys will split
  - type: text
    content: Like wax before the fire,
  - type: text
    content: Like waters poured down a steep place.
  '5':
  - type: text
    content: All this is for the transgression of Jacob
  - type: text
    content: And for the sins of the house of Israel.
  - type: text
    content: 'What '
  - type: text
    content: is
  - type: text
    content: ' the transgression of Jacob?'
