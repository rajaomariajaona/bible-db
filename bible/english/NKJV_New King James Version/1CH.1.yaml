  - type: heading
    content: The Kings of Edom
  '43':
  - type: text
    content: 'Now these '
  - type: text
    content: were
  - type: text
    content: ' the '
  - type: note
    content: Gen. 36:31–43
  - type: text
    content: 'kings who reigned in the land of Edom before a king reigned over the children of Israel: Bela the son of Beor, and the name of his city was Dinhabah. '
  '44':
  - type: text
    content: 'And when Bela died, Jobab the son of Zerah of Bozrah reigned in his place. '
  '45':
  - type: text
    content: 'When Jobab died, Husham of the land of the Temanites reigned in his place. '
  '46':
  - type: text
    content: 'And when Husham died, Hadad the son of Bedad, who attacked Midian in the field of Moab, reigned in his place. The name of his city '
  - type: text
    content: was
  - type: text
    content: ' Avith. '
  '47':
  - type: text
    content: 'When Hadad died, Samlah of Masrekah reigned in his place. '
  '48':
  - type: note
    content: Gen. 36:37
  - type: text
    content: 'And when Samlah died, Saul of Rehoboth-by-the-River reigned in his place. '
  '49':
  - type: text
    content: 'When Saul died, Baal-Hanan the son of Achbor reigned in his place. '
  '5':
  - type: note
    content: Gen. 10:2–4
  - type: text
    content: 'The sons of Japheth '
  - type: text
    content: were
  - type: text
    content: ' Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras. '
  '50':
  - type: text
    content: 'And when Baal-Hanan died, Hadad reigned in his place; and the name of his city was Pai. His wife’s name was Mehetabel the daughter of Matred, the daughter of Mezahab. '
  '51':
  - type: text
    content: 'Hadad died also. And the chiefs of Edom were Chief Timnah, Chief Aliah, Chief Jetheth, '
  '52':
  - type: text
    content: 'Chief Aholibamah, Chief Elah, Chief Pinon, '
  '53':
  - type: text
    content: 'Chief Kenaz, Chief Teman, Chief Mibzar, '
  '54':
  - type: text
    content: 'Chief Magdiel, and Chief Iram. These '
  - type: text
    content: were
  - type: text
    content: ' the chiefs of Edom.'
  '6':
