document_id: 1TH.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greeting
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Pet. 5:12
      marker-yv: yv-n
    - type: text
      text: Silvanus, and Timothy,
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the church of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 17:1–9
      marker-yv: yv-n
    - type: text
      text: 'Thessalonians in God the Father and the Lord Jesus Christ:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Their Good Example
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 2:7)
      marker-yv: yv-n
    - type: text
      text: 'to wait for His Son from heaven, whom He raised from the dead, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' Jesus who delivers us '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 3:7; Rom. 5:9
      marker-yv: yv-n
    - type: text
      text: from the wrath to come.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:8; 2 Thess. 1:3
      marker-yv: yv-n
    - type: text
      text: 'We give thanks to God always for you all, making mention of you in our prayers, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'remembering without ceasing '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 6:29
      marker-yv: yv-n
    - type: text
      text: 'your work of faith, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 16:6
      marker-yv: yv-n
    - type: text
      text: 'labor of love, and patience of hope in our Lord Jesus Christ in the sight of our God and Father, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'knowing, beloved brethren, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 3:12
      marker-yv: yv-n
    - type: text
      text: 'your election by God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:20
      marker-yv: yv-n
    - type: text
      text: 'our gospel did not come to you in word only, but also in power, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 6:6
      marker-yv: yv-n
    - type: text
      text: 'and in the Holy Spirit '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 2:3
      marker-yv: yv-n
    - type: text
      text: and in much assurance, as you know what kind of men we were among you for your sake.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 4:16; 11:1
      marker-yv: yv-n
    - type: text
      text: 'you became followers of us and of the Lord, having received the word in much affliction, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 5:41; 13:52; 2 Cor. 6:10; Gal. 5:22
      marker-yv: yv-n
    - type: text
      text: 'with joy of the Holy Spirit, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that you became examples to all in Macedonia and Achaia who believe. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For from you the word of the Lord '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 10:18
      marker-yv: yv-n
    - type: text
      text: 'has sounded forth, not only in Macedonia and Achaia, but also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:8; 16:19; 2 Cor. 2:14; 2 Thess. 1:4
      marker-yv: yv-n
    - type: text
      text: 'in every place. Your faith toward God has gone out, so that we do not need to say anything. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For they themselves declare concerning us '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 2:1
      marker-yv: yv-n
    - type: text
      text: 'what manner of entry we had to you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 12:2
      marker-yv: yv-n
    - type: text
      text: 'and how you turned to God from idols to serve the living and true God, '
