document_id: 1TH.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, '
  - type: note
    content: 1 Pet. 5:12
  - type: text
    content: Silvanus, and Timothy,
  - type: text
    content: 'To the church of the '
  - type: note
    content: Acts 17:1–9
  - type: text
    content: 'Thessalonians in God the Father and the Lord Jesus Christ:'
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Their Good Example
  '10':
  - type: text
    content: 'and '
  - type: note
    content: (Rom. 2:7)
  - type: text
    content: 'to wait for His Son from heaven, whom He raised from the dead, '
  - type: text
    content: even
  - type: text
    content: ' Jesus who delivers us '
  - type: note
    content: Matt. 3:7; Rom. 5:9
  - type: text
    content: from the wrath to come.
  '2':
  - type: note
    content: Rom. 1:8; 2 Thess. 1:3
  - type: text
    content: 'We give thanks to God always for you all, making mention of you in our prayers, '
  '3':
  - type: text
    content: 'remembering without ceasing '
  - type: note
    content: John 6:29
  - type: text
    content: 'your work of faith, '
  - type: note
    content: Rom. 16:6
  - type: text
    content: 'labor of love, and patience of hope in our Lord Jesus Christ in the sight of our God and Father, '
  '4':
  - type: text
    content: 'knowing, beloved brethren, '
  - type: note
    content: Col. 3:12
  - type: text
    content: 'your election by God. '
  '5':
  - type: text
    content: 'For '
  - type: note
    content: Mark 16:20
  - type: text
    content: 'our gospel did not come to you in word only, but also in power, '
  - type: note
    content: 2 Cor. 6:6
  - type: text
    content: 'and in the Holy Spirit '
  - type: note
    content: Heb. 2:3
  - type: text
    content: and in much assurance, as you know what kind of men we were among you for your sake.
  '6':
  - type: text
    content: 'And '
  - type: note
    content: 1 Cor. 4:16; 11:1
  - type: text
    content: 'you became followers of us and of the Lord, having received the word in much affliction, '
  - type: note
    content: Acts 5:41; 13:52; 2 Cor. 6:10; Gal. 5:22
  - type: text
    content: 'with joy of the Holy Spirit, '
  '7':
  - type: text
    content: 'so that you became examples to all in Macedonia and Achaia who believe. '
  '8':
  - type: text
    content: 'For from you the word of the Lord '
  - type: note
    content: Rom. 10:18
  - type: text
    content: 'has sounded forth, not only in Macedonia and Achaia, but also '
  - type: note
    content: Rom. 1:8; 16:19; 2 Cor. 2:14; 2 Thess. 1:4
  - type: text
    content: 'in every place. Your faith toward God has gone out, so that we do not need to say anything. '
  '9':
  - type: text
    content: 'For they themselves declare concerning us '
  - type: note
    content: 1 Thess. 2:1
  - type: text
    content: 'what manner of entry we had to you, '
  - type: note
    content: 1 Cor. 12:2
  - type: text
    content: 'and how you turned to God from idols to serve the living and true God, '
