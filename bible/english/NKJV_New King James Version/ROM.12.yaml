verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living Sacrifices to God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 1:10; 2 Cor. 10:1–4
      marker-yv: yv-n
    - type: text
      text: 'beseech you therefore, brethren, by the mercies of God, that you present your bodies '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 4:18; Heb. 10:18, 20
      marker-yv: yv-n
    - type: text
      text: 'a living sacrifice, holy, acceptable to God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' your reasonable service. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 13:34; 1 Thess. 4:9; Heb. 13:1; 2 Pet. 1:7
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Be
    - type: text
      text: ' kindly affectionate to one another with brotherly love, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 13:7; Phil. 2:3; (1 Pet. 2:17)
      marker-yv: yv-n
    - type: text
      text: 'in honor giving preference to one another; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'not lagging in diligence, fervent in spirit, serving the Lord; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 10:20
      marker-yv: yv-n
    - type: text
      text: 'rejoicing in hope, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 21:19
      marker-yv: yv-n
    - type: text
      text: 'patient in tribulation, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 18:1
      marker-yv: yv-n
    - type: text
      text: 'continuing steadfastly in prayer; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:1; Heb. 13:16; 1 Pet. 4:9
      marker-yv: yv-n
    - type: text
      text: 'distributing to the needs of the saints, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 25:35; 1 Tim. 3:2
      marker-yv: yv-n
    - type: text
      text: given to hospitality.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 5:44); Luke 6:28; 1 Cor. 4:12
      marker-yv: yv-n
    - type: text
      text: 'Bless those who persecute you; bless and do not curse. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 12:26)
      marker-yv: yv-n
    - type: text
      text: 'Rejoice with those who rejoice, and weep with those who weep. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 15:5; 2 Cor. 13:11; (Phil. 2:2; 4:2); 1 Pet. 3:8
      marker-yv: yv-n
    - type: text
      text: 'Be of the same mind toward one another. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 45:5
      marker-yv: yv-n
    - type: text
      text: Do not set your mind on high things, but associate with the humble. Do not be wise in your own opinion.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 5:39); 1 Pet. 3:9
      marker-yv: yv-n
    - type: text
      text: 'Repay no one evil for evil. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 8:21
      marker-yv: yv-n
    - type: text
      text: 'Have regard for good things in the sight of all men. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If it is possible, as much as depends on you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 12:14
      marker-yv: yv-n
    - type: text
      text: 'live peaceably with all men. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:18
      marker-yv: yv-n
    - type: text
      text: 'do not avenge yourselves, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rather
    - type: text
      text: ' give place to wrath; for it is written, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:35; Ps. 94:1; 1 Thess. 4:6; Heb. 10:30
      marker-yv: yv-n
    - type: text
      text: '“Vengeance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Mine, I will repay,” says the Lord. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 13:22; Gal. 1:4; 1 John 2:15
      marker-yv: yv-n
    - type: text
      text: 'do not be conformed to this world, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 4:23; (Titus 3:5)
      marker-yv: yv-n
    - type: text
      text: 'be transformed by the renewing of your mind, that you may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Thess. 4:3)
      marker-yv: yv-n
    - type: text
      text: 'prove what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' that good and acceptable and perfect will of God.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Serve God with Spiritual Gifts
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 6:22; Prov. 25:21, 22; (Matt. 5:44); Luke 6:27
      marker-yv: yv-n
    - type: text
      text: “If your enemy is hungry, feed him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If he is thirsty, give him a drink;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For in so doing you will heap coals of fire on his head.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not be overcome by evil, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 12:1, 2)
      marker-yv: yv-n
    - type: text
      text: overcome evil with good.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I say, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:5; 15:15; 1 Cor. 3:10; 15:10; Gal. 2:9; Eph. 3:7
      marker-yv: yv-n
    - type: text
      text: 'through the grace given to me, to everyone who is among you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 25:27
      marker-yv: yv-n
    - type: text
      text: 'not to think '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: himself
    - type: text
      text: ' more highly than he ought to think, but to think soberly, as God has dealt '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eph. 4:7)
      marker-yv: yv-n
    - type: text
      text: 'to each one a measure of faith. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 12:12–14; (Eph. 4:4, 16)
      marker-yv: yv-n
    - type: text
      text: 'as we have many members in one body, but all the members do not have the same function, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 10:17); Gal. 3:28
      marker-yv: yv-n
    - type: text
      text: 'we, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: being
    - type: text
      text: ' many, are one body in Christ, and individually members of one another. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Having then gifts differing according to the grace that is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 3:27)
      marker-yv: yv-n
    - type: text
      text: 'given to us, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: let
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: use
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'them:'
    - type: text
      text: ' if prophecy, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: let
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 11:27
      marker-yv: yv-n
    - type: text
      text: 'prophesy in proportion to our faith; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or ministry, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: let
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: use
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' ministering; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 4:11
      marker-yv: yv-n
    - type: text
      text: 'he who teaches, in teaching; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 15:32
      marker-yv: yv-n
    - type: text
      text: 'he who exhorts, in exhortation; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 6:1–3)
      marker-yv: yv-n
    - type: text
      text: 'he who gives, with liberality; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 20:28)
      marker-yv: yv-n
    - type: text
      text: 'he who leads, with diligence; he who shows mercy, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 9:7
      marker-yv: yv-n
    - type: text
      text: with cheerfulness.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Behave Like a Christian
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 6:6; 1 Tim. 1:5
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Let
    - type: text
      text: ' love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' without hypocrisy. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 34:14
      marker-yv: yv-n
    - type: text
      text: 'Abhor what is evil. Cling to what is good. '
