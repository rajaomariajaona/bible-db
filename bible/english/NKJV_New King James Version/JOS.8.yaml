document_id: JOS.8,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Ai
  - type: text
    content: 'Now the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Joshua: '
  - type: note
    content: Deut. 1:21; 7:18; 31:8; Josh. 1:9; 10:8
  - type: text
    content: '“Do not be afraid, nor be dismayed; take all the people of war with you, and arise, go up to Ai. See, '
  - type: note
    content: Josh. 6:2
  - type: text
    content: 'I have given into your hand the king of Ai, his people, his city, and his land. '
  '10':
  - type: text
    content: 'Then Joshua rose up early in the morning and mustered the people, and went up, he and the elders of Israel, before the people to Ai. '
  '11':
  - type: note
    content: Josh. 8:5
  - type: text
    content: 'And all the people of war who '
  - type: text
    content: were
  - type: text
    content: ' with him went up and drew near; and they came before the city and camped on the north side of Ai. Now a valley '
  - type: text
    content: lay
  - type: text
    content: ' between them and Ai. '
  '12':
  - type: text
    content: 'So he took about five thousand men and set them in ambush between Bethel and Ai, on the west side of the city. '
  '13':
  - type: text
    content: 'And when they had set the people, all the army that '
  - type: text
    content: was
  - type: text
    content: ' on the north of the city, and its rear guard on the west of the city, Joshua went that night into the midst of the valley.'
  '14':
  - type: text
    content: 'Now it happened, when the king of Ai saw '
  - type: text
    content: it,
  - type: text
    content: ' that the men of the city hurried and rose early and went out against Israel to battle, he and all his people, at an appointed place before the plain. But he '
  - type: note
    content: Judg. 20:34; Eccl. 9:12
  - type: text
    content: 'did not know that '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' an ambush against him behind the city. '
  '15':
  - type: text
    content: 'And Joshua and all Israel '
  - type: note
    content: Judg. 20:36
  - type: text
    content: 'made as if they were beaten before them, and fled by the way of the wilderness. '
  '16':
  - type: text
    content: 'So all the people who '
  - type: text
    content: were
  - type: text
    content: ' in Ai were called together to pursue them. And they pursued Joshua and were drawn away from the city. '
  '17':
  - type: text
    content: There was not a man left in Ai or Bethel who did not go out after Israel. So they left the city open and pursued Israel.
  '18':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Joshua, “Stretch out the spear that '
  - type: text
    content: is
  - type: text
    content: ' in your hand toward Ai, for I will give it into your hand.” And Joshua stretched out the spear that '
  - type: text
    content: was
  - type: text
    content: ' in his hand toward the city. '
  '19':
  - type: text
    content: 'So '
  - type: text
    content: those
  - type: text
    content: ' '
  - type: text
    content: in
  - type: text
    content: ' ambush arose quickly out of their place; they ran as soon as he had stretched out his hand, and they entered the city and took it, and hurried to set the city on fire. '
  '2':
  - type: text
    content: 'And you shall do to Ai and its king as you did to '
  - type: note
    content: Josh. 6:21
  - type: text
    content: 'Jericho and its king. Only '
  - type: note
    content: Deut. 20:14; Josh. 8:27
  - type: text
    content: its spoil and its cattle you shall take as booty for yourselves. Lay an ambush for the city behind it.”
  '20':
  - type: text
    content: And when the men of Ai looked behind them, they saw, and behold, the smoke of the city ascended to heaven. So they had no power to flee this way or that way, and the people who had fled to the wilderness turned back on the pursuers.
  '21':
  - type: text
    content: 'Now when Joshua and all Israel saw that the ambush had taken the city and that the smoke of the city ascended, they turned back and struck down the men of Ai. '
  '22':
  - type: text
    content: 'Then the others came out of the city against them; so they were '
  - type: text
    content: caught
  - type: text
    content: ' in the midst of Israel, some on this side and some on that side. And they struck them down, so that they '
  - type: note
    content: Deut. 7:2
  - type: text
    content: 'let none of them remain or escape. '
  '23':
  - type: text
    content: But the king of Ai they took alive, and brought him to Joshua.
  '24':
  - type: text
    content: 'And it came to pass when Israel had made an end of slaying all the inhabitants of Ai in the field, in the wilderness where they pursued them, and when they all had fallen by the edge of the sword until they were consumed, that all the Israelites returned to Ai and struck it with the edge of the sword. '
  '25':
  - type: text
    content: 'So it was '
  - type: text
    content: that
  - type: text
    content: ' all who fell that day, both men and women, '
  - type: text
    content: were
  - type: text
    content: ' twelve thousand—all the people of Ai. '
  '26':
  - type: text
    content: 'For Joshua did not draw back his hand, with which he stretched out the spear, until he had '
  - type: note
    content: Josh. 6:21
  - type: text
    content: 'utterly destroyed all the inhabitants of Ai. '
  '27':
  - type: note
    content: Num. 31:22, 26
  - type: text
    content: 'Only the livestock and the spoil of that city Israel took as booty for themselves, according to the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He had '
  - type: note
    content: Josh. 8:2
  - type: text
    content: 'commanded Joshua. '
  '28':
  - type: text
    content: 'So Joshua burned Ai and made it '
  - type: note
    content: Deut. 13:16
  - type: text
    content: 'a heap forever, a desolation to this day. '
  '29':
  - type: note
    content: Josh. 10:26
  - type: text
    content: 'And the king of Ai he hanged on a tree until evening. '
  - type: note
    content: Deut. 21:22, 23; Josh. 10:27
  - type: text
    content: 'And as soon as the sun was down, Joshua commanded that they should take his corpse down from the tree, cast it at the entrance of the gate of the city, and '
  - type: note
    content: Josh. 7:26; 10:27
  - type: text
    content: 'raise over it a great heap of stones '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: remains
  - type: text
    content: ' to this day.'
  - type: heading
    content: Joshua Renews the Covenant
  '3':
  - type: text
    content: 'So Joshua arose, and all the people of war, to go up against Ai; and Joshua chose thirty thousand mighty men of valor and sent them away by night. '
  '30':
  - type: text
    content: 'Now Joshua built an altar to the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel '
  - type: note
    content: Deut. 27:4–8
  - type: text
    content: 'in Mount Ebal, '
  '31':
  - type: text
    content: 'as Moses the servant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded the children of Israel, as it is written in the Book of the Law of Moses: '
  - type: note
    content: Ex. 20:25; Deut. 27:5, 6
  - type: text
    content: '“an altar of whole stones over which no man has wielded an iron '
  - type: text
    content: tool.
  - type: text
    content: '” And '
  - type: note
    content: Ex. 20:24
  - type: text
    content: 'they offered on it burnt offerings to the '
  - type: heading
    content: Lord
  - type: text
    content: ', and sacrificed peace offerings. '
  '32':
  - type: text
    content: 'And there, in the presence of the children of Israel, '
  - type: note
    content: Deut. 27:2, 3, 8
  - type: text
    content: 'he wrote on the stones a copy of the law of Moses, which he had written. '
  '33':
  - type: text
    content: 'Then all Israel, with their elders and officers and judges, stood on either side of the ark before the priests, the Levites, '
  - type: note
    content: Deut. 31:9, 25
  - type: text
    content: 'who bore the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Deut. 31:12
  - type: text
    content: 'the stranger as well as he who was born among them. Half of them '
  - type: text
    content: were
  - type: text
    content: ' in front of Mount Gerizim and half of them in front of Mount Ebal, '
  - type: note
    content: Deut. 11:29; 27:12
  - type: text
    content: 'as Moses the servant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded before, that they should bless the people of Israel. '
  '34':
  - type: text
    content: 'And afterward '
  - type: note
    content: Deut. 31:11; Neh. 8:3
  - type: text
    content: 'he read all the words of the law, '
  - type: note
    content: Deut. 28:2, 15, 45; 29:20, 21; 30:19
  - type: text
    content: 'the blessings and the cursings, according to all that is written in the '
  - type: note
    content: Josh. 1:8
  - type: text
    content: 'Book of the Law. '
  '35':
  - type: text
    content: 'There was not a word of all that Moses had commanded which Joshua did not read before all the assembly of Israel, '
  - type: note
    content: Ex. 12:38; Deut. 31:12
  - type: text
    content: 'with the women, the little ones, '
  - type: note
    content: Josh. 8:33
  - type: text
    content: and the strangers who were living among them.
  '4':
  - type: text
    content: 'And he commanded them, saying: “Behold, '
  - type: note
    content: Judg. 20:29
  - type: text
    content: 'you shall lie in ambush against the city, behind the city. Do not go very far from the city, but all of you be ready. '
  '5':
  - type: text
    content: 'Then I and all the people who '
  - type: text
    content: are
  - type: text
    content: ' with me will approach the city; and it will come about, when they come out against us as at the first, that '
  - type: note
    content: Josh. 7:5; Judg. 20:32
  - type: text
    content: 'we shall flee before them. '
  '6':
  - type: text
    content: For they will come out after us till we have drawn them from the city, for they will say, ‘
  - type: text
    content: They
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' fleeing before us as at the first.’ Therefore we will flee before them. '
  '7':
  - type: text
    content: 'Then you shall rise from the ambush and seize the city, for the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God will deliver it into your hand. '
  '8':
  - type: text
    content: 'And it will be, when you have taken the city, '
  - type: text
    content: that
  - type: text
    content: ' you shall set the city on fire. According to the commandment of the '
  - type: heading
    content: Lord
  - type: text
    content: ' you shall do. '
  - type: note
    content: 2 Sam. 13:28
  - type: text
    content: See, I have commanded you.”
  '9':
  - type: text
    content: 'Joshua therefore sent them out; and they went to lie in ambush, and stayed between Bethel and Ai, on the west side of Ai; but Joshua lodged that night among the people. '
