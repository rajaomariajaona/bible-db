document_id: JOS.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fall of Ai
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Joshua: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 1:21; 7:18; 31:8; Josh. 1:9; 10:8
    marker-yv: yv-n
  - type: text
    text: '“Do not be afraid, nor be dismayed; take all the people of war with you, and arise, go up to Ai. See, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 6:2
    marker-yv: yv-n
  - type: text
    text: 'I have given into your hand the king of Ai, his people, his city, and his land. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And you shall do to Ai and its king as you did to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 6:21
    marker-yv: yv-n
  - type: text
    text: 'Jericho and its king. Only '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 20:14; Josh. 8:27
    marker-yv: yv-n
  - type: text
    text: its spoil and its cattle you shall take as booty for yourselves. Lay an ambush for the city behind it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Joshua arose, and all the people of war, to go up against Ai; and Joshua chose thirty thousand mighty men of valor and sent them away by night. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he commanded them, saying: “Behold, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 20:29
    marker-yv: yv-n
  - type: text
    text: 'you shall lie in ambush against the city, behind the city. Do not go very far from the city, but all of you be ready. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then I and all the people who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' with me will approach the city; and it will come about, when they come out against us as at the first, that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 7:5; Judg. 20:32
    marker-yv: yv-n
  - type: text
    text: 'we shall flee before them. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For they will come out after us till we have drawn them from the city, for they will say, ‘
  - type: usfm
    marker: it
    children:
    - type: text
      text: They
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' fleeing before us as at the first.’ Therefore we will flee before them. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then you shall rise from the ambush and seize the city, for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will deliver it into your hand. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And it will be, when you have taken the city, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' you shall set the city on fire. According to the commandment of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' you shall do. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 13:28
    marker-yv: yv-n
  - type: text
    text: See, I have commanded you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joshua therefore sent them out; and they went to lie in ambush, and stayed between Bethel and Ai, on the west side of Ai; but Joshua lodged that night among the people. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Joshua rose up early in the morning and mustered the people, and went up, he and the elders of Israel, before the people to Ai. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 8:5
    marker-yv: yv-n
  - type: text
    text: 'And all the people of war who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' with him went up and drew near; and they came before the city and camped on the north side of Ai. Now a valley '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lay
  - type: text
    text: ' between them and Ai. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So he took about five thousand men and set them in ambush between Bethel and Ai, on the west side of the city. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And when they had set the people, all the army that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' on the north of the city, and its rear guard on the west of the city, Joshua went that night into the midst of the valley.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now it happened, when the king of Ai saw '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it,
  - type: text
    text: ' that the men of the city hurried and rose early and went out against Israel to battle, he and all his people, at an appointed place before the plain. But he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 20:34; Eccl. 9:12
    marker-yv: yv-n
  - type: text
    text: 'did not know that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' an ambush against him behind the city. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Joshua and all Israel '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 20:36
    marker-yv: yv-n
  - type: text
    text: 'made as if they were beaten before them, and fled by the way of the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So all the people who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in Ai were called together to pursue them. And they pursued Joshua and were drawn away from the city. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: There was not a man left in Ai or Bethel who did not go out after Israel. So they left the city open and pursued Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Joshua, “Stretch out the spear that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' in your hand toward Ai, for I will give it into your hand.” And Joshua stretched out the spear that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in his hand toward the city. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So '
  - type: usfm
    marker: it
    children:
    - type: text
      text: those
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' ambush arose quickly out of their place; they ran as soon as he had stretched out his hand, and they entered the city and took it, and hurried to set the city on fire. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And when the men of Ai looked behind them, they saw, and behold, the smoke of the city ascended to heaven. So they had no power to flee this way or that way, and the people who had fled to the wilderness turned back on the pursuers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now when Joshua and all Israel saw that the ambush had taken the city and that the smoke of the city ascended, they turned back and struck down the men of Ai. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then the others came out of the city against them; so they were '
  - type: usfm
    marker: it
    children:
    - type: text
      text: caught
  - type: text
    text: ' in the midst of Israel, some on this side and some on that side. And they struck them down, so that they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 7:2
    marker-yv: yv-n
  - type: text
    text: 'let none of them remain or escape. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But the king of Ai they took alive, and brought him to Joshua.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And it came to pass when Israel had made an end of slaying all the inhabitants of Ai in the field, in the wilderness where they pursued them, and when they all had fallen by the edge of the sword until they were consumed, that all the Israelites returned to Ai and struck it with the edge of the sword. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So it was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' all who fell that day, both men and women, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' twelve thousand—all the people of Ai. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For Joshua did not draw back his hand, with which he stretched out the spear, until he had '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 6:21
    marker-yv: yv-n
  - type: text
    text: 'utterly destroyed all the inhabitants of Ai. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 31:22, 26
    marker-yv: yv-n
  - type: text
    text: 'Only the livestock and the spoil of that city Israel took as booty for themselves, according to the word of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' which He had '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 8:2
    marker-yv: yv-n
  - type: text
    text: 'commanded Joshua. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So Joshua burned Ai and made it '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 13:16
    marker-yv: yv-n
  - type: text
    text: 'a heap forever, a desolation to this day. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 10:26
    marker-yv: yv-n
  - type: text
    text: 'And the king of Ai he hanged on a tree until evening. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 21:22, 23; Josh. 10:27
    marker-yv: yv-n
  - type: text
    text: 'And as soon as the sun was down, Joshua commanded that they should take his corpse down from the tree, cast it at the entrance of the gate of the city, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 7:26; 10:27
    marker-yv: yv-n
  - type: text
    text: 'raise over it a great heap of stones '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: remains
  - type: text
    text: ' to this day.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joshua Renews the Covenant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Now Joshua built an altar to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Israel '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 27:4–8
    marker-yv: yv-n
  - type: text
    text: 'in Mount Ebal, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'as Moses the servant of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded the children of Israel, as it is written in the Book of the Law of Moses: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 20:25; Deut. 27:5, 6
    marker-yv: yv-n
  - type: text
    text: '“an altar of whole stones over which no man has wielded an iron '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tool.
  - type: text
    text: '” And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 20:24
    marker-yv: yv-n
  - type: text
    text: 'they offered on it burnt offerings to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and sacrificed peace offerings. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And there, in the presence of the children of Israel, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 27:2, 3, 8
    marker-yv: yv-n
  - type: text
    text: 'he wrote on the stones a copy of the law of Moses, which he had written. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then all Israel, with their elders and officers and judges, stood on either side of the ark before the priests, the Levites, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 31:9, 25
    marker-yv: yv-n
  - type: text
    text: 'who bore the ark of the covenant of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 31:12
    marker-yv: yv-n
  - type: text
    text: 'the stranger as well as he who was born among them. Half of them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in front of Mount Gerizim and half of them in front of Mount Ebal, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 11:29; 27:12
    marker-yv: yv-n
  - type: text
    text: 'as Moses the servant of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded before, that they should bless the people of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And afterward '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 31:11; Neh. 8:3
    marker-yv: yv-n
  - type: text
    text: 'he read all the words of the law, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 28:2, 15, 45; 29:20, 21; 30:19
    marker-yv: yv-n
  - type: text
    text: 'the blessings and the cursings, according to all that is written in the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 1:8
    marker-yv: yv-n
  - type: text
    text: 'Book of the Law. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'There was not a word of all that Moses had commanded which Joshua did not read before all the assembly of Israel, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 12:38; Deut. 31:12
    marker-yv: yv-n
  - type: text
    text: 'with the women, the little ones, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 8:33
    marker-yv: yv-n
  - type: text
    text: and the strangers who were living among them.
