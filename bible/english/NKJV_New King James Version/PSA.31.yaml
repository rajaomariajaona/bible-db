  '1':
  - type: heading
    content: The Lord a Fortress in Adversity
  - type: text
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: 'In '
  - type: note
    content: Ps. 22:5
  - type: text
    content: 'You, O '
  - type: heading
    content: Lord
  - type: text
    content: ', I put my trust;'
  - type: text
    content: Let me never be ashamed;
  - type: text
    content: Deliver me in Your righteousness.
  '10':
  - type: text
    content: For my life is spent with grief,
  - type: text
    content: And my years with sighing;
  - type: text
    content: My strength fails because of my iniquity,
  - type: text
    content: And my bones waste away.
  '11':
  - type: note
    content: (Is. 53:4)
  - type: text
    content: I am a reproach among all my enemies,
  - type: text
    content: 'But '
  - type: note
    content: Job 19:13; Ps. 38:11; 88:8, 18
  - type: text
    content: especially among my neighbors,
  - type: text
    content: 'And '
  - type: text
    content: am
  - type: text
    content: ' repulsive to my acquaintances;'
  - type: note
    content: Ps. 64:8
  - type: text
    content: Those who see me outside flee from me.
  '12':
  - type: note
    content: Ps. 88:4, 5
  - type: text
    content: I am forgotten like a dead man, out of mind;
  - type: text
    content: I am like a broken vessel.
  '13':
  - type: note
    content: Ps. 50:20; Jer. 20:10
  - type: text
    content: For I hear the slander of many;
  - type: note
    content: Lam. 2:22
  - type: text
    content: 'Fear '
  - type: text
    content: is
  - type: text
    content: ' on every side;'
  - type: text
    content: 'While they '
  - type: note
    content: Ps. 62:4; Matt. 27:1
  - type: text
    content: take counsel together against me,
  - type: text
    content: They scheme to take away my life.
  '14':
  - type: text
    content: 'But as for me, I trust in You, O '
  - type: heading
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'I say, “You '
  - type: text
    content: are
  - type: text
    content: ' my God.”'
  '15':
  - type: text
    content: 'My times '
  - type: text
    content: are
  - type: text
    content: ' in Your '
  - type: note
    content: (Job 14:5; 24:1)
  - type: text
    content: hand;
  - type: text
    content: Deliver me from the hand of my enemies,
  - type: text
    content: And from those who persecute me.
  '16':
  - type: note
    content: Ps. 4:6; 80:3
  - type: text
    content: Make Your face shine upon Your servant;
  - type: text
    content: Save me for Your mercies’ sake.
  '17':
  - type: note
    content: Ps. 25:2, 20
  - type: text
    content: 'Do not let me be ashamed, O '
  - type: heading
    content: Lord
  - type: text
    content: ', for I have called upon You;'
  - type: text
    content: Let the wicked be ashamed;
  - type: note
    content: (1 Sam. 2:9); Ps. 94:17; 115:17
  - type: text
    content: Let them be silent in the grave.
  '18':
  - type: note
    content: Ps. 109:2; 120:2
  - type: text
    content: Let the lying lips be put to silence,
  - type: text
    content: 'Which '
  - type: note
    content: (1 Sam. 2:3); Ps. 94:4; (Jude 15)
  - type: text
    content: speak insolent things proudly and contemptuously against the righteous.
  '19':
  - type: note
    content: Ps. 145:7; (Rom. 2:4; 11:22)
  - type: text
    content: 'Oh, how great '
  - type: text
    content: is
  - type: text
    content: ' Your goodness,'
  - type: text
    content: Which You have laid up for those who fear You,
  - type: text
    content: Which
  - type: text
    content: ' You have prepared for those who trust in You'
  - type: text
    content: In the presence of the sons of men!
  '2':
  - type: note
    content: Ps. 17:6; 71:2; 86:1; 102:2
  - type: text
    content: Bow down Your ear to me,
  - type: text
    content: Deliver me speedily;
  - type: text
    content: Be my rock of refuge,
  - type: text
    content: A fortress of defense to save me.
  '20':
  - type: note
    content: (Ps. 27:5; 32:7)
  - type: text
    content: You shall hide them in the secret place of Your presence
  - type: text
    content: From the plots of man;
  - type: note
    content: Job 5:21
  - type: text
    content: You shall keep them secretly in a pavilion
  - type: text
    content: From the strife of tongues.
  '21':
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'For '
  - type: note
    content: (Ps. 17:7)
  - type: text
    content: He has shown me His marvelous kindness in a strong city!
  '22':
  - type: text
    content: For I said in my haste,
  - type: text
    content: “I am cut off from before Your eyes”;
  - type: text
    content: Nevertheless You heard the voice of my supplications
  - type: text
    content: When I cried out to You.
  '23':
  - type: text
    content: 'Oh, love the '
  - type: heading
    content: Lord
  - type: text
    content: ', all you His saints!'
  - type: text
    content: For
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' preserves the faithful,'
  - type: text
    content: And fully repays the proud person.
  '24':
  - type: note
    content: (Ps. 27:14)
  - type: text
    content: Be of good courage,
  - type: text
    content: And He shall strengthen your heart,
  - type: text
    content: 'All you who hope in the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '3':
  - type: note
    content: (Ps. 18:2)
  - type: text
    content: 'For You '
  - type: text
    content: are
  - type: text
    content: ' my rock and my fortress;'
  - type: text
    content: 'Therefore, '
  - type: note
    content: Ps. 23:3; 25:11
  - type: text
    content: for Your name’s sake,
  - type: text
    content: Lead me and guide me.
  '4':
  - type: text
    content: Pull me out of the net which they have secretly laid for me,
  - type: text
    content: 'For You '
  - type: text
    content: are
  - type: text
    content: ' my strength.'
  '5':
  - type: note
    content: Luke 23:46
  - type: text
    content: Into Your hand I commit my spirit;
  - type: text
    content: 'You have redeemed me, O '
  - type: heading
    content: Lord
  - type: text
    content: ' God of '
  - type: note
    content: (Deut. 32:4); Ps. 71:22
  - type: text
    content: truth.
  '6':
  - type: text
    content: 'I have hated those '
  - type: note
    content: Jon. 2:8
  - type: text
    content: who regard useless idols;
  - type: text
    content: 'But I trust in the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: I will be glad and rejoice in Your mercy,
  - type: text
    content: For You have considered my trouble;
  - type: text
    content: 'You have '
  - type: note
    content: (John 10:27)
  - type: text
    content: known my soul in adversities,
  '8':
  - type: text
    content: 'And have not '
  - type: note
    content: (Deut. 32:30); Ps. 37:33
  - type: text
    content: shut me up into the hand of the enemy;
  - type: note
    content: (Ps. 4:1; 18:19)
  - type: text
    content: You have set my feet in a wide place.
  '9':
  - type: text
    content: 'Have mercy on me, O '
  - type: heading
    content: Lord
  - type: text
    content: ', for I am in trouble;'
  - type: note
    content: Ps. 6:7
  - type: text
    content: My eye wastes away with grief,
  - type: text
    content: Yes,
  - type: text
    content: ' my soul and my body!'
