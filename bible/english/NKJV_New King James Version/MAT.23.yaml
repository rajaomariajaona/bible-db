document_id: MAT.23,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Woe to the Scribes and Pharisees
  - type: text
    content: 'Then Jesus spoke to the multitudes and to His disciples, '
  '10':
  - type: text
    content: And do not be called teachers; for One is your Teacher, the Christ.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'But '
  - type: note
    content: Matt. 20:26, 27
  - type: text
    content: he who is greatest among you shall be your servant.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Job 22:29; Prov. 15:33; 29:23; Luke 14:11; 18:14; James 4:6; 1 Pet. 5:5
  - type: text
    content: 'And whoever exalts himself will be '
  - type: text
    content: 'humbled, and he who humbles himself will be '
  - type: text
    content: exalted.
  '13':
  - type: text
    content: “
  - type: text
    content: 'But '
  - type: note
    content: Luke 11:52
  - type: text
    content: 'woe to you, scribes and Pharisees, hypocrites! For you shut up the kingdom of heaven against men; for you neither go in '
  - type: text
    content: yourselves,
  - type: text
    content: ' nor do you allow those who are entering to go in.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Woe to you, scribes and Pharisees, hypocrites! '
  - type: note
    content: Mark 12:40; Luke 20:47; (2 Tim. 3:6; Titus 1:10, 11)
  - type: text
    content: For you devour widows’ houses, and for a pretense make long prayers. Therefore you will receive greater condemnation.
  '15':
  - type: text
    content: '“Woe to you, scribes and Pharisees, hypocrites! For you travel land and sea to win one proselyte, and when he is won, you make him twice as much a son of '
  - type: text
    content: hell as yourselves.
  '16':
  - type: text
    content: '“Woe to you, '
  - type: note
    content: Matt. 15:14; 23:24
  - type: text
    content: 'blind guides, who say, '
  - type: note
    content: (Matt. 5:33, 34)
  - type: text
    content: '‘Whoever swears by the temple, it is nothing; but whoever swears by the gold of the temple, he is obliged '
  - type: text
    content: to perform it.
  - type: text
    content: ’
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Fools and blind! For which is greater, the gold '
  - type: note
    content: Ex. 30:29
  - type: text
    content: 'or the temple that '
  - type: text
    content: sanctifies
  - type: text
    content: ' the gold?'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And, ‘Whoever swears by the altar, it is nothing; but whoever swears by the gift that is on it, he is obliged '
  - type: text
    content: to perform it.
  - type: text
    content: ’
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Fools and blind! For which is greater, the gift '
  - type: note
    content: Ex. 29:37
  - type: text
    content: or the altar that sanctifies the gift?
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'saying: '
  - type: note
    content: Deut. 33:3; Ezra 7:6, 25; Neh. 8:4, 8; (Mal. 2:7); Mark 12:38; Luke 20:45
  - type: text
    content: “The scribes and the Pharisees sit in Moses’ seat.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Therefore he who '
  - type: text
    content: swears by the altar, swears by it and by all things on it.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'He who swears by the temple, swears by it and by '
  - type: note
    content: 1 Kin. 8:13; 2 Chr. 6:2; Ps. 26:8; 132:14
  - type: text
    content: 'Him who '
  - type: text
    content: dwells
  - type: text
    content: ' in it.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And he who swears by heaven, swears by '
  - type: note
    content: Ps. 11:4; Is. 66:1; Matt. 5:34; Acts 7:49
  - type: text
    content: the throne of God and by Him who sits on it.
  '23':
  - type: text
    content: '“Woe to you, scribes and Pharisees, hypocrites! '
  - type: note
    content: Matt. 23:13; Luke 11:42; 18:12
  - type: text
    content: 'For you pay tithe of mint and anise and cummin, and '
  - type: note
    content: (1 Sam. 15:22; Hos. 6:6; Mic. 6:8); Matt. 9:13; 12:7
  - type: text
    content: 'have neglected the weightier '
  - type: text
    content: matters
  - type: text
    content: ' of the law: justice and mercy and faith. These you ought to have done, without leaving the others undone.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: Blind guides, who strain out a gnat and swallow a camel!
  '25':
  - type: text
    content: '“Woe to you, scribes and Pharisees, hypocrites! '
  - type: note
    content: Mark 7:4; Luke 11:39
  - type: text
    content: 'For you cleanse the outside of the cup and dish, but inside they are full of extortion and '
  - type: text
    content: self-indulgence.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Blind Pharisee, first cleanse the inside of the cup and dish, that the outside of them may be clean also.
  '27':
  - type: text
    content: '“Woe to you, scribes and Pharisees, hypocrites! '
  - type: note
    content: Luke 11:44; Acts 23:3
  - type: text
    content: 'For you are like whitewashed tombs which indeed appear beautiful outwardly, but inside are full of dead '
  - type: text
    content: men’s
  - type: text
    content: ' bones and all uncleanness.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: Even so you also outwardly appear righteous to men, but inside you are full of hypocrisy and lawlessness.
  '29':
  - type: note
    content: Luke 11:47, 48
  - type: text
    content: '“Woe to you, scribes and Pharisees, hypocrites! Because you build the tombs of the prophets and '
  - type: text
    content: adorn the monuments of the righteous,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Therefore whatever they tell you '
  - type: text
    content: to observe,
  - type: text
    content: ' '
  - type: text
    content: that
  - type: text
    content: ' observe and do, but do not do according to their works; for '
  - type: note
    content: (Rom. 2:19)
  - type: text
    content: they say, and do not do.
  - type: text
    content: ' '
  '30':
  - type: text
    content: and say, ‘If we had lived in the days of our fathers, we would not have been partakers with them in the blood of the prophets.’
  '31':
  - type: text
    content: '“Therefore you are witnesses against yourselves that '
  - type: note
    content: Matt. 23:34, 37; (Acts 7:51, 52); 1 Thess. 2:15
  - type: text
    content: you are sons of those who murdered the prophets.
  - type: text
    content: ' '
  '32':
  - type: note
    content: Gen. 15:16; (1 Thess. 2:16)
  - type: text
    content: 'Fill up, then, the measure of your fathers’ '
  - type: text
    content: guilt.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Serpents, '
  - type: note
    content: Matt. 3:7; 12:34; Luke 3:7
  - type: text
    content: brood
  - type: text
    content: ' of vipers! How can you escape the condemnation of hell?'
  - type: text
    content: ' '
  '34':
  - type: note
    content: Matt. 21:34, 35; Luke 11:49
  - type: text
    content: 'Therefore, indeed, I send you prophets, wise men, and scribes: '
  - type: note
    content: John 16:2; Acts 7:54–60; 22:19
  - type: text
    content: some
  - type: text
    content: ' of them you will kill and crucify, and '
  - type: note
    content: Matt. 10:17; Acts 5:40; 2 Cor. 11:24, 25
  - type: text
    content: some
  - type: text
    content: ' of them you will scourge in your synagogues and persecute from city to city,'
  - type: text
    content: ' '
  '35':
  - type: note
    content: Rev. 18:24
  - type: text
    content: 'that on you may come all the righteous blood shed on the earth, '
  - type: note
    content: Gen. 4:8; Heb. 11:4; 1 John 3:12
  - type: text
    content: 'from the blood of righteous Abel to '
  - type: note
    content: 2 Chr. 24:20, 21
  - type: text
    content: the blood of Zechariah, son of Berechiah, whom you murdered between the temple and the altar.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Assuredly, I say to you, all these things will come upon this generation.
  - type: heading
    content: Jesus Laments over Jerusalem
  '37':
  - type: note
    content: Luke 13:34, 35
  - type: text
    content: '“O Jerusalem, Jerusalem, the one who kills the prophets '
  - type: note
    content: 2 Chr. 24:20, 21; 36:15, 16; Neh. 9:26; Matt. 21:35, 36
  - type: text
    content: 'and stones those who are sent to her! How often '
  - type: note
    content: Deut. 32:11, 12; Matt. 11:28–30
  - type: text
    content: 'I wanted to gather your children together, as a hen gathers her chicks '
  - type: note
    content: Ps. 17:8; 91:4; Is. 49:5
  - type: text
    content: 'under '
  - type: text
    content: her
  - type: text
    content: ' wings, but you were not willing!'
  - type: text
    content: ' '
  '38':
  - type: text
    content: See! Your house is left to you desolate;
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'for I say to you, you shall see Me no more till you say, '
  - type: note
    content: Ps. 118:26; Matt. 21:9
  - type: text
    content: ‘Blessed
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: 'He who comes in the name of the '
  - type: heading
    content: Lord
  - type: text
    content: '!’ ”'
  '4':
  - type: note
    content: (Matt. 11:29, 30); Luke 11:46; Acts 15:10; Rom. 2:17–24; (Gal. 5:1; 6:13; Col. 2:16, 17)
  - type: text
    content: 'For they bind heavy burdens, hard to bear, and lay '
  - type: text
    content: them
  - type: text
    content: ' on men’s shoulders; but they '
  - type: text
    content: themselves
  - type: text
    content: ' will not move them with one of their fingers.'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'But all their works they do to '
  - type: note
    content: (Matt. 6:1–6, 16–18)
  - type: text
    content: be seen by men. They make their phylacteries broad and enlarge the borders of their garments.
  - type: text
    content: ' '
  '6':
  - type: note
    content: Mark 12:38, 39; Luke 11:43; 20:46; 3 John 9
  - type: text
    content: 'They love the '
  - type: text
    content: best places at feasts, the best seats in the synagogues,
  - type: text
    content: ' '
  '7':
  - type: text
    content: greetings in the marketplaces, and to be called by men, ‘Rabbi, Rabbi.’
  - type: text
    content: ' '
  '8':
  - type: note
    content: (2 Cor. 1:24; James 3:1; 1 Pet. 5:3)
  - type: text
    content: 'But you, do not be called ‘Rabbi’; for One is your '
  - type: text
    content: 'Teacher, '
  - type: text
    content: the Christ,
  - type: text
    content: ' and you are all brethren.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Do not call anyone on earth your father; '
  - type: note
    content: (Mal. 1:6); Matt. 5:16, 48; 6:1, 9, 14, 26, 32; 7:11
  - type: text
    content: for One is your Father, He who is in heaven.
  - type: text
    content: ' '
