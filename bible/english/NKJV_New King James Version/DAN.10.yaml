    content: Vision of the Glorious Man
  - type: text
    content: 'In the third year of Cyrus king of Persia a message was revealed to Daniel, whose '
  - type: note
    content: Dan. 1:7
  - type: text
    content: 'name was called Belteshazzar. The message '
  - type: text
    content: was
  - type: text
    content: ' true, but the appointed time '
  - type: text
    content: was
  - type: text
    content: ' long; and he understood the message, and had understanding of the vision. '
  '10':
  - type: note
    content: Dan. 9:21
  - type: text
    content: 'Suddenly, a hand touched me, which made me tremble on my knees and '
  - type: text
    content: on
  - type: text
    content: ' the palms of my hands. '
  '11':
  - type: text
    content: 'And he said to me, “O Daniel, '
  - type: note
    content: Dan. 9:23
  - type: text
    content: man greatly beloved, understand the words that I speak to you, and stand upright, for I have now been sent to you.” While he was speaking this word to me, I stood trembling.
  '12':
  - type: text
    content: 'Then he said to me, '
  - type: note
    content: Rev. 1:17
  - type: text
    content: '“Do not fear, Daniel, for from the first day that you set your heart to understand, and to humble yourself before your God, '
  - type: note
    content: Dan. 9:3, 4, 22, 23; Acts 10:4
  - type: text
    content: 'your words were heard; and I have come because of your words. '
  '13':
  - type: note
    content: Dan. 10:20
  - type: text
    content: 'But the prince of the kingdom of Persia withstood me twenty-one days; and behold, '
  - type: note
    content: Dan. 10:21; 12:1; Jude 9; (Rev. 12:7)
  - type: text
    content: 'Michael, one of the chief princes, came to help me, for I had been left alone there with the kings of Persia. '
  '14':
  - type: text
    content: 'Now I have come to make you understand what will happen to your people '
  - type: note
    content: Gen. 49:1; Deut. 31:29; Dan. 2:28
  - type: text
    content: 'in the latter days, '
  - type: note
    content: Dan. 8:26; 10:1
  - type: text
    content: 'for the vision '
  - type: text
    content: refers
  - type: text
    content: ' to '
  - type: text
    content: many
  - type: text
    content: ' days yet '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: come.
  - type: text
    content: ”
  '15':
  - type: text
    content: 'When he had spoken such words to me, '
  - type: note
    content: Dan. 8:18; 10:9
  - type: text
    content: 'I turned my face toward the ground and became speechless. '
  '16':
  - type: text
    content: 'And suddenly, '
  - type: note
    content: Dan. 8:15
  - type: text
    content: one
  - type: text
    content: ' having the likeness of the sons of men '
  - type: note
    content: Jer. 1:9; Dan. 10:10
  - type: text
    content: 'touched my lips; then I opened my mouth and spoke, saying to him who stood before me, “My lord, because of the vision '
  - type: note
    content: Dan. 10:8, 9
  - type: text
    content: 'my sorrows have overwhelmed me, and I have retained no strength. '
  '17':
  - type: text
    content: For how can this servant of my lord talk with you, my lord? As for me, no strength remains in me now, nor is any breath left in me.”
  '18':
  - type: text
    content: 'Then again, '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: one
  - type: text
    content: ' having the likeness of a man touched me and strengthened me. '
  '19':
  - type: note
    content: Dan. 10:11
  - type: text
    content: 'And he said, “O man greatly beloved, '
  - type: note
    content: Judg. 6:23; Is. 43:1; Dan. 10:12
  - type: text
    content: 'fear not! Peace '
  - type: text
    content: be
  - type: text
    content: ' to you; be strong, yes, be strong!”'
  - type: text
    content: So when he spoke to me I was strengthened, and said, “Let my lord speak, for you have strengthened me.”
  '2':
  - type: text
    content: 'In those days I, Daniel, was mourning three full weeks. '
  '20':
  - type: text
    content: 'Then he said, “Do you know why I have come to you? And now I must return to fight '
  - type: note
    content: Dan. 10:13
  - type: text
    content: 'with the prince of Persia; and when I have gone forth, indeed the prince of Greece will come. '
  '21':
  - type: text
    content: 'But I will tell you what is noted in the Scripture of Truth. (No one upholds me against these, '
  - type: note
    content: Dan. 10:13; Jude 9; (Rev. 12:7)
  - type: text
    content: except Michael your prince.
  '3':
  - type: text
    content: I ate no pleasant food, no meat or wine came into my mouth, nor did I anoint myself at all, till three whole weeks were fulfilled.
  '4':
  - type: text
    content: 'Now on the twenty-fourth day of the first month, as I was by the side of the great river, that '
  - type: text
    content: is,
  - type: text
    content: ' the Tigris, '
  '5':
  - type: text
    content: 'I lifted my eyes and looked, and behold, a certain man clothed in '
  - type: note
    content: Ezek. 9:2; 10:2
  - type: text
    content: 'linen, whose waist '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: Rev. 1:13; 15:6
  - type: text
    content: 'girded with gold of Uphaz! '
  '6':
  - type: text
    content: 'His body '
  - type: text
    content: was
  - type: text
    content: ' like beryl, his face like the appearance of lightning, his eyes like torches of fire, his arms and feet like burnished bronze in color, '
  - type: note
    content: (Rev. 1:15)
  - type: text
    content: and the sound of his words like the voice of a multitude.
  '7':
  - type: text
    content: 'And I, Daniel, alone saw the vision, for the men who were with me did not see the vision; but a great terror fell upon them, so that they fled to hide themselves. '
  '8':
  - type: text
    content: 'Therefore I was left alone when I saw this great vision, and no strength remained in me; for my vigor was turned to frailty in me, and I retained no strength. '
  '9':
  - type: text
    content: Yet I heard the sound of his words; and while I heard the sound of his words I was in a deep sleep on my face, with my face to the ground.
  - type: heading
    content: Prophecies Concerning Persia and Greece
