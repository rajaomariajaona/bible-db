document_id: DAN.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision of the Glorious Man
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the third year of Cyrus king of Persia a message was revealed to Daniel, whose '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 1:7
    marker-yv: yv-n
  - type: text
    text: 'name was called Belteshazzar. The message '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' true, but the appointed time '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' long; and he understood the message, and had understanding of the vision. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'In those days I, Daniel, was mourning three full weeks. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I ate no pleasant food, no meat or wine came into my mouth, nor did I anoint myself at all, till three whole weeks were fulfilled.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now on the twenty-fourth day of the first month, as I was by the side of the great river, that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is,
  - type: text
    text: ' the Tigris, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I lifted my eyes and looked, and behold, a certain man clothed in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 9:2; 10:2
    marker-yv: yv-n
  - type: text
    text: 'linen, whose waist '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 1:13; 15:6
    marker-yv: yv-n
  - type: text
    text: 'girded with gold of Uphaz! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'His body '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' like beryl, his face like the appearance of lightning, his eyes like torches of fire, his arms and feet like burnished bronze in color, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rev. 1:15)
    marker-yv: yv-n
  - type: text
    text: and the sound of his words like the voice of a multitude.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And I, Daniel, alone saw the vision, for the men who were with me did not see the vision; but a great terror fell upon them, so that they fled to hide themselves. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore I was left alone when I saw this great vision, and no strength remained in me; for my vigor was turned to frailty in me, and I retained no strength. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Yet I heard the sound of his words; and while I heard the sound of his words I was in a deep sleep on my face, with my face to the ground.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophecies Concerning Persia and Greece
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 9:21
    marker-yv: yv-n
  - type: text
    text: 'Suddenly, a hand touched me, which made me tremble on my knees and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: on
  - type: text
    text: ' the palms of my hands. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he said to me, “O Daniel, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 9:23
    marker-yv: yv-n
  - type: text
    text: man greatly beloved, understand the words that I speak to you, and stand upright, for I have now been sent to you.” While he was speaking this word to me, I stood trembling.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then he said to me, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 1:17
    marker-yv: yv-n
  - type: text
    text: '“Do not fear, Daniel, for from the first day that you set your heart to understand, and to humble yourself before your God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 9:3, 4, 22, 23; Acts 10:4
    marker-yv: yv-n
  - type: text
    text: 'your words were heard; and I have come because of your words. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 10:20
    marker-yv: yv-n
  - type: text
    text: 'But the prince of the kingdom of Persia withstood me twenty-one days; and behold, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 10:21; 12:1; Jude 9; (Rev. 12:7)
    marker-yv: yv-n
  - type: text
    text: 'Michael, one of the chief princes, came to help me, for I had been left alone there with the kings of Persia. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now I have come to make you understand what will happen to your people '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 49:1; Deut. 31:29; Dan. 2:28
    marker-yv: yv-n
  - type: text
    text: 'in the latter days, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 8:26; 10:1
    marker-yv: yv-n
  - type: text
    text: 'for the vision '
  - type: usfm
    marker: it
    children:
    - type: text
      text: refers
  - type: text
    text: ' to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: many
  - type: text
    text: ' days yet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: come.
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When he had spoken such words to me, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 8:18; 10:9
    marker-yv: yv-n
  - type: text
    text: 'I turned my face toward the ground and became speechless. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And suddenly, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 8:15
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' having the likeness of the sons of men '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 1:9; Dan. 10:10
    marker-yv: yv-n
  - type: text
    text: 'touched my lips; then I opened my mouth and spoke, saying to him who stood before me, “My lord, because of the vision '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 10:8, 9
    marker-yv: yv-n
  - type: text
    text: 'my sorrows have overwhelmed me, and I have retained no strength. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For how can this servant of my lord talk with you, my lord? As for me, no strength remains in me now, nor is any breath left in me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then again, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' having the likeness of a man touched me and strengthened me. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 10:11
    marker-yv: yv-n
  - type: text
    text: 'And he said, “O man greatly beloved, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 6:23; Is. 43:1; Dan. 10:12
    marker-yv: yv-n
  - type: text
    text: 'fear not! Peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' to you; be strong, yes, be strong!”'
- type: usfm
  marker: p
  children:
  - type: text
    text: So when he spoke to me I was strengthened, and said, “Let my lord speak, for you have strengthened me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then he said, “Do you know why I have come to you? And now I must return to fight '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 10:13
    marker-yv: yv-n
  - type: text
    text: 'with the prince of Persia; and when I have gone forth, indeed the prince of Greece will come. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But I will tell you what is noted in the Scripture of Truth. (No one upholds me against these, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 10:13; Jude 9; (Rev. 12:7)
    marker-yv: yv-n
  - type: text
    text: except Michael your prince.
