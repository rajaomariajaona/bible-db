    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and said to them, “You shall not bring the captives here, for we '
  - type: usfm
    marker: it
    children:
    - type: text
      text: already
  - type: text
    text: ' have offended the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. You intend to add to our sins and to our guilt; for our guilt is great, and '
  - type: usfm
    marker: it
