  - type: text
    content: 'fire, according to the abominations of the nations whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' had '
  - type: note
    content: (Lev. 18:24–30)
  - type: text
    content: 'cast out before the children of Israel. '
  '4':
  - type: text
    content: And he sacrificed and burned incense on the high places, on the hills, and under every green tree.
  - type: heading
    content: Syria and Israel Defeat Judah
  '5':
  - type: text
    content: 'Therefore '
  - type: note
    content: (Is. 10:5)
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' his God delivered him into the hand of the king of Syria. They '
  - type: note
    content: 2 Kin. 16:5, 6; (2 Chr. 24:24); Is. 7:1, 17
  - type: text
    content: 'defeated him, and carried away a great multitude of them as captives, and brought '
  - type: text
    content: them
  - type: text
    content: ' to Damascus. Then he was also delivered into the hand of the king of Israel, who defeated him with a great slaughter. '
  '6':
  - type: text
    content: 'For '
  - type: note
    content: 2 Kin. 15:27
  - type: text
