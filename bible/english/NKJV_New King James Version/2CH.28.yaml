  - type: text
    content: 'because they had forsaken the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of their fathers. '
  '7':
  - type: text
    content: 'Zichri, a mighty man of Ephraim, killed Maaseiah the king’s son, Azrikam the officer over the house, and Elkanah '
  - type: text
