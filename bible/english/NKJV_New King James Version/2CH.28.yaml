  - type: text
    content: it
  - type: text
    content: ' to the king of Assyria; but he did not help him.'
  - type: heading
    content: Apostasy and Death of Ahaz
  '22':
  - type: text
    content: 'Now in the time of his distress King Ahaz became increasingly unfaithful to the '
  - type: heading
    content: Lord
  - type: text
    content: '. This '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: that
  - type: text
    content: ' King Ahaz. '
  '23':
  - type: text
    content: 'For '
  - type: note
    content: 2 Chr. 25:14
  - type: text
    content: 'he sacrificed to the gods of Damascus which had defeated him, saying, “Because the gods of the kings of Syria help them, I will sacrifice to them '
  - type: note
    content: Jer. 44:17, 18
  - type: text
    content: 'that they may help me.” But they were the ruin of him and of all Israel. '
  '24':
  - type: text
    content: 'So Ahaz gathered the articles of the house of God, cut in pieces the articles of the house of God, '
  - type: note
    content: 2 Chr. 29:3, 7
  - type: text
    content: 'shut up the doors of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and made for himself altars in every corner of Jerusalem. '
  '25':
  - type: text
    content: 'And in every single city of Judah he made high places to burn incense to other gods, and provoked to anger the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of his fathers.'
  '26':
  - type: note
    content: 2 Kin. 16:19, 20
  - type: text
    content: 'Now the rest of his acts and all his ways, from first to last, indeed they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the kings of Judah and Israel. '
  '27':
  - type: text
    content: 'So Ahaz rested with his fathers, and they buried him in the city, in Jerusalem; but they '
  - type: note
    content: 2 Chr. 21:20; 24:25
  - type: text
    content: did not bring him into the tombs of the kings of Israel. Then Hezekiah his son reigned in his place.
  '3':
  - type: text
    content: 'He burned incense in '
  - type: note
