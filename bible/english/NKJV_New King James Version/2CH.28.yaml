    text: 'Now in the time of his distress King Ahaz became increasingly unfaithful to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
