    marker-yv: yv-n
  - type: text
    text: 'that they may help me.” But they were the ruin of him and of all Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So Ahaz gathered the articles of the house of God, cut in pieces the articles of the house of God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 29:3, 7
    marker-yv: yv-n
  - type: text
    text: 'shut up the doors of the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and made for himself altars in every corner of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And in every single city of Judah he made high places to burn incense to other gods, and provoked to anger the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of his fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 16:19, 20
    marker-yv: yv-n
  - type: text
    text: 'Now the rest of his acts and all his ways, from first to last, indeed they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' written in the book of the kings of Judah and Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'So Ahaz rested with his fathers, and they buried him in the city, in Jerusalem; but they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 21:20; 24:25
    marker-yv: yv-n
  - type: text
    text: did not bring him into the tombs of the kings of Israel. Then Hezekiah his son reigned in his place.
