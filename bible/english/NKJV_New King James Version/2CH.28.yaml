  '14':
  - type: text
    content: 'So the armed men left the captives and the spoil before the leaders and all the assembly. '
  '15':
  - type: text
    content: 'Then the men '
  - type: note
    content: 2 Chr. 28:12
  - type: text
    content: 'who were designated by name rose up and took the captives, and from the spoil they clothed all who were naked among them, dressed them and gave them sandals, '
  - type: note
    content: (Prov. 25:21, 22; Luke 6:27; Rom. 12:20)
  - type: text
    content: 'gave them food and drink, and anointed them; and they let all the feeble ones ride on donkeys. So they brought them to their brethren at Jericho, '
  - type: note
    content: Deut. 34:3; Judg. 1:16
  - type: text
    content: the city of palm trees. Then they returned to Samaria.
  - type: heading
    content: Assyria Refuses to Help Judah
  '16':
  - type: note
    content: 2 Kin. 16:7
  - type: text
    content: 'At the same time King Ahaz sent to the kings of Assyria to help him. '
  '17':
  - type: text
    content: 'For again the '
  - type: note
    content: 2 Chr. 21:10; Obad. 10–14
  - type: text
    content: 'Edomites had come, attacked Judah, and carried away captives. '
  '18':
  - type: note
    content: 2 Chr. 21:16, 17; Ezek. 16:27, 57
  - type: text
    content: 'The Philistines also had invaded the cities of the lowland and of the South of Judah, and had taken Beth Shemesh, Aijalon, Gederoth, Sochoh with its villages, Timnah with its villages, and Gimzo with its villages; and they dwelt there. '
  '19':
  - type: text
    content: 'For the '
  - type: heading
