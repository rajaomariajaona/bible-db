  - type: text
    content: 'Israel, for he had '
  - type: note
    content: Ex. 32:25
  - type: text
    content: 'encouraged moral decline in Judah and had been continually unfaithful to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'For he walked in the ways of the kings of Israel, and made '
  - type: note
    content: Ex. 34:17; Lev. 19:4
  - type: text
    content: 'molded images for '
  - type: note
    content: Judg. 2:11
  - type: text
    content: 'the Baals. '
