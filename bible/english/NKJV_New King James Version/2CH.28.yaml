    children:
    - type: text
      text: Ex. 32:25
    marker-yv: yv-n
  - type: text
    text: 'encouraged moral decline in Judah and had been continually unfaithful to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Also '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 15:29; 16:7–9; 1 Chr. 5:26
    marker-yv: yv-n
  - type: text
    text: 'Tiglath-Pileser king of Assyria came to him and distressed him, and did not assist him. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For Ahaz took part '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: treasures
  - type: text
    text: ' from the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
