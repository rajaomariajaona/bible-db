      - type: text
        text: 1 Chr. 27:1, 2
      marker-yv: yv-n
    - type: text
      text: 'the captains of the divisions who served the king, the captains over thousands and captains over hundreds, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 27:25
      marker-yv: yv-n
    - type: text
      text: 'the stewards over all the substance and possessions of the king and of his sons, with the officials, the valiant men, and all '
    - type: usfm
