    - type: usfm
      marker: it
      children:
      - type: text
        text: wings
    - type: text
      text: ' and overshadowed the ark of the covenant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this,
    - type: text
      text: '” '
    - type: usfm
      marker: it
      children:
      - type: text
        text: said
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: David,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:40; 1 Chr. 28:11, 12
      marker-yv: yv-n
    - type: text
      text: '“the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made me understand in writing, by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' hand upon me, all the works of these plans.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then King David rose to his feet and said, “Hear me, my brethren and my people: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:2
      marker-yv: yv-n
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' it in my heart to build a house of rest for the ark of the covenant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 99:5; 132:7; (Is. 66:1)
      marker-yv: yv-n
    - type: text
      text: 'the footstool of our God, and had made preparations to build it. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David said to his son Solomon, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 31:6, 7; (Josh. 1:6–9); 1 Chr. 22:13
      marker-yv: yv-n
    - type: text
      text: '“Be strong and of good courage, and do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it;
    - type: text
      text: ' do not fear nor be dismayed, for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God—my God—'
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' with you. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 1:5; Heb. 13:5
      marker-yv: yv-n
    - type: text
      text: 'He will not leave you nor forsake you, until you have finished all the work for the service of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Here
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 24—26
      marker-yv: yv-n
    - type: text
      text: 'the divisions of the priests and the Levites for all the service of the house of God; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 35:25–35; 36:1, 2; 2 Chr. 2:13, 14
      marker-yv: yv-n
    - type: text
      text: 'every willing craftsman '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' with you for all manner of workmanship, for every kind of service; also the leaders and all the people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' completely at your command.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But God said to me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:5, 13; 1 Kin. 5:3
      marker-yv: yv-n
    - type: text
      text: '‘You shall not build a house for My name, because you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: been
    - type: text
      text: ' a man of war and have shed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Chr. 17:4; 22:8)
      marker-yv: yv-n
    - type: text
      text: 'blood.’ '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 16:6–13
      marker-yv: yv-n
    - type: text
      text: 'chose me above all the house of my father to be king over Israel forever, for He has chosen '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 49:8–10; 1 Chr. 5:2; Ps. 60:7
      marker-yv: yv-n
    - type: text
      text: 'Judah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the ruler. And of the house of Judah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 16:1
      marker-yv: yv-n
    - type: text
      text: 'the house of my father, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 13:14; 16:12, 13; Acts 13:22
      marker-yv: yv-n
    - type: text
      text: 'among the sons of my father, He was pleased with me to make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' king over all Israel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 3:1–9; 14:3–7; 23:1
      marker-yv: yv-n
    - type: text
      text: 'And of all my sons (for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given me many sons) '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 22:9; 29:1
      marker-yv: yv-n
    - type: text
      text: 'He has chosen my son Solomon to sit on the throne of the kingdom of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' over Israel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now He said to me, ‘It is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:13, 14; 1 Kin. 6:38; 1 Chr. 22:9, 10; 2 Chr. 1:9; 6:2
      marker-yv: yv-n
    - type: text
      text: 'your son Solomon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' shall build My house and My courts; for I have chosen him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' My son, and I will be his Father. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover I will establish his kingdom forever, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 22:13
      marker-yv: yv-n
    - type: text
      text: 'if he is steadfast to observe My commandments and My judgments, as it is this day.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, in the sight of all Israel, the assembly of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and in the hearing of our God, be careful to seek out all the commandments of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, that you may possess this good land, and leave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' as an inheritance for your children after you forever.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“As for you, my son Solomon, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Sam. 12:24); Jer. 9:24; Hos. 4:1; (John 17:3)
      marker-yv: yv-n
    - type: text
      text: 'know the God of your father, and serve Him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 20:3
      marker-yv: yv-n
    - type: text
      text: 'with a loyal heart and with a willing mind; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Sam. 16:7; 1 Kin. 8:39; 1 Chr. 29:17); Jer. 11:20; 17:10; 20:12; Rev. 2:23
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' searches all hearts and understands all the intent of the thoughts. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 15:2; (Jer. 29:13)
      marker-yv: yv-n
    - type: text
      text: 'If you seek Him, He will be found by you; but if you forsake Him, He will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 31:17
      marker-yv: yv-n
    - type: text
      text: 'cast you off forever. '
