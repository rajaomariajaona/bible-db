      - type: text
        text: Ex. 25:18–22; 1 Sam. 4:4; 1 Kin. 6:23
      marker-yv: yv-n
    - type: text
      text: 'cherubim that spread '
    - type: usfm
      marker: it
      children:
      - type: text
