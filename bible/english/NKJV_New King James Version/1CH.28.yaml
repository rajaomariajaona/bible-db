  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Consider now, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 22:13; 28:6
      marker-yv: yv-n
    - type: text
      text: 'for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has chosen you to build a house for the sanctuary; be strong, and do it.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David gave his son Solomon '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:3; 1 Chr. 28:19
      marker-yv: yv-n
    - type: text
      text: 'the plans for the vestibule, its houses, its treasuries, its upper chambers, its inner chambers, and the place of the mercy seat; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:40; Heb. 8:5
      marker-yv: yv-n
    - type: text
      text: 'plans for all that he had by the Spirit, of the courts of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', of all the chambers all around, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 26:20, 28
      marker-yv: yv-n
    - type: text
      text: 'of the treasuries of the house of God, and of the treasuries for the dedicated things; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'also for the division of the priests and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 23:6
      marker-yv: yv-n
    - type: text
      text: 'Levites, for all the work of the service of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and for all the articles of service in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: He
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gave
    - type: text
      text: ' gold by weight for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' of gold, for all articles used in every kind of service; also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: silver
    - type: text
      text: ' for all articles of silver by weight, for all articles used in every kind of service; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the weight for the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:31–39; 1 Kin. 7:49
      marker-yv: yv-n
    - type: text
      text: 'lampstands of gold, and their lamps of gold, by weight for each lampstand and its lamps; for the lampstands of silver by weight, for the lampstand and its lamps, according to the use of each lampstand. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And by weight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gave
    - type: text
      text: ' gold for the tables of the showbread, for each '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:48
      marker-yv: yv-n
    - type: text
      text: 'table, and silver for the tables of silver; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: also pure gold for the forks, the basins, the pitchers of pure gold, and the golden bowls—
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gave
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gold
    - type: text
      text: ' by weight for every bowl; and for the silver bowls, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: silver
    - type: text
      text: ' by weight for every bowl; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and refined gold by weight for the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:1–10
      marker-yv: yv-n
    - type: text
      text: 'altar of incense, and for the construction of the chariot, that is, the gold '
    - type: usfm
      marker: x
