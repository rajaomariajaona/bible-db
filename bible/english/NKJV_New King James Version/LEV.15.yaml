document_id: LEV.15,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Law Concerning Bodily Discharges
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: text
    content: 'Whoever touches anything that was under him shall be unclean until evening. He who carries any of those things shall wash his clothes and bathe in water, and be unclean until evening. '
  '11':
  - type: text
    content: 'And whomever the one who has the discharge touches, and has not rinsed his hands in water, he shall wash his clothes and bathe in water, and be unclean until evening. '
  '12':
  - type: text
    content: 'The '
  - type: note
    content: Lev. 6:28; 11:32, 33
  - type: text
    content: vessel of earth that he who has the discharge touches shall be broken, and every vessel of wood shall be rinsed in water.
  '13':
  - type: text
    content: '‘And when he who has a discharge is cleansed of his discharge, then '
  - type: note
    content: Lev. 14:8; 15:28; Num. 19:11, 12
  - type: text
    content: 'he shall count for himself seven days for his cleansing, wash his clothes, and bathe his body in running water; then he shall be clean. '
  '14':
  - type: text
    content: 'On the eighth day he shall take for himself '
  - type: note
    content: Lev. 14:22, 23, 30, 31
  - type: text
    content: 'two turtledoves or two young pigeons, and come before the '
  - type: heading
    content: Lord
  - type: text
    content: ', to the door of the tabernacle of meeting, and give them to the priest. '
  '15':
  - type: text
    content: 'Then the priest shall offer them, '
  - type: note
    content: Lev. 14:30, 31
  - type: text
    content: 'the one as a sin offering and the other as a burnt offering. '
  - type: note
    content: Lev. 14:19, 31
  - type: text
    content: 'So the priest shall make atonement for him before the '
  - type: heading
    content: Lord
  - type: text
    content: ' because of his discharge.'
  '16':
  - type: note
    content: Lev. 22:4; Deut. 23:10, 11
  - type: text
    content: '‘If any man has an emission of semen, then he shall wash all his body in water, and be unclean until evening. '
  '17':
  - type: text
    content: 'And any garment and any leather on which there is semen, it shall be washed with water, and be unclean until evening. '
  '18':
  - type: text
    content: 'Also, when a woman lies with a man, and there is an emission of semen, they shall bathe in water, and '
  - type: note
    content: (Ex. 19:15; 1 Sam. 21:4; 1 Cor. 6:18)
  - type: text
    content: be unclean until evening.
  '19':
  - type: note
    content: Lev. 12:2
  - type: text
    content: '‘If a woman has a discharge, and the discharge from her body is blood, she shall be set apart seven days; and whoever touches her shall be unclean until evening. '
  '2':
  - type: text
    content: '“Speak to the children of Israel, and say to them: '
  - type: note
    content: Lev. 22:4; Num. 5:2; 2 Sam. 3:29
  - type: text
    content: '‘When any man has a discharge from his body, his discharge is unclean. '
  '20':
  - type: text
    content: 'Everything that she lies on during her impurity shall be unclean; also everything that she sits on shall be unclean. '
  '21':
  - type: text
    content: 'Whoever touches her bed shall wash his clothes and bathe in water, and be unclean until evening. '
  '22':
  - type: text
    content: 'And whoever touches anything that she sat on shall wash his clothes and bathe in water, and be unclean until evening. '
  '23':
  - type: text
    content: 'If anything is on her bed or on anything on which she sits, when he touches it, he shall be unclean until evening. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: Lev. 18:19; 20:18
  - type: text
    content: if any man lies with her at all, so that her impurity is on him, he shall be unclean seven days; and every bed on which he lies shall be unclean.
  '25':
  - type: text
    content: '‘If '
  - type: note
    content: Matt. 9:20; Mark 5:25; Luke 8:43
  - type: text
    content: 'a woman has a discharge of blood for many days, other than at the time of her customary impurity, or if it runs beyond her usual time of impurity, all the days of her unclean discharge shall be as the days of her customary impurity. She shall be unclean. '
  '26':
  - type: text
    content: 'Every bed on which she lies all the days of her discharge shall be to her as the bed of her impurity; and whatever she sits on shall be unclean, as the uncleanness of her impurity. '
  '27':
  - type: text
    content: Whoever touches those things shall be unclean; he shall wash his clothes and bathe in water, and be unclean until evening.
  '28':
  - type: text
    content: '‘But '
  - type: note
    content: Lev. 15:13–15
  - type: text
    content: 'if she is cleansed of her discharge, then she shall count for herself seven days, and after that she shall be clean. '
  '29':
  - type: text
    content: 'And on the eighth day she shall take for herself two turtledoves or two young pigeons, and bring them to the priest, to the door of the tabernacle of meeting. '
  '3':
  - type: text
    content: 'And this shall be his uncleanness in regard to his discharge—whether his body runs with his discharge, or his body is stopped up by his discharge, it is his uncleanness. '
  '30':
  - type: text
    content: 'Then the priest shall offer the one as a sin offering and the other as a '
  - type: note
    content: Lev. 5:7
  - type: text
    content: 'burnt offering, and the priest shall make atonement for her before the '
  - type: heading
    content: Lord
  - type: text
    content: ' for the discharge of her uncleanness.'
  '31':
  - type: text
    content: '‘Thus you shall '
  - type: note
    content: Lev. 11:47; 14:57; 22:2; Deut. 24:8; Ezek. 44:23; (Heb. 12:15)
  - type: text
    content: 'separate the children of Israel from their uncleanness, lest they die in their uncleanness when they '
  - type: note
    content: Lev. 20:3; Num. 5:3; 19:13, 20; Ezek. 5:11; 23:38; 36:17
  - type: text
    content: 'defile My tabernacle that is among them. '
  '32':
  - type: note
    content: Lev. 15:2
  - type: text
    content: 'This is the law for one who has a discharge, '
  - type: note
    content: Lev. 15:16
  - type: text
    content: 'and for him who emits semen and is unclean thereby, '
  '33':
  - type: note
    content: Lev. 15:19
  - type: text
    content: 'and for her who is indisposed because of her customary impurity, and for one who has a discharge, either man '
  - type: note
    content: Lev. 15:25
  - type: text
    content: 'or woman, '
  - type: note
    content: Lev. 15:24
  - type: text
    content: and for him who lies with her who is unclean.’ ”
  '4':
  - type: text
    content: 'Every bed is unclean on which he who has the discharge lies, and everything on which he sits shall be unclean. '
  '5':
  - type: text
    content: 'And whoever '
  - type: note
    content: Lev. 5:2; 14:46
  - type: text
    content: 'touches his bed shall '
  - type: note
    content: Lev. 14:8, 47
  - type: text
    content: 'wash his clothes and '
  - type: note
    content: Lev. 11:25; 17:15
  - type: text
    content: 'bathe in water, and be unclean until evening. '
  '6':
  - type: text
    content: 'He who sits on anything on which he who has the '
  - type: note
    content: Lev. 15:10; Deut. 23:10
  - type: text
    content: 'discharge sat shall wash his clothes and bathe in water, and be unclean until evening. '
  '7':
  - type: text
    content: 'And he who touches the body of him who has the discharge shall wash his clothes and bathe in water, and be unclean until evening. '
  '8':
  - type: text
    content: 'If he who has the discharge '
  - type: note
    content: Num. 12:14
  - type: text
    content: 'spits on him who is clean, then he shall wash his clothes and bathe in water, and be unclean until evening. '
  '9':
  - type: text
    content: 'Any saddle on which he who has the discharge rides shall be unclean. '
