document_id: LEV.15,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Law Concerning Bodily Discharges
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whoever touches anything that was under him shall be unclean until evening. He who carries any of those things shall wash his clothes and bathe in water, and be unclean until evening. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And whomever the one who has the discharge touches, and has not rinsed his hands in water, he shall wash his clothes and bathe in water, and be unclean until evening. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 6:28; 11:32, 33
      marker-yv: yv-n
    - type: text
      text: vessel of earth that he who has the discharge touches shall be broken, and every vessel of wood shall be rinsed in water.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘And when he who has a discharge is cleansed of his discharge, then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:8; 15:28; Num. 19:11, 12
      marker-yv: yv-n
    - type: text
      text: 'he shall count for himself seven days for his cleansing, wash his clothes, and bathe his body in running water; then he shall be clean. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the eighth day he shall take for himself '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:22, 23, 30, 31
      marker-yv: yv-n
    - type: text
      text: 'two turtledoves or two young pigeons, and come before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to the door of the tabernacle of meeting, and give them to the priest. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the priest shall offer them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:30, 31
      marker-yv: yv-n
    - type: text
      text: 'the one as a sin offering and the other as a burnt offering. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:19, 31
      marker-yv: yv-n
    - type: text
      text: 'So the priest shall make atonement for him before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' because of his discharge.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 22:4; Deut. 23:10, 11
      marker-yv: yv-n
    - type: text
      text: '‘If any man has an emission of semen, then he shall wash all his body in water, and be unclean until evening. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And any garment and any leather on which there is semen, it shall be washed with water, and be unclean until evening. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also, when a woman lies with a man, and there is an emission of semen, they shall bathe in water, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 19:15; 1 Sam. 21:4; 1 Cor. 6:18)
      marker-yv: yv-n
    - type: text
      text: be unclean until evening.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 12:2
      marker-yv: yv-n
    - type: text
      text: '‘If a woman has a discharge, and the discharge from her body is blood, she shall be set apart seven days; and whoever touches her shall be unclean until evening. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the children of Israel, and say to them: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 22:4; Num. 5:2; 2 Sam. 3:29
      marker-yv: yv-n
    - type: text
      text: '‘When any man has a discharge from his body, his discharge is unclean. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Everything that she lies on during her impurity shall be unclean; also everything that she sits on shall be unclean. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whoever touches her bed shall wash his clothes and bathe in water, and be unclean until evening. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And whoever touches anything that she sat on shall wash his clothes and bathe in water, and be unclean until evening. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If anything is on her bed or on anything on which she sits, when he touches it, he shall be unclean until evening. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:19; 20:18
      marker-yv: yv-n
    - type: text
      text: if any man lies with her at all, so that her impurity is on him, he shall be unclean seven days; and every bed on which he lies shall be unclean.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘If '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 9:20; Mark 5:25; Luke 8:43
      marker-yv: yv-n
    - type: text
      text: 'a woman has a discharge of blood for many days, other than at the time of her customary impurity, or if it runs beyond her usual time of impurity, all the days of her unclean discharge shall be as the days of her customary impurity. She shall be unclean. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every bed on which she lies all the days of her discharge shall be to her as the bed of her impurity; and whatever she sits on shall be unclean, as the uncleanness of her impurity. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whoever touches those things shall be unclean; he shall wash his clothes and bathe in water, and be unclean until evening.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:13–15
      marker-yv: yv-n
    - type: text
      text: 'if she is cleansed of her discharge, then she shall count for herself seven days, and after that she shall be clean. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And on the eighth day she shall take for herself two turtledoves or two young pigeons, and bring them to the priest, to the door of the tabernacle of meeting. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this shall be his uncleanness in regard to his discharge—whether his body runs with his discharge, or his body is stopped up by his discharge, it is his uncleanness. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the priest shall offer the one as a sin offering and the other as a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:7
      marker-yv: yv-n
    - type: text
      text: 'burnt offering, and the priest shall make atonement for her before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for the discharge of her uncleanness.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Thus you shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:47; 14:57; 22:2; Deut. 24:8; Ezek. 44:23; (Heb. 12:15)
      marker-yv: yv-n
    - type: text
      text: 'separate the children of Israel from their uncleanness, lest they die in their uncleanness when they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 20:3; Num. 5:3; 19:13, 20; Ezek. 5:11; 23:38; 36:17
      marker-yv: yv-n
    - type: text
      text: 'defile My tabernacle that is among them. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:2
      marker-yv: yv-n
    - type: text
      text: 'This is the law for one who has a discharge, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:16
      marker-yv: yv-n
    - type: text
      text: 'and for him who emits semen and is unclean thereby, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:19
      marker-yv: yv-n
    - type: text
      text: 'and for her who is indisposed because of her customary impurity, and for one who has a discharge, either man '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:25
      marker-yv: yv-n
    - type: text
      text: 'or woman, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:24
      marker-yv: yv-n
    - type: text
      text: and for him who lies with her who is unclean.’ ”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every bed is unclean on which he who has the discharge lies, and everything on which he sits shall be unclean. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And whoever '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:2; 14:46
      marker-yv: yv-n
    - type: text
      text: 'touches his bed shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:8, 47
      marker-yv: yv-n
    - type: text
      text: 'wash his clothes and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:25; 17:15
      marker-yv: yv-n
    - type: text
      text: 'bathe in water, and be unclean until evening. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He who sits on anything on which he who has the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:10; Deut. 23:10
      marker-yv: yv-n
    - type: text
      text: 'discharge sat shall wash his clothes and bathe in water, and be unclean until evening. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he who touches the body of him who has the discharge shall wash his clothes and bathe in water, and be unclean until evening. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If he who has the discharge '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 12:14
      marker-yv: yv-n
    - type: text
      text: 'spits on him who is clean, then he shall wash his clothes and bathe in water, and be unclean until evening. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Any saddle on which he who has the discharge rides shall be unclean. '
