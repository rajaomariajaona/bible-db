document_id: PRO.23,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When you sit down to eat with a ruler,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Consider carefully what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' before you;'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Do not remove the ancient landmark,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor enter the fields of the fatherless;
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 22:23
      marker-yv: yv-n
    - type: text
      text: 'For their Redeemer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' mighty;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will plead their cause against you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Apply your heart to instruction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your ears to words of knowledge.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 13:24
      marker-yv: yv-n
    - type: text
      text: Do not withhold correction from a child,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: if
    - type: text
      text: ' you beat him with a rod, he will not die.'
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: You shall beat him with a rod,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And deliver his soul from hell.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: My son, if your heart is wise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My heart will rejoice—indeed, I myself;
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Yes, my inmost being will rejoice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When your lips speak right things.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:1; Prov. 24:1, 19
      marker-yv: yv-n
    - type: text
      text: Do not let your heart envy sinners,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 28:14
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: zealous
    - type: text
      text: ' for the fear of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' all the day;'
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 37:37)
      marker-yv: yv-n
    - type: text
      text: For surely there is a hereafter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your hope will not be cut off.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Hear, my son, and be wise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And guide your heart in the way.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: And put a knife to your throat
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a man given to appetite.'
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 20:1; 23:29, 30; Is. 5:22; Matt. 24:49; (Luke 21:34); Rom. 13:13; (Eph. 5:18)
      marker-yv: yv-n
    - type: text
      text: Do not mix with winebibbers,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Or
    - type: text
      text: ' with gluttonous eaters of meat;'
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: For the drunkard and the glutton will come to poverty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And drowsiness will clothe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' with rags.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 1:8; Eph. 6:1
      marker-yv: yv-n
    - type: text
      text: Listen to your father who begot you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And do not despise your mother when she is old.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 4:7; 18:15; (Matt. 13:44)
      marker-yv: yv-n
    - type: text
      text: 'Buy the truth, and do not sell '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Also
    - type: text
      text: ' wisdom and instruction and understanding.'
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 10:1
      marker-yv: yv-n
    - type: text
      text: The father of the righteous will greatly rejoice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he who begets a wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: child
    - type: text
      text: ' will delight in him.'
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Let your father and your mother be glad,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let her who bore you rejoice.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: My son, give me your heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let your eyes observe my ways.
  '27':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 22:14
      marker-yv: yv-n
    - type: text
      text: 'For a harlot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a deep pit,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And a seductress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a narrow well.'
  '28':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 7:12; Eccl. 7:26
      marker-yv: yv-n
    - type: text
      text: 'She also lies in wait as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' a victim,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And increases the unfaithful among men.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 5:11, 22
      marker-yv: yv-n
    - type: text
      text: Who has woe?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who has sorrow?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who has contentions?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who has complaints?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who has wounds without cause?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 49:12
      marker-yv: yv-n
    - type: text
      text: has redness of eyes?
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Do not desire his delicacies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' deceptive food.'
  '30':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 25:36; Prov. 20:1; 21:17; Is. 5:11; 28:7; (Eph. 5:18)
      marker-yv: yv-n
    - type: text
      text: Those who linger long at the wine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Those who go in search of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 75:8
      marker-yv: yv-n
    - type: text
      text: mixed wine.
  '31':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Do not look on the wine when it is red,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When it sparkles in the cup,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: When
    - type: text
      text: ' it swirls around smoothly;'
  '32':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: At the last it bites like a serpent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And stings like a viper.
  '33':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Your eyes will see strange things,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your heart will utter perverse things.
  '34':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Yes, you will be like one who lies down in the midst of the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or like one who lies at the top of the mast, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'saying:'
  '35':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: “They
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 27:22; Jer. 5:3
      marker-yv: yv-n
    - type: text
      text: ' have struck me, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' I was not hurt;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They have beaten me, but I did not feel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 4:19
      marker-yv: yv-n
    - type: text
      text: 'I awake, that I may seek another '
    - type: usfm
      marker: it
      children:
      - type: text
        text: drink?
    - type: text
      text: ”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 28:20; Matt. 6:19; 1 Tim. 6:9, 10; Heb. 13:5)
      marker-yv: yv-n
    - type: text
      text: Do not overwork to be rich;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:16
      marker-yv: yv-n
    - type: text
      text: Because of your own understanding, cease!
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Will you set your eyes on that which is not?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: riches
    - type: text
      text: ' certainly make themselves wings;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They fly away like an eagle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: toward
    - type: text
      text: ' heaven.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Do not eat the bread of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 15:9; Prov. 28:22
      marker-yv: yv-n
    - type: text
      text: a miser,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor desire his delicacies;
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For as he thinks in his heart, so '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' he.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“Eat and drink!” '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 12:2
      marker-yv: yv-n
    - type: text
      text: he says to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But his heart is not with you.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The morsel you have eaten, you will vomit up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And waste your pleasant words.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 9:8; Matt. 7:6
      marker-yv: yv-n
    - type: text
      text: Do not speak in the hearing of a fool,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For he will despise the wisdom of your words.
