document_id: MAT.2,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Wise Men from the East
  - type: text
    content: 'Now after '
  - type: note
    content: Mic. 5:2; Luke 2:4–7
  - type: text
    content: 'Jesus was born in Bethlehem of Judea in the days of Herod the king, behold, wise men '
  - type: note
    content: Gen. 25:6; 1 Kin. 4:30
  - type: text
    content: 'from the East came to Jerusalem, '
  '10':
  - type: text
    content: 'When they saw the star, they rejoiced with exceedingly great joy. '
  '11':
  - type: text
    content: 'And when they had come into the house, they saw the young Child with Mary His mother, and fell down and worshiped Him. And when they had opened their treasures, '
  - type: note
    content: Ps. 72:10; Is. 60:6
  - type: text
    content: 'they presented gifts to Him: gold, frankincense, and myrrh.'
  '12':
  - type: text
    content: 'Then, being divinely warned '
  - type: note
    content: (Job 33:15, 16); Matt. 1:20
  - type: text
    content: in a dream that they should not return to Herod, they departed for their own country another way.
  - type: heading
    content: The Flight into Egypt
  '13':
  - type: text
    content: Now when they had departed, behold, an angel of the Lord appeared to Joseph in a dream, saying, “Arise, take the young Child and His mother, flee to Egypt, and stay there until I bring you word; for Herod will seek the young Child to destroy Him.”
  '14':
  - type: text
    content: 'When he arose, he took the young Child and His mother by night and departed for Egypt, '
  '15':
  - type: text
    content: 'and was there until the death of Herod, that it might be fulfilled which was spoken by the Lord through the prophet, saying, '
  - type: note
    content: Num. 24:8; Hos. 11:1
  - type: text
    content: “Out of Egypt I called My Son.”
  - type: heading
    content: Massacre of the Innocents
  '16':
  - type: text
    content: 'Then Herod, when he saw that he was deceived by the wise men, was exceedingly angry; and he sent forth and put to death all the male children who were in Bethlehem and in all its districts, from two years old and under, according to the time which he had determined from the wise men. '
  '17':
  - type: text
    content: 'Then was fulfilled what was spoken by Jeremiah the prophet, saying:'
  '18':
  - type: text
    content: '“A '
  - type: note
    content: Jer. 31:15
  - type: text
    content: voice was heard in Ramah,
  - type: text
    content: Lamentation, weeping, and great mourning,
  - type: text
    content: 'Rachel weeping '
  - type: text
    content: for
  - type: text
    content: ' her children,'
  - type: text
    content: Refusing to be comforted,
  - type: text
    content: Because they are no more.”
  - type: heading
    content: The Home in Nazareth
  '19':
  - type: text
    content: 'Now when Herod was dead, behold, an angel of the Lord appeared in a dream to Joseph in Egypt, '
  '2':
  - type: text
    content: 'saying, '
  - type: note
    content: Luke 2:11
  - type: text
    content: '“Where is He who has been born King of the Jews? For we have seen '
  - type: note
    content: (Num. 24:17; Is. 60:3)
  - type: text
    content: His star in the East and have come to worship Him.”
  '20':
  - type: note
    content: Luke 2:39
  - type: text
    content: 'saying, “Arise, take the young Child and His mother, and go to the land of Israel, for those who '
  - type: note
    content: Matt. 2:16
  - type: text
    content: 'sought the young Child’s life are dead.” '
  '21':
  - type: text
    content: Then he arose, took the young Child and His mother, and came into the land of Israel.
  '22':
  - type: text
    content: 'But when he heard that Archelaus was reigning over Judea instead of his father Herod, he was afraid to go there. And being warned by God in a '
  - type: note
    content: Matt. 2:12, 13, 19
  - type: text
    content: 'dream, he turned aside '
  - type: note
    content: Matt. 3:13; Luke 2:39
  - type: text
    content: 'into the region of Galilee. '
  '23':
  - type: text
    content: 'And he came and dwelt in a city called '
  - type: note
    content: Luke 1:26; 2:39; John 1:45, 46
  - type: text
    content: 'Nazareth, that it might be fulfilled '
  - type: note
    content: Judg. 13:5
  - type: text
    content: which was spoken by the prophets, “He shall be called a Nazarene.”
  '3':
  - type: text
    content: 'When Herod the king heard '
  - type: text
    content: this,
  - type: text
    content: ' he was troubled, and all Jerusalem with him. '
  '4':
  - type: text
    content: 'And when he had gathered all '
  - type: note
    content: 2 Chr. 36:14
  - type: text
    content: 'the chief priests and '
  - type: note
    content: 2 Chr. 34:13
  - type: text
    content: 'scribes of the people together, '
  - type: note
    content: Mal. 2:7
  - type: text
    content: he inquired of them where the Christ was to be born.
  '5':
  - type: text
    content: 'So they said to him, “In Bethlehem of Judea, for thus it is written by the prophet:'
  '6':
  - type: text
    content: ‘But
  - type: note
    content: Mic. 5:2; John 7:42
  - type: text
    content: ' you, Bethlehem, '
  - type: text
    content: in
  - type: text
    content: ' the land of Judah,'
  - type: text
    content: Are not the least among the rulers of Judah;
  - type: text
    content: For out of you shall come a Ruler
  - type: note
    content: Gen. 49:10; (Rev. 2:27)
  - type: text
    content: Who will shepherd My people Israel.’ ”
  '7':
  - type: text
    content: 'Then Herod, when he had secretly called the wise men, determined from them what time the '
  - type: note
    content: Num. 24:17
  - type: text
    content: 'star appeared. '
  '8':
  - type: text
    content: 'And he sent them to Bethlehem and said, “Go and search carefully for the young Child, and when you have found '
  - type: text
    content: Him,
  - type: text
    content: ' bring back word to me, that I may come and worship Him also.”'
  '9':
  - type: text
    content: 'When they heard the king, they departed; and behold, the star which they had seen in the East went before them, till it came and stood over where the young Child was. '
