      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now after '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mic. 5:2; Luke 2:4–7
    marker-yv: yv-n
  - type: text
    text: 'Jesus was born in Bethlehem of Judea in the days of Herod the king, behold, wise men '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 25:6; 1 Kin. 4:30
    marker-yv: yv-n
  - type: text
    text: 'from the East came to Jerusalem, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 2:11
    marker-yv: yv-n
  - type: text
    text: '“Where is He who has been born King of the Jews? For we have seen '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Num. 24:17; Is. 60:3)
    marker-yv: yv-n
  - type: text
    text: His star in the East and have come to worship Him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When Herod the king heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this,
  - type: text
    text: ' he was troubled, and all Jerusalem with him. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when he had gathered all '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 36:14
    marker-yv: yv-n
  - type: text
    text: 'the chief priests and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 34:13
    marker-yv: yv-n
  - type: text
    text: 'scribes of the people together, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mal. 2:7
    marker-yv: yv-n
  - type: text
    text: he inquired of them where the Christ was to be born.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So they said to him, “In Bethlehem of Judea, for thus it is written by the prophet:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ‘But
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mic. 5:2; John 7:42
    marker-yv: yv-n
  - type: text
    text: ' you, Bethlehem, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' the land of Judah,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Are not the least among the rulers of Judah;
- type: usfm
  marker: q2
  children:
  - type: text
    text: For out of you shall come a Ruler
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 49:10; (Rev. 2:27)
    marker-yv: yv-n
  - type: text
    text: Who will shepherd My people Israel.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Herod, when he had secretly called the wise men, determined from them what time the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 24:17
    marker-yv: yv-n
  - type: text
    text: 'star appeared. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he sent them to Bethlehem and said, “Go and search carefully for the young Child, and when you have found '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him,
  - type: text
    text: ' bring back word to me, that I may come and worship Him also.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When they heard the king, they departed; and behold, the star which they had seen in the East went before them, till it came and stood over where the young Child was. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When they saw the star, they rejoiced with exceedingly great joy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And when they had come into the house, they saw the young Child with Mary His mother, and fell down and worshiped Him. And when they had opened their treasures, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 72:10; Is. 60:6
    marker-yv: yv-n
  - type: text
    text: 'they presented gifts to Him: gold, frankincense, and myrrh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then, being divinely warned '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Job 33:15, 16); Matt. 1:20
    marker-yv: yv-n
  - type: text
    text: in a dream that they should not return to Herod, they departed for their own country another way.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Flight into Egypt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Now when they had departed, behold, an angel of the Lord appeared to Joseph in a dream, saying, “Arise, take the young Child and His mother, flee to Egypt, and stay there until I bring you word; for Herod will seek the young Child to destroy Him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When he arose, he took the young Child and His mother by night and departed for Egypt, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and was there until the death of Herod, that it might be fulfilled which was spoken by the Lord through the prophet, saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 24:8; Hos. 11:1
    marker-yv: yv-n
  - type: text
    text: “Out of Egypt I called My Son.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Massacre of the Innocents
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Herod, when he saw that he was deceived by the wise men, was exceedingly angry; and he sent forth and put to death all the male children who were in Bethlehem and in all its districts, from two years old and under, according to the time which he had determined from the wise men. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then was fulfilled what was spoken by Jeremiah the prophet, saying:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“A '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 31:15
    marker-yv: yv-n
  - type: text
    text: voice was heard in Ramah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Lamentation, weeping, and great mourning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Rachel weeping '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for
  - type: text
    text: ' her children,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Refusing to be comforted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because they are no more.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Home in Nazareth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now when Herod was dead, behold, an angel of the Lord appeared in a dream to Joseph in Egypt, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 2:39
    marker-yv: yv-n
  - type: text
    text: 'saying, “Arise, take the young Child and His mother, and go to the land of Israel, for those who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 2:16
    marker-yv: yv-n
  - type: text
    text: 'sought the young Child’s life are dead.” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then he arose, took the young Child and His mother, and came into the land of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But when he heard that Archelaus was reigning over Judea instead of his father Herod, he was afraid to go there. And being warned by God in a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 2:12, 13, 19
    marker-yv: yv-n
  - type: text
    text: 'dream, he turned aside '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 3:13; Luke 2:39
    marker-yv: yv-n
  - type: text
    text: 'into the region of Galilee. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he came and dwelt in a city called '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 1:26; 2:39; John 1:45, 46
    marker-yv: yv-n
  - type: text
    text: 'Nazareth, that it might be fulfilled '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 13:5
    marker-yv: yv-n
  - type: text
    text: which was spoken by the prophets, “He shall be called a Nazarene.”
