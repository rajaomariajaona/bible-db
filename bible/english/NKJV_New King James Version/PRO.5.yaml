document_id: PRO.5,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Peril of Adultery
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My son, pay attention to my wisdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lend your ear to my understanding,
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lest aliens be filled with your wealth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And your labors '
    - type: usfm
      marker: it
      children:
      - type: text
        text: go
    - type: text
      text: ' to the house of a foreigner;'
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And you mourn at last,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When your flesh and your body are consumed,
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And say:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “How I have hated instruction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my heart despised correction!
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have not obeyed the voice of my teachers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor inclined my ear to those who instructed me!
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I was on the verge of total ruin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the midst of the assembly and congregation.”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drink water from your own cistern,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And running water from your own well.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Should your fountains be dispersed abroad,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Streams of water in the streets?
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them be only your own,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And not for strangers with you.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let your fountain be blessed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And rejoice with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 24:5; Eccl. 9:9; Mal. 2:14
      marker-yv: yv-n
    - type: text
      text: the wife of your youth.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Song 2:9
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a
    - type: text
      text: ' loving deer and a graceful doe,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let her breasts satisfy you at all times;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And always be enraptured with her love.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That you may preserve discretion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And your lips '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 2:7
      marker-yv: yv-n
    - type: text
      text: may keep knowledge.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For why should you, my son, be enraptured by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 2:16
      marker-yv: yv-n
    - type: text
      text: an immoral woman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And be embraced in the arms of a seductress?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 16:9; Job 31:4; 34:21; Prov. 15:3; Jer. 16:17; 32:19; Hos. 7:2; Heb. 4:13
      marker-yv: yv-n
    - type: text
      text: 'For the ways of man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' before the eyes of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And He ponders all his paths.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:23; Ps. 9:5; Prov. 1:31; Is. 3:11
      marker-yv: yv-n
    - type: text
      text: 'His own iniquities entrap the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he is caught in the cords of his sin.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 4:21
      marker-yv: yv-n
    - type: text
      text: He shall die for lack of instruction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in the greatness of his folly he shall go astray.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 2:16
      marker-yv: yv-n
    - type: text
      text: For the lips of an immoral woman drip honey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And her mouth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 55:21
      marker-yv: yv-n
    - type: text
      text: smoother than oil;
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But in the end she is bitter as wormwood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sharp as a two-edged sword.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Her feet go down to death,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 7:27
      marker-yv: yv-n
    - type: text
      text: Her steps lay hold of hell.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Lest you ponder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' path of life—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Her ways are unstable;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You do not know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore hear me now, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' children,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And do not depart from the words of my mouth.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Remove your way far from her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And do not go near the door of her house,
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lest you give your honor to others,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And your years to the cruel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one;
