document_id: ROM.6,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Dead to Sin, Alive to God
  - type: text
    content: 'What shall we say then? '
  - type: note
    content: Rom. 3:8; 6:15
  - type: text
    content: 'Shall we continue in sin that grace may abound? '
  '10':
  - type: text
    content: 'For '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: death
  - type: text
    content: ' that He died, '
  - type: note
    content: Heb. 9:27
  - type: text
    content: 'He died to sin once for all; but '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: life
  - type: text
    content: ' that He lives, '
  - type: note
    content: Luke 20:38
  - type: text
    content: 'He lives to God. '
  '11':
  - type: text
    content: 'Likewise you also, reckon yourselves to be '
  - type: note
    content: (Rom. 6:2; 7:4, 6)
  - type: text
    content: 'dead indeed to sin, but '
  - type: note
    content: (Gal. 2:19; Col. 2:20; 3:3); 1 Pet. 2:24
  - type: text
    content: alive to God in Christ Jesus our Lord.
  '12':
  - type: note
    content: Ps. 19:13
  - type: text
    content: 'Therefore do not let sin reign in your mortal body, that you should obey it in its lusts. '
  '13':
  - type: text
    content: 'And do not present your '
  - type: note
    content: Rom. 6:16, 19; 7:5; Col. 3:5; James 4:1
  - type: text
    content: 'members '
  - type: text
    content: as
  - type: text
    content: ' instruments of unrighteousness to sin, but '
  - type: note
    content: Rom. 12:1; 2 Cor. 5:14; 1 Pet. 2:24; 4:2
  - type: text
    content: 'present yourselves to God as being alive from the dead, and your members '
  - type: text
    content: as
  - type: text
    content: ' instruments of righteousness to God. '
  '14':
  - type: text
    content: 'For '
  - type: note
    content: (Rom. 7:4, 6; 8:2; Gal. 5:18)
  - type: text
    content: sin shall not have dominion over you, for you are not under law but under grace.
  - type: heading
    content: From Slaves of Sin to Slaves of God
  '15':
  - type: text
    content: 'What then? Shall we sin '
  - type: note
    content: 1 Cor. 9:21
  - type: text
    content: 'because we are not under law but under grace? Certainly not! '
  '16':
  - type: text
    content: 'Do you not know that '
  - type: note
    content: Prov. 5:22; (Matt. 6:24); John 8:34; 2 Pet. 2:19
  - type: text
    content: 'to whom you present yourselves slaves to obey, you are that one’s slaves whom you obey, whether of sin '
  - type: text
    content: leading
  - type: text
    content: ' to death, or of obedience '
  - type: text
    content: leading
  - type: text
    content: ' to righteousness? '
  '17':
  - type: text
    content: 'But God be thanked that '
  - type: text
    content: though
  - type: text
    content: ' you were slaves of sin, yet you obeyed from the heart '
  - type: note
    content: 2 Tim. 1:13
  - type: text
    content: 'that form of doctrine to which you were delivered. '
  '18':
  - type: text
    content: 'And '
  - type: note
    content: John 8:32; Rom. 6:22; 8:2; 1 Cor. 7:22; Gal. 5:1; 1 Pet. 2:16
  - type: text
    content: 'having been set free from sin, you became slaves of righteousness. '
  '19':
  - type: text
    content: 'I speak in human '
  - type: text
    content: terms
  - type: text
    content: ' because of the weakness of your flesh. For just as you presented your members '
  - type: text
    content: as
  - type: text
    content: ' slaves of uncleanness, and of lawlessness '
  - type: text
    content: leading
  - type: text
    content: ' to '
  - type: text
    content: more
  - type: text
    content: ' lawlessness, so now present your members '
  - type: text
    content: as
  - type: text
    content: ' slaves '
  - type: text
    content: of
  - type: text
    content: ' righteousness for holiness.'
  '2':
  - type: text
    content: 'Certainly not! How shall we who '
  - type: note
    content: (Rom. 6:11; 7:4, 6; Gal. 2:19; Col. 2:20; 3:3); 1 Pet. 2:24
  - type: text
    content: 'died to sin live any longer in it? '
  '20':
  - type: text
    content: 'For when you were '
  - type: note
    content: John 8:34
  - type: text
    content: 'slaves of sin, you were free in regard to righteousness. '
  '21':
  - type: note
    content: Jer. 12:13; Ezek. 16:63; Rom. 7:5
  - type: text
    content: 'What fruit did you have then in the things of which you are now ashamed? For '
  - type: note
    content: Rom. 1:32; Gal. 6:8
  - type: text
    content: 'the end of those things '
  - type: text
    content: is
  - type: text
    content: ' death. '
  '22':
  - type: text
    content: 'But now '
  - type: note
    content: (John 8:32); Rom. 6:18; 8:2
  - type: text
    content: 'having been set free from sin, and having become slaves of God, you have your fruit to holiness, and the end, everlasting life. '
  '23':
  - type: text
    content: 'For '
  - type: note
    content: Gen. 2:17
  - type: text
    content: 'the wages of sin '
  - type: text
    content: is
  - type: text
    content: ' death, but '
  - type: note
    content: Rom. 2:7; 1 Pet. 1:4
  - type: text
    content: 'the gift of God '
  - type: text
    content: is
  - type: text
    content: ' eternal life in Christ Jesus our Lord.'
  '3':
  - type: text
    content: 'Or do you not know that '
  - type: note
    content: Acts 2:38; 8:16; 19:5; (Gal. 3:27); Col. 2:12
  - type: text
    content: 'as many of us as were baptized into Christ Jesus '
  - type: note
    content: (1 Cor. 15:29)
  - type: text
    content: 'were baptized into His death? '
  '4':
  - type: text
    content: 'Therefore we were '
  - type: note
    content: Col. 2:12
  - type: text
    content: 'buried with Him through baptism into death, that '
  - type: note
    content: 1 Cor. 6:14
  - type: text
    content: 'just as Christ was raised from the dead by '
  - type: note
    content: John 2:11
  - type: text
    content: 'the glory of the Father, '
  - type: note
    content: Rom. 7:6; (2 Cor. 5:17; Gal. 6:15; Eph. 4:23; Col. 3:10)
  - type: text
    content: even so we also should walk in newness of life.
  '5':
  - type: note
    content: 2 Cor. 4:10; Phil. 3:10; Col. 2:12; 3:1
  - type: text
    content: 'For if we have been united together in the likeness of His death, certainly we also shall be '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: likeness
  - type: text
    content: ' of '
  - type: text
    content: His
  - type: text
    content: ' resurrection, '
  '6':
  - type: text
    content: 'knowing this, that '
  - type: note
    content: Gal. 2:20; 5:24; 6:14
  - type: text
    content: 'our old man was crucified with '
  - type: text
    content: Him,
  - type: text
    content: ' that '
  - type: note
    content: Col. 2:11
  - type: text
    content: 'the body of sin might be done away with, that we should no longer be slaves of sin. '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: 1 Pet. 4:1
  - type: text
    content: 'he who has died has been freed from sin. '
  '8':
  - type: text
    content: 'Now '
  - type: note
    content: Rom. 6:4; 2 Cor. 4:10; 2 Tim. 2:11
  - type: text
    content: 'if we died with Christ, we believe that we shall also live with Him, '
  '9':
  - type: text
    content: 'knowing that '
  - type: note
    content: Rev. 1:18
  - type: text
    content: 'Christ, having been raised from the dead, dies no more. Death no longer has dominion over Him. '
