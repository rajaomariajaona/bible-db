document_id: ROM.6,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dead to Sin, Alive to God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What shall we say then? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 3:8; 6:15
      marker-yv: yv-n
    - type: text
      text: 'Shall we continue in sin that grace may abound? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: death
    - type: text
      text: ' that He died, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 9:27
      marker-yv: yv-n
    - type: text
      text: 'He died to sin once for all; but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: life
    - type: text
      text: ' that He lives, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 20:38
      marker-yv: yv-n
    - type: text
      text: 'He lives to God. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Likewise you also, reckon yourselves to be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 6:2; 7:4, 6)
      marker-yv: yv-n
    - type: text
      text: 'dead indeed to sin, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gal. 2:19; Col. 2:20; 3:3); 1 Pet. 2:24
      marker-yv: yv-n
    - type: text
      text: alive to God in Christ Jesus our Lord.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 19:13
      marker-yv: yv-n
    - type: text
      text: 'Therefore do not let sin reign in your mortal body, that you should obey it in its lusts. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And do not present your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 6:16, 19; 7:5; Col. 3:5; James 4:1
      marker-yv: yv-n
    - type: text
      text: 'members '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' instruments of unrighteousness to sin, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:1; 2 Cor. 5:14; 1 Pet. 2:24; 4:2
      marker-yv: yv-n
    - type: text
      text: 'present yourselves to God as being alive from the dead, and your members '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' instruments of righteousness to God. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 7:4, 6; 8:2; Gal. 5:18)
      marker-yv: yv-n
    - type: text
      text: sin shall not have dominion over you, for you are not under law but under grace.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: From Slaves of Sin to Slaves of God
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What then? Shall we sin '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 9:21
      marker-yv: yv-n
    - type: text
      text: 'because we are not under law but under grace? Certainly not! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you not know that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 5:22; (Matt. 6:24); John 8:34; 2 Pet. 2:19
      marker-yv: yv-n
    - type: text
      text: 'to whom you present yourselves slaves to obey, you are that one’s slaves whom you obey, whether of sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leading
    - type: text
      text: ' to death, or of obedience '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leading
    - type: text
      text: ' to righteousness? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But God be thanked that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: though
    - type: text
      text: ' you were slaves of sin, yet you obeyed from the heart '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 1:13
      marker-yv: yv-n
    - type: text
      text: 'that form of doctrine to which you were delivered. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 8:32; Rom. 6:22; 8:2; 1 Cor. 7:22; Gal. 5:1; 1 Pet. 2:16
      marker-yv: yv-n
    - type: text
      text: 'having been set free from sin, you became slaves of righteousness. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I speak in human '
    - type: usfm
      marker: it
      children:
      - type: text
        text: terms
    - type: text
      text: ' because of the weakness of your flesh. For just as you presented your members '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' slaves of uncleanness, and of lawlessness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leading
    - type: text
      text: ' to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: more
    - type: text
      text: ' lawlessness, so now present your members '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' slaves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' righteousness for holiness.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certainly not! How shall we who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 6:11; 7:4, 6; Gal. 2:19; Col. 2:20; 3:3); 1 Pet. 2:24
      marker-yv: yv-n
    - type: text
      text: 'died to sin live any longer in it? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For when you were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 8:34
      marker-yv: yv-n
    - type: text
      text: 'slaves of sin, you were free in regard to righteousness. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 12:13; Ezek. 16:63; Rom. 7:5
      marker-yv: yv-n
    - type: text
      text: 'What fruit did you have then in the things of which you are now ashamed? For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:32; Gal. 6:8
      marker-yv: yv-n
    - type: text
      text: 'the end of those things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' death. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 8:32); Rom. 6:18; 8:2
      marker-yv: yv-n
    - type: text
      text: 'having been set free from sin, and having become slaves of God, you have your fruit to holiness, and the end, everlasting life. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 2:17
      marker-yv: yv-n
    - type: text
      text: 'the wages of sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' death, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 2:7; 1 Pet. 1:4
      marker-yv: yv-n
    - type: text
      text: 'the gift of God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' eternal life in Christ Jesus our Lord.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or do you not know that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:38; 8:16; 19:5; (Gal. 3:27); Col. 2:12
      marker-yv: yv-n
    - type: text
      text: 'as many of us as were baptized into Christ Jesus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 15:29)
      marker-yv: yv-n
    - type: text
      text: 'were baptized into His death? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore we were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 2:12
      marker-yv: yv-n
    - type: text
      text: 'buried with Him through baptism into death, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 6:14
      marker-yv: yv-n
    - type: text
      text: 'just as Christ was raised from the dead by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 2:11
      marker-yv: yv-n
    - type: text
      text: 'the glory of the Father, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 7:6; (2 Cor. 5:17; Gal. 6:15; Eph. 4:23; Col. 3:10)
      marker-yv: yv-n
    - type: text
      text: even so we also should walk in newness of life.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 4:10; Phil. 3:10; Col. 2:12; 3:1
      marker-yv: yv-n
    - type: text
      text: 'For if we have been united together in the likeness of His death, certainly we also shall be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: likeness
    - type: text
      text: ' of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' resurrection, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'knowing this, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 2:20; 5:24; 6:14
      marker-yv: yv-n
    - type: text
      text: 'our old man was crucified with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him,
    - type: text
      text: ' that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 2:11
      marker-yv: yv-n
    - type: text
      text: 'the body of sin might be done away with, that we should no longer be slaves of sin. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Pet. 4:1
      marker-yv: yv-n
    - type: text
      text: 'he who has died has been freed from sin. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 6:4; 2 Cor. 4:10; 2 Tim. 2:11
      marker-yv: yv-n
    - type: text
      text: 'if we died with Christ, we believe that we shall also live with Him, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'knowing that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 1:18
      marker-yv: yv-n
    - type: text
      text: 'Christ, having been raised from the dead, dies no more. Death no longer has dominion over Him. '
