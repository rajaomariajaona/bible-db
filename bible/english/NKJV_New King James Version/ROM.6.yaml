  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' slaves of uncleanness, and of lawlessness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: leading
  - type: text
    text: ' to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: more
  - type: text
    text: ' lawlessness, so now present your members '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' slaves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' righteousness for holiness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
