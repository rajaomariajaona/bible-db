    marker: x
    children:
    - type: text
      text: Job 3:11–22; Eccl. 6:3; Luke 23:29
    marker-yv: yv-n
  - type: text
    text: 'Yet, better than both '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
