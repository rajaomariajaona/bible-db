- type: usfm
  marker: s1
  children:
  - type: text
    text: The Vanity of Selfish Toil
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Again, I saw that for all toil and every skillful work a man is envied by his neighbor. This also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' vanity and grasping for the wind.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 6:10; 24:33
    marker-yv: yv-n
  - type: text
    text: The fool folds his hands
- type: usfm
  marker: q2
  children:
  - type: text
    text: And consumes his own flesh.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 15:16, 17; 16:8
    marker-yv: yv-n
  - type: text
    text: 'Better a handful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' quietness'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Than both hands full, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: together
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' toil and grasping for the wind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then I returned, and I saw vanity under the sun:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'There is one alone, without companion:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has neither son nor brother.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' no end to all his labors,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Nor is his '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 27:20; Eccl. 5:10; (1 John 2:16)
    marker-yv: yv-n
  - type: text
    text: eye satisfied with riches.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: But
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 39:6
    marker-yv: yv-n
  - type: text
    text: he never asks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: '“For whom do I toil and deprive myself of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eccl. 2:18–21
    marker-yv: yv-n
  - type: text
    text: good?”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'This also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' vanity and a grave misfortune.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Value of a Friend
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Two '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' better than one,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because they have a good reward for their labor.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For if they fall, one will lift up his companion.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But woe to him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' alone when he falls,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: has
  - type: text
    text: ' no one to help him up.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Again, if two lie down together, they will keep warm;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But how can one be warm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: alone?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Though one may be overpowered by another, two can withstand him.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a threefold cord is not quickly broken.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Popularity Passes Away
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Better a poor and wise youth
- type: usfm
  marker: q2
  children:
  - type: text
    text: Than an old and foolish king who will be admonished no more.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For he comes out of prison to be king,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Although he was born poor in his kingdom.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I saw all the living who walk under the sun;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They were with the second youth who stands in his place.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: it
    children:
    - type: text
      text: There
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' no end of all the people over whom he was made king;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yet those who come afterward will not rejoice in him.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Surely this also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' vanity and grasping for the wind.'
