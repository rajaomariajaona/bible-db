document_id: 2CH.15,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Reforms of Asa
  - type: text
    content: 'Now '
  - type: note
    content: Num. 24:2; Judg. 3:10; 2 Chr. 20:14; 24:20
  - type: text
    content: 'the Spirit of God came upon Azariah the son of Oded. '
  '10':
  - type: text
    content: 'So they gathered together at Jerusalem in the third month, in the fifteenth year of the reign of Asa. '
  '11':
  - type: note
    content: 2 Chr. 14:13–15
  - type: text
    content: 'And they offered to the '
  - type: heading
    content: Lord
  - type: text
    content: ' at that time seven hundred bulls and seven thousand sheep from the spoil they had brought. '
  '12':
  - type: text
    content: 'Then they '
  - type: note
    content: 2 Kin. 23:3; 2 Chr. 23:16; 34:31; Neh. 10:29
  - type: text
    content: 'entered into a covenant to seek the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of their fathers with all their heart and with all their soul; '
  '13':
  - type: note
    content: Ex. 22:20
  - type: text
    content: 'and whoever would not seek the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel '
  - type: note
    content: Deut. 13:5–15
  - type: text
    content: 'was to be put to death, whether small or great, whether man or woman. '
  '14':
  - type: text
    content: 'Then they took an oath before the '
  - type: heading
    content: Lord
  - type: text
    content: ' with a loud voice, with shouting and trumpets and rams’ horns. '
  '15':
  - type: text
    content: 'And all Judah rejoiced at the oath, for they had sworn with all their heart and '
  - type: note
    content: 2 Chr. 15:2
  - type: text
    content: 'sought Him with all their soul; and He was found by them, and the '
  - type: heading
    content: Lord
  - type: text
    content: ' gave them '
  - type: note
    content: 2 Chr. 14:7
  - type: text
    content: rest all around.
  '16':
  - type: text
    content: 'Also he removed '
  - type: note
    content: 1 Kin. 15:2, 10, 13
  - type: text
    content: 'Maachah, the mother of Asa the king, from '
  - type: text
    content: being
  - type: text
    content: ' queen mother, because she had made an obscene image of Asherah; and Asa cut down her obscene image, then crushed and burned '
  - type: text
    content: it
  - type: text
    content: ' by the Brook Kidron. '
  '17':
  - type: text
    content: 'But '
  - type: note
    content: 1 Kin. 15:14; 2 Chr. 14:3, 5
  - type: text
    content: the high places were not removed from Israel. Nevertheless the heart of Asa was loyal all his days.
  '18':
  - type: text
    content: 'He also brought into the house of God the things that his father had dedicated and that he himself had dedicated: silver and gold and utensils. '
  '19':
  - type: text
    content: And there was no war until the thirty-fifth year of the reign of Asa.
  '2':
  - type: text
    content: 'And he went out to meet Asa, and said to him: “Hear me, Asa, and all Judah and Benjamin. '
  - type: note
    content: (James 4:8)
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' with you while you are with Him. '
  - type: note
    content: (1 Chr. 28:9); 2 Chr. 14:4; 33:12, 13; (Jer. 29:13; Matt. 7:7)
  - type: text
    content: 'If you seek Him, He will be found by you; but if '
  - type: note
    content: 2 Chr. 24:20
  - type: text
    content: 'you forsake Him, He will forsake you. '
  '3':
  - type: note
    content: Hos. 3:4
  - type: text
    content: 'For a long time Israel '
  - type: text
    content: has
  - type: text
    content: ' '
  - type: text
    content: been
  - type: text
    content: ' without the true God, without a '
  - type: note
    content: 2 Kin. 12:2
  - type: text
    content: 'teaching priest, and without '
  - type: note
    content: Lev. 10:11; 2 Chr. 17:8, 9
  - type: text
    content: 'law; '
  '4':
  - type: text
    content: 'but '
  - type: note
    content: (Deut. 4:29)
  - type: text
    content: 'when in their trouble they turned to the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel, and sought Him, He was found by them. '
  '5':
  - type: text
    content: 'And in those times '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' no peace to the one who went out, nor to the one who came in, but great turmoil '
  - type: text
    content: was
  - type: text
    content: ' on all the inhabitants of the lands. '
  '6':
  - type: note
    content: Matt. 24:7
  - type: text
    content: 'So nation was destroyed by nation, and city by city, for God troubled them with every adversity. '
  '7':
  - type: text
    content: But you, be strong and do not let your hands be weak, for your work shall be rewarded!”
  '8':
  - type: text
    content: 'And when Asa heard these words and the prophecy of Oded the prophet, he took courage, and removed the abominable idols from all the land of Judah and Benjamin and from the cities '
  - type: note
    content: 2 Chr. 13:19
  - type: text
    content: 'which he had taken in the mountains of Ephraim; and he restored the altar of the '
  - type: heading
    content: Lord
  - type: text
    content: ' that '
  - type: text
    content: was
  - type: text
    content: ' before the vestibule of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Then he gathered all Judah and Benjamin, and '
  - type: note
    content: 2 Chr. 11:16
  - type: text
    content: 'those who dwelt with them from Ephraim, Manasseh, and Simeon, for they came over to him in great numbers from Israel when they saw that the '
  - type: heading
    content: Lord
  - type: text
    content: ' his God was with him.'
