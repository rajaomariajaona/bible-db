document_id: 2CH.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Reforms of Asa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 24:2; Judg. 3:10; 2 Chr. 20:14; 24:20
    marker-yv: yv-n
  - type: text
    text: 'the Spirit of God came upon Azariah the son of Oded. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he went out to meet Asa, and said to him: “Hear me, Asa, and all Judah and Benjamin. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (James 4:8)
    marker-yv: yv-n
  - type: text
    text: 'The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' with you while you are with Him. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Chr. 28:9); 2 Chr. 14:4; 33:12, 13; (Jer. 29:13; Matt. 7:7)
    marker-yv: yv-n
  - type: text
    text: 'If you seek Him, He will be found by you; but if '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 24:20
    marker-yv: yv-n
  - type: text
    text: 'you forsake Him, He will forsake you. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Hos. 3:4
    marker-yv: yv-n
  - type: text
    text: 'For a long time Israel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: has
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: been
  - type: text
    text: ' without the true God, without a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 12:2
    marker-yv: yv-n
  - type: text
    text: 'teaching priest, and without '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 10:11; 2 Chr. 17:8, 9
    marker-yv: yv-n
  - type: text
    text: 'law; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 4:29)
    marker-yv: yv-n
  - type: text
    text: 'when in their trouble they turned to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Israel, and sought Him, He was found by them. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And in those times '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' no peace to the one who went out, nor to the one who came in, but great turmoil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' on all the inhabitants of the lands. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 24:7
    marker-yv: yv-n
  - type: text
    text: 'So nation was destroyed by nation, and city by city, for God troubled them with every adversity. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But you, be strong and do not let your hands be weak, for your work shall be rewarded!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And when Asa heard these words and the prophecy of Oded the prophet, he took courage, and removed the abominable idols from all the land of Judah and Benjamin and from the cities '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 13:19
    marker-yv: yv-n
  - type: text
    text: 'which he had taken in the mountains of Ephraim; and he restored the altar of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' before the vestibule of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then he gathered all Judah and Benjamin, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 11:16
    marker-yv: yv-n
  - type: text
    text: 'those who dwelt with them from Ephraim, Manasseh, and Simeon, for they came over to him in great numbers from Israel when they saw that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God was with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So they gathered together at Jerusalem in the third month, in the fifteenth year of the reign of Asa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 14:13–15
    marker-yv: yv-n
  - type: text
    text: 'And they offered to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' at that time seven hundred bulls and seven thousand sheep from the spoil they had brought. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 23:3; 2 Chr. 23:16; 34:31; Neh. 10:29
    marker-yv: yv-n
  - type: text
    text: 'entered into a covenant to seek the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of their fathers with all their heart and with all their soul; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 22:20
    marker-yv: yv-n
  - type: text
    text: 'and whoever would not seek the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Israel '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 13:5–15
    marker-yv: yv-n
  - type: text
    text: 'was to be put to death, whether small or great, whether man or woman. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then they took an oath before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with a loud voice, with shouting and trumpets and rams’ horns. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And all Judah rejoiced at the oath, for they had sworn with all their heart and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 15:2
    marker-yv: yv-n
  - type: text
    text: 'sought Him with all their soul; and He was found by them, and the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave them '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 14:7
    marker-yv: yv-n
  - type: text
    text: rest all around.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Also he removed '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 15:2, 10, 13
    marker-yv: yv-n
  - type: text
    text: 'Maachah, the mother of Asa the king, from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: being
  - type: text
    text: ' queen mother, because she had made an obscene image of Asherah; and Asa cut down her obscene image, then crushed and burned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' by the Brook Kidron. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 15:14; 2 Chr. 14:3, 5
    marker-yv: yv-n
  - type: text
    text: the high places were not removed from Israel. Nevertheless the heart of Asa was loyal all his days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He also brought into the house of God the things that his father had dedicated and that he himself had dedicated: silver and gold and utensils. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And there was no war until the thirty-fifth year of the reign of Asa.
