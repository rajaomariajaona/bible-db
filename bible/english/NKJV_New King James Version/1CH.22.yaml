  - type: text
    content: 'Now, my son, may '
  - type: note
    content: 1 Chr. 22:16
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' be with you; and may you prosper, and build the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, as He has said to you. '
  '12':
  - type: text
    content: 'Only may the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 1 Kin. 3:9–12; 2 Chr. 1:10
  - type: text
    content: 'give you wisdom and understanding, and give you charge concerning Israel, that you may keep the law of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. '
  '13':
  - type: note
    content: (Josh. 1:7, 8); 1 Chr. 28:7
  - type: text
    content: 'Then you will prosper, if you take care to fulfill the statutes and judgments with which the '
  - type: heading
    content: Lord
  - type: text
    content: ' charged Moses concerning Israel. '
  - type: note
    content: (Deut. 31:7, 8; Josh. 1:6, 7, 9; 1 Chr. 28:20)
  - type: text
    content: 'Be strong and of good courage; do not fear nor be dismayed. '
  '14':
  - type: text
    content: 'Indeed I have taken much trouble to prepare for the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' one hundred thousand talents of gold and one million talents of silver, and bronze and iron '
  - type: note
    content: 1 Chr. 22:3
  - type: text
    content: 'beyond measure, for it is so abundant. I have prepared timber and stone also, and you may add to them. '
  '15':
  - type: text
    content: 'Moreover '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' workmen with you in abundance: woodsmen and stonecutters, and all types of skillful men for every kind of work. '
  '16':
  - type: text
    content: 'Of gold and silver and bronze and iron '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' no limit. Arise and begin working, and '
  - type: note
    content: 1 Chr. 22:11
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' be with you.”'
  '17':
  - type: text
    content: 'David also commanded all the '
  - type: note
    content: 1 Chr. 28:1–6
  - type: text
    content: 'leaders of Israel to help Solomon his son, '
  - type: text
    content: saying,
  - type: text
    content: ' '
  '18':
  - type: text
    content: “
  - type: text
    content: Is
  - type: text
    content: ' not the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God with you? '
  - type: note
    content: Deut. 12:10; Josh. 22:4; 2 Sam. 7:1; (1 Kin. 5:4; 8:56)
  - type: text
    content: 'And has He '
  - type: text
    content: not
  - type: text
    content: ' given you rest on every side? For He has given the inhabitants of the land into my hand, and the land is subdued before the '
  - type: heading
    content: Lord
  - type: text
    content: ' and before His people. '
  '19':
  - type: text
    content: 'Now set your heart and your soul to seek the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. Therefore arise and build the sanctuary of the '
  - type: heading
    content: Lord
  - type: text
    content: ' God, to '
  - type: note
    content: 1 Kin. 8:1–11; 2 Chr. 5:2–14
  - type: text
    content: 'bring the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and the holy articles of God into the house that is to be built '
  - type: note
    content: 1 Kin. 5:3
  - type: text
    content: 'for the name of the '
  - type: heading
    content: Lord
  - type: text
    content: .”
  '2':
  - type: text
    content: 'So David commanded to gather the '
  - type: note
    content: 1 Kin. 9:20, 21; 2 Chr. 2:17, 18
  - type: text
    content: 'aliens who '
  - type: text
    content: were
  - type: text
    content: ' in the land of Israel; and he appointed masons to '
  - type: note
    content: 1 Kin. 5:17, 18
  - type: text
    content: 'cut hewn stones to build the house of God. '
  '3':
  - type: text
    content: 'And David prepared iron in abundance for the nails of the doors of the gates and for the joints, and bronze in abundance '
  - type: note
    content: 1 Kin. 7:47; 1 Chr. 22:14
  - type: text
    content: 'beyond measure, '
  '4':
  - type: text
    content: 'and cedar trees in abundance; for the '
  - type: note
    content: 1 Kin. 5:6–10
  - type: text
    content: Sidonians and those from Tyre brought much cedar wood to David.
  '5':
  - type: text
    content: 'Now David said, '
  - type: note
    content: 1 Kin. 3:7; 1 Chr. 29:1, 2
  - type: text
    content: '“Solomon my son '
  - type: text
    content: is
  - type: text
    content: ' young and inexperienced, and the house to be built for the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: must
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' exceedingly magnificent, famous and glorious throughout all countries. I will now make preparation for it.” So David made abundant preparations before his death.'
  '6':
  - type: text
    content: 'Then he called for his son Solomon, and charged him to build a house for the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel. '
  '7':
  - type: text
    content: 'And David said to Solomon: “My son, as for me, '
  - type: note
    content: 2 Sam. 7:1, 2; 1 Kin. 8:17; 1 Chr. 17:1; 28:2
  - type: text
    content: 'it was in my mind to build a house '
  - type: note
    content: Deut. 12:5, 11
  - type: text
    content: 'to the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' my God; '
  '8':
  - type: text
    content: 'but the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to me, saying, '
  - type: note
    content: 2 Sam. 7:5–13; 1 Kin. 5:3; 1 Chr. 28:3
  - type: text
    content: '‘You have shed much blood and have made great wars; you shall not build a house for My name, because you have shed much blood on the earth in My sight. '
  '9':
  - type: note
    content: 1 Chr. 28:5
  - type: text
    content: 'Behold, a son shall be born to you, who shall be a man of rest; and I will give him '
  - type: note
    content: 1 Kin. 4:20, 25; 5:4
  - type: text
    content: 'rest from all his enemies all around. His name shall be Solomon, for I will give peace and quietness to Israel in his days. '
