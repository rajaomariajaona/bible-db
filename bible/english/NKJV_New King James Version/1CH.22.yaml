  - type: text
    text: David Prepares to Build the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then David said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 12:5; 2 Sam. 24:18; 1 Chr. 21:18, 19, 26, 28; 2 Chr. 3:1
    marker-yv: yv-n
  - type: text
    text: '“This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God, and this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the altar of burnt offering for Israel.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So David commanded to gather the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 9:20, 21; 2 Chr. 2:17, 18
    marker-yv: yv-n
  - type: text
    text: 'aliens who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in the land of Israel; and he appointed masons to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:17, 18
    marker-yv: yv-n
  - type: text
    text: 'cut hewn stones to build the house of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And David prepared iron in abundance for the nails of the doors of the gates and for the joints, and bronze in abundance '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 7:47; 1 Chr. 22:14
    marker-yv: yv-n
  - type: text
    text: 'beyond measure, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and cedar trees in abundance; for the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:6–10
    marker-yv: yv-n
  - type: text
    text: Sidonians and those from Tyre brought much cedar wood to David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now David said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 3:7; 1 Chr. 29:1, 2
    marker-yv: yv-n
  - type: text
    text: '“Solomon my son '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' young and inexperienced, and the house to be built for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: must
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' exceedingly magnificent, famous and glorious throughout all countries. I will now make preparation for it.” So David made abundant preparations before his death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then he called for his son Solomon, and charged him to build a house for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And David said to Solomon: “My son, as for me, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 7:1, 2; 1 Kin. 8:17; 1 Chr. 17:1; 28:2
    marker-yv: yv-n
  - type: text
    text: 'it was in my mind to build a house '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 12:5, 11
    marker-yv: yv-n
  - type: text
    text: 'to the name of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but the word of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 7:5–13; 1 Kin. 5:3; 1 Chr. 28:3
    marker-yv: yv-n
  - type: text
    text: '‘You have shed much blood and have made great wars; you shall not build a house for My name, because you have shed much blood on the earth in My sight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 28:5
    marker-yv: yv-n
  - type: text
    text: 'Behold, a son shall be born to you, who shall be a man of rest; and I will give him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 4:20, 25; 5:4
    marker-yv: yv-n
  - type: text
    text: 'rest from all his enemies all around. His name shall be Solomon, for I will give peace and quietness to Israel in his days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 7:13; 1 Kin. 5:5; 6:38; 1 Chr. 17:12, 13; 28:6; 2 Chr. 6:2
    marker-yv: yv-n
  - type: text
    text: 'He shall build a house for My name, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. 1:5
    marker-yv: yv-n
  - type: text
    text: 'he shall be My son, and I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' his Father; and I will establish the throne of his kingdom over Israel forever.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now, my son, may '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 22:16
    marker-yv: yv-n
  - type: text
    text: 'the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' be with you; and may you prosper, and build the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, as He has said to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Only may the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 3:9–12; 2 Chr. 1:10
    marker-yv: yv-n
  - type: text
    text: 'give you wisdom and understanding, and give you charge concerning Israel, that you may keep the law of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Josh. 1:7, 8); 1 Chr. 28:7
    marker-yv: yv-n
  - type: text
    text: 'Then you will prosper, if you take care to fulfill the statutes and judgments with which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' charged Moses concerning Israel. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 31:7, 8; Josh. 1:6, 7, 9; 1 Chr. 28:20)
    marker-yv: yv-n
  - type: text
    text: 'Be strong and of good courage; do not fear nor be dismayed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Indeed I have taken much trouble to prepare for the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' one hundred thousand talents of gold and one million talents of silver, and bronze and iron '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 22:3
    marker-yv: yv-n
  - type: text
    text: 'beyond measure, for it is so abundant. I have prepared timber and stone also, and you may add to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moreover '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' workmen with you in abundance: woodsmen and stonecutters, and all types of skillful men for every kind of work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Of gold and silver and bronze and iron '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' no limit. Arise and begin working, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 22:11
    marker-yv: yv-n
  - type: text
    text: 'the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' be with you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'David also commanded all the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 28:1–6
    marker-yv: yv-n
  - type: text
    text: 'leaders of Israel to help Solomon his son, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Is
  - type: text
    text: ' not the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God with you? '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 12:10; Josh. 22:4; 2 Sam. 7:1; (1 Kin. 5:4; 8:56)
    marker-yv: yv-n
  - type: text
    text: 'And has He '
  - type: usfm
    marker: it
    children:
    - type: text
      text: not
  - type: text
    text: ' given you rest on every side? For He has given the inhabitants of the land into my hand, and the land is subdued before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and before His people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now set your heart and your soul to seek the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. Therefore arise and build the sanctuary of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God, to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 8:1–11; 2 Chr. 5:2–14
    marker-yv: yv-n
  - type: text
    text: 'bring the ark of the covenant of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and the holy articles of God into the house that is to be built '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:3
    marker-yv: yv-n
  - type: text
    text: 'for the name of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
