document_id: ACT.11,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Peter Defends God’s Grace
  - type: text
    content: 'Now the apostles and brethren who were in Judea heard that the Gentiles had also received the word of God. '
  '10':
  - type: text
    content: 'Now this was done three times, and all were drawn up again into heaven. '
  '11':
  - type: text
    content: 'At that very moment, three men stood before the house where I was, having been sent to me from Caesarea. '
  '12':
  - type: text
    content: 'Then '
  - type: note
    content: (John 16:13); Acts 10:19; 15:7
  - type: text
    content: 'the Spirit told me to go with them, doubting nothing. Moreover '
  - type: note
    content: Acts 10:23
  - type: text
    content: 'these six brethren accompanied me, and we entered the man’s house. '
  '13':
  - type: note
    content: Acts 10:30
  - type: text
    content: 'And he told us how he had seen an angel standing in his house, who said to him, ‘Send men to Joppa, and call for Simon whose surname is Peter, '
  '14':
  - type: text
    content: 'who will tell you words by which you and all your household will be saved.’ '
  '15':
  - type: text
    content: 'And as I began to speak, the Holy Spirit fell upon them, '
  - type: note
    content: Acts 2:1–4; 15:7–9
  - type: text
    content: 'as upon us at the beginning. '
  '16':
  - type: text
    content: 'Then I remembered the word of the Lord, how He said, '
  - type: note
    content: Matt. 3:11; Mark 1:8; John 1:26, 33; Acts 1:5; 19:4
  - type: text
    content: '‘John indeed baptized with water, but '
  - type: note
    content: Is. 44:3
  - type: text
    content: you shall be baptized with the Holy Spirit.’
  - type: text
    content: ' '
  '17':
  - type: note
    content: (Acts 15:8, 9)
  - type: text
    content: 'If therefore God gave them the same gift as '
  - type: text
    content: He
  - type: text
    content: ' '
  - type: text
    content: gave
  - type: text
    content: ' us when we believed on the Lord Jesus Christ, '
  - type: note
    content: Acts 10:47
  - type: text
    content: who was I that I could withstand God?”
  '18':
  - type: text
    content: 'When they heard these things they became silent; and they glorified God, saying, '
  - type: note
    content: Is. 42:1, 6; 49:6; Luke 2:32; John 11:52; Rom. 10:12, 13; 15:9, 16
  - type: text
    content: “Then God has also granted to the Gentiles repentance to life.”
  - type: heading
    content: Barnabas and Saul at Antioch
  '19':
  - type: note
    content: Acts 8:1, 4
  - type: text
    content: 'Now those who were scattered after the persecution that arose over Stephen traveled as far as Phoenicia, Cyprus, and Antioch, preaching the word to no one but the Jews only. '
  '2':
  - type: text
    content: 'And when Peter came up to Jerusalem, '
  - type: note
    content: Acts 10:45
  - type: text
    content: 'those of the circumcision contended with him, '
  '20':
  - type: text
    content: 'But some of them were men from Cyprus and Cyrene, who, when they had come to Antioch, spoke to '
  - type: note
    content: Acts 6:1; 9:29
  - type: text
    content: 'the Hellenists, preaching the Lord Jesus. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: Luke 1:66; Acts 2:47
  - type: text
    content: 'the hand of the Lord was with them, and a great number believed and '
  - type: note
    content: Acts 9:35; 14:1
  - type: text
    content: turned to the Lord.
  '22':
  - type: text
    content: 'Then news of these things came to the ears of the church in Jerusalem, and they sent out '
  - type: note
    content: Acts 4:36; 9:27
  - type: text
    content: 'Barnabas to go as far as Antioch. '
  '23':
  - type: text
    content: 'When he came and had seen the grace of God, he was glad, and '
  - type: note
    content: Acts 13:43; 14:22
  - type: text
    content: 'encouraged them all that with purpose of heart they should continue with the Lord. '
  '24':
  - type: text
    content: 'For he was a good man, '
  - type: note
    content: Acts 6:5
  - type: text
    content: 'full of the Holy Spirit and of faith. '
  - type: note
    content: Acts 5:14; 11:21
  - type: text
    content: And a great many people were added to the Lord.
  '25':
  - type: text
    content: 'Then Barnabas departed for '
  - type: note
    content: Acts 9:11, 30
  - type: text
    content: 'Tarsus to seek Saul. '
  '26':
  - type: text
    content: And when he had found him, he brought him to Antioch. So it was that for a whole year they assembled with the church and taught a great many people. And the disciples were first called Christians in Antioch.
  - type: heading
    content: Relief to Judea
  '27':
  - type: text
    content: 'And in these days '
  - type: note
    content: Acts 2:17; 13:1; 15:32; 21:9; 1 Cor. 12:28; Eph. 4:11
  - type: text
    content: 'prophets came from Jerusalem to Antioch. '
  '28':
  - type: text
    content: 'Then one of them, named '
  - type: note
    content: John 16:13; Acts 21:10
  - type: text
    content: 'Agabus, stood up and showed by the Spirit that there was going to be a great famine throughout all the world, which also happened in the days of '
  - type: note
    content: Acts 18:2
  - type: text
    content: 'Claudius Caesar. '
  '29':
  - type: text
    content: 'Then the disciples, each according to his ability, determined to send '
  - type: note
    content: Rom. 15:26; 1 Cor. 16:1; 2 Cor. 9:1
  - type: text
    content: 'relief to the brethren dwelling in Judea. '
  '3':
  - type: text
    content: 'saying, '
  - type: note
    content: Matt. 9:11; Acts 10:28
  - type: text
    content: '“You went in to uncircumcised men '
  - type: note
    content: Gal. 2:12
  - type: text
    content: and ate with them!”
  '30':
  - type: note
    content: Acts 12:25
  - type: text
    content: This they also did, and sent it to the elders by the hands of Barnabas and Saul.
  '4':
  - type: text
    content: 'But Peter explained '
  - type: text
    content: it
  - type: text
    content: ' to them '
  - type: note
    content: Luke 1:3
  - type: text
    content: 'in order from the beginning, saying: '
  '5':
  - type: note
    content: Acts 10:9
  - type: text
    content: '“I was in the city of Joppa praying; and in a trance I saw a vision, an object descending like a great sheet, let down from heaven by four corners; and it came to me. '
  '6':
  - type: text
    content: 'When I observed it intently and considered, I saw four-footed animals of the earth, wild beasts, creeping things, and birds of the air. '
  '7':
  - type: text
    content: 'And I heard a voice saying to me, '
  - type: text
    content: ‘Rise, Peter; kill and eat.’
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But I said, ‘Not so, Lord! For nothing common or unclean has at any time entered my mouth.’ '
  '9':
  - type: text
    content: 'But the voice answered me again from heaven, '
  - type: text
    content: ‘What God has cleansed you must not call common.’
  - type: text
    content: ' '
