document_id: ACT.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Defends God’s Grace
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the apostles and brethren who were in Judea heard that the Gentiles had also received the word of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And when Peter came up to Jerusalem, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 10:45
    marker-yv: yv-n
  - type: text
    text: 'those of the circumcision contended with him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 9:11; Acts 10:28
    marker-yv: yv-n
  - type: text
    text: '“You went in to uncircumcised men '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gal. 2:12
    marker-yv: yv-n
  - type: text
    text: and ate with them!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But Peter explained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' to them '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 1:3
    marker-yv: yv-n
  - type: text
    text: 'in order from the beginning, saying: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 10:9
    marker-yv: yv-n
  - type: text
    text: '“I was in the city of Joppa praying; and in a trance I saw a vision, an object descending like a great sheet, let down from heaven by four corners; and it came to me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When I observed it intently and considered, I saw four-footed animals of the earth, wild beasts, creeping things, and birds of the air. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And I heard a voice saying to me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Rise, Peter; kill and eat.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But I said, ‘Not so, Lord! For nothing common or unclean has at any time entered my mouth.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But the voice answered me again from heaven, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘What God has cleansed you must not call common.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now this was done three times, and all were drawn up again into heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'At that very moment, three men stood before the house where I was, having been sent to me from Caesarea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 16:13); Acts 10:19; 15:7
    marker-yv: yv-n
  - type: text
    text: 'the Spirit told me to go with them, doubting nothing. Moreover '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 10:23
    marker-yv: yv-n
  - type: text
    text: 'these six brethren accompanied me, and we entered the man’s house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 10:30
    marker-yv: yv-n
  - type: text
    text: 'And he told us how he had seen an angel standing in his house, who said to him, ‘Send men to Joppa, and call for Simon whose surname is Peter, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'who will tell you words by which you and all your household will be saved.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And as I began to speak, the Holy Spirit fell upon them, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 2:1–4; 15:7–9
    marker-yv: yv-n
  - type: text
    text: 'as upon us at the beginning. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then I remembered the word of the Lord, how He said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 3:11; Mark 1:8; John 1:26, 33; Acts 1:5; 19:4
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '‘John indeed baptized with water, but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 44:3
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you shall be baptized with the Holy Spirit.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Acts 15:8, 9)
    marker-yv: yv-n
  - type: text
    text: 'If therefore God gave them the same gift as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gave
  - type: text
    text: ' us when we believed on the Lord Jesus Christ, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 10:47
    marker-yv: yv-n
  - type: text
    text: who was I that I could withstand God?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When they heard these things they became silent; and they glorified God, saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 42:1, 6; 49:6; Luke 2:32; John 11:52; Rom. 10:12, 13; 15:9, 16
    marker-yv: yv-n
  - type: text
    text: “Then God has also granted to the Gentiles repentance to life.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Barnabas and Saul at Antioch
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 8:1, 4
    marker-yv: yv-n
  - type: text
    text: 'Now those who were scattered after the persecution that arose over Stephen traveled as far as Phoenicia, Cyprus, and Antioch, preaching the word to no one but the Jews only. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But some of them were men from Cyprus and Cyrene, who, when they had come to Antioch, spoke to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 6:1; 9:29
    marker-yv: yv-n
  - type: text
    text: 'the Hellenists, preaching the Lord Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 1:66; Acts 2:47
    marker-yv: yv-n
  - type: text
    text: 'the hand of the Lord was with them, and a great number believed and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 9:35; 14:1
    marker-yv: yv-n
  - type: text
    text: turned to the Lord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then news of these things came to the ears of the church in Jerusalem, and they sent out '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 4:36; 9:27
    marker-yv: yv-n
  - type: text
    text: 'Barnabas to go as far as Antioch. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'When he came and had seen the grace of God, he was glad, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 13:43; 14:22
    marker-yv: yv-n
  - type: text
    text: 'encouraged them all that with purpose of heart they should continue with the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'For he was a good man, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 6:5
    marker-yv: yv-n
  - type: text
    text: 'full of the Holy Spirit and of faith. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 5:14; 11:21
    marker-yv: yv-n
  - type: text
    text: And a great many people were added to the Lord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Barnabas departed for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 9:11, 30
    marker-yv: yv-n
  - type: text
    text: 'Tarsus to seek Saul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And when he had found him, he brought him to Antioch. So it was that for a whole year they assembled with the church and taught a great many people. And the disciples were first called Christians in Antioch.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Relief to Judea
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And in these days '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 2:17; 13:1; 15:32; 21:9; 1 Cor. 12:28; Eph. 4:11
    marker-yv: yv-n
  - type: text
    text: 'prophets came from Jerusalem to Antioch. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then one of them, named '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 16:13; Acts 21:10
    marker-yv: yv-n
  - type: text
    text: 'Agabus, stood up and showed by the Spirit that there was going to be a great famine throughout all the world, which also happened in the days of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:2
    marker-yv: yv-n
  - type: text
    text: 'Claudius Caesar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then the disciples, each according to his ability, determined to send '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 15:26; 1 Cor. 16:1; 2 Cor. 9:1
    marker-yv: yv-n
  - type: text
    text: 'relief to the brethren dwelling in Judea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 12:25
    marker-yv: yv-n
  - type: text
    text: This they also did, and sent it to the elders by the hands of Barnabas and Saul.
