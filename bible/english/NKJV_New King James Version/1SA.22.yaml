    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' discontented gathered to him. So he became captain over them. And there were about '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 11:3
      marker-yv: yv-n
    - type: text
