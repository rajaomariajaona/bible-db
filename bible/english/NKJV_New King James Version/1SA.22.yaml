      - type: text
        text: 2 Sam. 24:11; 1 Chr. 21:9; 29:29; 2 Chr. 29:25
      marker-yv: yv-n
    - type: text
      text: 'Gibeah under a tamarisk tree in Ramah, with his spear in his hand, and all his servants standing about him— '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'then Saul said to his servants who stood about him, “Hear now, you Benjamites! Will the son of Jesse '
