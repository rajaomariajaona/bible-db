    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make you all captains of thousands and captains of hundreds? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'All of you have conspired against me, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no one who reveals to me that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 8:14
      marker-yv: yv-n
    - type: text
      text: 'my son has made a covenant with the son of Jesse; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not one of you who is sorry for me or reveals to me that my son has stirred up my servant against me, to lie in wait, as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' this day.”'
  '9':
