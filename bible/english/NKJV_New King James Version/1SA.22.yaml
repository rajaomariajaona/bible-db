  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So the king sent to call Ahimelech the priest, the son of Ahitub, and all his father’s house, the priests who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in Nob. And they all came to the king. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And Saul said, “Hear now, son of Ahitub!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He answered, “Here I am, my lord.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then Saul said to him, “Why have you conspired against me, you and the son of Jesse, in that you have given him bread and a sword, and have inquired of God for him, that he should rise against me, to lie in wait, as it is this day?”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So Ahimelech answered the king and said, “And who among all your servants '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 21:6, 9
      marker-yv: yv-n
    - type: text
      text: 'faithful as David, who is the king’s son-in-law, who goes at your bidding, and is honorable in your house? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Did I then begin to inquire of God for him? Far be it from me! Let not the king impute anything to his servant, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' to any in the house of my father. For your servant knew nothing of all this, little or much.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And the king said, “You shall surely die, Ahimelech, you and all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 19:4, 5; 20:32; 24:11
      marker-yv: yv-n
    - type: text
      text: 'your father’s house!” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then the king said to the guards who stood about him, “Turn and kill the priests of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', because their hand also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' with David, and because they knew when he fled and did not tell it to me.” But the servants of the king '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 24:16
      marker-yv: yv-n
    - type: text
      text: 'would not lift their hands to strike the priests of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And the king said to Doeg, “You turn and kill the priests!” So Doeg the Edomite turned and struck the priests, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 1:17
      marker-yv: yv-n
    - type: text
      text: 'killed on that day eighty-five men who wore a linen ephod. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 2:31
      marker-yv: yv-n
    - type: text
      text: Also Nob, the city of the priests, he struck with the edge of the sword, both men and women, children and nursing infants, oxen and donkeys and sheep—with the edge of the sword.
