    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' there, that he would surely tell Saul. I have caused '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: death
    - type: text
      text: ' of all the persons of your father’s house. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Stay with me; do not fear. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 2:33
      marker-yv: yv-n
    - type: text
      text: 'For he who seeks my life seeks your life, but with me you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' safe.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then David went from there to Mizpah of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 25:13
      marker-yv: yv-n
    - type: text
      text: 'Moab; and he said to the king of Moab, “Please let my father and mother come here with you, till I know what God will do for me.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So he brought them before the king of Moab, and they dwelt with him all the time that David was in the stronghold.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now the prophet '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:2
      marker-yv: yv-n
    - type: text
      text: Gad said to David, “Do not stay in the stronghold; depart, and go to the land of Judah.” So David departed and went into the forest of Hereth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul Murders the Priests
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'When Saul heard that David and the men who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
