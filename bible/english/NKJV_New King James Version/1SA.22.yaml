      children:
      - type: text
        text: 1 Sam. 23:6, 9; 30:7; 1 Kin. 2:26, 27
      marker-yv: yv-n
    - type: text
      text: 'escaped and fled after David. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And Abiathar told David that Saul had killed the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s priests. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
