      children:
      - type: text
        text: '1'
    - type: text
      text: 'David therefore departed from there and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 34:title
      marker-yv: yv-n
    - type: text
      text: 'escaped '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 57:title; 142:title
      marker-yv: yv-n
    - type: text
      text: 'to the cave of Adullam. So when his brothers and all his father’s house heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' they went down there to him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 14:3
      marker-yv: yv-n
    - type: text
      text: 'And he inquired of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for him, '
    - type: usfm
      marker: x
      children:
      - type: text
