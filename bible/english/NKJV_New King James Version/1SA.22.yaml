  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 21:1–45; 1 Sam. 22:9, 11
      marker-yv: yv-n
    - type: text
      text: 'Now one of the sons of Ahimelech the son of Ahitub, named Abiathar, '
    - type: usfm
