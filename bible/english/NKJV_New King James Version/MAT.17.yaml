document_id: MAT.17,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Transfigured on the Mount
  - type: text
    content: 'Now '
  - type: note
    content: Matt. 17:1–8; Mark 9:2–8; Luke 9:28–36
  - type: text
    content: 'after six days Jesus took Peter, James, and John his brother, led them up on a high mountain by themselves; '
  '10':
  - type: text
    content: 'And His disciples asked Him, saying, '
  - type: note
    content: Mal. 4:5; Matt. 11:14; 16:14; Mark 9:11
  - type: text
    content: “Why then do the scribes say that Elijah must come first?”
  '11':
  - type: text
    content: 'Jesus answered and said to them, '
  - type: text
    content: '“Indeed, Elijah is coming '
  - type: text
    content: first
  - type: text
    content: ' and will '
  - type: note
    content: (Mal. 4:6); Luke 1:17
  - type: text
    content: restore all things.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Matt. 11:14; Mark 9:12, 13
  - type: text
    content: 'But I say to you that Elijah has come already, and they '
  - type: note
    content: Matt. 14:3, 10
  - type: text
    content: 'did not know him but did to him whatever they wished. Likewise '
  - type: note
    content: Matt. 16:21
  - type: text
    content: the Son of Man is also about to suffer at their hands.”
  - type: text
    content: ' '
  '13':
  - type: note
    content: Matt. 11:14
  - type: text
    content: Then the disciples understood that He spoke to them of John the Baptist.
  - type: heading
    content: A Boy Is Healed
  '14':
  - type: note
    content: Matt. 17:14–19; Mark 9:14–28; Luke 9:37–42
  - type: text
    content: 'And when they had come to the multitude, a man came to Him, kneeling down to Him and saying, '
  '15':
  - type: text
    content: '“Lord, have mercy on my son, for he is an epileptic and suffers severely; for he often falls into the fire and often into the water. '
  '16':
  - type: text
    content: So I brought him to Your disciples, but they could not cure him.”
  '17':
  - type: text
    content: 'Then Jesus answered and said, '
  - type: text
    content: '“O '
  - type: text
    content: 'faithless and '
  - type: note
    content: Deut. 32:5; Phil. 2:15
  - type: text
    content: perverse generation, how long shall I be with you? How long shall I bear with you? Bring him here to Me.”
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And Jesus '
  - type: note
    content: Luke 4:41
  - type: text
    content: rebuked the demon, and it came out of him; and the child was cured from that very hour.
  '19':
  - type: text
    content: Then the disciples came to Jesus privately and said, “Why could we not cast it out?”
  '2':
  - type: text
    content: 'and He was transfigured before them. His face shone like the sun, and His clothes became as white as the light. '
  '20':
  - type: text
    content: 'So Jesus said to them, '
  - type: text
    content: '“Because of your '
  - type: text
    content: unbelief;
  - type: text
    content: ' for assuredly, I say to you, '
  - type: note
    content: Matt. 21:21; Mark 11:23; Luke 17:6; (1 Cor. 12:9)
  - type: text
    content: if you have faith as a mustard seed, you will say to this mountain, ‘Move from here to there,’ and it will move; and nothing will be impossible for you.
  - type: text
    content: ' '
  '21':
  - type: text
    content: However, this kind does not go out except by prayer and fasting.”
  - type: heading
    content: Jesus Again Predicts His Death and Resurrection
  '22':
  - type: note
    content: Matt. 16:21; 26:57; Mark 8:31; Luke 9:22, 44; John 18:12
  - type: text
    content: 'Now while they were staying in Galilee, Jesus said to them, '
  - type: text
    content: “The Son of Man is about to be betrayed into the hands of men,
  - type: text
    content: ' '
  '23':
  - type: text
    content: and they will kill Him, and the third day He will be raised up.”
  - type: text
    content: ' And they were exceedingly '
  - type: note
    content: Matt. 26:22; 27:50; Luke 23:46; 24:46; John 16:6; 19:30; Acts 10:40
  - type: text
    content: sorrowful.
  - type: heading
    content: Peter and His Master Pay Their Taxes
  '24':
  - type: note
    content: Mark 9:33
  - type: text
    content: 'When they had come to Capernaum, those who received the '
  - type: text
    content: temple
  - type: text
    content: ' tax came to Peter and said, “Does your Teacher not pay the '
  - type: text
    content: temple
  - type: text
    content: ' tax?”'
  '25':
  - type: text
    content: He said, “Yes.”
  - type: text
    content: 'And when he had come into the house, Jesus anticipated him, saying, '
  - type: text
    content: '“What do you think, Simon? From whom do the kings of the earth take customs or taxes, from their sons or from '
  - type: note
    content: (Is. 60:10–17)
  - type: text
    content: strangers?”
  '26':
  - type: text
    content: Peter said to Him, “From strangers.”
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “Then the sons are free.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Nevertheless, lest we offend them, go to the sea, cast in a hook, and take the fish that comes up first. And when you have opened its mouth, you will find a '
  - type: text
    content: piece of money;
  - type: text
    content: ' take that and give it to them for Me and you.”'
  '3':
  - type: text
    content: 'And behold, Moses and Elijah appeared to them, talking with Him. '
  '4':
  - type: text
    content: 'Then Peter answered and said to Jesus, “Lord, it is good for us to be here; if You wish, let us make here three tabernacles: one for You, one for Moses, and one for Elijah.”'
  '5':
  - type: note
    content: 2 Pet. 1:17
  - type: text
    content: 'While he was still speaking, behold, a bright cloud overshadowed them; and suddenly a voice came out of the cloud, saying, '
  - type: note
    content: Ps. 2:7; Matt. 3:17; Mark 1:11; Luke 1:35; 3:22; (John 12:28–30)
  - type: text
    content: '“This is My beloved Son, '
  - type: note
    content: Is. 42:1; Matt. 3:17; 12:18; 2 Pet. 1:17
  - type: text
    content: 'in whom I am well pleased. '
  - type: note
    content: (Deut. 18:15, 19; Acts 3:22, 23)
  - type: text
    content: 'Hear Him!” '
  '6':
  - type: note
    content: 2 Pet. 1:18
  - type: text
    content: 'And when the disciples heard '
  - type: text
    content: it,
  - type: text
    content: ' they fell on their faces and were greatly afraid. '
  '7':
  - type: text
    content: 'But Jesus came and '
  - type: note
    content: Dan. 8:18
  - type: text
    content: 'touched them and said, '
  - type: text
    content: “Arise, and do not be afraid.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: When they had lifted up their eyes, they saw no one but Jesus only.
  '9':
  - type: text
    content: 'Now as they came down from the mountain, Jesus commanded them, saying, '
  - type: text
    content: “Tell the vision to no one until the Son of Man is risen from the dead.”
