document_id: MAT.17,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Transfigured on the Mount
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 17:1–8; Mark 9:2–8; Luke 9:28–36
      marker-yv: yv-n
    - type: text
      text: 'after six days Jesus took Peter, James, and John his brother, led them up on a high mountain by themselves; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And His disciples asked Him, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 4:5; Matt. 11:14; 16:14; Mark 9:11
      marker-yv: yv-n
    - type: text
      text: “Why then do the scribes say that Elijah must come first?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Jesus answered and said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Indeed, Elijah is coming '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: first
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' and will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Mal. 4:6); Luke 1:17
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: restore all things.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 11:14; Mark 9:12, 13
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But I say to you that Elijah has come already, and they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 14:3, 10
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'did not know him but did to him whatever they wished. Likewise '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 16:21
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the Son of Man is also about to suffer at their hands.”
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 11:14
      marker-yv: yv-n
    - type: text
      text: Then the disciples understood that He spoke to them of John the Baptist.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Boy Is Healed
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 17:14–19; Mark 9:14–28; Luke 9:37–42
      marker-yv: yv-n
    - type: text
      text: 'And when they had come to the multitude, a man came to Him, kneeling down to Him and saying, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“Lord, have mercy on my son, for he is an epileptic and suffers severely; for he often falls into the fire and often into the water. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: So I brought him to Your disciples, but they could not cure him.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Jesus answered and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“O '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'faithless and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:5; Phil. 2:15
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: perverse generation, how long shall I be with you? How long shall I bear with you? Bring him here to Me.”
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And Jesus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 4:41
      marker-yv: yv-n
    - type: text
      text: rebuked the demon, and it came out of him; and the child was cured from that very hour.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then the disciples came to Jesus privately and said, “Why could we not cast it out?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and He was transfigured before them. His face shone like the sun, and His clothes became as white as the light. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Because of your '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: unbelief;
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' for assuredly, I say to you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 21:21; Mark 11:23; Luke 17:6; (1 Cor. 12:9)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: if you have faith as a mustard seed, you will say to this mountain, ‘Move from here to there,’ and it will move; and nothing will be impossible for you.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: However, this kind does not go out except by prayer and fasting.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Again Predicts His Death and Resurrection
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 16:21; 26:57; Mark 8:31; Luke 9:22, 44; John 18:12
      marker-yv: yv-n
    - type: text
      text: 'Now while they were staying in Galilee, Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The Son of Man is about to be betrayed into the hands of men,
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and they will kill Him, and the third day He will be raised up.”
    - type: text
      text: ' And they were exceedingly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 26:22; 27:50; Luke 23:46; 24:46; John 16:6; 19:30; Acts 10:40
      marker-yv: yv-n
    - type: text
      text: sorrowful.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter and His Master Pay Their Taxes
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 9:33
      marker-yv: yv-n
    - type: text
      text: 'When they had come to Capernaum, those who received the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: temple
    - type: text
      text: ' tax came to Peter and said, “Does your Teacher not pay the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: temple
    - type: text
      text: ' tax?”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: He said, “Yes.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he had come into the house, Jesus anticipated him, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“What do you think, Simon? From whom do the kings of the earth take customs or taxes, from their sons or from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 60:10–17)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: strangers?”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Peter said to Him, “From strangers.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then the sons are free.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Nevertheless, lest we offend them, go to the sea, cast in a hook, and take the fish that comes up first. And when you have opened its mouth, you will find a '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: piece of money;
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' take that and give it to them for Me and you.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And behold, Moses and Elijah appeared to them, talking with Him. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then Peter answered and said to Jesus, “Lord, it is good for us to be here; if You wish, let us make here three tabernacles: one for You, one for Moses, and one for Elijah.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Pet. 1:17
      marker-yv: yv-n
    - type: text
      text: 'While he was still speaking, behold, a bright cloud overshadowed them; and suddenly a voice came out of the cloud, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 2:7; Matt. 3:17; Mark 1:11; Luke 1:35; 3:22; (John 12:28–30)
      marker-yv: yv-n
    - type: text
      text: '“This is My beloved Son, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 42:1; Matt. 3:17; 12:18; 2 Pet. 1:17
      marker-yv: yv-n
    - type: text
      text: 'in whom I am well pleased. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 18:15, 19; Acts 3:22, 23)
      marker-yv: yv-n
    - type: text
      text: 'Hear Him!” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Pet. 1:18
      marker-yv: yv-n
    - type: text
      text: 'And when the disciples heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' they fell on their faces and were greatly afraid. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But Jesus came and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 8:18
      marker-yv: yv-n
    - type: text
      text: 'touched them and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Arise, and do not be afraid.”
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: When they had lifted up their eyes, they saw no one but Jesus only.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now as they came down from the mountain, Jesus commanded them, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Tell the vision to no one until the Son of Man is risen from the dead.”
