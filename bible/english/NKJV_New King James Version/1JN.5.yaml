document_id: 1JN.5,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whoever believes that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 John 2:22; 4:2, 15
      marker-yv: yv-n
    - type: text
      text: 'Jesus is the Christ is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 1:13
      marker-yv: yv-n
    - type: text
      text: 'born of God, and everyone who loves Him who begot also loves him who is begotten of Him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He who believes in the Son of God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 8:16); Gal. 4:6; Rev. 12:17
      marker-yv: yv-n
    - type: text
      text: 'has the witness in himself; he who does not believe God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 3:18, 33; 1 John 1:10
      marker-yv: yv-n
    - type: text
      text: 'has made Him a liar, because he has not believed the testimony that God has given of His Son. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this is the testimony: that God has given us eternal life, and this life is in His Son. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 3:15, 36; 6:47; 17:2, 3)
      marker-yv: yv-n
    - type: text
      text: 'He who has the Son has life; he who does not have the Son of God does not have life. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These things I have written to you who believe in the name of the Son of God, that you may know that you have eternal life, and that you may '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continue
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' believe in the name of the Son of God.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Confidence and Compassion in Prayer
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now this is the confidence that we have in Him, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 John 2:28; 3:21, 22)
      marker-yv: yv-n
    - type: text
      text: 'if we ask anything according to His will, He hears us. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And if we know that He hears us, whatever we ask, we know that we have the petitions that we have asked of Him.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If anyone sees his brother sinning a sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: does
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lead
    - type: text
      text: ' to death, he will ask, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 42:8
      marker-yv: yv-n
    - type: text
      text: 'He will give him life for those who commit sin not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leading
    - type: text
      text: ' to death. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 12:31)
      marker-yv: yv-n
    - type: text
      text: 'There is sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leading
    - type: text
      text: ' to death. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 7:16; 14:11
      marker-yv: yv-n
    - type: text
      text: 'I do not say that he should pray about that. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 John 3:4
      marker-yv: yv-n
    - type: text
      text: 'All unrighteousness is sin, and there is sin not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leading
    - type: text
      text: ' to death.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Knowing the True—Rejecting the False
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We know that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Pet. 1:23); 1 John 3:9
      marker-yv: yv-n
    - type: text
      text: 'whoever is born of God does not sin; but he who has been born of God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: James 1:27
      marker-yv: yv-n
    - type: text
      text: keeps himself, and the wicked one does not touch him.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We know that we are of God, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 12:31; 17:15; Gal. 1:4
      marker-yv: yv-n
    - type: text
      text: 'the whole world lies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: under
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sway
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' the wicked one.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By this we know that we love the children of God, when we love God and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 15:10; 2 John 6
      marker-yv: yv-n
    - type: text
      text: 'keep His commandments. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we know that the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 John 4:2
      marker-yv: yv-n
    - type: text
      text: 'Son of God has come and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:45
      marker-yv: yv-n
    - type: text
      text: 'has given us an understanding, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 17:3; Rev. 3:7
      marker-yv: yv-n
    - type: text
      text: 'that we may know Him who is true; and we are in Him who is true, in His Son Jesus Christ. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 9:6
      marker-yv: yv-n
    - type: text
      text: 'This is the true God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 John 5:11, 12
      marker-yv: yv-n
    - type: text
      text: and eternal life.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Little children, keep yourselves from idols. Amen.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 14:15; 2 John 6
      marker-yv: yv-n
    - type: text
      text: 'For this is the love of God, that we keep His commandments. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mic. 6:8; Matt. 11:30; 23:4
      marker-yv: yv-n
    - type: text
      text: 'His commandments are not burdensome. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 16:33
      marker-yv: yv-n
    - type: text
      text: 'whatever is born of God overcomes the world. And this is the victory that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 John 2:13; 4:4
      marker-yv: yv-n
    - type: text
      text: 'has overcome the world—our faith. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who is he who overcomes the world, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:57
      marker-yv: yv-n
    - type: text
      text: he who believes that Jesus is the Son of God?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Certainty of God’s Witness
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is He who came '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 1:31–34; (Eph. 5:26, 27)
      marker-yv: yv-n
    - type: text
      text: 'by water and blood—Jesus Christ; not only by water, but by water and blood. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 14:17)
      marker-yv: yv-n
    - type: text
      text: 'And it is the Spirit who bears witness, because the Spirit is truth. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For there are three that bear witness in heaven: the Father, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 1:1)
      marker-yv: yv-n
    - type: text
      text: 'the Word, and the Holy Spirit; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 10:30
      marker-yv: yv-n
    - type: text
      text: 'and these three are one. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there are three that bear witness on earth: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 15:26
      marker-yv: yv-n
    - type: text
      text: the Spirit, the water, and the blood; and these three agree as one.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If we receive '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 5:34, 37; 8:17, 18
      marker-yv: yv-n
    - type: text
      text: 'the witness of men, the witness of God is greater; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 3:16, 17); John 5:32, 37
      marker-yv: yv-n
    - type: text
      text: 'for this is the witness of God which He has testified of His Son. '
