  - type: text
    content: ' the wicked one.'
  '2':
  - type: text
    content: 'By this we know that we love the children of God, when we love God and '
  - type: note
    content: John 15:10; 2 John 6
  - type: text
    content: 'keep His commandments. '
  '20':
  - type: text
    content: 'And we know that the '
  - type: note
    content: 1 John 4:2
  - type: text
    content: 'Son of God has come and '
  - type: note
    content: Luke 24:45
  - type: text
    content: 'has given us an understanding, '
  - type: note
    content: John 17:3; Rev. 3:7
  - type: text
    content: 'that we may know Him who is true; and we are in Him who is true, in His Son Jesus Christ. '
  - type: note
    content: Is. 9:6
  - type: text
    content: 'This is the true God '
  - type: note
    content: 1 John 5:11, 12
  - type: text
    content: and eternal life.
  '21':
  - type: text
    content: Little children, keep yourselves from idols. Amen.
  '3':
  - type: note
    content: John 14:15; 2 John 6
  - type: text
    content: 'For this is the love of God, that we keep His commandments. And '
  - type: note
    content: Mic. 6:8; Matt. 11:30; 23:4
  - type: text
    content: 'His commandments are not burdensome. '
  '4':
  - type: text
    content: 'For '
  - type: note
    content: John 16:33
  - type: text
    content: 'whatever is born of God overcomes the world. And this is the victory that '
  - type: note
    content: 1 John 2:13; 4:4
  - type: text
    content: 'has overcome the world—our faith. '
  '5':
  - type: text
    content: 'Who is he who overcomes the world, but '
  - type: note
    content: 1 Cor. 15:57
  - type: text
    content: he who believes that Jesus is the Son of God?
  - type: heading
    content: The Certainty of God’s Witness
  '6':
  - type: text
    content: 'This is He who came '
  - type: note
    content: John 1:31–34; (Eph. 5:26, 27)
  - type: text
    content: 'by water and blood—Jesus Christ; not only by water, but by water and blood. '
  - type: note
    content: (John 14:17)
  - type: text
    content: 'And it is the Spirit who bears witness, because the Spirit is truth. '
  '7':
  - type: text
    content: 'For there are three that bear witness in heaven: the Father, '
  - type: note
    content: (John 1:1)
  - type: text
    content: 'the Word, and the Holy Spirit; '
  - type: note
    content: John 10:30
  - type: text
    content: 'and these three are one. '
  '8':
  - type: text
    content: 'And there are three that bear witness on earth: '
  - type: note
    content: John 15:26
  - type: text
    content: the Spirit, the water, and the blood; and these three agree as one.
  '9':
  - type: text
    content: 'If we receive '
  - type: note
    content: John 5:34, 37; 8:17, 18
  - type: text
    content: 'the witness of men, the witness of God is greater; '
  - type: note
    content: (Matt. 3:16, 17); John 5:32, 37
  - type: text
    content: 'for this is the witness of God which He has testified of His Son. '
