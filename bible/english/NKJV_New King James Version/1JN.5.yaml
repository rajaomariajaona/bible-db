document_id: 1JN.5,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'Whoever believes that '
  - type: note
    content: 1 John 2:22; 4:2, 15
  - type: text
    content: 'Jesus is the Christ is '
  - type: note
    content: John 1:13
  - type: text
    content: 'born of God, and everyone who loves Him who begot also loves him who is begotten of Him. '
  '10':
  - type: text
    content: 'He who believes in the Son of God '
  - type: note
    content: (Rom. 8:16); Gal. 4:6; Rev. 12:17
  - type: text
    content: 'has the witness in himself; he who does not believe God '
  - type: note
    content: John 3:18, 33; 1 John 1:10
  - type: text
    content: 'has made Him a liar, because he has not believed the testimony that God has given of His Son. '
  '11':
  - type: text
    content: 'And this is the testimony: that God has given us eternal life, and this life is in His Son. '
  '12':
  - type: note
    content: (John 3:15, 36; 6:47; 17:2, 3)
  - type: text
    content: 'He who has the Son has life; he who does not have the Son of God does not have life. '
  '13':
  - type: text
    content: 'These things I have written to you who believe in the name of the Son of God, that you may know that you have eternal life, and that you may '
  - type: text
    content: continue
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' believe in the name of the Son of God.'
  - type: heading
    content: Confidence and Compassion in Prayer
  '14':
  - type: text
    content: 'Now this is the confidence that we have in Him, that '
  - type: note
    content: (1 John 2:28; 3:21, 22)
  - type: text
    content: 'if we ask anything according to His will, He hears us. '
  '15':
  - type: text
    content: And if we know that He hears us, whatever we ask, we know that we have the petitions that we have asked of Him.
  '16':
  - type: text
    content: 'If anyone sees his brother sinning a sin '
  - type: text
    content: which
  - type: text
    content: ' '
  - type: text
    content: does
  - type: text
    content: ' not '
  - type: text
    content: lead
  - type: text
    content: ' to death, he will ask, and '
  - type: note
    content: Job 42:8
  - type: text
    content: 'He will give him life for those who commit sin not '
  - type: text
    content: leading
  - type: text
    content: ' to death. '
  - type: note
    content: (Matt. 12:31)
  - type: text
    content: 'There is sin '
  - type: text
    content: leading
  - type: text
    content: ' to death. '
  - type: note
    content: Jer. 7:16; 14:11
  - type: text
    content: 'I do not say that he should pray about that. '
  '17':
  - type: note
    content: 1 John 3:4
  - type: text
    content: 'All unrighteousness is sin, and there is sin not '
  - type: text
    content: leading
  - type: text
    content: ' to death.'
  - type: heading
    content: Knowing the True—Rejecting the False
  '18':
  - type: text
    content: 'We know that '
  - type: note
    content: (1 Pet. 1:23); 1 John 3:9
  - type: text
    content: 'whoever is born of God does not sin; but he who has been born of God '
  - type: note
    content: James 1:27
  - type: text
    content: keeps himself, and the wicked one does not touch him.
  '19':
  - type: text
    content: 'We know that we are of God, and '
  - type: note
    content: John 12:31; 17:15; Gal. 1:4
  - type: text
    content: 'the whole world lies '
  - type: text
    content: under
  - type: text
    content: ' '
  - type: text
