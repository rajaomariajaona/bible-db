    content: Esther’s Banquet
  - type: text
    content: 'Now it happened '
  - type: note
    content: Esth. 4:16
  - type: text
    content: 'on the third day that Esther put on '
  - type: text
    content: her
  - type: text
    content: ' royal '
  - type: text
    content: robes
  - type: text
    content: ' and stood in '
  - type: note
    content: Esth. 4:11, 6:4
  - type: text
    content: 'the inner court of the king’s palace, across from the king’s house, while the king sat on his royal throne in the royal house, facing the entrance of the house. '
  '10':
  - type: text
    content: 'Nevertheless Haman '
  - type: note
    content: 2 Sam. 13:22
  - type: text
    content: 'restrained himself and went home, and he sent and called for his friends and his wife Zeresh. '
  '11':
  - type: text
    content: 'Then Haman told them of his great riches, '
  - type: note
    content: Esth. 9:7–10
  - type: text
    content: 'the multitude of his children, everything in which the king had promoted him, and how he had '
  - type: note
    content: Esth. 3:1
  - type: text
    content: advanced him above the officials and servants of the king.
  '12':
  - type: text
    content: 'Moreover Haman said, “Besides, Queen Esther invited no one but me to come in with the king to the banquet that she prepared; and tomorrow I am again invited by her, along with the king. '
  '13':
  - type: text
    content: Yet all this avails me nothing, so long as I see Mordecai the Jew sitting at the king’s gate.”
  '14':
  - type: text
    content: 'Then his wife Zeresh and all his friends said to him, “Let a '
  - type: note
    content: Esth. 7:9
  - type: text
    content: 'gallows be made, fifty cubits high, and in the morning '
  - type: note
    content: Esth. 6:4
  - type: text
    content: suggest to the king that Mordecai be hanged on it; then go merrily with the king to the banquet.”
  - type: text
    content: 'And the thing pleased Haman; so he had '
  - type: note
    content: Esth. 7:10
  - type: text
    content: the gallows made.
  '2':
  - type: text
    content: 'So it was, when the king saw Queen Esther standing in the court, '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: note
    content: (Prov. 21:1)
  - type: text
    content: 'she found favor in his sight, and '
  - type: note
    content: Esth. 4:11, 8:4
  - type: text
    content: 'the king held out to Esther the golden scepter that '
  - type: text
    content: was
  - type: text
    content: ' in his hand. Then Esther went near and touched the top of the scepter.'
  '3':
  - type: text
    content: 'And the king said to her, “What do you wish, Queen Esther? What '
  - type: text
    content: is
  - type: text
    content: ' your request? '
  - type: note
    content: Esth. 7:2; Mark 6:23
  - type: text
    content: It shall be given to you—up to half the kingdom!”
  '4':
  - type: text
    content: So Esther answered, “If it pleases the king, let the king and Haman come today to the banquet that I have prepared for him.”
  '5':
  - type: text
    content: Then the king said, “Bring Haman quickly, that he may do as Esther has said.” So the king and Haman went to the banquet that Esther had prepared.
  '6':
  - type: text
    content: 'At the banquet of wine '
  - type: note
    content: Esth. 7:2
  - type: text
    content: 'the king said to Esther, '
  - type: note
    content: Esth. 9:12
  - type: text
    content: '“What '
  - type: text
    content: is
  - type: text
    content: ' your petition? It shall be granted you. What '
  - type: text
    content: is
  - type: text
    content: ' your request, up to half the kingdom? It shall be done!”'
  '7':
  - type: text
    content: 'Then Esther answered and said, “My petition and request '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: 'this:'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'If I have found favor in the sight of the king, and if it pleases the king to grant my petition and fulfill my request, then let the king and Haman come to the '
  - type: note
    content: Esth. 6:14
  - type: text
    content: banquet which I will prepare for them, and tomorrow I will do as the king has said.”
  - type: heading
    content: Haman’s Plot Against Mordecai
  '9':
  - type: text
    content: 'So Haman went out that day '
  - type: note
    content: (Job 20:5; Luke 6:25)
  - type: text
    content: 'joyful and with a glad heart; but when Haman saw Mordecai in the king’s gate, and '
  - type: note
    content: Esth. 3:5
  - type: text
    content: 'that he did not stand or tremble before him, he was filled with indignation against Mordecai. '
