    children:
    - type: text
      text: her
  - type: text
    text: ' royal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: robes
  - type: text
    text: ' and stood in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 4:11, 6:4
    marker-yv: yv-n
  - type: text
    text: 'the inner court of the king’s palace, across from the king’s house, while the king sat on his royal throne in the royal house, facing the entrance of the house. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So it was, when the king saw Queen Esther standing in the court, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Prov. 21:1)
    marker-yv: yv-n
  - type: text
    text: 'she found favor in his sight, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 4:11, 8:4
    marker-yv: yv-n
  - type: text
    text: 'the king held out to Esther the golden scepter that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in his hand. Then Esther went near and touched the top of the scepter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the king said to her, “What do you wish, Queen Esther? What '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' your request? '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 7:2; Mark 6:23
    marker-yv: yv-n
  - type: text
    text: It shall be given to you—up to half the kingdom!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So Esther answered, “If it pleases the king, let the king and Haman come today to the banquet that I have prepared for him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then the king said, “Bring Haman quickly, that he may do as Esther has said.” So the king and Haman went to the banquet that Esther had prepared.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'At the banquet of wine '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 7:2
    marker-yv: yv-n
  - type: text
    text: 'the king said to Esther, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 9:12
    marker-yv: yv-n
  - type: text
    text: '“What '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' your petition? It shall be granted you. What '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' your request, up to half the kingdom? It shall be done!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Esther answered and said, “My petition and request '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'this:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If I have found favor in the sight of the king, and if it pleases the king to grant my petition and fulfill my request, then let the king and Haman come to the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 6:14
    marker-yv: yv-n
  - type: text
    text: banquet which I will prepare for them, and tomorrow I will do as the king has said.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Haman’s Plot Against Mordecai
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So Haman went out that day '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Job 20:5; Luke 6:25)
    marker-yv: yv-n
  - type: text
    text: 'joyful and with a glad heart; but when Haman saw Mordecai in the king’s gate, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 3:5
    marker-yv: yv-n
  - type: text
    text: 'that he did not stand or tremble before him, he was filled with indignation against Mordecai. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nevertheless Haman '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 13:22
    marker-yv: yv-n
  - type: text
    text: 'restrained himself and went home, and he sent and called for his friends and his wife Zeresh. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Haman told them of his great riches, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 9:7–10
    marker-yv: yv-n
  - type: text
    text: 'the multitude of his children, everything in which the king had promoted him, and how he had '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 3:1
    marker-yv: yv-n
  - type: text
    text: advanced him above the officials and servants of the king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Moreover Haman said, “Besides, Queen Esther invited no one but me to come in with the king to the banquet that she prepared; and tomorrow I am again invited by her, along with the king. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Yet all this avails me nothing, so long as I see Mordecai the Jew sitting at the king’s gate.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then his wife Zeresh and all his friends said to him, “Let a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 7:9
    marker-yv: yv-n
  - type: text
    text: 'gallows be made, fifty cubits high, and in the morning '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 6:4
    marker-yv: yv-n
  - type: text
    text: suggest to the king that Mordecai be hanged on it; then go merrily with the king to the banquet.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And the thing pleased Haman; so he had '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 7:10
    marker-yv: yv-n
  - type: text
    text: the gallows made.
