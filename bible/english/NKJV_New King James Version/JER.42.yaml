  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said to Jeremiah the prophet, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 15:11
      marker-yv: yv-n
    - type: text
      text: '“Please, let our petition be acceptable to you, and '
