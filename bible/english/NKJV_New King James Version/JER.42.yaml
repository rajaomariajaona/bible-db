  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But if '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 44:16
      marker-yv: yv-n
    - type: text
      text: 'you say, ‘We will not dwell in this land,’ disobeying the voice of the '
    - type: usfm
