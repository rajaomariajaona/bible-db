      marker-yv: yv-n
    - type: text
      text: 'pray for us to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, for all this remnant (since we are left '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:22; Deut. 28:62; Is. 1:9; Lam. 1:1
      marker-yv: yv-n
    - type: text
      text: 'a few of many, as you can see), '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you were hypocrites in your hearts when you sent me to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, saying, ‘Pray for us to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, and according to all that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God says, so declare to us and we will do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
    - type: text
      text: '’ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I have this day declared '
    - type: usfm
      marker: it
      children:
