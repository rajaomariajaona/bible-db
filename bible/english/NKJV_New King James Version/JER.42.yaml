  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“For thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, the God of Israel: ‘As My anger and My fury have been '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 36:16–19; Jer. 7:20
      marker-yv: yv-n
    - type: text
      text: 'poured out on the inhabitants of Jerusalem, so will My fury be poured out on you when you enter Egypt. And '
    - type: usfm
      marker: x
      children:
