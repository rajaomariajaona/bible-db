document_id: LEV.14,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ritual for Cleansing Healed Lepers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“And on the eighth day '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 8:4; Mark 1:44; Luke 5:14
      marker-yv: yv-n
    - type: text
      text: 'he shall take two male lambs without blemish, one ewe lamb of the first year without blemish, three-tenths of an ephah of fine flour mixed with oil as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:1; Num. 15:4
      marker-yv: yv-n
    - type: text
      text: 'a grain offering, and one log of oil. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then the priest who makes him clean shall present the man who is to be made clean, and those things, before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', at the door of the tabernacle of meeting. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the priest shall take one male lamb and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:6, 18; 6:6; 14:19
      marker-yv: yv-n
    - type: text
      text: 'offer it as a trespass offering, and the log of oil, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:22–24, 26
      marker-yv: yv-n
    - type: text
      text: 'wave them as a wave offering before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then he shall kill the lamb '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:11; Lev. 1:5, 11; 4:4, 24
      marker-yv: yv-n
    - type: text
      text: 'in the place where he kills the sin offering and the burnt offering, in a holy place; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 6:24–30; 7:7
      marker-yv: yv-n
    - type: text
      text: 'as the sin offering is the priest’s, so is the trespass offering. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:3; 7:6; 21:22
      marker-yv: yv-n
    - type: text
      text: 'It is most holy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The priest shall take some of the blood of the trespass offering, and the priest shall put it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:20; Lev. 8:23, 24
      marker-yv: yv-n
    - type: text
      text: 'on the tip of the right ear of him who is to be cleansed, on the thumb of his right hand, and on the big toe of his right foot. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the priest shall take some of the log of oil, and pour it into the palm of his own left hand. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then the priest shall dip his right finger in the oil that is in his left hand, and shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:6
      marker-yv: yv-n
    - type: text
      text: 'sprinkle some of the oil with his finger seven times before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And of the rest of the oil in his hand, the priest shall put some on the tip of the right ear of him who is to be cleansed, on the thumb of his right hand, and on the big toe of his right foot, on the blood of the trespass offering. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The rest of the oil that is in the priest’s hand he shall put on the head of him who is to be cleansed. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:26; 5:6; Num. 15:28; (Heb. 2:17)
      marker-yv: yv-n
    - type: text
      text: 'So the priest shall make atonement for him before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“Then the priest shall offer '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:1, 6; 12:7; (2 Cor. 5:21)
      marker-yv: yv-n
    - type: text
      text: 'the sin offering, and make atonement for him who is to be cleansed from his uncleanness. Afterward he shall kill the burnt offering. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“This shall be the law of the leper for the day of his cleansing: He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 8:2, 4; Mark 1:40, 44; Luke 5:12, 14; 17:14
      marker-yv: yv-n
    - type: text
      text: 'shall be brought to the priest. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And the priest shall offer the burnt offering and the grain offering on the altar. So the priest shall make atonement for him, and he shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:8, 9
      marker-yv: yv-n
    - type: text
      text: clean.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:7, 11; 12:8; 27:8
      marker-yv: yv-n
    - type: text
      text: 'if he is poor and cannot afford it, then he shall take one male lamb as a trespass offering to be waved, to make atonement for him, one-tenth of an ephah of fine flour mixed with oil as a grain offering, a log of oil, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 12:8; 15:14, 15
      marker-yv: yv-n
    - type: text
      text: 'and two turtledoves or two young pigeons, such as he is able to afford: one shall be a sin offering and the other a burnt offering. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:10, 11
      marker-yv: yv-n
    - type: text
      text: 'He shall bring them to the priest on the eighth day for his cleansing, to the door of the tabernacle of meeting, before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:12
      marker-yv: yv-n
    - type: text
      text: 'And the priest shall take the lamb of the trespass offering and the log of oil, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:14, 17
      marker-yv: yv-n
    - type: text
      text: 'and the priest shall wave them as a wave offering before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then he shall kill the lamb of the trespass offering, and the priest shall take some of the blood of the trespass offering and put it on the tip of the right ear of him who is to be cleansed, on the thumb of his right hand, and on the big toe of his right foot. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And the priest shall pour some of the oil into the palm of his own left hand. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Then the priest shall sprinkle with his right finger some of the oil that is in his left hand seven times before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And the priest shall put some of the oil that is in his hand on the tip of the right ear of him who is to be cleansed, on the thumb of the right hand, and on the big toe of his right foot, on the place of the blood of the trespass offering. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The rest of the oil that is in the priest’s hand he shall put on the head of him who is to be cleansed, to make atonement for him before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the priest shall go out of the camp, and the priest shall examine him; and indeed, if the leprosy is healed in the leper, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And he shall offer one of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:22; 15:14, 15
      marker-yv: yv-n
    - type: text
      text: 'the turtledoves or young pigeons, such as he can afford— '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'such as he is able to afford, the one as a sin offering and the other as a burnt offering, with the grain offering. So the priest shall make atonement for him who is to be cleansed before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'This is the law for one who had a leprous sore, who cannot afford '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:10
      marker-yv: yv-n
    - type: text
      text: the usual cleansing.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Law Concerning Leprous Houses
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses and Aaron, saying: '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:7; 13:17; 17:8; Num. 32:22; Deut. 7:1; 32:49
      marker-yv: yv-n
    - type: text
      text: '“When you have come into the land of Canaan, which I give you as a possession, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 3:33)
      marker-yv: yv-n
    - type: text
      text: 'I put the leprous plague in a house in the land of your possession, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'and he who owns the house comes and tells the priest, saying, ‘It seems to me that there is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 91:9, 10; Prov. 3:33; Zech. 5:4)
      marker-yv: yv-n
    - type: text
      text: 'some plague in the house,’ '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'then the priest shall command that they empty the house, before the priest goes into it to examine the plague, that all that is in the house may not be made unclean; and afterward the priest shall go in to examine the house. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And he shall examine the plague; and indeed if the plague is on the walls of the house with ingrained streaks, greenish or reddish, which appear to be deep in the wall, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'then the priest shall go out of the house, to the door of the house, and shut up the house seven days. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And the priest shall come again on the seventh day and look; and indeed if the plague has spread on the walls of the house, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'then the priest shall command to take for him who is to be cleansed two living and clean birds, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:6, 49, 51, 52; Num. 19:6; Heb. 9:19
      marker-yv: yv-n
    - type: text
      text: 'cedar wood, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:4
      marker-yv: yv-n
    - type: text
      text: 'scarlet, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:22; Ps. 51:7
      marker-yv: yv-n
    - type: text
      text: 'hyssop. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'then the priest shall command that they take away the stones in which is the plague, and they shall cast them into an unclean place outside the city. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'And he shall cause the house to be scraped inside, all around, and the dust that they scrape off they shall pour out in an unclean place outside the city. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Then they shall take other stones and put them in the place of those stones, and he shall take other mortar and plaster the house.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: '“Now if the plague comes back and breaks out in the house, after he has taken away the stones, after he has scraped the house, and after it is plastered, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'then the priest shall come and look; and indeed if the plague has spread in the house, it is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 13:51; (Zech. 5:4)
      marker-yv: yv-n
    - type: text
      text: 'an active leprosy in the house. It is unclean. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'And he shall break down the house, its stones, its timber, and all the plaster of the house, and he shall carry them outside the city to an unclean place. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Moreover he who goes into the house at all while it is shut up shall be unclean until '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:24; 15:5
      marker-yv: yv-n
    - type: text
      text: 'evening. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'And he who lies down in the house shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:8
      marker-yv: yv-n
    - type: text
      text: wash his clothes, and he who eats in the house shall wash his clothes.
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: '“But if the priest comes in and examines it, and indeed the plague has not spread in the house after the house was plastered, then the priest shall pronounce the house clean, because the plague is healed. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:4
      marker-yv: yv-n
    - type: text
      text: 'he shall take, to cleanse the house, two birds, cedar wood, scarlet, and hyssop. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the priest shall command that one of the birds be killed in an earthen vessel over running water. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Then he shall kill one of the birds in an earthen vessel over running water; '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'and he shall take the cedar wood, the hyssop, the scarlet, and the living bird, and dip them in the blood of the slain bird and in the running water, and sprinkle the house seven times. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'And he shall cleanse the house with the blood of the bird and the running water and the living bird, with the cedar wood, the hyssop, and the scarlet. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Then he shall let the living bird loose outside the city in the open field, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:20
      marker-yv: yv-n
    - type: text
      text: make atonement for the house, and it shall be clean.
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: '“This is the law for any '
    - type: usfm
      marker: x
      children:
      - type: text
