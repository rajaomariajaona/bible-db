document_id: LEV.14,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ritual for Cleansing Healed Lepers
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: '“And on the eighth day '
  - type: note
    content: Matt. 8:4; Mark 1:44; Luke 5:14
  - type: text
    content: 'he shall take two male lambs without blemish, one ewe lamb of the first year without blemish, three-tenths of an ephah of fine flour mixed with oil as '
  - type: note
    content: Lev. 2:1; Num. 15:4
  - type: text
    content: 'a grain offering, and one log of oil. '
  '11':
  - type: text
    content: 'Then the priest who makes him clean shall present the man who is to be made clean, and those things, before the '
  - type: heading
    content: Lord
  - type: text
    content: ', at the door of the tabernacle of meeting. '
  '12':
  - type: text
    content: 'And the priest shall take one male lamb and '
  - type: note
    content: Lev. 5:6, 18; 6:6; 14:19
  - type: text
    content: 'offer it as a trespass offering, and the log of oil, and '
  - type: note
    content: Ex. 29:22–24, 26
  - type: text
    content: 'wave them as a wave offering before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Then he shall kill the lamb '
  - type: note
    content: Ex. 29:11; Lev. 1:5, 11; 4:4, 24
  - type: text
    content: 'in the place where he kills the sin offering and the burnt offering, in a holy place; for '
  - type: note
    content: Lev. 6:24–30; 7:7
  - type: text
    content: 'as the sin offering is the priest’s, so is the trespass offering. '
  - type: note
    content: Lev. 2:3; 7:6; 21:22
  - type: text
    content: 'It is most holy. '
  '14':
  - type: text
    content: 'The priest shall take some of the blood of the trespass offering, and the priest shall put it '
  - type: note
    content: Ex. 29:20; Lev. 8:23, 24
  - type: text
    content: 'on the tip of the right ear of him who is to be cleansed, on the thumb of his right hand, and on the big toe of his right foot. '
  '15':
  - type: text
    content: 'And the priest shall take some of the log of oil, and pour it into the palm of his own left hand. '
  '16':
  - type: text
    content: 'Then the priest shall dip his right finger in the oil that is in his left hand, and shall '
  - type: note
    content: Lev. 4:6
  - type: text
    content: 'sprinkle some of the oil with his finger seven times before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'And of the rest of the oil in his hand, the priest shall put some on the tip of the right ear of him who is to be cleansed, on the thumb of his right hand, and on the big toe of his right foot, on the blood of the trespass offering. '
  '18':
  - type: text
    content: 'The rest of the oil that is in the priest’s hand he shall put on the head of him who is to be cleansed. '
  - type: note
    content: Lev. 4:26; 5:6; Num. 15:28; (Heb. 2:17)
  - type: text
    content: 'So the priest shall make atonement for him before the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '19':
  - type: text
    content: '“Then the priest shall offer '
  - type: note
    content: Lev. 5:1, 6; 12:7; (2 Cor. 5:21)
  - type: text
    content: 'the sin offering, and make atonement for him who is to be cleansed from his uncleanness. Afterward he shall kill the burnt offering. '
  '2':
  - type: text
    content: '“This shall be the law of the leper for the day of his cleansing: He '
  - type: note
    content: Matt. 8:2, 4; Mark 1:40, 44; Luke 5:12, 14; 17:14
  - type: text
    content: 'shall be brought to the priest. '
  '20':
  - type: text
    content: 'And the priest shall offer the burnt offering and the grain offering on the altar. So the priest shall make atonement for him, and he shall be '
  - type: note
    content: Lev. 14:8, 9
  - type: text
    content: clean.
  '21':
  - type: text
    content: '“But '
  - type: note
    content: Lev. 5:7, 11; 12:8; 27:8
  - type: text
    content: 'if he is poor and cannot afford it, then he shall take one male lamb as a trespass offering to be waved, to make atonement for him, one-tenth of an ephah of fine flour mixed with oil as a grain offering, a log of oil, '
  '22':
  - type: note
    content: Lev. 12:8; 15:14, 15
  - type: text
    content: 'and two turtledoves or two young pigeons, such as he is able to afford: one shall be a sin offering and the other a burnt offering. '
  '23':
  - type: note
    content: Lev. 14:10, 11
  - type: text
    content: 'He shall bring them to the priest on the eighth day for his cleansing, to the door of the tabernacle of meeting, before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '24':
  - type: note
    content: Lev. 14:12
  - type: text
    content: 'And the priest shall take the lamb of the trespass offering and the log of oil, '
  - type: note
    content: Lev. 14:14, 17
  - type: text
    content: 'and the priest shall wave them as a wave offering before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Then he shall kill the lamb of the trespass offering, and the priest shall take some of the blood of the trespass offering and put it on the tip of the right ear of him who is to be cleansed, on the thumb of his right hand, and on the big toe of his right foot. '
  '26':
  - type: text
    content: 'And the priest shall pour some of the oil into the palm of his own left hand. '
  '27':
  - type: text
    content: 'Then the priest shall sprinkle with his right finger some of the oil that is in his left hand seven times before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'And the priest shall put some of the oil that is in his hand on the tip of the right ear of him who is to be cleansed, on the thumb of the right hand, and on the big toe of his right foot, on the place of the blood of the trespass offering. '
  '29':
  - type: text
    content: 'The rest of the oil that is in the priest’s hand he shall put on the head of him who is to be cleansed, to make atonement for him before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'And the priest shall go out of the camp, and the priest shall examine him; and indeed, if the leprosy is healed in the leper, '
  '30':
  - type: text
    content: 'And he shall offer one of '
  - type: note
    content: Lev. 14:22; 15:14, 15
  - type: text
    content: 'the turtledoves or young pigeons, such as he can afford— '
  '31':
  - type: text
    content: 'such as he is able to afford, the one as a sin offering and the other as a burnt offering, with the grain offering. So the priest shall make atonement for him who is to be cleansed before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'This is the law for one who had a leprous sore, who cannot afford '
  - type: note
    content: Lev. 14:10
  - type: text
    content: the usual cleansing.”
  - type: heading
    content: The Law Concerning Leprous Houses
  '33':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron, saying: '
  '34':
  - type: note
    content: Gen. 12:7; 13:17; 17:8; Num. 32:22; Deut. 7:1; 32:49
  - type: text
    content: '“When you have come into the land of Canaan, which I give you as a possession, and '
  - type: note
    content: (Prov. 3:33)
  - type: text
    content: 'I put the leprous plague in a house in the land of your possession, '
  '35':
  - type: text
    content: 'and he who owns the house comes and tells the priest, saying, ‘It seems to me that there is '
  - type: note
    content: (Ps. 91:9, 10; Prov. 3:33; Zech. 5:4)
  - type: text
    content: 'some plague in the house,’ '
  '36':
  - type: text
    content: 'then the priest shall command that they empty the house, before the priest goes into it to examine the plague, that all that is in the house may not be made unclean; and afterward the priest shall go in to examine the house. '
  '37':
  - type: text
    content: 'And he shall examine the plague; and indeed if the plague is on the walls of the house with ingrained streaks, greenish or reddish, which appear to be deep in the wall, '
  '38':
  - type: text
    content: 'then the priest shall go out of the house, to the door of the house, and shut up the house seven days. '
  '39':
  - type: text
    content: 'And the priest shall come again on the seventh day and look; and indeed if the plague has spread on the walls of the house, '
  '4':
  - type: text
    content: 'then the priest shall command to take for him who is to be cleansed two living and clean birds, '
  - type: note
    content: Lev. 14:6, 49, 51, 52; Num. 19:6; Heb. 9:19
  - type: text
    content: 'cedar wood, '
  - type: note
    content: Ex. 25:4
  - type: text
    content: 'scarlet, and '
  - type: note
    content: Ex. 12:22; Ps. 51:7
  - type: text
    content: 'hyssop. '
  '40':
  - type: text
    content: 'then the priest shall command that they take away the stones in which is the plague, and they shall cast them into an unclean place outside the city. '
  '41':
  - type: text
    content: 'And he shall cause the house to be scraped inside, all around, and the dust that they scrape off they shall pour out in an unclean place outside the city. '
  '42':
  - type: text
    content: Then they shall take other stones and put them in the place of those stones, and he shall take other mortar and plaster the house.
  '43':
  - type: text
    content: '“Now if the plague comes back and breaks out in the house, after he has taken away the stones, after he has scraped the house, and after it is plastered, '
  '44':
  - type: text
    content: 'then the priest shall come and look; and indeed if the plague has spread in the house, it is '
  - type: note
    content: Lev. 13:51; (Zech. 5:4)
  - type: text
    content: 'an active leprosy in the house. It is unclean. '
  '45':
  - type: text
    content: 'And he shall break down the house, its stones, its timber, and all the plaster of the house, and he shall carry them outside the city to an unclean place. '
  '46':
  - type: text
    content: 'Moreover he who goes into the house at all while it is shut up shall be unclean until '
  - type: note
    content: Lev. 11:24; 15:5
  - type: text
    content: 'evening. '
  '47':
  - type: text
    content: 'And he who lies down in the house shall '
  - type: note
    content: Lev. 14:8
  - type: text
    content: wash his clothes, and he who eats in the house shall wash his clothes.
  '48':
  - type: text
    content: '“But if the priest comes in and examines it, and indeed the plague has not spread in the house after the house was plastered, then the priest shall pronounce the house clean, because the plague is healed. '
  '49':
  - type: text
    content: 'And '
  - type: note
    content: Lev. 14:4
  - type: text
    content: 'he shall take, to cleanse the house, two birds, cedar wood, scarlet, and hyssop. '
  '5':
  - type: text
    content: 'And the priest shall command that one of the birds be killed in an earthen vessel over running water. '
  '50':
  - type: text
    content: 'Then he shall kill one of the birds in an earthen vessel over running water; '
  '51':
  - type: text
    content: 'and he shall take the cedar wood, the hyssop, the scarlet, and the living bird, and dip them in the blood of the slain bird and in the running water, and sprinkle the house seven times. '
  '52':
  - type: text
    content: 'And he shall cleanse the house with the blood of the bird and the running water and the living bird, with the cedar wood, the hyssop, and the scarlet. '
  '53':
  - type: text
    content: 'Then he shall let the living bird loose outside the city in the open field, and '
  - type: note
    content: Lev. 14:20
  - type: text
    content: make atonement for the house, and it shall be clean.
  '54':
  - type: text
    content: '“This is the law for any '
  - type: note
    content: Lev. 13:30; 26:21
  - type: text
    content: 'leprous sore and scale, '
  '55':
  - type: text
    content: 'for the '
  - type: note
    content: Lev. 13:47–52
  - type: text
    content: 'leprosy of a garment '
  - type: note
    content: Lev. 14:34
  - type: text
    content: 'and of a house, '
  '56':
  - type: note
    content: Lev. 13:2
  - type: text
    content: 'for a swelling and a scab and a bright spot, '
  '57':
  - type: text
    content: 'to '
  - type: note
    content: Lev. 11:47; 20:25; Deut. 24:8; Ezek. 44:23
  - type: text
    content: teach when it is unclean and when it is clean. This is the law of leprosy.”
  '6':
  - type: text
    content: 'As for the living bird, he shall take it, the cedar wood and the scarlet and the hyssop, and dip them and the living bird in the blood of the bird that was killed over the running water. '
  '7':
  - type: text
    content: 'And he shall '
  - type: note
    content: Num. 19:18, 19; (Heb. 9:13, 21; 12:24)
  - type: text
    content: 'sprinkle it '
  - type: note
    content: 2 Kin. 5:10, 14; Ps. 51:2
  - type: text
    content: 'seven times on him who is to be cleansed from the leprosy, and shall pronounce him clean, and shall let the living bird loose in the open field. '
  '8':
  - type: text
    content: 'He who is to be cleansed '
  - type: note
    content: Lev. 11:25; 13:6; Num. 8:7
  - type: text
    content: 'shall wash his clothes, shave off all his hair, and '
  - type: note
    content: Lev. 11:25; (Eph. 5:26; Heb. 10:22; Rev. 1:5, 6)
  - type: text
    content: 'wash himself in water, that he may be clean. After that he shall come into the camp, and '
  - type: note
    content: Lev. 13:5; Num. 5:2, 3; 12:14, 15; 2 Chr. 26:21
  - type: text
    content: 'shall stay outside his tent seven days. '
  '9':
  - type: text
    content: 'But on the '
  - type: note
    content: Num. 19:19
  - type: text
    content: seventh day he shall shave all the hair off his head and his beard and his eyebrows—all his hair he shall shave off. He shall wash his clothes and wash his body in water, and he shall be clean.
