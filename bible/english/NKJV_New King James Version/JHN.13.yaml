  - type: text
    content: loved them to the end.
  '10':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“He who is bathed needs only to wash '
  - type: text
    content: his
  - type: text
    content: ' feet, but is completely clean; and '
  - type: note
