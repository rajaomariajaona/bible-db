  - type: note
    content: Matt. 11:29; Phil. 2:5; (1 Pet. 2:21–24); 1 John 2:6
  - type: text
    content: I have given you an example, that you should do as I have done to you.
  - type: text
    content: ' '
  '16':
  - type: note
    content: Matt. 10:24; (Luke 6:40); John 15:20
  - type: text
