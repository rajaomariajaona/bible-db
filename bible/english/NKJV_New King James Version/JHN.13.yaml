  - type: note
    content: Matt. 7:24; Luke 11:28; (James 1:25)
  - type: text
    content: If you know these things, blessed are you if you do them.
  - type: heading
    content: Jesus Identifies His Betrayer
  '18':
  - type: text
    content: '“I do not speak concerning all of you. I know whom I have chosen; but that the '
  - type: note
    content: John 15:25; 17:12
  - type: text
    content: 'Scripture may be fulfilled, '
  - type: note
    content: Ps. 41:9; Matt. 26:23
  - type: text
    content: '‘He who eats '
  - type: text
    content: bread with Me
  - type: text
    content: ' '
  - type: text
    content: has lifted up his heel against Me.’
  - type: text
    content: ' '
  '19':
  - type: note
    content: John 14:29; 16:4
  - type: text
    content: 'Now I tell you before it comes, that when it does come to pass, you may believe that I am '
  - type: text
    content: He.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And supper being ended, '
  - type: note
    content: Luke 22:3
  - type: text
    content: 'the devil having already put it into the heart of Judas Iscariot, Simon’s '
  - type: text
    content: son,
  - type: text
    content: ' to betray Him, '
  '20':
  - type: note
    content: Matt. 10:40; Mark 9:37; Luke 9:48; 10:16; Gal. 4:14
  - type: text
    content: Most assuredly, I say to you, he who receives whomever I send receives Me; and he who receives Me receives Him who sent Me.”
  '21':
  - type: note
    content: Matt. 26:21; Mark 14:18; Luke 22:21
  - type: text
    content: 'When Jesus had said these things, '
  - type: note
    content: John 12:27
  - type: text
    content: 'He was troubled in spirit, and testified and said, '
  - type: text
    content: '“Most assuredly, I say to you, '
  - type: note
    content: Ps. 41:9; Matt. 26:46; Mark 14:42; Luke 22:48; John 6:64; 18:5; Acts 1:17; 1 John 2:19
  - type: text
    content: one of you will betray Me.”
  - type: text
    content: ' '
  '22':
  - type: text
    content: Then the disciples looked at one another, perplexed about whom He spoke.
  '23':
  - type: text
    content: 'Now '
  - type: note
    content: John 19:26; 20:2; 21:7, 20
  - type: text
    content: 'there was leaning on Jesus’ bosom one of His disciples, whom Jesus loved. '
  '24':
  - type: text
    content: Simon Peter therefore motioned to him to ask who it was of whom He spoke.
  '25':
  - type: text
    content: Then, leaning back on Jesus’ breast, he said to Him, “Lord, who is it?”
  '26':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“It is he to whom I shall give a piece of bread when I have dipped '
  - type: text
    content: it.
  - type: text
    content: ”
  - type: text
    content: ' And having dipped the bread, He gave '
  - type: text
    content: it
  - type: text
    content: ' to '
  - type: note
    content: Matt. 10:4; John 6:70, 71; 12:4; Acts 1:16
  - type: text
    content: 'Judas Iscariot, '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: son
  - type: text
    content: ' of Simon. '
  '27':
  - type: note
    content: Luke 22:3
  - type: text
    content: 'Now after the piece of bread, Satan entered him. Then Jesus said to him, '
  - type: text
    content: “What you do, do quickly.”
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'But no one at the table knew for what reason He said this to him. '
  '29':
  - type: text
    content: 'For some thought, because '
  - type: note
    content: John 12:6
  - type: text
    content: 'Judas had the money box, that Jesus had said to him, “Buy '
  - type: text
    content: those
  - type: text
    content: ' '
  - type: text
    content: things
  - type: text
    content: ' we need for the feast,” or that he should give something to the poor.'
  '3':
  - type: text
    content: 'Jesus, knowing '
  - type: note
    content: Matt. 11:27; (John 5:20–23; 17:2); Acts 2:36; 1 Cor. 15:27; (Heb. 2:8)
  - type: text
    content: 'that the Father had given all things into His hands, and that He '
  - type: note
    content: John 8:42; 16:28
  - type: text
    content: 'had come from God and '
  - type: note
    content: John 17:11; 20:17
  - type: text
    content: 'was going to God, '
  '30':
  - type: text
    content: Having received the piece of bread, he then went out immediately. And it was night.
  - type: heading
    content: The New Commandment
  '31':
  - type: text
    content: 'So, when he had gone out, Jesus said, '
  - type: note
    content: John 12:23; Acts 3:13
  - type: text
    content: '“Now the Son of Man is glorified, and '
  - type: note
    content: (John 14:13; 17:4; 1 Pet. 4:11)
  - type: text
    content: God is glorified in Him.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'If God is glorified in Him, God will also glorify Him in Himself, and '
  - type: note
    content: John 12:23
  - type: text
    content: glorify Him immediately.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Little children, I shall be with you a '
  - type: note
    content: John 12:35; 14:19; 16:16–19
  - type: text
    content: 'little while longer. You will seek Me; '
  - type: note
    content: Mark 16:19; (John 7:34; 8:21); Acts 1:9
  - type: text
    content: and as I said to the Jews, ‘Where I am going, you cannot come,’ so now I say to you.
  - type: text
    content: ' '
  '34':
  - type: note
    content: Lev. 19:18; Eph. 5:2; 1 Thess. 4:9; James 2:8; 1 Pet. 1:22; 1 John 2:7
  - type: text
    content: A new commandment I give to you, that you love one another; as I have loved you, that you also love one another.
  - type: text
    content: ' '
  '35':
  - type: note
    content: 1 John 2:5
  - type: text
    content: By this all will know that you are My disciples, if you have love for one another.”
  - type: heading
    content: Jesus Predicts Peter’s Denial
  '36':
  - type: text
    content: Simon Peter said to Him, “Lord, where are You going?”
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: '“Where I '
  - type: note
    content: John 13:33; 14:2; 16:5
  - type: text
    content: 'am going you cannot follow Me now, but '
  - type: note
    content: John 21:17; 2 Pet. 1:14
  - type: text
    content: you shall follow Me afterward.”
  '37':
  - type: text
    content: 'Peter said to Him, “Lord, why can I not follow You now? I will '
  - type: note
    content: Matt. 26:33–35; Mark 14:29–31; Luke 22:33, 34
  - type: text
    content: lay down my life for Your sake.”
  '38':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: '“Will you lay down your life for My sake? Most assuredly, I say to you, the rooster shall not '
  - type: note
    content: Matt. 26:74; Mark 14:30; Luke 22:61; John 18:25–27
  - type: text
    content: crow till you have denied Me three times.
  '4':
  - type: note
    content: (Luke 22:27; Phil. 2:7, 8)
  - type: text
    content: 'rose from supper and laid aside His garments, took a towel and girded Himself. '
  '5':
  - type: text
    content: 'After that, He poured water into a basin and began to wash the disciples’ feet, and to wipe '
  - type: text
    content: them
  - type: text
    content: ' with the towel with which He was girded. '
  '6':
  - type: text
    content: 'Then He came to Simon Peter. And '
  - type: text
    content: Peter
  - type: text
    content: ' said to Him, '
  - type: note
    content: Matt. 3:14
  - type: text
    content: “Lord, are You washing my feet?”
  '7':
  - type: text
    content: 'Jesus answered and said to him, '
  - type: text
    content: '“What I am doing you '
  - type: note
    content: John 12:16; 16:12
  - type: text
    content: 'do not understand now, '
  - type: note
    content: John 13:19
  - type: text
    content: but you will know after this.”
  '8':
  - type: text
    content: Peter said to Him, “You shall never wash my feet!”
  - type: text
    content: 'Jesus answered him, '
  - type: note
    content: (Ps. 51:2, 7; Ezek. 36:25; Acts 22:16; 1 Cor. 6:11; Eph. 5:26; Titus 3:5; Heb. 10:22)
  - type: text
    content: “If I do not wash you, you have no part with Me.”
  '9':
  - type: text
    content: 'Simon Peter said to Him, “Lord, not my feet only, but also '
  - type: text
    content: my
  - type: text
    content: ' hands and '
  - type: text
    content: my
  - type: text
    content: ' head!”'
