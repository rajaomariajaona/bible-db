  - type: note
    content: Matt. 23:8, 10; Luke 6:46; (1 Cor. 8:6; 12:3); Eph. 6:9; (Phil. 2:11)
  - type: text
    content: 'You call Me Teacher and Lord, and you say well, for '
  - type: text
