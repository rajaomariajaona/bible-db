    content: Jesus Washes the Disciples’ Feet
  - type: text
    content: 'Now '
  - type: note
    content: Matt. 26:2
  - type: text
    content: 'before the Feast of the Passover, when Jesus knew that '
  - type: note
    content: John 12:23; 17:1
  - type: text
    content: 'His hour had come that He should depart from this world to the Father, having loved His own who were in the world, He '
  - type: note
