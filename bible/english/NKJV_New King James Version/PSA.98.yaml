document_id: PSA.98,114
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Praise to the Lord for His Salvation and Judgment
  - type: text
    content: A Psalm.
  - type: text
    content: 'Oh, '
  - type: note
    content: Ps. 33:3; Is. 42:10
  - type: text
    content: 'sing to the '
  - type: heading
    content: Lord
  - type: text
    content: ' a new song!'
  - type: text
    content: 'For He has '
  - type: note
    content: Ex. 15:11; Ps. 77:14
  - type: text
    content: done marvelous things;
  - type: text
    content: His right hand and His holy arm have gained Him the victory.
  '2':
  - type: note
    content: Is. 52:10; (Luke 1:77; 2:30, 31)
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' has made known His salvation;'
  - type: note
    content: Is. 62:2; Rom. 3:25
  - type: text
    content: His righteousness He has revealed in the sight of the nations.
  '3':
  - type: text
    content: He has remembered His mercy and His faithfulness to the house of Israel;
  - type: note
    content: (Is. 49:6); Luke 3:6; (Acts 13:47; 28:28)
  - type: text
    content: All the ends of the earth have seen the salvation of our God.
  '4':
  - type: text
    content: 'Shout joyfully to the '
  - type: heading
    content: Lord
  - type: text
    content: ', all the earth;'
  - type: text
    content: Break forth in song, rejoice, and sing praises.
  '5':
  - type: text
    content: 'Sing to the '
  - type: heading
    content: Lord
  - type: text
    content: ' with the harp,'
  - type: text
    content: With the harp and the sound of a psalm,
  '6':
  - type: text
    content: With trumpets and the sound of a horn;
  - type: text
    content: 'Shout joyfully before the '
  - type: heading
    content: Lord
  - type: text
    content: ', the King.'
  '7':
  - type: text
    content: Let the sea roar, and all its fullness,
  - type: text
    content: The world and those who dwell in it;
  '8':
  - type: text
    content: 'Let the rivers clap '
  - type: text
    content: their
  - type: text
    content: ' hands;'
  - type: text
    content: 'Let the hills be joyful together before the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  '9':
  - type: note
    content: (Ps. 96:10, 13)
  - type: text
    content: For He is coming to judge the earth.
  - type: text
    content: With righteousness He shall judge the world,
  - type: text
    content: And the peoples with equity.
