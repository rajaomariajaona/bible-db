  - type: text
    content: 'in the land of Goshen. And if you know '
  - type: text
    content: any
  - type: text
    content: ' competent men among them, then make them chief herdsmen over my livestock.”'
  '7':
  - type: text
    content: 'Then Joseph brought in his father Jacob and set him before Pharaoh; and Jacob '
  - type: note
    content: Gen. 47:10; 48:15, 20; 2 Sam. 14:22; 1 Kin. 8:66; Heb. 7:7
  - type: text
    content: 'blessed Pharaoh. '
  '8':
  - type: text
    content: 'Pharaoh said to Jacob, “How old '
  - type: text
    content: are
  - type: text
    content: ' you?”'
  '9':
  - type: text
    content: 'And Jacob said to Pharaoh, '
  - type: note
    content: Ps. 39:12; (Heb. 11:9, 13)
  - type: text
    content: '“The days of the years of my pilgrimage '
  - type: text
    content: are
  - type: text
    content: ' '
  - type: note
