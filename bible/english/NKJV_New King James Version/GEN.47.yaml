  '14':
  - type: note
    content: Gen. 41:56; 42:6
  - type: text
    content: And Joseph gathered up all the money that was found in the land of Egypt and in the land of Canaan, for the grain which they bought; and Joseph brought the money into Pharaoh’s house.
  '15':
  - type: text
    content: 'So when the money failed in the land of Egypt and in the land of Canaan, all the Egyptians came to Joseph and said, “Give us bread, for '
  - type: note
    content: Gen. 47:19
  - type: text
    content: why should we die in your presence? For the money has failed.”
  '16':
  - type: text
    content: 'Then Joseph said, “Give your livestock, and I will give you '
  - type: text
    content: bread
  - type: text
    content: ' for your livestock, if the money is gone.” '
  '17':
  - type: text
    content: 'So they brought their livestock to Joseph, and Joseph gave them bread '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: text
    content: exchange
  - type: text
    content: ' for the horses, the flocks, the cattle of the herds, and for the donkeys. Thus he fed them with bread '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: text
    content: exchange
  - type: text
    content: ' for all their livestock that year.'
  '18':
  - type: text
    content: 'When that year had ended, they came to him the next year and said to him, “We will not hide from my lord that our money is gone; my lord also has our herds of livestock. There is nothing left in the sight of my lord but our bodies and our lands. '
  '19':
  - type: text
    content: 'Why should we die before your eyes, both we and our land? Buy us and our land for bread, and we and our land will be servants of Pharaoh; give '
  - type: text
    content: us
  - type: text
    content: ' seed, that we may '
  - type: note
    content: Gen. 43:8
  - type: text
    content: live and not die, that the land may not be desolate.”
  '2':
  - type: text
    content: 'And he took five men from among his brothers and '
  - type: note
    content: Acts 7:13
  - type: text
    content: 'presented them to Pharaoh. '
  '20':
  - type: text
    content: 'Then Joseph '
  - type: note
    content: Jer. 32:43
  - type: text
    content: 'bought all the land of Egypt for Pharaoh; for every man of the Egyptians sold his field, because the famine was severe upon them. So the land became Pharaoh’s. '
  '21':
  - type: text
    content: 'And as for the people, he moved them into the cities, from '
  - type: text
    content: one
  - type: text
    content: ' end of the borders of Egypt to the '
  - type: text
    content: other
  - type: text
    content: ' end. '
  '22':
  - type: note
    content: Lev. 25:34; Ezra 7:24
  - type: text
    content: 'Only the land of the '
  - type: note
    content: Gen. 41:45
  - type: text
    content: 'priests he did not buy; for the priests had rations '
  - type: text
    content: allotted
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: them
  - type: text
    content: ' by Pharaoh, and they ate their rations which Pharaoh gave them; therefore they did not sell their lands.'
  '23':
  - type: text
    content: 'Then Joseph said to the people, “Indeed I have bought you and your land this day for Pharaoh. Look, '
  - type: text
    content: here
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' seed for you, and you shall sow the land. '
  '24':
  - type: text
    content: And it shall come to pass in the harvest that you shall give one-fifth to Pharaoh. Four-fifths shall be your own, as seed for the field and for your food, for those of your households and as food for your little ones.”
  '25':
  - type: text
    content: 'So they said, “You have saved '
  - type: note
    content: Gen. 33:15
  - type: text
    content: 'our lives; let us find favor in the sight of my lord, and we will be Pharaoh’s servants.” '
  '26':
  - type: text
    content: 'And Joseph made it a law over the land of Egypt to this day, '
  - type: text
    content: that
  - type: text
    content: ' Pharaoh should have one-fifth, '
  - type: note
    content: Gen. 47:22
  - type: text
    content: 'except for the land of the priests only, '
  - type: text
    content: which
  - type: text
    content: ' did not become Pharaoh’s.'
  - type: heading
    content: Joseph’s Vow to Jacob
  '27':
  - type: text
    content: 'So Israel '
  - type: note
    content: Gen. 47:11
  - type: text
    content: 'dwelt in the land of Egypt, in the country of Goshen; and they had possessions there and '
  - type: note
    content: Gen. 17:6; 26:4; 35:11; 46:3; Ex. 1:7; Deut. 26:5; Acts 7:17
  - type: text
    content: 'grew and multiplied exceedingly. '
  '28':
  - type: text
    content: 'And Jacob lived in the land of Egypt seventeen years. So the length of Jacob’s life was one hundred and forty-seven years. '
  '29':
  - type: text
    content: 'When the time '
  - type: note
    content: Deut. 31:14; 1 Kin. 2:1
  - type: text
    content: 'drew near that Israel must die, he called his son Joseph and said to him, “Now if I have found favor in your sight, please '
  - type: note
