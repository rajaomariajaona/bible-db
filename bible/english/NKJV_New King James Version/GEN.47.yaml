  - type: text
    content: 'put your hand under my thigh, and '
  - type: note
    content: Gen. 24:49; Josh. 2:14
  - type: text
    content: 'deal kindly and truly with me. '
  - type: note
    content: Gen. 50:25
  - type: text
    content: 'Please do not bury me in Egypt, '
  '3':
  - type: text
    content: 'Then Pharaoh said to his brothers, '
  - type: note
    content: Gen. 46:33; Jon. 1:8
  - type: text
    content: '“What '
  - type: text
    content: is
  - type: text
    content: ' your occupation?”'
  - type: text
    content: 'And they said to Pharaoh, '
  - type: note
    content: Gen. 46:32, 34; Ex. 2:17, 19
  - type: text
    content: '“Your servants '
  - type: text
    content: are
  - type: text
    content: ' shepherds, both we '
  - type: text
    content: and
  - type: text
    content: ' also our fathers.” '
  '30':
  - type: text
    content: 'but '
  - type: note
    content: 2 Sam. 19:37
  - type: text
    content: 'let me lie with my fathers; you shall carry me out of Egypt and '
  - type: note
    content: Gen. 49:29; 50:5–13; Heb. 11:21
  - type: text
    content: bury me in their burial place.”
  - type: text
    content: And he said, “I will do as you have said.”
  '31':
  - type: text
    content: 'Then he said, “Swear to me.” And he swore to him. So '
  - type: note
    content: Gen. 48:2; 1 Kin. 1:47; Heb. 11:21
  - type: text
    content: Israel bowed himself on the head of the bed.
  '4':
  - type: text
