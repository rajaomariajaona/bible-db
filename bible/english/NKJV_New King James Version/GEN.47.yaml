  - type: text
    content: 'for the famine '
  - type: text
    content: is
  - type: text
    content: ' severe in the land of Canaan. Now therefore, please let your servants '
  - type: note
    content: Gen. 46:34
  - type: text
    content: dwell in the land of Goshen.”
  '5':
  - type: text
    content: 'Then Pharaoh spoke to Joseph, saying, “Your father and your brothers have come to you. '
  '6':
  - type: note
    content: Gen. 20:15; 45:10, 18; 47:11
  - type: text
    content: 'The land of Egypt '
  - type: text
    content: is
  - type: text
    content: ' before you. Have your father and brothers dwell in the best of the land; let them dwell '
  - type: note
