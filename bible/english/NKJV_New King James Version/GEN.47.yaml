  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When that year had ended, they came to him the next year and said to him, “We will not hide from my lord that our money is gone; my lord also has our herds of livestock. There is nothing left in the sight of my lord but our bodies and our lands. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why should we die before your eyes, both we and our land? Buy us and our land for bread, and we and our land will be servants of Pharaoh; give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us
    - type: text
