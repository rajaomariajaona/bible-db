document_id: HAB.3,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Prophet’s Prayer
  - type: text
    content: A prayer of Habakkuk the prophet, on Shigionoth.
  '10':
  - type: text
    content: 'The mountains saw You '
  - type: text
    content: and
  - type: text
    content: ' trembled;'
  - type: text
    content: The overflowing of the water passed by.
  - type: text
    content: The deep uttered its voice,
  - type: text
    content: And
  - type: text
    content: ' '
  - type: note
    content: Ex. 14:22
  - type: text
    content: lifted its hands on high.
  '11':
  - type: text
    content: 'The '
  - type: note
    content: Josh. 10:12–14
  - type: text
    content: sun and moon stood still in their habitation;
  - type: text
    content: At the light of Your arrows they went,
  - type: text
    content: At the shining of Your glittering spear.
  '12':
  - type: text
    content: You marched through the land in indignation;
  - type: text
    content: You trampled the nations in anger.
  '13':
  - type: text
    content: You went forth for the salvation of Your people,
  - type: text
    content: For salvation with Your Anointed.
  - type: text
    content: You struck the head from the house of the wicked,
  - type: text
    content: By laying bare from foundation to neck.
  - type: text
    content: Selah
  '14':
  - type: text
    content: You thrust through with his own arrows
  - type: text
    content: The head of his villages.
  - type: text
    content: They came out like a whirlwind to scatter me;
  - type: text
    content: Their rejoicing was like feasting on the poor in secret.
  '15':
  - type: note
    content: Ps. 77:19; Hab. 3:8
  - type: text
    content: You walked through the sea with Your horses,
  - type: text
    content: Through the heap of great waters.
  '16':
  - type: text
    content: 'When I heard, '
  - type: note
    content: Ps. 119:120
  - type: text
    content: my body trembled;
  - type: text
    content: 'My lips quivered at '
  - type: text
    content: the
  - type: text
    content: ' voice;'
  - type: text
    content: Rottenness entered my bones;
  - type: text
    content: And I trembled in myself,
  - type: text
    content: That I might rest in the day of trouble.
  - type: text
    content: When he comes up to the people,
  - type: text
    content: He will invade them with his troops.
  - type: heading
    content: A Hymn of Faith
  '17':
  - type: text
    content: Though the fig tree may not blossom,
  - type: text
    content: Nor fruit be on the vines;
  - type: text
    content: Though the labor of the olive may fail,
  - type: text
    content: And the fields yield no food;
  - type: text
    content: Though the flock may be cut off from the fold,
  - type: text
    content: And there be no herd in the stalls—
  '18':
  - type: text
    content: 'Yet I will '
  - type: note
    content: Is. 41:16; 61:10
  - type: text
    content: 'rejoice in the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: I will joy in the God of my salvation.
  '19':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' God is my strength;'
  - type: text
    content: 'He will make my feet like '
  - type: note
    content: 2 Sam. 22:34; Ps. 18:33
  - type: text
    content: 'deer’s '
  - type: text
    content: feet,
  - type: text
    content: 'And He will make me '
  - type: note
    content: Deut. 32:13; 33:29
  - type: text
    content: walk on my high hills.
  - type: text
    content: To the Chief Musician. With my stringed instruments.
  '2':
  - type: text
    content: 'O '
  - type: heading
    content: Lord
  - type: text
    content: ', I have heard Your speech '
  - type: text
    content: and
  - type: text
    content: ' was afraid;'
  - type: text
    content: 'O '
  - type: heading
    content: Lord
  - type: text
    content: ', revive Your work in the midst of the years!'
  - type: text
    content: 'In the midst of the years make '
  - type: text
    content: it
  - type: text
    content: ' known;'
  - type: text
    content: In wrath remember mercy.
  '3':
  - type: text
    content: God came from Teman,
  - type: text
    content: The Holy One from Mount Paran.
  - type: text
    content: Selah
  - type: text
    content: His glory covered the heavens,
  - type: text
    content: And the earth was full of His praise.
  '4':
  - type: text
    content: His
  - type: text
    content: ' brightness was like the light;'
  - type: text
    content: 'He had rays '
  - type: text
    content: flashing
  - type: text
    content: ' from His hand,'
  - type: text
    content: 'And there His power '
  - type: text
    content: was
  - type: text
    content: ' hidden.'
  '5':
  - type: text
    content: Before Him went pestilence,
  - type: text
    content: And fever followed at His feet.
  '6':
  - type: text
    content: He stood and measured the earth;
  - type: text
    content: He looked and startled the nations.
  - type: note
    content: Nah. 1:5
  - type: text
    content: And the everlasting mountains were scattered,
  - type: text
    content: The perpetual hills bowed.
  - type: text
    content: 'His ways '
  - type: text
    content: are
  - type: text
    content: ' everlasting.'
  '7':
  - type: text
    content: I saw the tents of Cushan in affliction;
  - type: text
    content: The curtains of the land of Midian trembled.
  '8':
  - type: text
    content: 'O '
  - type: heading
    content: Lord
  - type: text
    content: ', were '
  - type: text
    content: You
  - type: text
    content: ' displeased with the rivers,'
  - type: text
    content: Was
  - type: text
    content: ' Your anger against the rivers,'
  - type: text
    content: Was
  - type: text
    content: ' Your wrath against the sea,'
  - type: text
    content: That You rode on Your horses,
  - type: text
    content: Your chariots of salvation?
  '9':
  - type: text
    content: Your bow was made quite ready;
  - type: text
    content: 'Oaths were sworn over '
  - type: text
    content: Your
  - type: text
    content: ' arrows.'
  - type: text
    content: Selah
  - type: text
    content: You divided the earth with rivers.
