document_id: HAB.3,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Prophet’s Prayer
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: A prayer of Habakkuk the prophet, on Shigionoth.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The mountains saw You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trembled;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The overflowing of the water passed by.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The deep uttered its voice,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 14:22
      marker-yv: yv-n
    - type: text
      text: lifted its hands on high.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 10:12–14
      marker-yv: yv-n
    - type: text
      text: sun and moon stood still in their habitation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At the light of Your arrows they went,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At the shining of Your glittering spear.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You marched through the land in indignation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You trampled the nations in anger.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You went forth for the salvation of Your people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For salvation with Your Anointed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You struck the head from the house of the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By laying bare from foundation to neck.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You thrust through with his own arrows
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The head of his villages.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They came out like a whirlwind to scatter me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their rejoicing was like feasting on the poor in secret.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 77:19; Hab. 3:8
      marker-yv: yv-n
    - type: text
      text: You walked through the sea with Your horses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Through the heap of great waters.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When I heard, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:120
      marker-yv: yv-n
    - type: text
      text: my body trembled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My lips quivered at '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' voice;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rottenness entered my bones;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I trembled in myself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I might rest in the day of trouble.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When he comes up to the people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will invade them with his troops.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Hymn of Faith
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though the fig tree may not blossom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor fruit be on the vines;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Though the labor of the olive may fail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the fields yield no food;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Though the flock may be cut off from the fold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And there be no herd in the stalls—
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yet I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 41:16; 61:10
      marker-yv: yv-n
    - type: text
      text: 'rejoice in the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will joy in the God of my salvation.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God is my strength;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He will make my feet like '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 22:34; Ps. 18:33
      marker-yv: yv-n
    - type: text
      text: 'deer’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And He will make me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:13; 33:29
      marker-yv: yv-n
    - type: text
      text: walk on my high hills.
  - type: usfm
    marker: p
    children:
    - type: text
      text: To the Chief Musician. With my stringed instruments.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I have heard Your speech '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' was afraid;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', revive Your work in the midst of the years!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the midst of the years make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' known;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In wrath remember mercy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God came from Teman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Holy One from Mount Paran.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His glory covered the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the earth was full of His praise.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' brightness was like the light;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He had rays '
    - type: usfm
      marker: it
      children:
      - type: text
        text: flashing
    - type: text
      text: ' from His hand,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And there His power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' hidden.'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Before Him went pestilence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And fever followed at His feet.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He stood and measured the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He looked and startled the nations.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Nah. 1:5
      marker-yv: yv-n
    - type: text
      text: And the everlasting mountains were scattered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The perpetual hills bowed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His ways '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' everlasting.'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I saw the tents of Cushan in affliction;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The curtains of the land of Midian trembled.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You
    - type: text
      text: ' displeased with the rivers,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Was
    - type: text
      text: ' Your anger against the rivers,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Was
    - type: text
      text: ' Your wrath against the sea,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That You rode on Your horses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your chariots of salvation?
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your bow was made quite ready;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Oaths were sworn over '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Your
    - type: text
      text: ' arrows.'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You divided the earth with rivers.
