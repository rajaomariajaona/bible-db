document_id: 1KI.16,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 16:7; 2 Chr. 19:2; 20:34
      marker-yv: yv-n
    - type: text
      text: 'Jehu the son of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 16:7–10
      marker-yv: yv-n
    - type: text
      text: 'Hanani, against '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:27
      marker-yv: yv-n
    - type: text
      text: 'Baasha, saying: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And Zimri went in and struck him and killed him in the twenty-seventh year of Asa king of Judah, and reigned in his place.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then it came to pass, when he began to reign, as soon as he was seated on his throne, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' he killed all the household of Baasha; he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 25:22
      marker-yv: yv-n
    - type: text
      text: 'did not leave him one male, neither of his relatives nor of his friends. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Thus Zimri destroyed all the household of Baasha, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 16:3
      marker-yv: yv-n
    - type: text
      text: 'according to the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', which He spoke against Baasha by Jehu the prophet, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'for all the sins of Baasha and the sins of Elah his son, by which they had sinned and by which they had made Israel sin, in provoking the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel to anger '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:21; 1 Sam. 12:21; (Is. 41:29; Jon. 2:8; 1 Cor. 8:4; 10:19)
      marker-yv: yv-n
    - type: text
      text: with their idols.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now the rest of the acts of Elah, and all that he did, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zimri Reigns in Israel
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'In the twenty-seventh year of Asa king of Judah, Zimri had reigned in Tirzah seven days. And the people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' encamped '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:27
      marker-yv: yv-n
    - type: text
      text: 'against Gibbethon, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belonged
    - type: text
      text: ' to the Philistines. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now the people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' encamped heard it said, “Zimri has conspired and also has killed the king.” So all Israel made Omri, the commander of the army, king over Israel that day in the camp. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Omri and all Israel with him went up from Gibbethon, and they besieged Tirzah. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And it happened, when Zimri saw that the city was taken, that he went into the citadel of the king’s house and burned the king’s house down upon himself with fire, and died, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'because of the sins which he had committed in doing evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:26, 34
      marker-yv: yv-n
    - type: text
      text: 'in walking in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:25–33
      marker-yv: yv-n
    - type: text
      text: way of Jeroboam, and in his sin which he had committed to make Israel sin.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 2:8; 1 Kin. 14:7
      marker-yv: yv-n
    - type: text
      text: '“Inasmuch as I lifted you out of the dust and made you ruler over My people Israel, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:25–33; 15:34
      marker-yv: yv-n
    - type: text
      text: 'you have walked in the way of Jeroboam, and have made My people Israel sin, to provoke Me to anger with their sins, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Now the rest of the acts of Zimri, and the treason he committed, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Omri Reigns in Israel
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then the people of Israel were divided into two parts: half of the people followed Tibni the son of Ginath, to make him king, and half followed Omri. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But the people who followed Omri prevailed over the people who followed Tibni the son of Ginath. So Tibni died and Omri reigned. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'In the thirty-first year of Asa king of Judah, Omri became king over Israel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reigned
    - type: text
      text: ' twelve years. Six years he reigned in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:21; 2 Kin. 15:14
      marker-yv: yv-n
    - type: text
      text: 'Tirzah. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And he bought the hill of Samaria from Shemer for two talents of silver; then he built on the hill, and called the name of the city which he built, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 13:32; 2 Kin. 17:24; John 4:4
      marker-yv: yv-n
    - type: text
      text: 'Samaria, after the name of Shemer, owner of the hill. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mic. 6:16
      marker-yv: yv-n
    - type: text
      text: 'Omri did evil in the eyes of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and did worse than all who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' before him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 16:19
      marker-yv: yv-n
    - type: text
      text: 'walked in all the ways of Jeroboam the son of Nebat, and in his sin by which he had made Israel sin, provoking the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel to anger with their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 16:13
      marker-yv: yv-n
    - type: text
      text: idols.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Now the rest of the acts of Omri which he did, and the might that he showed, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: So Omri rested with his fathers and was buried in Samaria. Then Ahab his son reigned in his place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahab Reigns in Israel
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'In the thirty-eighth year of Asa king of Judah, Ahab the son of Omri became king over Israel; and Ahab the son of Omri reigned over Israel in Samaria twenty-two years. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'surely I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 16:11; 21:21
      marker-yv: yv-n
    - type: text
      text: 'take away the posterity of Baasha and the posterity of his house, and I will make your house like '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:10; 15:29
      marker-yv: yv-n
    - type: text
      text: 'the house of Jeroboam the son of Nebat. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Now Ahab the son of Omri did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', more than all who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' before him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And it came to pass, as though it had been a trivial thing for him to walk in the sins of Jeroboam the son of Nebat, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:3
      marker-yv: yv-n
    - type: text
      text: 'that he took as wife Jezebel the daughter of Ethbaal, king of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 18:7; 1 Kin. 11:1–5
      marker-yv: yv-n
    - type: text
      text: 'Sidonians; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 21:25, 26; 2 Kin. 10:18; 17:16
      marker-yv: yv-n
    - type: text
      text: 'and he went and served Baal and worshiped him. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Then he set up an altar for Baal in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 10:21, 26, 27
      marker-yv: yv-n
    - type: text
      text: 'the temple of Baal, which he had built in Samaria. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 13:6
      marker-yv: yv-n
    - type: text
      text: 'And Ahab made a wooden image. Ahab '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:9; 16:29, 30; 21:25
      marker-yv: yv-n
    - type: text
      text: 'did more to provoke the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel to anger than all the kings of Israel who were before him. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'In his days Hiel of Bethel built Jericho. He laid its foundation with Abiram his firstborn, and with his youngest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: son
    - type: text
      text: ' Segub he set up its gates, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 6:26
      marker-yv: yv-n
    - type: text
      text: 'according to the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', which He had spoken through Joshua the son of Nun.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The dogs shall eat '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:11; 21:24
      marker-yv: yv-n
    - type: text
      text: whoever belongs to Baasha and dies in the city, and the birds of the air shall eat whoever dies in the fields.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now the rest of the acts of Baasha, what he did, and his might, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 16:11
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So Baasha rested with his fathers and was buried in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:17; 15:21
      marker-yv: yv-n
    - type: text
      text: Tirzah. Then Elah his son reigned in his place.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And also the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came by the prophet '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 16:1
      marker-yv: yv-n
    - type: text
      text: 'Jehu the son of Hanani against Baasha and his house, because of all the evil that he did in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in provoking Him to anger with the work of his hands, in being like the house of Jeroboam, and because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:27, 29
      marker-yv: yv-n
    - type: text
      text: he killed them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elah Reigns in Israel
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'In the twenty-sixth year of Asa king of Judah, Elah the son of Baasha became king over Israel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reigned
    - type: text
      text: ' two years in Tirzah. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 9:30–33
      marker-yv: yv-n
    - type: text
      text: 'Now his servant Zimri, commander of half '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' chariots, conspired against him as he was in Tirzah drinking himself drunk in the house of Arza, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 24:2; 39:4; 1 Kin. 18:3
      marker-yv: yv-n
    - type: text
      text: 'steward of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' house in Tirzah. '
