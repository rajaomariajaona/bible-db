document_id: 1KI.16,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to '
  - type: note
    content: 1 Kin. 16:7; 2 Chr. 19:2; 20:34
  - type: text
    content: 'Jehu the son of '
  - type: note
    content: 2 Chr. 16:7–10
  - type: text
    content: 'Hanani, against '
  - type: note
    content: 1 Kin. 15:27
  - type: text
    content: 'Baasha, saying: '
  '10':
  - type: text
    content: And Zimri went in and struck him and killed him in the twenty-seventh year of Asa king of Judah, and reigned in his place.
  '11':
  - type: text
    content: 'Then it came to pass, when he began to reign, as soon as he was seated on his throne, '
  - type: text
    content: that
  - type: text
    content: ' he killed all the household of Baasha; he '
  - type: note
    content: 1 Sam. 25:22
  - type: text
    content: 'did not leave him one male, neither of his relatives nor of his friends. '
  '12':
  - type: text
    content: 'Thus Zimri destroyed all the household of Baasha, '
  - type: note
    content: 1 Kin. 16:3
  - type: text
    content: 'according to the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', which He spoke against Baasha by Jehu the prophet, '
  '13':
  - type: text
    content: 'for all the sins of Baasha and the sins of Elah his son, by which they had sinned and by which they had made Israel sin, in provoking the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel to anger '
  - type: note
    content: Deut. 32:21; 1 Sam. 12:21; (Is. 41:29; Jon. 2:8; 1 Cor. 8:4; 10:19)
  - type: text
    content: with their idols.
  '14':
  - type: text
    content: 'Now the rest of the acts of Elah, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel?'
  - type: heading
    content: Zimri Reigns in Israel
  '15':
  - type: text
    content: 'In the twenty-seventh year of Asa king of Judah, Zimri had reigned in Tirzah seven days. And the people '
  - type: text
    content: were
  - type: text
    content: ' encamped '
  - type: note
    content: 1 Kin. 15:27
  - type: text
    content: 'against Gibbethon, which '
  - type: text
    content: belonged
  - type: text
    content: ' to the Philistines. '
  '16':
  - type: text
    content: 'Now the people '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' encamped heard it said, “Zimri has conspired and also has killed the king.” So all Israel made Omri, the commander of the army, king over Israel that day in the camp. '
  '17':
  - type: text
    content: 'Then Omri and all Israel with him went up from Gibbethon, and they besieged Tirzah. '
  '18':
  - type: text
    content: 'And it happened, when Zimri saw that the city was taken, that he went into the citadel of the king’s house and burned the king’s house down upon himself with fire, and died, '
  '19':
  - type: text
    content: 'because of the sins which he had committed in doing evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 1 Kin. 15:26, 34
  - type: text
    content: 'in walking in the '
  - type: note
    content: 1 Kin. 12:25–33
  - type: text
    content: way of Jeroboam, and in his sin which he had committed to make Israel sin.
  '2':
  - type: note
    content: 1 Sam. 2:8; 1 Kin. 14:7
  - type: text
    content: '“Inasmuch as I lifted you out of the dust and made you ruler over My people Israel, and '
  - type: note
    content: 1 Kin. 12:25–33; 15:34
  - type: text
    content: 'you have walked in the way of Jeroboam, and have made My people Israel sin, to provoke Me to anger with their sins, '
  '20':
  - type: text
    content: 'Now the rest of the acts of Zimri, and the treason he committed, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel?'
  - type: heading
    content: Omri Reigns in Israel
  '21':
  - type: text
    content: 'Then the people of Israel were divided into two parts: half of the people followed Tibni the son of Ginath, to make him king, and half followed Omri. '
  '22':
  - type: text
    content: 'But the people who followed Omri prevailed over the people who followed Tibni the son of Ginath. So Tibni died and Omri reigned. '
  '23':
  - type: text
    content: 'In the thirty-first year of Asa king of Judah, Omri became king over Israel, '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: reigned
  - type: text
    content: ' twelve years. Six years he reigned in '
  - type: note
    content: 1 Kin. 15:21; 2 Kin. 15:14
  - type: text
    content: 'Tirzah. '
  '24':
  - type: text
    content: 'And he bought the hill of Samaria from Shemer for two talents of silver; then he built on the hill, and called the name of the city which he built, '
  - type: note
    content: 1 Kin. 13:32; 2 Kin. 17:24; John 4:4
  - type: text
    content: 'Samaria, after the name of Shemer, owner of the hill. '
  '25':
  - type: note
    content: Mic. 6:16
  - type: text
    content: 'Omri did evil in the eyes of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and did worse than all who '
  - type: text
    content: were
  - type: text
    content: ' before him. '
  '26':
  - type: text
    content: 'For he '
  - type: note
    content: 1 Kin. 16:19
  - type: text
    content: 'walked in all the ways of Jeroboam the son of Nebat, and in his sin by which he had made Israel sin, provoking the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel to anger with their '
  - type: note
    content: 1 Kin. 16:13
  - type: text
    content: idols.
  '27':
  - type: text
    content: 'Now the rest of the acts of Omri which he did, and the might that he showed, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel?'
  '28':
  - type: text
    content: So Omri rested with his fathers and was buried in Samaria. Then Ahab his son reigned in his place.
  - type: heading
    content: Ahab Reigns in Israel
  '29':
  - type: text
    content: 'In the thirty-eighth year of Asa king of Judah, Ahab the son of Omri became king over Israel; and Ahab the son of Omri reigned over Israel in Samaria twenty-two years. '
  '3':
  - type: text
    content: 'surely I will '
  - type: note
    content: 1 Kin. 16:11; 21:21
  - type: text
    content: 'take away the posterity of Baasha and the posterity of his house, and I will make your house like '
  - type: note
    content: 1 Kin. 14:10; 15:29
  - type: text
    content: 'the house of Jeroboam the son of Nebat. '
  '30':
  - type: text
    content: 'Now Ahab the son of Omri did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', more than all who '
  - type: text
    content: were
  - type: text
    content: ' before him. '
  '31':
  - type: text
    content: 'And it came to pass, as though it had been a trivial thing for him to walk in the sins of Jeroboam the son of Nebat, '
  - type: note
    content: Deut. 7:3
  - type: text
    content: 'that he took as wife Jezebel the daughter of Ethbaal, king of the '
  - type: note
    content: Judg. 18:7; 1 Kin. 11:1–5
  - type: text
    content: 'Sidonians; '
  - type: note
    content: 1 Kin. 21:25, 26; 2 Kin. 10:18; 17:16
  - type: text
    content: 'and he went and served Baal and worshiped him. '
  '32':
  - type: text
    content: 'Then he set up an altar for Baal in '
  - type: note
    content: 2 Kin. 10:21, 26, 27
  - type: text
    content: 'the temple of Baal, which he had built in Samaria. '
  '33':
  - type: note
    content: 2 Kin. 13:6
  - type: text
    content: 'And Ahab made a wooden image. Ahab '
  - type: note
    content: 1 Kin. 14:9; 16:29, 30; 21:25
  - type: text
    content: 'did more to provoke the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel to anger than all the kings of Israel who were before him. '
  '34':
  - type: text
    content: 'In his days Hiel of Bethel built Jericho. He laid its foundation with Abiram his firstborn, and with his youngest '
  - type: text
    content: son
  - type: text
    content: ' Segub he set up its gates, '
  - type: note
    content: Josh. 6:26
  - type: text
    content: 'according to the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', which He had spoken through Joshua the son of Nun.'
  '4':
  - type: text
    content: 'The dogs shall eat '
  - type: note
    content: 1 Kin. 14:11; 21:24
  - type: text
    content: whoever belongs to Baasha and dies in the city, and the birds of the air shall eat whoever dies in the fields.”
  '5':
  - type: text
    content: 'Now the rest of the acts of Baasha, what he did, and his might, '
  - type: note
    content: 2 Chr. 16:11
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel? '
  '6':
  - type: text
    content: 'So Baasha rested with his fathers and was buried in '
  - type: note
    content: 1 Kin. 14:17; 15:21
  - type: text
    content: Tirzah. Then Elah his son reigned in his place.
  '7':
  - type: text
    content: 'And also the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came by the prophet '
  - type: note
    content: 1 Kin. 16:1
  - type: text
    content: 'Jehu the son of Hanani against Baasha and his house, because of all the evil that he did in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ' in provoking Him to anger with the work of his hands, in being like the house of Jeroboam, and because '
  - type: note
    content: 1 Kin. 15:27, 29
  - type: text
    content: he killed them.
  - type: heading
    content: Elah Reigns in Israel
  '8':
  - type: text
    content: 'In the twenty-sixth year of Asa king of Judah, Elah the son of Baasha became king over Israel, '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: reigned
  - type: text
    content: ' two years in Tirzah. '
  '9':
  - type: note
    content: 2 Kin. 9:30–33
  - type: text
    content: 'Now his servant Zimri, commander of half '
  - type: text
    content: his
  - type: text
    content: ' chariots, conspired against him as he was in Tirzah drinking himself drunk in the house of Arza, '
  - type: note
    content: Gen. 24:2; 39:4; 1 Kin. 18:3
  - type: text
    content: 'steward of '
  - type: text
    content: his
  - type: text
    content: ' house in Tirzah. '
