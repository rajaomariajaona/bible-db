verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Punishment of Apostates
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If there arises among you a prophet or a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 12:6; Jer. 23:28; Zech. 10:2
      marker-yv: yv-n
    - type: text
      text: 'dreamer of dreams, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 24:24; Mark 13:22; 2 Thess. 2:9
      marker-yv: yv-n
    - type: text
      text: 'and he gives you a sign or a wonder, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall stone him with stones until he dies, because he sought to entice you away from the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, who brought you out of the land of Egypt, from the house of bondage. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all Israel shall hear and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 17:13
      marker-yv: yv-n
    - type: text
      text: fear, and not again do such wickedness as this among you.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:1–48
      marker-yv: yv-n
    - type: text
      text: '“If you hear someone in one of your cities, which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God gives you to dwell in, saying, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘Corrupt men have gone out from among you and enticed the inhabitants of their city, saying, “Let us go and serve other gods” ’—which you have not known—
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then you shall inquire, search out, and ask diligently. And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: if
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' indeed true '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' certain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' such an abomination was committed among you, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'you shall surely strike the inhabitants of that city with the edge of the sword, utterly destroying it, all that is in it and its livestock—with the edge of the sword. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall gather all its plunder into the middle of the street, and completely '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 6:24
      marker-yv: yv-n
    - type: text
      text: 'burn with fire the city and all its plunder, for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. It shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 8:28; Is. 17:1; 25:2; Jer. 49:2
      marker-yv: yv-n
    - type: text
      text: 'a heap forever; it shall not be built again. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 6:18
      marker-yv: yv-n
    - type: text
      text: 'So none of the accursed things shall remain in your hand, that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 7:26
      marker-yv: yv-n
    - type: text
      text: 'turn from the fierceness of His anger and show you mercy, have compassion on you and multiply you, just as He swore to your fathers, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because you have listened to the voice of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:25, 28, 32
      marker-yv: yv-n
    - type: text
      text: 'to keep all His commandments which I command you today, to do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' right in the eyes of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 18:22
      marker-yv: yv-n
    - type: text
      text: 'the sign or the wonder comes to pass, of which he spoke to you, saying, ‘Let us go after other gods’—which you have not known—‘and let us serve them,’ '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'you shall not listen to the words of that prophet or that dreamer of dreams, for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:20; Deut. 8:2, 16
      marker-yv: yv-n
    - type: text
      text: 'is testing you to know whether you love the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God with all your heart and with all your soul. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 10:12, 20; 2 Kin. 23:3
      marker-yv: yv-n
    - type: text
      text: 'walk after the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and fear Him, and keep His commandments and obey His voice; you shall serve Him and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 30:20
      marker-yv: yv-n
    - type: text
      text: 'hold fast to Him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 18:20; Jer. 14:15
      marker-yv: yv-n
    - type: text
      text: 'that prophet or that dreamer of dreams shall be put to death, because he has spoken in order to turn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' away from the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, who brought you out of the land of Egypt and redeemed you from the house of bondage, to entice you from the way in which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God commanded you to walk. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 17:5, 7; 1 Cor. 5:13
      marker-yv: yv-n
    - type: text
      text: So you shall put away the evil from your midst.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 17:2
      marker-yv: yv-n
    - type: text
      text: '“If your brother, the son of your mother, your son or your daughter, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 16:5
      marker-yv: yv-n
    - type: text
      text: 'the wife of your bosom, or your friend '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 18:1, 3
      marker-yv: yv-n
    - type: text
      text: 'who is as your own soul, secretly entices you, saying, ‘Let us go and serve other gods,’ which you have not known, neither you nor your fathers, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'of the gods of the people which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' all around you, near to you or far off from you, from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' end of the earth to the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' end of the earth, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'you shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:16; Prov. 1:10
      marker-yv: yv-n
    - type: text
      text: 'not consent to him or listen to him, nor shall your eye pity him, nor shall you spare him or conceal him; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but you shall surely kill him; your hand shall be first against him to put him to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 24:14; Deut. 17:7
      marker-yv: yv-n
    - type: text
      text: 'death, and afterward the hand of all the people. '
