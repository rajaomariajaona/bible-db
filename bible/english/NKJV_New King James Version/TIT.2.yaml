      marker: x
      children:
      - type: text
        text: (Col. 3:4)
      marker-yv: yv-n
    - type: text
      text: 'hope and glorious appearing of our great God and Savior Jesus Christ, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
