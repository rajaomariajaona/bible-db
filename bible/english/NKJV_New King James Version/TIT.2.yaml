  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: not pilfering, but showing all good fidelity, that they may adorn the doctrine of God our Savior in all things.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Trained by Saving Grace
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 5:15)
      marker-yv: yv-n
    - type: text
      text: 'the grace of God that brings salvation has appeared to all men, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'teaching us that, denying ungodliness and worldly lusts, we should live soberly, righteously, and godly in the present age, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
