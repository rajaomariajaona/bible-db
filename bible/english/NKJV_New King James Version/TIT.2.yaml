  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Likewise, exhort the young men to be sober-minded, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'in all things showing yourself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 3:17; 1 Tim. 4:12
      marker-yv: yv-n
    - type: text
      text: 'a pattern of good works; in doctrine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: showing
    - type: text
      text: ' integrity, reverence, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:24
      marker-yv: yv-n
    - type: text
      text: 'incorruptibility, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
