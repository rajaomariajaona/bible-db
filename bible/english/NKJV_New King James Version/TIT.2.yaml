      marker: x
      children:
      - type: text
        text: 1 Tim. 5:14
      marker-yv: yv-n
    - type: text
      text: 'homemakers, good, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 14:34; 1 Tim. 2:11
      marker-yv: yv-n
    - type: text
