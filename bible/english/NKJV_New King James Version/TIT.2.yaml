    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 37:23; (Heb. 1:3; 9:14; 1 John 1:7)
      marker-yv: yv-n
    - type: text
      text: 'and purify for Himself '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:16
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' own special people, zealous for good works.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Speak these things, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 4:13; 5:20; 2 Tim. 4:2
      marker-yv: yv-n
    - type: text
      text: exhort, and rebuke with all authority. Let no one despise you.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'that the older men be sober, reverent, temperate, sound in faith, in love, in patience; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'the older women likewise, that they be reverent in behavior, not slanderers, not given to much wine, teachers of good things— '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'that they admonish the young women to love their husbands, to love their children, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
