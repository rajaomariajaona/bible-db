    children:
    - type: text
      text: Qualities of a Sound Church
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'But as for you, speak the things which are proper for sound doctrine: '
