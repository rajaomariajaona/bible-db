document_id: PSA.78,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Kindness to Rebellious Israel
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 74:title
      marker-yv: yv-n
    - type: text
      text: Contemplation of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give ear, O my people, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' my law;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Incline your ears to the words of my mouth.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 17:15
      marker-yv: yv-n
    - type: text
      text: They did not keep the covenant of God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They refused to walk in His law,
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 106:13
      marker-yv: yv-n
    - type: text
      text: forgot His works
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And His wonders that He had shown them.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 7—12
      marker-yv: yv-n
    - type: text
      text: Marvelous things He did in the sight of their fathers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the land of Egypt, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:22; Is. 19:11; 30:4; Ezek. 30:14
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' the field of Zoan.'
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 14:21
      marker-yv: yv-n
    - type: text
      text: He divided the sea and caused them to pass through;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:8
      marker-yv: yv-n
    - type: text
      text: He made the waters stand up like a heap.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 13:21
      marker-yv: yv-n
    - type: text
      text: In the daytime also He led them with the cloud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the night with a light of fire.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 17:6; Num. 20:11; Is. 48:21; (1 Cor. 10:4)
      marker-yv: yv-n
    - type: text
      text: He split the rocks in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And gave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' drink in abundance like the depths.'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He also brought '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:8, 10, 11
      marker-yv: yv-n
    - type: text
      text: streams out of the rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And caused waters to run down like rivers.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they sinned even more against Him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'By '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 9:22; Is. 63:10; Heb. 3:16
      marker-yv: yv-n
    - type: text
      text: rebelling against the Most High in the wilderness.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 16:2
      marker-yv: yv-n
    - type: text
      text: they tested God in their heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By asking for the food of their fancy.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 16:3; Num. 11:4; 20:3; 21:5
      marker-yv: yv-n
    - type: text
      text: 'Yes, they spoke against God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They said, “Can God prepare a table in the wilderness?
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will open my mouth in a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 13:34, 35
      marker-yv: yv-n
    - type: text
      text: parable;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will utter dark sayings of old,
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:11
      marker-yv: yv-n
    - type: text
      text: Behold, He struck the rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So that the waters gushed out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the streams overflowed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can He give bread also?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can He provide meat for His people?”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this
    - type: text
      text: ' and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 11:1
      marker-yv: yv-n
    - type: text
      text: was furious;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So a fire was kindled against Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And anger also came up against Israel,
  '22':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:32; 9:23; (Heb. 3:18)
      marker-yv: yv-n
    - type: text
      text: did not believe in God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And did not trust in His salvation.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet He had commanded the clouds above,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 7:11; (Mal. 3:10)
      marker-yv: yv-n
    - type: text
      text: And opened the doors of heaven,
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 16:4
      marker-yv: yv-n
    - type: text
      text: Had rained down manna on them to eat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And given them of the bread of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 6:31
      marker-yv: yv-n
    - type: text
      text: heaven.
  '25':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Men ate angels’ food;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He sent them food to the full.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 11:31
      marker-yv: yv-n
    - type: text
      text: He caused an east wind to blow in the heavens;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And by His power He brought in the south wind.
  '27':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He also rained meat on them like the dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Feathered fowl like the sand of the seas;
  '28':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And He let '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' fall in the midst of their camp,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All around their dwellings.
  '29':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 11:19, 20
      marker-yv: yv-n
    - type: text
      text: So they ate and were well filled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For He gave them their own desire.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which we have heard and known,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And our fathers have told us.
  '30':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They were not deprived of their craving;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 11:33
      marker-yv: yv-n
    - type: text
      text: 'while their food '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' still in their mouths,'
  '31':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The wrath of God came against them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And slew the stoutest of them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And struck down the choice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' of Israel.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In spite of this '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:16, 17
      marker-yv: yv-n
    - type: text
      text: they still sinned,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:11; Ps. 78:11, 22
      marker-yv: yv-n
    - type: text
      text: did not believe in His wondrous works.
  '33':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:29, 35
      marker-yv: yv-n
    - type: text
      text: Therefore their days He consumed in futility,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their years in fear.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:7; (Hos. 5:15)
      marker-yv: yv-n
    - type: text
      text: When He slew them, then they sought Him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they returned and sought earnestly for God.
  '35':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then they remembered that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 32:4, 15)
      marker-yv: yv-n
    - type: text
      text: 'God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' their rock,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the Most High God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 15:13); Deut. 7:8; Is. 41:14; 44:6; 63:9
      marker-yv: yv-n
    - type: text
      text: their Redeemer.
  '36':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nevertheless they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 24:7, 8; Ezek. 33:31
      marker-yv: yv-n
    - type: text
      text: flattered Him with their mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they lied to Him with their tongue;
  '37':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For their heart was not steadfast with Him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor were they faithful in His covenant.
  '38':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Num. 14:18–20)
      marker-yv: yv-n
    - type: text
      text: 'But He, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: being
    - type: text
      text: ' full of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 34:6
      marker-yv: yv-n
    - type: text
      text: 'compassion, forgave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' iniquity,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And did not destroy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yes, many a time '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 48:9)
      marker-yv: yv-n
    - type: text
      text: He turned His anger away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 21:29
      marker-yv: yv-n
    - type: text
      text: did not stir up all His wrath;
  '39':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 10:9; Ps. 103:14–16
      marker-yv: yv-n
    - type: text
      text: 'He remembered '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 3:6
      marker-yv: yv-n
    - type: text
      text: 'that they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' flesh,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 7:7, 16; James 4:14)
      marker-yv: yv-n
    - type: text
      text: A breath that passes away and does not come again.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:26, 27; Deut. 4:9; 6:7; Job 15:18; Is. 38:19; Joel 1:3
      marker-yv: yv-n
    - type: text
      text: 'We will not hide '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' from their children,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 13:8, 14
      marker-yv: yv-n
    - type: text
      text: 'Telling to the generation to come the praises of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And His strength and His wonderful works that He has done.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How often they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 95:8–10; (Eph. 4:30); Heb. 3:16
      marker-yv: yv-n
    - type: text
      text: provoked Him in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' grieved Him in the desert!'
  '41':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yes, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:22; Deut. 6:16
      marker-yv: yv-n
    - type: text
      text: again and again they tempted God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And limited the Holy One of Israel.
  '42':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They did not remember His power:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The day when He redeemed them from the enemy,
  '43':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When He worked His signs in Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And His wonders in the field of Zoan;
  '44':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 7:20
      marker-yv: yv-n
    - type: text
      text: Turned their rivers into blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their streams, that they could not drink.
  '45':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 8:24
      marker-yv: yv-n
    - type: text
      text: He sent swarms of flies among them, which devoured them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 8:6
      marker-yv: yv-n
    - type: text
      text: frogs, which destroyed them.
  '46':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He also gave their crops to the caterpillar,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And their labor to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 10:14
      marker-yv: yv-n
    - type: text
      text: locust.
  '47':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 9:23–25
      marker-yv: yv-n
    - type: text
      text: He destroyed their vines with hail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their sycamore trees with frost.
  '48':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He also gave up their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 9:19
      marker-yv: yv-n
    - type: text
      text: cattle to the hail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their flocks to fiery lightning.
  '49':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He cast on them the fierceness of His anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wrath, indignation, and trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'By sending angels of destruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: among
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 147:19
      marker-yv: yv-n
    - type: text
      text: He established a testimony in Jacob,
  - type: usfm
    marker: q2
