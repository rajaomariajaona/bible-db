document_id: JOB.13,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“Behold, my eye has seen all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My ear has heard and understood it.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He will surely rebuke you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If you secretly show partiality.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Will not His excellence make you afraid,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the dread of Him fall upon you?
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Your platitudes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' proverbs of ashes,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your defenses are defenses of clay.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Hold your peace with me, and let me speak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then let come on me what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: may!
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Why '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 18:4
      marker-yv: yv-n
    - type: text
      text: do I take my flesh in my teeth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And put my life in my hands?
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 23:4; (Prov. 14:32)
      marker-yv: yv-n
    - type: text
      text: Though He slay me, yet will I trust Him.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 27:5
      marker-yv: yv-n
    - type: text
      text: Even so, I will defend my own ways before Him.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'He also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' be my salvation,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 8:13
      marker-yv: yv-n
    - type: text
      text: hypocrite could not come before Him.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Listen carefully to my speech,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to my declaration with your ears.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'See now, I have prepared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' case,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I know that I shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 8:34)
      marker-yv: yv-n
    - type: text
      text: vindicated.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 7:21; 10:8; Is. 50:8
      marker-yv: yv-n
    - type: text
      text: 'Who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' will contend with me?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If now I hold my tongue, I perish.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job’s Despondent Prayer
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 12:3
      marker-yv: yv-n
    - type: text
      text: What you know, I also know;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' not inferior to you.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “Only
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:34
      marker-yv: yv-n
    - type: text
      text: ' two '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' do not do to me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then I will not hide myself from You:'
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:34; Ps. 39:10
      marker-yv: yv-n
    - type: text
      text: Withdraw Your hand far from me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let not the dread of You make me afraid.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then call, and I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:16; 14:15
      marker-yv: yv-n
    - type: text
      text: answer;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or let me speak, then You respond to me.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'How many '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' my iniquities and sins?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Make me know my transgression and my sin.
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 32:20); Ps. 13:1
      marker-yv: yv-n
    - type: text
      text: Why do You hide Your face,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lam. 2:5
      marker-yv: yv-n
    - type: text
      text: regard me as Your enemy?
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 42:3
      marker-yv: yv-n
    - type: text
      text: Will You frighten a leaf driven to and fro?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And will You pursue dry stubble?
  '26':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: For You write bitter things against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 20:11
      marker-yv: yv-n
    - type: text
      text: make me inherit the iniquities of my youth.
  '27':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 33:11
      marker-yv: yv-n
    - type: text
      text: You put my feet in the stocks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And watch closely all my paths.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You set a limit for the soles of my feet.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Man
    - type: text
      text: ' decays like a rotten thing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like a garment that is moth-eaten.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 23:3; 31:35
      marker-yv: yv-n
    - type: text
      text: But I would speak to the Almighty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I desire to reason with God.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But you forgers of lies,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 6:21; (Jer. 23:32)
      marker-yv: yv-n
    - type: text
      text: 'You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' all worthless physicians.'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Oh, that you would be silent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 13:13; 21:5; Prov. 17:28
      marker-yv: yv-n
    - type: text
      text: it would be your wisdom!
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Now hear my reasoning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And heed the pleadings of my lips.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 27:4; 36:4
      marker-yv: yv-n
    - type: text
      text: Will you speak wickedly for God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And talk deceitfully for Him?
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Will you show partiality for Him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you contend for God?
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Will it be well when He searches you out?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or can you mock Him as one mocks a man?
