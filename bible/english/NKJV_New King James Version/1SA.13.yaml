document_id: 1SA.13,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul’s Unlawful Sacrifice
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Saul reigned one year; and when he had reigned two years over Israel, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Now it happened, as soon as he had finished presenting the burnt offering, that Samuel came; and Saul went out to meet him, that he might greet him.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And Samuel said, “What have you done?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul said, “When I saw that the people were scattered from me, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' you did not come within the days appointed, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' the Philistines gathered together at Michmash, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'then I said, ‘The Philistines will now come down on me at Gilgal, and I have not made supplication to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .’ Therefore I felt compelled, and offered a burnt offering.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And Samuel said to Saul, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 10:8
      marker-yv: yv-n
    - type: text
      text: '“You have done foolishly. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 16:9
      marker-yv: yv-n
    - type: text
      text: 'You have not kept the commandment of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, which He commanded you. For now the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' would have established your kingdom over Israel forever. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 15:11, 22, 28
      marker-yv: yv-n
    - type: text
      text: 'But now your kingdom shall not continue. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 15:28; 31:6
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sought for Himself a man '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 16:1
      marker-yv: yv-n
    - type: text
      text: 'after His own heart, and the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' commander over His people, because you have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 89:20; Acts 7:46; 13:22
      marker-yv: yv-n
    - type: text
      text: 'not kept what the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded you.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then Samuel arose and went up from Gilgal to Gibeah of Benjamin. And Saul numbered the people present with him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 15:11, 19
      marker-yv: yv-n
    - type: text
      text: about six hundred men.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: No Weapons for the Army
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Saul, Jonathan his son, and the people present with them remained in Gibeah of Benjamin. But the Philistines encamped in Michmash. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then raiders came out of the camp of the Philistines in three companies. One company turned onto the road to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 13:2, 6, 7; 14:2
      marker-yv: yv-n
    - type: text
      text: 'Ophrah, to the land of Shual, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'another company turned to the road '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:23
      marker-yv: yv-n
    - type: text
      text: 'Beth Horon, and another company turned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' the road of the border that overlooks the Valley of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 16:3; 18:13, 14
      marker-yv: yv-n
    - type: text
      text: Zeboim toward the wilderness.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:2; Neh. 11:34
      marker-yv: yv-n
    - type: text
      text: 'there was no blacksmith to be found throughout all the land of Israel, for the Philistines said, “Lest the Hebrews make swords or spears.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Saul chose for himself three thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' of Israel. Two thousand were with Saul in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:36
      marker-yv: yv-n
    - type: text
      text: 'Michmash and in the mountains of Bethel, and a thousand were with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 14:5, 31
      marker-yv: yv-n
    - type: text
      text: 'Jonathan in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 14:1
      marker-yv: yv-n
    - type: text
      text: Gibeah of Benjamin. The rest of the people he sent away, every man to his tent.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But all the Israelites would go down to the Philistines to sharpen each man’s plowshare, his mattock, his ax, and his sickle; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and the charge for a sharpening was a pim for the plowshares, the mattocks, the forks, and the axes, and to set the points of the goads. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So it came about, on the day of battle, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 5:8; 2 Kin. 24:14; Jer. 24:1; 29:2
      marker-yv: yv-n
    - type: text
      text: 'there was neither sword nor spear found in the hand of any of the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with Saul and Jonathan. But they were found with Saul and Jonathan his son.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 5:8
      marker-yv: yv-n
    - type: text
      text: And the garrison of the Philistines went out to the pass of Michmash.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Jonathan attacked '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 10:26
      marker-yv: yv-n
    - type: text
      text: 'the garrison of the Philistines that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 10:5
      marker-yv: yv-n
    - type: text
      text: 'Geba, and the Philistines heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
    - type: text
      text: ' Then Saul blew the trumpet throughout all the land, saying, “Let the Hebrews hear!” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now all Israel heard it said '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' Saul had attacked a garrison of the Philistines, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' Israel had also become an abomination to the Philistines. And the people were called together to Saul at Gilgal.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then the Philistines gathered together to fight with Israel, thirty thousand chariots and six thousand horsemen, and people '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:25
      marker-yv: yv-n
    - type: text
      text: 'as the sand which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' on the seashore in multitude. And they came up and encamped in Michmash, to the east of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 7:12
      marker-yv: yv-n
    - type: text
      text: 'Beth Aven. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'When the men of Israel saw that they were in danger (for the people were distressed), then the people '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 7:2; 1 Sam. 14:23
      marker-yv: yv-n
    - type: text
      text: 'hid in caves, in thickets, in rocks, in holes, and in pits. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' the Hebrews crossed over the Jordan to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 6:2; 1 Sam. 14:11
      marker-yv: yv-n
    - type: text
      text: land of Gad and Gilead.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for Saul, he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' still in Gilgal, and all the people followed him trembling. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:1–42
      marker-yv: yv-n
    - type: text
      text: 'Then he waited seven days, according to the time set by Samuel. But Samuel did not come to Gilgal; and the people were scattered from him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So Saul said, “Bring a burnt offering and peace offerings here to me.” And he offered the burnt offering. '
