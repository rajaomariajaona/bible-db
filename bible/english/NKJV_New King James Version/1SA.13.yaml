    content: Saul’s Unlawful Sacrifice
  - type: text
    content: 'Saul reigned one year; and when he had reigned two years over Israel, '
  '10':
  - type: text
    content: Now it happened, as soon as he had finished presenting the burnt offering, that Samuel came; and Saul went out to meet him, that he might greet him.
  '11':
  - type: text
    content: And Samuel said, “What have you done?”
  - type: text
    content: 'Saul said, “When I saw that the people were scattered from me, and '
  - type: text
    content: that
  - type: text
    content: ' you did not come within the days appointed, and '
  - type: text
    content: that
  - type: text
    content: ' the Philistines gathered together at Michmash, '
  '12':
  - type: text
    content: 'then I said, ‘The Philistines will now come down on me at Gilgal, and I have not made supplication to the '
  - type: heading
    content: Lord
  - type: text
    content: .’ Therefore I felt compelled, and offered a burnt offering.”
  '13':
