  '32':
  - type: note
    content: Num. 20:3–13; Ps. 81:7
  - type: text
    content: 'They angered '
  - type: text
    content: Him
  - type: text
    content: ' also at the waters of strife,'
  - type: note
    content: Deut. 1:37; 3:26
  - type: text
    content: So that it went ill with Moses on account of them;
  '33':
  - type: note
    content: Num. 20:3, 10
  - type: text
