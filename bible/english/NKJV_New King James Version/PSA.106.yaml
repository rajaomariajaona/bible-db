  '40':
  - type: text
    content: 'Therefore '
  - type: note
    content: Judg. 2:14; Ps. 78:59
  - type: text
    content: 'the wrath of the '
  - type: heading
    content: Lord
  - type: text
    content: ' was kindled against His people,'
  - type: text
    content: 'So that He abhorred '
  - type: note
    content: (Deut. 9:29; 32:9)
  - type: text
    content: His own inheritance.
