  - type: text
    content: 'And '
  - type: note
    content: (Lev. 17:7; Num. 15:39); Judg. 2:17; Hos. 4:12
  - type: text
    content: played the harlot by their own deeds.
  '4':
  - type: note
    content: Ps. 119:132
  - type: text
    content: 'Remember me, O '
  - type: heading
    content: Lord
  - type: text
    content: ', with the favor '
  - type: text
    content: You
  - type: text
    content: ' '
  - type: text
    content: have
  - type: text
    content: ' '
  - type: text
    content: toward
  - type: text
    content: ' Your people.'
  - type: text
