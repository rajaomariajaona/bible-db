  - type: text
    content: And they were brought into subjection under their hand.
  '43':
  - type: note
    content: Judg. 2:16; (Neh. 9:27)
  - type: text
    content: Many times He delivered them;
  - type: text
    content: But they rebelled in their counsel,
  - type: text
    content: And were brought low for their iniquity.
  '44':
  - type: text
    content: Nevertheless He regarded their affliction,
  - type: text
    content: 'When '
  - type: note
    content: Judg. 3:9; 6:7; 10:10
  - type: text
    content: He heard their cry;
  '45':
  - type: note
    content: (Lev. 26:41, 42)
  - type: text
    content: And for their sake He remembered His covenant,
  - type: text
    content: 'And '
  - type: note
    content: Judg. 2:18
  - type: text
    content: 'relented '
  - type: note
    content: Ps. 69:16
  - type: text
    content: according to the multitude of His mercies.
  '46':
  - type: note
    content: 1 Kin. 8:50; (2 Chr. 30:9); Ezra 9:9; Neh. 1:11; Jer. 42:12
  - type: text
    content: He also made them to be pitied
  - type: text
    content: By all those who carried them away captive.
  '47':
  - type: note
    content: 1 Chr. 16:35, 36
  - type: text
    content: 'Save us, O '
  - type: heading
    content: Lord
  - type: text
    content: ' our God,'
  - type: text
    content: And gather us from among the Gentiles,
  - type: text
    content: To give thanks to Your holy name,
  - type: text
    content: To triumph in Your praise.
  '48':
  - type: note
    content: Ps. 41:13
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel'
  - type: text
    content: From everlasting to everlasting!
  - type: text
    content: And let all the people say, “Amen!”
  - type: text
    content: 'Praise the '
  - type: heading
    content: Lord
  - type: text
    content: '!'
  '5':
  - type: text
    content: That I may see the benefit of Your chosen ones,
  - type: text
    content: That I may rejoice in the gladness of Your nation,
  - type: text
    content: That I may glory with Your inheritance.
  '6':
  - type: note
    content: 1 Kin. 8:47; (Ezra 9:7; Neh. 1:7; Jer. 3:25; Dan. 9:5)
  - type: text
    content: We have sinned with our fathers,
  - type: text
    content: We have committed iniquity,
  - type: text
    content: We have done wickedly.
  '7':
  - type: text
    content: Our fathers in Egypt did not understand Your wonders;
  - type: text
    content: They did not remember the multitude of Your mercies,
  - type: note
    content: Ex. 14:11, 12
  - type: text
    content: But rebelled by the sea—the Red Sea.
  '8':
  - type: text
    content: Nevertheless He saved them for His name’s sake,
  - type: note
    content: Ex. 9:16
  - type: text
    content: That He might make His mighty power known.
  '9':
  - type: note
    content: Ex. 14:21; Ps. 18:15; Is. 51:10; Nah. 1:4
  - type: text
    content: He rebuked the Red Sea also, and it dried up;
  - type: text
    content: 'So '
  - type: note
    content: Is. 63:11–13
  - type: text
    content: He led them through the depths,
  - type: text
    content: As through the wilderness.
