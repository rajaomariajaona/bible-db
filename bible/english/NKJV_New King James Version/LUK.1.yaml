  '16':
  - type: text
    content: 'And he will turn many of the children of Israel to the Lord their God. '
  '17':
  - type: note
    content: Mal. 4:5, 6; Matt. 3:2; 11:14; Mark 1:4; 9:12
  - type: text
    content: He will also go before Him in the spirit and power of Elijah, ‘to turn the hearts of the fathers to the children,’ and the disobedient to the wisdom of the just, to make ready a people prepared for the Lord.”
  '18':
  - type: text
    content: 'And Zacharias said to the angel, '
  - type: note
    content: Gen. 17:17
  - type: text
    content: “How shall I know this? For I am an old man, and my wife is well advanced in years.”
  '19':
  - type: text
    content: 'And the angel answered and said to him, “I am '
  - type: note
    content: Dan. 8:16; (Matt. 18:10); Heb. 1:4
  - type: text
