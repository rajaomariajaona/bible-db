  - type: note
    content: Luke 2:10
  - type: text
    content: 'tidings. '
  '2':
  - type: text
    content: 'just as those who '
  - type: note
    content: Mark 1:1; John 15:27; Acts 1:21, 22
  - type: text
    content: 'from the beginning were '
  - type: note
    content: Acts 1:2
  - type: text
    content: 'eyewitnesses and ministers of the word '
  - type: note
    content: Acts 1:3; 10:39; Heb. 2:3; 1 Pet. 5:1; 2 Pet. 1:16; 1 John 1:1
  - type: text
    content: 'delivered them to us, '
  '20':
  - type: text
    content: 'But behold, '
  - type: note
    content: Ezek. 3:26; 24:27
  - type: text
    content: you will be mute and not able to speak until the day these things take place, because you did not believe my words which will be fulfilled in their own time.”
  '21':
  - type: text
    content: 'And the people waited for Zacharias, and marveled that he lingered so long in the temple. '
  '22':
  - type: text
    content: But when he came out, he could not speak to them; and they perceived that he had seen a vision in the temple, for he beckoned to them and remained speechless.
  '23':
  - type: text
    content: 'So it was, as soon as '
  - type: note
    content: 2 Kin. 11:5; 1 Chr. 9:25
  - type: text
    content: 'the days of his service were completed, that he departed to his own house. '
  '24':
  - type: text
    content: 'Now after those days his wife Elizabeth conceived; and she hid herself five months, saying, '
  '25':
  - type: text
    content: '“Thus the Lord has dealt with me, in the days when He looked on '
  - type: text
    content: me,
  - type: text
    content: ' to '
  - type: note
    content: Gen. 30:23; Is. 4:1; 54:1, 4
  - type: text
    content: take away my reproach among people.”
  - type: heading
    content: Christ’s Birth Announced to Mary
  '26':
  - type: text
    content: 'Now in the sixth month the angel Gabriel was sent by God to a city of Galilee named Nazareth, '
