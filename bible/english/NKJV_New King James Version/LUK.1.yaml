verses:
  '1':
  - type: heading
    content: Dedication to Theophilus
  - type: text
    content: 'Inasmuch as many have taken in hand to set in order a narrative of those '
  - type: note
    content: John 20:31
  - type: text
    content: 'things which have been fulfilled among us, '
  '10':
  - type: note
