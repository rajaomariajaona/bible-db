document_id: 2CH.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Uzziah Reigns in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now all the people of Judah took Uzziah, who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' sixteen years old, and made him king instead of his father Amaziah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He built Elath and restored it to Judah, after the king rested with his fathers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Uzziah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' sixteen years old when he became king, and he reigned fifty-two years in Jerusalem. His mother’s name was Jecholiah of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he did '
  - type: usfm
    marker: it
    children:
    - type: text
      text: what
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 24:2
    marker-yv: yv-n
  - type: text
    text: 'right in the sight of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', according to all that his father Amaziah had done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 24:2
    marker-yv: yv-n
  - type: text
    text: 'He sought God in the days of Zechariah, who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 41:15; Dan. 1:17; 10:1
    marker-yv: yv-n
  - type: text
    text: 'had understanding in the visions of God; and as long as he sought the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', God made him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Chr. 15:2; 20:20; 31:21)
    marker-yv: yv-n
  - type: text
    text: prosper.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now he went out and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 14:29
    marker-yv: yv-n
  - type: text
    text: 'made war against the Philistines, and broke down the wall of Gath, the wall of Jabneh, and the wall of Ashdod; and he built cities '
  - type: usfm
    marker: it
    children:
    - type: text
      text: around
  - type: text
    text: ' Ashdod and among the Philistines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'God helped him against '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 21:16
    marker-yv: yv-n
  - type: text
    text: 'the Philistines, against the Arabians who lived in Gur Baal, and against the Meunites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Also the Ammonites '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 8:2; 2 Chr. 17:11
    marker-yv: yv-n
  - type: text
    text: brought tribute to Uzziah. His fame spread as far as the entrance of Egypt, for he became exceedingly strong.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Uzziah built towers in Jerusalem at the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 14:13; 2 Chr. 25:23; Neh. 3:13, 19, 32; Zech. 14:10
    marker-yv: yv-n
  - type: text
    text: 'Corner Gate, at the Valley Gate, and at the corner buttress of the wall; then he fortified them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Also he built towers in the desert. He dug many wells, for he had much livestock, both in the lowlands and in the plains; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: also
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had
  - type: text
    text: ' farmers and vinedressers in the mountains and in Carmel, for he loved the soil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moreover Uzziah had an army of fighting men who went out to war by companies, according to the number on their roll as prepared by Jeiel the scribe and Maaseiah the officer, under the hand of Hananiah, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' of the king’s captains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The total number of chief officers of the mighty men of valor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' two thousand six hundred. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And under their authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' an army of three hundred and seven thousand five hundred, that made war with mighty power, to help the king against the enemy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Uzziah prepared for them, for the entire army, shields, spears, helmets, body armor, bows, and slings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: cast
  - type: text
    text: ' stones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he made devices in Jerusalem, invented by '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 39:3, 8
    marker-yv: yv-n
  - type: text
    text: skillful men, to be on the towers and the corners, to shoot arrows and large stones. So his fame spread far and wide, for he was marvelously helped till he became strong.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Penalty for Uzziah’s Pride
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 32:15)
    marker-yv: yv-n
  - type: text
    text: 'when he was strong his heart was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 8:14; 2 Chr. 25:19
    marker-yv: yv-n
  - type: text
    text: 'lifted up, to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' destruction, for he transgressed against the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 13:1–4; 2 Kin. 16:12, 13
    marker-yv: yv-n
  - type: text
    text: 'by entering the temple of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to burn incense on the altar of incense. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 6:10
    marker-yv: yv-n
  - type: text
    text: 'Azariah the priest went in after him, and with him were eighty priests of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '—valiant men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And they withstood King Uzziah, and said to him, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: It
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Num. 3:10; 16:39, 40; 18:7)
    marker-yv: yv-n
  - type: text
    text: 'is not for you, Uzziah, to burn incense to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', but for the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:7, 8; Heb. 7:14
    marker-yv: yv-n
  - type: text
    text: 'priests, the sons of Aaron, who are consecrated to burn incense. Get out of the sanctuary, for you have trespassed! You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: have
  - type: text
    text: ' no honor from the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Uzziah became furious; and he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had
  - type: text
    text: ' a censer in his hand to burn incense. And while he was angry with the priests, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 13:42; Num. 12:10; 2 Kin. 5:25–27
    marker-yv: yv-n
  - type: text
    text: 'leprosy broke out on his forehead, before the priests in the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', beside the incense altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Azariah the chief priest and all the priests looked at him, and there, on his forehead, he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' leprous; so they thrust him out of that place. Indeed he also '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 6:12
    marker-yv: yv-n
  - type: text
    text: 'hurried to get out, because the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had struck him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 15:5
    marker-yv: yv-n
  - type: text
    text: 'King Uzziah was a leper until the day of his death. He dwelt in an '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Lev. 13:46; Num. 5:2)
    marker-yv: yv-n
  - type: text
    text: 'isolated house, because he was a leper; for he was cut off from the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Then Jotham his son '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' over the king’s house, judging the people of the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Now the rest of the acts of Uzziah, from first to last, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 20:1; 2 Chr. 32:20, 32; Is. 1:1
    marker-yv: yv-n
  - type: text
    text: 'the prophet Isaiah the son of Amoz wrote. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 15:7; 2 Chr. 21:20; 28:27; Is. 6:1
    marker-yv: yv-n
  - type: text
    text: 'So Uzziah rested with his fathers, and they buried him with his fathers in the field of burial which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: belonged
  - type: text
    text: ' to the kings, for they said, “He is a leper.” Then Jotham his son reigned in his place.'
