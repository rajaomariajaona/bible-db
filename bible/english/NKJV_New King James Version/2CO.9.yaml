document_id: 2CO.9,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Administering the Gift
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now concerning '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 11:29; Rom. 15:26; 1 Cor. 16:1; 2 Cor. 8:4; Gal. 2:10
      marker-yv: yv-n
    - type: text
      text: 'the ministering to the saints, it is superfluous for me to write to you; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now may He who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 55:10
      marker-yv: yv-n
    - type: text
      text: 'supplies seed to the sower, and bread for food, supply and multiply the seed you have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sown
    - type: text
      text: ' and increase the fruits of your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 10:12
      marker-yv: yv-n
    - type: text
      text: 'righteousness, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'while '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' enriched in everything for all liberality, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 1:11
      marker-yv: yv-n
    - type: text
      text: 'which causes thanksgiving through us to God. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the administration of this service not only '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 8:14
      marker-yv: yv-n
    - type: text
      text: 'supplies the needs of the saints, but also is abounding through many thanksgivings to God, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'while, through the proof of this ministry, they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 5:16)
      marker-yv: yv-n
    - type: text
      text: 'glorify God for the obedience of your confession to the gospel of Christ, and for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' liberal '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 13:16)
      marker-yv: yv-n
    - type: text
      text: 'sharing with them and all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men,
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and by their prayer for you, who long for you because of the exceeding '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 8:1
      marker-yv: yv-n
    - type: text
      text: 'grace of God in you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' to God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 3:16; 4:10; Rom. 6:23; 8:32; Eph. 2:8; James 1:17)
      marker-yv: yv-n
    - type: text
      text: for His indescribable gift!
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for I know your willingness, about which I boast of you to the Macedonians, that Achaia was ready a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 8:10
      marker-yv: yv-n
    - type: text
      text: 'year ago; and your zeal has stirred up the majority. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 8:6, 17
      marker-yv: yv-n
    - type: text
      text: 'Yet I have sent the brethren, lest our boasting of you should be in vain in this respect, that, as I said, you may be ready; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lest if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' Macedonians come with me and find you unprepared, we (not to mention you!) should be ashamed of this confident boasting. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore I thought it necessary to exhort the brethren to go to you ahead of time, and prepare your generous gift beforehand, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' previously promised, that it may be ready as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: matter
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' generosity and not as a grudging obligation.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Cheerful Giver
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 11:24; 22:9; Gal. 6:7, 9
      marker-yv: yv-n
    - type: text
      text: 'But this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'say:'
    - type: text
      text: ' He who sows sparingly will also reap sparingly, and he who sows bountifully will also reap bountifully. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: So
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: let
    - type: text
      text: ' each one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: give
    - type: text
      text: ' as he purposes in his heart, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 15:7
      marker-yv: yv-n
    - type: text
      text: 'not grudgingly or of necessity; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 15:10; 1 Chr. 29:17; (Prov. 11:25); Rom. 12:8; (2 Cor. 8:12)
      marker-yv: yv-n
    - type: text
      text: 'God loves a cheerful giver. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 11:24)
      marker-yv: yv-n
    - type: text
      text: 'And God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' able to make all grace abound toward you, that you, always having all sufficiency in all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things,
    - type: text
      text: ' may have an abundance for every good work. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As it is written:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 112:9
      marker-yv: yv-n
    - type: text
      text: “He has dispersed abroad,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has given to the poor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His righteousness endures forever.”
