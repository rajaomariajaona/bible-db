verses:
  '1':
  - type: heading
    content: Adonijah Presumes to Be King
  - type: text
    content: 'Now King David was '
  - type: note
    content: 1 Chr. 23:1
  - type: text
    content: 'old, advanced in years; and they put covers on him, but he could not get warm. '
  '10':
  - type: text
    content: 'But he did not invite Nathan the prophet, Benaiah, the mighty men, or '
  - type: note
    content: 2 Sam. 12:24
  - type: text
    content: Solomon his brother.
  '11':
  - type: text
    content: 'So Nathan spoke to Bathsheba the mother of Solomon, saying, “Have you not heard that Adonijah the son of '
  - type: note
    content: 2 Sam. 3:4
  - type: text
    content: 'Haggith has become king, and David our lord does not know '
  - type: text
    content: it?
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Come, please, let me now give you advice, that you may save your own life and the life of your son Solomon. '
  '13':
  - type: text
    content: 'Go immediately to King David and say to him, ‘Did you not, my lord, O king, swear to your maidservant, saying, '
  - type: note
    content: 1 Kin. 1:30; 1 Chr. 22:9–13
  - type: text
    content: '“Assuredly your son Solomon shall reign after me, and he shall sit on my throne“? Why then has Adonijah become king?’ '
  '14':
  - type: text
    content: Then, while you are still talking there with the king, I also will come in after you and confirm your words.”
  '15':
  - type: text
    content: 'So Bathsheba went into the chamber to the king. (Now the king was very old, and Abishag the Shunammite was serving the king.) '
  '16':
  - type: text
    content: And Bathsheba bowed and did homage to the king. Then the king said, “What is your wish?”
  '17':
  - type: text
    content: 'Then she said to him, “My lord, '
  - type: note
    content: 1 Kin. 1:13, 30
  - type: text
    content: 'you swore by the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God to your maidservant, '
  - type: text
    content: saying,
  - type: text
    content: ' ‘Assuredly Solomon your son shall reign after me, and he shall sit on my throne.’ '
  '18':
  - type: text
    content: 'So now, look! Adonijah has become king; and now, my lord the king, you do not know about '
  - type: text
    content: it.
  - type: text
    content: ' '
  '19':
  - type: note
    content: 1 Kin. 1:7–9, 25
  - type: text
    content: 'He has sacrificed oxen and fattened cattle and sheep in abundance, and has invited all the sons of the king, Abiathar the priest, and Joab the commander of the army; but Solomon your servant he has not invited. '
  '2':
  - type: text
    content: 'Therefore his servants said to him, “Let a young woman, a virgin, be sought for our lord the king, and let her stand before the king, and let her care for him; and let her lie in your bosom, that our lord the king may be warm.” '
  '20':
  - type: text
    content: 'And as for you, my lord, O king, the eyes of all Israel '
  - type: text
    content: are
  - type: text
    content: ' on you, that you should tell them who will sit on the throne of my lord the king after him. '
  '21':
  - type: text
    content: 'Otherwise it will happen, when my lord the king '
  - type: note
    content: Deut. 31:16; 2 Sam. 7:12; 1 Kin. 2:10
  - type: text
    content: rests with his fathers, that I and my son Solomon will be counted as offenders.”
  '22':
  - type: text
    content: 'And just then, while she was still talking with the king, Nathan the prophet also came in. '
  '23':
  - type: text
    content: 'So they told the king, saying, “Here is Nathan the prophet.” And when he came in before the king, he bowed down before the king with his face to the ground. '
  '24':
  - type: text
    content: 'And Nathan said, “My lord, O king, have you said, ‘Adonijah shall reign after me, and he shall sit on my throne’? '
  '25':
  - type: note
    content: 1 Kin. 1:9, 19
  - type: text
    content: 'For he has gone down today, and has sacrificed oxen and fattened cattle and sheep in abundance, and has invited all the king’s sons, and the commanders of the army, and Abiathar the priest; and look! They are eating and drinking before him; and they say, '
  - type: note
    content: 1 Sam. 10:24
  - type: text
    content: ‘
  - type: text
    content: Long
  - type: text
    content: ' live King Adonijah!’ '
  '26':
  - type: text
    content: 'But he has not invited me—me your servant—nor Zadok the priest, nor Benaiah the son of Jehoiada, nor your servant Solomon. '
  '27':
  - type: text
    content: Has this thing been done by my lord the king, and you have not told your servant who should sit on the throne of my lord the king after him?”
  - type: heading
    content: David Proclaims Solomon King
  '28':
  - type: text
    content: 'Then King David answered and said, “Call Bathsheba to me.” So she came into the king’s presence and stood before the king. '
  '29':
  - type: text
    content: 'And the king took an oath and said, '
  - type: note
