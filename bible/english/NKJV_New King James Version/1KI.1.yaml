  - type: text
    content: “
  - type: text
    content: As
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' lives, who has redeemed my life from every distress, '
  '3':
  - type: text
    content: 'So they sought for a lovely young woman throughout all the territory of Israel, and found '
  - type: note
    content: 1 Kin. 2:17
  - type: text
    content: 'Abishag the '
  - type: note
