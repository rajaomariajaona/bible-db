  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 1:7–9, 25
    marker-yv: yv-n
  - type: text
    text: 'He has sacrificed oxen and fattened cattle and sheep in abundance, and has invited all the sons of the king, Abiathar the priest, and Joab the commander of the army; but Solomon your servant he has not invited. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And as for you, my lord, O king, the eyes of all Israel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' on you, that you should tell them who will sit on the throne of my lord the king after him. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
