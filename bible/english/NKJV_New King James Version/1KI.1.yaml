    children:
    - type: text
      text: '11'
  - type: text
    text: 'So Nathan spoke to Bathsheba the mother of Solomon, saying, “Have you not heard that Adonijah the son of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 3:4
    marker-yv: yv-n
  - type: text
    text: 'Haggith has become king, and David our lord does not know '
