  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Come, please, let me now give you advice, that you may save your own life and the life of your son Solomon. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Go immediately to King David and say to him, ‘Did you not, my lord, O king, swear to your maidservant, saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 1:30; 1 Chr. 22:9–13
    marker-yv: yv-n
  - type: text
    text: '“Assuredly your son Solomon shall reign after me, and he shall sit on my throne“? Why then has Adonijah become king?’ '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then, while you are still talking there with the king, I also will come in after you and confirm your words.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
