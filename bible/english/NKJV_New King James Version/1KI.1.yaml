  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Nathan said, “My lord, O king, have you said, ‘Adonijah shall reign after me, and he shall sit on my throne’? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 1:9, 19
    marker-yv: yv-n
  - type: text
