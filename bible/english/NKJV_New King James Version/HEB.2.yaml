document_id: HEB.2,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Do Not Neglect Salvation
  - type: text
    content: 'Therefore we must give the more earnest heed to the things we have heard, lest we drift away. '
  '10':
  - type: text
    content: 'For it was fitting for Him, '
  - type: note
    content: Col. 1:16
  - type: text
    content: 'for whom '
  - type: text
    content: are
  - type: text
    content: ' all things and by whom '
  - type: text
    content: are
  - type: text
    content: ' all things, in bringing many sons to glory, to make the captain of their salvation '
  - type: note
    content: Heb. 5:8, 9; 7:28
  - type: text
    content: 'perfect through sufferings. '
  '11':
  - type: text
    content: 'For '
  - type: note
    content: Heb. 10:10
  - type: text
    content: 'both He who sanctifies and those who are being sanctified '
  - type: note
    content: Acts 17:26
  - type: text
    content: are
  - type: text
    content: ' all of one, for which reason '
  - type: note
    content: Matt. 28:10
  - type: text
    content: 'He is not ashamed to call them brethren, '
  '12':
  - type: text
    content: 'saying:'
  - type: note
    content: Ps. 22:22
  - type: text
    content: “I will declare Your name to My brethren;
  - type: text
    content: In the midst of the assembly I will sing praise to You.”
  '13':
  - type: text
    content: 'And again:'
  - type: note
    content: 2 Sam. 22:3; Is. 8:17
  - type: text
    content: “I will put My trust in Him.”
  - type: text
    content: 'And again:'
  - type: note
    content: Is. 8:18
  - type: text
    content: “Here am I and the children whom God has given Me.”
  '14':
  - type: text
    content: 'Inasmuch then as the children have partaken of flesh and blood, He '
  - type: note
    content: John 1:14
  - type: text
    content: 'Himself likewise shared in the same, '
  - type: note
    content: Col. 2:15
  - type: text
    content: 'that through death He might destroy him who had the power of '
  - type: note
    content: (1 Cor. 15:54–57); 2 Tim. 1:10
  - type: text
    content: 'death, that is, the devil, '
  '15':
  - type: text
    content: 'and release those who '
  - type: note
    content: Ps. 68:18; Is. 42:7; 45:13; 49:9; 61:1; (Luke 1:74)
  - type: text
    content: 'through fear of death were all their lifetime subject to bondage. '
  '16':
  - type: text
    content: 'For indeed He does not give aid to angels, but He does give aid to the seed of Abraham. '
  '17':
  - type: text
    content: 'Therefore, in all things He had '
  - type: note
    content: Phil. 2:7; Heb. 2:14
  - type: text
    content: 'to be made like '
  - type: text
    content: His
  - type: text
    content: ' brethren, that He might be '
  - type: note
    content: (Heb. 4:15; 5:1–10)
  - type: text
    content: 'a merciful and faithful High Priest in things '
  - type: text
    content: pertaining
  - type: text
    content: ' to God, to make propitiation for the sins of the people. '
  '18':
  - type: note
    content: (Heb. 4:15, 16)
  - type: text
    content: For in that He Himself has suffered, being tempted, He is able to aid those who are tempted.
  '2':
  - type: text
    content: 'For if the word '
  - type: note
    content: Deut. 33:2; Acts 7:53; Gal. 3:19
  - type: text
    content: 'spoken through angels proved steadfast, and '
  - type: note
    content: Num. 15:30
  - type: text
    content: 'every transgression and disobedience received a just reward, '
  '3':
  - type: note
    content: Heb. 10:28
  - type: text
    content: 'how shall we escape if we neglect so great a salvation, '
  - type: note
    content: Matt. 4:17
  - type: text
    content: 'which at the first began to be spoken by the Lord, and was '
  - type: note
    content: Mark 16:20; Luke 1:2; 1 John 1:1
  - type: text
    content: 'confirmed to us by those who heard '
  - type: text
    content: Him,
  - type: text
    content: ' '
  '4':
  - type: note
    content: Mark 16:20
  - type: text
    content: 'God also bearing witness '
  - type: note
    content: Acts 2:22, 43; 2 Cor. 12:2
  - type: text
    content: 'both with signs and wonders, with various miracles, and '
  - type: note
    content: 1 Cor. 12:4, 7, 11; Eph. 4:7
  - type: text
    content: 'gifts of the Holy Spirit, '
  - type: note
    content: Eph. 1:5, 9
  - type: text
    content: according to His own will?
  - type: heading
    content: The Son Made Lower than Angels
  '5':
  - type: text
    content: 'For He has not put '
  - type: note
    content: (2 Pet. 3:13)
  - type: text
    content: 'the world to come, of which we speak, in subjection to angels. '
  '6':
  - type: text
    content: 'But one testified in a certain place, saying:'
  - type: note
    content: Job 7:17; Ps. 8:4–6
  - type: text
    content: “What is man that You are mindful of him,
  - type: text
    content: Or the son of man that You take care of him?
  '7':
  - type: text
    content: You have made him a little lower than the angels;
  - type: text
    content: You have crowned him with glory and honor,
  - type: text
    content: And set him over the works of Your hands.
  '8':
  - type: note
    content: Matt. 28:18
  - type: text
    content: You have put all things in subjection under his feet.”
  - type: text
    content: 'For in that He put all in subjection under him, He left nothing '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' not put under him. But now '
  - type: note
    content: Ps. 8:6; 1 Cor. 15:25, 27
  - type: text
    content: 'we do not yet see all things put under him. '
  '9':
  - type: text
    content: 'But we see Jesus, '
  - type: note
    content: Phil. 2:7–9; Heb. 1:9
  - type: text
    content: 'who was made a little lower than the angels, for the suffering of death '
  - type: note
    content: Acts 2:33; 3:13; 1 Pet. 1:21
  - type: text
    content: 'crowned with glory and honor, that He, by the grace of God, might taste death '
  - type: note
    content: Is. 53:12; (John 3:16)
  - type: text
    content: for everyone.
  - type: heading
    content: Bringing Many Sons to Glory
