document_id: TIT.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, a bondservant of God and an apostle of Jesus Christ, according to the faith of God’s elect and '
  - type: note
    content: 2 Tim. 2:25
  - type: text
    content: 'the acknowledgment of the truth '
  - type: note
    content: (1 Tim. 3:16)
  - type: text
    content: 'which accords with godliness, '
  '10':
  - type: text
    content: 'For there are many insubordinate, both idle '
  - type: note
    content: James 1:26
  - type: text
    content: 'talkers and deceivers, especially those of the circumcision, '
  '11':
  - type: text
    content: 'whose mouths must be stopped, who subvert whole households, teaching things which they ought not, '
  - type: note
    content: 1 Tim. 6:5
  - type: text
    content: 'for the sake of dishonest gain. '
  '12':
  - type: note
    content: Acts 17:28
  - type: text
    content: 'One of them, a prophet of their own, said, “Cretans '
  - type: text
    content: are
  - type: text
    content: ' always liars, evil beasts, lazy gluttons.” '
  '13':
  - type: text
    content: 'This testimony is true. '
  - type: note
    content: 2 Cor. 13:10; 2 Tim. 4:2
  - type: text
    content: 'Therefore rebuke them sharply, that they may be sound in the faith, '
  '14':
  - type: text
    content: 'not giving heed to Jewish fables and '
  - type: note
    content: Is. 29:13
  - type: text
    content: 'commandments of men who turn from the truth. '
  '15':
  - type: note
    content: Luke 11:41; Rom. 14:14, 20; 1 Cor. 6:12
  - type: text
    content: 'To the pure all things are pure, but to those who are defiled and unbelieving nothing is pure; but even their mind and conscience are defiled. '
  '16':
  - type: text
    content: 'They profess to '
  - type: note
    content: Matt. 7:20–23; 25:12; 1 John 2:4
  - type: text
    content: 'know God, but '
  - type: note
    content: (2 Tim. 3:5, 7)
  - type: text
    content: 'in works they deny '
  - type: text
    content: Him,
  - type: text
    content: ' being abominable, disobedient, '
  - type: note
    content: Rom. 1:28
  - type: text
    content: and disqualified for every good work.
  '2':
  - type: text
    content: 'in hope of eternal life which God, who '
  - type: note
    content: Num. 23:19
  - type: text
    content: 'cannot lie, promised before time began, '
  '3':
  - type: text
    content: but has in due time manifested His word through preaching, which was committed to me according to the commandment of God our Savior;
  '4':
  - type: text
    content: 'To '
  - type: note
    content: 2 Cor. 2:13; 8:23; Gal. 2:3; 2 Tim. 4:10
  - type: text
    content: 'Titus, a true son in '
  - type: text
    content: our
  - type: text
    content: ' common faith:'
  - type: text
    content: 'Grace, mercy, '
  - type: text
    content: and
  - type: text
    content: ' peace from God the Father and the Lord Jesus Christ our Savior.'
  - type: heading
    content: Qualified Elders
  '5':
  - type: text
    content: 'For this reason I left you in Crete, that you should '
  - type: note
    content: 1 Cor. 11:34
  - type: text
    content: 'set in order the things that are lacking, and appoint elders in every city as I commanded you— '
  '6':
  - type: text
    content: 'if a man is blameless, the husband of one wife, '
  - type: note
    content: 1 Tim. 3:2–4; Titus 1:6–8
  - type: text
    content: 'having faithful children not accused of dissipation or insubordination. '
  '7':
  - type: text
    content: 'For a bishop must be blameless, as a steward of God, not self-willed, not quick-tempered, '
  - type: note
    content: Lev. 10:9
  - type: text
    content: 'not given to wine, not violent, not greedy for money, '
  '8':
  - type: text
    content: 'but hospitable, a lover of what is good, sober-minded, just, holy, self-controlled, '
  '9':
  - type: text
    content: holding fast the faithful word as he has been taught, that he may be able, by sound doctrine, both to exhort and convict those who contradict.
  - type: heading
    content: The Elders’ Task
