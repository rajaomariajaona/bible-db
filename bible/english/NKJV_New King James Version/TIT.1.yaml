document_id: TIT.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greeting
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, a bondservant of God and an apostle of Jesus Christ, according to the faith of God’s elect and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Tim. 2:25
    marker-yv: yv-n
  - type: text
    text: 'the acknowledgment of the truth '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Tim. 3:16)
    marker-yv: yv-n
  - type: text
    text: 'which accords with godliness, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'in hope of eternal life which God, who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 23:19
    marker-yv: yv-n
  - type: text
    text: 'cannot lie, promised before time began, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: but has in due time manifested His word through preaching, which was committed to me according to the commandment of God our Savior;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'To '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 2:13; 8:23; Gal. 2:3; 2 Tim. 4:10
    marker-yv: yv-n
  - type: text
    text: 'Titus, a true son in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our
  - type: text
    text: ' common faith:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Grace, mercy, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' peace from God the Father and the Lord Jesus Christ our Savior.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Qualified Elders
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For this reason I left you in Crete, that you should '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 11:34
    marker-yv: yv-n
  - type: text
    text: 'set in order the things that are lacking, and appoint elders in every city as I commanded you— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'if a man is blameless, the husband of one wife, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Tim. 3:2–4; Titus 1:6–8
    marker-yv: yv-n
  - type: text
    text: 'having faithful children not accused of dissipation or insubordination. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For a bishop must be blameless, as a steward of God, not self-willed, not quick-tempered, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 10:9
    marker-yv: yv-n
  - type: text
    text: 'not given to wine, not violent, not greedy for money, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but hospitable, a lover of what is good, sober-minded, just, holy, self-controlled, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: holding fast the faithful word as he has been taught, that he may be able, by sound doctrine, both to exhort and convict those who contradict.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Elders’ Task
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For there are many insubordinate, both idle '
  - type: usfm
    marker: x
    children:
    - type: text
      text: James 1:26
    marker-yv: yv-n
  - type: text
    text: 'talkers and deceivers, especially those of the circumcision, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'whose mouths must be stopped, who subvert whole households, teaching things which they ought not, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Tim. 6:5
    marker-yv: yv-n
  - type: text
    text: 'for the sake of dishonest gain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 17:28
    marker-yv: yv-n
  - type: text
    text: 'One of them, a prophet of their own, said, “Cretans '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' always liars, evil beasts, lazy gluttons.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'This testimony is true. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 13:10; 2 Tim. 4:2
    marker-yv: yv-n
  - type: text
    text: 'Therefore rebuke them sharply, that they may be sound in the faith, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'not giving heed to Jewish fables and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 29:13
    marker-yv: yv-n
  - type: text
    text: 'commandments of men who turn from the truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 11:41; Rom. 14:14, 20; 1 Cor. 6:12
    marker-yv: yv-n
  - type: text
    text: 'To the pure all things are pure, but to those who are defiled and unbelieving nothing is pure; but even their mind and conscience are defiled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'They profess to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 7:20–23; 25:12; 1 John 2:4
    marker-yv: yv-n
  - type: text
    text: 'know God, but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Tim. 3:5, 7)
    marker-yv: yv-n
  - type: text
    text: 'in works they deny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him,
  - type: text
    text: ' being abominable, disobedient, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:28
    marker-yv: yv-n
  - type: text
    text: and disqualified for every good work.
