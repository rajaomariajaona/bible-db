document_id: EST.6,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The King Honors Mordecai
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That night the king could not sleep. So one was commanded to bring '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 2:23, 10:2
      marker-yv: yv-n
    - type: text
      text: 'the book of the records of the chronicles; and they were read before the king. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the king said to Haman, “Hurry, take the robe and the horse, as you have suggested, and do so for Mordecai the Jew who sits within the king’s gate! Leave nothing undone of all that you have spoken.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Haman took the robe and the horse, arrayed Mordecai and led him on horseback through the city square, and proclaimed before him, “Thus shall it be done to the man whom the king delights to honor!”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward Mordecai went back to the king’s gate. But Haman '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 26:20
      marker-yv: yv-n
    - type: text
      text: 'hurried to his house, mourning '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:30; Jer. 14:3, 4
      marker-yv: yv-n
    - type: text
      text: 'and with his head covered. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Haman told his wife Zeresh and all his friends everything that had happened to him, his wise men and his wife Zeresh said to him, “If Mordecai, before whom you have begun to fall, is of Jewish descent, you will not prevail against '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 12:3); Zech. 2:8
      marker-yv: yv-n
    - type: text
      text: him but will surely fall before him.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' still talking with him, the king’s eunuchs came, and hastened to bring Haman to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 5:8
      marker-yv: yv-n
    - type: text
      text: the banquet which Esther had prepared.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it was found written that Mordecai had told of Bigthana and Teresh, two of the king’s eunuchs, the doorkeepers who had sought to lay hands on King Ahasuerus. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the king said, “What honor or dignity has been bestowed on Mordecai for this?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the king’s servants who attended him said, “Nothing has been done for him.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king said, “Who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in the court?” Now Haman had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: just
    - type: text
      text: ' entered '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 5:1
      marker-yv: yv-n
    - type: text
      text: 'the outer court of the king’s palace '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 5:14
      marker-yv: yv-n
    - type: text
      text: to suggest that the king hang Mordecai on the gallows that he had prepared for him.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king’s servants said to him, “Haman is there, standing in the court.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the king said, “Let him come in.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Haman came in, and the king asked him, “What shall be done for the man whom the king delights to honor?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Haman thought in his heart, “Whom would the king delight to honor more than '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 16:18; 18:12)
      marker-yv: yv-n
    - type: text
      text: 'me?” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Haman answered the king, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: For
    - type: text
      text: ' the man whom the king delights to honor, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'let a royal robe be brought which the king has worn, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 1:33
      marker-yv: yv-n
    - type: text
      text: 'a horse on which the king has ridden, which has a royal crest placed on its head. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then let this robe and horse be delivered to the hand of one of the king’s most noble princes, that he may array the man whom the king delights to honor. Then parade him on horseback through the city square, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:43
      marker-yv: yv-n
    - type: text
      text: 'and proclaim before him: ‘Thus shall it be done to the man whom the king delights to honor!’ ”'
