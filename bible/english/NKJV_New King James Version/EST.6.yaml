verses:
  '1':
  - type: heading
    content: The King Honors Mordecai
  - type: text
    content: 'That night the king could not sleep. So one was commanded to bring '
  - type: note
    content: Esth. 2:23, 10:2
  - type: text
    content: 'the book of the records of the chronicles; and they were read before the king. '
  '10':
  - type: text
    content: Then the king said to Haman, “Hurry, take the robe and the horse, as you have suggested, and do so for Mordecai the Jew who sits within the king’s gate! Leave nothing undone of all that you have spoken.”
  '11':
  - type: text
    content: So Haman took the robe and the horse, arrayed Mordecai and led him on horseback through the city square, and proclaimed before him, “Thus shall it be done to the man whom the king delights to honor!”
  '12':
  - type: text
    content: 'Afterward Mordecai went back to the king’s gate. But Haman '
  - type: note
    content: 2 Chr. 26:20
  - type: text
    content: 'hurried to his house, mourning '
  - type: note
    content: 2 Sam. 15:30; Jer. 14:3, 4
  - type: text
    content: 'and with his head covered. '
  '13':
  - type: text
    content: 'When Haman told his wife Zeresh and all his friends everything that had happened to him, his wise men and his wife Zeresh said to him, “If Mordecai, before whom you have begun to fall, is of Jewish descent, you will not prevail against '
  - type: note
    content: (Gen. 12:3); Zech. 2:8
  - type: text
    content: him but will surely fall before him.”
  '14':
  - type: text
    content: 'While they '
  - type: text
    content: were
  - type: text
    content: ' still talking with him, the king’s eunuchs came, and hastened to bring Haman to '
  - type: note
    content: Esth. 5:8
  - type: text
    content: the banquet which Esther had prepared.
  '2':
  - type: text
    content: 'And it was found written that Mordecai had told of Bigthana and Teresh, two of the king’s eunuchs, the doorkeepers who had sought to lay hands on King Ahasuerus. '
  '3':
  - type: text
    content: Then the king said, “What honor or dignity has been bestowed on Mordecai for this?”
  - type: text
    content: And the king’s servants who attended him said, “Nothing has been done for him.”
  '4':
  - type: text
    content: 'So the king said, “Who '
  - type: text
    content: is
  - type: text
    content: ' in the court?” Now Haman had '
  - type: text
    content: just
  - type: text
    content: ' entered '
  - type: note
    content: Esth. 5:1
  - type: text
    content: 'the outer court of the king’s palace '
  - type: note
    content: Esth. 5:14
  - type: text
    content: to suggest that the king hang Mordecai on the gallows that he had prepared for him.
  '5':
  - type: text
    content: The king’s servants said to him, “Haman is there, standing in the court.”
  - type: text
    content: And the king said, “Let him come in.”
  '6':
  - type: text
    content: So Haman came in, and the king asked him, “What shall be done for the man whom the king delights to honor?”
  - type: text
    content: 'Now Haman thought in his heart, “Whom would the king delight to honor more than '
  - type: note
    content: (Prov. 16:18; 18:12)
  - type: text
    content: 'me?” '
  '7':
  - type: text
    content: And Haman answered the king, “
  - type: text
    content: For
  - type: text
    content: ' the man whom the king delights to honor, '
  '8':
  - type: text
    content: 'let a royal robe be brought which the king has worn, and '
  - type: note
    content: 1 Kin. 1:33
  - type: text
    content: 'a horse on which the king has ridden, which has a royal crest placed on its head. '
  '9':
  - type: text
    content: 'Then let this robe and horse be delivered to the hand of one of the king’s most noble princes, that he may array the man whom the king delights to honor. Then parade him on horseback through the city square, '
  - type: note
    content: Gen. 41:43
  - type: text
    content: 'and proclaim before him: ‘Thus shall it be done to the man whom the king delights to honor!’ ”'
