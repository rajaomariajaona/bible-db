document_id: EZK.4,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Siege of Jerusalem Portrayed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“You also, son of man, take a clay tablet and lay it before you, and portray on it a city, Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And your food which you eat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' by weight, twenty shekels a day; from time to time you shall eat it. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'You shall also drink water by measure, one-sixth of a hin; from time to time you shall drink. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And you shall eat it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' barley cakes; and bake it using fuel of human waste in their sight.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 1:8; Hos. 9:3
      marker-yv: yv-n
    - type: text
      text: shall the children of Israel eat their defiled bread among the Gentiles, where I will drive them.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So I said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 10:14
      marker-yv: yv-n
    - type: text
      text: '“Ah, Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: '! Indeed I have never defiled myself from my youth till now; I have never eaten '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:31; Lev. 17:15; 22:8; Ezek. 44:31
      marker-yv: yv-n
    - type: text
      text: 'what died of itself or was torn by beasts, nor has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 14:3; Is. 65:4; 66:17
      marker-yv: yv-n
    - type: text
      text: abominable flesh ever come into my mouth.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then He said to me, “See, I am giving you cow dung instead of human waste, and you shall prepare your bread over it.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Moreover He said to me, “Son of man, surely I will cut off the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:26; Ps. 105:16; Is. 3:1; Ezek. 5:16; 14:13
      marker-yv: yv-n
    - type: text
      text: 'supply of bread in Jerusalem; they shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 4:10, 11; 12:19
      marker-yv: yv-n
    - type: text
      text: 'eat bread by weight and with anxiety, and shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 4:11
      marker-yv: yv-n
    - type: text
      text: 'drink water by measure and with dread, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'that they may lack bread and water, and be dismayed with one another, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:39; Ezek. 24:23
      marker-yv: yv-n
    - type: text
      text: waste away because of their iniquity.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 6:6; Ezek. 21:22
      marker-yv: yv-n
    - type: text
      text: 'Lay siege against it, build a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:1
      marker-yv: yv-n
    - type: text
      text: 'siege wall against it, and heap up a mound against it; set camps against it also, and place battering rams against it all around. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Moreover take for yourself an iron plate, and set it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' an iron wall between you and the city. Set your face against it, and it shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 39:1, 2; Ezek. 5:2
      marker-yv: yv-n
    - type: text
      text: 'besieged, and you shall lay siege against it. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 12:6, 11; 24:24, 27
      marker-yv: yv-n
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' a sign to the house of Israel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“Lie also on your left side, and lay the iniquity of the house of Israel upon it. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: According
    - type: text
      text: ' to the number of the days that you lie on it, you shall bear their iniquity. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For I have laid on you the years of their iniquity, according to the number of the days, three hundred and ninety days; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:34
      marker-yv: yv-n
    - type: text
      text: 'so you shall bear the iniquity of the house of Israel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And when you have completed them, lie again on your right side; then you shall bear the iniquity of the house of Judah forty days. I have laid on you a day for each year.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“Therefore you shall set your face toward the siege of Jerusalem; your arm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' uncovered, and you shall prophesy against it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 3:25
      marker-yv: yv-n
    - type: text
      text: And surely I will restrain you so that you cannot turn from one side to another till you have ended the days of your siege.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“Also take for yourself wheat, barley, beans, lentils, millet, and spelt; put them into one vessel, and make bread of them for yourself. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: During
    - type: text
      text: ' the number of days that you lie on your side, three hundred and ninety days, you shall eat it. '
