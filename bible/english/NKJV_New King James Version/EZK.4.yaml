document_id: EZK.4,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Siege of Jerusalem Portrayed
  - type: text
    content: '“You also, son of man, take a clay tablet and lay it before you, and portray on it a city, Jerusalem. '
  '10':
  - type: text
    content: 'And your food which you eat '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' by weight, twenty shekels a day; from time to time you shall eat it. '
  '11':
  - type: text
    content: 'You shall also drink water by measure, one-sixth of a hin; from time to time you shall drink. '
  '12':
  - type: text
    content: 'And you shall eat it '
  - type: text
    content: as
  - type: text
    content: ' barley cakes; and bake it using fuel of human waste in their sight.”'
  '13':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said, “So '
  - type: note
    content: Dan. 1:8; Hos. 9:3
  - type: text
    content: shall the children of Israel eat their defiled bread among the Gentiles, where I will drive them.”
  '14':
  - type: text
    content: 'So I said, '
  - type: note
    content: Acts 10:14
  - type: text
    content: '“Ah, Lord '
  - type: heading
    content: God
  - type: text
    content: '! Indeed I have never defiled myself from my youth till now; I have never eaten '
  - type: note
    content: Ex. 22:31; Lev. 17:15; 22:8; Ezek. 44:31
  - type: text
    content: 'what died of itself or was torn by beasts, nor has '
  - type: note
    content: Deut. 14:3; Is. 65:4; 66:17
  - type: text
    content: abominable flesh ever come into my mouth.”
  '15':
  - type: text
    content: Then He said to me, “See, I am giving you cow dung instead of human waste, and you shall prepare your bread over it.”
  '16':
  - type: text
    content: 'Moreover He said to me, “Son of man, surely I will cut off the '
  - type: note
    content: Lev. 26:26; Ps. 105:16; Is. 3:1; Ezek. 5:16; 14:13
  - type: text
    content: 'supply of bread in Jerusalem; they shall '
  - type: note
    content: Ezek. 4:10, 11; 12:19
  - type: text
    content: 'eat bread by weight and with anxiety, and shall '
  - type: note
    content: Ezek. 4:11
  - type: text
    content: 'drink water by measure and with dread, '
  '17':
  - type: text
    content: 'that they may lack bread and water, and be dismayed with one another, and '
  - type: note
    content: Lev. 26:39; Ezek. 24:23
  - type: text
    content: waste away because of their iniquity.
  '2':
  - type: note
    content: Jer. 6:6; Ezek. 21:22
  - type: text
    content: 'Lay siege against it, build a '
  - type: note
    content: 2 Kin. 25:1
  - type: text
    content: 'siege wall against it, and heap up a mound against it; set camps against it also, and place battering rams against it all around. '
  '3':
  - type: text
    content: 'Moreover take for yourself an iron plate, and set it '
  - type: text
    content: as
  - type: text
    content: ' an iron wall between you and the city. Set your face against it, and it shall be '
  - type: note
    content: Jer. 39:1, 2; Ezek. 5:2
  - type: text
    content: 'besieged, and you shall lay siege against it. '
  - type: note
    content: Ezek. 12:6, 11; 24:24, 27
  - type: text
    content: 'This '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' a sign to the house of Israel.'
  '4':
  - type: text
    content: '“Lie also on your left side, and lay the iniquity of the house of Israel upon it. '
  - type: text
    content: According
  - type: text
    content: ' to the number of the days that you lie on it, you shall bear their iniquity. '
  '5':
  - type: text
    content: 'For I have laid on you the years of their iniquity, according to the number of the days, three hundred and ninety days; '
  - type: note
    content: Num. 14:34
  - type: text
    content: 'so you shall bear the iniquity of the house of Israel. '
  '6':
  - type: text
    content: And when you have completed them, lie again on your right side; then you shall bear the iniquity of the house of Judah forty days. I have laid on you a day for each year.
  '7':
  - type: text
    content: '“Therefore you shall set your face toward the siege of Jerusalem; your arm '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' uncovered, and you shall prophesy against it. '
  '8':
  - type: note
    content: Ezek. 3:25
  - type: text
    content: And surely I will restrain you so that you cannot turn from one side to another till you have ended the days of your siege.
  '9':
  - type: text
    content: '“Also take for yourself wheat, barley, beans, lentils, millet, and spelt; put them into one vessel, and make bread of them for yourself. '
  - type: text
    content: During
  - type: text
    content: ' the number of days that you lie on your side, three hundred and ninety days, you shall eat it. '
