  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ex. 34:13)
    marker-yv: yv-n
  - type: text
    text: 'broke down the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacred
  - type: text
    text: ' pillars '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:7
    marker-yv: yv-n
  - type: text
    text: 'and cut down the wooden images. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He commanded Judah to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Chr. 7:14)
    marker-yv: yv-n
  - type: text
    text: 'seek the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of their fathers, and to observe the law and the commandment. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He also removed the high places and the incense altars from all the cities of Judah, and the kingdom was quiet under him. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he built fortified cities in Judah, for the land had rest; he had no war in those years, because the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had given him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 15:15
    marker-yv: yv-n
  - type: text
    text: 'rest. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore he said to Judah, “Let us build these cities and make walls around '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them,
  - type: text
    text: ' and towers, gates, and bars, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: while
  - type: text
    text: ' the land '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' yet before us, because we have sought the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God; we have sought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him,
  - type: text
    text: ' and He has given us rest on every side.” So they built and prospered. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Asa had an army of three hundred thousand from Judah who carried shields and spears, and from Benjamin two hundred and eighty thousand men who carried shields and drew '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 12:2
    marker-yv: yv-n
  - type: text
    text: 'bows; all these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' mighty men of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 13:3
    marker-yv: yv-n
  - type: text
    text: valor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 12:2, 3; 16:8
    marker-yv: yv-n
  - type: text
    text: 'Then Zerah the Ethiopian came out against them with an army of a million men and three hundred chariots, and he came to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 15:44
    marker-yv: yv-n
  - type: text
    text: 'Mareshah. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So Asa went out against him, and they set the troops in battle array in the Valley of Zephathah at Mareshah. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Asa '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 14:10; 2 Chr. 13:14; (Ps. 22:5)
    marker-yv: yv-n
  - type: text
    text: 'cried out to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God, and said, “'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Sam. 14:6)
    marker-yv: yv-n
  - type: text
    text: 'nothing for You to help, whether with many or with those who have no power; help us, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God, for we rest on You, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 17:45; (Prov. 18:10)
    marker-yv: yv-n
  - type: text
    text: 'in Your name we go against this multitude. O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' our God; do not let man prevail against You!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 13:15
    marker-yv: yv-n
  - type: text
    text: 'struck the Ethiopians before Asa and Judah, and the Ethiopians fled. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Asa and the people who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' with him pursued them to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 10:19; 20:1
    marker-yv: yv-n
  - type: text
    text: 'Gerar. So the Ethiopians were overthrown, and they could not recover, for they were broken before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and His army. And they carried away very much spoil. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then they defeated all the cities around Gerar, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 35:5; Deut. 11:25; Josh. 2:9; 2 Chr. 17:10
    marker-yv: yv-n
  - type: text
    text: 'the fear of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came upon them; and they plundered all the cities, for there was exceedingly much spoil in them. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: They also attacked the livestock enclosures, and carried off sheep and camels in abundance, and returned to Jerusalem.
