  - type: text
    text: 'So Abijah rested with his fathers, and they buried him in the City of David. Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 15:8
    marker-yv: yv-n
  - type: text
    text: Asa his son reigned in his place. In his days the land was quiet for ten years.
- type: usfm
