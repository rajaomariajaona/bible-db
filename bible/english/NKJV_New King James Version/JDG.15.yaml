document_id: JDG.15,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Samson Defeats the Philistines
  - type: text
    content: 'After a while, in the time of wheat harvest, it happened that Samson visited his wife with a '
  - type: note
    content: Gen. 38:17
  - type: text
    content: 'young goat. And he said, “Let me go in to my wife, into '
  - type: text
    content: her
  - type: text
    content: ' room.” But her father would not permit him to go in.'
  '10':
  - type: text
    content: And the men of Judah said, “Why have you come up against us?”
  - type: text
    content: So they answered, “We have come up to arrest Samson, to do to him as he has done to us.”
  '11':
  - type: text
    content: 'Then three thousand men of Judah went down to the cleft of the rock of Etam, and said to Samson, “Do you not know that the Philistines '
  - type: note
    content: Lev. 26:25; Deut. 28:43; Judg. 13:1; 14:4; Ps. 106:40–42
  - type: text
    content: 'rule over us? What '
  - type: text
    content: is
  - type: text
    content: ' this you have done to us?”'
  - type: text
    content: And he said to them, “As they did to me, so I have done to them.”
  '12':
  - type: text
    content: But they said to him, “We have come down to arrest you, that we may deliver you into the hand of the Philistines.”
  - type: text
    content: Then Samson said to them, “Swear to me that you will not kill me yourselves.”
  '13':
  - type: text
    content: 'So they spoke to him, saying, “No, but we will tie you securely and deliver you into their hand; but we will surely not kill you.” And they bound him with two '
  - type: note
    content: Judg. 16:11, 12
  - type: text
    content: new ropes and brought him up from the rock.
  '14':
  - type: text
    content: 'When he came to Lehi, the Philistines came shouting against him. Then '
  - type: note
    content: Judg. 3:10; 14:6
  - type: text
    content: 'the Spirit of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came mightily upon him; and the ropes that '
  - type: text
    content: were
  - type: text
    content: ' on his arms became like flax that is burned with fire, and his bonds broke loose from his hands. '
  '15':
  - type: text
    content: 'He found a fresh jawbone of a donkey, reached out his hand and took it, and '
  - type: note
    content: Lev. 26:8; Josh. 23:10; Judg. 3:31
  - type: text
    content: 'killed a thousand men with it. '
  '16':
  - type: text
    content: 'Then Samson said:'
  - type: text
    content: “With the jawbone of a donkey,
  - type: text
    content: Heaps upon heaps,
  - type: text
    content: With the jawbone of a donkey
  - type: text
    content: I have slain a thousand men!”
  '17':
  - type: text
    content: And so it was, when he had finished speaking, that he threw the jawbone from his hand, and called that place Ramath Lehi.
  '18':
  - type: text
    content: 'Then he became very thirsty; so he cried out to the '
  - type: heading
    content: Lord
  - type: text
    content: ' and said, '
  - type: note
    content: Ps. 3:7
  - type: text
    content: '“You have given this great deliverance by the hand of Your servant; and now shall I die of thirst and fall into the hand of the uncircumcised?” '
  '19':
  - type: text
    content: 'So God split the hollow place that '
  - type: text
    content: is
  - type: text
    content: ' in Lehi, and water came out, and he drank; and '
  - type: note
    content: Gen. 45:27; Is. 40:29
  - type: text
    content: 'his spirit returned, and he revived. Therefore he called its name En Hakkore, which is in Lehi to this day. '
  '2':
  - type: text
    content: 'Her father said, “I really thought that you thoroughly '
  - type: note
    content: Judg. 14:20
  - type: text
    content: 'hated her; therefore I gave her to your companion. '
  - type: text
    content: Is
  - type: text
    content: ' not her younger sister better than she? Please, take her instead.”'
  '20':
  - type: text
    content: 'And '
  - type: note
    content: Judg. 10:2; 12:7–14
  - type: text
    content: 'he judged Israel '
  - type: note
    content: Judg. 16:31
  - type: text
    content: 'twenty years '
  - type: note
    content: Judg. 13:1
  - type: text
    content: in the days of the Philistines.
  '3':
  - type: text
    content: 'And Samson said to them, “This time I shall be blameless regarding the Philistines if I harm them!” '
  '4':
  - type: text
    content: 'Then Samson went and caught three hundred foxes; and he took torches, turned '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: foxes
  - type: text
    content: ' tail to tail, and put a torch between each pair of tails. '
  '5':
  - type: text
    content: 'When he had set the torches on fire, he let '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: foxes
  - type: text
    content: ' go into the standing grain of the Philistines, and burned up both the shocks and the standing grain, as well as the vineyards '
  - type: text
    content: and
  - type: text
    content: ' olive groves.'
  '6':
  - type: text
    content: Then the Philistines said, “Who has done this?”
  - type: text
    content: 'And they answered, “Samson, the son-in-law of the Timnite, because he has taken his wife and given her to his companion.” '
  - type: note
    content: Judg. 14:15
  - type: text
    content: So the Philistines came up and burned her and her father with fire.
  '7':
  - type: text
    content: 'Samson said to them, “Since you would do a thing like this, I will surely take revenge on you, and after that I will cease.” '
  '8':
  - type: text
    content: 'So he attacked them hip and thigh with a great slaughter; then he went down and dwelt in the cleft of the rock of '
  - type: note
    content: 2 Chr. 11:6
  - type: text
    content: Etam.
  '9':
  - type: text
    content: 'Now the Philistines went up, encamped in Judah, and deployed themselves '
  - type: note
    content: Judg. 15:19
  - type: text
    content: 'against Lehi. '
