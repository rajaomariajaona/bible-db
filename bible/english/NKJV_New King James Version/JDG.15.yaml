segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samson Defeats the Philistines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After a while, in the time of wheat harvest, it happened that Samson visited his wife with a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 38:17
    marker-yv: yv-n
  - type: text
    text: 'young goat. And he said, “Let me go in to my wife, into '
  - type: usfm
    marker: it
    children:
    - type: text
      text: her
  - type: text
    text: ' room.” But her father would not permit him to go in.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Her father said, “I really thought that you thoroughly '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 14:20
    marker-yv: yv-n
  - type: text
    text: 'hated her; therefore I gave her to your companion. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Is
  - type: text
    text: ' not her younger sister better than she? Please, take her instead.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Samson said to them, “This time I shall be blameless regarding the Philistines if I harm them!” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Samson went and caught three hundred foxes; and he took torches, turned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: foxes
  - type: text
    text: ' tail to tail, and put a torch between each pair of tails. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When he had set the torches on fire, he let '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: foxes
  - type: text
    text: ' go into the standing grain of the Philistines, and burned up both the shocks and the standing grain, as well as the vineyards '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' olive groves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then the Philistines said, “Who has done this?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And they answered, “Samson, the son-in-law of the Timnite, because he has taken his wife and given her to his companion.” '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 14:15
    marker-yv: yv-n
  - type: text
    text: So the Philistines came up and burned her and her father with fire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Samson said to them, “Since you would do a thing like this, I will surely take revenge on you, and after that I will cease.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So he attacked them hip and thigh with a great slaughter; then he went down and dwelt in the cleft of the rock of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 11:6
    marker-yv: yv-n
  - type: text
    text: Etam.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now the Philistines went up, encamped in Judah, and deployed themselves '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 15:19
    marker-yv: yv-n
  - type: text
    text: 'against Lehi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And the men of Judah said, “Why have you come up against us?”
- type: usfm
  marker: p
  children:
  - type: text
    text: So they answered, “We have come up to arrest Samson, to do to him as he has done to us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then three thousand men of Judah went down to the cleft of the rock of Etam, and said to Samson, “Do you not know that the Philistines '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:25; Deut. 28:43; Judg. 13:1; 14:4; Ps. 106:40–42
    marker-yv: yv-n
  - type: text
    text: 'rule over us? What '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' this you have done to us?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: And he said to them, “As they did to me, so I have done to them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But they said to him, “We have come down to arrest you, that we may deliver you into the hand of the Philistines.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Then Samson said to them, “Swear to me that you will not kill me yourselves.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So they spoke to him, saying, “No, but we will tie you securely and deliver you into their hand; but we will surely not kill you.” And they bound him with two '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 16:11, 12
    marker-yv: yv-n
  - type: text
    text: new ropes and brought him up from the rock.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When he came to Lehi, the Philistines came shouting against him. Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 3:10; 14:6
    marker-yv: yv-n
  - type: text
    text: 'the Spirit of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came mightily upon him; and the ropes that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' on his arms became like flax that is burned with fire, and his bonds broke loose from his hands. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He found a fresh jawbone of a donkey, reached out his hand and took it, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:8; Josh. 23:10; Judg. 3:31
    marker-yv: yv-n
  - type: text
    text: 'killed a thousand men with it. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Samson said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “With the jawbone of a donkey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Heaps upon heaps,
- type: usfm
  marker: q2
  children:
  - type: text
    text: With the jawbone of a donkey
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have slain a thousand men!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And so it was, when he had finished speaking, that he threw the jawbone from his hand, and called that place Ramath Lehi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then he became very thirsty; so he cried out to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 3:7
    marker-yv: yv-n
  - type: text
    text: '“You have given this great deliverance by the hand of Your servant; and now shall I die of thirst and fall into the hand of the uncircumcised?” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So God split the hollow place that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' in Lehi, and water came out, and he drank; and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 45:27; Is. 40:29
    marker-yv: yv-n
  - type: text
    text: 'his spirit returned, and he revived. Therefore he called its name En Hakkore, which is in Lehi to this day. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 10:2; 12:7–14
    marker-yv: yv-n
  - type: text
    text: 'he judged Israel '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 16:31
    marker-yv: yv-n
  - type: text
    text: 'twenty years '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 13:1
    marker-yv: yv-n
  - type: text
    text: in the days of the Philistines.
