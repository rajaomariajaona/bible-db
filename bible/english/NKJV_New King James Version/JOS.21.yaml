  - type: note
    content: Josh. 20:7
  - type: text
    content: 'Kedesh in Galilee with its common-land (a city of refuge for the slayer), Hammoth Dor with its common-land, and Kartan with its common-land: three cities. '
  '33':
  - type: text
    content: 'All the cities of the Gershonites according to their families '
  - type: text
    content: were
  - type: text
    content: ' thirteen cities with their common-lands.'
