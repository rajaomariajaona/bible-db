    content: 'So the children of Israel gave to the Levites from their inheritance, at the commandment of the '
  - type: heading
    content: Lord
  - type: text
    content: ', these cities and their common-lands:'
  '30':
  - type: text
    content: 'and from the tribe of Asher, Mishal with its common-land, Abdon with its common-land, '
  '31':
  - type: text
    content: 'Helkath with its common-land, and Rehob with its common-land: four cities; '
  '32':
  - type: text
