  - type: heading
    content: The Promise Fulfilled
  '43':
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' gave to Israel '
  - type: note
    content: Gen. 12:7; 26:3, 4; 28:4, 13, 14
  - type: text
    content: 'all the land of which He had sworn to give to their fathers, and they '
  - type: note
    content: Num. 33:53; Josh. 1:11
  - type: text
    content: 'took possession of it and dwelt in it. '
  '44':
  - type: note
    content: Deut. 7:23, 24; Josh. 11:23; 22:4
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' gave them '
  - type: note
    content: Josh. 1:13, 15; 11:23
  - type: text
    content: 'rest all around, according to all that He had sworn to their fathers. And '
  - type: note
    content: Deut. 7:24
  - type: text
    content: 'not a man of all their enemies stood against them; the '
  - type: heading
    content: Lord
  - type: text
    content: ' delivered all their enemies into their hand. '
  '45':
  - type: note
    content: (Num. 23:19); Josh. 23:14; 1 Kin. 8:56
  - type: text
    content: 'Not a word failed of any good thing which the '
  - type: heading
    content: Lord
  - type: text
    content: ' had spoken to the house of Israel. All came to pass.'
  '5':
  - type: note
    content: Josh. 21:20
  - type: text
    content: The rest of the children of Kohath had ten cities by lot from the families of the tribe of Ephraim, from the tribe of Dan, and from the half-tribe of Manasseh.
  '6':
  - type: text
    content: 'And '
  - type: note
    content: Josh. 21:27
  - type: text
    content: the children of Gershon had thirteen cities by lot from the families of the tribe of Issachar, from the tribe of Asher, from the tribe of Naphtali, and from the half-tribe of Manasseh in Bashan.
  '7':
  - type: note
    content: Josh. 21:34
  - type: text
    content: The children of Merari according to their families had twelve cities from the tribe of Reuben, from the tribe of Gad, and from the tribe of Zebulun.
  '8':
  - type: note
    content: Josh. 21:3
  - type: text
    content: 'And the children of Israel gave these cities with their common-lands by lot to the Levites, '
  - type: note
    content: Num. 35:2
  - type: text
    content: 'as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded by the hand of Moses.'
  '9':
  - type: text
    content: 'So they gave from the tribe of the children of Judah and from the tribe of the children of Simeon these cities which are designated by name, '
