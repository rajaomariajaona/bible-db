document_id: JOS.21,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cities of the Levites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses
    - type: text
      text: ' of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:1–8
      marker-yv: yv-n
    - type: text
      text: 'Levites came near to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 34:16–29; Josh. 14:1; 17:4
      marker-yv: yv-n
    - type: text
      text: 'Eleazar the priest, to Joshua the son of Nun, and to the heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses
    - type: text
      text: ' of the tribes of the children of Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'which were for the children of Aaron, one of the families of the Kohathites, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' of the children of Levi; for the lot was theirs first. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 20:7; 1 Chr. 6:55
      marker-yv: yv-n
    - type: text
      text: And they gave them Kirjath Arba (
    - type: usfm
      marker: it
      children:
      - type: text
        text: Arba
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the father of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 14:15; 15:13, 14
      marker-yv: yv-n
    - type: text
      text: 'Anak), '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 20:7; Luke 1:39
      marker-yv: yv-n
    - type: text
      text: 'which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Hebron, in the mountains of Judah, with the common-land surrounding it. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 14:14; 1 Chr. 6:56
      marker-yv: yv-n
    - type: text
      text: the fields of the city and its villages they gave to Caleb the son of Jephunneh as his possession.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Thus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 6:57
      marker-yv: yv-n
    - type: text
      text: 'to the children of Aaron the priest they gave '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:54; 20:2, 7
      marker-yv: yv-n
    - type: text
      text: 'Hebron with its common-land (a city of refuge for the slayer), '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:42; 2 Kin. 8:22
      marker-yv: yv-n
    - type: text
      text: 'Libnah with its common-land, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:48
      marker-yv: yv-n
    - type: text
      text: 'Jattir with its common-land, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:50
      marker-yv: yv-n
    - type: text
      text: 'Eshtemoa with its common-land, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 6:58
      marker-yv: yv-n
    - type: text
      text: 'Holon with its common-land, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:49
      marker-yv: yv-n
    - type: text
      text: 'Debir with its common-land, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 6:59
      marker-yv: yv-n
    - type: text
      text: 'Ain with its common-land, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:55
      marker-yv: yv-n
    - type: text
      text: 'Juttah with its common-land, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:10
      marker-yv: yv-n
    - type: text
      text: 'Beth Shemesh with its common-land: nine cities from those two tribes; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'and from the tribe of Benjamin, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:25
      marker-yv: yv-n
    - type: text
      text: 'Gibeon with its common-land, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:24
      marker-yv: yv-n
    - type: text
      text: 'Geba with its common-land, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Anathoth with its common-land, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 6:60
      marker-yv: yv-n
    - type: text
      text: 'Almon with its common-land: four cities. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'All the cities of the children of Aaron, the priests, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' thirteen cities with their common-lands.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And they spoke to them at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:1
      marker-yv: yv-n
    - type: text
      text: 'Shiloh in the land of Canaan, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:2
      marker-yv: yv-n
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded through Moses to give us cities to dwell in, with their common-lands for our livestock.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 6:66
      marker-yv: yv-n
    - type: text
      text: 'And the families of the children of Kohath, the Levites, the rest of the children of Kohath, even they had the cities of their lot from the tribe of Ephraim. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For they gave them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 20:7
      marker-yv: yv-n
    - type: text
      text: 'Shechem with its common-land in the mountains of Ephraim (a city of refuge for the slayer), '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:29
      marker-yv: yv-n
    - type: text
      text: 'Gezer with its common-land, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Kibzaim with its common-land, and Beth Horon with its common-land: four cities; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'and from the tribe of Dan, Eltekeh with its common-land, Gibbethon with its common-land, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 10:12
      marker-yv: yv-n
    - type: text
      text: 'Aijalon with its common-land, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Gath Rimmon with its common-land: four cities; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'and from the half-tribe of Manasseh, Tanach with its common-land and Gath Rimmon with its common-land: two cities. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: All the ten cities with their common-lands were for the rest of the families of the children of Kohath.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 21:6; 1 Chr. 6:71
      marker-yv: yv-n
    - type: text
      text: 'Also to the children of Gershon, of the families of the Levites, from the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' half-tribe of Manasseh, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gave
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 20:8
      marker-yv: yv-n
    - type: text
      text: 'Golan in Bashan with its common-land (a city of refuge for the slayer), and Be Eshterah with its common-land: two cities; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'and from the tribe of Issachar, Kishion with its common-land, Daberath with its common-land, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jarmuth with its common-land, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' En Gannim with its common-land: four cities; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So the children of Israel gave to the Levites from their inheritance, at the commandment of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', these cities and their common-lands:'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'and from the tribe of Asher, Mishal with its common-land, Abdon with its common-land, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Helkath with its common-land, and Rehob with its common-land: four cities; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'and from the tribe of Naphtali, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 20:7
      marker-yv: yv-n
    - type: text
      text: 'Kedesh in Galilee with its common-land (a city of refuge for the slayer), Hammoth Dor with its common-land, and Kartan with its common-land: three cities. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'All the cities of the Gershonites according to their families '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' thirteen cities with their common-lands.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 21:7; 1 Chr. 6:77–81
      marker-yv: yv-n
    - type: text
      text: 'And to the families of the children of Merari, the rest of the Levites, from the tribe of Zebulun, Jokneam with its common-land, Kartah with its common-land, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Dimnah with its common-land, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Nahalal with its common-land: four cities; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'and from the tribe of Reuben, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:43; Josh. 20:8
      marker-yv: yv-n
    - type: text
      text: 'Bezer with its common-land, Jahaz with its common-land, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Kedemoth with its common-land, and Mephaath with its common-land: four cities; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'and from the tribe of Gad, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 20:8
      marker-yv: yv-n
    - type: text
      text: 'Ramoth in Gilead with its common-land (a city of refuge for the slayer), Mahanaim with its common-land, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Heshbon with its common-land, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Jazer with its common-land: four cities in all. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now the lot came out for the families of the Kohathites. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 21:8, 19
      marker-yv: yv-n
    - type: text
      text: 'the children of Aaron the priest, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' of the Levites, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:51
      marker-yv: yv-n
    - type: text
      text: 'had thirteen cities by lot from the tribe of Judah, from the tribe of Simeon, and from the tribe of Benjamin. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'So all the cities for the children of Merari according to their families, the rest of the families of the Levites, were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by
    - type: text
      text: ' their lot twelve cities.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:7
      marker-yv: yv-n
    - type: text
      text: 'All the cities of the Levites within the possession of the children of Israel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' forty-eight cities with their common-lands. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Every one of these cities had its common-land surrounding it; thus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' all these cities.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Promise Fulfilled
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'So the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave to Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:7; 26:3, 4; 28:4, 13, 14
      marker-yv: yv-n
    - type: text
      text: 'all the land of which He had sworn to give to their fathers, and they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 33:53; Josh. 1:11
      marker-yv: yv-n
    - type: text
      text: 'took possession of it and dwelt in it. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:23, 24; Josh. 11:23; 22:4
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 1:13, 15; 11:23
      marker-yv: yv-n
    - type: text
      text: 'rest all around, according to all that He had sworn to their fathers. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:24
      marker-yv: yv-n
    - type: text
      text: 'not a man of all their enemies stood against them; the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' delivered all their enemies into their hand. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Num. 23:19); Josh. 23:14; 1 Kin. 8:56
      marker-yv: yv-n
    - type: text
      text: 'Not a word failed of any good thing which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had spoken to the house of Israel. All came to pass.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 21:20
      marker-yv: yv-n
    - type: text
      text: The rest of the children of Kohath had ten cities by lot from the families of the tribe of Ephraim, from the tribe of Dan, and from the half-tribe of Manasseh.
