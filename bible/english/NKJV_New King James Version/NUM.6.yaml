  - type: text
    content: be gracious to you;
  '26':
  - type: note
    content: Ps. 4:6; 89:15
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' lift up His countenance upon you,'
  - type: text
    content: 'And '
  - type: note
    content: Lev. 26:6; Is. 26:3, 12; John 14:27; Phil. 4:7
  - type: text
    content: give you peace.” ’
  '27':
  - type: note
    content: Deut. 28:10; 2 Sam. 7:23; 2 Chr. 7:14; Is. 43:7; Dan. 9:18, 19
  - type: text
    content: '“So they shall put My name on the children of Israel, and '
  - type: note
    content: Ex. 20:24; Num. 23:20; Ps. 5:12; 67:7; 115:12, 13; Eph. 1:3
  - type: text
    content: I will bless them.”
  '3':
  - type: note
    content: Lev. 10:9; Amos 2:12; Luke 1:15
  - type: text
    content: 'he shall separate himself from wine and '
  - type: text
    content: similar
  - type: text
    content: ' drink; he shall drink neither vinegar made from wine nor vinegar made from '
  - type: text
    content: similar
  - type: text
    content: ' drink; neither shall he drink any grape juice, nor eat fresh grapes or raisins. '
  '4':
  - type: text
    content: All the days of his separation he shall eat nothing that is produced by the grapevine, from seed to skin.
  '5':
  - type: text
    content: '‘All the days of the vow of his separation no '
  - type: note
    content: Judg. 13:5; 16:17; 1 Sam. 1:11
  - type: text
    content: 'razor shall come upon his head; until the days are fulfilled for which he separated himself to the '
  - type: heading
    content: Lord
  - type: text
    content: ', he shall be holy. '
  - type: text
    content: Then
  - type: text
    content: ' he shall let the locks of the hair of his head grow. '
  '6':
  - type: text
    content: 'All the days that he separates himself to the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Lev. 21:1–3, 11; Num. 19:11–22
  - type: text
    content: 'he shall not go near a dead body. '
  '7':
  - type: note
    content: Lev. 21:1, 2, 11; Num. 9:6
  - type: text
    content: 'He shall not make himself unclean even for his father or his mother, for his brother or his sister, when they die, because his separation to God '
  - type: text
    content: is
  - type: text
    content: ' on his head. '
  '8':
  - type: note
    content: (2 Cor. 6:17, 18)
  - type: text
    content: 'All the days of his separation he shall be holy to the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: '‘And if anyone dies very suddenly beside him, and he defiles his consecrated head, then he shall '
  - type: note
    content: Lev. 14:8, 9; Acts 18:18; 21:24
  - type: text
    content: 'shave his head on the day of his cleansing; on the seventh day he shall shave it. '
