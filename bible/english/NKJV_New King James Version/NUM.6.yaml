  - type: text
    content: 'they '
  - type: text
    content: are
  - type: text
    content: ' holy for the priest, together with the breast of the wave offering and the thigh of the heave offering. After that the Nazirite may drink wine.’'
  '21':
  - type: text
    content: '“This is the law of the Nazirite who vows to the '
  - type: heading
    content: Lord
  - type: text
    content: ' the offering for his separation, and besides that, whatever else his hand is able to provide; according to the vow which he takes, so he must do according to the law of his separation.”'
  - type: heading
    content: The Priestly Blessing
  '22':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '23':
  - type: text
    content: '“Speak to Aaron and his sons, saying, ‘This is the way you shall bless the children of Israel. Say to them:'
  '24':
  - type: text
    content: '“The '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Deut. 28:3–6
  - type: text
    content: 'bless you and '
  - type: note
    content: Ps. 121:7; John 7:11
  - type: text
    content: keep you;
  '25':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 31:16; 67:1; 80:3, 7, 19; 119:135; Dan. 9:17
  - type: text
    content: make His face shine upon you,
  - type: text
    content: 'And '
  - type: note
