verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Law of the Nazirite
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:7; 14:22; 15:14, 29
      marker-yv: yv-n
    - type: text
      text: 'on the eighth day he shall bring two turtledoves or two young pigeons to the priest, to the door of the tabernacle of meeting; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and the priest shall offer one as a sin offering and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' other as a burnt offering, and make atonement for him, because he sinned in regard to the corpse; and he shall sanctify his head that same day. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'He shall consecrate to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the days of his separation, and bring a male lamb in its first year '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:6
      marker-yv: yv-n
    - type: text
      text: as a trespass offering; but the former days shall be lost, because his separation was defiled.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '‘Now this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the law of the Nazirite: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 21:26
      marker-yv: yv-n
    - type: text
      text: 'When the days of his separation are fulfilled, he shall be brought to the door of the tabernacle of meeting. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And he shall present his offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': one male lamb in its first year without blemish as a burnt offering, one ewe lamb in its first year without blemish '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:2, 27, 32
      marker-yv: yv-n
    - type: text
      text: 'as a sin offering, one ram without blemish '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:6
      marker-yv: yv-n
    - type: text
      text: 'as a peace offering, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'a basket of unleavened bread, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:4
      marker-yv: yv-n
    - type: text
      text: 'cakes of fine flour mixed with oil, unleavened wafers '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:2
      marker-yv: yv-n
    - type: text
      text: 'anointed with oil, and their grain offering with their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 15:5, 7, 10
      marker-yv: yv-n
    - type: text
      text: drink offerings.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then the priest shall bring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and offer his sin offering and his burnt offering; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'and he shall offer the ram as a sacrifice of a peace offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', with the basket of unleavened bread; the priest shall also offer its grain offering and its drink offering. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 6:9; Acts 21:23, 24
      marker-yv: yv-n
    - type: text
      text: 'Then the Nazirite shall shave his consecrated head '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at
    - type: text
      text: ' the door of the tabernacle of meeting, and shall take the hair from his consecrated head and put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' on the fire which is under the sacrifice of the peace offering.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '‘And the priest shall take the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 2:15
      marker-yv: yv-n
    - type: text
      text: 'boiled shoulder of the ram, one '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:23, 24
      marker-yv: yv-n
    - type: text
      text: 'unleavened cake from the basket, and one unleavened wafer, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:30
      marker-yv: yv-n
    - type: text
      text: 'put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' upon the hands of the Nazirite after he has shaved his consecrated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hair,
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Speak to the children of Israel, and say to them: ‘When either a man or woman consecrates an offering to take the vow of a Nazirite, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 27:2; Judg. 13:5; (Lam. 4:7; Amos 2:11, 12); Acts 21:23; Rom. 1:1
      marker-yv: yv-n
    - type: text
      text: 'to separate himself to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and the priest shall wave them as a wave offering before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:27, 28
      marker-yv: yv-n
    - type: text
      text: 'they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' holy for the priest, together with the breast of the wave offering and the thigh of the heave offering. After that the Nazirite may drink wine.’'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“This is the law of the Nazirite who vows to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the offering for his separation, and besides that, whatever else his hand is able to provide; according to the vow which he takes, so he must do according to the law of his separation.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Priestly Blessing
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“Speak to Aaron and his sons, saying, ‘This is the way you shall bless the children of Israel. Say to them:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:3–6
      marker-yv: yv-n
    - type: text
      text: 'bless you and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 121:7; John 7:11
      marker-yv: yv-n
    - type: text
      text: keep you;
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 31:16; 67:1; 80:3, 7, 19; 119:135; Dan. 9:17
      marker-yv: yv-n
    - type: text
      text: make His face shine upon you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 43:29; Ex. 33:19; Mal. 1:9
      marker-yv: yv-n
    - type: text
      text: be gracious to you;
  '26':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 4:6; 89:15
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lift up His countenance upon you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:6; Is. 26:3, 12; John 14:27; Phil. 4:7
      marker-yv: yv-n
    - type: text
      text: give you peace.” ’
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:10; 2 Sam. 7:23; 2 Chr. 7:14; Is. 43:7; Dan. 9:18, 19
      marker-yv: yv-n
    - type: text
      text: '“So they shall put My name on the children of Israel, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:24; Num. 23:20; Ps. 5:12; 67:7; 115:12, 13; Eph. 1:3
      marker-yv: yv-n
    - type: text
      text: I will bless them.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 10:9; Amos 2:12; Luke 1:15
      marker-yv: yv-n
    - type: text
      text: 'he shall separate himself from wine and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: similar
    - type: text
      text: ' drink; he shall drink neither vinegar made from wine nor vinegar made from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: similar
    - type: text
      text: ' drink; neither shall he drink any grape juice, nor eat fresh grapes or raisins. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: All the days of his separation he shall eat nothing that is produced by the grapevine, from seed to skin.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '‘All the days of the vow of his separation no '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 13:5; 16:17; 1 Sam. 1:11
      marker-yv: yv-n
    - type: text
      text: 'razor shall come upon his head; until the days are fulfilled for which he separated himself to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', he shall be holy. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Then
    - type: text
      text: ' he shall let the locks of the hair of his head grow. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'All the days that he separates himself to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 21:1–3, 11; Num. 19:11–22
      marker-yv: yv-n
    - type: text
      text: 'he shall not go near a dead body. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 21:1, 2, 11; Num. 9:6
      marker-yv: yv-n
    - type: text
      text: 'He shall not make himself unclean even for his father or his mother, for his brother or his sister, when they die, because his separation to God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' on his head. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 6:17, 18)
      marker-yv: yv-n
    - type: text
      text: 'All the days of his separation he shall be holy to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '‘And if anyone dies very suddenly beside him, and he defiles his consecrated head, then he shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:8, 9; Acts 18:18; 21:24
      marker-yv: yv-n
    - type: text
      text: 'shave his head on the day of his cleansing; on the seventh day he shall shave it. '
