  - type: text
    content: ' '
  '2':
  - type: text
    content: '“Speak to the children of Israel, and say to them: ‘When either a man or woman consecrates an offering to take the vow of a Nazirite, '
  - type: note
    content: Lev. 27:2; Judg. 13:5; (Lam. 4:7; Amos 2:11, 12); Acts 21:23; Rom. 1:1
  - type: text
    content: 'to separate himself to the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  '20':
  - type: text
    content: 'and the priest shall wave them as a wave offering before the '
  - type: heading
    content: Lord
  - type: text
    content: '; '
  - type: note
