    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'So it was at the time of the going down of the sun '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' Joshua commanded, and they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 21:22, 23; Josh. 8:29
    marker-yv: yv-n
  - type: text
