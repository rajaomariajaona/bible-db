document_id: JOS.10,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sun Stands Still
  - type: text
    content: 'Now it came to pass when Adoni-Zedek king of Jerusalem '
  - type: note
    content: Josh. 9:1
  - type: text
    content: 'heard how Joshua had taken '
  - type: note
    content: Josh. 8:1
  - type: text
    content: Ai and had utterly destroyed it—
  - type: note
    content: Josh. 6:21
  - type: text
    content: 'as he had done to Jericho and its king, so he had done to '
  - type: note
    content: Josh. 8:22, 26, 28
  - type: text
    content: 'Ai and its king—and '
  - type: note
    content: Josh. 9:15
  - type: text
    content: 'how the inhabitants of Gibeon had made peace with Israel and were among them, '
  '10':
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Judg. 4:15; 1 Sam. 7:10, 12; Is. 28:21
  - type: text
    content: 'routed them before Israel, killed them with a great slaughter at Gibeon, chased them along the road that goes '
  - type: note
    content: Josh. 16:3, 5
  - type: text
    content: 'to Beth Horon, and struck them down as far as '
  - type: note
    content: Josh. 15:35
  - type: text
    content: 'Azekah and Makkedah. '
  '11':
  - type: text
    content: 'And it happened, as they fled before Israel '
  - type: text
    content: and
  - type: text
    content: ' were on the descent of Beth Horon, '
  - type: note
    content: Is. 30:30; Rev. 16:21
  - type: text
    content: 'that the '
  - type: heading
    content: Lord
  - type: text
    content: ' cast down large hailstones from heaven on them as far as Azekah, and they died. '
  - type: text
    content: There
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' more who died from the hailstones than the children of Israel killed with the sword.'
  '12':
  - type: text
    content: 'Then Joshua spoke to the '
  - type: heading
    content: Lord
  - type: text
    content: ' in the day when the '
  - type: heading
    content: Lord
  - type: text
    content: ' delivered up the Amorites before the children of Israel, and he said in the sight of Israel:'
  - type: note
    content: Is. 28:21; Hab. 3:11
  - type: text
    content: “Sun, stand still over Gibeon;
  - type: text
    content: 'And Moon, in the Valley of '
  - type: note
    content: Judg. 12:12
  - type: text
    content: Aijalon.”
  '13':
  - type: text
    content: So the sun stood still,
  - type: text
    content: And the moon stopped,
  - type: text
    content: Till the people had revenge
  - type: text
    content: Upon their enemies.
  - type: note
    content: 2 Sam. 1:18
  - type: text
    content: Is
  - type: text
    content: ' this not written in the Book of Jasher? So the sun stood still in the midst of heaven, and did not hasten to go '
  - type: text
    content: down
  - type: text
    content: ' for about a whole day. '
  '14':
  - type: text
    content: 'And there has been '
  - type: note
    content: Is. 38:7, 8
  - type: text
    content: 'no day like that, before it or after it, that the '
  - type: heading
    content: Lord
  - type: text
    content: ' heeded the voice of a man; for '
  - type: note
    content: Ex. 14:14; Deut. 1:30; 20:4; Josh. 10:42; 23:3
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' fought for Israel.'
  '15':
  - type: note
    content: Josh. 10:43
  - type: text
    content: Then Joshua returned, and all Israel with him, to the camp at Gilgal.
  - type: heading
    content: The Amorite Kings Executed
  '16':
  - type: text
    content: 'But these five kings had fled and hidden themselves in a cave at Makkedah. '
  '17':
  - type: text
    content: And it was told Joshua, saying, “The five kings have been found hidden in the cave at Makkedah.”
  '18':
  - type: text
    content: 'So Joshua said, “Roll large stones against the mouth of the cave, and set men by it to guard them. '
  '19':
  - type: text
    content: 'And do not stay '
  - type: text
    content: there
  - type: text
    content: ' yourselves, '
  - type: text
    content: but
  - type: text
    content: ' pursue your enemies, and attack their rear '
  - type: text
    content: guard.
  - type: text
    content: ' Do not allow them to enter their cities, for the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has delivered them into your hand.” '
  '2':
  - type: text
    content: 'that they '
  - type: note
    content: Ex. 15:14–16; Deut. 11:25; 1 Chr. 14:17
  - type: text
    content: 'feared greatly, because Gibeon '
  - type: text
    content: was
  - type: text
    content: ' a great city, like one of the royal cities, and because it '
  - type: text
    content: was
  - type: text
    content: ' greater than Ai, and all its men '
  - type: text
    content: were
  - type: text
    content: ' mighty. '
  '20':
  - type: text
    content: 'Then it happened, while Joshua and the children of Israel made an end of slaying them with a very great slaughter, till they had finished, that those who escaped entered fortified cities. '
  '21':
  - type: text
    content: And all the people returned to the camp, to Joshua at Makkedah, in peace.
  - type: note
    content: Ex. 11:7
  - type: text
    content: No one moved his tongue against any of the children of Israel.
  '22':
  - type: text
    content: 'Then Joshua said, “Open the mouth of the cave, and bring out those five kings to me from the cave.” '
  '23':
  - type: text
    content: 'And they did so, and brought out those five kings to him from the cave: the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, '
  - type: text
    content: and
  - type: text
    content: ' the king of Eglon.'
  '24':
  - type: text
    content: 'So it was, when they brought out those kings to Joshua, that Joshua called for all the men of Israel, and said to the captains of the men of war who went with him, “Come near, put your feet on the necks of these kings.” And they drew near and '
  - type: note
    content: Ps. 107:40; Is. 26:5, 6; Mal. 4:3
  - type: text
    content: 'put their feet on their necks. '
  '25':
  - type: text
    content: 'Then Joshua said to them, '
  - type: note
    content: Deut. 31:6–8; Josh. 1:9
  - type: text
    content: '“Do not be afraid, nor be dismayed; be strong and of good courage, for '
  - type: note
    content: Deut. 3:21; 7:19
  - type: text
    content: 'thus the '
  - type: heading
    content: Lord
  - type: text
    content: ' will do to all your enemies against whom you fight.” '
  '26':
  - type: text
    content: 'And afterward Joshua struck them and killed them, and hanged them on five trees; and they '
  - type: note
    content: Josh. 8:29; 2 Sam. 21:9
  - type: text
    content: 'were hanging on the trees until evening. '
  '27':
  - type: text
    content: 'So it was at the time of the going down of the sun '
  - type: text
    content: that
  - type: text
    content: ' Joshua commanded, and they '
  - type: note
    content: Deut. 21:22, 23; Josh. 8:29
  - type: text
    content: 'took them down from the trees, cast them into the cave where they had been hidden, and laid large stones against the cave’s mouth, '
  - type: text
    content: which
  - type: text
    content: ' '
  - type: text
    content: remain
  - type: text
    content: ' until this very day.'
  - type: heading
    content: Conquest of the Southland
  '28':
  - type: text
    content: 'On that day Joshua took Makkedah, and struck it and its king with the edge of the sword. He utterly '
  - type: note
    content: Deut. 7:2, 16
  - type: text
    content: 'destroyed them—all the people who '
  - type: text
    content: were
  - type: text
    content: ' in it. He let none remain. He also did to the king of Makkedah '
  - type: note
    content: Josh. 6:21
  - type: text
    content: as he had done to the king of Jericho.
  '29':
  - type: text
    content: 'Then Joshua passed from Makkedah, and all Israel with him, to '
  - type: note
    content: Josh. 15:42; 21:13; 2 Kin. 8:22; 19:8
  - type: text
    content: 'Libnah; and they fought against Libnah. '
  '3':
  - type: text
    content: 'Therefore Adoni-Zedek king of Jerusalem sent to Hoham king of Hebron, Piram king of Jarmuth, Japhia king of Lachish, and Debir king of Eglon, saying, '
  '30':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' also delivered it and its king into the hand of Israel; he struck it and all the people who '
  - type: text
    content: were
  - type: text
    content: ' in it with the edge of the sword. He let none remain in it, but did to its king as he had done to the king of Jericho.'
  '31':
  - type: text
    content: 'Then Joshua passed from Libnah, and all Israel with him, to Lachish; and they encamped against it and fought against it. '
  '32':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' delivered Lachish into the hand of Israel, who took it on the second day, and struck it and all the people who '
  - type: text
    content: were
  - type: text
    content: ' in it with the edge of the sword, according to all that he had done to Libnah. '
  '33':
  - type: text
    content: Then Horam king of Gezer came up to help Lachish; and Joshua struck him and his people, until he left him none remaining.
  '34':
  - type: text
    content: 'From Lachish Joshua passed to Eglon, and all Israel with him; and they encamped against it and fought against it. '
  '35':
  - type: text
    content: 'They took it on that day and struck it with the edge of the sword; all the people who '
  - type: text
    content: were
  - type: text
    content: ' in it he utterly destroyed that day, according to all that he had done to Lachish.'
  '36':
  - type: text
    content: 'So Joshua went up from Eglon, and all Israel with him, to '
  - type: note
    content: Num. 13:22; Josh. 14:13–15; 15:13; Judg. 1:10, 20; 2 Sam. 5:1, 3, 5, 13; 2 Chr. 11:10
  - type: text
    content: 'Hebron; and they fought against it. '
  '37':
  - type: text
    content: 'And they took it and struck it with the edge of the sword—its king, all its cities, and all the people who '
  - type: text
    content: were
  - type: text
    content: ' in it; he left none remaining, according to all that he had done to Eglon, but utterly destroyed it and all the people who '
  - type: text
    content: were
  - type: text
    content: ' in it.'
  '38':
  - type: text
    content: 'Then Joshua returned, and all Israel with him, to '
  - type: note
    content: Josh. 15:15; Judg. 1:11; 1 Chr. 6:58
  - type: text
    content: 'Debir; and they fought against it. '
  '39':
  - type: text
    content: 'And he took it and its king and all its cities; they struck them with the edge of the sword and utterly destroyed all the people who '
  - type: text
    content: were
  - type: text
    content: ' in it. He left none remaining; as he had done to Hebron, so he did to Debir and its king, as he had done also to Libnah and its king.'
  '4':
  - type: text
    content: '“Come up to me and help me, that we may attack Gibeon, for '
  - type: note
    content: Josh. 9:15; 10:1
  - type: text
    content: 'it has made peace with Joshua and with the children of Israel.” '
  '40':
  - type: text
    content: 'So Joshua conquered all the land: the '
  - type: note
    content: Deut. 1:7
  - type: text
    content: 'mountain country and the South and the lowland and the wilderness slopes, and '
  - type: note
    content: Deut. 7:24
  - type: text
    content: 'all their kings; he left none remaining, but '
  - type: note
    content: Deut. 20:16, 17
  - type: text
    content: 'utterly destroyed all that breathed, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel had commanded. '
  '41':
  - type: text
    content: 'And Joshua conquered them from '
  - type: note
    content: Num. 13:26; Deut. 9:23
  - type: text
    content: 'Kadesh Barnea as far as '
  - type: note
    content: Gen. 10:19; Josh. 11:22
  - type: text
    content: 'Gaza, '
  - type: note
    content: Josh. 11:16; 15:51
  - type: text
    content: 'and all the country of Goshen, even as far as Gibeon. '
  '42':
  - type: text
    content: 'All these kings and their land Joshua took at one time, '
  - type: note
    content: Josh. 10:14
  - type: text
    content: 'because the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel fought for Israel. '
  '43':
  - type: text
    content: Then Joshua returned, and all Israel with him, to the camp at Gilgal.
  '5':
  - type: text
    content: 'Therefore the five kings of the '
  - type: note
    content: Num. 13:29
  - type: text
    content: 'Amorites, the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, '
  - type: text
    content: and
  - type: text
    content: ' the king of Eglon, '
  - type: note
    content: Josh. 9:2
  - type: text
    content: gathered together and went up, they and all their armies, and camped before Gibeon and made war against it.
  '6':
  - type: text
    content: 'And the men of Gibeon sent to Joshua at the camp '
  - type: note
    content: Josh. 5:10; 9:6
  - type: text
    content: at Gilgal, saying, “Do not forsake your servants; come up to us quickly, save us and help us, for all the kings of the Amorites who dwell in the mountains have gathered together against us.”
  '7':
  - type: text
    content: 'So Joshua ascended from Gilgal, he and '
  - type: note
    content: Josh. 8:1
  - type: text
    content: 'all the people of war with him, and all the mighty men of valor. '
  '8':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Joshua, '
  - type: note
    content: Josh. 11:6; Judg. 4:14
  - type: text
    content: '“Do not fear them, for I have delivered them into your hand; '
  - type: note
    content: Josh. 1:5, 9
  - type: text
    content: 'not a man of them shall '
  - type: note
    content: Josh. 21:44
  - type: text
    content: 'stand before you.” '
  '9':
  - type: text
    content: 'Joshua therefore came upon them suddenly, having marched all night from Gilgal. '
