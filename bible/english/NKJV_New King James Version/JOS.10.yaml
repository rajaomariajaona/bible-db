  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Joshua said to them, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 31:6–8; Josh. 1:9
    marker-yv: yv-n
  - type: text
    text: '“Do not be afraid, nor be dismayed; be strong and of good courage, for '
