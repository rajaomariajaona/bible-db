verses:
  '1':
  - type: heading
    content: 'Eliphaz: Job Is Chastened by God'
  - type: text
    content: “Call out now;
  - type: text
    content: Is there anyone who will answer you?
  - type: text
    content: And to which of the holy ones will you turn?
  '10':
  - type: note
    content: (Job 36:27–29; 37:6–11; 38:26)
  - type: text
    content: He gives rain on the earth,
  - type: text
    content: And sends waters on the fields.
  '11':
  - type: note
    content: Ps. 113:7
  - type: text
    content: He sets on high those who are lowly,
  - type: text
    content: And those who mourn are lifted to safety.
  '12':
  - type: note
    content: Neh. 4:15
  - type: text
    content: He frustrates the devices of the crafty,
  - type: text
    content: So that their hands cannot carry out their plans.
  '13':
  - type: text
    content: 'He catches the '
  - type: note
    content: (Job 37:24; 1 Cor. 3:19)
  - type: text
    content: wise in their own craftiness,
  - type: text
    content: And the counsel of the cunning comes quickly upon them.
  '14':
  - type: text
    content: They meet with darkness in the daytime,
  - type: text
    content: And grope at noontime as in the night.
  '15':
  - type: text
    content: 'But '
  - type: note
    content: Job 4:10, 11; Ps. 35:10
  - type: text
    content: He saves the needy from the sword,
  - type: text
    content: From the mouth of the mighty,
  - type: text
    content: And from their hand.
  '16':
  - type: note
    content: 1 Sam. 2:8; Ps. 107:41, 42
  - type: text
    content: So the poor have hope,
  - type: text
    content: And injustice shuts her mouth.
  '17':
  - type: text
    content: “Behold,
  - type: note
    content: Ps. 94:12; (Prov. 3:11, 12; Heb. 12:5, 6; Rev. 3:19)
  - type: text
    content: ' happy '
  - type: text
    content: is
  - type: text
    content: ' the man whom God corrects;'
  - type: text
    content: Therefore do not despise the chastening of the Almighty.
  '18':
  - type: note
    content: (Deut. 32:39; 1 Sam. 2:6, 7); Is. 30:26; Hos. 6:1
  - type: text
    content: For He bruises, but He binds up;
  - type: text
    content: He wounds, but His hands make whole.
  '19':
  - type: note
    content: Ps. 34:19; 91:3; (1 Cor. 10:13)
  - type: text
    content: He shall deliver you in six troubles,
  - type: text
    content: 'Yes, in seven '
  - type: note
    content: Ps. 91:10; (Prov. 24:16)
  - type: text
    content: no evil shall touch you.
  '2':
  - type: text
    content: For wrath kills a foolish man,
  - type: text
    content: And envy slays a simple one.
  '20':
  - type: note
    content: Ps. 33:19, 20; 37:19
  - type: text
    content: In famine He shall redeem you from death,
  - type: text
    content: And in war from the power of the sword.
  '21':
  - type: note
    content: Job 5:15; Ps. 31:20
  - type: text
    content: You shall be hidden from the scourge of the tongue,
  - type: text
    content: And you shall not be afraid of destruction when it comes.
  '22':
  - type: text
    content: You shall laugh at destruction and famine,
  - type: text
    content: 'And '
  - type: note
    content: Ps. 91:13; Is. 11:9; 35:9; 65:25; Ezek. 34:25
  - type: text
    content: 'you shall not be afraid of the '
  - type: note
    content: Hos. 2:18
  - type: text
    content: beasts of the earth.
  '23':
  - type: note
    content: Ps. 91:12
  - type: text
    content: For you shall have a covenant with the stones of the field,
  - type: text
    content: And the beasts of the field shall be at peace with you.
  '24':
  - type: text
    content: 'You shall know that your tent '
  - type: text
    content: is
  - type: text
    content: ' in peace;'
  - type: text
    content: You shall visit your dwelling and find nothing amiss.
  '25':
  - type: text
    content: 'You shall also know that '
  - type: note
    content: Ps. 112:2
  - type: text
    content: 'your descendants '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' many,'
  - type: text
    content: 'And your offspring '
  - type: note
    content: Ps. 72:16
  - type: text
    content: like the grass of the earth.
  '26':
  - type: note
    content: (Prov. 9:11; 10:27)
  - type: text
    content: You shall come to the grave at a full age,
  - type: text
    content: As a sheaf of grain ripens in its season.
  '27':
  - type: text
    content: 'Behold, this we have '
  - type: note
    content: Ps. 111:2
  - type: text
    content: searched out;
  - type: text
    content: 'It '
  - type: text
    content: is
  - type: text
    content: ' true.'
  - type: text
    content: Hear it, and know for yourself.”
  '3':
  - type: note
    content: (Ps. 37:35, 36); Jer. 12:1–3
  - type: text
    content: I have seen the foolish taking root,
  - type: text
    content: But suddenly I cursed his dwelling place.
  '4':
  - type: text
    content: 'His sons are '
  - type: note
    content: Ps. 119:155
  - type: text
    content: far from safety,
  - type: text
    content: They are crushed in the gate,
  - type: text
    content: 'And '
  - type: note
    content: Ps. 109:12
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' no deliverer.'
  '5':
  - type: text
    content: Because the hungry eat up his harvest,
  - type: text
    content: Taking it even from the thorns,
  - type: text
    content: And a snare snatches their substance.
  '6':
  - type: text
    content: For affliction does not come from the dust,
  - type: text
    content: Nor does trouble spring from the ground;
  '7':
  - type: text
    content: 'Yet man is '
  - type: note
    content: Job 14:1
  - type: text
    content: born to trouble,
  - type: text
    content: As the sparks fly upward.
  '8':
  - type: text
    content: “But as for me, I would seek God,
  - type: text
    content: And to God I would commit my cause—
  '9':
  - type: text
    content: Who does great things, and unsearchable,
  - type: text
    content: Marvelous things without number.
