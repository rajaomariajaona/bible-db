document_id: JOB.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Eliphaz: Job Is Chastened by God'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Call out now;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is there anyone who will answer you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And to which of the holy ones will you turn?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For wrath kills a foolish man,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And envy slays a simple one.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 37:35, 36); Jer. 12:1–3
    marker-yv: yv-n
  - type: text
    text: I have seen the foolish taking root,
- type: usfm
  marker: q2
  children:
  - type: text
    text: But suddenly I cursed his dwelling place.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'His sons are '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 119:155
    marker-yv: yv-n
  - type: text
    text: far from safety,
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are crushed in the gate,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 109:12
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' no deliverer.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Because the hungry eat up his harvest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Taking it even from the thorns,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a snare snatches their substance.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For affliction does not come from the dust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor does trouble spring from the ground;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Yet man is '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 14:1
    marker-yv: yv-n
  - type: text
    text: born to trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: As the sparks fly upward.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “But as for me, I would seek God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And to God I would commit my cause—
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Who does great things, and unsearchable,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Marvelous things without number.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Job 36:27–29; 37:6–11; 38:26)
    marker-yv: yv-n
  - type: text
    text: He gives rain on the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And sends waters on the fields.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 113:7
    marker-yv: yv-n
  - type: text
    text: He sets on high those who are lowly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And those who mourn are lifted to safety.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 4:15
    marker-yv: yv-n
  - type: text
    text: He frustrates the devices of the crafty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: So that their hands cannot carry out their plans.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He catches the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Job 37:24; 1 Cor. 3:19)
    marker-yv: yv-n
  - type: text
    text: wise in their own craftiness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the counsel of the cunning comes quickly upon them.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They meet with darkness in the daytime,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And grope at noontime as in the night.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 4:10, 11; Ps. 35:10
    marker-yv: yv-n
  - type: text
    text: He saves the needy from the sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: From the mouth of the mighty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And from their hand.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 2:8; Ps. 107:41, 42
    marker-yv: yv-n
  - type: text
    text: So the poor have hope,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And injustice shuts her mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Behold,
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 94:12; (Prov. 3:11, 12; Heb. 12:5, 6; Rev. 3:19)
    marker-yv: yv-n
  - type: text
    text: ' happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the man whom God corrects;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore do not despise the chastening of the Almighty.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 32:39; 1 Sam. 2:6, 7); Is. 30:26; Hos. 6:1
    marker-yv: yv-n
  - type: text
    text: For He bruises, but He binds up;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He wounds, but His hands make whole.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 34:19; 91:3; (1 Cor. 10:13)
    marker-yv: yv-n
  - type: text
    text: He shall deliver you in six troubles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yes, in seven '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 91:10; (Prov. 24:16)
    marker-yv: yv-n
  - type: text
    text: no evil shall touch you.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 33:19, 20; 37:19
    marker-yv: yv-n
  - type: text
    text: In famine He shall redeem you from death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And in war from the power of the sword.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 5:15; Ps. 31:20
    marker-yv: yv-n
  - type: text
    text: You shall be hidden from the scourge of the tongue,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And you shall not be afraid of destruction when it comes.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: You shall laugh at destruction and famine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 91:13; Is. 11:9; 35:9; 65:25; Ezek. 34:25
    marker-yv: yv-n
  - type: text
    text: 'you shall not be afraid of the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Hos. 2:18
    marker-yv: yv-n
  - type: text
    text: beasts of the earth.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 91:12
    marker-yv: yv-n
  - type: text
    text: For you shall have a covenant with the stones of the field,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the beasts of the field shall be at peace with you.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'You shall know that your tent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' in peace;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You shall visit your dwelling and find nothing amiss.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'You shall also know that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 112:2
    marker-yv: yv-n
  - type: text
    text: 'your descendants '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' many,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And your offspring '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 72:16
    marker-yv: yv-n
  - type: text
    text: like the grass of the earth.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Prov. 9:11; 10:27)
    marker-yv: yv-n
  - type: text
    text: You shall come to the grave at a full age,
- type: usfm
  marker: q2
  children:
  - type: text
    text: As a sheaf of grain ripens in its season.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Behold, this we have '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 111:2
    marker-yv: yv-n
  - type: text
    text: searched out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'It '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' true.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hear it, and know for yourself.”
