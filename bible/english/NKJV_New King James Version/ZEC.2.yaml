  - type: text
    content: ' of hosts: “He sent Me after glory, to the nations which plunder you; for he who '
  - type: note
    content: Deut. 32:10; Ps. 17:8
  - type: text
    content: 'touches you touches the apple of His eye. '
  '9':
  - type: text
    content: 'For surely I will '
  - type: note
