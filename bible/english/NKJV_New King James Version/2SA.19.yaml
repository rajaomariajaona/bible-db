verses:
  '1':
  - type: text
    content: 'And Joab was told, “Behold, the king is weeping and '
  - type: note
    content: 2 Sam. 19:4
  - type: text
    content: 'mourning for Absalom.” '
  '10':
  - type: text
    content: But Absalom, whom we anointed over us, has died in battle. Now therefore, why do you say nothing about bringing back the king?”
  '11':
  - type: text
    content: 'So King David sent to '
  - type: note
    content: 2 Sam. 15:14
  - type: text
    content: 'Zadok and Abiathar the priests, saying, “Speak to the elders of Judah, saying, ‘Why are you the last to bring the king back to his house, since the words of all Israel have come to the king, to his '
  - type: text
    content: very
  - type: text
    content: ' house? '
  '12':
  - type: text
    content: 'You '
  - type: text
