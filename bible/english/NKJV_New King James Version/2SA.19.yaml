verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And Joab was told, “Behold, the king is weeping and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 19:4
      marker-yv: yv-n
    - type: text
      text: 'mourning for Absalom.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: But Absalom, whom we anointed over us, has died in battle. Now therefore, why do you say nothing about bringing back the king?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So King David sent to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:14
      marker-yv: yv-n
    - type: text
      text: 'Zadok and Abiathar the priests, saying, “Speak to the elders of Judah, saying, ‘Why are you the last to bring the king back to his house, since the words of all Israel have come to the king, to his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: very
    - type: text
      text: ' house? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' my brethren, you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:24
      marker-yv: yv-n
    - type: text
      text: 'my bone and my flesh. Why then are you the last to bring back the king?’ '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:1; 1 Chr. 11:1
      marker-yv: yv-n
    - type: text
      text: And say to Amasa, ‘
    - type: usfm
      marker: it
      children:
      - type: text
        text: Are
    - type: text
      text: ' you not my bone and my flesh? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 17:25; 1 Chr. 2:17
      marker-yv: yv-n
    - type: text
      text: 'God do so to me, and more also, if you are not commander of the army before me continually in place of Joab.’ ” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So he swayed the hearts of all the men of Judah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 1:17
      marker-yv: yv-n
    - type: text
      text: 'just as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: heart
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' one man, so that they sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to the king: “Return, you and all your servants!”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then the king returned and came to the Jordan. And Judah came to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:1
      marker-yv: yv-n
    - type: text
      text: 'Gilgal, to go to meet the king, to escort the king '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 5:9; 1 Sam. 11:14, 15
      marker-yv: yv-n
    - type: text
      text: 'across the Jordan. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 17:22
      marker-yv: yv-n
    - type: text
      text: 'Shimei the son of Gera, a Benjamite, who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' from Bahurim, hurried and came down with the men of Judah to meet King David. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: it
      children:
      - type: text
        text: There
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' a thousand men of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 16:5; 1 Kin. 2:8
      marker-yv: yv-n
    - type: text
      text: 'Benjamin with him, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 3:19; 1 Kin. 12:21
      marker-yv: yv-n
    - type: text
      text: 'Ziba the servant of the house of Saul, and his fifteen sons and his twenty servants with him; and they went over the Jordan before the king. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Then a ferryboat went across to carry over the king’s household, and to do what he thought good.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Mercy to Shimei
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Shimei the son of Gera fell down before the king when he had crossed the Jordan. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then he said to the king, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 9:2, 10; 16:1, 2
      marker-yv: yv-n
    - type: text
      text: '“Do not let my lord impute iniquity to me, or remember what '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 22:15
      marker-yv: yv-n
    - type: text
      text: 'wrong your servant did on the day that my lord the king left Jerusalem, that the king should '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 16:5, 6
      marker-yv: yv-n
    - type: text
      text: 'take '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' to heart. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So the victory that day was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: turned
    - type: text
      text: ' into '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 14:2
      marker-yv: yv-n
    - type: text
      text: 'mourning for all the people. For the people heard it said that day, “The king is grieved for his son.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For I, your servant, know that I have sinned. Therefore here I am, the first to come today of all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 13:33
      marker-yv: yv-n
    - type: text
      text: the house of Joseph to go down to meet my lord the king.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But Abishai the son of Zeruiah answered and said, “Shall not Shimei be put to death for this, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:22; 1 Kin. 11:28
      marker-yv: yv-n
    - type: text
      text: 'because he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 22:28)
      marker-yv: yv-n
    - type: text
      text: 'cursed the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anointed?”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And David said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Sam. 26:9)
      marker-yv: yv-n
    - type: text
      text: '“What have I to do with you, you sons of Zeruiah, that you should be adversaries to me today? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 3:39; 16:10
      marker-yv: yv-n
    - type: text
      text: 'Shall any man be put to death today in Israel? For do I not know that today I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' king over Israel?” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 11:13
      marker-yv: yv-n
    - type: text
      text: the king said to Shimei, “You shall not die.” And the king swore to him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David and Mephibosheth Meet
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 2:8, 9, 37, 46
      marker-yv: yv-n
    - type: text
      text: 'Mephibosheth the son of Saul came down to meet the king. And he had not cared for his feet, nor trimmed his mustache, nor washed his clothes, from the day the king departed until the day he returned in peace. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'So it was, when he had come to Jerusalem to meet the king, that the king said to him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 9:6; 21:7
      marker-yv: yv-n
    - type: text
      text: “Why did you not go with me, Mephibosheth?”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And he answered, “My lord, O king, my servant deceived me. For your servant said, ‘I will saddle a donkey for myself, that I may ride on it and go to the king,’ because your servant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' lame. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 16:17
      marker-yv: yv-n
    - type: text
      text: 'he has slandered your servant to my lord the king, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 16:3, 4
      marker-yv: yv-n
    - type: text
      text: 'but my lord the king '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' like the angel of God. Therefore do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good in your eyes. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'For all my father’s house were but dead men before my lord the king. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 14:17, 20
      marker-yv: yv-n
    - type: text
      text: Yet you set your servant among those who eat at your own table. Therefore what right have I still to cry out anymore to the king?”
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: So the king said to him, “Why do you speak anymore of your matters? I have said, ‘You and Ziba divide the land.’ ”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the people stole back '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 4:3
      marker-yv: yv-n
    - type: text
      text: 'into the city that day, as people who are ashamed steal away when they flee in battle. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Then Mephibosheth said to the king, “Rather, let him take it all, inasmuch as my lord the king has come back in peace to his own house.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Kindness to Barzillai
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 9:7–13
      marker-yv: yv-n
    - type: text
      text: 'Barzillai the Gileadite came down from Rogelim and went across the Jordan with the king, to escort him across the Jordan. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Now Barzillai was a very aged man, eighty years old. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 17:27–29; 1 Kin. 2:7
      marker-yv: yv-n
    - type: text
      text: 'he had provided the king with supplies while he stayed at Mahanaim, for he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' a very rich man. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: And the king said to Barzillai, “Come across with me, and I will provide for you while you are with me in Jerusalem.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'But Barzillai said to the king, “How long have I to live, that I should go up with the king to Jerusalem? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' today '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 17:27–29
      marker-yv: yv-n
    - type: text
      text: 'eighty years old. Can I discern between the good and bad? Can your servant taste what I eat or what I drink? Can I hear any longer the voice of singing men and singing women? Why then should your servant be a further burden to my lord the king? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Your servant will go a little way across the Jordan with the king. And why should the king repay me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' such a reward? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Please let your servant turn back again, that I may die in my own city, near the grave of my father and mother. But here is your servant '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 90:10
      marker-yv: yv-n
    - type: text
      text: Chimham; let him cross over with my lord the king, and do for him what seems good to you.”
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And the king answered, “Chimham shall cross over with me, and I will do for him what seems good to you. Now whatever you request of me, I will do for you.” '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Then all the people went over the Jordan. And when the king had crossed over, the king '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 19:40; Jer. 41:17
      marker-yv: yv-n
    - type: text
      text: kissed Barzillai and blessed him, and he returned to his own place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Quarrel About the King
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But the king '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 17:24, 27; 19:32
      marker-yv: yv-n
    - type: text
      text: 'covered his face, and the king cried out with a loud voice, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:30
      marker-yv: yv-n
    - type: text
      text: “O my son Absalom! O Absalom, my son, my son!”
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Now the king went on to Gilgal, and Chimham went on with him. And all the people of Judah escorted the king, and also half the people of Israel. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Just then all the men of Israel came to the king, and said to the king, “Why have our brethren, the men of Judah, stolen you away and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 31:55; Ruth 1:14; 2 Sam. 14:33
      marker-yv: yv-n
    - type: text
      text: brought the king, his household, and all David’s men with him across the Jordan?”
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'So all the men of Judah answered the men of Israel, “Because the king '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 19:15
      marker-yv: yv-n
    - type: text
      text: 'a close relative of ours. Why then are you angry over this matter? Have we ever eaten at the king’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: expense?
    - type: text
      text: ' Or has he given us any gift?”'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'And the men of Israel answered the men of Judah, and said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 19:12
      marker-yv: yv-n
    - type: text
      text: '“We have ten shares in the king; therefore we also have more '
    - type: usfm
      marker: it
      children:
      - type: text
        text: right
    - type: text
      text: ' to David than you. Why then do you despise us—were we not the first to advise bringing back our king?”'
