  - type: text
    content: 'across the Jordan. '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: 2 Sam. 17:22
  - type: text
    content: 'Shimei the son of Gera, a Benjamite, who '
  - type: text
    content: was
  - type: text
    content: ' from Bahurim, hurried and came down with the men of Judah to meet King David. '
  '17':
  - type: text
    content: There
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' a thousand men of '
  - type: note
    content: 2 Sam. 16:5; 1 Kin. 2:8
  - type: text
    content: 'Benjamin with him, and '
  - type: note
    content: 2 Sam. 3:19; 1 Kin. 12:21
  - type: text
    content: 'Ziba the servant of the house of Saul, and his fifteen sons and his twenty servants with him; and they went over the Jordan before the king. '
  '18':
  - type: text
    content: Then a ferryboat went across to carry over the king’s household, and to do what he thought good.
  - type: heading
    content: David’s Mercy to Shimei
  - type: text
    content: 'Now Shimei the son of Gera fell down before the king when he had crossed the Jordan. '
  '19':
  - type: text
    content: 'Then he said to the king, '
  - type: note
    content: 2 Sam. 9:2, 10; 16:1, 2
  - type: text
    content: '“Do not let my lord impute iniquity to me, or remember what '
  - type: note
    content: 1 Sam. 22:15
  - type: text
    content: 'wrong your servant did on the day that my lord the king left Jerusalem, that the king should '
  - type: note
    content: 2 Sam. 16:5, 6
  - type: text
    content: 'take '
  - type: text
    content: it
  - type: text
    content: ' to heart. '
  '2':
  - type: text
    content: 'So the victory that day was '
  - type: text
    content: turned
  - type: text
    content: ' into '
  - type: note
    content: Jer. 14:2
  - type: text
    content: 'mourning for all the people. For the people heard it said that day, “The king is grieved for his son.” '
  '20':
  - type: text
    content: 'For I, your servant, know that I have sinned. Therefore here I am, the first to come today of all '
  - type: note
    content: 2 Sam. 13:33
  - type: text
    content: the house of Joseph to go down to meet my lord the king.”
  '21':
  - type: text
    content: 'But Abishai the son of Zeruiah answered and said, “Shall not Shimei be put to death for this, '
  - type: note
    content: Judg. 1:22; 1 Kin. 11:28
  - type: text
    content: 'because he '
  - type: note
    content: (Ex. 22:28)
  - type: text
    content: 'cursed the '
  - type: heading
    content: Lord
  - type: text
    content: ’s anointed?”
  '22':
  - type: text
    content: 'And David said, '
  - type: note
    content: (1 Sam. 26:9)
  - type: text
    content: '“What have I to do with you, you sons of Zeruiah, that you should be adversaries to me today? '
  - type: note
    content: 2 Sam. 3:39; 16:10
  - type: text
    content: 'Shall any man be put to death today in Israel? For do I not know that today I '
  - type: text
    content: am
  - type: text
    content: ' king over Israel?” '
  '23':
  - type: text
    content: 'Therefore '
  - type: note
    content: 1 Sam. 11:13
  - type: text
    content: the king said to Shimei, “You shall not die.” And the king swore to him.
  - type: heading
    content: David and Mephibosheth Meet
  '24':
  - type: text
    content: 'Now '
  - type: note
    content: 1 Kin. 2:8, 9, 37, 46
  - type: text
    content: 'Mephibosheth the son of Saul came down to meet the king. And he had not cared for his feet, nor trimmed his mustache, nor washed his clothes, from the day the king departed until the day he returned in peace. '
  '25':
  - type: text
    content: 'So it was, when he had come to Jerusalem to meet the king, that the king said to him, '
  - type: note
    content: 2 Sam. 9:6; 21:7
  - type: text
    content: “Why did you not go with me, Mephibosheth?”
  '26':
  - type: text
    content: 'And he answered, “My lord, O king, my servant deceived me. For your servant said, ‘I will saddle a donkey for myself, that I may ride on it and go to the king,’ because your servant '
  - type: text
    content: is
  - type: text
    content: ' lame. '
  '27':
  - type: text
    content: 'And '
  - type: note
    content: 2 Sam. 16:17
  - type: text
    content: 'he has slandered your servant to my lord the king, '
  - type: note
    content: 2 Sam. 16:3, 4
  - type: text
    content: 'but my lord the king '
  - type: text
    content: is
  - type: text
    content: ' like the angel of God. Therefore do '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' good in your eyes. '
  '28':
  - type: text
    content: 'For all my father’s house were but dead men before my lord the king. '
  - type: note
    content: 2 Sam. 14:17, 20
  - type: text
    content: Yet you set your servant among those who eat at your own table. Therefore what right have I still to cry out anymore to the king?”
  '29':
  - type: text
    content: So the king said to him, “Why do you speak anymore of your matters? I have said, ‘You and Ziba divide the land.’ ”
  '3':
  - type: text
    content: 'And the people stole back '
  - type: note
    content: Esth. 4:3
  - type: text
    content: 'into the city that day, as people who are ashamed steal away when they flee in battle. '
  '30':
  - type: text
    content: Then Mephibosheth said to the king, “Rather, let him take it all, inasmuch as my lord the king has come back in peace to his own house.”
  - type: heading
    content: David’s Kindness to Barzillai
  '31':
  - type: text
    content: 'And '
  - type: note
    content: 2 Sam. 9:7–13
  - type: text
    content: 'Barzillai the Gileadite came down from Rogelim and went across the Jordan with the king, to escort him across the Jordan. '
  '32':
  - type: text
    content: 'Now Barzillai was a very aged man, eighty years old. And '
  - type: note
    content: 2 Sam. 17:27–29; 1 Kin. 2:7
  - type: text
    content: 'he had provided the king with supplies while he stayed at Mahanaim, for he '
  - type: text
    content: was
  - type: text
    content: ' a very rich man. '
  '33':
  - type: text
    content: And the king said to Barzillai, “Come across with me, and I will provide for you while you are with me in Jerusalem.”
  '34':
  - type: text
    content: 'But Barzillai said to the king, “How long have I to live, that I should go up with the king to Jerusalem? '
  '35':
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' today '
  - type: note
    content: 2 Sam. 17:27–29
  - type: text
    content: 'eighty years old. Can I discern between the good and bad? Can your servant taste what I eat or what I drink? Can I hear any longer the voice of singing men and singing women? Why then should your servant be a further burden to my lord the king? '
  '36':
  - type: text
    content: 'Your servant will go a little way across the Jordan with the king. And why should the king repay me '
  - type: text
    content: with
  - type: text
    content: ' such a reward? '
  '37':
  - type: text
    content: 'Please let your servant turn back again, that I may die in my own city, near the grave of my father and mother. But here is your servant '
  - type: note
    content: Ps. 90:10
  - type: text
    content: Chimham; let him cross over with my lord the king, and do for him what seems good to you.”
  '38':
  - type: text
    content: 'And the king answered, “Chimham shall cross over with me, and I will do for him what seems good to you. Now whatever you request of me, I will do for you.” '
  '39':
  - type: text
    content: 'Then all the people went over the Jordan. And when the king had crossed over, the king '
  - type: note
    content: 2 Sam. 19:40; Jer. 41:17
  - type: text
    content: kissed Barzillai and blessed him, and he returned to his own place.
  - type: heading
    content: The Quarrel About the King
  '4':
  - type: text
    content: 'But the king '
  - type: note
    content: 2 Sam. 17:24, 27; 19:32
  - type: text
    content: 'covered his face, and the king cried out with a loud voice, '
  - type: note
    content: 2 Sam. 15:30
  - type: text
    content: “O my son Absalom! O Absalom, my son, my son!”
  '40':
  - type: text
    content: 'Now the king went on to Gilgal, and Chimham went on with him. And all the people of Judah escorted the king, and also half the people of Israel. '
  '41':
  - type: text
    content: 'Just then all the men of Israel came to the king, and said to the king, “Why have our brethren, the men of Judah, stolen you away and '
  - type: note
    content: Gen. 31:55; Ruth 1:14; 2 Sam. 14:33
  - type: text
    content: brought the king, his household, and all David’s men with him across the Jordan?”
  '42':
  - type: text
    content: 'So all the men of Judah answered the men of Israel, “Because the king '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: 2 Sam. 19:15
  - type: text
    content: 'a close relative of ours. Why then are you angry over this matter? Have we ever eaten at the king’s '
  - type: text
    content: expense?
  - type: text
    content: ' Or has he given us any gift?”'
  '43':
  - type: text
    content: 'And the men of Israel answered the men of Judah, and said, '
  - type: note
    content: 2 Sam. 19:12
  - type: text
    content: '“We have ten shares in the king; therefore we also have more '
  - type: text
    content: right
  - type: text
    content: ' to David than you. Why then do you despise us—were we not the first to advise bringing back our king?”'
  - type: text
    content: 'Yet '
  - type: note
    content: 1 Kin. 11:30, 31
  - type: text
    content: the words of the men of Judah were fiercer than the words of the men of Israel.
  '5':
  - type: text
    content: 'Then '
  - type: note
    content: 2 Sam. 18:33
  - type: text
    content: 'Joab came into the house to the king, and said, “Today you have disgraced all your servants who today have saved your life, the lives of your sons and daughters, the lives of your wives and the lives of your concubines, '
  '6':
  - type: text
    content: 'in that you love your enemies and hate your friends. For you have declared today that you regard neither princes nor servants; for today I perceive that if Absalom had lived and all of us had died today, then it would have pleased you well. '
  '7':
  - type: text
    content: 'Now therefore, arise, go out and speak comfort to your servants. For I swear by the '
  - type: heading
    content: Lord
  - type: text
    content: ', if you do not go out, not one will stay with you this night. And that will be worse for you than all the evil that has befallen you from your youth until now.” '
  '8':
  - type: text
    content: 'Then the king arose and sat in the '
  - type: note
    content: 2 Sam. 18:14
  - type: text
    content: gate. And they told all the people, saying, “There is the king, sitting in the gate.” So all the people came before the king.
  - type: text
    content: 'For everyone of Israel had '
  - type: note
    content: 2 Sam. 15:2; 18:24
  - type: text
    content: fled to his tent.
  - type: heading
    content: David Returns to Jerusalem
  '9':
  - type: text
    content: 'Now all the people were in a dispute throughout all the tribes of Israel, saying, “The king saved us from the hand of our '
  - type: note
    content: 2 Sam. 18:17
  - type: text
    content: 'enemies, he delivered us from the hand of the '
  - type: note
    content: 2 Sam. 8:1–14
  - type: text
    content: 'Philistines, and now he has '
  - type: note
    content: 2 Sam. 3:18
  - type: text
    content: 'fled from the land because of Absalom. '
