  - type: text
    content: ' '
  - type: text
    content: word
  - type: text
    content: ' to the king: “Return, you and all your servants!”'
  '15':
  - type: text
    content: 'Then the king returned and came to the Jordan. And Judah came to '
  - type: note
    content: Judg. 20:1
  - type: text
    content: 'Gilgal, to go to meet the king, to escort the king '
  - type: note
