verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Spares Saul a Second Time
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now the Ziphites came to Saul at Gibeah, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 10:30
      marker-yv: yv-n
    - type: text
      text: '“Is David not hiding in the hill of Hachilah, opposite Jeshimon?” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: David said furthermore, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 24:6, 7; 2 Sam. 1:14, 16
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shall strike him, or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 32:35); 1 Sam. 25:26, 38; (Luke 18:7; Rom. 12:19; Heb. 10:30)
      marker-yv: yv-n
    - type: text
      text: 'his day shall come to die, or he shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 47:29; Deut. 31:14; (Job 7:1; 14:5); Ps. 37:13
      marker-yv: yv-n
    - type: text
      text: 'go out to battle and perish. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 31:6
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' forbid that I should stretch out my hand against the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anointed. But please, take now the spear and the jug of water that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' by his head, and let us go.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So David took the spear and the jug of water '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by
    - type: text
      text: ' Saul’s head, and they got away; and no man saw or knew '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' or awoke. For they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' all asleep, because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 24:6–12; (Rom. 12:17, 19)
      marker-yv: yv-n
    - type: text
      text: 'a deep sleep from the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had fallen on them.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Now David went over to the other side, and stood on the top of a hill afar off, a great distance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: being
    - type: text
      text: ' between them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: And David called out to the people and to Abner the son of Ner, saying, “Do you not answer, Abner?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abner answered and said, “Who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' you, calling out to the king?”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: So David said to Abner, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Are
    - type: text
      text: ' you not a man? And who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' like you in Israel? Why then have you not guarded your lord the king? For one of the people came in to destroy your lord the king. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'This thing that you have done '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not good. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, you deserve to die, because you have not guarded your master, the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anointed. And now see where the king’s spear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is,
    - type: text
      text: ' and the jug of water that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' by his head.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Saul knew David’s voice, and said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 2:21; 15:12; Is. 29:10
      marker-yv: yv-n
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' that your voice, my son David?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: David said, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my voice, my lord, O king.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 24:16
      marker-yv: yv-n
    - type: text
      text: '“Why does my lord thus pursue his servant? For what have I done, or what evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in my hand? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Now therefore, please, let my lord the king hear the words of his servant: If the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 24:9, 11–14
      marker-yv: yv-n
    - type: text
      text: 'stirred you up against me, let Him accept an offering. But if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the children of men, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: may
    - type: text
      text: ' they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' cursed before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 16:11; 24:1
      marker-yv: yv-n
    - type: text
      text: 'for they have driven me out this day from sharing in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:27, 28
      marker-yv: yv-n
    - type: text
      text: 'inheritance of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, ‘Go, serve other gods.’ '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then Saul arose and went down to the Wilderness of Ziph, having '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 23:19; Ps. 54:title
      marker-yv: yv-n
    - type: text
      text: 'three thousand chosen men of Israel with him, to seek David in the Wilderness of Ziph. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So now, do not let my blood fall to the earth before the face of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. For the king of Israel has come out to seek '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 14:16; 20:19
      marker-yv: yv-n
    - type: text
      text: a flea, as when one hunts a partridge in the mountains.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then Saul said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 24:14
      marker-yv: yv-n
    - type: text
      text: “I have sinned. Return, my son David. For I will harm you no more, because my life was precious in your eyes this day. Indeed I have played the fool and erred exceedingly.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And David answered and said, “Here is the king’s spear. Let one of the young men come over and get it. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 9:27; 1 Sam. 15:24, 30; 24:17; 2 Sam. 12:13
      marker-yv: yv-n
    - type: text
      text: 'May the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 24:19; Ps. 7:8; 18:20; 62:12
      marker-yv: yv-n
    - type: text
      text: 'repay every man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' his righteousness and his faithfulness; for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' delivered you into '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' hand today, but I would not stretch out my hand against the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anointed. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And indeed, as your life was valued much this day in my eyes, so let my life be valued much in the eyes of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and let Him deliver me out of all tribulation.”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Then Saul said to David, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: May
    - type: text
      text: ' you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' blessed, my son David! You shall both do great things and also still '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 22:21
      marker-yv: yv-n
    - type: text
      text: prevail.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David went on his way, and Saul returned to his place.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Saul encamped in the hill of Hachilah, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' opposite Jeshimon, by the road. But David stayed in the wilderness, and he saw that Saul came after him into the wilderness. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: David therefore sent out spies, and understood that Saul had indeed come.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So David arose and came to the place where Saul had encamped. And David saw the place where Saul lay, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 13:2; 24:2
      marker-yv: yv-n
    - type: text
      text: 'Abner the son of Ner, the commander of his army. Now Saul lay within the camp, with the people encamped all around him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then David answered, and said to Ahimelech the Hittite and to Abishai '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 14:50, 51; 17:55
      marker-yv: yv-n
    - type: text
      text: 'the son of Zeruiah, brother of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 2:16
      marker-yv: yv-n
    - type: text
      text: 'Joab, saying, “Who will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 2:13
      marker-yv: yv-n
    - type: text
      text: go down with me to Saul in the camp?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 7:10, 11
      marker-yv: yv-n
    - type: text
      text: Abishai said, “I will go down with you.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So David and Abishai came to the people by night; and there Saul lay sleeping within the camp, with his spear stuck in the ground by his head. And Abner and the people lay all around him. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then Abishai said to David, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 2:18, 24
      marker-yv: yv-n
    - type: text
      text: '“God has delivered your enemy into your hand this day. Now therefore, please, let me strike him at once with the spear, right to the earth; and I will not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: strike
    - type: text
      text: ' him a second time!”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But David said to Abishai, “Do not destroy him; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 24:4
      marker-yv: yv-n
    - type: text
      text: 'for who can stretch out his hand against the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anointed, and be guiltless?” '
