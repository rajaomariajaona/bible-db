segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nations Descended from Noah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the genealogy of the sons of Noah: Shem, Ham, and Japheth. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 9:1, 7, 19
    marker-yv: yv-n
  - type: text
    text: And sons were born to them after the flood.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 1:5–7
    marker-yv: yv-n
  - type: text
    text: 'The sons of Japheth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The sons of Gomer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Ashkenaz, Riphath, and Togarmah. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The sons of Javan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Elishah, Tarshish, Kittim, and Dodanim. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'From these '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 11:8; Ps. 72:10; Jer. 2:10; 25:22
    marker-yv: yv-n
  - type: text
    text: 'the coastland '
  - type: usfm
    marker: it
    children:
    - type: text
      text: peoples
  - type: text
    text: ' of the Gentiles were separated into their lands, everyone according to his language, according to their families, into their nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 1:8–16
    marker-yv: yv-n
  - type: text
    text: 'The sons of Ham '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Cush, Mizraim, Put, and Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The sons of Cush '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Seba, Havilah, Sabtah, Raamah, and Sabtechah; and the sons of Raamah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Sheba and Dedan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cush begot '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mic. 5:6
    marker-yv: yv-n
  - type: text
    text: 'Nimrod; he began to be a mighty one on the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He was a mighty '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 16:16; Mic. 7:2
    marker-yv: yv-n
  - type: text
    text: 'hunter before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '; therefore it is said, “Like Nimrod the mighty hunter '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 21:20
    marker-yv: yv-n
  - type: text
    text: 'before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '.” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mic. 5:6
    marker-yv: yv-n
  - type: text
    text: 'And the beginning of his kingdom was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 11:9
    marker-yv: yv-n
  - type: text
    text: 'Babel, Erech, Accad, and Calneh, in the land of Shinar. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'From that land he went to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 25:18; 2 Kin. 19:36; Mic. 5:6
    marker-yv: yv-n
  - type: text
    text: 'Assyria and built Nineveh, Rehoboth Ir, Calah, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and Resen between Nineveh and Calah (that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the principal city).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mizraim begot Ludim, Anamim, Lehabim, Naphtuhim, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Pathrusim, and Casluhim '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 1:12
    marker-yv: yv-n
  - type: text
    text: (from whom came the Philistines and Caphtorim).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Canaan begot Sidon his firstborn, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 23:3
    marker-yv: yv-n
  - type: text
    text: 'Heth; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 14:7; 15:19–21; Deut. 7:1; Neh. 9:8
    marker-yv: yv-n
  - type: text
    text: 'the Jebusite, the Amorite, and the Girgashite; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'the Hivite, the Arkite, and the Sinite; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'the Arvadite, the Zemarite, and the Hamathite. Afterward the families of the Canaanites were dispersed. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 13:12, 14, 15, 17; 15:18–21; Num. 34:2–12
    marker-yv: yv-n
  - type: text
    text: 'And the border of the Canaanites was from Sidon as you go toward Gerar, as far as Gaza; then as you go toward Sodom, Gomorrah, Admah, and Zeboiim, as far as Lasha. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Ham, according to their families, according to their languages, in their lands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in their nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: children
  - type: text
    text: ' were born also to Shem, the father of all the children of Eber, the brother of Japheth the elder. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 11:10–26; 1 Chr. 1:17–28
    marker-yv: yv-n
  - type: text
    text: 'sons of Shem '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Elam, Asshur, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 10:24; 11:10; Luke 3:36
    marker-yv: yv-n
  - type: text
    text: 'Arphaxad, Lud, and Aram. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The sons of Aram '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Uz, Hul, Gether, and Mash. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Arphaxad begot '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 11:12; Luke 3:35
    marker-yv: yv-n
  - type: text
    text: 'Salah, and Salah begot Eber. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 1:19
    marker-yv: yv-n
  - type: text
    text: 'To Eber were born two sons: the name of one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Peleg, for in his days the earth was divided; and his brother’s name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Joktan. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Joktan begot Almodad, Sheleph, Hazarmaveth, Jerah, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hadoram, Uzal, Diklah, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Obal, Abimael, Sheba, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ophir, Havilah, and Jobab. All these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Joktan. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And their dwelling place was from Mesha as you go toward Sephar, the mountain of the east. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Shem, according to their families, according to their languages, in their lands, according to their nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 10:1
    marker-yv: yv-n
  - type: text
    text: 'These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the families of the sons of Noah, according to their generations, in their nations; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 9:19; 11:8
    marker-yv: yv-n
  - type: text
    text: and from these the nations were divided on the earth after the flood.
