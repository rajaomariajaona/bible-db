document_id: GEN.10,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Nations Descended from Noah
  - type: text
    content: 'Now this '
  - type: text
    content: is
  - type: text
    content: ' the genealogy of the sons of Noah: Shem, Ham, and Japheth. '
  - type: note
    content: Gen. 9:1, 7, 19
  - type: text
    content: And sons were born to them after the flood.
  '10':
  - type: note
    content: Mic. 5:6
  - type: text
    content: 'And the beginning of his kingdom was '
  - type: note
    content: Gen. 11:9
  - type: text
    content: 'Babel, Erech, Accad, and Calneh, in the land of Shinar. '
  '11':
  - type: text
    content: 'From that land he went to '
  - type: note
    content: Gen. 25:18; 2 Kin. 19:36; Mic. 5:6
  - type: text
    content: 'Assyria and built Nineveh, Rehoboth Ir, Calah, '
  '12':
  - type: text
    content: 'and Resen between Nineveh and Calah (that '
  - type: text
    content: is
  - type: text
    content: ' the principal city).'
  '13':
  - type: text
    content: 'Mizraim begot Ludim, Anamim, Lehabim, Naphtuhim, '
  '14':
  - type: text
    content: 'Pathrusim, and Casluhim '
  - type: note
    content: 1 Chr. 1:12
  - type: text
    content: (from whom came the Philistines and Caphtorim).
  '15':
  - type: text
    content: 'Canaan begot Sidon his firstborn, and '
  - type: note
    content: Gen. 23:3
  - type: text
    content: 'Heth; '
  '16':
  - type: note
    content: Gen. 14:7; 15:19–21; Deut. 7:1; Neh. 9:8
  - type: text
    content: 'the Jebusite, the Amorite, and the Girgashite; '
  '17':
  - type: text
    content: 'the Hivite, the Arkite, and the Sinite; '
  '18':
  - type: text
    content: 'the Arvadite, the Zemarite, and the Hamathite. Afterward the families of the Canaanites were dispersed. '
  '19':
  - type: note
    content: Gen. 13:12, 14, 15, 17; 15:18–21; Num. 34:2–12
  - type: text
    content: 'And the border of the Canaanites was from Sidon as you go toward Gerar, as far as Gaza; then as you go toward Sodom, Gomorrah, Admah, and Zeboiim, as far as Lasha. '
  '2':
  - type: note
    content: 1 Chr. 1:5–7
  - type: text
    content: 'The sons of Japheth '
  - type: text
    content: were
  - type: text
    content: ' Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras. '
  '20':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Ham, according to their families, according to their languages, in their lands '
  - type: text
    content: and
  - type: text
    content: ' in their nations.'
  '21':
  - type: text
    content: 'And '
  - type: text
    content: children
  - type: text
    content: ' were born also to Shem, the father of all the children of Eber, the brother of Japheth the elder. '
  '22':
  - type: text
    content: 'The '
  - type: note
    content: Gen. 11:10–26; 1 Chr. 1:17–28
  - type: text
    content: 'sons of Shem '
  - type: text
    content: were
  - type: text
    content: ' Elam, Asshur, '
  - type: note
    content: Gen. 10:24; 11:10; Luke 3:36
  - type: text
    content: 'Arphaxad, Lud, and Aram. '
  '23':
  - type: text
    content: 'The sons of Aram '
  - type: text
    content: were
  - type: text
    content: ' Uz, Hul, Gether, and Mash. '
  '24':
  - type: text
    content: 'Arphaxad begot '
  - type: note
    content: Gen. 11:12; Luke 3:35
  - type: text
    content: 'Salah, and Salah begot Eber. '
  '25':
  - type: note
    content: 1 Chr. 1:19
  - type: text
    content: 'To Eber were born two sons: the name of one '
  - type: text
    content: was
  - type: text
    content: ' Peleg, for in his days the earth was divided; and his brother’s name '
  - type: text
    content: was
  - type: text
    content: ' Joktan. '
  '26':
  - type: text
    content: 'Joktan begot Almodad, Sheleph, Hazarmaveth, Jerah, '
  '27':
  - type: text
    content: 'Hadoram, Uzal, Diklah, '
  '28':
  - type: text
    content: 'Obal, Abimael, Sheba, '
  '29':
  - type: text
    content: 'Ophir, Havilah, and Jobab. All these '
  - type: text
    content: were
  - type: text
    content: ' the sons of Joktan. '
  '3':
  - type: text
    content: 'The sons of Gomer '
  - type: text
    content: were
  - type: text
    content: ' Ashkenaz, Riphath, and Togarmah. '
  '30':
  - type: text
    content: 'And their dwelling place was from Mesha as you go toward Sephar, the mountain of the east. '
  '31':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Shem, according to their families, according to their languages, in their lands, according to their nations.'
  '32':
  - type: note
    content: Gen. 10:1
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the families of the sons of Noah, according to their generations, in their nations; '
  - type: note
    content: Gen. 9:19; 11:8
  - type: text
    content: and from these the nations were divided on the earth after the flood.
  '4':
  - type: text
    content: 'The sons of Javan '
  - type: text
    content: were
  - type: text
    content: ' Elishah, Tarshish, Kittim, and Dodanim. '
  '5':
  - type: text
    content: 'From these '
  - type: note
    content: Gen. 11:8; Ps. 72:10; Jer. 2:10; 25:22
  - type: text
    content: 'the coastland '
  - type: text
    content: peoples
  - type: text
    content: ' of the Gentiles were separated into their lands, everyone according to his language, according to their families, into their nations.'
  '6':
  - type: note
    content: 1 Chr. 1:8–16
  - type: text
    content: 'The sons of Ham '
  - type: text
    content: were
  - type: text
    content: ' Cush, Mizraim, Put, and Canaan. '
  '7':
  - type: text
    content: 'The sons of Cush '
  - type: text
    content: were
  - type: text
    content: ' Seba, Havilah, Sabtah, Raamah, and Sabtechah; and the sons of Raamah '
  - type: text
    content: were
  - type: text
    content: ' Sheba and Dedan.'
  '8':
  - type: text
    content: 'Cush begot '
  - type: note
    content: Mic. 5:6
  - type: text
    content: 'Nimrod; he began to be a mighty one on the earth. '
  '9':
  - type: text
    content: 'He was a mighty '
  - type: note
    content: Jer. 16:16; Mic. 7:2
  - type: text
    content: 'hunter before the '
  - type: heading
    content: Lord
  - type: text
    content: '; therefore it is said, “Like Nimrod the mighty hunter '
  - type: note
    content: Gen. 21:20
  - type: text
    content: 'before the '
  - type: heading
    content: Lord
  - type: text
    content: '.” '
