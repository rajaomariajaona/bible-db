document_id: 2CO.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greeting
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 1:1; Eph. 1:1; Col. 1:1; 1 Tim. 1:1; 2 Tim. 1:1
    marker-yv: yv-n
  - type: text
    text: 'an apostle of Jesus Christ by the will of God, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 16:1; 1 Cor. 16:10
    marker-yv: yv-n
  - type: text
    text: 'Timothy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our
  - type: text
    text: ' brother,'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'To the church of God which is at Corinth, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 1:1; Col. 1:2
    marker-yv: yv-n
  - type: text
    text: 'with all the saints who are in all Achaia:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:7
    marker-yv: yv-n
  - type: text
    text: Grace to you and peace from God our Father and the Lord Jesus Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Comfort in Suffering
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 1:3; 1 Pet. 1:3
    marker-yv: yv-n
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' the God and Father of our Lord Jesus Christ, the Father of mercies and God of all comfort, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 51:12; 66:13; 2 Cor. 7:6, 7, 13
    marker-yv: yv-n
  - type: text
    text: 'comforts us in all our tribulation, that we may be able to comfort those who are in any trouble, with the comfort with which we ourselves are comforted by God. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For as '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Acts 9:4); 2 Cor. 4:10; Phil. 3:10; Col. 1:24
    marker-yv: yv-n
  - type: text
    text: 'the sufferings of Christ abound in us, so our consolation also abounds through Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now if we are afflicted, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 4:15; 12:15; Eph. 3:1, 13; 2 Tim. 2:10
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' for your consolation and salvation, which is effective for enduring the same sufferings which we also suffer. Or if we are comforted, it is for your consolation and salvation. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And our hope for you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' steadfast, because we know that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 8:17; 2 Tim. 2:12)
    marker-yv: yv-n
  - type: text
    text: 'as you are partakers of the sufferings, so also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: partake
  - type: text
    text: ' of the consolation.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Delivered from Suffering
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For we do not want you to be ignorant, brethren, of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 19:23; 1 Cor. 15:32; 16:9
    marker-yv: yv-n
  - type: text
    text: 'our trouble which came to us in Asia: that we were burdened beyond measure, above strength, so that we despaired even of life. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Yes, we had the sentence of death in ourselves, that we should '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 17:5, 7
    marker-yv: yv-n
  - type: text
    text: 'not trust in ourselves but in God who raises the dead, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Pet. 2:9)
    marker-yv: yv-n
  - type: text
    text: 'who delivered us from so great a death, and does deliver us; in whom we trust that He will still deliver '
  - type: usfm
    marker: it
    children:
    - type: text
      text: us,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'you also '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 15:30; Phil. 1:19; Philem. 22
    marker-yv: yv-n
  - type: text
    text: 'helping together in prayer for us, that thanks may be given by many persons on our behalf '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 4:15; 9:11
    marker-yv: yv-n
  - type: text
    text: 'for the gift '
  - type: usfm
    marker: it
    children:
    - type: text
      text: granted
  - type: text
    text: ' to us through many.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Sincerity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For our boasting is this: the testimony of our conscience that we conducted ourselves in the world in simplicity and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 2:17
    marker-yv: yv-n
  - type: text
    text: 'godly sincerity, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 2:4)
    marker-yv: yv-n
  - type: text
    text: 'not with fleshly wisdom but by the grace of God, and more abundantly toward you. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For we are not writing any other things to you than what you read or understand. Now I trust you will understand, even to the end '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '(as also you have understood us in part), '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 5:12
    marker-yv: yv-n
  - type: text
    text: 'that we are your boast as '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 2:16; 1 Thess. 2:19
    marker-yv: yv-n
  - type: text
    text: 'you also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' ours, in the day of the Lord Jesus.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sparing the Church
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And in this confidence '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 4:19
    marker-yv: yv-n
  - type: text
    text: 'I intended to come to you before, that you might have '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:11; 15:29
    marker-yv: yv-n
  - type: text
    text: 'a second benefit— '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'to pass by way of you to Macedonia, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 19:21; 1 Cor. 16:3–6
    marker-yv: yv-n
  - type: text
    text: 'to come again from Macedonia to you, and be helped by you on my way to Judea. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Therefore, when I was planning this, did I do it lightly? Or the things I plan, do I plan '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 10:2; 11:18
    marker-yv: yv-n
  - type: text
    text: 'according to the flesh, that with me there should be Yes, Yes, and No, No? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 John 5:20
    marker-yv: yv-n
  - type: text
    text: 'faithful, our word to you was not Yes and No. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mark 1:1; Luke 1:35; John 1:34; 20:31; 1 John 5:5, 20
    marker-yv: yv-n
  - type: text
    text: 'the Son of God, Jesus Christ, who was preached among you by us—by me, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 1:1; 2 Thess. 1:1; 1 Pet. 5:12
    marker-yv: yv-n
  - type: text
    text: 'Silvanus, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:5; 2 Cor. 1:1
    marker-yv: yv-n
  - type: text
    text: 'Timothy—was not Yes and No, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Heb. 13:8)
    marker-yv: yv-n
  - type: text
    text: 'but in Him was Yes. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 15:8, 9)
    marker-yv: yv-n
  - type: text
    text: 'For all the promises of God in Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' Yes, and in Him Amen, to the glory of God through us. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now He who establishes us with you in Christ and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 John 2:20, 27)
    marker-yv: yv-n
  - type: text
    text: 'has anointed us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' God, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Eph. 4:30)
    marker-yv: yv-n
  - type: text
    text: 'also has sealed us and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 8:16; 2 Cor. 5:5; (Eph. 1:14)
    marker-yv: yv-n
  - type: text
    text: given us the Spirit in our hearts as a guarantee.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Moreover '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:9; Gal. 1:20; Phil. 1:8
    marker-yv: yv-n
  - type: text
    text: 'I call God as witness against my soul, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 4:21; 2 Cor. 2:3; 12:20
    marker-yv: yv-n
  - type: text
    text: 'that to spare you I came no more to Corinth. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Not '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 3:5; 2 Cor. 4:5; 11:20; (1 Pet. 5:3)
    marker-yv: yv-n
  - type: text
    text: 'that we have dominion over your faith, but are fellow workers for your joy; for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 11:20; 1 Cor. 15:1
    marker-yv: yv-n
  - type: text
    text: by faith you stand.
