document_id: 2CO.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, '
  - type: note
    content: 1 Cor. 1:1; Eph. 1:1; Col. 1:1; 1 Tim. 1:1; 2 Tim. 1:1
  - type: text
    content: 'an apostle of Jesus Christ by the will of God, and '
  - type: note
    content: Acts 16:1; 1 Cor. 16:10
  - type: text
    content: 'Timothy '
  - type: text
    content: our
  - type: text
    content: ' brother,'
  - type: text
    content: 'To the church of God which is at Corinth, '
  - type: note
    content: Phil. 1:1; Col. 1:2
  - type: text
    content: 'with all the saints who are in all Achaia:'
  '10':
  - type: note
    content: (2 Pet. 2:9)
  - type: text
    content: 'who delivered us from so great a death, and does deliver us; in whom we trust that He will still deliver '
  - type: text
    content: us,
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'you also '
  - type: note
    content: Rom. 15:30; Phil. 1:19; Philem. 22
  - type: text
    content: 'helping together in prayer for us, that thanks may be given by many persons on our behalf '
  - type: note
    content: 2 Cor. 4:15; 9:11
  - type: text
    content: 'for the gift '
  - type: text
    content: granted
  - type: text
    content: ' to us through many.'
  - type: heading
    content: Paul’s Sincerity
  '12':
  - type: text
    content: 'For our boasting is this: the testimony of our conscience that we conducted ourselves in the world in simplicity and '
  - type: note
    content: 2 Cor. 2:17
  - type: text
    content: 'godly sincerity, '
  - type: note
    content: (1 Cor. 2:4)
  - type: text
    content: 'not with fleshly wisdom but by the grace of God, and more abundantly toward you. '
  '13':
  - type: text
    content: 'For we are not writing any other things to you than what you read or understand. Now I trust you will understand, even to the end '
  '14':
  - type: text
    content: '(as also you have understood us in part), '
  - type: note
    content: 2 Cor. 5:12
  - type: text
    content: 'that we are your boast as '
  - type: note
    content: Phil. 2:16; 1 Thess. 2:19
  - type: text
    content: 'you also '
  - type: text
    content: are
  - type: text
    content: ' ours, in the day of the Lord Jesus.'
  - type: heading
    content: Sparing the Church
  '15':
  - type: text
    content: 'And in this confidence '
  - type: note
    content: 1 Cor. 4:19
  - type: text
    content: 'I intended to come to you before, that you might have '
  - type: note
    content: Rom. 1:11; 15:29
  - type: text
    content: 'a second benefit— '
  '16':
  - type: text
    content: 'to pass by way of you to Macedonia, '
  - type: note
    content: Acts 19:21; 1 Cor. 16:3–6
  - type: text
    content: 'to come again from Macedonia to you, and be helped by you on my way to Judea. '
  '17':
  - type: text
    content: 'Therefore, when I was planning this, did I do it lightly? Or the things I plan, do I plan '
  - type: note
    content: 2 Cor. 10:2; 11:18
  - type: text
    content: 'according to the flesh, that with me there should be Yes, Yes, and No, No? '
  '18':
  - type: text
    content: 'But '
  - type: text
    content: as
  - type: text
    content: ' God '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: 1 John 5:20
  - type: text
    content: 'faithful, our word to you was not Yes and No. '
  '19':
  - type: text
    content: 'For '
  - type: note
    content: Mark 1:1; Luke 1:35; John 1:34; 20:31; 1 John 5:5, 20
  - type: text
    content: 'the Son of God, Jesus Christ, who was preached among you by us—by me, '
  - type: note
    content: 1 Thess. 1:1; 2 Thess. 1:1; 1 Pet. 5:12
  - type: text
    content: 'Silvanus, and '
  - type: note
    content: Acts 18:5; 2 Cor. 1:1
  - type: text
    content: 'Timothy—was not Yes and No, '
  - type: note
    content: (Heb. 13:8)
  - type: text
    content: 'but in Him was Yes. '
  '2':
  - type: note
    content: Rom. 1:7
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Comfort in Suffering
  '20':
  - type: note
    content: (Rom. 15:8, 9)
  - type: text
    content: 'For all the promises of God in Him '
  - type: text
    content: are
  - type: text
    content: ' Yes, and in Him Amen, to the glory of God through us. '
  '21':
  - type: text
    content: 'Now He who establishes us with you in Christ and '
  - type: note
    content: (1 John 2:20, 27)
  - type: text
    content: 'has anointed us '
  - type: text
    content: is
  - type: text
    content: ' God, '
  '22':
  - type: text
    content: 'who '
  - type: note
    content: (Eph. 4:30)
  - type: text
    content: 'also has sealed us and '
  - type: note
    content: Rom. 8:16; 2 Cor. 5:5; (Eph. 1:14)
  - type: text
    content: given us the Spirit in our hearts as a guarantee.
  '23':
  - type: text
    content: 'Moreover '
  - type: note
    content: Rom. 1:9; Gal. 1:20; Phil. 1:8
  - type: text
    content: 'I call God as witness against my soul, '
  - type: note
    content: 1 Cor. 4:21; 2 Cor. 2:3; 12:20
  - type: text
    content: 'that to spare you I came no more to Corinth. '
  '24':
  - type: text
    content: 'Not '
  - type: note
    content: 1 Cor. 3:5; 2 Cor. 4:5; 11:20; (1 Pet. 5:3)
  - type: text
    content: 'that we have dominion over your faith, but are fellow workers for your joy; for '
  - type: note
    content: Rom. 11:20; 1 Cor. 15:1
  - type: text
    content: by faith you stand.
  '3':
  - type: note
    content: Eph. 1:3; 1 Pet. 1:3
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' the God and Father of our Lord Jesus Christ, the Father of mercies and God of all comfort, '
  '4':
  - type: text
    content: 'who '
  - type: note
    content: Is. 51:12; 66:13; 2 Cor. 7:6, 7, 13
  - type: text
    content: 'comforts us in all our tribulation, that we may be able to comfort those who are in any trouble, with the comfort with which we ourselves are comforted by God. '
  '5':
  - type: text
    content: 'For as '
  - type: note
    content: (Acts 9:4); 2 Cor. 4:10; Phil. 3:10; Col. 1:24
  - type: text
    content: 'the sufferings of Christ abound in us, so our consolation also abounds through Christ. '
  '6':
  - type: text
    content: 'Now if we are afflicted, '
  - type: note
    content: 2 Cor. 4:15; 12:15; Eph. 3:1, 13; 2 Tim. 2:10
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' for your consolation and salvation, which is effective for enduring the same sufferings which we also suffer. Or if we are comforted, it is for your consolation and salvation. '
  '7':
  - type: text
    content: 'And our hope for you '
  - type: text
    content: is
  - type: text
    content: ' steadfast, because we know that '
  - type: note
    content: (Rom. 8:17; 2 Tim. 2:12)
  - type: text
    content: 'as you are partakers of the sufferings, so also '
  - type: text
    content: you
  - type: text
    content: ' '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: partake
  - type: text
    content: ' of the consolation.'
  - type: heading
    content: Delivered from Suffering
  '8':
  - type: text
    content: 'For we do not want you to be ignorant, brethren, of '
  - type: note
    content: Acts 19:23; 1 Cor. 15:32; 16:9
  - type: text
    content: 'our trouble which came to us in Asia: that we were burdened beyond measure, above strength, so that we despaired even of life. '
  '9':
  - type: text
    content: 'Yes, we had the sentence of death in ourselves, that we should '
  - type: note
    content: Jer. 17:5, 7
  - type: text
    content: 'not trust in ourselves but in God who raises the dead, '
