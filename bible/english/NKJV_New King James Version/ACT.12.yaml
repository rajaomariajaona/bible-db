  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 13:5, 13; 15:37; 2 Tim. 4:11; Philem. 24; 1 Pet. 5:13
    marker-yv: yv-n
  - type: text
    text: 'John whose surname was Mark, where many were gathered together '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 12:5
    marker-yv: yv-n
  - type: text
    text: 'praying. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And as Peter knocked at the door of the gate, a girl named Rhoda came to answer. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When she recognized Peter’s voice, because of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: her
  - type: text
    text: ' gladness she did not open the gate, but ran in and announced that Peter stood before the gate. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But they said to her, “You are beside yourself!” Yet she kept insisting that it was so. So they said, '
