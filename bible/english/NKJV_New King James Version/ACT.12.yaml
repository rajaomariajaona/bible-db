    marker-yv: yv-n
  - type: text
    text: 'the brother of John with the sword. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And because he saw that it pleased the Jews, he proceeded further to seize Peter also. Now it was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: during
  - type: text
    text: ' '
