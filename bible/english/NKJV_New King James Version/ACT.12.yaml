    children:
    - type: text
      text: him
  - type: text
    text: ' in prison, and delivered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' to four squads of soldiers to keep him, intending to bring him before the people after Passover.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Freed from Prison
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Peter was therefore kept in prison, but constant prayer was offered to God for him by the church. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And when Herod was about to bring him out, that night Peter was sleeping, bound with two chains between two soldiers; and the guards before the door were keeping the prison. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now behold, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 5:19
    marker-yv: yv-n
  - type: text
    text: 'an angel of the Lord stood by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him,
  - type: text
    text: ' and a light shone in the prison; and he struck Peter on the side and raised him up, saying, “Arise quickly!” And his chains fell off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' hands. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the angel said to him, “Gird yourself and tie on your sandals”; and so he did. And he said to him, “Put on your garment and follow me.” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So he went out and followed him, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 126:1
    marker-yv: yv-n
  - type: text
    text: 'did not know that what was done by the angel was real, but thought '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 10:3, 17; 11:5
    marker-yv: yv-n
  - type: text
    text: 'he was seeing a vision. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When they were past the first and the second guard posts, they came to the iron gate that leads to the city, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 5:19; 16:26
    marker-yv: yv-n
  - type: text
    text: which opened to them of its own accord; and they went out and went down one street, and immediately the angel departed from him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And when Peter had come to himself, he said, “Now I know for certain that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 34:7); Dan. 3:28; 6:22; (Heb. 1:14)
    marker-yv: yv-n
  - type: text
    text: 'the Lord has sent His angel, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 5:19; (Ps. 33:18, 19; 34:22; 41:2); 2 Cor. 1:10; (2 Pet. 2:9)
    marker-yv: yv-n
  - type: text
    text: 'has delivered me from the hand of Herod and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from
  - type: text
    text: ' all the expectation of the Jewish people.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So, when he had considered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 4:23
    marker-yv: yv-n
  - type: text
