verses:
  '1':
  - type: heading
    content: Herod’s Violence to the Church
  - type: text
    content: 'Now about that time Herod the king stretched out '
  - type: text
    content: his
  - type: text
    content: ' hand to harass some from the church. '
  '10':
  - type: text
    content: 'When they were past the first and the second guard posts, they came to the iron gate that leads to the city, '
  - type: note
    content: Acts 5:19; 16:26
  - type: text
    content: which opened to them of its own accord; and they went out and went down one street, and immediately the angel departed from him.
  '11':
  - type: text
    content: 'And when Peter had come to himself, he said, “Now I know for certain that '
  - type: note
    content: (Ps. 34:7); Dan. 3:28; 6:22; (Heb. 1:14)
  - type: text
    content: 'the Lord has sent His angel, and '
  - type: note
    content: Job 5:19; (Ps. 33:18, 19; 34:22; 41:2); 2 Cor. 1:10; (2 Pet. 2:9)
  - type: text
    content: 'has delivered me from the hand of Herod and '
  - type: text
    content: from
  - type: text
    content: ' all the expectation of the Jewish people.”'
  '12':
  - type: text
    content: 'So, when he had considered '
  - type: text
    content: this,
  - type: text
    content: ' '
  - type: note
    content: Acts 4:23
  - type: text
    content: 'he came to the house of Mary, the mother of '
  - type: note
    content: Acts 13:5, 13; 15:37; 2 Tim. 4:11; Philem. 24; 1 Pet. 5:13
  - type: text
    content: 'John whose surname was Mark, where many were gathered together '
  - type: note
    content: Acts 12:5
  - type: text
    content: 'praying. '
  '13':
  - type: text
    content: 'And as Peter knocked at the door of the gate, a girl named Rhoda came to answer. '
  '14':
  - type: text
    content: 'When she recognized Peter’s voice, because of '
  - type: text
    content: her
  - type: text
    content: ' gladness she did not open the gate, but ran in and announced that Peter stood before the gate. '
  '15':
  - type: text
    content: 'But they said to her, “You are beside yourself!” Yet she kept insisting that it was so. So they said, '
  - type: note
    content: Gen. 48:16; (Matt. 18:10)
  - type: text
    content: “It is his angel.”
  '16':
  - type: text
    content: 'Now Peter continued knocking; and when they opened '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: door
  - type: text
    content: ' and saw him, they were astonished. '
  '17':
  - type: text
    content: 'But '
  - type: note
    content: Acts 13:16; 19:33; 21:40
  - type: text
    content: motioning to them with his hand to keep silent, he declared to them how the Lord had brought him out of the prison. And he said, “Go, tell these things to James and to the brethren.” And he departed and went to another place.
  '18':
  - type: text
    content: 'Then, as soon as it was day, there was no small stir among the soldiers about what had become of Peter. '
  '19':
  - type: text
    content: 'But when Herod had searched for him and not found him, he examined the guards and commanded that '
  - type: text
    content: they
  - type: text
    content: ' should be put to death.'
  - type: text
    content: 'And he went down from Judea to Caesarea, and stayed '
  - type: text
    content: there.
  - type: heading
    content: Herod’s Violent Death
  '2':
  - type: text
    content: 'Then he killed James '
  - type: note
    content: Matt. 4:21; 20:23
  - type: text
    content: 'the brother of John with the sword. '
  '20':
  - type: text
    content: 'Now Herod had been very angry with the people of '
  - type: note
    content: Matt. 11:21
  - type: text
    content: 'Tyre and Sidon; but they came to him with one accord, and having made Blastus the king’s personal aide their friend, they asked for peace, because '
  - type: note
    content: 1 Kin. 5:11; Ezra 3:7; Ezek. 27:17
  - type: text
    content: 'their country was supplied with food by the king’s '
  - type: text
    content: country.
  '21':
  - type: text
    content: 'So on a set day Herod, arrayed in royal apparel, sat on his throne and gave an oration to them. '
  '22':
  - type: text
    content: 'And the people kept shouting, “The voice of a god and not of a man!” '
  '23':
  - type: text
    content: 'Then immediately an angel of the Lord '
  - type: note
    content: 1 Sam. 25:38; 2 Sam. 24:16, 17; 2 Kin. 19:35; Acts 5:19
  - type: text
    content: 'struck him, because '
  - type: note
    content: Ps. 115:1
  - type: text
    content: he did not give glory to God. And he was eaten by worms and died.
  '24':
  - type: text
    content: 'But '
  - type: note
    content: Is. 55:11; Acts 6:7; 19:20
  - type: text
    content: the word of God grew and multiplied.
  - type: heading
    content: Barnabas and Saul Appointed
  '25':
  - type: text
    content: 'And '
  - type: note
    content: Acts 11:30
  - type: text
    content: 'Barnabas and Saul returned from Jerusalem when they had '
  - type: note
    content: Acts 11:30
  - type: text
    content: 'fulfilled '
  - type: text
    content: their
  - type: text
    content: ' ministry, and they also '
  - type: note
    content: Acts 13:5, 13
  - type: text
    content: 'took with them '
  - type: note
    content: Acts 12:12; 15:37
  - type: text
    content: John whose surname was Mark.
  '3':
  - type: text
    content: 'And because he saw that it pleased the Jews, he proceeded further to seize Peter also. Now it was '
  - type: text
    content: during
  - type: text
    content: ' '
  - type: note
    content: Ex. 12:15; 23:15; Acts 20:6
  - type: text
    content: 'the Days of Unleavened Bread. '
  '4':
  - type: text
    content: 'So '
  - type: note
    content: John 21:18
  - type: text
    content: 'when he had arrested him, he put '
  - type: text
    content: him
  - type: text
    content: ' in prison, and delivered '
  - type: text
    content: him
  - type: text
    content: ' to four squads of soldiers to keep him, intending to bring him before the people after Passover.'
  - type: heading
    content: Peter Freed from Prison
  '5':
  - type: text
    content: 'Peter was therefore kept in prison, but constant prayer was offered to God for him by the church. '
  '6':
  - type: text
    content: 'And when Herod was about to bring him out, that night Peter was sleeping, bound with two chains between two soldiers; and the guards before the door were keeping the prison. '
  '7':
  - type: text
    content: 'Now behold, '
  - type: note
    content: Acts 5:19
  - type: text
    content: 'an angel of the Lord stood by '
  - type: text
    content: him,
  - type: text
    content: ' and a light shone in the prison; and he struck Peter on the side and raised him up, saying, “Arise quickly!” And his chains fell off '
  - type: text
    content: his
  - type: text
    content: ' hands. '
  '8':
  - type: text
    content: 'Then the angel said to him, “Gird yourself and tie on your sandals”; and so he did. And he said to him, “Put on your garment and follow me.” '
  '9':
  - type: text
    content: 'So he went out and followed him, and '
  - type: note
    content: Ps. 126:1
  - type: text
    content: 'did not know that what was done by the angel was real, but thought '
  - type: note
    content: Acts 10:3, 17; 11:5
  - type: text
    content: 'he was seeing a vision. '
