document_id: ACT.12,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Herod’s Violence to the Church
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now about that time Herod the king stretched out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' hand to harass some from the church. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they were past the first and the second guard posts, they came to the iron gate that leads to the city, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 5:19; 16:26
      marker-yv: yv-n
    - type: text
      text: which opened to them of its own accord; and they went out and went down one street, and immediately the angel departed from him.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Peter had come to himself, he said, “Now I know for certain that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 34:7); Dan. 3:28; 6:22; (Heb. 1:14)
      marker-yv: yv-n
    - type: text
      text: 'the Lord has sent His angel, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:19; (Ps. 33:18, 19; 34:22; 41:2); 2 Cor. 1:10; (2 Pet. 2:9)
      marker-yv: yv-n
    - type: text
      text: 'has delivered me from the hand of Herod and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' all the expectation of the Jewish people.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So, when he had considered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:23
      marker-yv: yv-n
    - type: text
      text: 'he came to the house of Mary, the mother of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:5, 13; 15:37; 2 Tim. 4:11; Philem. 24; 1 Pet. 5:13
      marker-yv: yv-n
    - type: text
      text: 'John whose surname was Mark, where many were gathered together '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 12:5
      marker-yv: yv-n
    - type: text
      text: 'praying. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as Peter knocked at the door of the gate, a girl named Rhoda came to answer. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When she recognized Peter’s voice, because of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' gladness she did not open the gate, but ran in and announced that Peter stood before the gate. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they said to her, “You are beside yourself!” Yet she kept insisting that it was so. So they said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 48:16; (Matt. 18:10)
      marker-yv: yv-n
    - type: text
      text: “It is his angel.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Peter continued knocking; and when they opened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: door
    - type: text
      text: ' and saw him, they were astonished. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:16; 19:33; 21:40
      marker-yv: yv-n
    - type: text
      text: motioning to them with his hand to keep silent, he declared to them how the Lord had brought him out of the prison. And he said, “Go, tell these things to James and to the brethren.” And he departed and went to another place.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then, as soon as it was day, there was no small stir among the soldiers about what had become of Peter. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when Herod had searched for him and not found him, he examined the guards and commanded that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' should be put to death.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he went down from Judea to Caesarea, and stayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Herod’s Violent Death
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he killed James '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 4:21; 20:23
      marker-yv: yv-n
    - type: text
      text: 'the brother of John with the sword. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Herod had been very angry with the people of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 11:21
      marker-yv: yv-n
    - type: text
      text: 'Tyre and Sidon; but they came to him with one accord, and having made Blastus the king’s personal aide their friend, they asked for peace, because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 5:11; Ezra 3:7; Ezek. 27:17
      marker-yv: yv-n
    - type: text
      text: 'their country was supplied with food by the king’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: country.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So on a set day Herod, arrayed in royal apparel, sat on his throne and gave an oration to them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people kept shouting, “The voice of a god and not of a man!” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then immediately an angel of the Lord '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 25:38; 2 Sam. 24:16, 17; 2 Kin. 19:35; Acts 5:19
      marker-yv: yv-n
    - type: text
      text: 'struck him, because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 115:1
      marker-yv: yv-n
    - type: text
      text: he did not give glory to God. And he was eaten by worms and died.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 55:11; Acts 6:7; 19:20
      marker-yv: yv-n
    - type: text
      text: the word of God grew and multiplied.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Barnabas and Saul Appointed
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 11:30
      marker-yv: yv-n
    - type: text
      text: 'Barnabas and Saul returned from Jerusalem when they had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 11:30
      marker-yv: yv-n
    - type: text
      text: 'fulfilled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' ministry, and they also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:5, 13
      marker-yv: yv-n
    - type: text
      text: 'took with them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 12:12; 15:37
      marker-yv: yv-n
    - type: text
      text: John whose surname was Mark.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And because he saw that it pleased the Jews, he proceeded further to seize Peter also. Now it was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: during
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:15; 23:15; Acts 20:6
      marker-yv: yv-n
    - type: text
      text: 'the Days of Unleavened Bread. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 21:18
      marker-yv: yv-n
    - type: text
      text: 'when he had arrested him, he put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' in prison, and delivered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' to four squads of soldiers to keep him, intending to bring him before the people after Passover.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter Freed from Prison
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peter was therefore kept in prison, but constant prayer was offered to God for him by the church. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Herod was about to bring him out, that night Peter was sleeping, bound with two chains between two soldiers; and the guards before the door were keeping the prison. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 5:19
      marker-yv: yv-n
    - type: text
      text: 'an angel of the Lord stood by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him,
    - type: text
      text: ' and a light shone in the prison; and he struck Peter on the side and raised him up, saying, “Arise quickly!” And his chains fell off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' hands. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the angel said to him, “Gird yourself and tie on your sandals”; and so he did. And he said to him, “Put on your garment and follow me.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he went out and followed him, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 126:1
      marker-yv: yv-n
    - type: text
      text: 'did not know that what was done by the angel was real, but thought '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 10:3, 17; 11:5
      marker-yv: yv-n
    - type: text
      text: 'he was seeing a vision. '
