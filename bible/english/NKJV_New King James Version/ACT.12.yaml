      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now about that time Herod the king stretched out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' hand to harass some from the church. '
  - type: usfm
