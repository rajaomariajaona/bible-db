    marker: x
    children:
    - type: text
      text: Gen. 48:16; (Matt. 18:10)
    marker-yv: yv-n
  - type: text
    text: “It is his angel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now Peter continued knocking; and when they opened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: door
  - type: text
    text: ' and saw him, they were astonished. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 13:16; 19:33; 21:40
    marker-yv: yv-n
  - type: text
    text: motioning to them with his hand to keep silent, he declared to them how the Lord had brought him out of the prison. And he said, “Go, tell these things to James and to the brethren.” And he departed and went to another place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then, as soon as it was day, there was no small stir among the soldiers about what had become of Peter. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But when Herod had searched for him and not found him, he examined the guards and commanded that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they
  - type: text
    text: ' should be put to death.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And he went down from Judea to Caesarea, and stayed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Herod’s Violent Death
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now Herod had been very angry with the people of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 11:21
    marker-yv: yv-n
  - type: text
    text: 'Tyre and Sidon; but they came to him with one accord, and having made Blastus the king’s personal aide their friend, they asked for peace, because '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:11; Ezra 3:7; Ezek. 27:17
    marker-yv: yv-n
  - type: text
    text: 'their country was supplied with food by the king’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: country.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So on a set day Herod, arrayed in royal apparel, sat on his throne and gave an oration to them. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the people kept shouting, “The voice of a god and not of a man!” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then immediately an angel of the Lord '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 25:38; 2 Sam. 24:16, 17; 2 Kin. 19:35; Acts 5:19
    marker-yv: yv-n
  - type: text
    text: 'struck him, because '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 115:1
    marker-yv: yv-n
  - type: text
    text: he did not give glory to God. And he was eaten by worms and died.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
