document_id: PRO.7
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My son, keep my words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 2:1
    marker-yv: yv-n
  - type: text
    text: treasure my commands within you.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 18:5; Prov. 4:4; (Is. 55:3)
    marker-yv: yv-n
  - type: text
    text: Keep my commands and live,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 32:10; Ps. 17:8; Zech. 2:8
    marker-yv: yv-n
  - type: text
    text: And my law as the apple of your eye.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 6:8; Prov. 6:21
    marker-yv: yv-n
  - type: text
    text: Bind them on your fingers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Write them on the tablet of your heart.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Say to wisdom, “You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' my sister,”'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And call understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' nearest kin,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 2:16; 5:3
    marker-yv: yv-n
  - type: text
    text: That they may keep you from the immoral woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'From the seductress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' flatters with her words.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Crafty Harlot
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For at the window of my house
- type: usfm
  marker: q2
  children:
  - type: text
    text: I looked through my lattice,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And saw among the simple,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I perceived among the youths,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'A young man '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Prov. 6:32; 9:4, 16)
    marker-yv: yv-n
  - type: text
    text: devoid of understanding,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Passing along the street near her corner;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he took the path to her house
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 24:15
    marker-yv: yv-n
  - type: text
    text: In the twilight, in the evening,
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the black and dark night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And there a woman met him,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: With
  - type: text
    text: ' the attire of a harlot, and a crafty heart.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 9:13; 1 Tim. 5:13
    marker-yv: yv-n
  - type: text
    text: 'She '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' loud and rebellious,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Titus 2:5
    marker-yv: yv-n
  - type: text
    text: Her feet would not stay at home.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'At times '
  - type: usfm
    marker: it
    children:
    - type: text
      text: she
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' outside, at times in the open square,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Lurking at every corner.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So she caught him and kissed him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'With an impudent face she said to him:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: I
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: have
  - type: text
    text: ' peace offerings with me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Today I have paid my vows.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So I came out to meet you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Diligently to seek your face,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I have found you.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I have spread my bed with tapestry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Colored coverings of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 19:9; Ezek. 27:7
    marker-yv: yv-n
  - type: text
    text: Egyptian linen.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I have perfumed my bed
- type: usfm
  marker: q2
  children:
  - type: text
    text: With myrrh, aloes, and cinnamon.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Come, let us take our fill of love until morning;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let us delight ourselves with love.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For my husband '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' not at home;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has gone on a long journey;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He has taken a bag of money with him,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: And
  - type: text
    text: ' will come home on the appointed day.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'With '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 5:3
    marker-yv: yv-n
  - type: text
    text: her enticing speech she caused him to yield,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 12:2
    marker-yv: yv-n
  - type: text
    text: With her flattering lips she seduced him.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Immediately he went after her, as an ox goes to the slaughter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or as a fool to the correction of the stocks,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Till an arrow struck his liver.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eccl. 9:12
    marker-yv: yv-n
  - type: text
    text: As a bird hastens to the snare,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He did not know it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: would
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: cost
  - type: text
    text: ' his life.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Now therefore, listen to me, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: my
  - type: text
    text: ' children;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Pay attention to the words of my mouth:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Do not let your heart turn aside to her ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not stray into her paths;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: For she has cast down many wounded,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 13:26
    marker-yv: yv-n
  - type: text
    text: 'all who were slain by her were strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: men.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 2:18; 5:5; 9:18; (1 Cor. 6:9, 10; Rev. 22:15)
    marker-yv: yv-n
  - type: text
    text: 'Her house '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the way to hell,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Descending to the chambers of death.
