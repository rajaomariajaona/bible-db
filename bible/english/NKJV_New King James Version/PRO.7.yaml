verses:
  '1':
  - type: text
    content: My son, keep my words,
  - type: text
    content: 'And '
  - type: note
    content: Prov. 2:1
  - type: text
    content: treasure my commands within you.
  '10':
  - type: text
    content: And there a woman met him,
  - type: text
    content: With
  - type: text
    content: ' the attire of a harlot, and a crafty heart.'
  '11':
  - type: note
    content: Prov. 9:13; 1 Tim. 5:13
  - type: text
    content: 'She '
  - type: text
    content: was
  - type: text
    content: ' loud and rebellious,'
  - type: note
    content: Titus 2:5
  - type: text
    content: Her feet would not stay at home.
  '12':
  - type: text
    content: 'At times '
  - type: text
    content: she
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' outside, at times in the open square,'
  - type: text
    content: Lurking at every corner.
  '13':
  - type: text
    content: So she caught him and kissed him;
  - type: text
    content: 'With an impudent face she said to him:'
  '14':
  - type: text
    content: “
  - type: text
    content: I
  - type: text
    content: ' '
  - type: text
    content: have
  - type: text
    content: ' peace offerings with me;'
  - type: text
    content: Today I have paid my vows.
  '15':
  - type: text
    content: So I came out to meet you,
  - type: text
    content: Diligently to seek your face,
  - type: text
    content: And I have found you.
  '16':
  - type: text
    content: I have spread my bed with tapestry,
  - type: text
    content: 'Colored coverings of '
  - type: note
    content: Is. 19:9; Ezek. 27:7
  - type: text
    content: Egyptian linen.
  '17':
  - type: text
    content: I have perfumed my bed
  - type: text
    content: With myrrh, aloes, and cinnamon.
  '18':
  - type: text
    content: Come, let us take our fill of love until morning;
  - type: text
    content: Let us delight ourselves with love.
  '19':
  - type: text
    content: 'For my husband '
  - type: text
    content: is
  - type: text
    content: ' not at home;'
  - type: text
    content: He has gone on a long journey;
  '2':
  - type: note
    content: Lev. 18:5; Prov. 4:4; (Is. 55:3)
  - type: text
    content: Keep my commands and live,
  - type: note
    content: Deut. 32:10; Ps. 17:8; Zech. 2:8
  - type: text
    content: And my law as the apple of your eye.
  '20':
  - type: text
    content: He has taken a bag of money with him,
  - type: text
    content: And
  - type: text
    content: ' will come home on the appointed day.”'
  '21':
  - type: text
    content: 'With '
  - type: note
    content: Prov. 5:3
  - type: text
    content: her enticing speech she caused him to yield,
  - type: note
    content: Ps. 12:2
  - type: text
    content: With her flattering lips she seduced him.
  '22':
  - type: text
    content: Immediately he went after her, as an ox goes to the slaughter,
  - type: text
    content: Or as a fool to the correction of the stocks,
  '23':
  - type: text
    content: Till an arrow struck his liver.
  - type: note
    content: Eccl. 9:12
  - type: text
    content: As a bird hastens to the snare,
  - type: text
    content: 'He did not know it '
  - type: text
    content: would
  - type: text
    content: ' '
  - type: text
    content: cost
  - type: text
    content: ' his life.'
  '24':
  - type: text
    content: 'Now therefore, listen to me, '
  - type: text
    content: my
  - type: text
    content: ' children;'
  - type: text
    content: 'Pay attention to the words of my mouth:'
  '25':
  - type: text
    content: Do not let your heart turn aside to her ways,
  - type: text
    content: Do not stray into her paths;
  '26':
  - type: text
    content: For she has cast down many wounded,
  - type: text
    content: 'And '
  - type: note
    content: Neh. 13:26
  - type: text
    content: 'all who were slain by her were strong '
  - type: text
    content: men.
  '27':
  - type: note
    content: Prov. 2:18; 5:5; 9:18; (1 Cor. 6:9, 10; Rev. 22:15)
  - type: text
    content: 'Her house '
  - type: text
    content: is
  - type: text
    content: ' the way to hell,'
  - type: text
    content: Descending to the chambers of death.
  '3':
  - type: note
    content: Deut. 6:8; Prov. 6:21
  - type: text
    content: Bind them on your fingers;
  - type: text
    content: Write them on the tablet of your heart.
  '4':
  - type: text
    content: 'Say to wisdom, “You '
  - type: text
    content: are
  - type: text
    content: ' my sister,”'
  - type: text
    content: 'And call understanding '
  - type: text
    content: your
  - type: text
    content: ' nearest kin,'
  '5':
  - type: note
    content: Prov. 2:16; 5:3
  - type: text
    content: That they may keep you from the immoral woman,
  - type: text
    content: 'From the seductress '
  - type: text
    content: who
  - type: text
    content: ' flatters with her words.'
  - type: heading
    content: The Crafty Harlot
  '6':
  - type: text
    content: For at the window of my house
  - type: text
    content: I looked through my lattice,
  '7':
  - type: text
    content: And saw among the simple,
  - type: text
    content: I perceived among the youths,
  - type: text
    content: 'A young man '
  - type: note
    content: (Prov. 6:32; 9:4, 16)
  - type: text
    content: devoid of understanding,
  '8':
  - type: text
    content: Passing along the street near her corner;
  - type: text
    content: And he took the path to her house
  '9':
  - type: note
    content: Job 24:15
  - type: text
    content: In the twilight, in the evening,
  - type: text
    content: In the black and dark night.
