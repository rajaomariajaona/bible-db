document_id: DEU.18,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Portion of the Priests and Levites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The priests, the Levites—all the tribe of Levi—shall have no part nor '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 10:9; 1 Cor. 9:13
      marker-yv: yv-n
    - type: text
      text: 'inheritance with Israel; they shall eat the offerings of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made by fire, and His portion. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There shall not be found among you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anyone
    - type: text
      text: ' who makes his son or his daughter '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:21; Deut. 12:31
      marker-yv: yv-n
    - type: text
      text: 'pass through the fire, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:18; Lev. 19:26, 31; 20:6, 27; Is. 8:19
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' who practices witchcraft, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a soothsayer, or one who interprets omens, or a sorcerer, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 20:27
      marker-yv: yv-n
    - type: text
      text: 'or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 28:7
      marker-yv: yv-n
    - type: text
      text: 'one who conjures spells, or a medium, or a spiritist, or one who calls up the dead. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For all who do these things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' an abomination to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:24; Deut. 9:4
      marker-yv: yv-n
    - type: text
      text: 'because of these abominations the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God drives them out from before you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall be blameless before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For these nations which you will dispossess listened to soothsayers and diviners; but as for you, the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has not appointed such for you.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A New Prophet Like Moses
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 21:11; Luke 1:76; 2:25–34; 7:16; 24:19; Acts 3:22
      marker-yv: yv-n
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will raise up for you a Prophet like me from your midst, from your brethren. Him you shall hear, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'according to all you desired of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God in Horeb '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 5:23–27
      marker-yv: yv-n
    - type: text
      text: 'in the day of the assembly, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:18, 19; Heb. 12:19
      marker-yv: yv-n
    - type: text
      text: '‘Let me not hear again the voice of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, nor let me see this great fire anymore, lest I die.’'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 5:28
      marker-yv: yv-n
    - type: text
      text: '‘What they have spoken is good. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 34:10; John 1:45; Acts 3:22
      marker-yv: yv-n
    - type: text
      text: 'I will raise up for them a Prophet like you from among their brethren, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 23:5; Is. 49:2; 51:16; John 17:8
      marker-yv: yv-n
    - type: text
      text: 'will put My words in His mouth, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 4:25; 8:28)
      marker-yv: yv-n
    - type: text
      text: 'and He shall speak to them all that I command Him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 3:23; (Heb. 12:25)
      marker-yv: yv-n
    - type: text
      text: 'And it shall be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' whoever will not hear My words, which He speaks in My name, I will require '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' of him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore they shall have no inheritance among their brethren; the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is their inheritance, as He said to them.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 13:5; Jer. 14:14, 15; Zech. 13:2–5
      marker-yv: yv-n
    - type: text
      text: 'the prophet who presumes to speak a word in My name, which I have not commanded him to speak, or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 13:1–3; Jer. 2:8
      marker-yv: yv-n
    - type: text
      text: 'who speaks in the name of other gods, that prophet shall die.’ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if you say in your heart, ‘How shall we know the word which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not spoken?’— '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 28:9
      marker-yv: yv-n
    - type: text
      text: 'when a prophet speaks in the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 13:2
      marker-yv: yv-n
    - type: text
      text: 'if the thing does not happen or come to pass, that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the thing which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not spoken; the prophet has spoken it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 18:20
      marker-yv: yv-n
    - type: text
      text: presumptuously; you shall not be afraid of him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And this shall be the priest’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:32–34; Num. 18:11, 12; 1 Sam. 2:13–16, 29
      marker-yv: yv-n
    - type: text
      text: 'due from the people, from those who offer a sacrifice, whether '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' bull or sheep: they shall give to the priest the shoulder, the cheeks, and the stomach. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:29
      marker-yv: yv-n
    - type: text
      text: 'The firstfruits of your grain and your new wine and your oil, and the first of the fleece of your sheep, you shall give him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:1
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has chosen him out of all your tribes '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 10:8
      marker-yv: yv-n
    - type: text
      text: 'to stand to minister in the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', him and his sons forever.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So if a Levite comes from any of your gates, from where he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:2
      marker-yv: yv-n
    - type: text
      text: 'dwells among all Israel, and comes with all the desire of his mind '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:5; 14:23
      marker-yv: yv-n
    - type: text
      text: 'to the place which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' chooses, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then he may serve in the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 1:50; 2 Chr. 31:2
      marker-yv: yv-n
    - type: text
      text: 'as all his brethren the Levites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do,
    - type: text
      text: ' who stand there before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall have equal '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 27:30–33; Num. 18:21–24; 2 Chr. 31:4; Neh. 12:44
      marker-yv: yv-n
    - type: text
      text: portions to eat, besides what comes from the sale of his inheritance.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avoid Wicked Customs
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When you come into the land which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:26, 27, 30; Deut. 12:29, 30; 20:16–18
      marker-yv: yv-n
    - type: text
      text: 'you shall not learn to follow the abominations of those nations. '
