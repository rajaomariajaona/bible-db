document_id: DEU.18,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Portion of the Priests and Levites
  - type: text
    content: '“The priests, the Levites—all the tribe of Levi—shall have no part nor '
  - type: note
    content: Deut. 10:9; 1 Cor. 9:13
  - type: text
    content: 'inheritance with Israel; they shall eat the offerings of the '
  - type: heading
    content: Lord
  - type: text
    content: ' made by fire, and His portion. '
  '10':
  - type: text
    content: 'There shall not be found among you '
  - type: text
    content: anyone
  - type: text
    content: ' who makes his son or his daughter '
  - type: note
    content: Lev. 18:21; Deut. 12:31
  - type: text
    content: 'pass through the fire, '
  - type: note
    content: Ex. 22:18; Lev. 19:26, 31; 20:6, 27; Is. 8:19
  - type: text
    content: or
  - type: text
    content: ' '
  - type: text
    content: one
  - type: text
    content: ' who practices witchcraft, '
  - type: text
    content: or
  - type: text
    content: ' a soothsayer, or one who interprets omens, or a sorcerer, '
  '11':
  - type: note
    content: Lev. 20:27
  - type: text
    content: 'or '
  - type: note
    content: 1 Sam. 28:7
  - type: text
    content: 'one who conjures spells, or a medium, or a spiritist, or one who calls up the dead. '
  '12':
  - type: text
    content: 'For all who do these things '
  - type: text
    content: are
  - type: text
    content: ' an abomination to the '
  - type: heading
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: Lev. 18:24; Deut. 9:4
  - type: text
    content: 'because of these abominations the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God drives them out from before you. '
  '13':
  - type: text
    content: 'You shall be blameless before the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. '
  '14':
  - type: text
    content: 'For these nations which you will dispossess listened to soothsayers and diviners; but as for you, the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has not appointed such for you.'
  - type: heading
    content: A New Prophet Like Moses
  '15':
  - type: note
    content: Matt. 21:11; Luke 1:76; 2:25–34; 7:16; 24:19; Acts 3:22
  - type: text
    content: '“The '
  - type: heading
    content: Lord
  - type: text
    content: ' your God will raise up for you a Prophet like me from your midst, from your brethren. Him you shall hear, '
  '16':
  - type: text
    content: 'according to all you desired of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God in Horeb '
  - type: note
    content: Deut. 5:23–27
  - type: text
    content: 'in the day of the assembly, saying, '
  - type: note
    content: Ex. 20:18, 19; Heb. 12:19
  - type: text
    content: '‘Let me not hear again the voice of the '
  - type: heading
    content: Lord
  - type: text
    content: ' my God, nor let me see this great fire anymore, lest I die.’'
  '17':
  - type: text
    content: '“And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to me: '
  - type: note
    content: Deut. 5:28
  - type: text
    content: '‘What they have spoken is good. '
  '18':
  - type: note
    content: Deut. 34:10; John 1:45; Acts 3:22
  - type: text
    content: 'I will raise up for them a Prophet like you from among their brethren, and '
  - type: note
    content: Num. 23:5; Is. 49:2; 51:16; John 17:8
  - type: text
    content: 'will put My words in His mouth, '
  - type: note
    content: (John 4:25; 8:28)
  - type: text
    content: 'and He shall speak to them all that I command Him. '
  '19':
  - type: note
    content: Acts 3:23; (Heb. 12:25)
  - type: text
    content: 'And it shall be '
  - type: text
    content: that
  - type: text
    content: ' whoever will not hear My words, which He speaks in My name, I will require '
  - type: text
    content: it
  - type: text
    content: ' of him. '
  '2':
  - type: text
    content: 'Therefore they shall have no inheritance among their brethren; the '
  - type: heading
    content: Lord
  - type: text
    content: ' is their inheritance, as He said to them.'
  '20':
  - type: text
    content: 'But '
  - type: note
    content: Deut. 13:5; Jer. 14:14, 15; Zech. 13:2–5
  - type: text
    content: 'the prophet who presumes to speak a word in My name, which I have not commanded him to speak, or '
  - type: note
    content: Deut. 13:1–3; Jer. 2:8
  - type: text
    content: 'who speaks in the name of other gods, that prophet shall die.’ '
  '21':
  - type: text
    content: 'And if you say in your heart, ‘How shall we know the word which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has not spoken?’— '
  '22':
  - type: note
    content: Jer. 28:9
  - type: text
    content: 'when a prophet speaks in the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Deut. 13:2
  - type: text
    content: 'if the thing does not happen or come to pass, that '
  - type: text
    content: is
  - type: text
    content: ' the thing which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has not spoken; the prophet has spoken it '
  - type: note
    content: Deut. 18:20
  - type: text
    content: presumptuously; you shall not be afraid of him.
  '3':
  - type: text
    content: '“And this shall be the priest’s '
  - type: note
    content: Lev. 7:32–34; Num. 18:11, 12; 1 Sam. 2:13–16, 29
  - type: text
    content: 'due from the people, from those who offer a sacrifice, whether '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' bull or sheep: they shall give to the priest the shoulder, the cheeks, and the stomach. '
  '4':
  - type: note
    content: Ex. 22:29
  - type: text
    content: 'The firstfruits of your grain and your new wine and your oil, and the first of the fleece of your sheep, you shall give him. '
  '5':
  - type: text
    content: 'For '
  - type: note
    content: Ex. 28:1
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has chosen him out of all your tribes '
  - type: note
    content: Deut. 10:8
  - type: text
    content: 'to stand to minister in the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ', him and his sons forever.'
  '6':
  - type: text
    content: '“So if a Levite comes from any of your gates, from where he '
  - type: note
    content: Num. 35:2
  - type: text
    content: 'dwells among all Israel, and comes with all the desire of his mind '
  - type: note
    content: Deut. 12:5; 14:23
  - type: text
    content: 'to the place which the '
  - type: heading
    content: Lord
  - type: text
    content: ' chooses, '
  '7':
  - type: text
    content: 'then he may serve in the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' his God '
  - type: note
    content: Num. 1:50; 2 Chr. 31:2
  - type: text
    content: 'as all his brethren the Levites '
  - type: text
    content: do,
  - type: text
    content: ' who stand there before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'They shall have equal '
  - type: note
    content: Lev. 27:30–33; Num. 18:21–24; 2 Chr. 31:4; Neh. 12:44
  - type: text
    content: portions to eat, besides what comes from the sale of his inheritance.
  - type: heading
    content: Avoid Wicked Customs
  '9':
  - type: text
    content: '“When you come into the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God is giving you, '
  - type: note
    content: Lev. 18:26, 27, 30; Deut. 12:29, 30; 20:16–18
  - type: text
    content: 'you shall not learn to follow the abominations of those nations. '
