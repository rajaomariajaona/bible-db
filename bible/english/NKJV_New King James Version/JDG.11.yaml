document_id: JDG.11,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jephthah
  - type: text
    content: 'Now '
  - type: note
    content: Heb. 11:32
  - type: text
    content: 'Jephthah the Gileadite was '
  - type: note
    content: Judg. 6:12; 2 Kin. 5:1
  - type: text
    content: 'a mighty man of valor, but he '
  - type: text
    content: was
  - type: text
    content: ' the son of a harlot; and Gilead begot Jephthah. '
  '10':
  - type: text
    content: 'And the elders of Gilead said to Jephthah, '
  - type: note
    content: Gen. 31:49, 50; Jer. 29:23; 42:5
  - type: text
    content: '“The '
  - type: heading
    content: Lord
  - type: text
    content: ' will be a witness between us, if we do not do according to your words.” '
  '11':
  - type: text
    content: 'Then Jephthah went with the elders of Gilead, and the people made him '
  - type: note
    content: Judg. 11:8
  - type: text
    content: 'head and commander over them; and Jephthah spoke all his words '
  - type: note
    content: Judg. 10:17; 20:1; 1 Sam. 10:17
  - type: text
    content: 'before the '
  - type: heading
    content: Lord
  - type: text
    content: ' in Mizpah.'
  '12':
  - type: text
    content: 'Now Jephthah sent messengers to the king of the people of Ammon, saying, '
  - type: note
    content: 2 Sam. 16:10
  - type: text
    content: “What do you have against me, that you have come to fight against me in my land?”
  '13':
  - type: text
    content: 'And the king of the people of Ammon answered the messengers of Jephthah, '
  - type: note
    content: Num. 21:24–26
  - type: text
    content: '“Because Israel took away my land when they came up out of Egypt, from '
  - type: note
    content: Josh. 13:9
  - type: text
    content: 'the Arnon as far as '
  - type: note
    content: Gen. 32:22
  - type: text
    content: 'the Jabbok, and to the Jordan. Now therefore, restore those '
  - type: text
    content: lands
  - type: text
    content: ' peaceably.”'
  '14':
  - type: text
    content: 'So Jephthah again sent messengers to the king of the people of Ammon, '
  '15':
  - type: text
    content: 'and said to him, “Thus says Jephthah: '
  - type: note
    content: Deut. 2:9, 19
  - type: text
    content: '‘Israel did not take away the land of Moab, nor the land of the people of Ammon; '
  '16':
  - type: text
    content: 'for when Israel came up from Egypt, they walked through the wilderness as far as the Red Sea and '
  - type: note
    content: Num. 13:26; 20:1
  - type: text
    content: 'came to Kadesh. '
  '17':
  - type: text
    content: 'Then '
  - type: note
    content: Num. 20:14
  - type: text
    content: 'Israel sent messengers to the king of Edom, saying, “Please let me pass through your land.” '
  - type: note
    content: Num. 20:14–21
  - type: text
    content: 'But the king of Edom would not heed. And in like manner they sent to the '
  - type: note
    content: Josh. 24:9
  - type: text
    content: 'king of Moab, but he would not '
  - type: text
    content: consent.
  - type: text
    content: ' So Israel '
  - type: note
    content: Num. 20:1
  - type: text
    content: 'remained in Kadesh. '
  '18':
  - type: text
    content: 'And they '
  - type: note
    content: Deut. 2:9, 18, 19
  - type: text
    content: 'went along through the wilderness and '
  - type: note
    content: Num. 21:4
  - type: text
    content: 'bypassed the land of Edom and the land of Moab, came to the east side of the land of Moab, and encamped on the other side of the Arnon. But they did not enter the border of Moab, for the Arnon '
  - type: text
    content: was
  - type: text
    content: ' the border of Moab. '
  '19':
  - type: text
    content: 'Then '
  - type: note
    content: Num. 21:21; Deut. 2:26–36
  - type: text
    content: 'Israel sent messengers to Sihon king of the Amorites, king of Heshbon; and Israel said to him, “Please '
  - type: note
    content: Num. 21:22; Deut. 2:27
  - type: text
    content: 'let us pass through your land into our place.” '
  '2':
  - type: text
    content: 'Gilead’s wife bore sons; and when his wife’s sons grew up, they drove Jephthah out, and said to him, “You shall have '
  - type: note
    content: Gen. 21:10; Deut. 23:2
  - type: text
    content: 'no inheritance in our father’s house, for you '
  - type: text
    content: are
  - type: text
    content: ' the son of another woman.” '
  '20':
  - type: note
    content: Num. 21:23; Deut. 2:27
  - type: text
    content: 'But Sihon did not trust Israel to pass through his territory. So Sihon gathered all his people together, encamped in Jahaz, and fought against Israel. '
  '21':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel '
  - type: note
    content: Josh. 24:8
  - type: text
    content: 'delivered Sihon and all his people into the hand of Israel, and they '
  - type: note
    content: Num. 21:24, 25
  - type: text
    content: 'defeated them. Thus Israel gained possession of all the land of the Amorites, who inhabited that country. '
  '22':
  - type: text
    content: 'They took possession of '
  - type: note
    content: Deut. 2:36, 37
  - type: text
    content: all the territory of the Amorites, from the Arnon to the Jabbok and from the wilderness to the Jordan.
  '23':
  - type: text
    content: '‘And now the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel has dispossessed the Amorites from before His people Israel; should you then possess it? '
  '24':
  - type: text
    content: 'Will you not possess whatever '
  - type: note
    content: Num. 21:29; 1 Kin. 11:7; Jer. 48:7
  - type: text
    content: 'Chemosh your god gives you to possess? So whatever '
  - type: note
    content: (Deut. 9:4, 5; Josh. 3:10)
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God takes possession of before us, we will possess. '
  '25':
  - type: text
    content: 'And now, '
  - type: text
    content: are
  - type: text
    content: ' you any better than '
  - type: note
    content: Num. 22:2; Josh. 24:9; Mic. 6:5
  - type: text
    content: 'Balak the son of Zippor, king of Moab? Did he ever strive against Israel? Did he ever fight against them? '
  '26':
  - type: text
    content: 'While Israel dwelt in '
  - type: note
    content: Num. 21:25, 26
  - type: text
    content: 'Heshbon and its villages, in '
  - type: note
    content: Deut. 2:36
  - type: text
    content: 'Aroer and its villages, and in all the cities along the banks of the Arnon, for three hundred years, why did you not recover '
  - type: text
    content: them
  - type: text
    content: ' within that time? '
  '27':
  - type: text
    content: 'Therefore I have not sinned against you, but you wronged me by fighting against me. May the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Gen. 18:25
  - type: text
    content: 'the Judge, '
  - type: note
    content: Gen. 16:5; 31:53; (1 Sam. 24:12, 15)
  - type: text
    content: 'render judgment this day between the children of Israel and the people of Ammon.’ ” '
  '28':
  - type: text
    content: However, the king of the people of Ammon did not heed the words which Jephthah sent him.
  - type: heading
    content: Jephthah’s Vow and Victory
  '29':
  - type: text
    content: 'Then '
  - type: note
    content: Judg. 3:10
  - type: text
    content: 'the Spirit of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came upon Jephthah, and he passed through Gilead and Manasseh, and passed through Mizpah of Gilead; and from Mizpah of Gilead he advanced '
  - type: text
    content: toward
  - type: text
    content: ' the people of Ammon. '
  '3':
  - type: text
    content: 'Then Jephthah fled from his brothers and dwelt in the land of '
  - type: note
    content: 2 Sam. 10:6, 8
  - type: text
    content: 'Tob; and '
  - type: note
    content: 1 Sam. 22:2
  - type: text
    content: 'worthless men banded together with Jephthah and went out '
  - type: text
    content: raiding
  - type: text
    content: ' with him.'
  '30':
  - type: text
    content: 'And Jephthah '
  - type: note
    content: Gen. 28:20; Num. 30:2; 1 Sam. 1:11
  - type: text
    content: 'made a vow to the '
  - type: heading
    content: Lord
  - type: text
    content: ', and said, “If You will indeed deliver the people of Ammon into my hands, '
  '31':
  - type: text
    content: 'then it will be that whatever comes out of the doors of my house to meet me, when I return in peace from the people of Ammon, '
  - type: note
    content: Lev. 27:2, 3, 28; 1 Sam. 1:11
  - type: text
    content: 'shall surely be the '
  - type: heading
    content: Lord
  - type: text
    content: '’s, '
  - type: note
    content: Ps. 66:13
  - type: text
    content: and I will offer it up as a burnt offering.”
  '32':
  - type: text
    content: 'So Jephthah advanced toward the people of Ammon to fight against them, and the '
  - type: heading
    content: Lord
  - type: text
    content: ' delivered them into his hands. '
  '33':
  - type: text
    content: 'And he defeated them from Aroer as far as '
  - type: note
    content: Ezek. 27:17
  - type: text
    content: Minnith—twenty cities—and to Abel Keramim, with a very great slaughter. Thus the people of Ammon were subdued before the children of Israel.
  - type: heading
    content: Jephthah’s Daughter
  '34':
  - type: text
    content: 'When Jephthah came to his house at '
  - type: note
    content: Judg. 10:17; 11:11
  - type: text
    content: 'Mizpah, there was '
  - type: note
    content: Ex. 15:20; 1 Sam. 18:6; Ps. 68:25; Jer. 31:4
  - type: text
    content: 'his daughter, coming out to meet him with timbrels and dancing; and she '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: text
    content: his
  - type: text
    content: ' only child. Besides her he had neither son nor daughter. '
  '35':
  - type: text
    content: 'And it came to pass, when he saw her, that he '
  - type: note
    content: Gen. 37:29, 34
  - type: text
    content: 'tore his clothes, and said, “Alas, my daughter! You have brought me very low! You are among those who trouble me! For I '
  - type: note
    content: Eccl. 5:2, 4, 5
  - type: text
    content: 'have given my word to the '
  - type: heading
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: Num. 30:2
  - type: text
    content: I cannot go back on it.”
  '36':
  - type: text
    content: 'So she said to him, “My father, '
  - type: text
    content: if
  - type: text
    content: ' you have given your word to the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Num. 30:2
  - type: text
    content: 'do to me according to what has gone out of your mouth, because '
  - type: note
    content: 2 Sam. 18:19, 31
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' has avenged you of your enemies, the people of Ammon.” '
  '37':
  - type: text
    content: 'Then she said to her father, “Let this thing be done for me: let me alone for two months, that I may go and wander on the mountains and bewail my virginity, my friends and I.”'
  '38':
  - type: text
    content: 'So he said, “Go.” And he sent her away '
  - type: text
    content: for
  - type: text
    content: ' two months; and she went with her friends, and bewailed her virginity on the mountains. '
  '39':
  - type: text
    content: 'And it was so at the end of two months that she returned to her father, and he '
  - type: note
    content: Judg. 11:31
  - type: text
    content: carried out his vow with her which he had vowed. She knew no man.
  - type: text
    content: 'And it became a custom in Israel '
  '4':
  - type: text
    content: 'It came to pass after a time that the '
  - type: note
    content: Judg. 10:9, 17
  - type: text
    content: 'people of Ammon made war against Israel. '
  '40':
  - type: text
    content: that
  - type: text
    content: ' the daughters of Israel went four days each year to lament the daughter of Jephthah the Gileadite.'
  '5':
  - type: text
    content: 'And so it was, when the people of Ammon made war against Israel, that the elders of Gilead went to get Jephthah from the land of Tob. '
  '6':
  - type: text
    content: Then they said to Jephthah, “Come and be our commander, that we may fight against the people of Ammon.”
  '7':
  - type: text
    content: 'So Jephthah said to the elders of Gilead, '
  - type: note
    content: Gen. 26:27
  - type: text
    content: “Did you not hate me, and expel me from my father’s house? Why have you come to me now when you are in distress?”
  '8':
  - type: note
    content: Judg. 10:18
  - type: text
    content: 'And the elders of Gilead said to Jephthah, “That is why we have '
  - type: note
    content: (Luke 17:4)
  - type: text
    content: 'turned again to you now, that you may go with us and fight against the people of Ammon, and be '
  - type: note
    content: Judg. 10:18
  - type: text
    content: our head over all the inhabitants of Gilead.”
  '9':
  - type: text
    content: 'So Jephthah said to the elders of Gilead, “If you take me back home to fight against the people of Ammon, and the '
  - type: heading
    content: Lord
  - type: text
    content: ' delivers them to me, shall I be your head?”'
