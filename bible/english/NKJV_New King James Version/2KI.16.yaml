document_id: 2KI.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ahaz Reigns in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the seventeenth year of Pekah the son of Remaliah, Ahaz the son of Jotham, king of Judah, began to reign. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ahaz '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' twenty years old when he became king, and he reigned sixteen years in Jerusalem; and he did not do '
  - type: usfm
    marker: it
    children:
    - type: text
      text: what
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' right in the sight of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God, as his father David '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: done.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But he walked in the way of the kings of Israel; indeed '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Lev. 18:21); 2 Kin. 17:17; 2 Chr. 28:3; Ps. 106:37, 38; Is. 1:1
    marker-yv: yv-n
  - type: text
    text: 'he made his son pass through the fire, according to the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 12:31); 2 Kin. 21:2, 11
    marker-yv: yv-n
  - type: text
    text: 'abominations of the nations whom the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had cast out from before the children of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he sacrificed and burned incense on the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 15:34, 35
    marker-yv: yv-n
  - type: text
    text: 'high places, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 12:2); 1 Kin. 14:23
    marker-yv: yv-n
  - type: text
    text: on the hills, and under every green tree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 15:37; Is. 7:1, 4
    marker-yv: yv-n
  - type: text
    text: 'Then Rezin king of Syria and Pekah the son of Remaliah, king of Israel, came up to Jerusalem to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: make
  - type: text
    text: ' war; and they besieged Ahaz but could not overcome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'At that time Rezin king of Syria '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 14:22; 2 Chr. 26:2
    marker-yv: yv-n
  - type: text
    text: captured Elath for Syria, and drove the men of Judah from Elath. Then the Edomites went to Elath, and dwell there to this day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Ahaz sent messengers to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 15:29; 1 Chr. 5:26; 2 Chr. 28:20
    marker-yv: yv-n
  - type: text
    text: 'Tiglath-Pileser king of Assyria, saying, “I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: am
  - type: text
    text: ' your servant and your son. Come up and save me from the hand of the king of Syria and from the hand of the king of Israel, who rise up against me.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Ahaz '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 12:17, 18; 2 Chr. 28:21
    marker-yv: yv-n
  - type: text
    text: 'took the silver and gold that was found in the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and in the treasuries of the king’s house, and sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' a present to the king of Assyria. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So the king of Assyria heeded him; for the king of Assyria went up against '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 14:28
    marker-yv: yv-n
  - type: text
    text: 'Damascus and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Amos 1:5
    marker-yv: yv-n
  - type: text
    text: 'took it, carried '
  - type: usfm
    marker: it
    children:
    - type: text
      text: its
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: people
  - type: text
    text: ' captive to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 22:6; Amos 9:7
    marker-yv: yv-n
  - type: text
    text: Kir, and killed Rezin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now King Ahaz went to Damascus to meet Tiglath-Pileser king of Assyria, and saw an altar that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' at Damascus; and King Ahaz sent to Urijah the priest the design of the altar and its pattern, according to all its workmanship. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 8:2
    marker-yv: yv-n
  - type: text
    text: 'Urijah the priest built an altar according to all that King Ahaz had sent from Damascus. So Urijah the priest made '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' before King Ahaz came back from Damascus. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And when the king came back from Damascus, the king saw the altar; and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 26:16, 19
    marker-yv: yv-n
  - type: text
    text: 'the king approached the altar and made offerings on it. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So he burned his burnt offering and his grain offering; and he poured his drink offering and sprinkled the blood of his peace offerings on the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He also brought '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 27:1, 2; 40:6, 29; 2 Chr. 4:1
    marker-yv: yv-n
  - type: text
    text: 'the bronze altar which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', from the front of the temple—from between the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: new
  - type: text
    text: ' altar and the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '—and put it on the north side of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: new
  - type: text
    text: ' altar. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then King Ahaz commanded Urijah the priest, saying, “On the great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: new
  - type: text
    text: ' altar burn '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:39–41
    marker-yv: yv-n
  - type: text
    text: 'the morning burnt offering, the evening grain offering, the king’s burnt sacrifice, and his grain offering, with the burnt offering of all the people of the land, their grain offering, and their drink offerings; and sprinkle on it all the blood of the burnt offering and all the blood of the sacrifice. And the bronze altar shall be for me to inquire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by.
  - type: text
    text: '” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Thus did Urijah the priest, according to all that King Ahaz commanded.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 28:24
    marker-yv: yv-n
  - type: text
    text: 'And King Ahaz cut off '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 7:27–29
    marker-yv: yv-n
  - type: text
    text: 'the panels of the carts, and removed the lavers from them; and he took down '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 7:23–25
    marker-yv: yv-n
  - type: text
    text: 'the Sea from the bronze oxen that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' under it, and put it on a pavement of stones. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Also he removed the Sabbath pavilion which they had built in the temple, and he removed the king’s outer entrance from the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', on account of the king of Assyria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now the rest of the acts of Ahaz which he did, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' they not written in the book of the chronicles of the kings of Judah? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So Ahaz rested with his fathers, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 28:27
    marker-yv: yv-n
  - type: text
    text: was buried with his fathers in the City of David. Then Hezekiah his son reigned in his place.
