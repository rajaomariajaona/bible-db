document_id: 2SA.17,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Moreover Ahithophel said to Absalom, “Now let me choose twelve thousand men, and I will arise and pursue David tonight. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And even he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' valiant, whose heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' like the heart of a lion, will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 13:8
      marker-yv: yv-n
    - type: text
      text: 'melt completely. For all Israel knows that your father '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a mighty man, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: those
    - type: text
      text: ' who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' with him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' valiant men. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Therefore I advise that all Israel be fully gathered to you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 2:11
      marker-yv: yv-n
    - type: text
      text: 'from Dan to Beersheba, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:1; 2 Sam. 3:10
      marker-yv: yv-n
    - type: text
      text: 'like the sand that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' by the sea for multitude, and that you go to battle in person. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So we will come upon him in some place where he may be found, and we will fall on him as the dew falls on the ground. And of him and all the men who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' with him there shall not be left so much as one. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Moreover, if he has withdrawn into a city, then all Israel shall bring ropes to that city; and we will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 22:17; Josh. 11:4; 1 Kin. 20:10
      marker-yv: yv-n
    - type: text
      text: pull it into the river, until there is not one small stone found there.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So Absalom and all the men of Israel said, “The advice of Hushai the Archite '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' better than the advice of Ahithophel.” For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mic. 1:6
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had purposed to defeat the good advice of Ahithophel, to the intent that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' might bring disaster on Absalom.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hushai Warns David to Escape
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:31, 34
      marker-yv: yv-n
    - type: text
      text: 'Then Hushai said to Zadok and Abiathar the priests, “Thus and so Ahithophel advised Absalom and the elders of Israel, and thus and so I have advised. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now therefore, send quickly and tell David, saying, ‘Do not spend this night '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:35, 36
      marker-yv: yv-n
    - type: text
      text: 'in the plains of the wilderness, but speedily cross over, lest the king and all the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' with him be swallowed up.’ ” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:28
      marker-yv: yv-n
    - type: text
      text: 'Now Jonathan and Ahimaaz '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:27, 36; 1 Kin. 1:42, 43
      marker-yv: yv-n
    - type: text
      text: 'stayed at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 2:4–6
      marker-yv: yv-n
    - type: text
      text: 'En Rogel, for they dared not be seen coming into the city; so a female servant would come and tell them, and they would go and tell King David. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nevertheless a lad saw them, and told Absalom. But both of them went away quickly and came to a man’s house '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:7; 18:16
      marker-yv: yv-n
    - type: text
      text: 'in Bahurim, who had a well in his court; and they went down into it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 3:16; 16:5
      marker-yv: yv-n
    - type: text
      text: 'Then the woman took and spread a covering over the well’s mouth, and spread ground grain on it; and the thing was not known. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I will come upon him while he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:12
      marker-yv: yv-n
    - type: text
      text: 'weary and weak, and make him afraid. And all the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' with him will flee, and I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 25:18; 2 Sam. 16:14
      marker-yv: yv-n
    - type: text
      text: 'strike only the king. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And when Absalom’s servants came to the woman at the house, they said, “Where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' Ahimaaz and Jonathan?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 2:4–6
      marker-yv: yv-n
    - type: text
      text: the woman said to them, “They have gone over the water brook.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they had searched and could not find '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
    - type: text
      text: ' they returned to Jerusalem. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Now it came to pass, after they had departed, that they came up out of the well and went and told King David, and said to David, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 1:19; (Lev. 19:11); Josh. 2:3–5
      marker-yv: yv-n
    - type: text
      text: '“Arise and cross over the water quickly. For thus has Ahithophel advised against you.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So David and all the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with him arose and crossed over the Jordan. By morning light not one of them was left who had not gone over the Jordan.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Now when Ahithophel saw that his advice was not followed, he saddled a donkey, and arose and went home to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 17:15, 16
      marker-yv: yv-n
    - type: text
      text: 'his house, to his city. Then he put his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:12
      marker-yv: yv-n
    - type: text
      text: 'household in order, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 20:1
      marker-yv: yv-n
    - type: text
      text: hanged himself, and died; and he was buried in his father’s tomb.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then David went to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:5
      marker-yv: yv-n
    - type: text
      text: 'Mahanaim. And Absalom crossed over the Jordan, he and all the men of Israel with him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And Absalom made '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 32:2; Josh. 13:26; 2 Sam. 2:8; 19:32
      marker-yv: yv-n
    - type: text
      text: 'Amasa captain of the army instead of Joab. This Amasa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the son of a man whose name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Jithra, an Israelite, who had gone in to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 19:13; 20:9–12; 1 Kin. 2:5, 32
      marker-yv: yv-n
    - type: text
      text: 'Abigail the daughter of Nahash, sister of Zeruiah, Joab’s mother. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: So Israel and Absalom encamped in the land of Gilead.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Now it happened, when David had come to Mahanaim, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 2:16
      marker-yv: yv-n
    - type: text
      text: 'Shobi the son of Nahash from Rabbah of the people of Ammon, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 11:1; 2 Sam. 10:1; 12:29
      marker-yv: yv-n
    - type: text
      text: 'Machir the son of Ammiel from Lo Debar, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 9:4
      marker-yv: yv-n
    - type: text
      text: 'Barzillai the Gileadite from Rogelim, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'brought beds and basins, earthen vessels and wheat, barley and flour, parched '
    - type: usfm
      marker: it
      children:
      - type: text
        text: grain
    - type: text
      text: ' and beans, lentils and parched '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seeds,
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'honey and curds, sheep and cheese of the herd, for David and the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with him to eat. For they said, “The people are hungry and weary and thirsty '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 19:31, 32; 1 Kin. 2:7
      marker-yv: yv-n
    - type: text
      text: in the wilderness.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then I will bring back all the people to you. When all return except the man whom you seek, all the people will be at peace.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the saying pleased Absalom and all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 13:7
      marker-yv: yv-n
    - type: text
      text: elders of Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Advice of Hushai
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then Absalom said, “Now call Hushai the Archite also, and let us hear what he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:3; 19:11
      marker-yv: yv-n
    - type: text
      text: 'says too.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And when Hushai came to Absalom, Absalom spoke to him, saying, “Ahithophel has spoken in this manner. Shall we do as he says? If not, speak up.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So Hushai said to Absalom: “The advice that Ahithophel has given '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not good at this time. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For,” said Hushai, “you know your father and his men, that they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' mighty men, and they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' enraged in their minds, like '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:32–34
      marker-yv: yv-n
    - type: text
      text: 'a bear robbed of her cubs in the field; and your father '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a man of war, and will not camp with the people. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Surely by now he is hidden in some pit, or in some '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' place. And it will be, when some of them are overthrown at the first, that whoever hears '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' will say, ‘There is a slaughter among the people who follow Absalom.’ '
