  - type: text
    content: Jabesh, and fasted seven days.
  '2':
  - type: text
    content: 'Then the Philistines followed hard after Saul and his sons. And the Philistines killed '
  - type: note
    content: 1 Sam. 28:4
  - type: text
    content: 'Jonathan, Abinadab, and Malchishua, Saul’s sons. '
  '3':
  - type: note
    content: 1 Sam. 14:49; 1 Chr. 8:33
  - type: text
    content: The battle became fierce against Saul. The archers hit him, and he was severely wounded by the archers.
  '4':
  - type: note
    content: 2 Sam. 1:6
  - type: text
    content: 'Then Saul said to his armorbearer, “Draw your sword, and thrust me through with it, lest '
  - type: note
    content: Judg. 9:54; 1 Chr. 10:4
  - type: text
    content: these uncircumcised men come and thrust me through and abuse me.”
  - type: text
    content: 'But his armorbearer would not, '
  - type: note
    content: Judg. 14:3; 1 Sam. 14:6; 17:26, 36
  - type: text
    content: 'for he was greatly afraid. Therefore Saul took a sword and '
  - type: note
    content: 2 Sam. 1:14
  - type: text
    content: 'fell on it. '
  '5':
  - type: text
    content: 'And when his armorbearer saw that Saul was dead, he also fell on his sword, and died with him. '
  '6':
  - type: text
    content: So Saul, his three sons, his armorbearer, and all his men died together that same day.
  '7':
  - type: text
    content: 'And when the men of Israel who '
