document_id: 1SA.31,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Tragic End of Saul and His Sons
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 23:22
      marker-yv: yv-n
    - type: text
      text: 'the Philistines fought against Israel; and the men of Israel fled from before the Philistines, and fell slain on Mount '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 10:1–12
      marker-yv: yv-n
    - type: text
      text: 'Gilboa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 16:23, 24; 2 Sam. 1:20
      marker-yv: yv-n
    - type: text
      text: 'Then they put his armor in the temple of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 21:9
      marker-yv: yv-n
    - type: text
      text: 'Ashtoreths, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 2:13; 1 Sam. 7:3
      marker-yv: yv-n
    - type: text
      text: 'they fastened his body to the wall of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 21:12
      marker-yv: yv-n
    - type: text
      text: Beth Shan.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:27
      marker-yv: yv-n
    - type: text
      text: 'Now when the inhabitants of Jabesh Gilead heard what the Philistines had done to Saul, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 11:1–13
      marker-yv: yv-n
    - type: text
      text: 'all the valiant men arose and traveled all night, and took the body of Saul and the bodies of his sons from the wall of Beth Shan; and they came to Jabesh and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 11:1–11; 2 Sam. 2:4–7
      marker-yv: yv-n
    - type: text
      text: 'burned them there. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they took their bones and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 16:14; Jer. 34:5; Amos 6:10
      marker-yv: yv-n
    - type: text
      text: 'buried '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' under the tamarisk tree at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 2:4, 5; 21:12–14
      marker-yv: yv-n
    - type: text
      text: Jabesh, and fasted seven days.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Philistines followed hard after Saul and his sons. And the Philistines killed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 28:4
      marker-yv: yv-n
    - type: text
      text: 'Jonathan, Abinadab, and Malchishua, Saul’s sons. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 14:49; 1 Chr. 8:33
      marker-yv: yv-n
    - type: text
      text: The battle became fierce against Saul. The archers hit him, and he was severely wounded by the archers.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 1:6
      marker-yv: yv-n
    - type: text
      text: 'Then Saul said to his armorbearer, “Draw your sword, and thrust me through with it, lest '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 9:54; 1 Chr. 10:4
      marker-yv: yv-n
    - type: text
      text: these uncircumcised men come and thrust me through and abuse me.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But his armorbearer would not, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 14:3; 1 Sam. 14:6; 17:26, 36
      marker-yv: yv-n
    - type: text
      text: 'for he was greatly afraid. Therefore Saul took a sword and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 1:14
      marker-yv: yv-n
    - type: text
      text: 'fell on it. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when his armorbearer saw that Saul was dead, he also fell on his sword, and died with him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Saul, his three sons, his armorbearer, and all his men died together that same day.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the men of Israel who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' on the other side of the valley, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: those
    - type: text
      text: ' who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' on the other side of the Jordan, saw that the men of Israel had fled and that Saul and his sons were dead, they forsook the cities and fled; and the Philistines came and dwelt in them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it happened the next day, when the Philistines came to strip the slain, that they found Saul and his three sons fallen on Mount Gilboa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they cut off his head and stripped off his armor, and sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' throughout the land of the Philistines, to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 1:6, 10
      marker-yv: yv-n
    - type: text
      text: 'proclaim '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' the temple of their idols and among the people. '
