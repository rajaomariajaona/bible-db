  '1':
  - type: heading
    content: Prelude to the Bowl Judgments
  - type: text
    content: 'Then '
  - type: note
    content: Rev. 12:1, 3
  - type: text
    content: 'I saw another sign in heaven, great and marvelous: '
  - type: note
    content: Rev. 21:9
  - type: text
    content: 'seven angels having the seven last plagues, '
  - type: note
    content: Rev. 14:10
  - type: text
    content: for in them the wrath of God is complete.
  '2':
  - type: text
    content: 'And I saw '
  - type: text
    content: something
  - type: text
    content: ' like '
  - type: note
    content: Rev. 4:6
  - type: text
    content: 'a sea of glass '
  - type: note
    content: (Matt. 3:11)
  - type: text
    content: 'mingled with fire, and those who have the victory over the beast, '
  - type: note
    content: Rev. 13:14, 15
  - type: text
    content: 'over his image and over his mark '
  - type: text
    content: and
  - type: text
    content: ' over the '
  - type: note
    content: Rev. 13:17
  - type: text
    content: 'number of his name, standing on the sea of glass, '
  - type: note
    content: Rev. 5:8
  - type: text
    content: 'having harps of God. '
  '3':
  - type: text
    content: 'They sing '
  - type: note
    content: Ex. 15:1–21
  - type: text
    content: 'the song of Moses, the servant of God, and the song of the '
  - type: note
    content: Rev. 15:3
  - type: text
    content: 'Lamb, saying:'
  - type: note
    content: Deut. 32:3, 4; Ps. 92:5; Rom. 11:33
  - type: text
    content: '“Great and marvelous '
  - type: text
    content: are
  - type: text
    content: ' Your works,'
  - type: text
    content: Lord God Almighty!
  - type: note
    content: Ps. 145:17; Rev. 16:7
  - type: text
    content: 'Just and true '
  - type: text
    content: are
  - type: text
    content: ' Your ways,'
  - type: text
    content: O King of the saints!
  '4':
  - type: note
    content: Ex. 15:14
  - type: text
    content: Who shall not fear You, O Lord, and glorify Your name?
  - type: text
    content: 'For '
  - type: text
    content: You
  - type: text
    content: ' alone '
  - type: text
    content: are
  - type: text
    content: ' '
  - type: note
    content: Lev. 11:44; 1 Pet. 1:16; Rev. 4:8
  - type: text
    content: holy.
  - type: text
    content: 'For '
  - type: note
    content: Ps. 86:9; Is. 66:23
  - type: text
    content: all nations shall come and worship before You,
  - type: text
    content: For Your judgments have been manifested.”
  '5':
  - type: text
    content: 'After these things I looked, and behold, '
  - type: note
    content: Ex. 38:21; Num. 1:50; Heb. 8:5; Rev. 13:6
  - type: text
    content: 'the temple of the tabernacle of the testimony in heaven was opened. '
  '6':
  - type: text
    content: 'And out of the temple came the seven angels having the seven plagues, '
  - type: note
    content: Ex. 28:6
  - type: text
    content: 'clothed in pure bright linen, and having their chests girded with golden bands. '
  '7':
  - type: note
    content: Rev. 4:6
  - type: text
    content: 'Then one of the four living creatures gave to the seven angels seven golden bowls full of the wrath of God '
  - type: note
    content: 1 Thess. 1:9
  - type: text
    content: 'who lives forever and ever. '
  '8':
  - type: note
    content: Ex. 19:18; 40:34; Lev. 16:2; 1 Kin. 8:10; 2 Chr. 5:13; Is. 6:4
  - type: text
    content: 'The temple was filled with smoke '
  - type: note
    content: 2 Thess. 1:9
  - type: text
    content: from the glory of God and from His power, and no one was able to enter the temple till the seven plagues of the seven angels were completed.
