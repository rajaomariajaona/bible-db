document_id: REV.15,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prelude to the Bowl Judgments
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 12:1, 3
      marker-yv: yv-n
    - type: text
      text: 'I saw another sign in heaven, great and marvelous: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 21:9
      marker-yv: yv-n
    - type: text
      text: 'seven angels having the seven last plagues, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 14:10
      marker-yv: yv-n
    - type: text
      text: for in them the wrath of God is complete.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And I saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: something
    - type: text
      text: ' like '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:6
      marker-yv: yv-n
    - type: text
      text: 'a sea of glass '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 3:11)
      marker-yv: yv-n
    - type: text
      text: 'mingled with fire, and those who have the victory over the beast, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 13:14, 15
      marker-yv: yv-n
    - type: text
      text: 'over his image and over his mark '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' over the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 13:17
      marker-yv: yv-n
    - type: text
      text: 'number of his name, standing on the sea of glass, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 5:8
      marker-yv: yv-n
    - type: text
      text: 'having harps of God. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'They sing '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:1–21
      marker-yv: yv-n
    - type: text
      text: 'the song of Moses, the servant of God, and the song of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 15:3
      marker-yv: yv-n
    - type: text
      text: 'Lamb, saying:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:3, 4; Ps. 92:5; Rom. 11:33
      marker-yv: yv-n
    - type: text
      text: '“Great and marvelous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' Your works,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lord God Almighty!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 145:17; Rev. 16:7
      marker-yv: yv-n
    - type: text
      text: 'Just and true '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' Your ways,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O King of the saints!
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:14
      marker-yv: yv-n
    - type: text
      text: Who shall not fear You, O Lord, and glorify Your name?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You
    - type: text
      text: ' alone '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:44; 1 Pet. 1:16; Rev. 4:8
      marker-yv: yv-n
    - type: text
      text: holy.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 86:9; Is. 66:23
      marker-yv: yv-n
    - type: text
      text: all nations shall come and worship before You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For Your judgments have been manifested.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'After these things I looked, and behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 38:21; Num. 1:50; Heb. 8:5; Rev. 13:6
      marker-yv: yv-n
    - type: text
      text: 'the temple of the tabernacle of the testimony in heaven was opened. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And out of the temple came the seven angels having the seven plagues, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:6
      marker-yv: yv-n
    - type: text
      text: 'clothed in pure bright linen, and having their chests girded with golden bands. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:6
      marker-yv: yv-n
    - type: text
      text: 'Then one of the four living creatures gave to the seven angels seven golden bowls full of the wrath of God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 1:9
      marker-yv: yv-n
    - type: text
      text: 'who lives forever and ever. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:18; 40:34; Lev. 16:2; 1 Kin. 8:10; 2 Chr. 5:13; Is. 6:4
      marker-yv: yv-n
    - type: text
      text: 'The temple was filled with smoke '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Thess. 1:9
      marker-yv: yv-n
    - type: text
      text: from the glory of God and from His power, and no one was able to enter the temple till the seven plagues of the seven angels were completed.
