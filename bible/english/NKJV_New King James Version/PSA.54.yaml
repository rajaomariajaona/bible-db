document_id: PSA.54,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Answered Prayer for Deliverance from Adversaries
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. With stringed instruments. A Contemplation of David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 23:19
      marker-yv: yv-n
    - type: text
      text: when the Ziphites went and said to Saul, “Is David not hiding with us?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me, O God, by Your name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And vindicate me by Your strength.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hear my prayer, O God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give ear to the words of my mouth.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For strangers have risen up against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And oppressors have sought after my life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have not set God before them.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Behold, God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my helper;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The Lord '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' with those who uphold my life.'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will repay my enemies for their evil.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Cut them off in Your truth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will freely sacrifice to You;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will praise Your name, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good.'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For He has delivered me out of all trouble;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 59:10
      marker-yv: yv-n
    - type: text
      text: 'And my eye has seen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: its
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: desire
    - type: text
      text: ' upon my enemies.'
