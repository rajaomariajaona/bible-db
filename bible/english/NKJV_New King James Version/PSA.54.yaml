- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Behold, God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' my helper;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The Lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' with those who uphold my life.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He will repay my enemies for their evil.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cut them off in Your truth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I will freely sacrifice to You;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I will praise Your name, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
