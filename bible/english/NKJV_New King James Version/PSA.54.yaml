      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hear my prayer, O God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give ear to the words of my mouth.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For strangers have risen up against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And oppressors have sought after my life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They have not set God before them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
