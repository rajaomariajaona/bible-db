document_id: ACT.23,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then Paul, looking earnestly at the council, said, “Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, '
  - type: note
    content: Acts 24:16; 1 Cor. 4:4; 2 Cor. 1:12; 4:2; 2 Tim. 1:3; Heb. 13:18
  - type: text
    content: 'I have lived in all good conscience before God until this day.” '
  '10':
  - type: text
    content: 'Now when there arose a great dissension, the commander, fearing lest Paul might be pulled to pieces by them, commanded the soldiers to go down and take him by force from among them, and bring '
  - type: text
    content: him
  - type: text
    content: ' into the barracks.'
  - type: heading
    content: The Plot Against Paul
  '11':
  - type: text
    content: 'But '
  - type: note
    content: Acts 18:9; 27:23, 24
  - type: text
    content: 'the following night the Lord stood by him and said, '
  - type: text
    content: '“Be of good cheer, Paul; for as you have testified for Me in '
  - type: note
    content: Acts 21:18, 19; 22:1–21
  - type: text
    content: 'Jerusalem, so you must also bear witness at '
  - type: note
    content: Acts 28:16, 17, 23
  - type: text
    content: Rome.”
  '12':
  - type: text
    content: 'And when it was day, '
  - type: note
    content: Acts 23:21, 30; 25:3
  - type: text
    content: 'some of the Jews banded together and bound themselves under an oath, saying that they would neither eat nor drink till they had '
  - type: note
    content: Acts 9:23, 24; 25:3; 26:21; 27:42; 1 Thess. 2:15
  - type: text
    content: 'killed Paul. '
  '13':
  - type: text
    content: 'Now there were more than forty who had formed this conspiracy. '
  '14':
  - type: text
    content: 'They came to the chief priests and '
  - type: note
    content: Acts 4:5, 23; 6:12; 22:5; 24:1; 25:15
  - type: text
    content: 'elders, and said, “We have bound ourselves under a great oath that we will eat nothing until we have killed Paul. '
  '15':
  - type: text
    content: Now you, therefore, together with the council, suggest to the commander that he be brought down to you tomorrow, as though you were going to make further inquiries concerning him; but we are ready to kill him before he comes near.”
  '16':
  - type: text
    content: 'So when Paul’s sister’s son heard of their ambush, he went and entered the barracks and told Paul. '
  '17':
  - type: text
    content: 'Then Paul called one of the centurions to '
  - type: text
    content: him
  - type: text
    content: ' and said, “Take this young man to the commander, for he has something to tell him.” '
  '18':
  - type: text
    content: 'So he took him and brought '
  - type: text
    content: him
  - type: text
    content: ' to the commander and said, “Paul the prisoner called me to '
  - type: text
    content: him
  - type: text
    content: ' and asked '
  - type: text
    content: me
  - type: text
    content: ' to bring this young man to you. He has something to say to you.”'
  '19':
  - type: text
    content: Then the commander took him by the hand, went aside, and asked privately, “What is it that you have to tell me?”
  '2':
  - type: text
    content: 'And the high priest Ananias commanded those who stood by him '
  - type: note
    content: 1 Kin. 22:24; Jer. 20:2; John 18:22
  - type: text
    content: 'to strike him on the mouth. '
  '20':
  - type: text
    content: 'And he said, '
  - type: note
    content: Acts 23:12
  - type: text
    content: '“The Jews have agreed to ask that you bring Paul down to the council tomorrow, as though they were going to inquire more fully about him. '
  '21':
  - type: text
    content: But do not yield to them, for more than forty of them lie in wait for him, men who have bound themselves by an oath that they will neither eat nor drink till they have killed him; and now they are ready, waiting for the promise from you.”
  '22':
  - type: text
    content: 'So the commander let the young man depart, and commanded '
  - type: text
    content: him,
  - type: text
    content: ' “Tell no one that you have revealed these things to me.”'
  - type: heading
    content: Sent to Felix
  '23':
  - type: text
    content: 'And he called for two centurions, saying, “Prepare two hundred soldiers, seventy horsemen, and two hundred spearmen to go to '
  - type: note
    content: Acts 8:40; 23:33
  - type: text
    content: 'Caesarea at the third hour of the night; '
  '24':
  - type: text
    content: 'and provide mounts to set Paul on, and bring '
  - type: text
    content: him
  - type: text
    content: ' safely to Felix the governor.” '
  '25':
  - type: text
    content: 'He wrote a letter in the following manner:'
  '26':
  - type: text
    content: Claudius Lysias,
  - type: text
    content: 'To the most excellent governor Felix:'
  - type: text
    content: Greetings.
  '27':
  - type: note
    content: Acts 21:30, 33; 24:7
  - type: text
    content: 'This man was seized by the Jews and was about to be killed by them. Coming with the troops I rescued him, having learned that he was a Roman. '
  '28':
  - type: note
    content: Acts 22:30
  - type: text
    content: 'And when I wanted to know the reason they accused him, I brought him before their council. '
  '29':
  - type: text
    content: 'I found out that he was accused '
  - type: note
    content: Acts 18:15; 25:19
  - type: text
    content: 'concerning questions of their law, '
  - type: note
    content: Acts 25:25; 26:31
  - type: text
    content: 'but had nothing charged against him deserving of death or chains. '
  '3':
  - type: text
    content: 'Then Paul said to him, “God will strike you, '
  - type: text
    content: you
  - type: text
    content: ' whitewashed wall! For you sit to judge me according to the law, and '
  - type: note
    content: Lev. 19:35; Deut. 25:1, 2; John 7:51
  - type: text
    content: do you command me to be struck contrary to the law?”
  '30':
  - type: text
    content: 'And '
  - type: note
    content: Acts 23:20
  - type: text
    content: 'when it was told me that the Jews lay in wait for the man, I sent him immediately to you, and '
  - type: note
    content: Acts 24:8; 25:6
  - type: text
    content: also commanded his accusers to state before you the charges against him.
  - type: text
    content: Farewell.
  '31':
  - type: text
    content: 'Then the soldiers, as they were commanded, took Paul and brought '
  - type: text
    content: him
  - type: text
    content: ' by night to Antipatris. '
  '32':
  - type: text
    content: 'The next day they left the horsemen to go on with him, and returned to the barracks. '
  '33':
  - type: text
    content: 'When they came to '
  - type: note
    content: Acts 8:40
  - type: text
    content: 'Caesarea and had delivered the '
  - type: note
    content: Acts 23:26–30
  - type: text
    content: 'letter to the governor, they also presented Paul to him. '
  '34':
  - type: text
    content: 'And when the governor had read '
  - type: text
    content: it,
  - type: text
    content: ' he asked what province he was from. And when he understood that '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' from '
  - type: note
    content: Acts 6:9; 21:39
  - type: text
    content: 'Cilicia, '
  '35':
  - type: text
    content: 'he said, '
  - type: note
    content: Acts 24:1, 10; 25:16
  - type: text
    content: '“I will hear you when your accusers also have come.” And he commanded him to be kept in '
  - type: note
    content: Matt. 27:27
  - type: text
    content: Herod’s Praetorium.
  '4':
  - type: text
    content: And those who stood by said, “Do you revile God’s high priest?”
  '5':
  - type: text
    content: 'Then Paul said, '
  - type: note
    content: Lev. 5:17, 18
  - type: text
    content: '“I did not know, brethren, that he was the high priest; for it is written, '
  - type: note
    content: Ex. 22:28; Eccl. 10:20; 2 Pet. 2:10
  - type: text
    content: ‘You shall not speak evil of a ruler of your people.’ ”
  '6':
  - type: text
    content: 'But when Paul perceived that one part were Sadducees and the other Pharisees, he cried out in the council, “Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, '
  - type: note
    content: Acts 26:5; Phil. 3:5
  - type: text
    content: 'I am a Pharisee, the son of a Pharisee; '
  - type: note
    content: Acts 24:15, 21; 26:6; 28:20
  - type: text
    content: concerning the hope and resurrection of the dead I am being judged!”
  '7':
  - type: text
    content: 'And when he had said this, a dissension arose between the Pharisees and the Sadducees; and the assembly was divided. '
  '8':
  - type: note
    content: Matt. 22:23; Mark 12:18; Luke 20:27
  - type: text
    content: 'For Sadducees say that there is no resurrection—and no angel or spirit; but the Pharisees confess both. '
  '9':
  - type: text
    content: 'Then there arose a loud outcry. And the scribes of the Pharisees’ party arose and protested, saying, '
  - type: note
    content: Acts 25:25; 26:31
  - type: text
    content: '“We find no evil in this man; but '
  - type: note
    content: John 12:29; Acts 22:6, 7, 17, 18
  - type: text
    content: 'if a spirit or an angel has spoken to him, '
  - type: note
    content: Acts 5:39
  - type: text
    content: let us not fight against God.”
