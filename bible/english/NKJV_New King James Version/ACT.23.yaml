document_id: ACT.23
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Paul, looking earnestly at the council, said, “Men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brethren, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 24:16; 1 Cor. 4:4; 2 Cor. 1:12; 4:2; 2 Tim. 1:3; Heb. 13:18
    marker-yv: yv-n
  - type: text
    text: 'I have lived in all good conscience before God until this day.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the high priest Ananias commanded those who stood by him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 22:24; Jer. 20:2; John 18:22
    marker-yv: yv-n
  - type: text
    text: 'to strike him on the mouth. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Paul said to him, “God will strike you, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' whitewashed wall! For you sit to judge me according to the law, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 19:35; Deut. 25:1, 2; John 7:51
    marker-yv: yv-n
  - type: text
    text: do you command me to be struck contrary to the law?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And those who stood by said, “Do you revile God’s high priest?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Paul said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 5:17, 18
    marker-yv: yv-n
  - type: text
    text: '“I did not know, brethren, that he was the high priest; for it is written, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 22:28; Eccl. 10:20; 2 Pet. 2:10
    marker-yv: yv-n
  - type: text
    text: ‘You shall not speak evil of a ruler of your people.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But when Paul perceived that one part were Sadducees and the other Pharisees, he cried out in the council, “Men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brethren, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 26:5; Phil. 3:5
    marker-yv: yv-n
  - type: text
    text: 'I am a Pharisee, the son of a Pharisee; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 24:15, 21; 26:6; 28:20
    marker-yv: yv-n
  - type: text
    text: concerning the hope and resurrection of the dead I am being judged!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And when he had said this, a dissension arose between the Pharisees and the Sadducees; and the assembly was divided. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 22:23; Mark 12:18; Luke 20:27
    marker-yv: yv-n
  - type: text
    text: 'For Sadducees say that there is no resurrection—and no angel or spirit; but the Pharisees confess both. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then there arose a loud outcry. And the scribes of the Pharisees’ party arose and protested, saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 25:25; 26:31
    marker-yv: yv-n
  - type: text
    text: '“We find no evil in this man; but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 12:29; Acts 22:6, 7, 17, 18
    marker-yv: yv-n
  - type: text
    text: 'if a spirit or an angel has spoken to him, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 5:39
    marker-yv: yv-n
  - type: text
    text: let us not fight against God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now when there arose a great dissension, the commander, fearing lest Paul might be pulled to pieces by them, commanded the soldiers to go down and take him by force from among them, and bring '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' into the barracks.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Plot Against Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:9; 27:23, 24
    marker-yv: yv-n
  - type: text
    text: 'the following night the Lord stood by him and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Be of good cheer, Paul; for as you have testified for Me in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 21:18, 19; 22:1–21
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Jerusalem, so you must also bear witness at '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 28:16, 17, 23
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rome.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And when it was day, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 23:21, 30; 25:3
    marker-yv: yv-n
  - type: text
    text: 'some of the Jews banded together and bound themselves under an oath, saying that they would neither eat nor drink till they had '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 9:23, 24; 25:3; 26:21; 27:42; 1 Thess. 2:15
    marker-yv: yv-n
  - type: text
    text: 'killed Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now there were more than forty who had formed this conspiracy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They came to the chief priests and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 4:5, 23; 6:12; 22:5; 24:1; 25:15
    marker-yv: yv-n
  - type: text
    text: 'elders, and said, “We have bound ourselves under a great oath that we will eat nothing until we have killed Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Now you, therefore, together with the council, suggest to the commander that he be brought down to you tomorrow, as though you were going to make further inquiries concerning him; but we are ready to kill him before he comes near.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So when Paul’s sister’s son heard of their ambush, he went and entered the barracks and told Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Paul called one of the centurions to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' and said, “Take this young man to the commander, for he has something to tell him.” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So he took him and brought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' to the commander and said, “Paul the prisoner called me to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' and asked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me
  - type: text
    text: ' to bring this young man to you. He has something to say to you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then the commander took him by the hand, went aside, and asked privately, “What is it that you have to tell me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 23:12
    marker-yv: yv-n
  - type: text
    text: '“The Jews have agreed to ask that you bring Paul down to the council tomorrow, as though they were going to inquire more fully about him. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But do not yield to them, for more than forty of them lie in wait for him, men who have bound themselves by an oath that they will neither eat nor drink till they have killed him; and now they are ready, waiting for the promise from you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So the commander let the young man depart, and commanded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him,
  - type: text
    text: ' “Tell no one that you have revealed these things to me.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sent to Felix
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he called for two centurions, saying, “Prepare two hundred soldiers, seventy horsemen, and two hundred spearmen to go to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 8:40; 23:33
    marker-yv: yv-n
  - type: text
    text: 'Caesarea at the third hour of the night; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and provide mounts to set Paul on, and bring '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' safely to Felix the governor.” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He wrote a letter in the following manner:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Claudius Lysias,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'To the most excellent governor Felix:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Greetings.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 21:30, 33; 24:7
    marker-yv: yv-n
  - type: text
    text: 'This man was seized by the Jews and was about to be killed by them. Coming with the troops I rescued him, having learned that he was a Roman. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 22:30
    marker-yv: yv-n
  - type: text
    text: 'And when I wanted to know the reason they accused him, I brought him before their council. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'I found out that he was accused '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:15; 25:19
    marker-yv: yv-n
  - type: text
    text: 'concerning questions of their law, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 25:25; 26:31
    marker-yv: yv-n
  - type: text
    text: 'but had nothing charged against him deserving of death or chains. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 23:20
    marker-yv: yv-n
  - type: text
    text: 'when it was told me that the Jews lay in wait for the man, I sent him immediately to you, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 24:8; 25:6
    marker-yv: yv-n
  - type: text
    text: also commanded his accusers to state before you the charges against him.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Farewell.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then the soldiers, as they were commanded, took Paul and brought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' by night to Antipatris. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The next day they left the horsemen to go on with him, and returned to the barracks. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'When they came to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 8:40
    marker-yv: yv-n
  - type: text
    text: 'Caesarea and had delivered the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 23:26–30
    marker-yv: yv-n
  - type: text
    text: 'letter to the governor, they also presented Paul to him. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And when the governor had read '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it,
  - type: text
    text: ' he asked what province he was from. And when he understood that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' from '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 6:9; 21:39
    marker-yv: yv-n
  - type: text
    text: 'Cilicia, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'he said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 24:1, 10; 25:16
    marker-yv: yv-n
  - type: text
    text: '“I will hear you when your accusers also have come.” And he commanded him to be kept in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 27:27
    marker-yv: yv-n
  - type: text
    text: Herod’s Praetorium.
