document_id: NUM.9,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Second Passover
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses in the Wilderness of Sinai, in the first month of the second year after they had come out of the land of Egypt, saying: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“Speak to the children of Israel, saying: ‘If anyone of you or your posterity is unclean because of a corpse, or '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' far away on a journey, he may still keep the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Passover. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'On '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 30:2, 15
      marker-yv: yv-n
    - type: text
      text: 'the fourteenth day of the second month, at twilight, they may keep it. They shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:8
      marker-yv: yv-n
    - type: text
      text: 'eat it with unleavened bread and bitter herbs. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:10
      marker-yv: yv-n
    - type: text
      text: 'They shall leave none of it until morning, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:46; (John 19:36)
      marker-yv: yv-n
    - type: text
      text: 'nor break one of its bones. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:43
      marker-yv: yv-n
    - type: text
      text: 'According to all the ordinances of the Passover they shall keep it. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But the man who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' clean and is not on a journey, and ceases to keep the Passover, that same person '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:14; Ex. 12:15, 47
      marker-yv: yv-n
    - type: text
      text: 'shall be cut off from among his people, because he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 9:7
      marker-yv: yv-n
    - type: text
      text: 'did not bring the offering of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at its appointed time; that man shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 5:31
      marker-yv: yv-n
    - type: text
      text: bear his sin.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '‘And if a stranger dwells among you, and would keep the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Passover, he must do so according to the rite of the Passover and according to its ceremony; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:49; Lev. 24:22; Num. 15:15, 16, 29
      marker-yv: yv-n
    - type: text
      text: you shall have one ordinance, both for the stranger and the native of the land.’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Cloud and the Fire
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:33, 34; Neh. 9:12, 19; Ps. 78:14
      marker-yv: yv-n
    - type: text
      text: 'on the day that the tabernacle was raised up, the cloud '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 4:5
      marker-yv: yv-n
    - type: text
      text: 'covered the tabernacle, the tent of the Testimony; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 13:21, 22; 40:38
      marker-yv: yv-n
    - type: text
      text: 'from evening until morning it was above the tabernacle like the appearance of fire. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So it was always: the cloud covered it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day,
    - type: text
      text: ' and the appearance of fire by night. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Whenever the cloud '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:36–38; Num. 10:11, 12, 33, 34; Ps. 80:1
      marker-yv: yv-n
    - type: text
      text: 'was taken up from above the tabernacle, after that the children of Israel would journey; and in the place where the cloud settled, there the children of Israel would pitch their tents. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'At the command of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the children of Israel would journey, and at the command of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' they would camp; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 10:1
      marker-yv: yv-n
    - type: text
      text: 'as long as the cloud stayed above the tabernacle they remained encamped. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Even when the cloud continued long, many days above the tabernacle, the children of Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 1:53; 3:8
      marker-yv: yv-n
    - type: text
      text: 'kept the charge of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and did not journey. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Let the children of Israel keep '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:1–16; Lev. 23:5; Num. 28:16; Deut. 16:1, 2
      marker-yv: yv-n
    - type: text
      text: 'the Passover at its appointed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 30:1–15; Luke 22:7; (1 Cor. 5:7, 8)
      marker-yv: yv-n
    - type: text
      text: 'time. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So it was, when the cloud was above the tabernacle a few days: according to the command of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' they would remain encamped, and according to the command of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' they would journey. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So it was, when the cloud remained only from evening until morning: when the cloud was taken up in the morning, then they would journey; whether by day or by night, whenever the cloud was taken up, they would journey. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Whether
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' two days, a month, or a year that the cloud remained above the tabernacle, the children of Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:36, 37
      marker-yv: yv-n
    - type: text
      text: 'would remain encamped and not journey; but when it was taken up, they would journey. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'At the command of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' they remained encamped, and at the command of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' they journeyed; they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 9:19
      marker-yv: yv-n
    - type: text
      text: 'kept the charge of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', at the command of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by the hand of Moses.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'On the fourteenth day of this month, at twilight, you shall keep it at its appointed time. According to all its rites and ceremonies you shall keep it.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So Moses told the children of Israel that they should keep the Passover. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 5:10
      marker-yv: yv-n
    - type: text
      text: 'they kept the Passover on the fourteenth day of the first month, at twilight, in the Wilderness of Sinai; according to all that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses, so the children of Israel did.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now there were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: certain
    - type: text
      text: ' men who were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 5:2; 19:11–22; John 18:28
      marker-yv: yv-n
    - type: text
      text: 'defiled by a human corpse, so that they could not keep the Passover on that day; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 18:15, 19, 26; Num. 27:2
      marker-yv: yv-n
    - type: text
      text: 'and they came before Moses and Aaron that day. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And those men said to him, “We '
    - type: usfm
      marker: it
      children:
      - type: text
        text: became
    - type: text
      text: ' defiled by a human corpse. Why are we kept from presenting the offering of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at its appointed time among the children of Israel?”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And Moses said to them, “Stand still, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 18:22; Num. 27:5
      marker-yv: yv-n
    - type: text
      text: 'I may hear what the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will command concerning you.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
