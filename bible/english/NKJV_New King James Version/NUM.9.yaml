  '1':
  - type: heading
    content: The Second Passover
  - type: text
    content: 'Now the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses in the Wilderness of Sinai, in the first month of the second year after they had come out of the land of Egypt, saying: '
  '10':
  - type: text
    content: '“Speak to the children of Israel, saying: ‘If anyone of you or your posterity is unclean because of a corpse, or '
  - type: text
    content: is
  - type: text
    content: ' far away on a journey, he may still keep the '
  - type: heading
    content: Lord
  - type: text
    content: '’s Passover. '
  '11':
  - type: text
    content: 'On '
  - type: note
    content: 2 Chr. 30:2, 15
  - type: text
    content: 'the fourteenth day of the second month, at twilight, they may keep it. They shall '
  - type: note
    content: Ex. 12:8
  - type: text
    content: 'eat it with unleavened bread and bitter herbs. '
  '12':
  - type: note
    content: Ex. 12:10
  - type: text
    content: 'They shall leave none of it until morning, '
  - type: note
    content: Ex. 12:46; (John 19:36)
  - type: text
    content: 'nor break one of its bones. '
  - type: note
    content: Ex. 12:43
  - type: text
    content: 'According to all the ordinances of the Passover they shall keep it. '
  '13':
  - type: text
    content: 'But the man who '
  - type: text
    content: is
  - type: text
    content: ' clean and is not on a journey, and ceases to keep the Passover, that same person '
  - type: note
    content: Gen. 17:14; Ex. 12:15, 47
  - type: text
    content: 'shall be cut off from among his people, because he '
  - type: note
    content: Num. 9:7
  - type: text
    content: 'did not bring the offering of the '
  - type: heading
    content: Lord
  - type: text
    content: ' at its appointed time; that man shall '
  - type: note
    content: Num. 5:31
  - type: text
    content: bear his sin.
  '14':
  - type: text
    content: '‘And if a stranger dwells among you, and would keep the '
  - type: heading
    content: Lord
  - type: text
    content: '’s Passover, he must do so according to the rite of the Passover and according to its ceremony; '
  - type: note
    content: Ex. 12:49; Lev. 24:22; Num. 15:15, 16, 29
  - type: text
    content: you shall have one ordinance, both for the stranger and the native of the land.’ ”
  - type: heading
    content: The Cloud and the Fire
  '15':
  - type: text
    content: 'Now '
  - type: note
    content: Ex. 40:33, 34; Neh. 9:12, 19; Ps. 78:14
  - type: text
    content: 'on the day that the tabernacle was raised up, the cloud '
  - type: note
    content: Is. 4:5
  - type: text
    content: 'covered the tabernacle, the tent of the Testimony; '
  - type: note
    content: Ex. 13:21, 22; 40:38
  - type: text
    content: 'from evening until morning it was above the tabernacle like the appearance of fire. '
  '16':
  - type: text
    content: 'So it was always: the cloud covered it '
  - type: text
    content: by
  - type: text
    content: ' '
  - type: text
    content: day,
  - type: text
    content: ' and the appearance of fire by night. '
  '17':
  - type: text
    content: 'Whenever the cloud '
  - type: note
    content: Ex. 40:36–38; Num. 10:11, 12, 33, 34; Ps. 80:1
  - type: text
    content: 'was taken up from above the tabernacle, after that the children of Israel would journey; and in the place where the cloud settled, there the children of Israel would pitch their tents. '
  '18':
  - type: text
    content: 'At the command of the '
  - type: heading
    content: Lord
  - type: text
    content: ' the children of Israel would journey, and at the command of the '
  - type: heading
    content: Lord
  - type: text
    content: ' they would camp; '
  - type: note
    content: 1 Cor. 10:1
  - type: text
    content: 'as long as the cloud stayed above the tabernacle they remained encamped. '
  '19':
  - type: text
    content: 'Even when the cloud continued long, many days above the tabernacle, the children of Israel '
  - type: note
    content: Num. 1:53; 3:8
  - type: text
    content: 'kept the charge of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and did not journey. '
  '2':
  - type: text
    content: '“Let the children of Israel keep '
  - type: note
    content: Ex. 12:1–16; Lev. 23:5; Num. 28:16; Deut. 16:1, 2
  - type: text
    content: 'the Passover at its appointed '
  - type: note
    content: 2 Chr. 30:1–15; Luke 22:7; (1 Cor. 5:7, 8)
  - type: text
    content: 'time. '
  '20':
  - type: text
    content: 'So it was, when the cloud was above the tabernacle a few days: according to the command of the '
  - type: heading
    content: Lord
  - type: text
    content: ' they would remain encamped, and according to the command of the '
  - type: heading
    content: Lord
  - type: text
    content: ' they would journey. '
  '21':
  - type: text
    content: 'So it was, when the cloud remained only from evening until morning: when the cloud was taken up in the morning, then they would journey; whether by day or by night, whenever the cloud was taken up, they would journey. '
  '22':
  - type: text
    content: Whether
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' two days, a month, or a year that the cloud remained above the tabernacle, the children of Israel '
  - type: note
    content: Ex. 40:36, 37
  - type: text
    content: 'would remain encamped and not journey; but when it was taken up, they would journey. '
  '23':
  - type: text
    content: 'At the command of the '
  - type: heading
    content: Lord
  - type: text
    content: ' they remained encamped, and at the command of the '
  - type: heading
    content: Lord
  - type: text
    content: ' they journeyed; they '
  - type: note
    content: Num. 9:19
  - type: text
    content: 'kept the charge of the '
  - type: heading
    content: Lord
  - type: text
    content: ', at the command of the '
  - type: heading
    content: Lord
  - type: text
    content: ' by the hand of Moses.'
  '3':
  - type: text
    content: 'On the fourteenth day of this month, at twilight, you shall keep it at its appointed time. According to all its rites and ceremonies you shall keep it.” '
  '4':
  - type: text
    content: 'So Moses told the children of Israel that they should keep the Passover. '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: Josh. 5:10
  - type: text
    content: 'they kept the Passover on the fourteenth day of the first month, at twilight, in the Wilderness of Sinai; according to all that the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses, so the children of Israel did.'
  '6':
  - type: text
    content: 'Now there were '
  - type: text
    content: certain
  - type: text
    content: ' men who were '
  - type: note
    content: Num. 5:2; 19:11–22; John 18:28
  - type: text
    content: 'defiled by a human corpse, so that they could not keep the Passover on that day; '
  - type: note
    content: Ex. 18:15, 19, 26; Num. 27:2
  - type: text
    content: 'and they came before Moses and Aaron that day. '
  '7':
  - type: text
    content: 'And those men said to him, “We '
  - type: text
    content: became
  - type: text
    content: ' defiled by a human corpse. Why are we kept from presenting the offering of the '
  - type: heading
    content: Lord
  - type: text
    content: ' at its appointed time among the children of Israel?”'
  '8':
  - type: text
    content: 'And Moses said to them, “Stand still, that '
  - type: note
    content: Ex. 18:22; Num. 27:5
  - type: text
    content: 'I may hear what the '
  - type: heading
    content: Lord
  - type: text
    content: ' will command concerning you.”'
  '9':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
