document_id: 2TI.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greeting
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Paul, an apostle of Jesus Christ by the will of God, according to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Titus 1:2
      marker-yv: yv-n
    - type: text
      text: promise of life which is in Christ Jesus,
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 1:9
      marker-yv: yv-n
    - type: text
      text: 'has now been revealed by the appearing of our Savior Jesus Christ, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' has abolished death and brought life and immortality to light through the gospel, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:15
      marker-yv: yv-n
    - type: text
      text: 'to which I was appointed a preacher, an apostle, and a teacher of the Gentiles. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For this reason I also suffer these things; nevertheless I am not ashamed, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Pet. 4:19
      marker-yv: yv-n
    - type: text
      text: for I know whom I have believed and am persuaded that He is able to keep what I have committed to Him until that Day.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Be Loyal to the Faith
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 3:14; Titus 1:9
      marker-yv: yv-n
    - type: text
      text: 'Hold fast '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 2:20; 6:17
      marker-yv: yv-n
    - type: text
      text: 'the pattern of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 6:3
      marker-yv: yv-n
    - type: text
      text: 'sound words which you have heard from me, in faith and love which are in Christ Jesus. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: That good thing which was committed to you, keep by the Holy Spirit who dwells in us.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'This you know, that all those in Asia have turned away from me, among whom are Phygellus and Hermogenes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The Lord grant mercy to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 4:19
      marker-yv: yv-n
    - type: text
      text: 'household of Onesiphorus, for he often refreshed me, and was not ashamed of my chain; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'but when he arrived in Rome, he sought me out very zealously and found '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The Lord '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 6:4; Mark 9:41
      marker-yv: yv-n
    - type: text
      text: 'grant to him that he may find mercy from the Lord '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Thess. 1:10
      marker-yv: yv-n
    - type: text
      text: 'in that Day—and you know very well how many ways he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 6:10
      marker-yv: yv-n
    - type: text
      text: 'ministered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' at Ephesus.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'To Timothy, a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 1:2; 2 Tim. 2:1; Titus 1:4
      marker-yv: yv-n
    - type: text
      text: 'beloved son:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Grace, mercy, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' peace from God the Father and Christ Jesus our Lord.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Timothy’s Faith and Heritage
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I thank God, whom I serve with a pure conscience, as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 24:14
      marker-yv: yv-n
    - type: text
      text: 'forefathers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: did,
    - type: text
      text: ' as without ceasing I remember you in my prayers night and day, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'greatly desiring to see you, being mindful of your tears, that I may be filled with joy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'when I call to remembrance '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 1:5; 4:6
      marker-yv: yv-n
    - type: text
      text: 'the genuine faith that is in you, which dwelt first in your grandmother Lois and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 16:1
      marker-yv: yv-n
    - type: text
      text: 'your mother Eunice, and I am persuaded is in you also. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Therefore I remind you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 4:14
      marker-yv: yv-n
    - type: text
      text: 'to stir up the gift of God which is in you through the laying on of my hands. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 14:27; Rom. 8:15; 1 John 4:18
      marker-yv: yv-n
    - type: text
      text: 'God has not given us a spirit of fear, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 1:8)
      marker-yv: yv-n
    - type: text
      text: but of power and of love and of a sound mind.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Not Ashamed of the Gospel
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Mark 8:38; Luke 9:26; Rom. 1:16); 2 Tim. 1:12, 16
      marker-yv: yv-n
    - type: text
      text: 'Therefore do not be ashamed of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 2:6
      marker-yv: yv-n
    - type: text
      text: 'the testimony of our Lord, nor of me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 3:1; 2 Tim. 1:16
      marker-yv: yv-n
    - type: text
      text: 'His prisoner, but share with me in the sufferings for the gospel according to the power of God, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'who has saved us and called '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us
    - type: text
      text: ' with a holy calling, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 3:20); Eph. 2:8, 9
      marker-yv: yv-n
    - type: text
      text: 'not according to our works, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 8:28
      marker-yv: yv-n
    - type: text
      text: 'according to His own purpose and grace which was given to us in Christ Jesus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 16:25; Eph. 1:4; Titus 1:2
      marker-yv: yv-n
    - type: text
      text: 'before time began, '
