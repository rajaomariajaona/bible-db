document_id: 2TI.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, an apostle of Jesus Christ by the will of God, according to the '
  - type: note
    content: Titus 1:2
  - type: text
    content: promise of life which is in Christ Jesus,
  '10':
  - type: text
    content: 'but '
  - type: note
    content: Eph. 1:9
  - type: text
    content: 'has now been revealed by the appearing of our Savior Jesus Christ, '
  - type: text
    content: who
  - type: text
    content: ' has abolished death and brought life and immortality to light through the gospel, '
  '11':
  - type: note
    content: Acts 9:15
  - type: text
    content: 'to which I was appointed a preacher, an apostle, and a teacher of the Gentiles. '
  '12':
  - type: text
    content: 'For this reason I also suffer these things; nevertheless I am not ashamed, '
  - type: note
    content: 1 Pet. 4:19
  - type: text
    content: for I know whom I have believed and am persuaded that He is able to keep what I have committed to Him until that Day.
  - type: heading
    content: Be Loyal to the Faith
  '13':
  - type: note
    content: 2 Tim. 3:14; Titus 1:9
  - type: text
    content: 'Hold fast '
  - type: note
    content: Rom. 2:20; 6:17
  - type: text
    content: 'the pattern of '
  - type: note
    content: 1 Tim. 6:3
  - type: text
    content: 'sound words which you have heard from me, in faith and love which are in Christ Jesus. '
  '14':
  - type: text
    content: That good thing which was committed to you, keep by the Holy Spirit who dwells in us.
  '15':
  - type: text
    content: 'This you know, that all those in Asia have turned away from me, among whom are Phygellus and Hermogenes. '
  '16':
  - type: text
    content: 'The Lord grant mercy to the '
  - type: note
    content: 2 Tim. 4:19
  - type: text
    content: 'household of Onesiphorus, for he often refreshed me, and was not ashamed of my chain; '
  '17':
  - type: text
    content: 'but when he arrived in Rome, he sought me out very zealously and found '
  - type: text
    content: me.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'The Lord '
  - type: note
    content: Matt. 6:4; Mark 9:41
  - type: text
    content: 'grant to him that he may find mercy from the Lord '
  - type: note
    content: 2 Thess. 1:10
  - type: text
    content: 'in that Day—and you know very well how many ways he '
  - type: note
    content: Heb. 6:10
  - type: text
    content: 'ministered '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: me
  - type: text
    content: ' at Ephesus.'
  '2':
  - type: text
    content: 'To Timothy, a '
  - type: note
    content: 1 Tim. 1:2; 2 Tim. 2:1; Titus 1:4
  - type: text
    content: 'beloved son:'
  - type: text
    content: 'Grace, mercy, '
  - type: text
    content: and
  - type: text
    content: ' peace from God the Father and Christ Jesus our Lord.'
  - type: heading
    content: Timothy’s Faith and Heritage
  '3':
  - type: text
    content: 'I thank God, whom I serve with a pure conscience, as '
  - type: text
    content: my
  - type: text
    content: ' '
  - type: note
    content: Acts 24:14
  - type: text
    content: 'forefathers '
  - type: text
    content: did,
  - type: text
    content: ' as without ceasing I remember you in my prayers night and day, '
  '4':
  - type: text
    content: 'greatly desiring to see you, being mindful of your tears, that I may be filled with joy, '
  '5':
  - type: text
    content: 'when I call to remembrance '
  - type: note
    content: 1 Tim. 1:5; 4:6
  - type: text
    content: 'the genuine faith that is in you, which dwelt first in your grandmother Lois and '
  - type: note
    content: Acts 16:1
  - type: text
    content: 'your mother Eunice, and I am persuaded is in you also. '
  '6':
  - type: text
    content: 'Therefore I remind you '
  - type: note
    content: 1 Tim. 4:14
  - type: text
    content: 'to stir up the gift of God which is in you through the laying on of my hands. '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: John 14:27; Rom. 8:15; 1 John 4:18
  - type: text
    content: 'God has not given us a spirit of fear, '
  - type: note
    content: (Acts 1:8)
  - type: text
    content: but of power and of love and of a sound mind.
  - type: heading
    content: Not Ashamed of the Gospel
  '8':
  - type: note
    content: (Mark 8:38; Luke 9:26; Rom. 1:16); 2 Tim. 1:12, 16
  - type: text
    content: 'Therefore do not be ashamed of '
  - type: note
    content: 1 Tim. 2:6
  - type: text
    content: 'the testimony of our Lord, nor of me '
  - type: note
    content: Eph. 3:1; 2 Tim. 1:16
  - type: text
    content: 'His prisoner, but share with me in the sufferings for the gospel according to the power of God, '
  '9':
  - type: text
    content: 'who has saved us and called '
  - type: text
    content: us
  - type: text
    content: ' with a holy calling, '
  - type: note
    content: (Rom. 3:20); Eph. 2:8, 9
  - type: text
    content: 'not according to our works, but '
  - type: note
    content: Rom. 8:28
  - type: text
    content: 'according to His own purpose and grace which was given to us in Christ Jesus '
  - type: note
    content: Rom. 16:25; Eph. 1:4; Titus 1:2
  - type: text
    content: 'before time began, '
