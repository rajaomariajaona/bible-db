document_id: JON.3,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonah Preaches at Nineveh
  - type: text
    content: 'Now the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to Jonah the second time, saying, '
  '10':
  - type: note
    content: Ex. 32:14; Jer. 18:8; Amos 7:3, 6
  - type: text
    content: Then God saw their works, that they turned from their evil way; and God relented from the disaster that He had said He would bring upon them, and He did not do it.
  '2':
  - type: text
    content: '“Arise, go to Nineveh, that great city, and preach to it the message that I tell you.” '
  '3':
  - type: text
    content: 'So Jonah arose and went to Nineveh, according to the word of the '
  - type: heading
    content: Lord
  - type: text
    content: '. Now Nineveh was an exceedingly great city, a three-day journey '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: text
    content: extent.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'And Jonah began to enter the city on the first day’s walk. Then '
  - type: note
    content: (Deut. 18:22)
  - type: text
    content: he cried out and said, “Yet forty days, and Nineveh shall be overthrown!”
  - type: heading
    content: The People of Nineveh Believe
  '5':
  - type: text
    content: 'So the '
  - type: note
    content: (Matt. 12:41; Luke 11:32)
  - type: text
    content: 'people of Nineveh believed God, proclaimed a fast, and put on sackcloth, from the greatest to the least of them. '
  '6':
  - type: text
    content: 'Then word came to the king of Nineveh; and he arose from his throne and laid aside his robe, covered '
  - type: text
    content: himself
  - type: text
    content: ' with sackcloth '
  - type: note
    content: Job 2:8
  - type: text
    content: 'and sat in ashes. '
  '7':
  - type: note
    content: 2 Chr. 20:3; Dan. 3:29; Joel 2:15
  - type: text
    content: 'And he caused '
  - type: text
    content: it
  - type: text
    content: ' to be proclaimed and published throughout Nineveh by the decree of the king and his nobles, saying,'
  - type: text
    content: 'Let neither man nor beast, herd nor flock, taste anything; do not let them eat, or drink water. '
  '8':
  - type: text
    content: 'But let man and beast be covered with sackcloth, and cry mightily to God; yes, '
  - type: note
    content: Is. 58:6
  - type: text
    content: 'let every one turn from his evil way and from '
  - type: note
    content: Is. 59:6
  - type: text
    content: 'the violence that is in his hands. '
  '9':
  - type: note
    content: 2 Sam. 12:22; Joel 2:14; Amos 5:15
  - type: text
    content: 'Who can tell '
  - type: text
    content: if
  - type: text
    content: ' God will turn and relent, and turn away from His fierce anger, so that we may not perish?'
