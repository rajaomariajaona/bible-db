document_id: JON.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jonah Preaches at Nineveh
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the word of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to Jonah the second time, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Arise, go to Nineveh, that great city, and preach to it the message that I tell you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Jonah arose and went to Nineveh, according to the word of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Now Nineveh was an exceedingly great city, a three-day journey '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: extent.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Jonah began to enter the city on the first day’s walk. Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 18:22)
    marker-yv: yv-n
  - type: text
    text: he cried out and said, “Yet forty days, and Nineveh shall be overthrown!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The People of Nineveh Believe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Matt. 12:41; Luke 11:32)
    marker-yv: yv-n
  - type: text
    text: 'people of Nineveh believed God, proclaimed a fast, and put on sackcloth, from the greatest to the least of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then word came to the king of Nineveh; and he arose from his throne and laid aside his robe, covered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: himself
  - type: text
    text: ' with sackcloth '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 2:8
    marker-yv: yv-n
  - type: text
    text: 'and sat in ashes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 20:3; Dan. 3:29; Joel 2:15
    marker-yv: yv-n
  - type: text
    text: 'And he caused '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' to be proclaimed and published throughout Nineveh by the decree of the king and his nobles, saying,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let neither man nor beast, herd nor flock, taste anything; do not let them eat, or drink water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But let man and beast be covered with sackcloth, and cry mightily to God; yes, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 58:6
    marker-yv: yv-n
  - type: text
    text: 'let every one turn from his evil way and from '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 59:6
    marker-yv: yv-n
  - type: text
    text: 'the violence that is in his hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 12:22; Joel 2:14; Amos 5:15
    marker-yv: yv-n
  - type: text
    text: 'Who can tell '
  - type: usfm
    marker: it
    children:
    - type: text
      text: if
  - type: text
    text: ' God will turn and relent, and turn away from His fierce anger, so that we may not perish?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 32:14; Jer. 18:8; Amos 7:3, 6
    marker-yv: yv-n
  - type: text
    text: Then God saw their works, that they turned from their evil way; and God relented from the disaster that He had said He would bring upon them, and He did not do it.
