      - type: text
        text: '1'
    - type: text
      text: 'There was a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 3:2, 12
      marker-yv: yv-n
    - type: text
      text: 'relative of Naomi’s husband, a man of great wealth, of the family of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 1:2
      marker-yv: yv-n
    - type: text
      text: 'Elimelech. His name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 4:21
      marker-yv: yv-n
    - type: text
      text: 'Boaz. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So she '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 25:23
      marker-yv: yv-n
    - type: text
      text: 'fell on her face, bowed down to the ground, and said to him, “Why have I found '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 1:18
      marker-yv: yv-n
    - type: text
      text: 'favor in your eyes, that you should take notice of me, since I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' a foreigner?”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And Boaz answered and said to her, “It has been fully reported to me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 1:14–18
      marker-yv: yv-n
    - type: text
      text: 'all that you have done for your mother-in-law since the death of your husband, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: how
    - type: text
      text: ' you have left your father and your mother and the land of your birth, and have come to a people whom you did not know before. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 24:19; Ps. 58:11
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' repay your work, and a full reward be given you by the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 1:16; Ps. 17:8; 36:7; 57:1; 61:4; 63:7; 91:4
      marker-yv: yv-n
    - type: text
      text: under whose wings you have come for refuge.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then she said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 33:15; 1 Sam. 1:18
      marker-yv: yv-n
    - type: text
      text: '“Let me find favor in your sight, my lord; for you have comforted me, and have spoken kindly to your maidservant, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 25:41
      marker-yv: yv-n
    - type: text
      text: though I am not like one of your maidservants.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now Boaz said to her at mealtime, “Come here, and eat of the bread, and dip your piece of bread in the vinegar.” So she sat beside the reapers, and he passed parched '
    - type: usfm
      marker: it
      children:
      - type: text
        text: grain
    - type: text
      text: ' to her; and she ate and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 2:18
      marker-yv: yv-n
    - type: text
      text: 'was satisfied, and kept some back. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And when she rose up to glean, Boaz commanded his young men, saying, “Let her glean even among the sheaves, and do not reproach her. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Also let '
    - type: usfm
      marker: it
      children:
      - type: text
        text: grain
    - type: text
      text: ' from the bundles fall purposely for her; leave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' that she may glean, and do not rebuke her.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So she gleaned in the field until evening, and beat out what she had gleaned, and it was about an ephah of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 1:22
      marker-yv: yv-n
    - type: text
      text: 'barley. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then she took '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' up and went into the city, and her mother-in-law saw what she had gleaned.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she brought out and gave to her '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 2:14
      marker-yv: yv-n
    - type: text
      text: what she had kept back after she had been satisfied.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And her mother-in-law said to her, “Where have you gleaned today? And where did you work? Blessed be the one who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 2:10; (Ps. 41:1)
      marker-yv: yv-n
    - type: text
      text: took notice of you.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she told her mother-in-law with whom she had worked, and said, “The man’s name with whom I worked today '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Boaz.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So Ruth the Moabitess said to Naomi, “Please let me go to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:9, 10; 23:22; Deut. 24:19
      marker-yv: yv-n
    - type: text
      text: 'field, and glean heads of grain after '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' in whose sight I may find favor.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: And she said to her, “Go, my daughter.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then Naomi said to her daughter-in-law, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 3:10; 2 Sam. 2:5
      marker-yv: yv-n
    - type: text
      text: '“Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' he of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 17:17
      marker-yv: yv-n
    - type: text
      text: 'has not forsaken His kindness to the living and the dead!” And Naomi said to her, “This man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a relation of ours, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 3:9; 4:4, 6
      marker-yv: yv-n
    - type: text
      text: one of our close relatives.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ruth the Moabitess said, “He also said to me, ‘You shall stay close by my young men until they have finished all my harvest.’ ”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: And Naomi said to Ruth her daughter-in-law, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good, my daughter, that you go out with his young women, and that people do not meet you in any other field.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: So she stayed close by the young women of Boaz, to glean until the end of barley harvest and wheat harvest; and she dwelt with her mother-in-law.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then she left, and went and gleaned in the field after the reapers. And she happened to come to the part of the field '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belonging
    - type: text
      text: ' to Boaz, who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' of the family of Elimelech.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now behold, Boaz came from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 1:1
      marker-yv: yv-n
    - type: text
      text: 'Bethlehem, and said to the reapers, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 129:7, 8; Luke 1:28; 2 Thess. 3:16
      marker-yv: yv-n
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' with you!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they answered him, “The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bless you!”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then Boaz said to his servant who was in charge of the reapers, “Whose young woman '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' this?”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So the servant who was in charge of the reapers answered and said, “It '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the young Moabite woman '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 1:22
      marker-yv: yv-n
    - type: text
      text: 'who came back with Naomi from the country of Moab. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And she said, ‘Please let me glean and gather after the reapers among the sheaves.’ So she came and has continued from morning until now, though she rested a little in the house.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then Boaz said to Ruth, “You will listen, my daughter, will you not? Do not go to glean in another field, nor go from here, but stay close by my young women. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Let
    - type: text
      text: ' your eyes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' on the field which they reap, and go after them. Have I not commanded the young men not to touch you? And when you are thirsty, go to the vessels and drink from what the young men have drawn.”'
