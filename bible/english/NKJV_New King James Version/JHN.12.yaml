document_id: JHN.12,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Anointing at Bethany
  - type: text
    content: 'Then, six days before the Passover, Jesus came to Bethany, '
  - type: note
    content: Matt. 21:17; John 11:1, 43
  - type: text
    content: 'where Lazarus was who had been dead, whom He had raised from the dead. '
  '10':
  - type: note
    content: Luke 16:31
  - type: text
    content: 'But the chief priests plotted to put Lazarus to death also, '
  '11':
  - type: note
    content: John 11:45; 12:18
  - type: text
    content: because on account of him many of the Jews went away and believed in Jesus.
  - type: heading
    content: The Triumphal Entry
  '12':
  - type: note
    content: Matt. 21:4–9; Mark 11:7–10; Luke 19:35–38
  - type: text
    content: 'The next day a great multitude that had come to the feast, when they heard that Jesus was coming to Jerusalem, '
  '13':
  - type: text
    content: 'took branches of palm trees and went out to meet Him, and cried out:'
  - type: text
    content: “Hosanna!
  - type: note
    content: Ps. 118:25, 26
  - type: text
    content: '‘Blessed '
  - type: text
    content: is
  - type: text
    content: ' He who comes in the name of the '
  - type: heading
    content: Lord
  - type: text
    content: '!’'
  - type: text
    content: The King of Israel!”
  '14':
  - type: note
    content: Matt. 21:7
  - type: text
    content: 'Then Jesus, when He had found a young donkey, sat on it; as it is written:'
  '15':
  - type: text
    content: “Fear
  - type: note
    content: Is. 40:9; Zech. 9:9
  - type: text
    content: ' not, daughter of Zion;'
  - type: text
    content: Behold, your King is coming,
  - type: text
    content: Sitting on a donkey’s colt.”
  '16':
  - type: note
    content: Luke 18:34
  - type: text
    content: 'His disciples did not understand these things at first; '
  - type: note
    content: John 7:39; 12:23
  - type: text
    content: 'but when Jesus was glorified, '
  - type: note
    content: (John 14:26)
  - type: text
    content: 'then they remembered that these things were written about Him and '
  - type: text
    content: that
  - type: text
    content: ' they had done these things to Him.'
  '17':
  - type: text
    content: 'Therefore the people, who were with Him when He called Lazarus out of his tomb and raised him from the dead, bore witness. '
  '18':
  - type: note
    content: John 12:11
  - type: text
    content: 'For this reason the people also met Him, because they heard that He had done this sign. '
  '19':
  - type: text
    content: 'The Pharisees therefore said among themselves, '
  - type: note
    content: John 11:47, 48
  - type: text
    content: “You see that you are accomplishing nothing. Look, the world has gone after Him!”
  - type: heading
    content: The Fruitful Grain of Wheat
  '2':
  - type: note
    content: Matt. 26:6; Mark 14:3; Luke 10:38–41
  - type: text
    content: 'There they made Him a supper; and Martha served, but Lazarus was one of those who sat at the table with Him. '
  '20':
  - type: text
    content: 'Now there '
  - type: note
    content: Mark 7:26; Acts 17:4
  - type: text
    content: 'were certain Greeks among those '
  - type: note
    content: 1 Kin. 8:41, 42; Acts 8:27
  - type: text
    content: 'who came up to worship at the feast. '
  '21':
  - type: text
    content: 'Then they came to Philip, '
  - type: note
    content: John 1:43, 44; 14:8–11
  - type: text
    content: who was from Bethsaida of Galilee, and asked him, saying, “Sir, we wish to see Jesus.”
  '22':
  - type: text
    content: Philip came and told Andrew, and in turn Andrew and Philip told Jesus.
  '23':
  - type: text
    content: 'But Jesus answered them, saying, '
  - type: note
    content: Matt. 26:18, 45; John 13:32; Acts 3:13
  - type: text
    content: “The hour has come that the Son of Man should be glorified.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Most assuredly, I say to you, '
  - type: note
    content: (Rom. 14:9); 1 Cor. 15:36
  - type: text
    content: 'unless a grain of wheat falls into the ground and dies, it remains alone; but if it dies, it produces much '
  - type: text
    content: grain.
  - type: text
    content: ' '
  '25':
  - type: note
    content: Matt. 10:39; Mark 8:35; Luke 9:24
  - type: text
    content: He who loves his life will lose it, and he who hates his life in this world will keep it for eternal life.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'If anyone serves Me, let him '
  - type: note
    content: (Matt. 16:24)
  - type: text
    content: 'follow Me; and '
  - type: note
    content: John 14:3; 17:24; (1 Thess. 4:17)
  - type: text
    content: 'where I am, there My servant will be also. If anyone serves Me, him '
  - type: text
    content: My
  - type: text
    content: ' Father will honor.'
  - type: heading
    content: Jesus Predicts His Death on the Cross
  '27':
  - type: note
    content: (Matt. 26:38, 39); Mark 14:34; Luke 12:50; John 11:33
  - type: text
    content: '“Now My soul is troubled, and what shall I say? ‘Father, save Me from this hour’? '
  - type: note
    content: Luke 22:53; John 18:37
  - type: text
    content: But for this purpose I came to this hour.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Father, glorify Your name.”
  - type: note
    content: Matt. 3:17; 17:5; Mark 1:11; 9:7; Luke 3:22; 9:35
  - type: text
    content: 'Then a voice came from heaven, '
  - type: text
    content: saying,
  - type: text
    content: ' “I have both glorified '
  - type: text
    content: it
  - type: text
    content: ' and will glorify '
  - type: text
    content: it
  - type: text
    content: ' again.”'
  '29':
  - type: text
    content: 'Therefore the people who stood by and heard '
  - type: text
    content: it
  - type: text
    content: ' said that it had thundered. Others said, “An angel has spoken to Him.”'
  '3':
  - type: text
    content: 'Then '
  - type: note
    content: Luke 10:38, 39; John 11:2
  - type: text
    content: 'Mary took a pound of very costly oil of '
  - type: note
    content: Song 1:12
  - type: text
    content: spikenard, anointed the feet of Jesus, and wiped His feet with her hair. And the house was filled with the fragrance of the oil.
  '30':
  - type: text
    content: 'Jesus answered and said, '
  - type: note
    content: John 11:42
  - type: text
    content: “This voice did not come because of Me, but for your sake.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Now is the judgment of this world; now '
  - type: note
    content: Matt. 12:29; Luke 10:18; (Acts 26:18; 2 Cor. 4:4)
  - type: text
    content: the ruler of this world will be cast out.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'And I, '
  - type: note
    content: John 3:14; 8:28
  - type: text
    content: 'if I am '
  - type: text
    content: 'lifted up from the earth, will draw '
  - type: note
    content: (Rom. 5:18; Heb. 2:9)
  - type: text
    content: 'all '
  - type: text
    content: peoples
  - type: text
    content: ' to Myself.”'
  - type: text
    content: ' '
  '33':
  - type: note
    content: John 18:32; 21:19
  - type: text
    content: This He said, signifying by what death He would die.
  '34':
  - type: text
    content: 'The people answered Him, '
  - type: note
    content: Ps. 89:36, 37; Is. 9:6, 7; Mic. 4:7
  - type: text
    content: '“We have heard from the law that the Christ remains forever; and how '
  - type: text
    content: can
  - type: text
    content: ' You say, '
  - type: text
    content: ‘The Son of Man must be lifted up’
  - type: text
    content: '? Who is this Son of Man?”'
  '35':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: '“A little while longer '
  - type: note
    content: (John 1:9; 7:33; 8:12)
  - type: text
    content: 'the light is with you. '
  - type: note
    content: Jer. 13:16; (Gal. 6:10); Eph. 5:8
  - type: text
    content: 'Walk while you have the light, lest darkness overtake you; '
  - type: note
    content: John 11:10; (1 John 2:9–11)
  - type: text
    content: he who walks in darkness does not know where he is going.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'While you have the light, believe in the light, that you may become '
  - type: note
    content: Luke 16:8; John 8:12
  - type: text
    content: sons of light.”
  - type: text
    content: ' These things Jesus spoke, and departed, and '
  - type: note
    content: John 8:59
  - type: text
    content: was hidden from them.
  - type: heading
    content: Who Has Believed Our Report?
  '37':
  - type: text
    content: 'But although He had done so many '
  - type: note
    content: John 11:47
  - type: text
    content: 'signs before them, they did not believe in Him, '
  '38':
  - type: text
    content: 'that the word of Isaiah the prophet might be fulfilled, which he spoke:'
  - type: note
    content: Is. 53:1; Rom. 10:16
  - type: text
    content: “Lord, who has believed our report?
  - type: text
    content: 'And to whom has the arm of the '
  - type: heading
    content: Lord
  - type: text
    content: ' been revealed?”'
  '39':
  - type: text
    content: 'Therefore they could not believe, because Isaiah said again:'
  '4':
  - type: text
    content: 'But one of His disciples, '
  - type: note
    content: John 13:26
  - type: text
    content: 'Judas Iscariot, Simon’s '
  - type: text
    content: son,
  - type: text
    content: ' who would betray Him, said, '
  '40':
  - type: text
    content: “He
  - type: note
    content: Is. 6:9, 10
  - type: text
    content: ' has blinded their eyes and hardened their hearts,'
  - type: note
    content: Matt. 13:14
  - type: text
    content: 'Lest they should see with '
  - type: text
    content: their
  - type: text
    content: ' eyes,'
  - type: text
    content: 'Lest they should understand with '
  - type: text
    content: their
  - type: text
    content: ' hearts and turn,'
  - type: text
    content: So that I should heal them.”
  '41':
  - type: note
    content: Is. 6:1
  - type: text
    content: These things Isaiah said when he saw His glory and spoke of Him.
  - type: heading
    content: Walk in the Light
  '42':
  - type: text
    content: 'Nevertheless even among the rulers many believed in Him, but '
  - type: note
    content: John 7:13; 9:22
  - type: text
    content: 'because of the Pharisees they did not confess '
  - type: text
    content: Him,
  - type: text
    content: ' lest they should be put out of the synagogue; '
  '43':
  - type: note
    content: John 5:41, 44
  - type: text
    content: for they loved the praise of men more than the praise of God.
  '44':
  - type: text
    content: 'Then Jesus cried out and said, '
  - type: note
    content: Mark 9:37
  - type: text
    content: '“He who believes in Me, '
  - type: note
    content: (John 3:16, 18, 36; 11:25, 26)
  - type: text
    content: 'believes not in Me '
  - type: note
    content: (John 5:24)
  - type: text
    content: but in Him who sent Me.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'And '
  - type: note
    content: (John 14:9)
  - type: text
    content: he who sees Me sees Him who sent Me.
  - type: text
    content: ' '
  '46':
  - type: note
    content: John 1:4, 5; 8:12; 12:35, 36
  - type: text
    content: 'I have come '
  - type: text
    content: as
  - type: text
    content: ' a light into the world, that whoever believes in Me should not abide in darkness.'
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'And if anyone hears My words and does not '
  - type: text
    content: believe,
  - type: text
    content: ' '
  - type: note
    content: John 5:45
  - type: text
    content: 'I do not judge him; for '
  - type: note
    content: John 3:17
  - type: text
    content: I did not come to judge the world but to save the world.
  - type: text
    content: ' '
  '48':
  - type: note
    content: (Luke 10:16)
  - type: text
    content: He who rejects Me, and does not receive My words, has that which judges him—
  - type: note
    content: Deut. 18:18, 19; (John 5:45; 8:47)
  - type: text
    content: the word that I have spoken will judge him in the last day.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'For '
  - type: note
    content: John 8:38
  - type: text
    content: 'I have not spoken on My own '
  - type: text
    content: authority;
  - type: text
    content: ' but the Father who sent Me gave Me a command, '
  - type: note
    content: Deut. 18:18
  - type: text
    content: what I should say and what I should speak.
  - type: text
    content: ' '
  '5':
  - type: text
    content: '“Why was this fragrant oil not sold for three hundred denarii and given to the poor?” '
  '50':
  - type: text
    content: 'And I know that His command is everlasting life. Therefore, whatever I speak, just as the Father has told Me, so I '
  - type: note
    content: John 5:19; 8:28
  - type: text
    content: speak.”
  '6':
  - type: text
    content: 'This he said, not that he cared for the poor, but because he was a thief, and '
  - type: note
    content: John 13:29
  - type: text
    content: had the money box; and he used to take what was put in it.
  '7':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: '“Let her alone; '
  - type: text
    content: she has kept
  - type: text
    content: ' this for the day of My burial.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'For '
  - type: note
    content: Deut. 15:11; Matt. 26:11; Mark 14:7; John 17:11
  - type: text
    content: the poor you have with you always, but Me you do not have always.”
  - type: heading
    content: The Plot to Kill Lazarus
  '9':
  - type: text
    content: 'Now a great many of the Jews knew that He was there; and they came, not for Jesus’ sake only, but that they might also see Lazarus, '
  - type: note
    content: John 11:43, 44
  - type: text
    content: 'whom He had raised from the dead. '
