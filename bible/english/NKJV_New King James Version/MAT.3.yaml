document_id: MAT.3,114
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptist Prepares the Way
  - type: text
    content: 'In those days '
  - type: note
    content: Matt. 3:1–12; Mark 1:3–8; Luke 3:2–17; John 1:6–8, 19–28
  - type: text
    content: 'John the Baptist came preaching '
  - type: note
    content: Josh. 14:10
  - type: text
    content: 'in the wilderness of Judea, '
  '10':
  - type: text
    content: 'And even now the ax is laid to the root of the trees. '
  - type: note
    content: (Ps. 92:12–14); Matt. 7:19; Luke 13:7, 9; (John 15:6)
  - type: text
    content: 'Therefore every tree which does not bear good fruit is cut down and thrown into the fire. '
  '11':
  - type: note
    content: Mark 1:4, 8; Luke 3:16; John 1:26; Acts 1:5
  - type: text
    content: 'I indeed baptize you with water unto repentance, but He who is coming after me is mightier than I, whose sandals I am not worthy to carry. '
  - type: note
    content: (Is. 4:4; John 20:22; Acts 2:3, 4; 1 Cor. 12:13)
  - type: text
    content: 'He will baptize you with the Holy Spirit and fire. '
  '12':
  - type: note
    content: Mal. 3:3
  - type: text
    content: 'His winnowing fan '
  - type: text
    content: is
  - type: text
    content: ' in His hand, and He will thoroughly clean out His threshing floor, and gather His wheat into the barn; but He will '
  - type: note
    content: Mal. 4:1; Matt. 13:30
  - type: text
    content: burn up the chaff with unquenchable fire.”
  - type: heading
    content: John Baptizes Jesus
  '13':
  - type: note
    content: Matt. 3:13–17; Mark 1:9–11; Luke 3:21, 22; John 1:31–34
  - type: text
    content: 'Then Jesus came '
  - type: note
    content: Matt. 2:22
  - type: text
    content: 'from Galilee to John at the Jordan to be baptized by him. '
  '14':
  - type: text
    content: 'And John '
  - type: text
    content: tried
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' prevent Him, saying, “I need to be baptized by You, and are You coming to me?”'
  '15':
  - type: text
    content: 'But Jesus answered and said to him, '
  - type: text
    content: '“Permit '
  - type: text
    content: it to be so
  - type: text
    content: ' now, for thus it is fitting for us to fulfill all righteousness.”'
  - type: text
    content: ' Then he allowed Him.'
  '16':
  - type: note
    content: Mark 1:10
  - type: text
    content: 'When He had been baptized, Jesus came up immediately from the water; and behold, the heavens were opened to Him, and He saw '
  - type: note
    content: (Is. 11:2); Luke 3:22; John 1:32; Acts 7:56
  - type: text
    content: 'the Spirit of God descending like a dove and alighting upon Him. '
  '17':
  - type: note
    content: John 12:28
  - type: text
    content: 'And suddenly a voice '
  - type: text
    content: came
  - type: text
    content: ' from heaven, saying, '
  - type: note
    content: Ps. 2:7; Is. 42:1; Mark 1:11; Luke 1:35; 9:35; Col. 1:13
  - type: text
    content: “This is My beloved Son, in whom I am well pleased.”
  '2':
  - type: text
    content: 'and saying, “Repent, for '
  - type: note
    content: Dan. 2:44; Mal. 4:6; Matt. 4:17; Mark 1:15; Luke 1:17; 10:9; 11:20; 21:31
  - type: text
    content: 'the kingdom of heaven is at hand!” '
  '3':
  - type: text
    content: 'For this is he who was spoken of by the prophet Isaiah, saying:'
  - type: note
    content: Is. 40:3; Luke 3:4; John 1:23
  - type: text
    content: '“The voice of one crying in the wilderness:'
  - type: note
    content: Luke 1:76
  - type: text
    content: '‘Prepare the way of the '
  - type: heading
    content: Lord
  - type: text
    content: ;
  - type: text
    content: Make His paths straight.’ ”
  '4':
  - type: text
    content: 'Now '
  - type: note
    content: 2 Kin. 1:8; Zech. 13:4; Matt. 11:8; Mark 1:6
  - type: text
    content: 'John himself was clothed in camel’s hair, with a leather belt around his waist; and his food was '
  - type: note
    content: Lev. 11:22
  - type: text
    content: 'locusts and '
  - type: note
    content: 1 Sam. 14:25, 26
  - type: text
    content: 'wild honey. '
  '5':
  - type: note
    content: Mark 1:5
  - type: text
    content: 'Then Jerusalem, all Judea, and all the region around the Jordan went out to him '
  '6':
  - type: note
    content: Acts 19:4, 18
  - type: text
    content: and were baptized by him in the Jordan, confessing their sins.
  '7':
  - type: text
    content: 'But when he saw many of the Pharisees and Sadducees coming to his baptism, he said to them, '
  - type: note
    content: Matt. 12:34; Luke 3:7–9
  - type: text
    content: '“Brood of vipers! Who warned you to flee from '
  - type: note
    content: (Rom. 5:9; 1 Thess. 1:10)
  - type: text
    content: 'the wrath to come? '
  '8':
  - type: text
    content: 'Therefore bear fruits worthy of repentance, '
  '9':
  - type: text
    content: 'and do not think to say to yourselves, '
  - type: note
    content: John 8:33; Acts 13:26; (Rom. 4:1, 11, 16; Gal. 3:29)
  - type: text
    content: '‘We have Abraham as '
  - type: text
    content: our
  - type: text
    content: ' father.’ For I say to you that God is able to raise up children to Abraham from these stones. '
