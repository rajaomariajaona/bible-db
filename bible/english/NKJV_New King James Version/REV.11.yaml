document_id: REV.11,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Two Witnesses
  - type: text
    content: 'Then I was given '
  - type: note
    content: Ezek. 40:3—42:20; Zech. 2:1; Rev. 21:15
  - type: text
    content: 'a reed like a measuring rod. And the angel stood, saying, '
  - type: note
    content: Num. 23:18
  - type: text
    content: '“Rise and measure the temple of God, the altar, and those who worship there. '
  '10':
  - type: note
    content: Rev. 12:12
  - type: text
    content: 'And those who dwell on the earth will rejoice over them, make merry, '
  - type: note
    content: Neh. 8:10, 12; Esth. 9:19, 22
  - type: text
    content: 'and send gifts to one another, '
  - type: note
    content: Rev. 16:10
  - type: text
    content: because these two prophets tormented those who dwell on the earth.
  - type: heading
    content: The Witnesses Resurrected
  '11':
  - type: note
    content: Rev. 11:9
  - type: text
    content: 'Now after the three-and-a-half days '
  - type: note
    content: Ezek. 37:5, 9, 10
  - type: text
    content: 'the breath of life from God entered them, and they stood on their feet, and great fear fell on those who saw them. '
  '12':
  - type: text
    content: 'And they heard a loud voice from heaven saying to them, “Come up here.” '
  - type: note
    content: Is. 14:13
  - type: text
    content: 'And they ascended to heaven '
  - type: note
    content: Is. 60:8; Acts 1:9
  - type: text
    content: 'in a cloud, '
  - type: note
    content: 2 Kin. 2:11, 12
  - type: text
    content: 'and their enemies saw them. '
  '13':
  - type: text
    content: 'In the same hour '
  - type: note
    content: Rev. 6:12; 8:5; 11:19; 16:18
  - type: text
    content: 'there was a great earthquake, '
  - type: note
    content: Rev. 16:19
  - type: text
    content: 'and a tenth of the city fell. In the earthquake seven thousand people were killed, and the rest were afraid '
  - type: note
    content: Josh. 7:19; John 9:24; Rev. 14:7; 16:9; 19:7
  - type: text
    content: and gave glory to the God of heaven.
  '14':
  - type: note
    content: Rev. 8:13; 9:12
  - type: text
    content: The second woe is past. Behold, the third woe is coming quickly.
  - type: heading
    content: 'Seventh Trumpet: The Kingdom Proclaimed'
  '15':
  - type: text
    content: 'Then '
  - type: note
    content: Rev. 8:2; 10:7
  - type: text
    content: 'the seventh angel sounded: '
  - type: note
    content: Is. 27:13
  - type: text
    content: 'And there were loud voices in heaven, saying, '
  - type: note
    content: Rev. 12:10
  - type: text
    content: '“The kingdoms of this world have become '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: kingdoms
  - type: text
    content: ' of our Lord and of His Christ, '
  - type: note
    content: Ex. 15:18; Dan. 2:44; 7:14, 27; Luke 1:33
  - type: text
    content: 'and He shall reign forever and ever!” '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 19:28; Rev. 4:4
  - type: text
    content: 'the twenty-four elders who sat before God on their thrones fell on their faces and '
  - type: note
    content: Rev. 4:11; 5:9, 12, 14; 7:11
  - type: text
    content: 'worshiped God, '
  '17':
  - type: text
    content: 'saying:'
  - type: text
    content: “We give You thanks, O Lord God Almighty,
  - type: text
    content: 'The One '
  - type: note
    content: Rev. 16:5
  - type: text
    content: who is and who was and who is to come,
  - type: text
    content: 'Because You have taken Your great power '
  - type: note
    content: Rev. 19:6
  - type: text
    content: and reigned.
  '18':
  - type: text
    content: 'The nations were '
  - type: note
    content: Ps. 2:1
  - type: text
    content: angry, and Your wrath has come,
  - type: text
    content: 'And the time of the '
  - type: note
    content: Dan. 7:10; (Rev. 20:12, 13)
  - type: text
    content: dead, that they should be judged,
  - type: text
    content: And that You should reward Your servants the prophets and the saints,
  - type: text
    content: And those who fear Your name, small and great,
  - type: text
    content: And should destroy those who destroy the earth.”
  '19':
  - type: text
    content: 'Then '
  - type: note
    content: Rev. 4:1; 15:5, 8
  - type: text
    content: 'the temple of God was opened in heaven, and the ark of His covenant was seen in His temple. And '
  - type: note
    content: Rev. 8:5
  - type: text
    content: 'there were lightnings, noises, thunderings, an earthquake, '
  - type: note
    content: Rev. 16:21
  - type: text
    content: and great hail.
  '2':
  - type: text
    content: 'But leave out '
  - type: note
    content: Ezek. 40:17, 20
  - type: text
    content: 'the court which is outside the temple, and do not measure it, '
  - type: note
    content: Ps. 79:1; Luke 21:24
  - type: text
    content: 'for it has been given to the Gentiles. And they will '
  - type: note
    content: Dan. 8:10
  - type: text
    content: 'tread the holy city underfoot '
  - type: text
    content: for
  - type: text
    content: ' '
  - type: note
    content: Dan. 7:25; 12:7; Rev. 12:6; 13:5
  - type: text
    content: 'forty-two months. '
  '3':
  - type: text
    content: 'And I will give '
  - type: text
    content: power
  - type: text
    content: ' to my two '
  - type: note
    content: Deut. 17:6; Rev. 20:4
  - type: text
    content: 'witnesses, '
  - type: note
    content: Rev. 19:10
  - type: text
    content: 'and they will prophesy '
  - type: note
    content: Rev. 12:6
  - type: text
    content: one thousand two hundred and sixty days, clothed in sackcloth.”
  '4':
  - type: text
    content: 'These are the '
  - type: note
    content: Ps. 52:8; Jer. 11:16; Zech. 4:2, 3, 11, 14
  - type: text
    content: 'two olive trees and the two lampstands standing before the God of the earth. '
  '5':
  - type: text
    content: 'And if anyone wants to harm them, '
  - type: note
    content: 2 Kin. 1:10–12; Jer. 1:10; 5:14; Ezek. 43:3; Hos. 6:5; Rev. 9:17
  - type: text
    content: 'fire proceeds from their mouth and devours their enemies. '
  - type: note
    content: Num. 16:29
  - type: text
    content: 'And if anyone wants to harm them, he must be killed in this manner. '
  '6':
  - type: text
    content: 'These '
  - type: note
    content: 1 Kin. 17:1; Luke 4:25; (James 5:16, 17)
  - type: text
    content: have power to shut heaven, so that no rain falls in the days of their prophecy; and they have power over waters to turn them to blood, and to strike the earth with all plagues, as often as they desire.
  - type: heading
    content: The Witnesses Killed
  '7':
  - type: text
    content: 'When they '
  - type: note
    content: Luke 13:32
  - type: text
    content: 'finish their testimony, '
  - type: note
    content: Rev. 13:1, 11; 17:8
  - type: text
    content: 'the beast that ascends '
  - type: note
    content: Rev. 9:1, 2
  - type: text
    content: 'out of the bottomless pit '
  - type: note
    content: Dan. 7:21; Rev. 13:7
  - type: text
    content: 'will make war against them, overcome them, and kill them. '
  '8':
  - type: text
    content: 'And their dead bodies '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: lie
  - type: text
    content: ' in the street of '
  - type: note
    content: Rev. 14:8
  - type: text
    content: 'the great city which spiritually is called Sodom and Egypt, '
  - type: note
    content: Heb. 13:12
  - type: text
    content: 'where also our Lord was crucified. '
  '9':
  - type: note
    content: Rev. 17:15
  - type: text
    content: 'Then '
  - type: text
    content: those
  - type: text
    content: ' from the peoples, tribes, tongues, and nations will see their dead bodies three-and-a-half days, '
  - type: note
    content: 1 Kin. 13:22; Ps. 79:2, 3
  - type: text
    content: 'and not allow their dead bodies to be put into graves. '
