document_id: LUK.24,114
type_code: eng
verses:
  '1':
  - type: heading
    content: He Is Risen
  - type: text
    content: 'Now '
  - type: note
    content: Matt. 28:1–8; Mark 16:1–8; John 20:1–8
  - type: text
    content: 'on the first '
  - type: text
    content: day
  - type: text
    content: ' of the week, very early in the morning, they, and certain '
  - type: text
    content: other
  - type: text
    content: ' '
  - type: text
    content: women
  - type: text
    content: ' with them, came to the tomb '
  - type: note
    content: Luke 23:56
  - type: text
    content: 'bringing the spices which they had prepared. '
  '10':
  - type: text
    content: 'It was Mary Magdalene, '
  - type: note
    content: Luke 8:3
  - type: text
    content: 'Joanna, Mary '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: mother
  - type: text
    content: ' of James, and the other '
  - type: text
    content: women
  - type: text
    content: ' with them, who told these things to the apostles. '
  '11':
  - type: note
    content: Luke 24:25
  - type: text
    content: 'And their words seemed to them like idle tales, and they did not believe them. '
  '12':
  - type: note
    content: John 20:3–6
  - type: text
    content: But Peter arose and ran to the tomb; and stooping down, he saw the linen cloths lying by themselves; and he departed, marveling to himself at what had happened.
  - type: heading
    content: The Road to Emmaus
  '13':
  - type: note
    content: Mark 16:12
  - type: text
    content: 'Now behold, two of them were traveling that same day to a village called Emmaus, which was seven miles from Jerusalem. '
  '14':
  - type: text
    content: 'And they talked together of all these things which had happened. '
  '15':
  - type: text
    content: 'So it was, while they conversed and reasoned, that '
  - type: note
    content: (Matt. 18:20)
  - type: text
    content: 'Jesus Himself drew near and went with them. '
  '16':
  - type: text
    content: 'But '
  - type: note
    content: John 20:14; 21:4
  - type: text
    content: their eyes were restrained, so that they did not know Him.
  '17':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: '“What kind of conversation '
  - type: text
    content: is
  - type: text
    content: ' this that you have with one another as you '
  - type: text
    content: walk and are sad?”
  '18':
  - type: text
    content: 'Then the one '
  - type: note
    content: John 19:25
  - type: text
    content: whose name was Cleopas answered and said to Him, “Are You the only stranger in Jerusalem, and have You not known the things which happened there in these days?”
  '19':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “What things?”
  - type: text
    content: 'So they said to Him, “The things concerning Jesus of Nazareth, '
  - type: note
    content: Matt. 21:11; Luke 7:16; John 3:2; Acts 2:22
  - type: text
    content: 'who was a Prophet '
  - type: note
    content: Acts 7:22
  - type: text
    content: 'mighty in deed and word before God and all the people, '
  '2':
  - type: note
    content: Matt. 28:2; Mark 16:4
  - type: text
    content: 'But they found the stone rolled away from the tomb. '
  '20':
  - type: note
    content: Luke 23:1; Acts 13:27, 28
  - type: text
    content: 'and how the chief priests and our rulers delivered Him to be condemned to death, and crucified Him. '
  '21':
  - type: text
    content: 'But we were hoping '
  - type: note
    content: Luke 1:68; 2:38; (Acts 1:6)
  - type: text
    content: 'that it was He who was going to redeem Israel. Indeed, besides all this, today is the third day since these things happened. '
  '22':
  - type: text
    content: 'Yes, and '
  - type: note
    content: Matt. 28:8; Mark 16:10; Luke 24:9, 10
  - type: text
    content: 'certain women of our company, who arrived at the tomb early, astonished us. '
  '23':
  - type: text
    content: 'When they did not find His body, they came saying that they had also seen a vision of angels who said He was alive. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: Luke 24:12
  - type: text
    content: 'certain of those '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' with us went to the tomb and found '
  - type: text
    content: it
  - type: text
    content: ' just as the women had said; but Him they did not see.”'
  '25':
  - type: text
    content: 'Then He said to them, '
  - type: text
    content: “O foolish ones, and slow of heart to believe in all that the prophets have spoken!
  - type: text
    content: ' '
  '26':
  - type: note
    content: Acts 17:2, 3; (Heb. 2:9, 10)
  - type: text
    content: 'Ought not the Christ to have suffered these things and to enter into His '
  - type: note
    content: (1 Pet. 1:10–12)
  - type: text
    content: glory?”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And beginning at '
  - type: note
    content: (Gen. 3:15; 12:3; Num. 21:9; Deut. 18:15); John 5:46
  - type: text
    content: 'Moses and '
  - type: note
    content: (Ps. 16:9, 10; 22; 132:11; Is. 7:14; 9:6; Jer. 23:5; 33:14, 15; Ezek. 34:23; 37:25; Dan. 9:24); Mic. 7:20; (Mal. 3:1; 4:2); John 1:45; 5:39; (Rom. 1:1–6)
  - type: text
    content: all the Prophets, He expounded to them in all the Scriptures the things concerning Himself.
  - type: heading
    content: The Disciples’ Eyes Opened
  '28':
  - type: text
    content: 'Then they drew near to the village where they were going, and '
  - type: note
    content: Gen. 32:26; 42:7; Mark 6:48
  - type: text
    content: 'He indicated that He would have gone farther. '
  '29':
  - type: text
    content: 'But '
  - type: note
    content: Gen. 19:2, 3; Acts 16:15
  - type: text
    content: 'they constrained Him, saying, '
  - type: note
    content: (John 14:23)
  - type: text
    content: “Abide with us, for it is toward evening, and the day is far spent.” And He went in to stay with them.
  '3':
  - type: note
    content: Mark 16:5
  - type: text
    content: 'Then they went in and did not find the body of the Lord Jesus. '
  '30':
  - type: text
    content: 'Now it came to pass, as '
  - type: note
    content: Matt. 14:19; Mark 8:6; Luke 9:16
  - type: text
    content: 'He sat at the table with them, that He took bread, blessed and broke '
  - type: text
    content: it,
  - type: text
    content: ' and gave it to them. '
  '31':
  - type: text
    content: Then their eyes were opened and they knew Him; and He vanished from their sight.
  '32':
  - type: text
    content: 'And they said to one another, “Did not our heart burn within us while He talked with us on the road, and while He opened the Scriptures to us?” '
  '33':
  - type: text
    content: 'So they rose up that very hour and returned to Jerusalem, and found the eleven and those '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' with them gathered together, '
  '34':
  - type: text
    content: 'saying, “The Lord is risen indeed, and '
  - type: note
    content: 1 Cor. 15:5
  - type: text
    content: 'has appeared to Simon!” '
  '35':
  - type: text
    content: 'And they told about the things '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: had
  - type: text
    content: ' '
  - type: text
    content: happened
  - type: text
    content: ' on the road, and how He was known to them in the breaking of bread.'
  - type: heading
    content: Jesus Appears to His Disciples
  '36':
  - type: note
    content: Mark 16:14; John 20:19; 1 Cor. 15:5
  - type: text
    content: 'Now as they said these things, Jesus Himself stood in the midst of them, and said to them, '
  - type: text
    content: “Peace to you.”
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'But they were terrified and frightened, and supposed they had seen '
  - type: note
    content: Matt. 14:26; Mark 6:49
  - type: text
    content: 'a spirit. '
  '38':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “Why are you troubled? And why do doubts arise in your hearts?
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Behold My hands and My feet, that it is I Myself. '
  - type: note
    content: John 20:20, 27; 1 John 1:1
  - type: text
    content: 'Handle Me and see, for a '
  - type: note
    content: (1 Cor. 15:50)
  - type: text
    content: spirit does not have flesh and bones as you see I have.”
  '4':
  - type: text
    content: 'And it happened, as they were greatly perplexed about this, that '
  - type: note
    content: John 20:12; Acts 1:10
  - type: text
    content: 'behold, two men stood by them in shining garments. '
  '40':
  - type: text
    content: 'When He had said this, He showed them His hands and His feet. '
  '41':
  - type: text
    content: 'But while they still did not believe '
  - type: note
    content: Gen. 45:26
  - type: text
    content: 'for joy, and marveled, He said to them, '
  - type: note
    content: John 21:5
  - type: text
    content: “Have you any food here?”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'So they gave Him a piece of a broiled fish and some honeycomb. '
  '43':
  - type: note
    content: Acts 10:39–41
  - type: text
    content: 'And He took '
  - type: text
    content: it
  - type: text
    content: ' and ate in their presence.'
  - type: heading
    content: The Scriptures Opened
  '44':
  - type: text
    content: 'Then He said to them, '
  - type: note
    content: Matt. 16:21; 17:22; 20:18; Mark 8:31; Luke 9:22; 18:31
  - type: text
    content: '“These '
  - type: text
    content: are
  - type: text
    content: ' the words which I spoke to you while I was still with you, that all things must be fulfilled which were written in the Law of Moses and '
  - type: text
    content: the
  - type: text
    content: ' Prophets and '
  - type: text
    content: the
  - type: text
    content: ' Psalms concerning Me.”'
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'And '
  - type: note
    content: Acts 16:14; 1 John 5:20
  - type: text
    content: He opened their understanding, that they might comprehend the Scriptures.
  '46':
  - type: text
    content: 'Then He said to them, '
  - type: note
    content: Ps. 22; Hos. 6:2; Luke 11:29, 30; Acts 17:3
  - type: text
    content: '“Thus it is written, '
  - type: text
    content: and thus it was necessary for the Christ to suffer and to rise
  - type: text
    content: ' from the dead the third day,'
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'and that repentance and '
  - type: note
    content: Dan. 9:24; Acts 5:31; 10:43; 13:38; 26:18
  - type: text
    content: 'remission of sins should be preached in His name '
  - type: note
    content: (Ps. 22:27; Jer. 31:34; Mic. 4:2)
  - type: text
    content: to all nations, beginning at Jerusalem.
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'And '
  - type: note
    content: (Acts 1:8); 1 Pet. 5:1
  - type: text
    content: you are witnesses of these things.
  - type: text
    content: ' '
  '49':
  - type: note
    content: Is. 44:3; Joel 2:28; Acts 2:4
  - type: text
    content: 'Behold, I send the Promise of My Father upon you; but tarry in the city '
  - type: text
    content: of Jerusalem
  - type: text
    content: ' until you are endued with power from on high.”'
  - type: heading
    content: The Ascension
  '5':
  - type: text
    content: 'Then, as they were afraid and bowed '
  - type: text
    content: their
  - type: text
    content: ' faces to the earth, they said to them, “Why do you seek the living among the dead? '
  '50':
  - type: text
    content: 'And He led them out '
  - type: note
    content: Matt. 21:17; Acts 1:12
  - type: text
    content: 'as far as Bethany, and He lifted up His hands and blessed them. '
  '51':
  - type: note
    content: Ps. 68:18; 110:1; Mark 16:19; Acts 1:9–11
  - type: text
    content: 'Now it came to pass, while He blessed them, that He was parted from them and carried up into heaven. '
  '52':
  - type: note
    content: Matt. 28:9
  - type: text
    content: 'And they worshiped Him, and returned to Jerusalem with great joy, '
  '53':
  - type: text
    content: 'and were continually '
  - type: note
    content: Acts 2:46
  - type: text
    content: in the temple praising and blessing God. Amen.
  '6':
  - type: text
    content: 'He is not here, but is risen! '
  - type: note
    content: Matt. 16:21; Mark 8:31; Luke 9:22
  - type: text
    content: 'Remember how He spoke to you when He was still in Galilee, '
  '7':
  - type: text
    content: 'saying, '
  - type: text
    content: '‘The Son of Man must be '
  - type: note
    content: Hos. 6:1, 2; Luke 9:44; 11:29, 30; 18:31–33
  - type: text
    content: delivered into the hands of sinful men, and be crucified, and the third day rise again.’
  - type: text
    content: ' ”'
  '8':
  - type: text
    content: 'And '
  - type: note
    content: Luke 9:22, 44; John 2:19–22
  - type: text
    content: 'they remembered His words. '
  '9':
  - type: note
    content: Matt. 28:8; Mark 16:10
  - type: text
    content: 'Then they returned from the tomb and told all these things to the eleven and to all the rest. '
