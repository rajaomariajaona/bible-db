document_id: 1CO.5,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Immorality Defiles the Church
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is actually reported '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' sexual immorality among you, and such sexual immorality as is not even named among the Gentiles—that a man has his father’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:6–8; Deut. 22:30; 27:20
      marker-yv: yv-n
    - type: text
      text: 'wife! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' certainly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: did
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mean
    - type: text
      text: ' with the sexually immoral people of this world, or with the covetous, or extortioners, or idolaters, since then you would need to go '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 17:15
      marker-yv: yv-n
    - type: text
      text: 'out of the world. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now I have written to you not to keep company '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 18:17
      marker-yv: yv-n
    - type: text
      text: with anyone named a brother, who is sexually immoral, or covetous, or an idolater, or a reviler, or a drunkard, or an extortioner—
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 2:12
      marker-yv: yv-n
    - type: text
      text: not even to eat with such a person.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do
    - type: text
      text: ' with judging those also who are outside? Do you not judge those who are inside? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But those who are outside God judges. Therefore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 13:5; 17:7, 12; 19:19; 21:21; 22:21, 24; 24:7; 1 Cor. 5:2
      marker-yv: yv-n
    - type: text
      text: “put away from yourselves the evil person.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 4:18
      marker-yv: yv-n
    - type: text
      text: 'And you are puffed up, and have not rather '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 7:7–10
      marker-yv: yv-n
    - type: text
      text: 'mourned, that he who has done this deed might be taken away from among you. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 2:5; 1 Thess. 2:17
      marker-yv: yv-n
    - type: text
      text: 'For I indeed, as absent in body but present in spirit, have already judged (as though I were present) him who has so done this deed. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 18:20)
      marker-yv: yv-n
    - type: text
      text: 'name of our Lord Jesus Christ, when you are gathered together, along with my spirit, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 16:19; John 20:23); 2 Cor. 12:9
      marker-yv: yv-n
    - type: text
      text: 'with the power of our Lord Jesus Christ, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 109:6; Prov. 23:14; Luke 22:31; 1 Tim. 1:20
      marker-yv: yv-n
    - type: text
      text: 'deliver such a one to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 26:18)
      marker-yv: yv-n
    - type: text
      text: Satan for the destruction of the flesh, that his spirit may be saved in the day of the Lord Jesus.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 3:21
      marker-yv: yv-n
    - type: text
      text: 'Your glorying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not good. Do you not know that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 7:4; Matt. 16:6, 12; Gal. 5:9; 2 Tim. 2:17
      marker-yv: yv-n
    - type: text
      text: 'a little leaven leavens the whole lump? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore purge out the old leaven, that you may be a new lump, since you truly are unleavened. For indeed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 53:7
      marker-yv: yv-n
    - type: text
      text: 'Christ, our '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 19:14
      marker-yv: yv-n
    - type: text
      text: 'Passover, was sacrificed for us. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:15
      marker-yv: yv-n
    - type: text
      text: 'let us keep the feast, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 16:3
      marker-yv: yv-n
    - type: text
      text: 'not with old leaven, nor '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 16:6
      marker-yv: yv-n
    - type: text
      text: 'with the leaven of malice and wickedness, but with the unleavened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bread
    - type: text
      text: ' of sincerity and truth.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Immorality Must Be Judged
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I wrote to you in my epistle '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 6:14; Eph. 5:11; 2 Thess. 3:6
      marker-yv: yv-n
    - type: text
      text: 'not to keep company with sexually immoral people. '
