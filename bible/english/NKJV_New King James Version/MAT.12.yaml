document_id: MAT.12,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Is Lord of the Sabbath
  - type: text
    content: 'At that time '
  - type: note
    content: Mark 2:23; Luke 6:1–5
  - type: text
    content: 'Jesus went through the grainfields on the Sabbath. And His disciples were hungry, and began to '
  - type: note
    content: Deut. 23:25
  - type: text
    content: 'pluck heads of grain and to eat. '
  '10':
  - type: text
    content: 'And behold, there was a man who had a withered hand. And they asked Him, saying, '
  - type: note
    content: Luke 13:14; 14:3; John 9:16
  - type: text
    content: “Is it lawful to heal on the Sabbath?”—that they might accuse Him.
  '11':
  - type: text
    content: 'Then He said to them, '
  - type: text
    content: '“What man is there among you who has one sheep, and if it falls into a pit on the Sabbath, will not lay hold of it and lift '
  - type: text
    content: it
  - type: text
    content: ' out?'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Of how much more value then is a man than a sheep? Therefore it is lawful to do good on the Sabbath.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Then He said to the man, '
  - type: text
    content: “Stretch out your hand.”
  - type: text
    content: ' And he stretched '
  - type: text
    content: it
  - type: text
    content: ' out, and it was restored as whole as the other. '
  '14':
  - type: text
    content: 'Then '
  - type: note
    content: Ps. 2:2; Matt. 27:1; Mark 3:6; (Luke 6:11); John 5:18; 10:39; 11:53
  - type: text
    content: the Pharisees went out and plotted against Him, how they might destroy Him.
  - type: heading
    content: Behold, My Servant
  '15':
  - type: text
    content: 'But when Jesus knew '
  - type: text
    content: it,
  - type: text
    content: ' '
  - type: note
    content: Matt. 10:23; Mark 3:7
  - type: text
    content: 'He withdrew from there. '
  - type: note
    content: Matt. 19:2
  - type: text
    content: 'And great multitudes followed Him, and He healed them all. '
  '16':
  - type: text
    content: 'Yet He '
  - type: note
    content: Matt. 8:4; 9:30; 17:9
  - type: text
    content: 'warned them not to make Him known, '
  '17':
  - type: text
    content: 'that it might be fulfilled which was spoken by Isaiah the prophet, saying:'
  '18':
  - type: text
    content: '“Behold! '
  - type: note
    content: Is. 42:1–4; 49:3
  - type: text
    content: My Servant whom I have chosen,
  - type: text
    content: 'My Beloved '
  - type: note
    content: Matt. 3:17; 17:5
  - type: text
    content: in whom My soul is well pleased!
  - type: text
    content: I will put My Spirit upon Him,
  - type: text
    content: And He will declare justice to the Gentiles.
  '19':
  - type: text
    content: He will not quarrel nor cry out,
  - type: text
    content: Nor will anyone hear His voice in the streets.
  '2':
  - type: text
    content: 'And when the Pharisees saw '
  - type: text
    content: it,
  - type: text
    content: ' they said to Him, “Look, Your disciples are doing what is not lawful to do on the Sabbath!”'
  '20':
  - type: text
    content: A bruised reed He will not break,
  - type: text
    content: And smoking flax He will not quench,
  - type: text
    content: Till He sends forth justice to victory;
  '21':
  - type: text
    content: And in His name Gentiles will trust.”
  - type: heading
    content: A House Divided Cannot Stand
  '22':
  - type: note
    content: Matt. 9:32; (Mark 3:11); Luke 11:14, 15
  - type: text
    content: 'Then one was brought to Him who was demon-possessed, blind and mute; and He healed him, so that the blind and mute man both spoke and saw. '
  '23':
  - type: text
    content: 'And all the multitudes were amazed and said, “Could this be the '
  - type: note
    content: Matt. 9:27; 21:9
  - type: text
    content: Son of David?”
  '24':
  - type: note
    content: Matt. 9:34; Mark 3:22; Luke 11:15
  - type: text
    content: 'Now when the Pharisees heard '
  - type: text
    content: it
  - type: text
    content: ' they said, “This '
  - type: text
    content: fellow
  - type: text
    content: ' does not cast out demons except by Beelzebub, the ruler of the demons.”'
  '25':
  - type: text
    content: 'But Jesus '
  - type: note
    content: Matt. 9:4; John 2:25; Rev. 2:23
  - type: text
    content: 'knew their thoughts, and said to them: '
  - type: text
    content: “Every kingdom divided against itself is brought to desolation, and every city or house divided against itself will not stand.
  - type: text
    content: ' '
  '26':
  - type: text
    content: If Satan casts out Satan, he is divided against himself. How then will his kingdom stand?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And if I cast out demons by Beelzebub, by whom do your sons cast '
  - type: text
    content: them
  - type: text
    content: ' out? Therefore they shall be your judges.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'But if I cast out demons by the Spirit of God, '
  - type: note
    content: (Dan. 2:44; 7:14; Luke 1:33); 11:20; (17:20, 21; 1 John 3:8)
  - type: text
    content: surely the kingdom of God has come upon you.
  - type: text
    content: ' '
  '29':
  - type: note
    content: Is. 49:24; (Luke 11:21–23)
  - type: text
    content: Or how can one enter a strong man’s house and plunder his goods, unless he first binds the strong man? And then he will plunder his house.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'But He said to them, '
  - type: text
    content: '“Have you not read '
  - type: note
    content: Ex. 31:15; 35:2; 1 Sam. 21:6
  - type: text
    content: 'what David did when he was hungry, he and those who were with him:'
  - type: text
    content: ' '
  '30':
  - type: text
    content: He who is not with Me is against Me, and he who does not gather with Me scatters abroad.
  - type: heading
    content: The Unpardonable Sin
  '31':
  - type: text
    content: '“Therefore I say to you, '
  - type: note
    content: Mark 3:28–30; Luke 12:10; (Heb. 6:4–6; 10:26, 29; 1 John 5:16)
  - type: text
    content: 'every sin and blasphemy will be forgiven men, '
  - type: note
    content: Acts 7:51
  - type: text
    content: 'but the blasphemy '
  - type: text
    content: against
  - type: text
    content: ' the Spirit will not be forgiven men.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Anyone who '
  - type: note
    content: Matt. 11:19; 13:55; John 7:12, 52
  - type: text
    content: 'speaks a word against the Son of Man, '
  - type: note
    content: 1 Tim. 1:13
  - type: text
    content: 'it will be forgiven him; but whoever speaks against the Holy Spirit, it will not be forgiven him, either in this age or in the '
  - type: text
    content: age
  - type: text
    content: ' to come.'
  - type: heading
    content: A Tree Known by Its Fruit
  '33':
  - type: text
    content: '“Either make the tree good and '
  - type: note
    content: Matt. 7:16–18; Luke 6:43, 44; (John 15:4–7)
  - type: text
    content: 'its fruit good, or else make the tree bad and its fruit bad; for a tree is known by '
  - type: text
    content: its
  - type: text
    content: ' fruit.'
  - type: text
    content: ' '
  '34':
  - type: note
    content: Matt. 3:7; 23:33; Luke 3:7
  - type: text
    content: Brood
  - type: text
    content: ' of vipers! How can you, being evil, speak good things? '
  - type: note
    content: 1 Sam. 24:13; Is. 32:6; (Matt. 15:18); Luke 6:45; Eph. 4:29; (James 3:2–12)
  - type: text
    content: For out of the abundance of the heart the mouth speaks.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'A good man out of the good treasure '
  - type: text
    content: of his heart
  - type: text
    content: ' brings forth good things, and an evil man out of the evil treasure brings forth evil things.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: But I say to you that for every idle word men may speak, they will give account of it in the day of judgment.
  - type: text
    content: ' '
  '37':
  - type: text
    content: For by your words you will be justified, and by your words you will be condemned.”
  - type: heading
    content: The Scribes and Pharisees Ask for a Sign
  '38':
  - type: note
    content: Matt. 16:1; Mark 8:11; Luke 11:16; John 2:18; 1 Cor. 1:22
  - type: text
    content: Then some of the scribes and Pharisees answered, saying, “Teacher, we want to see a sign from You.”
  '39':
  - type: text
    content: 'But He answered and said to them, '
  - type: text
    content: '“An evil and '
  - type: note
    content: Is. 57:3; Matt. 16:4; Mark 8:38; (Luke 11:29–32); John 4:48
  - type: text
    content: adulterous generation seeks after a sign, and no sign will be given to it except the sign of the prophet Jonah.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'how he entered the house of God and ate '
  - type: note
    content: Ex. 25:30; Lev. 24:5
  - type: text
    content: 'the showbread which was not lawful for him to eat, nor for those who were with him, '
  - type: note
    content: Ex. 29:32; Lev. 8:31; 24:9
  - type: text
    content: but only for the priests?
  - type: text
    content: ' '
  '40':
  - type: note
    content: Jon. 1:17; Luke 24:46; Acts 10:40; 1 Cor. 15:4
  - type: text
    content: For as Jonah was three days and three nights in the belly of the great fish, so will the Son of Man be three days and three nights in the heart of the earth.
  - type: text
    content: ' '
  '41':
  - type: note
    content: Jon. 3:5; Luke 11:32
  - type: text
    content: 'The men of Nineveh will rise up in the judgment with this generation and '
  - type: note
    content: Jer. 3:11; Ezek. 16:51; (Rom. 2:27)
  - type: text
    content: 'condemn it, '
  - type: note
    content: Jon. 3:5
  - type: text
    content: 'because they repented at the preaching of Jonah; and indeed a greater than Jonah '
  - type: text
    content: is
  - type: text
    content: ' here.'
  - type: text
    content: ' '
  '42':
  - type: note
    content: 1 Kin. 10:1–13; 2 Chr. 9:1; Luke 11:31
  - type: text
    content: 'The queen of the South will rise up in the judgment with this generation and condemn it, for she came from the ends of the earth to hear the wisdom of Solomon; and indeed a greater than Solomon '
  - type: text
    content: is
  - type: text
    content: ' here.'
  - type: heading
    content: An Unclean Spirit Returns
  '43':
  - type: note
    content: Luke 11:24–26
  - type: text
    content: '“When an unclean spirit goes out of a man, '
  - type: note
    content: (Job 1:7; 1 Pet. 5:8)
  - type: text
    content: he goes through dry places, seeking rest, and finds none.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Then he says, '
  - type: text
    content: '‘I will return to my house from which I came.’ And when he comes, he finds '
  - type: text
    content: it
  - type: text
    content: ' empty, swept, and put in order.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Then he goes and takes with him seven other spirits more wicked than himself, and they enter and dwell there; '
  - type: note
    content: Mark 5:9; Luke 11:26; (Heb. 6:4–8; 10:26; 2 Pet. 2:20–22)
  - type: text
    content: 'and the last '
  - type: text
    content: state
  - type: text
    content: ' of that man is worse than the first. So shall it also be with this wicked generation.”'
  - type: heading
    content: Jesus’ Mother and Brothers Send for Him
  '46':
  - type: text
    content: 'While He was still talking to the multitudes, '
  - type: note
    content: Mark 3:31–35; Luke 8:19–21
  - type: text
    content: 'behold, His mother and '
  - type: note
    content: Matt. 13:55; Mark 6:3; John 2:12; 7:3, 5; Acts 1:14; 1 Cor. 9:5; Gal. 1:19
  - type: text
    content: 'brothers stood outside, seeking to speak with Him. '
  '47':
  - type: text
    content: 'Then one said to Him, “Look, '
  - type: note
    content: Matt. 13:55, 56; John 2:12; Acts 1:14
  - type: text
    content: Your mother and Your brothers are standing outside, seeking to speak with You.”
  '48':
  - type: text
    content: 'But He answered and said to the one who told Him, '
  - type: text
    content: “Who is My mother and who are My brothers?”
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'And He stretched out His hand toward His disciples and said, '
  - type: text
    content: '“Here are My mother and My '
  - type: note
    content: John 20:17; (Rom. 8:29)
  - type: text
    content: brothers!
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Or have you not read in the '
  - type: note
    content: Num. 28:9; (John 7:22)
  - type: text
    content: 'law that on the Sabbath the priests in the temple '
  - type: text
    content: profane the Sabbath, and are blameless?
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'For '
  - type: note
    content: John 15:14; (Gal. 5:6; 6:15; Col. 3:11; Heb. 2:11)
  - type: text
    content: whoever does the will of My Father in heaven is My brother and sister and mother.”
  '6':
  - type: text
    content: 'Yet I say to you that in this place there is '
  - type: note
    content: (2 Chr. 6:18; Is. 66:1, 2; Mal. 3:1); Matt. 12:41, 42
  - type: text
    content: One
  - type: text
    content: ' greater than the temple.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'But if you had known what '
  - type: text
    content: this
  - type: text
    content: ' means, '
  - type: note
    content: (1 Sam. 15:22; Hos. 6:6; Mic. 6:6–8); Matt. 9:13
  - type: text
    content: ‘I desire mercy and not sacrifice,’
  - type: text
    content: ' you would not have condemned the guiltless.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'For the Son of Man is Lord '
  - type: text
    content: even
  - type: text
    content: ' of the Sabbath.”'
  - type: heading
    content: Healing on the Sabbath
  '9':
  - type: note
    content: Mark 3:1–6; Luke 6:6–11
  - type: text
    content: 'Now when He had departed from there, He went into their synagogue. '
