verses:
  '1':
  - type: heading
    content: Prayer in Time of Chastening
  - type: text
    content: 'A Psalm of David. '
  - type: note
    content: Ps. 70:title
  - type: text
    content: To bring to remembrance.
  - type: text
    content: 'O '
  - type: heading
    content: Lord
  - type: text
    content: ', do not '
  - type: note
    content: Ps. 6:1
  - type: text
    content: rebuke me in Your wrath,
  - type: text
    content: Nor chasten me in Your hot displeasure!
  '10':
  - type: text
    content: My heart pants, my strength fails me;
  - type: text
    content: As for the light of my eyes, it also has gone from me.
  '11':
  - type: text
    content: 'My loved ones and my friends '
  - type: note
    content: Ps. 31:11; 88:18
  - type: text
    content: stand aloof from my plague,
  - type: text
    content: And my relatives stand afar off.
  '12':
  - type: text
    content: 'Those also who seek my life lay snares '
  - type: text
    content: for
  - type: text
    content: ' '
  - type: text
    content: me;
  - type: text
    content: Those who seek my hurt speak of destruction,
  - type: text
    content: And plan deception all the day long.
  '13':
  - type: text
    content: 'But I, like a deaf '
  - type: text
    content: man,
  - type: text
    content: ' do not hear;'
  - type: text
    content: 'And '
  - type: text
    content: I
  - type: text
    content: ' '
  - type: text
    content: am
  - type: text
    content: ' like a mute '
  - type: text
    content: who
  - type: text
    content: ' does not open his mouth.'
  '14':
  - type: text
    content: Thus I am like a man who does not hear,
  - type: text
    content: 'And in whose mouth '
  - type: text
    content: is
  - type: text
    content: ' no response.'
  '15':
  - type: text
    content: 'For in You, O '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: (Ps. 39:7)
  - type: text
    content: I hope;
  - type: text
    content: You will hear, O Lord my God.
  '16':
  - type: text
    content: 'For I said, '
  - type: text
    content: “Hear me,
  - type: text
    content: ' lest they rejoice over me,'
  - type: text
    content: 'Lest, when my foot slips, they exalt '
  - type: text
    content: themselves
  - type: text
    content: ' against me.”'
  '17':
  - type: note
    content: Ps. 51:3
  - type: text
    content: 'For I '
  - type: text
    content: am
  - type: text
    content: ' ready to fall,'
  - type: text
    content: 'And my sorrow '
  - type: text
    content: is
  - type: text
    content: ' continually before me.'
  '18':
  - type: text
    content: 'For I will '
  - type: note
    content: Ps. 32:5
  - type: text
    content: declare my iniquity;
  - type: text
    content: 'I will be '
  - type: note
    content: (2 Cor. 7:9, 10)
  - type: text
    content: in anguish over my sin.
  '19':
  - type: text
    content: 'But my enemies '
  - type: text
    content: are
  - type: text
    content: ' vigorous, '
  - type: text
    content: and
  - type: text
    content: ' they are strong;'
  - type: text
    content: And those who hate me wrongfully have multiplied.
  '2':
  - type: text
    content: For Your arrows pierce me deeply,
  - type: text
    content: And Your hand presses me down.
  '20':
  - type: text
    content: 'Those also '
  - type: note
    content: Ps. 35:12
  - type: text
    content: who render evil for good,
  - type: text
    content: 'They are my adversaries, because I follow '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' good.'
  '21':
  - type: text
    content: 'Do not forsake me, O '
  - type: heading
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'O my God, '
  - type: note
    content: Ps. 22:19; 35:22
  - type: text
    content: be not far from me!
  '22':
  - type: text
    content: Make haste to help me,
  - type: text
    content: O Lord, my salvation!
  '3':
  - type: text
    content: There
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' no soundness in my flesh'
  - type: text
    content: Because of Your anger,
  - type: text
    content: 'Nor '
  - type: text
    content: any
  - type: text
    content: ' health in my bones'
  - type: text
    content: Because of my sin.
  '4':
  - type: text
    content: For my iniquities have gone over my head;
  - type: text
    content: Like a heavy burden they are too heavy for me.
  '5':
  - type: text
    content: 'My wounds are foul '
  - type: text
    content: and
  - type: text
    content: ' festering'
  - type: text
    content: Because of my foolishness.
  '6':
  - type: text
    content: I am troubled, I am bowed down greatly;
  - type: text
    content: I go mourning all the day long.
  '7':
  - type: text
    content: For my loins are full of inflammation,
  - type: text
    content: 'And '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' no soundness in my flesh.'
  '8':
  - type: text
    content: I am feeble and severely broken;
  - type: text
    content: I groan because of the turmoil of my heart.
  '9':
  - type: text
    content: 'Lord, all my desire '
  - type: text
    content: is
  - type: text
    content: ' before You;'
  - type: text
    content: And my sighing is not hidden from You.
