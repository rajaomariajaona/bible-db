document_id: PSA.38
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prayer in Time of Chastening
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A Psalm of David. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 70:title
    marker-yv: yv-n
  - type: text
    text: To bring to remembrance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', do not '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 6:1
    marker-yv: yv-n
  - type: text
    text: rebuke me in Your wrath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor chasten me in Your hot displeasure!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For Your arrows pierce me deeply,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And Your hand presses me down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: it
    children:
    - type: text
      text: There
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' no soundness in my flesh'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because of Your anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Nor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: any
  - type: text
    text: ' health in my bones'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because of my sin.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For my iniquities have gone over my head;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Like a heavy burden they are too heavy for me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'My wounds are foul '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' festering'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because of my foolishness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I am troubled, I am bowed down greatly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I go mourning all the day long.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For my loins are full of inflammation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' no soundness in my flesh.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I am feeble and severely broken;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I groan because of the turmoil of my heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lord, all my desire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' before You;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my sighing is not hidden from You.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: My heart pants, my strength fails me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: As for the light of my eyes, it also has gone from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'My loved ones and my friends '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 31:11; 88:18
    marker-yv: yv-n
  - type: text
    text: stand aloof from my plague,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my relatives stand afar off.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Those also who seek my life lay snares '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Those who seek my hurt speak of destruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And plan deception all the day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But I, like a deaf '
  - type: usfm
    marker: it
    children:
    - type: text
      text: man,
  - type: text
    text: ' do not hear;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: am
  - type: text
    text: ' like a mute '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' does not open his mouth.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Thus I am like a man who does not hear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And in whose mouth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' no response.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For in You, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 39:7)
    marker-yv: yv-n
  - type: text
    text: I hope;
- type: usfm
  marker: q2
  children:
  - type: text
    text: You will hear, O Lord my God.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For I said, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: “Hear me,
  - type: text
    text: ' lest they rejoice over me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Lest, when my foot slips, they exalt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: themselves
  - type: text
    text: ' against me.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 51:3
    marker-yv: yv-n
  - type: text
    text: 'For I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: am
  - type: text
    text: ' ready to fall,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And my sorrow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' continually before me.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For I will '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 32:5
    marker-yv: yv-n
  - type: text
    text: declare my iniquity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I will be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Cor. 7:9, 10)
    marker-yv: yv-n
  - type: text
    text: in anguish over my sin.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But my enemies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' vigorous, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' they are strong;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And those who hate me wrongfully have multiplied.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Those also '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 35:12
    marker-yv: yv-n
  - type: text
    text: who render evil for good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They are my adversaries, because I follow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: what
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' good.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Do not forsake me, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'O my God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 22:19; 35:22
    marker-yv: yv-n
  - type: text
    text: be not far from me!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Make haste to help me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O Lord, my salvation!
