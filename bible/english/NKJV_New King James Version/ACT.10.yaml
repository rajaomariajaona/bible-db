  - type: text
    text: 'And we are '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 1:8
    marker-yv: yv-n
  - type: text
    text: 'witnesses of all things which He did both in the land of the Jews and in Jerusalem, whom they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 2:23
    marker-yv: yv-n
  - type: text
    text: 'killed by hanging on a tree. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Hos. 6:2; Matt. 12:39, 40; 16:4; 20:19; John 2:19–21; Acts 2:24
    marker-yv: yv-n
  - type: text
    text: 'God raised up on the third day, and showed Him openly, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 14:17, 19, 22; 15:27)
    marker-yv: yv-n
  - type: text
    text: 'not to all the people, but to witnesses chosen before by God, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: even
  - type: text
    text: ' to us '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 24:30, 41–43
    marker-yv: yv-n
  - type: text
    text: 'who ate and drank with Him after He arose from the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 28:19
    marker-yv: yv-n
  - type: text
    text: 'He commanded us to preach to the people, and to testify '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 5:22, 27; Acts 17:31
    marker-yv: yv-n
  - type: text
    text: 'that it is He who was ordained by God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' Judge '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 14:9; 2 Tim. 4:1; 1 Pet. 4:5
    marker-yv: yv-n
  - type: text
    text: 'of the living and the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
