  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 2:4; 10:44; 11:17; 15:8
    marker-yv: yv-n
  - type: text
    text: 'just as we '
  - type: usfm
    marker: it
    children:
    - type: text
      text: have?
  - type: text
    text: '” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: x
    children:
    - type: text
