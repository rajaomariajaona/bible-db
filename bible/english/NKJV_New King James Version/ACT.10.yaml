  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 28:18; Acts 2:36; Rom. 10:12; 1 Cor. 15:27
    marker-yv: yv-n
  - type: text
    text: 'He is Lord of all— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
