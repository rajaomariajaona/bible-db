  - type: text
    text: 'that word you know, which was proclaimed throughout all Judea, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 4:14
    marker-yv: yv-n
  - type: text
    text: 'began from Galilee after the baptism which John preached: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'how '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 61:1–3; Luke 4:18
    marker-yv: yv-n
  - type: text
    text: 'God anointed Jesus of Nazareth with the Holy Spirit and with power, who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 4:23
    marker-yv: yv-n
  - type: text
    text: 'went about doing good and healing all who were oppressed by the devil, '
  - type: usfm
    marker: x
    children:
    - type: text
