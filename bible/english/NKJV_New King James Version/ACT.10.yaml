document_id: ACT.10,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Cornelius Sends a Delegation
  - type: text
    content: 'There was a certain man in '
  - type: note
    content: Acts 8:40; 23:23
  - type: text
    content: 'Caesarea called Cornelius, a centurion of what was called the Italian Regiment, '
  '10':
  - type: text
    content: 'Then he became very hungry and wanted to eat; but while they made ready, he fell into a trance '
  '11':
  - type: text
    content: 'and '
  - type: note
    content: Ezek. 1:1; Matt. 3:16; Acts 7:56; Rev. 4:1; 19:11
  - type: text
    content: 'saw heaven opened and an object like a great sheet bound at the four corners, descending to him and let down to the earth. '
  '12':
  - type: text
    content: 'In it were all kinds of four-footed animals of the earth, wild beasts, creeping things, and birds of the air. '
  '13':
  - type: text
    content: 'And a voice came to him, '
  - type: text
    content: “Rise, Peter; kill and eat.”
  '14':
  - type: text
    content: 'But Peter said, “Not so, Lord! '
  - type: note
    content: Lev. 11:4; 20:25; Deut. 14:3, 7; Ezek. 4:14
  - type: text
    content: For I have never eaten anything common or unclean.”
  '15':
  - type: text
    content: 'And a voice '
  - type: text
    content: spoke
  - type: text
    content: ' to him again the second time, '
  - type: note
    content: (Matt. 15:11; Mark 7:19); Acts 10:28; (Rom. 14:14); 1 Cor. 10:25; (1 Tim. 4:4; Titus 1:15)
  - type: text
    content: '“What God has '
  - type: text
    content: cleansed you must not call common.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: This was done three times. And the object was taken up into heaven again.
  - type: heading
    content: Summoned to Caesarea
  '17':
  - type: text
    content: 'Now while Peter wondered within himself what this vision which he had seen meant, behold, the men who had been sent from Cornelius had made inquiry for Simon’s house, and stood before the gate. '
  '18':
  - type: text
    content: And they called and asked whether Simon, whose surname was Peter, was lodging there.
  '19':
  - type: text
    content: 'While Peter thought about the vision, '
  - type: note
    content: Acts 11:12
  - type: text
    content: 'the Spirit said to him, “Behold, three men are seeking you. '
  '2':
  - type: note
    content: Acts 8:2; 9:22; 22:12
  - type: text
    content: 'a devout '
  - type: text
    content: man
  - type: text
    content: ' and one who '
  - type: note
    content: (Acts 10:22, 35; 13:16, 26)
  - type: text
    content: 'feared God with all his household, who gave alms generously to the people, and prayed to God always. '
  '20':
  - type: note
    content: Acts 15:7–9
  - type: text
    content: Arise therefore, go down and go with them, doubting nothing; for I have sent them.”
  '21':
  - type: text
    content: Then Peter went down to the men who had been sent to him from Cornelius, and said, “Yes, I am he whom you seek. For what reason have you come?”
  '22':
  - type: text
    content: 'And they said, “Cornelius '
  - type: text
    content: the
  - type: text
    content: ' centurion, a just man, one who fears God and '
  - type: note
    content: Acts 22:12
  - type: text
    content: 'has a good reputation among all the nation of the Jews, was divinely instructed by a holy angel to summon you to his house, and to hear words from you.” '
  '23':
  - type: text
    content: 'Then he invited them in and lodged '
  - type: text
    content: them.
  - type: text
    content: 'On the next day Peter went away with them, '
  - type: note
    content: Acts 10:45; 11:12
  - type: text
    content: and some brethren from Joppa accompanied him.
  - type: heading
    content: Peter Meets Cornelius
  '24':
  - type: text
    content: 'And the following day they entered Caesarea. Now Cornelius was waiting for them, and had called together his relatives and close friends. '
  '25':
  - type: text
    content: 'As Peter was coming in, Cornelius met him and fell down at his feet and worshiped '
  - type: text
    content: him.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'But Peter lifted him up, saying, '
  - type: note
    content: Acts 14:14, 15; Rev. 19:10; 22:8
  - type: text
    content: '“Stand up; I myself am also a man.” '
  '27':
  - type: text
    content: 'And as he talked with him, he went in and found many who had come together. '
  '28':
  - type: text
    content: 'Then he said to them, “You know how '
  - type: note
    content: John 4:9; 18:28; Acts 11:3; Gal. 2:12
  - type: text
    content: 'unlawful it is for a Jewish man to keep company with or go to one of another nation. But '
  - type: note
    content: (Acts 10:14, 35; 15:8, 9)
  - type: text
    content: 'God has shown me that I should not call any man common or unclean. '
  '29':
  - type: text
    content: Therefore I came without objection as soon as I was sent for. I ask, then, for what reason have you sent for me?”
  '3':
  - type: text
    content: 'About the ninth hour of the day '
  - type: note
    content: Acts 10:30; 11:13
  - type: text
    content: he saw clearly in a vision an angel of God coming in and saying to him, “Cornelius!”
  '30':
  - type: text
    content: 'So Cornelius said, “Four days ago I was fasting until this hour; and at the ninth hour I prayed in my house, and behold, '
  - type: note
    content: Acts 1:10
  - type: text
    content: 'a man stood before me '
  - type: note
    content: Matt. 28:3; Mark 16:5
  - type: text
    content: 'in bright clothing, '
  '31':
  - type: text
    content: 'and said, ‘Cornelius, '
  - type: note
    content: Dan. 10:12
  - type: text
    content: 'your prayer has been heard, and '
  - type: note
    content: Heb. 6:10
  - type: text
    content: 'your alms are remembered in the sight of God. '
  '32':
  - type: text
    content: 'Send therefore to Joppa and call Simon here, whose surname is Peter. He is lodging in the house of Simon, a tanner, by the sea. When he comes, he will speak to you.’ '
  '33':
  - type: text
    content: So I sent to you immediately, and you have done well to come. Now therefore, we are all present before God, to hear all the things commanded you by God.”
  - type: heading
    content: Preaching to Cornelius’ Household
  '34':
  - type: text
    content: 'Then Peter opened '
  - type: text
    content: his
  - type: text
    content: ' mouth and said: '
  - type: note
    content: Deut. 10:17; 2 Chr. 19:7; Rom. 2:11; Gal. 2:6; Eph. 6:9
  - type: text
    content: '“In truth I perceive that God shows no partiality. '
  '35':
  - type: text
    content: 'But '
  - type: note
    content: Acts 15:9; (1 Cor. 12; 13; Eph. 2:13)
  - type: text
    content: 'in every nation whoever fears Him and works righteousness is '
  - type: note
    content: Ps. 15:1, 2
  - type: text
    content: 'accepted by Him. '
  '36':
  - type: text
    content: 'The word which '
  - type: text
    content: God
  - type: text
    content: ' sent to the children of Israel, '
  - type: note
    content: Is. 57:19; Eph. 2:14; (Col. 1:20)
  - type: text
    content: preaching peace through Jesus Christ—
  - type: note
    content: Matt. 28:18; Acts 2:36; Rom. 10:12; 1 Cor. 15:27
  - type: text
    content: 'He is Lord of all— '
  '37':
  - type: text
    content: 'that word you know, which was proclaimed throughout all Judea, and '
  - type: note
    content: Luke 4:14
  - type: text
    content: 'began from Galilee after the baptism which John preached: '
  '38':
  - type: text
    content: 'how '
  - type: note
    content: Is. 61:1–3; Luke 4:18
  - type: text
    content: 'God anointed Jesus of Nazareth with the Holy Spirit and with power, who '
  - type: note
    content: Matt. 4:23
  - type: text
    content: 'went about doing good and healing all who were oppressed by the devil, '
  - type: note
    content: John 3:2; 8:29
  - type: text
    content: 'for God was with Him. '
  '39':
  - type: text
    content: 'And we are '
  - type: note
    content: Acts 1:8
  - type: text
    content: 'witnesses of all things which He did both in the land of the Jews and in Jerusalem, whom they '
  - type: note
    content: Acts 2:23
  - type: text
    content: 'killed by hanging on a tree. '
  '4':
  - type: text
    content: And when he observed him, he was afraid, and said, “What is it, lord?”
  - type: text
    content: 'So he said to him, “Your prayers and your alms have come up for a memorial before God. '
  '40':
  - type: text
    content: 'Him '
  - type: note
    content: Hos. 6:2; Matt. 12:39, 40; 16:4; 20:19; John 2:19–21; Acts 2:24
  - type: text
    content: 'God raised up on the third day, and showed Him openly, '
  '41':
  - type: note
    content: (John 14:17, 19, 22; 15:27)
  - type: text
    content: 'not to all the people, but to witnesses chosen before by God, '
  - type: text
    content: even
  - type: text
    content: ' to us '
  - type: note
    content: Luke 24:30, 41–43
  - type: text
    content: 'who ate and drank with Him after He arose from the dead. '
  '42':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 28:19
  - type: text
    content: 'He commanded us to preach to the people, and to testify '
  - type: note
    content: John 5:22, 27; Acts 17:31
  - type: text
    content: 'that it is He who was ordained by God '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' Judge '
  - type: note
    content: Rom. 14:9; 2 Tim. 4:1; 1 Pet. 4:5
  - type: text
    content: 'of the living and the dead. '
  '43':
  - type: note
    content: (Is. 42:1; 53:11; 61:1); Jer. 31:34; Dan. 9:24; Hos. 6:1–3; Mic. 7:18; Zech. 13:1; Mal. 4:2
  - type: text
    content: 'To Him all the prophets witness that, through His name, '
  - type: note
    content: (John 3:16, 18; Acts 26:18); Rom. 10:11; Gal. 3:22
  - type: text
    content: 'whoever believes in Him will receive '
  - type: note
    content: Acts 13:38, 39
  - type: text
    content: remission of sins.”
  - type: heading
    content: The Holy Spirit Falls on the Gentiles
  '44':
  - type: text
    content: 'While Peter was still speaking these words, '
  - type: note
    content: Acts 4:31
  - type: text
    content: 'the Holy Spirit fell upon all those who heard the word. '
  '45':
  - type: note
    content: Acts 10:23
  - type: text
    content: 'And those of the circumcision who believed were astonished, as many as came with Peter, '
  - type: note
    content: Is. 42:1, 6; 49:6; Luke 2:32; John 11:52; Acts 11:18
  - type: text
    content: 'because the gift of the Holy Spirit had been poured out on the Gentiles also. '
  '46':
  - type: text
    content: For they heard them speak with tongues and magnify God.
  - type: text
    content: 'Then Peter answered, '
  '47':
  - type: text
    content: '“Can anyone forbid water, that these should not be baptized who have received the Holy Spirit '
  - type: note
    content: Acts 2:4; 10:44; 11:17; 15:8
  - type: text
    content: 'just as we '
  - type: text
    content: have?
  - type: text
    content: '” '
  '48':
  - type: note
    content: 1 Cor. 1:14–17
  - type: text
    content: 'And he commanded them to be baptized '
  - type: note
    content: Acts 2:38; 8:16; 19:5
  - type: text
    content: in the name of the Lord. Then they asked him to stay a few days.
  '5':
  - type: text
    content: 'Now '
  - type: note
    content: Acts 11:13, 14
  - type: text
    content: 'send men to Joppa, and send for Simon whose surname is Peter. '
  '6':
  - type: text
    content: 'He is lodging with '
  - type: note
    content: Acts 9:43
  - type: text
    content: 'Simon, a tanner, whose house is by the sea. '
  - type: note
    content: Acts 11:14
  - type: text
    content: 'He will tell you what you must do.” '
  '7':
  - type: text
    content: 'And when the angel who spoke to him had departed, Cornelius called two of his household servants and a devout soldier from among those who waited on him continually. '
  '8':
  - type: text
    content: 'So when he had explained all '
  - type: text
    content: these
  - type: text
    content: ' things to them, he sent them to Joppa.'
  - type: heading
    content: Peter’s Vision
  '9':
  - type: text
    content: 'The next day, as they went on their journey and drew near the city, '
  - type: note
    content: Acts10:9–32; 11:5–14
  - type: text
    content: 'Peter went up on the housetop to pray, about the sixth hour. '
