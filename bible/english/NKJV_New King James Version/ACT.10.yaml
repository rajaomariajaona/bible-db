- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And when he observed him, he was afraid, and said, “What is it, lord?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So he said to him, “Your prayers and your alms have come up for a memorial before God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 11:13, 14
    marker-yv: yv-n
  - type: text
    text: 'send men to Joppa, and send for Simon whose surname is Peter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He is lodging with '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 9:43
    marker-yv: yv-n
  - type: text
    text: 'Simon, a tanner, whose house is by the sea. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 11:14
    marker-yv: yv-n
  - type: text
    text: 'He will tell you what you must do.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And when the angel who spoke to him had departed, Cornelius called two of his household servants and a devout soldier from among those who waited on him continually. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So when he had explained all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: these
  - type: text
    text: ' things to them, he sent them to Joppa.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter’s Vision
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The next day, as they went on their journey and drew near the city, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts10:9–32; 11:5–14
    marker-yv: yv-n
  - type: text
    text: 'Peter went up on the housetop to pray, about the sixth hour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then he became very hungry and wanted to eat; but while they made ready, he fell into a trance '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 1:1; Matt. 3:16; Acts 7:56; Rev. 4:1; 19:11
    marker-yv: yv-n
  - type: text
    text: 'saw heaven opened and an object like a great sheet bound at the four corners, descending to him and let down to the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'In it were all kinds of four-footed animals of the earth, wild beasts, creeping things, and birds of the air. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And a voice came to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Rise, Peter; kill and eat.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But Peter said, “Not so, Lord! '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 11:4; 20:25; Deut. 14:3, 7; Ezek. 4:14
    marker-yv: yv-n
  - type: text
    text: For I have never eaten anything common or unclean.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And a voice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: spoke
  - type: text
    text: ' to him again the second time, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Matt. 15:11; Mark 7:19); Acts 10:28; (Rom. 14:14); 1 Cor. 10:25; (1 Tim. 4:4; Titus 1:15)
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“What God has '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: cleansed you must not call common.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: This was done three times. And the object was taken up into heaven again.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Summoned to Caesarea
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now while Peter wondered within himself what this vision which he had seen meant, behold, the men who had been sent from Cornelius had made inquiry for Simon’s house, and stood before the gate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And they called and asked whether Simon, whose surname was Peter, was lodging there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'While Peter thought about the vision, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 11:12
    marker-yv: yv-n
  - type: text
    text: 'the Spirit said to him, “Behold, three men are seeking you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 15:7–9
    marker-yv: yv-n
  - type: text
    text: Arise therefore, go down and go with them, doubting nothing; for I have sent them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then Peter went down to the men who had been sent to him from Cornelius, and said, “Yes, I am he whom you seek. For what reason have you come?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And they said, “Cornelius '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' centurion, a just man, one who fears God and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 22:12
    marker-yv: yv-n
  - type: text
    text: 'has a good reputation among all the nation of the Jews, was divinely instructed by a holy angel to summon you to his house, and to hear words from you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then he invited them in and lodged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'On the next day Peter went away with them, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 10:45; 11:12
    marker-yv: yv-n
  - type: text
    text: and some brethren from Joppa accompanied him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Meets Cornelius
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the following day they entered Caesarea. Now Cornelius was waiting for them, and had called together his relatives and close friends. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'As Peter was coming in, Cornelius met him and fell down at his feet and worshiped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But Peter lifted him up, saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 14:14, 15; Rev. 19:10; 22:8
    marker-yv: yv-n
  - type: text
    text: '“Stand up; I myself am also a man.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And as he talked with him, he went in and found many who had come together. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then he said to them, “You know how '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 4:9; 18:28; Acts 11:3; Gal. 2:12
    marker-yv: yv-n
  - type: text
    text: 'unlawful it is for a Jewish man to keep company with or go to one of another nation. But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Acts 10:14, 35; 15:8, 9)
    marker-yv: yv-n
  - type: text
    text: 'God has shown me that I should not call any man common or unclean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Therefore I came without objection as soon as I was sent for. I ask, then, for what reason have you sent for me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So Cornelius said, “Four days ago I was fasting until this hour; and at the ninth hour I prayed in my house, and behold, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 1:10
    marker-yv: yv-n
  - type: text
    text: 'a man stood before me '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 28:3; Mark 16:5
    marker-yv: yv-n
  - type: text
    text: 'in bright clothing, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and said, ‘Cornelius, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 10:12
    marker-yv: yv-n
  - type: text
    text: 'your prayer has been heard, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. 6:10
    marker-yv: yv-n
  - type: text
    text: 'your alms are remembered in the sight of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Send therefore to Joppa and call Simon here, whose surname is Peter. He is lodging in the house of Simon, a tanner, by the sea. When he comes, he will speak to you.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So I sent to you immediately, and you have done well to come. Now therefore, we are all present before God, to hear all the things commanded you by God.”
- type: usfm
  marker: s1
  children:
  - type: text
