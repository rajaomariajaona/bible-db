  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'There was a certain man in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 8:40; 23:23
    marker-yv: yv-n
  - type: text
    text: 'Caesarea called Cornelius, a centurion of what was called the Italian Regiment, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 8:2; 9:22; 22:12
    marker-yv: yv-n
  - type: text
    text: 'a devout '
  - type: usfm
    marker: it
    children:
    - type: text
      text: man
  - type: text
    text: ' and one who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Acts 10:22, 35; 13:16, 26)
    marker-yv: yv-n
  - type: text
    text: 'feared God with all his household, who gave alms generously to the people, and prayed to God always. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'About the ninth hour of the day '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 10:30; 11:13
    marker-yv: yv-n
  - type: text
