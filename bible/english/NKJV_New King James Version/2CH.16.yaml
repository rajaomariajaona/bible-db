document_id: 2CH.16,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Asa’s Treaty with Syria
  - type: text
    content: 'In the thirty-sixth year of the reign of Asa, '
  - type: note
    content: 1 Kin. 15:17–22
  - type: text
    content: 'Baasha king of Israel came up against Judah and built Ramah, '
  - type: note
    content: 2 Chr. 15:9
  - type: text
    content: 'that he might let none go out or come in to Asa king of Judah. '
  '10':
  - type: text
    content: 'Then Asa was angry with the seer, and '
  - type: note
    content: 2 Chr. 18:26; Jer. 20:2; Matt. 14:3
  - type: text
    content: 'put him in prison, for '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' enraged at him because of this. And Asa oppressed '
  - type: text
    content: some
  - type: text
    content: ' of the people at that time.'
  - type: heading
    content: Illness and Death of Asa
  '11':
  - type: note
    content: 1 Kin. 15:23, 24; 2 Chr. 14:2
  - type: text
    content: 'Note that the acts of Asa, first and last, are indeed written in the book of the kings of Judah and Israel. '
  '12':
  - type: text
    content: 'And in the thirty-ninth year of his reign, Asa became diseased in his feet, and his malady was severe; yet in his disease he '
  - type: note
    content: (Jer. 17:5)
  - type: text
    content: 'did not seek the '
  - type: heading
    content: Lord
  - type: text
    content: ', but the physicians.'
  '13':
  - type: note
    content: 1 Kin. 15:24
  - type: text
    content: 'So Asa rested with his fathers; he died in the forty-first year of his reign. '
  '14':
  - type: text
    content: 'They buried him in his own tomb, which he had made for himself in the City of David; and they laid him in the bed which was filled '
  - type: note
    content: Gen. 50:2; Mark 16:1; John 19:39, 40
  - type: text
    content: 'with spices and various ingredients prepared in a mixture of ointments. They made '
  - type: note
    content: 2 Chr. 21:19; Jer. 34:5
  - type: text
    content: a very great burning for him.
  '2':
  - type: text
    content: 'Then Asa brought silver and gold from the treasuries of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and of the king’s house, and sent to Ben-Hadad king of Syria, who dwelt in Damascus, saying, '
  '3':
  - type: text
    content: “
  - type: text
    content: Let
  - type: text
    content: ' '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' a treaty between you and me, as there was between my father and your father. See, I have sent you silver and gold; come, break your treaty with Baasha king of Israel, so that he will withdraw from me.”'
  '4':
  - type: text
    content: 'So Ben-Hadad heeded King Asa, and sent the captains of his armies against the cities of Israel. They attacked Ijon, Dan, Abel Maim, and all the storage cities of Naphtali. '
  '5':
  - type: text
    content: 'Now it happened, when Baasha heard '
  - type: text
    content: it,
  - type: text
    content: ' that he stopped building Ramah and ceased his work. '
  '6':
  - type: text
    content: Then King Asa took all Judah, and they carried away the stones and timber of Ramah, which Baasha had used for building; and with them he built Geba and Mizpah.
  - type: heading
    content: Hanani’s Message to Asa
  '7':
  - type: text
    content: 'And at that time '
  - type: note
    content: 1 Kin. 16:1; 2 Chr. 19:2
  - type: text
    content: 'Hanani the seer came to Asa king of Judah, and said to him: '
  - type: note
    content: 2 Chr. 32:8–10; Ps. 118:9; (Is. 31:1; Jer. 17:5)
  - type: text
    content: '“Because you have relied on the king of Syria, and have not relied on the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, therefore the army of the king of Syria has escaped from your hand. '
  '8':
  - type: text
    content: 'Were '
  - type: note
    content: 2 Chr. 14:9
  - type: text
    content: 'the Ethiopians and '
  - type: note
    content: 2 Chr. 12:3
  - type: text
    content: 'the Lubim not a huge army with very many chariots and horsemen? Yet, because you relied on the '
  - type: heading
    content: Lord
  - type: text
    content: ', He delivered them into your '
  - type: note
    content: 2 Chr. 13:16, 18
  - type: text
    content: 'hand. '
  '9':
  - type: note
    content: Job 34:21; (Prov. 5:21; 15:3; Jer. 16:17; 32:19); Zech. 4:10
  - type: text
    content: 'For the eyes of the '
  - type: heading
    content: Lord
  - type: text
    content: ' run to and fro throughout the whole earth, to show Himself strong on behalf of '
  - type: text
    content: those
  - type: text
    content: ' whose heart '
  - type: text
    content: is
  - type: text
    content: ' loyal to Him. In this '
  - type: note
    content: 1 Sam. 13:13
  - type: text
    content: 'you have done foolishly; therefore from now on '
  - type: note
    content: 1 Kin. 15:32
  - type: text
    content: 'you shall have wars.” '
