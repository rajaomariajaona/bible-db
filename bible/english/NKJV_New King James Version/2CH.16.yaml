document_id: 2CH.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Asa’s Treaty with Syria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the thirty-sixth year of the reign of Asa, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 15:17–22
    marker-yv: yv-n
  - type: text
    text: 'Baasha king of Israel came up against Judah and built Ramah, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 15:9
    marker-yv: yv-n
  - type: text
    text: 'that he might let none go out or come in to Asa king of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Asa brought silver and gold from the treasuries of the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and of the king’s house, and sent to Ben-Hadad king of Syria, who dwelt in Damascus, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Let
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' a treaty between you and me, as there was between my father and your father. See, I have sent you silver and gold; come, break your treaty with Baasha king of Israel, so that he will withdraw from me.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Ben-Hadad heeded King Asa, and sent the captains of his armies against the cities of Israel. They attacked Ijon, Dan, Abel Maim, and all the storage cities of Naphtali. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now it happened, when Baasha heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it,
  - type: text
    text: ' that he stopped building Ramah and ceased his work. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then King Asa took all Judah, and they carried away the stones and timber of Ramah, which Baasha had used for building; and with them he built Geba and Mizpah.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hanani’s Message to Asa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And at that time '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 16:1; 2 Chr. 19:2
    marker-yv: yv-n
  - type: text
    text: 'Hanani the seer came to Asa king of Judah, and said to him: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 32:8–10; Ps. 118:9; (Is. 31:1; Jer. 17:5)
    marker-yv: yv-n
  - type: text
    text: '“Because you have relied on the king of Syria, and have not relied on the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, therefore the army of the king of Syria has escaped from your hand. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Were '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 14:9
    marker-yv: yv-n
  - type: text
    text: 'the Ethiopians and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 12:3
    marker-yv: yv-n
  - type: text
    text: 'the Lubim not a huge army with very many chariots and horsemen? Yet, because you relied on the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', He delivered them into your '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 13:16, 18
    marker-yv: yv-n
  - type: text
    text: 'hand. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 34:21; (Prov. 5:21; 15:3; Jer. 16:17; 32:19); Zech. 4:10
    marker-yv: yv-n
  - type: text
    text: 'For the eyes of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' run to and fro throughout the whole earth, to show Himself strong on behalf of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: those
  - type: text
    text: ' whose heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' loyal to Him. In this '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 13:13
    marker-yv: yv-n
  - type: text
    text: 'you have done foolishly; therefore from now on '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 15:32
    marker-yv: yv-n
  - type: text
    text: 'you shall have wars.” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Asa was angry with the seer, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 18:26; Jer. 20:2; Matt. 14:3
    marker-yv: yv-n
  - type: text
    text: 'put him in prison, for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' enraged at him because of this. And Asa oppressed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' of the people at that time.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Illness and Death of Asa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 15:23, 24; 2 Chr. 14:2
    marker-yv: yv-n
  - type: text
    text: 'Note that the acts of Asa, first and last, are indeed written in the book of the kings of Judah and Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And in the thirty-ninth year of his reign, Asa became diseased in his feet, and his malady was severe; yet in his disease he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Jer. 17:5)
    marker-yv: yv-n
  - type: text
    text: 'did not seek the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', but the physicians.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 15:24
    marker-yv: yv-n
  - type: text
    text: 'So Asa rested with his fathers; he died in the forty-first year of his reign. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They buried him in his own tomb, which he had made for himself in the City of David; and they laid him in the bed which was filled '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 50:2; Mark 16:1; John 19:39, 40
    marker-yv: yv-n
  - type: text
    text: 'with spices and various ingredients prepared in a mixture of ointments. They made '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 21:19; Jer. 34:5
    marker-yv: yv-n
  - type: text
    text: a very great burning for him.
