document_id: 1CH.14,114
type_code: eng
verses:
  '1':
  - type: heading
    content: David Established at Jerusalem
  - type: text
    content: 'Now '
  - type: note
    content: 2 Sam. 5:11; 1 Kin. 5:1
  - type: text
    content: 'Hiram king of Tyre sent messengers to David, and cedar trees, with masons and carpenters, to build him a house. '
  '10':
  - type: text
    content: 'And David '
  - type: note
    content: 1 Sam. 23:2, 4; 30:8; 2 Sam. 2:1; 5:19, 23; 21:1
  - type: text
    content: inquired of God, saying, “Shall I go up against the Philistines? Will You deliver them into my hand?”
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' said to him, “Go up, for I will deliver them into your hand.”'
  '11':
  - type: text
    content: 'So they went up to Baal Perazim, and David defeated them there. Then David said, “God has broken through my enemies by my hand like a breakthrough of water.” Therefore they called the name of that place Baal Perazim. '
  '12':
  - type: text
    content: And when they left their gods there, David gave a commandment, and they were burned with fire.
  '13':
  - type: note
    content: 2 Sam. 5:22–25
  - type: text
    content: 'Then the Philistines once again made a raid on the valley. '
  '14':
  - type: text
    content: 'Therefore David inquired again of God, and God said to him, “You shall not go up after them; circle around them, '
  - type: note
    content: 2 Sam. 5:23
  - type: text
    content: 'and come upon them in front of the mulberry trees. '
  '15':
  - type: text
    content: 'And it shall be, when you hear a sound of marching in the tops of the mulberry trees, then you shall go out to battle, for God has gone out before you to strike the camp of the Philistines.” '
  '16':
  - type: text
    content: 'So David did as God commanded him, and they drove back the army of the Philistines from Gibeon as far as Gezer. '
  '17':
  - type: text
    content: 'Then '
  - type: note
    content: Josh. 6:27; 2 Chr. 26:8
  - type: text
    content: 'the fame of David went out into all lands, and the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: (Ex. 15:14–16; Deut. 2:25; 11:25); 2 Chr. 20:29
  - type: text
    content: brought the fear of him upon all nations.
  '2':
  - type: text
    content: 'So David knew that the '
  - type: heading
    content: Lord
  - type: text
    content: ' had established him as king over Israel, for his kingdom was '
  - type: note
    content: Num. 24:7
  - type: text
    content: highly exalted for the sake of His people Israel.
  '3':
  - type: text
    content: 'Then David took more wives in Jerusalem, and David begot more sons and daughters. '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: 1 Chr. 3:5–8
  - type: text
    content: 'these are the names of his children whom he had in Jerusalem: Shammua, Shobab, Nathan, Solomon, '
  '5':
  - type: text
    content: 'Ibhar, Elishua, Elpelet, '
  '6':
  - type: text
    content: 'Nogah, Nepheg, Japhia, '
  '7':
  - type: text
    content: Elishama, Beeliada, and Eliphelet.
  - type: heading
    content: The Philistines Defeated
  '8':
  - type: text
    content: 'Now when the Philistines heard that '
  - type: note
    content: 2 Sam. 5:17–21
  - type: text
    content: 'David had been anointed king over all Israel, all the Philistines went up to search for David. And David heard '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' and went out against them. '
  '9':
  - type: text
    content: 'Then the Philistines went and made a raid '
  - type: note
    content: Josh. 17:15; 18:16; 1 Chr. 11:15; 14:13
  - type: text
    content: 'on the Valley of Rephaim. '
