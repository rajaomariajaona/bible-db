document_id: 1CH.14,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Established at Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:11; 1 Kin. 5:1
      marker-yv: yv-n
    - type: text
      text: 'Hiram king of Tyre sent messengers to David, and cedar trees, with masons and carpenters, to build him a house. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 23:2, 4; 30:8; 2 Sam. 2:1; 5:19, 23; 21:1
      marker-yv: yv-n
    - type: text
      text: inquired of God, saying, “Shall I go up against the Philistines? Will You deliver them into my hand?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, “Go up, for I will deliver them into your hand.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they went up to Baal Perazim, and David defeated them there. Then David said, “God has broken through my enemies by my hand like a breakthrough of water.” Therefore they called the name of that place Baal Perazim. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when they left their gods there, David gave a commandment, and they were burned with fire.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:22–25
      marker-yv: yv-n
    - type: text
      text: 'Then the Philistines once again made a raid on the valley. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore David inquired again of God, and God said to him, “You shall not go up after them; circle around them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:23
      marker-yv: yv-n
    - type: text
      text: 'and come upon them in front of the mulberry trees. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be, when you hear a sound of marching in the tops of the mulberry trees, then you shall go out to battle, for God has gone out before you to strike the camp of the Philistines.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David did as God commanded him, and they drove back the army of the Philistines from Gibeon as far as Gezer. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 6:27; 2 Chr. 26:8
      marker-yv: yv-n
    - type: text
      text: 'the fame of David went out into all lands, and the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 15:14–16; Deut. 2:25; 11:25); 2 Chr. 20:29
      marker-yv: yv-n
    - type: text
      text: brought the fear of him upon all nations.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David knew that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had established him as king over Israel, for his kingdom was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 24:7
      marker-yv: yv-n
    - type: text
      text: highly exalted for the sake of His people Israel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David took more wives in Jerusalem, and David begot more sons and daughters. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 3:5–8
      marker-yv: yv-n
    - type: text
      text: 'these are the names of his children whom he had in Jerusalem: Shammua, Shobab, Nathan, Solomon, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ibhar, Elishua, Elpelet, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nogah, Nepheg, Japhia, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elishama, Beeliada, and Eliphelet.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Philistines Defeated
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when the Philistines heard that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:17–21
      marker-yv: yv-n
    - type: text
      text: 'David had been anointed king over all Israel, all the Philistines went up to search for David. And David heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' and went out against them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Philistines went and made a raid '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 17:15; 18:16; 1 Chr. 11:15; 14:13
      marker-yv: yv-n
    - type: text
      text: 'on the Valley of Rephaim. '
