document_id: PSA.61,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Assurance of God’s Eternal Protection
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. On a stringed instrument. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: A
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Hear my cry, O God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Attend to my prayer.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: From the end of the earth I will cry to You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When my heart is overwhelmed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lead me to the rock that is higher than I.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For You have been a shelter for me,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 18:10
      marker-yv: yv-n
    - type: text
      text: A strong tower from the enemy.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I will abide in Your tabernacle forever;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 91:4
      marker-yv: yv-n
    - type: text
      text: I will trust in the shelter of Your wings.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For You, O God, have heard my vows;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You have given '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' the heritage of those who fear Your name.'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You will prolong the king’s life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His years as many generations.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He shall abide before God forever.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Oh, prepare mercy '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 40:11
      marker-yv: yv-n
    - type: text
      text: 'and truth, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' may preserve him!'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So I will sing praise to Your name forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I may daily perform my vows.
