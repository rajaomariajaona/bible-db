document_id: PSA.61,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Assurance of God’s Eternal Protection
  - type: text
    content: 'To the Chief Musician. On a stringed instrument. '
  - type: text
    content: A
  - type: text
    content: ' '
  - type: text
    content: Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: Hear my cry, O God;
  - type: text
    content: Attend to my prayer.
  '2':
  - type: text
    content: From the end of the earth I will cry to You,
  - type: text
    content: When my heart is overwhelmed;
  - type: text
    content: Lead me to the rock that is higher than I.
  '3':
  - type: text
    content: For You have been a shelter for me,
  - type: note
    content: Prov. 18:10
  - type: text
    content: A strong tower from the enemy.
  '4':
  - type: text
    content: I will abide in Your tabernacle forever;
  - type: note
    content: Ps. 91:4
  - type: text
    content: I will trust in the shelter of Your wings.
  - type: text
    content: Selah
  '5':
  - type: text
    content: For You, O God, have heard my vows;
  - type: text
    content: 'You have given '
  - type: text
    content: me
  - type: text
    content: ' the heritage of those who fear Your name.'
  '6':
  - type: text
    content: You will prolong the king’s life,
  - type: text
    content: His years as many generations.
  '7':
  - type: text
    content: He shall abide before God forever.
  - type: text
    content: 'Oh, prepare mercy '
  - type: note
    content: Ps. 40:11
  - type: text
    content: 'and truth, '
  - type: text
    content: which
  - type: text
    content: ' may preserve him!'
  '8':
  - type: text
    content: So I will sing praise to Your name forever,
  - type: text
    content: That I may daily perform my vows.
