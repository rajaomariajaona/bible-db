    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not here with us today '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '(for you know that we dwelt in the land of Egypt and that we came through the nations which you passed by, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'and you saw their abominations and their idols which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' among them—wood and stone and silver and gold); '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'so that there may not be among you man or woman or family or tribe, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 11:16
      marker-yv: yv-n
    - type: text
      text: 'whose heart turns away today from the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, to go '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' serve the gods of these nations, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 12:15
      marker-yv: yv-n
    - type: text
      text: 'and that there may not be among you a root bearing '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:32; Acts 8:23
      marker-yv: yv-n
    - type: text
      text: 'bitterness or wormwood; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and so it may not happen, when he hears the words of this curse, that he blesses himself in his heart, saying, ‘I shall have peace, even though I follow the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 3:17; 7:24
      marker-yv: yv-n
    - type: text
      text: dictates of my heart’—
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 30:1
      marker-yv: yv-n
    - type: text
      text: as though the drunkard could be included with the sober.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Now Moses called all Israel and said to them: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:4; Deut. 11:7
      marker-yv: yv-n
    - type: text
      text: '“You have seen all that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did before your eyes in the land of Egypt, to Pharaoh and to all his servants and to all his land— '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 14:7
      marker-yv: yv-n
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' would not spare him; for then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 74:1
      marker-yv: yv-n
    - type: text
      text: 'the anger of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 79:5; Ezek. 23:25
      marker-yv: yv-n
    - type: text
      text: 'His jealousy would burn against that man, and every curse that is written in this book would settle on him, and the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 32:33; Deut. 9:14; 2 Kin. 14:27
      marker-yv: yv-n
    - type: text
      text: 'would blot out his name from under heaven. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 24:51)
      marker-yv: yv-n
    - type: text
      text: 'would separate him from all the tribes of Israel for adversity, according to all the curses of the covenant that are written in this Book of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 30:10
      marker-yv: yv-n
    - type: text
      text: 'Law, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'so that the coming generation of your children who rise up after you, and the foreigner who comes from a far land, would say, when they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 19:8; 49:17; 50:13
      marker-yv: yv-n
    - type: text
      text: 'see the plagues of that land and the sicknesses which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has laid on it:'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '‘The whole land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' brimstone, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 17:6; Zeph. 2:9
      marker-yv: yv-n
    - type: text
      text: 'salt, and burning; it is not sown, nor does it bear, nor does any grass grow there, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:24, 25; Is. 1:9; Jer. 20:16; Hos. 11:8
      marker-yv: yv-n
    - type: text
      text: 'like the overthrow of Sodom and Gomorrah, Admah, and Zeboiim, which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' overthrew in His anger and His wrath.’ '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“All nations would say, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 9:8; Jer. 22:8
      marker-yv: yv-n
    - type: text
      text: '‘Why has the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' done so to this land? What does the heat of this great anger mean?’ '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
      text: ' would say: ‘Because they have forsaken the covenant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of their fathers, which He made with them when He brought them out of the land of Egypt; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'for they went and served other gods and worshiped them, gods that they did not know and that He had not given to them. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Then the anger of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was aroused against this land, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 9:11
      marker-yv: yv-n
    - type: text
      text: 'to bring on it every curse that is written in this book. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:15; 2 Chr. 7:20; Ps. 52:5; Prov. 2:22
      marker-yv: yv-n
    - type: text
      text: 'uprooted them from their land in anger, in wrath, and in great indignation, and cast them into another land, as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' this day.’'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '“The secret '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belong
    - type: text
      text: ' to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, but those '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' revealed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belong
    - type: text
      text: ' to us and to our children forever, that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we
    - type: text
      text: ' may do all the words of this law.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:34; 7:19
      marker-yv: yv-n
    - type: text
      text: 'the great trials which your eyes have seen, the signs, and those great wonders. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Yet '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 6:9, 10; Ezek. 12:2); Matt. 13:14; (Acts 28:26, 27); Rom. 11:8; (Eph. 4:18)
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not given you a heart to perceive and eyes to see and ears to hear, to this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: very
    - type: text
      text: ' day. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:3; 8:2
      marker-yv: yv-n
    - type: text
      text: 'And I have led you forty years in the wilderness. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 8:4
      marker-yv: yv-n
    - type: text
      text: 'Your clothes have not worn out on you, and your sandals have not worn out on your feet. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 16:12; Deut. 8:3
      marker-yv: yv-n
    - type: text
      text: 'You have not eaten bread, nor have you drunk wine or '
    - type: usfm
      marker: it
      children:
      - type: text
        text: similar
    - type: text
      text: ' drink, that you may know that I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And when you came to this place, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:23, 24; Deut. 2:26—3:3
      marker-yv: yv-n
    - type: text
      text: 'Sihon king of Heshbon and Og king of Bashan came out against us to battle, and we conquered them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'We took their land and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:33; Deut. 3:12, 13
      marker-yv: yv-n
    - type: text
      text: 'gave it as an inheritance to the Reubenites, to the Gadites, and to half the tribe of Manasseh. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:6; 1 Kin. 2:3
      marker-yv: yv-n
    - type: text
      text: 'keep the words of this covenant, and do them, that you may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 1:7
      marker-yv: yv-n
    - type: text
      text: prosper in all that you do.
