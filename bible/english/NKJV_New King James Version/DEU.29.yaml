  - type: text
    content: ' your God. '
  '7':
  - type: text
    content: 'And when you came to this place, '
  - type: note
    content: Num. 21:23, 24; Deut. 2:26—3:3
  - type: text
    content: 'Sihon king of Heshbon and Og king of Bashan came out against us to battle, and we conquered them. '
  '8':
  - type: text
    content: 'We took their land and '
  - type: note
    content: Num. 32:33; Deut. 3:12, 13
  - type: text
    content: 'gave it as an inheritance to the Reubenites, to the Gadites, and to half the tribe of Manasseh. '
  '9':
  - type: text
    content: 'Therefore '
  - type: note
    content: Deut. 4:6; 1 Kin. 2:3
  - type: text
