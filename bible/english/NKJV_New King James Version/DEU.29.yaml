  '3':
  - type: note
    content: Deut. 4:34; 7:19
  - type: text
    content: 'the great trials which your eyes have seen, the signs, and those great wonders. '
  '4':
  - type: text
    content: 'Yet '
  - type: note
    content: (Is. 6:9, 10; Ezek. 12:2); Matt. 13:14; (Acts 28:26, 27); Rom. 11:8; (Eph. 4:18)
  - type: text
    content: 'the '
