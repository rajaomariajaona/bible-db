      text: 'but with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' who stands here with us today before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, '
    - type: usfm
      marker: x
      children:
      - type: text
