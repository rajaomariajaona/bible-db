  - type: text
    content: ' has not given you a heart to perceive and eyes to see and ears to hear, to this '
  - type: text
    content: very
  - type: text
    content: ' day. '
  '5':
  - type: note
    content: Deut. 1:3; 8:2
  - type: text
    content: 'And I have led you forty years in the wilderness. '
  - type: note
    content: Deut. 8:4
  - type: text
    content: 'Your clothes have not worn out on you, and your sandals have not worn out on your feet. '
  '6':
  - type: note
    content: Ex. 16:12; Deut. 8:3
  - type: text
    content: 'You have not eaten bread, nor have you drunk wine or '
  - type: text
