    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the words of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:46; Deut. 5:2, 3
      marker-yv: yv-n
    - type: text
      text: 'covenant which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses to make with the children of Israel in the land of Moab, besides the covenant which He made with them in Horeb.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“All of you stand today before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God: your leaders and your tribes and your elders and your officers, all the men of Israel, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'your little ones and your wives—also the stranger who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in your camp, from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 9:21, 23, 27
      marker-yv: yv-n
    - type: text
      text: 'the one who cuts your wood to the one who draws your water— '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'that you may enter into covenant with the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 10:29
      marker-yv: yv-n
    - type: text
      text: 'into His oath, which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God makes with you today, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'that He may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:9
      marker-yv: yv-n
    - type: text
      text: 'establish you today as a people for Himself, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' He may be God to you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 6:7
      marker-yv: yv-n
    - type: text
