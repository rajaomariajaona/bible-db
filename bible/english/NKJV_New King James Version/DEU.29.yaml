  '23':
  - type: text
    content: '‘The whole land '
  - type: text
    content: is
  - type: text
    content: ' brimstone, '
  - type: note
    content: Jer. 17:6; Zeph. 2:9
  - type: text
    content: 'salt, and burning; it is not sown, nor does it bear, nor does any grass grow there, '
  - type: note
    content: Gen. 19:24, 25; Is. 1:9; Jer. 20:16; Hos. 11:8
  - type: text
    content: 'like the overthrow of Sodom and Gomorrah, Admah, and Zeboiim, which the '
  - type: heading
    content: Lord
  - type: text
    content: ' overthrew in His anger and His wrath.’ '
  '24':
  - type: text
    content: '“All nations would say, '
  - type: note
    content: 1 Kin. 9:8; Jer. 22:8
  - type: text
    content: '‘Why has the '
  - type: heading
    content: Lord
  - type: text
    content: ' done so to this land? What does the heat of this great anger mean?’ '
  '25':
  - type: text
    content: 'Then '
  - type: text
    content: people
  - type: text
    content: ' would say: ‘Because they have forsaken the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of their fathers, which He made with them when He brought them out of the land of Egypt; '
  '26':
  - type: text
    content: 'for they went and served other gods and worshiped them, gods that they did not know and that He had not given to them. '
  '27':
  - type: text
    content: 'Then the anger of the '
  - type: heading
    content: Lord
  - type: text
    content: ' was aroused against this land, '
  - type: note
    content: Dan. 9:11
  - type: text
    content: 'to bring on it every curse that is written in this book. '
  '28':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 1 Kin. 14:15; 2 Chr. 7:20; Ps. 52:5; Prov. 2:22
  - type: text
    content: 'uprooted them from their land in anger, in wrath, and in great indignation, and cast them into another land, as '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' this day.’'
