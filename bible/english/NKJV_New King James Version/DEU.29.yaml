    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:7, 8
      marker-yv: yv-n
    - type: text
      text: just as He has sworn to your fathers, to Abraham, Isaac, and Jacob.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
