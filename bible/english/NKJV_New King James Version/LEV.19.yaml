  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 18:28; Jer. 16:6
    marker-yv: yv-n
  - type: text
    text: 'make any cuttings in your flesh for the dead, nor tattoo any marks on you: I am the '
  - type: usfm
