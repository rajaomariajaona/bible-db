  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ‘You shall keep My statutes. You shall not let your livestock breed with another kind. You shall not sow your field with mixed seed. Nor shall a garment of mixed linen and wool come upon you.
- type: usfm
