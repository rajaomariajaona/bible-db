document_id: LEV.19,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Moral and Ceremonial Laws
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'And you shall not glean your vineyard, nor shall you gather every grape of your vineyard; you shall leave them for the poor and the stranger: I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.'
  '11':
  - type: note
    content: Ex. 20:15, 16
  - type: text
    content: '‘You shall not steal, nor deal falsely, '
  - type: note
    content: Jer. 9:3–5; Eph. 4:25
  - type: text
    content: 'nor lie to one another. '
  '12':
  - type: text
    content: 'And you shall not '
  - type: note
    content: Ex. 20:7; Deut. 5:11; (Matt. 5:33–37; James 5:12)
  - type: text
    content: 'swear by My name falsely, '
  - type: note
    content: Lev. 18:21
  - type: text
    content: 'nor shall you profane the name of your God: I am the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '13':
  - type: note
    content: Ex. 22:7–15, 21–27; Mark 10:19
  - type: text
    content: '‘You shall not cheat your neighbor, nor rob him. '
  - type: note
    content: Deut. 24:15; Mal. 3:5; James 5:4
  - type: text
    content: 'The wages of him who is hired shall not remain with you all night until morning. '
  '14':
  - type: text
    content: 'You shall not curse the deaf, '
  - type: note
    content: Deut. 27:18
  - type: text
    content: 'nor put a stumbling block before the blind, but shall fear your God: I am the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: '‘You shall do no injustice in '
  - type: note
    content: Deut. 16:19
  - type: text
    content: 'judgment. You shall not '
  - type: note
    content: Ex. 23:3, 6; Deut. 1:17; 10:17; Ps. 82:2
  - type: text
    content: 'be partial to the poor, nor honor the person of the mighty. In righteousness you shall judge your neighbor. '
  '16':
  - type: text
    content: 'You shall not go about as a '
  - type: note
    content: Prov. 11:13; 18:8; 20:19
  - type: text
    content: 'talebearer among your people; nor shall you '
  - type: note
    content: Ex. 23:7; Deut. 27:25; 1 Kin. 21:7–19
  - type: text
    content: 'take a stand against the life of your neighbor: I am the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '17':
  - type: note
    content: (1 John 2:9, 11; 3:15)
  - type: text
    content: '‘You shall not hate your brother in your heart. '
  - type: note
    content: Matt. 18:15; (Luke 17:3); Eph. 5:11
  - type: text
    content: 'You shall surely rebuke your neighbor, and not bear sin because of him. '
  '18':
  - type: note
    content: (Deut. 32:35; 1 Sam. 24:12; Rom. 12:19; Heb. 10:30)
  - type: text
    content: 'You shall not take vengeance, nor bear any grudge against the children of your people, '
  - type: note
    content: Matt. 5:43; 19:19; Mark 12:31; Luke 10:27; (Rom. 13:9; Gal. 5:14); James 2:8
  - type: text
    content: 'but you shall love your neighbor as yourself: I am the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '19':
  - type: text
    content: ‘You shall keep My statutes. You shall not let your livestock breed with another kind. You shall not sow your field with mixed seed. Nor shall a garment of mixed linen and wool come upon you.
  '2':
  - type: text
    content: '“Speak to all the congregation of the children of Israel, and say to them: '
  - type: note
    content: Ex. 19:6; Lev. 11:44; 20:7, 26; (Eph. 1:4); 1 Pet. 1:16
  - type: text
    content: '‘You shall be holy, for I the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God am holy.'
  '20':
  - type: text
    content: '‘Whoever lies carnally with a woman who is '
  - type: note
    content: Deut. 22:23–27
  - type: text
    content: 'betrothed to a man as a concubine, and who has not at all been redeemed nor given her freedom, for this there shall be scourging; but they shall not be put to death, because she was not free. '
  '21':
  - type: text
    content: 'And he shall bring his trespass offering to the '
  - type: heading
    content: Lord
  - type: text
    content: ', to the door of the tabernacle of meeting, a ram as a trespass offering. '
  '22':
  - type: text
    content: 'The priest shall make atonement for him with the ram of the trespass offering before the '
  - type: heading
    content: Lord
  - type: text
    content: ' for his sin which he has committed. And the sin which he has committed shall be forgiven him.'
  '23':
  - type: text
    content: '‘When you come into the land, and have planted all kinds of trees for food, then you shall count their fruit as uncircumcised. Three years it shall be as uncircumcised to you. It shall not be eaten. '
  '24':
  - type: text
    content: 'But in the fourth year all its fruit shall be holy, a praise to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'And in the fifth year you may eat its fruit, that it may yield to you its increase: I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.'
  '26':
  - type: text
    content: '‘You shall not eat anything with the blood, nor shall you practice divination or soothsaying. '
  '27':
  - type: text
    content: 'You shall not shave around the sides of your head, nor shall you disfigure the edges of your beard. '
  '28':
  - type: text
    content: 'You shall not '
  - type: note
    content: 1 Kin. 18:28; Jer. 16:6
  - type: text
    content: 'make any cuttings in your flesh for the dead, nor tattoo any marks on you: I am the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '29':
  - type: note
    content: Lev. 21:9; Deut. 22:21; 23:17, 18
  - type: text
    content: ‘Do not prostitute your daughter, to cause her to be a harlot, lest the land fall into harlotry, and the land become full of wickedness.
  '3':
  - type: note
    content: Ex. 20:12; Deut. 5:16; Matt. 15:4; Eph. 6:2
  - type: text
    content: '‘Every one of you shall revere his mother and his father, and '
  - type: note
    content: Ex. 16:23; 20:8; 31:13
  - type: text
    content: 'keep My Sabbaths: I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.'
  '30':
  - type: text
    content: '‘You shall keep My Sabbaths and '
  - type: note
    content: Lev. 26:2; Eccl. 5:1
  - type: text
    content: 'reverence My sanctuary: I am the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '31':
  - type: text
    content: '‘Give no regard to mediums and familiar spirits; do not seek after '
  - type: note
    content: Lev. 20:6, 27; Deut. 18:11; 1 Sam. 28:3; Is. 8:19
  - type: text
    content: 'them, to be defiled by them: I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.'
  '32':
  - type: note
    content: Prov. 23:22; Lam. 5:12; 1 Tim. 5:1
  - type: text
    content: '‘You shall rise before the gray headed and honor the presence of an old man, and '
  - type: note
    content: Lev. 19:14
  - type: text
    content: 'fear your God: I am the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '33':
  - type: text
    content: '‘And '
  - type: note
    content: Ex. 22:21; Deut. 24:17, 18
  - type: text
    content: 'if a stranger dwells with you in your land, you shall not mistreat him. '
  '34':
  - type: note
    content: Ex. 12:48
  - type: text
    content: 'The stranger who dwells among you shall be to you as one born among you, and '
  - type: note
    content: Deut. 10:19
  - type: text
    content: 'you shall love him as yourself; for you were strangers in the land of Egypt: I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.'
  '35':
  - type: text
    content: '‘You shall do no injustice in judgment, in measurement of length, weight, or volume. '
  '36':
  - type: text
    content: 'You shall have '
  - type: note
    content: Deut. 25:13–15; Prov. 20:10
  - type: text
    content: 'honest scales, honest weights, an honest ephah, and an honest hin: I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, who brought you out of the land of Egypt.'
  '37':
  - type: note
    content: Lev. 18:4, 5; Deut. 4:5, 6; 5:1; 6:25
  - type: text
    content: '‘Therefore you shall observe all My statutes and all My judgments, and perform them: I am the '
  - type: heading
    content: Lord
  - type: text
    content: .’ ”
  '4':
  - type: note
    content: Ex. 20:4; Ps. 96:5; 115:4–7; 1 Cor. 10:14; (Col. 3:5)
  - type: text
    content: '‘Do not turn to idols, '
  - type: note
    content: Ex. 34:17
  - type: text
    content: 'nor make for yourselves molded gods: I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.'
  '5':
  - type: text
    content: '‘And '
  - type: note
    content: Lev. 7:16
  - type: text
    content: 'if you offer a sacrifice of a peace offering to the '
  - type: heading
    content: Lord
  - type: text
    content: ', you shall offer it of your own free will. '
  '6':
  - type: text
    content: 'It shall be eaten the same day you offer it, and on the next day. And if any remains until the third day, it shall be burned in the fire. '
  '7':
  - type: text
    content: 'And if it is eaten at all on the third day, it is an abomination. It shall not be accepted. '
  '8':
  - type: text
    content: 'Therefore everyone who eats it shall bear his iniquity, because he has profaned the hallowed offering of the '
  - type: heading
    content: Lord
  - type: text
    content: ; and that person shall be cut off from his people.
  '9':
  - type: note
    content: Lev. 23:22; Deut. 24:19–22
  - type: text
    content: '‘When you reap the harvest of your land, you shall not wholly reap the corners of your field, nor shall you gather the gleanings of your harvest. '
