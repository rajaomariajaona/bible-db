  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 22:23–27
    marker-yv: yv-n
  - type: text
    text: 'betrothed to a man as a concubine, and who has not at all been redeemed nor given her freedom, for this there shall be scourging; but they shall not be put to death, because she was not free. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he shall bring his trespass offering to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
