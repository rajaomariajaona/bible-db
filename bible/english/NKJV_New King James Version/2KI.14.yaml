document_id: 2KI.14,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amaziah Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 13:10
      marker-yv: yv-n
    - type: text
      text: 'the second year of Joash the son of Jehoahaz, king of Israel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 25:1, 2
      marker-yv: yv-n
    - type: text
      text: 'Amaziah the son of Joash, king of Judah, became king. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'You have indeed defeated Edom, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 8:14; 2 Chr. 32:25; (Ezek. 28:2, 5, 17; Hab. 2:4)
      marker-yv: yv-n
    - type: text
      text: 'your heart has lifted you up. Glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that,
    - type: text
      text: ' and stay at home; for why should you meddle with trouble so that you fall—you and Judah with you?”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But Amaziah would not heed. Therefore Jehoash king of Israel went out; so he and Amaziah king of Judah faced one another at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:38; 21:16
      marker-yv: yv-n
    - type: text
      text: 'Beth Shemesh, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belongs
    - type: text
      text: ' to Judah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And Judah was defeated by Israel, and every man fled to his tent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then Jehoash king of Israel captured Amaziah king of Judah, the son of Jehoash, the son of Ahaziah, at Beth Shemesh; and he went to Jerusalem, and broke down the wall of Jerusalem from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 8:16; 12:39
      marker-yv: yv-n
    - type: text
      text: 'the Gate of Ephraim to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 31:38; Zech. 14:10
      marker-yv: yv-n
    - type: text
      text: 'the Corner Gate—four hundred cubits. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And he took all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:51; 2 Kin. 12:18; 16:8
      marker-yv: yv-n
    - type: text
      text: 'the gold and silver, all the articles that were found in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and in the treasuries of the king’s house, and hostages, and returned to Samaria.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 13:12, 13
      marker-yv: yv-n
    - type: text
      text: Now the rest of the acts of Jehoash which he did—his might, and how he fought with Amaziah king of Judah—
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: So Jehoash rested with his fathers, and was buried in Samaria with the kings of Israel. Then Jeroboam his son reigned in his place.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 25:25–28
      marker-yv: yv-n
    - type: text
      text: 'Amaziah the son of Joash, king of Judah, lived fifteen years after the death of Jehoash the son of Jehoahaz, king of Israel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Now the rest of the acts of Amaziah, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Judah? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 25:27
      marker-yv: yv-n
    - type: text
      text: 'they formed a conspiracy against him in Jerusalem, and he fled to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 10:31
      marker-yv: yv-n
    - type: text
      text: 'Lachish; but they sent after him to Lachish and killed him there. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He was twenty-five years old when he became king, and he reigned twenty-nine years in Jerusalem. His mother’s name was Jehoaddan of Jerusalem. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Then they brought him on horses, and he was buried at Jerusalem with his fathers in the City of David.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And all the people of Judah took '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 15:13; 2 Chr. 26:1
      marker-yv: yv-n
    - type: text
      text: 'Azariah, who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' sixteen years old, and made him king instead of his father Amaziah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'He built '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 9:26; 2 Kin. 16:6; 2 Chr. 8:17
      marker-yv: yv-n
    - type: text
      text: Elath and restored it to Judah, after the king rested with his fathers.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeroboam II Reigns in Israel
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'In the fifteenth year of Amaziah the son of Joash, king of Judah, Jeroboam the son of Joash, king of Israel, became king in Samaria, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reigned
    - type: text
      text: ' forty-one years. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And he did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '; he did not depart from all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:26–33
      marker-yv: yv-n
    - type: text
      text: 'sins of Jeroboam the son of Nebat, who had made Israel sin. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 10:32; 13:5, 25
      marker-yv: yv-n
    - type: text
      text: 'restored the territory of Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:21; 34:8; 1 Kin. 8:65
      marker-yv: yv-n
    - type: text
      text: 'from the entrance of Hamath to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 3:17
      marker-yv: yv-n
    - type: text
      text: 'the Sea of the Arabah, according to the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel, which He had spoken through His servant '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jon. 1:1; Matt. 12:39, 40
      marker-yv: yv-n
    - type: text
      text: 'Jonah the son of Amittai, the prophet who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:13
      marker-yv: yv-n
    - type: text
      text: 'Gath Hepher. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 3:7; 2 Kin. 13:4; Ps. 106:44
      marker-yv: yv-n
    - type: text
      text: 'saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' the affliction of Israel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' very bitter; and whether bond or free, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:36
      marker-yv: yv-n
    - type: text
      text: 'there was no helper for Israel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Kin. 13:5, 23)
      marker-yv: yv-n
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did not say that He would blot out the name of Israel from under heaven; but He saved them by the hand of Jeroboam the son of Joash.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Now the rest of the acts of Jeroboam, and all that he did—his might, how he made war, and how he recaptured for Israel, from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:24
      marker-yv: yv-n
    - type: text
      text: 'Damascus and Hamath, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:6; 1 Kin. 11:24; 2 Chr. 8:3
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belonged
    - type: text
      text: ' to Judah—'
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'So Jeroboam rested with his fathers, the kings of Israel. Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 15:8
      marker-yv: yv-n
    - type: text
      text: Zechariah his son reigned in his place.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And he did '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' right in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', yet not like his father David; he did everything '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 12:2
      marker-yv: yv-n
    - type: text
      text: 'as his father Joash had done. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 12:3
      marker-yv: yv-n
    - type: text
      text: However the high places were not taken away, and the people still sacrificed and burned incense on the high places.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now it happened, as soon as the kingdom was established in his hand, that he executed his servants '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 12:20
      marker-yv: yv-n
    - type: text
      text: 'who had murdered his father the king. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But the children of the murderers he did not execute, according to what is written in the Book of the Law of Moses, in which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 24:16; (Jer. 31:30; Ezek. 18:4, 20)
      marker-yv: yv-n
    - type: text
      text: “Fathers shall not be put to death for their children, nor shall children be put to death for their fathers; but a person shall be put to death for his own sin.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 25:5–16
      marker-yv: yv-n
    - type: text
      text: 'He killed ten thousand Edomites in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:13; 1 Chr. 18:12; Ps. 60:title
      marker-yv: yv-n
    - type: text
      text: 'the Valley of Salt, and took Sela by war, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:38
      marker-yv: yv-n
    - type: text
      text: and called its name Joktheel to this day.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 25:17, 18
      marker-yv: yv-n
    - type: text
      text: 'Then Amaziah sent messengers to Jehoash the son of Jehoahaz, the son of Jehu, king of Israel, saying, “Come, let us face one another '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: battle.
    - type: text
      text: '” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And Jehoash king of Israel sent to Amaziah king of Judah, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 9:8–15
      marker-yv: yv-n
    - type: text
      text: '“The thistle that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in Lebanon sent to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 4:33
      marker-yv: yv-n
    - type: text
      text: 'cedar that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in Lebanon, saying, ‘Give your daughter to my son as wife’; and a wild beast that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in Lebanon passed by and trampled the thistle. '
