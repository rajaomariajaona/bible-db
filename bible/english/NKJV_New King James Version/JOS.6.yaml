  '1':
  - type: heading
    content: The Destruction of Jericho
  - type: text
    content: 'Now '
  - type: note
    content: Josh. 2:1
  - type: text
    content: 'Jericho was securely shut up because of the children of Israel; none went out, and none came in. '
  '10':
  - type: text
    content: 'Now Joshua had commanded the people, saying, “You shall not shout or make any noise with your voice, nor shall a word proceed out of your mouth, until the day I say to you, ‘Shout!’ Then you shall shout.” '
  '11':
  - type: text
    content: 'So he had '
  - type: note
    content: Josh. 4:11
  - type: text
    content: 'the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: ' circle the city, going around '
  - type: text
    content: it
  - type: text
    content: ' once. Then they came into the camp and lodged in the camp.'
  '12':
  - type: text
    content: 'And Joshua rose early in the morning, '
  - type: note
    content: Deut. 31:25
  - type: text
    content: 'and the priests took up the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Then seven priests bearing seven trumpets of rams’ horns before the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: ' went on continually and blew with the trumpets. And the armed men went before them. But the rear guard came after the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: ', while '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: priests
  - type: text
    content: ' continued blowing the trumpets. '
  '14':
  - type: text
    content: And the second day they marched around the city once and returned to the camp. So they did six days.
  '15':
  - type: text
    content: 'But it came to pass on the seventh day that they rose early, about the dawning of the day, and marched around the city seven times in the same manner. On that day only they marched around the city seven times. '
  '16':
  - type: text
    content: 'And the seventh time it happened, when the priests blew the trumpets, that Joshua said to the people: “Shout, for the '
  - type: heading
    content: Lord
  - type: text
    content: ' has given you the city! '
  '17':
  - type: text
    content: 'Now the city shall be '
  - type: note
    content: Deut. 13:17; Josh. 7:1
  - type: text
    content: 'doomed by the '
  - type: heading
    content: Lord
  - type: text
    content: ' to destruction, it and all who '
  - type: text
    content: are
  - type: text
    content: ' in it. Only '
  - type: note
    content: Josh. 2:1; Matt. 1:5
  - type: text
    content: 'Rahab the harlot shall live, she and all who '
  - type: text
    content: are
  - type: text
    content: ' with her in the house, because '
  - type: note
    content: Josh. 2:4, 6
  - type: text
    content: 'she hid the messengers that we sent. '
  '18':
  - type: text
    content: 'And you, '
  - type: note
    content: Deut. 7:26
  - type: text
    content: 'by all means abstain from the accursed things, lest you become accursed when you take of the accursed things, and make the camp of Israel a curse, '
  - type: note
    content: Josh. 7:1, 12, 25; 1 Kin. 18:17, 18; (Jon. 1:12)
  - type: text
    content: 'and trouble it. '
  '19':
  - type: text
    content: 'But all the silver and gold, and vessels of bronze and iron, '
  - type: text
    content: are
  - type: text
    content: ' consecrated to the '
  - type: heading
    content: Lord
  - type: text
    content: '; they shall come into the treasury of the '
  - type: heading
    content: Lord
  - type: text
    content: .”
  '2':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Joshua: “See! '
  - type: note
    content: Josh. 2:9, 24; 8:1
  - type: text
    content: 'I have given Jericho into your hand, its '
  - type: note
    content: Deut. 7:24
  - type: text
    content: 'king, '
  - type: text
    content: and
  - type: text
    content: ' the mighty men of valor. '
  '20':
  - type: text
    content: 'So the people shouted when '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: priests
  - type: text
    content: ' blew the trumpets. And it happened when the people heard the sound of the trumpet, and the people shouted with a great shout, that '
  - type: note
    content: Heb. 11:30
  - type: text
    content: 'the wall fell down flat. Then the people went up into the city, every man straight before him, and they took the city. '
  '21':
  - type: text
    content: 'And they '
  - type: note
    content: Deut. 7:2; 20:16, 17
  - type: text
    content: 'utterly destroyed all that '
  - type: text
    content: was
  - type: text
    content: ' in the city, both man and woman, young and old, ox and sheep and donkey, with the edge of the sword.'
  '22':
  - type: text
    content: 'But Joshua had said to the two men who had spied out the country, “Go into the harlot’s house, and from there bring out the woman and all that she has, '
  - type: note
    content: Josh. 2:12–19; Heb. 11:31
  - type: text
    content: 'as you swore to her.” '
  '23':
  - type: text
    content: 'And the young men who had been spies went in and brought out Rahab, '
  - type: note
    content: Josh. 2:13
  - type: text
    content: 'her father, her mother, her brothers, and all that she had. So they brought out all her relatives and left them outside the camp of Israel. '
  '24':
  - type: text
    content: 'But they burned the city and all that '
  - type: text
    content: was
  - type: text
    content: ' in it with fire. Only the silver and gold, and the vessels of bronze and iron, they put into the treasury of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'And Joshua spared Rahab the harlot, her father’s household, and all that she had. So '
  - type: note
    content: (Matt. 1:5)
  - type: text
    content: she dwells in Israel to this day, because she hid the messengers whom Joshua sent to spy out Jericho.
  '26':
  - type: text
    content: 'Then Joshua charged '
  - type: text
    content: them
  - type: text
    content: ' at that time, saying, '
  - type: note
    content: 1 Kin. 16:34
  - type: text
    content: '“Cursed '
  - type: text
    content: be
  - type: text
    content: ' the man before the '
  - type: heading
    content: Lord
  - type: text
    content: ' who rises up and builds this city Jericho; he shall lay its foundation with his firstborn, and with his youngest he shall set up its gates.”'
  '27':
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' was with Joshua, and his fame spread throughout all the country.'
  '3':
  - type: text
    content: 'You shall march around the city, all '
  - type: text
    content: you
  - type: text
    content: ' men of war; you shall go all around the city once. This you shall do six days. '
  '4':
  - type: text
    content: 'And seven priests shall bear seven '
  - type: note
    content: Lev. 25:9; Judg. 7:16, 22
  - type: text
    content: 'trumpets of rams’ horns before the ark. But the seventh day you shall march around the city '
  - type: note
    content: 1 Kin. 18:43; 2 Kin. 4:35; 5:10
  - type: text
    content: 'seven times, and '
  - type: note
    content: Num. 10:8
  - type: text
    content: 'the priests shall blow the trumpets. '
  '5':
  - type: text
    content: 'It shall come to pass, when they make a long '
  - type: text
    content: blast
  - type: text
    content: ' with the ram’s horn, '
  - type: text
    content: and
  - type: text
    content: ' when you hear the sound of the trumpet, that all the people shall shout with a great shout; then the wall of the city will fall down flat. And the people shall go up every man straight before him.”'
  '6':
  - type: text
    content: 'Then Joshua the son of Nun called the priests and said to them, “Take up the ark of the covenant, and let seven priests bear seven trumpets of rams’ horns before the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: '.” '
  '7':
  - type: text
    content: 'And he said to the people, “Proceed, and march around the city, and let him who is armed advance before the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: .”
  '8':
  - type: text
    content: 'So it was, when Joshua had spoken to the people, that the seven priests bearing the seven trumpets of rams’ horns before the '
  - type: heading
    content: Lord
  - type: text
    content: ' advanced and blew the trumpets, and the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' followed them. '
  '9':
  - type: text
    content: 'The armed men went before the priests who blew the trumpets, '
  - type: note
    content: Num. 10:25
  - type: text
    content: 'and the rear guard came after the ark, while '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: priests
  - type: text
    content: ' continued blowing the trumpets. '
