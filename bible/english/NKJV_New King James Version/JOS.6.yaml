document_id: JOS.6,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Destruction of Jericho
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 2:1
      marker-yv: yv-n
    - type: text
      text: 'Jericho was securely shut up because of the children of Israel; none went out, and none came in. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joshua had commanded the people, saying, “You shall not shout or make any noise with your voice, nor shall a word proceed out of your mouth, until the day I say to you, ‘Shout!’ Then you shall shout.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 4:11
      marker-yv: yv-n
    - type: text
      text: 'the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' circle the city, going around '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' once. Then they came into the camp and lodged in the camp.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua rose early in the morning, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 31:25
      marker-yv: yv-n
    - type: text
      text: 'and the priests took up the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then seven priests bearing seven trumpets of rams’ horns before the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' went on continually and blew with the trumpets. And the armed men went before them. But the rear guard came after the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', while '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: priests
    - type: text
      text: ' continued blowing the trumpets. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the second day they marched around the city once and returned to the camp. So they did six days.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it came to pass on the seventh day that they rose early, about the dawning of the day, and marched around the city seven times in the same manner. On that day only they marched around the city seven times. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the seventh time it happened, when the priests blew the trumpets, that Joshua said to the people: “Shout, for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given you the city! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the city shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 13:17; Josh. 7:1
      marker-yv: yv-n
    - type: text
      text: 'doomed by the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to destruction, it and all who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in it. Only '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 2:1; Matt. 1:5
      marker-yv: yv-n
    - type: text
      text: 'Rahab the harlot shall live, she and all who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' with her in the house, because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 2:4, 6
      marker-yv: yv-n
    - type: text
      text: 'she hid the messengers that we sent. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:26
      marker-yv: yv-n
    - type: text
      text: 'by all means abstain from the accursed things, lest you become accursed when you take of the accursed things, and make the camp of Israel a curse, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 7:1, 12, 25; 1 Kin. 18:17, 18; (Jon. 1:12)
      marker-yv: yv-n
    - type: text
      text: 'and trouble it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But all the silver and gold, and vessels of bronze and iron, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' consecrated to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '; they shall come into the treasury of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Joshua: “See! '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 2:9, 24; 8:1
      marker-yv: yv-n
    - type: text
      text: 'I have given Jericho into your hand, its '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:24
      marker-yv: yv-n
    - type: text
      text: 'king, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the mighty men of valor. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the people shouted when '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: priests
    - type: text
      text: ' blew the trumpets. And it happened when the people heard the sound of the trumpet, and the people shouted with a great shout, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 11:30
      marker-yv: yv-n
    - type: text
      text: 'the wall fell down flat. Then the people went up into the city, every man straight before him, and they took the city. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:2; 20:16, 17
      marker-yv: yv-n
    - type: text
      text: 'utterly destroyed all that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in the city, both man and woman, young and old, ox and sheep and donkey, with the edge of the sword.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Joshua had said to the two men who had spied out the country, “Go into the harlot’s house, and from there bring out the woman and all that she has, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 2:12–19; Heb. 11:31
      marker-yv: yv-n
    - type: text
      text: 'as you swore to her.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the young men who had been spies went in and brought out Rahab, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 2:13
      marker-yv: yv-n
    - type: text
      text: 'her father, her mother, her brothers, and all that she had. So they brought out all her relatives and left them outside the camp of Israel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they burned the city and all that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in it with fire. Only the silver and gold, and the vessels of bronze and iron, they put into the treasury of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua spared Rahab the harlot, her father’s household, and all that she had. So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 1:5)
      marker-yv: yv-n
    - type: text
      text: she dwells in Israel to this day, because she hid the messengers whom Joshua sent to spy out Jericho.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua charged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' at that time, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 16:34
      marker-yv: yv-n
    - type: text
      text: '“Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the man before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who rises up and builds this city Jericho; he shall lay its foundation with his firstborn, and with his youngest he shall set up its gates.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with Joshua, and his fame spread throughout all the country.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall march around the city, all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' men of war; you shall go all around the city once. This you shall do six days. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And seven priests shall bear seven '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 25:9; Judg. 7:16, 22
      marker-yv: yv-n
    - type: text
      text: 'trumpets of rams’ horns before the ark. But the seventh day you shall march around the city '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 18:43; 2 Kin. 4:35; 5:10
      marker-yv: yv-n
    - type: text
      text: 'seven times, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 10:8
      marker-yv: yv-n
    - type: text
      text: 'the priests shall blow the trumpets. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It shall come to pass, when they make a long '
    - type: usfm
      marker: it
      children:
      - type: text
        text: blast
    - type: text
      text: ' with the ram’s horn, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' when you hear the sound of the trumpet, that all the people shall shout with a great shout; then the wall of the city will fall down flat. And the people shall go up every man straight before him.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua the son of Nun called the priests and said to them, “Take up the ark of the covenant, and let seven priests bear seven trumpets of rams’ horns before the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to the people, “Proceed, and march around the city, and let him who is armed advance before the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it was, when Joshua had spoken to the people, that the seven priests bearing the seven trumpets of rams’ horns before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' advanced and blew the trumpets, and the ark of the covenant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' followed them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The armed men went before the priests who blew the trumpets, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 10:25
      marker-yv: yv-n
    - type: text
      text: 'and the rear guard came after the ark, while '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: priests
    - type: text
      text: ' continued blowing the trumpets. '
