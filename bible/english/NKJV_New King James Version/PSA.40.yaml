  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 22:22, 25
      marker-yv: yv-n
    - type: text
      text: I have proclaimed the good news of righteousness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the great assembly;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Indeed, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:13
      marker-yv: yv-n
    - type: text
