    children:
    - type: text
      text: Faith Persevering in Trial
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 25:5; 27:14; 37:7
      marker-yv: yv-n
    - type: text
      text: 'waited patiently for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And He inclined to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And heard my cry.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:20, 27
      marker-yv: yv-n
    - type: text
      text: I have not hidden Your righteousness within my heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have declared Your faithfulness and Your salvation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have not concealed Your lovingkindness and Your truth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From the great assembly.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do not withhold Your tender mercies from me, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 61:7; Prov. 20:28
      marker-yv: yv-n
    - type: text
      text: Let Your lovingkindness and Your truth continually preserve me.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For innumerable evils have surrounded me;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 38:4; 65:3
      marker-yv: yv-n
    - type: text
      text: My iniquities have overtaken me, so that I am not able to look up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are more than the hairs of my head;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore my heart fails me.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 70:1
      marker-yv: yv-n
    - type: text
      text: 'Be pleased, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to deliver me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', make haste to help me!'
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 35:4, 26; 70:2; 71:13
      marker-yv: yv-n
    - type: text
      text: Let them be ashamed and brought to mutual confusion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who seek to destroy my life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them be driven backward and brought to dishonor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who wish me evil.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let them be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 73:19
      marker-yv: yv-n
    - type: text
      text: confounded because of their shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who say to me, “Aha, aha!”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 70:4
      marker-yv: yv-n
    - type: text
      text: Let all those who seek You rejoice and be glad in You;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let such as love Your salvation '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 35:27
      marker-yv: yv-n
    - type: text
      text: say continually,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be magnified!”'
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 70:5; 86:1; 109:22
      marker-yv: yv-n
    - type: text
      text: 'But I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' poor and needy;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 40:5; 1 Pet. 5:7
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yet
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' thinks upon me.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' my help and my deliverer;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not delay, O my God.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He also brought me up out of a horrible pit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Out of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 69:2, 14; Jer. 38:6
      marker-yv: yv-n
    - type: text
      text: the miry clay,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 27:5
      marker-yv: yv-n
    - type: text
      text: set my feet upon a rock,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' established my steps.'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 32:7; 33:3
      marker-yv: yv-n
    - type: text
      text: He has put a new song in my mouth—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Praise to our God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Many will see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' and fear,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And will trust in the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 34:8; 84:12
      marker-yv: yv-n
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' that man who makes the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his trust,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And does not respect the proud, nor such as turn aside to lies.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:10
      marker-yv: yv-n
    - type: text
      text: 'Many, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' Your wonderful works'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Which
    - type: text
      text: ' You have done;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 139:17; (Is. 55:8)
      marker-yv: yv-n
    - type: text
      text: And Your thoughts toward us
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Cannot be recounted to You in order;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: If
    - type: text
      text: ' I would declare and speak '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are more than can be numbered.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Sam. 15:22); Ps. 51:16; Is. 1:11; (Jer. 6:20; 7:22, 23); Amos 5:22; (Mic. 6:6–8; Heb. 10:5–9)
      marker-yv: yv-n
    - type: text
      text: Sacrifice and offering You did not desire;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My ears You have opened.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Burnt offering and sin offering You did not require.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then I said, “Behold, I come;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the scroll of the book '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' written of me.'
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 26:39; John 4:34; 6:38); Heb. 10:7
      marker-yv: yv-n
    - type: text
      text: I delight to do Your will, O my God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And Your law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 37:31; Jer. 31:33; 2 Cor. 3:3)
      marker-yv: yv-n
    - type: text
