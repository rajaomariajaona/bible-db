document_id: LEV.13,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Law Concerning Leprosy
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron, saying: '
  '10':
  - type: note
    content: Num. 12:10, 12; 2 Kin. 5:27; 2 Chr. 26:19, 20
  - type: text
    content: 'And the priest shall examine him; and indeed if the swelling on the skin is white, and it has turned the hair white, and there is a spot of raw flesh in the swelling, '
  '11':
  - type: text
    content: it is an old leprosy on the skin of his body. The priest shall pronounce him unclean, and shall not isolate him, for he is unclean.
  '12':
  - type: text
    content: '“And if leprosy breaks out all over the skin, and the leprosy covers all the skin of the one who has the sore, from his head to his foot, wherever the priest looks, '
  '13':
  - type: text
    content: 'then the priest shall consider; and indeed if the leprosy has covered all his body, he shall pronounce him clean who has the sore. It has all turned '
  - type: note
    content: Ex. 4:6
  - type: text
    content: 'white. He is clean. '
  '14':
  - type: text
    content: 'But when raw flesh appears on him, he shall be unclean. '
  '15':
  - type: text
    content: 'And the priest shall examine the raw flesh and pronounce him to be unclean; for the raw flesh is unclean. It is leprosy. '
  '16':
  - type: text
    content: 'Or if the raw flesh changes and turns white again, he shall come to the priest. '
  '17':
  - type: text
    content: And the priest shall examine him; and indeed if the sore has turned white, then the priest shall pronounce him clean who has the sore. He is clean.
  '18':
  - type: text
    content: '“If the body develops a '
  - type: note
    content: Ex. 9:9; 15:26
  - type: text
    content: 'boil in the skin, and it is healed, '
  '19':
  - type: text
    content: 'and in the place of the boil there comes a white swelling or a bright spot, reddish-white, then it shall be shown to the priest; '
  '2':
  - type: text
    content: '“When a man has on the skin of his body a swelling, '
  - type: note
    content: Deut. 28:27; Is. 3:17
  - type: text
    content: 'a scab, or a bright spot, and it becomes on the skin of his body like a leprous sore, '
  - type: note
    content: Deut. 17:8, 9; 24:8; Mal. 2:7; Luke 17:14
  - type: text
    content: 'then he shall be brought to Aaron the priest or to one of his sons the priests. '
  '20':
  - type: text
    content: 'and if, when the priest sees it, it indeed appears deeper than the skin, and its hair has turned white, the priest shall pronounce him unclean. It is a leprous sore which has broken out of the boil. '
  '21':
  - type: text
    content: 'But if the priest examines it, and indeed there are no white hairs in it, and it is not deeper than the skin, but has faded, then the priest shall isolate him seven days; '
  '22':
  - type: text
    content: 'and if it should at all spread over the skin, then the priest shall pronounce him unclean. It is a leprous sore. '
  '23':
  - type: text
    content: But if the bright spot stays in one place, and has not spread, it is the scar of the boil; and the priest shall pronounce him clean.
  '24':
  - type: text
    content: '“Or if the body receives a '
  - type: note
    content: Is. 3:24
  - type: text
    content: 'burn on its skin by fire, and the raw flesh of the burn becomes a bright spot, reddish-white or white, '
  '25':
  - type: text
    content: 'then the priest shall examine it; and indeed if the hair of the bright spot has turned white, and it appears deeper than the skin, it is leprosy broken out in the burn. Therefore the priest shall pronounce him unclean. It is a leprous sore. '
  '26':
  - type: text
    content: 'But if the priest examines it, and indeed there are no white hairs in the bright spot, and it is not deeper than the skin, but has faded, then the priest shall isolate him seven days. '
  '27':
  - type: text
    content: 'And the priest shall examine him on the seventh day. If it has at all spread over the skin, then the priest shall pronounce him unclean. It is a leprous sore. '
  '28':
  - type: text
    content: But if the bright spot stays in one place, and has not spread on the skin, but has faded, it is a swelling from the burn. The priest shall pronounce him clean, for it is the scar from the burn.
  '29':
  - type: text
    content: '“If a man or woman has a sore on the head or the beard, '
  '3':
  - type: text
    content: 'The priest shall examine the sore on the skin of the body; and if the hair on the sore has turned white, and the sore appears to be deeper than the skin of his body, it is a leprous sore. Then the priest shall examine him, and pronounce him unclean. '
  '30':
  - type: text
    content: 'then the priest shall examine the sore; and indeed if it appears deeper than the skin, and there is in it thin yellow hair, then the priest shall pronounce him unclean. It is a scaly leprosy of the head or beard. '
  '31':
  - type: text
    content: 'But if the priest examines the scaly sore, and indeed it does not appear deeper than the skin, and there is no black hair in it, then the priest shall isolate the one who has the scale seven days. '
  '32':
  - type: text
    content: 'And on the seventh day the priest shall examine the sore; and indeed if the scale has not spread, and there is no yellow hair in it, and the scale does not appear deeper than the skin, '
  '33':
  - type: text
    content: 'he shall shave himself, but the scale he shall not shave. And the priest shall isolate the one who has the scale another seven days. '
  '34':
  - type: text
    content: 'On the seventh day the priest shall examine the scale; and indeed if the scale has not spread over the skin, and does not appear deeper than the skin, then the priest shall pronounce him clean. He shall wash his clothes and be clean. '
  '35':
  - type: text
    content: 'But if the scale should at all spread over the skin after his cleansing, '
  '36':
  - type: text
    content: 'then the priest shall examine him; and indeed if the scale has spread over the skin, the priest need not seek for yellow hair. He is unclean. '
  '37':
  - type: text
    content: But if the scale appears to be at a standstill, and there is black hair grown up in it, the scale has healed. He is clean, and the priest shall pronounce him clean.
  '38':
  - type: text
    content: '“If a man or a woman has bright spots on the skin of the body, specifically white bright spots, '
  '39':
  - type: text
    content: then the priest shall look; and indeed if the bright spots on the skin of the body are dull white, it is a white spot that grows on the skin. He is clean.
  '4':
  - type: text
    content: 'But if the bright spot is white on the skin of his body, and does not appear to be deeper than the skin, and its hair has not turned white, then the priest shall isolate the one who has the sore '
  - type: note
    content: Lev. 14:8
  - type: text
    content: 'seven days. '
  '40':
  - type: text
    content: '“As for the man whose hair has fallen from his head, he is bald, but he is clean. '
  '41':
  - type: text
    content: 'He whose hair has fallen from his forehead, he is bald on the forehead, but he is clean. '
  '42':
  - type: text
    content: 'And if there is on the bald head or bald '
  - type: note
    content: 2 Chr. 26:19
  - type: text
    content: 'forehead a reddish-white sore, it is leprosy breaking out on his bald head or his bald forehead. '
  '43':
  - type: text
    content: 'Then the priest shall examine it; and indeed if the swelling of the sore is reddish-white on his bald head or on his bald forehead, as the appearance of leprosy on the skin of the body, '
  '44':
  - type: text
    content: 'he is a leprous man. He is unclean. The priest shall surely pronounce him unclean; his sore is on his '
  - type: note
    content: Is. 1:5
  - type: text
    content: head.
  '45':
  - type: text
    content: '“Now the leper on whom the sore is, his clothes shall be torn and his head '
  - type: note
    content: Lev. 10:6; 21:10
  - type: text
    content: 'bare; and he shall '
  - type: note
    content: Ezek. 24:17, 22; Mic. 3:7
  - type: text
    content: 'cover his mustache, and cry, '
  - type: note
    content: Is. 6:5; 64:6; Lam. 4:15; Luke 5:8
  - type: text
    content: '‘Unclean! Unclean!’ '
  '46':
  - type: text
    content: 'He shall be unclean. All the days he has the sore he shall be unclean. He is unclean, and he shall dwell alone; his dwelling shall be '
  - type: note
    content: Num. 5:1–4; 12:14; 2 Kin. 7:3; 15:5; 2 Chr. 26:21; Ps. 38:11; Luke 17:12
  - type: text
    content: outside the camp.
  - type: heading
    content: The Law Concerning Leprous Garments
  '47':
  - type: text
    content: '“Also, if a garment has a leprous plague in it, whether it is a woolen garment or a linen garment, '
  '48':
  - type: text
    content: 'whether it is in the warp or woof of linen or wool, whether in leather or in anything made of leather, '
  '49':
  - type: text
    content: 'and if the plague is greenish or reddish in the garment or in the leather, whether in the warp or in the woof, or in anything made of leather, it is a leprous plague and shall be shown to the priest. '
  '5':
  - type: text
    content: 'And the priest shall examine him on the seventh day; and indeed if the sore appears to be as it was, and the sore has not spread on the skin, then the priest shall isolate him another seven days. '
  '50':
  - type: text
    content: 'The priest shall examine the plague and isolate that which has the plague seven days. '
  '51':
  - type: text
    content: 'And he shall examine the plague on the seventh day. If the plague has spread in the garment, either in the warp or in the woof, in the leather or in anything made of leather, the plague is an '
  - type: note
    content: Lev. 14:44
  - type: text
    content: 'active leprosy. It is unclean. '
  '52':
  - type: text
    content: He shall therefore burn that garment in which is the plague, whether warp or woof, in wool or in linen, or anything of leather, for it is an active leprosy; the garment shall be burned in the fire.
  '53':
  - type: text
    content: '“But if the priest examines it, and indeed the plague has not spread in the garment, either in the warp or in the woof, or in anything made of leather, '
  '54':
  - type: text
    content: 'then the priest shall command that they wash the thing in which is the plague; and he shall isolate it another seven days. '
  '55':
  - type: text
    content: 'Then the priest shall examine the plague after it has been washed; and indeed if the plague has not changed its color, though the plague has not spread, it is unclean, and you shall burn it in the fire; it continues eating away, whether the damage is outside or inside. '
  '56':
  - type: text
    content: 'If the priest examines it, and indeed the plague has faded after washing it, then he shall tear it out of the garment, whether out of the warp or out of the woof, or out of the leather. '
  '57':
  - type: text
    content: 'But if it appears again in the garment, either in the warp or in the woof, or in anything made of leather, it is a spreading plague; you shall burn with fire that in which is the plague. '
  '58':
  - type: text
    content: And if you wash the garment, either warp or woof, or whatever is made of leather, if the plague has disappeared from it, then it shall be washed a second time, and shall be clean.
  '59':
  - type: text
    content: “This is the law of the leprous plague in a garment of wool or linen, either in the warp or woof, or in anything made of leather, to pronounce it clean or to pronounce it unclean.”
  '6':
  - type: text
    content: 'Then the priest shall examine him again on the seventh day; and indeed if the sore has faded, and the sore has not spread on the skin, then the priest shall pronounce him clean; it is only a scab, and he '
  - type: note
    content: Lev. 11:25; 14:8; (John 13:8, 10)
  - type: text
    content: 'shall wash his clothes and be clean. '
  '7':
  - type: text
    content: 'But if the scab should at all spread over the skin, after he has been seen by the priest for his cleansing, he shall be seen by the priest again. '
  '8':
  - type: text
    content: And if the priest sees that the scab has indeed spread on the skin, then the priest shall pronounce him unclean. It is leprosy.
  '9':
  - type: text
    content: '“When the leprous sore is on a person, then he shall be brought to the priest. '
