verses:
  '1':
  - type: heading
    content: The Sign of the Covenant
  - type: text
    content: 'When Abram was ninety-nine years old, the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Gen. 12:7; 18:1
  - type: text
    content: 'appeared to Abram and said to him, '
  - type: note
    content: Gen. 28:3; 35:11; Ex. 6:3; Job 42:2
  - type: text
    content: '“I '
  - type: text
    content: am
  - type: text
    content: ' Almighty God; '
  - type: note
    content: 2 Kin. 20:3
  - type: text
    content: 'walk before Me and be '
  - type: note
    content: Gen. 6:9; Deut. 18:13
  - type: text
    content: 'blameless. '
  '10':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' My covenant which you shall keep, between Me and you and your descendants after you: '
  - type: note
    content: John 7:22; Acts 7:8
  - type: text
    content: 'Every male child among you shall be circumcised; '
  '11':
  - type: text
    content: 'and you shall be circumcised in the flesh of your foreskins, and it shall be '
  - type: note
    content: Ex. 12:13, 48; (Rom. 4:11)
  - type: text
    content: 'a sign of the covenant between Me and you. '
  '12':
  - type: text
    content: 'He who is eight days old among you '
  - type: note
    content: Lev. 12:3
  - type: text
    content: 'shall be circumcised, every male child in your generations, he who is born in your house or bought with money from any foreigner who is not your descendant. '
  '13':
  - type: text
    content: 'He who is born in your house and he who is bought with your money must be circumcised, and My covenant shall be in your flesh for an everlasting covenant. '
  '14':
  - type: text
    content: 'And the uncircumcised male child, who is not circumcised in the flesh of his foreskin, that person '
  - type: note
    content: Ex. 4:24–26
  - type: text
    content: shall be cut off from his people; he has broken My covenant.”
  '15':
  - type: text
    content: 'Then God said to Abraham, “As for Sarai your wife, you shall not call her name Sarai, but Sarah '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' her name. '
  '16':
  - type: text
    content: 'And I will bless her and also give you a son by her; then I will bless her, '
  - type: note
    content: Gen. 18:10
  - type: text
    content: 'and she shall be '
  - type: text
    content: a
  - type: text
    content: ' '
  - type: text
    content: mother
  - type: text
    content: ' '
  - type: note
    content: Gen. 35:11; Gal. 4:31; 1 Pet. 3:6
  - type: text
    content: 'of nations; '
  - type: note
    content: Gen. 17:6; 36:31; 1 Sam. 8:22
  - type: text
    content: kings of peoples shall be from her.”
  '17':
  - type: text
    content: 'Then Abraham fell on his face '
  - type: note
    content: Gen. 17:3; 18:12; 21:6
  - type: text
    content: 'and laughed, and said in his heart, “Shall '
  - type: text
    content: a
  - type: text
    content: ' '
  - type: text
    content: child
  - type: text
    content: ' be born to a man who is one hundred years old? And shall Sarah, who is ninety years old, bear '
  - type: text
    content: a
  - type: text
    content: ' '
  - type: text
    content: child?
  - type: text
    content: '” '
  '18':
  - type: text
    content: 'And Abraham '
  - type: note
    content: Gen. 18:23
  - type: text
    content: said to God, “Oh, that Ishmael might live before You!”
  '19':
  - type: text
    content: 'Then God said: “No, '
  - type: note
    content: Gen. 18:10; 21:2; (Gal. 4:28)
  - type: text
    content: 'Sarah your wife shall bear you a son, and you shall call his name Isaac; I will establish My '
  - type: note
    content: Gen. 22:16; Matt. 1:2; Luke 3:34
  - type: text
    content: 'covenant with him for an everlasting covenant, '
  - type: text
    content: and
  - type: text
    content: ' with his descendants after him. '
  '2':
  - type: text
    content: 'And I will make My '
  - type: note
    content: Gen. 15:18; Ex. 6:4; (Gal. 3:19)
  - type: text
    content: 'covenant between Me and you, and '
  - type: note
    content: Gen. 12:2; 13:16; 15:5; 18:18
  - type: text
    content: 'will multiply you exceedingly.” '
  '20':
  - type: text
    content: 'And as for Ishmael, I have heard you. Behold, I have blessed him, and will make him fruitful, and '
  - type: note
    content: Gen. 16:10
  - type: text
    content: 'will multiply him exceedingly. He shall beget '
  - type: note
    content: Gen. 25:12–16
  - type: text
    content: 'twelve princes, '
  - type: note
    content: Gen. 21:13, 18
  - type: text
    content: 'and I will make him a great nation. '
  '21':
  - type: text
    content: 'But My '
  - type: note
    content: Gen. 26:2–5
  - type: text
    content: 'covenant I will establish with Isaac, '
  - type: note
    content: Gen. 21:2
  - type: text
    content: 'whom Sarah shall bear to you at this '
  - type: note
    content: Gen. 18:14
  - type: text
    content: 'set time next year.” '
  '22':
  - type: text
    content: Then He finished talking with him, and God went up from Abraham.
  '23':
  - type: text
    content: 'So Abraham took Ishmael his son, all who were born in his house and all who were bought with his money, every male among the men of Abraham’s house, and circumcised the flesh of their foreskins that very same day, as God had said to him. '
  '24':
  - type: text
    content: 'Abraham '
  - type: text
    content: was
  - type: text
    content: ' ninety-nine years old when he was circumcised in the flesh of his foreskin. '
  '25':
  - type: text
    content: 'And Ishmael his son '
  - type: text
    content: was
  - type: text
    content: ' thirteen years old when he was circumcised in the flesh of his foreskin. '
  '26':
  - type: text
    content: 'That very same day Abraham was circumcised, and his son Ishmael; '
  '27':
  - type: text
    content: 'and '
  - type: note
    content: Gen. 18:19
  - type: text
    content: all the men of his house, born in the house or bought with money from a foreigner, were circumcised with him.
  '3':
  - type: text
    content: 'Then Abram fell on his face, and God talked with him, saying: '
  '4':
  - type: text
    content: '“As for Me, behold, My covenant is with you, and you shall be a '
  - type: note
    content: (Rom. 4:11, 12, 16)
  - type: text
    content: 'father of many nations. '
  '5':
  - type: text
    content: 'No longer shall '
  - type: note
    content: Neh. 9:7
  - type: text
    content: 'your name be called Abram, but your name shall be Abraham; '
  - type: note
    content: Rom. 4:17
  - type: text
    content: 'for I have made you a father of many nations. '
  '6':
  - type: text
    content: 'I will make you exceedingly fruitful; and I will make nations '
  - type: note
    content: Gen. 17:16; 35:11
  - type: text
    content: 'of you, and '
  - type: note
    content: Matt. 1:6
  - type: text
    content: 'kings shall come from you. '
  '7':
  - type: text
    content: 'And I will '
  - type: note
    content: (Gal. 3:17)
  - type: text
    content: 'establish My covenant between Me and you and your descendants after you in their generations, for an everlasting covenant, '
  - type: note
    content: Gen. 26:24; 28:13; Lev. 11:45; 26:12, 45; Heb. 11:16
  - type: text
    content: 'to be God to you and '
  - type: note
    content: Rom. 9:8; Gal. 3:16
  - type: text
    content: 'your descendants after you. '
  '8':
  - type: text
    content: 'Also '
  - type: note
    content: Gen. 12:7; 13:15, 17; Acts 7:5
  - type: text
    content: 'I give to you and your descendants after you the land '
  - type: note
    content: Gen. 23:4; 28:4
  - type: text
    content: 'in which you are a stranger, all the land of Canaan, as an everlasting possession; and '
  - type: note
    content: Ex. 6:7; 29:45; Lev. 26:12; Deut. 29:13; Rev. 21:7
  - type: text
    content: I will be their God.”
  '9':
  - type: text
    content: 'And God said to Abraham: “As for you, '
  - type: note
    content: Ex. 19:5
  - type: text
    content: 'you shall keep My covenant, you and your descendants after you throughout their generations. '
