document_id: JOB.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elihu Contradicts Job’s Friends
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So these three men ceased answering Job, because he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 6:29; 31:6; 33:9
    marker-yv: yv-n
  - type: text
    text: 'righteous in his own eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then the wrath of Elihu, the son of Barachel the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 22:21
    marker-yv: yv-n
  - type: text
    text: 'Buzite, of the family of Ram, was aroused against Job; his wrath was aroused because he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 27:5, 6
    marker-yv: yv-n
  - type: text
    text: 'justified himself rather than God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Also against his three friends his wrath was aroused, because they had found no answer, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: yet
  - type: text
    text: ' had condemned Job.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now because they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' years older than he, Elihu had waited to speak to Job. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Elihu saw that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' no answer in the mouth of these three men, his wrath was aroused.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Elihu, the son of Barachel the Buzite, answered and said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: am
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 19:32
    marker-yv: yv-n
  - type: text
    text: 'young in years, and you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' very old;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore I was afraid,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And dared not declare my opinion to you.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I said, ‘Age should speak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And multitude of years should teach wisdom.’
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a spirit in man,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 3:12; 4:29; (Job 35:11; 38:36; Prov. 2:6; Eccl. 2:26; Dan. 1:17; 2:21; Matt. 11:25; James 1:5)
    marker-yv: yv-n
  - type: text
    text: the breath of the Almighty gives him understanding.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 1:26)
    marker-yv: yv-n
  - type: text
    text: 'Great men are not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: always
  - type: text
    text: ' wise,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Nor do the aged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: always
  - type: text
    text: ' understand justice.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Therefore I say, ‘Listen to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I also will declare my opinion.’
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indeed I waited for your words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I listened to your reasonings, while you searched out what to say.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I paid close attention to you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And surely not one of you convinced Job,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Or
  - type: text
    text: ' answered his words—'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Jer. 9:23; 1 Cor. 1:29)
    marker-yv: yv-n
  - type: text
    text: Lest you say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘We have found wisdom’;
- type: usfm
  marker: q2
  children:
  - type: text
    text: God will vanquish him, not man.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now he has not directed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' words against me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: So I will not answer him with your words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “They are dismayed and answer no more;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Words escape them.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And I have waited, because they did not speak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Because they stood still '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' answered no more.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I also will answer my part,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I too will declare my opinion.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For I am full of words;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The spirit within me compels me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Indeed my belly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' like wine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' has no vent;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: It is ready to burst like new wineskins.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I will speak, that I may find relief;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I must open my lips and answer.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Let me not, I pray, show partiality to anyone;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor let me flatter any man.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For I do not know how to flatter,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Else
  - type: text
    text: ' my Maker would soon take me '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 27:8
    marker-yv: yv-n
  - type: text
    text: away.
