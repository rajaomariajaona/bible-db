  - type: note
    content: Luke 1:79; (John 16:33; 20:19; Phil. 4:7); Col. 3:15
  - type: text
    content: Peace I leave with you, My peace I give to you; not as the world gives do I give to you. Let not your heart be troubled, neither let it be afraid.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'You have heard Me '
  - type: note
    content: John 14:3, 18
  - type: text
    content: 'say to you, ‘I am going away and coming '
  - type: text
    content: back
  - type: text
    content: ' to you.’ If you loved Me, you would rejoice because '
  - type: text
    content: I said,
  - type: text
    content: ' '
  - type: note
    content: John 16:16
  - type: text
    content: '‘I am going to the Father,’ for '
  - type: note
    content: (John 5:18; Phil. 2:6)
  - type: text
    content: My Father is greater than I.
  '29':
  - type: text
    content: '“And '
  - type: note
    content: John 13:19
  - type: text
    content: now I have told you before it comes, that when it does come to pass, you may believe.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And if I go and prepare a place for you, '
  - type: note
    content: (Acts 1:11)
  - type: text
    content: 'I will come again and receive you to Myself; that '
  - type: note
