  - type: text
    content: 'where I am, '
  - type: text
    content: there
  - type: text
    content: ' you may be also.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'I will no longer talk much with you, '
  - type: note
    content: (John 12:31)
  - type: text
    content: 'for the ruler of this world is coming, and he has '
  - type: note
    content: (John 8:46; 2 Cor. 5:21; Heb. 4:15; 1 Pet. 1:19; 2:22)
  - type: text
    content: nothing in Me.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'But that the world may know that I love the Father, and '
  - type: note
    content: Is. 50:5; John 10:18; Phil. 2:8
  - type: text
    content: as the Father gave Me commandment, so I do. Arise, let us go from here.
  '4':
  - type: text
    content: And where I go you know, and the way you know.”
  '5':
  - type: note
    content: Matt. 10:3; John 11:16; 20:24–29; 21:2
  - type: text
    content: Thomas said to Him, “Lord, we do not know where You are going, and how can we know the way?”
  '6':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“I am '
  - type: note
    content: (John 10:9; Rom. 5:2; Eph. 2:18; Heb. 9:8; 10:19, 20)
  - type: text
    content: 'the way, '
  - type: note
    content: (John 1:14, 17; 8:32; 18:37)
  - type: text
    content: 'the truth, and '
  - type: note
    content: (John 11:25)
  - type: text
    content: 'the life. '
  - type: note
    content: 1 Tim. 2:5
  - type: text
    content: 'No one comes to the Father '
  - type: note
