  - type: text
    content: 'He who has My commandments and keeps them, it is he who loves Me. And he who loves Me will be loved by My Father, and I will love him and '
  - type: text
    content: manifest Myself to him.”
  '22':
  - type: note
    content: Luke 6:16; Acts 1:13
  - type: text
    content: Judas (not Iscariot) said to Him, “Lord, how is it that You will manifest Yourself to us, and not to the world?”
  '23':
  - type: text
    content: 'Jesus answered and said to him, '
  - type: text
    content: '“If anyone loves Me, he will keep My word; and My Father will love him, '
  - type: note
    content: 2 Cor. 6:16; Eph. 3:17; (1 John 2:24); Rev. 3:20; 21:3
  - type: text
    content: and We will come to him and make Our home with him.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'He who does not love Me does not keep My words; and '
  - type: note
    content: John 5:19
  - type: text
    content: the word which you hear is not Mine but the Father’s who sent Me.
  - type: heading
    content: The Gift of His Peace
