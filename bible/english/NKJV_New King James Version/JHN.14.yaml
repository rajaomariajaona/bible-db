  - type: text
    content: except through Me.
  - type: heading
    content: The Father Revealed
  '7':
  - type: note
    content: John 8:19
  - type: text
    content: “If you had known Me, you would have known My Father also; and from now on you know Him and have seen Him.”
  '8':
  - type: text
    content: Philip said to Him, “Lord, show us the Father, and it is sufficient for us.”
  '9':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“Have I been with you so long, and yet you have not known Me, Philip? '
  - type: note
    content: John 12:45; Col. 1:15; Heb. 1:3
  - type: text
    content: He who has seen Me has seen the Father; so how can you say, ‘Show us the Father’?
