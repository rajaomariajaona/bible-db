    - type: text
      text: ' came to me, saying: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And they shall know that I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ; I have not said in vain that I would bring this calamity upon them.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '‘Thus says the Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: ': '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 21:14
      marker-yv: yv-n
    - type: text
      text: '“Pound your fists and stamp your feet, and say, ‘Alas, for all the evil abominations of the house of Israel! '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 5:12
      marker-yv: yv-n
    - type: text
      text: 'For they shall fall by the sword, by famine, and by pestilence. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'He who is far off shall die by the pestilence, he who is near shall fall by the sword, and he who remains and is besieged shall die by the famine. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lam. 4:11, 22; Ezek. 5:13
      marker-yv: yv-n
    - type: text
      text: 'Thus will I spend My fury upon them. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then you shall know that I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', when their slain are among their idols all around their altars, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 2:20; 3:6
      marker-yv: yv-n
    - type: text
      text: 'on every high hill, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:23; 2 Kin. 16:4; Ezek. 20:28; Hos. 4:13
      marker-yv: yv-n
    - type: text
      text: 'on all the mountaintops, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 57:5
      marker-yv: yv-n
    - type: text
      text: 'under every green tree, and under every thick oak, wherever they offered sweet incense to all their idols. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 5:25; Ezek. 14:13; 20:33, 34
      marker-yv: yv-n
    - type: text
      text: 'stretch out My hand against them and make the land desolate, yes, more desolate than the wilderness toward '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 33:46
      marker-yv: yv-n
    - type: text
      text: 'Diblah, in all their dwelling places. Then they shall know that I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .’ ” ’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Son of man, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 20:46; 21:2; 25:2
      marker-yv: yv-n
    - type: text
      text: 'set your face toward the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 36:1
      marker-yv: yv-n
    - type: text
      text: 'mountains of Israel, and prophesy against them, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and say, ‘O mountains of Israel, hear the word of the Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: '! Thus says the Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: ' to the mountains, to the hills, to the ravines, and to the valleys: “Indeed I, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' I, will bring a sword against you, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:30
      marker-yv: yv-n
    - type: text
      text: 'I will destroy your high places. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then your altars shall be desolate, your incense altars shall be broken, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:30
      marker-yv: yv-n
    - type: text
      text: 'I will cast down your slain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' before your idols. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And I will lay the corpses of the children of Israel before their idols, and I will scatter your bones all around your altars. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'In all your dwelling places the cities shall be laid waste, and the high places shall be desolate, so that your altars may be laid waste and made desolate, your idols may be broken and made to cease, your incense altars may be cut down, and your works may be abolished. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The slain shall fall in your midst, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 7:4, 9
      marker-yv: yv-n
    - type: text
      text: 'you shall know that I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 44:28; Ezek. 5:2, 12; 12:16; 14:22
      marker-yv: yv-n
    - type: text
      text: '“Yet I will leave a remnant, so that you may have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' who escape the sword among the nations, when you are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 5:12
      marker-yv: yv-n
    - type: text
      text: 'scattered through the countries. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then those of you who escape will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 4:29); Ps. 137; Jer. 51:50
      marker-yv: yv-n
    - type: text
      text: 'remember Me among the nations where they are carried captive, because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 78:40; Is. 7:13; 43:24; Hos. 11:8
      marker-yv: yv-n
    - type: text
      text: 'I was crushed by their adulterous heart which has departed from Me, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 15:39; Ezek. 20:7, 24
      marker-yv: yv-n
    - type: text
      text: 'by their eyes which play the harlot after their idols; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:39; Job 42:6; Ezek. 20:43; 36:31
      marker-yv: yv-n
    - type: text
      text: 'they will loathe themselves for the evils which they committed in all their abominations. '
