    - type: text
      text: 'Then Zophar the Naamathite answered and said:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “If
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:12; (Rev. 3:7)
      marker-yv: yv-n
    - type: text
      text: ' He passes by, imprisons, and gathers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: judgment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then who can hinder Him?
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 10:14)
      marker-yv: yv-n
    - type: text
      text: He knows deceitful men;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He sees wickedness also.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Will He not then consider '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it?
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For an '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 39:5); Rom. 1:22
      marker-yv: yv-n
    - type: text
      text: empty-headed man will be wise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When a wild donkey’s colt is born a man.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“If you would '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Sam. 7:3)
      marker-yv: yv-n
    - type: text
      text: prepare your heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 88:9
      marker-yv: yv-n
    - type: text
      text: stretch out your hands toward Him;
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'If iniquity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in your hand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' put it far away,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 101:3
      marker-yv: yv-n
    - type: text
      text: would not let wickedness dwell in your tents;
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 22:26; Ps. 119:6; (1 John 3:21)
      marker-yv: yv-n
    - type: text
      text: Then surely you could lift up your face without spot;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, you could be steadfast, and not fear;
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Because you would '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 65:16
      marker-yv: yv-n
    - type: text
      text: 'forget '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' misery,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And remember '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' as waters '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' passed away,'
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' life '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:6; Prov. 4:18; Is. 58:8, 10
      marker-yv: yv-n
    - type: text
      text: would be brighter than noonday.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Though
    - type: text
      text: ' you were dark, you would be like the morning.'
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And you would be secure, because there is hope;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yes, you would dig '
    - type: usfm
      marker: it
      children:
      - type: text
        text: around
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you, and
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:5, 6; Ps. 3:5; Prov. 3:24
      marker-yv: yv-n
    - type: text
      text: take your rest in safety.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'You would also lie down, and no one would make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' afraid;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yes,
    - type: text
      text: ' many would court your favor.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Should not the multitude of words be answered?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And should a man full of talk be vindicated?
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:16; Deut. 28:65; Job 17:5
      marker-yv: yv-n
    - type: text
      text: the eyes of the wicked will fail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they shall not escape,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 18:14; (Prov. 11:7)
      marker-yv: yv-n
    - type: text
      text: their hope—loss of life!”
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Should your empty talk make men hold their peace?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And when you mock, should no one rebuke you?
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For you have said,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 6:30
      marker-yv: yv-n
    - type: text
      text: '‘My doctrine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' pure,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I am clean in your eyes.’
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But oh, that God would speak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And open His lips against you,
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: That He would show you the secrets of wisdom!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: would
    - type: text
      text: ' double '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' prudence.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Know therefore that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ezra 9:13)
      marker-yv: yv-n
    - type: text
      text: God exacts from you
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Less
    - type: text
      text: ' than your iniquity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: deserves.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Can
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 33:12, 13; 36:26; (Eccl. 3:11; Rom. 11:33)
      marker-yv: yv-n
    - type: text
      text: ' you search out the deep things of God?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can you find out the limits of the Almighty?
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: it
      children:
      - type: text
        text: They
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' higher than heaven— what can you do?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Deeper than Sheol— what can you know?
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Their measure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' longer than the earth'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And broader than the sea.
