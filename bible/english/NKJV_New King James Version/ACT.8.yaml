document_id: ACT.8,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul Persecutes the Church
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now Saul was consenting to his death.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time a great persecution arose against the church which was at Jerusalem; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 16:2; Acts 8:4; 11:19
      marker-yv: yv-n
    - type: text
      text: 'they were all scattered throughout the regions of Judea and Samaria, except the apostles. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'to whom they all gave heed, from the least to the greatest, saying, “This man is the great power of God.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And they heeded him because he had astonished them with his sorceries for a long time. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But when they believed Philip as he preached the things '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 1:3; 8:4
      marker-yv: yv-n
    - type: text
      text: 'concerning the kingdom of God and the name of Jesus Christ, both men and women were baptized. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then Simon himself also believed; and when he was baptized he continued with Philip, and was amazed, seeing the miracles and signs which were done.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sorcerer’s Sin
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now when the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 5:12, 29, 40
      marker-yv: yv-n
    - type: text
      text: 'apostles who were at Jerusalem heard that Samaria had received the word of God, they sent Peter and John to them, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'who, when they had come down, prayed for them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:38; 19:2
      marker-yv: yv-n
    - type: text
      text: 'that they might receive the Holy Spirit. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:2
      marker-yv: yv-n
    - type: text
      text: 'as yet He had fallen upon none of them. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 28:19; Acts 2:38
      marker-yv: yv-n
    - type: text
      text: 'They had only been baptized in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 10:48; 19:5
      marker-yv: yv-n
    - type: text
      text: 'the name of the Lord Jesus. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 6:6; 19:6; Heb. 6:2
      marker-yv: yv-n
    - type: text
      text: they laid hands on them, and they received the Holy Spirit.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And when Simon saw that through the laying on of the apostles’ hands the Holy Spirit was given, he offered them money, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: saying, “Give me this power also, that anyone on whom I lay hands may receive the Holy Spirit.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And devout men carried Stephen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: burial,
    - type: text
      text: ' and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 23:2
      marker-yv: yv-n
    - type: text
      text: made great lamentation over him.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But Peter said to him, “Your money perish with you, because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 5:16; Is. 55:1; Dan. 5:17; (Matt. 10:8)
      marker-yv: yv-n
    - type: text
      text: 'you thought that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 2:38; 10:45; 11:17)
      marker-yv: yv-n
    - type: text
      text: 'the gift of God could be purchased with money! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'You have neither part nor portion in this matter, for your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 17:9
      marker-yv: yv-n
    - type: text
      text: 'heart is not right in the sight of God. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Repent therefore of this your wickedness, and pray God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 4:27; 2 Tim. 2:25
      marker-yv: yv-n
    - type: text
      text: 'if perhaps the thought of your heart may be forgiven you. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'For I see that you are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 12:15
      marker-yv: yv-n
    - type: text
      text: poisoned by bitterness and bound by iniquity.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then Simon answered and said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 20:7, 17; Ex. 8:8; Num. 21:7; 1 Kin. 13:6; Job 42:8; James 5:16
      marker-yv: yv-n
    - type: text
      text: “Pray to the Lord for me, that none of the things which you have spoken may come upon me.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: So when they had testified and preached the word of the Lord, they returned to Jerusalem, preaching the gospel in many villages of the Samaritans.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ Is Preached to an Ethiopian
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Now an angel of the Lord spoke to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 6:5
      marker-yv: yv-n
    - type: text
      text: 'Philip, saying, “Arise and go toward the south along the road which goes down from Jerusalem to Gaza.” This is desert. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'So he arose and went. And behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 68:31; 87:4; Is. 56:3; Zeph. 3:10
      marker-yv: yv-n
    - type: text
      text: 'a man of Ethiopia, a eunuch of great authority under Candace the queen of the Ethiopians, who had charge of all her treasury, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:41, 42; John 12:20
      marker-yv: yv-n
    - type: text
      text: 'had come to Jerusalem to worship, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'was returning. And sitting in his chariot, he was reading Isaiah the prophet. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Then the Spirit said to Philip, “Go near and overtake this chariot.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'As for Saul, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 7:58; 1 Cor. 15:9; Gal. 1:13; Phil. 3:6; 1 Tim. 1:13
      marker-yv: yv-n
    - type: text
      text: 'he made havoc of the church, entering every house, and dragging off men and women, committing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to prison.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ Is Preached in Samaria
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: So Philip ran to him, and heard him reading the prophet Isaiah, and said, “Do you understand what you are reading?”
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And he said, “How can I, unless someone guides me?” And he asked Philip to come up and sit with him. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'The place in the Scripture which he read was this:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 53:7, 8
      marker-yv: yv-n
    - type: text
      text: “He was led as a sheep to the slaughter;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And as a lamb before its shearer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' silent,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 26:62, 63; 27:12, 14; John 19:9
      marker-yv: yv-n
    - type: text
      text: So He opened not His mouth.
  '33':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'In His humiliation His '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 23:1–25
      marker-yv: yv-n
    - type: text
      text: justice was taken away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And who will declare His generation?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For His life is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 23:33–46
      marker-yv: yv-n
    - type: text
      text: taken from the earth.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'So the eunuch answered Philip and said, “I ask you, of whom does the prophet say this, of himself or of some other man?” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Then Philip opened his mouth, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:27; Acts 17:2; 18:28; 28:23
      marker-yv: yv-n
    - type: text
      text: 'and beginning at this Scripture, preached Jesus to him. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Now as they went down the road, they came to some water. And the eunuch said, “See, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: here
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' water. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 10:47; 16:33
      marker-yv: yv-n
    - type: text
      text: What hinders me from being baptized?”
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Then Philip said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 28:19; (Mark 16:16; Rom. 10:9, 10)
      marker-yv: yv-n
    - type: text
      text: “If you believe with all your heart, you may.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he answered and said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 16:16; John 6:69; 9:35, 38; 11:27
      marker-yv: yv-n
    - type: text
      text: “I believe that Jesus Christ is the Son of God.”
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'So he commanded the chariot to stand still. And both Philip and the eunuch went down into the water, and he baptized him. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Now when they came up out of the water, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 18:12; 2 Kin. 2:16; Ezek. 3:12, 14; 2 Cor. 12:2
      marker-yv: yv-n
    - type: text
      text: 'the Spirit of the Lord caught Philip away, so that the eunuch saw him no more; and he went on his way rejoicing. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:23
      marker-yv: yv-n
    - type: text
      text: 'those who were scattered went everywhere preaching the word. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'But Philip was found at Azotus. And passing through, he preached in all the cities till he came to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 21:8
      marker-yv: yv-n
    - type: text
      text: Caesarea.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 6:5; 8:26, 30
      marker-yv: yv-n
    - type: text
      text: 'Philip went down to the city of Samaria and preached Christ to them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the multitudes with one accord heeded the things spoken by Philip, hearing and seeing the miracles which he did. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:17
      marker-yv: yv-n
    - type: text
      text: 'unclean spirits, crying with a loud voice, came out of many who were possessed; and many who were paralyzed and lame were healed. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: And there was great joy in that city.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sorcerer’s Profession of Faith
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But there was a certain man called Simon, who previously '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 8:11; 13:6
      marker-yv: yv-n
    - type: text
      text: 'practiced sorcery in the city and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 5:36
      marker-yv: yv-n
    - type: text
      text: 'astonished the people of Samaria, claiming that he was someone great, '
