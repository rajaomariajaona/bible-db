document_id: ACT.8,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Persecutes the Church
  - type: text
    content: Now Saul was consenting to his death.
  - type: text
    content: 'At that time a great persecution arose against the church which was at Jerusalem; and '
  - type: note
    content: John 16:2; Acts 8:4; 11:19
  - type: text
    content: 'they were all scattered throughout the regions of Judea and Samaria, except the apostles. '
  '10':
  - type: text
    content: 'to whom they all gave heed, from the least to the greatest, saying, “This man is the great power of God.” '
  '11':
  - type: text
    content: 'And they heeded him because he had astonished them with his sorceries for a long time. '
  '12':
  - type: text
    content: 'But when they believed Philip as he preached the things '
  - type: note
    content: Acts 1:3; 8:4
  - type: text
    content: 'concerning the kingdom of God and the name of Jesus Christ, both men and women were baptized. '
  '13':
  - type: text
    content: Then Simon himself also believed; and when he was baptized he continued with Philip, and was amazed, seeing the miracles and signs which were done.
  - type: heading
    content: The Sorcerer’s Sin
  '14':
  - type: text
    content: 'Now when the '
  - type: note
    content: Acts 5:12, 29, 40
  - type: text
    content: 'apostles who were at Jerusalem heard that Samaria had received the word of God, they sent Peter and John to them, '
  '15':
  - type: text
    content: 'who, when they had come down, prayed for them '
  - type: note
    content: Acts 2:38; 19:2
  - type: text
    content: 'that they might receive the Holy Spirit. '
  '16':
  - type: text
    content: 'For '
  - type: note
    content: Acts 19:2
  - type: text
    content: 'as yet He had fallen upon none of them. '
  - type: note
    content: Matt. 28:19; Acts 2:38
  - type: text
    content: 'They had only been baptized in '
  - type: note
    content: Acts 10:48; 19:5
  - type: text
    content: 'the name of the Lord Jesus. '
  '17':
  - type: text
    content: 'Then '
  - type: note
    content: Acts 6:6; 19:6; Heb. 6:2
  - type: text
    content: they laid hands on them, and they received the Holy Spirit.
  '18':
  - type: text
    content: 'And when Simon saw that through the laying on of the apostles’ hands the Holy Spirit was given, he offered them money, '
  '19':
  - type: text
    content: saying, “Give me this power also, that anyone on whom I lay hands may receive the Holy Spirit.”
  '2':
  - type: text
    content: 'And devout men carried Stephen '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: his
  - type: text
    content: ' '
  - type: text
    content: burial,
  - type: text
    content: ' and '
  - type: note
    content: Gen. 23:2
  - type: text
    content: made great lamentation over him.
  '20':
  - type: text
    content: 'But Peter said to him, “Your money perish with you, because '
  - type: note
    content: 2 Kin. 5:16; Is. 55:1; Dan. 5:17; (Matt. 10:8)
  - type: text
    content: 'you thought that '
  - type: note
    content: (Acts 2:38; 10:45; 11:17)
  - type: text
    content: 'the gift of God could be purchased with money! '
  '21':
  - type: text
    content: 'You have neither part nor portion in this matter, for your '
  - type: note
    content: Jer. 17:9
  - type: text
    content: 'heart is not right in the sight of God. '
  '22':
  - type: text
    content: 'Repent therefore of this your wickedness, and pray God '
  - type: note
    content: Dan. 4:27; 2 Tim. 2:25
  - type: text
    content: 'if perhaps the thought of your heart may be forgiven you. '
  '23':
  - type: text
    content: 'For I see that you are '
  - type: note
    content: Heb. 12:15
  - type: text
    content: poisoned by bitterness and bound by iniquity.”
  '24':
  - type: text
    content: 'Then Simon answered and said, '
  - type: note
    content: Gen. 20:7, 17; Ex. 8:8; Num. 21:7; 1 Kin. 13:6; Job 42:8; James 5:16
  - type: text
    content: “Pray to the Lord for me, that none of the things which you have spoken may come upon me.”
  '25':
  - type: text
    content: So when they had testified and preached the word of the Lord, they returned to Jerusalem, preaching the gospel in many villages of the Samaritans.
  - type: heading
    content: Christ Is Preached to an Ethiopian
  '26':
  - type: text
    content: 'Now an angel of the Lord spoke to '
  - type: note
    content: Acts 6:5
  - type: text
    content: 'Philip, saying, “Arise and go toward the south along the road which goes down from Jerusalem to Gaza.” This is desert. '
  '27':
  - type: text
    content: 'So he arose and went. And behold, '
  - type: note
    content: Ps. 68:31; 87:4; Is. 56:3; Zeph. 3:10
  - type: text
    content: 'a man of Ethiopia, a eunuch of great authority under Candace the queen of the Ethiopians, who had charge of all her treasury, and '
  - type: note
    content: 1 Kin. 8:41, 42; John 12:20
  - type: text
    content: 'had come to Jerusalem to worship, '
  '28':
  - type: text
    content: 'was returning. And sitting in his chariot, he was reading Isaiah the prophet. '
  '29':
  - type: text
    content: Then the Spirit said to Philip, “Go near and overtake this chariot.”
  '3':
  - type: text
    content: 'As for Saul, '
  - type: note
    content: Acts 7:58; 1 Cor. 15:9; Gal. 1:13; Phil. 3:6; 1 Tim. 1:13
  - type: text
    content: 'he made havoc of the church, entering every house, and dragging off men and women, committing '
  - type: text
    content: them
  - type: text
    content: ' to prison.'
  - type: heading
    content: Christ Is Preached in Samaria
  '30':
  - type: text
    content: So Philip ran to him, and heard him reading the prophet Isaiah, and said, “Do you understand what you are reading?”
  '31':
  - type: text
    content: 'And he said, “How can I, unless someone guides me?” And he asked Philip to come up and sit with him. '
  '32':
  - type: text
    content: 'The place in the Scripture which he read was this:'
  - type: note
    content: Is. 53:7, 8
  - type: text
    content: “He was led as a sheep to the slaughter;
  - type: text
    content: 'And as a lamb before its shearer '
  - type: text
    content: is
  - type: text
    content: ' silent,'
  - type: note
    content: Matt. 26:62, 63; 27:12, 14; John 19:9
  - type: text
    content: So He opened not His mouth.
  '33':
  - type: text
    content: 'In His humiliation His '
  - type: note
    content: Luke 23:1–25
  - type: text
    content: justice was taken away,
  - type: text
    content: And who will declare His generation?
  - type: text
    content: 'For His life is '
  - type: note
    content: Luke 23:33–46
  - type: text
    content: taken from the earth.”
  '34':
  - type: text
    content: 'So the eunuch answered Philip and said, “I ask you, of whom does the prophet say this, of himself or of some other man?” '
  '35':
  - type: text
    content: 'Then Philip opened his mouth, '
  - type: note
    content: Luke 24:27; Acts 17:2; 18:28; 28:23
  - type: text
    content: 'and beginning at this Scripture, preached Jesus to him. '
  '36':
  - type: text
    content: 'Now as they went down the road, they came to some water. And the eunuch said, “See, '
  - type: text
    content: here
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' water. '
  - type: note
    content: Acts 10:47; 16:33
  - type: text
    content: What hinders me from being baptized?”
  '37':
  - type: text
    content: 'Then Philip said, '
  - type: note
    content: Matt. 28:19; (Mark 16:16; Rom. 10:9, 10)
  - type: text
    content: “If you believe with all your heart, you may.”
  - type: text
    content: 'And he answered and said, '
  - type: note
    content: Matt. 16:16; John 6:69; 9:35, 38; 11:27
  - type: text
    content: “I believe that Jesus Christ is the Son of God.”
  '38':
  - type: text
    content: 'So he commanded the chariot to stand still. And both Philip and the eunuch went down into the water, and he baptized him. '
  '39':
  - type: text
    content: 'Now when they came up out of the water, '
  - type: note
    content: 1 Kin. 18:12; 2 Kin. 2:16; Ezek. 3:12, 14; 2 Cor. 12:2
  - type: text
    content: 'the Spirit of the Lord caught Philip away, so that the eunuch saw him no more; and he went on his way rejoicing. '
  '4':
  - type: text
    content: 'Therefore '
  - type: note
    content: Matt. 10:23
  - type: text
    content: 'those who were scattered went everywhere preaching the word. '
  '40':
  - type: text
    content: 'But Philip was found at Azotus. And passing through, he preached in all the cities till he came to '
  - type: note
    content: Acts 21:8
  - type: text
    content: Caesarea.
  '5':
  - type: text
    content: 'Then '
  - type: note
    content: Acts 6:5; 8:26, 30
  - type: text
    content: 'Philip went down to the city of Samaria and preached Christ to them. '
  '6':
  - type: text
    content: 'And the multitudes with one accord heeded the things spoken by Philip, hearing and seeing the miracles which he did. '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: Mark 16:17
  - type: text
    content: 'unclean spirits, crying with a loud voice, came out of many who were possessed; and many who were paralyzed and lame were healed. '
  '8':
  - type: text
    content: And there was great joy in that city.
  - type: heading
    content: The Sorcerer’s Profession of Faith
  '9':
  - type: text
    content: 'But there was a certain man called Simon, who previously '
  - type: note
    content: Acts 8:11; 13:6
  - type: text
    content: 'practiced sorcery in the city and '
  - type: note
    content: Acts 5:36
  - type: text
    content: 'astonished the people of Samaria, claiming that he was someone great, '
