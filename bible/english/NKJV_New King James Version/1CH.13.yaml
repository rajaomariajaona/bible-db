document_id: 1CH.13,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ark Brought from Kirjath Jearim
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then David consulted with the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 11:15; 12:34
      marker-yv: yv-n
    - type: text
      text: 'captains of thousands and hundreds, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with every leader. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then the anger of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was aroused against Uzza, and He struck him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Num. 4:15); 1 Chr. 15:13, 15
      marker-yv: yv-n
    - type: text
      text: 'because he put his hand to the ark; and he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 10:2
      marker-yv: yv-n
    - type: text
      text: 'died there before God. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And David became angry because of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s outbreak against Uzza; therefore that place is called Perez Uzza to this day. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: David was afraid of God that day, saying, “How can I bring the ark of God to me?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So David would not move the ark with him into the City of David, but took it aside into the house of Obed-Edom the Gittite. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 6:11
      marker-yv: yv-n
    - type: text
      text: 'The ark of God remained with the family of Obed-Edom in his house three months. And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' blessed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 30:27); 1 Chr. 26:4–8
      marker-yv: yv-n
    - type: text
      text: the house of Obed-Edom and all that he had.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And David said to all the assembly of Israel, “If '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seems
    - type: text
      text: ' good to you, and if it is of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, let us send out to our brethren everywhere '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 31:1; Is. 37:4
      marker-yv: yv-n
    - type: text
      text: 'left in all the land of Israel, and with them to the priests and Levites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in their cities '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' their common-lands, that they may gather together to us; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and let us bring the ark of our God back to us, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 7:1, 2
      marker-yv: yv-n
    - type: text
      text: 'for we have not inquired at it since the days of Saul.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then all the assembly said that they would do so, for the thing was right in the eyes of all the people.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 7:5
      marker-yv: yv-n
    - type: text
      text: 'David gathered all Israel together, from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 13:3
      marker-yv: yv-n
    - type: text
      text: 'Shihor in Egypt to as far as the entrance of Hamath, to bring the ark of God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 6:21; 7:1, 2
      marker-yv: yv-n
    - type: text
      text: 'from Kirjath Jearim. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And David and all Israel went up to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:9, 60
      marker-yv: yv-n
    - type: text
      text: 'Baalah, to Kirjath Jearim, which belonged to Judah, to bring up from there the ark of God the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:22; 1 Sam. 4:4; 2 Kin. 19:15
      marker-yv: yv-n
    - type: text
      text: 'who dwells '
    - type: usfm
      marker: it
      children:
      - type: text
        text: between
    - type: text
      text: ' the cherubim, where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' name is proclaimed. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So they carried the ark of God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 4:15; 1 Sam. 6:7
      marker-yv: yv-n
    - type: text
      text: 'on a new cart '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 7:1
      marker-yv: yv-n
    - type: text
      text: 'from the house of Abinadab, and Uzza and Ahio drove the cart. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 6:5
      marker-yv: yv-n
    - type: text
      text: 'David and all Israel played '
    - type: usfm
      marker: it
      children:
      - type: text
        text: music
    - type: text
      text: ' before God with all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' might, with singing, on harps, on stringed instruments, on tambourines, on cymbals, and with trumpets.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And when they came to Chidon’s threshing floor, Uzza put out his hand to hold the ark, for the oxen stumbled. '
