  '1':
  - type: heading
    content: The Ark Brought from Kirjath Jearim
  - type: text
    content: 'Then David consulted with the '
  - type: note
    content: 1 Chr. 11:15; 12:34
  - type: text
    content: 'captains of thousands and hundreds, '
  - type: text
    content: and
  - type: text
    content: ' with every leader. '
  '10':
  - type: text
    content: 'Then the anger of the '
  - type: heading
    content: Lord
  - type: text
    content: ' was aroused against Uzza, and He struck him '
  - type: note
    content: (Num. 4:15); 1 Chr. 15:13, 15
  - type: text
    content: 'because he put his hand to the ark; and he '
  - type: note
    content: Lev. 10:2
  - type: text
    content: 'died there before God. '
  '11':
  - type: text
    content: 'And David became angry because of the '
  - type: heading
    content: Lord
  - type: text
    content: '’s outbreak against Uzza; therefore that place is called Perez Uzza to this day. '
  '12':
  - type: text
    content: David was afraid of God that day, saying, “How can I bring the ark of God to me?”
  '13':
  - type: text
    content: 'So David would not move the ark with him into the City of David, but took it aside into the house of Obed-Edom the Gittite. '
  '14':
  - type: note
    content: 2 Sam. 6:11
  - type: text
    content: 'The ark of God remained with the family of Obed-Edom in his house three months. And the '
  - type: heading
    content: Lord
  - type: text
    content: ' blessed '
  - type: note
    content: (Gen. 30:27); 1 Chr. 26:4–8
  - type: text
    content: the house of Obed-Edom and all that he had.
  '2':
  - type: text
    content: 'And David said to all the assembly of Israel, “If '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: seems
  - type: text
    content: ' good to you, and if it is of the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God, let us send out to our brethren everywhere '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 31:1; Is. 37:4
  - type: text
    content: 'left in all the land of Israel, and with them to the priests and Levites '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' in their cities '
  - type: text
    content: and
  - type: text
    content: ' their common-lands, that they may gather together to us; '
  '3':
  - type: text
    content: 'and let us bring the ark of our God back to us, '
  - type: note
    content: 1 Sam. 7:1, 2
  - type: text
    content: 'for we have not inquired at it since the days of Saul.” '
  '4':
  - type: text
    content: Then all the assembly said that they would do so, for the thing was right in the eyes of all the people.
  '5':
  - type: text
    content: 'So '
  - type: note
    content: 1 Sam. 7:5
  - type: text
    content: 'David gathered all Israel together, from '
  - type: note
    content: Josh. 13:3
  - type: text
    content: 'Shihor in Egypt to as far as the entrance of Hamath, to bring the ark of God '
  - type: note
    content: 1 Sam. 6:21; 7:1, 2
  - type: text
    content: 'from Kirjath Jearim. '
  '6':
  - type: text
    content: 'And David and all Israel went up to '
  - type: note
    content: Josh. 15:9, 60
  - type: text
    content: 'Baalah, to Kirjath Jearim, which belonged to Judah, to bring up from there the ark of God the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ex. 25:22; 1 Sam. 4:4; 2 Kin. 19:15
  - type: text
    content: 'who dwells '
  - type: text
    content: between
  - type: text
    content: ' the cherubim, where '
  - type: text
    content: His
  - type: text
    content: ' name is proclaimed. '
  '7':
  - type: text
    content: 'So they carried the ark of God '
  - type: note
    content: Num. 4:15; 1 Sam. 6:7
  - type: text
    content: 'on a new cart '
  - type: note
    content: 1 Sam. 7:1
  - type: text
    content: 'from the house of Abinadab, and Uzza and Ahio drove the cart. '
  '8':
  - type: text
    content: 'Then '
  - type: note
    content: 2 Sam. 6:5
  - type: text
    content: 'David and all Israel played '
  - type: text
    content: music
  - type: text
    content: ' before God with all '
  - type: text
    content: their
  - type: text
    content: ' might, with singing, on harps, on stringed instruments, on tambourines, on cymbals, and with trumpets.'
  '9':
  - type: text
    content: 'And when they came to Chidon’s threshing floor, Uzza put out his hand to hold the ark, for the oxen stumbled. '
