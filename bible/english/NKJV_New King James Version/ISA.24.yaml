document_id: ISA.24,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Impending Judgment on the Earth
  - type: text
    content: 'Behold, the '
  - type: heading
    content: Lord
  - type: text
    content: ' makes the earth empty and makes it waste,'
  - type: text
    content: Distorts its surface
  - type: text
    content: And scatters abroad its inhabitants.
  '10':
  - type: text
    content: The city of confusion is broken down;
  - type: text
    content: Every house is shut up, so that none may go in.
  '11':
  - type: text
    content: There
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' a cry for wine in the streets,'
  - type: text
    content: All joy is darkened,
  - type: text
    content: The mirth of the land is gone.
  '12':
  - type: text
    content: In the city desolation is left,
  - type: text
    content: And the gate is stricken with destruction.
  '13':
  - type: text
    content: When it shall be thus in the midst of the land among the people,
  - type: note
    content: (Is. 17:5, 6; 27:12)
  - type: text
    content: It
  - type: text
    content: ' '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' like the shaking of an olive tree,'
  - type: text
    content: Like the gleaning of grapes when the vintage is done.
  '14':
  - type: text
    content: They shall lift up their voice, they shall sing;
  - type: text
    content: 'For the majesty of the '
  - type: heading
    content: Lord
  - type: text
    content: They shall cry aloud from the sea.
  '15':
  - type: text
    content: 'Therefore '
  - type: note
    content: Is. 25:3
  - type: text
    content: 'glorify the '
  - type: heading
    content: Lord
  - type: text
    content: ' in the dawning light,'
  - type: note
    content: Mal. 1:11
  - type: text
    content: 'The name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel in the coastlands of the sea.'
  '16':
  - type: text
    content: 'From the ends of the earth we have heard songs:'
  - type: text
    content: “Glory to the righteous!”
  - type: text
    content: But I said, “I am ruined, ruined!
  - type: text
    content: Woe to me!
  - type: note
    content: Is. 21:2; 33:1; Jer. 3:20; 5:11
  - type: text
    content: The treacherous dealers have dealt treacherously,
  - type: text
    content: Indeed, the treacherous dealers have dealt very treacherously.”
  '17':
  - type: note
    content: Jer. 48:43; Amos 5:19
  - type: text
    content: Fear and the pit and the snare
  - type: text
    content: Are
  - type: text
    content: ' upon you, O inhabitant of the earth.'
  '18':
  - type: text
    content: And it shall be
  - type: text
    content: That
  - type: text
    content: ' he who flees from the noise of the fear'
  - type: text
    content: Shall fall into the pit,
  - type: text
    content: And he who comes up from the midst of the pit
  - type: text
    content: Shall be caught in the snare;
  - type: text
    content: 'For '
  - type: note
    content: Gen. 7:11
  - type: text
    content: the windows from on high are open,
  - type: text
    content: 'And '
  - type: note
    content: Ps. 18:7; 46:2; Is. 2:19, 21; 13:13
  - type: text
    content: the foundations of the earth are shaken.
  '19':
  - type: note
    content: Jer. 4:23
  - type: text
    content: The earth is violently broken,
  - type: text
    content: The earth is split open,
  - type: text
    content: The earth is shaken exceedingly.
  '2':
  - type: text
    content: 'And it shall be:'
  - type: text
    content: 'As with the people, so with the '
  - type: note
    content: Hos. 4:9
  - type: text
    content: priest;
  - type: text
    content: As with the servant, so with his master;
  - type: text
    content: As with the maid, so with her mistress;
  - type: note
    content: Ezek. 7:12, 13
  - type: text
    content: As with the buyer, so with the seller;
  - type: text
    content: As with the lender, so with the borrower;
  - type: text
    content: As with the creditor, so with the debtor.
  '20':
  - type: text
    content: 'The earth shall '
  - type: note
    content: Is. 19:14; 24:1; 28:7
  - type: text
    content: reel to and fro like a drunkard,
  - type: text
    content: And shall totter like a hut;
  - type: text
    content: Its transgression shall be heavy upon it,
  - type: text
    content: And it will fall, and not rise again.
  '21':
  - type: text
    content: It shall come to pass in that day
  - type: text
    content: That
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' will punish on high the host of exalted ones,'
  - type: text
    content: 'And on the earth '
  - type: note
    content: Ps. 76:12
  - type: text
    content: the kings of the earth.
  '22':
  - type: text
    content: They will be gathered together,
  - type: text
    content: As
  - type: text
    content: ' prisoners are gathered in the pit,'
  - type: text
    content: And will be shut up in the prison;
  - type: text
    content: After many days they will be punished.
  '23':
  - type: text
    content: 'Then the '
  - type: note
    content: Is. 13:10; 60:19; Ezek. 32:7; Joel 2:31; 3:15
  - type: text
    content: moon will be disgraced
  - type: text
    content: And the sun ashamed;
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts will '
  - type: note
    content: Rev. 19:4, 6
  - type: text
    content: reign
  - type: text
    content: 'On '
  - type: note
    content: (Heb. 12:22)
  - type: text
    content: Mount Zion and in Jerusalem
  - type: text
    content: And before His elders, gloriously.
  '3':
  - type: text
    content: The land shall be entirely emptied and utterly plundered,
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' has spoken this word.'
  '4':
  - type: text
    content: 'The earth mourns '
  - type: text
    content: and
  - type: text
    content: ' fades away,'
  - type: text
    content: 'The world languishes '
  - type: text
    content: and
  - type: text
    content: ' fades away;'
  - type: text
    content: 'The '
  - type: note
    content: Is. 25:11
  - type: text
    content: haughty people of the earth languish.
  '5':
  - type: note
    content: Gen. 3:17; Num. 35:33; Is. 9:17; 10:6
  - type: text
    content: The earth is also defiled under its inhabitants,
  - type: text
    content: 'Because they have '
  - type: note
    content: Is. 59:12
  - type: text
    content: transgressed the laws,
  - type: text
    content: Changed the ordinance,
  - type: text
    content: 'Broken the '
  - type: note
    content: 1 Chr. 16:14–19; Ps. 105:7–12
  - type: text
    content: everlasting covenant.
  '6':
  - type: text
    content: 'Therefore '
  - type: note
    content: Mal. 4:6
  - type: text
    content: the curse has devoured the earth,
  - type: text
    content: And those who dwell in it are desolate.
  - type: text
    content: 'Therefore the inhabitants of the earth are '
  - type: note
    content: Is. 9:19
  - type: text
    content: burned,
  - type: text
    content: 'And few men '
  - type: text
    content: are
  - type: text
    content: ' left.'
  '7':
  - type: note
    content: Is. 16:8–10; Joel 1:10, 12
  - type: text
    content: The new wine fails, the vine languishes,
  - type: text
    content: All the merry-hearted sigh.
  '8':
  - type: text
    content: 'The mirth '
  - type: note
    content: Is. 5:12, 14; Jer. 7:34; 16:9; 25:10; Ezek. 26:13; Hos. 2:11; Rev. 18:22
  - type: text
    content: of the tambourine ceases,
  - type: text
    content: The noise of the jubilant ends,
  - type: text
    content: The joy of the harp ceases.
  '9':
  - type: text
    content: They shall not drink wine with a song;
  - type: text
    content: Strong drink is bitter to those who drink it.
