  - type: text
    content: 'to Achish the son of Maoch, king of Gath. '
  '3':
  - type: text
    content: 'So David dwelt with Achish at Gath, he and his men, each man with his household, '
  - type: text
    content: and
  - type: text
    content: ' David '
  - type: note
