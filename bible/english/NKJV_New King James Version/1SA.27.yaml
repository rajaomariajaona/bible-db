  - type: text
    content: 'with his two wives, Ahinoam the Jezreelitess, and Abigail the Carmelitess, Nabal’s widow. '
  '4':
  - type: text
    content: And it was told Saul that David had fled to Gath; so he sought him no more.
  '5':
  - type: text
    content: 'Then David said to Achish, “If I have now found favor in your eyes, let them give me a place in some town in the country, that I may dwell there. For why should your servant dwell in the royal city with you?” '
  '6':
  - type: text
    content: 'So Achish gave him Ziklag that day. Therefore '
  - type: note
    content: 1 Sam. 25:42, 43
  - type: text
    content: 'Ziklag has belonged to the kings of Judah to this day. '
