document_id: 1SA.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Allied with the Philistines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And David said in his heart, “Now I shall perish someday by the hand of Saul. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: There
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' nothing better for me than that I should speedily escape to the land of the Philistines; and Saul will despair of me, to seek me anymore in any part of Israel. So I shall escape out of his hand.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then David arose '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 32:28; 1 Sam. 24:20
    marker-yv: yv-n
  - type: text
    text: 'and went over with the six hundred men who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' with him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 25:13
    marker-yv: yv-n
  - type: text
    text: 'to Achish the son of Maoch, king of Gath. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So David dwelt with Achish at Gath, he and his men, each man with his household, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' David '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 21:10; 1 Kin. 2:39
    marker-yv: yv-n
  - type: text
    text: 'with his two wives, Ahinoam the Jezreelitess, and Abigail the Carmelitess, Nabal’s widow. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And it was told Saul that David had fled to Gath; so he sought him no more.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then David said to Achish, “If I have now found favor in your eyes, let them give me a place in some town in the country, that I may dwell there. For why should your servant dwell in the royal city with you?” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Achish gave him Ziklag that day. Therefore '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 25:42, 43
    marker-yv: yv-n
  - type: text
    text: 'Ziklag has belonged to the kings of Judah to this day. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now the time that David '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 15:31; 19:5; 1 Chr. 12:1; Neh. 11:28
    marker-yv: yv-n
  - type: text
    text: dwelt in the country of the Philistines was one full year and four months.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And David and his men went up and raided '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 29:3
    marker-yv: yv-n
  - type: text
    text: 'the Geshurites, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 13:2, 13
    marker-yv: yv-n
  - type: text
    text: 'the Girzites, and the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 16:10; Judg. 1:29
    marker-yv: yv-n
  - type: text
    text: 'Amalekites. For those '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nations
  - type: text
    text: ' were the inhabitants of the land from of old, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 17:8, 16; 1 Sam. 15:7, 8
    marker-yv: yv-n
  - type: text
    text: 'as you go to Shur, even as far as the land of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Whenever David attacked the land, he left neither man nor woman alive, but took away the sheep, the oxen, the donkeys, the camels, and the apparel, and returned and came to Achish. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Achish would say, “Where have you made a raid today?” And David would say, “Against the southern '
  - type: usfm
    marker: it
    children:
    - type: text
      text: area
  - type: text
    text: ' of Judah, or against the southern '
  - type: usfm
    marker: it
    children:
    - type: text
      text: area
  - type: text
    text: ' of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 25:18; Ex. 15:22
    marker-yv: yv-n
  - type: text
    text: 'the Jerahmeelites, or against the southern '
  - type: usfm
    marker: it
    children:
    - type: text
      text: area
  - type: text
    text: ' of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 2:9, 25
    marker-yv: yv-n
  - type: text
    text: 'the Kenites.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'David would save neither man nor woman alive, to bring '
  - type: usfm
    marker: it
    children:
    - type: text
      text: news
  - type: text
    text: ' to Gath, saying, “Lest they should inform on us, saying, ‘Thus David did.’ ” And thus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' his behavior all the time he dwelt in the country of the Philistines. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So Achish believed David, saying, “He has made his people Israel utterly abhor him; therefore he will be my servant forever.”
