document_id: JER.34,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Zedekiah Warned by God
  - type: text
    content: 'The word which came to Jeremiah from the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 2 Kin. 25:1; Jer. 32:1, 2; 39:1; 52:4
  - type: text
    content: 'when Nebuchadnezzar king of Babylon and all his army, '
  - type: note
    content: Jer. 1:15; 25:9; Dan. 2:37, 38
  - type: text
    content: 'all the kingdoms of the earth under his dominion, and all the people, fought against Jerusalem and all its cities, saying, '
  '10':
  - type: text
    content: 'Now when all the princes and all the people, who had entered into the covenant, heard that everyone should set free his male and female slaves, that no one should keep them in bondage anymore, they obeyed and let '
  - type: text
    content: them
  - type: text
    content: ' go. '
  '11':
  - type: text
    content: But afterward they changed their minds and made the male and female slaves return, whom they had set free, and brought them into subjection as male and female slaves.
  '12':
  - type: text
    content: 'Therefore the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to Jeremiah from the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying, '
  '13':
  - type: text
    content: '“Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ', the God of Israel: ‘I made a '
  - type: note
    content: Ex. 24:3, 7, 8; Deut. 5:2, 3, 27; Jer. 31:32
  - type: text
    content: 'covenant with your fathers in the day that I brought them out of the land of Egypt, out of the house of bondage, saying, '
  '14':
  - type: text
    content: '“At the end of '
  - type: note
    content: Ex. 21:2; 23:10; Deut. 15:12; 1 Kin. 9:22
  - type: text
    content: 'seven years let every man set free his Hebrew brother, who has been sold to him; and when he has served you six years, you shall let him go free from you.” But your fathers did not obey Me nor incline their ear. '
  '15':
  - type: text
    content: 'Then you recently turned and did what was right in My sight—every man proclaiming liberty to his neighbor; and you '
  - type: note
    content: 2 Kin. 23:3; Neh. 10:29
  - type: text
    content: 'made a covenant before Me '
  - type: note
    content: Jer. 7:10
  - type: text
    content: 'in the house which is called by My name. '
  '16':
  - type: text
    content: 'Then you turned around and '
  - type: note
    content: Ex. 20:7; Lev. 19:12
  - type: text
    content: profaned My name, and every one of you brought back his male and female slaves, whom you had set at liberty, at their pleasure, and brought them back into subjection, to be your male and female slaves.’
  '17':
  - type: text
    content: '“Therefore thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘You have not obeyed Me in proclaiming liberty, every one to his brother and every one to his neighbor. '
  - type: note
    content: Lev. 26:34, 35; Esth. 7:10; Dan. 6:24; (Matt. 7:2; Gal. 6:7); James 2:13
  - type: text
    content: 'Behold, I proclaim liberty to you,’ says the '
  - type: heading
    content: Lord
  - type: text
    content: —
  - type: note
    content: Jer. 32:24, 36
  - type: text
    content: '‘to the sword, to pestilence, and to famine! And I will deliver you to '
  - type: note
    content: Deut. 28:25, 64; Jer. 29:18
  - type: text
    content: 'trouble among all the kingdoms of the earth. '
  '18':
  - type: text
    content: 'And I will give the men who have transgressed My covenant, who have not performed the words of the covenant which they made before Me, when '
  - type: note
    content: Gen. 15:10, 17
  - type: text
    content: 'they cut the calf in two and passed between the parts of it— '
  '19':
  - type: text
    content: 'the princes of Judah, the princes of Jerusalem, the eunuchs, the priests, and all the people of the land who passed between the parts of the calf— '
  '2':
  - type: text
    content: '“Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ', the God of Israel: ‘Go and '
  - type: note
    content: 2 Chr. 36:11, 12; Jer. 22:1, 2; 37:1, 2
  - type: text
    content: 'speak to Zedekiah king of Judah and tell him, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘Behold, '
  - type: note
    content: 2 Kin. 25:9; Jer. 21:10; 32:3, 28
  - type: text
    content: 'I will give this city into the hand of the king of Babylon, and he shall burn it with fire. '
  '20':
  - type: text
    content: 'I will '
  - type: note
    content: 2 Kin. 25:19–21; Jer. 22:25
  - type: text
    content: 'give them into the hand of their enemies and into the hand of those who seek their life. Their '
  - type: note
    content: Deut. 28:26; 1 Sam. 17:44, 46; 1 Kin. 14:11; 16:4; Ps. 79:2; Jer. 7:33; 16:4; 19:7
  - type: text
    content: 'dead bodies shall be for meat for the birds of the heaven and the beasts of the earth. '
  '21':
  - type: text
    content: 'And I will give Zedekiah king of Judah and his princes into the hand of their enemies, into the hand of those who seek their life, and into the hand of the king of Babylon’s army '
  - type: note
    content: Jer. 37:5–11; 39:4–7
  - type: text
    content: 'which has gone back from you. '
  '22':
  - type: note
    content: Jer. 37:8, 10
  - type: text
    content: 'Behold, I will command,’ says the '
  - type: heading
    content: Lord
  - type: text
    content: ', ‘and cause them to return to this city. They will fight against it '
  - type: note
    content: Jer. 38:3; 39:1, 2, 8; 52:7, 13
  - type: text
    content: 'and take it and burn it with fire; and '
  - type: note
    content: Jer. 9:11; 44:2, 6
  - type: text
    content: I will make the cities of Judah a desolation without inhabitant.’ ”
  '3':
  - type: text
    content: 'And '
  - type: note
    content: 2 Kin. 25:4, 5; Jer. 21:7; 52:7–11
  - type: text
    content: 'you shall not escape from his hand, but shall surely be taken and delivered into his hand; your eyes shall see the eyes of the king of Babylon, he shall speak with you '
  - type: note
    content: 2 Kin. 25:6, 7; Jer. 32:4; 39:5, 6
  - type: text
    content: 'face to face, and you shall go to Babylon.’ ” ’ '
  '4':
  - type: text
    content: 'Yet hear the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', O Zedekiah king of Judah! Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' concerning you: ‘You shall not die by the sword. '
  '5':
  - type: text
    content: 'You shall die in peace; as in '
  - type: note
    content: 2 Chr. 16:14; 21:19
  - type: text
    content: 'the ceremonies of your fathers, the former kings who were before you, '
  - type: note
    content: Dan. 2:46
  - type: text
    content: 'so they shall burn '
  - type: text
    content: incense
  - type: text
    content: ' for you and '
  - type: note
    content: Jer. 22:18
  - type: text
    content: 'lament for you, '
  - type: text
    content: saying,
  - type: text
    content: ' “Alas, lord!” For I have pronounced the word, says the '
  - type: heading
    content: Lord
  - type: text
    content: .’ ”
  '6':
  - type: text
    content: 'Then Jeremiah the prophet spoke all these words to Zedekiah king of Judah in Jerusalem, '
  '7':
  - type: text
    content: 'when the king of Babylon’s army fought against Jerusalem and all the cities of Judah that were left, against Lachish and Azekah; for '
  - type: text
    content: only
  - type: text
    content: ' '
  - type: note
    content: 2 Kin. 18:13; 19:8; 2 Chr. 11:5, 9
  - type: text
    content: these fortified cities remained of the cities of Judah.
  - type: heading
    content: Treacherous Treatment of Slaves
  '8':
  - type: text
    content: This
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' the word that came to Jeremiah from the '
  - type: heading
    content: Lord
  - type: text
    content: ', after King Zedekiah had made a covenant with all the people who '
  - type: text
    content: were
  - type: text
    content: ' at Jerusalem to proclaim '
  - type: note
    content: Ex. 21:2; Lev. 25:10; Neh. 5:1–13; Is. 58:6; Jer. 34:14, 17
  - type: text
    content: 'liberty to them: '
  '9':
  - type: note
    content: Neh. 5:11
  - type: text
    content: that every man should set free his male and female slave—a Hebrew man or woman—
  - type: note
    content: Lev. 25:39–46
  - type: text
    content: 'that no one should keep a Jewish brother in bondage. '
