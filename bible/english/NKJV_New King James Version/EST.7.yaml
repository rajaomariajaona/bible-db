  '1':
  - type: heading
    content: Haman Hanged Instead of Mordecai
  - type: text
    content: 'So the king and Haman went to dine with Queen Esther. '
  '10':
  - type: text
    content: 'So '
  - type: note
    content: (Ps. 7:16; 94:23; Prov. 11:5, 6)
  - type: text
    content: 'they '
  - type: note
    content: Ps. 37:35, 36; Dan. 6:24
  - type: text
    content: hanged Haman on the gallows that he had prepared for Mordecai. Then the king’s wrath subsided.
  '2':
  - type: text
    content: 'And on the second day, '
  - type: note
    content: Esth. 5:6
  - type: text
    content: 'at the banquet of wine, the king again said to Esther, “What '
  - type: text
    content: is
  - type: text
    content: ' your petition, Queen Esther? It shall be granted you. And what '
  - type: text
    content: is
  - type: text
    content: ' your request, up to half the kingdom? It shall be done!”'
  '3':
  - type: text
    content: 'Then Queen Esther answered and said, “If I have found favor in your sight, O king, and if it pleases the king, let my life be given me at my petition, and my people at my request. '
  '4':
  - type: text
    content: 'For we have been '
  - type: note
    content: Esth. 3:9, 4:7
  - type: text
    content: 'sold, my people and I, to be destroyed, to be killed, and to be annihilated. Had we been sold as '
  - type: note
    content: Deut. 28:68
  - type: text
    content: male and female slaves, I would have held my tongue, although the enemy could never compensate for the king’s loss.”
  '5':
  - type: text
    content: So King Ahasuerus answered and said to Queen Esther, “Who is he, and where is he, who would dare presume in his heart to do such a thing?”
  '6':
  - type: text
    content: 'And Esther said, “The adversary and '
  - type: note
    content: Esth. 3:10
  - type: text
    content: 'enemy '
  - type: text
    content: is
  - type: text
    content: ' this wicked Haman!”'
  - type: text
    content: So Haman was terrified before the king and queen.
  '7':
  - type: text
    content: 'Then the king arose in his wrath from the banquet of wine '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: went
  - type: text
    content: ' into the palace garden; but Haman stood before Queen Esther, pleading for his life, for he saw that evil was determined against him by the king. '
  '8':
  - type: text
    content: 'When the king returned from the palace garden to the place of the banquet of wine, Haman had fallen across '
  - type: note
    content: Esth. 1:6
  - type: text
    content: 'the couch where Esther '
  - type: text
    content: was.
  - type: text
    content: ' Then the king said, “Will he also assault the queen while I '
  - type: text
    content: am
  - type: text
    content: ' in the house?”'
  - type: text
    content: 'As the word left the king’s mouth, they '
  - type: note
    content: Job 9:24
  - type: text
    content: 'covered Haman’s face. '
  '9':
  - type: text
    content: 'Now '
  - type: note
    content: Esth. 1:10
  - type: text
    content: 'Harbonah, one of the eunuchs, said to the king, “Look! '
  - type: note
    content: Esth. 5:14; (Ps. 7:16; Prov. 11:5, 6)
  - type: text
    content: 'The gallows, fifty cubits high, which Haman made for Mordecai, who spoke '
  - type: note
    content: Esth. 6:2
  - type: text
    content: good on the king’s behalf, is standing at the house of Haman.”
  - type: text
    content: Then the king said, “Hang him on it!”
