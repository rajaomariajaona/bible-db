      text: Haman Hanged Instead of Mordecai
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king and Haman went to dine with Queen Esther. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 7:16; 94:23; Prov. 11:5, 6)
      marker-yv: yv-n
    - type: text
      text: 'they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:35, 36; Dan. 6:24
      marker-yv: yv-n
    - type: text
      text: hanged Haman on the gallows that he had prepared for Mordecai. Then the king’s wrath subsided.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And on the second day, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 5:6
      marker-yv: yv-n
    - type: text
      text: 'at the banquet of wine, the king again said to Esther, “What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' your petition, Queen Esther? It shall be granted you. And what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' your request, up to half the kingdom? It shall be done!”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Queen Esther answered and said, “If I have found favor in your sight, O king, and if it pleases the king, let my life be given me at my petition, and my people at my request. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we have been '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 3:9, 4:7
      marker-yv: yv-n
    - type: text
      text: 'sold, my people and I, to be destroyed, to be killed, and to be annihilated. Had we been sold as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:68
      marker-yv: yv-n
    - type: text
      text: male and female slaves, I would have held my tongue, although the enemy could never compensate for the king’s loss.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So King Ahasuerus answered and said to Queen Esther, “Who is he, and where is he, who would dare presume in his heart to do such a thing?”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Esther said, “The adversary and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 3:10
      marker-yv: yv-n
    - type: text
      text: 'enemy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' this wicked Haman!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Haman was terrified before the king and queen.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king arose in his wrath from the banquet of wine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: went
    - type: text
      text: ' into the palace garden; but Haman stood before Queen Esther, pleading for his life, for he saw that evil was determined against him by the king. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the king returned from the palace garden to the place of the banquet of wine, Haman had fallen across '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 1:6
      marker-yv: yv-n
    - type: text
      text: 'the couch where Esther '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was.
    - type: text
      text: ' Then the king said, “Will he also assault the queen while I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' in the house?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the word left the king’s mouth, they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:24
      marker-yv: yv-n
    - type: text
      text: 'covered Haman’s face. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 1:10
      marker-yv: yv-n
    - type: text
      text: 'Harbonah, one of the eunuchs, said to the king, “Look! '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 5:14; (Ps. 7:16; Prov. 11:5, 6)
      marker-yv: yv-n
    - type: text
      text: 'The gallows, fifty cubits high, which Haman made for Mordecai, who spoke '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 6:2
      marker-yv: yv-n
    - type: text
      text: good on the king’s behalf, is standing at the house of Haman.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the king said, “Hang him on it!”
