document_id: HEB.5,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Qualifications for High Priesthood
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'For every high priest taken from among men '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 2:17; 8:3
      marker-yv: yv-n
    - type: text
      text: 'is appointed for men in things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pertaining
    - type: text
      text: ' to God, that he may offer both gifts and sacrifices for sins. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'called by God as High Priest '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 110:4
      marker-yv: yv-n
    - type: text
      text: '“according to the order of Melchizedek,” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'of whom '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 16:12); Heb. 7:1–22
      marker-yv: yv-n
    - type: text
      text: 'we have much to say, and hard to explain, since you have become '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 13:15)
      marker-yv: yv-n
    - type: text
      text: dull of hearing.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Spiritual Immaturity
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For though by this time you ought to be teachers, you need '
    - type: usfm
      marker: it
      children:
      - type: text
        text: someone
    - type: text
      text: ' to teach you again the first principles of the oracles of God; and you have come to need '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 3:1–3; 1 Pet. 2:2
      marker-yv: yv-n
    - type: text
      text: 'milk and not solid food. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For everyone who partakes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' of milk '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' unskilled in the word of righteousness, for he is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 4:14
      marker-yv: yv-n
    - type: text
      text: 'a babe. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But solid food belongs to those who are of full age, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is,
    - type: text
      text: ' those who by reason of use have their senses exercised '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 7:15; Phil. 1:9
      marker-yv: yv-n
    - type: text
      text: to discern both good and evil.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He can have compassion on those who are ignorant and going astray, since he himself is also subject to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 7:28
      marker-yv: yv-n
    - type: text
      text: 'weakness. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Because of this he is required as for the people, so also for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 9:7; 16:6; (Heb. 7:27; 9:7)
      marker-yv: yv-n
    - type: text
      text: 'himself, to offer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sacrifices
    - type: text
      text: ' for sins. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And no man takes this honor to himself, but he who is called by God, just as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:1; Num. 16:40; 1 Chr. 23:13
      marker-yv: yv-n
    - type: text
      text: 'Aaron '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Priest Forever
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 8:54
      marker-yv: yv-n
    - type: text
      text: 'So also Christ did not glorify Himself to become High Priest, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' He who said to Him:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 2:7
      marker-yv: yv-n
    - type: text
      text: “You are My Son,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Today I have begotten You.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'As '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He
    - type: text
      text: ' also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: says
    - type: text
      text: ' in another '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'place:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 110:4; Heb. 7:17
      marker-yv: yv-n
    - type: text
      text: '“You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a priest forever'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: According to the order of Melchizedek”;
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'who, in the days of His flesh, when He had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 26:39, 42, 44; Mark 14:36, 39; Luke 22:41, 44
      marker-yv: yv-n
    - type: text
      text: 'offered up prayers and supplications, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 22:1
      marker-yv: yv-n
    - type: text
      text: 'with vehement cries and tears to Him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 26:53
      marker-yv: yv-n
    - type: text
      text: 'who was able to save Him from death, and was heard '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 26:39
      marker-yv: yv-n
    - type: text
      text: 'because of His godly fear, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'though He was a Son, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yet
    - type: text
      text: ' He learned '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 2:8
      marker-yv: yv-n
    - type: text
      text: 'obedience by the things which He suffered. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 2:10
      marker-yv: yv-n
    - type: text
      text: 'having been perfected, He became the author of eternal salvation to all who obey Him, '
