segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job Reproaches His Pitiless Friends
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Job answered and said:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I have heard many such things;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 13:4; 21:34
    marker-yv: yv-n
  - type: text
    text: 'Miserable comforters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' you all!'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Shall words of wind have an end?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or what provokes you that you answer?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I also could speak as you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: do,
- type: usfm
  marker: q2
  children:
  - type: text
    text: If your soul were in my soul’s place.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I could heap up words against you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 22:7; 109:25; Lam. 2:15; Zeph. 2:15; Matt. 27:39
    marker-yv: yv-n
  - type: text
    text: shake my head at you;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: it
    children:
    - type: text
      text: But
  - type: text
    text: ' I would strengthen you with my mouth,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the comfort of my lips would relieve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: grief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Though I speak, my grief is not relieved;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: if
  - type: text
    text: ' I remain silent, how am I eased?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But now He has '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 7:3
    marker-yv: yv-n
  - type: text
    text: worn me out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'You '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 16:20; 19:13–15
    marker-yv: yv-n
  - type: text
    text: have made desolate all my company.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You have shriveled me up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And it is a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 10:17
    marker-yv: yv-n
  - type: text
    text: 'witness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: against
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: My leanness rises up against me
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: And
  - type: text
    text: ' bears witness to my face.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 10:16, 17; 19:11; Hos. 6:1
    marker-yv: yv-n
  - type: text
    text: 'He tears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me
  - type: text
    text: ' in His wrath, and hates me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He gnashes at me with His teeth;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 13:24; 33:10
    marker-yv: yv-n
  - type: text
    text: My adversary sharpens His gaze on me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 22:13; 35:21
    marker-yv: yv-n
  - type: text
    text: gape at me with their mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 50:6; Lam. 3:30; Mic. 5:1; Matt. 26:67; Mark 14:65; Luke 22:63; Acts 23:2
    marker-yv: yv-n
  - type: text
    text: strike me reproachfully on the cheek,
- type: usfm
  marker: q2
  children:
  - type: text
    text: They gather together against me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 1:15, 17
    marker-yv: yv-n
  - type: text
    text: has delivered me to the ungodly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And turned me over to the hands of the wicked.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I was at ease, but He has '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 9:17
    marker-yv: yv-n
  - type: text
    text: shattered me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He also has taken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me
  - type: text
    text: ' by my neck, and shaken me to pieces;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He has '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 7:20; Lam. 3:12
    marker-yv: yv-n
  - type: text
    text: set me up for His target,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: His archers surround me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He pierces my heart and does not pity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He pours out my gall on the ground.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He breaks me with wound upon wound;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He runs at me like a warrior.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “I have sewn sackcloth over my skin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 30:19; Ps. 7:5
    marker-yv: yv-n
  - type: text
    text: laid my head in the dust.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: My face is flushed from weeping,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And on my eyelids '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the shadow of death;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Although no violence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' in my hands,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And my prayer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' pure.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “O earth, do not cover my blood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 27:9; (Ps. 66:18)
    marker-yv: yv-n
  - type: text
    text: 'let my cry have no '
  - type: usfm
    marker: it
    children:
    - type: text
      text: resting
  - type: text
    text: ' place!'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Surely even now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 31:50; Rom. 1:9; Phil. 1:8; 1 Thess. 2:5
    marker-yv: yv-n
  - type: text
    text: 'my witness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' in heaven,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And my evidence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' on high.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: My friends scorn me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'My eyes pour out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tears
  - type: text
    text: ' to God.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 31:35; Eccl. 6:10; (Is. 45:9; Rom. 9:20)
    marker-yv: yv-n
  - type: text
    text: Oh, that one might plead for a man with God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'As a man '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pleads
  - type: text
    text: ' for his neighbor!'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For when a few years are finished,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 10:21; Eccl. 12:5
    marker-yv: yv-n
  - type: text
    text: go the way of no return.
