document_id: 2CH.12,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Egypt Attacks Judah
  - type: text
    content: 'Now '
  - type: note
    content: 2 Chr. 11:17
  - type: text
    content: 'it came to pass, when Rehoboam had established the kingdom and had strengthened himself, that '
  - type: note
    content: 1 Kin. 14:22–24
  - type: text
    content: 'he forsook the law of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and all Israel along with him. '
  '10':
  - type: text
    content: 'Then King Rehoboam made bronze shields in their place, and committed '
  - type: text
    content: them
  - type: text
    content: ' '
  - type: note
    content: 1 Kin. 14:27
  - type: text
    content: 'to the hands of the captains of the guard, who guarded the doorway of the king’s house. '
  '11':
  - type: text
    content: 'And whenever the king entered the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', the guard would go and bring them out; then they would take them back into the guardroom. '
  '12':
  - type: text
    content: 'When he humbled himself, the wrath of the '
  - type: heading
    content: Lord
  - type: text
    content: ' turned from him, so as not to destroy '
  - type: text
    content: him
  - type: text
    content: ' completely; and things also went well in Judah.'
  - type: heading
    content: The End of Rehoboam’s Reign
  '13':
  - type: text
    content: 'Thus King Rehoboam strengthened himself in Jerusalem and reigned. Now '
  - type: note
    content: 1 Kin. 14:21
  - type: text
    content: 'Rehoboam '
  - type: text
    content: was
  - type: text
    content: ' forty-one years old when he became king; and he reigned seventeen years in Jerusalem, '
  - type: note
    content: 2 Chr. 6:6
  - type: text
    content: 'the city which the '
  - type: heading
    content: Lord
  - type: text
    content: ' had chosen out of all the tribes of Israel, to put His name there. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Naamah, an '
  - type: note
    content: 1 Kin. 11:1, 5
  - type: text
    content: 'Ammonitess. '
  '14':
  - type: text
    content: 'And he did evil, because he did not prepare his heart to seek the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: 'The acts of Rehoboam, first and last, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of Shemaiah the prophet, '
  - type: note
    content: 2 Chr. 9:29; 13:22
  - type: text
    content: 'and of Iddo the seer concerning genealogies? '
  - type: note
    content: 1 Kin. 14:30
  - type: text
    content: 'And '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' wars between Rehoboam and Jeroboam all their days. '
  '16':
  - type: text
    content: 'So Rehoboam rested with his fathers, and was buried in the City of David. Then '
  - type: note
    content: 2 Chr. 11:20–22
  - type: text
    content: Abijah his son reigned in his place.
  '2':
  - type: note
    content: 1 Kin. 11:40; 14:25
  - type: text
    content: 'And it happened in the fifth year of King Rehoboam '
  - type: text
    content: that
  - type: text
    content: ' Shishak king of Egypt came up against Jerusalem, because they had transgressed against the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  '3':
  - type: text
    content: with twelve hundred chariots, sixty thousand horsemen, and people without number who came with him out of Egypt—
  - type: note
    content: 2 Chr. 16:8; Nah. 3:9
  - type: text
    content: 'the Lubim and the Sukkiim and the Ethiopians. '
  '4':
  - type: text
    content: And he took the fortified cities of Judah and came to Jerusalem.
  '5':
  - type: text
    content: 'Then '
  - type: note
    content: 2 Chr. 11:2
  - type: text
    content: 'Shemaiah the prophet came to Rehoboam and the leaders of Judah, who were gathered together in Jerusalem because of Shishak, and said to them, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘You have forsaken Me, and therefore I also have left you in the hand of Shishak.’ ”'
  '6':
  - type: text
    content: 'So the leaders of Israel and the king '
  - type: note
    content: (James 4:10)
  - type: text
    content: 'humbled themselves; and they said, '
  - type: note
    content: Ex. 9:27; (Dan. 9:14)
  - type: text
    content: '“The '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' righteous.”'
  '7':
  - type: text
    content: 'Now when the '
  - type: heading
    content: Lord
  - type: text
    content: ' saw that they humbled themselves, '
  - type: note
    content: 1 Kin. 21:28, 29
  - type: text
    content: 'the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to Shemaiah, saying, “They have humbled themselves; '
  - type: text
    content: therefore
  - type: text
    content: ' I will not destroy them, but I will grant them some deliverance. My wrath shall not be poured out on Jerusalem by the hand of Shishak. '
  '8':
  - type: text
    content: 'Nevertheless '
  - type: note
    content: Is. 26:13
  - type: text
    content: 'they will be his servants, that they may distinguish '
  - type: note
    content: (Deut. 28:47, 48)
  - type: text
    content: My service from the service of the kingdoms of the nations.”
  '9':
  - type: note
    content: 1 Kin. 14:25, 26
  - type: text
    content: 'So Shishak king of Egypt came up against Jerusalem, and took away the treasures of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and the treasures of the king’s house; he took everything. He also carried away the gold shields which Solomon had '
  - type: note
    content: 1 Kin. 10:16, 17; 2 Chr. 9:15, 16
  - type: text
    content: 'made. '
