document_id: 2CH.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Egypt Attacks Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 11:17
    marker-yv: yv-n
  - type: text
    text: 'it came to pass, when Rehoboam had established the kingdom and had strengthened himself, that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 14:22–24
    marker-yv: yv-n
  - type: text
    text: 'he forsook the law of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and all Israel along with him. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:40; 14:25
    marker-yv: yv-n
  - type: text
    text: 'And it happened in the fifth year of King Rehoboam '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' Shishak king of Egypt came up against Jerusalem, because they had transgressed against the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: with twelve hundred chariots, sixty thousand horsemen, and people without number who came with him out of Egypt—
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 16:8; Nah. 3:9
    marker-yv: yv-n
  - type: text
    text: 'the Lubim and the Sukkiim and the Ethiopians. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And he took the fortified cities of Judah and came to Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 11:2
    marker-yv: yv-n
  - type: text
    text: 'Shemaiah the prophet came to Rehoboam and the leaders of Judah, who were gathered together in Jerusalem because of Shishak, and said to them, “Thus says the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ': ‘You have forsaken Me, and therefore I also have left you in the hand of Shishak.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So the leaders of Israel and the king '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (James 4:10)
    marker-yv: yv-n
  - type: text
    text: 'humbled themselves; and they said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 9:27; (Dan. 9:14)
    marker-yv: yv-n
  - type: text
    text: '“The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' righteous.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now when the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' saw that they humbled themselves, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 21:28, 29
    marker-yv: yv-n
  - type: text
    text: 'the word of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to Shemaiah, saying, “They have humbled themselves; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: therefore
  - type: text
    text: ' I will not destroy them, but I will grant them some deliverance. My wrath shall not be poured out on Jerusalem by the hand of Shishak. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nevertheless '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 26:13
    marker-yv: yv-n
  - type: text
    text: 'they will be his servants, that they may distinguish '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 28:47, 48)
    marker-yv: yv-n
  - type: text
    text: My service from the service of the kingdoms of the nations.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 14:25, 26
    marker-yv: yv-n
  - type: text
    text: 'So Shishak king of Egypt came up against Jerusalem, and took away the treasures of the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and the treasures of the king’s house; he took everything. He also carried away the gold shields which Solomon had '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 10:16, 17; 2 Chr. 9:15, 16
    marker-yv: yv-n
  - type: text
    text: 'made. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then King Rehoboam made bronze shields in their place, and committed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 14:27
    marker-yv: yv-n
  - type: text
    text: 'to the hands of the captains of the guard, who guarded the doorway of the king’s house. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And whenever the king entered the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the guard would go and bring them out; then they would take them back into the guardroom. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When he humbled himself, the wrath of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' turned from him, so as not to destroy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' completely; and things also went well in Judah.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The End of Rehoboam’s Reign
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thus King Rehoboam strengthened himself in Jerusalem and reigned. Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 14:21
    marker-yv: yv-n
  - type: text
    text: 'Rehoboam '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' forty-one years old when he became king; and he reigned seventeen years in Jerusalem, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 6:6
    marker-yv: yv-n
  - type: text
    text: 'the city which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had chosen out of all the tribes of Israel, to put His name there. His mother’s name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Naamah, an '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:1, 5
    marker-yv: yv-n
  - type: text
    text: 'Ammonitess. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he did evil, because he did not prepare his heart to seek the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The acts of Rehoboam, first and last, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' they not written in the book of Shemaiah the prophet, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 9:29; 13:22
    marker-yv: yv-n
  - type: text
    text: 'and of Iddo the seer concerning genealogies? '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 14:30
    marker-yv: yv-n
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' wars between Rehoboam and Jeroboam all their days. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Rehoboam rested with his fathers, and was buried in the City of David. Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 11:20–22
    marker-yv: yv-n
  - type: text
    text: Abijah his son reigned in his place.
