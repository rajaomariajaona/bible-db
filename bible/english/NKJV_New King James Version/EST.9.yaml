document_id: EST.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Jews Destroy Their Tormentors
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 8:12
    marker-yv: yv-n
  - type: text
    text: 'in the twelfth month, that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is,
  - type: text
    text: ' the month of Adar, on the thirteenth day, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 3:13
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: time
  - type: text
    text: ' came for the king’s command and his decree to be executed. On the day that the enemies of the Jews had hoped to overpower them, the opposite occurred, in that the Jews themselves '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 22:41
    marker-yv: yv-n
  - type: text
    text: 'overpowered those who hated them. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The Jews '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 8:11; 9:15–18
    marker-yv: yv-n
  - type: text
    text: 'gathered together in their cities throughout all the provinces of King Ahasuerus to lay hands on those who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 71:13, 14
    marker-yv: yv-n
  - type: text
    text: 'sought their harm. And no one could withstand them, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 8:17
    marker-yv: yv-n
  - type: text
    text: 'because fear of them fell upon all people. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And all the officials of the provinces, the satraps, the governors, and all those doing the king’s work, helped the Jews, because the fear of Mordecai fell upon them. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For Mordecai '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' great in the king’s palace, and his fame spread throughout all the provinces; for this man Mordecai '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 3:1; 1 Chr. 11:9; (Prov. 4:18)
    marker-yv: yv-n
  - type: text
    text: 'became increasingly prominent. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Thus the Jews defeated all their enemies with the stroke of the sword, with slaughter and destruction, and did what they pleased with those who hated them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 1:2; 3:15; 4:16
    marker-yv: yv-n
  - type: text
    text: 'Shushan the citadel the Jews killed and destroyed five hundred men. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Also Parshandatha, Dalphon, Aspatha, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Poratha, Adalia, Aridatha, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Parmashta, Arisai, Aridai, and Vajezatha— '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 5:11; 9:7–10; Job 18:19; 27:13–15; Ps. 21:10
    marker-yv: yv-n
  - type: text
    text: 'the ten sons of Haman the son of Hammedatha, the enemy of the Jews—they killed; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 8:11
    marker-yv: yv-n
  - type: text
    text: but they did not lay a hand on the plunder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'On that day the number of those who were killed in Shushan the citadel was brought to the king. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the king said to Queen Esther, “The Jews have killed and destroyed five hundred men in Shushan the citadel, and the ten sons of Haman. What have they done in the rest of the king’s provinces? Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 5:6, 7:2
    marker-yv: yv-n
  - type: text
    text: 'what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' your petition? It shall be granted to you. Or what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' your further request? It shall be done.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Esther said, “If it pleases the king, let it be granted to the Jews who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' in Shushan to do again tomorrow '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 8:11, 9:15
    marker-yv: yv-n
  - type: text
    text: 'according to today’s decree, and let Haman’s ten sons '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 21:6, 9
    marker-yv: yv-n
  - type: text
    text: be hanged on the gallows.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So the king commanded this to be done; the decree was issued in Shushan, and they hanged Haman’s ten sons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the Jews who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in Shushan '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 8:11, 9:2
    marker-yv: yv-n
  - type: text
    text: 'gathered together again on the fourteenth day of the month of Adar and killed three hundred men at Shushan; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 9:10
    marker-yv: yv-n
  - type: text
    text: but they did not lay a hand on the plunder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The remainder of the Jews in the king’s provinces '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 9:2
    marker-yv: yv-n
  - type: text
    text: 'gathered together and protected their lives, had rest from their enemies, and killed seventy-five thousand of their enemies; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 8:11
    marker-yv: yv-n
  - type: text
    text: 'but they did not lay a hand on the plunder. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: it
    children:
    - type: text
      text: This
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' on the thirteenth day of the month of Adar. And on the fourteenth of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: month
  - type: text
    text: ' they rested and made it a day of feasting and gladness.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Feast of Purim
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But the Jews who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' at Shushan assembled together '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 9:11, 15
    marker-yv: yv-n
  - type: text
    text: 'on the thirteenth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day,
  - type: text
    text: ' as well as on the fourteenth; and on the fifteenth of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: month
  - type: text
    text: ' they rested, and made it a day of feasting and gladness. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Therefore the Jews of the villages who dwelt in the unwalled towns celebrated the fourteenth day of the month of Adar '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 16:11, 14
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' gladness and feasting, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 8:16, 17
    marker-yv: yv-n
  - type: text
    text: 'as a holiday, and for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 8:10, 12; Esth. 9:22
    marker-yv: yv-n
  - type: text
    text: sending presents to one another.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Mordecai wrote these things and sent letters to all the Jews, near and far, who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in all the provinces of King Ahasuerus, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'to establish among them that they should celebrate yearly the fourteenth and fifteenth days of the month of Adar, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'as the days on which the Jews had rest from their enemies, as the month which was turned from sorrow to joy for them, and from mourning to a holiday; that they should make them days of feasting and joy, of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 8:10; Esth. 9:19
    marker-yv: yv-n
  - type: text
    text: 'sending presents to one another and gifts to the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 15:7–11); Job 29:16
    marker-yv: yv-n
  - type: text
    text: 'poor. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So the Jews accepted the custom which they had begun, as Mordecai had written to them, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'because Haman, the son of Hammedatha the Agagite, the enemy of all the Jews, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 3:6, 7, 9:26
    marker-yv: yv-n
  - type: text
    text: 'had plotted against the Jews to annihilate them, and had cast Pur (that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is,
  - type: text
    text: ' the lot), to consume them and destroy them; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 7:4–10; 8:3; 9:13, 14
    marker-yv: yv-n
  - type: text
    text: 'when '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Esther
  - type: text
    text: ' came before the king, he commanded by letter that this wicked plot which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Haman
  - type: text
    text: ' had devised against the Jews should '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 7:10
    marker-yv: yv-n
  - type: text
    text: return on his own head, and that he and his sons should be hanged on the gallows.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'So they called these days Purim, after the name Pur. Therefore, because of all the words of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 9:20
    marker-yv: yv-n
  - type: text
    text: 'this letter, what they had seen concerning this matter, and what had happened to them, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'the Jews established and imposed it upon themselves and their descendants and all who would '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 8:17; (Is. 56:3, 6); Zech. 2:11
    marker-yv: yv-n
  - type: text
    text: 'join them, that without fail they should celebrate these two days every year, according to the written '
  - type: usfm
    marker: it
    children:
    - type: text
      text: instructions
  - type: text
    text: ' and according to the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: prescribed
  - type: text
    text: ' time, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' these days '
  - type: usfm
    marker: it
    children:
    - type: text
      text: should
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' remembered and kept throughout every generation, every family, every province, and every city, that these days of Purim should not fail '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: observed
  - type: text
    text: ' among the Jews, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' the memory of them should not perish among their descendants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Queen Esther, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 2:15
    marker-yv: yv-n
  - type: text
    text: 'the daughter of Abihail, with Mordecai the Jew, wrote with full authority to confirm this '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 8:10; 9, 21
    marker-yv: yv-n
  - type: text
    text: 'second letter about Purim. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Mordecai
  - type: text
    text: ' sent letters to all the Jews, to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 1:1
    marker-yv: yv-n
  - type: text
    text: 'the one hundred and twenty-seven provinces of the kingdom of Ahasuerus, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' words of peace and truth, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'to confirm these days of Purim at their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: appointed
  - type: text
    text: ' time, as Mordecai the Jew and Queen Esther had prescribed for them, and as they had decreed for themselves and their descendants concerning matters of their '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 4:3, 16
    marker-yv: yv-n
  - type: text
    text: 'fasting and lamenting. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: So the decree of Esther confirmed these matters of Purim, and it was written in the book.
