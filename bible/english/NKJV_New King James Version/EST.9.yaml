document_id: EST.9,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Jews Destroy Their Tormentors
  - type: text
    content: 'Now '
  - type: note
    content: Esth. 8:12
  - type: text
    content: 'in the twelfth month, that '
  - type: text
    content: is,
  - type: text
    content: ' the month of Adar, on the thirteenth day, '
  - type: note
    content: Esth. 3:13
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: time
  - type: text
    content: ' came for the king’s command and his decree to be executed. On the day that the enemies of the Jews had hoped to overpower them, the opposite occurred, in that the Jews themselves '
  - type: note
    content: 2 Sam. 22:41
  - type: text
    content: 'overpowered those who hated them. '
  '10':
  - type: note
    content: Esth. 5:11; 9:7–10; Job 18:19; 27:13–15; Ps. 21:10
  - type: text
    content: 'the ten sons of Haman the son of Hammedatha, the enemy of the Jews—they killed; '
  - type: note
    content: Esth. 8:11
  - type: text
    content: but they did not lay a hand on the plunder.
  '11':
  - type: text
    content: 'On that day the number of those who were killed in Shushan the citadel was brought to the king. '
  '12':
  - type: text
    content: 'And the king said to Queen Esther, “The Jews have killed and destroyed five hundred men in Shushan the citadel, and the ten sons of Haman. What have they done in the rest of the king’s provinces? Now '
  - type: note
    content: Esth. 5:6, 7:2
  - type: text
    content: 'what '
  - type: text
    content: is
  - type: text
    content: ' your petition? It shall be granted to you. Or what '
  - type: text
    content: is
  - type: text
    content: ' your further request? It shall be done.”'
  '13':
  - type: text
    content: 'Then Esther said, “If it pleases the king, let it be granted to the Jews who '
  - type: text
    content: are
  - type: text
    content: ' in Shushan to do again tomorrow '
  - type: note
    content: Esth. 8:11, 9:15
  - type: text
    content: 'according to today’s decree, and let Haman’s ten sons '
  - type: note
    content: 2 Sam. 21:6, 9
  - type: text
    content: be hanged on the gallows.”
  '14':
  - type: text
    content: So the king commanded this to be done; the decree was issued in Shushan, and they hanged Haman’s ten sons.
  '15':
  - type: text
    content: 'And the Jews who '
  - type: text
    content: were
  - type: text
    content: ' in Shushan '
  - type: note
    content: Esth. 8:11, 9:2
  - type: text
    content: 'gathered together again on the fourteenth day of the month of Adar and killed three hundred men at Shushan; '
  - type: note
    content: Esth. 9:10
  - type: text
    content: but they did not lay a hand on the plunder.
  '16':
  - type: text
    content: 'The remainder of the Jews in the king’s provinces '
  - type: note
    content: Esth. 9:2
  - type: text
    content: 'gathered together and protected their lives, had rest from their enemies, and killed seventy-five thousand of their enemies; '
  - type: note
    content: Esth. 8:11
  - type: text
    content: 'but they did not lay a hand on the plunder. '
  '17':
  - type: text
    content: This
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' on the thirteenth day of the month of Adar. And on the fourteenth of '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: month
  - type: text
    content: ' they rested and made it a day of feasting and gladness.'
  - type: heading
    content: The Feast of Purim
  '18':
  - type: text
    content: 'But the Jews who '
  - type: text
    content: were
  - type: text
    content: ' at Shushan assembled together '
  - type: note
    content: Esth. 9:11, 15
  - type: text
    content: 'on the thirteenth '
  - type: text
    content: day,
  - type: text
    content: ' as well as on the fourteenth; and on the fifteenth of '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: month
  - type: text
    content: ' they rested, and made it a day of feasting and gladness. '
  '19':
  - type: text
    content: 'Therefore the Jews of the villages who dwelt in the unwalled towns celebrated the fourteenth day of the month of Adar '
  - type: note
    content: Deut. 16:11, 14
  - type: text
    content: with
  - type: text
    content: ' gladness and feasting, '
  - type: note
    content: Esth. 8:16, 17
  - type: text
    content: 'as a holiday, and for '
  - type: note
    content: Neh. 8:10, 12; Esth. 9:22
  - type: text
    content: sending presents to one another.
  '2':
  - type: text
    content: 'The Jews '
  - type: note
    content: Esth. 8:11; 9:15–18
  - type: text
    content: 'gathered together in their cities throughout all the provinces of King Ahasuerus to lay hands on those who '
  - type: note
    content: Ps. 71:13, 14
  - type: text
    content: 'sought their harm. And no one could withstand them, '
  - type: note
    content: Esth. 8:17
  - type: text
    content: 'because fear of them fell upon all people. '
  '20':
  - type: text
    content: 'And Mordecai wrote these things and sent letters to all the Jews, near and far, who '
  - type: text
    content: were
  - type: text
    content: ' in all the provinces of King Ahasuerus, '
  '21':
  - type: text
    content: 'to establish among them that they should celebrate yearly the fourteenth and fifteenth days of the month of Adar, '
  '22':
  - type: text
    content: 'as the days on which the Jews had rest from their enemies, as the month which was turned from sorrow to joy for them, and from mourning to a holiday; that they should make them days of feasting and joy, of '
  - type: note
    content: Neh. 8:10; Esth. 9:19
  - type: text
    content: 'sending presents to one another and gifts to the '
  - type: note
    content: (Deut. 15:7–11); Job 29:16
  - type: text
    content: 'poor. '
  '23':
  - type: text
    content: 'So the Jews accepted the custom which they had begun, as Mordecai had written to them, '
  '24':
  - type: text
    content: 'because Haman, the son of Hammedatha the Agagite, the enemy of all the Jews, '
  - type: note
    content: Esth. 3:6, 7, 9:26
  - type: text
    content: 'had plotted against the Jews to annihilate them, and had cast Pur (that '
  - type: text
    content: is,
  - type: text
    content: ' the lot), to consume them and destroy them; '
  '25':
  - type: text
    content: 'but '
  - type: note
    content: Esth. 7:4–10; 8:3; 9:13, 14
  - type: text
    content: 'when '
  - type: text
    content: Esther
  - type: text
    content: ' came before the king, he commanded by letter that this wicked plot which '
  - type: text
    content: Haman
  - type: text
    content: ' had devised against the Jews should '
  - type: note
    content: Esth. 7:10
  - type: text
    content: return on his own head, and that he and his sons should be hanged on the gallows.
  '26':
  - type: text
    content: 'So they called these days Purim, after the name Pur. Therefore, because of all the words of '
  - type: note
    content: Esth. 9:20
  - type: text
    content: 'this letter, what they had seen concerning this matter, and what had happened to them, '
  '27':
  - type: text
    content: 'the Jews established and imposed it upon themselves and their descendants and all who would '
  - type: note
    content: Esth. 8:17; (Is. 56:3, 6); Zech. 2:11
  - type: text
    content: 'join them, that without fail they should celebrate these two days every year, according to the written '
  - type: text
    content: instructions
  - type: text
    content: ' and according to the '
  - type: text
    content: prescribed
  - type: text
    content: ' time, '
  '28':
  - type: text
    content: that
  - type: text
    content: ' these days '
  - type: text
    content: should
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' remembered and kept throughout every generation, every family, every province, and every city, that these days of Purim should not fail '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' '
  - type: text
    content: observed
  - type: text
    content: ' among the Jews, and '
  - type: text
    content: that
  - type: text
    content: ' the memory of them should not perish among their descendants.'
  '29':
  - type: text
    content: 'Then Queen Esther, '
  - type: note
    content: Esth. 2:15
  - type: text
    content: 'the daughter of Abihail, with Mordecai the Jew, wrote with full authority to confirm this '
  - type: note
    content: Esth. 8:10; 9, 21
  - type: text
    content: 'second letter about Purim. '
  '3':
  - type: text
    content: 'And all the officials of the provinces, the satraps, the governors, and all those doing the king’s work, helped the Jews, because the fear of Mordecai fell upon them. '
  '30':
  - type: text
    content: 'And '
  - type: text
    content: Mordecai
  - type: text
    content: ' sent letters to all the Jews, to '
  - type: note
    content: Esth. 1:1
  - type: text
    content: 'the one hundred and twenty-seven provinces of the kingdom of Ahasuerus, '
  - type: text
    content: with
  - type: text
    content: ' words of peace and truth, '
  '31':
  - type: text
    content: 'to confirm these days of Purim at their '
  - type: text
    content: appointed
  - type: text
    content: ' time, as Mordecai the Jew and Queen Esther had prescribed for them, and as they had decreed for themselves and their descendants concerning matters of their '
  - type: note
    content: Esth. 4:3, 16
  - type: text
    content: 'fasting and lamenting. '
  '32':
  - type: text
    content: So the decree of Esther confirmed these matters of Purim, and it was written in the book.
  '4':
  - type: text
    content: 'For Mordecai '
  - type: text
    content: was
  - type: text
    content: ' great in the king’s palace, and his fame spread throughout all the provinces; for this man Mordecai '
  - type: note
    content: 2 Sam. 3:1; 1 Chr. 11:9; (Prov. 4:18)
  - type: text
    content: 'became increasingly prominent. '
  '5':
  - type: text
    content: Thus the Jews defeated all their enemies with the stroke of the sword, with slaughter and destruction, and did what they pleased with those who hated them.
  '6':
  - type: text
    content: 'And in '
  - type: note
    content: Esth. 1:2; 3:15; 4:16
  - type: text
    content: 'Shushan the citadel the Jews killed and destroyed five hundred men. '
  '7':
  - type: text
    content: 'Also Parshandatha, Dalphon, Aspatha, '
  '8':
  - type: text
    content: 'Poratha, Adalia, Aridatha, '
  '9':
  - type: text
    content: 'Parmashta, Arisai, Aridai, and Vajezatha— '
