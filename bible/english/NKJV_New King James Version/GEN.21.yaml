document_id: GEN.21,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaac Is Born
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 2:21
  - type: text
    content: 'visited Sarah as He had said, and the '
  - type: heading
    content: Lord
  - type: text
    content: ' did for Sarah '
  - type: note
    content: Gen. 17:16, 19, 21; 18:10, 14; (Gal. 4:23, 28)
  - type: text
    content: 'as He had spoken. '
  '10':
  - type: text
    content: 'Therefore she said to Abraham, '
  - type: note
    content: Gen. 25:6; 36:6, 7; Gal. 3:18; 4:30
  - type: text
    content: '“Cast out this bondwoman and her son; for the son of this bondwoman shall not be heir with my son, '
  - type: text
    content: namely
  - type: text
    content: ' with Isaac.” '
  '11':
  - type: text
    content: 'And the matter was very displeasing in Abraham’s sight '
  - type: note
    content: Gen. 17:18
  - type: text
    content: because of his son.
  '12':
  - type: text
    content: 'But God said to Abraham, “Do not let it be displeasing in your sight because of the lad or because of your bondwoman. Whatever Sarah has said to you, listen to her voice; for '
  - type: note
    content: Matt. 1:2; Luke 3:34; (Rom. 9:7, 8); Heb. 11:18
  - type: text
    content: 'in Isaac your seed shall be called. '
  '13':
  - type: text
    content: 'Yet I will also make '
  - type: note
    content: Gen. 16:10; 17:20; 21:18; 25:12–18
  - type: text
    content: 'a nation of the son of the bondwoman, because he '
  - type: text
    content: is
  - type: text
    content: ' your seed.”'
  '14':
  - type: text
    content: 'So Abraham rose early in the morning, and took bread and a skin of water; and putting '
  - type: text
    content: it
  - type: text
    content: ' on her shoulder, he gave '
  - type: text
    content: it
  - type: text
    content: ' and the boy to Hagar, and '
  - type: note
    content: John 8:35
  - type: text
    content: 'sent her away. Then she departed and wandered in the Wilderness of Beersheba. '
  '15':
  - type: text
    content: 'And the water in the skin was used up, and she placed the boy under one of the shrubs. '
  '16':
  - type: text
    content: 'Then she went and sat down across from '
  - type: text
    content: him
  - type: text
    content: ' at a distance of about a bowshot; for she said to herself, “Let me not see the death of the boy.” So she sat opposite '
  - type: text
    content: him,
  - type: text
    content: ' and lifted her voice and wept.'
  '17':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 3:7; Deut. 26:7; Ps. 6:8
  - type: text
    content: 'God heard the voice of the lad. Then the '
  - type: note
    content: Gen. 22:11
  - type: text
    content: 'angel of God called to Hagar out of heaven, and said to her, “What ails you, Hagar? Fear not, for God has heard the voice of the lad where he '
  - type: text
    content: is.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Arise, lift up the lad and hold him with your hand, for '
  - type: note
    content: Gen. 16:10; 21:13; 25:12–16
  - type: text
    content: I will make him a great nation.”
  '19':
  - type: text
    content: 'Then '
  - type: note
    content: Gen. 3:7; Num. 22:31; 2 Kin. 6:17; Luke 24:31
  - type: text
    content: 'God opened her eyes, and she saw a well of water. And she went and filled the skin with water, and gave the lad a drink. '
  '2':
  - type: text
    content: 'For Sarah '
  - type: note
    content: Acts 7:8; Gal. 4:22; Heb. 11:11, 12
  - type: text
    content: 'conceived and bore Abraham a son in his old age, '
  - type: note
    content: Gen. 17:21; 18:10, 14; Gal. 4:4
  - type: text
    content: 'at the set time of which God had spoken to him. '
  '20':
  - type: text
    content: 'So God '
  - type: note
    content: Gen. 28:15; 39:2, 3, 21
  - type: text
    content: 'was with the lad; and he grew and dwelt in the wilderness, '
  - type: note
    content: Gen. 16:12
  - type: text
    content: 'and became an archer. '
  '21':
  - type: text
    content: 'He dwelt in the Wilderness of Paran; and his mother '
  - type: note
    content: Gen. 24:4
  - type: text
    content: took a wife for him from the land of Egypt.
  - type: heading
    content: A Covenant with Abimelech
  '22':
  - type: text
    content: 'And it came to pass at that time that '
  - type: note
    content: Gen. 20:2, 14; 26:26
  - type: text
    content: 'Abimelech and Phichol, the commander of his army, spoke to Abraham, saying, '
  - type: note
    content: Gen. 26:28; Is. 8:10
  - type: text
    content: '“God '
  - type: text
    content: is
  - type: text
    content: ' with you in all that you do. '
  '23':
  - type: text
    content: 'Now therefore, '
  - type: note
    content: Josh. 2:12; 1 Sam. 24:21
  - type: text
    content: swear to me by God that you will not deal falsely with me, with my offspring, or with my posterity; but that according to the kindness that I have done to you, you will do to me and to the land in which you have dwelt.”
  '24':
  - type: text
    content: And Abraham said, “I will swear.”
  '25':
  - type: text
    content: 'Then Abraham rebuked Abimelech because of a well of water which Abimelech’s servants '
  - type: note
    content: Gen. 26:15, 18, 20–22
  - type: text
    content: 'had seized. '
  '26':
  - type: text
    content: 'And Abimelech said, “I do not know who has done this thing; you did not tell me, nor had I heard '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' until today.” '
  '27':
  - type: text
    content: 'So Abraham took sheep and oxen and gave them to Abimelech, and the two of them '
  - type: note
    content: Gen. 26:31; 31:44; 1 Sam. 18:3
  - type: text
    content: 'made a covenant. '
  '28':
  - type: text
    content: And Abraham set seven ewe lambs of the flock by themselves.
  '29':
  - type: text
    content: 'Then Abimelech asked Abraham, '
  - type: note
    content: Gen. 33:8
  - type: text
    content: '“What '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: meaning
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' these seven ewe lambs which you have set by themselves?”'
  '3':
  - type: text
    content: And Abraham called the name of his son who was born to him—whom Sarah bore to him—
  - type: note
    content: Gen. 17:19, 21
  - type: text
    content: 'Isaac. '
  '30':
  - type: text
    content: 'And he said, “You will take '
  - type: text
    content: these
  - type: text
    content: ' seven ewe lambs from my hand, that '
  - type: note
    content: Gen. 31:48, 52
  - type: text
    content: 'they may be my witness that I have dug this well.” '
  '31':
  - type: text
    content: 'Therefore he '
  - type: note
    content: Gen. 21:14; 26:33
  - type: text
    content: called that place Beersheba, because the two of them swore an oath there.
  '32':
  - type: text
    content: 'Thus they made a covenant at Beersheba. So Abimelech rose with Phichol, the commander of his army, and they returned to the land of the Philistines. '
  '33':
  - type: text
    content: 'Then '
  - type: text
    content: Abraham
  - type: text
    content: ' planted a tamarisk tree in Beersheba, and '
  - type: note
    content: Gen. 4:26; 12:8; 13:4; 26:25
  - type: text
    content: 'there called on the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Gen. 35:11; Ex. 15:18; Deut. 32:40; 33:27; Ps. 90:2; 93:2; Is. 40:28; Jer. 10:10; Hab. 1:12; Heb. 13:8
  - type: text
    content: 'the Everlasting God. '
  '34':
  - type: text
    content: And Abraham stayed in the land of the Philistines many days.
  '4':
  - type: text
    content: 'Then Abraham '
  - type: note
    content: Acts 7:8
  - type: text
    content: 'circumcised his son Isaac when he was eight days old, '
  - type: note
    content: Gen. 17:10, 12; Lev. 12:3
  - type: text
    content: 'as God had commanded him. '
  '5':
  - type: text
    content: 'Now '
  - type: note
    content: Gen. 17:1, 17
  - type: text
    content: 'Abraham was one hundred years old when his son Isaac was born to him. '
  '6':
  - type: text
    content: 'And Sarah said, '
  - type: note
    content: Gen. 18:13; Ps. 126:2; Is. 54:1
  - type: text
    content: '“God has made me laugh, '
  - type: text
    content: and
  - type: text
    content: ' all who hear '
  - type: note
    content: Luke 1:58
  - type: text
    content: 'will laugh with me.” '
  '7':
  - type: text
    content: 'She also said, “Who would have said to Abraham that Sarah would nurse children? '
  - type: note
    content: Gen. 18:11, 12
  - type: text
    content: 'For I have borne '
  - type: text
    content: him
  - type: text
    content: ' a son in his old age.”'
  - type: heading
    content: Hagar and Ishmael Depart
  '8':
  - type: text
    content: So the child grew and was weaned. And Abraham made a great feast on the same day that Isaac was weaned.
  '9':
  - type: text
    content: 'And Sarah saw the son of Hagar '
  - type: note
    content: Gen. 16:1, 4, 15
  - type: text
    content: 'the Egyptian, whom she had borne to Abraham, '
  - type: note
    content: (Gal. 4:29)
  - type: text
    content: 'scoffing. '
