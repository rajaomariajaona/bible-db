verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prayer for Relief from Tormentors
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. Set to “The Silent Dove in Distant Lands.” A Michtam of David when the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 21:11
      marker-yv: yv-n
    - type: text
      text: Philistines captured him in Gath.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 57:1
      marker-yv: yv-n
    - type: text
      text: merciful to me, O God, for man would swallow me up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fighting all day he oppresses me.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In God (I will praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' word),'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' (I will praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' word),'
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In God I have put my trust;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not be afraid.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What can man do to me?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: made
    - type: text
      text: ' to You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: binding
    - type: text
      text: ' upon me, O God;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will render praises to You,
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 116:8, 9
      marker-yv: yv-n
    - type: text
      text: For You have delivered my soul from death.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Have
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kept
    - type: text
      text: ' my feet from falling,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I may walk before God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 33:30
      marker-yv: yv-n
    - type: text
      text: light of the living?
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My enemies would '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 57:3
      marker-yv: yv-n
    - type: text
      text: 'hound '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' all day,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' many who fight against me, O Most High.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whenever I am afraid,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will trust in You.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In God (I will praise His word),
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In God I have put my trust;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 118:6; Is. 31:3; (Heb. 13:6)
      marker-yv: yv-n
    - type: text
      text: I will not fear.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What can flesh do to me?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All day they twist my words;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All their thoughts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' against me for evil.'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They gather together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They hide, they mark my steps,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When they lie in wait for my life.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall they escape by iniquity?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In anger cast down the peoples, O God!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You number my wanderings;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Put my tears into Your bottle;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Mal. 3:16)
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Are
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' not in Your book?'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When I cry out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then my enemies will turn back;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'This I know, because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 118:6; Rom. 8:31)
      marker-yv: yv-n
    - type: text
      text: 'God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' for me.'
