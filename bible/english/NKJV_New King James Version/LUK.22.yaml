verses:
  '1':
  - type: heading
    content: The Plot to Kill Jesus
  - type: text
    content: 'Now '
  - type: note
    content: Matt. 26:2–5; Mark 14:1, 2
  - type: text
    content: 'the Feast of Unleavened Bread drew near, which is called Passover. '
  '10':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “Behold, when you have entered the city, a man will meet you carrying a pitcher of water; follow him into the house which he enters.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Then you shall say to the master of the house, ‘The Teacher says to you, “Where is the guest room where I may eat the Passover with My disciples?” ’
  - type: text
    content: ' '
  '12':
  - type: text
    content: Then he will show you a large, furnished upper room; there make ready.”
  '13':
  - type: text
    content: 'So they went and '
  - type: note
    content: Luke 19:32
  - type: text
    content: found it just as He had said to them, and they prepared the Passover.
  - type: heading
    content: Jesus Institutes the Lord’s Supper
  '14':
  - type: note
    content: Matt. 26:20; Mark 14:17
  - type: text
    content: 'When the hour had come, He sat down, and the twelve apostles with Him. '
  '15':
  - type: text
    content: 'Then He said to them, '
  - type: text
    content: '“With '
  - type: text
    content: fervent
  - type: text
    content: ' desire I have desired to eat this Passover with you before I suffer;'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'for I say to you, I will no longer eat of it '
  - type: note
    content: Luke 14:15; (Acts 10:41; Rev. 19:9)
  - type: text
    content: until it is fulfilled in the kingdom of God.”
  '17':
  - type: text
    content: 'Then He took the cup, and gave thanks, and said, '
  - type: text
    content: '“Take this and divide '
  - type: text
    content: it
  - type: text
    content: ' among yourselves;'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'for '
  - type: note
    content: Matt. 26:29; Mark 14:25
  - type: text
    content: I say to you,
  - type: text
    content: ' '
  - type: text
    content: I will not drink of the fruit of the vine until the kingdom of God comes.”
  '19':
  - type: note
    content: Matt. 26:26; Mark 14:22
  - type: text
    content: 'And He took bread, gave thanks and broke '
  - type: text
    content: it,
  - type: text
    content: ' and gave '
  - type: text
    content: it
  - type: text
    content: ' to them, saying, '
  - type: text
    content: '“This is My '
