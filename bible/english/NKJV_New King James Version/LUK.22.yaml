    content: (1 Pet. 2:24)
  - type: text
    content: 'body which is given for you; '
  - type: note
    content: 1 Cor. 11:23–26
  - type: text
    content: do this in remembrance of Me.”
  '2':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 2:2; John 11:47; Acts 4:27
  - type: text
    content: the chief priests and the scribes sought how they might kill Him, for they feared the people.
  '20':
  - type: text
    content: 'Likewise He also '
  - type: text
    content: took
  - type: text
    content: ' the cup after supper, saying, '
  - type: note
    content: 1 Cor. 10:16
  - type: text
    content: '“This cup '
  - type: text
    content: is
  - type: text
    content: ' the new covenant in My blood, which is shed for you.'
  - type: text
    content: ' '
  '21':
  - type: note
    content: Ps. 41:9; Matt. 26:21, 23; Mark 14:18; Luke 22:48; John 13:21, 26, 27
  - type: text
    content: 'But behold, the hand of My betrayer '
  - type: text
    content: is
  - type: text
    content: ' with Me on the table.'
  - type: text
    content: ' '
  '22':
  - type: note
    content: Matt. 26:24
  - type: text
    content: 'And truly the Son of Man goes '
  - type: note
    content: John 17:12; Acts 2:23
  - type: text
    content: as it has been determined, but woe to that man by whom He is betrayed!”
  '23':
  - type: note
    content: Matt. 26:22; John 13:22, 25
  - type: text
    content: Then they began to question among themselves, which of them it was who would do this thing.
  - type: heading
    content: The Disciples Argue About Greatness
  '24':
  - type: note
    content: Mark 9:34; Luke 9:46–48
  - type: text
    content: 'Now there was also a dispute among them, as to which of them should be considered the greatest. '
  '25':
  - type: note
    content: (Matt. 20:25–28); Mark 10:42–45
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “The kings of the Gentiles exercise lordship over them, and those who exercise authority over them are called ‘benefactors.’
  - type: text
    content: ' '
  '26':
  - type: note
    content: Matt. 20:26; (1 Pet. 5:3)
  - type: text
    content: 'But not so '
  - type: text
    content: among
  - type: text
    content: ' you; on the contrary, '
  - type: note
    content: Luke 9:48
  - type: text
    content: he who is greatest among you, let him be as the younger, and he who governs as he who serves.
  - type: text
    content: ' '
  '27':
  - type: note
    content: (Luke 12:37)
  - type: text
    content: 'For who '
  - type: text
    content: is
  - type: text
    content: ' greater, he who sits at the table, or he who serves? '
  - type: text
    content: Is
  - type: text
    content: ' it not he who sits at the table? Yet '
  - type: note
    content: Matt. 20:28; John 13:13, 14; Phil. 2:7
  - type: text
    content: I am among you as the One who serves.
  '28':
  - type: text
    content: '“But you are those who have continued with Me in '
  - type: note
    content: (Heb. 2:18; 4:15)
  - type: text
    content: My trials.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 24:47
  - type: text
    content: 'I bestow upon you a kingdom, just as My Father bestowed '
  - type: text
    content: one
  - type: text
    content: ' upon Me,'
  - type: text
    content: ' '
  '3':
  - type: note
    content: Matt. 26:14–16; Mark 14:10, 11; John 13:2, 27
  - type: text
    content: 'Then Satan entered Judas, surnamed Iscariot, who was numbered among the '
  - type: note
    content: Matt. 10:2–4
  - type: text
    content: 'twelve. '
  '30':
  - type: text
    content: 'that '
  - type: note
    content: (Matt. 8:11; Rev. 19:9)
  - type: text
    content: 'you may eat and drink at My table in My kingdom, '
  - type: note
    content: Ps. 49:14; (Matt. 19:28; 1 Cor. 6:2; Rev. 3:21)
  - type: text
    content: and sit on thrones judging the twelve tribes of Israel.”
  - type: heading
    content: Jesus Predicts Peter’s Denial
  '31':
  - type: text
    content: 'And the Lord said, '
  - type: text
    content: '“Simon, Simon! Indeed, '
  - type: note
    content: 1 Pet. 5:8
  - type: text
    content: 'Satan has asked for you, that he may '
  - type: note
    content: Amos 9:9
  - type: text
    content: 'sift '
  - type: text
    content: you
  - type: text
    content: ' as wheat.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'But '
  - type: note
    content: (John 17:9, 11, 15)
  - type: text
    content: 'I have prayed for you, that your faith should not fail; and when you have returned to '
  - type: text
    content: Me,
  - type: text
    content: ' '
  - type: note
    content: John 21:15–17; Acts 1:15; 2:14; 2 Pet. 1:10–15
  - type: text
    content: strengthen your brethren.”
  '33':
  - type: text
    content: But he said to Him, “Lord, I am ready to go with You, both to prison and to death.”
  '34':
  - type: note
    content: Matt. 26:33–35; Mark 14:29–31; Luke 22:61; John 13:37, 38
  - type: text
    content: 'Then He said, '
  - type: text
    content: “I tell you, Peter, the rooster shall not crow this day before you will deny three times that you know Me.”
  - type: heading
    content: Supplies for the Road
  '35':
  - type: note
    content: Matt. 10:9; Mark 6:8; Luke 9:3; 10:4
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “When I sent you without money bag, knapsack, and sandals, did you lack anything?”
  - type: text
    content: So they said, “Nothing.”
  '36':
  - type: text
    content: 'Then He said to them, '
  - type: text
    content: '“But now, he who has a money bag, let him take '
  - type: text
    content: it,
  - type: text
    content: ' and likewise a knapsack; and he who has no sword, let him sell his garment and buy one.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'For I say to you that this which is written must still be '
  - type: text
    content: 'accomplished in Me: '
  - type: note
    content: Is. 53:12; Matt. 27:38; Mark 15:28; Luke 22:32
  - type: text
    content: ‘And He was numbered with the transgressors.’
  - type: text
    content: ' For the things concerning Me have an end.”'
  '38':
  - type: text
    content: 'So they said, “Lord, look, here '
  - type: text
    content: are
  - type: text
    content: ' two swords.”'
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “It is enough.”
  - type: heading
    content: The Prayer in the Garden
  '39':
  - type: note
    content: Matt. 26:36; John 18:1
  - type: text
    content: 'Coming out, '
  - type: note
    content: Luke 21:37
  - type: text
    content: 'He went to the Mount of Olives, as He was accustomed, and His disciples also followed Him. '
  '4':
  - type: text
    content: 'So he went his way and conferred with the chief priests and captains, how he might betray Him to them. '
  '40':
  - type: note
    content: Matt. 26:36–46; Mark 14:32–42
  - type: text
    content: 'When He came to the place, He said to them, '
  - type: text
    content: “Pray that you may not enter into temptation.”
  '41':
  - type: note
    content: Matt. 26:39; Mark 14:35; (Luke 18:11–14)
  - type: text
    content: 'And He was withdrawn from them about a stone’s throw, and He knelt down and prayed, '
  '42':
  - type: text
    content: 'saying, '
  - type: text
    content: '“Father, if it is Your will, take this cup away from Me; nevertheless '
  - type: note
    content: Is. 50:5; John 4:34; 5:30; 6:38; 8:29
  - type: text
    content: not My will, but Yours, be done.”
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Then '
  - type: note
    content: Matt. 4:11
  - type: text
    content: 'an angel appeared to Him from heaven, strengthening Him. '
  '44':
  - type: note
    content: John 12:27; (Heb. 5:7)
  - type: text
    content: And being in agony, He prayed more earnestly. Then His sweat became like great drops of blood falling down to the ground.
  '45':
  - type: text
    content: 'When He rose up from prayer, and had come to His disciples, He found them sleeping from sorrow. '
  '46':
  - type: text
    content: 'Then He said to them, '
  - type: text
    content: '“Why '
  - type: note
    content: Luke 9:32
  - type: text
    content: 'do you sleep? Rise and '
  - type: note
    content: 1 Chr. 16:11; Luke 22:40; (Eph. 6:18); 1 Thess. 5:17
  - type: text
    content: pray, lest you enter into temptation.”
  - type: heading
    content: Betrayal and Arrest in Gethsemane
  '47':
  - type: text
    content: 'And while He was still speaking, '
  - type: note
    content: Matt. 26:47–56; Mark 14:43–50; John 18:3–11
  - type: text
    content: 'behold, a multitude; and he who was called '
  - type: note
    content: Ps. 41:9; Matt. 20:18; Luke 9:44; 22:21; Acts 1:16, 17
  - type: text
    content: 'Judas, one of the twelve, went before them and drew near to Jesus to kiss Him. '
  '48':
  - type: text
    content: 'But Jesus said to him, '
  - type: text
    content: '“Judas, are you betraying the Son of Man with a '
  - type: note
    content: (Prov. 27:6)
  - type: text
    content: kiss?”
  '49':
  - type: text
    content: 'When those around Him saw what was going to happen, they said to Him, “Lord, shall we strike with the sword?” '
  '5':
  - type: text
    content: 'And they were glad, and '
  - type: note
    content: Zech. 11:12
  - type: text
    content: 'agreed to give him money. '
  '50':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 26:51
  - type: text
    content: one of them struck the servant of the high priest and cut off his right ear.
  '51':
  - type: text
    content: 'But Jesus answered and said, '
  - type: text
    content: “Permit even this.”
  - type: text
    content: ' And He touched his ear and healed him.'
  '52':
  - type: note
    content: Matt. 26:55
  - type: text
    content: 'Then Jesus said to the chief priests, captains of the temple, and the elders who had come to Him, '
  - type: text
    content: '“Have you come out, as against a '
  - type: note
    content: Luke 23:32
  - type: text
    content: robber, with swords and clubs?
  - type: text
    content: ' '
  '53':
  - type: text
    content: 'When I was with you daily in the '
  - type: note
    content: Luke 19:47, 48
  - type: text
    content: 'temple, you did not try to seize Me. But this is your '
  - type: note
    content: (John 12:27)
  - type: text
    content: hour, and the power of darkness.”
  - type: heading
    content: Peter Denies Jesus, and Weeps Bitterly
  '54':
  - type: note
    content: Is. 53:7, 8; Matt. 26:57; Mark 14:53; Luke 9:44; Acts 8:32
  - type: text
    content: 'Having arrested Him, they led '
  - type: text
    content: Him
  - type: text
    content: ' and brought Him into the high priest’s house. '
  - type: note
    content: Matt. 26:58; Mark 14:54; John 18:15
  - type: text
    content: 'But Peter followed at a distance. '
  '55':
  - type: note
    content: Matt. 26:69–75; Mark 14:66–72; John 18:15, 17, 18
  - type: text
    content: 'Now when they had kindled a fire in the midst of the courtyard and sat down together, Peter sat among them. '
  '56':
  - type: text
    content: And a certain servant girl, seeing him as he sat by the fire, looked intently at him and said, “This man was also with Him.”
  '57':
  - type: text
    content: But he denied Him, saying, “Woman, I do not know Him.”
  '58':
  - type: note
    content: Matt. 26:71; Mark 14:69; John 18:25
  - type: text
    content: And after a little while another saw him and said, “You also are of them.”
  - type: text
    content: But Peter said, “Man, I am not!”
  '59':
  - type: note
    content: Matt. 26:73; Mark 14:70; John 18:26
  - type: text
    content: 'Then after about an hour had passed, another confidently affirmed, saying, “Surely this '
  - type: text
    content: fellow
  - type: text
    content: ' also was with Him, for he is a '
  - type: note
    content: Acts 1:11; 2:7
  - type: text
    content: Galilean.”
  '6':
  - type: text
    content: 'So he promised and sought opportunity to '
  - type: note
    content: Ps. 41:9
  - type: text
    content: betray Him to them in the absence of the multitude.
  - type: heading
    content: Jesus and His Disciples Prepare the Passover
  '60':
  - type: text
    content: But Peter said, “Man, I do not know what you are saying!”
  - type: text
    content: 'Immediately, while he was still speaking, the rooster crowed. '
  '61':
  - type: text
    content: 'And the Lord turned and looked at Peter. Then '
  - type: note
    content: Matt. 26:75; Mark 14:72
  - type: text
    content: 'Peter remembered the word of the Lord, how He had said to him, '
  - type: note
    content: Matt. 26:34, 75; Mark 14:30; Luke 22:34; John 13:38
  - type: text
    content: '“Before the rooster '
  - type: text
    content: crows,
  - type: text
    content: ' you will deny Me three times.”'
  - type: text
    content: ' '
  '62':
  - type: text
    content: So Peter went out and wept bitterly.
  - type: heading
    content: Jesus Mocked and Beaten
  '63':
  - type: note
    content: Ps. 69:1, 4, 7–9; Matt. 26:67, 68; Mark 14:65; John 18:22
  - type: text
    content: 'Now the men who held Jesus mocked Him and '
  - type: note
    content: Job 16:10; Is. 50:6; Lam. 3:30
  - type: text
    content: 'beat Him. '
  '64':
  - type: text
    content: 'And having blindfolded Him, they '
  - type: note
    content: Zech. 13:7
  - type: text
    content: 'struck Him on the face and asked Him, saying, “Prophesy! Who is the one who struck You?” '
  '65':
  - type: text
    content: And many other things they blasphemously spoke against Him.
  - type: heading
    content: Jesus Faces the Sanhedrin
  '66':
  - type: note
    content: Matt. 27:1; Mark 15:1
  - type: text
    content: 'As soon as it was day, '
  - type: note
    content: Ps. 2:2; Acts 4:26
  - type: text
    content: 'the elders of the people, both chief priests and scribes, came together and led Him into their council, saying, '
  '67':
  - type: note
    content: Matt. 26:63–66; Mark 14:61–63; Luke 22:67–71; John 18:19–21
  - type: text
    content: “If You are the Christ, tell us.”
  - type: text
    content: 'But He said to them, '
  - type: text
    content: '“If I tell you, you will '
  - type: note
    content: Luke 20:5–7
  - type: text
    content: by no means believe.
  - type: text
    content: ' '
  '68':
  - type: text
    content: 'And if I '
  - type: text
    content: 'also ask '
  - type: text
    content: you,
  - type: text
    content: ' you will by no means answer '
  - type: text
    content: 'Me or let '
  - type: text
    content: Me
  - type: text
    content: ' go. '
  '69':
  - type: note
    content: (Ps. 110:1; Matt. 26:64; Mark 14:62; 16:19); Acts 2:33; 7:55; Eph. 1:20; Col. 3:1; Heb. 1:3; 8:1
  - type: text
    content: Hereafter the Son of Man will sit on the right hand of the power of God.”
  '7':
  - type: note
    content: Matt. 26:17–19; Mark 14:12–16
  - type: text
    content: 'Then came the Day of Unleavened Bread, when the Passover must be killed. '
  '70':
  - type: text
    content: Then they all said, “Are You then the Son of God?”
  - type: text
    content: 'So He said to them, '
  - type: note
    content: Matt. 26:64; 27:11; Mark 14:62; Luke 1:35
  - type: text
    content: '“You '
  - type: text
    content: rightly
  - type: text
    content: ' say that I am.”'
  '71':
  - type: note
    content: Matt. 26:65; Mark 14:63; John 19:7
  - type: text
    content: And they said, “What further testimony do we need? For we have heard it ourselves from His own mouth.”
  '8':
  - type: text
    content: 'And He sent Peter and John, saying, '
  - type: text
    content: “Go and prepare the Passover for us, that we may eat.”
  '9':
  - type: text
    content: So they said to Him, “Where do You want us to prepare?”
