  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: not
  - type: text
    text: ' be overwhelmed at the sight of him?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'No one '
