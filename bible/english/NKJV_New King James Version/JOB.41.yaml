  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: One is so near another
- type: usfm
  marker: q2
  children:
  - type: text
    text: That no air can come between them;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They are joined one to another,
- type: usfm
  marker: q2
  children:
  - type: text
    text: They stick together and cannot be parted.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: His sneezings flash forth light,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And his eyes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' like the eyelids of the morning.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Out of his mouth go burning lights;
- type: usfm
  marker: q2
  children:
