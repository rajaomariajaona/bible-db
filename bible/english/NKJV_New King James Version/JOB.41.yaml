  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Will he make many supplications to you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will he speak softly to you?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Will he make a covenant with you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will you take him as a servant forever?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Will you play with him as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' a bird,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or will you leash him for your maidens?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' companions make a banquet of him?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will they apportion him among the merchants?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Can you fill his skin with harpoons,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or his head with fishing spears?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lay your hand on him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Remember the battle—
- type: usfm
  marker: q2
  children:
  - type: text
    text: Never do it again!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Indeed, '
  - type: usfm
    marker: it
    children:
