  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so
  - type: text
    text: ' fierce that he would dare stir him up.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who then is able to stand against Me?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 11:35)
    marker-yv: yv-n
  - type: text
    text: 'Who has preceded Me, that I should pay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 19:5; (Deut. 10:14; Job 9:5–10; 26:6–14); Ps. 24:1; 50:12; 1 Cor. 10:26, 28
    marker-yv: yv-n
  - type: text
    text: Everything under heaven is Mine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “I will not conceal his limbs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: His mighty power, or his graceful proportions.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Who can remove his outer coat?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Who can approach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' with a double bridle?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Who can open the doors of his face,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: With
  - type: text
    text: ' his terrible teeth all around?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: it
    children:
    - type: text
      text: His
  - type: text
    text: ' rows of scales are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' pride,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Shut up tightly '
  - type: usfm
    marker: it
    children:
    - type: text
