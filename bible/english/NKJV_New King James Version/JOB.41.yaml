  - type: usfm
    marker: it
    children:
    - type: text
      text: from
  - type: text
    text: ' a boiling pot and burning rushes.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: His breath kindles coals,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a flame goes out of his mouth.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Strength dwells in his neck,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And sorrow dances before him.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The folds of his flesh are joined together;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are firm on him and cannot be moved.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: His heart is as hard as stone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Even as hard as the lower '
  - type: usfm
    marker: it
    children:
    - type: text
      text: millstone.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: When he raises himself up, the mighty are afraid;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because of his crashings they are beside themselves.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Though
  - type: text
    text: ' the sword reaches him, it cannot avail;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor does spear, dart, or javelin.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: He regards iron as straw,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: And
  - type: text
    text: ' bronze as rotten wood.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The arrow cannot make him flee;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Slingstones become like stubble to him.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Darts are regarded as straw;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He laughs at the threat of javelins.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'His undersides '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' like sharp potsherds;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He spreads pointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: marks
  - type: text
    text: ' in the mire.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: He makes the deep boil like a pot;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He makes the sea like a pot of ointment.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: He leaves a shining wake behind him;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: One
  - type: text
    text: ' would think the deep had white hair.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: On earth there is nothing like him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Which is made without fear.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'He beholds every high '
  - type: usfm
    marker: it
    children:
    - type: text
      text: thing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' king over all the children of pride.”'
