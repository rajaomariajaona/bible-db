  - type: text
    content: And on the harp I will praise You,
  - type: text
    content: O God, my God.
  '5':
  - type: note
    content: Ps. 42:5, 11
  - type: text
    content: Why are you cast down, O my soul?
  - type: text
    content: And why are you disquieted within me?
  - type: text
