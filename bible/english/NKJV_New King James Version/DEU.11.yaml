verses:
  '1':
  - type: heading
    content: Love and Obedience Rewarded
  - type: text
    content: '“Therefore you shall love the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, and keep His charge, His statutes, His judgments, and His commandments always. '
  '10':
  - type: text
    content: 'For the land which you go to possess '
  - type: text
    content: is
  - type: text
    content: ' not like the land of Egypt from which you have come, where you sowed your seed and watered '
  - type: text
    content: it
  - type: text
    content: ' by foot, as a vegetable garden; '
  '11':
  - type: note
    content: Deut. 8:7
  - type: text
    content: 'but the land which you cross over to possess '
  - type: text
    content: is
  - type: text
    content: ' a land of hills and valleys, which drinks water from the rain of heaven, '
  '12':
  - type: text
    content: 'a land for which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God cares; '
  - type: note
    content: 1 Kin. 9:3
  - type: text
    content: 'the eyes of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: text
    content: are
  - type: text
    content: ' always on it, from the beginning of the year to the very end of the year.'
  '13':
  - type: text
    content: '‘And it shall be that if you earnestly obey My commandments which I command you today, to love the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God and serve Him with all your heart and with all your soul, '
  '14':
  - type: text
    content: 'then '
  - type: note
    content: Lev. 26:4; Deut. 28:12
  - type: text
    content: 'I will give '
  - type: text
    content: you
  - type: text
    content: ' the rain for your land in its season, '
  - type: note
    content: Joel 2:23; James 5:7
  - type: text
    content: 'the early rain and the latter rain, that you may gather in your grain, your new wine, and your oil. '
  '15':
  - type: note
    content: Ps. 104:14
  - type: text
    content: 'And I will send grass in your fields for your livestock, that you may '
  - type: note
    content: Deut. 6:11; Joel 2:19
  - type: text
    content: 'eat and be filled.’ '
  '16':
  - type: text
    content: '“Take heed to yourselves, '
  - type: note
    content: Deut. 29:18; Job 31:27
  - type: text
    content: 'lest your heart be deceived, and you turn aside and '
  - type: note
    content: Deut. 8:19
  - type: text
    content: 'serve other gods and worship them, '
  '17':
  - type: text
    content: 'lest '
  - type: note
    content: Deut. 6:15; 9:19
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: '’s anger be aroused against you, and He '
  - type: note
    content: Deut. 28:24; 1 Kin. 8:35; 2 Chr. 6:26; 7:13
  - type: text
    content: 'shut up the heavens so that there be no rain, and the land yield no produce, and '
  - type: note
    content: Deut. 4:26; 2 Chr. 36:14–20
  - type: text
    content: 'you perish quickly from the good land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' is giving you.'
  '18':
  - type: text
    content: '“Therefore '
  - type: note
    content: Deut. 6:6–9
  - type: text
    content: 'you shall lay up these words of mine in your heart and in your '
  - type: note
    content: Ps. 119:2, 34
  - type: text
    content: 'soul, and '
  - type: note
    content: Deut. 6:8
  - type: text
    content: 'bind them as a sign on your hand, and they shall be as frontlets between your eyes. '
  '19':
  - type: note
    content: Deut. 4:9, 10; 6:7; Prov. 22:6
  - type: text
    content: 'You shall teach them to your children, speaking of them when you sit in your house, when you walk by the way, when you lie down, and when you rise up. '
  '2':
  - type: text
    content: 'Know today that '
  - type: text
    content: I
  - type: text
    content: ' '
  - type: text
    content: do
  - type: text
    content: ' not '
  - type: text
    content: speak
  - type: text
    content: ' with your children, who have not known and who have not seen the chastening of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, His greatness and His mighty hand and His outstretched arm— '
  '20':
  - type: note
    content: Deut. 6:9
  - type: text
    content: 'And you shall write them on the doorposts of your house and on your gates, '
  '21':
  - type: text
    content: 'that '
  - type: note
    content: Deut. 4:40
  - type: text
    content: 'your days and the days of your children may be multiplied in the land of which the '
  - type: heading
    content: Lord
  - type: text
    content: ' swore to your fathers to give them, like '
  - type: note
    content: Ps. 72:5; 89:29; Prov. 3:2; 4:10; 9:11
  - type: text
    content: the days of the heavens above the earth.
  '22':
  - type: text
    content: '“For if '
  - type: note
    content: Deut. 11:1
  - type: text
    content: 'you carefully keep all these commandments which I command you to do—to love the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, to walk in all His ways, and '
  - type: note
    content: Deut. 10:20
  - type: text
    content: 'to hold fast to Him— '
  '23':
  - type: text
    content: 'then the '
  - type: heading
    content: Lord
  - type: text
    content: ' will '
  - type: note
    content: Deut. 4:38
  - type: text
    content: 'drive out all these nations from before you, and you will '
  - type: note
    content: Deut. 9:1
  - type: text
    content: 'dispossess greater and mightier nations than yourselves. '
  '24':
  - type: note
    content: Josh. 1:3; 14:9
  - type: text
    content: 'Every place on which the sole of your foot treads shall be yours: '
  - type: note
    content: Gen. 15:18; Ex. 23:31; Deut. 1:7, 8
  - type: text
    content: 'from the wilderness and Lebanon, from the river, the River Euphrates, even to the Western Sea, shall be your territory. '
  '25':
  - type: text
    content: 'No man shall be able to '
  - type: note
    content: Deut. 7:24
  - type: text
    content: 'stand against you; the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God will put the '
  - type: note
    content: Ex. 23:27; Deut. 2:25; Josh. 2:9–11
  - type: text
    content: dread of you and the fear of you upon all the land where you tread, just as He has said to you.
  '26':
  - type: note
    content: Deut. 30:1, 15, 19
  - type: text
    content: '“Behold, I set before you today a blessing and a curse: '
  '27':
  - type: note
    content: Deut. 28:1–14
  - type: text
    content: 'the blessing, if you obey the commandments of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God which I command you today; '
  '28':
  - type: text
    content: 'and the '
  - type: note
    content: Deut. 28:15–68
  - type: text
    content: 'curse, if you do not obey the commandments of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, but turn aside from the way which I command you today, to go after other gods which you have not known. '
  '29':
  - type: text
    content: 'Now it shall be, when the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has brought you into the land which you go to possess, that you shall put the '
  - type: note
    content: Deut. 27:12, 13; Josh. 8:33
  - type: text
    content: 'blessing on Mount Gerizim and the '
  - type: note
    content: Deut. 27:13–26
  - type: text
    content: 'curse on Mount Ebal. '
  '3':
  - type: text
    content: 'His signs and His acts which He did in the midst of Egypt, to Pharaoh king of Egypt, and to all his land; '
  '30':
  - type: text
    content: Are
  - type: text
    content: ' they not on the other side of the Jordan, toward the setting sun, in the land of the Canaanites who dwell in the plain opposite Gilgal, '
  - type: note
    content: Gen. 12:6
  - type: text
    content: 'beside the terebinth trees of Moreh? '
  '31':
  - type: text
    content: 'For you will cross over the Jordan and go in to possess the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God is giving you, and you will possess it and dwell in it. '
  '32':
  - type: text
    content: And you shall be careful to observe all the statutes and judgments which I set before you today.
  '4':
  - type: text
    content: 'what He did to the army of Egypt, to their horses and their chariots: '
  - type: note
    content: Ex. 14:28; Ps. 106:11
  - type: text
    content: 'how He made the waters of the Red Sea overflow them as they pursued you, and '
  - type: text
    content: how
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' has destroyed them to this day; '
  '5':
  - type: note
    content: Num. 16:1–35; Ps. 106:16–18
  - type: text
    content: 'what He did for you in the wilderness until you came to this place; '
  '6':
  - type: text
    content: 'and what He did to Dathan and Abiram the sons of Eliab, the son of Reuben: how the earth opened its mouth and swallowed them up, their households, their tents, and all the substance that '
  - type: text
    content: was
  - type: text
    content: ' in their possession, in the midst of all Israel— '
  '7':
  - type: text
    content: 'but your eyes have '
  - type: note
    content: Deut. 10:21; 29:2
  - type: text
    content: 'seen every great act of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He did.'
  '8':
  - type: text
    content: '“Therefore you shall keep every commandment which I command you today, that you may '
  - type: note
    content: Deut. 31:6, 7, 23; Josh. 1:6, 7
  - type: text
    content: 'be strong, and go in and possess the land which you cross over to possess, '
  '9':
  - type: text
    content: 'and '
  - type: note
    content: Deut. 4:40; 5:16, 33; 6:2; Prov. 10:27
  - type: text
    content: 'that you may prolong '
  - type: text
    content: your
  - type: text
    content: ' days in the land '
  - type: note
    content: Deut. 9:5
  - type: text
    content: 'which the '
  - type: heading
    content: Lord
  - type: text
    content: ' swore to give your fathers, to them and their descendants, '
  - type: note
    content: Ex. 3:8
  - type: text
    content: '‘a land flowing with milk and honey.’ '
