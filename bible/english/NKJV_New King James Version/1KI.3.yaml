  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then the other woman said, “No! But the living one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my son, and the dead one '
    - type: usfm
