    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then it happened, the third day after I had given birth, that this woman also gave birth. And we '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' together; no one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' with us in the house, except the two of us in the house. '
  '19':
