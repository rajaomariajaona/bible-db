    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the dead one’; and the other says, ‘No! But your son '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the dead one, and my son '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the living one.’ ” '
  '24':
