  - type: text
    content: ' until those days. '
  '20':
  - type: text
    content: 'So she arose in the middle of the night and took my son from my side, while your maidservant slept, and laid him in her bosom, and laid her dead child in my bosom. '
  '21':
  - type: text
    content: And when I rose in the morning to nurse my son, there he was, dead. But when I had examined him in the morning, indeed, he was not my son whom I had borne.”
  '22':
  - type: text
