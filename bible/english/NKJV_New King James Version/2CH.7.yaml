document_id: 2CH.7,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Dedicates the Temple
  - type: text
    content: 'When '
  - type: note
    content: 1 Kin. 8:54
  - type: text
    content: 'Solomon had finished praying, '
  - type: note
    content: Lev. 9:24; Judg. 6:21; 1 Kin. 18:38; 1 Chr. 21:26
  - type: text
    content: 'fire came down from heaven and consumed the burnt offering and the sacrifices; and '
  - type: note
    content: 1 Kin. 8:10, 11
  - type: text
    content: 'the glory of the '
  - type: heading
    content: Lord
  - type: text
    content: ' filled the temple. '
  '10':
  - type: note
    content: 1 Kin. 8:66
  - type: text
    content: 'On the twenty-third day of the seventh month he sent the people away to their tents, joyful and glad of heart for the good that the '
  - type: heading
    content: Lord
  - type: text
    content: ' had done for David, for Solomon, and for His people Israel. '
  '11':
  - type: text
    content: 'Thus '
  - type: note
    content: 1 Kin. 9:1
  - type: text
    content: 'Solomon finished the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and the king’s house; and Solomon successfully accomplished all that came into his heart to make in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and in his own house.'
  - type: heading
    content: God’s Second Appearance to Solomon
  '12':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 1 Kin. 3:5; 11:9
  - type: text
    content: 'appeared to Solomon by night, and said to him: “I have heard your prayer, '
  - type: note
    content: Deut. 12:5, 11
  - type: text
    content: 'and have chosen this '
  - type: note
    content: 2 Chr. 6:20
  - type: text
    content: 'place for Myself as a house of sacrifice. '
  '13':
  - type: note
    content: Deut. 28:23, 24; 1 Kin. 17:1; 2 Chr. 6:26–28
  - type: text
    content: 'When I shut up heaven and there is no rain, or command the locusts to devour the land, or send pestilence among My people, '
  '14':
  - type: text
    content: 'if My people who are '
  - type: note
    content: Deut. 28:10; (Is. 43:7)
  - type: text
    content: 'called by My name will '
  - type: note
    content: 2 Chr. 12:6, 7; (James 4:10)
  - type: text
    content: 'humble themselves, and pray and seek My face, and turn from their wicked ways, '
  - type: note
    content: 2 Chr. 6:27, 30
  - type: text
    content: 'then I will hear from heaven, and will forgive their sin and heal their land. '
  '15':
  - type: text
    content: 'Now '
  - type: note
    content: 2 Chr. 6:20, 40
  - type: text
    content: 'My eyes will be open and My ears attentive to prayer '
  - type: text
    content: made
  - type: text
    content: ' in this place. '
  '16':
  - type: text
    content: 'For now '
  - type: note
    content: 1 Kin. 9:3; 2 Chr. 6:6
  - type: text
    content: 'I have chosen and sanctified this house, that My name may be there forever; and My eyes and My heart will be there perpetually. '
  '17':
  - type: note
    content: 1 Kin. 9:4
  - type: text
    content: 'As for you, if you walk before Me as your father David walked, and do according to all that I have commanded you, and if you keep My statutes and My judgments, '
  '18':
  - type: text
    content: 'then I will establish the throne of your kingdom, as I covenanted with David your father, saying, '
  - type: note
    content: 2 Sam. 7:12–16; 1 Kin. 2:4; 2 Chr. 6:16
  - type: text
    content: '‘You shall not fail '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: have
  - type: text
    content: ' a man as ruler in Israel.’'
  '19':
  - type: note
    content: Lev. 26:14, 33; (Deut. 28:15, 36)
  - type: text
    content: '“But if you turn away and forsake My statutes and My commandments which I have set before you, and go and serve other gods, and worship them, '
  '2':
  - type: note
    content: 2 Chr. 5:14
  - type: text
    content: 'And the priests could not enter the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', because the glory of the '
  - type: heading
    content: Lord
  - type: text
    content: ' had filled the '
  - type: heading
    content: Lord
  - type: text
    content: '’s house. '
  '20':
  - type: note
    content: Deut. 28:63–68; 2 Kin. 25:1–7
  - type: text
    content: 'then I will uproot them from My land which I have given them; and this house which I have sanctified for My name I will cast out of My sight, and will make it a proverb and a '
  - type: note
    content: Ps. 44:14
  - type: text
    content: byword among all peoples.
  '21':
  - type: text
    content: '“And '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: for
  - type: text
    content: ' '
  - type: note
    content: 2 Kin. 25:9
  - type: text
    content: 'this house, which is exalted, everyone who passes by it will be '
  - type: note
    content: 2 Chr. 29:8
  - type: text
    content: 'astonished and say, '
  - type: note
    content: (Deut. 29:24, 25; Jer. 22:8, 9)
  - type: text
    content: '‘Why has the '
  - type: heading
    content: Lord
  - type: text
    content: ' done thus to this land and this house?’ '
  '22':
  - type: text
    content: 'Then they will answer, ‘Because they forsook the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of their fathers, who brought them out of the land of Egypt, and embraced other gods, and worshiped them and served them; therefore He has brought all this calamity on them.’ ”'
  '3':
  - type: text
    content: 'When all the children of Israel saw how the fire came down, and the glory of the '
  - type: heading
    content: Lord
  - type: text
    content: ' on the temple, they bowed their faces to the ground on the pavement, and worshiped and praised the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: text
    content: 'saying:'
  - type: note
    content: 2 Chr. 5:13; Ps. 106:1; 136:1
  - type: text
    content: '“For '
  - type: text
    content: He
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' good,'
  - type: note
    content: 1 Chr. 16:41; 2 Chr. 20:21
  - type: text
    content: 'For His mercy '
  - type: text
    content: endures
  - type: text
    content: ' forever.”'
  '4':
  - type: note
    content: 1 Kin. 8:62, 63
  - type: text
    content: 'Then the king and all the people offered sacrifices before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'King Solomon offered a sacrifice of twenty-two thousand bulls and one hundred and twenty thousand sheep. So the king and all the people dedicated the house of God. '
  '6':
  - type: note
    content: 1 Chr. 15:16
  - type: text
    content: 'And the priests attended to their services; the Levites also with instruments of the music of the '
  - type: heading
    content: Lord
  - type: text
    content: ', which King David had made to praise the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying, “For His mercy '
  - type: text
    content: endures
  - type: text
    content: ' forever,” whenever David offered praise by their ministry. '
  - type: note
    content: 2 Chr. 5:12
  - type: text
    content: The priests sounded trumpets opposite them, while all Israel stood.
  '7':
  - type: text
    content: 'Furthermore '
  - type: note
    content: 1 Kin. 8:64–66; 9:3
  - type: text
    content: 'Solomon consecrated the middle of the court that '
  - type: text
    content: was
  - type: text
    content: ' in front of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ; for there he offered burnt offerings and the fat of the peace offerings, because the bronze altar which Solomon had made was not able to receive the burnt offerings, the grain offerings, and the fat.
  '8':
  - type: note
    content: 1 Kin. 8:65
  - type: text
    content: 'At that time Solomon kept the feast seven days, and all Israel with him, a very great assembly '
  - type: note
    content: 1 Kin. 4:21, 24; 2 Kin. 14:25
  - type: text
    content: 'from the entrance of Hamath to '
  - type: note
    content: Josh. 13:3
  - type: text
    content: 'the Brook of Egypt. '
  '9':
  - type: text
    content: 'And on the eighth day they held a '
  - type: note
    content: Lev. 23:36
  - type: text
    content: 'sacred assembly, for they observed the dedication of the altar seven days, and the feast seven days. '
