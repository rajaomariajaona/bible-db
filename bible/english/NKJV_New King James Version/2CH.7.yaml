document_id: 2CH.7,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon Dedicates the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:54
      marker-yv: yv-n
    - type: text
      text: 'Solomon had finished praying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 9:24; Judg. 6:21; 1 Kin. 18:38; 1 Chr. 21:26
      marker-yv: yv-n
    - type: text
      text: 'fire came down from heaven and consumed the burnt offering and the sacrifices; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:10, 11
      marker-yv: yv-n
    - type: text
      text: 'the glory of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' filled the temple. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:66
      marker-yv: yv-n
    - type: text
      text: 'On the twenty-third day of the seventh month he sent the people away to their tents, joyful and glad of heart for the good that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had done for David, for Solomon, and for His people Israel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Thus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 9:1
      marker-yv: yv-n
    - type: text
      text: 'Solomon finished the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the king’s house; and Solomon successfully accomplished all that came into his heart to make in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and in his own house.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Second Appearance to Solomon
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 3:5; 11:9
      marker-yv: yv-n
    - type: text
      text: 'appeared to Solomon by night, and said to him: “I have heard your prayer, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:5, 11
      marker-yv: yv-n
    - type: text
      text: 'and have chosen this '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 6:20
      marker-yv: yv-n
    - type: text
      text: 'place for Myself as a house of sacrifice. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:23, 24; 1 Kin. 17:1; 2 Chr. 6:26–28
      marker-yv: yv-n
    - type: text
      text: 'When I shut up heaven and there is no rain, or command the locusts to devour the land, or send pestilence among My people, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'if My people who are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:10; (Is. 43:7)
      marker-yv: yv-n
    - type: text
      text: 'called by My name will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 12:6, 7; (James 4:10)
      marker-yv: yv-n
    - type: text
      text: 'humble themselves, and pray and seek My face, and turn from their wicked ways, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 6:27, 30
      marker-yv: yv-n
    - type: text
      text: 'then I will hear from heaven, and will forgive their sin and heal their land. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 6:20, 40
      marker-yv: yv-n
    - type: text
      text: 'My eyes will be open and My ears attentive to prayer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: made
    - type: text
      text: ' in this place. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 9:3; 2 Chr. 6:6
      marker-yv: yv-n
    - type: text
      text: 'I have chosen and sanctified this house, that My name may be there forever; and My eyes and My heart will be there perpetually. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 9:4
      marker-yv: yv-n
    - type: text
      text: 'As for you, if you walk before Me as your father David walked, and do according to all that I have commanded you, and if you keep My statutes and My judgments, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'then I will establish the throne of your kingdom, as I covenanted with David your father, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:12–16; 1 Kin. 2:4; 2 Chr. 6:16
      marker-yv: yv-n
    - type: text
      text: '‘You shall not fail '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' a man as ruler in Israel.’'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:14, 33; (Deut. 28:15, 36)
      marker-yv: yv-n
    - type: text
      text: '“But if you turn away and forsake My statutes and My commandments which I have set before you, and go and serve other gods, and worship them, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 5:14
      marker-yv: yv-n
    - type: text
      text: 'And the priests could not enter the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', because the glory of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had filled the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s house. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:63–68; 2 Kin. 25:1–7
      marker-yv: yv-n
    - type: text
      text: 'then I will uproot them from My land which I have given them; and this house which I have sanctified for My name I will cast out of My sight, and will make it a proverb and a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 44:14
      marker-yv: yv-n
    - type: text
      text: byword among all peoples.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:9
      marker-yv: yv-n
    - type: text
      text: 'this house, which is exalted, everyone who passes by it will be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 29:8
      marker-yv: yv-n
    - type: text
      text: 'astonished and say, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 29:24, 25; Jer. 22:8, 9)
      marker-yv: yv-n
    - type: text
      text: '‘Why has the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' done thus to this land and this house?’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then they will answer, ‘Because they forsook the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of their fathers, who brought them out of the land of Egypt, and embraced other gods, and worshiped them and served them; therefore He has brought all this calamity on them.’ ”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When all the children of Israel saw how the fire came down, and the glory of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on the temple, they bowed their faces to the ground on the pavement, and worshiped and praised the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'saying:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 5:13; Ps. 106:1; 136:1
      marker-yv: yv-n
    - type: text
      text: '“For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 16:41; 2 Chr. 20:21
      marker-yv: yv-n
    - type: text
      text: 'For His mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: endures
    - type: text
      text: ' forever.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:62, 63
      marker-yv: yv-n
    - type: text
      text: 'Then the king and all the people offered sacrifices before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'King Solomon offered a sacrifice of twenty-two thousand bulls and one hundred and twenty thousand sheep. So the king and all the people dedicated the house of God. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 15:16
      marker-yv: yv-n
    - type: text
      text: 'And the priests attended to their services; the Levites also with instruments of the music of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', which King David had made to praise the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, “For His mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: endures
    - type: text
      text: ' forever,” whenever David offered praise by their ministry. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 5:12
      marker-yv: yv-n
    - type: text
      text: The priests sounded trumpets opposite them, while all Israel stood.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Furthermore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:64–66; 9:3
      marker-yv: yv-n
    - type: text
      text: 'Solomon consecrated the middle of the court that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in front of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ; for there he offered burnt offerings and the fat of the peace offerings, because the bronze altar which Solomon had made was not able to receive the burnt offerings, the grain offerings, and the fat.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:65
      marker-yv: yv-n
    - type: text
      text: 'At that time Solomon kept the feast seven days, and all Israel with him, a very great assembly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 4:21, 24; 2 Kin. 14:25
      marker-yv: yv-n
    - type: text
      text: 'from the entrance of Hamath to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 13:3
      marker-yv: yv-n
    - type: text
      text: 'the Brook of Egypt. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And on the eighth day they held a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 23:36
      marker-yv: yv-n
    - type: text
      text: 'sacred assembly, for they observed the dedication of the altar seven days, and the feast seven days. '
