document_id: MAT.14,114
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptist Beheaded
  - type: text
    content: 'At that time '
  - type: note
    content: Mark 6:14–29; Luke 9:7–9
  - type: text
    content: 'Herod the tetrarch heard the report about Jesus '
  '10':
  - type: text
    content: 'So he sent and had John beheaded in prison. '
  '11':
  - type: text
    content: 'And his head was brought on a platter and given to the girl, and she brought '
  - type: text
    content: it
  - type: text
    content: ' to her mother. '
  '12':
  - type: text
    content: Then his disciples came and took away the body and buried it, and went and told Jesus.
  - type: heading
    content: Feeding the Five Thousand
  '13':
  - type: note
    content: Matt. 10:23; 12:15; Mark 6:32–44; Luke 9:10–17; John 6:1, 2
  - type: text
    content: 'When Jesus heard '
  - type: text
    content: it,
  - type: text
    content: ' He departed from there by boat to a deserted place by Himself. But when the multitudes heard it, they followed Him on foot from the cities. '
  '14':
  - type: text
    content: 'And when Jesus went out He saw a great multitude; and He '
  - type: note
    content: Matt. 9:36; Mark 6:34
  - type: text
    content: 'was moved with compassion for them, and healed their sick. '
  '15':
  - type: note
    content: Mark 6:35; Luke 9:12
  - type: text
    content: When it was evening, His disciples came to Him, saying, “This is a deserted place, and the hour is already late. Send the multitudes away, that they may go into the villages and buy themselves food.”
  '16':
  - type: text
    content: 'But Jesus said to them, '
  - type: text
    content: “They do not need to go away. You give them something to eat.”
  '17':
  - type: text
    content: And they said to Him, “We have here only five loaves and two fish.”
  '18':
  - type: text
    content: 'He said, '
  - type: text
    content: “Bring them here to Me.”
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Then He commanded the multitudes to sit down on the grass. And He took the five loaves and the two fish, and looking up to heaven, '
  - type: note
    content: 1 Sam. 9:13; Matt. 15:36; 26:26; Mark 6:41; 8:7; 14:22; Luke 24:30; Acts 27:35; (Rom. 14:6)
  - type: text
    content: 'He blessed and broke and gave the loaves to the disciples; and the disciples gave to the multitudes. '
  '2':
  - type: text
    content: 'and said to his servants, “This is John the Baptist; he is risen from the dead, and therefore these powers are at work in him.” '
  '20':
  - type: text
    content: 'So they all ate and were filled, and they took up twelve baskets full of the fragments that remained. '
  '21':
  - type: text
    content: Now those who had eaten were about five thousand men, besides women and children.
  - type: heading
    content: Jesus Walks on the Sea
  '22':
  - type: text
    content: 'Immediately Jesus made His disciples get into the boat and go before Him to the other side, while He sent the multitudes away. '
  '23':
  - type: note
    content: Mark 6:46; Luke 9:28; John 6:15
  - type: text
    content: 'And when He had sent the multitudes away, He went up on the mountain by Himself to pray. '
  - type: note
    content: John 6:16
  - type: text
    content: 'Now when evening came, He was alone there. '
  '24':
  - type: text
    content: But the boat was now in the middle of the sea, tossed by the waves, for the wind was contrary.
  '25':
  - type: text
    content: 'Now in the fourth watch of the night Jesus went to them, walking on the sea. '
  '26':
  - type: text
    content: 'And when the disciples saw Him '
  - type: note
    content: Job 9:8
  - type: text
    content: walking on the sea, they were troubled, saying, “It is a ghost!” And they cried out for fear.
  '27':
  - type: text
    content: 'But immediately Jesus spoke to them, saying, '
  - type: text
    content: '“Be of good '
  - type: note
    content: Acts 23:11; 27:22, 25, 36
  - type: text
    content: 'cheer! '
  - type: text
    content: It is I; do not be afraid.”
  '28':
  - type: text
    content: And Peter answered Him and said, “Lord, if it is You, command me to come to You on the water.”
  '29':
  - type: text
    content: 'So He said, '
  - type: text
    content: “Come.”
  - type: text
    content: ' And when Peter had come down out of the boat, he walked on the water to go to Jesus. '
  '3':
  - type: note
    content: Matt. 4:12; Mark 6:17; Luke 3:19, 20
  - type: text
    content: 'For Herod had laid hold of John and bound him, and put '
  - type: text
    content: him
  - type: text
    content: ' in prison for the sake of Herodias, his brother Philip’s wife. '
  '30':
  - type: text
    content: 'But when he saw that the wind '
  - type: text
    content: was
  - type: text
    content: ' boisterous, he was afraid; and beginning to sink he cried out, saying, “Lord, save me!”'
  '31':
  - type: text
    content: 'And immediately Jesus stretched out '
  - type: text
    content: His
  - type: text
    content: ' hand and caught him, and said to him, '
  - type: text
    content: '“O you of '
  - type: note
    content: Matt. 6:30; 8:26
  - type: text
    content: little faith, why did you doubt?”
  - type: text
    content: ' '
  '32':
  - type: text
    content: And when they got into the boat, the wind ceased.
  '33':
  - type: text
    content: 'Then those who were in the boat came and worshiped Him, saying, “Truly '
  - type: note
    content: Ps. 2:7; Matt. 16:16; 26:63; Mark 1:1; Luke 4:41; John 1:49; 6:69; 11:27; Acts 8:37; Rom. 1:4
  - type: text
    content: You are the Son of God.”
  - type: heading
    content: Many Touch Him and Are Made Well
  '34':
  - type: note
    content: Mark 6:53; Luke 5:1
  - type: text
    content: 'When they had crossed over, they came to the land of Gennesaret. '
  '35':
  - type: text
    content: 'And when the men of that place recognized Him, they sent out into all that surrounding region, brought to Him all who were sick, '
  '36':
  - type: text
    content: 'and begged Him that they might only '
  - type: note
    content: (Mark 5:24–34)
  - type: text
    content: 'touch the hem of His garment. And '
  - type: note
    content: Matt. 9:20; Mark 3:10; (Luke 6:19); Acts 19:12
  - type: text
    content: 'as many as touched '
  - type: text
    content: it
  - type: text
    content: ' were made perfectly well.'
  '4':
  - type: text
    content: 'Because John had said to him, '
  - type: note
    content: Lev. 18:16; 20:21
  - type: text
    content: '“It is not lawful for you to have her.” '
  '5':
  - type: text
    content: 'And although he wanted to put him to death, he feared the multitude, '
  - type: note
    content: Matt. 21:26; Luke 20:6
  - type: text
    content: because they counted him as a prophet.
  '6':
  - type: text
    content: 'But when Herod’s birthday was celebrated, the daughter of Herodias danced before them and pleased Herod. '
  '7':
  - type: text
    content: Therefore he promised with an oath to give her whatever she might ask.
  '8':
  - type: text
    content: So she, having been prompted by her mother, said, “Give me John the Baptist’s head here on a platter.”
  '9':
  - type: text
    content: 'And the king was sorry; nevertheless, because of the oaths and because of those who sat with him, he commanded '
  - type: text
    content: it
  - type: text
    content: ' to be given to '
  - type: text
    content: her.
  - type: text
    content: ' '
