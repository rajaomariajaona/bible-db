document_id: MAT.14,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: John the Baptist Beheaded
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 6:14–29; Luke 9:7–9
      marker-yv: yv-n
    - type: text
      text: 'Herod the tetrarch heard the report about Jesus '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he sent and had John beheaded in prison. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his head was brought on a platter and given to the girl, and she brought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' to her mother. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then his disciples came and took away the body and buried it, and went and told Jesus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Feeding the Five Thousand
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:23; 12:15; Mark 6:32–44; Luke 9:10–17; John 6:1, 2
      marker-yv: yv-n
    - type: text
      text: 'When Jesus heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' He departed from there by boat to a deserted place by Himself. But when the multitudes heard it, they followed Him on foot from the cities. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Jesus went out He saw a great multitude; and He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 9:36; Mark 6:34
      marker-yv: yv-n
    - type: text
      text: 'was moved with compassion for them, and healed their sick. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 6:35; Luke 9:12
      marker-yv: yv-n
    - type: text
      text: When it was evening, His disciples came to Him, saying, “This is a deserted place, and the hour is already late. Send the multitudes away, that they may go into the villages and buy themselves food.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “They do not need to go away. You give them something to eat.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they said to Him, “We have here only five loaves and two fish.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Bring them here to Me.”
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He commanded the multitudes to sit down on the grass. And He took the five loaves and the two fish, and looking up to heaven, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 9:13; Matt. 15:36; 26:26; Mark 6:41; 8:7; 14:22; Luke 24:30; Acts 27:35; (Rom. 14:6)
      marker-yv: yv-n
    - type: text
      text: 'He blessed and broke and gave the loaves to the disciples; and the disciples gave to the multitudes. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said to his servants, “This is John the Baptist; he is risen from the dead, and therefore these powers are at work in him.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they all ate and were filled, and they took up twelve baskets full of the fragments that remained. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now those who had eaten were about five thousand men, besides women and children.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Walks on the Sea
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immediately Jesus made His disciples get into the boat and go before Him to the other side, while He sent the multitudes away. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 6:46; Luke 9:28; John 6:15
      marker-yv: yv-n
    - type: text
      text: 'And when He had sent the multitudes away, He went up on the mountain by Himself to pray. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 6:16
      marker-yv: yv-n
    - type: text
      text: 'Now when evening came, He was alone there. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the boat was now in the middle of the sea, tossed by the waves, for the wind was contrary.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now in the fourth watch of the night Jesus went to them, walking on the sea. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the disciples saw Him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:8
      marker-yv: yv-n
    - type: text
      text: walking on the sea, they were troubled, saying, “It is a ghost!” And they cried out for fear.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But immediately Jesus spoke to them, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Be of good '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 23:11; 27:22, 25, 36
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'cheer! '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It is I; do not be afraid.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Peter answered Him and said, “Lord, if it is You, command me to come to You on the water.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come.”
    - type: text
      text: ' And when Peter had come down out of the boat, he walked on the water to go to Jesus. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 4:12; Mark 6:17; Luke 3:19, 20
      marker-yv: yv-n
    - type: text
      text: 'For Herod had laid hold of John and bound him, and put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' in prison for the sake of Herodias, his brother Philip’s wife. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when he saw that the wind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' boisterous, he was afraid; and beginning to sink he cried out, saying, “Lord, save me!”'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And immediately Jesus stretched out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' hand and caught him, and said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“O you of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 6:30; 8:26
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: little faith, why did you doubt?”
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when they got into the boat, the wind ceased.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then those who were in the boat came and worshiped Him, saying, “Truly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 2:7; Matt. 16:16; 26:63; Mark 1:1; Luke 4:41; John 1:49; 6:69; 11:27; Acts 8:37; Rom. 1:4
      marker-yv: yv-n
    - type: text
      text: You are the Son of God.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Many Touch Him and Are Made Well
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 6:53; Luke 5:1
      marker-yv: yv-n
    - type: text
      text: 'When they had crossed over, they came to the land of Gennesaret. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the men of that place recognized Him, they sent out into all that surrounding region, brought to Him all who were sick, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and begged Him that they might only '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Mark 5:24–34)
      marker-yv: yv-n
    - type: text
      text: 'touch the hem of His garment. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 9:20; Mark 3:10; (Luke 6:19); Acts 19:12
      marker-yv: yv-n
    - type: text
      text: 'as many as touched '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' were made perfectly well.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because John had said to him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:16; 20:21
      marker-yv: yv-n
    - type: text
      text: '“It is not lawful for you to have her.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And although he wanted to put him to death, he feared the multitude, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 21:26; Luke 20:6
      marker-yv: yv-n
    - type: text
      text: because they counted him as a prophet.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when Herod’s birthday was celebrated, the daughter of Herodias danced before them and pleased Herod. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore he promised with an oath to give her whatever she might ask.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So she, having been prompted by her mother, said, “Give me John the Baptist’s head here on a platter.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king was sorry; nevertheless, because of the oaths and because of those who sat with him, he commanded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' to be given to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her.
    - type: text
      text: ' '
