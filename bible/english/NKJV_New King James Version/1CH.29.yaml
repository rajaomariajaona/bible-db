      children:
      - type: text
        text: Dan. 2:21; 4:23, 25
      marker-yv: yv-n
    - type: text
      text: and the events that happened to him, to Israel, and to all the kingdoms of the lands.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
