    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' I, and who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' my people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That we should be able to offer so willingly as this?
  - type: usfm
    marker: q2
    children:
    - type: text
