    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:4; 1 Kin. 2:11
      marker-yv: yv-n
    - type: text
      text: 'And the period that he reigned over Israel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' forty years; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:5
      marker-yv: yv-n
    - type: text
      text: 'seven years he reigned in Hebron, and thirty-three '
    - type: usfm
      marker: it
      children:
      - type: text
        text: years
    - type: text
      text: ' he reigned in Jerusalem. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'So he '
    - type: usfm
      marker: x
      children:
