      text: 'three thousand talents of gold, of the gold of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 9:28
      marker-yv: yv-n
    - type: text
      text: 'Ophir, and seven thousand talents of refined silver, to overlay the walls of the houses; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'the gold for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' gold and the silver for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' silver, and for all kinds of work '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: done
    - type: text
      text: ' by the hands of craftsmen. Who '
    - type: usfm
      marker: it
      children:
