    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Then Solomon sat on the throne of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as king instead of David his father, and prospered; and all Israel obeyed him. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'All the leaders and the mighty men, and also all the sons of King David, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 8:2
      marker-yv: yv-n
    - type: text
      text: 'submitted themselves to King Solomon. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'So the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' exalted Solomon exceedingly in the sight of all Israel, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 3:13; 2 Chr. 1:12; Eccl. 2:9
      marker-yv: yv-n
    - type: text
      text: 'bestowed on him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: such
    - type: text
      text: ' royal majesty as had not been on any king before him in Israel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Close of David’s Reign
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Thus David the son of Jesse reigned over all Israel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
