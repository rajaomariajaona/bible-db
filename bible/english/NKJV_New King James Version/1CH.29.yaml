      children:
      - type: text
        text: 1 Kin. 8:62, 63
      marker-yv: yv-n
    - type: text
      text: 'sacrifices in abundance for all Israel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So they ate and drank before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with great gladness on that day. And they made Solomon the son of David king the second time, and '
    - type: usfm
