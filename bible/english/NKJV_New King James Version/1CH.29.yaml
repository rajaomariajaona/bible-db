    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' iron, wood for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
