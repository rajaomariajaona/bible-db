      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Chr. 28:9); Ps. 72:1
      marker-yv: yv-n
    - type: text
      text: 'give my son Solomon a loyal heart to keep Your commandments and Your testimonies and Your statutes, to do all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things,
    - type: text
      text: ' and to build the temple for which '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 29:1, 2
      marker-yv: yv-n
    - type: text
      text: I have made provision.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
