      marker-yv: yv-n
    - type: text
      text: 'full of days and riches and honor; and Solomon his son reigned in his place. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Now the acts of King David, first and last, indeed they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' written in the book of Samuel the seer, in the book of Nathan the prophet, and in the book of Gad the seer, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Moreover, because I have set my affection on the house of my God, I have given to the house of my God, over and above all that I have prepared for the holy house, my own special treasure of gold and silver: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
