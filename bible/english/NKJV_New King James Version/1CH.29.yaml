    - type: text
      text: 'onyx stones, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: stones
    - type: text
      text: ' to be set, glistening stones of various colors, all kinds of precious stones, and marble slabs in abundance. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then David said to all the assembly, “Now bless the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.” So all the assembly blessed the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of their fathers, and bowed their heads and prostrated themselves before the '
    - type: usfm
      marker: sc
