  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon Anointed King
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And they made sacrifices to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and offered burnt offerings to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
