    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' from You,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And of Your own we have given You.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
