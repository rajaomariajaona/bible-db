  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' all our fathers;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 14:2; Ps. 90:9
      marker-yv: yv-n
    - type: text
      text: 'Our days on earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' as a shadow,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And without hope.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, all this abundance that we have prepared to build You a house for Your holy name is from Your hand, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' all Your own. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'I know also, my God, that You '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Sam. 16:7; 1 Chr. 28:9)
      marker-yv: yv-n
    - type: text
      text: 'test the heart and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 11:20
      marker-yv: yv-n
    - type: text
      text: 'have pleasure in uprightness. As for me, in the uprightness of my heart I have willingly offered all these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things;
    - type: text
      text: ' and now with joy I have seen Your people, who are present here to offer willingly to You. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Abraham, Isaac, and Israel, our fathers, keep this forever in the intent of the thoughts of the heart of Your people, and fix their heart toward You. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
