document_id: 1CH.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Family Tree of King Saul of Benjamin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Benjamin begot '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 46:21; Num. 26:38; 1 Chr. 7:6
    marker-yv: yv-n
  - type: text
    text: 'Bela his firstborn, Ashbel the second, Aharah the third, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nohah the fourth, and Rapha the fifth. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The sons of Bela '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Addar, Gera, Abihud, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Abishua, Naaman, Ahoah, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Gera, Shephuphan, and Huram.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Ehud, who were the heads of the fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: houses
  - type: text
    text: ' of the inhabitants of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 6:60
    marker-yv: yv-n
  - type: text
    text: 'Geba, and who forced them to move to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 2:52
    marker-yv: yv-n
  - type: text
    text: 'Manahath: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Naaman, Ahijah, and Gera who forced them to move. He begot Uzza and Ahihud.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Also Shaharaim had children in the country of Moab, after he had sent away Hushim and Baara his wives. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'By Hodesh his wife he begot Jobab, Zibia, Mesha, Malcam, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jeuz, Sachiah, and Mirmah. These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' his sons, heads of their fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: houses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And by Hushim he begot Abitub and Elpaal. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The sons of Elpaal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Eber, Misham, and Shemed, who built Ono and Lod with its towns; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and Beriah and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 8:21
    marker-yv: yv-n
  - type: text
    text: 'Shema, who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' heads of their fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: houses
  - type: text
    text: ' of the inhabitants of Aijalon, who drove out the inhabitants of Gath. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ahio, Shashak, Jeremoth, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Zebadiah, Arad, Eder, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Michael, Ispah, and Joha '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Beriah. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Zebadiah, Meshullam, Hizki, Heber, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ishmerai, Jizliah, and Jobab '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Elpaal. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jakim, Zichri, Zabdi, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Elienai, Zillethai, Eliel, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Adaiah, Beraiah, and Shimrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Shimei. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ishpan, Eber, Eliel, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Abdon, Zichri, Hanan, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hananiah, Elam, Antothijah, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Iphdeiah, and Penuel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Shashak. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Shamsherai, Shehariah, Athaliah, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jaareshiah, Elijah, and Zichri '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Jeroham.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' heads of the fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: houses
  - type: text
    text: ' by their generations, chief men. These dwelt in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now the father of Gibeon, whose '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 9:35–38
    marker-yv: yv-n
  - type: text
    text: 'wife’s name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Maacah, dwelt at Gibeon. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And his firstborn son '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Abdon, then Zur, Kish, Baal, Nadab, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Gedor, Ahio, Zecher, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'and Mikloth, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' begot Shimeah. They also dwelt alongside their relatives in Jerusalem, with their brethren. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 14:51
    marker-yv: yv-n
  - type: text
    text: 'Ner begot Kish, Kish begot Saul, and Saul begot Jonathan, Malchishua, Abinadab, and Esh-Baal. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The son of Jonathan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Merib-Baal, and Merib-Baal begot '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 9:12
    marker-yv: yv-n
  - type: text
    text: 'Micah. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The sons of Micah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Pithon, Melech, Tarea, and Ahaz. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And Ahaz begot Jehoaddah; Jehoaddah begot Alemeth, Azmaveth, and Zimri; and Zimri begot Moza. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Moza begot Binea, Raphah his son, Eleasah his son, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Azel his son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Azel had six sons whose names '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' these: Azrikam, Bocheru, Ishmael, Sheariah, Obadiah, and Hanan. All these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Azel. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And the sons of Eshek his brother '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Ulam his firstborn, Jeush the second, and Eliphelet the third.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'The sons of Ulam were mighty men of valor—archers. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: They
  - type: text
    text: ' had many sons and grandsons, one hundred and fifty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all.
  - type: text
    text: ' These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' all sons of Benjamin.'
