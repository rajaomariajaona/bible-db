document_id: LUK.10,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Seventy Sent Out
  - type: text
    content: 'After these things the Lord appointed seventy others also, and '
  - type: note
    content: Matt. 10:1; Mark 6:7
  - type: text
    content: 'sent them two by two before His face into every city and place where He Himself was about to go. '
  '10':
  - type: text
    content: But whatever city you enter, and they do not receive you, go out into its streets and say,
  - type: text
    content: ' '
  '11':
  - type: note
    content: Matt. 10:14; Mark 6:11; Luke 9:5; Acts 13:51
  - type: text
    content: '‘The very dust of your city which clings to '
  - type: text
    content: us
  - type: text
    content: ' we wipe off against you. Nevertheless know this, that the kingdom of God has come near you.’'
  - type: text
    content: ' '
  '12':
  - type: text
    content: But
  - type: text
    content: ' I say to you that '
  - type: note
    content: Gen. 19:24–28; Lam. 4:6; Matt. 10:15; 11:24; Mark 6:11
  - type: text
    content: it will be more tolerable in that Day for Sodom than for that city.
  - type: heading
    content: Woe to the Impenitent Cities
  '13':
  - type: note
    content: Matt. 11:21–23
  - type: text
    content: '“Woe to you, Chorazin! Woe to you, Bethsaida! '
  - type: note
    content: Ezek. 3:6
  - type: text
    content: For if the mighty works which were done in you had been done in Tyre and Sidon, they would have repented long ago, sitting in sackcloth and ashes.
  - type: text
    content: ' '
  '14':
  - type: text
    content: But it will be more tolerable for Tyre and Sidon at the judgment than for you.
  - type: text
    content: ' '
  '15':
  - type: note
    content: Matt. 11:23
  - type: text
    content: 'And you, Capernaum, '
  - type: text
    content: 'who are '
  - type: note
    content: Gen. 11:4; Deut. 1:28; Is. 14:13–15; Jer. 51:53
  - type: text
    content: 'exalted to heaven, '
  - type: note
    content: Ezek. 26:20
  - type: text
    content: will be brought down to Hades.
  - type: text
    content: ' '
  '16':
  - type: note
    content: Matt. 10:40; Mark 9:37; John 13:20; Gal. 4:14
  - type: text
    content: 'He who hears you hears Me, '
  - type: note
    content: (John 12:48); 1 Thess. 4:8
  - type: text
    content: 'he who rejects you rejects Me, and '
  - type: note
    content: John 5:23
  - type: text
    content: he who rejects Me rejects Him who sent Me.”
  - type: heading
    content: The Seventy Return with Joy
  '17':
  - type: text
    content: 'Then '
  - type: note
    content: Luke 10:1
  - type: text
    content: the seventy returned with joy, saying, “Lord, even the demons are subject to us in Your name.”
  '18':
  - type: text
    content: 'And He said to them, '
  - type: note
    content: John 12:31; Rev. 9:1; 12:8, 9
  - type: text
    content: “I saw Satan fall like lightning from heaven.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Behold, '
  - type: note
    content: Ps. 91:13; Mark 16:18; Acts 28:5
  - type: text
    content: I give you the authority to trample on serpents and scorpions, and over all the power of the enemy, and nothing shall by any means hurt you.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Then He said to them, '
  - type: note
    content: Matt. 9:37, 38; John 4:35
  - type: text
    content: '“The harvest truly '
  - type: text
    content: is
  - type: text
    content: ' great, but the laborers '
  - type: text
    content: are
  - type: text
    content: ' few; therefore '
  - type: note
    content: (1 Cor. 3:9); 2 Thess. 3:1
  - type: text
    content: pray the Lord of the harvest to send out laborers into His harvest.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Nevertheless do not rejoice in this, that the spirits are subject to you, but '
  - type: text
    content: rather
  - type: text
    content: ' rejoice because '
  - type: note
    content: (Ex. 32:32, 33); Ps. 69:28; Is. 4:3; Dan. 12:1; Phil. 4:3; Heb. 12:23; Rev. 13:8
  - type: text
    content: your names are written in heaven.”
  - type: heading
    content: Jesus Rejoices in the Spirit
  '21':
  - type: note
    content: Matt. 11:25–27
  - type: text
    content: 'In that hour Jesus rejoiced in the Spirit and said, '
  - type: text
    content: '“I thank You, Father, Lord of heaven and earth, that You have hidden these things from '
  - type: text
    content: the
  - type: text
    content: ' wise and prudent and revealed them to babes. Even so, Father, for so it seemed good in Your sight.'
  - type: text
    content: ' '
  '22':
  - type: note
    content: Matt. 28:18; John 3:35; 5:27; 17:2
  - type: text
    content: All
  - type: text
    content: ' things have been delivered to Me by My Father, and '
  - type: note
    content: (John 1:18; 6:44, 46)
  - type: text
    content: 'no one knows who the Son is except the Father, and who the Father is except the Son, and '
  - type: text
    content: the one
  - type: text
    content: ' to whom the Son wills to reveal '
  - type: text
    content: Him.
  - type: text
    content: ”
  '23':
  - type: text
    content: 'Then He turned to '
  - type: text
    content: His
  - type: text
    content: ' disciples and said privately, '
  - type: note
    content: Matt. 13:16, 17
  - type: text
    content: '“Blessed '
  - type: text
    content: are
  - type: text
    content: ' the eyes which see the things you see;'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'for I tell you '
  - type: note
    content: 1 Pet. 1:10, 11
  - type: text
    content: 'that many prophets and kings have desired to see what you see, and have not seen '
  - type: text
    content: it,
  - type: text
    content: ' and to hear what you hear, and have not heard '
  - type: text
    content: it.
  - type: text
    content: ”
  - type: heading
    content: The Parable of the Good Samaritan
  '25':
  - type: text
    content: 'And behold, a certain lawyer stood up and tested Him, saying, '
  - type: note
    content: Matt. 19:16–19; 22:35
  - type: text
    content: “Teacher, what shall I do to inherit eternal life?”
  '26':
  - type: text
    content: 'He said to him, '
  - type: text
    content: '“What is written in the law? What is your reading '
  - type: text
    content: of it?
  - type: text
    content: ”
  '27':
  - type: text
    content: 'So he answered and said, “ '
  - type: note
    content: Deut. 6:5
  - type: text
    content: '‘You shall love the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God with all your heart, with all your soul, with all your strength, and with all your mind,’ and '
  - type: note
    content: Lev. 19:18; Matt. 19:19
  - type: text
    content: ‘your neighbor as yourself.’ ”
  '28':
  - type: text
    content: 'And He said to him, '
  - type: text
    content: '“You have answered rightly; do this and '
  - type: note
    content: Lev. 18:5; Neh. 9:29; Ezek. 20:11, 13, 21; Matt. 19:17; Rom. 10:5
  - type: text
    content: you will live.”
  '29':
  - type: text
    content: 'But he, wanting to '
  - type: note
    content: Luke 16:15
  - type: text
    content: justify himself, said to Jesus, “And who is my neighbor?”
  '3':
  - type: text
    content: 'Go your way; '
  - type: note
    content: Matt. 10:16
  - type: text
    content: behold, I send you out as lambs among wolves.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Then Jesus answered and said: '
  - type: text
    content: '“A certain '
  - type: text
    content: man
  - type: text
    content: ' went down from Jerusalem to Jericho, and fell among '
  - type: text
    content: 'thieves, who stripped him of his clothing, wounded '
  - type: text
    content: him,
  - type: text
    content: ' and departed, leaving '
  - type: text
    content: him
  - type: text
    content: ' half dead.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Now by chance a certain priest came down that road. And when he saw him, '
  - type: note
    content: Ps. 38:11
  - type: text
    content: he passed by on the other side.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Likewise a Levite, when he arrived at the place, came and looked, and passed by on the other side.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'But a certain '
  - type: note
    content: John 4:9
  - type: text
    content: 'Samaritan, as he journeyed, came where he was. And when he saw him, he had '
  - type: note
    content: Luke 15:20
  - type: text
    content: compassion.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'So he went to '
  - type: text
    content: him
  - type: text
    content: ' and bandaged his wounds, pouring on oil and wine; and he set him on his own animal, brought him to an inn, and took care of him.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'On the next day, '
  - type: text
    content: when he departed,
  - type: text
    content: ' he took out two '
  - type: note
    content: Matt. 20:2
  - type: text
    content: 'denarii, gave '
  - type: text
    content: them
  - type: text
    content: ' to the innkeeper, and said to him, ‘Take care of him; and whatever more you spend, when I come again, I will repay you.’'
  - type: text
    content: ' '
  '36':
  - type: text
    content: So which of these three do you think was neighbor to him who fell among the thieves?”
  '37':
  - type: text
    content: And he said, “He who showed mercy on him.”
  - type: text
    content: 'Then Jesus said to him, '
  - type: note
    content: Prov. 14:21; (Matt. 9:13; 12:7)
  - type: text
    content: “Go and do likewise.”
  - type: heading
    content: Mary and Martha Worship and Serve
  '38':
  - type: text
    content: 'Now it happened as they went that He entered a certain village; and a certain woman named '
  - type: note
    content: John 11:1; 12:2, 3
  - type: text
    content: 'Martha welcomed Him into her house. '
  '39':
  - type: text
    content: 'And she had a sister called Mary, '
  - type: note
    content: (1 Cor. 7:32–40)
  - type: text
    content: 'who also '
  - type: note
    content: Luke 8:35; Acts 22:3
  - type: text
    content: 'sat at Jesus’ feet and heard His word. '
  '4':
  - type: note
    content: Matt. 10:9–14; Mark 6:8–11; Luke 9:3–5
  - type: text
    content: 'Carry neither money bag, knapsack, nor sandals; and '
  - type: note
    content: 2 Kin. 4:29
  - type: text
    content: greet no one along the road.
  - type: text
    content: ' '
  '40':
  - type: text
    content: But Martha was distracted with much serving, and she approached Him and said, “Lord, do You not care that my sister has left me to serve alone? Therefore tell her to help me.”
  '41':
  - type: text
    content: 'And Jesus answered and said to her, '
  - type: text
    content: “Martha, Martha, you are worried and troubled about many things.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'But '
  - type: note
    content: (Ps. 27:4; John 6:27)
  - type: text
    content: one thing is needed, and Mary has chosen that good part, which will not be taken away from her.”
  '5':
  - type: note
    content: 1 Sam. 25:6; Matt. 10:12
  - type: text
    content: But whatever house you enter, first say, ‘Peace to this house.’
  - type: text
    content: ' '
  '6':
  - type: text
    content: And if a son of peace is there, your peace will rest on it; if not, it will return to you.
  - type: text
    content: ' '
  '7':
  - type: note
    content: Matt. 10:11
  - type: text
    content: 'And remain in the same house, '
  - type: note
    content: 1 Cor. 10:27
  - type: text
    content: 'eating and drinking such things as they give, for '
  - type: note
    content: (Matt. 10:10); 1 Cor. 9:4–8; 1 Tim. 5:18
  - type: text
    content: the laborer is worthy of his wages. Do not go from house to house.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Whatever city you enter, and they receive you, eat such things as are set before you.
  - type: text
    content: ' '
  '9':
  - type: note
    content: Mark 3:15
  - type: text
    content: 'And heal the sick there, and say to them, '
  - type: note
    content: Matt. 3:2; 10:7; Luke 10:11
  - type: text
    content: ‘The kingdom of God has come near to you.’
  - type: text
    content: ' '
