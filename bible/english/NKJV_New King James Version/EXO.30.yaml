  '1':
  - type: heading
    content: The Altar of Incense
  - type: text
    content: '“You shall make '
  - type: note
    content: Ex. 37:25–29
  - type: text
    content: 'an altar to burn incense on; you shall make it of acacia wood. '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: Lev. 16:3–34
  - type: text
    content: 'Aaron shall make atonement upon its horns once a year with the blood of the sin offering of atonement; once a year he shall make atonement upon it throughout your generations. It '
  - type: text
    content: is
  - type: text
    content: ' most holy to the '
  - type: heading
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: The Ransom Money
  '11':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '12':
  - type: note
    content: Ex. 38:25, 26; Num. 1:2; 26:2; 2 Sam. 24:2
  - type: text
    content: '“When you take the census of the children of Israel for their number, then every man shall give '
  - type: note
    content: Num. 31:50; (Matt. 20:28; 1 Pet. 1:18, 19)
  - type: text
    content: 'a ransom for himself to the '
  - type: heading
    content: Lord
  - type: text
    content: ', when you number them, that there may be no '
  - type: note
    content: 2 Sam. 24:15
  - type: text
    content: 'plague among them when '
  - type: text
    content: you
  - type: text
    content: ' number them. '
  '13':
  - type: note
    content: Matt. 17:24
  - type: text
    content: 'This is what everyone among those who are numbered shall give: half a shekel according to the shekel of the sanctuary '
  - type: note
    content: Lev. 27:25; Num. 3:47; Ezek. 45:12
  - type: text
    content: '(a shekel '
  - type: text
    content: is
  - type: text
    content: ' twenty gerahs). '
  - type: note
    content: Ex. 38:26
  - type: text
    content: 'The half-shekel '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' an offering to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Everyone included among those who are numbered, from twenty years old and above, shall give an offering to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'The '
  - type: note
    content: Job 34:19; Prov. 22:2; (Eph. 6:9)
  - type: text
    content: 'rich shall not give more and the poor shall not give less than half a shekel, when '
  - type: text
    content: you
  - type: text
    content: ' give an offering to the '
  - type: heading
    content: Lord
  - type: text
    content: ', to make atonement for yourselves. '
  '16':
  - type: text
    content: 'And you shall take the atonement money of the children of Israel, and '
  - type: note
    content: Ex. 38:25–31
  - type: text
    content: 'shall appoint it for the service of the tabernacle of meeting, that it may be '
  - type: note
    content: Num. 16:40
  - type: text
    content: 'a memorial for the children of Israel before the '
  - type: heading
    content: Lord
  - type: text
    content: ', to make atonement for yourselves.”'
  - type: heading
    content: The Bronze Laver
  '17':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '18':
  - type: note
    content: Ex. 38:8; 1 Kin. 7:38
  - type: text
    content: '“You shall also make a laver of bronze, with its base also of bronze, for washing. You shall '
  - type: note
    content: Ex. 40:30
  - type: text
    content: 'put it between the tabernacle of meeting and the altar. And you shall put water in it, '
  '19':
  - type: text
    content: 'for Aaron and his sons '
  - type: note
    content: Ex. 40:31, 32; Ps. 26:6; Is. 52:11; John 13:8, 10; Heb. 10:22
  - type: text
    content: 'shall wash their hands and their feet in water from it. '
  '2':
  - type: text
    content: 'A cubit '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' its length and a cubit its width—it shall be square—and two cubits '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' its height. Its horns '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' of one piece with it. '
  '20':
  - type: text
    content: 'When they go into the tabernacle of meeting, or when they come near the altar to minister, to burn an offering made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: ', they shall wash with water, lest they die. '
  '21':
  - type: text
    content: 'So they shall wash their hands and their feet, lest they die. And '
  - type: note
    content: Ex. 28:43
  - type: text
    content: it shall be a statute forever to them—to him and his descendants throughout their generations.”
  - type: heading
    content: The Holy Anointing Oil
  '22':
  - type: text
    content: 'Moreover the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '23':
  - type: text
    content: '“Also take for yourself '
  - type: note
    content: Song 4:14; Ezek. 27:22
  - type: text
    content: 'quality spices—five hundred '
  - type: text
    content: shekels
  - type: text
    content: ' of liquid '
  - type: note
    content: Ps. 45:8; Prov. 7:17
  - type: text
    content: 'myrrh, half as much sweet-smelling cinnamon (two hundred and fifty '
  - type: text
    content: shekels
  - type: text
    content: '), two hundred and fifty '
  - type: text
    content: shekels
  - type: text
    content: ' of sweet-smelling '
  - type: note
    content: Song 4:14; Jer. 6:20
  - type: text
    content: 'cane, '
  '24':
  - type: text
    content: 'five hundred '
  - type: text
    content: shekels
  - type: text
    content: ' of '
  - type: note
    content: Ps. 45:8
  - type: text
    content: 'cassia, according to the shekel of the sanctuary, and a '
  - type: note
    content: Ex. 29:40
  - type: text
    content: 'hin of olive oil. '
  '25':
  - type: text
    content: 'And you shall make from these a holy anointing oil, an ointment compounded according to the art of the perfumer. It shall be '
  - type: note
    content: Ex. 37:29; 40:9; Lev. 8:10; Num. 35:25; Ps. 89:20; 133:2
  - type: text
    content: 'a holy anointing oil. '
  '26':
  - type: note
    content: Ex. 40:9; Lev. 8:10; Num. 7:1
  - type: text
    content: 'With it you shall anoint the tabernacle of meeting and the ark of the Testimony; '
  '27':
  - type: text
    content: 'the table and all its utensils, the lampstand and its utensils, and the altar of incense; '
  '28':
  - type: text
    content: 'the altar of burnt offering with all its utensils, and the laver and its base. '
  '29':
  - type: text
    content: 'You shall consecrate them, that they may be most holy; '
  - type: note
    content: Ex. 29:37; Num. 4:15; Hag. 2:11–13
  - type: text
    content: 'whatever touches them must be holy. '
  '3':
  - type: text
    content: 'And you shall overlay its top, its sides all around, and its horns with pure gold; and you shall make for it a molding of gold all around. '
  '30':
  - type: note
    content: Ex. 29:7; Lev. 8:12
  - type: text
    content: 'And you shall anoint Aaron and his sons, and consecrate them, that '
  - type: text
    content: they
  - type: text
    content: ' may minister to Me as priests.'
  '31':
  - type: text
    content: '“And you shall speak to the children of Israel, saying: ‘This shall be a holy anointing oil to Me throughout your generations. '
  '32':
  - type: text
    content: 'It shall not be poured on man’s flesh; nor shall you make '
  - type: text
    content: any
  - type: text
    content: ' '
  - type: text
    content: other
  - type: text
    content: ' like it, according to its composition. '
  - type: note
    content: Ex. 30:25, 37
  - type: text
    content: 'It '
  - type: text
    content: is
  - type: text
    content: ' holy, '
  - type: text
    content: and
  - type: text
    content: ' it shall be holy to you. '
  '33':
  - type: note
    content: Ex. 30:38
  - type: text
    content: 'Whoever compounds '
  - type: text
    content: any
  - type: text
    content: ' like it, or whoever puts '
  - type: text
    content: any
  - type: text
    content: ' of it on an outsider, '
  - type: note
    content: Gen. 17:14; Ex. 12:15; Lev. 7:20, 21
  - type: text
    content: shall be cut off from his people.’ ”
  - type: heading
    content: The Incense
  '34':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses: '
  - type: note
    content: Ex. 25:6; 37:29
  - type: text
    content: '“Take sweet spices, stacte and onycha and galbanum, and pure frankincense with '
  - type: text
    content: these
  - type: text
    content: ' sweet spices; there shall be equal amounts of each. '
  '35':
  - type: text
    content: 'You shall make of these an incense, a compound '
  - type: note
    content: Ex. 30:25
  - type: text
    content: 'according to the art of the perfumer, salted, pure, '
  - type: text
    content: and
  - type: text
    content: ' holy. '
  '36':
  - type: text
    content: 'And you shall beat '
  - type: text
    content: some
  - type: text
    content: ' of it very fine, and put some of it before the Testimony in the tabernacle of meeting '
  - type: note
    content: Ex. 29:42; Lev. 16:2
  - type: text
    content: 'where I will meet with you. '
  - type: note
    content: (Ex. 29:37; 30:32); Lev. 2:3
  - type: text
    content: 'It shall be most holy to you. '
  '37':
  - type: text
    content: 'But '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: for
  - type: text
    content: ' the incense which you shall make, '
  - type: note
    content: Ex. 30:32
  - type: text
    content: 'you shall not make any for yourselves, according to its composition. It shall be to you holy for the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '38':
  - type: note
    content: Ex. 30:33
  - type: text
    content: 'Whoever makes '
  - type: text
    content: any
  - type: text
    content: ' like it, to smell it, he shall be cut off from his people.”'
  '4':
  - type: text
    content: 'Two gold rings you shall make for it, under the molding on both its sides. You shall place '
  - type: text
    content: them
  - type: text
    content: ' on its two sides, and they will be holders for the poles with which to bear it. '
  '5':
  - type: text
    content: 'You shall make the poles of acacia wood, and overlay them with gold. '
  '6':
  - type: text
    content: 'And you shall put it before the '
  - type: note
    content: Ex. 26:31–35
  - type: text
    content: 'veil that '
  - type: text
    content: is
  - type: text
    content: ' before the ark of the Testimony, before the '
  - type: note
    content: Ex. 25:21, 22
  - type: text
    content: 'mercy seat that '
  - type: text
    content: is
  - type: text
    content: ' over the Testimony, where I will meet with you.'
  '7':
  - type: text
    content: '“Aaron shall burn on it '
  - type: note
    content: Ex. 30:34; 1 Sam. 2:28; 1 Chr. 23:13; Luke 1:9
  - type: text
    content: 'sweet incense every morning; when '
  - type: note
    content: Ex. 27:20, 21
  - type: text
    content: 'he tends the lamps, he shall burn incense on it. '
  '8':
  - type: text
    content: 'And when Aaron lights the lamps at twilight, he shall burn incense on it, a perpetual incense before the '
  - type: heading
    content: Lord
  - type: text
    content: ' throughout your generations. '
  '9':
  - type: text
    content: 'You shall not offer '
  - type: note
    content: Lev. 10:1
  - type: text
    content: 'strange incense on it, or a burnt offering, or a grain offering; nor shall you pour a drink offering on it. '
