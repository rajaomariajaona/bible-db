verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Altar of Incense
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You shall make '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 37:25–29
      marker-yv: yv-n
    - type: text
      text: 'an altar to burn incense on; you shall make it of acacia wood. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 16:3–34
      marker-yv: yv-n
    - type: text
      text: 'Aaron shall make atonement upon its horns once a year with the blood of the sin offering of atonement; once a year he shall make atonement upon it throughout your generations. It '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' most holy to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ransom Money
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 38:25, 26; Num. 1:2; 26:2; 2 Sam. 24:2
      marker-yv: yv-n
    - type: text
      text: '“When you take the census of the children of Israel for their number, then every man shall give '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 31:50; (Matt. 20:28; 1 Pet. 1:18, 19)
      marker-yv: yv-n
    - type: text
      text: 'a ransom for himself to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', when you number them, that there may be no '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 24:15
      marker-yv: yv-n
    - type: text
      text: 'plague among them when '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' number them. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 17:24
      marker-yv: yv-n
    - type: text
      text: 'This is what everyone among those who are numbered shall give: half a shekel according to the shekel of the sanctuary '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 27:25; Num. 3:47; Ezek. 45:12
      marker-yv: yv-n
    - type: text
      text: '(a shekel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' twenty gerahs). '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 38:26
      marker-yv: yv-n
    - type: text
      text: 'The half-shekel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' an offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Everyone included among those who are numbered, from twenty years old and above, shall give an offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 34:19; Prov. 22:2; (Eph. 6:9)
      marker-yv: yv-n
    - type: text
      text: 'rich shall not give more and the poor shall not give less than half a shekel, when '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' give an offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to make atonement for yourselves. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall take the atonement money of the children of Israel, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 38:25–31
      marker-yv: yv-n
    - type: text
      text: 'shall appoint it for the service of the tabernacle of meeting, that it may be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:40
      marker-yv: yv-n
    - type: text
      text: 'a memorial for the children of Israel before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to make atonement for yourselves.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Bronze Laver
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 38:8; 1 Kin. 7:38
      marker-yv: yv-n
    - type: text
      text: '“You shall also make a laver of bronze, with its base also of bronze, for washing. You shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:30
      marker-yv: yv-n
    - type: text
      text: 'put it between the tabernacle of meeting and the altar. And you shall put water in it, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for Aaron and his sons '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:31, 32; Ps. 26:6; Is. 52:11; John 13:8, 10; Heb. 10:22
      marker-yv: yv-n
    - type: text
      text: 'shall wash their hands and their feet in water from it. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cubit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' its length and a cubit its width—it shall be square—and two cubits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' its height. Its horns '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' of one piece with it. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they go into the tabernacle of meeting, or when they come near the altar to minister, to burn an offering made by fire to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', they shall wash with water, lest they die. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they shall wash their hands and their feet, lest they die. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:43
      marker-yv: yv-n
    - type: text
      text: it shall be a statute forever to them—to him and his descendants throughout their generations.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Holy Anointing Oil
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Also take for yourself '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Song 4:14; Ezek. 27:22
      marker-yv: yv-n
    - type: text
      text: 'quality spices—five hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of liquid '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 45:8; Prov. 7:17
      marker-yv: yv-n
    - type: text
      text: 'myrrh, half as much sweet-smelling cinnamon (two hundred and fifty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels
    - type: text
      text: '), two hundred and fifty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of sweet-smelling '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Song 4:14; Jer. 6:20
      marker-yv: yv-n
    - type: text
      text: 'cane, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'five hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 45:8
      marker-yv: yv-n
    - type: text
      text: 'cassia, according to the shekel of the sanctuary, and a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:40
      marker-yv: yv-n
    - type: text
      text: 'hin of olive oil. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall make from these a holy anointing oil, an ointment compounded according to the art of the perfumer. It shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 37:29; 40:9; Lev. 8:10; Num. 35:25; Ps. 89:20; 133:2
      marker-yv: yv-n
    - type: text
      text: 'a holy anointing oil. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:9; Lev. 8:10; Num. 7:1
      marker-yv: yv-n
    - type: text
      text: 'With it you shall anoint the tabernacle of meeting and the ark of the Testimony; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the table and all its utensils, the lampstand and its utensils, and the altar of incense; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the altar of burnt offering with all its utensils, and the laver and its base. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall consecrate them, that they may be most holy; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:37; Num. 4:15; Hag. 2:11–13
      marker-yv: yv-n
    - type: text
      text: 'whatever touches them must be holy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall overlay its top, its sides all around, and its horns with pure gold; and you shall make for it a molding of gold all around. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:7; Lev. 8:12
      marker-yv: yv-n
    - type: text
      text: 'And you shall anoint Aaron and his sons, and consecrate them, that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' may minister to Me as priests.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And you shall speak to the children of Israel, saying: ‘This shall be a holy anointing oil to Me throughout your generations. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It shall not be poured on man’s flesh; nor shall you make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' like it, according to its composition. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:25, 37
      marker-yv: yv-n
    - type: text
      text: 'It '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' holy, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' it shall be holy to you. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:38
      marker-yv: yv-n
    - type: text
      text: 'Whoever compounds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' like it, or whoever puts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' of it on an outsider, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:14; Ex. 12:15; Lev. 7:20, 21
      marker-yv: yv-n
    - type: text
      text: shall be cut off from his people.’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Incense
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:6; 37:29
      marker-yv: yv-n
    - type: text
      text: '“Take sweet spices, stacte and onycha and galbanum, and pure frankincense with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' sweet spices; there shall be equal amounts of each. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall make of these an incense, a compound '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:25
      marker-yv: yv-n
    - type: text
      text: 'according to the art of the perfumer, salted, pure, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' holy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall beat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of it very fine, and put some of it before the Testimony in the tabernacle of meeting '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:42; Lev. 16:2
      marker-yv: yv-n
    - type: text
      text: 'where I will meet with you. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 29:37; 30:32); Lev. 2:3
      marker-yv: yv-n
    - type: text
      text: 'It shall be most holy to you. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' the incense which you shall make, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:32
      marker-yv: yv-n
    - type: text
      text: 'you shall not make any for yourselves, according to its composition. It shall be to you holy for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:33
      marker-yv: yv-n
    - type: text
      text: 'Whoever makes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' like it, to smell it, he shall be cut off from his people.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Two gold rings you shall make for it, under the molding on both its sides. You shall place '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' on its two sides, and they will be holders for the poles with which to bear it. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall make the poles of acacia wood, and overlay them with gold. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall put it before the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:31–35
      marker-yv: yv-n
    - type: text
      text: 'veil that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' before the ark of the Testimony, before the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:21, 22
      marker-yv: yv-n
    - type: text
      text: 'mercy seat that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' over the Testimony, where I will meet with you.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Aaron shall burn on it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:34; 1 Sam. 2:28; 1 Chr. 23:13; Luke 1:9
      marker-yv: yv-n
    - type: text
      text: 'sweet incense every morning; when '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 27:20, 21
      marker-yv: yv-n
    - type: text
      text: 'he tends the lamps, he shall burn incense on it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Aaron lights the lamps at twilight, he shall burn incense on it, a perpetual incense before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' throughout your generations. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall not offer '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 10:1
      marker-yv: yv-n
    - type: text
      text: 'strange incense on it, or a burnt offering, or a grain offering; nor shall you pour a drink offering on it. '
