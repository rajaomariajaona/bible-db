document_id: PSA.44,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Redemption Remembered in Present Dishonor
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. A '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 42:title
      marker-yv: yv-n
    - type: text
      text: Contemplation of the sons of Korah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have heard with our ears, O God,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 12:26, 27; Deut. 6:20); Judg. 6:13; Ps. 78:3
      marker-yv: yv-n
    - type: text
      text: Our fathers have told us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The deeds You did in their days,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In days of old:'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You make us '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:17; Josh. 7:8, 12; Ps. 89:43
      marker-yv: yv-n
    - type: text
      text: turn back from the enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And those who hate us have taken spoil for themselves.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 44:22; Rom. 8:36
      marker-yv: yv-n
    - type: text
      text: 'You have given us up like sheep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: intended
    - type: text
      text: ' for food,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:33; Deut. 4:27; 28:64; Ps. 106:27; Ezek. 20:23
      marker-yv: yv-n
    - type: text
      text: scattered us among the nations.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 52:3, 4; Jer. 15:13
      marker-yv: yv-n
    - type: text
      text: 'You sell Your people for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: next
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' nothing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And are not enriched by selling them.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 79:4; 80:6; Jer. 24:9
      marker-yv: yv-n
    - type: text
      text: You make us a reproach to our neighbors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A scorn and a derision to those all around us.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:37
      marker-yv: yv-n
    - type: text
      text: You make us a byword among the nations,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 16:4
      marker-yv: yv-n
    - type: text
      text: A shaking of the head among the peoples.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My dishonor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' continually before me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the shame of my face has covered me,
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because of the voice of him who reproaches and reviles,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 8:2
      marker-yv: yv-n
    - type: text
      text: Because of the enemy and the avenger.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 9:13
      marker-yv: yv-n
    - type: text
      text: All this has come upon us;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But we have not forgotten You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor have we dealt falsely with Your covenant.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Our heart has not turned back,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 23:11
      marker-yv: yv-n
    - type: text
      text: Nor have our steps departed from Your way;
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But You have severely broken us in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 34:13
      marker-yv: yv-n
    - type: text
      text: the place of jackals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And covered us '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 23:4)
      marker-yv: yv-n
    - type: text
      text: with the shadow of death.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:17; 2 Sam. 7:10; Jer. 24:6; Amos 9:15
      marker-yv: yv-n
    - type: text
      text: You drove out the nations with Your hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But them You planted;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You afflicted the peoples, and cast them out.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If we had forgotten the name of our God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 6:14)
      marker-yv: yv-n
    - type: text
      text: stretched out our hands to a foreign god,
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 31:14; (Ps. 139:1, 2; Jer. 17:10)
      marker-yv: yv-n
    - type: text
      text: Would not God search this out?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For He knows the secrets of the heart.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 8:36
      marker-yv: yv-n
    - type: text
      text: Yet for Your sake we are killed all day long;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We are accounted as sheep for the slaughter.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 7:6
      marker-yv: yv-n
    - type: text
      text: Awake! Why do You sleep, O Lord?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Arise! Do not cast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us
    - type: text
      text: ' off forever.'
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 13:24
      marker-yv: yv-n
    - type: text
      text: Why do You hide Your face,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' forget our affliction and our oppression?'
  '25':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:25
      marker-yv: yv-n
    - type: text
      text: our soul is bowed down to the dust;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Our body clings to the ground.
  '26':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Arise for our help,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And redeem us for Your mercies’ sake.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 8:17, 18); Josh. 24:12
      marker-yv: yv-n
    - type: text
      text: they did not gain possession of the land by their own sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor did their own arm save them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But it was Your right hand, Your arm, and the light of Your countenance,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 4:37; 7:7, 8)
      marker-yv: yv-n
    - type: text
      text: Because You favored them.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 74:12)
      marker-yv: yv-n
    - type: text
      text: You are my King, O God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Command victories for Jacob.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Through You '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 33:17; (Dan. 8:4)
      marker-yv: yv-n
    - type: text
      text: we will push down our enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Through Your name we will trample those who rise up against us.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Sam. 17:47); Ps. 33:16; (Hos. 1:7)
      marker-yv: yv-n
    - type: text
      text: I will not trust in my bow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor shall my sword save me.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But You have saved us from our enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And have put to shame those who hated us.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 34:2; (Jer. 9:24)
      marker-yv: yv-n
    - type: text
      text: In God we boast all day long,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And praise Your name forever.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 60:1
      marker-yv: yv-n
    - type: text
      text: 'You have cast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us
    - type: text
      text: ' off and put us to shame,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And You do not go out with our armies.
