document_id: PSA.44,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Redemption Remembered in Present Dishonor
  - type: text
    content: 'To the Chief Musician. A '
  - type: note
    content: Ps. 42:title
  - type: text
    content: Contemplation of the sons of Korah.
  - type: text
    content: We have heard with our ears, O God,
  - type: note
    content: (Ex. 12:26, 27; Deut. 6:20); Judg. 6:13; Ps. 78:3
  - type: text
    content: Our fathers have told us,
  - type: text
    content: The deeds You did in their days,
  - type: text
    content: 'In days of old:'
  '10':
  - type: text
    content: 'You make us '
  - type: note
    content: Lev. 26:17; Josh. 7:8, 12; Ps. 89:43
  - type: text
    content: turn back from the enemy,
  - type: text
    content: And those who hate us have taken spoil for themselves.
  '11':
  - type: note
    content: Ps. 44:22; Rom. 8:36
  - type: text
    content: 'You have given us up like sheep '
  - type: text
    content: intended
  - type: text
    content: ' for food,'
  - type: text
    content: 'And have '
  - type: note
    content: Lev. 26:33; Deut. 4:27; 28:64; Ps. 106:27; Ezek. 20:23
  - type: text
    content: scattered us among the nations.
  '12':
  - type: note
    content: Is. 52:3, 4; Jer. 15:13
  - type: text
    content: 'You sell Your people for '
  - type: text
    content: next
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' nothing,'
  - type: text
    content: And are not enriched by selling them.
  '13':
  - type: note
    content: Ps. 79:4; 80:6; Jer. 24:9
  - type: text
    content: You make us a reproach to our neighbors,
  - type: text
    content: A scorn and a derision to those all around us.
  '14':
  - type: note
    content: Deut. 28:37
  - type: text
    content: You make us a byword among the nations,
  - type: note
    content: Job 16:4
  - type: text
    content: A shaking of the head among the peoples.
  '15':
  - type: text
    content: 'My dishonor '
  - type: text
    content: is
  - type: text
    content: ' continually before me,'
  - type: text
    content: And the shame of my face has covered me,
  '16':
  - type: text
    content: Because of the voice of him who reproaches and reviles,
  - type: note
    content: Ps. 8:2
  - type: text
    content: Because of the enemy and the avenger.
  '17':
  - type: note
    content: Dan. 9:13
  - type: text
    content: All this has come upon us;
  - type: text
    content: But we have not forgotten You,
  - type: text
    content: Nor have we dealt falsely with Your covenant.
  '18':
  - type: text
    content: Our heart has not turned back,
  - type: note
    content: Job 23:11
  - type: text
    content: Nor have our steps departed from Your way;
  '19':
  - type: text
    content: 'But You have severely broken us in '
  - type: note
    content: Is. 34:13
  - type: text
    content: the place of jackals,
  - type: text
    content: 'And covered us '
  - type: note
    content: (Ps. 23:4)
  - type: text
    content: with the shadow of death.
  '2':
  - type: note
    content: Ex. 15:17; 2 Sam. 7:10; Jer. 24:6; Amos 9:15
  - type: text
    content: You drove out the nations with Your hand,
  - type: text
    content: But them You planted;
  - type: text
    content: You afflicted the peoples, and cast them out.
  '20':
  - type: text
    content: If we had forgotten the name of our God,
  - type: text
    content: 'Or '
  - type: note
    content: (Deut. 6:14)
  - type: text
    content: stretched out our hands to a foreign god,
  '21':
  - type: note
    content: Job 31:14; (Ps. 139:1, 2; Jer. 17:10)
  - type: text
    content: Would not God search this out?
  - type: text
    content: For He knows the secrets of the heart.
  '22':
  - type: note
    content: Rom. 8:36
  - type: text
    content: Yet for Your sake we are killed all day long;
  - type: text
    content: We are accounted as sheep for the slaughter.
  '23':
  - type: note
    content: Ps. 7:6
  - type: text
    content: Awake! Why do You sleep, O Lord?
  - type: text
    content: 'Arise! Do not cast '
  - type: text
    content: us
  - type: text
    content: ' off forever.'
  '24':
  - type: note
    content: Job 13:24
  - type: text
    content: Why do You hide Your face,
  - type: text
    content: And
  - type: text
    content: ' forget our affliction and our oppression?'
  '25':
  - type: text
    content: 'For '
  - type: note
    content: Ps. 119:25
  - type: text
    content: our soul is bowed down to the dust;
  - type: text
    content: Our body clings to the ground.
  '26':
  - type: text
    content: Arise for our help,
  - type: text
    content: And redeem us for Your mercies’ sake.
  '3':
  - type: text
    content: 'For '
  - type: note
    content: (Deut. 8:17, 18); Josh. 24:12
  - type: text
    content: they did not gain possession of the land by their own sword,
  - type: text
    content: Nor did their own arm save them;
  - type: text
    content: But it was Your right hand, Your arm, and the light of Your countenance,
  - type: note
    content: (Deut. 4:37; 7:7, 8)
  - type: text
    content: Because You favored them.
  '4':
  - type: note
    content: (Ps. 74:12)
  - type: text
    content: You are my King, O God;
  - type: text
    content: Command victories for Jacob.
  '5':
  - type: text
    content: 'Through You '
  - type: note
    content: Deut. 33:17; (Dan. 8:4)
  - type: text
    content: we will push down our enemies;
  - type: text
    content: Through Your name we will trample those who rise up against us.
  '6':
  - type: text
    content: 'For '
  - type: note
    content: (1 Sam. 17:47); Ps. 33:16; (Hos. 1:7)
  - type: text
    content: I will not trust in my bow,
  - type: text
    content: Nor shall my sword save me.
  '7':
  - type: text
    content: But You have saved us from our enemies,
  - type: text
    content: And have put to shame those who hated us.
  '8':
  - type: note
    content: Ps. 34:2; (Jer. 9:24)
  - type: text
    content: In God we boast all day long,
  - type: text
    content: And praise Your name forever.
  - type: text
    content: Selah
  '9':
  - type: text
    content: 'But '
  - type: note
    content: Ps. 60:1
  - type: text
    content: 'You have cast '
  - type: text
    content: us
  - type: text
    content: ' off and put us to shame,'
  - type: text
    content: And You do not go out with our armies.
