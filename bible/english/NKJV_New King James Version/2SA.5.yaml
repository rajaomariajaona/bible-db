document_id: 2SA.5,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Reigns over All Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the tribes of Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 3:32
      marker-yv: yv-n
    - type: text
      text: 'came to David at Hebron and spoke, saying, “Indeed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 11:1–3
      marker-yv: yv-n
    - type: text
      text: 'we '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' your bone and your flesh. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David went on and became great, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:7; 1 Kin. 9:15, 24
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of hosts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 17:45
      marker-yv: yv-n
    - type: text
      text: him.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 18:12, 28
      marker-yv: yv-n
    - type: text
      text: 'Hiram '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 5:1–18
      marker-yv: yv-n
    - type: text
      text: 'king of Tyre sent messengers to David, and cedar trees, and carpenters and masons. And they built David a house. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David knew that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had established him as king over Israel, and that He had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 14:1
      marker-yv: yv-n
    - type: text
      text: 'exalted His kingdom '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 24:7
      marker-yv: yv-n
    - type: text
      text: for the sake of His people Israel.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 45:4
      marker-yv: yv-n
    - type: text
      text: 'David took more concubines and wives from Jerusalem, after he had come from Hebron. Also more sons and daughters were born to David. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 17:17); 1 Chr. 3:9
      marker-yv: yv-n
    - type: text
      text: 'these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the names of those who were born to him in Jerusalem: Shammua, Shobab, Nathan, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 3:5–8
      marker-yv: yv-n
    - type: text
      text: 'Solomon, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ibhar, Elishua, Nepheg, Japhia, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elishama, Eliada, and Eliphelet.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Philistines Defeated
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 12:24
      marker-yv: yv-n
    - type: text
      text: 'Now when the Philistines heard that they had anointed David king over Israel, all the Philistines went up to search for David. And David heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 11:16
      marker-yv: yv-n
    - type: text
      text: 'and went down to the stronghold. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Philistines also went and deployed themselves in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 23:14
      marker-yv: yv-n
    - type: text
      text: 'the Valley of Rephaim. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:5; Josh. 15:8; 1 Chr. 11:15; Is. 17:5
      marker-yv: yv-n
    - type: text
      text: 'inquired of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, “Shall I go up against the Philistines? Will You deliver them into my hand?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to David, “Go up, for I will doubtless deliver the Philistines into your hand.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also, in time past, when Saul was king over us, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 29:14; Judg. 9:2; 2 Sam. 19:12, 13
      marker-yv: yv-n
    - type: text
      text: 'you were the one who led Israel out and brought them in; and the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 18:5, 13, 16
      marker-yv: yv-n
    - type: text
      text: '‘You shall shepherd My people Israel, and be ruler over Israel.’ ” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David went to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 23:2; 2 Sam. 2:1
      marker-yv: yv-n
    - type: text
      text: 'Baal Perazim, and David defeated them there; and he said, “The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has broken through my enemies before me, like a breakthrough of water.” Therefore he called the name of that place Baal Perazim. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they left their images there, and David and his men '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 14:11; Is. 28:21
      marker-yv: yv-n
    - type: text
      text: carried them away.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:5, 25
      marker-yv: yv-n
    - type: text
      text: 'Then the Philistines went up once again and deployed themselves in the Valley of Rephaim. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 14:13
      marker-yv: yv-n
    - type: text
      text: 'David inquired of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and He said, “You shall not go up; circle around behind them, and come upon them in front of the mulberry trees. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be, when you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:19
      marker-yv: yv-n
    - type: text
      text: 'hear the sound of marching in the tops of the mulberry trees, then you shall advance quickly. For then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 7:6; 1 Chr. 14:15
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will go out before you to strike the camp of the Philistines.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David did so, as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded him; and he drove back the Philistines from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 4:14
      marker-yv: yv-n
    - type: text
      text: 'Geba as far as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 14:16
      marker-yv: yv-n
    - type: text
      text: Gezer.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 16:1
      marker-yv: yv-n
    - type: text
      text: 'Therefore all the elders of Israel came to the king at Hebron, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 3:17; 1 Chr. 11:3
      marker-yv: yv-n
    - type: text
      text: 'and King David made a covenant with them at Hebron '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 2:4; 3:21; 2 Kin. 11:17
      marker-yv: yv-n
    - type: text
      text: 'before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. And they anointed David king over Israel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 11:11; 1 Sam. 23:18
      marker-yv: yv-n
    - type: text
      text: 'thirty years old when he began to reign, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:46; Num. 4:3; Luke 3:23
      marker-yv: yv-n
    - type: text
      text: 'he reigned forty years. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In Hebron he reigned over Judah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 2:11; 1 Chr. 26:31; 29:27
      marker-yv: yv-n
    - type: text
      text: seven years and six months, and in Jerusalem he reigned thirty-three years over all Israel and Judah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Conquest of Jerusalem
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 2:11; 1 Chr. 3:4; 29:27
      marker-yv: yv-n
    - type: text
      text: 'And the king and his men went to Jerusalem against '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:21
      marker-yv: yv-n
    - type: text
      text: 'the Jebusites, the inhabitants of the land, who spoke to David, saying, “You shall not come in here; but the blind and the lame will repel you,” thinking, “David cannot come in here.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless David took the stronghold of Zion '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:63; Judg. 1:8; 19:11, 12
      marker-yv: yv-n
    - type: text
      text: '(that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is,
    - type: text
      text: ' the City of David).'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now David said on that day, “Whoever climbs up by way of the water shaft and defeats the Jebusites (the lame and the blind, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' hated by David’s soul), '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 6:12, 16; 1 Kin. 2:10; 8:1; 9:24
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chief
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: captain.
    - type: text
      text: ” Therefore they say, “The blind and the lame shall not come into the house.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David dwelt in the stronghold, and called it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 11:6–9
      marker-yv: yv-n
    - type: text
      text: 'the City of David. And David built all around from the Millo and inward. '
