  - type: text
    content: ' said to David, “Go up, for I will doubtless deliver the Philistines into your hand.”'
  '2':
  - type: text
    content: 'Also, in time past, when Saul was king over us, '
  - type: note
    content: Gen. 29:14; Judg. 9:2; 2 Sam. 19:12, 13
  - type: text
    content: 'you were the one who led Israel out and brought them in; and the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to you, '
  - type: note
    content: 1 Sam. 18:5, 13, 16
  - type: text
    content: '‘You shall shepherd My people Israel, and be ruler over Israel.’ ” '
  '20':
  - type: text
    content: 'So David went to '
  - type: note
    content: 1 Sam. 23:2; 2 Sam. 2:1
  - type: text
    content: 'Baal Perazim, and David defeated them there; and he said, “The '
  - type: heading
    content: Lord
  - type: text
    content: ' has broken through my enemies before me, like a breakthrough of water.” Therefore he called the name of that place Baal Perazim. '
  '21':
  - type: text
    content: 'And they left their images there, and David and his men '
  - type: note
    content: 1 Chr. 14:11; Is. 28:21
  - type: text
    content: carried them away.
  '22':
  - type: note
    content: Deut. 7:5, 25
  - type: text
    content: 'Then the Philistines went up once again and deployed themselves in the Valley of Rephaim. '
  '23':
  - type: text
    content: 'Therefore '
  - type: note
    content: 1 Chr. 14:13
  - type: text
    content: 'David inquired of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and He said, “You shall not go up; circle around behind them, and come upon them in front of the mulberry trees. '
  '24':
  - type: text
    content: 'And it shall be, when you '
  - type: note
    content: 2 Sam. 5:19
  - type: text
    content: 'hear the sound of marching in the tops of the mulberry trees, then you shall advance quickly. For then '
  - type: note
    content: 2 Kin. 7:6; 1 Chr. 14:15
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' will go out before you to strike the camp of the Philistines.” '
