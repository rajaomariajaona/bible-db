    content: David’s Census of Israel and Judah
  - type: text
    content: 'Again '
  - type: note
    content: 2 Sam. 11:3, 6
  - type: text
    content: 'the anger of the '
  - type: heading
    content: Lord
  - type: text
    content: ' was aroused against Israel, and He moved David against them to say, '
  - type: note
    content: 2 Sam. 21:1, 2
  - type: text
    content: “Go, number Israel and Judah.”
  '10':
  - type: text
    content: 'And '
  - type: note
    content: 1 Chr. 21:5
  - type: text
    content: 'David’s heart condemned him after he had numbered the people. So '
  - type: note
    content: 1 Sam. 24:5
  - type: text
    content: 'David said to the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 2 Sam. 23:1
  - type: text
    content: '“I have sinned greatly in what I have done; but now, I pray, O '
  - type: heading
    content: Lord
  - type: text
    content: ', take away the iniquity of Your servant, for I have '
  - type: note
    content: 2 Sam. 12:13
  - type: text
    content: done very foolishly.”
  '11':
  - type: text
    content: 'Now when David arose in the morning, the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to the prophet '
  - type: note
    content: 1 Sam. 13:13; (2 Chr. 16:9)
  - type: text
    content: 'Gad, David’s '
  - type: note
    content: 1 Sam. 22:5
  - type: text
    content: 'seer, saying, '
  '12':
  - type: text
    content: '“Go and tell David, ‘Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': “I offer you three '
  - type: text
    content: things;
  - type: text
    content: ' choose one of them for yourself, that I may do '
  - type: text
    content: it
  - type: text
    content: ' to you.” ’ ” '
  '13':
  - type: text
    content: 'So Gad came to David and told him; and he said to him, “Shall '
  - type: note
    content: 1 Sam. 9:9; 1 Chr. 29:29
  - type: text
    content: seven years of famine come to you in your land? Or shall you flee three months before your enemies, while they pursue you? Or shall there be three days’ plague in your land? Now consider and see what answer I should take back to Him who sent me.”
  '14':
  - type: text
    content: 'And David said to Gad, “I am in great distress. Please let us fall into the hand of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ezek. 14:21
  - type: text
    content: 'for His mercies '
  - type: text
    content: are
  - type: text
    content: ' great; but '
  - type: note
    content: (Ps. 51:1; 103:8, 13, 14; 119:156; 130:4, 7)
  - type: text
    content: do not let me fall into the hand of man.”
  '15':
  - type: text
    content: 'So '
  - type: note
    content: (Is. 47:6; Zech. 1:15)
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' sent a plague upon Israel from the morning till the appointed time. From Dan to Beersheba seventy thousand men of the people died. '
  '16':
  - type: note
    content: 1 Chr. 21:14
  - type: text
    content: 'And when the angel stretched out His hand over Jerusalem to destroy it, '
  - type: note
    content: Ex. 12:23; 2 Kin. 19:35; Acts 12:23
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' relented from the destruction, and said to the angel who was destroying the people, “It is enough; now restrain your hand.” And the angel of the '
  - type: heading
    content: Lord
  - type: text
    content: ' was by the threshing floor of Araunah the Jebusite.'
  '17':
  - type: text
    content: 'Then David spoke to the '
  - type: heading
    content: Lord
  - type: text
    content: ' when he saw the angel who was striking the people, and said, “Surely '
  - type: note
    content: Gen. 6:6; 1 Sam. 15:11
  - type: text
    content: I have sinned, and I have done wickedly; but these sheep, what have they done? Let Your hand, I pray, be against me and against my father’s house.”
  - type: heading
    content: The Altar on the Threshing Floor
  '18':
  - type: text
    content: 'And Gad came that day to David and said to him, '
  - type: note
    content: 2 Sam. 7:8; 1 Chr. 21:17; Ps. 74:1
  - type: text
    content: '“Go up, erect an altar to the '
  - type: heading
    content: Lord
  - type: text
    content: ' on the threshing floor of Araunah the Jebusite.” '
  '19':
  - type: text
    content: 'So David, according to the word of Gad, went up as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded. '
  '2':
  - type: text
    content: 'So the king said to Joab the commander of the army who '
  - type: text
    content: was
  - type: text
    content: ' with him, “Now go throughout all the tribes of Israel, '
  - type: note
    content: Num. 26:2; 1 Chr. 27:23, 24
  - type: text
    content: 'from Dan to Beersheba, and count the people, that '
  - type: note
    content: Judg. 20:1; 2 Sam. 3:10
  - type: text
    content: I may know the number of the people.”
  '20':
  - type: text
    content: Now Araunah looked, and saw the king and his servants coming toward him. So Araunah went out and bowed before the king with his face to the ground.
  '21':
  - type: text
    content: Then Araunah said, “Why has my lord the king come to his servant?”
  - type: note
    content: 1 Chr. 21:18
  - type: text
    content: 'And David said, “To buy the threshing floor from you, to build an altar to the '
  - type: heading
    content: Lord
  - type: text
    content: ', that '
  - type: note
    content: Gen. 23:8–16
  - type: text
    content: the plague may be withdrawn from the people.”
  '22':
  - type: text
    content: 'Now Araunah said to David, “Let my lord the king take and offer up whatever '
  - type: text
    content: seems
  - type: text
    content: ' good to him. '
  - type: note
    content: Num. 16:48, 50
  - type: text
    content: 'Look, '
  - type: text
    content: here
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' oxen for burnt sacrifice, and threshing implements and the yokes of the oxen for wood. '
  '23':
  - type: text
    content: All these, O king, Araunah has given to the king.”
  - type: text
    content: 'And Araunah said to the king, “May the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: 1 Sam. 6:14; 1 Kin. 19:21
  - type: text
    content: accept you.”
  '24':
  - type: text
    content: 'Then the king said to Araunah, “No, but I will surely buy '
  - type: text
    content: it
  - type: text
    content: ' from you for a price; nor will I offer burnt offerings to the '
  - type: heading
    content: Lord
  - type: text
    content: ' my God with that which costs me nothing.” So '
  - type: note
    content: (Ezek. 20:40, 41)
  - type: text
    content: 'David bought the threshing floor and the oxen for fifty shekels of silver. '
  '25':
  - type: text
    content: 'And David built there an altar to the '
  - type: heading
    content: Lord
  - type: text
    content: ', and offered burnt offerings and peace offerings. '
  - type: note
    content: 1 Chr. 21:24, 25
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' heeded the prayers for the land, and '
  - type: note
    content: 2 Sam. 21:14
  - type: text
    content: the plague was withdrawn from Israel.
  '3':
  - type: text
    content: 'And Joab said to the king, “Now may the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: (Jer. 17:5)
  - type: text
    content: 'add to the people a hundred times more than there are, and may the eyes of my lord the king see '
  - type: text
    content: it.
  - type: text
    content: ' But why does my lord the king desire this thing?” '
  '4':
  - type: text
    content: Nevertheless the king’s word prevailed against Joab and against the captains of the army. Therefore Joab and the captains of the army went out from the presence of the king to count the people of Israel.
  '5':
  - type: text
    content: 'And they crossed over the Jordan and camped in '
  - type: note
    content: Deut. 1:11
  - type: text
    content: 'Aroer, on the right side of the town which '
  - type: text
    content: is
  - type: text
    content: ' in the midst of the ravine of Gad, and toward '
  - type: note
    content: Deut. 2:36; Josh. 13:9, 16
  - type: text
    content: 'Jazer. '
  '6':
  - type: text
    content: 'Then they came to Gilead and to the land of Tahtim Hodshi; they came to '
  - type: note
    content: Num. 32:1, 3
  - type: text
    content: 'Dan Jaan and around to '
  - type: note
    content: Josh. 19:47; Judg. 18:29
  - type: text
    content: 'Sidon; '
  '7':
  - type: text
    content: 'and they came to the stronghold of '
  - type: note
    content: Josh. 19:28; Judg. 18:28
  - type: text
    content: 'Tyre and to all the cities of the '
  - type: note
    content: Josh. 19:29
  - type: text
    content: 'Hivites and the Canaanites. Then they went out to South Judah '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: far
  - type: text
    content: ' '
  - type: text
    content: as
  - type: text
    content: ' Beersheba. '
  '8':
  - type: text
    content: 'So when they had gone through all the land, they came to Jerusalem at the end of nine months and twenty days. '
  '9':
  - type: text
    content: 'Then Joab gave the sum of the number of the people to the king. '
  - type: note
    content: Josh. 11:3; Judg. 3:3
  - type: text
    content: And there were in Israel eight hundred thousand valiant men who drew the sword, and the men of Judah were five hundred thousand men.
  - type: heading
    content: The Judgment on David’s Sin
