document_id: 1CH.18,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Further Conquests
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After this '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:1–18
      marker-yv: yv-n
    - type: text
      text: 'it came to pass that David attacked the Philistines, subdued them, and took Gath and its towns from the hand of the Philistines. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'he sent Hadoram his son to King David, to greet him and bless him, because he had fought against Hadadezer and defeated him (for Hadadezer had been at war with Tou); and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hadoram
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: brought
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' all kinds of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:10–12
      marker-yv: yv-n
    - type: text
      text: 'articles of gold, silver, and bronze. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'King David also dedicated these to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', along with the silver and gold that he had brought from all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' nations—from Edom, from Moab, from the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 10:14
      marker-yv: yv-n
    - type: text
      text: 'people of Ammon, from the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:17–25
      marker-yv: yv-n
    - type: text
      text: 'Philistines, and from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 1:1
      marker-yv: yv-n
    - type: text
      text: Amalek.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Moreover '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 23:18; 1 Chr. 2:16
      marker-yv: yv-n
    - type: text
      text: 'Abishai the son of Zeruiah killed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:13
      marker-yv: yv-n
    - type: text
      text: 'eighteen thousand Edomites in the Valley of Salt. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 27:29–40; Num. 24:18; 2 Sam. 8:14
      marker-yv: yv-n
    - type: text
      text: 'He also put garrisons in Edom, and all the Edomites became David’s servants. And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' preserved David wherever he went.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Administration
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So David reigned over all Israel, and administered judgment and justice to all his people. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Joab the son of Zeruiah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' over the army; Jehoshaphat the son of Ahilud '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' recorder; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Zadok the son of Ahitub and Abimelech the son of Abiathar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the priests; Shavsha '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the scribe; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:18
      marker-yv: yv-n
    - type: text
      text: 'Benaiah the son of Jehoiada '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' over the Cherethites and the Pelethites; and David’s sons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' chief ministers at the king’s side.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then he defeated '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:2; Zeph. 2:9
      marker-yv: yv-n
    - type: text
      text: 'Moab, and the Moabites became David’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 60:8
      marker-yv: yv-n
    - type: text
      text: 'servants, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brought tribute.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:3
      marker-yv: yv-n
    - type: text
      text: 'David defeated Hadadezer king of Zobah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: far
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' Hamath, as he went to establish his power by the River Euphrates. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'David took from him one thousand chariots, seven thousand horsemen, and twenty thousand foot soldiers. Also David hamstrung all the chariot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: horses,
    - type: text
      text: ' except that he spared enough of them for one hundred chariots.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'When the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:5, 6; 1 Kin. 11:23–25
      marker-yv: yv-n
    - type: text
      text: 'Syrians of Damascus came to help Hadadezer king of Zobah, David killed twenty-two thousand of the Syrians. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then David put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: garrisons
    - type: text
      text: ' in Syria of Damascus; and the Syrians became David’s servants, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brought tribute. So the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' preserved David wherever he went. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And David took the shields of gold that were on the servants of Hadadezer, and brought them to Jerusalem. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Also from Tibhath and from Chun, cities of Hadadezer, David brought a large amount of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:8
      marker-yv: yv-n
    - type: text
      text: 'bronze, with which '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:15, 23; 2 Chr. 4:12, 15, 16
      marker-yv: yv-n
    - type: text
      text: Solomon made the bronze Sea, the pillars, and the articles of bronze.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now when Tou king of Hamath heard that David had defeated all the army of Hadadezer king of Zobah, '
