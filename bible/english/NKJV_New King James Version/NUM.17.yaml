document_id: NUM.17,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Budding of Aaron’s Rod
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Bring '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 9:4
      marker-yv: yv-n
    - type: text
      text: 'Aaron’s rod back before the Testimony, to be kept '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:38; Deut. 9:7, 24
      marker-yv: yv-n
    - type: text
      text: 'as a sign against the rebels, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 17:5
      marker-yv: yv-n
    - type: text
      text: 'that you may put their complaints away from Me, lest they die.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Thus did Moses; just as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded him, so he did.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So the children of Israel spoke to Moses, saying, “Surely we die, we perish, we all perish! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 1:51, 53; 18:4, 7
      marker-yv: yv-n
    - type: text
      text: 'Whoever even comes near the tabernacle of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' must die. Shall we all utterly die?”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Speak to the children of Israel, and get from them a rod from each father’s house, all their leaders according to their fathers’ houses—twelve rods. Write each man’s name on his rod. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And you shall write Aaron’s name on the rod of Levi. For there shall be one rod for the head of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: each
    - type: text
      text: ' father’s house. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then you shall place them in the tabernacle of meeting before '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:16
      marker-yv: yv-n
    - type: text
      text: 'the Testimony, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:22; 29:42, 43; 30:36; Num. 17:7
      marker-yv: yv-n
    - type: text
      text: 'where I meet with you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And it shall be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' the rod of the man '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:5
      marker-yv: yv-n
    - type: text
      text: 'whom I choose will blossom; thus I will rid Myself of the complaints of the children of Israel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:11
      marker-yv: yv-n
    - type: text
      text: which they make against you.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So Moses spoke to the children of Israel, and each of their leaders gave him a rod apiece, for each leader according to their fathers’ houses, twelve rods; and the rod of Aaron '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' among their rods. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And Moses placed the rods before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 38:21; Num. 1:50, 51; 9:15; 18:2; Acts 7:44
      marker-yv: yv-n
    - type: text
      text: the tabernacle of witness.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Now it came to pass on the next day that Moses went into the tabernacle of witness, and behold, the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ezek. 17:24); Heb. 9:4
      marker-yv: yv-n
    - type: text
      text: 'rod of Aaron, of the house of Levi, had sprouted and put forth buds, had produced blossoms and yielded ripe almonds. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then Moses brought out all the rods from before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to all the children of Israel; and they looked, and each man took his rod.'
