document_id: NUM.17,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Budding of Aaron’s Rod
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '10':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses, “Bring '
  - type: note
    content: Heb. 9:4
  - type: text
    content: 'Aaron’s rod back before the Testimony, to be kept '
  - type: note
    content: Num. 16:38; Deut. 9:7, 24
  - type: text
    content: 'as a sign against the rebels, '
  - type: note
    content: Num. 17:5
  - type: text
    content: 'that you may put their complaints away from Me, lest they die.” '
  '11':
  - type: text
    content: 'Thus did Moses; just as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded him, so he did.'
  '12':
  - type: text
    content: 'So the children of Israel spoke to Moses, saying, “Surely we die, we perish, we all perish! '
  '13':
  - type: note
    content: Num. 1:51, 53; 18:4, 7
  - type: text
    content: 'Whoever even comes near the tabernacle of the '
  - type: heading
    content: Lord
  - type: text
    content: ' must die. Shall we all utterly die?”'
  '2':
  - type: text
    content: '“Speak to the children of Israel, and get from them a rod from each father’s house, all their leaders according to their fathers’ houses—twelve rods. Write each man’s name on his rod. '
  '3':
  - type: text
    content: 'And you shall write Aaron’s name on the rod of Levi. For there shall be one rod for the head of '
  - type: text
    content: each
  - type: text
    content: ' father’s house. '
  '4':
  - type: text
    content: 'Then you shall place them in the tabernacle of meeting before '
  - type: note
    content: Ex. 25:16
  - type: text
    content: 'the Testimony, '
  - type: note
    content: Ex. 25:22; 29:42, 43; 30:36; Num. 17:7
  - type: text
    content: 'where I meet with you. '
  '5':
  - type: text
    content: 'And it shall be '
  - type: text
    content: that
  - type: text
    content: ' the rod of the man '
  - type: note
    content: Num. 16:5
  - type: text
    content: 'whom I choose will blossom; thus I will rid Myself of the complaints of the children of Israel, '
  - type: note
    content: Num. 16:11
  - type: text
    content: which they make against you.”
  '6':
  - type: text
    content: 'So Moses spoke to the children of Israel, and each of their leaders gave him a rod apiece, for each leader according to their fathers’ houses, twelve rods; and the rod of Aaron '
  - type: text
    content: was
  - type: text
    content: ' among their rods. '
  '7':
  - type: text
    content: 'And Moses placed the rods before the '
  - type: heading
    content: Lord
  - type: text
    content: ' in '
  - type: note
    content: Ex. 38:21; Num. 1:50, 51; 9:15; 18:2; Acts 7:44
  - type: text
    content: the tabernacle of witness.
  '8':
  - type: text
    content: 'Now it came to pass on the next day that Moses went into the tabernacle of witness, and behold, the '
  - type: note
    content: (Ezek. 17:24); Heb. 9:4
  - type: text
    content: 'rod of Aaron, of the house of Levi, had sprouted and put forth buds, had produced blossoms and yielded ripe almonds. '
  '9':
  - type: text
    content: 'Then Moses brought out all the rods from before the '
  - type: heading
    content: Lord
  - type: text
    content: ' to all the children of Israel; and they looked, and each man took his rod.'
