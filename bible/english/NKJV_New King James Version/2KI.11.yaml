  '3':
  - type: text
    content: 'So he was hidden with her in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' for six years, while Athaliah reigned over the land.'
  - type: heading
    content: Joash Crowned King of Judah
  '4':
  - type: text
    content: 'In '
  - type: note
    content: 2 Kin. 12:2; 2 Chr. 23:1
  - type: text
    content: 'the seventh year Jehoiada sent and brought the captains of hundreds—of the bodyguards and the escorts—and brought them into the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' to him. And he made a covenant with them and took an oath from them in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and showed them the king’s son. '
  '5':
  - type: text
    content: 'Then he commanded them, saying, “This '
  - type: text
    content: is
  - type: text
    content: ' what you shall do: one-third of you who come on duty '
  - type: note
    content: 1 Chr. 9:25
  - type: text
    content: 'on the Sabbath shall be keeping watch over the king’s house, '
  '6':
  - type: text
    content: 'one-third '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' at the gate of Sur, and one-third at the gate behind the escorts. You shall keep the watch of the house, lest it be broken down. '
  '7':
  - type: text
    content: 'The two contingents of you who go off duty on the Sabbath shall keep the watch of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' for the king. '
  '8':
  - type: text
    content: But you shall surround the king on all sides, every man with his weapons in his hand; and whoever comes within range, let him be put to death. You are to be with the king as he goes out and as he comes in.”
  '9':
  - type: note
    content: 2 Chr. 23:8
  - type: text
    content: 'So the captains of the hundreds did according to all that Jehoiada the priest commanded. Each of them took his men who were to be on duty on the Sabbath, with those who were going off duty on the Sabbath, and came to Jehoiada the priest. '
