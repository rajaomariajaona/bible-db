document_id: 2KI.11,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Athaliah Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 22:10
      marker-yv: yv-n
    - type: text
      text: 'Athaliah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 8:26
      marker-yv: yv-n
    - type: text
      text: 'the mother of Ahaziah saw that her son was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 9:27
      marker-yv: yv-n
    - type: text
      text: 'dead, she arose and destroyed all the royal heirs. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the priest gave the captains of hundreds the spears and shields which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belonged
    - type: text
      text: ' to King David, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:7; 1 Chr. 18:7
      marker-yv: yv-n
    - type: text
      text: 'that were in the temple of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the escorts stood, every man with his weapons in his hand, all around the king, from the right side of the temple to the left side of the temple, by the altar and the house. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he brought out the king’s son, put the crown on him, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gave
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:16; 31:18
      marker-yv: yv-n
    - type: text
      text: 'Testimony; they made him king and anointed him, and they clapped their hands and said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 10:24
      marker-yv: yv-n
    - type: text
      text: “Long live the king!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Death of Athaliah
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 8:26; 2 Chr. 23:12
      marker-yv: yv-n
    - type: text
      text: 'Now when Athaliah heard the noise of the escorts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the people, she came to the people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' the temple of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When she looked, there was the king standing by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:3; 2 Chr. 34:31
      marker-yv: yv-n
    - type: text
      text: a pillar according to custom; and the leaders and the trumpeters were by the king. All the people of the land were rejoicing and blowing trumpets. So Athaliah tore her clothes and cried out, “Treason! Treason!”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoiada the priest commanded the captains of the hundreds, the officers of the army, and said to them, “Take her outside under guard, and slay with the sword whoever follows her.” For the priest had said, “Do not let her be killed in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they seized her; and she went by way of the horses’ entrance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: into
    - type: text
      text: ' the king’s house, and there she was killed.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 23:16
      marker-yv: yv-n
    - type: text
      text: 'Then Jehoiada '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 24:24, 25; 2 Chr. 15:12–15
      marker-yv: yv-n
    - type: text
      text: 'made a covenant between the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the king, and the people, that they should be the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s people, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: also
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:3
      marker-yv: yv-n
    - type: text
      text: 'between the king and the people. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the people of the land went to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 10:26, 27
      marker-yv: yv-n
    - type: text
      text: 'temple of Baal, and tore it down. They thoroughly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 12:3)
      marker-yv: yv-n
    - type: text
      text: 'broke in pieces its altars and images, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 18:40; 2 Kin. 10:11
      marker-yv: yv-n
    - type: text
      text: 'killed Mattan the priest of Baal before the altars. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 23:18
      marker-yv: yv-n
    - type: text
      text: 'the priest appointed officers over the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he took the captains of hundreds, the bodyguards, the escorts, and all the people of the land; and they brought the king down from the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and went by way of the gate of the escorts to the king’s house. Then he sat on the throne of the kings. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jehosheba, the daughter of King Joram, sister of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 8:25
      marker-yv: yv-n
    - type: text
      text: 'Ahaziah, took Joash the son of Ahaziah, and stole him away from among the king’s sons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' being murdered; and they hid him and his nurse in the bedroom, from Athaliah, so that he was not killed. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all the people of the land rejoiced; and the city was quiet, for they had slain Athaliah with the sword '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' the king’s house. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoash '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 24:1–14
      marker-yv: yv-n
    - type: text
      text: seven years old when he became king.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he was hidden with her in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for six years, while Athaliah reigned over the land.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joash Crowned King of Judah
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 12:2; 2 Chr. 23:1
      marker-yv: yv-n
    - type: text
      text: 'the seventh year Jehoiada sent and brought the captains of hundreds—of the bodyguards and the escorts—and brought them into the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to him. And he made a covenant with them and took an oath from them in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and showed them the king’s son. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he commanded them, saying, “This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' what you shall do: one-third of you who come on duty '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 9:25
      marker-yv: yv-n
    - type: text
      text: 'on the Sabbath shall be keeping watch over the king’s house, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'one-third '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' at the gate of Sur, and one-third at the gate behind the escorts. You shall keep the watch of the house, lest it be broken down. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The two contingents of you who go off duty on the Sabbath shall keep the watch of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for the king. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you shall surround the king on all sides, every man with his weapons in his hand; and whoever comes within range, let him be put to death. You are to be with the king as he goes out and as he comes in.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 23:8
      marker-yv: yv-n
    - type: text
      text: 'So the captains of the hundreds did according to all that Jehoiada the priest commanded. Each of them took his men who were to be on duty on the Sabbath, with those who were going off duty on the Sabbath, and came to Jehoiada the priest. '
