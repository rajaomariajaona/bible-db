  - type: text
    content: a pillar according to custom; and the leaders and the trumpeters were by the king. All the people of the land were rejoicing and blowing trumpets. So Athaliah tore her clothes and cried out, “Treason! Treason!”
  '15':
  - type: text
    content: 'And Jehoiada the priest commanded the captains of the hundreds, the officers of the army, and said to them, “Take her outside under guard, and slay with the sword whoever follows her.” For the priest had said, “Do not let her be killed in the house of the '
  - type: heading
