  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' being murdered; and they hid him and his nurse in the bedroom, from Athaliah, so that he was not killed. '
  '20':
  - type: text
    content: 'So all the people of the land rejoiced; and the city was quiet, for they had slain Athaliah with the sword '
  - type: text
    content: in
  - type: text
    content: ' the king’s house. '
