    content: 2 Kin. 8:8, 9; 2 Chr. 32:31; Is. 39:1–8
  - type: text
    content: 'At that time Berodach-Baladan the son of Baladan, king of Babylon, sent letters and a present to Hezekiah, for he heard that Hezekiah had been sick. '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: 2 Kin. 16:9; 2 Chr. 32:27, 31
  - type: text
    content: Hezekiah was attentive to them, and showed them all the house of his treasures—the silver and gold, the spices and precious ointment, and all his armory—all that was found among his treasures. There was nothing in his house or in all his dominion that Hezekiah did not show them.
  '14':
  - type: text
    content: Then Isaiah the prophet went to King Hezekiah, and said to him, “What did these men say, and from where did they come to you?”
  - type: text
    content: So Hezekiah said, “They came from a far country, from Babylon.”
  '15':
