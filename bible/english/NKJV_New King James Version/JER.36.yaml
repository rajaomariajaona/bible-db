  - type: text
    content: a
  - type: text
    content: ' '
  - type: text
    content: fire
  - type: text
    content: ' burning on the hearth before him. '
  '23':
  - type: text
    content: 'And it happened, when Jehudi had read three or four columns, '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: king
  - type: text
