  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 32:3
    marker-yv: yv-n
  - type: text
    text: '‘Why have you written in it that the king of Babylon will certainly come and destroy this land, and cause man and beast to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 25:9–11; 26:9
    marker-yv: yv-n
  - type: text
