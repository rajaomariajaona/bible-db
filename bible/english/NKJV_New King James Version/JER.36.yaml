  - type: text
    content: ' into the fire that '
  - type: text
    content: was
  - type: text
    content: ' on the hearth, until all the scroll was consumed in the fire that '
  - type: text
    content: was
  - type: text
    content: ' on the hearth. '
  '24':
  - type: text
    content: 'Yet they were '
  - type: note
    content: (Ps. 36:1); Jer. 36:16
  - type: text
    content: 'not afraid, nor did they '
  - type: note
    content: Gen. 37:29, 34; 2 Sam. 1:11; 1 Kin. 21:27; 2 Kin. 19:1, 2; 22:11; Is. 36:22; 37:1; Jon. 3:6
  - type: text
    content: 'tear their garments, the king nor any of his servants who heard all these words. '
  '25':
  - type: text
    content: 'Nevertheless Elnathan, Delaiah, and Gemariah implored the king not to burn the scroll; but he would not listen to them. '
  '26':
  - type: text
    content: 'And the king commanded Jerahmeel the king’s son, Seraiah the son of Azriel, and Shelemiah the son of Abdeel, to seize Baruch the scribe and Jeremiah the prophet, but the '
  - type: heading
    content: Lord
  - type: text
    content: ' hid them.'
  - type: heading
    content: Jeremiah Rewrites the Scroll
  '27':
  - type: text
    content: 'Now after the king had burned the scroll with the words which Baruch had written at the instruction of Jeremiah, the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to Jeremiah, saying: '
  '28':
  - type: text
    content: '“Take yet another scroll, and write on it all the former words that were in the first scroll which Jehoiakim the king of Judah has burned. '
  '29':
  - type: text
    content: 'And you shall say to Jehoiakim king of Judah, ‘Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': “You have burned this scroll, saying, '
  - type: note
    content: Jer. 32:3
  - type: text
    content: '‘Why have you written in it that the king of Babylon will certainly come and destroy this land, and cause man and beast to '
  - type: note
    content: Jer. 25:9–11; 26:9
  - type: text
    content: 'cease from here?’ ” '
  '3':
  - type: text
    content: 'It '
  - type: note
    content: Jer. 26:3; Ezek. 12:3
  - type: text
    content: 'may be that the house of Judah will hear all the adversities which I purpose to bring upon them, that everyone may '
  - type: note
    content: (Deut. 30:2, 8; 1 Sam. 7:3); Is. 55:7; Jer. 18:8; Jon. 3:8
  - type: text
    content: turn from his evil way, that I may forgive their iniquity and their sin.”
  '30':
  - type: text
    content: 'Therefore thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' concerning Jehoiakim king of Judah: '
  - type: note
    content: Jer. 22:30
  - type: text
    content: '“He shall have no one to sit on the throne of David, and his dead body shall be '
  - type: note
    content: Jer. 22:19
  - type: text
    content: 'cast out to the heat of the day and the frost of the night. '
  '31':
  - type: text
    content: I will punish him, his family, and his servants for their iniquity; and I will bring on them, on the inhabitants of Jerusalem, and on the men of Judah all the doom that I have pronounced against them; but they did not heed.” ’ ”
  '32':
  - type: text
    content: Then Jeremiah took another scroll and gave it to Baruch the scribe, the son of Neriah, who wrote on it at the instruction of Jeremiah all the words of the book which Jehoiakim king of Judah had burned in the fire. And besides, there were added to them many similar words.
  '4':
  - type: text
    content: 'Then Jeremiah '
  - type: note
    content: Jer. 32:12
  - type: text
    content: 'called Baruch the son of Neriah; and '
  - type: note
    content: Jer. 45:1
  - type: text
    content: 'Baruch wrote on a scroll of a book, at the instruction of Jeremiah, all the words of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He had spoken to him. '
  '5':
  - type: text
    content: 'And Jeremiah commanded Baruch, saying, “I '
  - type: text
    content: am
  - type: text
    content: ' confined, I cannot go into the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'You go, therefore, and read from the scroll which you have written at my instruction, the words of the '
  - type: heading
    content: Lord
  - type: text
    content: ', in the hearing of the people in the '
  - type: heading
    content: Lord
  - type: text
    content: '’s house on '
  - type: note
    content: Lev. 16:29; 23:27–32; Acts 27:9
  - type: text
    content: 'the day of fasting. And you shall also read them in the hearing of all Judah who come from their cities. '
  '7':
  - type: text
    content: 'It may be that they will present their supplication before the '
  - type: heading
    content: Lord
  - type: text
    content: ', and everyone will turn from his evil way. For great '
  - type: text
    content: is
  - type: text
    content: ' the anger and the fury that the '
  - type: heading
    content: Lord
  - type: text
    content: ' has pronounced against this people.” '
  '8':
  - type: text
    content: 'And Baruch the son of Neriah did according to all that Jeremiah the prophet commanded him, reading from the book the words of the '
  - type: heading
    content: Lord
  - type: text
    content: ' in the '
  - type: heading
    content: Lord
  - type: text
    content: ’s house.
  '9':
  - type: text
    content: 'Now it came to pass in the fifth year of Jehoiakim the son of Josiah, king of Judah, in the ninth month, '
  - type: text
    content: that
  - type: text
    content: ' they proclaimed a fast before the '
  - type: heading
