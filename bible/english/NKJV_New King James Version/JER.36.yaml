  '13':
  - type: text
    content: 'Then Michaiah declared to them all the words that he had heard when Baruch read the book in the hearing of the people. '
  '14':
  - type: text
    content: 'Therefore all the princes sent Jehudi the son of Nethaniah, the son of Shelemiah, the son of Cushi, to Baruch, saying, “Take in your hand the scroll from which you have read in the hearing of the people, and come.” So Baruch the son of Neriah took the scroll in his hand and came to them. '
  '15':
  - type: text
    content: 'And they said to him, “Sit down now, and read it in our hearing.” So Baruch read '
  - type: text
    content: it
  - type: text
    content: ' in their hearing.'
  '16':
  - type: text
    content: 'Now it happened, when they had heard all the words, that they looked in fear from one to another, and said to Baruch, “We will surely tell the king of all these words.” '
  '17':
  - type: text
    content: And they asked Baruch, saying, “Tell us now, how did you write all these words—at his instruction?”
  '18':
  - type: text
    content: 'So Baruch answered them, “He proclaimed with his mouth all these words to me, and I wrote '
  - type: text
    content: them
  - type: text
    content: ' with ink in the book.”'
  '19':
  - type: text
    content: Then the princes said to Baruch, “Go and hide, you and Jeremiah; and let no one know where you are.”
  - type: heading
    content: The King Destroys Jeremiah’s Scroll
  '2':
  - type: text
    content: '“Take a '
  - type: note
    content: Is. 8:1; Ezek. 2:9; Zech. 5:1
  - type: text
