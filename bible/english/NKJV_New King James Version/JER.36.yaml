  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Therefore thus says the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' concerning Jehoiakim king of Judah: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 22:30
    marker-yv: yv-n
  - type: text
    text: '“He shall have no one to sit on the throne of David, and his dead body shall be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 22:19
    marker-yv: yv-n
  - type: text
    text: 'cast out to the heat of the day and the frost of the night. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: I will punish him, his family, and his servants for their iniquity; and I will bring on them, on the inhabitants of Jerusalem, and on the men of Judah all the doom that I have pronounced against them; but they did not heed.” ’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Then Jeremiah took another scroll and gave it to Baruch the scribe, the son of Neriah, who wrote on it at the instruction of Jeremiah all the words of the book which Jehoiakim king of Judah had burned in the fire. And besides, there were added to them many similar words.
