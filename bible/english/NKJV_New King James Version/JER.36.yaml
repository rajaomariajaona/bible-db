  - type: note
    content: Jer. 25:3
  - type: text
    content: 'Josiah even to this day. '
  '20':
  - type: text
    content: 'And they went to the king, into the court; but they stored the scroll in the chamber of Elishama the scribe, and told all the words in the hearing of the king. '
  '21':
  - type: text
    content: 'So the king sent Jehudi to bring the scroll, and he took it from Elishama the scribe’s chamber. And Jehudi read it in the hearing of the king and in the hearing of all the princes who stood beside the king. '
  '22':
  - type: text
    content: 'Now the king was sitting in '
