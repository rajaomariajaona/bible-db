  children:
  - type: text
    text: 'Prayer for Mercy, with Meditation on the Excellencies of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A Prayer of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Bow down Your ear, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', hear me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: am
  - type: text
    text: ' poor and needy.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Preserve my life, for I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: am
  - type: text
    text: ' holy;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are my God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Save Your servant who trusts in You!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Be merciful to me, O Lord,
- type: usfm
  marker: q2
  children:
  - type: text
    text: For I cry to You all day long.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Rejoice the soul of Your servant,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 25:1; 143:8
    marker-yv: yv-n
  - type: text
    text: For to You, O Lord, I lift up my soul.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 130:7; 145:9; (Joel 2:13)
    marker-yv: yv-n
  - type: text
    text: 'You, Lord, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' good, and ready to forgive,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And abundant in mercy to all those who call upon You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Give ear, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', to my prayer;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And attend to the voice of my supplications.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: In the day of my trouble I will call upon You,
- type: usfm
  marker: q2
  children:
  - type: text
    text: For You will answer me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ex. 15:11); 2 Sam. 7:22; 1 Kin. 8:23; Ps. 89:6; Jer. 10:6
    marker-yv: yv-n
  - type: text
    text: 'Among the gods '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' none like You, O Lord;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Nor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: any
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: works
  - type: text
    text: ' like Your works.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All nations whom You have made
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shall come and worship before You, O Lord,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And shall glorify Your name.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' great, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ex. 15:11)
    marker-yv: yv-n
  - type: text
    text: do wondrous things;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 6:4; Is. 37:16; Mark 12:29; 1 Cor. 8:4
    marker-yv: yv-n
  - type: text
    text: 'You alone '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' God.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 27:11; 143:8
    marker-yv: yv-n
  - type: text
    text: 'Teach me Your way, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will walk in Your truth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Unite my heart to fear Your name.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I will praise You, O Lord my God, with all my heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I will glorify Your name forevermore.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' Your mercy toward me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And You have delivered my soul from the depths of Sheol.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: O God, the proud have risen against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And a mob of violent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: men
  - type: text
    text: ' have sought my life,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And have not set You before them.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 34:6; (Ps. 86:5)
    marker-yv: yv-n
  - type: text
    text: 'You, O Lord, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' a God full of compassion, and gracious,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Longsuffering and abundant in mercy and truth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Oh, turn to me, and have mercy on me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give Your strength to Your servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And save the son of Your maidservant.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Show me a sign for good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That those who hate me may see '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' and be ashamed,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Because You, '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have helped me and comforted me.'
