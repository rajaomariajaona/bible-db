document_id: PSA.20,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Assurance of God’s Saving Work
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answer you in the day of trouble;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May the name of the God of Jacob defend you;
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May He send you help from the sanctuary,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And strengthen you out of Zion;
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May He remember all your offerings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And accept your burnt sacrifice.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May He grant you according to your heart’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: desire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 21:2
      marker-yv: yv-n
    - type: text
      text: fulfill all your purpose.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We will rejoice in your salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And in the name of our God we will set up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' banners!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'May the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' fulfill all your petitions.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now I know that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saves His anointed;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will answer him from His holy heaven
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With the saving strength of His right hand.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Some '
    - type: usfm
      marker: it
      children:
      - type: text
        text: trust
    - type: text
      text: ' in chariots, and some in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 20:1; Ps. 33:16, 17; Prov. 21:31; Is. 31:1
      marker-yv: yv-n
    - type: text
      text: horses;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But we will remember the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God.'
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have bowed down and fallen;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But we have risen and stand upright.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Save, '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May the King answer us when we call.
