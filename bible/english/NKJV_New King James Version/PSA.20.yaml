  '1':
  - type: heading
    content: The Assurance of God’s Saving Work
  - type: text
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: 'May the '
  - type: heading
    content: Lord
  - type: text
    content: ' answer you in the day of trouble;'
  - type: text
    content: May the name of the God of Jacob defend you;
  '2':
  - type: text
    content: May He send you help from the sanctuary,
  - type: text
    content: And strengthen you out of Zion;
  '3':
  - type: text
    content: May He remember all your offerings,
  - type: text
    content: And accept your burnt sacrifice.
  - type: text
    content: Selah
  '4':
  - type: text
    content: 'May He grant you according to your heart’s '
  - type: text
    content: desire,
  - type: text
    content: 'And '
  - type: note
    content: Ps. 21:2
  - type: text
    content: fulfill all your purpose.
  '5':
  - type: text
    content: We will rejoice in your salvation,
  - type: text
    content: 'And in the name of our God we will set up '
  - type: text
    content: our
  - type: text
    content: ' banners!'
  - type: text
    content: 'May the '
  - type: heading
    content: Lord
  - type: text
    content: ' fulfill all your petitions.'
  '6':
  - type: text
    content: 'Now I know that the '
  - type: heading
    content: Lord
  - type: text
    content: ' saves His anointed;'
  - type: text
    content: He will answer him from His holy heaven
  - type: text
    content: With the saving strength of His right hand.
  '7':
  - type: text
    content: 'Some '
  - type: text
    content: trust
  - type: text
    content: ' in chariots, and some in '
  - type: note
    content: Deut. 20:1; Ps. 33:16, 17; Prov. 21:31; Is. 31:1
  - type: text
    content: horses;
  - type: text
    content: 'But we will remember the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God.'
  '8':
  - type: text
    content: They have bowed down and fallen;
  - type: text
    content: But we have risen and stand upright.
  '9':
  - type: text
    content: 'Save, '
  - type: heading
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: May the King answer us when we call.
