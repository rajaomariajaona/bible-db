  - type: text
    content: 'righteous '
  - type: text
    content: man
  - type: text
    content: ' turns from his righteousness and commits iniquity, and I lay a stumbling block before him, he shall die; because you did not give him warning, he shall die in his sin, and his righteousness which he has done shall not be remembered; but his blood I will require at your hand. '
  '21':
  - type: text
    content: 'Nevertheless if you warn the righteous '
  - type: text
    content: man
  - type: text
    content: ' that the righteous should not sin, and he does not sin, he shall surely live because he took warning; also you will have delivered your soul.”'
