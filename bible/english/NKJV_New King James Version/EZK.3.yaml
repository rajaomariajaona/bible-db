  '3':
  - type: text
    content: 'And He said to me, “Son of man, feed your belly, and fill your stomach with this scroll that I give you.” So I '
  - type: note
    content: Jer. 15:16; Rev. 10:9
  - type: text
    content: 'ate, and it was in my mouth '
  - type: note
    content: Ps. 19:10; 119:103
  - type: text
    content: like honey in sweetness.
  '4':
  - type: text
    content: 'Then He said to me: “Son of man, go to the house of Israel and speak with My words to them. '
  '5':
  - type: text
    content: 'For you '
  - type: text
    content: are
  - type: text
    content: ' not sent to a people of unfamiliar speech and of hard language, '
  - type: text
    content: but
  - type: text
    content: ' to the house of Israel, '
  '6':
  - type: text
    content: 'not to many people of unfamiliar speech and of hard language, whose words you cannot understand. Surely, '
  - type: note
    content: Jon. 3:5–10; Matt. 11:21
  - type: text
    content: 'had I sent you to them, they would have listened to you. '
  '7':
  - type: text
    content: 'But the house of Israel will not listen to you, '
  - type: note
