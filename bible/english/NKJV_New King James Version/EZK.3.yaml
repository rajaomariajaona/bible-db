  - type: text
    content: 'warning from Me: '
  '18':
  - type: text
    content: 'When I say to the wicked, ‘You shall surely die,’ and you give him no warning, nor speak to warn the wicked from his wicked way, to save his life, that same wicked '
  - type: text
    content: man
  - type: text
    content: ' '
  - type: note
    content: Ezek. 33:6; (John 8:21, 24)
  - type: text
    content: 'shall die in his iniquity; but his blood I will require at your hand. '
  '19':
  - type: text
    content: 'Yet, if you warn the wicked, and he does not turn from his wickedness, nor from his wicked way, he shall die in his iniquity; '
  - type: note
    content: Is. 49:4, 5; Ezek. 14:14, 20; Acts 18:6; 20:26; 1 Tim. 4:16
  - type: text
    content: but you have delivered your soul.
  '2':
  - type: text
    content: So I opened my mouth, and He caused me to eat that scroll.
  '20':
  - type: text
    content: '“Again, when a '
  - type: note
