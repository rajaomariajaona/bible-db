  - type: text
    content: 'eat this scroll, and go, speak to the house of Israel.” '
  '10':
  - type: text
    content: 'Moreover He said to me: “Son of man, receive into your heart all My words that I speak to you, and hear with your ears. '
  '11':
  - type: text
    content: 'And go, get to the captives, to the children of your people, and speak to them and tell them, '
  - type: note
