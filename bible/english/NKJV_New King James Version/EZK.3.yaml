  - type: text
    content: 'because they will not listen to Me; '
  - type: note
    content: Ezek. 2:4
  - type: text
    content: 'for all the house of Israel '
  - type: text
    content: are
  - type: text
    content: ' impudent and hard-hearted. '
  '8':
  - type: text
    content: 'Behold, I have made your face strong against their faces, and your forehead strong against their foreheads. '
  '9':
  - type: note
    content: Is. 50:7; Jer. 1:18; Mic. 3:8
  - type: text
    content: 'Like adamant stone, harder than flint, I have made your forehead; '
  - type: note
    content: Jer. 1:8, 17; Ezek. 2:6
  - type: text
    content: 'do not be afraid of them, nor be dismayed at their looks, though they '
  - type: text
    content: are
  - type: text
    content: ' a rebellious house.”'
