  - type: text
    content: 'noise of the wings of the living creatures that touched one another, and the noise of the wheels beside them, and a great thunderous noise. '
  '14':
  - type: text
    content: 'So the Spirit lifted me up and took me away, and I went in bitterness, in the heat of my spirit; but '
  - type: note
