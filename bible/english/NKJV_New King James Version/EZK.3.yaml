  - type: text
    content: 'Then I came to the captives at Tel Abib, who dwelt by the River Chebar; and '
  - type: note
    content: Job 2:13; Ps. 137:1
  - type: text
    content: I sat where they sat, and remained there astonished among them seven days.
  - type: heading
    content: Ezekiel Is a Watchman
  '16':
  - type: text
    content: 'Now it '
  - type: note
