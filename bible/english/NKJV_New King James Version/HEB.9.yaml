  - type: text
    content: 'blood of the covenant which God has commanded you.” '
  '21':
  - type: text
    content: 'Then likewise '
  - type: note
    content: Ex. 29:12, 36
  - type: text
    content: 'he sprinkled with blood both the tabernacle and all the vessels of the ministry. '
  '22':
  - type: text
    content: 'And according to the law almost all things are purified with blood, and '
  - type: note
    content: Lev. 17:11
  - type: text
    content: without shedding of blood there is no remission.
  - type: heading
    content: Greatness of Christ’s Sacrifice
  '23':
  - type: text
    content: 'Therefore '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' necessary that '
  - type: note
    content: Heb. 8:5
  - type: text
    content: 'the copies of the things in the heavens should be purified with these, but the heavenly things themselves with better sacrifices than these. '
  '24':
  - type: text
    content: 'For '
  - type: note
    content: Heb. 6:20
  - type: text
    content: 'Christ has not entered the holy places made with hands, '
  - type: text
    content: which
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' copies of '
  - type: note
