  - type: text
    content: 'the true, but into heaven itself, now '
  - type: note
    content: Rom. 8:34
  - type: text
    content: 'to appear in the presence of God for us; '
  '25':
  - type: text
    content: 'not that He should offer Himself often, as '
  - type: note
    content: Heb. 9:7
  - type: text
    content: 'the high priest enters the Most Holy Place every year with blood of another— '
  '26':
  - type: text
    content: 'He then would have had to suffer often since the foundation of the world; but now, once at the end of the ages, He has appeared to put away sin by the sacrifice of Himself. '
  '27':
  - type: note
    content: Gen. 3:19; Eccl. 3:20
  - type: text
    content: 'And as it is appointed for men to die once, '
  - type: note
    content: (2 Cor. 5:10); 1 John 4:17
  - type: text
    content: 'but after this the judgment, '
  '28':
  - type: text
    content: 'so '
  - type: note
    content: Rom. 6:10
  - type: text
    content: 'Christ was '
  - type: note
    content: Is. 53:12; 1 Pet. 2:24
  - type: text
    content: 'offered once to bear the sins '
  - type: note
    content: Matt. 26:28
  - type: text
    content: 'of many. To those who '
  - type: note
    content: 1 Cor. 1:7; Titus 2:13
  - type: text
    content: eagerly wait for Him He will appear a second time, apart from sin, for salvation.
  '3':
  - type: note
