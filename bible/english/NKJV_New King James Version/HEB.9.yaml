  - type: text
    content: 'the good things to come, with the greater and more perfect tabernacle not made with hands, that is, not of this creation. '
  '12':
  - type: text
    content: 'Not '
  - type: note
    content: Heb. 10:4
  - type: text
    content: 'with the blood of goats and calves, but '
  - type: note
    content: Is. 53:12; Eph. 1:7
  - type: text
    content: 'with His own blood He entered the Most Holy Place '
  - type: note
    content: Zech. 3:9
  - type: text
    content: 'once for all, '
  - type: note
    content: (Dan. 9:24)
  - type: text
    content: 'having obtained eternal redemption. '
  '13':
  - type: text
    content: 'For if '
  - type: note
    content: Lev. 16:14, 15; Heb. 9:19; 10:4
  - type: text
    content: 'the blood of bulls and goats and '
  - type: note
    content: Num. 19:2
  - type: text
    content: 'the ashes of a heifer, sprinkling the unclean, sanctifies for the purifying of the flesh, '
  '14':
  - type: text
    content: 'how much more shall the blood of Christ, who through the eternal Spirit offered Himself without spot to God, '
  - type: note
    content: 1 John 1:7
  - type: text
    content: 'cleanse your conscience from '
  - type: note
    content: Heb. 6:1
  - type: text
    content: 'dead works '
  - type: note
    content: Luke 1:74
  - type: text
    content: 'to serve the living God? '
  '15':
  - type: text
    content: 'And for this reason '
  - type: note
    content: Rom. 3:25
  - type: text
    content: 'He is the Mediator of the new covenant, by means of death, for the redemption of the transgressions under the first covenant, that '
  - type: note
    content: Heb. 3:1
  - type: text
    content: those who are called may receive the promise of the eternal inheritance.
  - type: heading
    content: The Mediator’s Death Necessary
  '16':
  - type: text
    content: 'For where there '
  - type: text
    content: is
  - type: text
    content: ' a testament, there must also of necessity be the death of the testator. '
  '17':
  - type: text
    content: 'For '
  - type: note
    content: Gal. 3:15
  - type: text
    content: 'a testament '
  - type: text
    content: is
  - type: text
    content: ' in force after men are dead, since it has no power at all while the testator lives. '
  '18':
  - type: note
    content: Ex. 24:6
  - type: text
    content: 'Therefore not even the first '
  - type: text
    content: covenant
  - type: text
    content: ' was dedicated without blood. '
  '19':
  - type: text
    content: 'For when Moses had spoken every precept to all the people according to the law, '
  - type: note
    content: Ex. 24:5, 6
  - type: text
    content: 'he took the blood of calves and goats, '
  - type: note
    content: Lev. 14:4, 7; Num. 19:6, 18
  - type: text
    content: 'with water, scarlet wool, and hyssop, and sprinkled both the book itself and all the people, '
