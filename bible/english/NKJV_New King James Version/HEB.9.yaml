document_id: HEB.9,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Earthly Sanctuary
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then indeed, even the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: covenant
    - type: text
      text: ' had ordinances of divine service and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:8; (Heb. 8:2; 9:11, 24)
      marker-yv: yv-n
    - type: text
      text: 'the earthly sanctuary. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: it
      children:
      - type: text
        text: concerned
    - type: text
      text: ' only with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:2; Col. 2:16
      marker-yv: yv-n
    - type: text
      text: 'foods and drinks, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 19:7
      marker-yv: yv-n
    - type: text
      text: 'various washings, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 2:15
      marker-yv: yv-n
    - type: text
      text: and fleshly ordinances imposed until the time of reformation.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Heavenly Sanctuary
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But Christ came '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' High Priest of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eph. 1:3–11); Heb. 10:1
      marker-yv: yv-n
    - type: text
      text: 'the good things to come, with the greater and more perfect tabernacle not made with hands, that is, not of this creation. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 10:4
      marker-yv: yv-n
    - type: text
      text: 'with the blood of goats and calves, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 53:12; Eph. 1:7
      marker-yv: yv-n
    - type: text
      text: 'with His own blood He entered the Most Holy Place '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 3:9
      marker-yv: yv-n
    - type: text
      text: 'once for all, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Dan. 9:24)
      marker-yv: yv-n
    - type: text
      text: 'having obtained eternal redemption. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For if '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 16:14, 15; Heb. 9:19; 10:4
      marker-yv: yv-n
    - type: text
      text: 'the blood of bulls and goats and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 19:2
      marker-yv: yv-n
    - type: text
      text: 'the ashes of a heifer, sprinkling the unclean, sanctifies for the purifying of the flesh, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'how much more shall the blood of Christ, who through the eternal Spirit offered Himself without spot to God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 John 1:7
      marker-yv: yv-n
    - type: text
      text: 'cleanse your conscience from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 6:1
      marker-yv: yv-n
    - type: text
      text: 'dead works '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 1:74
      marker-yv: yv-n
    - type: text
      text: 'to serve the living God? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And for this reason '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 3:25
      marker-yv: yv-n
    - type: text
      text: 'He is the Mediator of the new covenant, by means of death, for the redemption of the transgressions under the first covenant, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 3:1
      marker-yv: yv-n
    - type: text
      text: those who are called may receive the promise of the eternal inheritance.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Mediator’s Death Necessary
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For where there '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a testament, there must also of necessity be the death of the testator. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 3:15
      marker-yv: yv-n
    - type: text
      text: 'a testament '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in force after men are dead, since it has no power at all while the testator lives. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 24:6
      marker-yv: yv-n
    - type: text
      text: 'Therefore not even the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: covenant
    - type: text
      text: ' was dedicated without blood. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For when Moses had spoken every precept to all the people according to the law, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 24:5, 6
      marker-yv: yv-n
    - type: text
      text: 'he took the blood of calves and goats, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:4, 7; Num. 19:6, 18
      marker-yv: yv-n
    - type: text
      text: 'with water, scarlet wool, and hyssop, and sprinkled both the book itself and all the people, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For a tabernacle was prepared: the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: part,
    - type: text
      text: ' in which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the lampstand, the table, and the showbread, which is called the sanctuary; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 26:28)
      marker-yv: yv-n
    - type: text
      text: '“This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 24:3–8
      marker-yv: yv-n
    - type: text
      text: 'blood of the covenant which God has commanded you.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then likewise '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:12, 36
      marker-yv: yv-n
    - type: text
      text: 'he sprinkled with blood both the tabernacle and all the vessels of the ministry. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And according to the law almost all things are purified with blood, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 17:11
      marker-yv: yv-n
    - type: text
      text: without shedding of blood there is no remission.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greatness of Christ’s Sacrifice
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' necessary that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 8:5
      marker-yv: yv-n
    - type: text
      text: 'the copies of the things in the heavens should be purified with these, but the heavenly things themselves with better sacrifices than these. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 6:20
      marker-yv: yv-n
    - type: text
      text: 'Christ has not entered the holy places made with hands, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' copies of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 8:2
      marker-yv: yv-n
    - type: text
      text: 'the true, but into heaven itself, now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 8:34
      marker-yv: yv-n
    - type: text
      text: 'to appear in the presence of God for us; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'not that He should offer Himself often, as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 9:7
      marker-yv: yv-n
    - type: text
      text: 'the high priest enters the Most Holy Place every year with blood of another— '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'He then would have had to suffer often since the foundation of the world; but now, once at the end of the ages, He has appeared to put away sin by the sacrifice of Himself. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 3:19; Eccl. 3:20
      marker-yv: yv-n
    - type: text
      text: 'And as it is appointed for men to die once, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 5:10); 1 John 4:17
      marker-yv: yv-n
    - type: text
      text: 'but after this the judgment, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'so '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 6:10
      marker-yv: yv-n
    - type: text
      text: 'Christ was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 53:12; 1 Pet. 2:24
      marker-yv: yv-n
    - type: text
      text: 'offered once to bear the sins '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 26:28
      marker-yv: yv-n
    - type: text
      text: 'of many. To those who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 1:7; Titus 2:13
      marker-yv: yv-n
    - type: text
      text: eagerly wait for Him He will appear a second time, apart from sin, for salvation.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:31–35; 40:3
      marker-yv: yv-n
    - type: text
      text: 'and behind the second veil, the part of the tabernacle which is called the Holiest of All, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'which had the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 16:12
      marker-yv: yv-n
    - type: text
      text: 'golden censer and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:10
      marker-yv: yv-n
    - type: text
      text: 'the ark of the covenant overlaid on all sides with gold, in which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 16:33
      marker-yv: yv-n
    - type: text
      text: 'the golden pot that had the manna, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 17:1–10
      marker-yv: yv-n
    - type: text
      text: 'Aaron’s rod that budded, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:16; 34:29; Deut. 10:2–5
      marker-yv: yv-n
    - type: text
      text: 'the tablets of the covenant; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:17, 20; Lev. 16:2; 1 Kin. 8:7
      marker-yv: yv-n
    - type: text
      text: above it were the cherubim of glory overshadowing the mercy seat. Of these things we cannot now speak in detail.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Limitations of the Earthly Service
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now when these things had been thus prepared, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 18:2–6; 28:3
      marker-yv: yv-n
    - type: text
      text: 'the priests always went into the first part of the tabernacle, performing the services. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But into the second part the high priest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: went
    - type: text
      text: ' alone '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:10; Lev. 16:34; Heb. 10:3
      marker-yv: yv-n
    - type: text
      text: 'once a year, not without blood, which he offered for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 5:3
      marker-yv: yv-n
    - type: text
      text: 'himself and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' the people’s sins '
    - type: usfm
      marker: it
      children:
      - type: text
        text: committed
    - type: text
      text: ' in ignorance; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'the Holy Spirit indicating this, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 14:6; Heb. 10:20)
      marker-yv: yv-n
    - type: text
      text: 'the way into the Holiest of All was not yet made manifest while the first tabernacle was still standing. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'It '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' symbolic for the present time in which both gifts and sacrifices are offered '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gal. 3:21); Heb. 7:19
      marker-yv: yv-n
    - type: text
      text: 'which cannot make him who performed the service perfect in regard to the conscience— '
