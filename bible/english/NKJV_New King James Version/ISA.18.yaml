document_id: ISA.18,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Proclamation Against Ethiopia
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Woe '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 19:9; Is. 20:4, 5; Ezek. 30:4, 5, 9; Zeph. 2:12; 3:10
      marker-yv: yv-n
    - type: text
      text: to the land shadowed with buzzing wings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' beyond the rivers of Ethiopia,'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Which sends ambassadors by sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Even in vessels of reed on the waters, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“Go, swift messengers, to a nation tall and smooth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: skin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To a people terrible from their beginning onward,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A nation powerful and treading down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whose land the rivers divide.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'All inhabitants of the world and dwellers on the earth:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 5:26
      marker-yv: yv-n
    - type: text
      text: 'When he lifts up a banner on the mountains, you see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And when he blows a trumpet, you hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For so the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I will take My rest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I will look from My dwelling place
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like clear heat in sunshine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like a cloud of dew in the heat of harvest.”
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For before the harvest, when the bud is perfect
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the sour grape is ripening in the flower,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will both cut off the sprigs with pruning hooks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And take away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cut down the branches.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: They will be left together for the mountain birds of prey
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And for the beasts of the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The birds of prey will summer on them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the beasts of the earth will winter on them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In that time '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 68:31; 72:10; Is. 16:1; Zeph. 3:10; Mal. 1:11; Acts 8:27–38
      marker-yv: yv-n
    - type: text
      text: 'a present will be brought to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From a people tall and smooth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: skin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And from a people terrible from their beginning onward,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A nation powerful and treading down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whose land the rivers divide—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To the place of the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To Mount Zion.
