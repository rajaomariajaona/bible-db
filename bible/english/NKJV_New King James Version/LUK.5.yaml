document_id: LUK.5,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Four Fishermen Called as Disciples
  - type: text
    content: 'So '
  - type: note
    content: Matt. 4:18–22; Mark 1:16–20; John 1:40–42
  - type: text
    content: 'it was, as the multitude pressed about Him to '
  - type: note
    content: Acts 13:44
  - type: text
    content: 'hear the word of God, that He stood by the Lake of Gennesaret, '
  '10':
  - type: text
    content: 'and so also '
  - type: text
    content: were
  - type: text
    content: ' James and John, the sons of Zebedee, who were partners with Simon. And Jesus said to Simon, '
  - type: text
    content: '“Do not be afraid. '
  - type: note
    content: Matt. 4:19; Mark 1:17
  - type: text
    content: From now on you will catch men.”
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'So when they had brought their boats to land, '
  - type: note
    content: Matt. 4:20; 19:27; (Mark 1:18; 8:34, 35; Luke 9:59–62); John 12:26
  - type: text
    content: they forsook all and followed Him.
  - type: heading
    content: Jesus Cleanses a Leper
  '12':
  - type: note
    content: Matt. 8:2–4; Mark 1:40–44
  - type: text
    content: 'And it happened when He was in a certain city, that behold, a man who was full of '
  - type: note
    content: Lev. 13:14
  - type: text
    content: 'leprosy saw Jesus; and he fell on '
  - type: text
    content: his
  - type: text
    content: ' face and implored Him, saying, “Lord, if You are willing, You can make me clean.”'
  '13':
  - type: text
    content: 'Then He put out '
  - type: text
    content: His
  - type: text
    content: ' hand and touched him, saying, '
  - type: text
    content: “I am willing; be cleansed.”
  - type: text
    content: ' '
  - type: note
    content: Matt. 20:34; Luke 8:44; John 5:9
  - type: text
    content: 'Immediately the leprosy left him. '
  '14':
  - type: note
    content: Matt. 8:4; Luke 17:14
  - type: text
    content: 'And He charged him to tell no one, '
  - type: text
    content: '“But go and show yourself to the priest, and make an offering for your cleansing, as a testimony to them, '
  - type: note
    content: Lev. 13:1–3; 14:2–32
  - type: text
    content: just as Moses commanded.”
  '15':
  - type: text
    content: 'However, '
  - type: note
    content: Mark 1:45
  - type: text
    content: 'the report went around concerning Him all the more; and '
  - type: note
    content: Matt. 4:25; Mark 3:7; John 6:2
  - type: text
    content: 'great multitudes came together to hear, and to be healed by Him of their infirmities. '
  '16':
  - type: note
    content: Luke 9:10
  - type: text
    content: 'So He Himself '
  - type: text
    content: often
  - type: text
    content: ' withdrew into the wilderness and '
  - type: note
    content: Matt. 14:23; Mark 1:35; Luke 6:12; 9:18; 11:1
  - type: text
    content: prayed.
  - type: heading
    content: Jesus Forgives and Heals a Paralytic
  '17':
  - type: text
    content: 'Now it happened on a certain day, as He was teaching, that there were Pharisees and teachers of the law sitting by, who had come out of every town of Galilee, Judea, and Jerusalem. And the power of the Lord was '
  - type: text
    content: present
  - type: text
    content: ' to heal them. '
  '18':
  - type: note
    content: Matt. 9:2–8; Mark 2:3–12
  - type: text
    content: 'Then behold, men brought on a bed a man who was paralyzed, whom they sought to bring in and lay before Him. '
  '19':
  - type: text
    content: 'And when they could not find how they might bring him in, because of the crowd, they went up on the housetop and let him down with '
  - type: text
    content: his
  - type: text
    content: ' bed through the tiling into the midst '
  - type: note
    content: Matt. 15:30
  - type: text
    content: before Jesus.
  '2':
  - type: text
    content: 'and saw two boats standing by the lake; but the fishermen had gone from them and were washing '
  - type: text
    content: their
  - type: text
    content: ' nets. '
  '20':
  - type: text
    content: 'When He saw their faith, He said to him, '
  - type: text
    content: “Man, your sins are forgiven you.”
  '21':
  - type: note
    content: Matt. 9:3; 26:65; Mark 2:6, 7; John 10:33
  - type: text
    content: 'And the scribes and the Pharisees began to reason, saying, “Who is this who speaks blasphemies? '
  - type: note
    content: Ps. 32:5; 130:4; Is. 43:25
  - type: text
    content: Who can forgive sins but God alone?”
  '22':
  - type: text
    content: 'But when Jesus '
  - type: note
    content: Luke 9:47; John 2:25
  - type: text
    content: 'perceived their thoughts, He answered and said to them, '
  - type: text
    content: “Why are you reasoning in your hearts?
  - type: text
    content: ' '
  '23':
  - type: text
    content: Which is easier, to say, ‘Your sins are forgiven you,’ or to say, ‘Rise up and walk’?
  - type: text
    content: ' '
  '24':
  - type: text
    content: But that you may know that the Son of Man has power on earth to forgive sins”
  - type: text
    content: '—He said to the man who was paralyzed, '
  - type: note
    content: Mark 2:11; 5:41; Luke 7:14
  - type: text
    content: “I say to you, arise, take up your bed, and go to your house.”
  '25':
  - type: text
    content: 'Immediately he rose up before them, took up what he had been lying on, and departed to his own house, '
  - type: note
    content: Luke 17:15, 18; Acts 3:8
  - type: text
    content: 'glorifying God. '
  '26':
  - type: text
    content: 'And they were all amazed, and they '
  - type: note
    content: Luke 1:65; 7:16
  - type: text
    content: glorified God and were filled with fear, saying, “We have seen strange things today!”
  - type: heading
    content: Matthew the Tax Collector
  '27':
  - type: note
    content: Matt. 9:9–17; Mark 2:13–22
  - type: text
    content: 'After these things He went out and saw a tax collector named Levi, sitting at the tax office. And He said to him, '
  - type: note
    content: (Mark 8:34); Luke 9:59; John 12:26; 21:19, 22
  - type: text
    content: “Follow Me.”
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'So he left all, rose up, and '
  - type: note
    content: Matt. 4:22; 19:27; Mark 10:28
  - type: text
    content: followed Him.
  '29':
  - type: note
    content: Matt. 9:9, 10; Mark 2:15
  - type: text
    content: 'Then Levi gave Him a great feast in his own house. And '
  - type: note
    content: Luke 15:1
  - type: text
    content: 'there were a great number of tax collectors and others who sat down with them. '
  '3':
  - type: text
    content: 'Then He got into one of the boats, which was Simon’s, and asked him to put out a little from the land. And He '
  - type: note
    content: John 8:2
  - type: text
    content: sat down and taught the multitudes from the boat.
  '30':
  - type: text
    content: 'And their scribes and the Pharisees complained against His disciples, saying, '
  - type: note
    content: Matt. 11:19; Luke 15:2; Acts 23:9
  - type: text
    content: “Why do You eat and drink with tax collectors and sinners?”
  '31':
  - type: text
    content: 'Jesus answered and said to them, '
  - type: text
    content: “Those who are well have no need of a physician, but those who are sick.
  - type: text
    content: ' '
  '32':
  - type: note
    content: Matt. 9:13; 1 Tim. 1:15
  - type: text
    content: 'I have not come to call '
  - type: text
    content: the
  - type: text
    content: ' righteous, but sinners, to repentance.”'
  - type: heading
    content: Jesus Is Questioned About Fasting
  '33':
  - type: text
    content: 'Then they said to Him, '
  - type: note
    content: Matt. 9:14; Mark 2:18; Luke 7:33
  - type: text
    content: “Why do the disciples of John fast often and make prayers, and likewise those of the Pharisees, but Yours eat and drink?”
  '34':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: '“Can you make the friends of the bridegroom fast while the '
  - type: note
    content: John 3:29
  - type: text
    content: bridegroom is with them?
  - type: text
    content: ' '
  '35':
  - type: text
    content: But the days will come when the bridegroom will be taken away from them; then they will fast in those days.”
  '36':
  - type: note
    content: Matt. 9:16, 17; Mark 2:21, 22
  - type: text
    content: 'Then He spoke a parable to them: '
  - type: text
    content: '“No one '
  - type: text
    content: puts a piece from a new garment on an old one;
  - type: text
    content: ' otherwise the new makes a tear, and also the piece that was '
  - type: text
    content: taken
  - type: text
    content: ' out of the new does not match the old.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: And no one puts new wine into old wineskins; or else the new wine will burst the wineskins and be spilled, and the wineskins will be ruined.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'But new wine must be put into new wineskins, '
  - type: text
    content: and both are preserved.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And no one, having drunk old '
  - type: text
    content: wine,
  - type: text
    content: ' '
  - type: text
    content: immediately
  - type: text
    content: ' desires new; for he says, ‘The old is '
  - type: text
    content: better.’ ”
  '4':
  - type: text
    content: 'When He had stopped speaking, He said to Simon, '
  - type: note
    content: John 21:6
  - type: text
    content: “Launch out into the deep and let down your nets for a catch.”
  '5':
  - type: text
    content: 'But Simon answered and said to Him, “Master, we have toiled all night and caught '
  - type: note
    content: John 21:3
  - type: text
    content: 'nothing; nevertheless '
  - type: note
    content: Ps. 33:9
  - type: text
    content: 'at Your word I will let down the net.” '
  '6':
  - type: text
    content: 'And when they had done this, they caught a great number of fish, and their net was breaking. '
  '7':
  - type: text
    content: 'So they signaled to '
  - type: text
    content: their
  - type: text
    content: ' partners in the other boat to come and help them. And they came and filled both the boats, so that they began to sink. '
  '8':
  - type: text
    content: 'When Simon Peter saw '
  - type: text
    content: it,
  - type: text
    content: ' he fell down at Jesus’ knees, saying, '
  - type: note
    content: 2 Sam. 6:9; 1 Kin. 17:18
  - type: text
    content: “Depart from me, for I am a sinful man, O Lord!”
  '9':
  - type: text
    content: 'For he and all who were with him were '
  - type: note
    content: Mark 5:42; 10:24, 26
  - type: text
    content: 'astonished at the catch of fish which they had taken; '
