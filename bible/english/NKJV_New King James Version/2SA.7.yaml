  - type: text
    content: 'rest with your fathers, '
  - type: note
    content: Deut. 31:16; Acts 13:36
  - type: text
    content: 'I will set up your seed after you, who will come from your body, and I will establish his kingdom. '
  '13':
  - type: note
    content: 1 Kin. 8:20; Ps. 132:11; Matt. 1:6; Luke 3:31
  - type: text
    content: 'He shall build a house for My name, and I will '
  - type: note
