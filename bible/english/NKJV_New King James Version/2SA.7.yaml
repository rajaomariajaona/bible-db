  - type: text
    content: 'plant them, that they may dwell in a place of their own and move no more; '
  - type: note
    content: Ex. 15:17; Ps. 44:2; 80:8; Jer. 24:6
  - type: text
    content: 'nor shall the sons of wickedness oppress them anymore, as previously, '
  '11':
  - type: note
