  - type: text
    content: 'establish the throne of his kingdom forever. '
  '14':
  - type: note
    content: 2 Sam. 7:16; (Is. 9:7; 49:8)
  - type: text
    content: 'I will be his Father, and he shall be '
  - type: note
    content: (Heb. 1:5)
  - type: text
    content: 'My son. If he commits iniquity, I will chasten him with the rod of men and with the blows of the sons of men. '
  '15':
  - type: text
    content: 'But My mercy shall not depart from him, '
  - type: note
    content: (Ps. 2:7; 89:26, 27, 30); Matt. 3:17
  - type: text
    content: 'as I took '
  - type: text
    content: it
  - type: text
    content: ' from Saul, whom I removed from before you. '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: 1 Sam. 15:23, 28; 16:14
  - type: text
    content: your house and your kingdom shall be established forever before you. Your throne shall be established forever.” ’ ”
  '17':
  - type: text
    content: According to all these words and according to all this vision, so Nathan spoke to David.
  - type: heading
    content: David’s Thanksgiving to God
  '18':
  - type: text
    content: 'Then King David went in and sat before the '
  - type: heading
    content: Lord
  - type: text
    content: '; and he said: '
  - type: note
    content: 2 Sam. 7:13; Ps. 89:36, 37; Matt. 25:31; John 12:34
  - type: text
    content: '“Who '
  - type: text
    content: am
  - type: text
    content: ' I, O Lord '
  - type: heading
    content: God
  - type: text
    content: '? And what is my house, that You have brought me this far? '
  '19':
  - type: text
    content: 'And yet this was a small thing in Your sight, O Lord '
  - type: heading
    content: God
  - type: text
    content: '; and You have also spoken of Your servant’s house for a great while to come. '
  - type: note
    content: Gen. 32:10; Ex. 3:11; 1 Sam. 18:18
  - type: text
    content: Is
  - type: text
    content: ' this the manner of man, O Lord '
  - type: heading
    content: God
  - type: text
    content: '? '
  '2':
  - type: text
    content: 'that the king said to Nathan the prophet, “See now, I dwell in '
  - type: note
    content: 1 Chr. 17:1–27
  - type: text
    content: 'a house of cedar, '
  - type: note
    content: 2 Sam. 5:11
  - type: text
    content: 'but the ark of God dwells inside tent '
  - type: note
    content: Acts 7:46
  - type: text
    content: curtains.”
  '20':
  - type: text
    content: 'Now what more can David say to You? For You, Lord '
  - type: heading
    content: God
  - type: text
    content: ', '
  - type: note
    content: (Is. 55:8, 9)
  - type: text
    content: 'know Your servant. '
  '21':
  - type: text
    content: 'For Your word’s sake, and according to Your own heart, You have done all these great things, to make Your servant know '
  - type: text
    content: them.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Therefore '
  - type: note
    content: (1 Sam. 16:7); Ps. 139:1; John 21:17
  - type: text
    content: 'You are great, O Lord '
  - type: heading
    content: God
  - type: text
    content: '. For '
  - type: note
    content: Deut. 10:17; 1 Chr. 16:25; 2 Chr. 2:5; Ps. 86:10; Jer. 10:6
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' none like You, nor '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: any
  - type: text
    content: ' God besides You, according to all that we have heard with our '
  - type: note
    content: Ex. 15:11; Deut. 3:24; 4:35; 32:39
  - type: text
    content: 'ears. '
  '23':
  - type: text
    content: 'And who '
  - type: text
    content: is
  - type: text
    content: ' like Your people, like Israel, '
  - type: note
    content: Ex. 10:2; Ps. 44:1
  - type: text
    content: 'the one nation on the earth whom God went to redeem for Himself as a people, to make for Himself a name—and to do for Yourself great and awesome deeds for Your land—before '
  - type: note
    content: Ps. 147:20
  - type: text
    content: 'Your people whom You redeemed for Yourself from Egypt, the nations, and their gods? '
  '24':
  - type: text
    content: 'For '
  - type: note
    content: Deut. 9:26; 33:29
  - type: text
    content: 'You have made Your people Israel Your very own people forever; '
  - type: note
    content: Gen. 17:7, 8; Ex. 6:7; (Deut. 26:18)
  - type: text
    content: 'and You, '
  - type: heading
    content: Lord
  - type: text
    content: ', have become their God.'
  '25':
  - type: text
    content: '“Now, O '
  - type: heading
    content: Lord
  - type: text
    content: ' God, the word which You have spoken concerning Your servant and concerning his house, establish '
  - type: text
    content: it
  - type: text
    content: ' forever and do as You have said. '
  '26':
  - type: text
    content: 'So let Your name be magnified forever, saying, ‘The '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts '
  - type: text
    content: is
  - type: text
    content: ' the God over Israel.’ And let the house of Your servant David be established before You. '
  '27':
  - type: text
    content: 'For You, O '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, God of Israel, have revealed '
  - type: text
    content: this
  - type: text
    content: ' to Your servant, saying, ‘I will build you a house.’ Therefore Your servant has found it in his heart to pray this prayer to You.'
  '28':
  - type: text
    content: '“And now, O Lord '
  - type: heading
    content: God
  - type: text
    content: ', You are God, and '
  - type: note
    content: Ps. 48:14
  - type: text
    content: 'Your words are true, and You have promised this goodness to Your servant. '
  '29':
  - type: text
    content: 'Now therefore, let it please You to bless the house of Your servant, that it may continue before You forever; for You, O Lord '
  - type: heading
    content: God
  - type: text
    content: ', have spoken '
  - type: text
    content: it,
  - type: text
    content: ' and with Your blessing let the house of Your servant be blessed '
  - type: note
    content: Ex. 34:6; Josh. 21:45; John 17:17
  - type: text
    content: forever.”
  '3':
  - type: text
    content: 'Then Nathan said to the king, “Go, do all that '
  - type: text
    content: is
  - type: text
    content: ' in your '
  - type: note
    content: Ex. 26:1
  - type: text
    content: 'heart, for the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' with you.”'
  '4':
  - type: text
    content: 'But it happened that night that the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to Nathan, saying, '
  '5':
  - type: text
    content: '“Go and tell My servant David, ‘Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: 1 Kin. 8:17, 18; 1 Chr. 22:7
  - type: text
    content: '“Would you build a house for Me to dwell in? '
  '6':
  - type: text
    content: 'For I have not dwelt in a house '
  - type: note
    content: 1 Kin. 5:3, 4; 8:19; 1 Chr. 22:8
  - type: text
    content: 'since the time that I brought the children of Israel up from Egypt, even to this day, but have moved about in '
  - type: note
    content: Josh. 18:1; 1 Kin. 8:16
  - type: text
    content: 'a tent and in a tabernacle. '
  '7':
  - type: text
    content: 'Wherever I have '
  - type: note
    content: Ex. 40:18, 34
  - type: text
    content: 'moved about with all the children of Israel, have I ever spoken a word to anyone from the tribes of Israel, whom I commanded '
  - type: note
    content: Lev. 26:11, 12
  - type: text
    content: 'to shepherd My people Israel, saying, ‘Why have you not built Me a house of cedar?’ ” ’ '
  '8':
  - type: text
    content: 'Now therefore, thus shall you say to My servant David, ‘Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: 2 Sam. 5:2; (Acts 20:28)
  - type: text
    content: '“I took you from the sheepfold, from following the sheep, to be ruler over My people, over Israel. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: 1 Sam. 16:11, 12; Ps. 78:70, 71
  - type: text
    content: 'I have been with you wherever you have gone, '
  - type: note
    content: 1 Sam. 18:14; 2 Sam. 5:10
  - type: text
    content: 'and have cut off all your enemies from before you, and have made you a great name, like the name of the great men who '
  - type: text
    content: are
  - type: text
    content: ' on the earth. '
