verses:
  '1':
  - type: heading
    content: The Model Prayer
  - type: text
    content: 'Now it came to pass, as He was praying in a certain place, when He ceased, '
  - type: text
    content: that
  - type: text
    content: ' one of His disciples said to Him, “Lord, teach us to pray, as John also taught his disciples.”'
  '10':
  - type: text
    content: For everyone who asks receives, and he who seeks finds, and to him who knocks it will be opened.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Matt. 7:9
  - type: text
    content: 'If a son asks for '
  - type: text
    content: bread
  - type: text
    content: ' from any father among you, will he give him a stone? Or if '
  - type: text
    content: he asks
  - type: text
    content: ' for a fish, will he give him a serpent instead of a fish?'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Or if he asks for an egg, will he offer him a scorpion?
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'If you then, being evil, know how to give '
  - type: note
    content: James 1:17
  - type: text
    content: 'good gifts to your children, how much more will '
  - type: text
    content: your
  - type: text
    content: ' heavenly Father give the Holy Spirit to those who ask Him!”'
  - type: heading
    content: A House Divided Cannot Stand
  '14':
  - type: note
    content: Matt. 9:32–34; 12:22, 24
  - type: text
    content: 'And He was casting out a demon, and it was mute. So it was, when the demon had gone out, that the mute spoke; and the multitudes marveled. '
  '15':
  - type: text
    content: 'But some of them said, '
  - type: note
    content: Matt. 9:34; 12:24
  - type: text
    content: “He casts out demons by Beelzebub, the ruler of the demons.”
  '16':
  - type: text
    content: 'Others, testing '
  - type: text
    content: Him,
  - type: text
    content: ' '
  - type: note
    content: Matt. 12:38; 16:1; Mark 8:11
  - type: text
    content: 'sought from Him a sign from heaven. '
  '17':
  - type: note
    content: Matt. 12:25–29; Mark 3:23–27
  - type: text
    content: 'But '
  - type: note
    content: Matt. 9:4; John 2:25
  - type: text
    content: 'He, knowing their thoughts, said to them: '
  - type: text
    content: '“Every kingdom divided against itself is brought to desolation, and a house '
  - type: text
    content: divided
  - type: text
    content: ' against a house falls.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: If Satan also is divided against himself, how will his kingdom stand? Because you say I cast out demons by Beelzebub.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And if I cast out demons by Beelzebub, by whom do your sons cast '
  - type: text
    content: them
  - type: text
    content: ' out? Therefore they will be your judges.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'So He said to them, '
  - type: text
    content: '“When you pray, say:'
  - type: note
    content: Matt. 6:9–13
  - type: text
    content: Our
  - type: text
    content: ' Father '
  - type: text
    content: in heaven,
  - type: text
    content: Hallowed be Your name.
  - type: text
    content: Your kingdom come.
  - type: text
    content: Your will be done
  - type: text
    content: 'On earth as '
  - type: text
    content: it is
  - type: text
    content: ' in heaven.'
  '20':
  - type: text
    content: 'But if I cast out demons '
  - type: note
    content: Ex. 8:19
  - type: text
    content: with the finger of God, surely the kingdom of God has come upon you.
  - type: text
    content: ' '
  '21':
  - type: note
    content: Matt. 12:29; Mark 3:27
  - type: text
    content: When a strong man, fully armed, guards his own palace, his goods are in peace.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'But '
  - type: note
    content: (Is. 53:12; Col. 2:15)
  - type: text
    content: 'when a stronger than he comes upon him and overcomes him, he takes from him all his armor in which he trusted, and divides his '
  - type: text
    content: spoils.
  - type: text
    content: ' '
  '23':
  - type: note
    content: Matt. 12:30; Mark 9:40
  - type: text
    content: He who is not with Me is against Me, and he who does not gather with Me scatters.
  - type: heading
    content: An Unclean Spirit Returns
  '24':
  - type: note
    content: Matt. 12:43–45; Mark 1:27; 3:11; 5:13; Acts 5:16; 8:7
  - type: text
    content: “When an unclean spirit goes out of a man, he goes through dry places, seeking rest; and finding none, he says, ‘I will return to my house from which I came.’
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'And when he comes, he finds '
  - type: text
    content: it
  - type: text
    content: ' swept and put in order.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Then he goes and takes with '
  - type: text
    content: him
  - type: text
    content: ' seven other spirits more wicked than himself, and they enter and dwell there; and '
  - type: note
    content: John 5:14; (Heb. 6:4–6; 10:26; 2 Pet. 2:20)
  - type: text
    content: 'the last '
  - type: text
    content: state
  - type: text
    content: ' of that man is worse than the first.”'
  - type: heading
    content: Keeping the Word
  '27':
  - type: text
    content: 'And it happened, as He spoke these things, that a certain woman from the crowd raised her voice and said to Him, '
  - type: note
    content: Luke 1:28, 48
  - type: text
    content: '“Blessed '
  - type: text
    content: is
  - type: text
    content: ' the womb that bore You, and '
  - type: text
    content: the
  - type: text
    content: ' breasts which nursed You!”'
  '28':
  - type: text
    content: 'But He said, '
  - type: note
    content: Ps. 1:1, 2; 112:1; 119:1, 2; Is. 48:17, 18; (Matt. 7:21; Luke 8:21); James 1:25
  - type: text
    content: '“More than that, blessed '
  - type: text
    content: are
  - type: text
    content: ' those who hear the word of God and keep it!”'
  - type: heading
    content: Seeking a Sign
  '29':
  - type: note
    content: Matt. 12:38–42
  - type: text
    content: 'And while the crowds were thickly gathered together, He began to say, '
  - type: text
    content: '“This is an evil generation. It seeks a '
  - type: note
    content: 1 Cor. 1:22
  - type: text
    content: 'sign, and no sign will be given to it except the sign of Jonah '
  - type: text
    content: the prophet.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Give us day by day our daily bread.
  '30':
  - type: text
    content: 'For as '
  - type: note
    content: Jon. 1:17; 2:10; 3:3–10; Luke 24:46; Acts 10:40; 1 Cor. 15:4
  - type: text
    content: Jonah became a sign to the Ninevites, so also the Son of Man will be to this generation.
  - type: text
    content: ' '
  '31':
  - type: note
    content: 1 Kin. 10:1–9; 2 Chr. 9:1–8
  - type: text
    content: 'The queen of the South will rise up in the judgment with the men of this generation and condemn them, for she came from the ends of the earth to hear the wisdom of Solomon; and indeed a '
  - type: note
    content: (Is. 9:6; Rom. 9:5)
  - type: text
    content: 'greater than Solomon '
  - type: text
    content: is
  - type: text
    content: ' here.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'The men of Nineveh will rise up in the judgment with this generation and condemn it, for '
  - type: note
    content: Jon. 3:5
  - type: text
    content: 'they repented at the preaching of Jonah; and indeed a greater than Jonah '
  - type: text
    content: is
  - type: text
    content: ' here.'
  - type: heading
    content: The Lamp of the Body
  '33':
  - type: note
    content: Matt. 5:15; Mark 4:21; Luke 8:16
  - type: text
    content: '“No one, when he has lit a lamp, puts '
  - type: text
    content: it
  - type: text
    content: ' in a secret place or under a '
  - type: note
    content: Matt. 5:15
  - type: text
    content: basket, but on a lampstand, that those who come in may see the light.
  - type: text
    content: ' '
  '34':
  - type: note
    content: Matt. 6:22, 23
  - type: text
    content: 'The lamp of the body is the eye. Therefore, when your eye is '
  - type: text
    content: 'good, your whole body also is full of light. But when '
  - type: text
    content: your eye
  - type: text
    content: ' is '
  - type: text
    content: 'bad, your body also '
  - type: text
    content: is
  - type: text
    content: ' full of darkness.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: Therefore take heed that the light which is in you is not darkness.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'If then your whole body '
  - type: text
    content: is
  - type: text
    content: ' full of light, having no part dark, '
  - type: text
    content: the
  - type: text
    content: ' whole '
  - type: text
    content: body
  - type: text
    content: ' will be full of light, as when the bright shining of a lamp gives you light.”'
  - type: heading
    content: Woe to the Pharisees and Lawyers
  '37':
  - type: text
    content: 'And as He spoke, a certain Pharisee asked Him to dine with him. So He went in and sat down to eat. '
  '38':
  - type: note
    content: Matt. 15:2; Mark 7:2, 3
  - type: text
    content: 'When the Pharisee saw '
  - type: text
    content: it,
  - type: text
    content: ' he marveled that He had not first washed before dinner.'
  '39':
  - type: note
    content: Matt. 23:25
  - type: text
    content: 'Then the Lord said to him, '
  - type: text
    content: '“Now you Pharisees make the outside of the cup and dish clean, but '
  - type: note
    content: Gen. 6:5; Titus 1:15
  - type: text
    content: 'your inward part is full of '
  - type: text
    content: greed and wickedness.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: (Eph. 4:32)
  - type: text
    content: forgive us our sins,
  - type: text
    content: For we also forgive everyone who is indebted to us.
  - type: text
    content: And do not lead us into temptation,
  - type: text
    content: But deliver us from the evil one.”
  - type: heading
    content: A Friend Comes at Midnight
  '40':
  - type: text
    content: 'Foolish ones! Did not '
  - type: note
    content: Gen. 1:26, 27
  - type: text
    content: He who made the outside make the inside also?
  - type: text
    content: ' '
  '41':
  - type: note
    content: Is. 58:7; Dan. 4:27; (Luke 12:33; 16:9)
  - type: text
    content: 'But rather give alms of '
  - type: text
    content: such things as you have; then indeed all things are clean to you.
  '42':
  - type: note
    content: Matt. 23:23
  - type: text
    content: '“But woe to you Pharisees! For you tithe mint and rue and all manner of herbs, and '
  - type: note
    content: (Mic. 6:7, 8)
  - type: text
    content: 'pass by justice and the '
  - type: note
    content: John 5:42
  - type: text
    content: love of God. These you ought to have done, without leaving the others undone.
  - type: text
    content: ' '
  '43':
  - type: note
    content: Matt. 23:6; Mark 12:38, 39; Luke 14:7; 20:46
  - type: text
    content: 'Woe to you Pharisees! For you love the '
  - type: text
    content: best seats in the synagogues and greetings in the marketplaces.
  - type: text
    content: ' '
  '44':
  - type: note
    content: Matt. 23:27
  - type: text
    content: 'Woe to you, '
  - type: text
    content: scribes and Pharisees, hypocrites!
  - type: text
    content: ' '
  - type: note
    content: Ps. 5:9
  - type: text
    content: 'For you are like graves which are not seen, and the men who walk over '
  - type: text
    content: them
  - type: text
    content: ' are not aware '
  - type: text
    content: of them.
  - type: text
    content: ”
  '45':
  - type: text
    content: Then one of the lawyers answered and said to Him, “Teacher, by saying these things You reproach us also.”
  '46':
  - type: text
    content: 'And He said, '
  - type: text
    content: '“Woe to you also, lawyers! '
  - type: note
    content: Matt. 23:4
  - type: text
    content: For you load men with burdens hard to bear, and you yourselves do not touch the burdens with one of your fingers.
  - type: text
    content: ' '
  '47':
  - type: note
    content: Matt. 23:29; Acts 7:52
  - type: text
    content: Woe to you! For you build the tombs of the prophets, and your fathers killed them.
  - type: text
    content: ' '
  '48':
  - type: text
    content: In fact, you bear witness that you approve the deeds of your fathers; for they indeed killed them, and you build their tombs.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Therefore the wisdom of God also said, '
  - type: note
    content: Prov. 1:20; Matt. 23:34
  - type: text
    content: '‘I will send them prophets and apostles, and '
  - type: text
    content: some
  - type: text
    content: ' of them they will kill and persecute,’'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “Which of you shall have a friend, and go to him at midnight and say to him, ‘Friend, lend me three loaves;
  - type: text
    content: ' '
  '50':
  - type: text
    content: that the blood of all the prophets which was shed from the foundation of the world may be required of this generation,
  - type: text
    content: ' '
  '51':
  - type: note
    content: Gen. 4:8; 2 Chr. 36:16
  - type: text
    content: 'from the blood of Abel to '
  - type: note
    content: 2 Chr. 24:20, 21
  - type: text
    content: the blood of Zechariah who perished between the altar and the temple. Yes, I say to you, it shall be required of this generation.
  '52':
  - type: note
    content: Matt. 23:13
  - type: text
    content: “Woe to you lawyers! For you have taken away the key of knowledge. You did not enter in yourselves, and those who were entering in you hindered.”
  '53':
  - type: text
    content: 'And as He said these things to them, the scribes and the Pharisees began to assail '
  - type: text
    content: Him
  - type: text
    content: ' vehemently, and to cross-examine Him about many things, '
  '54':
  - type: text
    content: 'lying in wait for Him, and '
  - type: note
    content: Mark 12:13
  - type: text
    content: seeking to catch Him in something He might say, that they might accuse Him.
  '6':
  - type: text
    content: for a friend of mine has come to me on his journey, and I have nothing to set before him’;
  - type: text
    content: ' '
  '7':
  - type: text
    content: and he will answer from within and say, ‘Do not trouble me; the door is now shut, and my children are with me in bed; I cannot rise and give to you’?
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'I say to you, '
  - type: note
    content: (Luke 18:1–5)
  - type: text
    content: though he will not rise and give to him because he is his friend, yet because of his persistence he will rise and give him as many as he needs.
  - type: heading
    content: Keep Asking, Seeking, Knocking
  '9':
  - type: note
    content: Ps. 50:14, 15; Jer. 33:3; (Matt. 7:7; 21:22; Mark 11:24; John 15:7; James 1:5, 6; 1 John 3:22; 5:14, 15)
  - type: text
    content: '“So I say to you, ask, and it will be given to you; '
  - type: note
    content: Is. 55:6
  - type: text
    content: seek, and you will find; knock, and it will be opened to you.
  - type: text
    content: ' '
