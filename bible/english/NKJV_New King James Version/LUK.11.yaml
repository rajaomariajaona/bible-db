    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it came to pass, as He was praying in a certain place, when He ceased, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' one of His disciples said to Him, “Lord, teach us to pray, as John also taught his disciples.”'
