document_id: ACT.14,114
type_code: eng
verses:
  '1':
  - type: heading
    content: At Iconium
  - type: text
    content: 'Now it happened in Iconium that they went together to the synagogue of the Jews, and so spoke that a great multitude both of the Jews and of the '
  - type: note
    content: John 7:35; Acts 18:4; Rom. 1:14, 16; 1 Cor. 1:22
  - type: text
    content: 'Greeks believed. '
  '10':
  - type: text
    content: 'said with a loud voice, '
  - type: note
    content: (Is. 35:6)
  - type: text
    content: '“Stand up straight on your feet!” And he leaped and walked. '
  '11':
  - type: text
    content: 'Now when the people saw what Paul had done, they raised their voices, saying in the Lycaonian '
  - type: text
    content: language,
  - type: text
    content: ' '
  - type: note
    content: Acts 8:10; 28:6
  - type: text
    content: '“The gods have come down to us in the likeness of men!” '
  '12':
  - type: text
    content: 'And Barnabas they called Zeus, and Paul, Hermes, because he was the chief speaker. '
  '13':
  - type: text
    content: 'Then the priest of Zeus, whose temple was in front of their city, brought oxen and garlands to the gates, '
  - type: note
    content: Dan. 2:46
  - type: text
    content: intending to sacrifice with the multitudes.
  '14':
  - type: text
    content: 'But when the apostles Barnabas and Paul heard this, '
  - type: note
    content: Num. 14:6; Matt. 26:65; Mark 14:63
  - type: text
    content: 'they tore their clothes and ran in among the multitude, crying out '
  '15':
  - type: text
    content: 'and saying, “Men, '
  - type: note
    content: Acts 10:26
  - type: text
    content: 'why are you doing these things? '
  - type: note
    content: James 5:17
  - type: text
    content: 'We also are men with the same nature as you, and preach to you that you should turn from '
  - type: note
    content: 1 Sam. 12:21; Jer. 8:19; 14:22; Amos 2:4; 1 Cor. 8:4
  - type: text
    content: 'these useless things '
  - type: note
    content: 1 Thess. 1:9
  - type: text
    content: 'to the living God, '
  - type: note
    content: Gen. 1:1; Ex. 20:11; Ps. 146:6; Acts 4:24; 17:24; Rev. 14:7
  - type: text
    content: 'who made the heaven, the earth, the sea, and all things that are in them, '
  '16':
  - type: note
    content: Ps. 81:12; Mic. 4:5; 1 Pet. 4:3
  - type: text
    content: 'who in bygone generations allowed all nations to walk in their own ways. '
  '17':
  - type: note
    content: Acts 17:24–27; Rom. 1:19, 20
  - type: text
    content: 'Nevertheless He did not leave Himself without witness, in that He did good, '
  - type: note
    content: Lev. 26:4; Deut. 11:14; (Matt. 5:45)
  - type: text
    content: 'gave us rain from heaven and fruitful seasons, filling our hearts with '
  - type: note
    content: Ps. 145:16
  - type: text
    content: 'food and gladness.” '
  '18':
  - type: text
    content: And with these sayings they could scarcely restrain the multitudes from sacrificing to them.
  - type: heading
    content: Stoning, Escape to Derbe
  '19':
  - type: note
    content: Acts 13:45, 50; 14:2–5; 1 Thess. 2:14
  - type: text
    content: 'Then Jews from Antioch and Iconium came there; and having persuaded the multitudes, '
  - type: note
    content: Acts 14:5; 2 Cor. 11:25; 2 Tim. 3:11
  - type: text
    content: 'they stoned Paul '
  - type: text
    content: and
  - type: text
    content: ' dragged '
  - type: text
    content: him
  - type: text
    content: ' out of the city, supposing him to be '
  - type: note
    content: (2 Cor. 12:1–4)
  - type: text
    content: 'dead. '
  '2':
  - type: text
    content: 'But the unbelieving Jews stirred up the Gentiles and poisoned their minds against the brethren. '
  '20':
  - type: text
    content: However, when the disciples gathered around him, he rose up and went into the city. And the next day he departed with Barnabas to Derbe.
  - type: heading
    content: Strengthening the Converts
  '21':
  - type: text
    content: 'And when they had preached the gospel to that city '
  - type: note
    content: Matt. 28:19
  - type: text
    content: 'and made many disciples, they returned to Lystra, Iconium, and Antioch, '
  '22':
  - type: text
    content: 'strengthening the souls of the disciples, '
  - type: note
    content: Acts 11:23
  - type: text
    content: 'exhorting '
  - type: text
    content: them
  - type: text
    content: ' to continue in the faith, and '
  - type: text
    content: saying,
  - type: text
    content: ' '
  - type: note
    content: Matt. 10:38; Luke 22:28; (Rom. 8:17; 2 Tim. 2:12; 3:12)
  - type: text
    content: '“We must through many tribulations enter the kingdom of God.” '
  '23':
  - type: text
    content: 'So when they had '
  - type: note
    content: Matt. 9:15; Mark 2:20; Luke 5:35; 2 Cor. 8:19; Titus 1:5
  - type: text
    content: 'appointed elders in every church, and prayed with fasting, they commended them to the Lord in whom they had believed. '
  '24':
  - type: text
    content: 'And after they had passed through Pisidia, they came to Pamphylia. '
  '25':
  - type: text
    content: 'Now when they had preached the word in Perga, they went down to Attalia. '
  '26':
  - type: text
    content: From there they sailed to Antioch, where they had been commended to the grace of God for the work which they had completed.
  '27':
  - type: text
    content: 'Now when they had come and gathered the church together, '
  - type: note
    content: Acts 15:4, 12
  - type: text
    content: 'they reported all that God had done with them, and that He had '
  - type: note
    content: 1 Cor. 16:9; 2 Cor. 2:12; Col. 4:3; Rev. 3:8
  - type: text
    content: 'opened the door of faith to the Gentiles. '
  '28':
  - type: text
    content: So they stayed there a long time with the disciples.
  '3':
  - type: text
    content: 'Therefore they stayed there a long time, speaking boldly in the Lord, '
  - type: note
    content: Mark 16:20; Acts 4:29; 20:32; Heb. 2:4
  - type: text
    content: 'who was bearing witness to the word of His grace, granting signs and '
  - type: note
    content: Acts 5:12
  - type: text
    content: wonders to be done by their hands.
  '4':
  - type: text
    content: 'But the multitude of the city was '
  - type: note
    content: Luke 12:51
  - type: text
    content: 'divided: part sided with the Jews, and part with the '
  - type: note
    content: Acts 13:2, 3
  - type: text
    content: 'apostles. '
  '5':
  - type: text
    content: 'And when a violent attempt was made by both the Gentiles and Jews, with their rulers, '
  - type: note
    content: 2 Tim. 3:11
  - type: text
    content: 'to abuse and stone them, '
  '6':
  - type: text
    content: 'they became aware of it and '
  - type: note
    content: Matt. 10:23
  - type: text
    content: 'fled to Lystra and Derbe, cities of Lycaonia, and to the surrounding region. '
  '7':
  - type: text
    content: And they were preaching the gospel there.
  - type: heading
    content: Idolatry at Lystra
  '8':
  - type: note
    content: Acts 3:2
  - type: text
    content: 'And in Lystra a certain man without strength in his feet was sitting, a cripple from his mother’s womb, who had never walked. '
  '9':
  - type: text
    content: This
  - type: text
    content: ' man heard Paul speaking. Paul, observing him intently and seeing that he had faith to be healed, '
