document_id: ACT.14,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: At Iconium
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now it happened in Iconium that they went together to the synagogue of the Jews, and so spoke that a great multitude both of the Jews and of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 7:35; Acts 18:4; Rom. 1:14, 16; 1 Cor. 1:22
      marker-yv: yv-n
    - type: text
      text: 'Greeks believed. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'said with a loud voice, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 35:6)
      marker-yv: yv-n
    - type: text
      text: '“Stand up straight on your feet!” And he leaped and walked. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now when the people saw what Paul had done, they raised their voices, saying in the Lycaonian '
    - type: usfm
      marker: it
      children:
      - type: text
        text: language,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 8:10; 28:6
      marker-yv: yv-n
    - type: text
      text: '“The gods have come down to us in the likeness of men!” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And Barnabas they called Zeus, and Paul, Hermes, because he was the chief speaker. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then the priest of Zeus, whose temple was in front of their city, brought oxen and garlands to the gates, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 2:46
      marker-yv: yv-n
    - type: text
      text: intending to sacrifice with the multitudes.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But when the apostles Barnabas and Paul heard this, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:6; Matt. 26:65; Mark 14:63
      marker-yv: yv-n
    - type: text
      text: 'they tore their clothes and ran in among the multitude, crying out '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and saying, “Men, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 10:26
      marker-yv: yv-n
    - type: text
      text: 'why are you doing these things? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: James 5:17
      marker-yv: yv-n
    - type: text
      text: 'We also are men with the same nature as you, and preach to you that you should turn from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 12:21; Jer. 8:19; 14:22; Amos 2:4; 1 Cor. 8:4
      marker-yv: yv-n
    - type: text
      text: 'these useless things '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 1:9
      marker-yv: yv-n
    - type: text
      text: 'to the living God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:1; Ex. 20:11; Ps. 146:6; Acts 4:24; 17:24; Rev. 14:7
      marker-yv: yv-n
    - type: text
      text: 'who made the heaven, the earth, the sea, and all things that are in them, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 81:12; Mic. 4:5; 1 Pet. 4:3
      marker-yv: yv-n
    - type: text
      text: 'who in bygone generations allowed all nations to walk in their own ways. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 17:24–27; Rom. 1:19, 20
      marker-yv: yv-n
    - type: text
      text: 'Nevertheless He did not leave Himself without witness, in that He did good, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:4; Deut. 11:14; (Matt. 5:45)
      marker-yv: yv-n
    - type: text
      text: 'gave us rain from heaven and fruitful seasons, filling our hearts with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 145:16
      marker-yv: yv-n
    - type: text
      text: 'food and gladness.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And with these sayings they could scarcely restrain the multitudes from sacrificing to them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Stoning, Escape to Derbe
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:45, 50; 14:2–5; 1 Thess. 2:14
      marker-yv: yv-n
    - type: text
      text: 'Then Jews from Antioch and Iconium came there; and having persuaded the multitudes, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 14:5; 2 Cor. 11:25; 2 Tim. 3:11
      marker-yv: yv-n
    - type: text
      text: 'they stoned Paul '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dragged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' out of the city, supposing him to be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 12:1–4)
      marker-yv: yv-n
    - type: text
      text: 'dead. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'But the unbelieving Jews stirred up the Gentiles and poisoned their minds against the brethren. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: However, when the disciples gathered around him, he rose up and went into the city. And the next day he departed with Barnabas to Derbe.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Strengthening the Converts
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And when they had preached the gospel to that city '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 28:19
      marker-yv: yv-n
    - type: text
      text: 'and made many disciples, they returned to Lystra, Iconium, and Antioch, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'strengthening the souls of the disciples, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 11:23
      marker-yv: yv-n
    - type: text
      text: 'exhorting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to continue in the faith, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:38; Luke 22:28; (Rom. 8:17; 2 Tim. 2:12; 3:12)
      marker-yv: yv-n
    - type: text
      text: '“We must through many tribulations enter the kingdom of God.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So when they had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 9:15; Mark 2:20; Luke 5:35; 2 Cor. 8:19; Titus 1:5
      marker-yv: yv-n
    - type: text
      text: 'appointed elders in every church, and prayed with fasting, they commended them to the Lord in whom they had believed. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And after they had passed through Pisidia, they came to Pamphylia. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Now when they had preached the word in Perga, they went down to Attalia. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: From there they sailed to Antioch, where they had been commended to the grace of God for the work which they had completed.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Now when they had come and gathered the church together, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 15:4, 12
      marker-yv: yv-n
    - type: text
      text: 'they reported all that God had done with them, and that He had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:9; 2 Cor. 2:12; Col. 4:3; Rev. 3:8
      marker-yv: yv-n
    - type: text
      text: 'opened the door of faith to the Gentiles. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: So they stayed there a long time with the disciples.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Therefore they stayed there a long time, speaking boldly in the Lord, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:20; Acts 4:29; 20:32; Heb. 2:4
      marker-yv: yv-n
    - type: text
      text: 'who was bearing witness to the word of His grace, granting signs and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 5:12
      marker-yv: yv-n
    - type: text
      text: wonders to be done by their hands.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But the multitude of the city was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 12:51
      marker-yv: yv-n
    - type: text
      text: 'divided: part sided with the Jews, and part with the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:2, 3
      marker-yv: yv-n
    - type: text
      text: 'apostles. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And when a violent attempt was made by both the Gentiles and Jews, with their rulers, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 3:11
      marker-yv: yv-n
    - type: text
      text: 'to abuse and stone them, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'they became aware of it and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:23
      marker-yv: yv-n
    - type: text
      text: 'fled to Lystra and Derbe, cities of Lycaonia, and to the surrounding region. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And they were preaching the gospel there.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Idolatry at Lystra
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 3:2
      marker-yv: yv-n
    - type: text
      text: 'And in Lystra a certain man without strength in his feet was sitting, a cripple from his mother’s womb, who had never walked. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: it
      children:
      - type: text
        text: This
    - type: text
      text: ' man heard Paul speaking. Paul, observing him intently and seeing that he had faith to be healed, '
