  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 2:20
      marker-yv: yv-n
    - type: text
      text: '“Blessed '
