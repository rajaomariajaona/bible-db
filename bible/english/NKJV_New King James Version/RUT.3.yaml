      children:
      - type: text
        text: Ruth 1:8
      marker-yv: yv-n
    - type: text
      text: 'at the beginning, in that you did not go after young men, whether poor or rich. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now, my daughter, do not fear. I will do for you all that you request, for all the people of my town know that you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a virtuous woman. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it is true that I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 12:4; 31:10–31
      marker-yv: yv-n
    - type: text
      text: 'close relative; however, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 3:9
      marker-yv: yv-n
    - type: text
      text: 'there is a relative closer than I. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Stay this night, and in the morning it shall be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' if he will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 4:1
      marker-yv: yv-n
    - type: text
      text: 'perform the duty of a close relative for you—good; let him do it. But if he does not want to perform the duty for you, then I will perform the duty for you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 25:5–10; Ruth 4:5, 10; Matt. 22:24
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives! Lie down until morning.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she lay at his feet until morning, and she arose before one could recognize another. Then he said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 8:19; Jer. 4:2; 12:16
      marker-yv: yv-n
    - type: text
      text: '“Do not let it be known that the woman came to the threshing floor.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also he said, “Bring the shawl that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' on you and hold it.” And when she held it, he measured six '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ephahs
    - type: text
      text: ' of barley, and laid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' on her. Then she went into the city.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When she came to her mother-in-law, she said, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' that you, my daughter?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she told her all that the man had done for her. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she said, “These six '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ephahs
    - type: text
      text: ' of barley he gave me; for he said to me, ‘Do not go empty-handed to your mother-in-law.’ ”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 12:17; 14:16; 1 Cor. 10:32; 2 Cor. 8:21; 1 Thess. 5:22)
      marker-yv: yv-n
    - type: text
      text: “Sit still, my daughter, until you know how the matter will turn out; for the man will not rest until he has concluded the matter this day.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Boaz, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 2:3, 8
      marker-yv: yv-n
    - type: text
      text: 'whose young women you were with, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' not our relative? In fact, he is winnowing barley tonight at the threshing floor. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore wash yourself and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 14:2
      marker-yv: yv-n
    - type: text
      text: 'anoint yourself, put on your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: best
    - type: text
      text: ' garment and go down to the threshing floor; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' do not make yourself known to the man until he has finished eating and drinking. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then it shall be, when he lies down, that you shall notice the place where he lies; and you shall go in, uncover his feet, and lie down; and he will tell you what you should do.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And she said to her, “All that you say to me I will do.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she went down to the threshing floor and did according to all that her mother-in-law instructed her. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after Boaz had eaten and drunk, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 19:6, 9, 22; 2 Sam. 13:28; Esth. 1:10
      marker-yv: yv-n
    - type: text
      text: his heart was cheerful, he went to lie down at the end of the heap of grain; and she came softly, uncovered his feet, and lay down.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it happened at midnight that the man was startled, and turned himself; and there, a woman was lying at his feet. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, “Who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' you?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she answered, “I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' Ruth, your maidservant. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 16:8
      marker-yv: yv-n
    - type: text
      text: 'Take your maidservant under your wing, for you are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 2:20; 3:12
      marker-yv: yv-n
    - type: text
      text: a close relative.”
