  - type: text
    content: the morning star.
  '29':
  - type: text
    content: “He who has an ear, let him hear what the Spirit says to the churches.” ’
  '3':
  - type: text
    content: 'and you have persevered and have patience, and have labored for My name’s sake and have '
  - type: note
    content: Gal. 6:9; Heb. 12:3, 5
  - type: text
    content: not become weary.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Nevertheless I have '
  - type: text
    content: this
  - type: text
    content: ' against you, that you have left your first love.'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Remember therefore from where you have fallen; repent and do the first works, '
  - type: note
    content: Matt. 21:41
  - type: text
    content: or else I will come to you quickly and remove your lampstand from its place—unless you repent.
  - type: text
    content: ' '
  '6':
