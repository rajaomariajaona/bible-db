    content: will
  - type: text
    content: ' put on you no other burden.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'But hold fast '
  - type: note
    content: Rev. 3:11
  - type: text
    content: what you have till I come.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And he who overcomes, and keeps '
  - type: note
    content: (John 6:29)
  - type: text
    content: 'My works until the end, '
  - type: note
    content: (Matt. 19:28)
  - type: text
    content: to him I will give power over the nations—
  '27':
  - type: text
    content: ‘He
  - type: note
