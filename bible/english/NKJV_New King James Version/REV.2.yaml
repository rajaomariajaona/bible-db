  - type: note
    content: Rev. 1:13
  - type: text
    content: 'who walks in the midst of the seven golden lampstands:'
  - type: text
    content: ' '
  '10':
  - type: note
    content: Matt. 10:22
  - type: text
    content: 'Do not fear any of those things which you are about to suffer. Indeed, the devil is about to throw '
  - type: text
    content: some
  - type: text
    content: ' of you into prison, that you may be tested, and you will have tribulation ten days. '
  - type: note
    content: Matt. 24:13
  - type: text
    content: 'Be faithful until death, and I will give you '
  - type: note
    content: James 1:12
  - type: text
    content: the crown of life.
  '11':
  - type: note
    content: Rev. 13:9
  - type: text
    content: '“He who has an ear, let him hear what the Spirit says to the churches. He who overcomes shall not be hurt by '
  - type: note
    content: (Rev. 20:6, 14; 21:8)
  - type: text
    content: the second death.” ’
  - type: heading
    content: The Compromising Church
  '12':
  - type: text
    content: '“And to the '
  - type: text
    content: angel of the church in Pergamos write,
  - type: text
    content: '‘These things says '
  - type: note
    content: Is. 49:2; Rev. 1:16; 2:16
  - type: text
    content: 'He who has the sharp two-edged sword:'
  - type: text
    content: ' '
  '13':
  - type: text
    content: '“I know your works, and where you dwell, where Satan’s throne '
  - type: text
    content: is.
  - type: text
    content: ' And you hold fast to My name, and did not deny My faith even in the days in which Antipas '
  - type: text
    content: was
  - type: text
    content: ' My faithful martyr, who was killed among you, where Satan dwells.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'But I have a few things against you, because you have there those who hold the doctrine of '
  - type: note
    content: Num. 31:16
  - type: text
    content: 'Balaam, who taught Balak to put a stumbling block before the children of Israel, '
  - type: note
    content: Num. 25; Acts 15:29; (1 Cor. 10:20); Rev. 2:20
  - type: text
    content: 'to eat things sacrificed to idols, '
  - type: note
    content: 1 Cor. 6:13
  - type: text
    content: and to commit sexual immorality.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Thus you also have those who hold the doctrine of the Nicolaitans, '
  - type: text
    content: which thing I hate.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Repent, or else I will come to you quickly and '
  - type: note
    content: Is. 11:4; 2 Thess. 2:8; Rev. 19:15
  - type: text
    content: will fight against them with the sword of My mouth.
  '17':
  - type: text
    content: '“He who has an ear, let him hear what the Spirit says to the churches. To him who overcomes I will give some of the hidden '
  - type: note
    content: Ex. 16:33, 34; (John 6:49, 51)
  - type: text
    content: 'manna to eat. And I will give him a white stone, and on the stone '
  - type: note
    content: Is. 56:5; 62:2; 65:15; Rev. 3:12
  - type: text
    content: 'a new name written which no one knows except him who receives '
  - type: text
    content: it.
  - type: text
    content: ” ’
  - type: heading
    content: The Corrupt Church
  '18':
  - type: text
    content: '“And to the '
  - type: text
