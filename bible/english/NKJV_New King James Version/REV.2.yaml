  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Nevertheless I have '
  - type: text
    content: a few things against you, because you allow
  - type: text
    content: ' '
  - type: text
    content: that woman
  - type: text
    content: ' '
  - type: note
    content: 1 Kin. 16:31; 21:25; 2 Kin. 9:7, 22, 30
  - type: text
