  - type: text
    content: 'And I gave her time '
  - type: note
    content: Rom. 2:5; Rev. 9:20; 16:9, 11
  - type: text
    content: 'to '
  - type: text
    content: repent of her sexual immorality, and she did not repent.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Indeed I will cast her into a sickbed, and those who commit adultery with her into great tribulation, unless they repent of '
  - type: text
    content: their
  - type: text
    content: ' deeds.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'I will kill her children with death, and all the churches shall know that I am He who '
  - type: note
    content: Ps. 7:9; 26:2; 139:1; Jer. 11:20; 17:10; Matt. 16:27; Luke 16:15; Acts 1:24; Rom. 8:27
  - type: text
    content: searches
  - type: text
    content: ' the minds and hearts. And I will give to each one of you according to your works.'
  '24':
  - type: text
    content: '“Now to you I say, '
  - type: text
    content: and
  - type: text
    content: ' to the rest in Thyatira, as many as do not have this doctrine, who have not known the '
  - type: note
