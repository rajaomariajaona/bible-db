document_id: 1CO.12,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Spiritual Gifts: Unity in Diversity'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 12:4; 14:1, 37
      marker-yv: yv-n
    - type: text
      text: 'concerning spiritual '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gifts,
    - type: text
      text: ' brethren, I do not want you to be ignorant: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:17
      marker-yv: yv-n
    - type: text
      text: 'to another the working of miracles, to another '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:6
      marker-yv: yv-n
    - type: text
      text: 'prophecy, to another '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 John 4:1
      marker-yv: yv-n
    - type: text
      text: 'discerning of spirits, to another '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:4–11
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: different
    - type: text
      text: ' kinds of tongues, to another the interpretation of tongues. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But one and the same Spirit works all these things, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:6; 2 Cor. 10:13
      marker-yv: yv-n
    - type: text
      text: 'distributing to each one individually '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 3:8)
      marker-yv: yv-n
    - type: text
      text: as He wills.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Unity and Diversity in One Body
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:4, 5; 1 Cor. 10:17; Eph. 4:4
      marker-yv: yv-n
    - type: text
      text: 'as the body is one and has many members, but all the members of that one body, being many, are one body, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gal. 3:16)
      marker-yv: yv-n
    - type: text
      text: 'so also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Christ. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 6:5)
      marker-yv: yv-n
    - type: text
      text: by one Spirit we were all baptized into one body—
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 3:22; Gal. 3:28; (Eph. 2:13–18); Col. 3:11
      marker-yv: yv-n
    - type: text
      text: 'whether Jews or Greeks, whether slaves or free—and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 7:37–39)
      marker-yv: yv-n
    - type: text
      text: 'have all been made to drink into one Spirit. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For in fact the body is not one member but many.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the foot should say, “Because I am not a hand, I am not of the body,” is it therefore not of the body? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if the ear should say, “Because I am not an eye, I am not of the body,” is it therefore not of the body? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the whole body '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' an eye, where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: would
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the hearing? If the whole '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' hearing, where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: would
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the smelling? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 12:28
      marker-yv: yv-n
    - type: text
      text: 'God has set the members, each one of them, in the body '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:3
      marker-yv: yv-n
    - type: text
      text: 'just as He pleased. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if they were all one member, where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: would
    - type: text
      text: ' the body '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You know '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 6:11; Eph. 2:11; 1 Pet. 4:3
      marker-yv: yv-n
    - type: text
      text: 'that you were Gentiles, carried away to these '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 115:5; Is. 46:7; Jer. 10:5; Hab. 2:18
      marker-yv: yv-n
    - type: text
      text: 'dumb idols, however you were led. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now indeed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' many members, yet one body. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the eye cannot say to the hand, “I have no need of you”; nor again the head to the feet, “I have no need of you.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No, much rather, those members of the body which seem to be weaker are necessary. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And those '
    - type: usfm
      marker: it
      children:
      - type: text
        text: members
    - type: text
      text: ' of the body which we think to be less honorable, on these we bestow greater honor; and our unpresentable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: parts
    - type: text
      text: ' have greater modesty, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but our presentable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: parts
    - type: text
      text: ' have no need. But God composed the body, having given greater honor to that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: part
    - type: text
      text: ' which lacks it, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that there should be no schism in the body, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' the members should have the same care for one another. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if one member suffers, all the members suffer with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it;
    - type: text
      text: ' or if one member is honored, all the members rejoice with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:5; Eph. 1:23; 4:12; 5:23, 30; Col. 1:24
      marker-yv: yv-n
    - type: text
      text: 'you are the body of Christ, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 5:30
      marker-yv: yv-n
    - type: text
      text: 'members individually. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 4:11
      marker-yv: yv-n
    - type: text
      text: 'God has appointed these in the church: first '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eph. 2:20; 3:5)
      marker-yv: yv-n
    - type: text
      text: 'apostles, second '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:1; Rom. 12:6
      marker-yv: yv-n
    - type: text
      text: 'prophets, third teachers, after that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 12:10, 29; Gal. 3:5
      marker-yv: yv-n
    - type: text
      text: 'miracles, then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:18; 1 Cor. 12:9, 30
      marker-yv: yv-n
    - type: text
      text: 'gifts of healings, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 11:17
      marker-yv: yv-n
    - type: text
      text: 'helps, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:8; 1 Tim. 5:17; Heb. 13:17, 24
      marker-yv: yv-n
    - type: text
      text: 'administrations, varieties of tongues. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Are
    - type: text
      text: ' all apostles? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Are
    - type: text
      text: ' all prophets? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Are
    - type: text
      text: ' all teachers? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Are
    - type: text
      text: ' all workers of miracles? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore I make known to you that no one speaking by the Spirit of God calls Jesus accursed, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 16:17
      marker-yv: yv-n
    - type: text
      text: no one can say that Jesus is Lord except by the Holy Spirit.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do all have gifts of healings? Do all speak with tongues? Do all interpret? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 14:1, 39
      marker-yv: yv-n
    - type: text
      text: earnestly desire the best gifts. And yet I show you a more excellent way.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:3–8; 1 Cor. 12:11; Eph. 4:4, 11; Heb. 2:4
      marker-yv: yv-n
    - type: text
      text: 'There are diversities of gifts, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 4:4
      marker-yv: yv-n
    - type: text
      text: 'the same Spirit. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:6
      marker-yv: yv-n
    - type: text
      text: 'There are differences of ministries, but the same Lord. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there are diversities of activities, but it is the same God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:28; Eph. 1:23; 4:6
      marker-yv: yv-n
    - type: text
      text: 'who works all in all. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the manifestation of the Spirit is given to each one for the profit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'all:'
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for to one is given '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 2:6, 7; 2 Cor. 1:12
      marker-yv: yv-n
    - type: text
      text: 'the word of wisdom through the Spirit, to another '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 15:14; (1 Cor. 2:11, 16); 2 Cor. 8:7
      marker-yv: yv-n
    - type: text
      text: 'the word of knowledge through the same Spirit, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 17:19; (1 Cor. 13:2); 2 Cor. 4:13
      marker-yv: yv-n
    - type: text
      text: 'to another faith by the same Spirit, to another '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:1; Mark 3:15; 16:18; James 5:14
      marker-yv: yv-n
    - type: text
      text: 'gifts of healings by the same Spirit, '
