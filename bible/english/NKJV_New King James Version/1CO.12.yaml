  - type: text
    content: 'have all been made to drink into one Spirit. '
  '14':
  - type: text
    content: For in fact the body is not one member but many.
  '15':
  - type: text
    content: 'If the foot should say, “Because I am not a hand, I am not of the body,” is it therefore not of the body? '
  '16':
  - type: text
