  '21':
  - type: text
    content: 'And the eye cannot say to the hand, “I have no need of you”; nor again the head to the feet, “I have no need of you.” '
  '22':
  - type: text
    content: 'No, much rather, those members of the body which seem to be weaker are necessary. '
  '23':
  - type: text
    content: 'And those '
  - type: text
