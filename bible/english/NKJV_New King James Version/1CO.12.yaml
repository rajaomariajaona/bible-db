  - type: text
    content: ' all teachers? '
  - type: text
    content: Are
  - type: text
    content: ' all workers of miracles? '
  '3':
  - type: text
    content: 'Therefore I make known to you that no one speaking by the Spirit of God calls Jesus accursed, and '
  - type: note
    content: Matt. 16:17
  - type: text
    content: no one can say that Jesus is Lord except by the Holy Spirit.
  '30':
  - type: text
    content: 'Do all have gifts of healings? Do all speak with tongues? Do all interpret? '
  '31':
  - type: text
    content: 'But '
  - type: note
    content: 1 Cor. 14:1, 39
  - type: text
    content: earnestly desire the best gifts. And yet I show you a more excellent way.
  '4':
  - type: note
    content: Rom. 12:3–8; 1 Cor. 12:11; Eph. 4:4, 11; Heb. 2:4
  - type: text
    content: 'There are diversities of gifts, but '
  - type: note
    content: Eph. 4:4
  - type: text
    content: 'the same Spirit. '
  '5':
  - type: note
    content: Rom. 12:6
  - type: text
    content: 'There are differences of ministries, but the same Lord. '
  '6':
