  '1':
  - type: heading
    content: The Sign of the Broken Flask
  - type: text
    content: 'Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': “Go and get a potter’s earthen flask, and '
  - type: text
    content: take
  - type: text
    content: ' some of the elders of the people and some of the elders of the priests. '
  '10':
  - type: note
    content: Jer. 51:63, 64
  - type: text
    content: '“Then you shall break the flask in the sight of the men who go with you, '
  '11':
  - type: text
    content: 'and say to them, ‘Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: Ps. 2:9; Is. 30:14; Jer. 13:14; Lam. 4:2; Rev. 2:27
  - type: text
    content: '“Even so I will break this people and this city, as '
  - type: text
    content: one
  - type: text
    content: ' breaks a potter’s vessel, which cannot be made whole again; and they shall '
  - type: note
    content: Jer. 7:32
  - type: text
    content: 'bury '
  - type: text
    content: them
  - type: text
    content: ' in Tophet till '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' no place to bury. '
  '12':
  - type: text
    content: 'Thus I will do to this place,” says the '
  - type: heading
    content: Lord
  - type: text
    content: ', “and to its inhabitants, and make this city like Tophet. '
  '13':
  - type: text
    content: 'And the houses of Jerusalem and the houses of the kings of Judah shall be defiled '
  - type: note
    content: 2 Kin. 23:10; Ps. 74:7; 79:1; Jer. 52:13; Ezek. 7:21, 22
  - type: text
    content: 'like the place of Tophet, because of all the houses on whose '
  - type: note
    content: 2 Kin. 23:12; Jer. 32:29; Zeph. 1:5
  - type: text
    content: 'roofs they have burned incense to all the host of heaven, and '
  - type: note
    content: Jer. 7:18; Ezek. 20:28
  - type: text
    content: poured out drink offerings to other gods.” ’ ”
  '14':
  - type: text
    content: 'Then Jeremiah came from Tophet, where the '
  - type: heading
    content: Lord
  - type: text
    content: ' had sent him to prophesy; and he stood in '
  - type: note
    content: 2 Chr. 20:5; Jer. 26:2–8
  - type: text
    content: 'the court of the Lord’s house and said to all the people, '
  '15':
  - type: text
    content: '“Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: ‘Behold, I will bring on this city and on all her towns all the doom that I have pronounced against it, because '
  - type: note
    content: Neh. 9:17, 29; Jer. 7:26; 17:23
  - type: text
    content: they have stiffened their necks that they might not hear My words.’ ”
  '2':
  - type: text
    content: 'And go out to '
  - type: note
    content: Josh. 15:8; 2 Kin. 23:10; Jer. 7:31; 32:35
  - type: text
    content: 'the Valley of the Son of Hinnom, which '
  - type: text
    content: is
  - type: text
    content: ' by the entry of the Potsherd Gate; and proclaim there the words that I will tell you, '
  '3':
  - type: note
    content: Jer. 17:20
  - type: text
    content: 'and say, ‘Hear the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', O kings of Judah and inhabitants of Jerusalem. Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: “Behold, I will bring such a catastrophe on this place, that whoever hears of it, his ears will '
  - type: note
    content: 1 Sam. 3:11; 2 Kin. 21:12
  - type: text
    content: tingle.
  '4':
  - type: text
    content: '“Because they '
  - type: note
    content: Deut. 28:20; Is. 65:11; Jer. 2:13, 17, 19; 15:6; 17:13
  - type: text
    content: 'have forsaken Me and made this an alien place, because they have burned incense in it to other gods whom neither they, their fathers, nor the kings of Judah have known, and have filled this place with '
  - type: note
    content: 2 Kin. 21:12; Jer. 2:34; 7:6
  - type: text
    content: 'the blood of the innocents '
  '5':
  - type: note
    content: Num. 22:41; Jer. 7:31; 32:35
  - type: text
    content: '(they have also built the high places of Baal, to burn their sons with fire '
  - type: text
    content: for
  - type: text
    content: ' burnt offerings to Baal, '
  - type: note
    content: Lev. 18:21; 2 Kin. 17:17; Ps. 106:37, 38
  - type: text
    content: 'which I did not command or speak, nor did it come into My mind), '
  '6':
  - type: text
    content: 'therefore behold, the days are coming,” says the '
  - type: heading
    content: Lord
  - type: text
    content: ', “that this place shall no more be called Tophet or '
  - type: note
    content: Josh. 15:8; Jer. 7:32
  - type: text
    content: 'the Valley of the Son of Hinnom, but the Valley of Slaughter. '
  '7':
  - type: text
    content: 'And I will make void the counsel of Judah and Jerusalem in this place, '
  - type: note
    content: Lev. 26:17; Deut. 28:25; Jer. 15:2, 9
  - type: text
    content: 'and I will cause them to fall by the sword before their enemies and by the hands of those who seek their lives; their '
  - type: note
    content: Ps. 79:2; Jer. 7:33; 16:4; 34:20
  - type: text
    content: 'corpses I will give as meat for the birds of the heaven and for the beasts of the earth. '
  '8':
  - type: text
    content: 'I will make this city '
  - type: note
    content: Jer. 18:16; 49:13; 50:13
  - type: text
    content: 'desolate and a hissing; everyone who passes by it will be astonished and hiss because of all its plagues. '
  '9':
  - type: text
    content: 'And I will cause them to eat the '
  - type: note
    content: Lev. 26:29; Deut. 28:53, 55; Is. 9:20; Lam. 4:10; Ezek. 5:10
  - type: text
    content: flesh of their sons and the flesh of their daughters, and everyone shall eat the flesh of his friend in the siege and in the desperation with which their enemies and those who seek their lives shall drive them to despair.” ’
