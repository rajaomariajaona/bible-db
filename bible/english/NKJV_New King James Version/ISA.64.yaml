document_id: ISA.64,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, that You would rend the heavens!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That You would come down!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That the mountains might shake at Your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:18; Ps. 18:9; 144:5; Mic. 1:3, 4; (Hab. 3:13)
      marker-yv: yv-n
    - type: text
      text: presence—
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your holy cities are a wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Zion is a wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jerusalem a desolation.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Our holy and beautiful temple,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where our fathers praised You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is burned up with fire;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 24:21
      marker-yv: yv-n
    - type: text
      text: our pleasant things are laid waste.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 42:14
      marker-yv: yv-n
    - type: text
      text: 'Will You restrain Yourself because of these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things,
    - type: text
      text: ' O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 83:1
      marker-yv: yv-n
    - type: text
      text: Will You hold Your peace, and afflict us very severely?
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As fire burns brushwood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As fire causes water to boil—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To make Your name known to Your adversaries,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That
    - type: text
      text: ' the nations may tremble at Your presence!'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 34:10
      marker-yv: yv-n
    - type: text
      text: 'You did awesome things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' we did not look,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You came down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The mountains shook at Your presence.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For since the beginning of the world
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 31:19
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Men
    - type: text
      text: ' have not heard nor perceived by the ear,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor has the eye seen any God besides You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who acts for the one who waits for Him.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You meet him who rejoices and does righteousness,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Who
    - type: text
      text: ' remembers You in Your ways.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are indeed angry, for we have sinned—
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 3:6
      marker-yv: yv-n
    - type: text
      text: In these ways we continue;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And we need to be saved.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But we are all like an unclean '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Phil. 3:9)
      marker-yv: yv-n
    - type: text
      text: 'our righteousnesses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' like filthy rags;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'We all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 90:5, 6; Is. 1:30
      marker-yv: yv-n
    - type: text
      text: fade as a leaf,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And our iniquities, like the wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have taken us away.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no one who calls on Your name,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who stirs himself up to take hold of You;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For You have hidden Your face from us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And have consumed us because of our iniquities.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But now, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' our Father;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'We '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the clay, and You our '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 29:16; 45:9; Jer. 18:6; (Rom. 9:20, 21)
      marker-yv: yv-n
    - type: text
      text: potter;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And all we '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the work of Your hand.'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Do not be furious, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor remember iniquity forever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Indeed, please look—we all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' Your people!'
