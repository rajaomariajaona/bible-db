document_id: LEV.11,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Foods Permitted and Forbidden
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses and Aaron, saying to them, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But all in the seas or in the rivers that do not have fins and scales, all that move in the water or any living thing which is in the water, they are an '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:18, 21; Deut. 14:3
      marker-yv: yv-n
    - type: text
      text: 'abomination to you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall be an abomination to you; you shall not eat their flesh, but you shall regard their carcasses as an abomination. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whatever in the water does not have fins or scales—that shall be an abomination to you.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 14:12–19; Is. 66:17
      marker-yv: yv-n
    - type: text
      text: '‘And these you shall regard as an abomination among the birds; they shall not be eaten, they are an abomination: the eagle, the vulture, the buzzard, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the kite, and the falcon after its kind; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'every raven after its kind, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the ostrich, the short-eared owl, the sea gull, and the hawk after its kind; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the little owl, the fisher owl, and the screech owl; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the white owl, the jackdaw, and the carrion vulture; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the stork, the heron after its kind, the hoopoe, and the bat.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the children of Israel, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 14:4; Ezek. 4:14; Dan. 1:8; (Matt. 15:11); Acts 10:12, 14; (Rom. 14:14; Heb. 9:10; 13:9)
      marker-yv: yv-n
    - type: text
      text: '‘These are the animals which you may eat among all the animals that are on the earth: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘All flying insects that creep on all fours shall be an abomination to you. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet these you may eat of every flying insect that creeps on all fours: those which have jointed legs above their feet with which to leap on the earth. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These you may eat: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 3:4; Mark 1:6
      marker-yv: yv-n
    - type: text
      text: 'the locust after its kind, the destroying locust after its kind, the cricket after its kind, and the grasshopper after its kind. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But all other flying insects which have four feet shall be an abomination to you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Unclean Animals
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘By these you shall become unclean; whoever touches the carcass of any of them shall be unclean until evening; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whoever carries part of the carcass of any of them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:8; 15:5; Num. 19:10, 21, 22; 31:24; Zech. 13:1; (Heb. 9:10; 10:22; Rev. 7:14)
      marker-yv: yv-n
    - type: text
      text: 'shall wash his clothes and be unclean until evening: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The carcass of any animal which divides the foot, but is not cloven-hoofed or does not chew the cud, is unclean to you. Everyone who touches it shall be unclean. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And whatever goes on its paws, among all kinds of animals that go on all fours, those are unclean to you. Whoever touches any such carcass shall be unclean until evening. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whoever carries any such carcass shall wash his clothes and be unclean until evening. It is unclean to you.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘These also shall be unclean to you among the creeping things that creep on the earth: the mole, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 66:17
      marker-yv: yv-n
    - type: text
      text: 'the mouse, and the large lizard after its kind; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Among the animals, whatever divides the hoof, having cloven hooves and chewing the cud—that you may eat. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the gecko, the monitor lizard, the sand reptile, the sand lizard, and the chameleon. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are unclean to you among all that creep. Whoever '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hag. 2:13
      marker-yv: yv-n
    - type: text
      text: 'touches them when they are dead shall be unclean until evening. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anything on which any of them falls, when they are dead shall be unclean, whether it is any item of wood or clothing or skin or sack, whatever item it is, in which any work is done, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:12
      marker-yv: yv-n
    - type: text
      text: 'it must be put in water. And it shall be unclean until evening; then it shall be clean. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Any '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 6:28
      marker-yv: yv-n
    - type: text
      text: 'earthen vessel into which any of them falls '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:12; Ps. 2:9; Jer. 48:38; (2 Tim. 2:21); Rev. 2:27
      marker-yv: yv-n
    - type: text
      text: 'you shall break; and whatever is in it shall be unclean: '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in such a vessel, any edible food upon which water falls becomes unclean, and any drink that may be drunk from it becomes unclean. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And everything on which a part of any such carcass falls shall be unclean; whether it is an oven or cooking stove, it shall be broken down; for they are unclean, and shall be unclean to you. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless a spring or a cistern, in which there is plenty of water, shall be clean, but whatever touches any such carcass becomes unclean. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if a part of any such carcass falls on any planting seed which is to be sown, it remains clean. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if water is put on the seed, and if a part of any such carcass falls on it, it becomes unclean to you.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘And if any animal which you may eat dies, he who touches its carcass shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hag. 2:11–13
      marker-yv: yv-n
    - type: text
      text: 'unclean until evening. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless these you shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 10:14
      marker-yv: yv-n
    - type: text
      text: 'not eat among those that chew the cud or those that have cloven hooves: the camel, because it chews the cud but does not have cloven hooves, is unclean to you; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:31; Lev. 17:15; 22:8; Deut. 14:21; Ezek. 4:14; 44:31
      marker-yv: yv-n
    - type: text
      text: He who eats of its carcass shall wash his clothes and be unclean until evening. He also who carries its carcass shall wash his clothes and be unclean until evening.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘And every creeping thing that creeps on the earth shall be an abomination. It shall not be eaten. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whatever crawls on its belly, whatever goes on all fours, or whatever has many feet among all creeping things that creep on the earth—these you shall not eat, for they are an abomination. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 20:25
      marker-yv: yv-n
    - type: text
      text: 'You shall not make yourselves abominable with any creeping thing that creeps; nor shall you make yourselves unclean with them, lest you be defiled by them. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I am the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 6:7; Lev. 22:33; 25:38; 26:45
      marker-yv: yv-n
    - type: text
      text: 'God. You shall therefore consecrate yourselves, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:6; Lev. 19:2; 20:7, 26; (Amos 3:3); Matt. 5:48; 1 Thess. 4:7; 1 Pet. 1:15, 16; (Rev. 22:11, 14)
      marker-yv: yv-n
    - type: text
      text: 'you shall be holy; for I am holy. Neither shall you defile yourselves with any creeping thing that creeps on the earth. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 6:7; 20:2; Lev. 22:33; 25:38; 26:45; Ps. 105:43–45; Hos. 11:1
      marker-yv: yv-n
    - type: text
      text: 'For I am the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who brings you up out of the land of Egypt, to be your God. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:44
      marker-yv: yv-n
    - type: text
      text: You shall therefore be holy, for I am holy.
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘This is the law of the animals and the birds and every living creature that moves in the waters, and of every creature that creeps on the earth, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 10:10; Ezek. 44:23; Mal. 3:18
      marker-yv: yv-n
    - type: text
      text: to distinguish between the unclean and the clean, and between the animal that may be eaten and the animal that may not be eaten.’ ”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the rock hyrax, because it chews the cud but does not have cloven hooves, is unclean to you; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the hare, because it chews the cud but does not have cloven hooves, is unclean to you; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the swine, though it divides the hoof, having cloven hooves, yet does not chew the cud, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 65:4; 66:3, 17; Mark 5:1–17
      marker-yv: yv-n
    - type: text
      text: 'is unclean to you. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their flesh you shall not eat, and their carcasses you shall not touch. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 52:11; (Mark 7:2, 15, 18); Acts 10:14, 15; 15:29
      marker-yv: yv-n
    - type: text
      text: They are unclean to you.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 14:9
      marker-yv: yv-n
    - type: text
      text: '‘These you may eat of all that are in the water: whatever in the water has fins and scales, whether in the seas or in the rivers—that you may eat. '
