  - type: text
    content: 'shall not circulate a false report. Do not put your hand with the wicked to be an '
  - type: note
    content: Deut. 19:16–21; Ps. 35:11; (Prov. 19:5); Acts 6:11
  - type: text
    content: 'unrighteous witness. '
  '10':
  - type: note
    content: Lev. 25:1–7
  - type: text
    content: '“Six years you shall sow your land and gather in its produce, '
  '11':
  - type: text
    content: 'but the seventh '
  - type: text
    content: year
  - type: text
    content: ' you shall let it rest and lie fallow, that the poor of your people may eat; and what they leave, the beasts of the field may eat. In like manner you shall do with your vineyard '
  - type: text
    content: and
  - type: text
    content: ' your olive grove. '
  '12':
  - type: note
    content: Luke 13:14
  - type: text
    content: Six days you shall do your work, and on the seventh day you shall rest, that your ox and your donkey may rest, and the son of your female servant and the stranger may be refreshed.
  '13':
  - type: text
    content: '“And in all that I have said to you, '
  - type: note
    content: Deut. 4:9, 23; 1 Tim. 4:16
  - type: text
    content: 'be circumspect and '
  - type: note
    content: Josh. 23:7; Ps. 16:4; Hos. 2:17
  - type: text
    content: make no mention of the name of other gods, nor let it be heard from your mouth.
  - type: heading
    content: Three Annual Feasts
  '14':
  - type: note
    content: Ex. 23:17; 34:22–24; Deut. 16:16
  - type: text
    content: '“Three times you shall keep a feast to Me in the year: '
  '15':
  - type: note
    content: Ex. 12:14–20; Lev. 23:6–8; Num. 28:16–25
  - type: text
    content: 'You shall keep the Feast of Unleavened Bread (you shall eat unleavened bread seven days, as I commanded you, at the time appointed in the month of Abib, for in it you came out of Egypt; '
  - type: note
    content: Ex. 22:29; 34:20
  - type: text
    content: 'none shall appear before Me empty); '
  '16':
  - type: note
    content: Ex. 34:22; Lev. 23:10; Num. 28:26
  - type: text
    content: 'and '
  - type: note
    content: Deut. 16:13
  - type: text
    content: 'the Feast of Harvest, the firstfruits of your labors which you have sown in the field; and the Feast of Ingathering at the end of the year, when you have gathered in '
  - type: text
