  - type: text
    content: ' your labors from the field.'
  '17':
  - type: note
    content: Ex. 23:14; 34:23; Deut. 16:16
  - type: text
    content: '“Three times in the year all your males shall appear before the Lord '
  - type: heading
    content: God
  - type: text
    content: .
  '18':
  - type: note
    content: Ex. 34:25; Lev. 2:11
  - type: text
    content: '“You shall not offer the blood of My sacrifice with '
  - type: note
    content: Ex. 12:10; Lev. 7:15; Deut. 16:4
  - type: text
    content: 'leavened bread; nor shall the fat of My sacrifice remain until morning. '
  '19':
  - type: note
    content: Ex. 22:29; 34:26; Deut. 26:2, 10; Neh. 10:35; Prov. 3:9
  - type: text
    content: 'The first of the firstfruits of your land you shall bring into the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. '
  - type: note
    content: Deut. 14:21
  - type: text
    content: You shall not boil a young goat in its mother’s milk.
  - type: heading
    content: The Angel and the Promises
  '2':
  - type: note
    content: Gen. 7:1
  - type: text
    content: 'You shall not follow a crowd to do evil; '
  - type: note
    content: Lev. 19:15
  - type: text
    content: 'nor shall you testify in a dispute so as to turn aside after many to pervert '
  - type: text
    content: justice.
  - type: text
    content: ' '
  '20':
  - type: note
    content: Ex. 3:2; 13:15; 14:19; Josh. 5:14
  - type: text
    content: '“Behold, I send an Angel before you to keep you in the way and to bring you into the place which I have prepared. '
  '21':
  - type: text
    content: 'Beware of Him and obey His voice; '
  - type: note
    content: Num. 14:11; Deut. 9:7; Ps. 78:40, 56
  - type: text
    content: 'do not provoke Him, for He will '
  - type: note
    content: Deut. 18:19; 1 John 5:16
  - type: text
    content: 'not pardon your transgressions; for '
  - type: note
    content: Is. 9:6; Jer. 23:6
  - type: text
    content: 'My name '
  - type: text
    content: is
  - type: text
    content: ' in Him. '
  '22':
  - type: text
    content: 'But if you indeed obey His voice and do all that I speak, then '
  - type: note
    content: Gen. 12:3; Num. 24:9; Deut. 30:7; Jer. 30:20
  - type: text
    content: 'I will be an enemy to your enemies and an adversary to your adversaries. '
  '23':
  - type: note
    content: Ex. 23:20
  - type: text
    content: 'For My Angel will go before you and '
  - type: note
    content: Josh. 24:8, 11
  - type: text
    content: 'bring you in to the Amorites and the Hittites and the Perizzites and the Canaanites and the Hivites and the Jebusites; and I will cut them off. '
  '24':
  - type: text
    content: 'You shall not '
  - type: note
    content: Ex. 20:5; 23:13, 33
  - type: text
    content: 'bow down to their gods, nor serve them, '
  - type: note
    content: Deut. 12:30, 31
  - type: text
    content: 'nor do according to their works; '
  - type: note
    content: Ex. 34:13; Num. 33:52; Deut. 7:5; 12:3; 2 Kin. 18:4
  - type: text
    content: 'but you shall utterly overthrow them and completely break down their '
  - type: text
    content: sacred
  - type: text
    content: ' pillars.'
  '25':
  - type: text
    content: '“So you shall '
  - type: note
    content: Deut. 6:13; (Matt. 4:10)
  - type: text
    content: 'serve the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, and '
  - type: note
    content: Deut. 28:5
  - type: text
    content: 'He will bless your bread and your water. And '
  - type: note
    content: Ex. 15:26; Deut. 7:15
  - type: text
    content: 'I will take sickness away from the midst of you. '
  '26':
  - type: note
    content: Deut. 7:14; 28:4; Mal. 3:11
  - type: text
    content: 'No one shall suffer miscarriage or be barren in your land; I will '
  - type: note
    content: 1 Chr. 23:1
  - type: text
    content: fulfill the number of your days.
  '27':
  - type: text
    content: '“I will send '
  - type: note
    content: Gen. 35:5; Ex. 15:16; Deut. 2:25; Josh. 2:9
  - type: text
    content: 'My fear before you, I will '
  - type: note
    content: Deut. 7:23
  - type: text
    content: 'cause confusion among all the people to whom you come, and will make all your enemies turn '
  - type: text
    content: their
  - type: text
    content: ' backs to you. '
  '28':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 7:20; Josh. 24:12
  - type: text
    content: 'I will send hornets before you, which shall drive out the Hivite, the Canaanite, and the Hittite from before you. '
  '29':
  - type: note
    content: Deut. 7:22
  - type: text
    content: 'I will not drive them out from before you in one year, lest the land become desolate and the beasts of the field become too numerous for you. '
  '3':
  - type: text
    content: 'You shall not show partiality to a '
  - type: note
    content: Ex. 23:6; Lev. 19:15; Deut. 1:17; 16:19
  - type: text
    content: poor man in his dispute.
  '30':
  - type: text
    content: 'Little by little I will drive them out from before you, until you have increased, and you inherit the land. '
  '31':
  - type: text
    content: 'And '
  - type: note
    content: Gen. 15:18; Deut. 1:7, 8; 11:24; 1 Kin. 4:21, 24
  - type: text
    content: 'I will set your bounds from the Red Sea to the sea, Philistia, and from the desert to the River. For I will '
  - type: note
    content: Josh. 21:44
  - type: text
    content: 'deliver the inhabitants of the land into your hand, and you shall drive them out before you. '
  '32':
  - type: note
    content: Ex. 34:12, 15; Deut. 7:2
  - type: text
    content: 'You shall make no covenant with them, nor with their gods. '
  '33':
  - type: text
    content: 'They shall not dwell in your land, lest they make you sin against Me. For '
  - type: text
    content: if
  - type: text
    content: ' you serve their gods, '
  - type: note
    content: Ex. 34:12; Deut. 12:30; Josh. 23:13; Judg. 2:3; 1 Sam. 18:21; Ps. 106:36
  - type: text
    content: it will surely be a snare to you.”
  '4':
  - type: note
    content: (Rom. 12:20)
  - type: text
    content: '“If you meet your enemy’s ox or his donkey going astray, you shall surely bring it back to him again. '
  '5':
  - type: note
    content: Deut. 22:4
  - type: text
    content: If you see the donkey of one who hates you lying under its burden, and you would refrain from helping it, you shall surely help him with it.
  '6':
  - type: note
    content: Eccl. 5:8
  - type: text
    content: '“You shall not pervert the judgment of your poor in his dispute. '
  '7':
  - type: note
    content: Ex. 20:16; Ps. 119:29; Eph. 4:25
  - type: text
    content: 'Keep yourself far from a false matter; '
  - type: note
    content: Matt. 27:4
  - type: text
    content: 'do not kill the innocent and righteous. For '
  - type: note
    content: Ex. 34:7; Deut. 25:1; Rom. 1:18
  - type: text
    content: 'I will not justify the wicked. '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 10:17; 16:19; Prov. 15:27; 17:8, 23; Is. 5:22, 23
  - type: text
    content: 'you '
  - type: note
    content: Ex. 22:21; Lev. 19:33; Deut. 24:17; 27:19
  - type: text
    content: shall take no bribe, for a bribe blinds the discerning and perverts the words of the righteous.
  '9':
  - type: text
    content: “Also you shall not oppress a stranger, for you know the heart of a stranger, because you were strangers in the land of Egypt.
  - type: heading
    content: The Law of Sabbaths
