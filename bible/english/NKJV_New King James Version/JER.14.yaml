document_id: JER.14,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Sword, Famine, and Pestilence
  - type: text
    content: 'The word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' that came to Jeremiah concerning the droughts.'
  '10':
  - type: text
    content: 'Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' to this people:'
  - type: note
    content: Jer. 2:23–25
  - type: text
    content: “Thus they have loved to wander;
  - type: text
    content: They have not restrained their feet.
  - type: text
    content: 'Therefore the '
  - type: heading
    content: Lord
  - type: text
    content: ' does not accept them;'
  - type: note
    content: (Jer. 44:21–23); Hos. 8:13
  - type: text
    content: He will remember their iniquity now,
  - type: text
    content: And punish their sins.”
  '11':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to me, '
  - type: note
    content: Ex. 32:10; Jer. 7:16; 11:14
  - type: text
    content: '“Do not pray for this people, for '
  - type: text
    content: their
  - type: text
    content: ' good. '
  '12':
  - type: note
    content: Prov. 1:28; (Is. 1:15; 58:3–6); Ezek. 8:18; Mic. 3:4; Zech. 7:13
  - type: text
    content: 'When they fast, I will not hear their cry; and '
  - type: note
    content: Jer. 6:20
  - type: text
    content: 'when they offer burnt offering and grain offering, I will not accept them. But '
  - type: note
    content: Jer. 9:16
  - type: text
    content: I will consume them by the sword, by the famine, and by the pestilence.”
  '13':
  - type: note
    content: Jer. 4:10
  - type: text
    content: 'Then I said, “Ah, Lord '
  - type: heading
    content: God
  - type: text
    content: '! Behold, the prophets say to them, ‘You shall not see the sword, nor shall you have famine, but I will give you assured '
  - type: note
    content: Jer. 8:11; 23:17
  - type: text
    content: peace in this place.’ ”
  '14':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to me, '
  - type: note
    content: Jer. 27:10
  - type: text
    content: '“The prophets prophesy lies in My name. '
  - type: note
    content: Jer. 29:8, 9
  - type: text
    content: 'I have not sent them, commanded them, nor spoken to them; they prophesy to you a false vision, divination, a worthless thing, and the '
  - type: note
    content: Jer. 23:16; Ezek. 12:24
  - type: text
    content: 'deceit of their heart. '
  '15':
  - type: text
    content: 'Therefore thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' concerning the prophets who prophesy in My name, whom I did not send, '
  - type: note
    content: Jer. 5:12; Ezek. 14:10
  - type: text
    content: 'and who say, ‘Sword and famine shall not be in this land’—‘By sword and famine those prophets shall be consumed! '
  '16':
  - type: text
    content: 'And the people to whom they prophesy shall be cast out in the streets of Jerusalem because of the famine and the sword; '
  - type: note
    content: Ps. 79:2, 3; Jer. 7:32; 15:2, 3
  - type: text
    content: they will have no one to bury them—them nor their wives, their sons nor their daughters—for I will pour their wickedness on them.’
  '17':
  - type: text
    content: '“Therefore you shall say this word to them:'
  - type: note
    content: Jer. 9:1; 13:17; Lam. 1:16
  - type: text
    content: ‘Let my eyes flow with tears night and day,
  - type: text
    content: And let them not cease;
  - type: note
    content: Is. 37:22; Jer. 8:21; Lam. 1:15; 2:13
  - type: text
    content: For the virgin daughter of my people
  - type: text
    content: Has been broken with a mighty stroke, with a very severe blow.
  '18':
  - type: text
    content: 'If I go out to '
  - type: note
    content: Jer. 6:25; Lam. 1:20; Ezek. 7:15
  - type: text
    content: the field,
  - type: text
    content: Then behold, those slain with the sword!
  - type: text
    content: And if I enter the city,
  - type: text
    content: Then behold, those sick from famine!
  - type: text
    content: 'Yes, both prophet and '
  - type: note
    content: Jer. 23:11
  - type: text
    content: priest go about in a land they do not know.’ ”
  - type: heading
    content: The People Plead for Mercy
  '19':
  - type: note
    content: Jer. 6:30; 7:29; 12:7; Lam. 5:22
  - type: text
    content: Have You utterly rejected Judah?
  - type: text
    content: Has Your soul loathed Zion?
  - type: text
    content: 'Why have You stricken us so that '
  - type: note
    content: Jer. 15:18
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' no healing for us?'
  - type: note
    content: Job 30:26; Jer. 8:15; 1 Thess. 5:3
  - type: text
    content: 'We looked for peace, but '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' no good;'
  - type: text
    content: And for the time of healing, and there was trouble.
  '2':
  - type: text
    content: “Judah mourns,
  - type: text
    content: 'And '
  - type: note
    content: 2 Kin. 25:3; Is. 3:26
  - type: text
    content: her gates languish;
  - type: text
    content: 'They '
  - type: note
    content: Jer. 8:21
  - type: text
    content: mourn for the land,
  - type: text
    content: 'And '
  - type: note
    content: 1 Sam. 5:12; Jer. 11:11; 46:12; Zech. 7:13
  - type: text
    content: the cry of Jerusalem has gone up.
  '20':
  - type: text
    content: 'We acknowledge, O '
  - type: heading
    content: Lord
  - type: text
    content: ', our wickedness'
  - type: text
    content: And
  - type: text
    content: ' the iniquity of our '
  - type: note
    content: Neh. 9:2; Ps. 32:5; Jer. 3:25
  - type: text
    content: fathers,
  - type: text
    content: 'For '
  - type: note
    content: Ps. 106:6; Jer. 8:14; 14:7; Dan. 9:8
  - type: text
    content: we have sinned against You.
  '21':
  - type: text
    content: 'Do not abhor '
  - type: text
    content: us,
  - type: text
    content: ' for Your name’s sake;'
  - type: text
    content: Do not disgrace the throne of Your glory.
  - type: note
    content: Ps. 106:45
  - type: text
    content: Remember, do not break Your covenant with us.
  '22':
  - type: note
    content: Zech. 10:1
  - type: text
    content: 'Are there any among '
  - type: note
    content: Deut. 32:21
  - type: text
    content: 'the idols of the nations that can cause '
  - type: note
    content: 1 Kin. 17:1; Jer. 5:24
  - type: text
    content: rain?
  - type: text
    content: Or can the heavens give showers?
  - type: note
    content: Ps. 135:7
  - type: text
    content: Are
  - type: text
    content: ' You not He, O '
  - type: heading
    content: Lord
  - type: text
    content: ' our God?'
  - type: text
    content: Therefore we will wait for You,
  - type: text
    content: Since You have made all these.
  '3':
  - type: text
    content: Their nobles have sent their lads for water;
  - type: text
    content: 'They went to the cisterns '
  - type: text
    content: and
  - type: text
    content: ' found no water.'
  - type: text
    content: They returned with their vessels empty;
  - type: text
    content: 'They were '
  - type: note
    content: Job 6:20; Ps. 40:14
  - type: text
    content: ashamed and confounded
  - type: note
    content: 2 Sam. 15:30
  - type: text
    content: And covered their heads.
  '4':
  - type: text
    content: Because the ground is parched,
  - type: text
    content: 'For there was '
  - type: note
    content: Jer. 3:3; Ezek. 22:24
  - type: text
    content: no rain in the land,
  - type: text
    content: The plowmen were ashamed;
  - type: text
    content: They covered their heads.
  '5':
  - type: text
    content: Yes, the deer also gave birth in the field,
  - type: text
    content: But left because there was no grass.
  '6':
  - type: text
    content: 'And '
  - type: note
    content: Job 39:5, 6; Jer. 2:24
  - type: text
    content: the wild donkeys stood in the desolate heights;
  - type: text
    content: They sniffed at the wind like jackals;
  - type: text
    content: 'Their eyes failed because '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' no grass.”'
  '7':
  - type: text
    content: 'O '
  - type: heading
    content: Lord
  - type: text
    content: ', though our iniquities testify against us,'
  - type: text
    content: 'Do it '
  - type: note
    content: Ps. 25:11; Jer. 14:21
  - type: text
    content: for Your name’s sake;
  - type: text
    content: For our backslidings are many,
  - type: text
    content: We have sinned against You.
  '8':
  - type: note
    content: Jer. 17:13
  - type: text
    content: O the Hope of Israel, his Savior in time of trouble,
  - type: text
    content: Why should You be like a stranger in the land,
  - type: text
    content: 'And like a traveler '
  - type: text
    content: who
  - type: text
    content: ' turns aside to tarry for a night?'
  '9':
  - type: text
    content: Why should You be like a man astonished,
  - type: text
    content: 'Like a mighty one '
  - type: note
    content: Is. 59:1
  - type: text
    content: who
  - type: text
    content: ' cannot save?'
  - type: text
    content: 'Yet You, O '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ex. 29:45; Lev. 26:11; Ps. 46:5; Jer. 8:19
  - type: text
    content: are
  - type: text
    content: ' in our midst,'
  - type: text
    content: And we are called by Your name;
  - type: text
    content: Do not leave us!
