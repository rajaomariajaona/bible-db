document_id: JER.14,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sword, Famine, and Pestilence
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that came to Jeremiah concerning the droughts.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to this people:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 2:23–25
      marker-yv: yv-n
    - type: text
      text: “Thus they have loved to wander;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have not restrained their feet.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Therefore the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' does not accept them;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Jer. 44:21–23); Hos. 8:13
      marker-yv: yv-n
    - type: text
      text: He will remember their iniquity now,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And punish their sins.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 32:10; Jer. 7:16; 11:14
      marker-yv: yv-n
    - type: text
      text: '“Do not pray for this people, for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' good. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 1:28; (Is. 1:15; 58:3–6); Ezek. 8:18; Mic. 3:4; Zech. 7:13
      marker-yv: yv-n
    - type: text
      text: 'When they fast, I will not hear their cry; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 6:20
      marker-yv: yv-n
    - type: text
      text: 'when they offer burnt offering and grain offering, I will not accept them. But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 9:16
      marker-yv: yv-n
    - type: text
      text: I will consume them by the sword, by the famine, and by the pestilence.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 4:10
      marker-yv: yv-n
    - type: text
      text: 'Then I said, “Ah, Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: '! Behold, the prophets say to them, ‘You shall not see the sword, nor shall you have famine, but I will give you assured '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 8:11; 23:17
      marker-yv: yv-n
    - type: text
      text: peace in this place.’ ”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 27:10
      marker-yv: yv-n
    - type: text
      text: '“The prophets prophesy lies in My name. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 29:8, 9
      marker-yv: yv-n
    - type: text
      text: 'I have not sent them, commanded them, nor spoken to them; they prophesy to you a false vision, divination, a worthless thing, and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 23:16; Ezek. 12:24
      marker-yv: yv-n
    - type: text
      text: 'deceit of their heart. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' concerning the prophets who prophesy in My name, whom I did not send, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 5:12; Ezek. 14:10
      marker-yv: yv-n
    - type: text
      text: 'and who say, ‘Sword and famine shall not be in this land’—‘By sword and famine those prophets shall be consumed! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people to whom they prophesy shall be cast out in the streets of Jerusalem because of the famine and the sword; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 79:2, 3; Jer. 7:32; 15:2, 3
      marker-yv: yv-n
    - type: text
      text: they will have no one to bury them—them nor their wives, their sons nor their daughters—for I will pour their wickedness on them.’
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore you shall say this word to them:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 9:1; 13:17; Lam. 1:16
      marker-yv: yv-n
    - type: text
      text: ‘Let my eyes flow with tears night and day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let them not cease;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 37:22; Jer. 8:21; Lam. 1:15; 2:13
      marker-yv: yv-n
    - type: text
      text: For the virgin daughter of my people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Has been broken with a mighty stroke, with a very severe blow.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If I go out to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 6:25; Lam. 1:20; Ezek. 7:15
      marker-yv: yv-n
    - type: text
      text: the field,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then behold, those slain with the sword!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And if I enter the city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then behold, those sick from famine!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yes, both prophet and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 23:11
      marker-yv: yv-n
    - type: text
      text: priest go about in a land they do not know.’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The People Plead for Mercy
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 6:30; 7:29; 12:7; Lam. 5:22
      marker-yv: yv-n
    - type: text
      text: Have You utterly rejected Judah?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Has Your soul loathed Zion?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Why have You stricken us so that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 15:18
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no healing for us?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 30:26; Jer. 8:15; 1 Thess. 5:3
      marker-yv: yv-n
    - type: text
      text: 'We looked for peace, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' no good;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And for the time of healing, and there was trouble.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Judah mourns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:3; Is. 3:26
      marker-yv: yv-n
    - type: text
      text: her gates languish;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 8:21
      marker-yv: yv-n
    - type: text
      text: mourn for the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 5:12; Jer. 11:11; 46:12; Zech. 7:13
      marker-yv: yv-n
    - type: text
      text: the cry of Jerusalem has gone up.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'We acknowledge, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', our wickedness'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' the iniquity of our '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 9:2; Ps. 32:5; Jer. 3:25
      marker-yv: yv-n
    - type: text
      text: fathers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 106:6; Jer. 8:14; 14:7; Dan. 9:8
      marker-yv: yv-n
    - type: text
      text: we have sinned against You.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Do not abhor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us,
    - type: text
      text: ' for Your name’s sake;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not disgrace the throne of Your glory.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 106:45
      marker-yv: yv-n
    - type: text
      text: Remember, do not break Your covenant with us.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 10:1
      marker-yv: yv-n
    - type: text
      text: 'Are there any among '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:21
      marker-yv: yv-n
    - type: text
      text: 'the idols of the nations that can cause '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 17:1; Jer. 5:24
      marker-yv: yv-n
    - type: text
      text: rain?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or can the heavens give showers?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 135:7
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Are
    - type: text
      text: ' You not He, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore we will wait for You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Since You have made all these.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their nobles have sent their lads for water;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They went to the cisterns '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' found no water.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They returned with their vessels empty;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 6:20; Ps. 40:14
      marker-yv: yv-n
    - type: text
      text: ashamed and confounded
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:30
      marker-yv: yv-n
    - type: text
      text: And covered their heads.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because the ground is parched,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For there was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 3:3; Ezek. 22:24
      marker-yv: yv-n
    - type: text
      text: no rain in the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The plowmen were ashamed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They covered their heads.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, the deer also gave birth in the field,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But left because there was no grass.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 39:5, 6; Jer. 2:24
      marker-yv: yv-n
    - type: text
      text: the wild donkeys stood in the desolate heights;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They sniffed at the wind like jackals;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Their eyes failed because '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' no grass.”'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', though our iniquities testify against us,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Do it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 25:11; Jer. 14:21
      marker-yv: yv-n
    - type: text
      text: for Your name’s sake;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For our backslidings are many,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We have sinned against You.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 17:13
      marker-yv: yv-n
    - type: text
      text: O the Hope of Israel, his Savior in time of trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why should You be like a stranger in the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And like a traveler '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' turns aside to tarry for a night?'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why should You be like a man astonished,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Like a mighty one '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 59:1
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' cannot save?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yet You, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:45; Lev. 26:11; Ps. 46:5; Jer. 8:19
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in our midst,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And we are called by Your name;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not leave us!
