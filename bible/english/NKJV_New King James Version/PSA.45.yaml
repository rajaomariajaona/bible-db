document_id: PSA.45,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Glories of the Messiah and His Bride
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 69:title
      marker-yv: yv-n
    - type: text
      text: Set to “The Lilies.” A Contemplation of the sons of Korah. A Song of Love.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My heart is overflowing with a good theme;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I recite my composition concerning the King;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My tongue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the pen of a ready writer.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Listen, O daughter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Consider and incline your ear;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 21:13; Ruth 1:16, 17
      marker-yv: yv-n
    - type: text
      text: Forget your own people also, and your father’s house;
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So the King will greatly desire your beauty;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 95:6; (Is. 54:5)
      marker-yv: yv-n
    - type: text
      text: 'Because He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' your Lord, worship Him.'
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the daughter of Tyre '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' with a gift;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 49:23
      marker-yv: yv-n
    - type: text
      text: The rich among the people will seek your favor.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The royal daughter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' all glorious within '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: palace;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Her clothing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' woven with gold.'
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Song 1:4
      marker-yv: yv-n
    - type: text
      text: She shall be brought to the King in robes of many colors;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The virgins, her companions who follow her, shall be brought to You.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: With gladness and rejoicing they shall be brought;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They shall enter the King’s palace.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Instead of Your fathers shall be Your sons,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Pet. 2:9; Rev. 1:6; 20:6)
      marker-yv: yv-n
    - type: text
      text: Whom You shall make princes in all the earth.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 1:11
      marker-yv: yv-n
    - type: text
      text: I will make Your name to be remembered in all generations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore the people shall praise You forever and ever.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You are fairer than the sons of men;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 4:22
      marker-yv: yv-n
    - type: text
      text: Grace is poured upon Your lips;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore God has blessed You forever.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Gird Your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 49:2; Heb. 4:12); Rev. 1:16
      marker-yv: yv-n
    - type: text
      text: 'sword upon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Your
    - type: text
      text: ' thigh, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 9:6)
      marker-yv: yv-n
    - type: text
      text: O Mighty One,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'With Your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jude 25
      marker-yv: yv-n
    - type: text
      text: glory and Your majesty.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 6:2
      marker-yv: yv-n
    - type: text
      text: 'And in Your majesty ride prosperously because of truth, humility, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' righteousness;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And Your right hand shall teach You awesome things.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Your arrows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' sharp in the heart of the King’s enemies;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The peoples fall under You.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 93:2); Heb. 1:8, 9
      marker-yv: yv-n
    - type: text
      text: 'Your throne, O God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' forever and ever;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Num. 24:17)
      marker-yv: yv-n
    - type: text
      text: 'scepter of righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the scepter of Your kingdom.'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: You love righteousness and hate wickedness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Therefore God, Your God, has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 2:2
      marker-yv: yv-n
    - type: text
      text: anointed You
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'With the oil of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 21:6; Heb. 1:8, 9
      marker-yv: yv-n
    - type: text
      text: gladness more than Your companions.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'All Your garments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Song 1:12, 13
      marker-yv: yv-n
    - type: text
      text: 'scented with myrrh and aloes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cassia,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Out of the ivory palaces, by which they have made You glad.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Song 6:8
      marker-yv: yv-n
    - type: text
      text: 'Kings’ daughters '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' among Your honorable women;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 2:19
      marker-yv: yv-n
    - type: text
      text: At Your right hand stands the queen in gold from Ophir.
