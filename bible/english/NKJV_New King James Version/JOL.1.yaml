verses:
  '1':
  - type: text
    content: 'The word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' that came to '
  - type: note
    content: Acts 2:16
  - type: text
    content: Joel the son of Pethuel.
  - type: heading
    content: The Land Laid Waste
  '10':
  - type: text
    content: The field is wasted,
  - type: note
    content: Jer. 12:11; Hos. 3:4
  - type: text
    content: The land mourns;
  - type: text
    content: For the grain is ruined,
  - type: note
    content: Is. 24:7
  - type: text
    content: The new wine is dried up,
  - type: text
    content: The oil fails.
  '11':
  - type: note
    content: Jer. 14:3, 4; Amos 5:16
  - type: text
    content: Be ashamed, you farmers,
  - type: text
    content: Wail, you vinedressers,
  - type: text
    content: For the wheat and the barley;
  - type: text
    content: Because the harvest of the field has perished.
  '12':
  - type: note
    content: Joel 1:10; Hab. 3:17
  - type: text
    content: The vine has dried up,
  - type: text
    content: And the fig tree has withered;
  - type: text
    content: The pomegranate tree,
  - type: text
    content: The palm tree also,
  - type: text
    content: And the apple tree—
  - type: text
    content: All the trees of the field are withered;
  - type: text
    content: 'Surely '
  - type: note
    content: Is. 16:10; 24:11; Jer. 48:33
  - type: text
    content: joy has withered away from the sons of men.
  - type: heading
    content: Mourning for the Land
  '13':
  - type: note
    content: Jer. 4:8; Ezek. 7:18
  - type: text
    content: Gird yourselves and lament, you priests;
  - type: text
    content: Wail, you who minister before the altar;
  - type: text
    content: Come, lie all night in sackcloth,
  - type: text
    content: You who minister to my God;
  - type: text
    content: For the grain offering and the drink offering
  - type: text
    content: Are withheld from the house of your God.
  '14':
  - type: note
    content: 2 Chr. 20:3; Joel 2:15, 16
  - type: text
    content: Consecrate a fast,
  - type: text
    content: 'Call '
  - type: note
    content: Lev. 23:36
  - type: text
    content: a sacred assembly;
  - type: text
    content: Gather the elders
  - type: text
    content: And
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 20:13
  - type: text
    content: all the inhabitants of the land
  - type: text
    content: Into
  - type: text
    content: ' the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: 'And cry out to the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '15':
  - type: note
    content: (Is. 13:9; Jer. 30:7); Amos 5:16
  - type: text
    content: Alas for the day!
  - type: text
    content: 'For '
  - type: note
    content: Is. 13:6; Ezek. 7:2–12
  - type: text
    content: 'the day of the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' at hand;'
  - type: text
    content: It shall come as destruction from the Almighty.
  '16':
  - type: text
    content: 'Is not the food '
  - type: note
    content: Is. 3:1; Amos 4:6
  - type: text
    content: cut off before our eyes,
  - type: note
    content: Deut. 12:7; Ps. 43:4
  - type: text
    content: Joy and gladness from the house of our God?
  '17':
  - type: text
    content: The seed shrivels under the clods,
  - type: text
    content: Storehouses are in shambles;
  - type: text
    content: Barns are broken down,
  - type: text
    content: For the grain has withered.
  '18':
  - type: text
    content: 'How '
  - type: note
    content: 1 Kin. 8:5; Jer. 12:4; 14:5, 6; Hos. 4:3
  - type: text
    content: the animals groan!
  - type: text
    content: The herds of cattle are restless,
  - type: text
    content: Because they have no pasture;
  - type: text
    content: Even the flocks of sheep suffer punishment.
  '19':
  - type: text
    content: 'O '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: (Ps. 50:15); Mic. 7:7
  - type: text
    content: to You I cry out;
  - type: text
    content: 'For '
  - type: note
    content: Jer. 9:10; Amos 7:4
  - type: text
    content: fire has devoured the open pastures,
  - type: text
    content: And a flame has burned all the trees of the field.
  '2':
  - type: text
    content: Hear this, you elders,
  - type: text
    content: And give ear, all you inhabitants of the land!
  - type: note
    content: Jer. 30:7; Joel 2:2
  - type: text
    content: 'Has '
  - type: text
    content: anything
  - type: text
    content: ' '
  - type: text
    content: like
  - type: text
    content: ' this happened in your days,'
  - type: text
    content: Or even in the days of your fathers?
  '20':
  - type: text
    content: 'The beasts of the field also '
  - type: note
    content: Job 38:41; Ps. 104:21; 147:9; Joel 1:18
  - type: text
    content: cry out to You,
  - type: text
    content: 'For '
  - type: note
    content: 1 Kin. 17:7; 18:5
  - type: text
    content: the water brooks are dried up,
  - type: text
    content: And fire has devoured the open pastures.
  '3':
  - type: note
    content: Ex. 10:2; Ps. 78:4; Is. 38:19
  - type: text
    content: Tell your children about it,
  - type: text
    content: Let
  - type: text
    content: ' your children '
  - type: text
    content: tell
  - type: text
    content: ' their children,'
  - type: text
    content: And their children another generation.
  '4':
  - type: note
    content: Deut. 28:38; Joel 2:25; Amos 4:9
  - type: text
    content: 'What the chewing locust left, the '
  - type: note
    content: Is. 33:4
  - type: text
    content: swarming locust has eaten;
  - type: text
    content: What the swarming locust left, the crawling locust has eaten;
  - type: text
    content: And what the crawling locust left, the consuming locust has eaten.
  '5':
  - type: text
    content: 'Awake, you '
  - type: note
    content: Is. 5:11; 28:1; Hos. 7:5
  - type: text
    content: drunkards, and weep;
  - type: text
    content: And wail, all you drinkers of wine,
  - type: text
    content: Because of the new wine,
  - type: note
    content: Is. 32:10
  - type: text
    content: For it has been cut off from your mouth.
  '6':
  - type: text
    content: 'For '
  - type: note
    content: Prov. 30:25; Joel 2:2, 11, 25
  - type: text
    content: a nation has come up against My land,
  - type: text
    content: Strong, and without number;
  - type: note
    content: Rev. 9:8
  - type: text
    content: 'His teeth '
  - type: text
    content: are
  - type: text
    content: ' the teeth of a lion,'
  - type: text
    content: And he has the fangs of a fierce lion.
  '7':
  - type: text
    content: 'He has '
  - type: note
    content: Is. 5:6; Amos 4:9
  - type: text
    content: laid waste My vine,
  - type: text
    content: And ruined My fig tree;
  - type: text
    content: 'He has stripped it bare and thrown '
  - type: text
    content: it
  - type: text
    content: ' away;'
  - type: text
    content: Its branches are made white.
  '8':
  - type: note
    content: Is. 22:12
  - type: text
    content: Lament like a virgin girded with sackcloth
  - type: text
    content: 'For '
  - type: note
    content: Prov. 2:17; Jer. 3:4
  - type: text
    content: the husband of her youth.
  '9':
  - type: note
