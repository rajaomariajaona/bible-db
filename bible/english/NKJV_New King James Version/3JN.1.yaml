document_id: 3JN.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greeting to Gaius
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Elder,
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the beloved Gaius, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 John 1
      marker-yv: yv-n
    - type: text
      text: 'whom I love in truth:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, if I come, I will call to mind his deeds which he does, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 10:8, 10
      marker-yv: yv-n
    - type: text
      text: 'prating against us with malicious words. And not content with that, he himself does not receive the brethren, and forbids those who wish to, putting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' out of the church.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 34:14; 37:27; Rom. 14:19; 1 Thess. 5:15; 1 Tim. 6:11; 2 Tim. 2:22
      marker-yv: yv-n
    - type: text
      text: 'do not imitate what is evil, but what is good. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 John 2:29; 3:10)
      marker-yv: yv-n
    - type: text
      text: 'He who does good is of God, but he who does evil has not seen '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 John 3:10)
      marker-yv: yv-n
    - type: text
      text: God.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Demetrius '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 6:3; 1 Tim. 3:7
      marker-yv: yv-n
    - type: text
      text: 'has a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: good
    - type: text
      text: ' testimony from all, and from the truth itself. And we also bear witness, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 19:35; 21:24
      marker-yv: yv-n
    - type: text
      text: and you know that our testimony is true.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Farewell Greeting
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 John 12
      marker-yv: yv-n
    - type: text
      text: 'I had many things to write, but I do not wish to write to you with pen and ink; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but I hope to see you shortly, and we shall speak face to face.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peace to you. Our friends greet you. Greet the friends by name.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved, I pray that you may prosper in all things and be in health, just as your soul prospers. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 John 4
      marker-yv: yv-n
    - type: text
      text: 'rejoiced greatly when brethren came and testified of the truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in you, just as you walk in the truth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have no greater '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 2:19, 20; 2 John 4
      marker-yv: yv-n
    - type: text
      text: 'joy than to hear that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 4:15)
      marker-yv: yv-n
    - type: text
      text: my children walk in truth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gaius Commended for Generosity
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved, you do faithfully whatever you do for the brethren and for strangers, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who have borne witness of your love before the church. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: If
    - type: text
      text: ' you send them forward on their journey in a manner worthy of God, you will do well, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because they went forth for His name’s sake, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 9:12, 15
      marker-yv: yv-n
    - type: text
      text: 'taking nothing from the Gentiles. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We therefore ought to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:40; Rom. 12:13; Heb. 13:2; 1 Pet. 4:9
      marker-yv: yv-n
    - type: text
      text: receive such, that we may become fellow workers for the truth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Diotrephes and Demetrius
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I wrote to the church, but Diotrephes, who loves to have the preeminence among them, does not receive us. '
