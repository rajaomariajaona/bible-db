document_id: 3JN.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting to Gaius
  - type: text
    content: The Elder,
  - type: text
    content: 'To the beloved Gaius, '
  - type: note
    content: 2 John 1
  - type: text
    content: 'whom I love in truth:'
  '10':
  - type: text
    content: 'Therefore, if I come, I will call to mind his deeds which he does, '
  - type: note
    content: Prov. 10:8, 10
  - type: text
    content: 'prating against us with malicious words. And not content with that, he himself does not receive the brethren, and forbids those who wish to, putting '
  - type: text
    content: them
  - type: text
    content: ' out of the church.'
  '11':
  - type: text
    content: 'Beloved, '
  - type: note
    content: Ps. 34:14; 37:27; Rom. 14:19; 1 Thess. 5:15; 1 Tim. 6:11; 2 Tim. 2:22
  - type: text
    content: 'do not imitate what is evil, but what is good. '
  - type: note
    content: (1 John 2:29; 3:10)
  - type: text
    content: 'He who does good is of God, but he who does evil has not seen '
  - type: note
    content: (1 John 3:10)
  - type: text
    content: God.
  '12':
  - type: text
    content: 'Demetrius '
  - type: note
    content: Acts 6:3; 1 Tim. 3:7
  - type: text
    content: 'has a '
  - type: text
    content: good
  - type: text
    content: ' testimony from all, and from the truth itself. And we also bear witness, '
  - type: note
    content: John 19:35; 21:24
  - type: text
    content: and you know that our testimony is true.
  - type: heading
    content: Farewell Greeting
  '13':
  - type: note
    content: 2 John 12
  - type: text
    content: 'I had many things to write, but I do not wish to write to you with pen and ink; '
  '14':
  - type: text
    content: but I hope to see you shortly, and we shall speak face to face.
  - type: text
    content: Peace to you. Our friends greet you. Greet the friends by name.
  '2':
  - type: text
    content: 'Beloved, I pray that you may prosper in all things and be in health, just as your soul prospers. '
  '3':
  - type: text
    content: 'For I '
  - type: note
    content: 2 John 4
  - type: text
    content: 'rejoiced greatly when brethren came and testified of the truth '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' in you, just as you walk in the truth. '
  '4':
  - type: text
    content: 'I have no greater '
  - type: note
    content: 1 Thess. 2:19, 20; 2 John 4
  - type: text
    content: 'joy than to hear that '
  - type: note
    content: (1 Cor. 4:15)
  - type: text
    content: my children walk in truth.
  - type: heading
    content: Gaius Commended for Generosity
  '5':
  - type: text
    content: 'Beloved, you do faithfully whatever you do for the brethren and for strangers, '
  '6':
  - type: text
    content: 'who have borne witness of your love before the church. '
  - type: text
    content: If
  - type: text
    content: ' you send them forward on their journey in a manner worthy of God, you will do well, '
  '7':
  - type: text
    content: 'because they went forth for His name’s sake, '
  - type: note
    content: 1 Cor. 9:12, 15
  - type: text
    content: 'taking nothing from the Gentiles. '
  '8':
  - type: text
    content: 'We therefore ought to '
  - type: note
    content: Matt. 10:40; Rom. 12:13; Heb. 13:2; 1 Pet. 4:9
  - type: text
    content: receive such, that we may become fellow workers for the truth.
  - type: heading
    content: Diotrephes and Demetrius
  '9':
  - type: text
    content: 'I wrote to the church, but Diotrephes, who loves to have the preeminence among them, does not receive us. '
