  - type: text
    content: 'Bozkath. '
  '10':
  - type: text
    content: Then Shaphan the scribe showed the king, saying, “Hilkiah the priest has given me a book.” And Shaphan read it before the king.
  '11':
  - type: text
    content: 'Now it happened, when the king heard the words of the Book of the Law, that he tore his clothes. '
  '12':
  - type: text
    content: 'Then the king commanded Hilkiah the priest, '
  - type: note
    content: 2 Kin. 25:22; Jer. 26:24
  - type: text
    content: 'Ahikam the son of Shaphan, Achbor the son of Michaiah, Shaphan the scribe, and Asaiah a servant of the king, saying, '
  '13':
  - type: text
    content: '“Go, inquire of the '
  - type: heading
    content: Lord
  - type: text
    content: ' for me, for the people and for all Judah, concerning the words of this book that has been found; for great '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: (Deut. 29:23–28; 31:17, 18)
  - type: text
    content: 'the wrath of the '
  - type: heading
    content: Lord
  - type: text
    content: ' that is aroused against us, because our fathers have not obeyed the words of this book, to do according to all that is written concerning us.”'
  '14':
  - type: text
    content: 'So Hilkiah the priest, Ahikam, Achbor, Shaphan, and Asaiah went to Huldah the prophetess, the wife of Shallum the son of '
  - type: note
    content: 2 Chr. 34:22
  - type: text
    content: 'Tikvah, the son of Harhas, keeper of the wardrobe. (She dwelt in Jerusalem in the Second Quarter.) And they spoke with her. '
  '15':
  - type: text
    content: 'Then she said to them, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel, ‘Tell the man who sent you to Me, '
  '16':
  - type: text
    content: '“Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘Behold, '
  - type: note
    content: Deut. 29:27; (Dan. 9:11–14)
  - type: text
    content: 'I will bring calamity on this place and on its inhabitants—all the words of the book which the king of Judah has read— '
  '17':
  - type: note
    content: Deut. 29:25–27; 2 Kin. 21:22
  - type: text
    content: 'because they have forsaken Me and burned incense to other gods, that they might provoke Me to anger with all the works of their hands. Therefore My wrath shall be aroused against this place and shall not be quenched.’ ” ’ '
  '18':
  - type: text
    content: 'But as for '
  - type: note
    content: 2 Chr. 34:26
  - type: text
    content: 'the king of Judah, who sent you to inquire of the '
  - type: heading
    content: Lord
  - type: text
    content: ', in this manner you shall speak to him, ‘Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel: “'
  - type: text
    content: Concerning
  - type: text
    content: ' the words which you have heard— '
  '19':
  - type: text
    content: 'because your '
  - type: note
    content: 1 Sam. 24:5; (Ps. 51:17; Is. 57:15)
  - type: text
    content: 'heart was tender, and you '
  - type: note
    content: Ex. 10:3; 1 Kin. 21:29; (2 Chr. 7:14)
  - type: text
    content: 'humbled yourself before the '
  - type: heading
    content: Lord
  - type: text
    content: ' when you heard what I spoke against this place and against its inhabitants, that they would become '
  - type: note
    content: Lev. 26:31, 32
  - type: text
    content: 'a desolation and '
  - type: note
    content: Jer. 26:6; 44:22
  - type: text
    content: 'a curse, and you tore your clothes and wept before Me, I also have heard '
  - type: text
    content: you,
  - type: text
    content: '” says the '
  - type: heading
