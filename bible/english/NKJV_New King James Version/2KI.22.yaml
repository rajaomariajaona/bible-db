  - type: text
    content: '. '
  '2':
  - type: text
    content: 'And he did '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' right in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and walked in all the ways of his father David; he '
  - type: note
    content: Deut. 5:32; Josh. 1:7
  - type: text
    content: did not turn aside to the right hand or to the left.
  - type: heading
    content: Hilkiah Finds the Book of the Law
  '20':
  - type: text
    content: '“Surely, therefore, I will gather you to your fathers, and you '
  - type: note
    content: 2 Kin. 23:30; (Ps. 37:37; Is. 57:1, 2)
  - type: text
    content: shall be gathered to your grave in peace; and your eyes shall not see all the calamity which I will bring on this place.” ’ ” So they brought back word to the king.
  '3':
  - type: note
    content: 2 Chr. 34:8
  - type: text
    content: 'Now it came to pass, in the eighteenth year of King Josiah, '
  - type: text
    content: that
  - type: text
    content: ' the king sent Shaphan the scribe, the son of Azaliah, the son of Meshullam, to the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying: '
  '4':
  - type: text
    content: '“Go up to Hilkiah the high priest, that he may count the money which has been '
  - type: note
    content: 2 Kin. 12:4
  - type: text
    content: 'brought into the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', which '
  - type: note
    content: 2 Kin. 12:9, 10
  - type: text
    content: 'the doorkeepers have gathered from the people. '
  '5':
  - type: text
    content: 'And let them '
  - type: note
    content: 2 Kin. 12:11–14
  - type: text
    content: 'deliver it into the hand of those doing the work, who are the overseers in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '; let them give it to those who '
  - type: text
    content: are
  - type: text
    content: ' in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' doing the work, to repair the damages of the house— '
  '6':
  - type: text
    content: 'to carpenters and builders and masons—and to buy timber and hewn stone to repair the house. '
  '7':
  - type: text
    content: 'However '
  - type: note
    content: 2 Kin. 12:15; (1 Cor. 4:2)
  - type: text
    content: there need be no accounting made with them of the money delivered into their hand, because they deal faithfully.”
  '8':
  - type: text
    content: 'Then Hilkiah the high priest said to Shaphan the scribe, '
  - type: note
    content: Deut. 31:24–26; 2 Chr. 34:14
  - type: text
    content: '“I have found the Book of the Law in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '.” And Hilkiah gave the book to Shaphan, and he read it. '
  '9':
  - type: text
    content: 'So Shaphan the scribe went to the king, bringing the king word, saying, “Your servants have gathered the money that was found in the house, and have delivered it into the hand of those who do the work, who oversee the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '.” '
