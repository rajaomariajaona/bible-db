    content: Josiah Reigns in Judah
  - type: text
    content: 'Josiah '
  - type: note
    content: 1 Kin. 13:2; 2 Chr. 34:1
  - type: text
    content: was
  - type: text
    content: ' eight years old when he became king, and he reigned thirty-one years in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Jedidah the daughter of Adaiah of '
  - type: note
