document_id: JHN.6,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Feeding the Five Thousand
  - type: text
    content: 'After '
  - type: note
    content: Matt. 14:13; Mark 6:32; Luke 9:10, 12
  - type: text
    content: 'these things Jesus went over the Sea of Galilee, which is '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: Sea
  - type: text
    content: ' of '
  - type: note
    content: John 6:23; 21:1
  - type: text
    content: 'Tiberias. '
  '10':
  - type: text
    content: 'Then Jesus said, '
  - type: text
    content: “Make the people sit down.”
  - type: text
    content: ' Now there was much grass in the place. So the men sat down, in number about five thousand. '
  '11':
  - type: text
    content: 'And Jesus took the loaves, and when He had given thanks He distributed '
  - type: text
    content: them
  - type: text
    content: ' to the disciples, and the disciples to those sitting down; and likewise of the fish, as much as they wanted. '
  '12':
  - type: text
    content: 'So when they were filled, He said to His disciples, '
  - type: text
    content: “Gather up the fragments that remain, so that nothing is lost.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Therefore they gathered '
  - type: text
    content: them
  - type: text
    content: ' up, and filled twelve baskets with the fragments of the five barley loaves which were left over by those who had eaten. '
  '14':
  - type: text
    content: 'Then those men, when they had seen the sign that Jesus did, said, “This is truly '
  - type: note
    content: Gen. 49:10; Deut. 18:15, 18; John 1:21; 7:40; Acts 3:22; 7:37
  - type: text
    content: the Prophet who is to come into the world.”
  - type: heading
    content: Jesus Walks on the Sea
  '15':
  - type: text
    content: 'Therefore when Jesus perceived that they were about to come and take Him by force to make Him '
  - type: note
    content: (John 18:36)
  - type: text
    content: king, He departed again to the mountain by Himself alone.
  '16':
  - type: note
    content: Matt. 14:23; Mark 6:47
  - type: text
    content: 'Now when evening came, His disciples went down to the sea, '
  '17':
  - type: text
    content: 'got into the boat, and went over the sea toward Capernaum. And it was already dark, and Jesus had not come to them. '
  '18':
  - type: text
    content: 'Then the sea arose because a great wind was blowing. '
  '19':
  - type: text
    content: 'So when they had rowed about three or four miles, they saw Jesus walking on the sea and drawing near the boat; and they were '
  - type: note
    content: Matt. 17:6
  - type: text
    content: 'afraid. '
  '2':
  - type: text
    content: 'Then a great multitude followed Him, because they saw His signs which He performed on those who were '
  - type: note
    content: Matt. 4:23; 8:16; 9:35; 14:36; 15:30; 19:2
  - type: text
    content: 'diseased. '
  '20':
  - type: text
    content: 'But He said to them, '
  - type: note
    content: Is. 43:1, 2
  - type: text
    content: “It is I; do not be afraid.”
  - type: text
    content: ' '
  '21':
  - type: text
    content: Then they willingly received Him into the boat, and immediately the boat was at the land where they were going.
  - type: heading
    content: The Bread from Heaven
  '22':
  - type: text
    content: 'On the following day, when the people who were standing on the other side of the sea saw that there was no other boat there, except that one which His disciples had entered, and that Jesus had not entered the boat with His disciples, but His disciples had gone away alone— '
  '23':
  - type: text
    content: 'however, other boats came from Tiberias, near the place where they ate bread after the Lord had given thanks— '
  '24':
  - type: text
    content: 'when the people therefore saw that Jesus was not there, nor His disciples, they also got into boats and came to Capernaum, '
  - type: note
    content: Mark 1:37; Luke 4:42
  - type: text
    content: 'seeking Jesus. '
  '25':
  - type: text
    content: And when they found Him on the other side of the sea, they said to Him, “Rabbi, when did You come here?”
  '26':
  - type: text
    content: 'Jesus answered them and said, '
  - type: text
    content: “Most assuredly, I say to you, you seek Me, not because you saw the signs, but because you ate of the loaves and were filled.
  - type: text
    content: ' '
  '27':
  - type: note
    content: Matt. 6:19
  - type: text
    content: 'Do not labor for the food which perishes, but '
  - type: note
    content: John 4:14; (Eph. 2:8, 9)
  - type: text
    content: 'for the food which endures to everlasting life, which the Son of Man will give you, '
  - type: note
    content: Ps. 2:7; Is. 42:1; Matt. 3:17; 17:5; Mark 1:11; 9:7; Luke 3:22; 9:35; John 5:37; Acts 2:22; 2 Pet. 1:17
  - type: text
    content: because God the Father has set His seal on Him.”
  '28':
  - type: text
    content: Then they said to Him, “What shall we do, that we may work the works of God?”
  '29':
  - type: text
    content: 'Jesus answered and said to them, '
  - type: note
    content: 1 Thess. 1:3; James 2:22; (1 John 3:23); Rev. 2:26
  - type: text
    content: “This is the work of God, that you believe in Him whom He sent.”
  '3':
  - type: text
    content: And Jesus went up on the mountain, and there He sat with His disciples.
  '30':
  - type: text
    content: 'Therefore they said to Him, '
  - type: note
    content: Matt. 12:38; 16:1; Mark 8:11; 1 Cor. 1:22
  - type: text
    content: '“What sign will You perform then, that we may see it and believe You? What work will You do? '
  '31':
  - type: note
    content: Ex. 16:15; Num. 11:7; 1 Cor. 10:3
  - type: text
    content: 'Our fathers ate the manna in the desert; as it is written, '
  - type: note
    content: Ex. 16:4, 15; Neh. 9:15; Ps. 78:24
  - type: text
    content: ‘He gave them bread from heaven to eat.’ ”
  '32':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: '“Most assuredly, I say to you, Moses did not give you the bread from heaven, but '
  - type: note
    content: John 3:13, 16
  - type: text
    content: My Father gives you the true bread from heaven.
  - type: text
    content: ' '
  '33':
  - type: text
    content: For the bread of God is He who comes down from heaven and gives life to the world.”
  '34':
  - type: note
    content: John 4:15
  - type: text
    content: Then they said to Him, “Lord, give us this bread always.”
  '35':
  - type: text
    content: 'And Jesus said to them, '
  - type: note
    content: John 6:48, 58
  - type: text
    content: '“I am the bread of life. '
  - type: note
    content: John 4:14; 7:37; Rev. 7:16
  - type: text
    content: 'He who comes to Me shall never hunger, and he who believes in Me shall never '
  - type: note
    content: Is. 55:1, 2
  - type: text
    content: thirst.
  - type: text
    content: ' '
  '36':
  - type: note
    content: John 6:26, 64; 15:24
  - type: text
    content: 'But I said to you that you have seen Me and yet '
  - type: note
    content: John 10:26
  - type: text
    content: do not believe.
  - type: text
    content: ' '
  '37':
  - type: note
    content: John 6:45
  - type: text
    content: 'All that the Father gives Me will come to Me, and '
  - type: note
    content: (Matt. 24:24; John 10:28, 29); 2 Tim. 2:19; 1 John 2:19
  - type: text
    content: 'the one who comes to Me I will '
  - type: text
    content: by no means cast out.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'For I have come down from heaven, '
  - type: note
    content: Matt. 26:39; John 5:30
  - type: text
    content: 'not to do My own will, '
  - type: note
    content: John 4:34
  - type: text
    content: but the will of Him who sent Me.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'This is the will of the Father who sent Me, '
  - type: note
    content: John 10:28; 17:12; 18:9
  - type: text
    content: that of all He has given Me I should lose nothing, but should raise it up at the last day.
  - type: text
    content: ' '
  '4':
  - type: note
    content: Lev. 23:5, 7; Deut. 16:1; John 2:13
  - type: text
    content: 'Now the Passover, a feast of the Jews, was near. '
  '40':
  - type: text
    content: 'And this is the will of Him who sent Me, '
  - type: note
    content: John 3:15, 16; 4:14; 6:27, 47, 54
  - type: text
    content: that everyone who sees the Son and believes in Him may have everlasting life; and I will raise him up at the last day.”
  - type: heading
    content: Rejected by His Own
  '41':
  - type: text
    content: 'The Jews then complained about Him, because He said, '
  - type: text
    content: “I am the bread which came down from heaven.”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'And they said, '
  - type: note
    content: Matt. 13:55; Mark 6:3; Luke 4:22
  - type: text
    content: '“Is not this Jesus, the son of Joseph, whose father and mother we know? How is it then that He says, '
  - type: text
    content: ‘I have come down from heaven’
  - type: text
    content: ?”
  '43':
  - type: text
    content: 'Jesus therefore answered and said to them, '
  - type: text
    content: “Do not murmur among yourselves.
  - type: text
    content: ' '
  '44':
  - type: note
    content: Song 1:4
  - type: text
    content: 'No one can come to Me unless the Father who sent Me '
  - type: note
    content: (Eph. 2:8, 9; Phil. 1:29; 2:12, 13)
  - type: text
    content: draws him; and I will raise him up at the last day.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'It is written in the prophets, '
  - type: note
    content: Is. 54:13; Jer. 31:34; Mic. 4:2; (Heb. 8:10)
  - type: text
    content: ‘And they shall all be taught by God.’
  - type: text
    content: ' '
  - type: note
    content: John 6:37
  - type: text
    content: 'Therefore everyone who '
  - type: text
    content: has heard and learned
  - type: text
    content: ' from the Father comes to Me.'
  - type: text
    content: ' '
  '46':
  - type: note
    content: John 1:18
  - type: text
    content: 'Not that anyone has seen the Father, '
  - type: note
    content: Matt. 11:27; (Luke 10:22); John 7:29
  - type: text
    content: except He who is from God; He has seen the Father.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'Most assuredly, I say to you, '
  - type: note
    content: (John 3:16, 18)
  - type: text
    content: 'he who believes '
  - type: text
    content: in Me
  - type: text
    content: ' has everlasting life.'
  - type: text
    content: ' '
  '48':
  - type: note
    content: John 6:33, 35; (Gal. 2:20; Col. 3:3, 4)
  - type: text
    content: I am the bread of life.
  - type: text
    content: ' '
  '49':
  - type: note
    content: John 6:31, 58
  - type: text
    content: Your fathers ate the manna in the wilderness, and are dead.
  - type: text
    content: ' '
  '5':
  - type: note
    content: Matt. 14:14; Mark 6:35; Luke 9:12
  - type: text
    content: 'Then Jesus lifted up '
  - type: text
    content: His
  - type: text
    content: ' eyes, and seeing a great multitude coming toward Him, He said to '
  - type: note
    content: John 1:43
  - type: text
    content: 'Philip, '
  - type: text
    content: “Where shall we buy bread, that these may eat?”
  - type: text
    content: ' '
  '50':
  - type: note
    content: John 6:51, 58
  - type: text
    content: This is the bread which comes down from heaven, that one may eat of it and not die.
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'I am the living bread '
  - type: note
    content: John 3:13
  - type: text
    content: 'which came down from heaven. If anyone eats of this bread, he will live forever; and '
  - type: note
    content: Heb. 10:5
  - type: text
    content: the bread that I shall give is My flesh, which I shall give for the life of the world.”
  '52':
  - type: text
    content: 'The Jews therefore '
  - type: note
    content: John 7:43; 9:16; 10:19
  - type: text
    content: 'quarreled among themselves, saying, “How can this Man give us '
  - type: text
    content: His
  - type: text
    content: ' flesh to eat?”'
  '53':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: '“Most assuredly, I say to you, unless '
  - type: note
    content: Matt. 26:26
  - type: text
    content: you eat the flesh of the Son of Man and drink His blood, you have no life in you.
  - type: text
    content: ' '
  '54':
  - type: note
    content: John 4:14; 6:27, 40
  - type: text
    content: Whoever eats My flesh and drinks My blood has eternal life, and I will raise him up at the last day.
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'For My flesh is '
  - type: text
    content: food indeed,
  - type: text
    content: ' and My blood is '
  - type: text
    content: drink indeed.
  - type: text
    content: ' '
  '56':
  - type: text
    content: 'He who eats My flesh and drinks My blood '
  - type: note
    content: (1 John 3:24; 4:15, 16)
  - type: text
    content: abides in Me, and I in him.
  - type: text
    content: ' '
  '57':
  - type: text
    content: As the living Father sent Me, and I live because of the Father, so he who feeds on Me will live because of Me.
  - type: text
    content: ' '
  '58':
  - type: note
    content: John 6:49–51
  - type: text
    content: 'This is the bread which came down from heaven—not '
  - type: note
    content: Ex. 16:14–35
  - type: text
    content: as your fathers ate the manna, and are dead. He who eats this bread will live forever.”
  '59':
  - type: text
    content: These things He said in the synagogue as He taught in Capernaum.
  - type: heading
    content: Many Disciples Turn Away
  '6':
  - type: text
    content: But this He said to test him, for He Himself knew what He would do.
  '60':
  - type: note
    content: Matt. 11:6; John 6:66
  - type: text
    content: 'Therefore many of His disciples, when they heard '
  - type: text
    content: this,
  - type: text
    content: ' said, “This is a hard saying; who can understand it?”'
  '61':
  - type: text
    content: 'When Jesus knew in Himself that His disciples complained about this, He said to them, '
  - type: text
    content: '“Does this '
  - type: text
    content: offend you?
  - type: text
    content: ' '
  '62':
  - type: note
    content: Mark 16:19; John 3:13; Acts 1:9; 2:32, 33; Eph. 4:8
  - type: text
    content: What
  - type: text
    content: ' then if you should see the Son of Man ascend where He was before?'
  - type: text
    content: ' '
  '63':
  - type: note
    content: Gen. 2:7; 2 Cor. 3:6
  - type: text
    content: 'It is the Spirit who gives life; the '
  - type: note
    content: John 3:6
  - type: text
    content: 'flesh profits nothing. The '
  - type: note
    content: (John 6:68; 14:24)
  - type: text
    content: 'words that I speak to you are spirit, and '
  - type: text
    content: they
  - type: text
    content: ' are life.'
  - type: text
    content: ' '
  '64':
  - type: text
    content: 'But '
  - type: note
    content: John 6:36
  - type: text
    content: there are some of you who do not believe.”
  - type: text
    content: ' For '
  - type: note
    content: John 2:24, 25; 13:11
  - type: text
    content: 'Jesus knew from the beginning who they were who did not believe, and who would betray Him. '
  '65':
  - type: text
    content: 'And He said, '
  - type: text
    content: '“Therefore '
  - type: note
    content: John 6:37, 44, 45
  - type: text
    content: I have said to you that no one can come to Me unless it has been granted to him by My Father.”
  '66':
  - type: note
    content: Luke 9:62; John 6:60
  - type: text
    content: 'From that '
  - type: text
    content: time
  - type: text
    content: ' many of His disciples went back and walked with Him no more. '
  '67':
  - type: text
    content: 'Then Jesus said to the twelve, '
  - type: text
    content: “Do you also want to go away?”
  '68':
  - type: text
    content: 'But Simon Peter answered Him, “Lord, to whom shall we go? You have '
  - type: note
    content: Acts 5:20
  - type: text
    content: 'the words of eternal life. '
  '69':
  - type: note
    content: Matt. 16:16; Mark 8:29; Luke 9:20; John 1:49; 11:27
  - type: text
    content: Also we have come to believe and know that You are the Christ, the Son of the living God.”
  '7':
  - type: text
    content: 'Philip answered Him, '
  - type: note
    content: Num. 11:21, 22
  - type: text
    content: “Two hundred denarii worth of bread is not sufficient for them, that every one of them may have a little.”
  '70':
  - type: text
    content: 'Jesus answered them, '
  - type: note
    content: Luke 6:13
  - type: text
    content: '“Did I not choose you, the twelve, '
  - type: note
    content: (John 13:27)
  - type: text
    content: and one of you is a devil?”
  - type: text
    content: ' '
  '71':
  - type: text
    content: 'He spoke of '
  - type: note
    content: John 12:4; 13:2, 26
  - type: text
    content: 'Judas Iscariot, '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: son
  - type: text
    content: ' of Simon, for it was he who would '
  - type: note
    content: Matt. 26:14–16
  - type: text
    content: betray Him, being one of the twelve.
  '8':
  - type: text
    content: 'One of His disciples, '
  - type: note
    content: John 1:40
  - type: text
    content: 'Andrew, Simon Peter’s brother, said to Him, '
  '9':
  - type: text
    content: '“There is a lad here who has five barley loaves and two small fish, '
  - type: note
    content: 2 Kin. 4:43
  - type: text
    content: but what are they among so many?”
