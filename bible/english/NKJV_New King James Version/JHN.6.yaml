    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And Jesus took the loaves, and when He had given thanks He distributed '
    - type: usfm
      marker: it
      children:
      - type: text
