  - type: note
    content: Ex. 35:27
  - type: text
    content: 'had brought for the work of the service of making the sanctuary. So they continued bringing to him freewill offerings every morning. '
  '30':
  - type: text
    content: So there were eight boards and their sockets—sixteen sockets of silver—two sockets under each of the boards.
  '31':
  - type: text
    content: 'And he made '
  - type: note
