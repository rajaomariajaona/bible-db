    content: 'and their forty sockets of silver: two sockets under each of the boards. '
  '27':
  - type: text
    content: 'For the west side of the tabernacle he made six boards. '
  '28':
  - type: text
    content: 'He also made two boards for the two back corners of the tabernacle. '
  '29':
  - type: text
    content: 'And they were coupled at the bottom and coupled together at the top by one ring. Thus he made both of them for the two corners. '
  '3':
  - type: text
