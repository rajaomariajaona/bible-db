document_id: EXO.36,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And Bezalel and Aholiab, and every '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:3; 31:6; 35:10, 35
      marker-yv: yv-n
    - type: text
      text: 'gifted artisan in whom the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has put wisdom and understanding, to know how to do all manner of work for the service of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:8
      marker-yv: yv-n
    - type: text
      text: 'sanctuary, shall do according to all that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The People Give More than Enough
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he coupled five curtains to one another, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' five curtains he coupled to one another. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He made loops of blue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yarn
    - type: text
      text: ' on the edge of the curtain on the selvedge of one set; likewise he did on the outer edge of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' curtain of the second set. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:5
      marker-yv: yv-n
    - type: text
      text: 'Fifty loops he made on one curtain, and fifty loops he made on the edge of the curtain on the end of the second set; the loops held one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: curtain
    - type: text
      text: ' to another. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he made fifty clasps of gold, and coupled the curtains to one another with the clasps, that it might be one tabernacle.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:7
      marker-yv: yv-n
    - type: text
      text: 'He made curtains of goats’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hair
    - type: text
      text: ' for the tent over the tabernacle; he made eleven curtains. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The length of each curtain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' thirty cubits, and the width of each curtain four cubits; the eleven curtains '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the same size. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He coupled five curtains by themselves and six curtains by themselves. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made fifty loops on the edge of the curtain that is outermost in one set, and fifty loops he made on the edge of the curtain of the second set. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also made fifty bronze clasps to couple the tent together, that it might be one. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:14
      marker-yv: yv-n
    - type: text
      text: 'Then he made a covering for the tent of ram skins dyed red, and a covering of badger skins above '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses called Bezalel and Aholiab, and every gifted artisan in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 35:21, 26; 1 Chr. 29:5, 9, 17
      marker-yv: yv-n
    - type: text
      text: 'whose heart the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had put wisdom, everyone whose heart was stirred, to come and do the work. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the tabernacle '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:15–29
      marker-yv: yv-n
    - type: text
      text: 'he made boards of acacia wood, standing upright. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The length of each board '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' ten cubits, and the width of each board a cubit and a half. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each board had two tenons '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:17
      marker-yv: yv-n
    - type: text
      text: 'for binding one to another. Thus he made for all the boards of the tabernacle. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made boards for the tabernacle, twenty boards for the south side. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Forty sockets of silver he made to go under the twenty boards: two sockets under each of the boards for its two tenons. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And for the other side of the tabernacle, the north side, he made twenty boards '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and their forty sockets of silver: two sockets under each of the boards. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the west side of the tabernacle he made six boards. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also made two boards for the two back corners of the tabernacle. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they were coupled at the bottom and coupled together at the top by one ring. Thus he made both of them for the two corners. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they received from Moses all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 35:5
      marker-yv: yv-n
    - type: text
      text: 'offering which the children of Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 35:27
      marker-yv: yv-n
    - type: text
      text: 'had brought for the work of the service of making the sanctuary. So they continued bringing to him freewill offerings every morning. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So there were eight boards and their sockets—sixteen sockets of silver—two sockets under each of the boards.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:26–29
      marker-yv: yv-n
    - type: text
      text: 'bars of acacia wood: five for the boards on one side of the tabernacle, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'five bars for the boards on the other side of the tabernacle, and five bars for the boards of the tabernacle on the far side westward. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made the middle bar to pass through the boards from one end to the other. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He overlaid the boards with gold, made their rings of gold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' holders for the bars, and overlaid the bars with gold.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:31–37
      marker-yv: yv-n
    - type: text
      text: 'a veil of blue, purple, and scarlet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thread,
    - type: text
      text: ' and fine woven linen; it was worked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' an artistic design of cherubim. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He made for it four pillars of acacia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wood,
    - type: text
      text: ' and overlaid them with gold, with their hooks of gold; and he cast four sockets of silver for them.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also made a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:36
      marker-yv: yv-n
    - type: text
      text: 'screen for the tabernacle door, of blue, purple, and scarlet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thread,
    - type: text
      text: ' and fine woven linen, made by a weaver, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and its five pillars with their hooks. And he overlaid their capitals and their rings with gold, but their five sockets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' bronze.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the craftsmen who were doing all the work of the sanctuary came, each from the work he was doing, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they spoke to Moses, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 24:14; 31:6–10; (2 Cor. 8:2, 3)
      marker-yv: yv-n
    - type: text
      text: '“The people bring much more than enough for the service of the work which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us
    - type: text
      text: ' to do.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses gave a commandment, and they caused it to be proclaimed throughout the camp, saying, “Let neither man nor woman do any more work for the offering of the sanctuary.” And the people were restrained from bringing, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for the material they had was sufficient for all the work to be done—indeed too '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:64
      marker-yv: yv-n
    - type: text
      text: much.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Building the Tabernacle
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:1–14
      marker-yv: yv-n
    - type: text
      text: 'Then all the gifted artisans among them who worked on the tabernacle made ten curtains woven of fine linen, and of blue, purple, and scarlet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thread; with
    - type: text
      text: ' artistic designs of cherubim they made them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The length of each curtain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty-eight cubits, and the width of each curtain four cubits; the curtains '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' all the same size. '
