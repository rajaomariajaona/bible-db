  '22':
  - type: text
    content: 'Each board had two tenons '
  - type: note
    content: Ex. 26:17
  - type: text
    content: 'for binding one to another. Thus he made for all the boards of the tabernacle. '
  '23':
  - type: text
    content: 'And he made boards for the tabernacle, twenty boards for the south side. '
  '24':
  - type: text
    content: 'Forty sockets of silver he made to go under the twenty boards: two sockets under each of the boards for its two tenons. '
  '25':
  - type: text
    content: 'And for the other side of the tabernacle, the north side, he made twenty boards '
  '26':
