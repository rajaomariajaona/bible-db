  - type: text
    content: our
  - type: text
    content: ' father.’ For I say to you that God is able to raise up children to Abraham from these stones. '
  '9':
  - type: text
    content: 'And even now the ax is laid to the root of the trees. Therefore '
  - type: note
    content: Matt. 7:19; Luke 13:6–9
  - type: text
    content: every tree which does not bear good fruit is cut down and thrown into the fire.”
