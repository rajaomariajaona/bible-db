    - type: text
      text: Luke 1:77
    marker-yv: yv-n
  - type: text
    text: 'for the remission of sins, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'as it is written in the book of the words of Isaiah the prophet, saying:'
