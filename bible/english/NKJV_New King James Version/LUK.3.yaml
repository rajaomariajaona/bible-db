  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 1:13
    marker-yv: yv-n
  - type: text
    text: 'John the son of Zacharias in the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
