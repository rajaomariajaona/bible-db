  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now in the fifteenth year of the reign of Tiberius Caesar, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 27:2
    marker-yv: yv-n
  - type: text
    text: 'Pontius Pilate being governor of Judea, Herod being tetrarch of Galilee, his brother Philip tetrarch of Iturea and the region of Trachonitis, and Lysanias tetrarch of Abilene, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'while '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 11:49; 18:13; Acts 4:6
    marker-yv: yv-n
  - type: text
