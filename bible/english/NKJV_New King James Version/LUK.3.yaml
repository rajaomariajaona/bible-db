    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And even now the ax is laid to the root of the trees. Therefore '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 7:19; Luke 13:6–9
    marker-yv: yv-n
  - type: text
