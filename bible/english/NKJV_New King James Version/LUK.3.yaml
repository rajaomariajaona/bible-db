- type: usfm
  marker: q2
  children:
  - type: text
    text: And every mountain and hill brought low;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The crooked places shall be made straight
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the rough ways smooth;
- type: usfm
  marker: q2
  children:
  - type: usfm
