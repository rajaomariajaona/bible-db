  '1':
  - type: heading
    content: John the Baptist Prepares the Way
  - type: text
    content: 'Now in the fifteenth year of the reign of Tiberius Caesar, '
  - type: note
    content: Matt. 27:2
  - type: text
    content: 'Pontius Pilate being governor of Judea, Herod being tetrarch of Galilee, his brother Philip tetrarch of Iturea and the region of Trachonitis, and Lysanias tetrarch of Abilene, '
  '10':
  - type: text
    content: 'So the people asked him, saying, '
  - type: note
    content: Luke 3:12, 14; (Acts 2:37, 38; 16:30, 31)
  - type: text
    content: “What shall we do then?”
  '11':
  - type: text
    content: 'He answered and said to them, '
  - type: note
    content: Luke 11:41; 2 Cor. 8:14; James 2:15, 16; (1 John 3:17; 4:20)
  - type: text
    content: '“He who has two tunics, let him give to him who has none; and he who has food, '
  - type: note
    content: Is. 58:7; (1 Tim. 6:17, 18)
  - type: text
    content: let him do likewise.”
  '12':
  - type: text
    content: 'Then '
  - type: note
    content: Matt. 21:32; Luke 7:29
  - type: text
    content: tax collectors also came to be baptized, and said to him, “Teacher, what shall we do?”
  '13':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: Luke 19:8
  - type: text
    content: “Collect no more than what is appointed for you.”
  '14':
  - type: text
    content: Likewise the soldiers asked him, saying, “And what shall we do?”
  - type: text
    content: 'So he said to them, “Do not intimidate anyone '
  - type: note
    content: Ex. 20:16; 23:1; Lev. 19:11
  - type: text
    content: or accuse falsely, and be content with your wages.”
  '15':
  - type: text
    content: 'Now as the people were in expectation, and all reasoned in their hearts about John, whether he was the Christ '
  - type: text
    content: or
  - type: text
    content: ' not, '
  '16':
  - type: text
    content: 'John answered, saying to all, '
  - type: note
    content: Matt. 3:11, 12; Mark 1:7, 8
  - type: text
    content: '“I indeed baptize you with water; but One mightier than I is coming, whose sandal strap I am not worthy to loose. He will '
  - type: note
    content: John 7:39; 20:22; Acts 2:1–4
  - type: text
    content: 'baptize you with the Holy Spirit and fire. '
  '17':
  - type: text
    content: 'His winnowing fan '
  - type: text
    content: is
  - type: text
    content: ' in His hand, and He will thoroughly clean out His threshing floor, and '
  - type: note
    content: Mic. 4:12; Matt. 13:24–30
  - type: text
    content: gather the wheat into His barn; but the chaff He will burn with unquenchable fire.”
  '18':
  - type: text
    content: 'And with many other exhortations he preached to the people. '
  '19':
  - type: note
    content: Matt. 14:3; Mark 6:17
  - type: text
    content: 'But Herod the tetrarch, being rebuked by him concerning Herodias, his brother Philip’s wife, and for all the evils which Herod had done, '
  '2':
  - type: text
    content: 'while '
  - type: note
    content: John 11:49; 18:13; Acts 4:6
  - type: text
    content: 'Annas and Caiaphas were high priests, the word of God came to '
  - type: note
    content: Luke 1:13
  - type: text
    content: 'John the son of Zacharias in the wilderness. '
  '20':
  - type: text
    content: also added this, above all, that he shut John up in prison.
  - type: heading
    content: John Baptizes Jesus
  '21':
  - type: text
    content: 'When all the people were baptized, '
  - type: note
    content: Matt. 3:13–17; John 1:32
  - type: text
    content: 'it came to pass that Jesus also was baptized; and while He prayed, the heaven was opened. '
  '22':
  - type: text
    content: 'And the Holy Spirit descended in bodily form like a dove upon Him, and a voice came from heaven which said, “You are My beloved Son; in You I am '
  - type: note
    content: Ps. 2:7; (Is. 42:1); Matt. 3:17; 17:5; Mark 1:11; Luke 1:35; 9:35; 2 Pet. 1:17
  - type: text
    content: well pleased.”
