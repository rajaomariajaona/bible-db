document_id: HEB.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Supreme Revelation
  - type: text
    content: 'God, who at various times and '
  - type: note
    content: Num. 12:6, 8; Joel 2:28
  - type: text
    content: 'in various ways spoke in time past to the fathers by the prophets, '
  '10':
  - type: text
    content: 'And:'
  - type: note
    content: Ps. 102:25–27
  - type: text
    content: '“You, '
  - type: heading
    content: Lord
  - type: text
    content: ', in the beginning laid the foundation of the earth,'
  - type: text
    content: And the heavens are the work of Your hands.
  '11':
  - type: note
    content: (Is. 34:4)
  - type: text
    content: They will perish, but You remain;
  - type: text
    content: 'And '
  - type: note
    content: Is. 50:9; 51:6; Heb. 8:13
  - type: text
    content: they will all grow old like a garment;
  '12':
  - type: text
    content: Like a cloak You will fold them up,
  - type: text
    content: And they will be changed.
  - type: text
    content: 'But You are the '
  - type: note
    content: Heb. 13:8
  - type: text
    content: same,
  - type: text
    content: And Your years will not fail.”
  '13':
  - type: text
    content: 'But to which of the angels has He ever said:'
  - type: note
    content: Ps. 110:1; Matt. 22:44; Heb. 1:3
  - type: text
    content: “Sit at My right hand,
  - type: text
    content: Till I make Your enemies Your footstool”?
  '14':
  - type: note
    content: Ps. 103:20; Dan. 7:10
  - type: text
    content: 'Are they not all ministering spirits sent forth to minister for those who will '
  - type: note
    content: Rom. 8:17
  - type: text
    content: inherit salvation?
  '2':
  - type: text
    content: 'has in these last days spoken to us by '
  - type: text
    content: His
  - type: text
    content: ' Son, whom He has appointed heir of all things, through whom also He made the worlds; '
  '3':
  - type: note
    content: John 1:14
  - type: text
    content: 'who being the brightness of '
  - type: text
    content: His
  - type: text
    content: ' glory and the express '
  - type: note
    content: 2 Cor. 4:4; Col. 1:15
  - type: text
    content: 'image of His person, and '
  - type: note
    content: Col. 1:17
  - type: text
    content: 'upholding all things by the word of His power, '
  - type: note
    content: (Heb. 7:27)
  - type: text
    content: 'when He had by Himself purged our sins, '
  - type: note
    content: Ps. 110:1
  - type: text
    content: 'sat down at the right hand of the Majesty on high, '
  '4':
  - type: text
    content: 'having become so much better than the angels, as '
  - type: note
    content: Is. 9:6, 7; Luke 1:32, 33; (Phil. 2:9, 10)
  - type: text
    content: He has by inheritance obtained a more excellent name than they.
  - type: heading
    content: The Son Exalted Above Angels
  '5':
  - type: text
    content: 'For to which of the angels did He ever say:'
  - type: note
    content: Ps. 2:7; Acts 13:33; Heb. 5:5
  - type: text
    content: “You are My Son,
  - type: text
    content: Today I have begotten You”?
  - type: text
    content: 'And again:'
  - type: note
    content: 2 Sam. 7:14
  - type: text
    content: “I will be to Him a Father,
  - type: text
    content: And He shall be to Me a Son”?
  '6':
  - type: text
    content: 'But when He again brings '
  - type: note
    content: Ps. 89:27; (Rom. 8:29)
  - type: text
    content: 'the firstborn into the world, He says:'
  - type: note
    content: Deut. 32:43, LXX, DSS; Ps. 97:7; 1 Pet. 3:22; Rev. 5:11–13
  - type: text
    content: “Let all the angels of God worship Him.”
  '7':
  - type: text
    content: 'And of the angels He says:'
  - type: note
    content: Ps. 104:4
  - type: text
    content: “Who makes His angels spirits
  - type: text
    content: And His ministers a flame of fire.”
  '8':
  - type: text
    content: 'But to the Son '
  - type: text
    content: He
  - type: text
    content: ' '
  - type: text
    content: 'says:'
  - type: note
    content: Ps. 45:6, 7
  - type: text
    content: '“Your throne, O God, '
  - type: text
    content: is
  - type: text
    content: ' forever and ever;'
  - type: text
    content: 'A scepter of righteousness '
  - type: text
    content: is
  - type: text
    content: ' the scepter of Your kingdom.'
  '9':
  - type: text
    content: You have loved righteousness and hated lawlessness;
  - type: text
    content: 'Therefore God, Your God, '
  - type: note
    content: Is. 61:1, 3
  - type: text
    content: has anointed You
  - type: text
    content: With the oil of gladness more than Your companions.”
