  '18':
  - type: note
    content: Ezek. 32:19
  - type: text
    content: '‘To which of the trees in Eden will you then be likened in glory and greatness? Yet you shall be brought down with the trees of Eden to the depths of the earth; '
  - type: note
    content: Jer. 9:25, 26; Ezek. 28:10; 32:19, 21
  - type: text
    content: 'you shall lie in the midst of the uncircumcised, with '
  - type: text
    content: those
  - type: text
    content: ' slain by the sword. This '
  - type: text
    content: is
  - type: text
    content: ' Pharaoh and all his multitude,’ says the Lord '
  - type: heading
    content: God
  - type: text
    content: .”
  '2':
  - type: text
    content: '“Son of man, say to Pharaoh king of Egypt and to his multitude:'
  - type: note
    content: Ezek. 31:18
  - type: text
    content: ‘Whom are you like in your greatness?
  '3':
  - type: note
    content: Is. 10:33, 34; Ezek. 17:3, 4, 22; 31:16; Dan. 4:10, 20–23
  - type: text
    content: 'Indeed Assyria '
  - type: text
    content: was
  - type: text
    content: ' a cedar in Lebanon,'
  - type: text
    content: With fine branches that shaded the forest,
  - type: text
    content: And of high stature;
  - type: text
    content: And its top was among the thick boughs.
  '4':
  - type: note
    content: Jer. 51:36; Ezek. 29:3–9
  - type: text
    content: The waters made it grow;
  - type: text
    content: Underground waters gave it height,
  - type: text
    content: With their rivers running around the place where it was planted,
  - type: text
    content: And sent out rivulets to all the trees of the field.
  '5':
  - type: text
    content: '‘Therefore '
  - type: note
    content: Dan. 4:11
  - type: text
    content: its height was exalted above all the trees of the field;
  - type: text
    content: Its boughs were multiplied,
  - type: text
    content: And its branches became long because of the abundance of water,
  - type: text
    content: As it sent them out.
  '6':
  - type: text
    content: 'All the '
  - type: note
    content: Ezek. 17:23; 31:13; Dan. 4:12, 21; Matt. 13:32
  - type: text
    content: birds of the heavens made their nests in its boughs;
  - type: text
    content: Under its branches all the beasts of the field brought forth their young;
  - type: text
    content: And in its shadow all great nations made their home.
  '7':
  - type: text
    content: ‘Thus it was beautiful in greatness and in the length of its branches,
  - type: text
    content: Because its roots reached to abundant waters.
  '8':
  - type: text
    content: 'The cedars in the '
  - type: note
    content: Gen. 2:8, 9; 13:10; Is. 51:3; Ezek. 28:13; 31:16, 18
  - type: text
    content: garden of God could not hide it;
  - type: text
    content: The fir trees were not like its boughs,
  - type: text
    content: And the chestnut trees were not like its branches;
  - type: text
    content: No tree in the garden of God was like it in beauty.
  '9':
  - type: text
    content: I made it beautiful with a multitude of branches,
  - type: text
    content: So that all the trees of Eden envied it,
  - type: text
    content: 'That '
  - type: text
    content: were
  - type: text
    content: ' in the garden of God.’'
