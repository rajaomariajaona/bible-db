  '10':
  - type: text
    content: '“Therefore thus says the Lord '
  - type: heading
    content: God
  - type: text
    content: ': ‘Because you have increased in height, and it set its top among the thick boughs, and '
  - type: note
    content: 2 Chr. 32:25; Is. 10:12; 14:13, 14; Ezek. 28:17; Dan. 5:20
  - type: text
    content: 'its heart was lifted up in its height, '
  '11':
  - type: text
    content: 'therefore I will deliver it into the hand of the '
  - type: note
    content: Ezek. 30:10; Dan. 5:18, 19
  - type: text
    content: 'mighty one of the nations, and he shall surely deal with it; I have driven it out for its wickedness. '
  '12':
  - type: text
    content: 'And aliens, '
  - type: note
    content: Ezek. 28:7; 30:11; 32:12
  - type: text
    content: 'the most terrible of the nations, have cut it down and left it; its branches have fallen '
  - type: note
    content: Ezek. 32:5; 35:8
  - type: text
    content: 'on the mountains and in all the valleys; its boughs lie '
  - type: note
    content: Ezek. 30:24, 25
  - type: text
    content: broken by all the rivers of the land; and all the peoples of the earth have gone from under its shadow and left it.
  '13':
  - type: text
    content: '‘On '
  - type: note
    content: Is. 18:6; Ezek. 32:4
  - type: text
    content: its ruin will remain all the birds of the heavens,
  - type: text
    content: And all the beasts of the field will come to its branches—
  '14':
  - type: text
    content: ‘So that no trees by the waters may ever again exalt themselves for their height, nor set their tops among the thick boughs, that no tree which drinks water may ever be high enough to reach up to them.
  - type: text
    content: '‘For '
  - type: note
    content: Ps. 82:7
  - type: text
    content: they have all been delivered to death,
  - type: note
    content: Ezek. 32:18
  - type: text
    content: To the depths of the earth,
  - type: text
    content: Among the children of men who go down to the Pit.’
  '15':
  - type: text
    content: '“Thus says the Lord '
  - type: heading
    content: God
  - type: text
    content: ': ‘In the day when it '
  - type: note
    content: Ezek. 32:22, 23
  - type: text
    content: 'went down to hell, I caused mourning. I covered the deep because of it. I restrained its rivers, and the great waters were held back. I caused Lebanon to mourn for it, and all the trees of the field wilted because of it. '
  '16':
  - type: text
    content: 'I made the nations '
  - type: note
    content: Ezek. 26:15; Hag. 2:7
  - type: text
    content: 'shake at the sound of its fall, when I '
  - type: note
    content: Is. 14:15; Ezek. 32:18
  - type: text
    content: 'cast it down to hell together with those who descend into the Pit; and '
  - type: note
    content: Is. 14:8; Hab. 2:17
  - type: text
    content: 'all the trees of Eden, the choice and best of Lebanon, all that drink water, '
  - type: note
    content: Ezek. 32:31
  - type: text
    content: 'were comforted in the depths of the earth. '
  '17':
  - type: text
    content: 'They also went down to hell with it, with those slain by the sword; and '
  - type: text
    content: those
  - type: text
    content: ' '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' its '
  - type: text
    content: strong
  - type: text
    content: ' arm '
  - type: note
