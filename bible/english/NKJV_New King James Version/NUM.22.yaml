  '14':
  - type: text
    content: And the princes of Moab rose and went to Balak, and said, “Balaam refuses to come with us.”
  '15':
  - type: text
    content: 'Then Balak again sent princes, more numerous and more honorable than they. '
  '16':
  - type: text
    content: 'And they came to Balaam and said to him, “Thus says Balak the son of Zippor: ‘Please let nothing hinder you from coming to me; '
  '17':
  - type: text
    content: 'for I will certainly '
  - type: note
    content: Num. 24:11
  - type: text
    content: 'honor you greatly, and I will do whatever you say to me. '
  - type: note
    content: Num. 22:6
  - type: text
    content: Therefore please come, curse this people for me.’ ”
  '18':
  - type: text
    content: 'Then Balaam answered and said to the servants of Balak, '
  - type: note
    content: Num. 22:38; 24:13
  - type: text
    content: '“Though Balak were to give me his house full of silver and gold, '
  - type: note
    content: 1 Kin. 22:14; 2 Chr. 18:13
  - type: text
    content: 'I could not go beyond the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' my God, to do less or more. '
  '19':
  - type: text
    content: 'Now therefore, please, you also '
  - type: note
    content: Num. 22:8
  - type: text
    content: 'stay here tonight, that I may know what more the '
  - type: heading
    content: Lord
  - type: text
    content: ' will say to me.”'
  '2':
  - type: text
    content: 'Now '
  - type: note
    content: Josh. 24:9; Judg. 11:25; Mic. 6:5; Rev. 2:14
  - type: text
    content: 'Balak the son of Zippor saw all that Israel had done to the Amorites. '
  '20':
  - type: note
