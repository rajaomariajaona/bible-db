  - type: text
    content: 'perverse before Me. '
  '33':
  - type: text
    content: The donkey saw Me and turned aside from Me these three times. If she had not turned aside from Me, surely I would also have killed you by now, and let her live.”
  '34':
  - type: text
    content: 'And Balaam said to the Angel of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 1 Sam. 15:24, 30; 26:21; 2 Sam. 12:13
  - type: text
    content: “I have sinned, for I did not know You stood in the way against me. Now therefore, if it displeases You, I will turn back.”
  '35':
  - type: text
    content: 'Then the Angel of the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Balaam, “Go with the men, '
  - type: note
    content: Num. 22:20
  - type: text
    content: but only the word that I speak to you, that you shall speak.” So Balaam went with the princes of Balak.
  '36':
  - type: text
    content: 'Now when Balak heard that Balaam was coming, '
  - type: note
    content: Gen. 14:17
  - type: text
    content: 'he went out to meet him at the city of Moab, '
  - type: note
