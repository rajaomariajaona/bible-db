  - type: text
    content: 'and the Angel of the '
  - type: heading
    content: Lord
  - type: text
    content: ' took His stand in the way as an adversary against him. And he was riding on his donkey, and his two servants '
  - type: text
    content: were
  - type: text
    content: ' with him. '
  '23':
