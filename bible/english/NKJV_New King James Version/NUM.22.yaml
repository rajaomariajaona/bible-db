  - type: note
    content: Num. 22:35; 23:5, 12, 16, 26; 24:13
  - type: text
    content: 'only the word which I speak to you—that you shall do.” '
  '21':
  - type: text
    content: So Balaam rose in the morning, saddled his donkey, and went with the princes of Moab.
  - type: heading
    content: Balaam, the Donkey, and the Angel
  '22':
  - type: text
    content: 'Then God’s anger was aroused because he went, '
