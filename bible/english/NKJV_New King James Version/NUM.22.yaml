    content: ‘Look, a people has come out of Egypt, and they cover the face of the earth. Come now, curse them for me; perhaps I shall be able to overpower them and drive them out.’ ”
  '12':
  - type: text
    content: 'And God said to Balaam, “You shall not go with them; you shall not curse the people, for '
