    content: 'Now '
  - type: note
    content: Josh. 5:13; 2 Kin. 6:17; Dan. 10:7; Acts 22:9
  - type: text
    content: 'the donkey saw the Angel of the '
  - type: heading
    content: Lord
  - type: text
    content: ' standing in the way with His drawn sword in His hand, and the donkey turned aside out of the way and went into the field. So Balaam struck the donkey to turn her back onto the road. '
  '24':
  - type: text
    content: 'Then the Angel of the '
  - type: heading
    content: Lord
  - type: text
    content: ' stood in a narrow path between the vineyards, '
  - type: text
    content: with
  - type: text
    content: ' a wall on this side and a wall on that side. '
  '25':
  - type: text
    content: 'And when the donkey saw the Angel of the '
  - type: heading
    content: Lord
  - type: text
    content: ', she pushed herself against the wall and crushed Balaam’s foot against the wall; so he struck her again. '
  '26':
  - type: text
    content: 'Then the Angel of the '
  - type: heading
    content: Lord
  - type: text
    content: ' went further, and stood in a narrow place where there '
  - type: text
    content: was
  - type: text
    content: ' no way to turn either to the right hand or to the left. '
  '27':
  - type: text
    content: 'And when the donkey saw the Angel of the '
  - type: heading
    content: Lord
  - type: text
    content: ', she lay down under Balaam; so Balaam’s anger was aroused, and he struck the donkey with his staff.'
  '28':
  - type: text
    content: 'Then the '
