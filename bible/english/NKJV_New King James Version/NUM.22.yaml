  '29':
  - type: text
    content: 'And Balaam said to the donkey, “Because you have abused me. I wish there were a sword in my hand, '
  - type: note
    content: (Prov. 12:10; Matt. 15:19)
  - type: text
    content: for now I would kill you!”
  '3':
  - type: text
    content: 'And '
