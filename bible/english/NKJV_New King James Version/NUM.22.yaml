  - type: text
    content: 'which '
  - type: text
    content: is
  - type: text
    content: ' on the border at the Arnon, the boundary of the territory. '
  '37':
  - type: text
    content: 'Then Balak said to Balaam, “Did I not earnestly send to you, calling for you? Why did you not come to me? Am I not able '
  - type: note
    content: Num. 22:17; 24:11
  - type: text
    content: to honor you?”
  '38':
  - type: text
    content: 'And Balaam said to Balak, “Look, I have come to you! Now, have I any power at all to say anything? '
  - type: note
    content: Num. 23:26; 24:13; 1 Kin. 22:14; 2 Chr. 18:13
  - type: text
    content: 'The word that God puts in my mouth, that I must speak.” '
  '39':
  - type: text
    content: 'So Balaam went with Balak, and they came to Kirjath Huzoth. '
  '4':
  - type: text
    content: 'So Moab said to '
  - type: note
    content: Num. 25:15–18; 31:1–3; Josh. 13:21
  - type: text
    content: 'the elders of Midian, “Now this company will lick up everything around us, as an ox licks up the grass of the field.” And Balak the son of Zippor '
  - type: text
    content: was
  - type: text
    content: ' king of the Moabites at that time. '
  '40':
  - type: text
    content: 'Then Balak offered oxen and sheep, and he sent '
  - type: text
    content: some
  - type: text
    content: ' to Balaam and to the princes who '
  - type: text
    content: were
  - type: text
    content: ' with him.'
  - type: heading
    content: Balaam’s First Prophecy
  '41':
  - type: text
    content: 'So it was, the next day, that Balak took Balaam and brought him up to the '
  - type: note
    content: Num. 21:28; Deut. 12:2
  - type: text
    content: high places of Baal, that from there he might observe the extent of the people.
  '5':
  - type: text
    content: 'Then '
  - type: note
    content: Num. 31:8, 16; Deut. 23:4; Josh. 13:22; 24:9; Neh. 13:1, 2; Mic. 6:5; 2 Pet. 2:15; Jude 11; Rev. 2:14
  - type: text
    content: 'he sent messengers to Balaam the son of Beor at '
  - type: note
    content: Deut. 23:4
  - type: text
    content: 'Pethor, which '
  - type: text
    content: is
  - type: text
    content: ' near the River in the land of the sons of his people, to call him, saying: “Look, a people has come from Egypt. See, they cover the face of the earth, and are settling next to me! '
  '6':
  - type: note
    content: Num. 22:17; 23:7, 8
  - type: text
    content: 'Therefore please come at once, '
  - type: note
    content: Num. 22:12; 24:9
  - type: text
    content: 'curse this people for me, for they '
  - type: text
    content: are
  - type: text
    content: ' too mighty for me. Perhaps I shall be able to defeat them and drive them out of the land, for I know that he whom you bless '
  - type: text
    content: is
  - type: text
    content: ' blessed, and he whom you curse is cursed.”'
  '7':
  - type: text
    content: 'So the elders of Moab and the elders of Midian departed with the '
  - type: note
    content: 1 Sam. 9:7, 8
  - type: text
    content: 'diviner’s fee in their hand, and they came to Balaam and spoke to him the words of Balak. '
  '8':
