document_id: JER.35,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Obedient Rechabites
  - type: text
    content: 'The word which came to Jeremiah from the '
  - type: heading
    content: Lord
  - type: text
    content: ' in the days of Jehoiakim the son of Josiah, king of Judah, saying, '
  '10':
  - type: text
    content: 'But we have dwelt in tents, and have obeyed and done according to all that Jonadab our father commanded us. '
  '11':
  - type: text
    content: 'But it came to pass, when Nebuchadnezzar king of Babylon came up into the land, that we said, ‘Come, let us '
  - type: note
    content: Jer. 4:5–7; 8:14
  - type: text
    content: go to Jerusalem for fear of the army of the Chaldeans and for fear of the army of the Syrians.’ So we dwell at Jerusalem.”
  '12':
  - type: text
    content: 'Then came the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' to Jeremiah, saying, '
  '13':
  - type: text
    content: '“Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: ‘Go and tell the men of Judah and the inhabitants of Jerusalem, “Will you not '
  - type: note
    content: (Is. 28:9–12); Jer. 6:10; 17:23; 32:33
  - type: text
    content: 'receive instruction to obey My words?” says the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: '“The words of Jonadab the son of Rechab, which he commanded his sons, not to drink wine, are performed; for to this day they drink none, and obey their father’s commandment. '
  - type: note
    content: 2 Chr. 36:15
  - type: text
    content: 'But although I have spoken to you, '
  - type: note
    content: Jer. 7:13; 25:3
  - type: text
    content: 'rising early and speaking, you did not obey Me. '
  '15':
  - type: text
    content: 'I have also sent to you all My '
  - type: note
    content: Jer. 26:4, 5; 29:19
  - type: text
    content: 'servants the prophets, rising up early and sending '
  - type: text
    content: them,
  - type: text
    content: ' saying, '
  - type: note
    content: (Is. 1:16, 17); Jer. 18:11; 25:5, 6; (Ezek. 18:30–32); Acts 26:20
  - type: text
    content: '‘Turn now everyone from his evil way, amend your doings, and do not go after other gods to serve them; then you will '
  - type: note
    content: Jer. 7:7; 25:5, 6
  - type: text
    content: 'dwell in the land which I have given you and your fathers.’ But you have not inclined your ear, nor obeyed Me. '
  '16':
  - type: text
    content: 'Surely the sons of Jonadab the son of Rechab have performed the commandment of their '
  - type: note
    content: (Heb. 12:9)
  - type: text
    content: father, which he commanded them, but this people has not obeyed Me.” ’
  '17':
  - type: text
    content: '“Therefore thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of hosts, the God of Israel: ‘Behold, I will bring on Judah and on all the inhabitants of Jerusalem all the doom that I have pronounced against them; '
  - type: note
    content: Prov. 1:24; Is. 65:12; 66:4; Jer. 7:13
  - type: text
    content: because I have spoken to them but they have not heard, and I have called to them but they have not answered.’ ”
  '18':
  - type: text
    content: 'And Jeremiah said to the house of the Rechabites, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: ‘Because you have obeyed the commandment of Jonadab your father, and kept all his precepts and done according to all that he commanded you, '
  '19':
  - type: text
    content: 'therefore thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: “Jonadab the son of Rechab shall not lack a man to '
  - type: note
    content: (Ex. 20:12); Jer. 15:19; (Luke 21:36; Eph. 6:2, 3)
  - type: text
    content: stand before Me forever.” ’ ”
  '2':
  - type: text
    content: '“Go to the house of the '
  - type: note
    content: 2 Sam. 4:2; 2 Kin. 10:15; 1 Chr. 2:55
  - type: text
    content: 'Rechabites, speak to them, and bring them into the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', into one of '
  - type: note
    content: 1 Kin. 6:5, 8; 1 Chr. 9:26, 33
  - type: text
    content: the chambers, and give them wine to drink.”
  '3':
  - type: text
    content: 'Then I took Jaazaniah the son of Jeremiah, the son of Habazziniah, his brothers and all his sons, and the whole house of the Rechabites, '
  '4':
  - type: text
    content: 'and I brought them into the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', into the chamber of the sons of Hanan the son of Igdaliah, a man of God, which '
  - type: text
    content: was
  - type: text
    content: ' by the chamber of the princes, above the chamber of Maaseiah the son of Shallum, '
  - type: note
    content: 2 Kin. 12:9; 25:18; 1 Chr. 9:18, 19
  - type: text
    content: 'the keeper of the door. '
  '5':
  - type: text
    content: Then I set before the sons of the house of the Rechabites bowls full of wine, and cups; and I said to them, “Drink wine.”
  '6':
  - type: text
    content: 'But they said, “We will drink no wine, for '
  - type: note
    content: 2 Kin. 10:15, 23
  - type: text
    content: 'Jonadab the son of Rechab, our father, commanded us, saying, ‘You shall drink '
  - type: note
    content: Lev. 10:9; Num. 6:2–4; Judg. 13:7, 14; Prov. 31:4; Ezek. 44:21; Luke 1:15
  - type: text
    content: 'no wine, you nor your sons, forever. '
  '7':
  - type: text
    content: 'You shall not build a house, sow seed, plant a vineyard, nor have '
  - type: text
    content: any
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: these;
  - type: text
    content: ' but all your days you shall dwell in tents, '
  - type: note
    content: Ex. 20:12; Eph. 6:2, 3
  - type: text
    content: 'that you may live many days in the land where you are sojourners.’ '
  '8':
  - type: text
    content: 'Thus we have '
  - type: note
    content: (Prov. 1:8, 9; 4:1, 2, 10; 6:20; Eph. 6:1; Col. 3:20)
  - type: text
    content: 'obeyed the voice of Jonadab the son of Rechab, our father, in all that he charged us, to drink no wine all our days, we, our wives, our sons, or our daughters, '
  '9':
  - type: text
    content: 'nor to build ourselves houses to dwell in; nor do we have vineyard, field, or seed. '
