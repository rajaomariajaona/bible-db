document_id: JER.35,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Obedient Rechabites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word which came to Jeremiah from the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the days of Jehoiakim the son of Josiah, king of Judah, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we have dwelt in tents, and have obeyed and done according to all that Jonadab our father commanded us. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it came to pass, when Nebuchadnezzar king of Babylon came up into the land, that we said, ‘Come, let us '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 4:5–7; 8:14
      marker-yv: yv-n
    - type: text
      text: go to Jerusalem for fear of the army of the Chaldeans and for fear of the army of the Syrians.’ So we dwell at Jerusalem.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then came the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to Jeremiah, saying, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, the God of Israel: ‘Go and tell the men of Judah and the inhabitants of Jerusalem, “Will you not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 28:9–12); Jer. 6:10; 17:23; 32:33
      marker-yv: yv-n
    - type: text
      text: 'receive instruction to obey My words?” says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The words of Jonadab the son of Rechab, which he commanded his sons, not to drink wine, are performed; for to this day they drink none, and obey their father’s commandment. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 36:15
      marker-yv: yv-n
    - type: text
      text: 'But although I have spoken to you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 7:13; 25:3
      marker-yv: yv-n
    - type: text
      text: 'rising early and speaking, you did not obey Me. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have also sent to you all My '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 26:4, 5; 29:19
      marker-yv: yv-n
    - type: text
      text: 'servants the prophets, rising up early and sending '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
    - type: text
      text: ' saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 1:16, 17); Jer. 18:11; 25:5, 6; (Ezek. 18:30–32); Acts 26:20
      marker-yv: yv-n
    - type: text
      text: '‘Turn now everyone from his evil way, amend your doings, and do not go after other gods to serve them; then you will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 7:7; 25:5, 6
      marker-yv: yv-n
    - type: text
      text: 'dwell in the land which I have given you and your fathers.’ But you have not inclined your ear, nor obeyed Me. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Surely the sons of Jonadab the son of Rechab have performed the commandment of their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 12:9)
      marker-yv: yv-n
    - type: text
      text: father, which he commanded them, but this people has not obeyed Me.” ’
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of hosts, the God of Israel: ‘Behold, I will bring on Judah and on all the inhabitants of Jerusalem all the doom that I have pronounced against them; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 1:24; Is. 65:12; 66:4; Jer. 7:13
      marker-yv: yv-n
    - type: text
      text: because I have spoken to them but they have not heard, and I have called to them but they have not answered.’ ”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jeremiah said to the house of the Rechabites, “Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, the God of Israel: ‘Because you have obeyed the commandment of Jonadab your father, and kept all his precepts and done according to all that he commanded you, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, the God of Israel: “Jonadab the son of Rechab shall not lack a man to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 20:12); Jer. 15:19; (Luke 21:36; Eph. 6:2, 3)
      marker-yv: yv-n
    - type: text
      text: stand before Me forever.” ’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go to the house of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 4:2; 2 Kin. 10:15; 1 Chr. 2:55
      marker-yv: yv-n
    - type: text
      text: 'Rechabites, speak to them, and bring them into the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', into one of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:5, 8; 1 Chr. 9:26, 33
      marker-yv: yv-n
    - type: text
      text: the chambers, and give them wine to drink.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I took Jaazaniah the son of Jeremiah, the son of Habazziniah, his brothers and all his sons, and the whole house of the Rechabites, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I brought them into the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', into the chamber of the sons of Hanan the son of Igdaliah, a man of God, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' by the chamber of the princes, above the chamber of Maaseiah the son of Shallum, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 12:9; 25:18; 1 Chr. 9:18, 19
      marker-yv: yv-n
    - type: text
      text: 'the keeper of the door. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I set before the sons of the house of the Rechabites bowls full of wine, and cups; and I said to them, “Drink wine.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they said, “We will drink no wine, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 10:15, 23
      marker-yv: yv-n
    - type: text
      text: 'Jonadab the son of Rechab, our father, commanded us, saying, ‘You shall drink '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 10:9; Num. 6:2–4; Judg. 13:7, 14; Prov. 31:4; Ezek. 44:21; Luke 1:15
      marker-yv: yv-n
    - type: text
      text: 'no wine, you nor your sons, forever. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall not build a house, sow seed, plant a vineyard, nor have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these;
    - type: text
      text: ' but all your days you shall dwell in tents, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:12; Eph. 6:2, 3
      marker-yv: yv-n
    - type: text
      text: 'that you may live many days in the land where you are sojourners.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus we have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 1:8, 9; 4:1, 2, 10; 6:20; Eph. 6:1; Col. 3:20)
      marker-yv: yv-n
    - type: text
      text: 'obeyed the voice of Jonadab the son of Rechab, our father, in all that he charged us, to drink no wine all our days, we, our wives, our sons, or our daughters, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nor to build ourselves houses to dwell in; nor do we have vineyard, field, or seed. '
