document_id: 2PE.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting the Faithful
  - type: text
    content: 'Simon Peter, a bondservant and '
  - type: note
    content: Gal. 2:8
  - type: text
    content: apostle of Jesus Christ,
  - type: text
    content: 'To those who have obtained '
  - type: note
    content: Eph. 4:5
  - type: text
    content: 'like precious faith with us by the righteousness of our God and Savior Jesus Christ:'
  '10':
  - type: text
    content: 'Therefore, brethren, be even more diligent '
  - type: note
    content: 2 Cor. 13:5; 1 John 3:19
  - type: text
    content: 'to make your call and election sure, for if you do these things you will never stumble; '
  '11':
  - type: text
    content: for so an entrance will be supplied to you abundantly into the everlasting kingdom of our Lord and Savior Jesus Christ.
  - type: heading
    content: Peter’s Approaching Death
  '12':
  - type: text
    content: 'For this reason '
  - type: note
    content: Phil. 3:1; 1 John 2:21; Jude 5
  - type: text
    content: 'I will not be negligent to remind you always of these things, '
  - type: note
    content: 1 Pet. 5:12
  - type: text
    content: 'though you know and are established in the present truth. '
  '13':
  - type: text
    content: 'Yes, I think it is right, '
  - type: note
    content: (2 Cor. 5:1, 4); 2 Pet. 1:14
  - type: text
    content: 'as long as I am in this tent, '
  - type: note
    content: 2 Pet. 3:1
  - type: text
    content: 'to stir you up by reminding '
  - type: text
    content: you
  - type: text
    content: ', '
  '14':
  - type: note
    content: (2 Cor. 5:1; 2 Tim. 4:6)
  - type: text
    content: 'knowing that shortly I '
  - type: text
    content: must
  - type: text
    content: ' put off my tent, just as '
  - type: note
    content: John 13:36; 21:18, 19
  - type: text
    content: 'our Lord Jesus Christ showed me. '
  '15':
  - type: text
    content: Moreover I will be careful to ensure that you always have a reminder of these things after my decease.
  - type: heading
    content: The Trustworthy Prophetic Word
  '16':
  - type: text
    content: 'For we did not follow '
  - type: note
    content: 1 Cor. 1:17
  - type: text
    content: 'cunningly devised fables when we made known to you the '
  - type: note
    content: (Matt. 28:18; Eph. 1:19–22)
  - type: text
    content: 'power and '
  - type: note
    content: (1 Pet. 5:4)
  - type: text
    content: 'coming of our Lord Jesus Christ, but were '
  - type: note
    content: Matt. 17:1–5; Luke 1:2
  - type: text
    content: 'eyewitnesses of His majesty. '
  '17':
  - type: text
    content: 'For He received from God the Father honor and glory when such a voice came to Him from the Excellent Glory: '
  - type: note
    content: Ps. 2:7; Is. 42:1; Matt. 17:5; Mark 9:7; Luke 1:35; 9:35
  - type: text
    content: '“This is My beloved Son, in whom I am well pleased.” '
  '18':
  - type: text
    content: 'And we heard this voice which came from heaven when we were with Him on '
  - type: note
    content: Matt. 17:1
  - type: text
    content: the holy mountain.
  '19':
  - type: text
    content: 'And so we have the prophetic word confirmed, which you do well to heed as a '
  - type: note
    content: (John 1:4, 5, 9)
  - type: text
    content: 'light that shines in a dark place, '
  - type: note
    content: Prov. 4:18
  - type: text
    content: 'until '
  - type: note
    content: Rev. 2:28; 22:16
  - type: text
    content: 'the day dawns and the morning star rises in your '
  - type: note
    content: (2 Cor. 4:5–7)
  - type: text
    content: 'hearts; '
  '2':
  - type: note
    content: Dan. 4:1
  - type: text
    content: 'Grace and peace be multiplied to you in the knowledge of God and of Jesus our Lord, '
  '20':
  - type: text
    content: 'knowing this first, that '
  - type: note
    content: (Rom. 12:6)
  - type: text
    content: 'no prophecy of Scripture is of any private interpretation, '
  '21':
  - type: text
    content: 'for '
  - type: note
    content: Jer. 23:26; (2 Tim. 3:16)
  - type: text
    content: 'prophecy never came by the will of man, '
  - type: note
    content: 2 Sam. 23:2; Luke 1:70; Acts 1:16; 3:18; 1 Pet. 1:11
  - type: text
    content: 'but holy men of God spoke '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: they
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' moved by the Holy Spirit.'
  '3':
  - type: text
    content: 'as His '
  - type: note
    content: 1 Pet. 1:5
  - type: text
    content: 'divine power has given to us all things that '
  - type: text
    content: pertain
  - type: text
    content: ' to life and godliness, through the knowledge of Him '
  - type: note
    content: 1 Thess. 2:12; 2 Thess. 2:14; 1 Pet. 5:10
  - type: text
    content: 'who called us by glory and virtue, '
  '4':
  - type: note
    content: 2 Cor. 1:20; 7:1
  - type: text
    content: 'by which have been given to us exceedingly great and precious promises, that through these you may be '
  - type: note
    content: (2 Cor. 3:18)
  - type: text
    content: 'partakers of the divine nature, having escaped the corruption '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' in the world through lust.'
  - type: heading
    content: Fruitful Growth in the Faith
  '5':
  - type: text
    content: 'But also for this very reason, '
  - type: note
    content: 2 Pet. 3:18
  - type: text
    content: 'giving all diligence, add to your faith virtue, to virtue '
  - type: note
    content: 2 Pet. 1:2
  - type: text
    content: 'knowledge, '
  '6':
  - type: text
    content: 'to knowledge self-control, to self-control perseverance, to perseverance godliness, '
  '7':
  - type: text
    content: 'to godliness brotherly kindness, and '
  - type: note
    content: Gal. 6:10
  - type: text
    content: 'to brotherly kindness love. '
  '8':
  - type: text
    content: 'For if these things are yours and abound, '
  - type: text
    content: you
  - type: text
    content: ' will be neither barren '
  - type: note
    content: (John 15:2)
  - type: text
    content: 'nor unfruitful in the knowledge of our Lord Jesus Christ. '
  '9':
  - type: text
    content: 'For he who lacks these things is '
  - type: note
    content: 1 John 2:9–11
  - type: text
    content: shortsighted, even to blindness, and has forgotten that he was cleansed from his old sins.
