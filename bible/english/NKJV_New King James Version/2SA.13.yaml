document_id: 2SA.13,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Amnon and Tamar
  - type: text
    content: 'After this '
  - type: note
    content: 1 Chr. 20:2
  - type: text
    content: 'Absalom the son of David had a lovely sister, whose name '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: 2 Sam. 3:2, 3; 1 Chr. 3:2
  - type: text
    content: 'Tamar; and '
  - type: note
    content: 1 Chr. 3:9
  - type: text
    content: 'Amnon the son of David loved her. '
  '10':
  - type: text
    content: 'Then Amnon said to Tamar, “Bring the food into the bedroom, that I may eat from your hand.” And Tamar took the cakes which she had made, and brought '
  - type: text
    content: them
  - type: text
    content: ' to Amnon her brother in the bedroom. '
  '11':
  - type: text
    content: 'Now when she had brought '
  - type: text
    content: them
  - type: text
    content: ' to him to eat, '
  - type: note
    content: Gen. 45:1
  - type: text
    content: he took hold of her and said to her, “Come, lie with me, my sister.”
  '12':
  - type: text
    content: 'But she answered him, “No, my brother, do not force me, for '
  - type: note
    content: Gen. 39:12; (Deut. 27:22); Ezek. 22:11
  - type: text
    content: 'no such thing should be done in Israel. Do not do this '
  - type: note
    content: (Lev. 18:9–11; 20:17)
  - type: text
    content: 'disgraceful thing! '
  '13':
  - type: text
    content: 'And I, where could I take my shame? And as for you, you would be like one of the fools in Israel. Now therefore, please speak to the king; '
  - type: note
    content: Gen. 34:7; Judg. 19:23; 20:6
  - type: text
    content: 'for he will not withhold me from you.” '
  '14':
  - type: text
    content: 'However, he would not heed her voice; and being stronger than she, he '
  - type: note
    content: Gen. 20:12
  - type: text
    content: forced her and lay with her.
  '15':
  - type: text
    content: 'Then Amnon hated her exceedingly, so that the hatred with which he hated her '
  - type: text
    content: was
  - type: text
    content: ' greater than the love with which he had loved her. And Amnon said to her, “Arise, be gone!”'
  '16':
  - type: text
    content: 'So she said to him, “No, indeed! This evil of sending me away '
  - type: text
    content: is
  - type: text
    content: ' worse than the other that you did to me.”'
  - type: text
    content: 'But he would not listen to her. '
  '17':
  - type: text
    content: 'Then he called his servant who attended him, and said, “Here! Put this '
  - type: text
    content: woman
  - type: text
    content: ' out, away from me, and bolt the door behind her.” '
  '18':
  - type: text
    content: 'Now she had on '
  - type: note
    content: Lev. 18:9; (Deut. 22:25; 27:22); 2 Sam. 12:11
  - type: text
    content: a robe of many colors, for the king’s virgin daughters wore such apparel. And his servant put her out and bolted the door behind her.
  '19':
  - type: text
    content: 'Then Tamar put '
  - type: note
    content: Gen. 37:3; Judg. 5:30; Ps. 45:13, 14
  - type: text
    content: 'ashes on her head, and tore her robe of many colors that '
  - type: text
    content: was
  - type: text
    content: ' on her, and '
  - type: note
    content: Josh. 7:6; 2 Sam. 1:2; Job 2:12; 42:6
  - type: text
    content: 'laid her hand on her head and went away crying bitterly. '
  '2':
  - type: text
    content: 'Amnon was so distressed over his sister Tamar that he became sick; for she '
  - type: text
    content: was
  - type: text
    content: ' a virgin. And it was improper for Amnon to do anything to her. '
  '20':
  - type: text
    content: 'And Absalom her brother said to her, “Has Amnon your brother been with you? But now hold your peace, my sister. He '
  - type: text
    content: is
  - type: text
    content: ' your brother; do not take this thing to heart.” So Tamar remained desolate in her brother Absalom’s house.'
  '21':
  - type: text
    content: 'But when King David heard of all these things, he was very angry. '
  '22':
  - type: text
    content: 'And Absalom spoke to his brother Amnon '
  - type: note
    content: Jer. 2:37
  - type: text
    content: 'neither good nor bad. For Absalom '
  - type: note
    content: Gen. 24:50; 31:24
  - type: text
    content: hated Amnon, because he had forced his sister Tamar.
  - type: heading
    content: Absalom Murders Amnon
  '23':
  - type: text
    content: 'And it came to pass, after two full years, that Absalom '
  - type: note
    content: (Lev. 19:17, 18; 1 John 2:9, 11; 3:10, 12, 15)
  - type: text
    content: 'had sheepshearers in Baal Hazor, which '
  - type: text
    content: is
  - type: text
    content: ' near Ephraim; so Absalom invited all the king’s sons. '
  '24':
  - type: text
    content: Then Absalom came to the king and said, “Kindly note, your servant has sheepshearers; please, let the king and his servants go with your servant.”
  '25':
  - type: text
    content: But the king said to Absalom, “No, my son, let us not all go now, lest we be a burden to you.” Then he urged him, but he would not go; and he blessed him.
  '26':
  - type: text
    content: Then Absalom said, “If not, please let my brother Amnon go with us.”
  - type: text
    content: 'And the king said to him, “Why should he go with you?” '
  '27':
  - type: text
    content: But Absalom urged him; so he let Amnon and all the king’s sons go with him.
  '28':
  - type: text
    content: 'Now Absalom had commanded his servants, saying, “Watch now, when Amnon’s '
  - type: note
    content: Gen. 38:12, 13; 1 Sam. 25:4
  - type: text
    content: 'heart is merry with wine, and when I say to you, ‘Strike Amnon!’ then kill him. Do not be afraid. Have I not commanded you? Be courageous and valiant.” '
  '29':
  - type: text
    content: 'So the servants of Absalom '
  - type: note
    content: Judg. 19:6, 9, 22; Ruth 3:7; 1 Sam. 25:36; Esth. 1:10
  - type: text
    content: 'did to Amnon as Absalom had commanded. Then all the king’s sons arose, and each one got on '
  - type: note
    content: 2 Sam. 12:10
  - type: text
    content: his mule and fled.
  '3':
  - type: text
    content: 'But Amnon had a friend whose name '
  - type: text
    content: was
  - type: text
    content: ' Jonadab '
  - type: note
    content: 2 Sam. 3:2
  - type: text
    content: 'the son of Shimeah, David’s brother. Now Jonadab '
  - type: text
    content: was
  - type: text
    content: ' a very crafty man. '
  '30':
  - type: text
    content: 'And it came to pass, while they were on the way, that news came to David, saying, “Absalom has killed all the king’s sons, and not one of them is left!” '
  '31':
  - type: text
    content: 'So the king arose and '
  - type: note
    content: 2 Sam. 18:9; 1 Kin. 1:33, 38
  - type: text
    content: 'tore his garments and '
  - type: note
    content: 2 Sam. 1:11
  - type: text
    content: 'lay on the ground, and all his servants stood by with their clothes torn. '
  '32':
  - type: text
    content: 'Then '
  - type: note
    content: 2 Sam. 12:16
  - type: text
    content: 'Jonadab the son of Shimeah, David’s brother, answered and said, “Let not my lord suppose they have killed all the young men, the king’s sons, for only Amnon is dead. For by the command of Absalom this has been determined from the day that he forced his sister Tamar. '
  '33':
  - type: text
    content: 'Now therefore, '
  - type: note
    content: 2 Sam. 13:3–5
  - type: text
    content: let not my lord the king take the thing to his heart, to think that all the king’s sons are dead. For only Amnon is dead.”
  - type: heading
    content: Absalom Flees to Geshur
  '34':
  - type: note
    content: 2 Sam. 19:19
  - type: text
    content: 'Then Absalom fled. And the young man who was keeping watch lifted his eyes and looked, and there, many people were coming from the road on the hillside behind him. '
  '35':
  - type: text
    content: 'And Jonadab said to the king, “Look, the king’s sons are coming; as your servant said, so it is.” '
  '36':
  - type: text
    content: So it was, as soon as he had finished speaking, that the king’s sons indeed came, and they lifted up their voice and wept. Also the king and all his servants wept very bitterly.
  '37':
  - type: text
    content: 'But Absalom fled and went to '
  - type: note
    content: 2 Sam. 13:37, 38
  - type: text
    content: 'Talmai the son of Ammihud, king of Geshur. And '
  - type: text
    content: David
  - type: text
    content: ' mourned for his son every day. '
  '38':
  - type: text
    content: 'So Absalom fled and went to '
  - type: note
    content: 2 Sam. 3:3; 1 Chr. 3:2
  - type: text
    content: 'Geshur, and was there three years. '
  '39':
  - type: text
    content: 'And King David longed to go to Absalom. For he had been '
  - type: note
    content: 2 Sam. 14:23, 32; 15:8
  - type: text
    content: comforted concerning Amnon, because he was dead.
  '4':
  - type: text
    content: 'And he said to him, “Why '
  - type: text
    content: are
  - type: text
    content: ' you, the king’s son, becoming thinner day after day? Will you not tell me?”'
  - type: text
    content: Amnon said to him, “I love Tamar, my brother Absalom’s sister.”
  '5':
  - type: text
    content: 'So Jonadab said to him, “Lie down on your bed and pretend to be ill. And when your father comes to see you, say to him, ‘Please let my sister Tamar come and give me food, and prepare the food in my sight, that I may see '
  - type: text
    content: it
  - type: text
    content: ' and eat it from her hand.’ ” '
  '6':
  - type: text
    content: 'Then Amnon lay down and pretended to be ill; and when the king came to see him, Amnon said to the king, “Please let Tamar my sister come and '
  - type: note
    content: 1 Sam. 16:9
  - type: text
    content: make a couple of cakes for me in my sight, that I may eat from her hand.”
  '7':
  - type: text
    content: 'And David sent home to Tamar, saying, “Now go to your brother Amnon’s house, and prepare food for him.” '
  '8':
  - type: text
    content: 'So Tamar went to her brother Amnon’s house; and he was lying down. Then she took flour and kneaded '
  - type: text
    content: it,
  - type: text
    content: ' made cakes in his sight, and baked the cakes. '
  '9':
  - type: text
    content: 'And she took the pan and placed '
  - type: text
    content: them
  - type: text
    content: ' out before him, but he refused to eat. Then Amnon said, '
  - type: note
    content: Gen. 18:6
  - type: text
    content: '“Have everyone go out from me.” And they all went out from him. '
