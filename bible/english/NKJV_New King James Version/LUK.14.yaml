  - type: text
    content: yes, and his own life also, he cannot be My disciple.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 16:24; Mark 8:34; Luke 9:23; (2 Tim. 3:12)
  - type: text
    content: whoever does not bear his cross and come after Me cannot be My disciple.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'For '
  - type: note
    content: Prov. 24:27
  - type: text
    content: 'which of you, intending to build a tower, does not sit down first and count the cost, whether he has '
  - type: text
    content: enough
  - type: text
    content: ' to finish '
  - type: text
    content: it
  - type: text
    content: —
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'lest, after he has laid the foundation, and is not able to finish, all who see '
  - type: text
    content: it
  - type: text
    content: ' begin to mock him,'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And Jesus, answering, spoke to the lawyers and Pharisees, saying, '
  - type: note
    content: Matt. 12:10
  - type: text
    content: '“Is it lawful to heal on the '
  - type: text
    content: Sabbath?”
  '30':
  - type: text
    content: saying, ‘This man began to build and was not able to finish’?
  - type: text
    content: ' '
  '31':
  - type: text
    content: Or what king, going to make war against another king, does not sit down first and consider whether he is able with ten thousand to meet him who comes against him with twenty thousand?
  - type: text
    content: ' '
  '32':
  - type: text
    content: Or else, while the other is still a great way off, he sends a delegation and asks conditions of peace.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'So likewise, whoever of you '
  - type: note
    content: Matt. 19:27
  - type: text
    content: does not forsake all that he has cannot be My disciple.
  - type: heading
    content: Tasteless Salt Is Worthless
  '34':
  - type: note
    content: Matt. 5:13; (Mark 9:50)
  - type: text
    content: '“Salt '
  - type: text
    content: is
  - type: text
    content: ' good; but if the salt has lost its flavor, how shall it be seasoned?'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'It is neither fit for the land nor for the '
  - type: text
    content: 'dunghill, '
  - type: text
    content: but
  - type: text
    content: ' men throw it out. He who has ears to hear, let him hear!”'
  '4':
  - type: text
    content: 'But they kept silent. And He took '
  - type: text
    content: him
  - type: text
    content: ' and healed him, and let him go. '
  '5':
  - type: text
    content: 'Then He answered them, saying, '
  - type: note
    content: (Ex. 23:5; Deut. 22:4); Luke 13:15
  - type: text
    content: '“Which of you, having a '
  - type: text
    content: donkey
  - type: text
    content: ' or an ox that has fallen into a pit, will not immediately pull him out on the Sabbath day?”'
  - type: text
    content: ' '
  '6':
  - type: text
    content: And they could not answer Him regarding these things.
  - type: heading
    content: Take the Lowly Place
  '7':
  - type: text
    content: 'So He told a parable to those who were invited, when He noted how they chose the best places, saying to them: '
  '8':
  - type: text
    content: “When you are invited by anyone to a wedding feast, do not sit down in the best place, lest one more honorable than you be invited by him;
  - type: text
    content: ' '
  '9':
  - type: text
    content: and he who invited you and him come and say to you, ‘Give place to this man,’ and then you begin with shame to take the lowest place.
  - type: text
    content: ' '
