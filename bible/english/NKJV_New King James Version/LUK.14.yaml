    content: A Man with Dropsy Healed on the Sabbath
  - type: text
    content: 'Now it happened, as He went into the house of one of the rulers of the Pharisees to eat bread on the Sabbath, that they watched Him closely. '
  '10':
  - type: note
    content: Prov. 25:6, 7
  - type: text
    content: But when you are invited, go and sit down in the lowest place, so that when he who invited you comes he may say to you, ‘Friend, go up higher.’ Then you will have glory in the presence of those who sit at the table with you.
