    content: Those by the wayside are the ones who hear; then the devil comes and takes away the word out of their hearts, lest they should believe and be saved.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'But the ones on the rock '
  - type: text
    content: are those
  - type: text
    content: ' who, when they hear, receive the word with joy; and these have no root, who believe for a while and in time of '
  - type: text
