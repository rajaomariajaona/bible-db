  - type: text
    content: ' fell on the good ground are those who, having heard the word with a noble and good heart, keep '
  - type: text
    content: it
  - type: text
    content: ' and bear fruit with '
  - type: note
    content: (Rom. 2:7; Heb. 10:36–39; James 5:7, 8)
  - type: text
    content: patience.
