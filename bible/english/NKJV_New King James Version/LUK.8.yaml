  - type: heading
    content: Jesus’ Mother and Brothers Come to Him
  '19':
  - type: note
    content: Ps. 69:8; Matt. 12:46–50; Mark 3:31–35
  - type: text
    content: 'Then His mother and brothers came to Him, and could not approach Him because of the crowd. '
  '2':
  - type: text
    content: 'and '
  - type: note
    content: Matt. 27:55; Mark 15:40, 41; Luke 23:49, 55
  - type: text
    content: 'certain women who had been healed of evil spirits and infirmities—Mary called Magdalene, '
  - type: note
    content: Matt. 27:56; Mark 16:9
  - type: text
    content: 'out of whom had come seven demons, '
  '20':
  - type: text
    content: 'And it was told Him '
  - type: text
    content: by
  - type: text
    content: ' '
  - type: text
    content: some,
  - type: text
    content: ' who said, “Your mother and Your brothers are standing outside, desiring to see You.”'
  '21':
  - type: text
    content: 'But He answered and said to them, '
  - type: text
    content: “My mother and My brothers are these who hear the word of God and do it.”
  - type: heading
    content: Wind and Wave Obey Jesus
  '22':
  - type: note
    content: Matt. 8:23–27; Mark 4:36–41
  - type: text
    content: 'Now it happened, on a certain day, that He got into a boat with His disciples. And He said to them, '
  - type: text
    content: “Let us cross over to the other side of the lake.”
  - type: text
    content: ' And they launched out. '
  '23':
  - type: text
    content: 'But as they sailed He fell asleep. And a windstorm came down on the lake, and they were filling '
  - type: text
    content: with
  - type: text
    content: ' '
  - type: text
    content: water,
  - type: text
    content: ' and were in jeopardy. '
  '24':
  - type: text
    content: And they came to Him and awoke Him, saying, “Master, Master, we are perishing!”
  - type: text
    content: 'Then He arose and rebuked the wind and the raging of the water. And they ceased, and there was a calm. '
  '25':
  - type: text
    content: 'But He said to them, '
  - type: note
    content: Luke 9:41
  - type: text
    content: “Where is your faith?”
  - type: text
    content: 'And they were afraid, and marveled, saying to one another, '
  - type: note
    content: Luke 4:36; 5:26
  - type: text
    content: “Who can this be? For He commands even the winds and water, and they obey Him!”
  - type: heading
    content: A Demon-Possessed Man Healed
  '26':
  - type: note
    content: Matt. 8:28–34; Mark 5:1–17
  - type: text
    content: 'Then they sailed to the country of the Gadarenes, which is opposite Galilee. '
  '27':
  - type: text
    content: 'And when He stepped out on the land, there met Him a certain man from the city who had demons for a long time. And he wore no clothes, nor did he live in a house but in the tombs. '
  '28':
  - type: text
    content: 'When he saw Jesus, he '
  - type: note
    content: Mark 1:26; 9:26
  - type: text
    content: 'cried out, fell down before Him, and with a loud voice said, '
  - type: note
    content: Mark 1:23, 24
  - type: text
    content: '“What have I to do with '
  - type: note
    content: Luke 4:41
  - type: text
    content: 'You, Jesus, Son of the Most High God? I beg You, do not torment me!” '
  '29':
  - type: text
    content: For He had commanded the unclean spirit to come out of the man. For it had often seized him, and he was kept under guard, bound with chains and shackles; and he broke the bonds and was driven by the demon into the wilderness.
  '3':
  - type: text
    content: and Joanna the wife of Chuza, Herod’s steward, and Susanna, and many others who provided for Him from their substance.
  - type: heading
    content: The Parable of the Sower
  '30':
  - type: text
    content: 'Jesus asked him, saying, '
  - type: text
    content: “What is your name?”
  - type: text
    content: 'And he said, “Legion,” because many demons had entered him. '
  '31':
  - type: text
    content: 'And they begged Him that He would not command them to go out '
  - type: note
    content: Rom. 10:7; (Rev. 20:1, 3)
  - type: text
    content: into the abyss.
  '32':
  - type: text
    content: 'Now a herd of many '
  - type: note
    content: Lev. 11:7; Deut. 14:8
  - type: text
    content: 'swine was feeding there on the mountain. So they begged Him that He would permit them to enter them. And He permitted them. '
  '33':
  - type: text
    content: Then the demons went out of the man and entered the swine, and the herd ran violently down the steep place into the lake and drowned.
  '34':
  - type: text
    content: 'When those who fed '
  - type: text
    content: them
  - type: text
    content: ' saw what had happened, they fled and told '
  - type: text
    content: it
  - type: text
    content: ' in the city and in the country. '
  '35':
  - type: text
    content: 'Then they went out to see what had happened, and came to Jesus, and found the man from whom the demons had departed, '
  - type: note
    content: (Matt. 11:28)
  - type: text
    content: 'sitting at the '
  - type: note
    content: Matt. 28:9; Mark 7:25; Luke 10:39; 17:16; John 11:32
  - type: text
    content: 'feet of Jesus, clothed and in his '
  - type: note
    content: (2 Tim. 1:7)
  - type: text
    content: 'right mind. And they were afraid. '
  '36':
  - type: text
    content: 'They also who had seen '
  - type: text
    content: it
  - type: text
    content: ' told them by what means he who had been demon-possessed was healed. '
  '37':
  - type: note
    content: Matt. 8:34
  - type: text
    content: 'Then the whole multitude of the surrounding region of the Gadarenes '
  - type: note
    content: Mark 1:24; Luke 4:34
  - type: text
    content: 'asked Him to '
  - type: note
    content: Job 21:14; Acts 16:39
  - type: text
    content: 'depart from them, for they were seized with great '
  - type: note
    content: Luke 5:26
  - type: text
    content: fear. And He got into the boat and returned.
  '38':
  - type: text
    content: 'Now '
  - type: note
    content: Mark 5:18–20
  - type: text
    content: 'the man from whom the demons had departed begged Him that he might be with Him. But Jesus sent him away, saying, '
  '39':
  - type: text
    content: “Return to your own house, and tell what great things God has done for you.”
  - type: text
    content: ' And he went his way and proclaimed throughout the whole city what great things Jesus had done for him.'
  - type: heading
    content: A Girl Restored to Life and a Woman Healed
  '4':
  - type: note
    content: Matt. 13:2–9; Mark 4:1–9
  - type: text
    content: 'And when a great multitude had gathered, and they had come to Him from every city, He spoke by a parable: '
  '40':
  - type: text
    content: 'So it was, when Jesus returned, that the multitude welcomed Him, for they were all waiting for Him. '
  '41':
  - type: note
    content: Matt. 9:18–26; Mark 5:22–43
  - type: text
    content: 'And behold, there came a man named Jairus, and he was a ruler of the synagogue. And he fell down at Jesus’ feet and begged Him to come to his house, '
  '42':
  - type: text
    content: 'for he had an only daughter about twelve years of age, and she '
  - type: note
    content: Luke 7:2
  - type: text
    content: was dying.
  - type: text
    content: 'But as He went, the multitudes thronged Him. '
  '43':
  - type: note
    content: Matt. 9:20
  - type: text
    content: 'Now a woman, having a '
  - type: note
    content: Luke 15:19–22
  - type: text
    content: 'flow of blood for twelve years, who had spent all her livelihood on physicians and could not be healed by any, '
  '44':
  - type: text
    content: 'came from behind and '
  - type: note
    content: Mark 6:56; Luke 5:13
  - type: text
    content: touched the border of His garment. And immediately her flow of blood stopped.
  '45':
  - type: text
    content: 'And Jesus said, '
  - type: text
    content: “Who touched Me?”
  - type: text
    content: 'When all denied it, Peter and those with him said, “Master, the multitudes throng and press You, and You say, '
  - type: text
    content: ‘Who touched Me?’
  - type: text
    content: ' ”'
  '46':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: '“Somebody touched Me, for I perceived '
  - type: note
    content: Mark 5:30; Luke 6:19
  - type: text
    content: power going out from Me.”
  - type: text
    content: ' '
  '47':
  - type: text
    content: Now when the woman saw that she was not hidden, she came trembling; and falling down before Him, she declared to Him in the presence of all the people the reason she had touched Him and how she was healed immediately.
  '48':
  - type: text
    content: 'And He said to her, '
  - type: text
    content: '“Daughter, '
  - type: text
    content: be of good cheer;
  - type: text
    content: ' '
  - type: note
    content: Mark 5:34; Luke 7:50
  - type: text
    content: 'your faith has made you well. '
  - type: note
    content: John 8:11
  - type: text
    content: Go in peace.”
  '49':
  - type: note
    content: Mark 5:35
  - type: text
    content: 'While He was still speaking, someone came from the ruler of the synagogue’s '
  - type: text
    content: house,
  - type: text
    content: ' saying to him, “Your daughter is dead. Do not trouble the Teacher.”'
  '5':
  - type: text
    content: “A sower went out to sow his seed. And as he sowed, some fell by the wayside; and it was trampled down, and the birds of the air devoured it.
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'But when Jesus heard '
  - type: text
    content: it,
  - type: text
    content: ' He answered him, saying, '
  - type: text
    content: '“Do not be afraid; '
  - type: note
    content: (Mark 11:22–24)
  - type: text
    content: only believe, and she will be made well.”
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'When He came into the house, He permitted no one to go in except Peter, James, and John, and the father and mother of the girl. '
  '52':
  - type: text
    content: 'Now all wept and mourned for her; but He said, '
  - type: note
    content: Luke 7:13
  - type: text
    content: '“Do not weep; she is not dead, '
  - type: note
    content: (John 11:11, 13)
  - type: text
    content: but sleeping.”
  - type: text
    content: ' '
  '53':
  - type: text
    content: And they ridiculed Him, knowing that she was dead.
  '54':
  - type: text
    content: 'But He put them all outside, took her by the hand and called, saying, '
  - type: text
    content: '“Little girl, '
  - type: note
    content: Luke 7:14; John 11:43
  - type: text
    content: arise.”
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'Then her spirit returned, and she arose immediately. And He commanded that she be given '
  - type: text
    content: something
  - type: text
    content: ' to eat. '
  '56':
  - type: text
    content: 'And her parents were astonished, but '
  - type: note
    content: Matt. 8:4; 9:30; Mark 5:43
  - type: text
    content: He charged them to tell no one what had happened.
  '6':
  - type: text
    content: Some fell on rock; and as soon as it sprang up, it withered away because it lacked moisture.
  - type: text
    content: ' '
  '7':
  - type: text
    content: And some fell among thorns, and the thorns sprang up with it and choked it.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But others fell on good ground, sprang up, and yielded '
  - type: text
    content: a crop a hundredfold.”
  - type: text
    content: ' When He had said these things He cried, '
  - type: note
    content: Matt. 11:15; Mark 7:16; Luke 14:35; Rev. 2:7, 11, 17, 29; 3:6, 13, 22; 13:9
  - type: text
    content: “He who has ears to hear, let him hear!”
  - type: heading
    content: The Purpose of Parables
  '9':
  - type: note
    content: Matt. 13:10–23; Mark 4:10–20
  - type: text
    content: Then His disciples asked Him, saying, “What does this parable mean?”
