    content: Many Women Minister to Jesus
  - type: text
    content: 'Now it came to pass, afterward, that He went through every city and village, preaching and bringing the glad tidings of the kingdom of God. And the twelve '
  - type: text
    content: were
  - type: text
    content: ' with Him, '
