document_id: ECC.12,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 34:3; Prov. 22:6; Lam. 3:27
      marker-yv: yv-n
    - type: text
      text: ' now your Creator in the days of your youth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Before the difficult days come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the years draw near '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 19:35
      marker-yv: yv-n
    - type: text
      text: when you say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“I have no pleasure in them”:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Preacher sought to find acceptable words; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' written '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' upright—words of truth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The words of the wise are like goads, and the words of scholars are like well-driven nails, given by one Shepherd. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And further, my son, be admonished by these. Of making many books '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no end, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 1:18
      marker-yv: yv-n
    - type: text
      text: 'much study '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' wearisome to the flesh.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let us hear the conclusion of the whole matter:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 6:2; 10:12); Mic. 6:8
      marker-yv: yv-n
    - type: text
      text: Fear God and keep His commandments,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For this is man’s all.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 11:9; Matt. 12:36; (Acts 17:30, 31; Rom. 2:16; 1 Cor. 4:5; 2 Cor. 5:10)
      marker-yv: yv-n
    - type: text
      text: God will bring every work into judgment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Including every secret thing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whether good or evil.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: While the sun and the light,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The moon and the stars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Are not darkened,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the clouds do not return after the rain;
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the day when the keepers of the house tremble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the strong men bow down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When the grinders cease because they are few,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And those that look through the windows grow dim;
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When the doors are shut in the streets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the sound of grinding is low;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When one rises up at the sound of a bird,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 19:35
      marker-yv: yv-n
    - type: text
      text: the daughters of music are brought low.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Also they are afraid of height,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And of terrors in the way;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When the almond tree blossoms,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The grasshopper is a burden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And desire fails.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For man goes to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 17:13
      marker-yv: yv-n
    - type: text
      text: his eternal home,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 50:10; Jer. 9:17
      marker-yv: yv-n
    - type: text
      text: the mourners go about the streets.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Remember
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Creator
    - type: text
      text: ' before the silver cord is loosed,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or the golden bowl is broken,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or the pitcher shattered at the fountain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or the wheel broken at the well.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 3:19; Job 34:15; Ps. 90:3
      marker-yv: yv-n
    - type: text
      text: Then the dust will return to the earth as it was,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 3:21
      marker-yv: yv-n
    - type: text
      text: 'And the spirit will return to God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:22; 27:16; Job 34:14; Is. 57:16; Zech. 12:1
      marker-yv: yv-n
    - type: text
      text: who gave it.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Vanity
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 62:9
      marker-yv: yv-n
    - type: text
      text: ' of vanities,” says the Preacher,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“All '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Whole Duty of Man
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And moreover, because the Preacher was wise, he still taught the people knowledge; yes, he pondered and sought out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 4:32
      marker-yv: yv-n
    - type: text
      text: 'set in order many proverbs. '
