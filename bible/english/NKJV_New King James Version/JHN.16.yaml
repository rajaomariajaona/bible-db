document_id: JHN.16,114
type_code: eng
verses:
  '1':
  - type: text
    content: '“These things I have spoken to you, that you '
  - type: note
    content: Matt. 11:6
  - type: text
    content: should not be made to stumble.
  - type: text
    content: ' '
  '10':
  - type: note
    content: Acts 2:32
  - type: text
    content: 'of righteousness, '
  - type: note
    content: John 5:32
  - type: text
    content: because I go to My Father and you see Me no more;
  - type: text
    content: ' '
  '11':
  - type: note
    content: Acts 26:18
  - type: text
    content: 'of judgment, because '
  - type: note
    content: (Luke 10:18)
  - type: text
    content: the ruler of this world is judged.
  '12':
  - type: text
    content: '“I still have many things to say to you, '
  - type: note
    content: Mark 4:33
  - type: text
    content: 'but you cannot bear '
  - type: text
    content: them
  - type: text
    content: ' now.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'However, when He, '
  - type: note
    content: (John 14:17)
  - type: text
    content: 'the Spirit of truth, has come, '
  - type: note
    content: John 14:26; Acts 11:28; Rev. 1:19
  - type: text
    content: 'He will guide you into all truth; for He will not speak on His own '
  - type: text
    content: authority,
  - type: text
    content: ' but whatever He hears He will speak; and He will tell you things to come.'
  - type: text
    content: ' '
  '14':
  - type: note
    content: John 15:26
  - type: text
    content: 'He will glorify Me, for He will take of what is Mine and declare '
  - type: text
    content: it
  - type: text
    content: ' to you.'
  - type: text
    content: ' '
  '15':
  - type: note
    content: Matt. 11:27; John 3:35
  - type: text
    content: 'All things that the Father has are Mine. Therefore I said that He '
  - type: text
    content: 'will take of Mine and declare '
  - type: text
    content: it
  - type: text
    content: ' to you.'
  - type: heading
    content: Sorrow Will Turn to Joy
  '16':
  - type: text
    content: '“A '
  - type: note
    content: John 7:33; 12:35; 13:33; 14:19; 19:40–42; 20:19
  - type: text
    content: 'little while, and you will not see Me; and again a little while, and you will see Me, '
  - type: note
    content: John 13:3
  - type: text
    content: because I go to the Father.”
  '17':
  - type: text
    content: 'Then '
  - type: text
    content: some
  - type: text
    content: ' of His disciples said among themselves, “What is this that He says to us, '
  - type: text
    content: ‘A little while, and you will not see Me; and again a little while, and you will see Me’
  - type: text
    content: '; and, '
  - type: text
    content: ‘because I go to the Father’
  - type: text
    content: '?” '
  '18':
  - type: text
    content: 'They said therefore, “What is this that He says, '
  - type: text
    content: ‘A little while’
  - type: text
    content: '? We do not know what He is saying.”'
  '19':
  - type: text
    content: 'Now Jesus knew that they desired to ask Him, and He said to them, '
  - type: text
    content: “Are you inquiring among yourselves about what I said, ‘A little while, and you will not see Me; and again a little while, and you will see Me’?
  - type: text
    content: ' '
  '2':
  - type: note
    content: John 9:22
  - type: text
    content: 'They will put you out of the synagogues; yes, the time is coming '
  - type: note
    content: Acts 8:1
  - type: text
    content: that whoever kills you will think that he offers God service.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Most assuredly, I say to you that you will weep and '
  - type: note
    content: Mark 16:10; Luke 23:48; 24:17
  - type: text
    content: 'lament, but the world will rejoice; and you will be sorrowful, but your sorrow will be turned into '
  - type: note
    content: Luke 24:32, 41
  - type: text
    content: joy.
  - type: text
    content: ' '
  '21':
  - type: note
    content: Gen. 3:16; Is. 13:8; 26:17; 42:14; 1 Thess. 5:3
  - type: text
    content: A woman, when she is in labor, has sorrow because her hour has come; but as soon as she has given birth to the child, she no longer remembers the anguish, for joy that a human being has been born into the world.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Therefore you now have sorrow; but I will see you again and '
  - type: note
    content: Luke 24:41; John 14:1, 27; 20:20; Acts 2:46; 13:52; 1 Pet. 1:8
  - type: text
    content: your heart will rejoice, and your joy no one will take from you.
  '23':
  - type: text
    content: '“And in that day you will ask Me nothing. '
  - type: note
    content: Matt. 7:7; (John 14:13; 15:16)
  - type: text
    content: Most assuredly, I say to you, whatever you ask the Father in My name He will give you.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Until now you have asked nothing in My name. Ask, and you will receive, '
  - type: note
    content: John 17:13
  - type: text
    content: 'that your joy may be '
  - type: note
    content: John 15:11
  - type: text
    content: full.
  - type: heading
    content: Jesus Christ Has Overcome the World
  '25':
  - type: text
    content: '“These things I have spoken to you in figurative language; but the time is coming when I will no longer speak to you in figurative language, but I will tell you '
  - type: note
    content: John 7:13
  - type: text
    content: plainly about the Father.
  - type: text
    content: ' '
  '26':
  - type: text
    content: In that day you will ask in My name, and I do not say to you that I shall pray the Father for you;
  - type: text
    content: ' '
  '27':
  - type: note
    content: (John 14:21, 23)
  - type: text
    content: 'for the Father Himself loves you, because you have loved Me, and '
  - type: note
    content: John 3:13
  - type: text
    content: have believed that I came forth from God.
  - type: text
    content: ' '
  '28':
  - type: note
    content: John 13:1, 3; 16:5, 10, 17
  - type: text
    content: I came forth from the Father and have come into the world. Again, I leave the world and go to the Father.”
  '29':
  - type: text
    content: 'His disciples said to Him, “See, now You are speaking plainly, and using no figure of speech! '
  '3':
  - type: text
    content: 'And '
  - type: note
    content: John 8:19; 15:21; Acts 13:27; Rom. 10:2
  - type: text
    content: 'these things they will do '
  - type: text
    content: to you
  - type: text
    content: ' because they have not known the Father nor Me.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Now we are sure that '
  - type: note
    content: John 21:17
  - type: text
    content: 'You know all things, and have no need that anyone should question You. By this '
  - type: note
    content: John 17:8
  - type: text
    content: we believe that You came forth from God.”
  '31':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “Do you now believe?
  - type: text
    content: ' '
  '32':
  - type: note
    content: Zech. 13:7; Matt. 26:31, 56; Mark 14:27, 50; Acts 8:1
  - type: text
    content: 'Indeed the hour is coming, yes, has now come, that you will be scattered, '
  - type: note
    content: John 20:10
  - type: text
    content: 'each to his '
  - type: text
    content: 'own, and will leave Me alone. And '
  - type: note
    content: John 8:29
  - type: text
    content: yet I am not alone, because the Father is with Me.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'These things I have spoken to you, that '
  - type: note
    content: (Is. 9:6; Rom. 5:1; Eph. 2:14)
  - type: text
    content: 'in Me you may have peace. '
  - type: note
    content: 2 Tim. 3:12
  - type: text
    content: 'In the world you '
  - type: text
    content: will
  - type: text
    content: ' have tribulation; but be of good cheer, '
  - type: note
    content: Rom. 8:37; (1 John 4:4)
  - type: text
    content: I have overcome the world.”
  '4':
  - type: text
    content: 'But these things I have told you, that when '
  - type: text
    content: the
  - type: text
    content: ' time comes, you may remember that I told you of them.'
  - type: text
    content: And these things I did not say to you at the beginning, because I was with you.
  - type: heading
    content: The Work of the Holy Spirit
  '5':
  - type: text
    content: '“But now I '
  - type: note
    content: John 7:33; 13:33; 14:28; 17:11
  - type: text
    content: go away to Him who sent Me, and none of you asks Me, ‘Where are You going?’
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'But because I have said these things to you, '
  - type: note
    content: Matt. 17:23; (John 16:20, 22)
  - type: text
    content: sorrow has filled your heart.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Nevertheless I tell you the truth. It is to your advantage that I go away; for if I do not go away, the Helper will not come to you; but '
  - type: note
    content: Acts 2:33
  - type: text
    content: if I depart, I will send Him to you.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And when He has '
  - type: note
    content: Acts 1:8; 2:1–4, 37
  - type: text
    content: 'come, He will convict the world of sin, and of righteousness, and of judgment:'
  - type: text
    content: ' '
  '9':
  - type: note
    content: Acts 2:22
  - type: text
    content: of sin, because they do not believe in Me;
  - type: text
    content: ' '
