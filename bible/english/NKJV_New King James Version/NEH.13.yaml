document_id: NEH.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Principles of Separation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On that day '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 31:11, 12); 2 Kin. 23:2; Neh. 8:3, 8; 9:3; Is. 34:16
    marker-yv: yv-n
  - type: text
    text: 'they read from the Book of Moses in the hearing of the people, and in it was found written '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 23:3, 4
    marker-yv: yv-n
  - type: text
    text: 'that no Ammonite or Moabite should ever come into the assembly of God, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'because they had not met the children of Israel with bread and water, but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 22:5; Josh. 24:9, 10
    marker-yv: yv-n
  - type: text
    text: 'hired Balaam against them to curse them. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 23:1; 24:10; Deut. 23:5
    marker-yv: yv-n
  - type: text
    text: 'However, our God turned the curse into a blessing. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So it was, when they had heard the Law, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 9:2; 10:28
    marker-yv: yv-n
  - type: text
    text: that they separated all the mixed multitude from Israel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Reforms of Nehemiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now before this, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 12:10
    marker-yv: yv-n
  - type: text
    text: 'Eliashib the priest, having authority over the storerooms of the house of our God, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' allied with '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 2:10; 4:3; 6:1
    marker-yv: yv-n
  - type: text
    text: 'Tobiah. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he had prepared for him a large room, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 12:44
    marker-yv: yv-n
  - type: text
    text: 'where previously they had stored the grain offerings, the frankincense, the articles, the tithes of grain, the new wine and oil, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 18:21, 24
    marker-yv: yv-n
  - type: text
    text: 'which were commanded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: given
  - type: text
    text: ' to the Levites and singers and gatekeepers, and the offerings for the priests. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But during all this I was not in Jerusalem, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 5:14–16
    marker-yv: yv-n
  - type: text
    text: 'for in the thirty-second year of Artaxerxes king of Babylon I had returned to the king. Then after certain days I obtained leave from the king, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and I came to Jerusalem and discovered the evil that Eliashib had done for Tobiah, in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 13:1, 5
    marker-yv: yv-n
  - type: text
    text: 'preparing a room for him in the courts of the house of God. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And it grieved me bitterly; therefore I threw all the household goods of Tobiah out of the room. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then I commanded them to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 29:5, 15, 16
    marker-yv: yv-n
  - type: text
    text: cleanse the rooms; and I brought back into them the articles of the house of God, with the grain offering and the frankincense.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I also realized that the portions for the Levites had '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 10:37; Mal. 3:8
    marker-yv: yv-n
  - type: text
    text: 'not been given '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them;
  - type: text
    text: ' for each of the Levites and the singers who did the work had gone back to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 35:2
    marker-yv: yv-n
  - type: text
    text: 'his field. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 13:17, 25
    marker-yv: yv-n
  - type: text
    text: 'I contended with the rulers, and said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 10:39
    marker-yv: yv-n
  - type: text
    text: '“Why is the house of God forsaken?” And I gathered them together and set them in their place. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 10:38; 12:44
    marker-yv: yv-n
  - type: text
    text: 'Then all Judah brought the tithe of the grain and the new wine and the oil to the storehouse. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 31:12
    marker-yv: yv-n
  - type: text
    text: 'And I appointed as treasurers over the storehouse Shelemiah the priest and Zadok the scribe, and of the Levites, Pedaiah; and next to them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Hanan the son of Zaccur, the son of Mattaniah; for they were considered '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 4:2
    marker-yv: yv-n
  - type: text
    text: 'faithful, and their task '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' to distribute to their brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 5:19; 13:22, 31
    marker-yv: yv-n
  - type: text
    text: Remember me, O my God, concerning this, and do not wipe out my good deeds that I have done for the house of my God, and for its services!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'In those days I saw '
  - type: usfm
    marker: it
    children:
    - type: text
      text: people
  - type: text
    text: ' in Judah treading wine presses '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ex. 20:10)
    marker-yv: yv-n
  - type: text
    text: 'on the Sabbath, and bringing in sheaves, and loading donkeys with wine, grapes, figs, and all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: kinds
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' burdens, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 10:31; (Jer. 17:21)
    marker-yv: yv-n
  - type: text
    text: 'which they brought into Jerusalem on the Sabbath day. And I warned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' about the day on which they were selling provisions. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Men of Tyre dwelt there also, who brought in fish and all kinds of goods, and sold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' on the Sabbath to the children of Judah, and in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then I contended with the nobles of Judah, and said to them, “What evil thing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' this that you do, by which you profane the Sabbath day? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezra 9:13; (Jer. 17:21)
    marker-yv: yv-n
  - type: text
    text: Did not your fathers do thus, and did not our God bring all this disaster on us and on this city? Yet you bring added wrath on Israel by profaning the Sabbath.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So it was, at the gates of Jerusalem, as it '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 23:32
    marker-yv: yv-n
  - type: text
    text: 'began to be dark before the Sabbath, that I commanded the gates to be shut, and charged that they must not be opened till after the Sabbath. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 17:21, 22
    marker-yv: yv-n
  - type: text
    text: 'Then I posted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' of my servants at the gates, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' no burdens would be brought in on the Sabbath day. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Now the merchants and sellers of all kinds of wares lodged outside Jerusalem once or twice.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then I warned them, and said to them, “Why do you spend the night around the wall? If you do '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so
  - type: text
    text: ' again, I will lay hands on you!” From that time on they came no '
  - type: usfm
    marker: it
    children:
    - type: text
      text: more
  - type: text
    text: ' on the Sabbath. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And I commanded the Levites that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 15:12; Neh. 12:30
    marker-yv: yv-n
  - type: text
    text: they should cleanse themselves, and that they should go and guard the gates, to sanctify the Sabbath day.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Remember me, O my God, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: concerning
  - type: text
    text: ' this also, and spare me according to the greatness of Your mercy!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'In those days I also saw Jews '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ex. 34:16; Deut. 7:3, 4); Ezra 9:2; Neh. 10:30
    marker-yv: yv-n
  - type: text
    text: 'had married women of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 4:7
    marker-yv: yv-n
  - type: text
    text: 'Ashdod, Ammon, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And half of their children spoke the language of Ashdod, and could not speak the language of Judah, but spoke according to the language of one or the other people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So I '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 28:4
    marker-yv: yv-n
  - type: text
    text: 'contended with them and cursed them, struck some of them and pulled out their hair, and made them '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezra 10:5; Neh. 10:29, 30
    marker-yv: yv-n
  - type: text
    text: 'swear by God, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
  - type: text
    text: ' “You shall not give your daughters as wives to their sons, nor take their daughters for your sons or yourselves. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:1, 2
    marker-yv: yv-n
  - type: text
    text: 'Did not Solomon king of Israel sin by these things? Yet among many nations there was no king like him, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 12:24, 25
    marker-yv: yv-n
  - type: text
    text: 'who was beloved of his God; and God made him king over all Israel. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:4–8
    marker-yv: yv-n
  - type: text
    text: 'Nevertheless pagan women caused even him to sin. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Should we then hear of your doing all this great evil, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ezra 10:2); Neh. 13:23
    marker-yv: yv-n
  - type: text
    text: transgressing against our God by marrying pagan women?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' of the sons '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 12:10, 12
    marker-yv: yv-n
  - type: text
    text: 'of Joiada, the son of Eliashib the high priest, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a son-in-law of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 4:1, 7; 6:1, 2
    marker-yv: yv-n
  - type: text
    text: Sanballat the Horonite; therefore I drove him from me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 6:14
    marker-yv: yv-n
  - type: text
    text: 'Remember them, O my God, because they have defiled the priesthood and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mal. 2:4, 11, 12
    marker-yv: yv-n
  - type: text
    text: the covenant of the priesthood and the Levites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 10:30
    marker-yv: yv-n
  - type: text
    text: 'Thus I cleansed them of everything pagan. I also '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 12:1
    marker-yv: yv-n
  - type: text
    text: 'assigned duties to the priests and the Levites, each to his service, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: bringing
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 10:34
    marker-yv: yv-n
  - type: text
    text: the wood offering and the firstfruits at appointed times.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 13:14, 22
    marker-yv: yv-n
  - type: text
    text: Remember me, O my God, for good!
