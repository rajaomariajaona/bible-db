document_id: NEH.13,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Principles of Separation
  - type: text
    content: 'On that day '
  - type: note
    content: (Deut. 31:11, 12); 2 Kin. 23:2; Neh. 8:3, 8; 9:3; Is. 34:16
  - type: text
    content: 'they read from the Book of Moses in the hearing of the people, and in it was found written '
  - type: note
    content: Deut. 23:3, 4
  - type: text
    content: 'that no Ammonite or Moabite should ever come into the assembly of God, '
  '10':
  - type: text
    content: 'I also realized that the portions for the Levites had '
  - type: note
    content: Neh. 10:37; Mal. 3:8
  - type: text
    content: 'not been given '
  - type: text
    content: them;
  - type: text
    content: ' for each of the Levites and the singers who did the work had gone back to '
  - type: note
    content: Num. 35:2
  - type: text
    content: 'his field. '
  '11':
  - type: text
    content: 'So '
  - type: note
    content: Neh. 13:17, 25
  - type: text
    content: 'I contended with the rulers, and said, '
  - type: note
    content: Neh. 10:39
  - type: text
    content: '“Why is the house of God forsaken?” And I gathered them together and set them in their place. '
  '12':
  - type: note
    content: Neh. 10:38; 12:44
  - type: text
    content: 'Then all Judah brought the tithe of the grain and the new wine and the oil to the storehouse. '
  '13':
  - type: note
    content: 2 Chr. 31:12
  - type: text
    content: 'And I appointed as treasurers over the storehouse Shelemiah the priest and Zadok the scribe, and of the Levites, Pedaiah; and next to them '
  - type: text
    content: was
  - type: text
    content: ' Hanan the son of Zaccur, the son of Mattaniah; for they were considered '
  - type: note
    content: 1 Cor. 4:2
  - type: text
    content: 'faithful, and their task '
  - type: text
    content: was
  - type: text
    content: ' to distribute to their brethren.'
  '14':
  - type: note
    content: Neh. 5:19; 13:22, 31
  - type: text
    content: Remember me, O my God, concerning this, and do not wipe out my good deeds that I have done for the house of my God, and for its services!
  '15':
  - type: text
    content: 'In those days I saw '
  - type: text
    content: people
  - type: text
    content: ' in Judah treading wine presses '
  - type: note
    content: (Ex. 20:10)
  - type: text
    content: 'on the Sabbath, and bringing in sheaves, and loading donkeys with wine, grapes, figs, and all '
  - type: text
    content: kinds
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' burdens, '
  - type: note
    content: Neh. 10:31; (Jer. 17:21)
  - type: text
    content: 'which they brought into Jerusalem on the Sabbath day. And I warned '
  - type: text
    content: them
  - type: text
    content: ' about the day on which they were selling provisions. '
  '16':
  - type: text
    content: 'Men of Tyre dwelt there also, who brought in fish and all kinds of goods, and sold '
  - type: text
    content: them
  - type: text
    content: ' on the Sabbath to the children of Judah, and in Jerusalem.'
  '17':
  - type: text
    content: 'Then I contended with the nobles of Judah, and said to them, “What evil thing '
  - type: text
    content: is
  - type: text
    content: ' this that you do, by which you profane the Sabbath day? '
  '18':
  - type: note
    content: Ezra 9:13; (Jer. 17:21)
  - type: text
    content: Did not your fathers do thus, and did not our God bring all this disaster on us and on this city? Yet you bring added wrath on Israel by profaning the Sabbath.”
  '19':
  - type: text
    content: 'So it was, at the gates of Jerusalem, as it '
  - type: note
    content: Lev. 23:32
  - type: text
    content: 'began to be dark before the Sabbath, that I commanded the gates to be shut, and charged that they must not be opened till after the Sabbath. '
  - type: note
    content: Jer. 17:21, 22
  - type: text
    content: 'Then I posted '
  - type: text
    content: some
  - type: text
    content: ' of my servants at the gates, '
  - type: text
    content: so
  - type: text
    content: ' '
  - type: text
    content: that
  - type: text
    content: ' no burdens would be brought in on the Sabbath day. '
  '2':
  - type: text
    content: 'because they had not met the children of Israel with bread and water, but '
  - type: note
    content: Num. 22:5; Josh. 24:9, 10
  - type: text
    content: 'hired Balaam against them to curse them. '
  - type: note
    content: Num. 23:1; 24:10; Deut. 23:5
  - type: text
    content: 'However, our God turned the curse into a blessing. '
  '20':
  - type: text
    content: Now the merchants and sellers of all kinds of wares lodged outside Jerusalem once or twice.
  '21':
  - type: text
    content: 'Then I warned them, and said to them, “Why do you spend the night around the wall? If you do '
  - type: text
    content: so
  - type: text
    content: ' again, I will lay hands on you!” From that time on they came no '
  - type: text
    content: more
  - type: text
    content: ' on the Sabbath. '
  '22':
  - type: text
    content: 'And I commanded the Levites that '
  - type: note
    content: 1 Chr. 15:12; Neh. 12:30
  - type: text
    content: they should cleanse themselves, and that they should go and guard the gates, to sanctify the Sabbath day.
  - type: text
    content: 'Remember me, O my God, '
  - type: text
    content: concerning
  - type: text
    content: ' this also, and spare me according to the greatness of Your mercy!'
  '23':
  - type: text
    content: 'In those days I also saw Jews '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: note
    content: (Ex. 34:16; Deut. 7:3, 4); Ezra 9:2; Neh. 10:30
  - type: text
    content: 'had married women of '
  - type: note
    content: Neh. 4:7
  - type: text
    content: 'Ashdod, Ammon, '
  - type: text
    content: and
  - type: text
    content: ' Moab. '
  '24':
  - type: text
    content: And half of their children spoke the language of Ashdod, and could not speak the language of Judah, but spoke according to the language of one or the other people.
  '25':
  - type: text
    content: 'So I '
  - type: note
    content: Prov. 28:4
  - type: text
    content: 'contended with them and cursed them, struck some of them and pulled out their hair, and made them '
  - type: note
    content: Ezra 10:5; Neh. 10:29, 30
  - type: text
    content: 'swear by God, '
  - type: text
    content: saying,
  - type: text
    content: ' “You shall not give your daughters as wives to their sons, nor take their daughters for your sons or yourselves. '
  '26':
  - type: note
    content: 1 Kin. 11:1, 2
  - type: text
    content: 'Did not Solomon king of Israel sin by these things? Yet among many nations there was no king like him, '
  - type: note
    content: 2 Sam. 12:24, 25
  - type: text
    content: 'who was beloved of his God; and God made him king over all Israel. '
  - type: note
    content: 1 Kin. 11:4–8
  - type: text
    content: 'Nevertheless pagan women caused even him to sin. '
  '27':
  - type: text
    content: 'Should we then hear of your doing all this great evil, '
  - type: note
    content: (Ezra 10:2); Neh. 13:23
  - type: text
    content: transgressing against our God by marrying pagan women?”
  '28':
  - type: text
    content: 'And '
  - type: text
    content: one
  - type: text
    content: ' of the sons '
  - type: note
    content: Neh. 12:10, 12
  - type: text
    content: 'of Joiada, the son of Eliashib the high priest, '
  - type: text
    content: was
  - type: text
    content: ' a son-in-law of '
  - type: note
    content: Neh. 4:1, 7; 6:1, 2
  - type: text
    content: Sanballat the Horonite; therefore I drove him from me.
  '29':
  - type: note
    content: Neh. 6:14
  - type: text
    content: 'Remember them, O my God, because they have defiled the priesthood and '
  - type: note
    content: Mal. 2:4, 11, 12
  - type: text
    content: the covenant of the priesthood and the Levites.
  '3':
  - type: text
    content: 'So it was, when they had heard the Law, '
  - type: note
    content: Neh. 9:2; 10:28
  - type: text
    content: that they separated all the mixed multitude from Israel.
  - type: heading
    content: The Reforms of Nehemiah
  '30':
  - type: note
    content: Neh. 10:30
  - type: text
    content: 'Thus I cleansed them of everything pagan. I also '
  - type: note
    content: Neh. 12:1
  - type: text
    content: 'assigned duties to the priests and the Levites, each to his service, '
  '31':
  - type: text
    content: 'and '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: bringing
  - type: text
    content: ' '
  - type: note
    content: Neh. 10:34
  - type: text
    content: the wood offering and the firstfruits at appointed times.
  - type: note
    content: Neh. 13:14, 22
  - type: text
    content: Remember me, O my God, for good!
  '4':
  - type: text
    content: 'Now before this, '
  - type: note
    content: Neh. 12:10
  - type: text
    content: 'Eliashib the priest, having authority over the storerooms of the house of our God, '
  - type: text
    content: was
  - type: text
    content: ' allied with '
  - type: note
    content: Neh. 2:10; 4:3; 6:1
  - type: text
    content: 'Tobiah. '
  '5':
  - type: text
    content: 'And he had prepared for him a large room, '
  - type: note
    content: Neh. 12:44
  - type: text
    content: 'where previously they had stored the grain offerings, the frankincense, the articles, the tithes of grain, the new wine and oil, '
  - type: note
    content: Num. 18:21, 24
  - type: text
    content: 'which were commanded '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' '
  - type: text
    content: given
  - type: text
    content: ' to the Levites and singers and gatekeepers, and the offerings for the priests. '
  '6':
  - type: text
    content: 'But during all this I was not in Jerusalem, '
  - type: note
    content: Neh. 5:14–16
  - type: text
    content: 'for in the thirty-second year of Artaxerxes king of Babylon I had returned to the king. Then after certain days I obtained leave from the king, '
  '7':
  - type: text
    content: 'and I came to Jerusalem and discovered the evil that Eliashib had done for Tobiah, in '
  - type: note
    content: Neh. 13:1, 5
  - type: text
    content: 'preparing a room for him in the courts of the house of God. '
  '8':
  - type: text
    content: 'And it grieved me bitterly; therefore I threw all the household goods of Tobiah out of the room. '
  '9':
  - type: text
    content: 'Then I commanded them to '
  - type: note
    content: 2 Chr. 29:5, 15, 16
  - type: text
    content: cleanse the rooms; and I brought back into them the articles of the house of God, with the grain offering and the frankincense.
