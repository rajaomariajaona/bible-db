document_id: JOB.12,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job Answers His Critics
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Job answered and said:'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 17:28)
      marker-yv: yv-n
    - type: text
      text: 'In whose hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the life of every living thing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 27:3; 33:4
      marker-yv: yv-n
    - type: text
      text: breath of all mankind?
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Does not the ear test words
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the mouth taste its food?
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' with aged men,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And with length of days, understanding.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“With Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:4; 36:5
      marker-yv: yv-n
    - type: text
      text: wisdom and strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has counsel and understanding.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 11:10; Is. 25:2
      marker-yv: yv-n
    - type: text
      text: 'He breaks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thing
    - type: text
      text: ' down, it cannot be rebuilt;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: If
    - type: text
      text: ' He imprisons a man, there can be no release.'
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 11:17; (1 Kin. 8:35, 36)
      marker-yv: yv-n
    - type: text
      text: withholds the waters, they dry up;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: If
    - type: text
      text: ' He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 7:11–24
      marker-yv: yv-n
    - type: text
      text: sends them out, they overwhelm the earth.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'With Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' strength and prudence.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The deceived and the deceiver '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' His.'
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He leads counselors away plundered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And makes fools of the judges.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He loosens the bonds of kings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And binds their waist with a belt.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He leads princes away plundered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And overthrows the mighty.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“No doubt you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And wisdom will die with you!
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 32:9
      marker-yv: yv-n
    - type: text
      text: He deprives the trusted ones of speech,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And takes away the discernment of the elders.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 34:19); Ps. 107:40; (Dan. 2:21)
      marker-yv: yv-n
    - type: text
      text: He pours contempt on princes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And disarms the mighty.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 2:22; (1 Cor. 4:5)
      marker-yv: yv-n
    - type: text
      text: uncovers deep things out of darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And brings the shadow of death to light.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 9:3; 26:15
      marker-yv: yv-n
    - type: text
      text: He makes nations great, and destroys them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He enlarges nations, and guides them.
  '24':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He takes away the understanding of the chiefs of the people of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 107:4
      marker-yv: yv-n
    - type: text
      text: makes them wander in a pathless wilderness.
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:14; 15:30; 18:18
      marker-yv: yv-n
    - type: text
      text: They grope in the dark without light,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And He makes them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 107:27
      marker-yv: yv-n
    - type: text
      text: 'stagger like a drunken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But I have understanding as well as you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 13:2
      marker-yv: yv-n
    - type: text
      text: inferior to you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Indeed, who does not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: know
    - type: text
      text: ' such things as these?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 21:3
      marker-yv: yv-n
    - type: text
      text: ' am one mocked by his friends,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 91:15
      marker-yv: yv-n
    - type: text
      text: called on God, and He answered him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The just and blameless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' ridiculed.'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A lamp is despised in the thought of one who is at ease;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' made ready for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 14:2
      marker-yv: yv-n
    - type: text
      text: those whose feet slip.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 9:24; 21:6–16; Ps. 73:12; Jer. 12:1; Mal. 3:15)
      marker-yv: yv-n
    - type: text
      text: The tents of robbers prosper,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And those who provoke God are secure—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In what God provides by His hand.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But now ask the beasts, and they will teach you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the birds of the air, and they will tell you;
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or speak to the earth, and it will teach you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the fish of the sea will explain to you.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who among all these does not know
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That the hand of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done this,'
