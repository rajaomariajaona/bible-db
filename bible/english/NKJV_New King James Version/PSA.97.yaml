document_id: PSA.97,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'A Song of Praise to the Sovereign '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 96:10)
      marker-yv: yv-n
    - type: text
      text: reigns;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the earth rejoice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the multitude of isles be glad!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'You who love the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 34:14; Prov. 8:13; Amos 5:15; Rom. 12:9)
      marker-yv: yv-n
    - type: text
      text: hate evil!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 31:23; 145:20; Prov. 2:8
      marker-yv: yv-n
    - type: text
      text: He preserves the souls of His saints;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:40; Jer. 15:21; Dan. 3:28
      marker-yv: yv-n
    - type: text
      text: He delivers them out of the hand of the wicked.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 22:28; Ps. 112:4; Prov. 4:18
      marker-yv: yv-n
    - type: text
      text: Light is sown for the righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And gladness for the upright in heart.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 33:1
      marker-yv: yv-n
    - type: text
      text: 'Rejoice in the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you righteous,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 30:4
      marker-yv: yv-n
    - type: text
      text: And give thanks at the remembrance of His holy name.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:9; Deut. 4:11; 1 Kin. 8:12; Ps. 18:11
      marker-yv: yv-n
    - type: text
      text: Clouds and darkness surround Him;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 89:14)
      marker-yv: yv-n
    - type: text
      text: 'Righteousness and justice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the foundation of His throne.'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 18:8; Dan. 7:10; Hab. 3:5
      marker-yv: yv-n
    - type: text
      text: A fire goes before Him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And burns up His enemies round about.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:18
      marker-yv: yv-n
    - type: text
      text: His lightnings light the world;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The earth sees and trembles.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 46:6; Amos 9:5; Mic. 1:4; Nah. 1:5
      marker-yv: yv-n
    - type: text
      text: 'The mountains melt like wax at the presence of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At the presence of the Lord of the whole earth.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 19:1
      marker-yv: yv-n
    - type: text
      text: The heavens declare His righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the peoples see His glory.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 20:4)
      marker-yv: yv-n
    - type: text
      text: Let all be put to shame who serve carved images,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who boast of idols.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 1:6)
      marker-yv: yv-n
    - type: text
      text: 'Worship Him, all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' gods.'
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Zion hears and is glad,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the daughters of Judah rejoice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because of Your judgments, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For You, '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 83:18
      marker-yv: yv-n
    - type: text
      text: most high above all the earth;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 18:11; Ps. 95:3; 96:4
      marker-yv: yv-n
    - type: text
      text: You are exalted far above all gods.
