document_id: PSA.97,114
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Praise to the Sovereign Lord
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: (Ps. 96:10)
  - type: text
    content: reigns;
  - type: text
    content: Let the earth rejoice;
  - type: text
    content: Let the multitude of isles be glad!
  '10':
  - type: text
    content: 'You who love the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: (Ps. 34:14; Prov. 8:13; Amos 5:15; Rom. 12:9)
  - type: text
    content: hate evil!
  - type: note
    content: Ps. 31:23; 145:20; Prov. 2:8
  - type: text
    content: He preserves the souls of His saints;
  - type: note
    content: Ps. 37:40; Jer. 15:21; Dan. 3:28
  - type: text
    content: He delivers them out of the hand of the wicked.
  '11':
  - type: note
    content: Job 22:28; Ps. 112:4; Prov. 4:18
  - type: text
    content: Light is sown for the righteous,
  - type: text
    content: And gladness for the upright in heart.
  '12':
  - type: note
    content: Ps. 33:1
  - type: text
    content: 'Rejoice in the '
  - type: heading
    content: Lord
  - type: text
    content: ', you righteous,'
  - type: note
    content: Ps. 30:4
  - type: text
    content: And give thanks at the remembrance of His holy name.
  '2':
  - type: note
    content: Ex. 19:9; Deut. 4:11; 1 Kin. 8:12; Ps. 18:11
  - type: text
    content: Clouds and darkness surround Him;
  - type: note
    content: (Ps. 89:14)
  - type: text
    content: 'Righteousness and justice '
  - type: text
    content: are
  - type: text
    content: ' the foundation of His throne.'
  '3':
  - type: note
    content: Ps. 18:8; Dan. 7:10; Hab. 3:5
  - type: text
    content: A fire goes before Him,
  - type: text
    content: And burns up His enemies round about.
  '4':
  - type: note
    content: Ex. 19:18
  - type: text
    content: His lightnings light the world;
  - type: text
    content: The earth sees and trembles.
  '5':
  - type: note
    content: Ps. 46:6; Amos 9:5; Mic. 1:4; Nah. 1:5
  - type: text
    content: 'The mountains melt like wax at the presence of the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: At the presence of the Lord of the whole earth.
  '6':
  - type: note
    content: Ps. 19:1
  - type: text
    content: The heavens declare His righteousness,
  - type: text
    content: And all the peoples see His glory.
  '7':
  - type: note
    content: (Ex. 20:4)
  - type: text
    content: Let all be put to shame who serve carved images,
  - type: text
    content: Who boast of idols.
  - type: note
    content: (Heb. 1:6)
  - type: text
    content: 'Worship Him, all '
  - type: text
    content: you
  - type: text
    content: ' gods.'
  '8':
  - type: text
    content: Zion hears and is glad,
  - type: text
    content: And the daughters of Judah rejoice
  - type: text
    content: 'Because of Your judgments, O '
  - type: heading
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: 'For You, '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: text
    content: are
  - type: text
    content: ' '
  - type: note
    content: Ps. 83:18
  - type: text
    content: most high above all the earth;
  - type: note
    content: Ex. 18:11; Ps. 95:3; 96:4
  - type: text
    content: You are exalted far above all gods.
