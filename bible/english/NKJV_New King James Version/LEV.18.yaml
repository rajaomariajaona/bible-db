document_id: LEV.18,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws of Sexual Morality
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'The nakedness of your son’s daughter or your daughter’s daughter, their nakedness you shall not uncover; for theirs is your own nakedness. '
  '11':
  - type: text
    content: 'The nakedness of your father’s wife’s daughter, begotten by your father—she is your sister—you shall not uncover her nakedness. '
  '12':
  - type: note
    content: Lev. 20:19
  - type: text
    content: 'You shall not uncover the nakedness of your father’s sister; she is near of kin to your father. '
  '13':
  - type: text
    content: 'You shall not uncover the nakedness of your mother’s sister, for she is near of kin to your mother. '
  '14':
  - type: note
    content: Lev. 20:20
  - type: text
    content: 'You shall not uncover the nakedness of your father’s brother. You shall not approach his wife; she is your aunt. '
  '15':
  - type: text
    content: 'You shall not uncover the nakedness of your daughter-in-law—she is your son’s wife—you shall not uncover her nakedness. '
  '16':
  - type: text
    content: 'You shall not uncover the nakedness of your brother’s wife; it is your brother’s nakedness. '
  '17':
  - type: text
    content: 'You shall not uncover the nakedness of a woman and her '
  - type: note
    content: Lev. 20:14
  - type: text
    content: 'daughter, nor shall you take her son’s daughter or her daughter’s daughter, to uncover her nakedness. They are near of kin to her. It is wickedness. '
  '18':
  - type: text
    content: 'Nor shall you take a woman '
  - type: note
    content: 1 Sam. 1:6, 8
  - type: text
    content: as a rival to her sister, to uncover her nakedness while the other is alive.
  '19':
  - type: text
    content: '‘Also you shall not approach a woman to uncover her nakedness as '
  - type: note
    content: Ezek. 18:6
  - type: text
    content: 'long as she is in her '
  - type: note
    content: Lev. 15:24; 20:18
  - type: text
    content: 'customary impurity. '
  '2':
  - type: text
    content: '“Speak to the children of Israel, and say to them: '
  - type: note
    content: Ex. 6:7; Lev. 11:44, 45; 19:3; Ezek. 20:5, 7, 19, 20
  - type: text
    content: '‘I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. '
  '20':
  - type: note
    content: (Prov. 6:25–33)
  - type: text
    content: 'Moreover you shall not lie carnally with your '
  - type: note
    content: Ex. 20:14; Lev. 20:10; (Matt. 5:27, 28; 1 Cor. 6:9; Heb. 13:4)
  - type: text
    content: 'neighbor’s wife, to defile yourself with her. '
  '21':
  - type: text
    content: 'And you shall not let any of your descendants '
  - type: note
    content: Lev. 20:2–5; Deut. 12:31
  - type: text
    content: 'pass through '
  - type: note
    content: 2 Kin. 16:3
  - type: text
    content: 'the fire to '
  - type: note
    content: 1 Kin. 11:7, 33; Acts 7:43
  - type: text
    content: 'Molech, nor shall you profane the name of your God: I am the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'You shall not lie with '
  - type: note
    content: Lev. 20:13; Rom. 1:27
  - type: text
    content: 'a male as with a woman. It is an abomination. '
  '23':
  - type: text
    content: 'Nor shall you mate with any '
  - type: note
    content: Ex. 22:19; Lev. 20:15, 16; Deut. 27:21
  - type: text
    content: animal, to defile yourself with it. Nor shall any woman stand before an animal to mate with it. It is perversion.
  '24':
  - type: note
    content: Matt. 15:18–20; 1 Cor. 3:17
  - type: text
    content: '‘Do not defile yourselves with any of these things; '
  - type: note
    content: Lev. 18:3; 20:23; Deut. 18:12
  - type: text
    content: 'for by all these the nations are defiled, which I am casting out before you. '
  '25':
  - type: text
    content: 'For '
  - type: note
    content: Num. 35:33, 34; Ezek. 36:17
  - type: text
    content: 'the land is defiled; therefore I '
  - type: note
    content: Is. 26:21; Jer. 5:9
  - type: text
    content: 'visit the punishment of its iniquity upon it, and the land '
  - type: note
    content: Lev. 18:28; 20:22
  - type: text
    content: 'vomits out its inhabitants. '
  '26':
  - type: note
    content: Lev. 18:5, 30
  - type: text
    content: 'You shall therefore keep My statutes and My judgments, and shall not commit any of these abominations, either any of your own nation or any stranger who dwells among you '
  '27':
  - type: text
    content: '(for all these abominations the men of the land have done, who were before you, and thus the land is defiled), '
  '28':
  - type: text
    content: 'lest '
  - type: note
    content: Jer. 9:19
  - type: text
    content: 'the land vomit you out also when you defile it, as it vomited out the nations that were before you. '
  '29':
  - type: text
    content: For whoever commits any of these abominations, the persons who commit them shall be cut off from among their people.
  '3':
  - type: note
    content: Josh. 24:14; Ezek. 20:7, 8
  - type: text
    content: 'According to the doings of the land of Egypt, where you dwelt, you shall not do; and '
  - type: note
    content: Ex. 23:24; Lev. 18:24–30; 20:23; Deut. 12:30, 31
  - type: text
    content: 'according to the doings of the land of Canaan, where I am bringing you, you shall not do; nor shall you walk in their ordinances. '
  '30':
  - type: text
    content: '‘Therefore you shall keep My ordinance, so '
  - type: note
    content: Lev. 18:3; 22:9
  - type: text
    content: 'that you do not commit any of these abominable customs which were committed before you, and that you do not defile yourselves by them: '
  - type: note
    content: Lev. 18:2
  - type: text
    content: 'I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.’ ”'
  '4':
  - type: note
    content: Ezek. 20:19
  - type: text
    content: 'You shall observe My judgments and keep My ordinances, to walk in them: I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. '
  '5':
  - type: text
    content: 'You shall therefore keep My statutes and My judgments, which if a man does, he shall live by them: I am the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: '‘None of you shall approach anyone who is near of kin to him, to uncover his nakedness: I am the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'The nakedness of your father or the nakedness of your mother you shall not uncover. She is your mother; you shall not uncover her nakedness. '
  '8':
  - type: text
    content: 'The nakedness of your '
  - type: note
    content: Gen. 35:22
  - type: text
    content: 'father’s wife you shall not uncover; it is your father’s nakedness. '
  '9':
  - type: note
    content: Lev. 18:11; 20:17; Deut. 27:22
  - type: text
    content: 'The nakedness of your sister, the daughter of your father, or the daughter of your mother, whether born at home or elsewhere, their nakedness you shall not uncover. '
