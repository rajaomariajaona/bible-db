document_id: 2KI.24,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah Overrun by Enemies
  - type: text
    content: 'In '
  - type: note
    content: 2 Chr. 36:6; Jer. 25:1, 9; Dan. 1:1
  - type: text
    content: 'his days Nebuchadnezzar king of '
  - type: note
    content: 2 Kin. 20:14
  - type: text
    content: 'Babylon came up, and Jehoiakim became his vassal '
  - type: text
    content: for
  - type: text
    content: ' three years. Then he turned and rebelled against him. '
  '10':
  - type: note
    content: Dan. 1:1
  - type: text
    content: 'At that time the servants of Nebuchadnezzar king of Babylon came up against Jerusalem, and the city was besieged. '
  '11':
  - type: text
    content: 'And Nebuchadnezzar king of Babylon came against the city, as his servants were besieging it. '
  '12':
  - type: note
    content: Jer. 22:24–30; 24:1; 29:1, 2; Ezek. 17:12
  - type: text
    content: 'Then Jehoiachin king of Judah, his mother, his servants, his princes, and his officers went out to the king of Babylon; and the king of Babylon, '
  - type: note
    content: 2 Chr. 36:10
  - type: text
    content: in the eighth year of his reign, took him prisoner.
  - type: heading
    content: The Captivity of Jerusalem
  '13':
  - type: note
    content: 2 Kin. 20:17; Is. 39:6
  - type: text
    content: 'And he carried out from there all the treasures of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and the treasures of the king’s house, and he '
  - type: note
    content: Dan. 5:2, 3
  - type: text
    content: 'cut in pieces all the articles of gold which Solomon king of Israel had made in the temple of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Jer. 20:5
  - type: text
    content: 'as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had said. '
  '14':
  - type: text
    content: 'Also '
  - type: note
    content: Is. 3:2, 3; Jer. 24:1
  - type: text
    content: 'he carried into captivity all Jerusalem: all the captains and all the mighty men of valor, '
  - type: note
    content: 2 Kin. 24:16; Jer. 52:28
  - type: text
    content: 'ten thousand captives, and '
  - type: note
    content: 1 Sam. 13:19
  - type: text
    content: 'all the craftsmen and smiths. None remained except '
  - type: note
    content: 2 Kin. 25:12
  - type: text
    content: 'the poorest people of the land. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: 2 Chr. 36:10; Esth. 2:6; Jer. 22:24–28; Ezek. 17:12
  - type: text
    content: 'he carried Jehoiachin captive to Babylon. The king’s mother, the king’s wives, his officers, and the mighty of the land he carried into captivity from Jerusalem to Babylon. '
  '16':
  - type: note
    content: Jer. 52:28
  - type: text
    content: 'All the valiant men, seven thousand, and craftsmen and smiths, one thousand, all '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' strong '
  - type: text
    content: and
  - type: text
    content: ' fit for war, these the king of Babylon brought captive to Babylon.'
  - type: heading
    content: Zedekiah Reigns in Judah
  '17':
  - type: text
    content: 'Then '
  - type: note
    content: Jer. 37:1
  - type: text
    content: 'the king of Babylon made Mattaniah, '
  - type: note
    content: 1 Chr. 3:15; 2 Chr. 36:10
  - type: text
    content: 'Jehoiachin’s uncle, king in his place, and '
  - type: note
    content: 2 Chr. 36:4
  - type: text
    content: changed his name to Zedekiah.
  '18':
  - type: note
    content: 2 Chr. 36:11; Jer. 52:1
  - type: text
    content: 'Zedekiah '
  - type: text
    content: was
  - type: text
    content: ' twenty-one years old when he became king, and he reigned eleven years in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: 2 Kin. 23:31
  - type: text
    content: 'Hamutal the daughter of Jeremiah of Libnah. '
  '19':
  - type: note
    content: 2 Chr. 36:12
  - type: text
    content: 'He also did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', according to all that Jehoiakim had done. '
  '2':
  - type: note
    content: Jer. 25:9; 32:28; 35:11; Ezek. 19:8
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' sent against him '
  - type: text
    content: raiding
  - type: text
    content: ' bands of Chaldeans, bands of Syrians, bands of Moabites, and bands of the people of Ammon; He sent them against Judah to destroy it, '
  - type: note
    content: 2 Kin. 20:17; 21:12–14; 23:27
  - type: text
    content: 'according to the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He had spoken by His servants the prophets. '
  '20':
  - type: text
    content: 'For because of the anger of the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: this
  - type: text
    content: ' happened in Jerusalem and Judah, that He finally cast them out from His presence. '
  - type: note
    content: 2 Chr. 36:13; Ezek. 17:15
  - type: text
    content: Then Zedekiah rebelled against the king of Babylon.
  '3':
  - type: text
    content: 'Surely at the commandment of the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: this
  - type: text
    content: ' came upon Judah, to remove '
  - type: text
    content: them
  - type: text
    content: ' from His sight '
  - type: note
    content: 2 Kin. 21:2, 11; 23:26
  - type: text
    content: 'because of the sins of Manasseh, according to all that he had done, '
  '4':
  - type: note
    content: 2 Kin. 21:16
  - type: text
    content: 'and also because of the innocent blood that he had shed; for he had filled Jerusalem with innocent blood, which the '
  - type: heading
    content: Lord
  - type: text
    content: ' would not pardon.'
  '5':
  - type: text
    content: 'Now the rest of the acts of Jehoiakim, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '6':
  - type: note
    content: 2 Chr. 36:6, 8; Jer. 22:18, 19
  - type: text
    content: So Jehoiakim rested with his fathers. Then Jehoiachin his son reigned in his place.
  '7':
  - type: text
    content: 'And '
  - type: note
    content: Jer. 37:5–7
  - type: text
    content: 'the king of Egypt did not come out of his land anymore, for '
  - type: note
    content: Jer. 46:2
  - type: text
    content: the king of Babylon had taken all that belonged to the king of Egypt from the Brook of Egypt to the River Euphrates.
  - type: heading
    content: The Reign and Captivity of Jehoiachin
  '8':
  - type: note
    content: 1 Chr. 3:16; 2 Chr. 36:9
  - type: text
    content: 'Jehoiachin '
  - type: text
    content: was
  - type: text
    content: ' eighteen years old when he became king, and he reigned in Jerusalem three months. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Nehushta the daughter of Elnathan of Jerusalem. '
  '9':
  - type: text
    content: 'And he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', according to all that his father had done.'
