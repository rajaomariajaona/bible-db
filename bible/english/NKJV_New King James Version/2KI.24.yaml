segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judah Overrun by Enemies
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 36:6; Jer. 25:1, 9; Dan. 1:1
    marker-yv: yv-n
  - type: text
    text: 'his days Nebuchadnezzar king of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 20:14
    marker-yv: yv-n
  - type: text
    text: 'Babylon came up, and Jehoiakim became his vassal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for
  - type: text
    text: ' three years. Then he turned and rebelled against him. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 25:9; 32:28; 35:11; Ezek. 19:8
    marker-yv: yv-n
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sent against him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: raiding
  - type: text
    text: ' bands of Chaldeans, bands of Syrians, bands of Moabites, and bands of the people of Ammon; He sent them against Judah to destroy it, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 20:17; 21:12–14; 23:27
    marker-yv: yv-n
  - type: text
    text: 'according to the word of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' which He had spoken by His servants the prophets. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Surely at the commandment of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' came upon Judah, to remove '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' from His sight '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 21:2, 11; 23:26
    marker-yv: yv-n
  - type: text
    text: 'because of the sins of Manasseh, according to all that he had done, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 21:16
    marker-yv: yv-n
  - type: text
    text: 'and also because of the innocent blood that he had shed; for he had filled Jerusalem with innocent blood, which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' would not pardon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now the rest of the acts of Jehoiakim, and all that he did, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' they not written in the book of the chronicles of the kings of Judah? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 36:6, 8; Jer. 22:18, 19
    marker-yv: yv-n
  - type: text
    text: So Jehoiakim rested with his fathers. Then Jehoiachin his son reigned in his place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 37:5–7
    marker-yv: yv-n
  - type: text
    text: 'the king of Egypt did not come out of his land anymore, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 46:2
    marker-yv: yv-n
  - type: text
    text: the king of Babylon had taken all that belonged to the king of Egypt from the Brook of Egypt to the River Euphrates.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Reign and Captivity of Jehoiachin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 3:16; 2 Chr. 36:9
    marker-yv: yv-n
  - type: text
    text: 'Jehoiachin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' eighteen years old when he became king, and he reigned in Jerusalem three months. His mother’s name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Nehushta the daughter of Elnathan of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he did evil in the sight of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', according to all that his father had done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 1:1
    marker-yv: yv-n
  - type: text
    text: 'At that time the servants of Nebuchadnezzar king of Babylon came up against Jerusalem, and the city was besieged. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Nebuchadnezzar king of Babylon came against the city, as his servants were besieging it. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 22:24–30; 24:1; 29:1, 2; Ezek. 17:12
    marker-yv: yv-n
  - type: text
    text: 'Then Jehoiachin king of Judah, his mother, his servants, his princes, and his officers went out to the king of Babylon; and the king of Babylon, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 36:10
    marker-yv: yv-n
  - type: text
    text: in the eighth year of his reign, took him prisoner.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Captivity of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 20:17; Is. 39:6
    marker-yv: yv-n
  - type: text
    text: 'And he carried out from there all the treasures of the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and the treasures of the king’s house, and he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 5:2, 3
    marker-yv: yv-n
  - type: text
    text: 'cut in pieces all the articles of gold which Solomon king of Israel had made in the temple of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 20:5
    marker-yv: yv-n
  - type: text
    text: 'as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had said. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Also '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 3:2, 3; Jer. 24:1
    marker-yv: yv-n
  - type: text
    text: 'he carried into captivity all Jerusalem: all the captains and all the mighty men of valor, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 24:16; Jer. 52:28
    marker-yv: yv-n
  - type: text
    text: 'ten thousand captives, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 13:19
    marker-yv: yv-n
  - type: text
    text: 'all the craftsmen and smiths. None remained except '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:12
    marker-yv: yv-n
  - type: text
    text: 'the poorest people of the land. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 36:10; Esth. 2:6; Jer. 22:24–28; Ezek. 17:12
    marker-yv: yv-n
  - type: text
    text: 'he carried Jehoiachin captive to Babylon. The king’s mother, the king’s wives, his officers, and the mighty of the land he carried into captivity from Jerusalem to Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 52:28
    marker-yv: yv-n
  - type: text
    text: 'All the valiant men, seven thousand, and craftsmen and smiths, one thousand, all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fit for war, these the king of Babylon brought captive to Babylon.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zedekiah Reigns in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 37:1
    marker-yv: yv-n
  - type: text
    text: 'the king of Babylon made Mattaniah, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 3:15; 2 Chr. 36:10
    marker-yv: yv-n
  - type: text
    text: 'Jehoiachin’s uncle, king in his place, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 36:4
    marker-yv: yv-n
  - type: text
    text: changed his name to Zedekiah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 36:11; Jer. 52:1
    marker-yv: yv-n
  - type: text
    text: 'Zedekiah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' twenty-one years old when he became king, and he reigned eleven years in Jerusalem. His mother’s name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 23:31
    marker-yv: yv-n
  - type: text
    text: 'Hamutal the daughter of Jeremiah of Libnah. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 36:12
    marker-yv: yv-n
  - type: text
    text: 'He also did evil in the sight of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', according to all that Jehoiakim had done. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For because of the anger of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' happened in Jerusalem and Judah, that He finally cast them out from His presence. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 36:13; Ezek. 17:15
    marker-yv: yv-n
  - type: text
    text: Then Zedekiah rebelled against the king of Babylon.
