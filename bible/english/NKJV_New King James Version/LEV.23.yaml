document_id: LEV.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Feasts of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Speak to the children of Israel, and say to them: ‘The feasts of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', which you shall proclaim to be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 12:16
    marker-yv: yv-n
  - type: text
    text: holy convocations, these are My feasts.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sabbath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 20:9; 23:12; 31:15; Lev. 19:3; Deut. 5:13, 14; Luke 13:14
    marker-yv: yv-n
  - type: text
    text: '‘Six days shall work be done, but the seventh day is a Sabbath of solemn rest, a holy convocation. You shall do no work on it; it is the Sabbath of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in all your dwellings.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Passover and Unleavened Bread
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:14–16; Lev. 23:2, 37
    marker-yv: yv-n
  - type: text
    text: '‘These are the feasts of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', holy convocations which you shall proclaim at their appointed times. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 12:1–28; Num. 9:1–5; 28:16–25; Deut. 16:1–8; Josh. 5:10
    marker-yv: yv-n
  - type: text
    text: 'On the fourteenth day of the first month at twilight is the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Passover. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And on the fifteenth day of the same month is the Feast of Unleavened Bread to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '; seven days you must eat unleavened bread. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 12:16; Num. 28:18, 25
    marker-yv: yv-n
  - type: text
    text: 'On the first day you shall have a holy convocation; you shall do no customary work on it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But you shall offer an offering made by fire to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for seven days. The seventh day shall be a holy convocation; you shall do no customary work on it.’ ”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Feast of Firstfruits
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Speak to the children of Israel, and say to them: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:19; 34:26
    marker-yv: yv-n
  - type: text
    text: '‘When you come into the land which I give to you, and reap its harvest, then you shall bring a sheaf of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 11:16); James 1:18; Rev. 14:4
    marker-yv: yv-n
  - type: text
    text: 'the firstfruits of your harvest to the priest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:24
    marker-yv: yv-n
  - type: text
    text: 'wave the sheaf before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', to be accepted on your behalf; on the day after the Sabbath the priest shall wave it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And you shall offer on that day, when you wave the sheaf, a male lamb of the first year, without blemish, as a burnt offering to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Its grain offering shall be two-tenths of an ephah of fine flour mixed with oil, an offering made by fire to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for a sweet aroma; and its drink offering shall be of wine, one-fourth of a hin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You shall eat neither bread nor parched grain nor fresh grain until the same day that you have brought an offering to your God; it shall be a statute forever throughout your generations in all your dwellings.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Feast of Weeks
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '‘And you shall count for yourselves from the day after the Sabbath, from the day that you brought the sheaf of the wave offering: seven Sabbaths shall be completed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Count '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 2:1
    marker-yv: yv-n
  - type: text
    text: 'fifty days to the day after the seventh Sabbath; then you shall offer '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 28:26
    marker-yv: yv-n
  - type: text
    text: 'a new grain offering to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'You shall bring from your dwellings two wave loaves of two-tenths of an ephah. They shall be of fine flour; they shall be baked with leaven. They are '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:16, 19; Num. 15:17–21
    marker-yv: yv-n
  - type: text
    text: 'the firstfruits to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And you shall offer with the bread seven lambs of the first year, without blemish, one young bull, and two rams. They shall be as a burnt offering to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', with their grain offering and their drink offerings, an offering made by fire for a sweet aroma to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then you shall sacrifice '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 4:23, 28; Num. 28:30; (2 Cor. 5:21)
    marker-yv: yv-n
  - type: text
    text: 'one kid of the goats as a sin offering, and two male lambs of the first year as a sacrifice of a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 3:1
    marker-yv: yv-n
  - type: text
    text: 'peace offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The priest shall wave them with the bread of the firstfruits as a wave offering before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', with the two lambs. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 14:13; Num. 18:12; Deut. 18:4
    marker-yv: yv-n
  - type: text
    text: 'They shall be holy to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for the priest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And you shall proclaim on the same day that it is a holy convocation to you. You shall do no customary work on it. It shall be a statute forever in all your dwellings throughout your generations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 19:9, 10; Deut. 24:19–22; Ruth 2:2, 15
    marker-yv: yv-n
  - type: text
    text: '‘When you reap the harvest of your land, you shall not wholly reap the corners of your field when you reap, nor shall you gather any gleaning from your harvest. You shall leave them for the poor and for the stranger: I am the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.’ ”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Feast of Trumpets
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“Speak to the children of Israel, saying: ‘In the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 29:1
    marker-yv: yv-n
  - type: text
    text: 'seventh month, on the first day of the month, you shall have a sabbath-rest, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 25:9
    marker-yv: yv-n
  - type: text
    text: 'a memorial of blowing of trumpets, a holy convocation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'You shall do no customary work on it; and you shall offer an offering made by fire to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: .’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Day of Atonement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 16:1–34; 25:9; Num. 29:7
    marker-yv: yv-n
  - type: text
    text: '“Also the tenth day of this seventh month shall be the Day of Atonement. It shall be a holy convocation for you; you shall afflict your souls, and offer an offering made by fire to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And you shall do no work on that same day, for it is the Day of Atonement, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 16:34
    marker-yv: yv-n
  - type: text
    text: 'to make atonement for you before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'For any person who is not '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 22:12; Jer. 31:9; Ezek. 7:16
    marker-yv: yv-n
  - type: text
    text: 'afflicted in soul on that same day '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 17:14; Lev. 13:46; Num. 5:2
    marker-yv: yv-n
  - type: text
    text: 'shall be cut off from his people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And any person who does any work on that same day, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 20:3–6
    marker-yv: yv-n
  - type: text
    text: 'that person I will destroy from among his people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'You shall do no manner of work; it shall be a statute forever throughout your generations in all your dwellings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: It shall be to you a sabbath of solemn rest, and you shall afflict your souls; on the ninth day of the month at evening, from evening to evening, you shall celebrate your sabbath.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Feast of Tabernacles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '“Speak to the children of Israel, saying: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:16; Num. 29:12; Deut. 16:13–16; Ezra 3:4; Neh. 8:14; Zech. 14:16–19; John 7:2
    marker-yv: yv-n
  - type: text
    text: '‘The fifteenth day of this seventh month shall be the Feast of Tabernacles for seven days to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'On the first day there shall be a holy convocation. You shall do no customary work on it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'For seven days you shall offer an '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 29:12–34
    marker-yv: yv-n
  - type: text
    text: 'offering made by fire to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 29:35–38; Neh. 8:18; John 7:37
    marker-yv: yv-n
  - type: text
    text: 'On the eighth day you shall have a holy convocation, and you shall offer an offering made by fire to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. It is a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 16:8; 2 Chr. 7:8
    marker-yv: yv-n
  - type: text
    text: sacred assembly, and you shall do no customary work on it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 23:2, 4
    marker-yv: yv-n
  - type: text
    text: '‘These are the feasts of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' which you shall proclaim to be holy convocations, to offer an offering made by fire to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', a burnt offering and a grain offering, a sacrifice and drink offerings, everything on its day— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 29:39
    marker-yv: yv-n
  - type: text
    text: 'besides the Sabbaths of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', besides your gifts, besides all your vows, and besides all your freewill offerings which you give to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '‘Also on the fifteenth day of the seventh month, when you have '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:16; Deut. 16:13
    marker-yv: yv-n
  - type: text
    text: 'gathered in the fruit of the land, you shall keep the feast of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for seven days; on the first day there shall be a sabbath-rest, and on the eighth day a sabbath-rest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 8:15
    marker-yv: yv-n
  - type: text
    text: 'you shall take for yourselves on the first day the fruit of beautiful trees, branches of palm trees, the boughs of leafy trees, and willows of the brook; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 12:7; 16:14, 15
    marker-yv: yv-n
  - type: text
    text: 'and you shall rejoice before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God for seven days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 29:12; Neh. 8:18
    marker-yv: yv-n
  - type: text
    text: 'You shall keep it as a feast to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for seven days in the year. It shall be a statute forever in your generations. You shall celebrate it in the seventh month. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 4:6)
    marker-yv: yv-n
  - type: text
    text: 'You shall dwell in booths for seven days. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 8:14–16
    marker-yv: yv-n
  - type: text
    text: 'All who are native Israelites shall dwell in booths, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 13:14; Deut. 31:13; Ps. 78:5
    marker-yv: yv-n
  - type: text
    text: 'that your generations may '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 10:2
    marker-yv: yv-n
  - type: text
    text: 'know that I made the children of Israel dwell in booths when '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 22:33
