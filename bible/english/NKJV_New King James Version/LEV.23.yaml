document_id: LEV.23,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Feasts of the Lord
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: '“Speak to the children of Israel, and say to them: '
  - type: note
    content: Ex. 23:19; 34:26
  - type: text
    content: '‘When you come into the land which I give to you, and reap its harvest, then you shall bring a sheaf of '
  - type: note
    content: (Rom. 11:16); James 1:18; Rev. 14:4
  - type: text
    content: 'the firstfruits of your harvest to the priest. '
  '11':
  - type: text
    content: 'He shall '
  - type: note
    content: Ex. 29:24
  - type: text
    content: 'wave the sheaf before the '
  - type: heading
    content: Lord
  - type: text
    content: ', to be accepted on your behalf; on the day after the Sabbath the priest shall wave it. '
  '12':
  - type: text
    content: 'And you shall offer on that day, when you wave the sheaf, a male lamb of the first year, without blemish, as a burnt offering to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Its grain offering shall be two-tenths of an ephah of fine flour mixed with oil, an offering made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: ', for a sweet aroma; and its drink offering shall be of wine, one-fourth of a hin. '
  '14':
  - type: text
    content: You shall eat neither bread nor parched grain nor fresh grain until the same day that you have brought an offering to your God; it shall be a statute forever throughout your generations in all your dwellings.
  - type: heading
    content: The Feast of Weeks
  '15':
  - type: text
    content: '‘And you shall count for yourselves from the day after the Sabbath, from the day that you brought the sheaf of the wave offering: seven Sabbaths shall be completed. '
  '16':
  - type: text
    content: 'Count '
  - type: note
    content: Acts 2:1
  - type: text
    content: 'fifty days to the day after the seventh Sabbath; then you shall offer '
  - type: note
    content: Num. 28:26
  - type: text
    content: 'a new grain offering to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'You shall bring from your dwellings two wave loaves of two-tenths of an ephah. They shall be of fine flour; they shall be baked with leaven. They are '
  - type: note
    content: Ex. 23:16, 19; Num. 15:17–21
  - type: text
    content: 'the firstfruits to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'And you shall offer with the bread seven lambs of the first year, without blemish, one young bull, and two rams. They shall be as a burnt offering to the '
  - type: heading
    content: Lord
  - type: text
    content: ', with their grain offering and their drink offerings, an offering made by fire for a sweet aroma to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Then you shall sacrifice '
  - type: note
    content: Lev. 4:23, 28; Num. 28:30; (2 Cor. 5:21)
  - type: text
    content: 'one kid of the goats as a sin offering, and two male lambs of the first year as a sacrifice of a '
  - type: note
    content: Lev. 3:1
  - type: text
    content: 'peace offering. '
  '2':
  - type: text
    content: '“Speak to the children of Israel, and say to them: ‘The feasts of the '
  - type: heading
    content: Lord
  - type: text
    content: ', which you shall proclaim to be '
  - type: note
    content: Ex. 12:16
  - type: text
    content: holy convocations, these are My feasts.
  - type: heading
    content: The Sabbath
  '20':
  - type: text
    content: 'The priest shall wave them with the bread of the firstfruits as a wave offering before the '
  - type: heading
    content: Lord
  - type: text
    content: ', with the two lambs. '
  - type: note
    content: Lev. 14:13; Num. 18:12; Deut. 18:4
  - type: text
    content: 'They shall be holy to the '
  - type: heading
    content: Lord
  - type: text
    content: ' for the priest. '
  '21':
  - type: text
    content: And you shall proclaim on the same day that it is a holy convocation to you. You shall do no customary work on it. It shall be a statute forever in all your dwellings throughout your generations.
  '22':
  - type: note
    content: Lev. 19:9, 10; Deut. 24:19–22; Ruth 2:2, 15
  - type: text
    content: '‘When you reap the harvest of your land, you shall not wholly reap the corners of your field when you reap, nor shall you gather any gleaning from your harvest. You shall leave them for the poor and for the stranger: I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.’ ”'
  - type: heading
    content: The Feast of Trumpets
  '23':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '24':
  - type: text
    content: '“Speak to the children of Israel, saying: ‘In the '
  - type: note
    content: Num. 29:1
  - type: text
    content: 'seventh month, on the first day of the month, you shall have a sabbath-rest, '
  - type: note
    content: Lev. 25:9
  - type: text
    content: 'a memorial of blowing of trumpets, a holy convocation. '
  '25':
  - type: text
    content: 'You shall do no customary work on it; and you shall offer an offering made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: .’ ”
  - type: heading
    content: The Day of Atonement
  '26':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '27':
  - type: note
    content: Lev. 16:1–34; 25:9; Num. 29:7
  - type: text
    content: '“Also the tenth day of this seventh month shall be the Day of Atonement. It shall be a holy convocation for you; you shall afflict your souls, and offer an offering made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'And you shall do no work on that same day, for it is the Day of Atonement, '
  - type: note
    content: Lev. 16:34
  - type: text
    content: 'to make atonement for you before the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. '
  '29':
  - type: text
    content: 'For any person who is not '
  - type: note
    content: Is. 22:12; Jer. 31:9; Ezek. 7:16
  - type: text
    content: 'afflicted in soul on that same day '
  - type: note
    content: Gen. 17:14; Lev. 13:46; Num. 5:2
  - type: text
    content: 'shall be cut off from his people. '
  '3':
  - type: note
    content: Ex. 20:9; 23:12; 31:15; Lev. 19:3; Deut. 5:13, 14; Luke 13:14
  - type: text
    content: '‘Six days shall work be done, but the seventh day is a Sabbath of solemn rest, a holy convocation. You shall do no work on it; it is the Sabbath of the '
  - type: heading
    content: Lord
  - type: text
    content: ' in all your dwellings.'
  - type: heading
    content: The Passover and Unleavened Bread
  '30':
  - type: text
    content: 'And any person who does any work on that same day, '
  - type: note
    content: Lev. 20:3–6
  - type: text
    content: 'that person I will destroy from among his people. '
  '31':
  - type: text
    content: 'You shall do no manner of work; it shall be a statute forever throughout your generations in all your dwellings. '
  '32':
  - type: text
    content: It shall be to you a sabbath of solemn rest, and you shall afflict your souls; on the ninth day of the month at evening, from evening to evening, you shall celebrate your sabbath.”
  - type: heading
    content: The Feast of Tabernacles
  '33':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '34':
  - type: text
    content: '“Speak to the children of Israel, saying: '
  - type: note
    content: Ex. 23:16; Num. 29:12; Deut. 16:13–16; Ezra 3:4; Neh. 8:14; Zech. 14:16–19; John 7:2
  - type: text
    content: '‘The fifteenth day of this seventh month shall be the Feast of Tabernacles for seven days to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'On the first day there shall be a holy convocation. You shall do no customary work on it. '
  '36':
  - type: text
    content: 'For seven days you shall offer an '
  - type: note
    content: Num. 29:12–34
  - type: text
    content: 'offering made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: Num. 29:35–38; Neh. 8:18; John 7:37
  - type: text
    content: 'On the eighth day you shall have a holy convocation, and you shall offer an offering made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: '. It is a '
  - type: note
    content: Deut. 16:8; 2 Chr. 7:8
  - type: text
    content: sacred assembly, and you shall do no customary work on it.
  '37':
  - type: note
    content: Lev. 23:2, 4
  - type: text
    content: '‘These are the feasts of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which you shall proclaim to be holy convocations, to offer an offering made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: ', a burnt offering and a grain offering, a sacrifice and drink offerings, everything on its day— '
  '38':
  - type: note
    content: Num. 29:39
  - type: text
    content: 'besides the Sabbaths of the '
  - type: heading
    content: Lord
  - type: text
    content: ', besides your gifts, besides all your vows, and besides all your freewill offerings which you give to the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '39':
  - type: text
    content: '‘Also on the fifteenth day of the seventh month, when you have '
  - type: note
    content: Ex. 23:16; Deut. 16:13
  - type: text
    content: 'gathered in the fruit of the land, you shall keep the feast of the '
  - type: heading
    content: Lord
  - type: text
    content: ' for seven days; on the first day there shall be a sabbath-rest, and on the eighth day a sabbath-rest. '
  '4':
  - type: note
    content: Ex. 23:14–16; Lev. 23:2, 37
  - type: text
    content: '‘These are the feasts of the '
  - type: heading
    content: Lord
  - type: text
    content: ', holy convocations which you shall proclaim at their appointed times. '
  '40':
  - type: text
    content: 'And '
  - type: note
    content: Neh. 8:15
  - type: text
    content: 'you shall take for yourselves on the first day the fruit of beautiful trees, branches of palm trees, the boughs of leafy trees, and willows of the brook; '
  - type: note
    content: Deut. 12:7; 16:14, 15
  - type: text
    content: 'and you shall rejoice before the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God for seven days. '
  '41':
  - type: note
    content: Num. 29:12; Neh. 8:18
  - type: text
    content: 'You shall keep it as a feast to the '
  - type: heading
    content: Lord
  - type: text
    content: ' for seven days in the year. It shall be a statute forever in your generations. You shall celebrate it in the seventh month. '
  '42':
  - type: note
    content: (Is. 4:6)
  - type: text
    content: 'You shall dwell in booths for seven days. '
  - type: note
    content: Neh. 8:14–16
  - type: text
    content: 'All who are native Israelites shall dwell in booths, '
  '43':
  - type: note
    content: Ex. 13:14; Deut. 31:13; Ps. 78:5
  - type: text
    content: 'that your generations may '
  - type: note
    content: Ex. 10:2
  - type: text
    content: 'know that I made the children of Israel dwell in booths when '
  - type: note
    content: Lev. 22:33
  - type: text
    content: 'I brought them out of the land of Egypt: I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.’ ”'
  '44':
  - type: text
    content: 'So Moses '
  - type: note
    content: Lev. 23:2
  - type: text
    content: 'declared to the children of Israel the feasts of the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '5':
  - type: note
    content: Ex. 12:1–28; Num. 9:1–5; 28:16–25; Deut. 16:1–8; Josh. 5:10
  - type: text
    content: 'On the fourteenth day of the first month at twilight is the '
  - type: heading
    content: Lord
  - type: text
    content: '’s Passover. '
  '6':
  - type: text
    content: 'And on the fifteenth day of the same month is the Feast of Unleavened Bread to the '
  - type: heading
    content: Lord
  - type: text
    content: '; seven days you must eat unleavened bread. '
  '7':
  - type: note
    content: Ex. 12:16; Num. 28:18, 25
  - type: text
    content: 'On the first day you shall have a holy convocation; you shall do no customary work on it. '
  '8':
  - type: text
    content: 'But you shall offer an offering made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: ' for seven days. The seventh day shall be a holy convocation; you shall do no customary work on it.’ ”'
  - type: heading
    content: The Feast of Firstfruits
  '9':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
