document_id: JOS.16,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Ephraim and West Manasseh
  - type: text
    content: 'The lot fell to the children of Joseph from the Jordan, by Jericho, to the waters of Jericho on the east, to the '
  - type: note
    content: Josh. 8:15; 18:12
  - type: text
    content: 'wilderness that goes up from Jericho through the mountains to Bethel, '
  '10':
  - type: note
    content: Josh. 15:63; 17:12, 13; Judg. 1:29; 1 Kin. 9:16
  - type: text
    content: And they did not drive out the Canaanites who dwelt in Gezer; but the Canaanites dwell among the Ephraimites to this day and have become forced laborers.
  '2':
  - type: text
    content: 'then went out from '
  - type: note
    content: Josh. 18:13; Judg. 1:26
  - type: text
    content: 'Bethel to Luz, passed along to the border of the Archites at Ataroth, '
  '3':
  - type: text
    content: 'and went down westward to the boundary of the Japhletites, '
  - type: note
    content: Josh. 18:13; 1 Kin. 9:17; 2 Chr. 8:5
  - type: text
    content: 'as far as the boundary of Lower Beth Horon to '
  - type: note
    content: Josh. 21:21; 1 Kin. 9:15; 1 Chr. 7:28
  - type: text
    content: Gezer; and it ended at the sea.
  '4':
  - type: note
    content: Josh. 17:14
  - type: text
    content: So the children of Joseph, Manasseh and Ephraim, took their inheritance.
  - type: heading
    content: The Land of Ephraim
  '5':
  - type: note
    content: Judg. 1:29; 1 Chr. 7:28, 29
  - type: text
    content: 'The border of the children of Ephraim, according to their families, was '
  - type: text
    content: 'thus:'
  - type: text
    content: ' The border of their inheritance on the east side was '
  - type: note
    content: Josh. 18:13
  - type: text
    content: 'Ataroth Addar '
  - type: note
    content: 2 Chr. 8:5
  - type: text
    content: as far as Upper Beth Horon.
  '6':
  - type: text
    content: 'And the border went out toward the sea on the north side of '
  - type: note
    content: Josh. 17:7
  - type: text
    content: 'Michmethath; then the border went around eastward to Taanath Shiloh, and passed by it on the east of Janohah. '
  '7':
  - type: text
    content: Then it went down from Janohah to Ataroth and Naarah, reached to Jericho, and came out at the Jordan.
  '8':
  - type: text
    content: 'The border went out from '
  - type: note
    content: Josh. 17:8
  - type: text
    content: 'Tappuah westward to the '
  - type: note
    content: Josh. 17:9
  - type: text
    content: 'Brook Kanah, and it ended at the sea. This '
  - type: text
    content: was
  - type: text
    content: ' the inheritance of the tribe of the children of Ephraim according to their families. '
  '9':
  - type: note
    content: Josh. 17:9
  - type: text
    content: 'The separate cities for the children of Ephraim '
  - type: text
    content: were
  - type: text
    content: ' among the inheritance of the children of Manasseh, all the cities with their villages.'
