document_id: JOS.16,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ephraim and West Manasseh
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The lot fell to the children of Joseph from the Jordan, by Jericho, to the waters of Jericho on the east, to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 8:15; 18:12
      marker-yv: yv-n
    - type: text
      text: 'wilderness that goes up from Jericho through the mountains to Bethel, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:63; 17:12, 13; Judg. 1:29; 1 Kin. 9:16
      marker-yv: yv-n
    - type: text
      text: And they did not drive out the Canaanites who dwelt in Gezer; but the Canaanites dwell among the Ephraimites to this day and have become forced laborers.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'then went out from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:13; Judg. 1:26
      marker-yv: yv-n
    - type: text
      text: 'Bethel to Luz, passed along to the border of the Archites at Ataroth, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and went down westward to the boundary of the Japhletites, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:13; 1 Kin. 9:17; 2 Chr. 8:5
      marker-yv: yv-n
    - type: text
      text: 'as far as the boundary of Lower Beth Horon to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 21:21; 1 Kin. 9:15; 1 Chr. 7:28
      marker-yv: yv-n
    - type: text
      text: Gezer; and it ended at the sea.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 17:14
      marker-yv: yv-n
    - type: text
      text: So the children of Joseph, Manasseh and Ephraim, took their inheritance.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land of Ephraim
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:29; 1 Chr. 7:28, 29
      marker-yv: yv-n
    - type: text
      text: 'The border of the children of Ephraim, according to their families, was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'thus:'
    - type: text
      text: ' The border of their inheritance on the east side was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:13
      marker-yv: yv-n
    - type: text
      text: 'Ataroth Addar '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 8:5
      marker-yv: yv-n
    - type: text
      text: as far as Upper Beth Horon.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the border went out toward the sea on the north side of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 17:7
      marker-yv: yv-n
    - type: text
      text: 'Michmethath; then the border went around eastward to Taanath Shiloh, and passed by it on the east of Janohah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Then it went down from Janohah to Ataroth and Naarah, reached to Jericho, and came out at the Jordan.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The border went out from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 17:8
      marker-yv: yv-n
    - type: text
      text: 'Tappuah westward to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 17:9
      marker-yv: yv-n
    - type: text
      text: 'Brook Kanah, and it ended at the sea. This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the inheritance of the tribe of the children of Ephraim according to their families. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 17:9
      marker-yv: yv-n
    - type: text
      text: 'The separate cities for the children of Ephraim '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' among the inheritance of the children of Manasseh, all the cities with their villages.'
