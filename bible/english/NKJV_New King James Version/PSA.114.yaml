verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Power of God in His Deliverance of Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:51; 13:3
      marker-yv: yv-n
    - type: text
      text: Israel went out of Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The house of Jacob '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 81:5
      marker-yv: yv-n
    - type: text
      text: from a people of strange language,
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 6:7; 19:6; 25:8; 29:45, 46; Deut. 27:9
      marker-yv: yv-n
    - type: text
      text: Judah became His sanctuary,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' Israel His dominion.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 14:21; Ps. 77:16
      marker-yv: yv-n
    - type: text
      text: 'The sea saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' and fled;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 3:13–16
      marker-yv: yv-n
    - type: text
      text: Jordan turned back.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:18; Judg. 5:5; Ps. 29:6; Hab. 3:6
      marker-yv: yv-n
    - type: text
      text: The mountains skipped like rams,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The little hills like lambs.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hab. 3:8
      marker-yv: yv-n
    - type: text
      text: What ails you, O sea, that you fled?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O Jordan, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' you turned back?'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'O mountains, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' you skipped like rams?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O little hills, like lambs?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tremble, O earth, at the presence of the Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At the presence of the God of Jacob,
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 17:6; Num. 20:11; Ps. 107:35
      marker-yv: yv-n
    - type: text
      text: 'Who turned the rock '
    - type: usfm
      marker: it
      children:
      - type: text
        text: into
    - type: text
      text: ' a pool of water,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The flint into a fountain of waters.
