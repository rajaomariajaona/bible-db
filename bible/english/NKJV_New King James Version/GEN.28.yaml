document_id: GEN.28,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then Isaac called Jacob and '
  - type: note
    content: Gen. 27:33
  - type: text
    content: 'blessed him, and charged him, and said to him: '
  - type: note
    content: Gen. 24:3
  - type: text
    content: '“You shall not take a wife from the daughters of Canaan. '
  '10':
  - type: text
    content: 'Now Jacob '
  - type: note
    content: Gen. 26:23; 46:1; Hos. 12:12
  - type: text
    content: 'went out from Beersheba and went toward '
  - type: note
    content: Gen. 12:4, 5; 27:43; 29:4; 2 Kin. 19:12; Acts 7:2
  - type: text
    content: 'Haran. '
  '11':
  - type: text
    content: 'So he came to a certain place and stayed there all night, because the sun had set. And he took one of the stones of that place and put it at his head, and he lay down in that place to sleep. '
  '12':
  - type: text
    content: 'Then he '
  - type: note
    content: Gen. 31:10; 41:1; Num. 12:6
  - type: text
    content: 'dreamed, and behold, a ladder '
  - type: text
    content: was
  - type: text
    content: ' set up on the earth, and its top reached to heaven; and there '
  - type: note
    content: John 1:51; Heb. 1:4, 14
  - type: text
    content: the angels of God were ascending and descending on it.
  '13':
  - type: note
    content: Gen. 35:1; 48:3; Amos 7:7
  - type: text
    content: 'And behold, the '
  - type: heading
    content: Lord
  - type: text
    content: ' stood above it and said: '
  - type: note
    content: Gen. 26:24
  - type: text
    content: '“I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Abraham your father and the God of Isaac; '
  - type: note
    content: Gen. 13:15, 17; 26:3; 35:12
  - type: text
    content: 'the land on which you lie I will give to you and your '
  - type: note
    content: Gen. 13:16; 22:17
  - type: text
    content: 'descendants. '
  '14':
  - type: text
    content: 'Also your descendants shall be as the dust of the earth; you shall spread abroad '
  - type: note
    content: Gen. 13:14, 15; Deut. 12:20
  - type: text
    content: 'to the west and the east, to the north and the south; and '
  - type: note
    content: Gen. 12:3; 18:18; 22:18; 26:4; Matt. 1:2; Luke 3:34; Gal. 3:8
  - type: text
    content: 'in you and in your seed all the families of the earth shall be blessed. '
  '15':
  - type: text
    content: 'Behold, '
  - type: note
    content: Gen. 26:3, 24; 31:3
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' with you and will '
  - type: note
    content: Gen. 48:16; Num. 6:24; Ps. 121:5, 7, 8
  - type: text
    content: 'keep you wherever you go, and will '
  - type: note
    content: Gen. 35:6; 48:21; Deut. 30:3
  - type: text
    content: 'bring you back to this land; for '
  - type: note
    content: Lev. 26:44; Deut. 7:9; 31:6, 8; Josh. 1:5; 1 Kin. 8:57; Heb. 13:5
  - type: text
    content: 'I will not leave you '
  - type: note
    content: Num. 23:19
  - type: text
    content: until I have done what I have spoken to you.”
  '16':
  - type: text
    content: 'Then Jacob awoke from his sleep and said, “Surely the '
  - type: heading
    content: Lord
  - type: text
    content: ' is in '
  - type: note
    content: Ex. 3:5; Josh. 5:15; Ps. 139:7–12
  - type: text
    content: 'this place, and I did not know '
  - type: text
    content: it.
  - type: text
    content: '” '
  '17':
  - type: text
    content: 'And he was afraid and said, “How awesome '
  - type: text
    content: is
  - type: text
    content: ' this place! This '
  - type: text
    content: is
  - type: text
    content: ' none other than the house of God, and this '
  - type: text
    content: is
  - type: text
    content: ' the gate of heaven!”'
  '18':
  - type: text
    content: 'Then Jacob rose early in the morning, and took the stone that he had put at his head, '
  - type: note
    content: Gen. 31:13, 45
  - type: text
    content: 'set it up as a pillar, '
  - type: note
    content: Lev. 8:10–12
  - type: text
    content: 'and poured oil on top of it. '
  '19':
  - type: text
    content: 'And he called the name of '
  - type: note
    content: Judg. 1:23, 26
  - type: text
    content: 'that place Bethel; but the name of that city had been Luz previously. '
  '2':
  - type: note
    content: Hos. 12:12
  - type: text
    content: 'Arise, go to '
  - type: note
    content: Gen. 25:20
  - type: text
    content: 'Padan Aram, to the house of '
  - type: note
    content: Gen. 22:23
  - type: text
    content: 'Bethuel your mother’s father; and take yourself a wife from there of the daughters of '
  - type: note
    content: Gen. 24:29; 27:43; 29:5
  - type: text
    content: Laban your mother’s brother.
  '20':
  - type: note
    content: Gen. 31:13; Judg. 11:30; 2 Sam. 15:8
  - type: text
    content: 'Then Jacob made a vow, saying, “If '
  - type: note
    content: Gen. 28:15
  - type: text
    content: 'God will be with me, and keep me in this way that I am going, and give me '
  - type: note
    content: 1 Tim. 6:8
  - type: text
    content: 'bread to eat and clothing to put on, '
  '21':
  - type: text
    content: 'so that '
  - type: note
    content: Judg. 11:31; 2 Sam. 19:24, 30
  - type: text
    content: 'I come back to my father’s house in peace, '
  - type: note
    content: Deut. 26:17; 2 Sam. 15:8
  - type: text
    content: 'then the '
  - type: heading
    content: Lord
  - type: text
    content: ' shall be my God. '
  '22':
  - type: text
    content: 'And this stone which I have set as a pillar '
  - type: note
    content: Gen. 35:7, 14
  - type: text
    content: 'shall be God’s house, '
  - type: note
    content: Gen. 14:20; (Lev. 27:30); Deut. 14:22
  - type: text
    content: and of all that You give me I will surely give a tenth to You.”
  '3':
  - type: text
    content: '“May '
  - type: note
    content: Gen. 17:16; 35:11; 48:3
  - type: text
    content: God Almighty bless you,
  - type: text
    content: 'And make you '
  - type: note
    content: Gen. 26:4, 24
  - type: text
    content: fruitful and multiply you,
  - type: text
    content: That you may be an assembly of peoples;
  '4':
  - type: text
    content: 'And give you '
  - type: note
    content: Gen. 12:2, 3; 22:17; Gal. 3:8
  - type: text
    content: the blessing of Abraham,
  - type: text
    content: To you and your descendants with you,
  - type: text
    content: That you may inherit the land
  - type: note
    content: Gen. 17:8; 23:4; 36:7; 1 Chr. 29:15; Ps. 39:12
  - type: text
    content: In which you are a stranger,
  - type: text
    content: Which God gave to Abraham.”
  '5':
  - type: text
    content: So Isaac sent Jacob away, and he went to Padan Aram, to Laban the son of Bethuel the Syrian, the brother of Rebekah, the mother of Jacob and Esau.
  - type: heading
    content: Esau Marries Mahalath
  '6':
  - type: text
    content: 'Esau saw that Isaac had blessed Jacob and sent him away to Padan Aram to take himself a wife from there, '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: that
  - type: text
    content: ' as he blessed him he gave him a charge, saying, “You shall not take a wife from the daughters of Canaan,” '
  '7':
  - type: text
    content: 'and that Jacob had obeyed his father and his mother and had gone to Padan Aram. '
  '8':
  - type: text
    content: 'Also Esau saw '
  - type: note
    content: Gen. 24:3; 26:34, 35; 27:46
  - type: text
    content: 'that the daughters of Canaan did not please his father Isaac. '
  '9':
  - type: text
    content: 'So Esau went to Ishmael and '
  - type: note
    content: Gen. 26:34, 35
  - type: text
    content: 'took '
  - type: note
    content: Gen. 36:2, 3
  - type: text
    content: 'Mahalath the daughter of Ishmael, Abraham’s son, '
  - type: note
    content: Gen. 25:13
  - type: text
    content: the sister of Nebajoth, to be his wife in addition to the wives he had.
  - type: heading
    content: Jacob’s Vow at Bethel
