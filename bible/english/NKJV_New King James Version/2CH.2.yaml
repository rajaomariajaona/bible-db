document_id: 2CH.2,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Prepares to Build the Temple
  - type: text
    content: 'Then Solomon '
  - type: note
    content: 1 Kin. 5:5
  - type: text
    content: 'determined to build a temple for the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and a royal house for himself. '
  '10':
  - type: note
    content: 1 Kin. 5:11
  - type: text
    content: And indeed I will give to your servants, the woodsmen who cut timber, twenty thousand kors of ground wheat, twenty thousand kors of barley, twenty thousand baths of wine, and twenty thousand baths of oil.
  '11':
  - type: text
    content: 'Then Hiram king of Tyre answered in writing, which he sent to Solomon:'
  - type: note
    content: 1 Kin. 10:9; 2 Chr. 9:8
  - type: text
    content: 'Because the '
  - type: heading
    content: Lord
  - type: text
    content: ' loves His people, He has made you king over them.'
  '12':
  - type: text
    content: 'Hiram also said:'
  - type: note
    content: 1 Kin. 5:7
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel, '
  - type: note
    content: Gen. 1; 2; Acts 4:24; 14:15; Rev. 10:6
  - type: text
    content: 'who made heaven and earth, for He has given King David a wise son, endowed with prudence and understanding, who will build a temple for the '
  - type: heading
    content: Lord
  - type: text
    content: ' and a royal house for himself!'
  '13':
  - type: text
    content: 'And now I have sent a skillful man, endowed with understanding, Huram my master '
  - type: text
    content: craftsman
  '14':
  - type: note
    content: 1 Kin. 7:13, 14
  - type: text
    content: (the son of a woman of the daughters of Dan, and his father was a man of Tyre), skilled to work in gold and silver, bronze and iron, stone and wood, purple and blue, fine linen and crimson, and to make any engraving and to accomplish any plan which may be given to him, with your skillful men and with the skillful men of my lord David your father.
  '15':
  - type: text
    content: 'Now therefore, the wheat, the barley, the oil, and the wine which '
  - type: note
    content: 2 Chr. 2:10
  - type: text
    content: my lord has spoken of, let him send to his servants.
  '16':
  - type: note
    content: 1 Kin. 5:8, 9
  - type: text
    content: And we will cut wood from Lebanon, as much as you need; we will bring it to you in rafts by sea to Joppa, and you will carry it up to Jerusalem.
  '17':
  - type: note
    content: 1 Kin. 5:13; 2 Chr. 8:7, 8
  - type: text
    content: 'Then Solomon numbered all the aliens who '
  - type: text
    content: were
  - type: text
    content: ' in the land of Israel, after the census in which '
  - type: note
    content: 1 Chr. 22:2
  - type: text
    content: 'David his father had numbered them; and there were found to be one hundred and fifty-three thousand six hundred. '
  '18':
  - type: text
    content: 'And he made '
  - type: note
    content: 2 Chr. 2:2
  - type: text
    content: seventy thousand of them bearers of burdens, eighty thousand stonecutters in the mountain, and three thousand six hundred overseers to make the people work.
  '2':
  - type: note
    content: 1 Kin. 5:15, 16; 2 Chr. 2:18
  - type: text
    content: 'Solomon selected seventy thousand men to bear burdens, eighty thousand to quarry '
  - type: text
    content: stone
  - type: text
    content: ' in the mountains, and three thousand six hundred to oversee them.'
  '3':
  - type: text
    content: 'Then Solomon sent to Hiram king of Tyre, saying:'
  - type: note
    content: 1 Chr. 14:1
  - type: text
    content: 'As you have dealt with David my father, and sent him cedars to build himself a house to dwell in, '
  - type: text
    content: so
  - type: text
    content: ' '
  - type: text
    content: deal
  - type: text
    content: ' '
  - type: text
    content: with
  - type: text
    content: ' '
  - type: text
    content: me.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Behold, '
  - type: note
    content: 2 Chr. 2:1
  - type: text
    content: 'I am building a temple for the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' my God, to dedicate '
  - type: text
    content: it
  - type: text
    content: ' to Him, '
  - type: note
    content: Ex. 30:7
  - type: text
    content: 'to burn before Him sweet incense, for '
  - type: note
    content: Ex. 25:30; Lev. 24:8
  - type: text
    content: 'the continual showbread, for '
  - type: note
    content: Ex. 29:38–42
  - type: text
    content: 'the burnt offerings morning and evening, on the '
  - type: note
    content: Num. 28:3, 9–11
  - type: text
    content: 'Sabbaths, on the New Moons, and on the set feasts of the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God. This '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: an
  - type: text
    content: ' '
  - type: text
    content: ordinance
  - type: text
    content: ' forever to Israel.'
  '5':
  - type: text
    content: 'And the temple which I build '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' great, for '
  - type: note
    content: Ps. 135:5; (1 Cor. 8:5, 6)
  - type: text
    content: 'our God is greater than all gods. '
  '6':
  - type: note
    content: 1 Kin. 8:27; 2 Chr. 6:18; Is. 66:1
  - type: text
    content: 'But who is able to build Him a temple, since heaven and the heaven of heavens cannot contain Him? Who '
  - type: text
    content: am
  - type: text
    content: ' I then, that I should build Him a temple, except to burn sacrifice before Him?'
  '7':
  - type: text
    content: 'Therefore send me at once a man skillful to work in gold and silver, in bronze and iron, in purple and crimson and blue, who has skill to engrave with the skillful men who are with me in Judah and Jerusalem, '
  - type: note
    content: 1 Chr. 22:15
  - type: text
    content: 'whom David my father provided. '
  '8':
  - type: note
    content: 1 Kin. 5:6
  - type: text
    content: 'Also send me cedar and cypress and algum logs from Lebanon, for I know that your servants have skill to cut timber in Lebanon; and indeed my servants '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' with your servants, '
  '9':
  - type: text
    content: 'to prepare timber for me in abundance, for the temple which I am about to build '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' great and wonderful.'
