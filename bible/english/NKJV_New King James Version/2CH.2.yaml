document_id: 2CH.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon Prepares to Build the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Solomon '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:5
    marker-yv: yv-n
  - type: text
    text: 'determined to build a temple for the name of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and a royal house for himself. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:15, 16; 2 Chr. 2:18
    marker-yv: yv-n
  - type: text
    text: 'Solomon selected seventy thousand men to bear burdens, eighty thousand to quarry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: stone
  - type: text
    text: ' in the mountains, and three thousand six hundred to oversee them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Solomon sent to Hiram king of Tyre, saying:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 14:1
    marker-yv: yv-n
  - type: text
    text: 'As you have dealt with David my father, and sent him cedars to build himself a house to dwell in, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: deal
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Behold, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 2:1
    marker-yv: yv-n
  - type: text
    text: 'I am building a temple for the name of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God, to dedicate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' to Him, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:7
    marker-yv: yv-n
  - type: text
    text: 'to burn before Him sweet incense, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:30; Lev. 24:8
    marker-yv: yv-n
  - type: text
    text: 'the continual showbread, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:38–42
    marker-yv: yv-n
  - type: text
    text: 'the burnt offerings morning and evening, on the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 28:3, 9–11
    marker-yv: yv-n
  - type: text
    text: 'Sabbaths, on the New Moons, and on the set feasts of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God. This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: an
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ordinance
  - type: text
    text: ' forever to Israel.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the temple which I build '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' great, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 135:5; (1 Cor. 8:5, 6)
    marker-yv: yv-n
  - type: text
    text: 'our God is greater than all gods. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 8:27; 2 Chr. 6:18; Is. 66:1
    marker-yv: yv-n
  - type: text
    text: 'But who is able to build Him a temple, since heaven and the heaven of heavens cannot contain Him? Who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: am
  - type: text
    text: ' I then, that I should build Him a temple, except to burn sacrifice before Him?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore send me at once a man skillful to work in gold and silver, in bronze and iron, in purple and crimson and blue, who has skill to engrave with the skillful men who are with me in Judah and Jerusalem, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 22:15
    marker-yv: yv-n
  - type: text
    text: 'whom David my father provided. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:6
    marker-yv: yv-n
  - type: text
    text: 'Also send me cedar and cypress and algum logs from Lebanon, for I know that your servants have skill to cut timber in Lebanon; and indeed my servants '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' with your servants, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'to prepare timber for me in abundance, for the temple which I am about to build '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' great and wonderful.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:11
    marker-yv: yv-n
  - type: text
    text: And indeed I will give to your servants, the woodsmen who cut timber, twenty thousand kors of ground wheat, twenty thousand kors of barley, twenty thousand baths of wine, and twenty thousand baths of oil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Hiram king of Tyre answered in writing, which he sent to Solomon:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 10:9; 2 Chr. 9:8
    marker-yv: yv-n
  - type: text
    text: 'Because the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' loves His people, He has made you king over them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hiram also said:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:7
    marker-yv: yv-n
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Israel, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 1; 2; Acts 4:24; 14:15; Rev. 10:6
    marker-yv: yv-n
  - type: text
    text: 'who made heaven and earth, for He has given King David a wise son, endowed with prudence and understanding, who will build a temple for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and a royal house for himself!'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And now I have sent a skillful man, endowed with understanding, Huram my master '
  - type: usfm
    marker: it
    children:
    - type: text
      text: craftsman
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 7:13, 14
    marker-yv: yv-n
  - type: text
    text: (the son of a woman of the daughters of Dan, and his father was a man of Tyre), skilled to work in gold and silver, bronze and iron, stone and wood, purple and blue, fine linen and crimson, and to make any engraving and to accomplish any plan which may be given to him, with your skillful men and with the skillful men of my lord David your father.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now therefore, the wheat, the barley, the oil, and the wine which '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 2:10
    marker-yv: yv-n
  - type: text
    text: my lord has spoken of, let him send to his servants.
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:8, 9
    marker-yv: yv-n
  - type: text
    text: And we will cut wood from Lebanon, as much as you need; we will bring it to you in rafts by sea to Joppa, and you will carry it up to Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:13; 2 Chr. 8:7, 8
    marker-yv: yv-n
  - type: text
    text: 'Then Solomon numbered all the aliens who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in the land of Israel, after the census in which '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 22:2
    marker-yv: yv-n
  - type: text
    text: 'David his father had numbered them; and there were found to be one hundred and fifty-three thousand six hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he made '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 2:2
    marker-yv: yv-n
  - type: text
    text: seventy thousand of them bearers of burdens, eighty thousand stonecutters in the mountain, and three thousand six hundred overseers to make the people work.
