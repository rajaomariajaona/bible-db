document_id: PSA.67,114
type_code: eng
verses:
  '1':
  - type: heading
    content: An Invocation and a Doxology
  - type: text
    content: To the Chief Musician. On stringed instruments. A Psalm. A Song.
  - type: text
    content: God be merciful to us and bless us,
  - type: text
    content: And
  - type: text
    content: ' '
  - type: note
    content: Num. 6:25
  - type: text
    content: cause His face to shine upon us,
  - type: text
    content: Selah
  '2':
  - type: text
    content: 'That '
  - type: note
    content: Acts 18:25
  - type: text
    content: Your way may be known on earth,
  - type: note
    content: Is. 52:10; Titus 2:11
  - type: text
    content: Your salvation among all nations.
  '3':
  - type: text
    content: Let the peoples praise You, O God;
  - type: text
    content: Let all the peoples praise You.
  '4':
  - type: text
    content: Oh, let the nations be glad and sing for joy!
  - type: text
    content: 'For '
  - type: note
    content: (Ps. 96:10, 13; 98:9)
  - type: text
    content: You shall judge the people righteously,
  - type: text
    content: And govern the nations on earth.
  - type: text
    content: Selah
  '5':
  - type: text
    content: Let the peoples praise You, O God;
  - type: text
    content: Let all the peoples praise You.
  '6':
  - type: note
    content: Lev. 26:4; Ps. 85:12; (Ezek. 34:27); Zech. 8:12
  - type: text
    content: Then
  - type: text
    content: ' the earth shall yield her increase;'
  - type: text
    content: God, our own God, shall bless us.
  '7':
  - type: text
    content: God shall bless us,
  - type: text
    content: And all the ends of the earth shall fear Him.
