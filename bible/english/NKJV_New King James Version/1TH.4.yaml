document_id: 1TH.4,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Plea for Purity
  - type: text
    content: 'Finally then, brethren, we urge and exhort in the Lord Jesus '
  - type: note
    content: 1 Cor. 15:58
  - type: text
    content: 'that you should abound more and more, '
  - type: note
    content: Phil. 1:27; Col. 1:10
  - type: text
    content: 'just as you received from us how you ought to walk and to please God; '
  '10':
  - type: text
    content: 'and indeed you do so toward all the brethren who are in all Macedonia. But we urge you, brethren, '
  - type: note
    content: 1 Thess. 3:12
  - type: text
    content: 'that you increase more and more; '
  '11':
  - type: text
    content: 'that you also aspire to lead a quiet life, '
  - type: note
    content: 2 Thess. 3:11; 1 Pet. 4:15
  - type: text
    content: 'to mind your own business, and '
  - type: note
    content: Acts 20:35
  - type: text
    content: 'to work with your own hands, as we commanded you, '
  '12':
  - type: note
    content: Rom. 13:13; Col. 4:5; (1 Pet. 2:12)
  - type: text
    content: 'that you may walk properly toward those who are outside, and '
  - type: text
    content: that
  - type: text
    content: ' you may lack nothing.'
  - type: heading
    content: The Comfort of Christ’s Coming
  '13':
  - type: text
    content: 'But I do not want you to be ignorant, brethren, concerning those who have fallen asleep, lest you sorrow '
  - type: note
    content: Lev. 19:28
  - type: text
    content: 'as others '
  - type: note
    content: (Eph. 2:12)
  - type: text
    content: 'who have no hope. '
  '14':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 15:13
  - type: text
    content: 'if we believe that Jesus died and rose again, even so God will bring with Him '
  - type: note
    content: 1 Cor. 15:20, 23
  - type: text
    content: those who sleep in Jesus.
  '15':
  - type: text
    content: 'For this we say to you '
  - type: note
    content: 1 Kin. 13:17; 20:35; 2 Cor. 12:1; Gal. 1:12
  - type: text
    content: 'by the word of the Lord, that '
  - type: note
    content: 1 Cor. 15:51, 52; 1 Thess. 5:10
  - type: text
    content: 'we who are alive '
  - type: text
    content: and
  - type: text
    content: ' remain until the coming of the Lord will by no means precede those who are asleep. '
  '16':
  - type: text
    content: 'For '
  - type: note
    content: (Matt. 24:30, 31)
  - type: text
    content: 'the Lord Himself will descend from heaven with a shout, with the voice of an archangel, and with '
  - type: note
    content: (1 Cor. 15:52)
  - type: text
    content: 'the trumpet of God. '
  - type: note
    content: (1 Cor. 15:23); 2 Thess. 2:1; Rev. 14:13; 20:6
  - type: text
    content: 'And the dead in Christ will rise first. '
  '17':
  - type: note
    content: (1 Cor. 15:51–53); 1 Thess. 5:10
  - type: text
    content: 'Then we who are alive '
  - type: text
    content: and
  - type: text
    content: ' remain shall be caught up together with them '
  - type: note
    content: Dan. 7:13; Acts 1:9; Rev. 11:12
  - type: text
    content: 'in the clouds to meet the Lord in the air. And thus '
  - type: note
    content: John 14:3; 17:24
  - type: text
    content: 'we shall always be with the Lord. '
  '18':
  - type: note
    content: 1 Thess. 5:11
  - type: text
    content: Therefore comfort one another with these words.
  '2':
  - type: text
    content: for you know what commandments we gave you through the Lord Jesus.
  '3':
  - type: text
    content: 'For this is '
  - type: note
    content: (Rom. 12:2)
  - type: text
    content: 'the will of God, '
  - type: note
    content: Eph. 5:27
  - type: text
    content: 'your sanctification: '
  - type: note
    content: (1 Cor. 6:15–20; Col. 3:5)
  - type: text
    content: 'that you should abstain from sexual immorality; '
  '4':
  - type: note
    content: Rom. 6:19
  - type: text
    content: 'that each of you should know how to possess his own vessel in sanctification and honor, '
  '5':
  - type: note
    content: Col. 3:5
  - type: text
    content: 'not in passion of lust, '
  - type: note
    content: Eph. 4:17, 18
  - type: text
    content: 'like the Gentiles '
  - type: note
    content: 1 Cor. 15:34
  - type: text
    content: 'who do not know God; '
  '6':
  - type: text
    content: 'that no one should take advantage of and defraud his brother in this matter, because the Lord '
  - type: note
    content: 2 Thess. 1:8
  - type: text
    content: is
  - type: text
    content: ' the avenger of all such, as we also forewarned you and testified. '
  '7':
  - type: text
    content: 'For God did not call us to uncleanness, '
  - type: note
    content: Lev. 11:44; (Heb. 12:14); 1 Pet. 1:14–16
  - type: text
    content: 'but in holiness. '
  '8':
  - type: note
    content: Luke 10:16
  - type: text
    content: 'Therefore he who rejects '
  - type: text
    content: this
  - type: text
    content: ' does not reject man, but God, '
  - type: note
    content: 1 Cor. 2:10
  - type: text
    content: who has also given us His Holy Spirit.
  - type: heading
    content: A Brotherly and Orderly Life
  '9':
  - type: text
    content: 'But concerning brotherly love you have no need that I should write to you, for '
  - type: note
    content: (Jer. 31:33, 34); John 6:45; 15:12, 17; (1 John 2:27)
  - type: text
    content: 'you yourselves are taught by God '
  - type: note
    content: Matt. 22:39
  - type: text
    content: 'to love one another; '
