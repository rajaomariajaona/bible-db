document_id: 1TH.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Plea for Purity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Finally then, brethren, we urge and exhort in the Lord Jesus '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 15:58
    marker-yv: yv-n
  - type: text
    text: 'that you should abound more and more, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 1:27; Col. 1:10
    marker-yv: yv-n
  - type: text
    text: 'just as you received from us how you ought to walk and to please God; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: for you know what commandments we gave you through the Lord Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For this is '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 12:2)
    marker-yv: yv-n
  - type: text
    text: 'the will of God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 5:27
    marker-yv: yv-n
  - type: text
    text: 'your sanctification: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 6:15–20; Col. 3:5)
    marker-yv: yv-n
  - type: text
    text: 'that you should abstain from sexual immorality; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 6:19
    marker-yv: yv-n
  - type: text
    text: 'that each of you should know how to possess his own vessel in sanctification and honor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 3:5
    marker-yv: yv-n
  - type: text
    text: 'not in passion of lust, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 4:17, 18
    marker-yv: yv-n
  - type: text
    text: 'like the Gentiles '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 15:34
    marker-yv: yv-n
  - type: text
    text: 'who do not know God; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'that no one should take advantage of and defraud his brother in this matter, because the Lord '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Thess. 1:8
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the avenger of all such, as we also forewarned you and testified. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For God did not call us to uncleanness, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 11:44; (Heb. 12:14); 1 Pet. 1:14–16
    marker-yv: yv-n
  - type: text
    text: 'but in holiness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 10:16
    marker-yv: yv-n
  - type: text
    text: 'Therefore he who rejects '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' does not reject man, but God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 2:10
    marker-yv: yv-n
  - type: text
    text: who has also given us His Holy Spirit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Brotherly and Orderly Life
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But concerning brotherly love you have no need that I should write to you, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Jer. 31:33, 34); John 6:45; 15:12, 17; (1 John 2:27)
    marker-yv: yv-n
  - type: text
    text: 'you yourselves are taught by God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 22:39
    marker-yv: yv-n
  - type: text
    text: 'to love one another; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and indeed you do so toward all the brethren who are in all Macedonia. But we urge you, brethren, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 3:12
    marker-yv: yv-n
  - type: text
    text: 'that you increase more and more; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'that you also aspire to lead a quiet life, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Thess. 3:11; 1 Pet. 4:15
    marker-yv: yv-n
  - type: text
    text: 'to mind your own business, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 20:35
    marker-yv: yv-n
  - type: text
    text: 'to work with your own hands, as we commanded you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 13:13; Col. 4:5; (1 Pet. 2:12)
    marker-yv: yv-n
  - type: text
    text: 'that you may walk properly toward those who are outside, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' you may lack nothing.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Comfort of Christ’s Coming
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But I do not want you to be ignorant, brethren, concerning those who have fallen asleep, lest you sorrow '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 19:28
    marker-yv: yv-n
  - type: text
    text: 'as others '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Eph. 2:12)
    marker-yv: yv-n
  - type: text
    text: 'who have no hope. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 15:13
    marker-yv: yv-n
  - type: text
    text: 'if we believe that Jesus died and rose again, even so God will bring with Him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 15:20, 23
    marker-yv: yv-n
  - type: text
    text: those who sleep in Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For this we say to you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 13:17; 20:35; 2 Cor. 12:1; Gal. 1:12
    marker-yv: yv-n
  - type: text
    text: 'by the word of the Lord, that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 15:51, 52; 1 Thess. 5:10
    marker-yv: yv-n
  - type: text
    text: 'we who are alive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remain until the coming of the Lord will by no means precede those who are asleep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Matt. 24:30, 31)
    marker-yv: yv-n
  - type: text
    text: 'the Lord Himself will descend from heaven with a shout, with the voice of an archangel, and with '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 15:52)
    marker-yv: yv-n
  - type: text
    text: 'the trumpet of God. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 15:23); 2 Thess. 2:1; Rev. 14:13; 20:6
    marker-yv: yv-n
  - type: text
    text: 'And the dead in Christ will rise first. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 15:51–53); 1 Thess. 5:10
    marker-yv: yv-n
  - type: text
    text: 'Then we who are alive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remain shall be caught up together with them '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 7:13; Acts 1:9; Rev. 11:12
    marker-yv: yv-n
  - type: text
    text: 'in the clouds to meet the Lord in the air. And thus '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 14:3; 17:24
    marker-yv: yv-n
  - type: text
    text: 'we shall always be with the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 5:11
    marker-yv: yv-n
  - type: text
    text: Therefore comfort one another with these words.
