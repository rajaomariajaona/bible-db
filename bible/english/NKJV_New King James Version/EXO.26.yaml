  '1':
  - type: heading
    content: The Tabernacle
  - type: text
    content: '“Moreover '
  - type: note
    content: Ex. 36:8–19
  - type: text
    content: 'you shall make the tabernacle '
  - type: text
    content: with
  - type: text
    content: ' ten curtains '
  - type: text
    content: of
  - type: text
    content: ' fine woven linen and blue, purple, and scarlet '
  - type: text
    content: thread;
  - type: text
    content: ' with artistic designs of cherubim you shall weave them. '
  '10':
  - type: text
    content: 'You shall make fifty loops on the edge of the curtain that is outermost in '
  - type: text
    content: one
  - type: text
    content: ' set, and fifty loops on the edge of the curtain of the second set. '
  '11':
  - type: text
    content: 'And you shall make fifty bronze clasps, put the clasps into the loops, and couple the tent together, that it may be one. '
  '12':
  - type: text
    content: 'The remnant that remains of the curtains of the tent, the half curtain that remains, shall hang over the back of the tabernacle. '
  '13':
  - type: text
    content: And a cubit on one side and a cubit on the other side, of what remains of the length of the curtains of the tent, shall hang over the sides of the tabernacle, on this side and on that side, to cover it.
  '14':
  - type: note
    content: Ex. 35:7, 23; 36:19
  - type: text
    content: “You shall also make a covering of ram skins dyed red for the tent, and a covering of badger skins above that.
  '15':
  - type: text
    content: '“And for the tabernacle you shall '
  - type: note
    content: Ex. 36:20–34
  - type: text
    content: 'make the boards of acacia wood, standing upright. '
  '16':
  - type: text
    content: 'Ten cubits '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' the length of a board, and a cubit and a half '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' the width of each board. '
  '17':
  - type: text
    content: 'Two tenons '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' in each board for binding one to another. Thus you shall make for all the boards of the tabernacle. '
  '18':
  - type: text
    content: 'And you shall make the boards for the tabernacle, twenty boards for the south side. '
  '19':
  - type: text
    content: 'You shall make forty sockets of silver under the twenty boards: two sockets under each of the boards for its two tenons. '
  '2':
  - type: text
    content: 'The length of each curtain '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' twenty-eight cubits, and the width of each curtain four cubits. And every one of the curtains shall have the same measurements. '
  '20':
  - type: text
    content: 'And for the second side of the tabernacle, the north side, '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' twenty boards '
  '21':
  - type: text
    content: 'and their forty sockets of silver: two sockets under each of the boards. '
  '22':
  - type: text
    content: 'For the far side of the tabernacle, westward, you shall make six boards. '
  '23':
  - type: text
    content: 'And you shall also make two boards for the two back corners of the tabernacle. '
  '24':
  - type: text
    content: 'They shall be coupled together at the bottom and they shall be coupled together at the top by one ring. Thus it shall be for both of them. They shall be for the two corners. '
  '25':
  - type: text
    content: So there shall be eight boards with their sockets of silver—sixteen sockets—two sockets under each of the boards.
  '26':
  - type: text
    content: '“And you shall make bars of acacia wood: five for the boards on one side of the tabernacle, '
  '27':
  - type: text
    content: 'five bars for the boards on the other side of the tabernacle, and five bars for the boards of the side of the tabernacle, for the far side westward. '
  '28':
  - type: text
    content: 'The '
  - type: note
    content: Ex. 36:33
  - type: text
    content: 'middle bar shall pass through the midst of the boards from end to end. '
  '29':
  - type: text
    content: 'You shall overlay the boards with gold, make their rings of gold '
  - type: text
    content: as
  - type: text
    content: ' holders for the bars, and overlay the bars with gold. '
  '3':
  - type: text
    content: 'Five curtains shall be coupled to one another, and '
  - type: text
    content: the
  - type: text
