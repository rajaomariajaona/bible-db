  - type: text
    text: The Tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Moreover '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 36:8–19
    marker-yv: yv-n
  - type: text
    text: 'you shall make the tabernacle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' ten curtains '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' fine woven linen and blue, purple, and scarlet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: thread;
  - type: text
    text: ' with artistic designs of cherubim you shall weave them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The length of each curtain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' twenty-eight cubits, and the width of each curtain four cubits. And every one of the curtains shall have the same measurements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Five curtains shall be coupled to one another, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' five curtains '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' coupled to one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And you shall make loops of blue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: yarn
  - type: text
    text: ' on the edge of the curtain on the selvedge of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' set, and likewise you shall do on the outer edge of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' curtain of the second set. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fifty loops you shall make in the one curtain, and fifty loops you shall make on the edge of the curtain that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' on the end of the second set, that the loops may be clasped to one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And you shall make fifty clasps of gold, and couple the curtains together with the clasps, so that it may be one tabernacle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 36:14
    marker-yv: yv-n
  - type: text
    text: '“You shall also make curtains of goats’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hair,
  - type: text
    text: ' to be a tent over the tabernacle. You shall make eleven curtains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The length of each curtain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' thirty cubits, and the width of each curtain four cubits; and the eleven curtains shall all have the same measurements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And you shall couple five curtains by themselves and six curtains by themselves, and you shall double over the sixth curtain at the forefront of the tent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'You shall make fifty loops on the edge of the curtain that is outermost in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' set, and fifty loops on the edge of the curtain of the second set. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And you shall make fifty bronze clasps, put the clasps into the loops, and couple the tent together, that it may be one. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The remnant that remains of the curtains of the tent, the half curtain that remains, shall hang over the back of the tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And a cubit on one side and a cubit on the other side, of what remains of the length of the curtains of the tent, shall hang over the sides of the tabernacle, on this side and on that side, to cover it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 35:7, 23; 36:19
    marker-yv: yv-n
  - type: text
    text: “You shall also make a covering of ram skins dyed red for the tent, and a covering of badger skins above that.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“And for the tabernacle you shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 36:20–34
    marker-yv: yv-n
  - type: text
    text: 'make the boards of acacia wood, standing upright. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ten cubits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' the length of a board, and a cubit and a half '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' the width of each board. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Two tenons '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' in each board for binding one to another. Thus you shall make for all the boards of the tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And you shall make the boards for the tabernacle, twenty boards for the south side. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You shall make forty sockets of silver under the twenty boards: two sockets under each of the boards for its two tenons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And for the second side of the tabernacle, the north side, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' twenty boards '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and their forty sockets of silver: two sockets under each of the boards. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For the far side of the tabernacle, westward, you shall make six boards. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And you shall also make two boards for the two back corners of the tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'They shall be coupled together at the bottom and they shall be coupled together at the top by one ring. Thus it shall be for both of them. They shall be for the two corners. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: So there shall be eight boards with their sockets of silver—sixteen sockets—two sockets under each of the boards.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“And you shall make bars of acacia wood: five for the boards on one side of the tabernacle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'five bars for the boards on the other side of the tabernacle, and five bars for the boards of the side of the tabernacle, for the far side westward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 36:33
    marker-yv: yv-n
  - type: text
    text: 'middle bar shall pass through the midst of the boards from end to end. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'You shall overlay the boards with gold, make their rings of gold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' holders for the bars, and overlay the bars with gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And you shall raise up the tabernacle '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:9, 40; 27:8; 39:32; Num. 8:4; Acts 7:44; (Heb. 8:2, 5)
    marker-yv: yv-n
  - type: text
    text: according to its pattern which you were shown on the mountain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 27:21; 36:35–38; Lev. 16:2; 2 Chr. 3:14; Matt. 27:51; Heb. 9:3; 10:20
    marker-yv: yv-n
  - type: text
    text: '“You shall make a veil woven of blue, purple, and scarlet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: thread,
  - type: text
    text: ' and fine woven linen. It shall be woven with an artistic design of cherubim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'You shall hang it upon the four pillars of acacia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wood
  - type: text
    text: ' overlaid with gold. Their hooks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' gold, upon four sockets of silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And you shall hang the veil from the clasps. Then you shall bring '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:10–16; 40:21
    marker-yv: yv-n
  - type: text
    text: 'the ark of the Testimony in there, behind the veil. The veil shall be a divider for you between '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 16:2; Heb. 9:2, 3
    marker-yv: yv-n
  - type: text
    text: 'the holy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: place
  - type: text
    text: ' and the Most Holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:17–22; 40:20; Heb. 9:5
    marker-yv: yv-n
  - type: text
    text: 'You shall put the mercy seat upon the ark of the Testimony in the Most Holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 40:22; Heb. 9:2
    marker-yv: yv-n
  - type: text
    text: 'You shall set the table outside the veil, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 40:24
    marker-yv: yv-n
  - type: text
    text: the lampstand across from the table on the side of the tabernacle toward the south; and you shall put the table on the north side.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 36:37
    marker-yv: yv-n
  - type: text
    text: '“You shall make a screen for the door of the tabernacle, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: woven
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' blue, purple, and scarlet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: thread,
  - type: text
    text: ' and fine woven linen, made by a weaver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And you shall make for the screen '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 36:38
    marker-yv: yv-n
  - type: text
    text: 'five pillars of acacia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wood,
  - type: text
    text: ' and overlay them with gold; their hooks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
