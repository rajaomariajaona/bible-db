  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' coupled to one another. '
  '30':
  - type: text
    content: 'And you shall raise up the tabernacle '
  - type: note
    content: Ex. 25:9, 40; 27:8; 39:32; Num. 8:4; Acts 7:44; (Heb. 8:2, 5)
  - type: text
    content: according to its pattern which you were shown on the mountain.
  '31':
  - type: note
    content: Ex. 27:21; 36:35–38; Lev. 16:2; 2 Chr. 3:14; Matt. 27:51; Heb. 9:3; 10:20
  - type: text
    content: '“You shall make a veil woven of blue, purple, and scarlet '
  - type: text
    content: thread,
  - type: text
    content: ' and fine woven linen. It shall be woven with an artistic design of cherubim. '
  '32':
  - type: text
    content: 'You shall hang it upon the four pillars of acacia '
  - type: text
    content: wood
  - type: text
    content: ' overlaid with gold. Their hooks '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' gold, upon four sockets of silver. '
  '33':
  - type: text
    content: 'And you shall hang the veil from the clasps. Then you shall bring '
  - type: note
    content: Ex. 25:10–16; 40:21
  - type: text
    content: 'the ark of the Testimony in there, behind the veil. The veil shall be a divider for you between '
  - type: note
    content: Lev. 16:2; Heb. 9:2, 3
  - type: text
    content: 'the holy '
  - type: text
    content: place
  - type: text
    content: ' and the Most Holy. '
  '34':
  - type: note
    content: Ex. 25:17–22; 40:20; Heb. 9:5
  - type: text
    content: 'You shall put the mercy seat upon the ark of the Testimony in the Most Holy. '
  '35':
  - type: note
    content: Ex. 40:22; Heb. 9:2
  - type: text
    content: 'You shall set the table outside the veil, and '
  - type: note
    content: Ex. 40:24
  - type: text
    content: the lampstand across from the table on the side of the tabernacle toward the south; and you shall put the table on the north side.
  '36':
  - type: note
    content: Ex. 36:37
  - type: text
