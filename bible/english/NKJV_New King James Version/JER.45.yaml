  - type: text
    content: 'The '
  - type: note
    content: Jer. 36:1, 4, 32
  - type: text
    content: 'word that Jeremiah the prophet spoke to '
  - type: note
    content: Jer. 32:12, 16; 43:3
  - type: text
    content: 'Baruch the son of Neriah, when he had written these words in a book at the instruction of Jeremiah, in the '
  - type: note
    content: Jer. 25:1; 36:1; 46:2
  - type: text
    content: 'fourth year of Jehoiakim the son of Josiah, king of Judah, saying, '
  '2':
  - type: text
    content: '“Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ', the God of Israel, to you, O Baruch: '
  '3':
  - type: text
    content: '‘You said, “Woe is me now! For the '
  - type: heading
    content: Lord
  - type: text
    content: ' has added grief to my sorrow. I '
  - type: note
    content: Ps. 6:6; 69:3; (2 Cor. 4:1, 16; Gal. 6:9)
  - type: text
    content: fainted in my sighing, and I find no rest.” ’
  '4':
  - type: text
    content: '“Thus you shall say to him, ‘Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': “Behold, '
  - type: note
    content: Is. 5:5; Jer. 1:10; 11:17; 18:7–10; 31:28
  - type: text
    content: 'what I have built I will break down, and what I have planted I will pluck up, that is, this whole land. '
  '5':
  - type: text
    content: 'And do you seek great things for yourself? Do not seek '
  - type: text
    content: them;
  - type: text
    content: ' for behold, '
  - type: note
    content: Jer. 25:17–26
  - type: text
    content: 'I will bring adversity on all flesh,” says the '
  - type: heading
    content: Lord
  - type: text
    content: '. “But I will give your '
  - type: note
    content: Jer. 21:9; 38:2; 39:18
  - type: text
    content: life to you as a prize in all places, wherever you go.” ’ ”
