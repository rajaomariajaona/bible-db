document_id: 1SA.23,114
type_code: eng
verses:
  '1':
  - type: heading
    content: David Saves the City of Keilah
  - type: text
    content: 'Then they told David, saying, “Look, the Philistines are fighting against '
  - type: note
    content: 1 Kin. 2:26
  - type: text
    content: Keilah, and they are robbing the threshing floors.”
  '10':
  - type: text
    content: 'Then David said, “O '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel, Your servant has certainly heard that Saul seeks to come to Keilah '
  - type: note
    content: Num. 27:21; 1 Sam. 23:6; 30:7
  - type: text
    content: 'to destroy the city for my sake. '
  '11':
  - type: text
    content: 'Will the men of Keilah deliver me into his hand? Will Saul come down, as Your servant has heard? O '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel, I pray, tell Your servant.”'
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said, “He will come down.”'
  '12':
  - type: text
    content: Then David said, “Will the men of Keilah deliver me and my men into the hand of Saul?”
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said, “They will deliver '
  - type: text
    content: you.
  - type: text
    content: ”
  '13':
  - type: text
    content: 'So David and his men, '
  - type: note
    content: 1 Sam. 22:19
  - type: text
    content: about six hundred, arose and departed from Keilah and went wherever they could go. Then it was told Saul that David had escaped from Keilah; so he halted the expedition.
  - type: heading
    content: David in Wilderness Strongholds
  '14':
  - type: text
    content: 'And David stayed in strongholds in the wilderness, and remained in '
  - type: note
    content: 1 Sam. 22:2; 25:13
  - type: text
    content: 'the mountains in the Wilderness of '
  - type: note
    content: Ps. 11:1
  - type: text
    content: 'Ziph. Saul '
  - type: note
    content: Josh. 15:55; 2 Chr. 11:8
  - type: text
    content: 'sought him every day, but God did not deliver him into his hand. '
  '15':
  - type: text
    content: 'So David saw that Saul had come out to seek his life. And David '
  - type: text
    content: was
  - type: text
    content: ' in the Wilderness of Ziph in a forest. '
  '16':
  - type: text
    content: 'Then Jonathan, Saul’s son, arose and went to David in the woods and strengthened his hand in God. '
  '17':
  - type: text
    content: 'And he said to him, '
  - type: note
    content: Ps. 32:7; 54:3, 4
  - type: text
    content: '“Do not fear, for the hand of Saul my father shall not find you. You shall be king over Israel, and I shall be next to you. '
  - type: note
    content: (Ps. 27:1–3; Heb. 13:6)
  - type: text
    content: 'Even my father Saul knows that.” '
  '18':
  - type: text
    content: 'So the two of them '
  - type: note
    content: 1 Sam. 20:31; 24:20
  - type: text
    content: 'made a covenant before the '
  - type: heading
    content: Lord
  - type: text
    content: . And David stayed in the woods, and Jonathan went to his own house.
  '19':
  - type: text
    content: 'Then the Ziphites '
  - type: note
    content: 1 Sam. 18:3; 20:12–17, 42; 2 Sam. 9:1; 21:7
  - type: text
    content: 'came up to Saul at Gibeah, saying, “Is David not hiding with us in strongholds in the woods, in the hill of Hachilah, which '
  - type: text
    content: is
  - type: text
    content: ' on the south of Jeshimon? '
  '2':
  - type: text
    content: 'Therefore David '
  - type: note
    content: Josh. 15:44; Neh. 3:17, 18
  - type: text
    content: 'inquired of the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying, “Shall I go and attack these Philistines?”'
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to David, “Go and attack the Philistines, and save Keilah.”'
  '20':
  - type: text
    content: 'Now therefore, O king, come down according to all the desire of your soul to come down; and '
  - type: note
    content: 1 Sam. 26:1; Ps. 54:title
  - type: text
    content: 'our part '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' to deliver him into the king’s hand.”'
  '21':
  - type: text
    content: 'And Saul said, “Blessed '
  - type: text
    content: are
  - type: text
    content: ' you of the '
  - type: heading
    content: Lord
  - type: text
    content: ', for you have compassion on me. '
  '22':
  - type: text
    content: 'Please go and find out for sure, and see the place where his hideout is, '
  - type: text
    content: and
  - type: text
    content: ' who has seen him there. For I am told he is very crafty. '
  '23':
  - type: text
    content: See therefore, and take knowledge of all the lurking places where he hides; and come back to me with certainty, and I will go with you. And it shall be, if he is in the land, that I will search for him throughout all the clans of Judah.”
  '24':
  - type: text
    content: 'So they arose and went to Ziph before Saul. But David and his men '
  - type: text
    content: were
  - type: text
    content: ' in the Wilderness '
  - type: note
    content: Ps. 54:3
  - type: text
    content: 'of Maon, in the plain on the south of Jeshimon. '
  '25':
  - type: text
    content: 'When Saul and his men went to seek '
  - type: text
    content: him,
  - type: text
    content: ' they told David. Therefore he went down to the rock, and stayed in the Wilderness of Maon. And when Saul heard '
  - type: text
    content: that,
  - type: text
    content: ' he pursued David in the Wilderness of Maon. '
  '26':
  - type: text
    content: 'Then Saul went on one side of the mountain, and David and his men on the other side of the mountain. '
  - type: note
    content: Josh. 15:55; 1 Sam. 25:2
  - type: text
    content: 'So David made haste to get away from Saul, for Saul and his men '
  - type: note
    content: Ps. 31:22
  - type: text
    content: were encircling David and his men to take them.
  '27':
  - type: note
    content: Ps. 17:9
  - type: text
    content: 'But a messenger came to Saul, saying, “Hurry and come, for the Philistines have invaded the land!” '
  '28':
  - type: text
    content: 'Therefore Saul returned from pursuing David, and went against the Philistines; so they called that place the Rock of Escape. '
  '29':
  - type: text
    content: 'Then David went up from there and dwelt in strongholds at '
  - type: note
    content: 2 Kin. 19:9
  - type: text
    content: En Gedi.
  '3':
  - type: text
    content: 'But David’s men said to him, “Look, we are afraid here in Judah. How much more then if we go to Keilah against the armies of the Philistines?” '
  '4':
  - type: text
    content: 'Then David inquired of the '
  - type: heading
    content: Lord
  - type: text
    content: ' once again.'
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' answered him and said, “Arise, go down to Keilah. For I will deliver the Philistines into your hand.” '
  '5':
  - type: text
    content: 'And David and his men went to Keilah and '
  - type: note
    content: 1 Sam. 22:10; 23:4, 6, 9; 28:6; 30:8; 2 Sam. 5:19, 23
  - type: text
    content: fought with the Philistines, struck them with a mighty blow, and took away their livestock. So David saved the inhabitants of Keilah.
  '6':
  - type: text
    content: 'Now it happened, when Abiathar the son of Ahimelech '
  - type: note
    content: 1 Sam. 19:8; 2 Sam. 5:20
  - type: text
    content: 'fled to David at Keilah, '
  - type: text
    content: that
  - type: text
    content: ' he went down '
  - type: text
    content: with
  - type: text
    content: ' an ephod in his hand.'
  '7':
  - type: text
    content: 'And Saul was told that David had gone to Keilah. So Saul said, “God has delivered him into my hand, for he has shut himself in by entering a town that has gates and bars.” '
  '8':
  - type: text
    content: Then Saul called all the people together for war, to go down to Keilah to besiege David and his men.
  '9':
  - type: text
    content: 'When David knew that Saul plotted evil against him, '
  - type: note
    content: 1 Sam. 22:20
  - type: text
    content: 'he said to Abiathar the priest, “Bring the ephod here.” '
