  - type: text
    text: David Saves the City of Keilah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then they told David, saying, “Look, the Philistines are fighting against '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 2:26
    marker-yv: yv-n
  - type: text
    text: Keilah, and they are robbing the threshing floors.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Therefore David '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 15:44; Neh. 3:17, 18
    marker-yv: yv-n
  - type: text
    text: 'inquired of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', saying, “Shall I go and attack these Philistines?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to David, “Go and attack the Philistines, and save Keilah.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But David’s men said to him, “Look, we are afraid here in Judah. How much more then if we go to Keilah against the armies of the Philistines?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then David inquired of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' once again.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' answered him and said, “Arise, go down to Keilah. For I will deliver the Philistines into your hand.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And David and his men went to Keilah and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 22:10; 23:4, 6, 9; 28:6; 30:8; 2 Sam. 5:19, 23
    marker-yv: yv-n
  - type: text
    text: fought with the Philistines, struck them with a mighty blow, and took away their livestock. So David saved the inhabitants of Keilah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now it happened, when Abiathar the son of Ahimelech '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 19:8; 2 Sam. 5:20
    marker-yv: yv-n
  - type: text
    text: 'fled to David at Keilah, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' he went down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' an ephod in his hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Saul was told that David had gone to Keilah. So Saul said, “God has delivered him into my hand, for he has shut himself in by entering a town that has gates and bars.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then Saul called all the people together for war, to go down to Keilah to besiege David and his men.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When David knew that Saul plotted evil against him, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 22:20
    marker-yv: yv-n
  - type: text
    text: 'he said to Abiathar the priest, “Bring the ephod here.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then David said, “O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Israel, Your servant has certainly heard that Saul seeks to come to Keilah '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 27:21; 1 Sam. 23:6; 30:7
    marker-yv: yv-n
  - type: text
    text: 'to destroy the city for my sake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Will the men of Keilah deliver me into his hand? Will Saul come down, as Your servant has heard? O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Israel, I pray, tell Your servant.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “He will come down.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then David said, “Will the men of Keilah deliver me and my men into the hand of Saul?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “They will deliver '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you.
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So David and his men, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 22:19
    marker-yv: yv-n
  - type: text
    text: about six hundred, arose and departed from Keilah and went wherever they could go. Then it was told Saul that David had escaped from Keilah; so he halted the expedition.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David in Wilderness Strongholds
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And David stayed in strongholds in the wilderness, and remained in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 22:2; 25:13
    marker-yv: yv-n
  - type: text
    text: 'the mountains in the Wilderness of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 11:1
    marker-yv: yv-n
  - type: text
    text: 'Ziph. Saul '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 15:55; 2 Chr. 11:8
    marker-yv: yv-n
  - type: text
    text: 'sought him every day, but God did not deliver him into his hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So David saw that Saul had come out to seek his life. And David '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in the Wilderness of Ziph in a forest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Jonathan, Saul’s son, arose and went to David in the woods and strengthened his hand in God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he said to him, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 32:7; 54:3, 4
    marker-yv: yv-n
  - type: text
    text: '“Do not fear, for the hand of Saul my father shall not find you. You shall be king over Israel, and I shall be next to you. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 27:1–3; Heb. 13:6)
    marker-yv: yv-n
  - type: text
    text: 'Even my father Saul knows that.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So the two of them '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 20:31; 24:20
    marker-yv: yv-n
  - type: text
    text: 'made a covenant before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: . And David stayed in the woods, and Jonathan went to his own house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then the Ziphites '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 18:3; 20:12–17, 42; 2 Sam. 9:1; 21:7
    marker-yv: yv-n
  - type: text
    text: 'came up to Saul at Gibeah, saying, “Is David not hiding with us in strongholds in the woods, in the hill of Hachilah, which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' on the south of Jeshimon? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now therefore, O king, come down according to all the desire of your soul to come down; and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 26:1; Ps. 54:title
    marker-yv: yv-n
  - type: text
    text: 'our part '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' to deliver him into the king’s hand.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Saul said, “Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' you of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for you have compassion on me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Please go and find out for sure, and see the place where his hideout is, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' who has seen him there. For I am told he is very crafty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: See therefore, and take knowledge of all the lurking places where he hides; and come back to me with certainty, and I will go with you. And it shall be, if he is in the land, that I will search for him throughout all the clans of Judah.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So they arose and went to Ziph before Saul. But David and his men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in the Wilderness '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 54:3
    marker-yv: yv-n
  - type: text
    text: 'of Maon, in the plain on the south of Jeshimon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When Saul and his men went to seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him,
  - type: text
    text: ' they told David. Therefore he went down to the rock, and stayed in the Wilderness of Maon. And when Saul heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that,
  - type: text
    text: ' he pursued David in the Wilderness of Maon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then Saul went on one side of the mountain, and David and his men on the other side of the mountain. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 15:55; 1 Sam. 25:2
    marker-yv: yv-n
  - type: text
    text: 'So David made haste to get away from Saul, for Saul and his men '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 31:22
    marker-yv: yv-n
  - type: text
    text: were encircling David and his men to take them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 17:9
    marker-yv: yv-n
  - type: text
    text: 'But a messenger came to Saul, saying, “Hurry and come, for the Philistines have invaded the land!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Therefore Saul returned from pursuing David, and went against the Philistines; so they called that place the Rock of Escape. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then David went up from there and dwelt in strongholds at '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 19:9
    marker-yv: yv-n
  - type: text
    text: En Gedi.
