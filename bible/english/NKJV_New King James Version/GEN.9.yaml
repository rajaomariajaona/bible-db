document_id: GEN.9,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Promise to Noah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So God blessed Noah and his sons, and said to them: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:28, 29; 8:17; 9:7, 19; 10:32
      marker-yv: yv-n
    - type: text
      text: '“Be fruitful and multiply, and fill the earth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 145:9
      marker-yv: yv-n
    - type: text
      text: 'and with every living creature that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' with you: the birds, the cattle, and every beast of the earth with you, of all that go out of the ark, every beast of the earth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 8:21; Is. 54:9
      marker-yv: yv-n
    - type: text
      text: 'I establish My covenant with you: Never again shall all flesh be cut off by the waters of the flood; never again shall there be a flood to destroy the earth.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God said: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:13, 17; 17:11
      marker-yv: yv-n
    - type: text
      text: '“This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the sign of the covenant which I make between Me and you, and every living creature that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' with you, for perpetual generations: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I set '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 1:28; Rev. 4:3
      marker-yv: yv-n
    - type: text
      text: 'My rainbow in the cloud, and it shall be for the sign of the covenant between Me and the earth. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It shall be, when I bring a cloud over the earth, that the rainbow shall be seen in the cloud; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:42, 45; Deut. 7:9; Ezek. 16:60
      marker-yv: yv-n
    - type: text
      text: 'I will remember My covenant which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' between Me and you and every living creature of all flesh; the waters shall never again become a flood to destroy all flesh. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rainbow shall be in the cloud, and I will look on it to remember '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:13, 19; 2 Sam. 23:5; Is. 55:3; Jer. 32:40; Heb. 13:20
      marker-yv: yv-n
    - type: text
      text: 'the everlasting covenant between God and every living creature of all flesh that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' on the earth.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God said to Noah, “This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the sign of the covenant which I have established between Me and all flesh that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' on the earth.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Noah and His Sons
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the sons of Noah who went out of the ark were Shem, Ham, and Japheth. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:25–27; 10:6
      marker-yv: yv-n
    - type: text
      text: 'And Ham '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the father of Canaan. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 5:32
      marker-yv: yv-n
    - type: text
      text: 'These three '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Noah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:1, 7; 10:32; 1 Chr. 1:4
      marker-yv: yv-n
    - type: text
      text: and from these the whole earth was populated.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:26, 28; Ps. 8:6
      marker-yv: yv-n
    - type: text
      text: 'And the fear of you and the dread of you shall be on every beast of the earth, on every bird of the air, on all that move '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on
    - type: text
      text: ' the earth, and on all the fish of the sea. They are given into your hand. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Noah began '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 3:19, 23; 4:2; Prov. 12:11; Jer. 31:24
      marker-yv: yv-n
    - type: text
      text: 'a farmer, and he planted a vineyard. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he drank of the wine '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 20:1; Eph. 5:18
      marker-yv: yv-n
    - type: text
      text: 'and was drunk, and became uncovered in his tent. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ham, the father of Canaan, saw the nakedness of his father, and told his two brothers outside. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:12; Gal. 6:1
      marker-yv: yv-n
    - type: text
      text: 'But Shem and Japheth took a garment, laid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' on both their shoulders, and went backward and covered the nakedness of their father. Their faces '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' turned away, and they did not see their father’s nakedness.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Noah awoke from his wine, and knew what his younger son had done to him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 27:16; Josh. 9:23, 27
      marker-yv: yv-n
    - type: text
      text: '“Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' Canaan;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 9:23; 1 Kin. 9:20, 21
      marker-yv: yv-n
    - type: text
      text: servant of servants
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall be to his brethren.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:20; 24:27; Ps. 144:15; Heb. 11:16
      marker-yv: yv-n
    - type: text
      text: '“Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The God of Shem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And may Canaan be his servant.
  '27':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'May God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 10:2–5; 39:3; Is. 66:19
      marker-yv: yv-n
    - type: text
      text: enlarge Japheth,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 3:36; John 1:14; Eph. 2:13, 14; 3:6
      marker-yv: yv-n
    - type: text
      text: And may he dwell in the tents of Shem;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And may Canaan be his servant.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Noah lived after the flood three hundred and fifty years. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So all the days of Noah were nine hundred and fifty years; and he died.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:15; 14:3, 9, 11; Acts 10:12, 13
      marker-yv: yv-n
    - type: text
      text: 'Every moving thing that lives shall be food for you. I have given you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 14:14, 20; 1 Cor. 10:23, 26; Col. 2:16; (1 Tim. 4:3, 4)
      marker-yv: yv-n
    - type: text
      text: 'all things, even as the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:29
      marker-yv: yv-n
    - type: text
      text: 'green herbs. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:26; 17:10–16; 19:26; Deut. 12:16, 23; 15:23; 1 Sam. 14:33, 34; Acts 15:20, 29
      marker-yv: yv-n
    - type: text
      text: 'But you shall not eat flesh with its life, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is,
    - type: text
      text: ' its blood. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Surely for your lifeblood I will demand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reckoning;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 21:28
      marker-yv: yv-n
    - type: text
      text: 'from the hand of every beast I will require it, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 4:9, 10; Ps. 9:12
      marker-yv: yv-n
    - type: text
      text: 'from the hand of man. From the hand of every '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 17:26
      marker-yv: yv-n
    - type: text
      text: man’s brother I will require the life of man.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Whoever '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 21:12–14; Lev. 24:17; Num. 35:33; Matt. 26:52
      marker-yv: yv-n
    - type: text
      text: sheds man’s blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By man his blood shall be shed;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:26, 27
      marker-yv: yv-n
    - type: text
      text: For in the image of God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He made man.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And as for you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:1, 19
      marker-yv: yv-n
    - type: text
      text: be fruitful and multiply;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bring forth abundantly in the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And multiply in it.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then God spoke to Noah and to his sons with him, saying: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And as for Me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 6:18
      marker-yv: yv-n
    - type: text
      text: 'behold, I establish '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 54:9
      marker-yv: yv-n
    - type: text
      text: 'My covenant with you and with your descendants after you, '
