    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the Angel of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came up from Gilgal to Bochim, and said: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:2; Judg. 6:8, 9
      marker-yv: yv-n
    - type: text
      text: '“I led you up from Egypt and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:8
      marker-yv: yv-n
    - type: text
      text: 'brought you to the land of which I swore to your fathers; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:7, 8; Lev. 26:42, 44; Deut. 7:9; Ps. 89:34
      marker-yv: yv-n
    - type: text
      text: 'I said, ‘I will never break My covenant with you. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
