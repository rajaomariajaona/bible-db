document_id: JDG.2,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Disobedience
  - type: text
    content: 'Then the Angel of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came up from Gilgal to Bochim, and said: '
  - type: note
    content: Ex. 20:2; Judg. 6:8, 9
  - type: text
    content: '“I led you up from Egypt and '
  - type: note
    content: Deut. 1:8
  - type: text
    content: 'brought you to the land of which I swore to your fathers; and '
  - type: note
    content: Gen. 17:7, 8; Lev. 26:42, 44; Deut. 7:9; Ps. 89:34
  - type: text
    content: 'I said, ‘I will never break My covenant with you. '
  '10':
  - type: text
    content: 'When all that generation had been gathered to their fathers, another generation arose after them who '
  - type: note
    content: Ex. 5:2; 1 Sam. 2:12; Gal. 4:8; (Titus 1:16)
  - type: text
    content: 'did not know the '
  - type: heading
    content: Lord
  - type: text
    content: ' nor the work which He had done for Israel.'
  - type: heading
    content: Israel’s Unfaithfulness
  '11':
  - type: text
    content: 'Then the children of Israel did '
  - type: note
    content: Judg. 3:7, 12; 4:1; 6:1
  - type: text
    content: 'evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and served the Baals; '
  '12':
  - type: text
    content: 'and they '
  - type: note
    content: Deut. 31:16; Judg. 8:33; 10:6
  - type: text
    content: 'forsook the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of their fathers, who had brought them out of the land of Egypt; and they followed '
  - type: note
    content: Deut. 6:14
  - type: text
    content: 'other gods from '
  - type: text
    content: among
  - type: text
    content: ' the gods of the people who '
  - type: text
    content: were
  - type: text
    content: ' all around them, and they '
  - type: note
    content: Ex. 20:5
  - type: text
    content: 'bowed down to them; and they provoked the '
  - type: heading
    content: Lord
  - type: text
    content: ' to anger. '
  '13':
  - type: text
    content: 'They forsook the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Judg. 10:6; Ps. 106:36
  - type: text
    content: 'and served Baal and the Ashtoreths. '
  '14':
  - type: note
    content: Deut. 31:17; Judg. 3:8; Ps. 106:40–42
  - type: text
    content: 'And the anger of the '
  - type: heading
    content: Lord
  - type: text
    content: ' was hot against Israel. So He '
  - type: note
    content: 2 Kin. 17:20
  - type: text
    content: 'delivered them into the hands of plunderers who despoiled them; and '
  - type: note
    content: Is. 50:1
  - type: text
    content: 'He sold them into the hands of their enemies all around, so that they '
  - type: note
    content: Lev. 26:37; Josh. 7:12, 13
  - type: text
    content: 'could no longer stand before their enemies. '
  '15':
  - type: text
    content: 'Wherever they went out, the hand of the '
  - type: heading
    content: Lord
  - type: text
    content: ' was against them for calamity, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had said, and as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had '
  - type: note
    content: Lev. 26:14–26; Deut. 28:15–68
  - type: text
    content: sworn to them. And they were greatly distressed.
  '16':
  - type: text
    content: 'Nevertheless, '
  - type: note
    content: Judg. 3:9, 10, 15; Ps. 106:43–45
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' raised up judges who delivered them out of the hand of those who plundered them. '
  '17':
  - type: text
    content: 'Yet they would not listen to their judges, but they '
  - type: note
    content: Ex. 34:15
  - type: text
    content: 'played the harlot with other gods, and bowed down to them. They turned quickly from the way in which their fathers walked, in obeying the commandments of the '
  - type: heading
    content: Lord
  - type: text
    content: '; they did not do so. '
  '18':
  - type: text
    content: 'And when the '
  - type: heading
    content: Lord
  - type: text
    content: ' raised up judges for them, '
  - type: note
    content: Josh. 1:5
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' was with the judge and delivered them out of the hand of their enemies all the days of the judge; '
  - type: note
    content: Gen. 6:6
  - type: text
    content: 'for the '
  - type: heading
    content: Lord
  - type: text
    content: ' was moved to pity by their groaning because of those who oppressed them and harassed them. '
  '19':
  - type: text
    content: 'And it came to pass, '
  - type: note
    content: Judg. 3:12
  - type: text
    content: when the judge was dead, that they reverted and behaved more corruptly than their fathers, by following other gods, to serve them and bow down to them. They did not cease from their own doings nor from their stubborn way.
  '2':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 23:32; Deut. 7:2
  - type: text
    content: 'you shall make no covenant with the inhabitants of this land; '
  - type: note
    content: Ex. 34:12, 13; Deut. 12:3
  - type: text
    content: 'you shall tear down their altars.’ '
  - type: note
    content: Ps. 106:34
  - type: text
    content: 'But you have not obeyed My voice. Why have you done this? '
  '20':
  - type: text
    content: 'Then the anger of the '
  - type: heading
    content: Lord
  - type: text
    content: ' was hot against Israel; and He said, “Because this nation has '
  - type: note
    content: (Josh. 23:16)
  - type: text
    content: 'transgressed My covenant which I commanded their fathers, and has not heeded My voice, '
  '21':
  - type: text
    content: 'I also will no longer drive out before them any of the nations which Joshua '
  - type: note
    content: Josh. 23:4, 5, 13
  - type: text
    content: 'left when he died, '
  '22':
  - type: text
    content: 'so '
  - type: note
    content: Judg. 3:1, 4
  - type: text
    content: 'that through them I may '
  - type: note
    content: Deut. 8:2, 16; 13:3
  - type: text
    content: 'test Israel, whether they will keep the ways of the '
  - type: heading
    content: Lord
  - type: text
    content: ', to walk in them as their fathers kept '
  - type: text
    content: them,
  - type: text
    content: ' or not.” '
  '23':
  - type: text
    content: 'Therefore the '
  - type: heading
    content: Lord
  - type: text
    content: ' left those nations, without driving them out immediately; nor did He deliver them into the hand of Joshua.'
  '3':
  - type: text
    content: 'Therefore I also said, ‘I will not drive them out before you; but they shall be '
  - type: note
    content: Num. 33:55; Josh. 23:13
  - type: text
    content: thorns
  - type: text
    content: ' in your side, and '
  - type: note
    content: Judg. 3:6
  - type: text
    content: 'their gods shall be a '
  - type: note
    content: Ex. 23:33; Deut. 7:16; Ps. 106:36
  - type: text
    content: 'snare to you.’ ” '
  '4':
  - type: text
    content: 'So it was, when the Angel of the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke these words to all the children of Israel, that the people lifted up their voices and wept.'
  '5':
  - type: text
    content: 'Then they called the name of that place Bochim; and they sacrificed there to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And when '
  - type: note
    content: Josh. 22:6; 24:28–31
  - type: text
    content: Joshua had dismissed the people, the children of Israel went each to his own inheritance to possess the land.
  - type: heading
    content: Death of Joshua
  '7':
  - type: note
    content: Josh. 24:31
  - type: text
    content: 'So the people served the '
  - type: heading
    content: Lord
  - type: text
    content: ' all the days of Joshua, and all the days of the elders who outlived Joshua, who had seen all the great works of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He had done for Israel. '
  '8':
  - type: text
    content: 'Now '
  - type: note
    content: Josh. 24:29
  - type: text
    content: 'Joshua the son of Nun, the servant of the '
  - type: heading
    content: Lord
  - type: text
    content: ', died '
  - type: text
    content: when
  - type: text
    content: ' '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' one hundred and ten years old. '
  '9':
  - type: note
    content: Josh. 24:30
  - type: text
    content: 'And they buried him within the border of his inheritance at '
  - type: note
    content: Josh. 19:49, 50
  - type: text
    content: 'Timnath Heres, in the mountains of Ephraim, on the north side of Mount Gaash. '
