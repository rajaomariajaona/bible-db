      children:
      - type: text
        text: Judg. 3:12
      marker-yv: yv-n
    - type: text
      text: when the judge was dead, that they reverted and behaved more corruptly than their fathers, by following other gods, to serve them and bow down to them. They did not cease from their own doings nor from their stubborn way.
  '2':
  - type: usfm
