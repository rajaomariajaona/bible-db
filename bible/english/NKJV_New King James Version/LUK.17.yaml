  - type: text
    content: 'was in the '
  - type: note
    content: (Gen. 6:8–13)
  - type: text
    content: 'days of '
  - type: note
    content: 1 Pet. 3:20
  - type: text
    content: 'Noah, so it will be also in the days of the Son of Man:'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'They ate, they drank, they married wives, they were given in marriage, until the '
  - type: note
    content: Gen. 7:1–16
  - type: text
    content: 'day that Noah entered the ark, and the flood came and '
  - type: note
    content: Gen. 7:19–23
  - type: text
    content: destroyed them all.
  - type: text
    content: ' '
  '28':
  - type: note
    content: Gen. 19
  - type: text
    content: 'Likewise as it was also in the days of Lot: They ate, they drank, they bought, they sold, they planted, they built;'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'but on '
  - type: note
    content: Gen. 19:16, 24, 29; 2 Pet. 2:6, 7
  - type: text
    content: 'the day that Lot went out of Sodom it rained fire and brimstone from heaven and destroyed '
  - type: text
    content: them
  - type: text
    content: ' all.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Take heed to yourselves. '
  - type: note
    content: (Matt. 18:15, 21)
  - type: text
    content: 'If your brother sins '
  - type: text
    content: against you,
  - type: text
    content: ' '
  - type: note
    content: Lev. 19:17; (Prov. 17:10; Gal. 6:1; James 5:19, 20)
  - type: text
    content: rebuke him; and if he repents, forgive him.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Even so will it be in the day when the Son of Man '
  - type: note
    content: (Matt. 16:27); 1 Cor. 1:7; (Col. 3:4; 2 Thess. 1:7); 1 Pet. 1:7; 4:13; 1 John 2:28
  - type: text
    content: is revealed.
  '31':
  - type: text
    content: '“In that day, he '
  - type: note
    content: Matt. 24:17, 18; Mark 13:15
  - type: text
    content: 'who is on the housetop, and his '
  - type: text
    content: 'goods '
  - type: text
    content: are
  - type: text
    content: ' in the house, let him not come down to take them away. And likewise the one who is in the field, let him not turn back.'
  - type: text
    content: ' '
  '32':
  - type: note
    content: Gen. 19:26
  - type: text
    content: Remember Lot’s wife.
  - type: text
    content: ' '
  '33':
  - type: note
    content: Matt. 10:39; 16:25; Mark 8:35; Luke 9:24; John 12:25
  - type: text
    content: Whoever seeks to save his life will lose it, and whoever loses his life will preserve it.
  - type: text
    content: ' '
  '34':
  - type: note
    content: Matt. 24:40, 41; (1 Thess. 4:17)
  - type: text
    content: 'I tell you, in that night there will be two '
  - type: text
    content: men
  - type: text
    content: ' in one bed: the one will be taken and the other will be left.'
  - type: text
    content: ' '
  '35':
  - type: note
    content: Matt. 24:40, 41
  - type: text
    content: 'Two '
  - type: text
    content: women
  - type: text
    content: ' will be grinding together: the one will be taken and the other left.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Two '
  - type: text
    content: men
  - type: text
    content: ' will be in the field: the one will be taken and the other left.”'
  '37':
  - type: text
    content: 'And they answered and said to Him, '
  - type: note
    content: Job 39:30; Matt. 24:28
  - type: text
    content: “Where, Lord?”
  - type: text
    content: 'So He said to them, '
  - type: text
    content: “Wherever the body is, there the eagles will be gathered together.”
  '4':
  - type: text
    content: 'And if he sins against you seven times in a day, and seven times in a day returns '
  - type: text
    content: to you,
  - type: text
    content: ' saying, ‘I repent,’ you shall forgive him.”'
  - type: heading
    content: Faith and Duty
  '5':
  - type: text
    content: And the apostles said to the Lord, “Increase our faith.”
  '6':
  - type: note
    content: Matt. 17:20; 21:21; (Mark 9:23; 11:23); Luke 13:19
  - type: text
    content: 'So the Lord said, '
  - type: text
    content: “If you have faith as a mustard seed, you can say to this mulberry tree, ‘Be pulled up by the roots and be planted in the sea,’ and it would obey you.
  - type: text
    content: ' '
  '7':
  - type: text
    content: And which of you, having a servant plowing or tending sheep, will say to him when he has come in from the field, ‘Come at once and sit down to eat’?
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But will he not rather say to him, ‘Prepare something for my supper, and gird yourself '
  - type: note
    content: (Luke 12:37)
  - type: text
    content: and serve me till I have eaten and drunk, and afterward you will eat and drink’?
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Does he thank that servant because he did the things that were commanded '
  - type: text
    content: him? I think not.
  - type: text
    content: ' '
