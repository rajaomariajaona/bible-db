  - type: text
    content: 'woe '
  - type: text
    content: to him
  - type: text
    content: ' through whom they do come!'
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'So likewise you, when you have done all those things which you are commanded, say, ‘We are '
  - type: note
    content: Job 22:3; 35:7; Ps. 16:2; Matt. 25:30; Rom. 3:12; 11:35; (1 Cor. 9:16, 17); Philem. 11
  - type: text
    content: unprofitable servants. We have done what was our duty to do.’ ”
  - type: heading
    content: Ten Lepers Cleansed
  '11':
  - type: text
    content: 'Now it happened '
  - type: note
    content: Luke 9:51, 52; John 4:4
  - type: text
    content: 'as He went to Jerusalem that He passed through the midst of Samaria and Galilee. '
  '12':
  - type: text
    content: 'Then as He entered a certain village, there met Him ten men who were lepers, '
  - type: note
    content: Lev. 13:46; Num. 5:2
  - type: text
    content: 'who stood afar off. '
  '13':
  - type: text
    content: 'And they lifted up '
  - type: text
    content: their
  - type: text
    content: ' voices and said, “Jesus, Master, have mercy on us!”'
  '14':
  - type: text
    content: 'So when He saw '
  - type: text
    content: them,
  - type: text
    content: ' He said to them, '
  - type: note
    content: Lev. 13:1–59; 14:1–32; Matt. 8:4; Luke 5:14
  - type: text
    content: “Go, show yourselves to the priests.”
  - type: text
    content: ' And so it was that as they went, they were cleansed.'
  '15':
  - type: text
    content: 'And one of them, when he saw that he was healed, returned, and with a loud voice '
  - type: note
    content: Luke 5:25; 18:43
  - type: text
    content: 'glorified God, '
  '16':
  - type: text
    content: 'and fell down on '
  - type: text
    content: his
  - type: text
    content: ' face at His feet, giving Him thanks. And he was a '
  - type: note
    content: 2 Kin. 17:24; Luke 9:52, 53; John 4:9
  - type: text
    content: Samaritan.
  '17':
  - type: text
    content: 'So Jesus answered and said, '
  - type: text
    content: '“Were there not ten cleansed? But where '
  - type: text
    content: are
  - type: text
    content: ' the nine?'
  - type: text
    content: ' '
  '18':
  - type: text
    content: Were there not any found who returned to give glory to God except this foreigner?”
  - type: text
    content: ' '
  '19':
  - type: note
    content: Matt. 9:22; Mark 5:34; 10:52; Luke 7:50; 8:48; 18:42
  - type: text
    content: 'And He said to him, '
  - type: text
    content: “Arise, go your way. Your faith has made you well.”
  - type: heading
    content: The Coming of the Kingdom
  '2':
  - type: text
    content: 'It would be better for him if a millstone were hung around his neck, and he were thrown into the sea, than that he should '
  - type: text
    content: offend one of these little ones.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Now when He was asked by the Pharisees when the kingdom of God would come, He answered them and said, '
  - type: text
    content: “The kingdom of God does not come with observation;
  - type: text
    content: ' '
  '21':
  - type: note
    content: Luke 17:23
  - type: text
    content: 'nor will they say, '
  - type: text
    content: ‘See here!’ or ‘See there!’
  - type: text
    content: ' For indeed, '
  - type: note
    content: (Rom. 14:17)
  - type: text
    content: 'the kingdom of God is '
  - type: text
    content: within you.”
  '22':
  - type: text
    content: 'Then He said to the disciples, '
  - type: note
    content: Matt. 9:15; Mark 2:20; Luke 5:35; (John 17:12)
  - type: text
    content: '“The days will come when you will desire to see one of the days of the Son of Man, and you will not see '
  - type: text
    content: it.
  - type: text
    content: ' '
  '23':
  - type: note
    content: Matt. 24:23; Mark 13:21; (Luke 21:8)
  - type: text
    content: 'And they will say to you, '
  - type: text
    content: ‘Look here!’ or ‘Look there!’
  - type: text
    content: ' Do not go after '
  - type: text
    content: them
  - type: text
    content: ' or follow '
  - type: text
    content: them.
  - type: text
    content: ' '
  '24':
  - type: note
    content: Matt. 24:27
  - type: text
    content: 'For as the lightning that flashes out of one '
  - type: text
    content: part
  - type: text
    content: ' under heaven shines to the other '
  - type: text
    content: part
  - type: text
    content: ' under heaven, so also the Son of Man will be in His day.'
  - type: text
    content: ' '
  '25':
  - type: note
    content: Matt. 26:67; 27:29–31; Mark 8:31; 9:31; 10:33
  - type: text
    content: 'But first He must suffer many things and be '
  - type: note
    content: Luke 9:22
  - type: text
    content: rejected by this generation.
  - type: text
    content: ' '
  '26':
  - type: note
    content: Matt. 24:37–39
  - type: text
    content: 'And as it '
  - type: note
