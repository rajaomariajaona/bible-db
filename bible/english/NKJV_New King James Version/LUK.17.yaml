  - type: heading
    content: Jesus Warns of Offenses
  - type: text
    content: 'Then He said to the disciples, '
  - type: note
    content: (1 Cor. 11:19)
  - type: text
    content: '“It is impossible that no '
  - type: text
    content: 'offenses should come, but '
  - type: note
