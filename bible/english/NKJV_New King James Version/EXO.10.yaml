verses:
  '1':
  - type: heading
    content: 'The Eighth Plague: Locusts'
  - type: text
    content: 'Now the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses, “Go in to Pharaoh; '
  - type: note
    content: Ex. 4:21; 7:14; 9:12; 10:27; 11:10; 14:4; Josh. 11:20; John 12:40; Rom. 9:18
  - type: text
    content: 'for I have hardened his heart and the hearts of his servants, '
  - type: note
    content: Ex. 7:4; 9:16
  - type: text
    content: 'that I may show these signs of Mine before him, '
  '10':
  - type: text
    content: 'Then he said to them, “The '
  - type: heading
    content: Lord
  - type: text
    content: ' had better be with you when I let you and your little ones go! Beware, for evil is ahead of you. '
  '11':
  - type: text
    content: 'Not so! Go now, you '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' men, and serve the '
  - type: heading
    content: Lord
  - type: text
    content: ', for that is what you desired.” And they were driven '
  - type: note
    content: Ex. 10:28
  - type: text
    content: out from Pharaoh’s presence.
  '12':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: Ex. 7:19
  - type: text
    content: '“Stretch out your hand over the land of Egypt for the locusts, that they may come upon the land of Egypt, and '
  - type: note
    content: Ex. 10:5, 15
  - type: text
    content: 'eat every herb of the land—all that the hail has left.” '
  '13':
  - type: text
    content: 'So Moses stretched out his rod over the land of Egypt, and the '
  - type: heading
    content: Lord
  - type: text
    content: ' brought an east wind on the land all that day and all '
  - type: text
    content: that
  - type: text
    content: ' night. When it was morning, the east wind brought the locusts. '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 28:38; Ps. 78:46; 105:34
  - type: text
    content: 'the locusts went up over all the land of Egypt and rested on all the territory of Egypt. '
  - type: text
    content: They
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' very severe; '
  - type: note
    content: Joel 1:4, 7; 2:1–11; Rev. 9:3
  - type: text
    content: 'previously there had been no such locusts as they, nor shall there be such after them. '
  '15':
  - type: text
    content: 'For they '
  - type: note
    content: Ex. 10:5
  - type: text
    content: 'covered the face of the whole earth, so that the land was darkened; and they '
  - type: note
    content: Ps. 105:35
  - type: text
    content: ate every herb of the land and all the fruit of the trees which the hail had left. So there remained nothing green on the trees or on the plants of the field throughout all the land of Egypt.
  '16':
  - type: text
    content: 'Then Pharaoh called '
  - type: note
    content: Ex. 8:8
  - type: text
    content: 'for Moses and Aaron in haste, and said, '
  - type: note
    content: Ex. 9:27
  - type: text
    content: '“I have sinned against the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God and against you. '
  '17':
  - type: text
    content: 'Now therefore, please forgive my sin only this once, and '
  - type: note
    content: Ex. 8:8, 28; 9:28; 1 Kin. 13:6
  - type: text
    content: 'entreat the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, that He may take away from me this death only.” '
  '18':
  - type: text
    content: 'So he '
  - type: note
    content: Ex. 8:30
  - type: text
    content: 'went out from Pharaoh and entreated the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' turned a very strong west wind, which took the locusts away and blew them '
  - type: note
    content: Joel 2:20
  - type: text
    content: 'into the Red Sea. There remained not one locust in all the territory of Egypt. '
  '2':
  - type: text
    content: 'and that '
  - type: note
    content: Ex. 12:26; 13:8, 14; Deut. 4:9; 6:7; 11:19; Ps. 44:1; 78:5; Joel 1:3
  - type: text
    content: 'you may tell in the hearing of your son and your son’s son the mighty things I have done in Egypt, and My signs which I have done among them, that you may '
  - type: note
    content: Ex. 7:5, 17; 8:22
  - type: text
    content: 'know that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: .”
  '20':
  - type: text
    content: 'But the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 4:21; 10:1; 11:10
  - type: text
    content: hardened Pharaoh’s heart, and he did not let the children of Israel go.
  - type: heading
    content: 'The Ninth Plague: Darkness'
  '21':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: Ex. 9:22
  - type: text
    content: '“Stretch out your hand toward heaven, that there may be darkness over the land of Egypt, darkness '
  - type: text
    content: which
  - type: text
    content: ' may even be felt.” '
  '22':
  - type: text
    content: 'So Moses stretched out his hand toward heaven, and there was '
  - type: note
    content: Ps. 105:28; Rev. 16:10
  - type: text
    content: 'thick darkness in all the land of Egypt '
  - type: note
    content: Ex. 3:18
  - type: text
    content: 'three days. '
  '23':
  - type: text
    content: 'They did not see one another; nor did anyone rise from his place for three days. '
  - type: note
    content: Ex. 8:22, 23
  - type: text
    content: But all the children of Israel had light in their dwellings.
  '24':
  - type: text
    content: 'Then Pharaoh called to Moses and '
  - type: note
    content: Ex. 8:8, 25; 10:8
  - type: text
    content: 'said, “Go, serve the '
  - type: heading
    content: Lord
  - type: text
    content: '; only let your flocks and your herds be kept back. Let your '
  - type: note
    content: Ex. 10:10
  - type: text
    content: little ones also go with you.”
  '25':
  - type: text
    content: 'But Moses said, “You must also give us sacrifices and burnt offerings, that we may sacrifice to the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God. '
  '26':
  - type: text
    content: 'Our '
  - type: note
    content: Ex. 10:9
  - type: text
    content: 'livestock also shall go with us; not a hoof shall be left behind. For we must take some of them to serve the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God, and even we do not know with what we must serve the '
  - type: heading
    content: Lord
  - type: text
    content: ' until we arrive there.”'
  '27':
  - type: text
    content: 'But the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 4:21; 10:1, 20; 14:4, 8
  - type: text
    content: 'hardened Pharaoh’s heart, and he would not let them go. '
  '28':
  - type: text
    content: 'Then Pharaoh said to him, '
  - type: note
    content: Ex. 10:11
  - type: text
    content: “Get away from me! Take heed to yourself and see my face no more! For in the day you see my face you shall die!”
  '29':
  - type: text
    content: 'So Moses said, “You have spoken well. '
  - type: note
    content: Ex. 11:8; Heb. 11:27
  - type: text
    content: I will never see your face again.”
  '3':
  - type: text
    content: 'So Moses and Aaron came in to Pharaoh and said to him, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of the Hebrews: ‘How long will you refuse to '
  - type: note
    content: (1 Kin. 21:29; 2 Chr. 34:27); Job 42:6; (James 4:10; 1 Pet. 5:6)
  - type: text
    content: 'humble yourself before Me? Let My people go, that they may '
  - type: note
    content: Ex. 4:23; 8:1; 9:1
  - type: text
    content: 'serve Me. '
  '4':
  - type: text
    content: 'Or else, if you refuse to let My people go, behold, tomorrow I will bring '
  - type: note
    content: Prov. 30:27; Rev. 9:3
  - type: text
    content: 'locusts into your territory. '
  '5':
  - type: text
    content: 'And they shall cover the face of the earth, so that no one will be able to see the earth; and '
  - type: note
    content: Ex. 9:32; Joel 1:4; 2:25
  - type: text
    content: 'they shall eat the residue of what is left, which remains to you from the hail, and they shall eat every tree which grows up for you out of the field. '
  '6':
  - type: text
    content: 'They shall '
  - type: note
    content: Ex. 8:3, 21
  - type: text
    content: fill your houses, the houses of all your servants, and the houses of all the Egyptians—which neither your fathers nor your fathers’ fathers have seen, since the day that they were on the earth to this day.’ ” And he turned and went out from Pharaoh.
  '7':
  - type: text
    content: 'Then Pharaoh’s '
  - type: note
    content: Ex. 7:5; 8:19; 9:20; 12:33
  - type: text
    content: 'servants said to him, “How long shall this man be '
  - type: note
    content: Ex. 23:33; Josh. 23:13; 1 Sam. 18:21; Eccl. 7:26; 1 Cor. 7:35
  - type: text
    content: 'a snare to us? Let the men go, that they may serve the '
  - type: heading
    content: Lord
  - type: text
    content: ' their God. Do you not yet know that Egypt is destroyed?”'
  '8':
  - type: text
    content: 'So Moses and Aaron were brought again to Pharaoh, and he said to them, “Go, serve the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. Who '
  - type: text
    content: are
  - type: text
    content: ' the ones that are going?”'
  '9':
  - type: text
    content: 'And Moses said, “We will go with our young and our old; with our sons and our daughters, with our flocks and our herds we will go, for '
  - type: note
    content: Ex. 5:1; 7:16
  - type: text
    content: 'we must hold a feast to the '
  - type: heading
    content: Lord
  - type: text
    content: .”
