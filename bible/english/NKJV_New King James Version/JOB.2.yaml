  '10':
  - type: text
    content: 'But he said to her, “You speak as one of the foolish women speaks. '
  - type: note
    content: Job 1:21, 22; (Heb. 12:6; James 5:10, 11)
  - type: text
    content: 'Shall we indeed accept good from God, and shall we not accept adversity?” '
  - type: note
    content: Job 1:22; (James 1:12)
  - type: text
    content: 'In all this Job did not '
  - type: note
    content: Ps. 39:1
  - type: text
    content: sin with his lips.
  - type: heading
    content: Job’s Three Friends
  '11':
  - type: text
    content: 'Now when Job’s three friends heard of all this adversity that had come upon him, each one came from his own place—Eliphaz the '
  - type: note
    content: Gen. 36:11; 1 Chr. 1:36; Job 6:19; Jer. 49:7; Obad. 9
  - type: text
    content: 'Temanite, Bildad the '
  - type: note
    content: Gen. 25:2; 1 Chr. 1:32
  - type: text
    content: 'Shuhite, and Zophar the Naamathite. For they had made an appointment together to come '
  - type: note
    content: Job 42:11; Rom. 12:15
  - type: text
    content: 'and mourn with him, and to comfort him. '
  '12':
  - type: text
    content: 'And when they raised their eyes from afar, and did not recognize him, they lifted their voices and wept; and each one tore his robe and '
  - type: note
    content: Josh. 7:6; Neh. 9:1; Lam. 2:10; Ezek. 27:30
  - type: text
    content: 'sprinkled dust on his head toward heaven. '
  '13':
  - type: text
    content: 'So they sat down with him on the ground '
  - type: note
    content: Gen. 50:10; Ezek. 3:15
  - type: text
    content: 'seven days and seven nights, and no one spoke a word to him, for they saw that '
  - type: text
    content: his
  - type: text
    content: ' grief was very great.'
  '2':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Satan, “From where do you come?”'
  - type: note
    content: Job 1:7
  - type: text
    content: 'Satan answered the '
  - type: heading
    content: Lord
  - type: text
    content: ' and said, “From going to and fro on the earth, and from walking back and forth on it.”'
  '3':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Satan, “Have you considered My servant Job, that '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' none like him on the earth, '
  - type: note
    content: Job 1:1, 8
  - type: text
    content: 'a blameless and upright man, one who fears God and shuns evil? And still he '
  - type: note
    content: Job 27:5, 6
  - type: text
    content: 'holds fast to his integrity, although you incited Me against him, '
  - type: note
    content: Job 9:17
  - type: text
    content: to destroy him without cause.”
  '4':
  - type: text
    content: 'So Satan answered the '
  - type: heading
    content: Lord
  - type: text
    content: ' and said, “Skin for skin! Yes, all that a man has he will give for his life. '
  '5':
  - type: note
    content: Job 1:11
  - type: text
    content: 'But stretch out Your hand now, and touch his '
  - type: note
    content: Job 19:20
  - type: text
    content: bone and his flesh, and he will surely curse You to Your face!”
  '6':
  - type: note
    content: Job 1:12
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Satan, “Behold, he '
  - type: text
    content: is
  - type: text
    content: ' in your hand, but spare his life.”'
  '7':
  - type: text
    content: 'So Satan went out from the presence of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and struck Job with painful boils '
  - type: note
    content: Is. 1:6
  - type: text
    content: 'from the sole of his foot to the crown of his head. '
  '8':
  - type: text
    content: 'And he took for himself a potsherd with which to scrape himself '
  - type: note
    content: Job 42:6; Jer. 6:26; Ezek. 27:30; Jon. 3:6; Matt. 11:21
  - type: text
    content: while he sat in the midst of the ashes.
  '9':
  - type: text
    content: Then his wife said to him, “Do you still hold fast to your integrity? Curse God and die!”
