document_id: JOB.2,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Satan Attacks Job’s Health
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Again '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:6–8
      marker-yv: yv-n
    - type: text
      text: 'there was a day when the sons of God came to present themselves before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and Satan came also among them to present himself before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But he said to her, “You speak as one of the foolish women speaks. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:21, 22; (Heb. 12:6; James 5:10, 11)
      marker-yv: yv-n
    - type: text
      text: 'Shall we indeed accept good from God, and shall we not accept adversity?” '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:22; (James 1:12)
      marker-yv: yv-n
    - type: text
      text: 'In all this Job did not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 39:1
      marker-yv: yv-n
    - type: text
      text: sin with his lips.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job’s Three Friends
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now when Job’s three friends heard of all this adversity that had come upon him, each one came from his own place—Eliphaz the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 36:11; 1 Chr. 1:36; Job 6:19; Jer. 49:7; Obad. 9
      marker-yv: yv-n
    - type: text
      text: 'Temanite, Bildad the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 25:2; 1 Chr. 1:32
      marker-yv: yv-n
    - type: text
      text: 'Shuhite, and Zophar the Naamathite. For they had made an appointment together to come '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 42:11; Rom. 12:15
      marker-yv: yv-n
    - type: text
      text: 'and mourn with him, and to comfort him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And when they raised their eyes from afar, and did not recognize him, they lifted their voices and wept; and each one tore his robe and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 7:6; Neh. 9:1; Lam. 2:10; Ezek. 27:30
      marker-yv: yv-n
    - type: text
      text: 'sprinkled dust on his head toward heaven. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So they sat down with him on the ground '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 50:10; Ezek. 3:15
      marker-yv: yv-n
    - type: text
      text: 'seven days and seven nights, and no one spoke a word to him, for they saw that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' grief was very great.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Satan, “From where do you come?”'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:7
      marker-yv: yv-n
    - type: text
      text: 'Satan answered the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and said, “From going to and fro on the earth, and from walking back and forth on it.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Satan, “Have you considered My servant Job, that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' none like him on the earth, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:1, 8
      marker-yv: yv-n
    - type: text
      text: 'a blameless and upright man, one who fears God and shuns evil? And still he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 27:5, 6
      marker-yv: yv-n
    - type: text
      text: 'holds fast to his integrity, although you incited Me against him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:17
      marker-yv: yv-n
    - type: text
      text: to destroy him without cause.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So Satan answered the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and said, “Skin for skin! Yes, all that a man has he will give for his life. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:11
      marker-yv: yv-n
    - type: text
      text: 'But stretch out Your hand now, and touch his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 19:20
      marker-yv: yv-n
    - type: text
      text: bone and his flesh, and he will surely curse You to Your face!”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:12
      marker-yv: yv-n
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Satan, “Behold, he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in your hand, but spare his life.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So Satan went out from the presence of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and struck Job with painful boils '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 1:6
      marker-yv: yv-n
    - type: text
      text: 'from the sole of his foot to the crown of his head. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And he took for himself a potsherd with which to scrape himself '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 42:6; Jer. 6:26; Ezek. 27:30; Jon. 3:6; Matt. 11:21
      marker-yv: yv-n
    - type: text
      text: while he sat in the midst of the ashes.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then his wife said to him, “Do you still hold fast to your integrity? Curse God and die!”
