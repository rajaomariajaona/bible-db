  - type: text
    content: 'Ammonites, came to battle against Jehoshaphat. '
  '10':
  - type: text
    content: 'And now, here are the people of Ammon, Moab, and Mount Seir—whom You '
  - type: note
    content: Deut. 2:4, 9, 19
  - type: text
    content: 'would not let Israel invade when they came out of the land of Egypt, but '
  - type: note
    content: Num. 20:21
  - type: text
    content: 'they turned from them and did not destroy them— '
  '11':
  - type: text
    content: 'here they are, rewarding us '
  - type: note
    content: Ps. 83:1–18
  - type: text
    content: 'by coming to throw us out of Your possession which You have given us to inherit. '
  '12':
  - type: text
    content: 'O our God, will You not '
  - type: note
    content: Judg. 11:27; (1 Sam. 3:13)
  - type: text
    content: 'judge them? For we have no power against this great multitude that is coming against us; nor do we know what to do, but '
  - type: note
    content: Ps. 25:15; 121:1, 2; 123:1, 2; 141:8
  - type: text
    content: 'our eyes '
  - type: text
    content: are
  - type: text
    content: ' upon You.”'
  '13':
  - type: text
    content: 'Now all Judah, with their little ones, their wives, and their children, stood before the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '14':
  - type: text
    content: 'Then '
  - type: note
    content: Num. 11:25, 26; 24:2; 2 Chr. 15:1; 24:20
  - type: text
    content: 'the Spirit of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came upon Jahaziel the son of Zechariah, the son of Benaiah, the son of Jeiel, the son of Mattaniah, a Levite of the sons of Asaph, in the midst of the assembly. '
  '15':
  - type: text
    content: 'And he said, “Listen, all you of Judah and you inhabitants of Jerusalem, and you, King Jehoshaphat! Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' to you: '
  - type: note
    content: Ex. 14:13, 14; (Deut. 1:29, 30; 31:6, 8); 2 Chr. 32:7
  - type: text
    content: '‘Do not be afraid nor dismayed because of this great multitude, '
  - type: note
    content: 1 Sam. 17:47; Zech. 14:3
  - type: text
    content: 'for the battle '
  - type: text
    content: is
  - type: text
    content: ' not yours, but God’s. '
  '16':
  - type: text
    content: 'Tomorrow go down against them. They will surely come up by the Ascent of Ziz, and you will find them at the end of the brook before the Wilderness of Jeruel. '
  '17':
  - type: note
    content: Ex. 14:13, 14
  - type: text
    content: 'You will not '
  - type: text
    content: need
  - type: text
    content: ' to fight in this '
  - type: text
    content: battle.
  - type: text
    content: ' Position yourselves, stand still and see the salvation of the '
  - type: heading
    content: Lord
  - type: text
    content: ', who is with you, O Judah and Jerusalem!’ Do not fear or be dismayed; tomorrow go out against them, '
  - type: note
    content: Num. 14:9; (2 Chr. 15:2; 32:8)
  - type: text
    content: 'for the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' with you.”'
  '18':
  - type: text
    content: 'And Jehoshaphat '
  - type: note
    content: Ex. 4:31; 2 Chr. 7:3; 29:28
  - type: text
    content: 'bowed his head with '
  - type: text
    content: his
  - type: text
    content: ' face to the ground, and all Judah and the inhabitants of Jerusalem bowed before the '
  - type: heading
    content: Lord
  - type: text
    content: ', worshiping the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Then the Levites of the children of the Kohathites and of the children of the Korahites stood up to praise the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel with voices loud and high.'
  '2':
  - type: text
    content: 'Then some came and told Jehoshaphat, saying, “A great multitude is coming against you from beyond the sea, from Syria; and they are '
  - type: note
    content: Gen. 14:7
  - type: text
    content: 'in Hazazon Tamar” (which '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: Josh. 15:62
  - type: text
    content: 'En Gedi). '
  '20':
  - type: text
    content: 'So they rose early in the morning and went out into the Wilderness of Tekoa; and as they went out, Jehoshaphat stood and said, “Hear me, O Judah and you inhabitants of Jerusalem: '
  - type: note
    content: Is. 7:9
  - type: text
    content: 'Believe in the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, and you shall be established; believe His prophets, and you shall prosper.” '
  '21':
  - type: text
    content: 'And when he had consulted with the people, he appointed those who should sing to the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 1 Chr. 16:29; Ps. 29:2; 90:17; 96:9; 110:3
  - type: text
    content: 'and who should praise the beauty of holiness, as they went out before the army and were saying:'
  - type: note
    content: 1 Chr. 16:34; Ps. 106:1; 136:1
  - type: text
    content: '“Praise the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: note
    content: 1 Chr. 16:41; 2 Chr. 5:13
  - type: text
    content: 'For His mercy '
  - type: text
    content: endures
  - type: text
    content: ' forever.”'
  '22':
  - type: text
    content: 'Now when they began to sing and to praise, '
  - type: note
    content: Judg. 7:22; 1 Sam. 14:20
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' set ambushes against the people of Ammon, Moab, and Mount Seir, who had come against Judah; and they were defeated. '
  '23':
  - type: text
    content: 'For the people of Ammon and Moab stood up against the inhabitants of Mount Seir to utterly kill and destroy '
  - type: text
    content: them.
  - type: text
    content: ' And when they had made an end of the inhabitants of Seir, '
  - type: note
    content: Judg. 7:22; 1 Sam. 14:20
  - type: text
    content: they helped to destroy one another.
  '24':
  - type: text
    content: 'So when Judah came to a place overlooking the wilderness, they looked toward the multitude; and there '
  - type: text
    content: were
  - type: text
    content: ' their dead bodies, fallen on the earth. No one had escaped.'
  '25':
  - type: text
    content: 'When Jehoshaphat and his people came to take away their spoil, they found among them an abundance of valuables on the dead bodies, and precious jewelry, which they stripped off for themselves, more than they could carry away; and they were three days gathering the spoil because there was so much. '
  '26':
  - type: text
    content: 'And on the fourth day they assembled in the Valley of Berachah, for there they blessed the '
  - type: heading
    content: Lord
  - type: text
    content: '; therefore the name of that place was called The Valley of Berachah until this day. '
  '27':
  - type: text
    content: 'Then they returned, every man of Judah and Jerusalem, with Jehoshaphat in front of them, to go back to Jerusalem with joy, for the '
  - type: heading
    content: Lord
  - type: text
    content: ' had '
  - type: note
    content: Neh. 12:43
  - type: text
    content: 'made them rejoice over their enemies. '
  '28':
  - type: text
    content: 'So they came to Jerusalem, with stringed instruments and harps and trumpets, to the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'And '
  - type: note
    content: 2 Chr. 14:14; 17:10
  - type: text
    content: 'the fear of God was on all the kingdoms of '
  - type: text
    content: those
  - type: text
    content: ' countries when they heard that the '
  - type: heading
    content: Lord
  - type: text
    content: ' had fought against the enemies of Israel. '
  '3':
  - type: text
    content: 'And Jehoshaphat feared, and set himself to '
  - type: note
    content: 2 Chr. 19:3
  - type: text
    content: 'seek the '
  - type: heading
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: 1 Sam. 7:6; Ezra 8:21; Jer. 36:9; Jon. 3:5
  - type: text
    content: 'proclaimed a fast throughout all Judah. '
  '30':
  - type: text
    content: 'Then the realm of Jehoshaphat was quiet, for his '
  - type: note
    content: 1 Kin. 22:41–43; 2 Chr. 14:6, 7; 15:15; Job 34:29
  - type: text
    content: God gave him rest all around.
  - type: heading
    content: The End of Jehoshaphat’s Reign
  '31':
  - type: note
    content: (1 Kin. 22:41–43)
  - type: text
    content: 'So Jehoshaphat was king over Judah. '
  - type: text
    content: He
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' thirty-five years old when he became king, and he reigned twenty-five years in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Azubah the daughter of Shilhi. '
  '32':
  - type: text
    content: 'And he walked in the way of his father '
  - type: note
    content: 2 Chr. 14:2
  - type: text
    content: 'Asa, and did not turn aside from it, doing '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' right in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Nevertheless '
  - type: note
    content: 2 Chr. 15:17; 17:6
  - type: text
    content: 'the high places were not taken away, for as yet the people had not '
  - type: note
    content: 2 Chr. 12:14; 19:3
  - type: text
    content: directed their hearts to the God of their fathers.
  '34':
  - type: text
    content: 'Now the rest of the acts of Jehoshaphat, first and last, indeed they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of Jehu the son of Hanani, '
  - type: note
    content: 1 Kin. 16:1, 7
  - type: text
    content: 'which '
  - type: text
    content: is
  - type: text
    content: ' mentioned in the book of the kings of Israel.'
  '35':
  - type: text
    content: 'After this '
  - type: note
    content: 2 Chr. 18:1
  - type: text
    content: 'Jehoshaphat king of Judah allied himself with Ahaziah king of Israel, '
  - type: note
    content: 1 Kin. 22:48–53
  - type: text
    content: 'who acted very '
  - type: note
    content: (2 Chr. 19:2)
  - type: text
    content: 'wickedly. '
  '36':
  - type: text
    content: 'And he allied himself with him '
  - type: note
    content: 1 Kin. 9:26; 10:22
  - type: text
    content: 'to make ships to go to Tarshish, and they made the ships in Ezion Geber. '
  '37':
  - type: text
    content: 'But Eliezer the son of Dodavah of Mareshah prophesied against Jehoshaphat, saying, “Because you have allied yourself with Ahaziah, the '
  - type: heading
    content: Lord
  - type: text
    content: ' has destroyed your works.” '
  - type: note
    content: 1 Kin. 22:48
  - type: text
    content: 'Then the ships were wrecked, so that they were not able to go '
  - type: note
    content: 2 Chr. 9:21
  - type: text
    content: to Tarshish.
  '4':
  - type: text
    content: 'So Judah gathered together to ask '
  - type: note
    content: 2 Chr. 14:11
  - type: text
    content: help
  - type: text
    content: ' from the '
  - type: heading
    content: Lord
  - type: text
    content: '; and from all the cities of Judah they came to seek the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
