  - type: text
    content: 'God in heaven, and '
  - type: note
    content: Ps. 22:28; 47:2, 8; Dan. 4:17, 25, 32
  - type: text
    content: 'do You '
  - type: text
    content: not
  - type: text
    content: ' rule over all the kingdoms of the nations, and '
  - type: note
    content: 1 Chr. 29:12; 2 Chr. 25:8; Ps. 62:11; Matt. 6:13
  - type: text
