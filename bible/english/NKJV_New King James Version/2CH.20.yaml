    content: Ammon, Moab, and Mount Seir Defeated
  - type: text
    content: 'It happened after this '
  - type: text
    content: that
  - type: text
    content: ' the people of '
  - type: note
    content: 1 Chr. 18:2
  - type: text
    content: 'Moab with the people of '
  - type: note
    content: 1 Chr. 19:15
  - type: text
    content: 'Ammon, and '
  - type: text
    content: others
  - type: text
