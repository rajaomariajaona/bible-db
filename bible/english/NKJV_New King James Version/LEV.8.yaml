document_id: LEV.8,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Aaron and His Sons Consecrated
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '10':
  - type: note
    content: Ex. 30:26–29; 40:10, 11; Lev. 8:2
  - type: text
    content: 'Also Moses took the anointing oil, and anointed the tabernacle and all that was in it, and consecrated them. '
  '11':
  - type: text
    content: 'He sprinkled some of it on the altar seven times, anointed the altar and all its utensils, and the laver and its base, to consecrate them. '
  '12':
  - type: text
    content: 'And he '
  - type: note
    content: Ex. 29:7; 30:30; Lev. 21:10, 12; Ps. 133:2
  - type: text
    content: poured some of the anointing oil on Aaron’s head and anointed him, to consecrate him.
  '13':
  - type: note
    content: Ex. 29:8, 9
  - type: text
    content: 'Then Moses brought Aaron’s sons and put tunics on them, girded them with sashes, and put hats on them, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '14':
  - type: note
    content: Ex. 29:10; Ps. 66:15; Ezek. 43:19
  - type: text
    content: 'And he brought the bull for the sin offering. Then Aaron and his sons '
  - type: note
    content: Lev. 4:4
  - type: text
    content: 'laid their hands on the head of the bull for the sin offering, '
  '15':
  - type: text
    content: 'and Moses killed it. '
  - type: note
    content: Ex. 29:12, 36; Lev. 4:7; Ezek. 43:20, 26; (Heb. 9:22)
  - type: text
    content: 'Then he took the blood, and put some on the horns of the altar all around with his finger, and purified the altar. And he poured the blood at the base of the altar, and consecrated it, to make atonement for it. '
  '16':
  - type: note
    content: Ex. 29:13; Lev. 4:8
  - type: text
    content: 'Then he took all the fat that was on the entrails, the fatty lobe attached to the liver, and the two kidneys with their fat, and Moses burned them on the altar. '
  '17':
  - type: text
    content: 'But the bull, its hide, its flesh, and its offal, he burned with fire outside the camp, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 29:14; Lev. 4:11, 12
  - type: text
    content: had commanded Moses.
  '18':
  - type: note
    content: Ex. 29:15
  - type: text
    content: 'Then he brought the ram as the burnt offering. And Aaron and his sons laid their hands on the head of the ram, '
  '19':
  - type: text
    content: 'and Moses killed it. Then he sprinkled the blood all around on the altar. '
  '2':
  - type: note
    content: Ex. 29:1–3
  - type: text
    content: '“Take Aaron and his sons with him, and '
  - type: note
    content: Ex. 28:2, 4
  - type: text
    content: 'the garments, '
  - type: note
    content: Ex. 30:24, 25
  - type: text
    content: 'the anointing oil, a '
  - type: note
    content: Ex. 29:10
  - type: text
    content: 'bull as the sin offering, two '
  - type: note
    content: Ex. 29:15, 19
  - type: text
    content: 'rams, and a basket of unleavened bread; '
  '20':
  - type: text
    content: 'And he cut the ram into pieces; and Moses '
  - type: note
    content: Lev. 1:8
  - type: text
    content: 'burned the head, the pieces, and the fat. '
  '21':
  - type: text
    content: 'Then he washed the entrails and the legs in water. And Moses burned the whole ram on the altar. It was a burnt sacrifice for a sweet aroma, an offering made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ex. 29:18
  - type: text
    content: 'as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '22':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 29:19, 31; Lev. 8:2
  - type: text
    content: 'he brought the second ram, the ram of consecration. Then Aaron and his sons laid their hands on the head of the ram, '
  '23':
  - type: text
    content: 'and Moses killed it. Also he took some of '
  - type: note
    content: Ex. 29:20, 21; Lev. 14:14
  - type: text
    content: 'its blood and put it on the tip of Aaron’s right ear, on the thumb of his right hand, and on the big toe of his right foot. '
  '24':
  - type: text
    content: 'Then he brought Aaron’s sons. And Moses put some of the '
  - type: note
    content: (Heb. 9:13, 14, 18–23)
  - type: text
    content: 'blood on the tips of their right ears, on the thumbs of their right hands, and on the big toes of their right feet. And Moses sprinkled the blood all around on the altar. '
  '25':
  - type: note
    content: Ex. 29:22
  - type: text
    content: 'Then he took the fat and the fat tail, all the fat that was on the entrails, the fatty lobe attached to the liver, the two kidneys and their fat, and the right thigh; '
  '26':
  - type: note
    content: Ex. 29:23
  - type: text
    content: 'and from the basket of unleavened bread that was before the '
  - type: heading
    content: Lord
  - type: text
    content: ' he took one unleavened cake, a cake of bread anointed with oil, and one wafer, and put them on the fat and on the right thigh; '
  '27':
  - type: text
    content: 'and he put all these '
  - type: note
    content: Ex. 29:24; Lev. 7:30, 34
  - type: text
    content: 'in Aaron’s hands and in his sons’ hands, and waved them as a wave offering before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: note
    content: Ex. 29:25
  - type: text
    content: 'Then Moses took them from their hands and burned them on the altar, on the burnt offering. They were consecration offerings for a sweet aroma. That was an offering made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 99:6
  - type: text
    content: 'Moses took the '
  - type: note
    content: Ex. 29:27
  - type: text
    content: 'breast and waved it as a wave offering before the '
  - type: heading
    content: Lord
  - type: text
    content: '. It was Moses’ '
  - type: note
    content: Ex. 29:26
  - type: text
    content: 'part of the ram of consecration, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '3':
  - type: text
    content: and gather all the congregation together at the door of the tabernacle of meeting.”
  '30':
  - type: text
    content: 'Then '
  - type: note
    content: Ex. 29:21; 30:30; Num. 3:3
  - type: text
    content: Moses took some of the anointing oil and some of the blood which was on the altar, and sprinkled it on Aaron, on his garments, on his sons, and on the garments of his sons with him; and he consecrated Aaron, his garments, his sons, and the garments of his sons with him.
  '31':
  - type: text
    content: 'And Moses said to Aaron and his sons, '
  - type: note
    content: Ex. 29:31, 32
  - type: text
    content: '“Boil the flesh at the door of the tabernacle of meeting, and eat it there with the bread that is in the basket of consecration offerings, as I commanded, saying, ‘Aaron and his sons shall eat it.’ '
  '32':
  - type: note
    content: Ex. 29:34
  - type: text
    content: 'What remains of the flesh and of the bread you shall burn with fire. '
  '33':
  - type: text
    content: 'And you shall not go outside the door of the tabernacle of meeting for seven days, until the days of your consecration are ended. For '
  - type: note
    content: Ex. 29:30, 35; Lev. 10:7; Ezek. 43:25, 26
  - type: text
    content: 'seven days he shall consecrate you. '
  '34':
  - type: note
    content: (Heb. 7:16)
  - type: text
    content: 'As he has done this day, so the '
  - type: heading
    content: Lord
  - type: text
    content: ' has commanded to do, to make atonement for you. '
  '35':
  - type: text
    content: 'Therefore you shall stay at the door of the tabernacle of meeting day and night for seven days, and '
  - type: note
    content: Num. 1:53; 3:7; 9:19; Deut. 11:1; 1 Kin. 2:3; Ezek. 48:11
  - type: text
    content: 'keep the charge of the '
  - type: heading
    content: Lord
  - type: text
    content: ', so that you may not die; for so I have been commanded.” '
  '36':
  - type: text
    content: 'So Aaron and his sons did all the things that the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded by the hand of Moses.'
  '4':
  - type: text
    content: 'So Moses did as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded him. And the congregation was gathered together at the door of the tabernacle of meeting. '
  '5':
  - type: text
    content: 'And Moses said to the congregation, “This is what the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded to be done.”'
  '6':
  - type: text
    content: 'Then Moses brought Aaron and his sons and '
  - type: note
    content: Ex. 30:20; Heb. 10:22
  - type: text
    content: 'washed them with water. '
  '7':
  - type: text
    content: 'And he '
  - type: note
    content: Ex. 39:1–31
  - type: text
    content: 'put the tunic on him, girded him with the sash, clothed him with the robe, and put the ephod on him; and he girded him with the intricately woven band of the ephod, and with it tied the ephod on him. '
  '8':
  - type: text
    content: 'Then he put the breastplate on him, and he '
  - type: note
    content: Ex. 28:30; Num. 27:21; Deut. 33:8; 1 Sam. 28:6; Ezra 2:63; Neh. 7:65
  - type: text
    content: 'put the Urim and the Thummim in the breastplate. '
  '9':
  - type: note
    content: Ex. 28:36, 37; 29:6
  - type: text
    content: 'And he put the turban on his head. Also on the turban, on its front, he put the golden plate, the holy crown, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded Moses.'
