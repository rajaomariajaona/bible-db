document_id: LEV.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aaron and His Sons Consecrated
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:1–3
    marker-yv: yv-n
  - type: text
    text: '“Take Aaron and his sons with him, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 28:2, 4
    marker-yv: yv-n
  - type: text
    text: 'the garments, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:24, 25
    marker-yv: yv-n
  - type: text
    text: 'the anointing oil, a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:10
    marker-yv: yv-n
  - type: text
    text: 'bull as the sin offering, two '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:15, 19
    marker-yv: yv-n
  - type: text
    text: 'rams, and a basket of unleavened bread; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and gather all the congregation together at the door of the tabernacle of meeting.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Moses did as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded him. And the congregation was gathered together at the door of the tabernacle of meeting. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Moses said to the congregation, “This is what the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded to be done.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Moses brought Aaron and his sons and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:20; Heb. 10:22
    marker-yv: yv-n
  - type: text
    text: 'washed them with water. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 39:1–31
    marker-yv: yv-n
  - type: text
    text: 'put the tunic on him, girded him with the sash, clothed him with the robe, and put the ephod on him; and he girded him with the intricately woven band of the ephod, and with it tied the ephod on him. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then he put the breastplate on him, and he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 28:30; Num. 27:21; Deut. 33:8; 1 Sam. 28:6; Ezra 2:63; Neh. 7:65
    marker-yv: yv-n
  - type: text
    text: 'put the Urim and the Thummim in the breastplate. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 28:36, 37; 29:6
    marker-yv: yv-n
  - type: text
    text: 'And he put the turban on his head. Also on the turban, on its front, he put the golden plate, the holy crown, as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:26–29; 40:10, 11; Lev. 8:2
    marker-yv: yv-n
  - type: text
    text: 'Also Moses took the anointing oil, and anointed the tabernacle and all that was in it, and consecrated them. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He sprinkled some of it on the altar seven times, anointed the altar and all its utensils, and the laver and its base, to consecrate them. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:7; 30:30; Lev. 21:10, 12; Ps. 133:2
    marker-yv: yv-n
  - type: text
    text: poured some of the anointing oil on Aaron’s head and anointed him, to consecrate him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:8, 9
    marker-yv: yv-n
  - type: text
    text: 'Then Moses brought Aaron’s sons and put tunics on them, girded them with sashes, and put hats on them, as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:10; Ps. 66:15; Ezek. 43:19
    marker-yv: yv-n
  - type: text
    text: 'And he brought the bull for the sin offering. Then Aaron and his sons '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 4:4
    marker-yv: yv-n
  - type: text
    text: 'laid their hands on the head of the bull for the sin offering, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and Moses killed it. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:12, 36; Lev. 4:7; Ezek. 43:20, 26; (Heb. 9:22)
    marker-yv: yv-n
  - type: text
    text: 'Then he took the blood, and put some on the horns of the altar all around with his finger, and purified the altar. And he poured the blood at the base of the altar, and consecrated it, to make atonement for it. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:13; Lev. 4:8
    marker-yv: yv-n
  - type: text
    text: 'Then he took all the fat that was on the entrails, the fatty lobe attached to the liver, and the two kidneys with their fat, and Moses burned them on the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But the bull, its hide, its flesh, and its offal, he burned with fire outside the camp, as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:14; Lev. 4:11, 12
    marker-yv: yv-n
  - type: text
    text: had commanded Moses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:15
    marker-yv: yv-n
  - type: text
    text: 'Then he brought the ram as the burnt offering. And Aaron and his sons laid their hands on the head of the ram, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and Moses killed it. Then he sprinkled the blood all around on the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he cut the ram into pieces; and Moses '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 1:8
    marker-yv: yv-n
  - type: text
    text: 'burned the head, the pieces, and the fat. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then he washed the entrails and the legs in water. And Moses burned the whole ram on the altar. It was a burnt sacrifice for a sweet aroma, an offering made by fire to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:18
    marker-yv: yv-n
  - type: text
    text: 'as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:19, 31; Lev. 8:2
    marker-yv: yv-n
  - type: text
    text: 'he brought the second ram, the ram of consecration. Then Aaron and his sons laid their hands on the head of the ram, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and Moses killed it. Also he took some of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:20, 21; Lev. 14:14
    marker-yv: yv-n
  - type: text
    text: 'its blood and put it on the tip of Aaron’s right ear, on the thumb of his right hand, and on the big toe of his right foot. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then he brought Aaron’s sons. And Moses put some of the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Heb. 9:13, 14, 18–23)
    marker-yv: yv-n
  - type: text
    text: 'blood on the tips of their right ears, on the thumbs of their right hands, and on the big toes of their right feet. And Moses sprinkled the blood all around on the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:22
    marker-yv: yv-n
  - type: text
    text: 'Then he took the fat and the fat tail, all the fat that was on the entrails, the fatty lobe attached to the liver, the two kidneys and their fat, and the right thigh; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:23
    marker-yv: yv-n
  - type: text
    text: 'and from the basket of unleavened bread that was before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' he took one unleavened cake, a cake of bread anointed with oil, and one wafer, and put them on the fat and on the right thigh; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and he put all these '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:24; Lev. 7:30, 34
    marker-yv: yv-n
  - type: text
    text: 'in Aaron’s hands and in his sons’ hands, and waved them as a wave offering before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:25
    marker-yv: yv-n
  - type: text
    text: 'Then Moses took them from their hands and burned them on the altar, on the burnt offering. They were consecration offerings for a sweet aroma. That was an offering made by fire to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 99:6
    marker-yv: yv-n
  - type: text
    text: 'Moses took the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:27
    marker-yv: yv-n
  - type: text
    text: 'breast and waved it as a wave offering before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. It was Moses’ '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:26
    marker-yv: yv-n
  - type: text
    text: 'part of the ram of consecration, as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:21; 30:30; Num. 3:3
    marker-yv: yv-n
  - type: text
    text: Moses took some of the anointing oil and some of the blood which was on the altar, and sprinkled it on Aaron, on his garments, on his sons, and on the garments of his sons with him; and he consecrated Aaron, his garments, his sons, and the garments of his sons with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And Moses said to Aaron and his sons, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:31, 32
    marker-yv: yv-n
  - type: text
    text: '“Boil the flesh at the door of the tabernacle of meeting, and eat it there with the bread that is in the basket of consecration offerings, as I commanded, saying, ‘Aaron and his sons shall eat it.’ '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:34
    marker-yv: yv-n
  - type: text
    text: 'What remains of the flesh and of the bread you shall burn with fire. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And you shall not go outside the door of the tabernacle of meeting for seven days, until the days of your consecration are ended. For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:30, 35; Lev. 10:7; Ezek. 43:25, 26
    marker-yv: yv-n
  - type: text
    text: 'seven days he shall consecrate you. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Heb. 7:16)
    marker-yv: yv-n
  - type: text
    text: 'As he has done this day, so the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded to do, to make atonement for you. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Therefore you shall stay at the door of the tabernacle of meeting day and night for seven days, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 1:53; 3:7; 9:19; Deut. 11:1; 1 Kin. 2:3; Ezek. 48:11
    marker-yv: yv-n
  - type: text
    text: 'keep the charge of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', so that you may not die; for so I have been commanded.” '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'So Aaron and his sons did all the things that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded by the hand of Moses.'
