  '1':
  - type: heading
    content: Water Turned to Wine
  - type: text
    content: 'On the third day there was a '
  - type: note
    content: (Heb. 13:4)
  - type: text
    content: 'wedding in '
  - type: note
    content: John 4:46
  - type: text
    content: 'Cana of Galilee, and the '
  - type: note
    content: John 19:25
  - type: text
    content: 'mother of Jesus was there. '
  '10':
  - type: text
    content: 'And he said to him, “Every man at the beginning sets out the good wine, and when the '
  - type: text
    content: guests
  - type: text
    content: ' have well drunk, then the inferior. You have kept the good wine until now!”'
  '11':
  - type: text
    content: 'This '
  - type: note
    content: John 4:54
  - type: text
    content: 'beginning of signs Jesus did in Cana of Galilee, '
  - type: note
    content: (John 1:14)
  - type: text
    content: and manifested His glory; and His disciples believed in Him.
  '12':
  - type: text
    content: 'After this He went down to '
  - type: note
    content: Matt. 4:13; John 4:46
  - type: text
    content: 'Capernaum, He, His mother, '
  - type: note
    content: Matt. 12:46; 13:55
  - type: text
    content: His brothers, and His disciples; and they did not stay there many days.
  - type: heading
    content: Jesus Cleanses the Temple
  '13':
  - type: note
    content: Ex. 12:14; Deut. 16:1–6; John 5:1; 6:4; 11:55
  - type: text
    content: 'Now the Passover of the Jews was at hand, and Jesus went up to Jerusalem. '
  '14':
  - type: note
    content: Mal. 3:1; Matt. 21:12; Mark 11:15, 17; Luke 19:45
  - type: text
    content: 'And He found in the temple those who sold oxen and sheep and doves, and the money changers doing business. '
  '15':
  - type: text
    content: 'When He had made a whip of cords, He drove them all out of the temple, with the sheep and the oxen, and poured out the changers’ money and overturned the tables. '
  '16':
  - type: text
    content: 'And He said to those who sold doves, '
  - type: text
    content: '“Take these things away! Do not make '
  - type: note
    content: Luke 2:49
  - type: text
    content: My Father’s house a house of merchandise!”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Then His disciples remembered that it was written, '
  - type: note
    content: Ps. 69:9
  - type: text
    content: “Zeal for Your house has eaten Me up.”
  '18':
  - type: text
    content: 'So the Jews answered and said to Him, '
  - type: note
    content: Matt. 12:38; John 6:30
  - type: text
    content: “What sign do You show to us, since You do these things?”
  '19':
  - type: text
    content: 'Jesus answered and said to them, '
  - type: note
    content: Matt. 26:61; 27:40; (Mark 14:58; 15:29); Luke 24:46; Acts 6:14; 10:40; 1 Cor. 15:4
  - type: text
    content: “Destroy this temple, and in three days I will raise it up.”
  '2':
  - type: text
    content: 'Now both Jesus and His disciples were invited to the wedding. '
  '20':
  - type: text
    content: Then the Jews said, “It has taken forty-six years to build this temple, and will You raise it up in three days?”
  '21':
  - type: text
    content: 'But He was speaking '
  - type: note
    content: (1 Cor. 3:16; 6:19; 2 Cor. 6:16; Col. 2:9; Heb. 8:2)
  - type: text
    content: 'of the temple of His body. '
  '22':
  - type: text
    content: 'Therefore, when He had risen from the dead, '
  - type: note
    content: Luke 24:8; John 2:17; 12:16; 14:26
  - type: text
    content: His disciples remembered that He had said this to them; and they believed the Scripture and the word which Jesus had said.
  - type: heading
    content: The Discerner of Hearts
  '23':
  - type: text
    content: 'Now when He was in Jerusalem at the Passover, during the feast, many believed in His name when they saw the '
  - type: note
    content: (John 5:36; Acts 2:22)
  - type: text
    content: 'signs which He did. '
  '24':
  - type: text
    content: 'But Jesus did not commit Himself to them, because He '
  - type: note
    content: Matt. 9:4; John 16:30; Rev. 2:23
  - type: text
    content: 'knew all '
  - type: text
    content: men,
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'and had no need that anyone should testify of man, for '
  - type: note
    content: 1 Sam. 16:7; 1 Chr. 28:9; Matt. 9:4; (Mark 2:8); John 6:64; 16:30; Acts 1:24; Rev. 2:23
  - type: text
    content: He knew what was in man.
  '3':
  - type: text
    content: And when they ran out of wine, the mother of Jesus said to Him, “They have no wine.”
  '4':
  - type: text
    content: 'Jesus said to her, '
  - type: note
    content: John 19:26
  - type: text
    content: '“Woman, '
  - type: note
    content: 2 Sam. 16:10
  - type: text
    content: 'what does your concern have to do with Me? '
  - type: note
    content: John 7:6, 8, 30; 8:20
  - type: text
    content: My hour has not yet come.”
  '5':
  - type: text
    content: 'His mother said to the servants, “Whatever He says to you, do '
  - type: text
    content: it.
  - type: text
    content: ”
  '6':
  - type: text
    content: 'Now there were set there six waterpots of stone, '
  - type: note
    content: Matt. 15:2; (Mark 7:3; Luke 11:39); John 3:25
  - type: text
    content: 'according to the manner of purification of the Jews, containing twenty or thirty gallons apiece. '
  '7':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Fill the waterpots with water.”
  - type: text
    content: ' And they filled them up to the brim. '
  '8':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: '“Draw '
  - type: text
    content: some
  - type: text
    content: ' out now, and take '
  - type: text
    content: it
  - type: text
    content: ' to the master of the feast.”'
  - type: text
    content: ' And they took '
  - type: text
    content: it.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'When the master of the feast had tasted '
  - type: note
    content: John 4:46
  - type: text
    content: 'the water that was made wine, and did not know where it came from (but the servants who had drawn the water knew), the master of the feast called the bridegroom. '
