          text: some
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' out now, and take '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: it
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' to the master of the feast.”'
    - type: text
      text: ' And they took '
    - type: usfm
