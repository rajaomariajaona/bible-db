      children:
      - type: text
        text: (John 5:36; Acts 2:22)
      marker-yv: yv-n
    - type: text
      text: 'signs which He did. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus did not commit Himself to them, because He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 9:4; John 16:30; Rev. 2:23
      marker-yv: yv-n
    - type: text
      text: 'knew all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men,
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and had no need that anyone should testify of man, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 16:7; 1 Chr. 28:9; Matt. 9:4; (Mark 2:8); John 6:64; 16:30; Acts 1:24; Rev. 2:23
      marker-yv: yv-n
    - type: text
      text: He knew what was in man.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when they ran out of wine, the mother of Jesus said to Him, “They have no wine.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to her, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 19:26
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Woman, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 16:10
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'what does your concern have to do with Me? '
    - type: usfm
      marker: x
      children:
      - type: text
