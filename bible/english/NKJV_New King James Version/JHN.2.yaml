    children:
    - type: text
      text: Jesus Cleanses the Temple
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:14; Deut. 16:1–6; John 5:1; 6:4; 11:55
      marker-yv: yv-n
    - type: text
      text: 'Now the Passover of the Jews was at hand, and Jesus went up to Jerusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 3:1; Matt. 21:12; Mark 11:15, 17; Luke 19:45
      marker-yv: yv-n
    - type: text
      text: 'And He found in the temple those who sold oxen and sheep and doves, and the money changers doing business. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When He had made a whip of cords, He drove them all out of the temple, with the sheep and the oxen, and poured out the changers’ money and overturned the tables. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He said to those who sold doves, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Take these things away! Do not make '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 2:49
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: My Father’s house a house of merchandise!”
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then His disciples remembered that it was written, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 69:9
      marker-yv: yv-n
    - type: text
      text: “Zeal for Your house has eaten Me up.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Jews answered and said to Him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 12:38; John 6:30
      marker-yv: yv-n
    - type: text
      text: “What sign do You show to us, since You do these things?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered and said to them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 26:61; 27:40; (Mark 14:58; 15:29); Luke 24:46; Acts 6:14; 10:40; 1 Cor. 15:4
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Destroy this temple, and in three days I will raise it up.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now both Jesus and His disciples were invited to the wedding. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the Jews said, “It has taken forty-six years to build this temple, and will You raise it up in three days?”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But He was speaking '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 3:16; 6:19; 2 Cor. 6:16; Col. 2:9; Heb. 8:2)
      marker-yv: yv-n
    - type: text
      text: 'of the temple of His body. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, when He had risen from the dead, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:8; John 2:17; 12:16; 14:26
      marker-yv: yv-n
    - type: text
      text: His disciples remembered that He had said this to them; and they believed the Scripture and the word which Jesus had said.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Discerner of Hearts
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when He was in Jerusalem at the Passover, during the feast, many believed in His name when they saw the '
    - type: usfm
