segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elimelech’s Family Goes to Moab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it came to pass, in the days when '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 2:16–18
    marker-yv: yv-n
  - type: text
    text: 'the judges ruled, that there was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 12:10; 26:1; 2 Kin. 8:1
    marker-yv: yv-n
  - type: text
    text: 'a famine in the land. And a certain man of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 17:8; Mic. 5:2
    marker-yv: yv-n
  - type: text
    text: 'Bethlehem, Judah, went to dwell in the country of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 19:37
    marker-yv: yv-n
  - type: text
    text: 'Moab, he and his wife and his two sons. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The name of the man '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Elimelech, the name of his wife '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Naomi, and the names of his two sons '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Mahlon and Chilion—'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 35:19; 1 Sam. 1:1; 1 Kin. 11:26
    marker-yv: yv-n
  - type: text
    text: 'Ephrathites of Bethlehem, Judah. And they went '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 3:30
    marker-yv: yv-n
  - type: text
    text: 'to the country of Moab and remained there. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Elimelech, Naomi’s husband, died; and she was left, and her two sons. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now they took wives of the women of Moab: the name of the one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Orpah, and the name of the other Ruth. And they dwelt there about ten years. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then both Mahlon and Chilion also died; so the woman survived her two sons and her husband.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naomi Returns with Ruth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then she arose with her daughters-in-law that she might return from the country of Moab, for she had heard in the country of Moab that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 3:16; 4:31; Jer. 29:10; Zeph. 2:7; Luke 1:68
    marker-yv: yv-n
  - type: text
    text: 'visited His people by '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 132:15; Matt. 6:11
    marker-yv: yv-n
  - type: text
    text: 'giving them bread. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore she went out from the place where she was, and her two daughters-in-law with her; and they went on the way to return to the land of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Naomi said to her two daughters-in-law, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 24:15
    marker-yv: yv-n
  - type: text
    text: '“Go, return each to her mother’s house. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Tim. 1:16–18
    marker-yv: yv-n
  - type: text
    text: 'The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' deal kindly with you, as you have dealt '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ruth 2:20
    marker-yv: yv-n
  - type: text
    text: 'with the dead and with me. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' grant that you may find '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ruth 3:1
    marker-yv: yv-n
  - type: text
    text: rest, each in the house of her husband.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So she kissed them, and they lifted up their voices and wept. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And they said to her, “Surely we will return with you to your people.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But Naomi said, “Turn back, my daughters; why will you go with me? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Are
  - type: text
    text: ' there still sons in my womb, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 38:11; Deut. 25:5
    marker-yv: yv-n
  - type: text
    text: 'that they may be your husbands? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Turn back, my daughters, go—for I am too old to have a husband. If I should say I have hope, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: if
  - type: text
    text: ' I should have a husband tonight and should also bear sons, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'would you wait for them till they were grown? Would you restrain yourselves from having husbands? No, my daughters; for it grieves me very much for your sakes that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 2:15; Job 19:21; Ps. 32:4; 38:2
    marker-yv: yv-n
  - type: text
    text: 'the hand of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has gone out against me!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then they lifted up their voices and wept again; and Orpah kissed her mother-in-law, but Ruth '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Prov. 17:17)
    marker-yv: yv-n
  - type: text
    text: clung to her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And she said, “Look, your sister-in-law has gone back to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 11:24
    marker-yv: yv-n
  - type: text
    text: 'her people and to her gods; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 1:15
    marker-yv: yv-n
  - type: text
    text: 'return after your sister-in-law.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But Ruth said:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 2:2, 4, 6
    marker-yv: yv-n
  - type: text
    text: “Entreat me not to leave you,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Or
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' turn back from following after you;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For wherever you go, I will go;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And wherever you lodge, I will lodge;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ruth 2:11, 12
    marker-yv: yv-n
  - type: text
    text: 'Your people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' my people,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And your God, my God.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Where you die, I will die,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And there will I be buried.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 3:17; 2 Sam. 19:13; 2 Kin. 6:31
    marker-yv: yv-n
  - type: text
    text: 'The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' do so to me, and more also,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'If '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anything
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but
  - type: text
    text: ' death parts you and me.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 21:14
    marker-yv: yv-n
  - type: text
    text: When she saw that she was determined to go with her, she stopped speaking to her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now the two of them went until they came to Bethlehem. And it happened, when they had come to Bethlehem, that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 21:10
    marker-yv: yv-n
  - type: text
    text: 'all the city was excited because of them; and the women said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 23:7; Lam. 2:15
    marker-yv: yv-n
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Is
  - type: text
    text: ' this Naomi?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But she said to them, “Do not call me Naomi; call me Mara, for the Almighty has dealt very bitterly with me. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I went out full, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 1:21
    marker-yv: yv-n
  - type: text
    text: 'and the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has brought me home again empty. Why do you call me Naomi, since the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has testified against me, and the Almighty has afflicted me?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So Naomi returned, and Ruth the Moabitess her daughter-in-law with her, who returned from the country of Moab. Now they came to Bethlehem '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ruth 2:23; 2 Sam. 21:9
    marker-yv: yv-n
  - type: text
    text: at the beginning of barley harvest.
