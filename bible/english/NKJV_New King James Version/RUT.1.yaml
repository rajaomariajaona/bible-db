document_id: RUT.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Elimelech’s Family Goes to Moab
  - type: text
    content: 'Now it came to pass, in the days when '
  - type: note
    content: Judg. 2:16–18
  - type: text
    content: 'the judges ruled, that there was '
  - type: note
    content: Gen. 12:10; 26:1; 2 Kin. 8:1
  - type: text
    content: 'a famine in the land. And a certain man of '
  - type: note
    content: Judg. 17:8; Mic. 5:2
  - type: text
    content: 'Bethlehem, Judah, went to dwell in the country of '
  - type: note
    content: Gen. 19:37
  - type: text
    content: 'Moab, he and his wife and his two sons. '
  '10':
  - type: text
    content: And they said to her, “Surely we will return with you to your people.”
  '11':
  - type: text
    content: 'But Naomi said, “Turn back, my daughters; why will you go with me? '
  - type: text
    content: Are
  - type: text
    content: ' there still sons in my womb, '
  - type: note
    content: Gen. 38:11; Deut. 25:5
  - type: text
    content: 'that they may be your husbands? '
  '12':
  - type: text
    content: 'Turn back, my daughters, go—for I am too old to have a husband. If I should say I have hope, '
  - type: text
    content: if
  - type: text
    content: ' I should have a husband tonight and should also bear sons, '
  '13':
  - type: text
    content: 'would you wait for them till they were grown? Would you restrain yourselves from having husbands? No, my daughters; for it grieves me very much for your sakes that '
  - type: note
    content: Judg. 2:15; Job 19:21; Ps. 32:4; 38:2
  - type: text
    content: 'the hand of the '
  - type: heading
    content: Lord
  - type: text
    content: ' has gone out against me!”'
  '14':
  - type: text
    content: 'Then they lifted up their voices and wept again; and Orpah kissed her mother-in-law, but Ruth '
  - type: note
    content: (Prov. 17:17)
  - type: text
    content: clung to her.
  '15':
  - type: text
    content: 'And she said, “Look, your sister-in-law has gone back to '
  - type: note
    content: Judg. 11:24
  - type: text
    content: 'her people and to her gods; '
  - type: note
    content: Josh. 1:15
  - type: text
    content: 'return after your sister-in-law.” '
  '16':
  - type: text
    content: 'But Ruth said:'
  - type: note
    content: 2 Kin. 2:2, 4, 6
  - type: text
    content: “Entreat me not to leave you,
  - type: text
    content: Or
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' turn back from following after you;'
  - type: text
    content: For wherever you go, I will go;
  - type: text
    content: And wherever you lodge, I will lodge;
  - type: note
    content: Ruth 2:11, 12
  - type: text
    content: 'Your people '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' my people,'
  - type: text
    content: And your God, my God.
  '17':
  - type: text
    content: Where you die, I will die,
  - type: text
    content: And there will I be buried.
  - type: note
    content: 1 Sam. 3:17; 2 Sam. 19:13; 2 Kin. 6:31
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' do so to me, and more also,'
  - type: text
    content: 'If '
  - type: text
    content: anything
  - type: text
    content: ' '
  - type: text
    content: but
  - type: text
    content: ' death parts you and me.”'
  '18':
  - type: note
    content: Acts 21:14
  - type: text
    content: When she saw that she was determined to go with her, she stopped speaking to her.
  '19':
  - type: text
    content: 'Now the two of them went until they came to Bethlehem. And it happened, when they had come to Bethlehem, that '
  - type: note
    content: Matt. 21:10
  - type: text
    content: 'all the city was excited because of them; and the women said, '
  - type: note
    content: Is. 23:7; Lam. 2:15
  - type: text
    content: “
  - type: text
    content: Is
  - type: text
    content: ' this Naomi?”'
  '2':
  - type: text
    content: 'The name of the man '
  - type: text
    content: was
  - type: text
    content: ' Elimelech, the name of his wife '
  - type: text
    content: was
  - type: text
    content: ' Naomi, and the names of his two sons '
  - type: text
    content: were
  - type: text
    content: ' Mahlon and Chilion—'
  - type: note
    content: Gen. 35:19; 1 Sam. 1:1; 1 Kin. 11:26
  - type: text
    content: 'Ephrathites of Bethlehem, Judah. And they went '
  - type: note
    content: Judg. 3:30
  - type: text
    content: 'to the country of Moab and remained there. '
  '20':
  - type: text
    content: 'But she said to them, “Do not call me Naomi; call me Mara, for the Almighty has dealt very bitterly with me. '
  '21':
  - type: text
    content: 'I went out full, '
  - type: note
    content: Job 1:21
  - type: text
    content: 'and the '
  - type: heading
    content: Lord
  - type: text
    content: ' has brought me home again empty. Why do you call me Naomi, since the '
  - type: heading
    content: Lord
  - type: text
    content: ' has testified against me, and the Almighty has afflicted me?”'
  '22':
  - type: text
    content: 'So Naomi returned, and Ruth the Moabitess her daughter-in-law with her, who returned from the country of Moab. Now they came to Bethlehem '
  - type: note
    content: Ruth 2:23; 2 Sam. 21:9
  - type: text
    content: at the beginning of barley harvest.
  '3':
  - type: text
    content: 'Then Elimelech, Naomi’s husband, died; and she was left, and her two sons. '
  '4':
  - type: text
    content: 'Now they took wives of the women of Moab: the name of the one '
  - type: text
    content: was
  - type: text
    content: ' Orpah, and the name of the other Ruth. And they dwelt there about ten years. '
  '5':
  - type: text
    content: Then both Mahlon and Chilion also died; so the woman survived her two sons and her husband.
  - type: heading
    content: Naomi Returns with Ruth
  '6':
  - type: text
    content: 'Then she arose with her daughters-in-law that she might return from the country of Moab, for she had heard in the country of Moab that the '
  - type: heading
    content: Lord
  - type: text
    content: ' had '
  - type: note
    content: Ex. 3:16; 4:31; Jer. 29:10; Zeph. 2:7; Luke 1:68
  - type: text
    content: 'visited His people by '
  - type: note
    content: Ps. 132:15; Matt. 6:11
  - type: text
    content: 'giving them bread. '
  '7':
  - type: text
    content: 'Therefore she went out from the place where she was, and her two daughters-in-law with her; and they went on the way to return to the land of Judah. '
  '8':
  - type: text
    content: 'And Naomi said to her two daughters-in-law, '
  - type: note
    content: Josh. 24:15
  - type: text
    content: '“Go, return each to her mother’s house. '
  - type: note
    content: 2 Tim. 1:16–18
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' deal kindly with you, as you have dealt '
  - type: note
    content: Ruth 2:20
  - type: text
    content: 'with the dead and with me. '
  '9':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' grant that you may find '
  - type: note
    content: Ruth 3:1
  - type: text
    content: rest, each in the house of her husband.”
  - type: text
    content: 'So she kissed them, and they lifted up their voices and wept. '
