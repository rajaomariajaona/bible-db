  - type: text
    content: like
  - type: text
    content: ' a lily blossom. It contained two thousand baths.'
  - type: heading
    content: The Carts and the Lavers
  '27':
  - type: text
    content: 'He also made ten carts of bronze; four cubits '
  - type: text
    content: was
  - type: text
    content: ' the length of each cart, four cubits its width, and three cubits its height. '
  '28':
  - type: text
    content: 'And this '
  - type: text
    content: was
  - type: text
    content: ' the design of the carts: They had panels, and the panels '
  - type: text
    content: were
  - type: text
    content: ' between frames; '
