  - type: text
    content: 'the Sea of cast bronze, ten cubits from one brim to the other; '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' completely round. Its height '
  - type: text
    content: was
  - type: text
    content: ' five cubits, and a line of thirty cubits measured its circumference.'
  '24':
  - type: text
    content: 'Below its brim '
  - type: text
    content: were
  - type: text
    content: ' ornamental buds encircling it all around, ten to a cubit, '
  - type: note
