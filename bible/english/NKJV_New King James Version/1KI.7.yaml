  - type: text
    content: 'on the panels that '
  - type: text
    content: were
  - type: text
    content: ' between the frames '
  - type: text
    content: were
  - type: text
    content: ' lions, oxen, and cherubim. And on the frames '
  - type: text
    content: was
  - type: text
    content: ' a pedestal on top. Below the lions and oxen '
  - type: text
    content: were
  - type: text
    content: ' wreaths of plaited work. '
  '3':
  - type: text
    content: 'And '
  - type: text
