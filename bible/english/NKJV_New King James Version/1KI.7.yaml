document_id: 1KI.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Other Buildings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But Solomon took '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 3:1; 9:10; 2 Chr. 8:1
    marker-yv: yv-n
  - type: text
    text: thirteen years to build his own house; so he finished all his house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He also built the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 10:17, 21; 2 Chr. 9:16
    marker-yv: yv-n
  - type: text
    text: 'House of the Forest of Lebanon; its length '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' one hundred cubits, its width fifty cubits, and its height thirty cubits, with four rows of cedar pillars, and cedar beams on the pillars. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' paneled with cedar above the beams that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' on forty-five pillars, fifteen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' a row. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: it
    children:
    - type: text
      text: There
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' windows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: beveled
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: frames
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' three rows, and window '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' opposite window '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' three tiers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And all the doorways and doorposts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had
  - type: text
    text: ' rectangular frames; and window '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' opposite window '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' three tiers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He also made the Hall of Pillars: its length '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' fifty cubits, and its width thirty cubits; and in front of them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a portico with pillars, and a canopy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in front of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he made a hall for the throne, the Hall of Judgment, where he might judge; and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' paneled with cedar from floor to ceiling.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the house where he dwelt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had
  - type: text
    text: ' another court inside the hall, of like workmanship. Solomon also made a house like this hall for Pharaoh’s daughter, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 3:1; 9:24; 11:1; 2 Chr. 8:11
    marker-yv: yv-n
  - type: text
    text: 'whom he had taken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wife.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'All these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' costly stones cut to size, trimmed with saws, inside and out, from the foundation to the eaves, and also on the outside to the great court. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The foundation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' costly stones, large stones, some ten cubits and some eight cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And above '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' costly stones, hewn to size, and cedar wood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The great court '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' enclosed with three rows of hewn stones and a row of cedar beams. So were the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 6:36
    marker-yv: yv-n
  - type: text
    text: 'inner court of the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 10:23; Acts 3:11
    marker-yv: yv-n
  - type: text
    text: and the vestibule of the temple.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hiram the Craftsman
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now King Solomon sent and brought Huram from Tyre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 2:14
    marker-yv: yv-n
  - type: text
    text: 'He '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the son of a widow from the tribe of Naphtali, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 4:16
    marker-yv: yv-n
  - type: text
    text: 'his father '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a man of Tyre, a bronze worker; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 31:3; 36:1
    marker-yv: yv-n
  - type: text
    text: he was filled with wisdom and understanding and skill in working with all kinds of bronze work. So he came to King Solomon and did all his work.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Bronze Pillars for the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he cast '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:17; 2 Chr. 3:15; 4:12; Jer. 52:21
    marker-yv: yv-n
  - type: text
    text: 'two pillars of bronze, each one eighteen cubits high, and a line of twelve cubits measured the circumference of each. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then he made two capitals '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' cast bronze, to set on the tops of the pillars. The height of one capital '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits, and the height of the other capital '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: it
    children:
    - type: text
      text: He
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: made
  - type: text
    text: ' a lattice network, with wreaths of chainwork, for the capitals which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' on top of the pillars: seven chains for one capital and seven for the other capital. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So he made the pillars, and two rows of pomegranates above the network all around to cover the capitals that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' on top; and thus he did for the other capital.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The capitals which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' on top of the pillars in the hall '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in the shape of lilies, four cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The capitals on the two pillars also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pomegranates
  - type: text
    text: ' above, by the convex surface which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' next to the network; and there '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 3:16; 4:13; Jer. 52:23
    marker-yv: yv-n
  - type: text
    text: two hundred such pomegranates in rows on each of the capitals all around.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 3:17
    marker-yv: yv-n
  - type: text
    text: 'Then he set up the pillars by the vestibule of the temple; he set up the pillar on the right and called its name Jachin, and he set up the pillar on the left and called its name Boaz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The tops of the pillars were in the shape of lilies. So the work of the pillars was finished.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sea and the Oxen
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he made '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:13; 2 Chr. 4:2; Jer. 52:17
    marker-yv: yv-n
  - type: text
    text: 'the Sea of cast bronze, ten cubits from one brim to the other; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' completely round. Its height '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits, and a line of thirty cubits measured its circumference.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Below its brim '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' ornamental buds encircling it all around, ten to a cubit, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 4:3
    marker-yv: yv-n
  - type: text
    text: 'all the way around the Sea. The ornamental buds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' cast in two rows when it was cast. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'It stood on '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 4:4, 5; Jer. 52:20
    marker-yv: yv-n
  - type: text
    text: 'twelve oxen: three looking toward the north, three looking toward the west, three looking toward the south, and three looking toward the east; the Sea '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: set
  - type: text
    text: ' upon them, and all their back parts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pointed
  - type: text
    text: ' inward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'It '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a handbreadth thick; and its brim was shaped like the brim of a cup, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like
  - type: text
    text: ' a lily blossom. It contained two thousand baths.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Carts and the Lavers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'He also made ten carts of bronze; four cubits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the length of each cart, four cubits its width, and three cubits its height. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the design of the carts: They had panels, and the panels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' between frames; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'on the panels that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' between the frames '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' lions, oxen, and cherubim. And on the frames '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a pedestal on top. Below the lions and oxen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' wreaths of plaited work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Every cart had four bronze wheels and axles of bronze, and its four feet had supports. Under the laver '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' supports of cast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: bronze
  - type: text
    text: ' beside each wreath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Its opening inside the crown at the top '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' one cubit in diameter; and the opening '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' round, shaped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like
  - type: text
    text: ' a pedestal, one and a half cubits in outside diameter; and also on the opening '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' engravings, but the panels were square, not round. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Under the panels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the four wheels, and the axles of the wheels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: joined
  - type: text
    text: ' to the cart. The height of a wheel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' one and a half cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The workmanship of the wheels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' like the workmanship of a chariot wheel; their axle pins, their rims, their spokes, and their hubs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' all of cast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: bronze.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' four supports at the four corners of each cart; its supports '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' part of the cart itself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'On the top of the cart, at the height of half a cubit, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' perfectly round. And on the top of the cart, its flanges and its panels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' of the same casting. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'On the plates of its flanges and on its panels he engraved cherubim, lions, and palm trees, wherever there was a clear space on each, with wreaths all around. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
