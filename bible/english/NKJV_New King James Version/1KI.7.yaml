  - type: text
    content: was
  - type: text
    content: ' four cubits. On each of the ten carts '
  - type: text
    content: was
  - type: text
    content: ' a laver. '
  '39':
  - type: text
    content: And he put five carts on the right side of the house, and five on the left side of the house. He set the Sea on the right side of the house, toward the southeast.
