  '20':
  - type: text
    content: 'The capitals on the two pillars also '
  - type: text
    content: had
  - type: text
    content: ' '
  - type: text
    content: pomegranates
  - type: text
    content: ' above, by the convex surface which '
  - type: text
    content: was
  - type: text
