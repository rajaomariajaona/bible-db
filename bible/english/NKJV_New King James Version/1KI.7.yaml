  '1':
  - type: heading
    content: Solomon’s Other Buildings
  - type: text
    content: 'But Solomon took '
  - type: note
    content: 1 Kin. 3:1; 9:10; 2 Chr. 8:1
  - type: text
    content: thirteen years to build his own house; so he finished all his house.
  '10':
  - type: text
    content: 'The foundation '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' costly stones, large stones, some ten cubits and some eight cubits. '
  '11':
  - type: text
    content: 'And above '
  - type: text
    content: were
  - type: text
    content: ' costly stones, hewn to size, and cedar wood. '
  '12':
  - type: text
    content: 'The great court '
  - type: text
    content: was
  - type: text
    content: ' enclosed with three rows of hewn stones and a row of cedar beams. So were the '
  - type: note
