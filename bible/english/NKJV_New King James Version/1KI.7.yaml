  - type: text
    content: ' of the same casting. '
  '36':
  - type: text
    content: 'On the plates of its flanges and on its panels he engraved cherubim, lions, and palm trees, wherever there was a clear space on each, with wreaths all around. '
  '37':
  - type: text
    content: 'Thus he made the ten carts. All of them were of the same mold, one measure, '
  - type: text
    content: and
  - type: text
    content: ' one shape.'
