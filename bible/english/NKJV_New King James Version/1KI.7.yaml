  '16':
  - type: text
    content: 'Then he made two capitals '
  - type: text
    content: of
  - type: text
    content: ' cast bronze, to set on the tops of the pillars. The height of one capital '
  - type: text
    content: was
  - type: text
    content: ' five cubits, and the height of the other capital '
  - type: text
    content: was
  - type: text
    content: ' five cubits. '
  '17':
  - type: text
    content: He
  - type: text
    content: ' '
  - type: text
    content: made
  - type: text
    content: ' a lattice network, with wreaths of chainwork, for the capitals which '
  - type: text
    content: were
  - type: text
    content: ' on top of the pillars: seven chains for one capital and seven for the other capital. '
  '18':
  - type: text
    content: 'So he made the pillars, and two rows of pomegranates above the network all around to cover the capitals that '
  - type: text
    content: were
  - type: text
    content: ' on top; and thus he did for the other capital.'
  '19':
  - type: text
    content: 'The capitals which '
  - type: text
    content: were
  - type: text
