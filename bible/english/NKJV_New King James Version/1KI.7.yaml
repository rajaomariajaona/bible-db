  '21':
  - type: note
    content: 2 Chr. 3:17
  - type: text
    content: 'Then he set up the pillars by the vestibule of the temple; he set up the pillar on the right and called its name Jachin, and he set up the pillar on the left and called its name Boaz. '
  '22':
  - type: text
    content: The tops of the pillars were in the shape of lilies. So the work of the pillars was finished.
  - type: heading
