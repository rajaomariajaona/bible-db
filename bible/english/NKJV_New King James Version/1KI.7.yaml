  - type: text
    content: to
  - type: text
    content: ' a row. '
  '30':
  - type: text
    content: 'Every cart had four bronze wheels and axles of bronze, and its four feet had supports. Under the laver '
  - type: text
    content: were
  - type: text
    content: ' supports of cast '
  - type: text
    content: bronze
  - type: text
    content: ' beside each wreath. '
  '31':
  - type: text
    content: 'Its opening inside the crown at the top '
  - type: text
    content: was
  - type: text
    content: ' one cubit in diameter; and the opening '
  - type: text
    content: was
  - type: text
    content: ' round, shaped '
  - type: text
    content: like
  - type: text
    content: ' a pedestal, one and a half cubits in outside diameter; and also on the opening '
  - type: text
