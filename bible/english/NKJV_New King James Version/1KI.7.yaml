  - type: note
    content: 2 Chr. 4:16
  - type: text
    content: 'his father '
  - type: text
    content: was
  - type: text
    content: ' a man of Tyre, a bronze worker; '
  - type: note
    content: Ex. 31:3; 36:1
  - type: text
    content: he was filled with wisdom and understanding and skill in working with all kinds of bronze work. So he came to King Solomon and did all his work.
  - type: heading
    content: The Bronze Pillars for the Temple
  '15':
  - type: text
    content: 'And he cast '
  - type: note
    content: 2 Kin. 25:17; 2 Chr. 3:15; 4:12; Jer. 52:21
  - type: text
