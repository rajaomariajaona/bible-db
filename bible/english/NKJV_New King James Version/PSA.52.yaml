    text: I trust in the mercy of God forever and ever.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I will praise You forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Because You have done '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And in the presence of Your saints
- type: usfm
  marker: q2
  children:
