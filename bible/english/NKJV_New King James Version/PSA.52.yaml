  children:
  - type: text
    text: 'To the Chief Musician. A Contemplation of David '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 22:9
    marker-yv: yv-n
  - type: text
    text: 'when Doeg the Edomite went and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 22:9
    marker-yv: yv-n
  - type: text
    text: told Saul, and said to him, “David has gone to the house of Ahimelech.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Why do you boast in evil, O mighty man?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The goodness of God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: endures
  - type: text
    text: ' continually.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Your tongue devises destruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Like a sharp razor, working deceitfully.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You love evil more than good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Lying rather than speaking righteousness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You love all devouring words,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: You
  - type: text
    text: ' deceitful tongue.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: God shall likewise destroy you forever;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He shall take you away, and pluck you out of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' dwelling place,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And uproot you from the land of the living.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The righteous also shall see and fear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And shall laugh at him, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Here is the man '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' did not make God his strength,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But trusted in the abundance of his riches,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: And
  - type: text
    text: ' strengthened himself in his wickedness.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: am
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
