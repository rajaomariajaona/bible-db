type_code: eng
verses:
  '1':
  - type: heading
    content: Rich Oppressors Will Be Judged
  - type: text
    content: 'Come now, '
  - type: text
    content: you
  - type: text
    content: ' '
  - type: note
    content: Prov. 11:28; (Luke 6:24; 1 Tim. 6:9)
  - type: text
    content: 'rich, weep and howl for your miseries that are coming upon '
  - type: text
    content: you!
  - type: text
    content: ' '
  '10':
  - type: note
    content: Matt. 5:12
  - type: text
    content: 'My brethren, take the prophets, who spoke in the name of the Lord, as an example of suffering and '
  - type: note
    content: Heb. 10:36
  - type: text
    content: 'patience. '
  '11':
  - type: text
    content: 'Indeed '
  - type: note
    content: (Ps. 94:12; Matt. 5:10); James 1:2
  - type: text
    content: 'we count them blessed who '
  - type: note
    content: (James 1:12)
  - type: text
    content: 'endure. You have heard of '
  - type: note
    content: Job 1:21, 22; 2:10
  - type: text
    content: 'the perseverance of Job and seen '
  - type: note
    content: Job 42:10
  - type: text
    content: 'the end '
  - type: text
    content: intended
  - type: text
    content: ' '
  - type: text
    content: by
  - type: text
    content: ' the Lord—that '
  - type: note
    content: Num. 14:18
  - type: text
    content: the Lord is very compassionate and merciful.
  '12':
  - type: text
    content: 'But above all, my brethren, '
  - type: note
    content: Matt. 5:34–37
  - type: text
    content: 'do not swear, either by heaven or by earth or with any other oath. But let your “Yes” be “Yes,” and '
  - type: text
    content: your
  - type: text
    content: ' “No,” “No,” lest you fall into judgment.'
  - type: heading
    content: Meeting Specific Needs
  '13':
  - type: text
    content: 'Is anyone among you suffering? Let him '
  - type: note
    content: Ps. 50:14, 15
  - type: text
    content: 'pray. Is anyone cheerful? '
  - type: note
    content: Eph. 5:19
  - type: text
    content: 'Let him sing psalms. '
  '14':
  - type: text
    content: 'Is anyone among you sick? Let him call for the elders of the church, and let them pray over him, '
  - type: note
    content: Mark 6:13; 16:18
  - type: text
    content: 'anointing him with oil in the name of the Lord. '
  '15':
  - type: text
    content: 'And the prayer of faith will save the sick, and the Lord will raise him up. '
  - type: note
    content: Is. 33:24
  - type: text
    content: 'And if he has committed sins, he will be forgiven. '
  '16':
  - type: text
    content: 'Confess '
  - type: text
    content: your
  - type: text
    content: ' trespasses to one another, and pray for one another, that you may be healed. '
  - type: note
    content: Num. 11:2
  - type: text
    content: 'The effective, fervent prayer of a righteous man avails much. '
  '17':
  - type: text
    content: 'Elijah was a man '
  - type: note
    content: Acts 14:15
  - type: text
    content: 'with a nature like ours, and '
  - type: note
    content: 1 Kin. 17:1; 18:1
  - type: text
    content: 'he prayed earnestly that it would not rain; and it did not rain on the land for three years and six months. '
  '18':
  - type: text
    content: 'And he prayed '
  - type: note
    content: 1 Kin. 18:1, 42
  - type: text
    content: again, and the heaven gave rain, and the earth produced its fruit.
  - type: heading
    content: Bring Back the Erring One
  '19':
  - type: text
    content: 'Brethren, if anyone among you wanders from the truth, and someone '
  - type: note
    content: Matt. 18:15; Gal. 6:1
  - type: text
    content: 'turns him back, '
  '2':
  - type: text
    content: 'Your '
  - type: note
    content: Jer. 17:11; Matt. 6:19
  - type: text
    content: 'riches are corrupted, and '
  - type: note
    content: Job 13:28
  - type: text
    content: 'your garments are moth-eaten. '
  '20':
  - type: text
    content: 'let him know that he who turns a sinner from the error of his way '
  - type: note
    content: Rom. 11:14; 1 Cor. 1:21; James 1:21
  - type: text
    content: 'will save a soul from death and '
  - type: note
    content: Prov. 10:12; (1 Pet. 4:8)
  - type: text
    content: cover a multitude of sins.
  '3':
  - type: text
    content: 'Your gold and silver are corroded, and their corrosion will be a witness against you and will eat your flesh like fire. '
  - type: note
    content: Rom. 2:5
  - type: text
    content: 'You have heaped up treasure in the last days. '
  '4':
  - type: text
    content: 'Indeed '
  - type: note
    content: Lev. 19:13; Job 24:10; Jer. 22:13; Mal. 3:5
  - type: text
    content: 'the wages of the laborers who mowed your fields, which you kept back by fraud, cry out; and '
  - type: note
    content: Ex. 2:23; Deut. 24:15; Job 31:38
  - type: text
    content: 'the cries of the reapers have reached the ears of the Lord of Sabaoth. '
  '5':
  - type: text
    content: 'You have lived on the earth in pleasure and luxury; you have fattened your hearts as in a day of slaughter. '
  '6':
  - type: text
    content: You have condemned, you have murdered the just; he does not resist you.
  - type: heading
    content: Be Patient and Persevering
  '7':
  - type: text
    content: 'Therefore be patient, brethren, until the coming of the Lord. See '
  - type: text
    content: how
  - type: text
    content: ' the farmer waits for the precious fruit of the earth, waiting patiently for it until it receives the early and latter rain. '
  '8':
  - type: text
    content: You also be patient. Establish your hearts, for the coming of the Lord is at hand.
  '9':
  - type: text
    content: 'Do not grumble against one another, brethren, lest you be condemned. Behold, the Judge is standing at the door! '
