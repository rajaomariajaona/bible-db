document_id: JAS.5,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rich Oppressors Will Be Judged
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Come now, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 11:28; (Luke 6:24; 1 Tim. 6:9)
      marker-yv: yv-n
    - type: text
      text: 'rich, weep and howl for your miseries that are coming upon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you!
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 5:12
      marker-yv: yv-n
    - type: text
      text: 'My brethren, take the prophets, who spoke in the name of the Lord, as an example of suffering and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 10:36
      marker-yv: yv-n
    - type: text
      text: 'patience. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Indeed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 94:12; Matt. 5:10); James 1:2
      marker-yv: yv-n
    - type: text
      text: 'we count them blessed who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (James 1:12)
      marker-yv: yv-n
    - type: text
      text: 'endure. You have heard of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:21, 22; 2:10
      marker-yv: yv-n
    - type: text
      text: 'the perseverance of Job and seen '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 42:10
      marker-yv: yv-n
    - type: text
      text: 'the end '
    - type: usfm
      marker: it
      children:
      - type: text
        text: intended
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by
    - type: text
      text: ' the Lord—that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:18
      marker-yv: yv-n
    - type: text
      text: the Lord is very compassionate and merciful.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But above all, my brethren, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 5:34–37
      marker-yv: yv-n
    - type: text
      text: 'do not swear, either by heaven or by earth or with any other oath. But let your “Yes” be “Yes,” and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' “No,” “No,” lest you fall into judgment.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Meeting Specific Needs
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Is anyone among you suffering? Let him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 50:14, 15
      marker-yv: yv-n
    - type: text
      text: 'pray. Is anyone cheerful? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 5:19
      marker-yv: yv-n
    - type: text
      text: 'Let him sing psalms. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Is anyone among you sick? Let him call for the elders of the church, and let them pray over him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 6:13; 16:18
      marker-yv: yv-n
    - type: text
      text: 'anointing him with oil in the name of the Lord. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the prayer of faith will save the sick, and the Lord will raise him up. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 33:24
      marker-yv: yv-n
    - type: text
      text: 'And if he has committed sins, he will be forgiven. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Confess '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' trespasses to one another, and pray for one another, that you may be healed. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 11:2
      marker-yv: yv-n
    - type: text
      text: 'The effective, fervent prayer of a righteous man avails much. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Elijah was a man '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 14:15
      marker-yv: yv-n
    - type: text
      text: 'with a nature like ours, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 17:1; 18:1
      marker-yv: yv-n
    - type: text
      text: 'he prayed earnestly that it would not rain; and it did not rain on the land for three years and six months. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And he prayed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 18:1, 42
      marker-yv: yv-n
    - type: text
      text: again, and the heaven gave rain, and the earth produced its fruit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bring Back the Erring One
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Brethren, if anyone among you wanders from the truth, and someone '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 18:15; Gal. 6:1
      marker-yv: yv-n
    - type: text
      text: 'turns him back, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 17:11; Matt. 6:19
      marker-yv: yv-n
    - type: text
      text: 'riches are corrupted, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 13:28
      marker-yv: yv-n
    - type: text
      text: 'your garments are moth-eaten. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'let him know that he who turns a sinner from the error of his way '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 11:14; 1 Cor. 1:21; James 1:21
      marker-yv: yv-n
    - type: text
      text: 'will save a soul from death and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 10:12; (1 Pet. 4:8)
      marker-yv: yv-n
    - type: text
      text: cover a multitude of sins.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Your gold and silver are corroded, and their corrosion will be a witness against you and will eat your flesh like fire. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 2:5
      marker-yv: yv-n
    - type: text
      text: 'You have heaped up treasure in the last days. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Indeed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:13; Job 24:10; Jer. 22:13; Mal. 3:5
      marker-yv: yv-n
    - type: text
      text: 'the wages of the laborers who mowed your fields, which you kept back by fraud, cry out; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 2:23; Deut. 24:15; Job 31:38
      marker-yv: yv-n
    - type: text
      text: 'the cries of the reapers have reached the ears of the Lord of Sabaoth. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'You have lived on the earth in pleasure and luxury; you have fattened your hearts as in a day of slaughter. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You have condemned, you have murdered the just; he does not resist you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Be Patient and Persevering
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Therefore be patient, brethren, until the coming of the Lord. See '
    - type: usfm
      marker: it
      children:
      - type: text
        text: how
    - type: text
      text: ' the farmer waits for the precious fruit of the earth, waiting patiently for it until it receives the early and latter rain. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: You also be patient. Establish your hearts, for the coming of the Lord is at hand.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Do not grumble against one another, brethren, lest you be condemned. Behold, the Judge is standing at the door! '
