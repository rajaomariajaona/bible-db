document_id: EPH.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Children and Parents
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Children, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 6:20; 23:22; Col. 3:20
    marker-yv: yv-n
  - type: text
    text: 'obey your parents in the Lord, for this is right. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 20:12; Deut. 5:16
    marker-yv: yv-n
  - type: text
    text: '“Honor your father and mother,” which is the first commandment with promise: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “that it may be well with you and you may live long on the earth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 3:21
    marker-yv: yv-n
  - type: text
    text: 'you, fathers, do not provoke your children to wrath, but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 18:19; Deut. 6:7; 11:19; Ps. 78:4; Prov. 22:6; 2 Tim. 3:15
    marker-yv: yv-n
  - type: text
    text: bring them up in the training and admonition of the Lord.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bondservants and Masters
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 3:22; (1 Tim. 6:1); Titus 2:9; 1 Pet. 2:18
    marker-yv: yv-n
  - type: text
    text: 'Bondservants, be obedient to those who are your masters according to the flesh, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 7:15
    marker-yv: yv-n
  - type: text
    text: 'with fear and trembling, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 29:17
    marker-yv: yv-n
  - type: text
    text: 'in sincerity of heart, as to Christ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 3:22
    marker-yv: yv-n
  - type: text
    text: 'not with eyeservice, as men-pleasers, but as bondservants of Christ, doing the will of God from the heart, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'with goodwill doing service, as to the Lord, and not to men, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 2:6
    marker-yv: yv-n
  - type: text
    text: 'knowing that whatever good anyone does, he will receive the same from the Lord, whether '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a slave or free.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And you, masters, do the same things to them, giving up threatening, knowing that your own '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 31:13; John 13:13; Col. 4:1
    marker-yv: yv-n
  - type: text
    text: 'Master also is in heaven, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 10:17; Acts 10:34; Rom. 2:11; Col. 3:25
    marker-yv: yv-n
  - type: text
    text: there is no partiality with Him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Whole Armor of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Finally, my brethren, be strong in the Lord and in the power of His might. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Cor. 6:7)
    marker-yv: yv-n
  - type: text
    text: 'Put on the whole armor of God, that you may be able to stand against the wiles of the devil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For we do not wrestle against flesh and blood, but against '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 8:38
    marker-yv: yv-n
  - type: text
    text: 'principalities, against powers, against '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 22:53
    marker-yv: yv-n
  - type: text
    text: 'the rulers of the darkness of this age, against spiritual '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hosts
  - type: text
    text: ' of wickedness in the heavenly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: places.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Cor. 10:4)
    marker-yv: yv-n
  - type: text
    text: 'Therefore take up the whole armor of God, that you may be able to withstand '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 5:16
    marker-yv: yv-n
  - type: text
    text: in the evil day, and having done all, to stand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Stand therefore, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 11:5; Luke 12:35; 1 Pet. 1:13
    marker-yv: yv-n
  - type: text
    text: 'having girded your waist with truth, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 59:17; Rom. 13:12; Eph. 6:13; 1 Thess. 5:8
    marker-yv: yv-n
  - type: text
    text: 'having put on the breastplate of righteousness, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 52:7; Rom. 10:15
    marker-yv: yv-n
  - type: text
    text: 'and having shod your feet with the preparation of the gospel of peace; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'above all, taking '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 John 5:4
    marker-yv: yv-n
  - type: text
    text: 'the shield of faith with which you will be able to quench all the fiery darts of the wicked one. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 5:8
    marker-yv: yv-n
  - type: text
    text: 'take the helmet of salvation, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 49:2; Hos. 6:5; (Heb. 4:12)
    marker-yv: yv-n
  - type: text
    text: 'the sword of the Spirit, which is the word of God; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 18:1; Col. 1:3; 4:2; 1 Thess. 5:17
    marker-yv: yv-n
  - type: text
    text: 'praying always with all prayer and supplication in the Spirit, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Matt. 26:41)
    marker-yv: yv-n
  - type: text
    text: 'being watchful to this end with all perseverance and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 1:4
    marker-yv: yv-n
  - type: text
    text: 'supplication for all the saints— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and for me, that utterance may be given to me, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 4:29; Col. 4:3
    marker-yv: yv-n
  - type: text
    text: 'that I may open my mouth boldly to make known the mystery of the gospel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'for which '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 5:20; Philem. 9
    marker-yv: yv-n
  - type: text
    text: I am an ambassador in chains; that in it I may speak boldly, as I ought to speak.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Gracious Greeting
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But that you also may know my affairs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' how I am doing, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 20:4; 2 Tim. 4:12; Titus 3:12
    marker-yv: yv-n
  - type: text
    text: 'Tychicus, a beloved brother and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 4:1, 2
    marker-yv: yv-n
  - type: text
    text: 'faithful minister in the Lord, will make all things known to you; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 4:8
    marker-yv: yv-n
  - type: text
    text: 'whom I have sent to you for this very purpose, that you may know our affairs, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' he may '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 1:6
    marker-yv: yv-n
  - type: text
    text: comfort your hearts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Peace to the brethren, and love with faith, from God the Father and the Lord Jesus Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Grace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' with all those who love our Lord Jesus Christ in sincerity. Amen.'
