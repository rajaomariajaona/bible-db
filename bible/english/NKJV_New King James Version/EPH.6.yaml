document_id: EPH.6,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Children and Parents
  - type: text
    content: 'Children, '
  - type: note
    content: Prov. 6:20; 23:22; Col. 3:20
  - type: text
    content: 'obey your parents in the Lord, for this is right. '
  '10':
  - type: text
    content: 'Finally, my brethren, be strong in the Lord and in the power of His might. '
  '11':
  - type: note
    content: (2 Cor. 6:7)
  - type: text
    content: 'Put on the whole armor of God, that you may be able to stand against the wiles of the devil. '
  '12':
  - type: text
    content: 'For we do not wrestle against flesh and blood, but against '
  - type: note
    content: Rom. 8:38
  - type: text
    content: 'principalities, against powers, against '
  - type: note
    content: Luke 22:53
  - type: text
    content: 'the rulers of the darkness of this age, against spiritual '
  - type: text
    content: hosts
  - type: text
    content: ' of wickedness in the heavenly '
  - type: text
    content: places.
  - type: text
    content: ' '
  '13':
  - type: note
    content: (2 Cor. 10:4)
  - type: text
    content: 'Therefore take up the whole armor of God, that you may be able to withstand '
  - type: note
    content: Eph. 5:16
  - type: text
    content: in the evil day, and having done all, to stand.
  '14':
  - type: text
    content: 'Stand therefore, '
  - type: note
    content: Is. 11:5; Luke 12:35; 1 Pet. 1:13
  - type: text
    content: 'having girded your waist with truth, '
  - type: note
    content: Is. 59:17; Rom. 13:12; Eph. 6:13; 1 Thess. 5:8
  - type: text
    content: 'having put on the breastplate of righteousness, '
  '15':
  - type: note
    content: Is. 52:7; Rom. 10:15
  - type: text
    content: 'and having shod your feet with the preparation of the gospel of peace; '
  '16':
  - type: text
    content: 'above all, taking '
  - type: note
    content: 1 John 5:4
  - type: text
    content: 'the shield of faith with which you will be able to quench all the fiery darts of the wicked one. '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: 1 Thess. 5:8
  - type: text
    content: 'take the helmet of salvation, and '
  - type: note
    content: Is. 49:2; Hos. 6:5; (Heb. 4:12)
  - type: text
    content: 'the sword of the Spirit, which is the word of God; '
  '18':
  - type: note
    content: Luke 18:1; Col. 1:3; 4:2; 1 Thess. 5:17
  - type: text
    content: 'praying always with all prayer and supplication in the Spirit, '
  - type: note
    content: (Matt. 26:41)
  - type: text
    content: 'being watchful to this end with all perseverance and '
  - type: note
    content: Phil. 1:4
  - type: text
    content: 'supplication for all the saints— '
  '19':
  - type: text
    content: 'and for me, that utterance may be given to me, '
  - type: note
    content: Acts 4:29; Col. 4:3
  - type: text
    content: 'that I may open my mouth boldly to make known the mystery of the gospel, '
  '2':
  - type: note
    content: Ex. 20:12; Deut. 5:16
  - type: text
    content: '“Honor your father and mother,” which is the first commandment with promise: '
  '20':
  - type: text
    content: 'for which '
  - type: note
    content: 2 Cor. 5:20; Philem. 9
  - type: text
    content: I am an ambassador in chains; that in it I may speak boldly, as I ought to speak.
  - type: heading
    content: A Gracious Greeting
  '21':
  - type: text
    content: 'But that you also may know my affairs '
  - type: text
    content: and
  - type: text
    content: ' how I am doing, '
  - type: note
    content: Acts 20:4; 2 Tim. 4:12; Titus 3:12
  - type: text
    content: 'Tychicus, a beloved brother and '
  - type: note
    content: 1 Cor. 4:1, 2
  - type: text
    content: 'faithful minister in the Lord, will make all things known to you; '
  '22':
  - type: note
    content: Col. 4:8
  - type: text
    content: 'whom I have sent to you for this very purpose, that you may know our affairs, and '
  - type: text
    content: that
  - type: text
    content: ' he may '
  - type: note
    content: 2 Cor. 1:6
  - type: text
    content: comfort your hearts.
  '23':
  - type: text
    content: 'Peace to the brethren, and love with faith, from God the Father and the Lord Jesus Christ. '
  '24':
  - type: text
    content: 'Grace '
  - type: text
    content: be
  - type: text
    content: ' with all those who love our Lord Jesus Christ in sincerity. Amen.'
  '3':
  - type: text
    content: “that it may be well with you and you may live long on the earth.”
  '4':
  - type: text
    content: 'And '
  - type: note
    content: Col. 3:21
  - type: text
    content: 'you, fathers, do not provoke your children to wrath, but '
  - type: note
    content: Gen. 18:19; Deut. 6:7; 11:19; Ps. 78:4; Prov. 22:6; 2 Tim. 3:15
  - type: text
    content: bring them up in the training and admonition of the Lord.
  - type: heading
    content: Bondservants and Masters
  '5':
  - type: note
    content: Col. 3:22; (1 Tim. 6:1); Titus 2:9; 1 Pet. 2:18
  - type: text
    content: 'Bondservants, be obedient to those who are your masters according to the flesh, '
  - type: note
    content: 2 Cor. 7:15
  - type: text
    content: 'with fear and trembling, '
  - type: note
    content: 1 Chr. 29:17
  - type: text
    content: 'in sincerity of heart, as to Christ; '
  '6':
  - type: note
    content: Col. 3:22
  - type: text
    content: 'not with eyeservice, as men-pleasers, but as bondservants of Christ, doing the will of God from the heart, '
  '7':
  - type: text
    content: 'with goodwill doing service, as to the Lord, and not to men, '
  '8':
  - type: note
    content: Rom. 2:6
  - type: text
    content: 'knowing that whatever good anyone does, he will receive the same from the Lord, whether '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' a slave or free.'
  '9':
  - type: text
    content: 'And you, masters, do the same things to them, giving up threatening, knowing that your own '
  - type: note
    content: Job 31:13; John 13:13; Col. 4:1
  - type: text
    content: 'Master also is in heaven, and '
  - type: note
    content: Deut. 10:17; Acts 10:34; Rom. 2:11; Col. 3:25
  - type: text
    content: there is no partiality with Him.
  - type: heading
    content: The Whole Armor of God
