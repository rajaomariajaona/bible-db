document_id: JOB.20,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zophar’s Sermon on the Wicked Man
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 11:1
      marker-yv: yv-n
    - type: text
      text: 'Zophar the Naamathite answered and said:'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His children will seek the favor of the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his hands will restore his wealth.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His bones are full of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 13:26
      marker-yv: yv-n
    - type: text
      text: his youthful vigor,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 21:26
      marker-yv: yv-n
    - type: text
      text: But it will lie down with him in the dust.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Though evil is sweet in his mouth,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' he hides it under his tongue,'
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Though
    - type: text
      text: ' he spares it and does not forsake it,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But still keeps it in his mouth,
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yet
    - type: text
      text: ' his food in his stomach turns sour;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It becomes cobra venom within him.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He swallows down riches
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And vomits them up again;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God casts them out of his belly.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will suck the poison of cobras;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The viper’s tongue will slay him.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He will not see '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 36:8; Jer. 17:8
      marker-yv: yv-n
    - type: text
      text: the streams,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The rivers flowing with honey and cream.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will restore that for which he labored,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And will not swallow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' down;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From the proceeds of business
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will get no enjoyment.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For he has oppressed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forsaken the poor,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has violently seized a house which he did not build.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Therefore my anxious thoughts make me answer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because of the turmoil within me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 5:13–15
      marker-yv: yv-n
    - type: text
      text: ' he knows no quietness in his heart,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will not save anything he desires.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nothing is left for him to eat;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore his well-being will not last.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In his self-sufficiency he will be in distress;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Every hand of misery will come against him.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: When
    - type: text
      text: ' he is about to fill his stomach,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' will cast on him the fury of His wrath,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And will rain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' on him while he is eating.'
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 24:18; Amos 5:19
      marker-yv: yv-n
    - type: text
      text: He will flee from the iron weapon;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A bronze bow will pierce him through.
  '25':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It is drawn, and comes out of the body;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yes, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 16:13
      marker-yv: yv-n
    - type: text
      text: 'the glittering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: point
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: comes
    - type: text
      text: ' out of his gall.'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 18:11, 14
      marker-yv: yv-n
    - type: text
      text: 'Terrors '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' upon him;'
  '26':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Total darkness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' reserved for his treasures.'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 21:9
      marker-yv: yv-n
    - type: text
      text: An unfanned fire will consume him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It shall go ill with him who is left in his tent.
  '27':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The heavens will reveal his iniquity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the earth will rise up against him.
  '28':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The increase of his house will depart,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: goods
    - type: text
      text: ' will flow away in the day of His '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 20:15; 21:30
      marker-yv: yv-n
    - type: text
      text: wrath.
  '29':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 27:13; 31:2, 3
      marker-yv: yv-n
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the portion from God for a wicked man,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The heritage appointed to him by God.”
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have heard the rebuke that reproaches me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the spirit of my understanding causes me to answer.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Do you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: not
    - type: text
      text: ' know this of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 8:8; 15:10
      marker-yv: yv-n
    - type: text
      text: old,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Since man was placed on earth,
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:35, 36
      marker-yv: yv-n
    - type: text
      text: That the triumphing of the wicked is short,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the joy of the hypocrite is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' for a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 8:13; 13:16; 15:34; 27:8)
      marker-yv: yv-n
    - type: text
      text: moment?
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 14:13, 14
      marker-yv: yv-n
    - type: text
      text: Though his haughtiness mounts up to the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his head reaches to the clouds,
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yet
    - type: text
      text: ' he will perish forever like his own refuse;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Those who have seen him will say, ‘Where is he?’
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He will fly away '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 73:20; 90:5
      marker-yv: yv-n
    - type: text
      text: like a dream, and not be found;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yes, he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 18:18; 27:21–23
      marker-yv: yv-n
    - type: text
      text: will be chased away like a vision of the night.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The eye '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' saw him will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: see
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' no more,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor will his place behold him anymore.
