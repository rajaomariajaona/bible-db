    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 20:17; (James 5:15, 16; 1 John 5:16)
      marker-yv: yv-n
    - type: text
      text: 'pray for you. For I will accept him, lest I deal with you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: according
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' folly; because you have not spoken of Me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
