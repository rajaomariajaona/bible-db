    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' right, as My servant Job '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, take for yourselves '
    - type: usfm
