    - type: text
      text: ' and said:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 30:3; Ps. 14:7; 85:1–3; 126:1
      marker-yv: yv-n
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' restored Job’s losses when he prayed for his friends. Indeed the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave Job '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 40:2
      marker-yv: yv-n
    - type: text
      text: 'twice as much as he had before. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 19:13
      marker-yv: yv-n
    - type: text
      text: 'all his brothers, all his sisters, and all those who had been his acquaintances before, came to him and ate food with him in his house; and they consoled him and comforted him for all the adversity that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had brought upon him. Each one gave him a piece of silver and each a ring of gold.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' blessed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:10; 8:7; James 5:11
      marker-yv: yv-n
    - type: text
      text: 'the latter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: days
    - type: text
      text: ' of Job more than his beginning; for he had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:3
      marker-yv: yv-n
    - type: text
      text: 'fourteen thousand sheep, six thousand camels, one thousand yoke of oxen, and one thousand female donkeys. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:2
      marker-yv: yv-n
    - type: text
      text: 'He also had seven sons and three daughters. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he called the name of the first Jemimah, the name of the second Keziah, and the name of the third Keren-Happuch. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In all the land were found no women '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so
    - type: text
      text: ' beautiful as the daughters of Job; and their father gave them an inheritance among their brothers.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this Job '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:26; Prov. 3:16
      marker-yv: yv-n
    - type: text
      text: 'lived one hundred and forty years, and saw his children and grandchildren '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' four generations. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Job died, old and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:15; 25:8; Job 5:26
      marker-yv: yv-n
    - type: text
      text: full of days.
