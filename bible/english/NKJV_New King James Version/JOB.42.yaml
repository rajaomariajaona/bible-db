      marker-yv: yv-n
    - type: text
      text: ‘I will question you, and you shall answer Me.’
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I have '
    - type: usfm
      marker: x
      children:
      - type: text
