document_id: 1SA.6,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ark Returned to Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was in the country of the Philistines seven months. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the men did so; they took two milk cows and hitched them to the cart, and shut up their calves at home. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they set the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on the cart, and the chest with the gold rats and the images of their tumors. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the cows headed straight for the road to Beth Shemesh, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' went along the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 6:3
      marker-yv: yv-n
    - type: text
      text: highway, lowing as they went, and did not turn aside to the right hand or the left. And the lords of the Philistines went after them to the border of Beth Shemesh.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' Beth Shemesh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' reaping their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:19
      marker-yv: yv-n
    - type: text
      text: 'wheat harvest in the valley; and they lifted their eyes and saw the ark, and rejoiced to see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the cart came into the field of Joshua of Beth Shemesh, and stood there; a large stone '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' there. So they split the wood of the cart and offered the cows as a burnt offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Levites took down the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the chest that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' with it, in which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the articles of gold, and put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' on the large stone. Then the men of Beth Shemesh offered burnt offerings and made sacrifices the same day to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 12:17
      marker-yv: yv-n
    - type: text
      text: 'the five lords of the Philistines had seen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' they returned to Ekron the same day.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 13:3; Judg. 3:3
      marker-yv: yv-n
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the golden tumors which the Philistines returned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' a trespass offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': one for Ashdod, one for Gaza, one for Ashkelon, one for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 6:4
      marker-yv: yv-n
    - type: text
      text: 'Gath, one for Ekron; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the golden rats, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: according
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' the number of all the cities of the Philistines '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belonging
    - type: text
      text: ' to the five lords, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: both
    - type: text
      text: ' fortified cities and country villages, even as far as the large '
    - type: usfm
      marker: it
      children:
      - type: text
        text: stone
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' Abel on which they set the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: stone
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: remains
    - type: text
      text: ' to this day in the field of Joshua of Beth Shemesh.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 5:8
      marker-yv: yv-n
    - type: text
      text: 'He struck the men of Beth Shemesh, because they had looked into the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:21; Num. 4:5, 15, 16, 20
      marker-yv: yv-n
    - type: text
      text: 'struck fifty thousand and seventy men of the people, and the people lamented because the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had struck the people with a great slaughter.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ark at Kirjath Jearim
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Philistines '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 9:16; Jer. 14:2
      marker-yv: yv-n
    - type: text
      text: 'called for the priests and the diviners, saying, “What shall we do with the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '? Tell us how we should send it to its place.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men of Beth Shemesh said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 6:7
      marker-yv: yv-n
    - type: text
      text: '“Who is able to stand before this holy '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God? And to whom shall it go up from us?” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they sent messengers to the inhabitants of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:44, 45; Ps. 24:3, 4; Mal. 3:2; Rev. 6:17
      marker-yv: yv-n
    - type: text
      text: 'Kirjath Jearim, saying, “The Philistines have brought back the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '; come down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take it up with you.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they said, “If you send away the ark of the God of Israel, do not send it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:8; Ex. 7:11; Is. 2:6; 47:13; Dan. 2:2; 5:7
      marker-yv: yv-n
    - type: text
      text: 'empty; but by all means return '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' to Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:15; Deut. 16:16
      marker-yv: yv-n
    - type: text
      text: a trespass offering. Then you will be healed, and it will be known to you why His hand is not removed from you.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they said, “What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the trespass offering which we shall return to Him?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They answered, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:15, 16
      marker-yv: yv-n
    - type: text
      text: '“Five golden tumors and five golden rats, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: according
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' the number of the lords of the Philistines. For the same plague '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' on all of you and on your lords. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore you shall make images of your tumors and images of your rats that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 5:6, 9, 12; 6:17
      marker-yv: yv-n
    - type: text
      text: 'ravage the land, and you shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 5:6
      marker-yv: yv-n
    - type: text
      text: 'give glory to the God of Israel; perhaps He will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 7:19; 1 Chr. 16:28, 29; Is. 42:12; Jer. 13:16; Mal. 2:2; Rev. 14:7
      marker-yv: yv-n
    - type: text
      text: 'lighten His hand from you, from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 5:6, 11; Ps. 39:10
      marker-yv: yv-n
    - type: text
      text: 'your gods, and from your land. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why then do you harden your hearts '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 5:3, 4, 7
      marker-yv: yv-n
    - type: text
      text: 'as the Egyptians and Pharaoh hardened their hearts? When He did mighty things among them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 7:13; 8:15; 9:34; 14:17
      marker-yv: yv-n
    - type: text
      text: 'did they not let the people go, that they might depart? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, make '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:31
      marker-yv: yv-n
    - type: text
      text: 'a new cart, take two milk cows '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 6:3
      marker-yv: yv-n
    - type: text
      text: 'which have never been yoked, and hitch the cows to the cart; and take their calves home, away from them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then take the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and set it on the cart; and put '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 19:2; Deut. 21:3, 4
      marker-yv: yv-n
    - type: text
      text: 'the articles of gold which you are returning to Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' a trespass offering in a chest by its side. Then send it away, and let it go. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And watch: if it goes up the road to its own territory, to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 6:4, 5
      marker-yv: yv-n
    - type: text
      text: 'Beth Shemesh, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: then
    - type: text
      text: ' He has done us this great evil. But if not, then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:10; 21:16
      marker-yv: yv-n
    - type: text
      text: 'we shall know that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not His hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' struck us—it happened to us by chance.”'
