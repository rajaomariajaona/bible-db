  - type: text
    content: a trespass offering. Then you will be healed, and it will be known to you why His hand is not removed from you.”
  '4':
  - type: text
    content: 'Then they said, “What '
  - type: text
    content: is
  - type: text
    content: ' the trespass offering which we shall return to Him?”'
  - type: text
    content: 'They answered, '
  - type: note
