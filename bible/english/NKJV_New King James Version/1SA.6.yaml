  - type: text
    content: '“Five golden tumors and five golden rats, '
  - type: text
    content: according
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' the number of the lords of the Philistines. For the same plague '
  - type: text
    content: was
  - type: text
    content: ' on all of you and on your lords. '
  '5':
  - type: text
    content: 'Therefore you shall make images of your tumors and images of your rats that '
  - type: note
    content: 1 Sam. 5:6, 9, 12; 6:17
  - type: text
    content: 'ravage the land, and you shall '
  - type: note
    content: 1 Sam. 5:6
  - type: text
    content: 'give glory to the God of Israel; perhaps He will '
  - type: note
    content: Josh. 7:19; 1 Chr. 16:28, 29; Is. 42:12; Jer. 13:16; Mal. 2:2; Rev. 14:7
  - type: text
    content: 'lighten His hand from you, from '
  - type: note
    content: 1 Sam. 5:6, 11; Ps. 39:10
  - type: text
    content: 'your gods, and from your land. '
  '6':
  - type: text
    content: 'Why then do you harden your hearts '
  - type: note
    content: 1 Sam. 5:3, 4, 7
  - type: text
    content: 'as the Egyptians and Pharaoh hardened their hearts? When He did mighty things among them, '
  - type: note
    content: Ex. 7:13; 8:15; 9:34; 14:17
  - type: text
    content: 'did they not let the people go, that they might depart? '
  '7':
  - type: text
    content: 'Now therefore, make '
  - type: note
    content: Ex. 12:31
  - type: text
    content: 'a new cart, take two milk cows '
  - type: note
    content: 2 Sam. 6:3
  - type: text
    content: 'which have never been yoked, and hitch the cows to the cart; and take their calves home, away from them. '
