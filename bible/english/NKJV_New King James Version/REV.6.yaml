document_id: REV.6,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'First Seal: The Conqueror'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 53:7; (John 1:29; Rev. 5:5–7, 12; 13:8)
      marker-yv: yv-n
    - type: text
      text: 'I saw when the Lamb opened one of the seals; and I heard '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:7
      marker-yv: yv-n
    - type: text
      text: 'one of the four living creatures saying with a voice like thunder, “Come and see.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they cried with a loud voice, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 13:1–6; Zech. 1:12
      marker-yv: yv-n
    - type: text
      text: '“How long, O Lord, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 3:7
      marker-yv: yv-n
    - type: text
      text: 'holy and true, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 11:18
      marker-yv: yv-n
    - type: text
      text: 'until You judge and avenge our blood on those who dwell on the earth?” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 3:4, 5; 7:9
      marker-yv: yv-n
    - type: text
      text: 'white robe was given to each of them; and it was said to them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 11:40
      marker-yv: yv-n
    - type: text
      text: 'that they should rest a little while longer, until both '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: number
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' their fellow servants and their brethren, who would be killed as they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were,
    - type: text
      text: ' was completed.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Sixth Seal: Cosmic Disturbances'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I looked when He opened the sixth seal, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 24:7; Rev. 8:5; 11:13; 16:18
      marker-yv: yv-n
    - type: text
      text: 'and behold, there was a great earthquake; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 13:10; Joel 2:10, 31; 3:15; Matt. 24:29; Mark 13:24
      marker-yv: yv-n
    - type: text
      text: 'the sun became black as sackcloth of hair, and the moon became like blood. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 24:29; Mark 13:25; Rev. 8:10; 9:1
      marker-yv: yv-n
    - type: text
      text: 'And the stars of heaven fell to the earth, as a fig tree drops its late figs when it is shaken by a mighty wind. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 102:26; Is. 34:4; (2 Pet. 3:10); Rev. 20:11; 21:1
      marker-yv: yv-n
    - type: text
      text: 'Then the sky receded as a scroll when it is rolled up, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 3:23; Rev. 16:20
      marker-yv: yv-n
    - type: text
      text: 'every mountain and island was moved out of its place. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 2:2–4
      marker-yv: yv-n
    - type: text
      text: 'kings of the earth, the great men, the rich men, the commanders, the mighty men, every slave and every free man, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 2:10, 19, 21; 24:21; Rev. 19:18
      marker-yv: yv-n
    - type: text
      text: 'hid themselves in the caves and in the rocks of the mountains, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 10:8; Luke 23:29, 30; Rev. 9:6
      marker-yv: yv-n
    - type: text
      text: 'and said to the mountains and rocks, “Fall on us and hide us from the face of Him who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 20:11
      marker-yv: yv-n
    - type: text
      text: 'sits on the throne and from the wrath of the Lamb! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the great day of His wrath has come, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 63:4; Jer. 30:7; Joel 1:15; 2:1, 11, 31; Zeph. 1:14; Rev. 16:14
      marker-yv: yv-n
    - type: text
      text: and who is able to stand?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I looked, and behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 1:8; 6:3
      marker-yv: yv-n
    - type: text
      text: 'a white horse. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 45:4, 5, LXX
      marker-yv: yv-n
    - type: text
      text: 'He who sat on it had a bow; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 6:11; Rev. 9:7; 14:14; 19:12
      marker-yv: yv-n
    - type: text
      text: 'and a crown was given to him, and he went out '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 24:5; Rev. 3:21
      marker-yv: yv-n
    - type: text
      text: conquering and to conquer.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Second Seal: Conflict on Earth'
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When He opened the second seal, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:7
      marker-yv: yv-n
    - type: text
      text: 'I heard the second living creature saying, “Come and see.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 1:8; 6:2
      marker-yv: yv-n
    - type: text
      text: 'Another horse, fiery red, went out. And it was granted to the one who sat on it to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 24:6, 7
      marker-yv: yv-n
    - type: text
      text: 'take peace from the earth, and that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
      text: ' should kill one another; and there was given to him a great sword.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Third Seal: Scarcity on Earth'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When He opened the third seal, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:7
      marker-yv: yv-n
    - type: text
      text: 'I heard the third living creature say, “Come and see.” So I looked, and behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 6:2, 6
      marker-yv: yv-n
    - type: text
      text: 'a black horse, and he who sat on it had a pair of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 24:7
      marker-yv: yv-n
    - type: text
      text: 'scales in his hand. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I heard a voice in the midst of the four living creatures saying, “A quart of wheat for a denarius, and three quarts of barley for a denarius; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 7:3; 9:4
      marker-yv: yv-n
    - type: text
      text: do not harm the oil and the wine.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fourth Seal: Widespread Death on Earth'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When He opened the fourth seal, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:7
      marker-yv: yv-n
    - type: text
      text: 'I heard the voice of the fourth living creature saying, “Come and see.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 6:3
      marker-yv: yv-n
    - type: text
      text: 'So I looked, and behold, a pale horse. And the name of him who sat on it was Death, and Hades followed with him. And power was given to them over a fourth of the earth, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 14:12; 15:2; 24:10; 29:17; Ezek. 5:12, 17; 14:21; 29:5; Matt. 24:9
      marker-yv: yv-n
    - type: text
      text: 'to kill with sword, with hunger, with death, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:22
      marker-yv: yv-n
    - type: text
      text: and by the beasts of the earth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fifth Seal: The Cry of the Martyrs'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When He opened the fifth seal, I saw under '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 8:3
      marker-yv: yv-n
    - type: text
      text: 'the altar '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rev. 20:4)
      marker-yv: yv-n
    - type: text
      text: 'the souls of those who had been slain '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 1:2, 9
      marker-yv: yv-n
    - type: text
      text: 'for the word of God and for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 1:8
      marker-yv: yv-n
    - type: text
      text: 'the testimony which they held. '
