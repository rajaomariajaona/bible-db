document_id: REV.6,114
type_code: eng
verses:
  '1':
  - type: heading
    content: 'First Seal: The Conqueror'
  - type: text
    content: 'Now '
  - type: note
    content: Is. 53:7; (John 1:29; Rev. 5:5–7, 12; 13:8)
  - type: text
    content: 'I saw when the Lamb opened one of the seals; and I heard '
  - type: note
    content: Rev. 4:7
  - type: text
    content: 'one of the four living creatures saying with a voice like thunder, “Come and see.” '
  '10':
  - type: text
    content: 'And they cried with a loud voice, saying, '
  - type: note
    content: Ps. 13:1–6; Zech. 1:12
  - type: text
    content: '“How long, O Lord, '
  - type: note
    content: Rev. 3:7
  - type: text
    content: 'holy and true, '
  - type: note
    content: Rev. 11:18
  - type: text
    content: 'until You judge and avenge our blood on those who dwell on the earth?” '
  '11':
  - type: text
    content: 'Then a '
  - type: note
    content: Rev. 3:4, 5; 7:9
  - type: text
    content: 'white robe was given to each of them; and it was said to them '
  - type: note
    content: Heb. 11:40
  - type: text
    content: 'that they should rest a little while longer, until both '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: number
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' their fellow servants and their brethren, who would be killed as they '
  - type: text
    content: were,
  - type: text
    content: ' was completed.'
  - type: heading
    content: 'Sixth Seal: Cosmic Disturbances'
  '12':
  - type: text
    content: 'I looked when He opened the sixth seal, '
  - type: note
    content: Matt. 24:7; Rev. 8:5; 11:13; 16:18
  - type: text
    content: 'and behold, there was a great earthquake; and '
  - type: note
    content: Is. 13:10; Joel 2:10, 31; 3:15; Matt. 24:29; Mark 13:24
  - type: text
    content: 'the sun became black as sackcloth of hair, and the moon became like blood. '
  '13':
  - type: note
    content: Matt. 24:29; Mark 13:25; Rev. 8:10; 9:1
  - type: text
    content: 'And the stars of heaven fell to the earth, as a fig tree drops its late figs when it is shaken by a mighty wind. '
  '14':
  - type: note
    content: Ps. 102:26; Is. 34:4; (2 Pet. 3:10); Rev. 20:11; 21:1
  - type: text
    content: 'Then the sky receded as a scroll when it is rolled up, and '
  - type: note
    content: Jer. 3:23; Rev. 16:20
  - type: text
    content: 'every mountain and island was moved out of its place. '
  '15':
  - type: text
    content: 'And the '
  - type: note
    content: Ps. 2:2–4
  - type: text
    content: 'kings of the earth, the great men, the rich men, the commanders, the mighty men, every slave and every free man, '
  - type: note
    content: Is. 2:10, 19, 21; 24:21; Rev. 19:18
  - type: text
    content: 'hid themselves in the caves and in the rocks of the mountains, '
  '16':
  - type: note
    content: Hos. 10:8; Luke 23:29, 30; Rev. 9:6
  - type: text
    content: 'and said to the mountains and rocks, “Fall on us and hide us from the face of Him who '
  - type: note
    content: Rev. 20:11
  - type: text
    content: 'sits on the throne and from the wrath of the Lamb! '
  '17':
  - type: text
    content: 'For the great day of His wrath has come, '
  - type: note
    content: Is. 63:4; Jer. 30:7; Joel 1:15; 2:1, 11, 31; Zeph. 1:14; Rev. 16:14
  - type: text
    content: and who is able to stand?”
  '2':
  - type: text
    content: 'And I looked, and behold, '
  - type: note
    content: Zech. 1:8; 6:3
  - type: text
    content: 'a white horse. '
  - type: note
    content: Ps. 45:4, 5, LXX
  - type: text
    content: 'He who sat on it had a bow; '
  - type: note
    content: Zech. 6:11; Rev. 9:7; 14:14; 19:12
  - type: text
    content: 'and a crown was given to him, and he went out '
  - type: note
    content: Matt. 24:5; Rev. 3:21
  - type: text
    content: conquering and to conquer.
  - type: heading
    content: 'Second Seal: Conflict on Earth'
  '3':
  - type: text
    content: 'When He opened the second seal, '
  - type: note
    content: Rev. 4:7
  - type: text
    content: 'I heard the second living creature saying, “Come and see.” '
  '4':
  - type: note
    content: Zech. 1:8; 6:2
  - type: text
    content: 'Another horse, fiery red, went out. And it was granted to the one who sat on it to '
  - type: note
    content: Matt. 24:6, 7
  - type: text
    content: 'take peace from the earth, and that '
  - type: text
    content: people
  - type: text
    content: ' should kill one another; and there was given to him a great sword.'
  - type: heading
    content: 'Third Seal: Scarcity on Earth'
  '5':
  - type: text
    content: 'When He opened the third seal, '
  - type: note
    content: Rev. 4:7
  - type: text
    content: 'I heard the third living creature say, “Come and see.” So I looked, and behold, '
  - type: note
    content: Zech. 6:2, 6
  - type: text
    content: 'a black horse, and he who sat on it had a pair of '
  - type: note
    content: Matt. 24:7
  - type: text
    content: 'scales in his hand. '
  '6':
  - type: text
    content: 'And I heard a voice in the midst of the four living creatures saying, “A quart of wheat for a denarius, and three quarts of barley for a denarius; and '
  - type: note
    content: Rev. 7:3; 9:4
  - type: text
    content: do not harm the oil and the wine.”
  - type: heading
    content: 'Fourth Seal: Widespread Death on Earth'
  '7':
  - type: text
    content: 'When He opened the fourth seal, '
  - type: note
    content: Rev. 4:7
  - type: text
    content: 'I heard the voice of the fourth living creature saying, “Come and see.” '
  '8':
  - type: note
    content: Zech. 6:3
  - type: text
    content: 'So I looked, and behold, a pale horse. And the name of him who sat on it was Death, and Hades followed with him. And power was given to them over a fourth of the earth, '
  - type: note
    content: Jer. 14:12; 15:2; 24:10; 29:17; Ezek. 5:12, 17; 14:21; 29:5; Matt. 24:9
  - type: text
    content: 'to kill with sword, with hunger, with death, '
  - type: note
    content: Lev. 26:22
  - type: text
    content: and by the beasts of the earth.
  - type: heading
    content: 'Fifth Seal: The Cry of the Martyrs'
  '9':
  - type: text
    content: 'When He opened the fifth seal, I saw under '
  - type: note
    content: Rev. 8:3
  - type: text
    content: 'the altar '
  - type: note
    content: (Rev. 20:4)
  - type: text
    content: 'the souls of those who had been slain '
  - type: note
    content: Rev. 1:2, 9
  - type: text
    content: 'for the word of God and for '
  - type: note
    content: 2 Tim. 1:8
  - type: text
    content: 'the testimony which they held. '
