document_id: LEV.9,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Priestly Ministry Begins
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'It came to pass on the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 43:27
      marker-yv: yv-n
    - type: text
      text: 'eighth day that Moses called Aaron and his sons and the elders of Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:18; Lev. 8:16
      marker-yv: yv-n
    - type: text
      text: 'But the fat, the kidneys, and the fatty lobe from the liver of the sin offering he burned on the altar, as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:11, 12; 8:17
      marker-yv: yv-n
    - type: text
      text: The flesh and the hide he burned with fire outside the camp.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And he killed the burnt offering; and Aaron’s sons presented to him the blood, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:5; 8:19
      marker-yv: yv-n
    - type: text
      text: 'which he sprinkled all around on the altar. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 8:20
      marker-yv: yv-n
    - type: text
      text: 'Then they presented the burnt offering to him, with its pieces and head, and he burned them on the altar. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 8:21
      marker-yv: yv-n
    - type: text
      text: And he washed the entrails and the legs, and burned them with the burnt offering on the altar.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 53:10; Heb. 2:17; 5:3)
      marker-yv: yv-n
    - type: text
      text: 'Then he brought the people’s offering, and took the goat, which was the sin offering for the people, and killed it and offered it for sin, like the first one. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And he brought the burnt offering and offered it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:1–13
      marker-yv: yv-n
    - type: text
      text: 'according to the prescribed manner. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then he brought the grain offering, took a handful of it, and burned it on the altar, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:38, 39
      marker-yv: yv-n
    - type: text
      text: besides the burnt sacrifice of the morning.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'He also killed the bull and the ram as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:1–11
      marker-yv: yv-n
    - type: text
      text: 'sacrifices of peace offerings, which were for the people. And Aaron’s sons presented to him the blood, which he sprinkled all around on the altar, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and the fat from the bull and the ram—the fatty tail, what covers the entrails and the kidneys, and the fatty lobe attached to the liver; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he said to Aaron, “Take for yourself a young '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:21; Lev. 4:1–12
      marker-yv: yv-n
    - type: text
      text: 'bull as a sin offering and a ram as a burnt offering, without blemish, and offer them before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and they put the fat on the breasts. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:5, 16
      marker-yv: yv-n
    - type: text
      text: 'Then he burned the fat on the altar; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'but the breasts and the right thigh Aaron waved '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:24, 26, 27; Lev. 7:30–34
      marker-yv: yv-n
    - type: text
      text: 'as a wave offering before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', as Moses had commanded.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then Aaron lifted his hand toward the people, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 6:22–26; Deut. 21:5; Luke 24:50
      marker-yv: yv-n
    - type: text
      text: 'blessed them, and came down from offering the sin offering, the burnt offering, and peace offerings. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And Moses and Aaron went into the tabernacle of meeting, and came out and blessed the people. Then the glory of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to all the people, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 4:4; Judg. 6:21; 2 Chr. 7:1; Ps. 20:3
      marker-yv: yv-n
    - type: text
      text: 'fire came out from before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and consumed the burnt offering and the fat on the altar. When all the people saw it, they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 3:11
      marker-yv: yv-n
    - type: text
      text: 'shouted and fell on their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 18:38, 39
      marker-yv: yv-n
    - type: text
      text: faces.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And to the children of Israel you shall speak, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:23, 28; Ezra 6:17; 10:19
      marker-yv: yv-n
    - type: text
      text: '‘Take a kid of the goats as a sin offering, and a calf and a lamb, both of the first year, without blemish, as a burnt offering, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'also a bull and a ram as peace offerings, to sacrifice before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:4
      marker-yv: yv-n
    - type: text
      text: 'a grain offering mixed with oil; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:43; Lev. 9:6, 23
      marker-yv: yv-n
    - type: text
      text: 'today the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will appear to you.’ ”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So they brought what Moses commanded before the tabernacle of meeting. And all the congregation drew near and stood before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then Moses said, “This is the thing which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded you to do, and the glory of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will appear to you.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And Moses said to Aaron, “Go to the altar, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:3; 1 Sam. 3:14; (Heb. 5:3–5; 7:27)
      marker-yv: yv-n
    - type: text
      text: 'offer your sin offering and your burnt offering, and make atonement for yourself and for the people. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:16, 20; Heb. 5:1
      marker-yv: yv-n
    - type: text
      text: 'Offer the offering of the people, and make atonement for them, as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Aaron therefore went to the altar and killed the calf of the sin offering, which was for himself. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then the sons of Aaron brought the blood to him. And he dipped his finger in the blood, put it on the horns of the altar, and poured the blood at the base of the altar. '
