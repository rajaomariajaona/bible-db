document_id: LEV.9,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Priestly Ministry Begins
  - type: text
    content: 'It came to pass on the '
  - type: note
    content: Ezek. 43:27
  - type: text
    content: 'eighth day that Moses called Aaron and his sons and the elders of Israel. '
  '10':
  - type: note
    content: Ex. 23:18; Lev. 8:16
  - type: text
    content: 'But the fat, the kidneys, and the fatty lobe from the liver of the sin offering he burned on the altar, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '11':
  - type: note
    content: Lev. 4:11, 12; 8:17
  - type: text
    content: The flesh and the hide he burned with fire outside the camp.
  '12':
  - type: text
    content: 'And he killed the burnt offering; and Aaron’s sons presented to him the blood, '
  - type: note
    content: Lev. 1:5; 8:19
  - type: text
    content: 'which he sprinkled all around on the altar. '
  '13':
  - type: note
    content: Lev. 8:20
  - type: text
    content: 'Then they presented the burnt offering to him, with its pieces and head, and he burned them on the altar. '
  '14':
  - type: note
    content: Lev. 8:21
  - type: text
    content: And he washed the entrails and the legs, and burned them with the burnt offering on the altar.
  '15':
  - type: note
    content: (Is. 53:10; Heb. 2:17; 5:3)
  - type: text
    content: 'Then he brought the people’s offering, and took the goat, which was the sin offering for the people, and killed it and offered it for sin, like the first one. '
  '16':
  - type: text
    content: 'And he brought the burnt offering and offered it '
  - type: note
    content: Lev. 1:1–13
  - type: text
    content: 'according to the prescribed manner. '
  '17':
  - type: text
    content: 'Then he brought the grain offering, took a handful of it, and burned it on the altar, '
  - type: note
    content: Ex. 29:38, 39
  - type: text
    content: besides the burnt sacrifice of the morning.
  '18':
  - type: text
    content: 'He also killed the bull and the ram as '
  - type: note
    content: Lev. 3:1–11
  - type: text
    content: 'sacrifices of peace offerings, which were for the people. And Aaron’s sons presented to him the blood, which he sprinkled all around on the altar, '
  '19':
  - type: text
    content: 'and the fat from the bull and the ram—the fatty tail, what covers the entrails and the kidneys, and the fatty lobe attached to the liver; '
  '2':
  - type: text
    content: 'And he said to Aaron, “Take for yourself a young '
  - type: note
    content: Ex. 29:21; Lev. 4:1–12
  - type: text
    content: 'bull as a sin offering and a ram as a burnt offering, without blemish, and offer them before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'and they put the fat on the breasts. '
  - type: note
    content: Lev. 3:5, 16
  - type: text
    content: 'Then he burned the fat on the altar; '
  '21':
  - type: text
    content: 'but the breasts and the right thigh Aaron waved '
  - type: note
    content: Ex. 29:24, 26, 27; Lev. 7:30–34
  - type: text
    content: 'as a wave offering before the '
  - type: heading
    content: Lord
  - type: text
    content: ', as Moses had commanded.'
  '22':
  - type: text
    content: 'Then Aaron lifted his hand toward the people, '
  - type: note
    content: Num. 6:22–26; Deut. 21:5; Luke 24:50
  - type: text
    content: 'blessed them, and came down from offering the sin offering, the burnt offering, and peace offerings. '
  '23':
  - type: text
    content: 'And Moses and Aaron went into the tabernacle of meeting, and came out and blessed the people. Then the glory of the '
  - type: heading
    content: Lord
  - type: text
    content: ' appeared to all the people, '
  '24':
  - type: text
    content: 'and '
  - type: note
    content: Gen. 4:4; Judg. 6:21; 2 Chr. 7:1; Ps. 20:3
  - type: text
    content: 'fire came out from before the '
  - type: heading
    content: Lord
  - type: text
    content: ' and consumed the burnt offering and the fat on the altar. When all the people saw it, they '
  - type: note
    content: Ezra 3:11
  - type: text
    content: 'shouted and fell on their '
  - type: note
    content: 1 Kin. 18:38, 39
  - type: text
    content: faces.
  '3':
  - type: text
    content: 'And to the children of Israel you shall speak, saying, '
  - type: note
    content: Lev. 4:23, 28; Ezra 6:17; 10:19
  - type: text
    content: '‘Take a kid of the goats as a sin offering, and a calf and a lamb, both of the first year, without blemish, as a burnt offering, '
  '4':
  - type: text
    content: 'also a bull and a ram as peace offerings, to sacrifice before the '
  - type: heading
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: Lev. 2:4
  - type: text
    content: 'a grain offering mixed with oil; for '
  - type: note
    content: Ex. 29:43; Lev. 9:6, 23
  - type: text
    content: 'today the '
  - type: heading
    content: Lord
  - type: text
    content: ' will appear to you.’ ”'
  '5':
  - type: text
    content: 'So they brought what Moses commanded before the tabernacle of meeting. And all the congregation drew near and stood before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Then Moses said, “This is the thing which the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded you to do, and the glory of the '
  - type: heading
    content: Lord
  - type: text
    content: ' will appear to you.” '
  '7':
  - type: text
    content: 'And Moses said to Aaron, “Go to the altar, '
  - type: note
    content: Lev. 4:3; 1 Sam. 3:14; (Heb. 5:3–5; 7:27)
  - type: text
    content: 'offer your sin offering and your burnt offering, and make atonement for yourself and for the people. '
  - type: note
    content: Lev. 4:16, 20; Heb. 5:1
  - type: text
    content: 'Offer the offering of the people, and make atonement for them, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded.”'
  '8':
  - type: text
    content: 'Aaron therefore went to the altar and killed the calf of the sin offering, which was for himself. '
  '9':
  - type: text
    content: 'Then the sons of Aaron brought the blood to him. And he dipped his finger in the blood, put it on the horns of the altar, and poured the blood at the base of the altar. '
