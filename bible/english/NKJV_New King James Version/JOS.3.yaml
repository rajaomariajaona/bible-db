document_id: JOS.3,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Crosses the Jordan
  - type: text
    content: 'Then Joshua rose early in the morning; and they set out '
  - type: note
    content: Josh. 2:1
  - type: text
    content: 'from Acacia Grove and came to the Jordan, he and all the children of Israel, and lodged there before they crossed over. '
  '10':
  - type: text
    content: 'And Joshua said, “By this you shall know that '
  - type: note
    content: Deut. 5:26; Josh. 11:23; 1 Sam. 17:26; 2 Kin. 19:4; Hos. 1:10; Matt. 16:16; 1 Thess. 1:9
  - type: text
    content: 'the living God '
  - type: text
    content: is
  - type: text
    content: ' among you, and '
  - type: text
    content: that
  - type: text
    content: ' He will without fail '
  - type: note
    content: Ex. 33:2; Deut. 7:1; 18:12; Ps. 44:2
  - type: text
    content: 'drive out from before you the '
  - type: note
    content: Acts 13:19
  - type: text
    content: 'Canaanites and the Hittites and the Hivites and the Perizzites and the Girgashites and the Amorites and the Jebusites: '
  '11':
  - type: text
    content: 'Behold, the ark of the covenant of '
  - type: note
    content: Josh. 3:13; Job 41:11; Ps. 24:1; Mic. 4:13; Zech. 4:14; 6:5
  - type: text
    content: 'the Lord of all the earth is crossing over before you into the Jordan. '
  '12':
  - type: text
    content: 'Now therefore, '
  - type: note
    content: Josh. 4:2, 4
  - type: text
    content: 'take for yourselves twelve men from the tribes of Israel, one man from every tribe. '
  '13':
  - type: text
    content: 'And it shall come to pass, '
  - type: note
    content: Josh. 3:15, 16
  - type: text
    content: 'as soon as the soles of the feet of the priests who bear the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Josh. 3:11
  - type: text
    content: 'the Lord of all the earth, shall rest in the waters of the Jordan, '
  - type: text
    content: that
  - type: text
    content: ' the waters of the Jordan shall be cut off, the waters that come down from upstream, and they '
  - type: note
    content: Ps. 78:13; 114:3
  - type: text
    content: shall stand as a heap.”
  '14':
  - type: text
    content: 'So it was, when the people set out from their camp to cross over the Jordan, with the priests bearing the '
  - type: note
    content: Ps. 132:8; Acts 7:44, 45
  - type: text
    content: 'ark of the covenant before the people, '
  '15':
  - type: text
    content: 'and as those who bore the ark came to the Jordan, and '
  - type: note
    content: Josh. 3:13
  - type: text
    content: 'the feet of the priests who bore the ark dipped in the edge of the water (for the '
  - type: note
    content: 1 Chr. 12:15; Jer. 12:5; 49:19
  - type: text
    content: 'Jordan overflows all its banks '
  - type: note
    content: Josh. 4:18; 5:10, 12
  - type: text
    content: 'during the whole time of harvest), '
  '16':
  - type: text
    content: 'that the waters which came down from upstream stood '
  - type: text
    content: still, and
  - type: text
    content: ' rose in a heap very far away at Adam, the city that '
  - type: text
    content: is
  - type: text
    content: ' beside '
  - type: note
    content: 1 Kin. 4:12; 7:46
  - type: text
    content: 'Zaretan. So the waters that went down '
  - type: note
    content: Deut. 3:17
  - type: text
    content: 'into the Sea of the Arabah, '
  - type: note
    content: Gen. 14:3; Num. 34:3
  - type: text
    content: 'the Salt Sea, failed, '
  - type: text
    content: and
  - type: text
    content: ' were cut off; and the people crossed over opposite Jericho. '
  '17':
  - type: text
    content: 'Then the priests who bore the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' stood firm on dry ground in the midst of the Jordan; '
  - type: note
    content: Gen. 50:24; Ex. 3:8; 6:1–8; 14:21, 22, 29; 33:1; Deut. 6:10; Heb. 11:29
  - type: text
    content: and all Israel crossed over on dry ground, until all the people had crossed completely over the Jordan.
  '2':
  - type: text
    content: 'So it was, '
  - type: note
    content: Josh. 1:10, 11
  - type: text
    content: 'after three days, that the officers went through the camp; '
  '3':
  - type: text
    content: 'and they commanded the people, saying, '
  - type: note
    content: Num. 10:33
  - type: text
    content: '“When you see the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, '
  - type: note
    content: Deut. 31:9, 25
  - type: text
    content: 'and the priests, the Levites, bearing it, then you shall set out from your place and go after it. '
  '4':
  - type: note
    content: Ex. 19:12
  - type: text
    content: 'Yet there shall be a space between you and it, about two thousand cubits by measure. Do not come near it, that you may know the way by which you must go, for you have not passed '
  - type: text
    content: this
  - type: text
    content: ' way before.”'
  '5':
  - type: text
    content: 'And Joshua said to the people, '
  - type: note
    content: Ex. 19:10, 14, 15; Lev. 20:7; Num. 11:18; Josh. 7:13; 1 Sam. 16:5; Job 1:5; Joel 2:16
  - type: text
    content: '“Sanctify yourselves, for tomorrow the '
  - type: heading
    content: Lord
  - type: text
    content: ' will do wonders among you.” '
  '6':
  - type: text
    content: 'Then Joshua spoke to the priests, saying, '
  - type: note
    content: Num. 4:15
  - type: text
    content: “Take up the ark of the covenant and cross over before the people.”
  - type: text
    content: So they took up the ark of the covenant and went before the people.
  '7':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Joshua, “This day I will begin to '
  - type: note
    content: Josh. 4:14; 1 Chr. 29:25; 2 Chr. 1:1
  - type: text
    content: 'exalt you in the sight of all Israel, that they may know that, '
  - type: note
    content: Josh. 1:5, 9
  - type: text
    content: 'as I was with Moses, '
  - type: text
    content: so
  - type: text
    content: ' I will be with you. '
  '8':
  - type: text
    content: 'You shall command '
  - type: note
    content: Josh. 3:3
  - type: text
    content: 'the priests who bear the ark of the covenant, saying, ‘When you have come to the edge of the water of the Jordan, '
  - type: note
    content: Josh. 3:17
  - type: text
    content: you shall stand in the Jordan.’ ”
  '9':
  - type: text
    content: 'So Joshua said to the children of Israel, “Come here, and hear the words of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.” '
