segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Crosses the Jordan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Joshua rose early in the morning; and they set out '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 2:1
    marker-yv: yv-n
  - type: text
    text: 'from Acacia Grove and came to the Jordan, he and all the children of Israel, and lodged there before they crossed over. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So it was, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 1:10, 11
    marker-yv: yv-n
  - type: text
    text: 'after three days, that the officers went through the camp; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and they commanded the people, saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 10:33
    marker-yv: yv-n
  - type: text
    text: '“When you see the ark of the covenant of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 31:9, 25
    marker-yv: yv-n
  - type: text
    text: 'and the priests, the Levites, bearing it, then you shall set out from your place and go after it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 19:12
    marker-yv: yv-n
  - type: text
    text: 'Yet there shall be a space between you and it, about two thousand cubits by measure. Do not come near it, that you may know the way by which you must go, for you have not passed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' way before.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Joshua said to the people, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 19:10, 14, 15; Lev. 20:7; Num. 11:18; Josh. 7:13; 1 Sam. 16:5; Job 1:5; Joel 2:16
    marker-yv: yv-n
  - type: text
    text: '“Sanctify yourselves, for tomorrow the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will do wonders among you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Joshua spoke to the priests, saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 4:15
    marker-yv: yv-n
  - type: text
    text: “Take up the ark of the covenant and cross over before the people.”
- type: usfm
  marker: p
  children:
  - type: text
    text: So they took up the ark of the covenant and went before the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Joshua, “This day I will begin to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 4:14; 1 Chr. 29:25; 2 Chr. 1:1
    marker-yv: yv-n
  - type: text
    text: 'exalt you in the sight of all Israel, that they may know that, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 1:5, 9
    marker-yv: yv-n
  - type: text
    text: 'as I was with Moses, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so
  - type: text
    text: ' I will be with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'You shall command '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 3:3
    marker-yv: yv-n
  - type: text
    text: 'the priests who bear the ark of the covenant, saying, ‘When you have come to the edge of the water of the Jordan, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 3:17
    marker-yv: yv-n
  - type: text
    text: you shall stand in the Jordan.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So Joshua said to the children of Israel, “Come here, and hear the words of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Joshua said, “By this you shall know that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 5:26; Josh. 11:23; 1 Sam. 17:26; 2 Kin. 19:4; Hos. 1:10; Matt. 16:16; 1 Thess. 1:9
    marker-yv: yv-n
  - type: text
    text: 'the living God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' among you, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' He will without fail '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 33:2; Deut. 7:1; 18:12; Ps. 44:2
    marker-yv: yv-n
  - type: text
    text: 'drive out from before you the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 13:19
    marker-yv: yv-n
  - type: text
    text: 'Canaanites and the Hittites and the Hivites and the Perizzites and the Girgashites and the Amorites and the Jebusites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Behold, the ark of the covenant of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 3:13; Job 41:11; Ps. 24:1; Mic. 4:13; Zech. 4:14; 6:5
    marker-yv: yv-n
  - type: text
    text: 'the Lord of all the earth is crossing over before you into the Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now therefore, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 4:2, 4
    marker-yv: yv-n
  - type: text
    text: 'take for yourselves twelve men from the tribes of Israel, one man from every tribe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And it shall come to pass, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 3:15, 16
    marker-yv: yv-n
  - type: text
    text: 'as soon as the soles of the feet of the priests who bear the ark of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 3:11
    marker-yv: yv-n
  - type: text
    text: 'the Lord of all the earth, shall rest in the waters of the Jordan, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' the waters of the Jordan shall be cut off, the waters that come down from upstream, and they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 78:13; 114:3
    marker-yv: yv-n
  - type: text
    text: shall stand as a heap.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So it was, when the people set out from their camp to cross over the Jordan, with the priests bearing the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 132:8; Acts 7:44, 45
    marker-yv: yv-n
  - type: text
    text: 'ark of the covenant before the people, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and as those who bore the ark came to the Jordan, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 3:13
    marker-yv: yv-n
  - type: text
    text: 'the feet of the priests who bore the ark dipped in the edge of the water (for the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 12:15; Jer. 12:5; 49:19
    marker-yv: yv-n
  - type: text
    text: 'Jordan overflows all its banks '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 4:18; 5:10, 12
    marker-yv: yv-n
  - type: text
    text: 'during the whole time of harvest), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'that the waters which came down from upstream stood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: still, and
  - type: text
    text: ' rose in a heap very far away at Adam, the city that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' beside '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 4:12; 7:46
    marker-yv: yv-n
  - type: text
    text: 'Zaretan. So the waters that went down '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 3:17
    marker-yv: yv-n
  - type: text
    text: 'into the Sea of the Arabah, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 14:3; Num. 34:3
    marker-yv: yv-n
  - type: text
    text: 'the Salt Sea, failed, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' were cut off; and the people crossed over opposite Jericho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the priests who bore the ark of the covenant of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' stood firm on dry ground in the midst of the Jordan; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 50:24; Ex. 3:8; 6:1–8; 14:21, 22, 29; 33:1; Deut. 6:10; Heb. 11:29
    marker-yv: yv-n
  - type: text
    text: and all Israel crossed over on dry ground, until all the people had crossed completely over the Jordan.
