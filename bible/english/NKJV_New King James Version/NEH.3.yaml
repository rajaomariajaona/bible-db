verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rebuilding the Wall
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 3:20; 12:10; 13:4, 7, 28
      marker-yv: yv-n
    - type: text
      text: 'Eliashib the high priest rose up with his brethren the priests '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 5:2
      marker-yv: yv-n
    - type: text
      text: 'and built the Sheep Gate; they consecrated it and hung its doors. They built '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 12:39
      marker-yv: yv-n
    - type: text
      text: 'as far as the Tower of the Hundred, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consecrated it, then as far as the Tower of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 31:38; Zech. 14:10
      marker-yv: yv-n
    - type: text
      text: 'Hananel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Next to them Jedaiah the son of Harumaph made repairs in front of his house. And next to him Hattush the son of Hashabniah made repairs.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Malchijah the son of Harim and Hashub the son of Pahath-Moab repaired another section, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 12:38
      marker-yv: yv-n
    - type: text
      text: 'as well as the Tower of the Ovens. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And next to him was Shallum the son of Hallohesh, leader of half the district of Jerusalem; he and his daughters made repairs.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Hanun and the inhabitants of Zanoah repaired '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 2:13, 15
      marker-yv: yv-n
    - type: text
      text: 'the Valley Gate. They built it, hung its doors with its bolts and bars, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: repaired
    - type: text
      text: ' a thousand cubits of the wall as far as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 2:13
      marker-yv: yv-n
    - type: text
      text: the Refuse Gate.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Malchijah the son of Rechab, leader of the district of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 6:1
      marker-yv: yv-n
    - type: text
      text: Beth Haccerem, repaired the Refuse Gate; he built it and hung its doors with its bolts and bars.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Shallun the son of Col-Hozeh, leader of the district of Mizpah, repaired '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 2:14
      marker-yv: yv-n
    - type: text
      text: 'the Fountain Gate; he built it, covered it, hung its doors with its bolts and bars, and repaired the wall of the Pool of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 8:6; John 9:7
      marker-yv: yv-n
    - type: text
      text: 'Shelah by the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:4
      marker-yv: yv-n
    - type: text
      text: 'King’s Garden, as far as the stairs that go down from the City of David. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'After him Nehemiah the son of Azbuk, leader of half the district of Beth Zur, made repairs as far as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: place
    - type: text
      text: ' in front of the tombs of David, to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 20:20; Is. 7:3; 22:11
      marker-yv: yv-n
    - type: text
      text: man-made pool, and as far as the House of the Mighty.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'After him the Levites, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: under
    - type: text
      text: ' Rehum the son of Bani, made repairs. Next to him Hashabiah, leader of half the district of Keilah, made repairs for his district. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'After him their brethren, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: under
    - type: text
      text: ' Bavai the son of Henadad, leader of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' half of the district of Keilah, made repairs. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And next to him Ezer the son of Jeshua, the leader of Mizpah, repaired another section in front of the Ascent to the Armory at the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 26:9
      marker-yv: yv-n
    - type: text
      text: 'buttress. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Next to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Eliashib
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 2:34; Neh. 7:36
      marker-yv: yv-n
    - type: text
      text: the men of Jericho built. And next to them Zaccur the son of Imri built.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'After him Baruch the son of Zabbai carefully repaired the other section, from the buttress to the door of the house of Eliashib the high priest. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: After him Meremoth the son of Urijah, the son of Koz, repaired another section, from the door of the house of Eliashib to the end of the house of Eliashib.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And after him the priests, the men of the plain, made repairs. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'After him Benjamin and Hasshub made repairs opposite their house. After them Azariah the son of Maaseiah, the son of Ananiah, made repairs by his house. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'After him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 8:33
      marker-yv: yv-n
    - type: text
      text: 'Binnui the son of Henadad repaired another section, from the house of Azariah to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 3:19
      marker-yv: yv-n
    - type: text
      text: 'the buttress, even as far as the corner. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Palal the son of Uzai '
    - type: usfm
      marker: it
      children:
      - type: text
        text: made
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: repairs
    - type: text
      text: ' opposite the buttress, and on the tower which projects from the king’s upper house that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' by the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 32:2; 33:1; 37:21
      marker-yv: yv-n
    - type: text
      text: 'court of the prison. After him Pedaiah the son of Parosh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: made
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: repairs.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Moreover '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 2:43; Neh. 11:21
      marker-yv: yv-n
    - type: text
      text: 'the Nethinim who dwelt in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 27:3
      marker-yv: yv-n
    - type: text
      text: 'Ophel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: made
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: repairs
    - type: text
      text: ' as far as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: place
    - type: text
      text: ' in front of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 8:1, 3; 12:37
      marker-yv: yv-n
    - type: text
      text: 'the Water Gate toward the east, and on the projecting tower. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: After them the Tekoites repaired another section, next to the great projecting tower, and as far as the wall of Ophel.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Beyond the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 11:16; 2 Chr. 23:15; Jer. 31:40
      marker-yv: yv-n
    - type: text
      text: 'Horse Gate the priests made repairs, each in front of his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' house. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'After them Zadok the son of Immer made repairs in front of his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' house. After him Shemaiah the son of Shechaniah, the keeper of the East Gate, made repairs. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Also the sons of Hassenaah built '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 33:14; Neh. 12:39; Zeph. 1:10
      marker-yv: yv-n
    - type: text
      text: 'the Fish Gate; they laid its beams and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 6:1; 7:1
      marker-yv: yv-n
    - type: text
      text: 'hung its doors with its bolts and bars. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'After him Hananiah the son of Shelemiah, and Hanun, the sixth son of Zalaph, repaired another section. After him Meshullam the son of Berechiah made repairs in front of his dwelling. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'After him Malchijah, one of the goldsmiths, made repairs as far as the house of the Nethinim and of the merchants, in front of the Miphkad Gate, and as far as the upper room at the corner. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And between the upper room at the corner, as far as the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 3:1; 12:39
      marker-yv: yv-n
    - type: text
      text: Sheep Gate, the goldsmiths and the merchants made repairs.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And next to them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 8:33
      marker-yv: yv-n
    - type: text
      text: 'Meremoth the son of Urijah, the son of Koz, made repairs. Next to them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 10:15
      marker-yv: yv-n
    - type: text
      text: 'Meshullam the son of Berechiah, the son of Meshezabel, made repairs. Next to them Zadok the son of Baana made repairs. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Next to them the Tekoites made repairs; but their nobles did not put their shoulders to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Judg. 5:23)
      marker-yv: yv-n
    - type: text
      text: the work of their Lord.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Moreover Jehoiada the son of Paseah and Meshullam the son of Besodeiah repaired '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 12:39
      marker-yv: yv-n
    - type: text
      text: 'the Old Gate; they laid its beams and hung its doors, with its bolts and bars. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And next to them Melatiah the Gibeonite, Jadon the Meronothite, the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 7:25
      marker-yv: yv-n
    - type: text
      text: 'men of Gibeon and Mizpah, repaired the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 8:36; Neh. 2:7–9
      marker-yv: yv-n
    - type: text
      text: 'residence of the governor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: region
    - type: text
      text: ' beyond the River. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Next to him Uzziel the son of Harhaiah, one of the goldsmiths, made repairs. Also next to him Hananiah, one of the perfumers, made repairs; and they fortified Jerusalem as far as the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 12:38
      marker-yv: yv-n
    - type: text
      text: 'Broad Wall. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And next to them Rephaiah the son of Hur, leader of half the district of Jerusalem, made repairs. '
