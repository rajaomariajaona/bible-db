  '1':
  - type: heading
    content: Rebuilding the Wall
  - type: text
    content: 'Then '
  - type: note
    content: Neh. 3:20; 12:10; 13:4, 7, 28
  - type: text
    content: 'Eliashib the high priest rose up with his brethren the priests '
  - type: note
    content: John 5:2
  - type: text
    content: 'and built the Sheep Gate; they consecrated it and hung its doors. They built '
  - type: note
    content: Neh. 12:39
  - type: text
    content: 'as far as the Tower of the Hundred, '
  - type: text
    content: and
  - type: text
    content: ' consecrated it, then as far as the Tower of '
  - type: note
    content: Jer. 31:38; Zech. 14:10
  - type: text
    content: 'Hananel. '
  '10':
  - type: text
    content: Next to them Jedaiah the son of Harumaph made repairs in front of his house. And next to him Hattush the son of Hashabniah made repairs.
  '11':
  - type: text
    content: 'Malchijah the son of Harim and Hashub the son of Pahath-Moab repaired another section, '
  - type: note
    content: Neh. 12:38
  - type: text
    content: 'as well as the Tower of the Ovens. '
  '12':
  - type: text
    content: And next to him was Shallum the son of Hallohesh, leader of half the district of Jerusalem; he and his daughters made repairs.
  '13':
  - type: text
    content: 'Hanun and the inhabitants of Zanoah repaired '
  - type: note
    content: Neh. 2:13, 15
  - type: text
    content: 'the Valley Gate. They built it, hung its doors with its bolts and bars, and '
  - type: text
    content: repaired
  - type: text
    content: ' a thousand cubits of the wall as far as '
  - type: note
    content: Neh. 2:13
  - type: text
    content: the Refuse Gate.
  '14':
  - type: text
    content: 'Malchijah the son of Rechab, leader of the district of '
  - type: note
    content: Jer. 6:1
  - type: text
    content: Beth Haccerem, repaired the Refuse Gate; he built it and hung its doors with its bolts and bars.
  '15':
  - type: text
    content: 'Shallun the son of Col-Hozeh, leader of the district of Mizpah, repaired '
  - type: note
    content: Neh. 2:14
  - type: text
    content: 'the Fountain Gate; he built it, covered it, hung its doors with its bolts and bars, and repaired the wall of the Pool of '
  - type: note
    content: Is. 8:6; John 9:7
  - type: text
    content: 'Shelah by the '
  - type: note
    content: 2 Kin. 25:4
  - type: text
    content: 'King’s Garden, as far as the stairs that go down from the City of David. '
  '16':
  - type: text
    content: 'After him Nehemiah the son of Azbuk, leader of half the district of Beth Zur, made repairs as far as '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: place
  - type: text
    content: ' in front of the tombs of David, to the '
  - type: note
    content: 2 Kin. 20:20; Is. 7:3; 22:11
  - type: text
    content: man-made pool, and as far as the House of the Mighty.
  '17':
  - type: text
    content: 'After him the Levites, '
  - type: text
    content: under
  - type: text
    content: ' Rehum the son of Bani, made repairs. Next to him Hashabiah, leader of half the district of Keilah, made repairs for his district. '
  '18':
  - type: text
    content: 'After him their brethren, '
  - type: text
    content: under
  - type: text
    content: ' Bavai the son of Henadad, leader of the '
  - type: text
    content: other
  - type: text
    content: ' half of the district of Keilah, made repairs. '
  '19':
  - type: text
    content: 'And next to him Ezer the son of Jeshua, the leader of Mizpah, repaired another section in front of the Ascent to the Armory at the '
  - type: note
    content: 2 Chr. 26:9
  - type: text
    content: 'buttress. '
  '2':
  - type: text
    content: 'Next to '
  - type: text
    content: Eliashib
  - type: text
    content: ' '
  - type: note
    content: Ezra 2:34; Neh. 7:36
  - type: text
    content: the men of Jericho built. And next to them Zaccur the son of Imri built.
  '20':
  - type: text
    content: 'After him Baruch the son of Zabbai carefully repaired the other section, from the buttress to the door of the house of Eliashib the high priest. '
  '21':
  - type: text
    content: After him Meremoth the son of Urijah, the son of Koz, repaired another section, from the door of the house of Eliashib to the end of the house of Eliashib.
  '22':
  - type: text
    content: 'And after him the priests, the men of the plain, made repairs. '
  '23':
  - type: text
    content: 'After him Benjamin and Hasshub made repairs opposite their house. After them Azariah the son of Maaseiah, the son of Ananiah, made repairs by his house. '
  '24':
  - type: text
    content: 'After him '
  - type: note
    content: Ezra 8:33
  - type: text
    content: 'Binnui the son of Henadad repaired another section, from the house of Azariah to '
  - type: note
    content: Neh. 3:19
  - type: text
    content: 'the buttress, even as far as the corner. '
  '25':
  - type: text
    content: 'Palal the son of Uzai '
  - type: text
    content: made
  - type: text
    content: ' '
  - type: text
    content: repairs
  - type: text
    content: ' opposite the buttress, and on the tower which projects from the king’s upper house that '
  - type: text
    content: was
  - type: text
    content: ' by the '
  - type: note
    content: Jer. 32:2; 33:1; 37:21
  - type: text
    content: 'court of the prison. After him Pedaiah the son of Parosh '
  - type: text
    content: made
  - type: text
    content: ' '
  - type: text
    content: repairs.
  '26':
  - type: text
    content: 'Moreover '
  - type: note
    content: Ezra 2:43; Neh. 11:21
  - type: text
    content: 'the Nethinim who dwelt in '
  - type: note
    content: 2 Chr. 27:3
  - type: text
    content: 'Ophel '
  - type: text
    content: made
  - type: text
    content: ' '
  - type: text
    content: repairs
  - type: text
    content: ' as far as '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: place
  - type: text
    content: ' in front of '
  - type: note
    content: Neh. 8:1, 3; 12:37
  - type: text
    content: 'the Water Gate toward the east, and on the projecting tower. '
  '27':
  - type: text
    content: After them the Tekoites repaired another section, next to the great projecting tower, and as far as the wall of Ophel.
  '28':
  - type: text
    content: 'Beyond the '
  - type: note
    content: 2 Kin. 11:16; 2 Chr. 23:15; Jer. 31:40
  - type: text
    content: 'Horse Gate the priests made repairs, each in front of his '
  - type: text
    content: own
  - type: text
    content: ' house. '
  '29':
  - type: text
    content: 'After them Zadok the son of Immer made repairs in front of his '
  - type: text
    content: own
  - type: text
    content: ' house. After him Shemaiah the son of Shechaniah, the keeper of the East Gate, made repairs. '
  '3':
  - type: text
    content: 'Also the sons of Hassenaah built '
  - type: note
    content: 2 Chr. 33:14; Neh. 12:39; Zeph. 1:10
  - type: text
    content: 'the Fish Gate; they laid its beams and '
  - type: note
    content: Neh. 6:1; 7:1
  - type: text
    content: 'hung its doors with its bolts and bars. '
  '30':
  - type: text
    content: 'After him Hananiah the son of Shelemiah, and Hanun, the sixth son of Zalaph, repaired another section. After him Meshullam the son of Berechiah made repairs in front of his dwelling. '
  '31':
  - type: text
    content: 'After him Malchijah, one of the goldsmiths, made repairs as far as the house of the Nethinim and of the merchants, in front of the Miphkad Gate, and as far as the upper room at the corner. '
  '32':
  - type: text
    content: 'And between the upper room at the corner, as far as the '
  - type: note
    content: Neh. 3:1; 12:39
  - type: text
    content: Sheep Gate, the goldsmiths and the merchants made repairs.
  '4':
  - type: text
    content: 'And next to them '
  - type: note
    content: Ezra 8:33
  - type: text
    content: 'Meremoth the son of Urijah, the son of Koz, made repairs. Next to them '
  - type: note
    content: Ezra 10:15
  - type: text
    content: 'Meshullam the son of Berechiah, the son of Meshezabel, made repairs. Next to them Zadok the son of Baana made repairs. '
  '5':
  - type: text
    content: 'Next to them the Tekoites made repairs; but their nobles did not put their shoulders to '
  - type: note
    content: (Judg. 5:23)
  - type: text
    content: the work of their Lord.
  '6':
  - type: text
    content: 'Moreover Jehoiada the son of Paseah and Meshullam the son of Besodeiah repaired '
  - type: note
    content: Neh. 12:39
  - type: text
    content: 'the Old Gate; they laid its beams and hung its doors, with its bolts and bars. '
  '7':
  - type: text
    content: 'And next to them Melatiah the Gibeonite, Jadon the Meronothite, the '
  - type: note
    content: Neh. 7:25
  - type: text
    content: 'men of Gibeon and Mizpah, repaired the '
  - type: note
    content: Ezra 8:36; Neh. 2:7–9
  - type: text
    content: 'residence of the governor '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: region
  - type: text
    content: ' beyond the River. '
  '8':
  - type: text
    content: 'Next to him Uzziel the son of Harhaiah, one of the goldsmiths, made repairs. Also next to him Hananiah, one of the perfumers, made repairs; and they fortified Jerusalem as far as the '
  - type: note
    content: Neh. 12:38
  - type: text
    content: 'Broad Wall. '
  '9':
  - type: text
    content: 'And next to them Rephaiah the son of Hur, leader of half the district of Jerusalem, made repairs. '
