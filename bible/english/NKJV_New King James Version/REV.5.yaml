document_id: REV.5,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Lamb Takes the Scroll
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And I saw in the right '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hand
    - type: text
      text: ' of Him who sat on the throne '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 2:9, 10
      marker-yv: yv-n
    - type: text
      text: 'a scroll written inside and on the back, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 29:11; Dan. 12:4
      marker-yv: yv-n
    - type: text
      text: 'sealed with seven seals. '
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And have made us '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:6
      marker-yv: yv-n
    - type: text
      text: 'kings and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 61:6
      marker-yv: yv-n
    - type: text
      text: priests to our God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And we shall reign on the earth.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then I looked, and I heard the voice of many angels around the throne, the living creatures, and the elders; and the number of them was ten thousand times ten thousand, and thousands of thousands, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'saying with a loud voice:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Worthy is the Lamb who was slain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To receive power and riches and wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And strength and honor and glory and blessing!”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 2:10; Rev. 5:3
      marker-yv: yv-n
    - type: text
      text: 'every creature which is in heaven and on the earth and under the earth and such as are in the sea, and all that are in them, I heard saying:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 29:11; Rom. 9:5; 1 Tim. 6:16; 1 Pet. 4:11
      marker-yv: yv-n
    - type: text
      text: “Blessing and honor and glory and power
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Be
    - type: text
      text: ' to Him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:2, 3; 6:16; 20:11
      marker-yv: yv-n
    - type: text
      text: who sits on the throne,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to the Lamb, forever and ever!”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then the four living creatures said, “Amen!” And the twenty-four elders fell down and worshiped Him who lives forever and ever.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then I saw a strong angel proclaiming with a loud voice, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:11; 5:9
      marker-yv: yv-n
    - type: text
      text: '“Who is worthy to open the scroll and to loose its seals?” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And no one in heaven or on the earth or under the earth was able to open the scroll, or to look at it.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So I wept much, because no one was found worthy to open and read the scroll, or to look at it. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But one of the elders said to me, “Do not weep. Behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 49:9
      marker-yv: yv-n
    - type: text
      text: 'the Lion of the tribe of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 7:14
      marker-yv: yv-n
    - type: text
      text: 'Judah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 11:1, 10; Rom. 15:12; Rev. 22:16
      marker-yv: yv-n
    - type: text
      text: 'the Root of David, has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 3:21
      marker-yv: yv-n
    - type: text
      text: 'prevailed to open the scroll '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 6:1
      marker-yv: yv-n
    - type: text
      text: and to loose its seven seals.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And I looked, and behold, in the midst of the throne and of the four living creatures, and in the midst of the elders, stood '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 53:7; (John 1:29; 1 Pet. 1:19)
      marker-yv: yv-n
    - type: text
      text: 'a Lamb as though it had been slain, having seven horns and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 3:9; 4:10
      marker-yv: yv-n
    - type: text
      text: 'seven eyes, which are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 1:4; 3:1; 4:5
      marker-yv: yv-n
    - type: text
      text: 'the seven Spirits of God sent out into all the earth. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then He came and took the scroll out of the right hand '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:2
      marker-yv: yv-n
    - type: text
      text: of Him who sat on the throne.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Worthy Is the Lamb
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Now when He had taken the scroll, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:8–10; 19:4
      marker-yv: yv-n
    - type: text
      text: 'the four living creatures and the twenty-four elders fell down before the Lamb, each having a harp, and golden bowls full of incense, which are the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 141:2; Rev. 8:3
      marker-yv: yv-n
    - type: text
      text: 'prayers of the saints. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 14:3
      marker-yv: yv-n
    - type: text
      text: 'they sang a new song, saying:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:11
      marker-yv: yv-n
    - type: text
      text: “You are worthy to take the scroll,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to open its seals;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For You were slain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 1:29
      marker-yv: yv-n
    - type: text
      text: 'have redeemed us to God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 9:12; 1 Pet. 1:18, 19)
      marker-yv: yv-n
    - type: text
      text: by Your blood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Out of every tribe and tongue and people and nation,
