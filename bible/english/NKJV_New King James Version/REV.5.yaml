document_id: REV.5,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lamb Takes the Scroll
  - type: text
    content: 'And I saw in the right '
  - type: text
    content: hand
  - type: text
    content: ' of Him who sat on the throne '
  - type: note
    content: Ezek. 2:9, 10
  - type: text
    content: 'a scroll written inside and on the back, '
  - type: note
    content: Is. 29:11; Dan. 12:4
  - type: text
    content: 'sealed with seven seals. '
  '10':
  - type: text
    content: 'And have made us '
  - type: note
    content: Ex. 19:6
  - type: text
    content: 'kings and '
  - type: note
    content: Is. 61:6
  - type: text
    content: priests to our God;
  - type: text
    content: And we shall reign on the earth.”
  '11':
  - type: text
    content: 'Then I looked, and I heard the voice of many angels around the throne, the living creatures, and the elders; and the number of them was ten thousand times ten thousand, and thousands of thousands, '
  '12':
  - type: text
    content: 'saying with a loud voice:'
  - type: text
    content: “Worthy is the Lamb who was slain
  - type: text
    content: To receive power and riches and wisdom,
  - type: text
    content: And strength and honor and glory and blessing!”
  '13':
  - type: text
    content: 'And '
  - type: note
    content: Phil. 2:10; Rev. 5:3
  - type: text
    content: 'every creature which is in heaven and on the earth and under the earth and such as are in the sea, and all that are in them, I heard saying:'
  - type: note
    content: 1 Chr. 29:11; Rom. 9:5; 1 Tim. 6:16; 1 Pet. 4:11
  - type: text
    content: “Blessing and honor and glory and power
  - type: text
    content: Be
  - type: text
    content: ' to Him '
  - type: note
    content: Rev. 4:2, 3; 6:16; 20:11
  - type: text
    content: who sits on the throne,
  - type: text
    content: And to the Lamb, forever and ever!”
  '14':
  - type: text
    content: Then the four living creatures said, “Amen!” And the twenty-four elders fell down and worshiped Him who lives forever and ever.
  '2':
  - type: text
    content: 'Then I saw a strong angel proclaiming with a loud voice, '
  - type: note
    content: Rev. 4:11; 5:9
  - type: text
    content: '“Who is worthy to open the scroll and to loose its seals?” '
  '3':
  - type: text
    content: And no one in heaven or on the earth or under the earth was able to open the scroll, or to look at it.
  '4':
  - type: text
    content: 'So I wept much, because no one was found worthy to open and read the scroll, or to look at it. '
  '5':
  - type: text
    content: 'But one of the elders said to me, “Do not weep. Behold, '
  - type: note
    content: Gen. 49:9
  - type: text
    content: 'the Lion of the tribe of '
  - type: note
    content: Heb. 7:14
  - type: text
    content: 'Judah, '
  - type: note
    content: Is. 11:1, 10; Rom. 15:12; Rev. 22:16
  - type: text
    content: 'the Root of David, has '
  - type: note
    content: Rev. 3:21
  - type: text
    content: 'prevailed to open the scroll '
  - type: note
    content: Rev. 6:1
  - type: text
    content: and to loose its seven seals.”
  '6':
  - type: text
    content: 'And I looked, and behold, in the midst of the throne and of the four living creatures, and in the midst of the elders, stood '
  - type: note
    content: Is. 53:7; (John 1:29; 1 Pet. 1:19)
  - type: text
    content: 'a Lamb as though it had been slain, having seven horns and '
  - type: note
    content: Zech. 3:9; 4:10
  - type: text
    content: 'seven eyes, which are '
  - type: note
    content: Rev. 1:4; 3:1; 4:5
  - type: text
    content: 'the seven Spirits of God sent out into all the earth. '
  '7':
  - type: text
    content: 'Then He came and took the scroll out of the right hand '
  - type: note
    content: Rev. 4:2
  - type: text
    content: of Him who sat on the throne.
  - type: heading
    content: Worthy Is the Lamb
  '8':
  - type: text
    content: 'Now when He had taken the scroll, '
  - type: note
    content: Rev. 4:8–10; 19:4
  - type: text
    content: 'the four living creatures and the twenty-four elders fell down before the Lamb, each having a harp, and golden bowls full of incense, which are the '
  - type: note
    content: Ps. 141:2; Rev. 8:3
  - type: text
    content: 'prayers of the saints. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: Rev. 14:3
  - type: text
    content: 'they sang a new song, saying:'
  - type: note
    content: Rev. 4:11
  - type: text
    content: “You are worthy to take the scroll,
  - type: text
    content: And to open its seals;
  - type: text
    content: For You were slain,
  - type: text
    content: 'And '
  - type: note
    content: John 1:29
  - type: text
    content: 'have redeemed us to God '
  - type: note
    content: (Heb. 9:12; 1 Pet. 1:18, 19)
  - type: text
    content: by Your blood
  - type: text
    content: Out of every tribe and tongue and people and nation,
