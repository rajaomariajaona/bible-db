    content: The Decree of Darius
  - type: text
    content: 'Then King Darius issued a decree, '
  - type: note
    content: Ezra 5:17
  - type: text
    content: 'and a search was made in the archives, where the treasures were stored in Babylon. '
  '10':
  - type: note
    content: Ezra 7:23; (Jer. 29:7; 1 Tim. 2:1, 2)
  - type: text
    content: that they may offer sacrifices of sweet aroma to the God of heaven, and pray for the life of the king and his sons.
  '11':
  - type: text
    content: 'Also I issue a decree that whoever alters this edict, let a timber be pulled from his house and erected, and let him be hanged on it; '
  - type: note
    content: Dan. 2:5; 3:29
  - type: text
    content: 'and let his house be made a refuse heap because of this. '
  '12':
  - type: text
    content: 'And may the God who causes His '
