document_id: EZR.6,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Decree of Darius
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then King Darius issued a decree, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 5:17
      marker-yv: yv-n
    - type: text
      text: 'and a search was made in the archives, where the treasures were stored in Babylon. '
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 7:23; (Jer. 29:7; 1 Tim. 2:1, 2)
      marker-yv: yv-n
    - type: text
      text: that they may offer sacrifices of sweet aroma to the God of heaven, and pray for the life of the king and his sons.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Also I issue a decree that whoever alters this edict, let a timber be pulled from his house and erected, and let him be hanged on it; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 2:5; 3:29
      marker-yv: yv-n
    - type: text
      text: 'and let his house be made a refuse heap because of this. '
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And may the God who causes His '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:5, 11; 1 Kin. 9:3
      marker-yv: yv-n
    - type: text
      text: name to dwell there destroy any king or people who put their hand to alter it, or to destroy this house of God which is in Jerusalem. I Darius issue a decree; let it be done diligently.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Temple Completed and Dedicated
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Tattenai, governor of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: region
    - type: text
      text: ' beyond the River, Shethar-Boznai, and their companions diligently did according to what King Darius had sent. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 5:1, 2
      marker-yv: yv-n
    - type: text
      text: 'So the elders of the Jews built, and they prospered through the prophesying of Haggai the prophet and Zechariah the son of Iddo. And they built and finished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' according to the commandment of the God of Israel, and according to the command of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 1:1; 5:13; 6:3
      marker-yv: yv-n
    - type: text
      text: 'Cyrus, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 4:24; 6:12
      marker-yv: yv-n
    - type: text
      text: 'Darius, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 7:1, 11; Neh. 2:1
      marker-yv: yv-n
    - type: text
      text: 'Artaxerxes king of Persia. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the temple was finished on the third day of the month of Adar, which was in the sixth year of the reign of King Darius. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the children of Israel, the priests and the Levites and the rest of the descendants of the captivity, celebrated '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:63; 2 Chr. 7:5
      marker-yv: yv-n
    - type: text
      text: 'the dedication of this house of God with joy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 8:35
      marker-yv: yv-n
    - type: text
      text: 'offered sacrifices at the dedication of this house of God, one hundred bulls, two hundred rams, four hundred lambs, and as a sin offering for all Israel twelve male goats, according to the number of the tribes of Israel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They assigned the priests to their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 24:1; 2 Chr. 35:5
      marker-yv: yv-n
    - type: text
      text: 'divisions and the Levites to their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 23:6
      marker-yv: yv-n
    - type: text
      text: 'divisions, over the service of God in Jerusalem, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 3:6; 8:9
      marker-yv: yv-n
    - type: text
      text: as it is written in the Book of Moses.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Passover Celebrated
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the descendants of the captivity kept the Passover '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:6
      marker-yv: yv-n
    - type: text
      text: 'on the fourteenth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the first month. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And at Achmetha, in the palace that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in the province of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 17:6
      marker-yv: yv-n
    - type: text
      text: 'Media, a scroll was found, and in it a record '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' written thus:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the priests and the Levites had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 29:34; 30:15
      marker-yv: yv-n
    - type: text
      text: 'purified themselves; all of them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ritually
    - type: text
      text: ' clean. And they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 35:11
      marker-yv: yv-n
    - type: text
      text: 'slaughtered the Passover '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lambs
    - type: text
      text: ' for all the descendants of the captivity, for their brethren the priests, and for themselves. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the children of Israel who had returned from the captivity ate together with all who had separated themselves from the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 9:11
      marker-yv: yv-n
    - type: text
      text: 'filth of the nations of the land in order to seek the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they kept the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:15; 13:6, 7; 2 Chr. 30:21; 35:17
      marker-yv: yv-n
    - type: text
      text: 'Feast of Unleavened Bread seven days with joy; for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made them joyful, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 7:27; (Prov. 21:1)
      marker-yv: yv-n
    - type: text
      text: 'turned the heart '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:29; 2 Chr. 33:11; Ezra 1:1; 6:1
      marker-yv: yv-n
    - type: text
      text: of the king of Assyria toward them, to strengthen their hands in the work of the house of God, the God of Israel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the first year of King Cyrus, King Cyrus issued a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 1:1; 5:13
      marker-yv: yv-n
    - type: text
      text: 'decree '
    - type: usfm
      marker: it
      children:
      - type: text
        text: concerning
    - type: text
      text: ' the house of God at Jerusalem: “Let the house be rebuilt, the place where they offered sacrifices; and let the foundations of it be firmly laid, its height sixty cubits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' its width sixty cubits,'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:36
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' three rows of heavy stones and one row of new timber. Let the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 3:7
      marker-yv: yv-n
    - type: text
      text: expenses be paid from the king’s treasury.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Also let '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 1:7, 8; 5:14
      marker-yv: yv-n
    - type: text
      text: 'the gold and silver articles of the house of God, which Nebuchadnezzar took from the temple which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in Jerusalem and brought to Babylon, be restored and taken back to the temple which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in Jerusalem, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: each
    - type: text
      text: ' to its place; and deposit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' in the house of God”—'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 5:3, 6
      marker-yv: yv-n
    - type: text
      text: 'Now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: therefore,
    - type: text
      text: ' Tattenai, governor of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: region
    - type: text
      text: ' beyond the River, and Shethar-Boznai, and your companions the Persians who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' beyond the River, keep yourselves far from there.'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the work of this house of God alone; let the governor of the Jews and the elders of the Jews build this house of God on its site.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Moreover I issue a decree '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' what you shall do for the elders of these Jews, for the building of this house of God: Let the cost be paid at the king’s expense from taxes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: region
    - type: text
      text: ' beyond the River; this is to be given immediately to these men, so that they are not hindered.'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And whatever they need—young bulls, rams, and lambs for the burnt offerings of the God of heaven, wheat, salt, wine, and oil, according to the request of the priests who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in Jerusalem—let it be given them day by day without fail,'
