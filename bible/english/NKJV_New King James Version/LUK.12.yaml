verses:
  '1':
  - type: heading
    content: Beware of Hypocrisy
  - type: text
    content: 'In '
  - type: note
    content: Matt. 16:6; Mark 8:15
  - type: text
    content: 'the meantime, when an innumerable multitude of people had gathered together, so that they trampled one another, He began to say to His disciples first '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: all,
  - type: text
    content: ' '
  - type: note
    content: Matt. 16:12; Luke 11:39
  - type: text
    content: '“Beware of the '
  - type: text
    content: leaven of the Pharisees, which is hypocrisy.
  - type: text
    content: ' '
  '10':
  - type: text
    content: '“And '
  - type: note
    content: (Matt. 12:31, 32; Mark 3:28; 1 John 5:16)
  - type: text
    content: anyone who speaks a word against the Son of Man, it will be forgiven him; but to him who blasphemes against the Holy Spirit, it will not be forgiven.
  '11':
  - type: note
    content: Matt. 6:25; 10:19; Mark 13:11
  - type: text
    content: “Now when they bring you to the synagogues and magistrates and authorities, do not worry about how or what you should answer, or what you should say.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'For the Holy Spirit will '
  - type: note
    content: (John 14:26)
  - type: text
    content: teach you in that very hour what you ought to say.”
  - type: heading
    content: The Parable of the Rich Fool
  '13':
  - type: text
    content: Then one from the crowd said to Him, “Teacher, tell my brother to divide the inheritance with me.”
  '14':
  - type: text
    content: 'But He said to him, '
  - type: note
    content: (John 18:36)
  - type: text
    content: “Man, who made Me a judge or an arbitrator over you?”
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'And He said to them, '
  - type: note
    content: (1 Tim. 6:6–10)
  - type: text
    content: '“Take heed and beware of '
  - type: text
    content: covetousness,
  - type: text
    content: ' for one’s life does not consist in the abundance of the things he possesses.”'
  '16':
  - type: text
    content: 'Then He spoke a parable to them, saying: '
  - type: text
    content: “The ground of a certain rich man yielded plentifully.
  - type: text
    content: ' '
  '17':
  - type: text
    content: And he thought within himself, saying, ‘What shall I do, since I have no room to store my crops?’
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'So he said, ‘I will do this: I will pull down my barns and build greater, and there I will store all my crops and my goods.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And I will say to my soul, '
  - type: note
    content: Eccl. 11:9; 1 Cor. 15:32; James 5:5
  - type: text
    content: '“Soul, you have many goods laid up for many years; take your ease; '
  - type: note
    content: (Eccl. 2:24; 3:13; 5:18; 8:15)
  - type: text
    content: 'eat, drink, '
  - type: text
    content: and
  - type: text
    content: ' be merry.” ’'
  - type: text
    content: ' '
  '2':
  - type: note
    content: Matt. 10:26; Mark 4:22; Luke 8:17; (1 Cor. 4:5)
  - type: text
    content: For there is nothing covered that will not be revealed, nor hidden that will not be known.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'But God said to him, ‘Fool! This night '
  - type: note
    content: Job 27:8; Ps. 52:7; (James 4:14)
  - type: text
    content: 'your soul will be required of you; '
  - type: note
    content: Ps. 39:6; Jer. 17:11
  - type: text
    content: then whose will those things be which you have provided?’
  '21':
  - type: text
    content: '“So '
  - type: text
    content: is
  - type: text
    content: ' he who lays up treasure for himself, '
  - type: note
    content: (Matt. 6:20; Luke 12:33; 1 Tim. 6:18, 19; James 2:5; 5:1–5)
  - type: text
    content: and is not rich toward God.”
  - type: heading
    content: Do Not Worry
  '22':
  - type: text
    content: 'Then He said to His disciples, '
  - type: text
    content: '“Therefore I say to you, '
  - type: note
    content: Matt. 6:25–33
  - type: text
    content: do not worry about your life, what you will eat; nor about the body, what you will put on.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Life is more than food, and the body '
  - type: text
    content: is more
  - type: text
    content: ' than clothing.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Consider the ravens, for they neither sow nor reap, which have neither storehouse nor barn; and '
  - type: note
    content: Job 38:41; Ps. 147:9
  - type: text
    content: God feeds them. Of how much more value are you than the birds?
  - type: text
    content: ' '
  '25':
  - type: text
    content: And which of you by worrying can add one cubit to his stature?
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'If you then are not able to do '
  - type: text
    content: the
  - type: text
    content: ' least, why '
  - type: text
    content: are you anxious for the rest?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Consider the lilies, how they grow: they neither toil nor spin; and yet I say to you, even '
  - type: note
    content: 1 Kin. 10:4–7; 2 Chr. 9:3–6
  - type: text
    content: 'Solomon in all his glory was not '
  - type: text
    content: arrayed like one of these.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'If then God so clothes the grass, which today is in the field and tomorrow is thrown into the oven, how much more '
  - type: text
    content: will He clothe
  - type: text
    content: ' you, O '
  - type: text
    content: you
  - type: text
    content: ' of '
  - type: note
    content: Matt. 6:30; 8:26; 14:31; 16:8
  - type: text
    content: little faith?
  '29':
  - type: text
    content: “And do not seek what you should eat or what you should drink, nor have an anxious mind.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Therefore whatever you have spoken in the dark will be heard in the light, and what you have spoken in the ear in inner rooms will be proclaimed on the housetops.
  - type: heading
    content: Jesus Teaches the Fear of God
  '30':
  - type: text
    content: 'For all these things the nations of the world seek after, and your Father '
  - type: note
    content: Matt. 6:31, 32
  - type: text
    content: knows that you need these things.
  - type: text
    content: ' '
  '31':
  - type: note
    content: Matt. 6:33
  - type: text
    content: 'But seek '
  - type: text
    content: the kingdom of God, and all these things
  - type: text
    content: ' shall be added to you.'
  '32':
  - type: text
    content: '“Do not fear, little flock, for '
  - type: note
    content: (Dan. 7:18, 27); Zech. 13:7; (Matt. 11:25, 26; Luke 22:29, 30)
  - type: text
    content: it is your Father’s good pleasure to give you the kingdom.
  - type: text
    content: ' '
  '33':
  - type: note
    content: Matt. 19:21; Acts 2:45; 4:34
  - type: text
    content: 'Sell what you have and give '
  - type: note
    content: Luke 11:41
  - type: text
    content: 'alms; '
  - type: note
    content: Matt. 6:20; Luke 16:9; (1 Tim. 6:19)
  - type: text
    content: provide yourselves money bags which do not grow old, a treasure in the heavens that does not fail, where no thief approaches nor moth destroys.
  - type: text
    content: ' '
  '34':
  - type: text
    content: For where your treasure is, there your heart will be also.
  - type: heading
    content: The Faithful Servant and the Evil Servant
  '35':
  - type: note
    content: (Eph. 6:14; 1 Pet. 1:13)
  - type: text
    content: '“Let your waist be girded and '
  - type: note
    content: (Matt. 25:1–13)
  - type: text
    content: your
  - type: text
    content: ' lamps burning;'
  - type: text
    content: ' '
  '36':
  - type: text
    content: and you yourselves be like men who wait for their master, when he will return from the wedding, that when he comes and knocks they may open to him immediately.
  - type: text
    content: ' '
  '37':
  - type: note
    content: Matt. 24:46
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' those servants whom the master, when he comes, will find watching. Assuredly, I say to you that he will gird himself and have them sit down '
  - type: text
    content: to eat,
  - type: text
    content: ' and will come and serve them.'
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'And if he should come in the second watch, or come in the third watch, and find '
  - type: text
    content: them
  - type: text
    content: ' so, blessed are those servants.'
  - type: text
    content: ' '
  '39':
  - type: note
    content: Matt. 24:43; 1 Thess. 5:2; (2 Pet. 3:10); Rev. 3:3; 16:15
  - type: text
    content: 'But know this, that if the master of the house had known what hour the thief would come, he would '
  - type: text
    content: have watched and
  - type: text
    content: ' not allowed his house to be broken into.'
  - type: text
    content: ' '
  '4':
  - type: note
    content: Is. 51:7, 8, 12, 13; Jer. 1:8; Matt. 10:28
  - type: text
    content: '“And I say to you, '
  - type: note
    content: (John 15:13–15)
  - type: text
    content: My friends, do not be afraid of those who kill the body, and after that have no more that they can do.
  - type: text
    content: ' '
  '40':
  - type: note
    content: Matt. 24:44; 25:13; Mark 13:33; (Luke 21:34, 36); 1 Thess. 5:6; (2 Pet. 3:12)
  - type: text
    content: Therefore you also be ready, for the Son of Man is coming at an hour you do not expect.”
  '41':
  - type: text
    content: 'Then Peter said to Him, “Lord, do You speak this parable '
  - type: text
    content: only
  - type: text
    content: ' to us, or to all '
  - type: text
    content: people?
  - type: text
    content: ”
  '42':
  - type: text
    content: 'And the Lord said, '
  - type: note
    content: Matt. 24:45, 46; 25:21; (1 Cor. 4:2)
  - type: text
    content: '“Who then is that faithful and wise steward, whom '
  - type: text
    content: his
  - type: text
    content: ' master will make ruler over his household, to give '
  - type: text
    content: them their
  - type: text
    content: ' portion of food '
  - type: text
    content: in due season?
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' that servant whom his master will find so doing when he comes.'
  - type: text
    content: ' '
  '44':
  - type: note
    content: Matt. 24:47; 25:21; (Rev. 3:21)
  - type: text
    content: Truly, I say to you that he will make him ruler over all that he has.
  - type: text
    content: ' '
  '45':
  - type: note
    content: Matt. 24:48; 2 Pet. 3:3, 4
  - type: text
    content: But if that servant says in his heart, ‘My master is delaying his coming,’ and begins to beat the male and female servants, and to eat and drink and be drunk,
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'the master of that servant will come on a '
  - type: note
    content: 1 Thess. 5:3
  - type: text
    content: 'day when he is not looking for '
  - type: text
    content: him,
  - type: text
    content: ' and at an hour when he is not aware, and will cut him in two and appoint '
  - type: text
    content: him
  - type: text
    content: ' his portion with the unbelievers.'
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'And '
  - type: note
    content: Num. 15:30; Deut. 25:2; (John 9:41; 15:22; Acts 17:30)
  - type: text
    content: 'that servant who '
  - type: note
    content: (James 4:17)
  - type: text
    content: 'knew his master’s will, and did not prepare '
  - type: text
    content: himself
  - type: text
    content: ' or do according to his will, shall be beaten with many '
  - type: text
    content: stripes.
  - type: text
    content: ' '
  '48':
  - type: note
    content: (Lev. 5:17); Num. 15:29; (1 Tim. 1:13)
  - type: text
    content: But he who did not know, yet committed things deserving of stripes, shall be beaten with few. For everyone to whom much is given, from him much will be required; and to whom much has been committed, of him they will ask the more.
  - type: heading
    content: Christ Brings Division
  '49':
  - type: note
    content: Luke 12:51
  - type: text
    content: “I came to send fire on the earth, and how I wish it were already kindled!
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'But I will show you whom you should fear: Fear Him who, after He has killed, has power to cast into hell; yes, I say to you, '
  - type: note
    content: Ps. 119:120
  - type: text
    content: fear Him!
  '50':
  - type: text
    content: 'But '
  - type: note
    content: Matt. 20:18, 22, 23; Mark 10:38
  - type: text
    content: 'I have a baptism to be baptized with, and how distressed I am till it is '
  - type: note
    content: John 12:27; 19:30
  - type: text
    content: accomplished!
  - type: text
    content: ' '
  '51':
  - type: note
    content: Matt. 10:34–36
  - type: text
    content: 'Do '
  - type: text
    content: you
  - type: text
    content: ' suppose that I came to give peace on earth? I tell you, not at all, '
  - type: note
    content: Mic. 7:6; John 7:43; 9:16; 10:19; Acts 14:4
  - type: text
    content: but rather division.
  - type: text
    content: ' '
  '52':
  - type: note
    content: Matt. 10:35; Mark 13:12
  - type: text
    content: 'For from now on five in one house will be divided: three against two, and two against three.'
  - type: text
    content: ' '
  '53':
  - type: note
    content: Matt. 10:21, 36
  - type: text
    content: Father will be divided against son and son against father, mother against daughter and daughter against mother, mother-in-law against her daughter-in-law and daughter-in-law against her mother-in-law.”
  - type: heading
    content: Discern the Time
  '54':
  - type: text
    content: 'Then He also said to the multitudes, '
  - type: note
    content: Matt. 16:2, 3
  - type: text
    content: “Whenever you see a cloud rising out of the west, immediately you say, ‘A shower is coming’; and so it is.
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'And when '
  - type: text
    content: you see
  - type: text
    content: ' the '
  - type: note
    content: Job 37:17
  - type: text
    content: south wind blow, you say, ‘There will be hot weather’; and there is.
  - type: text
    content: ' '
  '56':
  - type: text
    content: 'Hypocrites! You can discern the face of the sky and of the earth, but how '
  - type: text
    content: is it
  - type: text
    content: ' you do not discern '
  - type: note
    content: Luke 19:41–44
  - type: text
    content: this time?
  - type: heading
    content: Make Peace with Your Adversary
  '57':
  - type: text
    content: “Yes, and why, even of yourselves, do you not judge what is right?
  - type: text
    content: ' '
  '58':
  - type: note
    content: Prov. 25:8; Matt. 5:25, 26
  - type: text
    content: 'When you go with your adversary to the magistrate, make every effort '
  - type: note
    content: (Ps. 32:6; Is. 55:6)
  - type: text
    content: along the way to settle with him, lest he drag you to the judge, the judge deliver you to the officer, and the officer throw you into prison.
  - type: text
    content: ' '
  '59':
  - type: text
    content: I tell you, you shall not depart from there till you have paid the very last mite.”
  '6':
  - type: text
    content: '“Are not five sparrows sold for two '
  - type: text
    content: copper coins?
  - type: text
    content: ' And '
  - type: note
    content: Matt. 6:26
  - type: text
    content: not one of them is forgotten before God.
  - type: text
    content: ' '
  '7':
  - type: text
    content: But the very hairs of your head are all numbered. Do not fear therefore; you are of more value than many sparrows.
  - type: heading
    content: Confess Christ Before Men
  '8':
  - type: note
    content: 1 Sam. 2:30; Matt. 10:32; (Mark 8:38; Rom. 10:9; 2 Tim. 2:12; 1 John 2:23)
  - type: text
    content: '“Also I say to you, whoever confesses Me '
  - type: note
    content: Ps. 119:46
  - type: text
    content: before men, him the Son of Man also will confess before the angels of God.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'But he who '
  - type: note
    content: Matt. 10:33; (Mark 8:38; 2 Tim. 2:12)
  - type: text
    content: denies Me before men will be denied before the angels of God.
