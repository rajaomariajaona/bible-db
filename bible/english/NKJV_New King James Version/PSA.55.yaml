document_id: PSA.55,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Trust in God Concerning the Treachery of Friends
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. With stringed instruments. A Contemplation of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give ear to my prayer, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And do not hide Yourself from my supplication.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Day and night they go around it on its walls;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 10:7
      marker-yv: yv-n
    - type: text
      text: 'Iniquity and trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' also in the midst of it.'
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Destruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in its midst;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 10:7
      marker-yv: yv-n
    - type: text
      text: Oppression and deceit do not depart from its streets.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 41:9
      marker-yv: yv-n
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not an enemy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' reproaches me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then I could bear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' hates me who has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 35:26; 38:16
      marker-yv: yv-n
    - type: text
      text: 'exalted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: himself
    - type: text
      text: ' against me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then I could hide from him.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' you, a man my equal,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:12
      marker-yv: yv-n
    - type: text
      text: My companion and my acquaintance.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We took sweet counsel together,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 42:4
      marker-yv: yv-n
    - type: text
      text: walked to the house of God in the throng.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let death seize them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:30, 33
      marker-yv: yv-n
    - type: text
      text: go down alive into hell,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in their dwellings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' among them.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As for me, I will call upon God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shall save me.'
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 6:10; Luke 18:1; Acts 3:1; 10:3, 30
      marker-yv: yv-n
    - type: text
      text: Evening and morning and at noon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will pray, and cry aloud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And He shall hear my voice.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He has redeemed my soul in peace from the battle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' against me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 32:7, 8
      marker-yv: yv-n
    - type: text
      text: there were many against me.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God will hear, and afflict them,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 33:27)
      marker-yv: yv-n
    - type: text
      text: Even He who abides from of old.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because they do not change,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore they do not fear God.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Attend to me, and hear me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 38:14; 59:11; Ezek. 7:16
      marker-yv: yv-n
    - type: text
      text: am restless in my complaint, and moan noisily,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 12:1
      marker-yv: yv-n
    - type: text
      text: 'put forth his hands against those who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 7:4
      marker-yv: yv-n
    - type: text
      text: were at peace with him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has broken his covenant.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 28:3; 57:4; (Prov. 5:3, 4; 12:18)
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: The
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: words
    - type: text
      text: ' of his mouth were smoother than butter,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But war '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in his heart;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His words were softer than oil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yet they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' drawn swords.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 37:5; Matt. 6:25–34; Luke 12:22–31; 1 Pet. 5:7)
      marker-yv: yv-n
    - type: text
      text: 'Cast your burden on the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:24
      marker-yv: yv-n
    - type: text
      text: He shall sustain you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall never permit the righteous to be moved.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But You, O God, shall bring them down to the pit of destruction;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 5:6
      marker-yv: yv-n
    - type: text
      text: 'Bloodthirsty and deceitful men '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 10:27
      marker-yv: yv-n
    - type: text
      text: shall not live out half their days;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But I will trust in You.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because of the voice of the enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because of the oppression of the wicked;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 16:7, 8
      marker-yv: yv-n
    - type: text
      text: For they bring down trouble upon me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in wrath they hate me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 116:3
      marker-yv: yv-n
    - type: text
      text: My heart is severely pained within me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the terrors of death have fallen upon me.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fearfulness and trembling have come upon me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And horror has overwhelmed me.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So I said, “Oh, that I had wings like a dove!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would fly away and be at rest.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Indeed, I would wander far off,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' remain in the wilderness.'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would hasten my escape
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From the windy storm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tempest.”'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Destroy, O Lord, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' divide their tongues,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I have seen '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 6:7
      marker-yv: yv-n
    - type: text
      text: violence and strife in the city.
