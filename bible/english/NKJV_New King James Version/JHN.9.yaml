  '1':
  - type: heading
    content: A Man Born Blind Receives Sight
  - type: text
    content: 'Now as '
  - type: text
    content: Jesus
  - type: text
    content: ' passed by, He saw a man who was blind from birth. '
  '10':
  - type: text
    content: Therefore they said to him, “How were your eyes opened?”
  '11':
  - type: text
    content: 'He answered and said, '
  - type: note
    content: John 9:6, 7
  - type: text
    content: '“A Man called Jesus made clay and anointed my eyes and said to me, '
  - type: text
    content: '‘Go to '
  - type: text
    content: the pool of
  - type: text
    content: ' Siloam and wash.’'
  - type: text
    content: ' So I went and washed, and I received sight.”'
  '12':
  - type: text
    content: Then they said to him, “Where is He?”
  - type: text
    content: He said, “I do not know.”
  - type: heading
    content: The Pharisees Excommunicate the Healed Man
  '13':
  - type: text
    content: 'They brought him who formerly was blind to the Pharisees. '
  '14':
  - type: text
    content: 'Now it was a Sabbath when Jesus made the clay and opened his eyes. '
  '15':
  - type: text
    content: Then the Pharisees also asked him again how he had received his sight. He said to them, “He put clay on my eyes, and I washed, and I see.”
  '16':
  - type: text
    content: Therefore some of the Pharisees said, “This Man is not from God, because He does not keep the Sabbath.”
  - type: text
    content: 'Others said, '
  - type: note
    content: John 3:2; 9:33
  - type: text
    content: '“How can a man who is a sinner do such signs?” And '
  - type: note
    content: John 7:12, 43; 10:19
  - type: text
    content: there was a division among them.
  '17':
  - type: text
    content: They said to the blind man again, “What do you say about Him because He opened your eyes?”
  - type: text
    content: 'He said, '
  - type: note
    content: (John 4:19; 6:14)
  - type: text
    content: “He is a prophet.”
  '18':
  - type: text
    content: 'But the Jews did not believe concerning him, that he had been blind and received his sight, until they called the parents of him who had received his sight. '
  '19':
  - type: text
    content: And they asked them, saying, “Is this your son, who you say was born blind? How then does he now see?”
  '2':
  - type: text
    content: 'And His disciples asked Him, saying, “Rabbi, '
  - type: note
    content: Luke 13:2; John 9:34; Acts 28:4
  - type: text
    content: who sinned, this man or his parents, that he was born blind?”
  '20':
  - type: text
    content: 'His parents answered them and said, “We know that this is our son, and that he was born blind; '
  '21':
  - type: text
    content: 'but by what means he now sees we do not know, or who opened his eyes we do not know. He is of age; ask him. He will speak for himself.” '
  '22':
  - type: text
    content: 'His parents said these '
  - type: text
    content: things
  - type: text
    content: ' because '
  - type: note
    content: John 7:13; 12:42; 19:38; Acts 5:13
  - type: text
    content: 'they feared the Jews, for the Jews had agreed already that if anyone confessed '
  - type: text
    content: that
  - type: text
    content: ' He '
  - type: text
    content: was
  - type: text
    content: ' Christ, he '
  - type: note
    content: John 16:2
  - type: text
    content: 'would be put out of the synagogue. '
  '23':
  - type: text
    content: Therefore his parents said, “He is of age; ask him.”
  '24':
  - type: text
    content: 'So they again called the man who was blind, and said to him, '
  - type: note
    content: Josh. 7:19; 1 Sam. 6:5; Ezra 10:11; Rev. 11:13
  - type: text
    content: '“Give God the glory! '
  - type: note
    content: John 9:16
  - type: text
    content: We know that this Man is a sinner.”
  '25':
  - type: text
    content: 'He answered and said, “Whether He is a sinner '
  - type: text
    content: or
  - type: text
    content: ' '
  - type: text
    content: not
  - type: text
    content: ' I do not know. One thing I know: that though I was blind, now I see.”'
  '26':
  - type: text
    content: Then they said to him again, “What did He do to you? How did He open your eyes?”
  '27':
  - type: text
    content: 'He answered them, “I told you already, and you did not listen. Why do you want to hear '
  - type: text
    content: it
  - type: text
    content: ' again? Do you also want to become His disciples?”'
  '28':
  - type: text
    content: 'Then they reviled him and said, “You are His disciple, but we are Moses’ disciples. '
  '29':
  - type: text
    content: 'We know that God '
  - type: note
    content: Ex. 19:19, 20; 33:11; 34:29; Num. 12:6–8
  - type: text
    content: 'spoke to '
  - type: note
    content: (John 5:45–47)
  - type: text
    content: 'Moses; '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: for
  - type: text
    content: ' this '
  - type: text
    content: fellow,
  - type: text
    content: ' '
  - type: note
    content: John 7:27, 28; 8:14
  - type: text
    content: we do not know where He is from.”
  '3':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“Neither this man nor his parents sinned, '
  - type: note
    content: John 11:4
  - type: text
    content: but that the works of God should be revealed in him.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'The man answered and said to them, '
  - type: note
    content: John 3:10
  - type: text
    content: '“Why, this is a marvelous thing, that you do not know where He is from; yet He has opened my eyes! '
  '31':
  - type: text
    content: 'Now we know that '
  - type: note
    content: Job 27:9; 35:12; Ps. 18:41; Prov. 1:28; 15:29; 28:9; Is. 1:15; Jer. 11:11; 14:12; Ezek. 8:18; Mic. 3:4; Zech. 7:13; (James 5:16)
  - type: text
    content: 'God does not hear sinners; but if anyone is a worshiper of God and does His will, He hears him. '
  '32':
  - type: text
    content: 'Since the world began it has been unheard of that anyone opened the eyes of one who was born blind. '
  '33':
  - type: note
    content: John 3:2; 9:16
  - type: text
    content: If this Man were not from God, He could do nothing.”
  '34':
  - type: text
    content: 'They answered and said to him, '
  - type: note
    content: Ps. 51:5; John 9:2
  - type: text
    content: “You were completely born in sins, and are you teaching us?” And they cast him out.
  - type: heading
    content: True Vision and True Blindness
  '35':
  - type: text
    content: 'Jesus heard that they had cast him out; and when He had '
  - type: note
    content: John 5:14
  - type: text
    content: 'found him, He said to him, '
  - type: text
    content: '“Do you '
  - type: note
    content: John 1:7; 16:31
  - type: text
    content: 'believe in '
  - type: note
    content: Matt. 14:33; 16:16; Mark 1:1; John 10:36; 1 John 5:13
  - type: text
    content: 'the Son of '
  - type: text
    content: God?”
  '36':
  - type: text
    content: He answered and said, “Who is He, Lord, that I may believe in Him?”
  '37':
  - type: text
    content: 'And Jesus said to him, '
  - type: text
    content: '“You have both seen Him and '
  - type: note
    content: John 4:26
  - type: text
    content: it is He who is talking with you.”
  '38':
  - type: text
    content: 'Then he said, “Lord, I believe!” And he '
  - type: note
    content: Matt. 8:2
  - type: text
    content: worshiped Him.
  '39':
  - type: text
    content: 'And Jesus said, '
  - type: note
    content: (John 3:17; 5:22, 27; 12:47)
  - type: text
    content: '“For judgment I have come into this world, '
  - type: note
    content: Matt. 13:13; 15:14
  - type: text
    content: that those who do not see may see, and that those who see may be made blind.”
  '4':
  - type: note
    content: (John 4:34; 5:19, 36; 17:4)
  - type: text
    content: I
  - type: text
    content: ' must work the works of Him who sent Me while it is '
  - type: note
    content: John 11:9, 10; 12:35; Gal. 6:10
  - type: text
    content: 'day; '
  - type: text
    content: the
  - type: text
    content: ' night is coming when no one can work.'
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Then '
  - type: text
    content: some
  - type: text
    content: ' of the Pharisees who were with Him heard these words, '
  - type: note
    content: (Rom. 2:19)
  - type: text
    content: and said to Him, “Are we blind also?”
  '41':
  - type: text
    content: 'Jesus said to them, '
  - type: note
    content: John 15:22, 24
  - type: text
    content: “If you were blind, you would have no sin; but now you say, ‘We see.’ Therefore your sin remains.
  '5':
  - type: text
    content: 'As long as I am in the world, '
  - type: note
    content: (John 1:5, 9; 3:19; 8:12; 12:35, 46)
  - type: text
    content: I am the light of the world.”
  '6':
  - type: text
    content: 'When He had said these things, '
  - type: note
    content: Mark 7:33; 8:23
  - type: text
    content: 'He spat on the ground and made clay with the saliva; and He anointed the eyes of the blind man with the clay. '
  '7':
  - type: text
    content: 'And He said to him, '
  - type: text
    content: '“Go, wash '
  - type: note
    content: Neh. 3:15; Is. 8:6; Luke 13:4; John 9:11
  - type: text
    content: in the pool of Siloam”
  - type: text
    content: ' (which is translated, Sent). So '
  - type: note
    content: 2 Kin. 5:14
  - type: text
    content: he went and washed, and came back seeing.
  '8':
  - type: text
    content: Therefore the neighbors and those who previously had seen that he was blind said, “Is not this he who sat and begged?”
  '9':
  - type: text
    content: 'Some said, “This is he.” Others '
  - type: text
    content: said,
  - type: text
    content: ' “He is like him.”'
  - type: text
