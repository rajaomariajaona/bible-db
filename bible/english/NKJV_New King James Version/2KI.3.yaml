verses:
  '1':
  - type: heading
    content: Moab Rebels Against Israel
  - type: text
    content: 'Now '
  - type: note
    content: 2 Kin. 1:17
  - type: text
    content: 'Jehoram the son of Ahab became king over Israel at Samaria in the eighteenth year of Jehoshaphat king of Judah, and reigned twelve years. '
  '10':
  - type: text
    content: 'And the king of Israel said, “Alas! For the '
  - type: heading
    content: Lord
  - type: text
    content: ' has called these three kings together to deliver them into the hand of Moab.”'
  '11':
  - type: text
    content: 'But '
  - type: note
    content: 1 Kin. 22:7
  - type: text
    content: Jehoshaphat said, “
  - type: text
    content: Is
  - type: text
    content: ' '
  - type: text
    content: there
  - type: text
    content: ' no prophet of the '
  - type: heading
    content: Lord
  - type: text
    content: ' here, that we may inquire of the '
  - type: heading
    content: Lord
  - type: text
    content: ' by him?”'
  - type: text
    content: 'So one of the servants of the king of Israel answered and said, “Elisha the son of Shaphat '
  - type: text
    content: is
  - type: text
    content: ' here, who '
  - type: note
    content: 1 Kin. 19:21; (John 13:4, 5, 13, 14)
  - type: text
    content: poured water on the hands of Elijah.”
  '12':
  - type: text
    content: 'And Jehoshaphat said, “The word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' is with him.” So the king of Israel and Jehoshaphat and the king of Edom '
  - type: note
    content: 2 Kin. 2:25
  - type: text
    content: went down to him.
  '13':
  - type: text
    content: 'Then Elisha said to the king of Israel, '
  - type: note
    content: (Ezek. 14:3)
  - type: text
    content: '“What have I to do with you? '
  - type: note
    content: Judg. 10:14; Ruth 1:15
  - type: text
    content: 'Go to '
  - type: note
    content: 1 Kin. 22:6–11
  - type: text
    content: 'the prophets of your father and the '
  - type: note
    content: 1 Kin. 18:19
  - type: text
    content: prophets of your mother.”
  - type: text
    content: 'But the king of Israel said to him, “No, for the '
  - type: heading
    content: Lord
  - type: text
    content: ' has called these three kings '
  - type: text
    content: together
  - type: text
    content: ' to deliver them into the hand of Moab.”'
  '14':
  - type: text
    content: 'And Elisha said, '
  - type: note
    content: 1 Kin. 17:1; 2 Kin. 5:16
  - type: text
    content: “
  - type: text
    content: As
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts lives, before whom I stand, surely were it not that I regard the presence of Jehoshaphat king of Judah, I would not look at you, nor see you. '
  '15':
  - type: text
    content: 'But now bring me '
  - type: note
    content: 1 Sam. 10:5
  - type: text
    content: a musician.”
  - type: text
    content: 'Then it happened, when the musician '
  - type: note
    content: 1 Sam. 16:16, 23; 1 Chr. 25:1
  - type: text
    content: 'played, that '
  - type: note
    content: Ezek. 1:3; 3:14, 22; 8:1
  - type: text
    content: 'the hand of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came upon him. '
  '16':
  - type: text
    content: 'And he said, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: Jer. 14:3
  - type: text
    content: '‘Make this valley full of ditches.’ '
  '17':
  - type: text
    content: 'For thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘You shall not see wind, nor shall you see rain; yet that valley shall be filled with water, so that you, your cattle, and your animals may drink.’ '
  '18':
  - type: text
    content: 'And this is a simple matter in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: '; He will also deliver the Moabites into your hand. '
  '19':
  - type: text
    content: Also you shall attack every fortified city and every choice city, and shall cut down every good tree, and stop up every spring of water, and ruin every good piece of land with stones.”
  '2':
  - type: text
    content: 'And he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', but not like his father and mother; for he put away the '
  - type: text
    content: sacred
  - type: text
    content: ' pillar of Baal '
  - type: note
    content: 1 Kin. 16:31, 32
  - type: text
    content: 'that his father had made. '
  '20':
  - type: text
    content: 'Now it happened in the morning, when '
  - type: note
    content: Ex. 29:39, 40
  - type: text
    content: the grain offering was offered, that suddenly water came by way of Edom, and the land was filled with water.
  '21':
  - type: text
    content: 'And when all the Moabites heard that the kings had come up to fight against them, all who were able to bear arms and older were gathered; and they stood at the border. '
  '22':
  - type: text
    content: 'Then they rose up early in the morning, and the sun was shining on the water; and the Moabites saw the water on the other side '
  - type: text
    content: as
  - type: text
    content: ' red as blood. '
  '23':
  - type: text
    content: And they said, “This is blood; the kings have surely struck swords and have killed one another; now therefore, Moab, to the spoil!”
  '24':
  - type: text
    content: 'So when they came to the camp of Israel, Israel rose up and attacked the Moabites, so that they fled before them; and they entered '
  - type: text
    content: their
  - type: text
    content: ' land, killing the Moabites. '
  '25':
  - type: text
    content: 'Then they destroyed the cities, and each man threw a stone on every good piece of land and filled it; and they stopped up all the springs of water and cut down all the good trees. But they left the stones of '
  - type: note
    content: Is. 16:7, 11; Jer. 48:31, 36
  - type: text
    content: 'Kir Haraseth '
  - type: text
    content: intact.
  - type: text
    content: ' However the slingers surrounded and attacked it.'
  '26':
  - type: text
    content: 'And when the king of Moab saw that the battle was too fierce for him, he took with him seven hundred men who drew swords, to break through to the king of Edom, but they could not. '
  '27':
  - type: text
    content: 'Then '
  - type: note
    content: (Deut. 18:10; Amos 2:1; Mic. 6:7)
  - type: text
    content: 'he took his eldest son who would have reigned in his place, and offered him '
  - type: text
    content: as
  - type: text
    content: ' a burnt offering upon the wall; and there was great indignation against Israel. '
  - type: note
    content: 2 Kin. 8:20
  - type: text
    content: 'So they departed from him and returned to '
  - type: text
    content: their
  - type: text
    content: ' '
  - type: text
    content: own
  - type: text
    content: ' land.'
  '3':
  - type: text
    content: 'Nevertheless he persisted in '
  - type: note
    content: 1 Kin. 12:28–32
  - type: text
    content: the sins of Jeroboam the son of Nebat, who had made Israel sin; he did not depart from them.
  '4':
  - type: text
    content: 'Now Mesha king of Moab was a sheepbreeder, and he '
  - type: note
    content: 2 Sam. 8:2
  - type: text
    content: 'regularly paid the king of Israel one hundred thousand '
  - type: note
    content: Is. 16:1, 2
  - type: text
    content: 'lambs and the wool of one hundred thousand rams. '
  '5':
  - type: text
    content: 'But it happened, when '
  - type: note
    content: 2 Kin. 1:1
  - type: text
    content: Ahab died, that the king of Moab rebelled against the king of Israel.
  '6':
  - type: text
    content: 'So King Jehoram went out of Samaria at that time and mustered all Israel. '
  '7':
  - type: text
    content: Then he went and sent to Jehoshaphat king of Judah, saying, “The king of Moab has rebelled against me. Will you go with me to fight against Moab?”
  - type: text
    content: 'And he said, “I will go up; '
  - type: note
    content: 1 Kin. 22:4
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' as you '
  - type: text
    content: are,
  - type: text
    content: ' my people as your people, my horses as your horses.” '
  '8':
  - type: text
    content: Then he said, “Which way shall we go up?”
  - type: text
    content: And he answered, “By way of the Wilderness of Edom.”
  '9':
  - type: text
    content: 'So the king of Israel went with the king of Judah and the king of Edom, and they marched on that roundabout route seven days; and there was no water for the army, nor for the animals that followed them. '
