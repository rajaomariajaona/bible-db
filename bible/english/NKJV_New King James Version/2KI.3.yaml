document_id: 2KI.3,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moab Rebels Against Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 1:17
      marker-yv: yv-n
    - type: text
      text: 'Jehoram the son of Ahab became king over Israel at Samaria in the eighteenth year of Jehoshaphat king of Judah, and reigned twelve years. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the king of Israel said, “Alas! For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has called these three kings together to deliver them into the hand of Moab.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 22:7
      marker-yv: yv-n
    - type: text
      text: Jehoshaphat said, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' no prophet of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' here, that we may inquire of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by him?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So one of the servants of the king of Israel answered and said, “Elisha the son of Shaphat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' here, who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 19:21; (John 13:4, 5, 13, 14)
      marker-yv: yv-n
    - type: text
      text: poured water on the hands of Elijah.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And Jehoshaphat said, “The word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is with him.” So the king of Israel and Jehoshaphat and the king of Edom '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 2:25
      marker-yv: yv-n
    - type: text
      text: went down to him.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then Elisha said to the king of Israel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ezek. 14:3)
      marker-yv: yv-n
    - type: text
      text: '“What have I to do with you? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 10:14; Ruth 1:15
      marker-yv: yv-n
    - type: text
      text: 'Go to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 22:6–11
      marker-yv: yv-n
    - type: text
      text: 'the prophets of your father and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 18:19
      marker-yv: yv-n
    - type: text
      text: prophets of your mother.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the king of Israel said to him, “No, for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has called these three kings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: together
    - type: text
      text: ' to deliver them into the hand of Moab.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And Elisha said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 17:1; 2 Kin. 5:16
      marker-yv: yv-n
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts lives, before whom I stand, surely were it not that I regard the presence of Jehoshaphat king of Judah, I would not look at you, nor see you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But now bring me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 10:5
      marker-yv: yv-n
    - type: text
      text: a musician.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then it happened, when the musician '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 16:16, 23; 1 Chr. 25:1
      marker-yv: yv-n
    - type: text
      text: 'played, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 1:3; 3:14, 22; 8:1
      marker-yv: yv-n
    - type: text
      text: 'the hand of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came upon him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And he said, “Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 14:3
      marker-yv: yv-n
    - type: text
      text: '‘Make this valley full of ditches.’ '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': ‘You shall not see wind, nor shall you see rain; yet that valley shall be filled with water, so that you, your cattle, and your animals may drink.’ '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And this is a simple matter in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '; He will also deliver the Moabites into your hand. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Also you shall attack every fortified city and every choice city, and shall cut down every good tree, and stop up every spring of water, and ruin every good piece of land with stones.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', but not like his father and mother; for he put away the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sacred
    - type: text
      text: ' pillar of Baal '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 16:31, 32
      marker-yv: yv-n
    - type: text
      text: 'that his father had made. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Now it happened in the morning, when '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:39, 40
      marker-yv: yv-n
    - type: text
      text: the grain offering was offered, that suddenly water came by way of Edom, and the land was filled with water.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And when all the Moabites heard that the kings had come up to fight against them, all who were able to bear arms and older were gathered; and they stood at the border. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then they rose up early in the morning, and the sun was shining on the water; and the Moabites saw the water on the other side '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' red as blood. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: And they said, “This is blood; the kings have surely struck swords and have killed one another; now therefore, Moab, to the spoil!”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'So when they came to the camp of Israel, Israel rose up and attacked the Moabites, so that they fled before them; and they entered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' land, killing the Moabites. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then they destroyed the cities, and each man threw a stone on every good piece of land and filled it; and they stopped up all the springs of water and cut down all the good trees. But they left the stones of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 16:7, 11; Jer. 48:31, 36
      marker-yv: yv-n
    - type: text
      text: 'Kir Haraseth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: intact.
    - type: text
      text: ' However the slingers surrounded and attacked it.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And when the king of Moab saw that the battle was too fierce for him, he took with him seven hundred men who drew swords, to break through to the king of Edom, but they could not. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 18:10; Amos 2:1; Mic. 6:7)
      marker-yv: yv-n
    - type: text
      text: 'he took his eldest son who would have reigned in his place, and offered him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' a burnt offering upon the wall; and there was great indignation against Israel. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 8:20
      marker-yv: yv-n
    - type: text
      text: 'So they departed from him and returned to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' land.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nevertheless he persisted in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:28–32
      marker-yv: yv-n
    - type: text
      text: the sins of Jeroboam the son of Nebat, who had made Israel sin; he did not depart from them.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now Mesha king of Moab was a sheepbreeder, and he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:2
      marker-yv: yv-n
    - type: text
      text: 'regularly paid the king of Israel one hundred thousand '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 16:1, 2
      marker-yv: yv-n
    - type: text
      text: 'lambs and the wool of one hundred thousand rams. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But it happened, when '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 1:1
      marker-yv: yv-n
    - type: text
      text: Ahab died, that the king of Moab rebelled against the king of Israel.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So King Jehoram went out of Samaria at that time and mustered all Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Then he went and sent to Jehoshaphat king of Judah, saying, “The king of Moab has rebelled against me. Will you go with me to fight against Moab?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, “I will go up; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 22:4
      marker-yv: yv-n
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' as you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are,
    - type: text
      text: ' my people as your people, my horses as your horses.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Then he said, “Which way shall we go up?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he answered, “By way of the Wilderness of Edom.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So the king of Israel went with the king of Judah and the king of Edom, and they marched on that roundabout route seven days; and there was no water for the army, nor for the animals that followed them. '
