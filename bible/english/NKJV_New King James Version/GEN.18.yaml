  - type: text
    content: '“Shall I hide from Abraham what I am doing, '
  '18':
  - type: text
    content: 'since Abraham shall surely become a great and mighty nation, and all the nations of the earth shall be '
  - type: note
    content: (Gen. 12:3; 22:18); Matt. 1:1; Luke 3:34; (Acts 3:25, 26; Gal. 3:8)
  - type: text
