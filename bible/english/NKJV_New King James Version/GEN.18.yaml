  - type: text
    content: 'he took butter and milk and the calf which he had prepared, and set '
  - type: text
    content: it
  - type: text
    content: ' before them; and he stood by them under the tree as they ate.'
  '9':
  - type: text
    content: 'Then they said to him, “Where '
  - type: text
