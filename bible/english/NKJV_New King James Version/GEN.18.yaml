  - type: text
    content: They said, “Do as you have said.”
  '6':
  - type: text
    content: 'So Abraham hurried into the tent to Sarah and said, “Quickly, make ready three measures of fine meal; knead '
  - type: text
    content: it
  - type: text
    content: ' and make cakes.” '
  '7':
  - type: text
    content: 'And Abraham ran to the herd, took a tender and good calf, gave '
  - type: text
    content: it
  - type: text
    content: ' to a young man, and he hastened to prepare it. '
  '8':
  - type: text
    content: 'So '
  - type: note
