  - type: text
    content: 'and went toward Sodom, but Abraham still stood before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'And Abraham '
  - type: note
    content: (Heb. 10:22)
  - type: text
    content: 'came near and said, '
  - type: note
    content: Ex. 23:7; Num. 16:22; 2 Sam. 24:17; Ps. 11:4–7
  - type: text
    content: '“Would You also '
  - type: note
    content: Job 9:22
  - type: text
    content: 'destroy the '
  - type: note
    content: Gen. 20:4
  - type: text
    content: 'righteous with the wicked? '
  '24':
  - type: text
    content: 'Suppose there were fifty righteous within the city; would You also destroy the place and not spare '
  - type: text
    content: it
  - type: text
    content: ' for the fifty righteous that were in it? '
  '25':
  - type: text
    content: 'Far be it from You to do such a thing as this, to slay the righteous with the wicked, so that '
  - type: note
    content: Job 8:20; Is. 3:10, 11
  - type: text
    content: 'the righteous should be as the wicked; far be it from You! '
  - type: note
    content: Deut. 1:16, 17; 32:4; Job 8:3, 20; 34:17; Ps. 58:11; 94:2; Is. 3:10, 11; Rom. 3:5, 6
  - type: text
    content: Shall not the Judge of all the earth do right?”
  '26':
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' said, '
  - type: note
    content: Jer. 5:1; Ezek. 22:30
  - type: text
    content: “If I find in Sodom fifty righteous within the city, then I will spare all the place for their sakes.”
  '27':
  - type: text
    content: 'Then Abraham answered and said, “Indeed now, I who '
  - type: text
    content: am
  - type: text
    content: ' '
  - type: note
    content: (Gen. 3:19); Job 4:19; 30:19; 42:6; (1 Cor. 15:47, 48)
  - type: text
    content: 'but dust and ashes have taken it upon myself to speak to the Lord: '
  '28':
  - type: text
    content: 'Suppose there were five less than the fifty righteous; would You destroy all of the city for '
  - type: text
    content: lack
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' five?”'
  - type: text
    content: 'So He said, “If I find there forty-five, I will not destroy '
  - type: text
    content: it.
  - type: text
    content: ”
  '29':
  - type: text
    content: And he spoke to Him yet again and said, “Suppose there should be forty found there?”
  - type: text
    content: 'So He said, “I will not do '
  - type: text
    content: it
  - type: text
    content: ' for the sake of forty.”'
  '3':
  - type: text
    content: 'and said, “My Lord, if I have now found favor in Your sight, do not pass on by Your servant. '
  '30':
  - type: text
    content: 'Then he said, '
  - type: note
    content: Judg. 6:39
  - type: text
    content: '“Let not the Lord be angry, and I will speak: Suppose thirty should be found there?”'
  - type: text
    content: 'So He said, “I will not do '
  - type: text
    content: it
  - type: text
    content: ' if I find thirty there.”'
  '31':
  - type: text
    content: 'And he said, “Indeed now, I have taken it upon myself to speak to the Lord: Suppose twenty should be found there?”'
  - type: text
    content: 'So He said, “I will not destroy '
  - type: text
    content: it
  - type: text
    content: ' for the sake of twenty.”'
  '32':
  - type: text
    content: 'Then he said, “Let not the Lord be angry, and I will speak but once more: Suppose ten should be found there?”'
  - type: note
    content: James 5:16
  - type: text
    content: 'And He said, “I will not destroy '
  - type: text
    content: it
  - type: text
    content: ' for the sake of ten.” '
  '33':
  - type: text
    content: 'So the '
  - type: heading
