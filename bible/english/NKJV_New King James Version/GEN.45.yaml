    children:
    - type: text
      text: Gen. 43:27; Acts 7:13
    marker-yv: yv-n
  - type: text
    text: '“I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: am
  - type: text
    text: ' Joseph; does my father still live?” But his brothers could not answer him, for they were dismayed in his presence. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Joseph said to his brothers, “Please come near to me.” So they came near. Then he said: “I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: am
  - type: text
    text: ' Joseph your brother, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 37:28; 39:1; Ps. 105:17
    marker-yv: yv-n
  - type: text
    text: 'whom you sold into Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But now, do not therefore be grieved or angry with yourselves because you sold me here; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 45:7, 8; 50:20; Ps. 105:16, 17
    marker-yv: yv-n
  - type: text
    text: 'for God sent me before you to preserve life. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For these two years the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 43:1; 47:4, 13
    marker-yv: yv-n
  - type: text
    text: 'famine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: has
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: been
  - type: text
    text: ' in the land, and '
  - type: usfm
    marker: it
    children:
