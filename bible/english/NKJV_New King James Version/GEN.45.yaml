verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph Revealed to His Brothers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joseph could not restrain himself before all those who stood by him, and he cried out, “Make everyone go out from me!” So no one stood with him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 7:13
      marker-yv: yv-n
    - type: text
      text: 'while Joseph made himself known to his brothers. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 46:28, 34; 47:1, 6; Ex. 9:26
      marker-yv: yv-n
    - type: text
      text: 'You shall dwell in the land of Goshen, and you shall be near to me, you and your children, your children’s children, your flocks and your herds, and all that you have. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 47:12
      marker-yv: yv-n
    - type: text
      text: 'provide for you, lest you and your household, and all that you have, come to poverty; for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' still five years of famine.” ’'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And behold, your eyes and the eyes of my brother Benjamin see that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 42:23
      marker-yv: yv-n
    - type: text
      text: 'my mouth that speaks to you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So you shall tell my father of all my glory in Egypt, and of all that you have seen; and you shall hurry and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 46:6–28; Acts 7:14
      marker-yv: yv-n
    - type: text
      text: bring my father down here.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he fell on his brother Benjamin’s neck and wept, and Benjamin wept on his neck. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 48:10
      marker-yv: yv-n
    - type: text
      text: kissed all his brothers and wept over them, and after that his brothers talked with him.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the report of it was heard in Pharaoh’s house, saying, “Joseph’s brothers have come.” So it pleased Pharaoh and his servants well. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Pharaoh said to Joseph, “Say to your brothers, ‘Do this: Load your animals and depart; go to the land of Canaan. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bring your father and your households and come to me; I will give you the best of the land of Egypt, and you will eat '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 27:28; 47:6; Deut. 32:9–14
      marker-yv: yv-n
    - type: text
      text: 'the fat of the land. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now you are commanded—do this: Take carts out of the land of Egypt for your little ones and your wives; bring your father and come. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 43:30; 46:29
      marker-yv: yv-n
    - type: text
      text: 'wept aloud, and the Egyptians and the house of Pharaoh heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also do not be concerned about your goods, for the best of all the land of Egypt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' yours.’ ”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the sons of Israel did so; and Joseph gave them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 45:19; 46:5
      marker-yv: yv-n
    - type: text
      text: 'carts, according to the command of Pharaoh, and he gave them provisions for the journey. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He gave to all of them, to each man, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 5:5
      marker-yv: yv-n
    - type: text
      text: 'changes of garments; but to Benjamin he gave three hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pieces
    - type: text
      text: ' of silver and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 43:34
      marker-yv: yv-n
    - type: text
      text: 'five changes of garments. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he sent to his father these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'things:'
    - type: text
      text: ' ten donkeys loaded with the good things of Egypt, and ten female donkeys loaded with grain, bread, and food for his father for the journey. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he sent his brothers away, and they departed; and he said to them, “See that you do not become troubled along the way.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they went up out of Egypt, and came to the land of Canaan to Jacob their father. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they told him, saying, “Joseph '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' still alive, and he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' governor over all the land of Egypt.” '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 29:24; Ps. 126:1; Luke 24:11, 41
      marker-yv: yv-n
    - type: text
      text: 'And Jacob’s heart stood still, because he did not believe them. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they told him all the words which Joseph had said to them, and when he saw the carts which Joseph had sent to carry him, the spirit '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 15:19; Is. 40:29
      marker-yv: yv-n
    - type: text
      text: 'of Jacob their father revived. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Israel said, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' enough. Joseph my son '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' still alive. I will go and see him before I die.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joseph said to his brothers, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 43:27; Acts 7:13
      marker-yv: yv-n
    - type: text
      text: '“I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' Joseph; does my father still live?” But his brothers could not answer him, for they were dismayed in his presence. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joseph said to his brothers, “Please come near to me.” So they came near. Then he said: “I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' Joseph your brother, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 37:28; 39:1; Ps. 105:17
      marker-yv: yv-n
    - type: text
      text: 'whom you sold into Egypt. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now, do not therefore be grieved or angry with yourselves because you sold me here; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 45:7, 8; 50:20; Ps. 105:16, 17
      marker-yv: yv-n
    - type: text
      text: 'for God sent me before you to preserve life. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For these two years the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 43:1; 47:4, 13
      marker-yv: yv-n
    - type: text
      text: 'famine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: been
    - type: text
      text: ' in the land, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' still five years in which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' neither plowing nor harvesting. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 45:5; 50:20
      marker-yv: yv-n
    - type: text
      text: 'sent me before you to preserve a posterity for you in the earth, and to save your lives by a great deliverance. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' not you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' sent me here, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 8:28)
      marker-yv: yv-n
    - type: text
      text: 'God; and He has made me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 17:10; Is. 22:21
      marker-yv: yv-n
    - type: text
      text: 'a father to Pharaoh, and lord of all his house, and a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:43; 42:6
      marker-yv: yv-n
    - type: text
      text: ruler throughout all the land of Egypt.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Hurry and go up to my father, and say to him, ‘Thus says your son Joseph: “God has made me lord of all Egypt; come down to me, do not tarry. '
