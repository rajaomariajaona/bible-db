  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Hurry and go up to my father, and say to him, ‘Thus says your son Joseph: “God has made me lord of all Egypt; come down to me, do not tarry. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 46:28, 34; 47:1, 6; Ex. 9:26
    marker-yv: yv-n
  - type: text
    text: 'You shall dwell in the land of Goshen, and you shall be near to me, you and your children, your children’s children, your flocks and your herds, and all that you have. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'There I will '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 47:12
    marker-yv: yv-n
  - type: text
    text: 'provide for you, lest you and your household, and all that you have, come to poverty; for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' still five years of famine.” ’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“And behold, your eyes and the eyes of my brother Benjamin see that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 42:23
    marker-yv: yv-n
  - type: text
    text: 'my mouth that speaks to you. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So you shall tell my father of all my glory in Egypt, and of all that you have seen; and you shall hurry and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 46:6–28; Acts 7:14
    marker-yv: yv-n
  - type: text
    text: bring my father down here.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then he fell on his brother Benjamin’s neck and wept, and Benjamin wept on his neck. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moreover he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 48:10
    marker-yv: yv-n
  - type: text
    text: kissed all his brothers and wept over them, and after that his brothers talked with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now the report of it was heard in Pharaoh’s house, saying, “Joseph’s brothers have come.” So it pleased Pharaoh and his servants well. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Pharaoh said to Joseph, “Say to your brothers, ‘Do this: Load your animals and depart; go to the land of Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Bring your father and your households and come to me; I will give you the best of the land of Egypt, and you will eat '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 27:28; 47:6; Deut. 32:9–14
    marker-yv: yv-n
  - type: text
    text: 'the fat of the land. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now you are commanded—do this: Take carts out of the land of Egypt for your little ones and your wives; bring your father and come. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Also do not be concerned about your goods, for the best of all the land of Egypt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' yours.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then the sons of Israel did so; and Joseph gave them '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 45:19; 46:5
    marker-yv: yv-n
  - type: text
    text: 'carts, according to the command of Pharaoh, and he gave them provisions for the journey. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'He gave to all of them, to each man, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 5:5
    marker-yv: yv-n
  - type: text
    text: 'changes of garments; but to Benjamin he gave three hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pieces
  - type: text
    text: ' of silver and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 43:34
    marker-yv: yv-n
  - type: text
    text: 'five changes of garments. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he sent to his father these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'things:'
  - type: text
    text: ' ten donkeys loaded with the good things of Egypt, and ten female donkeys loaded with grain, bread, and food for his father for the journey. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So he sent his brothers away, and they departed; and he said to them, “See that you do not become troubled along the way.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then they went up out of Egypt, and came to the land of Canaan to Jacob their father. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And they told him, saying, “Joseph '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' still alive, and he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' governor over all the land of Egypt.” '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 29:24; Ps. 126:1; Luke 24:11, 41
    marker-yv: yv-n
  - type: text
    text: 'And Jacob’s heart stood still, because he did not believe them. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But when they told him all the words which Joseph had said to them, and when he saw the carts which Joseph had sent to carry him, the spirit '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 15:19; Is. 40:29
    marker-yv: yv-n
  - type: text
    text: 'of Jacob their father revived. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then Israel said, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: It
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' enough. Joseph my son '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' still alive. I will go and see him before I die.”'
