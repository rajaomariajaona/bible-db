  - type: text
    text: ' neither plowing nor harvesting. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 45:5; 50:20
    marker-yv: yv-n
  - type: text
    text: 'sent me before you to preserve a posterity for you in the earth, and to save your lives by a great deliverance. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' not you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' sent me here, but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 8:28)
    marker-yv: yv-n
  - type: text
    text: 'God; and He has made me '
  - type: usfm
