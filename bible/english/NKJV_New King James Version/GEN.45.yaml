    children:
    - type: text
      text: Judg. 17:10; Is. 22:21
    marker-yv: yv-n
  - type: text
    text: 'a father to Pharaoh, and lord of all his house, and a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 41:43; 42:6
    marker-yv: yv-n
  - type: text
