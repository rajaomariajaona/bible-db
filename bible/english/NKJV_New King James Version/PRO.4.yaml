document_id: PRO.4,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Security in Wisdom
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Hear, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 34:11; Prov. 1:8
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' children, the instruction of a father,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And give attention to know understanding;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hear, my son, and receive my sayings,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:2
      marker-yv: yv-n
    - type: text
      text: And the years of your life will be many.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 12:23
      marker-yv: yv-n
    - type: text
      text: taught you in the way of wisdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have led you in right paths.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When you walk, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 18:7; Ps. 18:36
      marker-yv: yv-n
    - type: text
      text: your steps will not be hindered,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 91:11); Prov. 3:23
      marker-yv: yv-n
    - type: text
      text: And when you run, you will not stumble.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Take firm hold of instruction, do not let go;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Keep her, for she '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' your life.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 1:1; Prov. 1:15
      marker-yv: yv-n
    - type: text
      text: Do not enter the path of the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And do not walk in the way of evil.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Avoid it, do not travel on it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Turn away from it and pass on.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 36:4; Mic. 2:1
      marker-yv: yv-n
    - type: text
      text: For they do not sleep unless they have done evil;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And their sleep is taken away unless they make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: someone
    - type: text
      text: ' fall.'
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: For they eat the bread of wickedness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And drink the wine of violence.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 26:7; Matt. 5:14, 45; Phil. 2:15
      marker-yv: yv-n
    - type: text
      text: 'But the path of the just '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 23:4
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' like the shining sun,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That shines ever brighter unto the perfect day.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 2:9; (Job 18:5, 6); Prov. 2:13; (Is. 59:9, 10; Jer. 23:12); John 12:35
      marker-yv: yv-n
    - type: text
      text: 'The way of the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' like darkness;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They do not know what makes them stumble.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For I give you good doctrine:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not forsake my law.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: My son, give attention to my words;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Incline your ear to my sayings.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Do not let them depart from your eyes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Keep them in the midst of your heart;
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' life to those who find them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And health to all their flesh.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Keep your heart with all diligence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For out of it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spring
    - type: text
      text: ' the issues of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 12:34; 15:18, 19; Mark 7:21; Luke 6:45)
      marker-yv: yv-n
    - type: text
      text: life.
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Put away from you a deceitful mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And put perverse lips far from you.
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Let your eyes look straight ahead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your eyelids look right before you.
  '26':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ponder the path of your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 5:21; Heb. 12:13
      marker-yv: yv-n
    - type: text
      text: feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let all your ways be established.
  '27':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Do not turn to the right or the left;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Remove your foot from evil.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: When I was my father’s son,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 29:1
      marker-yv: yv-n
    - type: text
      text: Tender and the only one in the sight of my mother,
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 28:9; Eph. 6:4
      marker-yv: yv-n
    - type: text
      text: 'He also taught me, and said to me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Let your heart retain my words;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 7:2
      marker-yv: yv-n
    - type: text
      text: Keep my commands, and live.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 2:2, 3
      marker-yv: yv-n
    - type: text
      text: Get wisdom! Get understanding!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not forget, nor turn away from the words of my mouth.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Do not forsake her, and she will preserve you;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Thess. 2:10
      marker-yv: yv-n
    - type: text
      text: Love her, and she will keep you.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:13, 14; Matt. 13:44
      marker-yv: yv-n
    - type: text
      text: 'Wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the principal thing;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Therefore
    - type: text
      text: ' get wisdom.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in all your getting, get understanding.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 2:30
      marker-yv: yv-n
    - type: text
      text: Exalt her, and she will promote you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She will bring you honor, when you embrace her.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'She will place on your head '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:22
      marker-yv: yv-n
    - type: text
      text: an ornament of grace;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A crown of glory she will deliver to you.”
