verses:
  '1':
  - type: heading
    content: Security in Wisdom
  - type: text
    content: 'Hear, '
  - type: note
    content: Ps. 34:11; Prov. 1:8
  - type: text
    content: my
  - type: text
    content: ' children, the instruction of a father,'
  - type: text
    content: And give attention to know understanding;
  '10':
  - type: text
    content: Hear, my son, and receive my sayings,
  - type: note
    content: Prov. 3:2
  - type: text
    content: And the years of your life will be many.
  '11':
  - type: text
    content: 'I have '
  - type: note
    content: 1 Sam. 12:23
  - type: text
    content: taught you in the way of wisdom;
  - type: text
    content: I have led you in right paths.
  '12':
  - type: text
    content: 'When you walk, '
  - type: note
    content: Job 18:7; Ps. 18:36
  - type: text
    content: your steps will not be hindered,
  - type: note
    content: (Ps. 91:11); Prov. 3:23
  - type: text
    content: And when you run, you will not stumble.
  '13':
  - type: text
    content: Take firm hold of instruction, do not let go;
  - type: text
    content: 'Keep her, for she '
  - type: text
    content: is
  - type: text
    content: ' your life.'
  '14':
  - type: note
    content: Ps. 1:1; Prov. 1:15
  - type: text
    content: Do not enter the path of the wicked,
  - type: text
    content: And do not walk in the way of evil.
  '15':
  - type: text
    content: Avoid it, do not travel on it;
  - type: text
    content: Turn away from it and pass on.
  '16':
  - type: note
    content: Ps. 36:4; Mic. 2:1
  - type: text
    content: For they do not sleep unless they have done evil;
  - type: text
    content: 'And their sleep is taken away unless they make '
  - type: text
    content: someone
  - type: text
    content: ' fall.'
  '17':
  - type: text
    content: For they eat the bread of wickedness,
  - type: text
    content: And drink the wine of violence.
  '18':
  - type: note
    content: Is. 26:7; Matt. 5:14, 45; Phil. 2:15
  - type: text
    content: 'But the path of the just '
  - type: note
    content: 2 Sam. 23:4
  - type: text
    content: is
  - type: text
    content: ' like the shining sun,'
  - type: text
    content: That shines ever brighter unto the perfect day.
  '19':
  - type: note
    content: 1 Sam. 2:9; (Job 18:5, 6); Prov. 2:13; (Is. 59:9, 10; Jer. 23:12); John 12:35
  - type: text
    content: 'The way of the wicked '
  - type: text
    content: is
  - type: text
    content: ' like darkness;'
  - type: text
    content: They do not know what makes them stumble.
  '2':
  - type: text
    content: 'For I give you good doctrine:'
  - type: text
    content: Do not forsake my law.
  '20':
  - type: text
    content: My son, give attention to my words;
  - type: text
    content: Incline your ear to my sayings.
  '21':
  - type: text
    content: Do not let them depart from your eyes;
  - type: text
    content: Keep them in the midst of your heart;
  '22':
  - type: text
    content: 'For they '
  - type: text
    content: are
  - type: text
    content: ' life to those who find them,'
  - type: text
    content: And health to all their flesh.
  '23':
  - type: text
    content: Keep your heart with all diligence,
  - type: text
    content: 'For out of it '
  - type: text
    content: spring
  - type: text
    content: ' the issues of '
  - type: note
    content: (Matt. 12:34; 15:18, 19; Mark 7:21; Luke 6:45)
  - type: text
    content: life.
  '24':
  - type: text
    content: Put away from you a deceitful mouth,
  - type: text
    content: And put perverse lips far from you.
  '25':
  - type: text
    content: Let your eyes look straight ahead,
  - type: text
    content: And your eyelids look right before you.
  '26':
  - type: text
    content: 'Ponder the path of your '
  - type: note
    content: Prov. 5:21; Heb. 12:13
  - type: text
    content: feet,
  - type: text
    content: And let all your ways be established.
  '27':
  - type: text
    content: Do not turn to the right or the left;
  - type: text
    content: Remove your foot from evil.
  '3':
  - type: text
    content: When I was my father’s son,
  - type: note
    content: 1 Chr. 29:1
  - type: text
    content: Tender and the only one in the sight of my mother,
  '4':
  - type: note
    content: 1 Chr. 28:9; Eph. 6:4
  - type: text
    content: 'He also taught me, and said to me:'
  - type: text
    content: “Let your heart retain my words;
  - type: note
    content: Prov. 7:2
  - type: text
    content: Keep my commands, and live.
  '5':
  - type: note
    content: Prov. 2:2, 3
  - type: text
    content: Get wisdom! Get understanding!
  - type: text
    content: Do not forget, nor turn away from the words of my mouth.
  '6':
  - type: text
    content: Do not forsake her, and she will preserve you;
  - type: note
    content: 2 Thess. 2:10
  - type: text
    content: Love her, and she will keep you.
  '7':
  - type: note
    content: Prov. 3:13, 14; Matt. 13:44
  - type: text
    content: 'Wisdom '
  - type: text
    content: is
  - type: text
    content: ' the principal thing;'
  - type: text
    content: Therefore
  - type: text
    content: ' get wisdom.'
  - type: text
    content: And in all your getting, get understanding.
  '8':
  - type: note
    content: 1 Sam. 2:30
  - type: text
    content: Exalt her, and she will promote you;
  - type: text
    content: She will bring you honor, when you embrace her.
  '9':
  - type: text
    content: 'She will place on your head '
  - type: note
    content: Prov. 3:22
  - type: text
    content: an ornament of grace;
  - type: text
    content: A crown of glory she will deliver to you.”
