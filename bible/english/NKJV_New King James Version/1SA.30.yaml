  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then they found an Egyptian in the field, and brought him to David; and they gave him bread and he ate, and they let him drink water. '
  - type: usfm
    marker: vlbl
    children:
