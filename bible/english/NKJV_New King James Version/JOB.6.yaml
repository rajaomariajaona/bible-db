document_id: JOB.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Job: My Complaint Is Just'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Job answered and said:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Oh, that my grief were fully weighed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my calamity laid with it on the scales!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For then it would be heavier than the sand of the sea—
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore my words have been rash.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 16:13; Ps. 38:2
    marker-yv: yv-n
  - type: text
    text: 'For the arrows of the Almighty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' within me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: My spirit drinks in their poison;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 88:15, 16
    marker-yv: yv-n
  - type: text
    text: 'The terrors of God are arrayed '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 30:15
    marker-yv: yv-n
  - type: text
    text: against me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Does the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 39:5–8
    marker-yv: yv-n
  - type: text
    text: wild donkey bray when it has grass,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or does the ox low over its fodder?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Can flavorless food be eaten without salt?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or is there '
  - type: usfm
    marker: it
    children:
    - type: text
      text: any
  - type: text
    text: ' taste in the white of an egg?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: My soul refuses to touch them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' as loathsome food to me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Oh, that I might have my request,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That God would grant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me
  - type: text
    text: ' the thing that I long for!'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: That it would please God to crush me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That He would loose His hand and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 11:15; 1 Kin. 19:4; Job 7:16; 9:21; 10:1
    marker-yv: yv-n
  - type: text
    text: cut me off!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then I would still have comfort;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Though in anguish I would exult,
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will not spare;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 20:20
    marker-yv: yv-n
  - type: text
    text: 'I have not concealed the words of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Lev. 19:2; Is. 57:15)
    marker-yv: yv-n
  - type: text
    text: the Holy One.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “What strength do I have, that I should hope?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' my end, that I should prolong my life?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Is
  - type: text
    text: ' my strength the strength of stones?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or is my flesh bronze?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Is
  - type: text
    text: ' my help not within me?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And is success driven from me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “To
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Prov. 17:17)
    marker-yv: yv-n
  - type: text
    text: ' him who is afflicted, kindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: should
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shown
  - type: text
    text: ' by his friend,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even though he forsakes the fear of the Almighty.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 38:11
    marker-yv: yv-n
  - type: text
    text: My brothers have dealt deceitfully like a brook,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 15:18
    marker-yv: yv-n
  - type: text
    text: Like the streams of the brooks that pass away,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Which are dark because of the ice,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: And
  - type: text
    text: ' into which the snow vanishes.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: When it is warm, they cease to flow;
- type: usfm
  marker: q2
  children:
  - type: text
    text: When it is hot, they vanish from their place.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The paths of their way turn aside,
- type: usfm
  marker: q2
  children:
  - type: text
    text: They go nowhere and perish.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The caravans of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 25:15; Is. 21:14; Jer. 25:23
    marker-yv: yv-n
  - type: text
    text: Tema look,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The travelers of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 10:1; Ps. 72:10; Ezek. 27:22, 23
    marker-yv: yv-n
  - type: text
    text: Sheba hope for them.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'They are '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 14:3
    marker-yv: yv-n
  - type: text
    text: disappointed because they were confident;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They come there and are confused.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 13:4
    marker-yv: yv-n
  - type: text
    text: you are nothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'You see terror and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 38:11
    marker-yv: yv-n
  - type: text
    text: are afraid.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Did I ever say, ‘Bring '
  - type: usfm
    marker: it
    children:
    - type: text
      text: something
  - type: text
    text: ' to me’?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or, ‘Offer a bribe for me from your wealth’?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Or, ‘Deliver me from the enemy’s hand’?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or, ‘Redeem me from the hand of oppressors’?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Teach me, and I will hold my tongue;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cause me to understand wherein I have erred.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: How forceful are right words!
- type: usfm
  marker: q2
  children:
  - type: text
    text: But what does your arguing prove?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Do you intend to rebuke '
  - type: usfm
    marker: it
    children:
    - type: text
      text: my
  - type: text
    text: ' words,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the speeches of a desperate one, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' as wind?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Yes, you overwhelm the fatherless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 57:6
    marker-yv: yv-n
  - type: text
    text: undermine your friend.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Now therefore, be pleased to look at me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: For I would never lie to your face.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 17:10
    marker-yv: yv-n
  - type: text
    text: Yield now, let there be no injustice!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yes, concede, my '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 27:5, 6; 34:5
    marker-yv: yv-n
  - type: text
    text: righteousness still stands!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Is there injustice on my tongue?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cannot my taste discern the unsavory?
