document_id: 2JN.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting the Elect Lady
  - type: text
    content: The Elder,
  - type: text
    content: 'To the elect lady and her children, whom I love in truth, and not only I, but also all those who have known '
  - type: note
    content: Col. 1:5
  - type: text
    content: 'the truth, '
  '10':
  - type: text
    content: 'If anyone comes to you and '
  - type: note
    content: 1 Kin. 13:16; Rom. 16:17; 2 Thess. 3:6, 14; Titus 3:10
  - type: text
    content: 'does not bring this doctrine, do not receive him into your house nor greet him; '
  '11':
  - type: text
    content: for he who greets him shares in his evil deeds.
  - type: heading
    content: John’s Farewell Greeting
  '12':
  - type: note
    content: 3 John 13, 14
  - type: text
    content: 'Having many things to write to you, I did not wish '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: do
  - type: text
    content: ' '
  - type: text
    content: so
  - type: text
    content: ' with paper and ink; but I hope to come to you and speak face to face, '
  - type: note
    content: John 17:13
  - type: text
    content: that our joy may be full.
  '13':
  - type: note
    content: 1 Pet. 5:13
  - type: text
    content: The children of your elect sister greet you. Amen.
  '2':
  - type: text
    content: 'because of the truth which abides in us and will be with us forever:'
  '3':
  - type: note
    content: Rom. 1:7; 1 Tim. 1:2
  - type: text
    content: 'Grace, mercy, '
  - type: text
    content: and
  - type: text
    content: ' peace will be with you from God the Father and from the Lord Jesus Christ, the Son of the Father, in truth and love.'
  - type: heading
    content: Walk in Christ’s Commandments
  '4':
  - type: text
    content: 'I '
  - type: note
    content: 1 Thess. 2:19, 20; 3 John 3, 4
  - type: text
    content: 'rejoiced greatly that I have found '
  - type: text
    content: some
  - type: text
    content: ' of your children walking in truth, as we received commandment from the Father. '
  '5':
  - type: text
    content: 'And now I plead with you, lady, not as though I wrote a new commandment to you, but that which we have had from the beginning: '
  - type: note
    content: (John 13:34, 35; 15:12, 17); 1 John 3:11; 4:7, 11
  - type: text
    content: 'that we love one another. '
  '6':
  - type: note
    content: John 14:15; 1 John 2:5; 5:3
  - type: text
    content: 'This is love, that we walk according to His commandments. This is the commandment, that '
  - type: note
    content: 1 John 2:24
  - type: text
    content: as you have heard from the beginning, you should walk in it.
  - type: heading
    content: Beware of Antichrist Deceivers
  '7':
  - type: text
    content: 'For '
  - type: note
    content: 1 John 2:19; 4:1
  - type: text
    content: 'many deceivers have gone out into the world '
  - type: note
    content: 1 John 4:2
  - type: text
    content: 'who do not confess Jesus Christ '
  - type: text
    content: as
  - type: text
    content: ' coming in the flesh. '
  - type: note
    content: 1 John 2:22
  - type: text
    content: 'This is a deceiver and an antichrist. '
  '8':
  - type: note
    content: Mark 13:9
  - type: text
    content: 'Look to yourselves, '
  - type: note
    content: Gal. 3:4
  - type: text
    content: 'that we do not lose those things we worked for, but '
  - type: text
    content: that
  - type: text
    content: ' we may receive a full reward.'
  '9':
  - type: note
    content: John 7:16; 8:31; 1 John 2:19, 23, 24
  - type: text
    content: 'Whoever transgresses and does not abide in the doctrine of Christ does not have God. He who abides in the doctrine of Christ has both the Father and the Son. '
