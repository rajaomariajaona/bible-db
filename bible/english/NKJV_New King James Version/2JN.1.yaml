document_id: 2JN.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greeting the Elect Lady
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The Elder,
- type: usfm
  marker: p
  children:
  - type: text
    text: 'To the elect lady and her children, whom I love in truth, and not only I, but also all those who have known '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 1:5
    marker-yv: yv-n
  - type: text
    text: 'the truth, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'because of the truth which abides in us and will be with us forever:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:7; 1 Tim. 1:2
    marker-yv: yv-n
  - type: text
    text: 'Grace, mercy, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' peace will be with you from God the Father and from the Lord Jesus Christ, the Son of the Father, in truth and love.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Walk in Christ’s Commandments
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 2:19, 20; 3 John 3, 4
    marker-yv: yv-n
  - type: text
    text: 'rejoiced greatly that I have found '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' of your children walking in truth, as we received commandment from the Father. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And now I plead with you, lady, not as though I wrote a new commandment to you, but that which we have had from the beginning: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 13:34, 35; 15:12, 17); 1 John 3:11; 4:7, 11
    marker-yv: yv-n
  - type: text
    text: 'that we love one another. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 14:15; 1 John 2:5; 5:3
    marker-yv: yv-n
  - type: text
    text: 'This is love, that we walk according to His commandments. This is the commandment, that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 John 2:24
    marker-yv: yv-n
  - type: text
    text: as you have heard from the beginning, you should walk in it.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Beware of Antichrist Deceivers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 John 2:19; 4:1
    marker-yv: yv-n
  - type: text
    text: 'many deceivers have gone out into the world '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 John 4:2
    marker-yv: yv-n
  - type: text
    text: 'who do not confess Jesus Christ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' coming in the flesh. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 John 2:22
    marker-yv: yv-n
  - type: text
    text: 'This is a deceiver and an antichrist. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mark 13:9
    marker-yv: yv-n
  - type: text
    text: 'Look to yourselves, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gal. 3:4
    marker-yv: yv-n
  - type: text
    text: 'that we do not lose those things we worked for, but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' we may receive a full reward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 7:16; 8:31; 1 John 2:19, 23, 24
    marker-yv: yv-n
  - type: text
    text: 'Whoever transgresses and does not abide in the doctrine of Christ does not have God. He who abides in the doctrine of Christ has both the Father and the Son. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'If anyone comes to you and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 13:16; Rom. 16:17; 2 Thess. 3:6, 14; Titus 3:10
    marker-yv: yv-n
  - type: text
    text: 'does not bring this doctrine, do not receive him into your house nor greet him; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: for he who greets him shares in his evil deeds.
- type: usfm
  marker: s1
  children:
  - type: text
    text: John’s Farewell Greeting
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 3 John 13, 14
    marker-yv: yv-n
  - type: text
    text: 'Having many things to write to you, I did not wish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: do
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so
  - type: text
    text: ' with paper and ink; but I hope to come to you and speak face to face, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 17:13
    marker-yv: yv-n
  - type: text
    text: that our joy may be full.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Pet. 5:13
    marker-yv: yv-n
  - type: text
    text: The children of your elect sister greet you. Amen.
