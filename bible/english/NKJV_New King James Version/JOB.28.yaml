document_id: JOB.28,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job’s Discourse on Wisdom
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Surely there is a mine for silver,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And a place '
    - type: usfm
      marker: it
      children:
      - type: text
        text: where
    - type: text
      text: ' gold is refined.'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He cuts out channels in the rocks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his eye sees every precious thing.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He dams up the streams from trickling;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: What
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' hidden he brings forth to light.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 7:24
      marker-yv: yv-n
    - type: text
      text: ' where can wisdom be found?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the place of understanding?'
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Man does not know its '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:15
      marker-yv: yv-n
    - type: text
      text: value,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor is it found in the land of the living.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 28:22
      marker-yv: yv-n
    - type: text
      text: 'The deep says, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ‘It is
    - type: text
      text: ' not in me’;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the sea says, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ‘It is
    - type: text
      text: ' not with me.’'
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'It '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:13–15; 8:10, 11, 19
      marker-yv: yv-n
    - type: text
      text: cannot be purchased for gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nor can silver be weighed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' its price.'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It cannot be valued in the gold of Ophir,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In precious onyx or sapphire.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Neither '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 8:10; 16:16
      marker-yv: yv-n
    - type: text
      text: gold nor crystal can equal it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor can it be exchanged for jewelry of fine gold.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No mention shall be made of coral or quartz,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the price of wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' above '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:15; 8:11
      marker-yv: yv-n
    - type: text
      text: rubies.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The topaz of Ethiopia cannot equal it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nor can it be valued in pure '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 8:19
      marker-yv: yv-n
    - type: text
      text: gold.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Iron is taken from the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And copper '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' smelted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' ore.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “From
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 28:12; (Ps. 111:10; Prov. 1:7; 9:10)
      marker-yv: yv-n
    - type: text
      text: ' where then does wisdom come?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the place of understanding?'
  '21':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It is hidden from the eyes of all living,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And concealed from the birds of the air.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 28:14
      marker-yv: yv-n
    - type: text
      text: Destruction and Death say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘We have heard a report about it with our ears.’
  '23':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God understands its way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And He knows its place.
  '24':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For He looks to the ends of the earth,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 11:4; 33:13, 14; 66:7; Prov. 15:3)
      marker-yv: yv-n
    - type: text
      text: sees under the whole heavens,
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 135:7
      marker-yv: yv-n
    - type: text
      text: To establish a weight for the wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And apportion the waters by measure.
  '26':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 37:3; 38:25
      marker-yv: yv-n
    - type: text
      text: made a law for the rain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a path for the thunderbolt,
  '27':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then He saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wisdom
    - type: text
      text: ' and declared it;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He prepared it, indeed, He searched it out.
  '28':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to man He said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '‘Behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 4:6; Ps. 111:10; Prov. 1:7; 9:10; Eccl. 12:13)
      marker-yv: yv-n
    - type: text
      text: 'the fear of the Lord, that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' wisdom,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And to depart from evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' understanding.’ ”'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Man
    - type: text
      text: ' puts an end to darkness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And searches every recess
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For ore in the darkness and the shadow of death.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He breaks open a shaft away from people;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: In
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: places
    - type: text
      text: ' forgotten by feet'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They hang far away from men;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They swing to and fro.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' the earth, from it comes bread,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But underneath it is turned up as by fire;
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Its stones '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the source of sapphires,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And it contains gold dust.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That
    - type: text
      text: ' path no bird knows,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor has the falcon’s eye seen it.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The proud lions have not trodden it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor has the fierce lion passed over it.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He puts his hand on the flint;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He overturns the mountains at the roots.
