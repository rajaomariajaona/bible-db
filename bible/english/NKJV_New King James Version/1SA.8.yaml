    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' to his work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He will take a tenth of your sheep. And you will be his servants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And you will cry out in that day because of your king whom you have chosen for yourselves, and the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 21:7; (Ezek. 46:18)
    marker-yv: yv-n
  - type: text
    text: will not hear you in that day.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nevertheless the people '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 1:25–28; Is. 1:15; Mic. 3:4
    marker-yv: yv-n
  - type: text
    text: 'refused to obey the voice of Samuel; and they said, “No, but we will have a king over us, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'that we also may be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 66:4; Jer. 44:16
    marker-yv: yv-n
  - type: text
    text: like all the nations, and that our king may judge us and go out before us and fight our battles.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Samuel heard all the words of the people, and he repeated them in the hearing of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Samuel, '
  - type: usfm
    marker: x
    children:
