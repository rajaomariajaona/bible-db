    marker: x
    children:
    - type: text
      text: 1 Sam. 8:11–18
    marker-yv: yv-n
  - type: text
    text: '“This will be the behavior of the king who will reign over you: He will take your '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 17:14–20
    marker-yv: yv-n
  - type: text
    text: 'sons and appoint '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' for his own '
  - type: usfm
    marker: x
    children:
    - type: text
