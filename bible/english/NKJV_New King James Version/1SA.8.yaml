    children:
    - type: text
      text: Ex. 23:6–8; Deut. 16:19; 1 Sam. 12:3
    marker-yv: yv-n
  - type: text
    text: make us a king to judge us like all the nations.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
