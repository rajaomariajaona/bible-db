  '8':
  - type: text
    content: 'According to all the works which they have done since the day that I brought them up out of Egypt, even to this day—with which they have forsaken Me and served other gods—so they are doing to you also. '
  '9':
  - type: text
    content: 'Now therefore, heed their voice. However, you shall solemnly forewarn them, and '
  - type: note
