    marker-yv: yv-n
  - type: text
    text: 'chariots and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' his horsemen, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' will run before his chariots. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He will '
  - type: usfm
