      text: 1 Sam. 8:5
    marker-yv: yv-n
  - type: text
    text: “Heed their voice, and make them a king.”
- type: usfm
  marker: p
  children:
  - type: text
    text: And Samuel said to the men of Israel, “Every man go to his city.”
