    - type: text
      text: '6'
  - type: text
    text: 'But the thing '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 17:14, 15; Hos. 13:10, 11; Acts 13:21
    marker-yv: yv-n
  - type: text
    text: 'displeased Samuel when they said, “Give us a king to judge us.” So Samuel '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 12:17
    marker-yv: yv-n
  - type: text
    text: 'prayed to the '
