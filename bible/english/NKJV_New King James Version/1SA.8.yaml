    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Samuel, “Heed the voice of the people in all that they say to you; for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 7:9
    marker-yv: yv-n
  - type: text
    text: 'they have not rejected you, but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 16:8
    marker-yv: yv-n
  - type: text
    text: 'they have rejected Me, that I should not reign over them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'According to all the works which they have done since the day that I brought them up out of Egypt, even to this day—with which they have forsaken Me and served other gods—so they are doing to you also. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now therefore, heed their voice. However, you shall solemnly forewarn them, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 10:19
    marker-yv: yv-n
  - type: text
    text: show them the behavior of the king who will reign over them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So Samuel told all the words of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to the people who asked him for a king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he said, '
