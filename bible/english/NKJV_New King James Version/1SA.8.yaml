    marker-yv: yv-n
  - type: text
    text: 'appoint captains over his thousands and captains over his fifties, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: set
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' to plow his ground and reap his harvest, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' to make his weapons of war and equipment for his chariots. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He will take your daughters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' perfumers, cooks, and bakers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 22:7
    marker-yv: yv-n
  - type: text
    text: 'he will take the best of your fields, your vineyards, and your olive groves, and give '
