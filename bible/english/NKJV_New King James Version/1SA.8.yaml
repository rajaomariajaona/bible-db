    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' to his servants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He will take a tenth of your grain and your vintage, and give it to his officers and servants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he will take your male servants, your female servants, your finest young men, and your donkeys, and put '
