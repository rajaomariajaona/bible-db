      text: '4'
  - type: text
    text: 'Then all the elders of Israel gathered together and came to Samuel at Ramah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and said to him, “Look, you are old, and your sons do not walk in your ways. Now '
