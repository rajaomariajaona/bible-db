document_id: 2KI.17,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Hoshea Reigns in Israel
  - type: text
    content: 'In the twelfth year of Ahaz king of Judah, '
  - type: note
    content: 2 Kin. 15:30
  - type: text
    content: 'Hoshea the son of Elah became king of Israel in Samaria, '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: reigned
  - type: text
    content: ' nine years. '
  '10':
  - type: note
    content: 1 Kin. 14:23; Is. 57:5
  - type: text
    content: 'They set up for themselves '
  - type: text
    content: sacred
  - type: text
    content: ' pillars and '
  - type: note
    content: (Ex. 34:12–14; Deut. 16:21); Mic. 5:14
  - type: text
    content: 'wooden images '
  - type: note
    content: (Deut. 12:2); 2 Kin. 16:4
  - type: text
    content: 'on every high hill and under every green tree. '
  '11':
  - type: text
    content: 'There they burned incense on all the high places, like the nations whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' had carried away before them; and they did wicked things to provoke the '
  - type: heading
    content: Lord
  - type: text
    content: ' to anger, '
  '12':
  - type: text
    content: 'for they served idols, '
  - type: note
    content: (Ex. 20:3–5; Lev. 26:1; Deut. 5:7, 8)
  - type: text
    content: 'of which the '
  - type: heading
    content: Lord
  - type: text
    content: ' had said to them, '
  - type: note
    content: (Deut. 4:19)
  - type: text
    content: “You shall not do this thing.”
  '13':
  - type: text
    content: 'Yet the '
  - type: heading
    content: Lord
  - type: text
    content: ' testified against Israel and against Judah, by all of His '
  - type: note
    content: Neh. 9:29, 30
  - type: text
    content: 'prophets, '
  - type: note
    content: 1 Sam. 9:9
  - type: text
    content: 'every seer, saying, '
  - type: note
    content: (Jer. 18:11; 25:5; 35:15; Ezek. 18:31)
  - type: text
    content: '“Turn from your evil ways, and keep My commandments '
  - type: text
    content: and
  - type: text
    content: ' My statutes, according to all the law which I commanded your fathers, and which I sent to you by My servants the prophets.” '
  '14':
  - type: text
    content: 'Nevertheless they would not hear, but '
  - type: note
    content: Ex. 32:9; 33:3; Deut. 31:27; (Prov. 29:1; Acts 7:51)
  - type: text
    content: 'stiffened their necks, like the necks of their fathers, who '
  - type: note
    content: Deut. 9:23; Ps. 78:22
  - type: text
    content: 'did not believe in the '
  - type: heading
    content: Lord
  - type: text
    content: ' their God. '
  '15':
  - type: text
    content: 'And they '
  - type: note
    content: Jer. 44:3
  - type: text
    content: 'rejected His statutes '
  - type: note
    content: Ex. 24:6–8; Deut. 29:25
  - type: text
    content: 'and His covenant that He had made with their fathers, and His testimonies which He had testified against them; they followed '
  - type: note
    content: Deut. 32:21; 1 Kin. 16:31; (1 Cor. 8:4)
  - type: text
    content: 'idols, '
  - type: note
    content: 2 Chr. 13:7; Jer. 2:5; (Rom. 1:21–23)
  - type: text
    content: 'became idolaters, and '
  - type: text
    content: went
  - type: text
    content: ' after the nations who '
  - type: text
    content: were
  - type: text
    content: ' all around them, '
  - type: text
    content: concerning
  - type: text
    content: ' whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' had charged them that they should '
  - type: note
    content: (Deut. 12:30, 31)
  - type: text
    content: 'not do like them. '
  '16':
  - type: text
    content: 'So they left all the commandments of the '
  - type: heading
    content: Lord
  - type: text
    content: ' their God, '
  - type: note
    content: Ex. 32:8; 1 Kin. 12:28
  - type: text
    content: 'made for themselves a molded image '
  - type: text
    content: and
  - type: text
    content: ' two calves, '
  - type: note
    content: (1 Kin. 14:15)
  - type: text
    content: 'made a wooden image and worshiped all the '
  - type: note
    content: (Deut. 4:19)
  - type: text
    content: 'host of heaven, '
  - type: note
    content: 1 Kin. 16:31; 22:53
  - type: text
    content: 'and served Baal. '
  '17':
  - type: note
    content: (Lev. 18:21); 2 Kin. 16:3; Ezek. 23:37
  - type: text
    content: 'And they caused their sons and daughters to pass through the fire, '
  - type: note
    content: (Lev. 19:26; Deut. 18:10–12)
  - type: text
    content: 'practiced witchcraft and soothsaying, and '
  - type: note
    content: 1 Kin. 21:20
  - type: text
    content: 'sold themselves to do evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', to provoke Him to anger. '
  '18':
  - type: text
    content: 'Therefore the '
  - type: heading
    content: Lord
  - type: text
    content: ' was very angry with Israel, and removed them from His sight; there was none left '
  - type: note
    content: 1 Kin. 11:13, 32
  - type: text
    content: but the tribe of Judah alone.
  '19':
  - type: text
    content: 'Also '
  - type: note
    content: Jer. 3:8
  - type: text
    content: 'Judah did not keep the commandments of the '
  - type: heading
    content: Lord
  - type: text
    content: ' their God, but walked in the statutes of Israel which they made. '
  '2':
  - type: text
    content: 'And he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', but not as the kings of Israel who were before him. '
  '20':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' rejected all the descendants of Israel, afflicted them, and '
  - type: note
    content: Judg. 2:14; 2 Kin. 13:3; 15:29
  - type: text
    content: 'delivered them into the hand of plunderers, until He had cast them from His '
  - type: note
    content: 2 Kin. 24:20
  - type: text
    content: 'sight. '
  '21':
  - type: text
    content: 'For '
  - type: note
    content: 1 Kin. 11:11, 31
  - type: text
    content: 'He tore Israel from the house of David, and '
  - type: note
    content: 1 Kin. 12:20, 28
  - type: text
    content: 'they made Jeroboam the son of Nebat king. Then Jeroboam drove Israel from following the '
  - type: heading
    content: Lord
  - type: text
    content: ', and made them commit a great sin. '
  '22':
  - type: text
    content: 'For the children of Israel walked in all the sins of Jeroboam which he did; they did not depart from them, '
  '23':
  - type: text
    content: 'until the '
  - type: heading
    content: Lord
  - type: text
    content: ' removed Israel out of His sight, '
  - type: note
    content: 1 Kin. 14:16; Is. 8:4
  - type: text
    content: 'as He had said by all His servants the prophets. '
  - type: note
    content: 2 Kin. 17:6
  - type: text
    content: 'So Israel was carried away from their own land to Assyria, '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' to this day.'
  - type: heading
    content: Assyria Resettles Samaria
  '24':
  - type: note
    content: Ezra 4:2, 10
  - type: text
    content: 'Then the king of Assyria brought '
  - type: text
    content: people
  - type: text
    content: ' from Babylon, Cuthah, '
  - type: note
    content: 2 Kin. 18:34
  - type: text
    content: 'Ava, Hamath, and from Sepharvaim, and placed '
  - type: text
    content: them
  - type: text
    content: ' in the cities of Samaria instead of the children of Israel; and they took possession of Samaria and dwelt in its cities. '
  '25':
  - type: text
    content: 'And it was so, at the beginning of their dwelling there, '
  - type: text
    content: that
  - type: text
    content: ' they did not fear the '
  - type: heading
    content: Lord
  - type: text
    content: '; therefore the '
  - type: heading
    content: Lord
  - type: text
    content: ' sent lions among them, which killed '
  - type: text
    content: some
  - type: text
    content: ' of them. '
  '26':
  - type: text
    content: 'So they spoke to the king of Assyria, saying, “The nations whom you have removed and placed in the cities of Samaria do not know the rituals of the God of the land; therefore He has sent lions among them, and indeed, they are killing them because they do not know the rituals of the God of the land.” '
  '27':
  - type: text
    content: 'Then the king of Assyria commanded, saying, “Send there one of the priests whom you brought from there; let him go and dwell there, and let him teach them the rituals of the God of the land.” '
  '28':
  - type: text
    content: 'Then one of the priests whom they had carried away from Samaria came and dwelt in Bethel, and taught them how they should fear the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '29':
  - type: text
    content: 'However every nation continued to make gods of its own, and put '
  - type: text
    content: them
  - type: text
    content: ' '
  - type: note
    content: 1 Kin. 12:31; 13:32
  - type: text
    content: 'in the shrines on the high places which the Samaritans had made, '
  - type: text
    content: every
  - type: text
    content: ' nation in the cities where they dwelt. '
  '3':
  - type: note
    content: 2 Kin. 18:9–12
  - type: text
    content: 'Shalmaneser king of Assyria came up against him; and Hoshea '
  - type: note
    content: 2 Kin. 24:1
  - type: text
    content: 'became his vassal, and paid him tribute money. '
  '30':
  - type: text
    content: 'The men of '
  - type: note
    content: 2 Kin. 17:24
  - type: text
    content: 'Babylon made Succoth Benoth, the men of Cuth made Nergal, the men of Hamath made Ashima, '
  '31':
  - type: note
    content: Ezra 4:9
  - type: text
    content: 'and the Avites made Nibhaz and Tartak; and the Sepharvites '
  - type: note
    content: (Lev. 18:21; Deut. 12:31)
  - type: text
    content: 'burned their children in fire to Adrammelech and Anammelech, the gods of Sepharvaim. '
  '32':
  - type: text
    content: 'So they feared the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 1 Kin. 12:31; 13:33
  - type: text
    content: 'and from every class they appointed for themselves priests of the high places, who sacrificed for them in the shrines of the high places. '
  '33':
  - type: note
    content: Zeph. 1:5
  - type: text
    content: 'They feared the '
  - type: heading
    content: Lord
  - type: text
    content: ', yet served their own gods—according to the rituals of the nations from among whom they were carried away.'
  '34':
  - type: text
    content: 'To this day they continue practicing the former rituals; they do not fear the '
  - type: heading
    content: Lord
  - type: text
    content: ', nor do they follow their statutes or their ordinances, or the law and commandment which the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded the children of Jacob, '
  - type: note
    content: Gen. 32:28; 35:10
  - type: text
    content: 'whom He named Israel, '
  '35':
  - type: text
    content: 'with whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' had made a covenant and charged them, saying: '
  - type: note
    content: Judg. 6:10
  - type: text
    content: '“You shall not fear other gods, nor '
  - type: note
    content: (Ex. 20:5)
  - type: text
    content: 'bow down to them nor serve them nor sacrifice to them; '
  '36':
  - type: text
    content: 'but the '
  - type: heading
    content: Lord
  - type: text
    content: ', who '
  - type: note
    content: Ex. 14:15–30
  - type: text
    content: 'brought you up from the land of Egypt with great power and '
  - type: note
    content: Ex. 6:6; 9:15
  - type: text
    content: 'an outstretched arm, '
  - type: note
    content: (Deut. 10:20)
  - type: text
    content: 'Him you shall fear, Him you shall worship, and to Him you shall offer sacrifice. '
  '37':
  - type: text
    content: 'And the statutes, the ordinances, the law, and the commandment which He wrote for you, '
  - type: note
    content: Deut. 5:32
  - type: text
    content: 'you shall be careful to observe forever; you shall not fear other gods. '
  '38':
  - type: text
    content: 'And the covenant that I have made with you, '
  - type: note
    content: Deut. 4:23; 6:12
  - type: text
    content: 'you shall not forget, nor shall you fear other gods. '
  '39':
  - type: text
    content: 'But the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God you shall fear; and He will deliver you from the hand of all your enemies.” '
  '4':
  - type: text
    content: 'And the king of Assyria uncovered a conspiracy by Hoshea; for he had sent messengers to So, king of Egypt, and brought no tribute to the king of Assyria, as '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: had
  - type: text
    content: ' '
  - type: text
    content: done
  - type: text
    content: ' year by year. Therefore the king of Assyria shut him up, and bound him in prison.'
  - type: heading
    content: Israel Carried Captive to Assyria
  '40':
  - type: text
    content: 'However they did not obey, but they followed their former rituals. '
  '41':
  - type: note
    content: 2 Kin. 17:32, 33
  - type: text
    content: 'So these nations feared the '
  - type: heading
    content: Lord
  - type: text
    content: ', yet served their carved images; also their children and their children’s children have continued doing as their fathers did, even to this day.'
  '5':
  - type: text
    content: 'Now '
  - type: note
    content: 2 Kin. 18:9; Hos. 13:16
  - type: text
    content: 'the king of Assyria went throughout all the land, and went up to Samaria and besieged it for three years. '
  '6':
  - type: note
    content: 2 Kin. 18:10, 11; Is. 7:7–9; Hos. 1:4; 13:16; Amos 4:2
  - type: text
    content: 'In the ninth year of Hoshea, the king of Assyria took Samaria and '
  - type: note
    content: Lev. 26:32, 33; (Deut. 28:36, 64; 29:27, 28)
  - type: text
    content: 'carried Israel away to Assyria, '
  - type: note
    content: 1 Chr. 5:26
  - type: text
    content: and placed them in Halah and by the Habor, the River of Gozan, and in the cities of the Medes.
  '7':
  - type: text
    content: 'For '
  - type: note
    content: (Josh. 23:16)
  - type: text
    content: 'so it was that the children of Israel had sinned against the '
  - type: heading
    content: Lord
  - type: text
    content: ' their God, who had brought them up out of the land of Egypt, from under the hand of Pharaoh king of Egypt; and they had '
  - type: note
    content: Judg. 6:10
  - type: text
    content: 'feared other gods, '
  '8':
  - type: text
    content: 'and '
  - type: note
    content: (Lev. 18:3; Deut. 18:9); 2 Kin. 16:3
  - type: text
    content: 'had walked in the statutes of the nations whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' had cast out from before the children of Israel, and of the kings of Israel, which they had made. '
  '9':
  - type: text
    content: 'Also the children of Israel secretly did against the '
  - type: heading
    content: Lord
  - type: text
    content: ' their God things that '
  - type: text
    content: were
  - type: text
    content: ' not right, and they built for themselves high places in all their cities, '
  - type: note
    content: 2 Kin. 18:8
  - type: text
    content: 'from watchtower to fortified city. '
