document_id: 2KI.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hoshea Reigns in Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the twelfth year of Ahaz king of Judah, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 15:30
    marker-yv: yv-n
  - type: text
    text: 'Hoshea the son of Elah became king of Israel in Samaria, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: reigned
  - type: text
    text: ' nine years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he did evil in the sight of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', but not as the kings of Israel who were before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 18:9–12
    marker-yv: yv-n
  - type: text
    text: 'Shalmaneser king of Assyria came up against him; and Hoshea '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 24:1
    marker-yv: yv-n
  - type: text
    text: 'became his vassal, and paid him tribute money. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the king of Assyria uncovered a conspiracy by Hoshea; for he had sent messengers to So, king of Egypt, and brought no tribute to the king of Assyria, as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: done
  - type: text
    text: ' year by year. Therefore the king of Assyria shut him up, and bound him in prison.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Carried Captive to Assyria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 18:9; Hos. 13:16
    marker-yv: yv-n
  - type: text
    text: 'the king of Assyria went throughout all the land, and went up to Samaria and besieged it for three years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 18:10, 11; Is. 7:7–9; Hos. 1:4; 13:16; Amos 4:2
    marker-yv: yv-n
  - type: text
    text: 'In the ninth year of Hoshea, the king of Assyria took Samaria and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:32, 33; (Deut. 28:36, 64; 29:27, 28)
    marker-yv: yv-n
  - type: text
    text: 'carried Israel away to Assyria, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 5:26
    marker-yv: yv-n
  - type: text
    text: and placed them in Halah and by the Habor, the River of Gozan, and in the cities of the Medes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Josh. 23:16)
    marker-yv: yv-n
  - type: text
    text: 'so it was that the children of Israel had sinned against the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God, who had brought them up out of the land of Egypt, from under the hand of Pharaoh king of Egypt; and they had '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 6:10
    marker-yv: yv-n
  - type: text
    text: 'feared other gods, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Lev. 18:3; Deut. 18:9); 2 Kin. 16:3
    marker-yv: yv-n
  - type: text
    text: 'had walked in the statutes of the nations whom the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had cast out from before the children of Israel, and of the kings of Israel, which they had made. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Also the children of Israel secretly did against the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God things that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' not right, and they built for themselves high places in all their cities, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 18:8
    marker-yv: yv-n
  - type: text
    text: 'from watchtower to fortified city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 14:23; Is. 57:5
    marker-yv: yv-n
  - type: text
    text: 'They set up for themselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacred
  - type: text
    text: ' pillars and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ex. 34:12–14; Deut. 16:21); Mic. 5:14
    marker-yv: yv-n
  - type: text
    text: 'wooden images '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 12:2); 2 Kin. 16:4
    marker-yv: yv-n
  - type: text
    text: 'on every high hill and under every green tree. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'There they burned incense on all the high places, like the nations whom the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had carried away before them; and they did wicked things to provoke the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to anger, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'for they served idols, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ex. 20:3–5; Lev. 26:1; Deut. 5:7, 8)
    marker-yv: yv-n
  - type: text
    text: 'of which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had said to them, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 4:19)
    marker-yv: yv-n
  - type: text
    text: “You shall not do this thing.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Yet the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' testified against Israel and against Judah, by all of His '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 9:29, 30
    marker-yv: yv-n
  - type: text
    text: 'prophets, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 9:9
    marker-yv: yv-n
  - type: text
    text: 'every seer, saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Jer. 18:11; 25:5; 35:15; Ezek. 18:31)
    marker-yv: yv-n
  - type: text
    text: '“Turn from your evil ways, and keep My commandments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' My statutes, according to all the law which I commanded your fathers, and which I sent to you by My servants the prophets.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nevertheless they would not hear, but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 32:9; 33:3; Deut. 31:27; (Prov. 29:1; Acts 7:51)
    marker-yv: yv-n
  - type: text
    text: 'stiffened their necks, like the necks of their fathers, who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 9:23; Ps. 78:22
    marker-yv: yv-n
  - type: text
    text: 'did not believe in the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 44:3
    marker-yv: yv-n
  - type: text
    text: 'rejected His statutes '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 24:6–8; Deut. 29:25
    marker-yv: yv-n
  - type: text
    text: 'and His covenant that He had made with their fathers, and His testimonies which He had testified against them; they followed '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 32:21; 1 Kin. 16:31; (1 Cor. 8:4)
    marker-yv: yv-n
  - type: text
    text: 'idols, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 13:7; Jer. 2:5; (Rom. 1:21–23)
    marker-yv: yv-n
  - type: text
    text: 'became idolaters, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: went
  - type: text
    text: ' after the nations who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' all around them, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: concerning
  - type: text
    text: ' whom the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had charged them that they should '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 12:30, 31)
    marker-yv: yv-n
  - type: text
    text: 'not do like them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So they left all the commandments of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 32:8; 1 Kin. 12:28
    marker-yv: yv-n
  - type: text
    text: 'made for themselves a molded image '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' two calves, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Kin. 14:15)
    marker-yv: yv-n
  - type: text
    text: 'made a wooden image and worshiped all the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 4:19)
    marker-yv: yv-n
  - type: text
    text: 'host of heaven, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 16:31; 22:53
    marker-yv: yv-n
  - type: text
    text: 'and served Baal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Lev. 18:21); 2 Kin. 16:3; Ezek. 23:37
    marker-yv: yv-n
  - type: text
    text: 'And they caused their sons and daughters to pass through the fire, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Lev. 19:26; Deut. 18:10–12)
    marker-yv: yv-n
  - type: text
    text: 'practiced witchcraft and soothsaying, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 21:20
    marker-yv: yv-n
  - type: text
    text: 'sold themselves to do evil in the sight of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', to provoke Him to anger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Therefore the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was very angry with Israel, and removed them from His sight; there was none left '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:13, 32
    marker-yv: yv-n
  - type: text
    text: but the tribe of Judah alone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Also '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 3:8
    marker-yv: yv-n
  - type: text
    text: 'Judah did not keep the commandments of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God, but walked in the statutes of Israel which they made. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rejected all the descendants of Israel, afflicted them, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 2:14; 2 Kin. 13:3; 15:29
    marker-yv: yv-n
  - type: text
    text: 'delivered them into the hand of plunderers, until He had cast them from His '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 24:20
    marker-yv: yv-n
  - type: text
    text: 'sight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:11, 31
    marker-yv: yv-n
  - type: text
    text: 'He tore Israel from the house of David, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 12:20, 28
    marker-yv: yv-n
  - type: text
    text: 'they made Jeroboam the son of Nebat king. Then Jeroboam drove Israel from following the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and made them commit a great sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For the children of Israel walked in all the sins of Jeroboam which he did; they did not depart from them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'until the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' removed Israel out of His sight, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 14:16; Is. 8:4
    marker-yv: yv-n
  - type: text
    text: 'as He had said by all His servants the prophets. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 17:6
    marker-yv: yv-n
  - type: text
    text: 'So Israel was carried away from their own land to Assyria, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' to this day.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Assyria Resettles Samaria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezra 4:2, 10
    marker-yv: yv-n
  - type: text
    text: 'Then the king of Assyria brought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: people
  - type: text
    text: ' from Babylon, Cuthah, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 18:34
    marker-yv: yv-n
  - type: text
    text: 'Ava, Hamath, and from Sepharvaim, and placed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' in the cities of Samaria instead of the children of Israel; and they took possession of Samaria and dwelt in its cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And it was so, at the beginning of their dwelling there, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' they did not fear the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '; therefore the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sent lions among them, which killed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'So they spoke to the king of Assyria, saying, “The nations whom you have removed and placed in the cities of Samaria do not know the rituals of the God of the land; therefore He has sent lions among them, and indeed, they are killing them because they do not know the rituals of the God of the land.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then the king of Assyria commanded, saying, “Send there one of the priests whom you brought from there; let him go and dwell there, and let him teach them the rituals of the God of the land.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then one of the priests whom they had carried away from Samaria came and dwelt in Bethel, and taught them how they should fear the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'However every nation continued to make gods of its own, and put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 12:31; 13:32
    marker-yv: yv-n
  - type: text
    text: 'in the shrines on the high places which the Samaritans had made, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: every
  - type: text
    text: ' nation in the cities where they dwelt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The men of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 17:24
    marker-yv: yv-n
  - type: text
    text: 'Babylon made Succoth Benoth, the men of Cuth made Nergal, the men of Hamath made Ashima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezra 4:9
    marker-yv: yv-n
  - type: text
    text: 'and the Avites made Nibhaz and Tartak; and the Sepharvites '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Lev. 18:21; Deut. 12:31)
    marker-yv: yv-n
  - type: text
    text: 'burned their children in fire to Adrammelech and Anammelech, the gods of Sepharvaim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So they feared the '
  - type: usfm
    marker: sc
