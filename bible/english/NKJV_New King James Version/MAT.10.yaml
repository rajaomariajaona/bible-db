document_id: MAT.10,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Twelve Apostles
  - type: text
    content: 'And '
  - type: note
    content: Mark 3:13; Luke 6:13
  - type: text
    content: 'when He had called His twelve disciples to '
  - type: text
    content: Him,
  - type: text
    content: ' He gave them power '
  - type: text
    content: over
  - type: text
    content: ' unclean spirits, to cast them out, and to heal all kinds of sickness and all kinds of disease. '
  '10':
  - type: text
    content: 'nor bag for '
  - type: text
    content: your
  - type: text
    content: ' journey, nor two tunics, nor sandals, nor staffs; '
  - type: note
    content: Luke 10:7; (1 Cor. 9:4–14); 1 Tim. 5:18
  - type: text
    content: for a worker is worthy of his food.
  '11':
  - type: note
    content: Luke 10:8
  - type: text
    content: “Now whatever city or town you enter, inquire who in it is worthy, and stay there till you go out.
  - type: text
    content: ' '
  '12':
  - type: text
    content: And when you go into a household, greet it.
  - type: text
    content: ' '
  '13':
  - type: note
    content: Luke 10:5
  - type: text
    content: 'If the household is worthy, let your peace come upon it. '
  - type: note
    content: Ps. 35:13
  - type: text
    content: But if it is not worthy, let your peace return to you.
  - type: text
    content: ' '
  '14':
  - type: note
    content: Mark 6:11; Luke 9:5
  - type: text
    content: 'And whoever will not receive you nor hear your words, when you depart from that house or city, '
  - type: note
    content: Neh. 5:13; Luke 10:10, 11; Acts 13:51
  - type: text
    content: shake off the dust from your feet.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Assuredly, I say to you, '
  - type: note
    content: Matt. 11:22, 24
  - type: text
    content: it will be more tolerable for the land of Sodom and Gomorrah in the day of judgment than for that city!
  - type: heading
    content: Persecutions Are Coming
  '16':
  - type: note
    content: Luke 10:3
  - type: text
    content: '“Behold, I send you out as sheep in the midst of wolves. '
  - type: note
    content: 2 Cor. 12:16; Eph. 5:15; Col. 4:5
  - type: text
    content: 'Therefore be wise as serpents and '
  - type: note
    content: (Phil. 2:14–16)
  - type: text
    content: harmless
  - type: text
    content: ' as doves.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'But beware of men, for '
  - type: note
    content: Matt. 23:34; Mark 13:9; Luke 12:11
  - type: text
    content: 'they will deliver you up to councils and '
  - type: note
    content: Acts 5:40; 22:19; 26:11
  - type: text
    content: scourge you in their synagogues.
  - type: text
    content: ' '
  '18':
  - type: note
    content: Acts 12:1; 2 Tim. 4:16
  - type: text
    content: You will be brought before governors and kings for My sake, as a testimony to them and to the Gentiles.
  - type: text
    content: ' '
  '19':
  - type: note
    content: Mark 13:11; Luke 12:11, 12; 21:14, 15
  - type: text
    content: 'But when they deliver you up, do not worry about how or what you should speak. For '
  - type: note
    content: Ex. 4:12; Jer. 1:7
  - type: text
    content: it will be given to you in that hour what you should speak;
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Now the names of the twelve apostles are these: first, Simon, '
  - type: note
    content: John 1:42
  - type: text
    content: 'who is called Peter, and Andrew his brother; James the '
  - type: text
    content: son
  - type: text
    content: ' of Zebedee, and John his brother; '
  '20':
  - type: note
    content: 2 Sam. 23:2; (2 Tim. 4:17)
  - type: text
    content: for it is not you who speak, but the Spirit of your Father who speaks in you.
  '21':
  - type: note
    content: Mic. 7:6; Luke 21:16
  - type: text
    content: '“Now brother will deliver up brother to death, and a father '
  - type: text
    content: his
  - type: text
    content: ' child; and children will rise up against parents and cause them to be put to death.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 24:9; Luke 21:17; John 15:18
  - type: text
    content: 'you will be hated by all for My name’s sake. '
  - type: note
    content: (Dan. 12:12); Matt. 24:13; Mark 13:13
  - type: text
    content: But he who endures to the end will be saved.
  - type: text
    content: ' '
  '23':
  - type: note
    content: Matt. 2:13; Acts 8:1
  - type: text
    content: 'When they persecute you in this city, flee to another. For assuredly, I say to you, you will not have '
  - type: note
    content: (Matt. 24:14; Mark 13:10)
  - type: text
    content: 'gone through the cities of Israel '
  - type: note
    content: Matt. 16:28
  - type: text
    content: before the Son of Man comes.
  '24':
  - type: note
    content: Luke 6:40; John 15:20
  - type: text
    content: '“A disciple is not above '
  - type: text
    content: his
  - type: text
    content: ' teacher, nor a servant above his master.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'It is enough for a disciple that he be like his teacher, and a servant like his master. If '
  - type: note
    content: Mark 3:22; Luke 11:15, 18, 19; John 8:48, 52
  - type: text
    content: 'they have called the master of the house '
  - type: text
    content: Beelzebub,
  - type: text
    content: ' how much more '
  - type: text
    content: will they call
  - type: text
    content: ' those of his household!'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Therefore do not fear them. '
  - type: note
    content: Mark 4:22; Luke 8:17; 12:2, 3; (1 Cor. 4:5)
  - type: text
    content: For there is nothing covered that will not be revealed, and hidden that will not be known.
  - type: heading
    content: Jesus Teaches the Fear of God
  '27':
  - type: text
    content: '“Whatever I tell you in the dark, '
  - type: note
    content: Luke 12:3; Acts 5:20
  - type: text
    content: speak in the light; and what you hear in the ear, preach on the housetops.
  - type: text
    content: ' '
  '28':
  - type: note
    content: Luke 12:4; (1 Pet. 3:14)
  - type: text
    content: 'And do not fear those who kill the body but cannot kill the soul. But rather '
  - type: note
    content: Is. 8:13; Matt. 5:22; Luke 12:5
  - type: text
    content: 'fear Him who is able to destroy both soul and body in '
  - type: text
    content: hell.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Are not two '
  - type: note
    content: Luke 12:6, 7
  - type: text
    content: 'sparrows sold for a '
  - type: text
    content: copper coin? And not one of them falls to the ground apart from your Father’s will.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Philip and Bartholomew; Thomas and Matthew the tax collector; James the '
  - type: text
    content: son
  - type: text
    content: ' of Alphaeus, and Lebbaeus, whose surname was Thaddaeus; '
  '30':
  - type: note
    content: 1 Sam. 14:45; 2 Sam. 14:11; 1 Kin. 1:52; Luke 21:18; Acts 27:34
  - type: text
    content: But the very hairs of your head are all numbered.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Do not fear therefore; you are of more value than many sparrows.
  - type: heading
    content: Confess Christ Before Men
  '32':
  - type: note
    content: Ps. 119:46; Luke 12:8; (Rom. 10:9)
  - type: text
    content: '“Therefore whoever confesses Me before men, '
  - type: note
    content: (Rev. 3:5)
  - type: text
    content: him I will also confess before My Father who is in heaven.
  - type: text
    content: ' '
  '33':
  - type: note
    content: (Mark 8:38; Luke 9:26); 2 Tim. 2:12
  - type: text
    content: But whoever denies Me before men, him I will also deny before My Father who is in heaven.
  - type: heading
    content: Christ Brings Division
  '34':
  - type: note
    content: (Luke 12:49)
  - type: text
    content: “Do not think that I came to bring peace on earth. I did not come to bring peace but a sword.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'For I have come to '
  - type: note
    content: Mic. 7:6; Matt. 10:21; Luke 12:53
  - type: text
    content: ‘set
  - type: text
    content: ' a man against his father, a daughter against her mother, and a daughter-in-law against her mother-in-law’;'
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'and '
  - type: note
    content: Ps. 41:9; 55:13; John 13:18
  - type: text
    content: ‘a man’s enemies
  - type: text
    content: ' '
  - type: text
    content: will be
  - type: text
    content: ' '
  - type: text
    content: those of his
  - type: text
    content: ' '
  - type: text
    content: own
  - type: text
    content: ' '
  - type: text
    content: household.’
  - type: text
    content: ' '
  '37':
  - type: note
    content: Deut. 33:9; Luke 14:26
  - type: text
    content: He who loves father or mother more than Me is not worthy of Me. And he who loves son or daughter more than Me is not worthy of Me.
  - type: text
    content: ' '
  '38':
  - type: note
    content: (Matt. 16:24; Mark 8:34; Luke 9:23; 14:27)
  - type: text
    content: And he who does not take his cross and follow after Me is not worthy of Me.
  - type: text
    content: ' '
  '39':
  - type: note
    content: Matt. 16:25; Mark 8:35; Luke 9:24; 17:33; John 12:25
  - type: text
    content: He who finds his life will lose it, and he who loses his life for My sake will find it.
  - type: heading
    content: A Cup of Cold Water
  '4':
  - type: note
    content: Luke 6:15; Acts 1:13
  - type: text
    content: 'Simon the Cananite, and Judas '
  - type: note
    content: Matt. 26:14; Luke 22:3; John 13:2, 26
  - type: text
    content: Iscariot, who also betrayed Him.
  - type: heading
    content: Sending Out the Twelve
  '40':
  - type: note
    content: Mark 9:37; Luke 9:48; John 12:44; Gal. 4:14
  - type: text
    content: “He who receives you receives Me, and he who receives Me receives Him who sent Me.
  - type: text
    content: ' '
  '41':
  - type: note
    content: 1 Kin. 17:10; 2 Kin. 4:8
  - type: text
    content: He who receives a prophet in the name of a prophet shall receive a prophet’s reward. And he who receives a righteous man in the name of a righteous man shall receive a righteous man’s reward.
  - type: text
    content: ' '
  '42':
  - type: note
    content: (Matt. 25:40); Mark 9:41; Heb. 6:10
  - type: text
    content: 'And whoever gives one of these little ones only a cup of cold '
  - type: text
    content: water
  - type: text
    content: ' in the name of a disciple, assuredly, I say to you, he shall by no means lose his reward.”'
  '5':
  - type: text
    content: 'These twelve Jesus sent out and commanded them, saying: '
  - type: note
    content: Matt. 4:15
  - type: text
    content: '“Do not go into the way of the Gentiles, and do not enter a city of '
  - type: note
    content: 2 Kin. 17:24; Luke 9:52; 10:33; 17:16; John 4:9
  - type: text
    content: the Samaritans.
  - type: text
    content: ' '
  '6':
  - type: note
    content: Matt. 15:24; Acts 13:46
  - type: text
    content: 'But go rather to the '
  - type: note
    content: Is. 53:6; Jer. 50:6
  - type: text
    content: lost sheep of the house of Israel.
  - type: text
    content: ' '
  '7':
  - type: note
    content: Luke 9:2
  - type: text
    content: 'And as you go, preach, saying, '
  - type: note
    content: Matt. 3:2; Luke 10:9
  - type: text
    content: '‘The kingdom of heaven '
  - type: text
    content: is at hand.’
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Heal the sick, '
  - type: text
    content: 'cleanse the lepers, '
  - type: text
    content: raise the dead,
  - type: text
    content: ' cast out demons. '
  - type: note
    content: (Acts 8:18)
  - type: text
    content: Freely you have received, freely give.
  - type: text
    content: ' '
  '9':
  - type: note
    content: 1 Sam. 9:7; Mark 6:8
  - type: text
    content: 'Provide neither gold nor silver nor '
  - type: note
    content: Mark 6:8
  - type: text
    content: copper in your money belts,
  - type: text
    content: ' '
