    text: Neither did I turn back again till they were destroyed.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: I have wounded them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: So that they could not rise;
- type: usfm
  marker: q2
  children:
  - type: text
