- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 8; Ps. 89:27
    marker-yv: yv-n
  - type: text
    text: You have made me the head of the nations;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 52:15
    marker-yv: yv-n
  - type: text
    text: A people I have not known shall serve me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: As soon as they hear of me they obey me;
- type: usfm
  marker: q2
  children:
