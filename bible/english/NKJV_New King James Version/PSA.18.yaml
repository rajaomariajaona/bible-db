- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 22:50; Rom. 15:9
    marker-yv: yv-n
  - type: text
    text: 'Therefore I will give thanks to You, O '
  - type: usfm
