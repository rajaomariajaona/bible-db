document_id: PSA.18,114
type_code: eng
verses:
  '1':
  - type: heading
    content: God the Sovereign Savior
  - type: text
    content: 'To the Chief Musician. '
  - type: text
    content: A
  - type: text
    content: ' '
  - type: text
    content: Psalm
  - type: text
    content: ' of David '
  - type: note
    content: Ps. 36:title
  - type: text
    content: 'the servant of the '
  - type: heading
    content: Lord
  - type: text
    content: ', who spoke to the '
  - type: heading
    content: Lord
  - type: text
    content: ' the words of '
  - type: note
    content: 2 Sam. 22
  - type: text
    content: 'this song on the day that the '
  - type: heading
    content: Lord
  - type: text
    content: ' delivered him from the hand of all his enemies and from the hand of Saul. And he said:'
  - type: text
    content: 'I '
  - type: note
    content: Ps. 144:1
  - type: text
    content: 'will love You, O '
  - type: heading
    content: Lord
  - type: text
    content: ', my strength.'
  '10':
  - type: note
    content: Ps. 80:1; 99:1
  - type: text
    content: And He rode upon a cherub, and flew;
  - type: note
    content: (Ps. 104:3)
  - type: text
    content: He flew upon the wings of the wind.
  '11':
  - type: text
    content: He made darkness His secret place;
  - type: note
    content: Ps. 97:2
  - type: text
    content: 'His canopy around Him '
  - type: text
    content: was
  - type: text
    content: ' dark waters'
  - type: text
    content: And
  - type: text
    content: ' thick clouds of the skies.'
  '12':
  - type: note
    content: Ps. 97:3; 140:10; Hab. 3:11
  - type: text
    content: From the brightness before Him,
  - type: text
    content: His thick clouds passed with hailstones and coals of fire.
  '13':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' thundered from heaven,'
  - type: text
    content: 'And the Most High uttered '
  - type: note
    content: (Ps. 29:3–9; 104:7)
  - type: text
    content: His voice,
  - type: text
    content: Hailstones and coals of fire.
  '14':
  - type: note
    content: Josh. 10:10; Ps. 144:6; Is. 30:30; Hab. 3:11
  - type: text
    content: He sent out His arrows and scattered the foe,
  - type: text
    content: Lightnings in abundance, and He vanquished them.
  '15':
  - type: text
    content: Then the channels of the sea were seen,
  - type: text
    content: The foundations of the world were uncovered
  - type: text
    content: 'At Your rebuke, O '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: At the blast of the breath of Your nostrils.
  '16':
  - type: note
    content: Ps. 144:7
  - type: text
    content: He sent from above, He took me;
  - type: text
    content: He drew me out of many waters.
  '17':
  - type: text
    content: He delivered me from my strong enemy,
  - type: text
    content: From those who hated me,
  - type: text
    content: For they were too strong for me.
  '18':
  - type: text
    content: They confronted me in the day of my calamity,
  - type: text
    content: 'But the '
  - type: heading
    content: Lord
  - type: text
    content: ' was my support.'
  '19':
  - type: note
    content: Ps. 4:1; 31:8; 118:5
  - type: text
    content: He also brought me out into a broad place;
  - type: text
    content: He delivered me because He delighted in me.
  '2':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' is my rock and my fortress and my deliverer;'
  - type: text
    content: 'My God, my strength, '
  - type: note
    content: Heb. 2:13
  - type: text
    content: in whom I will trust;
  - type: text
    content: My shield and the horn of my salvation, my stronghold.
  '20':
  - type: note
    content: 1 Sam. 24:19; (Job 33:26); Ps. 7:8
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' rewarded me according to my righteousness;'
  - type: text
    content: According to the cleanness of my hands
  - type: text
    content: He has recompensed me.
  '21':
  - type: text
    content: 'For I have kept the ways of the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: And have not wickedly departed from my God.
  '22':
  - type: text
    content: 'For all His judgments '
  - type: text
    content: were
  - type: text
    content: ' before me,'
  - type: text
    content: And I did not put away His statutes from me.
  '23':
  - type: text
    content: I was also blameless before Him,
  - type: text
    content: And I kept myself from my iniquity.
  '24':
  - type: note
    content: 1 Sam. 26:23; Ps. 18:20
  - type: text
    content: 'Therefore the '
  - type: heading
    content: Lord
  - type: text
    content: ' has recompensed me according to my righteousness,'
  - type: text
    content: According to the cleanness of my hands in His sight.
  '25':
  - type: note
    content: (1 Kin. 8:32; Ps. 62:12); Matt. 5:7
  - type: text
    content: With the merciful You will show Yourself merciful;
  - type: text
    content: With a blameless man You will show Yourself blameless;
  '26':
  - type: text
    content: With the pure You will show Yourself pure;
  - type: text
    content: 'And '
  - type: note
    content: (Lev. 26:23–28); Prov. 3:34
  - type: text
    content: with the devious You will show Yourself shrewd.
  '27':
  - type: text
    content: For You will save the humble people,
  - type: text
    content: 'But will bring down '
  - type: note
    content: (Ps. 101:5); Prov. 6:17
  - type: text
    content: haughty looks.
  '28':
  - type: note
    content: 1 Kin. 15:4; Job 18:6; (Ps. 119:105)
  - type: text
    content: For You will light my lamp;
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' my God will enlighten my darkness.'
  '29':
  - type: text
    content: For by You I can run against a troop,
  - type: text
    content: By my God I can leap over a wall.
  '3':
  - type: text
    content: 'I will call upon the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ps. 76:4; Rev. 5:12
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: worthy
  - type: text
    content: ' to be praised;'
  - type: text
    content: So shall I be saved from my enemies.
  '30':
  - type: text
    content: As
  - type: text
    content: ' '
  - type: text
    content: for
  - type: text
    content: ' God, '
  - type: note
    content: (Deut. 32:4); Rev. 15:3
  - type: text
    content: 'His way '
  - type: text
    content: is
  - type: text
    content: ' perfect;'
  - type: note
    content: Ps. 12:6; 119:140; (Prov. 30:5)
  - type: text
    content: 'The word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' is proven;'
  - type: text
    content: 'He '
  - type: text
    content: is
  - type: text
    content: ' a shield '
  - type: note
    content: (Ps. 17:7)
  - type: text
    content: to all who trust in Him.
  '31':
  - type: note
    content: (Deut. 32:31, 39; 1 Sam. 2:2; Ps. 86:8–10; Is. 45:5)
  - type: text
    content: 'For who '
  - type: text
    content: is
  - type: text
    content: ' God, except the '
  - type: heading
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: 'And who '
  - type: text
    content: is
  - type: text
    content: ' a rock, except our God?'
  '32':
  - type: text
    content: It
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' God who '
  - type: note
    content: (Ps. 91:2)
  - type: text
    content: arms me with strength,
  - type: text
    content: And makes my way perfect.
  '33':
  - type: note
    content: 2 Sam. 2:18; Hab. 3:19
  - type: text
    content: 'He makes my feet like the '
  - type: text
    content: feet
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' deer,'
  - type: text
    content: 'And '
  - type: note
    content: Deut. 32:13; 33:29
  - type: text
    content: sets me on my high places.
  '34':
  - type: note
    content: Ps. 144:1
  - type: text
    content: He teaches my hands to make war,
  - type: text
    content: So that my arms can bend a bow of bronze.
  '35':
  - type: text
    content: You have also given me the shield of Your salvation;
  - type: text
    content: Your right hand has held me up,
  - type: text
    content: Your gentleness has made me great.
  '36':
  - type: text
    content: You enlarged my path under me,
  - type: note
    content: Ps. 66:9; Prov. 4:12
  - type: text
    content: So my feet did not slip.
  '37':
  - type: text
    content: I have pursued my enemies and overtaken them;
  - type: text
    content: Neither did I turn back again till they were destroyed.
  '38':
  - type: text
    content: I have wounded them,
  - type: text
    content: So that they could not rise;
  - type: text
    content: They have fallen under my feet.
  '39':
  - type: text
    content: For You have armed me with strength for the battle;
  - type: text
    content: You have subdued under me those who rose up against me.
  '4':
  - type: note
    content: Ps. 116:3
  - type: text
    content: The pangs of death surrounded me,
  - type: text
    content: And the floods of ungodliness made me afraid.
  '40':
  - type: text
    content: You have also given me the necks of my enemies,
  - type: text
    content: So that I destroyed those who hated me.
  '41':
  - type: text
    content: 'They cried out, but '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' none to save;'
  - type: note
    content: Job 27:9; Prov. 1:28; Is. 1:15; Ezek. 8:18; Zech. 7:13
  - type: text
    content: Even
  - type: text
    content: ' to the '
  - type: heading
    content: Lord
  - type: text
    content: ', but He did not answer them.'
  '42':
  - type: text
    content: Then I beat them as fine as the dust before the wind;
  - type: text
    content: 'I '
  - type: note
    content: Zech. 10:5
  - type: text
    content: cast them out like dirt in the streets.
  '43':
  - type: text
    content: You have delivered me from the strivings of the people;
  - type: note
    content: 2 Sam. 8; Ps. 89:27
  - type: text
    content: You have made me the head of the nations;
  - type: note
    content: Is. 52:15
  - type: text
    content: A people I have not known shall serve me.
  '44':
  - type: text
    content: As soon as they hear of me they obey me;
  - type: text
    content: The foreigners submit to me.
  '45':
  - type: note
    content: Mic. 7:17
  - type: text
    content: The foreigners fade away,
  - type: text
    content: And come frightened from their hideouts.
  '46':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' lives!'
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' my Rock!'
  - type: text
    content: Let the God of my salvation be exalted.
  '47':
  - type: text
    content: It
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' God who avenges me,'
  - type: note
    content: Ps. 47:3
  - type: text
    content: And subdues the peoples under me;
  '48':
  - type: text
    content: He delivers me from my enemies.
  - type: note
    content: Ps. 27:6; 59:1
  - type: text
    content: You also lift me up above those who rise against me;
  - type: text
    content: You have delivered me from the violent man.
  '49':
  - type: note
    content: 2 Sam. 22:50; Rom. 15:9
  - type: text
    content: 'Therefore I will give thanks to You, O '
  - type: heading
    content: Lord
  - type: text
    content: ', among the Gentiles,'
  - type: text
    content: And sing praises to Your name.
  '5':
  - type: text
    content: The sorrows of Sheol surrounded me;
  - type: text
    content: The snares of death confronted me.
  '50':
  - type: note
    content: 2 Sam. 7:12; Ps. 21:1; 144:10
  - type: text
    content: Great deliverance He gives to His king,
  - type: text
    content: And shows mercy to His anointed,
  - type: text
    content: To David and his descendants forevermore.
  '6':
  - type: text
    content: 'In my distress I called upon the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: And cried out to my God;
  - type: text
    content: He heard my voice from His temple,
  - type: text
    content: 'And my cry came before Him, '
  - type: text
    content: even
  - type: text
    content: ' to His ears.'
  '7':
  - type: note
    content: Acts 4:31
  - type: text
    content: Then the earth shook and trembled;
  - type: text
    content: The foundations of the hills also quaked and were shaken,
  - type: text
    content: Because He was angry.
  '8':
  - type: text
    content: Smoke went up from His nostrils,
  - type: text
    content: And devouring fire from His mouth;
  - type: text
    content: Coals were kindled by it.
  '9':
  - type: note
    content: Ps. 144:5
  - type: text
    content: He bowed the heavens also, and came down
  - type: text
    content: With darkness under His feet.
