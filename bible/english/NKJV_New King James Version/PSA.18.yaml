  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 47:3
    marker-yv: yv-n
  - type: text
    text: And subdues the peoples under me;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: He delivers me from my enemies.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 27:6; 59:1
    marker-yv: yv-n
  - type: text
    text: You also lift me up above those who rise against me;
- type: usfm
  marker: q2
  children:
  - type: text
