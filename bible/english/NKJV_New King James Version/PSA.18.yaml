  children:
  - type: text
    text: God the Sovereign Savior
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the Chief Musician. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: A
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Psalm
  - type: text
    text: ' of David '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 36:title
    marker-yv: yv-n
  - type: text
    text: 'the servant of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who spoke to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' the words of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 22
    marker-yv: yv-n
  - type: text
    text: 'this song on the day that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' delivered him from the hand of all his enemies and from the hand of Saul. And he said:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 144:1
    marker-yv: yv-n
  - type: text
    text: 'will love You, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', my strength.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is my rock and my fortress and my deliverer;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'My God, my strength, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. 2:13
    marker-yv: yv-n
  - type: text
    text: in whom I will trust;
- type: usfm
  marker: q2
  children:
  - type: text
    text: My shield and the horn of my salvation, my stronghold.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I will call upon the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 76:4; Rev. 5:12
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: worthy
  - type: text
    text: ' to be praised;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: So shall I be saved from my enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 116:3
    marker-yv: yv-n
  - type: text
    text: The pangs of death surrounded me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the floods of ungodliness made me afraid.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The sorrows of Sheol surrounded me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The snares of death confronted me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'In my distress I called upon the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: And cried out to my God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He heard my voice from His temple,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And my cry came before Him, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: even
  - type: text
    text: ' to His ears.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 4:31
    marker-yv: yv-n
  - type: text
    text: Then the earth shook and trembled;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The foundations of the hills also quaked and were shaken,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because He was angry.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Smoke went up from His nostrils,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And devouring fire from His mouth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Coals were kindled by it.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 144:5
    marker-yv: yv-n
  - type: text
    text: He bowed the heavens also, and came down
- type: usfm
  marker: q2
  children:
  - type: text
    text: With darkness under His feet.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 80:1; 99:1
    marker-yv: yv-n
  - type: text
    text: And He rode upon a cherub, and flew;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 104:3)
    marker-yv: yv-n
  - type: text
    text: He flew upon the wings of the wind.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He made darkness His secret place;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 97:2
    marker-yv: yv-n
  - type: text
    text: 'His canopy around Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' dark waters'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: And
  - type: text
    text: ' thick clouds of the skies.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 97:3; 140:10; Hab. 3:11
    marker-yv: yv-n
  - type: text
    text: From the brightness before Him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: His thick clouds passed with hailstones and coals of fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' thundered from heaven,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the Most High uttered '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 29:3–9; 104:7)
    marker-yv: yv-n
  - type: text
    text: His voice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hailstones and coals of fire.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 10:10; Ps. 144:6; Is. 30:30; Hab. 3:11
    marker-yv: yv-n
  - type: text
    text: He sent out His arrows and scattered the foe,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Lightnings in abundance, and He vanquished them.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then the channels of the sea were seen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The foundations of the world were uncovered
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'At Your rebuke, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: At the blast of the breath of Your nostrils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 144:7
    marker-yv: yv-n
  - type: text
    text: He sent from above, He took me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He drew me out of many waters.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He delivered me from my strong enemy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: From those who hated me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: For they were too strong for me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They confronted me in the day of my calamity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was my support.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 4:1; 31:8; 118:5
    marker-yv: yv-n
  - type: text
    text: He also brought me out into a broad place;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He delivered me because He delighted in me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 24:19; (Job 33:26); Ps. 7:8
    marker-yv: yv-n
  - type: text
    text: 'The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rewarded me according to my righteousness;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: According to the cleanness of my hands
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has recompensed me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For I have kept the ways of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: And have not wickedly departed from my God.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For all His judgments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' before me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I did not put away His statutes from me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I was also blameless before Him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I kept myself from my iniquity.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 26:23; Ps. 18:20
    marker-yv: yv-n
  - type: text
    text: 'Therefore the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has recompensed me according to my righteousness,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: According to the cleanness of my hands in His sight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Kin. 8:32; Ps. 62:12); Matt. 5:7
    marker-yv: yv-n
  - type: text
    text: With the merciful You will show Yourself merciful;
- type: usfm
  marker: q2
  children:
  - type: text
    text: With a blameless man You will show Yourself blameless;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: With the pure You will show Yourself pure;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Lev. 26:23–28); Prov. 3:34
    marker-yv: yv-n
  - type: text
    text: with the devious You will show Yourself shrewd.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: For You will save the humble people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But will bring down '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 101:5); Prov. 6:17
    marker-yv: yv-n
  - type: text
    text: haughty looks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 15:4; Job 18:6; (Ps. 119:105)
    marker-yv: yv-n
  - type: text
    text: For You will light my lamp;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God will enlighten my darkness.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: For by You I can run against a troop,
- type: usfm
  marker: q2
  children:
  - type: text
    text: By my God I can leap over a wall.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: it
    children:
    - type: text
      text: As
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for
  - type: text
    text: ' God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 32:4); Rev. 15:3
    marker-yv: yv-n
  - type: text
    text: 'His way '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' perfect;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 12:6; 119:140; (Prov. 30:5)
    marker-yv: yv-n
  - type: text
    text: 'The word of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is proven;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a shield '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 17:7)
    marker-yv: yv-n
  - type: text
    text: to all who trust in Him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 32:31, 39; 1 Sam. 2:2; Ps. 86:8–10; Is. 45:5)
    marker-yv: yv-n
  - type: text
    text: 'For who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' God, except the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a rock, except our God?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: it
    children:
    - type: text
      text: It
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' God who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 91:2)
    marker-yv: yv-n
  - type: text
    text: arms me with strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And makes my way perfect.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 2:18; Hab. 3:19
    marker-yv: yv-n
  - type: text
    text: 'He makes my feet like the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: feet
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' deer,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 32:13; 33:29
    marker-yv: yv-n
  - type: text
    text: sets me on my high places.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 144:1
    marker-yv: yv-n
  - type: text
    text: He teaches my hands to make war,
- type: usfm
  marker: q2
  children:
  - type: text
    text: So that my arms can bend a bow of bronze.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: You have also given me the shield of Your salvation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your right hand has held me up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your gentleness has made me great.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: You enlarged my path under me,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 66:9; Prov. 4:12
    marker-yv: yv-n
  - type: text
    text: So my feet did not slip.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: I have pursued my enemies and overtaken them;
- type: usfm
  marker: q2
  children:
