    - type: text
      text: The Levite’s Concubine
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in those days, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 17:6; 18:1; 21:25
      marker-yv: yv-n
    - type: text
      text: 'when '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' no king in Israel, that there was a certain Levite staying in the remote mountains of Ephraim. He took for himself a concubine from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 17:7; Ruth 1:1
      marker-yv: yv-n
    - type: text
      text: 'Bethlehem in Judah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, the man was not willing to spend that night; so he rose and departed, and came opposite '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:28; 1 Chr. 11:4, 5
      marker-yv: yv-n
    - type: text
      text: 'Jebus (that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is,
    - type: text
      text: ' Jerusalem). With him were the two saddled donkeys; his concubine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' also with him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' near Jebus, and the day was far spent; and the servant said to his master, “Come, please, and let us turn aside into this city '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:8, 63; Judg. 1:21; 2 Sam. 5:6
      marker-yv: yv-n
    - type: text
      text: of the Jebusites and lodge in it.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But his master said to him, “We will not turn aside here into a city of foreigners, who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' not of the children of Israel; we will go on '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:28
      marker-yv: yv-n
    - type: text
      text: 'to Gibeah.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he said to his servant, “Come, let us draw near to one of these places, and spend the night in Gibeah or in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:25
      marker-yv: yv-n
    - type: text
      text: 'Ramah.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they passed by and went their way; and the sun went down on them near Gibeah, which belongs to Benjamin. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They turned aside there to go in to lodge in Gibeah. And when he went in, he sat down in the open square of the city, for no one would '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 25:43
      marker-yv: yv-n
    - type: text
      text: 'take them into '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' house to spend the night.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just then an old man came in from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 104:23
      marker-yv: yv-n
    - type: text
      text: 'his work in the field at evening, who also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' from the mountains of Ephraim; he was staying in Gibeah, whereas the men of the place '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' Benjamites. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when he raised his eyes, he saw the traveler in the open square of the city; and the old man said, “Where are you going, and where do you come from?”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he said to him, “We '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' passing from Bethlehem in Judah toward the remote mountains of Ephraim; I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' from there. I went to Bethlehem in Judah; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: now
    - type: text
      text: ' I am going to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:1; Judg. 18:31; 20:18; 1 Sam. 1:3, 7
      marker-yv: yv-n
    - type: text
      text: 'the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. But there '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no one who will take me into his house, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'although we have both straw and fodder for our donkeys, and bread and wine for myself, for your female servant, and for the young man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' with your servant; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no lack of anything.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But his concubine played the harlot against him, and went away from him to her father’s house at Bethlehem in Judah, and was there four whole months. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the old man said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 43:23; Judg. 6:23; 1 Sam. 25:6
      marker-yv: yv-n
    - type: text
      text: '“Peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' with you! However, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: let
    - type: text
      text: ' all your needs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' my responsibility; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:2
      marker-yv: yv-n
    - type: text
      text: 'only do not spend the night in the open square.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 24:32; 43:24
      marker-yv: yv-n
    - type: text
      text: 'So he brought him into his house, and gave fodder to the donkeys. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 18:4; John 13:5
      marker-yv: yv-n
    - type: text
      text: And they washed their feet, and ate and drank.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gibeah’s Crime
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As they were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 16:25; 19:6, 9
      marker-yv: yv-n
    - type: text
      text: 'enjoying themselves, suddenly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:4, 5; Judg. 20:5; Hos. 9:9; 10:9
      marker-yv: yv-n
    - type: text
      text: 'certain men of the city, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 13:13; 1 Sam. 2:12; 1 Kin. 21:10; (2 Cor. 6:15)
      marker-yv: yv-n
    - type: text
      text: 'perverted men, surrounded the house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beat on the door. They spoke to the master of the house, the old man, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:5; (Rom. 1:26, 27)
      marker-yv: yv-n
    - type: text
      text: '“Bring out the man who came to your house, that we may know him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: carnally!
    - type: text
      text: ”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:6, 7
      marker-yv: yv-n
    - type: text
      text: 'the man, the master of the house, went out to them and said to them, “No, my brethren! I beg you, do not act '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so
    - type: text
      text: ' wickedly! Seeing this man has come into my house, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 34:7; Deut. 22:21; Judg. 20:6, 10; 2 Sam. 13:12
      marker-yv: yv-n
    - type: text
      text: 'do not commit this outrage. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:8
      marker-yv: yv-n
    - type: text
      text: 'Look, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: here
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my virgin daughter and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man’s
    - type: text
      text: ' concubine; let me bring them out now. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 34:2; Deut. 21:14
      marker-yv: yv-n
    - type: text
      text: 'Humble them, and do with them as you please; but to this man do not do such a vile thing!” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the men would not heed him. So the man took his concubine and brought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' out to them. And they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 4:1
      marker-yv: yv-n
    - type: text
      text: knew her and abused her all night until morning; and when the day began to break, they let her go.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the woman came as the day was dawning, and fell down at the door of the man’s house where her master '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was,
    - type: text
      text: ' till it was light.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When her master arose in the morning, and opened the doors of the house and went out to go his way, there was his concubine, fallen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at
    - type: text
      text: ' the door of the house with her hands on the threshold. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to her, “Get up and let us be going.” But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:5
      marker-yv: yv-n
    - type: text
      text: there was no answer. So the man lifted her onto the donkey; and the man got up and went to his place.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he entered his house he took a knife, laid hold of his concubine, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:6; 1 Sam. 11:7
      marker-yv: yv-n
    - type: text
      text: 'divided her into twelve pieces, limb by limb, and sent her throughout all the territory of Israel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then her husband arose and went after her, to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 34:3; 50:21
      marker-yv: yv-n
    - type: text
      text: 'speak kindly to her '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bring her back, having his servant and a couple of donkeys with him. So she brought him into her father’s house; and when the father of the young woman saw him, he was glad to meet him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so it was that all who saw it said, “No such deed has been done or seen from the day that the children of Israel came up from the land of Egypt until this day. Consider it, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 20:7; Prov. 13:10
      marker-yv: yv-n
    - type: text
      text: confer, and speak up!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now his father-in-law, the young woman’s father, detained him; and he stayed with him three days. So they ate and drank and lodged there.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then it came to pass on the fourth day that they arose early in the morning, and he stood to depart; but the young woman’s father said to his son-in-law, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 18:5; Judg. 19:8; Ps. 104:15
      marker-yv: yv-n
    - type: text
      text: “Refresh your heart with a morsel of bread, and afterward go your way.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they sat down, and the two of them ate and drank together. Then the young woman’s father said to the man, “Please be content to stay all night, and let your heart be merry.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the man stood to depart, his father-in-law urged him; so he lodged there again. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he arose early in the morning on the fifth day to depart, but the young woman’s father said, “Please refresh your heart.” So they delayed until afternoon; and both of them ate.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when the man stood to depart—he and his concubine and his servant—his father-in-law, the young woman’s father, said to him, “Look, the day is now drawing toward evening; please spend the night. See, the day is coming to an end; lodge here, that your heart may be merry. Tomorrow go your way early, so that you may get home.”
