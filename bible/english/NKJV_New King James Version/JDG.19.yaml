  - type: text
    content: 'the man, the master of the house, went out to them and said to them, “No, my brethren! I beg you, do not act '
  - type: text
    content: so
  - type: text
    content: ' wickedly! Seeing this man has come into my house, '
  - type: note
    content: Gen. 34:7; Deut. 22:21; Judg. 20:6, 10; 2 Sam. 13:12
  - type: text
    content: 'do not commit this outrage. '
  '24':
  - type: note
    content: Gen. 19:8
  - type: text
    content: 'Look, '
  - type: text
