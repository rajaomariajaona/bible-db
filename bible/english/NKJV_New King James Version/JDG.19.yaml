  '22':
  - type: text
    content: 'As they were '
  - type: note
    content: Judg. 16:25; 19:6, 9
  - type: text
    content: 'enjoying themselves, suddenly '
  - type: note
    content: Gen. 19:4, 5; Judg. 20:5; Hos. 9:9; 10:9
  - type: text
    content: 'certain men of the city, '
  - type: note
    content: Deut. 13:13; 1 Sam. 2:12; 1 Kin. 21:10; (2 Cor. 6:15)
  - type: text
    content: 'perverted men, surrounded the house '
  - type: text
    content: and
  - type: text
    content: ' beat on the door. They spoke to the master of the house, the old man, saying, '
  - type: note
    content: Gen. 19:5; (Rom. 1:26, 27)
  - type: text
    content: '“Bring out the man who came to your house, that we may know him '
  - type: text
