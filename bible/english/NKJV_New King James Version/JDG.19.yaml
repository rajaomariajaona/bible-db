  - type: note
    content: Gen. 34:2; Deut. 21:14
  - type: text
    content: 'Humble them, and do with them as you please; but to this man do not do such a vile thing!” '
  '25':
  - type: text
    content: 'But the men would not heed him. So the man took his concubine and brought '
  - type: text
    content: her
  - type: text
    content: ' out to them. And they '
  - type: note
    content: Gen. 4:1
  - type: text
    content: knew her and abused her all night until morning; and when the day began to break, they let her go.
  '26':
  - type: text
    content: 'Then the woman came as the day was dawning, and fell down at the door of the man’s house where her master '
  - type: text
    content: was,
  - type: text
    content: ' till it was light.'
  '27':
  - type: text
    content: 'When her master arose in the morning, and opened the doors of the house and went out to go his way, there was his concubine, fallen '
  - type: text
    content: at
  - type: text
    content: ' the door of the house with her hands on the threshold. '
  '28':
  - type: text
    content: 'And he said to her, “Get up and let us be going.” But '
  - type: note
    content: Judg. 20:5
  - type: text
    content: there was no answer. So the man lifted her onto the donkey; and the man got up and went to his place.
  '29':
  - type: text
    content: 'When he entered his house he took a knife, laid hold of his concubine, and '
  - type: note
    content: Judg. 20:6; 1 Sam. 11:7
  - type: text
    content: 'divided her into twelve pieces, limb by limb, and sent her throughout all the territory of Israel. '
  '3':
  - type: text
    content: 'Then her husband arose and went after her, to '
  - type: note
    content: Gen. 34:3; 50:21
  - type: text
    content: 'speak kindly to her '
  - type: text
    content: and
  - type: text
    content: ' bring her back, having his servant and a couple of donkeys with him. So she brought him into her father’s house; and when the father of the young woman saw him, he was glad to meet him. '
  '30':
  - type: text
    content: 'And so it was that all who saw it said, “No such deed has been done or seen from the day that the children of Israel came up from the land of Egypt until this day. Consider it, '
  - type: note
    content: Judg. 20:7; Prov. 13:10
  - type: text
    content: confer, and speak up!”
  '4':
  - type: text
    content: Now his father-in-law, the young woman’s father, detained him; and he stayed with him three days. So they ate and drank and lodged there.
  '5':
  - type: text
    content: 'Then it came to pass on the fourth day that they arose early in the morning, and he stood to depart; but the young woman’s father said to his son-in-law, '
  - type: note
    content: Gen. 18:5; Judg. 19:8; Ps. 104:15
  - type: text
    content: “Refresh your heart with a morsel of bread, and afterward go your way.”
  '6':
  - type: text
    content: 'So they sat down, and the two of them ate and drank together. Then the young woman’s father said to the man, “Please be content to stay all night, and let your heart be merry.” '
  '7':
  - type: text
    content: 'And when the man stood to depart, his father-in-law urged him; so he lodged there again. '
  '8':
  - type: text
    content: Then he arose early in the morning on the fifth day to depart, but the young woman’s father said, “Please refresh your heart.” So they delayed until afternoon; and both of them ate.
  '9':
  - type: text
    content: And when the man stood to depart—he and his concubine and his servant—his father-in-law, the young woman’s father, said to him, “Look, the day is now drawing toward evening; please spend the night. See, the day is coming to an end; lodge here, that your heart may be merry. Tomorrow go your way early, so that you may get home.”
