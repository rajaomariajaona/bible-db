- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: My people will dwell in a peaceful habitation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'In secure dwellings, and in quiet '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 11:10; 14:3; 30:15; (Hos. 2:18–23; Zech. 2:5; 3:10)
    marker-yv: yv-n
  - type: text
    text: resting places,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 30:30
    marker-yv: yv-n
  - type: text
    text: 'Though hail comes down '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Zech. 11:2
    marker-yv: yv-n
  - type: text
    text: on the forest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the city is brought low in humiliation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' you who sow beside all waters,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Who send out freely the feet of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Eccl. 11:1); Is. 30:23, 24
    marker-yv: yv-n
  - type: text
