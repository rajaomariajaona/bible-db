    marker: x
    children:
    - type: text
      text: Is. 29:24
    marker-yv: yv-n
  - type: text
    text: understand knowledge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the tongue of the stammerers will be ready to speak plainly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The foolish person will no longer be called generous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Nor the miser said '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' bountiful;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For the foolish person will speak foolishness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And his heart will work '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 24:7–9
    marker-yv: yv-n
  - type: text
    text: 'iniquity:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: To practice ungodliness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'To utter error against the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: To keep the hungry unsatisfied,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he will cause the drink of the thirsty to fail.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Also the schemes of the schemer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' evil;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He devises wicked plans
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'To destroy the poor with '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 5:26–28; Mic. 7:3
    marker-yv: yv-n
  - type: text
    text: lying words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even when the needy speaks justice.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But a generous man devises generous things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And by generosity he shall stand.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Consequences of Complacency
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rise up, you women '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 47:8; Amos 6:1; Zeph. 2:15
    marker-yv: yv-n
  - type: text
    text: who are at ease,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hear my voice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: You complacent daughters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give ear to my speech.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In a year and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' days'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You will be troubled, you complacent women;
- type: usfm
  marker: q2
  children:
  - type: text
    text: For the vintage will fail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The gathering will not come.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tremble, you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: women
  - type: text
    text: ' who are at ease;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Be troubled, you complacent ones;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Strip yourselves, make yourselves bare,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And gird '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sackcloth
  - type: text
    text: ' on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' waists.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: People shall mourn upon their breasts
- type: usfm
  marker: q2
  children:
  - type: text
    text: For the pleasant fields, for the fruitful vine.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 7:23–25; Hos. 9:6
    marker-yv: yv-n
  - type: text
    text: 'On the land of my people will come up thorns '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' briers,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yes, on all the happy homes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 22:2
    marker-yv: yv-n
  - type: text
    text: the joyous city;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 27:10
    marker-yv: yv-n
  - type: text
    text: Because the palaces will be forsaken,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The bustling city will be deserted.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The forts and towers will become lairs forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: A joy of wild donkeys, a pasture of flocks—
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Until '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 11:2); Ezek. 39:29; (Joel 2:28)
    marker-yv: yv-n
  - type: text
    text: the Spirit is poured upon us from on high,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 107:35; Is. 29:17
    marker-yv: yv-n
  - type: text
    text: the wilderness becomes a fruitful field,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the fruitful field is counted as a forest.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Peace of God’s Reign
