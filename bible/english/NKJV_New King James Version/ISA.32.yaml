  - type: text
    content: 'Tremble, you '
  - type: text
    content: women
  - type: text
    content: ' who are at ease;'
  - type: text
    content: Be troubled, you complacent ones;
  - type: text
    content: Strip yourselves, make yourselves bare,
  - type: text
    content: 'And gird '
  - type: text
