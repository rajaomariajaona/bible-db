  - type: text
    content: 'In a year and '
  - type: text
    content: some
  - type: text
    content: ' days'
  - type: text
    content: You will be troubled, you complacent women;
  - type: text
    content: For the vintage will fail,
  - type: text
    content: The gathering will not come.
