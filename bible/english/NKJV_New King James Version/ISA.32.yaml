- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Behold, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 45:1
    marker-yv: yv-n
  - type: text
    text: a king will reign in righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And princes will rule with justice.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A man will be as a hiding place from the wind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 4:6
    marker-yv: yv-n
  - type: text
    text: a cover from the tempest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: As rivers of water in a dry place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: As the shadow of a great rock in a weary land.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 29:18; 35:5
    marker-yv: yv-n
  - type: text
    text: The eyes of those who see will not be dim,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the ears of those who hear will listen.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Also the heart of the rash will '
