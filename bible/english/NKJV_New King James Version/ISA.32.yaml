  - type: text
    content: the joyous city;
  '14':
  - type: note
    content: Is. 27:10
  - type: text
    content: Because the palaces will be forsaken,
  - type: text
    content: The bustling city will be deserted.
  - type: text
    content: The forts and towers will become lairs forever,
  - type: text
    content: A joy of wild donkeys, a pasture of flocks—
  '15':
  - type: text
    content: 'Until '
  - type: note
    content: (Is. 11:2); Ezek. 39:29; (Joel 2:28)
  - type: text
    content: the Spirit is poured upon us from on high,
  - type: text
    content: 'And '
