    content: People shall mourn upon their breasts
  - type: text
    content: For the pleasant fields, for the fruitful vine.
  '13':
  - type: note
    content: Is. 7:23–25; Hos. 9:6
  - type: text
    content: 'On the land of my people will come up thorns '
  - type: text
