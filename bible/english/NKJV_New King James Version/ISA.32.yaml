  - type: text
    content: And the fruitful field is counted as a forest.
  - type: heading
    content: The Peace of God’s Reign
  '16':
  - type: text
    content: Then justice will dwell in the wilderness,
  - type: text
    content: And righteousness remain in the fruitful field.
  '17':
  - type: note
    content: Ps. 119:165; Is. 2:4; Rom. 14:17; James 3:18
  - type: text
    content: The work of righteousness will be peace,
  - type: text
    content: And the effect of righteousness, quietness and assurance forever.
  '18':
  - type: text
    content: My people will dwell in a peaceful habitation,
  - type: text
    content: 'In secure dwellings, and in quiet '
  - type: note
    content: Is. 11:10; 14:3; 30:15; (Hos. 2:18–23; Zech. 2:5; 3:10)
  - type: text
    content: resting places,
  '19':
  - type: note
    content: Is. 30:30
  - type: text
    content: 'Though hail comes down '
  - type: note
    content: Zech. 11:2
  - type: text
    content: on the forest,
  - type: text
    content: And the city is brought low in humiliation.
  '2':
  - type: text
    content: A man will be as a hiding place from the wind,
  - type: text
    content: 'And '
  - type: note
    content: Is. 4:6
  - type: text
    content: a cover from the tempest,
  - type: text
    content: As rivers of water in a dry place,
  - type: text
    content: As the shadow of a great rock in a weary land.
  '20':
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' you who sow beside all waters,'
  - type: text
    content: 'Who send out freely the feet of '
  - type: note
    content: (Eccl. 11:1); Is. 30:23, 24
  - type: text
    content: the ox and the donkey.
  '3':
  - type: note
    content: Is. 29:18; 35:5
  - type: text
    content: The eyes of those who see will not be dim,
  - type: text
    content: And the ears of those who hear will listen.
  '4':
  - type: text
    content: 'Also the heart of the rash will '
  - type: note
    content: Is. 29:24
  - type: text
    content: understand knowledge,
  - type: text
    content: And the tongue of the stammerers will be ready to speak plainly.
  '5':
  - type: text
    content: The foolish person will no longer be called generous,
  - type: text
    content: 'Nor the miser said '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' bountiful;'
  '6':
  - type: text
    content: For the foolish person will speak foolishness,
  - type: text
    content: 'And his heart will work '
  - type: note
    content: Prov. 24:7–9
  - type: text
    content: 'iniquity:'
  - type: text
    content: To practice ungodliness,
  - type: text
    content: 'To utter error against the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: To keep the hungry unsatisfied,
  - type: text
    content: And he will cause the drink of the thirsty to fail.
  '7':
  - type: text
    content: 'Also the schemes of the schemer '
  - type: text
    content: are
  - type: text
    content: ' evil;'
  - type: text
    content: He devises wicked plans
  - type: text
    content: 'To destroy the poor with '
  - type: note
    content: Jer. 5:26–28; Mic. 7:3
  - type: text
    content: lying words,
  - type: text
    content: Even when the needy speaks justice.
  '8':
  - type: text
    content: But a generous man devises generous things,
  - type: text
    content: And by generosity he shall stand.
  - type: heading
    content: Consequences of Complacency
  '9':
  - type: text
    content: 'Rise up, you women '
  - type: note
    content: Is. 47:8; Amos 6:1; Zeph. 2:15
  - type: text
    content: who are at ease,
  - type: text
    content: Hear my voice;
  - type: text
    content: You complacent daughters,
  - type: text
    content: Give ear to my speech.
