document_id: TIT.3,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Graces of the Heirs of Grace
  - type: text
    content: 'Remind them '
  - type: note
    content: (Rom. 13:1); 1 Pet. 2:13
  - type: text
    content: 'to be subject to rulers and authorities, to obey, '
  - type: note
    content: Col. 1:10
  - type: text
    content: 'to be ready for every good work, '
  '10':
  - type: note
    content: Matt. 18:17
  - type: text
    content: 'Reject a divisive man after the first and second admonition, '
  '11':
  - type: text
    content: knowing that such a person is warped and sinning, being self-condemned.
  - type: heading
    content: Final Messages
  '12':
  - type: text
    content: 'When I send Artemas to you, or '
  - type: note
    content: Acts 20:4; Eph. 6:21; Col. 4:7; 2 Tim. 4:12
  - type: text
    content: 'Tychicus, be diligent to come to me at Nicopolis, for I have decided to spend the winter there. '
  '13':
  - type: text
    content: 'Send Zenas the lawyer and '
  - type: note
    content: Acts 18:24; 1 Cor. 16:12
  - type: text
    content: 'Apollos on their journey with haste, that they may lack nothing. '
  '14':
  - type: text
    content: 'And let our '
  - type: text
    content: people
  - type: text
    content: ' also learn to maintain good works, to '
  - type: text
    content: meet
  - type: text
    content: ' urgent needs, that they may not be unfruitful.'
  - type: heading
    content: Farewell
  '15':
  - type: text
    content: 'All who '
  - type: text
    content: are
  - type: text
    content: ' with me greet you. Greet those who love us in the faith.'
  - type: text
    content: 'Grace '
  - type: text
    content: be
  - type: text
    content: ' with you all. Amen.'
  '2':
  - type: text
    content: 'to speak evil of no one, to be peaceable, gentle, showing all humility to all men. '
  '3':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 6:11; 1 Pet. 4:3
  - type: text
    content: 'we ourselves were also once foolish, disobedient, deceived, serving various lusts and pleasures, living in malice and envy, hateful and hating one another. '
  '4':
  - type: text
    content: 'But when '
  - type: note
    content: Titus 2:11
  - type: text
    content: 'the kindness and the love of '
  - type: note
    content: 1 Tim. 2:3
  - type: text
    content: 'God our Savior toward man appeared, '
  '5':
  - type: note
    content: (Rom. 3:20); Eph. 2:4–9
  - type: text
    content: 'not by works of righteousness which we have done, but according to His mercy He saved us, through '
  - type: note
    content: John 3:3
  - type: text
    content: 'the washing of regeneration and renewing of the Holy Spirit, '
  '6':
  - type: note
    content: Ezek. 36:26
  - type: text
    content: 'whom He poured out on us abundantly through Jesus Christ our Savior, '
  '7':
  - type: text
    content: 'that having been justified by His grace '
  - type: note
    content: (Matt. 25:34); Mark 10:17; (Rom. 8:17, 23, 24; Titus 1:2)
  - type: text
    content: we should become heirs according to the hope of eternal life.
  '8':
  - type: note
    content: 1 Tim. 1:15
  - type: text
    content: This is a faithful saying, and these things I want you to affirm constantly, that those who have believed in God should be careful to maintain good works. These things are good and profitable to men.
  - type: heading
    content: Avoid Dissension
  '9':
  - type: text
    content: 'But '
  - type: note
    content: 1 Tim. 1:4; 2 Tim. 2:23
  - type: text
    content: 'avoid foolish disputes, genealogies, contentions, and strivings about the law; for they are unprofitable and useless. '
