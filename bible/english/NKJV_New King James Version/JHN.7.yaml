document_id: JHN.7,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus’ Brothers Disbelieve
  - type: text
    content: 'After these things Jesus walked in Galilee; for He did not want to walk in Judea, '
  - type: note
    content: Matt. 21:38; 26:4; John 5:18; 7:19, 25; 8:37, 40
  - type: text
    content: 'because the Jews sought to kill Him. '
  '10':
  - type: text
    content: 'But when His brothers had gone up, then He also went up to the feast, not openly, but as it were in secret. '
  '11':
  - type: text
    content: 'Then '
  - type: note
    content: John 11:56
  - type: text
    content: 'the Jews sought Him at the feast, and said, “Where is He?” '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: John 9:16; 10:19
  - type: text
    content: 'there was much complaining among the people concerning Him. '
  - type: note
    content: Matt. 21:46; Luke 7:16; John 6:14; 7:40
  - type: text
    content: 'Some said, “He is good”; others said, “No, on the contrary, He deceives the people.” '
  '13':
  - type: text
    content: 'However, no one spoke openly of Him '
  - type: note
    content: (John 9:22; 12:42; 19:38)
  - type: text
    content: for fear of the Jews.
  '14':
  - type: text
    content: 'Now about the middle of the feast Jesus went up into the temple and '
  - type: note
    content: Ps. 22:22; Matt. 4:23; 5:2; 7:29; Mark 6:34; Luke 4:15; 5:3; John 8:2
  - type: text
    content: 'taught. '
  '15':
  - type: note
    content: Matt. 13:54; Mark 6:2; (Luke 4:22); Acts 2:7
  - type: text
    content: And the Jews marveled, saying, “How does this Man know letters, having never studied?”
  '16':
  - type: text
    content: 'Jesus answered them and said, '
  - type: note
    content: Deut. 18:15, 18, 19; John 3:11
  - type: text
    content: “My doctrine is not Mine, but His who sent Me.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Ps. 25:9, 14; Prov. 3:32; Dan. 12:10; John 3:21; 8:43
  - type: text
    content: 'If anyone wills to do His will, he shall know concerning the doctrine, whether it is from God or '
  - type: text
    content: whether
  - type: text
    content: ' I speak on My own '
  - type: text
    content: authority.
  - type: text
    content: ' '
  '18':
  - type: note
    content: John 5:41
  - type: text
    content: 'He who speaks from himself seeks his own glory; but He who '
  - type: note
    content: John 8:50
  - type: text
    content: 'seeks the glory of the One who sent Him is true, and '
  - type: note
    content: John 8:46; (2 Cor. 5:21; Heb. 4:15; 7:26; 1 Pet. 1:19; 2:22)
  - type: text
    content: no unrighteousness is in Him.
  - type: text
    content: ' '
  '19':
  - type: note
    content: Ex. 24:3; Deut. 33:4; Acts 7:38
  - type: text
    content: 'Did not Moses give you the law, yet none of you keeps the law? '
  - type: note
    content: Matt. 12:14
  - type: text
    content: Why do you seek to kill Me?”
  '2':
  - type: note
    content: Lev. 23:34; Deut. 16:13–15; Neh. 8:14, 18; Zech. 14:16–19
  - type: text
    content: 'Now the Jews’ Feast of Tabernacles was at hand. '
  '20':
  - type: text
    content: 'The people answered and said, '
  - type: note
    content: John 8:48, 52
  - type: text
    content: “You have a demon. Who is seeking to kill You?”
  '21':
  - type: text
    content: 'Jesus answered and said to them, '
  - type: text
    content: “I did one work, and you all marvel.
  - type: text
    content: ' '
  '22':
  - type: note
    content: Lev. 12:3
  - type: text
    content: 'Moses therefore gave you circumcision (not that it is from Moses, '
  - type: note
    content: Gen. 17:9–14; Acts 7:8
  - type: text
    content: but from the fathers), and you circumcise a man on the Sabbath.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'If a man receives circumcision on the Sabbath, so that the law of Moses should not be broken, are you angry with Me because '
  - type: note
    content: John 5:8, 9, 16
  - type: text
    content: I made a man completely well on the Sabbath?
  - type: text
    content: ' '
  '24':
  - type: note
    content: Deut. 1:16; Prov. 24:23; John 8:15; James 2:1
  - type: text
    content: Do not judge according to appearance, but judge with righteous judgment.”
  - type: heading
    content: Could This Be the Christ?
  '25':
  - type: text
    content: 'Now some of them from Jerusalem said, “Is this not He whom they seek to '
  - type: note
    content: Matt. 21:38; 26:4; Luke 22:2; John 5:18; 8:37, 40
  - type: text
    content: 'kill? '
  '26':
  - type: text
    content: 'But look! He speaks boldly, and they say nothing to Him. '
  - type: note
    content: John 7:48
  - type: text
    content: 'Do the rulers know indeed that this is truly the Christ? '
  '27':
  - type: note
    content: Matt. 13:55; Mark 6:3; Luke 4:22
  - type: text
    content: However, we know where this Man is from; but when the Christ comes, no one knows where He is from.”
  '28':
  - type: text
    content: 'Then Jesus cried out, as He taught in the temple, saying, '
  - type: note
    content: John 8:14
  - type: text
    content: '“You both know Me, and you know where I am from; and '
  - type: note
    content: John 5:43
  - type: text
    content: 'I have not come of Myself, but He who sent Me '
  - type: note
    content: Rom. 3:4
  - type: text
    content: 'is true, '
  - type: note
    content: John 1:18; 8:55
  - type: text
    content: whom you do not know.
  - type: text
    content: ' '
  '29':
  - type: text
    content: But
  - type: text
    content: ' '
  - type: note
    content: Matt. 11:27; John 8:55; 17:25
  - type: text
    content: I know Him, for I am from Him, and He sent Me.”
  '3':
  - type: note
    content: Matt. 12:46; Mark 3:21; John 7:5, 10; Acts 1:14
  - type: text
    content: 'His brothers therefore said to Him, “Depart from here and go into Judea, that Your disciples also may see the works that You are doing. '
  '30':
  - type: text
    content: 'Therefore '
  - type: note
    content: Mark 11:18
  - type: text
    content: 'they sought to take Him; but '
  - type: note
    content: Matt. 21:46; John 7:32, 44; 8:20; 10:39
  - type: text
    content: 'no one laid a hand on Him, because His hour had not yet come. '
  '31':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 12:23
  - type: text
    content: 'many of the people believed in Him, and said, “When the Christ comes, will He do more signs than these which this '
  - type: text
    content: Man
  - type: text
    content: ' has done?”'
  - type: heading
    content: Jesus and the Religious Leaders
  '32':
  - type: text
    content: 'The Pharisees heard the crowd murmuring these things concerning Him, and the Pharisees and the chief priests sent officers to take Him. '
  '33':
  - type: text
    content: 'Then Jesus said to them, '
  - type: note
    content: John 13:33
  - type: text
    content: '“I shall be with you a little while longer, and '
  - type: text
    content: then
  - type: text
    content: ' I '
  - type: note
    content: (Mark 16:19; Luke 24:51; Acts 1:9; Heb. 9:24; 1 Pet. 3:22)
  - type: text
    content: go to Him who sent Me.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'You '
  - type: note
    content: Hos. 5:6
  - type: text
    content: 'will seek Me and not find '
  - type: text
    content: Me,
  - type: text
    content: ' and where I am you '
  - type: note
    content: (Matt. 5:20; 1 Cor. 6:9; 15:50; Rev. 21:27)
  - type: text
    content: cannot come.”
  '35':
  - type: text
    content: 'Then the Jews said among themselves, “Where does He intend to go that we shall not find Him? Does He intend to go to '
  - type: note
    content: Ps. 147:2; (Is. 11:12; 56:8; Zeph. 3:10); James 1:1; 1 Pet. 1:1
  - type: text
    content: 'the Dispersion among the Greeks and teach the Greeks? '
  '36':
  - type: text
    content: 'What is this thing that He said, '
  - type: text
    content: ‘You will seek Me and not find Me, and where I am you cannot come’
  - type: text
    content: ?”
  - type: heading
    content: The Promise of the Holy Spirit
  '37':
  - type: note
    content: Lev. 23:36; Num. 29:35; Neh. 8:18
  - type: text
    content: 'On the last day, that great '
  - type: text
    content: day
  - type: text
    content: ' of the feast, Jesus stood and cried out, saying, '
  - type: note
    content: (Is. 55:1)
  - type: text
    content: “If anyone thirsts, let him come to Me and drink.
  - type: text
    content: ' '
  '38':
  - type: note
    content: Deut. 18:15
  - type: text
    content: 'He who believes in Me, as the Scripture has said, '
  - type: note
    content: Is. 12:3; 43:20; 44:3; 55:1; (John 6:35); Rev. 21:6; 22:17
  - type: text
    content: out of his heart will flow rivers of living water.”
  - type: text
    content: ' '
  '39':
  - type: note
    content: Is. 44:3; (Joel 2:28); John 1:33
  - type: text
    content: 'But this He spoke concerning the Spirit, whom those believing in Him would receive; for the Holy Spirit was not yet '
  - type: text
    content: given,
  - type: text
    content: ' because Jesus was not yet '
  - type: note
    content: John 12:16; 13:31; 17:5
  - type: text
    content: glorified.
  - type: heading
    content: Who Is He?
  '4':
  - type: text
    content: 'For no one does anything in secret while he himself seeks to be known openly. If You do these things, show Yourself to the world.” '
  '40':
  - type: text
    content: 'Therefore many from the crowd, when they heard this saying, said, “Truly this is '
  - type: note
    content: Deut. 18:15, 18
  - type: text
    content: 'the Prophet.” '
  '41':
  - type: text
    content: 'Others said, “This is '
  - type: note
    content: John 4:42; 6:69
  - type: text
    content: the Christ.”
  - type: text
    content: 'But some said, “Will the Christ come out of Galilee? '
  '42':
  - type: note
    content: Ps. 132:11; Jer. 23:5; Mic. 5:2; Matt. 2:5; (Luke 2:4)
  - type: text
    content: 'Has not the Scripture said that the Christ comes from the seed of David and from the town of Bethlehem, '
  - type: note
    content: 1 Sam. 16:1, 4
  - type: text
    content: 'where David was?” '
  '43':
  - type: text
    content: 'So '
  - type: note
    content: John 7:12
  - type: text
    content: 'there was a division among the people because of Him. '
  '44':
  - type: text
    content: 'Now '
  - type: note
    content: John 7:30
  - type: text
    content: some of them wanted to take Him, but no one laid hands on Him.
  - type: heading
    content: Rejected by the Authorities
  '45':
  - type: text
    content: Then the officers came to the chief priests and Pharisees, who said to them, “Why have you not brought Him?”
  '46':
  - type: text
    content: 'The officers answered, '
  - type: note
    content: Matt. 13:54, 56; Luke 4:22
  - type: text
    content: “No man ever spoke like this Man!”
  '47':
  - type: text
    content: 'Then the Pharisees answered them, “Are you also deceived? '
  '48':
  - type: text
    content: 'Have any of the rulers or the Pharisees believed in Him? '
  '49':
  - type: text
    content: But this crowd that does not know the law is accursed.”
  '5':
  - type: text
    content: 'For '
  - type: note
    content: Ps. 69:8; Mic. 7:6
  - type: text
    content: 'even His '
  - type: note
    content: Matt. 12:46; 13:55; Mark 3:21; John 7:3, 10
  - type: text
    content: brothers did not believe in Him.
  '50':
  - type: text
    content: 'Nicodemus '
  - type: note
    content: John 3:1, 2; 19:39
  - type: text
    content: '(he who came to Jesus by night, being one of them) said to them, '
  '51':
  - type: note
    content: Deut. 1:16, 17; 19:15
  - type: text
    content: “Does our law judge a man before it hears him and knows what he is doing?”
  '52':
  - type: text
    content: 'They answered and said to him, “Are you also from Galilee? Search and look, for '
  - type: note
    content: (Is. 9:1, 2); Matt. 4:15
  - type: text
    content: no prophet has arisen out of Galilee.”
  - type: heading
    content: An Adulteress Faces the Light of the World
  '53':
  - type: text
    content: 'And everyone went to his '
  - type: text
    content: own
  - type: text
    content: ' house.'
  '6':
  - type: text
    content: 'Then Jesus said to them, '
  - type: note
    content: John 2:4; 8:20
  - type: text
    content: “My time has not yet come, but your time is always ready.
  - type: text
    content: ' '
  '7':
  - type: note
    content: (John 15:19)
  - type: text
    content: 'The world cannot hate you, but it hates Me '
  - type: note
    content: John 3:19
  - type: text
    content: because I testify of it that its works are evil.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'You go up to this feast. I am not '
  - type: text
    content: yet
  - type: text
    content: ' going up to this feast, '
  - type: note
    content: John 8:20
  - type: text
    content: for My time has not yet fully come.”
  - type: text
    content: ' '
  '9':
  - type: text
    content: When He had said these things to them, He remained in Galilee.
  - type: heading
    content: The Heavenly Scholar
