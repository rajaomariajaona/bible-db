document_id: ECC.3,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Everything Has Its Time
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To everything '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a season,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 3:17; 8:6
      marker-yv: yv-n
    - type: text
      text: 'time for every purpose under heaven:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 1:13
      marker-yv: yv-n
    - type: text
      text: 'I have seen the God-given task with which the sons of men are to be occupied. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He has made everything beautiful in its time. Also He has put eternity in their hearts, except that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:9; Eccl. 7:23; 8:17; Rom. 11:33
      marker-yv: yv-n
    - type: text
      text: no one can find out the work that God does from beginning to end.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I know that nothing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 2:3, 24
      marker-yv: yv-n
    - type: text
      text: 'better for them than to rejoice, and to do good in their lives, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and also that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 2:24
      marker-yv: yv-n
    - type: text
      text: 'every man should eat and drink and enjoy the good of all his labor—it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the gift of God.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know that whatever God does,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It shall be forever.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: James 1:17
      marker-yv: yv-n
    - type: text
      text: Nothing can be added to it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And nothing taken from it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'God does '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' that men should fear before Him.'
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 1:9
      marker-yv: yv-n
    - type: text
      text: That which is has already been,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And what is to be has already been;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And God requires an account of what is past.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Injustice Seems to Prevail
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 5:8
      marker-yv: yv-n
    - type: text
      text: 'I saw under the sun:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: In
    - type: text
      text: ' the place of judgment,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' there;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' the place of righteousness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Iniquity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' there.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I said in my heart,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 18:25; Ps. 96:13; Eccl. 11:9; (Matt. 16:27; Rom. 2:6–10; 2 Cor. 5:10; 2 Thess. 1:6–9)
      marker-yv: yv-n
    - type: text
      text: “God shall judge the righteous and the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a time there for every purpose and for every work.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I said in my heart, “Concerning the condition of the sons of men, God tests them, that they may see that they themselves are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' animals.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 49:12, 20; 73:22; (Eccl. 2:16)
      marker-yv: yv-n
    - type: text
      text: 'For what happens to the sons of men also happens to animals; one thing befalls them: as one dies, so dies the other. Surely, they all have one breath; man has no advantage over animals, for all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A time to be born,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 14:5; Heb. 9:27
      marker-yv: yv-n
    - type: text
      text: a time to die;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to plant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And a time to pluck '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' planted;'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All go to one place: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 3:19; Ps. 103:14
      marker-yv: yv-n
    - type: text
      text: 'all are from the dust, and all return to dust. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 12:7
      marker-yv: yv-n
    - type: text
      text: 'Who knows the spirit of the sons of men, which goes upward, and the spirit of the animal, which goes down to the earth? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 2:24; 5:18
      marker-yv: yv-n
    - type: text
      text: 'So I perceived that nothing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' better than that a man should rejoice in his own works, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 2:10
      marker-yv: yv-n
    - type: text
      text: 'that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' his heritage. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 6:12; 8:7
      marker-yv: yv-n
    - type: text
      text: For who can bring him to see what will happen after him?
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to kill,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a time to heal;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to break down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a time to build up;
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'A time to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:15
      marker-yv: yv-n
    - type: text
      text: weep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a time to laugh;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to mourn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a time to dance;
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to cast away stones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a time to gather stones;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Joel 2:16; 1 Cor. 7:5
      marker-yv: yv-n
    - type: text
      text: A time to embrace,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a time to refrain from embracing;
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to gain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a time to lose;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to keep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a time to throw away;
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to tear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a time to sew;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Amos 5:13
      marker-yv: yv-n
    - type: text
      text: A time to keep silence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And a time to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 25:11
      marker-yv: yv-n
    - type: text
      text: speak;
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And a time to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 13:5; Luke 14:26
      marker-yv: yv-n
    - type: text
      text: hate;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time of war,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a time of peace.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The God-Given Task
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 1:3
      marker-yv: yv-n
    - type: text
      text: 'What profit has the worker from that in which he labors? '
