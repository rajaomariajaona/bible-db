  '1':
  - type: heading
    content: The Lord’s Eternal Love
  - type: text
    content: 'A Prayer of the afflicted, '
  - type: note
    content: Ps. 61:2
  - type: text
    content: 'when he is overwhelmed and pours out his complaint before the '
  - type: heading
    content: Lord
  - type: text
    content: .
  - type: text
    content: 'Hear my prayer, O '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: And let my cry come to You.
  '10':
  - type: text
    content: Because of Your indignation and Your wrath;
  - type: text
    content: For You have lifted me up and cast me away.
  '11':
  - type: text
    content: 'My days '
  - type: text
    content: are
  - type: text
    content: ' like a shadow that lengthens,'
  - type: text
    content: And I wither away like grass.
  '12':
  - type: text
    content: 'But You, O '
  - type: heading
    content: Lord
  - type: text
    content: ', shall endure forever,'
  - type: text
    content: And the remembrance of Your name to all generations.
  '13':
  - type: text
    content: 'You will arise '
  - type: text
    content: and
  - type: text
    content: ' have mercy on Zion;'
  - type: text
    content: For the time to favor her,
  - type: text
    content: Yes, the set time, has come.
  '14':
  - type: text
    content: For Your servants take pleasure in her stones,
  - type: text
    content: And show favor to her dust.
  '15':
  - type: text
    content: 'So the nations shall '
  - type: note
    content: 1 Kin. 8:43
  - type: text
    content: 'fear the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: And all the kings of the earth Your glory.
  '16':
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' shall build up Zion;'
  - type: note
    content: (Is. 60:1, 2)
  - type: text
    content: He shall appear in His glory.
  '17':
  - type: note
    content: Neh. 1:6; Ps. 22:24
  - type: text
    content: He shall regard the prayer of the destitute,
  - type: text
    content: And shall not despise their prayer.
  '18':
  - type: text
    content: 'This will be '
  - type: note
    content: Deut. 31:19; (Rom. 15:4; 1 Cor. 10:11)
  - type: text
    content: written for the generation to come,
  - type: text
    content: 'That '
  - type: note
    content: Ps. 22:31
  - type: text
    content: 'a people yet to be created may praise the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '19':
  - type: text
    content: 'For He '
  - type: note
    content: Deut. 26:15; Ps. 14:2
  - type: text
    content: looked down from the height of His sanctuary;
  - type: text
    content: 'From heaven the '
  - type: heading
    content: Lord
  - type: text
    content: ' viewed the earth,'
  '2':
  - type: note
    content: Ps. 27:9; 69:17
  - type: text
    content: Do not hide Your face from me in the day of my trouble;
  - type: text
    content: Incline Your ear to me;
  - type: text
    content: In the day that I call, answer me speedily.
  '20':
  - type: note
    content: Ps. 79:11
  - type: text
    content: To hear the groaning of the prisoner,
  - type: text
    content: To release those appointed to death,
  '21':
  - type: text
    content: 'To '
  - type: note
    content: Ps. 22:22
  - type: text
    content: 'declare the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' in Zion,'
  - type: text
    content: And His praise in Jerusalem,
  '22':
  - type: note
    content: (Is. 2:2, 3; 49:22, 23; 60:3); Zech. 8:20–23
  - type: text
    content: When the peoples are gathered together,
  - type: text
    content: 'And the kingdoms, to serve the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: He weakened my strength in the way;
  - type: text
    content: 'He '
  - type: note
    content: Job 21:21
  - type: text
    content: shortened my days.
  '24':
  - type: note
    content: (Ps. 39:13); Is. 38:10
  - type: text
    content: I said, “O my God,
  - type: text
    content: Do not take me away in the midst of my days;
  - type: note
    content: Job 36:26; (Ps. 90:2); Hab. 1:12
  - type: text
    content: 'Your years '
  - type: text
    content: are
  - type: text
    content: ' throughout all generations.'
  '25':
  - type: note
    content: (Gen. 1:1; Neh. 9:6; Heb. 1:10–12)
  - type: text
    content: Of old You laid the foundation of the earth,
  - type: text
    content: 'And the heavens '
  - type: text
    content: are
  - type: text
    content: ' the work of Your hands.'
  '26':
  - type: note
    content: Is. 34:4; 51:6; Matt. 24:35; (2 Pet. 3:7, 10–12); Rev. 20:11
  - type: text
    content: They will perish, but You will endure;
  - type: text
    content: Yes, they will all grow old like a garment;
  - type: text
    content: Like a cloak You will change them,
  - type: text
    content: And they will be changed.
  '27':
  - type: text
    content: 'But '
  - type: note
    content: (Is. 41:4; 43:10; Mal. 3:6; Heb. 13:8); James 1:17
  - type: text
    content: 'You '
  - type: text
    content: are
  - type: text
    content: ' the same,'
  - type: text
    content: And Your years will have no end.
  '28':
  - type: note
    content: Ps. 69:36
  - type: text
    content: The children of Your servants will continue,
  - type: text
    content: And their descendants will be established before You.”
  '3':
  - type: text
    content: 'For my days are '
  - type: note
    content: James 4:14
  - type: text
    content: consumed like smoke,
  - type: text
    content: And my bones are burned like a hearth.
  '4':
  - type: text
    content: My heart is stricken and withered like grass,
  - type: text
    content: So that I forget to eat my bread.
  '5':
  - type: text
    content: Because of the sound of my groaning
  - type: text
    content: My bones cling to my skin.
  '6':
  - type: text
    content: I am like a pelican of the wilderness;
  - type: text
    content: I am like an owl of the desert.
  '7':
  - type: text
    content: I lie awake,
  - type: text
    content: And am like a sparrow alone on the housetop.
  '8':
  - type: text
    content: My enemies reproach me all day long;
  - type: text
    content: Those who deride me swear an oath against me.
  '9':
  - type: text
    content: For I have eaten ashes like bread,
  - type: text
    content: And mingled my drink with weeping,
