document_id: 2TI.2,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Be Strong in Grace
  - type: text
    content: 'You therefore, '
  - type: note
    content: 1 Tim. 1:2
  - type: text
    content: 'my son, '
  - type: note
    content: Eph. 6:10
  - type: text
    content: 'be strong in the grace that is in Christ Jesus. '
  '10':
  - type: text
    content: 'Therefore '
  - type: note
    content: Eph. 3:13
  - type: text
    content: 'I endure all things for the sake of the elect, '
  - type: note
    content: 2 Cor. 1:6; 1 Thess. 5:9
  - type: text
    content: that they also may obtain the salvation which is in Christ Jesus with eternal glory.
  '11':
  - type: text
    content: This
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' a faithful saying:'
  - type: text
    content: 'For '
  - type: note
    content: Rom. 6:5, 8; 1 Thess. 5:10
  - type: text
    content: 'if we died with '
  - type: text
    content: Him,
  - type: text
    content: 'We shall also live with '
  - type: text
    content: Him.
  '12':
  - type: note
    content: (Matt. 19:28); Luke 22:29; (Rom. 5:17; 8:17)
  - type: text
    content: If we endure,
  - type: text
    content: 'We shall also reign with '
  - type: text
    content: Him.
  - type: note
    content: Matt. 10:33; Luke 12:9; 1 Tim. 5:8
  - type: text
    content: 'If we deny '
  - type: text
    content: Him,
  - type: text
    content: He also will deny us.
  '13':
  - type: text
    content: If we are faithless,
  - type: text
    content: He remains faithful;
  - type: text
    content: 'He '
  - type: note
    content: Num. 23:19; Titus 1:2
  - type: text
    content: cannot deny Himself.
  - type: heading
    content: Approved and Disapproved Workers
  '14':
  - type: text
    content: 'Remind '
  - type: text
    content: them
  - type: text
    content: ' of these things, '
  - type: note
    content: 1 Tim. 5:21; 6:4; 2 Tim. 2:23; Titus 3:9
  - type: text
    content: 'charging '
  - type: text
    content: them
  - type: text
    content: ' before the Lord not to strive about words to no profit, to the ruin of the hearers. '
  '15':
  - type: note
    content: 1 Tim. 4:13; 2 Pet. 1:10
  - type: text
    content: 'Be diligent to present yourself approved to God, a worker who does not need to be ashamed, rightly dividing the word of truth. '
  '16':
  - type: text
    content: 'But shun profane '
  - type: text
    content: and
  - type: text
    content: ' idle babblings, for they will increase to more ungodliness. '
  '17':
  - type: text
    content: 'And their message will spread like cancer. '
  - type: note
    content: 1 Tim. 1:20
  - type: text
    content: 'Hymenaeus and Philetus are of this sort, '
  '18':
  - type: text
    content: 'who have strayed concerning the truth, '
  - type: note
    content: 1 Cor. 15:12
  - type: text
    content: 'saying that the resurrection is already past; and they overthrow the faith of some. '
  '19':
  - type: text
    content: 'Nevertheless '
  - type: note
    content: Matt. 24:24; (1 Cor. 3:11)
  - type: text
    content: 'the solid foundation of God stands, having this seal: “The Lord '
  - type: note
    content: Num. 16:5; (Nah. 1:7); John 10:14, 27
  - type: text
    content: knows those who are His,” and, “Let everyone who names the name of Christ depart from iniquity.”
  '2':
  - type: text
    content: 'And the things that you have heard from me among many witnesses, commit these to faithful men who will be able to teach others also. '
  '20':
  - type: text
    content: 'But in a great house there are not only '
  - type: note
    content: Rom. 9:21
  - type: text
    content: 'vessels of gold and silver, but also of wood and clay, some for honor and some for dishonor. '
  '21':
  - type: text
    content: 'Therefore if anyone cleanses himself from the latter, he will be a vessel for honor, sanctified and useful for the Master, '
  - type: note
    content: 2 Cor. 9:8; (Eph. 2:10);2 Tim. 3:17
  - type: text
    content: 'prepared for every good work. '
  '22':
  - type: note
    content: 1 Tim. 6:11
  - type: text
    content: 'Flee also youthful lusts; but pursue righteousness, faith, love, peace with those who call on the Lord out of a pure heart. '
  '23':
  - type: text
    content: 'But avoid foolish and ignorant disputes, knowing that they generate strife. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: Titus 3:2
  - type: text
    content: 'a servant of the Lord must not quarrel but be gentle to all, '
  - type: note
    content: Titus 1:9
  - type: text
    content: 'able to teach, '
  - type: note
    content: 1 Tim. 3:3; Titus 1:7
  - type: text
    content: 'patient, '
  '25':
  - type: note
    content: Gal. 6:1; Titus 3:2; 1 Pet. 3:15
  - type: text
    content: 'in humility correcting those who are in opposition, '
  - type: note
    content: Acts 8:22
  - type: text
    content: 'if God perhaps will grant them repentance, '
  - type: note
    content: 1 Tim. 2:4
  - type: text
    content: 'so that they may know the truth, '
  '26':
  - type: text
    content: 'and '
  - type: text
    content: that
  - type: text
    content: ' they may come to their senses '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: note
    content: 1 Tim. 3:7
  - type: text
    content: 'escape the snare of the devil, having been taken captive by him to '
  - type: text
    content: do
  - type: text
    content: ' his will.'
  '3':
  - type: text
    content: 'You therefore must '
  - type: note
    content: 2 Tim. 4:5
  - type: text
    content: 'endure hardship '
  - type: note
    content: 1 Cor. 9:7; 1 Tim. 1:18
  - type: text
    content: 'as a good soldier of Jesus Christ. '
  '4':
  - type: note
    content: (2 Pet. 2:20)
  - type: text
    content: 'No one engaged in warfare entangles himself with the affairs of '
  - type: text
    content: this
  - type: text
    content: ' life, that he may please him who enlisted him as a soldier. '
  '5':
  - type: text
    content: 'And also '
  - type: note
    content: (1 Cor. 9:25)
  - type: text
    content: 'if anyone competes in athletics, he is not crowned unless he competes according to the rules. '
  '6':
  - type: text
    content: 'The hardworking farmer must be first to partake of the crops. '
  '7':
  - type: text
    content: 'Consider what I say, and may the Lord '
  - type: note
    content: Prov. 2:6
  - type: text
    content: give you understanding in all things.
  '8':
  - type: text
    content: 'Remember that Jesus Christ, '
  - type: note
    content: Rom. 1:3, 4
  - type: text
    content: 'of the seed of David, '
  - type: note
    content: 1 Cor. 15:4
  - type: text
    content: 'was raised from the dead '
  - type: note
    content: Rom. 2:16
  - type: text
    content: 'according to my gospel, '
  '9':
  - type: note
    content: Acts 9:16
  - type: text
    content: 'for which I suffer trouble as an evildoer, '
  - type: note
    content: Eph. 3:1
  - type: text
    content: even
  - type: text
    content: ' to the point of chains; '
  - type: note
    content: Acts 28:31; (2 Tim. 4:17)
  - type: text
    content: 'but the word of God is not chained. '
