document_id: 2TI.2,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Be Strong in Grace
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'You therefore, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 1:2
      marker-yv: yv-n
    - type: text
      text: 'my son, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:10
      marker-yv: yv-n
    - type: text
      text: 'be strong in the grace that is in Christ Jesus. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 3:13
      marker-yv: yv-n
    - type: text
      text: 'I endure all things for the sake of the elect, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 1:6; 1 Thess. 5:9
      marker-yv: yv-n
    - type: text
      text: that they also may obtain the salvation which is in Christ Jesus with eternal glory.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: it
      children:
      - type: text
        text: This
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a faithful saying:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 6:5, 8; 1 Thess. 5:10
      marker-yv: yv-n
    - type: text
      text: 'if we died with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'We shall also live with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 19:28); Luke 22:29; (Rom. 5:17; 8:17)
      marker-yv: yv-n
    - type: text
      text: If we endure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'We shall also reign with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:33; Luke 12:9; 1 Tim. 5:8
      marker-yv: yv-n
    - type: text
      text: 'If we deny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He also will deny us.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: If we are faithless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He remains faithful;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 23:19; Titus 1:2
      marker-yv: yv-n
    - type: text
      text: cannot deny Himself.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Approved and Disapproved Workers
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Remind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' of these things, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 5:21; 6:4; 2 Tim. 2:23; Titus 3:9
      marker-yv: yv-n
    - type: text
      text: 'charging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' before the Lord not to strive about words to no profit, to the ruin of the hearers. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 4:13; 2 Pet. 1:10
      marker-yv: yv-n
    - type: text
      text: 'Be diligent to present yourself approved to God, a worker who does not need to be ashamed, rightly dividing the word of truth. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But shun profane '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' idle babblings, for they will increase to more ungodliness. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And their message will spread like cancer. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 1:20
      marker-yv: yv-n
    - type: text
      text: 'Hymenaeus and Philetus are of this sort, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'who have strayed concerning the truth, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:12
      marker-yv: yv-n
    - type: text
      text: 'saying that the resurrection is already past; and they overthrow the faith of some. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nevertheless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 24:24; (1 Cor. 3:11)
      marker-yv: yv-n
    - type: text
      text: 'the solid foundation of God stands, having this seal: “The Lord '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:5; (Nah. 1:7); John 10:14, 27
      marker-yv: yv-n
    - type: text
      text: knows those who are His,” and, “Let everyone who names the name of Christ depart from iniquity.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the things that you have heard from me among many witnesses, commit these to faithful men who will be able to teach others also. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But in a great house there are not only '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 9:21
      marker-yv: yv-n
    - type: text
      text: 'vessels of gold and silver, but also of wood and clay, some for honor and some for dishonor. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Therefore if anyone cleanses himself from the latter, he will be a vessel for honor, sanctified and useful for the Master, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 9:8; (Eph. 2:10);2 Tim. 3:17
      marker-yv: yv-n
    - type: text
      text: 'prepared for every good work. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 6:11
      marker-yv: yv-n
    - type: text
      text: 'Flee also youthful lusts; but pursue righteousness, faith, love, peace with those who call on the Lord out of a pure heart. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But avoid foolish and ignorant disputes, knowing that they generate strife. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Titus 3:2
      marker-yv: yv-n
    - type: text
      text: 'a servant of the Lord must not quarrel but be gentle to all, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Titus 1:9
      marker-yv: yv-n
    - type: text
      text: 'able to teach, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 3:3; Titus 1:7
      marker-yv: yv-n
    - type: text
      text: 'patient, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 6:1; Titus 3:2; 1 Pet. 3:15
      marker-yv: yv-n
    - type: text
      text: 'in humility correcting those who are in opposition, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 8:22
      marker-yv: yv-n
    - type: text
      text: 'if God perhaps will grant them repentance, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 2:4
      marker-yv: yv-n
    - type: text
      text: 'so that they may know the truth, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' they may come to their senses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 3:7
      marker-yv: yv-n
    - type: text
      text: 'escape the snare of the devil, having been taken captive by him to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do
    - type: text
      text: ' his will.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'You therefore must '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 4:5
      marker-yv: yv-n
    - type: text
      text: 'endure hardship '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 9:7; 1 Tim. 1:18
      marker-yv: yv-n
    - type: text
      text: 'as a good soldier of Jesus Christ. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Pet. 2:20)
      marker-yv: yv-n
    - type: text
      text: 'No one engaged in warfare entangles himself with the affairs of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this
    - type: text
      text: ' life, that he may please him who enlisted him as a soldier. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 9:25)
      marker-yv: yv-n
    - type: text
      text: 'if anyone competes in athletics, he is not crowned unless he competes according to the rules. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The hardworking farmer must be first to partake of the crops. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Consider what I say, and may the Lord '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 2:6
      marker-yv: yv-n
    - type: text
      text: give you understanding in all things.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Remember that Jesus Christ, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:3, 4
      marker-yv: yv-n
    - type: text
      text: 'of the seed of David, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:4
      marker-yv: yv-n
    - type: text
      text: 'was raised from the dead '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 2:16
      marker-yv: yv-n
    - type: text
      text: 'according to my gospel, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:16
      marker-yv: yv-n
    - type: text
      text: 'for which I suffer trouble as an evildoer, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 3:1
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' to the point of chains; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 28:31; (2 Tim. 4:17)
      marker-yv: yv-n
    - type: text
      text: 'but the word of God is not chained. '
