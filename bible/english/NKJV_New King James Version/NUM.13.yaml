verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Spies Sent into Canaan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of Zebulun, Gaddiel the son of Sodi; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of Joseph, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is,
    - type: text
      text: ' from the tribe of Manasseh, Gaddi the son of Susi; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of Dan, Ammiel the son of Gemalli; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of Asher, Sethur the son of Michael; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of Naphtali, Nahbi the son of Vophsi; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: from the tribe of Gad, Geuel the son of Machi.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the names of the men whom Moses sent to spy out the land. And Moses called '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 17:9; Deut. 32:44
      marker-yv: yv-n
    - type: text
      text: Hoshea the son of Nun, Joshua.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses sent them to spy out the land of Canaan, and said to them, “Go up this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: way
    - type: text
      text: ' into the South, and go up to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:9
      marker-yv: yv-n
    - type: text
      text: 'the mountains, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and see what the land is like: whether the people who dwell in it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' strong or weak, few or many; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whether the land they dwell in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good or bad; whether the cities they inhabit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' like camps or strongholds; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:8; Deut. 1:22; 9:23
      marker-yv: yv-n
    - type: text
      text: “Send men to spy out the land of Canaan, which I am giving to the children of Israel; from each tribe of their fathers you shall send a man, every one a leader among them.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whether the land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' rich or poor; and whether there are forests there or not. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 31:6, 7, 23
      marker-yv: yv-n
    - type: text
      text: 'Be of good courage. And bring some of the fruit of the land.” Now the time '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the season of the first ripe grapes.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they went up and spied out the land '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:1; 27:14; 33:36; Josh. 15:1
      marker-yv: yv-n
    - type: text
      text: 'from the Wilderness of Zin as far as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:28
      marker-yv: yv-n
    - type: text
      text: 'Rehob, near the entrance of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 34:8; Josh. 13:5
      marker-yv: yv-n
    - type: text
      text: 'Hamath. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they went up through the South and came to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:13, 14; Judg. 1:10
      marker-yv: yv-n
    - type: text
      text: 'Hebron; Ahiman, Sheshai, and Talmai, the descendants of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 11:21, 22
      marker-yv: yv-n
    - type: text
      text: 'Anak, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' there. (Now Hebron was built seven years before Zoan in Egypt.) '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:13; Num. 13:24; 32:9; Deut. 1:24, 25
      marker-yv: yv-n
    - type: text
      text: 'Then they came to the Valley of Eshcol, and there cut down a branch with one cluster of grapes; they carried it between two of them on a pole. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: They
    - type: text
      text: ' also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: brought
    - type: text
      text: ' some of the pomegranates and figs. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The place was called the Valley of Eshcol, because of the cluster which the men of Israel cut down there. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they returned from spying out the land after forty days.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now they departed and came back to Moses and Aaron and all the congregation of the children of Israel in the Wilderness of Paran, at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:1, 16; 32:8; 33:36; Deut. 1:19; Josh. 14:6
      marker-yv: yv-n
    - type: text
      text: 'Kadesh; they brought back word to them and to all the congregation, and showed them the fruit of the land. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they told him, and said: “We went to the land where you sent us. It truly flows with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 3:8, 17; 13:5; 33:3
      marker-yv: yv-n
    - type: text
      text: 'milk and honey, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:25
      marker-yv: yv-n
    - type: text
      text: 'and this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' its fruit. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:28; 9:1, 2
      marker-yv: yv-n
    - type: text
      text: 'people who dwell in the land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' strong; the cities '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' fortified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' very large; moreover we saw the descendants of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 11:21, 22
      marker-yv: yv-n
    - type: text
      text: 'Anak there. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 17:8; Judg. 6:3
      marker-yv: yv-n
    - type: text
      text: The Amalekites dwell in the land of the South; the Hittites, the Jebusites, and the Amorites dwell in the mountains; and the Canaanites dwell by the sea and along the banks of the Jordan.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses sent them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 12:16; 32:8; Deut. 1:19; 9:23
      marker-yv: yv-n
    - type: text
      text: 'from the Wilderness of Paran according to the command of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all of them men who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' heads of the children of Israel. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:6, 24
      marker-yv: yv-n
    - type: text
      text: Caleb quieted the people before Moses, and said, “Let us go up at once and take possession, for we are well able to overcome it.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:9; Deut. 1:28; 9:1–3; Josh. 14:8
      marker-yv: yv-n
    - type: text
      text: 'But the men who had gone up with him said, “We are not able to go up against the people, for they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' stronger than we.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:36, 37; Ps. 106:24
      marker-yv: yv-n
    - type: text
      text: 'And they gave the children of Israel a bad report of the land which they had spied out, saying, “The land through which we have gone as spies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a land that devours its inhabitants, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Amos 2:9
      marker-yv: yv-n
    - type: text
      text: 'all the people whom we saw in it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' men of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: great
    - type: text
      text: ' stature. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There we saw the giants (
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:28; 9:2; Josh. 11:21
      marker-yv: yv-n
    - type: text
      text: 'the descendants of Anak came from the giants); and we were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 40:22
      marker-yv: yv-n
    - type: text
      text: 'like grasshoppers in our own sight, and so we were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 17:42
      marker-yv: yv-n
    - type: text
      text: in their sight.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' their names: from the tribe of Reuben, Shammua the son of Zaccur; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of Simeon, Shaphat the son of Hori; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 34:19
      marker-yv: yv-n
    - type: text
      text: 'from the tribe of Judah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:6, 30; Josh. 14:6, 7; Judg. 1:12; 1 Chr. 4:15
      marker-yv: yv-n
    - type: text
      text: 'Caleb the son of Jephunneh; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of Issachar, Igal the son of Joseph; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of Ephraim, Hoshea the son of Nun; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of Benjamin, Palti the son of Raphu; '
