  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Therefore know that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, He '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 1:9; 2 Thess. 3:3; 2 Tim. 2:13
    marker-yv: yv-n
  - type: text
    text: 'the faithful God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 20:6; Deut. 5:10; Neh. 1:5; Dan. 9:4
    marker-yv: yv-n
  - type: text
    text: 'who keeps covenant and mercy for a thousand generations with those who love Him and keep His commandments; '
  - type: usfm
