  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God will drive out those nations before you '
  - type: note
    content: Ex. 23:29, 30
  - type: text
    content: 'little by little; you will be unable to destroy them at once, lest the beasts of the field become '
  - type: text
    content: too
  - type: text
    content: ' numerous for you. '
  '23':
  - type: text
    content: 'But the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God will deliver them over to you, and will inflict defeat upon them until they are destroyed. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: Josh. 10:24, 42; 12:1–24
  - type: text
    content: 'He will deliver their kings into your hand, and you will destroy their name from under heaven; '
  - type: note
    content: Josh. 23:9
  - type: text
    content: 'no one shall be able to stand against you until you have destroyed them. '
  '25':
  - type: text
    content: 'You shall burn the carved images of their gods with fire; you shall not '
  - type: note
    content: Prov. 23:6
  - type: text
    content: 'covet the silver or gold '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' on them, nor take '
  - type: text
    content: it
  - type: text
    content: ' for yourselves, lest you be snared by it; for it '
  - type: text
    content: is
  - type: text
    content: ' an abomination to the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. '
  '26':
  - type: text
    content: 'Nor shall you bring an abomination into your house, lest you be doomed to destruction like it. You shall utterly detest it and utterly abhor it, '
  - type: note
    content: Deut. 13:17
  - type: text
    content: 'for it '
  - type: text
    content: is
  - type: text
    content: ' an accursed thing.'
  '3':
  - type: note
    content: Ex. 34:15, 16; Josh. 23:12; 1 Kin. 11:2; Ezra 9:2
  - type: text
    content: 'Nor shall you make marriages with them. You shall not give your daughter to their son, nor take their daughter for your son. '
  '4':
  - type: text
    content: 'For they will turn your sons away from following Me, to serve other gods; '
  - type: note
    content: Deut. 6:15
  - type: text
    content: 'so the anger of the '
  - type: heading
    content: Lord
  - type: text
    content: ' will be aroused against you and destroy you suddenly. '
  '5':
  - type: text
    content: 'But thus you shall deal with them: you shall '
  - type: note
    content: Ex. 23:24; 34:13; Deut. 12:3
  - type: text
    content: 'destroy their altars, and break down their '
  - type: text
    content: sacred
  - type: text
    content: ' pillars, and cut down their wooden images, and burn their carved images with fire.'
  '6':
  - type: text
    content: '“For you '
  - type: text
    content: are
  - type: text
    content: ' a holy people to the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God; '
  - type: note
    content: Ex. 19:5, 6; Amos 3:2; 1 Pet. 2:9
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has chosen you to be a people for Himself, a special treasure above all the peoples on the face of the earth. '
  '7':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' did not set His '
  - type: note
    content: Deut. 4:37
  - type: text
    content: 'love on you nor choose you because you were more in number than any other people, for you were '
  - type: note
    content: Deut. 10:22
  - type: text
    content: 'the least of all peoples; '
  '8':
  - type: text
    content: 'but '
  - type: note
    content: Deut. 10:15
  - type: text
    content: 'because the '
  - type: heading
    content: Lord
  - type: text
    content: ' loves you, and because He would keep '
  - type: note
    content: Luke 1:55, 72, 73
  - type: text
    content: 'the oath which He swore to your fathers, '
  - type: note
    content: Ex. 13:3, 14
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' has brought you out with a mighty hand, and redeemed you from the house of bondage, from the hand of Pharaoh king of Egypt.'
  '9':
  - type: text
    content: '“Therefore know that the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, He '
  - type: text
    content: is
  - type: text
    content: ' God, '
  - type: note
    content: 1 Cor. 1:9; 2 Thess. 3:3; 2 Tim. 2:13
  - type: text
    content: 'the faithful God '
  - type: note
    content: Ex. 20:6; Deut. 5:10; Neh. 1:5; Dan. 9:4
  - type: text
    content: 'who keeps covenant and mercy for a thousand generations with those who love Him and keep His commandments; '
