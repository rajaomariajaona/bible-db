    marker: x
    children:
    - type: text
      text: Num. 31:17; Deut. 20:16–18
    marker-yv: yv-n
  - type: text
    text: 'them over to you, you shall conquer them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' utterly destroy them. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:32, 33; Josh. 2:14
    marker-yv: yv-n
  - type: text
    text: 'You shall make no covenant with them nor show mercy to them. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 34:15, 16; Josh. 23:12; 1 Kin. 11:2; Ezra 9:2
    marker-yv: yv-n
  - type: text
    text: 'Nor shall you make marriages with them. You shall not give your daughter to their son, nor take their daughter for your son. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For they will turn your sons away from following Me, to serve other gods; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 6:15
    marker-yv: yv-n
  - type: text
    text: 'so the anger of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be aroused against you and destroy you suddenly. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But thus you shall deal with them: you shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:24; 34:13; Deut. 12:3
    marker-yv: yv-n
  - type: text
    text: 'destroy their altars, and break down their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacred
  - type: text
    text: ' pillars, and cut down their wooden images, and burn their carved images with fire.'
