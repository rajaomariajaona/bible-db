  - type: text
    text: 'and He repays those who hate Him to their face, to destroy them. He will not be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Pet. 3:9, 10)
    marker-yv: yv-n
  - type: text
    text: 'slack with him who hates Him; He will repay him to his face. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Therefore you shall keep the commandment, the statutes, and the judgments which I command you today, to observe them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Blessings of Obedience
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Then it shall come to pass, because you listen to these judgments, and keep and do them, that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will keep with you the covenant and the mercy which He swore to your fathers. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And He will '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 146:8; Prov. 15:9; John 14:21
    marker-yv: yv-n
  - type: text
    text: 'love you and bless you and multiply you; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 28:4
    marker-yv: yv-n
  - type: text
    text: 'He will also bless the fruit of your womb and the fruit of your land, your grain and your new wine and your oil, the increase of your cattle and the offspring of your flock, in the land of which He swore to your fathers to give you. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You shall be blessed above all peoples; there shall not be a male or female '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:26
    marker-yv: yv-n
  - type: text
    text: 'barren among you or among your livestock. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will take away from you all sickness, and will afflict you with none of the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 9:14; 15:26; Deut. 28:27, 60
    marker-yv: yv-n
  - type: text
    text: 'terrible diseases of Egypt which you have known, but will lay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' on all those who hate you. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Also you shall destroy all the peoples whom the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God delivers over to you; your eye shall have no pity on them; nor shall you serve their gods, for that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:33; Judg. 8:27; Ps. 106:36
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: will
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' a snare to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“If you should say in your heart, ‘These nations are greater than I; how can I dispossess them?’— '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'you shall not be afraid of them, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but
  - type: text
    text: ' you shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 105:5
    marker-yv: yv-n
  - type: text
    text: 'remember well what the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God did to Pharaoh and to all Egypt: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 4:34; 29:3
    marker-yv: yv-n
  - type: text
    text: 'the great trials which your eyes saw, the signs and the wonders, the mighty hand and the outstretched arm, by which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God brought you out. So shall the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God do to all the peoples of whom you are afraid. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:28; Josh. 24:12
    marker-yv: yv-n
  - type: text
    text: 'Moreover the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will send the hornet among them until those who are left, who hide themselves from you, are destroyed. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'You shall not be terrified of them; for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, the great and awesome God, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' among you. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will drive out those nations before you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:29, 30
    marker-yv: yv-n
  - type: text
    text: 'little by little; you will be unable to destroy them at once, lest the beasts of the field become '
  - type: usfm
    marker: it
    children:
    - type: text
      text: too
  - type: text
    text: ' numerous for you. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will deliver them over to you, and will inflict defeat upon them until they are destroyed. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 10:24, 42; 12:1–24
    marker-yv: yv-n
  - type: text
    text: 'He will deliver their kings into your hand, and you will destroy their name from under heaven; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 23:9
    marker-yv: yv-n
  - type: text
    text: 'no one shall be able to stand against you until you have destroyed them. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'You shall burn the carved images of their gods with fire; you shall not '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 23:6
    marker-yv: yv-n
  - type: text
    text: 'covet the silver or gold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' on them, nor take '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' for yourselves, lest you be snared by it; for it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' an abomination to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nor shall you bring an abomination into your house, lest you be doomed to destruction like it. You shall utterly detest it and utterly abhor it, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 13:17
    marker-yv: yv-n
  - type: text
    text: 'for it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' an accursed thing.'
