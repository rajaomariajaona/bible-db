  '1':
  - type: heading
    content: A Chosen People
  - type: text
    content: '“When the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God brings you into the land which you go to '
  - type: note
    content: Deut. 6:10
  - type: text
    content: 'possess, and has cast out many '
  - type: note
    content: Gen. 15:19–21
  - type: text
    content: 'nations before you, '
  - type: note
    content: Ex. 33:2
  - type: text
    content: 'the Hittites and the Girgashites and the Amorites and the Canaanites and the Perizzites and the Hivites and the Jebusites, seven nations greater and mightier than you, '
  '10':
  - type: text
    content: 'and He repays those who hate Him to their face, to destroy them. He will not be '
  - type: note
    content: (2 Pet. 3:9, 10)
  - type: text
    content: 'slack with him who hates Him; He will repay him to his face. '
  '11':
  - type: text
    content: Therefore you shall keep the commandment, the statutes, and the judgments which I command you today, to observe them.
  - type: heading
    content: Blessings of Obedience
  '12':
  - type: text
    content: '“Then it shall come to pass, because you listen to these judgments, and keep and do them, that the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God will keep with you the covenant and the mercy which He swore to your fathers. '
  '13':
  - type: text
    content: 'And He will '
  - type: note
    content: Ps. 146:8; Prov. 15:9; John 14:21
  - type: text
    content: 'love you and bless you and multiply you; '
  - type: note
    content: Deut. 28:4
  - type: text
    content: 'He will also bless the fruit of your womb and the fruit of your land, your grain and your new wine and your oil, the increase of your cattle and the offspring of your flock, in the land of which He swore to your fathers to give you. '
  '14':
  - type: text
    content: 'You shall be blessed above all peoples; there shall not be a male or female '
  - type: note
    content: Ex. 23:26
  - type: text
    content: 'barren among you or among your livestock. '
  '15':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' will take away from you all sickness, and will afflict you with none of the '
  - type: note
    content: Ex. 9:14; 15:26; Deut. 28:27, 60
  - type: text
    content: 'terrible diseases of Egypt which you have known, but will lay '
  - type: text
    content: them
  - type: text
    content: ' on all those who hate you. '
  '16':
  - type: text
    content: 'Also you shall destroy all the peoples whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God delivers over to you; your eye shall have no pity on them; nor shall you serve their gods, for that '
  - type: note
    content: Ex. 23:33; Judg. 8:27; Ps. 106:36
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' a snare to you.'
  '17':
  - type: text
    content: '“If you should say in your heart, ‘These nations are greater than I; how can I dispossess them?’— '
  '18':
  - type: text
    content: 'you shall not be afraid of them, '
  - type: text
    content: but
  - type: text
    content: ' you shall '
  - type: note
    content: Ps. 105:5
  - type: text
    content: 'remember well what the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God did to Pharaoh and to all Egypt: '
  '19':
  - type: note
    content: Deut. 4:34; 29:3
  - type: text
    content: 'the great trials which your eyes saw, the signs and the wonders, the mighty hand and the outstretched arm, by which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God brought you out. So shall the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God do to all the peoples of whom you are afraid. '
  '2':
  - type: text
    content: 'and when the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God delivers '
  - type: note
    content: Num. 31:17; Deut. 20:16–18
  - type: text
    content: 'them over to you, you shall conquer them '
  - type: text
    content: and
  - type: text
    content: ' utterly destroy them. '
  - type: note
    content: Ex. 23:32, 33; Josh. 2:14
  - type: text
    content: 'You shall make no covenant with them nor show mercy to them. '
  '20':
  - type: note
    content: Ex. 23:28; Josh. 24:12
  - type: text
    content: 'Moreover the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God will send the hornet among them until those who are left, who hide themselves from you, are destroyed. '
  '21':
  - type: text
    content: 'You shall not be terrified of them; for the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, the great and awesome God, '
  - type: text
    content: is
  - type: text
    content: ' among you. '
