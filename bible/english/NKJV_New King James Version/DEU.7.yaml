    children:
    - type: text
      text: Ex. 33:2
    marker-yv: yv-n
  - type: text
    text: 'the Hittites and the Girgashites and the Amorites and the Canaanites and the Perizzites and the Hivites and the Jebusites, seven nations greater and mightier than you, '
