  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“For you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' a holy people to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 19:5, 6; Amos 3:2; 1 Pet. 2:9
    marker-yv: yv-n
  - type: text
    text: 'the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God has chosen you to be a people for Himself, a special treasure above all the peoples on the face of the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' did not set His '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 4:37
    marker-yv: yv-n
  - type: text
    text: 'love on you nor choose you because you were more in number than any other people, for you were '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 10:22
    marker-yv: yv-n
  - type: text
    text: 'the least of all peoples; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 10:15
    marker-yv: yv-n
  - type: text
    text: 'because the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' loves you, and because He would keep '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 1:55, 72, 73
    marker-yv: yv-n
  - type: text
    text: 'the oath which He swore to your fathers, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 13:3, 14
    marker-yv: yv-n
  - type: text
    text: 'the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has brought you out with a mighty hand, and redeemed you from the house of bondage, from the hand of Pharaoh king of Egypt.'
