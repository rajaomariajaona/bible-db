      marker-yv: yv-n
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is in His holy temple.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let all the earth keep silence before Him.”
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
