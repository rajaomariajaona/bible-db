  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 21:8, 11
      marker-yv: yv-n
    - type: text
      text: stand my watch
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And set myself on the rampart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And watch to see what He will say to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And what I will answer when I am corrected.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Just Live by Faith
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You give shameful counsel to your house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Cutting off many peoples,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: against
    - type: text
      text: ' your soul.'
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the stone will cry out from the wall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the beam from the timbers will answer it.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Woe to him who builds a town with bloodshed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who establishes a city by iniquity!
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Behold, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' not of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That the peoples labor to feed the fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And nations weary themselves in vain?
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the earth will be filled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'With the knowledge of the glory of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As the waters cover the sea.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Woe to him who gives drink to his neighbor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Pressing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
