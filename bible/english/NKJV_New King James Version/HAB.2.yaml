      marker-yv: yv-n
    - type: text
      text: 'the vision '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' yet for an appointed time;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But at the end it will speak, and it will '
    - type: usfm
      marker: x
      children:
      - type: text
