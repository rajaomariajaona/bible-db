  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Even to make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' drunk,'
  - type: usfm
    marker: q2
    children:
    - type: text
