    - type: text
      text: ' the city,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And of all who dwell in it.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What profit is the image, that its maker should carve it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The molded image, a teacher of lies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That the maker of its mold should trust in it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To make mute idols?
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Woe to him who says to wood, ‘Awake!’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To silent stone, ‘Arise! It shall teach!’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Behold, it is overlaid with gold and silver,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet in it there is no breath at all.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered me and said:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 8:1
      marker-yv: yv-n
    - type: text
      text: “Write the vision
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' plain on tablets,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That he may run who reads it.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But
    - type: usfm
      marker: x
      children:
      - type: text
