  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are filled with shame instead of glory.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You also—drink!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And be exposed as uncircumcised!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The cup of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s right hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' turned against you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And utter shame will be on your glory.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the violence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: done
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
