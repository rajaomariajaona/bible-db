document_id: ACT.5,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Lying to the Holy Spirit
  - type: text
    content: 'But a certain man named Ananias, with Sapphira his wife, sold a possession. '
  '10':
  - type: note
    content: Ezek. 11:13; Acts 5:5
  - type: text
    content: 'Then immediately she fell down at his feet and breathed her last. And the young men came in and found her dead, and carrying '
  - type: text
    content: her
  - type: text
    content: ' out, buried '
  - type: text
    content: her
  - type: text
    content: ' by her husband. '
  '11':
  - type: note
    content: Acts 2:43; 5:5; 19:17
  - type: text
    content: So great fear came upon all the church and upon all who heard these things.
  - type: heading
    content: Continuing Power in the Church
  '12':
  - type: text
    content: 'And '
  - type: note
    content: Acts 2:43; 4:30; 6:8; 14:3; 15:12; (Rom. 15:19); 2 Cor. 12:12; Heb. 2:4
  - type: text
    content: 'through the hands of the apostles many signs and wonders were done among the people. '
  - type: note
    content: Acts 3:11; 4:32
  - type: text
    content: 'And they were all with one accord in Solomon’s Porch. '
  '13':
  - type: text
    content: 'Yet '
  - type: note
    content: John 9:22
  - type: text
    content: 'none of the rest dared join them, '
  - type: note
    content: Acts 2:47; 4:21
  - type: text
    content: 'but the people esteemed them highly. '
  '14':
  - type: text
    content: 'And believers were increasingly added to the Lord, multitudes of both men and women, '
  '15':
  - type: text
    content: 'so that they brought the sick out into the streets and laid '
  - type: text
    content: them
  - type: text
    content: ' on beds and couches, '
  - type: note
    content: Matt. 9:21; 14:36; Acts 19:12
  - type: text
    content: 'that at least the shadow of Peter passing by might fall on some of them. '
  '16':
  - type: text
    content: 'Also a multitude gathered from the surrounding cities to Jerusalem, bringing '
  - type: note
    content: Mark 16:17, 18; (John 14:12)
  - type: text
    content: sick people and those who were tormented by unclean spirits, and they were all healed.
  - type: heading
    content: Imprisoned Apostles Freed
  '17':
  - type: note
    content: Matt. 3:7; Acts 4:1, 2, 6
  - type: text
    content: 'Then the high priest rose up, and all those who '
  - type: text
    content: were
  - type: text
    content: ' with him (which is the sect of the Sadducees), and they were filled with indignation, '
  '18':
  - type: note
    content: Luke 21:12; Acts 4:3; 16:37
  - type: text
    content: 'and laid their hands on the apostles and put them in the common prison. '
  '19':
  - type: text
    content: 'But at night '
  - type: note
    content: Matt. 1:20, 24; 2:13, 19; 28:2; Luke 1:11; 2:9; Acts 12:7; 16:26
  - type: text
    content: 'an angel of the Lord opened the prison doors and brought them out, and said, '
  '2':
  - type: text
    content: 'And he kept back '
  - type: text
    content: part
  - type: text
    content: ' of the proceeds, his wife also being aware '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: it,
  - type: text
    content: ' and brought a certain part and laid '
  - type: text
    content: it
  - type: text
    content: ' at the apostles’ feet. '
  '20':
  - type: text
    content: '“Go, stand in the temple and speak to the people '
  - type: note
    content: (John 6:63, 68; 17:3; 1 John 5:11)
  - type: text
    content: all the words of this life.”
  '21':
  - type: text
    content: 'And when they heard '
  - type: text
    content: that,
  - type: text
    content: ' they entered the temple early in the morning and taught. '
  - type: note
    content: Acts 4:5, 6
  - type: text
    content: But the high priest and those with him came and called the council together, with all the elders of the children of Israel, and sent to the prison to have them brought.
  - type: heading
    content: Apostles on Trial Again
  '22':
  - type: text
    content: 'But when the officers came and did not find them in the prison, they returned and reported, '
  '23':
  - type: text
    content: 'saying, “Indeed we found the prison shut securely, and the guards standing outside before the doors; but when we opened them, we found no one inside!” '
  '24':
  - type: text
    content: 'Now when the high priest, '
  - type: note
    content: Luke 22:4; Acts 4:1; 5:26
  - type: text
    content: 'the captain of the temple, and the chief priests heard these things, they wondered what the outcome would be. '
  '25':
  - type: text
    content: So one came and told them, saying, “Look, the men whom you put in prison are standing in the temple and teaching the people!”
  '26':
  - type: text
    content: 'Then the captain went with the officers and brought them without violence, '
  - type: note
    content: Matt. 21:26
  - type: text
    content: 'for they feared the people, lest they should be stoned. '
  '27':
  - type: text
    content: 'And when they had brought them, they set '
  - type: text
    content: them
  - type: text
    content: ' before the council. And the high priest asked them, '
  '28':
  - type: text
    content: 'saying, '
  - type: note
    content: Acts 4:17, 18
  - type: text
    content: '“Did we not strictly command you not to teach in this name? And look, you have filled Jerusalem with your doctrine, '
  - type: note
    content: Acts 2:23, 36
  - type: text
    content: 'and intend to bring this Man’s '
  - type: note
    content: Matt. 23:35
  - type: text
    content: blood on us!”
  '29':
  - type: text
    content: 'But Peter and the '
  - type: text
    content: other
  - type: text
    content: ' apostles answered and said: '
  - type: note
    content: Acts 4:19
  - type: text
    content: '“We ought to obey God rather than men. '
  '3':
  - type: note
    content: Num. 30:2; Deut. 23:21; Eccl. 5:4
  - type: text
    content: 'But Peter said, “Ananias, why has '
  - type: note
    content: Matt. 4:10; Luke 22:3; John 13:2, 27
  - type: text
    content: 'Satan filled your heart to lie to the Holy Spirit and keep back '
  - type: text
    content: part
  - type: text
    content: ' of the price of the land for yourself? '
  '30':
  - type: note
    content: Acts 3:13, 15
  - type: text
    content: 'The God of our fathers raised up Jesus whom you murdered by '
  - type: note
    content: Acts 10:39; 13:29; (Gal. 3:13; 1 Pet. 2:24)
  - type: text
    content: 'hanging on a tree. '
  '31':
  - type: note
    content: Mark 16:19; (Acts 2:33, 36; Phil. 2:9–11)
  - type: text
    content: 'Him God has exalted to His right hand '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' '
  - type: note
    content: Acts 3:15; Rev. 1:5
  - type: text
    content: 'Prince and '
  - type: note
    content: Matt. 1:21
  - type: text
    content: 'Savior, '
  - type: note
    content: Luke 24:47; (Eph. 1:7; Col. 1:14)
  - type: text
    content: 'to give repentance to Israel and forgiveness of sins. '
  '32':
  - type: text
    content: 'And '
  - type: note
    content: John 15:26, 27; Acts 15:28; Rom. 8:16; Heb. 2:4
  - type: text
    content: 'we are His witnesses to these things, and '
  - type: text
    content: so
  - type: text
    content: ' also '
  - type: text
    content: is
  - type: text
    content: ' the Holy Spirit '
  - type: note
    content: Acts 2:4; 10:44
  - type: text
    content: whom God has given to those who obey Him.”
  - type: heading
    content: Gamaliel’s Advice
  '33':
  - type: text
    content: 'When they heard '
  - type: text
    content: this,
  - type: text
    content: ' they were '
  - type: note
    content: Acts 2:37; 7:54
  - type: text
    content: 'furious and plotted to kill them. '
  '34':
  - type: text
    content: 'Then one in the council stood up, a Pharisee named '
  - type: note
    content: Acts 22:3
  - type: text
    content: 'Gamaliel, a teacher of the law held in respect by all the people, and commanded them to put the apostles outside for a little while. '
  '35':
  - type: text
    content: 'And he said to them: “Men of Israel, take heed to yourselves what you intend to do regarding these men. '
  '36':
  - type: text
    content: 'For some time ago Theudas rose up, claiming to be somebody. A number of men, about four hundred, joined him. He was slain, and all who obeyed him were scattered and came to nothing. '
  '37':
  - type: text
    content: 'After this man, Judas of Galilee rose up in the days of the census, and drew away many people after him. He also perished, and all who obeyed him were dispersed. '
  '38':
  - type: text
    content: 'And now I say to you, keep away from these men and let them alone; for if this plan or this work is of men, it will come to nothing; '
  '39':
  - type: note
    content: Luke 21:15; 1 Cor. 1:25
  - type: text
    content: 'but if it is of God, you cannot overthrow it—lest you even be found '
  - type: note
    content: Acts 7:51; 9:5
  - type: text
    content: to fight against God.”
  '4':
  - type: text
    content: While it remained, was it not your own? And after it was sold, was it not in your own control? Why have you conceived this thing in your heart? You have not lied to men but to God.”
  '40':
  - type: text
    content: 'And they agreed with him, and when they had '
  - type: note
    content: Acts 4:18
  - type: text
    content: 'called for the apostles '
  - type: note
    content: Matt. 10:17; Mark 13:9; Acts 16:22, 23; 21:32; 2 Cor. 11:25
  - type: text
    content: 'and beaten '
  - type: text
    content: them,
  - type: text
    content: ' they commanded that they should not speak in the name of Jesus, and let them go. '
  '41':
  - type: text
    content: 'So they departed from the presence of the council, '
  - type: note
    content: Matt. 5:10–12; Rom. 5:3; 2 Cor. 12:10; Heb. 10:34; (James 1:2; 1 Pet. 4:13–16)
  - type: text
    content: 'rejoicing that they were counted worthy to suffer shame for His name. '
  '42':
  - type: text
    content: 'And daily '
  - type: note
    content: Acts 2:46
  - type: text
    content: 'in the temple, and in every house, '
  - type: note
    content: Acts 4:20, 29
  - type: text
    content: 'they did not cease teaching and preaching Jesus '
  - type: text
    content: as
  - type: text
    content: ' the Christ.'
  '5':
  - type: text
    content: 'Then Ananias, hearing these words, '
  - type: note
    content: Ezek. 11:13; Acts 5:10, 11
  - type: text
    content: 'fell down and breathed his last. So great fear came upon all those who heard these things. '
  '6':
  - type: text
    content: 'And the young men arose and '
  - type: note
    content: John 19:40
  - type: text
    content: 'wrapped him up, carried '
  - type: text
    content: him
  - type: text
    content: ' out, and buried '
  - type: text
    content: him.
  '7':
  - type: text
    content: 'Now it was about three hours later when his wife came in, not knowing what had happened. '
  '8':
  - type: text
    content: And Peter answered her, “Tell me whether you sold the land for so much?”
  - type: text
    content: She said, “Yes, for so much.”
  '9':
  - type: text
    content: 'Then Peter said to her, “How is it that you have agreed together '
  - type: note
    content: Matt. 4:7; Acts 5:3, 4
  - type: text
    content: 'to test the Spirit of the Lord? Look, the feet of those who have buried your husband '
  - type: text
    content: are
  - type: text
    content: ' at the door, and they will carry you out.” '
