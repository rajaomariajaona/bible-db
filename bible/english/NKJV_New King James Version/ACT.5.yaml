document_id: ACT.5,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lying to the Holy Spirit
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But a certain man named Ananias, with Sapphira his wife, sold a possession. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 11:13; Acts 5:5
      marker-yv: yv-n
    - type: text
      text: 'Then immediately she fell down at his feet and breathed her last. And the young men came in and found her dead, and carrying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' out, buried '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' by her husband. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:43; 5:5; 19:17
      marker-yv: yv-n
    - type: text
      text: So great fear came upon all the church and upon all who heard these things.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Continuing Power in the Church
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:43; 4:30; 6:8; 14:3; 15:12; (Rom. 15:19); 2 Cor. 12:12; Heb. 2:4
      marker-yv: yv-n
    - type: text
      text: 'through the hands of the apostles many signs and wonders were done among the people. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 3:11; 4:32
      marker-yv: yv-n
    - type: text
      text: 'And they were all with one accord in Solomon’s Porch. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 9:22
      marker-yv: yv-n
    - type: text
      text: 'none of the rest dared join them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:47; 4:21
      marker-yv: yv-n
    - type: text
      text: 'but the people esteemed them highly. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And believers were increasingly added to the Lord, multitudes of both men and women, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that they brought the sick out into the streets and laid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' on beds and couches, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 9:21; 14:36; Acts 19:12
      marker-yv: yv-n
    - type: text
      text: 'that at least the shadow of Peter passing by might fall on some of them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also a multitude gathered from the surrounding cities to Jerusalem, bringing '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:17, 18; (John 14:12)
      marker-yv: yv-n
    - type: text
      text: sick people and those who were tormented by unclean spirits, and they were all healed.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Imprisoned Apostles Freed
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 3:7; Acts 4:1, 2, 6
      marker-yv: yv-n
    - type: text
      text: 'Then the high priest rose up, and all those who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with him (which is the sect of the Sadducees), and they were filled with indignation, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 21:12; Acts 4:3; 16:37
      marker-yv: yv-n
    - type: text
      text: 'and laid their hands on the apostles and put them in the common prison. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But at night '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 1:20, 24; 2:13, 19; 28:2; Luke 1:11; 2:9; Acts 12:7; 16:26
      marker-yv: yv-n
    - type: text
      text: 'an angel of the Lord opened the prison doors and brought them out, and said, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he kept back '
    - type: usfm
      marker: it
      children:
      - type: text
        text: part
    - type: text
      text: ' of the proceeds, his wife also being aware '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' and brought a certain part and laid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' at the apostles’ feet. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go, stand in the temple and speak to the people '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 6:63, 68; 17:3; 1 John 5:11)
      marker-yv: yv-n
    - type: text
      text: all the words of this life.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that,
    - type: text
      text: ' they entered the temple early in the morning and taught. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:5, 6
      marker-yv: yv-n
    - type: text
      text: But the high priest and those with him came and called the council together, with all the elders of the children of Israel, and sent to the prison to have them brought.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Apostles on Trial Again
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the officers came and did not find them in the prison, they returned and reported, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, “Indeed we found the prison shut securely, and the guards standing outside before the doors; but when we opened them, we found no one inside!” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when the high priest, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 22:4; Acts 4:1; 5:26
      marker-yv: yv-n
    - type: text
      text: 'the captain of the temple, and the chief priests heard these things, they wondered what the outcome would be. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So one came and told them, saying, “Look, the men whom you put in prison are standing in the temple and teaching the people!”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the captain went with the officers and brought them without violence, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 21:26
      marker-yv: yv-n
    - type: text
      text: 'for they feared the people, lest they should be stoned. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they had brought them, they set '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' before the council. And the high priest asked them, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:17, 18
      marker-yv: yv-n
    - type: text
      text: '“Did we not strictly command you not to teach in this name? And look, you have filled Jerusalem with your doctrine, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:23, 36
      marker-yv: yv-n
    - type: text
      text: 'and intend to bring this Man’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 23:35
      marker-yv: yv-n
    - type: text
      text: blood on us!”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Peter and the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' apostles answered and said: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:19
      marker-yv: yv-n
    - type: text
      text: '“We ought to obey God rather than men. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 30:2; Deut. 23:21; Eccl. 5:4
      marker-yv: yv-n
    - type: text
      text: 'But Peter said, “Ananias, why has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 4:10; Luke 22:3; John 13:2, 27
      marker-yv: yv-n
    - type: text
      text: 'Satan filled your heart to lie to the Holy Spirit and keep back '
    - type: usfm
      marker: it
      children:
      - type: text
        text: part
    - type: text
      text: ' of the price of the land for yourself? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 3:13, 15
      marker-yv: yv-n
    - type: text
      text: 'The God of our fathers raised up Jesus whom you murdered by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 10:39; 13:29; (Gal. 3:13; 1 Pet. 2:24)
      marker-yv: yv-n
    - type: text
      text: 'hanging on a tree. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:19; (Acts 2:33, 36; Phil. 2:9–11)
      marker-yv: yv-n
    - type: text
      text: 'Him God has exalted to His right hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 3:15; Rev. 1:5
      marker-yv: yv-n
    - type: text
      text: 'Prince and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 1:21
      marker-yv: yv-n
    - type: text
      text: 'Savior, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:47; (Eph. 1:7; Col. 1:14)
      marker-yv: yv-n
    - type: text
      text: 'to give repentance to Israel and forgiveness of sins. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 15:26, 27; Acts 15:28; Rom. 8:16; Heb. 2:4
      marker-yv: yv-n
    - type: text
      text: 'we are His witnesses to these things, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so
    - type: text
      text: ' also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the Holy Spirit '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:4; 10:44
      marker-yv: yv-n
    - type: text
      text: whom God has given to those who obey Him.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gamaliel’s Advice
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this,
    - type: text
      text: ' they were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:37; 7:54
      marker-yv: yv-n
    - type: text
      text: 'furious and plotted to kill them. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then one in the council stood up, a Pharisee named '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 22:3
      marker-yv: yv-n
    - type: text
      text: 'Gamaliel, a teacher of the law held in respect by all the people, and commanded them to put the apostles outside for a little while. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to them: “Men of Israel, take heed to yourselves what you intend to do regarding these men. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For some time ago Theudas rose up, claiming to be somebody. A number of men, about four hundred, joined him. He was slain, and all who obeyed him were scattered and came to nothing. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this man, Judas of Galilee rose up in the days of the census, and drew away many people after him. He also perished, and all who obeyed him were dispersed. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now I say to you, keep away from these men and let them alone; for if this plan or this work is of men, it will come to nothing; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 21:15; 1 Cor. 1:25
      marker-yv: yv-n
    - type: text
      text: 'but if it is of God, you cannot overthrow it—lest you even be found '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 7:51; 9:5
      marker-yv: yv-n
    - type: text
      text: to fight against God.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While it remained, was it not your own? And after it was sold, was it not in your own control? Why have you conceived this thing in your heart? You have not lied to men but to God.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they agreed with him, and when they had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:18
      marker-yv: yv-n
    - type: text
      text: 'called for the apostles '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:17; Mark 13:9; Acts 16:22, 23; 21:32; 2 Cor. 11:25
      marker-yv: yv-n
    - type: text
      text: 'and beaten '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
    - type: text
      text: ' they commanded that they should not speak in the name of Jesus, and let them go. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they departed from the presence of the council, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 5:10–12; Rom. 5:3; 2 Cor. 12:10; Heb. 10:34; (James 1:2; 1 Pet. 4:13–16)
      marker-yv: yv-n
    - type: text
      text: 'rejoicing that they were counted worthy to suffer shame for His name. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And daily '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:46
      marker-yv: yv-n
    - type: text
      text: 'in the temple, and in every house, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:20, 29
      marker-yv: yv-n
    - type: text
      text: 'they did not cease teaching and preaching Jesus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' the Christ.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Ananias, hearing these words, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 11:13; Acts 5:10, 11
      marker-yv: yv-n
    - type: text
      text: 'fell down and breathed his last. So great fear came upon all those who heard these things. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the young men arose and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 19:40
      marker-yv: yv-n
    - type: text
      text: 'wrapped him up, carried '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' out, and buried '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it was about three hours later when his wife came in, not knowing what had happened. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Peter answered her, “Tell me whether you sold the land for so much?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: She said, “Yes, for so much.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Peter said to her, “How is it that you have agreed together '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 4:7; Acts 5:3, 4
      marker-yv: yv-n
    - type: text
      text: 'to test the Spirit of the Lord? Look, the feet of those who have buried your husband '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' at the door, and they will carry you out.” '
