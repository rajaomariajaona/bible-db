document_id: JER.41,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Insurrection Against Gedaliah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now it came to pass in the seventh month '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:25
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' Ishmael the son of Nethaniah, the son of Elishama, of the royal family and of the officers of the king, came with ten men to Gedaliah the son of Ahikam, at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 40:6, 10
      marker-yv: yv-n
    - type: text
      text: 'Mizpah. And there they ate bread together in Mizpah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then Ishmael carried away captive all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 40:11, 12
      marker-yv: yv-n
    - type: text
      text: 'rest of the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in Mizpah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 43:6
      marker-yv: yv-n
    - type: text
      text: 'the king’s daughters and all the people who remained in Mizpah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 40:7
      marker-yv: yv-n
    - type: text
      text: 'whom Nebuzaradan the captain of the guard had committed to Gedaliah the son of Ahikam. And Ishmael the son of Nethaniah carried them away captive and departed to go over to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 40:14
      marker-yv: yv-n
    - type: text
      text: the Ammonites.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But when '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 40:7, 8, 13–16
      marker-yv: yv-n
    - type: text
      text: 'Johanan the son of Kareah and all the captains of the forces that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with him heard of all the evil that Ishmael the son of Nethaniah had done, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'they took all the men and went to fight with Ishmael the son of Nethaniah; and they found him by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 2:13
      marker-yv: yv-n
    - type: text
      text: 'the great pool that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in Gibeon. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So it was, when all the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with Ishmael saw Johanan the son of Kareah, and all the captains of the forces who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, that they were glad. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then all the people whom Ishmael had carried away captive from Mizpah turned around and came back, and went to Johanan the son of Kareah. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: But Ishmael the son of Nethaniah escaped from Johanan with eight men and went to the Ammonites.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then Johanan the son of Kareah, and all the captains of the forces that were with him, took from Mizpah all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 40:11, 12; 43:4–7
      marker-yv: yv-n
    - type: text
      text: 'rest of the people whom he had recovered from Ishmael the son of Nethaniah after he had murdered Gedaliah the son of Ahikam—the mighty men of war and the women and the children and the eunuchs, whom he had brought back from Gibeon. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And they departed and dwelt in the habitation of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 19:37, 38
      marker-yv: yv-n
    - type: text
      text: 'Chimham, which is near Bethlehem, as they went on their way to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 43:7
      marker-yv: yv-n
    - type: text
      text: 'Egypt, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'because of the Chaldeans; for they were afraid of them, because Ishmael the son of Nethaniah had murdered Gedaliah the son of Ahikam, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 40:5
      marker-yv: yv-n
    - type: text
      text: whom the king of Babylon had made governor in the land.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then Ishmael the son of Nethaniah, and the ten men who were with him, arose and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 3:27; 20:9, 10; 2 Kin. 25:25; Ps. 41:9; 109:5; John 13:18
      marker-yv: yv-n
    - type: text
      text: 'struck Gedaliah the son of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 26:24
      marker-yv: yv-n
    - type: text
      text: 'Ahikam, the son of Shaphan, with the sword, and killed him whom the king of Babylon had made '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 40:5
      marker-yv: yv-n
    - type: text
      text: 'governor over the land. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ishmael also struck down all the Jews who were with him, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is,
    - type: text
      text: ' with Gedaliah at Mizpah, and the Chaldeans who were found there, the men of war.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And it happened, on the second day after he had killed Gedaliah, when as yet no one knew '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'that certain men came from Shechem, from Shiloh, and from Samaria, eighty men '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:27, 28; Deut. 14:1; Is. 15:2
      marker-yv: yv-n
    - type: text
      text: 'with their beards shaved and their clothes torn, having cut themselves, with offerings and incense in their hand, to bring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 1:7; 2 Kin. 25:9; Neh. 10:34, 35
      marker-yv: yv-n
    - type: text
      text: 'the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now Ishmael the son of Nethaniah went out from Mizpah to meet them, weeping as he went along; and it happened as he met them that he said to them, “Come to Gedaliah the son of Ahikam!” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So it was, when they came into the midst of the city, that Ishmael the son of Nethaniah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 55:23; Is. 59:7; Ezek. 22:27; 33:24, 26
      marker-yv: yv-n
    - type: text
      text: 'killed them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cast
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' into the midst of a pit, he and the men who were with him. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But ten men were found among them who said to Ishmael, “Do not kill us, for we have treasures of wheat, barley, oil, and honey in the field.” So he desisted and did not kill them among their brethren. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now the pit into which Ishmael had cast all the dead bodies of the men whom he had slain, because of Gedaliah, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:22; 2 Chr. 16:6
      marker-yv: yv-n
    - type: text
      text: 'the same one Asa the king had made for fear of Baasha king of Israel. Ishmael the son of Nethaniah filled it with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' slain. '
