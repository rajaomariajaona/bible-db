  - type: text
    content: are
  - type: text
    content: ' nothing. '
  '22':
  - type: text
    content: 'For '
  - type: note
    content: Is. 41:29; Jer. 16:19; Hab. 2:18; 1 Cor. 8:4
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' will not forsake '
  - type: note
    content: Deut. 31:6; 1 Kin. 6:13
  - type: text
    content: 'His people, '
  - type: note
    content: Is. 43:21
  - type: text
    content: 'for His great name’s sake, because '
  - type: note
    content: Ex. 32:12; Num. 14:13; Josh. 7:9; Ps. 106:8; Jer. 14:21
  - type: text
    content: 'it has pleased the '
  - type: heading
    content: Lord
  - type: text
    content: ' to make you His people. '
  '23':
  - type: text
    content: 'Moreover, as for me, far be it from me that I should sin against the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Deut. 7:6–11; 1 Pet. 2:9
  - type: text
    content: 'in ceasing to pray for you; but '
  - type: note
    content: Acts 12:5; Rom. 1:9; Col. 1:9; 2 Tim. 1:3
  - type: text
    content: 'I will teach you the '
  - type: note
    content: Ps. 34:11; Prov. 4:11
  - type: text
    content: 'good and the right way. '
  '24':
  - type: note
    content: 1 Kin. 8:36
  - type: text
    content: 'Only fear the '
  - type: heading
    content: Lord
  - type: text
    content: ', and serve Him in truth with all your heart; for '
  - type: note
    content: Eccl. 12:13
  - type: text
    content: 'consider what '
  - type: note
    content: Is. 5:12
  - type: text
    content: 'great things He has done for you. '
  '25':
  - type: text
    content: 'But if you still do wickedly, '
  - type: note
    content: Deut. 10:21
  - type: text
    content: 'you shall be swept away, '
  - type: note
    content: Josh. 24:20
  - type: text
    content: both you and your king.”
  '3':
  - type: text
    content: 'Here I am. Witness against me before the '
  - type: heading
    content: Lord
  - type: text
    content: ' and before '
  - type: note
    content: 1 Sam. 8:1, 5
  - type: text
    content: 'His anointed: '
  - type: note
    content: 1 Sam. 10:1; 24:6; 2 Sam. 1:14, 16
  - type: text
    content: 'Whose ox have I taken, or whose donkey have I taken, or whom have I cheated? Whom have I oppressed, or from whose hand have I received '
  - type: text
    content: any
  - type: text
    content: ' '
  - type: note
    content: Num. 16:15; Acts 20:33; 1 Thess. 2:5
  - type: text
    content: 'bribe with which to '
  - type: note
    content: Ex. 23:8
  - type: text
    content: 'blind my eyes? I will restore '
  - type: text
    content: it
  - type: text
    content: ' to you.”'
