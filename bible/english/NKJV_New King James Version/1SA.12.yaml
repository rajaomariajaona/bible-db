  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 2:23–25
  - type: text
    content: 'sent Moses and Aaron, who brought your fathers out of Egypt and made them dwell in this place. '
  '9':
  - type: text
    content: 'And when they '
  - type: note
    content: Ex. 3:10; 4:14–16
  - type: text
    content: 'forgot the '
  - type: heading
