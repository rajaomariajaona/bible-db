  - type: text
    content: 'that you have not found anything '
  - type: note
    content: John 18:38; Acts 23:9; 24:20
  - type: text
    content: in my hand.”
  - type: text
    content: And they answered, “
  - type: text
    content: He
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' witness.”'
  '6':
  - type: text
    content: 'Then Samuel said to the people, '
  - type: note
    content: Ex. 22:4
  - type: text
    content: “
  - type: text
    content: It
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' who raised up Moses and Aaron, and who brought your fathers up from the land of Egypt. '
  '7':
  - type: text
    content: 'Now therefore, stand still, that I may '
  - type: note
    content: Ex. 6:26; Mic. 6:4
  - type: text
    content: 'reason with you before the '
  - type: heading
    content: Lord
  - type: text
    content: ' concerning all the '
  - type: note
    content: Is. 1:18; Ezek. 20:35; Mic. 6:1–5
  - type: text
    content: 'righteous acts of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He did to you and your fathers: '
  '8':
  - type: note
    content: Judg. 5:11; Ps. 103:6
  - type: text
    content: 'When Jacob had gone into Egypt, and your fathers '
  - type: note
    content: Gen. 46:5, 6; Ps. 105:23
  - type: text
    content: 'cried out to the '
  - type: heading
