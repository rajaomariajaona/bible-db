verses:
  '1':
  - type: heading
    content: Samuel’s Address at Saul’s Coronation
  - type: text
    content: 'Now Samuel said to all Israel: “Indeed I have heeded '
  - type: note
    content: Josh. 8:31; 1 Sam. 10:8
  - type: text
    content: 'your voice in all that you said to me, and '
  - type: note
    content: 1 Sam. 8:5, 7, 9, 20, 22
  - type: text
    content: 'have made a king over you. '
  '10':
  - type: text
    content: 'Then they cried out to the '
  - type: heading
    content: Lord
  - type: text
    content: ', and said, '
  - type: note
    content: Judg. 3:12–30
  - type: text
    content: '‘We have sinned, because we have forsaken the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Judg. 10:10
  - type: text
    content: 'and served the Baals and Ashtoreths; but now deliver us from the hand of our enemies, and we will serve You.’ '
  '11':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' sent Jerubbaal, Bedan, '
  - type: note
    content: Judg. 2:13; 3:7
  - type: text
    content: 'Jephthah, and '
  - type: note
    content: Judg. 11:1
  - type: text
    content: 'Samuel, and delivered you out of the hand of your enemies on every side; and you dwelt in safety. '
  '12':
  - type: text
    content: 'And when you saw that '
  - type: note
    content: 1 Sam. 7:13
  - type: text
    content: 'Nahash king of the Ammonites came against you, '
  - type: note
    content: 1 Sam. 11:1, 2
  - type: text
    content: 'you said to me, ‘No, but a king shall reign over us,’ when '
  - type: note
    content: 1 Sam. 8:5, 19, 20
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: text
    content: was
  - type: text
    content: ' your king.'
  '13':
  - type: text
    content: '“Now therefore, '
  - type: note
    content: Judg. 8:23; 1 Sam. 8:7; Ps. 59:13
  - type: text
    content: 'here is the king '
  - type: note
    content: 1 Sam. 10:24
  - type: text
    content: 'whom you have chosen '
  - type: text
    content: and
  - type: text
    content: ' whom you have desired. And take note, '
  - type: note
    content: 1 Sam. 8:5; 12:17, 19
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' has set a king over you. '
  '14':
  - type: text
    content: 'If you '
  - type: note
    content: Hos. 13:11
  - type: text
    content: 'fear the '
  - type: heading
    content: Lord
  - type: text
    content: ' and serve Him and obey His voice, and do not rebel against the commandment of the '
  - type: heading
    content: Lord
  - type: text
    content: ', then both you and the king who reigns over you will continue following the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. '
  '15':
  - type: text
    content: 'However, if you do '
  - type: note
    content: Josh. 24:14
  - type: text
    content: 'not obey the voice of the '
  - type: heading
    content: Lord
  - type: text
    content: ', but '
  - type: note
    content: Deut. 28:15
  - type: text
    content: 'rebel against the commandment of the '
  - type: heading
    content: Lord
  - type: text
    content: ', then the hand of the '
  - type: heading
    content: Lord
  - type: text
    content: ' will be against you, as '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' against your fathers.'
  '16':
  - type: text
    content: '“Now therefore, '
  - type: note
    content: Lev. 26:14, 15; Josh. 24:20; Is. 1:20
  - type: text
    content: 'stand and see this great thing which the '
  - type: heading
    content: Lord
  - type: text
    content: ' will do before your eyes: '
  '17':
  - type: text
    content: Is
  - type: text
    content: ' today not the '
  - type: note
    content: Ex. 14:13, 31
  - type: text
    content: 'wheat harvest? '
  - type: note
    content: Gen. 30:14
  - type: text
    content: 'I will call to the '
  - type: heading
    content: Lord
  - type: text
    content: ', and He will send thunder and '
  - type: note
    content: Josh. 10:12; 1 Sam. 7:9, 10; (James 5:16–18)
  - type: text
    content: 'rain, that you may perceive and see that '
  - type: note
    content: Ezra 10:9
  - type: text
    content: 'your wickedness '
  - type: text
    content: is
  - type: text
    content: ' great, which you have done in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', in asking a king for yourselves.”'
  '18':
  - type: text
    content: 'So Samuel called to the '
  - type: heading
    content: Lord
  - type: text
    content: ', and the '
  - type: heading
    content: Lord
  - type: text
    content: ' sent thunder and rain that day; and '
  - type: note
    content: 1 Sam. 8:7
  - type: text
    content: 'all the people greatly feared the '
  - type: heading
    content: Lord
  - type: text
    content: ' and Samuel.'
  '19':
  - type: text
    content: 'And all the people said to Samuel, '
  - type: note
    content: Ex. 14:31
  - type: text
    content: '“Pray for your servants to the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, that we may not die; for we have added to all our sins the evil of asking a king for ourselves.”'
  '2':
  - type: text
    content: 'And now here is the king, '
  - type: note
    content: 1 Sam. 10:24; 11:14, 15
  - type: text
    content: 'walking before you; '
  - type: note
    content: Num. 27:17; 1 Sam. 8:20
  - type: text
    content: 'and I am old and grayheaded, and look, my sons '
  - type: text
    content: are
  - type: text
    content: ' with you. I have walked before you from my childhood to this day. '
  '20':
  - type: text
    content: 'Then Samuel said to the people, “Do not fear. You have done all this wickedness; '
  - type: note
    content: Ex. 9:28; 1 Sam. 7:8; (James 5:15; 1 John 5:16)
  - type: text
    content: 'yet do not turn aside from following the '
  - type: heading
    content: Lord
  - type: text
    content: ', but serve the '
  - type: heading
    content: Lord
  - type: text
    content: ' with all your heart. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 11:16
  - type: text
    content: 'do not turn aside; '
  - type: note
    content: 2 Chr. 25:15
  - type: text
    content: 'for '
  - type: text
    content: then
  - type: text
    content: ' '
  - type: text
