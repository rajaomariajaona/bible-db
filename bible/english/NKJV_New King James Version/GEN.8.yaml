segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Noah’s Deliverance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 19:29; Ex. 2:24; 1 Sam. 1:19; Ps. 105:42; 106:4
    marker-yv: yv-n
  - type: text
    text: 'remembered Noah, and every living thing, and all the animals that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' with him in the ark. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 14:21; 15:10; Job 12:15; Ps. 29:10; Is. 44:27; Nah. 1:4
    marker-yv: yv-n
  - type: text
    text: 'And God made a wind to pass over the earth, and the waters subsided. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 7:11
    marker-yv: yv-n
  - type: text
    text: 'The fountains of the deep and the windows of heaven were also '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 11:17
    marker-yv: yv-n
  - type: text
    text: 'stopped, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 7:4, 12; Job 38:37
    marker-yv: yv-n
  - type: text
    text: 'the rain from heaven was restrained. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the waters receded continually from the earth. At the end '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 7:24
    marker-yv: yv-n
  - type: text
    text: 'of the hundred and fifty days the waters decreased. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the ark rested in the seventh month, the seventeenth day of the month, on the mountains of Ararat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the waters decreased continually until the tenth month. In the tenth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: month,
  - type: text
    text: ' on the first '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month, the tops of the mountains were seen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So it came to pass, at the end of forty days, that Noah '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 6:16
    marker-yv: yv-n
  - type: text
    text: 'opened the window of the ark which he had made. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he sent out a raven, which kept going to and fro until the waters had dried up from the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He also sent out from himself a dove, to see if the waters had receded from the face of the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But the dove found no resting place for the sole of her foot, and she returned into the ark to him, for the waters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' on the face of the whole earth. So he put out his hand and took her, and drew her into the ark to himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he waited yet another seven days, and again he sent the dove out from the ark. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then the dove came to him in the evening, and behold, a freshly plucked olive leaf '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in her mouth; and Noah knew that the waters had receded from the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So he waited yet another seven days and sent out the dove, which did not return again to him anymore.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And it came to pass in the six hundred and first year, in the first '
  - type: usfm
    marker: it
    children:
    - type: text
      text: month,
  - type: text
    text: ' the first '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month, that the waters were dried up from the earth; and Noah removed the covering of the ark and looked, and indeed the surface of the ground was dry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And in the second month, on the twenty-seventh day of the month, the earth was dried.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then God spoke to Noah, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Go out of the ark, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 7:13
    marker-yv: yv-n
  - type: text
    text: 'you and your wife, and your sons and your sons’ wives with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Bring out with you every living thing of all flesh that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' with you: birds and cattle and every creeping thing that creeps on the earth, so that they may abound on the earth, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 1:22, 28; 9:1, 7
    marker-yv: yv-n
  - type: text
    text: 'be fruitful and multiply on the earth.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So Noah went out, and his sons and his wife and his sons’ wives with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Every animal, every creeping thing, every bird, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' whatever creeps on the earth, according to their families, went out of the ark.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Covenant with Creation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Noah built an '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 12:7; Ex. 29:18, 25
    marker-yv: yv-n
  - type: text
    text: 'altar to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and took of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 7:2; Lev. 11
    marker-yv: yv-n
  - type: text
    text: 'every clean animal and of every clean bird, and offered '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 22:2; Ex. 10:25
    marker-yv: yv-n
  - type: text
    text: 'burnt offerings on the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' smelled '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:18, 25; Lev. 1:9; Ezek. 20:41; 2 Cor. 2:15; Eph. 5:2
    marker-yv: yv-n
  - type: text
    text: 'a soothing aroma. Then the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said in His heart, “I will never again '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 3:17; 6:7, 13, 17; Is. 54:9
    marker-yv: yv-n
  - type: text
    text: 'curse the ground for man’s sake, although the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 6:5; 11:6; Job 14:4; Ps. 51:5; Jer. 17:9; Rom. 1:21; 3:23; Eph. 2:1–3
    marker-yv: yv-n
  - type: text
    text: 'imagination of man’s heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' evil from his youth; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 9:11, 15
    marker-yv: yv-n
  - type: text
    text: nor will I again destroy every living thing as I have done.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“While the earth '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 54:9
    marker-yv: yv-n
  - type: text
    text: remains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Seedtime and harvest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cold and heat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Winter and summer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 74:16; Jer. 33:20, 25
    marker-yv: yv-n
  - type: text
    text: day and night
- type: usfm
