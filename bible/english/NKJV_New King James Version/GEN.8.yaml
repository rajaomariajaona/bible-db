  - type: text
    content: day and night
  - type: text
    content: Shall not cease.”
  '3':
  - type: text
    content: 'And the waters receded continually from the earth. At the end '
  - type: note
    content: Gen. 7:24
  - type: text
    content: 'of the hundred and fifty days the waters decreased. '
  '4':
  - type: text
    content: 'Then the ark rested in the seventh month, the seventeenth day of the month, on the mountains of Ararat. '
  '5':
  - type: text
    content: 'And the waters decreased continually until the tenth month. In the tenth '
  - type: text
    content: month,
  - type: text
    content: ' on the first '
  - type: text
    content: day
  - type: text
    content: ' of the month, the tops of the mountains were seen.'
  '6':
  - type: text
    content: 'So it came to pass, at the end of forty days, that Noah '
  - type: note
    content: Gen. 6:16
  - type: text
    content: 'opened the window of the ark which he had made. '
  '7':
  - type: text
    content: 'Then he sent out a raven, which kept going to and fro until the waters had dried up from the earth. '
  '8':
  - type: text
    content: 'He also sent out from himself a dove, to see if the waters had receded from the face of the ground. '
  '9':
  - type: text
    content: 'But the dove found no resting place for the sole of her foot, and she returned into the ark to him, for the waters '
  - type: text
    content: were
  - type: text
    content: ' on the face of the whole earth. So he put out his hand and took her, and drew her into the ark to himself. '
