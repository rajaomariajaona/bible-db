  '1':
  - type: heading
    content: Noah’s Deliverance
  - type: text
    content: 'Then God '
  - type: note
    content: Gen. 19:29; Ex. 2:24; 1 Sam. 1:19; Ps. 105:42; 106:4
  - type: text
    content: 'remembered Noah, and every living thing, and all the animals that '
  - type: text
    content: were
  - type: text
    content: ' with him in the ark. '
  - type: note
    content: Ex. 14:21; 15:10; Job 12:15; Ps. 29:10; Is. 44:27; Nah. 1:4
  - type: text
    content: 'And God made a wind to pass over the earth, and the waters subsided. '
  '10':
  - type: text
    content: 'And he waited yet another seven days, and again he sent the dove out from the ark. '
  '11':
  - type: text
    content: 'Then the dove came to him in the evening, and behold, a freshly plucked olive leaf '
  - type: text
    content: was
  - type: text
    content: ' in her mouth; and Noah knew that the waters had receded from the earth. '
  '12':
  - type: text
    content: So he waited yet another seven days and sent out the dove, which did not return again to him anymore.
  '13':
  - type: text
    content: 'And it came to pass in the six hundred and first year, in the first '
  - type: text
    content: month,
  - type: text
    content: ' the first '
  - type: text
    content: day
  - type: text
    content: ' of the month, that the waters were dried up from the earth; and Noah removed the covering of the ark and looked, and indeed the surface of the ground was dry. '
  '14':
  - type: text
    content: And in the second month, on the twenty-seventh day of the month, the earth was dried.
  '15':
  - type: text
    content: 'Then God spoke to Noah, saying, '
  '16':
  - type: text
    content: '“Go out of the ark, '
  - type: note
    content: Gen. 7:13
  - type: text
    content: 'you and your wife, and your sons and your sons’ wives with you. '
  '17':
  - type: text
    content: 'Bring out with you every living thing of all flesh that '
  - type: text
    content: is
  - type: text
    content: ' with you: birds and cattle and every creeping thing that creeps on the earth, so that they may abound on the earth, and '
  - type: note
    content: Gen. 1:22, 28; 9:1, 7
  - type: text
    content: 'be fruitful and multiply on the earth.” '
  '18':
  - type: text
    content: 'So Noah went out, and his sons and his wife and his sons’ wives with him. '
  '19':
  - type: text
    content: 'Every animal, every creeping thing, every bird, '
  - type: text
    content: and
  - type: text
    content: ' whatever creeps on the earth, according to their families, went out of the ark.'
  - type: heading
    content: God’s Covenant with Creation
