document_id: 2CO.2,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'But I determined this within myself, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 1:23
      marker-yv: yv-n
    - type: text
      text: 'that I would not come again to you in sorrow. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now whom you forgive anything, I also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: forgive
    - type: text
      text: '. For if indeed I have forgiven anything, I have forgiven that one for your sakes in the presence of Christ, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: lest Satan should take advantage of us; for we are not ignorant of his devices.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Triumph in Christ
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Furthermore, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 16:8
      marker-yv: yv-n
    - type: text
      text: 'when I came to Troas to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: preach
    - type: text
      text: ' Christ’s gospel, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:9
      marker-yv: yv-n
    - type: text
      text: 'a door was opened to me by the Lord, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 7:6, 13; 8:6; Gal. 2:1, 3; 2 Tim. 4:10; Titus 1:4
      marker-yv: yv-n
    - type: text
      text: I had no rest in my spirit, because I did not find Titus my brother; but taking my leave of them, I departed for Macedonia.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' to God who always leads us in triumph in Christ, and through us diffuses the fragrance of His knowledge in every place. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For we are to God the fragrance of Christ '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 1:18)
      marker-yv: yv-n
    - type: text
      text: 'among those who are being saved and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 4:3)
      marker-yv: yv-n
    - type: text
      text: 'among those who are perishing. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 2:34; (John 9:39; 1 Pet. 2:7)
      marker-yv: yv-n
    - type: text
      text: 'To the one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the aroma of death '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leading
    - type: text
      text: ' to death, and to the other the aroma of life '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leading
    - type: text
      text: ' to life. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 15:10)
      marker-yv: yv-n
    - type: text
      text: 'who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' sufficient for these things? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For we are not, as so many, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Pet. 2:3
      marker-yv: yv-n
    - type: text
      text: 'peddling the word of God; but as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 5:8; 2 Cor. 1:12; 1 Thess. 2:4; 1 Pet. 4:11
      marker-yv: yv-n
    - type: text
      text: of sincerity, but as from God, we speak in the sight of God in Christ.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For if I make you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 7:8
      marker-yv: yv-n
    - type: text
      text: sorrowful, then who is he who makes me glad but the one who is made sorrowful by me?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Forgive the Offender
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And I wrote this very thing to you, lest, when I came, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 4:21; 2 Cor. 12:21
      marker-yv: yv-n
    - type: text
      text: 'I should have sorrow over those from whom I ought to have joy, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 8:22; Gal. 5:10; 2 Thess. 3:4; Philem. 21
      marker-yv: yv-n
    - type: text
      text: 'having confidence in you all that my joy is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: joy
    - type: text
      text: ' of you all. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For out of much affliction and anguish of heart I wrote to you, with many tears, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 2:9; 7:8, 12)
      marker-yv: yv-n
    - type: text
      text: not that you should be grieved, but that you might know the love which I have so abundantly for you.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 5:1)
      marker-yv: yv-n
    - type: text
      text: 'if anyone has caused grief, he has not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 4:12
      marker-yv: yv-n
    - type: text
      text: 'grieved me, but all of you to some extent—not to be too severe. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'This punishment which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: inflicted
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 5:4, 5; 2 Cor. 7:11; 1 Tim. 5:20
      marker-yv: yv-n
    - type: text
      text: 'by the majority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' sufficient for such a man, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 6:1; Eph. 4:32
      marker-yv: yv-n
    - type: text
      text: 'so that, on the contrary, you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ought
    - type: text
      text: ' rather to forgive and comfort '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ', lest perhaps such a one be swallowed up with too much sorrow. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Therefore I urge you to reaffirm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' love to him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For to this end I also wrote, that I might put you to the test, whether you are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 7:15; 10:6
      marker-yv: yv-n
    - type: text
      text: 'obedient in all things. '
