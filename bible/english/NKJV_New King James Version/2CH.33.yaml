document_id: 2CH.33,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manasseh Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manasseh '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 21:1–9
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' twelve years old when he became king, and he reigned fifty-five years in Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Manasseh and his people, but they would not listen. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:36
      marker-yv: yv-n
    - type: text
      text: 'Therefore the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought upon them the captains of the army of the king of Assyria, who took Manasseh with hooks, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 36:6; Job 36:8; Ps. 107:10, 11
      marker-yv: yv-n
    - type: text
      text: 'bound him with bronze '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fetters,
    - type: text
      text: ' and carried him off to Babylon. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when he was in affliction, he implored the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 7:14; 32:26; (1 Pet. 5:6)
      marker-yv: yv-n
    - type: text
      text: 'humbled himself greatly before the God of his fathers, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and prayed to Him; and He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 5:20; Ezra 8:23
      marker-yv: yv-n
    - type: text
      text: 'received his entreaty, heard his supplication, and brought him back to Jerusalem into his kingdom. Then Manasseh '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 20:13; Ps. 9:16; Dan. 4:25
      marker-yv: yv-n
    - type: text
      text: 'knew that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' God.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this he built a wall outside the City of David on the west side of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 1:33
      marker-yv: yv-n
    - type: text
      text: 'Gihon, in the valley, as far as the entrance of the Fish Gate; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 27:3
      marker-yv: yv-n
    - type: text
      text: 'enclosed Ophel, and he raised it to a very great height. Then he put military captains in all the fortified cities of Judah. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He took away '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 33:3, 5, 7
      marker-yv: yv-n
    - type: text
      text: 'the foreign gods and the idol from the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and all the altars that he had built in the mount of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and in Jerusalem; and he cast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' out of the city. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also repaired the altar of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', sacrificed peace offerings and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:12
      marker-yv: yv-n
    - type: text
      text: 'thank offerings on it, and commanded Judah to serve the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 32:12
      marker-yv: yv-n
    - type: text
      text: 'Nevertheless the people still sacrificed on the high places, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' only to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Death of Manasseh
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Manasseh, his prayer to his God, and the words of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 9:9
      marker-yv: yv-n
    - type: text
      text: 'the seers who spoke to him in the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel, indeed they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: written
    - type: text
      text: ' in the book of the kings of Israel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also his prayer and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: how
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' received his entreaty, and all his sin and trespass, and the sites where he built high places and set up wooden images and carved images, before he was humbled, indeed they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' written among the sayings of Hozai. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', according to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 18:9–12); 2 Chr. 28:3; (Jer. 15:4)
      marker-yv: yv-n
    - type: text
      text: 'abominations of the nations whom the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had cast out before the children of Israel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 1:21; 2 Kin. 21:18
      marker-yv: yv-n
    - type: text
      text: So Manasseh rested with his fathers, and they buried him in his own house. Then his son Amon reigned in his place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amon’s Reign and Death
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 21:19–24; 1 Chr. 3:14
      marker-yv: yv-n
    - type: text
      text: 'Amon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty-two years old when he became king, and he reigned two years in Jerusalem. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', as his father Manasseh had done; for Amon sacrificed to all the carved images which his father Manasseh had made, and served them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did not humble himself before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 33:12, 19
      marker-yv: yv-n
    - type: text
      text: as his father Manasseh had humbled himself; but Amon trespassed more and more.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 21:23, 24; 2 Chr. 24:25
      marker-yv: yv-n
    - type: text
      text: 'Then his servants conspired against him, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 25:27
      marker-yv: yv-n
    - type: text
      text: 'killed him in his own house. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the people of the land executed all those who had conspired against King Amon. Then the people of the land made his son Josiah king in his place.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he rebuilt the high places which Hezekiah his father had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 18:4; 2 Chr. 30:14; 31:1
      marker-yv: yv-n
    - type: text
      text: 'broken down; he raised up altars for the Baals, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 16:21; 2 Kin. 23:5, 6
      marker-yv: yv-n
    - type: text
      text: 'made wooden images; and he worshiped '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 17:3
      marker-yv: yv-n
    - type: text
      text: 'all the host of heaven and served them. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also built altars in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', of which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:11; 1 Kin. 8:29; 9:3; 2 Chr. 6:6; 7:16
      marker-yv: yv-n
    - type: text
      text: '“In Jerusalem shall My name be forever.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he built altars for all the host of heaven '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 4:9
      marker-yv: yv-n
    - type: text
      text: 'in the two courts of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Lev. 18:21); Deut. 18:10; 2 Kin. 23:10; 2 Chr. 28:3; Ezek. 23:37, 39
      marker-yv: yv-n
    - type: text
      text: 'Also he caused his sons to pass through the fire in the Valley of the Son of Hinnom; he practiced '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 18:11; 2 Kin. 17:17
      marker-yv: yv-n
    - type: text
      text: 'soothsaying, used witchcraft and sorcery, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Lev. 19:31; 20:27); 2 Kin. 21:6
      marker-yv: yv-n
    - type: text
      text: 'consulted mediums and spiritists. He did much evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to provoke Him to anger. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 21:7; 2 Chr. 25:14
      marker-yv: yv-n
    - type: text
      text: 'He even set a carved image, the idol which he had made, in the house of God, of which God had said to David and to Solomon his son, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 132:14
      marker-yv: yv-n
    - type: text
      text: '“In this house and in Jerusalem, which I have chosen out of all the tribes of Israel, I will put My name forever; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:10
      marker-yv: yv-n
    - type: text
      text: 'and I will not again remove the foot of Israel from the land which I have appointed for your fathers—only if they are careful to do all that I have commanded them, according to the whole law and the statutes and the ordinances by the hand of Moses.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Manasseh seduced Judah and the inhabitants of Jerusalem to do more evil than the nations whom the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had destroyed before the children of Israel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manasseh Restored After Repentance
    marker-yv: yv-h
