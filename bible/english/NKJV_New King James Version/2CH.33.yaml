document_id: 2CH.33,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Manasseh Reigns in Judah
  - type: text
    content: 'Manasseh '
  - type: note
    content: 2 Kin. 21:1–9
  - type: text
    content: was
  - type: text
    content: ' twelve years old when he became king, and he reigned fifty-five years in Jerusalem. '
  '10':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Manasseh and his people, but they would not listen. '
  '11':
  - type: note
    content: Deut. 28:36
  - type: text
    content: 'Therefore the '
  - type: heading
    content: Lord
  - type: text
    content: ' brought upon them the captains of the army of the king of Assyria, who took Manasseh with hooks, '
  - type: note
    content: 2 Chr. 36:6; Job 36:8; Ps. 107:10, 11
  - type: text
    content: 'bound him with bronze '
  - type: text
    content: fetters,
  - type: text
    content: ' and carried him off to Babylon. '
  '12':
  - type: text
    content: 'Now when he was in affliction, he implored the '
  - type: heading
    content: Lord
  - type: text
    content: ' his God, and '
  - type: note
    content: 2 Chr. 7:14; 32:26; (1 Pet. 5:6)
  - type: text
    content: 'humbled himself greatly before the God of his fathers, '
  '13':
  - type: text
    content: 'and prayed to Him; and He '
  - type: note
    content: 1 Chr. 5:20; Ezra 8:23
  - type: text
    content: 'received his entreaty, heard his supplication, and brought him back to Jerusalem into his kingdom. Then Manasseh '
  - type: note
    content: 1 Kin. 20:13; Ps. 9:16; Dan. 4:25
  - type: text
    content: 'knew that the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' God.'
  '14':
  - type: text
    content: 'After this he built a wall outside the City of David on the west side of '
  - type: note
    content: 1 Kin. 1:33
  - type: text
    content: 'Gihon, in the valley, as far as the entrance of the Fish Gate; and '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 27:3
  - type: text
    content: 'enclosed Ophel, and he raised it to a very great height. Then he put military captains in all the fortified cities of Judah. '
  '15':
  - type: text
    content: 'He took away '
  - type: note
    content: 2 Chr. 33:3, 5, 7
  - type: text
    content: 'the foreign gods and the idol from the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and all the altars that he had built in the mount of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and in Jerusalem; and he cast '
  - type: text
    content: them
  - type: text
    content: ' out of the city. '
  '16':
  - type: text
    content: 'He also repaired the altar of the '
  - type: heading
    content: Lord
  - type: text
    content: ', sacrificed peace offerings and '
  - type: note
    content: Lev. 7:12
  - type: text
    content: 'thank offerings on it, and commanded Judah to serve the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel. '
  '17':
  - type: note
    content: 2 Chr. 32:12
  - type: text
    content: 'Nevertheless the people still sacrificed on the high places, '
  - type: text
    content: but
  - type: text
    content: ' only to the '
  - type: heading
    content: Lord
  - type: text
    content: ' their God.'
  - type: heading
    content: Death of Manasseh
  '18':
  - type: text
    content: 'Now the rest of the acts of Manasseh, his prayer to his God, and the words of '
  - type: note
    content: 1 Sam. 9:9
  - type: text
    content: 'the seers who spoke to him in the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel, indeed they '
  - type: text
    content: are
  - type: text
    content: ' '
  - type: text
    content: written
  - type: text
    content: ' in the book of the kings of Israel. '
  '19':
  - type: text
    content: 'Also his prayer and '
  - type: text
    content: how
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' received his entreaty, and all his sin and trespass, and the sites where he built high places and set up wooden images and carved images, before he was humbled, indeed they '
  - type: text
    content: are
  - type: text
    content: ' written among the sayings of Hozai. '
  '2':
  - type: text
    content: 'But he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', according to the '
  - type: note
    content: (Deut. 18:9–12); 2 Chr. 28:3; (Jer. 15:4)
  - type: text
    content: 'abominations of the nations whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' had cast out before the children of Israel. '
  '20':
  - type: note
    content: 1 Kin. 1:21; 2 Kin. 21:18
  - type: text
    content: So Manasseh rested with his fathers, and they buried him in his own house. Then his son Amon reigned in his place.
  - type: heading
    content: Amon’s Reign and Death
  '21':
  - type: note
    content: 2 Kin. 21:19–24; 1 Chr. 3:14
  - type: text
    content: 'Amon '
  - type: text
    content: was
  - type: text
    content: ' twenty-two years old when he became king, and he reigned two years in Jerusalem. '
  '22':
  - type: text
    content: 'But he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', as his father Manasseh had done; for Amon sacrificed to all the carved images which his father Manasseh had made, and served them. '
  '23':
  - type: text
    content: 'And he did not humble himself before the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 2 Chr. 33:12, 19
  - type: text
    content: as his father Manasseh had humbled himself; but Amon trespassed more and more.
  '24':
  - type: note
    content: 2 Kin. 21:23, 24; 2 Chr. 24:25
  - type: text
    content: 'Then his servants conspired against him, and '
  - type: note
    content: 2 Chr. 25:27
  - type: text
    content: 'killed him in his own house. '
  '25':
  - type: text
    content: But the people of the land executed all those who had conspired against King Amon. Then the people of the land made his son Josiah king in his place.
  '3':
  - type: text
    content: 'For he rebuilt the high places which Hezekiah his father had '
  - type: note
    content: 2 Kin. 18:4; 2 Chr. 30:14; 31:1
  - type: text
    content: 'broken down; he raised up altars for the Baals, and '
  - type: note
    content: Deut. 16:21; 2 Kin. 23:5, 6
  - type: text
    content: 'made wooden images; and he worshiped '
  - type: note
    content: Deut. 17:3
  - type: text
    content: 'all the host of heaven and served them. '
  '4':
  - type: text
    content: 'He also built altars in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', of which the '
  - type: heading
    content: Lord
  - type: text
    content: ' had said, '
  - type: note
    content: Deut. 12:11; 1 Kin. 8:29; 9:3; 2 Chr. 6:6; 7:16
  - type: text
    content: '“In Jerusalem shall My name be forever.” '
  '5':
  - type: text
    content: 'And he built altars for all the host of heaven '
  - type: note
    content: 2 Chr. 4:9
  - type: text
    content: 'in the two courts of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: note
    content: (Lev. 18:21); Deut. 18:10; 2 Kin. 23:10; 2 Chr. 28:3; Ezek. 23:37, 39
  - type: text
    content: 'Also he caused his sons to pass through the fire in the Valley of the Son of Hinnom; he practiced '
  - type: note
    content: Deut. 18:11; 2 Kin. 17:17
  - type: text
    content: 'soothsaying, used witchcraft and sorcery, and '
  - type: note
    content: (Lev. 19:31; 20:27); 2 Kin. 21:6
  - type: text
    content: 'consulted mediums and spiritists. He did much evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', to provoke Him to anger. '
  '7':
  - type: note
    content: 2 Kin. 21:7; 2 Chr. 25:14
  - type: text
    content: 'He even set a carved image, the idol which he had made, in the house of God, of which God had said to David and to Solomon his son, '
  - type: note
    content: Ps. 132:14
  - type: text
    content: '“In this house and in Jerusalem, which I have chosen out of all the tribes of Israel, I will put My name forever; '
  '8':
  - type: note
    content: 2 Sam. 7:10
  - type: text
    content: 'and I will not again remove the foot of Israel from the land which I have appointed for your fathers—only if they are careful to do all that I have commanded them, according to the whole law and the statutes and the ordinances by the hand of Moses.” '
  '9':
  - type: text
    content: 'So Manasseh seduced Judah and the inhabitants of Jerusalem to do more evil than the nations whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' had destroyed before the children of Israel.'
  - type: heading
    content: Manasseh Restored After Repentance
