  '27':
  - type: text
    content: 'And the satraps, administrators, governors, and the king’s counselors gathered together, and they saw these men '
  - type: note
    content: (Is. 43:2); Heb. 11:34
  - type: text
    content: on whose bodies the fire had no power; the hair of their head was not singed nor were their garments affected, and the smell of fire was not on them.
  '28':
  - type: text
    content: 'Nebuchadnezzar spoke, saying, “Blessed be the God of Shadrach, Meshach, and Abed-Nego, who sent His '
  - type: note
    content: (Ps. 34:7, 8); Is. 37:36; (Jer. 17:7); Dan. 6:22, 23; Acts 5:19; 12:7
  - type: text
    content: 'Angel and delivered His servants who trusted in Him, and they have frustrated the king’s word, and yielded their bodies, that they should not serve nor worship any god except their own God! '
  '29':
  - type: note
    content: Dan. 6:26
  - type: text
    content: 'Therefore I make a decree that any people, nation, or language which speaks anything amiss against the '
  - type: note
