  children:
  - type: text
    text: The Image of Gold
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nebuchadnezzar the king made an image of gold, whose height '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' sixty cubits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' its width six cubits. He set it up in the plain of Dura, in the province of Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And King Nebuchadnezzar sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to gather together the satraps, the administrators, the governors, the counselors, the treasurers, the judges, the magistrates, and all the officials of the provinces, to come to the dedication of the image which King Nebuchadnezzar had set up. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So the satraps, the administrators, the governors, the counselors, the treasurers, the judges, the magistrates, and all the officials of the provinces gathered together for the dedication of the image that King Nebuchadnezzar had set up; and they stood before the image that Nebuchadnezzar had set up. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then a herald cried aloud: “To you it is commanded, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 4:1; 6:25
    marker-yv: yv-n
  - type: text
    text: 'O peoples, nations, and languages, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' at the time you hear the sound of the horn, flute, harp, lyre, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' psaltery, in symphony with all kinds of music, you shall fall down and worship the gold image that King Nebuchadnezzar has set up; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and whoever does not fall down and worship shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 29:22; Ezek. 22:18–22; Matt. 13:42, 50; Rev. 9:2; 13:15; 14:11
    marker-yv: yv-n
  - type: text
    text: be cast immediately into the midst of a burning fiery furnace.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So at that time, when all the people heard the sound of the horn, flute, harp, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lyre, in symphony with all kinds of music, all the people, nations, and languages fell down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshiped the gold image which King Nebuchadnezzar had set up.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Daniel’s Friends Disobey the King
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore at that time certain Chaldeans '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezra 4:12–16; Esth. 3:8, 9; Dan. 6:12, 13
    marker-yv: yv-n
  - type: text
    text: 'came forward and accused the Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They spoke and said to King Nebuchadnezzar, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 2:4; 5:10; 6:6, 21
    marker-yv: yv-n
  - type: text
    text: '“O king, live forever! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'You, O king, have made a decree that everyone who hears the sound of the horn, flute, harp, lyre, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' psaltery, in symphony with all kinds of music, shall fall down and worship the gold image; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and whoever does not fall down and worship shall be cast into the midst of a burning fiery furnace. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 2:49
    marker-yv: yv-n
  - type: text
    text: 'There are certain Jews whom you have set over the affairs of the province of Babylon: Shadrach, Meshach, and Abed-Nego; these men, O king, have '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 1:8; 6:12, 13
    marker-yv: yv-n
  - type: text
    text: not paid due regard to you. They do not serve your gods or worship the gold image which you have set up.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Nebuchadnezzar, in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 2:12; 3:19
    marker-yv: yv-n
  - type: text
    text: 'rage and fury, gave the command to bring Shadrach, Meshach, and Abed-Nego. So they brought these men before the king. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nebuchadnezzar spoke, saying to them, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' true, Shadrach, Meshach, and Abed-Nego, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' you do not serve my gods or worship the gold image which I have set up? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now if you are ready at the time you hear the sound of the horn, flute, harp, lyre, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' psaltery, in symphony with all kinds of music, and you fall down and worship the image which I have made, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 32:32; Luke 13:9
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: good!
  - type: text
    text: ' But if you do not worship, you shall be cast immediately into the midst of a burning fiery furnace. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 5:2; 2 Kin. 18:35; Is. 36:18–20; Dan. 2:47
    marker-yv: yv-n
  - type: text
    text: 'And who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the god who will deliver you from my hands?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Shadrach, Meshach, and Abed-Nego answered and said to the king, “O Nebuchadnezzar, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Matt. 10:19)
    marker-yv: yv-n
  - type: text
    text: 'we have no need to answer you in this matter. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'If that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: case,
  - type: text
    text: ' our '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 5:19; (Ps. 27:1, 2; Is. 26:3, 4); Jer. 1:8; 15:20, 21; Dan. 6:19–22
    marker-yv: yv-n
  - type: text
    text: 'God whom we serve is able to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 17:37; Jer. 1:8; 15:20, 21; 42:11; Dan. 6:16, 19–22; Mic. 7:7; 2 Cor. 1:10
    marker-yv: yv-n
  - type: text
    text: 'deliver us from the burning fiery furnace, and He will deliver '
  - type: usfm
    marker: it
    children:
    - type: text
      text: us
  - type: text
    text: ' from your hand, O king. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But if not, let it be known to you, O king, that we do not serve your gods, nor will we '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 13:15
    marker-yv: yv-n
  - type: text
    text: worship the gold image which you have set up.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saved in Fiery Trial
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Nebuchadnezzar was full of fury, and the expression on his face changed toward Shadrach, Meshach, and Abed-Nego. He spoke and commanded that they heat the furnace seven times more than it was usually heated. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he commanded certain mighty men of valor who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in his army to bind Shadrach, Meshach, and Abed-Nego, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' into the burning fiery furnace. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then these men were bound in their coats, their trousers, their turbans, and their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' garments, and were cast into the midst of the burning fiery furnace. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Therefore, because the king’s command was urgent, and the furnace exceedingly hot, the flame of the fire killed those men who took up Shadrach, Meshach, and Abed-Nego. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And these three men, Shadrach, Meshach, and Abed-Nego, fell down bound into the midst of the burning fiery furnace.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then King Nebuchadnezzar was astonished; and he rose in haste '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spoke, saying to his counselors, “Did we not cast three men bound into the midst of the fire?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: They answered and said to the king, “True, O king.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“Look!” he answered, “I see four men loose, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 91:3–9); Is. 43:2
    marker-yv: yv-n
  - type: text
    text: 'walking in the midst of the fire; and they are not hurt, and the form of the fourth is like '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 1:6; 38:7; (Ps. 34:7); Dan. 3:28
    marker-yv: yv-n
  - type: text
    text: the Son of God.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nebuchadnezzar Praises God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then Nebuchadnezzar went near the mouth of the burning fiery furnace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spoke, saying, “Shadrach, Meshach, and Abed-Nego, servants of the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Dan. 4:2, 3, 17, 34, 35)
    marker-yv: yv-n
  - type: text
    text: 'Most High God, come out, and come '
  - type: usfm
    marker: it
    children:
    - type: text
      text: here.
  - type: text
    text: '” Then Shadrach, Meshach, and Abed-Nego came from the midst of the fire. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And the satraps, administrators, governors, and the king’s counselors gathered together, and they saw these men '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 43:2); Heb. 11:34
    marker-yv: yv-n
  - type: text
    text: on whose bodies the fire had no power; the hair of their head was not singed nor were their garments affected, and the smell of fire was not on them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nebuchadnezzar spoke, saying, “Blessed be the God of Shadrach, Meshach, and Abed-Nego, who sent His '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 34:7, 8); Is. 37:36; (Jer. 17:7); Dan. 6:22, 23; Acts 5:19; 12:7
    marker-yv: yv-n
  - type: text
    text: 'Angel and delivered His servants who trusted in Him, and they have frustrated the king’s word, and yielded their bodies, that they should not serve nor worship any god except their own God! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 6:26
    marker-yv: yv-n
  - type: text
    text: 'Therefore I make a decree that any people, nation, or language which speaks anything amiss against the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 2:46, 47; 4:34–37
    marker-yv: yv-n
  - type: text
    text: 'God of Shadrach, Meshach, and Abed-Nego shall be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezra 6:11; Dan. 2:5
    marker-yv: yv-n
  - type: text
    text: 'cut in pieces, and their houses shall be made an ash heap; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 6:27
    marker-yv: yv-n
  - type: text
    text: because there is no other God who can deliver like this.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Then the king promoted Shadrach, Meshach, and Abed-Nego in the province of Babylon.
