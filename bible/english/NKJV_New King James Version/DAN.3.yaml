  - type: text
    content: 'cut in pieces, and their houses shall be made an ash heap; '
  - type: note
    content: Dan. 6:27
  - type: text
    content: because there is no other God who can deliver like this.”
  '3':
  - type: text
    content: 'So the satraps, the administrators, the governors, the counselors, the treasurers, the judges, the magistrates, and all the officials of the provinces gathered together for the dedication of the image that King Nebuchadnezzar had set up; and they stood before the image that Nebuchadnezzar had set up. '
  '30':
  - type: text
    content: Then the king promoted Shadrach, Meshach, and Abed-Nego in the province of Babylon.
