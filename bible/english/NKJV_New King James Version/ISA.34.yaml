document_id: ISA.34,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment on the Nations
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Come '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 49:1; Is. 41:1; 43:9
      marker-yv: yv-n
    - type: text
      text: near, you nations, to hear;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And heed, you people!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:1; Is. 1:2
      marker-yv: yv-n
    - type: text
      text: Let the earth hear, and all that is in it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The world and all things that come forth from it.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It shall not be quenched night or day;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 14:11; 18:18; 19:3
      marker-yv: yv-n
    - type: text
      text: Its smoke shall ascend forever.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 13:20–22; 24:1; 34:10–15; Mal. 1:3, 4
      marker-yv: yv-n
    - type: text
      text: From generation to generation it shall lie waste;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one shall pass through it forever and ever.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 14:23; Zeph. 2:14; Rev. 18:2
      marker-yv: yv-n
    - type: text
      text: But the pelican and the porcupine shall possess it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Also the owl and the raven shall dwell in it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 21:13; Lam. 2:8
      marker-yv: yv-n
    - type: text
      text: He shall stretch out over it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The line of confusion and the stones of emptiness.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They shall call its nobles to the kingdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But none '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' there, and all its princes shall be nothing.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 32:13; Hos. 9:6
      marker-yv: yv-n
    - type: text
      text: thorns shall come up in its palaces,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nettles and brambles in its fortresses;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 13:21
      marker-yv: yv-n
    - type: text
      text: It shall be a habitation of jackals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A courtyard for ostriches.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The wild beasts of the desert shall also meet with the jackals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the wild goat shall bleat to its companion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Also the night creature shall rest there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And find for herself a place of rest.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'There the arrow snake shall make her nest and lay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: eggs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And hatch, and gather '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' under her shadow;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There also shall the hawks be gathered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Every one with her mate.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Search from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Mal. 3:16)
      marker-yv: yv-n
    - type: text
      text: 'the book of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and read:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Not one of these shall fail;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Not one shall lack her mate.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For My mouth has commanded it, and His Spirit has gathered them.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has cast the lot for them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And His hand has divided it among them with a measuring line.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They shall possess it forever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From generation to generation they shall dwell in it.”
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the indignation of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is against all nations,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' fury against all their armies;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has utterly destroyed them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He has given them over to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 13:5
      marker-yv: yv-n
    - type: text
      text: slaughter.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Also their slain shall be thrown out;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Joel 2:20; Amos 4:10
      marker-yv: yv-n
    - type: text
      text: Their stench shall rise from their corpses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the mountains shall be melted with their blood.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 102:26; Is. 13:13; Ezek. 32:7, 8; Joel 2:31; Matt. 24:29; 2 Pet. 3:10
      marker-yv: yv-n
    - type: text
      text: All the host of heaven shall be dissolved,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the heavens shall be rolled up like a scroll;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 14:12
      marker-yv: yv-n
    - type: text
      text: All their host shall fall down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As the leaf falls from the vine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 6:12–14
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: fruit
    - type: text
      text: ' falling from a fig tree.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:41, 42; Jer. 46:10; Ezek. 21:3–5
      marker-yv: yv-n
    - type: text
      text: My sword shall be bathed in heaven;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Indeed it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 63:1; Jer. 49:7, 8, 20; Ezek. 25:12–14; 35:1–15; Amos 1:11, 12; Obad. 1–14; Mal. 1:4
      marker-yv: yv-n
    - type: text
      text: shall come down on Edom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And on the people of My curse, for judgment.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 66:16
      marker-yv: yv-n
    - type: text
      text: 'sword of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is filled with blood,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It is made overflowing with fatness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With the blood of lambs and goats,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With the fat of the kidneys of rams.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zeph. 1:7
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has a sacrifice in Bozrah,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a great slaughter in the land of Edom.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The wild oxen shall come down with them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the young bulls with the mighty bulls;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their land shall be soaked with blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their dust saturated with fatness.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the day of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 63:4
      marker-yv: yv-n
    - type: text
      text: vengeance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The year of recompense for the cause of Zion.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 29:23; Ps. 11:6; Is. 30:33
      marker-yv: yv-n
    - type: text
      text: Its streams shall be turned into pitch,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And its dust into brimstone;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Its land shall become burning pitch.
