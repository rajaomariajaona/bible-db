document_id: ISA.34,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment on the Nations
  - type: text
    content: 'Come '
  - type: note
    content: Ps. 49:1; Is. 41:1; 43:9
  - type: text
    content: near, you nations, to hear;
  - type: text
    content: And heed, you people!
  - type: note
    content: Deut. 32:1; Is. 1:2
  - type: text
    content: Let the earth hear, and all that is in it,
  - type: text
    content: The world and all things that come forth from it.
  '10':
  - type: text
    content: It shall not be quenched night or day;
  - type: note
    content: Rev. 14:11; 18:18; 19:3
  - type: text
    content: Its smoke shall ascend forever.
  - type: note
    content: Is. 13:20–22; 24:1; 34:10–15; Mal. 1:3, 4
  - type: text
    content: From generation to generation it shall lie waste;
  - type: text
    content: No one shall pass through it forever and ever.
  '11':
  - type: note
    content: Is. 14:23; Zeph. 2:14; Rev. 18:2
  - type: text
    content: But the pelican and the porcupine shall possess it,
  - type: text
    content: Also the owl and the raven shall dwell in it.
  - type: text
    content: 'And '
  - type: note
    content: 2 Kin. 21:13; Lam. 2:8
  - type: text
    content: He shall stretch out over it
  - type: text
    content: The line of confusion and the stones of emptiness.
  '12':
  - type: text
    content: They shall call its nobles to the kingdom,
  - type: text
    content: 'But none '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' there, and all its princes shall be nothing.'
  '13':
  - type: text
    content: 'And '
  - type: note
    content: Is. 32:13; Hos. 9:6
  - type: text
    content: thorns shall come up in its palaces,
  - type: text
    content: Nettles and brambles in its fortresses;
  - type: note
    content: Is. 13:21
  - type: text
    content: It shall be a habitation of jackals,
  - type: text
    content: A courtyard for ostriches.
  '14':
  - type: text
    content: The wild beasts of the desert shall also meet with the jackals,
  - type: text
    content: And the wild goat shall bleat to its companion;
  - type: text
    content: Also the night creature shall rest there,
  - type: text
    content: And find for herself a place of rest.
  '15':
  - type: text
    content: 'There the arrow snake shall make her nest and lay '
  - type: text
    content: eggs
  - type: text
    content: 'And hatch, and gather '
  - type: text
    content: them
  - type: text
    content: ' under her shadow;'
  - type: text
    content: There also shall the hawks be gathered,
  - type: text
    content: Every one with her mate.
  '16':
  - type: text
    content: '“Search from '
  - type: note
    content: (Mal. 3:16)
  - type: text
    content: 'the book of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and read:'
  - type: text
    content: Not one of these shall fail;
  - type: text
    content: Not one shall lack her mate.
  - type: text
    content: For My mouth has commanded it, and His Spirit has gathered them.
  '17':
  - type: text
    content: He has cast the lot for them,
  - type: text
    content: And His hand has divided it among them with a measuring line.
  - type: text
    content: They shall possess it forever;
  - type: text
    content: From generation to generation they shall dwell in it.”
  '2':
  - type: text
    content: 'For the indignation of the '
  - type: heading
    content: Lord
  - type: text
    content: ' is against all nations,'
  - type: text
    content: 'And '
  - type: text
    content: His
  - type: text
    content: ' fury against all their armies;'
  - type: text
    content: He has utterly destroyed them,
  - type: text
    content: 'He has given them over to the '
  - type: note
    content: Is. 13:5
  - type: text
    content: slaughter.
  '3':
  - type: text
    content: Also their slain shall be thrown out;
  - type: note
    content: Joel 2:20; Amos 4:10
  - type: text
    content: Their stench shall rise from their corpses,
  - type: text
    content: And the mountains shall be melted with their blood.
  '4':
  - type: note
    content: Ps. 102:26; Is. 13:13; Ezek. 32:7, 8; Joel 2:31; Matt. 24:29; 2 Pet. 3:10
  - type: text
    content: All the host of heaven shall be dissolved,
  - type: text
    content: And the heavens shall be rolled up like a scroll;
  - type: note
    content: Is. 14:12
  - type: text
    content: All their host shall fall down
  - type: text
    content: As the leaf falls from the vine,
  - type: text
    content: 'And as '
  - type: note
    content: Rev. 6:12–14
  - type: text
    content: fruit
  - type: text
    content: ' falling from a fig tree.'
  '5':
  - type: text
    content: '“For '
  - type: note
    content: Deut. 32:41, 42; Jer. 46:10; Ezek. 21:3–5
  - type: text
    content: My sword shall be bathed in heaven;
  - type: text
    content: 'Indeed it '
  - type: note
    content: Is. 63:1; Jer. 49:7, 8, 20; Ezek. 25:12–14; 35:1–15; Amos 1:11, 12; Obad. 1–14; Mal. 1:4
  - type: text
    content: shall come down on Edom,
  - type: text
    content: And on the people of My curse, for judgment.
  '6':
  - type: text
    content: 'The '
  - type: note
    content: Is. 66:16
  - type: text
    content: 'sword of the '
  - type: heading
    content: Lord
  - type: text
    content: ' is filled with blood,'
  - type: text
    content: It is made overflowing with fatness,
  - type: text
    content: With the blood of lambs and goats,
  - type: text
    content: With the fat of the kidneys of rams.
  - type: text
    content: 'For '
  - type: note
    content: Zeph. 1:7
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' has a sacrifice in Bozrah,'
  - type: text
    content: And a great slaughter in the land of Edom.
  '7':
  - type: text
    content: The wild oxen shall come down with them,
  - type: text
    content: And the young bulls with the mighty bulls;
  - type: text
    content: Their land shall be soaked with blood,
  - type: text
    content: And their dust saturated with fatness.”
  '8':
  - type: text
    content: 'For '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' the day of the '
  - type: heading
    content: Lord
  - type: text
    content: '’s '
  - type: note
    content: Is. 63:4
  - type: text
    content: vengeance,
  - type: text
    content: The year of recompense for the cause of Zion.
  '9':
  - type: note
    content: Deut. 29:23; Ps. 11:6; Is. 30:33
  - type: text
    content: Its streams shall be turned into pitch,
  - type: text
    content: And its dust into brimstone;
  - type: text
    content: Its land shall become burning pitch.
