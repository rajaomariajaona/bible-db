document_id: 2CO.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Vision of Paradise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'It is doubtless not profitable for me to boast. I will come to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 16:9; 18:9; 22:17, 18; 23:11; 26:13–15; 27:23
    marker-yv: yv-n
  - type: text
    text: 'visions and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 9:3–6; 1 Cor. 14:6; 2 Cor. 12:7; (Gal. 1:12; 2:2; Eph. 3:3–6)
    marker-yv: yv-n
  - type: text
    text: 'revelations of the Lord: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I know a man '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:7; Gal. 1:22
    marker-yv: yv-n
  - type: text
    text: 'in Christ who fourteen years ago—whether in the body I do not know, or whether out of the body I do not know, God knows—such a one '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 22:17
    marker-yv: yv-n
  - type: text
    text: 'was caught up to the third heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And I know such a man—whether in the body or out of the body I do not know, God knows— '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'how he was caught up into '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 23:43; (Rev. 2:7)
    marker-yv: yv-n
  - type: text
    text: 'Paradise and heard inexpressible words, which it is not lawful for a man to utter. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Of such a one I will boast; yet of myself I will not '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 11:30
    marker-yv: yv-n
  - type: text
    text: 'boast, except in my infirmities. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For though I might desire to boast, I will not be a fool; for I will speak the truth. But I refrain, lest anyone should think of me above what he sees me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' or hears from me.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Thorn in the Flesh
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And lest I should be exalted above measure by the abundance of the revelations, a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 33:55; Ezek. 28:24; Hos. 2:6; Gal. 4:13, 14
    marker-yv: yv-n
  - type: text
    text: 'thorn in the flesh was given to me, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 2:7; Matt. 4:10; Luke 13:16; (1 Cor. 5:5)
    marker-yv: yv-n
  - type: text
    text: 'a messenger of Satan to buffet me, lest I be exalted above measure. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 3:23; Matt. 26:44
    marker-yv: yv-n
  - type: text
    text: 'Concerning this thing I pleaded with the Lord three times that it might depart from me. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And He said to me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My grace is sufficient for you, for My strength is made perfect in weakness.”
  - type: text
    text: ' Therefore most gladly '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 11:30
    marker-yv: yv-n
  - type: text
    text: 'I will rather boast in my infirmities, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Pet. 4:14)
    marker-yv: yv-n
  - type: text
    text: 'that the power of Christ may rest upon me. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Therefore '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 5:3; 8:35)
    marker-yv: yv-n
  - type: text
    text: 'I take pleasure in infirmities, in reproaches, in needs, in persecutions, in distresses, for Christ’s sake. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 13:4
    marker-yv: yv-n
  - type: text
    text: For when I am weak, then I am strong.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Signs of an Apostle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I have become '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 5:13; 11:1, 16; 12:6
    marker-yv: yv-n
  - type: text
    text: 'a fool in boasting; you have compelled me. For I ought to have been commended by you; for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 15:10; 2 Cor. 11:5
    marker-yv: yv-n
  - type: text
    text: 'in nothing was I behind the most eminent apostles, though '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 3:7; 13:2; 15:9
    marker-yv: yv-n
  - type: text
    text: 'I am nothing. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 14:3; Rom. 15:18
    marker-yv: yv-n
  - type: text
    text: 'Truly the signs of an apostle were accomplished among you with all perseverance, in signs and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 15:12
    marker-yv: yv-n
  - type: text
    text: 'wonders and mighty '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 14:8–10; 16:16–18; 19:11, 12; 20:6–12; 28:1–10
    marker-yv: yv-n
  - type: text
    text: 'deeds. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For what is it in which you were inferior to other churches, except that I myself was not burdensome to you? Forgive me this wrong!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Love for the Church
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 1:15; 13:1, 2
    marker-yv: yv-n
  - type: text
    text: 'Now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for
  - type: text
    text: ' the third time I am ready to come to you. And I will not be burdensome to you; for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 20:33; (1 Cor. 10:24–33)
    marker-yv: yv-n
  - type: text
    text: 'I do not seek yours, but you. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 4:14; Gal. 4:19
    marker-yv: yv-n
  - type: text
    text: 'For the children ought not to lay up for the parents, but the parents for the children. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And I will very gladly spend and be spent '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 10:11; Rom. 9:3; 2 Cor. 1:6; Phil. 2:17; Col. 1:24; 1 Thess. 2:8; (2 Tim. 2:10)
    marker-yv: yv-n
  - type: text
    text: 'for your souls; though '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 6:12, 13
    marker-yv: yv-n
  - type: text
    text: the more abundantly I love you, the less I am loved.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But be that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: may,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 11:9
    marker-yv: yv-n
  - type: text
    text: 'I did not burden you. Nevertheless, being crafty, I caught you by cunning! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Did I take advantage of you by any of those whom I sent to you? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I urged Titus, and sent our '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 8:18
    marker-yv: yv-n
  - type: text
    text: 'brother with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him.
  - type: text
    text: ' Did Titus take advantage of you? Did we not walk in the same spirit? Did '
  - type: usfm
    marker: it
    children:
    - type: text
      text: we
  - type: text
    text: ' not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: walk
  - type: text
    text: ' in the same steps?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 5:12
    marker-yv: yv-n
  - type: text
    text: 'Again, do you think that we excuse ourselves to you? '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 9:1, 2); 2 Cor. 11:31
    marker-yv: yv-n
  - type: text
    text: 'We speak before God in Christ. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 10:33
    marker-yv: yv-n
  - type: text
    text: 'But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: we
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: do
  - type: text
    text: ' all things, beloved, for your edification. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For I fear lest, when I come, I shall not find you such as I wish, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 4:21; 2 Cor. 13:2, 10
    marker-yv: yv-n
  - type: text
    text: 'I shall be found by you such as you do not wish; lest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' contentions, jealousies, outbursts of wrath, selfish ambitions, backbitings, whisperings, conceits, tumults; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'lest, when I come again, my God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 2:1, 4
    marker-yv: yv-n
  - type: text
    text: 'will humble me among you, and I shall mourn for many '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 13:2
    marker-yv: yv-n
  - type: text
    text: 'who have sinned before and have not repented of the uncleanness, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 5:1
    marker-yv: yv-n
  - type: text
    text: fornication, and lewdness which they have practiced.
