  '1':
  - type: heading
    content: The Vision of Paradise
  - type: text
    content: 'It is doubtless not profitable for me to boast. I will come to '
  - type: note
    content: Acts 16:9; 18:9; 22:17, 18; 23:11; 26:13–15; 27:23
  - type: text
    content: 'visions and '
  - type: note
    content: Acts 9:3–6; 1 Cor. 14:6; 2 Cor. 12:7; (Gal. 1:12; 2:2; Eph. 3:3–6)
  - type: text
    content: 'revelations of the Lord: '
  '10':
  - type: text
    content: 'Therefore '
  - type: note
    content: (Rom. 5:3; 8:35)
  - type: text
    content: 'I take pleasure in infirmities, in reproaches, in needs, in persecutions, in distresses, for Christ’s sake. '
  - type: note
    content: 2 Cor. 13:4
  - type: text
    content: For when I am weak, then I am strong.
  - type: heading
    content: Signs of an Apostle
  '11':
  - type: text
    content: 'I have become '
  - type: note
    content: 2 Cor. 5:13; 11:1, 16; 12:6
  - type: text
    content: 'a fool in boasting; you have compelled me. For I ought to have been commended by you; for '
  - type: note
    content: 1 Cor. 15:10; 2 Cor. 11:5
  - type: text
    content: 'in nothing was I behind the most eminent apostles, though '
  - type: note
    content: 1 Cor. 3:7; 13:2; 15:9
  - type: text
    content: 'I am nothing. '
  '12':
  - type: note
    content: Acts 14:3; Rom. 15:18
  - type: text
    content: 'Truly the signs of an apostle were accomplished among you with all perseverance, in signs and '
  - type: note
    content: Acts 15:12
  - type: text
    content: 'wonders and mighty '
  - type: note
    content: Acts 14:8–10; 16:16–18; 19:11, 12; 20:6–12; 28:1–10
  - type: text
    content: 'deeds. '
  '13':
  - type: text
    content: For what is it in which you were inferior to other churches, except that I myself was not burdensome to you? Forgive me this wrong!
  - type: heading
    content: Love for the Church
  '14':
  - type: note
    content: 2 Cor. 1:15; 13:1, 2
  - type: text
    content: 'Now '
  - type: text
    content: for
  - type: text
    content: ' the third time I am ready to come to you. And I will not be burdensome to you; for '
  - type: note
    content: Acts 20:33; (1 Cor. 10:24–33)
  - type: text
    content: 'I do not seek yours, but you. '
  - type: note
    content: 1 Cor. 4:14; Gal. 4:19
  - type: text
    content: 'For the children ought not to lay up for the parents, but the parents for the children. '
  '15':
  - type: text
    content: 'And I will very gladly spend and be spent '
  - type: note
    content: John 10:11; Rom. 9:3; 2 Cor. 1:6; Phil. 2:17; Col. 1:24; 1 Thess. 2:8; (2 Tim. 2:10)
  - type: text
    content: 'for your souls; though '
  - type: note
    content: 2 Cor. 6:12, 13
  - type: text
    content: the more abundantly I love you, the less I am loved.
  '16':
  - type: text
    content: 'But be that '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: may,
  - type: text
    content: ' '
  - type: note
    content: 2 Cor. 11:9
  - type: text
    content: 'I did not burden you. Nevertheless, being crafty, I caught you by cunning! '
  '17':
  - type: text
    content: 'Did I take advantage of you by any of those whom I sent to you? '
  '18':
  - type: text
    content: 'I urged Titus, and sent our '
  - type: note
    content: 2 Cor. 8:18
  - type: text
    content: 'brother with '
  - type: text
    content: him.
  - type: text
    content: ' Did Titus take advantage of you? Did we not walk in the same spirit? Did '
  - type: text
    content: we
  - type: text
    content: ' not '
  - type: text
    content: walk
  - type: text
    content: ' in the same steps?'
  '19':
  - type: note
    content: 2 Cor. 5:12
  - type: text
    content: 'Again, do you think that we excuse ourselves to you? '
  - type: note
    content: (Rom. 9:1, 2); 2 Cor. 11:31
  - type: text
    content: 'We speak before God in Christ. '
  - type: note
    content: 1 Cor. 10:33
  - type: text
    content: 'But '
  - type: text
    content: we
  - type: text
    content: ' '
  - type: text
    content: do
  - type: text
    content: ' all things, beloved, for your edification. '
  '2':
  - type: text
    content: 'I know a man '
  - type: note
    content: Rom. 16:7; Gal. 1:22
  - type: text
    content: 'in Christ who fourteen years ago—whether in the body I do not know, or whether out of the body I do not know, God knows—such a one '
  - type: note
    content: Acts 22:17
  - type: text
    content: 'was caught up to the third heaven. '
  '20':
  - type: text
    content: 'For I fear lest, when I come, I shall not find you such as I wish, and '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: note
    content: 1 Cor. 4:21; 2 Cor. 13:2, 10
  - type: text
    content: 'I shall be found by you such as you do not wish; lest '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' contentions, jealousies, outbursts of wrath, selfish ambitions, backbitings, whisperings, conceits, tumults; '
  '21':
  - type: text
    content: 'lest, when I come again, my God '
  - type: note
    content: 2 Cor. 2:1, 4
  - type: text
    content: 'will humble me among you, and I shall mourn for many '
  - type: note
    content: 2 Cor. 13:2
  - type: text
    content: 'who have sinned before and have not repented of the uncleanness, '
  - type: note
    content: 1 Cor. 5:1
  - type: text
    content: fornication, and lewdness which they have practiced.
  '3':
  - type: text
    content: 'And I know such a man—whether in the body or out of the body I do not know, God knows— '
  '4':
  - type: text
    content: 'how he was caught up into '
  - type: note
    content: Luke 23:43; (Rev. 2:7)
  - type: text
    content: 'Paradise and heard inexpressible words, which it is not lawful for a man to utter. '
  '5':
  - type: text
    content: 'Of such a one I will boast; yet of myself I will not '
  - type: note
    content: 2 Cor. 11:30
  - type: text
    content: 'boast, except in my infirmities. '
  '6':
  - type: text
    content: 'For though I might desire to boast, I will not be a fool; for I will speak the truth. But I refrain, lest anyone should think of me above what he sees me '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' or hears from me.'
  - type: heading
    content: The Thorn in the Flesh
  '7':
  - type: text
    content: 'And lest I should be exalted above measure by the abundance of the revelations, a '
  - type: note
    content: Num. 33:55; Ezek. 28:24; Hos. 2:6; Gal. 4:13, 14
  - type: text
    content: 'thorn in the flesh was given to me, '
  - type: note
    content: Job 2:7; Matt. 4:10; Luke 13:16; (1 Cor. 5:5)
  - type: text
    content: 'a messenger of Satan to buffet me, lest I be exalted above measure. '
  '8':
  - type: note
    content: Deut. 3:23; Matt. 26:44
  - type: text
    content: 'Concerning this thing I pleaded with the Lord three times that it might depart from me. '
  '9':
  - type: text
    content: 'And He said to me, '
  - type: text
    content: “My grace is sufficient for you, for My strength is made perfect in weakness.”
  - type: text
    content: ' Therefore most gladly '
  - type: note
    content: 2 Cor. 11:30
  - type: text
    content: 'I will rather boast in my infirmities, '
  - type: note
    content: (1 Pet. 4:14)
  - type: text
    content: 'that the power of Christ may rest upon me. '
