document_id: GAL.6,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Bear and Share the Burdens
  - type: text
    content: 'Brethren, if a man is overtaken in any trespass, you who '
  - type: text
    content: are
  - type: text
    content: ' spiritual restore such a one in a spirit of '
  - type: note
    content: Eph. 4:2
  - type: text
    content: 'gentleness, considering yourself lest you also be tempted. '
  '10':
  - type: note
    content: Prov. 3:27; (John 9:4; 12:35)
  - type: text
    content: 'Therefore, as we have opportunity, '
  - type: note
    content: Titus 3:8
  - type: text
    content: 'let us do good to all, '
  - type: note
    content: Rom. 12:13
  - type: text
    content: especially to those who are of the household of faith.
  - type: heading
    content: Glory Only in the Cross
  '11':
  - type: text
    content: 'See with what large letters I have written to you with my own hand! '
  '12':
  - type: text
    content: 'As many as desire to make a good showing in the flesh, these '
  - type: text
    content: would
  - type: text
    content: ' compel you to be circumcised, '
  - type: note
    content: Gal. 5:11; Phil. 3:8
  - type: text
    content: 'only that they may not suffer persecution for the cross of Christ. '
  '13':
  - type: text
    content: 'For not even those who are circumcised keep the law, but they desire to have you circumcised that they may boast in your flesh. '
  '14':
  - type: text
    content: 'But God forbid that I should boast except in the '
  - type: note
    content: (1 Cor. 1:18)
  - type: text
    content: 'cross of our Lord Jesus Christ, by whom the world has been crucified to me, and '
  - type: note
    content: (Gal. 2:20); Col. 2:20
  - type: text
    content: 'I to the world. '
  '15':
  - type: text
    content: 'For '
  - type: note
    content: (Rom. 2:26, 28); 1 Cor. 7:19; (Gal. 5:6)
  - type: text
    content: in Christ Jesus neither circumcision nor uncircumcision avails anything, but a new creation.
  - type: heading
    content: Blessing and a Plea
  '16':
  - type: text
    content: 'And as many as walk according to this rule, peace and mercy '
  - type: text
    content: be
  - type: text
    content: ' upon them, and upon the Israel of God.'
  '17':
  - type: text
    content: From now on let no one trouble me, for I bear in my body the marks of the Lord Jesus.
  '18':
  - type: text
    content: 'Brethren, the grace of our Lord Jesus Christ '
  - type: text
    content: be
  - type: text
    content: ' with your spirit. Amen.'
  '2':
  - type: note
    content: Acts 20:35; Rom. 15:1; 1 Thess. 5:14
  - type: text
    content: 'Bear one another’s burdens, and so fulfill '
  - type: note
    content: (James 2:8)
  - type: text
    content: 'the law of Christ. '
  '3':
  - type: text
    content: 'For '
  - type: note
    content: Rom. 12:3
  - type: text
    content: 'if anyone thinks himself to be something, when '
  - type: note
    content: (2 Cor. 3:5; James 1:22)
  - type: text
    content: 'he is nothing, he deceives himself. '
  '4':
  - type: text
    content: 'But '
  - type: note
    content: 1 Cor. 11:28
  - type: text
    content: 'let each one examine his own work, and then he will have rejoicing in himself alone, and '
  - type: note
    content: Luke 18:11
  - type: text
    content: 'not in another. '
  '5':
  - type: text
    content: 'For '
  - type: note
    content: (Rom. 2:6)
  - type: text
    content: each one shall bear his own load.
  - type: heading
    content: Be Generous and Do Good
  '6':
  - type: note
    content: 1 Cor. 9:11, 14
  - type: text
    content: Let him who is taught the word share in all good things with him who teaches.
  '7':
  - type: text
    content: 'Do not be deceived, God is not mocked; for '
  - type: note
    content: (Rom. 2:6)
  - type: text
    content: 'whatever a man sows, that he will also reap. '
  '8':
  - type: text
    content: 'For he who sows to his flesh will of the flesh reap corruption, but he who sows to the Spirit will of the Spirit reap '
  - type: note
    content: (Rom. 6:8)
  - type: text
    content: 'everlasting life. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: 1 Cor. 15:58; 2 Cor. 4:1; 2 Thess. 3:13
  - type: text
    content: 'let us not grow weary while doing good, for in due season we shall reap '
  - type: note
    content: (Matt. 24:13); Heb. 12:3, 5; (James 5:7, 8)
  - type: text
    content: 'if we do not lose heart. '
