document_id: GAL.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bear and Share the Burdens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Brethren, if a man is overtaken in any trespass, you who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' spiritual restore such a one in a spirit of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 4:2
    marker-yv: yv-n
  - type: text
    text: 'gentleness, considering yourself lest you also be tempted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 20:35; Rom. 15:1; 1 Thess. 5:14
    marker-yv: yv-n
  - type: text
    text: 'Bear one another’s burdens, and so fulfill '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (James 2:8)
    marker-yv: yv-n
  - type: text
    text: 'the law of Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 12:3
    marker-yv: yv-n
  - type: text
    text: 'if anyone thinks himself to be something, when '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Cor. 3:5; James 1:22)
    marker-yv: yv-n
  - type: text
    text: 'he is nothing, he deceives himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 11:28
    marker-yv: yv-n
  - type: text
    text: 'let each one examine his own work, and then he will have rejoicing in himself alone, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 18:11
    marker-yv: yv-n
  - type: text
    text: 'not in another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 2:6)
    marker-yv: yv-n
  - type: text
    text: each one shall bear his own load.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Be Generous and Do Good
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 9:11, 14
    marker-yv: yv-n
  - type: text
    text: Let him who is taught the word share in all good things with him who teaches.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Do not be deceived, God is not mocked; for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 2:6)
    marker-yv: yv-n
  - type: text
    text: 'whatever a man sows, that he will also reap. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For he who sows to his flesh will of the flesh reap corruption, but he who sows to the Spirit will of the Spirit reap '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 6:8)
    marker-yv: yv-n
  - type: text
    text: 'everlasting life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 15:58; 2 Cor. 4:1; 2 Thess. 3:13
    marker-yv: yv-n
  - type: text
    text: 'let us not grow weary while doing good, for in due season we shall reap '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Matt. 24:13); Heb. 12:3, 5; (James 5:7, 8)
    marker-yv: yv-n
  - type: text
    text: 'if we do not lose heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 3:27; (John 9:4; 12:35)
    marker-yv: yv-n
  - type: text
    text: 'Therefore, as we have opportunity, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Titus 3:8
    marker-yv: yv-n
  - type: text
    text: 'let us do good to all, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 12:13
    marker-yv: yv-n
  - type: text
    text: especially to those who are of the household of faith.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Glory Only in the Cross
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'See with what large letters I have written to you with my own hand! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'As many as desire to make a good showing in the flesh, these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: would
  - type: text
    text: ' compel you to be circumcised, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gal. 5:11; Phil. 3:8
    marker-yv: yv-n
  - type: text
    text: 'only that they may not suffer persecution for the cross of Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For not even those who are circumcised keep the law, but they desire to have you circumcised that they may boast in your flesh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But God forbid that I should boast except in the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 1:18)
    marker-yv: yv-n
  - type: text
    text: 'cross of our Lord Jesus Christ, by whom the world has been crucified to me, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Gal. 2:20); Col. 2:20
    marker-yv: yv-n
  - type: text
    text: 'I to the world. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 2:26, 28); 1 Cor. 7:19; (Gal. 5:6)
    marker-yv: yv-n
  - type: text
    text: in Christ Jesus neither circumcision nor uncircumcision avails anything, but a new creation.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Blessing and a Plea
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And as many as walk according to this rule, peace and mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' upon them, and upon the Israel of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: From now on let no one trouble me, for I bear in my body the marks of the Lord Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Brethren, the grace of our Lord Jesus Christ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' with your spirit. Amen.'
