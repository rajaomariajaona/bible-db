document_id: JHN.15,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The True Vine
  - type: text
    content: “I am the true vine, and My Father is the vinedresser.
  - type: text
    content: ' '
  '10':
  - type: note
    content: John 14:15
  - type: text
    content: If you keep My commandments, you will abide in My love, just as I have kept My Father’s commandments and abide in His love.
  '11':
  - type: text
    content: '“These things I have spoken to you, that My joy may remain in you, and '
  - type: note
    content: (John 16:24); 1 John 1:4
  - type: text
    content: that
  - type: text
    content: ' your joy may be full.'
  - type: text
    content: ' '
  '12':
  - type: note
    content: John 13:34; 1 John 3:11
  - type: text
    content: 'This is My '
  - type: note
    content: Rom. 12:9
  - type: text
    content: commandment, that you love one another as I have loved you.
  - type: text
    content: ' '
  '13':
  - type: note
    content: Eph. 5:2; 1 John 3:16
  - type: text
    content: Greater love has no one than this, than to lay down one’s life for his friends.
  - type: text
    content: ' '
  '14':
  - type: note
    content: (Matt. 12:50; 28:20); John 14:15, 21; Acts 10:42; 1 John 3:23, 24
  - type: text
    content: You are My friends if you do whatever I command you.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'No longer do I call you servants, for a servant does not know what his master is doing; but I have called you friends, '
  - type: note
    content: Gen. 18:17
  - type: text
    content: for all things that I heard from My Father I have made known to you.
  - type: text
    content: ' '
  '16':
  - type: note
    content: John 6:70; 13:18; 15:19; 1 John 4:10
  - type: text
    content: 'You did not choose Me, but I chose you and '
  - type: note
    content: (Matt. 28:19; Mark 16:15; Col. 1:6)
  - type: text
    content: 'appointed you that you should go and bear fruit, and '
  - type: text
    content: that
  - type: text
    content: ' your fruit should remain, that whatever you ask the Father '
  - type: note
    content: John 14:13; 16:23, 24
  - type: text
    content: in My name He may give you.
  - type: text
    content: ' '
  '17':
  - type: text
    content: These things I command you, that you love one another.
  - type: heading
    content: The World’s Hatred
  '18':
  - type: note
    content: John 7:7; 1 John 3:13
  - type: text
    content: '“If the world hates you, you know that it hated Me before '
  - type: text
    content: it hated
  - type: text
    content: ' you.'
  - type: text
    content: ' '
  '19':
  - type: note
    content: 1 John 4:5
  - type: text
    content: 'If you were of the world, the world would love its own. Yet '
  - type: note
    content: John 17:14
  - type: text
    content: because you are not of the world, but I chose you out of the world, therefore the world hates you.
  - type: text
    content: ' '
  '2':
  - type: note
    content: Matt. 15:13
  - type: text
    content: 'Every branch in Me that does not bear fruit He '
  - type: text
    content: takes away;
  - type: text
    content: ' and every '
  - type: text
    content: branch
  - type: text
    content: ' that bears fruit He prunes, that it may bear '
  - type: note
    content: (Matt. 13:12)
  - type: text
    content: more fruit.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Remember the word that I said to you, '
  - type: note
    content: Matt. 10:24; John 13:16
  - type: text
    content: '‘A servant is not greater than his master.’ If they persecuted Me, they will also persecute you. '
  - type: note
    content: Ezek. 3:7
  - type: text
    content: If they kept My word, they will keep yours also.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'But '
  - type: note
    content: Matt. 10:22; 24:9; (1 Pet. 4:14); Rev. 2:3
  - type: text
    content: all these things they will do to you for My name’s sake, because they do not know Him who sent Me.
  - type: text
    content: ' '
  '22':
  - type: note
    content: John 9:41; 15:24
  - type: text
    content: 'If I had not come and spoken to them, they would have no sin, '
  - type: note
    content: (Rom. 1:20; James 4:17)
  - type: text
    content: but now they have no excuse for their sin.
  - type: text
    content: ' '
  '23':
  - type: note
    content: 1 John 2:23
  - type: text
    content: He who hates Me hates My Father also.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'If I had not done among them '
  - type: note
    content: John 3:2
  - type: text
    content: 'the works which no one else did, they would have no sin; but now they have '
  - type: note
    content: John 14:9
  - type: text
    content: seen and also hated both Me and My Father.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'But '
  - type: text
    content: this happened
  - type: text
    content: ' that the word might be fulfilled which is written in their law, '
  - type: note
    content: Ps. 35:19; 69:4; 109:3–5
  - type: text
    content: ‘They hated Me without a cause.’
  - type: heading
    content: The Coming Rejection
  '26':
  - type: note
    content: Luke 24:49; (John 14:17); Acts 2:4, 33
  - type: text
    content: '“But when the '
  - type: text
    content: 'Helper comes, whom I shall send to you from the Father, the Spirit of truth who proceeds from the Father, '
  - type: note
    content: 1 John 5:6
  - type: text
    content: He will testify of Me.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And '
  - type: note
    content: Luke 24:48; 1 Pet. 5:1; 2 Pet. 1:16
  - type: text
    content: 'you also will bear witness, because '
  - type: note
    content: Matt. 3:14; Luke 1:2; 1 John 1:1
  - type: text
    content: you have been with Me from the beginning.
  '3':
  - type: note
    content: (John 13:10; 17:17); Eph. 5:26
  - type: text
    content: You are already clean because of the word which I have spoken to you.
  - type: text
    content: ' '
  '4':
  - type: note
    content: John 17:23; Eph. 3:17; (Col. 1:23)
  - type: text
    content: Abide in Me, and I in you. As the branch cannot bear fruit of itself, unless it abides in the vine, neither can you, unless you abide in Me.
  '5':
  - type: text
    content: '“I am the vine, you '
  - type: text
    content: are
  - type: text
    content: ' the branches. He who abides in Me, and I in him, bears much '
  - type: note
    content: Hos. 14:8; (Gal. 5:22, 23)
  - type: text
    content: 'fruit; for without Me you can do '
  - type: note
    content: 2 Cor. 3:5
  - type: text
    content: nothing.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'If anyone does not abide in Me, '
  - type: note
    content: Matt. 3:10
  - type: text
    content: 'he is cast out as a branch and is withered; and they gather them and throw '
  - type: text
    content: them
  - type: text
    content: ' into the fire, and they are burned.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'If you abide in Me, and My words '
  - type: note
    content: 1 John 2:14
  - type: text
    content: 'abide in you, '
  - type: note
    content: John 14:13; 16:23
  - type: text
    content: you
  - type: text
    content: ' will'
  - type: text
    content: ' ask what you desire, and it shall be done for you.'
  - type: text
    content: ' '
  '8':
  - type: note
    content: Ps. 22:23; (Matt. 5:16); John 13:31; 17:4; (Phil. 1:11); 1 Pet. 4:11
  - type: text
    content: 'By this My Father is glorified, that you bear much fruit; '
  - type: note
    content: John 8:31
  - type: text
    content: so you will be My disciples.
  - type: heading
    content: Love and Joy Perfected
  '9':
  - type: text
    content: '“As the Father '
  - type: note
    content: John 5:20; 17:26
  - type: text
    content: loved Me, I also have loved you; abide in My love.
  - type: text
    content: ' '
