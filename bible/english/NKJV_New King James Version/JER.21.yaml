  - type: note
    content: 2 Kin. 25:5–7, 18–21; Jer. 37:17; 39:5; 52:9
  - type: text
    content: '“I will deliver Zedekiah king of Judah, his servants and the people, and such as are left in this city from the pestilence and the sword and the famine, into the hand of Nebuchadnezzar king of Babylon, into the hand of their enemies, and into the hand of those who seek their life; and he shall strike them with the edge of the sword. '
  - type: note
    content: Deut. 28:50; 2 Chr. 36:17; Jer. 13:14; Ezek. 7:9; Hab. 1:6–10
  - type: text
    content: He shall not spare them, or have pity or mercy.” ’
