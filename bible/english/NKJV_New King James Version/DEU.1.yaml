verses:
  '1':
  - type: heading
    content: The Previous Command to Enter Canaan
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the words which Moses spoke to all Israel '
  - type: note
    content: Deut. 4:44–46; Josh. 9:1, 10
  - type: text
    content: 'on this side of the Jordan in the wilderness, in the plain opposite Suph, between Paran, Tophel, Laban, Hazeroth, and Dizahab. '
  '10':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has multiplied you, '
  - type: note
    content: Gen. 15:5; 22:17; Ex. 32:13; Deut. 7:7; 10:22; 26:5; 28:62
  - type: text
    content: 'and here you '
  - type: text
    content: are
  - type: text
    content: ' today, as the stars of heaven in multitude. '
  '11':
  - type: note
    content: 2 Sam. 24:3
  - type: text
    content: 'May the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of your fathers make you a thousand times more numerous than you are, and bless you '
  - type: note
    content: Gen. 15:5
  - type: text
    content: 'as He has promised you! '
  '12':
  - type: note
    content: 1 Kin. 3:8, 9
  - type: text
    content: 'How can I alone bear your problems and your burdens and your complaints? '
  '13':
  - type: text
    content: 'Choose wise, understanding, and knowledgeable men from among your tribes, and I will make them heads over you.’ '
  '14':
  - type: text
    content: 'And you answered me and said, ‘The thing which you have told '
  - type: text
    content: us
  - type: text
    content: ' to do '
  - type: text
    content: is
  - type: text
    content: ' good.’ '
  '15':
  - type: text
    content: 'So I took '
  - type: note
    content: Ex. 18:25
  - type: text
    content: the heads of your tribes, wise and knowledgeable men, and made them heads over you, leaders of thousands, leaders of hundreds, leaders of fifties, leaders of tens, and officers for your tribes.
  '16':
  - type: text
    content: '“Then I commanded your judges at that time, saying, ‘Hear '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: cases
  - type: text
    content: ' between your brethren, and '
  - type: note
    content: Deut. 16:18; John 7:24
  - type: text
    content: 'judge righteously between a man and his '
  - type: note
    content: Lev. 24:22
  - type: text
    content: 'brother or the stranger who is with him. '
  '17':
  - type: note
    content: Lev. 19:15; Deut. 10:17; 16:19; 24:17; 1 Sam. 16:7; Prov. 24:23–26; Acts 10:34; James 2:1, 9
  - type: text
    content: 'You shall not show partiality in judgment; you shall hear the small as well as the great; you shall not be afraid in any man’s presence, for '
  - type: note
    content: 2 Chr. 19:6
  - type: text
    content: 'the judgment '
  - type: text
    content: is
  - type: text
    content: ' God’s. The case that is too hard for you, '
  - type: note
    content: Ex. 18:22, 26
  - type: text
    content: 'bring to me, and I will hear it.’ '
  '18':
  - type: text
    content: And I commanded you at that time all the things which you should do.
  - type: heading
    content: Israel’s Refusal to Enter the Land
  '19':
  - type: text
    content: '“So we departed from Horeb, '
  - type: note
    content: Num. 10:12; Deut. 2:7; 8:15; 32:10; Jer. 2:6
  - type: text
    content: 'and went through all that great and terrible wilderness which you saw on the way to the mountains of the Amorites, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God had commanded us. Then '
  - type: note
    content: Num. 13:26
  - type: text
    content: 'we came to Kadesh Barnea. '
  '2':
  - type: text
    content: It
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' eleven days’ '
  - type: text
    content: journey
  - type: text
    content: ' from Horeb by way of Mount Seir '
  - type: note
    content: Num. 13:26; 32:8; Deut. 9:23
  - type: text
    content: 'to Kadesh Barnea. '
  '20':
  - type: text
    content: 'And I said to you, ‘You have come to the mountains of the Amorites, which the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God is giving us. '
  '21':
  - type: text
    content: 'Look, the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has set the land before you; go up '
  - type: text
    content: and
  - type: text
    content: ' possess '
  - type: text
    content: it,
  - type: text
    content: ' as the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of your fathers has spoken to you; '
  - type: note
    content: Josh. 1:6, 9
  - type: text
    content: do not fear or be discouraged.’
  '22':
  - type: text
    content: “And every one of you came near to me and said, ‘Let us send men before us, and let them search out the land for us, and bring back word to us of the way by which we should go up, and of the cities into which we shall come.’
  '23':
  - type: text
    content: '“The plan pleased me well; so '
  - type: note
    content: Num. 13:2, 3
  - type: text
    content: 'I took twelve of your men, one man from '
  - type: text
    content: each
  - type: text
    content: ' tribe. '
  '24':
  - type: note
    content: Num. 13:21–25
  - type: text
    content: 'And they departed and went up into the mountains, and came to the Valley of Eshcol, and spied it out. '
  '25':
  - type: text
    content: 'They also took '
  - type: text
    content: some
  - type: text
    content: ' of the fruit of the land in their hands and brought '
  - type: text
    content: it
  - type: text
    content: ' down to us; and they brought back word to us, saying, ‘'
  - type: text
    content: It
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' a '
  - type: note
    content: Num. 13:27
  - type: text
    content: 'good land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God is giving us.’'
  '26':
  - type: note
    content: Num. 14:1–4; Ps. 106:24
  - type: text
    content: '“Nevertheless you would not go up, but rebelled against the command of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God; '
  '27':
  - type: text
    content: 'and you '
  - type: note
    content: Ps. 106:25
  - type: text
    content: 'complained in your tents, and said, ‘Because the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Deut. 9:28
  - type: text
    content: 'hates us, He has brought us out of the land of Egypt to deliver us into the hand of the Amorites, to destroy us. '
  '28':
  - type: text
    content: 'Where can we go up? Our brethren have discouraged our hearts, saying, '
  - type: note
    content: Num. 13:28, 31–33; Deut. 9:1, 2
  - type: text
    content: '“The people '
  - type: text
    content: are
  - type: text
    content: ' greater and taller than we; the cities '
  - type: text
    content: are
  - type: text
    content: ' great and fortified up to heaven; moreover we have seen the sons of the '
  - type: note
    content: Num. 13:28
  - type: text
    content: Anakim there.” ’
  '29':
  - type: text
    content: '“Then I said to you, ‘Do not be terrified, '
  - type: note
    content: Num. 14:9; Deut. 7:18
  - type: text
    content: 'or afraid of them. '
  '3':
  - type: text
    content: 'Now it came to pass '
  - type: note
    content: Num. 33:38
  - type: text
    content: 'in the fortieth year, in the eleventh month, on the first '
  - type: text
    content: day
  - type: text
    content: ' of the month, '
  - type: text
    content: that
  - type: text
    content: ' Moses spoke to the children of Israel according to all that the '
  - type: heading
    content: Lord
  - type: text
    content: ' had given him as commandments to them, '
  '30':
  - type: note
    content: Ex. 14:14; Deut. 3:22; 20:4; Neh. 4:20
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, who goes before you, He will fight for you, according to all He did for you in Egypt before your eyes, '
  '31':
  - type: text
    content: 'and in the wilderness where you saw how the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God carried you, as a '
  - type: note
    content: Deut. 32:10–12; Is. 46:3, 4; 63:9; Hos. 11:3
  - type: text
    content: 'man carries his son, in all the way that you went until you came to this place.’ '
  '32':
  - type: text
    content: 'Yet, for all that, '
  - type: note
    content: Num. 14:11; 20:12; Ps. 106:24; Heb. 3:9, 10, 16–19; 4:1, 2; Jude 5
  - type: text
    content: 'you did not believe the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, '
  '33':
  - type: note
    content: Ex. 13:21; Num. 9:15–23; Neh. 9:12; Ps. 78:14
  - type: text
    content: 'who went in the way before you '
  - type: note
    content: Num. 10:33; Ezek. 20:6
  - type: text
    content: to search out a place for you to pitch your tents, to show you the way you should go, in the fire by night and in the cloud by day.
  - type: heading
    content: The Penalty for Israel’s Rebellion
  '34':
  - type: text
    content: '“And the '
  - type: heading
    content: Lord
  - type: text
    content: ' heard the sound of your words, and was angry, '
  - type: note
    content: Deut. 2:14, 15
  - type: text
    content: 'and took an oath, saying, '
  '35':
  - type: note
    content: Num. 14:22, 23; Ps. 95:10, 11
  - type: text
    content: '‘Surely not one of these men of this evil generation shall see that good land of which I swore to give to your fathers, '
  '36':
  - type: note
    content: Num. 14:24; (Josh. 14:9)
  - type: text
    content: 'except Caleb the son of Jephunneh; he shall see it, and to him and his children I am giving the land on which he walked, because '
  - type: note
    content: Num. 32:11, 12
  - type: text
    content: 'he wholly followed the '
  - type: heading
    content: Lord
  - type: text
    content: '.’ '
  '37':
  - type: note
    content: Num. 20:12; 27:14; Deut. 3:26; 4:21; 34:4; Ps. 106:32
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' was also angry with me for your sakes, saying, ‘Even you shall not go in there. '
  '38':
  - type: note
    content: Num. 14:30
  - type: text
    content: 'Joshua the son of Nun, '
  - type: note
    content: Ex. 24:13; 33:11; 1 Sam. 16:22
  - type: text
    content: 'who stands before you, he shall go in there. '
  - type: note
    content: Num. 27:18, 19; Deut. 31:7, 23; Josh. 11:23
  - type: text
    content: Encourage him, for he shall cause Israel to inherit it.
  '39':
  - type: note
    content: Num. 14:31
  - type: text
    content: '‘Moreover your little ones and your children, who '
  - type: note
    content: Num. 14:3
  - type: text
    content: 'you say will be victims, who today '
  - type: note
    content: Is. 7:15, 16
  - type: text
    content: 'have no knowledge of good and evil, they shall go in there; to them I will give it, and they shall possess it. '
  '4':
  - type: note
    content: Num. 21:23, 24, 33–35; Deut. 2:26–35; Josh. 13:10; Neh. 9:22
  - type: text
    content: 'after he had killed Sihon king of the Amorites, who dwelt in Heshbon, and Og king of Bashan, who dwelt at Ashtaroth '
  - type: note
    content: Josh. 13:12
  - type: text
    content: in Edrei.
  '40':
  - type: note
    content: Num. 14:25
  - type: text
    content: 'But '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: for
  - type: text
    content: ' you, turn and take your journey into the wilderness by the Way of the Red Sea.’'
  '41':
  - type: text
    content: '“Then you answered and said to me, '
  - type: note
    content: Num. 14:40
  - type: text
    content: '‘We have sinned against the '
  - type: heading
    content: Lord
  - type: text
    content: '; we will go up and fight, just as the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God commanded us.’ And when everyone of you had girded on his weapons of war, you were ready to go up into the mountain.'
  '42':
  - type: text
    content: '“And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to me, ‘Tell them, '
  - type: note
    content: Num. 14:41–43
  - type: text
    content: '“Do not go up nor fight, for I '
  - type: text
    content: am
  - type: text
    content: ' not among you; lest you be defeated before your enemies.” '
  '43':
  - type: text
    content: 'So I spoke to you; yet you would not listen, but '
  - type: note
    content: Num. 14:44
  - type: text
    content: 'rebelled against the command of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: Deut. 17:12, 13
  - type: text
    content: 'presumptuously went up into the mountain. '
  '44':
  - type: text
    content: 'And the Amorites who dwelt in that mountain came out against you and chased you '
  - type: note
    content: Num. 14:45; Ps. 118:12
  - type: text
    content: 'as bees do, and drove you back from Seir to Hormah. '
  '45':
  - type: text
    content: 'Then you returned and wept before the '
  - type: heading
    content: Lord
  - type: text
    content: ', but the '
  - type: heading
    content: Lord
  - type: text
    content: ' would not listen to your voice nor give ear to you.'
  '46':
  - type: note
    content: Num. 13:25; 20:1, 22; Deut. 2:7, 14
  - type: text
    content: '“So you remained in Kadesh many days, according to the days that you spent '
  - type: text
    content: there.
  '5':
  - type: text
    content: 'On this side of the Jordan in the land of Moab, Moses began to explain this law, saying, '
  '6':
  - type: text
    content: '“The '
  - type: heading
    content: Lord
  - type: text
    content: ' our God spoke to us '
  - type: note
    content: Ex. 3:1, 12
  - type: text
    content: 'in Horeb, saying: ‘You have dwelt long '
  - type: note
    content: Ex. 19:1, 2
  - type: text
    content: 'enough at this mountain. '
  '7':
  - type: text
    content: 'Turn and take your journey, and go to the mountains of the Amorites, to all the neighboring '
  - type: text
    content: places
  - type: text
    content: ' in the plain, in the mountains and in the lowland, in the South and on the seacoast, to the land of the Canaanites and to Lebanon, as far as the great river, the River Euphrates. '
  '8':
  - type: text
    content: 'See, I have set the land before you; go in and possess the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' swore to your fathers—to '
  - type: note
    content: Gen. 12:7; 15:5; 22:17; 26:3; 28:13; Ex. 33:1; Num. 14:23; 32:11
  - type: text
    content: Abraham, Isaac, and Jacob—to give to them and their descendants after them.’
  - type: heading
    content: Tribal Leaders Appointed
  '9':
  - type: text
    content: '“And '
  - type: note
    content: Ex. 18:18, 24; Num. 11:14, 24
  - type: text
    content: 'I spoke to you at that time, saying: ‘I alone am not able to bear you. '
