    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now while Jeremiah had not yet gone back, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nebuzaradan
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: said,
  - type: text
    text: ' “Go back to '
  - type: usfm
    marker: x
    children:
