document_id: JER.40,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah with Gedaliah the Governor
  - type: text
    content: 'The word that came to Jeremiah from the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Jer. 39:9, 11
  - type: text
    content: after Nebuzaradan the captain of the guard had let him go from Ramah, when he had taken him bound in chains among all who were carried away captive from Jerusalem and Judah, who were carried away captive to Babylon.
  '10':
  - type: text
    content: 'As for me, I will indeed dwell at Mizpah and serve the Chaldeans who come to us. But you, gather wine and summer fruit and oil, put '
  - type: text
    content: them
  - type: text
    content: ' in your vessels, and dwell in your cities that you have taken.” '
  '11':
  - type: text
    content: 'Likewise, when all the Jews who '
  - type: text
    content: were
  - type: text
    content: ' in Moab, among the Ammonites, in Edom, and who '
  - type: text
    content: were
  - type: text
    content: ' in all the countries, heard that the king of Babylon had left a remnant of Judah, and that he had set over them Gedaliah the son of Ahikam, the son of Shaphan, '
  '12':
  - type: text
    content: 'then all the Jews '
  - type: note
    content: Jer. 43:5
  - type: text
    content: returned out of all places where they had been driven, and came to the land of Judah, to Gedaliah at Mizpah, and gathered wine and summer fruit in abundance.
  '13':
  - type: text
    content: 'Moreover Johanan the son of Kareah and all the captains of the forces that '
  - type: text
    content: were
  - type: text
    content: ' in the fields came to Gedaliah at Mizpah, '
  '14':
  - type: text
    content: 'and said to him, “Do you certainly know that '
  - type: note
    content: Jer. 41:10
  - type: text
    content: Baalis the king of the Ammonites has sent Ishmael the son of Nethaniah to murder you?” But Gedaliah the son of Ahikam did not believe them.
  '15':
  - type: text
    content: 'Then Johanan the son of Kareah spoke secretly to Gedaliah in Mizpah, saying, “Let me go, please, and I will kill Ishmael the son of Nethaniah, and no one will know '
  - type: text
    content: it.
  - type: text
    content: ' Why should he murder you, so that all the Jews who are gathered to you would be scattered, and the '
  - type: note
    content: Jer. 42:2
  - type: text
    content: remnant in Judah perish?”
  '16':
  - type: text
    content: But Gedaliah the son of Ahikam said to Johanan the son of Kareah, “You shall not do this thing, for you speak falsely concerning Ishmael.”
  '2':
  - type: text
    content: 'And the captain of the guard took Jeremiah and '
  - type: note
    content: Jer. 50:7
  - type: text
    content: 'said to him: “The '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has pronounced this doom on this place. '
  '3':
  - type: text
    content: 'Now the '
  - type: heading
    content: Lord
  - type: text
    content: ' has brought '
  - type: text
    content: it,
  - type: text
    content: ' and has done just as He said. '
  - type: note
    content: Deut. 29:24, 25; Jer. 50:7; Dan. 9:11; (Rom. 2:5)
  - type: text
    content: 'Because you '
  - type: text
    content: people
  - type: text
    content: ' have sinned against the '
  - type: heading
    content: Lord
  - type: text
    content: ', and not obeyed His voice, therefore this thing has come upon you. '
  '4':
  - type: text
    content: 'And now look, I free you this day from the chains that '
  - type: text
    content: were
  - type: text
    content: ' on your hand. '
  - type: note
    content: Jer. 39:12
  - type: text
    content: 'If it seems good to you to come with me to Babylon, come, and I will look after you. But if it seems wrong for you to come with me to Babylon, remain here. See, '
  - type: note
    content: Gen. 20:15
  - type: text
    content: 'all the land '
  - type: text
    content: is
  - type: text
    content: ' before you; wherever it seems good and convenient for you to go, go there.”'
  '5':
  - type: text
    content: 'Now while Jeremiah had not yet gone back, '
  - type: text
    content: Nebuzaradan
  - type: text
    content: ' '
  - type: text
    content: said,
  - type: text
    content: ' “Go back to '
  - type: note
    content: Jer. 39:14
  - type: text
    content: 'Gedaliah the son of Ahikam, the son of Shaphan, '
  - type: note
    content: 2 Kin. 25:22; Jer. 41:10
  - type: text
    content: 'whom the king of Babylon has made governor over the cities of Judah, and dwell with him among the people. Or go wherever it seems convenient for you to go.” So the captain of the guard gave him rations and a gift and let him go. '
  '6':
  - type: note
    content: Jer. 39:14
  - type: text
    content: 'Then Jeremiah went to Gedaliah the son of Ahikam, to '
  - type: note
    content: Judg. 20:1; 1 Sam. 7:5; 2 Chr. 16:6
  - type: text
    content: Mizpah, and dwelt with him among the people who were left in the land.
  '7':
  - type: note
    content: 2 Kin. 25:23, 24
  - type: text
    content: 'And when all the captains of the armies who '
  - type: text
    content: were
  - type: text
    content: ' in the fields, they and their men, heard that the king of Babylon had made Gedaliah the son of Ahikam governor in the land, and had committed to him men, women, children, and '
  - type: note
    content: Jer. 39:10
  - type: text
    content: 'the poorest of the land who had not been carried away captive to Babylon, '
  '8':
  - type: text
    content: then they came to Gedaliah at Mizpah—
  - type: note
    content: Jer. 41:1–10
  - type: text
    content: 'Ishmael the son of Nethaniah, '
  - type: note
    content: Jer. 41:11; 43:2
  - type: text
    content: 'Johanan and Jonathan the sons of Kareah, Seraiah the son of Tanhumeth, the sons of Ephai the Netophathite, and '
  - type: note
    content: Jer. 42:1
  - type: text
    content: 'Jezaniah the son of a '
  - type: note
    content: Deut. 3:14; Josh. 12:5; 2 Sam. 10:6
  - type: text
    content: 'Maachathite, they and their men. '
  '9':
  - type: text
    content: 'And Gedaliah the son of Ahikam, the son of Shaphan, took an oath before them and their men, saying, “Do not be afraid to serve the Chaldeans. Dwell in the land and serve the king of Babylon, and it shall be '
  - type: note
    content: Jer. 27:11; 38:17–20
  - type: text
    content: 'well with you. '
