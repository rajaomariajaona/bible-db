      text: Jer. 39:14
    marker-yv: yv-n
  - type: text
    text: 'Gedaliah the son of Ahikam, the son of Shaphan, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:22; Jer. 41:10
    marker-yv: yv-n
  - type: text
    text: 'whom the king of Babylon has made governor over the cities of Judah, and dwell with him among the people. Or go wherever it seems convenient for you to go.” So the captain of the guard gave him rations and a gift and let him go. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 39:14
    marker-yv: yv-n
  - type: text
    text: 'Then Jeremiah went to Gedaliah the son of Ahikam, to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 20:1; 1 Sam. 7:5; 2 Chr. 16:6
    marker-yv: yv-n
  - type: text
    text: Mizpah, and dwelt with him among the people who were left in the land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:23, 24
    marker-yv: yv-n
  - type: text
    text: 'And when all the captains of the armies who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in the fields, they and their men, heard that the king of Babylon had made Gedaliah the son of Ahikam governor in the land, and had committed to him men, women, children, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 39:10
    marker-yv: yv-n
  - type: text
    text: 'the poorest of the land who had not been carried away captive to Babylon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: then they came to Gedaliah at Mizpah—
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 41:1–10
    marker-yv: yv-n
  - type: text
    text: 'Ishmael the son of Nethaniah, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 41:11; 43:2
    marker-yv: yv-n
  - type: text
    text: 'Johanan and Jonathan the sons of Kareah, Seraiah the son of Tanhumeth, the sons of Ephai the Netophathite, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 42:1
    marker-yv: yv-n
  - type: text
    text: 'Jezaniah the son of a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 3:14; Josh. 12:5; 2 Sam. 10:6
    marker-yv: yv-n
  - type: text
    text: 'Maachathite, they and their men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Gedaliah the son of Ahikam, the son of Shaphan, took an oath before them and their men, saying, “Do not be afraid to serve the Chaldeans. Dwell in the land and serve the king of Babylon, and it shall be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 27:11; 38:17–20
    marker-yv: yv-n
  - type: text
    text: 'well with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'As for me, I will indeed dwell at Mizpah and serve the Chaldeans who come to us. But you, gather wine and summer fruit and oil, put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' in your vessels, and dwell in your cities that you have taken.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Likewise, when all the Jews who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in Moab, among the Ammonites, in Edom, and who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in all the countries, heard that the king of Babylon had left a remnant of Judah, and that he had set over them Gedaliah the son of Ahikam, the son of Shaphan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'then all the Jews '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 43:5
    marker-yv: yv-n
  - type: text
    text: returned out of all places where they had been driven, and came to the land of Judah, to Gedaliah at Mizpah, and gathered wine and summer fruit in abundance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moreover Johanan the son of Kareah and all the captains of the forces that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in the fields came to Gedaliah at Mizpah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and said to him, “Do you certainly know that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 41:10
    marker-yv: yv-n
  - type: text
    text: Baalis the king of the Ammonites has sent Ishmael the son of Nethaniah to murder you?” But Gedaliah the son of Ahikam did not believe them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Johanan the son of Kareah spoke secretly to Gedaliah in Mizpah, saying, “Let me go, please, and I will kill Ishmael the son of Nethaniah, and no one will know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it.
  - type: text
    text: ' Why should he murder you, so that all the Jews who are gathered to you would be scattered, and the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 42:2
    marker-yv: yv-n
  - type: text
    text: remnant in Judah perish?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But Gedaliah the son of Ahikam said to Johanan the son of Kareah, “You shall not do this thing, for you speak falsely concerning Ishmael.”
