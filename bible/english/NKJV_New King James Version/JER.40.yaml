  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And now look, I free you this day from the chains that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' on your hand. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 39:12
    marker-yv: yv-n
  - type: text
    text: 'If it seems good to you to come with me to Babylon, come, and I will look after you. But if it seems wrong for you to come with me to Babylon, remain here. See, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 20:15
    marker-yv: yv-n
  - type: text
    text: 'all the land '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' before you; wherever it seems good and convenient for you to go, go there.”'
