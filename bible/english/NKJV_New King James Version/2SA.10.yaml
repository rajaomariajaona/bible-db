document_id: 2SA.10,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ammonites and Syrians Defeated
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It happened after this that the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 9:3
      marker-yv: yv-n
    - type: text
      text: 'king of the people of Ammon died, and Hanun his son reigned in his place. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the rest of the people he put under the command of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 10:6
      marker-yv: yv-n
    - type: text
      text: 'Abishai his brother, that he might set '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' in battle array against the people of Ammon. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said, “If the Syrians are too strong for me, then you shall help me; but if the people of Ammon are too strong for you, then I will come and help you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 26:6; 2 Sam. 3:30
      marker-yv: yv-n
    - type: text
      text: 'Be of good courage, and let us '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 31:6; Josh. 1:6, 7, 9; Neh. 4:14
      marker-yv: yv-n
    - type: text
      text: 'be strong for our people and for the cities of our God. And may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 4:9; 1 Cor. 16:13
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good in His sight.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joab and the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with him drew near for the battle against the Syrians, and they fled before him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the people of Ammon saw that the Syrians were fleeing, they also fled before Abishai, and entered the city. So Joab returned from the people of Ammon and went to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 3:18
      marker-yv: yv-n
    - type: text
      text: Jerusalem.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Syrians saw that they had been defeated by Israel, they gathered together. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Hadadezer sent and brought out the Syrians who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' beyond the River, and they came to Helam. And Shobach the commander of Hadadezer’s army '
    - type: usfm
      marker: it
      children:
      - type: text
        text: went
    - type: text
      text: ' before them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When it was told David, he gathered all Israel, crossed over the Jordan, and came to Helam. And the Syrians set themselves in battle array against David and fought with him. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Syrians fled before Israel; and David killed seven hundred charioteers and forty thousand '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 11:1
      marker-yv: yv-n
    - type: text
      text: 'horsemen of the Syrians, and struck Shobach the commander of their army, who died there. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when all the kings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' servants to Hadadezer saw that they were defeated by Israel, they made peace with Israel and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 19:18
      marker-yv: yv-n
    - type: text
      text: served them. So the Syrians were afraid to help the people of Ammon anymore.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David said, “I will show '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 11:1; 1 Chr. 19:1
      marker-yv: yv-n
    - type: text
      text: 'kindness to Hanun the son of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 9:1; 1 Kin. 2:7
      marker-yv: yv-n
    - type: text
      text: Nahash, as his father showed kindness to me.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David sent by the hand of his servants to comfort him concerning his father. And David’s servants came into the land of the people of Ammon. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the princes of the people of Ammon said to Hanun their lord, “Do you think that David really honors your father because he has sent comforters to you? Has David not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rather
    - type: text
      text: ' sent his servants to you to search the city, to spy it out, and to overthrow it?”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore Hanun took David’s servants, shaved off half of their beards, cut off their garments in the middle, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 11:1
      marker-yv: yv-n
    - type: text
      text: 'at their buttocks, and sent them away. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they told David, he sent to meet them, because the men were greatly ashamed. And the king said, “Wait at Jericho until your beards have grown, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: then
    - type: text
      text: ' return.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the people of Ammon saw that they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 20:4; 47:2
      marker-yv: yv-n
    - type: text
      text: 'had made themselves repulsive to David, the people of Ammon sent and hired '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 34:30; Ex. 5:21
      marker-yv: yv-n
    - type: text
      text: 'the Syrians of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:3, 5
      marker-yv: yv-n
    - type: text
      text: 'Beth Rehob and the Syrians of Zoba, twenty thousand foot soldiers; and from the king of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 18:28
      marker-yv: yv-n
    - type: text
      text: 'Maacah one thousand men, and from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 3:14; Josh. 13:11, 13
      marker-yv: yv-n
    - type: text
      text: 'Ish-Tob twelve thousand men. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when David heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' he sent Joab and all the army of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 11:3, 5
      marker-yv: yv-n
    - type: text
      text: 'the mighty men. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the people of Ammon came out and put themselves in battle array at the entrance of the gate. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 23:8
      marker-yv: yv-n
    - type: text
      text: 'the Syrians of Zoba, Beth Rehob, Ish-Tob, and Maacah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' by themselves in the field.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joab saw that the battle line was against him before and behind, he chose some of Israel’s best and put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' in battle array against the Syrians. '
