  - type: text
    content: went
  - type: text
    content: ' before them. '
  '17':
  - type: text
    content: 'When it was told David, he gathered all Israel, crossed over the Jordan, and came to Helam. And the Syrians set themselves in battle array against David and fought with him. '
  '18':
  - type: text
    content: 'Then the Syrians fled before Israel; and David killed seven hundred charioteers and forty thousand '
  - type: note
    content: 2 Sam. 11:1
  - type: text
    content: 'horsemen of the Syrians, and struck Shobach the commander of their army, who died there. '
  '19':
  - type: text
    content: 'And when all the kings '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' servants to Hadadezer saw that they were defeated by Israel, they made peace with Israel and '
  - type: note
    content: 1 Chr. 19:18
  - type: text
    content: served them. So the Syrians were afraid to help the people of Ammon anymore.
  '2':
  - type: text
    content: 'Then David said, “I will show '
  - type: note
    content: 2 Sam. 11:1; 1 Chr. 19:1
  - type: text
    content: 'kindness to Hanun the son of '
  - type: note
    content: 2 Sam. 9:1; 1 Kin. 2:7
  - type: text
    content: Nahash, as his father showed kindness to me.”
  - type: text
    content: 'So David sent by the hand of his servants to comfort him concerning his father. And David’s servants came into the land of the people of Ammon. '
  '3':
  - type: text
    content: 'And the princes of the people of Ammon said to Hanun their lord, “Do you think that David really honors your father because he has sent comforters to you? Has David not '
  - type: text
    content: rather
  - type: text
    content: ' sent his servants to you to search the city, to spy it out, and to overthrow it?”'
  '4':
  - type: text
    content: 'Therefore Hanun took David’s servants, shaved off half of their beards, cut off their garments in the middle, '
  - type: note
    content: 1 Sam. 11:1
  - type: text
    content: 'at their buttocks, and sent them away. '
  '5':
  - type: text
    content: 'When they told David, he sent to meet them, because the men were greatly ashamed. And the king said, “Wait at Jericho until your beards have grown, and '
  - type: text
    content: then
  - type: text
    content: ' return.”'
  '6':
  - type: text
    content: 'When the people of Ammon saw that they '
  - type: note
