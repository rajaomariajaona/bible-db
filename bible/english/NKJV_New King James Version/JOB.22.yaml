document_id: JOB.22,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Eliphaz Accuses Job of Wickedness
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 4:1; 15:1; 42:9
      marker-yv: yv-n
    - type: text
      text: 'Eliphaz the Temanite answered and said:'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Therefore snares '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' all around you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And sudden fear troubles you,
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Or darkness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' you cannot see;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And an abundance of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 38:34; Ps. 69:1, 2; 124:5; Lam. 3:54
      marker-yv: yv-n
    - type: text
      text: water covers you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Is not God in the height of heaven?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And see the highest stars, how lofty they are!
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And you say, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 73:11
      marker-yv: yv-n
    - type: text
      text: ‘What does God know?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can He judge through the deep darkness?
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 139:11, 12
      marker-yv: yv-n
    - type: text
      text: Thick clouds cover Him, so that He cannot see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And He walks above the circle of heaven.’
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Will you keep to the old way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which wicked men have trod,
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 14:19; 15:32; Ps. 90:5; Is. 28:2; Matt. 7:26, 27
      marker-yv: yv-n
    - type: text
      text: were cut down before their time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whose foundations were swept away by a flood?
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 21:14, 15
      marker-yv: yv-n
    - type: text
      text: They said to God, ‘Depart from us!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What can the Almighty do to them?’
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Yet He filled their houses with good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the counsel of the wicked is far from me.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “The
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 52:6; 58:10; 107:42
      marker-yv: yv-n
    - type: text
      text: ' righteous see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' and are glad,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the innocent laugh at them:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Can
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 35:7; (Ps. 16:2; Luke 17:10)
      marker-yv: yv-n
    - type: text
      text: ' a man be profitable to God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Though he who is wise may be profitable to himself?
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ‘Surely our adversaries are cut down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the fire consumes their remnant.’
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“Now acquaint yourself with Him, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 34:10); Is. 27:5
      marker-yv: yv-n
    - type: text
      text: be at peace;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thereby good will come to you.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Receive, please, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 6:10; 23:12; Prov. 2:6
      marker-yv: yv-n
    - type: text
      text: instruction from His mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 119:11)
      marker-yv: yv-n
    - type: text
      text: lay up His words in your heart.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: If you return to the Almighty, you will be built up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will remove iniquity far from your tents.
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then you will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 1:15
      marker-yv: yv-n
    - type: text
      text: lay your gold in the dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gold
    - type: text
      text: ' of Ophir among the stones of the brooks.'
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Yes, the Almighty will be your gold
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your precious silver;
  '26':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For then you will have your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 27:10; Ps. 37:4; Is. 58:14
      marker-yv: yv-n
    - type: text
      text: delight in the Almighty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And lift up your face to God.
  '27':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 11:13; 33:26; (Is. 58:9–11)
      marker-yv: yv-n
    - type: text
      text: You will make your prayer to Him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will hear you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And you will pay your vows.
  '28':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: You will also declare a thing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And it will be established for you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So light will shine on your ways.
  '29':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'When they cast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' down, and you say, ‘Exaltation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come!
    - type: text
      text: ’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:11; (Matt. 23:12; James 4:6; 1 Pet. 5:5)
      marker-yv: yv-n
    - type: text
      text: 'He will save the humble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: person.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' any pleasure to the Almighty that you are righteous?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' gain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him
    - type: text
      text: ' that you make your ways blameless?'
  '30':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'He will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' deliver one who is not innocent;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, he will be delivered by the purity of your hands.”
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Is it because of your fear of Him that He corrects you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And enters into judgment with you?
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' not your wickedness great,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your iniquity without end?
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For you have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 22:26, 27); Deut. 24:6, 10, 17; Job 24:3, 9; Ezek. 18:16
      marker-yv: yv-n
    - type: text
      text: taken pledges from your brother for no reason,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And stripped the naked of their clothing.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: You have not given the weary water to drink,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 15:7; Job 31:17; Is. 58:7; Ezek. 18:7; Matt. 25:42
      marker-yv: yv-n
    - type: text
      text: have withheld bread from the hungry.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But the mighty man possessed the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the honorable man dwelt in it.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You have sent widows away empty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the strength of the fatherless was crushed.
