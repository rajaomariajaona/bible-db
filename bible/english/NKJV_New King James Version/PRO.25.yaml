      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' apples of gold'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In settings of silver.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Like
    - type: text
      text: ' an earring of gold and an ornament of fine gold'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' a wise rebuker to an obedient ear.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 13:17
      marker-yv: yv-n
    - type: text
      text: Like the cold of snow in time of harvest
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' a faithful messenger to those who send him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For he refreshes the soul of his masters.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
