    - type: text
      text: ' expose your shame,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your reputation be ruined.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A word fitly '
    - type: usfm
      marker: x
      children:
      - type: text
