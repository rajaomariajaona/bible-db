  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 15:1
      marker-yv: yv-n
    - type: text
      text: By long forbearance a ruler is persuaded,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a gentle tongue breaks a bone.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have you found honey?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Eat only as much as you need,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lest you be filled with it and vomit.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seldom set foot in your neighbor’s house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lest he become weary of you and hate you.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 57:4; Prov. 12:18
      marker-yv: yv-n
    - type: text
      text: A man who bears false witness against his neighbor
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' a club, a sword, and a sharp arrow.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Confidence in an unfaithful '
    - type: usfm
      marker: it
      children:
      - type: text
