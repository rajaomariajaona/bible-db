  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' vinegar on soda,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' one who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 6:18
      marker-yv: yv-n
    - type: text
      text: sings songs to a heavy heart.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:4, 5; 2 Kin. 6:22; 2 Chr. 28:15; Matt. 5:44; Rom. 12:20
      marker-yv: yv-n
    - type: text
      text: If your enemy is hungry, give him bread to eat;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And if he is thirsty, give him water to drink;
  '22':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so
    - type: text
      text: ' you will heap coals of fire on his head,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 16:12; (Matt. 6:4, 6)
      marker-yv: yv-n
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will reward you.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The north wind brings forth rain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 101:5
      marker-yv: yv-n
    - type: text
      text: a backbiting tongue an angry countenance.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 19:13
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' better to dwell in a corner of a housetop,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Than in a house shared with a contentious woman.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' cold water to a weary soul,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 15:30
      marker-yv: yv-n
    - type: text
      text: good news from a far country.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' who falters before the wicked'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' a murky spring and a polluted well.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not good to eat much honey;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 27:2; (Luke 14:11)
      marker-yv: yv-n
    - type: text
      text: 'to seek one’s own glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: not
    - type: text
