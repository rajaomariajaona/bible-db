    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the glory of God to conceal a matter,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the glory of kings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' to search out a matter.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Like
    - type: text
