  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 16:32
      marker-yv: yv-n
    - type: text
      text: 'Whoever '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has
    - type: text
      text: ' no rule over his own spirit'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' a city broken down, without walls.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' the heavens for height and the earth for depth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So the heart of kings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' unsearchable.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 2:21
      marker-yv: yv-n
    - type: text
      text: Take away the dross from silver,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And it will go to the silversmith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' jewelry.'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take away the wicked from before the king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And his throne will be established in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 16:12; 20:8
      marker-yv: yv-n
    - type: text
      text: righteousness.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not exalt yourself in the presence of the king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And do not stand in the place of the great;
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 14:7–11
      marker-yv: yv-n
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' better that he say to you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Come up here,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Than that you should be put lower in the presence of the prince,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whom your eyes have seen.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 17:14; Matt. 5:25
      marker-yv: yv-n
    - type: text
      text: Do not go hastily to court;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For what will you do in the end,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When your neighbor has put you to shame?
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 18:15)
      marker-yv: yv-n
    - type: text
      text: Debate your case with your neighbor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And do not disclose the secret to another;
