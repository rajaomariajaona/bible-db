document_id: LUK.23,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Handed Over to Pontius Pilate
  - type: text
    content: 'Then '
  - type: note
    content: Matt. 27:2; Mark 15:1; Luke 18:32; John 18:28
  - type: text
    content: 'the whole multitude of them arose and led Him to '
  - type: note
    content: Luke 3:1; 13:1
  - type: text
    content: 'Pilate. '
  '10':
  - type: text
    content: 'And the chief priests and scribes stood and vehemently accused Him. '
  '11':
  - type: note
    content: Is. 53:3
  - type: text
    content: 'Then Herod, with his men of war, treated Him with contempt and mocked '
  - type: text
    content: Him,
  - type: text
    content: ' arrayed Him in a gorgeous robe, and sent Him back to Pilate. '
  '12':
  - type: text
    content: 'That very day '
  - type: note
    content: Acts 4:26, 27
  - type: text
    content: Pilate and Herod became friends with each other, for previously they had been at enmity with each other.
  - type: heading
    content: Taking the Place of Barabbas
  '13':
  - type: note
    content: Matt. 27:23; Mark 15:14; John 18:38
  - type: text
    content: 'Then Pilate, when he had called together the chief priests, the rulers, and the people, '
  '14':
  - type: text
    content: 'said to them, '
  - type: note
    content: Luke 23:1, 2
  - type: text
    content: '“You have brought this Man to me, as one who misleads the people. And indeed, '
  - type: note
    content: Luke 23:4
  - type: text
    content: 'having examined '
  - type: text
    content: Him
  - type: text
    content: ' in your presence, I have found no fault in this Man concerning those things of which you accuse Him; '
  '15':
  - type: text
    content: 'no, neither did Herod, for I sent you back to him; and indeed nothing deserving of death has been done by Him. '
  '16':
  - type: note
    content: Matt. 27:26; Mark 15:15; Luke 23:22; John 19:1; Acts 16:37
  - type: text
    content: 'I will therefore chastise Him and release '
  - type: text
    content: Him
  - type: text
    content: '” '
  '17':
  - type: note
    content: Matt. 27:15; Mark 15:6; John 18:39
  - type: text
    content: (for it was necessary for him to release one to them at the feast).
  '18':
  - type: text
    content: 'And '
  - type: note
    content: Is. 53:3; Acts 3:13–15
  - type: text
    content: 'they all cried out at once, saying, “Away with this '
  - type: text
    content: Man,
  - type: text
    content: ' and release to us Barabbas”— '
  '19':
  - type: text
    content: who had been thrown into prison for a certain rebellion made in the city, and for murder.
  '2':
  - type: text
    content: 'And they began to '
  - type: note
    content: Acts 24:2
  - type: text
    content: 'accuse Him, saying, “We found this '
  - type: text
    content: fellow
  - type: text
    content: ' '
  - type: note
    content: Acts 17:7
  - type: text
    content: 'perverting the nation, and '
  - type: note
    content: Matt. 17:27; Mark 12:17
  - type: text
    content: 'forbidding to pay taxes to Caesar, saying '
  - type: note
    content: John 19:12
  - type: text
    content: that He Himself is Christ, a King.”
  '20':
  - type: text
    content: 'Pilate, therefore, wishing to release Jesus, again called out to them. '
  '21':
  - type: text
    content: 'But they shouted, saying, “Crucify '
  - type: text
    content: Him,
  - type: text
    content: ' crucify Him!”'
  '22':
  - type: text
    content: 'Then he said to them the third time, “Why, what evil has He done? I have found no reason for death in Him. I will therefore chastise Him and let '
  - type: text
    content: Him
  - type: text
    content: ' go.”'
  '23':
  - type: text
    content: 'But they were insistent, demanding with loud voices that He be crucified. And the voices of these men and of the chief priests prevailed. '
  '24':
  - type: text
    content: 'So '
  - type: note
    content: Matt. 27:26; Mark 15:15; John 19:16
  - type: text
    content: 'Pilate gave sentence that it should be as they requested. '
  '25':
  - type: note
    content: Is. 53:8
  - type: text
    content: And he released to them the one they requested, who for rebellion and murder had been thrown into prison; but he delivered Jesus to their will.
  - type: heading
    content: The King on a Cross
  '26':
  - type: note
    content: Matt. 27:32; Mark 15:21; John 19:17
  - type: text
    content: 'Now as they led Him away, they laid hold of a certain man, Simon a Cyrenian, who was coming from the country, and on him they laid the cross that he might bear '
  - type: text
    content: it
  - type: text
    content: ' after Jesus.'
  '27':
  - type: text
    content: 'And a great multitude of the people followed Him, and women who also mourned and lamented Him. '
  '28':
  - type: text
    content: 'But Jesus, turning to them, said, '
  - type: text
    content: “Daughters of Jerusalem, do not weep for Me, but weep for yourselves and for your children.
  - type: text
    content: ' '
  '29':
  - type: note
    content: Matt. 24:19; Luke 21:23
  - type: text
    content: 'For indeed the days are coming in which they will say, ‘Blessed '
  - type: text
    content: are
  - type: text
    content: ' the barren, wombs that never bore, and breasts which never nursed!’'
  - type: text
    content: ' '
  '3':
  - type: note
    content: Matt. 27:11; 1 Tim. 6:13
  - type: text
    content: Then Pilate asked Him, saying, “Are You the King of the Jews?”
  - type: text
    content: 'He answered him and said, '
  - type: text
    content: “
  - type: text
    content: It is as
  - type: text
    content: ' you say.”'
  '30':
  - type: text
    content: 'Then they will begin '
  - type: note
    content: Is. 2:19; Hos. 10:8; Rev. 6:16, 17; 9:6
  - type: text
    content: ‘to say to the mountains, “Fall on us!” and to the hills, “Cover us!” ’
  - type: text
    content: ' '
  '31':
  - type: note
    content: (Prov. 11:31; Jer. 25:29); Ezek. 20:47; 21:3, 4; 1 Pet. 4:17
  - type: text
    content: For if they do these things in the green wood, what will be done in the dry?”
  '32':
  - type: note
    content: Is. 53:9, 12; Matt. 27:38; Mark 15:27; John 19:18
  - type: text
    content: 'There were also two others, criminals, led with Him to be put to death. '
  '33':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 22:16–18; Matt. 27:33–44; Mark 15:22–32; John 19:17–24
  - type: text
    content: 'when they had come to the place called Calvary, there they crucified Him, and the criminals, one on the right hand and the other on the left. '
  '34':
  - type: text
    content: 'Then Jesus said, '
  - type: text
    content: '“Father, '
  - type: note
    content: Ps. 109:4; (Matt. 5:44); Acts 7:60; 1 Cor. 4:12
  - type: text
    content: 'forgive them, for '
  - type: note
    content: Acts 3:17
  - type: text
    content: they do not know what they do.”
  - type: text
    content: 'And '
  - type: note
    content: Ps. 22:18; Matt. 27:35; Mark 15:24; John 19:23
  - type: text
    content: 'they divided His garments and cast lots. '
  '35':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 22:17; (Zech. 12:10)
  - type: text
    content: 'the people stood looking on. But even the '
  - type: note
    content: Ps. 22:8; Matt. 27:39; Mark 15:29
  - type: text
    content: rulers with them sneered, saying, “He saved others; let Him save Himself if He is the Christ, the chosen of God.”
  '36':
  - type: text
    content: 'The soldiers also mocked Him, coming and offering Him '
  - type: note
    content: Ps. 69:21
  - type: text
    content: 'sour wine, '
  '37':
  - type: text
    content: and saying, “If You are the King of the Jews, save Yourself.”
  '38':
  - type: note
    content: Matt. 27:37; Mark 15:26; John 19:19
  - type: text
    content: 'And an inscription also was written over Him in letters of Greek, Latin, and Hebrew:'
  - type: text
    content: THIS IS THE KING OF THE JEWS.
  '39':
  - type: note
    content: Matt. 27:44; Mark 15:32
  - type: text
    content: Then one of the criminals who were hanged blasphemed Him, saying, “If You are the Christ, save Yourself and us.”
  '4':
  - type: text
    content: 'So Pilate said to the chief priests and the crowd, '
  - type: note
    content: Matt. 27:19; (1 Pet. 2:22)
  - type: text
    content: “I find no fault in this Man.”
  '40':
  - type: text
    content: 'But the other, answering, rebuked him, saying, “Do you not even fear God, seeing you are under the same condemnation? '
  '41':
  - type: text
    content: 'And we indeed justly, for we receive the due reward of our deeds; but this Man has done '
  - type: note
    content: (2 Cor. 5:21; Heb. 7:26; 1 Pet. 2:21–24)
  - type: text
    content: 'nothing wrong.” '
  '42':
  - type: text
    content: Then he said to Jesus, “Lord, remember me when You come into Your kingdom.”
  '43':
  - type: text
    content: 'And Jesus said to him, '
  - type: text
    content: '“Assuredly, I say to you, today you will be with Me in '
  - type: note
    content: (2 Cor. 12:4; Eph. 4:8–10; Rev. 2:7)
  - type: text
    content: Paradise.”
  - type: heading
    content: Jesus Dies on the Cross
  '44':
  - type: note
    content: Amos 8:9; Matt. 27:45–56; Mark 15:33–41
  - type: text
    content: 'Now it was about the sixth hour, and there was darkness over all the earth until the ninth hour. '
  '45':
  - type: text
    content: 'Then the sun was darkened, and '
  - type: note
    content: Ex. 26:31–33; Zech. 11:10; Matt. 27:51; Mark 15:38; (Heb. 9:3; 10:19, 20)
  - type: text
    content: 'the veil of the temple was torn in two. '
  '46':
  - type: text
    content: 'And when Jesus had cried out with a loud voice, He said, '
  - type: text
    content: '“Father, '
  - type: note
    content: Ps. 31:5; 1 Pet. 2:23
  - type: text
    content: ‘into Your hands I commit My spirit.’
  - type: text
    content: ' ”'
  - type: text
    content: ' '
  - type: note
    content: Dan. 9:26; Zech. 11:10, 11; Matt. 27:50; Mark 15:37; Luke 9:22; 18:33; John 19:30
  - type: text
    content: Having said this, He breathed His last.
  '47':
  - type: note
    content: Matt. 27:54; Mark 15:39
  - type: text
    content: So when the centurion saw what had happened, he glorified God, saying, “Certainly this was a righteous Man!”
  '48':
  - type: text
    content: 'And the whole crowd who came together to that sight, seeing what had been done, beat their breasts and returned. '
  '49':
  - type: note
    content: Ps. 38:11; Matt. 27:55; Mark 15:40; John 16:20–22; 19:25
  - type: text
    content: But all His acquaintances, and the women who followed Him from Galilee, stood at a distance, watching these things.
  - type: heading
    content: Jesus Buried in Joseph’s Tomb
  '5':
  - type: text
    content: 'But they were the more fierce, saying, “He stirs up the people, teaching throughout all Judea, beginning from '
  - type: note
    content: John 7:41
  - type: text
    content: Galilee to this place.”
  - type: heading
    content: Jesus Faces Herod
  '50':
  - type: note
    content: Matt. 27:57–61; Mark 15:42–47; John 19:38–42
  - type: text
    content: 'Now behold, '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' a man named Joseph, a council member, a good and just man. '
  '51':
  - type: text
    content: 'He had not consented to their decision and deed. '
  - type: text
    content: He
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' from Arimathea, a city of the Jews, '
  - type: note
    content: Mark 15:43; Luke 2:25, 38
  - type: text
    content: 'who himself was also waiting for the kingdom of God. '
  '52':
  - type: text
    content: 'This man went to Pilate and asked for the body of Jesus. '
  '53':
  - type: note
    content: Is. 53:9; Matt. 27:59; Mark 15:46
  - type: text
    content: 'Then he took it down, wrapped it in linen, and laid it in a tomb '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' hewn out of the rock, where no one had ever lain before. '
  '54':
  - type: text
    content: 'That day was '
  - type: note
    content: Matt. 27:62; Mark 15:42
  - type: text
    content: the Preparation, and the Sabbath drew near.
  '55':
  - type: text
    content: 'And the women '
  - type: note
    content: Luke 8:2
  - type: text
    content: 'who had come with Him from Galilee followed after, and '
  - type: note
    content: Mark 15:47
  - type: text
    content: 'they observed the tomb and how His body was laid. '
  '56':
  - type: text
    content: 'Then they returned and '
  - type: note
    content: Mark 16:1; Luke 24:1
  - type: text
    content: 'prepared spices and fragrant oils. And they rested on the Sabbath '
  - type: note
    content: Ex. 20:10; Deut. 5:14
  - type: text
    content: according to the commandment.
  '6':
  - type: text
    content: 'When Pilate heard of Galilee, he asked if the Man were a Galilean. '
  '7':
  - type: text
    content: 'And as soon as he knew that He belonged to '
  - type: note
    content: Matt. 14:1; Mark 6:14; Luke 3:1; 9:7; 13:31
  - type: text
    content: 'Herod’s jurisdiction, he sent Him to Herod, who was also in Jerusalem at that time. '
  '8':
  - type: text
    content: 'Now when Herod saw Jesus, '
  - type: note
    content: Luke 9:9
  - type: text
    content: 'he was exceedingly glad; for he had desired for a long '
  - type: text
    content: time
  - type: text
    content: ' to see Him, because '
  - type: note
    content: Matt. 14:1; Mark 6:14
  - type: text
    content: 'he had heard many things about Him, and he hoped to see some miracle done by Him. '
  '9':
  - type: text
    content: 'Then he questioned Him with many words, but He answered him '
  - type: note
    content: Is. 53:7; Matt. 27:12, 14; Mark 15:5; John 19:9
  - type: text
    content: 'nothing. '
