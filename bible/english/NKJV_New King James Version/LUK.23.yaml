document_id: LUK.23,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Handed Over to Pontius Pilate
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:2; Mark 15:1; Luke 18:32; John 18:28
      marker-yv: yv-n
    - type: text
      text: 'the whole multitude of them arose and led Him to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 3:1; 13:1
      marker-yv: yv-n
    - type: text
      text: 'Pilate. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the chief priests and scribes stood and vehemently accused Him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 53:3
      marker-yv: yv-n
    - type: text
      text: 'Then Herod, with his men of war, treated Him with contempt and mocked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him,
    - type: text
      text: ' arrayed Him in a gorgeous robe, and sent Him back to Pilate. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'That very day '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:26, 27
      marker-yv: yv-n
    - type: text
      text: Pilate and Herod became friends with each other, for previously they had been at enmity with each other.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Taking the Place of Barabbas
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:23; Mark 15:14; John 18:38
      marker-yv: yv-n
    - type: text
      text: 'Then Pilate, when he had called together the chief priests, the rulers, and the people, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'said to them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 23:1, 2
      marker-yv: yv-n
    - type: text
      text: '“You have brought this Man to me, as one who misleads the people. And indeed, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 23:4
      marker-yv: yv-n
    - type: text
      text: 'having examined '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him
    - type: text
      text: ' in your presence, I have found no fault in this Man concerning those things of which you accuse Him; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'no, neither did Herod, for I sent you back to him; and indeed nothing deserving of death has been done by Him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:26; Mark 15:15; Luke 23:22; John 19:1; Acts 16:37
      marker-yv: yv-n
    - type: text
      text: 'I will therefore chastise Him and release '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him
    - type: text
      text: '” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:15; Mark 15:6; John 18:39
      marker-yv: yv-n
    - type: text
      text: (for it was necessary for him to release one to them at the feast).
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 53:3; Acts 3:13–15
      marker-yv: yv-n
    - type: text
      text: 'they all cried out at once, saying, “Away with this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Man,
    - type: text
      text: ' and release to us Barabbas”— '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: who had been thrown into prison for a certain rebellion made in the city, and for murder.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And they began to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 24:2
      marker-yv: yv-n
    - type: text
      text: 'accuse Him, saying, “We found this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fellow
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 17:7
      marker-yv: yv-n
    - type: text
      text: 'perverting the nation, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 17:27; Mark 12:17
      marker-yv: yv-n
    - type: text
      text: 'forbidding to pay taxes to Caesar, saying '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 19:12
      marker-yv: yv-n
    - type: text
      text: that He Himself is Christ, a King.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Pilate, therefore, wishing to release Jesus, again called out to them. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But they shouted, saying, “Crucify '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him,
    - type: text
      text: ' crucify Him!”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then he said to them the third time, “Why, what evil has He done? I have found no reason for death in Him. I will therefore chastise Him and let '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him
    - type: text
      text: ' go.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But they were insistent, demanding with loud voices that He be crucified. And the voices of these men and of the chief priests prevailed. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:26; Mark 15:15; John 19:16
      marker-yv: yv-n
    - type: text
      text: 'Pilate gave sentence that it should be as they requested. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 53:8
      marker-yv: yv-n
    - type: text
      text: And he released to them the one they requested, who for rebellion and murder had been thrown into prison; but he delivered Jesus to their will.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The King on a Cross
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:32; Mark 15:21; John 19:17
      marker-yv: yv-n
    - type: text
      text: 'Now as they led Him away, they laid hold of a certain man, Simon a Cyrenian, who was coming from the country, and on him they laid the cross that he might bear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' after Jesus.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And a great multitude of the people followed Him, and women who also mourned and lamented Him. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'But Jesus, turning to them, said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Daughters of Jerusalem, do not weep for Me, but weep for yourselves and for your children.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 24:19; Luke 21:23
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For indeed the days are coming in which they will say, ‘Blessed '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: are
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' the barren, wombs that never bore, and breasts which never nursed!’'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:11; 1 Tim. 6:13
      marker-yv: yv-n
    - type: text
      text: Then Pilate asked Him, saying, “Are You the King of the Jews?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He answered him and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: It is as
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' you say.”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Then they will begin '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 2:19; Hos. 10:8; Rev. 6:16, 17; 9:6
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘to say to the mountains, “Fall on us!” and to the hills, “Cover us!” ’
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 11:31; Jer. 25:29); Ezek. 20:47; 21:3, 4; 1 Pet. 4:17
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For if they do these things in the green wood, what will be done in the dry?”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 53:9, 12; Matt. 27:38; Mark 15:27; John 19:18
      marker-yv: yv-n
    - type: text
      text: 'There were also two others, criminals, led with Him to be put to death. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 22:16–18; Matt. 27:33–44; Mark 15:22–32; John 19:17–24
      marker-yv: yv-n
    - type: text
      text: 'when they had come to the place called Calvary, there they crucified Him, and the criminals, one on the right hand and the other on the left. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Then Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Father, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 109:4; (Matt. 5:44); Acts 7:60; 1 Cor. 4:12
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'forgive them, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 3:17
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: they do not know what they do.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 22:18; Matt. 27:35; Mark 15:24; John 19:23
      marker-yv: yv-n
    - type: text
      text: 'they divided His garments and cast lots. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 22:17; (Zech. 12:10)
      marker-yv: yv-n
    - type: text
      text: 'the people stood looking on. But even the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 22:8; Matt. 27:39; Mark 15:29
      marker-yv: yv-n
    - type: text
      text: rulers with them sneered, saying, “He saved others; let Him save Himself if He is the Christ, the chosen of God.”
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'The soldiers also mocked Him, coming and offering Him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 69:21
      marker-yv: yv-n
    - type: text
      text: 'sour wine, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: and saying, “If You are the King of the Jews, save Yourself.”
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:37; Mark 15:26; John 19:19
      marker-yv: yv-n
    - type: text
      text: 'And an inscription also was written over Him in letters of Greek, Latin, and Hebrew:'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: THIS IS THE KING OF THE JEWS.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:44; Mark 15:32
      marker-yv: yv-n
    - type: text
      text: Then one of the criminals who were hanged blasphemed Him, saying, “If You are the Christ, save Yourself and us.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So Pilate said to the chief priests and the crowd, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:19; (1 Pet. 2:22)
      marker-yv: yv-n
    - type: text
      text: “I find no fault in this Man.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'But the other, answering, rebuked him, saying, “Do you not even fear God, seeing you are under the same condemnation? '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'And we indeed justly, for we receive the due reward of our deeds; but this Man has done '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 5:21; Heb. 7:26; 1 Pet. 2:21–24)
      marker-yv: yv-n
    - type: text
      text: 'nothing wrong.” '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Then he said to Jesus, “Lord, remember me when You come into Your kingdom.”
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'And Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Assuredly, I say to you, today you will be with Me in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 12:4; Eph. 4:8–10; Rev. 2:7)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Paradise.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Dies on the Cross
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Amos 8:9; Matt. 27:45–56; Mark 15:33–41
      marker-yv: yv-n
    - type: text
      text: 'Now it was about the sixth hour, and there was darkness over all the earth until the ninth hour. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Then the sun was darkened, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:31–33; Zech. 11:10; Matt. 27:51; Mark 15:38; (Heb. 9:3; 10:19, 20)
      marker-yv: yv-n
    - type: text
      text: 'the veil of the temple was torn in two. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'And when Jesus had cried out with a loud voice, He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Father, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 31:5; 1 Pet. 2:23
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘into Your hands I commit My spirit.’
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' ”'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 9:26; Zech. 11:10, 11; Matt. 27:50; Mark 15:37; Luke 9:22; 18:33; John 19:30
      marker-yv: yv-n
    - type: text
      text: Having said this, He breathed His last.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:54; Mark 15:39
      marker-yv: yv-n
    - type: text
      text: So when the centurion saw what had happened, he glorified God, saying, “Certainly this was a righteous Man!”
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'And the whole crowd who came together to that sight, seeing what had been done, beat their breasts and returned. '
  '49':
  - type: usfm
    marker: p
