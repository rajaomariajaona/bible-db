document_id: GAL.4,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'Now I say '
  - type: text
    content: that
  - type: text
    content: ' the heir, as long as he is a child, does not differ at all from a slave, though he is master of all, '
  '10':
  - type: note
    content: Rom. 14:5; Col. 2:16
  - type: text
    content: 'You observe days and months and seasons and years. '
  '11':
  - type: text
    content: 'I am afraid for you, '
  - type: note
    content: 1 Thess. 3:5
  - type: text
    content: lest I have labored for you in vain.
  '12':
  - type: text
    content: 'Brethren, I urge you to become like me, for I '
  - type: text
    content: became
  - type: text
    content: ' like you. '
  - type: note
    content: 2 Cor. 2:5
  - type: text
    content: 'You have not injured me at all. '
  '13':
  - type: text
    content: 'You know that '
  - type: note
    content: 1 Cor. 2:3
  - type: text
    content: 'because of physical infirmity I preached the gospel to you at the first. '
  '14':
  - type: text
    content: 'And my trial which was in my flesh you did not despise or reject, but you received me '
  - type: note
    content: Mal. 2:7
  - type: text
    content: 'as an angel of God, '
  - type: note
    content: (Luke 10:16)
  - type: text
    content: even
  - type: text
    content: ' as Christ Jesus. '
  '15':
  - type: text
    content: 'What then was the blessing you '
  - type: text
    content: enjoyed?
  - type: text
    content: ' For I bear you witness that, if possible, you would have plucked out your own eyes and given them to me. '
  '16':
  - type: text
    content: Have I therefore become your enemy because I tell you the truth?
  '17':
  - type: text
    content: 'They '
  - type: note
    content: Rom. 10:2
  - type: text
    content: 'zealously court you, '
  - type: text
    content: but
  - type: text
    content: ' for no good; yes, they want to exclude you, that you may be zealous for them. '
  '18':
  - type: text
    content: 'But it is good to be zealous in a good thing always, and not only when I am present with you. '
  '19':
  - type: note
    content: 1 Cor. 4:15
  - type: text
    content: 'My little children, for whom I labor in birth again until Christ is formed in you, '
  '2':
  - type: text
    content: 'but is under guardians and stewards until the time appointed by the father. '
  '20':
  - type: text
    content: I would like to be present with you now and to change my tone; for I have doubts about you.
  - type: heading
    content: Two Covenants
  '21':
  - type: text
    content: 'Tell me, you who desire to be under the law, do you not hear the law? '
  '22':
  - type: text
    content: 'For it is written that Abraham had two sons: '
  - type: note
    content: Gen. 16:15
  - type: text
    content: 'the one by a bondwoman, '
  - type: note
    content: Gen. 21:2
  - type: text
    content: 'the other by a freewoman. '
  '23':
  - type: text
    content: 'But he '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' of the bondwoman '
  - type: note
    content: Rom. 9:7, 8; Gal. 4:29
  - type: text
    content: 'was born according to the flesh, '
  - type: note
    content: Gen. 16:15; 17:15–19; 18:10; 21:1; Gal. 4:28; Heb. 11:11
  - type: text
    content: 'and he of the freewoman through promise, '
  '24':
  - type: text
    content: 'which things are symbolic. For these are the two covenants: the one from Mount '
  - type: note
    content: Ex. 24:6–8; Deut. 33:2
  - type: text
    content: 'Sinai which gives birth to bondage, which is Hagar— '
  '25':
  - type: text
    content: 'for this Hagar is Mount Sinai in Arabia, and corresponds to Jerusalem which now is, and is in bondage with her children— '
  '26':
  - type: text
    content: 'but the '
  - type: note
    content: (Is. 2:2)
  - type: text
    content: 'Jerusalem above is free, which is the mother of us all. '
  '27':
  - type: text
    content: 'For it is written:'
  - type: note
    content: Is. 54:1
  - type: text
    content: “Rejoice, O barren,
  - type: text
    content: You
  - type: text
    content: ' who do not bear!'
  - type: text
    content: Break forth and shout,
  - type: text
    content: You who are not in labor!
  - type: text
    content: For the desolate has many more children
  - type: text
    content: Than she who has a husband.”
  '28':
  - type: text
    content: 'Now '
  - type: note
    content: Rom. 9:7, 8; Gal. 3:29
  - type: text
    content: 'we, brethren, as Isaac '
  - type: text
    content: was,
  - type: text
    content: ' are '
  - type: note
    content: Acts 3:25
  - type: text
    content: 'children of promise. '
  '29':
  - type: text
    content: 'But, as '
  - type: note
    content: Gen. 21:9
  - type: text
    content: 'he who was born according to the flesh then persecuted him '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: text
    content: born
  - type: text
    content: ' according to the Spirit, '
  - type: note
    content: Gal. 5:11
  - type: text
    content: 'even so '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' now. '
  '3':
  - type: text
    content: 'Even so we, when we were children, '
  - type: note
    content: Gal. 4:9; Col. 2:8, 20; Heb. 5:12; 9:10
  - type: text
    content: 'were in bondage under the elements of the world. '
  '30':
  - type: text
    content: 'Nevertheless what does '
  - type: note
    content: (Gal. 3:8, 22)
  - type: text
    content: 'the Scripture say? '
  - type: note
    content: Gen. 21:10, 12
  - type: text
    content: '“Cast out the bondwoman and her son, for '
  - type: note
    content: (John 8:35)
  - type: text
    content: 'the son of the bondwoman shall not be heir with the son of the freewoman.” '
  '31':
  - type: text
    content: So then, brethren, we are not children of the bondwoman but of the free.
  '4':
  - type: text
    content: 'But '
  - type: note
    content: (Gen. 49:10)
  - type: text
    content: 'when the fullness of the time had come, God sent forth His Son, '
  - type: note
    content: (John 1:14); Rom. 1:3; 8:3; (Phil. 2:7)
  - type: text
    content: 'born '
  - type: note
    content: Gen. 3:15; (Is. 7:14; Matt. 1:25)
  - type: text
    content: 'of a woman, '
  - type: note
    content: (Matt. 5:17); Luke 2:21, 27
  - type: text
    content: 'born under the law, '
  '5':
  - type: note
    content: (Matt. 20:28; Gal. 3:13)
  - type: text
    content: 'to redeem those who were under the law, '
  - type: note
    content: (John 1:12)
  - type: text
    content: that we might receive the adoption as sons.
  '6':
  - type: text
    content: 'And because you are sons, God has sent forth '
  - type: note
    content: (Acts 16:7; Rom. 5:5; 8:9, 15, 16; 2 Cor. 3:17)
  - type: text
    content: 'the Spirit of His Son into your hearts, crying out, “Abba, Father!” '
  '7':
  - type: text
    content: 'Therefore you are no longer a slave but a son, '
  - type: note
    content: (Rom. 8:16, 17)
  - type: text
    content: and if a son, then an heir of God through Christ.
  - type: heading
    content: Fears for the Church
  '8':
  - type: text
    content: 'But then, indeed, '
  - type: note
    content: 1 Cor. 1:21; Eph. 2:12; 1 Thess. 4:5; 2 Thess. 1:8
  - type: text
    content: 'when you did not know God, '
  - type: note
    content: Rom. 1:25
  - type: text
    content: 'you served those which by nature are not gods. '
  '9':
  - type: text
    content: 'But now '
  - type: note
    content: (1 Cor. 8:3)
  - type: text
    content: 'after you have known God, or rather are known by God, '
  - type: note
    content: Gal. 3:1–3; Col. 2:20
  - type: text
    content: 'how '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: that
  - type: text
    content: ' you turn again to '
  - type: note
    content: Heb. 7:18
  - type: text
    content: 'the weak and beggarly elements, to which you desire again to be in bondage? '
