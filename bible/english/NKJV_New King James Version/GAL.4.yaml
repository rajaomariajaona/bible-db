document_id: GAL.4,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now I say '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' the heir, as long as he is a child, does not differ at all from a slave, though he is master of all, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 14:5; Col. 2:16
      marker-yv: yv-n
    - type: text
      text: 'You observe days and months and seasons and years. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am afraid for you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 3:5
      marker-yv: yv-n
    - type: text
      text: lest I have labored for you in vain.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Brethren, I urge you to become like me, for I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: became
    - type: text
      text: ' like you. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 2:5
      marker-yv: yv-n
    - type: text
      text: 'You have not injured me at all. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You know that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 2:3
      marker-yv: yv-n
    - type: text
      text: 'because of physical infirmity I preached the gospel to you at the first. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And my trial which was in my flesh you did not despise or reject, but you received me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 2:7
      marker-yv: yv-n
    - type: text
      text: 'as an angel of God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Luke 10:16)
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' as Christ Jesus. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What then was the blessing you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: enjoyed?
    - type: text
      text: ' For I bear you witness that, if possible, you would have plucked out your own eyes and given them to me. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Have I therefore become your enemy because I tell you the truth?
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 10:2
      marker-yv: yv-n
    - type: text
      text: 'zealously court you, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' for no good; yes, they want to exclude you, that you may be zealous for them. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it is good to be zealous in a good thing always, and not only when I am present with you. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 4:15
      marker-yv: yv-n
    - type: text
      text: 'My little children, for whom I labor in birth again until Christ is formed in you, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but is under guardians and stewards until the time appointed by the father. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I would like to be present with you now and to change my tone; for I have doubts about you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Two Covenants
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tell me, you who desire to be under the law, do you not hear the law? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it is written that Abraham had two sons: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 16:15
      marker-yv: yv-n
    - type: text
      text: 'the one by a bondwoman, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 21:2
      marker-yv: yv-n
    - type: text
      text: 'the other by a freewoman. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' of the bondwoman '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 9:7, 8; Gal. 4:29
      marker-yv: yv-n
    - type: text
      text: 'was born according to the flesh, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 16:15; 17:15–19; 18:10; 21:1; Gal. 4:28; Heb. 11:11
      marker-yv: yv-n
    - type: text
      text: 'and he of the freewoman through promise, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'which things are symbolic. For these are the two covenants: the one from Mount '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 24:6–8; Deut. 33:2
      marker-yv: yv-n
    - type: text
      text: 'Sinai which gives birth to bondage, which is Hagar— '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for this Hagar is Mount Sinai in Arabia, and corresponds to Jerusalem which now is, and is in bondage with her children— '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 2:2)
      marker-yv: yv-n
    - type: text
      text: 'Jerusalem above is free, which is the mother of us all. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it is written:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 54:1
      marker-yv: yv-n
    - type: text
      text: “Rejoice, O barren,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: You
    - type: text
      text: ' who do not bear!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Break forth and shout,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You who are not in labor!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the desolate has many more children
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Than she who has a husband.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 9:7, 8; Gal. 3:29
      marker-yv: yv-n
    - type: text
      text: 'we, brethren, as Isaac '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was,
    - type: text
      text: ' are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 3:25
      marker-yv: yv-n
    - type: text
      text: 'children of promise. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But, as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 21:9
      marker-yv: yv-n
    - type: text
      text: 'he who was born according to the flesh then persecuted him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: born
    - type: text
      text: ' according to the Spirit, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 5:11
      marker-yv: yv-n
    - type: text
      text: 'even so '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' now. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even so we, when we were children, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 4:9; Col. 2:8, 20; Heb. 5:12; 9:10
      marker-yv: yv-n
    - type: text
      text: 'were in bondage under the elements of the world. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless what does '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gal. 3:8, 22)
      marker-yv: yv-n
    - type: text
      text: 'the Scripture say? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 21:10, 12
      marker-yv: yv-n
    - type: text
      text: '“Cast out the bondwoman and her son, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 8:35)
      marker-yv: yv-n
    - type: text
      text: 'the son of the bondwoman shall not be heir with the son of the freewoman.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So then, brethren, we are not children of the bondwoman but of the free.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 49:10)
      marker-yv: yv-n
    - type: text
      text: 'when the fullness of the time had come, God sent forth His Son, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 1:14); Rom. 1:3; 8:3; (Phil. 2:7)
      marker-yv: yv-n
    - type: text
      text: 'born '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 3:15; (Is. 7:14; Matt. 1:25)
      marker-yv: yv-n
    - type: text
      text: 'of a woman, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 5:17); Luke 2:21, 27
      marker-yv: yv-n
    - type: text
      text: 'born under the law, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 20:28; Gal. 3:13)
      marker-yv: yv-n
    - type: text
      text: 'to redeem those who were under the law, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 1:12)
      marker-yv: yv-n
    - type: text
      text: that we might receive the adoption as sons.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And because you are sons, God has sent forth '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 16:7; Rom. 5:5; 8:9, 15, 16; 2 Cor. 3:17)
      marker-yv: yv-n
    - type: text
      text: 'the Spirit of His Son into your hearts, crying out, “Abba, Father!” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore you are no longer a slave but a son, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 8:16, 17)
      marker-yv: yv-n
    - type: text
      text: and if a son, then an heir of God through Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fears for the Church
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But then, indeed, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 1:21; Eph. 2:12; 1 Thess. 4:5; 2 Thess. 1:8
      marker-yv: yv-n
    - type: text
      text: 'when you did not know God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:25
      marker-yv: yv-n
    - type: text
      text: 'you served those which by nature are not gods. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 8:3)
      marker-yv: yv-n
    - type: text
      text: 'after you have known God, or rather are known by God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 3:1–3; Col. 2:20
      marker-yv: yv-n
    - type: text
      text: 'how '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' you turn again to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 7:18
      marker-yv: yv-n
    - type: text
      text: 'the weak and beggarly elements, to which you desire again to be in bondage? '
