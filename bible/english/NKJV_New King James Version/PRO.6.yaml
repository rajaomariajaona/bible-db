      marker-yv: yv-n
    - type: text
      text: he must restore sevenfold;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He may have to give up all the substance of his house.
  '32':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Whoever commits adultery with a woman '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 7:7
      marker-yv: yv-n
    - type: text
      text: lacks understanding;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' does so destroys his own soul.'
  '33':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Wounds and dishonor he will get,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his reproach will not be wiped away.
  '34':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 27:4; Song 8:6
      marker-yv: yv-n
    - type: text
      text: 'jealousy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a husband’s fury;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore he will not spare in the day of vengeance.
  '35':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: He will accept no recompense,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor will he be appeased though you give many gifts.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 132:4
      marker-yv: yv-n
    - type: text
      text: Give no sleep to your eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor slumber to your eyelids.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Deliver yourself like a gazelle from the hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hunter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And like a bird from the hand of the fowler.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Folly of Indolence
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 12:7
      marker-yv: yv-n
    - type: text
      text: Go to the ant, you sluggard!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Consider her ways and be wise,
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Which, having no captain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Overseer or ruler,
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Provides her supplies in the summer,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' gathers her food in the harvest.'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 24:33, 34
      marker-yv: yv-n
    - type: text
      text: How long will you slumber, O sluggard?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When will you rise from your sleep?
