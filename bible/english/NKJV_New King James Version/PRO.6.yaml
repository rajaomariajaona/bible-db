    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 3:23)
      marker-yv: yv-n
    - type: text
      text: When you roam, they will lead you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When you sleep, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 2:11
      marker-yv: yv-n
    - type: text
      text: they will keep you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when
    - type: text
      text: ' you awake, they will speak with you.'
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 19:8; 2 Pet. 1:19
      marker-yv: yv-n
    - type: text
      text: 'For the commandment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a lamp,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the law a light;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Reproofs of instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the way of life,'
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 2:16
      marker-yv: yv-n
    - type: text
      text: To keep you from the evil woman,
  - type: usfm
    marker: q2
    children:
    - type: text
