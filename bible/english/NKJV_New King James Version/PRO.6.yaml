    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: A worthless person, a wicked man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Walks with a perverse mouth;
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 15:12; Ps. 35:19; Prov. 10:10
      marker-yv: yv-n
    - type: text
      text: He winks with his eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shuffles his feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He points with his fingers;
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Perversity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
