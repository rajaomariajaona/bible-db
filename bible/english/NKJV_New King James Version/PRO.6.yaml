    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' speaks lies,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And one who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 6:14; 1 Cor. 1:11–13; (Jude 3, 4, 16–19)
      marker-yv: yv-n
    - type: text
      text: sows discord among brethren.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Beware of Adultery
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You are snared by the words of your mouth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are taken by the words of your mouth.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:1
      marker-yv: yv-n
    - type: text
      text: My son, keep your father’s command,
  - type: usfm
    marker: q2
    children:
    - type: text
