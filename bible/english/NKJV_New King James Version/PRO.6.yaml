  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 5:28
      marker-yv: yv-n
    - type: text
      text: Do not lust after her beauty in your heart,
  - type: usfm
    marker: q2
    children:
    - type: text
