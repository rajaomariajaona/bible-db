  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 39:14
      marker-yv: yv-n
    - type: text
      text: 'And an adulteress will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 13:18
      marker-yv: yv-n
    - type: text
      text: prey upon his precious life.
  '27':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Can a man take fire to his bosom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his clothes not be burned?
  '28':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Can one walk on hot coals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his feet not be seared?
  '29':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' he who goes in to his neighbor’s wife;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whoever touches her shall not be innocent.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So do this, my son, and deliver yourself;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For you have come into the hand of your friend:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Go and humble yourself;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Plead with your friend.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: it
      children:
      - type: text
        text: People
    - type: text
      text: ' do not despise a thief'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If he steals to satisfy himself when he is starving.
  '31':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Yet '
    - type: usfm
