      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' hates,'
  - type: usfm
    marker: q2
    children:
