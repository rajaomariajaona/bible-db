  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: A little sleep, a little slumber,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A little folding of the hands to sleep—
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
