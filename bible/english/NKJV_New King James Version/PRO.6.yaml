  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 6:19
      marker-yv: yv-n
    - type: text
      text: He sows discord.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Therefore his calamity shall come '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 24:22; Is. 30:13; 1 Thess. 5:3
      marker-yv: yv-n
    - type: text
