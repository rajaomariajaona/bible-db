  '25':
  - type: note
    content: 1 Cor. 15:57
  - type: text
    content: I thank God—through Jesus Christ our Lord!
  - type: text
    content: So then, with the mind I myself serve the law of God, but with the flesh the law of sin.
  '3':
  - type: text
    content: 'So then '
  - type: note
    content: (Matt. 5:32)
  - type: text
    content: 'if, while '
  - type: text
    content: her
  - type: text
    content: ' husband lives, she marries another man, she will be called an adulteress; but if her husband dies, she is free from that law, so that she is no adulteress, though she has married another man. '
  '4':
  - type: text
    content: 'Therefore, my brethren, you also have become '
  - type: note
    content: Rom. 8:2; Gal. 2:19; 5:18; (Col. 2:14)
  - type: text
