document_id: ROM.7,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Freed from the Law
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Or do you not know, brethren (for I speak to those who know the law), that the law has dominion over a man as long as he lives? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the commandment, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:5; Ezek. 20:11, 13, 21; Luke 10:28; Rom. 10:5; 2 Cor. 3:7; Gal. 3:12
      marker-yv: yv-n
    - type: text
      text: 'which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bring
    - type: text
      text: ' life, I found to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bring
    - type: text
      text: ' death. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For sin, taking occasion by the commandment, deceived me, and by it killed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 19:8
      marker-yv: yv-n
    - type: text
      text: 'the law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' holy, and the commandment holy and just and good.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Law Cannot Save from Sin
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Has then what is good become death to me? Certainly not! But sin, that it might appear sin, was producing death in me through what is good, so that sin through the commandment might become exceedingly sinful. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For we know that the law is spiritual, but I am carnal, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 21:20, 25; 2 Kin. 17:17; Rom. 6:16
      marker-yv: yv-n
    - type: text
      text: 'sold under sin. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For what I am doing, I do not understand. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 7:19; (Gal. 5:17)
      marker-yv: yv-n
    - type: text
      text: 'For what I will to do, that I do not practice; but what I hate, that I do. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'If, then, I do what I will not to do, I agree with the law that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But now, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no longer I who do it, but sin that dwells in me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For I know that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 6:5; 8:21)
      marker-yv: yv-n
    - type: text
      text: 'in me (that is, in my flesh) nothing good dwells; for to will is present with me, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: how
    - type: text
      text: ' to perform what is good I do not find. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For the good that I will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do,
    - type: text
      text: ' I do not do; but the evil I will not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do,
    - type: text
      text: ' that I practice. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 7:39
      marker-yv: yv-n
    - type: text
      text: 'the woman who has a husband is bound by the law to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' husband as long as he lives. But if the husband dies, she is released from the law of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' husband. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Now if I do what I will not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do,
    - type: text
      text: ' it is no longer I who do it, but sin that dwells in me.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'I find then a law, that evil is present with me, the one who wills to do good. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 1:2
      marker-yv: yv-n
    - type: text
      text: 'delight in the law of God according to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 4:16; Eph. 3:16; 1 Pet. 3:4)
      marker-yv: yv-n
    - type: text
      text: 'the inward man. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 6:19; (Gal. 5:17); James 4:1; 1 Pet. 2:11
      marker-yv: yv-n
    - type: text
      text: 'I see another law in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 6:13, 19
      marker-yv: yv-n
    - type: text
      text: 'my members, warring against the law of my mind, and bringing me into captivity to the law of sin which is in my members. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'O wretched man that I am! Who will deliver me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 8:11; 1 Cor. 15:51, 52; 1 Thess. 4:14–17)
      marker-yv: yv-n
    - type: text
      text: 'from this body of death? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:57
      marker-yv: yv-n
    - type: text
      text: I thank God—through Jesus Christ our Lord!
  - type: usfm
    marker: p
    children:
    - type: text
      text: So then, with the mind I myself serve the law of God, but with the flesh the law of sin.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 5:32)
      marker-yv: yv-n
    - type: text
      text: 'if, while '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' husband lives, she marries another man, she will be called an adulteress; but if her husband dies, she is free from that law, so that she is no adulteress, though she has married another man. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Therefore, my brethren, you also have become '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 8:2; Gal. 2:19; 5:18; (Col. 2:14)
      marker-yv: yv-n
    - type: text
      text: 'dead to the law through the body of Christ, that you may be married to another—to Him who was raised from the dead, that we should '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 5:22
      marker-yv: yv-n
    - type: text
      text: 'bear fruit to God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For when we were in the flesh, the sinful passions which were aroused by the law '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 6:13
      marker-yv: yv-n
    - type: text
      text: 'were at work in our members '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 6:21; Gal. 5:19; James 1:15
      marker-yv: yv-n
    - type: text
      text: 'to bear fruit to death. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But now we have been delivered from the law, having died to what we were held by, so that we should serve '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 2:29; 2 Cor. 3:6
      marker-yv: yv-n
    - type: text
      text: 'in the newness of the Spirit and not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' the oldness of the letter.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sin’s Advantage in the Law
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'What shall we say then? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' the law sin? Certainly not! On the contrary, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 3:20
      marker-yv: yv-n
    - type: text
      text: 'I would not have known sin except through the law. For I would not have known covetousness unless the law had said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:17; Deut. 5:21; Acts 20:33
      marker-yv: yv-n
    - type: text
      text: '“You shall not covet.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 4:15
      marker-yv: yv-n
    - type: text
      text: 'sin, taking opportunity by the commandment, produced in me all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: manner
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: evil
    - type: text
      text: ' desire. For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:56
      marker-yv: yv-n
    - type: text
      text: 'apart from the law sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' dead. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I was alive once without the law, but when the commandment came, sin revived and I died. '
