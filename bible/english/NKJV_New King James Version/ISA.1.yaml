  '1':
  - type: text
    content: 'The '
  - type: note
    content: Num. 12:6
  - type: text
    content: 'vision of Isaiah the son of Amoz, which he saw concerning Judah and Jerusalem in the '
  - type: note
    content: 2 Chr. 26—32
  - type: text
    content: 'days of Uzziah, Jotham, Ahaz, '
  - type: text
    content: and
  - type: text
    content: ' Hezekiah, kings of Judah.'
  - type: heading
    content: The Wickedness of Judah
  '10':
  - type: text
    content: 'Hear the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'You rulers '
  - type: note
    content: Deut. 32:32
  - type: text
    content: of Sodom;
  - type: text
    content: Give ear to the law of our God,
  - type: text
    content: 'You people of Gomorrah:'
  '11':
  - type: text
    content: '“To what purpose '
  - type: text
    content: is
  - type: text
    content: ' the multitude of your '
  - type: note
    content: (1 Sam. 15:22)
  - type: text
    content: sacrifices to Me?”
  - type: text
    content: 'Says the '
  - type: heading
    content: Lord
  - type: text
    content: .
  - type: text
    content: “I have had enough of burnt offerings of rams
  - type: text
    content: And the fat of fed cattle.
  - type: text
    content: I do not delight in the blood of bulls,
  - type: text
    content: Or of lambs or goats.
  '12':
  - type: text
    content: '“When you come '
  - type: note
    content: Ex. 23:17
  - type: text
    content: to appear before Me,
  - type: text
    content: Who has required this from your hand,
  - type: text
    content: To trample My courts?
  '13':
  - type: text
    content: 'Bring no more '
  - type: note
    content: Matt. 15:9
  - type: text
    content: futile sacrifices;
  - type: text
    content: Incense is an abomination to Me.
  - type: text
    content: 'The New Moons, the Sabbaths, and '
  - type: note
    content: Joel 1:14
  - type: text
    content: the calling of assemblies—
  - type: text
    content: I cannot endure iniquity and the sacred meeting.
  '14':
  - type: text
    content: 'Your '
  - type: note
    content: Num. 28:11
  - type: text
    content: 'New Moons and your '
  - type: note
    content: Lam. 2:6
  - type: text
    content: appointed feasts
  - type: text
    content: My soul hates;
  - type: text
    content: They are a trouble to Me,
  - type: text
    content: 'I am weary of bearing '
  - type: text
    content: them.
  '15':
  - type: note
    content: Prov. 1:28
  - type: text
    content: When you spread out your hands,
  - type: text
    content: I will hide My eyes from you;
  - type: note
    content: Ps. 66:18; Is. 59:1–3; Mic. 3:4
  - type: text
    content: Even though you make many prayers,
  - type: text
    content: I will not hear.
  - type: text
    content: Your hands are full of blood.
  '16':
  - type: text
    content: “Wash
  - type: note
    content: Jer. 4:14
  - type: text
    content: ' yourselves, make yourselves clean;'
  - type: text
    content: Put away the evil of your doings from before My eyes.
  - type: note
    content: Rom. 12:9
  - type: text
    content: Cease to do evil,
  '17':
  - type: text
    content: Learn to do good;
  - type: text
    content: Seek justice,
  - type: text
    content: Rebuke the oppressor;
  - type: text
    content: Defend the fatherless,
  - type: text
    content: Plead for the widow.
  '18':
  - type: text
    content: '“Come now, and let us '
  - type: note
    content: Is. 43:26; Mic. 6:2
  - type: text
    content: reason together,”
  - type: text
    content: 'Says the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “Though your sins are like scarlet,
  - type: note
    content: Ps. 51:7; (Is. 43:25); Rev. 7:14
  - type: text
    content: They shall be as white as snow;
  - type: text
    content: Though they are red like crimson,
  - type: text
    content: They shall be as wool.
  '19':
  - type: text
    content: If you are willing and obedient,
  - type: text
    content: You shall eat the good of the land;
  '2':
  - type: note
    content: Jer. 2:12
  - type: text
    content: Hear, O heavens, and give ear, O earth!
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' has spoken:'
  - type: text
    content: “I have nourished and brought up children,
  - type: text
    content: And they have rebelled against Me;
  '20':
  - type: text
    content: But if you refuse and rebel,
  - type: text
    content: You shall be devoured by the sword”;
  - type: note
    content: Is. 40:5; 58:14; Mic. 4:4; (Titus 1:2)
  - type: text
    content: 'For the mouth of the '
  - type: heading
    content: Lord
  - type: text
    content: ' has spoken.'
  - type: heading
    content: The Degenerate City
  '21':
  - type: note
    content: Is. 57:3–9; Jer. 2:20
  - type: text
    content: How the faithful city has become a harlot!
  - type: text
    content: It was full of justice;
  - type: text
    content: Righteousness lodged in it,
  - type: text
    content: 'But now '
  - type: note
    content: Mic. 3:1–3
  - type: text
    content: murderers.
  '22':
  - type: note
    content: Jer. 6:28
  - type: text
    content: Your silver has become dross,
  - type: text
    content: Your wine mixed with water.
  '23':
  - type: note
    content: Hos. 9:15
  - type: text
    content: 'Your princes '
  - type: text
    content: are
  - type: text
    content: ' rebellious,'
  - type: text
    content: 'And '
  - type: note
    content: Prov. 29:24
  - type: text
    content: companions of thieves;
  - type: note
    content: Jer. 22:17
  - type: text
    content: Everyone loves bribes,
  - type: text
    content: And follows after rewards.
  - type: text
    content: 'They '
  - type: note
    content: Is. 10:2; Jer. 5:28; Ezek. 22:7; Zech. 7:10
  - type: text
    content: do not defend the fatherless,
  - type: text
    content: Nor does the cause of the widow come before them.
  '24':
  - type: text
    content: Therefore the Lord says,
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the Mighty One of Israel,'
  - type: text
    content: '“Ah, '
  - type: note
    content: Deut. 28:63
  - type: text
    content: I will rid Myself of My adversaries,
  - type: text
    content: And take vengeance on My enemies.
  '25':
  - type: text
    content: I will turn My hand against you,
  - type: text
    content: 'And '
  - type: note
    content: Is. 48:10; Ezek. 22:19–22; Mal. 3:3
  - type: text
    content: thoroughly purge away your dross,
  - type: text
    content: And take away all your alloy.
  '26':
  - type: text
    content: 'I will restore your judges '
  - type: note
    content: Jer. 33:7–11
  - type: text
    content: as at the first,
  - type: text
    content: And your counselors as at the beginning.
  - type: text
    content: 'Afterward '
  - type: note
    content: Is. 33:5; Zech. 8:3
  - type: text
    content: you shall be called the city of righteousness, the faithful city.”
  '27':
  - type: text
    content: Zion shall be redeemed with justice,
  - type: text
    content: And her penitents with righteousness.
  '28':
  - type: text
    content: 'The '
  - type: note
    content: Job 31:3; Ps. 9:5; (Is. 66:24; 2 Thess. 1:8, 9)
  - type: text
    content: 'destruction of transgressors and of sinners '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' together,'
  - type: text
    content: 'And those who forsake the '
  - type: heading
    content: Lord
  - type: text
    content: ' shall be consumed.'
  '29':
  - type: text
    content: For they shall be ashamed of the terebinth trees
  - type: text
    content: Which you have desired;
  - type: text
    content: And you shall be embarrassed because of the gardens
  - type: text
    content: Which you have chosen.
  '3':
  - type: note
    content: Jer. 8:7
  - type: text
    content: The ox knows its owner
  - type: text
    content: And the donkey its master’s crib;
  - type: text
    content: But
  - type: text
    content: ' Israel '
  - type: note
    content: Jer. 9:3, 6
  - type: text
    content: does not know,
  - type: text
    content: My people do not consider.”
  '30':
  - type: text
    content: For you shall be as a terebinth whose leaf fades,
  - type: text
    content: And as a garden that has no water.
  '31':
  - type: note
    content: Ezek. 32:21
  - type: text
    content: The strong shall be as tinder,
  - type: text
    content: And the work of it as a spark;
  - type: text
    content: Both will burn together,
  - type: text
    content: 'And no one shall '
  - type: note
    content: Is. 66:24; Matt. 3:12; Mark 9:43
  - type: text
    content: 'quench '
  - type: text
    content: them.
  '4':
  - type: text
    content: Alas, sinful nation,
  - type: text
    content: A people laden with iniquity,
  - type: note
    content: Is. 57:3, 4; Matt. 3:7
  - type: text
    content: A brood of evildoers,
  - type: text
    content: Children who are corrupters!
  - type: text
    content: 'They have forsaken the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: They have provoked to anger
  - type: text
    content: The Holy One of Israel,
  - type: text
    content: They have turned away backward.
  '5':
  - type: note
    content: Jer. 5:3
  - type: text
    content: Why should you be stricken again?
  - type: text
    content: You will revolt more and more.
  - type: text
    content: The whole head is sick,
  - type: text
    content: And the whole heart faints.
  '6':
  - type: text
    content: From the sole of the foot even to the head,
  - type: text
    content: There
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' no soundness in it,'
  - type: text
    content: But
  - type: text
    content: ' wounds and bruises and putrefying sores;'
  - type: text
    content: They have not been closed or bound up,
  - type: text
    content: Or soothed with ointment.
  '7':
  - type: note
    content: Deut. 28:51, 52; 2 Chr. 36:19
  - type: text
    content: 'Your country '
  - type: text
    content: is
  - type: text
    content: ' desolate,'
  - type: text
    content: 'Your cities '
  - type: text
    content: are
  - type: text
    content: ' burned with fire;'
  - type: text
    content: Strangers devour your land in your presence;
  - type: text
    content: 'And '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' desolate, as overthrown by strangers.'
  '8':
  - type: text
    content: 'So the daughter of Zion is left '
  - type: note
    content: Job 27:18
  - type: text
    content: as a booth in a vineyard,
  - type: text
    content: As a hut in a garden of cucumbers,
  - type: note
    content: Jer. 4:17
  - type: text
    content: As a besieged city.
  '9':
  - type: note
    content: 2 Kin. 25:11, 22; Lam. 3:22
  - type: text
    content: 'Unless the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts'
  - type: text
    content: Had left to us a very small remnant,
  - type: text
    content: 'We would have become like '
  - type: note
    content: Gen. 19:24; Rom. 9:29
  - type: text
    content: Sodom,
  - type: text
    content: We would have been made like Gomorrah.
