verses:
  '1':
  - type: heading
    content: The Voyage to Rome Begins
  - type: text
    content: 'And when '
  - type: note
    content: Acts 25:12, 25
  - type: text
    content: 'it was decided that we should sail to Italy, they delivered Paul and some other prisoners to '
  - type: text
    content: one
  - type: text
    content: ' named Julius, a centurion of the Augustan Regiment. '
  '10':
  - type: text
    content: 'saying, “Men, I perceive that this voyage will end with disaster and much loss, not only of the cargo and ship, but also our lives.” '
  '11':
  - type: text
    content: 'Nevertheless the centurion was more persuaded by the helmsman and the owner of the ship than by the things spoken by Paul. '
  '12':
  - type: text
    content: 'And because the harbor was not suitable to winter in, the majority advised to set sail from there also, if by any means they could reach Phoenix, a harbor of Crete opening toward the southwest and northwest, '
  - type: text
    content: and
  - type: text
    content: ' winter '
  - type: text
    content: there.
  - type: heading
    content: In the Tempest
  '13':
  - type: text
    content: 'When the south wind blew softly, supposing that they had obtained '
  - type: text
    content: their
  - type: text
    content: ' desire, putting out to sea, they sailed close by Crete. '
  '14':
  - type: text
    content: 'But not long after, a tempestuous head wind arose, called Euroclydon. '
  '15':
  - type: text
    content: 'So when the ship was caught, and could not head into the wind, we let '
  - type: text
    content: her
  - type: text
    content: ' drive. '
  '16':
  - type: text
    content: 'And running under '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: shelter
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' an island called Clauda, we secured the skiff with difficulty. '
  '17':
  - type: text
    content: 'When they had taken it on board, they used cables to undergird the ship; and fearing lest they should run aground on the Syrtis '
  - type: text
    content: Sands,
  - type: text
    content: ' they struck sail and so were driven. '
  '18':
  - type: text
    content: 'And because we were exceedingly tempest-tossed, the next '
  - type: text
    content: day
  - type: text
    content: ' they lightened the ship. '
  '19':
  - type: text
    content: 'On the third '
  - type: text
    content: day
  - type: text
    content: ' '
  - type: note
    content: Jon. 1:5
  - type: text
    content: 'we threw the ship’s tackle overboard with our own hands. '
  '2':
  - type: text
    content: 'So, entering a ship of Adramyttium, we put to sea, meaning to sail along the coasts of Asia. '
  - type: note
    content: Acts 19:29
  - type: text
    content: 'Aristarchus, a Macedonian of Thessalonica, was with us. '
  '20':
  - type: text
    content: 'Now when neither sun nor stars appeared for many days, and no small tempest beat on '
  - type: text
    content: us,
  - type: text
    content: ' all hope that we would be saved was finally given up.'
  '21':
  - type: text
    content: 'But after long abstinence from food, then Paul stood in the midst of them and said, “Men, you should have listened to me, and not have sailed from Crete and incurred this disaster and loss. '
  '22':
  - type: text
    content: 'And now I urge you to take heart, for there will be no loss of life among you, but only of the ship. '
  '23':
  - type: note
    content: Acts 18:9; 23:11; 2 Tim. 4:17
  - type: text
    content: 'For there stood by me this night an angel of the God to whom I belong and '
  - type: note
    content: Dan. 6:16; Rom. 1:9; 2 Tim. 1:3
  - type: text
    content: 'whom I serve, '
  '24':
  - type: text
    content: 'saying, ‘Do not be afraid, Paul; you must be brought before Caesar; and indeed God has granted you all those who sail with you.’ '
  '25':
  - type: text
    content: 'Therefore take heart, men, '
  - type: note
    content: Luke 1:45; Rom. 4:20, 21; 2 Tim. 1:12
  - type: text
    content: 'for I believe God that it will be just as it was told me. '
  '26':
  - type: text
    content: 'However, '
  - type: note
    content: Acts 28:1
  - type: text
    content: we must run aground on a certain island.”
  '27':
  - type: text
    content: 'Now when the fourteenth night had come, as we were driven up and down in the Adriatic '
  - type: text
    content: Sea,
  - type: text
    content: ' about midnight the sailors sensed that they were drawing near some land. '
  '28':
  - type: text
    content: 'And they took soundings and found '
  - type: text
    content: it
  - type: text
    content: ' to be twenty fathoms; and when they had gone a little farther, they took soundings again and found '
  - type: text
    content: it
  - type: text
    content: ' to be fifteen fathoms. '
  '29':
  - type: text
    content: 'Then, fearing lest we should run aground on the rocks, they dropped four anchors from the stern, and prayed for day to come. '
  '3':
  - type: text
    content: 'And the next '
  - type: text
    content: day
  - type: text
    content: ' we landed at Sidon. And Julius '
  - type: note
    content: Acts 24:23; 28:16
  - type: text
    content: 'treated Paul kindly and gave '
  - type: text
    content: him
  - type: text
    content: ' liberty to go to his friends and receive care. '
  '30':
  - type: text
    content: 'And as the sailors were seeking to escape from the ship, when they had let down the skiff into the sea, under pretense of putting out anchors from the prow, '
  '31':
  - type: text
    content: 'Paul said to the centurion and the soldiers, “Unless these men stay in the ship, you cannot be saved.” '
  '32':
  - type: text
    content: Then the soldiers cut away the ropes of the skiff and let it fall off.
  '33':
  - type: text
    content: 'And as day was about to dawn, Paul implored '
  - type: text
    content: them
  - type: text
    content: ' all to take food, saying, “Today is the fourteenth day you have waited and continued without food, and eaten nothing. '
  '34':
  - type: text
    content: 'Therefore I urge you to take nourishment, for this is for your survival, '
  - type: note
    content: 1 Kin. 1:52; (Matt. 10:30; Luke 12:7; 21:18)
  - type: text
    content: 'since not a hair will fall from the head of any of you.” '
  '35':
  - type: text
    content: 'And when he had said these things, he took bread and '
  - type: note
    content: 1 Sam. 9:13; Matt. 15:36; Mark 8:6; John 6:11; (1 Tim. 4:3, 4)
  - type: text
    content: 'gave thanks to God in the presence of them all; and when he had broken '
  - type: text
    content: it
  - type: text
    content: ' he began to eat. '
  '36':
  - type: text
    content: 'Then they were all encouraged, and also took food themselves. '
  '37':
  - type: text
    content: 'And in all we were two hundred and seventy-six '
  - type: note
    content: Acts 2:41; 7:14; Rom. 13:1; 1 Pet. 3:20
  - type: text
    content: 'persons on the ship. '
  '38':
  - type: text
    content: So when they had eaten enough, they lightened the ship and threw out the wheat into the sea.
  - type: heading
    content: Shipwrecked on Malta
  '39':
  - type: text
    content: 'When it was day, they did not recognize the land; but they observed a bay with a beach, onto which they planned to run the ship if possible. '
  '4':
  - type: text
    content: 'When we had put to sea from there, we sailed under '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: shelter
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' Cyprus, because the winds were contrary. '
  '40':
  - type: text
    content: 'And they let go the anchors and left '
  - type: text
    content: them
  - type: text
    content: ' in the sea, meanwhile loosing the rudder ropes; and they hoisted the mainsail to the wind and made for shore. '
  '41':
  - type: text
    content: 'But striking a place where two seas met, '
  - type: note
    content: 2 Cor. 11:25
  - type: text
    content: they ran the ship aground; and the prow stuck fast and remained immovable, but the stern was being broken up by the violence of the waves.
  '42':
  - type: text
    content: 'And the soldiers’ plan was to kill the prisoners, lest any of them should swim away and escape. '
  '43':
  - type: text
    content: 'But the centurion, wanting to save Paul, kept them from '
  - type: text
    content: their
  - type: text
    content: ' purpose, and commanded that those who could swim should jump '
  - type: text
    content: overboard
  - type: text
    content: ' first and get to land, '
  '44':
  - type: text
    content: 'and the rest, some on boards and some on '
  - type: text
    content: parts
  - type: text
    content: ' of the ship. And so it was '
  - type: note
    content: Acts 27:22, 31
  - type: text
    content: that they all escaped safely to land.
  '5':
  - type: text
    content: 'And when we had sailed over the sea which is off Cilicia and Pamphylia, we came to Myra, '
  - type: text
    content: a
  - type: text
    content: ' '
  - type: text
    content: city
  - type: text
    content: ' of Lycia. '
  '6':
  - type: text
    content: 'There the centurion found '
  - type: note
    content: Acts 28:11
  - type: text
    content: an Alexandrian ship sailing to Italy, and he put us on board.
  '7':
  - type: text
    content: 'When we had sailed slowly many days, and arrived with difficulty off Cnidus, the wind not permitting us to proceed, we sailed under '
  - type: text
