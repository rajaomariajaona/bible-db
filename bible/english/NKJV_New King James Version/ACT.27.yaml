document_id: ACT.27,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Voyage to Rome Begins
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And when '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 25:12, 25
      marker-yv: yv-n
    - type: text
      text: 'it was decided that we should sail to Italy, they delivered Paul and some other prisoners to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' named Julius, a centurion of the Augustan Regiment. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'saying, “Men, I perceive that this voyage will end with disaster and much loss, not only of the cargo and ship, but also our lives.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nevertheless the centurion was more persuaded by the helmsman and the owner of the ship than by the things spoken by Paul. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And because the harbor was not suitable to winter in, the majority advised to set sail from there also, if by any means they could reach Phoenix, a harbor of Crete opening toward the southwest and northwest, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' winter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: In the Tempest
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When the south wind blew softly, supposing that they had obtained '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' desire, putting out to sea, they sailed close by Crete. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But not long after, a tempestuous head wind arose, called Euroclydon. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So when the ship was caught, and could not head into the wind, we let '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' drive. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And running under '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shelter
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' an island called Clauda, we secured the skiff with difficulty. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'When they had taken it on board, they used cables to undergird the ship; and fearing lest they should run aground on the Syrtis '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sands,
    - type: text
      text: ' they struck sail and so were driven. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And because we were exceedingly tempest-tossed, the next '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' they lightened the ship. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'On the third '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jon. 1:5
      marker-yv: yv-n
    - type: text
      text: 'we threw the ship’s tackle overboard with our own hands. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So, entering a ship of Adramyttium, we put to sea, meaning to sail along the coasts of Asia. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:29
      marker-yv: yv-n
    - type: text
      text: 'Aristarchus, a Macedonian of Thessalonica, was with us. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Now when neither sun nor stars appeared for many days, and no small tempest beat on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us,
    - type: text
      text: ' all hope that we would be saved was finally given up.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But after long abstinence from food, then Paul stood in the midst of them and said, “Men, you should have listened to me, and not have sailed from Crete and incurred this disaster and loss. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And now I urge you to take heart, for there will be no loss of life among you, but only of the ship. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:9; 23:11; 2 Tim. 4:17
      marker-yv: yv-n
    - type: text
      text: 'For there stood by me this night an angel of the God to whom I belong and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 6:16; Rom. 1:9; 2 Tim. 1:3
      marker-yv: yv-n
    - type: text
      text: 'whom I serve, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'saying, ‘Do not be afraid, Paul; you must be brought before Caesar; and indeed God has granted you all those who sail with you.’ '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Therefore take heart, men, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 1:45; Rom. 4:20, 21; 2 Tim. 1:12
      marker-yv: yv-n
    - type: text
      text: 'for I believe God that it will be just as it was told me. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'However, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 28:1
      marker-yv: yv-n
    - type: text
      text: we must run aground on a certain island.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Now when the fourteenth night had come, as we were driven up and down in the Adriatic '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sea,
    - type: text
      text: ' about midnight the sailors sensed that they were drawing near some land. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And they took soundings and found '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' to be twenty fathoms; and when they had gone a little farther, they took soundings again and found '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' to be fifteen fathoms. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then, fearing lest we should run aground on the rocks, they dropped four anchors from the stern, and prayed for day to come. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the next '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' we landed at Sidon. And Julius '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 24:23; 28:16
      marker-yv: yv-n
    - type: text
      text: 'treated Paul kindly and gave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' liberty to go to his friends and receive care. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And as the sailors were seeking to escape from the ship, when they had let down the skiff into the sea, under pretense of putting out anchors from the prow, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Paul said to the centurion and the soldiers, “Unless these men stay in the ship, you cannot be saved.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Then the soldiers cut away the ropes of the skiff and let it fall off.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And as day was about to dawn, Paul implored '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' all to take food, saying, “Today is the fourteenth day you have waited and continued without food, and eaten nothing. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Therefore I urge you to take nourishment, for this is for your survival, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 1:52; (Matt. 10:30; Luke 12:7; 21:18)
      marker-yv: yv-n
    - type: text
      text: 'since not a hair will fall from the head of any of you.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And when he had said these things, he took bread and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 9:13; Matt. 15:36; Mark 8:6; John 6:11; (1 Tim. 4:3, 4)
      marker-yv: yv-n
    - type: text
      text: 'gave thanks to God in the presence of them all; and when he had broken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' he began to eat. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Then they were all encouraged, and also took food themselves. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And in all we were two hundred and seventy-six '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:41; 7:14; Rom. 13:1; 1 Pet. 3:20
      marker-yv: yv-n
    - type: text
      text: 'persons on the ship. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: So when they had eaten enough, they lightened the ship and threw out the wheat into the sea.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Shipwrecked on Malta
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'When it was day, they did not recognize the land; but they observed a bay with a beach, onto which they planned to run the ship if possible. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'When we had put to sea from there, we sailed under '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shelter
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' Cyprus, because the winds were contrary. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And they let go the anchors and left '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' in the sea, meanwhile loosing the rudder ropes; and they hoisted the mainsail to the wind and made for shore. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'But striking a place where two seas met, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 11:25
      marker-yv: yv-n
    - type: text
      text: they ran the ship aground; and the prow stuck fast and remained immovable, but the stern was being broken up by the violence of the waves.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'And the soldiers’ plan was to kill the prisoners, lest any of them should swim away and escape. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'But the centurion, wanting to save Paul, kept them from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' purpose, and commanded that those who could swim should jump '
    - type: usfm
      marker: it
      children:
      - type: text
        text: overboard
    - type: text
      text: ' first and get to land, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'and the rest, some on boards and some on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: parts
    - type: text
      text: ' of the ship. And so it was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 27:22, 31
      marker-yv: yv-n
    - type: text
      text: that they all escaped safely to land.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And when we had sailed over the sea which is off Cilicia and Pamphylia, we came to Myra, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: city
    - type: text
      text: ' of Lycia. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'There the centurion found '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 28:11
      marker-yv: yv-n
    - type: text
      text: an Alexandrian ship sailing to Italy, and he put us on board.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'When we had sailed slowly many days, and arrived with difficulty off Cnidus, the wind not permitting us to proceed, we sailed under '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shelter
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:11; 27:12, 21; Titus 1:5, 12
      marker-yv: yv-n
    - type: text
      text: 'Crete off Salmone. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Passing it with difficulty, we came to a place called Fair Havens, near the city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' Lasea.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Warning Ignored
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now when much time had been spent, and sailing was now dangerous '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 16:29–31; 23:27–29; Num. 29:7
      marker-yv: yv-n
    - type: text
      text: 'because the Fast was already over, Paul advised them, '
