  - type: text
    content: 'Crete off Salmone. '
  '8':
  - type: text
    content: 'Passing it with difficulty, we came to a place called Fair Havens, near the city '
  - type: text
    content: of
  - type: text
    content: ' Lasea.'
  - type: heading
