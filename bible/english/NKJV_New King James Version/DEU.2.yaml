document_id: DEU.2,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Desert Years
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:40
      marker-yv: yv-n
    - type: text
      text: '“Then we turned and journeyed into the wilderness of the Way of the Red Sea, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:25
      marker-yv: yv-n
    - type: text
      text: 'as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to me, and we skirted Mount Seir for many days.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:5
      marker-yv: yv-n
    - type: text
      text: '(The Emim had dwelt there in times past, a people as great and numerous and tall as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:22, 33; Deut. 9:2
      marker-yv: yv-n
    - type: text
      text: 'the Anakim. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'They were also regarded as giants, like the Anakim, but the Moabites call them Emim. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:6; 36:20; Deut. 2:22
      marker-yv: yv-n
    - type: text
      text: 'The Horites formerly dwelt in Seir, but the descendants of Esau dispossessed them and destroyed them from before them, and dwelt in their place, just as Israel did to the land of their possession which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave them.)'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“ ‘Now rise and cross over '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:12
      marker-yv: yv-n
    - type: text
      text: 'the Valley of the Zered.’ So we crossed over the Valley of the Zered. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And the time we took to come '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:26
      marker-yv: yv-n
    - type: text
      text: 'from Kadesh Barnea until we crossed over the Valley of the Zered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' thirty-eight years, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:33; 26:64; Deut. 1:34, 35
      marker-yv: yv-n
    - type: text
      text: 'until all the generation of the men of war was consumed from the midst of the camp, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:35; Ezek. 20:15
      marker-yv: yv-n
    - type: text
      text: 'just as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had sworn to them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For indeed the hand of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was against them, to destroy them from the midst of the camp until they were consumed.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“So it was, when all the men of war had finally perished from among the people, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to me, saying: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '‘This day you are to cross over at Ar, the boundary of Moab. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when
    - type: text
      text: ' you come near the people of Ammon, do not harass them or meddle with them, for I will not give you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' of the land of the people of Ammon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' a possession, because I have given it to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:38; Num. 21:24
      marker-yv: yv-n
    - type: text
      text: 'the descendants of Lot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' a possession.’ ”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to me, saying: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '(That was also regarded as a land of giants; giants formerly dwelt there. But the Ammonites call them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:5
      marker-yv: yv-n
    - type: text
      text: 'Zamzummim, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 2:10
      marker-yv: yv-n
    - type: text
      text: 'a people as great and numerous and tall as the Anakim. But the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' destroyed them before them, and they dispossessed them and dwelt in their place, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'just as He had done for the descendants of Esau, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 36:8; Deut. 2:5
      marker-yv: yv-n
    - type: text
      text: 'who dwelt in Seir, when He destroyed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:6; 36:20–30
      marker-yv: yv-n
    - type: text
      text: 'the Horites from before them. They dispossessed them and dwelt in their place, even to this day. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 13:3
      marker-yv: yv-n
    - type: text
      text: the Avim, who dwelt in villages as far as Gaza—
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 10:14; 1 Chr. 1:12; Jer. 47:4; Amos 9:7
      marker-yv: yv-n
    - type: text
      text: the Caphtorim, who came from Caphtor, destroyed them and dwelt in their place.)
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“ ‘Rise, take your journey, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:13, 14; Judg. 11:18
      marker-yv: yv-n
    - type: text
      text: 'cross over the River Arnon. Look, I have given into your hand '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:4
      marker-yv: yv-n
    - type: text
      text: 'Sihon the Amorite, king of Heshbon, and his land. Begin to possess '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' and engage him in battle. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:27; Deut. 11:25; Josh. 2:9
      marker-yv: yv-n
    - type: text
      text: 'This day I will begin to put the dread and fear of you upon the nations under the whole heaven, who shall hear the report of you, and shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:14–16
      marker-yv: yv-n
    - type: text
      text: tremble and be in anguish because of you.’
  - type: usfm
    marker: s1
    children:
    - type: text
      text: King Sihon Defeated
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“And I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:21–32; Deut. 1:4; Judg. 11:19–21
      marker-yv: yv-n
    - type: text
      text: 'sent messengers from the Wilderness of Kedemoth to Sihon king of Heshbon, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 20:10
      marker-yv: yv-n
    - type: text
      text: 'with words of peace, saying, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:21, 22; Judg. 11:19
      marker-yv: yv-n
    - type: text
      text: '‘Let me pass through your land; I will keep strictly to the road, and I will turn neither to the right nor to the left. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'You shall sell me food for money, that I may eat, and give me water for money, that I may drink; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:19
      marker-yv: yv-n
    - type: text
      text: 'only let me pass through on foot, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:18; Deut. 23:3, 4; Judg. 11:17
      marker-yv: yv-n
    - type: text
      text: 'just as the descendants of Esau who dwell in Seir and the Moabites who dwell in Ar did for me, until I cross the Jordan to the land which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God is giving us.’'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '‘You have skirted this mountain '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 2:7, 14
      marker-yv: yv-n
    - type: text
      text: 'long enough; turn northward. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:23
      marker-yv: yv-n
    - type: text
      text: '“But Sihon king of Heshbon would not let us pass through, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 11:20
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 4:21
      marker-yv: yv-n
    - type: text
      text: 'hardened his spirit and made his heart obstinate, that He might deliver him into your hand, as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' this day.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '“And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, ‘See, I have begun to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:3, 8
      marker-yv: yv-n
    - type: text
      text: 'give Sihon and his land over to you. Begin to possess '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' that you may inherit his land.’ '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:23
      marker-yv: yv-n
    - type: text
      text: 'Then Sihon and all his people came out against us to fight at Jahaz. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:31; Deut. 7:2
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God delivered him over to us; so '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:24
      marker-yv: yv-n
    - type: text
      text: 'we defeated him, his sons, and all his people. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'We took all his cities at that time, and we '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 27:28
      marker-yv: yv-n
    - type: text
      text: 'utterly destroyed the men, women, and little ones of every city; we left none remaining. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'We took only the livestock as plunder for ourselves, with the spoil of the cities which we took. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 3:12; 4:48; Josh. 13:9
      marker-yv: yv-n
    - type: text
      text: 'From Aroer, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' on the bank of the River Arnon, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 13:9, 16
      marker-yv: yv-n
    - type: text
      text: 'the city that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in the ravine, as far as Gilead, there was not one city too strong for us; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 44:3
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God delivered all to us. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Only you did not go near the land of the people of Ammon—anywhere along the River '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 32:22; Num. 21:24; Deut. 3:16
      marker-yv: yv-n
    - type: text
      text: 'Jabbok, or to the cities of the mountains, or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 2:5, 9, 19
      marker-yv: yv-n
    - type: text
      text: 'wherever the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God had forbidden us.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And command the people, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:14–21
      marker-yv: yv-n
    - type: text
      text: '“You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: about
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' pass through the territory of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 23:7
      marker-yv: yv-n
    - type: text
      text: 'your brethren, the descendants of Esau, who live in Seir; and they will be afraid of you. Therefore watch yourselves carefully. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Do not meddle with them, for I will not give you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' of their land, no, not so much as one footstep, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 36:8; Josh. 24:4
      marker-yv: yv-n
    - type: text
      text: 'because I have given Mount Seir to Esau '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' a possession. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You shall buy food from them with money, that you may eat; and you shall also buy water from them with money, that you may drink.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has blessed you in all the work of your hand. He knows your trudging through this great wilderness. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 8:2–4; (Matt. 6:8, 32)
      marker-yv: yv-n
    - type: text
      text: 'These forty years the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: been
    - type: text
      text: ' with you; you have lacked nothing.” ’'
