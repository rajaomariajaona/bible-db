document_id: DEU.2,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Desert Years
  - type: note
    content: Deut. 1:40
  - type: text
    content: '“Then we turned and journeyed into the wilderness of the Way of the Red Sea, '
  - type: note
    content: Num. 14:25
  - type: text
    content: 'as the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to me, and we skirted Mount Seir for many days.'
  '10':
  - type: note
    content: Gen. 14:5
  - type: text
    content: '(The Emim had dwelt there in times past, a people as great and numerous and tall as '
  - type: note
    content: Num. 13:22, 33; Deut. 9:2
  - type: text
    content: 'the Anakim. '
  '11':
  - type: text
    content: 'They were also regarded as giants, like the Anakim, but the Moabites call them Emim. '
  '12':
  - type: note
    content: Gen. 14:6; 36:20; Deut. 2:22
  - type: text
    content: 'The Horites formerly dwelt in Seir, but the descendants of Esau dispossessed them and destroyed them from before them, and dwelt in their place, just as Israel did to the land of their possession which the '
  - type: heading
    content: Lord
  - type: text
    content: ' gave them.)'
  '13':
  - type: text
    content: '“ ‘Now rise and cross over '
  - type: note
    content: Num. 21:12
  - type: text
    content: 'the Valley of the Zered.’ So we crossed over the Valley of the Zered. '
  '14':
  - type: text
    content: 'And the time we took to come '
  - type: note
    content: Num. 13:26
  - type: text
    content: 'from Kadesh Barnea until we crossed over the Valley of the Zered '
  - type: text
    content: was
  - type: text
    content: ' thirty-eight years, '
  - type: note
    content: Num. 14:33; 26:64; Deut. 1:34, 35
  - type: text
    content: 'until all the generation of the men of war was consumed from the midst of the camp, '
  - type: note
    content: Num. 14:35; Ezek. 20:15
  - type: text
    content: 'just as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had sworn to them. '
  '15':
  - type: text
    content: 'For indeed the hand of the '
  - type: heading
    content: Lord
  - type: text
    content: ' was against them, to destroy them from the midst of the camp until they were consumed.'
  '16':
  - type: text
    content: '“So it was, when all the men of war had finally perished from among the people, '
  '17':
  - type: text
    content: 'that the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to me, saying: '
  '18':
  - type: text
    content: '‘This day you are to cross over at Ar, the boundary of Moab. '
  '19':
  - type: text
    content: 'And '
  - type: text
    content: when
  - type: text
    content: ' you come near the people of Ammon, do not harass them or meddle with them, for I will not give you '
  - type: text
    content: any
  - type: text
    content: ' of the land of the people of Ammon '
  - type: text
    content: as
  - type: text
    content: ' a possession, because I have given it to '
  - type: note
    content: Gen. 19:38; Num. 21:24
  - type: text
    content: 'the descendants of Lot '
  - type: text
    content: as
  - type: text
    content: ' a possession.’ ”'
  '2':
  - type: text
    content: '“And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to me, saying: '
  '20':
  - type: text
    content: '(That was also regarded as a land of giants; giants formerly dwelt there. But the Ammonites call them '
  - type: note
    content: Gen. 14:5
  - type: text
    content: 'Zamzummim, '
  '21':
  - type: note
    content: Deut. 2:10
  - type: text
    content: 'a people as great and numerous and tall as the Anakim. But the '
  - type: heading
    content: Lord
  - type: text
    content: ' destroyed them before them, and they dispossessed them and dwelt in their place, '
  '22':
  - type: text
    content: 'just as He had done for the descendants of Esau, '
  - type: note
    content: Gen. 36:8; Deut. 2:5
  - type: text
    content: 'who dwelt in Seir, when He destroyed '
  - type: note
    content: Gen. 14:6; 36:20–30
  - type: text
    content: 'the Horites from before them. They dispossessed them and dwelt in their place, even to this day. '
  '23':
  - type: text
    content: 'And '
  - type: note
    content: Josh. 13:3
  - type: text
    content: the Avim, who dwelt in villages as far as Gaza—
  - type: note
    content: Gen. 10:14; 1 Chr. 1:12; Jer. 47:4; Amos 9:7
  - type: text
    content: the Caphtorim, who came from Caphtor, destroyed them and dwelt in their place.)
  '24':
  - type: text
    content: '“ ‘Rise, take your journey, and '
  - type: note
    content: Num. 21:13, 14; Judg. 11:18
  - type: text
    content: 'cross over the River Arnon. Look, I have given into your hand '
  - type: note
    content: Deut. 1:4
  - type: text
    content: 'Sihon the Amorite, king of Heshbon, and his land. Begin to possess '
  - type: text
    content: it,
  - type: text
    content: ' and engage him in battle. '
  '25':
  - type: note
    content: Ex. 23:27; Deut. 11:25; Josh. 2:9
  - type: text
    content: 'This day I will begin to put the dread and fear of you upon the nations under the whole heaven, who shall hear the report of you, and shall '
  - type: note
    content: Ex. 15:14–16
  - type: text
    content: tremble and be in anguish because of you.’
  - type: heading
    content: King Sihon Defeated
  '26':
  - type: text
    content: '“And I '
  - type: note
    content: Num. 21:21–32; Deut. 1:4; Judg. 11:19–21
  - type: text
    content: 'sent messengers from the Wilderness of Kedemoth to Sihon king of Heshbon, '
  - type: note
    content: Deut. 20:10
  - type: text
    content: 'with words of peace, saying, '
  '27':
  - type: note
    content: Num. 21:21, 22; Judg. 11:19
  - type: text
    content: '‘Let me pass through your land; I will keep strictly to the road, and I will turn neither to the right nor to the left. '
  '28':
  - type: text
    content: 'You shall sell me food for money, that I may eat, and give me water for money, that I may drink; '
  - type: note
    content: Num. 20:19
  - type: text
    content: 'only let me pass through on foot, '
  '29':
  - type: note
    content: Num. 20:18; Deut. 23:3, 4; Judg. 11:17
  - type: text
    content: 'just as the descendants of Esau who dwell in Seir and the Moabites who dwell in Ar did for me, until I cross the Jordan to the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God is giving us.’'
  '3':
  - type: text
    content: '‘You have skirted this mountain '
  - type: note
    content: Deut. 2:7, 14
  - type: text
    content: 'long enough; turn northward. '
  '30':
  - type: note
    content: Num. 21:23
  - type: text
    content: '“But Sihon king of Heshbon would not let us pass through, for '
  - type: note
    content: Josh. 11:20
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: Ex. 4:21
  - type: text
    content: 'hardened his spirit and made his heart obstinate, that He might deliver him into your hand, as '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' this day.'
  '31':
  - type: text
    content: '“And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to me, ‘See, I have begun to '
  - type: note
    content: Deut. 1:3, 8
  - type: text
    content: 'give Sihon and his land over to you. Begin to possess '
  - type: text
    content: it,
  - type: text
    content: ' that you may inherit his land.’ '
  '32':
  - type: note
    content: Num. 21:23
  - type: text
    content: 'Then Sihon and all his people came out against us to fight at Jahaz. '
  '33':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 23:31; Deut. 7:2
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God delivered him over to us; so '
  - type: note
    content: Num. 21:24
  - type: text
    content: 'we defeated him, his sons, and all his people. '
  '34':
  - type: text
    content: 'We took all his cities at that time, and we '
  - type: note
    content: Lev. 27:28
  - type: text
    content: 'utterly destroyed the men, women, and little ones of every city; we left none remaining. '
  '35':
  - type: text
    content: 'We took only the livestock as plunder for ourselves, with the spoil of the cities which we took. '
  '36':
  - type: note
    content: Deut. 3:12; 4:48; Josh. 13:9
  - type: text
    content: 'From Aroer, which '
  - type: text
    content: is
  - type: text
    content: ' on the bank of the River Arnon, and '
  - type: text
    content: from
  - type: text
    content: ' '
  - type: note
    content: Josh. 13:9, 16
  - type: text
    content: 'the city that '
  - type: text
    content: is
  - type: text
    content: ' in the ravine, as far as Gilead, there was not one city too strong for us; '
  - type: note
    content: Ps. 44:3
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God delivered all to us. '
  '37':
  - type: text
    content: 'Only you did not go near the land of the people of Ammon—anywhere along the River '
  - type: note
    content: Gen. 32:22; Num. 21:24; Deut. 3:16
  - type: text
    content: 'Jabbok, or to the cities of the mountains, or '
  - type: note
    content: Deut. 2:5, 9, 19
  - type: text
    content: 'wherever the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God had forbidden us.'
  '4':
  - type: text
    content: 'And command the people, saying, '
  - type: note
    content: Num. 20:14–21
  - type: text
    content: '“You '
  - type: text
    content: are
  - type: text
    content: ' '
  - type: text
    content: about
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' pass through the territory of '
  - type: note
    content: Deut. 23:7
  - type: text
    content: 'your brethren, the descendants of Esau, who live in Seir; and they will be afraid of you. Therefore watch yourselves carefully. '
  '5':
  - type: text
    content: 'Do not meddle with them, for I will not give you '
  - type: text
    content: any
  - type: text
    content: ' of their land, no, not so much as one footstep, '
  - type: note
    content: Gen. 36:8; Josh. 24:4
  - type: text
    content: 'because I have given Mount Seir to Esau '
  - type: text
    content: as
  - type: text
    content: ' a possession. '
  '6':
  - type: text
    content: You shall buy food from them with money, that you may eat; and you shall also buy water from them with money, that you may drink.
  '7':
  - type: text
    content: '“For the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has blessed you in all the work of your hand. He knows your trudging through this great wilderness. '
  - type: note
    content: Deut. 8:2–4; (Matt. 6:8, 32)
  - type: text
    content: 'These forty years the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: text
    content: has
  - type: text
    content: ' '
  - type: text
    content: been
  - type: text
    content: ' with you; you have lacked nothing.” ’'
  '8':
  - type: text
    content: '“And when we passed beyond our brethren, the descendants of Esau who dwell in Seir, away from the road of the plain, away from '
  - type: note
    content: Judg. 11:18; 1 Kin. 9:26
  - type: text
    content: 'Elath and Ezion Geber, we '
  - type: note
    content: Num. 21:4
  - type: text
    content: 'turned and passed by way of the Wilderness of Moab. '
  '9':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to me, ‘Do not harass Moab, nor contend with them in battle, for I will not give you '
  - type: text
    content: any
  - type: text
    content: ' of their land '
  - type: text
    content: as
  - type: text
    content: ' a possession, because I have given '
  - type: note
    content: Num. 21:15, 28; Deut. 2:18, 29
  - type: text
    content: 'Ar to '
  - type: note
    content: Gen. 19:36–38
  - type: text
    content: 'the descendants of Lot '
  - type: text
    content: as
  - type: text
    content: ' a possession.’ ”'
