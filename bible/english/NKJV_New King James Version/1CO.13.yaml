verses:
  '1':
  - type: heading
    content: The Greatest Gift
  - type: text
    content: 'Though I speak with the tongues of men and of angels, but have not love, I have become sounding brass or a clanging cymbal. '
  '10':
  - type: text
    content: But when that which is perfect has come, then that which is in part will be done away.
  '11':
  - type: text
    content: 'When I was a child, I spoke as a child, I understood as a child, I thought as a child; but when I became a man, I put away childish things. '
  '12':
  - type: text
    content: 'For '
  - type: note
    content: (2 Cor. 3:18; 5:7); Phil. 3:12; James 1:23
  - type: text
    content: 'now we see in a mirror, dimly, but then '
  - type: note
    content: Gen. 32:30; Num. 12:8; Matt. 18:10; (1 John 3:2)
  - type: text
    content: face to face. Now I know in part, but then I shall know just as I also am known.
  '13':
  - type: text
    content: 'And now abide faith, hope, love, these three; but the greatest of these '
  - type: text
    content: is
  - type: text
