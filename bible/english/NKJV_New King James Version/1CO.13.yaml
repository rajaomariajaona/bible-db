document_id: 1CO.13,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Greatest Gift
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Though I speak with the tongues of men and of angels, but have not love, I have become sounding brass or a clanging cymbal. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: But when that which is perfect has come, then that which is in part will be done away.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'When I was a child, I spoke as a child, I understood as a child, I thought as a child; but when I became a man, I put away childish things. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 3:18; 5:7); Phil. 3:12; James 1:23
      marker-yv: yv-n
    - type: text
      text: 'now we see in a mirror, dimly, but then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 32:30; Num. 12:8; Matt. 18:10; (1 John 3:2)
      marker-yv: yv-n
    - type: text
      text: face to face. Now I know in part, but then I shall know just as I also am known.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And now abide faith, hope, love, these three; but the greatest of these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' love.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And though I have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gift
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 7:22; 1 Cor. 12:8–10, 28; 14:1
      marker-yv: yv-n
    - type: text
      text: 'prophecy, and understand all mysteries and all knowledge, and though I have all faith, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 17:20; 21:21; Mark 11:23; Luke 17:6
      marker-yv: yv-n
    - type: text
      text: 'so that I could remove mountains, but have not love, I am nothing. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 6:1, 2
      marker-yv: yv-n
    - type: text
      text: 'though I bestow all my goods to feed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: poor,
    - type: text
      text: ' and though I give my body to be burned, but have not love, it profits me nothing.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 10:12; 17:9; 1 Thess. 5:14; (1 Pet. 4:8)
      marker-yv: yv-n
    - type: text
      text: 'Love suffers long '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 4:32
      marker-yv: yv-n
    - type: text
      text: 'kind; love '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 5:26
      marker-yv: yv-n
    - type: text
      text: 'does not envy; love does not parade itself, is not puffed up; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'does not behave rudely, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 10:24; Phil. 2:4
      marker-yv: yv-n
    - type: text
      text: 'does not seek its own, is not provoked, thinks no evil; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 10:3; Rom. 1:32
      marker-yv: yv-n
    - type: text
      text: 'does not rejoice in iniquity, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 John 4; 3 John 3
      marker-yv: yv-n
    - type: text
      text: 'rejoices in the truth; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 15:1; Gal. 6:2; 2 Tim. 2:24
      marker-yv: yv-n
    - type: text
      text: bears all things, believes all things, hopes all things, endures all things.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Love never fails. But whether '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' prophecies, they will fail; whether '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' tongues, they will cease; whether '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' knowledge, it will vanish away. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 8:2; 13:12
      marker-yv: yv-n
    - type: text
      text: 'For we know in part and we prophesy in part. '
