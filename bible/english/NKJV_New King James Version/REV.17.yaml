document_id: REV.17,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Scarlet Woman and the Scarlet Beast
  - type: text
    content: 'Then '
  - type: note
    content: Rev. 1:1; 21:9
  - type: text
    content: 'one of the seven angels who had the seven bowls came and talked with me, saying to me, “Come, '
  - type: note
    content: Rev. 16:19
  - type: text
    content: 'I will show you the judgment of '
  - type: note
    content: Is. 1:21; Jer. 2:20; Nah. 3:4; Rev. 17:5, 15; 19:2
  - type: text
    content: 'the great harlot '
  - type: note
    content: Jer. 51:13; Rev. 17:15
  - type: text
    content: 'who sits on many waters, '
  '10':
  - type: text
    content: 'There are also seven kings. Five have fallen, one is, '
  - type: text
    content: and
  - type: text
    content: ' the other has not yet come. And when he comes, he must '
  - type: note
    content: Rev. 13:5
  - type: text
    content: 'continue a short time. '
  '11':
  - type: text
    content: 'The '
  - type: note
    content: Rev. 13:3, 12, 14; 17:8
  - type: text
    content: beast that was, and is not, is himself also the eighth, and is of the seven, and is going to perdition.
  '12':
  - type: note
    content: Dan. 7:20
  - type: text
    content: '“The ten horns which you saw are ten kings who have received no kingdom as yet, but they receive authority for one hour as kings with the beast. '
  '13':
  - type: text
    content: 'These are of one mind, and they will give their power and authority to the beast. '
  '14':
  - type: note
    content: Rev. 16:14; 19:19
  - type: text
    content: 'These will make war with the Lamb, and the Lamb will '
  - type: note
    content: Rev. 19:20
  - type: text
    content: 'overcome them, '
  - type: note
    content: Deut. 10:17; 1 Tim. 6:15; Rev. 19:16
  - type: text
    content: 'for He is Lord of lords and King of kings; '
  - type: note
    content: Jer. 50:44
  - type: text
    content: 'and those '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' with Him '
  - type: text
    content: are
  - type: text
    content: ' called, chosen, and faithful.”'
  '15':
  - type: text
    content: 'Then he said to me, '
  - type: note
    content: Is. 8:7; Jer. 47:2; Rev. 17:1
  - type: text
    content: '“The waters which you saw, where the harlot sits, '
  - type: note
    content: Rev. 13:7
  - type: text
    content: 'are peoples, multitudes, nations, and tongues. '
  '16':
  - type: text
    content: 'And the ten horns which you saw on the beast, '
  - type: note
    content: Jer. 50:41
  - type: text
    content: 'these will hate the harlot, make her '
  - type: note
    content: Rev. 18:17, 19
  - type: text
    content: 'desolate '
  - type: note
    content: Ezek. 16:37, 39
  - type: text
    content: 'and naked, eat her flesh and '
  - type: note
    content: Rev. 18:8
  - type: text
    content: 'burn her with fire. '
  '17':
  - type: note
    content: 2 Thess. 2:11
  - type: text
    content: 'For God has put it into their hearts to fulfill His purpose, to be of one mind, and to give their kingdom to the beast, '
  - type: note
    content: Rev. 10:7
  - type: text
    content: 'until the words of God are fulfilled. '
  '18':
  - type: text
    content: 'And the woman whom you saw '
  - type: note
    content: Rev. 11:8; 16:19
  - type: text
    content: 'is that great city '
  - type: note
    content: Rev. 12:4
  - type: text
    content: which reigns over the kings of the earth.”
  '2':
  - type: note
    content: Rev. 2:22; 18:3, 9
  - type: text
    content: 'with whom the kings of the earth committed fornication, and '
  - type: note
    content: Jer. 51:7; Rev. 14:8
  - type: text
    content: the inhabitants of the earth were made drunk with the wine of her fornication.”
  '3':
  - type: text
    content: 'So he carried me away in the Spirit '
  - type: note
    content: Rev. 12:6, 14; 21:10
  - type: text
    content: 'into the wilderness. And I saw a woman sitting '
  - type: note
    content: Rev. 12:3
  - type: text
    content: 'on a scarlet beast '
  - type: text
    content: which
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' full of '
  - type: note
    content: Rev. 13:1
  - type: text
    content: 'names of blasphemy, having seven heads and ten horns. '
  '4':
  - type: text
    content: 'The woman '
  - type: note
    content: Ezek. 28:13; Rev. 18:12, 16
  - type: text
    content: 'was arrayed in purple and scarlet, '
  - type: note
    content: Dan. 11:38
  - type: text
    content: 'and adorned with gold and precious stones and pearls, '
  - type: note
    content: Jer. 51:7; Rev. 18:6
  - type: text
    content: 'having in her hand a golden cup '
  - type: note
    content: Rev. 14:8
  - type: text
    content: 'full of abominations and the filthiness of her fornication. '
  '5':
  - type: text
    content: 'And on her forehead a name '
  - type: text
    content: was
  - type: text
    content: ' written:'
  - type: note
    content: 2 Thess. 2:7; Rev. 1:20; 17:7
  - type: text
    content: MYSTERY, BABYLON THE GREAT,
  - type: text
    content: THE MOTHER OF HARLOTS
  - type: text
    content: AND OF THE ABOMINATIONS
  - type: text
    content: OF THE EARTH.
  '6':
  - type: text
    content: 'I saw '
  - type: note
    content: Rev. 18:24
  - type: text
    content: 'the woman, drunk '
  - type: note
    content: Rev. 13:15
  - type: text
    content: 'with the blood of the saints and with the blood of '
  - type: note
    content: Rev. 6:9, 10
  - type: text
    content: the martyrs of Jesus. And when I saw her, I marveled with great amazement.
  - type: heading
    content: The Meaning of the Woman and the Beast
  '7':
  - type: text
    content: 'But the angel said to me, “Why did you marvel? I will tell you the mystery of the woman and of the beast that carries her, which has the seven heads and the ten horns. '
  '8':
  - type: text
    content: 'The beast that you saw was, and is not, and '
  - type: note
    content: Rev. 11:7
  - type: text
    content: 'will ascend out of the bottomless pit and '
  - type: note
    content: Rev. 13:10; 17:11
  - type: text
    content: 'go to perdition. And those who '
  - type: note
    content: Rev. 3:10
  - type: text
    content: 'dwell on the earth '
  - type: note
    content: Rev. 13:3
  - type: text
    content: 'will marvel, '
  - type: note
    content: Matt. 25:34; Rev. 13:8
  - type: text
    content: whose names are not written in the Book of Life from the foundation of the world, when they see the beast that was, and is not, and yet is.
  '9':
  - type: note
    content: Rev. 13:18
  - type: text
    content: '“Here '
  - type: text
    content: is
  - type: text
    content: ' the mind which has wisdom: '
  - type: note
    content: Rev. 13:1
  - type: text
    content: 'The seven heads are seven mountains on which the woman sits. '
