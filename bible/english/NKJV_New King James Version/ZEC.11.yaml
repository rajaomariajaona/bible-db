  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Desolation of Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Open '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 10:10
      marker-yv: yv-n
    - type: text
      text: your doors, O Lebanon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That fire may devour your cedars.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And I took my staff, Beauty, and cut it in two, that I might break the covenant which I had made with all the peoples. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So it was broken on that day. Thus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zeph. 3:12; Matt. 27:50; Mark 15:37; Luke 23:46; Acts 8:32
      marker-yv: yv-n
    - type: text
      text: 'the poor of the flock, who were watching me, knew that it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then I said to them, “If it is agreeable to you, give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' my wages; and if not, refrain.” So they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 37:28; Ex. 21:32; Matt. 26:15; 27:9, 10
      marker-yv: yv-n
    - type: text
      text: 'weighed out for my wages thirty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pieces
    - type: text
      text: ' of silver.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Throw it to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:3–10; Acts 1:18, 19
      marker-yv: yv-n
    - type: text
      text: 'potter”—that princely price they set on me. So I took the thirty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pieces
    - type: text
      text: ' of silver and threw them into the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for the potter. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then I cut in two my other staff, Bonds, that I might break the brotherhood between Judah and Israel.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 56:11; Ezek. 34:2
      marker-yv: yv-n
    - type: text
      text: '“Next, take for yourself the implements of a foolish shepherd. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For indeed I will raise up a shepherd in the land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' will not care for those who are cut off, nor seek the young, nor heal those that are broken, nor feed those that still stand. But he will eat the flesh of the fat and tear their hooves in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 34:1–10; Mic. 3:1–3
      marker-yv: yv-n
    - type: text
      text: pieces.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Woe
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 23:1; Ezek. 34:2; Zech. 10:2; 11:15; John 10:12, 13
      marker-yv: yv-n
    - type: text
      text: ' to the worthless shepherd,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who leaves the flock!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'A sword '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' against his arm'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And against his right eye;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His arm shall completely wither,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his right eye shall be totally blinded.”
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Wail, O cypress, for the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 31:3
      marker-yv: yv-n
    - type: text
      text: cedar has fallen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because the mighty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: trees
    - type: text
      text: ' are ruined.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wail, O oaks of Bashan,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 32:19
      marker-yv: yv-n
    - type: text
      text: For the thick forest has come down.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: it
      children:
      - type: text
        text: There
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the sound of wailing '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 25:34–36
      marker-yv: yv-n
    - type: text
      text: shepherds!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For their glory is in ruins.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: There
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the sound of roaring lions!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the pride of the Jordan is in ruins.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophecy of the Shepherds
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, “Feed the flock for slaughter, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'whose owners slaughter them and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Jer. 2:3); 50:7
      marker-yv: yv-n
    - type: text
      text: 'feel no guilt; those who sell them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 29:19; Hos. 12:8; 1 Tim. 6:9
      marker-yv: yv-n
    - type: text
      text: 'say, ‘Blessed be the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for I am rich’; and their shepherds do '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 34:2, 3
      marker-yv: yv-n
    - type: text
      text: 'not pity them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For I will no longer pity the inhabitants of the land,” says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. “But indeed I will give everyone into his neighbor’s hand and into the hand of his king. They shall attack the land, and I will not deliver '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' from their hand.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So I fed the flock for slaughter, in particular '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 39:10; Zeph. 3:12; Matt. 11:5
      marker-yv: yv-n
    - type: text
      text: 'the poor of the flock. I took for myself two staffs: the one I called Beauty, and the other I called Bonds; and I fed the flock. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I dismissed the three shepherds '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 5:7
      marker-yv: yv-n
    - type: text
      text: 'in one month. My soul loathed them, and their soul also abhorred me. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then I said, “I will not feed you. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 15:2
      marker-yv: yv-n
    - type: text
      text: 'Let what is dying die, and what is perishing perish. Let those that are left eat each other’s flesh.” '
