  '18':
  - type: text
    content: 'And when Jesus saw great multitudes about Him, He gave a command to depart to the other side. '
  '19':
  - type: note
    content: Matt. 8:19–22; Luke 9:57, 58
  - type: text
    content: Then a certain scribe came and said to Him, “Teacher, I will follow You wherever You go.”
  '2':
