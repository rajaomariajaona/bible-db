  - type: text
    content: was cleansed.
  '30':
  - type: text
    content: 'Now a good way off from them there was a herd of many swine feeding. '
  '31':
  - type: text
    content: So the demons begged Him, saying, “If You cast us out, permit us to go away into the herd of swine.”
  '32':
  - type: text
    content: And He said to them, “Go.” So when they had come out, they went into the herd of swine. And suddenly the whole herd of swine ran violently down the steep place into the sea, and perished in the water.
  '33':
