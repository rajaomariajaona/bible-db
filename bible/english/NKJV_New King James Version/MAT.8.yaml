  - type: heading
    content: Wind and Wave Obey Jesus
  '23':
  - type: text
    content: 'Now when He got into a boat, His disciples followed Him. '
  '24':
  - type: note
    content: Mark 4:37; Luke 8:23–25
  - type: text
    content: 'And suddenly a great tempest arose on the sea, so that the boat was covered with the waves. But He was asleep. '
  '25':
  - type: text
    content: 'Then His disciples came to '
  - type: text
    content: Him
  - type: text
    content: ' and awoke Him, saying, “Lord, save us! We are perishing!”'
  '26':
  - type: text
    content: 'But He said to them, '
  - type: text
    content: “Why are you fearful, O you of little faith?”
  - type: text
    content: ' Then '
  - type: note
    content: Ps. 65:7; 89:9; 107:29
  - type: text
    content: 'He arose and rebuked the winds and the sea, and there was a great calm. '
  '27':
  - type: text
    content: So the men marveled, saying, “Who can this be, that even the winds and the sea obey Him?”
  - type: heading
    content: Two Demon-Possessed Men Healed
  '28':
  - type: note
    content: Mark 5:1–4; Luke 8:26–33
  - type: text
    content: 'When He had come to the other side, to the country of the Gergesenes, there met Him two demon-possessed '
  - type: text
    content: men,
  - type: text
