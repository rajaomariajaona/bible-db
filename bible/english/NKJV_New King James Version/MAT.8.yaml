  '15':
  - type: text
    content: So He touched her hand, and the fever left her. And she arose and served them.
  - type: heading
    content: Many Healed in the Evening
  '16':
  - type: note
    content: Mark 1:32–34; Luke 4:40, 41
  - type: text
    content: 'When evening had come, they brought to Him many who were demon-possessed. And He cast out the spirits with a word, and healed all who were sick, '
