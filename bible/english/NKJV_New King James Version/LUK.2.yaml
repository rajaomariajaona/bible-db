  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 9:6
      marker-yv: yv-n
    - type: text
      text: 'For there is born to you this day in the city of David '
    - type: usfm
      marker: x
      children:
      - type: text
