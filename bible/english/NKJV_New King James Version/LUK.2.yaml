      children:
      - type: text
        text: Gen. 37:11; Luke 1:66
      marker-yv: yv-n
    - type: text
      text: 'But Mary kept all these things and pondered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' in her heart. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
