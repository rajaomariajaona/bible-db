      text: 'So when they had performed all things according to the law of the Lord, they returned to Galilee, to their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' city, Nazareth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
