    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And behold, there was a man in Jerusalem whose name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
