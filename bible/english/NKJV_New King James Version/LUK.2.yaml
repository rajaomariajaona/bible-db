  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'and this woman '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' a widow of about eighty-four years, who did not depart from the temple, but served '
    - type: usfm
      marker: it
      children:
      - type: text
