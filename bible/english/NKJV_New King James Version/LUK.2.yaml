      marker-yv: yv-n
    - type: text
      text: 'days, as they returned, the Boy Jesus lingered behind in Jerusalem. And Joseph and His mother did not know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it;
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'but supposing Him to have been in the company, they went a day’s journey, and sought Him among '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' relatives and acquaintances. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'So when they did not find Him, they returned to Jerusalem, seeking Him. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Now so it was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' after three days they found Him in the temple, sitting in the midst of the teachers, both listening to them and asking them questions. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
