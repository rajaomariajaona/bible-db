    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 1:13, 30
      marker-yv: yv-n
    - type: text
      text: '“Do not be afraid, for behold, I bring you good tidings of great joy '
    - type: usfm
      marker: x
      children:
      - type: text
