  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anna Bears Witness to the Redeemer
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
