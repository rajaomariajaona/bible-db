document_id: LUK.2,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Christ Born of Mary
  - type: text
    content: 'And it came to pass in those days '
  - type: text
    content: that
  - type: text
    content: ' a decree went out from Caesar Augustus that all the world should be registered. '
  '10':
  - type: text
    content: 'Then the angel said to them, '
  - type: note
    content: Luke 1:13, 30
  - type: text
    content: '“Do not be afraid, for behold, I bring you good tidings of great joy '
  - type: note
    content: Gen. 12:3; Is. 49:6; (Matt. 28:19; Mark 1:15; Col. 1:23)
  - type: text
    content: 'which will be to all people. '
  '11':
  - type: note
    content: Is. 9:6
  - type: text
    content: 'For there is born to you this day in the city of David '
  - type: note
    content: Matt. 1:21; John 4:42; (Acts 5:31)
  - type: text
    content: 'a Savior, '
  - type: note
    content: Matt. 1:16; 16:16, 20; John 11:27; Acts 2:36; Phil. 2:11
  - type: text
    content: 'who is Christ the Lord. '
  '12':
  - type: text
    content: 'And this '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' the sign to you: You will find a Babe wrapped in swaddling cloths, lying in a manger.”'
  '13':
  - type: note
    content: Gen. 28:12; Ps. 103:20; 148:2; Dan. 7:10; (Heb. 1:14); Rev. 5:11
  - type: text
    content: 'And suddenly there was with the angel a multitude of the heavenly host praising God and saying:'
  '14':
  - type: text
    content: “Glory
  - type: note
    content: Matt. 21:9; Luke 19:38; Eph. 1:6
  - type: text
    content: ' to God in the highest,'
  - type: text
    content: 'And on earth '
  - type: note
    content: Is. 57:19; (Rom. 5:1); Eph. 2:17; (Col. 1:20)
  - type: text
    content: 'peace, '
  - type: note
    content: (John 3:16; Eph. 2:4, 7; 2 Thess. 2:16; 1 John 4:9)
  - type: text
    content: goodwill toward men!”
  '15':
  - type: text
    content: 'So it was, when the angels had gone away from them into heaven, that the shepherds said to one another, “Let us now go to Bethlehem and see this thing that has come to pass, which the Lord has made known to us.” '
  '16':
  - type: text
    content: 'And they came with haste and found Mary and Joseph, and the Babe lying in a manger. '
  '17':
  - type: text
    content: 'Now when they had seen '
  - type: text
    content: Him,
  - type: text
    content: ' they made widely known the saying which was told them concerning this Child. '
  '18':
  - type: text
    content: 'And all those who heard '
  - type: text
    content: it
  - type: text
    content: ' marveled at those things which were told them by the shepherds. '
  '19':
  - type: note
    content: Gen. 37:11; Luke 1:66
  - type: text
    content: 'But Mary kept all these things and pondered '
  - type: text
    content: them
  - type: text
    content: ' in her heart. '
  '2':
  - type: note
    content: Dan. 9:25; Acts 5:37
  - type: text
    content: 'This census first took place while Quirinius was governing Syria. '
  '20':
  - type: text
    content: 'Then the shepherds returned, glorifying and '
  - type: note
    content: Luke 19:37
  - type: text
    content: praising God for all the things that they had heard and seen, as it was told them.
  - type: heading
    content: Circumcision of Jesus
  '21':
  - type: note
    content: Gen. 17:12; Lev. 12:3
  - type: text
    content: 'And when eight days were completed for the circumcision of the Child, His name was called '
  - type: note
    content: (Matt. 1:21)
  - type: heading
    content: Jesus
  - type: text
    content: ', the name given by the angel '
  - type: note
    content: Luke 1:31
  - type: text
    content: before He was conceived in the womb.
  - type: heading
    content: Jesus Presented in the Temple
  '22':
  - type: text
    content: 'Now when '
  - type: note
    content: Lev. 12:2–8
  - type: text
    content: 'the days of her purification according to the law of Moses were completed, they brought Him to Jerusalem to present '
  - type: text
    content: Him
  - type: text
    content: ' to the Lord '
  '23':
  - type: note
    content: Ex. 13:12; 22:29; Lev. 27:26; Deut. 18:4; Neh. 10:36
  - type: text
    content: '(as it is written in the law of the Lord, '
  - type: note
    content: Ex. 13:2, 12, 15; Num. 3:13; 8:17
  - type: text
    content: '“Every male who opens the womb shall be called holy to the '
  - type: heading
    content: Lord
  - type: text
    content: '”), '
  '24':
  - type: text
    content: 'and to offer a sacrifice according to what is said in the law of the Lord, '
  - type: note
    content: Lev. 12:2, 8
  - type: text
    content: “A pair of turtledoves or two young pigeons.”
  - type: heading
    content: Simeon Sees God’s Salvation
  '25':
  - type: text
    content: 'And behold, there was a man in Jerusalem whose name '
  - type: text
    content: was
  - type: text
    content: ' Simeon, and this man '
  - type: text
    content: was
  - type: text
    content: ' just and devout, '
  - type: note
    content: Is. 40:1; Mark 15:43; Luke 2:38; 23:51
  - type: text
    content: 'waiting for the Consolation of Israel, and the Holy Spirit was upon him. '
  '26':
  - type: text
    content: 'And it had been revealed to him by the Holy Spirit that he would not '
  - type: note
    content: Ps. 89:48; (John 8:51; Heb. 11:5)
  - type: text
    content: 'see death before he had seen the Lord’s Christ. '
  '27':
  - type: text
    content: 'So he came '
  - type: note
    content: Matt. 4:1
  - type: text
    content: 'by the Spirit into the temple. And when the parents brought in the Child Jesus, to do for Him according to the custom of the law, '
  '28':
  - type: text
    content: 'he took Him up in his arms and blessed God and said:'
  '29':
  - type: text
    content: '“Lord, '
  - type: note
    content: Gen. 46:30; (Phil. 1:23)
  - type: text
    content: now You are letting Your servant depart in peace,
  - type: text
    content: According to Your word;
  '3':
  - type: text
    content: So all went to be registered, everyone to his own city.
  '30':
  - type: text
    content: 'For my eyes '
  - type: note
    content: Ps. 119:166, 174; (Is. 52:10; Luke 3:6)
  - type: text
    content: have seen Your salvation
  '31':
  - type: text
    content: Which You have prepared before the face of all peoples,
  '32':
  - type: note
    content: Is. 9:2; 42:6; 49:6; 60:1–3; Matt. 4:16; Acts 10:45; 13:47; 28:28; (Rom. 9:24; Gal. 3:14)
  - type: text
    content: 'A light to '
  - type: text
    content: bring
  - type: text
    content: ' revelation to the Gentiles,'
  - type: text
    content: And the glory of Your people Israel.”
  '33':
  - type: text
    content: 'And Joseph and His mother marveled at those things which were spoken of Him. '
  '34':
  - type: text
    content: 'Then Simeon blessed them, and said to Mary His mother, “Behold, this '
  - type: text
    content: Child
  - type: text
    content: ' is destined for the '
  - type: note
    content: Is. 8:14; Hos. 14:9; Matt. 21:44; (Rom. 9:32); 1 Cor. 1:23; (2 Cor. 2:16; 1 Pet. 2:7, 8)
  - type: text
    content: 'fall and rising of many in Israel, and for '
  - type: note
    content: Matt. 28:12–15; Acts 4:2; 17:32; 28:22; (1 Pet. 2:12; 4:14)
  - type: text
    content: 'a sign which will be spoken against '
  '35':
  - type: text
    content: '(yes, '
  - type: note
    content: Ps. 42:10; John 19:25
  - type: text
    content: a sword will pierce through your own soul also), that the thoughts of many hearts may be revealed.”
  - type: heading
    content: Anna Bears Witness to the Redeemer
  '36':
  - type: text
    content: 'Now there was one, Anna, a prophetess, the daughter of Phanuel, of the tribe of '
  - type: note
    content: Josh. 19:24
  - type: text
    content: 'Asher. She was of a great age, and had lived with a husband seven years from her virginity; '
  '37':
  - type: text
    content: 'and this woman '
  - type: text
    content: was
  - type: text
    content: ' a widow of about eighty-four years, who did not depart from the temple, but served '
  - type: text
    content: God
  - type: text
    content: ' with fastings and prayers '
  - type: note
    content: Acts 26:7; 1 Tim. 5:5
  - type: text
    content: 'night and day. '
  '38':
  - type: text
    content: 'And coming in that instant she gave thanks to the Lord, and spoke of Him to all those who '
  - type: note
    content: Lam. 3:25, 26; Mark 15:43; Luke 24:21
  - type: text
    content: looked for redemption in Jerusalem.
  - type: heading
    content: The Family Returns to Nazareth
  '39':
  - type: text
    content: 'So when they had performed all things according to the law of the Lord, they returned to Galilee, to their '
  - type: text
    content: own
  - type: text
    content: ' city, Nazareth. '
  '4':
  - type: text
    content: 'Joseph also went up from Galilee, out of the city of Nazareth, into Judea, to '
  - type: note
    content: 1 Sam. 16:1; Mic. 5:2
  - type: text
    content: 'the city of David, which is called Bethlehem, '
  - type: note
    content: Matt. 1:16
  - type: text
    content: 'because he was of the house and lineage of David, '
  '40':
  - type: note
    content: Luke 1:80; 2:52; (1 Cor. 1:24, 30)
  - type: text
    content: And the Child grew and became strong in spirit, filled with wisdom; and the grace of God was upon Him.
  - type: heading
    content: The Boy Jesus Amazes the Scholars
  '41':
  - type: text
    content: 'His parents went to '
  - type: note
    content: John 4:20
  - type: text
    content: 'Jerusalem '
  - type: note
    content: Ex. 23:15, 17; 34:23; Deut. 16:1, 16; Luke 22:15
  - type: text
    content: 'every year at the Feast of the Passover. '
  '42':
  - type: text
    content: 'And when He was twelve years old, they went up to Jerusalem according to the '
  - type: note
    content: Ex. 23:14, 15
  - type: text
    content: 'custom of the feast. '
  '43':
  - type: text
    content: 'When they had finished the '
  - type: note
    content: Ex. 12:15
  - type: text
    content: 'days, as they returned, the Boy Jesus lingered behind in Jerusalem. And Joseph and His mother did not know '
  - type: text
    content: it;
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'but supposing Him to have been in the company, they went a day’s journey, and sought Him among '
  - type: text
    content: their
  - type: text
    content: ' relatives and acquaintances. '
  '45':
  - type: text
    content: 'So when they did not find Him, they returned to Jerusalem, seeking Him. '
  '46':
  - type: text
    content: 'Now so it was '
  - type: text
    content: that
  - type: text
    content: ' after three days they found Him in the temple, sitting in the midst of the teachers, both listening to them and asking them questions. '
  '47':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 7:28; 13:54; 22:33; Mark 1:22; 6:2; 11:18; Luke 4:32; John 7:15
  - type: text
    content: 'all who heard Him were astonished at His understanding and answers. '
  '48':
  - type: text
    content: So when they saw Him, they were amazed; and His mother said to Him, “Son, why have You done this to us? Look, Your father and I have sought You anxiously.”
  '49':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: '“Why did you seek Me? Did you not know that I must be '
  - type: note
    content: John 9:4
  - type: text
    content: 'about '
  - type: note
    content: (Mark 1:22; Luke 4:22, 32; John 4:34; 5:17, 36)
  - type: text
    content: My Father’s business?”
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'to be registered with Mary, '
  - type: note
    content: (Matt. 1:18)
  - type: text
    content: 'his betrothed wife, who was with child. '
  '50':
  - type: text
    content: 'But '
  - type: note
    content: Mark 9:32; Luke 9:45; 18:34; John 7:15, 46
  - type: text
    content: they did not understand the statement which He spoke to them.
  - type: heading
    content: Jesus Advances in Wisdom and Favor
  '51':
  - type: text
    content: 'Then He went down with them and came to Nazareth, and was subject to them, but His mother '
  - type: note
    content: Dan. 7:28
  - type: text
    content: 'kept all these things in her heart. '
  '52':
  - type: text
    content: 'And Jesus '
  - type: note
    content: (Is. 11:2, 3; Col. 2:2, 3)
  - type: text
    content: 'increased in wisdom and stature, '
  - type: note
    content: 1 Sam. 2:26; (Prov. 3:1–4)
  - type: text
    content: and in favor with God and men.
  '6':
  - type: text
    content: 'So it was, that while they were there, the days were completed for her to be delivered. '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 1:25; Luke 1:31
  - type: text
    content: she brought forth her firstborn Son, and wrapped Him in swaddling cloths, and laid Him in a manger, because there was no room for them in the inn.
  - type: heading
    content: Glory in the Highest
  '8':
  - type: text
    content: 'Now there were in the same country shepherds living out in the fields, keeping watch over their flock by night. '
  '9':
  - type: text
    content: 'And behold, an angel of the Lord stood before them, and the glory of the Lord shone around them, '
  - type: note
    content: Luke 1:12
  - type: text
    content: 'and they were greatly afraid. '
