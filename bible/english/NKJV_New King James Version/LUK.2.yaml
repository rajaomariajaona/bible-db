      marker-yv: yv-n
    - type: text
      text: 'the city of David, which is called Bethlehem, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 1:16
      marker-yv: yv-n
    - type: text
      text: 'because he was of the house and lineage of David, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
