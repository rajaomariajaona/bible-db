    children:
    - type: text
      text: Job’s Summary Defense
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Job further continued his discourse, and said:'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The voice of nobles was hushed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 137:6
      marker-yv: yv-n
    - type: text
      text: tongue stuck to the roof of their mouth.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When the ear heard, then it blessed me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And when the eye saw, then it approved me;
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 31:16–23; (Ps. 72:12; Prov. 21:13; 24:11)
      marker-yv: yv-n
    - type: text
      text: I delivered the poor who cried out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The fatherless and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' had no helper.'
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The blessing of a perishing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' came upon me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I caused the widow’s heart to sing for joy.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 24:13; Job 27:5, 6; Ps. 132:9; (Is. 59:17; 61:10; Eph. 6:14)
      marker-yv: yv-n
    - type: text
      text: I put on righteousness, and it clothed me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My justice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' like a robe and a turban.'
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 10:31
      marker-yv: yv-n
    - type: text
      text: eyes to the blind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' feet to the lame.'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' a father to the poor,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 29:7
      marker-yv: yv-n
    - type: text
      text: 'I searched out the case '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' I did not know.'
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I broke '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 58:6; Prov. 30:14
      marker-yv: yv-n
    - type: text
      text: the fangs of the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And plucked the victim from his teeth.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Then I said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 30:6
      marker-yv: yv-n
    - type: text
      text: ‘I shall die in my nest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And multiply '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' days as the sand.'
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 18:16
      marker-yv: yv-n
    - type: text
      text: 'My root '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' spread out '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 1:3; (Jer. 17:7, 8)
      marker-yv: yv-n
    - type: text
      text: to the waters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the dew lies all night on my branch.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Oh, that I were as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' months '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:1–5
      marker-yv: yv-n
    - type: text
      text: past,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' the days '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when
    - type: text
      text: ' God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:10
      marker-yv: yv-n
    - type: text
      text: watched over me;
  '20':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' fresh within me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And my '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 49:24; Ps. 18:34
      marker-yv: yv-n
    - type: text
      text: bow is renewed in my hand.’
  '21':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Men
    - type: text
      text: ' listened to me and waited,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And kept silence for my counsel.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: After my words they did not speak again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And my speech settled on them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dew.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They waited for me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' for the rain,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And they opened their mouth wide '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Zech. 10:1)
      marker-yv: yv-n
    - type: text
      text: the spring rain.
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: If
    - type: text
      text: ' I mocked at them, they did not believe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the light of my countenance they did not cast down.
  '25':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I chose the way for them, and sat as chief;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So I dwelt as a king in the army,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' comforts mourners.'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 18:6
      marker-yv: yv-n
    - type: text
      text: When His lamp shone upon my head,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when
    - type: text
      text: ' by His light I walked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: through
    - type: text
      text: ' darkness;'
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Just as I was in the days of my prime,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 15:8; (Ps. 25:14; Prov. 3:32)
      marker-yv: yv-n
    - type: text
      text: 'the friendly counsel of God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' over my tent;'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When the Almighty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' yet with me,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: When
    - type: text
      text: ' my children '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' around me;'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 49:11; Deut. 32:14; Job 20:17
      marker-yv: yv-n
    - type: text
      text: my steps were bathed with cream,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:13; Ps. 81:16
      marker-yv: yv-n
    - type: text
      text: the rock poured out rivers of oil for me!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When I went out to the gate by the city,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: When
    - type: text
      text: ' I took my seat in the open square,'
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The young men saw me and hid,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the aged arose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stood;'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The princes refrained from talking,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 21:5
      marker-yv: yv-n
    - type: text
      text: 'put '
    - type: usfm
