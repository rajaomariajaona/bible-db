verses:
  '1':
  - type: heading
    content: God’s Commission to Joshua
  - type: text
    content: 'After the death of Moses the servant of the '
  - type: heading
    content: Lord
  - type: text
    content: ', it came to pass that the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Joshua the son of Nun, Moses’ '
  - type: note
    content: Ex. 24:13; Num. 13:16; 14:6, 29, 30, 37, 38; Deut. 1:38; Acts 7:45
  - type: text
    content: 'assistant, saying: '
  '10':
  - type: text
    content: 'Then Joshua commanded the officers of the people, saying, '
  '11':
  - type: text
    content: '“Pass through the camp and command the people, saying, ‘Prepare provisions for yourselves, for '
  - type: note
    content: Deut. 9:1; Josh. 3:17
  - type: text
    content: 'within three days you will cross over this Jordan, to go in to possess the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God is giving you to possess.’ ”'
  '12':
  - type: text
    content: 'And to the Reubenites, the Gadites, and half the tribe of Manasseh Joshua spoke, saying, '
  '13':
  - type: text
    content: '“Remember '
  - type: note
    content: Num. 32:20–28
  - type: text
    content: 'the word which Moses the servant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded you, saying, ‘The '
  - type: heading
    content: Lord
  - type: text
    content: ' your God is giving you rest and is giving you this land.’ '
  '14':
  - type: text
    content: 'Your wives, your little ones, and your livestock shall remain in the land which Moses gave you on this side of the Jordan. But you shall pass before your brethren armed, all your mighty men of valor, and help them, '
  '15':
  - type: text
    content: 'until the '
  - type: heading
    content: Lord
  - type: text
    content: ' has given your brethren rest, as He '
  - type: text
    content: gave
  - type: text
    content: ' you, and they also have taken possession of the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God is giving them. '
  - type: note
    content: Josh. 22:1–4
  - type: text
    content: 'Then you shall return to the land of your possession and enjoy it, which Moses the '
  - type: heading
    content: Lord
  - type: text
    content: ’s servant gave you on this side of the Jordan toward the sunrise.”
  '16':
  - type: text
    content: 'So they answered Joshua, saying, “All that you command us we will do, and wherever you send us we will go. '
  '17':
  - type: text
    content: 'Just as we heeded Moses in all things, so we will heed you. Only the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: 1 Sam. 20:13; 1 Kin. 1:37
  - type: text
    content: 'be with you, as He was with Moses. '
  '18':
  - type: text
    content: Whoever rebels against your command and does not heed your words, in all that you command him, shall be put to death. Only be strong and of good courage.”
  '2':
  - type: note
    content: Num. 12:7; Deut. 34:5
  - type: text
    content: '“Moses My servant is dead. Now therefore, arise, go over this Jordan, you and all this people, to the land which I am giving to them—the children of Israel. '
  '3':
  - type: note
    content: Deut. 11:24; Josh. 11:23
  - type: text
    content: 'Every place that the sole of your foot will tread upon I have given you, as I said to Moses. '
  '4':
  - type: note
    content: Gen. 15:18; Ex. 23:31; Num. 34:3–12
  - type: text
    content: 'From the wilderness and this Lebanon as far as the great river, the River Euphrates, all the land of the Hittites, and to the Great Sea toward the going down of the sun, shall be your territory. '
  '5':
  - type: note
    content: Deut. 7:24
  - type: text
    content: 'No man shall '
  - type: text
    content: be
  - type: text
    content: ' '
  - type: text
    content: able
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' stand before you all the days of your life; '
  - type: note
    content: Ex. 3:12
  - type: text
    content: 'as I was with Moses, '
  - type: text
    content: so
  - type: text
    content: ' '
  - type: note
    content: Deut. 31:8, 23
  - type: text
    content: 'I will be with you. '
  - type: note
    content: Deut. 31:6, 7; Heb. 13:5
  - type: text
    content: 'I will not leave you nor forsake you. '
  '6':
  - type: note
    content: Deut. 31:7, 23
  - type: text
    content: 'Be strong and of good courage, for to this people you shall divide as an inheritance the land which I swore to their fathers to give them. '
  '7':
  - type: text
    content: 'Only be strong and very courageous, that you may observe to do according to all the law '
  - type: note
    content: Num. 27:23; Deut. 31:7; Josh. 11:15
  - type: text
    content: 'which Moses My servant commanded you; '
  - type: note
    content: Deut. 5:32
  - type: text
    content: 'do not turn from it to the right hand or to the left, that you may prosper wherever you go. '
  '8':
  - type: note
    content: Deut. 17:18, 19; 31:24, 26; Josh. 8:34
  - type: text
    content: 'This Book of the Law shall not depart from your mouth, but '
  - type: note
    content: Deut. 29:9; Ps. 1:1–3
  - type: text
    content: 'you shall meditate in it day and night, that you may observe to do according to all that is written in it. For then you will make your way prosperous, and then you will have good success. '
  '9':
  - type: note
    content: Deut. 31:7
  - type: text
    content: 'Have I not commanded you? Be strong and of good courage; '
  - type: note
    content: Ps. 27:1
  - type: text
    content: 'do not be afraid, nor be dismayed, for the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: text
    content: is
  - type: text
    content: ' with you wherever you go.”'
  - type: heading
    content: The Order to Cross the Jordan
