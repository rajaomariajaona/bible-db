document_id: JOS.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Commission to Joshua
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After the death of Moses the servant of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', it came to pass that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Joshua the son of Nun, Moses’ '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 24:13; Num. 13:16; 14:6, 29, 30, 37, 38; Deut. 1:38; Acts 7:45
    marker-yv: yv-n
  - type: text
    text: 'assistant, saying: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 12:7; Deut. 34:5
    marker-yv: yv-n
  - type: text
    text: '“Moses My servant is dead. Now therefore, arise, go over this Jordan, you and all this people, to the land which I am giving to them—the children of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 11:24; Josh. 11:23
    marker-yv: yv-n
  - type: text
    text: 'Every place that the sole of your foot will tread upon I have given you, as I said to Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 15:18; Ex. 23:31; Num. 34:3–12
    marker-yv: yv-n
  - type: text
    text: 'From the wilderness and this Lebanon as far as the great river, the River Euphrates, all the land of the Hittites, and to the Great Sea toward the going down of the sun, shall be your territory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 7:24
    marker-yv: yv-n
  - type: text
    text: 'No man shall '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: able
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' stand before you all the days of your life; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 3:12
    marker-yv: yv-n
  - type: text
    text: 'as I was with Moses, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 31:8, 23
    marker-yv: yv-n
  - type: text
    text: 'I will be with you. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 31:6, 7; Heb. 13:5
    marker-yv: yv-n
  - type: text
    text: 'I will not leave you nor forsake you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 31:7, 23
    marker-yv: yv-n
  - type: text
    text: 'Be strong and of good courage, for to this people you shall divide as an inheritance the land which I swore to their fathers to give them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Only be strong and very courageous, that you may observe to do according to all the law '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 27:23; Deut. 31:7; Josh. 11:15
    marker-yv: yv-n
  - type: text
    text: 'which Moses My servant commanded you; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 5:32
    marker-yv: yv-n
  - type: text
    text: 'do not turn from it to the right hand or to the left, that you may prosper wherever you go. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 17:18, 19; 31:24, 26; Josh. 8:34
    marker-yv: yv-n
  - type: text
    text: 'This Book of the Law shall not depart from your mouth, but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 29:9; Ps. 1:1–3
    marker-yv: yv-n
  - type: text
    text: 'you shall meditate in it day and night, that you may observe to do according to all that is written in it. For then you will make your way prosperous, and then you will have good success. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 31:7
    marker-yv: yv-n
  - type: text
    text: 'Have I not commanded you? Be strong and of good courage; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 27:1
    marker-yv: yv-n
  - type: text
    text: 'do not be afraid, nor be dismayed, for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' with you wherever you go.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Order to Cross the Jordan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Joshua commanded the officers of the people, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Pass through the camp and command the people, saying, ‘Prepare provisions for yourselves, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 9:1; Josh. 3:17
    marker-yv: yv-n
  - type: text
    text: 'within three days you will cross over this Jordan, to go in to possess the land which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is giving you to possess.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And to the Reubenites, the Gadites, and half the tribe of Manasseh Joshua spoke, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Remember '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 32:20–28
    marker-yv: yv-n
  - type: text
    text: 'the word which Moses the servant of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded you, saying, ‘The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is giving you rest and is giving you this land.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Your wives, your little ones, and your livestock shall remain in the land which Moses gave you on this side of the Jordan. But you shall pass before your brethren armed, all your mighty men of valor, and help them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'until the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has given your brethren rest, as He '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gave
  - type: text
    text: ' you, and they also have taken possession of the land which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is giving them. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 22:1–4
    marker-yv: yv-n
  - type: text
    text: 'Then you shall return to the land of your possession and enjoy it, which Moses the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s servant gave you on this side of the Jordan toward the sunrise.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So they answered Joshua, saying, “All that you command us we will do, and wherever you send us we will go. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Just as we heeded Moses in all things, so we will heed you. Only the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 20:13; 1 Kin. 1:37
    marker-yv: yv-n
  - type: text
    text: 'be with you, as He was with Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Whoever rebels against your command and does not heed your words, in all that you command him, shall be put to death. Only be strong and of good courage.”
