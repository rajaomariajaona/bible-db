document_id: EPH.4,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Walk in Unity
  - type: text
    content: 'I, therefore, the prisoner of the Lord, beseech you to '
  - type: note
    content: Eph. 2:10; (Col. 1:10; 2:6); 1 Thess. 2:12
  - type: text
    content: 'walk worthy of the calling with which you were called, '
  '10':
  - type: text
    content: 'He who descended is also the One '
  - type: note
    content: Acts 1:9
  - type: text
    content: 'who ascended far above all the heavens, '
  - type: note
    content: (Acts 2:33; Eph. 1:23)
  - type: text
    content: that He might fill all things.)
  '11':
  - type: text
    content: 'And He Himself gave some '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' apostles, some prophets, some evangelists, and some pastors and teachers, '
  '12':
  - type: text
    content: 'for the equipping of the saints for the work of ministry, '
  - type: note
    content: 1 Cor. 14:26
  - type: text
    content: 'for the edifying of '
  - type: note
    content: Col. 1:24
  - type: text
    content: 'the body of Christ, '
  '13':
  - type: text
    content: 'till we all come to the unity of the faith '
  - type: note
    content: Col. 2:2
  - type: text
    content: 'and of the knowledge of the Son of God, to '
  - type: note
    content: 1 Cor. 14:20; Col. 1:28; Heb. 5:14
  - type: text
    content: 'a perfect man, to the measure of the stature of the fullness of Christ; '
  '14':
  - type: text
    content: 'that we should no longer be '
  - type: note
    content: 1 Cor. 14:20
  - type: text
    content: 'children, tossed to and fro and carried about with every wind of doctrine, by the trickery of men, in the cunning craftiness of '
  - type: note
    content: Rom. 16:18
  - type: text
    content: 'deceitful plotting, '
  '15':
  - type: text
    content: 'but, speaking the truth in love, may grow up in all things into Him who is the '
  - type: note
    content: Eph. 1:22
  - type: text
    content: 'head—Christ— '
  '16':
  - type: note
    content: (Rom. 12:4); Col. 2:19
  - type: text
    content: from whom the whole body, joined and knit together by what every joint supplies, according to the effective working by which every part does its share, causes growth of the body for the edifying of itself in love.
  - type: heading
    content: The New Man
  '17':
  - type: text
    content: 'This I say, therefore, and testify in the Lord, that you should '
  - type: note
    content: Eph. 2:2; 4:22
  - type: text
    content: 'no longer walk as the rest of the Gentiles walk, in the futility of their mind, '
  '18':
  - type: text
    content: 'having their understanding darkened, being alienated from the life of God, because of the ignorance that is in them, because of the '
  - type: note
    content: Rom. 1:21
  - type: text
    content: 'blindness of their heart; '
  '19':
  - type: note
    content: 1 Tim. 4:2
  - type: text
    content: 'who, being past feeling, '
  - type: note
    content: 1 Pet. 4:3
  - type: text
    content: have given themselves over to lewdness, to work all uncleanness with greediness.
  '2':
  - type: text
    content: 'with all lowliness and gentleness, with longsuffering, bearing with one another in love, '
  '20':
  - type: text
    content: 'But you have not so learned Christ, '
  '21':
  - type: text
    content: 'if indeed you have heard Him and have been taught by Him, as the truth is in Jesus: '
  '22':
  - type: text
    content: 'that you '
  - type: note
    content: Col. 3:8
  - type: text
    content: 'put off, concerning your former conduct, the old man which grows corrupt according to the deceitful lusts, '
  '23':
  - type: text
    content: 'and '
  - type: note
    content: (Rom. 12:2; Col. 3:10)
  - type: text
    content: 'be renewed in the spirit of your mind, '
  '24':
  - type: text
    content: 'and that you '
  - type: note
    content: (Rom. 6:4; 7:6; 12:2; 2 Cor. 5:17; Col. 3:10)
  - type: text
    content: put on the new man which was created according to God, in true righteousness and holiness.
  - type: heading
    content: Do Not Grieve the Spirit
  '25':
  - type: text
    content: 'Therefore, putting away lying, '
  - type: note
    content: Zech. 8:16; Eph. 4:15; Col. 3:9
  - type: text
    content: “
  - type: text
    content: Let
  - type: text
    content: ' each one '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: you
  - type: text
    content: ' speak truth with his neighbor,” for '
  - type: note
    content: Rom. 12:5
  - type: text
    content: 'we are members of one another. '
  '26':
  - type: note
    content: Ps. 4:4; 37:8
  - type: text
    content: '“Be angry, and do not sin”: do not let the sun go down on your wrath, '
  '27':
  - type: note
    content: (Rom. 12:19; James 4:7); 1 Pet. 5:9
  - type: text
    content: 'nor give place to the devil. '
  '28':
  - type: text
    content: 'Let him who stole steal no longer, but rather '
  - type: note
    content: Acts 20:35; 1 Cor. 4:12; Gal. 6:10
  - type: text
    content: 'let him labor, working with '
  - type: text
    content: his
  - type: text
    content: ' hands what is good, that he may have something '
  - type: note
    content: Luke 3:11; 1 Thess. 4:12
  - type: text
    content: 'to give him who has need. '
  '29':
  - type: note
    content: Matt. 12:34; Eph. 5:4; Col. 3:8
  - type: text
    content: 'Let no corrupt word proceed out of your mouth, but '
  - type: note
    content: 1 Thess. 5:11
  - type: text
    content: 'what is good for necessary edification, '
  - type: note
    content: Col. 3:16
  - type: text
    content: 'that it may impart grace to the hearers. '
  '3':
  - type: text
    content: 'endeavoring to keep the unity of the Spirit '
  - type: note
    content: Col. 3:14
  - type: text
    content: 'in the bond of peace. '
  '30':
  - type: text
    content: 'And '
  - type: note
    content: Is. 7:13
  - type: text
    content: 'do not grieve the Holy Spirit of God, by whom you were sealed for the day of redemption. '
  '31':
  - type: note
    content: Rom. 3:14; Col. 3:8, 19
  - type: text
    content: 'Let all bitterness, wrath, anger, clamor, and '
  - type: note
    content: James 4:11
  - type: text
    content: 'evil speaking be put away from you, '
  - type: note
    content: Titus 3:3
  - type: text
    content: 'with all malice. '
  '32':
  - type: text
    content: 'And '
  - type: note
    content: (Matt. 6:14); 2 Cor. 6:10
  - type: text
    content: 'be kind to one another, tenderhearted, '
  - type: note
    content: (Mark 11:25; Luke 6:37)
  - type: text
    content: forgiving one another, even as God in Christ forgave you.
  '4':
  - type: note
    content: Rom. 12:5
  - type: text
    content: There
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' one body and one Spirit, just as you were called in one hope of your calling; '
  '5':
  - type: note
    content: 1 Cor. 1:13
  - type: text
    content: 'one Lord, '
  - type: note
    content: (1 Cor. 15:1–8); Jude 3
  - type: text
    content: 'one faith, '
  - type: note
    content: 1 Cor. 12:12, 13; (Heb. 6:6)
  - type: text
    content: 'one baptism; '
  '6':
  - type: note
    content: Mal. 2:10; 1 Cor. 8:6; 12:6
  - type: text
    content: 'one God and Father of all, who '
  - type: text
    content: is
  - type: text
    content: ' above all, and '
  - type: note
    content: Rom. 11:36
  - type: text
    content: through all, and in you all.
  - type: heading
    content: Spiritual Gifts
  '7':
  - type: text
    content: 'But '
  - type: note
    content: (1 Cor. 12:7, 11)
  - type: text
    content: 'to each one of us grace was given according to the measure of Christ’s gift. '
  '8':
  - type: text
    content: 'Therefore He says:'
  - type: note
    content: Ps. 68:18; (Col. 2:15)
  - type: text
    content: “When He ascended on high,
  - type: text
    content: He led captivity captive,
  - type: text
    content: And gave gifts to men.”
  '9':
  - type: note
    content: Luke 23:43; John 3:13; 20:17; (1 Pet. 3:19, 20)
  - type: text
    content: '(Now this, “He ascended”—what does it mean but that He also first descended into the lower parts of the earth? '
