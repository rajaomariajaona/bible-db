      marker-yv: yv-n
    - type: text
      text: 'Ziklag while he was still a fugitive from Saul the son of Kish; and they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' among the mighty men, helpers in the war, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mishmannah the fourth, Jeremiah the fifth, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
