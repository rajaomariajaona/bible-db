  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' from the sons of Gad, captains of the army; the least was over a hundred, and the greatest was over a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 18:13
      marker-yv: yv-n
    - type: text
      text: 'thousand. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the ones who crossed the Jordan in the first month, when it had overflowed all its '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 3:15; 4:18, 19
      marker-yv: yv-n
    - type: text
      text: 'banks; and they put to flight all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: those
    - type: text
      text: ' in the valleys, to the east and to the west.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then some of the sons of Benjamin and Judah came to David at the stronghold. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And David went out to meet them, and answered and said to them, “If you have come peaceably to me to help me, my heart will be united with you; but if to betray me to my enemies, since '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no wrong in my hands, may the God of our fathers look and bring judgment.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then the Spirit came upon '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 17:25
      marker-yv: yv-n
    - type: text
      text: 'Amasai, chief of the captains, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: We
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' yours, O David;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'We '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' on your side, O son of Jesse!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Peace, peace to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And peace to your helpers!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For your God helps you.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David received them, and made them captains of the troop.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' from Manasseh defected to David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 29:2
      marker-yv: yv-n
    - type: text
      text: 'when he was going with the Philistines to battle against Saul; but they did not help them, for the lords of the Philistines sent him away by agreement, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 29:4
      marker-yv: yv-n
    - type: text
      text: '“He may defect to his master Saul '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: endanger
    - type: text
      text: ' our heads.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'armed with bows, using both the right hand and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 3:15; 20:16
      marker-yv: yv-n
    - type: text
      text: 'the left in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hurling
    - type: text
      text: ' stones and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shooting
    - type: text
      text: ' arrows with the bow. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: They
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' of Benjamin, Saul’s brethren.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'When he went to Ziklag, those of Manasseh who defected to him were Adnah, Jozabad, Jediael, Michael, Jozabad, Elihu, and Zillethai, captains of the thousands who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' from Manasseh. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And they helped David against '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 30:1, 9, 10
      marker-yv: yv-n
    - type: text
      text: 'the bands '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: raiders,
    - type: text
      text: ' for they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' all mighty men of valor, and they were captains in the army. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For at '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' time they came to David day by day to help him, until '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' a great army, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 32:2; Josh. 5:13–15
      marker-yv: yv-n
    - type: text
      text: like the army of God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Army at Hebron
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Now these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the numbers of the divisions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' equipped for war, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 2:1–4
      marker-yv: yv-n
    - type: text
      text: 'came to David at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 11:1
      marker-yv: yv-n
    - type: text
      text: 'Hebron to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 10:14
      marker-yv: yv-n
    - type: text
      text: 'turn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: over
    - type: text
      text: ' the kingdom of Saul to him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 16:1–4
      marker-yv: yv-n
    - type: text
      text: 'according to the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'of the sons of Judah bearing shield and spear, six thousand eight hundred armed for war; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'of the sons of Simeon, mighty men of valor fit for war, seven thousand one hundred; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'of the sons of Levi four thousand six hundred; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Jehoiada, the leader of the Aaronites, and with him three thousand seven hundred; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:17; 1 Chr. 6:8, 53
      marker-yv: yv-n
    - type: text
      text: 'Zadok, a young man, a valiant warrior, and from his father’s house twenty-two captains; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'of the sons of Benjamin, relatives of Saul, three thousand (until then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 2:8, 9
      marker-yv: yv-n
    - type: text
      text: 'the greatest part of them had remained loyal to the house of Saul); '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The chief '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Ahiezer, then Joash, the sons of Shemaah the Gibeathite; Jeziel and Pelet the sons of Azmaveth; Berachah, and Jehu the Anathothite; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'of the sons of Ephraim twenty thousand eight hundred, mighty men of valor, famous men throughout their father’s house; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'of the half-tribe of Manasseh eighteen thousand, who were designated by name to come and make David king; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'of the sons of Issachar '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 1:13
      marker-yv: yv-n
    - type: text
      text: 'who had understanding of the times, to know what Israel ought to do, their chiefs were two hundred; and all their brethren were at their command; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'of Zebulun there were fifty thousand who went out to battle, expert in war with all weapons of war, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 12:2; (James 1:8)
      marker-yv: yv-n
    - type: text
      text: 'stouthearted men who could keep ranks; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'of Naphtali one thousand captains, and with them thirty-seven thousand with shield and spear; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'of the Danites who could keep battle formation, twenty-eight thousand six hundred; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'of Asher, those who could go out to war, able to keep battle formation, forty thousand; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'of the Reubenites and the Gadites and the half-tribe of Manasseh, from the other side of the Jordan, one hundred and twenty thousand armed for battle with every '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kind
    - type: text
      text: ' of weapon of war.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'All these men of war, who could keep ranks, came to Hebron with a loyal heart, to make David king over all Israel; and all the rest of Israel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 30:12
      marker-yv: yv-n
    - type: text
      text: 'one mind to make David king. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And they were there with David three days, eating and drinking, for their brethren had prepared for them. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ishmaiah the Gibeonite, a mighty man among the thirty, and over the thirty; Jeremiah, Jahaziel, Johanan, and Jozabad the Gederathite; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Moreover those who were near to them, from as far away as Issachar and Zebulun and Naphtali, were bringing food on donkeys and camels, on mules and oxen—provisions of flour and cakes of figs and cakes of raisins, wine and oil and oxen and sheep abundantly, for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' joy in Israel.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Eluzai, Jerimoth, Bealiah, Shemariah, and Shephatiah the Haruphite; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Elkanah, Jisshiah, Azarel, Joezer, and Jashobeam, the Korahites; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: and Joelah and Zebadiah the sons of Jeroham of Gedor.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Some
    - type: text
      text: ' Gadites joined David at the stronghold in the wilderness, mighty men of valor, men trained for battle, who could handle shield and spear, whose faces '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' the faces of lions, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 2:18
      marker-yv: yv-n
    - type: text
      text: 'as swift as gazelles on the mountains: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ezer the first, Obadiah the second, Eliab the third, '
