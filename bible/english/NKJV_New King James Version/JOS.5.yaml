document_id: JOS.5,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Second Generation Circumcised
  - type: text
    content: 'So it was, when all the kings of the Amorites who '
  - type: text
    content: were
  - type: text
    content: ' on the west side of the Jordan, and all the kings of the Canaanites '
  - type: note
    content: Num. 13:29
  - type: text
    content: 'who '
  - type: text
    content: were
  - type: text
    content: ' by the sea, '
  - type: note
    content: Ex. 15:14, 15
  - type: text
    content: 'heard that the '
  - type: heading
    content: Lord
  - type: text
    content: ' had dried up the waters of the Jordan from before the children of Israel until we had crossed over, that their heart melted; '
  - type: note
    content: Josh. 2:10, 11; 9:9; 1 Kin. 10:5
  - type: text
    content: and there was no spirit in them any longer because of the children of Israel.
  '10':
  - type: text
    content: 'Now the children of Israel camped in Gilgal, and kept the Passover '
  - type: note
    content: Ex. 12:6; Num. 9:5
  - type: text
    content: 'on the fourteenth day of the month at twilight on the plains of Jericho. '
  '11':
  - type: text
    content: 'And they ate of the produce of the land on the day after the Passover, unleavened bread and parched grain, on the very same day. '
  '12':
  - type: text
    content: 'Then '
  - type: note
    content: Ex. 16:35
  - type: text
    content: the manna ceased on the day after they had eaten the produce of the land; and the children of Israel no longer had manna, but they ate the food of the land of Canaan that year.
  - type: heading
    content: The Commander of the Army of the Lord
  '13':
  - type: text
    content: 'And it came to pass, when Joshua was by Jericho, that he lifted his eyes and looked, and behold, '
  - type: note
    content: Gen. 18:1, 2; 32:24, 30; Ex. 23:23; Num. 22:31; Zech. 1:8; Acts 1:10
  - type: text
    content: 'a Man stood opposite him '
  - type: note
    content: Num. 22:23; 1 Chr. 21:16
  - type: text
    content: with His sword drawn in His hand. And Joshua went to Him and said to Him, “
  - type: text
    content: Are
  - type: text
    content: ' You for us or for our adversaries?”'
  '14':
  - type: text
    content: 'So He said, “No, but '
  - type: text
    content: as
  - type: text
    content: ' Commander of the army of the '
  - type: heading
    content: Lord
  - type: text
    content: ' I have now come.”'
  - type: text
    content: 'And Joshua '
  - type: note
    content: Gen. 17:3; Num. 20:6
  - type: text
    content: 'fell on his face to the earth and '
  - type: note
    content: Ex. 34:8
  - type: text
    content: worshiped, and said to Him, “What does my Lord say to His servant?”
  '15':
  - type: text
    content: 'Then the Commander of the '
  - type: heading
    content: Lord
  - type: text
    content: '’s army said to Joshua, '
  - type: note
    content: Ex. 3:5; Acts 7:33
  - type: text
    content: '“Take your sandal off your foot, for the place where you stand '
  - type: text
    content: is
  - type: text
    content: ' holy.” And Joshua did so.'
  '2':
  - type: text
    content: 'At that time the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Joshua, “Make '
  - type: note
    content: Ex. 4:25
  - type: text
    content: 'flint knives for yourself, and circumcise the sons of Israel again the second time.” '
  '3':
  - type: text
    content: 'So Joshua made flint knives for himself, and circumcised the sons of Israel at the hill of the foreskins. '
  '4':
  - type: text
    content: 'And this '
  - type: text
    content: is
  - type: text
    content: ' the reason why Joshua circumcised them: '
  - type: note
    content: Num. 14:29; 26:64, 65; Deut. 2:14–16
  - type: text
    content: 'All the people who came out of Egypt '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' males, all the men of war, had died in the wilderness on the way, after they had come out of Egypt. '
  '5':
  - type: text
    content: 'For all the people who came out had been circumcised, but all the people born in the wilderness, on the way as they came out of Egypt, had not been circumcised. '
  '6':
  - type: text
    content: 'For the children of Israel walked '
  - type: note
    content: Num. 14:33; Deut. 1:3; 29:5
  - type: text
    content: 'forty years in the wilderness, till all the people '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' men of war, who came out of Egypt, were consumed, because they did not obey the voice of the '
  - type: heading
    content: Lord
  - type: text
    content: '—to whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' swore that '
  - type: note
    content: Num. 14:23, 29–35; 26:23–65; Heb. 3:11
  - type: text
    content: 'He would not show them the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' had sworn to their fathers that He would give us, '
  - type: note
    content: Ex. 3:8
  - type: text
    content: '“a land flowing with milk and honey.” '
  '7':
  - type: text
    content: 'Then Joshua circumcised '
  - type: note
    content: Num. 14:31; Deut. 1:39
  - type: text
    content: 'their sons '
  - type: text
    content: whom
  - type: text
    content: ' He raised up in their place; for they were uncircumcised, because they had not been circumcised on the way.'
  '8':
  - type: text
    content: 'So it was, when they had finished circumcising all the people, that they stayed in their places in the camp '
  - type: note
    content: Gen. 34:25
  - type: text
    content: 'till they were healed. '
  '9':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Joshua, “This day I have rolled away '
  - type: note
    content: Gen. 34:14
  - type: text
    content: 'the reproach of Egypt from you.” Therefore the name of the place is called '
  - type: note
    content: Josh. 4:19
  - type: text
    content: Gilgal to this day.
