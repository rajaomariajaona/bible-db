document_id: JOS.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Second Generation Circumcised
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So it was, when all the kings of the Amorites who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' on the west side of the Jordan, and all the kings of the Canaanites '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 13:29
    marker-yv: yv-n
  - type: text
    text: 'who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' by the sea, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 15:14, 15
    marker-yv: yv-n
  - type: text
    text: 'heard that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had dried up the waters of the Jordan from before the children of Israel until we had crossed over, that their heart melted; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 2:10, 11; 9:9; 1 Kin. 10:5
    marker-yv: yv-n
  - type: text
    text: and there was no spirit in them any longer because of the children of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'At that time the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Joshua, “Make '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 4:25
    marker-yv: yv-n
  - type: text
    text: 'flint knives for yourself, and circumcise the sons of Israel again the second time.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Joshua made flint knives for himself, and circumcised the sons of Israel at the hill of the foreskins. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the reason why Joshua circumcised them: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 14:29; 26:64, 65; Deut. 2:14–16
    marker-yv: yv-n
  - type: text
    text: 'All the people who came out of Egypt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' males, all the men of war, had died in the wilderness on the way, after they had come out of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For all the people who came out had been circumcised, but all the people born in the wilderness, on the way as they came out of Egypt, had not been circumcised. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For the children of Israel walked '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 14:33; Deut. 1:3; 29:5
    marker-yv: yv-n
  - type: text
    text: 'forty years in the wilderness, till all the people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' men of war, who came out of Egypt, were consumed, because they did not obey the voice of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '—to whom the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' swore that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 14:23, 29–35; 26:23–65; Heb. 3:11
    marker-yv: yv-n
  - type: text
    text: 'He would not show them the land which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had sworn to their fathers that He would give us, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 3:8
    marker-yv: yv-n
  - type: text
    text: '“a land flowing with milk and honey.” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Joshua circumcised '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 14:31; Deut. 1:39
    marker-yv: yv-n
  - type: text
    text: 'their sons '
  - type: usfm
    marker: it
    children:
    - type: text
      text: whom
  - type: text
    text: ' He raised up in their place; for they were uncircumcised, because they had not been circumcised on the way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So it was, when they had finished circumcising all the people, that they stayed in their places in the camp '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 34:25
    marker-yv: yv-n
  - type: text
    text: 'till they were healed. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Joshua, “This day I have rolled away '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 34:14
    marker-yv: yv-n
  - type: text
    text: 'the reproach of Egypt from you.” Therefore the name of the place is called '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 4:19
    marker-yv: yv-n
  - type: text
    text: Gilgal to this day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now the children of Israel camped in Gilgal, and kept the Passover '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 12:6; Num. 9:5
    marker-yv: yv-n
  - type: text
    text: 'on the fourteenth day of the month at twilight on the plains of Jericho. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And they ate of the produce of the land on the day after the Passover, unleavened bread and parched grain, on the very same day. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 16:35
    marker-yv: yv-n
  - type: text
    text: the manna ceased on the day after they had eaten the produce of the land; and the children of Israel no longer had manna, but they ate the food of the land of Canaan that year.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Commander of the Army of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And it came to pass, when Joshua was by Jericho, that he lifted his eyes and looked, and behold, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 18:1, 2; 32:24, 30; Ex. 23:23; Num. 22:31; Zech. 1:8; Acts 1:10
    marker-yv: yv-n
  - type: text
    text: 'a Man stood opposite him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 22:23; 1 Chr. 21:16
    marker-yv: yv-n
  - type: text
    text: with His sword drawn in His hand. And Joshua went to Him and said to Him, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Are
  - type: text
    text: ' You for us or for our adversaries?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So He said, “No, but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' Commander of the army of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' I have now come.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And Joshua '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 17:3; Num. 20:6
    marker-yv: yv-n
  - type: text
    text: 'fell on his face to the earth and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 34:8
    marker-yv: yv-n
  - type: text
    text: worshiped, and said to Him, “What does my Lord say to His servant?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the Commander of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s army said to Joshua, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 3:5; Acts 7:33
    marker-yv: yv-n
  - type: text
    text: '“Take your sandal off your foot, for the place where you stand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' holy.” And Joshua did so.'
