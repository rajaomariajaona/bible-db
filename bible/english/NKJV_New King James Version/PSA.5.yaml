document_id: PSA.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Prayer for Guidance
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Chief Musician. With flutes. A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Give '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 4:1
    marker-yv: yv-n
  - type: text
    text: 'ear to my words, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: Consider my meditation.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Give heed to the voice of my cry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: My King and my God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: For to You I will pray.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'My voice You shall hear in the morning, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 55:17; 88:13
    marker-yv: yv-n
  - type: text
    text: 'In the morning I will direct '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' to You,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I will look up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' not a God who takes pleasure in wickedness,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor shall evil dwell with You.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Hab. 1:13)
    marker-yv: yv-n
  - type: text
    text: 'boastful shall not '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 1:5
    marker-yv: yv-n
  - type: text
    text: stand in Your sight;
- type: usfm
  marker: q2
  children:
  - type: text
    text: You hate all workers of iniquity.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You shall destroy those who speak falsehood;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' abhors the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 55:23
    marker-yv: yv-n
  - type: text
    text: bloodthirsty and deceitful man.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But as for me, I will come into Your house in the multitude of Your mercy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: In fear of You I will worship toward Your holy temple.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 25:4, 5; 27:11; 31:3
    marker-yv: yv-n
  - type: text
    text: 'Lead me, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', in Your righteousness because of my enemies;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Make Your way straight before my face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' no faithfulness in their mouth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Their inward part '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' destruction;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 3:13
    marker-yv: yv-n
  - type: text
    text: 'Their throat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' an open tomb;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They flatter with their tongue.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pronounce them guilty, O God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them fall by their own counsels;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cast them out in the multitude of their transgressions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: For they have rebelled against You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But let all those rejoice who put their trust in You;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them ever shout for joy, because You defend them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let those also who love Your name
- type: usfm
  marker: q2
  children:
  - type: text
    text: Be joyful in You.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For You, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', will bless the righteous;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'With favor You will surround him as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' a shield.'
