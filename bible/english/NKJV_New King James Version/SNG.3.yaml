    - type: text
      text: 'By '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 26:9
      marker-yv: yv-n
    - type: text
      text: night on my bed I sought the one I love;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I sought him, but I did not find him.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He made its pillars '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' silver,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Its support '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' gold,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Its seat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' purple,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Its interior paved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' love'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By the daughters of Jerusalem.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Go forth, O daughters of Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And see King Solomon with the crown
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With which his mother crowned him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: On the day of his wedding,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The day of the gladness of his heart.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“I will rise now,” '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “And go about the city;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the streets and in the squares
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will seek the one I love.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I sought him, but I did not find him.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Song 5:7; Is. 21:6–8, 11, 12
      marker-yv: yv-n
    - type: text
      text: The watchmen who go about the city found me;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Have you seen the one I love?”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Scarcely had I passed by them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When I found the one I love.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I held him and would not let him go,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Until I had brought him to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Song 8:2
      marker-yv: yv-n
    - type: text
      text: house of my mother,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And into the chamber of her who conceived me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Song 2:7; 8:4
      marker-yv: yv-n
    - type: text
      text: I charge you, O daughters of Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By the gazelles or by the does of the field,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not stir up nor awaken love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Until it pleases.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Coming of Solomon
    marker-yv: yv-h
  - type: usfm
    marker: qa
    children:
    - type: text
      text: The Shulamite
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Song 8:5
      marker-yv: yv-n
    - type: text
      text: 'Who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' this coming out of the wilderness'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like pillars of smoke,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Perfumed with myrrh and frankincense,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With all the merchant’s fragrant powders?
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Behold, it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Solomon’s couch,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: With
    - type: text
      text: ' sixty valiant men around it,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Of the valiant of Israel.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They all hold swords,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Being
    - type: text
      text: ' expert in war.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Every man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has
    - type: text
      text: ' his sword on his thigh'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because of fear in the night.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Of the wood of Lebanon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Solomon the King
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Made himself a palanquin:'
