document_id: COL.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, '
  - type: note
    content: Eph. 1:1
  - type: text
    content: an apostle of Jesus Christ by the will of God, and Timothy our brother,
  '10':
  - type: note
    content: Eph. 4:1; Phil. 1:27; 1 Thess. 2:12
  - type: text
    content: 'that you may walk worthy of the Lord, '
  - type: note
    content: 1 Thess. 4:1
  - type: text
    content: 'fully pleasing '
  - type: text
    content: Him,
  - type: text
    content: ' '
  - type: note
    content: Heb. 13:21
  - type: text
    content: 'being fruitful in every good work and increasing in the '
  - type: note
    content: 2 Pet. 3:18
  - type: text
    content: 'knowledge of God; '
  '11':
  - type: note
    content: (Eph. 3:16; 6:10)
  - type: text
    content: 'strengthened with all might, according to His glorious power, '
  - type: note
    content: Eph. 4:2
  - type: text
    content: 'for all patience and longsuffering '
  - type: note
    content: (Acts 5:41); 2 Cor. 8:2; (Heb. 10:34)
  - type: text
    content: 'with joy; '
  '12':
  - type: note
    content: (Eph. 5:20)
  - type: text
    content: 'giving thanks to the Father who has qualified us to be partakers of '
  - type: note
    content: Eph. 1:11
  - type: text
    content: 'the inheritance of the saints in the light. '
  '13':
  - type: text
    content: 'He has delivered us from '
  - type: note
    content: Eph. 6:12
  - type: text
    content: 'the power of darkness '
  - type: note
    content: 2 Pet. 1:11
  - type: text
    content: 'and conveyed '
  - type: text
    content: us
  - type: text
    content: ' into the kingdom of the Son of His love, '
  '14':
  - type: note
    content: Eph. 1:7
  - type: text
    content: in whom we have redemption through His blood, the forgiveness of sins.
  '15':
  - type: text
    content: 'He is '
  - type: note
    content: 2 Cor. 4:4; Heb. 1:3
  - type: text
    content: 'the image of the invisible God, '
  - type: note
    content: Ps. 89:27; Rev. 3:14
  - type: text
    content: 'the firstborn over all creation. '
  '16':
  - type: text
    content: 'For '
  - type: note
    content: John 1:3; Heb. 1:2, 3
  - type: text
    content: 'by Him all things were created that are in heaven and that are on earth, visible and invisible, whether thrones or '
  - type: note
    content: (Eph. 1:20, 21; Col. 2:15)
  - type: text
    content: 'dominions or principalities or powers. All things were created '
  - type: note
    content: John 1:3; Rom. 11:36; 1 Cor. 8:6; Heb. 2:10
  - type: text
    content: 'through Him and for Him. '
  '17':
  - type: note
    content: (John 17:5)
  - type: text
    content: 'And He is before all things, and in Him '
  - type: note
    content: Heb. 1:3
  - type: text
    content: 'all things consist. '
  '18':
  - type: text
    content: 'And '
  - type: note
    content: 1 Cor. 11:3; Eph. 1:22
  - type: text
    content: 'He is the head of the body, the church, who is the beginning, '
  - type: note
    content: Rev. 1:5
  - type: text
    content: the firstborn from the dead, that in all things He may have the preeminence.
  - type: heading
    content: Reconciled in Christ
  '19':
  - type: text
    content: 'For it pleased '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: Father
  - type: text
    content: ' '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: note
    content: John 1:16
  - type: text
    content: 'in Him all the fullness should dwell, '
  '2':
  - type: text
    content: 'To the saints '
  - type: note
    content: 1 Cor. 4:17
  - type: text
    content: 'and faithful brethren in Christ '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' in Colosse:'
  - type: note
    content: Gal. 1:3
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Their Faith in Christ
  '20':
  - type: text
    content: 'and '
  - type: note
    content: Rom. 5:1; Eph. 2:14
  - type: text
    content: 'by Him to reconcile '
  - type: note
    content: 2 Cor. 5:18
  - type: text
    content: 'all things to Himself, by Him, whether things on earth or things in heaven, '
  - type: note
    content: Eph. 1:10
  - type: text
    content: having made peace through the blood of His cross.
  '21':
  - type: text
    content: 'And you, '
  - type: note
    content: (Eph. 2:1)
  - type: text
    content: 'who once were alienated and enemies in your mind '
  - type: note
    content: Titus 1:15
  - type: text
    content: 'by wicked works, yet now He has '
  - type: note
    content: 2 Cor. 5:18, 19
  - type: text
    content: 'reconciled '
  '22':
  - type: note
    content: 2 Cor. 5:18; (Eph. 2:14–16)
  - type: text
    content: 'in the body of His flesh through death, '
  - type: note
    content: (Eph. 5:27); Col. 1:28
  - type: text
    content: 'to present you holy, and blameless, and above reproach in His sight— '
  '23':
  - type: text
    content: 'if indeed you continue '
  - type: note
    content: Eph. 3:17; Col. 2:7
  - type: text
    content: 'in the faith, grounded and steadfast, and are '
  - type: note
    content: (John 15:6); 1 Cor. 15:58
  - type: text
    content: 'not moved away from the hope of the gospel which you heard, '
  - type: note
    content: Mark 16:15; Acts 2:5; Rom. 10:18; Col. 1:6
  - type: text
    content: 'which was preached to every creature under heaven, '
  - type: note
    content: Acts 1:17; Eph. 3:7; Col. 1:25
  - type: text
    content: of which I, Paul, became a minister.
  - type: heading
    content: Sacrificial Service for Christ
  '24':
  - type: note
    content: 2 Cor. 7:4
  - type: text
    content: 'I now rejoice in my sufferings '
  - type: note
    content: Eph. 3:1, 13
  - type: text
    content: 'for you, and fill up in my flesh '
  - type: note
    content: (Rom. 8:17; 2 Cor. 1:5; 12:15); Phil. 2:17
  - type: text
    content: 'what is lacking in the afflictions of Christ, for '
  - type: note
    content: Eph. 1:23
  - type: text
    content: 'the sake of His body, which is the church, '
  '25':
  - type: text
    content: 'of which I became a minister according to '
  - type: note
    content: Gal. 2:7
  - type: text
    content: 'the stewardship from God which was given to me for you, to fulfill the word of God, '
  '26':
  - type: note
    content: (1 Cor. 2:7)
  - type: text
    content: 'the mystery which has been hidden from ages and from generations, '
  - type: note
    content: (2 Tim. 1:10)
  - type: text
    content: 'but now has been revealed to His saints. '
  '27':
  - type: note
    content: 2 Cor. 2:14
  - type: text
    content: 'To them God willed to make known what are '
  - type: note
    content: Rom. 9:23
  - type: text
    content: 'the riches of the glory of this mystery among the Gentiles: which is '
  - type: note
    content: (Rom. 8:10, 11)
  - type: text
    content: 'Christ in you, '
  - type: note
    content: 1 Tim. 1:1
  - type: text
    content: 'the hope of glory. '
  '28':
  - type: text
    content: 'Him we preach, '
  - type: note
    content: Acts 20:20
  - type: text
    content: 'warning every man and teaching every man in all wisdom, '
  - type: note
    content: Eph. 5:27
  - type: text
    content: 'that we may present every man perfect in Christ Jesus. '
  '29':
  - type: text
    content: 'To this '
  - type: text
    content: end
  - type: text
    content: ' I also labor, striving according to His working which works in me '
  - type: note
    content: Eph. 3:7
  - type: text
    content: mightily.
  '3':
  - type: note
    content: 1 Cor. 1:4; Eph. 1:16; Phil. 1:3
  - type: text
    content: 'We give thanks to the God and Father of our Lord Jesus Christ, praying always for you, '
  '4':
  - type: note
    content: Eph. 1:15
  - type: text
    content: 'since we heard of your faith in Christ Jesus and of '
  - type: note
    content: (Heb. 6:10)
  - type: text
    content: 'your love for all the saints; '
  '5':
  - type: text
    content: 'because of the hope '
  - type: note
    content: (1 Pet. 1:4)
  - type: text
    content: 'which is laid up for you in heaven, of which you heard before in the word of the truth of the gospel, '
  '6':
  - type: text
    content: 'which has come to you, '
  - type: note
    content: Matt. 24:14
  - type: text
    content: 'as '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: has
  - type: text
    content: ' also in all the world, and '
  - type: note
    content: John 15:16
  - type: text
    content: 'is bringing forth fruit, as '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' also among you since the day you heard and knew '
  - type: note
    content: Eph. 3:2
  - type: text
    content: 'the grace of God in truth; '
  '7':
  - type: text
    content: 'as you also learned from '
  - type: note
    content: Col. 4:12; Philem. 23
  - type: text
    content: 'Epaphras, our dear fellow servant, who is '
  - type: note
    content: 1 Cor. 4:1, 2; 2 Cor. 11:23
  - type: text
    content: 'a faithful minister of Christ on your behalf, '
  '8':
  - type: text
    content: 'who also declared to us your '
  - type: note
    content: Rom. 15:30
  - type: text
    content: love in the Spirit.
  - type: heading
    content: Preeminence of Christ
  '9':
  - type: note
    content: Eph. 1:15–17
  - type: text
    content: 'For this reason we also, since the day we heard it, do not cease to pray for you, and to ask '
  - type: note
    content: 1 Cor. 1:5
  - type: text
    content: 'that you may be filled with '
  - type: note
    content: (Rom. 12:2); Eph. 5:17
  - type: text
    content: 'the knowledge of His will '
  - type: note
    content: Eph. 1:8
  - type: text
    content: 'in all wisdom and spiritual understanding; '
