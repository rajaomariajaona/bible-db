verses:
  '1':
  - type: heading
    content: The Covenant at Shechem
  - type: text
    content: 'Then Joshua gathered all the tribes of Israel to '
  - type: note
    content: Gen. 35:4
  - type: text
    content: 'Shechem and '
  - type: note
    content: Josh. 23:2
  - type: text
    content: 'called for the elders of Israel, for their heads, for their judges, and for their officers; and they '
  - type: note
    content: 1 Sam. 10:19
  - type: text
    content: 'presented themselves before God. '
  '10':
  - type: note
    content: Deut. 23:5
  - type: text
    content: 'But I would not listen to Balaam; '
  - type: note
    content: Num. 23:11, 20; 24:10
  - type: text
    content: 'therefore he continued to bless you. So I delivered you out of his hand. '
  '11':
  - type: text
    content: 'Then '
  - type: note
    content: Josh. 3:14, 17
  - type: text
    content: 'you went over the Jordan and came to Jericho. And '
  - type: note
    content: Josh. 6:1; 10:1
  - type: text
    content: the men of Jericho fought against you—
  - type: text
    content: also
  - type: text
    content: ' the Amorites, the Perizzites, the Canaanites, the Hittites, the Girgashites, the Hivites, and the Jebusites. But I delivered them into your hand. '
  '12':
  - type: note
    content: Ex. 23:28; Deut. 7:20
  - type: text
    content: 'I sent the hornet before you which drove them out from before you, '
  - type: text
    content: also
  - type: text
    content: ' the two kings of the Amorites, '
  - type: text
    content: but
  - type: text
    content: ' '
  - type: note
    content: Ps. 44:3
  - type: text
    content: 'not with your sword or with your bow. '
  '13':
  - type: text
    content: 'I have given you a land for which you did not labor, and '
  - type: note
    content: Deut. 6:10, 11
  - type: text
    content: cities which you did not build, and you dwell in them; you eat of the vineyards and olive groves which you did not plant.’
  '14':
  - type: note
    content: Deut. 10:12, 13; 1 Sam. 12:24
  - type: text
    content: '“Now therefore, fear the '
  - type: heading
    content: Lord
  - type: text
    content: ', serve Him in '
  - type: note
    content: 2 Cor. 1:12
  - type: text
    content: 'sincerity and in truth, and '
  - type: note
    content: Josh. 24:2, 23; Ezek. 20:18
  - type: text
    content: 'put away the gods which your fathers served on the other side of the River and '
  - type: note
    content: Ezek. 20:7, 8
  - type: text
    content: 'in Egypt. Serve the '
  - type: heading
    content: Lord
  - type: text
    content: '! '
  '15':
  - type: text
    content: 'And if it seems evil to you to serve the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ruth 1:15; 1 Kin. 18:21
  - type: text
    content: 'choose for yourselves this day whom you will serve, whether '
  - type: note
    content: Josh. 24:2; Ezek. 20:39
  - type: text
    content: 'the gods which your fathers served that '
  - type: text
    content: were
  - type: text
    content: ' on the other side of the River, or '
  - type: note
    content: Ex. 23:24, 32
  - type: text
    content: 'the gods of the Amorites, in whose land you dwell. '
  - type: note
    content: Gen. 18:19; Ps. 101:2; (1 Tim. 3:4, 5)
  - type: text
    content: 'But as for me and my house, we will serve the '
  - type: heading
    content: Lord
  - type: text
    content: .”
  '16':
  - type: text
    content: 'So the people answered and said: “Far be it from us that we should forsake the '
  - type: heading
    content: Lord
  - type: text
    content: ' to serve other gods; '
  '17':
  - type: text
    content: 'for the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God '
  - type: text
    content: is
  - type: text
    content: ' He who brought us and our fathers up out of the land of Egypt, from the house of bondage, who did those great signs in our sight, and preserved us in all the way that we went and among all the people through whom we passed. '
  '18':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' drove out from before us all the people, including the Amorites who dwelt in the land. '
  - type: note
    content: Ps. 116:16
  - type: text
    content: 'We also will serve the '
  - type: heading
    content: Lord
  - type: text
    content: ', for He '
  - type: text
    content: is
  - type: text
    content: ' our God.”'
  '19':
  - type: text
    content: 'But Joshua said to the people, '
  - type: note
    content: Matt. 6:24
  - type: text
    content: '“You cannot serve the '
  - type: heading
    content: Lord
  - type: text
    content: ', for He '
  - type: text
    content: is
  - type: text
    content: ' a '
  - type: note
    content: Lev. 11:44, 45; 1 Sam. 6:20
  - type: text
    content: 'holy God. He '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: Ex. 20:5
  - type: text
    content: 'a jealous God; '
  - type: note
    content: Ex. 23:21
  - type: text
    content: 'He will not forgive your transgressions nor your sins. '
  '2':
  - type: text
    content: 'And Joshua said to all the people, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel: '
  - type: note
    content: Gen. 11:7–32
  - type: text
    content: '‘Your fathers, '
  - type: text
    content: including
  - type: text
    content: ' Terah, the father of Abraham and the father of Nahor, dwelt on the other side of the River in old times; and '
  - type: note
    content: Josh. 24:14
  - type: text
    content: 'they served other gods. '
  '20':
  - type: note
    content: 1 Chr. 28:9; Ezra 8:22; Is. 1:28; 63:10; 65:11, 12; Jer. 17:13
  - type: text
    content: 'If you forsake the '
  - type: heading
    content: Lord
  - type: text
    content: ' and serve foreign gods, '
  - type: note
    content: Deut. 4:24–26; Josh. 23:15
  - type: text
    content: then He will turn and do you harm and consume you, after He has done you good.”
  '21':
  - type: text
    content: 'And the people said to Joshua, “No, but we will serve the '
  - type: heading
    content: Lord
  - type: text
    content: '!”'
  '22':
  - type: text
    content: 'So Joshua said to the people, “You '
  - type: text
    content: are
  - type: text
    content: ' witnesses against yourselves that '
  - type: note
    content: Ps. 119:173
  - type: text
    content: 'you have chosen the '
  - type: heading
    content: Lord
  - type: text
    content: ' for yourselves, to serve Him.”'
  - type: text
    content: And they said, “
  - type: text
    content: We
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' witnesses!”'
  '23':
  - type: text
    content: '“Now therefore,” '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: said,
  - type: text
    content: ' '
  - type: note
    content: Gen. 35:2; Josh. 24:14; Judg. 10:15, 16; 1 Sam. 7:3
  - type: text
    content: '“put away the foreign gods which '
  - type: text
    content: are
  - type: text
    content: ' among you, and '
  - type: note
    content: 1 Kin. 8:57, 58; Ps. 119:36; 141:4
  - type: text
    content: 'incline your heart to the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel.”'
  '24':
  - type: text
    content: 'And the people '
  - type: note
    content: Ex. 19:8; 24:3, 7; Deut. 5:24–27
  - type: text
    content: 'said to Joshua, “The '
  - type: heading
    content: Lord
  - type: text
    content: ' our God we will serve, and His voice we will obey!”'
  '25':
  - type: text
    content: 'So Joshua '
  - type: note
    content: Ex. 15:25
  - type: text
    content: 'made a covenant with the people that day, and made for them a statute and an ordinance '
  - type: note
    content: Josh. 24:1
  - type: text
    content: in Shechem.
  '26':
  - type: text
    content: 'Then Joshua '
  - type: note
    content: Deut. 31:24
  - type: text
    content: 'wrote these words in the Book of the Law of God. And he took '
  - type: note
    content: Judg. 9:6
  - type: text
    content: 'a large stone, and '
  - type: note
    content: Gen. 28:18
  - type: text
    content: 'set it up there '
  - type: note
    content: Gen. 35:4
  - type: text
    content: 'under the oak that '
  - type: text
    content: was
  - type: text
    content: ' by the sanctuary of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'And Joshua said to all the people, “Behold, this stone shall be '
  - type: note
    content: Gen. 31:48
  - type: text
    content: 'a witness to us, for '
  - type: note
    content: Deut. 32:1
  - type: text
    content: 'it has heard all the words of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He spoke to us. It shall therefore be a witness to you, lest you deny your God.” '
  '28':
  - type: text
    content: 'So '
  - type: note
    content: Judg. 2:6, 7
  - type: text
    content: Joshua let the people depart, each to his own inheritance.
  - type: heading
    content: Death of Joshua and Eleazar
  '29':
  - type: note
    content: Judg. 2:8
  - type: text
    content: 'Now it came to pass after these things that Joshua the son of Nun, the servant of the '
  - type: heading
    content: Lord
  - type: text
    content: ', died, '
  - type: text
    content: being
  - type: text
    content: ' one hundred and ten years old. '
  '3':
  - type: note
    content: Gen. 12:1; Acts 7:2, 3
  - type: text
    content: 'Then I took your father Abraham from the other side of the River, led him throughout all the land of Canaan, and multiplied his descendants and '
  - type: note
    content: Gen. 21:1–8; (Ps. 127:3)
  - type: text
    content: 'gave him Isaac. '
  '30':
  - type: text
    content: 'And they buried him within the border of his inheritance at '
  - type: note
    content: Josh. 19:50; Judg. 2:9
  - type: text
    content: 'Timnath Serah, which '
  - type: text
    content: is
  - type: text
    content: ' in the mountains of Ephraim, on the north side of Mount Gaash.'
  '31':
  - type: note
    content: Judg. 2:7
  - type: text
    content: 'Israel served the '
  - type: heading
    content: Lord
  - type: text
    content: ' all the days of Joshua, and all the days of the elders who outlived Joshua, who had '
  - type: note
    content: Deut. 11:2
  - type: text
    content: 'known all the works of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He had done for Israel.'
  '32':
  - type: note
    content: Gen. 50:25; Ex. 13:19; Heb. 11:22
  - type: text
    content: 'The bones of Joseph, which the children of Israel had brought up out of Egypt, they buried at Shechem, in the plot of ground '
  - type: note
    content: Gen. 33:19; John 4:5
  - type: text
    content: which Jacob had bought from the sons of Hamor the father of Shechem for one hundred pieces of silver, and which had become an inheritance of the children of Joseph.
  '33':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 28:1; Num. 20:28; Josh. 14:1
  - type: text
    content: 'Eleazar the son of Aaron died. They buried him in a hill '
  - type: text
    content: belonging
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: note
    content: Ex. 6:25
  - type: text
    content: Phinehas his son, which was given to him in the mountains of Ephraim.
  '4':
  - type: text
    content: 'To Isaac I gave '
  - type: note
    content: Gen. 25:24–26
  - type: text
    content: 'Jacob and Esau. To '
  - type: note
    content: Gen. 36:8; Deut. 2:5
  - type: text
    content: 'Esau I gave the mountains of Seir to possess, '
  - type: note
    content: Gen. 46:1, 3, 6
  - type: text
    content: 'but Jacob and his children went down to Egypt. '
  '5':
  - type: note
    content: Ex. 3:10
  - type: text
    content: 'Also I sent Moses and Aaron, and '
  - type: note
    content: Ex. 7—10
  - type: text
    content: I plagued Egypt, according to what I did among them. Afterward I brought you out.
  '6':
  - type: text
    content: '‘Then I '
  - type: note
    content: Ex. 12:37, 51; 14:2–31
  - type: text
    content: 'brought your fathers out of Egypt, and you came to the sea; and the Egyptians pursued your fathers with chariots and horsemen to the Red Sea. '
  '7':
  - type: text
    content: 'So they cried out to the '
  - type: heading
    content: Lord
  - type: text
    content: '; and He put '
  - type: note
    content: Ex. 14:20
  - type: text
    content: 'darkness between you and the Egyptians, brought the sea upon them, and covered them. And '
  - type: note
    content: Deut. 4:34
  - type: text
    content: 'your eyes saw what I did in Egypt. Then you dwelt in the wilderness '
  - type: note
    content: Josh. 5:6
  - type: text
    content: 'a long time. '
  '8':
  - type: text
    content: 'And I brought you into the land of the Amorites, who dwelt on the other side of the Jordan, '
  - type: note
    content: Num. 21:21–35
  - type: text
    content: 'and they fought with you. But I gave them into your hand, that you might possess their land, and I destroyed them from before you. '
  '9':
  - type: text
    content: 'Then '
  - type: note
    content: Judg. 11:25
  - type: text
    content: 'Balak the son of Zippor, king of Moab, arose to make war against Israel, and '
  - type: note
    content: Num. 22:2–14
  - type: text
    content: 'sent and called Balaam the son of Beor to curse you. '
