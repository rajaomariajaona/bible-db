document_id: 2CH.21,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoram Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 22:50
      marker-yv: yv-n
    - type: text
      text: 'Jehoshaphat rested with his fathers, and was buried with his fathers in the City of David. Then Jehoram his son reigned in his place. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus Edom has been in revolt against Judah’s authority to this day. At that time Libnah revolted against his rule, because he had forsaken the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of his fathers. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover he made high places in the mountains of Judah, and caused the inhabitants of Jerusalem to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Lev. 20:5)
      marker-yv: yv-n
    - type: text
      text: commit harlotry, and led Judah astray.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And a letter came to him from Elijah the prophet, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of your father David:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because you have not walked in the ways of Jehoshaphat your father, or in the ways of Asa king of Judah, '
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but have walked in the way of the kings of Israel, and have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 21:11
      marker-yv: yv-n
    - type: text
      text: 'made Judah and the inhabitants of Jerusalem to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 34:15); Deut. 31:16
      marker-yv: yv-n
    - type: text
      text: 'play the harlot like the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 16:31–33; 2 Kin. 9:22
      marker-yv: yv-n
    - type: text
      text: 'harlotry of the house of Ahab, and also have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 2:32; 2 Chr. 21:4
      marker-yv: yv-n
    - type: text
      text: 'killed your brothers, those of your father’s household, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' better than yourself, '
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'behold, the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will strike your people with a serious affliction—your children, your wives, and all your possessions; '
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: become
    - type: text
      text: ' very sick with a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 21:18, 19
      marker-yv: yv-n
    - type: text
      text: disease of your intestines, until your intestines come out by reason of the sickness, day by day.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 33:11; (Jer. 51:11)
      marker-yv: yv-n
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:14, 23
      marker-yv: yv-n
    - type: text
      text: 'stirred up against Jehoram the spirit of the Philistines and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 17:11
      marker-yv: yv-n
    - type: text
      text: 'Arabians who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' near the Ethiopians. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they came up into Judah and invaded it, and carried away all the possessions that were found in the king’s house, and also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 24:7
      marker-yv: yv-n
    - type: text
      text: his sons and his wives, so that there was not a son left to him except Jehoahaz, the youngest of his sons.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After all this the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' struck him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 13:20; 21:15; Acts 12:23
      marker-yv: yv-n
    - type: text
      text: 'in his intestines with an incurable disease. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then it happened in the course of time, after the end of two years, that his intestines came out because of his sickness; so he died in severe pain. And his people made no burning for him, like '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 16:14
      marker-yv: yv-n
    - type: text
      text: the burning for his fathers.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He had brothers, the sons of Jehoshaphat: Azariah, Jehiel, Zechariah, Azaryahu, Michael, and Shephatiah; all these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Jehoshaphat king of Israel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was thirty-two years old when he became king. He reigned in Jerusalem eight years and, to no one’s sorrow, departed. However they buried him in the City of David, but not in the tombs of the kings.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their father gave them great gifts of silver and gold and precious things, with fortified cities in Judah; but he gave the kingdom to Jehoram, because he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the firstborn.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when Jehoram was established over the kingdom of his father, he strengthened himself and killed all his brothers with the sword, and also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: others
    - type: text
      text: ' of the princes of Israel.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 8:17–22
      marker-yv: yv-n
    - type: text
      text: 'Jehoram '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' thirty-two years old when he became king, and he reigned eight years in Jerusalem. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he walked in the way of the kings of Israel, just as the house of Ahab had done, for he had the daughter of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 18:1
      marker-yv: yv-n
    - type: text
      text: 'Ahab as a wife; and he did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' would not destroy the house of David, because of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:8–17
      marker-yv: yv-n
    - type: text
      text: 'covenant that He had made with David, and since He had promised to give a lamp to him and to his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:36; 2 Kin. 8:19; Ps. 132:11
      marker-yv: yv-n
    - type: text
      text: sons forever.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 8:20; 14:7, 10; 2 Chr. 25:14, 19
      marker-yv: yv-n
    - type: text
      text: 'In his days Edom revolted against Judah’s authority, and made a king over themselves. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jehoram went out with his officers, and all his chariots with him. And he rose by night and attacked the Edomites who had surrounded him and the captains of the chariots. '
