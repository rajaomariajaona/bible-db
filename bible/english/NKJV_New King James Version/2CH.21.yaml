document_id: 2CH.21,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoram Reigns in Judah
  - type: text
    content: 'And '
  - type: note
    content: 1 Kin. 22:50
  - type: text
    content: 'Jehoshaphat rested with his fathers, and was buried with his fathers in the City of David. Then Jehoram his son reigned in his place. '
  '10':
  - type: text
    content: 'Thus Edom has been in revolt against Judah’s authority to this day. At that time Libnah revolted against his rule, because he had forsaken the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of his fathers. '
  '11':
  - type: text
    content: 'Moreover he made high places in the mountains of Judah, and caused the inhabitants of Jerusalem to '
  - type: note
    content: (Lev. 20:5)
  - type: text
    content: commit harlotry, and led Judah astray.
  '12':
  - type: text
    content: And a letter came to him from Elijah the prophet, saying,
  - type: text
    content: 'Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of your father David:'
  - type: text
    content: 'Because you have not walked in the ways of Jehoshaphat your father, or in the ways of Asa king of Judah, '
  '13':
  - type: text
    content: 'but have walked in the way of the kings of Israel, and have '
  - type: note
    content: 2 Chr. 21:11
  - type: text
    content: 'made Judah and the inhabitants of Jerusalem to '
  - type: note
    content: (Ex. 34:15); Deut. 31:16
  - type: text
    content: 'play the harlot like the '
  - type: note
    content: 1 Kin. 16:31–33; 2 Kin. 9:22
  - type: text
    content: 'harlotry of the house of Ahab, and also have '
  - type: note
    content: 1 Kin. 2:32; 2 Chr. 21:4
  - type: text
    content: 'killed your brothers, those of your father’s household, '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' better than yourself, '
  '14':
  - type: text
    content: 'behold, the '
  - type: heading
    content: Lord
  - type: text
    content: ' will strike your people with a serious affliction—your children, your wives, and all your possessions; '
  '15':
  - type: text
    content: 'and you '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: become
  - type: text
    content: ' very sick with a '
  - type: note
    content: 2 Chr. 21:18, 19
  - type: text
    content: disease of your intestines, until your intestines come out by reason of the sickness, day by day.
  '16':
  - type: text
    content: 'Moreover the '
  - type: note
    content: 2 Chr. 33:11; (Jer. 51:11)
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 1 Kin. 11:14, 23
  - type: text
    content: 'stirred up against Jehoram the spirit of the Philistines and the '
  - type: note
    content: 2 Chr. 17:11
  - type: text
    content: 'Arabians who '
  - type: text
    content: were
  - type: text
    content: ' near the Ethiopians. '
  '17':
  - type: text
    content: 'And they came up into Judah and invaded it, and carried away all the possessions that were found in the king’s house, and also '
  - type: note
    content: 2 Chr. 24:7
  - type: text
    content: his sons and his wives, so that there was not a son left to him except Jehoahaz, the youngest of his sons.
  '18':
  - type: text
    content: 'After all this the '
  - type: heading
    content: Lord
  - type: text
    content: ' struck him '
  - type: note
    content: 2 Chr. 13:20; 21:15; Acts 12:23
  - type: text
    content: 'in his intestines with an incurable disease. '
  '19':
  - type: text
    content: 'Then it happened in the course of time, after the end of two years, that his intestines came out because of his sickness; so he died in severe pain. And his people made no burning for him, like '
  - type: note
    content: 2 Chr. 16:14
  - type: text
    content: the burning for his fathers.
  '2':
  - type: text
    content: 'He had brothers, the sons of Jehoshaphat: Azariah, Jehiel, Zechariah, Azaryahu, Michael, and Shephatiah; all these '
  - type: text
    content: were
  - type: text
    content: ' the sons of Jehoshaphat king of Israel. '
  '20':
  - type: text
    content: He was thirty-two years old when he became king. He reigned in Jerusalem eight years and, to no one’s sorrow, departed. However they buried him in the City of David, but not in the tombs of the kings.
  '3':
  - type: text
    content: 'Their father gave them great gifts of silver and gold and precious things, with fortified cities in Judah; but he gave the kingdom to Jehoram, because he '
  - type: text
    content: was
  - type: text
    content: ' the firstborn.'
  '4':
  - type: text
    content: 'Now when Jehoram was established over the kingdom of his father, he strengthened himself and killed all his brothers with the sword, and also '
  - type: text
    content: others
  - type: text
    content: ' of the princes of Israel.'
  '5':
  - type: note
    content: 2 Kin. 8:17–22
  - type: text
    content: 'Jehoram '
  - type: text
    content: was
  - type: text
    content: ' thirty-two years old when he became king, and he reigned eight years in Jerusalem. '
  '6':
  - type: text
    content: 'And he walked in the way of the kings of Israel, just as the house of Ahab had done, for he had the daughter of '
  - type: note
    content: 2 Chr. 18:1
  - type: text
    content: 'Ahab as a wife; and he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Yet the '
  - type: heading
    content: Lord
  - type: text
    content: ' would not destroy the house of David, because of the '
  - type: note
    content: 2 Sam. 7:8–17
  - type: text
    content: 'covenant that He had made with David, and since He had promised to give a lamp to him and to his '
  - type: note
    content: 1 Kin. 11:36; 2 Kin. 8:19; Ps. 132:11
  - type: text
    content: sons forever.
  '8':
  - type: note
    content: 2 Kin. 8:20; 14:7, 10; 2 Chr. 25:14, 19
  - type: text
    content: 'In his days Edom revolted against Judah’s authority, and made a king over themselves. '
  '9':
  - type: text
    content: 'So Jehoram went out with his officers, and all his chariots with him. And he rose by night and attacked the Edomites who had surrounded him and the captains of the chariots. '
