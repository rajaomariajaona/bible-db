document_id: ECC.9,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'For I considered all this in my heart, so that I could declare it all: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 33:3; Job 12:10; Eccl. 8:14
      marker-yv: yv-n
    - type: text
      text: 'that the righteous and the wise and their works '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in the hand of God. People know neither love nor hatred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by
    - type: text
      text: ' anything '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: see
    - type: text
      text: ' before them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Col. 3:17)
      marker-yv: yv-n
    - type: text
      text: 'Whatever your hand finds to do, do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' with your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:11; Col. 3:23
      marker-yv: yv-n
    - type: text
      text: 'might; for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no work or device or knowledge or wisdom in the grave where you are going.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I returned '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 9:23; Amos 2:14, 15
      marker-yv: yv-n
    - type: text
      text: and saw under the sun that—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The race '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not to the swift,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor the battle to the strong,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor bread to the wise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor riches to men of understanding,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor favor to men of skill;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But time and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 6:9
      marker-yv: yv-n
    - type: text
      text: chance happen to them all.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 8:7
      marker-yv: yv-n
    - type: text
      text: 'man also does not know his time:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like fish taken in a cruel net,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like birds caught in a snare,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So the sons of men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 29:6; Luke 12:20, 39; 17:26; 1 Thess. 5:3
      marker-yv: yv-n
    - type: text
      text: snared in an evil time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When it falls suddenly upon them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom Superior to Folly
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'This wisdom I have also seen under the sun, and it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seemed
    - type: text
      text: ' great to me: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 20:16–22
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: There
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' a little city with few men in it; and a great king came against it, besieged it, and built great snares around it. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Now there was found in it a poor wise man, and he by his wisdom delivered the city. Yet no one remembered that same poor man.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then I said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' better than '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 7:12, 19
      marker-yv: yv-n
    - type: text
      text: strength.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nevertheless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 6:2, 3
      marker-yv: yv-n
    - type: text
      text: 'the poor man’s wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' despised,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his words are not heard.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Words of the wise, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spoken
    - type: text
      text: ' quietly, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: should
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' heard'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rather than the shout of a ruler of fools.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' better than weapons of war;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 7:1–26; 2 Kin. 21:2–17
      marker-yv: yv-n
    - type: text
      text: one sinner destroys much good.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 3:17–19; Job 21:7; Ps. 73:3, 12, 13; Mal. 3:15
      marker-yv: yv-n
    - type: text
      text: 'All things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' alike to all:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'One event '
    - type: usfm
      marker: it
      children:
      - type: text
        text: happens
    - type: text
      text: ' to the righteous and the wicked;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To the good, the clean, and the unclean;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To him who sacrifices and him who does not sacrifice.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As is the good, so '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the sinner;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He who takes an oath as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' who fears an oath.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' an evil in all that is done under the sun: that one thing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: happens
    - type: text
      text: ' to all. Truly the hearts of the sons of men are full of evil; madness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in their hearts while they live, and after that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: go
    - type: text
      text: ' to the dead. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But for him who is joined to all the living there is hope, for a living dog is better than a dead lion.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For the living know that they will die;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 14:21; Is. 63:16
      marker-yv: yv-n
    - type: text
      text: the dead know nothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they have no more reward,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 7:8–10; Eccl. 1:11; 2:16; 8:10; Is. 26:14
      marker-yv: yv-n
    - type: text
      text: the memory of them is forgotten.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Also their love, their hatred, and their envy have now perished;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nevermore will they have a share
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In anything done under the sun.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Go, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 8:15
      marker-yv: yv-n
    - type: text
      text: eat your bread with joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And drink your wine with a merry heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For God has already accepted your works.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Let your garments always be white,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let your head lack no oil.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Live joyfully with the wife whom you love all the days of your vain life which He has given you under the sun, all your days of vanity; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 2:10
      marker-yv: yv-n
    - type: text
      text: 'for that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' your portion in life, and in the labor which you perform under the sun.'
