verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Other Half-Tribe of Manasseh (West)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There was also a lot for the tribe of Manasseh, for he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:51; 46:20; 48:18
      marker-yv: yv-n
    - type: text
      text: 'firstborn of Joseph: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: namely
    - type: text
      text: ' for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 50:23; Judg. 5:14
      marker-yv: yv-n
    - type: text
      text: 'Machir the firstborn of Manasseh, the father of Gilead, because he was a man of war; therefore he was given '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 3:15
      marker-yv: yv-n
    - type: text
      text: 'Gilead and Bashan. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Southward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Ephraim’s, northward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Manasseh’s, and the sea was its border. Manasseh’s territory was adjoining Asher on the north and Issachar on the east. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in Issachar and in Asher, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 7:29
      marker-yv: yv-n
    - type: text
      text: 'Manasseh had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:27; 1 Sam. 31:10; 1 Kin. 4:12
      marker-yv: yv-n
    - type: text
      text: 'Beth Shean and its towns, Ibleam and its towns, the inhabitants of Dor and its towns, the inhabitants of En Dor and its towns, the inhabitants of Taanach and its towns, and the inhabitants of Megiddo and its towns—three hilly regions. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:19, 27, 28
      marker-yv: yv-n
    - type: text
      text: 'the children of Manasseh could not drive out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: inhabitants
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' those cities, but the Canaanites were determined to dwell in that land. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it happened, when the children of Israel grew strong, that they put the Canaanites to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 16:10
      marker-yv: yv-n
    - type: text
      text: forced labor, but did not utterly drive them out.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: More Land for Ephraim and Manasseh
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 16:4
      marker-yv: yv-n
    - type: text
      text: 'Then the children of Joseph spoke to Joshua, saying, “Why have you given us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 48:22
      marker-yv: yv-n
    - type: text
      text: 'one lot and one share to inherit, since we '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 48:19; Num. 26:34, 37
      marker-yv: yv-n
    - type: text
      text: 'a great people, inasmuch as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has blessed us until now?”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua answered them, “If you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a great people, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: then
    - type: text
      text: ' go up to the forest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: country
    - type: text
      text: ' and clear a place for yourself there in the land of the Perizzites and the giants, since the mountains of Ephraim are too confined for you.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the children of Joseph said, “The mountain country is not enough for us; and all the Canaanites who dwell in the land of the valley have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 17:18; Judg. 1:19; 4:3
      marker-yv: yv-n
    - type: text
      text: 'chariots of iron, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: both
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: those
    - type: text
      text: ' who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' of Beth Shean and its towns and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: those
    - type: text
      text: ' who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:18; 1 Kin. 4:12
      marker-yv: yv-n
    - type: text
      text: of the Valley of Jezreel.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua spoke to the house of Joseph—to Ephraim and Manasseh—saying, “You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a great people and have great power; you shall not have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' one lot, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but the mountain country shall be yours. Although it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' wooded, you shall cut it down, and its farthest extent shall be yours; for you shall drive out the Canaanites, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 20:1
      marker-yv: yv-n
    - type: text
      text: 'though they have iron chariots '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are strong.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lot
    - type: text
      text: ' for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 26:29–33
      marker-yv: yv-n
    - type: text
      text: 'the rest of the children of Manasseh according to their families: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 7:18
      marker-yv: yv-n
    - type: text
      text: 'for the children of Abiezer, the children of Helek, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 26:31
      marker-yv: yv-n
    - type: text
      text: 'the children of Asriel, the children of Shechem, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 26:32
      marker-yv: yv-n
    - type: text
      text: 'the children of Hepher, and the children of Shemida; these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the male children of Manasseh the son of Joseph according to their families.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 26:33; 27:1; 36:2
      marker-yv: yv-n
    - type: text
      text: 'Zelophehad the son of Hepher, the son of Gilead, the son of Machir, the son of Manasseh, had no sons, but only daughters. And these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the names of his daughters: Mahlah, Noah, Hoglah, Milcah, and Tirzah. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they came near before '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 14:1
      marker-yv: yv-n
    - type: text
      text: 'Eleazar the priest, before Joshua the son of Nun, and before the rulers, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 27:2–11
      marker-yv: yv-n
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses to give us an inheritance among our brothers.” Therefore, according to the commandment of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', he gave them an inheritance among their father’s brothers. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ten shares fell to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 22:7
      marker-yv: yv-n
    - type: text
      text: 'Manasseh, besides the land of Gilead and Bashan, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' on the other side of the Jordan, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: because the daughters of Manasseh received an inheritance among his sons; and the rest of Manasseh’s sons had the land of Gilead.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the territory of Manasseh was from Asher to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 16:6
      marker-yv: yv-n
    - type: text
      text: 'Michmethath, that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lies
    - type: text
      text: ' east of Shechem; and the border went along south to the inhabitants of En Tappuah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manasseh had the land of Tappuah, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 16:8
      marker-yv: yv-n
    - type: text
      text: 'Tappuah on the border of Manasseh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belonged
    - type: text
      text: ' to the children of Ephraim. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the border descended to the Brook Kanah, southward to the brook. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 16:9
      marker-yv: yv-n
    - type: text
      text: 'These cities of Ephraim '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' among the cities of Manasseh. The border of Manasseh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' on the north side of the brook; and it ended at the sea.'
