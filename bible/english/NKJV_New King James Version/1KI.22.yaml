document_id: 1KI.22,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Micaiah Warns Ahab
  - type: text
    content: 'Now three years passed without war between Syria and Israel. '
  '10':
  - type: text
    content: 'The king of Israel and Jehoshaphat the king of Judah, having put on '
  - type: text
    content: their
  - type: text
    content: ' robes, sat each on his throne, at a threshing floor at the entrance of the gate of Samaria; and all the prophets prophesied before them. '
  '11':
  - type: text
    content: 'Now Zedekiah the son of Chenaanah had made '
  - type: note
    content: Zech. 1:18–21
  - type: text
    content: 'horns of iron for himself; and he said, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘With these you shall '
  - type: note
    content: Deut. 33:17
  - type: text
    content: 'gore the Syrians until they are destroyed.’ ” '
  '12':
  - type: text
    content: 'And all the prophets prophesied so, saying, “Go up to Ramoth Gilead and prosper, for the '
  - type: heading
    content: Lord
  - type: text
    content: ' will deliver '
  - type: text
    content: it
  - type: text
    content: ' into the king’s hand.”'
  '13':
  - type: text
    content: Then the messenger who had gone to call Micaiah spoke to him, saying, “Now listen, the words of the prophets with one accord encourage the king. Please, let your word be like the word of one of them, and speak encouragement.”
  '14':
  - type: text
    content: And Micaiah said, “
  - type: text
    content: As
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' lives, '
  - type: note
    content: Num. 22:38; 24:13
  - type: text
    content: 'whatever the '
  - type: heading
    content: Lord
  - type: text
    content: ' says to me, that I will speak.”'
  '15':
  - type: text
    content: Then he came to the king; and the king said to him, “Micaiah, shall we go to war against Ramoth Gilead, or shall we refrain?”
  - type: text
    content: 'And he answered him, “Go and prosper, for the '
  - type: heading
    content: Lord
  - type: text
    content: ' will deliver '
  - type: text
    content: it
  - type: text
    content: ' into the hand of the king!”'
  '16':
  - type: text
    content: 'So the king said to him, “How many times shall I make you swear that you tell me nothing but the truth in the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ?”
  '17':
  - type: text
    content: 'Then he said, “I saw all Israel '
  - type: note
    content: Num. 27:17; 1 Kin. 22:34–36; 2 Chr. 18:16; Matt. 9:36; Mark 6:34
  - type: text
    content: 'scattered on the mountains, as sheep that have no shepherd. And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said, ‘These have no master. Let each return to his house in peace.’ ”'
  '18':
  - type: text
    content: And the king of Israel said to Jehoshaphat, “Did I not tell you he would not prophesy good concerning me, but evil?”
  '19':
  - type: text
    content: 'Then '
  - type: text
    content: Micaiah
  - type: text
    content: ' said, “Therefore hear the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: Is. 6:1; Ezek. 1:26–28; Dan. 7:9
  - type: text
    content: 'I saw the '
  - type: heading
    content: Lord
  - type: text
    content: ' sitting on His throne, '
  - type: note
    content: Job 1:6; 2:1; Ps. 103:20; Dan. 7:10; Zech. 1:10; (Matt. 18:10; Heb. 1:7, 14)
  - type: text
    content: 'and all the host of heaven standing by, on His right hand and on His left. '
  '2':
  - type: text
    content: 'Then it came to pass, in the third year, that '
  - type: note
    content: 1 Kin. 15:24; 2 Chr. 18:2
  - type: text
    content: 'Jehoshaphat the king of Judah went down to '
  - type: text
    content: visit
  - type: text
    content: ' the king of Israel.'
  '20':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said, ‘Who will persuade Ahab to go up, that he may fall at Ramoth Gilead?’ So one spoke in this manner, and another spoke in that manner. '
  '21':
  - type: text
    content: 'Then a spirit came forward and stood before the '
  - type: heading
    content: Lord
  - type: text
    content: ', and said, ‘I will persuade him.’ '
  '22':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' said to him, ‘In what way?’ So he said, ‘I will go out and be a lying spirit in the mouth of all his prophets.’ And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said, '
  - type: note
    content: Judg. 9:23; 1 Sam. 16:14; 18:10; 19:9; Job 12:16; (Ezek. 14:9; 2 Thess. 2:11)
  - type: text
    content: '‘You shall persuade '
  - type: text
    content: him,
  - type: text
    content: ' and also prevail. Go out and do so.’ '
  '23':
  - type: note
    content: (Ezek. 14:9)
  - type: text
    content: 'Therefore look! The '
  - type: heading
    content: Lord
  - type: text
    content: ' has put a lying spirit in the mouth of all these prophets of yours, and the '
  - type: heading
    content: Lord
  - type: text
    content: ' has declared disaster against you.”'
  '24':
  - type: text
    content: 'Now Zedekiah the son of Chenaanah went near and '
  - type: note
    content: Jer. 20:2
  - type: text
    content: 'struck Micaiah on the cheek, and said, '
  - type: note
    content: 2 Chr. 18:23
  - type: text
    content: '“Which way did the spirit from the '
  - type: heading
    content: Lord
  - type: text
    content: ' go from me to speak to you?”'
  '25':
  - type: text
    content: 'And Micaiah said, “Indeed, you shall see on that day when you go into an '
  - type: note
    content: 1 Kin. 20:30
  - type: text
    content: inner chamber to hide!”
  '26':
  - type: text
    content: 'So the king of Israel said, “Take Micaiah, and return him to Amon the governor of the city and to Joash the king’s son; '
  '27':
  - type: text
    content: 'and say, ‘Thus says the king: “Put this '
  - type: text
    content: fellow
  - type: text
    content: ' in '
  - type: note
    content: 2 Chr. 16:10; 18:25–27
  - type: text
    content: prison, and feed him with bread of affliction and water of affliction, until I come in peace.” ’ ”
  '28':
  - type: text
    content: 'But Micaiah said, “If you ever return in peace, '
  - type: note
    content: Num. 16:29; Deut. 18:20–22
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' has not spoken by me.” And he said, “Take heed, all you people!”'
  - type: heading
    content: Ahab Dies in Battle
  '29':
  - type: text
    content: 'So the king of Israel and Jehoshaphat the king of Judah went up to Ramoth Gilead. '
  '3':
  - type: text
    content: 'And the king of Israel said to his servants, “Do you know that '
  - type: note
    content: Deut. 4:43; Josh. 21:38; 1 Kin. 4:13
  - type: text
    content: 'Ramoth in Gilead '
  - type: text
    content: is
  - type: text
    content: ' ours, but we hesitate to take it out of the hand of the king of Syria?” '
  '30':
  - type: text
    content: 'And the king of Israel said to Jehoshaphat, “I will disguise myself and go into battle; but you put on your robes.” So the king of Israel '
  - type: note
    content: 2 Chr. 35:22
  - type: text
    content: disguised himself and went into battle.
  '31':
  - type: text
    content: 'Now the '
  - type: note
    content: 1 Kin. 20:1
  - type: text
    content: 'king of Syria had commanded the thirty-two '
  - type: note
    content: 1 Kin. 20:24; 2 Chr. 18:30
  - type: text
    content: 'captains of his chariots, saying, “Fight with no one small or great, but only with the king of Israel.” '
  '32':
  - type: text
    content: 'So it was, when the captains of the chariots saw Jehoshaphat, that they said, “Surely it '
  - type: text
    content: is
  - type: text
    content: ' the king of Israel!” Therefore they turned aside to fight against him, and Jehoshaphat '
  - type: note
    content: 2 Chr. 18:31
  - type: text
    content: 'cried out. '
  '33':
  - type: text
    content: 'And it happened, when the captains of the chariots saw that it '
  - type: text
    content: was
  - type: text
    content: ' not the king of Israel, that they turned back from pursuing him. '
  '34':
  - type: text
    content: 'Now a '
  - type: text
    content: certain
  - type: text
    content: ' man drew a bow at random, and struck the king of Israel between the joints of his armor. So he said to the driver of his chariot, “Turn around and take me out of the battle, for I am wounded.”'
  '35':
  - type: text
    content: 'The battle increased that day; and the king was propped up in his chariot, facing the Syrians, and died at evening. The blood ran out from the wound onto the floor of the chariot. '
  '36':
  - type: text
    content: Then, as the sun was going down, a shout went throughout the army, saying, “Every man to his city, and every man to his own country!”
  '37':
  - type: text
    content: 'So the king died, and was brought to Samaria. And they buried the king in Samaria. '
  '38':
  - type: text
    content: 'Then '
  - type: text
    content: someone
  - type: text
    content: ' washed the chariot at a pool in Samaria, and the dogs licked up his blood while the harlots bathed, according '
  - type: note
    content: 1 Kin. 21:19
  - type: text
    content: 'to the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He had spoken.'
  '39':
  - type: text
    content: 'Now the rest of the acts of Ahab, and all that he did, '
  - type: note
    content: Ps. 45:8; Amos 3:15
  - type: text
    content: 'the ivory house which he built and all the cities that he built, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel? '
  '4':
  - type: text
    content: So he said to Jehoshaphat, “Will you go with me to fight at Ramoth Gilead?”
  - type: text
    content: 'Jehoshaphat said to the king of Israel, '
  - type: note
    content: 2 Kin. 3:7
  - type: text
    content: '“I '
  - type: text
    content: am
  - type: text
    content: ' as you '
  - type: text
    content: are,
  - type: text
    content: ' my people as your people, my horses as your horses.” '
  '40':
  - type: text
    content: 'So Ahab rested with his fathers. Then '
  - type: note
    content: 2 Kin. 1:2, 18
  - type: text
    content: Ahaziah his son reigned in his place.
  - type: heading
    content: Jehoshaphat Reigns in Judah
  '41':
  - type: note
    content: 2 Chr. 20:31
  - type: text
    content: 'Jehoshaphat the son of Asa had become king over Judah in the fourth year of Ahab king of Israel. '
  '42':
  - type: text
    content: 'Jehoshaphat '
  - type: text
    content: was
  - type: text
    content: ' thirty-five years old when he became king, and he reigned twenty-five years in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Azubah the daughter of Shilhi. '
  '43':
  - type: text
    content: 'And '
  - type: note
    content: 2 Chr. 17:3; 20:32, 33
  - type: text
    content: 'he walked in all the ways of his father Asa. He did not turn aside from them, doing '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' right in the eyes of the '
  - type: heading
    content: Lord
  - type: text
    content: '. Nevertheless '
  - type: note
    content: 1 Kin. 14:23; 15:14; 2 Kin. 12:3
  - type: text
    content: 'the high places were not taken away, '
  - type: text
    content: for
  - type: text
    content: ' the people offered sacrifices and burned incense on the high places. '
  '44':
  - type: text
    content: 'Also '
  - type: note
    content: 2 Chr. 19:2
  - type: text
    content: 'Jehoshaphat made '
  - type: note
    content: 2 Chr. 18:1
  - type: text
    content: peace with the king of Israel.
  '45':
  - type: text
    content: 'Now the rest of the acts of Jehoshaphat, the might that he showed, and how he made war, '
  - type: text
    content: are
  - type: text
    content: ' they not written '
  - type: note
    content: 2 Chr. 20:34
  - type: text
    content: 'in the book of the chronicles of the kings of Judah? '
  '46':
  - type: note
    content: Gen. 19:5; Deut. 23:17; 1 Kin. 14:24; 15:12; 2 Kin. 23:7; Jude 7
  - type: text
    content: 'And the rest of the perverted persons, who remained in the days of his father Asa, he banished from the land. '
  '47':
  - type: note
    content: 2 Sam. 8:14; 2 Kin. 3:9; 8:20
  - type: text
    content: There
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' then no king in Edom, only a deputy of the king.'
  '48':
  - type: note
    content: 2 Chr. 20:35–37
  - type: text
    content: 'Jehoshaphat '
  - type: note
    content: 1 Kin. 10:22
  - type: text
    content: 'made merchant ships to go to '
  - type: note
    content: 1 Kin. 9:28
  - type: text
    content: 'Ophir for gold; '
  - type: note
    content: 2 Chr. 20:37
  - type: text
    content: 'but they never sailed, for the ships were wrecked at '
  - type: note
    content: 1 Kin. 9:26
  - type: text
    content: 'Ezion Geber. '
  '49':
  - type: text
    content: Then Ahaziah the son of Ahab said to Jehoshaphat, “Let my servants go with your servants in the ships.” But Jehoshaphat would not.
  '5':
  - type: text
    content: 'Also Jehoshaphat said to the king of Israel, '
  - type: note
    content: 2 Kin. 3:11
  - type: text
    content: '“Please inquire for the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' today.”'
  '50':
  - type: text
    content: 'And '
  - type: note
    content: 2 Chr. 21:1
  - type: text
    content: Jehoshaphat rested with his fathers, and was buried with his fathers in the City of David his father. Then Jehoram his son reigned in his place.
  - type: heading
    content: Ahaziah Reigns in Israel
  '51':
  - type: note
    content: 1 Kin. 22:40
  - type: text
    content: 'Ahaziah the son of Ahab became king over Israel in Samaria in the seventeenth year of Jehoshaphat king of Judah, and reigned two years over Israel. '
  '52':
  - type: text
    content: 'He did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: 1 Kin. 15:26; 21:25
  - type: text
    content: 'walked in the way of his father and in the way of his mother and in the way of Jeroboam the son of Nebat, who had made Israel sin; '
  '53':
  - type: text
    content: 'for '
  - type: note
    content: Judg. 2:11
  - type: text
    content: 'he served Baal and worshiped him, and provoked the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel to anger, '
  - type: note
    content: 1 Kin. 16:30–32
  - type: text
    content: according to all that his father had done.
  '6':
  - type: text
    content: 'Then the king of Israel '
  - type: note
    content: 1 Kin. 18:19
  - type: text
    content: gathered the prophets together, about four hundred men, and said to them, “Shall I go against Ramoth Gilead to fight, or shall I refrain?”
  - type: text
    content: 'So they said, “Go up, for the Lord will deliver '
  - type: text
    content: it
  - type: text
    content: ' into the hand of the king.”'
  '7':
  - type: text
    content: 'And '
  - type: note
    content: 2 Kin. 3:11
  - type: text
    content: Jehoshaphat said, “
  - type: text
    content: Is
  - type: text
    content: ' '
  - type: text
    content: there
  - type: text
    content: ' not still a prophet of the '
  - type: heading
    content: Lord
  - type: text
    content: ' here, that we may inquire of Him?”'
  '8':
  - type: text
    content: So the king of Israel said to Jehoshaphat, “
  - type: text
    content: There
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' still one man, Micaiah the son of Imlah, by whom we may inquire of the '
  - type: heading
    content: Lord
  - type: text
    content: ; but I hate him, because he does not prophesy good concerning me, but evil.”
  - type: text
    content: And Jehoshaphat said, “Let not the king say such things!”
  '9':
  - type: text
    content: Then the king of Israel called an officer and said, “Bring Micaiah the son of Imlah quickly!”
