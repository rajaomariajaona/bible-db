verses:
  '1':
  - type: heading
    content: Joshua the New Leader of Israel
  - type: text
    content: 'Then Moses went and spoke these words to all Israel. '
  '10':
  - type: text
    content: 'And Moses commanded them, saying: “At the end of '
  - type: text
    content: every
  - type: text
    content: ' seven years, at the appointed time in the '
  - type: note
    content: Deut. 15:1, 2
  - type: text
    content: 'year of release, '
  - type: note
    content: Lev. 23:34; Deut. 16:13
  - type: text
    content: 'at the Feast of Tabernacles, '
  '11':
  - type: text
    content: 'when all Israel comes to '
  - type: note
    content: Deut. 16:16
  - type: text
    content: 'appear before the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God in the '
  - type: note
    content: Deut. 12:5
  - type: text
    content: 'place which He chooses, '
  - type: note
    content: Josh. 8:34; 2 Kin. 23:2
  - type: text
    content: 'you shall read this law before all Israel in their hearing. '
  '12':
  - type: note
    content: Deut. 4:10
  - type: text
    content: 'Gather the people together, men and women and little ones, and the stranger who '
  - type: text
    content: is
  - type: text
    content: ' within your gates, that they may hear and that they may learn to fear the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God and carefully observe all the words of this law, '
  '13':
  - type: text
    content: 'and '
  - type: text
    content: that
  - type: text
    content: ' their children, '
  - type: note
    content: Deut. 11:2
  - type: text
    content: 'who have not known it, '
  - type: note
    content: Ps. 78:6, 7
  - type: text
    content: 'may hear and learn to fear the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God as long as you live in the land which you cross the Jordan to possess.”'
  - type: heading
    content: Prediction of Israel’s Rebellion
  '14':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: Num. 27:13
  - type: text
    content: '“Behold, the days approach when you must die; call Joshua, and present yourselves in the tabernacle of meeting, that '
  - type: note
    content: Num. 27:19; Deut. 3:28
  - type: text
    content: I may inaugurate him.”
  - type: text
    content: 'So Moses and Joshua went and presented themselves in the tabernacle of meeting. '
  '15':
  - type: text
    content: 'Now '
  - type: note
    content: Ex. 33:9
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' appeared at the tabernacle in a pillar of cloud, and the pillar of cloud stood above the door of the tabernacle.'
  '16':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses: “Behold, you will rest with your fathers; and this people will '
  - type: note
    content: Deut. 29:22
  - type: text
    content: 'rise and '
  - type: note
    content: Ex. 34:15; Deut. 4:25–28; Judg. 2:11, 12, 17
  - type: text
    content: 'play the harlot with the gods of the foreigners of the land, where they go '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' among them, and they will '
  - type: note
    content: Deut. 32:15
  - type: text
    content: 'forsake Me and '
  - type: note
    content: Judg. 2:20
  - type: text
    content: 'break My covenant which I have made with them. '
  '17':
  - type: text
    content: 'Then My anger shall be '
  - type: note
    content: Judg. 2:14; 6:13
  - type: text
    content: 'aroused against them in that day, and '
  - type: note
    content: 2 Chr. 15:2
  - type: text
    content: 'I will forsake them, and I will '
  - type: note
    content: Deut. 32:20
  - type: text
    content: 'hide My face from them, and they shall be devoured. And many evils and troubles shall befall them, so that they will say in that day, '
  - type: note
    content: Judg. 6:13
  - type: text
    content: '‘Have not these evils come upon us because our God '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: Num. 14:42
  - type: text
    content: 'not among us?’ '
  '18':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 31:17; (Is. 1:15, 16)
  - type: text
    content: I will surely hide My face in that day because of all the evil which they have done, in that they have turned to other gods.
  '19':
  - type: text
    content: '“Now therefore, write down this song for yourselves, and teach it to the children of Israel; put it in their mouths, that this song may be '
  - type: note
    content: Deut. 31:22, 26
  - type: text
    content: 'a witness for Me against the children of Israel. '
  '2':
  - type: text
    content: 'And he said to them: “I '
  - type: note
    content: Ex. 7:7; Deut. 34:7
  - type: text
    content: am
  - type: text
    content: ' one hundred and twenty years old today. I can no longer '
  - type: note
    content: Num. 27:17; 1 Kin. 3:7
  - type: text
    content: 'go out and come in. Also the '
  - type: heading
    content: Lord
  - type: text
    content: ' has said to me, '
  - type: note
    content: Num. 20:12
  - type: text
    content: '‘You shall not cross over this Jordan.’ '
  '20':
  - type: text
    content: 'When I have brought them to the land flowing with milk and honey, of which I swore to their fathers, and they have eaten and filled themselves '
  - type: note
    content: Deut. 32:15–17
  - type: text
    content: 'and grown fat, '
  - type: note
    content: Deut. 31:16
  - type: text
    content: 'then they will turn to other gods and serve them; and they will provoke Me and break My covenant. '
  '21':
  - type: text
    content: 'Then it shall be, '
  - type: note
    content: Deut. 31:17
  - type: text
    content: 'when many evils and troubles have come upon them, that this song will testify against them as a witness; for it will not be forgotten in the mouths of their descendants, for '
  - type: note
    content: Hos. 5:3
  - type: text
    content: 'I know the inclination '
  - type: note
    content: Amos 5:25, 26
  - type: text
    content: 'of their behavior today, even before I have brought them to the land of which I swore '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: give
  - type: text
    content: ' '
  - type: text
    content: them.
  - type: text
    content: ”
  '22':
  - type: text
    content: 'Therefore Moses wrote this song the same day, and taught it to the children of Israel. '
  '23':
  - type: note
    content: Num. 27:23; Deut. 31:14
  - type: text
    content: 'Then He inaugurated Joshua the son of Nun, and said, '
  - type: note
    content: Deut. 31:7
  - type: text
    content: “Be strong and of good courage; for you shall bring the children of Israel into the land of which I swore to them, and I will be with you.”
  '24':
  - type: text
    content: 'So it was, when Moses had completed writing the words of this law in a book, when they were finished, '
  '25':
  - type: text
    content: 'that Moses commanded the Levites, who bore the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying: '
  '26':
  - type: text
    content: '“Take this Book of the Law, '
  - type: note
    content: 2 Kin. 22:8
  - type: text
    content: 'and put it beside the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, that it may be there '
  - type: note
    content: Deut. 31:19
  - type: text
    content: 'as a witness against you; '
  '27':
  - type: note
    content: Deut. 9:7, 24
  - type: text
    content: 'for I know your rebellion and your '
  - type: note
    content: Ex. 32:9; Deut. 9:6, 13
  - type: text
    content: 'stiff neck. '
  - type: text
    content: If
  - type: text
    content: ' today, while I am yet alive with you, you have been rebellious against the '
  - type: heading
    content: Lord
  - type: text
    content: ', then how much more after my death? '
  '28':
  - type: text
    content: 'Gather to me all the elders of your tribes, and your officers, that I may speak these words in their hearing '
  - type: note
    content: Deut. 30:19
  - type: text
    content: 'and call heaven and earth to witness against them. '
  '29':
  - type: text
    content: 'For I know that after my death you will '
  - type: note
    content: Deut. 32:5; Judg. 2:19; (Acts 20:29, 30)
  - type: text
    content: 'become utterly corrupt, and turn aside from the way which I have commanded you. And '
  - type: note
    content: Deut. 28:15
  - type: text
    content: 'evil will befall you '
  - type: note
    content: Gen. 49:1; Deut. 4:30
  - type: text
    content: 'in the latter days, because you will do evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', to provoke Him to anger through the work of your hands.”'
  - type: heading
    content: The Song of Moses
  '3':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: Deut. 9:3; Josh. 11:23
  - type: text
    content: 'Himself crosses over before you; He will destroy these nations from before you, and you shall dispossess them. '
  - type: note
    content: Num. 27:18
  - type: text
    content: 'Joshua himself crosses over before you, just '
  - type: note
    content: Num. 27:21
  - type: text
    content: 'as the '
  - type: heading
    content: Lord
  - type: text
    content: ' has said. '
  '30':
  - type: text
    content: 'Then Moses spoke in the hearing of all the assembly of Israel the words of this song until they were ended:'
  '4':
  - type: note
    content: Deut. 3:21
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' will do to them '
  - type: note
    content: Num. 21:24, 33
  - type: text
    content: 'as He did to Sihon and Og, the kings of the Amorites and their land, when He destroyed them. '
  '5':
  - type: note
    content: Deut. 7:2; 20:10–20
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' will give them over to you, that you may do to them according to every commandment which I have commanded you. '
  '6':
  - type: note
    content: Josh. 10:25; 1 Chr. 22:13
  - type: text
    content: 'Be strong and of good courage, '
  - type: note
    content: Deut. 1:29
  - type: text
    content: 'do not fear nor be afraid of them; for the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, '
  - type: note
    content: Deut. 20:4
  - type: text
    content: 'He '
  - type: text
    content: is
  - type: text
    content: ' the One who goes with you. '
  - type: note
    content: Josh. 1:5; Heb. 13:5
  - type: text
    content: He will not leave you nor forsake you.”
  '7':
  - type: text
    content: 'Then Moses called Joshua and said to him in the sight of all Israel, '
  - type: note
    content: Num. 27:19; Deut. 31:23; Josh. 1:6
  - type: text
    content: '“Be strong and of good courage, for you must go with this people to the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has sworn to their fathers to give them, and you shall cause them to inherit it. '
  '8':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ex. 13:21
  - type: text
    content: 'He '
  - type: text
    content: is
  - type: text
    content: ' the One who goes before you. '
  - type: note
    content: Deut. 31:6; Josh. 1:5; 1 Chr. 28:20; Heb. 13:5
  - type: text
    content: He will be with you, He will not leave you nor forsake you; do not fear nor be dismayed.”
  - type: heading
    content: The Law to Be Read Every Seven Years
  '9':
  - type: text
    content: 'So Moses wrote this law '
  - type: note
    content: Deut. 17:18; 31:25, 26
  - type: text
    content: 'and delivered it to the priests, the sons of Levi, '
  - type: note
    content: Num. 4:5, 6, 15; Deut. 10:8; 31:25, 26; Josh. 3:3
  - type: text
    content: 'who bore the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and to all the elders of Israel. '
