  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Restore to me the joy of Your salvation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And uphold me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Your
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
