  - type: text
    text: 'To the Chief Musician. A Psalm of David '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 12:1
    marker-yv: yv-n
  - type: text
    text: when Nathan the prophet went to him, after he had gone in to Bathsheba.
