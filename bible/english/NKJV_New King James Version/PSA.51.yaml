- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 43:25; 44:22; Acts 3:19; Col. 2:14)
    marker-yv: yv-n
  - type: text
    text: Blot out my transgressions.
