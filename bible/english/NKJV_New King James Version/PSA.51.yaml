  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Deliver me from the guilt of bloodshed, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The God of my salvation,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: And
  - type: text
    text: ' my tongue shall sing aloud of Your righteousness.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: O Lord, open my lips,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my mouth shall show forth Your praise.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Sam. 15:22); Ps. 50:8–14; (Mic. 6:6–8)
    marker-yv: yv-n
  - type: text
    text: 'You do not desire sacrifice, or else I would give '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: You do not delight in burnt offering.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
