document_id: PSA.51,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prayer of Repentance
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. A Psalm of David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 12:1
      marker-yv: yv-n
    - type: text
      text: when Nathan the prophet went to him, after he had gone in to Bathsheba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have mercy upon me, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: According to Your lovingkindness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: According to the multitude of Your tender mercies,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 43:25; 44:22; Acts 3:19; Col. 2:14)
      marker-yv: yv-n
    - type: text
      text: Blot out my transgressions.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ezek. 18:31; Eph. 2:10)
      marker-yv: yv-n
    - type: text
      text: Create in me a clean heart, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And renew a steadfast spirit within me.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not cast me away from Your presence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And do not take Your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Luke 11:13)
      marker-yv: yv-n
    - type: text
      text: Holy Spirit from me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Restore to me the joy of Your salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And uphold me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Your
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 3:17)
      marker-yv: yv-n
    - type: text
      text: generous Spirit.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Then
    - type: text
      text: ' I will teach transgressors Your ways,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And sinners shall be converted to You.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deliver me from the guilt of bloodshed, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The God of my salvation,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' my tongue shall sing aloud of Your righteousness.'
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O Lord, open my lips,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my mouth shall show forth Your praise.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Sam. 15:22); Ps. 50:8–14; (Mic. 6:6–8)
      marker-yv: yv-n
    - type: text
      text: 'You do not desire sacrifice, or else I would give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You do not delight in burnt offering.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 34:18; (Is. 57:15); 66:2
      marker-yv: yv-n
    - type: text
      text: 'The sacrifices of God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a broken spirit,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A broken and a contrite heart—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: These, O God, You will not despise.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do good in Your good pleasure to Zion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Build the walls of Jerusalem.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then You shall be pleased with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 4:5
      marker-yv: yv-n
    - type: text
      text: the sacrifices of righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With burnt offering and whole burnt offering;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then they shall offer bulls on Your altar.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 33:8; Ezek. 36:33; (Heb. 9:14; 1 John 1:7, 9)
      marker-yv: yv-n
    - type: text
      text: Wash me thoroughly from my iniquity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And cleanse me from my sin.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I acknowledge my transgressions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And my sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' always before me.'
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 12:13
      marker-yv: yv-n
    - type: text
      text: Against You, You only, have I sinned,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And done '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this
    - type: text
      text: ' evil '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Luke 5:21)
      marker-yv: yv-n
    - type: text
      text: in Your sight—
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 3:4
      marker-yv: yv-n
    - type: text
      text: That You may be found just when You speak,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' blameless when You judge.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 14:4; Ps. 58:3; John 3:6; Rom. 5:12)
      marker-yv: yv-n
    - type: text
      text: Behold, I was brought forth in iniquity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in sin my mother conceived me.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Behold, You desire truth in the inward parts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And in the hidden '
    - type: usfm
      marker: it
      children:
      - type: text
        text: part
    - type: text
      text: ' You will make me to know wisdom.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:22; Lev. 14:4; Num. 19:18; Heb. 9:19
      marker-yv: yv-n
    - type: text
      text: Purge me with hyssop, and I shall be clean;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Wash me, and I shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 1:18)
      marker-yv: yv-n
    - type: text
      text: whiter than snow.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Make me hear joy and gladness,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That
    - type: text
      text: ' the bones You have broken '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 5:4)
      marker-yv: yv-n
    - type: text
      text: may rejoice.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hide Your face from my sins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And blot out all my iniquities.
