- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Do not cast me away from Your presence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And do not take Your '
