  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Have mercy upon me, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: According to Your lovingkindness;
- type: usfm
  marker: q2
  children:
  - type: text
