  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 12:13
    marker-yv: yv-n
  - type: text
    text: Against You, You only, have I sinned,
