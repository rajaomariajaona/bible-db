    marker: x
    children:
    - type: text
      text: Ps. 34:18; (Is. 57:15); 66:2
    marker-yv: yv-n
  - type: text
    text: 'The sacrifices of God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' a broken spirit,'
- type: usfm
  marker: q2
  children:
