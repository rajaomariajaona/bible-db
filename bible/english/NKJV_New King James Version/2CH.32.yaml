      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 18:22
    marker-yv: yv-n
  - type: text
    text: 'Has not the same Hezekiah taken away His high places and His altars, and commanded Judah and Jerusalem, saying, “You shall worship before one altar and burn incense on '
  - type: usfm
    marker: x
    children:
    - type: text
