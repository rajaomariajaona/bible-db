document_id: 2CH.32,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Sennacherib Boasts Against the Lord
  - type: text
    content: 'After '
  - type: note
    content: 2 Kin. 18:13—19:37; Is. 36:1—37:38
  - type: text
    content: 'these deeds of faithfulness, Sennacherib king of Assyria came and entered Judah; he encamped against the fortified cities, thinking to win them over to himself. '
  '10':
  - type: note
    content: 2 Kin. 18:19
  - type: text
    content: '“Thus says Sennacherib king of Assyria: ‘In what do you trust, that you remain under siege in Jerusalem? '
  '11':
  - type: text
    content: 'Does not Hezekiah persuade you to give yourselves over to die by famine and by thirst, saying, '
  - type: note
    content: 2 Kin. 18:30
  - type: text
    content: '“The '
  - type: heading
    content: Lord
  - type: text
    content: ' our God will deliver us from the hand of the king of Assyria”? '
  '12':
  - type: note
    content: 2 Kin. 18:22
  - type: text
    content: 'Has not the same Hezekiah taken away His high places and His altars, and commanded Judah and Jerusalem, saying, “You shall worship before one altar and burn incense on '
  - type: note
    content: 2 Chr. 31:1, 2
  - type: text
    content: 'it”? '
  '13':
  - type: text
    content: 'Do you not know what I and my fathers have done to all the peoples of '
  - type: text
    content: other
  - type: text
    content: ' lands? '
  - type: note
    content: 2 Kin. 18:33–35
  - type: text
    content: 'Were the gods of the nations of those lands in any way able to deliver their lands out of my hand? '
  '14':
  - type: text
    content: 'Who '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: text
    content: there
  - type: text
    content: ' among all the gods of those nations that my fathers utterly destroyed that could deliver his people from my hand, that your God should be able to deliver you from my '
  - type: note
    content: (Is. 10:5–12)
  - type: text
    content: 'hand? '
  '15':
  - type: text
    content: 'Now therefore, '
  - type: note
    content: 2 Kin. 18:29
  - type: text
    content: do not let Hezekiah deceive you or persuade you like this, and do not believe him; for no god of any nation or kingdom was able to deliver his people from my hand or the hand of my fathers. How much less will your God deliver you from my hand?’ ”
  '16':
  - type: text
    content: 'Furthermore, his servants spoke against the '
  - type: heading
    content: Lord
  - type: text
    content: ' God and against His servant Hezekiah.'
  '17':
  - type: text
    content: 'He also wrote letters to revile the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel, and to speak against Him, saying, '
  - type: note
    content: 2 Kin. 19:9; (1 Cor. 8:5, 6)
  - type: text
    content: '“As the gods of the nations of '
  - type: text
    content: other
  - type: text
    content: ' lands have not delivered their people from my hand, so the God of Hezekiah will not deliver His people from my '
  - type: note
    content: 2 Kin. 19:12; Dan. 3:15
  - type: text
    content: 'hand.” '
  '18':
  - type: note
    content: 2 Kin. 18:28; Ps. 59:6
  - type: text
    content: 'Then they called out with a loud voice in Hebrew to the people of Jerusalem who '
  - type: text
    content: were
  - type: text
    content: ' on the wall, to frighten them and trouble them, that they might take the city. '
  '19':
  - type: text
    content: And they spoke against the God of Jerusalem, as against the gods of the people of the earth—
  - type: note
    content: 2 Kin. 19:18; (Ps. 96:5; 115:4–8)
  - type: text
    content: the work of men’s hands.
  - type: heading
    content: Sennacherib’s Defeat and Death
  '2':
  - type: text
    content: 'And when Hezekiah saw that Sennacherib had come, and that his purpose was to make war against Jerusalem, '
  '20':
  - type: note
    content: 2 Kin. 19:15
  - type: text
    content: 'Now because of this King Hezekiah and '
  - type: note
    content: 2 Kin. 19:2
  - type: text
    content: 'the prophet Isaiah, the son of Amoz, prayed and cried out to heaven. '
  '21':
  - type: note
    content: 2 Kin. 19:35; Is. 10:12–19; Zech. 14:3
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' sent an angel who cut down every mighty man of valor, leader, and captain in the camp of the king of Assyria. So he returned '
  - type: note
    content: Ps. 44:7
  - type: text
    content: shamefaced to his own land. And when he had gone into the temple of his god, some of his own offspring struck him down with the sword there.
  '22':
  - type: text
    content: 'Thus the '
  - type: heading
    content: Lord
  - type: text
    content: ' saved Hezekiah and the inhabitants of Jerusalem from the hand of Sennacherib the king of Assyria, and from the hand of all '
  - type: text
    content: others,
  - type: text
    content: ' and guided them on every side. '
  '23':
  - type: text
    content: 'And many brought gifts to the '
  - type: heading
    content: Lord
  - type: text
    content: ' at Jerusalem, and '
  - type: note
    content: 2 Sam. 8:10; 2 Chr. 17:5; 26:8; Ps. 45:12
  - type: text
    content: 'presents to Hezekiah king of Judah, so that he was '
  - type: note
    content: 2 Chr. 1:1
  - type: text
    content: exalted in the sight of all nations thereafter.
  - type: heading
    content: Hezekiah Humbles Himself
  '24':
  - type: note
    content: 2 Kin. 20:1–11; Is. 38:1–8
  - type: text
    content: 'In those days Hezekiah was sick and near death, and he prayed to the '
  - type: heading
    content: Lord
  - type: text
    content: '; and He spoke to him and gave him a sign. '
  '25':
  - type: text
    content: 'But Hezekiah '
  - type: note
    content: Ps. 116:12
  - type: text
    content: 'did not repay according to the favor '
  - type: text
    content: shown
  - type: text
    content: ' him, for '
  - type: note
    content: 2 Chr. 26:16; (Hab. 2:4)
  - type: text
    content: 'his heart was lifted up; '
  - type: note
    content: 2 Chr. 24:18
  - type: text
    content: 'therefore wrath was looming over him and over Judah and Jerusalem. '
  '26':
  - type: note
    content: Jer. 26:18, 19
  - type: text
    content: 'Then Hezekiah humbled himself for the pride of his heart, he and the inhabitants of Jerusalem, so that the wrath of the '
  - type: heading
    content: Lord
  - type: text
    content: ' did not come upon them '
  - type: note
    content: 2 Kin. 20:19
  - type: text
    content: in the days of Hezekiah.
  - type: heading
    content: Hezekiah’s Wealth and Honor
  '27':
  - type: text
    content: 'Hezekiah had very great riches and honor. And he made himself treasuries for silver, for gold, for precious stones, for spices, for shields, and for all kinds of desirable items; '
  '28':
  - type: text
    content: 'storehouses for the harvest of grain, wine, and oil; and stalls for all kinds of livestock, and folds for flocks. '
  '29':
  - type: text
    content: 'Moreover he provided cities for himself, and possessions of flocks and herds in abundance; for '
  - type: note
    content: 1 Chr. 29:12
  - type: text
    content: 'God had given him very much property. '
  '3':
  - type: text
    content: 'he consulted with his leaders and commanders to stop the water from the springs which '
  - type: text
    content: were
  - type: text
    content: ' outside the city; and they helped him. '
  '30':
  - type: note
    content: Is. 22:9–11
  - type: text
    content: 'This same Hezekiah also stopped the water outlet of Upper Gihon, and brought the water by tunnel to the west side of the City of David. Hezekiah '
  - type: note
    content: 2 Chr. 31:21
  - type: text
    content: prospered in all his works.
  '31':
  - type: text
    content: 'However, '
  - type: text
    content: regarding
  - type: text
    content: ' the ambassadors of the princes of Babylon, whom they '
  - type: note
    content: 2 Kin. 20:12; Is. 39:1
  - type: text
    content: 'sent to him to inquire about the wonder that was '
  - type: text
    content: done
  - type: text
    content: ' in the land, God withdrew from him, in order to '
  - type: note
    content: (Deut. 8:2, 16)
  - type: text
    content: 'test him, that He might know all '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' in his heart.'
  - type: heading
    content: Death of Hezekiah
  '32':
  - type: text
    content: 'Now the rest of the acts of Hezekiah, and his goodness, indeed they '
  - type: text
    content: are
  - type: text
    content: ' written in '
  - type: note
    content: Is. 36—39
  - type: text
    content: 'the vision of Isaiah the prophet, the son of Amoz, '
  - type: text
    content: and
  - type: text
    content: ' in the '
  - type: note
    content: 2 Kin. 18—20
  - type: text
    content: 'book of the kings of Judah and Israel. '
  '33':
  - type: note
    content: 1 Kin. 1:21; 2 Kin. 20:21
  - type: text
    content: 'So Hezekiah rested with his fathers, and they buried him in the upper tombs of the sons of David; and all Judah and the inhabitants of Jerusalem '
  - type: note
    content: Ps. 112:6; Prov. 10:7
  - type: text
    content: honored him at his death. Then Manasseh his son reigned in his place.
  '4':
  - type: text
    content: 'Thus many people gathered together who stopped all the '
  - type: note
    content: 2 Kin. 20:20
  - type: text
    content: 'springs and the brook that ran through the land, saying, “Why should the kings of Assyria come and find much water?” '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: Is. 22:9, 10
  - type: text
    content: 'he strengthened himself, '
  - type: note
    content: 2 Kin. 25:4; 2 Chr. 25:23
  - type: text
    content: 'built up all the wall that was broken, raised '
  - type: text
    content: it
  - type: text
    content: ' up to the towers, and '
  - type: text
    content: built
  - type: text
    content: ' another wall outside; also he repaired the '
  - type: note
    content: 2 Sam. 5:9; 1 Kin. 9:15, 24; 11:27; 2 Kin. 12:20; 1 Chr. 11:8
  - type: text
    content: 'Millo '
  - type: text
    content: in
  - type: text
    content: ' the City of David, and made weapons and shields in abundance. '
  '6':
  - type: text
    content: 'Then he set military captains over the people, gathered them together to him in the open square of the city gate, and '
  - type: note
    content: 2 Chr. 30:22; Is. 40:2
  - type: text
    content: 'gave them encouragement, saying, '
  '7':
  - type: note
    content: (Deut. 31:6)
  - type: text
    content: '“Be strong and courageous; '
  - type: note
    content: 2 Chr. 20:15
  - type: text
    content: 'do not be afraid nor dismayed before the king of Assyria, nor before all the multitude that '
  - type: text
    content: is
  - type: text
    content: ' with him; for '
  - type: note
    content: 2 Kin. 6:16; (Rom. 8:31)
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' more with us than with him. '
  '8':
  - type: text
    content: 'With him '
  - type: text
    content: is
  - type: text
    content: ' an '
  - type: note
    content: (Jer. 17:5; 1 John 4:4)
  - type: text
    content: 'arm of flesh; but '
  - type: note
    content: Ex. 14:13; (1 Sam. 17:45–47); 2 Chr. 13:12; 20:17; (Rom. 8:31)
  - type: text
    content: 'with us '
  - type: text
    content: is
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God, to help us and to fight our battles.” And the people were strengthened by the words of Hezekiah king of Judah.'
  '9':
  - type: note
    content: 2 Kin. 18:17
  - type: text
    content: 'After this Sennacherib king of Assyria sent his servants to Jerusalem (but he and all the forces with him '
  - type: text
    content: laid
  - type: text
    content: ' '
  - type: text
    content: siege
  - type: text
    content: ' against Lachish), to Hezekiah king of Judah, and to all Judah who '
  - type: text
    content: were
  - type: text
    content: ' in Jerusalem, saying, '
