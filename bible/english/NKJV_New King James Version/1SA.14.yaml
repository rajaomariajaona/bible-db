  '30':
  - type: text
    content: How much better if the people had eaten freely today of the spoil of their enemies which they found! For now would there not have been a much greater slaughter among the Philistines?”
  '31':
  - type: text
    content: 'Now they had driven back the Philistines that day from Michmash to Aijalon. So the people were very faint. '
