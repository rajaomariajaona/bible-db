document_id: PSA.10,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Song of Confidence in God’s Triumph over Evil
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Why do You stand afar off, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Why
    - type: text
      text: ' do You hide in times of trouble?'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So he crouches, he lies low,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That the helpless may fall by his strength.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has said in his heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “God has forgotten;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hides His face;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will never see.”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Arise, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 17:7; 94:2; Mic. 5:9
      marker-yv: yv-n
    - type: text
      text: lift up Your hand!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Do not forget the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 9:12
      marker-yv: yv-n
    - type: text
      text: humble.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do the wicked renounce God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has said in his heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“You will not require '
    - type: usfm
      marker: it
      children:
      - type: text
        text: an
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: account.
    - type: text
      text: ”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But You have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 11:4)
      marker-yv: yv-n
    - type: text
      text: seen, for You observe trouble and grief,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To repay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' by Your hand.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The helpless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Tim. 1:12)
      marker-yv: yv-n
    - type: text
      text: commits himself to You;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 68:5; Hos. 14:3
      marker-yv: yv-n
    - type: text
      text: You are the helper of the fatherless.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Break the arm of the wicked and the evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Seek out his wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: until
    - type: text
      text: ' You find none.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 29:10
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' King forever and ever;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The nations have perished out of His land.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', You have heard the desire of the humble;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will prepare their heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will cause Your ear to hear,
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To do justice to the fatherless and the oppressed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That the man of the earth may oppress no more.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The wicked in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' pride persecutes the poor;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 7:16; 9:16
      marker-yv: yv-n
    - type: text
      text: Let them be caught in the plots which they have devised.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the wicked '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 49:6; 94:3, 4
      marker-yv: yv-n
    - type: text
      text: boasts of his heart’s desire;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 28:4
      marker-yv: yv-n
    - type: text
      text: 'blesses the greedy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' renounces the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The wicked in his proud countenance does not seek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in none of his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 14:1; 36:1
      marker-yv: yv-n
    - type: text
      text: thoughts.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His ways are always prospering;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Your judgments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' far above, out of his sight;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' all his enemies, he sneers at them.'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 49:11; (Eccl. 8:11)
      marker-yv: yv-n
    - type: text
      text: He has said in his heart, “I shall not be moved;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 18:7
      marker-yv: yv-n
    - type: text
      text: I shall never be in adversity.”
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 3:14)
      marker-yv: yv-n
    - type: text
      text: 'His mouth is full of cursing and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 55:10, 11
      marker-yv: yv-n
    - type: text
      text: deceit and oppression;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Under his tongue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' trouble and iniquity.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sits in the lurking places of the villages;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the secret places he murders the innocent;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His eyes are secretly fixed on the helpless.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He lies in wait secretly, as a lion in his den;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He lies in wait to catch the poor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He catches the poor when he draws him into his net.
