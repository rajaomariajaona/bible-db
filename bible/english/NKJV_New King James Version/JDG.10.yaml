document_id: JDG.10,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tola
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After Abimelech there '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 2:16
      marker-yv: yv-n
    - type: text
      text: 'arose to save Israel Tola the son of Puah, the son of Dodo, a man of Issachar; and he dwelt in Shamir in the mountains of Ephraim. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 6:6; 1 Sam. 12:10
      marker-yv: yv-n
    - type: text
      text: 'And the children of Israel cried out to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, “We have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:41
      marker-yv: yv-n
    - type: text
      text: sinned against You, because we have both forsaken our God and served the Baals!”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to the children of Israel, “'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Did
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: deliver
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 14:30
      marker-yv: yv-n
    - type: text
      text: 'from the Egyptians and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:21, 24, 25
      marker-yv: yv-n
    - type: text
      text: 'from the Amorites and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 3:12, 13
      marker-yv: yv-n
    - type: text
      text: 'from the people of Ammon and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 3:31
      marker-yv: yv-n
    - type: text
      text: 'from the Philistines? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:31; 5:19
      marker-yv: yv-n
    - type: text
      text: 'the Sidonians '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 6:3; 7:12
      marker-yv: yv-n
    - type: text
      text: 'and Amalekites and Maonites '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 106:42, 43
      marker-yv: yv-n
    - type: text
      text: 'oppressed you; and you cried out to Me, and I delivered you from their hand. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 32:15; Judg. 2:12; Jer. 2:13)
      marker-yv: yv-n
    - type: text
      text: 'Yet you have forsaken Me and served other gods. Therefore I will deliver you no more. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“Go and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:37, 38
      marker-yv: yv-n
    - type: text
      text: cry out to the gods which you have chosen; let them deliver you in your time of distress.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the children of Israel said to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “We have sinned! '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 3:18; 2 Sam. 15:26
      marker-yv: yv-n
    - type: text
      text: 'Do to us whatever seems best to You; only deliver us this day, we pray.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 7:14; Jer. 18:7, 8
      marker-yv: yv-n
    - type: text
      text: 'So they put away the foreign gods from among them and served the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 106:44, 45; Is. 63:9
      marker-yv: yv-n
    - type: text
      text: His soul could no longer endure the misery of Israel.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then the people of Ammon gathered together and encamped in Gilead. And the children of Israel assembled together and encamped in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 31:49; Judg. 11:11, 29
      marker-yv: yv-n
    - type: text
      text: 'Mizpah. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And the people, the leaders of Gilead, said to one another, “Who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the man who will begin the fight against the people of Ammon? He shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 11:8, 11
      marker-yv: yv-n
    - type: text
      text: be head over all the inhabitants of Gilead.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He judged Israel twenty-three years; and he died and was buried in Shamir.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jair
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'After him arose Jair, a Gileadite; and he judged Israel twenty-two years. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now he had thirty sons who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 5:10; 12:14
      marker-yv: yv-n
    - type: text
      text: 'rode on thirty donkeys; they also had thirty towns, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 3:14
      marker-yv: yv-n
    - type: text
      text: 'which are called “Havoth Jair” to this day, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in the land of Gilead. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And Jair died and was buried in Camon.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel Oppressed Again
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 2:11; 3:7; 6:1; 13:1
      marker-yv: yv-n
    - type: text
      text: 'the children of Israel again did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 2:13
      marker-yv: yv-n
    - type: text
      text: 'served the Baals and the Ashtoreths, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 2:12
      marker-yv: yv-n
    - type: text
      text: 'the gods of Syria, the gods of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:33; Ps. 106:36
      marker-yv: yv-n
    - type: text
      text: 'Sidon, the gods of Moab, the gods of the people of Ammon, and the gods of the Philistines; and they forsook the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and did not serve Him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So the anger of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was hot against Israel; and He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 2:14; 4:2; 1 Sam. 12:9
      marker-yv: yv-n
    - type: text
      text: 'sold them into the hands of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 13:1
      marker-yv: yv-n
    - type: text
      text: 'Philistines and into the hands of the people of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 3:13
      marker-yv: yv-n
    - type: text
      text: 'Ammon. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'From that year they harassed and oppressed the children of Israel for eighteen years—all the children of Israel who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' on the other side of the Jordan in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:33
      marker-yv: yv-n
    - type: text
      text: 'land of the Amorites, in Gilead. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Moreover the people of Ammon crossed over the Jordan to fight against Judah also, against Benjamin, and against the house of Ephraim, so that Israel was severely distressed.
