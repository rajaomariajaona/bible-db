document_id: JDG.10,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Tola
  - type: text
    content: 'After Abimelech there '
  - type: note
    content: Judg. 2:16
  - type: text
    content: 'arose to save Israel Tola the son of Puah, the son of Dodo, a man of Issachar; and he dwelt in Shamir in the mountains of Ephraim. '
  '10':
  - type: note
    content: Judg. 6:6; 1 Sam. 12:10
  - type: text
    content: 'And the children of Israel cried out to the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying, “We have '
  - type: note
    content: Deut. 1:41
  - type: text
    content: sinned against You, because we have both forsaken our God and served the Baals!”
  '11':
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to the children of Israel, “'
  - type: text
    content: Did
  - type: text
    content: ' '
  - type: text
    content: I
  - type: text
    content: ' not '
  - type: text
    content: deliver
  - type: text
    content: ' '
  - type: text
    content: you
  - type: text
    content: ' '
  - type: note
    content: Ex. 14:30
  - type: text
    content: 'from the Egyptians and '
  - type: note
    content: Num. 21:21, 24, 25
  - type: text
    content: 'from the Amorites and '
  - type: note
    content: Judg. 3:12, 13
  - type: text
    content: 'from the people of Ammon and '
  - type: note
    content: Judg. 3:31
  - type: text
    content: 'from the Philistines? '
  '12':
  - type: text
    content: 'Also '
  - type: note
    content: Judg. 1:31; 5:19
  - type: text
    content: 'the Sidonians '
  - type: note
    content: Judg. 6:3; 7:12
  - type: text
    content: 'and Amalekites and Maonites '
  - type: note
    content: Ps. 106:42, 43
  - type: text
    content: 'oppressed you; and you cried out to Me, and I delivered you from their hand. '
  '13':
  - type: note
    content: (Deut. 32:15; Judg. 2:12; Jer. 2:13)
  - type: text
    content: 'Yet you have forsaken Me and served other gods. Therefore I will deliver you no more. '
  '14':
  - type: text
    content: '“Go and '
  - type: note
    content: Deut. 32:37, 38
  - type: text
    content: cry out to the gods which you have chosen; let them deliver you in your time of distress.”
  '15':
  - type: text
    content: 'And the children of Israel said to the '
  - type: heading
    content: Lord
  - type: text
    content: ', “We have sinned! '
  - type: note
    content: 1 Sam. 3:18; 2 Sam. 15:26
  - type: text
    content: 'Do to us whatever seems best to You; only deliver us this day, we pray.” '
  '16':
  - type: note
    content: 2 Chr. 7:14; Jer. 18:7, 8
  - type: text
    content: 'So they put away the foreign gods from among them and served the '
  - type: heading
    content: Lord
  - type: text
    content: '. And '
  - type: note
    content: Ps. 106:44, 45; Is. 63:9
  - type: text
    content: His soul could no longer endure the misery of Israel.
  '17':
  - type: text
    content: 'Then the people of Ammon gathered together and encamped in Gilead. And the children of Israel assembled together and encamped in '
  - type: note
    content: Gen. 31:49; Judg. 11:11, 29
  - type: text
    content: 'Mizpah. '
  '18':
  - type: text
    content: 'And the people, the leaders of Gilead, said to one another, “Who '
  - type: text
    content: is
  - type: text
    content: ' the man who will begin the fight against the people of Ammon? He shall '
  - type: note
    content: Judg. 11:8, 11
  - type: text
    content: be head over all the inhabitants of Gilead.”
  '2':
  - type: text
    content: He judged Israel twenty-three years; and he died and was buried in Shamir.
  - type: heading
    content: Jair
  '3':
  - type: text
    content: 'After him arose Jair, a Gileadite; and he judged Israel twenty-two years. '
  '4':
  - type: text
    content: 'Now he had thirty sons who '
  - type: note
    content: Judg. 5:10; 12:14
  - type: text
    content: 'rode on thirty donkeys; they also had thirty towns, '
  - type: note
    content: Deut. 3:14
  - type: text
    content: 'which are called “Havoth Jair” to this day, which '
  - type: text
    content: are
  - type: text
    content: ' in the land of Gilead. '
  '5':
  - type: text
    content: And Jair died and was buried in Camon.
  - type: heading
    content: Israel Oppressed Again
  '6':
  - type: text
    content: 'Then '
  - type: note
    content: Judg. 2:11; 3:7; 6:1; 13:1
  - type: text
    content: 'the children of Israel again did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: Judg. 2:13
  - type: text
    content: 'served the Baals and the Ashtoreths, '
  - type: note
    content: Judg. 2:12
  - type: text
    content: 'the gods of Syria, the gods of '
  - type: note
    content: 1 Kin. 11:33; Ps. 106:36
  - type: text
    content: 'Sidon, the gods of Moab, the gods of the people of Ammon, and the gods of the Philistines; and they forsook the '
  - type: heading
    content: Lord
  - type: text
    content: ' and did not serve Him. '
  '7':
  - type: text
    content: 'So the anger of the '
  - type: heading
    content: Lord
  - type: text
    content: ' was hot against Israel; and He '
  - type: note
    content: Judg. 2:14; 4:2; 1 Sam. 12:9
  - type: text
    content: 'sold them into the hands of the '
  - type: note
    content: Judg. 13:1
  - type: text
    content: 'Philistines and into the hands of the people of '
  - type: note
    content: Judg. 3:13
  - type: text
    content: 'Ammon. '
  '8':
  - type: text
    content: 'From that year they harassed and oppressed the children of Israel for eighteen years—all the children of Israel who '
  - type: text
    content: were
  - type: text
    content: ' on the other side of the Jordan in the '
  - type: note
    content: Num. 32:33
  - type: text
    content: 'land of the Amorites, in Gilead. '
  '9':
  - type: text
    content: Moreover the people of Ammon crossed over the Jordan to fight against Judah also, against Benjamin, and against the house of Ephraim, so that Israel was severely distressed.
