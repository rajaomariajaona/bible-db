document_id: PSA.64,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Oppressed by the Wicked but Rejoicing in the Lord
  - type: text
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: Hear my voice, O God, in my meditation;
  - type: text
    content: Preserve my life from fear of the enemy.
  '10':
  - type: note
    content: Job 22:19; Ps. 32:11
  - type: text
    content: 'The righteous shall be glad in the '
  - type: heading
    content: Lord
  - type: text
    content: ', and trust in Him.'
  - type: text
    content: And all the upright in heart shall glory.
  '2':
  - type: text
    content: Hide me from the secret plots of the wicked,
  - type: text
    content: From the rebellion of the workers of iniquity,
  '3':
  - type: text
    content: Who sharpen their tongue like a sword,
  - type: note
    content: Ps. 58:7
  - type: text
    content: 'And bend '
  - type: text
    content: their
  - type: text
    content: ' '
  - type: text
    content: bows
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: shoot
  - type: text
    content: ' their arrows—bitter words,'
  '4':
  - type: text
    content: That they may shoot in secret at the blameless;
  - type: text
    content: Suddenly they shoot at him and do not fear.
  '5':
  - type: text
    content: 'They encourage themselves '
  - type: text
    content: in
  - type: text
    content: ' an evil matter;'
  - type: text
    content: They talk of laying snares secretly;
  - type: note
    content: Ps. 10:11; 59:7
  - type: text
    content: They say, “Who will see them?”
  '6':
  - type: text
    content: 'They devise iniquities:'
  - type: text
    content: “We have perfected a shrewd scheme.”
  - type: text
    content: Both the inward thought and the heart of man are deep.
  '7':
  - type: text
    content: 'But God shall shoot at them '
  - type: text
    content: with
  - type: text
    content: ' an arrow;'
  - type: text
    content: Suddenly they shall be wounded.
  '8':
  - type: text
    content: So He will make them stumble over their own tongue;
  - type: note
    content: Ps. 31:11
  - type: text
    content: All who see them shall flee away.
  '9':
  - type: text
    content: All men shall fear,
  - type: text
    content: 'And shall '
  - type: note
    content: Jer. 50:28; 51:10
  - type: text
    content: declare the work of God;
  - type: text
    content: For they shall wisely consider His doing.
