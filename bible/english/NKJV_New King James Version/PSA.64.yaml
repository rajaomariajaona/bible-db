document_id: PSA.64,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Oppressed by the Wicked but Rejoicing in the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Hear my voice, O God, in my meditation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Preserve my life from fear of the enemy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 22:19; Ps. 32:11
      marker-yv: yv-n
    - type: text
      text: 'The righteous shall be glad in the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and trust in Him.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the upright in heart shall glory.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hide me from the secret plots of the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From the rebellion of the workers of iniquity,
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Who sharpen their tongue like a sword,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 58:7
      marker-yv: yv-n
    - type: text
      text: 'And bend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bows
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shoot
    - type: text
      text: ' their arrows—bitter words,'
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: That they may shoot in secret at the blameless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Suddenly they shoot at him and do not fear.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'They encourage themselves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' an evil matter;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They talk of laying snares secretly;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 10:11; 59:7
      marker-yv: yv-n
    - type: text
      text: They say, “Who will see them?”
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'They devise iniquities:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “We have perfected a shrewd scheme.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Both the inward thought and the heart of man are deep.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But God shall shoot at them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' an arrow;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Suddenly they shall be wounded.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So He will make them stumble over their own tongue;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 31:11
      marker-yv: yv-n
    - type: text
      text: All who see them shall flee away.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: All men shall fear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 50:28; 51:10
      marker-yv: yv-n
    - type: text
      text: declare the work of God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For they shall wisely consider His doing.
