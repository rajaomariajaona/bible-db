document_id: PSA.33,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The Sovereignty of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in Creation and History'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Rejoice '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 32:11; 97:12; Phil. 3:1; 4:4
      marker-yv: yv-n
    - type: text
      text: 'in the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', O you righteous!'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: For
    - type: text
      text: ' praise from the upright is beautiful.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 2:1–3); Is. 8:10; 19:3
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brings the counsel of the nations to nothing;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He makes the plans of the peoples of no effect.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 23:13; Prov. 19:21)
      marker-yv: yv-n
    - type: text
      text: 'The counsel of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' stands forever,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The plans of His heart to all generations.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the nation whose God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The people He has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 19:5; Deut. 7:6); Ps. 28:9
      marker-yv: yv-n
    - type: text
      text: chosen as His own inheritance.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 28:24; (Ps. 14:2)
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' looks from heaven;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He sees all the sons of men.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From the place of His dwelling He looks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: On all the inhabitants of the earth;
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He fashions their hearts individually;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Chr. 16:9); Job 34:21; (Jer. 32:19)
      marker-yv: yv-n
    - type: text
      text: He considers all their works.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 44:6; 60:11; (Jer. 9:23, 24)
      marker-yv: yv-n
    - type: text
      text: 'No king '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' saved by the multitude of an army;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A mighty man is not delivered by great strength.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 20:7; 147:10; Prov. 21:31)
      marker-yv: yv-n
    - type: text
      text: 'A horse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a vain hope for safety;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Neither shall it deliver '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' by its great strength.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 36:7); Ps. 32:8; 34:15; (1 Pet. 3:12)
      marker-yv: yv-n
    - type: text
      text: 'Behold, the eye of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' on those who fear Him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: On those who hope in His mercy,
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To deliver their soul from death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:20; Ps. 37:19
      marker-yv: yv-n
    - type: text
      text: to keep them alive in famine.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with the harp;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Make melody to Him with an instrument of ten strings.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Our soul waits for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' our help and our shield.'
  '21':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For our heart shall rejoice in Him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because we have trusted in His holy name.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let Your mercy, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', be upon us,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Just as we hope in You.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sing to Him a new song;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Play skillfully with a shout of joy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' right,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And all His work '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: done
    - type: text
      text: ' in truth.'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He loves righteousness and justice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The earth is full of the goodness of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:6, 7; Ps. 148:5; (Heb. 11:3; 2 Pet. 3:5)
      marker-yv: yv-n
    - type: text
      text: 'By the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the heavens were made,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 2:1
      marker-yv: yv-n
    - type: text
      text: 'host of them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 26:13)
      marker-yv: yv-n
    - type: text
      text: by the breath of His mouth.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:9; Job 26:10; 38:8
      marker-yv: yv-n
    - type: text
      text: He gathers the waters of the sea together as a heap;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He lays up the deep in storehouses.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let all the earth fear the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let all the inhabitants of the world stand in awe of Him.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:3; Ps. 148:5
      marker-yv: yv-n
    - type: text
      text: 'He spoke, and it was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: done;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He commanded, and it stood fast.
