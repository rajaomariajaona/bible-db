document_id: LEV.20,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Penalties for Breaking the Law
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: note
    content: Ex. 20:14; Lev. 18:20; Deut. 5:18; 22:22; John 8:4, 5
  - type: text
    content: '‘The man who commits adultery with another man’s wife, he who commits adultery with his neighbor’s wife, the adulterer and the adulteress, shall surely be put to death. '
  '11':
  - type: text
    content: 'The man who lies with his '
  - type: note
    content: Lev. 18:7, 8; Deut. 27:20
  - type: text
    content: 'father’s wife has uncovered his father’s nakedness; both of them shall surely be put to death. Their blood shall be upon them. '
  '12':
  - type: text
    content: 'If a man lies with his '
  - type: note
    content: Lev. 18:15
  - type: text
    content: 'daughter-in-law, both of them shall surely be put to death. They have committed perversion. Their blood shall be upon them. '
  '13':
  - type: note
    content: Lev. 18:22; Deut. 23:17; Judg. 19:22
  - type: text
    content: 'If a man lies with a male as he lies with a woman, both of them have committed an abomination. They shall surely be put to death. Their blood shall be upon them. '
  '14':
  - type: text
    content: 'If a man marries a woman and her '
  - type: note
    content: Lev. 18:17
  - type: text
    content: 'mother, it is wickedness. They shall be burned with fire, both he and they, that there may be no wickedness among you. '
  '15':
  - type: text
    content: 'If a man mates with an '
  - type: note
    content: Lev. 18:23; Deut. 27:21
  - type: text
    content: 'animal, he shall surely be put to death, and you shall kill the animal. '
  '16':
  - type: text
    content: If a woman approaches any animal and mates with it, you shall kill the woman and the animal. They shall surely be put to death. Their blood is upon them.
  '17':
  - type: text
    content: '‘If a man takes his '
  - type: note
    content: Lev. 18:9; Deut. 27:22
  - type: text
    content: 'sister, his father’s daughter or his mother’s daughter, and sees her nakedness and she sees his nakedness, it is a wicked thing. And they shall be cut off in the sight of their people. He has uncovered his sister’s nakedness. He shall bear his guilt. '
  '18':
  - type: note
    content: Lev. 15:24; 18:19
  - type: text
    content: If a man lies with a woman during her sickness and uncovers her nakedness, he has exposed her flow, and she has uncovered the flow of her blood. Both of them shall be cut off from their people.
  '19':
  - type: text
    content: '‘You shall not uncover the nakedness of your '
  - type: note
    content: Lev. 18:13
  - type: text
    content: 'mother’s sister nor of your '
  - type: note
    content: Lev. 18:12
  - type: text
    content: 'father’s sister, for that would uncover his near of kin. They shall bear their guilt. '
  '2':
  - type: note
    content: Lev. 18:2
  - type: text
    content: '“Again, you shall say to the children of Israel: '
  - type: note
    content: Lev. 18:21; 2 Kin. 23:10; 2 Chr. 33:6; Jer. 7:31
  - type: text
    content: '‘Whoever of the children of Israel, or of the strangers who dwell in Israel, who gives any of his descendants to Molech, he shall surely be put to death. The people of the land shall '
  - type: note
    content: Deut. 17:2–5
  - type: text
    content: 'stone him with stones. '
  '20':
  - type: text
    content: 'If a man lies with his '
  - type: note
    content: Lev. 18:14
  - type: text
    content: 'uncle’s wife, he has uncovered his uncle’s nakedness. They shall bear their sin; they shall die childless. '
  '21':
  - type: text
    content: 'If a man takes his '
  - type: note
    content: Lev. 18:16; Matt. 14:3, 4
  - type: text
    content: brother’s wife, it is an unclean thing. He has uncovered his brother’s nakedness. They shall be childless.
  '22':
  - type: text
    content: '‘You shall therefore keep all My '
  - type: note
    content: Lev. 18:26; 19:37
  - type: text
    content: 'statutes and all My judgments, and perform them, that the land where I am bringing you to dwell '
  - type: note
    content: Lev. 18:25, 28; 2 Chr. 36:14–16
  - type: text
    content: 'may not vomit you out. '
  '23':
  - type: note
    content: Lev. 18:3, 24
  - type: text
    content: 'And you shall not walk in the statutes of the nation which I am casting out before you; for they commit all these things, and '
  - type: note
    content: Deut. 9:5
  - type: text
    content: 'therefore I abhor them. '
  '24':
  - type: text
    content: 'But '
  - type: note
    content: Ex. 3:17; 6:8; 13:5; 33:1–3
  - type: text
    content: 'I have said to you, “You shall inherit their land, and I will give it to you to possess, a land flowing with milk and honey.” I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, '
  - type: note
    content: Ex. 19:5; 33:16; Lev. 20:26; Deut. 7:6; 14:2; 1 Kin. 8:53
  - type: text
    content: 'who has separated you from the peoples. '
  '25':
  - type: note
    content: Lev. 10:10; 11:1–47; Deut. 14:3–21
  - type: text
    content: 'You shall therefore distinguish between clean animals and unclean, between unclean birds and clean, '
  - type: note
    content: Lev. 11:43
  - type: text
    content: 'and you shall not make yourselves abominable by beast or by bird, or by any kind of living thing that creeps on the ground, which I have separated from you as unclean. '
  '26':
  - type: text
    content: 'And you shall be holy to Me, '
  - type: note
    content: Lev. 19:2; 1 Pet. 1:16
  - type: text
    content: 'for I the '
  - type: heading
    content: Lord
  - type: text
    content: ' am holy, and have separated you from the peoples, that you should be Mine.'
  '27':
  - type: note
    content: Lev. 19:31; 1 Sam. 28:9
  - type: text
    content: ‘A man or a woman who is a medium, or who has familiar spirits, shall surely be put to death; they shall stone them with stones. Their blood shall be upon them.’ ”
  '3':
  - type: note
    content: Lev. 17:10
  - type: text
    content: 'I will set My face against that man, and will cut him off from his people, because he has given some of his descendants to Molech, to defile My sanctuary and profane My holy name. '
  '4':
  - type: text
    content: 'And if the people of the land should in any way hide their eyes from the man, when he gives some of his descendants to Molech, and they do not kill him, '
  '5':
  - type: text
    content: then I will set My face against that man and against his family; and I will cut him off from his people, and all who prostitute themselves with him to commit harlotry with Molech.
  '6':
  - type: text
    content: '‘And '
  - type: note
    content: Lev. 19:31; 1 Sam. 28:7–25
  - type: text
    content: 'the person who turns to mediums and familiar spirits, to prostitute himself with them, I will set My face against that person and cut him off from his people. '
  '7':
  - type: note
    content: Lev. 19:2; Heb. 12:14
  - type: text
    content: 'Consecrate yourselves therefore, and be holy, for I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. '
  '8':
  - type: text
    content: 'And you shall keep '
  - type: note
    content: Lev. 19:19, 37
  - type: text
    content: 'My statutes, and perform them: '
  - type: note
    content: Ex. 31:13; Deut. 14:2; Ezek. 37:28
  - type: text
    content: 'I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' who sanctifies you.'
  '9':
  - type: text
    content: '‘For '
  - type: note
    content: Ex. 21:17; Deut. 27:16; Prov. 20:20; Matt. 15:4
  - type: text
    content: 'everyone who curses his father or his mother shall surely be put to death. He has cursed his father or his mother. '
  - type: note
    content: 2 Sam. 1:16
  - type: text
    content: His blood shall be upon him.
