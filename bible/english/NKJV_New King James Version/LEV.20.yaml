document_id: LEV.20,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Penalties for Breaking the Law
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:14; Lev. 18:20; Deut. 5:18; 22:22; John 8:4, 5
      marker-yv: yv-n
    - type: text
      text: '‘The man who commits adultery with another man’s wife, he who commits adultery with his neighbor’s wife, the adulterer and the adulteress, shall surely be put to death. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The man who lies with his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:7, 8; Deut. 27:20
      marker-yv: yv-n
    - type: text
      text: 'father’s wife has uncovered his father’s nakedness; both of them shall surely be put to death. Their blood shall be upon them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'If a man lies with his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:15
      marker-yv: yv-n
    - type: text
      text: 'daughter-in-law, both of them shall surely be put to death. They have committed perversion. Their blood shall be upon them. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:22; Deut. 23:17; Judg. 19:22
      marker-yv: yv-n
    - type: text
      text: 'If a man lies with a male as he lies with a woman, both of them have committed an abomination. They shall surely be put to death. Their blood shall be upon them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'If a man marries a woman and her '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:17
      marker-yv: yv-n
    - type: text
      text: 'mother, it is wickedness. They shall be burned with fire, both he and they, that there may be no wickedness among you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'If a man mates with an '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:23; Deut. 27:21
      marker-yv: yv-n
    - type: text
      text: 'animal, he shall surely be put to death, and you shall kill the animal. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: If a woman approaches any animal and mates with it, you shall kill the woman and the animal. They shall surely be put to death. Their blood is upon them.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '‘If a man takes his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:9; Deut. 27:22
      marker-yv: yv-n
    - type: text
      text: 'sister, his father’s daughter or his mother’s daughter, and sees her nakedness and she sees his nakedness, it is a wicked thing. And they shall be cut off in the sight of their people. He has uncovered his sister’s nakedness. He shall bear his guilt. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:24; 18:19
      marker-yv: yv-n
    - type: text
      text: If a man lies with a woman during her sickness and uncovers her nakedness, he has exposed her flow, and she has uncovered the flow of her blood. Both of them shall be cut off from their people.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '‘You shall not uncover the nakedness of your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:13
      marker-yv: yv-n
    - type: text
      text: 'mother’s sister nor of your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:12
      marker-yv: yv-n
    - type: text
      text: 'father’s sister, for that would uncover his near of kin. They shall bear their guilt. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:2
      marker-yv: yv-n
    - type: text
      text: '“Again, you shall say to the children of Israel: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:21; 2 Kin. 23:10; 2 Chr. 33:6; Jer. 7:31
      marker-yv: yv-n
    - type: text
      text: '‘Whoever of the children of Israel, or of the strangers who dwell in Israel, who gives any of his descendants to Molech, he shall surely be put to death. The people of the land shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 17:2–5
      marker-yv: yv-n
    - type: text
      text: 'stone him with stones. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'If a man lies with his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:14
      marker-yv: yv-n
    - type: text
      text: 'uncle’s wife, he has uncovered his uncle’s nakedness. They shall bear their sin; they shall die childless. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'If a man takes his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:16; Matt. 14:3, 4
      marker-yv: yv-n
    - type: text
      text: brother’s wife, it is an unclean thing. He has uncovered his brother’s nakedness. They shall be childless.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '‘You shall therefore keep all My '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:26; 19:37
      marker-yv: yv-n
    - type: text
      text: 'statutes and all My judgments, and perform them, that the land where I am bringing you to dwell '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:25, 28; 2 Chr. 36:14–16
      marker-yv: yv-n
    - type: text
      text: 'may not vomit you out. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:3, 24
      marker-yv: yv-n
    - type: text
      text: 'And you shall not walk in the statutes of the nation which I am casting out before you; for they commit all these things, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 9:5
      marker-yv: yv-n
    - type: text
      text: 'therefore I abhor them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 3:17; 6:8; 13:5; 33:1–3
      marker-yv: yv-n
    - type: text
      text: 'I have said to you, “You shall inherit their land, and I will give it to you to possess, a land flowing with milk and honey.” I am the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:5; 33:16; Lev. 20:26; Deut. 7:6; 14:2; 1 Kin. 8:53
      marker-yv: yv-n
    - type: text
      text: 'who has separated you from the peoples. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 10:10; 11:1–47; Deut. 14:3–21
      marker-yv: yv-n
    - type: text
      text: 'You shall therefore distinguish between clean animals and unclean, between unclean birds and clean, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:43
      marker-yv: yv-n
    - type: text
      text: 'and you shall not make yourselves abominable by beast or by bird, or by any kind of living thing that creeps on the ground, which I have separated from you as unclean. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And you shall be holy to Me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:2; 1 Pet. 1:16
      marker-yv: yv-n
    - type: text
      text: 'for I the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' am holy, and have separated you from the peoples, that you should be Mine.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:31; 1 Sam. 28:9
      marker-yv: yv-n
    - type: text
      text: ‘A man or a woman who is a medium, or who has familiar spirits, shall surely be put to death; they shall stone them with stones. Their blood shall be upon them.’ ”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 17:10
      marker-yv: yv-n
    - type: text
      text: 'I will set My face against that man, and will cut him off from his people, because he has given some of his descendants to Molech, to defile My sanctuary and profane My holy name. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And if the people of the land should in any way hide their eyes from the man, when he gives some of his descendants to Molech, and they do not kill him, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: then I will set My face against that man and against his family; and I will cut him off from his people, and all who prostitute themselves with him to commit harlotry with Molech.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '‘And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:31; 1 Sam. 28:7–25
      marker-yv: yv-n
    - type: text
      text: 'the person who turns to mediums and familiar spirits, to prostitute himself with them, I will set My face against that person and cut him off from his people. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:2; Heb. 12:14
      marker-yv: yv-n
    - type: text
      text: 'Consecrate yourselves therefore, and be holy, for I am the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And you shall keep '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:19, 37
      marker-yv: yv-n
    - type: text
      text: 'My statutes, and perform them: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 31:13; Deut. 14:2; Ezek. 37:28
      marker-yv: yv-n
    - type: text
      text: 'I am the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who sanctifies you.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '‘For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 21:17; Deut. 27:16; Prov. 20:20; Matt. 15:4
      marker-yv: yv-n
    - type: text
      text: 'everyone who curses his father or his mother shall surely be put to death. He has cursed his father or his mother. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 1:16
      marker-yv: yv-n
    - type: text
      text: His blood shall be upon him.
