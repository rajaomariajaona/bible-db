verses:
  '1':
  - type: heading
    content: Samson’s Philistine Wife
  - type: text
    content: 'Now Samson went down '
  - type: note
    content: Gen. 38:13; Josh. 15:10, 57
  - type: text
    content: 'to Timnah, and '
  - type: note
    content: Gen. 34:2
  - type: text
    content: 'saw a woman in Timnah of the daughters of the Philistines. '
  '10':
  - type: text
    content: 'So his father went down to the woman. And Samson gave a feast there, for young men used to do so. '
  '11':
  - type: text
    content: And it happened, when they saw him, that they brought thirty companions to be with him.
  '12':
  - type: text
    content: 'Then Samson said to them, “Let me '
  - type: note
    content: 1 Kin. 10:1; Ezek. 17:2
  - type: text
    content: 'pose a riddle to you. If you can correctly solve and explain it to me '
  - type: note
    content: Gen. 29:27
  - type: text
    content: 'within the seven days of the feast, then I will give you thirty linen garments and thirty '
  - type: note
    content: Gen. 45:22; 2 Kin. 5:22
  - type: text
    content: 'changes of clothing. '
  '13':
  - type: text
    content: 'But if you cannot explain '
  - type: text
    content: it
  - type: text
    content: ' to me, then you shall give me thirty linen garments and thirty changes of clothing.”'
  - type: text
    content: 'And they said to him, '
  - type: note
    content: Ezek. 17:2
  - type: text
    content: “Pose your riddle, that we may hear it.”
  '14':
  - type: text
    content: 'So he said to them:'
  - type: text
    content: “Out of the eater came something to eat,
  - type: text
    content: And out of the strong came something sweet.”
  - type: text
    content: Now for three days they could not explain the riddle.
  '15':
  - type: text
    content: 'But it came to pass on the seventh day that they said to Samson’s wife, '
  - type: note
    content: Judg. 16:5
  - type: text
    content: '“Entice your husband, that he may explain the riddle to us, '
  - type: note
    content: Judg. 15:6
  - type: text
    content: 'or else we will burn you and your father’s house with fire. Have you invited us in order to take what is ours? '
  - type: text
    content: Is
  - type: text
    content: ' '
  - type: text
    content: that
  - type: text
    content: ' not '
  - type: text
    content: so?
  - type: text
    content: ”
  '16':
  - type: text
    content: 'Then Samson’s wife wept on him, and said, '
  - type: note
    content: Judg. 16:15
  - type: text
    content: '“You only hate me! You do not love me! You have posed a riddle to the sons of my people, but you have not explained '
  - type: text
    content: it
  - type: text
    content: ' to me.”'
  - type: text
    content: 'And he said to her, “Look, I have not explained '
  - type: text
    content: it
  - type: text
    content: ' to my father or my mother; so should I explain '
  - type: text
    content: it
  - type: text
    content: ' to you?” '
  '17':
  - type: text
    content: 'Now she had wept on him the seven days while their feast lasted. And it happened on the seventh day that he told her, because she pressed him so much. Then she explained the riddle to the sons of her people. '
  '18':
  - type: text
    content: 'So the men of the city said to him on the seventh day before the sun went down:'
  - type: text
    content: '“What '
  - type: text
    content: is
  - type: text
    content: ' sweeter than honey?'
  - type: text
    content: 'And what '
  - type: text
    content: is
  - type: text
    content: ' stronger than a lion?”'
  - type: text
    content: 'And he said to them:'
  - type: text
    content: “If you had not plowed with my heifer,
  - type: text
    content: You would not have solved my riddle!”
  '19':
  - type: text
    content: 'Then '
  - type: note
    content: Judg. 3:10; 13:25
  - type: text
    content: 'the Spirit of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came upon him mightily, and he went down to Ashkelon and killed thirty of their men, took their apparel, and gave the changes '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: clothing
  - type: text
    content: ' to those who had explained the riddle. So his anger was aroused, and he went back up to his father’s house. '
  '2':
  - type: text
    content: 'So he went up and told his father and mother, saying, “I have seen a woman in Timnah of the daughters of the Philistines; now therefore, '
  - type: note
    content: Gen. 21:21
  - type: text
    content: get her for me as a wife.”
  '20':
  - type: text
    content: 'And Samson’s wife '
  - type: note
    content: Judg. 15:2
  - type: text
    content: 'was '
  - type: text
    content: given
  - type: text
    content: ' to his companion, who had been '
  - type: note
    content: John 3:29
  - type: text
    content: his best man.
  '3':
  - type: text
    content: Then his father and mother said to him, “
  - type: text
    content: Is
  - type: text
    content: ' '
  - type: text
    content: there
  - type: text
    content: ' no woman among the daughters of '
  - type: note
    content: Gen. 24:3, 4
  - type: text
    content: 'your brethren, or among all my people, that you must go and get a wife from the '
  - type: note
    content: Gen. 34:14; Ex. 34:16; Deut. 7:3
  - type: text
    content: uncircumcised Philistines?”
  - type: text
    content: And Samson said to his father, “Get her for me, for she pleases me well.”
  '4':
  - type: text
    content: 'But his father and mother did not know that it was '
  - type: note
    content: Josh. 11:20; 1 Kin. 12:15; 2 Kin. 6:33; 2 Chr. 10:15
  - type: text
    content: 'of the '
  - type: heading
    content: Lord
  - type: text
    content: '—that He was seeking an occasion to move against the Philistines. For at that time '
  - type: note
    content: Deut. 28:48; Judg. 13:1
  - type: text
    content: the Philistines had dominion over Israel.
  '5':
  - type: text
    content: So Samson went down to Timnah with his father and mother, and came to the vineyards of Timnah.
  - type: text
    content: 'Now '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: his
  - type: text
    content: ' surprise, a young lion '
  - type: text
    content: came
  - type: text
    content: ' roaring against him. '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: Judg. 3:10
  - type: text
    content: 'the Spirit of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came mightily upon him, and he tore the lion apart as one would have torn apart a young goat, though '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: had
  - type: text
    content: ' nothing in his hand. But he did not tell his father or his mother what he had done.'
  '7':
  - type: text
    content: 'Then he went down and talked with the woman; and she pleased Samson well. '
  '8':
  - type: text
    content: 'After some time, when he returned to get her, he turned aside to see the carcass of the lion. And behold, a swarm of bees and honey '
  - type: text
    content: were
  - type: text
    content: ' in the carcass of the lion. '
  '9':
  - type: text
    content: 'He took some of it in his hands and went along, eating. When he came to his father and mother, he gave '
  - type: text
    content: some
  - type: text
    content: ' to them, and they also ate. But he did not tell them that he had taken the honey out of the '
  - type: note
    content: Lev. 11:27
  - type: text
    content: carcass of the lion.
