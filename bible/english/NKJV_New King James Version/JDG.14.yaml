    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Samson went down '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 38:13; Josh. 15:10, 57
    marker-yv: yv-n
  - type: text
    text: 'to Timnah, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 34:2
    marker-yv: yv-n
  - type: text
    text: 'saw a woman in Timnah of the daughters of the Philistines. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So he went up and told his father and mother, saying, “I have seen a woman in Timnah of the daughters of the Philistines; now therefore, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 21:21
    marker-yv: yv-n
  - type: text
    text: get her for me as a wife.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then his father and mother said to him, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' no woman among the daughters of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 24:3, 4
    marker-yv: yv-n
  - type: text
    text: 'your brethren, or among all my people, that you must go and get a wife from the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 34:14; Ex. 34:16; Deut. 7:3
    marker-yv: yv-n
  - type: text
    text: uncircumcised Philistines?”
- type: usfm
  marker: p
  children:
  - type: text
    text: And Samson said to his father, “Get her for me, for she pleases me well.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But his father and mother did not know that it was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 11:20; 1 Kin. 12:15; 2 Kin. 6:33; 2 Chr. 10:15
    marker-yv: yv-n
  - type: text
    text: 'of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '—that He was seeking an occasion to move against the Philistines. For at that time '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 28:48; Judg. 13:1
    marker-yv: yv-n
  - type: text
    text: the Philistines had dominion over Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So Samson went down to Timnah with his father and mother, and came to the vineyards of Timnah.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' surprise, a young lion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: came
  - type: text
    text: ' roaring against him. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 3:10
    marker-yv: yv-n
  - type: text
    text: 'the Spirit of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came mightily upon him, and he tore the lion apart as one would have torn apart a young goat, though '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had
  - type: text
    text: ' nothing in his hand. But he did not tell his father or his mother what he had done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he went down and talked with the woman; and she pleased Samson well. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'After some time, when he returned to get her, he turned aside to see the carcass of the lion. And behold, a swarm of bees and honey '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in the carcass of the lion. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He took some of it in his hands and went along, eating. When he came to his father and mother, he gave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' to them, and they also ate. But he did not tell them that he had taken the honey out of the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 11:27
    marker-yv: yv-n
  - type: text
    text: carcass of the lion.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So his father went down to the woman. And Samson gave a feast there, for young men used to do so. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And it happened, when they saw him, that they brought thirty companions to be with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Samson said to them, “Let me '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 10:1; Ezek. 17:2
    marker-yv: yv-n
  - type: text
    text: 'pose a riddle to you. If you can correctly solve and explain it to me '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 29:27
    marker-yv: yv-n
  - type: text
    text: 'within the seven days of the feast, then I will give you thirty linen garments and thirty '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 45:22; 2 Kin. 5:22
    marker-yv: yv-n
  - type: text
    text: 'changes of clothing. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But if you cannot explain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' to me, then you shall give me thirty linen garments and thirty changes of clothing.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And they said to him, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 17:2
    marker-yv: yv-n
  - type: text
    text: “Pose your riddle, that we may hear it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So he said to them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Out of the eater came something to eat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And out of the strong came something sweet.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Now for three days they could not explain the riddle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But it came to pass on the seventh day that they said to Samson’s wife, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 16:5
    marker-yv: yv-n
  - type: text
    text: '“Entice your husband, that he may explain the riddle to us, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 15:6
    marker-yv: yv-n
  - type: text
    text: 'or else we will burn you and your father’s house with fire. Have you invited us in order to take what is ours? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so?
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Samson’s wife wept on him, and said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 16:15
    marker-yv: yv-n
  - type: text
    text: '“You only hate me! You do not love me! You have posed a riddle to the sons of my people, but you have not explained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' to me.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And he said to her, “Look, I have not explained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' to my father or my mother; so should I explain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' to you?” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now she had wept on him the seven days while their feast lasted. And it happened on the seventh day that he told her, because she pressed him so much. Then she explained the riddle to the sons of her people. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So the men of the city said to him on the seventh day before the sun went down:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“What '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' sweeter than honey?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' stronger than a lion?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And he said to them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “If you had not plowed with my heifer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: You would not have solved my riddle!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 3:10; 13:25
    marker-yv: yv-n
  - type: text
    text: 'the Spirit of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came upon him mightily, and he went down to Ashkelon and killed thirty of their men, took their apparel, and gave the changes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: clothing
  - type: text
    text: ' to those who had explained the riddle. So his anger was aroused, and he went back up to his father’s house. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Samson’s wife '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 15:2
    marker-yv: yv-n
  - type: text
    text: 'was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: given
  - type: text
    text: ' to his companion, who had been '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 3:29
    marker-yv: yv-n
  - type: text
    text: his best man.
