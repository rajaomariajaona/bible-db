document_id: REV.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Beast from the Sea
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then I stood on the sand of the sea. And I saw '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 7:2, 7
    marker-yv: yv-n
  - type: text
    text: 'a beast rising up out of the sea, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 12:3
    marker-yv: yv-n
  - type: text
    text: 'having seven heads and ten horns, and on his horns ten crowns, and on his heads a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 7:8; 11:36; Rev. 17:3
    marker-yv: yv-n
  - type: text
    text: 'blasphemous name. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now the beast which I saw was like a leopard, his feet were like '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: feet
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' a bear, and his mouth like the mouth of a lion. The '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 12:3, 9; 13:4, 12
    marker-yv: yv-n
  - type: text
    text: 'dragon gave him his power, his throne, and great authority. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And I saw one of his heads '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 13:12, 14
    marker-yv: yv-n
  - type: text
    text: 'as if it had been mortally wounded, and his deadly wound was healed. And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 17:8
    marker-yv: yv-n
  - type: text
    text: 'all the world marveled and followed the beast. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So they worshiped the dragon who gave authority to the beast; and they worshiped the beast, saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 15:11; Is. 46:5; Rev. 18:18
    marker-yv: yv-n
  - type: text
    text: '“Who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' like the beast? Who is able to make war with him?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he was given '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 7:8, 11, 20, 25; 11:36; 2 Thess. 2:3
    marker-yv: yv-n
  - type: text
    text: 'a mouth speaking great things and blasphemies, and he was given authority to continue for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 11:2
    marker-yv: yv-n
  - type: text
    text: 'forty-two months. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then he opened his mouth in blasphemy against God, to blaspheme His name, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 1:14; Col. 2:9)
    marker-yv: yv-n
  - type: text
    text: 'His tabernacle, and those who dwell in heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'It was granted to him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 7:21; Rev. 11:7
    marker-yv: yv-n
  - type: text
    text: 'to make war with the saints and to overcome them. And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 11:18
    marker-yv: yv-n
  - type: text
    text: 'authority was given him over every tribe, tongue, and nation. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'All who dwell on the earth will worship him, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 32:32; (Rev. 20:12–15)
    marker-yv: yv-n
  - type: text
    text: 'whose names have not been written in the Book of Life of the Lamb slain '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 25:34; Rev. 17:8
    marker-yv: yv-n
  - type: text
    text: from the foundation of the world.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 2:7
    marker-yv: yv-n
  - type: text
    text: 'If anyone has an ear, let him hear. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 33:1; Jer. 15:2; 43:11
    marker-yv: yv-n
  - type: text
    text: 'He who leads into captivity shall go into captivity; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 9:6; Matt. 26:52; Rev. 11:18
    marker-yv: yv-n
  - type: text
    text: 'he who kills with the sword must be killed with the sword. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. 6:12; Rev. 14:12
    marker-yv: yv-n
  - type: text
    text: Here is the patience and the faith of the saints.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Beast from the Earth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then I saw another beast '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 11:7
    marker-yv: yv-n
  - type: text
    text: 'coming up out of the earth, and he had two horns like a lamb and spoke like a dragon. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he exercises all the authority of the first beast in his presence, and causes the earth and those who dwell in it to worship the first beast, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 13:3, 4
    marker-yv: yv-n
  - type: text
    text: 'whose deadly wound was healed. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 13:1; Matt. 24:24; 2 Thess. 2:9; Rev. 16:14
    marker-yv: yv-n
  - type: text
    text: 'He performs great signs, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 18:38; 2 Kin. 1:10; Luke 9:54; Rev. 11:5; 20:9
    marker-yv: yv-n
  - type: text
    text: 'so that he even makes fire come down from heaven on the earth in the sight of men. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 12:9
    marker-yv: yv-n
  - type: text
    text: 'And he deceives those who dwell on the earth '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Thess. 2:9
    marker-yv: yv-n
  - type: text
    text: 'by those signs which he was granted to do in the sight of the beast, telling those who dwell on the earth to make an image to the beast who was wounded by the sword '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 20:7
    marker-yv: yv-n
  - type: text
    text: 'and lived. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He was granted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: power
  - type: text
    text: ' to give breath to the image of the beast, that the image of the beast should both speak '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 16:2
    marker-yv: yv-n
  - type: text
    text: 'and cause as many as would not worship the image of the beast to be killed. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He causes all, both small and great, rich and poor, free and slave, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gal. 6:17; Rev. 7:3; 14:9; 20:4
    marker-yv: yv-n
  - type: text
    text: 'to receive a mark on their right hand or on their foreheads, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and that no one may buy or sell except one who has the mark or '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 14:9–11
    marker-yv: yv-n
  - type: text
    text: 'the name of the beast, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 15:2
    marker-yv: yv-n
  - type: text
    text: or the number of his name.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 17:9
    marker-yv: yv-n
  - type: text
    text: 'Here is wisdom. Let him who has '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 2:14)
    marker-yv: yv-n
  - type: text
    text: 'understanding calculate '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 15:2
    marker-yv: yv-n
  - type: text
    text: 'the number of the beast, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 21:17
    marker-yv: yv-n
  - type: text
    text: 'for it is the number of a man: His number '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' 666.'
