document_id: REV.13,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Beast from the Sea
  - type: text
    content: 'Then I stood on the sand of the sea. And I saw '
  - type: note
    content: Dan. 7:2, 7
  - type: text
    content: 'a beast rising up out of the sea, '
  - type: note
    content: Rev. 12:3
  - type: text
    content: 'having seven heads and ten horns, and on his horns ten crowns, and on his heads a '
  - type: note
    content: Dan. 7:8; 11:36; Rev. 17:3
  - type: text
    content: 'blasphemous name. '
  '10':
  - type: note
    content: Is. 33:1; Jer. 15:2; 43:11
  - type: text
    content: 'He who leads into captivity shall go into captivity; '
  - type: note
    content: Gen. 9:6; Matt. 26:52; Rev. 11:18
  - type: text
    content: 'he who kills with the sword must be killed with the sword. '
  - type: note
    content: Heb. 6:12; Rev. 14:12
  - type: text
    content: Here is the patience and the faith of the saints.
  - type: heading
    content: The Beast from the Earth
  '11':
  - type: text
    content: 'Then I saw another beast '
  - type: note
    content: Rev. 11:7
  - type: text
    content: 'coming up out of the earth, and he had two horns like a lamb and spoke like a dragon. '
  '12':
  - type: text
    content: 'And he exercises all the authority of the first beast in his presence, and causes the earth and those who dwell in it to worship the first beast, '
  - type: note
    content: Rev. 13:3, 4
  - type: text
    content: 'whose deadly wound was healed. '
  '13':
  - type: note
    content: Deut. 13:1; Matt. 24:24; 2 Thess. 2:9; Rev. 16:14
  - type: text
    content: 'He performs great signs, '
  - type: note
    content: 1 Kin. 18:38; 2 Kin. 1:10; Luke 9:54; Rev. 11:5; 20:9
  - type: text
    content: 'so that he even makes fire come down from heaven on the earth in the sight of men. '
  '14':
  - type: note
    content: Rev. 12:9
  - type: text
    content: 'And he deceives those who dwell on the earth '
  - type: note
    content: 2 Thess. 2:9
  - type: text
    content: 'by those signs which he was granted to do in the sight of the beast, telling those who dwell on the earth to make an image to the beast who was wounded by the sword '
  - type: note
    content: 2 Kin. 20:7
  - type: text
    content: 'and lived. '
  '15':
  - type: text
    content: 'He was granted '
  - type: text
    content: power
  - type: text
    content: ' to give breath to the image of the beast, that the image of the beast should both speak '
  - type: note
    content: Rev. 16:2
  - type: text
    content: 'and cause as many as would not worship the image of the beast to be killed. '
  '16':
  - type: text
    content: 'He causes all, both small and great, rich and poor, free and slave, '
  - type: note
    content: Gal. 6:17; Rev. 7:3; 14:9; 20:4
  - type: text
    content: 'to receive a mark on their right hand or on their foreheads, '
  '17':
  - type: text
    content: 'and that no one may buy or sell except one who has the mark or '
  - type: note
    content: Rev. 14:9–11
  - type: text
    content: 'the name of the beast, '
  - type: note
    content: Rev. 15:2
  - type: text
    content: or the number of his name.
  '18':
  - type: note
    content: Rev. 17:9
  - type: text
    content: 'Here is wisdom. Let him who has '
  - type: note
    content: (1 Cor. 2:14)
  - type: text
    content: 'understanding calculate '
  - type: note
    content: Rev. 15:2
  - type: text
    content: 'the number of the beast, '
  - type: note
    content: Rev. 21:17
  - type: text
    content: 'for it is the number of a man: His number '
  - type: text
    content: is
  - type: text
    content: ' 666.'
  '2':
  - type: text
    content: 'Now the beast which I saw was like a leopard, his feet were like '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: feet
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' a bear, and his mouth like the mouth of a lion. The '
  - type: note
    content: Rev. 12:3, 9; 13:4, 12
  - type: text
    content: 'dragon gave him his power, his throne, and great authority. '
  '3':
  - type: text
    content: 'And I saw one of his heads '
  - type: note
    content: Rev. 13:12, 14
  - type: text
    content: 'as if it had been mortally wounded, and his deadly wound was healed. And '
  - type: note
    content: Rev. 17:8
  - type: text
    content: 'all the world marveled and followed the beast. '
  '4':
  - type: text
    content: 'So they worshiped the dragon who gave authority to the beast; and they worshiped the beast, saying, '
  - type: note
    content: Ex. 15:11; Is. 46:5; Rev. 18:18
  - type: text
    content: '“Who '
  - type: text
    content: is
  - type: text
    content: ' like the beast? Who is able to make war with him?”'
  '5':
  - type: text
    content: 'And he was given '
  - type: note
    content: Dan. 7:8, 11, 20, 25; 11:36; 2 Thess. 2:3
  - type: text
    content: 'a mouth speaking great things and blasphemies, and he was given authority to continue for '
  - type: note
    content: Rev. 11:2
  - type: text
    content: 'forty-two months. '
  '6':
  - type: text
    content: 'Then he opened his mouth in blasphemy against God, to blaspheme His name, '
  - type: note
    content: (John 1:14; Col. 2:9)
  - type: text
    content: 'His tabernacle, and those who dwell in heaven. '
  '7':
  - type: text
    content: 'It was granted to him '
  - type: note
    content: Dan. 7:21; Rev. 11:7
  - type: text
    content: 'to make war with the saints and to overcome them. And '
  - type: note
    content: Rev. 11:18
  - type: text
    content: 'authority was given him over every tribe, tongue, and nation. '
  '8':
  - type: text
    content: 'All who dwell on the earth will worship him, '
  - type: note
    content: Ex. 32:32; (Rev. 20:12–15)
  - type: text
    content: 'whose names have not been written in the Book of Life of the Lamb slain '
  - type: note
    content: Matt. 25:34; Rev. 17:8
  - type: text
    content: from the foundation of the world.
  '9':
  - type: note
    content: Rev. 2:7
  - type: text
    content: 'If anyone has an ear, let him hear. '
