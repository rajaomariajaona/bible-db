document_id: JHN.18,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Betrayal and Arrest in Gethsemane
  - type: text
    content: 'When Jesus had spoken these words, '
  - type: note
    content: Matt. 26:30, 36; Mark 14:26, 32; Luke 22:39
  - type: text
    content: 'He went out with His disciples over '
  - type: note
    content: 2 Sam. 15:23; 1 Kin. 2:37; 15:13; 2 Kin. 23:4, 6, 12; 2 Chr. 15:16; 29:16; 30:14; Jer. 31:40
  - type: text
    content: 'the Brook Kidron, where there was a garden, which He and His disciples entered. '
  '10':
  - type: note
    content: Matt. 26:51; Mark 14:47; Luke 22:49, 50
  - type: text
    content: Then Simon Peter, having a sword, drew it and struck the high priest’s servant, and cut off his right ear. The servant’s name was Malchus.
  '11':
  - type: text
    content: 'So Jesus said to Peter, '
  - type: text
    content: '“Put your sword into the sheath. Shall I not drink '
  - type: note
    content: Matt. 20:22; 26:39; Mark 14:36; Luke 22:42
  - type: text
    content: the cup which My Father has given Me?”
  - type: heading
    content: Before the High Priest
  '12':
  - type: text
    content: 'Then the detachment '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: troops
  - type: text
    content: ' and the captain and the officers of the Jews arrested Jesus and bound Him. '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 26:57
  - type: text
    content: 'they led Him away to '
  - type: note
    content: Luke 3:2; John 18:24; Acts 4:6
  - type: text
    content: 'Annas first, for he was the father-in-law of '
  - type: note
    content: Matt. 26:3; John 11:49, 51
  - type: text
    content: 'Caiaphas who was high priest that year. '
  '14':
  - type: note
    content: John 11:50
  - type: text
    content: Now it was Caiaphas who advised the Jews that it was expedient that one man should die for the people.
  - type: heading
    content: Peter Denies Jesus
  '15':
  - type: note
    content: Matt. 26:58; Mark 14:54; Luke 22:54
  - type: text
    content: 'And Simon Peter followed Jesus, and so '
  - type: text
    content: did
  - type: text
    content: ' '
  - type: note
    content: John 20:2–5
  - type: text
    content: 'another disciple. Now that disciple was known to the high priest, and went with Jesus into the courtyard of the high priest. '
  '16':
  - type: note
    content: Matt. 26:69; Mark 14:66–68; Luke 22:55–57
  - type: text
    content: 'But Peter stood at the door outside. Then the other disciple, who was known to the high priest, went out and spoke to her who kept the door, and brought Peter in. '
  '17':
  - type: text
    content: 'Then the servant girl who kept the door said to Peter, “You are not also '
  - type: text
    content: one
  - type: text
    content: ' of this Man’s disciples, are you?”'
  - type: text
    content: 'He said, “I am '
  - type: note
    content: Matt. 26:34
  - type: text
    content: not.”
  '18':
  - type: text
    content: Now the servants and officers who had made a fire of coals stood there, for it was cold, and they warmed themselves. And Peter stood with them and warmed himself.
  - type: heading
    content: Jesus Questioned by the High Priest
  '19':
  - type: text
    content: The high priest then asked Jesus about His disciples and His doctrine.
  '2':
  - type: text
    content: 'And Judas, who betrayed Him, also knew the place; '
  - type: note
    content: Luke 21:37; 22:39
  - type: text
    content: 'for Jesus often met there with His disciples. '
  '20':
  - type: text
    content: 'Jesus answered him, '
  - type: note
    content: Matt. 26:55; Luke 4:15; John 8:26
  - type: text
    content: '“I spoke openly to the world. I always taught '
  - type: note
    content: John 6:59
  - type: text
    content: 'in synagogues and '
  - type: note
    content: Mark 14:49; John 7:14, 28
  - type: text
    content: 'in the temple, where '
  - type: text
    content: the Jews always meet,
  - type: text
    content: ' and in secret I have said nothing.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Why do you ask Me? Ask '
  - type: note
    content: Mark 12:37
  - type: text
    content: those who have heard Me what I said to them. Indeed they know what I said.”
  '22':
  - type: text
    content: 'And when He had said these things, one of the officers who stood by '
  - type: note
    content: Job 16:10; Is. 50:6; Jer. 20:2; Lam. 3:30; Acts 23:2
  - type: text
    content: struck Jesus with the palm of his hand, saying, “Do You answer the high priest like that?”
  '23':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: “If I have spoken evil, bear witness of the evil; but if well, why do you strike Me?”
  '24':
  - type: note
    content: Matt. 26:57; Luke 3:2; Acts 4:6
  - type: text
    content: 'Then Annas sent Him bound to '
  - type: note
    content: John 11:49
  - type: text
    content: Caiaphas the high priest.
  - type: heading
    content: Peter Denies Twice More
  '25':
  - type: text
    content: 'Now Simon Peter stood and warmed himself. '
  - type: note
    content: Matt. 26:71–75; Mark 14:69–72; Luke 22:58–62
  - type: text
    content: 'Therefore they said to him, “You are not also '
  - type: text
    content: one
  - type: text
    content: ' of His disciples, are you?”'
  - type: text
    content: 'He denied '
  - type: text
    content: it
  - type: text
    content: ' and said, “I am not!”'
  '26':
  - type: text
    content: 'One of the servants of the high priest, a relative '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: him
  - type: text
    content: ' whose ear Peter cut off, said, “Did I not see you in the garden with Him?” '
  '27':
  - type: text
    content: 'Peter then denied again; and '
  - type: note
    content: Matt. 26:74; Mark 14:72; Luke 22:60; John 13:38
  - type: text
    content: immediately a rooster crowed.
  - type: heading
    content: In Pilate’s Court
  '28':
  - type: note
    content: Matt. 27:2; Mark 15:1; Luke 23:1; Acts 3:13
  - type: text
    content: 'Then they led Jesus from Caiaphas to the Praetorium, and it was early morning. '
  - type: note
    content: John 11:55; Acts 10:28; 11:3
  - type: text
    content: 'But they themselves did not go into the Praetorium, lest they should be defiled, but that they might eat the Passover. '
  '29':
  - type: note
    content: Matt. 27:11–14; Mark 15:2–5; Luke 23:2, 3
  - type: text
    content: Pilate then went out to them and said, “What accusation do you bring against this Man?”
  '3':
  - type: note
    content: Matt. 26:47–56; Mark 14:43–50; Luke 22:47–53; Acts 1:16
  - type: text
    content: 'Then Judas, having received a detachment '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: troops,
  - type: text
    content: ' and officers from the chief priests and Pharisees, came there with lanterns, torches, and weapons. '
  '30':
  - type: text
    content: They answered and said to him, “If He were not an evildoer, we would not have delivered Him up to you.”
  '31':
  - type: text
    content: Then Pilate said to them, “You take Him and judge Him according to your law.”
  - type: text
    content: 'Therefore the Jews said to him, “It is not lawful for us to put anyone to death,” '
  '32':
  - type: note
    content: Matt. 20:17–19; 26:2; Mark 10:33; Luke 18:32
  - type: text
    content: 'that the saying of Jesus might be fulfilled which He spoke, '
  - type: note
    content: John 3:14; 8:28; 12:32, 33
  - type: text
    content: signifying by what death He would die.
  '33':
  - type: note
    content: Matt. 27:11
  - type: text
    content: Then Pilate entered the Praetorium again, called Jesus, and said to Him, “Are You the King of the Jews?”
  '34':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: “Are you speaking for yourself about this, or did others tell you this concerning Me?”
  '35':
  - type: text
    content: Pilate answered, “Am I a Jew? Your own nation and the chief priests have delivered You to me. What have You done?”
  '36':
  - type: note
    content: 1 Tim. 6:13
  - type: text
    content: 'Jesus answered, '
  - type: note
    content: (Dan. 2:44; 7:14); Luke 12:14; John 6:15; 8:15
  - type: text
    content: “My kingdom is not of this world. If My kingdom were of this world, My servants would fight, so that I should not be delivered to the Jews; but now My kingdom is not from here.”
  '37':
  - type: text
    content: Pilate therefore said to Him, “Are You a king then?”
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“You say '
  - type: text
    content: rightly
  - type: text
    content: ' that I am a king. For this cause I was born, and for this cause I have come into the world, '
  - type: note
    content: (Matt. 5:17; 20:28; Luke 4:43; 12:49; 19:10; John 3:17; 9:39; 10:10; 12:47)
  - type: text
    content: 'that I should bear '
  - type: note
    content: Is. 55:4; Rev. 1:5
  - type: text
    content: 'witness to the truth. Everyone who '
  - type: note
    content: (John 14:6)
  - type: text
    content: 'is of the truth '
  - type: note
    content: John 8:47; 10:27; (1 John 3:19; 4:6)
  - type: text
    content: hears My voice.”
  '38':
  - type: text
    content: 'Pilate said to Him, “What is truth?” And when he had said this, he went out again to the Jews, and said to them, '
  - type: note
    content: Is. 53:9; Matt. 27:24; Luke 23:4; John 19:4, 6; 1 Pet. 2:22–24
  - type: text
    content: “I find no fault in Him at all.
  - type: heading
    content: Taking the Place of Barabbas
  '39':
  - type: note
    content: Matt. 27:15–26; Mark 15:6–15; Luke 23:17–25
  - type: text
    content: “But you have a custom that I should release someone to you at the Passover. Do you therefore want me to release to you the King of the Jews?”
  '4':
  - type: text
    content: 'Jesus therefore, '
  - type: note
    content: John 6:64; 13:1, 3; 19:28
  - type: text
    content: 'knowing all things that would come upon Him, went forward and said to them, '
  - type: text
    content: “Whom are you seeking?”
  '40':
  - type: note
    content: Is. 53:3; Acts 3:14
  - type: text
    content: 'Then they all cried again, saying, “Not this Man, but Barabbas!” '
  - type: note
    content: Luke 23:19
  - type: text
    content: Now Barabbas was a robber.
  '5':
  - type: text
    content: 'They answered Him, '
  - type: note
    content: Matt. 21:11; Mark 1:24; 14:67; 16:6; Luke 18:37; 24:19
  - type: text
    content: “Jesus of Nazareth.”
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: '“I am '
  - type: text
    content: He.
  - type: text
    content: ”
  - type: text
    content: ' And Judas, who '
  - type: note
    content: Ps. 41:9; Matt. 20:18; 26:21; John 13:21
  - type: text
    content: 'betrayed Him, also stood with them. '
  '6':
  - type: text
    content: 'Now when He said to them, '
  - type: text
    content: '“I am '
  - type: text
    content: He,
  - type: text
    content: ”
  - type: text
    content: ' they drew back and fell to the ground.'
  '7':
  - type: text
    content: 'Then He asked them again, '
  - type: text
    content: “Whom are you seeking?”
  - type: text
    content: And they said, “Jesus of Nazareth.”
  '8':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“I have told you that I am '
  - type: text
    content: He.
  - type: text
    content: ' Therefore, if you seek Me, let these go their way,”'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'that the saying might be fulfilled which He spoke, '
  - type: note
    content: (John 6:39; 17:12)
  - type: text
    content: “Of those whom You gave Me I have lost none.”
