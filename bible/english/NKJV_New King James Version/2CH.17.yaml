document_id: 2CH.17,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoshaphat Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:24; 2 Chr. 20:31
      marker-yv: yv-n
    - type: text
      text: 'Jehoshaphat his son reigned in his place, and strengthened himself against Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 35:5; 2 Chr. 14:14
      marker-yv: yv-n
    - type: text
      text: 'the fear of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' fell on all the kingdoms of the lands that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' around Judah, so that they did not make war against Jehoshaphat. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of the Philistines '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:2; 2 Chr. 9:14; 26:8
      marker-yv: yv-n
    - type: text
      text: brought Jehoshaphat presents and silver as tribute; and the Arabians brought him flocks, seven thousand seven hundred rams and seven thousand seven hundred male goats.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So Jehoshaphat became increasingly powerful, and he built fortresses and storage cities in Judah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He had much property in the cities of Judah; and the men of war, mighty men of valor, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in Jerusalem.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' their numbers, according to their fathers’ houses. Of Judah, the captains of thousands: Adnah the captain, and with him three hundred thousand mighty men of valor; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and next to him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Jehohanan the captain, and with him two hundred and eighty thousand; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'and next to him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Amasiah the son of Zichri, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 5:2, 9; 1 Chr. 29:9
      marker-yv: yv-n
    - type: text
      text: 'who willingly offered himself to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and with him two hundred thousand mighty men of valor. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Of Benjamin: Eliada a mighty man of valor, and with him two hundred thousand men armed with bow and shield; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and next to him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Jehozabad, and with him one hundred and eighty thousand prepared for war. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'These served the king, besides '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 17:2
      marker-yv: yv-n
    - type: text
      text: those the king put in the fortified cities throughout all Judah.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he placed troops in all the fortified cities of Judah, and set garrisons in the land of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 11:5
      marker-yv: yv-n
    - type: text
      text: 'Judah and in the cities of Ephraim '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 15:8
      marker-yv: yv-n
    - type: text
      text: 'which Asa his father had taken. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Now the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with Jehoshaphat, because he walked in the former ways of his father David; he did not seek the Baals, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'but sought the God of his father, and walked in His commandments and not according to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:28
      marker-yv: yv-n
    - type: text
      text: 'the acts of Israel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Therefore the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' established the kingdom in his hand; and all Judah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 10:27; 1 Kin. 10:25
      marker-yv: yv-n
    - type: text
      text: 'gave presents to Jehoshaphat, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 18:1
      marker-yv: yv-n
    - type: text
      text: 'and he had riches and honor in abundance. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And his heart took delight in the ways of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '; moreover '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 22:43; 2 Chr. 15:17; 19:3; 20:33
      marker-yv: yv-n
    - type: text
      text: he removed the high places and wooden images from Judah.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Also in the third year of his reign he sent his leaders, Ben-Hail, Obadiah, Zechariah, Nethanel, and Michaiah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 15:3; 35:3
      marker-yv: yv-n
    - type: text
      text: 'to teach in the cities of Judah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And with them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sent
    - type: text
      text: ' Levites: Shemaiah, Nethaniah, Zebadiah, Asahel, Shemiramoth, Jehonathan, Adonijah, Tobijah, and Tobadonijah—the Levites; and with them Elishama and Jehoram, the priests. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 6:4–9; 2 Chr. 35:3; Neh. 8:3, 7
      marker-yv: yv-n
    - type: text
      text: 'So they taught in Judah, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' the Book of the Law of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with them; they went throughout all the cities of Judah and taught the people.'
