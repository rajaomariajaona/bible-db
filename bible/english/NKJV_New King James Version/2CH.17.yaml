document_id: 2CH.17,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoshaphat Reigns in Judah
  - type: text
    content: 'Then '
  - type: note
    content: 1 Kin. 15:24; 2 Chr. 20:31
  - type: text
    content: 'Jehoshaphat his son reigned in his place, and strengthened himself against Israel. '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: Gen. 35:5; 2 Chr. 14:14
  - type: text
    content: 'the fear of the '
  - type: heading
    content: Lord
  - type: text
    content: ' fell on all the kingdoms of the lands that '
  - type: text
    content: were
  - type: text
    content: ' around Judah, so that they did not make war against Jehoshaphat. '
  '11':
  - type: text
    content: 'Also '
  - type: text
    content: some
  - type: text
    content: ' of the Philistines '
  - type: note
    content: 2 Sam. 8:2; 2 Chr. 9:14; 26:8
  - type: text
    content: brought Jehoshaphat presents and silver as tribute; and the Arabians brought him flocks, seven thousand seven hundred rams and seven thousand seven hundred male goats.
  '12':
  - type: text
    content: 'So Jehoshaphat became increasingly powerful, and he built fortresses and storage cities in Judah. '
  '13':
  - type: text
    content: 'He had much property in the cities of Judah; and the men of war, mighty men of valor, '
  - type: text
    content: were
  - type: text
    content: ' in Jerusalem.'
  '14':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' their numbers, according to their fathers’ houses. Of Judah, the captains of thousands: Adnah the captain, and with him three hundred thousand mighty men of valor; '
  '15':
  - type: text
    content: 'and next to him '
  - type: text
    content: was
  - type: text
    content: ' Jehohanan the captain, and with him two hundred and eighty thousand; '
  '16':
  - type: text
    content: 'and next to him '
  - type: text
    content: was
  - type: text
    content: ' Amasiah the son of Zichri, '
  - type: note
    content: Judg. 5:2, 9; 1 Chr. 29:9
  - type: text
    content: 'who willingly offered himself to the '
  - type: heading
    content: Lord
  - type: text
    content: ', and with him two hundred thousand mighty men of valor. '
  '17':
  - type: text
    content: 'Of Benjamin: Eliada a mighty man of valor, and with him two hundred thousand men armed with bow and shield; '
  '18':
  - type: text
    content: 'and next to him '
  - type: text
    content: was
  - type: text
    content: ' Jehozabad, and with him one hundred and eighty thousand prepared for war. '
  '19':
  - type: text
    content: 'These served the king, besides '
  - type: note
    content: 2 Chr. 17:2
  - type: text
    content: those the king put in the fortified cities throughout all Judah.
  '2':
  - type: text
    content: 'And he placed troops in all the fortified cities of Judah, and set garrisons in the land of '
  - type: note
    content: 2 Chr. 11:5
  - type: text
    content: 'Judah and in the cities of Ephraim '
  - type: note
    content: 2 Chr. 15:8
  - type: text
    content: 'which Asa his father had taken. '
  '3':
  - type: text
    content: 'Now the '
  - type: heading
    content: Lord
  - type: text
    content: ' was with Jehoshaphat, because he walked in the former ways of his father David; he did not seek the Baals, '
  '4':
  - type: text
    content: 'but sought the God of his father, and walked in His commandments and not according to '
  - type: note
    content: 1 Kin. 12:28
  - type: text
    content: 'the acts of Israel. '
  '5':
  - type: text
    content: 'Therefore the '
  - type: heading
    content: Lord
  - type: text
    content: ' established the kingdom in his hand; and all Judah '
  - type: note
    content: 1 Sam. 10:27; 1 Kin. 10:25
  - type: text
    content: 'gave presents to Jehoshaphat, '
  - type: note
    content: 2 Chr. 18:1
  - type: text
    content: 'and he had riches and honor in abundance. '
  '6':
  - type: text
    content: 'And his heart took delight in the ways of the '
  - type: heading
    content: Lord
  - type: text
    content: '; moreover '
  - type: note
    content: 1 Kin. 22:43; 2 Chr. 15:17; 19:3; 20:33
  - type: text
    content: he removed the high places and wooden images from Judah.
  '7':
  - type: text
    content: 'Also in the third year of his reign he sent his leaders, Ben-Hail, Obadiah, Zechariah, Nethanel, and Michaiah, '
  - type: note
    content: 2 Chr. 15:3; 35:3
  - type: text
    content: 'to teach in the cities of Judah. '
  '8':
  - type: text
    content: 'And with them '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: sent
  - type: text
    content: ' Levites: Shemaiah, Nethaniah, Zebadiah, Asahel, Shemiramoth, Jehonathan, Adonijah, Tobijah, and Tobadonijah—the Levites; and with them Elishama and Jehoram, the priests. '
  '9':
  - type: note
    content: Deut. 6:4–9; 2 Chr. 35:3; Neh. 8:3, 7
  - type: text
    content: 'So they taught in Judah, and '
  - type: text
    content: had
  - type: text
    content: ' the Book of the Law of the '
  - type: heading
    content: Lord
  - type: text
    content: ' with them; they went throughout all the cities of Judah and taught the people.'
