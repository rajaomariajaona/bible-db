    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Necho
    - type: text
      text: ' killed him at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 5:19; Zech. 12:11
      marker-yv: yv-n
    - type: text
      text: 'Megiddo when he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 14:8
      marker-yv: yv-n
    - type: text
      text: 'confronted him. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then the king '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 11:14
      marker-yv: yv-n
    - type: text
      text: 'stood by a pillar and made a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 11:17
      marker-yv: yv-n
    - type: text
      text: 'covenant before the '
    - type: usfm
