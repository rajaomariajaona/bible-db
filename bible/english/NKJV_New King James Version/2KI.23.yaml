        text: Lord
    - type: text
      text: ', to follow the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and to keep His commandments and His testimonies and His statutes, with all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' heart and all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' soul, to perform the words of this covenant that were written in this book. And all the people took a stand for the covenant. '
  '30':
