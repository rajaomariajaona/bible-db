    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 18:5
      marker-yv: yv-n
    - type: text
      text: 'Now before him there was no king like him, who turned to the '
    - type: usfm
      marker: sc
      children:
      - type: text
