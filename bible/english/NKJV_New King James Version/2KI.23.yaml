    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 13:1, 30, 31
      marker-yv: yv-n
    - type: text
