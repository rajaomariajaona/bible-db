  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Now Josiah also took away all the shrines of the high places that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 34:6, 7
      marker-yv: yv-n
    - type: text
      text: 'in the cities of Samaria, which the kings of Israel had made to provoke the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to anger; and he did to them according to all the deeds he had done in Bethel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The king went up to the house of the '
    - type: usfm
      marker: sc
      children:
