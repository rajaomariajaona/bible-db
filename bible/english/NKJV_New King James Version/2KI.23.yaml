    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 22:8
      marker-yv: yv-n
    - type: text
      text: 'which had been found in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
