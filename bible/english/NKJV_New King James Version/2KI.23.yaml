    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:18
      marker-yv: yv-n
    - type: text
      text: 'Hamutal the daughter of Jeremiah of Libnah. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
