  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josiah Dies in Battle
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
