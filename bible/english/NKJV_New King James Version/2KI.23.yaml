      marker: x
      children:
      - type: text
        text: (Lev. 19:31; 20:27); Deut. 18:11
      marker-yv: yv-n
    - type: text
      text: 'the law which were written in the book '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 22:8
      marker-yv: yv-n
    - type: text
      text: 'that Hilkiah the priest found in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
