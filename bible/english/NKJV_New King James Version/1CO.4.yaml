document_id: 1CO.4,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Stewards of the Mysteries of God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Let a man so consider us, as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 24:45; Rom. 13:6; 2 Cor. 3:6; Col. 1:25
      marker-yv: yv-n
    - type: text
      text: 'servants of Christ '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 12:42; 1 Cor. 9:17; Titus 1:7; 1 Pet. 4:10
      marker-yv: yv-n
    - type: text
      text: 'and stewards of the mysteries of God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'We '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 17:18; 26:24; 1 Cor. 1:18
      marker-yv: yv-n
    - type: text
      text: 'fools for Christ’s sake, but you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' wise in Christ! '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 2:3; 2 Cor. 13:9
      marker-yv: yv-n
    - type: text
      text: 'We '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' weak, but you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' strong! You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' distinguished, but we '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' dishonored! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'To the present hour we both hunger and thirst, and we are poorly clothed, and beaten, and homeless. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:3; 20:34
      marker-yv: yv-n
    - type: text
      text: 'And we labor, working with our own hands. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 5:44
      marker-yv: yv-n
    - type: text
      text: 'Being reviled, we bless; being persecuted, we endure; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'being defamed, we entreat. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lam. 3:45
      marker-yv: yv-n
    - type: text
      text: We have been made as the filth of the world, the offscouring of all things until now.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Paternal Care
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I do not write these things to shame you, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 6:13; 12:14; 1 Thess. 2:11; 1 John 2:1; 3 John 4
      marker-yv: yv-n
    - type: text
      text: 'as my beloved children I warn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For though you might have ten thousand instructors in Christ, yet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' many fathers; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 11:12; Acts 18:11; 1 Cor. 3:8; Gal. 4:19; Philem. 10
      marker-yv: yv-n
    - type: text
      text: 'in Christ Jesus I have begotten you through the gospel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Therefore I urge you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 11:1); Phil. 3:17; 4:9; (1 Thess. 1:6); 2 Thess. 3:9
      marker-yv: yv-n
    - type: text
      text: 'imitate me. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For this reason I have sent '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:22; Phil. 2:19
      marker-yv: yv-n
    - type: text
      text: 'Timothy to you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 4:14; 1 Tim. 1:2, 18; 2 Tim. 1:2
      marker-yv: yv-n
    - type: text
      text: 'who is my beloved and faithful son in the Lord, who will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 11:2
      marker-yv: yv-n
    - type: text
      text: 'remind you of my ways in Christ, as I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 7:17; Titus 1:5
      marker-yv: yv-n
    - type: text
      text: 'teach everywhere '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 14:33
      marker-yv: yv-n
    - type: text
      text: in every church.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 5:2
      marker-yv: yv-n
    - type: text
      text: 'Now some are puffed up, as though I were not coming to you. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:21; 20:2; 1 Cor. 11:34; 16:5, 7–9; 2 Cor. 1:15
      marker-yv: yv-n
    - type: text
      text: 'But I will come to you shortly, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:21; Heb. 6:3; James 4:15
      marker-yv: yv-n
    - type: text
      text: 'if the Lord wills, and I will know, not the word of those who are puffed up, but the power. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Moreover it is required in stewards that one be found faithful. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 1:5
      marker-yv: yv-n
    - type: text
      text: 'the kingdom of God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not in word but in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 2:4
      marker-yv: yv-n
    - type: text
      text: 'power. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'What do you want? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 10:2
      marker-yv: yv-n
    - type: text
      text: Shall I come to you with a rod, or in love and a spirit of gentleness?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But with me it is a very small thing that I should be judged by you or by a human court. In fact, I do not even judge myself. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For I know of nothing against myself, yet I am not justified by this; but He who judges me is the Lord. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 7:1; Rom. 2:1; (Rev. 20:12)
      marker-yv: yv-n
    - type: text
      text: 'Therefore judge nothing before the time, until the Lord comes, who will both bring to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:26
      marker-yv: yv-n
    - type: text
      text: 'light the hidden things of darkness and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 3:13
      marker-yv: yv-n
    - type: text
      text: 'reveal the counsels of the hearts. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 2:29; 1 Cor. 3:8; (2 Cor. 5:10)
      marker-yv: yv-n
    - type: text
      text: Then each one’s praise will come from God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fools for Christ’s Sake
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now these things, brethren, I have figuratively transferred to myself and Apollos for your sakes, that you may learn in us not to think beyond what is written, that none of you may be puffed up on behalf of one against the other. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For who makes you differ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: another?
    - type: text
      text: ' And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 3:27; Rom. 12:3, 6; 1 Pet. 4:10
      marker-yv: yv-n
    - type: text
      text: 'what do you have that you did not receive? Now if you did indeed receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' why do you boast as if you had not received '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it?
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'You are already full! '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 3:17
      marker-yv: yv-n
    - type: text
      text: 'You are already rich! You have reigned as kings without us—and indeed I could wish you did reign, that we also might reign with you! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For I think that God has displayed us, the apostles, last, as men condemned to death; for we have been made a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 10:33
      marker-yv: yv-n
    - type: text
      text: 'spectacle to the world, both to angels and to men. '
