document_id: 1CO.4,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Stewards of the Mysteries of God
  - type: text
    content: 'Let a man so consider us, as '
  - type: note
    content: Matt. 24:45; Rom. 13:6; 2 Cor. 3:6; Col. 1:25
  - type: text
    content: 'servants of Christ '
  - type: note
    content: Luke 12:42; 1 Cor. 9:17; Titus 1:7; 1 Pet. 4:10
  - type: text
    content: 'and stewards of the mysteries of God. '
  '10':
  - type: text
    content: 'We '
  - type: text
    content: are
  - type: text
    content: ' '
  - type: note
    content: Acts 17:18; 26:24; 1 Cor. 1:18
  - type: text
    content: 'fools for Christ’s sake, but you '
  - type: text
    content: are
  - type: text
    content: ' wise in Christ! '
  - type: note
    content: 1 Cor. 2:3; 2 Cor. 13:9
  - type: text
    content: 'We '
  - type: text
    content: are
  - type: text
    content: ' weak, but you '
  - type: text
    content: are
  - type: text
    content: ' strong! You '
  - type: text
    content: are
  - type: text
    content: ' distinguished, but we '
  - type: text
    content: are
  - type: text
    content: ' dishonored! '
  '11':
  - type: text
    content: 'To the present hour we both hunger and thirst, and we are poorly clothed, and beaten, and homeless. '
  '12':
  - type: note
    content: Acts 18:3; 20:34
  - type: text
    content: 'And we labor, working with our own hands. '
  - type: note
    content: Matt. 5:44
  - type: text
    content: 'Being reviled, we bless; being persecuted, we endure; '
  '13':
  - type: text
    content: 'being defamed, we entreat. '
  - type: note
    content: Lam. 3:45
  - type: text
    content: We have been made as the filth of the world, the offscouring of all things until now.
  - type: heading
    content: Paul’s Paternal Care
  '14':
  - type: text
    content: 'I do not write these things to shame you, but '
  - type: note
    content: 2 Cor. 6:13; 12:14; 1 Thess. 2:11; 1 John 2:1; 3 John 4
  - type: text
    content: 'as my beloved children I warn '
  - type: text
    content: you.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'For though you might have ten thousand instructors in Christ, yet '
  - type: text
    content: you
  - type: text
    content: ' '
  - type: text
    content: do
  - type: text
    content: ' not '
  - type: text
    content: have
  - type: text
    content: ' many fathers; for '
  - type: note
    content: Num. 11:12; Acts 18:11; 1 Cor. 3:8; Gal. 4:19; Philem. 10
  - type: text
    content: 'in Christ Jesus I have begotten you through the gospel. '
  '16':
  - type: text
    content: 'Therefore I urge you, '
  - type: note
    content: (1 Cor. 11:1); Phil. 3:17; 4:9; (1 Thess. 1:6); 2 Thess. 3:9
  - type: text
    content: 'imitate me. '
  '17':
  - type: text
    content: 'For this reason I have sent '
  - type: note
    content: Acts 19:22; Phil. 2:19
  - type: text
    content: 'Timothy to you, '
  - type: note
    content: 1 Cor. 4:14; 1 Tim. 1:2, 18; 2 Tim. 1:2
  - type: text
    content: 'who is my beloved and faithful son in the Lord, who will '
  - type: note
    content: 1 Cor. 11:2
  - type: text
    content: 'remind you of my ways in Christ, as I '
  - type: note
    content: 1 Cor. 7:17; Titus 1:5
  - type: text
    content: 'teach everywhere '
  - type: note
    content: 1 Cor. 14:33
  - type: text
    content: in every church.
  '18':
  - type: note
    content: 1 Cor. 5:2
  - type: text
    content: 'Now some are puffed up, as though I were not coming to you. '
  '19':
  - type: note
    content: Acts 19:21; 20:2; 1 Cor. 11:34; 16:5, 7–9; 2 Cor. 1:15
  - type: text
    content: 'But I will come to you shortly, '
  - type: note
    content: Acts 18:21; Heb. 6:3; James 4:15
  - type: text
    content: 'if the Lord wills, and I will know, not the word of those who are puffed up, but the power. '
  '2':
  - type: text
    content: 'Moreover it is required in stewards that one be found faithful. '
  '20':
  - type: text
    content: 'For '
  - type: note
    content: 1 Thess. 1:5
  - type: text
    content: 'the kingdom of God '
  - type: text
    content: is
  - type: text
    content: ' not in word but in '
  - type: note
    content: 1 Cor. 2:4
  - type: text
    content: 'power. '
  '21':
  - type: text
    content: 'What do you want? '
  - type: note
    content: 2 Cor. 10:2
  - type: text
    content: Shall I come to you with a rod, or in love and a spirit of gentleness?
  '3':
  - type: text
    content: 'But with me it is a very small thing that I should be judged by you or by a human court. In fact, I do not even judge myself. '
  '4':
  - type: text
    content: 'For I know of nothing against myself, yet I am not justified by this; but He who judges me is the Lord. '
  '5':
  - type: note
    content: Matt. 7:1; Rom. 2:1; (Rev. 20:12)
  - type: text
    content: 'Therefore judge nothing before the time, until the Lord comes, who will both bring to '
  - type: note
    content: Matt. 10:26
  - type: text
    content: 'light the hidden things of darkness and '
  - type: note
    content: 1 Cor. 3:13
  - type: text
    content: 'reveal the counsels of the hearts. '
  - type: note
    content: Rom. 2:29; 1 Cor. 3:8; (2 Cor. 5:10)
  - type: text
    content: Then each one’s praise will come from God.
  - type: heading
    content: Fools for Christ’s Sake
  '6':
  - type: text
    content: 'Now these things, brethren, I have figuratively transferred to myself and Apollos for your sakes, that you may learn in us not to think beyond what is written, that none of you may be puffed up on behalf of one against the other. '
  '7':
  - type: text
    content: 'For who makes you differ '
  - type: text
    content: from
  - type: text
    content: ' '
  - type: text
    content: another?
  - type: text
    content: ' And '
  - type: note
    content: John 3:27; Rom. 12:3, 6; 1 Pet. 4:10
  - type: text
    content: 'what do you have that you did not receive? Now if you did indeed receive '
  - type: text
    content: it,
  - type: text
    content: ' why do you boast as if you had not received '
  - type: text
    content: it?
  '8':
  - type: text
    content: 'You are already full! '
  - type: note
    content: Rev. 3:17
  - type: text
    content: 'You are already rich! You have reigned as kings without us—and indeed I could wish you did reign, that we also might reign with you! '
  '9':
  - type: text
    content: 'For I think that God has displayed us, the apostles, last, as men condemned to death; for we have been made a '
  - type: note
    content: Heb. 10:33
  - type: text
    content: 'spectacle to the world, both to angels and to men. '
