document_id: GEN.6,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Wickedness and Judgment of Man
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it came to pass, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:28
      marker-yv: yv-n
    - type: text
      text: 'when men began to multiply on the face of the earth, and daughters were born to them, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Noah begot three sons: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 5:32; 7:13
      marker-yv: yv-n
    - type: text
      text: Shem, Ham, and Japheth.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The earth also was corrupt '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 31:29; Judg. 2:19; Rom. 2:13
      marker-yv: yv-n
    - type: text
      text: 'before God, and the earth was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 8:17
      marker-yv: yv-n
    - type: text
      text: 'filled with violence. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 14:2; 53:2, 3
      marker-yv: yv-n
    - type: text
      text: 'looked upon the earth, and indeed it was corrupt; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 14:1–3; Is. 28:8
      marker-yv: yv-n
    - type: text
      text: all flesh had corrupted their way on the earth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ark Prepared
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God said to Noah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 34:1–4; Jer. 51:13; Ezek. 7:2, 3; Amos 8:2; 1 Pet. 4:7
      marker-yv: yv-n
    - type: text
      text: '“The end of all flesh has come before Me, for the earth is filled with violence through them; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 6:17
      marker-yv: yv-n
    - type: text
      text: 'and behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Pet. 2:4–10
      marker-yv: yv-n
    - type: text
      text: 'I will destroy them with the earth. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Make yourself an ark of gopherwood; make rooms in the ark, and cover it inside and outside with pitch. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this is how you shall make it: The length of the ark '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' three hundred cubits, its width fifty cubits, and its height thirty cubits. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall make a window for the ark, and you shall finish it to a cubit from above; and set the door of the ark in its side. You shall make it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' lower, second, and third '
    - type: usfm
      marker: it
      children:
      - type: text
        text: decks.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 7:4, 21–23; 2 Pet. 2:5
      marker-yv: yv-n
    - type: text
      text: 'And behold, I Myself am bringing '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Pet. 3:6
      marker-yv: yv-n
    - type: text
      text: 'floodwaters on the earth, to destroy from under heaven all flesh in which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the breath of life; everything that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' on the earth shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 16:22
      marker-yv: yv-n
    - type: text
      text: 'die. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will establish My '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 8:20—9:17; 17:7
      marker-yv: yv-n
    - type: text
      text: 'covenant with you; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 7:1, 7, 13; 1 Pet. 3:20; 2 Pet. 2:5
      marker-yv: yv-n
    - type: text
      text: 'you shall go into the ark—you, your sons, your wife, and your sons’ wives with you. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of every living thing of all flesh you shall bring '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 7:2, 8, 9, 14–16
      marker-yv: yv-n
    - type: text
      text: 'two of every '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sort
    - type: text
      text: ' into the ark, to keep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' alive with you; they shall be male and female. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that the sons of God saw the daughters of men, that they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' beautiful; and they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:3, 4
      marker-yv: yv-n
    - type: text
      text: took wives for themselves of all whom they chose.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the birds after their kind, of animals after their kind, and of every creeping thing of the earth after its kind, two of every '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kind
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 7:9, 15
      marker-yv: yv-n
    - type: text
      text: 'will come to you to keep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' alive. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall take for yourself of all food that is eaten, and you shall gather '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' to yourself; and it shall be food for you and for them.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 7:5; 12:4, 5; Heb. 11:7
      marker-yv: yv-n
    - type: text
      text: 'Thus Noah did; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 7:5, 9, 16
      marker-yv: yv-n
    - type: text
      text: 'according to all that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 John 5:3)
      marker-yv: yv-n
    - type: text
      text: God commanded him, so he did.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:38; (Gal. 5:16, 17); 1 Pet. 3:19, 20
      marker-yv: yv-n
    - type: text
      text: '“My Spirit shall not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Thess. 2:7
      marker-yv: yv-n
    - type: text
      text: 'strive with man forever, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 78:39
      marker-yv: yv-n
    - type: text
      text: 'for he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' indeed flesh; yet his days shall be one hundred and twenty years.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There were giants on the earth in those '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:32, 33; Luke 17:27
      marker-yv: yv-n
    - type: text
      text: 'days, and also afterward, when the sons of God came in to the daughters of men and they bore '
    - type: usfm
      marker: it
      children:
      - type: text
        text: children
    - type: text
      text: ' to them. Those '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the mighty men who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' of old, men of renown.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saw that the wickedness of man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' great in the earth, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' every '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 8:21; Ps. 14:1–3; Prov. 6:18; Matt. 15:19; Rom. 1:28–32
      marker-yv: yv-n
    - type: text
      text: 'intent of the thoughts of his heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' only evil continually. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 6:7; 1 Sam. 15:11, 29; 2 Sam. 24:16; Jer. 18:7–10; Zech. 8:14
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was sorry that He had made man on the earth, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 78:40; Is. 63:10; Eph. 4:30
      marker-yv: yv-n
    - type: text
      text: 'He was grieved in His '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 3:5
      marker-yv: yv-n
    - type: text
      text: 'heart. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 7:4, 23; Deut. 28:63; 29:20; Ps. 7:11
      marker-yv: yv-n
    - type: text
      text: 'destroy man whom I have created from the face of the earth, both man and beast, creeping thing and birds of the air, for I am sorry that I have made them.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Noah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:19; Ex. 33:12, 17; Luke 1:30; Acts 7:46
      marker-yv: yv-n
    - type: text
      text: 'found grace in the eyes of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Noah Pleases God
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the genealogy of Noah. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 7:1; Ezek. 14:14, 20; Heb. 11:7; 2 Pet. 2:5
      marker-yv: yv-n
    - type: text
      text: 'Noah was a just man, perfect in his generations. Noah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 5:22, 24; 2 Kin. 23:3
      marker-yv: yv-n
    - type: text
      text: 'walked with God. '
