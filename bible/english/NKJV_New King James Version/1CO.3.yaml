document_id: 1CO.3,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sectarianism Is Carnal
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And I, brethren, could not speak to you as to spiritual '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
      text: ' but as to carnal, as to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 2:6; Eph. 4:14; Heb. 5:13
      marker-yv: yv-n
    - type: text
      text: 'babes in Christ. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:5
      marker-yv: yv-n
    - type: text
      text: 'According to the grace of God which was given to me, as a wise master builder I have laid '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 4:15
      marker-yv: yv-n
    - type: text
      text: 'the foundation, and another builds on it. But let each one take heed how he builds on it. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For no other foundation can anyone lay than '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 28:16; Matt. 16:18; 2 Cor. 11:4
      marker-yv: yv-n
    - type: text
      text: 'that which is laid, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 2:20; 1 Pet. 2:4
      marker-yv: yv-n
    - type: text
      text: 'which is Jesus Christ. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now if anyone builds on this foundation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' gold, silver, precious stones, wood, hay, straw, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'each one’s work will become clear; for the Day '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Pet. 1:7
      marker-yv: yv-n
    - type: text
      text: 'will declare it, because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 3:1–3; Luke 2:35
      marker-yv: yv-n
    - type: text
      text: 'it will be revealed by fire; and the fire will test each one’s work, of what sort it is. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'If anyone’s work which he has built on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' endures, he will receive a reward. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: If anyone’s work is burned, he will suffer loss; but he himself will be saved, yet so as through fire.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 8:9; 1 Cor. 6:19; 2 Cor. 6:16; Eph. 2:21
      marker-yv: yv-n
    - type: text
      text: 'Do you not know that you are the temple of God and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' the Spirit of God dwells in you? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'If anyone defiles the temple of God, God will destroy him. For the temple of God is holy, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: temple
    - type: text
      text: ' you are.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avoid Worldly Wisdom
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:7
      marker-yv: yv-n
    - type: text
      text: 'Let no one deceive himself. If anyone among you seems to be wise in this age, let him become a fool that he may become wise. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For the wisdom of this world is foolishness with God. For it is written, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:13
      marker-yv: yv-n
    - type: text
      text: '“He catches the wise in their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' craftiness”; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I fed you with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 5:12; 1 Pet. 2:2
      marker-yv: yv-n
    - type: text
      text: 'milk and not with solid food; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 16:12
      marker-yv: yv-n
    - type: text
      text: 'for until now you were not able '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: receive
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' and even now you are still not able; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and again, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 94:11
      marker-yv: yv-n
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Lord
    - type: text
      text: ' knows the thoughts of the wise, that they are futile.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Therefore let no one boast in men. For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 4:5)
      marker-yv: yv-n
    - type: text
      text: 'all things are yours: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'whether Paul or Apollos or Cephas, or the world or life or death, or things present or things to come—all are yours. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 14:8); 1 Cor. 15:23; 2 Cor. 10:7; (Gal. 3:29)
      marker-yv: yv-n
    - type: text
      text: 'you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' Christ’s, and Christ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' God’s.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'for you are still carnal. For where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' envy, strife, and divisions among you, are you not carnal and behaving like '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mere
    - type: text
      text: ' men? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For when one says, “I am of Paul,” and another, “I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' of Apollos,” are you not carnal?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Watering, Working, Warning
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Who then is Paul, and who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Apollos, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 15:16; 2 Cor. 3:3, 6; 4:1; 5:18; 6:4; Eph. 3:7; Col. 1:25; 1 Tim. 1:12
      marker-yv: yv-n
    - type: text
      text: 'ministers through whom you believed, as the Lord gave to each one? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:4; 1 Cor. 4:15; 9:1; 15:1; 2 Cor. 10:14
      marker-yv: yv-n
    - type: text
      text: 'I planted, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:24–27; 1 Cor. 1:12
      marker-yv: yv-n
    - type: text
      text: 'Apollos watered, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 3:5)
      marker-yv: yv-n
    - type: text
      text: 'but God gave the increase. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 12:11; (Gal. 6:3)
      marker-yv: yv-n
    - type: text
      text: 'neither he who plants is anything, nor he who waters, but God who gives the increase. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Now he who plants and he who waters are one, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 62:12; Rom. 2:6
      marker-yv: yv-n
    - type: text
      text: and each one will receive his own reward according to his own labor.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:20; Acts 15:4; 2 Cor. 6:1
      marker-yv: yv-n
    - type: text
      text: 'we are God’s fellow workers; you are God’s field, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 3:16; Eph. 2:20–22); Col. 2:7; Heb. 3:3, 4; (1 Pet. 2:5)
      marker-yv: yv-n
    - type: text
      text: 'God’s building. '
