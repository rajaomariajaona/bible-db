document_id: ECC.2,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Vanity of Pleasure
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I said '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 12:19
      marker-yv: yv-n
    - type: text
      text: 'in my heart, “Come now, I will test you with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 14:13; (Eccl. 7:4; 8:15)
      marker-yv: yv-n
    - type: text
      text: 'mirth; therefore enjoy pleasure”; but surely, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 1:2
      marker-yv: yv-n
    - type: text
      text: 'this also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' vanity. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Whatever my eyes desired I did not keep from them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I did not withhold my heart from any pleasure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For my heart rejoiced in all my labor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 3:22; 5:18; 9:9
      marker-yv: yv-n
    - type: text
      text: this was my reward from all my labor.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then I looked on all the works that my hands had done
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And on the labor in which I had toiled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And indeed all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 1:3, 14
      marker-yv: yv-n
    - type: text
      text: vanity and grasping for the wind.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: There
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' no profit under the sun.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The End of the Wise and the Fool
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then I turned myself to consider wisdom '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 1:17; 7:25
      marker-yv: yv-n
    - type: text
      text: and madness and folly;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: can
    - type: text
      text: ' the man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do
    - type: text
      text: ' who succeeds the king?—'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Only
    - type: text
      text: ' what he has already '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 1:9
      marker-yv: yv-n
    - type: text
      text: done.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then I saw that wisdom '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 7:11, 14, 19; 9:18; 10:10
      marker-yv: yv-n
    - type: text
      text: excels folly
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As light excels darkness.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 17:24; Eccl. 8:1
      marker-yv: yv-n
    - type: text
      text: 'The wise man’s eyes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in his head,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the fool walks in darkness.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet I myself perceived
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 49:10; Eccl. 9:2, 3, 11
      marker-yv: yv-n
    - type: text
      text: the same event happens to them all.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: So I said in my heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “As it happens to the fool,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It also happens to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And why was I then more wise?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then I said in my heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“This also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity.”'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 1:11; 4:16
      marker-yv: yv-n
    - type: text
      text: no more remembrance of the wise than of the fool forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Since all that now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' will be forgotten in the days to come.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And how does a wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' die?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As the fool!
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Therefore I hated life because the work that was done under the sun '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' distressing to me, for all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity and grasping for the wind.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then I hated all my labor in which I had toiled under the sun, because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 49:10
      marker-yv: yv-n
    - type: text
      text: 'I must leave it to the man who will come after me. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And who knows whether he will be wise or a fool? Yet he will rule over all my labor in which I toiled and in which I have shown myself wise under the sun. This also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I said of laughter—“Madness!”; and of mirth, “What does it accomplish?” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Therefore I turned my heart and despaired of all the labor in which I had toiled under the sun. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For there is a man whose labor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' with wisdom, knowledge, and skill; yet he must leave his heritage to a man who has not labored for it. This also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity and a great evil. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 1:3; 3:9
      marker-yv: yv-n
    - type: text
      text: 'For what has man for all his labor, and for the striving of his heart with which he has toiled under the sun? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'For all his days '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:7; 14:1
      marker-yv: yv-n
    - type: text
      text: sorrowful, and his work burdensome; even in the night his heart takes no rest. This also is vanity.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 3:12, 13, 22; Is. 56:12; Luke 12:19; 1 Cor. 15:32; (1 Tim. 6:17)
      marker-yv: yv-n
    - type: text
      text: 'Nothing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' better for a man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: than
    - type: text
      text: ' that he should eat and drink, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' his soul should enjoy good in his labor. This also, I saw, was from the hand of God. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'For who can eat, or who can have enjoyment, more than I? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' gives '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 32:8; Prov. 2:6; James 1:5
      marker-yv: yv-n
    - type: text
      text: 'wisdom and knowledge and joy to a man who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good in His sight; but to the sinner He gives the work of gathering and collecting, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 27:16, 17; Prov. 28:8
      marker-yv: yv-n
    - type: text
      text: 'he may give to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good before God. This also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity and grasping for the wind.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 1:17
      marker-yv: yv-n
    - type: text
      text: 'I searched in my heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: how
    - type: text
      text: ' to gratify my flesh with wine, while guiding my heart with wisdom, and how to lay hold on folly, till I might see what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eccl. 3:12, 13; 5:18; 6:12)
      marker-yv: yv-n
    - type: text
      text: good for the sons of men to do under heaven all the days of their lives.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I made my works great, I built myself '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:1–12
      marker-yv: yv-n
    - type: text
      text: 'houses, and planted myself vineyards. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I made myself gardens and orchards, and I planted all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kinds
    - type: text
      text: ' of fruit trees in them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I made myself water pools from which to water the growing trees of the grove. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I acquired male and female servants, and had servants born in my house. Yes, I had greater possessions of herds and flocks than all who were in Jerusalem before me. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 9:28; 10:10, 14, 21
      marker-yv: yv-n
    - type: text
      text: 'I also gathered for myself silver and gold and the special treasures of kings and of the provinces. I acquired male and female singers, the delights of the sons of men, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' musical instruments of all kinds.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 1:16
      marker-yv: yv-n
    - type: text
      text: 'So I became great and excelled '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 9:22
      marker-yv: yv-n
    - type: text
      text: more than all who were before me in Jerusalem. Also my wisdom remained with me.
