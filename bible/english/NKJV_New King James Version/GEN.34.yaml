document_id: GEN.34
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Dinah Incident
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 30:21
    marker-yv: yv-n
  - type: text
    text: 'Dinah the daughter of Leah, whom she had borne to Jacob, went out to see the daughters of the land. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And when Shechem the son of Hamor the Hivite, prince of the country, saw her, he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 20:2
    marker-yv: yv-n
  - type: text
    text: 'took her and lay with her, and violated her. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'His soul was strongly attracted to Dinah the daughter of Jacob, and he loved the young woman and spoke kindly to the young woman. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Shechem '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 14:2
    marker-yv: yv-n
  - type: text
    text: spoke to his father Hamor, saying, “Get me this young woman as a wife.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Jacob heard that he had defiled Dinah his daughter. Now his sons were with his livestock in the field; so Jacob '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 13:22
    marker-yv: yv-n
  - type: text
    text: 'held his peace until they came. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Hamor the father of Shechem went out to Jacob to speak with him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the sons of Jacob came in from the field when they heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it;
  - type: text
    text: ' and the men were grieved and very angry, because he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 22:20–30; Josh. 7:15; Judg. 20:6
    marker-yv: yv-n
  - type: text
    text: 'had done a disgraceful thing in Israel by lying with Jacob’s daughter, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 23:17; 2 Sam. 13:12
    marker-yv: yv-n
  - type: text
    text: 'a thing which ought not to be done. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But Hamor spoke with them, saying, “The soul of my son Shechem longs for your daughter. Please give her to him as a wife. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And make marriages with us; give your daughters to us, and take our daughters to yourselves. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So you shall dwell with us, and the land shall be before you. Dwell and trade in it, and acquire possessions for yourselves in it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Shechem said to her father and her brothers, “Let me find favor in your eyes, and whatever you say to me I will give. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ask me ever so much '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 22:16, 17; Deut. 22:29
    marker-yv: yv-n
  - type: text
    text: dowry and gift, and I will give according to what you say to me; but give me the young woman as a wife.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But the sons of Jacob answered Shechem and Hamor his father, and spoke '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 31:7; Ex. 8:29
    marker-yv: yv-n
  - type: text
    text: 'deceitfully, because he had defiled Dinah their sister. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And they said to them, “We cannot do this thing, to give our sister to one who is '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 12:48
    marker-yv: yv-n
  - type: text
    text: 'uncircumcised, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 5:2–9
    marker-yv: yv-n
  - type: text
    text: 'that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: would
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' a reproach to us. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But on this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: condition
  - type: text
    text: ' we will consent to you: If you will become as we '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are,
  - type: text
    text: ' if every male of you is circumcised, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'then we will give our daughters to you, and we will take your daughters to us; and we will dwell with you, and we will become one people. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But if you will not heed us and be circumcised, then we will take our daughter and be gone.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And their words pleased Hamor and Shechem, Hamor’s son. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So the young man did not delay to do the thing, because he delighted in Jacob’s daughter. He '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 4:9
    marker-yv: yv-n
  - type: text
    text: more honorable than all the household of his father.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Hamor and Shechem his son came to the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 19:1; 23:10; Ruth 4:1, 11; 2 Sam. 15:2
    marker-yv: yv-n
  - type: text
    text: 'gate of their city, and spoke with the men of their city, saying: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“These men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' at peace with us. Therefore let them dwell in the land and trade in it. For indeed the land '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' large enough for them. Let us take their daughters to us as wives, and let us give them our daughters. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Only on this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: condition
  - type: text
    text: ' will the men consent to dwell with us, to be one people: if every male among us is circumcised as they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' circumcised. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Will
  - type: text
    text: ' not their livestock, their property, and every animal of theirs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' ours? Only let us consent to them, and they will dwell with us.” '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And all who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 23:10, 18
    marker-yv: yv-n
  - type: text
    text: went out of the gate of his city heeded Hamor and Shechem his son; every male was circumcised, all who went out of the gate of his city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now it came to pass on the third day, when they were in pain, that two of the sons of Jacob, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 29:33, 34; 42:24; 49:5–7
    marker-yv: yv-n
  - type: text
    text: 'Simeon and Levi, Dinah’s brothers, each took his sword and came boldly upon the city and killed all the males. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 49:5, 6
    marker-yv: yv-n
  - type: text
    text: 'killed Hamor and Shechem his son with the edge of the sword, and took Dinah from Shechem’s house, and went out. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The sons of Jacob came upon the slain, and plundered the city, because their sister had been defiled. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'They took their sheep, their oxen, and their donkeys, what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in the city and what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in the field, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and all their wealth. All their little ones and their wives they took captive; and they plundered even all that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in the houses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then Jacob said to Simeon and Levi, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 49:6
    marker-yv: yv-n
  - type: text
    text: '“You have '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 7:25
    marker-yv: yv-n
  - type: text
    text: 'troubled me '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 5:21; 1 Sam. 13:4; 2 Sam. 10:6
    marker-yv: yv-n
  - type: text
    text: 'by making me obnoxious among the inhabitants of the land, among the Canaanites and the Perizzites; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 46:26, 27; Deut. 4:27; 1 Chr. 16:19; Ps. 105:12
    marker-yv: yv-n
  - type: text
    text: 'and since I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: am
  - type: text
    text: ' few in number, they will gather themselves together against me and kill me. I shall be destroyed, my household and I.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: But they said, “Should he treat our sister like a harlot?”
