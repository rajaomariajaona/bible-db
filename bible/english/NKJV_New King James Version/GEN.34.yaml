document_id: GEN.34,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Dinah Incident
  - type: text
    content: 'Now '
  - type: note
    content: Gen. 30:21
  - type: text
    content: 'Dinah the daughter of Leah, whom she had borne to Jacob, went out to see the daughters of the land. '
  '10':
  - type: text
    content: So you shall dwell with us, and the land shall be before you. Dwell and trade in it, and acquire possessions for yourselves in it.”
  '11':
  - type: text
    content: 'Then Shechem said to her father and her brothers, “Let me find favor in your eyes, and whatever you say to me I will give. '
  '12':
  - type: text
    content: 'Ask me ever so much '
  - type: note
    content: Ex. 22:16, 17; Deut. 22:29
  - type: text
    content: dowry and gift, and I will give according to what you say to me; but give me the young woman as a wife.”
  '13':
  - type: text
    content: 'But the sons of Jacob answered Shechem and Hamor his father, and spoke '
  - type: note
    content: Gen. 31:7; Ex. 8:29
  - type: text
    content: 'deceitfully, because he had defiled Dinah their sister. '
  '14':
  - type: text
    content: 'And they said to them, “We cannot do this thing, to give our sister to one who is '
  - type: note
    content: Ex. 12:48
  - type: text
    content: 'uncircumcised, for '
  - type: note
    content: Josh. 5:2–9
  - type: text
    content: 'that '
  - type: text
    content: would
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' a reproach to us. '
  '15':
  - type: text
    content: 'But on this '
  - type: text
    content: condition
  - type: text
    content: ' we will consent to you: If you will become as we '
  - type: text
    content: are,
  - type: text
    content: ' if every male of you is circumcised, '
  '16':
  - type: text
    content: 'then we will give our daughters to you, and we will take your daughters to us; and we will dwell with you, and we will become one people. '
  '17':
  - type: text
    content: But if you will not heed us and be circumcised, then we will take our daughter and be gone.”
  '18':
  - type: text
    content: 'And their words pleased Hamor and Shechem, Hamor’s son. '
  '19':
  - type: text
    content: 'So the young man did not delay to do the thing, because he delighted in Jacob’s daughter. He '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 4:9
  - type: text
    content: more honorable than all the household of his father.
  '2':
  - type: text
    content: 'And when Shechem the son of Hamor the Hivite, prince of the country, saw her, he '
  - type: note
    content: Gen. 20:2
  - type: text
    content: 'took her and lay with her, and violated her. '
  '20':
  - type: text
    content: 'And Hamor and Shechem his son came to the '
  - type: note
    content: Gen. 19:1; 23:10; Ruth 4:1, 11; 2 Sam. 15:2
  - type: text
    content: 'gate of their city, and spoke with the men of their city, saying: '
  '21':
  - type: text
    content: '“These men '
  - type: text
    content: are
  - type: text
    content: ' at peace with us. Therefore let them dwell in the land and trade in it. For indeed the land '
  - type: text
    content: is
  - type: text
    content: ' large enough for them. Let us take their daughters to us as wives, and let us give them our daughters. '
  '22':
  - type: text
    content: 'Only on this '
  - type: text
    content: condition
  - type: text
    content: ' will the men consent to dwell with us, to be one people: if every male among us is circumcised as they '
  - type: text
    content: are
  - type: text
    content: ' circumcised. '
  '23':
  - type: text
    content: Will
  - type: text
    content: ' not their livestock, their property, and every animal of theirs '
  - type: text
    content: be
  - type: text
    content: ' ours? Only let us consent to them, and they will dwell with us.” '
  '24':
  - type: text
    content: 'And all who '
  - type: note
    content: Gen. 23:10, 18
  - type: text
    content: went out of the gate of his city heeded Hamor and Shechem his son; every male was circumcised, all who went out of the gate of his city.
  '25':
  - type: text
    content: 'Now it came to pass on the third day, when they were in pain, that two of the sons of Jacob, '
  - type: note
    content: Gen. 29:33, 34; 42:24; 49:5–7
  - type: text
    content: 'Simeon and Levi, Dinah’s brothers, each took his sword and came boldly upon the city and killed all the males. '
  '26':
  - type: text
    content: 'And they '
  - type: note
    content: Gen. 49:5, 6
  - type: text
    content: 'killed Hamor and Shechem his son with the edge of the sword, and took Dinah from Shechem’s house, and went out. '
  '27':
  - type: text
    content: 'The sons of Jacob came upon the slain, and plundered the city, because their sister had been defiled. '
  '28':
  - type: text
    content: 'They took their sheep, their oxen, and their donkeys, what '
  - type: text
    content: was
  - type: text
    content: ' in the city and what '
  - type: text
    content: was
  - type: text
    content: ' in the field, '
  '29':
  - type: text
    content: 'and all their wealth. All their little ones and their wives they took captive; and they plundered even all that '
  - type: text
    content: was
  - type: text
    content: ' in the houses.'
  '3':
  - type: text
    content: 'His soul was strongly attracted to Dinah the daughter of Jacob, and he loved the young woman and spoke kindly to the young woman. '
  '30':
  - type: text
    content: 'Then Jacob said to Simeon and Levi, '
  - type: note
    content: Gen. 49:6
  - type: text
    content: '“You have '
  - type: note
    content: Josh. 7:25
  - type: text
    content: 'troubled me '
  - type: note
    content: Ex. 5:21; 1 Sam. 13:4; 2 Sam. 10:6
  - type: text
    content: 'by making me obnoxious among the inhabitants of the land, among the Canaanites and the Perizzites; '
  - type: note
    content: Gen. 46:26, 27; Deut. 4:27; 1 Chr. 16:19; Ps. 105:12
  - type: text
    content: 'and since I '
  - type: text
    content: am
  - type: text
    content: ' few in number, they will gather themselves together against me and kill me. I shall be destroyed, my household and I.”'
  '31':
  - type: text
    content: But they said, “Should he treat our sister like a harlot?”
  '4':
  - type: text
    content: 'So Shechem '
  - type: note
    content: Judg. 14:2
  - type: text
    content: spoke to his father Hamor, saying, “Get me this young woman as a wife.”
  '5':
  - type: text
    content: 'And Jacob heard that he had defiled Dinah his daughter. Now his sons were with his livestock in the field; so Jacob '
  - type: note
    content: 2 Sam. 13:22
  - type: text
    content: 'held his peace until they came. '
  '6':
  - type: text
    content: 'Then Hamor the father of Shechem went out to Jacob to speak with him. '
  '7':
  - type: text
    content: 'And the sons of Jacob came in from the field when they heard '
  - type: text
    content: it;
  - type: text
    content: ' and the men were grieved and very angry, because he '
  - type: note
    content: Deut. 22:20–30; Josh. 7:15; Judg. 20:6
  - type: text
    content: 'had done a disgraceful thing in Israel by lying with Jacob’s daughter, '
  - type: note
    content: Deut. 23:17; 2 Sam. 13:12
  - type: text
    content: 'a thing which ought not to be done. '
  '8':
  - type: text
    content: 'But Hamor spoke with them, saying, “The soul of my son Shechem longs for your daughter. Please give her to him as a wife. '
  '9':
  - type: text
    content: 'And make marriages with us; give your daughters to us, and take our daughters to yourselves. '
