  - type: text
    content: 'So Joash '
  - type: note
    content: 2 Kin. 14:16
  - type: text
    content: rested with his fathers. Then Jeroboam sat on his throne. And Joash was buried in Samaria with the kings of Israel.
  - type: heading
    content: Death of Elisha
  '14':
  - type: text
    content: 'Elisha had become sick with the illness of which he would die. Then Joash the king of Israel came down to him, and wept over his face, and said, “O my father, my father, '
  - type: note
    content: 2 Kin. 2:12
  - type: text
    content: the chariots of Israel and their horsemen!”
  '15':
  - type: text
    content: 'And Elisha said to him, “Take a bow and some arrows.” So he took himself a bow and some arrows. '
  '16':
  - type: text
    content: 'Then he said to the king of Israel, “Put your hand on the bow.” So he put his hand '
  - type: text
    content: on
  - type: text
    content: ' '
  - type: text
    content: it,
  - type: text
    content: ' and Elisha put his hands on the king’s hands. '
  '17':
  - type: text
    content: 'And he said, “Open the east window”; and he opened '
  - type: text
    content: it.
  - type: text
    content: ' Then Elisha said, “Shoot”; and he shot. And he said, “The arrow of the '
  - type: heading
    content: Lord
  - type: text
    content: '’s deliverance and the arrow of deliverance from Syria; for you must strike the Syrians at '
  - type: note
    content: 1 Kin. 20:26
  - type: text
    content: 'Aphek till you have destroyed '
  - type: text
    content: them.
  - type: text
    content: '” '
  '18':
  - type: text
    content: 'Then he said, “Take the arrows”; so he took '
  - type: text
    content: them.
  - type: text
    content: ' And he said to the king of Israel, “Strike the ground”; so he struck three times, and stopped. '
  '19':
  - type: text
    content: 'And the man of God was angry with him, and said, “You should have struck five or six times; then you would have struck Syria till you had destroyed '
  - type: text
    content: it!
  - type: text
    content: ' '
  - type: note
    content: 2 Kin. 13:25
  - type: text
    content: 'But now you will strike Syria '
  - type: text
    content: only
  - type: text
    content: ' three times.”'
  '2':
  - type: text
    content: 'And he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and followed the '
  - type: note
    content: 1 Kin. 12:26–33
  - type: text
    content: sins of Jeroboam the son of Nebat, who had made Israel sin. He did not depart from them.
  '20':
  - type: text
    content: 'Then Elisha died, and they buried him. And the '
  - type: note
    content: 2 Kin. 3:5; 24:2
  - type: text
    content: raiding
  - type: text
    content: ' bands from Moab invaded the land in the spring of the year. '
  '21':
  - type: text
    content: 'So it was, as they were burying a man, that suddenly they spied a band '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: raiders;
  - type: text
    content: ' and they put the man in the tomb of Elisha; and when the man was let down and touched the bones of Elisha, he revived and stood on his feet.'
  - type: heading
    content: Israel Recaptures Cities from Syria
  '22':
  - type: text
    content: 'And '
  - type: note
    content: 2 Kin. 8:12, 13
  - type: text
    content: 'Hazael king of Syria oppressed Israel all the days of Jehoahaz. '
  '23':
  - type: text
    content: 'But the '
  - type: heading
    content: Lord
  - type: text
    content: ' was '
  - type: note
    content: 2 Kin. 14:27
  - type: text
    content: 'gracious to them, had compassion on them, and '
  - type: note
    content: (Ex. 2:24, 25)
  - type: text
    content: 'regarded them, '
  - type: note
    content: Gen. 13:16, 17; 17:2–7; Ex. 32:13
  - type: text
    content: because of His covenant with Abraham, Isaac, and Jacob, and would not yet destroy them or cast them from His presence.
  '24':
  - type: text
    content: 'Now Hazael king of Syria died. Then Ben-Hadad his son reigned in his place. '
  '25':
  - type: text
    content: 'And Jehoash the son of Jehoahaz recaptured from the hand of Ben-Hadad, the son of Hazael, the cities which he had taken out of the hand of Jehoahaz his father by war. '
  - type: note
    content: 2 Kin. 13:18, 19
  - type: text
    content: Three times Joash defeated him and recaptured the cities of Israel.
  '3':
  - type: text
    content: 'Then '
  - type: note
    content: Judg. 2:14
  - type: text
    content: 'the anger of the '
  - type: heading
    content: Lord
  - type: text
    content: ' was aroused against Israel, and He delivered them into the hand of '
  - type: note
    content: 2 Kin. 8:12
  - type: text
    content: 'Hazael king of Syria, and into the hand of '
  - type: note
    content: Amos 1:4
  - type: text
    content: 'Ben-Hadad the son of Hazael, all '
  - type: text
    content: their
  - type: text
    content: ' days. '
  '4':
  - type: text
    content: 'So Jehoahaz '
  - type: note
    content: (Ps. 78:34)
  - type: text
    content: 'pleaded with the '
  - type: heading
    content: Lord
  - type: text
    content: ', and the '
  - type: heading
    content: Lord
  - type: text
    content: ' listened to him; for '
  - type: note
    content: (Ex. 3:7, 9; Judg. 2:18); 2 Kin. 14:26
  - type: text
    content: 'He saw the oppression of Israel, because the king of Syria oppressed them. '
  '5':
  - type: note
    content: 2 Kin. 13:25; 14:25, 27; Neh. 9:27
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' gave Israel a deliverer, so that they escaped from under the hand of the Syrians; and the children of Israel dwelt in their tents as before. '
  '6':
  - type: text
    content: 'Nevertheless they did not depart from the sins of the house of Jeroboam, who had made Israel sin, '
  - type: text
    content: but
  - type: text
    content: ' walked in them; '
  - type: note
    content: 1 Kin. 16:33
  - type: text
    content: 'and the wooden image also remained in Samaria. '
  '7':
  - type: text
    content: 'For He left of the army of Jehoahaz only fifty horsemen, ten chariots, and ten thousand foot soldiers; for the king of Syria had destroyed them '
  - type: note
    content: 2 Kin. 10:32
  - type: text
    content: 'and made them '
  - type: note
    content: (Amos 1:3)
  - type: text
    content: like the dust at threshing.
  '8':
  - type: text
    content: 'Now the rest of the acts of Jehoahaz, all that he did, and his might, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel? '
  '9':
  - type: text
    content: So Jehoahaz rested with his fathers, and they buried him in Samaria. Then Joash his son reigned in his place.
  - type: heading
    content: Jehoash Reigns in Israel
