  - type: text
    content: them
  - type: text
    content: ' on his shoulders, and carried them to the top of the hill that faces Hebron.'
  '30':
  - type: text
    content: 'Then Samson said, “Let me die with the Philistines!” And he pushed with '
  - type: text
    content: all
  - type: text
    content: ' '
  - type: text
    content: his
  - type: text
    content: ' might, and the temple fell on the lords and all the people who '
  - type: text
    content: were
  - type: text
    content: ' in it. So the dead that he killed at his death were more than he had killed in his life.'
  '31':
