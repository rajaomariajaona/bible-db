    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 7:26, 27
      marker-yv: yv-n
    - type: text
      text: 'Then she lulled him to sleep on her knees, and called for a man and had him shave off the seven locks of his head. Then she began to torment him, and his strength left him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
