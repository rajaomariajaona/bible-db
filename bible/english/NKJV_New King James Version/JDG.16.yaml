  - type: text
    content: blow
  - type: text
    content: ' take vengeance on the Philistines for my two eyes!” '
  '29':
  - type: text
    content: 'And Samson took hold of the two middle pillars which supported the temple, and he braced himself against them, one on his right and the other on his left. '
  '3':
  - type: text
    content: 'And Samson lay '
  - type: text
    content: low
  - type: text
