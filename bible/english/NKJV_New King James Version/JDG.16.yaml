  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Delilah said to Samson, “Look, you have mocked me and told me lies. Now, please tell me what you may be bound with.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he said to her, “If they bind me securely with '
    - type: usfm
