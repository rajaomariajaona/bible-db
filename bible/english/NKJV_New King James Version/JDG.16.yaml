  - type: text
    content: 'merry, that they said, “Call for Samson, that he may perform for us.” So they called for Samson from the prison, and he performed for them. And they stationed him between the pillars. '
  '26':
  - type: text
    content: 'Then Samson said to the lad who held him by the hand, “Let me feel the pillars which support the temple, so that I can lean on them.” '
