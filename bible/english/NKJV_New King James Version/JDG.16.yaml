      - type: text
        text: other
    - type: text
      text: ' man.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore Delilah took new ropes and bound him with them, and said to him, “The Philistines '
    - type: usfm
