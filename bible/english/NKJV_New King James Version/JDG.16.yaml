      - type: text
        text: 2 Kin. 25:7
      marker-yv: yv-n
    - type: text
      text: 'eyes, and brought him down to Gaza. They bound him with bronze fetters, and he became a grinder in the prison. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: However, the hair of his head began to grow again after it had been shaven.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samson Dies with the Philistines
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the lords of the Philistines gathered together to offer a great sacrifice to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 5:2
      marker-yv: yv-n
    - type: text
      text: 'Dagon their god, and to rejoice. And they said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Our god has delivered into our hands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Samson our enemy!”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the people saw him, they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 5:4
      marker-yv: yv-n
    - type: text
      text: 'praised their god; for they said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Our god has delivered into our hands our enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The destroyer of our land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the one who multiplied our dead.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it happened, when their hearts were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 9:27
      marker-yv: yv-n
    - type: text
      text: 'merry, that they said, “Call for Samson, that he may perform for us.” So they called for Samson from the prison, and he performed for them. And they stationed him between the pillars. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samson said to the lad who held him by the hand, “Let me feel the pillars which support the temple, so that I can lean on them.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the temple was full of men and women. All the lords of the Philistines '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' there—about three thousand men and women on the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 22:8
      marker-yv: yv-n
    - type: text
      text: roof watching while Samson performed.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samson called to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, “O Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 15:15
      marker-yv: yv-n
    - type: text
      text: 'remember me, I pray! Strengthen me, I pray, just this once, O God, that I may with one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: blow
    - type: text
      text: ' take vengeance on the Philistines for my two eyes!” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson took hold of the two middle pillars which supported the temple, and he braced himself against them, one on his right and the other on his left. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson lay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: low
    - type: text
      text: ' till midnight; then he arose at midnight, took hold of the doors of the gate of the city and the two gateposts, pulled them up, bar and all, put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' on his shoulders, and carried them to the top of the hill that faces Hebron.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samson said, “Let me die with the Philistines!” And he pushed with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: all
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' might, and the temple fell on the lords and all the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in it. So the dead that he killed at his death were more than he had killed in his life.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his brothers and all his father’s household came down and took him, and brought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' up and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 13:25
      marker-yv: yv-n
    - type: text
      text: 'buried him between Zorah and Eshtaol in the tomb of his father Manoah. He had judged Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 15:20
      marker-yv: yv-n
    - type: text
      text: twenty years.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward it happened that he loved a woman in the Valley of Sorek, whose name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Delilah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 13:3
      marker-yv: yv-n
    - type: text
      text: 'lords of the Philistines came up to her and said to her, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 14:15
      marker-yv: yv-n
    - type: text
      text: '“Entice him, and find out where his great strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lies,
    - type: text
      text: ' and by what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: means
    - type: text
      text: ' we may overpower him, that we may bind him to afflict him; and every one of us will give you eleven hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pieces
    - type: text
      text: ' of silver.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Delilah said to Samson, “Please tell me where your great strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lies,
    - type: text
      text: ' and with what you may be bound to afflict you.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson said to her, “If they bind me with seven fresh bowstrings, not yet dried, then I shall become weak, and be like any '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' man.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the lords of the Philistines brought up to her seven fresh bowstrings, not yet dried, and she bound him with them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' lying in wait, staying with her in the room. And she said to him, “The Philistines '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' upon you, Samson!” But he broke the bowstrings as a strand of yarn breaks when it touches fire. So the secret of his strength was not known.'
