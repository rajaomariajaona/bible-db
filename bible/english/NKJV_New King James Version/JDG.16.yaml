  '18':
  - type: text
    content: 'When Delilah saw that he had told her all his heart, she sent and called for the lords of the Philistines, saying, “Come up once more, for he has told me all his heart.” So the lords of the Philistines came up to her and brought the money in their hand. '
  '19':
  - type: note
    content: Prov. 7:26, 27
  - type: text
    content: 'Then she lulled him to sleep on her knees, and called for a man and had him shave off the seven locks of his head. Then she began to torment him, and his strength left him. '
