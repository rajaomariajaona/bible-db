document_id: NUM.23,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then Balaam said to Balak, '
  - type: note
    content: Num. 23:29
  - type: text
    content: “Build seven altars for me here, and prepare for me here seven bulls and seven rams.”
  '10':
  - type: text
    content: “Who
  - type: note
    content: Gen. 13:16; 22:17; 28:14; 2 Chr. 1:9
  - type: text
    content: ' can count the dust of Jacob,'
  - type: text
    content: Or number one-fourth of Israel?
  - type: text
    content: 'Let me die '
  - type: note
    content: Ps. 116:15
  - type: text
    content: the death of the righteous,
  - type: text
    content: And let my end be like his!”
  '11':
  - type: text
    content: 'Then Balak said to Balaam, “What have you done to me? '
  - type: note
    content: Num. 22:11
  - type: text
    content: 'I took you to curse my enemies, and look, you have blessed '
  - type: text
    content: them
  - type: text
    content: ' bountifully!”'
  '12':
  - type: text
    content: 'So he answered and said, '
  - type: note
    content: Num. 22:38
  - type: text
    content: '“Must I not take heed to speak what the '
  - type: heading
    content: Lord
  - type: text
    content: ' has put in my mouth?”'
  - type: heading
    content: Balaam’s Second Prophecy
  '13':
  - type: text
    content: 'Then Balak said to him, “Please come with me to another place from which you may see them; you shall see only the outer part of them, and shall not see them all; curse them for me from there.” '
  '14':
  - type: text
    content: 'So he brought him to the field of Zophim, to the top of Pisgah, '
  - type: note
    content: Num. 23:1, 2
  - type: text
    content: 'and built seven altars, and offered a bull and a ram on '
  - type: text
    content: each
  - type: text
    content: ' altar.'
  '15':
  - type: text
    content: 'And he said to Balak, “Stand here by your burnt offering while I meet '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: heading
    content: Lord
  - type: text
    content: ' over there.”'
  '16':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' met Balaam, and '
  - type: note
    content: Num. 22:35; 23:5
  - type: text
    content: 'put a word in his mouth, and said, “Go back to Balak, and thus you shall speak.” '
  '17':
  - type: text
    content: 'So he came to him, and there he was, standing by his burnt offering, and the princes of Moab were with him. And Balak said to him, “What has the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoken?”'
  '18':
  - type: text
    content: 'Then he took up his oracle and said:'
  - type: note
    content: Judg. 3:20
  - type: text
    content: “Rise up, Balak, and hear!
  - type: text
    content: Listen to me, son of Zippor!
  '19':
  - type: text
    content: “God
  - type: note
    content: 1 Sam. 15:29; Mal. 3:6; James 1:17
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' not a man, that He should lie,'
  - type: text
    content: Nor a son of man, that He should repent.
  - type: text
    content: 'Has He '
  - type: note
    content: Num. 11:23; 1 Kin. 8:56
  - type: text
    content: said, and will He not do?
  - type: text
    content: Or has He spoken, and will He not make it good?
  '2':
  - type: text
    content: 'And Balak did just as Balaam had spoken, and Balak and Balaam '
  - type: note
    content: Num. 23:14, 30
  - type: text
    content: 'offered a bull and a ram on '
  - type: text
    content: each
  - type: text
    content: ' altar. '
  '20':
  - type: text
    content: 'Behold, I have received '
  - type: text
    content: a
  - type: text
    content: ' '
  - type: text
    content: command
  - type: text
    content: ' to bless;'
  - type: note
    content: Gen. 12:2; 22:17; Num. 22:12
  - type: text
    content: He has blessed, and I cannot reverse it.
  '21':
  - type: text
    content: “He
  - type: note
    content: Ps. 32:2; (Rom. 4:7, 8)
  - type: text
    content: ' has not observed iniquity in Jacob,'
  - type: text
    content: Nor has He seen wickedness in Israel.
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' his God '
  - type: text
    content: is
  - type: text
    content: ' with him,'
  - type: note
    content: Ps. 89:15–18
  - type: text
    content: 'And the shout of a King '
  - type: text
    content: is
  - type: text
    content: ' among them.'
  '22':
  - type: note
    content: Num. 24:8
  - type: text
    content: God brings them out of Egypt;
  - type: text
    content: 'He has '
  - type: note
    content: Deut. 33:17; Job 39:10
  - type: text
    content: strength like a wild ox.
  '23':
  - type: text
    content: '“For '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' no sorcery against Jacob,'
  - type: text
    content: Nor any divination against Israel.
  - type: text
    content: It now must be said of Jacob
  - type: text
    content: 'And of Israel, ‘Oh, '
  - type: note
    content: Ps. 31:19; 44:1
  - type: text
    content: what God has done!’
  '24':
  - type: text
    content: 'Look, a people rises '
  - type: note
    content: Gen. 49:9
  - type: text
    content: like a lioness,
  - type: text
    content: And lifts itself up like a lion;
  - type: note
    content: Gen. 49:27; Josh. 11:23
  - type: text
    content: It shall not lie down until it devours the prey,
  - type: text
    content: And drinks the blood of the slain.”
  '25':
  - type: text
    content: Then Balak said to Balaam, “Neither curse them at all, nor bless them at all!”
  '26':
  - type: text
    content: 'So Balaam answered and said to Balak, “Did I not tell you, saying, '
  - type: note
    content: Num. 22:38
  - type: text
    content: '‘All that the '
  - type: heading
    content: Lord
  - type: text
    content: ' speaks, that I must do’?”'
  - type: heading
    content: Balaam’s Third Prophecy
  '27':
  - type: text
    content: 'Then Balak said to Balaam, “Please come, I will take you to another place; perhaps it will please God that you may curse them for me from there.” '
  '28':
  - type: text
    content: 'So Balak took Balaam to the top of Peor, that '
  - type: note
    content: Num. 21:20
  - type: text
    content: 'overlooks the wasteland. '
  '29':
  - type: text
    content: 'Then Balaam said to Balak, “Build for me here seven altars, and prepare for me here seven bulls and seven rams.” '
  '3':
  - type: text
    content: 'Then Balaam said to Balak, '
  - type: note
    content: Num. 23:15
  - type: text
    content: '“Stand by your burnt offering, and I will go; perhaps the '
  - type: heading
    content: Lord
  - type: text
    content: ' will come '
  - type: note
    content: Num. 23:4, 16
  - type: text
    content: 'to meet me, and whatever He shows me I will tell you.” So he went to a desolate height. '
  '30':
  - type: text
    content: 'And Balak did as Balaam had said, and offered a bull and a ram on '
  - type: text
    content: every
  - type: text
    content: ' altar.'
  '4':
  - type: note
    content: Num. 23:16
  - type: text
    content: 'And God met Balaam, and he said to Him, “I have prepared the seven altars, and I have offered on '
  - type: text
    content: each
  - type: text
    content: ' altar a bull and a ram.”'
  '5':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Num. 22:20, 35, 38; 23:16; Deut. 18:18; Jer. 1:9
  - type: text
    content: 'put a word in Balaam’s mouth, and said, “Return to Balak, and thus you shall speak.” '
  '6':
  - type: text
    content: So he returned to him, and there he was, standing by his burnt offering, he and all the princes of Moab.
  '7':
  - type: text
    content: 'And he '
  - type: note
    content: Deut. 23:4; Job 27:1; 29:1; Ps. 78:2
  - type: text
    content: 'took up his oracle and said:'
  - type: text
    content: “Balak the king of Moab has brought me from Aram,
  - type: text
    content: From the mountains of the east.
  - type: note
    content: Num. 22:6, 11, 17
  - type: text
    content: ‘Come, curse Jacob for me,
  - type: text
    content: 'And come, '
  - type: note
    content: 1 Sam. 17:10
  - type: text
    content: denounce Israel!’
  '8':
  - type: text
    content: “How
  - type: note
    content: Num. 22:12
  - type: text
    content: ' shall I curse whom God has not cursed?'
  - type: text
    content: 'And how shall I denounce '
  - type: text
    content: whom
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' has not denounced?'
  '9':
  - type: text
    content: For from the top of the rocks I see him,
  - type: text
    content: And from the hills I behold him;
  - type: text
    content: 'There! '
  - type: note
    content: Deut. 32:8; 33:28; Josh. 11:23
  - type: text
    content: A people dwelling alone,
  - type: note
    content: Ex. 33:16; Ezra 9:2; (Eph. 2:14)
  - type: text
    content: Not reckoning itself among the nations.
