  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then I lifted my eyes and saw, and there, standing beside the river, was a ram which had two horns, and the two horns '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' high; but one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
