  - type: text
    content: 'partiality. '
  '10':
  - type: text
    content: 'For whoever shall keep the whole law, and yet '
  - type: note
    content: Gal. 3:10
  - type: text
    content: 'stumble in one '
  - type: text
    content: point,
  - type: text
    content: ' '
