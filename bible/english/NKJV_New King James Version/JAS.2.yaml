  - type: text
    content: 'he is guilty of all. '
  '11':
  - type: text
    content: 'For He who said, '
  - type: note
    content: Ex. 20:14; Deut. 5:18
  - type: text
    content: '“Do not commit adultery,” also said, '
  - type: note
    content: Ex. 20:13; Deut. 5:17
  - type: text
    content: '“Do not murder.” Now if you do not commit adultery, but you do murder, you have become a transgressor of the law. '
  '12':
  - type: text
    content: 'So speak and so do as those who will be judged by '
  - type: note
    content: James 1:25
  - type: text
    content: 'the law of liberty. '
  '13':
  - type: text
    content: 'For '
  - type: note
    content: Job 22:6
  - type: text
    content: 'judgment is without mercy to the one who has shown '
  - type: note
    content: Prov. 21:13; Matt. 18:32–35; (Luke 6:37)
  - type: text
    content: 'no '
  - type: note
    content: Mic. 7:18; (Matt. 5:7)
  - type: text
    content: 'mercy. '
  - type: note
    content: Rom. 12:8
  - type: text
    content: Mercy triumphs over judgment.
  - type: heading
    content: Faith Without Works Is Dead
  '14':
  - type: note
    content: Matt. 7:21–23, 26; 21:28–32
  - type: text
    content: 'What '
  - type: text
    content: does
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' profit, my brethren, if someone says he has faith but does not have works? Can faith save him? '
  '15':
  - type: note
    content: Matt. 25:35; Luke 3:11
  - type: text
    content: 'If a brother or sister is naked and destitute of daily food, '
  '16':
  - type: text
    content: 'and '
  - type: note
    content: (1 John 3:17, 18)
  - type: text
    content: 'one of you says to them, “Depart in peace, be warmed and filled,” but you do not give them the things which are needed for the body, what '
  - type: text
    content: does
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' profit? '
  '17':
  - type: text
    content: Thus also faith by itself, if it does not have works, is dead.
  '18':
  - type: text
    content: 'But someone will say, “You have faith, and I have works.” '
  - type: note
    content: Col. 1:6; 1 Thess. 1:3; Heb. 6:10
  - type: text
    content: 'Show me your faith without your works, '
  - type: note
    content: (Gal. 5:6); James 3:13
  - type: text
    content: 'and I will show you my faith by my works. '
  '19':
  - type: text
    content: 'You believe that there is one God. You do well. Even the demons believe—and tremble! '
  '2':
  - type: text
    content: 'For if there should come into your assembly a man with gold rings, in fine apparel, and there should also come in a poor man in filthy clothes, '
  '20':
  - type: text
    content: 'But do you want to know, O foolish man, that faith without works is dead? '
  '21':
  - type: text
    content: 'Was not Abraham our father justified by works '
  - type: note
    content: Gen. 22:9, 10, 12, 16–18
  - type: text
    content: 'when he offered Isaac his son on the altar? '
  '22':
  - type: text
    content: 'Do you see '
  - type: note
    content: (John 6:29); Heb. 11:17
  - type: text
    content: 'that faith was working together with his works, and by '
  - type: note
    content: John 8:39
  - type: text
    content: 'works faith was made perfect? '
  '23':
  - type: text
    content: 'And the Scripture was fulfilled which says, '
  - type: note
    content: Gen. 15:6; Rom. 4:3
  - type: text
    content: '“Abraham believed God, and it was accounted to him for righteousness.” And he was called '
  - type: note
    content: 2 Chr. 20:7; Is. 41:8
  - type: text
    content: 'the friend of God. '
  '24':
  - type: text
    content: You see then that a man is justified by works, and not by faith only.
  '25':
  - type: text
    content: 'Likewise, '
  - type: note
    content: Heb. 11:31
  - type: text
    content: 'was not Rahab the harlot also justified by works when she received the messengers and sent '
  - type: text
    content: them
  - type: text
    content: ' out another way?'
  '26':
  - type: text
    content: For as the body without the spirit is dead, so faith without works is dead also.
  '3':
  - type: text
    content: 'and you pay attention to the one wearing the fine clothes and say to him, “You sit here in a good place,” and say to the poor man, “You stand there,” or, “Sit here at my footstool,” '
  '4':
  - type: text
    content: have you not shown partiality among yourselves, and become judges with evil thoughts?
  '5':
  - type: text
    content: 'Listen, my beloved brethren: '
  - type: note
    content: Job 34:19; John 7:48; 1 Cor. 1:27
  - type: text
    content: 'Has God not chosen the poor of this world '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' '
  - type: note
    content: Luke 12:21; 1 Tim. 6:18; Rev. 2:9
  - type: text
    content: 'rich in faith and heirs of the kingdom '
  - type: note
    content: Ex. 20:6
  - type: text
    content: 'which He promised to those who love Him? '
  '6':
  - type: text
    content: 'But '
  - type: note
    content: 1 Cor. 11:22
  - type: text
    content: 'you have dishonored the poor man. Do not the rich oppress you '
  - type: note
    content: Acts 13:50
  - type: text
    content: 'and drag you into the courts? '
  '7':
  - type: text
    content: 'Do they not blaspheme that noble name by which you are '
  - type: note
    content: Acts 11:26; 1 Pet. 4:16
  - type: text
    content: called?
  '8':
  - type: text
    content: 'If you really fulfill '
  - type: text
    content: the
  - type: text
    content: ' royal law according to the Scripture, '
  - type: note
    content: Lev. 19:18
  - type: text
    content: '“You shall love your neighbor as yourself,” you do well; '
  '9':
  - type: text
    content: 'but if you show partiality, you commit sin, and are convicted by the law as '
  - type: note
    content: Lev. 19:15; Deut. 1:17
  - type: text
    content: 'transgressors. '
