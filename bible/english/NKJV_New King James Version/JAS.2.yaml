document_id: JAS.2,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Beware of Personal Favoritism
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My brethren, do not hold the faith of our Lord Jesus Christ, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 7:2; 1 Cor. 2:8
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of glory, with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:15
      marker-yv: yv-n
    - type: text
      text: 'partiality. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For whoever shall keep the whole law, and yet '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 3:10
      marker-yv: yv-n
    - type: text
      text: 'stumble in one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: point,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 27:26
      marker-yv: yv-n
    - type: text
      text: 'he is guilty of all. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For He who said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:14; Deut. 5:18
      marker-yv: yv-n
    - type: text
      text: '“Do not commit adultery,” also said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:13; Deut. 5:17
      marker-yv: yv-n
    - type: text
      text: '“Do not murder.” Now if you do not commit adultery, but you do murder, you have become a transgressor of the law. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So speak and so do as those who will be judged by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: James 1:25
      marker-yv: yv-n
    - type: text
      text: 'the law of liberty. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 22:6
      marker-yv: yv-n
    - type: text
      text: 'judgment is without mercy to the one who has shown '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 21:13; Matt. 18:32–35; (Luke 6:37)
      marker-yv: yv-n
    - type: text
      text: 'no '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mic. 7:18; (Matt. 5:7)
      marker-yv: yv-n
    - type: text
      text: 'mercy. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:8
      marker-yv: yv-n
    - type: text
      text: Mercy triumphs over judgment.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faith Without Works Is Dead
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 7:21–23, 26; 21:28–32
      marker-yv: yv-n
    - type: text
      text: 'What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: does
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' profit, my brethren, if someone says he has faith but does not have works? Can faith save him? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 25:35; Luke 3:11
      marker-yv: yv-n
    - type: text
      text: 'If a brother or sister is naked and destitute of daily food, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 John 3:17, 18)
      marker-yv: yv-n
    - type: text
      text: 'one of you says to them, “Depart in peace, be warmed and filled,” but you do not give them the things which are needed for the body, what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: does
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' profit? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus also faith by itself, if it does not have works, is dead.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But someone will say, “You have faith, and I have works.” '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 1:6; 1 Thess. 1:3; Heb. 6:10
      marker-yv: yv-n
    - type: text
      text: 'Show me your faith without your works, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gal. 5:6); James 3:13
      marker-yv: yv-n
    - type: text
      text: 'and I will show you my faith by my works. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You believe that there is one God. You do well. Even the demons believe—and tremble! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if there should come into your assembly a man with gold rings, in fine apparel, and there should also come in a poor man in filthy clothes, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But do you want to know, O foolish man, that faith without works is dead? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Was not Abraham our father justified by works '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 22:9, 10, 12, 16–18
      marker-yv: yv-n
    - type: text
      text: 'when he offered Isaac his son on the altar? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you see '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 6:29); Heb. 11:17
      marker-yv: yv-n
    - type: text
      text: 'that faith was working together with his works, and by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 8:39
      marker-yv: yv-n
    - type: text
      text: 'works faith was made perfect? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Scripture was fulfilled which says, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:6; Rom. 4:3
      marker-yv: yv-n
    - type: text
      text: '“Abraham believed God, and it was accounted to him for righteousness.” And he was called '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 20:7; Is. 41:8
      marker-yv: yv-n
    - type: text
      text: 'the friend of God. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You see then that a man is justified by works, and not by faith only.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Likewise, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 11:31
      marker-yv: yv-n
    - type: text
      text: 'was not Rahab the harlot also justified by works when she received the messengers and sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' out another way?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For as the body without the spirit is dead, so faith without works is dead also.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and you pay attention to the one wearing the fine clothes and say to him, “You sit here in a good place,” and say to the poor man, “You stand there,” or, “Sit here at my footstool,” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: have you not shown partiality among yourselves, and become judges with evil thoughts?
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Listen, my beloved brethren: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 34:19; John 7:48; 1 Cor. 1:27
      marker-yv: yv-n
    - type: text
      text: 'Has God not chosen the poor of this world '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 12:21; 1 Tim. 6:18; Rev. 2:9
      marker-yv: yv-n
    - type: text
      text: 'rich in faith and heirs of the kingdom '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:6
      marker-yv: yv-n
    - type: text
      text: 'which He promised to those who love Him? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 11:22
      marker-yv: yv-n
    - type: text
      text: 'you have dishonored the poor man. Do not the rich oppress you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:50
      marker-yv: yv-n
    - type: text
      text: 'and drag you into the courts? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do they not blaspheme that noble name by which you are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 11:26; 1 Pet. 4:16
      marker-yv: yv-n
    - type: text
      text: called?
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you really fulfill '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' royal law according to the Scripture, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:18
      marker-yv: yv-n
    - type: text
      text: '“You shall love your neighbor as yourself,” you do well; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but if you show partiality, you commit sin, and are convicted by the law as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:15; Deut. 1:17
      marker-yv: yv-n
    - type: text
      text: 'transgressors. '
