    - type: text
      text: The Divisions of the Priests
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the divisions of the sons of Aaron. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 10:1–6; Num. 26:60, 61; 1 Chr. 6:3
      marker-yv: yv-n
    - type: text
      text: 'The sons of Aaron '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' Nadab, Abihu, Eleazar, and Ithamar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'the seventh to Hakkoz, the eighth to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 12:4, 17; Luke 1:5
      marker-yv: yv-n
    - type: text
      text: 'Abijah, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'the ninth to Jeshua, the tenth to Shecaniah, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'the eleventh to Eliashib, the twelfth to Jakim, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'the thirteenth to Huppah, the fourteenth to Jeshebeab, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'the fifteenth to Bilgah, the sixteenth to Immer, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'the seventeenth to Hezir, the eighteenth to Happizzez, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'the nineteenth to Pethahiah, the twentieth to Jehezekel, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'the twenty-first to Jachin, the twenty-second to Gamul, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: the twenty-third to Delaiah, the twenty-fourth to Maaziah.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the schedule of their service '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 9:25
      marker-yv: yv-n
    - type: text
      text: 'for coming into the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' according to their ordinance by the hand of Aaron their father, as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel had commanded him.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Other Levites
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 3:1–4; 26:61
      marker-yv: yv-n
    - type: text
      text: 'Nadab and Abihu died before their father, and had no children; therefore Eleazar and Ithamar ministered as priests. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And the rest of the sons of Levi: of the sons of Amram, Shubael; of the sons of Shubael, Jehdeiah. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Concerning '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 23:17
      marker-yv: yv-n
    - type: text
      text: 'Rehabiah, of the sons of Rehabiah, the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Isshiah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Of the Izharites, Shelomoth; of the sons of Shelomoth, Jahath. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Of the sons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 23:19; 26:31
      marker-yv: yv-n
    - type: text
      text: 'Hebron, Jeriah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: first,
    - type: text
      text: ' Amariah the second, Jahaziel the third, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Jekameam the fourth. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Of
    - type: text
      text: ' the sons of Uzziel, Michah; of the sons of Michah, Shamir. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The brother of Michah, Isshiah; of the sons of Isshiah, Zechariah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 6:19; 1 Chr. 23:21
      marker-yv: yv-n
    - type: text
      text: 'The sons of Merari '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' Mahli and Mushi; the son of Jaaziah, Beno. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The sons of Merari by Jaaziah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' Beno, Shoham, Zaccur, and Ibri. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Of Mahli: Eleazar, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 23:22
      marker-yv: yv-n
    - type: text
      text: 'who had no sons. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Of Kish: the son of Kish, Jerahmeel.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then David with Zadok of the sons of Eleazar, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 18:16
      marker-yv: yv-n
    - type: text
      text: Ahimelech of the sons of Ithamar, divided them according to the schedule of their service.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 23:23
      marker-yv: yv-n
    - type: text
      text: 'the sons of Mushi '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' Mahli, Eder, and Jerimoth. These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of the Levites according to their fathers’ houses.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'These also cast lots just as their brothers the sons of Aaron did, in the presence of King David, Zadok, Ahimelech, and the heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses
    - type: text
      text: ' of the priests and Levites. The chief fathers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: did
    - type: text
      text: ' just as their younger brethren.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'There were more leaders found of the sons of Eleazar than of the sons of Ithamar, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thus
    - type: text
      text: ' they were divided. Among the sons of Eleazar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sixteen heads of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' fathers’ houses, and eight heads of their fathers’ houses among the sons of Ithamar. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Thus they were divided by lot, one group as another, for there were officials of the sanctuary and officials '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: house
    - type: text
      text: ' of God, from the sons of Eleazar and from the sons of Ithamar. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the scribe, Shemaiah the son of Nethanel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' the Levites, wrote them down before the king, the leaders, Zadok the priest, Ahimelech the son of Abiathar, and the heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses
    - type: text
      text: ' of the priests and Levites, one father’s house taken for Eleazar and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' for Ithamar.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Now the first lot fell to Jehoiarib, the second to Jedaiah, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'the third to Harim, the fourth to Seorim, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'the fifth to Malchijah, the sixth to Mijamin, '
