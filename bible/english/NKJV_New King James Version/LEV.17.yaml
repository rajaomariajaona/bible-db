document_id: LEV.17,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sanctity of Blood
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:4; Lev. 3:17; 7:26, 27; Deut. 12:16, 23–25; 15:23; 1 Sam. 14:33
      marker-yv: yv-n
    - type: text
      text: '‘And whatever man of the house of Israel, or of the strangers who dwell among you, who eats any blood, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 20:3, 5, 6
      marker-yv: yv-n
    - type: text
      text: 'I will set My face against that person who eats blood, and will cut him off from among his people. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:4; Lev. 17:14
      marker-yv: yv-n
    - type: text
      text: 'life of the flesh is in the blood, and I have given it to you upon the altar '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 26:28; Rom. 3:25; Eph. 1:7; Col. 1:14, 20; 1 Pet. 1:2; 1 John 1:7)
      marker-yv: yv-n
    - type: text
      text: 'to make atonement for your souls; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 9:22)
      marker-yv: yv-n
    - type: text
      text: 'it is the blood that makes atonement for the soul.’ '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Therefore I said to the children of Israel, ‘No one among you shall eat blood, nor shall any stranger who dwells among you eat blood.’
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“Whatever man of the children of Israel, or of the strangers who dwell among you, who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:26
      marker-yv: yv-n
    - type: text
      text: 'hunts and catches any animal or bird that may be eaten, he shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:16, 24
      marker-yv: yv-n
    - type: text
      text: 'pour out its blood and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 24:7
      marker-yv: yv-n
    - type: text
      text: 'cover it with dust; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:4; Lev. 17:11; Deut. 12:23
      marker-yv: yv-n
    - type: text
      text: for it is the life of all flesh. Its blood sustains its life. Therefore I said to the children of Israel, ‘You shall not eat the blood of any flesh, for the life of all flesh is its blood. Whoever eats it shall be cut off.’
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:31; Lev. 7:24; 22:8; Deut. 14:21; Ezek. 4:14; 44:31
      marker-yv: yv-n
    - type: text
      text: '“And every person who eats what died naturally or what was torn by beasts, whether he is a native of your own country or a stranger, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:25
      marker-yv: yv-n
    - type: text
      text: 'he shall both wash his clothes and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:5
      marker-yv: yv-n
    - type: text
      text: 'bathe in water, and be unclean until evening. Then he shall be clean. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But if he does not wash them or bathe his body, then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:1
      marker-yv: yv-n
    - type: text
      text: he shall bear his guilt.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Speak to Aaron, to his sons, and to all the children of Israel, and say to them, ‘This is the thing which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded, saying: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Whatever man of the house of Israel who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:5, 15, 21
      marker-yv: yv-n
    - type: text
      text: 'kills an ox or lamb or goat in the camp, or who kills it outside the camp, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and does not bring it to the door of the tabernacle of meeting to offer an offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' before the tabernacle of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the guilt of bloodshed shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 5:13
      marker-yv: yv-n
    - type: text
      text: 'imputed to that man. He has shed blood; and that man shall be cut off from among his people, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'to the end that the children of Israel may bring their sacrifices '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 21:33; 22:2; 31:54; Deut. 12:1–27; Ezek. 20:28
      marker-yv: yv-n
    - type: text
      text: 'which they offer in the open field, that they may bring them to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at the door of the tabernacle of meeting, to the priest, and offer them as peace offerings to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the priest '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:2
      marker-yv: yv-n
    - type: text
      text: 'shall sprinkle the blood on the altar of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at the door of the tabernacle of meeting, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:13, 18; Num. 18:17
      marker-yv: yv-n
    - type: text
      text: 'burn the fat for a sweet aroma to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'They shall no more offer their sacrifices '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:20; 32:8; 34:15; Deut. 32:17; 2 Chr. 11:15; Ps. 106:37; 1 Cor. 10:20
      marker-yv: yv-n
    - type: text
      text: 'to demons, after whom they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 34:15; Deut. 31:16; Ezek. 23:8
      marker-yv: yv-n
    - type: text
      text: have played the harlot. This shall be a statute forever for them throughout their generations.” ’
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“Also you shall say to them: ‘Whatever man of the house of Israel, or of the strangers who dwell among you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:2, 3; 18:26
      marker-yv: yv-n
    - type: text
      text: 'who offers a burnt offering or sacrifice, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and does not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:23
      marker-yv: yv-n
    - type: text
      text: 'bring it to the door of the tabernacle of meeting, to offer it to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', that man shall be cut off from among his people.'
