document_id: LEV.17,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sanctity of Blood
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: note
    content: Gen. 9:4; Lev. 3:17; 7:26, 27; Deut. 12:16, 23–25; 15:23; 1 Sam. 14:33
  - type: text
    content: '‘And whatever man of the house of Israel, or of the strangers who dwell among you, who eats any blood, '
  - type: note
    content: Lev. 20:3, 5, 6
  - type: text
    content: 'I will set My face against that person who eats blood, and will cut him off from among his people. '
  '11':
  - type: text
    content: 'For the '
  - type: note
    content: Gen. 9:4; Lev. 17:14
  - type: text
    content: 'life of the flesh is in the blood, and I have given it to you upon the altar '
  - type: note
    content: (Matt. 26:28; Rom. 3:25; Eph. 1:7; Col. 1:14, 20; 1 Pet. 1:2; 1 John 1:7)
  - type: text
    content: 'to make atonement for your souls; for '
  - type: note
    content: (Heb. 9:22)
  - type: text
    content: 'it is the blood that makes atonement for the soul.’ '
  '12':
  - type: text
    content: Therefore I said to the children of Israel, ‘No one among you shall eat blood, nor shall any stranger who dwells among you eat blood.’
  '13':
  - type: text
    content: '“Whatever man of the children of Israel, or of the strangers who dwell among you, who '
  - type: note
    content: Lev. 7:26
  - type: text
    content: 'hunts and catches any animal or bird that may be eaten, he shall '
  - type: note
    content: Deut. 12:16, 24
  - type: text
    content: 'pour out its blood and '
  - type: note
    content: Ezek. 24:7
  - type: text
    content: 'cover it with dust; '
  '14':
  - type: note
    content: Gen. 9:4; Lev. 17:11; Deut. 12:23
  - type: text
    content: for it is the life of all flesh. Its blood sustains its life. Therefore I said to the children of Israel, ‘You shall not eat the blood of any flesh, for the life of all flesh is its blood. Whoever eats it shall be cut off.’
  '15':
  - type: note
    content: Ex. 22:31; Lev. 7:24; 22:8; Deut. 14:21; Ezek. 4:14; 44:31
  - type: text
    content: '“And every person who eats what died naturally or what was torn by beasts, whether he is a native of your own country or a stranger, '
  - type: note
    content: Lev. 11:25
  - type: text
    content: 'he shall both wash his clothes and '
  - type: note
    content: Lev. 15:5
  - type: text
    content: 'bathe in water, and be unclean until evening. Then he shall be clean. '
  '16':
  - type: text
    content: 'But if he does not wash them or bathe his body, then '
  - type: note
    content: Lev. 5:1
  - type: text
    content: he shall bear his guilt.”
  '2':
  - type: text
    content: '“Speak to Aaron, to his sons, and to all the children of Israel, and say to them, ‘This is the thing which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has commanded, saying: '
  '3':
  - type: text
    content: '“Whatever man of the house of Israel who '
  - type: note
    content: Deut. 12:5, 15, 21
  - type: text
    content: 'kills an ox or lamb or goat in the camp, or who kills it outside the camp, '
  '4':
  - type: text
    content: 'and does not bring it to the door of the tabernacle of meeting to offer an offering to the '
  - type: heading
    content: Lord
  - type: text
    content: ' before the tabernacle of the '
  - type: heading
    content: Lord
  - type: text
    content: ', the guilt of bloodshed shall be '
  - type: note
    content: Rom. 5:13
  - type: text
    content: 'imputed to that man. He has shed blood; and that man shall be cut off from among his people, '
  '5':
  - type: text
    content: 'to the end that the children of Israel may bring their sacrifices '
  - type: note
    content: Gen. 21:33; 22:2; 31:54; Deut. 12:1–27; Ezek. 20:28
  - type: text
    content: 'which they offer in the open field, that they may bring them to the '
  - type: heading
    content: Lord
  - type: text
    content: ' at the door of the tabernacle of meeting, to the priest, and offer them as peace offerings to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And the priest '
  - type: note
    content: Lev. 3:2
  - type: text
    content: 'shall sprinkle the blood on the altar of the '
  - type: heading
    content: Lord
  - type: text
    content: ' at the door of the tabernacle of meeting, and '
  - type: note
    content: Ex. 29:13, 18; Num. 18:17
  - type: text
    content: 'burn the fat for a sweet aroma to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'They shall no more offer their sacrifices '
  - type: note
    content: Ex. 22:20; 32:8; 34:15; Deut. 32:17; 2 Chr. 11:15; Ps. 106:37; 1 Cor. 10:20
  - type: text
    content: 'to demons, after whom they '
  - type: note
    content: Ex. 34:15; Deut. 31:16; Ezek. 23:8
  - type: text
    content: have played the harlot. This shall be a statute forever for them throughout their generations.” ’
  '8':
  - type: text
    content: '“Also you shall say to them: ‘Whatever man of the house of Israel, or of the strangers who dwell among you, '
  - type: note
    content: Lev. 1:2, 3; 18:26
  - type: text
    content: 'who offers a burnt offering or sacrifice, '
  '9':
  - type: text
    content: 'and does not '
  - type: note
    content: Lev. 14:23
  - type: text
    content: 'bring it to the door of the tabernacle of meeting, to offer it to the '
  - type: heading
    content: Lord
  - type: text
    content: ', that man shall be cut off from among his people.'
