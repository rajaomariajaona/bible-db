verses:
  '1':
  - type: heading
    content: Daniel and His Friends Obey God
  - type: text
    content: 'In the third year of the reign of '
  - type: note
    content: 2 Kin. 24:1, 2; 2 Chr. 36:5–7; Jer. 25:1; 52:12–30
  - type: text
    content: 'Jehoiakim king of Judah, Nebuchadnezzar king of Babylon came to Jerusalem and besieged it. '
  '10':
  - type: text
    content: 'And the chief of the eunuchs said to Daniel, “I fear my lord the king, who has appointed your food and drink. For why should he see your faces looking worse than the young men who '
  - type: text
    content: are
  - type: text
    content: ' your age? Then you would endanger my head before the king.”'
  '11':
  - type: text
    content: 'So Daniel said to the steward whom the chief of the eunuchs had set over Daniel, Hananiah, Mishael, and Azariah, '
  '12':
  - type: text
    content: '“Please test your servants for ten days, and let them give us vegetables to eat and water to drink. '
  '13':
  - type: text
    content: 'Then let our appearance be examined before you, and the appearance of the young men who eat the portion of the king’s delicacies; and as you see fit, '
  - type: text
    content: so
  - type: text
    content: ' deal with your servants.” '
  '14':
  - type: text
    content: So he consented with them in this matter, and tested them ten days.
  '15':
  - type: text
    content: 'And at the end of ten days their features appeared better and fatter in flesh than all the young men who ate the portion of the king’s delicacies. '
  '16':
  - type: text
    content: Thus the steward took away their portion of delicacies and the wine that they were to drink, and gave them vegetables.
  '17':
  - type: text
    content: 'As for these four young men, '
  - type: note
    content: 1 Kin. 3:12, 28; 2 Chr. 1:10–12; (Luke 21:15; James 1:5–7)
  - type: text
    content: 'God gave them '
  - type: note
    content: Acts 7:22
  - type: text
    content: 'knowledge and skill in all literature and wisdom; and Daniel had '
  - type: note
    content: Num. 12:6; 2 Chr. 26:5; Dan. 5:11, 12, 14; 10:1
  - type: text
    content: understanding in all visions and dreams.
  '18':
  - type: text
    content: 'Now at the end of the days, when the king had said that they should be brought in, the chief of the eunuchs brought them in before Nebuchadnezzar. '
  '19':
  - type: text
    content: 'Then the king interviewed them, and among them all none was found like Daniel, Hananiah, Mishael, and Azariah; therefore '
  - type: note
    content: Gen. 41:46; (Prov. 22:29); Dan. 1:5
  - type: text
    content: 'they served before the king. '
  '2':
  - type: text
    content: 'And the Lord gave Jehoiakim king of Judah into his hand, with '
  - type: note
    content: 2 Chr. 36:7; Jer. 27:19, 20; Dan. 5:2
  - type: text
    content: 'some of the articles of the house of God, which he carried '
  - type: note
    content: Gen. 10:10; 11:2; Is. 11:11; Zech. 5:11
  - type: text
    content: 'into the land of Shinar to the house of his god; '
  - type: note
    content: 2 Chr. 36:7
  - type: text
    content: and he brought the articles into the treasure house of his god.
  '20':
  - type: note
    content: 1 Kin. 10:1
  - type: text
    content: 'And in all matters of wisdom '
  - type: text
    content: and
  - type: text
    content: ' understanding about which the king examined them, he found them ten times better than all the magicians '
  - type: text
    content: and
  - type: text
    content: ' astrologers who '
  - type: text
    content: were
  - type: text
    content: ' in all his realm. '
  '21':
  - type: note
    content: Dan. 6:28; 10:1
  - type: text
    content: Thus Daniel continued until the first year of King Cyrus.
  '3':
  - type: text
    content: 'Then the king instructed Ashpenaz, the master of his eunuchs, to bring '
  - type: note
    content: 2 Kin. 20:17, 18; Is. 39:7
  - type: text
    content: 'some of the children of Israel and some of the king’s descendants and some of the nobles, '
  '4':
  - type: text
    content: 'young men '
  - type: note
    content: Lev. 24:19, 20
  - type: text
    content: 'in whom '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' no blemish, but good-looking, gifted in all wisdom, possessing knowledge and quick to understand, who '
  - type: text
    content: had
  - type: text
    content: ' ability to serve in the king’s palace, and '
  - type: note
    content: Acts 7:22
  - type: text
    content: 'whom they might teach the language and literature of the Chaldeans. '
  '5':
  - type: text
    content: 'And the king appointed for them a daily provision of the king’s delicacies and of the wine which he drank, and three years of training for them, so that at the end of '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: time
  - type: text
    content: ' they might '
  - type: note
    content: Gen. 41:46; 1 Sam. 16:22; 1 Kin. 10:8; Dan. 1:19
  - type: text
    content: 'serve before the king. '
  '6':
  - type: text
    content: 'Now from among those of the sons of Judah were Daniel, Hananiah, Mishael, and Azariah. '
  '7':
  - type: note
    content: Gen. 41:45; 2 Kin. 24:17
  - type: text
    content: 'To them the chief of the eunuchs gave names: '
  - type: note
    content: Dan. 2:26; 4:8; 5:12
  - type: text
    content: 'he gave Daniel '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: name
  - type: text
    content: ' Belteshazzar; to Hananiah, Shadrach; to Mishael, Meshach; and to Azariah, Abed-Nego.'
  '8':
  - type: text
    content: 'But Daniel purposed in his heart that he would not defile himself '
  - type: note
    content: Lev. 11:47; Deut. 32:38; Ezek. 4:13; Hos. 9:3
  - type: text
    content: 'with the portion of the king’s delicacies, nor with the wine which he drank; therefore he requested of the chief of the eunuchs that he might not defile himself. '
  '9':
  - type: text
    content: 'Now '
  - type: note
    content: Gen. 39:21; 1 Kin. 8:50; (Job 5:15, 16); Ps. 106:46; (Prov. 16:7); Acts 7:10; 27:3
  - type: text
    content: 'God had brought Daniel into the favor and goodwill of the chief of the eunuchs. '
