document_id: DAN.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Daniel and His Friends Obey God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the third year of the reign of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:1, 2; 2 Chr. 36:5–7; Jer. 25:1; 52:12–30
      marker-yv: yv-n
    - type: text
      text: 'Jehoiakim king of Judah, Nebuchadnezzar king of Babylon came to Jerusalem and besieged it. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the chief of the eunuchs said to Daniel, “I fear my lord the king, who has appointed your food and drink. For why should he see your faces looking worse than the young men who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' your age? Then you would endanger my head before the king.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So Daniel said to the steward whom the chief of the eunuchs had set over Daniel, Hananiah, Mishael, and Azariah, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“Please test your servants for ten days, and let them give us vegetables to eat and water to drink. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then let our appearance be examined before you, and the appearance of the young men who eat the portion of the king’s delicacies; and as you see fit, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so
    - type: text
      text: ' deal with your servants.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So he consented with them in this matter, and tested them ten days.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And at the end of ten days their features appeared better and fatter in flesh than all the young men who ate the portion of the king’s delicacies. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Thus the steward took away their portion of delicacies and the wine that they were to drink, and gave them vegetables.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'As for these four young men, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 3:12, 28; 2 Chr. 1:10–12; (Luke 21:15; James 1:5–7)
      marker-yv: yv-n
    - type: text
      text: 'God gave them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 7:22
      marker-yv: yv-n
    - type: text
      text: 'knowledge and skill in all literature and wisdom; and Daniel had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 12:6; 2 Chr. 26:5; Dan. 5:11, 12, 14; 10:1
      marker-yv: yv-n
    - type: text
      text: understanding in all visions and dreams.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Now at the end of the days, when the king had said that they should be brought in, the chief of the eunuchs brought them in before Nebuchadnezzar. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then the king interviewed them, and among them all none was found like Daniel, Hananiah, Mishael, and Azariah; therefore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:46; (Prov. 22:29); Dan. 1:5
      marker-yv: yv-n
    - type: text
      text: 'they served before the king. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the Lord gave Jehoiakim king of Judah into his hand, with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 36:7; Jer. 27:19, 20; Dan. 5:2
      marker-yv: yv-n
    - type: text
      text: 'some of the articles of the house of God, which he carried '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 10:10; 11:2; Is. 11:11; Zech. 5:11
      marker-yv: yv-n
    - type: text
      text: 'into the land of Shinar to the house of his god; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 36:7
      marker-yv: yv-n
    - type: text
      text: and he brought the articles into the treasure house of his god.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 10:1
      marker-yv: yv-n
    - type: text
      text: 'And in all matters of wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding about which the king examined them, he found them ten times better than all the magicians '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' astrologers who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in all his realm. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 6:28; 10:1
      marker-yv: yv-n
    - type: text
      text: Thus Daniel continued until the first year of King Cyrus.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then the king instructed Ashpenaz, the master of his eunuchs, to bring '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 20:17, 18; Is. 39:7
      marker-yv: yv-n
    - type: text
      text: 'some of the children of Israel and some of the king’s descendants and some of the nobles, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'young men '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 24:19, 20
      marker-yv: yv-n
    - type: text
      text: 'in whom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' no blemish, but good-looking, gifted in all wisdom, possessing knowledge and quick to understand, who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' ability to serve in the king’s palace, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 7:22
      marker-yv: yv-n
    - type: text
      text: 'whom they might teach the language and literature of the Chaldeans. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the king appointed for them a daily provision of the king’s delicacies and of the wine which he drank, and three years of training for them, so that at the end of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: time
    - type: text
      text: ' they might '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:46; 1 Sam. 16:22; 1 Kin. 10:8; Dan. 1:19
      marker-yv: yv-n
    - type: text
      text: 'serve before the king. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now from among those of the sons of Judah were Daniel, Hananiah, Mishael, and Azariah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:45; 2 Kin. 24:17
      marker-yv: yv-n
    - type: text
      text: 'To them the chief of the eunuchs gave names: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 2:26; 4:8; 5:12
      marker-yv: yv-n
    - type: text
      text: 'he gave Daniel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: name
    - type: text
      text: ' Belteshazzar; to Hananiah, Shadrach; to Mishael, Meshach; and to Azariah, Abed-Nego.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But Daniel purposed in his heart that he would not defile himself '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:47; Deut. 32:38; Ezek. 4:13; Hos. 9:3
      marker-yv: yv-n
    - type: text
      text: 'with the portion of the king’s delicacies, nor with the wine which he drank; therefore he requested of the chief of the eunuchs that he might not defile himself. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 39:21; 1 Kin. 8:50; (Job 5:15, 16); Ps. 106:46; (Prov. 16:7); Acts 7:10; 27:3
      marker-yv: yv-n
    - type: text
      text: 'God had brought Daniel into the favor and goodwill of the chief of the eunuchs. '
