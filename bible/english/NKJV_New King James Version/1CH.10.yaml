document_id: 1CH.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tragic End of Saul and His Sons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 31:1, 2
    marker-yv: yv-n
  - type: text
    text: 'the Philistines fought against Israel; and the men of Israel fled from before the Philistines, and fell slain on Mount Gilboa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then the Philistines followed hard after Saul and his sons. And the Philistines killed Jonathan, Abinadab, and Malchishua, Saul’s sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The battle became fierce against Saul. The archers hit him, and he was wounded by the archers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Saul said to his armorbearer, “Draw your sword, and thrust me through with it, lest these uncircumcised men come and abuse me.” But his armorbearer would not, for he was greatly afraid. Therefore Saul took a sword and fell on it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when his armorbearer saw that Saul was dead, he also fell on his sword and died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Saul and his three sons died, and all his house died together. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And when all the men of Israel who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in the valley saw that they had fled and that Saul and his sons were dead, they forsook their cities and fled; then the Philistines came and dwelt in them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So it happened the next day, when the Philistines came to strip the slain, that they found Saul and his sons fallen on Mount Gilboa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they stripped him and took his head and his armor, and sent word throughout the land of the Philistines to proclaim the news '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: temple
  - type: text
    text: ' of their idols and among the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 31:10
    marker-yv: yv-n
  - type: text
    text: Then they put his armor in the temple of their gods, and fastened his head in the temple of Dagon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And when all Jabesh Gilead heard all that the Philistines had done to Saul, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'all the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 14:52
    marker-yv: yv-n
  - type: text
    text: 'valiant men arose and took the body of Saul and the bodies of his sons; and they brought them to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 21:12
    marker-yv: yv-n
  - type: text
    text: Jabesh, and buried their bones under the tamarisk tree at Jabesh, and fasted seven days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So Saul died for his unfaithfulness which he had committed against the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 13:13, 14; 15:22–26
    marker-yv: yv-n
  - type: text
    text: 'because he did not keep the word of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and also because '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Lev. 19:31; 20:6); 1 Sam. 28:7
    marker-yv: yv-n
  - type: text
    text: 'he consulted a medium for guidance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he
  - type: text
    text: ' did not inquire of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '; therefore He killed him, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 15:28; 2 Sam. 3:9, 10; 5:3; 1 Chr. 12:23
    marker-yv: yv-n
  - type: text
    text: turned the kingdom over to David the son of Jesse.
