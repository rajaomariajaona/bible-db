verses:
  '1':
  - type: heading
    content: Tragic End of Saul and His Sons
  - type: text
    content: 'Now '
  - type: note
    content: 1 Sam. 31:1, 2
  - type: text
    content: 'the Philistines fought against Israel; and the men of Israel fled from before the Philistines, and fell slain on Mount Gilboa. '
  '10':
  - type: note
    content: 1 Sam. 31:10
  - type: text
    content: Then they put his armor in the temple of their gods, and fastened his head in the temple of Dagon.
  '11':
  - type: text
    content: 'And when all Jabesh Gilead heard all that the Philistines had done to Saul, '
  '12':
  - type: text
    content: 'all the '
  - type: note
    content: 1 Sam. 14:52
  - type: text
    content: 'valiant men arose and took the body of Saul and the bodies of his sons; and they brought them to '
  - type: note
    content: 2 Sam. 21:12
  - type: text
    content: Jabesh, and buried their bones under the tamarisk tree at Jabesh, and fasted seven days.
  '13':
  - type: text
    content: 'So Saul died for his unfaithfulness which he had committed against the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 1 Sam. 13:13, 14; 15:22–26
  - type: text
    content: 'because he did not keep the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and also because '
  - type: note
    content: (Lev. 19:31; 20:6); 1 Sam. 28:7
  - type: text
    content: 'he consulted a medium for guidance. '
  '14':
  - type: text
    content: 'But '
  - type: text
    content: he
  - type: text
    content: ' did not inquire of the '
  - type: heading
    content: Lord
  - type: text
    content: '; therefore He killed him, and '
  - type: note
    content: 1 Sam. 15:28; 2 Sam. 3:9, 10; 5:3; 1 Chr. 12:23
  - type: text
    content: turned the kingdom over to David the son of Jesse.
  '2':
  - type: text
    content: 'Then the Philistines followed hard after Saul and his sons. And the Philistines killed Jonathan, Abinadab, and Malchishua, Saul’s sons. '
  '3':
  - type: text
    content: 'The battle became fierce against Saul. The archers hit him, and he was wounded by the archers. '
  '4':
  - type: text
    content: 'Then Saul said to his armorbearer, “Draw your sword, and thrust me through with it, lest these uncircumcised men come and abuse me.” But his armorbearer would not, for he was greatly afraid. Therefore Saul took a sword and fell on it. '
  '5':
  - type: text
    content: 'And when his armorbearer saw that Saul was dead, he also fell on his sword and died. '
  '6':
  - type: text
    content: 'So Saul and his three sons died, and all his house died together. '
  '7':
  - type: text
    content: 'And when all the men of Israel who '
  - type: text
    content: were
  - type: text
    content: ' in the valley saw that they had fled and that Saul and his sons were dead, they forsook their cities and fled; then the Philistines came and dwelt in them.'
  '8':
  - type: text
    content: 'So it happened the next day, when the Philistines came to strip the slain, that they found Saul and his sons fallen on Mount Gilboa. '
  '9':
  - type: text
    content: 'And they stripped him and took his head and his armor, and sent word throughout the land of the Philistines to proclaim the news '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: temple
  - type: text
    content: ' of their idols and among the people. '
