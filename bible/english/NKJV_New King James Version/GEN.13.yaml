document_id: GEN.13,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abram Inherits Canaan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abram went up from Egypt, he and his wife and all that he had, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:4; 14:12, 16
      marker-yv: yv-n
    - type: text
      text: 'Lot with him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:9
      marker-yv: yv-n
    - type: text
      text: 'to the South. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Lot lifted his eyes and saw all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:17–29; Deut. 34:3
      marker-yv: yv-n
    - type: text
      text: 'the plain of Jordan, that it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' well watered everywhere (before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:24
      marker-yv: yv-n
    - type: text
      text: 'destroyed Sodom and Gomorrah) '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 2:8, 10; Is. 51:3
      marker-yv: yv-n
    - type: text
      text: 'like the garden of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', like the land of Egypt as you go toward '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:2, 8; 19:22; Deut. 34:3
      marker-yv: yv-n
    - type: text
      text: 'Zoar. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Lot chose for himself all the plain of Jordan, and Lot journeyed east. And they separated from each other. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram dwelt in the land of Canaan, and Lot '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:24, 25, 29
      marker-yv: yv-n
    - type: text
      text: 'dwelt in the cities of the plain and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:12; 19:1
      marker-yv: yv-n
    - type: text
      text: 'pitched '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' tent even as far as Sodom. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the men of Sodom '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 18:20, 21; Ezek. 16:49; 2 Pet. 2:7, 8
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' exceedingly wicked and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 6:11; 39:9; Num. 32:23
      marker-yv: yv-n
    - type: text
      text: 'sinful against the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Abram, after Lot '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 13:11
      marker-yv: yv-n
    - type: text
      text: 'had separated from him: “Lift your eyes now and look from the place where you are—'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 28:14
      marker-yv: yv-n
    - type: text
      text: 'northward, southward, eastward, and westward; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for all the land which you see '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:7; 13:17; 15:7, 18; 17:8; Deut. 34:4; Acts 7:5
      marker-yv: yv-n
    - type: text
      text: 'I give to you and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 20:7; Ps. 37:22
      marker-yv: yv-n
    - type: text
      text: 'your descendants forever. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 22:17; Ex. 32:13; Num. 23:10
      marker-yv: yv-n
    - type: text
      text: 'I will make your descendants as the dust of the earth; so that if a man could number the dust of the earth, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: then
    - type: text
      text: ' your descendants also could be numbered. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Arise, walk in the land through its length and its width, for I give it to you.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 26:17
      marker-yv: yv-n
    - type: text
      text: 'Then Abram moved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' tent, and went and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:13
      marker-yv: yv-n
    - type: text
      text: 'dwelt by the terebinth trees of Mamre, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 23:2; 35:27
      marker-yv: yv-n
    - type: text
      text: 'which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in Hebron, and built an '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 8:20; 22:8, 9
      marker-yv: yv-n
    - type: text
      text: 'altar there to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 24:35; 26:14; Ps. 112:3; Prov. 10:22
      marker-yv: yv-n
    - type: text
      text: 'Abram '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' very rich in livestock, in silver, and in gold. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he went on his journey '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:8, 9
      marker-yv: yv-n
    - type: text
      text: 'from the South as far as Bethel, to the place where his tent had been at the beginning, between Bethel and Ai, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:7, 8; 21:33
      marker-yv: yv-n
    - type: text
      text: 'place of the altar which he had made there at first. And there Abram '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 116:17
      marker-yv: yv-n
    - type: text
      text: 'called on the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lot also, who went with Abram, had flocks and herds and tents. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 36:7
      marker-yv: yv-n
    - type: text
      text: 'the land was not able to support them, that they might dwell together, for their possessions were so great that they could not dwell together. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 26:20
      marker-yv: yv-n
    - type: text
      text: 'strife between the herdsmen of Abram’s livestock and the herdsmen of Lot’s livestock. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:6; 15:20, 21
      marker-yv: yv-n
    - type: text
      text: The Canaanites and the Perizzites then dwelt in the land.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Abram said to Lot, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 6:7; (Phil. 2:14, 15)
      marker-yv: yv-n
    - type: text
      text: '“Please let there be no strife between you and me, and between my herdsmen and your herdsmen; for we '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' brethren. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 20:15; 34:10
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' not the whole land before you? Please '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 13:11, 14
      marker-yv: yv-n
    - type: text
      text: 'separate from me. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 12:18)
      marker-yv: yv-n
    - type: text
      text: 'If '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: take
    - type: text
      text: ' the left, then I will go to the right; or, if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: go
    - type: text
      text: ' to the right, then I will go to the left.”'
