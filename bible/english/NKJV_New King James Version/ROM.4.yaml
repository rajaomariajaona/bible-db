      children:
      - type: text
        text: something
    - type: text
      text: ' to boast about, but not before God. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did not waver at the promise of God through unbelief, but was strengthened in faith, giving glory to God, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and being fully convinced that what He had promised '
    - type: usfm
      marker: x
      children:
