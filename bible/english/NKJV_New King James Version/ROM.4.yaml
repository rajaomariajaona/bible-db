    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 11:11
      marker-yv: yv-n
    - type: text
      text: 'and the deadness of Sarah’s womb. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if Abraham was '
    - type: usfm
      marker: x
      children:
      - type: text
