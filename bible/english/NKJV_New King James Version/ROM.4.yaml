  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but also for us. It shall be imputed to us who believe '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:24
      marker-yv: yv-n
    - type: text
      text: 'in Him who raised up Jesus our Lord from the dead, '
