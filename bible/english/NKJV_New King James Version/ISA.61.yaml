      marker-yv: yv-n
    - type: text
      text: 'righteousness and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 60:18; 62:7
      marker-yv: yv-n
    - type: text
      text: praise to spring forth before all the nations.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 25:9
      marker-yv: yv-n
    - type: text
      text: 'To proclaim the acceptable year of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 34:8; Mal. 4:1, 3; (2 Thess. 1:7)
      marker-yv: yv-n
    - type: text
      text: the day of vengeance of our God;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 57:18; Jer. 31:13; Matt. 5:4
      marker-yv: yv-n
    - type: text
      text: To comfort all who mourn,
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To console those who mourn in Zion,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 30:11
      marker-yv: yv-n
    - type: text
      text: To give them beauty for ashes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The oil of joy for mourning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The garment of praise for the spirit of heaviness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That they may be called trees of righteousness,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 60:21; (Jer. 17:7, 8)
      marker-yv: yv-n
    - type: text
      text: 'The planting of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 15:8)
      marker-yv: yv-n
    - type: text
      text: that He may be glorified.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 49:8; 58:12; Ezek. 36:33; Amos 9:14
      marker-yv: yv-n
    - type: text
      text: rebuild the old ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They shall raise up the former desolations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they shall repair the ruined cities,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The desolations of many generations.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eph. 2:12)
      marker-yv: yv-n
    - type: text
      text: Strangers shall stand and feed your flocks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the sons of the foreigner
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' your plowmen and your vinedressers.'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:6
      marker-yv: yv-n
    - type: text
      text: 'But you shall be named the priests of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They shall call you the servants of our God.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 60:5, 11
      marker-yv: yv-n
    - type: text
      text: You shall eat the riches of the Gentiles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in their glory you shall boast.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 40:2; Zech. 9:12
      marker-yv: yv-n
    - type: text
      text: 'Instead of your shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' double '
    - type: usfm
      marker: it
      children:
      - type: text
        text: honor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: instead
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' confusion they shall rejoice in their portion.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore in their land they shall possess double;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everlasting joy shall be theirs.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 11:7
      marker-yv: yv-n
    - type: text
      text: 'I, the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', love justice;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 1:11, 13
      marker-yv: yv-n
    - type: text
      text: I hate robbery for burnt offering;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will direct their work in truth,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:7; Ps. 105:10; Is. 55:3; Jer. 32:40
      marker-yv: yv-n
    - type: text
      text: And will make with them an everlasting covenant.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their descendants shall be known among the Gentiles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their offspring among the people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All who see them shall acknowledge them,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 65:23
      marker-yv: yv-n
    - type: text
      text: 'That they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the posterity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: whom
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has blessed.”'
