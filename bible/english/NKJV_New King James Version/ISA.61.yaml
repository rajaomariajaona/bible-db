  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hab. 3:18
      marker-yv: yv-n
    - type: text
      text: 'I will greatly rejoice in the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My soul shall be joyful in my God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 132:9, 16
      marker-yv: yv-n
    - type: text
      text: He has clothed me with the garments of salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has covered me with the robe of righteousness,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 49:18; Rev. 21:2
      marker-yv: yv-n
    - type: text
      text: 'As a bridegroom decks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: himself
    - type: text
      text: ' with ornaments,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And as a bride adorns '
    - type: usfm
      marker: it
      children:
      - type: text
        text: herself
    - type: text
      text: ' with her jewels.'
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For as the earth brings forth its bud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As the garden causes the things that are sown in it to spring forth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So the Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
