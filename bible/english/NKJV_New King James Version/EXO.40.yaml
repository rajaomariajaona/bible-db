  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:37; 30:7, 8; 40:4; Lev. 24:3, 4
    marker-yv: yv-n
  - type: text
    text: 'he lit the lamps before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:1, 6; 40:5
    marker-yv: yv-n
  - type: text
    text: 'He put the gold altar in the tabernacle of meeting in front of the veil; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:7
    marker-yv: yv-n
  - type: text
    text: 'and he burned sweet incense on it, as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 26:36; 40:5
    marker-yv: yv-n
  - type: text
    text: 'He hung up the screen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: at
  - type: text
    text: ' the door of the tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 40:6
    marker-yv: yv-n
  - type: text
    text: 'And he put the altar of burnt offering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: before
  - type: text
    text: ' the door of the tabernacle of the tent of meeting, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:38–42
    marker-yv: yv-n
  - type: text
    text: 'offered upon it the burnt offering and the grain offering, as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:18; 40:7
    marker-yv: yv-n
  - type: text
    text: 'He set the laver between the tabernacle of meeting and the altar, and put water there for washing; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and Moses, Aaron, and his sons would '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:19, 20; John 13:8
    marker-yv: yv-n
  - type: text
    text: 'wash their hands and their feet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: water
  - type: text
    text: ' from it. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Whenever they went into the tabernacle of meeting, and when they came near the altar, they washed, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:19
    marker-yv: yv-n
  - type: text
    text: 'as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 27:9–18; 40:8
    marker-yv: yv-n
  - type: text
    text: 'And he raised up the court all around the tabernacle and the altar, and hung up the screen of the court gate. So Moses '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Heb. 3:2–5)
    marker-yv: yv-n
  - type: text
    text: finished the work.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Cloud and the Glory
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:43; Lev. 16:2; Num. 9:15; 2 Chr. 5:13; Is. 6:4
    marker-yv: yv-n
  - type: text
    text: 'Then the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 8:10, 11
    marker-yv: yv-n
  - type: text
    text: 'cloud covered the tabernacle of meeting, and the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 9:6, 23
    marker-yv: yv-n
  - type: text
    text: 'glory of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' filled the tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And Moses '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Lev. 16:2); 1 Kin. 8:11; 2 Chr. 5:13, 14
    marker-yv: yv-n
  - type: text
    text: 'was not able to enter the tabernacle of meeting, because the cloud rested above it, and the glory of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' filled the tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 13:21, 22; Num. 9:17; Neh. 9:19
    marker-yv: yv-n
  - type: text
    text: 'Whenever the cloud was taken up from above the tabernacle, the children of Israel would go onward in all their journeys. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 9:19–22
    marker-yv: yv-n
  - type: text
    text: 'if the cloud was not taken up, then they did not journey till the day that it was taken up. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 13:21; Num. 9:15; Ps. 78:14; Is. 4:5
    marker-yv: yv-n
  - type: text
    text: 'the cloud of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' above the tabernacle by day, and fire was over it by night, in the sight of all the house of Israel, throughout all their journeys.'
