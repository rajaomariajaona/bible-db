document_id: EXO.40,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tabernacle Erected and Arranged
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 25:1—31:18
  - type: text
    content: 'spoke to Moses, saying: '
  '10':
  - type: text
    content: 'You shall '
  - type: note
    content: Ex. 30:26–30
  - type: text
    content: 'anoint the altar of the burnt offering and all its utensils, and consecrate the altar. '
  - type: note
    content: Ex. 29:36, 37
  - type: text
    content: 'The altar shall be most holy. '
  '11':
  - type: text
    content: And you shall anoint the laver and its base, and consecrate it.
  '12':
  - type: note
    content: Ex. 29:4–9; Lev. 8:1–13
  - type: text
    content: '“Then you shall bring Aaron and his sons to the door of the tabernacle of meeting and wash them with water. '
  '13':
  - type: text
    content: 'You shall put the holy '
  - type: note
    content: Ex. 29:5; 39:1, 41
  - type: text
    content: 'garments on Aaron, '
  - type: note
    content: (Ex. 28:41); Lev. 8:12
  - type: text
    content: 'and anoint him and consecrate him, that he may minister to Me as priest. '
  '14':
  - type: text
    content: 'And you shall bring his sons and clothe them with tunics. '
  '15':
  - type: text
    content: 'You shall anoint them, as you anointed their father, that they may minister to Me as priests; for their anointing shall surely be '
  - type: note
    content: Ex. 29:9; Num. 25:13
  - type: text
    content: an everlasting priesthood throughout their generations.”
  '16':
  - type: text
    content: 'Thus Moses did; according to all that the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded him, so he did.'
  '17':
  - type: text
    content: 'And it came to pass in the first month of the second year, on the first '
  - type: text
    content: day
  - type: text
    content: ' of the month, '
  - type: text
    content: that
  - type: text
    content: ' the '
  - type: note
    content: Ex. 40:2; Num. 7:1
  - type: text
    content: 'tabernacle was raised up. '
  '18':
  - type: text
    content: 'So Moses raised up the tabernacle, fastened its sockets, set up its boards, put in its bars, and raised up its pillars. '
  '19':
  - type: text
    content: 'And he spread out the tent over the tabernacle and put the covering of the tent on top of it, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '2':
  - type: text
    content: '“On the first day of the '
  - type: note
    content: Ex. 12:2; 13:4
  - type: text
    content: 'first month you shall set up '
  - type: note
    content: Ex. 26:1, 30; 40:17
  - type: text
    content: 'the tabernacle of the tent of meeting. '
  '20':
  - type: text
    content: 'He took '
  - type: note
    content: Ex. 25:16; Deut. 10:5; 1 Kin. 8:9; 2 Chr. 5:10; Heb. 9:4
  - type: text
    content: 'the Testimony and put '
  - type: text
    content: it
  - type: text
    content: ' into the ark, inserted the poles through the rings of the ark, and put the mercy seat on top of the ark. '
  '21':
  - type: text
    content: 'And he brought the ark into the tabernacle, '
  - type: note
    content: Ex. 26:33
  - type: text
    content: 'hung up the veil of the covering, and partitioned off the ark of the Testimony, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '22':
  - type: note
    content: Ex. 26:35
  - type: text
    content: 'He put the table in the tabernacle of meeting, on the north side of the tabernacle, outside the veil; '
  '23':
  - type: note
    content: Ex. 40:4; Lev. 24:5, 6
  - type: text
    content: 'and he set the bread in order upon it before the '
  - type: heading
    content: Lord
  - type: text
    content: ', as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '24':
  - type: note
    content: Ex. 26:35
  - type: text
    content: 'He put the lampstand in the tabernacle of meeting, across from the table, on the south side of the tabernacle; '
  '25':
  - type: text
    content: 'and '
  - type: note
    content: Ex. 25:37; 30:7, 8; 40:4; Lev. 24:3, 4
  - type: text
    content: 'he lit the lamps before the '
  - type: heading
    content: Lord
  - type: text
    content: ', as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '26':
  - type: note
    content: Ex. 30:1, 6; 40:5
  - type: text
    content: 'He put the gold altar in the tabernacle of meeting in front of the veil; '
  '27':
  - type: note
    content: Ex. 30:7
  - type: text
    content: 'and he burned sweet incense on it, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '28':
  - type: note
    content: Ex. 26:36; 40:5
  - type: text
    content: 'He hung up the screen '
  - type: text
    content: at
  - type: text
    content: ' the door of the tabernacle. '
  '29':
  - type: note
    content: Ex. 40:6
  - type: text
    content: 'And he put the altar of burnt offering '
  - type: text
    content: before
  - type: text
    content: ' the door of the tabernacle of the tent of meeting, and '
  - type: note
    content: Ex. 29:38–42
  - type: text
    content: 'offered upon it the burnt offering and the grain offering, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '3':
  - type: note
    content: Ex. 26:33; 40:21; Lev. 16:2; Num. 4:5
  - type: text
    content: 'You shall put in it the ark of the Testimony, and partition off the ark with the veil. '
  '30':
  - type: note
    content: Ex. 30:18; 40:7
  - type: text
    content: 'He set the laver between the tabernacle of meeting and the altar, and put water there for washing; '
  '31':
  - type: text
    content: 'and Moses, Aaron, and his sons would '
  - type: note
    content: Ex. 30:19, 20; John 13:8
  - type: text
    content: 'wash their hands and their feet '
  - type: text
    content: with
  - type: text
    content: ' '
  - type: text
    content: water
  - type: text
    content: ' from it. '
  '32':
  - type: text
    content: 'Whenever they went into the tabernacle of meeting, and when they came near the altar, they washed, '
  - type: note
    content: Ex. 30:19
  - type: text
    content: 'as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '33':
  - type: note
    content: Ex. 27:9–18; 40:8
  - type: text
    content: 'And he raised up the court all around the tabernacle and the altar, and hung up the screen of the court gate. So Moses '
  - type: note
    content: (Heb. 3:2–5)
  - type: text
    content: finished the work.
  - type: heading
    content: The Cloud and the Glory
  '34':
  - type: note
    content: Ex. 29:43; Lev. 16:2; Num. 9:15; 2 Chr. 5:13; Is. 6:4
  - type: text
    content: 'Then the '
  - type: note
    content: 1 Kin. 8:10, 11
  - type: text
    content: 'cloud covered the tabernacle of meeting, and the '
  - type: note
    content: Lev. 9:6, 23
  - type: text
    content: 'glory of the '
  - type: heading
    content: Lord
  - type: text
    content: ' filled the tabernacle. '
  '35':
  - type: text
    content: 'And Moses '
  - type: note
    content: (Lev. 16:2); 1 Kin. 8:11; 2 Chr. 5:13, 14
  - type: text
    content: 'was not able to enter the tabernacle of meeting, because the cloud rested above it, and the glory of the '
  - type: heading
    content: Lord
  - type: text
    content: ' filled the tabernacle. '
  '36':
  - type: note
    content: Ex. 13:21, 22; Num. 9:17; Neh. 9:19
  - type: text
    content: 'Whenever the cloud was taken up from above the tabernacle, the children of Israel would go onward in all their journeys. '
  '37':
  - type: text
    content: 'But '
  - type: note
    content: Num. 9:19–22
  - type: text
    content: 'if the cloud was not taken up, then they did not journey till the day that it was taken up. '
  '38':
  - type: text
    content: 'For '
  - type: note
    content: Ex. 13:21; Num. 9:15; Ps. 78:14; Is. 4:5
  - type: text
    content: 'the cloud of the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' above the tabernacle by day, and fire was over it by night, in the sight of all the house of Israel, throughout all their journeys.'
  '4':
  - type: note
    content: Ex. 26:35; 40:22
  - type: text
    content: 'You shall bring in the table and '
  - type: note
    content: Ex. 25:30; 40:23
  - type: text
    content: 'arrange the things that are to be set in order on it; '
  - type: note
    content: Ex. 40:24, 25
  - type: text
    content: 'and you shall bring in the lampstand and light its lamps. '
  '5':
  - type: note
    content: Ex. 40:26
  - type: text
    content: 'You shall also set the altar of gold for the incense before the ark of the Testimony, and put up the screen for the door of the tabernacle. '
  '6':
  - type: text
    content: 'Then you shall set the '
  - type: note
    content: Ex. 39:39
  - type: text
    content: 'altar of the burnt offering before the door of the tabernacle of the tent of meeting. '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 30:18; 40:30
  - type: text
    content: 'you shall set the laver between the tabernacle of meeting and the altar, and put water in it. '
  '8':
  - type: text
    content: You shall set up the court all around, and hang up the screen at the court gate.
  '9':
  - type: text
    content: '“And you shall take the anointing oil, and '
  - type: note
    content: Ex. 30:26; Lev. 8:10
  - type: text
    content: 'anoint the tabernacle and all that '
  - type: text
    content: is
  - type: text
    content: ' in it; and you shall hallow it and all its utensils, and it shall be holy. '
