    marker-yv: yv-n
  - type: text
    text: 'anoint the tabernacle and all that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' in it; and you shall hallow it and all its utensils, and it shall be holy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'You shall '
  - type: usfm
    marker: x
    children:
    - type: text
