  - type: text
    text: 'The altar shall be most holy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And you shall anoint the laver and its base, and consecrate it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:4–9; Lev. 8:1–13
    marker-yv: yv-n
  - type: text
    text: '“Then you shall bring Aaron and his sons to the door of the tabernacle of meeting and wash them with water. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'You shall put the holy '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:5; 39:1, 41
    marker-yv: yv-n
  - type: text
    text: 'garments on Aaron, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ex. 28:41); Lev. 8:12
    marker-yv: yv-n
  - type: text
    text: 'and anoint him and consecrate him, that he may minister to Me as priest. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And you shall bring his sons and clothe them with tunics. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You shall anoint them, as you anointed their father, that they may minister to Me as priests; for their anointing shall surely be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:9; Num. 25:13
    marker-yv: yv-n
  - type: text
    text: an everlasting priesthood throughout their generations.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Thus Moses did; according to all that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded him, so he did.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And it came to pass in the first month of the second year, on the first '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 40:2; Num. 7:1
    marker-yv: yv-n
  - type: text
    text: 'tabernacle was raised up. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So Moses raised up the tabernacle, fastened its sockets, set up its boards, put in its bars, and raised up its pillars. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
