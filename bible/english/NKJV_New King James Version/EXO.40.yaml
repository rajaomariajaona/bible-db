document_id: EXO.40,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Tabernacle Erected and Arranged
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:1—31:18
      marker-yv: yv-n
    - type: text
      text: 'spoke to Moses, saying: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:26–30
      marker-yv: yv-n
    - type: text
      text: 'anoint the altar of the burnt offering and all its utensils, and consecrate the altar. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:36, 37
      marker-yv: yv-n
    - type: text
      text: 'The altar shall be most holy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And you shall anoint the laver and its base, and consecrate it.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:4–9; Lev. 8:1–13
      marker-yv: yv-n
    - type: text
      text: '“Then you shall bring Aaron and his sons to the door of the tabernacle of meeting and wash them with water. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall put the holy '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:5; 39:1, 41
      marker-yv: yv-n
    - type: text
      text: 'garments on Aaron, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 28:41); Lev. 8:12
      marker-yv: yv-n
    - type: text
      text: 'and anoint him and consecrate him, that he may minister to Me as priest. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall bring his sons and clothe them with tunics. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall anoint them, as you anointed their father, that they may minister to Me as priests; for their anointing shall surely be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:9; Num. 25:13
      marker-yv: yv-n
    - type: text
      text: an everlasting priesthood throughout their generations.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus Moses did; according to all that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded him, so he did.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in the first month of the second year, on the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:2; Num. 7:1
      marker-yv: yv-n
    - type: text
      text: 'tabernacle was raised up. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses raised up the tabernacle, fastened its sockets, set up its boards, put in its bars, and raised up its pillars. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he spread out the tent over the tabernacle and put the covering of the tent on top of it, as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“On the first day of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:2; 13:4
      marker-yv: yv-n
    - type: text
      text: 'first month you shall set up '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:1, 30; 40:17
      marker-yv: yv-n
    - type: text
      text: 'the tabernacle of the tent of meeting. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He took '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:16; Deut. 10:5; 1 Kin. 8:9; 2 Chr. 5:10; Heb. 9:4
      marker-yv: yv-n
    - type: text
      text: 'the Testimony and put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' into the ark, inserted the poles through the rings of the ark, and put the mercy seat on top of the ark. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he brought the ark into the tabernacle, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:33
      marker-yv: yv-n
    - type: text
      text: 'hung up the veil of the covering, and partitioned off the ark of the Testimony, as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:35
      marker-yv: yv-n
    - type: text
      text: 'He put the table in the tabernacle of meeting, on the north side of the tabernacle, outside the veil; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:4; Lev. 24:5, 6
      marker-yv: yv-n
    - type: text
      text: 'and he set the bread in order upon it before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:35
      marker-yv: yv-n
    - type: text
      text: 'He put the lampstand in the tabernacle of meeting, across from the table, on the south side of the tabernacle; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:37; 30:7, 8; 40:4; Lev. 24:3, 4
      marker-yv: yv-n
    - type: text
      text: 'he lit the lamps before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:1, 6; 40:5
      marker-yv: yv-n
    - type: text
      text: 'He put the gold altar in the tabernacle of meeting in front of the veil; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:7
      marker-yv: yv-n
    - type: text
      text: 'and he burned sweet incense on it, as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:36; 40:5
      marker-yv: yv-n
    - type: text
      text: 'He hung up the screen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at
    - type: text
      text: ' the door of the tabernacle. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:6
      marker-yv: yv-n
    - type: text
      text: 'And he put the altar of burnt offering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: before
    - type: text
      text: ' the door of the tabernacle of the tent of meeting, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:38–42
      marker-yv: yv-n
    - type: text
      text: 'offered upon it the burnt offering and the grain offering, as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:33; 40:21; Lev. 16:2; Num. 4:5
      marker-yv: yv-n
    - type: text
      text: 'You shall put in it the ark of the Testimony, and partition off the ark with the veil. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:18; 40:7
      marker-yv: yv-n
    - type: text
      text: 'He set the laver between the tabernacle of meeting and the altar, and put water there for washing; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Moses, Aaron, and his sons would '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:19, 20; John 13:8
      marker-yv: yv-n
    - type: text
      text: 'wash their hands and their feet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: water
    - type: text
      text: ' from it. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whenever they went into the tabernacle of meeting, and when they came near the altar, they washed, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:19
      marker-yv: yv-n
    - type: text
      text: 'as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 27:9–18; 40:8
      marker-yv: yv-n
    - type: text
      text: 'And he raised up the court all around the tabernacle and the altar, and hung up the screen of the court gate. So Moses '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 3:2–5)
      marker-yv: yv-n
    - type: text
      text: finished the work.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Cloud and the Glory
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:43; Lev. 16:2; Num. 9:15; 2 Chr. 5:13; Is. 6:4
      marker-yv: yv-n
    - type: text
      text: 'Then the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:10, 11
      marker-yv: yv-n
    - type: text
      text: 'cloud covered the tabernacle of meeting, and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 9:6, 23
      marker-yv: yv-n
    - type: text
      text: 'glory of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' filled the tabernacle. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Lev. 16:2); 1 Kin. 8:11; 2 Chr. 5:13, 14
      marker-yv: yv-n
    - type: text
      text: 'was not able to enter the tabernacle of meeting, because the cloud rested above it, and the glory of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' filled the tabernacle. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 13:21, 22; Num. 9:17; Neh. 9:19
      marker-yv: yv-n
    - type: text
      text: 'Whenever the cloud was taken up from above the tabernacle, the children of Israel would go onward in all their journeys. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 9:19–22
      marker-yv: yv-n
    - type: text
      text: 'if the cloud was not taken up, then they did not journey till the day that it was taken up. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 13:21; Num. 9:15; Ps. 78:14; Is. 4:5
      marker-yv: yv-n
    - type: text
      text: 'the cloud of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' above the tabernacle by day, and fire was over it by night, in the sight of all the house of Israel, throughout all their journeys.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:35; 40:22
      marker-yv: yv-n
    - type: text
      text: 'You shall bring in the table and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:30; 40:23
      marker-yv: yv-n
    - type: text
      text: 'arrange the things that are to be set in order on it; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:24, 25
      marker-yv: yv-n
    - type: text
      text: 'and you shall bring in the lampstand and light its lamps. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:26
      marker-yv: yv-n
    - type: text
      text: 'You shall also set the altar of gold for the incense before the ark of the Testimony, and put up the screen for the door of the tabernacle. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you shall set the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 39:39
      marker-yv: yv-n
    - type: text
      text: 'altar of the burnt offering before the door of the tabernacle of the tent of meeting. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:18; 40:30
      marker-yv: yv-n
    - type: text
      text: 'you shall set the laver between the tabernacle of meeting and the altar, and put water in it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You shall set up the court all around, and hang up the screen at the court gate.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And you shall take the anointing oil, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:26; Lev. 8:10
      marker-yv: yv-n
    - type: text
      text: 'anoint the tabernacle and all that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in it; and you shall hallow it and all its utensils, and it shall be holy. '
