    text: 'And he spread out the tent over the tabernacle and put the covering of the tent on top of it, as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'He took '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:16; Deut. 10:5; 1 Kin. 8:9; 2 Chr. 5:10; Heb. 9:4
    marker-yv: yv-n
  - type: text
    text: 'the Testimony and put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' into the ark, inserted the poles through the rings of the ark, and put the mercy seat on top of the ark. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he brought the ark into the tabernacle, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 26:33
    marker-yv: yv-n
  - type: text
    text: 'hung up the veil of the covering, and partitioned off the ark of the Testimony, as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 26:35
    marker-yv: yv-n
  - type: text
    text: 'He put the table in the tabernacle of meeting, on the north side of the tabernacle, outside the veil; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 40:4; Lev. 24:5, 6
    marker-yv: yv-n
  - type: text
    text: 'and he set the bread in order upon it before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 26:35
    marker-yv: yv-n
