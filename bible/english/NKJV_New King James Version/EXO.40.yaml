    marker-yv: yv-n
  - type: text
    text: 'altar of the burnt offering before the door of the tabernacle of the tent of meeting. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:18; 40:30
    marker-yv: yv-n
  - type: text
