  - type: text
    content: the bridegroom.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'And while they went to buy, the bridegroom came, and those who were ready went in with him to the wedding; and '
  - type: note
    content: (Matt. 7:21); Luke 13:25
  - type: text
    content: the door was shut.
  '11':
  - type: text
    content: '“Afterward the other virgins came also, saying, '
  - type: note
