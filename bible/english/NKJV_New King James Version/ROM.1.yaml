document_id: ROM.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greeting
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul, a bondservant of Jesus Christ, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 1:1; 9:1; 15:9; 2 Cor. 1:1; 1 Tim. 1:11
      marker-yv: yv-n
    - type: text
      text: 'called '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' an apostle, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:15; 13:2; (Gal. 1:15)
      marker-yv: yv-n
    - type: text
      text: 'separated to the gospel of God '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'making request if, by some means, now at last I may find a way in the will of God to come to you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I long to see you, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 15:29
      marker-yv: yv-n
    - type: text
      text: 'I may impart to you some spiritual gift, so that you may be established— '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that is, that I may be encouraged together with you by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Titus 1:4
      marker-yv: yv-n
    - type: text
      text: the mutual faith both of you and me.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now I do not want you to be unaware, brethren, that I often planned to come to you (but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Thess. 2:18)
      marker-yv: yv-n
    - type: text
      text: 'was hindered until now), that I might have some '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 4:17
      marker-yv: yv-n
    - type: text
      text: 'fruit among you also, just as among the other Gentiles. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am a debtor both to Greeks and to barbarians, both to wise and to unwise. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So, as much as is in me, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' ready to preach the gospel to you who are in Rome also.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Just Live by Faith
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 40:9, 10
      marker-yv: yv-n
    - type: text
      text: 'I am not ashamed of the gospel of Christ, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 1:18, 24
      marker-yv: yv-n
    - type: text
      text: 'it is the power of God to salvation for everyone who believes, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 2:30; Acts 3:26; Rom. 2:9
      marker-yv: yv-n
    - type: text
      text: 'for the Jew first and also for the Greek. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 3:21; 9:30; Phil. 3:9
      marker-yv: yv-n
    - type: text
      text: 'in it the righteousness of God is revealed from faith to faith; as it is written, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hab. 2:4; Gal. 3:11; Heb. 10:38
      marker-yv: yv-n
    - type: text
      text: “The just shall live by faith.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Wrath on Unrighteousness
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 17:30)
      marker-yv: yv-n
    - type: text
      text: 'For the wrath of God is revealed from heaven against all ungodliness and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 6:13; 2 Thess. 2:10; 2 Pet. 2:13; 1 John 5:17
      marker-yv: yv-n
    - type: text
      text: 'unrighteousness of men, who suppress the truth in unrighteousness, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 14:17; 17:24)
      marker-yv: yv-n
    - type: text
      text: 'what may be known of God is manifest in them, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 1:9)
      marker-yv: yv-n
    - type: text
      text: 'God has shown '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' to them. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 26:6
      marker-yv: yv-n
    - type: text
      text: 'which He promised before '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 3:8
      marker-yv: yv-n
    - type: text
      text: 'through His prophets in the Holy Scriptures, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For since the creation of the world '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 12:7–9; Ps. 19:1–6; Jer. 5:22
      marker-yv: yv-n
    - type: text
      text: 'His invisible '
    - type: usfm
      marker: it
      children:
      - type: text
        text: attributes
    - type: text
      text: ' are clearly seen, being understood by the things that are made, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' His eternal power and Godhead, so that they are without excuse, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because, although they knew God, they did not glorify '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him
    - type: text
      text: ' as God, nor were thankful, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 17:15; Jer. 2:5; Eph. 4:17
      marker-yv: yv-n
    - type: text
      text: 'became futile in their thoughts, and their foolish hearts were darkened. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 10:14; (1 Cor. 1:20)
      marker-yv: yv-n
    - type: text
      text: 'Professing to be wise, they became fools, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and changed the glory of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 1:17; 6:15, 16
      marker-yv: yv-n
    - type: text
      text: 'incorruptible '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:16–18; Ps. 106:20; Jer. 2:11; Acts 17:29
      marker-yv: yv-n
    - type: text
      text: God into an image made like corruptible man—and birds and four-footed animals and creeping things.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 81:12; Acts 7:42; Eph. 4:18, 19
      marker-yv: yv-n
    - type: text
      text: 'Therefore God also gave them up to uncleanness, in the lusts of their hearts, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 6:18
      marker-yv: yv-n
    - type: text
      text: 'to dishonor their bodies '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:22
      marker-yv: yv-n
    - type: text
      text: 'among themselves, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who exchanged '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 1:9
      marker-yv: yv-n
    - type: text
      text: 'the truth of God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 44:20; Jer. 10:14; 13:25; 16:19
      marker-yv: yv-n
    - type: text
      text: for the lie, and worshiped and served the creature rather than the Creator, who is blessed forever. Amen.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this reason God gave them up to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:22; Eph. 5:12
      marker-yv: yv-n
    - type: text
      text: 'vile passions. For even their women exchanged the natural use for what is against nature. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Likewise also the men, leaving the natural use of the woman, burned in their lust for one another, men with men committing what is shameful, and receiving in themselves the penalty of their error which was due.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And even as they did not like to retain God in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' knowledge, God gave them over to a debased mind, to do those things '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 5:4
      marker-yv: yv-n
    - type: text
      text: 'which are not fitting; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'being filled with all unrighteousness, sexual immorality, wickedness, covetousness, maliciousness; full of envy, murder, strife, deceit, evil-mindedness; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' whisperers, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'concerning His Son Jesus Christ our Lord, who was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:12; 1 Chr. 17:11; Is. 9:7; Jer. 23:5; Gal. 4:4
      marker-yv: yv-n
    - type: text
      text: 'born of the seed of David according to the flesh, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'backbiters, haters of God, violent, proud, boasters, inventors of evil things, disobedient to parents, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'undiscerning, untrustworthy, unloving, unforgiving, unmerciful; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 2:2)
      marker-yv: yv-n
    - type: text
      text: 'knowing the righteous judgment of God, that those who practice such things '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 6:21)
      marker-yv: yv-n
    - type: text
      text: 'are deserving of death, not only do the same but also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 50:18); Hos. 7:3
      marker-yv: yv-n
    - type: text
      text: approve of those who practice them.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 2:7; Acts 9:20; 13:33; Heb. 1:2
      marker-yv: yv-n
    - type: text
      text: 'declared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the Son of God with power according '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 16:10; (Heb. 9:14)
      marker-yv: yv-n
    - type: text
      text: 'to the Spirit of holiness, by the resurrection from the dead. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Through Him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 3:8
      marker-yv: yv-n
    - type: text
      text: 'we have received grace and apostleship for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 6:7; Rom. 16:26
      marker-yv: yv-n
    - type: text
      text: 'obedience to the faith among all nations '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:15
      marker-yv: yv-n
    - type: text
      text: 'for His name, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: among whom you also are the called of Jesus Christ;
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To all who are in Rome, beloved of God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:13; Rom. 8:28; 1 Cor. 1:2, 24
      marker-yv: yv-n
    - type: text
      text: 'called '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' saints:'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 6:25; 1 Cor. 1:3; 2 Cor. 1:2; Gal. 1:3; Eph. 1:2; Phil. 1:2; Col. 1:2; 1 Thess. 1:1; 2 Thess. 1:2
      marker-yv: yv-n
    - type: text
      text: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Desire to Visit Rome
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'First, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 1:4; Eph. 1:15; Phil. 1:3; Col. 1:3; 1 Thess. 1:2; 2:13
      marker-yv: yv-n
    - type: text
      text: 'I thank my God through Jesus Christ for you all, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 28:22; Rom. 16:19
      marker-yv: yv-n
    - type: text
      text: 'your faith is spoken of throughout the whole world. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 9:1
      marker-yv: yv-n
    - type: text
      text: 'God is my witness, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 27:23
      marker-yv: yv-n
    - type: text
      text: 'whom I serve with my spirit in the gospel of His Son, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 3:10
      marker-yv: yv-n
    - type: text
      text: 'without ceasing I make mention of you always in my prayers, '
