document_id: ROM.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, a bondservant of Jesus Christ, '
  - type: note
    content: 1 Cor. 1:1; 9:1; 15:9; 2 Cor. 1:1; 1 Tim. 1:11
  - type: text
    content: 'called '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' an apostle, '
  - type: note
    content: Acts 9:15; 13:2; (Gal. 1:15)
  - type: text
    content: 'separated to the gospel of God '
  '10':
  - type: text
    content: 'making request if, by some means, now at last I may find a way in the will of God to come to you. '
  '11':
  - type: text
    content: 'For I long to see you, that '
  - type: note
    content: Rom. 15:29
  - type: text
    content: 'I may impart to you some spiritual gift, so that you may be established— '
  '12':
  - type: text
    content: 'that is, that I may be encouraged together with you by '
  - type: note
    content: Titus 1:4
  - type: text
    content: the mutual faith both of you and me.
  '13':
  - type: text
    content: 'Now I do not want you to be unaware, brethren, that I often planned to come to you (but '
  - type: note
    content: (1 Thess. 2:18)
  - type: text
    content: 'was hindered until now), that I might have some '
  - type: note
    content: Phil. 4:17
  - type: text
    content: 'fruit among you also, just as among the other Gentiles. '
  '14':
  - type: text
    content: 'I am a debtor both to Greeks and to barbarians, both to wise and to unwise. '
  '15':
  - type: text
    content: 'So, as much as is in me, '
  - type: text
    content: I
  - type: text
    content: ' '
  - type: text
    content: am
  - type: text
    content: ' ready to preach the gospel to you who are in Rome also.'
  - type: heading
    content: The Just Live by Faith
  '16':
  - type: text
    content: 'For '
  - type: note
    content: Ps. 40:9, 10
  - type: text
    content: 'I am not ashamed of the gospel of Christ, for '
  - type: note
    content: 1 Cor. 1:18, 24
  - type: text
    content: 'it is the power of God to salvation for everyone who believes, '
  - type: note
    content: Luke 2:30; Acts 3:26; Rom. 2:9
  - type: text
    content: 'for the Jew first and also for the Greek. '
  '17':
  - type: text
    content: 'For '
  - type: note
    content: Rom. 3:21; 9:30; Phil. 3:9
  - type: text
    content: 'in it the righteousness of God is revealed from faith to faith; as it is written, '
  - type: note
    content: Hab. 2:4; Gal. 3:11; Heb. 10:38
  - type: text
    content: “The just shall live by faith.”
  - type: heading
    content: God’s Wrath on Unrighteousness
  '18':
  - type: note
    content: (Acts 17:30)
  - type: text
    content: 'For the wrath of God is revealed from heaven against all ungodliness and '
  - type: note
    content: Rom. 6:13; 2 Thess. 2:10; 2 Pet. 2:13; 1 John 5:17
  - type: text
    content: 'unrighteousness of men, who suppress the truth in unrighteousness, '
  '19':
  - type: text
    content: 'because '
  - type: note
    content: (Acts 14:17; 17:24)
  - type: text
    content: 'what may be known of God is manifest in them, for '
  - type: note
    content: (John 1:9)
  - type: text
    content: 'God has shown '
  - type: text
    content: it
  - type: text
    content: ' to them. '
  '2':
  - type: note
    content: Acts 26:6
  - type: text
    content: 'which He promised before '
  - type: note
    content: Gal. 3:8
  - type: text
    content: 'through His prophets in the Holy Scriptures, '
  '20':
  - type: text
    content: 'For since the creation of the world '
  - type: note
    content: Job 12:7–9; Ps. 19:1–6; Jer. 5:22
  - type: text
    content: 'His invisible '
  - type: text
    content: attributes
  - type: text
    content: ' are clearly seen, being understood by the things that are made, '
  - type: text
    content: even
  - type: text
    content: ' His eternal power and Godhead, so that they are without excuse, '
  '21':
  - type: text
    content: 'because, although they knew God, they did not glorify '
  - type: text
    content: Him
  - type: text
    content: ' as God, nor were thankful, but '
  - type: note
    content: 2 Kin. 17:15; Jer. 2:5; Eph. 4:17
  - type: text
    content: 'became futile in their thoughts, and their foolish hearts were darkened. '
  '22':
  - type: note
    content: Jer. 10:14; (1 Cor. 1:20)
  - type: text
    content: 'Professing to be wise, they became fools, '
  '23':
  - type: text
    content: 'and changed the glory of the '
  - type: note
    content: 1 Tim. 1:17; 6:15, 16
  - type: text
    content: 'incorruptible '
  - type: note
    content: Deut. 4:16–18; Ps. 106:20; Jer. 2:11; Acts 17:29
  - type: text
    content: God into an image made like corruptible man—and birds and four-footed animals and creeping things.
  '24':
  - type: note
    content: Ps. 81:12; Acts 7:42; Eph. 4:18, 19
  - type: text
    content: 'Therefore God also gave them up to uncleanness, in the lusts of their hearts, '
  - type: note
    content: 1 Cor. 6:18
  - type: text
    content: 'to dishonor their bodies '
  - type: note
    content: Lev. 18:22
  - type: text
    content: 'among themselves, '
  '25':
  - type: text
    content: 'who exchanged '
  - type: note
    content: 1 Thess. 1:9
  - type: text
    content: 'the truth of God '
  - type: note
    content: Is. 44:20; Jer. 10:14; 13:25; 16:19
  - type: text
    content: for the lie, and worshiped and served the creature rather than the Creator, who is blessed forever. Amen.
  '26':
  - type: text
    content: 'For this reason God gave them up to '
  - type: note
    content: Lev. 18:22; Eph. 5:12
  - type: text
    content: 'vile passions. For even their women exchanged the natural use for what is against nature. '
  '27':
  - type: text
    content: Likewise also the men, leaving the natural use of the woman, burned in their lust for one another, men with men committing what is shameful, and receiving in themselves the penalty of their error which was due.
  '28':
  - type: text
    content: 'And even as they did not like to retain God in '
  - type: text
    content: their
  - type: text
    content: ' knowledge, God gave them over to a debased mind, to do those things '
  - type: note
    content: Eph. 5:4
  - type: text
    content: 'which are not fitting; '
  '29':
  - type: text
    content: 'being filled with all unrighteousness, sexual immorality, wickedness, covetousness, maliciousness; full of envy, murder, strife, deceit, evil-mindedness; '
  - type: text
    content: they
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' whisperers, '
  '3':
  - type: text
    content: 'concerning His Son Jesus Christ our Lord, who was '
  - type: note
    content: 2 Sam. 7:12; 1 Chr. 17:11; Is. 9:7; Jer. 23:5; Gal. 4:4
  - type: text
    content: 'born of the seed of David according to the flesh, '
  '30':
  - type: text
    content: 'backbiters, haters of God, violent, proud, boasters, inventors of evil things, disobedient to parents, '
  '31':
  - type: text
    content: 'undiscerning, untrustworthy, unloving, unforgiving, unmerciful; '
  '32':
  - type: text
    content: 'who, '
  - type: note
    content: (Rom. 2:2)
  - type: text
    content: 'knowing the righteous judgment of God, that those who practice such things '
  - type: note
    content: (Rom. 6:21)
  - type: text
    content: 'are deserving of death, not only do the same but also '
  - type: note
    content: (Ps. 50:18); Hos. 7:3
  - type: text
    content: approve of those who practice them.
  '4':
  - type: text
    content: and
  - type: text
    content: ' '
  - type: note
    content: Ps. 2:7; Acts 9:20; 13:33; Heb. 1:2
  - type: text
    content: 'declared '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' the Son of God with power according '
  - type: note
    content: Ps. 16:10; (Heb. 9:14)
  - type: text
    content: 'to the Spirit of holiness, by the resurrection from the dead. '
  '5':
  - type: text
    content: 'Through Him '
  - type: note
    content: Eph. 3:8
  - type: text
    content: 'we have received grace and apostleship for '
  - type: note
    content: Acts 6:7; Rom. 16:26
  - type: text
    content: 'obedience to the faith among all nations '
  - type: note
    content: Acts 9:15
  - type: text
    content: 'for His name, '
  '6':
  - type: text
    content: among whom you also are the called of Jesus Christ;
  '7':
  - type: text
    content: 'To all who are in Rome, beloved of God, '
  - type: note
    content: Acts 9:13; Rom. 8:28; 1 Cor. 1:2, 24
  - type: text
    content: 'called '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' saints:'
  - type: note
    content: Num. 6:25; 1 Cor. 1:3; 2 Cor. 1:2; Gal. 1:3; Eph. 1:2; Phil. 1:2; Col. 1:2; 1 Thess. 1:1; 2 Thess. 1:2
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Desire to Visit Rome
  '8':
  - type: text
    content: 'First, '
  - type: note
    content: 1 Cor. 1:4; Eph. 1:15; Phil. 1:3; Col. 1:3; 1 Thess. 1:2; 2:13
  - type: text
    content: 'I thank my God through Jesus Christ for you all, that '
  - type: note
    content: Acts 28:22; Rom. 16:19
  - type: text
    content: 'your faith is spoken of throughout the whole world. '
  '9':
  - type: text
    content: 'For '
  - type: note
    content: Rom. 9:1
  - type: text
    content: 'God is my witness, '
  - type: note
    content: Acts 27:23
  - type: text
    content: 'whom I serve with my spirit in the gospel of His Son, that '
  - type: note
    content: 1 Thess. 3:10
  - type: text
    content: 'without ceasing I make mention of you always in my prayers, '
