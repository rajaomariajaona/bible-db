      marker-yv: yv-n
    - type: text
      text: this mountain
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 9:2; Matt. 22:4
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts will make for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Dan. 7:14; Matt. 8:11)
      marker-yv: yv-n
    - type: text
      text: all people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A feast of choice pieces,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A feast of wines on the lees,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Of fat things full of marrow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Of well-refined wines on the lees.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And He will destroy on this mountain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The surface of the covering cast over all people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 3:15; (Eph. 4:18)
      marker-yv: yv-n
    - type: text
      text: the veil that is spread over all nations.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He will '
    - type: usfm
      marker: x
