  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will bring down, lay low,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' bring to the ground, down to the dust.'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For You have made '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 21:9; 23:13; Jer. 51:37
      marker-yv: yv-n
    - type: text
      text: a city a ruin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A fortified city a ruin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A palace of foreigners to be a city no more;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It will never be rebuilt.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Therefore the strong people will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 24:15; Rev. 11:13
      marker-yv: yv-n
    - type: text
      text: glorify You;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The city of the terrible nations will fear You.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For You have been a strength to the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A strength to the needy in his distress,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 4:6
      marker-yv: yv-n
    - type: text
      text: A refuge from the storm,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A shade from the heat;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the blast of the terrible ones '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' as a storm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: against
    - type: text
      text: ' the wall.'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will reduce the noise of aliens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As heat in a dry place;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' heat in the shadow of a cloud,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The song of the terrible ones will be diminished.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And in '
    - type: usfm
      marker: x
      children:
      - type: text
