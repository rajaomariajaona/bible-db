  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For on this mountain the hand of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will rest,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 16:14; Jer. 48:1–47; Ezek. 25:8–11; Amos 2:1–3; Zeph. 2:9
      marker-yv: yv-n
    - type: text
      text: Moab shall be trampled down under Him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As straw is trampled down for the refuse heap.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And He will spread out His hands in their midst
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As a swimmer reaches out to swim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And He will bring down their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 24:4; 26:5
      marker-yv: yv-n
    - type: text
      text: pride
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Together with the trickery of their hands.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
