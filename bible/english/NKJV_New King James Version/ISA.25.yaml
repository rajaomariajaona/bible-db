    marker: q2
    children:
    - type: text
      text: He will take away from all the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And it will be said in that day:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“Behold, this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' our God;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 49:18; Is. 8:17; 26:8; (Titus 2:13)
      marker-yv: yv-n
    - type: text
      text: We have waited for Him, and He will save us.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We have waited for Him;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 20:5
      marker-yv: yv-n
    - type: text
