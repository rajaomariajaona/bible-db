  - type: text
    content: My brethren to go to Galilee, and there they will see Me.”
  - type: heading
    content: The Soldiers Are Bribed
  '11':
  - type: text
    content: 'Now while they were going, behold, some of the guard came into the city and reported to the chief priests all the things that had happened. '
  '12':
  - type: text
    content: 'When they had assembled with the elders and consulted together, they gave a large sum of money to the soldiers, '
  '13':
  - type: text
    content: 'saying, “Tell them, ‘His disciples came at night and stole Him '
  - type: text
    content: away
  - type: text
    content: ' while we slept.’ '
  '14':
  - type: text
    content: 'And if this comes to the governor’s ears, we will appease him and make you secure.” '
  '15':
  - type: text
    content: So they took the money and did as they were instructed; and this saying is commonly reported among the Jews until this day.
  - type: heading
    content: The Great Commission
  '16':
  - type: text
    content: 'Then the eleven disciples went away into Galilee, to the mountain '
  - type: note
    content: Matt. 26:32; 28:7, 10; Mark 14:28; 15:41; 16:7
  - type: text
    content: 'which Jesus had appointed for them. '
  '17':
  - type: text
    content: 'When they saw Him, they worshiped Him; but some '
  - type: note
    content: John 20:24–29
  - type: text
    content: doubted.
  '18':
  - type: text
    content: 'And Jesus came and spoke to them, saying, '
  - type: note
    content: (Dan. 7:13, 14); Matt. 11:27; Luke 1:32; 10:22; John 3:35; Acts 2:36; Rom. 14:9; 1 Cor. 15:27; (Eph. 1:10, 21); Phil. 2:9, 10; (Heb. 1:2); 1 Pet. 3:22
  - type: text
    content: “All authority has been given to Me in heaven and on earth.
  - type: text
    content: ' '
  '19':
  - type: note
    content: Mark 16:15
  - type: text
    content: 'Go '
  - type: text
    content: therefore
  - type: text
    content: ' and '
  - type: note
    content: Is. 52:10; Luke 24:47; (Acts 2:38, 39); Rom. 10:18; Col. 1:23
  - type: text
    content: make disciples of all the nations, baptizing them in the name of the Father and of the Son and of the Holy Spirit,
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And behold, there was a great earthquake; for '
  - type: note
    content: Mark 16:5; Luke 24:4; John 20:12
  - type: text
    content: 'an angel of the Lord descended from heaven, and came and rolled back the stone from the door, and sat on it. '
  '20':
  - type: note
    content: (Acts 2:42)
  - type: text
    content: 'teaching them to observe all things that I have commanded you; and lo, I am '
  - type: note
    content: (Acts 4:31; 18:10; 23:11)
  - type: text
    content: 'with you always, '
  - type: text
    content: even
  - type: text
    content: ' to the end of the age.” '
  - type: text
    content: Amen.
  '3':
  - type: note
    content: Dan. 7:9; 10:6; Mark 9:3; John 20:12; Acts 1:10
  - type: text
    content: 'His countenance was like lightning, and his clothing as white as snow. '
  '4':
  - type: text
    content: 'And the guards shook for fear of him, and became like '
  - type: note
    content: Rev. 1:17
  - type: text
    content: 'dead '
  - type: text
    content: men.
  '5':
  - type: text
    content: 'But the angel answered and said to the women, “Do not be afraid, for I know that you seek Jesus who was crucified. '
  '6':
  - type: text
    content: 'He is not here; for He is risen, '
  - type: note
    content: Hos. 6:2; Ps. 16:10; 49:15; Matt. 12:40; 16:21; 17:23; 20:19
  - type: text
    content: 'as He said. Come, see the place where the Lord lay. '
  '7':
  - type: text
    content: 'And go quickly and tell His disciples that He is risen from the dead, and indeed '
  - type: note
    content: Matt. 26:32; 28:10, 16; Mark 16:7
  - type: text
    content: He is going before you into Galilee; there you will see Him. Behold, I have told you.”
  '8':
  - type: text
    content: So they went out quickly from the tomb with fear and great joy, and ran to bring His disciples word.
  - type: heading
    content: The Women Worship the Risen Lord
  '9':
  - type: text
    content: 'And as they went to tell His disciples, behold, '
  - type: note
    content: Mark 16:9; John 20:14
  - type: text
    content: 'Jesus met them, saying, '
  - type: text
    content: “Rejoice!”
  - type: text
    content: ' So they came and held Him by the feet and worshiped Him. '
