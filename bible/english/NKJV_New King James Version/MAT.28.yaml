  - type: text
    content: 'and the other Mary came to see the tomb. '
  '10':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: '“Do not be afraid. Go '
  - type: text
    content: and
  - type: text
    content: ' tell '
  - type: note
