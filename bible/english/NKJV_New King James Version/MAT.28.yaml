document_id: MAT.28,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: He Is Risen
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:1–8; Luke 24:1–10; John 20:1–8
      marker-yv: yv-n
    - type: text
      text: 'after the Sabbath, as the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the week began to dawn, Mary Magdalene '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:56, 61
      marker-yv: yv-n
    - type: text
      text: 'and the other Mary came to see the tomb. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Do not be afraid. Go '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' tell '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 22:22; John 20:17; Rom. 8:29; (Heb. 2:11)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: My brethren to go to Galilee, and there they will see Me.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Soldiers Are Bribed
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now while they were going, behold, some of the guard came into the city and reported to the chief priests all the things that had happened. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they had assembled with the elders and consulted together, they gave a large sum of money to the soldiers, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, “Tell them, ‘His disciples came at night and stole Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: away
    - type: text
      text: ' while we slept.’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if this comes to the governor’s ears, we will appease him and make you secure.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they took the money and did as they were instructed; and this saying is commonly reported among the Jews until this day.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Great Commission
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the eleven disciples went away into Galilee, to the mountain '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 26:32; 28:7, 10; Mark 14:28; 15:41; 16:7
      marker-yv: yv-n
    - type: text
      text: 'which Jesus had appointed for them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they saw Him, they worshiped Him; but some '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 20:24–29
      marker-yv: yv-n
    - type: text
      text: doubted.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus came and spoke to them, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Dan. 7:13, 14); Matt. 11:27; Luke 1:32; 10:22; John 3:35; Acts 2:36; Rom. 14:9; 1 Cor. 15:27; (Eph. 1:10, 21); Phil. 2:9, 10; (Heb. 1:2); 1 Pet. 3:22
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “All authority has been given to Me in heaven and on earth.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:15
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Go '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: therefore
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 52:10; Luke 24:47; (Acts 2:38, 39); Rom. 10:18; Col. 1:23
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: make disciples of all the nations, baptizing them in the name of the Father and of the Son and of the Holy Spirit,
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And behold, there was a great earthquake; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:5; Luke 24:4; John 20:12
      marker-yv: yv-n
    - type: text
      text: 'an angel of the Lord descended from heaven, and came and rolled back the stone from the door, and sat on it. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 2:42)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'teaching them to observe all things that I have commanded you; and lo, I am '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 4:31; 18:10; 23:11)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'with you always, '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: even
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' to the end of the age.” '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Amen.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 7:9; 10:6; Mark 9:3; John 20:12; Acts 1:10
      marker-yv: yv-n
    - type: text
      text: 'His countenance was like lightning, and his clothing as white as snow. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the guards shook for fear of him, and became like '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 1:17
      marker-yv: yv-n
    - type: text
      text: 'dead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the angel answered and said to the women, “Do not be afraid, for I know that you seek Jesus who was crucified. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He is not here; for He is risen, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 6:2; Ps. 16:10; 49:15; Matt. 12:40; 16:21; 17:23; 20:19
      marker-yv: yv-n
    - type: text
      text: 'as He said. Come, see the place where the Lord lay. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And go quickly and tell His disciples that He is risen from the dead, and indeed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 26:32; 28:10, 16; Mark 16:7
      marker-yv: yv-n
    - type: text
      text: He is going before you into Galilee; there you will see Him. Behold, I have told you.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they went out quickly from the tomb with fear and great joy, and ran to bring His disciples word.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Women Worship the Risen Lord
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as they went to tell His disciples, behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:9; John 20:14
      marker-yv: yv-n
    - type: text
      text: 'Jesus met them, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Rejoice!”
    - type: text
      text: ' So they came and held Him by the feet and worshiped Him. '
