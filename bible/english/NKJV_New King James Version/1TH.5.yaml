document_id: 1TH.5,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Day of the Lord
  - type: text
    content: 'But concerning '
  - type: note
    content: Matt. 24:3
  - type: text
    content: 'the times and the seasons, brethren, you have no need that I should write to you. '
  '10':
  - type: note
    content: 2 Cor. 5:15
  - type: text
    content: who died for us, that whether we wake or sleep, we should live together with Him.
  '11':
  - type: text
    content: Therefore comfort each other and edify one another, just as you also are doing.
  - type: heading
    content: Various Exhortations
  '12':
  - type: text
    content: 'And we urge you, brethren, '
  - type: note
    content: 1 Cor. 16:18; 1 Tim. 5:17; Heb. 13:7, 17
  - type: text
    content: 'to recognize those who labor among you, and are over you in the Lord and admonish you, '
  '13':
  - type: text
    content: 'and to esteem them very highly in love for their work’s sake. '
  - type: note
    content: Mark 9:50
  - type: text
    content: Be at peace among yourselves.
  '14':
  - type: text
    content: 'Now we exhort you, brethren, '
  - type: note
    content: 2 Thess. 3:6, 7, 11
  - type: text
    content: 'warn those who are unruly, '
  - type: note
    content: Heb. 12:12
  - type: text
    content: 'comfort the fainthearted, '
  - type: note
    content: Rom. 14:1; 15:1; 1 Cor. 8:7
  - type: text
    content: 'uphold the weak, '
  - type: note
    content: Gal. 5:22
  - type: text
    content: 'be patient with all. '
  '15':
  - type: note
    content: Lev. 19:18
  - type: text
    content: 'See that no one renders evil for evil to anyone, but always '
  - type: note
    content: Rom. 12:9; Gal. 6:10; 1 Thess. 5:21
  - type: text
    content: pursue what is good both for yourselves and for all.
  '16':
  - type: note
    content: (2 Cor. 6:10)
  - type: text
    content: 'Rejoice always, '
  '17':
  - type: note
    content: Eph. 6:18
  - type: text
    content: 'pray without ceasing, '
  '18':
  - type: text
    content: in everything give thanks; for this is the will of God in Christ Jesus for you.
  '19':
  - type: note
    content: Eph. 4:30
  - type: text
    content: 'Do not quench the Spirit. '
  '2':
  - type: text
    content: 'For you yourselves know perfectly that '
  - type: note
    content: Luke 21:34; 1 Thess. 5:4; (2 Pet. 3:10); Rev. 3:3; 16:15
  - type: text
    content: 'the day of the Lord so comes as a thief in the night. '
  '20':
  - type: note
    content: Acts 13:1; 1 Cor. 14:1, 31
  - type: text
    content: 'Do not despise prophecies. '
  '21':
  - type: note
    content: 1 Cor. 14:29; 1 John 4:1
  - type: text
    content: 'Test all things; '
  - type: note
    content: Phil. 4:8
  - type: text
    content: 'hold fast what is good. '
  '22':
  - type: text
    content: Abstain from every form of evil.
  - type: heading
    content: Blessing and Admonition
  '23':
  - type: text
    content: 'Now may '
  - type: note
    content: Phil. 4:9
  - type: text
    content: 'the God of peace Himself '
  - type: note
    content: 1 Thess. 3:13
  - type: text
    content: 'sanctify you completely; and may your whole spirit, soul, and body '
  - type: note
    content: 1 Cor. 1:8, 9
  - type: text
    content: 'be preserved blameless at the coming of our Lord Jesus Christ. '
  '24':
  - type: text
    content: 'He who calls you '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: (1 Cor. 10:13); 2 Thess. 3:3
  - type: text
    content: 'faithful, who also will '
  - type: note
    content: Phil. 1:6
  - type: text
    content: 'do '
  - type: text
    content: it.
  '25':
  - type: text
    content: Brethren, pray for us.
  '26':
  - type: text
    content: Greet all the brethren with a holy kiss.
  '27':
  - type: text
    content: I charge you by the Lord that this epistle be read to all the holy brethren.
  '28':
  - type: text
    content: 'The grace of our Lord Jesus Christ '
  - type: text
    content: be
  - type: text
    content: ' with you. Amen.'
  '3':
  - type: text
    content: 'For when they say, “Peace and safety!” then '
  - type: note
    content: Is. 13:6–9
  - type: text
    content: 'sudden destruction comes upon them, '
  - type: note
    content: Hos. 13:13
  - type: text
    content: 'as labor pains upon a pregnant woman. And they shall not escape. '
  '4':
  - type: note
    content: (Acts 26:18); Rom. 13:12; Eph. 5:8; 1 John 2:8
  - type: text
    content: 'But you, brethren, are not in darkness, so that this Day should overtake you as a thief. '
  '5':
  - type: text
    content: 'You are all '
  - type: note
    content: Eph. 5:8
  - type: text
    content: 'sons of light and sons of the day. We are not of the night nor of darkness. '
  '6':
  - type: note
    content: Matt. 25:5
  - type: text
    content: 'Therefore let us not sleep, as others '
  - type: text
    content: do,
  - type: text
    content: ' but '
  - type: note
    content: Matt. 25:13; Mark 13:35; (1 Pet. 5:8)
  - type: text
    content: 'let us watch and be sober. '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: (Luke 21:34)
  - type: text
    content: 'those who sleep, sleep at night, and those who get drunk '
  - type: note
    content: Acts 2:15; 2 Pet. 2:13
  - type: text
    content: 'are drunk at night. '
  '8':
  - type: text
    content: 'But let us who are of the day be sober, '
  - type: note
    content: Is. 59:17; Eph. 6:14
  - type: text
    content: 'putting on the breastplate of faith and love, and '
  - type: text
    content: as
  - type: text
    content: ' a helmet the hope of salvation. '
  '9':
  - type: text
    content: 'For '
  - type: note
    content: Rom. 9:22
  - type: text
    content: 'God did not appoint us to wrath, '
  - type: note
    content: (2 Thess. 2:13)
  - type: text
    content: 'but to obtain salvation through our Lord Jesus Christ, '
