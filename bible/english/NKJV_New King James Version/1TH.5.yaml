document_id: 1TH.5,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Day of the Lord
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'But concerning '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 24:3
      marker-yv: yv-n
    - type: text
      text: 'the times and the seasons, brethren, you have no need that I should write to you. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 5:15
      marker-yv: yv-n
    - type: text
      text: who died for us, that whether we wake or sleep, we should live together with Him.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Therefore comfort each other and edify one another, just as you also are doing.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Various Exhortations
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And we urge you, brethren, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:18; 1 Tim. 5:17; Heb. 13:7, 17
      marker-yv: yv-n
    - type: text
      text: 'to recognize those who labor among you, and are over you in the Lord and admonish you, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and to esteem them very highly in love for their work’s sake. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 9:50
      marker-yv: yv-n
    - type: text
      text: Be at peace among yourselves.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now we exhort you, brethren, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Thess. 3:6, 7, 11
      marker-yv: yv-n
    - type: text
      text: 'warn those who are unruly, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 12:12
      marker-yv: yv-n
    - type: text
      text: 'comfort the fainthearted, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 14:1; 15:1; 1 Cor. 8:7
      marker-yv: yv-n
    - type: text
      text: 'uphold the weak, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 5:22
      marker-yv: yv-n
    - type: text
      text: 'be patient with all. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:18
      marker-yv: yv-n
    - type: text
      text: 'See that no one renders evil for evil to anyone, but always '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:9; Gal. 6:10; 1 Thess. 5:21
      marker-yv: yv-n
    - type: text
      text: pursue what is good both for yourselves and for all.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 6:10)
      marker-yv: yv-n
    - type: text
      text: 'Rejoice always, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:18
      marker-yv: yv-n
    - type: text
      text: 'pray without ceasing, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: in everything give thanks; for this is the will of God in Christ Jesus for you.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 4:30
      marker-yv: yv-n
    - type: text
      text: 'Do not quench the Spirit. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For you yourselves know perfectly that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 21:34; 1 Thess. 5:4; (2 Pet. 3:10); Rev. 3:3; 16:15
      marker-yv: yv-n
    - type: text
      text: 'the day of the Lord so comes as a thief in the night. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:1; 1 Cor. 14:1, 31
      marker-yv: yv-n
    - type: text
      text: 'Do not despise prophecies. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 14:29; 1 John 4:1
      marker-yv: yv-n
    - type: text
      text: 'Test all things; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 4:8
      marker-yv: yv-n
    - type: text
      text: 'hold fast what is good. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Abstain from every form of evil.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Blessing and Admonition
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Now may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 4:9
      marker-yv: yv-n
    - type: text
      text: 'the God of peace Himself '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 3:13
      marker-yv: yv-n
    - type: text
      text: 'sanctify you completely; and may your whole spirit, soul, and body '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 1:8, 9
      marker-yv: yv-n
    - type: text
      text: 'be preserved blameless at the coming of our Lord Jesus Christ. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'He who calls you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 10:13); 2 Thess. 3:3
      marker-yv: yv-n
    - type: text
      text: 'faithful, who also will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 1:6
      marker-yv: yv-n
    - type: text
      text: 'do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Brethren, pray for us.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Greet all the brethren with a holy kiss.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: I charge you by the Lord that this epistle be read to all the holy brethren.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The grace of our Lord Jesus Christ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' with you. Amen.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For when they say, “Peace and safety!” then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 13:6–9
      marker-yv: yv-n
    - type: text
      text: 'sudden destruction comes upon them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 13:13
      marker-yv: yv-n
    - type: text
      text: 'as labor pains upon a pregnant woman. And they shall not escape. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 26:18); Rom. 13:12; Eph. 5:8; 1 John 2:8
      marker-yv: yv-n
    - type: text
      text: 'But you, brethren, are not in darkness, so that this Day should overtake you as a thief. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'You are all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 5:8
      marker-yv: yv-n
    - type: text
      text: 'sons of light and sons of the day. We are not of the night nor of darkness. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 25:5
      marker-yv: yv-n
    - type: text
      text: 'Therefore let us not sleep, as others '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do,
    - type: text
      text: ' but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 25:13; Mark 13:35; (1 Pet. 5:8)
      marker-yv: yv-n
    - type: text
      text: 'let us watch and be sober. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Luke 21:34)
      marker-yv: yv-n
    - type: text
      text: 'those who sleep, sleep at night, and those who get drunk '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:15; 2 Pet. 2:13
      marker-yv: yv-n
    - type: text
      text: 'are drunk at night. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But let us who are of the day be sober, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 59:17; Eph. 6:14
      marker-yv: yv-n
    - type: text
      text: 'putting on the breastplate of faith and love, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' a helmet the hope of salvation. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 9:22
      marker-yv: yv-n
    - type: text
      text: 'God did not appoint us to wrath, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Thess. 2:13)
      marker-yv: yv-n
    - type: text
      text: 'but to obtain salvation through our Lord Jesus Christ, '
