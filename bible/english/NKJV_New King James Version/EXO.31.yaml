    children:
    - type: text
      text: Artisans for Building the Tabernacle
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 39:1, 41
      marker-yv: yv-n
    - type: text
      text: 'the garments of ministry, the holy garments for Aaron the priest and the garments of his sons, to minister as priests, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:23–33
      marker-yv: yv-n
    - type: text
      text: 'and the anointing oil and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:34–38
      marker-yv: yv-n
    - type: text
      text: 'sweet incense for the holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: place.
    - type: text
      text: ' According to all that I have commanded you they shall do.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sabbath Law
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak also to the children of Israel, saying: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 31:17; Lev. 19:3, 30; 26:2; Ezek. 20:12, 20
      marker-yv: yv-n
    - type: text
      text: '‘Surely My Sabbaths you shall keep, for it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a sign between Me and you throughout your generations, that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' may know that I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 20:8
      marker-yv: yv-n
    - type: text
      text: 'sanctifies you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:8; Deut. 5:12
      marker-yv: yv-n
    - type: text
      text: 'You shall keep the Sabbath, therefore, for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' holy to you. Everyone who profanes it shall surely be put to death; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 31:15; 35:2; Num. 15:32–36; John 7:23
      marker-yv: yv-n
    - type: text
      text: 'whoever does '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' work on it, that person shall be cut off from among his people. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Work shall be done for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:9–11; Lev. 23:3; Deut. 5:12–14
      marker-yv: yv-n
    - type: text
      text: 'six days, but the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 2:2; Ex. 16:23; 20:8; 35:2
      marker-yv: yv-n
    - type: text
      text: 'seventh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the Sabbath of rest, holy to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Whoever does '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' work on the Sabbath day, he shall surely be put to death. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore the children of Israel shall keep the Sabbath, to observe the Sabbath throughout their generations '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' a perpetual covenant. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 31:13; Ezek. 20:12
      marker-yv: yv-n
    - type: text
      text: 'a sign between Me and the children of Israel forever; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:31; 2:2, 3; Ex. 20:11
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' six days the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made the heavens and the earth, and on the seventh day He rested and was refreshed.’ ”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when He had made an end of speaking with him on Mount Sinai, He gave Moses '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 24:12; 32:15, 16; Deut. 4:13; 5:22; 2 Cor. 3:3)
      marker-yv: yv-n
    - type: text
      text: two tablets of the Testimony, tablets of stone, written with the finger of God.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 35:30—36:1
      marker-yv: yv-n
    - type: text
      text: '“See, I have called by name Bezalel the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 2:20
      marker-yv: yv-n
    - type: text
      text: 'son of Uri, the son of Hur, of the tribe of Judah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:3; 35:31; 1 Kin. 7:14; Eph. 1:17
      marker-yv: yv-n
    - type: text
      text: 'filled him with the Spirit of God, in wisdom, in understanding, in knowledge, and in all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: manner
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' workmanship, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to design artistic works, to work in gold, in silver, in bronze, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in cutting jewels for setting, in carving wood, and to work in all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: manner
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' workmanship.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And I, indeed I, have appointed with him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 35:34
      marker-yv: yv-n
    - type: text
      text: 'Aholiab the son of Ahisamach, of the tribe of Dan; and I have put wisdom in the hearts of all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:3; 35:10, 35; 36:1
      marker-yv: yv-n
    - type: text
      text: 'gifted artisans, that they may make all that I have commanded you: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 36:8
      marker-yv: yv-n
    - type: text
      text: 'the tabernacle of meeting, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 37:1–5
      marker-yv: yv-n
    - type: text
      text: 'the ark of the Testimony and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 37:6–9
      marker-yv: yv-n
    - type: text
      text: 'the mercy seat that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' on it, and all the furniture of the tabernacle—'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 37:10–16
      marker-yv: yv-n
    - type: text
      text: 'the table and its utensils, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 37:17–24; Lev. 24:4
      marker-yv: yv-n
    - type: text
      text: 'the pure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gold
    - type: text
      text: ' lampstand with all its utensils, the altar of incense, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 38:1–7
      marker-yv: yv-n
    - type: text
      text: 'the altar of burnt offering with all its utensils, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 38:8
      marker-yv: yv-n
    - type: text
      text: 'the laver and its base— '
