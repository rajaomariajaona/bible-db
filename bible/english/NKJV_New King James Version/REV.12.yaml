document_id: REV.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Woman, the Child, and the Dragon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now a great sign appeared in heaven: a woman clothed with the sun, with the moon under her feet, and on her head a garland of twelve stars. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then being with child, she cried out '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 26:17; 66:6–9; Mic. 4:9; Gal. 4:19
    marker-yv: yv-n
  - type: text
    text: in labor and in pain to give birth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And another sign appeared in heaven: behold, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 13:1; 17:3, 7, 9
    marker-yv: yv-n
  - type: text
    text: 'a great, fiery red dragon having seven heads and ten horns, and seven diadems on his heads. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 9:10, 19
    marker-yv: yv-n
  - type: text
    text: 'His tail drew a third '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 8:7, 12
    marker-yv: yv-n
  - type: text
    text: 'of the stars of heaven '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 8:10
    marker-yv: yv-n
  - type: text
    text: 'and threw them to the earth. And the dragon stood '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 12:2
    marker-yv: yv-n
  - type: text
    text: 'before the woman who was ready to give birth, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 1:16; Matt. 2:16
    marker-yv: yv-n
  - type: text
    text: 'to devour her Child as soon as it was born. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'She bore a male Child '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 2:9; Is. 7:14; 9:6; Rev. 2:27; 19:15
    marker-yv: yv-n
  - type: text
    text: 'who was to rule all nations with a rod of iron. And her Child was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 24:51; Acts 1:9–11
    marker-yv: yv-n
  - type: text
    text: 'caught up to God and His throne. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 12:4, 14
    marker-yv: yv-n
  - type: text
    text: 'the woman fled into the wilderness, where she has a place prepared by God, that they should feed her there '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 11:3; 13:5
    marker-yv: yv-n
  - type: text
    text: one thousand two hundred and sixty days.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Satan Thrown Out of Heaven
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And war broke out in heaven: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 10:13, 21; 12:1; Jude 9
    marker-yv: yv-n
  - type: text
    text: 'Michael and his angels fought '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 20:2
    marker-yv: yv-n
  - type: text
    text: 'with the dragon; and the dragon and his angels fought, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but they did not prevail, nor was a place found for them in heaven any longer. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 10:18; John 12:31
    marker-yv: yv-n
  - type: text
    text: 'the great dragon was cast out, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 3:1, 4; 2 Cor. 11:3; Rev. 12:15; 20:2
    marker-yv: yv-n
  - type: text
    text: 'that serpent of old, called the Devil and Satan, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 20:3
    marker-yv: yv-n
  - type: text
    text: 'who deceives the whole world; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 9:1
    marker-yv: yv-n
  - type: text
    text: he was cast to the earth, and his angels were cast out with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then I heard a loud voice saying in heaven, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 11:15
    marker-yv: yv-n
  - type: text
    text: '“Now salvation, and strength, and the kingdom of our God, and the power of His Christ have come, for the accuser of our brethren, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 1:9, 11; 2:5; Zech. 3:1
    marker-yv: yv-n
  - type: text
    text: 'who accused them before our God day and night, has been cast down. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:20
    marker-yv: yv-n
  - type: text
    text: 'they overcame him by the blood of the Lamb and by the word of their testimony, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 14:26; (Rev. 2:10)
    marker-yv: yv-n
  - type: text
    text: 'and they did not love their lives to the death. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Therefore '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 96:11; Is. 44:23; Rev. 18:20
    marker-yv: yv-n
  - type: text
    text: 'rejoice, O heavens, and you who dwell in them! '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 8:13
    marker-yv: yv-n
  - type: text
    text: 'Woe to the inhabitants of the earth and the sea! For the devil has come down to you, having great wrath, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 10:6
    marker-yv: yv-n
  - type: text
    text: because he knows that he has a short time.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Woman Persecuted
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now when the dragon saw that he had been cast to the earth, he persecuted '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 12:5
    marker-yv: yv-n
  - type: text
    text: 'the woman who gave birth to the male '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Child.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 19:4; Deut. 32:11; Is. 40:31
    marker-yv: yv-n
  - type: text
    text: 'But the woman was given two wings of a great eagle, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 12:6
    marker-yv: yv-n
  - type: text
    text: 'that she might fly '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 17:3
    marker-yv: yv-n
  - type: text
    text: 'into the wilderness to her place, where she is nourished '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 7:25; 12:7
    marker-yv: yv-n
  - type: text
    text: 'for a time and times and half a time, from the presence of the serpent. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So the serpent '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 59:19
    marker-yv: yv-n
  - type: text
    text: 'spewed water out of his mouth like a flood after the woman, that he might cause her to be carried away by the flood. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But the earth helped the woman, and the earth opened its mouth and swallowed up the flood which the dragon had spewed out of his mouth. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And the dragon was enraged with the woman, and he went to make war with the rest of her offspring, who keep the commandments of God and have the testimony of Jesus Christ.
