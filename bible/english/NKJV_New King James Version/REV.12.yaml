document_id: REV.12,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Woman, the Child, and the Dragon
  - type: text
    content: 'Now a great sign appeared in heaven: a woman clothed with the sun, with the moon under her feet, and on her head a garland of twelve stars. '
  '10':
  - type: text
    content: 'Then I heard a loud voice saying in heaven, '
  - type: note
    content: Rev. 11:15
  - type: text
    content: '“Now salvation, and strength, and the kingdom of our God, and the power of His Christ have come, for the accuser of our brethren, '
  - type: note
    content: Job 1:9, 11; 2:5; Zech. 3:1
  - type: text
    content: 'who accused them before our God day and night, has been cast down. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: Rom. 16:20
  - type: text
    content: 'they overcame him by the blood of the Lamb and by the word of their testimony, '
  - type: note
    content: Luke 14:26; (Rev. 2:10)
  - type: text
    content: 'and they did not love their lives to the death. '
  '12':
  - type: text
    content: 'Therefore '
  - type: note
    content: Ps. 96:11; Is. 44:23; Rev. 18:20
  - type: text
    content: 'rejoice, O heavens, and you who dwell in them! '
  - type: note
    content: Rev. 8:13
  - type: text
    content: 'Woe to the inhabitants of the earth and the sea! For the devil has come down to you, having great wrath, '
  - type: note
    content: Rev. 10:6
  - type: text
    content: because he knows that he has a short time.”
  - type: heading
    content: The Woman Persecuted
  '13':
  - type: text
    content: 'Now when the dragon saw that he had been cast to the earth, he persecuted '
  - type: note
    content: Rev. 12:5
  - type: text
    content: 'the woman who gave birth to the male '
  - type: text
    content: Child.
  - type: text
    content: ' '
  '14':
  - type: note
    content: Ex. 19:4; Deut. 32:11; Is. 40:31
  - type: text
    content: 'But the woman was given two wings of a great eagle, '
  - type: note
    content: Rev. 12:6
  - type: text
    content: 'that she might fly '
  - type: note
    content: Rev. 17:3
  - type: text
    content: 'into the wilderness to her place, where she is nourished '
  - type: note
    content: Dan. 7:25; 12:7
  - type: text
    content: 'for a time and times and half a time, from the presence of the serpent. '
  '15':
  - type: text
    content: 'So the serpent '
  - type: note
    content: Is. 59:19
  - type: text
    content: 'spewed water out of his mouth like a flood after the woman, that he might cause her to be carried away by the flood. '
  '16':
  - type: text
    content: 'But the earth helped the woman, and the earth opened its mouth and swallowed up the flood which the dragon had spewed out of his mouth. '
  '17':
  - type: text
    content: And the dragon was enraged with the woman, and he went to make war with the rest of her offspring, who keep the commandments of God and have the testimony of Jesus Christ.
  '2':
  - type: text
    content: 'Then being with child, she cried out '
  - type: note
    content: Is. 26:17; 66:6–9; Mic. 4:9; Gal. 4:19
  - type: text
    content: in labor and in pain to give birth.
  '3':
  - type: text
    content: 'And another sign appeared in heaven: behold, '
  - type: note
    content: Rev. 13:1; 17:3, 7, 9
  - type: text
    content: 'a great, fiery red dragon having seven heads and ten horns, and seven diadems on his heads. '
  '4':
  - type: note
    content: Rev. 9:10, 19
  - type: text
    content: 'His tail drew a third '
  - type: note
    content: Rev. 8:7, 12
  - type: text
    content: 'of the stars of heaven '
  - type: note
    content: Dan. 8:10
  - type: text
    content: 'and threw them to the earth. And the dragon stood '
  - type: note
    content: Rev. 12:2
  - type: text
    content: 'before the woman who was ready to give birth, '
  - type: note
    content: Ex. 1:16; Matt. 2:16
  - type: text
    content: 'to devour her Child as soon as it was born. '
  '5':
  - type: text
    content: 'She bore a male Child '
  - type: note
    content: Ps. 2:9; Is. 7:14; 9:6; Rev. 2:27; 19:15
  - type: text
    content: 'who was to rule all nations with a rod of iron. And her Child was '
  - type: note
    content: Luke 24:51; Acts 1:9–11
  - type: text
    content: 'caught up to God and His throne. '
  '6':
  - type: text
    content: 'Then '
  - type: note
    content: Rev. 12:4, 14
  - type: text
    content: 'the woman fled into the wilderness, where she has a place prepared by God, that they should feed her there '
  - type: note
    content: Rev. 11:3; 13:5
  - type: text
    content: one thousand two hundred and sixty days.
  - type: heading
    content: Satan Thrown Out of Heaven
  '7':
  - type: text
    content: 'And war broke out in heaven: '
  - type: note
    content: Dan. 10:13, 21; 12:1; Jude 9
  - type: text
    content: 'Michael and his angels fought '
  - type: note
    content: Rev. 20:2
  - type: text
    content: 'with the dragon; and the dragon and his angels fought, '
  '8':
  - type: text
    content: 'but they did not prevail, nor was a place found for them in heaven any longer. '
  '9':
  - type: text
    content: 'So '
  - type: note
    content: Luke 10:18; John 12:31
  - type: text
    content: 'the great dragon was cast out, '
  - type: note
    content: Gen. 3:1, 4; 2 Cor. 11:3; Rev. 12:15; 20:2
  - type: text
    content: 'that serpent of old, called the Devil and Satan, '
  - type: note
    content: Rev. 20:3
  - type: text
    content: 'who deceives the whole world; '
  - type: note
    content: Rev. 9:1
  - type: text
    content: he was cast to the earth, and his angels were cast out with him.
