document_id: LEV.6,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '10':
  - type: note
    content: Ex. 28:39–43; Lev. 16:4; Ezek. 44:17, 18
  - type: text
    content: 'And the priest shall put on his linen garment, and his linen trousers he shall put on his body, and take up the ashes of the burnt offering which the fire has consumed on the altar, and he shall put them '
  - type: note
    content: Lev. 1:16
  - type: text
    content: 'beside the altar. '
  '11':
  - type: text
    content: 'Then '
  - type: note
    content: Ezek. 44:19
  - type: text
    content: 'he shall take off his garments, put on other garments, and carry the ashes outside the camp '
  - type: note
    content: Lev. 4:12
  - type: text
    content: 'to a clean place. '
  '12':
  - type: text
    content: 'And the fire on the altar shall be kept burning on it; it shall not be put out. And the priest shall burn wood on it every morning, and lay the burnt offering in order on it; and he shall burn on it the '
  - type: note
    content: Lev. 3:3, 5, 9, 14
  - type: text
    content: 'fat of the peace offerings. '
  '13':
  - type: text
    content: 'A fire shall always be burning on the '
  - type: note
    content: Lev. 1:7
  - type: text
    content: altar; it shall never go out.
  - type: heading
    content: The Law of the Grain Offering
  '14':
  - type: text
    content: '‘This is the law of the grain offering: The sons of Aaron shall offer it on the altar before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'He shall take from it his handful of the fine flour of the grain offering, with its oil, and all the frankincense which is on the grain offering, and shall burn it on the altar for a sweet aroma, as a memorial to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'And the remainder of it Aaron and his sons shall eat; with unleavened bread it shall be eaten in a holy place; in the court of the tabernacle of meeting they shall eat it. '
  '17':
  - type: text
    content: 'It shall not be baked with leaven. I have given it as their portion of My offerings made by fire; it is most holy, like the sin offering and the '
  - type: note
    content: Lev. 7:7
  - type: text
    content: 'trespass offering. '
  '18':
  - type: note
    content: Lev. 6:29; 7:6; Num. 18:10; 1 Cor. 9:13
  - type: text
    content: 'All the males among the children of Aaron may eat it. '
  - type: note
    content: Lev. 3:17
  - type: text
    content: 'It shall be a statute forever in your generations concerning the offerings made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: Ex. 29:37; Lev. 22:3–7; Num. 4:15; Hag. 2:11–13
  - type: text
    content: Everyone who touches them must be holy.’ ”
  '19':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '2':
  - type: text
    content: '“If a person sins and '
  - type: note
    content: Num. 5:6
  - type: text
    content: 'commits a trespass against the '
  - type: heading
    content: Lord
  - type: text
    content: ' by '
  - type: note
    content: Lev. 19:11; Acts 5:4; Col. 3:9
  - type: text
    content: 'lying to his neighbor about '
  - type: note
    content: Ex. 22:7, 10
  - type: text
    content: 'what was delivered to him for safekeeping, or about a pledge, or about a robbery, or if he has '
  - type: note
    content: Prov. 24:28
  - type: text
    content: 'extorted from his neighbor, '
  '20':
  - type: note
    content: Ex. 29:2
  - type: text
    content: '“This is the offering of Aaron and his sons, which they shall offer to the '
  - type: heading
    content: Lord
  - type: text
    content: ', beginning on the day when he is anointed: one-tenth of an '
  - type: note
    content: Ex. 16:36
  - type: text
    content: 'ephah of fine flour as a daily grain offering, half of it in the morning and half of it at night. '
  '21':
  - type: text
    content: 'It shall be made in a '
  - type: note
    content: Lev. 2:5; 7:9
  - type: text
    content: 'pan with oil. When it is mixed, you shall bring it in. The baked pieces of the grain offering you shall offer for a sweet aroma to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'The priest from among his sons, '
  - type: note
    content: Lev. 4:3
  - type: text
    content: 'who is anointed in his place, shall offer it. It is a statute forever to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: Ex. 29:25
  - type: text
    content: 'It shall be wholly burned. '
  '23':
  - type: text
    content: For every grain offering for the priest shall be wholly burned. It shall not be eaten.”
  - type: heading
    content: The Law of the Sin Offering
  '24':
  - type: text
    content: 'Also the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '25':
  - type: text
    content: '“Speak to Aaron and to his sons, saying, ‘This is the law of the sin offering: '
  - type: note
    content: Lev. 1:1, 3, 5, 11
  - type: text
    content: 'In the place where the burnt offering is killed, the sin offering shall be killed before the '
  - type: heading
    content: Lord
  - type: text
    content: '. It is most holy. '
  '26':
  - type: note
    content: (Lev. 10:17, 18); Num. 18:9, 10; (Ezek. 44:28, 29)
  - type: text
    content: 'The priest who offers it for sin shall eat it. In a holy place it shall be eaten, in the court of the tabernacle of meeting. '
  '27':
  - type: note
    content: Ex. 29:37; Num. 4:15; Hag. 2:11–13
  - type: text
    content: 'Everyone who touches its flesh must be holy. And when its blood is sprinkled on any garment, you shall wash that on which it was sprinkled, in a holy place. '
  '28':
  - type: text
    content: 'But the earthen vessel in which it is boiled '
  - type: note
    content: Lev. 11:33; 15:12
  - type: text
    content: 'shall be broken. And if it is boiled in a bronze pot, it shall be both scoured and rinsed in water. '
  '29':
  - type: text
    content: 'All the males among the priests may eat it. It is most holy. '
  '3':
  - type: text
    content: 'or if he '
  - type: note
    content: Ex. 23:4; Deut. 22:1–4
  - type: text
    content: 'has found what was lost and lies concerning it, and '
  - type: note
    content: Ex. 22:11; Lev. 19:12; Jer. 7:9; Zech. 5:4
  - type: text
    content: 'swears falsely—in any one of these things that a man may do in which he sins: '
  '30':
  - type: note
    content: Lev. 4:7, 11, 12, 18, 21; 10:18; 16:27; (Heb. 13:11, 12)
  - type: text
    content: 'But no sin offering from which any of the blood is brought into the tabernacle of meeting, to make atonement in the holy '
  - type: note
    content: Ex. 26:33
  - type: text
    content: 'place, shall be '
  - type: note
    content: Lev. 6:16, 23, 26
  - type: text
    content: 'eaten. It shall be '
  - type: note
    content: Lev. 16:27
  - type: text
    content: burned in the fire.
  '4':
  - type: text
    content: 'then it shall be, because he has sinned and is guilty, that he shall restore '
  - type: note
    content: Lev. 24:18, 21
  - type: text
    content: 'what he has stolen, or the thing which he has extorted, or what was delivered to him for safekeeping, or the lost thing which he found, '
  '5':
  - type: text
    content: 'or all that about which he has sworn falsely. He shall '
  - type: note
    content: Lev. 5:16; Num. 5:7, 8; 2 Sam. 12:6
  - type: text
    content: 'restore its full value, add one-fifth more to it, and give it to whomever it belongs, on the day of his trespass offering. '
  '6':
  - type: text
    content: 'And he shall bring his trespass offering to the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Lev. 1:3; 5:15
  - type: text
    content: 'a ram without blemish from the flock, with your valuation, as a trespass offering, to the priest. '
  '7':
  - type: note
    content: Lev. 4:26
  - type: text
    content: 'So the priest shall make atonement for him before the '
  - type: heading
    content: Lord
  - type: text
    content: ', and he shall be forgiven for any one of these things that he may have done in which he trespasses.”'
  - type: heading
    content: The Law of the Burnt Offering
  '8':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '9':
  - type: text
    content: '“Command Aaron and his sons, saying, ‘This is the '
  - type: note
    content: Ex. 29:38–42; Num. 28:3–10
  - type: text
    content: 'law of the burnt offering: The burnt offering shall be on the hearth upon the altar all night until morning, and the fire of the altar shall be kept burning on it. '
