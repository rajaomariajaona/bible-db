document_id: LEV.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“If a person sins and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 5:6
    marker-yv: yv-n
  - type: text
    text: 'commits a trespass against the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' by '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 19:11; Acts 5:4; Col. 3:9
    marker-yv: yv-n
  - type: text
    text: 'lying to his neighbor about '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 22:7, 10
    marker-yv: yv-n
  - type: text
    text: 'what was delivered to him for safekeeping, or about a pledge, or about a robbery, or if he has '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 24:28
    marker-yv: yv-n
  - type: text
    text: 'extorted from his neighbor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'or if he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:4; Deut. 22:1–4
    marker-yv: yv-n
  - type: text
    text: 'has found what was lost and lies concerning it, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 22:11; Lev. 19:12; Jer. 7:9; Zech. 5:4
    marker-yv: yv-n
  - type: text
    text: 'swears falsely—in any one of these things that a man may do in which he sins: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'then it shall be, because he has sinned and is guilty, that he shall restore '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 24:18, 21
    marker-yv: yv-n
  - type: text
    text: 'what he has stolen, or the thing which he has extorted, or what was delivered to him for safekeeping, or the lost thing which he found, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'or all that about which he has sworn falsely. He shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 5:16; Num. 5:7, 8; 2 Sam. 12:6
    marker-yv: yv-n
  - type: text
    text: 'restore its full value, add one-fifth more to it, and give it to whomever it belongs, on the day of his trespass offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he shall bring his trespass offering to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 1:3; 5:15
    marker-yv: yv-n
  - type: text
    text: 'a ram without blemish from the flock, with your valuation, as a trespass offering, to the priest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 4:26
    marker-yv: yv-n
  - type: text
    text: 'So the priest shall make atonement for him before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and he shall be forgiven for any one of these things that he may have done in which he trespasses.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Law of the Burnt Offering
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Command Aaron and his sons, saying, ‘This is the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:38–42; Num. 28:3–10
    marker-yv: yv-n
  - type: text
    text: 'law of the burnt offering: The burnt offering shall be on the hearth upon the altar all night until morning, and the fire of the altar shall be kept burning on it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 28:39–43; Lev. 16:4; Ezek. 44:17, 18
    marker-yv: yv-n
  - type: text
    text: 'And the priest shall put on his linen garment, and his linen trousers he shall put on his body, and take up the ashes of the burnt offering which the fire has consumed on the altar, and he shall put them '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 1:16
    marker-yv: yv-n
  - type: text
    text: 'beside the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 44:19
    marker-yv: yv-n
  - type: text
    text: 'he shall take off his garments, put on other garments, and carry the ashes outside the camp '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 4:12
    marker-yv: yv-n
  - type: text
    text: 'to a clean place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the fire on the altar shall be kept burning on it; it shall not be put out. And the priest shall burn wood on it every morning, and lay the burnt offering in order on it; and he shall burn on it the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 3:3, 5, 9, 14
    marker-yv: yv-n
  - type: text
    text: 'fat of the peace offerings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A fire shall always be burning on the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 1:7
    marker-yv: yv-n
  - type: text
    text: altar; it shall never go out.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Law of the Grain Offering
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '‘This is the law of the grain offering: The sons of Aaron shall offer it on the altar before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He shall take from it his handful of the fine flour of the grain offering, with its oil, and all the frankincense which is on the grain offering, and shall burn it on the altar for a sweet aroma, as a memorial to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the remainder of it Aaron and his sons shall eat; with unleavened bread it shall be eaten in a holy place; in the court of the tabernacle of meeting they shall eat it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'It shall not be baked with leaven. I have given it as their portion of My offerings made by fire; it is most holy, like the sin offering and the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 7:7
    marker-yv: yv-n
  - type: text
    text: 'trespass offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 6:29; 7:6; Num. 18:10; 1 Cor. 9:13
    marker-yv: yv-n
  - type: text
    text: 'All the males among the children of Aaron may eat it. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 3:17
    marker-yv: yv-n
  - type: text
    text: 'It shall be a statute forever in your generations concerning the offerings made by fire to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:37; Lev. 22:3–7; Num. 4:15; Hag. 2:11–13
    marker-yv: yv-n
  - type: text
    text: Everyone who touches them must be holy.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:2
    marker-yv: yv-n
  - type: text
    text: '“This is the offering of Aaron and his sons, which they shall offer to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', beginning on the day when he is anointed: one-tenth of an '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 16:36
    marker-yv: yv-n
  - type: text
    text: 'ephah of fine flour as a daily grain offering, half of it in the morning and half of it at night. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'It shall be made in a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 2:5; 7:9
    marker-yv: yv-n
  - type: text
    text: 'pan with oil. When it is mixed, you shall bring it in. The baked pieces of the grain offering you shall offer for a sweet aroma to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The priest from among his sons, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 4:3
    marker-yv: yv-n
  - type: text
    text: 'who is anointed in his place, shall offer it. It is a statute forever to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:25
    marker-yv: yv-n
  - type: text
    text: 'It shall be wholly burned. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For every grain offering for the priest shall be wholly burned. It shall not be eaten.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Law of the Sin Offering
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Also the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“Speak to Aaron and to his sons, saying, ‘This is the law of the sin offering: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 1:1, 3, 5, 11
    marker-yv: yv-n
  - type: text
    text: 'In the place where the burnt offering is killed, the sin offering shall be killed before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. It is most holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Lev. 10:17, 18); Num. 18:9, 10; (Ezek. 44:28, 29)
    marker-yv: yv-n
  - type: text
    text: 'The priest who offers it for sin shall eat it. In a holy place it shall be eaten, in the court of the tabernacle of meeting. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:37; Num. 4:15; Hag. 2:11–13
    marker-yv: yv-n
  - type: text
    text: 'Everyone who touches its flesh must be holy. And when its blood is sprinkled on any garment, you shall wash that on which it was sprinkled, in a holy place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But the earthen vessel in which it is boiled '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 11:33; 15:12
    marker-yv: yv-n
  - type: text
    text: 'shall be broken. And if it is boiled in a bronze pot, it shall be both scoured and rinsed in water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'All the males among the priests may eat it. It is most holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 4:7, 11, 12, 18, 21; 10:18; 16:27; (Heb. 13:11, 12)
    marker-yv: yv-n
  - type: text
    text: 'But no sin offering from which any of the blood is brought into the tabernacle of meeting, to make atonement in the holy '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 26:33
    marker-yv: yv-n
  - type: text
    text: 'place, shall be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 6:16, 23, 26
    marker-yv: yv-n
  - type: text
    text: 'eaten. It shall be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 16:27
    marker-yv: yv-n
  - type: text
    text: burned in the fire.
