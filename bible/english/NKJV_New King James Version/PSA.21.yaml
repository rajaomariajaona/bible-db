- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Joy in the Salvation of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The king shall have joy in Your strength, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And in Your salvation how greatly shall he rejoice!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You have given him his heart’s desire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And have not withheld the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 7:26–29
    marker-yv: yv-n
  - type: text
    text: request of his lips.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For You meet him with the blessings of goodness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: You set a crown of pure gold upon his head.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 61:5, 6; 133:3
    marker-yv: yv-n
  - type: text
    text: 'He asked life from You, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' You gave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' to him—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Length of days forever and ever.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'His glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' great in Your salvation;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Honor and majesty You have placed upon him.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For You have made him most blessed forever;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 16:11; 45:7
    marker-yv: yv-n
  - type: text
    text: You have made him exceedingly glad with Your presence.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For the king trusts in the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: And through the mercy of the Most High he shall not be moved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Your hand will find all Your enemies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your right hand will find those who hate You.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You shall make them as a fiery oven in the time of Your anger;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' shall swallow them up in His wrath,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the fire shall devour them.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Their offspring You shall destroy from the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their descendants from among the sons of men.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For they intended evil against You;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They devised a plot '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which
  - type: text
    text: ' they are not able '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 2:1–4
    marker-yv: yv-n
  - type: text
    text: perform.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Therefore You will make them turn their back;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'You will make ready '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Your
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: arrows
  - type: text
    text: ' on Your string toward their faces.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Be exalted, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', in Your own strength!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: We will sing and praise Your power.
