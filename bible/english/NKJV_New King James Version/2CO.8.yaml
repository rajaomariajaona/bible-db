  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Excel in Giving
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, brethren, we make known to you the grace of God bestowed on the churches of Macedonia: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in this '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 7:25, 40
      marker-yv: yv-n
    - type: text
      text: 'I give advice: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 19:17; Matt. 10:42; 1 Tim. 6:18, 19; Heb. 13:16)
      marker-yv: yv-n
    - type: text
      text: 'It is to your advantage not only to be doing what you began and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:2; 2 Cor. 9:2
      marker-yv: yv-n
    - type: text
      text: 'were desiring to do a year ago; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but now you also must complete the doing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it;
    - type: text
      text: ' that as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' a readiness to desire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' so '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: may
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' a completion out of what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' have. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 12:43, 44; Luke 21:3, 4; 2 Cor. 9:7
      marker-yv: yv-n
    - type: text
      text: 'if there is first a willing mind, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' accepted according to what one has, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' not according to what he does not have.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do
    - type: text
      text: ' not mean that others should be eased and you burdened; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but by an equality, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' now at this time your abundance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: may
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: supply
    - type: text
      text: ' their lack, that their abundance also may '
    - type: usfm
      marker: it
      children:
      - type: text
        text: supply
    - type: text
      text: ' your lack—that there may be equality. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As it is written, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 16:18
      marker-yv: yv-n
    - type: text
      text: '“He who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gathered
    - type: text
      text: ' much had nothing left over, and he who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gathered
    - type: text
      text: ' little had no lack.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Collection for the Judean Saints
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' to God who puts the same earnest care for you into the heart of Titus. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he not only accepted the exhortation, but being more diligent, he went to you of his own accord. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we have sent with him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:3; 2 Cor. 12:18
      marker-yv: yv-n
    - type: text
      text: 'the brother whose praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in the gospel throughout all the churches, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and not only '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that,
    - type: text
      text: ' but who was also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 14:23; 1 Cor. 16:3, 4
      marker-yv: yv-n
    - type: text
      text: 'chosen by the churches to travel with us with this gift, which is administered by us '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 4:15
      marker-yv: yv-n
    - type: text
      text: 'to the glory of the Lord Himself and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: show
    - type: text
      text: ' your ready mind, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that in a great trial of affliction the abundance of their joy and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 12:44
      marker-yv: yv-n
    - type: text
      text: 'their deep poverty abounded in the riches of their liberality. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avoiding this: that anyone should blame us in this lavish gift which is administered by us— '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:17; Phil. 4:8; 1 Pet. 2:12
      marker-yv: yv-n
    - type: text
      text: providing honorable things, not only in the sight of the Lord, but also in the sight of men.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we have sent with them our brother whom we have often proved diligent in many things, but now much more diligent, because of the great confidence which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' in you. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anyone
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: inquires
    - type: text
      text: ' about '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 7:13, 14
      marker-yv: yv-n
    - type: text
      text: 'Titus, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my partner and fellow worker concerning you. Or if our brethren '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: inquired
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: about, they are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 13:16); Phil. 2:25
      marker-yv: yv-n
    - type: text
      text: 'messengers of the churches, the glory of Christ. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore show to them, and before the churches, the proof of your love and of our '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 7:4, 14; 9:2
      marker-yv: yv-n
    - type: text
      text: boasting on your behalf.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I bear witness that according to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' ability, yes, and beyond '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' ability, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' freely willing, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'imploring us with much urgency that we would receive the gift and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 11:29; 24:17; Rom. 15:25, 26; 1 Cor. 16:1, 3, 4; 2 Cor. 9:1
      marker-yv: yv-n
    - type: text
      text: 'the fellowship of the ministering to the saints. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' as we had hoped, but they first '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 12:1, 2)
      marker-yv: yv-n
    - type: text
      text: 'gave themselves to the Lord, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: then
    - type: text
      text: ' to us by the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eph. 6:6)
      marker-yv: yv-n
    - type: text
      text: 'will of God. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 8:17; 12:18
      marker-yv: yv-n
    - type: text
      text: 'we urged Titus, that as he had begun, so he would also complete this grace in you as well. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 1:5; 12:13)
      marker-yv: yv-n
    - type: text
      text: you abound in everything—in faith, in speech, in knowledge, in all diligence, and in your love for us—
    - type: usfm
      marker: it
      children:
      - type: text
        text: see
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 9:8
      marker-yv: yv-n
    - type: text
      text: that you abound in this grace also.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ Our Pattern
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 7:6
      marker-yv: yv-n
    - type: text
      text: 'I speak not by commandment, but I am testing the sincerity of your love by the diligence of others. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you know the grace of our Lord Jesus Christ, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 8:20; Luke 9:58; Phil. 2:6, 7
      marker-yv: yv-n
    - type: text
      text: 'that though He was rich, yet for your sakes He became poor, that you through His poverty might become '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 9:23; (Eph. 1:7; Rev. 3:18)
      marker-yv: yv-n
    - type: text
      text: rich.
