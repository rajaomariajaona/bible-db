  '21':
  - type: text
    content: She cries out in the chief concourses,
  - type: text
    content: At the openings of the gates in the city
  - type: text
    content: 'She speaks her words:'
  '22':
  - type: text
    content: “How long, you simple ones, will you love simplicity?
  - type: text
    content: For scorners delight in their scorning,
  - type: text
    content: And fools hate knowledge.
  '23':
  - type: text
    content: Turn at my rebuke;
  - type: text
    content: 'Surely '
  - type: note
    content: Is. 32:15; Joel 2:28; (John 7:39)
  - type: text
    content: I will pour out my spirit on you;
  - type: text
    content: I will make my words known to you.
  '24':
  - type: note
    content: Is. 65:12; 66:4; Jer. 7:13; Zech. 7:11
  - type: text
    content: Because I have called and you refused,
  - type: text
    content: I have stretched out my hand and no one regarded,
  '25':
  - type: text
