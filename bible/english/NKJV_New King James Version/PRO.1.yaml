document_id: PRO.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Beginning of Knowledge
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 4:32; Prov. 10:1; 25:1; Eccl. 12:9
      marker-yv: yv-n
    - type: text
      text: 'proverbs of Solomon the son of David, king of Israel:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My son, if sinners entice you,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 39:7–10; Deut. 13:8; Ps. 50:18; (Eph. 5:11)
      marker-yv: yv-n
    - type: text
      text: Do not consent.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If they say, “Come with us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let us '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 12:6; Jer. 5:26
      marker-yv: yv-n
    - type: text
      text: 'lie in wait to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shed
    - type: text
      text: ' blood;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let us lurk secretly for the innocent without cause;
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let us swallow them alive like Sheol,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And whole, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 28:1
      marker-yv: yv-n
    - type: text
      text: like those who go down to the Pit;
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'We shall find all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kinds
    - type: text
      text: ' of precious possessions,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We shall fill our houses with spoil;
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Cast in your lot among us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let us all have one purse”—
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My son, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 1:1; Prov. 4:14
      marker-yv: yv-n
    - type: text
      text: do not walk in the way with them,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:101
      marker-yv: yv-n
    - type: text
      text: Keep your foot from their path;
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 6:17, 18; (Is. 59:7); Rom. 3:15
      marker-yv: yv-n
    - type: text
      text: For their feet run to evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they make haste to shed blood.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Surely, in vain the net is spread
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the sight of any bird;
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But they lie in wait for their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' blood,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They lurk secretly for their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' lives.'
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 15:27; (1 Tim. 6:10)
      marker-yv: yv-n
    - type: text
      text: 'So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the ways of everyone who is greedy for gain;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It takes away the life of its owners.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Call of Wisdom
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To know wisdom and instruction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To perceive the words of understanding,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 8:1; 9:3; (John 7:37)
      marker-yv: yv-n
    - type: text
      text: Wisdom calls aloud outside;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She raises her voice in the open squares.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She cries out in the chief concourses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At the openings of the gates in the city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'She speaks her words:'
  '22':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “How long, you simple ones, will you love simplicity?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For scorners delight in their scorning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And fools hate knowledge.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Turn at my rebuke;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Surely '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 32:15; Joel 2:28; (John 7:39)
      marker-yv: yv-n
    - type: text
      text: I will pour out my spirit on you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will make my words known to you.
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 65:12; 66:4; Jer. 7:13; Zech. 7:11
      marker-yv: yv-n
    - type: text
      text: Because I have called and you refused,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have stretched out my hand and no one regarded,
  '25':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 107:11; Luke 7:30
      marker-yv: yv-n
    - type: text
      text: disdained all my counsel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And would have none of my rebuke,
  '26':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 2:4
      marker-yv: yv-n
    - type: text
      text: I also will laugh at your calamity;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will mock when your terror comes,
  '27':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 10:24, 25)
      marker-yv: yv-n
    - type: text
      text: your terror comes like a storm,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your destruction comes like a whirlwind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When distress and anguish come upon you.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 8:18; Job 27:9; 35:12; Ps. 18:41; Is. 1:15; Jer. 11:11; 14:12; Ezek. 8:18; Mic. 3:4; Zech. 7:13; (James 4:3)
      marker-yv: yv-n
    - type: text
      text: ' they will call on me, but I will not answer;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will seek me diligently, but they will not find me.
  '29':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 21:14; Prov. 1:22
      marker-yv: yv-n
    - type: text
      text: hated knowledge
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And did not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:173
      marker-yv: yv-n
    - type: text
      text: 'choose the fear of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To receive the instruction of wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Justice, judgment, and equity;
  '30':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 81:11; Prov. 1:25
      marker-yv: yv-n
    - type: text
      text: They would have none of my counsel
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' despised my every rebuke.'
  '31':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 4:8; Prov. 5:22, 23; 22:8; Is. 3:11; Jer. 6:19
      marker-yv: yv-n
    - type: text
      text: they shall eat the fruit of their own way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And be filled to the full with their own fancies.
  '32':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the turning away of the simple will slay them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the complacency of fools will destroy them;
  '33':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But whoever listens to me will dwell '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:24–26
      marker-yv: yv-n
    - type: text
      text: safely,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 112:7
      marker-yv: yv-n
    - type: text
      text: will be secure, without fear of evil.”
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To give prudence to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 9:4
      marker-yv: yv-n
    - type: text
      text: simple,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To the young man knowledge and discretion—
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 9:9
      marker-yv: yv-n
    - type: text
      text: 'A wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' will hear and increase learning,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a man of understanding will attain wise counsel,
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To understand a proverb and an enigma,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The words of the wise and their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 12:8; Ps. 78:2; Dan. 8:23
      marker-yv: yv-n
    - type: text
      text: riddles.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 28:28; Ps. 111:10; Prov. 9:10; 15:33; (Eccl. 12:13)
      marker-yv: yv-n
    - type: text
      text: 'The fear of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the beginning of knowledge,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But
    - type: text
      text: ' fools despise wisdom and instruction.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Shun Evil Counsel
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 4:1
      marker-yv: yv-n
    - type: text
      text: My son, hear the instruction of your father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And do not forsake the law of your mother;
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:22
      marker-yv: yv-n
    - type: text
      text: graceful ornament on your head,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And chains about your neck.
