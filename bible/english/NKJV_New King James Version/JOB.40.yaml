    - type: text
      text: ' with you;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He eats grass like an ox.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'See now, his strength '
    - type: usfm
      marker: it
