    - type: text
      text: yield food for him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the beasts of the field play there.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He lies under the lotus trees,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In a covert of reeds and marsh.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The lotus trees cover him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' their shade;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The willows by the brook surround him.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Indeed the river may rage,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yet
    - type: text
      text: ' he is not disturbed;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is confident, though the Jordan gushes into his mouth,
  '24':
  - type: usfm
    marker: q2
