  - type: usfm
    marker: q2
    children:
    - type: text
      text: Would you condemn Me that you may be justified?
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have you an arm like God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or can you thunder with '
    - type: usfm
      marker: x
      children:
