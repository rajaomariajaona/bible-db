document_id: ACT.21,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Warnings on the Journey to Jerusalem
  - type: text
    content: 'Now it came to pass, that when we had departed from them and set sail, running a straight course we came to Cos, the following '
  - type: text
    content: day
  - type: text
    content: ' to Rhodes, and from there to Patara. '
  '10':
  - type: text
    content: 'And as we stayed many days, a certain prophet named '
  - type: note
    content: Acts 11:28
  - type: text
    content: 'Agabus came down from Judea. '
  '11':
  - type: text
    content: 'When he had come to us, he took Paul’s belt, bound his '
  - type: text
    content: own
  - type: text
    content: ' hands and feet, and said, “Thus says the Holy Spirit, '
  - type: note
    content: Acts 20:23; 21:33; 22:25
  - type: text
    content: '‘So shall the Jews at Jerusalem bind the man who owns this belt, and deliver '
  - type: text
    content: him
  - type: text
    content: ' into the hands of the Gentiles.’ ”'
  '12':
  - type: text
    content: 'Now when we heard these things, both we and those from that place pleaded with him not to go up to Jerusalem. '
  '13':
  - type: text
    content: 'Then Paul answered, '
  - type: note
    content: Acts 20:24, 37
  - type: text
    content: “What do you mean by weeping and breaking my heart? For I am ready not only to be bound, but also to die at Jerusalem for the name of the Lord Jesus.”
  '14':
  - type: text
    content: 'So when he would not be persuaded, we ceased, saying, '
  - type: note
    content: Matt. 6:10; 26:42; Luke 11:2; 22:42
  - type: text
    content: “The will of the Lord be done.”
  - type: heading
    content: Paul Urged to Make Peace
  '15':
  - type: text
    content: 'And after those days we packed and went up to Jerusalem. '
  '16':
  - type: text
    content: Also some of the disciples from Caesarea went with us and brought with them a certain Mnason of Cyprus, an early disciple, with whom we were to lodge.
  '17':
  - type: note
    content: Acts 15:4
  - type: text
    content: 'And when we had come to Jerusalem, the brethren received us gladly. '
  '18':
  - type: text
    content: 'On the following '
  - type: text
    content: day
  - type: text
    content: ' Paul went in with us to '
  - type: note
    content: Acts 15:13; Gal. 1:19; 2:9
  - type: text
    content: 'James, and all the elders were present. '
  '19':
  - type: text
    content: 'When he had greeted them, '
  - type: note
    content: Acts 15:4, 12; Rom. 15:18, 19
  - type: text
    content: 'he told in detail those things which God had done among the Gentiles '
  - type: note
    content: Acts 1:17; 20:24; 1 Tim. 2:7
  - type: text
    content: 'through his ministry. '
  '2':
  - type: text
    content: 'And finding a ship sailing over to Phoenicia, we went aboard and set sail. '
  '20':
  - type: text
    content: 'And when they heard '
  - type: text
    content: it,
  - type: text
    content: ' they glorified the Lord. And they said to him, “You see, brother, how many myriads of Jews there are who have believed, and they are all '
  - type: note
    content: Acts 15:1; 22:3; (Rom. 10:2); Gal. 1:14
  - type: text
    content: 'zealous for the law; '
  '21':
  - type: text
    content: 'but they have been informed about you that you teach all the Jews who are among the Gentiles to forsake Moses, saying that they ought not to circumcise '
  - type: text
    content: their
  - type: text
    content: ' children nor to walk according to the customs. '
  '22':
  - type: text
    content: 'What then? The assembly must certainly meet, for they will hear that you have come. '
  '23':
  - type: text
    content: 'Therefore do what we tell you: We have four men who have taken a vow. '
  '24':
  - type: text
    content: 'Take them and be purified with them, and pay their expenses so that they may '
  - type: note
    content: Num. 6:2, 13, 18; Acts 18:18
  - type: text
    content: 'shave '
  - type: text
    content: their
  - type: text
    content: ' heads, and that all may know that those things of which they were informed concerning you are nothing, but '
  - type: text
    content: that
  - type: text
    content: ' you yourself also walk orderly and keep the law. '
  '25':
  - type: text
    content: 'But concerning the Gentiles who believe, '
  - type: note
    content: Acts 15:19, 20, 29
  - type: text
    content: 'we have written '
  - type: text
    content: and
  - type: text
    content: ' decided that they should observe no such thing, except that they should keep themselves from '
  - type: text
    content: things
  - type: text
    content: ' offered to idols, from blood, from things strangled, and from sexual immorality.”'
  - type: heading
    content: Arrested in the Temple
  '26':
  - type: text
    content: 'Then Paul took the men, and the next day, having been purified with them, '
  - type: note
    content: John 11:55; Acts 21:24; 24:18
  - type: text
    content: 'entered the temple '
  - type: note
    content: Num. 6:13; Acts 24:18
  - type: text
    content: to announce the expiration of the days of purification, at which time an offering should be made for each one of them.
  '27':
  - type: text
    content: 'Now when the seven days were almost ended, '
  - type: note
    content: Acts 20:19; 24:18
  - type: text
    content: 'the Jews from Asia, seeing him in the temple, stirred up the whole crowd and '
  - type: note
    content: Acts 26:21
  - type: text
    content: 'laid hands on him, '
  '28':
  - type: text
    content: 'crying out, “Men of Israel, help! This is the man '
  - type: note
    content: (Matt. 24:15); Acts 6:13; 24:6
  - type: text
    content: 'who teaches all '
  - type: text
    content: men
  - type: text
    content: ' everywhere against the people, the law, and this place; and furthermore he also brought Greeks into the temple and has defiled this holy place.” '
  '29':
  - type: text
    content: '(For they had previously seen '
  - type: note
    content: Acts 20:4
  - type: text
    content: Trophimus the Ephesian with him in the city, whom they supposed that Paul had brought into the temple.)
  '3':
  - type: text
    content: 'When we had sighted Cyprus, we passed it on the left, sailed to Syria, and landed at Tyre; for there the ship was to unload her cargo. '
  '30':
  - type: text
    content: 'And '
  - type: note
    content: 2 Kin. 11:15; Acts 16:19; 26:21
  - type: text
    content: 'all the city was disturbed; and the people ran together, seized Paul, and dragged him out of the temple; and immediately the doors were shut. '
  '31':
  - type: text
    content: 'Now as they were '
  - type: note
    content: 2 Cor. 11:23
  - type: text
    content: 'seeking to kill him, news came to the commander of the garrison that all Jerusalem was in an uproar. '
  '32':
  - type: note
    content: Acts 23:27; 24:7
  - type: text
    content: 'He immediately took soldiers and centurions, and ran down to them. And when they saw the commander and the soldiers, they stopped beating Paul. '
  '33':
  - type: text
    content: 'Then the '
  - type: note
    content: Acts 24:7
  - type: text
    content: 'commander came near and took him, and '
  - type: note
    content: Acts 20:23; 21:11; Eph. 6:20; 2 Tim. 1:16; 2:9
  - type: text
    content: 'commanded '
  - type: text
    content: him
  - type: text
    content: ' to be bound with two chains; and he asked who he was and what he had done. '
  '34':
  - type: text
    content: And some among the multitude cried one thing and some another.
  - type: text
    content: 'So when he could not ascertain the truth because of the tumult, he commanded him to be taken into the barracks. '
  '35':
  - type: text
    content: 'When he reached the stairs, he had to be carried by the soldiers because of the violence of the mob. '
  '36':
  - type: text
    content: 'For the multitude of the people followed after, crying out, '
  - type: note
    content: Luke 23:18; John 19:15; Acts 22:22
  - type: text
    content: “Away with him!”
  - type: heading
    content: Addressing the Jerusalem Mob
  '37':
  - type: text
    content: Then as Paul was about to be led into the barracks, he said to the commander, “May I speak to you?”
  - type: text
    content: 'He replied, “Can you speak Greek? '
  '38':
  - type: note
    content: Acts 5:36
  - type: text
    content: Are you not the Egyptian who some time ago stirred up a rebellion and led the four thousand assassins out into the wilderness?”
  '39':
  - type: text
    content: 'But Paul said, '
  - type: note
    content: Acts 9:11; 22:3; 2 Cor. 11:22; Phil. 3:4–6
  - type: text
    content: “I am a Jew from Tarsus, in Cilicia, a citizen of no mean city; and I implore you, permit me to speak to the people.”
  '4':
  - type: text
    content: 'And finding disciples, we stayed there seven days. '
  - type: note
    content: (Acts 20:23; 21:12)
  - type: text
    content: 'They told Paul through the Spirit not to go up to Jerusalem. '
  '40':
  - type: text
    content: 'So when he had given him permission, Paul stood on the stairs and '
  - type: note
    content: Acts 12:17
  - type: text
    content: 'motioned with his hand to the people. And when there was a great silence, he spoke to '
  - type: text
    content: them
  - type: text
    content: ' in the '
  - type: note
    content: John 5:2; Acts 22:2
  - type: text
    content: Hebrew language, saying,
  '5':
  - type: text
    content: 'When we had come to the end of those days, we departed and went on our way; and they all accompanied us, with wives and children, till '
  - type: text
    content: we
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' out of the city. And '
  - type: note
    content: Luke 22:41; Acts 9:40; 20:36
  - type: text
    content: 'we knelt down on the shore and prayed. '
  '6':
  - type: text
    content: 'When we had taken our leave of one another, we boarded the ship, and they returned '
  - type: note
    content: John 1:11
  - type: text
    content: home.
  '7':
  - type: text
    content: 'And when we had finished '
  - type: text
    content: our
  - type: text
    content: ' voyage from Tyre, we came to Ptolemais, greeted the brethren, and stayed with them one day. '
  '8':
  - type: text
    content: 'On the next '
  - type: text
    content: day
  - type: text
    content: ' we who were Paul’s companions departed and came to '
  - type: note
    content: Acts 8:40; 21:16
  - type: text
    content: 'Caesarea, and entered the house of Philip '
  - type: note
    content: Acts 8:5, 26, 40; Eph. 4:11; 2 Tim. 4:5
  - type: text
    content: 'the evangelist, '
  - type: note
    content: Acts 6:5
  - type: text
    content: 'who was '
  - type: text
    content: one
  - type: text
    content: ' of the seven, and stayed with him. '
  '9':
  - type: text
    content: 'Now this man had four virgin daughters '
  - type: note
    content: Joel 2:28; Acts 2:17
  - type: text
    content: 'who prophesied. '
