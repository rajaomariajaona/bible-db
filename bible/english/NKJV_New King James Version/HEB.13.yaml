document_id: HEB.13,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Concluding Moral Directions
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:10
      marker-yv: yv-n
    - type: text
      text: 'brotherly love continue. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We have an altar from which those who serve the tabernacle have no right to eat. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the bodies of those animals, whose blood is brought into the sanctuary by the high priest for sin, are burned outside the camp. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore Jesus also, that He might sanctify the people with His own blood, suffered outside the gate. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore let us go forth to Him, outside the camp, bearing '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Pet. 4:14
      marker-yv: yv-n
    - type: text
      text: 'His reproach. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For here we have no continuing city, but we seek the one to come. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 5:20
      marker-yv: yv-n
    - type: text
      text: 'Therefore by Him let us continually offer '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:12
      marker-yv: yv-n
    - type: text
      text: 'the sacrifice of praise to God, that is, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 57:19; Hos. 14:2
      marker-yv: yv-n
    - type: text
      text: 'the fruit of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' lips, giving thanks to His name. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:13
      marker-yv: yv-n
    - type: text
      text: 'But do not forget to do good and to share, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 9:12; Phil. 4:18
      marker-yv: yv-n
    - type: text
      text: with such sacrifices God is well pleased.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 2:29
      marker-yv: yv-n
    - type: text
      text: 'Obey those who rule over you, and be submissive, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 62:6; Ezek. 3:17; Acts 20:28
      marker-yv: yv-n
    - type: text
      text: they watch out for your souls, as those who must give account. Let them do so with joy and not with grief, for that would be unprofitable for you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prayer Requested
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:19
      marker-yv: yv-n
    - type: text
      text: 'Pray for us; for we are confident that we have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 23:1
      marker-yv: yv-n
    - type: text
      text: 'a good conscience, in all things desiring to live honorably. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I especially urge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' to do this, that I may be restored to you the sooner.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Benediction, Final Exhortation, Farewell
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 25:35; Rom. 12:13
      marker-yv: yv-n
    - type: text
      text: 'Do not forget to entertain strangers, for by so '
    - type: usfm
      marker: it
      children:
      - type: text
        text: doing
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 18:1–22; 19:1
      marker-yv: yv-n
    - type: text
      text: 'some have unwittingly entertained angels. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 5:1, 2, 10; 15:33
      marker-yv: yv-n
    - type: text
      text: 'the God of peace '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 16:10, 11; Hos. 6:2; Rom. 4:24
      marker-yv: yv-n
    - type: text
      text: 'who brought up our Lord Jesus from the dead, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 23:1; Is. 40:11; 63:11; John 10:11; 1 Pet. 2:25; 5:4
      marker-yv: yv-n
    - type: text
      text: 'that great Shepherd of the sheep, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 9:11; Heb. 10:29
      marker-yv: yv-n
    - type: text
      text: 'through the blood of the everlasting covenant, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'make you complete in every good work to do His will, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 2:13
      marker-yv: yv-n
    - type: text
      text: 'working in you what is well pleasing in His sight, through Jesus Christ, to whom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' glory forever and ever. Amen.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I appeal to you, brethren, bear with the word of exhortation, for I have written to you in few words. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Know that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' brother Timothy has been set free, with whom I shall see you if he comes shortly.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Greet all those who rule over you, and all the saints. Those from Italy greet you.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Grace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' with you all. Amen.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 25:36; Heb. 10:34
      marker-yv: yv-n
    - type: text
      text: Remember the prisoners as if chained with them—those who are mistreated—since you yourselves are in the body also.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 5:18, 19
      marker-yv: yv-n
    - type: text
      text: 'Marriage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' honorable among all, and the bed undefiled; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 6:9; Gal. 5:19, 21; 1 Thess. 4:6
      marker-yv: yv-n
    - type: text
      text: but fornicators and adulterers God will judge.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Let
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' conduct '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' without covetousness; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' content with such things as you have. For He Himself has said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 28:15; Deut. 31:6, 8; Josh. 1:5
      marker-yv: yv-n
    - type: text
      text: '“I will never leave you nor forsake you.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So we may boldly say:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 27:1; 118:6
      marker-yv: yv-n
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my helper;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not fear.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What can man do to me?”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Concluding Religious Directions
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remember those who rule over you, who have spoken the word of God to you, whose faith follow, considering the outcome of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' conduct. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus Christ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 8:58); 2 Cor. 1:19; Heb. 1:12
      marker-yv: yv-n
    - type: text
      text: 'the same yesterday, today, and forever. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not be carried about with various and strange doctrines. For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good that the heart be established by grace, not with foods which have not profited those who have been occupied with them.'
