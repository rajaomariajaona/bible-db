document_id: HEB.13,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Concluding Moral Directions
  - type: text
    content: 'Let '
  - type: note
    content: Rom. 12:10
  - type: text
    content: 'brotherly love continue. '
  '10':
  - type: text
    content: 'We have an altar from which those who serve the tabernacle have no right to eat. '
  '11':
  - type: text
    content: 'For the bodies of those animals, whose blood is brought into the sanctuary by the high priest for sin, are burned outside the camp. '
  '12':
  - type: text
    content: 'Therefore Jesus also, that He might sanctify the people with His own blood, suffered outside the gate. '
  '13':
  - type: text
    content: 'Therefore let us go forth to Him, outside the camp, bearing '
  - type: note
    content: 1 Pet. 4:14
  - type: text
    content: 'His reproach. '
  '14':
  - type: text
    content: 'For here we have no continuing city, but we seek the one to come. '
  '15':
  - type: note
    content: Eph. 5:20
  - type: text
    content: 'Therefore by Him let us continually offer '
  - type: note
    content: Lev. 7:12
  - type: text
    content: 'the sacrifice of praise to God, that is, '
  - type: note
    content: Is. 57:19; Hos. 14:2
  - type: text
    content: 'the fruit of '
  - type: text
    content: our
  - type: text
    content: ' lips, giving thanks to His name. '
  '16':
  - type: note
    content: Rom. 12:13
  - type: text
    content: 'But do not forget to do good and to share, for '
  - type: note
    content: 2 Cor. 9:12; Phil. 4:18
  - type: text
    content: with such sacrifices God is well pleased.
  '17':
  - type: note
    content: Phil. 2:29
  - type: text
    content: 'Obey those who rule over you, and be submissive, for '
  - type: note
    content: Is. 62:6; Ezek. 3:17; Acts 20:28
  - type: text
    content: they watch out for your souls, as those who must give account. Let them do so with joy and not with grief, for that would be unprofitable for you.
  - type: heading
    content: Prayer Requested
  '18':
  - type: note
    content: Eph. 6:19
  - type: text
    content: 'Pray for us; for we are confident that we have '
  - type: note
    content: Acts 23:1
  - type: text
    content: 'a good conscience, in all things desiring to live honorably. '
  '19':
  - type: text
    content: 'But I especially urge '
  - type: text
    content: you
  - type: text
    content: ' to do this, that I may be restored to you the sooner.'
  - type: heading
    content: Benediction, Final Exhortation, Farewell
  '2':
  - type: note
    content: Matt. 25:35; Rom. 12:13
  - type: text
    content: 'Do not forget to entertain strangers, for by so '
  - type: text
    content: doing
  - type: text
    content: ' '
  - type: note
    content: Gen. 18:1–22; 19:1
  - type: text
    content: 'some have unwittingly entertained angels. '
  '20':
  - type: text
    content: 'Now may '
  - type: note
    content: Rom. 5:1, 2, 10; 15:33
  - type: text
    content: 'the God of peace '
  - type: note
    content: Ps. 16:10, 11; Hos. 6:2; Rom. 4:24
  - type: text
    content: 'who brought up our Lord Jesus from the dead, '
  - type: note
    content: Ps. 23:1; Is. 40:11; 63:11; John 10:11; 1 Pet. 2:25; 5:4
  - type: text
    content: 'that great Shepherd of the sheep, '
  - type: note
    content: Zech. 9:11; Heb. 10:29
  - type: text
    content: 'through the blood of the everlasting covenant, '
  '21':
  - type: text
    content: 'make you complete in every good work to do His will, '
  - type: note
    content: Phil. 2:13
  - type: text
    content: 'working in you what is well pleasing in His sight, through Jesus Christ, to whom '
  - type: text
    content: be
  - type: text
    content: ' glory forever and ever. Amen.'
  '22':
  - type: text
    content: 'And I appeal to you, brethren, bear with the word of exhortation, for I have written to you in few words. '
  '23':
  - type: text
    content: 'Know that '
  - type: text
    content: our
  - type: text
    content: ' brother Timothy has been set free, with whom I shall see you if he comes shortly.'
  '24':
  - type: text
    content: Greet all those who rule over you, and all the saints. Those from Italy greet you.
  '25':
  - type: text
    content: 'Grace '
  - type: text
    content: be
  - type: text
    content: ' with you all. Amen.'
  '3':
  - type: note
    content: Matt. 25:36; Heb. 10:34
  - type: text
    content: Remember the prisoners as if chained with them—those who are mistreated—since you yourselves are in the body also.
  '4':
  - type: note
    content: Prov. 5:18, 19
  - type: text
    content: 'Marriage '
  - type: text
    content: is
  - type: text
    content: ' honorable among all, and the bed undefiled; '
  - type: note
    content: 1 Cor. 6:9; Gal. 5:19, 21; 1 Thess. 4:6
  - type: text
    content: but fornicators and adulterers God will judge.
  '5':
  - type: text
    content: Let
  - type: text
    content: ' '
  - type: text
    content: your
  - type: text
    content: ' conduct '
  - type: text
    content: be
  - type: text
    content: ' without covetousness; '
  - type: text
    content: be
  - type: text
    content: ' content with such things as you have. For He Himself has said, '
  - type: note
    content: Gen. 28:15; Deut. 31:6, 8; Josh. 1:5
  - type: text
    content: '“I will never leave you nor forsake you.” '
  '6':
  - type: text
    content: 'So we may boldly say:'
  - type: note
    content: Ps. 27:1; 118:6
  - type: text
    content: '“The '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' my helper;'
  - type: text
    content: I will not fear.
  - type: text
    content: What can man do to me?”
  - type: heading
    content: Concluding Religious Directions
  '7':
  - type: text
    content: 'Remember those who rule over you, who have spoken the word of God to you, whose faith follow, considering the outcome of '
  - type: text
    content: their
  - type: text
    content: ' conduct. '
  '8':
  - type: text
    content: 'Jesus Christ '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: (John 8:58); 2 Cor. 1:19; Heb. 1:12
  - type: text
    content: 'the same yesterday, today, and forever. '
  '9':
  - type: text
    content: 'Do not be carried about with various and strange doctrines. For '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' good that the heart be established by grace, not with foods which have not profited those who have been occupied with them.'
