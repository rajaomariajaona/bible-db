document_id: HEB.12,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Race of Faith
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore we also, since we are surrounded by so great a cloud of witnesses, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 3:8
      marker-yv: yv-n
    - type: text
      text: 'let us lay aside every weight, and the sin which so easily ensnares '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us,
    - type: text
      text: ' and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 9:24; Gal. 2:2; Heb. 10:39
      marker-yv: yv-n
    - type: text
      text: 'let us run '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:12; Heb. 10:36
      marker-yv: yv-n
    - type: text
      text: 'with endurance the race that is set before us, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For they indeed for a few days chastened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us
    - type: text
      text: ' as seemed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: best
    - type: text
      text: ' to them, but He for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' profit, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:44
      marker-yv: yv-n
    - type: text
      text: 'that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we
    - type: text
      text: ' may be partakers of His holiness. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now no chastening seems to be joyful for the present, but painful; nevertheless, afterward it yields '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 32:17; 2 Tim. 4:8; James 3:17, 18
      marker-yv: yv-n
    - type: text
      text: the peaceable fruit of righteousness to those who have been trained by it.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Renew Your Spiritual Vitality
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 35:3
      marker-yv: yv-n
    - type: text
      text: 'strengthen the hands which hang down, and the feeble knees, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and make straight paths for your feet, so that what is lame may not be dislocated, but rather be healed.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 34:14
      marker-yv: yv-n
    - type: text
      text: 'Pursue peace with all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people,
    - type: text
      text: ' and holiness, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 5:8; (Heb. 9:28)
      marker-yv: yv-n
    - type: text
      text: 'without which no one will see the Lord: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'looking carefully lest anyone '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 6:1; Gal. 5:4; Heb. 4:1
      marker-yv: yv-n
    - type: text
      text: 'fall short of the grace of God; lest any '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 29:18
      marker-yv: yv-n
    - type: text
      text: 'root of bitterness springing up cause trouble, and by this many become defiled; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lest there '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' any '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 6:13–18)
      marker-yv: yv-n
    - type: text
      text: 'fornicator or profane person like Esau, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 25:33
      marker-yv: yv-n
    - type: text
      text: 'who for one morsel of food sold his birthright. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you know that afterward, when he wanted to inherit the blessing, he was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 27:30–40
      marker-yv: yv-n
    - type: text
      text: rejected, for he found no place for repentance, though he sought it diligently with tears.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Glorious Company
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you have not come to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:12, 16; 20:18; Deut. 4:11; 5:22
      marker-yv: yv-n
    - type: text
      text: 'the mountain that may be touched and that burned with fire, and to blackness and darkness and tempest, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the sound of a trumpet and the voice of words, so that those who heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:18–26; Deut. 5:25; 18:16
      marker-yv: yv-n
    - type: text
      text: 'begged that the word should not be spoken to them anymore. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'looking unto Jesus, the author and finisher of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' faith, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:26
      marker-yv: yv-n
    - type: text
      text: 'who for the joy that was set before Him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 69:7, 19; Phil. 2:8; (Heb. 2:9)
      marker-yv: yv-n
    - type: text
      text: 'endured the cross, despising the shame, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 110:1
      marker-yv: yv-n
    - type: text
      text: has sat down at the right hand of the throne of God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Discipline of God
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(For they could not endure what was commanded: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:12, 13
      marker-yv: yv-n
    - type: text
      text: '“And if so much as a beast touches the mountain, it shall be stoned or shot with an arrow.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so terrifying was the sight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' Moses said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 9:19
      marker-yv: yv-n
    - type: text
      text: “I am exceedingly afraid and trembling.”)
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you have come to Mount Zion and to the city of the living God, the heavenly Jerusalem, to an innumerable company of angels, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to the general assembly and church of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (James 1:18)
      marker-yv: yv-n
    - type: text
      text: 'the firstborn '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 10:20
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' registered in heaven, to God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 18:25; Ps. 50:6; 94:2
      marker-yv: yv-n
    - type: text
      text: 'the Judge of all, to the spirits of just men '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Phil. 3:12)
      marker-yv: yv-n
    - type: text
      text: 'made perfect, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to Jesus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 2:5; Heb. 8:6; 9:15
      marker-yv: yv-n
    - type: text
      text: 'the Mediator of the new covenant, and to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 24:8
      marker-yv: yv-n
    - type: text
      text: 'the blood of sprinkling that speaks better things '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 4:10; Heb. 11:4
      marker-yv: yv-n
    - type: text
      text: 'than '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' Abel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hear the Heavenly Voice
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See that you do not refuse Him who speaks. For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 2:2, 3
      marker-yv: yv-n
    - type: text
      text: 'if they did not escape who refused Him who spoke on earth, much more '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: not
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: escape
    - type: text
      text: ' if we turn away from Him who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: speaks
    - type: text
      text: ' from heaven, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whose voice then shook the earth; but now He has promised, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hag. 2:6
      marker-yv: yv-n
    - type: text
      text: '“Yet once more I shake not only the earth, but also heaven.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now this, “Yet once more,” indicates the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 34:4; 54:10; 65:17; Rom. 8:19, 21); 1 Cor. 7:31; Heb. 1:10
      marker-yv: yv-n
    - type: text
      text: removal of those things that are being shaken, as of things that are made, that the things which cannot be shaken may remain.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, since we are receiving a kingdom which cannot be shaken, let us have grace, by which we may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 13:15, 21
      marker-yv: yv-n
    - type: text
      text: 'serve God acceptably with reverence and godly fear. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 24:17
      marker-yv: yv-n
    - type: text
      text: 'our God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a consuming fire.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:24
      marker-yv: yv-n
    - type: text
      text: 'For consider Him who endured such hostility from sinners against Himself, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 6:9; Heb. 12:5
      marker-yv: yv-n
    - type: text
      text: 'lest you become weary and discouraged in your souls. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 10:13)
      marker-yv: yv-n
    - type: text
      text: 'You have not yet resisted to bloodshed, striving against sin. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you have forgotten the exhortation which speaks to you as to sons:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:17; Prov. 3:11, 12
      marker-yv: yv-n
    - type: text
      text: '“My son, do not despise the chastening of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor be discouraged when you are rebuked by Him;
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 94:12; Rev. 3:19
      marker-yv: yv-n
    - type: text
      text: 'whom the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' loves He chastens,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And scourges every son whom He receives.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 8:5; 2 Sam. 7:14
      marker-yv: yv-n
    - type: text
      text: 'If you endure chastening, God deals with you as with sons; for what '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 13:24; 19:18; 23:13
      marker-yv: yv-n
    - type: text
      text: 'son is there whom a father does not chasten? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if you are without chastening, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Pet. 5:9
      marker-yv: yv-n
    - type: text
      text: 'of which all have become partakers, then you are illegitimate and not sons. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Furthermore, we have had human fathers who corrected '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us,
    - type: text
      text: ' and we paid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' respect. Shall we not much more readily be in subjection to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 12:10)
      marker-yv: yv-n
    - type: text
      text: 'the Father of spirits and live? '
