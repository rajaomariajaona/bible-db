document_id: PSA.59,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Assured Judgment of the Wicked
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. Set to “Do Not Destroy.” A Michtam of David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 19:11
      marker-yv: yv-n
    - type: text
      text: when Saul sent men, and they watched the house in order to kill him.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Deliver me from my enemies, O my God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Defend me from those who rise up against me.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'My God of mercy shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 21:3
      marker-yv: yv-n
    - type: text
      text: come to meet me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'God shall let '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 54:7
      marker-yv: yv-n
    - type: text
      text: 'me see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: desire
    - type: text
      text: ' on my enemies.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Do not slay them, lest my people forget;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Scatter them by Your power,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And bring them down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O Lord our shield.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 12:13
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: For
    - type: text
      text: ' the sin of their mouth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the words of their lips,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them even be taken in their pride,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And for the cursing and lying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' they speak.'
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 104:35
      marker-yv: yv-n
    - type: text
      text: 'Consume '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' in wrath, consume '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: may
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 83:18
      marker-yv: yv-n
    - type: text
      text: let them know that God rules in Jacob
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To the ends of the earth.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 59:6
      marker-yv: yv-n
    - type: text
      text: at evening they return,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They growl like a dog,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And go all around the city.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'They '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 15:23
      marker-yv: yv-n
    - type: text
      text: wander up and down for food,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And howl if they are not satisfied.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But I will sing of Your power;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, I will sing aloud of Your mercy in the morning;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For You have been my defense
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And refuge in the day of my trouble.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'To You, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 18:1
      marker-yv: yv-n
    - type: text
      text: O my Strength, I will sing praises;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my defense,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My God of mercy.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Deliver me from the workers of iniquity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And save me from bloodthirsty men.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For look, they lie in wait for my life;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 56:6
      marker-yv: yv-n
    - type: text
      text: The mighty gather against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' my transgression nor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' my sin, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They run and prepare themselves through no fault '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mine.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 35:23
      marker-yv: yv-n
    - type: text
      text: Awake to help me, and behold!
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'You therefore, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of hosts, the God of Israel,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Awake to punish all the nations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not be merciful to any wicked transgressors.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 59:14
      marker-yv: yv-n
    - type: text
      text: At evening they return,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They growl like a dog,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And go all around the city.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Indeed, they belch with their mouth;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 57:4; Prov. 12:18
      marker-yv: yv-n
    - type: text
      text: 'Swords '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in their lips;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: say,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 22:13; Ps. 10:11
      marker-yv: yv-n
    - type: text
      text: “Who hears?”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 1:26
      marker-yv: yv-n
    - type: text
      text: 'You, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', shall laugh at them;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You shall have all the nations in derision.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I will wait for You, O You his Strength;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 62:2)
      marker-yv: yv-n
    - type: text
      text: 'For God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my defense.'
