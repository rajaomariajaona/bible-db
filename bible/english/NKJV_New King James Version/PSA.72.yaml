  children:
  - type: text
    text: Glory and Universality of the Messiah’s Reign
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Psalm
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 127:title
    marker-yv: yv-n
  - type: text
    text: of Solomon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Give the king Your judgments, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And Your righteousness to the king’s Son.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 9:7; 11:2–5; 32:1)
    marker-yv: yv-n
  - type: text
    text: He will judge Your people with righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And Your poor with justice.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 85:10
    marker-yv: yv-n
  - type: text
    text: The mountains will bring peace to the people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the little hills, by righteousness.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 11:4
    marker-yv: yv-n
  - type: text
    text: He will bring justice to the poor of the people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will save the children of the needy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And will break in pieces the oppressor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They shall fear You
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 72:7, 17; 89:36
    marker-yv: yv-n
  - type: text
    text: As long as the sun and moon endure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Throughout all generations.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 32:2; 2 Sam. 23:4; Hos. 6:3
    marker-yv: yv-n
  - type: text
    text: He shall come down like rain upon the grass before mowing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Like showers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' water the earth.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: In His days the righteous shall flourish,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 2:4
    marker-yv: yv-n
  - type: text
    text: And abundance of peace,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Until the moon is no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:31; (Is. 9:6; Zech. 9:10)
    marker-yv: yv-n
  - type: text
    text: He shall have dominion also from sea to sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And from the River to the ends of the earth.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 74:14; Is. 23:13
    marker-yv: yv-n
  - type: text
    text: Those who dwell in the wilderness will bow before Him,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 49:23; Mic. 7:17
    marker-yv: yv-n
  - type: text
    text: And His enemies will lick the dust.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 10:2; 2 Chr. 9:21
    marker-yv: yv-n
  - type: text
    text: The kings of Tarshish and of the isles
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will bring presents;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The kings of Sheba and Seba
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will offer gifts.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 49:23
    marker-yv: yv-n
  - type: text
    text: Yes, all kings shall fall down before Him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: All nations shall serve Him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For He '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 29:12
    marker-yv: yv-n
  - type: text
    text: will deliver the needy when he cries,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The poor also, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' who has no helper.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He will spare the poor and needy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And will save the souls of the needy.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He will redeem their life from oppression and violence;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 26:21; (Ps. 116:15)
    marker-yv: yv-n
  - type: text
    text: precious shall be their blood in His sight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And He shall live;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the gold of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 60:6
    marker-yv: yv-n
  - type: text
    text: Sheba will be given to Him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Prayer also will be made for Him continually,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: And
  - type: text
    text: ' daily He shall be praised.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: There will be an abundance of grain in the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: On the top of the mountains;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Its fruit shall wave like Lebanon;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 4:20
    marker-yv: yv-n
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: those
  - type: text
    text: ' of the city shall flourish like grass of the earth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 89:36)
    marker-yv: yv-n
  - type: text
    text: His name shall endure forever;
- type: usfm
  marker: q2
  children:
  - type: text
    text: His name shall continue as long as the sun.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Gen. 12:3)
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: men
  - type: text
    text: ' shall be blessed in Him;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 1:48
    marker-yv: yv-n
  - type: text
    text: All nations shall call Him blessed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 29:10
    marker-yv: yv-n
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God, the God of Israel,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 15:11; Job 5:9
    marker-yv: yv-n
  - type: text
    text: Who only does wondrous things!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Neh. 9:5)
    marker-yv: yv-n
  - type: text
    text: 'blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' His glorious name forever!'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 14:21; Hab. 2:14
    marker-yv: yv-n
  - type: text
    text: 'And let the whole earth be filled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' His glory.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Amen and Amen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The prayers of David the son of Jesse are ended.
