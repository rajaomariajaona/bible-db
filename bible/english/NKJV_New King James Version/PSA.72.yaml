  '2':
  - type: note
    content: (Is. 9:7; 11:2–5; 32:1)
  - type: text
    content: He will judge Your people with righteousness,
  - type: text
    content: And Your poor with justice.
  '20':
  - type: text
    content: The prayers of David the son of Jesse are ended.
  '3':
  - type: note
    content: Ps. 85:10
  - type: text
    content: The mountains will bring peace to the people,
  - type: text
    content: And the little hills, by righteousness.
  '4':
  - type: note
    content: Is. 11:4
  - type: text
    content: He will bring justice to the poor of the people;
  - type: text
    content: He will save the children of the needy,
  - type: text
    content: And will break in pieces the oppressor.
  '5':
  - type: text
    content: They shall fear You
  - type: note
    content: Ps. 72:7, 17; 89:36
  - type: text
    content: As long as the sun and moon endure,
  - type: text
    content: Throughout all generations.
  '6':
  - type: note
    content: Deut. 32:2; 2 Sam. 23:4; Hos. 6:3
  - type: text
    content: He shall come down like rain upon the grass before mowing,
  - type: text
    content: 'Like showers '
  - type: text
    content: that
  - type: text
    content: ' water the earth.'
  '7':
  - type: text
    content: In His days the righteous shall flourish,
  - type: note
    content: Is. 2:4
  - type: text
    content: And abundance of peace,
  - type: text
    content: Until the moon is no more.
  '8':
  - type: note
    content: Ex. 23:31; (Is. 9:6; Zech. 9:10)
  - type: text
    content: He shall have dominion also from sea to sea,
  - type: text
    content: And from the River to the ends of the earth.
  '9':
  - type: note
    content: Ps. 74:14; Is. 23:13
  - type: text
    content: Those who dwell in the wilderness will bow before Him,
  - type: note
    content: Is. 49:23; Mic. 7:17
  - type: text
    content: And His enemies will lick the dust.
