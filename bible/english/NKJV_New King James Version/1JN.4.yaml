document_id: 1JN.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Beloved, do not believe every spirit, but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 14:29
    marker-yv: yv-n
  - type: text
    text: 'test the spirits, whether they are of God; because '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 24:5
    marker-yv: yv-n
  - type: text
    text: 'many false prophets have gone out into the world. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'By this you know the Spirit of God: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 10:8–10); 1 Cor. 12:3; 1 John 5:1
    marker-yv: yv-n
  - type: text
    text: 'Every spirit that confesses that Jesus Christ has come in the flesh is of God, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and every spirit that does not confess that Jesus Christ has come in the flesh is not of God. And this is the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: spirit
  - type: text
    text: ' of the Antichrist, which you have heard was coming, and is now already in the world.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'You are of God, little children, and have overcome them, because He who is in you is greater than '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 14:30; 16:11
    marker-yv: yv-n
  - type: text
    text: 'he who is in the world. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 3:31
    marker-yv: yv-n
  - type: text
    text: 'They are of the world. Therefore they speak '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' of the world, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 15:19; 17:14
    marker-yv: yv-n
  - type: text
    text: 'the world hears them. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'We are of God. He who knows God hears us; he who is not of God does not hear us. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 2:12–16)
    marker-yv: yv-n
  - type: text
    text: By this we know the spirit of truth and the spirit of error.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Knowing God Through Love
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 John 3:10, 11, 23
    marker-yv: yv-n
  - type: text
    text: 'Beloved, let us love one another, for love is of God; and everyone who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 4:9; (1 John 3:14)
    marker-yv: yv-n
  - type: text
    text: 'loves is born of God and knows God. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He who does not love does not know God, for God is love. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 5:8
    marker-yv: yv-n
  - type: text
    text: 'In this the love of God was manifested toward us, that God has sent His only begotten '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 9:6, 7; John 3:16
    marker-yv: yv-n
  - type: text
    text: 'Son into the world, that we might live through Him. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In this is love, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Titus 3:5
    marker-yv: yv-n
  - type: text
    text: 'not that we loved God, but that He loved us and sent His Son '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 John 2:2
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' the propitiation for our sins. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Beloved, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 18:33
    marker-yv: yv-n
  - type: text
    text: if God so loved us, we also ought to love one another.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Seeing God Through Love
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 1:18; 1 Tim. 6:16; 1 John 4:20
    marker-yv: yv-n
  - type: text
    text: 'No one has seen God at any time. If we love one another, God abides in us, and His love has been perfected in us. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 14:20
    marker-yv: yv-n
  - type: text
    text: 'By this we know that we abide in Him, and He in us, because He has given us of His Spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 1:14
    marker-yv: yv-n
  - type: text
    text: 'we have seen and testify that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 3:17; 4:42; 1 John 2:2
    marker-yv: yv-n
  - type: text
    text: 'the Father has sent the Son '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' Savior of the world. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 10:9); 1 John 3:23; 4:2; 5:1, 5
    marker-yv: yv-n
  - type: text
    text: 'Whoever confesses that Jesus is the Son of God, God abides in him, and he in God. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And we have known and believed the love that God has for us. God is love, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 John 3:24)
    marker-yv: yv-n
  - type: text
    text: 'he who abides in love abides in God, and God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 14:23)
    marker-yv: yv-n
  - type: text
    text: in him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Consummation of Love
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Love has been perfected among us in this: that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (James 2:13); 1 John 2:28
    marker-yv: yv-n
  - type: text
    text: 'we may have boldness in the day of judgment; because as He is, so are we in this world. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'There is no fear in love; but perfect love casts out fear, because fear involves torment. But he who fears has not been made perfect in love. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 John 4:10
    marker-yv: yv-n
  - type: text
    text: We love Him because He first loved us.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Obedience by Faith
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 John 2:4)
    marker-yv: yv-n
  - type: text
    text: 'If someone says, “I love God,” and hates his brother, he is a liar; for he who does not love his brother whom he has seen, how can he love God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Pet. 1:8; 1 John 4:12
    marker-yv: yv-n
  - type: text
    text: 'whom he has not seen? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 19:18; (Matt. 5:43, 44; 22:39); John 13:34
    marker-yv: yv-n
  - type: text
    text: 'this commandment we have from Him: that he who loves God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: must
  - type: text
    text: ' love his brother also.'
