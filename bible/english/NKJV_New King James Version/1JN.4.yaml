document_id: 1JN.4,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'Beloved, do not believe every spirit, but '
  - type: note
    content: 1 Cor. 14:29
  - type: text
    content: 'test the spirits, whether they are of God; because '
  - type: note
    content: Matt. 24:5
  - type: text
    content: 'many false prophets have gone out into the world. '
  '10':
  - type: text
    content: 'In this is love, '
  - type: note
    content: Titus 3:5
  - type: text
    content: 'not that we loved God, but that He loved us and sent His Son '
  - type: note
    content: 1 John 2:2
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' the propitiation for our sins. '
  '11':
  - type: text
    content: 'Beloved, '
  - type: note
    content: Matt. 18:33
  - type: text
    content: if God so loved us, we also ought to love one another.
  - type: heading
    content: Seeing God Through Love
  '12':
  - type: note
    content: John 1:18; 1 Tim. 6:16; 1 John 4:20
  - type: text
    content: 'No one has seen God at any time. If we love one another, God abides in us, and His love has been perfected in us. '
  '13':
  - type: note
    content: John 14:20
  - type: text
    content: 'By this we know that we abide in Him, and He in us, because He has given us of His Spirit. '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: John 1:14
  - type: text
    content: 'we have seen and testify that '
  - type: note
    content: John 3:17; 4:42; 1 John 2:2
  - type: text
    content: 'the Father has sent the Son '
  - type: text
    content: as
  - type: text
    content: ' Savior of the world. '
  '15':
  - type: note
    content: (Rom. 10:9); 1 John 3:23; 4:2; 5:1, 5
  - type: text
    content: 'Whoever confesses that Jesus is the Son of God, God abides in him, and he in God. '
  '16':
  - type: text
    content: 'And we have known and believed the love that God has for us. God is love, and '
  - type: note
    content: (1 John 3:24)
  - type: text
    content: 'he who abides in love abides in God, and God '
  - type: note
    content: (John 14:23)
  - type: text
    content: in him.
  - type: heading
    content: The Consummation of Love
  '17':
  - type: text
    content: 'Love has been perfected among us in this: that '
  - type: note
    content: (James 2:13); 1 John 2:28
  - type: text
    content: 'we may have boldness in the day of judgment; because as He is, so are we in this world. '
  '18':
  - type: text
    content: 'There is no fear in love; but perfect love casts out fear, because fear involves torment. But he who fears has not been made perfect in love. '
  '19':
  - type: note
    content: 1 John 4:10
  - type: text
    content: We love Him because He first loved us.
  - type: heading
    content: Obedience by Faith
  '2':
  - type: text
    content: 'By this you know the Spirit of God: '
  - type: note
    content: (Rom. 10:8–10); 1 Cor. 12:3; 1 John 5:1
  - type: text
    content: 'Every spirit that confesses that Jesus Christ has come in the flesh is of God, '
  '20':
  - type: note
    content: (1 John 2:4)
  - type: text
    content: 'If someone says, “I love God,” and hates his brother, he is a liar; for he who does not love his brother whom he has seen, how can he love God '
  - type: note
    content: 1 Pet. 1:8; 1 John 4:12
  - type: text
    content: 'whom he has not seen? '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: Lev. 19:18; (Matt. 5:43, 44; 22:39); John 13:34
  - type: text
    content: 'this commandment we have from Him: that he who loves God '
  - type: text
    content: must
  - type: text
    content: ' love his brother also.'
  '3':
  - type: text
    content: 'and every spirit that does not confess that Jesus Christ has come in the flesh is not of God. And this is the '
  - type: text
    content: spirit
  - type: text
    content: ' of the Antichrist, which you have heard was coming, and is now already in the world.'
  '4':
  - type: text
    content: 'You are of God, little children, and have overcome them, because He who is in you is greater than '
  - type: note
    content: John 14:30; 16:11
  - type: text
    content: 'he who is in the world. '
  '5':
  - type: note
    content: John 3:31
  - type: text
    content: 'They are of the world. Therefore they speak '
  - type: text
    content: as
  - type: text
    content: ' of the world, and '
  - type: note
    content: John 15:19; 17:14
  - type: text
    content: 'the world hears them. '
  '6':
  - type: text
    content: 'We are of God. He who knows God hears us; he who is not of God does not hear us. '
  - type: note
    content: (1 Cor. 2:12–16)
  - type: text
    content: By this we know the spirit of truth and the spirit of error.
  - type: heading
    content: Knowing God Through Love
  '7':
  - type: note
    content: 1 John 3:10, 11, 23
  - type: text
    content: 'Beloved, let us love one another, for love is of God; and everyone who '
  - type: note
    content: 1 Thess. 4:9; (1 John 3:14)
  - type: text
    content: 'loves is born of God and knows God. '
  '8':
  - type: text
    content: 'He who does not love does not know God, for God is love. '
  '9':
  - type: note
    content: Rom. 5:8
  - type: text
    content: 'In this the love of God was manifested toward us, that God has sent His only begotten '
  - type: note
    content: Is. 9:6, 7; John 3:16
  - type: text
    content: 'Son into the world, that we might live through Him. '
