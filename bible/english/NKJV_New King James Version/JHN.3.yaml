document_id: JHN.3,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The New Birth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'There was a man of the Pharisees named Nicodemus, a ruler of the Jews. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jesus answered and said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Are you the teacher of Israel, and do not know these things?
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 11:27)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Most assuredly, I say to you, We speak what We know and testify what We have seen, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 3:32; 8:14
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: you do not receive Our witness.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If I have told you earthly things and you do not believe, how will you believe if I tell you heavenly things?
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 30:12; Prov. 30:4; Acts 2:34; Rom. 10:6; 1 Cor. 15:47; Eph. 4:9
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'No one has ascended to heaven but He who came down from heaven, '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: that is,
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' the Son of Man '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: who is in heaven.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:9
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And as Moses lifted up the serpent in the wilderness, even so '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:35; Mark 15:24; Luke 23:33; John 8:28; 12:34; 19:18
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: must the Son of Man be lifted up,
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'that whoever '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 6:47
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'believes in Him should '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: not perish but
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 3:36
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: have eternal life.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 5:8; Eph. 2:4; 2 Thess. 2:16; (1 John 4:9, 10; Rev. 1:5)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For God so loved the world that He gave His only begotten '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 9:6)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Son, that whoever believes in Him should not perish but have everlasting life.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 1:21; Luke 9:56; 1 John 4:14
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For God did not send His Son into the world to condemn the world, but that the world through Him might be saved.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 5:24; 6:40, 47; 20:31; Rom. 8:1
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “He who believes in Him is not condemned; but he who does not believe is condemned already, because he has not believed in the name of the only begotten Son of God.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And this is the condemnation, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 1:4, 9–11)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that the light has come into the world, and men loved darkness rather than light, because their deeds were evil.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 7:50; 19:39
      marker-yv: yv-n
    - type: text
      text: 'This man came to Jesus by night and said to Him, “Rabbi, we know that You are a teacher come from God; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 9:16, 33; Acts 2:22
      marker-yv: yv-n
    - type: text
      text: 'no one can do these signs that You do unless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 10:38)
      marker-yv: yv-n
    - type: text
      text: God is with him.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 24:13; Eph. 5:11, 13
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: everyone practicing evil hates the light and does not come to the light, lest his deeds should be exposed.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But he who does the truth comes to the light, that his deeds may be clearly seen, that they have been '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 15:4, 5); 1 Cor. 15:10
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: done in God.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: John the Baptist Exalts Christ
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'After these things Jesus and His disciples came into the land of Judea, and there He remained with them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 4:1, 2
      marker-yv: yv-n
    - type: text
      text: 'and baptized. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Now John also was baptizing in Aenon near '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 9:4
      marker-yv: yv-n
    - type: text
      text: 'Salim, because there was much water there. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 3:5, 6
      marker-yv: yv-n
    - type: text
      text: 'And they came and were baptized. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 4:12; 14:3; Mark 6:17; Luke 3:20
      marker-yv: yv-n
    - type: text
      text: John had not yet been thrown into prison.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then there arose a dispute between '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of John’s disciples and the Jews about purification. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And they came to John and said to him, “Rabbi, He who was with you beyond the Jordan, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 1:7, 15, 27, 34
      marker-yv: yv-n
    - type: text
      text: 'to whom you have testified—behold, He is baptizing, and all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 2:2; 3:10; 5:24; Luke 8:19
      marker-yv: yv-n
    - type: text
      text: are coming to Him!”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'John answered and said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 12:5–8); 1 Cor. 3:5, 6; 4:7; Heb. 5:4; (James 1:17; 1 Pet. 4:10, 11)
      marker-yv: yv-n
    - type: text
      text: '“A man can receive nothing unless it has been given to him from heaven. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'You yourselves bear me witness, that I said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 1:19–27
      marker-yv: yv-n
    - type: text
      text: '‘I am not the Christ,’ but, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 3:1; Mark 1:2; (Luke 1:17)
      marker-yv: yv-n
    - type: text
      text: '‘I have been sent before Him.’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 22:2; (2 Cor. 11:2; Eph. 5:25, 27); Rev. 21:9
      marker-yv: yv-n
    - type: text
      text: 'He who has the bride is the bridegroom; but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Song 5:1
      marker-yv: yv-n
    - type: text
      text: 'the friend of the bridegroom, who stands and hears him, rejoices greatly because of the bridegroom’s voice. Therefore this joy of mine is fulfilled. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jesus answered and said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Most assuredly, I say to you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 1:13; Gal. 6:15; Titus 3:5; James 1:18; 1 Pet. 1:23; 1 John 3:9)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'unless one is born '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: again, he cannot see the kingdom of God.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 9:7)
      marker-yv: yv-n
    - type: text
      text: 'He must increase, but I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: must
    - type: text
      text: ' decrease. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 3:13; 8:23
      marker-yv: yv-n
    - type: text
      text: 'He who comes from above '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 28:18; John 1:15, 27; 13:13; Rom. 9:5; (Col. 1:17, 18)
      marker-yv: yv-n
    - type: text
      text: 'is above all; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:47
      marker-yv: yv-n
    - type: text
      text: 'he who is of the earth is earthly and speaks of the earth. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 6:33; 1 Cor. 15:47; Eph. 1:21; Phil. 2:9
      marker-yv: yv-n
    - type: text
      text: 'He who comes from heaven is above all. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 53:1, 3; John 3:11; 15:15
      marker-yv: yv-n
    - type: text
      text: 'what He has seen and heard, that He testifies; and no one receives His testimony. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'He who has received His testimony '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 3:4; 1 John 5:10
      marker-yv: yv-n
    - type: text
      text: 'has certified that God is true. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 18:18; John 7:16
      marker-yv: yv-n
    - type: text
      text: 'For He whom God has sent speaks the words of God, for God does not give the Spirit '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 1:16
      marker-yv: yv-n
    - type: text
      text: 'by measure. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 11:27; Luke 10:22; John 5:20; (Heb. 2:8)
      marker-yv: yv-n
    - type: text
      text: 'The Father loves the Son, and has given all things into His hand. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 3:16, 17; 6:47; Rom. 1:17; 1 John 5:10
      marker-yv: yv-n
    - type: text
      text: 'He who believes in the Son has everlasting life; and he who does not believe the Son shall not see life, but the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:18; Eph. 5:6; 1 Thess. 1:10
      marker-yv: yv-n
    - type: text
      text: wrath of God abides on him.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nicodemus said to Him, “How can a man be born when he is old? Can he enter a second time into his mother’s womb and be born?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Most assuredly, I say to you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:16; (Acts 2:38)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: unless one is born of water and the Spirit, he cannot enter the kingdom of God.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'That which is born of the flesh is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 1:13; 1 Cor. 15:50
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: flesh, and that which is born of the Spirit is spirit.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do not marvel that I said to you, ‘You must be born again.’
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 135:7; Eccl. 11:5; Ezek. 37:9; 1 Cor. 2:11
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The wind blows where it wishes, and you hear the sound of it, but cannot tell where it comes from and where it goes. So is everyone who is born of the Spirit.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nicodemus answered and said to Him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 6:52, 60
      marker-yv: yv-n
    - type: text
      text: “How can these things be?”
