document_id: JHN.3,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The New Birth
  - type: text
    content: 'There was a man of the Pharisees named Nicodemus, a ruler of the Jews. '
  '10':
  - type: text
    content: 'Jesus answered and said to him, '
  - type: text
    content: “Are you the teacher of Israel, and do not know these things?
  - type: text
    content: ' '
  '11':
  - type: note
    content: (Matt. 11:27)
  - type: text
    content: 'Most assuredly, I say to you, We speak what We know and testify what We have seen, and '
  - type: note
    content: John 3:32; 8:14
  - type: text
    content: you do not receive Our witness.
  - type: text
    content: ' '
  '12':
  - type: text
    content: If I have told you earthly things and you do not believe, how will you believe if I tell you heavenly things?
  - type: text
    content: ' '
  '13':
  - type: note
    content: Deut. 30:12; Prov. 30:4; Acts 2:34; Rom. 10:6; 1 Cor. 15:47; Eph. 4:9
  - type: text
    content: 'No one has ascended to heaven but He who came down from heaven, '
  - type: text
    content: that is,
  - type: text
    content: ' the Son of Man '
  - type: text
    content: who is in heaven.
  - type: text
    content: ' '
  '14':
  - type: note
    content: Num. 21:9
  - type: text
    content: 'And as Moses lifted up the serpent in the wilderness, even so '
  - type: note
    content: Matt. 27:35; Mark 15:24; Luke 23:33; John 8:28; 12:34; 19:18
  - type: text
    content: must the Son of Man be lifted up,
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'that whoever '
  - type: note
    content: John 6:47
  - type: text
    content: 'believes in Him should '
  - type: text
    content: not perish but
  - type: text
    content: ' '
  - type: note
    content: John 3:36
  - type: text
    content: have eternal life.
  - type: text
    content: ' '
  '16':
  - type: note
    content: Rom. 5:8; Eph. 2:4; 2 Thess. 2:16; (1 John 4:9, 10; Rev. 1:5)
  - type: text
    content: 'For God so loved the world that He gave His only begotten '
  - type: note
    content: (Is. 9:6)
  - type: text
    content: Son, that whoever believes in Him should not perish but have everlasting life.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Matt. 1:21; Luke 9:56; 1 John 4:14
  - type: text
    content: For God did not send His Son into the world to condemn the world, but that the world through Him might be saved.
  '18':
  - type: note
    content: John 5:24; 6:40, 47; 20:31; Rom. 8:1
  - type: text
    content: “He who believes in Him is not condemned; but he who does not believe is condemned already, because he has not believed in the name of the only begotten Son of God.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And this is the condemnation, '
  - type: note
    content: (John 1:4, 9–11)
  - type: text
    content: that the light has come into the world, and men loved darkness rather than light, because their deeds were evil.
  - type: text
    content: ' '
  '2':
  - type: note
    content: John 7:50; 19:39
  - type: text
    content: 'This man came to Jesus by night and said to Him, “Rabbi, we know that You are a teacher come from God; for '
  - type: note
    content: John 9:16, 33; Acts 2:22
  - type: text
    content: 'no one can do these signs that You do unless '
  - type: note
    content: (Acts 10:38)
  - type: text
    content: God is with him.”
  '20':
  - type: text
    content: 'For '
  - type: note
    content: Job 24:13; Eph. 5:11, 13
  - type: text
    content: everyone practicing evil hates the light and does not come to the light, lest his deeds should be exposed.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'But he who does the truth comes to the light, that his deeds may be clearly seen, that they have been '
  - type: note
    content: (John 15:4, 5); 1 Cor. 15:10
  - type: text
    content: done in God.”
  - type: heading
    content: John the Baptist Exalts Christ
  '22':
  - type: text
    content: 'After these things Jesus and His disciples came into the land of Judea, and there He remained with them '
  - type: note
    content: John 4:1, 2
  - type: text
    content: 'and baptized. '
  '23':
  - type: text
    content: 'Now John also was baptizing in Aenon near '
  - type: note
    content: 1 Sam. 9:4
  - type: text
    content: 'Salim, because there was much water there. '
  - type: note
    content: Matt. 3:5, 6
  - type: text
    content: 'And they came and were baptized. '
  '24':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 4:12; 14:3; Mark 6:17; Luke 3:20
  - type: text
    content: John had not yet been thrown into prison.
  '25':
  - type: text
    content: 'Then there arose a dispute between '
  - type: text
    content: some
  - type: text
    content: ' of John’s disciples and the Jews about purification. '
  '26':
  - type: text
    content: 'And they came to John and said to him, “Rabbi, He who was with you beyond the Jordan, '
  - type: note
    content: John 1:7, 15, 27, 34
  - type: text
    content: 'to whom you have testified—behold, He is baptizing, and all '
  - type: note
    content: Mark 2:2; 3:10; 5:24; Luke 8:19
  - type: text
    content: are coming to Him!”
  '27':
  - type: text
    content: 'John answered and said, '
  - type: note
    content: (Rom. 12:5–8); 1 Cor. 3:5, 6; 4:7; Heb. 5:4; (James 1:17; 1 Pet. 4:10, 11)
  - type: text
    content: '“A man can receive nothing unless it has been given to him from heaven. '
  '28':
  - type: text
    content: 'You yourselves bear me witness, that I said, '
  - type: note
    content: John 1:19–27
  - type: text
    content: '‘I am not the Christ,’ but, '
  - type: note
    content: Mal. 3:1; Mark 1:2; (Luke 1:17)
  - type: text
    content: '‘I have been sent before Him.’ '
  '29':
  - type: note
    content: Matt. 22:2; (2 Cor. 11:2; Eph. 5:25, 27); Rev. 21:9
  - type: text
    content: 'He who has the bride is the bridegroom; but '
  - type: note
    content: Song 5:1
  - type: text
    content: 'the friend of the bridegroom, who stands and hears him, rejoices greatly because of the bridegroom’s voice. Therefore this joy of mine is fulfilled. '
  '3':
  - type: text
    content: 'Jesus answered and said to him, '
  - type: text
    content: '“Most assuredly, I say to you, '
  - type: note
    content: (John 1:13; Gal. 6:15; Titus 3:5; James 1:18; 1 Pet. 1:23; 1 John 3:9)
  - type: text
    content: 'unless one is born '
  - type: text
    content: again, he cannot see the kingdom of God.”
  '30':
  - type: note
    content: (Is. 9:7)
  - type: text
    content: 'He must increase, but I '
  - type: text
    content: must
  - type: text
    content: ' decrease. '
  '31':
  - type: note
    content: John 3:13; 8:23
  - type: text
    content: 'He who comes from above '
  - type: note
    content: Matt. 28:18; John 1:15, 27; 13:13; Rom. 9:5; (Col. 1:17, 18)
  - type: text
    content: 'is above all; '
  - type: note
    content: 1 Cor. 15:47
  - type: text
    content: 'he who is of the earth is earthly and speaks of the earth. '
  - type: note
    content: John 6:33; 1 Cor. 15:47; Eph. 1:21; Phil. 2:9
  - type: text
    content: 'He who comes from heaven is above all. '
  '32':
  - type: text
    content: 'And '
  - type: note
    content: Is. 53:1, 3; John 3:11; 15:15
  - type: text
    content: 'what He has seen and heard, that He testifies; and no one receives His testimony. '
  '33':
  - type: text
    content: 'He who has received His testimony '
  - type: note
    content: Rom. 3:4; 1 John 5:10
  - type: text
    content: 'has certified that God is true. '
  '34':
  - type: note
    content: Deut. 18:18; John 7:16
  - type: text
    content: 'For He whom God has sent speaks the words of God, for God does not give the Spirit '
  - type: note
    content: John 1:16
  - type: text
    content: 'by measure. '
  '35':
  - type: note
    content: Matt. 11:27; Luke 10:22; John 5:20; (Heb. 2:8)
  - type: text
    content: 'The Father loves the Son, and has given all things into His hand. '
  '36':
  - type: note
    content: John 3:16, 17; 6:47; Rom. 1:17; 1 John 5:10
  - type: text
    content: 'He who believes in the Son has everlasting life; and he who does not believe the Son shall not see life, but the '
  - type: note
    content: Rom. 1:18; Eph. 5:6; 1 Thess. 1:10
  - type: text
    content: wrath of God abides on him.”
  '4':
  - type: text
    content: Nicodemus said to Him, “How can a man be born when he is old? Can he enter a second time into his mother’s womb and be born?”
  '5':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“Most assuredly, I say to you, '
  - type: note
    content: Mark 16:16; (Acts 2:38)
  - type: text
    content: unless one is born of water and the Spirit, he cannot enter the kingdom of God.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'That which is born of the flesh is '
  - type: note
    content: John 1:13; 1 Cor. 15:50
  - type: text
    content: flesh, and that which is born of the Spirit is spirit.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Do not marvel that I said to you, ‘You must be born again.’
  - type: text
    content: ' '
  '8':
  - type: note
    content: Ps. 135:7; Eccl. 11:5; Ezek. 37:9; 1 Cor. 2:11
  - type: text
    content: The wind blows where it wishes, and you hear the sound of it, but cannot tell where it comes from and where it goes. So is everyone who is born of the Spirit.”
  '9':
  - type: text
    content: 'Nicodemus answered and said to Him, '
  - type: note
    content: John 6:52, 60
  - type: text
    content: “How can these things be?”
