    marker: x
    children:
    - type: text
      text: 1 Kin. 6:3; 1 Chr. 28:11
    marker-yv: yv-n
  - type: text
    text: 'vestibule that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in front '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' the sanctuary was twenty cubits long across the width of the house, and the height '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' one hundred and twenty. He overlaid the inside with pure gold. '
  - type: usfm
    marker: v
    metadata:
