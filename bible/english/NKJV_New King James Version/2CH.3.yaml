  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'This is the foundation '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 6:2; 1 Chr. 28:11–19
    marker-yv: yv-n
  - type: text
    text: 'which Solomon laid for building the house of God: The length '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' sixty cubits (by cubits according to the former measure) and the width twenty cubits. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the '
