    text: 'The wings of the cherubim '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' twenty cubits in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: overall
  - type: text
    text: ' length: one wing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: cherub
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits, touching the wall of the room, and the other wing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits, touching the wing of the other cherub; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' wing of the other cherub '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits, touching the wall of the room, and the other wing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: also
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits, touching the wing of the other cherub. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The wings of these cherubim spanned twenty cubits overall. They stood on their feet, and they faced inward. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he made the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 26:31; Matt. 27:51; Heb. 9:3
    marker-yv: yv-n
  - type: text
    text: veil of blue, purple, crimson, and fine linen, and wove cherubim into it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Also he made in front of the temple '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 7:15–20; Jer. 52:21
    marker-yv: yv-n
  - type: text
    text: 'two pillars thirty-five cubits high, and the capital that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' on the top of each of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' was five cubits. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He made wreaths of chainwork, as in the inner sanctuary, and put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' on top of the pillars; and he made '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 7:20
    marker-yv: yv-n
  - type: text
    text: 'one hundred pomegranates, and put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' on the wreaths of chainwork. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 7:21
    marker-yv: yv-n
  - type: text
    text: set up the pillars before the temple, one on the right hand and the other on the left; he called the name of the one on the right hand Jachin, and the name of the one on the left Boaz.
