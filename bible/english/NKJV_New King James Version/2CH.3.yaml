document_id: 2CH.3,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon Builds the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:1
      marker-yv: yv-n
    - type: text
      text: 'Solomon began to build the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 22:2–14
      marker-yv: yv-n
    - type: text
      text: 'Jerusalem on Mount Moriah, where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Lord
    - type: text
      text: ' had appeared to his father David, at the place that David had prepared on the threshing floor of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 21:18; 22:1
      marker-yv: yv-n
    - type: text
      text: 'Ornan the Jebusite. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:18–20; 1 Kin. 6:23–28
      marker-yv: yv-n
    - type: text
      text: 'In the Most Holy Place he made two cherubim, fashioned by carving, and overlaid them with gold. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The wings of the cherubim '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty cubits in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: overall
    - type: text
      text: ' length: one wing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cherub
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' five cubits, touching the wall of the room, and the other wing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' five cubits, touching the wing of the other cherub; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' wing of the other cherub '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' five cubits, touching the wall of the room, and the other wing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: also
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' five cubits, touching the wing of the other cherub. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The wings of these cherubim spanned twenty cubits overall. They stood on their feet, and they faced inward. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:31; Matt. 27:51; Heb. 9:3
      marker-yv: yv-n
    - type: text
      text: veil of blue, purple, crimson, and fine linen, and wove cherubim into it.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also he made in front of the temple '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:15–20; Jer. 52:21
      marker-yv: yv-n
    - type: text
      text: 'two pillars thirty-five cubits high, and the capital that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' on the top of each of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' was five cubits. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He made wreaths of chainwork, as in the inner sanctuary, and put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' on top of the pillars; and he made '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:20
      marker-yv: yv-n
    - type: text
      text: 'one hundred pomegranates, and put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' on the wreaths of chainwork. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:21
      marker-yv: yv-n
    - type: text
      text: set up the pillars before the temple, one on the right hand and the other on the left; he called the name of the one on the right hand Jachin, and the name of the one on the left Boaz.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he began to build on the second '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the second month in the fourth year of his reign.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the foundation '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:2; 1 Chr. 28:11–19
      marker-yv: yv-n
    - type: text
      text: 'which Solomon laid for building the house of God: The length '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' sixty cubits (by cubits according to the former measure) and the width twenty cubits. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:3; 1 Chr. 28:11
      marker-yv: yv-n
    - type: text
      text: 'vestibule that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in front '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' the sanctuary was twenty cubits long across the width of the house, and the height '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' one hundred and twenty. He overlaid the inside with pure gold. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:17
      marker-yv: yv-n
    - type: text
      text: 'The larger room he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:15; Jer. 22:14
      marker-yv: yv-n
    - type: text
      text: 'paneled with cypress which he overlaid with fine gold, and he carved palm trees and chainwork on it. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he decorated the house with precious stones for beauty, and the gold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' gold from Parvaim. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also overlaid the house—the beams and doorposts, its walls and doors—with gold; and he carved cherubim on the walls.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 26:33; 1 Kin. 6:16
      marker-yv: yv-n
    - type: text
      text: 'Most Holy Place. Its length was according to the width of the house, twenty cubits, and its width twenty cubits. He overlaid it with six hundred talents of fine gold. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The weight of the nails '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' fifty shekels of gold; and he overlaid the upper '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 28:11
      marker-yv: yv-n
    - type: text
      text: 'area with gold. '
