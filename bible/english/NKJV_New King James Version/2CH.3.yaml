  - type: text
    content: ' five cubits, touching the wing of the other cherub. '
  '13':
  - type: text
    content: 'The wings of these cherubim spanned twenty cubits overall. They stood on their feet, and they faced inward. '
  '14':
  - type: text
    content: 'And he made the '
  - type: note
    content: Ex. 26:31; Matt. 27:51; Heb. 9:3
  - type: text
    content: veil of blue, purple, crimson, and fine linen, and wove cherubim into it.
  '15':
  - type: text
    content: 'Also he made in front of the temple '
  - type: note
    content: 1 Kin. 7:15–20; Jer. 52:21
  - type: text
    content: 'two pillars thirty-five cubits high, and the capital that '
  - type: text
    content: was
  - type: text
    content: ' on the top of each of '
  - type: text
    content: them
  - type: text
    content: ' was five cubits. '
  '16':
  - type: text
    content: 'He made wreaths of chainwork, as in the inner sanctuary, and put '
  - type: text
    content: them
  - type: text
    content: ' on top of the pillars; and he made '
  - type: note
    content: 1 Kin. 7:20
  - type: text
    content: 'one hundred pomegranates, and put '
  - type: text
    content: them
  - type: text
    content: ' on the wreaths of chainwork. '
  '17':
  - type: text
    content: 'Then he '
  - type: note
    content: 1 Kin. 7:21
  - type: text
    content: set up the pillars before the temple, one on the right hand and the other on the left; he called the name of the one on the right hand Jachin, and the name of the one on the left Boaz.
  '2':
  - type: text
    content: 'And he began to build on the second '
  - type: text
    content: day
  - type: text
    content: ' of the second month in the fourth year of his reign.'
  '3':
  - type: text
    content: 'This is the foundation '
  - type: note
    content: 1 Kin. 6:2; 1 Chr. 28:11–19
  - type: text
    content: 'which Solomon laid for building the house of God: The length '
  - type: text
    content: was
  - type: text
    content: ' sixty cubits (by cubits according to the former measure) and the width twenty cubits. '
  '4':
  - type: text
    content: 'And the '
  - type: note
    content: 1 Kin. 6:3; 1 Chr. 28:11
  - type: text
    content: 'vestibule that '
  - type: text
    content: was
  - type: text
    content: ' in front '
  - type: text
    content: of
  - type: text
    content: ' the sanctuary was twenty cubits long across the width of the house, and the height '
  - type: text
    content: was
  - type: text
    content: ' one hundred and twenty. He overlaid the inside with pure gold. '
  '5':
  - type: note
    content: 1 Kin. 6:17
  - type: text
    content: 'The larger room he '
  - type: note
    content: 1 Kin. 6:15; Jer. 22:14
  - type: text
    content: 'paneled with cypress which he overlaid with fine gold, and he carved palm trees and chainwork on it. '
  '6':
  - type: text
    content: 'And he decorated the house with precious stones for beauty, and the gold '
  - type: text
    content: was
  - type: text
    content: ' gold from Parvaim. '
  '7':
  - type: text
    content: He also overlaid the house—the beams and doorposts, its walls and doors—with gold; and he carved cherubim on the walls.
  '8':
  - type: text
    content: 'And he made the '
  - type: note
    content: Ex. 26:33; 1 Kin. 6:16
  - type: text
    content: 'Most Holy Place. Its length was according to the width of the house, twenty cubits, and its width twenty cubits. He overlaid it with six hundred talents of fine gold. '
  '9':
  - type: text
    content: 'The weight of the nails '
  - type: text
    content: was
  - type: text
    content: ' fifty shekels of gold; and he overlaid the upper '
  - type: note
    content: 1 Chr. 28:11
  - type: text
    content: 'area with gold. '
