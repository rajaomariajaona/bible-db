  - type: text
    content: 'Jerusalem on Mount Moriah, where '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: heading
    content: Lord
  - type: text
    content: ' had appeared to his father David, at the place that David had prepared on the threshing floor of '
  - type: note
    content: 1 Chr. 21:18; 22:1
  - type: text
    content: 'Ornan the Jebusite. '
  '10':
  - type: note
    content: Ex. 25:18–20; 1 Kin. 6:23–28
  - type: text
    content: 'In the Most Holy Place he made two cherubim, fashioned by carving, and overlaid them with gold. '
