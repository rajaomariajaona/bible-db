    marker: x
    children:
    - type: text
      text: 1 Kin. 6:15; Jer. 22:14
    marker-yv: yv-n
  - type: text
    text: 'paneled with cypress which he overlaid with fine gold, and he carved palm trees and chainwork on it. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he decorated the house with precious stones for beauty, and the gold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' gold from Parvaim. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He also overlaid the house—the beams and doorposts, its walls and doors—with gold; and he carved cherubim on the walls.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he made the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 26:33; 1 Kin. 6:16
    marker-yv: yv-n
  - type: text
    text: 'Most Holy Place. Its length was according to the width of the house, twenty cubits, and its width twenty cubits. He overlaid it with six hundred talents of fine gold. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The weight of the nails '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' fifty shekels of gold; and he overlaid the upper '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 28:11
    marker-yv: yv-n
  - type: text
    text: 'area with gold. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:18–20; 1 Kin. 6:23–28
    marker-yv: yv-n
  - type: text
    text: 'In the Most Holy Place he made two cherubim, fashioned by carving, and overlaid them with gold. '
