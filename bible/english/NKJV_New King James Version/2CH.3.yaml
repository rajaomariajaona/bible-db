  - type: text
    content: 'The wings of the cherubim '
  - type: text
    content: were
  - type: text
    content: ' twenty cubits in '
  - type: text
    content: overall
  - type: text
    content: ' length: one wing '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: one
  - type: text
    content: ' '
  - type: text
    content: cherub
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' five cubits, touching the wall of the room, and the other wing '
  - type: text
    content: was
  - type: text
    content: ' five cubits, touching the wing of the other cherub; '
  '12':
  - type: text
    content: one
  - type: text
