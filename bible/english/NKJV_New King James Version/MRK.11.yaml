document_id: MRK.11,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Triumphal Entry
  - type: text
    content: 'Now '
  - type: note
    content: Matt. 21:1–9; Luke 19:29; John 2:13
  - type: text
    content: 'when they drew near Jerusalem, to Bethphage and Bethany, at the Mount of Olives, He sent two of His disciples; '
  '10':
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' the kingdom of our father David'
  - type: text
    content: That comes in the name of the Lord!
  - type: note
    content: Ps. 148:1
  - type: text
    content: Hosanna in the highest!”
  '11':
  - type: note
    content: Matt. 21:12
  - type: text
    content: And Jesus went into Jerusalem and into the temple. So when He had looked around at all things, as the hour was already late, He went out to Bethany with the twelve.
  - type: heading
    content: The Fig Tree Withered
  '12':
  - type: note
    content: Matt. 21:18–22
  - type: text
    content: 'Now the next day, when they had come out from Bethany, He was hungry. '
  '13':
  - type: note
    content: Matt. 21:19
  - type: text
    content: 'And seeing from afar a fig tree having leaves, He went to see if perhaps He would find something on it. When He came to it, He found nothing but leaves, for it was not the season for figs. '
  '14':
  - type: text
    content: 'In response Jesus said to it, '
  - type: text
    content: “Let no one eat fruit from you ever again.”
  - type: text
    content: 'And His disciples heard '
  - type: text
    content: it.
  - type: heading
    content: Jesus Cleanses the Temple
  '15':
  - type: note
    content: Mal. 3:1; Matt. 21:12–16; Luke 19:45–47; John 2:13–16
  - type: text
    content: 'So they came to Jerusalem. Then Jesus went into the temple and began to drive out those who bought and sold in the temple, and overturned the tables of the money changers and the seats of those who sold '
  - type: note
    content: Lev. 14:22
  - type: text
    content: 'doves. '
  '16':
  - type: text
    content: 'And He would not allow anyone to carry wares through the temple. '
  '17':
  - type: text
    content: 'Then He taught, saying to them, '
  - type: text
    content: '“Is it not written, '
  - type: note
    content: Is. 56:7
  - type: text
    content: ‘My house shall be called a house of prayer for all nations’
  - type: text
    content: '?'
  - type: text
    content: ' But you have made it a '
  - type: note
    content: Jer. 7:11
  - type: text
    content: ‘den of thieves.’
  - type: text
    content: ' '
  - type: text
    content: ”
  '18':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 2:2; Matt. 21:45, 46; Luke 19:47
  - type: text
    content: 'the scribes and chief priests heard it and sought how they might destroy Him; for they feared Him, because '
  - type: note
    content: Matt. 7:28; Mark 1:22; 6:2; Luke 4:32
  - type: text
    content: 'all the people were astonished at His teaching. '
  '19':
  - type: text
    content: When evening had come, He went out of the city.
  - type: heading
    content: The Lesson of the Withered Fig Tree
  '2':
  - type: text
    content: 'and He said to them, '
  - type: text
    content: '“Go into the village opposite you; and as soon as you have entered it you will find a colt tied, on which no one has sat. Loose it and bring '
  - type: text
    content: it.
  - type: text
    content: ' '
  '20':
  - type: note
    content: Matt. 21:19–22
  - type: text
    content: 'Now in the morning, as they passed by, they saw the fig tree dried up from the roots. '
  '21':
  - type: text
    content: And Peter, remembering, said to Him, “Rabbi, look! The fig tree which You cursed has withered away.”
  '22':
  - type: text
    content: 'So Jesus answered and said to them, '
  - type: text
    content: “Have faith in God.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 17:20; 21:21; Luke 17:6
  - type: text
    content: assuredly, I say to you, whoever says to this mountain, ‘Be removed and be cast into the sea,’ and does not doubt in his heart, but believes that those things he says will be done, he will have whatever he says.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Therefore I say to you, '
  - type: note
    content: Matt. 7:7; Luke 11:9; (John 14:13; 15:7; 16:24; James 1:5, 6)
  - type: text
    content: 'whatever things you ask when you pray, believe that you receive '
  - type: text
    content: them,
  - type: text
    content: ' and you will have '
  - type: text
    content: them.
  - type: heading
    content: Forgiveness and Prayer
  '25':
  - type: text
    content: '“And whenever you stand praying, '
  - type: note
    content: Matt. 6:14; 18:23–35; Eph. 4:32; (Col. 3:13)
  - type: text
    content: if you have anything against anyone, forgive him, that your Father in heaven may also forgive you your trespasses.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'But '
  - type: note
    content: Matt. 6:15; 18:35
  - type: text
    content: if you do not forgive, neither will your Father in heaven forgive your trespasses.”
  - type: heading
    content: Jesus’ Authority Questioned
  '27':
  - type: text
    content: 'Then they came again to Jerusalem. '
  - type: note
    content: Matt. 21:23–27; Luke 20:1–8
  - type: text
    content: 'And as He was walking in the temple, the chief priests, the scribes, and the elders came to Him. '
  '28':
  - type: text
    content: 'And they said to Him, “By what '
  - type: note
    content: John 5:27
  - type: text
    content: authority are You doing these things? And who gave You this authority to do these things?”
  '29':
  - type: text
    content: 'But Jesus answered and said to them, '
  - type: text
    content: '“I also will ask you one question; then answer Me, and I will tell you by what authority I do these things:'
  - type: text
    content: ' '
  '3':
  - type: text
    content: And if anyone says to you, ‘Why are you doing this?’ say, ‘The Lord has need of it,’ and immediately he will send it here.”
  '30':
  - type: text
    content: 'The '
  - type: note
    content: (Mark 1:4, 5, 8); Luke 7:29, 30
  - type: text
    content: baptism of John—was it from heaven or from men? Answer Me.”
  '31':
  - type: text
    content: 'And they reasoned among themselves, saying, “If we say, ‘From heaven,’ He will say, ‘Why then did you not believe him?’ '
  '32':
  - type: text
    content: 'But if we say, ‘From men’ ”—they feared the people, for '
  - type: note
    content: Matt. 3:5; 14:5; Mark 6:20
  - type: text
    content: 'all counted John to have been a prophet indeed. '
  '33':
  - type: text
    content: So they answered and said to Jesus, “We do not know.”
  - type: text
    content: 'And Jesus answered and said to them, '
  - type: text
    content: “Neither will I tell you by what authority I do these things.”
  '4':
  - type: text
    content: 'So they went their way, and found the colt tied by the door outside on the street, and they loosed it. '
  '5':
  - type: text
    content: But some of those who stood there said to them, “What are you doing, loosing the colt?”
  '6':
  - type: text
    content: 'And they spoke to them just as Jesus had commanded. So they let them go. '
  '7':
  - type: text
    content: 'Then they brought the colt to Jesus and threw their clothes on it, and He sat on it. '
  '8':
  - type: note
    content: Matt. 21:8
  - type: text
    content: 'And many spread their clothes on the road, and others cut down leafy branches from the trees and spread '
  - type: text
    content: them
  - type: text
    content: ' on the road. '
  '9':
  - type: text
    content: 'Then those who went before and those who followed cried out, saying:'
  - type: text
    content: “Hosanna!
  - type: note
    content: Ps. 118:25, 26; Matt. 21:9
  - type: text
    content: '‘Blessed '
  - type: text
    content: is
  - type: text
    content: ' He who comes in the name of the '
  - type: heading
    content: Lord
  - type: text
    content: '!’'
