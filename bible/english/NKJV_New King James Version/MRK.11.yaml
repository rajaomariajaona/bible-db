    children:
    - type: text
      text: Matt. 21:1–9; Luke 19:29; John 2:13
    marker-yv: yv-n
  - type: text
    text: 'when they drew near Jerusalem, to Bethphage and Bethany, at the Mount of Olives, He sent two of His disciples; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Go into the village opposite you; and as soon as you have entered it you will find a colt tied, on which no one has sat. Loose it and bring '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
  - type: text
    text: ' '
  - type: usfm
    marker: v
