  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if anyone says to you, ‘Why are you doing this?’ say, ‘The Lord has need of it,’ and immediately he will send it here.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So they went their way, and found the colt tied by the door outside on the street, and they loosed it. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But some of those who stood there said to them, “What are you doing, loosing the colt?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And they spoke to them just as Jesus had commanded. So they let them go. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then they brought the colt to Jesus and threw their clothes on it, and He sat on it. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 21:8
    marker-yv: yv-n
  - type: text
    text: 'And many spread their clothes on the road, and others cut down leafy branches from the trees and spread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' on the road. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then those who went before and those who followed cried out, saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Hosanna!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 118:25, 26; Matt. 21:9
    marker-yv: yv-n
  - type: text
    text: '‘Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' He who comes in the name of the '
  - type: usfm
    marker: sc
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Lord
  - type: text
    text: '!’'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the kingdom of our father David'
- type: usfm
  marker: q2
  children:
