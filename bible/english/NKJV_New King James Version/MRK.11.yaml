      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 21:12
    marker-yv: yv-n
  - type: text
    text: And Jesus went into Jerusalem and into the temple. So when He had looked around at all things, as the hour was already late, He went out to Bethany with the twelve.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fig Tree Withered
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 21:18–22
    marker-yv: yv-n
  - type: text
    text: 'Now the next day, when they had come out from Bethany, He was hungry. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 21:19
    marker-yv: yv-n
  - type: text
    text: 'And seeing from afar a fig tree having leaves, He went to see if perhaps He would find something on it. When He came to it, He found nothing but leaves, for it was not the season for figs. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'In response Jesus said to it, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Let no one eat fruit from you ever again.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And His disciples heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Cleanses the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mal. 3:1; Matt. 21:12–16; Luke 19:45–47; John 2:13–16
    marker-yv: yv-n
  - type: text
    text: 'So they came to Jerusalem. Then Jesus went into the temple and began to drive out those who bought and sold in the temple, and overturned the tables of the money changers and the seats of those who sold '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 14:22
    marker-yv: yv-n
  - type: text
    text: 'doves. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And He would not allow anyone to carry wares through the temple. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then He taught, saying to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Is it not written, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 56:7
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘My house shall be called a house of prayer for all nations’
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '?'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ' But you have made it a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 7:11
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘den of thieves.’
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 2:2; Matt. 21:45, 46; Luke 19:47
    marker-yv: yv-n
  - type: text
    text: 'the scribes and chief priests heard it and sought how they might destroy Him; for they feared Him, because '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 7:28; Mark 1:22; 6:2; Luke 4:32
    marker-yv: yv-n
  - type: text
    text: 'all the people were astonished at His teaching. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: When evening had come, He went out of the city.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Lesson of the Withered Fig Tree
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 21:19–22
    marker-yv: yv-n
  - type: text
    text: 'Now in the morning, as they passed by, they saw the fig tree dried up from the roots. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And Peter, remembering, said to Him, “Rabbi, look! The fig tree which You cursed has withered away.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So Jesus answered and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Have faith in God.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 17:20; 21:21; Luke 17:6
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: assuredly, I say to you, whoever says to this mountain, ‘Be removed and be cast into the sea,’ and does not doubt in his heart, but believes that those things he says will be done, he will have whatever he says.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Therefore I say to you, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 7:7; Luke 11:9; (John 14:13; 15:7; 16:24; James 1:5, 6)
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'whatever things you ask when you pray, believe that you receive '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ' and you will have '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Forgiveness and Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“And whenever you stand praying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 6:14; 18:23–35; Eph. 4:32; (Col. 3:13)
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: if you have anything against anyone, forgive him, that your Father in heaven may also forgive you your trespasses.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 6:15; 18:35
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: if you do not forgive, neither will your Father in heaven forgive your trespasses.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus’ Authority Questioned
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then they came again to Jerusalem. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 21:23–27; Luke 20:1–8
    marker-yv: yv-n
  - type: text
    text: 'And as He was walking in the temple, the chief priests, the scribes, and the elders came to Him. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And they said to Him, “By what '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 5:27
    marker-yv: yv-n
  - type: text
    text: authority are You doing these things? And who gave You this authority to do these things?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'But Jesus answered and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I also will ask you one question; then answer Me, and I will tell you by what authority I do these things:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Mark 1:4, 5, 8); Luke 7:29, 30
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: baptism of John—was it from heaven or from men? Answer Me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And they reasoned among themselves, saying, “If we say, ‘From heaven,’ He will say, ‘Why then did you not believe him?’ '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But if we say, ‘From men’ ”—they feared the people, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 3:5; 14:5; Mark 6:20
    marker-yv: yv-n
  - type: text
    text: 'all counted John to have been a prophet indeed. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So they answered and said to Jesus, “We do not know.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And Jesus answered and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Neither will I tell you by what authority I do these things.”
