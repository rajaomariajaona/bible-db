    children:
    - type: text
      text: Wicked Rulers and Prophets
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And I said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Hear now, O heads of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 22:27
      marker-yv: yv-n
    - type: text
      text: 'rulers of the house of Israel:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 82:1–5; Jer. 5:4, 5
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' not for you to know justice?'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 22:13, 17
      marker-yv: yv-n
    - type: text
      text: 'Who build up Zion with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 22:27; Hab. 2:12
      marker-yv: yv-n
    - type: text
      text: bloodshed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And Jerusalem with iniquity:'
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 1:23; Mic. 7:3
      marker-yv: yv-n
    - type: text
      text: Her heads judge for a bribe,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 6:13
      marker-yv: yv-n
    - type: text
      text: Her priests teach for pay,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And her prophets divine for money.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 48:2; Jer. 7:4
      marker-yv: yv-n
    - type: text
      text: 'Yet they lean on the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and say,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“Is not the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' among us?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No harm can come upon us.”
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Therefore because of you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Zion shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 26:18
      marker-yv: yv-n
    - type: text
      text: 'plowed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' a field,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 79:1; Jer. 9:11
      marker-yv: yv-n
    - type: text
      text: Jerusalem shall become heaps of ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mic. 4:1, 2
      marker-yv: yv-n
    - type: text
      text: the mountain of the temple
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like the bare hills of the forest.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You who hate good and love evil;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who strip the skin from My people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the flesh from their bones;
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Who also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 14:4; 27:2; Zeph. 3:3
      marker-yv: yv-n
    - type: text
      text: eat the flesh of My people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Flay their skin from them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Break their bones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And chop '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' in pieces'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Like '
    - type: usfm
      marker: it
      children:
      - type: text
        text: meat
    - type: text
      text: ' for the pot,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 11:3, 6, 7
      marker-yv: yv-n
    - type: text
      text: Like flesh in the caldron.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 18:41; Prov. 1:28; Is. 1:15; Jer. 11:11
      marker-yv: yv-n
    - type: text
      text: 'they will cry to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But He will not hear them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will even hide His face from them at that time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because they have been evil in their deeds.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 56:10, 11; Jer. 6:13; Ezek. 13:10, 19
      marker-yv: yv-n
    - type: text
      text: concerning the prophets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who make my people stray;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who chant “Peace”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'While they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 7:15
      marker-yv: yv-n
    - type: text
      text: chew with their teeth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But who prepare war against him
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 13:18
      marker-yv: yv-n
    - type: text
      text: 'Who puts nothing into their mouths:'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Therefore
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 8:20–22; 29:10–12
      marker-yv: yv-n
    - type: text
      text: ' you shall have night without vision,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And you shall have darkness without divination;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The sun shall go down on the prophets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the day shall be dark for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 29:10; (Jer. 23:33–40); Ezek. 13:23
      marker-yv: yv-n
    - type: text
      text: them.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: So the seers shall be ashamed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the diviners abashed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Indeed they shall all cover their lips;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Amos 8:11
      marker-yv: yv-n
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no answer from God.”'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But truly I am full of power by the Spirit of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And of justice and might,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 58:1
      marker-yv: yv-n
    - type: text
      text: To declare to Jacob his transgression
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to Israel his sin.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Now hear this,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You heads of the house of Jacob
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And rulers of the house of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who abhor justice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And pervert all equity,
