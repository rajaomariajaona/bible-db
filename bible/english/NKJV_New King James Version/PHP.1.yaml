document_id: PHP.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: Paul and Timothy, bondservants of Jesus Christ,
  - type: text
    content: 'To all the saints in Christ Jesus who are in Philippi, with the bishops and '
  - type: note
    content: (1 Tim. 3:8–13)
  - type: text
    content: 'deacons:'
  '10':
  - type: text
    content: 'that you may approve the things that are excellent, that you may be sincere and without offense till the day of Christ, '
  '11':
  - type: text
    content: 'being filled with the fruits of righteousness '
  - type: note
    content: (Eph. 2:10); Col. 1:6
  - type: text
    content: 'which '
  - type: text
    content: are
  - type: text
    content: ' by Jesus Christ, '
  - type: note
    content: John 15:8
  - type: text
    content: to the glory and praise of God.
  - type: heading
    content: Christ Is Preached
  '12':
  - type: text
    content: 'But I want you to know, brethren, that the things '
  - type: text
    content: which
  - type: text
    content: ' '
  - type: text
    content: happened
  - type: text
    content: ' to me have actually turned out for the furtherance of the gospel, '
  '13':
  - type: text
    content: 'so that it has become evident '
  - type: note
    content: Phil. 4:22
  - type: text
    content: 'to the whole palace guard, and to all the rest, that my chains are in Christ; '
  '14':
  - type: text
    content: and most of the brethren in the Lord, having become confident by my chains, are much more bold to speak the word without fear.
  '15':
  - type: text
    content: 'Some indeed preach Christ even from envy and strife, and some also from goodwill: '
  '16':
  - type: text
    content: 'The former preach Christ from selfish ambition, not sincerely, supposing to add affliction to my chains; '
  '17':
  - type: text
    content: 'but the latter out of love, knowing that I am appointed for the defense of the gospel. '
  '18':
  - type: text
    content: 'What then? Only '
  - type: text
    content: that
  - type: text
    content: ' in every way, whether in pretense or in truth, Christ is preached; and in this I rejoice, yes, and will rejoice.'
  - type: heading
    content: To Live Is Christ
  '19':
  - type: text
    content: 'For I know that '
  - type: note
    content: Job 13:16, LXX
  - type: text
    content: 'this will turn out for my deliverance through your prayer and the supply of the Spirit of Jesus Christ, '
  '2':
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Thankfulness and Prayer
  '20':
  - type: text
    content: 'according to my earnest expectation and hope that in nothing I shall be ashamed, but '
  - type: note
    content: Eph. 6:19, 20
  - type: text
    content: 'with all boldness, as always, so now also Christ will be magnified in my body, whether by life '
  - type: note
    content: (Rom. 14:8)
  - type: text
    content: 'or by death. '
  '21':
  - type: text
    content: 'For to me, to live '
  - type: text
    content: is
  - type: text
    content: ' Christ, and to die '
  - type: text
    content: is
  - type: text
    content: ' gain. '
  '22':
  - type: text
    content: 'But if '
  - type: text
    content: I
  - type: text
    content: ' live on in the flesh, this '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: mean
  - type: text
    content: ' fruit from '
  - type: text
    content: my
  - type: text
    content: ' labor; yet what I shall choose I cannot tell. '
  '23':
  - type: text
    content: 'For I am hard-pressed between the two, having a '
  - type: note
    content: (2 Cor. 5:2, 8); 2 Tim. 4:6
  - type: text
    content: 'desire to depart and be with Christ, '
  - type: text
    content: which
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: (Ps. 16:11)
  - type: text
    content: 'far better. '
  '24':
  - type: text
    content: 'Nevertheless to remain in the flesh '
  - type: text
    content: is
  - type: text
    content: ' more needful for you. '
  '25':
  - type: text
    content: 'And being confident of this, I know that I shall remain and continue with you all for your progress and joy of faith, '
  '26':
  - type: text
    content: 'that '
  - type: note
    content: 2 Cor. 1:14
  - type: text
    content: your rejoicing for me may be more abundant in Jesus Christ by my coming to you again.
  - type: heading
    content: Striving and Suffering for Christ
  '27':
  - type: text
    content: 'Only '
  - type: note
    content: Eph. 4:1; 1 Thess. 2:12
  - type: text
    content: 'let your conduct be worthy of the gospel of Christ, so that whether I come and see you or am absent, I may hear of your affairs, that you stand fast in one spirit, '
  - type: note
    content: 1 Cor. 1:10; Eph. 4:3
  - type: text
    content: 'with one mind '
  - type: note
    content: Jude 3
  - type: text
    content: 'striving together for the faith of the gospel, '
  '28':
  - type: text
    content: 'and not in any way terrified by your adversaries, which is to them a proof of perdition, but to you of salvation, and that from God. '
  '29':
  - type: text
    content: 'For to you '
  - type: note
    content: (Matt. 5:11, 12; Acts 5:41; Rom. 5:3)
  - type: text
    content: 'it has been granted on behalf of Christ, '
  - type: note
    content: Eph. 2:8
  - type: text
    content: 'not only to believe in Him, but also to '
  - type: note
    content: (2 Tim. 3:12)
  - type: text
    content: 'suffer for His sake, '
  '3':
  - type: note
    content: 1 Cor. 1:4
  - type: text
    content: 'I thank my God upon every remembrance of you, '
  '30':
  - type: note
    content: Col. 1:29; 2:1; 1 Thess. 2:2; 1 Tim. 6:12; 2 Tim. 4:7; Heb. 10:32; 12:1
  - type: text
    content: 'having the same conflict '
  - type: note
    content: Acts 16:19–40; Phil. 1:13; 1 Thess. 2:2
  - type: text
    content: 'which you saw in me and now hear '
  - type: text
    content: is
  - type: text
    content: ' in me.'
  '4':
  - type: text
    content: 'always in '
  - type: note
    content: Eph. 1:16; 1 Thess. 1:2
  - type: text
    content: 'every prayer of mine making request for you all with joy, '
  '5':
  - type: note
    content: (Rom. 12:13)
  - type: text
    content: 'for your fellowship in the gospel from the first day until now, '
  '6':
  - type: text
    content: 'being confident of this very thing, that He who has begun '
  - type: note
    content: (John 6:29)
  - type: text
    content: 'a good work in you will complete '
  - type: text
    content: it
  - type: text
    content: ' until the day of Jesus Christ; '
  '7':
  - type: text
    content: 'just as it is right for me to think this of you all, because I have you in my heart, inasmuch as both in my chains and in the defense and confirmation of the gospel, you all are partakers with me of grace. '
  '8':
  - type: text
    content: For God is my witness, how greatly I long for you all with the affection of Jesus Christ.
  '9':
  - type: text
    content: 'And this I pray, that your love may abound still more and more in knowledge and all discernment, '
