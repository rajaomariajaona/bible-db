document_id: PHP.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greeting
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul and Timothy, bondservants of Jesus Christ,
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To all the saints in Christ Jesus who are in Philippi, with the bishops and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Tim. 3:8–13)
      marker-yv: yv-n
    - type: text
      text: 'deacons:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that you may approve the things that are excellent, that you may be sincere and without offense till the day of Christ, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'being filled with the fruits of righteousness '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eph. 2:10); Col. 1:6
      marker-yv: yv-n
    - type: text
      text: 'which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' by Jesus Christ, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 15:8
      marker-yv: yv-n
    - type: text
      text: to the glory and praise of God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ Is Preached
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I want you to know, brethren, that the things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: happened
    - type: text
      text: ' to me have actually turned out for the furtherance of the gospel, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that it has become evident '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 4:22
      marker-yv: yv-n
    - type: text
      text: 'to the whole palace guard, and to all the rest, that my chains are in Christ; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and most of the brethren in the Lord, having become confident by my chains, are much more bold to speak the word without fear.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some indeed preach Christ even from envy and strife, and some also from goodwill: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The former preach Christ from selfish ambition, not sincerely, supposing to add affliction to my chains; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but the latter out of love, knowing that I am appointed for the defense of the gospel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What then? Only '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' in every way, whether in pretense or in truth, Christ is preached; and in this I rejoice, yes, and will rejoice.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To Live Is Christ
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I know that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 13:16, LXX
      marker-yv: yv-n
    - type: text
      text: 'this will turn out for my deliverance through your prayer and the supply of the Spirit of Jesus Christ, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Thankfulness and Prayer
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'according to my earnest expectation and hope that in nothing I shall be ashamed, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:19, 20
      marker-yv: yv-n
    - type: text
      text: 'with all boldness, as always, so now also Christ will be magnified in my body, whether by life '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 14:8)
      marker-yv: yv-n
    - type: text
      text: 'or by death. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For to me, to live '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Christ, and to die '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' gain. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' live on in the flesh, this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mean
    - type: text
      text: ' fruit from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' labor; yet what I shall choose I cannot tell. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I am hard-pressed between the two, having a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 5:2, 8); 2 Tim. 4:6
      marker-yv: yv-n
    - type: text
      text: 'desire to depart and be with Christ, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 16:11)
      marker-yv: yv-n
    - type: text
      text: 'far better. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless to remain in the flesh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' more needful for you. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And being confident of this, I know that I shall remain and continue with you all for your progress and joy of faith, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 1:14
      marker-yv: yv-n
    - type: text
      text: your rejoicing for me may be more abundant in Jesus Christ by my coming to you again.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Striving and Suffering for Christ
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 4:1; 1 Thess. 2:12
      marker-yv: yv-n
    - type: text
      text: 'let your conduct be worthy of the gospel of Christ, so that whether I come and see you or am absent, I may hear of your affairs, that you stand fast in one spirit, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 1:10; Eph. 4:3
      marker-yv: yv-n
    - type: text
      text: 'with one mind '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jude 3
      marker-yv: yv-n
    - type: text
      text: 'striving together for the faith of the gospel, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and not in any way terrified by your adversaries, which is to them a proof of perdition, but to you of salvation, and that from God. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For to you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 5:11, 12; Acts 5:41; Rom. 5:3)
      marker-yv: yv-n
    - type: text
      text: 'it has been granted on behalf of Christ, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 2:8
      marker-yv: yv-n
    - type: text
      text: 'not only to believe in Him, but also to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Tim. 3:12)
      marker-yv: yv-n
    - type: text
      text: 'suffer for His sake, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 1:4
      marker-yv: yv-n
    - type: text
      text: 'I thank my God upon every remembrance of you, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 1:29; 2:1; 1 Thess. 2:2; 1 Tim. 6:12; 2 Tim. 4:7; Heb. 10:32; 12:1
      marker-yv: yv-n
    - type: text
      text: 'having the same conflict '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 16:19–40; Phil. 1:13; 1 Thess. 2:2
      marker-yv: yv-n
    - type: text
      text: 'which you saw in me and now hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in me.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'always in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 1:16; 1 Thess. 1:2
      marker-yv: yv-n
    - type: text
      text: 'every prayer of mine making request for you all with joy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 12:13)
      marker-yv: yv-n
    - type: text
      text: 'for your fellowship in the gospel from the first day until now, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'being confident of this very thing, that He who has begun '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 6:29)
      marker-yv: yv-n
    - type: text
      text: 'a good work in you will complete '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' until the day of Jesus Christ; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'just as it is right for me to think this of you all, because I have you in my heart, inasmuch as both in my chains and in the defense and confirmation of the gospel, you all are partakers with me of grace. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For God is my witness, how greatly I long for you all with the affection of Jesus Christ.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this I pray, that your love may abound still more and more in knowledge and all discernment, '
