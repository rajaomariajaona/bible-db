document_id: DAN.9,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel’s Prayer for the People
  - type: text
    content: 'In the first year '
  - type: note
    content: Dan. 1:21
  - type: text
    content: 'of Darius the son of Ahasuerus, of the lineage of the Medes, who was made king over the realm of the Chaldeans— '
  '10':
  - type: text
    content: 'We have not obeyed the voice of the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God, to walk in His laws, which He set before us by His servants the prophets. '
  '11':
  - type: text
    content: 'Yes, '
  - type: note
    content: Is. 1:3–6; Jer. 8:5–10
  - type: text
    content: 'all Israel has transgressed Your law, and has departed so as not to obey Your voice; therefore the curse and the oath written in the '
  - type: note
    content: Lev. 26:14; Neh. 1:6; Ps. 106:6
  - type: text
    content: 'Law of Moses the servant of God have been poured out on us, because we have sinned against Him. '
  '12':
  - type: text
    content: 'And He has '
  - type: note
    content: Is. 44:26; Jer. 44:2–6; Lam. 2:17; Zech. 1:6
  - type: text
    content: 'confirmed His words, which He spoke against us and against our judges who judged us, by bringing upon us a great disaster; '
  - type: note
    content: Lam. 1:12; 2:13; Ezek. 5:9; (Amos 3:2)
  - type: text
    content: for under the whole heaven such has never been done as what has been done to Jerusalem.
  '13':
  - type: note
    content: Lev. 26:14–45; Deut.rl 263208 28:15–68; Lam. 2:17
  - type: text
    content: '“As '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' written in the Law of Moses, all this disaster has come upon us; '
  - type: note
    content: Job 36:13; Is. 9:13; Jer. 2:30; Hos. 7:7
  - type: text
    content: 'yet we have not made our prayer before the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God, that we might turn from our iniquities and understand Your truth. '
  '14':
  - type: text
    content: 'Therefore the '
  - type: heading
    content: Lord
  - type: text
    content: ' has '
  - type: note
    content: Jer. 31:28; 44:27
  - type: text
    content: 'kept the disaster in mind, and brought it upon us; for '
  - type: note
    content: Neh. 9:33
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God '
  - type: text
    content: is
  - type: text
    content: ' righteous in all the works which He does, though we have not obeyed His voice. '
  '15':
  - type: text
    content: 'And now, O Lord our God, '
  - type: note
    content: Ex. 32:11; 1 Kin. 8:51; Neh. 1:10
  - type: text
    content: 'who brought Your people out of the land of Egypt with a mighty hand, and made Yourself '
  - type: note
    content: Ex. 14:18; Neh. 9:10; Jer. 32:20
  - type: text
    content: 'a name, as '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' this day—we have sinned, we have done wickedly!'
  '16':
  - type: text
    content: '“O Lord, '
  - type: note
    content: 1 Sam. 12:7; Ps. 31:1; Mic. 6:4, 5
  - type: text
    content: 'according to all Your righteousness, I pray, let Your anger and Your fury be turned away from Your city Jerusalem, '
  - type: note
    content: Ps. 87:1–3; Dan. 9:20; Joel 3:17; Zech. 8:3
  - type: text
    content: 'Your holy mountain; because for our sins, '
  - type: note
    content: Ex. 20:5
  - type: text
    content: 'and for the iniquities of our fathers, '
  - type: note
    content: Ps. 122:6; Jer. 29:7; Lam. 2:16
  - type: text
    content: 'Jerusalem and Your people '
  - type: note
    content: Ps. 79:4
  - type: text
    content: are
  - type: text
    content: ' a reproach to all '
  - type: text
    content: those
  - type: text
    content: ' around us. '
  '17':
  - type: text
    content: 'Now therefore, our God, hear the prayer of Your servant, and his supplications, '
  - type: note
    content: Num. 6:24–26; Ps. 80:3, 7, 19
  - type: text
    content: 'and '
  - type: note
    content: Lam. 5:18
  - type: text
    content: 'for the Lord’s sake cause Your face to shine on Your sanctuary, '
  - type: note
    content: (John 16:24)
  - type: text
    content: 'which is desolate. '
  '18':
  - type: note
    content: Is. 37:17
  - type: text
    content: 'O my God, incline Your ear and hear; open Your eyes '
  - type: note
    content: Ex. 3:7
  - type: text
    content: 'and see our desolations, and the city '
  - type: note
    content: Jer. 25:29
  - type: text
    content: 'which is called by Your name; for we do not present our supplications before You because of our righteous deeds, but because of Your great mercies. '
  '19':
  - type: text
    content: O Lord, hear! O Lord, forgive! O Lord, listen and act! Do not delay for Your own sake, my God, for Your city and Your people are called by Your name.”
  - type: heading
    content: The Seventy-Weeks Prophecy
  '2':
  - type: text
    content: 'in the first year of his reign I, Daniel, understood by the books the number of the years '
  - type: text
    content: specified
  - type: text
    content: ' by the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' through '
  - type: note
    content: 2 Chr. 36:21; Ezra 1:1; Jer. 25:11, 12; 29:10; Zech. 7:5
  - type: text
    content: Jeremiah the prophet, that He would accomplish seventy years in the desolations of Jerusalem.
  '20':
  - type: text
    content: 'Now while I '
  - type: text
    content: was
  - type: text
    content: ' speaking, praying, and confessing my sin and the sin of my people Israel, and presenting my supplication before the '
  - type: heading
    content: Lord
  - type: text
    content: ' my God for the holy mountain of my God, '
  '21':
  - type: text
    content: 'yes, while I '
  - type: text
    content: was
  - type: text
    content: ' speaking in prayer, the man '
  - type: note
    content: Dan. 8:16; Luke 1:19, 26
  - type: text
    content: 'Gabriel, whom I had seen in the vision at the beginning, being caused to fly swiftly, reached me about the time of the evening offering. '
  '22':
  - type: text
    content: 'And he informed '
  - type: text
    content: me,
  - type: text
    content: ' and talked with me, and said, “O Daniel, I have now come forth to give you skill to understand. '
  '23':
  - type: text
    content: 'At the beginning of your supplications the command went out, and I have come to tell '
  - type: text
    content: you,
  - type: text
    content: ' for you '
  - type: text
    content: are
  - type: text
    content: ' greatly '
  - type: note
    content: Dan. 10:11, 19
  - type: text
    content: 'beloved; therefore '
  - type: note
    content: Matt. 24:15
  - type: text
    content: 'consider the matter, and understand the vision:'
  '24':
  - type: text
    content: “Seventy weeks are determined
  - type: text
    content: For your people and for your holy city,
  - type: text
    content: To finish the transgression,
  - type: text
    content: To make an end of sins,
  - type: note
    content: 2 Chr. 29:24; (Is. 53:10); Acts 10:43; (Rom. 5:10); Heb. 9:12, 14
  - type: text
    content: To make reconciliation for iniquity,
  - type: note
    content: Rev. 14:6
  - type: text
    content: To bring in everlasting righteousness,
  - type: text
    content: To seal up vision and prophecy,
  - type: note
    content: Ps. 45:7
  - type: text
    content: And to anoint the Most Holy.
  '25':
  - type: text
    content: “Know therefore and understand,
  - type: text
    content: That
  - type: text
    content: ' from the going forth of the command'
  - type: text
    content: To restore and build Jerusalem
  - type: text
    content: 'Until '
  - type: note
    content: Luke 2:1, 2; John 1:41; 4:25
  - type: text
    content: 'Messiah '
  - type: note
    content: Is. 55:4
  - type: text
    content: the Prince,
  - type: text
    content: There
  - type: text
    content: ' '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' seven weeks and sixty-two weeks;'
  - type: text
    content: The street shall be built again, and the wall,
  - type: text
    content: Even in troublesome times.
  '26':
  - type: text
    content: “And after the sixty-two weeks
  - type: note
    content: (Is. 53:8); Matt. 27:50; Mark 9:12; 15:37; (Luke 23:46; 24:26); John 19:30; Acts 8:32
  - type: text
    content: 'Messiah shall be cut off, '
  - type: note
    content: (1 Pet. 2:21)
  - type: text
    content: but not for Himself;
  - type: text
    content: 'And '
  - type: note
    content: Matt. 22:7
  - type: text
    content: the people of the prince who is to come
  - type: note
    content: Matt. 24:2; Mark 13:2; Luke 19:43, 44
  - type: text
    content: Shall destroy the city and the sanctuary.
  - type: text
    content: 'The end of it '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' with a flood,'
  - type: text
    content: And till the end of the war desolations are determined.
  '27':
  - type: text
    content: 'Then he shall confirm '
  - type: note
    content: Is. 42:6
  - type: text
    content: 'a covenant with '
  - type: note
    content: (Matt. 26:28)
  - type: text
    content: many for one week;
  - type: text
    content: But in the middle of the week
  - type: text
    content: He shall bring an end to sacrifice and offering.
  - type: text
    content: And on the wing of abominations shall be one who makes desolate,
  - type: note
    content: Dan. 11:36
  - type: text
    content: Even until the consummation, which is determined,
  - type: text
    content: Is poured out on the desolate.”
  '3':
  - type: note
    content: Neh. 1:4; Dan. 6:10; 10:15
  - type: text
    content: 'Then I set my face toward the Lord God to make request by prayer and supplications, with fasting, sackcloth, and ashes. '
  '4':
  - type: text
    content: 'And I prayed to the '
  - type: heading
    content: Lord
  - type: text
    content: ' my God, and made confession, and said, “O '
  - type: note
    content: Ex. 20:6
  - type: text
    content: 'Lord, great and awesome God, who keeps His covenant and mercy with those who love Him, and with those who keep His commandments, '
  '5':
  - type: note
    content: 1 Kin. 8:47, 48; Neh. 9:33; Ps. 106:6; Is. 64:5–7; Jer. 14:7
  - type: text
    content: 'we have sinned and committed iniquity, we have done wickedly and rebelled, even by departing from Your precepts and Your judgments. '
  '6':
  - type: note
    content: 2 Chr. 36:15; Jer. 44:4, 5
  - type: text
    content: 'Neither have we heeded Your servants the prophets, who spoke in Your name to our kings and our princes, to our fathers and all the people of the land. '
  '7':
  - type: text
    content: 'O Lord, '
  - type: note
    content: Neh. 9:33
  - type: text
    content: 'righteousness '
  - type: text
    content: belongs
  - type: text
    content: ' to You, but to us shame of face, as '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' this day—to the men of Judah, to the inhabitants of Jerusalem and all Israel, those near and those far off in all the countries to which You have driven them, because of the unfaithfulness which they have committed against You.'
  '8':
  - type: text
    content: '“O Lord, to us '
  - type: text
    content: belongs
  - type: text
    content: ' shame of face, to our kings, our princes, and our fathers, because we have sinned against You. '
  '9':
  - type: note
    content: (Neh. 9:17; Ps. 130:4, 7)
  - type: text
    content: 'To the Lord our God '
  - type: text
    content: belong
  - type: text
    content: ' mercy and forgiveness, though we have rebelled against Him. '
