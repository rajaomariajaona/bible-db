  '1':
  - type: heading
    content: Wise Sayings of Solomon
  - type: text
    content: 'The proverbs of '
  - type: note
    content: Prov. 1:1; 25:1
  - type: text
    content: 'Solomon:'
  - type: note
    content: Prov. 15:20; 17:21, 25; 19:13; 29:3, 15
  - type: text
    content: A wise son makes a glad father,
  - type: text
    content: 'But a foolish son '
  - type: text
    content: is
  - type: text
    content: ' the grief of his mother.'
  '10':
  - type: text
    content: He who winks with the eye causes trouble,
  - type: text
    content: But a prating fool will fall.
  '11':
  - type: text
    content: 'The mouth of the righteous '
  - type: text
    content: is
  - type: text
    content: ' a well of life,'
  - type: text
    content: But violence covers the mouth of the wicked.
  '12':
  - type: text
    content: Hatred stirs up strife,
  - type: text
    content: 'But '
  - type: note
    content: Prov. 17:9; (1 Cor. 13:4–7; James 5:20); 1 Pet. 4:8
  - type: text
    content: love covers all sins.
  '13':
  - type: text
