document_id: PRO.10,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wise Sayings of Solomon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The proverbs of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 1:1; 25:1
      marker-yv: yv-n
    - type: text
      text: 'Solomon:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 15:20; 17:21, 25; 19:13; 29:3, 15
      marker-yv: yv-n
    - type: text
      text: A wise son makes a glad father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a foolish son '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the grief of his mother.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He who winks with the eye causes trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a prating fool will fall.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The mouth of the righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a well of life,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But violence covers the mouth of the wicked.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Hatred stirs up strife,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 17:9; (1 Cor. 13:4–7; James 5:20); 1 Pet. 4:8
      marker-yv: yv-n
    - type: text
      text: love covers all sins.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Wisdom is found on the lips of him who has understanding,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 26:3
      marker-yv: yv-n
    - type: text
      text: 'a rod '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' for the back of him who is devoid of understanding.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
      text: ' store up knowledge,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 18:7
      marker-yv: yv-n
    - type: text
      text: 'the mouth of the foolish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' near destruction.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 31:24; Ps. 52:7; Prov. 18:11; (1 Tim. 6:17)
      marker-yv: yv-n
    - type: text
      text: 'rich man’s wealth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' his strong city;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The destruction of the poor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' their poverty.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The labor of the righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leads
    - type: text
      text: ' to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 6:23
      marker-yv: yv-n
    - type: text
      text: life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The wages of the wicked to sin.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'He who keeps instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' the way of life,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he who refuses correction goes astray.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Whoever '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 26:24
      marker-yv: yv-n
    - type: text
      text: 'hides hatred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has
    - type: text
      text: ' lying lips,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 15:3; 101:5
      marker-yv: yv-n
    - type: text
      text: 'whoever spreads slander '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a fool.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 11:2; (Prov. 18:21); Eccl. 5:3
      marker-yv: yv-n
    - type: text
      text: In the multitude of words sin is not lacking,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 17:27; (James 1:19; 3:2)
      marker-yv: yv-n
    - type: text
      text: 'he who restrains his lips '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' wise.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 49:7; Prov. 11:4; 21:6; Ezek. 7:19; (Luke 12:19, 20)
      marker-yv: yv-n
    - type: text
      text: Treasures of wickedness profit nothing,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 4:27
      marker-yv: yv-n
    - type: text
      text: But righteousness delivers from death.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The tongue of the righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' choice silver;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The heart of the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: worth
    - type: text
      text: ' little.'
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The lips of the righteous feed many,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But fools die for lack of wisdom.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 24:35; 26:12; Deut. 8:18; Ps. 37:22; Prov. 8:21
      marker-yv: yv-n
    - type: text
      text: 'The blessing of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' makes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' rich,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And He adds no sorrow with it.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 2:14; 15:21
      marker-yv: yv-n
    - type: text
      text: 'To do evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' like sport to a fool,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a man of understanding has wisdom.
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 15:21; Prov. 1:27; Is. 66:4
      marker-yv: yv-n
    - type: text
      text: The fear of the wicked will come upon him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 145:19; Prov. 15:8; Matt. 5:6; (1 John 5:14, 15)
      marker-yv: yv-n
    - type: text
      text: the desire of the righteous will be granted.
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'When the whirlwind passes by, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:9, 10
      marker-yv: yv-n
    - type: text
      text: 'the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no '
    - type: usfm
      marker: it
      children:
      - type: text
        text: more,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 15:5; Prov. 12:3; Matt. 7:24, 25
      marker-yv: yv-n
    - type: text
      text: 'the righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has
    - type: text
      text: ' an everlasting foundation.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: As vinegar to the teeth and smoke to the eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the lazy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' to those who send him.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 9:11
      marker-yv: yv-n
    - type: text
      text: 'The fear of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' prolongs days,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 15:32
      marker-yv: yv-n
    - type: text
      text: the years of the wicked will be shortened.
  '28':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The hope of the righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' gladness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 8:13
      marker-yv: yv-n
    - type: text
      text: expectation of the wicked will perish.
  '29':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The way of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' strength for the upright,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 1:6
      marker-yv: yv-n
    - type: text
      text: 'destruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' to the workers of iniquity.'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 34:9, 10; 37:25; Prov. 28:25; (Matt. 6:33)
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will not allow the righteous soul to famish,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But He casts away the desire of the wicked.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:22; Prov. 2:21
      marker-yv: yv-n
    - type: text
      text: The righteous will never be removed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the wicked will not inhabit the earth.
  '31':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:30; Prov. 10:13
      marker-yv: yv-n
    - type: text
      text: The mouth of the righteous brings forth wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the perverse tongue will be cut out.
  '32':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: The lips of the righteous know what is acceptable,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the mouth of the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' perverse.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 19:15
      marker-yv: yv-n
    - type: text
      text: He who has a slack hand becomes poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 12:24; 13:4; 21:5
      marker-yv: yv-n
    - type: text
      text: the hand of the diligent makes rich.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He who gathers in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 6:8
      marker-yv: yv-n
    - type: text
      text: 'summer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a wise son;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He who sleeps in harvest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 19:26
      marker-yv: yv-n
    - type: text
      text: a son who causes shame.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Blessings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' on the head of the righteous,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But violence covers the mouth of the wicked.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 112:6; Eccl. 8:10
      marker-yv: yv-n
    - type: text
      text: 'The memory of the righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' blessed,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the name of the wicked will rot.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The wise in heart will receive commands,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 10:10
      marker-yv: yv-n
    - type: text
      text: But a prating fool will fall.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 23:4; Prov. 3:23; 28:18; Is. 33:15, 16)
      marker-yv: yv-n
    - type: text
      text: He who walks with integrity walks securely,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he who perverts his ways will become known.
