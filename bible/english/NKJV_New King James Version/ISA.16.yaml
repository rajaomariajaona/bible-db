document_id: ISA.16,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Moab Destroyed
  - type: text
    content: 'Send '
  - type: note
    content: 2 Kin. 3:4; Ezra 7:17
  - type: text
    content: the lamb to the ruler of the land,
  - type: note
    content: 2 Kin. 14:7; Is. 42:11
  - type: text
    content: From Sela to the wilderness,
  - type: text
    content: To the mount of the daughter of Zion.
  '10':
  - type: note
    content: Is. 24:8; Jer. 48:33
  - type: text
    content: Gladness is taken away,
  - type: text
    content: And joy from the plentiful field;
  - type: text
    content: In the vineyards there will be no singing,
  - type: text
    content: Nor will there be shouting;
  - type: text
    content: No treaders will tread out wine in the presses;
  - type: text
    content: I have made their shouting cease.
  '11':
  - type: text
    content: 'Therefore '
  - type: note
    content: Is. 15:5; 63:15; Jer. 48:36; Hos. 11:8; Phil. 2:1
  - type: text
    content: my heart shall resound like a harp for Moab,
  - type: text
    content: And my inner being for Kir Heres.
  '12':
  - type: text
    content: And it shall come to pass,
  - type: text
    content: 'When it is seen that Moab is weary on '
  - type: note
    content: Is. 15:2
  - type: text
    content: the high place,
  - type: text
    content: That he will come to his sanctuary to pray;
  - type: text
    content: But he will not prevail.
  '13':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the word which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has spoken concerning Moab since that time. '
  '14':
  - type: text
    content: 'But now the '
  - type: heading
    content: Lord
  - type: text
    content: ' has spoken, saying, “Within three years, '
  - type: note
    content: Job 7:1; 14:6; Is. 21:16
  - type: text
    content: 'as the years of a hired man, the glory of Moab will be despised with all that great multitude, and the remnant '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' very small '
  - type: text
    content: and
  - type: text
    content: ' feeble.”'
  '2':
  - type: text
    content: 'For it shall be as a '
  - type: note
    content: Prov. 27:8
  - type: text
    content: wandering bird thrown out of the nest;
  - type: text
    content: So
  - type: text
    content: ' shall be the daughters of Moab at the fords of the '
  - type: note
    content: Num. 21:13
  - type: text
    content: Arnon.
  '3':
  - type: text
    content: “Take counsel, execute judgment;
  - type: text
    content: Make your shadow like the night in the middle of the day;
  - type: text
    content: Hide the outcasts,
  - type: text
    content: Do not betray him who escapes.
  '4':
  - type: text
    content: Let My outcasts dwell with you, O Moab;
  - type: text
    content: Be a shelter to them from the face of the spoiler.
  - type: text
    content: For the extortioner is at an end,
  - type: text
    content: Devastation ceases,
  - type: text
    content: The oppressors are consumed out of the land.
  '5':
  - type: text
    content: 'In mercy '
  - type: note
    content: (Is. 9:6, 7; 32:1; 55:4; Dan. 7:14; Mic. 4:7; Luke 1:33; Rev. 11:15)
  - type: text
    content: the throne will be established;
  - type: text
    content: And One will sit on it in truth, in the tabernacle of David,
  - type: note
    content: Ps. 72:2
  - type: text
    content: 'Judging and seeking justice and hastening '
  - type: note
    content: Is. 9:7
  - type: text
    content: righteousness.”
  '6':
  - type: text
    content: 'We have heard of the '
  - type: note
    content: Jer. 48:29; Amos 2:1; Obad. 3, 4; Zeph. 2:8, 10
  - type: text
    content: pride of Moab—
  - type: text
    content: He
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' very proud—'
  - type: text
    content: Of his haughtiness and his pride and his wrath;
  - type: note
    content: Is. 28:15
  - type: text
    content: But
  - type: text
    content: ' his lies '
  - type: text
    content: shall
  - type: text
    content: ' not '
  - type: text
    content: be
  - type: text
    content: ' so.'
  '7':
  - type: text
    content: 'Therefore Moab shall '
  - type: note
    content: Jer. 48:20
  - type: text
    content: wail for Moab;
  - type: text
    content: Everyone shall wail.
  - type: text
    content: 'For the foundations '
  - type: note
    content: 2 Kin. 3:25; Jer. 48:31
  - type: text
    content: of Kir Hareseth you shall mourn;
  - type: text
    content: 'Surely '
  - type: text
    content: they
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' stricken.'
  '8':
  - type: text
    content: 'For '
  - type: note
    content: Is. 24:7
  - type: text
    content: the fields of Heshbon languish,
  - type: text
    content: And
  - type: text
    content: ' '
  - type: note
    content: Is. 16:9
  - type: text
    content: the vine of Sibmah;
  - type: text
    content: The lords of the nations have broken down its choice plants,
  - type: text
    content: Which have reached to Jazer
  - type: text
    content: And wandered through the wilderness.
  - type: text
    content: Her branches are stretched out,
  - type: text
    content: 'They are gone over the '
  - type: note
    content: Jer. 48:32
  - type: text
    content: sea.
  '9':
  - type: text
    content: Therefore I will bewail the vine of Sibmah,
  - type: text
    content: With the weeping of Jazer;
  - type: text
    content: I will drench you with my tears,
  - type: note
    content: Is. 15:4
  - type: text
    content: O Heshbon and Elealeh;
  - type: text
    content: For battle cries have fallen
  - type: text
    content: Over your summer fruits and your harvest.
