  - type: text
    content: ' will answer him who comes, according to the multitude of his idols, '
  '5':
  - type: text
    content: that I may seize the house of Israel by their heart, because they are all estranged from Me by their idols.” ’
  '6':
  - type: text
    content: '“Therefore say to the house of Israel, ‘Thus says the Lord '
  - type: heading
    content: God
  - type: text
    content: ': “Repent, turn away from your idols, and '
  - type: note
    content: 1 Sam. 7:3; Neh. 1:9; Is. 2:20; 30:22; 55:6, 7; Ezek. 18:30
  - type: text
    content: 'turn your faces away from all your abominations. '
  '7':
  - type: text
    content: 'For anyone of the house of Israel, or of the strangers who dwell in Israel, who separates himself from Me and sets up his idols in his heart and puts before him what causes him to stumble into iniquity, then comes to a prophet to inquire of him concerning Me, I the '
  - type: heading
    content: Lord
  - type: text
    content: ' will answer him by Myself. '
