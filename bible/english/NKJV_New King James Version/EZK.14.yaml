  '4':
  - type: text
    content: '“Therefore speak to them, and say to them, ‘Thus says the Lord '
  - type: heading
    content: God
  - type: text
    content: ': “Everyone of the house of Israel who sets up his idols in his heart, and puts before him what causes him to stumble into iniquity, and then comes to the prophet, I the '
  - type: heading
