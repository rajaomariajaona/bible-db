  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' no water, but mire. So Jeremiah sank in the mire.'
  '7':
  - type: note
    content: Jer. 39:16
  - type: text
    content: 'Now Ebed-Melech the Ethiopian, one of the eunuchs, who was in the king’s house, heard that they had put Jeremiah in the dungeon. When the king was sitting at the Gate of Benjamin, '
  '8':
  - type: text
    content: 'Ebed-Melech went out of the king’s house and spoke to the king, saying: '
  '9':
  - type: text
    content: '“My lord the king, these men have done evil in all that they have done to Jeremiah the prophet, whom they have cast into the dungeon, and he is likely to die from hunger in the place where he is. For '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
