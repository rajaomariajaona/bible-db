  '24':
  - type: text
    content: 'Then Zedekiah said to Jeremiah, “Let no one know of these words, and you shall not die. '
  '25':
  - type: text
    content: 'But if the princes hear that I have talked with you, and they come to you and say to you, ‘Declare to us now what you have said to the king, and also what the king said to you; do not hide '
  - type: text
    content: it
  - type: text
    content: ' from us, and we will not put you to death,’ '
  '26':
  - type: text
    content: 'then you shall say to them, '
  - type: note
    content: Jer. 37:20
  - type: text
    content: '‘I presented my request before the king, that he would not make me return '
  - type: note
    content: Jer. 37:15
  - type: text
    content: to Jonathan’s house to die there.’ ”
  '27':
  - type: text
    content: 'Then all the princes came to Jeremiah and asked him. And he told them according to all these words that the king had commanded. So they stopped speaking with him, for the conversation had not been heard. '
  '28':
  - type: text
    content: 'Now '
  - type: note
    content: (Ps. 23:4); Jer. 37:21; 39:14
  - type: text
    content: 'Jeremiah remained in the court of the prison until the day that Jerusalem was taken. And he was '
  - type: text
    content: there
  - type: text
    content: ' when Jerusalem was taken.'
  '3':
  - type: text
    content: 'Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: Jer. 21:10; 32:3
  - type: text
    content: '‘This city shall surely be '
  - type: note
    content: Jer. 34:2
  - type: text
    content: given into the hand of the king of Babylon’s army, which shall take it.’ ”
  '4':
  - type: text
    content: 'Therefore the princes said to the king, “Please, '
  - type: note
    content: Jer. 26:11
  - type: text
    content: let this man be put to death, for thus he weakens the hands of the men of war who remain in this city, and the hands of all the people, by speaking such words to them. For this man does not seek the welfare of this people, but their harm.”
  '5':
  - type: text
    content: 'Then Zedekiah the king said, “Look, he '
  - type: text
    content: is
  - type: text
    content: ' in your hand. For the king can '
  - type: text
    content: do
  - type: text
    content: ' nothing against you.” '
