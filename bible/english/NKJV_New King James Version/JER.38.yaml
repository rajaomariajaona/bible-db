document_id: JER.38,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah in the Dungeon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now Shephatiah the son of Mattan, Gedaliah the son of Pashhur, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 37:3
      marker-yv: yv-n
    - type: text
      text: 'Jucal the son of Shelemiah, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 21:1
      marker-yv: yv-n
    - type: text
      text: 'Pashhur the son of Malchiah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 21:8
      marker-yv: yv-n
    - type: text
      text: 'heard the words that Jeremiah had spoken to all the people, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then the king commanded Ebed-Melech the Ethiopian, saying, “Take from here thirty men with you, and lift Jeremiah the prophet out of the dungeon before he dies.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So Ebed-Melech took the men with him and went into the house of the king under the treasury, and took from there old clothes and old rags, and let them down by ropes into the dungeon to Jeremiah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then Ebed-Melech the Ethiopian said to Jeremiah, “Please put these old clothes and rags under your armpits, under the ropes.” And Jeremiah did so. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So they pulled Jeremiah up with ropes and lifted him out of the dungeon. And Jeremiah remained '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 3:25; Jer. 37:21; Acts 23:35; 24:27; 28:16, 30
      marker-yv: yv-n
    - type: text
      text: in the court of the prison.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zedekiah’s Fears and Jeremiah’s Advice
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then Zedekiah the king sent and had Jeremiah the prophet brought to him at the third entrance of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. And the king said to Jeremiah, “I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 21:1, 2; 37:17
      marker-yv: yv-n
    - type: text
      text: ask you something. Hide nothing from me.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Jeremiah said to Zedekiah, “If I declare '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' to you, will you not surely put me to death? And if I give you advice, you will not listen to me.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: So Zedekiah the king swore secretly to Jeremiah, saying, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:22; Is. 57:16; Zech. 12:1; (Acts 17:25, 28)
      marker-yv: yv-n
    - type: text
      text: who made our very souls, I will not put you to death, nor will I give you into the hand of these men who seek your life.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Jeremiah said to Zedekiah, “Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of hosts, the God of Israel: ‘If you surely '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:12
      marker-yv: yv-n
    - type: text
      text: 'surrender '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 39:3
      marker-yv: yv-n
    - type: text
      text: 'to the king of Babylon’s princes, then your soul shall live; this city shall not be burned with fire, and you and your house shall live. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But if you do not surrender to the king of Babylon’s princes, then this city shall be given into the hand of the Chaldeans; they shall burn it with fire, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 32:4; 34:3
      marker-yv: yv-n
    - type: text
      text: you shall not escape from their hand.’ ”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And Zedekiah the king said to Jeremiah, “I am afraid of the Jews who have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 39:9
      marker-yv: yv-n
    - type: text
      text: 'defected to the Chaldeans, lest they deliver me into their hand, and they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 31:4
      marker-yv: yv-n
    - type: text
      text: abuse me.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 21:9
      marker-yv: yv-n
    - type: text
      text: '‘He who remains in this city shall die by the sword, by famine, and by pestilence; but he who goes over to the Chaldeans shall live; his life shall be as a prize to him, and he shall live.’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But Jeremiah said, “They shall not deliver '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you.
    - type: text
      text: ' Please, obey the voice of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' which I speak to you. So it shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 40:9
      marker-yv: yv-n
    - type: text
      text: 'well with you, and your soul shall live. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But if you refuse to surrender, this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the word that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has shown me: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '‘Now behold, all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 8:10
      marker-yv: yv-n
    - type: text
      text: 'women who are left in the king of Judah’s house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' surrendered to the king of Babylon’s princes, and those '
    - type: usfm
      marker: it
      children:
      - type: text
        text: women
    - type: text
      text: ' shall say:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your close friends have set upon you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And prevailed against you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your feet have sunk in the mire,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' they have turned away again.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '‘So they shall surrender all your wives and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 39:6; 41:10
      marker-yv: yv-n
    - type: text
      text: 'children to the Chaldeans. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 39:5
      marker-yv: yv-n
    - type: text
      text: You shall not escape from their hand, but shall be taken by the hand of the king of Babylon. And you shall cause this city to be burned with fire.’ ”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then Zedekiah said to Jeremiah, “Let no one know of these words, and you shall not die. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But if the princes hear that I have talked with you, and they come to you and say to you, ‘Declare to us now what you have said to the king, and also what the king said to you; do not hide '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' from us, and we will not put you to death,’ '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'then you shall say to them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 37:20
      marker-yv: yv-n
    - type: text
      text: '‘I presented my request before the king, that he would not make me return '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 37:15
      marker-yv: yv-n
    - type: text
      text: to Jonathan’s house to die there.’ ”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Then all the princes came to Jeremiah and asked him. And he told them according to all these words that the king had commanded. So they stopped speaking with him, for the conversation had not been heard. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 23:4); Jer. 37:21; 39:14
      marker-yv: yv-n
    - type: text
      text: 'Jeremiah remained in the court of the prison until the day that Jerusalem was taken. And he was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' when Jerusalem was taken.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 21:10; 32:3
      marker-yv: yv-n
    - type: text
      text: '‘This city shall surely be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 34:2
      marker-yv: yv-n
    - type: text
      text: given into the hand of the king of Babylon’s army, which shall take it.’ ”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Therefore the princes said to the king, “Please, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 26:11
      marker-yv: yv-n
    - type: text
      text: let this man be put to death, for thus he weakens the hands of the men of war who remain in this city, and the hands of all the people, by speaking such words to them. For this man does not seek the welfare of this people, but their harm.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then Zedekiah the king said, “Look, he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in your hand. For the king can '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do
    - type: text
      text: ' nothing against you.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 37:21; Lam. 3:55
      marker-yv: yv-n
    - type: text
      text: 'So they took Jeremiah and cast him into the dungeon of Malchiah the king’s son, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in the court of the prison, and they let Jeremiah down with ropes. And in the dungeon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' no water, but mire. So Jeremiah sank in the mire.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 39:16
      marker-yv: yv-n
    - type: text
      text: 'Now Ebed-Melech the Ethiopian, one of the eunuchs, who was in the king’s house, heard that they had put Jeremiah in the dungeon. When the king was sitting at the Gate of Benjamin, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ebed-Melech went out of the king’s house and spoke to the king, saying: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“My lord the king, these men have done evil in all that they have done to Jeremiah the prophet, whom they have cast into the dungeon, and he is likely to die from hunger in the place where he is. For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 37:21
      marker-yv: yv-n
    - type: text
      text: 'no more bread in the city.” '
