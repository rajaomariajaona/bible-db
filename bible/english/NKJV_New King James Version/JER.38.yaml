  '1':
  - type: heading
    content: Jeremiah in the Dungeon
  - type: text
    content: 'Now Shephatiah the son of Mattan, Gedaliah the son of Pashhur, '
  - type: note
    content: Jer. 37:3
  - type: text
    content: 'Jucal the son of Shelemiah, and '
  - type: note
    content: Jer. 21:1
  - type: text
    content: 'Pashhur the son of Malchiah '
  - type: note
    content: Jer. 21:8
  - type: text
    content: 'heard the words that Jeremiah had spoken to all the people, saying, '
  '10':
  - type: text
    content: 'Then the king commanded Ebed-Melech the Ethiopian, saying, “Take from here thirty men with you, and lift Jeremiah the prophet out of the dungeon before he dies.” '
  '11':
  - type: text
    content: 'So Ebed-Melech took the men with him and went into the house of the king under the treasury, and took from there old clothes and old rags, and let them down by ropes into the dungeon to Jeremiah. '
  '12':
  - type: text
    content: 'Then Ebed-Melech the Ethiopian said to Jeremiah, “Please put these old clothes and rags under your armpits, under the ropes.” And Jeremiah did so. '
  '13':
  - type: text
    content: 'So they pulled Jeremiah up with ropes and lifted him out of the dungeon. And Jeremiah remained '
  - type: note
    content: Neh. 3:25; Jer. 37:21; Acts 23:35; 24:27; 28:16, 30
  - type: text
    content: in the court of the prison.
  - type: heading
    content: Zedekiah’s Fears and Jeremiah’s Advice
  '14':
  - type: text
    content: 'Then Zedekiah the king sent and had Jeremiah the prophet brought to him at the third entrance of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. And the king said to Jeremiah, “I will '
  - type: note
    content: Jer. 21:1, 2; 37:17
  - type: text
    content: ask you something. Hide nothing from me.”
  '15':
  - type: text
    content: 'Jeremiah said to Zedekiah, “If I declare '
  - type: text
    content: it
  - type: text
    content: ' to you, will you not surely put me to death? And if I give you advice, you will not listen to me.”'
  '16':
  - type: text
    content: So Zedekiah the king swore secretly to Jeremiah, saying, “
  - type: text
    content: As
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' lives, '
  - type: note
    content: Num. 16:22; Is. 57:16; Zech. 12:1; (Acts 17:25, 28)
  - type: text
    content: who made our very souls, I will not put you to death, nor will I give you into the hand of these men who seek your life.”
  '17':
  - type: text
    content: 'Then Jeremiah said to Zedekiah, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ', the God of hosts, the God of Israel: ‘If you surely '
  - type: note
    content: 2 Kin. 24:12
  - type: text
    content: 'surrender '
  - type: note
    content: Jer. 39:3
  - type: text
    content: 'to the king of Babylon’s princes, then your soul shall live; this city shall not be burned with fire, and you and your house shall live. '
  '18':
  - type: text
    content: 'But if you do not surrender to the king of Babylon’s princes, then this city shall be given into the hand of the Chaldeans; they shall burn it with fire, and '
  - type: note
    content: Jer. 32:4; 34:3
  - type: text
    content: you shall not escape from their hand.’ ”
  '19':
  - type: text
    content: 'And Zedekiah the king said to Jeremiah, “I am afraid of the Jews who have '
  - type: note
    content: Jer. 39:9
  - type: text
    content: 'defected to the Chaldeans, lest they deliver me into their hand, and they '
  - type: note
    content: 1 Sam. 31:4
  - type: text
    content: abuse me.”
  '2':
  - type: text
    content: '“Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: Jer. 21:9
  - type: text
    content: '‘He who remains in this city shall die by the sword, by famine, and by pestilence; but he who goes over to the Chaldeans shall live; his life shall be as a prize to him, and he shall live.’ '
  '20':
  - type: text
    content: 'But Jeremiah said, “They shall not deliver '
  - type: text
