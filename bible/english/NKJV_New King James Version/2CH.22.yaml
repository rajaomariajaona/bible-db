document_id: 2CH.22,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Ahaziah Reigns in Judah
  - type: text
    content: 'Then the inhabitants of Jerusalem made '
  - type: note
    content: 2 Chr. 21:17; 22:6
  - type: text
    content: 'Ahaziah his youngest son king in his place, for the raiders who came with the '
  - type: note
    content: 2 Chr. 21:16
  - type: text
    content: 'Arabians into the camp had killed all the '
  - type: note
    content: 2 Chr. 21:17
  - type: text
    content: 'older '
  - type: text
    content: sons.
  - type: text
    content: ' So Ahaziah the son of Jehoram, king of Judah, reigned. '
  '10':
  - type: note
    content: 2 Kin. 11:1–3
  - type: text
    content: 'Now when Athaliah the mother of Ahaziah saw that her son was dead, she arose and destroyed all the royal heirs of the house of Judah. '
  '11':
  - type: text
    content: 'But Jehoshabeath, the daughter of the king, took '
  - type: note
    content: 2 Kin. 12:18
  - type: text
    content: 'Joash the son of Ahaziah, and stole him away from among the king’s sons who were being murdered, and put him and his nurse in a bedroom. So Jehoshabeath, the daughter of King Jehoram, the wife of Jehoiada the priest (for she was the sister of Ahaziah), hid him from Athaliah so that she did not kill him. '
  '12':
  - type: text
    content: And he was hidden with them in the house of God for six years, while Athaliah reigned over the land.
  '2':
  - type: text
    content: 'Ahaziah '
  - type: text
    content: was
  - type: text
    content: ' forty-two years old when he became king, and he reigned one year in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 21:6
  - type: text
    content: 'Athaliah the granddaughter of Omri. '
  '3':
  - type: text
    content: 'He also walked in the ways of the house of Ahab, for his mother advised him to do wickedly. '
  '4':
  - type: text
    content: 'Therefore he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', like the house of Ahab; for they were his counselors after the death of his father, to his destruction. '
  '5':
  - type: text
    content: 'He also followed their advice, and went with Jehoram the son of Ahab king of Israel to war against Hazael king of Syria at Ramoth Gilead; and the Syrians wounded Joram. '
  '6':
  - type: note
    content: 2 Kin. 9:15
  - type: text
    content: Then he returned to Jezreel to recover from the wounds which he had received at Ramah, when he fought against Hazael king of Syria. And Azariah the son of Jehoram, king of Judah, went down to see Jehoram the son of Ahab in Jezreel, because he was sick.
  '7':
  - type: text
    content: 'His going to Joram '
  - type: note
    content: Judg. 14:4; 1 Kin. 12:15; 2 Chr. 10:15
  - type: text
    content: 'was God’s occasion for Ahaziah’s downfall; for when he arrived, '
  - type: note
    content: 2 Kin. 9:21–24
  - type: text
    content: 'he went out with Jehoram against Jehu the son of Nimshi, '
  - type: note
    content: 2 Kin. 9:6, 7
  - type: text
    content: 'whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' had anointed to cut off the house of Ahab. '
  '8':
  - type: text
    content: 'And it happened, when Jehu was '
  - type: note
    content: 2 Kin. 9:22–24
  - type: text
    content: 'executing judgment on the house of Ahab, and '
  - type: note
    content: 2 Kin. 10:10–14; Hos. 1:4
  - type: text
    content: 'found the princes of Judah and the sons of Ahaziah’s brothers who served Ahaziah, that he killed them. '
  '9':
  - type: note
    content: (2 Kin. 9:27)
  - type: text
    content: 'Then he searched for Ahaziah; and they caught him (he was hiding in Samaria), and brought him to Jehu. When they had killed him, they buried him, “because,” they said, “he is the son of '
  - type: note
    content: 1 Kin. 15:24
  - type: text
    content: 'Jehoshaphat, who '
  - type: note
    content: 2 Chr. 17:4; 20:3, 4
  - type: text
    content: 'sought the '
  - type: heading
    content: Lord
  - type: text
    content: ' with all his heart.”'
  - type: text
    content: So the house of Ahaziah had no one to assume power over the kingdom.
  - type: heading
    content: Athaliah Reigns in Judah
