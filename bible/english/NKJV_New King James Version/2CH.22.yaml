    marker: x
    children:
    - type: text
      text: 2 Chr. 21:17; 22:6
    marker-yv: yv-n
  - type: text
    text: 'Ahaziah his youngest son king in his place, for the raiders who came with the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 21:16
    marker-yv: yv-n
  - type: text
    text: 'Arabians into the camp had killed all the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 21:17
    marker-yv: yv-n
  - type: text
    text: 'older '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sons.
  - type: text
    text: ' So Ahaziah the son of Jehoram, king of Judah, reigned. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ahaziah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' forty-two years old when he became king, and he reigned one year in Jerusalem. His mother’s name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 21:6
    marker-yv: yv-n
  - type: text
    text: 'Athaliah the granddaughter of Omri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He also walked in the ways of the house of Ahab, for his mother advised him to do wickedly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Therefore he did evil in the sight of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', like the house of Ahab; for they were his counselors after the death of his father, to his destruction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He also followed their advice, and went with Jehoram the son of Ahab king of Israel to war against Hazael king of Syria at Ramoth Gilead; and the Syrians wounded Joram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 9:15
    marker-yv: yv-n
  - type: text
    text: Then he returned to Jezreel to recover from the wounds which he had received at Ramah, when he fought against Hazael king of Syria. And Azariah the son of Jehoram, king of Judah, went down to see Jehoram the son of Ahab in Jezreel, because he was sick.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'His going to Joram '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 14:4; 1 Kin. 12:15; 2 Chr. 10:15
    marker-yv: yv-n
  - type: text
    text: 'was God’s occasion for Ahaziah’s downfall; for when he arrived, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 9:21–24
    marker-yv: yv-n
  - type: text
    text: 'he went out with Jehoram against Jehu the son of Nimshi, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 9:6, 7
    marker-yv: yv-n
  - type: text
    text: 'whom the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had anointed to cut off the house of Ahab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And it happened, when Jehu was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 9:22–24
    marker-yv: yv-n
  - type: text
    text: 'executing judgment on the house of Ahab, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 10:10–14; Hos. 1:4
    marker-yv: yv-n
  - type: text
    text: 'found the princes of Judah and the sons of Ahaziah’s brothers who served Ahaziah, that he killed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Kin. 9:27)
    marker-yv: yv-n
  - type: text
    text: 'Then he searched for Ahaziah; and they caught him (he was hiding in Samaria), and brought him to Jehu. When they had killed him, they buried him, “because,” they said, “he is the son of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 15:24
    marker-yv: yv-n
  - type: text
    text: 'Jehoshaphat, who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 17:4; 20:3, 4
    marker-yv: yv-n
  - type: text
    text: 'sought the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with all his heart.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: So the house of Ahaziah had no one to assume power over the kingdom.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Athaliah Reigns in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 11:1–3
    marker-yv: yv-n
  - type: text
    text: 'Now when Athaliah the mother of Ahaziah saw that her son was dead, she arose and destroyed all the royal heirs of the house of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But Jehoshabeath, the daughter of the king, took '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 12:18
    marker-yv: yv-n
  - type: text
    text: 'Joash the son of Ahaziah, and stole him away from among the king’s sons who were being murdered, and put him and his nurse in a bedroom. So Jehoshabeath, the daughter of King Jehoram, the wife of Jehoiada the priest (for she was the sister of Ahaziah), hid him from Athaliah so that she did not kill him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And he was hidden with them in the house of God for six years, while Athaliah reigned over the land.
