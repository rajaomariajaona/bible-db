document_id: NEH.4,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Wall Defended Against Enemies
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it so happened, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 2:10, 19
      marker-yv: yv-n
    - type: text
      text: 'when Sanballat heard that we were rebuilding the wall, that he was furious and very indignant, and mocked the Jews. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Judah said, “The strength of the laborers is failing, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' so much rubbish that we are not able to build the wall.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And our adversaries said, “They will neither know nor see anything, till we come into their midst and kill them and cause the work to cease.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it was, when the Jews who dwelt near them came, that they told us ten times, “From whatever place you turn, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' upon us.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore I positioned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' behind the lower parts of the wall, at the openings; and I set the people according to their families, with their swords, their spears, and their bows. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I looked, and arose and said to the nobles, to the leaders, and to the rest of the people, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Num. 14:9); Deut. 1:29
      marker-yv: yv-n
    - type: text
      text: '“Do not be afraid of them. Remember the Lord, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 10:17)
      marker-yv: yv-n
    - type: text
      text: 'great and awesome, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 10:12
      marker-yv: yv-n
    - type: text
      text: fight for your brethren, your sons, your daughters, your wives, and your houses.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it happened, when our enemies heard that it was known to us, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:12
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' God had brought their plot to nothing, that all of us returned to the wall, everyone to his work. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it was, from that time on, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' half of my servants worked at construction, while the other half held the spears, the shields, the bows, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wore
    - type: text
      text: ' armor; and the leaders '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' behind all the house of Judah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those who built on the wall, and those who carried burdens, loaded themselves so that with one hand they worked at construction, and with the other held a weapon. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every one of the builders had his sword girded at his side as he built. And the one who sounded the trumpet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' beside me.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I said to the nobles, the rulers, and the rest of the people, “The work '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' great and extensive, and we are separated far from one another on the wall. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he spoke before his brethren and the army of Samaria, and said, “What are these feeble Jews doing? Will they fortify themselves? Will they offer sacrifices? Will they complete it in a day? Will they revive the stones from the heaps of rubbish—
    - type: usfm
      marker: it
      children:
      - type: text
        text: stones
    - type: text
      text: ' that are burned?”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherever you hear the sound of the trumpet, rally to us there. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 14:14, 25; Deut. 1:30; 3:22; 20:4; Josh. 23:10; 2 Chr. 20:29
      marker-yv: yv-n
    - type: text
      text: Our God will fight for us.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So we labored in the work, and half of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' held the spears from daybreak until the stars appeared. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the same time I also said to the people, “Let each man and his servant stay at night in Jerusalem, that they may be our guard by night and a working party by day.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So neither I, my brethren, my servants, nor the men of the guard who followed me took off our clothes, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: except
    - type: text
      text: ' that everyone took them off for washing.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 2:10, 19
      marker-yv: yv-n
    - type: text
      text: 'Tobiah the Ammonite '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' beside him, and he said, “Whatever they build, if even a fox goes up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' he will break down their stone wall.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 123:3, 4
      marker-yv: yv-n
    - type: text
      text: 'Hear, O our God, for we are despised; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 79:12; Prov. 3:34
      marker-yv: yv-n
    - type: text
      text: 'turn their reproach on their own heads, and give them as plunder to a land of captivity! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 69:27, 28; 109:14, 15; Jer. 18:23
      marker-yv: yv-n
    - type: text
      text: 'Do not cover their iniquity, and do not let their sin be blotted out from before You; for they have provoked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You
    - type: text
      text: ' to anger before the builders.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So we built the wall, and the entire wall was joined together up to half its '
    - type: usfm
      marker: it
      children:
      - type: text
        text: height,
    - type: text
      text: ' for the people had a mind to work.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it happened, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 4:1
      marker-yv: yv-n
    - type: text
      text: 'when Sanballat, Tobiah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 2:19
      marker-yv: yv-n
    - type: text
      text: 'the Arabs, the Ammonites, and the Ashdodites heard that the walls of Jerusalem were being restored and the gaps were beginning to be closed, that they became very angry, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and all of them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 83:3–5
      marker-yv: yv-n
    - type: text
      text: 'conspired together to come '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' attack Jerusalem and create confusion. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 50:15)
      marker-yv: yv-n
    - type: text
      text: we made our prayer to our God, and because of them we set a watch against them day and night.
