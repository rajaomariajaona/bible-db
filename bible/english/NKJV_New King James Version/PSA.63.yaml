document_id: PSA.63
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joy in the Fellowship of God
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A Psalm of David '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 22:5
    marker-yv: yv-n
  - type: text
    text: when he was in the wilderness of Judah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O God, You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' my God;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Early will I seek You;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 42:2; (Matt. 5:6)
    marker-yv: yv-n
  - type: text
    text: My soul thirsts for You;
- type: usfm
  marker: q2
  children:
  - type: text
    text: My flesh longs for You
- type: usfm
  marker: q2
  children:
  - type: text
    text: In a dry and thirsty land
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where there is no water.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So I have looked for You in the sanctuary,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'To see '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 27:4
    marker-yv: yv-n
  - type: text
    text: Your power and Your glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 138:2
    marker-yv: yv-n
  - type: text
    text: 'Because Your lovingkindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' better than life,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: My lips shall praise You.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Thus I will bless You while I live;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I will '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 28:2; 143:6
    marker-yv: yv-n
  - type: text
    text: lift up my hands in Your name.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My soul shall be satisfied as with marrow and fatness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And my mouth shall praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: You
  - type: text
    text: ' with joyful lips.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 42:8
    marker-yv: yv-n
  - type: text
    text: I remember You on my bed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I meditate on You in the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: night
  - type: text
    text: ' watches.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Because You have been my help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore in the shadow of Your wings I will rejoice.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: My soul follows close behind You;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your right hand upholds me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But those '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' seek my life, to destroy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shall go into the lower parts of the earth.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They shall fall by the sword;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They shall be a portion for jackals.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But the king shall rejoice in God;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 6:13; (Is. 45:23; 65:16)
    marker-yv: yv-n
  - type: text
    text: Everyone who swears by Him shall glory;
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the mouth of those who speak lies shall be stopped.
