document_id: PSA.63,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Joy in the Fellowship of God
  - type: text
    content: 'A Psalm of David '
  - type: note
    content: 1 Sam. 22:5
  - type: text
    content: when he was in the wilderness of Judah.
  - type: text
    content: 'O God, You '
  - type: text
    content: are
  - type: text
    content: ' my God;'
  - type: text
    content: Early will I seek You;
  - type: note
    content: Ps. 42:2; (Matt. 5:6)
  - type: text
    content: My soul thirsts for You;
  - type: text
    content: My flesh longs for You
  - type: text
    content: In a dry and thirsty land
  - type: text
    content: Where there is no water.
  '10':
  - type: text
    content: They shall fall by the sword;
  - type: text
    content: They shall be a portion for jackals.
  '11':
  - type: text
    content: But the king shall rejoice in God;
  - type: note
    content: Deut. 6:13; (Is. 45:23; 65:16)
  - type: text
    content: Everyone who swears by Him shall glory;
  - type: text
    content: But the mouth of those who speak lies shall be stopped.
  '2':
  - type: text
    content: So I have looked for You in the sanctuary,
  - type: text
    content: 'To see '
  - type: note
    content: Ps. 27:4
  - type: text
    content: Your power and Your glory.
  '3':
  - type: note
    content: Ps. 138:2
  - type: text
    content: 'Because Your lovingkindness '
  - type: text
    content: is
  - type: text
    content: ' better than life,'
  - type: text
    content: My lips shall praise You.
  '4':
  - type: text
    content: Thus I will bless You while I live;
  - type: text
    content: 'I will '
  - type: note
    content: Ps. 28:2; 143:6
  - type: text
    content: lift up my hands in Your name.
  '5':
  - type: text
    content: My soul shall be satisfied as with marrow and fatness,
  - type: text
    content: 'And my mouth shall praise '
  - type: text
    content: You
  - type: text
    content: ' with joyful lips.'
  '6':
  - type: text
    content: 'When '
  - type: note
    content: Ps. 42:8
  - type: text
    content: I remember You on my bed,
  - type: text
    content: 'I meditate on You in the '
  - type: text
    content: night
  - type: text
    content: ' watches.'
  '7':
  - type: text
    content: Because You have been my help,
  - type: text
    content: Therefore in the shadow of Your wings I will rejoice.
  '8':
  - type: text
    content: My soul follows close behind You;
  - type: text
    content: Your right hand upholds me.
  '9':
  - type: text
    content: 'But those '
  - type: text
    content: who
  - type: text
    content: ' seek my life, to destroy '
  - type: text
    content: it,
  - type: text
    content: Shall go into the lower parts of the earth.
