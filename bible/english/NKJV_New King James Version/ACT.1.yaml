document_id: ACT.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Prologue
  - type: text
    content: 'The former account I made, O '
  - type: note
    content: Luke 1:3
  - type: text
    content: 'Theophilus, of all that Jesus began both to do and teach, '
  '10':
  - type: text
    content: 'And while they looked steadfastly toward heaven as He went up, behold, two men stood by them '
  - type: note
    content: Matt. 28:3; Mark 16:5; Luke 24:4; John 20:12; Acts 10:3, 30
  - type: text
    content: 'in white apparel, '
  '11':
  - type: text
    content: 'who also said, “Men of Galilee, why do you stand gazing up into heaven? This '
  - type: text
    content: same
  - type: text
    content: ' Jesus, who was taken up from you into heaven, '
  - type: note
    content: Dan. 7:13; Mark 13:26; Luke 21:27; (John 14:3); 2 Thess. 1:10; Rev. 1:7
  - type: text
    content: will so come in like manner as you saw Him go into heaven.”
  - type: heading
    content: The Upper Room Prayer Meeting
  '12':
  - type: note
    content: Luke 24:52
  - type: text
    content: 'Then they returned to Jerusalem from the mount called Olivet, which is near Jerusalem, a Sabbath day’s journey. '
  '13':
  - type: text
    content: 'And when they had entered, they went up '
  - type: note
    content: Mark 14:15; Luke 22:12; Acts 9:37, 39; 20:8
  - type: text
    content: 'into the upper room where they were staying: '
  - type: note
    content: Matt. 10:2–4
  - type: text
    content: 'Peter, James, John, and Andrew; Philip and Thomas; Bartholomew and Matthew; James '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: son
  - type: text
    content: ' of Alphaeus and '
  - type: note
    content: Luke 6:15
  - type: text
    content: 'Simon the Zealot; and '
  - type: note
    content: Jude 1
  - type: text
    content: 'Judas '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: son
  - type: text
    content: ' of James. '
  '14':
  - type: note
    content: Acts 2:1, 46
  - type: text
    content: 'These all continued with one accord in prayer and supplication, with '
  - type: note
    content: Luke 23:49, 55
  - type: text
    content: 'the women and Mary the mother of Jesus, and with '
  - type: note
    content: Matt. 13:55
  - type: text
    content: His brothers.
  - type: heading
    content: Matthias Chosen
  '15':
  - type: text
    content: 'And in those days Peter stood up in the midst of the disciples (altogether the number '
  - type: note
    content: Luke 22:32; Rev. 3:4
  - type: text
    content: 'of names was about a hundred and twenty), and said, '
  '16':
  - type: text
    content: '“Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, this Scripture had to be fulfilled, '
  - type: note
    content: Ps. 41:9
  - type: text
    content: 'which the Holy Spirit spoke before by the mouth of David concerning Judas, '
  - type: note
    content: Matt. 26:47; Mark 14:43; Luke 22:47; John 18:3
  - type: text
    content: 'who became a guide to those who arrested Jesus; '
  '17':
  - type: text
    content: 'for '
  - type: note
    content: Matt. 10:4
  - type: text
    content: 'he was numbered with us and obtained a part in '
  - type: note
    content: Acts 1:25
  - type: text
    content: this ministry.”
  '18':
  - type: note
    content: Matt. 27:3–10
  - type: text
    content: '(Now this man purchased a field with '
  - type: note
    content: Matt. 18:7; 26:14, 15, 24; Mark 14:21; Luke 22:22; John 17:12
  - type: text
    content: 'the wages of iniquity; and falling headlong, he burst open in the middle and all his entrails gushed out. '
  '19':
  - type: text
    content: And it became known to all those dwelling in Jerusalem; so that field is called in their own language, Akel Dama, that is, Field of Blood.)
  '2':
  - type: note
    content: Mark 16:19; Acts 1:9, 11, 22
  - type: text
    content: 'until the day in which He was taken up, after He through the Holy Spirit '
  - type: note
    content: Matt. 28:19; Mark 16:15; John 20:21; Acts 10:42
  - type: text
    content: 'had given commandments to the apostles whom He had chosen, '
  '20':
  - type: text
    content: '“For it is written in the Book of Psalms:'
  - type: note
    content: Ps. 69:25
  - type: text
    content: ‘Let his dwelling place be desolate,
  - type: text
    content: And let no one live in it’;
  - type: text
    content: and,
  - type: note
    content: Ps. 109:8
  - type: text
    content: ‘Let another take his office.’
  '21':
  - type: text
    content: '“Therefore, of these men who have accompanied us all the time that the Lord Jesus went in and out among us, '
  '22':
  - type: text
    content: 'beginning from the baptism of John to that day when '
  - type: note
    content: Acts 1:9
  - type: text
    content: 'He was taken up from us, one of these must '
  - type: note
    content: Acts 1:8; 2:32
  - type: text
    content: become a witness with us of His resurrection.”
  '23':
  - type: text
    content: 'And they proposed two: Joseph called '
  - type: note
    content: Acts 15:22
  - type: text
    content: 'Barsabas, who was surnamed Justus, and Matthias. '
  '24':
  - type: text
    content: 'And they prayed and said, “You, O Lord, '
  - type: note
    content: 1 Sam. 16:7; Jer. 17:10; Acts 1:2
  - type: text
    content: 'who know the hearts of all, show which of these two You have chosen '
  '25':
  - type: note
    content: Acts 1:17
  - type: text
    content: 'to take part in this ministry and apostleship from which Judas by transgression fell, that he might go to his own place.” '
  '26':
  - type: text
    content: And they cast their lots, and the lot fell on Matthias. And he was numbered with the eleven apostles.
  '3':
  - type: note
    content: Matt. 28:17; Mark 16:12, 14; Luke 24:34, 36; John 20:19, 26; 21:1, 14; 1 Cor. 15:5–7
  - type: text
    content: to whom He also presented Himself alive after His suffering by many infallible proofs, being seen by them during forty days and speaking of the things pertaining to the kingdom of God.
  - type: heading
    content: The Holy Spirit Promised
  '4':
  - type: note
    content: Luke 24:49
  - type: text
    content: 'And being assembled together with '
  - type: text
    content: them,
  - type: text
    content: ' He commanded them not to depart from Jerusalem, but to wait for the Promise of the Father, '
  - type: text
    content: “which,”
  - type: text
    content: ' '
  - type: text
    content: He
  - type: text
    content: ' '
  - type: text
    content: said,
  - type: text
    content: ' '
  - type: text
    content: '“you have '
  - type: note
    content: (John 14:16, 17, 26; 15:26); Acts 2:33
  - type: text
    content: heard from Me;
  - type: text
    content: ' '
  '5':
  - type: note
    content: Matt. 3:11; Mark 1:8; Luke 3:16; John 1:33; Acts 11:16
  - type: text
    content: 'for John truly baptized with water, '
  - type: note
    content: (Joel 2:28)
  - type: text
    content: but you shall be baptized with the Holy Spirit not many days from now.”
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Therefore, when they had come together, they asked Him, saying, “Lord, will You at this time restore the kingdom to Israel?” '
  '7':
  - type: text
    content: 'And He said to them, '
  - type: note
    content: 1 Thess. 5:1
  - type: text
    content: '“It is not for you to '
  - type: note
    content: Matt. 24:36; Mark 13:32
  - type: text
    content: know times or seasons which the Father has put in His own authority.
  - type: text
    content: ' '
  '8':
  - type: note
    content: (Acts 2:1, 4)
  - type: text
    content: 'But you shall receive power '
  - type: note
    content: Luke 24:49
  - type: text
    content: 'when the Holy Spirit has come upon you; and '
  - type: note
    content: Luke 24:48; John 15:27
  - type: text
    content: 'you shall be '
  - type: text
    content: witnesses to Me
  - type: text
    content: ' in Jerusalem, and in all Judea and '
  - type: note
    content: Acts 8:1, 5, 14
  - type: text
    content: 'Samaria, and to the '
  - type: note
    content: Matt. 28:19; Mark 16:15; Rom. 10:18; Col. 1:23; (Rev. 14:6)
  - type: text
    content: end of the earth.”
  - type: heading
    content: Jesus Ascends to Heaven
  '9':
  - type: note
    content: Luke 24:50, 51
  - type: text
    content: 'Now when He had spoken these things, while they watched, '
  - type: note
    content: Ps. 68:18; 110:1; Mark 16:19; Luke 23:43; John 20:17; Acts 1:2; (Heb. 4:14; 9:24; 1 Pet. 3:22)
  - type: text
    content: 'He was taken up, and a cloud received Him out of their sight. '
