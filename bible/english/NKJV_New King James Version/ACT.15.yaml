  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 4:36; 13:4
    marker-yv: yv-n
  - type: text
    text: 'Cyprus; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'but Paul chose Silas and departed, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 11:23; 14:26
    marker-yv: yv-n
  - type: text
    text: 'being commended by the brethren to the grace of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And he went through Syria and Cilicia, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 16:5
    marker-yv: yv-n
  - type: text
    text: strengthening the churches.
