    children:
    - type: text
      text: John 7:22; Acts 15:5; Gal. 5:2; Phil. 3:2; (Col. 2:8, 11, 16)
    marker-yv: yv-n
  - type: text
    text: '“Unless you are circumcised according to the custom of Moses, you cannot be saved.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Therefore, when Paul and Barnabas had no small dissension and dispute with them, they determined that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gal. 2:1
    marker-yv: yv-n
  - type: text
    text: Paul and Barnabas and certain others of them should go up to Jerusalem, to the apostles and elders, about this question.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 20:38; 21:5; Rom. 15:24; 1 Cor. 16:6, 11; 2 Cor. 1:16; Titus 3:13; 3 John 6
    marker-yv: yv-n
  - type: text
    text: 'being sent on their way by the church, they passed through Phoenicia and Samaria, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 14:27; 15:4, 12
    marker-yv: yv-n
  - type: text
    text: 'describing the conversion of the Gentiles; and they caused great joy to all the brethren. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when they had come to Jerusalem, they were received by the church and the apostles and the elders; and they reported all things that God had done with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But some of the sect of the Pharisees who believed rose up, saying, “It is necessary to circumcise them, and to command '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' to keep the law of Moses.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Jerusalem Council
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now the apostles and elders came together to consider this matter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And when there had been much dispute, Peter rose up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' said to them: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 10:20
    marker-yv: yv-n
  - type: text
    text: '“Men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brethren, you know that a good while ago God chose among us, that by my mouth the Gentiles should hear the word of the gospel and believe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So God, '
