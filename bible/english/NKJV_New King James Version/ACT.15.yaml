  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 2:4; 10:44, 47
    marker-yv: yv-n
  - type: text
    text: 'giving them the Holy Spirit, just as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: did
  - type: text
    text: ' to us, '
