    marker-yv: yv-n
  - type: text
    text: 'are turning to God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'but that we '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 21:25
    marker-yv: yv-n
  - type: text
