    children:
    - type: text
      text: Acts 15:7; 2 Pet. 1:1
    marker-yv: yv-n
  - type: text
    text: 'Simon has declared how God at the first visited the Gentiles to take out of them a people for His name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
