      text: '17'
  - type: text
    text: 'So that the rest of mankind may seek the '
  - type: usfm
    marker: sc
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even all the Gentiles who are called by My name,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Says the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' who does all these things.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Known to God from eternity are all His works. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Therefore '
