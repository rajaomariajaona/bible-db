document_id: ACT.15,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Conflict over Circumcision
  - type: text
    content: 'And '
  - type: note
    content: Gal. 2:12
  - type: text
    content: 'certain '
  - type: text
    content: men
  - type: text
    content: ' came down from Judea and taught the brethren, '
  - type: note
    content: John 7:22; Acts 15:5; Gal. 5:2; Phil. 3:2; (Col. 2:8, 11, 16)
  - type: text
    content: '“Unless you are circumcised according to the custom of Moses, you cannot be saved.” '
  '10':
  - type: text
    content: 'Now therefore, why do you test God '
  - type: note
    content: Matt. 23:4; Gal. 5:1
  - type: text
    content: 'by putting a yoke on the neck of the disciples which neither our fathers nor we were able to bear? '
  '11':
  - type: text
    content: 'But '
  - type: note
    content: Rom. 3:4; 5:15; 2 Cor. 13:14; (Eph. 2:5–8; Titus 2:11)
  - type: text
    content: we believe that through the grace of the Lord Jesus Christ we shall be saved in the same manner as they.”
  '12':
  - type: text
    content: 'Then all the multitude kept silent and listened to Barnabas and Paul declaring how many miracles and wonders God had '
  - type: note
    content: Acts 14:27; 15:3, 4
  - type: text
    content: 'worked through them among the Gentiles. '
  '13':
  - type: text
    content: 'And after they had become silent, '
  - type: note
    content: Acts 12:17
  - type: text
    content: 'James answered, saying, “Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, listen to me: '
  '14':
  - type: note
    content: Acts 15:7; 2 Pet. 1:1
  - type: text
    content: 'Simon has declared how God at the first visited the Gentiles to take out of them a people for His name. '
  '15':
  - type: text
    content: 'And with this the words of the prophets agree, just as it is written:'
  '16':
  - type: text
    content: ‘After
  - type: note
    content: Amos 9:11, 12
  - type: text
    content: ' this I will return'
  - type: text
    content: And will rebuild the tabernacle of David, which has fallen down;
  - type: text
    content: I will rebuild its ruins,
  - type: text
    content: And I will set it up;
  '17':
  - type: text
    content: 'So that the rest of mankind may seek the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: Even all the Gentiles who are called by My name,
  - type: text
    content: 'Says the '
  - type: heading
    content: Lord
  - type: text
    content: ' who does all these things.’'
  '18':
  - type: text
    content: '“Known to God from eternity are all His works. '
  '19':
  - type: text
    content: 'Therefore '
  - type: note
    content: Acts 15:28; 21:25
  - type: text
    content: 'I judge that we should not trouble those from among the Gentiles who '
  - type: note
    content: 1 Thess. 1:9
  - type: text
    content: 'are turning to God, '
  '2':
  - type: text
    content: 'Therefore, when Paul and Barnabas had no small dissension and dispute with them, they determined that '
  - type: note
    content: Gal. 2:1
  - type: text
    content: Paul and Barnabas and certain others of them should go up to Jerusalem, to the apostles and elders, about this question.
  '20':
  - type: text
    content: 'but that we '
  - type: note
    content: Acts 21:25
  - type: text
    content: 'write to them to abstain '
  - type: note
    content: Gen. 35:2; Ex. 20:3, 23; Ezek. 20:30; (1 Cor. 8:1; 10:20, 28); Rev. 2:14
  - type: text
    content: 'from things polluted by idols, '
  - type: note
    content: (1 Cor. 6:9); Gal. 5:19; Eph. 5:3; Col. 3:5; 1 Thess. 4:3; 1 Pet. 4:3
  - type: text
    content: from
  - type: text
    content: ' sexual immorality, '
  - type: note
    content: Gen. 9:4; Lev. 3:17; Deut. 12:16; 1 Sam. 14:33
  - type: text
    content: from
  - type: text
    content: ' things strangled, and '
  - type: text
    content: from
  - type: text
    content: ' blood. '
  '21':
  - type: text
    content: 'For Moses has had throughout many generations those who preach him in every city, '
  - type: note
    content: Acts 13:15, 27; 2 Cor. 3:14
  - type: text
    content: being read in the synagogues every Sabbath.”
  - type: heading
    content: The Jerusalem Decree
  '22':
  - type: text
    content: 'Then it pleased the apostles and elders, with the whole church, to send chosen men of their own company to Antioch with Paul and Barnabas, '
  - type: text
    content: namely,
  - type: text
    content: ' Judas who was also named '
  - type: note
    content: Acts 1:23
  - type: text
    content: Barsabas, and Silas, leading men among the brethren.
  '23':
  - type: text
    content: 'They wrote this '
  - type: text
    content: letter
  - type: text
    content: ' by them:'
  - type: text
    content: The apostles, the elders, and the brethren,
  - type: text
    content: 'To the brethren who are of the Gentiles in Antioch, Syria, and Cilicia:'
  - type: text
    content: Greetings.
  '24':
  - type: text
    content: 'Since we have heard that '
  - type: note
    content: Acts 15:1; Gal. 2:4; 5:12; Titus 1:10, 11
  - type: text
    content: 'some who went out from us have troubled you with words, '
  - type: note
    content: Gal. 1:7; 5:10
  - type: text
    content: unsettling your souls, saying, “
  - type: text
    content: You
  - type: text
    content: ' '
  - type: text
    content: must
  - type: text
    content: ' be circumcised and keep the law” —to whom we gave no '
  - type: text
    content: such
  - type: text
    content: ' commandment— '
  '25':
  - type: text
    content: 'it seemed good to us, being assembled with one accord, to send chosen men to you with our beloved Barnabas and Paul, '
  '26':
  - type: note
    content: Acts 13:50; 14:19; 1 Cor. 15:30; 2 Cor. 11:23–26
  - type: text
    content: 'men who have risked their lives for the name of our Lord Jesus Christ. '
  '27':
  - type: text
    content: 'We have therefore sent Judas and Silas, who will also report the same things by word of mouth. '
  '28':
  - type: text
    content: 'For it seemed good to the Holy Spirit, and to us, to lay upon you no greater burden than these necessary things: '
  '29':
  - type: note
    content: Acts 15:20; 21:25; Rev. 2:14, 20
  - type: text
    content: 'that you abstain from things offered to idols, '
  - type: note
    content: Lev. 17:14
  - type: text
    content: 'from blood, from things strangled, and from '
  - type: note
    content: 1 Cor. 5:1; 6:18; 7:2; Col. 3:5; 1 Thess. 4:3
  - type: text
    content: sexual immorality. If you keep yourselves from these, you will do well.
  - type: text
    content: Farewell.
  - type: heading
    content: Continuing Ministry in Syria
  '3':
  - type: text
    content: 'So, '
  - type: note
    content: Acts 20:38; 21:5; Rom. 15:24; 1 Cor. 16:6, 11; 2 Cor. 1:16; Titus 3:13; 3 John 6
  - type: text
    content: 'being sent on their way by the church, they passed through Phoenicia and Samaria, '
  - type: note
    content: Acts 14:27; 15:4, 12
  - type: text
    content: 'describing the conversion of the Gentiles; and they caused great joy to all the brethren. '
  '30':
  - type: text
    content: 'So when they were sent off, they came to Antioch; and when they had gathered the multitude together, they delivered the letter. '
  '31':
  - type: text
    content: 'When they had read it, they rejoiced over its encouragement. '
  '32':
  - type: text
    content: 'Now Judas and Silas, themselves being '
  - type: note
    content: Acts 11:27; 1 Cor. 12:28; Eph. 4:11; Rev. 18:20
  - type: text
    content: 'prophets also, '
  - type: note
    content: Acts 14:22; 18:23
  - type: text
    content: 'exhorted and strengthened the brethren with many words. '
  '33':
  - type: text
    content: 'And after they had stayed '
  - type: text
    content: there
  - type: text
    content: ' for a time, they were '
  - type: note
    content: Mark 5:34; Acts 16:36; 1 Cor. 16:11; Heb. 11:31
  - type: text
    content: sent back with greetings from the brethren to the apostles.
  '34':
  - type: text
    content: 'However, it seemed good to Silas to remain there. '
  '35':
  - type: note
    content: Acts 13:1
  - type: text
    content: Paul and Barnabas also remained in Antioch, teaching and preaching the word of the Lord, with many others also.
  - type: heading
    content: Division over John Mark
  '36':
  - type: text
    content: 'Then after some days Paul said to Barnabas, “Let us now go back and visit our brethren in every city where we have preached the word of the Lord, '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: see
  - type: text
    content: ' how they are doing.” '
  '37':
  - type: text
    content: 'Now Barnabas was determined to take with them '
  - type: note
    content: Acts 12:12, 25; Col. 4:10; 2 Tim. 4:11; Philem. 24
  - type: text
    content: 'John called Mark. '
  '38':
  - type: text
    content: 'But Paul insisted that they should not take with them '
  - type: note
    content: Acts 13:13
  - type: text
    content: 'the one who had departed from them in Pamphylia, and had not gone with them to the work. '
  '39':
  - type: text
    content: 'Then the contention became so sharp that they parted from one another. And so Barnabas took Mark and sailed to '
  - type: note
    content: Acts 4:36; 13:4
  - type: text
    content: 'Cyprus; '
  '4':
  - type: text
    content: 'And when they had come to Jerusalem, they were received by the church and the apostles and the elders; and they reported all things that God had done with them. '
  '40':
  - type: text
    content: 'but Paul chose Silas and departed, '
  - type: note
    content: Acts 11:23; 14:26
  - type: text
    content: 'being commended by the brethren to the grace of God. '
  '41':
  - type: text
    content: 'And he went through Syria and Cilicia, '
  - type: note
    content: Acts 16:5
  - type: text
    content: strengthening the churches.
  '5':
  - type: text
    content: 'But some of the sect of the Pharisees who believed rose up, saying, “It is necessary to circumcise them, and to command '
  - type: text
    content: them
  - type: text
    content: ' to keep the law of Moses.”'
  - type: heading
    content: The Jerusalem Council
  '6':
  - type: text
    content: 'Now the apostles and elders came together to consider this matter. '
  '7':
  - type: text
    content: 'And when there had been much dispute, Peter rose up '
  - type: text
    content: and
  - type: text
    content: ' said to them: '
  - type: note
    content: Acts 10:20
  - type: text
    content: '“Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, you know that a good while ago God chose among us, that by my mouth the Gentiles should hear the word of the gospel and believe. '
  '8':
  - type: text
    content: 'So God, '
  - type: note
    content: 1 Chr. 28:9; Acts 1:24
  - type: text
    content: 'who knows the heart, acknowledged them by '
  - type: note
    content: Acts 2:4; 10:44, 47
  - type: text
    content: 'giving them the Holy Spirit, just as '
  - type: text
    content: He
  - type: text
    content: ' '
  - type: text
    content: did
  - type: text
    content: ' to us, '
  '9':
  - type: note
    content: Rom. 10:12
  - type: text
    content: 'and made no distinction between us and them, '
  - type: note
    content: Acts 10:15, 28
  - type: text
    content: 'purifying their hearts by faith. '
