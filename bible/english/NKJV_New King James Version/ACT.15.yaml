    marker: x
    children:
    - type: text
      text: Acts 14:27; 15:3, 4
    marker-yv: yv-n
  - type: text
    text: 'worked through them among the Gentiles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
