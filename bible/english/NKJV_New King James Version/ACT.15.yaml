  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ‘After
  - type: usfm
    marker: x
    children:
    - type: text
      text: Amos 9:11, 12
    marker-yv: yv-n
  - type: text
    text: ' this I will return'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And will rebuild the tabernacle of David, which has fallen down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will rebuild its ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I will set it up;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
