  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 6:9); Gal. 5:19; Eph. 5:3; Col. 3:5; 1 Thess. 4:3; 1 Pet. 4:3
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: from
  - type: text
    text: ' sexual immorality, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 9:4; Lev. 3:17; Deut. 12:16; 1 Sam. 14:33
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: from
  - type: text
    text: ' things strangled, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from
  - type: text
    text: ' blood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For Moses has had throughout many generations those who preach him in every city, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 13:15, 27; 2 Cor. 3:14
    marker-yv: yv-n
  - type: text
    text: being read in the synagogues every Sabbath.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Jerusalem Decree
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then it pleased the apostles and elders, with the whole church, to send chosen men of their own company to Antioch with Paul and Barnabas, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: namely,
  - type: text
    text: ' Judas who was also named '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 1:23
    marker-yv: yv-n
  - type: text
    text: Barsabas, and Silas, leading men among the brethren.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They wrote this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: letter
  - type: text
    text: ' by them:'
