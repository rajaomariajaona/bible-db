    - type: text
      text: Matt. 23:4; Gal. 5:1
    marker-yv: yv-n
  - type: text
    text: 'by putting a yoke on the neck of the disciples which neither our fathers nor we were able to bear? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
