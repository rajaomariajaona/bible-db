    text: 'And after they had become silent, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 12:17
    marker-yv: yv-n
  - type: text
    text: 'James answered, saying, “Men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
