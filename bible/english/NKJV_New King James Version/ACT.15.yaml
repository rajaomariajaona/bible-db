  marker: q1
  children:
  - type: text
    text: The apostles, the elders, and the brethren,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'To the brethren who are of the Gentiles in Antioch, Syria, and Cilicia:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Greetings.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Since we have heard that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 15:1; Gal. 2:4; 5:12; Titus 1:10, 11
    marker-yv: yv-n
  - type: text
    text: 'some who went out from us have troubled you with words, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gal. 1:7; 5:10
    marker-yv: yv-n
  - type: text
    text: unsettling your souls, saying, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: You
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: must
  - type: text
    text: ' be circumcised and keep the law” —to whom we gave no '
  - type: usfm
    marker: it
    children:
    - type: text
      text: such
  - type: text
    text: ' commandment— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'it seemed good to us, being assembled with one accord, to send chosen men to you with our beloved Barnabas and Paul, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 13:50; 14:19; 1 Cor. 15:30; 2 Cor. 11:23–26
    marker-yv: yv-n
  - type: text
    text: 'men who have risked their lives for the name of our Lord Jesus Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'We have therefore sent Judas and Silas, who will also report the same things by word of mouth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For it seemed good to the Holy Spirit, and to us, to lay upon you no greater burden than these necessary things: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 15:20; 21:25; Rev. 2:14, 20
    marker-yv: yv-n
  - type: text
    text: 'that you abstain from things offered to idols, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 17:14
    marker-yv: yv-n
  - type: text
    text: 'from blood, from things strangled, and from '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 5:1; 6:18; 7:2; Col. 3:5; 1 Thess. 4:3
    marker-yv: yv-n
  - type: text
    text: sexual immorality. If you keep yourselves from these, you will do well.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Farewell.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Continuing Ministry in Syria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
