- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then all the multitude kept silent and listened to Barnabas and Paul declaring how many miracles and wonders God had '
