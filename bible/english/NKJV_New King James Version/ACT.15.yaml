  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'When they had read it, they rejoiced over its encouragement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Now Judas and Silas, themselves being '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 11:27; 1 Cor. 12:28; Eph. 4:11; Rev. 18:20
    marker-yv: yv-n
  - type: text
    text: 'prophets also, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 14:22; 18:23
    marker-yv: yv-n
  - type: text
    text: 'exhorted and strengthened the brethren with many words. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And after they had stayed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' for a time, they were '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mark 5:34; Acts 16:36; 1 Cor. 16:11; Heb. 11:31
    marker-yv: yv-n
  - type: text
    text: sent back with greetings from the brethren to the apostles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'However, it seemed good to Silas to remain there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 13:1
    marker-yv: yv-n
  - type: text
    text: Paul and Barnabas also remained in Antioch, teaching and preaching the word of the Lord, with many others also.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Division over John Mark
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then after some days Paul said to Barnabas, “Let us now go back and visit our brethren in every city where we have preached the word of the Lord, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: see
  - type: text
    text: ' how they are doing.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Now Barnabas was determined to take with them '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 12:12, 25; Col. 4:10; 2 Tim. 4:11; Philem. 24
    marker-yv: yv-n
  - type: text
    text: 'John called Mark. '
  - type: usfm
    marker: vlbl
