document_id: EZR.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: End of The Babylonian Captivity
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now in the first year of Cyrus king of Persia, that the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 36:22, 23; Jer. 25:12; 29:10
      marker-yv: yv-n
    - type: text
      text: 'by the mouth of Jeremiah might be fulfilled, the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' stirred up the spirit of Cyrus king of Persia, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 5:13, 14; Is. 44:28—45:13
      marker-yv: yv-n
    - type: text
      text: 'so that he made a proclamation throughout all his kingdom, and also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: put
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' in writing, saying,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thirty gold basins, four hundred and ten silver basins of a similar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kind, and
    - type: text
      text: ' one thousand other articles. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the articles of gold and silver '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' five thousand four hundred. All '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' Sheshbazzar took with the captives who were brought from Babylon to Jerusalem.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thus says Cyrus king of Persia:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All the kingdoms of the earth the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of heaven has given me. And He has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 44:28; 45:1, 13
      marker-yv: yv-n
    - type: text
      text: 'commanded me to build Him a house at Jerusalem which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in Judah. '
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' among you of all His people? May his God be with him, and let him go up to Jerusalem which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in Judah, and build the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:23; 18:39; Is. 37:16; Dan. 6:26
      marker-yv: yv-n
    - type: text
      text: '(He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' God), which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in Jerusalem. '
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And whoever is left in any place where he dwells, let the men of his place help him with silver and gold, with goods and livestock, besides the freewill offerings for the house of God which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in Jerusalem.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses
    - type: text
      text: ' of Judah and Benjamin, and the priests and the Levites, with all whose spirits '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Phil. 2:13)
      marker-yv: yv-n
    - type: text
      text: 'God had moved, arose to go up and build the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in Jerusalem. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all those who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' around them encouraged them with articles of silver and gold, with goods and livestock, and with precious things, besides all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 2:68
      marker-yv: yv-n
    - type: text
      text: willingly offered.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 5:14; 6:5; Dan. 1:2; 5:2, 3
      marker-yv: yv-n
    - type: text
      text: 'King Cyrus also brought out the articles of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:13; 2 Chr. 36:7, 18
      marker-yv: yv-n
    - type: text
      text: 'which Nebuchadnezzar had taken from Jerusalem and put in the temple of his gods; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Cyrus king of Persia brought them out by the hand of Mithredath the treasurer, and counted them out to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 5:14, 16
      marker-yv: yv-n
    - type: text
      text: 'Sheshbazzar the prince of Judah. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the number of them: thirty gold platters, one thousand silver platters, twenty-nine knives, '
