document_id: 1KI.2,114
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Instructions to Solomon
  - type: text
    content: 'Now '
  - type: note
    content: Gen. 47:29; Deut. 31:14
  - type: text
    content: 'the days of David drew near that he should die, and he charged Solomon his son, saying: '
  '10':
  - type: text
    content: 'So '
  - type: note
    content: 1 Kin. 1:21; Acts 2:29; 13:36
  - type: text
    content: 'David rested with his fathers, and was buried in '
  - type: note
    content: 2 Sam. 5:7; 1 Kin. 3:1
  - type: text
    content: 'the City of David. '
  '11':
  - type: text
    content: 'The period that David '
  - type: note
    content: 2 Sam. 5:4, 5; 1 Chr. 3:4; 29:26, 27
  - type: text
    content: 'reigned over Israel '
  - type: text
    content: was
  - type: text
    content: ' forty years; seven years he reigned in Hebron, and in Jerusalem he reigned thirty-three years. '
  '12':
  - type: note
    content: 1 Kin. 1:46; 1 Chr. 29:23
  - type: text
    content: 'Then Solomon sat on the throne of his father David; and his kingdom was '
  - type: note
    content: 1 Kin. 2:46; 2 Chr. 1:1
  - type: text
    content: firmly established.
  - type: heading
    content: Solomon Executes Adonijah
  '13':
  - type: text
    content: 'Now Adonijah the son of Haggith came to Bathsheba the mother of Solomon. So she said, '
  - type: note
    content: 1 Sam. 16:4, 5
  - type: text
    content: “Do you come peaceably?”
  - type: text
    content: 'And he said, “Peaceably.” '
  '14':
  - type: text
    content: 'Moreover he said, “I have something '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: say
  - type: text
    content: ' to you.”'
  - type: text
    content: And she said, “Say it.”
  '15':
  - type: text
    content: 'Then he said, “You know that the kingdom was '
  - type: note
    content: 1 Kin. 1:11, 18
  - type: text
    content: 'mine, and all Israel had set their expectations on me, that I should reign. However, the kingdom has been turned over, and has become my brother’s; for '
  - type: note
    content: 1 Chr. 22:9, 10; 28:5–7; (Dan. 2:21)
  - type: text
    content: 'it was his from the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: Now I ask one petition of you; do not deny me.”
  - type: text
    content: And she said to him, “Say it.”
  '17':
  - type: text
    content: 'Then he said, “Please speak to King Solomon, for he will not refuse you, that he may give me '
  - type: note
    content: 1 Kin. 1:3, 4
  - type: text
    content: Abishag the Shunammite as wife.”
  '18':
  - type: text
    content: So Bathsheba said, “Very well, I will speak for you to the king.”
  '19':
  - type: text
    content: 'Bathsheba therefore went to King Solomon, to speak to him for Adonijah. And the king rose up to meet her and '
  - type: note
    content: (Ex. 20:12)
  - type: text
    content: 'bowed down to her, and sat down on his throne and had a throne set for the king’s mother; '
  - type: note
    content: Ps. 45:9
  - type: text
    content: 'so she sat at his right hand. '
  '2':
  - type: note
    content: Josh. 23:14
  - type: text
    content: '“I go the way of all the earth; '
  - type: note
    content: Deut. 31:7, 23; 1 Chr. 22:13
  - type: text
    content: 'be strong, therefore, and prove yourself a man. '
  '20':
  - type: text
    content: Then she said, “I desire one small petition of you; do not refuse me.”
  - type: text
    content: And the king said to her, “Ask it, my mother, for I will not refuse you.”
  '21':
  - type: text
    content: So she said, “Let Abishag the Shunammite be given to Adonijah your brother as wife.”
  '22':
  - type: text
    content: 'And King Solomon answered and said to his mother, “Now why do you ask Abishag the Shunammite for Adonijah? Ask for him the kingdom also—for he '
  - type: text
    content: is
  - type: text
    content: ' my '
  - type: note
    content: 1 Kin. 1:6; 2:15; 1 Chr. 3:2, 5
  - type: text
    content: 'older brother—for him, and for '
  - type: note
    content: 1 Kin. 1:7
  - type: text
    content: 'Abiathar the priest, and for Joab the son of Zeruiah.” '
  '23':
  - type: text
    content: 'Then King Solomon swore by the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying, '
  - type: note
    content: Ruth 1:17
  - type: text
    content: '“May God do so to me, and more also, if Adonijah has not spoken this word against his own life! '
  '24':
  - type: text
    content: 'Now therefore, '
  - type: text
    content: as
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' lives, who has confirmed me and set me on the throne of David my father, and who has established a house for me, as He '
  - type: note
    content: 2 Sam. 7:11, 13; 1 Chr. 22:10
  - type: text
    content: promised, Adonijah shall be put to death today!”
  '25':
  - type: text
    content: 'So King Solomon sent by the hand of '
  - type: note
    content: 2 Sam. 8:18; 1 Kin. 4:4
  - type: text
    content: Benaiah the son of Jehoiada; and he struck him down, and he died.
  - type: heading
    content: Abiathar Exiled, Joab Executed
  '26':
  - type: text
    content: 'And to Abiathar the priest the king said, “Go to '
  - type: note
    content: Josh. 21:18; Jer. 1:1
  - type: text
    content: 'Anathoth, to your own fields, for you '
  - type: text
    content: are
  - type: text
    content: ' deserving of death; but I will not put you to death at this time, '
  - type: note
    content: 1 Sam. 22:23; 23:6; 2 Sam. 15:14, 29
  - type: text
    content: 'because you carried the ark of the Lord '
  - type: heading
    content: God
  - type: text
    content: ' before my father David, and because you were afflicted every time my father was afflicted.” '
  '27':
  - type: text
    content: 'So Solomon removed Abiathar from being priest to the '
  - type: heading
    content: Lord
  - type: text
    content: ', that he might '
  - type: note
    content: 1 Sam. 2:31–35
  - type: text
    content: 'fulfill the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He spoke concerning the house of Eli at Shiloh.'
  '28':
  - type: text
    content: 'Then news came to Joab, for Joab '
  - type: note
    content: 1 Kin. 1:7
  - type: text
    content: 'had defected to Adonijah, though he had not defected to Absalom. So Joab fled to the tabernacle of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: 1 Kin. 1:50
  - type: text
    content: 'took hold of the horns of the altar. '
  '29':
  - type: text
    content: 'And King Solomon was told, “Joab has fled to the tabernacle of the '
  - type: heading
    content: Lord
  - type: text
    content: '; there '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: is,
  - type: text
    content: ' by the altar.” Then Solomon sent Benaiah the son of Jehoiada, saying, “Go, '
  - type: note
    content: 1 Kin. 2:5, 6
  - type: text
    content: 'strike him down.” '
  '3':
  - type: text
    content: 'And keep the charge of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God: to walk in His ways, to keep His statutes, His commandments, His judgments, and His testimonies, as it is written in the Law of Moses, that you may '
  - type: note
    content: (Deut. 29:9; Josh. 1:7); 1 Chr. 22:12, 13
  - type: text
    content: 'prosper in all that you do and wherever you turn; '
  '30':
  - type: text
    content: 'So Benaiah went to the tabernacle of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and said to him, “Thus says the king, '
  - type: note
    content: (Ex. 21:14)
  - type: text
    content: ‘Come out!’ ”
  - type: text
    content: And he said, “No, but I will die here.” And Benaiah brought back word to the king, saying, “Thus said Joab, and thus he answered me.”
  '31':
  - type: text
    content: 'Then the king said to him, '
  - type: note
    content: (Ex. 21:14)
  - type: text
    content: '“Do as he has said, and strike him down and bury him, '
  - type: note
    content: (Num. 35:33; Deut. 19:13; 21:8, 9)
  - type: text
    content: 'that you may take away from me and from the house of my father the innocent blood which Joab shed. '
  '32':
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: (Gen. 9:6); Judg. 9:24, 57
  - type: text
    content: 'will return his blood on his head, because he struck down two men more righteous '
  - type: note
    content: 2 Chr. 21:13, 14
  - type: text
    content: and better than he, and killed them with the sword—
  - type: note
    content: 2 Sam. 3:27
  - type: text
    content: 'Abner the son of Ner, the commander of the army of Israel, and '
  - type: note
    content: 2 Sam. 20:9, 10
  - type: text
    content: 'Amasa the son of Jether, the commander of the army of Judah—though my father David did not know '
  - type: text
    content: it.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Their blood shall therefore return upon the head of Joab and '
  - type: note
    content: 2 Sam. 3:29
  - type: text
    content: 'upon the head of his descendants forever. '
  - type: note
    content: (Prov. 25:5)
  - type: text
    content: 'But upon David and his descendants, upon his house and his throne, there shall be peace forever from the '
  - type: heading
    content: Lord
  - type: text
    content: .”
  '34':
  - type: text
    content: 'So Benaiah the son of Jehoiada went up and struck and killed him; and he was buried in his own house in the wilderness. '
  '35':
  - type: text
    content: 'The king put Benaiah the son of Jehoiada in his place over the army, and the king put '
  - type: note
    content: 1 Sam. 2:35; 1 Kin. 4:4; 1 Chr. 6:53; 24:3; 29:22
  - type: text
    content: 'Zadok the priest in the place of '
  - type: note
    content: 1 Kin. 2:27
  - type: text
    content: Abiathar.
  - type: heading
    content: Shimei Executed
  '36':
  - type: text
    content: 'Then the king sent and called for '
  - type: note
    content: 2 Sam. 16:5–13; 1 Kin. 2:8
  - type: text
    content: 'Shimei, and said to him, “Build yourself a house in Jerusalem and dwell there, and do not go out from there anywhere. '
  '37':
  - type: text
    content: 'For it shall be, on the day you go out and cross '
  - type: note
    content: 2 Sam. 15:23; 2 Kin. 23:6; John 18:1
  - type: text
    content: 'the Brook Kidron, know for certain you shall surely die; '
  - type: note
    content: Lev. 20:9; Josh. 2:19; 2 Sam. 1:16; Ezek. 18:13
  - type: text
    content: your blood shall be on your own head.”
  '38':
  - type: text
    content: 'And Shimei said to the king, “The saying '
  - type: text
    content: is
  - type: text
    content: ' good. As my lord the king has said, so your servant will do.” So Shimei dwelt in Jerusalem many days.'
  '39':
  - type: text
    content: 'Now it happened at the end of three years, that two slaves of Shimei ran away to '
  - type: note
    content: 1 Sam. 27:2
  - type: text
    content: 'Achish the son of Maachah, king of Gath. And they told Shimei, saying, “Look, your slaves '
  - type: text
    content: are
  - type: text
    content: ' in Gath!” '
  '4':
  - type: text
    content: 'that the '
  - type: heading
    content: Lord
  - type: text
    content: ' may '
  - type: note
    content: 2 Sam. 7:25
  - type: text
    content: 'fulfill His word which He spoke concerning me, saying, '
  - type: note
    content: (Ps. 132:12)
  - type: text
    content: '‘If your sons take heed to their way, to '
  - type: note
    content: 2 Kin. 20:3
  - type: text
    content: 'walk before Me in truth with all their heart and with all their soul,’ He said, '
  - type: note
    content: 2 Sam. 7:12, 13; 1 Kin. 8:25
  - type: text
    content: ‘you shall not lack a man on the throne of Israel.’
  '40':
  - type: text
    content: 'So Shimei arose, saddled his donkey, and went to Achish at Gath to seek his slaves. And Shimei went and brought his slaves from Gath. '
  '41':
  - type: text
    content: 'And Solomon was told that Shimei had gone from Jerusalem to Gath and had come back. '
  '42':
  - type: text
    content: 'Then the king sent and called for Shimei, and said to him, “Did I not make you swear by the '
  - type: heading
    content: Lord
  - type: text
    content: ', and warn you, saying, ‘Know for certain that on the day you go out and travel anywhere, you shall surely die’? And you said to me, ‘The word I have heard '
  - type: text
    content: is
  - type: text
    content: ' good.’ '
  '43':
  - type: text
    content: 'Why then have you not kept the oath of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and the commandment that I gave you?” '
  '44':
  - type: text
    content: 'The king said moreover to Shimei, “You know, as your heart acknowledges, '
  - type: note
    content: 2 Sam. 16:5–13
  - type: text
    content: 'all the wickedness that you did to my father David; therefore the '
  - type: heading
    content: Lord
  - type: text
    content: ' will '
  - type: note
    content: 1 Sam. 25:39; 2 Kin. 11:1, 12–16; Ps. 7:16; Ezek. 17:19
  - type: text
    content: 'return your wickedness on your own head. '
  '45':
  - type: text
    content: 'But King Solomon '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' blessed, and '
  - type: note
    content: 2 Sam. 7:13; (Prov. 25:5)
  - type: text
    content: 'the throne of David shall be established before the '
  - type: heading
    content: Lord
  - type: text
    content: ' forever.”'
  '46':
  - type: text
    content: 'So the king commanded Benaiah the son of Jehoiada; and he went out and struck him down, and he died. Thus the '
  - type: note
    content: 1 Kin. 2:12; 2 Chr. 1:1
  - type: text
    content: kingdom was established in the hand of Solomon.
  '5':
  - type: text
    content: '“Moreover you know also what Joab the son of Zeruiah '
  - type: note
    content: 2 Sam. 3:39; 18:5, 12, 14
  - type: text
    content: 'did to me, '
  - type: text
    content: and
  - type: text
    content: ' what he did to the two commanders of the armies of Israel, to '
  - type: note
    content: 2 Sam. 3:27; 1 Kin. 2:32
  - type: text
    content: 'Abner the son of Ner and '
  - type: note
    content: 2 Sam. 20:10
  - type: text
    content: 'Amasa the son of Jether, whom he killed. And he shed the blood of war in peacetime, and put the blood of war on his belt that '
  - type: text
    content: was
  - type: text
    content: ' around his waist, and on his sandals that '
  - type: text
    content: were
  - type: text
    content: ' on his feet. '
  '6':
  - type: text
    content: 'Therefore do '
  - type: note
    content: 1 Kin. 2:9; Prov. 20:26
  - type: text
    content: according to your wisdom, and do not let his gray hair go down to the grave in peace.
  '7':
  - type: text
    content: '“But show kindness to the sons of '
  - type: note
    content: 2 Sam. 19:31–39
  - type: text
    content: 'Barzillai the Gileadite, and let them be among those who '
  - type: note
    content: 2 Sam. 9:7, 10; 19:28
  - type: text
    content: 'eat at your table, for so '
  - type: note
    content: 2 Sam. 17:17–29
  - type: text
    content: they came to me when I fled from Absalom your brother.
  '8':
  - type: text
    content: '“And see, '
  - type: text
    content: you
  - type: text
    content: ' '
  - type: text
    content: have
  - type: text
    content: ' with you '
  - type: note
    content: 2 Sam. 16:5–13
  - type: text
    content: 'Shimei the son of Gera, a Benjamite from Bahurim, who cursed me with a malicious curse in the day when I went to Mahanaim. But '
  - type: note
    content: 2 Sam. 19:18
  - type: text
    content: 'he came down to meet me at the Jordan, and '
  - type: note
    content: 2 Sam. 19:23
  - type: text
    content: 'I swore to him by the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying, ‘I will not put you to death with the sword.’ '
  '9':
  - type: text
    content: 'Now therefore, '
  - type: note
    content: Ex. 20:7; Job 9:28
  - type: text
    content: 'do not hold him guiltless, for you '
  - type: text
    content: are
  - type: text
    content: ' a wise man and know what you ought to do to him; but '
  - type: note
    content: Gen. 42:38; 44:31
  - type: text
    content: bring his gray hair down to the grave with blood.”
  - type: heading
    content: Death of David
