type_code: eng
verses:
  '1':
  - type: text
    content: But Jesus went to the Mount of Olives.
  '10':
  - type: text
    content: 'When Jesus had raised Himself up and saw no one but the woman, He said to her, '
  - type: text
    content: '“Woman, where are those accusers '
  - type: text
    content: of yours?
  - type: text
    content: ' Has no one condemned you?”'
  '11':
  - type: text
    content: She said, “No one, Lord.”
  - type: text
    content: 'And Jesus said to her, '
  - type: note
    content: (Luke 9:56; 12:14; John 3:17)
  - type: text
    content: '“Neither do I condemn you; go '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: note
    content: (John 5:14)
  - type: text
    content: sin no more.”
  '12':
  - type: text
    content: 'Then Jesus spoke to them again, saying, '
  - type: note
    content: Is. 9:2; Mal. 4:2; John 1:4; 9:5; 12:35; (2 Tim. 1:10)
  - type: text
    content: '“I am the light of the world. He who '
  - type: note
    content: 1 Thess. 5:5
  - type: text
    content: follows Me shall not walk in darkness, but have the light of life.”
  - type: heading
    content: Jesus Defends His Self-Witness
  '13':
  - type: text
    content: 'The Pharisees therefore said to Him, '
  - type: note
    content: John 5:31
  - type: text
    content: “You bear witness of Yourself; Your witness is not true.”
  '14':
  - type: text
    content: 'Jesus answered and said to them, '
  - type: text
    content: '“Even if I bear witness of Myself, My witness is true, for I know where I came from and where I am going; but '
  - type: note
    content: John 7:28; 9:29
  - type: text
    content: you do not know where I come from and where I am going.
  - type: text
    content: ' '
  '15':
  - type: note
    content: 1 Sam. 16:7; John 7:24
  - type: text
    content: 'You judge according to the flesh; '
  - type: note
    content: (John 3:17; 12:47; 18:36)
  - type: text
    content: I judge no one.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And yet if I do judge, My judgment is true; for '
  - type: note
    content: John 16:32
  - type: text
    content: 'I am not alone, but I '
  - type: text
    content: am
  - type: text
    content: ' with the Father who sent Me.'
  - type: text
    content: ' '
  '17':
  - type: note
    content: Deut. 17:6; 19:15; Matt. 18:16; 2 Cor. 13:1; Heb. 10:28
  - type: text
    content: It is also written in your law that the testimony of two men is true.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'I am One who bears witness of Myself, and '
  - type: note
    content: John 5:37; 1 John 5:9
  - type: text
    content: the Father who sent Me bears witness of Me.”
  '19':
  - type: text
    content: Then they said to Him, “Where is Your Father?”
  - type: text
    content: 'Jesus answered, '
  - type: note
    content: John 16:3
  - type: text
    content: '“You know neither Me nor My Father. '
  - type: note
    content: John 14:7
  - type: text
    content: If you had known Me, you would have known My Father also.”
  '2':
  - type: text
    content: 'Now early in the morning He came again into the temple, and all the people came to Him; and He sat down and '
  - type: note
    content: John 8:20; 18:20
  - type: text
    content: 'taught them. '
  '20':
  - type: text
    content: 'These words Jesus spoke in '
  - type: note
    content: Mark 12:41, 43; Luke 21:1
  - type: text
    content: 'the treasury, as He taught in the temple; and '
  - type: note
    content: John 2:4; 7:30
  - type: text
    content: 'no one laid hands on Him, for '
  - type: note
    content: John 7:8
  - type: text
    content: His hour had not yet come.
  - type: heading
    content: Jesus Predicts His Departure
  '21':
  - type: text
    content: 'Then Jesus said to them again, '
  - type: text
    content: '“I am going away, and '
  - type: note
    content: John 7:34; 13:33
  - type: text
    content: 'you will seek Me, and '
  - type: note
    content: John 8:24
  - type: text
    content: will die in your sin. Where I go you cannot come.”
  '22':
  - type: text
    content: 'So the Jews said, “Will He kill Himself, because He says, '
  - type: text
    content: ‘Where I go you cannot come’
  - type: text
    content: ?”
  '23':
  - type: text
    content: 'And He said to them, '
  - type: note
    content: John 3:31
  - type: text
    content: '“You are from beneath; I am from above. '
  - type: note
    content: John 15:19; 17:16; 1 John 4:5
  - type: text
    content: You are of this world; I am not of this world.
  - type: text
    content: ' '
  '24':
  - type: note
    content: John 8:21
  - type: text
    content: 'Therefore I said to you that you will die in your sins; '
  - type: note
    content: (Mark 16:16)
  - type: text
    content: 'for if you do not believe that I am '
  - type: text
    content: He,
  - type: text
    content: ' you will die in your sins.”'
  '25':
  - type: text
    content: Then they said to Him, “Who are You?”
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: '“Just what I '
  - type: note
    content: John 4:26
  - type: text
    content: have been saying to you from the beginning.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'I have many things to say and to judge concerning you, but '
  - type: note
    content: John 7:28
  - type: text
    content: 'He who sent Me is true; and '
  - type: note
    content: John 3:32; 15:15
  - type: text
    content: I speak to the world those things which I heard from Him.”
  '27':
  - type: text
    content: They did not understand that He spoke to them of the Father.
  '28':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: '“When you '
  - type: note
    content: Matt. 27:35; Mark 15:24; Luke 23:33; John 3:14; 12:32; 19:18
  - type: text
    content: lift
  - type: text
    content: ' up the Son of Man, '
  - type: note
    content: (Rom. 1:4)
  - type: text
    content: 'then you will know that I am '
  - type: text
    content: He,
  - type: text
    content: ' and '
  - type: note
    content: John 5:19, 30
  - type: text
    content: that
  - type: text
    content: ' I do nothing of Myself; but '
  - type: note
    content: Deut. 18:15, 18, 19; John 3:11
  - type: text
    content: as My Father taught Me, I speak these things.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And '
  - type: note
    content: John 14:10
  - type: text
    content: 'He who sent Me is with Me. '
  - type: note
    content: John 8:16; 16:32
  - type: text
    content: 'The Father has not left Me alone, '
  - type: note
    content: John 4:34; 5:30; 6:38
  - type: text
    content: for I always do those things that please Him.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Then the scribes and Pharisees brought to Him a woman caught in adultery. And when they had set her in the midst, '
  '30':
  - type: text
    content: 'As He spoke these words, '
  - type: note
    content: John 7:31; 10:42; 11:45
  - type: text
    content: many believed in Him.
  - type: heading
    content: The Truth Shall Make You Free
  '31':
  - type: text
    content: 'Then Jesus said to those Jews who believed Him, '
  - type: text
    content: '“If you '
  - type: note
    content: (John 14:15, 23)
  - type: text
    content: abide in My word, you are My disciples indeed.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'And you shall know the '
  - type: note
    content: (John 1:14, 17; 14:6)
  - type: text
    content: 'truth, and '
  - type: note
    content: (Rom. 6:14, 18, 22; James 1:25; 2:12)
  - type: text
    content: the truth shall make you free.”
  '33':
  - type: text
    content: 'They answered Him, '
  - type: note
    content: Lev. 25:42; (Matt. 3:9); Luke 3:8
  - type: text
    content: '“We are Abraham’s descendants, and have never been in bondage to anyone. How '
  - type: text
    content: can
  - type: text
    content: ' You say, '
  - type: text
    content: ‘You will be made free’
  - type: text
    content: ?”
  '34':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: '“Most assuredly, I say to you, '
  - type: note
    content: Prov. 5:22; Rom. 6:16; 2 Pet. 2:19
  - type: text
    content: whoever commits sin is a slave of sin.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'And '
  - type: note
    content: Gen. 21:10; Gal. 4:30
  - type: text
    content: 'a slave does not abide in the house forever, '
  - type: text
    content: but
  - type: text
    content: ' a son abides forever.'
  - type: text
    content: ' '
  '36':
  - type: note
    content: (Rom. 8:2; 2 Cor. 3:17); Gal. 5:1
  - type: text
    content: Therefore if the Son makes you free, you shall be free indeed.
  - type: heading
    content: Abraham’s Seed and Satan’s
  '37':
  - type: text
    content: '“I know that you are Abraham’s descendants, but '
  - type: note
    content: John 7:19
  - type: text
    content: you seek to kill Me, because My word has no place in you.
  - type: text
    content: ' '
  '38':
  - type: note
    content: (John 3:32; 5:19, 30; 14:10, 24)
  - type: text
    content: 'I speak what I have seen with My Father, and you do what you have '
  - type: text
    content: seen with
  - type: text
    content: ' your father.”'
  '39':
  - type: text
    content: 'They answered and said to Him, '
  - type: note
    content: Matt. 3:9; John 8:37
  - type: text
    content: “Abraham is our father.”
  - type: text
    content: 'Jesus said to them, '
  - type: note
    content: (Rom. 2:28; Gal. 3:7, 29)
  - type: text
    content: “If you were Abraham’s children, you would do the works of Abraham.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'they said to Him, “Teacher, this woman was caught in '
  - type: note
    content: Ex. 20:14; (Matt. 5:27; 19:9; Rom. 7:3)
  - type: text
    content: 'adultery, in the very act. '
  '40':
  - type: note
    content: John 8:37
  - type: text
    content: 'But now you seek to kill Me, a Man who has told you the truth '
  - type: note
    content: John 8:26
  - type: text
    content: which I heard from God. Abraham did not do this.
  - type: text
    content: ' '
  '41':
  - type: text
    content: You do the deeds of your father.”
  - type: text
    content: 'Then they said to Him, “We were not born of fornication; '
  - type: note
    content: Deut. 32:6; Is. 63:16; Mal. 1:6
  - type: text
    content: we have one Father—God.”
  '42':
  - type: text
    content: 'Jesus said to them, '
  - type: note
    content: 1 John 5:1
  - type: text
    content: '“If God were your Father, you would love Me, for '
  - type: note
    content: John 16:27; 17:8, 25
  - type: text
    content: 'I proceeded forth and came from God; '
  - type: note
    content: John 5:43; Gal. 4:4
  - type: text
    content: nor have I come of Myself, but He sent Me.
  - type: text
    content: ' '
  '43':
  - type: note
    content: (John 7:17)
  - type: text
    content: Why do you not understand My speech? Because you are not able to listen to My word.
  - type: text
    content: ' '
  '44':
  - type: note
    content: Matt. 13:38; 1 John 3:8
  - type: text
    content: 'You are of '
  - type: text
    content: your
  - type: text
    content: ' father the devil, and the '
  - type: note
    content: 1 John 2:16, 17
  - type: text
    content: 'desires of your father you want to '
  - type: note
    content: (1 John 3:8–10, 15)
  - type: text
    content: 'do. He was a murderer from the beginning, and '
  - type: note
    content: (Jude 6)
  - type: text
    content: 'does not stand in the truth, because there is no truth in him. When he speaks a lie, he speaks from his own '
  - type: text
    content: resources,
  - type: text
    content: ' for he is a liar and the father of it.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: But because I tell the truth, you do not believe Me.
  - type: text
    content: ' '
  '46':
  - type: text
    content: Which of you convicts Me of sin? And if I tell the truth, why do you not believe Me?
  - type: text
    content: ' '
  '47':
  - type: note
    content: Luke 8:15; John 10:26; 1 John 4:6
  - type: text
    content: He who is of God hears God’s words; therefore you do not hear, because you are not of God.”
  - type: heading
    content: Before Abraham Was, I AM
  '48':
  - type: text
    content: 'Then the Jews answered and said to Him, “Do we not say rightly that You are a Samaritan and '
  - type: note
    content: John 7:20; 10:20
  - type: text
    content: have a demon?”
  '49':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“I do not have a demon; but I honor My Father, and '
  - type: note
    content: John 5:41
  - type: text
    content: you dishonor Me.
  - type: text
    content: ' '
  '5':
  - type: note
    content: Lev. 20:10; Deut. 22:22–24
  - type: text
    content: 'Now Moses, in the law, commanded us that such should be stoned. But what do You say?” '
  '50':
  - type: text
    content: 'And '
  - type: note
    content: John 5:41; 7:18; (Phil. 2:6–8)
  - type: text
    content: 'I do not seek My '
  - type: text
    content: own
  - type: text
    content: ' glory; there is One who seeks and judges.'
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'Most assuredly, I say to you, '
  - type: note
    content: John 5:24; 11:26
  - type: text
    content: if anyone keeps My word he shall never see death.”
  '52':
  - type: text
    content: 'Then the Jews said to Him, “Now we know that You '
  - type: note
    content: John 7:20; 10:20
  - type: text
    content: 'have a demon! '
  - type: note
    content: Zech. 1:5; Heb. 11:13
  - type: text
    content: 'Abraham is dead, and the prophets; and You say, '
  - type: text
    content: ‘If anyone keeps My word he shall never taste death.’
  - type: text
    content: ' '
  '53':
  - type: text
    content: 'Are You greater than our father Abraham, who is dead? And the prophets are dead. '
  - type: note
    content: John 10:33; 19:7
  - type: text
    content: Who do You make Yourself out to be?”
  '54':
  - type: text
    content: 'Jesus answered, '
  - type: note
    content: John 5:31, 32
  - type: text
    content: '“If I honor Myself, My honor is nothing. '
  - type: note
    content: John 5:41; Acts 3:13
  - type: text
    content: 'It is My Father who honors Me, of whom you say that He is '
  - type: text
    content: your
  - type: text
    content: ' God.'
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'Yet '
  - type: note
    content: John 7:28, 29
  - type: text
    content: 'you have not known Him, but I know Him. And if I say, ‘I do not know Him,’ I shall be a liar like you; but I do know Him and '
  - type: note
    content: (John 15:10)
  - type: text
    content: keep His word.
  - type: text
    content: ' '
  '56':
  - type: text
    content: 'Your father Abraham '
  - type: note
    content: Luke 10:24
  - type: text
    content: 'rejoiced to see My day, '
  - type: note
    content: Matt. 13:17; Heb. 11:13
  - type: text
    content: 'and he saw '
  - type: text
    content: it
  - type: text
    content: ' and was glad.”'
  '57':
  - type: text
    content: Then the Jews said to Him, “You are not yet fifty years old, and have You seen Abraham?”
  '58':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: '“Most assuredly, I say to you, '
  - type: note
    content: Mic. 5:2; John 17:5; Heb. 7:3; Rev. 22:13
  - type: text
    content: 'before Abraham was, '
  - type: note
    content: Ex. 3:14; Is. 43:13; John 17:5, 24; Col. 1:17; Rev. 1:8
  - type: text
    content: I AM.”
  '59':
  - type: text
    content: 'Then '
  - type: note
    content: John 10:31; 11:8
  - type: text
    content: 'they took up stones to throw at Him; but Jesus hid Himself and went out of the temple, '
  - type: note
    content: Luke 4:30; John 10:39
  - type: text
    content: going through the midst of them, and so passed by.
  '6':
  - type: text
    content: 'This they said, testing Him, that they '
  - type: note
    content: Matt. 22:15
  - type: text
    content: 'might have '
  - type: text
    content: something
  - type: text
    content: ' of which to accuse Him. But Jesus stooped down and wrote on the ground with '
  - type: text
    content: His
  - type: text
    content: ' finger, as though He did not hear.'
  '7':
  - type: text
    content: 'So when they continued asking Him, He raised Himself up and said to them, '
  - type: note
    content: Deut. 17:7; (Rom. 2:1)
  - type: text
    content: “He who is without sin among you, let him throw a stone at her first.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And again He stooped down and wrote on the ground. '
  '9':
  - type: text
    content: 'Then those who heard '
  - type: text
    content: it,
  - type: text
    content: ' '
  - type: note
    content: Rom. 2:22
  - type: text
    content: 'being convicted by '
  - type: text
    content: their
  - type: text
    content: ' conscience, went out one by one, beginning with the oldest '
  - type: text
    content: even
  - type: text
    content: ' to the last. And Jesus was left alone, and the woman standing in the midst. '
