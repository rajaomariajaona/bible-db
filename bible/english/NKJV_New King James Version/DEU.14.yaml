        text: such
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' these: the camel, the hare, and the rock hyrax; for they chew the cud but do not have cloven hooves; they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' unclean for you. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also the swine is unclean for you, because it has cloven hooves, yet '
    - type: usfm
