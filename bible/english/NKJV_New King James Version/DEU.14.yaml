    - type: text
      text: ' up within your gates. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Levite, because he has no portion nor inheritance with you, and the stranger and the fatherless and the widow who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' within your gates, may come and eat and be satisfied, that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
