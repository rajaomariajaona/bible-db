    - type: text
      text: ' your God, in the place where He chooses to make His name abide, the tithe of your grain and your new wine and your oil, of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 15:19, 20
      marker-yv: yv-n
    - type: text
