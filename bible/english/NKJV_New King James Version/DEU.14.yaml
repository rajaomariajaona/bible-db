      text: '“You shall not eat any detestable thing. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:2–45
      marker-yv: yv-n
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the animals which you may eat: the ox, the sheep, the goat, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the deer, the gazelle, the roe deer, the wild goat, the mountain goat, the antelope, and the mountain sheep. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you may eat every animal with cloven hooves, having the hoof split into two parts, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' chews the cud, among the animals. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless, of those that chew the cud or have cloven hooves, you shall not eat, '
    - type: usfm
      marker: it
      children:
