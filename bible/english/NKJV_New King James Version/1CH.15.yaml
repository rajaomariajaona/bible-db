  '1':
  - type: heading
    content: The Ark Brought to Jerusalem
  - type: text
    content: David
  - type: text
    content: ' built houses for himself in the City of David; and he prepared a place for the ark of God, '
  - type: note
    content: 1 Chr. 16:1
  - type: text
    content: 'and pitched a tent for it. '
  '10':
  - type: text
    content: of the sons of Uzziel, Amminadab the chief, and one hundred and twelve of his brethren.
  '11':
  - type: text
    content: 'And David called for '
  - type: note
    content: 2 Sam. 8:17; 15:24–29, 35, 36; 18:19, 22, 27; 19:11; 20:25; 1 Chr. 12:28
  - type: text
    content: 'Zadok and '
  - type: note
    content: 1 Sam. 22:20–23; 23:6; 30:7; 1 Kin. 2:22, 26, 27; Mark 2:6
  - type: text
    content: 'Abiathar the priests, and for the Levites: for Uriel, Asaiah, Joel, Shemaiah, Eliel, and Amminadab. '
  '12':
  - type: text
    content: 'He said to them, “You '
  - type: text
    content: are
  - type: text
    content: ' the heads of the fathers’ '
  - type: text
    content: houses
  - type: text
    content: ' of the Levites; sanctify yourselves, you and your brethren, that you may bring up the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel to '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: place
  - type: text
    content: ' I have prepared for it. '
  '13':
  - type: text
    content: 'For '
  - type: note
    content: 2 Sam. 6:3
  - type: text
    content: 'because you '
  - type: text
    content: did
  - type: text
    content: ' not '
  - type: text
    content: do
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' the first '
  - type: text
    content: time,
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 13:7–11
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God broke out against us, because we did not consult Him about the proper order.”'
  '14':
  - type: text
    content: 'So the priests and the Levites sanctified themselves to bring up the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel. '
  '15':
  - type: text
    content: 'And the children of the Levites bore the ark of God on their shoulders, by its poles, as '
  - type: note
    content: Ex. 25:14; Num. 4:15; 7:9
  - type: text
    content: 'Moses had commanded according to the word of the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '16':
  - type: text
    content: 'Then David spoke to the leaders of the Levites to appoint their brethren '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' the singers accompanied by instruments of music, stringed instruments, harps, and cymbals, by raising the voice with resounding joy. '
  '17':
  - type: text
    content: 'So the Levites appointed '
  - type: note
    content: 1 Chr. 6:33; 25:1
  - type: text
    content: 'Heman the son of Joel; and of his brethren, '
  - type: note
    content: 1 Chr. 6:39
  - type: text
    content: 'Asaph the son of Berechiah; and of their brethren, the sons of Merari, '
  - type: note
    content: 1 Chr. 6:44
  - type: text
    content: 'Ethan the son of Kushaiah; '
  '18':
  - type: text
    content: 'and with them their brethren of the second '
  - type: text
    content: 'rank:'
  - type: text
    content: ' Zechariah, Ben, Jaaziel, Shemiramoth, Jehiel, Unni, Eliab, Benaiah, Maaseiah, Mattithiah, Elipheleh, Mikneiah, Obed-Edom, and Jeiel, the gatekeepers; '
  '19':
  - type: text
    content: 'the singers, Heman, Asaph, and Ethan, '
  - type: text
    content: were
  - type: text
    content: ' to sound the cymbals of bronze; '
  '2':
  - type: text
    content: 'Then David said, “No one may carry the '
  - type: note
    content: (Num. 4:15); 2 Sam. 6:1–11
  - type: text
    content: 'ark of God but the Levites, for '
  - type: note
    content: Num. 4:2–15; Deut. 10:8; 31:9
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' has chosen them to carry the ark of God and to minister before Him forever.” '
  '20':
  - type: text
    content: 'Zechariah, Aziel, Shemiramoth, Jehiel, Unni, Eliab, Maaseiah, and Benaiah, with strings according to '
  - type: note
    content: Ps. 46:title
  - type: text
    content: 'Alamoth; '
  '21':
  - type: text
    content: 'Mattithiah, Elipheleh, Mikneiah, Obed-Edom, Jeiel, and Azaziah, to direct with harps on the '
  - type: note
    content: Ps. 6:title
  - type: text
    content: 'Sheminith; '
  '22':
  - type: text
    content: 'Chenaniah, leader of the Levites, was instructor '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: text
    content: charge
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' the music, because he '
  - type: text
    content: was
  - type: text
    content: ' skillful; '
  '23':
  - type: text
    content: 'Berechiah and Elkanah '
  - type: text
    content: were
  - type: text
    content: ' doorkeepers for the ark; '
  '24':
  - type: text
    content: 'Shebaniah, Joshaphat, Nethanel, Amasai, Zechariah, Benaiah, and Eliezer, the priests, '
  - type: note
    content: (Num. 10:8); Ps. 81:3
  - type: text
    content: 'were to blow the trumpets before the ark of God; and '
  - type: note
    content: 1 Chr. 13:13, 14
  - type: text
    content: Obed-Edom and Jehiah, doorkeepers for the ark.
  '25':
  - type: text
    content: 'So '
  - type: note
    content: 2 Sam. 6:12, 13; 1 Kin. 8:1
  - type: text
    content: 'David, the elders of Israel, and the captains over thousands went to bring up the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' from the house of Obed-Edom with joy. '
  '26':
  - type: text
    content: 'And so it was, when God helped the Levites who bore the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ', that they offered seven bulls and seven rams. '
  '27':
  - type: text
    content: 'David was clothed with a robe of fine '
  - type: note
    content: 1 Sam. 2:18, 28
  - type: text
    content: 'linen, as were all the Levites who bore the ark, the singers, and Chenaniah the music master '
  - type: text
    content: with
  - type: text
    content: ' the singers. David also wore a linen ephod. '
  '28':
  - type: note
    content: Num. 23:21; Josh. 6:20; 1 Chr. 13:8; Zech. 4:7; 1 Thess. 4:16
  - type: text
    content: 'Thus all Israel brought up the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' with shouting and with the sound of the horn, with trumpets and with cymbals, making music with stringed instruments and harps.'
  '29':
  - type: text
    content: 'And it happened, '
  - type: note
    content: 1 Sam. 18:20, 27; 19:11–17; 2 Sam. 3:13, 14; 6:16, 20–23
  - type: text
    content: as
  - type: text
    content: ' the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to the City of David, that Michal, Saul’s daughter, looked through a window and saw King David whirling and playing music; and she despised him in her heart.'
  '3':
  - type: text
    content: 'And David '
  - type: note
    content: Ex. 40:20, 21; 2 Sam. 6:12; 1 Kin. 8:1; 1 Chr. 13:5
  - type: text
    content: 'gathered all Israel together at Jerusalem, to bring up the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: ' to its place, which he had prepared for it. '
  '4':
  - type: text
    content: 'Then David assembled the children of Aaron and the Levites: '
  '5':
  - type: text
    content: 'of the sons of Kohath, Uriel the chief, and one hundred and twenty of his brethren; '
  '6':
  - type: text
    content: 'of the sons of Merari, Asaiah the chief, and two hundred and twenty of his brethren; '
  '7':
  - type: text
    content: 'of the sons of Gershom, Joel the chief, and one hundred and thirty of his brethren; '
  '8':
  - type: text
    content: 'of the sons of '
  - type: note
    content: Ex. 6:22
  - type: text
    content: 'Elizaphan, Shemaiah the chief, and two hundred of his brethren; '
  '9':
  - type: text
    content: 'of the sons of '
  - type: note
    content: Ex. 6:18
  - type: text
    content: 'Hebron, Eliel the chief, and eighty of his brethren; '
