document_id: 1CH.15,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ark Brought to Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: it
      children:
      - type: text
        text: David
    - type: text
      text: ' built houses for himself in the City of David; and he prepared a place for the ark of God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 16:1
      marker-yv: yv-n
    - type: text
      text: 'and pitched a tent for it. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: of the sons of Uzziel, Amminadab the chief, and one hundred and twelve of his brethren.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And David called for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:17; 15:24–29, 35, 36; 18:19, 22, 27; 19:11; 20:25; 1 Chr. 12:28
      marker-yv: yv-n
    - type: text
      text: 'Zadok and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 22:20–23; 23:6; 30:7; 1 Kin. 2:22, 26, 27; Mark 2:6
      marker-yv: yv-n
    - type: text
      text: 'Abiathar the priests, and for the Levites: for Uriel, Asaiah, Joel, Shemaiah, Eliel, and Amminadab. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'He said to them, “You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses
    - type: text
      text: ' of the Levites; sanctify yourselves, you and your brethren, that you may bring up the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: place
    - type: text
      text: ' I have prepared for it. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 6:3
      marker-yv: yv-n
    - type: text
      text: 'because you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: did
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: time,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 13:7–11
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God broke out against us, because we did not consult Him about the proper order.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So the priests and the Levites sanctified themselves to bring up the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the children of the Levites bore the ark of God on their shoulders, by its poles, as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:14; Num. 4:15; 7:9
      marker-yv: yv-n
    - type: text
      text: 'Moses had commanded according to the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then David spoke to the leaders of the Levites to appoint their brethren '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the singers accompanied by instruments of music, stringed instruments, harps, and cymbals, by raising the voice with resounding joy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So the Levites appointed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 6:33; 25:1
      marker-yv: yv-n
    - type: text
      text: 'Heman the son of Joel; and of his brethren, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 6:39
      marker-yv: yv-n
    - type: text
      text: 'Asaph the son of Berechiah; and of their brethren, the sons of Merari, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 6:44
      marker-yv: yv-n
    - type: text
      text: 'Ethan the son of Kushaiah; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and with them their brethren of the second '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'rank:'
    - type: text
      text: ' Zechariah, Ben, Jaaziel, Shemiramoth, Jehiel, Unni, Eliab, Benaiah, Maaseiah, Mattithiah, Elipheleh, Mikneiah, Obed-Edom, and Jeiel, the gatekeepers; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'the singers, Heman, Asaph, and Ethan, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' to sound the cymbals of bronze; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then David said, “No one may carry the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Num. 4:15); 2 Sam. 6:1–11
      marker-yv: yv-n
    - type: text
      text: 'ark of God but the Levites, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 4:2–15; Deut. 10:8; 31:9
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has chosen them to carry the ark of God and to minister before Him forever.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Zechariah, Aziel, Shemiramoth, Jehiel, Unni, Eliab, Maaseiah, and Benaiah, with strings according to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 46:title
      marker-yv: yv-n
    - type: text
      text: 'Alamoth; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Mattithiah, Elipheleh, Mikneiah, Obed-Edom, Jeiel, and Azaziah, to direct with harps on the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 6:title
      marker-yv: yv-n
    - type: text
      text: 'Sheminith; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Chenaniah, leader of the Levites, was instructor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: charge
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' the music, because he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' skillful; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Berechiah and Elkanah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' doorkeepers for the ark; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Shebaniah, Joshaphat, Nethanel, Amasai, Zechariah, Benaiah, and Eliezer, the priests, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Num. 10:8); Ps. 81:3
      marker-yv: yv-n
    - type: text
      text: 'were to blow the trumpets before the ark of God; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 13:13, 14
      marker-yv: yv-n
    - type: text
      text: Obed-Edom and Jehiah, doorkeepers for the ark.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 6:12, 13; 1 Kin. 8:1
      marker-yv: yv-n
    - type: text
      text: 'David, the elders of Israel, and the captains over thousands went to bring up the ark of the covenant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' from the house of Obed-Edom with joy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And so it was, when God helped the Levites who bore the ark of the covenant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', that they offered seven bulls and seven rams. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'David was clothed with a robe of fine '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 2:18, 28
      marker-yv: yv-n
    - type: text
      text: 'linen, as were all the Levites who bore the ark, the singers, and Chenaniah the music master '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' the singers. David also wore a linen ephod. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 23:21; Josh. 6:20; 1 Chr. 13:8; Zech. 4:7; 1 Thess. 4:16
      marker-yv: yv-n
    - type: text
      text: 'Thus all Israel brought up the ark of the covenant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with shouting and with the sound of the horn, with trumpets and with cymbals, making music with stringed instruments and harps.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And it happened, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 18:20, 27; 19:11–17; 2 Sam. 3:13, 14; 6:16, 20–23
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' the ark of the covenant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to the City of David, that Michal, Saul’s daughter, looked through a window and saw King David whirling and playing music; and she despised him in her heart.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:20, 21; 2 Sam. 6:12; 1 Kin. 8:1; 1 Chr. 13:5
      marker-yv: yv-n
    - type: text
      text: 'gathered all Israel together at Jerusalem, to bring up the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to its place, which he had prepared for it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then David assembled the children of Aaron and the Levites: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'of the sons of Kohath, Uriel the chief, and one hundred and twenty of his brethren; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'of the sons of Merari, Asaiah the chief, and two hundred and twenty of his brethren; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'of the sons of Gershom, Joel the chief, and one hundred and thirty of his brethren; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'of the sons of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 6:22
      marker-yv: yv-n
    - type: text
      text: 'Elizaphan, Shemaiah the chief, and two hundred of his brethren; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'of the sons of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 6:18
      marker-yv: yv-n
    - type: text
      text: 'Hebron, Eliel the chief, and eighty of his brethren; '
