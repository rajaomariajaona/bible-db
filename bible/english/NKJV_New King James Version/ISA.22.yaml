document_id: ISA.22,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Proclamation Against Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The burden against the Valley of Vision.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What ails you now, that you have all gone up to the housetops,
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You numbered the houses of Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the houses you broke down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To fortify the wall.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 3:16
      marker-yv: yv-n
    - type: text
      text: You also made a reservoir between the two walls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the water of the old '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 20:20; 2 Chr. 32:3, 4
      marker-yv: yv-n
    - type: text
      text: pool.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But you did not look to its Maker,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor did you have respect for Him who fashioned it long ago.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And in that day the Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: ' of hosts'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 32:11; Joel 1:13; 2:17
      marker-yv: yv-n
    - type: text
      text: Called for weeping and for mourning,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 9:3; Is. 15:2; Mic. 1:16
      marker-yv: yv-n
    - type: text
      text: For baldness and for girding with sackcloth.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But instead, joy and gladness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Slaying oxen and killing sheep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Eating meat and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 5:11, 22; 28:7, 8; Luke 17:26–29
      marker-yv: yv-n
    - type: text
      text: 'drinking wine:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 56:12; 1 Cor. 15:32
      marker-yv: yv-n
    - type: text
      text: “Let us eat and drink, for tomorrow we die!”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 5:9
      marker-yv: yv-n
    - type: text
      text: 'Then it was revealed in my hearing by the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“Surely for this iniquity there '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 3:14; Ezek. 24:13
      marker-yv: yv-n
    - type: text
      text: will be no atonement for you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Even to your death,” says the Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: ' of hosts.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Judgment on Shebna
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus says the Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: ' of hosts:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go, proceed to this steward,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 18:37; Is. 36:3
      marker-yv: yv-n
    - type: text
      text: 'Shebna, who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' over the house, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'say:'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘What have you here, and whom have you here,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That you have hewn a sepulcher here,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 18:18; 2 Chr. 16:14; Matt. 27:60
      marker-yv: yv-n
    - type: text
      text: who hews himself a sepulcher on high,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who carves a tomb for himself in a rock?
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Indeed, the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will throw you away violently,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O mighty man,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 7:8
      marker-yv: yv-n
    - type: text
      text: And will surely seize you.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will surely turn violently and toss you like a ball
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Into a large country;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'There you shall die, and there '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 2:7
      marker-yv: yv-n
    - type: text
      text: your glorious chariots
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the shame of your master’s house.'
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So I will drive you out of your office,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And from your position he will pull you down.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You who are full of noise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'A tumultuous city, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 32:13
      marker-yv: yv-n
    - type: text
      text: a joyous city?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Your slain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' not slain with the sword,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor dead in battle.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Then it shall be in that day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That I will call My servant '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 18:18; Is. 36:3, 22; 37:2
      marker-yv: yv-n
    - type: text
      text: Eliakim the son of Hilkiah;
  '21':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will clothe him with your robe
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And strengthen him with your belt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will commit your responsibility into his hand.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall be a father to the inhabitants of Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to the house of Judah.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The key of the house of David
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will lay on his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 9:6
      marker-yv: yv-n
    - type: text
      text: shoulder;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So he shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 12:14; Rev. 3:7
      marker-yv: yv-n
    - type: text
      text: open, and no one shall shut;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he shall shut, and no one shall open.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will fasten him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 9:8; Zech. 10:4
      marker-yv: yv-n
    - type: text
      text: a peg in a secure place,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he will become a glorious throne to his father’s house.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘They will hang on him all the glory of his father’s house, the offspring and the posterity, all vessels of small quantity, from the cups to all the pitchers. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day,’ says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, ‘the peg that is fastened in the secure place will be removed and be cut down and fall, and the burden that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' on it will be cut off; for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken.’ ”'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All your rulers have fled together;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are captured by the archers.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All who are found in you are bound together;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have fled from afar.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore I said, “Look away from me,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 4:19
      marker-yv: yv-n
    - type: text
      text: I will weep bitterly;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not labor to comfort me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because of the plundering of the daughter of my people.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 37:3
      marker-yv: yv-n
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a day of trouble and treading down and perplexity'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lam. 1:5; 2:2
      marker-yv: yv-n
    - type: text
      text: 'By the Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: ' of hosts'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the Valley of Vision—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Breaking down the walls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And of crying to the mountain.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 49:35
      marker-yv: yv-n
    - type: text
      text: Elam bore the quiver
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'With chariots of men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' horsemen,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 15:1
      marker-yv: yv-n
    - type: text
      text: Kir uncovered the shield.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'It shall come to pass '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' your choicest valleys'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall be full of chariots,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the horsemen shall set themselves in array at the gate.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 18:15, 16
      marker-yv: yv-n
    - type: text
      text: He removed the protection of Judah.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You looked in that day to the armor '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:2; 10:17
      marker-yv: yv-n
    - type: text
      text: of the House of the Forest;
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 20:20; 2 Chr. 32:4; Neh. 3:16
      marker-yv: yv-n
    - type: text
      text: You also saw the damage to the city of David,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That it was great;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And you gathered together the waters of the lower pool.
