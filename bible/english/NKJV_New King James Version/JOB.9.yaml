  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Job: There Is No Mediator'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Job answered and said:'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:9
      marker-yv: yv-n
    - type: text
      text: He does great things past finding out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, wonders without number.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 23:8, 9; 35:14)
      marker-yv: yv-n
    - type: text
      text: 'If He goes by me, I do not see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If He moves past, I do not perceive Him;
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 45:9; Dan. 4:35; Rom. 9:20)
      marker-yv: yv-n
    - type: text
      text: If He takes away, who can hinder Him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can say to Him, ‘What are You doing?’
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God will not withdraw His anger,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 26:12
      marker-yv: yv-n
    - type: text
      text: The allies of the proud lie prostrate beneath Him.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How then can I answer Him,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' choose my words '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reason
    - type: text
      text: ' with Him?'
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 10:15; 23:1–7
      marker-yv: yv-n
    - type: text
      text: For though I were righteous, I could not answer Him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would beg mercy of my Judge.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If I called and He answered me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would not believe that He was listening to my voice.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For He crushes me with a tempest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And multiplies my wounds '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 2:3
      marker-yv: yv-n
    - type: text
      text: without cause.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will not allow me to catch my breath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But fills me with bitterness.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: matter
    - type: text
      text: ' of strength, indeed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' strong;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And if of justice, who will appoint my day '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: court?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Truly I know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' so,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But how can a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 4:17; 15:14–16; Ps. 143:2; Rom. 3:20)
      marker-yv: yv-n
    - type: text
      text: 'man be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Hab. 2:4; Rom. 1:17; Gal. 3:11; Heb. 10:38)
      marker-yv: yv-n
    - type: text
      text: righteous before God?
  '20':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Though I were righteous, my own mouth would condemn me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Though I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' blameless, it would prove me perverse.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am blameless, yet I do not know myself;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I despise my life.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'It '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' all one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Therefore I say, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eccl. 9:2, 3); Ezek. 21:3
      marker-yv: yv-n
    - type: text
      text: ‘He destroys the blameless and the wicked.’
  '23':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If the scourge slays suddenly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He laughs at the plight of the innocent.
  '24':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The earth is given into the hand of the wicked.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He covers the faces of its judges.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If it is not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He,
    - type: text
      text: ' who else could it be?'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 7:6, 7
      marker-yv: yv-n
    - type: text
      text: my days are swifter than a runner;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They flee away, they see no good.
  '26':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They pass by like swift ships,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 39:29; Hab. 1:8
      marker-yv: yv-n
    - type: text
      text: Like an eagle swooping on its prey.
  '27':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 7:13
      marker-yv: yv-n
    - type: text
      text: If I say, ‘I will forget my complaint,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will put off my sad face and wear a smile,’
  '28':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:120
      marker-yv: yv-n
    - type: text
      text: I am afraid of all my sufferings;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I know that You '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:7
      marker-yv: yv-n
    - type: text
      text: will not hold me innocent.
  '29':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: If
    - type: text
      text: ' I am condemned,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why then do I labor in vain?
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If one wished to contend with Him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He could not answer Him one time out of a thousand.
  '30':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Jer. 2:22)
      marker-yv: yv-n
    - type: text
      text: If I wash myself with snow water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And cleanse my hands with soap,
  '31':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet You will plunge me into the pit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my own clothes will abhor me.
  '32':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 6:10; (Is. 45:9; Jer. 49:19; Rom. 9:20)
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: He
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not a man, as I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That
    - type: text
      text: ' I may answer Him,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' we should go to court together.'
  '33':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Sam. 2:25); Job 9:19; Is. 1:18
      marker-yv: yv-n
    - type: text
      text: Nor is there any mediator between us,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Who
    - type: text
      text: ' may lay his hand on us both.'
  '34':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 13:20, 21; Ps. 39:10
      marker-yv: yv-n
    - type: text
      text: Let Him take His rod away from me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And do not let dread of Him terrify me.
  '35':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Then
    - type: text
      text: ' I would speak and not fear Him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But it is not so with me.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 36:5
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' wise in heart and mighty in strength.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who has hardened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: himself
    - type: text
      text: ' against Him and prospered?'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He removes the mountains, and they do not know
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When He overturns them in His anger;
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 2:19, 21; Hag. 2:6; Heb. 12:26
      marker-yv: yv-n
    - type: text
      text: shakes the earth out of its place,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And its '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 26:11
      marker-yv: yv-n
    - type: text
      text: pillars tremble;
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He commands the sun, and it does not rise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He seals off the stars;
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:6; Job 37:18; Ps. 104:2, 3; Is. 40:22
      marker-yv: yv-n
    - type: text
      text: He alone spreads out the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And treads on the waves of the sea;
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:16; Job 38:31; Amos 5:8
      marker-yv: yv-n
    - type: text
      text: He made the Bear, Orion, and the Pleiades,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the chambers of the south;
