  '1':
  - type: heading
    content: Christ’s Epistle
  - type: text
    content: 'Do '
  - type: note
    content: 2 Cor. 5:12; 10:12, 18; 12:11
  - type: text
    content: 'we begin again to commend ourselves? Or do we need, as some '
  - type: text
    content: others
  - type: text
    content: ', '
  - type: note
    content: Acts 18:27
  - type: text
    content: 'epistles of commendation to you or '
  - type: text
    content: letters
  - type: text
    content: ' of commendation from you? '
  '10':
  - type: text
    content: 'For even what was made glorious had no glory in this respect, because of the glory that excels. '
  '11':
  - type: text
    content: 'For if what is passing away '
  - type: text
    content: was
  - type: text
    content: ' glorious, what remains '
  - type: text
    content: is
  - type: text
    content: ' much more glorious.'
  '12':
  - type: text
    content: 'Therefore, since we have such hope, '
  - type: note
    content: Acts 4:13, 29; 2 Cor. 7:4; Eph. 6:19
  - type: text
    content: 'we use great boldness of speech— '
  '13':
  - type: text
    content: 'unlike Moses, '
  - type: note
    content: Ex. 34:33–35; 2 Cor. 3:7
  - type: text
    content: who
  - type: text
    content: ' put a veil over his face so that the children of Israel could not look steadily at '
  - type: note
    content: Rom. 10:4; (Gal. 3:23)
  - type: text
    content: 'the end of what was passing away. '
  '14':
  - type: text
    content: 'But '
  - type: note
    content: Is. 6:10; 29:10; Acts 28:26; Rom. 11:7, 8; 2 Cor. 4:4
  - type: text
    content: 'their minds were blinded. For until this day the same veil remains unlifted in the reading of the Old Testament, because the '
  - type: text
    content: veil
  - type: text
    content: ' is taken away in Christ. '
  '15':
  - type: text
    content: 'But even to this day, when Moses is read, a veil lies on their heart. '
  '16':
  - type: text
    content: 'Nevertheless '
  - type: note
    content: Ex. 34:34; Rom. 11:23
  - type: text
    content: 'when one turns to the Lord, '
  - type: note
    content: Is. 25:7
  - type: text
    content: 'the veil is taken away. '
  '17':
  - type: text
    content: 'Now '
  - type: note
    content: (1 Cor. 15:45)
  - type: text
    content: 'the Lord is the Spirit; and where the Spirit of the Lord '
  - type: text
    content: is
  - type: text
    content: ', there '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: John 8:32; Gal. 5:1, 13
  - type: text
    content: 'liberty. '
  '18':
  - type: text
    content: 'But we all, with unveiled face, beholding '
  - type: note
    content: 1 Cor. 13:12
  - type: text
    content: 'as in a mirror '
  - type: note
    content: (2 Cor. 4:4, 6)
  - type: text
    content: 'the glory of the Lord, '
  - type: note
    content: (Rom. 8:29, 30)
  - type: text
    content: are being transformed into the same image from glory to glory, just as by the Spirit of the Lord.
  '2':
  - type: note
    content: 1 Cor. 9:2
  - type: text
    content: 'You are our epistle written in our hearts, known and read by all men; '
  '3':
  - type: text
    content: 'clearly you are an epistle of Christ, '
  - type: note
    content: 1 Cor. 3:5
  - type: text
    content: 'ministered by us, written not with ink but by the Spirit of the living God, not '
  - type: note
    content: Ex. 24:12; 31:18; 32:15; 2 Cor. 3:7
  - type: text
    content: 'on tablets of stone but '
  - type: note
    content: Ps. 40:8
  - type: text
    content: 'on tablets of flesh, '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: is,
  - type: text
    content: ' of the heart.'
  - type: heading
    content: The Spirit, Not the Letter
  '4':
  - type: text
    content: 'And we have such trust through Christ toward God. '
  '5':
  - type: note
    content: (John 15:5)
  - type: text
    content: 'Not that we are sufficient of ourselves to think of anything as '
  - type: text
    content: being
  - type: text
    content: ' from ourselves, but '
  - type: note
    content: 1 Cor. 15:10
  - type: text
    content: 'our sufficiency '
  - type: text
    content: is
  - type: text
    content: ' from God, '
  '6':
  - type: text
    content: 'who also made us sufficient as '
  - type: note
    content: 1 Cor. 3:5; Eph. 3:7
  - type: text
    content: 'ministers of '
  - type: note
    content: Jer. 31:31; Matt. 26:28; Luke 22:20
  - type: text
    content: 'the new covenant, not '
  - type: note
    content: Rom. 2:27
  - type: text
    content: 'of the letter but of the Spirit; for '
  - type: note
    content: (Rom. 3:20); Gal. 3:10
  - type: text
    content: 'the letter kills, '
  - type: note
    content: John 6:63; Rom. 8:2
  - type: text
    content: but the Spirit gives life.
  - type: heading
    content: Glory of the New Covenant
  '7':
  - type: text
    content: 'But if '
  - type: note
    content: Rom. 7:10
  - type: text
    content: 'the ministry of death, '
  - type: note
    content: Ex. 34:1; Deut. 10:1
  - type: text
    content: 'written '
  - type: text
    content: and
  - type: text
    content: ' engraved on stones, was glorious, '
  - type: note
    content: Ex. 34:29
  - type: text
    content: 'so that the children of Israel could not look steadily at the face of Moses because of the glory of his countenance, which '
  - type: text
    content: glory
  - type: text
    content: ' was passing away, '
  '8':
  - type: text
    content: 'how will '
  - type: note
    content: (Gal. 3:5)
  - type: text
    content: 'the ministry of the Spirit not be more glorious? '
  '9':
  - type: text
    content: 'For if the ministry of condemnation '
  - type: text
    content: had
  - type: text
    content: ' glory, the ministry '
  - type: note
    content: (Rom. 1:17; 3:21)
  - type: text
    content: 'of righteousness exceeds much more in glory. '
