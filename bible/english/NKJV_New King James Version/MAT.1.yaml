      marker-yv: yv-n
    - type: text
      text: 'the Son of Abraham:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 20:21
      marker-yv: yv-n
    - type: text
      text: 'Hezekiah begot Manasseh, Manasseh begot Amon, and Amon begot '
