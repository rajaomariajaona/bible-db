      marker-yv: yv-n
    - type: text
      text: 'Josiah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 3:15, 16
      marker-yv: yv-n
    - type: text
      text: 'Josiah begot Jeconiah and his brothers about the time they were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:14–16; Jer. 27:20; Matt. 1:17
      marker-yv: yv-n
    - type: text
      text: carried away to Babylon.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after they were brought to Babylon, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 3:17
      marker-yv: yv-n
    - type: text
      text: 'Jeconiah begot Shealtiel, and Shealtiel begot '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 3:2; Neh. 12:1; Hag. 1:1
      marker-yv: yv-n
    - type: text
      text: 'Zerubbabel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zerubbabel begot Abiud, Abiud begot Eliakim, and Eliakim begot Azor. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azor begot Zadok, Zadok begot Achim, and Achim begot Eliud. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eliud begot Eleazar, Eleazar begot Matthan, and Matthan begot Jacob. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob begot Joseph the husband of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 13:55; Mark 6:3
      marker-yv: yv-n
    - type: text
      text: Mary, of whom was born Jesus who is called Christ.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all the generations from Abraham to David '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' fourteen generations, from David until the captivity in Babylon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' fourteen generations, and from the captivity in Babylon until the Christ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' fourteen generations.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ Born of Mary
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 12:46; Luke 1:27
      marker-yv: yv-n
    - type: text
      text: 'birth of Jesus Christ was as follows: After His mother Mary was betrothed to Joseph, before they came together, she was found with child '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 7:14; 49:5; Luke 1:35
      marker-yv: yv-n
    - type: text
      text: 'of the Holy Spirit. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joseph her husband, being a just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man,
    - type: text
      text: ' and not wanting '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 24:1; John 8:4, 5
      marker-yv: yv-n
    - type: text
      text: 'to make her a public example, was minded to put her away secretly. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 21:2, 12
      marker-yv: yv-n
    - type: text
      text: 'Abraham begot Isaac, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 25:26; 28:14
      marker-yv: yv-n
    - type: text
      text: 'Isaac begot Jacob, and Jacob begot '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 29:35
      marker-yv: yv-n
    - type: text
      text: 'Judah and his brothers. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But while he thought about these things, behold, an angel of the Lord appeared to him in a dream, saying, “Joseph, son of David, do not be afraid to take to you Mary your wife, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 1:35
      marker-yv: yv-n
    - type: text
      text: 'for that which is conceived in her is of the Holy Spirit. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 7:14; 9:6, 7); Luke 1:31; 2:21
      marker-yv: yv-n
    - type: text
      text: 'And she will bring forth a Son, and you shall call His name '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Jesus
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 2:11; John 1:29; (Acts 4:12; 5:31; 13:23, 38; Rom. 5:18, 19; Col. 1:20–23)
      marker-yv: yv-n
    - type: text
      text: for He will save His people from their sins.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all this was done that it might be fulfilled which was spoken by the Lord through the prophet, saying: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 7:14
      marker-yv: yv-n
    - type: text
      text: “Behold, the virgin shall be with child, and bear a Son, and they shall call His name Immanuel,” which is translated, “God with us.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joseph, being aroused from sleep, did as the angel of the Lord commanded him and took to him his wife, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and did not know her till she had brought forth '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 13:2; Luke 2:7, 21
      marker-yv: yv-n
    - type: text
      text: 'her firstborn Son. And he called His name '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Jesus
    - type: text
      text: .
