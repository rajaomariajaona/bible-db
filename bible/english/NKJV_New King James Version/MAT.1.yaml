  - type: text
    content: 'Perez begot Hezron, and Hezron begot Ram. '
  '4':
  - type: text
    content: 'Ram begot Amminadab, Amminadab begot Nahshon, and Nahshon begot Salmon. '
  '5':
  - type: text
    content: 'Salmon begot '
  - type: note
