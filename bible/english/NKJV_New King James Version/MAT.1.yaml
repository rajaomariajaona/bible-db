    content: The Genealogy of Jesus Christ
  - type: text
    content: 'The book of the '
  - type: note
    content: Luke 3:23
  - type: text
    content: 'genealogy of Jesus Christ, '
  - type: note
    content: 2 Sam. 7:12–16; Ps. 132:11; Is. 9:6; 11:1; Jer. 23:5; (Matt. 1:18; Luke 3:23, 31); John 7:42; Acts 2:30; (Rom. 1:3); Rev. 22:16
  - type: text
    content: 'the Son of David, '
  - type: note
    content: Gen. 12:3; 22:18; (Gal. 3:16)
  - type: text
    content: 'the Son of Abraham:'
  '10':
  - type: note
    content: 2 Kin. 20:21
  - type: text
    content: 'Hezekiah begot Manasseh, Manasseh begot Amon, and Amon begot '
  - type: note
    content: 1 Kin. 13:2
  - type: text
    content: 'Josiah. '
  '11':
  - type: note
    content: 1 Chr. 3:15, 16
  - type: text
    content: 'Josiah begot Jeconiah and his brothers about the time they were '
  - type: note
    content: 2 Kin. 24:14–16; Jer. 27:20; Matt. 1:17
  - type: text
    content: carried away to Babylon.
  '12':
  - type: text
    content: 'And after they were brought to Babylon, '
  - type: note
    content: 1 Chr. 3:17
  - type: text
    content: 'Jeconiah begot Shealtiel, and Shealtiel begot '
  - type: note
    content: Ezra 3:2; Neh. 12:1; Hag. 1:1
  - type: text
    content: 'Zerubbabel. '
  '13':
  - type: text
    content: 'Zerubbabel begot Abiud, Abiud begot Eliakim, and Eliakim begot Azor. '
  '14':
  - type: text
    content: 'Azor begot Zadok, Zadok begot Achim, and Achim begot Eliud. '
  '15':
  - type: text
    content: 'Eliud begot Eleazar, Eleazar begot Matthan, and Matthan begot Jacob. '
  '16':
  - type: text
    content: 'And Jacob begot Joseph the husband of '
  - type: note
    content: Matt. 13:55; Mark 6:3
  - type: text
    content: Mary, of whom was born Jesus who is called Christ.
  '17':
  - type: text
    content: 'So all the generations from Abraham to David '
  - type: text
    content: are
  - type: text
    content: ' fourteen generations, from David until the captivity in Babylon '
  - type: text
    content: are
  - type: text
    content: ' fourteen generations, and from the captivity in Babylon until the Christ '
  - type: text
    content: are
  - type: text
    content: ' fourteen generations.'
  - type: heading
    content: Christ Born of Mary
  '18':
  - type: text
    content: 'Now the '
  - type: note
    content: Matt. 12:46; Luke 1:27
  - type: text
    content: 'birth of Jesus Christ was as follows: After His mother Mary was betrothed to Joseph, before they came together, she was found with child '
  - type: note
    content: Is. 7:14; 49:5; Luke 1:35
  - type: text
    content: 'of the Holy Spirit. '
  '19':
  - type: text
    content: 'Then Joseph her husband, being a just '
  - type: text
    content: man,
  - type: text
    content: ' and not wanting '
  - type: note
    content: Deut. 24:1; John 8:4, 5
  - type: text
    content: 'to make her a public example, was minded to put her away secretly. '
  '2':
  - type: note
    content: Gen. 21:2, 12
  - type: text
    content: 'Abraham begot Isaac, '
  - type: note
    content: Gen. 25:26; 28:14
  - type: text
    content: 'Isaac begot Jacob, and Jacob begot '
  - type: note
    content: Gen. 29:35
  - type: text
    content: 'Judah and his brothers. '
  '20':
  - type: text
    content: 'But while he thought about these things, behold, an angel of the Lord appeared to him in a dream, saying, “Joseph, son of David, do not be afraid to take to you Mary your wife, '
  - type: note
    content: Luke 1:35
  - type: text
    content: 'for that which is conceived in her is of the Holy Spirit. '
  '21':
  - type: note
    content: (Is. 7:14; 9:6, 7); Luke 1:31; 2:21
  - type: text
    content: 'And she will bring forth a Son, and you shall call His name '
  - type: heading
    content: Jesus
  - type: text
    content: ', '
  - type: note
    content: Luke 2:11; John 1:29; (Acts 4:12; 5:31; 13:23, 38; Rom. 5:18, 19; Col. 1:20–23)
  - type: text
    content: for He will save His people from their sins.”
  '22':
  - type: text
    content: 'So all this was done that it might be fulfilled which was spoken by the Lord through the prophet, saying: '
  '23':
  - type: note
    content: Is. 7:14
  - type: text
    content: “Behold, the virgin shall be with child, and bear a Son, and they shall call His name Immanuel,” which is translated, “God with us.”
  '24':
  - type: text
    content: 'Then Joseph, being aroused from sleep, did as the angel of the Lord commanded him and took to him his wife, '
  '25':
  - type: text
    content: 'and did not know her till she had brought forth '
  - type: note
    content: Ex. 13:2; Luke 2:7, 21
  - type: text
    content: 'her firstborn Son. And he called His name '
  - type: heading
    content: Jesus
  - type: text
    content: .
