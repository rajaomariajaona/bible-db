    content: Elihu Condemns Self-Righteousness
  - type: text
    content: 'Moreover Elihu answered and said:'
  '10':
  - type: text
    content: 'But no one says, '
  - type: note
    content: Is. 51:13
  - type: text
    content: '‘Where '
  - type: text
    content: is
  - type: text
    content: ' God my Maker,'
  - type: note
    content: Job 8:21; Ps. 42:8; 77:6; 149:5; Acts 16:25
  - type: text
    content: Who gives songs in the night,
  '11':
  - type: text
    content: 'Who '
  - type: note
    content: Job 36:22; Ps. 94:12; (Is. 48:17); Jer. 32:33; (1 Cor. 2:13)
  - type: text
    content: teaches us more than the beasts of the earth,
  - type: text
    content: And makes us wiser than the birds of heaven?’
  '12':
  - type: note
    content: Prov. 1:28
  - type: text
    content: There they cry out, but He does not answer,
  - type: text
    content: Because of the pride of evil men.
  '13':
  - type: note
    content: Job 27:9; (Prov. 15:29; Is. 1:15); Jer. 11:11; (Mic. 3:4)
  - type: text
    content: 'Surely God will not listen to empty '
  - type: text
    content: talk,
  - type: text
    content: Nor will the Almighty regard it.
  '14':
  - type: note
    content: Job 9:11
  - type: text
    content: Although you say you do not see Him,
  - type: text
    content: Yet
  - type: text
    content: ' justice '
  - type: text
    content: is
  - type: text
    content: ' before Him, and '
  - type: note
    content: (Ps. 37:5, 6)
  - type: text
    content: you must wait for Him.
  '15':
  - type: text
    content: 'And now, because He has not '
  - type: note
    content: Ps. 89:32
  - type: text
    content: punished in His anger,
  - type: text
    content: Nor taken much notice of folly,
  '16':
  - type: note
    content: Job 34:35; 38:2
  - type: text
    content: Therefore Job opens his mouth in vain;
  - type: text
    content: He multiplies words without knowledge.”
  '2':
  - type: text
    content: “Do you think this is right?
  - type: text
    content: Do you say,
  - type: text
    content: ‘My righteousness is more than God’s’?
  '3':
  - type: text
    content: 'For '
  - type: note
    content: Job 21:15; 34:9
  - type: text
    content: you say,
  - type: text
    content: ‘What advantage will it be to You?
  - type: text
    content: 'What profit shall I have, more than '
  - type: text
    content: if
  - type: text
    content: ' I had sinned?’'
  '4':
  - type: text
    content: “I will answer you,
  - type: text
    content: 'And '
  - type: note
    content: Job 34:8
  - type: text
    content: your companions with you.
  '5':
  - type: note
    content: Gen. 15:5; (Job 22:12; Ps. 8:3)
  - type: text
    content: Look to the heavens and see;
  - type: text
    content: And behold the clouds—
  - type: text
    content: They are higher than you.
  '6':
  - type: text
    content: 'If you sin, what do you accomplish '
  - type: note
    content: Job 7:20; (Prov. 8:36; Jer. 7:19)
  - type: text
    content: against Him?
  - type: text
    content: 'Or, '
  - type: text
    content: if
  - type: text
    content: ' your transgressions are multiplied, what do you do to Him?'
  '7':
  - type: note
    content: Job 22:2; Ps. 16:2; Prov. 9:12; (Luke 17:10); Rom. 11:35
  - type: text
    content: If you are righteous, what do you give Him?
  - type: text
    content: Or what does He receive from your hand?
  '8':
  - type: text
    content: Your wickedness affects a man such as you,
  - type: text
    content: And your righteousness a son of man.
  '9':
  - type: text
    content: “Because
  - type: note
    content: Job 34:28
  - type: text
    content: ' of the multitude of oppressions they cry out;'
  - type: text
    content: They cry out for help because of the arm of the mighty.
