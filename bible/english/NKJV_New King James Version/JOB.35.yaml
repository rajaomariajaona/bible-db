document_id: JOB.35,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elihu Condemns Self-Righteousness
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover Elihu answered and said:'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But no one says, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 51:13
      marker-yv: yv-n
    - type: text
      text: '‘Where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' God my Maker,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 8:21; Ps. 42:8; 77:6; 149:5; Acts 16:25
      marker-yv: yv-n
    - type: text
      text: Who gives songs in the night,
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 36:22; Ps. 94:12; (Is. 48:17); Jer. 32:33; (1 Cor. 2:13)
      marker-yv: yv-n
    - type: text
      text: teaches us more than the beasts of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And makes us wiser than the birds of heaven?’
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 1:28
      marker-yv: yv-n
    - type: text
      text: There they cry out, but He does not answer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because of the pride of evil men.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 27:9; (Prov. 15:29; Is. 1:15); Jer. 11:11; (Mic. 3:4)
      marker-yv: yv-n
    - type: text
      text: 'Surely God will not listen to empty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: talk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor will the Almighty regard it.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:11
      marker-yv: yv-n
    - type: text
      text: Although you say you do not see Him,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yet
    - type: text
      text: ' justice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' before Him, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 37:5, 6)
      marker-yv: yv-n
    - type: text
      text: you must wait for Him.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And now, because He has not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 89:32
      marker-yv: yv-n
    - type: text
      text: punished in His anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor taken much notice of folly,
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 34:35; 38:2
      marker-yv: yv-n
    - type: text
      text: Therefore Job opens his mouth in vain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He multiplies words without knowledge.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do you think this is right?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘My righteousness is more than God’s’?
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 21:15; 34:9
      marker-yv: yv-n
    - type: text
      text: you say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘What advantage will it be to You?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'What profit shall I have, more than '
    - type: usfm
      marker: it
      children:
      - type: text
        text: if
    - type: text
      text: ' I had sinned?’'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will answer you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 34:8
      marker-yv: yv-n
    - type: text
      text: your companions with you.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:5; (Job 22:12; Ps. 8:3)
      marker-yv: yv-n
    - type: text
      text: Look to the heavens and see;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And behold the clouds—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are higher than you.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If you sin, what do you accomplish '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 7:20; (Prov. 8:36; Jer. 7:19)
      marker-yv: yv-n
    - type: text
      text: against Him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: if
    - type: text
      text: ' your transgressions are multiplied, what do you do to Him?'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 22:2; Ps. 16:2; Prov. 9:12; (Luke 17:10); Rom. 11:35
      marker-yv: yv-n
    - type: text
      text: If you are righteous, what do you give Him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or what does He receive from your hand?
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your wickedness affects a man such as you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your righteousness a son of man.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 34:28
      marker-yv: yv-n
    - type: text
      text: ' of the multitude of oppressions they cry out;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They cry out for help because of the arm of the mighty.
