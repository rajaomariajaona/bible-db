  '1':
  - type: heading
    content: Praise to God for His Awesome Works
  - type: text
    content: To the Chief Musician. A Song. A Psalm.
  - type: text
    content: 'Make '
  - type: note
    content: Ps. 100:1
  - type: text
    content: a joyful shout to God, all the earth!
  '10':
  - type: text
    content: 'For '
  - type: note
    content: Job 23:10; Ps. 17:3
  - type: text
    content: You, O God, have tested us;
  - type: note
    content: (Is. 48:10; Zech. 13:9; Mal. 3:3; 1 Pet. 1:7)
  - type: text
    content: You have refined us as silver is refined.
  '11':
  - type: note
    content: Lam. 1:13; Ezek. 12:13
  - type: text
    content: You brought us into the net;
  - type: text
    content: You laid affliction on our backs.
  '12':
  - type: note
    content: Is. 51:23
  - type: text
    content: You have caused men to ride over our heads;
  - type: note
    content: Is. 43:2
  - type: text
    content: We went through fire and through water;
  - type: text
    content: 'But You brought us out to rich '
  - type: text
    content: fulfillment.
  '13':
  - type: note
    content: Ps. 100:4; 116:14, 17–19
  - type: text
    content: I will go into Your house with burnt offerings;
  - type: note
    content: (Eccl. 5:4)
  - type: text
    content: I will pay You my vows,
  '14':
  - type: text
    content: Which my lips have uttered
  - type: text
    content: And my mouth has spoken when I was in trouble.
  '15':
  - type: text
    content: I will offer You burnt sacrifices of fat animals,
  - type: text
    content: With the sweet aroma of rams;
  - type: text
    content: I will offer bulls with goats.
  - type: text
    content: Selah
  '16':
  - type: text
    content: 'Come '
  - type: text
    content: and
  - type: text
    content: ' hear, all you who fear God,'
  - type: text
    content: And I will declare what He has done for my soul.
  '17':
  - type: text
    content: I cried to Him with my mouth,
  - type: text
    content: And He was extolled with my tongue.
  '18':
  - type: note
    content: Job 27:9; (Prov. 15:29; 28:9); Is. 1:15; (John 9:31; James 4:3)
  - type: text
    content: If I regard iniquity in my heart,
  - type: text
    content: The Lord will not hear.
  '19':
  - type: text
    content: But
  - type: text
    content: ' certainly God '
  - type: note
    content: Ps. 116:1, 2
  - type: text
    content: 'has heard '
  - type: text
    content: me;
  - type: text
    content: He has attended to the voice of my prayer.
  '2':
  - type: text
    content: Sing out the honor of His name;
  - type: text
    content: Make His praise glorious.
  '20':
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' God,'
  - type: text
    content: Who has not turned away my prayer,
  - type: text
    content: Nor His mercy from me!
  '3':
  - type: text
    content: Say to God,
  - type: text
    content: '“How '
  - type: note
    content: Ps. 65:5
  - type: text
    content: awesome are Your works!
  - type: note
    content: Ps. 18:44
  - type: text
    content: Through the greatness of Your power
  - type: text
    content: Your enemies shall submit themselves to You.
  '4':
  - type: note
    content: Ps. 117:1; Zech. 14:16
  - type: text
    content: All the earth shall worship You
  - type: text
    content: And sing praises to You;
  - type: text
    content: 'They shall sing praises '
  - type: text
    content: to
  - type: text
    content: ' Your name.”'
  - type: text
    content: Selah
  '5':
  - type: text
    content: Come and see the works of God;
  - type: text
    content: He
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' awesome '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: text
    content: His
  - type: text
    content: ' doing toward the sons of men.'
  '6':
  - type: note
    content: Ex. 14:21
  - type: text
    content: 'He turned the sea into dry '
  - type: text
    content: land;
  - type: note
    content: Josh. 3:14–16
  - type: text
    content: They went through the river on foot.
  - type: text
    content: There we will rejoice in Him.
  '7':
  - type: text
    content: He rules by His power forever;
  - type: text
    content: His eyes observe the nations;
  - type: text
    content: Do not let the rebellious exalt themselves.
  - type: text
    content: Selah
  '8':
  - type: text
    content: Oh, bless our God, you peoples!
  - type: text
    content: And make the voice of His praise to be heard,
  '9':
  - type: text
    content: Who keeps our soul among the living,
  - type: text
    content: And does not allow our feet to be moved.
