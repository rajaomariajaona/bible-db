verses:
  '1':
  - type: heading
    content: Heaven Exults over Babylon
  - type: text
    content: 'After these things '
  - type: note
    content: Jer. 51:48; Rev. 11:15; 19:6
  - type: text
    content: 'I heard a loud voice of a great multitude in heaven, saying, “Alleluia! '
  - type: note
    content: Rev. 4:11
  - type: text
    content: 'Salvation and glory and honor and power '
  - type: text
    content: belong
  - type: text
    content: ' to the Lord our God! '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: Rev. 22:8
  - type: text
    content: 'I fell at his feet to worship him. But he said to me, '
  - type: note
    content: Acts 10:26; Rev. 22:9
  - type: text
    content: '“See '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: you
  - type: text
    content: ' '
  - type: text
    content: do
  - type: text
    content: ' not '
  - type: text
    content: do
  - type: text
    content: ' '
  - type: text
    content: that!
  - type: text
    content: ' I am your '
  - type: note
    content: (Heb. 1:14)
  - type: text
    content: 'fellow servant, and of your brethren '
  - type: note
    content: 1 John 5:10
  - type: text
    content: 'who have the testimony of Jesus. Worship God! For the '
  - type: note
    content: Luke 24:27; John 5:39
  - type: text
    content: testimony of Jesus is the spirit of prophecy.”
  - type: heading
    content: Christ on a White Horse
  '11':
  - type: note
    content: Rev. 15:5
  - type: text
    content: 'Now I saw heaven opened, and behold, '
  - type: note
    content: Ps. 45:3, 4; Rev. 6:2; 19:19, 21
  - type: text
    content: 'a white horse. And He who sat on him '
  - type: text
    content: was
  - type: text
    content: ' called '
  - type: note
    content: Rev. 3:7, 14
  - type: text
    content: 'Faithful and True, and '
  - type: note
    content: Ps. 96:13; Is. 11:4
  - type: text
    content: 'in righteousness He judges and makes war. '
  '12':
  - type: note
    content: Dan. 10:6; Rev. 1:14
  - type: text
    content: 'His eyes '
  - type: text
    content: were
  - type: text
    content: ' like a flame of fire, and on His head '
  - type: text
    content: were
  - type: text
    content: ' many crowns. '
  - type: note
    content: Rev. 2:17; 19:16
  - type: text
    content: 'He had a name written that no one knew except Himself. '
  '13':
  - type: note
    content: Is. 63:2, 3
  - type: text
    content: 'He '
  - type: text
    content: was
  - type: text
    content: ' clothed with a robe dipped in blood, and His name is called '
  - type: note
    content: (John 1:1, 14)
  - type: text
    content: 'The Word of God. '
  '14':
  - type: note
    content: Rev. 14:20
  - type: text
    content: 'And the armies in heaven, '
  - type: note
    content: Matt. 28:3
  - type: text
    content: 'clothed in fine linen, white and clean, followed Him on white horses. '
  '15':
  - type: text
    content: 'Now '
  - type: note
    content: Is. 11:4; 2 Thess. 2:8; Rev. 1:16
  - type: text
    content: 'out of His mouth goes a sharp sword, that with it He should strike the nations. And '
  - type: note
    content: Ps. 2:8, 9
  - type: text
    content: 'He Himself will rule them with a rod of iron. '
  - type: note
    content: Is. 63:3–6; Rev. 14:20
  - type: text
    content: 'He Himself treads the winepress of the fierceness and wrath of Almighty God. '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: Rev. 2:17; 19:12
  - type: text
    content: 'He has on '
  - type: text
    content: His
  - type: text
    content: ' robe and on His thigh a name written:'
  - type: note
    content: Dan. 2:47
  - type: text
    content: KING OF KINGS AND
  - type: text
    content: LORD OF LORDS.
  - type: heading
    content: The Beast and His Armies Defeated
  '17':
  - type: text
    content: 'Then I saw an angel standing in the sun; and he cried with a loud voice, saying to all the birds that fly in the midst of heaven, '
  - type: note
    content: 1 Sam. 17:44; Jer. 12:9; Ezek. 39:17
  - type: text
    content: '“Come and gather together for the supper of the great God, '
  '18':
  - type: note
    content: Ezek. 39:18–20
  - type: text
    content: 'that you may eat the flesh of kings, the flesh of captains, the flesh of mighty men, the flesh of horses and of those who sit on them, and the flesh of all '
  - type: text
    content: people,
  - type: text
    content: ' free and slave, both small and great.”'
  '19':
  - type: note
    content: Rev. 16:13–16
  - type: text
    content: 'And I saw the beast, the kings of the earth, and their armies, gathered together to make war against Him who sat on the horse and against His army. '
  '2':
  - type: text
    content: 'For '
  - type: note
    content: Rev. 15:3; 16:7
  - type: text
    content: 'true and righteous '
  - type: text
    content: are
  - type: text
    content: ' His judgments, because He has judged the great harlot who corrupted the earth with her fornication; and He '
  - type: note
    content: Deut. 32:43; 2 Kin. 9:7; Luke 18:7, 8; Rev. 6:10
  - type: text
    content: 'has avenged on her the blood of His servants '
  - type: text
    content: shed
  - type: text
    content: ' by her.” '
  '20':
  - type: note
    content: Rev. 16:13
  - type: text
    content: 'Then the beast was captured, and with him the false prophet who worked signs in his presence, by which he deceived those who received the mark of the beast and '
  - type: note
    content: Rev. 13:8, 12, 13
  - type: text
    content: 'those who worshiped his image. '
  - type: note
    content: Is. 30:33; Dan. 7:11
  - type: text
    content: 'These two were cast alive into the lake of fire '
  - type: note
    content: Rev. 14:10
  - type: text
    content: 'burning with brimstone. '
  '21':
  - type: text
    content: 'And the rest '
  - type: note
    content: Rev. 19:15
  - type: text
    content: 'were killed with the sword which proceeded from the mouth of Him who sat on the horse. '
  - type: note
    content: Rev. 19:17, 18
  - type: text
    content: 'And all the birds '
  - type: note
    content: Rev. 17:16
  - type: text
    content: were filled with their flesh.
  '3':
  - type: text
    content: 'Again they said, “Alleluia! '
  - type: note
    content: Is. 34:10; Rev. 14:11
  - type: text
    content: 'Her smoke rises up forever and ever!” '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: Rev. 4:4, 6, 10
  - type: text
    content: 'the twenty-four elders and the four living creatures fell down and worshiped God who sat on the throne, saying, '
  - type: note
    content: 1 Chr. 16:36
  - type: text
    content: '“Amen! Alleluia!” '
  '5':
  - type: text
    content: 'Then a voice came from the throne, saying, '
  - type: note
    content: Ps. 134:1
  - type: text
    content: '“Praise our God, all you His servants and those who fear Him, '
  - type: note
    content: Rev. 11:18
  - type: text
    content: both small and great!”
  '6':
  - type: note
    content: Ezek. 1:24; Rev. 1:15; 14:2
  - type: text
    content: 'And I heard, as it were, the voice of a great multitude, as the sound of many waters and as the sound of mighty thunderings, saying, “Alleluia! For '
  - type: note
    content: Rev. 11:15
  - type: text
    content: 'the Lord God Omnipotent reigns! '
  '7':
  - type: text
    content: 'Let us be glad and rejoice and give Him glory, for '
  - type: note
    content: (Matt. 22:2; 25:10); Luke 12:36; John 3:29; (2 Cor. 11:2); Eph. 5:23, 32; Rev. 19:9
  - type: text
    content: 'the marriage of the Lamb has come, and His wife has made herself ready.” '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 45:13; Ezek. 16:10
  - type: text
    content: 'to her it was granted to be arrayed in fine linen, clean and bright, '
  - type: note
    content: Ps. 132:9
  - type: text
    content: for the fine linen is the righteous acts of the saints.
  '9':
  - type: text
    content: 'Then he said to me, “Write: '
  - type: note
    content: Matt. 22:2; Luke 14:15
  - type: text
    content: '‘Blessed '
  - type: text
    content: are
  - type: text
    content: ' those who are called to the marriage supper of the Lamb!’ ” And he said to me, '
  - type: note
    content: Rev. 22:6
  - type: text
    content: '“These are the true sayings of God.” '
