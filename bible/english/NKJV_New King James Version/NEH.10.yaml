      marker-yv: yv-n
    - type: text
      text: 'to bring the firstfruits of our dough, our offerings, the fruit from all kinds of trees, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' new wine and oil, to the priests, to the storerooms of the house of our God; and to bring '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 27:30; Num. 18:21; Mal. 3:10
      marker-yv: yv-n
    - type: text
      text: 'the tithes of our land to the Levites, for the Levites should receive the tithes in all our farming communities. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And the priest, the descendant of Aaron, shall be with the Levites '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 18:26
      marker-yv: yv-n
    - type: text
      text: 'when the Levites receive tithes; and the Levites shall bring up a tenth of the tithes to the house of our God, to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 9:26; 2 Chr. 31:11
      marker-yv: yv-n
    - type: text
