      marker-yv: yv-n
    - type: text
      text: 'to bring the firstfruits of our ground and the firstfruits of all fruit of all trees, year by year, to the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
