      marker: x
      children:
      - type: text
        text: Ex. 20:10; Lev. 23:3; Deut. 5:12
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: if
    - type: text
      text: ' the peoples of the land brought wares or any grain to sell on the Sabbath day, we would not buy it from them on the Sabbath, or on a holy day; and we would forego the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:10, 11; Lev. 25:4; Jer. 34:14
      marker-yv: yv-n
    - type: text
      text: 'seventh year’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: produce
    - type: text
      text: ' and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 15:1, 2); Neh. 5:12
      marker-yv: yv-n
    - type: text
      text: exacting of every debt.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Also we made ordinances for ourselves, to exact from ourselves yearly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:11–16; 38:25, 26; 2 Chr. 24:6, 9; Matt. 17:24
      marker-yv: yv-n
    - type: text
      text: 'one-third of a shekel for the service of the house of our God: '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 24:5; 2 Chr. 2:4
      marker-yv: yv-n
    - type: text
      text: 'the showbread, for the regular grain offering, for the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 28; 29
      marker-yv: yv-n
    - type: text
      text: 'regular burnt offering of the Sabbaths, the New Moons, and the set feasts; for the holy things, for the sin offerings to make atonement for Israel, and all the work of the house of our God. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'We cast lots among the priests, the Levites, and the people, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 13:31; (Is. 40:16)
      marker-yv: yv-n
    - type: text
      text: 'for bringing the wood offering into the house of our God, according to our fathers’ houses, at the appointed times year by year, to burn on the altar of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 6:12
      marker-yv: yv-n
    - type: text
      text: 'as '
    - type: usfm
