      marker-yv: yv-n
    - type: text
      text: 'shall bring the offering of the grain, of the new wine and the oil, to the storerooms where the articles of the sanctuary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are, where
    - type: text
      text: ' the priests who minister and the gatekeepers '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 13:10, 11
      marker-yv: yv-n
    - type: text
      text: 'and the singers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are;
    - type: text
      text: ' and we will not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 10:25)
      marker-yv: yv-n
    - type: text
      text: neglect the house of our God.
