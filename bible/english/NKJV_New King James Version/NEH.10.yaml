    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 2:36–43
      marker-yv: yv-n
    - type: text
      text: 'Now the rest of the people—the priests, the Levites, the gatekeepers, the singers, the Nethinim, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 9:1; Neh. 13:3
      marker-yv: yv-n
    - type: text
      text: 'and all those who had separated themselves from the peoples of the lands to the Law of God, their wives, their sons, and their daughters, everyone who had knowledge and understanding— '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'these joined with their brethren, their nobles, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 29:12; Neh. 5:12; Ps. 119:106
      marker-yv: yv-n
    - type: text
      text: 'and entered into a curse and an oath '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:3; 2 Chr. 34:31
      marker-yv: yv-n
    - type: text
      text: 'to walk in God’s Law, which was given by Moses the servant of God, and to observe and do all the commandments of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our Lord, and His ordinances and His statutes: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Pashhur, Amariah, Malchijah, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'We would not give '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 34:16; Deut. 7:3; (Ezra 9:12)
      marker-yv: yv-n
    - type: text
      text: 'our daughters as wives to the peoples of the land, nor take their daughters for our sons; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
