document_id: ECC.8,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' like a wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And who knows the interpretation of a thing?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 4:8, 9; Acts 6:15
      marker-yv: yv-n
    - type: text
      text: A man’s wisdom makes his face shine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:50
      marker-yv: yv-n
    - type: text
      text: the sternness of his face is changed.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Obey Authorities for God’s Sake
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then I saw the wicked buried, who had come and gone from the place of holiness, and they were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 2:16; 9:5
      marker-yv: yv-n
    - type: text
      text: 'forgotten in the city where they had so done. This also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 10:6; 50:21; Is. 26:10
      marker-yv: yv-n
    - type: text
      text: 'Because the sentence against an evil work is not executed speedily, therefore the heart of the sons of men is fully set in them to do evil. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 65:20; (Rom. 2:5–7)
      marker-yv: yv-n
    - type: text
      text: 'Though a sinner does evil a hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: times,
    - type: text
      text: ' and his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: days
    - type: text
      text: ' are prolonged, yet I surely know that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 4:40; Ps. 37:11, 18, 19; Prov. 1:32, 33; Is. 3:10; Matt. 25:34, 41)
      marker-yv: yv-n
    - type: text
      text: 'it will be well with those who fear God, who fear before Him. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But it will not be well with the wicked; nor will he prolong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' days, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' as a shadow, because he does not fear before God.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'There is a vanity which occurs on earth, that there are just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' to whom it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 73:14
      marker-yv: yv-n
    - type: text
      text: 'happens according to the work of the wicked; again, there are wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' to whom it happens according to the work of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 2:14; 7:15; 9:1–3
      marker-yv: yv-n
    - type: text
      text: 'righteous. I said that this also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 2:24
      marker-yv: yv-n
    - type: text
      text: 'So I commended enjoyment, because a man has nothing better under the sun than to eat, drink, and be merry; for this will remain with him in his labor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: all
    - type: text
      text: ' the days of his life which God gives him under the sun.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'When I applied my heart to know wisdom and to see the business that is done on earth, even though one sees no sleep day or night, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'then I saw all the work of God, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 5:9; Ps. 73:16; Eccl. 3:11; Rom. 11:33
      marker-yv: yv-n
    - type: text
      text: 'a man cannot find out the work that is done under the sun. For though a man labors to discover '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' yet he will not find '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it;
    - type: text
      text: ' moreover, though a wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' attempts to know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' he will not be able to find '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: say,
    - type: text
      text: ' “Keep the king’s commandment '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:11; 2 Sam. 21:7; 1 Chr. 29:24; Ezek. 17:18; (Rom. 13:5)
      marker-yv: yv-n
    - type: text
      text: 'for the sake of your oath to God. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 10:4
      marker-yv: yv-n
    - type: text
      text: Do not be hasty to go from his presence. Do not take your stand for an evil thing, for he does whatever pleases him.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Where the word of a king '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is, there is
    - type: text
      text: ' power;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 13:11, 13; Job 34:18
      marker-yv: yv-n
    - type: text
      text: who may say to him, “What are you doing?”
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: He who keeps his command will experience nothing harmful;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a wise man’s heart discerns both time and judgment,
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 3:1, 17
      marker-yv: yv-n
    - type: text
      text: for every matter there is a time and judgment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Though the misery of man increases greatly.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 24:22; Eccl. 6:12
      marker-yv: yv-n
    - type: text
      text: For he does not know what will happen;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So who can tell him when it will occur?
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 49:6, 7; Job 14:5
      marker-yv: yv-n
    - type: text
      text: No one has power over the spirit to retain the spirit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And no one has power in the day of death.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: There
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 20:5–8
      marker-yv: yv-n
    - type: text
      text: no release from that war,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And wickedness will not deliver those who are given to it.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'All this I have seen, and applied my heart to every work that is done under the sun: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: There
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a time in which one man rules over another to his own hurt.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Death Comes to All
    marker-yv: yv-h
