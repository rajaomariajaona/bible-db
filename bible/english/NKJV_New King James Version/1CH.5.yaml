    content: 'The sons of Reuben, the Gadites, and half the tribe of Manasseh '
  - type: text
    content: had
  - type: text
    content: ' forty-four thousand seven hundred and sixty valiant men, men able to bear shield and sword, to shoot with the bow, and skillful in war, who went to war. '
