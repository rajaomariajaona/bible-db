  - type: text
    content: 'put their trust in Him. '
  '21':
  - type: text
    content: 'Then they took away their livestock—fifty thousand of their camels, two hundred and fifty thousand of their sheep, and two thousand of their donkeys—also one hundred thousand of their men; '
  '22':
  - type: text
    content: 'for many fell dead, because the war '
  - type: note
