  - type: heading
    content: The Family of Manasseh (East)
  '23':
  - type: text
    content: 'So the children of the half-tribe of Manasseh dwelt in the land. Their '
  - type: text
    content: numbers
  - type: text
    content: ' increased from Bashan to Baal Hermon, that is, to '
  - type: note
    content: Deut. 3:9
  - type: text
    content: 'Senir, or Mount Hermon. '
  '24':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the heads of their fathers’ houses: Epher, Ishi, Eliel, Azriel, Jeremiah, Hodaviah, and Jahdiel. They were mighty men of valor, famous men, '
  - type: text
    content: and
  - type: text
    content: ' heads of their fathers’ houses.'
  '25':
  - type: text
    content: 'And they were unfaithful to the God of their fathers, and '
  - type: note
    content: 2 Kin. 17:7
  - type: text
    content: 'played the harlot after the gods of the peoples of the land, whom God had destroyed before them. '
  '26':
  - type: text
    content: 'So the God of Israel stirred up the spirit of '
  - type: note
    content: 2 Kin. 15:19
  - type: text
    content: 'Pul king of Assyria, that is, '
  - type: note
    content: 2 Kin. 15:29
  - type: text
    content: 'Tiglath-Pileser king of Assyria. He carried the Reubenites, the Gadites, and the half-tribe of Manasseh into captivity. He took them to '
  - type: note
    content: 2 Kin. 17:6; 18:11
  - type: text
    content: Halah, Habor, Hara, and the river of Gozan to this day.
  '3':
  - type: text
    content: 'the sons of '
  - type: note
    content: Gen. 46:9; Ex. 6:14; Num. 26:5
  - type: text
    content: Reuben the firstborn of Israel were Hanoch, Pallu, Hezron, and Carmi.
  '4':
  - type: text
    content: 'The sons of Joel '
  - type: text
    content: were
  - type: text
    content: ' Shemaiah his son, Gog his son, Shimei his son, '
  '5':
  - type: text
    content: 'Micah his son, Reaiah his son, Baal his son, '
  '6':
  - type: text
    content: 'and Beerah his son, whom Tiglath-Pileser king of Assyria '
  - type: note
    content: 2 Kin. 18:11
  - type: text
    content: 'carried into captivity. He '
  - type: text
    content: was
  - type: text
    content: ' leader of the Reubenites. '
  '7':
  - type: text
    content: 'And his brethren by their families, '
  - type: note
    content: 1 Chr. 5:17
  - type: text
    content: 'when the genealogy of their generations was registered: the chief, Jeiel, and Zechariah, '
  '8':
  - type: text
    content: 'and Bela the son of Azaz, the son of Shema, the son of Joel, who dwelt in '
  - type: note
    content: Num. 32:34; Josh. 12:2; 13:15, 16
  - type: text
    content: 'Aroer, as far as Nebo and Baal Meon. '
  '9':
  - type: text
    content: 'Eastward they settled as far as the entrance of the wilderness this side of the River Euphrates, because their cattle had multiplied '
  - type: note
    content: Josh. 22:8, 9
  - type: text
    content: in the land of Gilead.
