  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: came
  - type: text
    text: ' through the one who sinned. For the judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
