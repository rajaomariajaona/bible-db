  - type: text
    content: 'to all men, resulting in justification of life. '
  '19':
  - type: text
    content: 'For as by one man’s disobedience many were made sinners, so also by '
  - type: note
    content: Is. 53:11, 12; (Phil. 2:8)
  - type: text
    content: one Man’s obedience many will be made righteous.
  '2':
  - type: note
    content: (John 10:9; Eph. 2:18; 3:12; Heb. 10:19; 1 Pet. 3:18)
  - type: text
    content: 'through whom also we have access by faith into this grace '
  - type: note
    content: 1 Cor. 15:1
  - type: text
    content: 'in which we stand, and '
  - type: note
    content: Heb. 3:6
  - type: text
    content: 'rejoice in hope of the glory of God. '
  '20':
  - type: text
    content: 'Moreover '
  - type: note
    content: John 15:22
  - type: text
    content: 'the law entered that the offense might abound. But where sin abounded, grace '
  - type: note
    content: Luke 7:47; Rom. 6:1; 1 Tim. 1:14
  - type: text
    content: 'abounded much more, '
  '21':
  - type: text
    content: so that as sin reigned in death, even so grace might reign through righteousness to eternal life through Jesus Christ our Lord.
  '3':
  - type: text
    content: 'And not only '
  - type: text
    content: that,
  - type: text
    content: ' but '
  - type: note
    content: Matt. 5:11, 12; (John 16:33; Acts 5:41; 2 Cor. 12:9); James 1:2
  - type: text
    content: 'we also glory in tribulations, '
  - type: note
    content: James 1:3
  - type: text
    content: 'knowing that tribulation produces perseverance; '
  '4':
  - type: note
    content: Phil. 2:22; (James 1:12)
  - type: text
    content: 'and perseverance, character; and character, hope. '
  '5':
  - type: note
    content: Phil. 1:20
  - type: text
    content: 'Now hope does not disappoint, '
  - type: note
    content: 2 Cor. 1:22; Eph. 1:13
  - type: text
    content: because the love of God has been poured out in our hearts by the Holy Spirit who was given to us.
  - type: heading
    content: Christ in Our Place
  '6':
  - type: text
    content: 'For when we were still without strength, in due time '
  - type: note
    content: Is. 53:5; (Rom. 4:25; 5:8; 8:32; Gal. 2:20; Eph. 5:2)
  - type: text
    content: 'Christ died for the ungodly. '
  '7':
  - type: text
    content: 'For scarcely for a righteous man will one die; yet perhaps for a good man someone would even dare to die. '
  '8':
  - type: text
    content: 'But '
  - type: note
    content: (John 3:16; 15:13; Rom. 8:39)
  - type: text
    content: 'God demonstrates His own love toward us, in that while we were still sinners, Christ died for us. '
  '9':
  - type: text
    content: 'Much more then, having now been justified '
  - type: note
    content: Eph. 2:13; (1 John 1:7)
  - type: text
    content: 'by His blood, we shall be saved '
  - type: note
    content: Rom. 1:18; 1 Thess. 1:10
  - type: text
    content: 'from wrath through Him. '
