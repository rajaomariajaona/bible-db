  - type: text
    text: 'Therefore, just as '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 2:17; 3:6, 19; (Rom. 5:15–17; 1 Cor. 15:21)
    marker-yv: yv-n
  - type: text
    text: 'through one man sin entered the world, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 2:17
    marker-yv: yv-n
  - type: text
    text: 'death through sin, and thus death spread to all men, because all sinned— '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '(For until the law sin was in the world, but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 John 3:4
    marker-yv: yv-n
  - type: text
    text: 'sin is not imputed when there is no law. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nevertheless death reigned from Adam to Moses, even over those who had not sinned according to the likeness of the transgression of Adam, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 15:21, 22)
    marker-yv: yv-n
  - type: text
    text: 'who is a type of Him who was to come. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But the free gift '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' not like the offense. For if by the one man’s offense many died, much more the grace of God and the gift by the grace of the one Man, Jesus Christ, abounded '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 53:11)
    marker-yv: yv-n
  - type: text
    text: 'to many. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the gift '
