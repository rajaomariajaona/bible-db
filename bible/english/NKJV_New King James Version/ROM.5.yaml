  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 1:22; Eph. 1:13
    marker-yv: yv-n
  - type: text
    text: because the love of God has been poured out in our hearts by the Holy Spirit who was given to us.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Christ in Our Place
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For when we were still without strength, in due time '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 53:5; (Rom. 4:25; 5:8; 8:32; Gal. 2:20; Eph. 5:2)
    marker-yv: yv-n
  - type: text
    text: 'Christ died for the ungodly. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For scarcely for a righteous man will one die; yet perhaps for a good man someone would even dare to die. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 3:16; 15:13; Rom. 8:39)
    marker-yv: yv-n
  - type: text
    text: 'God demonstrates His own love toward us, in that while we were still sinners, Christ died for us. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Much more then, having now been justified '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 2:13; (1 John 1:7)
    marker-yv: yv-n
  - type: text
    text: 'by His blood, we shall be saved '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:18; 1 Thess. 1:10
    marker-yv: yv-n
  - type: text
    text: 'from wrath through Him. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 8:32)
    marker-yv: yv-n
  - type: text
    text: 'if when we were enemies '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 11:28; 2 Cor. 5:18; (Eph. 2:5, 6); Col. 1:21
    marker-yv: yv-n
  - type: text
    text: 'we were reconciled to God through the death of His Son, much more, having been reconciled, we shall be saved '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 14:19
    marker-yv: yv-n
  - type: text
    text: 'by His life. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And not only '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that,
  - type: text
    text: ' but we also '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Gal. 4:9)
    marker-yv: yv-n
  - type: text
    text: rejoice in God through our Lord Jesus Christ, through whom we have now received the reconciliation.
- type: usfm
