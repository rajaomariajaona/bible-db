    marker-yv: yv-n
  - type: text
    text: 'and perseverance, character; and character, hope. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 1:20
    marker-yv: yv-n
  - type: text
