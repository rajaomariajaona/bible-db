  - type: text
    content: ' in justification. '
  '17':
  - type: text
    content: For if by the one man’s offense death reigned through the one, much more those who receive abundance of grace and of the gift of righteousness will reign in life through the One, Jesus Christ.)
  '18':
  - type: text
    content: 'Therefore, as through one man’s offense '
  - type: text
