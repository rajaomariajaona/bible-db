  - type: text
    text: ' in condemnation, but the free gift '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: came
  - type: text
    text: ' from many offenses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: resulted
  - type: text
    text: ' in justification. '
  - type: usfm
    marker: v
