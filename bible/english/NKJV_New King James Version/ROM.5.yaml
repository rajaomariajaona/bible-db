  '1':
  - type: heading
    content: Faith Triumphs in Trouble
  - type: text
    content: 'Therefore, '
  - type: note
    content: Is. 32:17; John 16:33
  - type: text
    content: 'having been justified by faith, we have '
  - type: note
    content: (Is. 53:5); Acts 10:36; (Eph. 2:14)
  - type: text
    content: 'peace with God through our Lord Jesus Christ, '
  '10':
  - type: text
    content: 'For '
  - type: note
    content: (Rom. 8:32)
  - type: text
    content: 'if when we were enemies '
  - type: note
    content: Rom. 11:28; 2 Cor. 5:18; (Eph. 2:5, 6); Col. 1:21
  - type: text
    content: 'we were reconciled to God through the death of His Son, much more, having been reconciled, we shall be saved '
  - type: note
    content: John 14:19
  - type: text
    content: 'by His life. '
  '11':
  - type: text
    content: 'And not only '
  - type: text
    content: that,
  - type: text
    content: ' but we also '
  - type: note
    content: (Gal. 4:9)
  - type: text
    content: rejoice in God through our Lord Jesus Christ, through whom we have now received the reconciliation.
  - type: heading
    content: Death in Adam, Life in Christ
  '12':
  - type: text
    content: 'Therefore, just as '
  - type: note
    content: Gen. 2:17; 3:6, 19; (Rom. 5:15–17; 1 Cor. 15:21)
  - type: text
    content: 'through one man sin entered the world, and '
  - type: note
    content: Gen. 2:17
  - type: text
    content: 'death through sin, and thus death spread to all men, because all sinned— '
  '13':
  - type: text
    content: '(For until the law sin was in the world, but '
  - type: note
    content: 1 John 3:4
  - type: text
    content: 'sin is not imputed when there is no law. '
  '14':
  - type: text
    content: 'Nevertheless death reigned from Adam to Moses, even over those who had not sinned according to the likeness of the transgression of Adam, '
  - type: note
    content: (1 Cor. 15:21, 22)
  - type: text
    content: 'who is a type of Him who was to come. '
  '15':
  - type: text
    content: 'But the free gift '
  - type: text
    content: is
  - type: text
    content: ' not like the offense. For if by the one man’s offense many died, much more the grace of God and the gift by the grace of the one Man, Jesus Christ, abounded '
  - type: note
    content: (Is. 53:11)
  - type: text
    content: 'to many. '
  '16':
  - type: text
    content: 'And the gift '
  - type: text
