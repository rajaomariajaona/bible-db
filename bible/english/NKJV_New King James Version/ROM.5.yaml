    marker-yv: yv-n
  - type: text
    text: 'to all men, resulting in justification of life. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For as by one man’s disobedience many were made sinners, so also by '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 53:11, 12; (Phil. 2:8)
    marker-yv: yv-n
  - type: text
    text: one Man’s obedience many will be made righteous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Moreover '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 15:22
    marker-yv: yv-n
  - type: text
    text: 'the law entered that the offense might abound. But where sin abounded, grace '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 7:47; Rom. 6:1; 1 Tim. 1:14
    marker-yv: yv-n
  - type: text
    text: 'abounded much more, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: so that as sin reigned in death, even so grace might reign through righteousness to eternal life through Jesus Christ our Lord.
