    - type: text
      text: '7'
  - type: text
    text: 'For when they came into the house, he was lying on his bed in his bedroom; then they struck him and killed him, beheaded him and took his head, and were all night escaping through the plain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And they brought the head of Ishbosheth to David at Hebron, and said to the king, “Here is the head of Ishbosheth, the son of Saul your enemy, '
