    - type: text
      text: Ishbosheth Is Murdered
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Saul’s son heard that Abner had died in Hebron, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 2:5, 6, 32–34; 2 Tim. 4:14
      marker-yv: yv-n
    - type: text
      text: 'he lost heart, and all Israel was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 4:4; Is. 13:7
      marker-yv: yv-n
    - type: text
      text: 'troubled. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'when '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 48:16; 1 Kin. 1:29; Ps. 31:7
      marker-yv: yv-n
    - type: text
      text: 'someone told me, saying, ‘Look, Saul is dead,’ thinking to have brought good news, I arrested him and had him executed in Ziklag—the one who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thought
    - type: text
      text: ' I would give him a reward for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' news. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How much more, when wicked men have killed a righteous person in his own house on his bed? Therefore, shall I not now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 1:2–16
      marker-yv: yv-n
    - type: text
      text: 'require his blood at your hand and remove you from the earth?” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 9:5, 6; Ps. 9:12)
      marker-yv: yv-n
    - type: text
      text: 'commanded his young men, and they executed them, cut off their hands and feet, and hanged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' by the pool in Hebron. But they took the head of Ishbosheth and buried '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 1:15
      marker-yv: yv-n
    - type: text
      text: tomb of Abner in Hebron.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Saul’s son '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' two men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' captains of troops. The name of one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Baanah and the name of the other Rechab, the sons of Rimmon the Beerothite, of the children of Benjamin. (For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 2:3
      marker-yv: yv-n
    - type: text
      text: 'Beeroth also was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: part
    - type: text
      text: ' of Benjamin, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because the Beerothites fled to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:25
      marker-yv: yv-n
    - type: text
      text: Gittaim and have been sojourners there until this day.)
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 11:33
      marker-yv: yv-n
    - type: text
      text: 'Jonathan, Saul’s son, had a son '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' lame in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' feet. He was five years old when the news about Saul and Jonathan came '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 9:3
      marker-yv: yv-n
    - type: text
      text: 'from Jezreel; and his nurse took him up and fled. And it happened, as she made haste to flee, that he fell and became lame. His name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 29:1, 11
      marker-yv: yv-n
    - type: text
      text: Mephibosheth.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the sons of Rimmon the Beerothite, Rechab and Baanah, set out and came at about the heat of the day to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 9:6
      marker-yv: yv-n
    - type: text
      text: 'house of Ishbosheth, who was lying on his bed at noon. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they came there, all the way into the house, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: though
    - type: text
      text: ' to get wheat, and they stabbed him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 2:8, 9
      marker-yv: yv-n
    - type: text
      text: 'in the stomach. Then Rechab and Baanah his brother escaped. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For when they came into the house, he was lying on his bed in his bedroom; then they struck him and killed him, beheaded him and took his head, and were all night escaping through the plain. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they brought the head of Ishbosheth to David at Hebron, and said to the king, “Here is the head of Ishbosheth, the son of Saul your enemy, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 2:23; 20:10
      marker-yv: yv-n
    - type: text
      text: 'who sought your life; and the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has avenged my lord the king this day of Saul and his descendants.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But David answered Rechab and Baanah his brother, the sons of Rimmon the Beerothite, and said to them, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 19:2, 10, 11; 23:15; 25:29
      marker-yv: yv-n
    - type: text
      text: 'who has redeemed my life from all adversity, '
