  - type: text
    content: Him
  - type: text
    content: ' and said to them, '
  '10':
  - type: note
    content: Matt. 15:39
  - type: text
    content: immediately got into the boat with His disciples, and came to the region of Dalmanutha.
  - type: heading
    content: The Pharisees Seek a Sign
  '11':
  - type: note
    content: Matt. 12:38; 16:1; Luke 11:16; John 2:18; 6:30; 1 Cor. 1:22
  - type: text
    content: 'Then the Pharisees came out and began to dispute with Him, seeking from Him a sign from heaven, testing Him. '
  '12':
  - type: text
    content: 'But He '
  - type: note
    content: Mark 7:34
  - type: text
    content: 'sighed deeply in His spirit, and said, '
  - type: text
    content: '“Why does this generation seek a sign? Assuredly, I say to you, '
  - type: note
    content: Matt. 12:39
  - type: text
    content: no sign shall be given to this generation.”
  - type: heading
    content: Beware of the Leaven of the Pharisees and Herod
  '13':
  - type: text
    content: 'And He left them, and getting into the boat again, departed to the other side. '
  '14':
  - type: note
    content: Matt. 16:5
  - type: text
    content: 'Now the disciples had forgotten to take bread, and they did not have more than one loaf with them in the boat. '
  '15':
  - type: note
    content: Matt. 16:6; Luke 12:1
  - type: text
    content: 'Then He charged them, saying, '
  - type: text
    content: '“Take heed, beware of the '
  - type: text
    content: leaven of the Pharisees and the leaven of Herod.”
  '16':
  - type: text
    content: And they reasoned among themselves, saying, “
  - type: text
    content: It
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' because we have no bread.”'
  '17':
  - type: text
    content: 'But Jesus, being aware of '
  - type: text
    content: it,
  - type: text
    content: ' said to them, '
  - type: text
    content: '“Why do you reason because you have no bread? '
  - type: note
    content: Mark 6:52; 16:14
  - type: text
    content: 'Do you not yet perceive nor understand? Is your heart '
  - type: text
    content: still
  - type: text
    content: ' hardened?'
  - type: text
    content: ' '
  '18':
  - type: text
    content: Having eyes, do you not see? And having ears, do you not hear? And do you not remember?
  - type: text
    content: ' '
  '19':
  - type: note
    content: Matt. 14:20; Mark 6:43; Luke 9:17; John 6:13
  - type: text
    content: When I broke the five loaves for the five thousand, how many baskets full of fragments did you take up?”
  - type: text
    content: They said to Him, “Twelve.”
  '2':
  - type: text
    content: '“I have '
  - type: note
    content: Matt. 9:36; 14:14; Mark 1:41; 6:34
  - type: text
    content: compassion on the multitude, because they have now continued with Me three days and have nothing to eat.
  - type: text
    content: ' '
  '20':
  - type: text
    content: '“Also, '
  - type: note
    content: Matt. 15:37
  - type: text
    content: when I broke the seven for the four thousand, how many large baskets full of fragments did you take up?”
  - type: text
    content: And they said, “Seven.”
  '21':
  - type: text
    content: 'So He said to them, '
  - type: text
    content: '“How '
  - type: text
    content: is it
  - type: text
    content: ' '
  - type: note
    content: (Mark 6:52)
  - type: text
    content: you do not understand?”
  - type: heading
    content: A Blind Man Healed at Bethsaida
  '22':
  - type: text
    content: 'Then He came to Bethsaida; and they brought a '
  - type: note
    content: Matt. 9:27; John 9:1
  - type: text
    content: 'blind man to Him, and begged Him to '
  - type: note
    content: Luke 18:15
  - type: text
    content: 'touch him. '
  '23':
  - type: text
    content: 'So He took the blind man by the hand and led him out of the town. And when '
  - type: note
    content: Mark 7:33
  - type: text
    content: He had spit on his eyes and put His hands on him, He asked him if he saw anything.
  '24':
  - type: text
    content: And he looked up and said, “I see men like trees, walking.”
  '25':
  - type: text
    content: 'Then He put '
  - type: text
    content: His
  - type: text
    content: ' hands on his eyes again and made him look up. And he was restored and saw everyone clearly. '
  '26':
  - type: text
    content: 'Then He sent him away to his house, saying, '
  - type: text
    content: '“Neither go into the town, '
  - type: note
    content: Matt. 8:4; Mark 5:43; 7:36
  - type: text
    content: nor tell anyone in the town.”
  - type: heading
    content: Peter Confesses Jesus as the Christ
  '27':
  - type: note
    content: Matt. 16:13–16; Luke 9:18–20
  - type: text
    content: 'Now Jesus and His disciples went out to the towns of Caesarea Philippi; and on the road He asked His disciples, saying to them, '
  - type: text
    content: “Who do men say that I am?”
  '28':
  - type: text
    content: 'So they answered, '
  - type: note
    content: Matt. 14:2
  - type: text
    content: '“John the Baptist; but some '
  - type: text
    content: say,
  - type: text
    content: ' '
  - type: note
    content: Mark 6:14, 15; Luke 9:7, 8
  - type: text
    content: Elijah; and others, one of the prophets.”
  '29':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “But who do you say that I am?”
  - type: text
    content: 'Peter answered and said to Him, '
  - type: note
    content: John 1:41; 4:42; 6:69; 11:27; Acts 2:36; 8:37; 9:20
  - type: text
    content: “You are the Christ.”
  '3':
  - type: text
    content: And if I send them away hungry to their own houses, they will faint on the way; for some of them have come from afar.”
  '30':
  - type: note
    content: Matt. 8:4; 16:20; Luke 9:21
  - type: text
    content: Then He strictly warned them that they should tell no one about Him.
  - type: heading
    content: Jesus Predicts His Death and Resurrection
  '31':
  - type: text
    content: 'And '
  - type: note
    content: (Is. 53:3–11); Matt. 16:21; 20:19; Luke 18:31–33; 1 Pet. 1:11
  - type: text
    content: 'He began to teach them that the Son of Man must suffer many things, and be '
  - type: note
    content: Mark 10:33
  - type: text
    content: 'rejected by the elders and chief priests and scribes, and be '
  - type: note
    content: Mark 9:31; 10:34
  - type: text
    content: 'killed, and after three days rise again. '
  '32':
  - type: text
    content: 'He spoke this word openly. Then Peter took Him aside and began to rebuke Him. '
  '33':
  - type: text
    content: 'But when He had turned around and looked at His disciples, He '
  - type: note
    content: Mark 16:14; (Rev. 3:19)
  - type: text
    content: 'rebuked Peter, saying, '
  - type: text
    content: '“Get behind Me, Satan! For you are not '
  - type: text
    content: mindful of the things of God, but the things of men.”
  - type: heading
    content: Take Up the Cross and Follow Him
  '34':
  - type: text
    content: 'When He had called the people to '
  - type: text
    content: Himself,
  - type: text
    content: ' with His disciples also, He said to them, '
  - type: note
    content: (Matt. 10:38); Luke 14:27
  - type: text
    content: “Whoever desires to come after Me, let him deny himself, and take up his cross, and follow Me.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 10:39; Luke 17:33; John 12:25
  - type: text
    content: whoever desires to save his life will lose it, but whoever loses his life for My sake and the gospel’s will save it.
  - type: text
    content: ' '
  '36':
  - type: text
    content: For what will it profit a man if he gains the whole world, and loses his own soul?
  - type: text
    content: ' '
  '37':
  - type: text
    content: Or what will a man give in exchange for his soul?
  - type: text
    content: ' '
  '38':
  - type: note
    content: Matt. 10:33; Luke 9:26; 12:9
  - type: text
    content: 'For whoever '
  - type: note
    content: Rom. 1:16; 2 Tim. 1:8, 9; 2:12
  - type: text
    content: is ashamed of Me and My words in this adulterous and sinful generation, of him the Son of Man also will be ashamed when He comes in the glory of His Father with the holy angels.”
  '4':
  - type: text
    content: Then His disciples answered Him, “How can one satisfy these people with bread here in the wilderness?”
  '5':
  - type: note
    content: Matt. 15:34; Mark 6:38; John 6:9
  - type: text
    content: 'He asked them, '
  - type: text
    content: “How many loaves do you have?”
  - type: text
    content: And they said, “Seven.”
  '6':
  - type: text
    content: 'So He commanded the multitude to sit down on the ground. And He took the seven loaves and gave thanks, broke '
  - type: text
    content: them
  - type: text
    content: ' and gave '
  - type: text
    content: them
  - type: text
    content: ' to His disciples to set before '
  - type: text
    content: them;
  - type: text
    content: ' and they set '
  - type: text
    content: them
  - type: text
    content: ' before the multitude. '
  '7':
  - type: text
    content: 'They also had a few small fish; and '
  - type: note
    content: Matt. 14:19; Mark 6:41
  - type: text
    content: 'having blessed them, He said to set them also before '
  - type: text
    content: them.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'So they ate and were filled, and they took up seven large baskets of leftover fragments. '
  '9':
  - type: text
    content: 'Now those who had eaten were about four thousand. And He sent them away, '
