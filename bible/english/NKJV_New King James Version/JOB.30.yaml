document_id: JOB.30,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“But now they mock at me, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' younger than I,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whose fathers I disdained to put with the dogs of my flock.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They abhor me, they keep far from me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They do not hesitate '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 12:14; Deut. 25:9; Job 17:6; Is. 50:6; Matt. 26:67; 27:30
      marker-yv: yv-n
    - type: text
      text: to spit in my face.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 12:18
      marker-yv: yv-n
    - type: text
      text: He has loosed my bowstring and afflicted me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have cast off restraint before me.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'At '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' right '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hand
    - type: text
      text: ' the rabble arises;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They push away my feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 19:12
      marker-yv: yv-n
    - type: text
      text: they raise against me their ways of destruction.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They break up my path,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They promote my calamity;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have no helper.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They come as broad breakers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Under the ruinous storm they roll along.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Terrors are turned upon me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They pursue my honor as the wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my prosperity has passed like a cloud.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 42:4
      marker-yv: yv-n
    - type: text
      text: ' now my soul is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 22:14; Is. 53:12
      marker-yv: yv-n
    - type: text
      text: 'poured out because of my '
    - type: usfm
      marker: it
      children:
      - type: text
        text: plight;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The days of affliction take hold of me.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My bones are pierced in me at night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my gnawing pains take no rest.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By great force my garment is disfigured;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It binds me about as the collar of my coat.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has cast me into the mire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I have become like dust and ashes.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Indeed, what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: profit
    - type: text
      text: ' is the strength of their hands to me?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their vigor has perished.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 19:7
      marker-yv: yv-n
    - type: text
      text: cry out to You, but You do not answer me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I stand up, and You regard me.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But
    - type: text
      text: ' You have become cruel to me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'With the strength of Your hand You '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 10:3; 16:9, 14; 19:6, 22
      marker-yv: yv-n
    - type: text
      text: oppose me.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You lift me up to the wind and cause me to ride '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You spoil my success.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' You will bring me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' death,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' the house '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 9:27)
      marker-yv: yv-n
    - type: text
      text: appointed for all living.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Surely He would not stretch out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' hand against a heap of ruins,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If they cry out when He destroys '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 35:13, 14; Rom. 12:15
      marker-yv: yv-n
    - type: text
      text: Have I not wept for him who was in trouble?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Has '
    - type: usfm
      marker: it
      children:
      - type: text
        text: not
    - type: text
      text: ' my soul grieved for the poor?'
  '26':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 3:25, 26; Jer. 8:15
      marker-yv: yv-n
    - type: text
      text: 'But when I looked for good, evil came '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And when I waited for light, then came darkness.
  '27':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My heart is in turmoil and cannot rest;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Days of affliction confront me.
  '28':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 30:31; Ps. 38:6; 42:9; 43:2
      marker-yv: yv-n
    - type: text
      text: I go about mourning, but not in the sun;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I stand up in the assembly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cry out for help.'
  '29':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 44:19; 102:6; Mic. 1:8
      marker-yv: yv-n
    - type: text
      text: I am a brother of jackals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a companion of ostriches.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: They
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' gaunt from want and famine,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fleeing late to the wilderness, desolate and waste,
  '30':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:83; Lam. 4:8; 5:10
      marker-yv: yv-n
    - type: text
      text: My skin grows black and falls from me;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 102:3
      marker-yv: yv-n
    - type: text
      text: My bones burn with fever.
  '31':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My harp is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: turned
    - type: text
      text: ' to mourning,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my flute to the voice of those who weep.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who pluck mallow by the bushes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And broom tree roots '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' their food.'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They were driven out from among '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They shouted at them as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at
    - type: text
      text: ' a thief.'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: They
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' to live in the clefts of the valleys,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: In
    - type: text
      text: ' caves of the earth and the rocks.'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Among the bushes they brayed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Under the nettles they nestled.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: They
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sons of fools,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, sons of vile men;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They were scourged from the land.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 17:6; Ps. 69:12; Lam. 3:14, 63
      marker-yv: yv-n
    - type: text
      text: ' now I am their taunting song;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, I am their byword.
