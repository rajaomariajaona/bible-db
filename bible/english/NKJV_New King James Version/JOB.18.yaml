  '1':
  - type: heading
    content: 'Bildad: The Wicked Are Punished'
  - type: text
    content: 'Then '
  - type: note
    content: Job 8:1
  - type: text
    content: 'Bildad the Shuhite answered and said:'
  '10':
  - type: text
    content: 'A noose '
  - type: text
    content: is
  - type: text
    content: ' hidden for him on the ground,'
  - type: text
    content: And a trap for him in the road.
  '11':
  - type: note
    content: Job 20:25; Jer. 6:25
  - type: text
    content: Terrors frighten him on every side,
  - type: text
    content: And drive him to his feet.
  '12':
  - type: text
    content: His strength is starved,
  - type: text
    content: 'And '
  - type: note
    content: Job 15:23
  - type: text
    content: 'destruction '
  - type: text
    content: is
  - type: text
    content: ' ready at his side.'
  '13':
  - type: text
    content: It devours patches of his skin;
  - type: text
    content: The firstborn of death devours his limbs.
  '14':
  - type: text
    content: 'He is uprooted from '
  - type: note
    content: Job 11:20
  - type: text
    content: the shelter of his tent,
  - type: text
    content: And they parade him before the king of terrors.
  '15':
  - type: text
    content: 'They dwell in his tent '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' none of his;'
  - type: text
    content: Brimstone is scattered on his dwelling.
  '16':
  - type: note
    content: Job 29:19
  - type: text
    content: His roots are dried out below,
  - type: text
    content: And his branch withers above.
  '17':
  - type: note
    content: Job 24:20; (Ps. 34:16); Prov. 10:7
  - type: text
    content: The memory of him perishes from the earth,
  - type: text
    content: And he has no name among the renowned.
  '18':
  - type: text
    content: He is driven from light into darkness,
  - type: text
    content: And chased out of the world.
  '19':
  - type: note
    content: Job 27:14, 15; Is. 14:22
  - type: text
    content: He has neither son nor posterity among his people,
  - type: text
    content: Nor any remaining in his dwellings.
  '2':
  - type: text
    content: '“How long '
  - type: text
    content: till
  - type: text
    content: ' you put an end to words?'
  - type: text
    content: Gain understanding, and afterward we will speak.
  '20':
  - type: text
    content: 'Those in the west are astonished '
  - type: note
    content: Ps. 37:13; Jer. 50:27; Obad. 12
  - type: text
    content: at his day,
  - type: text
    content: As those in the east are frightened.
  '21':
  - type: text
    content: 'Surely such '
  - type: text
    content: are
  - type: text
    content: ' the dwellings of the wicked,'
  - type: text
    content: 'And this '
  - type: text
    content: is
  - type: text
    content: ' the place '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: him
  - type: text
    content: ' '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: note
    content: Jer. 9:3; 1 Thess. 4:5
  - type: text
    content: does not know God.”
  '3':
  - type: text
    content: 'Why are we counted '
  - type: note
    content: Ps. 73:22
  - type: text
    content: as beasts,
  - type: text
    content: And
  - type: text
    content: ' regarded as stupid in your sight?'
  '4':
  - type: note
    content: Job 13:14
  - type: text
    content: You who tear yourself in anger,
  - type: text
    content: Shall the earth be forsaken for you?
  - type: text
    content: Or shall the rock be removed from its place?
  '5':
  - type: text
    content: “The
  - type: note
    content: Job 21:17; Prov. 13:9; 20:20; 24:20
  - type: text
    content: ' light of the wicked indeed goes out,'
  - type: text
    content: And the flame of his fire does not shine.
  '6':
  - type: text
    content: The light is dark in his tent,
  - type: note
    content: Job 21:17; Ps. 18:28
  - type: text
    content: And his lamp beside him is put out.
  '7':
  - type: text
    content: The steps of his strength are shortened,
  - type: text
    content: 'And '
  - type: note
    content: Job 5:12, 13; 15:6
  - type: text
    content: his own counsel casts him down.
  '8':
  - type: text
    content: 'For '
  - type: note
    content: Job 22:10; Ps. 9:15; 35:8; Is. 24:17, 18
  - type: text
    content: he is cast into a net by his own feet,
  - type: text
    content: And he walks into a snare.
  '9':
  - type: text
    content: 'The net takes '
  - type: text
    content: him
  - type: text
    content: ' by the heel,'
  - type: text
    content: And
  - type: text
    content: ' '
  - type: note
    content: Job 5:5
  - type: text
    content: a snare lays hold of him.
