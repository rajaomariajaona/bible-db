  '1':
  - type: heading
    content: The Appointed Boundaries of Canaan
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: '‘You shall mark out your eastern border from Hazar Enan to Shepham; '
  '11':
  - type: text
    content: 'the border shall go down from Shepham to '
  - type: note
    content: 2 Kin. 23:33; Jer. 39:5, 6
  - type: text
    content: 'Riblah on the east side of Ain; the border shall go down and reach to the eastern side of the Sea '
  - type: note
    content: Deut. 3:17; Josh. 11:2; 12:3; 13:27; 19:35; Matt. 14:34; Luke 5:1
  - type: text
    content: 'of Chinnereth; '
  '12':
  - type: text
    content: 'the border shall go down along the Jordan, and it shall end at '
  - type: note
    content: Num. 34:3
  - type: text
    content: the Salt Sea. This shall be your land with its surrounding boundaries.’ ”
  '13':
  - type: text
    content: 'Then Moses commanded the children of Israel, saying: '
  - type: note
    content: Gen. 15:18; Num. 26:52–56; Deut. 11:24; Josh. 14:1–5
  - type: text
    content: '“This '
  - type: text
    content: is
  - type: text
    content: ' the land which you shall inherit by lot, which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has commanded to give to the nine tribes and to the half-tribe. '
  '14':
  - type: note
    content: Num. 32:33
  - type: text
    content: 'For the tribe of the children of Reuben according to the house of their fathers, and the tribe of the children of Gad according to the house of their fathers, have received '
  - type: text
    content: their
  - type: text
    content: ' '
  - type: text
    content: inheritance;
  - type: text
    content: ' and the half-tribe of Manasseh has received its inheritance. '
  '15':
  - type: text
    content: 'The two tribes and the half-tribe have received their inheritance on this side of the Jordan, '
  - type: text
    content: across
  - type: text
    content: ' '
  - type: text
    content: from
  - type: text
    content: ' Jericho eastward, toward the sunrise.”'
  - type: heading
    content: The Leaders Appointed to Divide the Land
  '16':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '17':
  - type: text
    content: '“These '
  - type: text
    content: are
  - type: text
    content: ' the names of the men who shall divide the land among you as an inheritance: '
  - type: note
    content: Josh. 14:1, 2; 19:51
  - type: text
    content: 'Eleazar the priest and Joshua the son of Nun. '
  '18':
  - type: text
    content: 'And you shall take one '
  - type: note
    content: Num. 1:4, 16
  - type: text
    content: 'leader of every tribe to divide the land for the inheritance. '
  '19':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the names of the men: from the tribe of Judah, Caleb the son of Jephunneh; '
  '2':
  - type: text
    content: '“Command the children of Israel, and say to them: ‘When you come into '
  - type: note
    content: Gen. 17:8; Deut. 1:7, 8; Ps. 78:54, 55; 105:11
  - type: text
    content: 'the land of Canaan, this '
  - type: text
    content: is
  - type: text
    content: ' the land that shall fall to you as an inheritance—the land of Canaan to its boundaries. '
  '20':
  - type: text
    content: 'from the tribe of the children of Simeon, Shemuel the son of Ammihud; '
  '21':
  - type: text
    content: 'from the tribe of Benjamin, Elidad the son of Chislon; '
  '22':
  - type: text
    content: 'a leader from the tribe of the children of Dan, Bukki the son of Jogli; '
  '23':
  - type: text
    content: 'from the sons of Joseph: a leader from the tribe of the children of Manasseh, Hanniel the son of Ephod, '
  '24':
  - type: text
    content: 'and a leader from the tribe of the children of Ephraim, Kemuel the son of Shiphtan; '
  '25':
  - type: text
    content: 'a leader from the tribe of the children of Zebulun, Elizaphan the son of Parnach; '
  '26':
  - type: text
    content: 'a leader from the tribe of the children of Issachar, Paltiel the son of Azzan; '
  '27':
  - type: text
    content: 'a leader from the tribe of the children of Asher, Ahihud the son of Shelomi; '
  '28':
  - type: text
    content: and a leader from the tribe of the children of Naphtali, Pedahel the son of Ammihud.”
  '29':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the ones the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded to divide the inheritance among the children of Israel in the land of Canaan.'
  '3':
  - type: note
    content: Josh. 15:1–3; Ezek. 47:13, 19
  - type: text
    content: 'Your southern border shall be from the Wilderness of Zin along the border of Edom; then your southern border shall extend eastward to the end of '
  - type: note
    content: Gen. 14:3; Josh. 15:2
  - type: text
    content: 'the Salt Sea; '
  '4':
  - type: text
    content: 'your border shall turn from the southern side of '
  - type: note
    content: Josh. 15:3
  - type: text
    content: 'the Ascent of Akrabbim, continue to Zin, and be on the south of '
  - type: note
    content: Num. 13:26; 32:8
  - type: text
    content: 'Kadesh Barnea; then it shall go on to '
  - type: note
    content: Josh. 15:3, 4
  - type: text
    content: 'Hazar Addar, and continue to Azmon; '
  '5':
  - type: text
    content: 'the border shall turn from Azmon '
  - type: note
    content: Gen. 15:18; Josh. 15:4, 47; 1 Kin. 8:65; Is. 27:12
  - type: text
    content: to the Brook of Egypt, and it shall end at the Sea.
  '6':
  - type: text
    content: '‘As for the '
  - type: note
    content: Ex. 23:31; Josh. 15:12; Ezek. 47:20
  - type: text
    content: western border, you shall have the Great Sea for a border; this shall be your western border.
  '7':
  - type: text
    content: '‘And this shall be your northern border: From the Great Sea you shall mark out your '
  - type: text
    content: border
  - type: text
    content: ' line to '
  - type: note
    content: Num. 33:37
  - type: text
    content: 'Mount Hor; '
  '8':
  - type: text
    content: 'from Mount Hor you shall mark out '
  - type: text
    content: your
  - type: text
    content: ' '
  - type: text
    content: border
  - type: text
    content: ' '
  - type: note
    content: Num. 13:21; Josh. 13:5; 2 Kin. 14:25
  - type: text
    content: 'to the entrance of Hamath; then the direction of the border shall be toward '
  - type: note
    content: Ezek. 47:15
  - type: text
    content: 'Zedad; '
  '9':
  - type: text
    content: 'the border shall proceed to Ziphron, and it shall end at '
  - type: note
    content: Ezek. 47:17
  - type: text
    content: Hazar Enan. This shall be your northern border.
