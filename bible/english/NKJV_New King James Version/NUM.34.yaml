document_id: NUM.34,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Appointed Boundaries of Canaan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘You shall mark out your eastern border from Hazar Enan to Shepham; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the border shall go down from Shepham to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:33; Jer. 39:5, 6
      marker-yv: yv-n
    - type: text
      text: 'Riblah on the east side of Ain; the border shall go down and reach to the eastern side of the Sea '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 3:17; Josh. 11:2; 12:3; 13:27; 19:35; Matt. 14:34; Luke 5:1
      marker-yv: yv-n
    - type: text
      text: 'of Chinnereth; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the border shall go down along the Jordan, and it shall end at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 34:3
      marker-yv: yv-n
    - type: text
      text: the Salt Sea. This shall be your land with its surrounding boundaries.’ ”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses commanded the children of Israel, saying: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:18; Num. 26:52–56; Deut. 11:24; Josh. 14:1–5
      marker-yv: yv-n
    - type: text
      text: '“This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the land which you shall inherit by lot, which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded to give to the nine tribes and to the half-tribe. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:33
      marker-yv: yv-n
    - type: text
      text: 'For the tribe of the children of Reuben according to the house of their fathers, and the tribe of the children of Gad according to the house of their fathers, have received '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: inheritance;
    - type: text
      text: ' and the half-tribe of Manasseh has received its inheritance. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The two tribes and the half-tribe have received their inheritance on this side of the Jordan, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: across
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' Jericho eastward, toward the sunrise.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Leaders Appointed to Divide the Land
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the names of the men who shall divide the land among you as an inheritance: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 14:1, 2; 19:51
      marker-yv: yv-n
    - type: text
      text: 'Eleazar the priest and Joshua the son of Nun. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall take one '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 1:4, 16
      marker-yv: yv-n
    - type: text
      text: 'leader of every tribe to divide the land for the inheritance. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the names of the men: from the tribe of Judah, Caleb the son of Jephunneh; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Command the children of Israel, and say to them: ‘When you come into '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:8; Deut. 1:7, 8; Ps. 78:54, 55; 105:11
      marker-yv: yv-n
    - type: text
      text: 'the land of Canaan, this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the land that shall fall to you as an inheritance—the land of Canaan to its boundaries. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of the children of Simeon, Shemuel the son of Ammihud; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of Benjamin, Elidad the son of Chislon; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'a leader from the tribe of the children of Dan, Bukki the son of Jogli; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the sons of Joseph: a leader from the tribe of the children of Manasseh, Hanniel the son of Ephod, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and a leader from the tribe of the children of Ephraim, Kemuel the son of Shiphtan; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'a leader from the tribe of the children of Zebulun, Elizaphan the son of Parnach; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'a leader from the tribe of the children of Issachar, Paltiel the son of Azzan; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'a leader from the tribe of the children of Asher, Ahihud the son of Shelomi; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and a leader from the tribe of the children of Naphtali, Pedahel the son of Ammihud.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the ones the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded to divide the inheritance among the children of Israel in the land of Canaan.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:1–3; Ezek. 47:13, 19
      marker-yv: yv-n
    - type: text
      text: 'Your southern border shall be from the Wilderness of Zin along the border of Edom; then your southern border shall extend eastward to the end of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:3; Josh. 15:2
      marker-yv: yv-n
    - type: text
      text: 'the Salt Sea; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'your border shall turn from the southern side of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:3
      marker-yv: yv-n
    - type: text
      text: 'the Ascent of Akrabbim, continue to Zin, and be on the south of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:26; 32:8
      marker-yv: yv-n
    - type: text
      text: 'Kadesh Barnea; then it shall go on to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:3, 4
      marker-yv: yv-n
    - type: text
      text: 'Hazar Addar, and continue to Azmon; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the border shall turn from Azmon '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:18; Josh. 15:4, 47; 1 Kin. 8:65; Is. 27:12
      marker-yv: yv-n
    - type: text
      text: to the Brook of Egypt, and it shall end at the Sea.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘As for the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:31; Josh. 15:12; Ezek. 47:20
      marker-yv: yv-n
    - type: text
      text: western border, you shall have the Great Sea for a border; this shall be your western border.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘And this shall be your northern border: From the Great Sea you shall mark out your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: border
    - type: text
      text: ' line to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 33:37
      marker-yv: yv-n
    - type: text
      text: 'Mount Hor; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from Mount Hor you shall mark out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: border
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:21; Josh. 13:5; 2 Kin. 14:25
      marker-yv: yv-n
    - type: text
      text: 'to the entrance of Hamath; then the direction of the border shall be toward '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 47:15
      marker-yv: yv-n
    - type: text
      text: 'Zedad; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the border shall proceed to Ziphron, and it shall end at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 47:17
      marker-yv: yv-n
    - type: text
      text: Hazar Enan. This shall be your northern border.
