document_id: NAM.2,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Destruction of Nineveh
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: He who scatters has come up before your face.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Man the fort!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Watch the road!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Strengthen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' flanks!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Fortify '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' power mightily.'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: She is empty, desolate, and waste!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The heart melts, and the knees shake;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Much pain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in every side,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all their faces are drained of color.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the dwelling of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 4:10, 11; Ezek. 19:2–7
      marker-yv: yv-n
    - type: text
      text: lions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the feeding place of the young lions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Where the lion walked, the lioness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lion’s cub,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And no one made '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' afraid?'
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The lion tore in pieces enough for his cubs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Killed for his lionesses,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 10:6; Jer. 51:34
      marker-yv: yv-n
    - type: text
      text: Filled his caves with prey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his dens with flesh.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“Behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 21:13; Ezek. 5:8; Nah. 3:5
      marker-yv: yv-n
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' against you,” says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, “I will burn your chariots in smoke, and the sword shall devour your young lions; I will cut off your prey from the earth, and the voice of your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 18:17–25; 19:9–13, 23
      marker-yv: yv-n
    - type: text
      text: messengers shall be heard no more.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will restore the excellence of Jacob'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like the excellence of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the emptiers have emptied them out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And ruined their vine branches.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The shields of his mighty men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' made red,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The valiant men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in scarlet.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The chariots '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' with flaming torches'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the day of his preparation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the spears are brandished.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The chariots rage in the streets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They jostle one another in the broad roads;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They seem like torches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They run like lightning.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: He remembers his nobles;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They stumble in their walk;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They make haste to her walls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the defense is prepared.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The gates of the rivers are opened,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the palace is dissolved.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'It is decreed:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She shall be led away captive,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She shall be brought up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And her maidservants shall lead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' as with the voice of doves,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Beating their breasts.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Though Nineveh of old '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' like a pool of water,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Now they flee away.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“Halt! Halt!” '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cry;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But no one turns back.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Take spoil of silver!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Take spoil of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 7:19; Zeph. 1:18
      marker-yv: yv-n
    - type: text
      text: gold!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: There
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no end of treasure,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or wealth of every desirable prize.
