document_id: GEN.19,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Sodom’s Depravity
  - type: text
    content: 'Now '
  - type: note
    content: Gen. 18:2, 16, 22
  - type: text
    content: 'the two angels came to Sodom in the evening, and '
  - type: note
    content: Gen. 18:1–5
  - type: text
    content: 'Lot was sitting in the gate of Sodom. When Lot saw '
  - type: text
    content: them,
  - type: text
    content: ' he rose to meet them, and he bowed himself with his face toward the ground. '
  '10':
  - type: text
    content: 'But the men reached out their hands and pulled Lot into the house with them, and shut the door. '
  '11':
  - type: text
    content: 'And they '
  - type: note
    content: Gen. 20:17, 18
  - type: text
    content: 'struck the men who '
  - type: text
    content: were
  - type: text
    content: ' at the doorway of the house with blindness, both small and great, so that they became weary '
  - type: text
    content: trying
  - type: text
    content: ' to find the door.'
  - type: heading
    content: Sodom and Gomorrah Destroyed
  '12':
  - type: text
    content: Then the men said to Lot, “Have you anyone else here? Son-in-law, your sons, your daughters, and whomever you have in the city—
  - type: note
    content: Gen. 7:1; 2 Pet. 2:7, 9
  - type: text
    content: 'take '
  - type: text
    content: them
  - type: text
    content: ' out of this place! '
  '13':
  - type: text
    content: 'For we will destroy this place, because the '
  - type: note
    content: Gen. 18:20
  - type: text
    content: 'outcry against them has grown great before the face of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: Lev. 26:30–33; Deut. 4:26; 28:45; 1 Chr. 21:15
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' has sent us to destroy it.”'
  '14':
  - type: text
    content: 'So Lot went out and spoke to his sons-in-law, '
  - type: note
    content: Matt. 1:18
  - type: text
    content: 'who had married his daughters, and said, '
  - type: note
    content: Num. 16:21, 24, 26, 45; Rev. 18:4
  - type: text
    content: '“Get up, get out of this place; for the '
  - type: heading
    content: Lord
  - type: text
    content: ' will destroy this city!” '
  - type: note
    content: Ex. 9:21; Jer. 43:1, 2; Luke 17:28; 24:11
  - type: text
    content: But to his sons-in-law he seemed to be joking.
  '15':
  - type: text
    content: 'When the morning dawned, the angels urged Lot to hurry, saying, '
  - type: note
    content: Ps. 37:2; Rev. 18:4
  - type: text
    content: '“Arise, take your wife and your two daughters who are here, lest you be consumed in the punishment of the city.” '
  '16':
  - type: text
    content: 'And while he lingered, the men '
  - type: note
    content: Deut. 5:15; 6:21; 7:8; 2 Pet. 2:7
  - type: text
    content: 'took hold of his hand, his wife’s hand, and the hands of his two daughters, the '
  - type: note
    content: Ex. 34:7; Ps. 32:10; 33:18, 19; Luke 18:13
  - type: heading
    content: Lord
  - type: text
    content: ' being merciful to him, '
  - type: note
    content: Ps. 34:22
  - type: text
    content: 'and they brought him out and set him outside the city. '
  '17':
  - type: text
    content: 'So it came to pass, when they had brought them outside, that he said, '
  - type: note
    content: 1 Kin. 19:3; Jer. 48:6
  - type: text
    content: '“Escape for your life! '
  - type: note
    content: Gen. 19:26; Matt. 24:16–18; Luke 9:62; Phil. 3:13, 14
  - type: text
    content: 'Do not look behind you nor stay anywhere in the plain. Escape '
  - type: note
    content: Gen. 14:10
  - type: text
    content: to the mountains, lest you be destroyed.”
  '18':
  - type: text
    content: 'Then Lot said to them, “Please, '
  - type: note
    content: Acts 10:14
  - type: text
    content: 'no, my lords! '
  '19':
  - type: text
    content: 'Indeed now, your servant has found favor in your sight, and you have increased your mercy which you have shown me by saving my life; but I cannot escape to the mountains, lest some evil overtake me and I die. '
  '2':
  - type: text
    content: 'And he said, “Here now, my lords, please '
  - type: note
    content: Gen. 24:31; (Heb. 13:2)
  - type: text
    content: 'turn in to your servant’s house and spend the night, and '
  - type: note
    content: Gen. 18:4; 24:32
  - type: text
    content: wash your feet; then you may rise early and go on your way.”
  - type: text
    content: 'And they said, '
  - type: note
    content: Luke 24:28
  - type: text
    content: “No, but we will spend the night in the open square.”
  '20':
  - type: text
    content: 'See now, this city '
  - type: text
    content: is
  - type: text
    content: ' near '
  - type: text
    content: enough
  - type: text
    content: ' to flee to, and it '
  - type: text
    content: is
  - type: text
    content: ' a little one; please let me escape there ('
  - type: text
    content: is
  - type: text
    content: ' it not a little one?) and my soul shall live.”'
  '21':
  - type: text
    content: 'And he said to him, “See, '
  - type: note
    content: Job 42:8, 9; Ps. 145:19
  - type: text
    content: 'I have favored you concerning this thing also, in that I will not overthrow this city for which you have spoken. '
  '22':
  - type: text
    content: 'Hurry, escape there. For '
  - type: note
    content: Ex. 32:10; Deut. 9:14
  - type: text
    content: I cannot do anything until you arrive there.”
  - type: text
    content: 'Therefore '
  - type: note
    content: Gen. 13:10; 14:2
  - type: text
    content: the name of the city was called Zoar.
  '23':
  - type: text
    content: 'The sun had risen upon the earth when Lot entered Zoar. '
  '24':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' rained '
  - type: note
    content: Deut. 29:23; Ps. 11:6; Is. 13:19; Jer. 20:16; 23:14; 49:18; 50:40; Ezek. 16:49, 50; Hos. 11:8; Amos 4:11; Zeph. 2:9; Matt. 10:15; Mark 6:11; Luke 17:29; Rom. 9:29; 2 Pet. 2:6; Jude 7; Rev. 11:8
  - type: text
    content: 'brimstone and '
  - type: note
    content: Lev. 10:2
  - type: text
    content: 'fire on Sodom and Gomorrah, from the '
  - type: heading
    content: Lord
  - type: text
    content: ' out of the heavens. '
  '25':
  - type: text
    content: 'So He overthrew those cities, all the plain, all the inhabitants of the cities, and '
  - type: note
    content: Ps. 107:34
  - type: text
    content: what grew on the ground.
  '26':
  - type: text
    content: 'But his wife looked back behind him, and she became '
  - type: note
    content: Gen. 19:17; Luke 17:32
  - type: text
    content: a pillar of salt.
  '27':
  - type: text
    content: 'And Abraham went early in the morning to the place where '
  - type: note
    content: Gen. 18:22
  - type: text
    content: 'he had stood before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Then he looked toward Sodom and Gomorrah, and toward all the land of the plain; and he saw, and behold, '
  - type: note
    content: Rev. 9:2; 18:9
  - type: text
    content: 'the smoke of the land which went up like the smoke of a furnace. '
  '29':
  - type: text
    content: 'And it came to pass, when God destroyed the cities of the plain, that God '
  - type: note
    content: Gen. 8:1; 18:23; Deut. 7:8; 9:5, 27
  - type: text
    content: remembered Abraham, and sent Lot out of the midst of the overthrow, when He overthrew the cities in which Lot had dwelt.
  - type: heading
    content: The Descendants of Lot
  '3':
  - type: text
    content: 'But he insisted strongly; so they turned in to him and entered his house. '
  - type: note
    content: Gen. 18:6–8; Ex. 23:15; Num. 9:11; 28:17
  - type: text
    content: 'Then he made them a feast, and baked '
  - type: note
    content: Ex. 12:8
  - type: text
    content: unleavened bread, and they ate.
  '30':
  - type: text
    content: 'Then Lot went up out of Zoar and '
  - type: note
    content: Gen. 19:17, 19
  - type: text
    content: 'dwelt in the mountains, and his two daughters were with him; for he was afraid to dwell in Zoar. And he and his two daughters dwelt in a cave. '
  '31':
  - type: text
    content: 'Now the firstborn said to the younger, “Our father '
  - type: text
    content: is
  - type: text
    content: ' old, and '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' no man on the earth '
  - type: note
    content: Gen. 16:2, 4; 38:8, 9; Deut. 25:5
  - type: text
    content: 'to come in to us as is the custom of all the earth. '
  '32':
  - type: text
    content: 'Come, let us make our father drink wine, and we will lie with him, that we '
  - type: note
    content: (Mark 12:19)
  - type: text
    content: 'may preserve the lineage of our father.” '
  '33':
  - type: text
    content: So they made their father drink wine that night. And the firstborn went in and lay with her father, and he did not know when she lay down or when she arose.
  '34':
  - type: text
    content: 'It happened on the next day that the firstborn said to the younger, “Indeed I lay with my father last night; let us make him drink wine tonight also, and you go in '
  - type: text
    content: and
  - type: text
    content: ' lie with him, that we may preserve the lineage of our father.” '
  '35':
  - type: text
    content: Then they made their father drink wine that night also. And the younger arose and lay with him, and he did not know when she lay down or when she arose.
  '36':
  - type: text
    content: 'Thus both the daughters of Lot were with child by their father. '
  '37':
  - type: text
    content: 'The firstborn bore a son and called his name Moab; '
  - type: note
    content: Num. 25:1; Deut. 2:9
  - type: text
    content: 'he '
  - type: text
    content: is
  - type: text
    content: ' the father of the Moabites to this day. '
  '38':
  - type: text
    content: 'And the younger, she also bore a son and called his name Ben-Ammi; '
  - type: note
    content: Num. 21:24; Deut. 2:19
  - type: text
    content: 'he '
  - type: text
    content: is
  - type: text
    content: ' the father of the people of Ammon to this day.'
  '4':
  - type: text
    content: 'Now before they lay down, the men of the city, the men of Sodom, both old and young, all the people from every quarter, surrounded the house. '
  '5':
  - type: note
    content: Is. 3:9
  - type: text
    content: 'And they called to Lot and said to him, “Where are the men who came to you tonight? '
  - type: note
    content: Judg. 19:22
  - type: text
    content: 'Bring them out to us that we '
  - type: note
    content: Gen. 4:1; Rom. 1:24, 27; Jude 7
  - type: text
    content: 'may know them '
  - type: text
    content: carnally.
  - type: text
    content: ”
  '6':
  - type: text
    content: 'So '
  - type: note
    content: Judg. 19:23
  - type: text
    content: 'Lot went out to them through the doorway, shut the door behind him, '
  '7':
  - type: text
    content: 'and said, “Please, my brethren, do not do so wickedly! '
  '8':
  - type: note
    content: Judg. 19:24
  - type: text
    content: 'See now, I have two daughters who have not known a man; please, let me bring them out to you, and you may do to them as you wish; only do nothing to these men, '
  - type: note
    content: Gen. 18:5
  - type: text
    content: since this is the reason they have come under the shadow of my roof.”
  '9':
  - type: text
    content: 'And they said, “Stand back!” Then they said, “This one '
  - type: note
    content: 2 Pet. 2:7, 8
  - type: text
    content: 'came in to stay '
  - type: text
    content: here,
  - type: text
    content: ' '
  - type: note
    content: Ex. 2:14
  - type: text
    content: 'and he keeps acting as a judge; now we will deal worse with you than with them.” So they pressed hard against the man Lot, and came near to break down the door. '
