document_id: EST.10,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mordecai’s Advancement
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And King Ahasuerus imposed tribute on the land and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 10:5; Ps. 72:10; Is. 11:11; 24:15
      marker-yv: yv-n
    - type: text
      text: 'the islands of the sea. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now all the acts of his power and his might, and the account of the greatness of Mordecai, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 8:15, 9:4
      marker-yv: yv-n
    - type: text
      text: 'to which the king advanced him, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 6:1
      marker-yv: yv-n
    - type: text
      text: 'chronicles of the kings of Media and Persia? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Mordecai the Jew '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:40, 43, 44; 2 Chr. 28:7
      marker-yv: yv-n
    - type: text
      text: 'second to King Ahasuerus, and was great among the Jews and well received by the multitude of his brethren, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 2:10; Ps. 122:8, 9
      marker-yv: yv-n
    - type: text
      text: seeking the good of his people and speaking peace to all his countrymen.
