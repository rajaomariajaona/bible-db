      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: people
  - type: text
    text: ' began to bring the offerings into the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', we have had enough to eat and have plenty left, for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has blessed His people; and what is left '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' this great '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 36:5
    marker-yv: yv-n
  - type: text
    text: abundance.”
