      text: 1 Kin. 6:5–8
    marker-yv: yv-n
  - type: text
    text: 'prepare rooms in the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and they prepared them. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then they faithfully brought in the offerings, the tithes, and the dedicated things; '
