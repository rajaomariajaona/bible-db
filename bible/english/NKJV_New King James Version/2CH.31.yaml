  - type: text
    text: 'Now when all this was finished, all Israel who were present went out to the cities of Judah and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 18:4
    marker-yv: yv-n
  - type: text
    text: 'broke the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacred
  - type: text
    text: ' pillars in pieces, cut down the wooden images, and threw down the high places and the altars—from all Judah, Benjamin, Ephraim, and Manasseh—until they had utterly destroyed them all. Then all the children of Israel returned to their own cities, every man to his possession.'
- type: usfm
  marker: p
