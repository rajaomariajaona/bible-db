    marker: x
    children:
    - type: text
      text: Job 7:16, 19; Ps. 39:13
    marker-yv: yv-n
  - type: text
    text: Look away from him that he may rest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Till '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 7:1
    marker-yv: yv-n
  - type: text
    text: like a hired man he finishes his day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “For there is hope for a tree,
- type: usfm
  marker: q2
  children:
  - type: text
    text: If it is cut down, that it will sprout again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And that its tender shoots will not cease.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Though its root may grow old in the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And its stump may die in the ground,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yet
  - type: text
    text: ' at the scent of water it will bud'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And bring forth branches like a plant.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But man dies and is laid away;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Indeed he breathes his last
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And where '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 10:21, 22
    marker-yv: yv-n
  - type: text
    text: he?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: it
    children:
    - type: text
      text: As
  - type: text
    text: ' water disappears from the sea,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a river becomes parched and dries up,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So man lies down and does not rise.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 102:25, 26; (Is. 51:6; 65:17; 66:22); Acts 3:21; (2 Pet. 3:7, 10, 11; Rev. 20:11; 21:1)
    marker-yv: yv-n
  - type: text
    text: 'Till the heavens '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' no more,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will not awake
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor be roused from their sleep.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Oh, that You would hide me in the grave,
- type: usfm
  marker: q2
  children:
  - type: text
    text: That You would conceal me until Your wrath is past,
- type: usfm
  marker: q2
  children:
  - type: text
    text: That You would appoint me a set time, and remember me!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'If a man dies, shall he live '
  - type: usfm
    marker: it
    children:
    - type: text
      text: again?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All the days of my hard service '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 13:15
    marker-yv: yv-n
  - type: text
    text: I will wait,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Till my change comes.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 13:22
    marker-yv: yv-n
  - type: text
    text: You shall call, and I will answer You;
- type: usfm
  marker: q2
  children:
  - type: text
    text: You shall desire the work of Your hands.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 10:6, 14; 13:27; 31:4; 34:21; Ps. 56:8; 139:1–3; Prov. 5:21; (Jer. 32:19)
    marker-yv: yv-n
  - type: text
    text: You number my steps,
- type: usfm
  marker: q2
  children:
  - type: text
    text: But do not watch over my sin.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 32:32–34
    marker-yv: yv-n
  - type: text
    text: 'My transgression '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' sealed up in a bag,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And You cover my iniquity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' a mountain falls '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crumbles away,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' a rock is moved from its place;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: it
    children:
    - type: text
      text: As
  - type: text
    text: ' water wears away stones,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: And
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' torrents wash away the soil of the earth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: So You destroy the hope of man.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You prevail forever against him, and he passes on;
- type: usfm
  marker: q2
  children:
  - type: text
    text: You change his countenance and send him away.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'His sons come to honor, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eccl. 9:5; Is. 63:16
    marker-yv: yv-n
  - type: text
    text: 'he does not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They are brought low, and he does not perceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But his flesh will be in pain over it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his soul will mourn over it.”
