  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 8:4; 144:3
    marker-yv: yv-n
  - type: text
    text: do You open Your eyes on such a one,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 143:2)
    marker-yv: yv-n
  - type: text
    text: bring me to judgment with Yourself?
- type: usfm
  marker: q2
  children:
  - type: usfm
