  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 7:1; 21:21; Heb. 9:27
    marker-yv: yv-n
  - type: text
    text: 'Since his days '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' determined,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The number of his months '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' with You;'
- type: usfm
  marker: q2
  children:
  - type: text
