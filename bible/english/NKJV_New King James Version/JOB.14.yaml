  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 8:9; Ps. 90:5, 6, 9; 102:11; 103:15; 144:4; Is. 40:6; James 1:10, 11; 1 Pet. 1:24
    marker-yv: yv-n
  - type: text
    text: He comes forth like a flower and fades away;
- type: usfm
