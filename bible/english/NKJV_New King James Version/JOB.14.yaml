    - type: text
      text: (Job 15:14; 25:4; Ps. 51:2, 5, 10; John 3:6; Rom. 5:12; Eph. 2:3)
    marker-yv: yv-n
  - type: text
    text: 'can bring a clean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: thing
  - type: text
    text: ' out of an unclean?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one!
- type: usfm
  marker: q2
  children:
  - type: usfm
