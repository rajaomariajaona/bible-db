document_id: ECC.10
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dead flies putrefy the perfumer’s ointment,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And cause it to give off a foul odor;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: So
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: does
  - type: text
    text: ' a little folly to one respected for wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honor.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A wise man’s heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' at his right hand,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But a fool’s heart at his left.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Even when a fool walks along the way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: He lacks wisdom,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 13:16; 18:2
    marker-yv: yv-n
  - type: text
    text: 'And he shows everyone '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a fool.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: If the spirit of the ruler rises against you,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eccl. 8:3
    marker-yv: yv-n
  - type: text
    text: Do not leave your post;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 25:24–33; Prov. 25:15
    marker-yv: yv-n
  - type: text
    text: conciliation pacifies great offenses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: There is an evil I have seen under the sun,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'As an error proceeding from the ruler:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 3:1
    marker-yv: yv-n
  - type: text
    text: Folly is set in great dignity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: While the rich sit in a lowly place.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I have seen servants '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 19:10; 30:22
    marker-yv: yv-n
  - type: text
    text: on horses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: While princes walk on the ground like servants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 7:15; Prov. 26:27
    marker-yv: yv-n
  - type: text
    text: He who digs a pit will fall into it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And whoever breaks through a wall will be bitten by a serpent.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He who quarries stones may be hurt by them,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: And
  - type: text
    text: ' he who splits wood may be endangered by it.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: If the ax is dull,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And one does not sharpen the edge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then he must use more strength;
- type: usfm
  marker: q2
  children:
  - type: text
    text: But wisdom brings success.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'A serpent may bite '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 58:4, 5; Jer. 8:17
    marker-yv: yv-n
  - type: text
    text: 'when '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' not charmed;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The babbler is no different.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 10:32; Luke 4:22
    marker-yv: yv-n
  - type: text
    text: 'The words of a wise man’s mouth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' gracious,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 10:14; Eccl. 4:5
    marker-yv: yv-n
  - type: text
    text: the lips of a fool shall swallow him up;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The words of his mouth begin with foolishness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the end of his talk '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' raving madness.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Prov. 15:2); Eccl. 5:3
    marker-yv: yv-n
  - type: text
    text: A fool also multiplies words.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No man knows what is to be;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Who can tell him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eccl. 3:22; 8:7
    marker-yv: yv-n
  - type: text
    text: what will be after him?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The labor of fools wearies them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: For they do not even know how to go to the city!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 3:4, 5; 5:11
    marker-yv: yv-n
  - type: text
    text: 'Woe to you, O land, when your king '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a child,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And your princes feast in the morning!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' you, O land, when your king '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the son of nobles,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And your '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 31:4; Is. 5:11
    marker-yv: yv-n
  - type: text
    text: princes feast at the proper time—
- type: usfm
  marker: q2
  children:
  - type: text
    text: For strength and not for drunkenness!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Because of laziness the building decays,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 24:30–34
    marker-yv: yv-n
  - type: text
    text: through idleness of hands the house leaks.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A feast is made for laughter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 9:13; Ps. 104:15; Eccl. 2:3
    marker-yv: yv-n
  - type: text
    text: wine makes merry;
- type: usfm
  marker: q2
  children:
  - type: text
    text: But money answers everything.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 22:28; Acts 23:5
    marker-yv: yv-n
  - type: text
    text: Do not curse the king, even in your thought;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not curse the rich, even in your bedroom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: For a bird of the air may carry your voice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a bird in flight may tell the matter.
