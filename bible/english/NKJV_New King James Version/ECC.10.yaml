document_id: ECC.10,114
type_code: eng
verses:
  '1':
  - type: text
    content: Dead flies putrefy the perfumer’s ointment,
  - type: text
    content: And cause it to give off a foul odor;
  - type: text
    content: So
  - type: text
    content: ' '
  - type: text
    content: does
  - type: text
    content: ' a little folly to one respected for wisdom '
  - type: text
    content: and
  - type: text
    content: ' honor.'
  '10':
  - type: text
    content: If the ax is dull,
  - type: text
    content: And one does not sharpen the edge,
  - type: text
    content: Then he must use more strength;
  - type: text
    content: But wisdom brings success.
  '11':
  - type: text
    content: 'A serpent may bite '
  - type: note
    content: Ps. 58:4, 5; Jer. 8:17
  - type: text
    content: 'when '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' not charmed;'
  - type: text
    content: The babbler is no different.
  '12':
  - type: note
    content: Prov. 10:32; Luke 4:22
  - type: text
    content: 'The words of a wise man’s mouth '
  - type: text
    content: are
  - type: text
    content: ' gracious,'
  - type: text
    content: 'But '
  - type: note
    content: Prov. 10:14; Eccl. 4:5
  - type: text
    content: the lips of a fool shall swallow him up;
  '13':
  - type: text
    content: The words of his mouth begin with foolishness,
  - type: text
    content: 'And the end of his talk '
  - type: text
    content: is
  - type: text
    content: ' raving madness.'
  '14':
  - type: note
    content: (Prov. 15:2); Eccl. 5:3
  - type: text
    content: A fool also multiplies words.
  - type: text
    content: No man knows what is to be;
  - type: text
    content: 'Who can tell him '
  - type: note
    content: Eccl. 3:22; 8:7
  - type: text
    content: what will be after him?
  '15':
  - type: text
    content: The labor of fools wearies them,
  - type: text
    content: For they do not even know how to go to the city!
  '16':
  - type: note
    content: Is. 3:4, 5; 5:11
  - type: text
    content: 'Woe to you, O land, when your king '
  - type: text
    content: is
  - type: text
    content: ' a child,'
  - type: text
    content: And your princes feast in the morning!
  '17':
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' you, O land, when your king '
  - type: text
    content: is
  - type: text
    content: ' the son of nobles,'
  - type: text
    content: 'And your '
  - type: note
    content: Prov. 31:4; Is. 5:11
  - type: text
    content: princes feast at the proper time—
  - type: text
    content: For strength and not for drunkenness!
  '18':
  - type: text
    content: Because of laziness the building decays,
  - type: text
    content: 'And '
  - type: note
    content: Prov. 24:30–34
  - type: text
    content: through idleness of hands the house leaks.
  '19':
  - type: text
    content: A feast is made for laughter,
  - type: text
    content: 'And '
  - type: note
    content: Judg. 9:13; Ps. 104:15; Eccl. 2:3
  - type: text
    content: wine makes merry;
  - type: text
    content: But money answers everything.
  '2':
  - type: text
    content: 'A wise man’s heart '
  - type: text
    content: is
  - type: text
    content: ' at his right hand,'
  - type: text
    content: But a fool’s heart at his left.
  '20':
  - type: note
    content: Ex. 22:28; Acts 23:5
  - type: text
    content: Do not curse the king, even in your thought;
  - type: text
    content: Do not curse the rich, even in your bedroom;
  - type: text
    content: For a bird of the air may carry your voice,
  - type: text
    content: And a bird in flight may tell the matter.
  '3':
  - type: text
    content: Even when a fool walks along the way,
  - type: text
    content: He lacks wisdom,
  - type: note
    content: Prov. 13:16; 18:2
  - type: text
    content: 'And he shows everyone '
  - type: text
    content: that
  - type: text
    content: ' he '
  - type: text
    content: is
  - type: text
    content: ' a fool.'
  '4':
  - type: text
    content: If the spirit of the ruler rises against you,
  - type: note
    content: Eccl. 8:3
  - type: text
    content: Do not leave your post;
  - type: text
    content: 'For '
  - type: note
    content: 1 Sam. 25:24–33; Prov. 25:15
  - type: text
    content: conciliation pacifies great offenses.
  '5':
  - type: text
    content: There is an evil I have seen under the sun,
  - type: text
    content: 'As an error proceeding from the ruler:'
  '6':
  - type: note
    content: Esth. 3:1
  - type: text
    content: Folly is set in great dignity,
  - type: text
    content: While the rich sit in a lowly place.
  '7':
  - type: text
    content: 'I have seen servants '
  - type: note
    content: Prov. 19:10; 30:22
  - type: text
    content: on horses,
  - type: text
    content: While princes walk on the ground like servants.
  '8':
  - type: note
    content: Ps. 7:15; Prov. 26:27
  - type: text
    content: He who digs a pit will fall into it,
  - type: text
    content: And whoever breaks through a wall will be bitten by a serpent.
  '9':
  - type: text
    content: He who quarries stones may be hurt by them,
  - type: text
    content: And
  - type: text
    content: ' he who splits wood may be endangered by it.'
