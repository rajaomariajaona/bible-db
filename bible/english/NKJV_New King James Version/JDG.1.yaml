document_id: JDG.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Continuing Conquest of Canaan
  - type: text
    content: 'Now after the '
  - type: note
    content: Josh. 24:29
  - type: text
    content: 'death of Joshua it came to pass that the children of Israel '
  - type: note
    content: Num. 27:21; Judg. 20:18
  - type: text
    content: 'asked the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying, “Who shall be first to go up for us against the '
  - type: note
    content: Josh. 17:12, 13
  - type: text
    content: Canaanites to fight against them?”
  '10':
  - type: text
    content: 'Then Judah went against the Canaanites who dwelt in '
  - type: note
    content: Josh. 15:13–19
  - type: text
    content: 'Hebron. (Now the name of Hebron '
  - type: text
    content: was
  - type: text
    content: ' formerly '
  - type: note
    content: Josh. 14:15
  - type: text
    content: Kirjath Arba.) And they killed Sheshai, Ahiman, and Talmai.
  '11':
  - type: note
    content: Josh. 15:15
  - type: text
    content: 'From there they went against the inhabitants of Debir. (The name of Debir '
  - type: text
    content: was
  - type: text
    content: ' formerly Kirjath Sepher.)'
  '12':
  - type: note
    content: Josh. 15:16, 17
  - type: text
    content: 'Then Caleb said, “Whoever attacks Kirjath Sepher and takes it, to him I will give my daughter Achsah as wife.” '
  '13':
  - type: text
    content: 'And Othniel the son of Kenaz, '
  - type: note
    content: Judg. 3:9
  - type: text
    content: 'Caleb’s younger brother, took it; so he gave him his daughter Achsah as wife. '
  '14':
  - type: note
    content: Josh. 15:18, 19
  - type: text
    content: 'Now it happened, when she came '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: him,
  - type: text
    content: ' that she urged him to ask her father for a field. And she dismounted from '
  - type: text
    content: her
  - type: text
    content: ' donkey, and Caleb said to her, “What do you wish?” '
  '15':
  - type: text
    content: 'So she said to him, '
  - type: note
    content: Gen. 33:11
  - type: text
    content: “Give me a blessing; since you have given me land in the South, give me also springs of water.”
  - type: text
    content: And Caleb gave her the upper springs and the lower springs.
  '16':
  - type: note
    content: Num. 10:29–32; Judg. 4:11, 17; 1 Sam. 15:6; 1 Chr. 2:55
  - type: text
    content: 'Now the children of the Kenite, Moses’ father-in-law, went up '
  - type: note
    content: Deut. 34:3; Judg. 3:13
  - type: text
    content: 'from the City of Palms with the children of Judah into the Wilderness of Judah, which '
  - type: text
    content: lies
  - type: text
    content: ' in the South '
  - type: text
    content: near
  - type: text
    content: ' '
  - type: note
    content: Josh. 12:14
  - type: text
    content: 'Arad; '
  - type: note
    content: 1 Sam. 15:6
  - type: text
    content: 'and they went and dwelt among the people. '
  '17':
  - type: note
    content: Judg. 1:3
  - type: text
    content: 'And Judah went with his brother Simeon, and they attacked the Canaanites who inhabited Zephath, and utterly destroyed it. So the name of the city was called '
  - type: note
    content: Num. 21:3; Josh. 19:4
  - type: text
    content: 'Hormah. '
  '18':
  - type: text
    content: 'Also Judah took '
  - type: note
    content: Josh. 11:22
  - type: text
    content: 'Gaza with its territory, Ashkelon with its territory, and Ekron with its territory. '
  '19':
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' was with Judah. And they drove out the mountaineers, but they could not drive out the inhabitants of the lowland, because they had '
  - type: note
    content: Josh. 17:16, 18; Judg. 4:3, 13
  - type: text
    content: 'chariots of iron. '
  '2':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said, '
  - type: note
    content: Gen. 49:8, 9; Rev. 5:5
  - type: text
    content: “Judah shall go up. Indeed I have delivered the land into his hand.”
  '20':
  - type: note
    content: Num. 14:24; Josh. 14:9, 14
  - type: text
    content: 'And they gave Hebron to Caleb, as Moses had said. Then he expelled from there the '
  - type: note
    content: Josh. 15:14; Judg. 1:10
  - type: text
    content: 'three sons of Anak. '
  '21':
  - type: note
    content: Josh. 15:63; Judg. 1:8
  - type: text
    content: But the children of Benjamin did not drive out the Jebusites who inhabited Jerusalem; so the Jebusites dwell with the children of Benjamin in Jerusalem to this day.
  '22':
  - type: text
    content: 'And the house of Joseph also went up against Bethel, '
  - type: note
    content: Judg. 1:19
  - type: text
    content: 'and the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' with them. '
  '23':
  - type: text
    content: 'So the house of Joseph '
  - type: note
    content: Josh. 2:1; 7:2
  - type: text
    content: 'sent men to spy out Bethel. (The name of the city '
  - type: text
    content: was
  - type: text
    content: ' formerly '
  - type: note
    content: Gen. 28:19
  - type: text
    content: 'Luz.) '
  '24':
  - type: text
    content: 'And when the spies saw a man coming out of the city, they said to him, “Please show us the entrance to the city, and '
  - type: note
    content: Josh. 2:12, 14
  - type: text
    content: 'we will show you mercy.” '
  '25':
  - type: text
    content: 'So he showed them the entrance to the city, and they struck the city with the edge of the sword; but they let the man and all his family go. '
  '26':
  - type: text
    content: 'And the man went to the land of the Hittites, built a city, and called its name Luz, which '
  - type: text
    content: is
  - type: text
    content: ' its name to this day.'
  - type: heading
    content: Incomplete Conquest of the Land
  '27':
  - type: note
    content: Josh. 17:11–13
  - type: text
    content: 'However, Manasseh did not drive out '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: inhabitants
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' Beth Shean and its villages, or '
  - type: note
    content: Josh. 21:25
  - type: text
    content: 'Taanach and its villages, or the inhabitants of '
  - type: note
    content: Josh. 17:11
  - type: text
    content: 'Dor and its villages, or the inhabitants of Ibleam and its villages, or the inhabitants of Megiddo and its villages; for the Canaanites were determined to dwell in that land. '
  '28':
  - type: text
    content: And it came to pass, when Israel was strong, that they put the Canaanites under tribute, but did not completely drive them out.
  '29':
  - type: note
    content: Josh. 16:10; 1 Kin. 9:16
  - type: text
    content: Nor did Ephraim drive out the Canaanites who dwelt in Gezer; so the Canaanites dwelt in Gezer among them.
  '3':
  - type: text
    content: 'So Judah said to '
  - type: note
    content: Josh. 19:1
  - type: text
    content: 'Simeon his brother, “Come up with me to my allotted territory, that we may fight against the Canaanites; and '
  - type: note
    content: Judg. 1:17
  - type: text
    content: 'I will likewise go with you to your allotted territory.” And Simeon went with him. '
  '30':
  - type: text
    content: 'Nor did '
  - type: note
    content: Josh. 19:10–16
  - type: text
    content: Zebulun drive out the inhabitants of Kitron or the inhabitants of Nahalol; so the Canaanites dwelt among them, and were put under tribute.
  '31':
  - type: note
    content: Josh. 19:24–31
  - type: text
    content: 'Nor did Asher drive out the inhabitants of Acco or the inhabitants of Sidon, or of Ahlab, Achzib, Helbah, Aphik, or Rehob. '
  '32':
  - type: text
    content: 'So the Asherites '
  - type: note
    content: Ps. 106:34, 35
  - type: text
    content: dwelt among the Canaanites, the inhabitants of the land; for they did not drive them out.
  '33':
  - type: note
    content: Josh. 19:32–39
  - type: text
    content: Nor did Naphtali drive out the inhabitants of Beth Shemesh or the inhabitants of Beth Anath; but they dwelt among the Canaanites, the inhabitants of the land. Nevertheless the inhabitants of Beth Shemesh and Beth Anath were put under tribute to them.
  '34':
  - type: text
    content: 'And the Amorites forced the children of Dan into the mountains, for they would not allow them to come down to the valley; '
  '35':
  - type: text
    content: 'and the Amorites were determined to dwell in Mount Heres, '
  - type: note
    content: Josh. 19:42
  - type: text
    content: in Aijalon, and in Shaalbim; yet when the strength of the house of Joseph became greater, they were put under tribute.
  '36':
  - type: text
    content: 'Now the boundary of the Amorites '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: Num. 34:4; Josh. 15:3
  - type: text
    content: from the Ascent of Akrabbim, from Sela, and upward.
  '4':
  - type: text
    content: 'Then Judah went up, and the '
  - type: heading
    content: Lord
  - type: text
    content: ' delivered the Canaanites and the Perizzites into their hand; and they killed ten thousand men at '
  - type: note
    content: 1 Sam. 11:8
  - type: text
    content: 'Bezek. '
  '5':
  - type: text
    content: 'And they found Adoni-Bezek in Bezek, and fought against him; and they defeated the Canaanites and the Perizzites. '
  '6':
  - type: text
    content: 'Then Adoni-Bezek fled, and they pursued him and caught him and cut off his thumbs and big toes. '
  '7':
  - type: text
    content: 'And Adoni-Bezek said, “Seventy kings with their thumbs and big toes cut off used to gather '
  - type: text
    content: scraps
  - type: text
    content: ' under my table; '
  - type: note
    content: Lev. 24:19; 1 Sam. 15:33; (James 2:13)
  - type: text
    content: as I have done, so God has repaid me.” Then they brought him to Jerusalem, and there he died.
  '8':
  - type: text
    content: 'Now '
  - type: note
    content: Josh. 15:63; Judg. 1:21
  - type: text
    content: 'the children of Judah fought against Jerusalem and took it; they struck it with the edge of the sword and set the city on fire. '
  '9':
  - type: note
    content: Josh. 10:36; 11:21; 15:13
  - type: text
    content: 'And afterward the children of Judah went down to fight against the Canaanites who dwelt in the mountains, in the South, and in the lowland. '
