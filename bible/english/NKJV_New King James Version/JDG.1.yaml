document_id: JDG.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Continuing Conquest of Canaan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now after the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 24:29
      marker-yv: yv-n
    - type: text
      text: 'death of Joshua it came to pass that the children of Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 27:21; Judg. 20:18
      marker-yv: yv-n
    - type: text
      text: 'asked the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, “Who shall be first to go up for us against the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 17:12, 13
      marker-yv: yv-n
    - type: text
      text: Canaanites to fight against them?”
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then Judah went against the Canaanites who dwelt in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:13–19
      marker-yv: yv-n
    - type: text
      text: 'Hebron. (Now the name of Hebron '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' formerly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 14:15
      marker-yv: yv-n
    - type: text
      text: Kirjath Arba.) And they killed Sheshai, Ahiman, and Talmai.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:15
      marker-yv: yv-n
    - type: text
      text: 'From there they went against the inhabitants of Debir. (The name of Debir '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' formerly Kirjath Sepher.)'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:16, 17
      marker-yv: yv-n
    - type: text
      text: 'Then Caleb said, “Whoever attacks Kirjath Sepher and takes it, to him I will give my daughter Achsah as wife.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And Othniel the son of Kenaz, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 3:9
      marker-yv: yv-n
    - type: text
      text: 'Caleb’s younger brother, took it; so he gave him his daughter Achsah as wife. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:18, 19
      marker-yv: yv-n
    - type: text
      text: 'Now it happened, when she came '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him,
    - type: text
      text: ' that she urged him to ask her father for a field. And she dismounted from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' donkey, and Caleb said to her, “What do you wish?” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So she said to him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 33:11
      marker-yv: yv-n
    - type: text
      text: “Give me a blessing; since you have given me land in the South, give me also springs of water.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Caleb gave her the upper springs and the lower springs.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 10:29–32; Judg. 4:11, 17; 1 Sam. 15:6; 1 Chr. 2:55
      marker-yv: yv-n
    - type: text
      text: 'Now the children of the Kenite, Moses’ father-in-law, went up '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 34:3; Judg. 3:13
      marker-yv: yv-n
    - type: text
      text: 'from the City of Palms with the children of Judah into the Wilderness of Judah, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lies
    - type: text
      text: ' in the South '
    - type: usfm
      marker: it
      children:
      - type: text
        text: near
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 12:14
      marker-yv: yv-n
    - type: text
      text: 'Arad; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 15:6
      marker-yv: yv-n
    - type: text
      text: 'and they went and dwelt among the people. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:3
      marker-yv: yv-n
    - type: text
      text: 'And Judah went with his brother Simeon, and they attacked the Canaanites who inhabited Zephath, and utterly destroyed it. So the name of the city was called '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:3; Josh. 19:4
      marker-yv: yv-n
    - type: text
      text: 'Hormah. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Also Judah took '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 11:22
      marker-yv: yv-n
    - type: text
      text: 'Gaza with its territory, Ashkelon with its territory, and Ekron with its territory. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with Judah. And they drove out the mountaineers, but they could not drive out the inhabitants of the lowland, because they had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 17:16, 18; Judg. 4:3, 13
      marker-yv: yv-n
    - type: text
      text: 'chariots of iron. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 49:8, 9; Rev. 5:5
      marker-yv: yv-n
    - type: text
      text: “Judah shall go up. Indeed I have delivered the land into his hand.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:24; Josh. 14:9, 14
      marker-yv: yv-n
    - type: text
      text: 'And they gave Hebron to Caleb, as Moses had said. Then he expelled from there the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:14; Judg. 1:10
      marker-yv: yv-n
    - type: text
      text: 'three sons of Anak. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:63; Judg. 1:8
      marker-yv: yv-n
    - type: text
      text: But the children of Benjamin did not drive out the Jebusites who inhabited Jerusalem; so the Jebusites dwell with the children of Benjamin in Jerusalem to this day.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And the house of Joseph also went up against Bethel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:19
      marker-yv: yv-n
    - type: text
      text: 'and the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' with them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So the house of Joseph '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 2:1; 7:2
      marker-yv: yv-n
    - type: text
      text: 'sent men to spy out Bethel. (The name of the city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' formerly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 28:19
      marker-yv: yv-n
    - type: text
      text: 'Luz.) '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And when the spies saw a man coming out of the city, they said to him, “Please show us the entrance to the city, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 2:12, 14
      marker-yv: yv-n
    - type: text
      text: 'we will show you mercy.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'So he showed them the entrance to the city, and they struck the city with the edge of the sword; but they let the man and all his family go. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And the man went to the land of the Hittites, built a city, and called its name Luz, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' its name to this day.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Incomplete Conquest of the Land
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 17:11–13
      marker-yv: yv-n
    - type: text
      text: 'However, Manasseh did not drive out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: inhabitants
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' Beth Shean and its villages, or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 21:25
      marker-yv: yv-n
    - type: text
      text: 'Taanach and its villages, or the inhabitants of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 17:11
      marker-yv: yv-n
    - type: text
      text: 'Dor and its villages, or the inhabitants of Ibleam and its villages, or the inhabitants of Megiddo and its villages; for the Canaanites were determined to dwell in that land. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: And it came to pass, when Israel was strong, that they put the Canaanites under tribute, but did not completely drive them out.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 16:10; 1 Kin. 9:16
      marker-yv: yv-n
    - type: text
      text: Nor did Ephraim drive out the Canaanites who dwelt in Gezer; so the Canaanites dwelt in Gezer among them.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So Judah said to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:1
      marker-yv: yv-n
    - type: text
      text: 'Simeon his brother, “Come up with me to my allotted territory, that we may fight against the Canaanites; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:17
      marker-yv: yv-n
    - type: text
      text: 'I will likewise go with you to your allotted territory.” And Simeon went with him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Nor did '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:10–16
      marker-yv: yv-n
    - type: text
      text: Zebulun drive out the inhabitants of Kitron or the inhabitants of Nahalol; so the Canaanites dwelt among them, and were put under tribute.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:24–31
      marker-yv: yv-n
    - type: text
      text: 'Nor did Asher drive out the inhabitants of Acco or the inhabitants of Sidon, or of Ahlab, Achzib, Helbah, Aphik, or Rehob. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'So the Asherites '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 106:34, 35
      marker-yv: yv-n
    - type: text
      text: dwelt among the Canaanites, the inhabitants of the land; for they did not drive them out.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:32–39
      marker-yv: yv-n
    - type: text
      text: Nor did Naphtali drive out the inhabitants of Beth Shemesh or the inhabitants of Beth Anath; but they dwelt among the Canaanites, the inhabitants of the land. Nevertheless the inhabitants of Beth Shemesh and Beth Anath were put under tribute to them.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And the Amorites forced the children of Dan into the mountains, for they would not allow them to come down to the valley; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'and the Amorites were determined to dwell in Mount Heres, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:42
      marker-yv: yv-n
    - type: text
      text: in Aijalon, and in Shaalbim; yet when the strength of the house of Joseph became greater, they were put under tribute.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Now the boundary of the Amorites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 34:4; Josh. 15:3
      marker-yv: yv-n
    - type: text
      text: from the Ascent of Akrabbim, from Sela, and upward.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then Judah went up, and the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' delivered the Canaanites and the Perizzites into their hand; and they killed ten thousand men at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 11:8
      marker-yv: yv-n
    - type: text
      text: 'Bezek. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And they found Adoni-Bezek in Bezek, and fought against him; and they defeated the Canaanites and the Perizzites. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then Adoni-Bezek fled, and they pursued him and caught him and cut off his thumbs and big toes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And Adoni-Bezek said, “Seventy kings with their thumbs and big toes cut off used to gather '
    - type: usfm
      marker: it
      children:
      - type: text
        text: scraps
    - type: text
      text: ' under my table; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 24:19; 1 Sam. 15:33; (James 2:13)
      marker-yv: yv-n
    - type: text
      text: as I have done, so God has repaid me.” Then they brought him to Jerusalem, and there he died.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:63; Judg. 1:21
      marker-yv: yv-n
    - type: text
      text: 'the children of Judah fought against Jerusalem and took it; they struck it with the edge of the sword and set the city on fire. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 10:36; 11:21; 15:13
      marker-yv: yv-n
    - type: text
      text: 'And afterward the children of Judah went down to fight against the Canaanites who dwelt in the mountains, in the South, and in the lowland. '
