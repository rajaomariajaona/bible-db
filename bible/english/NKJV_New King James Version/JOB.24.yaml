  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They cause '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: poor
    - type: text
      text: ' to go naked, without '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 31:19
      marker-yv: yv-n
    - type: text
      text: clothing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they take away the sheaves from the hungry.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They press out oil within their walls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And tread winepresses, yet suffer thirst.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The dying groan in the city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the souls of the wounded cry out;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yet God does not charge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' with wrong.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “There are those who rebel against the light;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They do not know its ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor abide in its paths.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 10:8
      marker-yv: yv-n
    - type: text
      text: The murderer rises with the light;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He kills the poor and needy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in the night he is like a thief.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 7:7–10
      marker-yv: yv-n
    - type: text
      text: The eye of the adulterer waits for the twilight,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 10:11
      marker-yv: yv-n
    - type: text
      text: Saying, ‘No eye will see me’;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he disguises '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' face.'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the dark they break into houses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which they marked for themselves in the daytime;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 3:20)
      marker-yv: yv-n
    - type: text
      text: They do not know the light.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the morning is the same to them as the shadow of death;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If '
    - type: usfm
      marker: it
      children:
      - type: text
        text: someone
    - type: text
      text: ' recognizes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: They
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' the terrors of the shadow of death.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“They '
