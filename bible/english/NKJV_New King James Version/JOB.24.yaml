    - type: text
      text: times are not hidden from the Almighty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Why do those who know Him see not His '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 2:12); Jer. 46:10; (Obad. 15); Zeph. 1:7
      marker-yv: yv-n
    - type: text
