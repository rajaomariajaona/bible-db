  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' draws the mighty away with His power;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He rises up, but no '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' is sure of life.'
  '23':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He gives them security, and they rely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yet '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 11:4; (Prov. 15:3)
      marker-yv: yv-n
    - type: text
      text: 'His eyes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' on their ways.'
  '24':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are exalted for a little while,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then they are gone.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are brought low;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They are taken out of the way like all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: others;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They dry out like the heads of grain.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Now if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so,
    - type: text
      text: ' who will prove me a liar,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And make my speech worth nothing?”
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They drive away the donkey of the fatherless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 24:6, 10, 12, 17); Job 22:6, 9
      marker-yv: yv-n
    - type: text
      text: take the widow’s ox as a pledge.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They push the needy off the road;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 29:16; Prov. 28:28
      marker-yv: yv-n
    - type: text
      text: poor of the land are forced to hide.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Indeed, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' wild donkeys in the desert,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They go out to their work, searching for food.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The wilderness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yields
    - type: text
      text: ' food for them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' children.'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They gather their fodder in the field
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And glean in the vineyard of the wicked.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:26, 27; (Deut. 24:12, 13); Job 22:6; (James 2:15, 16)
      marker-yv: yv-n
    - type: text
      text: spend the night naked, without clothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And have no covering in the cold.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are wet with the showers of the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lam. 4:5
      marker-yv: yv-n
    - type: text
      text: huddle around the rock for want of shelter.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Some
    - type: text
