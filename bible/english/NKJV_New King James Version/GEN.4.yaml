  - type: text
    content: 'Abel was a keeper of sheep, but Cain was a tiller of the ground. '
  '20':
  - type: text
    content: 'And Adah bore Jabal. He was the father of those who dwell in tents and have livestock. '
  '21':
  - type: text
    content: 'His brother’s name '
  - type: text
    content: was
  - type: text
    content: ' Jubal. He was the father of all those who play the harp and flute. '
  '22':
  - type: text
    content: 'And as for Zillah, she also bore Tubal-Cain, an instructor of every craftsman in bronze and iron. And the sister of Tubal-Cain '
  - type: text
    content: was
  - type: text
    content: ' Naamah.'
  '23':
