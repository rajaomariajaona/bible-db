verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph’s Cup
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he commanded the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 43:16
      marker-yv: yv-n
    - type: text
      text: 'steward of his house, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 42:25
      marker-yv: yv-n
    - type: text
      text: '“Fill the men’s sacks with food, as much as they can carry, and put each man’s money in the mouth of his sack. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, “Now also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: let
    - type: text
      text: ' it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' according to your words; he with whom it is found shall be my slave, and you shall be blameless.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then each man speedily let down his sack to the ground, and each opened his sack. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he searched. He began with the oldest and left off with the youngest; and the cup was found in Benjamin’s sack. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 37:29, 34; Num. 14:6; 2 Sam. 1:11
      marker-yv: yv-n
    - type: text
      text: tore their clothes, and each man loaded his donkey and returned to the city.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Judah and his brothers came to Joseph’s house, and he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' still there; and they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 37:7, 10
      marker-yv: yv-n
    - type: text
      text: 'fell before him on the ground. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joseph said to them, “What deed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' this you have done? Did you not know that such a man as I can certainly practice divination?”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Judah said, “What shall we say to my lord? What shall we speak? Or how shall we clear ourselves? God has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Num. 32:23)
      marker-yv: yv-n
    - type: text
      text: 'found out the iniquity of your servants; here '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 44:9
      marker-yv: yv-n
    - type: text
      text: 'we are, my lord’s slaves, both we and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' also with whom the cup was found.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 17:15
      marker-yv: yv-n
    - type: text
      text: “Far be it from me that I should do so; the man in whose hand the cup was found, he shall be my slave. And as for you, go up in peace to your father.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judah Intercedes for Benjamin
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Judah came near to him and said: “O my lord, please let your servant speak a word in my lord’s hearing, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 18:30, 32; Ex. 32:22
      marker-yv: yv-n
    - type: text
      text: 'do not let your anger burn against your servant; for you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' even like Pharaoh. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My lord asked his servants, saying, ‘Have you a father or a brother?’ '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also put my cup, the silver cup, in the mouth of the sack of the youngest, and his grain money.” So he did according to the word that Joseph had spoken. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we said to my lord, ‘We have a father, an old man, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 37:3; 43:8; 44:30
      marker-yv: yv-n
    - type: text
      text: 'a child of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' old age, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' young; his brother is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 42:38
      marker-yv: yv-n
    - type: text
      text: 'dead, and he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 46:19
      marker-yv: yv-n
    - type: text
      text: 'alone is left of his mother’s children, and his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 42:4
      marker-yv: yv-n
    - type: text
      text: 'father loves him.’ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you said to your servants, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 42:15, 20
      marker-yv: yv-n
    - type: text
      text: '‘Bring him down to me, that I may set my eyes on him.’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we said to my lord, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 43:3, 5
      marker-yv: yv-n
    - type: text
      text: '‘The lad cannot leave his father, for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: if
    - type: text
      text: ' he should leave his father, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: father
    - type: text
      text: ' would die.’ '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you said to your servants, ‘Unless your youngest brother comes down with you, you shall see my face no more.’
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So it was, when we went up to your servant my father, that we told him the words of my lord. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 43:2
      marker-yv: yv-n
    - type: text
      text: 'our father said, ‘Go back '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' buy us a little food.’ '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we said, ‘We cannot go down; if our youngest brother is with us, then we will go down; for we may not see the man’s face unless our youngest brother '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' with us.’ '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then your servant my father said to us, ‘You know that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 30:22–24; 35:16–18; 46:19
      marker-yv: yv-n
    - type: text
      text: 'my wife bore me two sons; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the one went out from me, and I said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 37:31–35
      marker-yv: yv-n
    - type: text
      text: '“Surely he is torn to pieces”; and I have not seen him since. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 42:36, 38; 44:31
      marker-yv: yv-n
    - type: text
      text: take this one also from me, and calamity befalls him, you shall bring down my gray hair with sorrow to the grave.’
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as the morning dawned, the men were sent away, they and their donkeys. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now therefore, when I come to your servant my father, and the lad '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not with us, since '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Sam. 18:1; 25:29)
      marker-yv: yv-n
    - type: text
      text: 'his life is bound up in the lad’s life, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'it will happen, when he sees that the lad '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us,
    - type: text
      text: ' that he will die. So your servants will bring down the gray hair of your servant our father with sorrow to the grave. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For your servant became surety for the lad to my father, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 43:9
      marker-yv: yv-n
    - type: text
      text: '‘If I do not bring him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: back
    - type: text
      text: ' to you, then I shall bear the blame before my father forever.’ '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, please '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 32:32
      marker-yv: yv-n
    - type: text
      text: 'let your servant remain instead of the lad as a slave to my lord, and let the lad go up with his brothers. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For how shall I go up to my father if the lad '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not with me, lest perhaps I see the evil that would come upon my father?”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they had gone out of the city, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yet
    - type: text
      text: ' far off, Joseph said to his steward, “Get up, follow the men; and when you overtake them, say to them, ‘Why have you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 25:21
      marker-yv: yv-n
    - type: text
      text: 'repaid evil for good? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' not this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' from which my lord drinks, and with which he indeed practices divination? You have done evil in so doing.’ ”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he overtook them, and he spoke to them these same words. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said to him, “Why does my lord say these words? Far be it from us that your servants should do such a thing. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Look, we brought back to you from the land of Canaan '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 43:21
      marker-yv: yv-n
    - type: text
      text: 'the money which we found in the mouth of our sacks. How then could we steal silver or gold from your lord’s house? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With whomever of your servants it is found, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 31:32
      marker-yv: yv-n
    - type: text
      text: let him die, and we also will be my lord’s slaves.”
