document_id: PSA.26,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prayer for Divine Scrutiny and Redemption
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Vindicate '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 7:8
      marker-yv: yv-n
    - type: text
      text: 'me, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 20:3; (Prov. 20:7)
      marker-yv: yv-n
    - type: text
      text: walked in my integrity.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 13:5; 28:7)
      marker-yv: yv-n
    - type: text
      text: 'I have also trusted in the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I shall not slip.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'In whose hands '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a sinister scheme,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And whose right hand is full of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 8:3
      marker-yv: yv-n
    - type: text
      text: bribes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But as for me, I will walk in my integrity;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Redeem me and be merciful to me.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 40:2
      marker-yv: yv-n
    - type: text
      text: My foot stands in an even place;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the congregations I will bless the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 17:3; 139:23
      marker-yv: yv-n
    - type: text
      text: 'Examine me, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and prove me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Try my mind and my heart.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For Your lovingkindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' before my eyes,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 20:3; Ps. 86:11
      marker-yv: yv-n
    - type: text
      text: I have walked in Your truth.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I have not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 1:1; Jer. 15:17
      marker-yv: yv-n
    - type: text
      text: sat with idolatrous mortals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor will I go in with hypocrites.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 31:6; 139:21
      marker-yv: yv-n
    - type: text
      text: hated the assembly of evildoers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And will not sit with the wicked.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I will wash my hands in innocence;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So I will go about Your altar, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: That I may proclaim with the voice of thanksgiving,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And tell of all Your wondrous works.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 27:4; 84:1–4, 10
      marker-yv: yv-n
    - type: text
      text: I have loved the habitation of Your house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the place where Your glory dwells.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 28:3
      marker-yv: yv-n
    - type: text
      text: Do not gather my soul with sinners,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor my life with bloodthirsty men,
