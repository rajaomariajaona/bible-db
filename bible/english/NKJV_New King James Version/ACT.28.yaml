document_id: ACT.28,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Ministry on Malta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now when they had escaped, they then found out that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 27:26
      marker-yv: yv-n
    - type: text
      text: 'the island was called Malta. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'They also honored us in many '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 15:6; 1 Tim. 5:17
      marker-yv: yv-n
    - type: text
      text: 'ways; and when we departed, they provided such things as were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Phil. 4:19)
      marker-yv: yv-n
    - type: text
      text: necessary.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Arrival at Rome
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'After three months we sailed in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 27:6
      marker-yv: yv-n
    - type: text
      text: 'an Alexandrian ship whose figurehead was the Twin Brothers, which had wintered at the island. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And landing at Syracuse, we stayed three days. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'From there we circled round and reached Rhegium. And after one day the south wind blew; and the next day we came to Puteoli, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'where we found '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:8
      marker-yv: yv-n
    - type: text
      text: 'brethren, and were invited to stay with them seven days. And so we went toward Rome. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And from there, when the brethren heard about us, they came to meet us as far as Appii Forum and Three Inns. When Paul saw them, he thanked God and took courage.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now when we came to Rome, the centurion delivered the prisoners to the captain of the guard; but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 23:11; 24:25; 27:3
      marker-yv: yv-n
    - type: text
      text: Paul was permitted to dwell by himself with the soldier who guarded him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Ministry at Rome
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And it came to pass after three days that Paul called the leaders of the Jews together. So when they had come together, he said to them: “Men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brethren, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 23:29; 24:12, 13; 26:31
      marker-yv: yv-n
    - type: text
      text: 'though I have done nothing against our people or the customs of our fathers, yet '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 21:33
      marker-yv: yv-n
    - type: text
      text: 'I was delivered as a prisoner from Jerusalem into the hands of the Romans, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'who, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 22:24; 24:10; 25:8; 26:32
      marker-yv: yv-n
    - type: text
      text: 'when they had examined me, wanted to let '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' go, because there was no cause for putting me to death. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But when the Jews spoke against '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 25:11, 21, 25
      marker-yv: yv-n
    - type: text
      text: 'I was compelled to appeal to Caesar, not that I had anything of which to accuse my nation. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 28:4; Rom. 1:14; 1 Cor. 14:11; Col. 3:11
      marker-yv: yv-n
    - type: text
      text: 'natives showed us unusual kindness; for they kindled a fire and made us all welcome, because of the rain that was falling and because of the cold. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For this reason therefore I have called for you, to see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' and speak with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you,
    - type: text
      text: ' because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 26:6, 7
      marker-yv: yv-n
    - type: text
      text: 'for the hope of Israel I am bound with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 26:29; Eph. 3:1; 4:1; 6:20; 2 Tim. 1:8, 16; Philem. 10, 13
      marker-yv: yv-n
    - type: text
      text: this chain.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then they said to him, “We neither received letters from Judea concerning you, nor have any of the brethren who came reported or spoken any evil of you. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But we desire to hear from you what you think; for concerning this sect, we know that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 2:34; Acts 24:5, 14; (1 Pet. 2:12; 3:16; 4:14, 16)
      marker-yv: yv-n
    - type: text
      text: it is spoken against everywhere.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So when they had appointed him a day, many came to him at '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' lodging, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:27; (Acts 17:3; 19:8)
      marker-yv: yv-n
    - type: text
      text: 'to whom he explained and solemnly testified of the kingdom of God, persuading them concerning Jesus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 26:6, 22
      marker-yv: yv-n
    - type: text
      text: 'from both the Law of Moses and the Prophets, from morning till evening. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 14:4; 19:9
      marker-yv: yv-n
    - type: text
      text: 'some were persuaded by the things which were spoken, and some disbelieved. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'So when they did not agree among themselves, they departed after Paul had said one word: “The Holy Spirit spoke rightly through Isaiah the prophet to our fathers, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: saying,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 6:9, 10; Jer. 5:21; Ezek. 12:2; Matt. 13:14, 15; Mark 4:12; Luke 8:10; John 12:40, 41; Rom. 11:8
      marker-yv: yv-n
    - type: text
      text: '‘Go to this people and say:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Hearing you will hear, and shall not understand;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And seeing you will see, and not perceive;
  '27':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: For the hearts of this people have grown dull.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Their
    - type: text
      text: ' ears are hard of hearing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their eyes they have closed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Lest they should see with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' eyes and hear with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' ears,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Lest they should understand with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' hearts and turn,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So that I should heal them.” ’
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '“Therefore let it be known to you that the salvation of God has been sent '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 42:1, 6; 49:6; Matt. 21:41; Luke 2:32; Rom. 11:11
      marker-yv: yv-n
    - type: text
      text: 'to the Gentiles, and they will hear it!” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: And when he had said these words, the Jews departed and had a great dispute among themselves.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But when Paul had gathered a bundle of sticks and laid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' on the fire, a viper came out because of the heat, and fastened on his hand. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Then Paul dwelt two whole years in his own rented house, and received all who came to him, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:31; Eph. 6:19
      marker-yv: yv-n
    - type: text
      text: preaching the kingdom of God and teaching the things which concern the Lord Jesus Christ with all confidence, no one forbidding him.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So when the natives saw the creature hanging from his hand, they said to one another, “No doubt this man is a murderer, whom, though he has escaped the sea, yet justice does not allow to live.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But he shook off the creature into the fire and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:18; Luke 10:19
      marker-yv: yv-n
    - type: text
      text: 'suffered no harm. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'However, they were expecting that he would swell up or suddenly fall down dead. But after they had looked for a long time and saw no harm come to him, they changed their minds and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 12:22; 14:11
      marker-yv: yv-n
    - type: text
      text: said that he was a god.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In that region there was an estate of the leading citizen of the island, whose name was Publius, who received us and entertained us courteously for three days. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And it happened that the father of Publius lay sick of a fever and dysentery. Paul went in to him and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:40; (James 5:14, 15)
      marker-yv: yv-n
    - type: text
      text: 'prayed, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 9:18; Mark 5:23; 6:5; 7:32; 16:18; Luke 4:40; Acts 19:11, 12; (1 Cor. 12:9, 28)
      marker-yv: yv-n
    - type: text
      text: 'he laid his hands on him and healed him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So when this was done, the rest of those on the island who had diseases also came and were healed. '
