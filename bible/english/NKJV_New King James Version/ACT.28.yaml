document_id: ACT.28,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Ministry on Malta
  - type: text
    content: 'Now when they had escaped, they then found out that '
  - type: note
    content: Acts 27:26
  - type: text
    content: 'the island was called Malta. '
  '10':
  - type: text
    content: 'They also honored us in many '
  - type: note
    content: Matt. 15:6; 1 Tim. 5:17
  - type: text
    content: 'ways; and when we departed, they provided such things as were '
  - type: note
    content: (Phil. 4:19)
  - type: text
    content: necessary.
  - type: heading
    content: Arrival at Rome
  '11':
  - type: text
    content: 'After three months we sailed in '
  - type: note
    content: Acts 27:6
  - type: text
    content: 'an Alexandrian ship whose figurehead was the Twin Brothers, which had wintered at the island. '
  '12':
  - type: text
    content: 'And landing at Syracuse, we stayed three days. '
  '13':
  - type: text
    content: 'From there we circled round and reached Rhegium. And after one day the south wind blew; and the next day we came to Puteoli, '
  '14':
  - type: text
    content: 'where we found '
  - type: note
    content: Rom. 1:8
  - type: text
    content: 'brethren, and were invited to stay with them seven days. And so we went toward Rome. '
  '15':
  - type: text
    content: And from there, when the brethren heard about us, they came to meet us as far as Appii Forum and Three Inns. When Paul saw them, he thanked God and took courage.
  '16':
  - type: text
    content: 'Now when we came to Rome, the centurion delivered the prisoners to the captain of the guard; but '
  - type: note
    content: Acts 23:11; 24:25; 27:3
  - type: text
    content: Paul was permitted to dwell by himself with the soldier who guarded him.
  - type: heading
    content: Paul’s Ministry at Rome
  '17':
  - type: text
    content: 'And it came to pass after three days that Paul called the leaders of the Jews together. So when they had come together, he said to them: “Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, '
  - type: note
    content: Acts 23:29; 24:12, 13; 26:31
  - type: text
    content: 'though I have done nothing against our people or the customs of our fathers, yet '
  - type: note
    content: Acts 21:33
  - type: text
    content: 'I was delivered as a prisoner from Jerusalem into the hands of the Romans, '
  '18':
  - type: text
    content: 'who, '
  - type: note
    content: Acts 22:24; 24:10; 25:8; 26:32
  - type: text
    content: 'when they had examined me, wanted to let '
  - type: text
    content: me
  - type: text
    content: ' go, because there was no cause for putting me to death. '
  '19':
  - type: text
    content: 'But when the Jews spoke against '
  - type: text
    content: it,
  - type: text
    content: ' '
  - type: note
    content: Acts 25:11, 21, 25
  - type: text
    content: 'I was compelled to appeal to Caesar, not that I had anything of which to accuse my nation. '
  '2':
  - type: text
    content: 'And the '
  - type: note
    content: Acts 28:4; Rom. 1:14; 1 Cor. 14:11; Col. 3:11
  - type: text
    content: 'natives showed us unusual kindness; for they kindled a fire and made us all welcome, because of the rain that was falling and because of the cold. '
  '20':
  - type: text
    content: 'For this reason therefore I have called for you, to see '
  - type: text
    content: you
  - type: text
    content: ' and speak with '
  - type: text
    content: you,
  - type: text
    content: ' because '
  - type: note
    content: Acts 26:6, 7
  - type: text
    content: 'for the hope of Israel I am bound with '
  - type: note
    content: Acts 26:29; Eph. 3:1; 4:1; 6:20; 2 Tim. 1:8, 16; Philem. 10, 13
  - type: text
    content: this chain.”
  '21':
  - type: text
    content: 'Then they said to him, “We neither received letters from Judea concerning you, nor have any of the brethren who came reported or spoken any evil of you. '
  '22':
  - type: text
    content: 'But we desire to hear from you what you think; for concerning this sect, we know that '
  - type: note
    content: Luke 2:34; Acts 24:5, 14; (1 Pet. 2:12; 3:16; 4:14, 16)
  - type: text
    content: it is spoken against everywhere.”
  '23':
  - type: text
    content: 'So when they had appointed him a day, many came to him at '
  - type: text
    content: his
  - type: text
    content: ' lodging, '
  - type: note
    content: Luke 24:27; (Acts 17:3; 19:8)
  - type: text
    content: 'to whom he explained and solemnly testified of the kingdom of God, persuading them concerning Jesus '
  - type: note
    content: Acts 26:6, 22
  - type: text
    content: 'from both the Law of Moses and the Prophets, from morning till evening. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: Acts 14:4; 19:9
  - type: text
    content: 'some were persuaded by the things which were spoken, and some disbelieved. '
  '25':
  - type: text
    content: 'So when they did not agree among themselves, they departed after Paul had said one word: “The Holy Spirit spoke rightly through Isaiah the prophet to our fathers, '
  '26':
  - type: text
    content: saying,
  - type: note
    content: Is. 6:9, 10; Jer. 5:21; Ezek. 12:2; Matt. 13:14, 15; Mark 4:12; Luke 8:10; John 12:40, 41; Rom. 11:8
  - type: text
    content: '‘Go to this people and say:'
  - type: text
    content: “Hearing you will hear, and shall not understand;
  - type: text
    content: And seeing you will see, and not perceive;
  '27':
  - type: text
    content: For the hearts of this people have grown dull.
  - type: text
    content: Their
  - type: text
    content: ' ears are hard of hearing,'
  - type: text
    content: And their eyes they have closed,
  - type: text
    content: 'Lest they should see with '
  - type: text
    content: their
  - type: text
    content: ' eyes and hear with '
  - type: text
    content: their
  - type: text
    content: ' ears,'
  - type: text
    content: 'Lest they should understand with '
  - type: text
    content: their
  - type: text
    content: ' hearts and turn,'
  - type: text
    content: So that I should heal them.” ’
  '28':
  - type: text
    content: '“Therefore let it be known to you that the salvation of God has been sent '
  - type: note
    content: Is. 42:1, 6; 49:6; Matt. 21:41; Luke 2:32; Rom. 11:11
  - type: text
    content: 'to the Gentiles, and they will hear it!” '
  '29':
  - type: text
    content: And when he had said these words, the Jews departed and had a great dispute among themselves.
  '3':
  - type: text
    content: 'But when Paul had gathered a bundle of sticks and laid '
  - type: text
    content: them
  - type: text
    content: ' on the fire, a viper came out because of the heat, and fastened on his hand. '
  '30':
  - type: text
    content: 'Then Paul dwelt two whole years in his own rented house, and received all who came to him, '
  '31':
  - type: note
    content: Acts 4:31; Eph. 6:19
  - type: text
    content: preaching the kingdom of God and teaching the things which concern the Lord Jesus Christ with all confidence, no one forbidding him.
  '4':
  - type: text
    content: 'So when the natives saw the creature hanging from his hand, they said to one another, “No doubt this man is a murderer, whom, though he has escaped the sea, yet justice does not allow to live.” '
  '5':
  - type: text
    content: 'But he shook off the creature into the fire and '
  - type: note
    content: Mark 16:18; Luke 10:19
  - type: text
    content: 'suffered no harm. '
  '6':
  - type: text
    content: 'However, they were expecting that he would swell up or suddenly fall down dead. But after they had looked for a long time and saw no harm come to him, they changed their minds and '
  - type: note
    content: Acts 12:22; 14:11
  - type: text
    content: said that he was a god.
  '7':
  - type: text
    content: 'In that region there was an estate of the leading citizen of the island, whose name was Publius, who received us and entertained us courteously for three days. '
  '8':
  - type: text
    content: 'And it happened that the father of Publius lay sick of a fever and dysentery. Paul went in to him and '
  - type: note
    content: Acts 9:40; (James 5:14, 15)
  - type: text
    content: 'prayed, and '
  - type: note
    content: Matt. 9:18; Mark 5:23; 6:5; 7:32; 16:18; Luke 4:40; Acts 19:11, 12; (1 Cor. 12:9, 28)
  - type: text
    content: 'he laid his hands on him and healed him. '
  '9':
  - type: text
    content: 'So when this was done, the rest of those on the island who had diseases also came and were healed. '
