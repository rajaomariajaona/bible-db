document_id: ROM.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sister Phoebe Commended
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I commend to you Phoebe our sister, who is a servant of the church in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:18
    marker-yv: yv-n
  - type: text
    text: 'Cenchrea, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 2:29
    marker-yv: yv-n
  - type: text
    text: 'that you may receive her in the Lord '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 1:27
    marker-yv: yv-n
  - type: text
    text: in a manner worthy of the saints, and assist her in whatever business she has need of you; for indeed she has been a helper of many and of myself also.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greeting Roman Saints
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Greet '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:2, 18, 26; 1 Cor. 16:19; 2 Tim. 4:19
    marker-yv: yv-n
  - type: text
    text: 'Priscilla and Aquila, my fellow workers in Christ Jesus, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'who risked their own necks for my life, to whom not only I give thanks, but also all the churches of the Gentiles. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Likewise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: greet
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 16:19; Col. 4:15; Philem. 2
    marker-yv: yv-n
  - type: text
    text: the church that is in their house.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Greet my beloved Epaenetus, who is '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 16:15
    marker-yv: yv-n
  - type: text
    text: 'the firstfruits of Achaia to Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Greet Mary, who labored much for us. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Greet Andronicus and Junia, my countrymen and my fellow prisoners, who are of note among the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 1:13, 26
    marker-yv: yv-n
  - type: text
    text: 'apostles, who also '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 8:11; 16:3, 9, 10; 2 Cor. 5:17; 12:2; Gal. 1:22
    marker-yv: yv-n
  - type: text
    text: were in Christ before me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Greet Amplias, my beloved in the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Greet Urbanus, our fellow worker in Christ, and Stachys, my beloved. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Greet Apelles, approved in Christ. Greet those who are of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: household
  - type: text
    text: ' of Aristobulus. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Greet Herodion, my countryman. Greet those who are of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: household
  - type: text
    text: ' of Narcissus who are in the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Greet Tryphena and Tryphosa, who have labored in the Lord. Greet the beloved Persis, who labored much in the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Greet Rufus, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 John 1
    marker-yv: yv-n
  - type: text
    text: 'chosen in the Lord, and his mother and mine. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Greet Asyncritus, Phlegon, Hermas, Patrobas, Hermes, and the brethren who are with them. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Greet Philologus and Julia, Nereus and his sister, and Olympas, and all the saints who are with them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 16:20; 2 Cor. 13:12; 1 Thess. 5:26; 1 Pet. 5:14
    marker-yv: yv-n
  - type: text
    text: Greet one another with a holy kiss. The churches of Christ greet you.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avoid Divisive Persons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now I urge you, brethren, note those '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Acts 15:1)
    marker-yv: yv-n
  - type: text
    text: 'who cause divisions and offenses, contrary to the doctrine which you learned, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 5:9)
    marker-yv: yv-n
  - type: text
    text: 'avoid them. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For those who are such do not serve our Lord Jesus Christ, but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 3:19
    marker-yv: yv-n
  - type: text
    text: 'their own belly, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 2:4; 2 Pet. 2:3
    marker-yv: yv-n
  - type: text
    text: 'by smooth words and flattering speech deceive the hearts of the simple. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:8
    marker-yv: yv-n
  - type: text
    text: 'your obedience has become known to all. Therefore I am glad on your behalf; but I want you to be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 4:22; Matt. 10:16; 1 Cor. 14:20
    marker-yv: yv-n
  - type: text
    text: 'wise in what is good, and simple concerning evil. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 15:33
    marker-yv: yv-n
  - type: text
    text: 'the God of peace '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 3:15
    marker-yv: yv-n
  - type: text
    text: will crush Satan under your feet shortly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 16:23; 2 Cor. 13:14; Gal. 6:18; Phil. 4:23; 1 Thess. 5:28; 2 Thess. 3:18; Rev. 22:21
    marker-yv: yv-n
  - type: text
    text: 'The grace of our Lord Jesus Christ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' with you. Amen.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greetings from Paul’s Friends
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 16:1; Heb. 13:23
    marker-yv: yv-n
  - type: text
    text: 'Timothy, my fellow worker, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 13:1
    marker-yv: yv-n
  - type: text
    text: 'Lucius, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 17:5
    marker-yv: yv-n
  - type: text
    text: 'Jason, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 20:4
    marker-yv: yv-n
  - type: text
    text: Sosipater, my countrymen, greet you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I, Tertius, who wrote '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' epistle, greet you in the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 1:14
    marker-yv: yv-n
  - type: text
    text: 'Gaius, my host and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: host
  - type: text
    text: ' of the whole church, greets you. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 19:22; 2 Tim. 4:20
    marker-yv: yv-n
  - type: text
    text: 'Erastus, the treasurer of the city, greets you, and Quartus, a brother. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 5:28
    marker-yv: yv-n
  - type: text
    text: 'The grace of our Lord Jesus Christ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' with you all. Amen.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Benediction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Eph. 3:20; Jude 24)
    marker-yv: yv-n
  - type: text
    text: 'to Him who is able to establish you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 2:16
    marker-yv: yv-n
  - type: text
    text: 'according to my gospel and the preaching of Jesus Christ, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 13:35; Rom. 11:25; 1 Cor. 2:1, 7; 4:1; Eph. 1:9
    marker-yv: yv-n
  - type: text
    text: 'according to the revelation of the mystery '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 1:26; 2:2; 4:3; (1 Tim. 3:16)
    marker-yv: yv-n
  - type: text
    text: 'kept secret since the world began '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 1:9
    marker-yv: yv-n
  - type: text
    text: 'now made manifest, and by the prophetic Scriptures made known to all nations, according to the commandment of the everlasting God, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Acts 6:7); Rom. 1:5
    marker-yv: yv-n
  - type: text
    text: 'obedience to the faith— '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jude 25
    marker-yv: yv-n
  - type: text
    text: 'God, alone wise, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' glory through Jesus Christ forever. Amen.'
