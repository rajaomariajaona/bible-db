document_id: ROM.16,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Sister Phoebe Commended
  - type: text
    content: 'I commend to you Phoebe our sister, who is a servant of the church in '
  - type: note
    content: Acts 18:18
  - type: text
    content: 'Cenchrea, '
  '10':
  - type: text
    content: 'Greet Apelles, approved in Christ. Greet those who are of the '
  - type: text
    content: household
  - type: text
    content: ' of Aristobulus. '
  '11':
  - type: text
    content: 'Greet Herodion, my countryman. Greet those who are of the '
  - type: text
    content: household
  - type: text
    content: ' of Narcissus who are in the Lord.'
  '12':
  - type: text
    content: 'Greet Tryphena and Tryphosa, who have labored in the Lord. Greet the beloved Persis, who labored much in the Lord. '
  '13':
  - type: text
    content: 'Greet Rufus, '
  - type: note
    content: 2 John 1
  - type: text
    content: 'chosen in the Lord, and his mother and mine. '
  '14':
  - type: text
    content: 'Greet Asyncritus, Phlegon, Hermas, Patrobas, Hermes, and the brethren who are with them. '
  '15':
  - type: text
    content: Greet Philologus and Julia, Nereus and his sister, and Olympas, and all the saints who are with them.
  '16':
  - type: note
    content: 1 Cor. 16:20; 2 Cor. 13:12; 1 Thess. 5:26; 1 Pet. 5:14
  - type: text
    content: Greet one another with a holy kiss. The churches of Christ greet you.
  - type: heading
    content: Avoid Divisive Persons
  '17':
  - type: text
    content: 'Now I urge you, brethren, note those '
  - type: note
    content: (Acts 15:1)
  - type: text
    content: 'who cause divisions and offenses, contrary to the doctrine which you learned, and '
  - type: note
    content: (1 Cor. 5:9)
  - type: text
    content: 'avoid them. '
  '18':
  - type: text
    content: 'For those who are such do not serve our Lord Jesus Christ, but '
  - type: note
    content: Phil. 3:19
  - type: text
    content: 'their own belly, and '
  - type: note
    content: Col. 2:4; 2 Pet. 2:3
  - type: text
    content: 'by smooth words and flattering speech deceive the hearts of the simple. '
  '19':
  - type: text
    content: 'For '
  - type: note
    content: Rom. 1:8
  - type: text
    content: 'your obedience has become known to all. Therefore I am glad on your behalf; but I want you to be '
  - type: note
    content: Jer. 4:22; Matt. 10:16; 1 Cor. 14:20
  - type: text
    content: 'wise in what is good, and simple concerning evil. '
  '2':
  - type: note
    content: Phil. 2:29
  - type: text
    content: 'that you may receive her in the Lord '
  - type: note
    content: Phil. 1:27
  - type: text
    content: in a manner worthy of the saints, and assist her in whatever business she has need of you; for indeed she has been a helper of many and of myself also.
  - type: heading
    content: Greeting Roman Saints
  '20':
  - type: text
    content: 'And '
  - type: note
    content: Rom. 15:33
  - type: text
    content: 'the God of peace '
  - type: note
    content: Gen. 3:15
  - type: text
    content: will crush Satan under your feet shortly.
  - type: note
    content: 1 Cor. 16:23; 2 Cor. 13:14; Gal. 6:18; Phil. 4:23; 1 Thess. 5:28; 2 Thess. 3:18; Rev. 22:21
  - type: text
    content: 'The grace of our Lord Jesus Christ '
  - type: text
    content: be
  - type: text
    content: ' with you. Amen.'
  - type: heading
    content: Greetings from Paul’s Friends
  '21':
  - type: note
    content: Acts 16:1; Heb. 13:23
  - type: text
    content: 'Timothy, my fellow worker, and '
  - type: note
    content: Acts 13:1
  - type: text
    content: 'Lucius, '
  - type: note
    content: Acts 17:5
  - type: text
    content: 'Jason, and '
  - type: note
    content: Acts 20:4
  - type: text
    content: Sosipater, my countrymen, greet you.
  '22':
  - type: text
    content: 'I, Tertius, who wrote '
  - type: text
    content: this
  - type: text
    content: ' epistle, greet you in the Lord.'
  '23':
  - type: note
    content: 1 Cor. 1:14
  - type: text
    content: 'Gaius, my host and '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: host
  - type: text
    content: ' of the whole church, greets you. '
  - type: note
    content: Acts 19:22; 2 Tim. 4:20
  - type: text
    content: 'Erastus, the treasurer of the city, greets you, and Quartus, a brother. '
  '24':
  - type: note
    content: 1 Thess. 5:28
  - type: text
    content: 'The grace of our Lord Jesus Christ '
  - type: text
    content: be
  - type: text
    content: ' with you all. Amen.'
  - type: heading
    content: Benediction
  '25':
  - type: text
    content: 'Now '
  - type: note
    content: (Eph. 3:20; Jude 24)
  - type: text
    content: 'to Him who is able to establish you '
  - type: note
    content: Rom. 2:16
  - type: text
    content: 'according to my gospel and the preaching of Jesus Christ, '
  - type: note
    content: Matt. 13:35; Rom. 11:25; 1 Cor. 2:1, 7; 4:1; Eph. 1:9
  - type: text
    content: 'according to the revelation of the mystery '
  - type: note
    content: Col. 1:26; 2:2; 4:3; (1 Tim. 3:16)
  - type: text
    content: 'kept secret since the world began '
  '26':
  - type: text
    content: 'but '
  - type: note
    content: Eph. 1:9
  - type: text
    content: 'now made manifest, and by the prophetic Scriptures made known to all nations, according to the commandment of the everlasting God, for '
  - type: note
    content: (Acts 6:7); Rom. 1:5
  - type: text
    content: 'obedience to the faith— '
  '27':
  - type: text
    content: 'to '
  - type: note
    content: Jude 25
  - type: text
    content: 'God, alone wise, '
  - type: text
    content: be
  - type: text
    content: ' glory through Jesus Christ forever. Amen.'
  '3':
  - type: text
    content: 'Greet '
  - type: note
    content: Acts 18:2, 18, 26; 1 Cor. 16:19; 2 Tim. 4:19
  - type: text
    content: 'Priscilla and Aquila, my fellow workers in Christ Jesus, '
  '4':
  - type: text
    content: 'who risked their own necks for my life, to whom not only I give thanks, but also all the churches of the Gentiles. '
  '5':
  - type: text
    content: 'Likewise '
  - type: text
    content: greet
  - type: text
    content: ' '
  - type: note
    content: 1 Cor. 16:19; Col. 4:15; Philem. 2
  - type: text
    content: the church that is in their house.
  - type: text
    content: 'Greet my beloved Epaenetus, who is '
  - type: note
    content: 1 Cor. 16:15
  - type: text
    content: 'the firstfruits of Achaia to Christ. '
  '6':
  - type: text
    content: 'Greet Mary, who labored much for us. '
  '7':
  - type: text
    content: 'Greet Andronicus and Junia, my countrymen and my fellow prisoners, who are of note among the '
  - type: note
    content: Acts 1:13, 26
  - type: text
    content: 'apostles, who also '
  - type: note
    content: Rom. 8:11; 16:3, 9, 10; 2 Cor. 5:17; 12:2; Gal. 1:22
  - type: text
    content: were in Christ before me.
  '8':
  - type: text
    content: 'Greet Amplias, my beloved in the Lord. '
  '9':
  - type: text
    content: 'Greet Urbanus, our fellow worker in Christ, and Stachys, my beloved. '
