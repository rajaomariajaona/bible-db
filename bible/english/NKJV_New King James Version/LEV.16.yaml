document_id: LEV.16,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Day of Atonement
  - type: text
    content: 'Now the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses after '
  - type: note
    content: Lev. 10:1, 2; 2 Sam. 6:6–8
  - type: text
    content: 'the death of the two sons of Aaron, when they offered profane fire before the '
  - type: heading
    content: Lord
  - type: text
    content: ', and died; '
  '10':
  - type: text
    content: 'But the goat on which the lot fell to be the scapegoat shall be presented alive before the '
  - type: heading
    content: Lord
  - type: text
    content: ', to make '
  - type: note
    content: (Is. 53:5, 6; Rom. 3:25; Heb. 7:27; 9:23, 24; 1 John 2:2)
  - type: text
    content: atonement upon it, and to let it go as the scapegoat into the wilderness.
  '11':
  - type: text
    content: '“And Aaron shall bring the bull of the sin offering, which is for himself, and make atonement for '
  - type: note
    content: (Heb. 7:27; 9:7)
  - type: text
    content: 'himself and for his house, and shall kill the bull as the sin offering which is for himself. '
  '12':
  - type: text
    content: 'Then he shall take '
  - type: note
    content: Lev. 10:1; Num. 16:7, 18; Is. 6:6, 7; Rev. 8:5
  - type: text
    content: 'a censer full of burning coals of fire from the altar before the '
  - type: heading
    content: Lord
  - type: text
    content: ', with his hands full of '
  - type: note
    content: Ex. 30:34–38
  - type: text
    content: 'sweet incense beaten fine, and bring it inside the veil. '
  '13':
  - type: note
    content: Ex. 30:7, 8; Num. 16:7, 18, 46
  - type: text
    content: 'And he shall put the incense on the fire before the '
  - type: heading
    content: Lord
  - type: text
    content: ', that the cloud of incense may cover the '
  - type: note
    content: Ex. 25:21
  - type: text
    content: 'mercy seat that is on the Testimony, lest he '
  - type: note
    content: Ex. 28:43; Lev. 22:9; Num. 4:15, 20
  - type: text
    content: 'die. '
  '14':
  - type: note
    content: Lev. 4:5; (Heb. 9:25; 10:4)
  - type: text
    content: 'He shall take some of the blood of the bull and '
  - type: note
    content: Lev. 4:6, 17
  - type: text
    content: sprinkle it with his finger on the mercy seat on the east side; and before the mercy seat he shall sprinkle some of the blood with his finger seven times.
  '15':
  - type: note
    content: (Heb. 2:17)
  - type: text
    content: '“Then he shall kill the goat of the sin offering, which is for the people, bring its blood '
  - type: note
    content: (Heb. 6:19; 7:27; 9:3, 7, 12)
  - type: text
    content: 'inside the veil, do with that blood as he did with the blood of the bull, and sprinkle it on the mercy seat and before the mercy seat. '
  '16':
  - type: text
    content: 'So he shall '
  - type: note
    content: Ex. 29:36; 30:10; Ezek. 45:18; (Heb. 9:22–24)
  - type: text
    content: 'make atonement for the Holy Place, because of the uncleanness of the children of Israel, and because of their transgressions, for all their sins; and so he shall do for the tabernacle of meeting which remains among them in the midst of their uncleanness. '
  '17':
  - type: text
    content: 'There shall be '
  - type: note
    content: Ex. 34:3; Luke 1:10
  - type: text
    content: 'no man in the tabernacle of meeting when he goes in to make atonement in the Holy Place, until he comes out, that he may make atonement for himself, for his household, and for all the assembly of Israel. '
  '18':
  - type: text
    content: 'And he shall go out to the altar that is before the '
  - type: heading
    content: Lord
  - type: text
    content: ', and make atonement for '
  - type: note
    content: Ex. 29:36
  - type: text
    content: 'it, and shall take some of the blood of the bull and some of the blood of the goat, and put it on the horns of the altar all around. '
  '19':
  - type: text
    content: 'Then he shall sprinkle some of the blood on it with his finger seven times, cleanse it, and '
  - type: note
    content: Lev. 16:14; Ezek. 43:20
  - type: text
    content: consecrate it from the uncleanness of the children of Israel.
  '2':
  - type: text
    content: 'and the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses: “Tell Aaron your brother '
  - type: note
    content: Ex. 30:10; Lev. 16:34; 23:27; (Heb. 6:19; 9:7, 8, 12; 10:19)
  - type: text
    content: 'not to come at just any time into the Holy Place inside the veil, before the mercy seat which is on the ark, lest he die; for '
  - type: note
    content: Ex. 25:21, 22; 40:34; 1 Kin. 8:10–12
  - type: text
    content: I will appear in the cloud above the mercy seat.
  '20':
  - type: text
    content: '“And when he has made an end of atoning for the Holy Place, the tabernacle of meeting, and the altar, he shall bring the live goat. '
  '21':
  - type: text
    content: 'Aaron shall lay both his hands on the head of the live goat, '
  - type: note
    content: Lev. 5:5; 26:40
  - type: text
    content: 'confess over it all the iniquities of the children of Israel, and all their transgressions, concerning all their sins, '
  - type: note
    content: (Is. 53:6)
  - type: text
    content: 'putting them on the head of the goat, and shall send it away into the wilderness by the hand of a suitable man. '
  '22':
  - type: text
    content: 'The goat shall '
  - type: note
    content: Lev. 8:14; (Is. 53:6, 11, 12; John 1:29; Heb. 9:28; 1 Pet. 2:24)
  - type: text
    content: 'bear on itself all their iniquities to an uninhabited land; and he shall '
  - type: note
    content: Lev. 14:7
  - type: text
    content: release the goat in the wilderness.
  '23':
  - type: text
    content: '“Then Aaron shall come into the tabernacle of meeting, '
  - type: note
    content: Lev. 6:11; 16:4; Ezek. 42:14; 44:19
  - type: text
    content: 'shall take off the linen garments which he put on when he went into the Holy Place, and shall leave them there. '
  '24':
  - type: text
    content: 'And he shall wash his body with water in a holy place, put on his garments, come out and offer his burnt offering and the burnt offering of the people, and make atonement for himself and for the people. '
  '25':
  - type: note
    content: Lev. 1:8; 4:10
  - type: text
    content: 'The fat of the sin offering he shall burn on the altar. '
  '26':
  - type: text
    content: 'And he who released the goat as the scapegoat shall wash his clothes '
  - type: note
    content: Lev. 15:5
  - type: text
    content: 'and bathe his body in water, and afterward he may come into the camp. '
  '27':
  - type: note
    content: Lev. 4:12, 21; 6:30; Heb. 13:11
  - type: text
    content: 'The bull for the sin offering and the goat for the sin offering, whose blood was brought in to make atonement in the Holy Place, shall be carried outside the camp. And they shall burn in the fire their skins, their flesh, and their offal. '
  '28':
  - type: text
    content: Then he who burns them shall wash his clothes and bathe his body in water, and afterward he may come into the camp.
  '29':
  - type: text
    content: '“This shall be a statute forever for you: '
  - type: note
    content: Ex. 30:10; Lev. 23:27–32; Num. 29:7
  - type: text
    content: 'In the seventh month, on the tenth day of the month, you shall afflict your souls, and do no work at all, whether a native of your own country or a stranger who dwells among you. '
  '3':
  - type: text
    content: '“Thus Aaron shall '
  - type: note
    content: Lev. 4:1–12; 16:6; (Heb. 9:7, 12, 24, 25)
  - type: text
    content: 'come into the Holy Place: '
  - type: note
    content: Lev. 4:3
  - type: text
    content: 'with the blood of a young bull as a sin offering, and of a ram as a burnt offering. '
  '30':
  - type: text
    content: 'For on that day the priest shall make atonement for you, to '
  - type: note
    content: Ps. 51:2; Jer. 33:8; (Eph. 5:26; Heb. 9:13, 14; 1 John 1:7, 9)
  - type: text
    content: 'cleanse you, that you may be clean from all your sins before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: note
    content: Lev. 23:27, 32; Ezra 8:21; Is. 58:3, 5; Dan. 10:12
  - type: text
    content: 'It is a sabbath of solemn rest for you, and you shall afflict your souls. It is a statute forever. '
  '32':
  - type: note
    content: Lev. 4:3, 5, 16; 21:10
  - type: text
    content: 'And the priest, who is anointed and '
  - type: note
    content: Ex. 29:29, 30; Num. 20:26, 28
  - type: text
    content: 'consecrated to minister as priest in his father’s place, shall make atonement, and put on the linen clothes, the holy garments; '
  '33':
  - type: text
    content: 'then he shall make atonement for the Holy Sanctuary, and he shall make atonement for the tabernacle of meeting and for the altar, and he shall make atonement for the priests and for all the people of the assembly. '
  '34':
  - type: note
    content: Lev. 23:31; Num. 29:7
  - type: text
    content: 'This shall be an everlasting statute for you, to make atonement for the children of Israel, for all their sins, '
  - type: note
    content: Ex. 30:10; (Heb. 9:7, 25, 28)
  - type: text
    content: 'once a year.” And he did as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '4':
  - type: text
    content: 'He shall put the '
  - type: note
    content: Ex. 28:39, 42, 43; Lev. 6:10; Ezek. 44:17, 18
  - type: text
    content: 'holy linen tunic and the linen trousers on his body; '
  - type: note
    content: Ex. 30:20; Lev. 8:6, 7
  - type: text
    content: 'he shall be girded with a linen sash, and with the linen turban he shall be attired. These are holy garments. Therefore he shall wash his body in water, and put them on. '
  '5':
  - type: text
    content: 'And he shall take from '
  - type: note
    content: Lev. 4:14; Num. 29:11; 2 Chr. 29:21; Ezra 6:17; Ezek. 45:22, 23
  - type: text
    content: the congregation of the children of Israel two kids of the goats as a sin offering, and one ram as a burnt offering.
  '6':
  - type: text
    content: '“Aaron shall offer the bull as a sin offering, which is for himself, and '
  - type: note
    content: Lev. 9:7; (Heb. 5:3; 7:27, 28; 9:7)
  - type: text
    content: 'make atonement for himself and for his house. '
  '7':
  - type: text
    content: 'He shall take the two goats and present them before the '
  - type: heading
    content: Lord
  - type: text
    content: ' at the door of the tabernacle of meeting. '
  '8':
  - type: text
    content: 'Then Aaron shall cast lots for the two goats: one lot for the '
  - type: heading
    content: Lord
  - type: text
    content: ' and the other lot for the scapegoat. '
  '9':
  - type: text
    content: 'And Aaron shall bring the goat on which the '
  - type: heading
    content: Lord
  - type: text
    content: '’s lot fell, and offer it as a sin offering. '
