document_id: LEV.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Day of Atonement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses after '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 10:1, 2; 2 Sam. 6:6–8
    marker-yv: yv-n
  - type: text
    text: 'the death of the two sons of Aaron, when they offered profane fire before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and died; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses: “Tell Aaron your brother '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:10; Lev. 16:34; 23:27; (Heb. 6:19; 9:7, 8, 12; 10:19)
    marker-yv: yv-n
  - type: text
    text: 'not to come at just any time into the Holy Place inside the veil, before the mercy seat which is on the ark, lest he die; for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:21, 22; 40:34; 1 Kin. 8:10–12
    marker-yv: yv-n
  - type: text
    text: I will appear in the cloud above the mercy seat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Thus Aaron shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 4:1–12; 16:6; (Heb. 9:7, 12, 24, 25)
    marker-yv: yv-n
  - type: text
    text: 'come into the Holy Place: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 4:3
    marker-yv: yv-n
  - type: text
    text: 'with the blood of a young bull as a sin offering, and of a ram as a burnt offering. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He shall put the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 28:39, 42, 43; Lev. 6:10; Ezek. 44:17, 18
    marker-yv: yv-n
  - type: text
    text: 'holy linen tunic and the linen trousers on his body; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:20; Lev. 8:6, 7
    marker-yv: yv-n
  - type: text
    text: 'he shall be girded with a linen sash, and with the linen turban he shall be attired. These are holy garments. Therefore he shall wash his body in water, and put them on. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he shall take from '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 4:14; Num. 29:11; 2 Chr. 29:21; Ezra 6:17; Ezek. 45:22, 23
    marker-yv: yv-n
  - type: text
    text: the congregation of the children of Israel two kids of the goats as a sin offering, and one ram as a burnt offering.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Aaron shall offer the bull as a sin offering, which is for himself, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 9:7; (Heb. 5:3; 7:27, 28; 9:7)
    marker-yv: yv-n
  - type: text
    text: 'make atonement for himself and for his house. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He shall take the two goats and present them before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' at the door of the tabernacle of meeting. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Aaron shall cast lots for the two goats: one lot for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and the other lot for the scapegoat. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Aaron shall bring the goat on which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s lot fell, and offer it as a sin offering. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But the goat on which the lot fell to be the scapegoat shall be presented alive before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', to make '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 53:5, 6; Rom. 3:25; Heb. 7:27; 9:23, 24; 1 John 2:2)
    marker-yv: yv-n
  - type: text
    text: atonement upon it, and to let it go as the scapegoat into the wilderness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“And Aaron shall bring the bull of the sin offering, which is for himself, and make atonement for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Heb. 7:27; 9:7)
    marker-yv: yv-n
  - type: text
    text: 'himself and for his house, and shall kill the bull as the sin offering which is for himself. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then he shall take '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 10:1; Num. 16:7, 18; Is. 6:6, 7; Rev. 8:5
    marker-yv: yv-n
  - type: text
    text: 'a censer full of burning coals of fire from the altar before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', with his hands full of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:34–38
    marker-yv: yv-n
  - type: text
    text: 'sweet incense beaten fine, and bring it inside the veil. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:7, 8; Num. 16:7, 18, 46
    marker-yv: yv-n
  - type: text
    text: 'And he shall put the incense on the fire before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', that the cloud of incense may cover the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:21
    marker-yv: yv-n
  - type: text
    text: 'mercy seat that is on the Testimony, lest he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 28:43; Lev. 22:9; Num. 4:15, 20
    marker-yv: yv-n
  - type: text
    text: 'die. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 4:5; (Heb. 9:25; 10:4)
    marker-yv: yv-n
  - type: text
    text: 'He shall take some of the blood of the bull and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 4:6, 17
    marker-yv: yv-n
  - type: text
    text: sprinkle it with his finger on the mercy seat on the east side; and before the mercy seat he shall sprinkle some of the blood with his finger seven times.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Heb. 2:17)
    marker-yv: yv-n
  - type: text
    text: '“Then he shall kill the goat of the sin offering, which is for the people, bring its blood '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Heb. 6:19; 7:27; 9:3, 7, 12)
    marker-yv: yv-n
  - type: text
    text: 'inside the veil, do with that blood as he did with the blood of the bull, and sprinkle it on the mercy seat and before the mercy seat. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So he shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:36; 30:10; Ezek. 45:18; (Heb. 9:22–24)
    marker-yv: yv-n
  - type: text
    text: 'make atonement for the Holy Place, because of the uncleanness of the children of Israel, and because of their transgressions, for all their sins; and so he shall do for the tabernacle of meeting which remains among them in the midst of their uncleanness. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'There shall be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 34:3; Luke 1:10
    marker-yv: yv-n
  - type: text
    text: 'no man in the tabernacle of meeting when he goes in to make atonement in the Holy Place, until he comes out, that he may make atonement for himself, for his household, and for all the assembly of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he shall go out to the altar that is before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and make atonement for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:36
    marker-yv: yv-n
  - type: text
    text: 'it, and shall take some of the blood of the bull and some of the blood of the goat, and put it on the horns of the altar all around. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then he shall sprinkle some of the blood on it with his finger seven times, cleanse it, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 16:14; Ezek. 43:20
    marker-yv: yv-n
  - type: text
    text: consecrate it from the uncleanness of the children of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“And when he has made an end of atoning for the Holy Place, the tabernacle of meeting, and the altar, he shall bring the live goat. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aaron shall lay both his hands on the head of the live goat, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 5:5; 26:40
    marker-yv: yv-n
  - type: text
    text: 'confess over it all the iniquities of the children of Israel, and all their transgressions, concerning all their sins, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 53:6)
    marker-yv: yv-n
  - type: text
    text: 'putting them on the head of the goat, and shall send it away into the wilderness by the hand of a suitable man. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The goat shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 8:14; (Is. 53:6, 11, 12; John 1:29; Heb. 9:28; 1 Pet. 2:24)
    marker-yv: yv-n
  - type: text
    text: 'bear on itself all their iniquities to an uninhabited land; and he shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 14:7
    marker-yv: yv-n
  - type: text
    text: release the goat in the wilderness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“Then Aaron shall come into the tabernacle of meeting, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 6:11; 16:4; Ezek. 42:14; 44:19
    marker-yv: yv-n
  - type: text
    text: 'shall take off the linen garments which he put on when he went into the Holy Place, and shall leave them there. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And he shall wash his body with water in a holy place, put on his garments, come out and offer his burnt offering and the burnt offering of the people, and make atonement for himself and for the people. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 1:8; 4:10
    marker-yv: yv-n
  - type: text
    text: 'The fat of the sin offering he shall burn on the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And he who released the goat as the scapegoat shall wash his clothes '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 15:5
    marker-yv: yv-n
  - type: text
    text: 'and bathe his body in water, and afterward he may come into the camp. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 4:12, 21; 6:30; Heb. 13:11
    marker-yv: yv-n
  - type: text
    text: 'The bull for the sin offering and the goat for the sin offering, whose blood was brought in to make atonement in the Holy Place, shall be carried outside the camp. And they shall burn in the fire their skins, their flesh, and their offal. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then he who burns them shall wash his clothes and bathe his body in water, and afterward he may come into the camp.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“This shall be a statute forever for you: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:10; Lev. 23:27–32; Num. 29:7
    marker-yv: yv-n
  - type: text
    text: 'In the seventh month, on the tenth day of the month, you shall afflict your souls, and do no work at all, whether a native of your own country or a stranger who dwells among you. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'For on that day the priest shall make atonement for you, to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 51:2; Jer. 33:8; (Eph. 5:26; Heb. 9:13, 14; 1 John 1:7, 9)
    marker-yv: yv-n
  - type: text
    text: 'cleanse you, that you may be clean from all your sins before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 23:27, 32; Ezra 8:21; Is. 58:3, 5; Dan. 10:12
    marker-yv: yv-n
  - type: text
    text: 'It is a sabbath of solemn rest for you, and you shall afflict your souls. It is a statute forever. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 4:3, 5, 16; 21:10
    marker-yv: yv-n
  - type: text
    text: 'And the priest, who is anointed and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:29, 30; Num. 20:26, 28
    marker-yv: yv-n
  - type: text
    text: 'consecrated to minister as priest in his father’s place, shall make atonement, and put on the linen clothes, the holy garments; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'then he shall make atonement for the Holy Sanctuary, and he shall make atonement for the tabernacle of meeting and for the altar, and he shall make atonement for the priests and for all the people of the assembly. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 23:31; Num. 29:7
    marker-yv: yv-n
  - type: text
    text: 'This shall be an everlasting statute for you, to make atonement for the children of Israel, for all their sins, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:10; (Heb. 9:7, 25, 28)
    marker-yv: yv-n
  - type: text
    text: 'once a year.” And he did as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses.'
