    marker-yv: yv-n
  - type: text
    text: “There shall be a root of Jesse;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And He who shall rise to reign over the Gentiles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: In Him the Gentiles shall hope.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now may the God of hope fill you with all '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 12:12; 14:17
    marker-yv: yv-n
  - type: text
    text: joy and peace in believing, that you may abound in hope by the power of the Holy Spirit.
- type: usfm
  marker: s1
  children:
  - type: text
