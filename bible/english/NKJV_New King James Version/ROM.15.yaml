document_id: ROM.15,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Bearing Others’ Burdens
  - type: text
    content: 'We '
  - type: note
    content: Rom. 14:1; (Gal. 6:1, 2); 1 Thess. 5:14
  - type: text
    content: 'then who are strong ought to bear with the scruples of the weak, and not to please ourselves. '
  '10':
  - type: text
    content: 'And again he says:'
  - type: note
    content: Deut. 32:43
  - type: text
    content: “Rejoice, O Gentiles, with His people!”
  '11':
  - type: text
    content: 'And again:'
  - type: note
    content: Ps. 117:1
  - type: text
    content: '“Praise the '
  - type: heading
    content: Lord
  - type: text
    content: ', all you Gentiles!'
  - type: text
    content: Laud Him, all you peoples!”
  '12':
  - type: text
    content: 'And again, Isaiah says:'
  - type: note
    content: Is. 11:1, 10
  - type: text
    content: “There shall be a root of Jesse;
  - type: text
    content: And He who shall rise to reign over the Gentiles,
  - type: text
    content: In Him the Gentiles shall hope.”
  '13':
  - type: text
    content: 'Now may the God of hope fill you with all '
  - type: note
    content: Rom. 12:12; 14:17
  - type: text
    content: joy and peace in believing, that you may abound in hope by the power of the Holy Spirit.
  - type: heading
    content: From Jerusalem to Illyricum
  '14':
  - type: text
    content: 'Now '
  - type: note
    content: 2 Pet. 1:12
  - type: text
    content: 'I myself am confident concerning you, my brethren, that you also are full of goodness, '
  - type: note
    content: 1 Cor. 1:5; 8:1, 7, 10
  - type: text
    content: 'filled with all knowledge, able also to admonish one another. '
  '15':
  - type: text
    content: 'Nevertheless, brethren, I have written more boldly to you on '
  - type: text
    content: some
  - type: text
    content: ' points, as reminding you, '
  - type: note
    content: Rom. 1:5; 12:3
  - type: text
    content: 'because of the grace given to me by God, '
  '16':
  - type: text
    content: 'that '
  - type: note
    content: Acts 9:15; Rom. 11:13
  - type: text
    content: 'I might be a minister of Jesus Christ to the Gentiles, ministering the gospel of God, that the '
  - type: note
    content: (Is. 66:20)
  - type: text
    content: 'offering of the Gentiles might be acceptable, sanctified by the Holy Spirit. '
  '17':
  - type: text
    content: 'Therefore I have reason to glory in Christ Jesus '
  - type: note
    content: Heb. 2:17; 5:1
  - type: text
    content: 'in the things '
  - type: text
    content: which
  - type: text
    content: ' '
  - type: text
    content: pertain
  - type: text
    content: ' to God. '
  '18':
  - type: text
    content: 'For I will not dare to speak of any of those things '
  - type: note
    content: Acts 15:12; 21:19; 2 Cor. 3:5; Gal. 2:8
  - type: text
    content: 'which Christ has not accomplished through me, in word and deed, '
  - type: note
    content: Rom. 1:5
  - type: text
    content: 'to make the Gentiles obedient— '
  '19':
  - type: note
    content: Acts 19:11
  - type: text
    content: 'in mighty signs and wonders, by the power of the Spirit of God, so that from Jerusalem and round about to Illyricum I have fully preached the gospel of Christ. '
  '2':
  - type: note
    content: 1 Cor. 9:22; 10:24, 33; 2 Cor. 13:9
  - type: text
    content: 'Let each of us please '
  - type: text
    content: his
  - type: text
    content: ' neighbor for '
  - type: text
    content: his
  - type: text
    content: ' good, leading to edification. '
  '20':
  - type: text
    content: 'And so I have made it my aim to preach the gospel, not where Christ was named, '
  - type: note
    content: 1 Cor. 3:10; (2 Cor. 10:13, 15, 16)
  - type: text
    content: 'lest I should build on another man’s foundation, '
  '21':
  - type: text
    content: 'but as it is written:'
  - type: note
    content: Is. 52:15
  - type: text
    content: “To whom He was not announced, they shall see;
  - type: text
    content: And those who have not heard shall understand.”
  - type: heading
    content: Plan to Visit Rome
  '22':
  - type: text
    content: 'For this reason '
  - type: note
    content: Rom. 1:13; 1 Thess. 2:17, 18
  - type: text
    content: 'I also have been much hindered from coming to you. '
  '23':
  - type: text
    content: 'But now no longer having a place in these parts, and '
  - type: note
    content: Acts 19:21; 23:11; Rom. 1:10, 11
  - type: text
    content: 'having a great desire these many years to come to you, '
  '24':
  - type: text
    content: 'whenever I journey to Spain, I shall come to you. For I hope to see you on my journey, '
  - type: note
    content: Acts 15:3
  - type: text
    content: 'and to be helped on my way there by you, if first I may '
  - type: note
    content: Rom. 1:12
  - type: text
    content: 'enjoy your '
  - type: text
    content: company
  - type: text
    content: ' for a while. '
  '25':
  - type: text
    content: 'But now '
  - type: note
    content: Acts 19:21
  - type: text
    content: 'I am going to Jerusalem to minister to the saints. '
  '26':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 16:1; 2 Cor. 8:1–15
  - type: text
    content: 'it pleased those from Macedonia and Achaia to make a certain contribution for the poor among the saints who are in Jerusalem. '
  '27':
  - type: text
    content: 'It pleased them indeed, and they are their debtors. For '
  - type: note
    content: Rom. 11:17
  - type: text
    content: 'if the Gentiles have been partakers of their spiritual things, '
  - type: note
    content: 1 Cor. 9:11
  - type: text
    content: 'their duty is also to minister to them in material things. '
  '28':
  - type: text
    content: 'Therefore, when I have performed this and have sealed to them '
  - type: note
    content: Phil. 4:17
  - type: text
    content: 'this fruit, I shall go by way of you to Spain. '
  '29':
  - type: note
    content: (Rom. 1:11)
  - type: text
    content: But I know that when I come to you, I shall come in the fullness of the blessing of the gospel of Christ.
  '3':
  - type: note
    content: Matt. 26:39; (Phil. 2:5–8)
  - type: text
    content: 'For even Christ did not please Himself; but as it is written, '
  - type: note
    content: Ps. 69:9
  - type: text
    content: '“The reproaches of those who reproached You fell on Me.” '
  '30':
  - type: text
    content: 'Now I beg you, brethren, through the Lord Jesus Christ, and '
  - type: note
    content: Phil. 2:1
  - type: text
    content: 'through the love of the Spirit, '
  - type: note
    content: 2 Cor. 1:11; Col. 4:12
  - type: text
    content: 'that you strive together with me in prayers to God for me, '
  '31':
  - type: note
    content: 2 Tim. 3:11; 4:17
  - type: text
    content: 'that I may be delivered from those in Judea who do not believe, and that '
  - type: note
    content: 2 Cor. 8:4
  - type: text
    content: 'my service for Jerusalem may be acceptable to the saints, '
  '32':
  - type: note
    content: Rom. 1:10
  - type: text
    content: 'that I may come to you with joy '
  - type: note
    content: Acts 18:21
  - type: text
    content: 'by the will of God, and may '
  - type: note
    content: 1 Cor. 16:18
  - type: text
    content: 'be refreshed together with you. '
  '33':
  - type: text
    content: 'Now '
  - type: note
    content: Rom. 16:20; 1 Cor. 14:33; 2 Cor. 13:11; Phil. 4:9; (1 Thess. 5:23); 2 Thess. 3:16; Heb. 13:20
  - type: text
    content: 'the God of peace '
  - type: text
    content: be
  - type: text
    content: ' with you all. Amen.'
  '4':
  - type: text
    content: 'For '
  - type: note
    content: Rom. 4:23, 24; 1 Cor. 10:11; 2 Tim. 3:16, 17
  - type: text
    content: 'whatever things were written before were written for our learning, that we through the patience and comfort of the Scriptures might have hope. '
  '5':
  - type: note
    content: 1 Cor. 1:10; Phil. 1:27
  - type: text
    content: 'Now may the God of patience and comfort grant you to be like-minded toward one another, according to Christ Jesus, '
  '6':
  - type: text
    content: 'that you may '
  - type: note
    content: Acts 4:24
  - type: text
    content: 'with one mind '
  - type: text
    content: and
  - type: text
    content: ' one mouth glorify the God and Father of our Lord Jesus Christ.'
  - type: heading
    content: Glorify God Together
  '7':
  - type: text
    content: 'Therefore '
  - type: note
    content: Rom. 14:1, 3
  - type: text
    content: 'receive one another, just '
  - type: note
    content: Rom. 5:2
  - type: text
    content: 'as Christ also received us, to the glory of God. '
  '8':
  - type: text
    content: 'Now I say that '
  - type: note
    content: Matt. 15:24; Acts 3:26
  - type: text
    content: 'Jesus Christ has become a servant to the circumcision for the truth of God, '
  - type: note
    content: (Rom. 4:16); 2 Cor. 1:20
  - type: text
    content: 'to confirm the promises '
  - type: text
    content: made
  - type: text
    content: ' to the fathers, '
  '9':
  - type: text
    content: 'and '
  - type: note
    content: John 10:16
  - type: text
    content: 'that the Gentiles might glorify God for '
  - type: text
    content: His
  - type: text
    content: ' mercy, as it is written:'
  - type: note
    content: 2 Sam. 22:50; Ps. 18:49
  - type: text
    content: “For this reason I will confess to You among the Gentiles,
  - type: text
    content: And sing to Your name.”
