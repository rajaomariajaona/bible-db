    text: 'Nevertheless, brethren, I have written more boldly to you on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' points, as reminding you, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:5; 12:3
    marker-yv: yv-n
  - type: text
    text: 'because of the grace given to me by God, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 9:15; Rom. 11:13
    marker-yv: yv-n
  - type: text
    text: 'I might be a minister of Jesus Christ to the Gentiles, ministering the gospel of God, that the '
