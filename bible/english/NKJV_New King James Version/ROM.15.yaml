  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 15:24; Acts 3:26
    marker-yv: yv-n
  - type: text
    text: 'Jesus Christ has become a servant to the circumcision for the truth of God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 4:16); 2 Cor. 1:20
    marker-yv: yv-n
  - type: text
    text: 'to confirm the promises '
  - type: usfm
    marker: it
    children:
    - type: text
      text: made
  - type: text
    text: ' to the fathers, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
