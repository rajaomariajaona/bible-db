    marker: x
    children:
    - type: text
      text: (Is. 66:20)
    marker-yv: yv-n
  - type: text
    text: 'offering of the Gentiles might be acceptable, sanctified by the Holy Spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Therefore I have reason to glory in Christ Jesus '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. 2:17; 5:1
    marker-yv: yv-n
  - type: text
    text: 'in the things '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pertain
  - type: text
    text: ' to God. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For I will not dare to speak of any of those things '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 15:12; 21:19; 2 Cor. 3:5; Gal. 2:8
    marker-yv: yv-n
  - type: text
    text: 'which Christ has not accomplished through me, in word and deed, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:5
    marker-yv: yv-n
  - type: text
    text: 'to make the Gentiles obedient— '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 19:11
    marker-yv: yv-n
  - type: text
    text: 'in mighty signs and wonders, by the power of the Spirit of God, so that from Jerusalem and round about to Illyricum I have fully preached the gospel of Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And so I have made it my aim to preach the gospel, not where Christ was named, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 3:10; (2 Cor. 10:13, 15, 16)
    marker-yv: yv-n
  - type: text
    text: 'lest I should build on another man’s foundation, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'but as it is written:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 52:15
    marker-yv: yv-n
  - type: text
    text: “To whom He was not announced, they shall see;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And those who have not heard shall understand.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Plan to Visit Rome
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For this reason '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:13; 1 Thess. 2:17, 18
    marker-yv: yv-n
  - type: text
    text: 'I also have been much hindered from coming to you. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But now no longer having a place in these parts, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 19:21; 23:11; Rom. 1:10, 11
    marker-yv: yv-n
  - type: text
    text: 'having a great desire these many years to come to you, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'whenever I journey to Spain, I shall come to you. For I hope to see you on my journey, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 15:3
    marker-yv: yv-n
  - type: text
    text: 'and to be helped on my way there by you, if first I may '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:12
    marker-yv: yv-n
  - type: text
    text: 'enjoy your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: company
  - type: text
    text: ' for a while. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 19:21
    marker-yv: yv-n
  - type: text
    text: 'I am going to Jerusalem to minister to the saints. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 16:1; 2 Cor. 8:1–15
    marker-yv: yv-n
  - type: text
    text: 'it pleased those from Macedonia and Achaia to make a certain contribution for the poor among the saints who are in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'It pleased them indeed, and they are their debtors. For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 11:17
    marker-yv: yv-n
  - type: text
    text: 'if the Gentiles have been partakers of their spiritual things, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 9:11
    marker-yv: yv-n
  - type: text
    text: 'their duty is also to minister to them in material things. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Therefore, when I have performed this and have sealed to them '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 4:17
    marker-yv: yv-n
  - type: text
    text: 'this fruit, I shall go by way of you to Spain. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 1:11)
    marker-yv: yv-n
  - type: text
    text: But I know that when I come to you, I shall come in the fullness of the blessing of the gospel of Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Now I beg you, brethren, through the Lord Jesus Christ, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 2:1
    marker-yv: yv-n
  - type: text
    text: 'through the love of the Spirit, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 1:11; Col. 4:12
    marker-yv: yv-n
  - type: text
    text: 'that you strive together with me in prayers to God for me, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Tim. 3:11; 4:17
    marker-yv: yv-n
  - type: text
    text: 'that I may be delivered from those in Judea who do not believe, and that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 8:4
    marker-yv: yv-n
  - type: text
    text: 'my service for Jerusalem may be acceptable to the saints, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:10
    marker-yv: yv-n
  - type: text
    text: 'that I may come to you with joy '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:21
    marker-yv: yv-n
  - type: text
    text: 'by the will of God, and may '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 16:18
    marker-yv: yv-n
  - type: text
    text: 'be refreshed together with you. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:20; 1 Cor. 14:33; 2 Cor. 13:11; Phil. 4:9; (1 Thess. 5:23); 2 Thess. 3:16; Heb. 13:20
    marker-yv: yv-n
  - type: text
    text: 'the God of peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' with you all. Amen.'
