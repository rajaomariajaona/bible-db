  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 22:50; Ps. 18:49
    marker-yv: yv-n
  - type: text
    text: “For this reason I will confess to You among the Gentiles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And sing to Your name.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
