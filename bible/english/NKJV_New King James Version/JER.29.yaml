type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah’s Letter to the Captives
  - type: text
    content: 'Now these '
  - type: text
    content: are
  - type: text
    content: ' the words of the letter that Jeremiah the prophet sent from Jerusalem to the remainder of the elders who were '
  - type: note
    content: Jer. 27:20
  - type: text
    content: 'carried away captive—to the priests, the prophets, and all the people whom Nebuchadnezzar had carried away captive from Jerusalem to Babylon. '
  '10':
  - type: text
    content: 'For thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': After '
  - type: note
    content: 2 Chr. 36:21–23; Ezra 1:1–4; Jer. 25:12; 27:22; Dan. 9:2; Zech. 7:5
  - type: text
    content: 'seventy years are completed at Babylon, I will visit you and perform My good word toward you, and cause you to '
  - type: note
    content: (Jer. 24:6, 7); Zeph. 2:7
  - type: text
    content: 'return to this place. '
  '11':
  - type: text
    content: 'For I know the thoughts that I think toward you, says the '
  - type: heading
    content: Lord
  - type: text
    content: ', thoughts of peace and not of evil, to give you a future and a hope. '
  '12':
  - type: text
    content: 'Then you will '
  - type: note
    content: Ps. 50:15; Jer. 33:3; Dan. 9:3
  - type: text
    content: 'call upon Me and go and pray to Me, and I will '
  - type: note
    content: Ps. 145:19
  - type: text
    content: 'listen to you. '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: Lev. 26:39–42; Deut. 30:1–3
  - type: text
    content: 'you will seek Me and find '
  - type: text
    content: Me,
  - type: text
    content: ' when you search for Me '
  - type: note
    content: 1 Chr. 22:19; 2 Chr. 22:9; Jer. 24:7
  - type: text
    content: 'with all your heart. '
  '14':
  - type: note
    content: (Deut. 4:7); Ps. 32:6; 46:1; (Is. 55:6, 7); Jer. 24:7
  - type: text
    content: 'I will be found by you, says the '
  - type: heading
    content: Lord
  - type: text
    content: ', and I will bring you back from your captivity; '
  - type: note
    content: Is. 43:5, 6; Jer. 23:8; 32:37
  - type: text
    content: 'I will gather you from all the nations and from all the places where I have driven you, says the '
  - type: heading
    content: Lord
  - type: text
    content: ', and I will bring you to the place from which I cause you to be carried away captive.'
  '15':
  - type: text
    content: 'Because you have said, “The '
  - type: heading
    content: Lord
  - type: text
    content: ' has raised up prophets for us in Babylon”— '
  '16':
  - type: note
    content: Jer. 38:2, 3, 17–23
  - type: text
    content: 'therefore thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' concerning the king who sits on the throne of David, concerning all the people who dwell in this city, and concerning your brethren who have not gone out with you into captivity— '
  '17':
  - type: text
    content: 'thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts: Behold, I will send on them the sword, the famine, and the pestilence, and will make them like '
  - type: note
    content: Jer. 24:3, 8–10
  - type: text
    content: 'rotten figs that cannot be eaten, they are so bad. '
  '18':
  - type: text
    content: 'And I will pursue them with the sword, with famine, and with pestilence; and I '
  - type: note
    content: Deut. 28:25; 2 Chr. 29:8; Jer. 15:4; 24:9; 34:17; Ezek. 12:15
  - type: text
    content: 'will deliver them to trouble among all the kingdoms of the earth—to be '
  - type: note
    content: Jer. 26:6; 42:18
  - type: text
    content: 'a curse, an astonishment, a hissing, and a reproach among all the nations where I have driven them, '
  '19':
  - type: text
    content: 'because they have not heeded My words, says the '
  - type: heading
    content: Lord
  - type: text
    content: ', which '
  - type: note
    content: Jer. 25:4; 26:5; 35:15
  - type: text
    content: 'I sent to them by My servants the prophets, rising up early and sending '
  - type: text
    content: them;
  - type: text
    content: ' neither would you heed, says the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '2':
  - type: text
    content: '(This happened after '
  - type: note
    content: 2 Kin. 24:12–16; 2 Chr. 36:9, 10; Jer. 22:24–28
  - type: text
    content: 'Jeconiah the king, the '
  - type: note
    content: 2 Kin. 24:12, 15; Jer. 13:18
  - type: text
    content: 'queen mother, the eunuchs, the princes of Judah and Jerusalem, the craftsmen, and the smiths had departed from Jerusalem.) '
  '20':
  - type: text
    content: 'Therefore hear the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', all you of the captivity, whom I have sent from Jerusalem to Babylon.'
  '21':
  - type: text
    content: 'Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel, concerning Ahab the son of Kolaiah, and Zedekiah the son of Maaseiah, who prophesy a '
  - type: note
    content: Jer. 14:14, 15; Lam. 2:14; 2 Pet. 2:1
  - type: text
    content: 'lie to you in My name: Behold, I will deliver them into the hand of Nebuchadnezzar king of Babylon, and he shall slay them before your eyes. '
  '22':
  - type: note
    content: Gen. 48:20; Is. 65:15
  - type: text
    content: 'And because of them a curse shall be taken up by all the captivity of Judah who '
  - type: text
    content: are
  - type: text
    content: ' in Babylon, saying, “The '
  - type: heading
    content: Lord
  - type: text
    content: ' make you like Zedekiah and Ahab, '
  - type: note
    content: Dan. 3:6, 21
  - type: text
    content: 'whom the king of Babylon roasted in the fire”; '
  '23':
  - type: text
    content: 'because '
  - type: note
    content: Jer. 23:14
  - type: text
    content: 'they have done disgraceful things in Israel, have committed adultery with their neighbors’ wives, and have spoken lying words in My name, which I have not commanded them. Indeed I '
  - type: note
    content: (Prov. 5:21; Jer. 16:17); Mal. 3:5; (Heb. 4:13)
  - type: text
    content: 'know, and '
  - type: text
    content: am
  - type: text
    content: ' a witness, says the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '24':
  - type: text
    content: 'You shall also speak to Shemaiah the Nehelamite, saying, '
  '25':
  - type: text
    content: 'Thus speaks the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel, saying: You have sent letters in your name to all the people who '
  - type: text
    content: are
  - type: text
    content: ' at Jerusalem, '
  - type: note
    content: 2 Kin. 25:18; Jer. 21:1
  - type: text
    content: 'to Zephaniah the son of Maaseiah the priest, and to all the priests, saying, '
  '26':
  - type: text
    content: '“The '
  - type: heading
    content: Lord
  - type: text
    content: ' has made you priest instead of Jehoiada the priest, so that there should be '
  - type: note
    content: Jer. 20:1
  - type: text
    content: 'officers '
  - type: text
    content: in
  - type: text
    content: ' the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' over every man '
  - type: text
    content: who
  - type: text
    content: ' is '
  - type: note
    content: 2 Kin. 9:11; Hos. 9:7; Mark 3:21; John 10:20; Acts 26:24; (2 Cor. 5:13)
  - type: text
    content: 'demented and considers himself a prophet, that you should '
  - type: note
    content: Jer. 20:1, 2; Acts 16:24
  - type: text
    content: 'put him in prison and in the stocks. '
  '27':
  - type: text
    content: 'Now therefore, why have you not rebuked Jeremiah of Anathoth who makes himself a prophet to you? '
  '28':
  - type: text
    content: 'For he has sent to us '
  - type: text
    content: in
  - type: text
    content: ' Babylon, saying, ‘This '
  - type: text
    content: captivity
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' long; build houses and dwell '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: text
    content: them,
  - type: text
    content: ' and plant gardens and eat their fruit.’ ”'
  '29':
  - type: text
    content: 'Now Zephaniah the priest read this letter in the hearing of Jeremiah the prophet. '
  '3':
  - type: text
    content: The
  - type: text
    content: ' '
  - type: text
    content: letter
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: text
    content: sent
  - type: text
    content: ' by the hand of Elasah the son of '
  - type: note
    content: 2 Chr. 34:8
  - type: text
    content: Shaphan, and Gemariah the son of Hilkiah, whom Zedekiah king of Judah sent to Babylon, to Nebuchadnezzar king of Babylon, saying,
  '30':
  - type: text
    content: 'Then the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to Jeremiah, saying: '
  '31':
  - type: text
    content: 'Send to all those in captivity, saying, Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' concerning Shemaiah the Nehelamite: Because Shemaiah has prophesied to you, '
  - type: note
    content: Jer. 28:15
  - type: text
    content: 'and I have not sent him, and he has caused you to trust in a '
  - type: note
    content: Ezek. 13:8–16, 22, 23
  - type: text
    content: 'lie— '
  '32':
  - type: text
    content: 'therefore thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': Behold, I will punish Shemaiah the Nehelamite and his family: he shall not have anyone to dwell among this people, nor shall he see the good that I will do for My people, says the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Jer. 28:16
  - type: text
    content: 'because he has taught rebellion against the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: 'Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel, to all who were carried away captive, whom I have caused to be carried away from Jerusalem to Babylon:'
  '5':
  - type: text
    content: 'Build houses and dwell '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: text
    content: them;
  - type: text
    content: ' plant gardens and eat their fruit. '
  '6':
  - type: text
    content: 'Take wives and beget sons and daughters; and take wives for your sons and give your daughters to husbands, so that they may bear sons and daughters—that you may be increased there, and not diminished. '
  '7':
  - type: text
    content: 'And seek the peace of the city where I have caused you to be carried away captive, '
  - type: note
    content: Ezra 6:10; Neh. 1:4–11; Dan. 9:16; 1 Tim. 2:2
  - type: text
    content: 'and pray to the '
  - type: heading
    content: Lord
  - type: text
    content: ' for it; for in its peace you will have peace. '
  '8':
  - type: text
    content: 'For thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: Do not let your prophets and your diviners who are in your midst '
  - type: note
    content: Jer. 14:14; 23:21; 27:14, 15; Eph. 5:6
  - type: text
    content: 'deceive you, nor listen to your dreams which you cause to be dreamed. '
  '9':
  - type: text
    content: 'For they prophesy '
  - type: note
    content: Jer. 28:15; 37:19
  - type: text
    content: 'falsely to you in My name; I have not sent them, says the '
  - type: heading
    content: Lord
  - type: text
    content: .
