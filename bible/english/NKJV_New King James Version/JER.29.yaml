      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, the God of Israel, to all who were carried away captive, whom I have caused to be carried away from Jerusalem to Babylon:'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Build houses and dwell '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them;
    - type: text
      text: ' plant gardens and eat their fruit. '
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Take wives and beget sons and daughters; and take wives for your sons and give your daughters to husbands, so that they may bear sons and daughters—that you may be increased there, and not diminished. '
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And seek the peace of the city where I have caused you to be carried away captive, '
    - type: usfm
