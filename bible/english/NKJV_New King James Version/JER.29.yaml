      children:
      - type: text
        text: 2 Chr. 34:8
      marker-yv: yv-n
    - type: text
      text: Shaphan, and Gemariah the son of Hilkiah, whom Zedekiah king of Judah sent to Babylon, to Nebuchadnezzar king of Babylon, saying,
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Jeremiah, saying: '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Send to all those in captivity, saying, Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
