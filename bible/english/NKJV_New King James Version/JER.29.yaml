verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah’s Letter to the Captives
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the words of the letter that Jeremiah the prophet sent from Jerusalem to the remainder of the elders who were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 27:20
      marker-yv: yv-n
    - type: text
      text: 'carried away captive—to the priests, the prophets, and all the people whom Nebuchadnezzar had carried away captive from Jerusalem to Babylon. '
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': After '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 36:21–23; Ezra 1:1–4; Jer. 25:12; 27:22; Dan. 9:2; Zech. 7:5
      marker-yv: yv-n
    - type: text
      text: 'seventy years are completed at Babylon, I will visit you and perform My good word toward you, and cause you to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Jer. 24:6, 7); Zeph. 2:7
      marker-yv: yv-n
    - type: text
      text: 'return to this place. '
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I know the thoughts that I think toward you, says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', thoughts of peace and not of evil, to give you a future and a hope. '
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then you will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 50:15; Jer. 33:3; Dan. 9:3
      marker-yv: yv-n
    - type: text
      text: 'call upon Me and go and pray to Me, and I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 145:19
      marker-yv: yv-n
    - type: text
      text: 'listen to you. '
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:39–42; Deut. 30:1–3
      marker-yv: yv-n
    - type: text
      text: 'you will seek Me and find '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Me,
    - type: text
      text: ' when you search for Me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 22:19; 2 Chr. 22:9; Jer. 24:7
      marker-yv: yv-n
    - type: text
      text: 'with all your heart. '
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 4:7); Ps. 32:6; 46:1; (Is. 55:6, 7); Jer. 24:7
      marker-yv: yv-n
    - type: text
      text: 'I will be found by you, says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and I will bring you back from your captivity; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 43:5, 6; Jer. 23:8; 32:37
      marker-yv: yv-n
    - type: text
      text: 'I will gather you from all the nations and from all the places where I have driven you, says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and I will bring you to the place from which I cause you to be carried away captive.'
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because you have said, “The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has raised up prophets for us in Babylon”— '
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 38:2, 3, 17–23
      marker-yv: yv-n
    - type: text
      text: 'therefore thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' concerning the king who sits on the throne of David, concerning all the people who dwell in this city, and concerning your brethren who have not gone out with you into captivity— '
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts: Behold, I will send on them the sword, the famine, and the pestilence, and will make them like '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 24:3, 8–10
      marker-yv: yv-n
    - type: text
      text: 'rotten figs that cannot be eaten, they are so bad. '
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And I will pursue them with the sword, with famine, and with pestilence; and I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:25; 2 Chr. 29:8; Jer. 15:4; 24:9; 34:17; Ezek. 12:15
      marker-yv: yv-n
    - type: text
      text: 'will deliver them to trouble among all the kingdoms of the earth—to be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 26:6; 42:18
      marker-yv: yv-n
    - type: text
      text: 'a curse, an astonishment, a hissing, and a reproach among all the nations where I have driven them, '
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because they have not heeded My words, says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', which '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 25:4; 26:5; 35:15
      marker-yv: yv-n
    - type: text
      text: 'I sent to them by My servants the prophets, rising up early and sending '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them;
    - type: text
      text: ' neither would you heed, says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(This happened after '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:12–16; 2 Chr. 36:9, 10; Jer. 22:24–28
      marker-yv: yv-n
    - type: text
      text: 'Jeconiah the king, the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:12, 15; Jer. 13:18
      marker-yv: yv-n
    - type: text
      text: 'queen mother, the eunuchs, the princes of Judah and Jerusalem, the craftsmen, and the smiths had departed from Jerusalem.) '
  '20':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Therefore hear the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all you of the captivity, whom I have sent from Jerusalem to Babylon.'
  '21':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, the God of Israel, concerning Ahab the son of Kolaiah, and Zedekiah the son of Maaseiah, who prophesy a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 14:14, 15; Lam. 2:14; 2 Pet. 2:1
      marker-yv: yv-n
    - type: text
      text: 'lie to you in My name: Behold, I will deliver them into the hand of Nebuchadnezzar king of Babylon, and he shall slay them before your eyes. '
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 48:20; Is. 65:15
      marker-yv: yv-n
    - type: text
      text: 'And because of them a curse shall be taken up by all the captivity of Judah who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in Babylon, saying, “The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' make you like Zedekiah and Ahab, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 3:6, 21
      marker-yv: yv-n
    - type: text
      text: 'whom the king of Babylon roasted in the fire”; '
  '23':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 23:14
      marker-yv: yv-n
    - type: text
      text: 'they have done disgraceful things in Israel, have committed adultery with their neighbors’ wives, and have spoken lying words in My name, which I have not commanded them. Indeed I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 5:21; Jer. 16:17); Mal. 3:5; (Heb. 4:13)
      marker-yv: yv-n
    - type: text
      text: 'know, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' a witness, says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '24':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You shall also speak to Shemaiah the Nehelamite, saying, '
  '25':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thus speaks the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, the God of Israel, saying: You have sent letters in your name to all the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' at Jerusalem, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:18; Jer. 21:1
      marker-yv: yv-n
    - type: text
      text: 'to Zephaniah the son of Maaseiah the priest, and to all the priests, saying, '
  '26':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has made you priest instead of Jehoiada the priest, so that there should be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 20:1
      marker-yv: yv-n
    - type: text
      text: 'officers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' over every man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 9:11; Hos. 9:7; Mark 3:21; John 10:20; Acts 26:24; (2 Cor. 5:13)
      marker-yv: yv-n
    - type: text
      text: 'demented and considers himself a prophet, that you should '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 20:1, 2; Acts 16:24
      marker-yv: yv-n
    - type: text
      text: 'put him in prison and in the stocks. '
  '27':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Now therefore, why have you not rebuked Jeremiah of Anathoth who makes himself a prophet to you? '
  '28':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For he has sent to us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' Babylon, saying, ‘This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: captivity
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' long; build houses and dwell '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
    - type: text
      text: ' and plant gardens and eat their fruit.’ ”'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Zephaniah the priest read this letter in the hearing of Jeremiah the prophet. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
