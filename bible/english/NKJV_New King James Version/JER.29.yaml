      - type: text
        text: Ezra 6:10; Neh. 1:4–11; Dan. 9:16; 1 Tim. 2:2
      marker-yv: yv-n
    - type: text
      text: 'and pray to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for it; for in its peace you will have peace. '
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, the God of Israel: Do not let your prophets and your diviners who are in your midst '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 14:14; 23:21; 27:14, 15; Eph. 5:6
      marker-yv: yv-n
    - type: text
      text: 'deceive you, nor listen to your dreams which you cause to be dreamed. '
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For they prophesy '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 28:15; 37:19
      marker-yv: yv-n
    - type: text
