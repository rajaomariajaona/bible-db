      - type: text
        text: Lord
    - type: text
      text: ': Behold, I will punish Shemaiah the Nehelamite and his family: he shall not have anyone to dwell among this people, nor shall he see the good that I will do for My people, says the '
    - type: usfm
      marker: sc
      children:
      - type: text
