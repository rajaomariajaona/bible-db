document_id: 1TH.3,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Concern for Their Faith
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Therefore, when we could no longer endure it, we thought it good to be left in Athens alone, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'night and day praying exceedingly that we may see your face '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 13:9; Col. 4:12
      marker-yv: yv-n
    - type: text
      text: and perfect what is lacking in your faith?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prayer for the Church
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now may our God and Father Himself, and our Lord Jesus Christ, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 1:3
      marker-yv: yv-n
    - type: text
      text: 'direct our way to you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And may the Lord make you increase and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 1:9; 1 Thess. 4:1, 10; 2 Thess. 1:3
      marker-yv: yv-n
    - type: text
      text: 'abound in love to one another and to all, just as we '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do
    - type: text
      text: ' to you, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'so that He may establish '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Thess. 2:17
      marker-yv: yv-n
    - type: text
      text: your hearts blameless in holiness before our God and Father at the coming of our Lord Jesus Christ with all His saints.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and sent '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 16:21
      marker-yv: yv-n
    - type: text
      text: 'Timothy, our brother and minister of God, and our fellow laborer in the gospel of Christ, to establish you and encourage you concerning your faith, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 3:13
      marker-yv: yv-n
    - type: text
      text: 'that no one should be shaken by these afflictions; for you yourselves know that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 16:2; Acts 9:16; 14:22; 1 Cor. 4:9; 2 Tim. 3:12; 1 Pet. 2:21
      marker-yv: yv-n
    - type: text
      text: 'we are appointed to this. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:24
      marker-yv: yv-n
    - type: text
      text: 'For, in fact, we told you before when we were with you that we would suffer tribulation, just as it happened, and you know. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For this reason, when I could no longer endure it, I sent to know your faith, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 7:5
      marker-yv: yv-n
    - type: text
      text: 'lest by some means the tempter had tempted you, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 2:2
      marker-yv: yv-n
    - type: text
      text: our labor might be in vain.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Encouraged by Timothy
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:5
      marker-yv: yv-n
    - type: text
      text: 'But now that Timothy has come to us from you, and brought us good news of your faith and love, and that you always have good remembrance of us, greatly desiring to see us, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 1:8
      marker-yv: yv-n
    - type: text
      text: 'as we also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: see
    - type: text
      text: ' you— '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'therefore, brethren, in all our affliction and distress '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 1:4
      marker-yv: yv-n
    - type: text
      text: 'we were comforted concerning you by your faith. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For now we live, if you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eph. 6:13, 14); Phil. 4:1
      marker-yv: yv-n
    - type: text
      text: stand fast in the Lord.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For what thanks can we render to God for you, for all the joy with which we rejoice for your sake before our God, '
