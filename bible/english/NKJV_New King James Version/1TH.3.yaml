document_id: 1TH.3,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Concern for Their Faith
  - type: text
    content: 'Therefore, when we could no longer endure it, we thought it good to be left in Athens alone, '
  '10':
  - type: text
    content: 'night and day praying exceedingly that we may see your face '
  - type: note
    content: 2 Cor. 13:9; Col. 4:12
  - type: text
    content: and perfect what is lacking in your faith?
  - type: heading
    content: Prayer for the Church
  '11':
  - type: text
    content: 'Now may our God and Father Himself, and our Lord Jesus Christ, '
  - type: note
    content: Mark 1:3
  - type: text
    content: 'direct our way to you. '
  '12':
  - type: text
    content: 'And may the Lord make you increase and '
  - type: note
    content: Phil. 1:9; 1 Thess. 4:1, 10; 2 Thess. 1:3
  - type: text
    content: 'abound in love to one another and to all, just as we '
  - type: text
    content: do
  - type: text
    content: ' to you, '
  '13':
  - type: text
    content: 'so that He may establish '
  - type: note
    content: 2 Thess. 2:17
  - type: text
    content: your hearts blameless in holiness before our God and Father at the coming of our Lord Jesus Christ with all His saints.
  '2':
  - type: text
    content: 'and sent '
  - type: note
    content: Rom. 16:21
  - type: text
    content: 'Timothy, our brother and minister of God, and our fellow laborer in the gospel of Christ, to establish you and encourage you concerning your faith, '
  '3':
  - type: note
    content: Eph. 3:13
  - type: text
    content: 'that no one should be shaken by these afflictions; for you yourselves know that '
  - type: note
    content: John 16:2; Acts 9:16; 14:22; 1 Cor. 4:9; 2 Tim. 3:12; 1 Pet. 2:21
  - type: text
    content: 'we are appointed to this. '
  '4':
  - type: note
    content: Acts 20:24
  - type: text
    content: 'For, in fact, we told you before when we were with you that we would suffer tribulation, just as it happened, and you know. '
  '5':
  - type: text
    content: 'For this reason, when I could no longer endure it, I sent to know your faith, '
  - type: note
    content: 1 Cor. 7:5
  - type: text
    content: 'lest by some means the tempter had tempted you, and '
  - type: note
    content: Gal. 2:2
  - type: text
    content: our labor might be in vain.
  - type: heading
    content: Encouraged by Timothy
  '6':
  - type: note
    content: Acts 18:5
  - type: text
    content: 'But now that Timothy has come to us from you, and brought us good news of your faith and love, and that you always have good remembrance of us, greatly desiring to see us, '
  - type: note
    content: Phil. 1:8
  - type: text
    content: 'as we also '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: see
  - type: text
    content: ' you— '
  '7':
  - type: text
    content: 'therefore, brethren, in all our affliction and distress '
  - type: note
    content: 2 Cor. 1:4
  - type: text
    content: 'we were comforted concerning you by your faith. '
  '8':
  - type: text
    content: 'For now we live, if you '
  - type: note
    content: (Eph. 6:13, 14); Phil. 4:1
  - type: text
    content: stand fast in the Lord.
  '9':
  - type: text
    content: 'For what thanks can we render to God for you, for all the joy with which we rejoice for your sake before our God, '
