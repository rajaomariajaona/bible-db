document_id: JOB.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job Trusts in His Redeemer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Job answered and said:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “How long will you torment my soul,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And break me in pieces with words?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: These ten times you have reproached me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'You are not ashamed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' you have wronged me.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And if indeed I have erred,
- type: usfm
  marker: q2
  children:
  - type: text
    text: My error remains with me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'If indeed you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 35:26; 38:16; 55:12, 13
    marker-yv: yv-n
  - type: text
    text: 'exalt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: yourselves
  - type: text
    text: ' against me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And plead my disgrace against me,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Know then that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 16:11
    marker-yv: yv-n
  - type: text
    text: God has wronged me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And has surrounded me with His net.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “If I cry out concerning wrong, I am not heard.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'If I cry aloud, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' no justice.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 3:23; Ps. 88:8; Lam. 3:7, 9
    marker-yv: yv-n
  - type: text
    text: He has fenced up my way, so that I cannot pass;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And He has set darkness in my paths.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 12:17, 19; Ps. 89:44
    marker-yv: yv-n
  - type: text
    text: He has stripped me of my glory,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And taken the crown '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from
  - type: text
    text: ' my head.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He breaks me down on every side,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I am gone;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'My '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 17:14–16
    marker-yv: yv-n
  - type: text
    text: hope He has uprooted like a tree.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He has also kindled His wrath against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 13:24; 33:10
    marker-yv: yv-n
  - type: text
    text: 'He counts me as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' His enemies.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: His troops come together
- type: usfm
  marker: q2
  children:
  - type: text
    text: And build up their road against me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They encamp all around my tent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “He
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 16:20; Ps. 31:11; 38:11; 69:8; 88:8, 18
    marker-yv: yv-n
  - type: text
    text: ' has removed my brothers far from me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my acquaintances are completely estranged from me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: My relatives have failed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my close friends have forgotten me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Those who dwell in my house, and my maidservants,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Count me as a stranger;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am an alien in their sight.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I call my servant, but he gives no answer;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I beg him with my mouth.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: My breath is offensive to my wife,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I am repulsive to the children of my own body.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Even '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 2:23; Job 17:6
    marker-yv: yv-n
  - type: text
    text: young children despise me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I arise, and they speak against me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 38:11; 55:12, 13
    marker-yv: yv-n
  - type: text
    text: All my close friends abhor me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And those whom I love have turned against me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 16:8; 33:21; Ps. 102:5; Lam. 4:8
    marker-yv: yv-n
  - type: text
    text: My bone clings to my skin and to my flesh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I have escaped by the skin of my teeth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Have pity on me, have pity on me, O you my friends,
- type: usfm
  marker: q2
  children:
  - type: text
    text: For the hand of God has struck me!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Why do you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 13:24, 25; 16:11; 19:6; Ps. 69:26
    marker-yv: yv-n
  - type: text
    text: 'persecute me as God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: does,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And are not satisfied with my flesh?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Oh, that my words were written!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh, that they were inscribed in a book!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: That they were engraved on a rock
- type: usfm
  marker: q2
  children:
  - type: text
    text: With an iron pen and lead, forever!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For I know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' my Redeemer lives,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And He shall stand at last on the earth;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And after my skin is destroyed, this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: know,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 17:15); Matt. 5:8; 1 Cor. 13:12; (1 John 3:2)
    marker-yv: yv-n
  - type: text
    text: in my flesh I shall see God,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Whom I shall see for myself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my eyes shall behold, and not another.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: How
  - type: text
    text: ' my heart yearns within me!'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: If you should say, ‘How shall we persecute him?’—
- type: usfm
  marker: q2
  children:
  - type: text
    text: Since the root of the matter is found in me,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Be afraid of the sword for yourselves;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: brings
  - type: text
    text: ' the punishment of the sword,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That you may know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a judgment.”'
