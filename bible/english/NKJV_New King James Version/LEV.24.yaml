document_id: LEV.24,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Care of the Tabernacle Lamps
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the son of an Israelite woman, whose father was an Egyptian, went out among the children of Israel; and this Israelite woman’s son and a man of Israel fought each other in the camp. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Israelite woman’s son '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:28
      marker-yv: yv-n
    - type: text
      text: 'blasphemed the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:5, 11, 22; Is. 8:21
      marker-yv: yv-n
    - type: text
      text: 'cursed; and so they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 18:22, 26
      marker-yv: yv-n
    - type: text
      text: 'brought him to Moses. (His mother’s name was Shelomith the daughter of Dibri, of the tribe of Dan.) '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 15:34
      marker-yv: yv-n
    - type: text
      text: 'put him in custody, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 27:5
      marker-yv: yv-n
    - type: text
      text: 'that the mind of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' might be shown to them.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take outside the camp him who has cursed; then let all who heard him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 13:9; 17:7
      marker-yv: yv-n
    - type: text
      text: lay their hands on his head, and let all the congregation stone him.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then you shall speak to the children of Israel, saying: ‘Whoever curses his God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 20:17; Num. 9:13
      marker-yv: yv-n
    - type: text
      text: 'shall bear his sin. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And whoever '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:7; 1 Kin. 21:10, 13; (Matt. 12:31; Mark 3:28, 29)
      marker-yv: yv-n
    - type: text
      text: 'blasphemes the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shall surely be put to death. All the congregation shall certainly stone him, the stranger as well as him who is born in the land. When he blasphemes the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', he shall be put to death.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:6; Ex. 21:12; Num. 35:30, 31; Deut. 19:11, 12; 27:24
      marker-yv: yv-n
    - type: text
      text: '‘Whoever kills any man shall surely be put to death. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 24:21
      marker-yv: yv-n
    - type: text
      text: Whoever kills an animal shall make it good, animal for animal.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘If a man causes disfigurement of his neighbor, as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 21:24
      marker-yv: yv-n
    - type: text
      text: 'he has done, so shall it be done to him— '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 27:20, 21
      marker-yv: yv-n
    - type: text
      text: '“Command the children of Israel that they bring to you pure oil of pressed olives for the light, to make the lamps burn continually. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fracture for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 21:23; Deut. 19:21
      marker-yv: yv-n
    - type: text
      text: 'fracture, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 5:38, 39)
      marker-yv: yv-n
    - type: text
      text: 'eye for eye, tooth for tooth; as he has caused disfigurement of a man, so shall it be done to him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And whoever kills an animal shall restore it; but whoever kills a man shall be put to death. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:49; Lev. 19:33–37; Num. 9:14; 15:15, 16, 29
      marker-yv: yv-n
    - type: text
      text: 'the same law for the stranger and for one from your own country; for I am the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.’ ”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses spoke to the children of Israel; and they took outside the camp him who had cursed, and stoned him with stones. So the children of Israel did as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Outside the veil of the Testimony, in the tabernacle of meeting, Aaron shall be in charge of it from evening until morning before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' continually; it shall be a statute forever in your generations. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He shall be in charge of the lamps on '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:31; 31:8; 37:17
      marker-yv: yv-n
    - type: text
      text: 'the pure gold lampstand before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' continually.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Bread of the Tabernacle
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And you shall take fine flour and bake twelve '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:30; 39:36; 40:23
      marker-yv: yv-n
    - type: text
      text: 'cakes with it. Two-tenths of an ephah shall be in each cake. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall set them in two rows, six in a row, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:23, 24; 1 Kin. 7:48; 2 Chr. 4:19; 13:11; Heb. 9:2
      marker-yv: yv-n
    - type: text
      text: 'on the pure gold table before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall put pure frankincense on each row, that it may be on the bread for a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:2, 9, 16
      marker-yv: yv-n
    - type: text
      text: 'memorial, an offering made by fire to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 4:7; 1 Chr. 9:32; 2 Chr. 2:4; Matt. 12:4, 5
      marker-yv: yv-n
    - type: text
      text: 'Every Sabbath he shall set it in order before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' continually, being taken from the children of Israel by an everlasting covenant. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 21:6; Matt. 12:4; Mark 2:26; Luke 6:4
      marker-yv: yv-n
    - type: text
      text: 'it shall be for Aaron and his sons, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:33; Lev. 8:31
      marker-yv: yv-n
    - type: text
      text: 'and they shall eat it in a holy place; for it is most holy to him from the offerings of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made by fire, by a perpetual statute.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Penalty for Blasphemy
    marker-yv: yv-h
