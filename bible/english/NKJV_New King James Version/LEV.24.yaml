document_id: LEV.24,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Care of the Tabernacle Lamps
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '10':
  - type: text
    content: 'Now the son of an Israelite woman, whose father was an Egyptian, went out among the children of Israel; and this Israelite woman’s son and a man of Israel fought each other in the camp. '
  '11':
  - type: text
    content: 'And the Israelite woman’s son '
  - type: note
    content: Ex. 22:28
  - type: text
    content: 'blasphemed the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and '
  - type: note
    content: Job 1:5, 11, 22; Is. 8:21
  - type: text
    content: 'cursed; and so they '
  - type: note
    content: Ex. 18:22, 26
  - type: text
    content: 'brought him to Moses. (His mother’s name was Shelomith the daughter of Dibri, of the tribe of Dan.) '
  '12':
  - type: text
    content: 'Then they '
  - type: note
    content: Num. 15:34
  - type: text
    content: 'put him in custody, '
  - type: note
    content: Num. 27:5
  - type: text
    content: 'that the mind of the '
  - type: heading
    content: Lord
  - type: text
    content: ' might be shown to them.'
  '13':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '14':
  - type: text
    content: '“Take outside the camp him who has cursed; then let all who heard him '
  - type: note
    content: Deut. 13:9; 17:7
  - type: text
    content: lay their hands on his head, and let all the congregation stone him.
  '15':
  - type: text
    content: '“Then you shall speak to the children of Israel, saying: ‘Whoever curses his God '
  - type: note
    content: Lev. 20:17; Num. 9:13
  - type: text
    content: 'shall bear his sin. '
  '16':
  - type: text
    content: 'And whoever '
  - type: note
    content: Ex. 20:7; 1 Kin. 21:10, 13; (Matt. 12:31; Mark 3:28, 29)
  - type: text
    content: 'blasphemes the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' shall surely be put to death. All the congregation shall certainly stone him, the stranger as well as him who is born in the land. When he blasphemes the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ', he shall be put to death.'
  '17':
  - type: note
    content: Gen. 9:6; Ex. 21:12; Num. 35:30, 31; Deut. 19:11, 12; 27:24
  - type: text
    content: '‘Whoever kills any man shall surely be put to death. '
  '18':
  - type: note
    content: Lev. 24:21
  - type: text
    content: Whoever kills an animal shall make it good, animal for animal.
  '19':
  - type: text
    content: '‘If a man causes disfigurement of his neighbor, as '
  - type: note
    content: Ex. 21:24
  - type: text
    content: 'he has done, so shall it be done to him— '
  '2':
  - type: note
    content: Ex. 27:20, 21
  - type: text
    content: '“Command the children of Israel that they bring to you pure oil of pressed olives for the light, to make the lamps burn continually. '
  '20':
  - type: text
    content: 'fracture for '
  - type: note
    content: Ex. 21:23; Deut. 19:21
  - type: text
    content: 'fracture, '
  - type: note
    content: (Matt. 5:38, 39)
  - type: text
    content: 'eye for eye, tooth for tooth; as he has caused disfigurement of a man, so shall it be done to him. '
  '21':
  - type: text
    content: 'And whoever kills an animal shall restore it; but whoever kills a man shall be put to death. '
  '22':
  - type: text
    content: 'You shall have '
  - type: note
    content: Ex. 12:49; Lev. 19:33–37; Num. 9:14; 15:15, 16, 29
  - type: text
    content: 'the same law for the stranger and for one from your own country; for I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.’ ”'
  '23':
  - type: text
    content: 'Then Moses spoke to the children of Israel; and they took outside the camp him who had cursed, and stoned him with stones. So the children of Israel did as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '3':
  - type: text
    content: 'Outside the veil of the Testimony, in the tabernacle of meeting, Aaron shall be in charge of it from evening until morning before the '
  - type: heading
    content: Lord
  - type: text
    content: ' continually; it shall be a statute forever in your generations. '
  '4':
  - type: text
    content: 'He shall be in charge of the lamps on '
  - type: note
    content: Ex. 25:31; 31:8; 37:17
  - type: text
    content: 'the pure gold lampstand before the '
  - type: heading
    content: Lord
  - type: text
    content: ' continually.'
  - type: heading
    content: The Bread of the Tabernacle
  '5':
  - type: text
    content: '“And you shall take fine flour and bake twelve '
  - type: note
    content: Ex. 25:30; 39:36; 40:23
  - type: text
    content: 'cakes with it. Two-tenths of an ephah shall be in each cake. '
  '6':
  - type: text
    content: 'You shall set them in two rows, six in a row, '
  - type: note
    content: Ex. 25:23, 24; 1 Kin. 7:48; 2 Chr. 4:19; 13:11; Heb. 9:2
  - type: text
    content: 'on the pure gold table before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'And you shall put pure frankincense on each row, that it may be on the bread for a '
  - type: note
    content: Lev. 2:2, 9, 16
  - type: text
    content: 'memorial, an offering made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: note
    content: Num. 4:7; 1 Chr. 9:32; 2 Chr. 2:4; Matt. 12:4, 5
  - type: text
    content: 'Every Sabbath he shall set it in order before the '
  - type: heading
    content: Lord
  - type: text
    content: ' continually, being taken from the children of Israel by an everlasting covenant. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: 1 Sam. 21:6; Matt. 12:4; Mark 2:26; Luke 6:4
  - type: text
    content: 'it shall be for Aaron and his sons, '
  - type: note
    content: Ex. 29:33; Lev. 8:31
  - type: text
    content: 'and they shall eat it in a holy place; for it is most holy to him from the offerings of the '
  - type: heading
    content: Lord
  - type: text
    content: ' made by fire, by a perpetual statute.”'
  - type: heading
    content: The Penalty for Blasphemy
