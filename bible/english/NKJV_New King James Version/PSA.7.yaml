document_id: PSA.7,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prayer and Praise for Deliverance from Enemies
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hab. 3:1
      marker-yv: yv-n
    - type: text
      text: 'Meditation of David, which he sang to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 16
      marker-yv: yv-n
    - type: text
      text: concerning the words of Cush, a Benjamite.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, in You I put my trust;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 31:15
      marker-yv: yv-n
    - type: text
      text: Save me from all those who persecute me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And deliver me,
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'My defense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' of God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who saves the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 97:10, 11; 125:4
      marker-yv: yv-n
    - type: text
      text: upright in heart.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a just judge,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And God is angry '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wicked
    - type: text
      text: ' every day.'
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: If he does not turn back,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:41
      marker-yv: yv-n
    - type: text
      text: sharpen His sword;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He bends His bow and makes it ready.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: He also prepares for Himself instruments of death;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He makes His arrows into fiery shafts.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 15:35; Is. 59:4; (James 1:15)
      marker-yv: yv-n
    - type: text
      text: 'Behold, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wicked
    - type: text
      text: ' brings forth iniquity;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, he conceives trouble and brings forth falsehood.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: He made a pit and dug it out,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 4:8); Ps. 57:6
      marker-yv: yv-n
    - type: text
      text: 'And has fallen into the ditch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' he made.'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 9:25; Ps. 140:9
      marker-yv: yv-n
    - type: text
      text: His trouble shall return upon his own head,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his violent dealing shall come down on his own crown.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'I will praise the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' according to His righteousness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And will sing praise to the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Most High.'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 57:4; Is. 38:13
      marker-yv: yv-n
    - type: text
      text: Lest they tear me like a lion,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 50:22
      marker-yv: yv-n
    - type: text
      text: 'Rending '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' in pieces, while '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' none to deliver.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 16:7
      marker-yv: yv-n
    - type: text
      text: 'if I have done this:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If there is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 24:11
      marker-yv: yv-n
    - type: text
      text: iniquity in my hands,
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: If I have repaid evil to him who was at peace with me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 24:7; 26:9
      marker-yv: yv-n
    - type: text
      text: have plundered my enemy without cause,
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Let the enemy pursue me and overtake '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, let him trample my life to the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And lay my honor in the dust.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Arise, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', in Your anger;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 94:2
      marker-yv: yv-n
    - type: text
      text: Lift Yourself up because of the rage of my enemies;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 35:23; 44:23
      marker-yv: yv-n
    - type: text
      text: 'Rise up for me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' the judgment You have commanded!'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: So the congregation of the peoples shall surround You;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For their sakes, therefore, return on high.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shall judge the peoples;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 26:1; 35:24; 43:1
      marker-yv: yv-n
    - type: text
      text: 'Judge me, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 18:20; 35:24
      marker-yv: yv-n
    - type: text
      text: according to my righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And according to my integrity within me.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Oh, let the wickedness of the wicked come to an end,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But establish the just;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Sam. 16:7)
      marker-yv: yv-n
    - type: text
      text: For the righteous God tests the hearts and minds.
