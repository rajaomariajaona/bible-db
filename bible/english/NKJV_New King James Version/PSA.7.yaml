  - type: heading
    content: Prayer and Praise for Deliverance from Enemies
  - type: text
    content: 'A '
  - type: note
    content: Hab. 3:1
  - type: text
    content: 'Meditation of David, which he sang to the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 2 Sam. 16
  - type: text
    content: concerning the words of Cush, a Benjamite.
  - type: text
    content: 'O '
  - type: heading
    content: Lord
  - type: text
    content: ' my God, in You I put my trust;'
  - type: note
    content: Ps. 31:15
  - type: text
    content: Save me from all those who persecute me;
  - type: text
    content: And deliver me,
  '10':
  - type: text
    content: 'My defense '
  - type: text
    content: is
  - type: text
    content: ' of God,'
  - type: text
    content: 'Who saves the '
  - type: note
    content: Ps. 97:10, 11; 125:4
  - type: text
    content: upright in heart.
  '11':
  - type: text
    content: 'God '
  - type: text
    content: is
  - type: text
    content: ' a just judge,'
  - type: text
    content: 'And God is angry '
  - type: text
    content: with
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: wicked
  - type: text
    content: ' every day.'
  '12':
  - type: text
    content: If he does not turn back,
  - type: text
    content: 'He will '
  - type: note
    content: Deut. 32:41
  - type: text
    content: sharpen His sword;
  - type: text
    content: He bends His bow and makes it ready.
  '13':
  - type: text
    content: He also prepares for Himself instruments of death;
  - type: text
    content: He makes His arrows into fiery shafts.
  '14':
  - type: note
    content: Job 15:35; Is. 59:4; (James 1:15)
  - type: text
    content: 'Behold, '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: wicked
  - type: text
    content: ' brings forth iniquity;'
  - type: text
    content: Yes, he conceives trouble and brings forth falsehood.
  '15':
  - type: text
    content: He made a pit and dug it out,
  - type: note
    content: (Job 4:8); Ps. 57:6
  - type: text
    content: 'And has fallen into the ditch '
  - type: text
    content: which
  - type: text
    content: ' he made.'
  '16':
  - type: note
    content: Esth. 9:25; Ps. 140:9
  - type: text
    content: His trouble shall return upon his own head,
  - type: text
    content: And his violent dealing shall come down on his own crown.
  '17':
  - type: text
    content: 'I will praise the '
  - type: heading
    content: Lord
  - type: text
    content: ' according to His righteousness,'
  - type: text
    content: 'And will sing praise to the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' Most High.'
  '2':
  - type: note
    content: Ps. 57:4; Is. 38:13
  - type: text
    content: Lest they tear me like a lion,
  - type: note
    content: Ps. 50:22
  - type: text
    content: 'Rending '
  - type: text
    content: me
  - type: text
    content: ' in pieces, while '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' none to deliver.'
  '3':
  - type: text
    content: 'O '
  - type: heading
    content: Lord
  - type: text
    content: ' my God, '
  - type: note
    content: 2 Sam. 16:7
  - type: text
    content: 'if I have done this:'
  - type: text
    content: 'If there is '
  - type: note
    content: 1 Sam. 24:11
  - type: text
    content: iniquity in my hands,
  '4':
  - type: text
    content: If I have repaid evil to him who was at peace with me,
  - type: text
    content: 'Or '
  - type: note
    content: 1 Sam. 24:7; 26:9
  - type: text
    content: have plundered my enemy without cause,
  '5':
  - type: text
    content: 'Let the enemy pursue me and overtake '
  - type: text
    content: me;
  - type: text
    content: Yes, let him trample my life to the earth,
  - type: text
    content: And lay my honor in the dust.
  - type: text
    content: Selah
  '6':
  - type: text
    content: 'Arise, O '
  - type: heading
    content: Lord
  - type: text
    content: ', in Your anger;'
  - type: note
    content: Ps. 94:2
  - type: text
    content: Lift Yourself up because of the rage of my enemies;
  - type: note
    content: Ps. 35:23; 44:23
  - type: text
    content: 'Rise up for me '
  - type: text
    content: to
  - type: text
    content: ' the judgment You have commanded!'
  '7':
  - type: text
    content: So the congregation of the peoples shall surround You;
  - type: text
    content: For their sakes, therefore, return on high.
  '8':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' shall judge the peoples;'
  - type: note
    content: Ps. 26:1; 35:24; 43:1
  - type: text
    content: 'Judge me, O '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ps. 18:20; 35:24
  - type: text
    content: according to my righteousness,
  - type: text
    content: And according to my integrity within me.
  '9':
  - type: text
    content: Oh, let the wickedness of the wicked come to an end,
  - type: text
    content: But establish the just;
  - type: note
    content: (1 Sam. 16:7)
  - type: text
    content: For the righteous God tests the hearts and minds.
