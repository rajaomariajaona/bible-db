document_id: 1SA.4,114
type_code: eng
verses:
  '1':
  - type: text
    content: And the word of Samuel came to all Israel.
  - type: heading
    content: The Ark of God Captured
  - type: text
    content: 'Now Israel went out to battle against the Philistines, and encamped beside '
  - type: note
    content: 1 Sam. 3:1, 4
  - type: text
    content: 'Ebenezer; and the Philistines encamped in Aphek. '
  '10':
  - type: text
    content: 'So the Philistines fought, and '
  - type: note
    content: Judg. 13:1; 1 Sam. 14:21
  - type: text
    content: 'Israel was defeated, and every man fled to his tent. There was a very great slaughter, and there fell of Israel thirty thousand foot soldiers. '
  '11':
  - type: text
    content: 'Also '
  - type: note
    content: Lev. 26:17; Deut. 28:15, 25; 1 Sam. 4:2; 2 Sam. 18:17; 19:8; 2 Kin. 14:12; 2 Chr. 25:22
  - type: text
    content: 'the ark of God was captured; and '
  - type: note
    content: 1 Sam. 2:32; Ps. 78:60, 61
  - type: text
    content: the two sons of Eli, Hophni and Phinehas, died.
  - type: heading
    content: Death of Eli
  '12':
  - type: text
    content: 'Then a man of Benjamin ran from the battle line the same day, and '
  - type: note
    content: 1 Sam. 2:34; Ps. 78:64
  - type: text
    content: 'came to Shiloh with his clothes torn and '
  - type: note
    content: 2 Sam. 1:2
  - type: text
    content: 'dirt on his head. '
  '13':
  - type: text
    content: 'Now when he came, there was Eli, sitting on '
  - type: note
    content: Josh. 7:6; 2 Sam. 13:19; 15:32; Neh. 9:1; Job 2:12
  - type: text
    content: 'a seat by the wayside watching, for his heart trembled for the ark of God. And when the man came into the city and told '
  - type: text
    content: it,
  - type: text
    content: ' all the city cried out. '
  '14':
  - type: text
    content: 'When Eli heard the noise of the outcry, he said, “What '
  - type: text
    content: does
  - type: text
    content: ' the sound of this tumult '
  - type: text
    content: mean?
  - type: text
    content: '” And the man came quickly and told Eli. '
  '15':
  - type: text
    content: 'Eli was ninety-eight years old, and '
  - type: note
    content: 1 Sam. 1:9; 4:18
  - type: text
    content: his eyes were so dim that he could not see.
  '16':
  - type: text
    content: 'Then the man said to Eli, “I '
  - type: text
    content: am
  - type: text
    content: ' he who came from the battle. And I fled today from the battle line.”'
  - type: text
    content: 'And he said, '
  - type: note
    content: 1 Sam. 3:2; 1 Kin. 14:4
  - type: text
    content: “What happened, my son?”
  '17':
  - type: text
    content: So the messenger answered and said, “Israel has fled before the Philistines, and there has been a great slaughter among the people. Also your two sons, Hophni and Phinehas, are dead; and the ark of God has been captured.”
  '18':
  - type: text
    content: Then it happened, when he made mention of the ark of God, that Eli fell off the seat backward by the side of the gate; and his neck was broken and he died, for the man was old and heavy. And he had judged Israel forty years.
  - type: heading
    content: Ichabod
  '19':
  - type: text
    content: 'Now his daughter-in-law, Phinehas’s wife, was with child, '
  - type: text
    content: due
  - type: text
    content: ' to be delivered; and when she heard the news that the ark of God was captured, and that her father-in-law and her husband were dead, she bowed herself and gave birth, for her labor pains came upon her. '
  '2':
  - type: text
    content: 'Then the '
  - type: note
    content: 1 Sam. 7:12
  - type: text
    content: 'Philistines put themselves in battle array against Israel. And when they joined battle, Israel was defeated by the Philistines, who killed about four thousand men of the army in the field. '
  '20':
  - type: text
    content: 'And about the time of her death '
  - type: note
    content: 2 Sam. 1:4
  - type: text
    content: 'the women who stood by her said to her, “Do not fear, for you have borne a son.” But she did not answer, nor did she regard '
  - type: text
    content: it.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Then she named the child '
  - type: note
    content: Gen. 35:16–19
  - type: text
    content: 'Ichabod, saying, '
  - type: note
    content: 1 Sam. 14:3
  - type: text
    content: '“The glory has departed from Israel!” because the ark of God had been captured and because of her father-in-law and her husband. '
  '22':
  - type: text
    content: And she said, “The glory has departed from Israel, for the ark of God has been captured.”
  '3':
  - type: text
    content: 'And when the people had come into the camp, the elders of Israel said, “Why has the '
  - type: heading
    content: Lord
  - type: text
    content: ' defeated us today before the Philistines? '
  - type: note
    content: 1 Sam. 12:9
  - type: text
    content: 'Let us bring the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' from Shiloh to us, that when it comes among us it may save us from the hand of our enemies.” '
  '4':
  - type: text
    content: 'So the people sent to Shiloh, that they might bring from there the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, '
  - type: note
    content: Num. 10:35; Josh. 6:6–21
  - type: text
    content: 'who dwells '
  - type: text
    content: between
  - type: text
    content: ' '
  - type: note
    content: Ex. 25:18–21; 1 Sam. 6:2; Ps. 80:1
  - type: text
    content: 'the cherubim. And the '
  - type: note
    content: Num. 7:89
  - type: text
    content: 'two sons of Eli, Hophni and Phinehas, '
  - type: text
    content: were
  - type: text
    content: ' there with the ark of the covenant of God.'
  '5':
  - type: text
    content: 'And when the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came into the camp, all Israel shouted so loudly that the earth shook. '
  '6':
  - type: text
    content: 'Now when the Philistines heard the noise of the shout, they said, “What '
  - type: text
    content: does
  - type: text
    content: ' the sound of this great shout in the camp of the Hebrews '
  - type: text
    content: mean?
  - type: text
    content: '” Then they understood that the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: ' had come into the camp. '
  '7':
  - type: text
    content: 'So the Philistines were afraid, for they said, “God has come into the camp!” And they said, '
  - type: note
    content: 1 Sam. 2:12
  - type: text
    content: '“Woe to us! For such a thing has never happened before. '
  '8':
  - type: text
    content: 'Woe to us! Who will deliver us from the hand of these mighty gods? These '
  - type: text
    content: are
  - type: text
    content: ' the gods who struck the Egyptians with all the plagues in the wilderness. '
  '9':
  - type: note
    content: Ex. 15:14
  - type: text
    content: 'Be strong and conduct yourselves like men, you Philistines, that you do not become servants of the Hebrews, '
  - type: note
    content: 1 Cor. 16:13
  - type: text
    content: as they have been to you. Conduct yourselves like men, and fight!”
