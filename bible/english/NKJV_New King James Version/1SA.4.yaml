document_id: 1SA.4,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: And the word of Samuel came to all Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ark of God Captured
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Israel went out to battle against the Philistines, and encamped beside '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 3:1, 4
      marker-yv: yv-n
    - type: text
      text: 'Ebenezer; and the Philistines encamped in Aphek. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So the Philistines fought, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 13:1; 1 Sam. 14:21
      marker-yv: yv-n
    - type: text
      text: 'Israel was defeated, and every man fled to his tent. There was a very great slaughter, and there fell of Israel thirty thousand foot soldiers. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:17; Deut. 28:15, 25; 1 Sam. 4:2; 2 Sam. 18:17; 19:8; 2 Kin. 14:12; 2 Chr. 25:22
      marker-yv: yv-n
    - type: text
      text: 'the ark of God was captured; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 2:32; Ps. 78:60, 61
      marker-yv: yv-n
    - type: text
      text: the two sons of Eli, Hophni and Phinehas, died.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Death of Eli
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then a man of Benjamin ran from the battle line the same day, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 2:34; Ps. 78:64
      marker-yv: yv-n
    - type: text
      text: 'came to Shiloh with his clothes torn and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 1:2
      marker-yv: yv-n
    - type: text
      text: 'dirt on his head. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Now when he came, there was Eli, sitting on '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 7:6; 2 Sam. 13:19; 15:32; Neh. 9:1; Job 2:12
      marker-yv: yv-n
    - type: text
      text: 'a seat by the wayside watching, for his heart trembled for the ark of God. And when the man came into the city and told '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' all the city cried out. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'When Eli heard the noise of the outcry, he said, “What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: does
    - type: text
      text: ' the sound of this tumult '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mean?
    - type: text
      text: '” And the man came quickly and told Eli. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Eli was ninety-eight years old, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 1:9; 4:18
      marker-yv: yv-n
    - type: text
      text: his eyes were so dim that he could not see.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then the man said to Eli, “I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' he who came from the battle. And I fled today from the battle line.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 3:2; 1 Kin. 14:4
      marker-yv: yv-n
    - type: text
      text: “What happened, my son?”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: So the messenger answered and said, “Israel has fled before the Philistines, and there has been a great slaughter among the people. Also your two sons, Hophni and Phinehas, are dead; and the ark of God has been captured.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Then it happened, when he made mention of the ark of God, that Eli fell off the seat backward by the side of the gate; and his neck was broken and he died, for the man was old and heavy. And he had judged Israel forty years.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ichabod
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Now his daughter-in-law, Phinehas’s wife, was with child, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: due
    - type: text
      text: ' to be delivered; and when she heard the news that the ark of God was captured, and that her father-in-law and her husband were dead, she bowed herself and gave birth, for her labor pains came upon her. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 7:12
      marker-yv: yv-n
    - type: text
      text: 'Philistines put themselves in battle array against Israel. And when they joined battle, Israel was defeated by the Philistines, who killed about four thousand men of the army in the field. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And about the time of her death '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 1:4
      marker-yv: yv-n
    - type: text
      text: 'the women who stood by her said to her, “Do not fear, for you have borne a son.” But she did not answer, nor did she regard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then she named the child '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 35:16–19
      marker-yv: yv-n
    - type: text
      text: 'Ichabod, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 14:3
      marker-yv: yv-n
    - type: text
      text: '“The glory has departed from Israel!” because the ark of God had been captured and because of her father-in-law and her husband. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: And she said, “The glory has departed from Israel, for the ark of God has been captured.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And when the people had come into the camp, the elders of Israel said, “Why has the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' defeated us today before the Philistines? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 12:9
      marker-yv: yv-n
    - type: text
      text: 'Let us bring the ark of the covenant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' from Shiloh to us, that when it comes among us it may save us from the hand of our enemies.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So the people sent to Shiloh, that they might bring from there the ark of the covenant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 10:35; Josh. 6:6–21
      marker-yv: yv-n
    - type: text
      text: 'who dwells '
    - type: usfm
      marker: it
      children:
      - type: text
        text: between
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:18–21; 1 Sam. 6:2; Ps. 80:1
      marker-yv: yv-n
    - type: text
      text: 'the cherubim. And the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 7:89
      marker-yv: yv-n
    - type: text
      text: 'two sons of Eli, Hophni and Phinehas, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' there with the ark of the covenant of God.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And when the ark of the covenant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came into the camp, all Israel shouted so loudly that the earth shook. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now when the Philistines heard the noise of the shout, they said, “What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: does
    - type: text
      text: ' the sound of this great shout in the camp of the Hebrews '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mean?
    - type: text
      text: '” Then they understood that the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had come into the camp. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So the Philistines were afraid, for they said, “God has come into the camp!” And they said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 2:12
      marker-yv: yv-n
    - type: text
      text: '“Woe to us! For such a thing has never happened before. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Woe to us! Who will deliver us from the hand of these mighty gods? These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the gods who struck the Egyptians with all the plagues in the wilderness. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:14
      marker-yv: yv-n
    - type: text
      text: 'Be strong and conduct yourselves like men, you Philistines, that you do not become servants of the Hebrews, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:13
      marker-yv: yv-n
    - type: text
      text: as they have been to you. Conduct yourselves like men, and fight!”
