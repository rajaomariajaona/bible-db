document_id: JOB.26,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Job: Man’s Frailty and God’s Majesty'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'But Job answered and said:'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 38:1–11); Ps. 33:7; 104:9; Prov. 8:29; Jer. 5:22
      marker-yv: yv-n
    - type: text
      text: He drew a circular horizon on the face of the waters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At the boundary of light and darkness.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The pillars of heaven tremble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And are astonished at His rebuke.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 14:21; Job 9:13; Is. 51:15; (Jer. 31:35)
      marker-yv: yv-n
    - type: text
      text: He stirs up the sea with His power,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And by His understanding He breaks up the storm.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 9:8); Ps. 33:6
      marker-yv: yv-n
    - type: text
      text: By His Spirit He adorned the heavens;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His hand pierced '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 27:1
      marker-yv: yv-n
    - type: text
      text: the fleeing serpent.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Indeed these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the mere edges of His ways,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And how small a whisper we hear of Him!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the thunder of His power who can understand?”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“How have you helped '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' without power?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: How
    - type: text
      text: ' have you saved the arm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has
    - type: text
      text: ' no strength?'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'How have you counseled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has
    - type: text
      text: ' no wisdom?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: how
    - type: text
      text: ' have you declared sound advice to many?'
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: To whom have you uttered words?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And whose spirit came from you?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “The dead tremble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Those under the waters and those inhabiting them.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 139:8); Prov. 15:11; (Heb. 4:13)
      marker-yv: yv-n
    - type: text
      text: 'Sheol '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' naked before Him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And Destruction has no covering.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:8; Ps. 24:2; 104:2
      marker-yv: yv-n
    - type: text
      text: He stretches out the north over empty space;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: He
    - type: text
      text: ' hangs the earth on nothing.'
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 37:11; Prov. 30:4
      marker-yv: yv-n
    - type: text
      text: He binds up the water in His thick clouds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet the clouds are not broken under it.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He covers the face of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' throne,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' spreads His cloud over it.'
