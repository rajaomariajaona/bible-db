    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 6:5; 2 Chr. 31:11; Ezek. 40:38
    marker-yv: yv-n
  - type: text
    text: 'chambers and a pavement made all around the court; '
