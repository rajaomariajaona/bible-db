    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' fifty cubits and its width twenty-five cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Its windows and those of its archways, and also its palm trees, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had
  - type: text
    text: ' the same measurements as the gateway facing east; it was ascended by seven steps, and its archway '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in front of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'A gate of the inner court was opposite the northern gateway, just as the eastern '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gateway;
  - type: text
    text: ' and he measured from gateway to gateway, one hundred cubits.'
