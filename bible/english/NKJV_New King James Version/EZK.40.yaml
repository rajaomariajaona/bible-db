  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'On the outer court was also a gateway facing north, and he measured its length and its width. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
