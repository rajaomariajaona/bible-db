  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 43:1
    marker-yv: yv-n
  - type: text
    text: 'east; and he went up its stairs and measured the threshold of the gateway, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' one rod wide, and the other threshold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' one rod wide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Each gate chamber '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' one rod long and one rod wide; between the gate chambers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: space
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' five cubits; and the threshold of the gateway by the vestibule of the inside gate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' one rod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He also measured the vestibule of the inside gate, one rod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then he measured the vestibule of the gateway, eight cubits; and the gateposts, two cubits. The vestibule of the gate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' on the inside. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In the eastern gateway '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' three gate chambers on one side and three on the other; the three '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' all the same size; also the gateposts were of the same size on this side and that side.'
