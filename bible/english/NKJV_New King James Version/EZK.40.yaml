  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The pavement was by the side of the gateways, corresponding to the length of the gateways; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the lower pavement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then he measured the width from the front of the lower gateway to the front of the inner court exterior, one hundred cubits toward the east and the north.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Northern Gateway
  marker-yv: yv-h
- type: usfm
