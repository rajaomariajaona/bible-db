    text: ' the length of the gate, thirteen cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: it
    children:
    - type: text
      text: There
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a space in front of the gate chambers, one cubit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: on
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: side
  - type: text
    text: ' and one cubit on that side; the gate chambers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' six cubits on this side and six cubits on that side. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then he measured the gateway from the roof of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' gate chamber to the roof of the other; the width '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' twenty-five cubits, as door faces door. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He measured the gateposts, sixty cubits high, and the court all around the gateway '
  - type: usfm
    marker: it
    children:
    - type: text
      text: extended
  - type: text
    text: ' to the gatepost. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: it
    children:
    - type: text
      text: From
  - type: text
    text: ' the front of the entrance gate to the front of the vestibule of the inner gate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' fifty cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: it
    children:
    - type: text
      text: There
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' '
