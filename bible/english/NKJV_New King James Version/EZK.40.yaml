  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' windows in it and in its archways all around like those windows; its length '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' fifty cubits and its width twenty-five cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Seven steps led up to it, and its archway '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in front of them; and it had palm trees on its gateposts, one on this side and one on that side. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: it
    children:
    - type: text
      text: There
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' also a gateway on the inner court, facing south; and he measured from gateway to gateway toward the south, one hundred cubits.'
