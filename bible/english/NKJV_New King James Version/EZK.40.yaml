  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Its archways faced the outer court, palm trees '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' on its gateposts, and going up to it '
  - type: usfm
