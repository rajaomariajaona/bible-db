    marker: x
    children:
    - type: text
      text: 1 Kin. 6:4; Ezek. 41:16, 26
    marker-yv: yv-n
  - type: text
    text: 'beveled window '
  - type: usfm
    marker: it
    children:
    - type: text
      text: frames
  - type: text
