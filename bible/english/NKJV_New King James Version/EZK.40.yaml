    marker: x
    children:
    - type: text
      text: Ezek. 1:7; Dan. 10:6; Rev. 1:15
    marker-yv: yv-n
  - type: text
    text: 'like the appearance of bronze. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 47:3; Zech. 2:1, 2
    marker-yv: yv-n
  - type: text
    text: 'He had a line of flax '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 11:1; 21:15
    marker-yv: yv-n
  - type: text
    text: and a measuring rod in his hand, and he stood in the gateway.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the man said to me, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 44:5
    marker-yv: yv-n
  - type: text
    text: '“Son of man, look with your eyes and hear with your ears, and fix your mind on everything I show you; for you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' brought here so that I might show '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' to you. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 43:10
    marker-yv: yv-n
  - type: text
    text: 'Declare to the house of Israel everything you see.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now there was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 26:1); Ezek. 42:20
    marker-yv: yv-n
  - type: text
    text: 'a wall all around the outside of the temple. In the man’s hand was a measuring rod six cubits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: long, each being a
  - type: text
    text: ' cubit and a handbreadth; and he measured the width of the wall structure, one rod; and the height, one rod.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Eastern Gateway of the Temple
