    marker: x
    children:
    - type: text
      text: (Is. 2:2, 3); Ezek. 17:23; 20:40; 37:22; (Mic. 4:1); Rev. 21:10
    marker-yv: yv-n
  - type: text
    text: 'set me on a very high mountain; on it toward the south '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' something like the structure of a city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He took me there, and behold, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a man whose appearance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
