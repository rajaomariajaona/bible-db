  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 6:29, 32, 35; 2 Chr. 3:5; Ezek. 40:22, 26, 31, 34, 37; 41:18–20, 25, 26
    marker-yv: yv-n
  - type: text
    text: palm trees.
- type: usfm
  marker: s1
