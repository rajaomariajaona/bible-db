document_id: MRK.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptist Prepares the Way
  - type: text
    content: 'The '
  - type: note
    content: Matt. 1:1; 3:1; Luke 3:22
  - type: text
    content: 'beginning of the gospel of Jesus Christ, '
  - type: note
    content: Ps. 2:7; Matt. 14:33; Luke 1:35
  - type: text
    content: 'the Son of God. '
  '10':
  - type: note
    content: Ezek. 1:1; Matt. 3:16; John 1:32
  - type: text
    content: 'And immediately, coming up from the water, He saw the heavens parting and the Spirit '
  - type: note
    content: Is. 11:2; 61:1; Acts 10:38
  - type: text
    content: 'descending upon Him like a dove. '
  '11':
  - type: text
    content: 'Then a voice came from heaven, '
  - type: note
    content: (Ps. 2:7); Is. 42:1; Matt. 3:17; 12:18; Mark 9:7; Luke 3:22
  - type: text
    content: “You are My beloved Son, in whom I am well pleased.”
  - type: heading
    content: Satan Tempts Jesus
  '12':
  - type: note
    content: Matt. 4:1–11; Luke 4:1–13
  - type: text
    content: 'Immediately the Spirit drove Him into the wilderness. '
  '13':
  - type: text
    content: 'And He was there in the wilderness forty days, tempted by Satan, and was with the wild beasts; '
  - type: note
    content: Matt. 4:10, 11
  - type: text
    content: and the angels ministered to Him.
  - type: heading
    content: Jesus Begins His Galilean Ministry
  '14':
  - type: note
    content: Matt. 4:12
  - type: text
    content: 'Now after John was put in prison, Jesus came to Galilee, '
  - type: note
    content: Matt. 4:23
  - type: text
    content: 'preaching the gospel of the kingdom of God, '
  '15':
  - type: text
    content: 'and saying, '
  - type: note
    content: Dan. 9:25; (Gal. 4:4; Eph. 1:10; 1 Tim. 2:6); Titus 1:3
  - type: text
    content: '“The time is fulfilled, and '
  - type: note
    content: Matt. 3:2; 4:17; (Acts 20:21)
  - type: text
    content: 'the kingdom of God '
  - type: text
    content: is at hand. Repent, and believe in the gospel.”
  - type: heading
    content: Four Fishermen Called as Disciples
  '16':
  - type: note
    content: Matt. 4:18–22; Luke 5:2–11; John 1:40–42
  - type: text
    content: 'And as He walked by the Sea of Galilee, He saw Simon and Andrew his brother casting a net into the sea; for they were fishermen. '
  '17':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: '“Follow Me, and I will make you become '
  - type: note
    content: Matt. 13:47, 48
  - type: text
    content: fishers of men.”
  - type: text
    content: ' '
  '18':
  - type: note
    content: Matt. 19:27; (Luke 14:26)
  - type: text
    content: They immediately left their nets and followed Him.
  '19':
  - type: text
    content: 'When He had gone a little farther from there, He saw James the '
  - type: text
    content: son
  - type: text
    content: ' of Zebedee, and John his brother, who also '
  - type: text
    content: were
  - type: text
    content: ' in the boat mending their nets. '
  '2':
  - type: text
    content: 'As it is written in the Prophets:'
  - type: note
    content: Mal. 3:1; Matt. 11:10; Luke 7:27
  - type: text
    content: “Behold, I send My messenger before Your face,
  - type: text
    content: Who will prepare Your way before You.”
  '20':
  - type: text
    content: And immediately He called them, and they left their father Zebedee in the boat with the hired servants, and went after Him.
  - type: heading
    content: Jesus Casts Out an Unclean Spirit
  '21':
  - type: note
    content: Matt. 4:13; Luke 4:31–37
  - type: text
    content: 'Then they went into Capernaum, and immediately on the Sabbath He entered the '
  - type: note
    content: Ps. 22:22; Matt. 4:23; Luke 4:16; 13:10
  - type: text
    content: 'synagogue and taught. '
  '22':
  - type: note
    content: Matt. 7:28, 29; 13:54
  - type: text
    content: And they were astonished at His teaching, for He taught them as one having authority, and not as the scribes.
  '23':
  - type: text
    content: 'Now there was a man in their synagogue with an '
  - type: note
    content: (Matt. 12:43); Mark 5:2; 7:25; Luke 4:33
  - type: text
    content: 'unclean spirit. And he cried out, '
  '24':
  - type: text
    content: 'saying, “Let '
  - type: text
    content: us
  - type: text
    content: ' alone! '
  - type: note
    content: Matt. 8:28, 29; Mark 5:7, 8; Luke 8:28
  - type: text
    content: 'What have we to do with You, Jesus of Nazareth? Did You come to destroy us? I '
  - type: note
    content: Mark 3:11; Luke 4:41; James 2:19
  - type: text
    content: 'know who You are—the '
  - type: note
    content: Ps. 16:10
  - type: text
    content: Holy One of God!”
  '25':
  - type: text
    content: 'But Jesus '
  - type: note
    content: (Luke 4:39)
  - type: text
    content: 'rebuked him, saying, '
  - type: text
    content: “Be quiet, and come out of him!”
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And when the unclean spirit '
  - type: note
    content: Mark 9:20
  - type: text
    content: 'had convulsed him and cried out with a loud voice, he came out of him. '
  '27':
  - type: text
    content: 'Then they were all amazed, so that they questioned among themselves, saying, “What is this? What new doctrine '
  - type: text
    content: is
  - type: text
    content: ' this? For with authority He commands even the unclean spirits, and they obey Him.” '
  '28':
  - type: text
    content: 'And immediately His '
  - type: note
    content: Matt. 4:24; 9:31
  - type: text
    content: fame spread throughout all the region around Galilee.
  - type: heading
    content: Peter’s Mother-in-Law Healed
  '29':
  - type: note
    content: Matt. 8:14, 15; Luke 4:38, 39
  - type: text
    content: 'Now as soon as they had come out of the synagogue, they entered the house of Simon and Andrew, with James and John. '
  '3':
  - type: text
    content: “The
  - type: note
    content: Is. 40:3; Matt. 3:3; Luke 3:4; John 1:23
  - type: text
    content: ' voice of one crying in the wilderness:'
  - type: text
    content: '‘Prepare the way of the '
  - type: heading
    content: Lord
  - type: text
    content: ;
  - type: text
    content: Make His paths straight.’ ”
  '30':
  - type: text
    content: 'But Simon’s wife’s mother lay sick with a fever, and they told Him about her at once. '
  '31':
  - type: text
    content: So He came and took her by the hand and lifted her up, and immediately the fever left her. And she served them.
  - type: heading
    content: Many Healed After Sabbath Sunset
  '32':
  - type: note
    content: Matt. 8:16, 17; Luke 4:40, 41
  - type: text
    content: 'At evening, when the sun had set, they brought to Him all who were sick and those who were demon-possessed. '
  '33':
  - type: text
    content: 'And the whole city was gathered together at the door. '
  '34':
  - type: text
    content: 'Then He healed many who were sick with various diseases, and '
  - type: note
    content: Matt. 9:33; Luke 13:32
  - type: text
    content: 'cast out many demons; and He '
  - type: note
    content: Mark 3:12; Luke 4:41; Acts 16:17, 18
  - type: text
    content: did not allow the demons to speak, because they knew Him.
  - type: heading
    content: Preaching in Galilee
  '35':
  - type: text
    content: 'Now '
  - type: note
    content: Luke 4:42, 43
  - type: text
    content: 'in the morning, having risen a long while before daylight, He went out and departed to a solitary place; and there He '
  - type: note
    content: Matt. 26:39, 44; Mark 6:46; Luke 5:16; 6:12; 9:28, 29; Heb. 5:7
  - type: text
    content: 'prayed. '
  '36':
  - type: text
    content: 'And Simon and those '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' with Him searched for Him. '
  '37':
  - type: text
    content: 'When they found Him, they said to Him, '
  - type: note
    content: Matt. 4:25; John 3:26; 12:19
  - type: text
    content: '“Everyone '
  - type: note
    content: (Heb. 11:6)
  - type: text
    content: is looking for You.”
  '38':
  - type: text
    content: 'But He said to them, '
  - type: note
    content: Luke 4:43
  - type: text
    content: '“Let us go into the next towns, that I may preach there also, because '
  - type: note
    content: (Is. 61:1, 2; Mark 10:45; John 16:28; 17:4, 8)
  - type: text
    content: for this purpose I have come forth.”
  '39':
  - type: note
    content: Ps. 22:22; Matt. 4:23; 9:35; Mark 1:21; 3:1; Luke 4:44
  - type: text
    content: 'And He was preaching in their synagogues throughout all Galilee, and '
  - type: note
    content: Mark 5:8, 13; 7:29, 30
  - type: text
    content: casting out demons.
  - type: heading
    content: Jesus Cleanses a Leper
  '4':
  - type: note
    content: Mal. 4:6; Matt. 3:1; Luke 3:3
  - type: text
    content: 'John came baptizing in the wilderness and preaching a baptism of repentance for the remission of sins. '
  '40':
  - type: note
    content: Matt. 8:2–4; Luke 5:12–14
  - type: text
    content: Now a leper came to Him, imploring Him, kneeling down to Him and saying to Him, “If You are willing, You can make me clean.”
  '41':
  - type: text
    content: 'Then Jesus, moved with '
  - type: note
    content: Luke 7:13
  - type: text
    content: 'compassion, stretched out '
  - type: text
    content: His
  - type: text
    content: ' hand and touched him, and said to him, '
  - type: text
    content: “I am willing; be cleansed.”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'As soon as He had spoken, '
  - type: note
    content: Matt. 15:28; Mark 5:29
  - type: text
    content: 'immediately the leprosy left him, and he was cleansed. '
  '43':
  - type: text
    content: 'And He strictly warned him and sent him away at once, '
  '44':
  - type: text
    content: 'and said to him, '
  - type: text
    content: '“See that you say nothing to anyone; but go your way, show yourself to the priest, and offer for your cleansing those things '
  - type: note
    content: Lev. 14:1–32
  - type: text
    content: which Moses commanded, as a testimony to them.”
  '45':
  - type: note
    content: Matt. 28:15; Luke 5:15
  - type: text
    content: 'However, he went out and began to proclaim '
  - type: text
    content: it
  - type: text
    content: ' freely, and to spread the matter, so that Jesus could no longer openly enter the city, but was outside in deserted places; '
  - type: note
    content: Mark 2:2, 13; 3:7; Luke 5:17; John 6:2
  - type: text
    content: and they came to Him from every direction.
  '5':
  - type: note
    content: Matt. 3:5
  - type: text
    content: Then all the land of Judea, and those from Jerusalem, went out to him and were all baptized by him in the Jordan River, confessing their sins.
  '6':
  - type: text
    content: 'Now John was '
  - type: note
    content: Matt. 3:4
  - type: text
    content: 'clothed with camel’s hair and with a leather belt around his waist, and he ate locusts and wild honey. '
  '7':
  - type: text
    content: 'And he preached, saying, '
  - type: note
    content: Matt. 3:11; John 1:27; Acts 13:25
  - type: text
    content: '“There comes One after me who is mightier than I, whose sandal strap I am not worthy to stoop down and loose. '
  '8':
  - type: note
    content: Acts 1:5; 11:16
  - type: text
    content: 'I indeed baptized you with water, but He will baptize you '
  - type: note
    content: Is. 44:3; John 20:22; (Acts 2:4; 10:45, 46; 1 Cor. 12:13)
  - type: text
    content: with the Holy Spirit.”
  - type: heading
    content: John Baptizes Jesus
  '9':
  - type: note
    content: Matt. 3:13–17; Luke 3:21, 22
  - type: text
    content: 'It came to pass in those days '
  - type: text
    content: that
  - type: text
    content: ' Jesus came from Nazareth of Galilee, and was baptized by John in the Jordan. '
