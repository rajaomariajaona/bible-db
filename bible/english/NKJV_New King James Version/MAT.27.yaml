  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, when they had gathered together, Pilate said to them, “Whom do you want me to release to you? Barabbas, or Jesus who is called Christ?” '
  '18':
  - type: usfm
    marker: p
    children:
