document_id: MAT.27,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Handed Over to Pontius Pilate
  - type: text
    content: 'When morning came, '
  - type: note
    content: Ps. 2:2; Mark 15:1; Luke 22:66; 23:1; John 18:28
  - type: text
    content: 'all the chief priests and elders of the people plotted against Jesus to put Him to death. '
  '10':
  - type: text
    content: 'and '
  - type: note
    content: Jer. 32:6–9; Zech. 11:12, 13
  - type: text
    content: 'gave them for the potter’s field, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' directed me.”'
  - type: heading
    content: Jesus Faces Pilate
  '11':
  - type: text
    content: 'Now Jesus stood before the governor. '
  - type: note
    content: Mark 15:2–5; Luke 23:2, 3; John 18:29–38
  - type: text
    content: And the governor asked Him, saying, “Are You the King of the Jews?”
  - type: text
    content: 'Jesus said to him, '
  - type: note
    content: John 18:37; 1 Tim. 6:13
  - type: text
    content: “
  - type: text
    content: It is as
  - type: text
    content: ' you say.”'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And while He was being accused by the chief priests and elders, '
  - type: note
    content: Ps. 38:13, 14; Matt. 26:63; John 19:9
  - type: text
    content: He answered nothing.
  '13':
  - type: text
    content: 'Then Pilate said to Him, '
  - type: note
    content: Matt. 26:62; John 19:10
  - type: text
    content: '“Do You not hear how many things they testify against You?” '
  '14':
  - type: text
    content: But He answered him not one word, so that the governor marveled greatly.
  - type: heading
    content: Taking the Place of Barabbas
  '15':
  - type: note
    content: Mark 15:6–15; Luke 23:17–25; John 18:39—19:16
  - type: text
    content: 'Now at the feast the governor was accustomed to releasing to the multitude one prisoner whom they wished. '
  '16':
  - type: text
    content: 'And at that time they had a notorious prisoner called Barabbas. '
  '17':
  - type: text
    content: 'Therefore, when they had gathered together, Pilate said to them, “Whom do you want me to release to you? Barabbas, or Jesus who is called Christ?” '
  '18':
  - type: text
    content: 'For he knew that they had handed Him over because of '
  - type: note
    content: Matt. 21:38; (John 15:22–25)
  - type: text
    content: envy.
  '19':
  - type: text
    content: While he was sitting on the judgment seat, his wife sent to him, saying, “Have nothing to do with that just Man, for I have suffered many things today in a dream because of Him.”
  '2':
  - type: text
    content: 'And when they had bound Him, they led Him away and '
  - type: note
    content: Matt. 20:19; Luke 18:32; Acts 3:13
  - type: text
    content: delivered Him to Pontius Pilate the governor.
  - type: heading
    content: Judas Hangs Himself
  '20':
  - type: note
    content: Mark 15:11; Luke 23:18; John 18:40; Acts 3:14
  - type: text
    content: 'But the chief priests and elders persuaded the multitudes that they should ask for Barabbas and destroy Jesus. '
  '21':
  - type: text
    content: The governor answered and said to them, “Which of the two do you want me to release to you?”
  - type: text
    content: 'They said, '
  - type: note
    content: Acts 3:14
  - type: text
    content: “Barabbas!”
  '22':
  - type: text
    content: Pilate said to them, “What then shall I do with Jesus who is called Christ?”
  - type: text
    content: They
  - type: text
    content: ' all said to him, “Let Him be crucified!”'
  '23':
  - type: text
    content: 'Then the governor said, '
  - type: note
    content: Acts 3:13
  - type: text
    content: “Why, what evil has He done?”
  - type: text
    content: But they cried out all the more, saying, “Let Him be crucified!”
  '24':
  - type: text
    content: 'When Pilate saw that he could not prevail at all, but rather '
  - type: text
    content: that
  - type: text
    content: ' a tumult was rising, he '
  - type: note
    content: Deut. 21:6–8
  - type: text
    content: 'took water and washed '
  - type: text
    content: his
  - type: text
    content: ' hands before the multitude, saying, “I am innocent of the blood of this just Person. You see '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: it.
  - type: text
    content: ”
  '25':
  - type: text
    content: 'And all the people answered and said, '
  - type: note
    content: Deut. 19:10; Josh. 2:19; 2 Sam. 1:16; 1 Kin. 2:32; Acts 5:28
  - type: text
    content: '“His blood '
  - type: text
    content: be
  - type: text
    content: ' on us and on our children.”'
  '26':
  - type: text
    content: 'Then he released Barabbas to them; and when '
  - type: note
    content: (Is. 50:6; 53:5); Matt. 20:19; Mark 15:15; Luke 23:16, 24, 25; John 19:1, 16
  - type: text
    content: 'he had scourged Jesus, he delivered '
  - type: text
    content: Him
  - type: text
    content: ' to be crucified.'
  - type: heading
    content: The Soldiers Mock Jesus
  '27':
  - type: note
    content: Mark 15:16–20; John 19:2
  - type: text
    content: 'Then the soldiers of the governor took Jesus into the Praetorium and gathered the whole garrison around Him. '
  '28':
  - type: text
    content: 'And they '
  - type: note
    content: Mark 15:17; John 19:2
  - type: text
    content: 'stripped Him and '
  - type: note
    content: Luke 23:11
  - type: text
    content: 'put a scarlet robe on Him. '
  '29':
  - type: note
    content: Ps. 69:19; Is. 53:3; Matt. 20:19; Mark 10:34; Luke 18:32
  - type: text
    content: 'When they had twisted a crown of thorns, they put '
  - type: text
    content: it
  - type: text
    content: ' on His head, and a reed in His right hand. And they bowed the knee before Him and mocked Him, saying, “Hail, King of the Jews!” '
  '3':
  - type: note
    content: Matt. 26:14
  - type: text
    content: 'Then Judas, His betrayer, seeing that He had been condemned, was remorseful and brought back the thirty '
  - type: note
    content: Matt. 26:15
  - type: text
    content: 'pieces of silver to the chief priests and elders, '
  '30':
  - type: text
    content: 'Then '
  - type: note
    content: Is. 50:6; 52:14; Mic. 5:1; Matt. 26:67; Mark 10:34; 14:65; 15:19
  - type: text
    content: 'they spat on Him, and took the reed and struck Him on the head. '
  '31':
  - type: text
    content: 'And when they had mocked Him, they took the robe off Him, put His '
  - type: text
    content: own
  - type: text
    content: ' clothes on Him, '
  - type: note
    content: Is. 53:7; Matt. 20:19
  - type: text
    content: and led Him away to be crucified.
  - type: heading
    content: The King on a Cross
  '32':
  - type: note
    content: 1 Kin. 21:13; Acts 7:58; Heb. 13:12
  - type: text
    content: 'Now as they came out, '
  - type: note
    content: Mark 15:21; Luke 23:26; John 19:17
  - type: text
    content: 'they found a man of Cyrene, Simon by name. Him they compelled to bear His cross. '
  '33':
  - type: note
    content: Mark 15:22–32; Luke 23:33–43; John 19:17
  - type: text
    content: 'And when they had come to a place called Golgotha, that is to say, Place of a Skull, '
  '34':
  - type: note
    content: Ps. 69:21; Matt. 27:48
  - type: text
    content: 'they gave Him sour wine mingled with gall to drink. But when He had tasted '
  - type: text
    content: it,
  - type: text
    content: ' He would not drink.'
  '35':
  - type: note
    content: Mark 15:24; Luke 23:34; John 19:24
  - type: text
    content: 'Then they crucified Him, and divided His garments, casting lots, that it might be fulfilled which was spoken by the prophet:'
  - type: note
    content: Ps. 22:18
  - type: text
    content: “They divided My garments among them,
  - type: text
    content: And for My clothing they cast lots.”
  '36':
  - type: note
    content: Ps. 22:17; Matt. 27:54
  - type: text
    content: 'Sitting down, they kept watch over Him there. '
  '37':
  - type: text
    content: 'And they '
  - type: note
    content: Mark 15:26; Luke 23:38; John 19:19
  - type: text
    content: 'put up over His head the accusation written against Him:'
  - type: text
    content: THIS IS JESUS THE KING OF THE JEWS.
  '38':
  - type: note
    content: Is. 53:9, 12; Mark 15:27; Luke 23:32, 33; John 19:18
  - type: text
    content: Then two robbers were crucified with Him, one on the right and another on the left.
  '39':
  - type: text
    content: 'And '
  - type: note
    content: Job 16:4; Ps. 22:7; 109:25; Lam. 2:15; Mark 15:29; Luke 23:35
  - type: text
    content: 'those who passed by blasphemed Him, wagging their heads '
  '4':
  - type: text
    content: saying, “I have sinned by betraying innocent blood.”
  - type: text
    content: 'And they said, “What '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: that
  - type: text
    content: ' to us? You see '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: it!
  - type: text
    content: ”
  '40':
  - type: text
    content: 'and saying, '
  - type: note
    content: Matt. 26:61; John 2:19
  - type: text
    content: '“You who destroy the temple and build '
  - type: text
    content: it
  - type: text
    content: ' in three days, save Yourself! '
  - type: note
    content: Matt. 26:63
  - type: text
    content: If You are the Son of God, come down from the cross.”
  '41':
  - type: text
    content: 'Likewise the chief priests also, mocking with the scribes and elders, said, '
  '42':
  - type: text
    content: '“He '
  - type: note
    content: (Matt. 18:11; John 3:14, 15)
  - type: text
    content: 'saved others; Himself He cannot save. If He is the King of Israel, let Him now come down from the cross, and we will believe Him. '
  '43':
  - type: note
    content: Ps. 22:8
  - type: text
    content: He trusted in God; let Him deliver Him now if He will have Him; for He said, ‘I am the Son of God.’ ”
  '44':
  - type: note
    content: Mark 15:32; Luke 23:39–43
  - type: text
    content: Even the robbers who were crucified with Him reviled Him with the same thing.
  - type: heading
    content: Jesus Dies on the Cross
  '45':
  - type: note
    content: Amos 8:9; Mark 15:33–41; Luke 23:44–49
  - type: text
    content: 'Now from the sixth hour until the ninth hour there was darkness over all the land. '
  '46':
  - type: text
    content: 'And about the ninth hour '
  - type: note
    content: (Heb. 5:7)
  - type: text
    content: 'Jesus cried out with a loud voice, saying, '
  - type: text
    content: '“Eli, Eli, lama sabachthani?” that is, '
  - type: note
    content: Ps. 22:1
  - type: text
    content: “My God, My God, why have You forsaken Me?”
  '47':
  - type: text
    content: 'Some of those who stood there, when they heard '
  - type: text
    content: that,
  - type: text
    content: ' said, “This Man is calling for Elijah!” '
  '48':
  - type: text
    content: 'Immediately one of them ran and took a sponge, '
  - type: note
    content: Ps. 69:21; Mark 15:36; Luke 23:36; John 19:29
  - type: text
    content: 'filled '
  - type: text
    content: it
  - type: text
    content: ' with sour wine and put '
  - type: text
    content: it
  - type: text
    content: ' on a reed, and offered it to Him to drink.'
  '49':
  - type: text
    content: The rest said, “Let Him alone; let us see if Elijah will come to save Him.”
  '5':
  - type: text
    content: 'Then he threw down the pieces of silver in the temple and '
  - type: note
    content: 2 Sam. 17:23; Matt. 18:7; 26:24; John 17:12; Acts 1:18
  - type: text
    content: departed, and went and hanged himself.
  '50':
  - type: text
    content: 'And Jesus '
  - type: note
    content: Mark 15:37; Luke 23:46; John 19:30
  - type: text
    content: 'cried out again with a loud voice, and '
  - type: note
    content: Dan. 9:26; Zech. 11:10, 11; Matt. 17:23; (John 10:18; 1 Cor. 15:3)
  - type: text
    content: yielded up His spirit.
  '51':
  - type: text
    content: 'Then, behold, '
  - type: note
    content: Ex. 26:31; 2 Chr. 3:14; Zech. 11:10; Mark 15:38; Luke 23:45; Heb. 9:3
  - type: text
    content: 'the veil of the temple was torn in two from top to bottom; and the earth quaked, and the rocks were split, '
  '52':
  - type: text
    content: 'and the graves were opened; and many bodies of the saints who had fallen asleep were raised; '
  '53':
  - type: text
    content: and coming out of the graves after His resurrection, they went into the holy city and appeared to many.
  '54':
  - type: note
    content: Mark 15:39; Luke 23:47
  - type: text
    content: 'So when the centurion and those with him, who were guarding Jesus, saw the earthquake and the things that had happened, they feared greatly, saying, '
  - type: note
    content: Matt. 14:33
  - type: text
    content: “Truly this was the Son of God!”
  '55':
  - type: text
    content: 'And many women '
  - type: note
    content: Mark 15:41; Luke 8:2, 3
  - type: text
    content: 'who followed Jesus from Galilee, ministering to Him, were there looking on from afar, '
  '56':
  - type: note
    content: Matt. 28:1; Mark 15:40, 47; 16:9; Luke 8:2; John 19:25; 20:1, 18
  - type: text
    content: among whom were Mary Magdalene, Mary the mother of James and Joses, and the mother of Zebedee’s sons.
  - type: heading
    content: Jesus Buried in Joseph’s Tomb
  '57':
  - type: text
    content: 'Now '
  - type: note
    content: Mark 15:42–47; Luke 23:50–56; John 19:38–42
  - type: text
    content: 'when evening had come, there came a rich man from Arimathea, named Joseph, who himself had also become a disciple of Jesus. '
  '58':
  - type: text
    content: 'This man went to Pilate and asked for the body of Jesus. Then Pilate commanded the body to be given to him. '
  '59':
  - type: text
    content: 'When Joseph had taken the body, he wrapped it in a clean linen cloth, '
  '6':
  - type: text
    content: 'But the chief priests took the silver pieces and said, “It is not lawful to put them into the treasury, because they are the price of blood.” '
  '60':
  - type: text
    content: 'and '
  - type: note
    content: Is. 53:9; Matt. 26:12
  - type: text
    content: 'laid it in his new tomb which he had hewn out of the rock; and he rolled a large stone against the door of the tomb, and departed. '
  '61':
  - type: text
    content: And Mary Magdalene was there, and the other Mary, sitting opposite the tomb.
  - type: heading
    content: Pilate Sets a Guard
  '62':
  - type: text
    content: 'On the next day, which followed the Day of Preparation, the chief priests and Pharisees gathered together to Pilate, '
  '63':
  - type: text
    content: 'saying, “Sir, we remember, while He was still alive, how that deceiver said, '
  - type: note
    content: Matt. 16:21; 17:23; 20:19; 26:61; Mark 8:31; 10:34; Luke 9:22; 13:33; 24:6, 7; John 2:19
  - type: text
    content: ‘After three days I will rise.’
  - type: text
    content: ' '
  '64':
  - type: text
    content: 'Therefore command that the tomb be made secure until the third day, lest His disciples come by night and steal Him '
  - type: text
    content: away,
  - type: text
    content: ' and say to the people, ‘He has risen from the dead.’ So the last deception will be worse than the first.”'
  '65':
  - type: text
    content: 'Pilate said to them, “You have a guard; go your way, make '
  - type: text
    content: it
  - type: text
    content: ' as secure as you know how.” '
  '66':
  - type: text
    content: 'So they went and made the tomb secure, '
  - type: note
    content: Dan. 6:17
  - type: text
    content: sealing the stone and setting the guard.
  '7':
  - type: text
    content: 'And they consulted together and bought with them the potter’s field, to bury strangers in. '
  '8':
  - type: text
    content: 'Therefore that field has been called '
  - type: note
    content: Acts 1:19
  - type: text
    content: the Field of Blood to this day.
  '9':
  - type: text
    content: 'Then was fulfilled what was spoken by Jeremiah the prophet, saying, '
  - type: note
    content: Zech. 11:12
  - type: text
    content: '“And they took the thirty pieces of silver, the value of Him who was priced, whom they of the children of Israel priced, '
