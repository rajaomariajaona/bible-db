document_id: MAT.21,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Triumphal Entry
  - type: text
    content: 'Now '
  - type: note
    content: Mark 11:1–10; Luke 19:29–38
  - type: text
    content: 'when they drew near Jerusalem, and came to Bethphage, at '
  - type: note
    content: (Zech. 14:4)
  - type: text
    content: 'the Mount of Olives, then Jesus sent two disciples, '
  '10':
  - type: note
    content: John 2:13, 15
  - type: text
    content: And when He had come into Jerusalem, all the city was moved, saying, “Who is this?”
  '11':
  - type: text
    content: 'So the multitudes said, “This is Jesus, '
  - type: note
    content: (Deut. 18:15, 18); Matt. 2:23; 16:14; Luke 4:16–29; John 6:14; 7:40; 9:17; (Acts 3:22, 23)
  - type: text
    content: the prophet from Nazareth of Galilee.”
  - type: heading
    content: Jesus Cleanses the Temple
  '12':
  - type: note
    content: Mal. 3:1; Mark 11:15–18; Luke 19:45–47; John 2:13–16
  - type: text
    content: 'Then Jesus went into the temple of God and drove out all those who bought and sold in the temple, and overturned the tables of the '
  - type: note
    content: Deut. 14:25
  - type: text
    content: 'money changers and the seats of those who sold doves. '
  '13':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: '“It is written, '
  - type: note
    content: Is. 56:7
  - type: text
    content: ‘My house shall be called a house of prayer,’
  - type: text
    content: ' but you have made it a '
  - type: note
    content: Jer. 7:11
  - type: text
    content: ‘den of thieves.’
  - type: text
    content: ' ”'
  '14':
  - type: text
    content: 'Then '
  - type: text
    content: the
  - type: text
    content: ' blind and '
  - type: text
    content: the
  - type: text
    content: ' lame came to Him in the temple, and He healed them. '
  '15':
  - type: text
    content: 'But when the chief priests and scribes saw the wonderful things that He did, and the children crying out in the temple and saying, “Hosanna to the '
  - type: note
    content: Matt. 1:1; John 7:42
  - type: text
    content: 'Son of David!” they were indignant '
  '16':
  - type: text
    content: and said to Him, “Do You hear what these are saying?”
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: “Yes. Have you never read,
  - type: note
    content: Ps. 8:2; Matt. 11:25
  - type: text
    content: ‘Out of the mouth of babes and nursing infants
  - type: text
    content: You have perfected praise’
  - type: text
    content: ?”
  '17':
  - type: text
    content: 'Then He left them and '
  - type: note
    content: Matt. 26:6; Mark 11:1, 11, 12; 14:3; Luke 19:29; 24:50; John 11:1, 18; 12:1
  - type: text
    content: went out of the city to Bethany, and He lodged there.
  - type: heading
    content: The Fig Tree Withered
  '18':
  - type: note
    content: Mark 11:12–14, 20–24
  - type: text
    content: 'Now in the morning, as He returned to the city, He was hungry. '
  '19':
  - type: note
    content: Mark 11:13
  - type: text
    content: 'And seeing a fig tree by the road, He came to it and found nothing on it but leaves, and said to it, '
  - type: text
    content: “Let no fruit grow on you ever again.”
  - type: text
    content: ' Immediately the fig tree withered away.'
  - type: heading
    content: The Lesson of the Withered Fig Tree
  '2':
  - type: text
    content: 'saying to them, '
  - type: text
    content: '“Go into the village opposite you, and immediately you will find a donkey tied, and a colt with her. Loose '
  - type: text
    content: them
  - type: text
    content: ' and bring '
  - type: text
    content: them
  - type: text
    content: ' to Me.'
  - type: text
    content: ' '
  '20':
  - type: note
    content: Mark 11:20
  - type: text
    content: 'And when the disciples saw '
  - type: text
    content: it,
  - type: text
    content: ' they marveled, saying, “How did the fig tree wither away so soon?”'
  '21':
  - type: text
    content: 'So Jesus answered and said to them, '
  - type: text
    content: '“Assuredly, I say to you, '
  - type: note
    content: Matt. 17:20
  - type: text
    content: 'if you have faith and '
  - type: note
    content: James 1:6
  - type: text
    content: 'do not doubt, you will not only do what was done to the fig tree, '
  - type: note
    content: 1 Cor. 13:2
  - type: text
    content: but also if you say to this mountain, ‘Be removed and be cast into the sea,’ it will be done.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 7:7–11; Mark 11:24; Luke 11:9; (John 15:7; James 5:16; 1 John 3:22; 5:14)
  - type: text
    content: whatever things you ask in prayer, believing, you will receive.”
  - type: heading
    content: Jesus’ Authority Questioned
  '23':
  - type: note
    content: Mark 11:27–33; Luke 20:1–8
  - type: text
    content: 'Now when He came into the temple, the chief priests and the elders of the people confronted Him as He was teaching, and '
  - type: note
    content: Ex. 2:14; Acts 4:7; 7:27
  - type: text
    content: said, “By what authority are You doing these things? And who gave You this authority?”
  '24':
  - type: text
    content: 'But Jesus answered and said to them, '
  - type: text
    content: '“I also will ask you one thing, which if you tell Me, I likewise will tell you by what authority I do these things:'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'The '
  - type: note
    content: (John 1:29–34)
  - type: text
    content: 'baptism of '
  - type: note
    content: John 1:15–28
  - type: text
    content: John—where was it from? From heaven or from men?”
  - type: text
    content: 'And they reasoned among themselves, saying, “If we say, ‘From heaven,’ He will say to us, ‘Why then did you not believe him?’ '
  '26':
  - type: text
    content: 'But if we say, ‘From men,’ we '
  - type: note
    content: Matt. 14:5; 21:46; Luke 20:6
  - type: text
    content: 'fear the multitude, '
  - type: note
    content: Matt. 14:5; Mark 6:20
  - type: text
    content: 'for all count John as a prophet.” '
  '27':
  - type: text
    content: So they answered Jesus and said, “We do not know.”
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “Neither will I tell you by what authority I do these things.
  - type: heading
    content: The Parable of the Two Sons
  '28':
  - type: text
    content: '“But what do you think? A man had two sons, and he came to the first and said, ‘Son, go, work today in my '
  - type: note
    content: Matt. 20:1; 21:33
  - type: text
    content: vineyard.’
  - type: text
    content: ' '
  '29':
  - type: text
    content: He answered and said, ‘I will not,’ but afterward he regretted it and went.
  - type: text
    content: ' '
  '3':
  - type: text
    content: And if anyone says anything to you, you shall say, ‘The Lord has need of them,’ and immediately he will send them.”
  '30':
  - type: text
    content: 'Then he came to the second and said likewise. And he answered and said, ‘I '
  - type: text
    content: go,
  - type: text
    content: ' sir,’ but he did not go.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Which of the two did the will of '
  - type: text
    content: his
  - type: text
    content: ' father?”'
  - type: text
    content: They said to Him, “The first.”
  - type: text
    content: 'Jesus said to them, '
  - type: note
    content: Luke 7:29, 37–50
  - type: text
    content: “Assuredly, I say to you that tax collectors and harlots enter the kingdom of God before you.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'For '
  - type: note
    content: Luke 3:1–12; 7:29
  - type: text
    content: 'John came to you in the way of righteousness, and you did not believe him; '
  - type: note
    content: Luke 3:12, 13
  - type: text
    content: 'but tax collectors and harlots believed him; and when you saw '
  - type: text
    content: it,
  - type: text
    content: ' you did not afterward '
  - type: text
    content: relent and believe him.
  - type: heading
    content: The Parable of the Wicked Vinedressers
  '33':
  - type: text
    content: '“Hear another parable: There was a certain landowner '
  - type: note
    content: Ps. 80:9; Mark 12:1–12; Luke 20:9–19
  - type: text
    content: 'who planted a vineyard and set a hedge around it, dug a winepress in it and built a tower. And he leased it to vinedressers and '
  - type: note
    content: Matt. 25:14
  - type: text
    content: went into a far country.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Now when vintage-time drew near, he sent his servants to the vinedressers, that they might receive its fruit.
  - type: text
    content: ' '
  '35':
  - type: note
    content: 2 Chr. 24:21; 36:16; (Matt. 23:34, 37; Acts 7:52; 1 Thess. 2:15); Heb. 11:36, 37
  - type: text
    content: And the vinedressers took his servants, beat one, killed one, and stoned another.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Again he sent other servants, more than the first, and they did likewise to them.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Then last of all he sent his '
  - type: note
    content: (John 3:16)
  - type: text
    content: son to them, saying, ‘They will respect my son.’
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'But when the vinedressers saw the son, they said among themselves, '
  - type: note
    content: (Ps. 2:8; Heb. 1:2)
  - type: text
    content: '‘This is the heir. '
  - type: note
    content: (Ps. 2:2); John 11:53; Acts 4:27
  - type: text
    content: Come, let us kill him and seize his inheritance.’
  - type: text
    content: ' '
  '39':
  - type: note
    content: (Matt. 26:50); Mark 14:46; Luke 22:54; John 18:12; (Acts 2:23)
  - type: text
    content: 'So they took him and cast '
  - type: text
    content: him
  - type: text
    content: ' out of the vineyard and killed '
  - type: text
    content: him.
  '4':
  - type: text
    content: 'All this was done that it might be fulfilled which was spoken by the prophet, saying:'
  '40':
  - type: text
    content: “Therefore, when the owner of the vineyard comes, what will he do to those vinedressers?”
  '41':
  - type: note
    content: Luke 20:16
  - type: text
    content: 'They said to Him, '
  - type: note
    content: (Luke 21:24)
  - type: text
    content: '“He will destroy those wicked men miserably, '
  - type: note
    content: (Matt. 8:11; Acts 13:46; Rom. 9; 10)
  - type: text
    content: 'and lease '
  - type: text
    content: his
  - type: text
    content: ' vineyard to other vinedressers who will render to him the fruits in their seasons.”'
  '42':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: '“Have you never read in the Scriptures:'
  - type: note
    content: Ps. 118:22, 23; Is. 28:16; Mark 12:10; Luke 20:17; Acts 4:11; (Rom. 9:33); Eph. 2:20; (1 Pet. 2:6, 7)
  - type: text
    content: ‘The stone which the builders rejected
  - type: text
    content: Has become the chief cornerstone.
  - type: text
    content: 'This was the '
  - type: heading
    content: Lord
  - type: text
    content: ’s doing,
  - type: text
    content: And it is marvelous in our eyes’
  - type: text
    content: '?'
  '43':
  - type: text
    content: '“Therefore I say to you, '
  - type: note
    content: (Matt. 8:12); Acts 13:46
  - type: text
    content: the kingdom of God will be taken from you and given to a nation bearing the fruits of it.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'And '
  - type: note
    content: Is. 8:14, 15; Zech. 12:3; Luke 20:18; (Rom. 9:33); 1 Pet. 2:8
  - type: text
    content: 'whoever falls on this stone will be broken; but on whomever it falls, '
  - type: note
    content: (Is. 60:12; Dan. 2:44)
  - type: text
    content: it will grind him to powder.”
  '45':
  - type: text
    content: 'Now when the chief priests and Pharisees heard His parables, they perceived that He was speaking of them. '
  '46':
  - type: text
    content: 'But when they sought to lay hands on Him, they '
  - type: note
    content: Matt. 21:26; Mark 11:18, 32
  - type: text
    content: 'feared the multitudes, because '
  - type: note
    content: Matt. 21:11; Luke 7:16; John 7:40
  - type: text
    content: they took Him for a prophet.
  '5':
  - type: text
    content: “Tell
  - type: note
    content: Is. 62:11; Zech. 9:9; John 12:15
  - type: text
    content: ' the daughter of Zion,'
  - type: text
    content: ‘Behold, your King is coming to you,
  - type: text
    content: Lowly, and sitting on a donkey,
  - type: text
    content: A colt, the foal of a donkey.’ ”
  '6':
  - type: note
    content: Mark 11:4
  - type: text
    content: 'So the disciples went and did as Jesus commanded them. '
  '7':
  - type: text
    content: 'They brought the donkey and the colt, '
  - type: note
    content: 2 Kin. 9:13
  - type: text
    content: 'laid their clothes on them, and set '
  - type: text
    content: Him
  - type: text
    content: ' on them. '
  '8':
  - type: text
    content: 'And a very great multitude spread their clothes on the road; '
  - type: note
    content: Lev. 23:40; John 12:13
  - type: text
    content: 'others cut down branches from the trees and spread '
  - type: text
    content: them
  - type: text
    content: ' on the road. '
  '9':
  - type: text
    content: 'Then the multitudes who went before and those who followed cried out, saying:'
  - type: text
    content: “Hosanna to the Son of David!
  - type: note
    content: Ps. 118:26; Matt. 23:39
  - type: text
    content: '‘Blessed '
  - type: text
    content: is
  - type: text
    content: ' He who comes in the name of the '
  - type: heading
    content: Lord
  - type: text
    content: '!’'
  - type: text
    content: Hosanna in the highest!”
