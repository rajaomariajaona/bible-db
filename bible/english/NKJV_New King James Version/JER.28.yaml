document_id: JER.28,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Hananiah’s Falsehood and Doom
  - type: text
    content: 'And '
  - type: note
    content: Jer. 27:1
  - type: text
    content: 'it happened in the same year, at the beginning of the reign of Zedekiah king of Judah, in the '
  - type: note
    content: Jer. 51:59
  - type: text
    content: 'fourth year '
  - type: text
    content: and
  - type: text
    content: ' in the fifth month, '
  - type: text
    content: that
  - type: text
    content: ' Hananiah the son of '
  - type: note
    content: Ezek. 11:1
  - type: text
    content: 'Azur the prophet, who '
  - type: text
    content: was
  - type: text
    content: ' from Gibeon, spoke to me in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' in the presence of the priests and of all the people, saying, '
  '10':
  - type: text
    content: 'Then Hananiah the prophet took the '
  - type: note
    content: Jer. 27:2
  - type: text
    content: 'yoke off the prophet Jeremiah’s neck and broke it. '
  '11':
  - type: text
    content: 'And Hananiah spoke in the presence of all the people, saying, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘Even so I will break the yoke of Nebuchadnezzar king of Babylon '
  - type: note
    content: Jer. 27:7
  - type: text
    content: from the neck of all nations within the space of two full years.’ ” And the prophet Jeremiah went his way.
  '12':
  - type: text
    content: 'Now the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to Jeremiah, after Hananiah the prophet had broken the yoke from the neck of the prophet Jeremiah, saying, '
  '13':
  - type: text
    content: '“Go and tell Hananiah, saying, ‘Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': “You have broken the yokes of wood, but you have made in their place yokes of iron.” '
  '14':
  - type: text
    content: 'For thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: '
  - type: note
    content: Deut. 28:48; Jer. 27:7, 8
  - type: text
    content: '“I have put a yoke of iron on the neck of all these nations, that they may serve Nebuchadnezzar king of Babylon; and they shall serve him. '
  - type: note
    content: Jer. 27:6
  - type: text
    content: I have given him the beasts of the field also.” ’ ”
  '15':
  - type: text
    content: 'Then the prophet Jeremiah said to Hananiah the prophet, “Hear now, Hananiah, the '
  - type: heading
    content: Lord
  - type: text
    content: ' has not sent you, but '
  - type: note
    content: Jer. 20:6; 29:31; Lam. 2:14; Ezek. 13:22; Zech. 13:3
  - type: text
    content: 'you make this people trust in a '
  - type: note
    content: Jer. 27:10; 29:9
  - type: text
    content: 'lie. '
  '16':
  - type: text
    content: 'Therefore thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘Behold, I will cast you from the face of the earth. This year you shall '
  - type: note
    content: Jer. 20:6
  - type: text
    content: 'die, because you have taught '
  - type: note
    content: Deut. 13:5; Jer. 29:32
  - type: text
    content: 'rebellion against the '
  - type: heading
    content: Lord
  - type: text
    content: .’ ”
  '17':
  - type: text
    content: So Hananiah the prophet died the same year in the seventh month.
  '2':
  - type: text
    content: '“Thus speaks the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel, saying: ‘I have broken '
  - type: note
    content: Jer. 27:12
  - type: text
    content: 'the yoke of the king of Babylon. '
  '3':
  - type: note
    content: Jer. 27:16
  - type: text
    content: 'Within two full years I will bring back to this place all the vessels of the '
  - type: heading
    content: Lord
  - type: text
    content: '’s house, that Nebuchadnezzar king of Babylon '
  - type: note
    content: 2 Kin. 24:13; Dan. 1:2
  - type: text
    content: 'took away from this place and carried to Babylon. '
  '4':
  - type: text
    content: 'And I will bring back to this place Jeconiah the son of Jehoiakim, king of Judah, with all the captives of Judah who went to Babylon,’ says the '
  - type: heading
    content: Lord
  - type: text
    content: ', ‘for I will break the yoke of the king of Babylon.’ ”'
  '5':
  - type: text
    content: 'Then the prophet Jeremiah spoke to the prophet Hananiah in the presence of the priests and in the presence of all the people who stood in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  '6':
  - type: text
    content: 'and the prophet Jeremiah said, '
  - type: note
    content: 1 Kin. 1:36; Ps. 41:13; Jer. 11:5
  - type: text
    content: '“Amen! The '
  - type: heading
    content: Lord
  - type: text
    content: ' do so; the '
  - type: heading
    content: Lord
  - type: text
    content: ' perform your words which you have prophesied, to bring back the vessels of the '
  - type: heading
    content: Lord
  - type: text
    content: '’s house and all who were carried away captive, from Babylon to this place. '
  '7':
  - type: text
    content: 'Nevertheless hear now this word that I speak in your hearing and in the hearing of all the people: '
  '8':
  - type: text
    content: 'The prophets who have been before me and before you of old prophesied against many countries and great kingdoms—of war and disaster and pestilence. '
  '9':
  - type: text
    content: 'As for '
  - type: note
    content: Deut. 18:22
  - type: text
    content: 'the prophet who prophesies of '
  - type: note
    content: Jer. 23:17; Ezek. 13:10, 16
  - type: text
    content: 'peace, when the word of the prophet comes to pass, the prophet will be known '
  - type: text
    content: as
  - type: text
    content: ' one whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' has truly sent.”'
