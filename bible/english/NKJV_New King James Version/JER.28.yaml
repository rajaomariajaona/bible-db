document_id: JER.28,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hananiah’s Falsehood and Doom
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 27:1
      marker-yv: yv-n
    - type: text
      text: 'it happened in the same year, at the beginning of the reign of Zedekiah king of Judah, in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 51:59
      marker-yv: yv-n
    - type: text
      text: 'fourth year '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in the fifth month, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' Hananiah the son of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 11:1
      marker-yv: yv-n
    - type: text
      text: 'Azur the prophet, who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' from Gibeon, spoke to me in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the presence of the priests and of all the people, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then Hananiah the prophet took the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 27:2
      marker-yv: yv-n
    - type: text
      text: 'yoke off the prophet Jeremiah’s neck and broke it. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And Hananiah spoke in the presence of all the people, saying, “Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': ‘Even so I will break the yoke of Nebuchadnezzar king of Babylon '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 27:7
      marker-yv: yv-n
    - type: text
      text: from the neck of all nations within the space of two full years.’ ” And the prophet Jeremiah went his way.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Jeremiah, after Hananiah the prophet had broken the yoke from the neck of the prophet Jeremiah, saying, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“Go and tell Hananiah, saying, ‘Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': “You have broken the yokes of wood, but you have made in their place yokes of iron.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, the God of Israel: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:48; Jer. 27:7, 8
      marker-yv: yv-n
    - type: text
      text: '“I have put a yoke of iron on the neck of all these nations, that they may serve Nebuchadnezzar king of Babylon; and they shall serve him. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 27:6
      marker-yv: yv-n
    - type: text
      text: I have given him the beasts of the field also.” ’ ”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then the prophet Jeremiah said to Hananiah the prophet, “Hear now, Hananiah, the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not sent you, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 20:6; 29:31; Lam. 2:14; Ezek. 13:22; Zech. 13:3
      marker-yv: yv-n
    - type: text
      text: 'you make this people trust in a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 27:10; 29:9
      marker-yv: yv-n
    - type: text
      text: 'lie. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Therefore thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': ‘Behold, I will cast you from the face of the earth. This year you shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 20:6
      marker-yv: yv-n
    - type: text
      text: 'die, because you have taught '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 13:5; Jer. 29:32
      marker-yv: yv-n
    - type: text
      text: 'rebellion against the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .’ ”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: So Hananiah the prophet died the same year in the seventh month.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Thus speaks the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, the God of Israel, saying: ‘I have broken '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 27:12
      marker-yv: yv-n
    - type: text
      text: 'the yoke of the king of Babylon. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 27:16
      marker-yv: yv-n
    - type: text
      text: 'Within two full years I will bring back to this place all the vessels of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s house, that Nebuchadnezzar king of Babylon '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:13; Dan. 1:2
      marker-yv: yv-n
    - type: text
      text: 'took away from this place and carried to Babylon. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And I will bring back to this place Jeconiah the son of Jehoiakim, king of Judah, with all the captives of Judah who went to Babylon,’ says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', ‘for I will break the yoke of the king of Babylon.’ ”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then the prophet Jeremiah spoke to the prophet Hananiah in the presence of the priests and in the presence of all the people who stood in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and the prophet Jeremiah said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 1:36; Ps. 41:13; Jer. 11:5
      marker-yv: yv-n
    - type: text
      text: '“Amen! The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' do so; the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' perform your words which you have prophesied, to bring back the vessels of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s house and all who were carried away captive, from Babylon to this place. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nevertheless hear now this word that I speak in your hearing and in the hearing of all the people: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The prophets who have been before me and before you of old prophesied against many countries and great kingdoms—of war and disaster and pestilence. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'As for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 18:22
      marker-yv: yv-n
    - type: text
      text: 'the prophet who prophesies of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 23:17; Ezek. 13:10, 16
      marker-yv: yv-n
    - type: text
      text: 'peace, when the word of the prophet comes to pass, the prophet will be known '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' one whom the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has truly sent.”'
