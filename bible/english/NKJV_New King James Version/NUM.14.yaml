type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Refuses to Enter Canaan
  - type: text
    content: 'So all the congregation lifted up their voices and cried, and the people '
  - type: note
    content: Num. 11:4; Deut. 1:45
  - type: text
    content: 'wept that night. '
  '10':
  - type: note
    content: Ex. 17:4
  - type: text
    content: 'And all the congregation said to stone them with stones. Now '
  - type: note
    content: Ex. 16:10; Lev. 9:23
  - type: text
    content: 'the glory of the '
  - type: heading
    content: Lord
  - type: text
    content: ' appeared in the tabernacle of meeting before all the children of Israel.'
  - type: heading
    content: Moses Intercedes for the People
  '11':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses: “How long will these people '
  - type: note
    content: Ps. 95:8; Heb. 3:8
  - type: text
    content: 'reject Me? And how long will they not '
  - type: note
    content: Deut. 9:23; (John 12:37)
  - type: text
    content: 'believe Me, with all the signs which I have performed among them? '
  '12':
  - type: text
    content: 'I will strike them with the pestilence and disinherit them, and I will '
  - type: note
    content: Ex. 32:10
  - type: text
    content: make of you a nation greater and mightier than they.”
  '13':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 106:23
  - type: text
    content: 'Moses said to the '
  - type: heading
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: Ex. 32:12; Deut. 9:26–28; 32:27
  - type: text
    content: '“Then the Egyptians will hear '
  - type: text
    content: it,
  - type: text
    content: ' for by Your might You brought these people up from among them, '
  '14':
  - type: text
    content: 'and they will tell '
  - type: text
    content: it
  - type: text
    content: ' to the inhabitants of this land. They have '
  - type: note
    content: Deut. 2:25
  - type: text
    content: 'heard that You, '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: text
    content: are
  - type: text
    content: ' among these people; that You, '
  - type: heading
    content: Lord
  - type: text
    content: ', are seen face to face and Your cloud stands above them, and You go before them in a pillar of cloud by day and in a pillar of fire by night. '
  '15':
  - type: text
    content: 'Now '
  - type: text
    content: if
  - type: text
    content: ' You kill these people as one man, then the nations which have heard of Your fame will speak, saying, '
  '16':
  - type: text
    content: '‘Because the '
  - type: heading
    content: Lord
  - type: text
    content: ' was not '
  - type: note
    content: Deut. 9:28
  - type: text
    content: 'able to bring this people to the land which He swore to give them, therefore He killed them in the wilderness.’ '
  '17':
  - type: text
    content: 'And now, I pray, let the power of my Lord be great, just as You have spoken, saying, '
  '18':
  - type: note
    content: Ex. 34:6, 7; Deut. 5:10; 7:9; Ps. 103:8; 145:8; Jon. 4:2
  - type: text
    content: '‘The '
  - type: heading
    content: Lord
  - type: text
    content: ' is longsuffering and abundant in mercy, forgiving iniquity and transgression; but He by no means clears '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: guilty,
  - type: text
    content: ' '
  - type: note
    content: Ex. 20:5; Deut. 5:9
  - type: text
    content: 'visiting the iniquity of the fathers on the children to the third and fourth '
  - type: text
    content: generation.
  - type: text
    content: '’ '
  '19':
  - type: note
    content: Ex. 32:32; 34:9
  - type: text
    content: 'Pardon the iniquity of this people, I pray, '
  - type: note
    content: Ps. 51:1; 106:45
  - type: text
    content: 'according to the greatness of Your mercy, just '
  - type: note
    content: Ps. 78:38
  - type: text
    content: as You have forgiven this people, from Egypt even until now.”
  '2':
  - type: note
    content: Ex. 16:2; 17:3; Num. 16:41; Ps. 106:25; 1 Cor. 10:10
  - type: text
    content: 'And all the children of Israel complained against Moses and Aaron, and the whole congregation said to them, “If only we had died in the land of Egypt! Or if only we had died in this wilderness! '
  '20':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said: “I have pardoned, '
  - type: note
    content: 2 Sam. 12:13; Mic. 7:18–20; (1 John 5:14–16)
  - type: text
    content: 'according to your word; '
  '21':
  - type: text
    content: 'but truly, as I live, '
  - type: note
    content: Ps. 72:19; Is. 6:3; 66:18, 19; Hab. 2:14
  - type: text
    content: 'all the earth shall be filled with the glory of the '
  - type: heading
    content: Lord
  - type: text
    content: '— '
  '22':
  - type: note
    content: Deut. 1:35; 1 Cor. 10:5; Heb. 3:17
  - type: text
    content: 'because all these men who have seen My glory and the signs which I did in Egypt and in the wilderness, and have put Me to the test now '
  - type: note
    content: Gen. 31:7
  - type: text
    content: 'these ten times, and have not heeded My voice, '
  '23':
  - type: text
    content: 'they certainly shall not '
  - type: note
    content: Num. 26:65; 32:11; Heb. 3:18
  - type: text
    content: 'see the land of which I swore to their fathers, nor shall any of those who rejected Me see it. '
  '24':
  - type: text
    content: 'But My servant '
  - type: note
    content: Josh. 14:6, 8, 9
  - type: text
    content: 'Caleb, because he has a different spirit in him and '
  - type: note
    content: Num. 32:12
  - type: text
    content: 'has followed Me fully, I will bring into the land where he went, and his descendants shall inherit it. '
  '25':
  - type: text
    content: 'Now the Amalekites and the Canaanites dwell in the valley; tomorrow turn and '
  - type: note
    content: Num. 21:4; Deut. 1:40
  - type: text
    content: move out into the wilderness by the Way of the Red Sea.”
  - type: heading
    content: Death Sentence on the Rebels
  '26':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '27':
  - type: note
    content: Ex. 16:28
  - type: text
    content: '“How long '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: I
  - type: text
    content: ' '
  - type: text
    content: bear
  - type: text
    content: ' '
  - type: text
    content: with
  - type: text
    content: ' this evil congregation who complain against Me? '
  - type: note
    content: Ex. 16:12
  - type: text
    content: 'I have heard the complaints which the children of Israel make against Me. '
  '28':
  - type: note
    content: Deut. 1:35; 2:14, 15; Heb. 3:16–19
  - type: text
    content: 'Say to them, ‘As I live,’ says the '
  - type: heading
    content: Lord
  - type: text
    content: ', ‘just as you have spoken in My hearing, so I will do to you: '
  '29':
  - type: text
    content: 'The carcasses of you who have complained against Me shall fall in this wilderness, '
  - type: note
    content: Num. 1:45, 46; 26:64; Josh. 5:6
  - type: text
    content: 'all of you who were numbered, according to your entire number, from twenty years old and above. '
  '3':
  - type: text
    content: 'Why has the '
  - type: heading
    content: Lord
  - type: text
    content: ' brought us to this land to fall by the sword, that our wives and '
  - type: note
    content: Num. 14:31; Deut. 1:39
  - type: text
    content: 'children should become victims? Would it not be better for us to return to Egypt?” '
  '30':
  - type: note
    content: Num. 26:65; 32:12; Deut. 1:36–38; Josh. 14:6–15
  - type: text
    content: 'Except for Caleb the son of Jephunneh and Joshua the son of Nun, you shall by no means enter the land which I swore I would make you dwell in. '
  '31':
  - type: note
    content: Num. 14:3; Deut. 1:39
  - type: text
    content: 'But your little ones, whom you said would be victims, I will bring in, and they shall know the land which '
  - type: note
    content: Ps. 106:24
  - type: text
    content: 'you have despised. '
  '32':
  - type: text
    content: 'But '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: for
  - type: text
    content: ' you, '
  - type: note
    content: Num. 26:64, 65; 32:13; 1 Cor. 10:5
  - type: text
    content: 'your carcasses shall fall in this wilderness. '
  '33':
  - type: text
    content: 'And your sons shall '
  - type: note
    content: Num. 32:13; Ps. 107:40
  - type: text
    content: 'be shepherds in the wilderness '
  - type: note
    content: Deut. 2:14
  - type: text
    content: 'forty years, and '
  - type: note
    content: Ezek. 23:35
  - type: text
    content: 'bear the brunt of your infidelity, until your carcasses are consumed in the wilderness. '
  '34':
  - type: note
    content: Num. 13:25
  - type: text
    content: 'According to the number of the days in which you spied out the land, '
  - type: note
    content: Ps. 95:10; Ezek. 4:6
  - type: text
    content: 'forty days, for each day you shall bear your guilt one year, '
  - type: text
    content: namely
  - type: text
    content: ' forty years, '
  - type: note
    content: 1 Kin. 8:56; (Heb. 4:1)
  - type: text
    content: 'and you shall know My rejection. '
  '35':
  - type: note
    content: Num. 23:19
  - type: text
    content: 'I the '
  - type: heading
    content: Lord
  - type: text
    content: ' have spoken this. I will surely do so to all '
  - type: note
    content: 1 Cor. 10:5
  - type: text
    content: this evil congregation who are gathered together against Me. In this wilderness they shall be consumed, and there they shall die.’ ”
  '36':
  - type: text
    content: 'Now the men whom Moses sent to spy out the land, who returned and made all the congregation complain against him by bringing a bad report of the land, '
  '37':
  - type: text
    content: 'those very men who brought the evil report about the land, '
  - type: note
    content: Num. 16:49; (1 Cor. 10:10); Heb. 3:17, 18
  - type: text
    content: 'died by the plague before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '38':
  - type: note
    content: Josh. 14:6, 10
  - type: text
    content: But Joshua the son of Nun and Caleb the son of Jephunneh remained alive, of the men who went to spy out the land.
  - type: heading
    content: A Futile Invasion Attempt
  '39':
  - type: text
    content: 'Then Moses told these words to all the children of Israel, '
  - type: note
    content: Ex. 33:4
  - type: text
    content: 'and the people mourned greatly. '
  '4':
  - type: text
    content: 'So they said to one another, '
  - type: note
    content: Neh. 9:17
  - type: text
    content: '“Let us select a leader and '
  - type: note
    content: Deut. 17:16; Acts 7:39
  - type: text
    content: return to Egypt.”
  '40':
  - type: text
    content: 'And they rose early in the morning and went up to the top of the mountain, saying, '
  - type: note
    content: Deut. 1:41–44
  - type: text
    content: '“Here we are, and we will go up to the place which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has promised, for we have sinned!”'
  '41':
  - type: text
    content: 'And Moses said, “Now why do you transgress the command of the '
  - type: heading
    content: Lord
  - type: text
    content: '? For this will not succeed. '
  '42':
  - type: note
    content: Deut. 1:42; 31:17
  - type: text
    content: 'Do not go up, lest you be defeated by your enemies, for the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' not among you. '
  '43':
  - type: text
    content: 'For the Amalekites and the Canaanites '
  - type: text
    content: are
  - type: text
    content: ' there before you, and you shall fall by the sword; '
  - type: note
    content: 2 Chr. 15:2
  - type: text
    content: 'because you have turned away from the '
  - type: heading
    content: Lord
  - type: text
    content: ', the '
  - type: heading
    content: Lord
  - type: text
    content: ' will not be with you.”'
  '44':
  - type: note
    content: Deut. 1:43
  - type: text
    content: 'But they presumed to go up to the mountaintop. Nevertheless, neither the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' nor Moses departed from the camp. '
  '45':
  - type: text
    content: 'Then the Amalekites and the Canaanites who dwelt in that mountain came down and attacked them, and drove them back as far as '
  - type: note
    content: Num. 21:3
  - type: text
    content: Hormah.
  '5':
  - type: text
    content: Then Moses and Aaron fell on their faces before all the assembly of the congregation of the children of Israel.
  '6':
  - type: text
    content: 'But Joshua the son of Nun and Caleb the son of Jephunneh, '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' among those who had spied out the land, tore their clothes; '
  '7':
  - type: text
    content: 'and they spoke to all the congregation of the children of Israel, saying: '
  - type: note
    content: Num. 13:27; Deut. 1:25
  - type: text
    content: '“The land we passed through to spy out '
  - type: text
    content: is
  - type: text
    content: ' an exceedingly good land. '
  '8':
  - type: text
    content: 'If the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Deut. 10:15; 2 Sam. 15:25, 26; 1 Kin. 10:9; Ps. 147:11
  - type: text
    content: 'delights in us, then He will bring us into this land and give it to us, '
  - type: note
    content: Ex. 3:8; Num. 13:27
  - type: text
    content: '‘a land which flows with milk and honey.’ '
  '9':
  - type: text
    content: 'Only '
  - type: note
    content: Deut. 1:26; 9:7, 23, 24; 1 Sam. 15:23
  - type: text
    content: 'do not rebel against the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Deut. 7:18
  - type: text
    content: 'nor fear the people of the land, for '
  - type: note
    content: Num. 24:8
  - type: text
    content: 'they '
  - type: text
    content: are
  - type: text
    content: ' our bread; their protection has departed from them, '
  - type: note
    content: Gen. 48:21; Ex. 33:16; Deut. 20:1, 3, 4; 31:6–8; Josh. 1:5; Judg. 1:22; 2 Chr. 13:12; Ps. 46:7, 11; Zech. 8:23; Matt. 28:20; Heb. 13:5
  - type: text
    content: 'and the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' with us. Do not fear them.”'
