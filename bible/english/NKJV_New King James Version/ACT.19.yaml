  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it happened, while '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 1:12; 3:5, 6; Titus 3:13
    marker-yv: yv-n
  - type: text
    text: 'Apollos was at Corinth, that Paul, having passed through '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:23
    marker-yv: yv-n
  - type: text
    text: 'the upper regions, came to Ephesus. And finding some disciples '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: he said to them, “Did you receive the Holy Spirit when you believed?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So they said to him, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 3:7; Acts 8:16
    marker-yv: yv-n
  - type: text
    text: “We have not so much as heard whether there is a Holy Spirit.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And he said to them, “Into what then were you baptized?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So they said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 7:29; Acts 18:25
    marker-yv: yv-n
  - type: text
    text: “Into John’s baptism.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Paul said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 3:11; Mark 1:4, 7, 8; Luke 3:16; (John 1:15, 26, 27); Acts 13:24
    marker-yv: yv-n
  - type: text
    text: “John indeed baptized with a baptism of repentance, saying to the people that they should believe on Him who would come after him, that is, on Christ Jesus.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When they heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this,
  - type: text
    text: ' they were baptized '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 28:19; Acts 8:12, 16; 10:48
    marker-yv: yv-n
  - type: text
    text: 'in the name of the Lord Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And when Paul had '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 6:6; 8:17
    marker-yv: yv-n
  - type: text
    text: 'laid hands on them, the Holy Spirit came upon them, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mark 16:17; Acts 2:4; 10:46
    marker-yv: yv-n
  - type: text
    text: 'they spoke with tongues and prophesied. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Now the men were about twelve in all.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 17:2; 18:4
    marker-yv: yv-n
  - type: text
    text: 'And he went into the synagogue and spoke boldly for three months, reasoning and persuading '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 1:3; 28:23
    marker-yv: yv-n
  - type: text
    text: 'concerning the things of the kingdom of God. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Tim. 1:15; 2 Pet. 2:2; Jude 10
    marker-yv: yv-n
  - type: text
    text: 'when some were hardened and did not believe, but spoke evil '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 9:2; 19:23; 22:4; 24:14
    marker-yv: yv-n
  - type: text
    text: 'of the Way before the multitude, he departed from them and withdrew the disciples, reasoning daily in the school of Tyrannus. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 19:8; 20:31
    marker-yv: yv-n
  - type: text
    text: this continued for two years, so that all who dwelt in Asia heard the word of the Lord Jesus, both Jews and Greeks.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miracles Glorify Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mark 16:20; Acts 14:3
    marker-yv: yv-n
  - type: text
    text: 'God worked unusual miracles by the hands of Paul, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 4:29; Acts 5:15
    marker-yv: yv-n
  - type: text
    text: 'so that even handkerchiefs or aprons were brought from his body to the sick, and the diseases left them and the evil spirits went out of them. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 12:27; Luke 11:19
    marker-yv: yv-n
  - type: text
    text: 'Then some of the itinerant Jewish exorcists '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mark 9:38; Luke 9:49
    marker-yv: yv-n
  - type: text
    text: 'took it upon themselves to call the name of the Lord Jesus over those who had evil spirits, saying, “We exorcise you by the Jesus whom Paul '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 1:23; 2:2
    marker-yv: yv-n
  - type: text
    text: 'preaches.” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Also there were seven sons of Sceva, a Jewish chief priest, who did so.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And the evil spirit answered and said, “Jesus I know, and Paul I know; but who are you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then the man in whom the evil spirit was leaped on them, overpowered them, and prevailed against them, so that they fled out of that house naked and wounded. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'This became known both to all Jews and Greeks dwelling in Ephesus; and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 1:65; 7:16; Acts 2:43; 5:5, 11
    marker-yv: yv-n
  - type: text
    text: 'fear fell on them all, and the name of the Lord Jesus was magnified. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And many who had believed came '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 3:6
    marker-yv: yv-n
  - type: text
    text: 'confessing and telling their deeds. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Also, many of those who had practiced magic brought their books together and burned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' in the sight of all. And they counted up the value of them, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' totaled fifty thousand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pieces
  - type: text
    text: ' of silver. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 6:7; 12:24
    marker-yv: yv-n
  - type: text
    text: So the word of the Lord grew mightily and prevailed.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Riot at Ephesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 15:25; Gal. 2:1
    marker-yv: yv-n
  - type: text
    text: 'When these things were accomplished, Paul '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 20:22; 2 Cor. 1:16
    marker-yv: yv-n
  - type: text
    text: 'purposed in the Spirit, when he had passed through '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 20:1; 1 Cor. 16:5
    marker-yv: yv-n
  - type: text
    text: 'Macedonia and Achaia, to go to Jerusalem, saying, “After I have been there, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:21; 23:11; Rom. 1:13; 15:22–29
    marker-yv: yv-n
  - type: text
    text: 'I must also see Rome.” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So he sent into Macedonia two of those who ministered to him, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Tim. 1:2
    marker-yv: yv-n
  - type: text
    text: 'Timothy and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:23; 2 Tim. 4:20
    marker-yv: yv-n
  - type: text
    text: Erastus, but he himself stayed in Asia for a time.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 1:8
    marker-yv: yv-n
  - type: text
    text: 'about that time there arose a great commotion about '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 9:2
    marker-yv: yv-n
  - type: text
    text: 'the Way. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'For a certain man named Demetrius, a silversmith, who made silver shrines of Diana, brought '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 16:16, 19
    marker-yv: yv-n
  - type: text
    text: 'no small profit to the craftsmen. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He called them together with the workers of similar occupation, and said: “Men, you know that we have our prosperity by this trade. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Moreover you see and hear that not only at Ephesus, but throughout almost all Asia, this Paul has persuaded and turned away many people, saying that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 4:28; Ps. 115:4; Is. 44:10–20; Jer. 10:3; Acts 17:29; 1 Cor. 8:4; 10:19; Rev. 9:20
    marker-yv: yv-n
  - type: text
    text: 'they are not gods which are made with hands. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: So not only is this trade of ours in danger of falling into disrepute, but also the temple of the great goddess Diana may be despised and her magnificence destroyed, whom all Asia and the world worship.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Now when they heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this,
  - type: text
    text: ' they were full of wrath and cried out, saying, “Great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' Diana of the Ephesians!” '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'So the whole city was filled with confusion, and rushed into the theater with one accord, having seized '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 20:4; Rom. 16:23; 1 Cor. 1:14; 3 John 1
    marker-yv: yv-n
  - type: text
    text: 'Gaius and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 20:4; 27:2; Col. 4:10; Philem. 24
    marker-yv: yv-n
  - type: text
    text: 'Aristarchus, Macedonians, Paul’s travel companions. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And when Paul wanted to go in to the people, the disciples would not allow him. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then some of the officials of Asia, who were his friends, sent to him pleading that he would not venture into the theater. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Some therefore cried one thing and some another, for the assembly was confused, and most of them did not know why they had come together. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And they drew Alexander out of the multitude, the Jews putting him forward. And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Tim. 1:20; 2 Tim. 4:14
    marker-yv: yv-n
  - type: text
    text: 'Alexander '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 12:17
    marker-yv: yv-n
  - type: text
    text: 'motioned with his hand, and wanted to make his defense to the people. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'But when they found out that he was a Jew, all with one voice cried out for about two hours, “Great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' Diana of the Ephesians!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And when the city clerk had quieted the crowd, he said: “Men of Ephesus, what man is there who does not know that the city of the Ephesians is temple guardian of the great goddess Diana, and of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: image
  - type: text
    text: ' which fell down from Zeus? '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Therefore, since these things cannot be denied, you ought to be quiet and do nothing rashly. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'For you have brought these men here who are neither robbers of temples nor blasphemers of your goddess. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Therefore, if Demetrius and his fellow craftsmen have a case against anyone, the courts are open and there are proconsuls. Let them bring charges against one another. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'But if you have any other inquiry to make, it shall be determined in the lawful assembly. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'For we are in danger of being called in question for today’s uproar, there being no reason which we may give to account for this disorderly gathering.” '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: And when he had said these things, he dismissed the assembly.
