document_id: ACT.19,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul at Ephesus
  - type: text
    content: 'And it happened, while '
  - type: note
    content: 1 Cor. 1:12; 3:5, 6; Titus 3:13
  - type: text
    content: 'Apollos was at Corinth, that Paul, having passed through '
  - type: note
    content: Acts 18:23
  - type: text
    content: 'the upper regions, came to Ephesus. And finding some disciples '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: Acts 19:8; 20:31
  - type: text
    content: this continued for two years, so that all who dwelt in Asia heard the word of the Lord Jesus, both Jews and Greeks.
  - type: heading
    content: Miracles Glorify Christ
  '11':
  - type: text
    content: 'Now '
  - type: note
    content: Mark 16:20; Acts 14:3
  - type: text
    content: 'God worked unusual miracles by the hands of Paul, '
  '12':
  - type: note
    content: 2 Kin. 4:29; Acts 5:15
  - type: text
    content: 'so that even handkerchiefs or aprons were brought from his body to the sick, and the diseases left them and the evil spirits went out of them. '
  '13':
  - type: note
    content: Matt. 12:27; Luke 11:19
  - type: text
    content: 'Then some of the itinerant Jewish exorcists '
  - type: note
    content: Mark 9:38; Luke 9:49
  - type: text
    content: 'took it upon themselves to call the name of the Lord Jesus over those who had evil spirits, saying, “We exorcise you by the Jesus whom Paul '
  - type: note
    content: 1 Cor. 1:23; 2:2
  - type: text
    content: 'preaches.” '
  '14':
  - type: text
    content: Also there were seven sons of Sceva, a Jewish chief priest, who did so.
  '15':
  - type: text
    content: And the evil spirit answered and said, “Jesus I know, and Paul I know; but who are you?”
  '16':
  - type: text
    content: 'Then the man in whom the evil spirit was leaped on them, overpowered them, and prevailed against them, so that they fled out of that house naked and wounded. '
  '17':
  - type: text
    content: 'This became known both to all Jews and Greeks dwelling in Ephesus; and '
  - type: note
    content: Luke 1:65; 7:16; Acts 2:43; 5:5, 11
  - type: text
    content: 'fear fell on them all, and the name of the Lord Jesus was magnified. '
  '18':
  - type: text
    content: 'And many who had believed came '
  - type: note
    content: Matt. 3:6
  - type: text
    content: 'confessing and telling their deeds. '
  '19':
  - type: text
    content: 'Also, many of those who had practiced magic brought their books together and burned '
  - type: text
    content: them
  - type: text
    content: ' in the sight of all. And they counted up the value of them, and '
  - type: text
    content: it
  - type: text
    content: ' totaled fifty thousand '
  - type: text
    content: pieces
  - type: text
    content: ' of silver. '
  '2':
  - type: text
    content: he said to them, “Did you receive the Holy Spirit when you believed?”
  - type: text
    content: 'So they said to him, '
  - type: note
    content: 1 Sam. 3:7; Acts 8:16
  - type: text
    content: “We have not so much as heard whether there is a Holy Spirit.”
  '20':
  - type: note
    content: Acts 6:7; 12:24
  - type: text
    content: So the word of the Lord grew mightily and prevailed.
  - type: heading
    content: The Riot at Ephesus
  '21':
  - type: note
    content: Rom. 15:25; Gal. 2:1
  - type: text
    content: 'When these things were accomplished, Paul '
  - type: note
    content: Acts 20:22; 2 Cor. 1:16
  - type: text
    content: 'purposed in the Spirit, when he had passed through '
  - type: note
    content: Acts 20:1; 1 Cor. 16:5
  - type: text
    content: 'Macedonia and Achaia, to go to Jerusalem, saying, “After I have been there, '
  - type: note
    content: Acts 18:21; 23:11; Rom. 1:13; 15:22–29
  - type: text
    content: 'I must also see Rome.” '
  '22':
  - type: text
    content: 'So he sent into Macedonia two of those who ministered to him, '
  - type: note
    content: 1 Tim. 1:2
  - type: text
    content: 'Timothy and '
  - type: note
    content: Rom. 16:23; 2 Tim. 4:20
  - type: text
    content: Erastus, but he himself stayed in Asia for a time.
  '23':
  - type: text
    content: 'And '
  - type: note
    content: 2 Cor. 1:8
  - type: text
    content: 'about that time there arose a great commotion about '
  - type: note
    content: Acts 9:2
  - type: text
    content: 'the Way. '
  '24':
  - type: text
    content: 'For a certain man named Demetrius, a silversmith, who made silver shrines of Diana, brought '
  - type: note
    content: Acts 16:16, 19
  - type: text
    content: 'no small profit to the craftsmen. '
  '25':
  - type: text
    content: 'He called them together with the workers of similar occupation, and said: “Men, you know that we have our prosperity by this trade. '
  '26':
  - type: text
    content: 'Moreover you see and hear that not only at Ephesus, but throughout almost all Asia, this Paul has persuaded and turned away many people, saying that '
  - type: note
    content: Deut. 4:28; Ps. 115:4; Is. 44:10–20; Jer. 10:3; Acts 17:29; 1 Cor. 8:4; 10:19; Rev. 9:20
  - type: text
    content: 'they are not gods which are made with hands. '
  '27':
  - type: text
    content: So not only is this trade of ours in danger of falling into disrepute, but also the temple of the great goddess Diana may be despised and her magnificence destroyed, whom all Asia and the world worship.”
  '28':
  - type: text
    content: 'Now when they heard '
  - type: text
    content: this,
  - type: text
    content: ' they were full of wrath and cried out, saying, “Great '
  - type: text
    content: is
  - type: text
    content: ' Diana of the Ephesians!” '
  '29':
  - type: text
    content: 'So the whole city was filled with confusion, and rushed into the theater with one accord, having seized '
  - type: note
    content: Acts 20:4; Rom. 16:23; 1 Cor. 1:14; 3 John 1
  - type: text
    content: 'Gaius and '
  - type: note
    content: Acts 20:4; 27:2; Col. 4:10; Philem. 24
  - type: text
    content: 'Aristarchus, Macedonians, Paul’s travel companions. '
  '3':
  - type: text
    content: And he said to them, “Into what then were you baptized?”
  - type: text
    content: 'So they said, '
  - type: note
    content: Luke 7:29; Acts 18:25
  - type: text
    content: “Into John’s baptism.”
  '30':
  - type: text
    content: 'And when Paul wanted to go in to the people, the disciples would not allow him. '
  '31':
  - type: text
    content: 'Then some of the officials of Asia, who were his friends, sent to him pleading that he would not venture into the theater. '
  '32':
  - type: text
    content: 'Some therefore cried one thing and some another, for the assembly was confused, and most of them did not know why they had come together. '
  '33':
  - type: text
    content: 'And they drew Alexander out of the multitude, the Jews putting him forward. And '
  - type: note
    content: 1 Tim. 1:20; 2 Tim. 4:14
  - type: text
    content: 'Alexander '
  - type: note
    content: Acts 12:17
  - type: text
    content: 'motioned with his hand, and wanted to make his defense to the people. '
  '34':
  - type: text
    content: 'But when they found out that he was a Jew, all with one voice cried out for about two hours, “Great '
  - type: text
    content: is
  - type: text
    content: ' Diana of the Ephesians!”'
  '35':
  - type: text
    content: 'And when the city clerk had quieted the crowd, he said: “Men of Ephesus, what man is there who does not know that the city of the Ephesians is temple guardian of the great goddess Diana, and of the '
  - type: text
    content: image
  - type: text
    content: ' which fell down from Zeus? '
  '36':
  - type: text
    content: 'Therefore, since these things cannot be denied, you ought to be quiet and do nothing rashly. '
  '37':
  - type: text
    content: 'For you have brought these men here who are neither robbers of temples nor blasphemers of your goddess. '
  '38':
  - type: text
    content: 'Therefore, if Demetrius and his fellow craftsmen have a case against anyone, the courts are open and there are proconsuls. Let them bring charges against one another. '
  '39':
  - type: text
    content: 'But if you have any other inquiry to make, it shall be determined in the lawful assembly. '
  '4':
  - type: text
    content: 'Then Paul said, '
  - type: note
    content: Matt. 3:11; Mark 1:4, 7, 8; Luke 3:16; (John 1:15, 26, 27); Acts 13:24
  - type: text
    content: “John indeed baptized with a baptism of repentance, saying to the people that they should believe on Him who would come after him, that is, on Christ Jesus.”
  '40':
  - type: text
    content: 'For we are in danger of being called in question for today’s uproar, there being no reason which we may give to account for this disorderly gathering.” '
  '41':
  - type: text
    content: And when he had said these things, he dismissed the assembly.
  '5':
  - type: text
    content: 'When they heard '
  - type: text
    content: this,
  - type: text
    content: ' they were baptized '
  - type: note
    content: Matt. 28:19; Acts 8:12, 16; 10:48
  - type: text
    content: 'in the name of the Lord Jesus. '
  '6':
  - type: text
    content: 'And when Paul had '
  - type: note
    content: Acts 6:6; 8:17
  - type: text
    content: 'laid hands on them, the Holy Spirit came upon them, and '
  - type: note
    content: Mark 16:17; Acts 2:4; 10:46
  - type: text
    content: 'they spoke with tongues and prophesied. '
  '7':
  - type: text
    content: Now the men were about twelve in all.
  '8':
  - type: note
    content: Acts 17:2; 18:4
  - type: text
    content: 'And he went into the synagogue and spoke boldly for three months, reasoning and persuading '
  - type: note
    content: Acts 1:3; 28:23
  - type: text
    content: 'concerning the things of the kingdom of God. '
  '9':
  - type: text
    content: 'But '
  - type: note
    content: 2 Tim. 1:15; 2 Pet. 2:2; Jude 10
  - type: text
    content: 'when some were hardened and did not believe, but spoke evil '
  - type: note
    content: Acts 9:2; 19:23; 22:4; 24:14
  - type: text
    content: 'of the Way before the multitude, he departed from them and withdrew the disciples, reasoning daily in the school of Tyrannus. '
