document_id: NUM.10,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Two Silver Trumpets
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '10':
  - type: text
    content: 'Also '
  - type: note
    content: Lev. 23:24; Num. 29:1; 1 Chr. 15:24; 2 Chr. 5:12; Ps. 81:3
  - type: text
    content: 'in the day of your gladness, in your appointed feasts, and at the beginning of your months, you shall blow the trumpets over your burnt offerings and over the sacrifices of your peace offerings; and they shall be '
  - type: note
    content: Lev. 23:24; Num. 10:9
  - type: text
    content: 'a memorial for you before your God: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.”'
  - type: heading
    content: Departure from Sinai
  '11':
  - type: text
    content: 'Now it came to pass on the twentieth '
  - type: text
    content: day
  - type: text
    content: ' of the second month, in the second year, that the cloud '
  - type: note
    content: Num. 9:17
  - type: text
    content: 'was taken up from above the tabernacle of the Testimony. '
  '12':
  - type: text
    content: 'And the children of Israel set out from '
  - type: note
    content: Ex. 19:1; Num. 1:1; 9:5
  - type: text
    content: 'the Wilderness of Sinai on '
  - type: note
    content: Ex. 40:36
  - type: text
    content: 'their journeys; then the cloud settled down in the '
  - type: note
    content: Gen. 21:21; Num. 12:16; Deut. 1:1
  - type: text
    content: 'Wilderness of Paran. '
  '13':
  - type: text
    content: 'So they started out for the first time '
  - type: note
    content: Num. 10:5, 6
  - type: text
    content: 'according to the command of the '
  - type: heading
    content: Lord
  - type: text
    content: ' by the hand of Moses.'
  '14':
  - type: text
    content: 'The standard of the camp of the children of Judah '
  - type: note
    content: Num. 2:3–9
  - type: text
    content: 'set out first according to their armies; over their army was '
  - type: note
    content: Num. 1:7
  - type: text
    content: 'Nahshon the son of Amminadab. '
  '15':
  - type: text
    content: 'Over the army of the tribe of the children of Issachar '
  - type: text
    content: was
  - type: text
    content: ' Nethanel the son of Zuar. '
  '16':
  - type: text
    content: 'And over the army of the tribe of the children of Zebulun '
  - type: text
    content: was
  - type: text
    content: ' Eliab the son of Helon.'
  '17':
  - type: text
    content: 'Then '
  - type: note
    content: Num. 1:51
  - type: text
    content: 'the tabernacle was taken down; and the sons of Gershon and the sons of Merari set out, '
  - type: note
    content: Num. 4:21–32; 7:7–9
  - type: text
    content: carrying the tabernacle.
  '18':
  - type: text
    content: 'And '
  - type: note
    content: Num. 2:10–16
  - type: text
    content: 'the standard of the camp of Reuben set out according to their armies; over their army '
  - type: text
    content: was
  - type: text
    content: ' Elizur the son of Shedeur. '
  '19':
  - type: text
    content: 'Over the army of the tribe of the children of Simeon '
  - type: text
    content: was
  - type: text
    content: ' Shelumiel the son of Zurishaddai. '
  '2':
  - type: text
    content: '“Make two silver trumpets for yourself; you shall make them of hammered work; you shall use them for '
  - type: note
    content: Is. 1:13
  - type: text
    content: 'calling the congregation and for directing the movement of the camps. '
  '20':
  - type: text
    content: 'And over the army of the tribe of the children of Gad '
  - type: text
    content: was
  - type: text
    content: ' Eliasaph the son of Deuel.'
  '21':
  - type: text
    content: 'Then the Kohathites set out, carrying the '
  - type: note
    content: Num. 4:4–20; 7:9
  - type: text
    content: holy things. (The tabernacle would be prepared for their arrival.)
  '22':
  - type: text
    content: 'And '
  - type: note
    content: Num. 2:18–24
  - type: text
    content: 'the standard of the camp of the children of Ephraim set out according to their armies; over their army '
  - type: text
    content: was
  - type: text
    content: ' Elishama the son of Ammihud. '
  '23':
  - type: text
    content: 'Over the army of the tribe of the children of Manasseh '
  - type: text
    content: was
  - type: text
    content: ' Gamaliel the son of Pedahzur. '
  '24':
  - type: text
    content: 'And over the army of the tribe of the children of Benjamin '
  - type: text
    content: was
  - type: text
    content: ' Abidan the son of Gideoni.'
  '25':
  - type: text
    content: 'Then '
  - type: note
    content: Num. 2:25–31; Josh. 6:9
  - type: text
    content: 'the standard of the camp of the children of Dan (the rear guard of all the camps) set out according to their armies; over their army '
  - type: text
    content: was
  - type: text
    content: ' Ahiezer the son of Ammishaddai. '
  '26':
  - type: text
    content: 'Over the army of the tribe of the children of Asher '
  - type: text
    content: was
  - type: text
    content: ' Pagiel the son of Ocran. '
  '27':
  - type: text
    content: 'And over the army of the tribe of the children of Naphtali '
  - type: text
    content: was
  - type: text
    content: ' Ahira the son of Enan.'
  '28':
  - type: note
    content: Num. 2:34
  - type: text
    content: 'Thus '
  - type: text
    content: was
  - type: text
    content: ' the order of march of the children of Israel, according to their armies, when they began their journey.'
  '29':
  - type: text
    content: 'Now Moses said to '
  - type: note
    content: Judg. 4:11
  - type: text
    content: 'Hobab the son of '
  - type: note
    content: Ex. 2:18; 3:1; 18:12
  - type: text
    content: 'Reuel the Midianite, Moses’ father-in-law, “We are setting out for the place of which the '
  - type: heading
    content: Lord
  - type: text
    content: ' said, '
  - type: note
    content: Gen. 12:7; Ex. 6:4–8
  - type: text
    content: '‘I will give it to you.’ Come with us, and '
  - type: note
    content: Judg. 1:16
  - type: text
    content: 'we will treat you well; for '
  - type: note
    content: Gen. 32:12; Ex. 3:8
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' has promised good things to Israel.”'
  '3':
  - type: text
    content: 'When '
  - type: note
    content: Jer. 4:5; Joel 2:15
  - type: text
    content: 'they blow both of them, all the congregation shall gather before you at the door of the tabernacle of meeting. '
  '30':
  - type: text
    content: 'And he said to him, “I will not go, but I will depart to my '
  - type: text
    content: own
  - type: text
    content: ' land and to my relatives.”'
  '31':
  - type: text
    content: 'So '
  - type: text
    content: Moses
  - type: text
    content: ' said, “Please do not leave, inasmuch as you know how we are to camp in the wilderness, and you can be our '
  - type: note
    content: Job 29:15
  - type: text
    content: 'eyes. '
  '32':
  - type: text
    content: 'And it shall be, if you go with us—indeed it shall be—that '
  - type: note
    content: Ex. 18:9; Lev. 19:34; Judg. 1:16
  - type: text
    content: 'whatever good the '
  - type: heading
    content: Lord
  - type: text
    content: ' will do to us, the same we will do to you.”'
  '33':
  - type: text
    content: 'So they departed from '
  - type: note
    content: Ex. 3:1; Deut. 1:6
  - type: text
    content: 'the mountain of the '
  - type: heading
    content: Lord
  - type: text
    content: ' on a journey of three days; and the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Deut. 1:33; Josh. 3:3–6; Ezek. 20:6
  - type: text
    content: 'went before them for the three days’ journey, to search out a resting place for them. '
  '34':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 13:21; Neh. 9:12, 19
  - type: text
    content: 'the cloud of the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' above them by day when they went out from the camp.'
  '35':
  - type: text
    content: 'So it was, whenever the ark set out, that Moses said:'
  - type: note
    content: Ps. 68:1, 2; 132:8; Is. 17:12–14
  - type: text
    content: '“Rise up, O '
  - type: heading
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Let Your enemies be scattered,
  - type: text
    content: And let those who hate You flee before You.”
  '36':
  - type: text
    content: 'And when it rested, he said:'
  - type: text
    content: '“Return, O '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: To
  - type: text
    content: ' the many thousands of Israel.”'
  '4':
  - type: text
    content: 'But if they blow '
  - type: text
    content: only
  - type: text
    content: ' one, then the leaders, the '
  - type: note
    content: Ex. 18:21; Num. 1:16; 7:2
  - type: text
    content: 'heads of the divisions of Israel, shall gather to you. '
  '5':
  - type: text
    content: 'When you sound the '
  - type: note
    content: Joel 2:1
  - type: text
    content: 'advance, the camps that lie on the east side shall then begin their journey. '
  '6':
  - type: text
    content: 'When you sound the advance the second time, then '
  - type: note
    content: Num. 2:3
  - type: text
    content: 'the camps that lie '
  - type: note
    content: Num. 2:10
  - type: text
    content: 'on the south side shall begin their journey; they shall sound the call for them to begin their journeys. '
  '7':
  - type: text
    content: 'And when the assembly is to be gathered together, '
  - type: note
    content: Num. 10:3
  - type: text
    content: 'you shall blow, but not '
  - type: note
    content: Joel 2:1
  - type: text
    content: 'sound the advance. '
  '8':
  - type: note
    content: Num. 31:6; Josh. 6:4; 1 Chr. 15:24; 2 Chr. 13:12
  - type: text
    content: The sons of Aaron, the priests, shall blow the trumpets; and these shall be to you as an ordinance forever throughout your generations.
  '9':
  - type: note
    content: Num. 31:6; Josh. 6:5; 2 Chr. 13:14
  - type: text
    content: '“When you go to war in your land against the enemy who '
  - type: note
    content: Judg. 2:18; 4:3; 6:9; 10:8, 12
  - type: text
    content: 'oppresses you, then you shall sound an alarm with the trumpets, and you will be '
  - type: note
    content: Gen. 8:1; Ps. 106:4
  - type: text
    content: 'remembered before the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, and you will be saved from your enemies. '
