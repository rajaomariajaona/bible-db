  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore the Jews '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 7:1, 19
      marker-yv: yv-n
    - type: text
      text: 'sought all the more to kill Him, because He not only broke the Sabbath, but also said that God was His Father, '
    - type: usfm
