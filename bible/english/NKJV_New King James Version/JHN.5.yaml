      marker-yv: yv-n
    - type: text
      text: 'making Himself equal with God. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus answered and said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Most assuredly, I say to you, '
    - type: usfm
      marker: x
