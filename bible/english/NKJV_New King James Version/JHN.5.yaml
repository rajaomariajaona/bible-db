document_id: JHN.5,114
type_code: eng
verses:
  '1':
  - type: heading
    content: A Man Healed at the Pool of Bethesda
  - type: text
    content: 'After '
  - type: note
    content: Lev. 23:2; Deut. 16:16
  - type: text
    content: 'this there was a feast of the Jews, and Jesus '
  - type: note
    content: John 2:13
  - type: text
    content: 'went up to Jerusalem. '
  '10':
  - type: text
    content: 'The Jews therefore said to him who was cured, “It is the Sabbath; '
  - type: note
    content: Ex. 20:10; Neh. 13:19; Jer. 17:21, 22; Matt. 12:2; Mark 2:24; Luke 6:2
  - type: text
    content: it is not lawful for you to carry your bed.”
  '11':
  - type: text
    content: 'He answered them, “He who made me well said to me, '
  - type: text
    content: ‘Take up your bed and walk.’
  - type: text
    content: ' ”'
  '12':
  - type: text
    content: 'Then they asked him, “Who is the Man who said to you, '
  - type: text
    content: ‘Take up your bed and walk’
  - type: text
    content: '?” '
  '13':
  - type: text
    content: 'But the one who was '
  - type: note
    content: Luke 13:14; 22:51
  - type: text
    content: 'healed did not know who it was, for Jesus had withdrawn, a multitude being in '
  - type: text
    content: that
  - type: text
    content: ' place. '
  '14':
  - type: text
    content: 'Afterward Jesus found him in the temple, and said to him, '
  - type: text
    content: '“See, you have been made well. '
  - type: note
    content: Matt. 12:45; (Mark 2:5); John 8:11
  - type: text
    content: Sin no more, lest a worse thing come upon you.”
  '15':
  - type: text
    content: The man departed and told the Jews that it was Jesus who had made him well.
  - type: heading
    content: Honor the Father and the Son
  '16':
  - type: text
    content: 'For this reason the Jews '
  - type: note
    content: Luke 4:29; John 8:37; 10:39
  - type: text
    content: 'persecuted Jesus, and sought to kill Him, because He had done these things on the Sabbath. '
  '17':
  - type: text
    content: 'But Jesus answered them, '
  - type: note
    content: (John 9:4; 17:4)
  - type: text
    content: “My Father has been working until now, and I have been working.”
  '18':
  - type: text
    content: 'Therefore the Jews '
  - type: note
    content: John 7:1, 19
  - type: text
    content: 'sought all the more to kill Him, because He not only broke the Sabbath, but also said that God was His Father, '
  - type: note
    content: John 10:30; Phil. 2:6
  - type: text
    content: 'making Himself equal with God. '
  '19':
  - type: text
    content: 'Then Jesus answered and said to them, '
  - type: text
    content: '“Most assuredly, I say to you, '
  - type: note
    content: Matt. 26:39; John 5:30; 6:38; 8:28; 12:49; 14:10
  - type: text
    content: the Son can do nothing of Himself, but what He sees the Father do; for whatever He does, the Son also does in like manner.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Now there is in Jerusalem '
  - type: note
    content: Neh. 3:1, 32; 12:39
  - type: text
    content: 'by the Sheep '
  - type: text
    content: Gate
  - type: text
    content: ' a pool, which is called in Hebrew, Bethesda, having five porches. '
  '20':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 3:17; John 3:35; 2 Pet. 1:17
  - type: text
    content: 'the Father loves the Son, and '
  - type: note
    content: (Matt. 11:27)
  - type: text
    content: shows Him all things that He Himself does; and He will show Him greater works than these, that you may marvel.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'For as the Father raises the dead and gives life to '
  - type: text
    content: them,
  - type: text
    content: ' '
  - type: note
    content: Luke 7:14; 8:54; (John 11:25)
  - type: text
    content: even so the Son gives life to whom He will.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'For the Father judges no one, but '
  - type: note
    content: Matt. 11:27; 28:18; (John 3:35; 17:2; Acts 17:31; 1 Pet. 4:5)
  - type: text
    content: has committed all judgment to the Son,
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'that all should honor the Son just as they honor the Father. '
  - type: note
    content: Luke 10:16; 1 John 2:23
  - type: text
    content: He who does not honor the Son does not honor the Father who sent Him.
  - type: heading
    content: Life and Judgment Are Through the Son
  '24':
  - type: text
    content: '“Most assuredly, I say to you, '
  - type: note
    content: John 3:16, 18; 6:47
  - type: text
    content: 'he who hears My word and believes in Him who sent Me has everlasting life, and shall not come into judgment, '
  - type: note
    content: (1 John 3:14)
  - type: text
    content: but has passed from death into life.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Most assuredly, I say to you, the hour is coming, and now is, when '
  - type: note
    content: (Eph. 2:1, 5; Col. 2:13)
  - type: text
    content: the dead will hear the voice of the Son of God; and those who hear will live.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'For '
  - type: note
    content: Ps. 36:9
  - type: text
    content: 'as the Father has life in Himself, so He has granted the Son to have '
  - type: note
    content: (John 1:4; 14:6); 1 Cor. 15:45
  - type: text
    content: life in Himself,
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'and '
  - type: note
    content: John 9:39; (Acts 10:42; 17:31)
  - type: text
    content: 'has given Him authority to execute judgment also, '
  - type: note
    content: Dan. 7:13
  - type: text
    content: because He is the Son of Man.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Do not marvel at this; for the hour is coming in which all who are in the graves will '
  - type: note
    content: (1 Thess. 4:15–17)
  - type: text
    content: hear His voice
  - type: text
    content: ' '
  '29':
  - type: note
    content: Is. 26:19; (1 Cor. 15:52)
  - type: text
    content: and come forth—
  - type: note
    content: Dan. 12:2; Matt. 25:46; Acts 24:15
  - type: text
    content: those who have done good, to the resurrection of life, and those who have done evil, to the resurrection of condemnation.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'In these lay a great multitude of sick people, blind, lame, paralyzed, waiting for the moving of the water. '
  '30':
  - type: note
    content: John 5:19
  - type: text
    content: 'I can of Myself do nothing. As I hear, I judge; and My judgment is righteous, because '
  - type: note
    content: Matt. 26:39; John 4:34; 6:38
  - type: text
    content: I do not seek My own will but the will of the Father who sent Me.
  - type: heading
    content: The Fourfold Witness
  '31':
  - type: note
    content: John 8:14; Rev. 3:14
  - type: text
    content: '“If I bear witness of Myself, My witness is not '
  - type: text
    content: true.
  - type: text
    content: ' '
  '32':
  - type: note
    content: (Matt. 3:17; John 8:18; 1 John 5:6)
  - type: text
    content: There is another who bears witness of Me, and I know that the witness which He witnesses of Me is true.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'You have sent to John, '
  - type: note
    content: (John 1:15, 19, 27, 32)
  - type: text
    content: and he has borne witness to the truth.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Yet I do not receive testimony from man, but I say these things that you may be saved.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'He was the burning and '
  - type: note
    content: 2 Sam. 21:17; 2 Pet. 1:19
  - type: text
    content: 'shining lamp, and '
  - type: note
    content: Matt. 13:20; Mark 6:20
  - type: text
    content: you were willing for a time to rejoice in his light.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'But '
  - type: note
    content: 1 John 5:9
  - type: text
    content: 'I have a greater witness than John’s; for '
  - type: note
    content: John 3:2; 10:25; 17:4
  - type: text
    content: 'the works which the Father has given Me to finish—the very '
  - type: note
    content: John 9:16; 10:38
  - type: text
    content: works that I do—bear witness of Me, that the Father has sent Me.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'And the Father Himself, who sent Me, '
  - type: note
    content: Matt. 3:17; John 6:27; 8:18
  - type: text
    content: 'has testified of Me. You have neither heard His voice at any time, '
  - type: note
    content: Deut. 4:12; John 1:18; 1 Tim. 1:17; 1 John 4:12
  - type: text
    content: nor seen His form.
  - type: text
    content: ' '
  '38':
  - type: text
    content: But you do not have His word abiding in you, because whom He sent, Him you do not believe.
  - type: text
    content: ' '
  '39':
  - type: note
    content: Is. 8:20; 34:16; Luke 16:29; Acts 17:11
  - type: text
    content: 'You search the Scriptures, for in them you think you have eternal life; and '
  - type: note
    content: Deut. 18:15, 18; Luke 24:27
  - type: text
    content: these are they which testify of Me.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'For an angel went down at a certain time into the pool and stirred up the water; then whoever stepped in first, after the stirring of the water, was made well of whatever disease he had. '
  '40':
  - type: note
    content: (John 1:11; 3:19)
  - type: text
    content: But you are not willing to come to Me that you may have life.
  '41':
  - type: note
    content: John 5:44; 7:18; 1 Thess. 2:6
  - type: text
    content: “I do not receive honor from men.
  - type: text
    content: ' '
  '42':
  - type: text
    content: But I know you, that you do not have the love of God in you.
  - type: text
    content: ' '
  '43':
  - type: text
    content: I have come in My Father’s name, and you do not receive Me; if another comes in his own name, him you will receive.
  - type: text
    content: ' '
  '44':
  - type: note
    content: John 12:43
  - type: text
    content: 'How can you believe, who receive honor from one another, and do not seek '
  - type: note
    content: (Rom. 2:29)
  - type: text
    content: 'the honor that '
  - type: text
    content: comes
  - type: text
    content: ' from the only God?'
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Do not think that I shall accuse you to the Father; '
  - type: note
    content: Rom. 2:12
  - type: text
    content: 'there is '
  - type: text
    content: one
  - type: text
    content: ' who accuses you—Moses, in whom you trust.'
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'For if you believed Moses, you would believe Me; '
  - type: note
    content: (Gen. 3:15); Deut. 18:15, 18; John 1:45; Acts 26:22
  - type: text
    content: for he wrote about Me.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'But if you '
  - type: note
    content: Luke 16:29, 31
  - type: text
    content: do not believe his writings, how will you believe My words?”
  '5':
  - type: text
    content: 'Now a certain man was there who had an infirmity thirty-eight years. '
  '6':
  - type: text
    content: 'When Jesus saw him lying there, and knew that he already had been '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: condition
  - type: text
    content: ' a long time, He said to him, '
  - type: text
    content: “Do you want to be made well?”
  '7':
  - type: text
    content: The sick man answered Him, “Sir, I have no man to put me into the pool when the water is stirred up; but while I am coming, another steps down before me.”
  '8':
  - type: text
    content: 'Jesus said to him, '
  - type: note
    content: Matt. 9:6; Mark 2:11; Luke 5:24
  - type: text
    content: “Rise, take up your bed and walk.”
  - type: text
    content: ' '
  '9':
  - type: text
    content: And immediately the man was made well, took up his bed, and walked.
  - type: text
    content: 'And '
  - type: note
    content: John 9:14
  - type: text
    content: 'that day was the Sabbath. '
