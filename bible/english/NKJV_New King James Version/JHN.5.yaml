      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Sin no more, lest a worse thing come upon you.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The man departed and told the Jews that it was Jesus who had made him well.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Honor the Father and the Son
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this reason the Jews '
    - type: usfm
