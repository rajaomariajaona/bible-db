      children:
      - type: text
        text: that
    - type: text
      text: ' place. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward Jesus found him in the temple, and said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“See, you have been made well. '
    - type: usfm
      marker: x
