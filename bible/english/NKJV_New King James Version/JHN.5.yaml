    - type: text
      text: ' ”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they asked him, “Who is the Man who said to you, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Take up your bed and walk’
    - type: text
      text: '?” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the one who was '
