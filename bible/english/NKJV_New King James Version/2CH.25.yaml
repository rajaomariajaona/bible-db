document_id: 2CH.25,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amaziah Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Amaziah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 14:1–6
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty-five years old '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when
    - type: text
      text: ' he became king, and he reigned twenty-nine years in Jerusalem. His mother’s name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Jehoaddan of Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: So Amaziah discharged the troops that had come to him from Ephraim, to go back home. Therefore their anger was greatly aroused against Judah, and they returned home in great anger.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then Amaziah strengthened himself, and leading his people, he went to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 14:7
      marker-yv: yv-n
    - type: text
      text: 'the Valley of Salt and killed ten thousand of the people of Seir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Also the children of Judah took captive ten thousand alive, brought them to the top of the rock, and cast them down from the top of the rock, so that they all were dashed in pieces.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But as for the soldiers of the army which Amaziah had discharged, so that they would not go with him to battle, they raided the cities of Judah from Samaria to Beth Horon, killed three thousand in them, and took much spoil.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now it was so, after Amaziah came from the slaughter of the Edomites, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 28:23
      marker-yv: yv-n
    - type: text
      text: 'he brought the gods of the people of Seir, set them up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 20:3, 5)
      marker-yv: yv-n
    - type: text
      text: 'his gods, and bowed down before them and burned incense to them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Therefore the anger of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was aroused against Amaziah, and He sent him a prophet who said to him, “Why have you sought '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 96:5)
      marker-yv: yv-n
    - type: text
      text: 'the gods of the people, which '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 25:11
      marker-yv: yv-n
    - type: text
      text: could not rescue their own people from your hand?”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So it was, as he talked with him, that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: king
    - type: text
      text: ' said to him, “Have we made you the king’s counselor? Cease! Why should you be killed?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the prophet ceased, and said, “I know that God has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Sam. 2:25)
      marker-yv: yv-n
    - type: text
      text: determined to destroy you, because you have done this and have not heeded my advice.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel Defeats Judah
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 14:8–14
      marker-yv: yv-n
    - type: text
      text: 'Amaziah king of Judah asked advice and sent to Joash the son of Jehoahaz, the son of Jehu, king of Israel, saying, “Come, let us face one another '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: battle.
    - type: text
      text: ”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And Joash king of Israel sent to Amaziah king of Judah, saying, “The thistle that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in Lebanon sent to the cedar that was in Lebanon, saying, ‘Give your daughter to my son as wife’; and a wild beast that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in Lebanon passed by and trampled the thistle. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Indeed you say that you have defeated the Edomites, and your heart is lifted up to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 26:16; 32:25; (Prov. 16:18)
      marker-yv: yv-n
    - type: text
      text: boast. Stay at home now; why should you meddle with trouble, that you should fall—you and Judah with you?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he did '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' right in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 14:4; 2 Chr. 25:14
      marker-yv: yv-n
    - type: text
      text: but not with a loyal heart.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But Amaziah would not heed, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:15; 2 Chr. 22:7
      marker-yv: yv-n
    - type: text
      text: 'it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: came
    - type: text
      text: ' from God, that He might give them into the hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: enemies,
    - type: text
      text: ' because they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 25:14
      marker-yv: yv-n
    - type: text
      text: 'sought the gods of Edom. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So Joash king of Israel went out; and he and Amaziah king of Judah faced one another at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:38
      marker-yv: yv-n
    - type: text
      text: 'Beth Shemesh, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belongs
    - type: text
      text: ' to Judah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And Judah was defeated by Israel, and every man fled to his tent. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Then Joash the king of Israel captured Amaziah king of Judah, the son of Joash, the son of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 21:17; 22:1, 6
      marker-yv: yv-n
    - type: text
      text: 'Jehoahaz, at Beth Shemesh; and he brought him to Jerusalem, and broke down the wall of Jerusalem from the Gate of Ephraim to the Corner Gate—four hundred cubits. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: took
    - type: text
      text: ' all the gold and silver, all the articles that were found in the house of God with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 26:15
      marker-yv: yv-n
    - type: text
      text: Obed-Edom, the treasures of the king’s house, and hostages, and returned to Samaria.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Death of Amaziah
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 14:17–22
      marker-yv: yv-n
    - type: text
      text: 'Amaziah the son of Joash, king of Judah, lived fifteen years after the death of Joash the son of Jehoahaz, king of Israel. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Now the rest of the acts of Amaziah, from first to last, indeed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the kings of Judah and Israel? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'After the time that Amaziah turned away from following the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', they made a conspiracy against him in Jerusalem, and he fled to Lachish; but they sent after him to Lachish and killed him there. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Then they brought him on horses and buried him with his fathers in the City of Judah.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 14:5; 2 Chr. 24:25
      marker-yv: yv-n
    - type: text
      text: 'Now it happened, as soon as the kingdom was established for him, that he executed his servants who had murdered his father the king. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'However he did not execute their children, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: did
    - type: text
      text: ' as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' written in the Law in the Book of Moses, where the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 24:16; 2 Kin. 14:6; Jer. 31:30; (Ezek. 18:20)
      marker-yv: yv-n
    - type: text
      text: “The fathers shall not be put to death for their children, nor shall the children be put to death for their fathers; but a person shall die for his own sin.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The War Against Edom
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Moreover Amaziah gathered Judah together and set over them captains of thousands and captains of hundreds, according to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' fathers’ houses, throughout all Judah and Benjamin; and he numbered them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 1:3
      marker-yv: yv-n
    - type: text
      text: 'from twenty years old and above, and found them to be three hundred thousand choice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men, able
    - type: text
      text: ' to go to war, who could handle spear and shield. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'He also hired one hundred thousand mighty men of valor from Israel for one hundred talents of silver. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 11:2
      marker-yv: yv-n
    - type: text
      text: 'man of God came to him, saying, “O king, do not let the army of Israel go with you, for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not with Israel—'
    - type: usfm
      marker: it
      children:
      - type: text
        text: not
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' any of the children of Ephraim. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But if you go, be gone! Be strong in battle! '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Even
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so,
    - type: text
      text: ' God shall make you fall before the enemy; for God has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 14:11; 20:6
      marker-yv: yv-n
    - type: text
      text: power to help and to overthrow.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then Amaziah said to the man of God, “But what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we
    - type: text
      text: ' do about the hundred talents which I have given to the troops of Israel?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the man of God answered, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 8:18); Prov. 10:22
      marker-yv: yv-n
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is able to give you much more than this.” '
