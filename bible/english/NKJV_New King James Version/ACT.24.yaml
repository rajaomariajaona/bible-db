document_id: ACT.24,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Accused of Sedition
  - type: text
    content: 'Now after '
  - type: note
    content: Acts 21:27
  - type: text
    content: 'five days '
  - type: note
    content: Acts 23:2, 30, 35; 25:2
  - type: text
    content: 'Ananias the high priest came down with the elders and a certain orator '
  - type: text
    content: named
  - type: text
    content: ' Tertullus. These gave evidence to the governor against Paul.'
  '10':
  - type: text
    content: 'Then Paul, after the governor had nodded to him to speak, answered: “Inasmuch as I know that you have been for many years a judge of this nation, I do the more cheerfully answer for myself, '
  '11':
  - type: text
    content: 'because you may ascertain that it is no more than twelve days since I went up to Jerusalem '
  - type: note
    content: Acts 21:15, 18, 26, 27; 24:17
  - type: text
    content: 'to worship. '
  '12':
  - type: note
    content: Acts 25:8; 28:17
  - type: text
    content: 'And they neither found me in the temple disputing with anyone nor inciting the crowd, either in the synagogues or in the city. '
  '13':
  - type: text
    content: 'Nor can they prove the things of which they now accuse me. '
  '14':
  - type: text
    content: 'But this I confess to you, that according to '
  - type: note
    content: Amos 8:14; Acts 9:2; 24:22
  - type: text
    content: 'the Way which they call a sect, so I worship the '
  - type: note
    content: 2 Tim. 1:3
  - type: text
    content: 'God of my fathers, believing all things which are written in '
  - type: note
    content: Acts 26:22; 28:23
  - type: text
    content: 'the Law and in the Prophets. '
  '15':
  - type: note
    content: Acts 23:6; 26:6, 7; 28:20
  - type: text
    content: 'I have hope in God, which they themselves also accept, '
  - type: note
    content: (Dan. 12:2; John 5:28, 29; 11:24)
  - type: text
    content: 'that there will be a resurrection of '
  - type: text
    content: the
  - type: text
    content: ' dead, both of '
  - type: text
    content: the
  - type: text
    content: ' just and '
  - type: text
    content: the
  - type: text
    content: ' unjust. '
  '16':
  - type: note
    content: Acts 23:1
  - type: text
    content: 'This '
  - type: text
    content: being
  - type: text
    content: ' so, I myself always strive to have a conscience without offense toward God and men.'
  '17':
  - type: text
    content: '“Now after many years '
  - type: note
    content: Acts 11:29, 30; Rom. 15:25–28; 1 Cor. 16:1–4; 2 Cor. 8:1–4; 9:1, 2, 12; Gal. 2:10
  - type: text
    content: 'I came to bring alms and offerings to my nation, '
  '18':
  - type: note
    content: Acts 21:27; 26:21
  - type: text
    content: 'in the midst of which some Jews from Asia found me '
  - type: note
    content: Acts 21:26
  - type: text
    content: 'purified in the temple, neither with a mob nor with tumult. '
  '19':
  - type: note
    content: (Acts 23:30; 25:16)
  - type: text
    content: 'They ought to have been here before you to object if they had anything against me. '
  '2':
  - type: text
    content: 'And when he was called upon, Tertullus began his accusation, saying: “Seeing that through you we enjoy great peace, and prosperity is being brought to this nation by your foresight, '
  '20':
  - type: text
    content: 'Or else let those who are '
  - type: text
    content: here
  - type: text
    content: ' themselves say if they found any wrongdoing in me while I stood before the council, '
  '21':
  - type: text
    content: 'unless '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' for this one statement which I cried out, standing among them, '
  - type: note
    content: (Acts 23:6; 24:15; 28:20)
  - type: text
    content: ‘Concerning the resurrection of the dead I am being judged by you this day.’ ”
  - type: heading
    content: Felix Procrastinates
  '22':
  - type: text
    content: 'But when Felix heard these things, having more accurate knowledge of '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: note
    content: Acts 9:2; 18:26; 19:9, 23; 22:4
  - type: text
    content: 'Way, he adjourned the proceedings and said, “When '
  - type: note
    content: Acts 23:26; 24:7
  - type: text
    content: 'Lysias the commander comes down, I will make a decision on your case.” '
  '23':
  - type: text
    content: 'So he commanded the centurion to keep Paul and to let '
  - type: text
    content: him
  - type: text
    content: ' have liberty, and '
  - type: note
    content: Acts 23:16; 27:3; 28:16
  - type: text
    content: told him not to forbid any of his friends to provide for or visit him.
  '24':
  - type: text
    content: 'And after some days, when Felix came with his wife Drusilla, who was Jewish, he sent for Paul and heard him concerning the '
  - type: note
    content: (John 3:15; 5:24; 11:25; 12:46; 20:31; Rom. 10:9)
  - type: text
    content: 'faith in Christ. '
  '25':
  - type: text
    content: 'Now as he reasoned about righteousness, self-control, and the judgment to come, Felix was afraid and answered, “Go away for now; when I have a convenient time I will call for you.” '
  '26':
  - type: text
    content: 'Meanwhile he also hoped that '
  - type: note
    content: Ex. 23:8
  - type: text
    content: money would be given him by Paul, that he might release him. Therefore he sent for him more often and conversed with him.
  '27':
  - type: text
    content: 'But after two years Porcius Festus succeeded Felix; and Felix, '
  - type: note
    content: Ex. 23:2; Acts 12:3; 23:35; 25:9, 14
  - type: text
    content: wanting to do the Jews a favor, left Paul bound.
  '3':
  - type: text
    content: 'we accept '
  - type: text
    content: it
  - type: text
    content: ' always and in all places, most noble Felix, with all thankfulness. '
  '4':
  - type: text
    content: 'Nevertheless, not to be tedious to you any further, I beg you to hear, by your courtesy, a few words from us. '
  '5':
  - type: note
    content: Luke 23:2; Acts 6:13; 16:20; 17:6; 21:28; 1 Pet. 2:12, 15
  - type: text
    content: 'For we have found this man a plague, a creator of dissension among all the Jews throughout the world, and a ringleader of the sect of the Nazarenes. '
  '6':
  - type: note
    content: Acts 21:28
  - type: text
    content: 'He even tried to profane the temple, and we seized him, and wanted '
  - type: note
    content: John 18:31
  - type: text
    content: 'to judge him according to our law. '
  '7':
  - type: note
    content: Acts 21:33; 23:10
  - type: text
    content: 'But the commander Lysias came by and with great violence took '
  - type: text
    content: him
  - type: text
    content: ' out of our hands, '
  '8':
  - type: note
    content: Acts 23:30
  - type: text
    content: 'commanding his accusers to come to you. By examining him yourself you may ascertain all these things of which we accuse him.” '
  '9':
  - type: text
    content: And the Jews also assented, maintaining that these things were so.
  - type: heading
    content: The Defense Before Felix
