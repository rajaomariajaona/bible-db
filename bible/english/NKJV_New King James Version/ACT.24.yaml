document_id: ACT.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Accused of Sedition
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now after '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 21:27
    marker-yv: yv-n
  - type: text
    text: 'five days '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 23:2, 30, 35; 25:2
    marker-yv: yv-n
  - type: text
    text: 'Ananias the high priest came down with the elders and a certain orator '
  - type: usfm
    marker: it
    children:
    - type: text
      text: named
  - type: text
    text: ' Tertullus. These gave evidence to the governor against Paul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And when he was called upon, Tertullus began his accusation, saying: “Seeing that through you we enjoy great peace, and prosperity is being brought to this nation by your foresight, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'we accept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' always and in all places, most noble Felix, with all thankfulness. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nevertheless, not to be tedious to you any further, I beg you to hear, by your courtesy, a few words from us. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 23:2; Acts 6:13; 16:20; 17:6; 21:28; 1 Pet. 2:12, 15
    marker-yv: yv-n
  - type: text
    text: 'For we have found this man a plague, a creator of dissension among all the Jews throughout the world, and a ringleader of the sect of the Nazarenes. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 21:28
    marker-yv: yv-n
  - type: text
    text: 'He even tried to profane the temple, and we seized him, and wanted '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 18:31
    marker-yv: yv-n
  - type: text
    text: 'to judge him according to our law. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 21:33; 23:10
    marker-yv: yv-n
  - type: text
    text: 'But the commander Lysias came by and with great violence took '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' out of our hands, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 23:30
    marker-yv: yv-n
  - type: text
    text: 'commanding his accusers to come to you. By examining him yourself you may ascertain all these things of which we accuse him.” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And the Jews also assented, maintaining that these things were so.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Defense Before Felix
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Paul, after the governor had nodded to him to speak, answered: “Inasmuch as I know that you have been for many years a judge of this nation, I do the more cheerfully answer for myself, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'because you may ascertain that it is no more than twelve days since I went up to Jerusalem '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 21:15, 18, 26, 27; 24:17
    marker-yv: yv-n
  - type: text
    text: 'to worship. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 25:8; 28:17
    marker-yv: yv-n
  - type: text
    text: 'And they neither found me in the temple disputing with anyone nor inciting the crowd, either in the synagogues or in the city. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nor can they prove the things of which they now accuse me. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But this I confess to you, that according to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Amos 8:14; Acts 9:2; 24:22
    marker-yv: yv-n
  - type: text
    text: 'the Way which they call a sect, so I worship the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Tim. 1:3
    marker-yv: yv-n
  - type: text
    text: 'God of my fathers, believing all things which are written in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 26:22; 28:23
    marker-yv: yv-n
  - type: text
    text: 'the Law and in the Prophets. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 23:6; 26:6, 7; 28:20
    marker-yv: yv-n
  - type: text
    text: 'I have hope in God, which they themselves also accept, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Dan. 12:2; John 5:28, 29; 11:24)
    marker-yv: yv-n
  - type: text
    text: 'that there will be a resurrection of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' dead, both of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' just and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' unjust. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 23:1
    marker-yv: yv-n
  - type: text
    text: 'This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: being
  - type: text
    text: ' so, I myself always strive to have a conscience without offense toward God and men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Now after many years '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 11:29, 30; Rom. 15:25–28; 1 Cor. 16:1–4; 2 Cor. 8:1–4; 9:1, 2, 12; Gal. 2:10
    marker-yv: yv-n
  - type: text
    text: 'I came to bring alms and offerings to my nation, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 21:27; 26:21
    marker-yv: yv-n
  - type: text
    text: 'in the midst of which some Jews from Asia found me '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 21:26
    marker-yv: yv-n
  - type: text
    text: 'purified in the temple, neither with a mob nor with tumult. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Acts 23:30; 25:16)
    marker-yv: yv-n
  - type: text
    text: 'They ought to have been here before you to object if they had anything against me. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Or else let those who are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: here
  - type: text
    text: ' themselves say if they found any wrongdoing in me while I stood before the council, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'unless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' for this one statement which I cried out, standing among them, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Acts 23:6; 24:15; 28:20)
    marker-yv: yv-n
  - type: text
    text: ‘Concerning the resurrection of the dead I am being judged by you this day.’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Felix Procrastinates
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But when Felix heard these things, having more accurate knowledge of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 9:2; 18:26; 19:9, 23; 22:4
    marker-yv: yv-n
  - type: text
    text: 'Way, he adjourned the proceedings and said, “When '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 23:26; 24:7
    marker-yv: yv-n
  - type: text
    text: 'Lysias the commander comes down, I will make a decision on your case.” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So he commanded the centurion to keep Paul and to let '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' have liberty, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 23:16; 27:3; 28:16
    marker-yv: yv-n
  - type: text
    text: told him not to forbid any of his friends to provide for or visit him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And after some days, when Felix came with his wife Drusilla, who was Jewish, he sent for Paul and heard him concerning the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 3:15; 5:24; 11:25; 12:46; 20:31; Rom. 10:9)
    marker-yv: yv-n
  - type: text
    text: 'faith in Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now as he reasoned about righteousness, self-control, and the judgment to come, Felix was afraid and answered, “Go away for now; when I have a convenient time I will call for you.” '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Meanwhile he also hoped that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:8
    marker-yv: yv-n
  - type: text
    text: money would be given him by Paul, that he might release him. Therefore he sent for him more often and conversed with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But after two years Porcius Festus succeeded Felix; and Felix, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:2; Acts 12:3; 23:35; 25:9, 14
    marker-yv: yv-n
  - type: text
    text: wanting to do the Jews a favor, left Paul bound.
