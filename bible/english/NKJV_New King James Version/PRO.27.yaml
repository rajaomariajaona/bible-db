document_id: PRO.27,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Do
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 12:19–21; James 4:13–16
      marker-yv: yv-n
    - type: text
      text: ' not boast about tomorrow,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For you do not know what a day may bring forth.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Do not forsake your own friend or your father’s friend,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor go to your brother’s house in the day of your calamity;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 17:17; 18:24
      marker-yv: yv-n
    - type: text
      text: 'Better '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a neighbor nearby than a brother far away.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: My son, be wise, and make my heart glad,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 10:1; 23:15–26
      marker-yv: yv-n
    - type: text
      text: That I may answer him who reproaches me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'A prudent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' foresees evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hides himself;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The simple pass on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 22:3
      marker-yv: yv-n
    - type: text
      text: punished.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Take the garment of him who is surety for a stranger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And hold it in pledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when
    - type: text
      text: ' he is surety for a seductress.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He who blesses his friend with a loud voice, rising early in the morning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It will be counted a curse to him.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'A '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 19:13
      marker-yv: yv-n
    - type: text
      text: continual dripping on a very rainy day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a contentious woman are alike;
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Whoever restrains her restrains the wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And grasps oil with his right hand.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' iron sharpens iron,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So a man sharpens the countenance of his friend.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 18:31; Song 8:12; Is. 36:16; (1 Cor. 3:8; 9:7–13); 2 Tim. 2:6
      marker-yv: yv-n
    - type: text
      text: Whoever keeps the fig tree will eat its fruit;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So he who waits on his master will be honored.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'As in water face '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reflects
    - type: text
      text: ' face,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So a man’s heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reveals
    - type: text
      text: ' the man.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 25:27; 2 Cor. 10:12, 18; 12:11
      marker-yv: yv-n
    - type: text
      text: Let another man praise you, and not your own mouth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A stranger, and not your own lips.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 30:15, 16; Hab. 2:5
      marker-yv: yv-n
    - type: text
      text: Hell and Destruction are never full;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 1:8; 4:8
      marker-yv: yv-n
    - type: text
      text: the eyes of man are never satisfied.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 17:3
      marker-yv: yv-n
    - type: text
      text: 'The refining pot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' for silver and the furnace for gold,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And a man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: valued
    - type: text
      text: ' by what others say of him.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 23:35; 26:11; Jer. 5:3
      marker-yv: yv-n
    - type: text
      text: Though you grind a fool in a mortar with a pestle along with crushed grain,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yet
    - type: text
      text: ' his foolishness will not depart from him.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Be diligent to know the state of your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 24:27
      marker-yv: yv-n
    - type: text
      text: flocks,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' attend to your herds;'
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'For riches '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' not forever,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nor does a crown '
    - type: usfm
      marker: it
      children:
      - type: text
        text: endure
    - type: text
      text: ' to all generations.'
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 104:14
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: When
    - type: text
      text: ' the hay is removed, and the tender grass shows itself,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the herbs of the mountains are gathered in,
  '26':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The lambs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: provide
    - type: text
      text: ' your clothing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the goats the price of a field;
  '27':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: it
      children:
      - type: text
        text: You
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' enough goats’ milk for your food,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the food of your household,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the nourishment of your maidservants.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'A stone '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' heavy and sand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' weighty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a fool’s wrath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' heavier than both of them.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Wrath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' cruel and anger a torrent,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 6:34; 1 John 3:12
      marker-yv: yv-n
    - type: text
      text: 'who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' able to stand before jealousy?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 28:23); Gal. 2:14
      marker-yv: yv-n
    - type: text
      text: 'Open rebuke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' better'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Than love carefully concealed.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Faithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the wounds of a friend,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the kisses of an enemy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 26:49
      marker-yv: yv-n
    - type: text
      text: deceitful.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: A satisfied soul loathes the honeycomb,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But to a hungry soul every bitter thing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' sweet.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Like a bird that wanders from its nest
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' a man who wanders from his place.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ointment and perfume delight the heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the sweetness of a man’s friend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gives
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: delight
    - type: text
      text: ' by hearty counsel.'
