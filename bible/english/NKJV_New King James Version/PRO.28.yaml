  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:17, 36; Ps. 53:5
      marker-yv: yv-n
    - type: text
      text: wicked flee when no one pursues,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the righteous are bold as a lion.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 7:15; Prov. 26:27
      marker-yv: yv-n
    - type: text
      text: Whoever causes the upright to go astray in an evil way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He himself will fall into his own pit;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 6:33; Heb. 6:12; 1 Pet. 3:9)
      marker-yv: yv-n
    - type: text
      text: But the blameless will inherit good.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The rich man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' wise in his own eyes,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the poor who has understanding searches him out.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When the righteous rejoice, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' great '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 11:10; 29:2
      marker-yv: yv-n
    - type: text
      text: glory;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But when the wicked arise, men hide themselves.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 32:3–5; 1 John 1:8–10
      marker-yv: yv-n
    - type: text
      text: He who covers his sins will not prosper,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But whoever confesses and forsakes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' will have mercy.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the man who is always reverent,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he who hardens his heart will fall into calamity.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 19:12; 1 Pet. 5:8
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Like
    - type: text
      text: ' a roaring lion and a charging bear'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 1:14; Prov. 29:2; Matt. 2:16
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' a wicked ruler over poor people.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A ruler who lacks understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a great '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 10:16; Is. 3:12
      marker-yv: yv-n
    - type: text
      text: oppressor,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But
    - type: text
      text: ' he who hates covetousness will prolong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' days.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:6
      marker-yv: yv-n
    - type: text
      text: A man burdened with bloodshed will flee into a pit;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let no one help him.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever walks blamelessly will be saved,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' perverse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' ways will suddenly fall.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 12:11; 20:13
      marker-yv: yv-n
    - type: text
      text: He who tills his land will have plenty of bread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he who follows frivolity will have poverty enough!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because of the transgression of a land, many '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' its princes;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But by a man of understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' knowledge'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Right will be prolonged.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A faithful man will abound with blessings,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 13:11; 20:21; 23:4; 1 Tim. 6:9
      marker-yv: yv-n
    - type: text
      text: But he who hastens to be rich will not go unpunished.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 18:5
      marker-yv: yv-n
    - type: text
      text: 'To show partiality '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not good,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 13:19
      marker-yv: yv-n
    - type: text
      text: Because for a piece of bread a man will transgress.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A man with an evil eye hastens after riches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And does not consider that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 21:5
      marker-yv: yv-n
    - type: text
      text: poverty will come upon him.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 27:5, 6
      marker-yv: yv-n
    - type: text
      text: He who rebukes a man will find more favor afterward
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Than he who flatters with the tongue.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever robs his father or his mother,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And says, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no transgression,”'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The same '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 18:9
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' companion to a destroyer.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 13:10
      marker-yv: yv-n
    - type: text
      text: He who is of a proud heart stirs up strife,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 29:25; 1 Tim. 6:6
      marker-yv: yv-n
    - type: text
      text: 'But he who trusts in the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be prospered.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:5
      marker-yv: yv-n
    - type: text
      text: trusts in his own heart is a fool,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But whoever walks wisely will be delivered.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 15:7; Prov. 19:17; 22:9
      marker-yv: yv-n
    - type: text
      text: He who gives to the poor will not lack,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he who hides his eyes will have many curses.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When the wicked arise, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 24:4
      marker-yv: yv-n
    - type: text
      text: men hide themselves;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But when they perish, the righteous increase.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 18:28
      marker-yv: yv-n
    - type: text
      text: A poor man who oppresses the poor
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' a driving rain which leaves no food.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 49:18; Rom. 1:32
      marker-yv: yv-n
    - type: text
      text: Those who forsake the law praise the wicked,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 18:18; Neh. 13:11, 15; Matt. 3:7; 14:4; Eph. 5:11
      marker-yv: yv-n
    - type: text
