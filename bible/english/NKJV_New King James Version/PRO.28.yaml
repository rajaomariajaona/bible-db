  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 92:6; Is. 6:9; 44:18
      marker-yv: yv-n
    - type: text
      text: Evil men do not understand justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
