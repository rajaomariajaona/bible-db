      marker-yv: yv-n
    - type: text
      text: 'those who seek the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' understand all.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Better '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the poor who walks in his integrity'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Than one perverse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' ways, though he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' rich.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Whoever keeps the law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a discerning son,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a companion of gluttons shames his father.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One who increases his possessions by usury and extortion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gathers it for him who will pity the poor.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One who turns away his ear from hearing the law,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 66:18; 109:7; Prov. 15:8
      marker-yv: yv-n
    - type: text
      text: 'Even his prayer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' an abomination.'
