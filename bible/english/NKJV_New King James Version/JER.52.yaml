document_id: JER.52,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Fall of Jerusalem Reviewed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Zedekiah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:18; 2 Chr. 36:11
      marker-yv: yv-n
    - type: text
      text: 'twenty-one years old when he became king, and he reigned eleven years in Jerusalem. His mother’s name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Hamutal the daughter of Jeremiah of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 10:29; 2 Kin. 8:22; Is. 37:8
      marker-yv: yv-n
    - type: text
      text: 'Libnah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 12:13
      marker-yv: yv-n
    - type: text
      text: 'Then the king of Babylon killed the sons of Zedekiah before his eyes. And he killed all the princes of Judah in Riblah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'He also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 12:13
      marker-yv: yv-n
    - type: text
      text: put out the eyes of Zedekiah; and the king of Babylon bound him in bronze fetters, took him to Babylon, and put him in prison till the day of his death.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Temple and City Plundered and Burned
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:8–21
      marker-yv: yv-n
    - type: text
      text: 'Now in the fifth month, on the tenth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month ('
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 52:29
      marker-yv: yv-n
    - type: text
      text: 'which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the nineteenth year of King Nebuchadnezzar king of Babylon), '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 39:9
      marker-yv: yv-n
    - type: text
      text: 'Nebuzaradan, the captain of the guard, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' served the king of Babylon, came to Jerusalem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He burned the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the king’s house; all the houses of Jerusalem, that is, all the houses of the great, he burned with fire. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And all the army of the Chaldeans who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with the captain of the guard broke down all the walls of Jerusalem all around. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 39:9
      marker-yv: yv-n
    - type: text
      text: 'Then Nebuzaradan the captain of the guard carried away captive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of the poor people, the rest of the people who remained in the city, the defectors who had deserted to the king of Babylon, and the rest of the craftsmen. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But Nebuzaradan the captain of the guard left '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of the poor of the land as vinedressers and farmers.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 27:19
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:15, 23, 27, 50
      marker-yv: yv-n
    - type: text
      text: 'bronze pillars that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the carts and the bronze Sea that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the Chaldeans broke in pieces, and carried all their bronze to Babylon. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'They also took away '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 27:3; 1 Kin. 7:40, 45; 2 Kin. 25:14
      marker-yv: yv-n
    - type: text
      text: 'the pots, the shovels, the trimmers, the bowls, the spoons, and all the bronze utensils with which the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: priests
    - type: text
      text: ' ministered. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The basins, the firepans, the bowls, the pots, the lampstands, the spoons, and the cups, whatever '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' solid gold and whatever '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' solid silver, the captain of the guard took away. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He also did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', according to all that Jehoiakim had done. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The two pillars, one Sea, the twelve bronze bulls which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' under '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it, and
    - type: text
      text: ' the carts, which King Solomon had made for the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: —
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:47; 2 Kin. 25:16
      marker-yv: yv-n
    - type: text
      text: 'the bronze of all these articles was beyond measure. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: concerning
    - type: text
      text: ' the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:15; 2 Kin. 25:17; 2 Chr. 3:15
      marker-yv: yv-n
    - type: text
      text: 'pillars: the height of one pillar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' eighteen cubits, a measuring line of twelve cubits could measure its circumference, and its thickness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' four fingers; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' hollow. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'A capital of bronze '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' on it; and the height of one capital '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' five cubits, with a network and pomegranates all around the capital, all of bronze. The second pillar, with pomegranates was the same. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'There were ninety-six pomegranates on the sides; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:20
      marker-yv: yv-n
    - type: text
      text: 'all the pomegranates, all around on the network, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' one hundred.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The People Taken Captive to Babylonia
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:18; 1 Chr. 6:14; Ezra 7:1
      marker-yv: yv-n
    - type: text
      text: 'The captain of the guard took Seraiah the chief priest, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 21:1; 29:25
      marker-yv: yv-n
    - type: text
      text: 'Zephaniah the second priest, and the three doorkeepers. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'He also took out of the city an officer who had charge of the men of war, seven men of the king’s close associates who were found in the city, the principal scribe of the army who mustered the people of the land, and sixty men of the people of the land who were found in the midst of the city. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And Nebuzaradan the captain of the guard took these and brought them to the king of Babylon at Riblah. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Then the king of Babylon struck them and put them to death at Riblah in the land of Hamath. Thus Judah was carried away captive from its own land.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:2
      marker-yv: yv-n
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the people whom Nebuchadnezzar carried away captive: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:12
      marker-yv: yv-n
    - type: text
      text: 'in the seventh year, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:14
      marker-yv: yv-n
    - type: text
      text: 'three thousand and twenty-three Jews; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:11; Jer. 39:9
      marker-yv: yv-n
    - type: text
      text: 'in the eighteenth year of Nebuchadnezzar he carried away captive from Jerusalem eight hundred and thirty-two persons; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For because of the anger of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this
    - type: text
      text: ' happened in Jerusalem and Judah, till He finally cast them out from His presence. Then Zedekiah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 36:13
      marker-yv: yv-n
    - type: text
      text: rebelled against the king of Babylon.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'in the twenty-third year of Nebuchadnezzar, Nebuzaradan the captain of the guard carried away captive of the Jews seven hundred and forty-five persons. All the persons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' four thousand six hundred.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoiachin Released from Prison
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:27–30
      marker-yv: yv-n
    - type: text
      text: 'Now it came to pass in the thirty-seventh year of the captivity of Jehoiachin king of Judah, in the twelfth month, on the twenty-fifth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' Evil-Merodach king of Babylon, in the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: first
    - type: text
      text: ' year of his reign, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 40:13, 20; Ps. 3:3; 27:6
      marker-yv: yv-n
    - type: text
      text: 'lifted up the head of Jehoiachin king of Judah and brought him out of prison. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And he spoke kindly to him and gave him a more prominent seat than those of the kings who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with him in Babylon. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'So Jehoiachin changed from his prison garments, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 9:7, 13; 1 Kin. 2:7
      marker-yv: yv-n
    - type: text
      text: 'and he ate bread regularly before the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: king
    - type: text
      text: ' all the days of his life. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: And as for his provisions, there was a regular ration given him by the king of Babylon, a portion for each day until the day of his death, all the days of his life.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now it came to pass in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:1; Jer. 39:1; Ezek. 24:1, 2; Zech. 8:19
      marker-yv: yv-n
    - type: text
      text: 'ninth year of his reign, in the tenth month, on the tenth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' Nebuchadnezzar king of Babylon and all his army came against Jerusalem and encamped against it; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' built a siege wall against it all around. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So the city was besieged until the eleventh year of King Zedekiah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'By the fourth month, on the ninth day of the month, the famine had become so severe in the city that there was no food for the people of the land. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then the city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wall
    - type: text
      text: ' was broken through, and all the men of war fled and went out of the city at night by way of the gate between the two walls, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' by the king’s garden, even though the Chaldeans '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' near the city all around. And they went by way of the plain.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But the army of the Chaldeans pursued the king, and they overtook Zedekiah in the plains of Jericho. All his army was scattered from him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:6; Jer. 32:4; 39:5
      marker-yv: yv-n
    - type: text
      text: 'So they took the king and brought him up to the king of Babylon at Riblah in the land of Hamath, and he pronounced judgment on him. '
