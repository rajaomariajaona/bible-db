  '13':
  - type: text
    content: 'He burned the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and the king’s house; all the houses of Jerusalem, that is, all the houses of the great, he burned with fire. '
  '14':
  - type: text
    content: 'And all the army of the Chaldeans who '
  - type: text
    content: were
  - type: text
    content: ' with the captain of the guard broke down all the walls of Jerusalem all around. '
  '15':
  - type: note
    content: Jer. 39:9
  - type: text
    content: 'Then Nebuzaradan the captain of the guard carried away captive '
  - type: text
    content: some
  - type: text
    content: ' of the poor people, the rest of the people who remained in the city, the defectors who had deserted to the king of Babylon, and the rest of the craftsmen. '
  '16':
  - type: text
    content: 'But Nebuzaradan the captain of the guard left '
  - type: text
    content: some
  - type: text
    content: ' of the poor of the land as vinedressers and farmers.'
  '17':
  - type: note
    content: Jer. 27:19
  - type: text
    content: 'The '
  - type: note
    content: 1 Kin. 7:15, 23, 27, 50
  - type: text
    content: 'bronze pillars that '
  - type: text
    content: were
  - type: text
