  - type: heading
    content: Lord
  - type: text
    content: ', and the carts and the bronze Sea that '
  - type: text
    content: were
  - type: text
    content: ' in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', the Chaldeans broke in pieces, and carried all their bronze to Babylon. '
  '18':
  - type: text
    content: 'They also took away '
  - type: note
    content: Ex. 27:3; 1 Kin. 7:40, 45; 2 Kin. 25:14
  - type: text
    content: 'the pots, the shovels, the trimmers, the bowls, the spoons, and all the bronze utensils with which the '
  - type: text
    content: priests
  - type: text
    content: ' ministered. '
  '19':
  - type: text
    content: 'The basins, the firepans, the bowls, the pots, the lampstands, the spoons, and the cups, whatever '
  - type: text
    content: was
  - type: text
    content: ' solid gold and whatever '
  - type: text
    content: was
  - type: text
    content: ' solid silver, the captain of the guard took away. '
  '2':
  - type: text
    content: 'He also did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', according to all that Jehoiakim had done. '
  '20':
  - type: text
    content: 'The two pillars, one Sea, the twelve bronze bulls which '
  - type: text
    content: were
  - type: text
    content: ' under '
  - type: text
    content: it, and
  - type: text
    content: ' the carts, which King Solomon had made for the house of the '
  - type: heading
    content: Lord
  - type: text
    content: —
  - type: note
    content: 1 Kin. 7:47; 2 Kin. 25:16
  - type: text
    content: 'the bronze of all these articles was beyond measure. '
  '21':
  - type: text
    content: 'Now '
  - type: text
    content: concerning
  - type: text
    content: ' the '
  - type: note
    content: 1 Kin. 7:15; 2 Kin. 25:17; 2 Chr. 3:15
  - type: text
    content: 'pillars: the height of one pillar '
  - type: text
    content: was
  - type: text
    content: ' eighteen cubits, a measuring line of twelve cubits could measure its circumference, and its thickness '
  - type: text
    content: was
  - type: text
    content: ' four fingers; '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' hollow. '
  '22':
  - type: text
    content: 'A capital of bronze '
  - type: text
    content: was
  - type: text
    content: ' on it; and the height of one capital '
  - type: text
    content: was
  - type: text
    content: ' five cubits, with a network and pomegranates all around the capital, all of bronze. The second pillar, with pomegranates was the same. '
  '23':
  - type: text
    content: 'There were ninety-six pomegranates on the sides; '
  - type: note
    content: 1 Kin. 7:20
  - type: text
    content: 'all the pomegranates, all around on the network, '
  - type: text
    content: were
  - type: text
    content: ' one hundred.'
  - type: heading
    content: The People Taken Captive to Babylonia
  '24':
  - type: note
    content: 2 Kin. 25:18; 1 Chr. 6:14; Ezra 7:1
  - type: text
    content: 'The captain of the guard took Seraiah the chief priest, '
  - type: note
    content: Jer. 21:1; 29:25
  - type: text
    content: 'Zephaniah the second priest, and the three doorkeepers. '
  '25':
  - type: text
    content: 'He also took out of the city an officer who had charge of the men of war, seven men of the king’s close associates who were found in the city, the principal scribe of the army who mustered the people of the land, and sixty men of the people of the land who were found in the midst of the city. '
  '26':
  - type: text
    content: 'And Nebuzaradan the captain of the guard took these and brought them to the king of Babylon at Riblah. '
  '27':
  - type: text
    content: Then the king of Babylon struck them and put them to death at Riblah in the land of Hamath. Thus Judah was carried away captive from its own land.
  '28':
  - type: note
    content: 2 Kin. 24:2
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the people whom Nebuchadnezzar carried away captive: '
  - type: note
    content: 2 Kin. 24:12
  - type: text
    content: 'in the seventh year, '
  - type: note
    content: 2 Kin. 24:14
  - type: text
    content: 'three thousand and twenty-three Jews; '
  '29':
  - type: note
    content: 2 Kin. 25:11; Jer. 39:9
  - type: text
    content: 'in the eighteenth year of Nebuchadnezzar he carried away captive from Jerusalem eight hundred and thirty-two persons; '
  '3':
  - type: text
    content: 'For because of the anger of the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: this
  - type: text
    content: ' happened in Jerusalem and Judah, till He finally cast them out from His presence. Then Zedekiah '
  - type: note
    content: 2 Chr. 36:13
  - type: text
    content: rebelled against the king of Babylon.
  '30':
  - type: text
    content: 'in the twenty-third year of Nebuchadnezzar, Nebuzaradan the captain of the guard carried away captive of the Jews seven hundred and forty-five persons. All the persons '
  - type: text
    content: were
  - type: text
    content: ' four thousand six hundred.'
  - type: heading
    content: Jehoiachin Released from Prison
  '31':
  - type: note
    content: 2 Kin. 25:27–30
  - type: text
    content: 'Now it came to pass in the thirty-seventh year of the captivity of Jehoiachin king of Judah, in the twelfth month, on the twenty-fifth '
  - type: text
    content: day
  - type: text
    content: ' of the month, '
  - type: text
    content: that
  - type: text
    content: ' Evil-Merodach king of Babylon, in the '
  - type: text
    content: first
  - type: text
    content: ' year of his reign, '
  - type: note
    content: Gen. 40:13, 20; Ps. 3:3; 27:6
  - type: text
    content: 'lifted up the head of Jehoiachin king of Judah and brought him out of prison. '
  '32':
  - type: text
    content: 'And he spoke kindly to him and gave him a more prominent seat than those of the kings who '
  - type: text
    content: were
  - type: text
    content: ' with him in Babylon. '
  '33':
  - type: text
    content: 'So Jehoiachin changed from his prison garments, '
  - type: note
    content: 2 Sam. 9:7, 13; 1 Kin. 2:7
  - type: text
    content: 'and he ate bread regularly before the '
  - type: text
    content: king
  - type: text
    content: ' all the days of his life. '
  '34':
  - type: text
    content: And as for his provisions, there was a regular ration given him by the king of Babylon, a portion for each day until the day of his death, all the days of his life.
  '4':
  - type: text
    content: 'Now it came to pass in the '
  - type: note
    content: 2 Kin. 25:1; Jer. 39:1; Ezek. 24:1, 2; Zech. 8:19
  - type: text
    content: 'ninth year of his reign, in the tenth month, on the tenth '
  - type: text
    content: day
  - type: text
    content: ' of the month, '
  - type: text
    content: that
  - type: text
    content: ' Nebuchadnezzar king of Babylon and all his army came against Jerusalem and encamped against it; and '
  - type: text
    content: they
  - type: text
    content: ' built a siege wall against it all around. '
  '5':
  - type: text
    content: 'So the city was besieged until the eleventh year of King Zedekiah. '
  '6':
  - type: text
    content: 'By the fourth month, on the ninth day of the month, the famine had become so severe in the city that there was no food for the people of the land. '
  '7':
  - type: text
    content: 'Then the city '
  - type: text
    content: wall
  - type: text
    content: ' was broken through, and all the men of war fled and went out of the city at night by way of the gate between the two walls, which '
  - type: text
    content: was
  - type: text
    content: ' by the king’s garden, even though the Chaldeans '
  - type: text
    content: were
  - type: text
    content: ' near the city all around. And they went by way of the plain.'
  '8':
  - type: text
    content: 'But the army of the Chaldeans pursued the king, and they overtook Zedekiah in the plains of Jericho. All his army was scattered from him. '
  '9':
  - type: note
    content: 2 Kin. 25:6; Jer. 32:4; 39:5
  - type: text
    content: 'So they took the king and brought him up to the king of Babylon at Riblah in the land of Hamath, and he pronounced judgment on him. '
