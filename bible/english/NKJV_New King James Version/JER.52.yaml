  '1':
  - type: heading
    content: The Fall of Jerusalem Reviewed
  - type: text
    content: 'Zedekiah '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: 2 Kin. 24:18; 2 Chr. 36:11
  - type: text
    content: 'twenty-one years old when he became king, and he reigned eleven years in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Hamutal the daughter of Jeremiah of '
  - type: note
    content: Josh. 10:29; 2 Kin. 8:22; Is. 37:8
  - type: text
    content: 'Libnah. '
  '10':
  - type: note
    content: Ezek. 12:13
  - type: text
    content: 'Then the king of Babylon killed the sons of Zedekiah before his eyes. And he killed all the princes of Judah in Riblah. '
  '11':
  - type: text
    content: 'He also '
  - type: note
    content: Ezek. 12:13
  - type: text
    content: put out the eyes of Zedekiah; and the king of Babylon bound him in bronze fetters, took him to Babylon, and put him in prison till the day of his death.
  - type: heading
    content: The Temple and City Plundered and Burned
  '12':
  - type: note
    content: 2 Kin. 25:8–21
  - type: text
    content: 'Now in the fifth month, on the tenth '
  - type: text
