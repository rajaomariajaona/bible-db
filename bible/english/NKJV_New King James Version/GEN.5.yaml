document_id: GEN.5,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Family of Adam
  - type: text
    content: 'This is the book of the '
  - type: note
    content: Gen. 2:4; 6:9; 1 Chr. 1:1; Matt. 1:1
  - type: text
    content: 'genealogy of Adam. In the day that God created man, He made him in '
  - type: note
    content: Gen. 1:26; 9:6; (Eph. 4:24; Col. 3:10)
  - type: text
    content: 'the likeness of God. '
  '10':
  - type: text
    content: 'After he begot Cainan, Enosh lived eight hundred and fifteen years, and had sons and daughters. '
  '11':
  - type: text
    content: So all the days of Enosh were nine hundred and five years; and he died.
  '12':
  - type: text
    content: 'Cainan lived seventy years, and begot Mahalalel. '
  '13':
  - type: text
    content: 'After he begot Mahalalel, Cainan lived eight hundred and forty years, and had sons and daughters. '
  '14':
  - type: text
    content: So all the days of Cainan were nine hundred and ten years; and he died.
  '15':
  - type: text
    content: 'Mahalalel lived sixty-five years, and begot Jared. '
  '16':
  - type: text
    content: 'After he begot Jared, Mahalalel lived eight hundred and thirty years, and had sons and daughters. '
  '17':
  - type: text
    content: So all the days of Mahalalel were eight hundred and ninety-five years; and he died.
  '18':
  - type: text
    content: 'Jared lived one hundred and sixty-two years, and begot '
  - type: note
    content: Jude 14, 15
  - type: text
    content: 'Enoch. '
  '19':
  - type: text
    content: 'After he begot Enoch, Jared lived eight hundred years, and had sons and daughters. '
  '2':
  - type: text
    content: 'He created them '
  - type: note
    content: Gen. 1:27; Deut. 4:32; Matt. 19:4; Mark 10:6
  - type: text
    content: 'male and female, and '
  - type: note
    content: Gen. 1:28; 9:1
  - type: text
    content: 'blessed them and called them Mankind in the day they were created. '
  '20':
  - type: text
    content: So all the days of Jared were nine hundred and sixty-two years; and he died.
  '21':
  - type: text
    content: 'Enoch lived sixty-five years, and begot Methuselah. '
  '22':
  - type: text
    content: 'After he begot Methuselah, Enoch '
  - type: note
    content: Gen. 6:9; 17:1; 24:40; 48:15; 2 Kin. 20:3; Ps. 16:8; (Mic. 6:8); Mal. 2:6; 1 Thess. 2:12; (Heb. 11:39)
  - type: text
    content: 'walked with God three hundred years, and had sons and daughters. '
  '23':
  - type: text
    content: 'So all the days of Enoch were three hundred and sixty-five years. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: 2 Kin. 2:11; Jude 14
  - type: text
    content: 'Enoch walked with God; and he '
  - type: text
    content: was
  - type: text
    content: ' not, for God '
  - type: note
    content: 2 Kin. 2:10; Ps. 49:15; 73:24; Heb. 11:5
  - type: text
    content: took him.
  '25':
  - type: text
    content: 'Methuselah lived one hundred and eighty-seven years, and begot Lamech. '
  '26':
  - type: text
    content: 'After he begot Lamech, Methuselah lived seven hundred and eighty-two years, and had sons and daughters. '
  '27':
  - type: text
    content: So all the days of Methuselah were nine hundred and sixty-nine years; and he died.
  '28':
  - type: text
    content: 'Lamech lived one hundred and eighty-two years, and had a son. '
  '29':
  - type: text
    content: 'And he called his name '
  - type: note
    content: Luke 3:36; Heb. 11:7; 1 Pet. 3:20
  - type: text
    content: 'Noah, saying, “This '
  - type: text
    content: one
  - type: text
    content: ' will comfort us concerning our work and the toil of our hands, because of the ground '
  - type: note
    content: Gen. 3:17–19; 4:11
  - type: text
    content: 'which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has cursed.” '
  '3':
  - type: text
    content: 'And Adam lived one hundred and thirty years, and begot '
  - type: text
    content: a
  - type: text
    content: ' '
  - type: text
    content: son
  - type: text
    content: ' '
  - type: note
    content: 1 Cor. 15:48, 49
  - type: text
    content: 'in his own likeness, after his image, and named him '
  - type: note
    content: Gen. 4:25
  - type: text
    content: 'Seth. '
  '30':
  - type: text
    content: 'After he begot Noah, Lamech lived five hundred and ninety-five years, and had sons and daughters. '
  '31':
  - type: text
    content: So all the days of Lamech were seven hundred and seventy-seven years; and he died.
  '32':
  - type: text
    content: 'And Noah was five hundred years old, and Noah begot '
  - type: note
    content: Gen. 6:10; 7:13
  - type: text
    content: 'Shem, Ham, '
  - type: note
    content: Gen. 10:21
  - type: text
    content: and Japheth.
  '4':
  - type: text
    content: 'After he begot Seth, '
  - type: note
    content: 1 Chr. 1:1–4; Luke 3:36–38
  - type: text
    content: 'the days of Adam were eight hundred years; '
  - type: note
    content: Gen. 1:28; 4:25
  - type: text
    content: 'and he had sons and daughters. '
  '5':
  - type: text
    content: 'So all the days that Adam lived were nine hundred and thirty years; '
  - type: note
    content: Gen. 2:17; 3:19; 6:17; (Heb. 9:27)
  - type: text
    content: and he died.
  '6':
  - type: text
    content: 'Seth lived one hundred and five years, and begot Enosh. '
  '7':
  - type: text
    content: 'After he begot '
  - type: note
    content: Gen. 4:26
  - type: text
    content: 'Enosh, Seth lived eight hundred and seven years, and had sons and daughters. '
  '8':
  - type: text
    content: So all the days of Seth were nine hundred and twelve years; and he died.
  '9':
  - type: text
    content: 'Enosh lived ninety years, and begot Cainan. '
