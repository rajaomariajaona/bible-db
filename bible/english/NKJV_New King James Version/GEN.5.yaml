document_id: GEN.5,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Family of Adam
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the book of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 2:4; 6:9; 1 Chr. 1:1; Matt. 1:1
      marker-yv: yv-n
    - type: text
      text: 'genealogy of Adam. In the day that God created man, He made him in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:26; 9:6; (Eph. 4:24; Col. 3:10)
      marker-yv: yv-n
    - type: text
      text: 'the likeness of God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After he begot Cainan, Enosh lived eight hundred and fifteen years, and had sons and daughters. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So all the days of Enosh were nine hundred and five years; and he died.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cainan lived seventy years, and begot Mahalalel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After he begot Mahalalel, Cainan lived eight hundred and forty years, and had sons and daughters. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So all the days of Cainan were nine hundred and ten years; and he died.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahalalel lived sixty-five years, and begot Jared. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After he begot Jared, Mahalalel lived eight hundred and thirty years, and had sons and daughters. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So all the days of Mahalalel were eight hundred and ninety-five years; and he died.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jared lived one hundred and sixty-two years, and begot '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jude 14, 15
      marker-yv: yv-n
    - type: text
      text: 'Enoch. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After he begot Enoch, Jared lived eight hundred years, and had sons and daughters. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He created them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:27; Deut. 4:32; Matt. 19:4; Mark 10:6
      marker-yv: yv-n
    - type: text
      text: 'male and female, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:28; 9:1
      marker-yv: yv-n
    - type: text
      text: 'blessed them and called them Mankind in the day they were created. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So all the days of Jared were nine hundred and sixty-two years; and he died.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enoch lived sixty-five years, and begot Methuselah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After he begot Methuselah, Enoch '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 6:9; 17:1; 24:40; 48:15; 2 Kin. 20:3; Ps. 16:8; (Mic. 6:8); Mal. 2:6; 1 Thess. 2:12; (Heb. 11:39)
      marker-yv: yv-n
    - type: text
      text: 'walked with God three hundred years, and had sons and daughters. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all the days of Enoch were three hundred and sixty-five years. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 2:11; Jude 14
      marker-yv: yv-n
    - type: text
      text: 'Enoch walked with God; and he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' not, for God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 2:10; Ps. 49:15; 73:24; Heb. 11:5
      marker-yv: yv-n
    - type: text
      text: took him.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Methuselah lived one hundred and eighty-seven years, and begot Lamech. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After he begot Lamech, Methuselah lived seven hundred and eighty-two years, and had sons and daughters. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So all the days of Methuselah were nine hundred and sixty-nine years; and he died.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lamech lived one hundred and eighty-two years, and had a son. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he called his name '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 3:36; Heb. 11:7; 1 Pet. 3:20
      marker-yv: yv-n
    - type: text
      text: 'Noah, saying, “This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' will comfort us concerning our work and the toil of our hands, because of the ground '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 3:17–19; 4:11
      marker-yv: yv-n
    - type: text
      text: 'which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has cursed.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Adam lived one hundred and thirty years, and begot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: son
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:48, 49
      marker-yv: yv-n
    - type: text
      text: 'in his own likeness, after his image, and named him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 4:25
      marker-yv: yv-n
    - type: text
      text: 'Seth. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After he begot Noah, Lamech lived five hundred and ninety-five years, and had sons and daughters. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So all the days of Lamech were seven hundred and seventy-seven years; and he died.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Noah was five hundred years old, and Noah begot '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 6:10; 7:13
      marker-yv: yv-n
    - type: text
      text: 'Shem, Ham, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 10:21
      marker-yv: yv-n
    - type: text
      text: and Japheth.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After he begot Seth, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 1:1–4; Luke 3:36–38
      marker-yv: yv-n
    - type: text
      text: 'the days of Adam were eight hundred years; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:28; 4:25
      marker-yv: yv-n
    - type: text
      text: 'and he had sons and daughters. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all the days that Adam lived were nine hundred and thirty years; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 2:17; 3:19; 6:17; (Heb. 9:27)
      marker-yv: yv-n
    - type: text
      text: and he died.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seth lived one hundred and five years, and begot Enosh. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After he begot '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 4:26
      marker-yv: yv-n
    - type: text
      text: 'Enosh, Seth lived eight hundred and seven years, and had sons and daughters. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So all the days of Seth were nine hundred and twelve years; and he died.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enosh lived ninety years, and begot Cainan. '
