  '1':
  - type: heading
    content: The Parable of the Sower
  - type: text
    content: 'And '
  - type: note
    content: Matt. 13:1–15; Luke 8:4–10
  - type: text
    content: 'again He began to teach by the sea. And a great multitude was gathered to Him, so that He got into a boat and sat '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' on the sea; and the whole multitude was on the land facing the sea. '
  '10':
  - type: note
    content: Matt. 13:10; Luke 8:9
  - type: text
    content: 'But when He was alone, those around Him with the twelve asked Him about the parable. '
  '11':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: '“To you it has been given to '
  - type: note
    content: (Matt. 11:25; 1 Cor. 2:10–16; 2 Cor. 4:6)
  - type: text
    content: 'know the '
  - type: text
    content: 'mystery of the kingdom of God; but to '
  - type: note
    content: (1 Cor. 5:12, 13; Col. 4:5; 1 Thess. 4:12; 1 Tim. 3:7)
  - type: text
    content: those who are outside, all things come in parables,
  - type: text
    content: ' '
  '12':
  - type: text
    content: so that
  - type: note
    content: Is. 6:9, 10; 43:8; Jer. 5:21; Ezek. 12:2; Matt. 13:14; Luke 8:10; John 12:40; Rom. 11:8
  - type: text
    content: ‘Seeing they may see and not perceive,
  - type: text
    content: And hearing they may hear and not understand;
  - type: text
    content: Lest they should turn,
  - type: text
    content: And
  - type: text
    content: ' '
  - type: text
    content: their
  - type: text
    content: ' '
  - type: text
    content: sins be forgiven them.’
  - type: text
    content: ' ”'
  - type: heading
    content: The Parable of the Sower Explained
  '13':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “Do you not understand this parable? How then will you understand all the parables?
  - type: text
    content: ' '
  '14':
  - type: note
    content: Matt. 13:18–23; Luke 8:11–15
  - type: text
    content: The sower sows the word.
  - type: text
    content: ' '
  '15':
  - type: text
    content: And these are the ones by the wayside where the word is sown. When they hear, Satan comes immediately and takes away the word that was sown in their hearts.
  - type: text
    content: ' '
  '16':
  - type: text
    content: These likewise are the ones sown on stony ground who, when they hear the word, immediately receive it with gladness;
  - type: text
    content: ' '
  '17':
  - type: text
    content: and they have no root in themselves, and so endure only for a time. Afterward, when tribulation or persecution arises for the word’s sake, immediately they stumble.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Now these are the ones sown among thorns; '
  - type: text
    content: they are
  - type: text
    content: ' the ones who hear the word,'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'and the '
  - type: note
    content: Luke 21:34
  - type: text
    content: 'cares of this world, '
  - type: note
    content: Prov. 23:5; Eccl. 5:13; Luke 18:24; 1 Tim. 6:9, 10, 17
  - type: text
    content: the deceitfulness of riches, and the desires for other things entering in choke the word, and it becomes unfruitful.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Then He taught them many things by parables, '
  - type: note
    content: Mark 12:38
  - type: text
    content: 'and said to them in His teaching:'
  '20':
  - type: text
    content: 'But these are the ones sown on good ground, those who hear the word, '
  - type: text
    content: 'accept '
  - type: text
    content: it,
  - type: text
    content: ' and bear '
  - type: note
    content: (John 15:2, 5; Rom. 7:4)
  - type: text
    content: 'fruit: some thirtyfold, some sixty, and some a hundred.”'
  - type: heading
    content: Light Under a Basket
  '21':
  - type: note
    content: Matt. 5:15; Luke 8:16; 11:33
  - type: text
    content: 'Also He said to them, '
  - type: text
    content: “Is a lamp brought to be put under a basket or under a bed? Is it not to be set on a lampstand?
  - type: text
    content: ' '
  '22':
  - type: note
    content: Eccl. 12:14; Matt. 10:26, 27; Luke 12:3; (1 Cor. 4:5)
  - type: text
    content: For there is nothing hidden which will not be revealed, nor has anything been kept secret but that it should come to light.
  - type: text
    content: ' '
  '23':
  - type: note
    content: Matt. 11:15; 13:9, 43; Mark 4:9; Luke 8:8; 14:35; Rev. 3:6, 13, 22; 13:9
  - type: text
    content: If anyone has ears to hear, let him hear.”
  '24':
  - type: text
    content: 'Then He said to them, '
  - type: text
    content: '“Take heed what you hear. '
  - type: note
    content: Matt. 7:2; Luke 6:38; 2 Cor. 9:6
  - type: text
    content: With the same measure you use, it will be measured to you; and to you who hear, more will be given.
  - type: text
    content: ' '
  '25':
  - type: note
    content: Matt. 13:12; 25:29; Luke 8:18; 19:26
  - type: text
    content: For whoever has, to him more will be given; but whoever does not have, even what he has will be taken away from him.”
  - type: heading
    content: The Parable of the Growing Seed
  '26':
  - type: text
    content: 'And He said, '
  - type: note
    content: (Matt. 13:24–30, 36–43); Luke 8:1
  - type: text
    content: '“The kingdom of God is as if a man should '
  - type: text
    content: scatter seed on the ground,
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'and should sleep by night and rise by day, and the seed should sprout and '
  - type: note
    content: (2 Cor. 3:18; 2 Pet. 3:18)
  - type: text
    content: grow, he himself does not know how.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'For the earth '
  - type: note
    content: (John 12:24)
  - type: text
    content: 'yields crops by itself: first the blade, then the head, after that the full grain in the head.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'But when the grain ripens, immediately '
  - type: note
    content: (Mark 13:30, 39); Rev. 14:15
  - type: text
    content: he puts in the sickle, because the harvest has come.”
  - type: heading
    content: The Parable of the Mustard Seed
  '3':
  - type: text
    content: “Listen! Behold, a sower went out to sow.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Then He said, '
  - type: note
    content: Matt. 13:31, 32; Luke 13:18, 19; (Acts 2:41; 4:4; 5:14; 19:20)
  - type: text
    content: “To what shall we liken the kingdom of God? Or with what parable shall we picture it?
  - type: text
    content: ' '
  '31':
  - type: text
    content: It is
  - type: text
    content: ' like a mustard seed which, when it is sown on the ground, is smaller than all the seeds on earth;'
  - type: text
    content: ' '
  '32':
  - type: text
    content: but when it is sown, it grows up and becomes greater than all herbs, and shoots out large branches, so that the birds of the air may nest under its shade.”
  - type: heading
    content: Jesus’ Use of Parables
  '33':
  - type: note
    content: Matt. 13:34, 35; (John 16:12)
  - type: text
    content: 'And with many such parables He spoke the word to them as they were able to hear '
  - type: text
    content: it.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'But without a parable He did not speak to them. And when they were alone, '
  - type: note
    content: Luke 24:27, 45
  - type: text
    content: He explained all things to His disciples.
  - type: heading
    content: Wind and Wave Obey Jesus
  '35':
  - type: note
    content: Matt. 8:18, 23–27; Luke 8:22, 25
  - type: text
    content: 'On the same day, when evening had come, He said to them, '
  - type: text
    content: “Let us cross over to the other side.”
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Now when they had left the multitude, they took Him along in the boat as He was. And other little boats were also with Him. '
  '37':
  - type: text
    content: 'And a great windstorm arose, and the waves beat into the boat, so that it was already filling. '
  '38':
  - type: text
    content: 'But He was in the stern, asleep on a pillow. And they awoke Him and said to Him, '
  - type: note
    content: (Matt. 23:8–10)
  - type: text
    content: '“Teacher, '
  - type: note
    content: Ps. 44:23
  - type: text
    content: do You not care that we are perishing?”
  '39':
  - type: text
    content: 'Then He arose and '
  - type: note
    content: Mark 9:25; Luke 4:39
  - type: text
    content: 'rebuked the wind, and said to the sea, '
  - type: note
    content: Ps. 65:7; 89:9; 93:4; 104:6, 7; Matt. 8:26; Luke 8:24
  - type: text
    content: “Peace,
  - type: text
    content: ' be still!”'
  - type: text
    content: ' And the wind ceased and there was a great calm. '
  '4':
  - type: text
    content: 'And it happened, as he sowed, '
  - type: text
    content: that
  - type: text
    content: ' some '
  - type: text
    content: seed
  - type: text
    content: ' fell by the wayside; and the birds '
  - type: text
    content: of the air
  - type: text
    content: ' came and devoured it.'
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'But He said to them, '
  - type: text
    content: '“Why are you so fearful? '
  - type: note
    content: Matt. 14:31, 32; Luke 8:25
  - type: text
    content: How
  - type: text
    content: ' '
  - type: text
    content: is it
  - type: text
    content: ' that you have no faith?”'
  - type: text
    content: ' '
  '41':
  - type: text
    content: And they feared exceedingly, and said to one another, “Who can this be, that even the wind and the sea obey Him!”
  '5':
  - type: text
    content: Some fell on stony ground, where it did not have much earth; and immediately it sprang up because it had no depth of earth.
  - type: text
    content: ' '
  '6':
  - type: text
    content: But when the sun was up it was scorched, and because it had no root it withered away.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And some '
  - type: text
    content: seed
  - type: text
    content: ' fell among thorns; and the thorns grew up and choked it, and it yielded no '
  - type: text
    content: crop.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But other '
  - type: text
    content: seed
  - type: text
    content: ' fell on good ground and yielded a crop that sprang up, increased and produced: some thirtyfold, some sixty, and some a hundred.”'
  '9':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “He who has ears to hear, let him hear!”
  - type: heading
    content: The Purpose of Parables
