    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then from Tirzah, Menahem attacked '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 4:24
      marker-yv: yv-n
    - type: text
      text: 'Tiphsah, all who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' there, and its territory. Because they did not surrender, therefore he attacked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
    - type: text
      text: ' All '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 8:12; Hos. 13:16
      marker-yv: yv-n
    - type: text
