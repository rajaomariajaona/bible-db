        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 5:26; Is. 66:19; Hos. 8:9
      marker-yv: yv-n
    - type: text
      text: 'Pul king of Assyria came against the land; and Menahem gave Pul a thousand talents of silver, that his hand might be with him to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 14:5
      marker-yv: yv-n
    - type: text
      text: 'strengthen the kingdom under his control. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He was sixteen years old when he became king, and he reigned fifty-two years in Jerusalem. His mother’s name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Jecholiah of Jerusalem. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And Menahem '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:35
      marker-yv: yv-n
    - type: text
      text: exacted the money from Israel, from all the very wealthy, from each man fifty shekels of silver, to give to the king of Assyria. So the king of Assyria turned back, and did not stay there in the land.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Now the rest of the acts of Menahem, and all that he did, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
