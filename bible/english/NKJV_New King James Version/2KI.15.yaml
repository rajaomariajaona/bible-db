      marker-yv: yv-n
    - type: text
      text: 'became king. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then Shallum the son of Jabesh conspired against him, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Amos 7:9
      marker-yv: yv-n
    - type: text
      text: struck and killed him in front of the people; and he reigned in his place.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now the rest of the acts of Zechariah, indeed they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' written in the book of the chronicles of the kings of Israel.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' which He spoke to Jehu, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 10:30
      marker-yv: yv-n
    - type: text
      text: '“Your sons shall sit on the throne of Israel to the fourth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: generation.
    - type: text
      text: ” And so it was.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Shallum Reigns in Israel
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Shallum the son of Jabesh became king in the thirty-ninth year of Uzziah king of Judah; and he reigned a full month in Samaria. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For Menahem the son of Gadi went up from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:17; Song 6:4
      marker-yv: yv-n
    - type: text
      text: Tirzah, came to Samaria, and struck Shallum the son of Jabesh in Samaria and killed him; and he reigned in his place.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now the rest of the acts of Shallum, and the conspiracy which he led, indeed they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' written in the book of the chronicles of the kings of Israel. '
