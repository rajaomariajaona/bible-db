document_id: 2KI.15,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Azariah Reigns in Judah
  - type: text
    content: 'In the twenty-seventh year of Jeroboam king of Israel, '
  - type: note
    content: 2 Kin. 15:13, 30
  - type: text
    content: 'Azariah the son of Amaziah, king of Judah, '
  - type: note
    content: 2 Kin. 14:21; 2 Chr. 26:1, 3, 4
  - type: text
    content: 'became king. '
  '10':
  - type: text
    content: 'Then Shallum the son of Jabesh conspired against him, and '
  - type: note
    content: Amos 7:9
  - type: text
    content: struck and killed him in front of the people; and he reigned in his place.
  '11':
  - type: text
    content: 'Now the rest of the acts of Zechariah, indeed they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the chronicles of the kings of Israel.'
  '12':
  - type: text
    content: 'This '
  - type: text
    content: was
  - type: text
    content: ' the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He spoke to Jehu, saying, '
  - type: note
    content: 2 Kin. 10:30
  - type: text
    content: '“Your sons shall sit on the throne of Israel to the fourth '
  - type: text
    content: generation.
  - type: text
    content: ” And so it was.
  - type: heading
    content: Shallum Reigns in Israel
  '13':
  - type: text
    content: 'Shallum the son of Jabesh became king in the thirty-ninth year of Uzziah king of Judah; and he reigned a full month in Samaria. '
  '14':
  - type: text
    content: 'For Menahem the son of Gadi went up from '
  - type: note
    content: 1 Kin. 14:17; Song 6:4
  - type: text
    content: Tirzah, came to Samaria, and struck Shallum the son of Jabesh in Samaria and killed him; and he reigned in his place.
  '15':
  - type: text
    content: 'Now the rest of the acts of Shallum, and the conspiracy which he led, indeed they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the chronicles of the kings of Israel. '
  '16':
  - type: text
    content: 'Then from Tirzah, Menahem attacked '
  - type: note
    content: 1 Kin. 4:24
  - type: text
    content: 'Tiphsah, all who '
  - type: text
    content: were
  - type: text
    content: ' there, and its territory. Because they did not surrender, therefore he attacked '
  - type: text
    content: it.
  - type: text
    content: ' All '
  - type: note
    content: 2 Kin. 8:12; Hos. 13:16
  - type: text
    content: the women there who were with child he ripped open.
  - type: heading
    content: Menahem Reigns in Israel
  '17':
  - type: text
    content: 'In the thirty-ninth year of Azariah king of Judah, Menahem the son of Gadi became king over Israel, '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: reigned
  - type: text
    content: ' ten years in Samaria. '
  '18':
  - type: text
    content: 'And he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: '; he did not depart all his days from the sins of Jeroboam the son of Nebat, who had made Israel sin. '
  '19':
  - type: note
    content: 1 Chr. 5:26; Is. 66:19; Hos. 8:9
  - type: text
    content: 'Pul king of Assyria came against the land; and Menahem gave Pul a thousand talents of silver, that his hand might be with him to '
  - type: note
    content: 2 Kin. 14:5
  - type: text
    content: 'strengthen the kingdom under his control. '
  '2':
  - type: text
    content: 'He was sixteen years old when he became king, and he reigned fifty-two years in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Jecholiah of Jerusalem. '
  '20':
  - type: text
    content: 'And Menahem '
  - type: note
    content: 2 Kin. 23:35
  - type: text
    content: exacted the money from Israel, from all the very wealthy, from each man fifty shekels of silver, to give to the king of Assyria. So the king of Assyria turned back, and did not stay there in the land.
  '21':
  - type: text
    content: 'Now the rest of the acts of Menahem, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel? '
  '22':
  - type: text
    content: So Menahem rested with his fathers. Then Pekahiah his son reigned in his place.
  - type: heading
    content: Pekahiah Reigns in Israel
  '23':
  - type: text
    content: 'In the fiftieth year of Azariah king of Judah, Pekahiah the son of Menahem became king over Israel in Samaria, '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: reigned
  - type: text
    content: ' two years. '
  '24':
  - type: text
    content: 'And he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: '; he did not depart from the sins of Jeroboam the son of Nebat, who had made Israel sin. '
  '25':
  - type: text
    content: 'Then Pekah the son of Remaliah, an officer of his, conspired against him and killed him in Samaria, in the '
  - type: note
    content: 1 Kin. 16:18
  - type: text
    content: citadel of the king’s house, along with Argob and Arieh; and with him were fifty men of Gilead. He killed him and reigned in his place.
  '26':
  - type: text
    content: 'Now the rest of the acts of Pekahiah, and all that he did, indeed they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the chronicles of the kings of Israel.'
  - type: heading
    content: Pekah Reigns in Israel
  '27':
  - type: text
    content: 'In the fifty-second year of Azariah king of Judah, '
  - type: note
    content: 2 Chr. 28:6; Is. 7:1
  - type: text
    content: 'Pekah the son of Remaliah became king over Israel in Samaria, '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: reigned
  - type: text
    content: ' twenty years. '
  '28':
  - type: text
    content: 'And he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: '; he did not depart from the sins of Jeroboam the son of Nebat, who had made Israel sin. '
  '29':
  - type: text
    content: 'In the days of Pekah king of Israel, Tiglath-Pileser king of Assyria '
  - type: note
    content: 2 Kin. 16:7, 10; 1 Chr. 5:26
  - type: text
    content: 'came and took '
  - type: note
    content: 1 Kin. 15:20
  - type: text
    content: 'Ijon, Abel Beth Maachah, Janoah, Kedesh, Hazor, Gilead, and Galilee, all the land of Naphtali; and he '
  - type: note
    content: 2 Kin. 17:6
  - type: text
    content: 'carried them captive to Assyria. '
  '3':
  - type: text
    content: 'And he did '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' right in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', according to all that his father Amaziah had done, '
  '30':
  - type: text
    content: 'Then Hoshea the son of Elah led a conspiracy against Pekah the son of Remaliah, and struck and killed him; so he '
  - type: note
    content: 2 Kin. 17:1; (Hos. 10:3, 7, 15)
  - type: text
    content: reigned in his place in the twentieth year of Jotham the son of Uzziah.
  '31':
  - type: text
    content: 'Now the rest of the acts of Pekah, and all that he did, indeed they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the chronicles of the kings of Israel.'
  - type: heading
    content: Jotham Reigns in Judah
  '32':
  - type: text
    content: 'In the second year of Pekah the son of Remaliah, king of Israel, '
  - type: note
    content: 2 Chr. 27:1
  - type: text
    content: 'Jotham the son of Uzziah, king of Judah, began to reign. '
  '33':
  - type: text
    content: 'He was twenty-five years old when he became king, and he reigned sixteen years in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Jerusha the daughter of Zadok. '
  '34':
  - type: text
    content: 'And he did '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' right in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: '; he did '
  - type: note
    content: 2 Kin. 15:3, 4; 2 Chr. 26:4, 5
  - type: text
    content: 'according to all that his father Uzziah had done. '
  '35':
  - type: note
    content: 2 Kin. 15:4
  - type: text
    content: 'However the high places were not removed; the people still sacrificed and burned incense on the high places. '
  - type: note
    content: 2 Chr. 23:20; 27:3
  - type: text
    content: 'He built the Upper Gate of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '36':
  - type: text
    content: 'Now the rest of the acts of Jotham, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '37':
  - type: text
    content: 'In those days the '
  - type: heading
    content: Lord
  - type: text
    content: ' began to send '
  - type: note
    content: 2 Kin. 16:5–9; Is. 7:1–17
  - type: text
    content: 'Rezin king of Syria and '
  - type: note
    content: 2 Kin. 15:26, 27
  - type: text
    content: 'Pekah the son of Remaliah against Judah. '
  '38':
  - type: text
    content: So Jotham rested with his fathers, and was buried with his fathers in the City of David his father. Then Ahaz his son reigned in his place.
  '4':
  - type: note
    content: 2 Kin. 12:3; 14:4; 15:35
  - type: text
    content: 'except that the high places were not removed; the people still sacrificed and burned incense on the high places. '
  '5':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 26:19–23; Ps. 78:31
  - type: text
    content: 'struck the king, so that he was a leper until the day of his '
  - type: note
    content: Is. 6:1
  - type: text
    content: 'death; so he '
  - type: note
    content: (Lev. 13:46); Num. 12:14
  - type: text
    content: 'dwelt in an isolated house. And Jotham the king’s son '
  - type: text
    content: was
  - type: text
    content: ' over the '
  - type: text
    content: royal
  - type: text
    content: ' house, judging the people of the land.'
  '6':
  - type: text
    content: 'Now the rest of the acts of Azariah, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '7':
  - type: text
    content: 'So Azariah rested with his fathers, and '
  - type: note
    content: 2 Chr. 26:23
  - type: text
    content: they buried him with his fathers in the City of David. Then Jotham his son reigned in his place.
  - type: heading
    content: Zechariah Reigns in Israel
  '8':
  - type: text
    content: 'In the thirty-eighth year of Azariah king of Judah, '
  - type: note
    content: 2 Kin. 14:29
  - type: text
    content: 'Zechariah the son of Jeroboam reigned over Israel in Samaria six months. '
  '9':
  - type: text
    content: 'And he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 2 Kin. 14:24
  - type: text
    content: 'as his fathers had done; he did not depart from the sins of Jeroboam the son of Nebat, who had made Israel sin. '
