    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'In the thirty-ninth year of Azariah king of Judah, Menahem the son of Gadi became king over Israel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reigned
    - type: text
      text: ' ten years in Samaria. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And he did evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '; he did not depart all his days from the sins of Jeroboam the son of Nebat, who had made Israel sin. '
  '19':
