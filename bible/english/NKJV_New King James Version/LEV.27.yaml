document_id: LEV.27,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Redeeming Persons and Property Dedicated to God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He shall not substitute it or exchange it, good for bad or bad for good; and if he at all exchanges animal for animal, then both it and the one exchanged for it shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 27:33
      marker-yv: yv-n
    - type: text
      text: 'holy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If it is an unclean animal which they do not offer as a sacrifice to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', then he shall present the animal before the priest; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the priest shall set a value for it, whether it is good or bad; as you, the priest, value it, so it shall be. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 6:5; 22:14; 27:15, 19
      marker-yv: yv-n
    - type: text
      text: But if he wants at all to redeem it, then he must add one-fifth to your valuation.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘And when a man dedicates his house to be holy to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', then the priest shall set a value for it, whether it is good or bad; as the priest values it, so it shall stand. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If he who dedicated it wants to redeem his house, then he must add one-fifth of the money of your valuation to it, and it shall be his.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘If a man dedicates to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' part of a field of his possession, then your valuation shall be according to the seed for it. A homer of barley seed shall be valued at fifty shekels of silver. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If he dedicates his field from the Year of Jubilee, according to your valuation it shall stand. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if he dedicates his field after the Jubilee, then the priest shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 25:15, 16, 28
      marker-yv: yv-n
    - type: text
      text: 'reckon to him the money due according to the years that remain till the Year of Jubilee, and it shall be deducted from your valuation. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if he who dedicates the field ever wishes to redeem it, then he must add one-fifth of the money of your valuation to it, and it shall belong to him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the children of Israel, and say to them: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:16; Num. 6:2; Deut. 23:21–23; Judg. 11:30, 31, 39
      marker-yv: yv-n
    - type: text
      text: '‘When a man consecrates by a vow certain persons to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', according to your valuation, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if he does not want to redeem the field, or if he has sold the field to another man, it shall not be redeemed anymore; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but the field, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 25:10, 28, 31
      marker-yv: yv-n
    - type: text
      text: 'when it is released in the Jubilee, shall be holy to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', as a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 27:28
      marker-yv: yv-n
    - type: text
      text: 'devoted field; it shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 18:14; Ezek. 44:29
      marker-yv: yv-n
    - type: text
      text: the possession of the priest.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘And if a man dedicates to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' a field which he has bought, which is not the field of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 25:10, 25
      marker-yv: yv-n
    - type: text
      text: 'his possession, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then the priest shall reckon to him the worth of your valuation, up to the Year of Jubilee, and he shall give your valuation on that day as a holy offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 25:10–13, 28
      marker-yv: yv-n
    - type: text
      text: 'In the Year of Jubilee the field shall return to him from whom it was bought, to the one who owned the land as a possession. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all your valuations shall be according to the shekel of the sanctuary: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:13; Lev. 27:3; Num. 3:47; 18:16; Ezek. 45:12
      marker-yv: yv-n
    - type: text
      text: twenty gerahs to the shekel.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘But the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 13:2, 12; 22:30
      marker-yv: yv-n
    - type: text
      text: 'firstborn of the animals, which should be the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s firstborn, no man shall dedicate; whether it is an ox or sheep, it is the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if it is an unclean animal, then he shall redeem it according to your valuation, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 27:11, 12
      marker-yv: yv-n
    - type: text
      text: shall add one-fifth to it; or if it is not redeemed, then it shall be sold according to your valuation.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 27:21; Num. 18:14; Josh. 6:17–19
      marker-yv: yv-n
    - type: text
      text: '‘Nevertheless no devoted offering that a man may devote to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of all that he has, both man and beast, or the field of his possession, shall be sold or redeemed; every devoted offering is most holy to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:2
      marker-yv: yv-n
    - type: text
      text: 'No person under the ban, who may become doomed to destruction among men, shall be redeemed, but shall surely be put to death. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if your valuation is of a male from twenty years old up to sixty years old, then your valuation shall be fifty shekels of silver, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:13; Lev. 27:25; Num. 3:47; 18:16
      marker-yv: yv-n
    - type: text
      text: 'according to the shekel of the sanctuary. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 28:22; Num. 18:21, 24; 2 Chr. 31:5, 6, 12; Neh. 13:12; Mal. 3:8
      marker-yv: yv-n
    - type: text
      text: 'all the tithe of the land, whether of the seed of the land or of the fruit of the tree, is the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s. It is holy to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 27:13
      marker-yv: yv-n
    - type: text
      text: 'If a man wants at all to redeem any of his tithes, he shall add one-fifth to it. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And concerning the tithe of the herd or the flock, of whatever '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 33:13; Ezek. 20:37; Mic. 7:14
      marker-yv: yv-n
    - type: text
      text: 'passes under the rod, the tenth one shall be holy to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He shall not inquire whether it is good or bad, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 27:10
      marker-yv: yv-n
    - type: text
      text: nor shall he exchange it; and if he exchanges it at all, then both it and the one exchanged for it shall be holy; it shall not be redeemed.’ ”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:46; Deut. 4:5; Mal. 4:4
      marker-yv: yv-n
    - type: text
      text: 'These are the commandments which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses for the children of Israel on Mount '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:1–6, 25; (Heb. 12:18–29)
      marker-yv: yv-n
    - type: text
      text: Sinai.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If it is a female, then your valuation shall be thirty shekels; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and if from five years old up to twenty years old, then your valuation for a male shall be twenty shekels, and for a female ten shekels; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and if from a month old up to five years old, then your valuation for a male shall be five shekels of silver, and for a female your valuation shall be three shekels of silver; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and if from sixty years old and above, if it is a male, then your valuation shall be fifteen shekels, and for a female ten shekels.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘But if he is too poor to pay your valuation, then he shall present himself before the priest, and the priest shall set a value for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:11; 14:21–24
      marker-yv: yv-n
    - type: text
      text: him; according to the ability of him who vowed, the priest shall value him.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘If it is an animal that men may bring as an offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all that anyone gives to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shall be holy. '
