document_id: REV.9,114
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Fifth Trumpet: The Locusts from the Bottomless Pit'
  - type: text
    content: 'Then the fifth angel sounded: '
  - type: note
    content: Luke 10:18; Rev. 8:10
  - type: text
    content: 'And I saw a star fallen from heaven to the earth. To him was given the key to '
  - type: note
    content: Luke 8:31; Rev. 9:2, 11; 17:8
  - type: text
    content: 'the bottomless pit. '
  '10':
  - type: text
    content: 'They had tails like scorpions, and there were stings in their tails. Their power '
  - type: text
    content: was
  - type: text
    content: ' to hurt men five months. '
  '11':
  - type: text
    content: 'And they had as king over them '
  - type: note
    content: Eph. 2:2
  - type: text
    content: 'the angel of the bottomless pit, whose name in Hebrew '
  - type: text
    content: is
  - type: text
    content: ' Abaddon, but in Greek he has the name Apollyon.'
  '12':
  - type: note
    content: Rev. 8:13; 11:14
  - type: text
    content: One woe is past. Behold, still two more woes are coming after these things.
  - type: heading
    content: 'Sixth Trumpet: The Angels from the Euphrates'
  '13':
  - type: text
    content: 'Then the sixth angel sounded: And I heard a voice from the four horns of the '
  - type: note
    content: Rev. 8:3
  - type: text
    content: 'golden altar which is before God, '
  '14':
  - type: text
    content: 'saying to the sixth angel who had the trumpet, “Release the four angels who are bound '
  - type: note
    content: Gen. 15:18; Deut. 1:7; Josh. 1:4; Rev. 16:12
  - type: text
    content: 'at the great river Euphrates.” '
  '15':
  - type: text
    content: 'So the four angels, who had been prepared for the hour and day and month and year, were released to kill a '
  - type: note
    content: Rev. 8:7–9; 9:18
  - type: text
    content: 'third of mankind. '
  '16':
  - type: text
    content: 'Now '
  - type: note
    content: Ps. 68:17; Dan. 7:10
  - type: text
    content: 'the number of the army '
  - type: note
    content: Ezek. 38:4
  - type: text
    content: 'of the horsemen '
  - type: text
    content: was
  - type: text
    content: ' two hundred million; '
  - type: note
    content: Rev. 7:4
  - type: text
    content: 'I heard the number of them. '
  '17':
  - type: text
    content: 'And thus I saw the horses in the vision: those who sat on them had breastplates of fiery red, hyacinth blue, and sulfur yellow; '
  - type: note
    content: 1 Chr. 12:8; Is. 5:28, 29
  - type: text
    content: 'and the heads of the horses '
  - type: text
    content: were
  - type: text
    content: ' like the heads of lions; and out of their mouths came fire, smoke, and brimstone. '
  '18':
  - type: text
    content: 'By these three '
  - type: text
    content: plagues
  - type: text
    content: ' a third of mankind was killed—by the fire and the smoke and the brimstone which came out of their mouths. '
  '19':
  - type: text
    content: 'For their power is in their mouth and in their tails; '
  - type: note
    content: Is. 9:15
  - type: text
    content: 'for their tails '
  - type: text
    content: are
  - type: text
    content: ' like serpents, having heads; and with them they do harm.'
  '2':
  - type: text
    content: 'And he opened the bottomless pit, and smoke arose out of the pit like the smoke of a great furnace. So the '
  - type: note
    content: Joel 2:2, 10
  - type: text
    content: 'sun and the air were darkened because of the smoke of the pit. '
  '20':
  - type: text
    content: 'But the rest of mankind, who were not killed by these plagues, '
  - type: note
    content: Deut. 31:29
  - type: text
    content: 'did not repent of the works of their hands, that they should not worship '
  - type: note
    content: Lev. 17:7; Deut. 32:17; Ps. 106:37; 1 Cor. 10:20
  - type: text
    content: 'demons, '
  - type: note
    content: Ps. 115:4–7; 135:15–17; Dan. 5:23
  - type: text
    content: 'and idols of gold, silver, brass, stone, and wood, which can neither see nor hear nor walk. '
  '21':
  - type: text
    content: 'And they did not repent of their murders '
  - type: note
    content: Rev. 21:8; 22:15
  - type: text
    content: or their sorceries or their sexual immorality or their thefts.
  '3':
  - type: text
    content: 'Then out of the smoke locusts came upon the earth. And to them was given power, '
  - type: note
    content: Ex. 10:4; Judg. 7:12
  - type: text
    content: 'as the scorpions of the earth have power. '
  '4':
  - type: text
    content: 'They were commanded '
  - type: note
    content: Rev. 6:6
  - type: text
    content: 'not to harm '
  - type: note
    content: Rev. 8:7
  - type: text
    content: 'the grass of the earth, or any green thing, or any tree, but only those men who do not have '
  - type: note
    content: Ex. 12:23; Ezek. 9:4; Rev. 7:2, 3
  - type: text
    content: 'the seal of God on their foreheads. '
  '5':
  - type: text
    content: 'And they were not given '
  - type: text
    content: authority
  - type: text
    content: ' to kill them, '
  - type: note
    content: (Rev. 9:10; 11:7)
  - type: text
    content: 'but to torment them '
  - type: text
    content: for
  - type: text
    content: ' five months. Their torment '
  - type: text
    content: was
  - type: text
    content: ' like the torment of a scorpion when it strikes a man. '
  '6':
  - type: text
    content: 'In those days '
  - type: note
    content: Job 3:21; 7:15; Is. 2:19; Jer. 8:3; Rev. 6:16
  - type: text
    content: men will seek death and will not find it; they will desire to die, and death will flee from them.
  '7':
  - type: note
    content: Joel 2:4
  - type: text
    content: 'The shape of the locusts was like horses prepared for battle. '
  - type: note
    content: Nah. 3:17
  - type: text
    content: 'On their heads were crowns of something like gold, '
  - type: note
    content: Dan. 7:8
  - type: text
    content: 'and their faces '
  - type: text
    content: were
  - type: text
    content: ' like the faces of men. '
  '8':
  - type: text
    content: 'They had hair like women’s hair, and '
  - type: note
    content: Joel 1:6
  - type: text
    content: 'their teeth were like lions’ '
  - type: text
    content: teeth.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And they had breastplates like breastplates of iron, and the sound of their wings '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: Jer. 47:3; Joel 2:5–7
  - type: text
    content: 'like the sound of chariots with many horses running into battle. '
