document_id: REV.9,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fifth Trumpet: The Locusts from the Bottomless Pit'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the fifth angel sounded: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 10:18; Rev. 8:10
      marker-yv: yv-n
    - type: text
      text: 'And I saw a star fallen from heaven to the earth. To him was given the key to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 8:31; Rev. 9:2, 11; 17:8
      marker-yv: yv-n
    - type: text
      text: 'the bottomless pit. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They had tails like scorpions, and there were stings in their tails. Their power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' to hurt men five months. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they had as king over them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 2:2
      marker-yv: yv-n
    - type: text
      text: 'the angel of the bottomless pit, whose name in Hebrew '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Abaddon, but in Greek he has the name Apollyon.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 8:13; 11:14
      marker-yv: yv-n
    - type: text
      text: One woe is past. Behold, still two more woes are coming after these things.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Sixth Trumpet: The Angels from the Euphrates'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the sixth angel sounded: And I heard a voice from the four horns of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 8:3
      marker-yv: yv-n
    - type: text
      text: 'golden altar which is before God, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying to the sixth angel who had the trumpet, “Release the four angels who are bound '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:18; Deut. 1:7; Josh. 1:4; Rev. 16:12
      marker-yv: yv-n
    - type: text
      text: 'at the great river Euphrates.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the four angels, who had been prepared for the hour and day and month and year, were released to kill a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 8:7–9; 9:18
      marker-yv: yv-n
    - type: text
      text: 'third of mankind. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 68:17; Dan. 7:10
      marker-yv: yv-n
    - type: text
      text: 'the number of the army '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 38:4
      marker-yv: yv-n
    - type: text
      text: 'of the horsemen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' two hundred million; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 7:4
      marker-yv: yv-n
    - type: text
      text: 'I heard the number of them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thus I saw the horses in the vision: those who sat on them had breastplates of fiery red, hyacinth blue, and sulfur yellow; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 12:8; Is. 5:28, 29
      marker-yv: yv-n
    - type: text
      text: 'and the heads of the horses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' like the heads of lions; and out of their mouths came fire, smoke, and brimstone. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By these three '
    - type: usfm
      marker: it
      children:
      - type: text
        text: plagues
    - type: text
      text: ' a third of mankind was killed—by the fire and the smoke and the brimstone which came out of their mouths. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For their power is in their mouth and in their tails; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 9:15
      marker-yv: yv-n
    - type: text
      text: 'for their tails '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' like serpents, having heads; and with them they do harm.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he opened the bottomless pit, and smoke arose out of the pit like the smoke of a great furnace. So the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Joel 2:2, 10
      marker-yv: yv-n
    - type: text
      text: 'sun and the air were darkened because of the smoke of the pit. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the rest of mankind, who were not killed by these plagues, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 31:29
      marker-yv: yv-n
    - type: text
      text: 'did not repent of the works of their hands, that they should not worship '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 17:7; Deut. 32:17; Ps. 106:37; 1 Cor. 10:20
      marker-yv: yv-n
    - type: text
      text: 'demons, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 115:4–7; 135:15–17; Dan. 5:23
      marker-yv: yv-n
    - type: text
      text: 'and idols of gold, silver, brass, stone, and wood, which can neither see nor hear nor walk. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they did not repent of their murders '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 21:8; 22:15
      marker-yv: yv-n
    - type: text
      text: or their sorceries or their sexual immorality or their thefts.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then out of the smoke locusts came upon the earth. And to them was given power, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 10:4; Judg. 7:12
      marker-yv: yv-n
    - type: text
      text: 'as the scorpions of the earth have power. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were commanded '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 6:6
      marker-yv: yv-n
    - type: text
      text: 'not to harm '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 8:7
      marker-yv: yv-n
    - type: text
      text: 'the grass of the earth, or any green thing, or any tree, but only those men who do not have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:23; Ezek. 9:4; Rev. 7:2, 3
      marker-yv: yv-n
    - type: text
      text: 'the seal of God on their foreheads. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they were not given '
    - type: usfm
      marker: it
      children:
      - type: text
        text: authority
    - type: text
      text: ' to kill them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rev. 9:10; 11:7)
      marker-yv: yv-n
    - type: text
      text: 'but to torment them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' five months. Their torment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' like the torment of a scorpion when it strikes a man. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those days '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 3:21; 7:15; Is. 2:19; Jer. 8:3; Rev. 6:16
      marker-yv: yv-n
    - type: text
      text: men will seek death and will not find it; they will desire to die, and death will flee from them.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Joel 2:4
      marker-yv: yv-n
    - type: text
      text: 'The shape of the locusts was like horses prepared for battle. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Nah. 3:17
      marker-yv: yv-n
    - type: text
      text: 'On their heads were crowns of something like gold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 7:8
      marker-yv: yv-n
    - type: text
      text: 'and their faces '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' like the faces of men. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They had hair like women’s hair, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Joel 1:6
      marker-yv: yv-n
    - type: text
      text: 'their teeth were like lions’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: teeth.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they had breastplates like breastplates of iron, and the sound of their wings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 47:3; Joel 2:5–7
      marker-yv: yv-n
    - type: text
      text: 'like the sound of chariots with many horses running into battle. '
