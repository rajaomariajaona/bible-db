  - type: text
    content: 'other times, to seek to use sorcery, but he set his face toward the wilderness. '
  '10':
  - type: text
    content: 'Then Balak’s anger was aroused against Balaam, and he '
  - type: note
    content: Ezek. 21:14, 17
  - type: text
    content: 'struck his hands together; and Balak said to Balaam, '
  - type: note
