  - type: text
    content: '“I called you to curse my enemies, and look, you have bountifully blessed '
  - type: text
    content: them
  - type: text
    content: ' these three times! '
  '11':
  - type: text
    content: 'Now therefore, flee to your place. '
  - type: note
    content: Num. 22:17, 37
  - type: text
    content: 'I said I would greatly honor you, but in fact, the '
  - type: heading
    content: Lord
  - type: text
    content: ' has kept you back from honor.”'
  '12':
  - type: text
    content: 'So Balaam said to Balak, “Did I not also speak to your messengers whom you sent to me, saying, '
  '13':
  - type: text
    content: '‘If Balak were to give me his house full of silver and gold, I could not go beyond the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', to do good or bad of my own will. What the '
  - type: heading
    content: Lord
  - type: text
    content: ' says, that I must speak’? '
  '14':
  - type: text
    content: 'And now, indeed, I am going to my people. Come, '
  - type: note
    content: (Mic. 6:5)
  - type: text
    content: 'I will advise you what this people will do to your people in the '
  - type: note
    content: Gen. 49:1; Deut. 4:30; Dan. 2:28
  - type: text
    content: latter days.”
  - type: heading
    content: Balaam’s Fourth Prophecy
  '15':
