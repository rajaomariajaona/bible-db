verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The King Dethrones Queen Vashti
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it came to pass in the days of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 4:6; Dan. 9:1
      marker-yv: yv-n
    - type: text
      text: 'Ahasuerus (this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the Ahasuerus who reigned '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 8:9
      marker-yv: yv-n
    - type: text
      text: 'over one hundred and twenty-seven provinces, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 6:1
      marker-yv: yv-n
    - type: text
      text: 'from India to Ethiopia), '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the seventh day, when the heart of the king was merry with wine, he commanded Mehuman, Biztha, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 7:9
      marker-yv: yv-n
    - type: text
      text: 'Harbona, Bigtha, Abagtha, Zethar, and Carcas, seven eunuchs who served in the presence of King Ahasuerus, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to bring Queen Vashti before the king, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wearing
    - type: text
      text: ' her royal crown, in order to show her beauty to the people and the officials, for she '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' beautiful to behold. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Queen Vashti refused to come at the king’s command '
    - type: usfm
      marker: it
      children:
      - type: text
        text: brought
    - type: text
      text: ' by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' eunuchs; therefore the king was furious, and his anger burned within him.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king said to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 10:7; Dan. 2:12; Matt. 2:1
      marker-yv: yv-n
    - type: text
      text: 'wise men '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 12:32
      marker-yv: yv-n
    - type: text
      text: 'who understood the times (for this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the king’s manner toward all who knew law and justice, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'those closest to him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: being
    - type: text
      text: ' Carshena, Shethar, Admatha, Tarshish, Meres, Marsena, and Memucan, the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 7:14
      marker-yv: yv-n
    - type: text
      text: 'seven princes of Persia and Media, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:19; (Matt. 18:10)
      marker-yv: yv-n
    - type: text
      text: 'who had access to the king’s presence, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' who ranked highest in the kingdom): '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we
    - type: text
      text: ' do to Queen Vashti, according to law, because she did not obey the command of King Ahasuerus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: brought
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' by the eunuchs?”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Memucan answered before the king and the princes: “Queen Vashti has not only wronged the king, but also all the princes, and all the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in all the provinces of King Ahasuerus. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the queen’s behavior will become known to all women, so that they will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eph. 5:33)
      marker-yv: yv-n
    - type: text
      text: 'despise their husbands in their eyes, when they report, ‘King Ahasuerus commanded Queen Vashti to be brought in before him, but she did not come.’ '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This very day the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: noble
    - type: text
      text: ' ladies of Persia and Media will say to all the king’s officials that they have heard of the behavior of the queen. Thus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' excessive contempt and wrath. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If it pleases the king, let a royal decree go out from him, and let it be recorded in the laws of the Persians and the Medes, so that it will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 8:8; Dan. 6:8
      marker-yv: yv-n
    - type: text
      text: 'not be altered, that Vashti shall come no more before King Ahasuerus; and let the king give her royal position to another who is better than she. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in those days when King Ahasuerus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 1:46
      marker-yv: yv-n
    - type: text
      text: 'sat on the throne of his kingdom, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 1:1; Dan. 8:2
      marker-yv: yv-n
    - type: text
      text: 'Shushan the citadel, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the king’s decree which he will make is proclaimed throughout all his empire (for it is great), all wives will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eph. 5:33; Col. 3:18; 1 Pet. 3:1)
      marker-yv: yv-n
    - type: text
      text: honor their husbands, both great and small.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the reply pleased the king and the princes, and the king did according to the word of Memucan. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he sent letters to all the king’s provinces, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 3:12, 8:9
      marker-yv: yv-n
    - type: text
      text: 'to each province in its own script, and to every people in their own language, that each man should '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eph. 5:22–24; 1 Tim. 2:12)
      marker-yv: yv-n
    - type: text
      text: be master in his own house, and speak in the language of his own people.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' in the third year of his reign he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 40:20; Esth. 2:18
      marker-yv: yv-n
    - type: text
      text: 'made a feast for all his officials and servants—the powers of Persia and Media, the nobles, and the princes of the provinces '
    - type: usfm
      marker: it
      children:
      - type: text
        text: being
    - type: text
      text: ' before him— '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'when he showed the riches of his glorious kingdom and the splendor of his excellent majesty for many days, one hundred and eighty days '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: all.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when these days were completed, the king made a feast lasting seven days for all the people who were present in Shushan the citadel, from great to small, in the court of the garden of the king’s palace. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: There
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' white and blue linen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: curtains
    - type: text
      text: ' fastened with cords of fine linen and purple on silver rods and marble pillars; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 7:8; Ezek. 23:41; Amos 2:8; 6:4
      marker-yv: yv-n
    - type: text
      text: 'couches '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' of gold and silver on a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mosaic
    - type: text
      text: ' pavement of alabaster, turquoise, and white and black marble. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they served drinks in golden vessels, each vessel being different from the other, with royal wine in abundance, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 2:18
      marker-yv: yv-n
    - type: text
      text: 'according to the generosity of the king. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In accordance with the law, the drinking was not compulsory; for so the king had ordered all the officers of his household, that they should do according to each man’s pleasure.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Queen Vashti also made a feast for the women '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' the royal palace which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belonged
    - type: text
      text: ' to King Ahasuerus.'
