document_id: MAT.24,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Predicts the Destruction of the Temple
  - type: text
    content: 'Then '
  - type: note
    content: Mark 13:1; Luke 21:5–36
  - type: text
    content: 'Jesus went out and departed from the temple, and His disciples came up to show Him the buildings of the temple. '
  '10':
  - type: text
    content: And then many will be offended, will betray one another, and will hate one another.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Then '
  - type: note
    content: Acts 20:29; 2 Pet. 2:1; Rev. 13:11; 19:20
  - type: text
    content: 'many false prophets will rise up and '
  - type: note
    content: (1 Tim. 4:1)
  - type: text
    content: deceive many.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And because lawlessness will abound, the love of many will grow '
  - type: note
    content: (2 Thess. 2:3; 2 Tim. 3:1–3)
  - type: text
    content: cold.
  - type: text
    content: ' '
  '13':
  - type: note
    content: Matt. 10:22; Mark 13:13
  - type: text
    content: But he who endures to the end shall be saved.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And this '
  - type: note
    content: Matt. 4:23
  - type: text
    content: 'gospel of the kingdom '
  - type: note
    content: Rom. 10:18; Col. 1:6, 23
  - type: text
    content: will be preached in all the world as a witness to all the nations, and then the end will come.
  - type: heading
    content: The Great Tribulation
  '15':
  - type: note
    content: Mark 13:14; Luke 21:20; (John 11:48); Acts 6:13; 21:28
  - type: text
    content: '“Therefore when you see the '
  - type: note
    content: Dan. 9:27; 11:31; 12:11
  - type: text
    content: ‘abomination of desolation,’
  - type: text
    content: ' spoken of by Daniel the prophet, standing in the holy place”'
  - type: text
    content: ' '
  - type: note
    content: Dan. 9:23
  - type: text
    content: '(whoever reads, let him understand), '
  '16':
  - type: text
    content: “then let those who are in Judea flee to the mountains.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Let him who is on the housetop not go down to take anything out of his house.
  - type: text
    content: ' '
  '18':
  - type: text
    content: And let him who is in the field not go back to get his clothes.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'But '
  - type: note
    content: Luke 23:29
  - type: text
    content: woe to those who are pregnant and to those who are nursing babies in those days!
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: '“Do you not see all these things? Assuredly, I say to you, '
  - type: note
    content: 1 Kin. 9:7; Mic. 3:12; Luke 19:44
  - type: text
    content: 'not '
  - type: text
    content: one
  - type: text
    content: ' stone shall be left here upon another, that shall not be thrown down.”'
  - type: heading
    content: The Signs of the Times and the End of the Age
  '20':
  - type: text
    content: And pray that your flight may not be in winter or on the Sabbath.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'For '
  - type: note
    content: Dan. 9:26
  - type: text
    content: then there will be great tribulation, such as has not been since the beginning of the world until this time, no, nor ever shall be.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And unless those days were shortened, no flesh would be saved; '
  - type: note
    content: Is. 65:8, 9; (Zech. 14:2)
  - type: text
    content: 'but for the '
  - type: text
    content: elect’s sake those days will be shortened.
  '23':
  - type: note
    content: Mark 13:21; Luke 17:23
  - type: text
    content: '“Then if anyone says to you, ‘Look, here '
  - type: text
    content: is
  - type: text
    content: ' the Christ!’ or ‘There!’ do not believe '
  - type: text
    content: it.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'For '
  - type: note
    content: Deut. 13:1; John 4:48; (2 Thess. 2:9); Rev. 13:13
  - type: text
    content: 'false christs and false prophets will rise and show great signs and wonders to deceive, '
  - type: note
    content: (John 6:37; Rom. 8:28; 2 Tim. 2:19)
  - type: text
    content: if possible, even the elect.
  - type: text
    content: ' '
  '25':
  - type: text
    content: See, I have told you beforehand.
  '26':
  - type: text
    content: '“Therefore if they say to you, ‘Look, He is in the desert!’ do not go out; '
  - type: text
    content: or
  - type: text
    content: ' ‘Look, '
  - type: text
    content: He is
  - type: text
    content: ' in the inner rooms!’ do not believe '
  - type: text
    content: it.
  - type: text
    content: ' '
  '27':
  - type: note
    content: Luke 17:24
  - type: text
    content: For as the lightning comes from the east and flashes to the west, so also will the coming of the Son of Man be.
  - type: text
    content: ' '
  '28':
  - type: note
    content: Job 39:30; Ezek. 39:17; Hab. 1:8; Luke 17:37
  - type: text
    content: For wherever the carcass is, there the eagles will be gathered together.
  - type: heading
    content: The Coming of the Son of Man
  '29':
  - type: note
    content: (Dan. 7:11)
  - type: text
    content: '“Immediately after the tribulation of those days '
  - type: note
    content: Is. 13:10; 24:23; Ezek. 32:7; Joel 2:10, 31; 3:15; Amos 5:20; 8:9; Zeph. 1:15; Matt. 24:29–35; Acts 2:20; Rev. 6:12–17; 8:12
  - type: text
    content: the sun will be darkened, and the moon will not give its light; the stars will fall from heaven, and the powers of the heavens will be shaken.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Now as He sat on the Mount of Olives, '
  - type: note
    content: Mark 13:3
  - type: text
    content: 'the disciples came to Him privately, saying, '
  - type: note
    content: (Matt. 24:27, 37, 39; Luke 17:20–37; 1 Thess. 5:1–3)
  - type: text
    content: '“Tell us, when will these things be? And what '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' the sign of Your coming, and of the end of the age?”'
  '30':
  - type: note
    content: (Dan. 7:13, 14; Matt. 16:27; 24:3, 37, 39)
  - type: text
    content: 'Then the sign of the Son of Man will appear in heaven, '
  - type: note
    content: Zech. 12:12
  - type: text
    content: and then all the tribes of the earth will mourn, and they will see the Son of Man coming on the clouds of heaven with power and great glory.
  - type: text
    content: ' '
  '31':
  - type: note
    content: Ex. 19:16; Deut. 30:4; Is. 27:13; Zech. 9:14; (1 Cor. 15:52; 1 Thess. 4:16); Heb. 12:19; Rev. 8:2; 11:15
  - type: text
    content: 'And He will send His angels with a great sound of a trumpet, and they will gather together His '
  - type: text
    content: elect from the four winds, from one end of heaven to the other.
  - type: heading
    content: The Parable of the Fig Tree
  '32':
  - type: text
    content: '“Now learn '
  - type: note
    content: Luke 21:29
  - type: text
    content: 'this parable from the fig tree: When its branch has already become tender and puts forth leaves, you know that summer '
  - type: text
    content: is
  - type: text
    content: ' near.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'So you also, when you see all these things, know '
  - type: note
    content: (James 5:9; Rev. 3:20)
  - type: text
    content: 'that '
  - type: text
    content: it
  - type: text
    content: ' is near—at the doors!'
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Assuredly, I say to you, '
  - type: note
    content: (Matt. 10:23; 16:28; 23:36)
  - type: text
    content: this generation will by no means pass away till all these things take place.
  - type: text
    content: ' '
  '35':
  - type: note
    content: Ps. 102:25, 26; Is. 51:6; Mark 13:31; Luke 21:33; (1 Pet. 1:23–25; 2 Pet. 3:10)
  - type: text
    content: Heaven and earth will pass away, but My words will by no means pass away.
  - type: heading
    content: No One Knows the Day or Hour
  '36':
  - type: note
    content: Mark 13:32; Acts 1:7; 1 Thess. 5:2; 2 Pet. 3:10
  - type: text
    content: '“But of that day and hour no one knows, not even the angels of '
  - type: text
    content: heaven,
  - type: text
    content: ' '
  - type: note
    content: Zech. 14:7
  - type: text
    content: but My Father only.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'But as the days of Noah '
  - type: text
    content: were,
  - type: text
    content: ' so also will the coming of the Son of Man be.'
  - type: text
    content: ' '
  '38':
  - type: note
    content: (Gen. 6:3–5); Luke 17:26; (1 Pet. 3:20)
  - type: text
    content: For as in the days before the flood, they were eating and drinking, marrying and giving in marriage, until the day that Noah entered the ark,
  - type: text
    content: ' '
  '39':
  - type: text
    content: and did not know until the flood came and took them all away, so also will the coming of the Son of Man be.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'And Jesus answered and said to them: '
  - type: note
    content: Eph. 5:6; (Col. 2:8, 18; 2 Thess. 2:3; 1 John 4:1–3)
  - type: text
    content: “Take heed that no one deceives you.
  - type: text
    content: ' '
  '40':
  - type: note
    content: Luke 17:34
  - type: text
    content: 'Then two '
  - type: text
    content: men
  - type: text
    content: ' will be in the field: one will be taken and the other left.'
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'Two '
  - type: text
    content: women will be
  - type: text
    content: ' grinding at the mill: one will be taken and the other left.'
  - type: text
    content: ' '
  '42':
  - type: note
    content: Matt. 25:13; Luke 21:36; 1 Thess. 5:6
  - type: text
    content: 'Watch therefore, for you do not know what '
  - type: text
    content: hour
  - type: text
    content: ' your Lord is coming.'
  - type: text
    content: ' '
  '43':
  - type: note
    content: Luke 12:39; 1 Thess. 5:2; Rev. 3:3
  - type: text
    content: 'But know this, that if the master of the house had known what '
  - type: text
    content: hour the thief would come, he would have watched and not allowed his house to be broken into.
  - type: text
    content: ' '
  '44':
  - type: note
    content: Luke 12:35–40; (1 Thess. 5:6)
  - type: text
    content: Therefore you also be ready, for the Son of Man is coming at an hour you do not expect.
  - type: heading
    content: The Faithful Servant and the Evil Servant
  '45':
  - type: note
    content: Luke 12:42–46; (Acts 20:28)
  - type: text
    content: '“Who then is a faithful and wise servant, whom his master made ruler over his household, to give them food '
  - type: text
    content: in due season?
  - type: text
    content: ' '
  '46':
  - type: note
    content: Rev. 16:15
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' that servant whom his master, when he comes, will find so doing.'
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'Assuredly, I say to you that '
  - type: note
    content: Matt. 25:21, 23; Luke 22:29
  - type: text
    content: he will make him ruler over all his goods.
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'But if that evil servant says in his heart, ‘My master '
  - type: note
    content: (2 Pet. 3:4–9)
  - type: text
    content: 'is delaying '
  - type: text
    content: his coming,’
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'and begins to beat '
  - type: text
    content: his
  - type: text
    content: ' fellow servants, and to eat and drink with the drunkards,'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'For '
  - type: note
    content: Jer. 14:14; John 5:43; Acts 5:36; (1 John 2:18; 4:3)
  - type: text
    content: 'many will come in My name, saying, ‘I am the Christ,’ '
  - type: note
    content: Matt. 24:11
  - type: text
    content: and will deceive many.
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'the master of that servant will come on a day when he is not looking for '
  - type: text
    content: him
  - type: text
    content: ' and at an hour that he is '
  - type: note
    content: Mark 13:32
  - type: text
    content: not aware of,
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'and will cut him in two and appoint '
  - type: text
    content: him
  - type: text
    content: ' his portion with the hypocrites. '
  - type: note
    content: Matt. 8:12; 25:30
  - type: text
    content: There shall be weeping and gnashing of teeth.
  '6':
  - type: text
    content: 'And you will hear of '
  - type: note
    content: (Rev. 6:2–4)
  - type: text
    content: 'wars and rumors of wars. See that you are not troubled; for '
  - type: text
    content: all
  - type: text
    content: ' '
  - type: text
    content: these things
  - type: text
    content: ' must come to pass, but the end is not yet.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: 2 Chr. 15:6; Is. 19:2; Hag. 2:22; Zech. 14:13
  - type: text
    content: 'nation will rise against nation, and kingdom against kingdom. And there will be '
  - type: note
    content: Acts 11:28; Rev. 6:5, 6
  - type: text
    content: 'famines, '
  - type: text
    content: pestilences,
  - type: text
    content: ' and earthquakes in various places.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'All these '
  - type: text
    content: are
  - type: text
    content: ' the beginning of sorrows.'
  '9':
  - type: note
    content: Matt. 10:17; Luke 21:12; (John 16:2); Acts 4:2, 3; Rev. 2:10
  - type: text
    content: “Then they will deliver you up to tribulation and kill you, and you will be hated by all nations for My name’s sake.
  - type: text
    content: ' '
