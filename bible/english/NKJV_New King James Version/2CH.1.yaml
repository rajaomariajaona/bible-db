      text: 1 Kin. 10:28; 22:36; 2 Chr. 9:28
    marker-yv: yv-n
  - type: text
    text: 'And Solomon had horses imported from Egypt and Keveh; the king’s merchants bought them in Keveh at the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: current
  - type: text
    text: ' price. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'They also acquired and imported from Egypt a chariot for six hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shekels
  - type: text
    text: ' of silver, and a horse for one hundred and fifty; thus, through their agents, they exported them to all the kings of the Hittites and the kings of Syria.'
