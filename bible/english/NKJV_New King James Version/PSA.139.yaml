document_id: PSA.139,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Perfect Knowledge of Man
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Chief Musician. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 10:3, 8
      marker-yv: yv-n
    - type: text
      text: 'You have searched me and known '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Even there Your hand shall lead me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And Your right hand shall hold me.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: If I say, “Surely the darkness shall fall on me,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even the night shall be light about me;
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Indeed, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 26:6; Prov. 15:11)
      marker-yv: yv-n
    - type: text
      text: the darkness shall not hide from You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the night shines as the day;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The darkness and the light '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' both alike '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: For You formed my inward parts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You covered me in my mother’s womb.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I will praise You, for I am fearfully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wonderfully made;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Marvelous are Your works,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' my soul knows very well.'
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 26:6; 34:22; (Dan. 2:22; Heb. 4:13)
      marker-yv: yv-n
    - type: text
      text: My frame was not hidden from You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When I was made in secret,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' skillfully wrought in the lowest parts of the earth.'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Your eyes saw my substance, being yet unformed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in Your book they all were written,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The days fashioned for me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yet
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' none of them.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 10:8, 9; Eccl. 11:5
      marker-yv: yv-n
    - type: text
      text: How precious also are Your thoughts to me, O God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How great is the sum of them!
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: it
      children:
      - type: text
        text: If
    - type: text
      text: ' I should count them, they would be more in number than the sand;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When I awake, I am still with You.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Oh, that You would '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 40:5; Rom. 11:33)
      marker-yv: yv-n
    - type: text
      text: slay the wicked, O God!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 11:4)
      marker-yv: yv-n
    - type: text
      text: Depart from me, therefore, you bloodthirsty men.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 17:3; Jer. 12:3
      marker-yv: yv-n
    - type: text
      text: You know my sitting down and my rising up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 19:27
      marker-yv: yv-n
    - type: text
      text: understand my thought afar off.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:115
      marker-yv: yv-n
    - type: text
      text: speak against You wickedly;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Your enemies take '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Your
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: name
    - type: text
      text: ' in vain.'
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jude 15
      marker-yv: yv-n
    - type: text
      text: 'Do I not hate them, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who hate You?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And do I not loathe those who rise up against You?
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: I hate them with perfect hatred;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I count them my enemies.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 19:2
      marker-yv: yv-n
    - type: text
      text: Search me, O God, and know my heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Try me, and know my anxieties;
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And see if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' wicked way in me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 31:6; Ps. 26:2
      marker-yv: yv-n
    - type: text
      text: lead me in the way everlasting.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 66:18; Matt. 9:4
      marker-yv: yv-n
    - type: text
      text: You comprehend my path and my lying down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And are acquainted with all my ways.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not a word on my tongue,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But
    - type: text
      text: ' behold, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 14:16; 31:4
      marker-yv: yv-n
    - type: text
      text: You know it altogether.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You have hedged me behind and before,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And laid Your hand upon me.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 4:13)
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Such
    - type: text
      text: ' knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' too wonderful for me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'It is high, I cannot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: attain
    - type: text
      text: ' it.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 42:3; Ps. 40:5
      marker-yv: yv-n
    - type: text
      text: Where can I go from Your Spirit?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or where can I flee from Your presence?
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Jer. 23:24; Amos 9:2–4)
      marker-yv: yv-n
    - type: text
      text: 'If I ascend into heaven, You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' there;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Amos 9:2–4)
      marker-yv: yv-n
    - type: text
      text: 'If I make my bed in hell, behold, You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: it
      children:
      - type: text
        text: If
    - type: text
      text: ' I take the wings of the morning,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' dwell in the uttermost parts of the sea,'
