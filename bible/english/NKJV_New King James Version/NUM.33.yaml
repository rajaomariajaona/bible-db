verses:
  '1':
  - type: heading
    content: Israel’s Journey from Egypt Reviewed
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the journeys of the children of Israel, who went out of the land of Egypt by their armies under the '
  - type: note
    content: Ps. 77:20
  - type: text
    content: 'hand of Moses and Aaron. '
  '10':
  - type: text
    content: 'They moved from Elim and camped by the Red Sea. '
  '11':
  - type: text
    content: 'They moved from the Red Sea and camped in the '
  - type: note
    content: Ex. 16:1
  - type: text
    content: 'Wilderness of Sin. '
  '12':
  - type: text
    content: 'They journeyed from the Wilderness of Sin and camped at Dophkah. '
  '13':
  - type: text
    content: 'They departed from Dophkah and camped at Alush. '
  '14':
  - type: text
    content: 'They moved from Alush and camped at '
  - type: note
    content: Ex. 17:1; 19:2
  - type: text
    content: Rephidim, where there was no water for the people to drink.
  '15':
  - type: text
    content: 'They departed from Rephidim and camped in the '
  - type: note
    content: Ex. 16:1; 19:1, 2
  - type: text
    content: 'Wilderness of Sinai. '
  '16':
  - type: text
    content: 'They moved from the Wilderness of Sinai and camped '
  - type: note
    content: Num. 11:34
  - type: text
    content: 'at Kibroth Hattaavah. '
  '17':
  - type: text
    content: 'They departed from Kibroth Hattaavah and '
  - type: note
    content: Num. 11:35
  - type: text
    content: 'camped at Hazeroth. '
  '18':
  - type: text
    content: 'They departed from Hazeroth and camped at '
  - type: note
    content: Num. 12:16
  - type: text
    content: 'Rithmah. '
  '19':
  - type: text
    content: 'They departed from Rithmah and camped at Rimmon Perez. '
  '2':
  - type: text
    content: 'Now Moses wrote down the starting points of their journeys at the command of the '
  - type: heading
    content: Lord
  - type: text
    content: '. And these '
  - type: text
    content: are
  - type: text
    content: ' their journeys according to their starting points:'
  '20':
  - type: text
    content: 'They departed from Rimmon Perez and camped at Libnah. '
  '21':
  - type: text
    content: 'They moved from Libnah and camped at Rissah. '
  '22':
  - type: text
    content: 'They journeyed from Rissah and camped at Kehelathah. '
  '23':
  - type: text
    content: 'They went from Kehelathah and camped at Mount Shepher. '
  '24':
  - type: text
    content: 'They moved from Mount Shepher and camped at Haradah. '
  '25':
  - type: text
    content: 'They moved from Haradah and camped at Makheloth. '
  '26':
  - type: text
    content: 'They moved from Makheloth and camped at Tahath. '
  '27':
  - type: text
    content: 'They departed from Tahath and camped at Terah. '
  '28':
  - type: text
    content: 'They moved from Terah and camped at Mithkah. '
  '29':
  - type: text
    content: 'They went from Mithkah and camped at Hashmonah. '
  '3':
  - type: text
    content: 'They '
  - type: note
    content: Ex. 12:37
  - type: text
    content: 'departed from Rameses in '
  - type: note
    content: Ex. 12:2; 13:4
  - type: text
    content: 'the first month, on the fifteenth day of the first month; on the day after the Passover the children of Israel went out '
  - type: note
    content: Ex. 14:8
  - type: text
    content: 'with boldness in the sight of all the Egyptians. '
  '30':
  - type: text
    content: 'They departed from Hashmonah and '
  - type: note
    content: Deut. 10:6
  - type: text
    content: 'camped at Moseroth. '
  '31':
  - type: text
    content: 'They departed from Moseroth and camped at Bene Jaakan. '
  '32':
  - type: text
    content: 'They moved from '
  - type: note
    content: Deut. 10:6
  - type: text
    content: 'Bene Jaakan and '
  - type: note
    content: Deut. 10:7
  - type: text
    content: 'camped at Hor Hagidgad. '
  '33':
  - type: text
    content: 'They went from Hor Hagidgad and camped at Jotbathah. '
  '34':
  - type: text
    content: 'They moved from Jotbathah '
  - type: note
    content: Deut. 2:8; 1 Kin. 9:26; 22:48
  - type: text
    content: 'and camped at Abronah. '
  '35':
  - type: text
    content: 'They departed from Abronah and camped at Ezion Geber. '
  '36':
  - type: text
    content: 'They moved from Ezion Geber and camped in the '
  - type: note
    content: Num. 20:1; 27:14
  - type: text
    content: 'Wilderness of Zin, which '
  - type: text
    content: is
  - type: text
    content: ' Kadesh. '
  '37':
  - type: text
    content: 'They moved from '
  - type: note
    content: Num. 20:22, 23; 21:4
  - type: text
    content: Kadesh and camped at Mount Hor, on the boundary of the land of Edom.
  '38':
  - type: text
    content: 'Then '
  - type: note
    content: Num. 20:25, 28; Deut. 10:6; 32:50
  - type: text
    content: 'Aaron the priest went up to Mount Hor at the command of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and died there in the fortieth year after the children of Israel had come out of the land of Egypt, on the first '
  - type: text
    content: day
  - type: text
    content: ' of the fifth month. '
  '39':
  - type: text
    content: 'Aaron '
  - type: text
    content: was
  - type: text
    content: ' one hundred and twenty-three years old when he died on Mount Hor.'
  '4':
  - type: text
    content: 'For the Egyptians were burying all '
  - type: text
    content: their
  - type: text
    content: ' firstborn, '
  - type: note
    content: Ex. 12:29
  - type: text
    content: 'whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' had killed among them. Also '
  - type: note
    content: (Ex. 12:12; 18:11); Is. 19:1
  - type: text
    content: 'on their gods the '
  - type: heading
    content: Lord
  - type: text
    content: ' had executed judgments.'
  '40':
  - type: text
    content: 'Now '
  - type: note
    content: Num. 21:1
  - type: text
    content: the king of Arad, the Canaanite, who dwelt in the South in the land of Canaan, heard of the coming of the children of Israel.
  '41':
  - type: text
    content: 'So they departed from Mount Hor and camped at Zalmonah. '
  '42':
  - type: text
    content: 'They departed from Zalmonah and camped at Punon. '
  '43':
  - type: text
    content: 'They departed from Punon and '
  - type: note
    content: Num. 21:10
  - type: text
    content: 'camped at Oboth. '
  '44':
  - type: note
    content: Num. 21:11
  - type: text
    content: 'They departed from Oboth and camped at Ije Abarim, at the border of Moab. '
  '45':
  - type: text
    content: 'They departed from Ijim and camped '
  - type: note
    content: Num. 32:34
  - type: text
    content: 'at Dibon Gad. '
  '46':
  - type: text
    content: 'They moved from Dibon Gad and camped at '
  - type: note
    content: Jer. 48:22; Ezek. 6:14
  - type: text
    content: 'Almon Diblathaim. '
  '47':
  - type: text
    content: 'They moved from Almon Diblathaim '
  - type: note
    content: Num. 21:20; Deut. 32:49
  - type: text
    content: 'and camped in the mountains of Abarim, before Nebo. '
  '48':
  - type: text
    content: 'They departed from the mountains of Abarim and '
  - type: note
    content: Num. 22:1; 31:12; 35:1
  - type: text
    content: 'camped in the plains of Moab by the Jordan, '
  - type: text
    content: across
  - type: text
    content: ' '
  - type: text
    content: from
  - type: text
    content: ' Jericho. '
  '49':
  - type: text
    content: 'They camped by the Jordan, from Beth Jesimoth as far as the '
  - type: note
    content: Num. 25:1; Josh. 2:1
  - type: text
    content: Abel Acacia Grove in the plains of Moab.
  - type: heading
    content: Instructions for the Conquest of Canaan
  '5':
  - type: note
    content: Ex. 12:37
  - type: text
    content: 'Then the children of Israel moved from Rameses and camped at Succoth. '
  '50':
  - type: text
    content: 'Now the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses in the plains of Moab by the Jordan, '
  - type: text
    content: across
  - type: text
    content: ' '
  - type: text
    content: from
  - type: text
    content: ' Jericho, saying, '
  '51':
  - type: text
    content: '“Speak to the children of Israel, and say to them: '
  - type: note
    content: Deut. 7:1, 2; 9:1; Josh. 3:17
  - type: text
    content: '‘When you have crossed the Jordan into the land of Canaan, '
  '52':
  - type: note
    content: Ex. 23:24, 33; 34:13; Deut. 7:2, 5; 12:3; Judg. 2:2; Ps. 106:34–36
  - type: text
    content: 'then you shall drive out all the inhabitants of the land from before you, destroy all their engraved stones, destroy all their molded images, and demolish all their high places; '
  '53':
  - type: text
    content: 'you shall dispossess '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: inhabitants
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' the land and dwell in it, for I have given you the land to '
  - type: note
    content: Deut. 11:31; Josh. 21:43
  - type: text
    content: 'possess. '
  '54':
  - type: text
    content: 'And '
  - type: note
    content: Num. 26:53–56
  - type: text
    content: 'you shall divide the land by lot as an inheritance among your families; to the larger you shall give a larger inheritance, and to the smaller you shall give a smaller inheritance; there everyone’s '
  - type: text
    content: inheritance
  - type: text
    content: ' shall be whatever falls to him by lot. You shall inherit according to the tribes of your fathers. '
  '55':
  - type: text
    content: 'But if you do not drive out the inhabitants of the land from before you, then it shall be that those whom you let remain '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' '
  - type: note
    content: Josh. 23:13; Judg. 2:3
  - type: text
    content: 'irritants in your eyes and thorns in your sides, and they shall harass you in the land where you dwell. '
  '56':
  - type: text
    content: 'Moreover it shall be '
  - type: text
    content: that
  - type: text
    content: ' I will do to you as I thought to do to them.’ ”'
  '6':
  - type: text
    content: 'They departed from '
  - type: note
    content: Ex. 13:20
  - type: text
    content: 'Succoth and camped at Etham, which '
  - type: text
    content: is
  - type: text
    content: ' on the edge of the wilderness. '
  '7':
  - type: note
    content: Ex. 14:1, 2, 9
  - type: text
    content: 'They moved from Etham and turned back to Pi Hahiroth, which '
  - type: text
    content: is
  - type: text
    content: ' east of Baal Zephon; and they camped near Migdol. '
  '8':
  - type: text
    content: 'They departed from before Hahiroth and '
  - type: note
    content: Ex. 14:22; 15:22, 23
  - type: text
    content: 'passed through the midst of the sea into the wilderness, went three days’ journey in the Wilderness of Etham, and camped at Marah. '
  '9':
  - type: text
    content: 'They moved from Marah and '
  - type: note
    content: Ex. 15:27
  - type: text
    content: 'came to Elim. At Elim '
  - type: text
    content: were
  - type: text
    content: ' twelve springs of water and seventy palm trees; so they camped there.'
