document_id: NUM.33,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Journey from Egypt Reviewed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the journeys of the children of Israel, who went out of the land of Egypt by their armies under the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 77:20
      marker-yv: yv-n
    - type: text
      text: 'hand of Moses and Aaron. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from Elim and camped by the Red Sea. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from the Red Sea and camped in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 16:1
      marker-yv: yv-n
    - type: text
      text: 'Wilderness of Sin. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They journeyed from the Wilderness of Sin and camped at Dophkah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from Dophkah and camped at Alush. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from Alush and camped at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 17:1; 19:2
      marker-yv: yv-n
    - type: text
      text: Rephidim, where there was no water for the people to drink.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from Rephidim and camped in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 16:1; 19:1, 2
      marker-yv: yv-n
    - type: text
      text: 'Wilderness of Sinai. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from the Wilderness of Sinai and camped '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 11:34
      marker-yv: yv-n
    - type: text
      text: 'at Kibroth Hattaavah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from Kibroth Hattaavah and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 11:35
      marker-yv: yv-n
    - type: text
      text: 'camped at Hazeroth. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from Hazeroth and camped at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 12:16
      marker-yv: yv-n
    - type: text
      text: 'Rithmah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from Rithmah and camped at Rimmon Perez. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Moses wrote down the starting points of their journeys at the command of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. And these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' their journeys according to their starting points:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from Rimmon Perez and camped at Libnah. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from Libnah and camped at Rissah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They journeyed from Rissah and camped at Kehelathah. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They went from Kehelathah and camped at Mount Shepher. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from Mount Shepher and camped at Haradah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from Haradah and camped at Makheloth. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from Makheloth and camped at Tahath. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from Tahath and camped at Terah. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from Terah and camped at Mithkah. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They went from Mithkah and camped at Hashmonah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:37
      marker-yv: yv-n
    - type: text
      text: 'departed from Rameses in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:2; 13:4
      marker-yv: yv-n
    - type: text
      text: 'the first month, on the fifteenth day of the first month; on the day after the Passover the children of Israel went out '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 14:8
      marker-yv: yv-n
    - type: text
      text: 'with boldness in the sight of all the Egyptians. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from Hashmonah and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 10:6
      marker-yv: yv-n
    - type: text
      text: 'camped at Moseroth. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from Moseroth and camped at Bene Jaakan. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 10:6
      marker-yv: yv-n
    - type: text
      text: 'Bene Jaakan and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 10:7
      marker-yv: yv-n
    - type: text
      text: 'camped at Hor Hagidgad. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They went from Hor Hagidgad and camped at Jotbathah. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from Jotbathah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 2:8; 1 Kin. 9:26; 22:48
      marker-yv: yv-n
    - type: text
      text: 'and camped at Abronah. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from Abronah and camped at Ezion Geber. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from Ezion Geber and camped in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:1; 27:14
      marker-yv: yv-n
    - type: text
      text: 'Wilderness of Zin, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Kadesh. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:22, 23; 21:4
      marker-yv: yv-n
    - type: text
      text: Kadesh and camped at Mount Hor, on the boundary of the land of Edom.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:25, 28; Deut. 10:6; 32:50
      marker-yv: yv-n
    - type: text
      text: 'Aaron the priest went up to Mount Hor at the command of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and died there in the fortieth year after the children of Israel had come out of the land of Egypt, on the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the fifth month. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' one hundred and twenty-three years old when he died on Mount Hor.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the Egyptians were burying all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' firstborn, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:29
      marker-yv: yv-n
    - type: text
      text: 'whom the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had killed among them. Also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 12:12; 18:11); Is. 19:1
      marker-yv: yv-n
    - type: text
      text: 'on their gods the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had executed judgments.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:1
      marker-yv: yv-n
    - type: text
      text: the king of Arad, the Canaanite, who dwelt in the South in the land of Canaan, heard of the coming of the children of Israel.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they departed from Mount Hor and camped at Zalmonah. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from Zalmonah and camped at Punon. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from Punon and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:10
      marker-yv: yv-n
    - type: text
      text: 'camped at Oboth. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:11
      marker-yv: yv-n
    - type: text
      text: 'They departed from Oboth and camped at Ije Abarim, at the border of Moab. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from Ijim and camped '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:34
      marker-yv: yv-n
    - type: text
      text: 'at Dibon Gad. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from Dibon Gad and camped at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 48:22; Ezek. 6:14
      marker-yv: yv-n
    - type: text
      text: 'Almon Diblathaim. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from Almon Diblathaim '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:20; Deut. 32:49
      marker-yv: yv-n
    - type: text
      text: 'and camped in the mountains of Abarim, before Nebo. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from the mountains of Abarim and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 22:1; 31:12; 35:1
      marker-yv: yv-n
    - type: text
      text: 'camped in the plains of Moab by the Jordan, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: across
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' Jericho. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They camped by the Jordan, from Beth Jesimoth as far as the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 25:1; Josh. 2:1
      marker-yv: yv-n
    - type: text
      text: Abel Acacia Grove in the plains of Moab.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Instructions for the Conquest of Canaan
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:37
      marker-yv: yv-n
    - type: text
      text: 'Then the children of Israel moved from Rameses and camped at Succoth. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses in the plains of Moab by the Jordan, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: across
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' Jericho, saying, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the children of Israel, and say to them: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:1, 2; 9:1; Josh. 3:17
      marker-yv: yv-n
    - type: text
      text: '‘When you have crossed the Jordan into the land of Canaan, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:24, 33; 34:13; Deut. 7:2, 5; 12:3; Judg. 2:2; Ps. 106:34–36
      marker-yv: yv-n
    - type: text
      text: 'then you shall drive out all the inhabitants of the land from before you, destroy all their engraved stones, destroy all their molded images, and demolish all their high places; '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'you shall dispossess '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: inhabitants
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' the land and dwell in it, for I have given you the land to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 11:31; Josh. 21:43
      marker-yv: yv-n
    - type: text
      text: 'possess. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 26:53–56
      marker-yv: yv-n
    - type: text
      text: 'you shall divide the land by lot as an inheritance among your families; to the larger you shall give a larger inheritance, and to the smaller you shall give a smaller inheritance; there everyone’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: inheritance
    - type: text
      text: ' shall be whatever falls to him by lot. You shall inherit according to the tribes of your fathers. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if you do not drive out the inhabitants of the land from before you, then it shall be that those whom you let remain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 23:13; Judg. 2:3
      marker-yv: yv-n
    - type: text
      text: 'irritants in your eyes and thorns in your sides, and they shall harass you in the land where you dwell. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover it shall be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' I will do to you as I thought to do to them.’ ”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 13:20
      marker-yv: yv-n
    - type: text
      text: 'Succoth and camped at Etham, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' on the edge of the wilderness. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 14:1, 2, 9
      marker-yv: yv-n
    - type: text
      text: 'They moved from Etham and turned back to Pi Hahiroth, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' east of Baal Zephon; and they camped near Migdol. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They departed from before Hahiroth and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 14:22; 15:22, 23
      marker-yv: yv-n
    - type: text
      text: 'passed through the midst of the sea into the wilderness, went three days’ journey in the Wilderness of Etham, and camped at Marah. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They moved from Marah and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:27
      marker-yv: yv-n
    - type: text
      text: 'came to Elim. At Elim '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' twelve springs of water and seventy palm trees; so they camped there.'
