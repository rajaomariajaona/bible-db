document_id: DEU.20,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Principles Governing Warfare
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When you go out to battle against your enemies, and see '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 20:7; Is. 31:1
      marker-yv: yv-n
    - type: text
      text: 'horses and chariots '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' people more numerous than you, do not be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:18
      marker-yv: yv-n
    - type: text
      text: 'afraid of them; for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 23:21; Deut. 5:6; 31:6, 8; 2 Chr. 13:12; 32:7, 8; Ps. 23:4; Is. 41:10
      marker-yv: yv-n
    - type: text
      text: 'with you, who brought you up from the land of Egypt. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When you go near a city to fight against it, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 10:19
      marker-yv: yv-n
    - type: text
      text: 'then proclaim an offer of peace to it. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be that if they accept your offer of peace, and open to you, then all the people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' found in it shall be placed under tribute to you, and serve you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: city
    - type: text
      text: ' will not make peace with you, but makes war against you, then you shall besiege it. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God delivers it into your hands, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 31:7
      marker-yv: yv-n
    - type: text
      text: 'you shall strike every male in it with the edge of the sword. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the women, the little ones, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 8:2
      marker-yv: yv-n
    - type: text
      text: 'the livestock, and all that is in the city, all its spoil, you shall plunder for yourself; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 14:30
      marker-yv: yv-n
    - type: text
      text: 'you shall eat the enemies’ plunder which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God gives you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus you shall do to all the cities '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' very far from you, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' not of the cities of these nations.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:31–33; Num. 21:2, 3; Deut. 7:1–5; Josh. 11:14
      marker-yv: yv-n
    - type: text
      text: 'of the cities of these peoples which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God gives you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' an inheritance, you shall let nothing that breathes remain alive, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but you shall utterly destroy them: the Hittite and the Amorite and the Canaanite and the Perizzite and the Hivite and the Jebusite, just as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has commanded you, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lest '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 34:12–16; Deut. 7:4; 12:30; 18:9
      marker-yv: yv-n
    - type: text
      text: 'they teach you to do according to all their abominations which they have done for their gods, and you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:33; 2 Kin. 21:3–15; Ps. 106:34–41
      marker-yv: yv-n
    - type: text
      text: 'sin against the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When you besiege a city for a long time, while making war against it to take it, you shall not destroy its trees by wielding an ax against them; if you can eat of them, do not cut them down to use in the siege, for the tree of the field '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' man’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: food.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it shall be, when you are on the verge of battle, that the priest shall approach and speak to the people. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only the trees which you know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' not trees for food you may destroy and cut down, to build siegeworks against the city that makes war with you, until it is subdued.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall say to them, ‘Hear, O Israel: Today you are on the verge of battle with your enemies. Do not let your heart faint, do not be afraid, and do not tremble or be terrified because of them; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' He who goes with you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:30; 3:22; Josh. 23:10
      marker-yv: yv-n
    - type: text
      text: to fight for you against your enemies, to save you.’
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then the officers shall speak to the people, saying: ‘What man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' who has built a new house and has not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 12:27
      marker-yv: yv-n
    - type: text
      text: 'dedicated it? Let him go and return to his house, lest he die in the battle and another man dedicate it. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also what man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' who has planted a vineyard and has not eaten of it? Let him go and return to his house, lest he die in the battle and another man eat of it. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 24:5
      marker-yv: yv-n
    - type: text
      text: 'And what man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' who is betrothed to a woman and has not married her? Let him go and return to his house, lest he die in the battle and another man marry her.’'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The officers shall speak further to the people, and say, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 7:3
      marker-yv: yv-n
    - type: text
      text: '‘What man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' fearful and fainthearted? Let him go and return to his house, lest the heart of his brethren faint like his heart.’ '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And so it shall be, when the officers have finished speaking to the people, that they shall make captains of the armies to lead the people.
