document_id: ACT.2,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Coming of the Holy Spirit
  - type: text
    content: 'When '
  - type: note
    content: Lev. 23:15; Deut. 16:9; Acts 20:16; 1 Cor. 16:8
  - type: text
    content: 'the Day of Pentecost had fully come, '
  - type: note
    content: Acts 1:14
  - type: text
    content: 'they were all with one accord in one place. '
  '10':
  - type: text
    content: 'Phrygia and Pamphylia, Egypt and the parts of Libya adjoining Cyrene, visitors from Rome, both Jews and proselytes, '
  '11':
  - type: text
    content: 'Cretans and Arabs—we hear them speaking in our own tongues the wonderful works of God.” '
  '12':
  - type: text
    content: So they were all amazed and perplexed, saying to one another, “Whatever could this mean?”
  '13':
  - type: text
    content: Others mocking said, “They are full of new wine.”
  - type: heading
    content: Peter’s Sermon
  '14':
  - type: text
    content: 'But Peter, standing up with the eleven, raised his voice and said to them, “Men of Judea and all who dwell in Jerusalem, let this be known to you, and heed my words. '
  '15':
  - type: text
    content: 'For these are not drunk, as you suppose, '
  - type: note
    content: 1 Thess. 5:7
  - type: text
    content: 'since it is '
  - type: text
    content: only
  - type: text
    content: ' the third hour of the day. '
  '16':
  - type: text
    content: 'But this is what was spoken by the prophet Joel:'
  '17':
  - type: text
    content: ‘And
  - type: note
    content: Is. 44:3; Ezek. 11:19; Joel 2:28–32; (Zech. 12:10; John 7:38)
  - type: text
    content: ' it shall come to pass in the last days, says God,'
  - type: note
    content: Acts 10:45
  - type: text
    content: That I will pour out of My Spirit on all flesh;
  - type: text
    content: 'Your sons and '
  - type: note
    content: Acts 21:9
  - type: text
    content: your daughters shall prophesy,
  - type: text
    content: Your young men shall see visions,
  - type: text
    content: Your old men shall dream dreams.
  '18':
  - type: text
    content: And on My menservants and on My maidservants
  - type: text
    content: I will pour out My Spirit in those days;
  - type: note
    content: Acts 21:4, 9; 1 Cor. 12:10
  - type: text
    content: And they shall prophesy.
  '19':
  - type: note
    content: Joel 2:30
  - type: text
    content: I will show wonders in heaven above
  - type: text
    content: 'And signs in the earth beneath:'
  - type: text
    content: Blood and fire and vapor of smoke.
  '2':
  - type: text
    content: 'And suddenly there came a sound from heaven, as of a rushing mighty wind, and it '
  - type: note
    content: Acts 4:31
  - type: text
    content: 'filled the whole house where they were sitting. '
  '20':
  - type: note
    content: Is. 13:10; Ezek. 32:7; Matt. 24:29; Mark 13:24, 25; Luke 21:25; Rev. 6:12
  - type: text
    content: The sun shall be turned into darkness,
  - type: text
    content: And the moon into blood,
  - type: text
    content: 'Before the coming of the great and awesome day of the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: And it shall come to pass
  - type: text
    content: That
  - type: text
    content: ' '
  - type: note
    content: Rom. 10:13
  - type: text
    content: 'whoever calls on the name of the '
  - type: heading
    content: Lord
  - type: text
    content: Shall be saved.’
  '22':
  - type: text
    content: '“Men of Israel, hear these words: Jesus of Nazareth, a Man attested by God to you '
  - type: note
    content: Is. 50:5; John 3:2; 5:6; Acts 10:38
  - type: text
    content: 'by miracles, wonders, and signs which God did through Him in your midst, as you yourselves also know— '
  '23':
  - type: text
    content: 'Him, '
  - type: note
    content: Matt. 26:4; Luke 22:22; Acts 3:18; 4:28; (1 Pet. 1:20)
  - type: text
    content: 'being delivered by the determined purpose and foreknowledge of God, '
  - type: note
    content: Acts 5:30
  - type: text
    content: 'you have taken by lawless hands, have crucified, and put to death; '
  '24':
  - type: note
    content: (Rom. 8:11; 1 Cor. 6:14; 2 Cor. 4:14; Eph. 1:20; Col. 2:12); 1 Thess. 1:10; Heb. 13:20
  - type: text
    content: 'whom God raised up, having loosed the pains of death, because it was not possible that He should be held by it. '
  '25':
  - type: text
    content: 'For David says concerning Him:'
  - type: note
    content: Ps. 16:8–11
  - type: text
    content: '‘I foresaw the '
  - type: heading
    content: Lord
  - type: text
    content: ' always before my face,'
  - type: text
    content: For He is at my right hand, that I may not be shaken.
  '26':
  - type: text
    content: Therefore my heart rejoiced, and my tongue was glad;
  - type: text
    content: Moreover my flesh also will rest in hope.
  '27':
  - type: text
    content: For You will not leave my soul in Hades,
  - type: text
    content: 'Nor will You allow Your Holy One to see '
  - type: note
    content: Acts 13:30–37
  - type: text
    content: corruption.
  '28':
  - type: text
    content: You have made known to me the ways of life;
  - type: text
    content: You will make me full of joy in Your presence.’
  '29':
  - type: text
    content: '“Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, let '
  - type: text
    content: me
  - type: text
    content: ' speak freely to you '
  - type: note
    content: Acts 13:36
  - type: text
    content: 'of the patriarch David, that he is both dead and buried, and his tomb is with us to this day. '
  '3':
  - type: text
    content: 'Then there appeared to them divided tongues, as of fire, and '
  - type: text
    content: one
  - type: text
    content: ' sat upon each of them. '
  '30':
  - type: text
    content: 'Therefore, being a prophet, '
  - type: note
    content: 2 Sam. 7:12; Ps. 132:11; Luke 1:32; Rom. 1:3; 2 Tim. 2:8
  - type: text
    content: 'and knowing that God had sworn with an oath to him that of the fruit of his body, according to the flesh, He would raise up the Christ to sit on his throne, '
  '31':
  - type: text
    content: 'he, foreseeing this, spoke concerning the resurrection of the Christ, '
  - type: note
    content: Ps. 16:10; Is. 50:8; 53:10
  - type: text
    content: 'that His soul was not left in Hades, nor did His flesh see corruption. '
  '32':
  - type: note
    content: Acts 2:24
  - type: text
    content: 'This Jesus God has raised up, '
  - type: note
    content: Acts 1:8; 3:15
  - type: text
    content: 'of which we are all witnesses. '
  '33':
  - type: text
    content: 'Therefore '
  - type: note
    content: Ps. 68:18; (Acts 5:31); Phil. 2:9
  - type: text
    content: 'being exalted to '
  - type: note
    content: Ps. 110:1; Mark 16:19; (Heb. 10:12)
  - type: text
    content: 'the right hand of God, and '
  - type: note
    content: Luke 24:49; (John 14:26)
  - type: text
    content: 'having received from the Father the promise of the Holy Spirit, He '
  - type: note
    content: Matt. 3:11; 5:6; Luke 3:16; 22:69; John 14:16; 16:7–15; Acts 2:1–11, 17; 10:45; Eph. 4:8
  - type: text
    content: poured out this which you now see and hear.
  '34':
  - type: text
    content: '“For David did not ascend into the heavens, but he says himself:'
  - type: note
    content: Ps. 68:18; 110:1; Matt. 22:44; Luke 23:43; John 20:17; 1 Cor. 15:25; Eph. 1:20; Heb. 1:13
  - type: text
    content: '‘The '
  - type: heading
    content: Lord
  - type: text
    content: ' said to my Lord,'
  - type: text
    content: “Sit at My right hand,
  '35':
  - type: text
    content: Till I make Your enemies Your footstool.” ’
  '36':
  - type: text
    content: “Therefore let all the house of Israel know assuredly that God has made this Jesus, whom you crucified, both Lord and Christ.”
  '37':
  - type: text
    content: 'Now when they heard '
  - type: text
    content: this,
  - type: text
    content: ' '
  - type: note
    content: (Zech. 12:10); Luke 3:10, 12, 14; John 16:8
  - type: text
    content: 'they were cut to the heart, and said to Peter and the rest of the apostles, “Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, what shall we do?”'
  '38':
  - type: text
    content: 'Then Peter said to them, '
  - type: note
    content: Luke 24:47
  - type: text
    content: '“Repent, and let every one of you be baptized in the name of Jesus Christ for the remission of sins; and you shall receive the gift of the Holy Spirit. '
  '39':
  - type: text
    content: 'For the promise is to you and '
  - type: note
    content: Joel 2:28, 32
  - type: text
    content: 'to your children, and '
  - type: note
    content: Acts 11:15, 18; Eph. 2:13
  - type: text
    content: to all who are afar off, as many as the Lord our God will call.”
  - type: heading
    content: A Vital Church Grows
  '4':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 3:11; 5:6; 10:20; Luke 3:16; John 14:16; 16:7–15; Acts 1:5
  - type: text
    content: 'they were all filled with the Holy Spirit and began '
  - type: note
    content: Mark 16:17; Acts 10:46; 19:6; (1 Cor. 12:10, 28, 30; 13:1)
  - type: text
    content: to speak with other tongues, as the Spirit gave them utterance.
  - type: heading
    content: The Crowd’s Response
  '40':
  - type: text
    content: 'And with many other words he testified and exhorted them, saying, “Be saved from this perverse generation.” '
  '41':
  - type: text
    content: 'Then those who gladly received his word were baptized; and that day about three thousand souls were added '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: them.
  - type: text
    content: ' '
  '42':
  - type: note
    content: Acts 1:14; Rom. 12:12; Eph. 6:18; Col. 4:2; Heb. 10:25
  - type: text
    content: 'And they continued steadfastly in the apostles’ doctrine and fellowship, in the breaking of bread, and in prayers. '
  '43':
  - type: text
    content: 'Then fear came upon every soul, and '
  - type: note
    content: Mark 16:17; Acts 2:22
  - type: text
    content: 'many wonders and signs were done through the apostles. '
  '44':
  - type: text
    content: 'Now all who believed were together, and '
  - type: note
    content: Acts 4:32, 34, 37; 5:2
  - type: text
    content: 'had all things in common, '
  '45':
  - type: text
    content: 'and sold their possessions and goods, and '
  - type: note
    content: Is. 58:7
  - type: text
    content: divided them among all, as anyone had need.
  '46':
  - type: note
    content: Acts 1:14
  - type: text
    content: 'So continuing daily with one accord '
  - type: note
    content: Luke 24:53
  - type: text
    content: 'in the temple, and '
  - type: note
    content: Luke 24:30; Acts 2:42; 20:7; (1 Cor. 10:16)
  - type: text
    content: 'breaking bread from house to house, they ate their food with gladness and simplicity of heart, '
  '47':
  - type: text
    content: 'praising God and having favor with all the people. And '
  - type: note
    content: Acts 5:14
  - type: text
    content: the Lord added to the church daily those who were being saved.
  '5':
  - type: text
    content: 'And there were dwelling in Jerusalem Jews, '
  - type: note
    content: Luke 2:25; Acts 8:2
  - type: text
    content: 'devout men, from every nation under heaven. '
  '6':
  - type: text
    content: 'And when this sound occurred, the '
  - type: note
    content: Acts 4:32
  - type: text
    content: 'multitude came together, and were confused, because everyone heard them speak in his own language. '
  '7':
  - type: text
    content: 'Then they were all amazed and marveled, saying to one another, “Look, are not all these who speak '
  - type: note
    content: Matt. 26:73; Acts 1:11
  - type: text
    content: 'Galileans? '
  '8':
  - type: text
    content: 'And how '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: that
  - type: text
    content: ' we hear, each in our own language in which we were born? '
  '9':
  - type: text
    content: 'Parthians and Medes and Elamites, those dwelling in Mesopotamia, Judea and '
  - type: note
    content: 1 Pet. 1:1
  - type: text
    content: 'Cappadocia, Pontus and Asia, '
