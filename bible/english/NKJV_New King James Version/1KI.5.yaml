verses:
  '1':
  - type: heading
    content: Solomon Prepares to Build the Temple
  - type: text
    content: 'Now '
  - type: note
    content: 1 Kin. 5:10, 18; 2 Chr. 2:3
  - type: text
    content: 'Hiram king of Tyre sent his servants to Solomon, because he heard that they had anointed him king in place of his father, '
  - type: note
    content: 2 Sam. 5:11; 1 Chr. 14:1
  - type: text
    content: 'for Hiram had always loved David. '
  '10':
  - type: text
    content: 'Then Hiram gave Solomon cedar and cypress logs '
  - type: text
    content: according
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' all his desire. '
  '11':
  - type: note
    content: 2 Chr. 2:10
  - type: text
    content: 'And Solomon gave Hiram twenty thousand kors of wheat '
  - type: text
    content: as
  - type: text
    content: ' food for his household, and twenty kors of pressed oil. Thus Solomon gave to Hiram year by year.'
  '12':
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' gave Solomon wisdom, '
  - type: note
    content: 1 Kin. 3:12
  - type: text
    content: as He had promised him; and there was peace between Hiram and Solomon, and the two of them made a treaty together.
  '13':
  - type: text
    content: 'Then King Solomon raised up a labor force out of all Israel; and the labor force was thirty thousand men. '
  '14':
  - type: text
    content: 'And he sent them to Lebanon, ten thousand a month in shifts: they were one month in Lebanon '
  - type: text
    content: and
  - type: text
    content: ' two months at home; '
  - type: note
    content: 1 Kin. 12:18
  - type: text
    content: 'Adoniram '
  - type: text
    content: was
  - type: text
    content: ' in charge of the labor force. '
  '15':
  - type: note
    content: 1 Kin. 9:20–22; 2 Chr. 2:17, 18
  - type: text
    content: 'Solomon had seventy thousand who carried burdens, and eighty thousand who quarried '
  - type: text
    content: stone
  - type: text
    content: ' in the mountains, '
  '16':
  - type: text
    content: 'besides three thousand three hundred from the '
  - type: note
    content: 1 Kin. 9:23
  - type: text
    content: 'chiefs of Solomon’s deputies, who supervised the people who labored in the work. '
  '17':
  - type: text
    content: 'And the king commanded them to quarry large stones, costly stones, '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: note
    content: 1 Kin. 6:7; 1 Chr. 22:2
  - type: text
    content: 'hewn stones, to lay the foundation of the temple. '
  '18':
  - type: text
    content: 'So Solomon’s builders, Hiram’s builders, and the Gebalites quarried '
  - type: text
    content: them;
  - type: text
    content: ' and they prepared timber and stones to build the temple.'
  '2':
  - type: text
    content: 'Then '
  - type: note
    content: 2 Chr. 2:3
  - type: text
    content: 'Solomon sent to Hiram, saying:'
  '3':
  - type: note
    content: 1 Chr. 28:2, 3
  - type: text
    content: 'You know how my father David could not build a house for the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' his God '
  - type: note
    content: 1 Chr. 22:8; 28:3
  - type: text
    content: 'because of the wars which were fought against him on every side, until the '
  - type: heading
    content: Lord
  - type: text
    content: ' put '
  - type: text
    content: his
  - type: text
    content: ' '
  - type: text
    content: foes
  - type: text
    content: ' under the soles of his feet.'
  '4':
  - type: text
    content: 'But now the '
  - type: heading
    content: Lord
  - type: text
    content: ' my God has given me '
  - type: note
    content: 1 Kin. 4:24; 1 Chr. 22:9
  - type: text
    content: 'rest on every side; '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' neither adversary nor evil occurrence.'
  '5':
  - type: note
    content: 2 Chr. 2:4
  - type: text
    content: 'And behold, I propose to build a house for the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' my God, '
  - type: note
    content: 2 Sam. 7:12, 13; 1 Kin. 6:38; 1 Chr. 17:12; 22:10; 28:6; 2 Chr. 6:2
  - type: text
    content: 'as the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to my father David, saying, “Your son, whom I will set on your throne in your place, he shall build the house for My name.”'
  '6':
  - type: text
    content: 'Now therefore, command that they cut down '
  - type: note
    content: 2 Chr. 2:8, 10
  - type: text
    content: 'cedars for me from Lebanon; and my servants will be with your servants, and I will pay you wages for your servants according to whatever you say. For you know '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' none among us who has skill to cut timber like the Sidonians.'
  '7':
  - type: text
    content: So it was, when Hiram heard the words of Solomon, that he rejoiced greatly and said,
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ' this day, for He has given David a wise son over this great people!'
  '8':
  - type: text
    content: 'Then Hiram sent to Solomon, saying:'
  - type: text
    content: 'I have considered '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: message
  - type: text
    content: ' which you sent me, '
  - type: text
    content: and
  - type: text
    content: ' I will do all you desire concerning the cedar and cypress logs.'
  '9':
  - type: text
    content: 'My servants shall bring '
  - type: text
    content: them
  - type: text
    content: ' down '
  - type: note
    content: Ezra 3:7
  - type: text
    content: 'from Lebanon to the sea; I will float them in rafts by sea to the place you indicate to me, and will have them broken apart there; then you can take '
  - type: text
    content: them
  - type: text
    content: ' away. And you shall fulfill my desire '
  - type: note
    content: Ezek. 27:17; Acts 12:20
  - type: text
    content: by giving food for my household.
