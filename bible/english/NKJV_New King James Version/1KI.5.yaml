document_id: 1KI.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon Prepares to Build the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 5:10, 18; 2 Chr. 2:3
    marker-yv: yv-n
  - type: text
    text: 'Hiram king of Tyre sent his servants to Solomon, because he heard that they had anointed him king in place of his father, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 5:11; 1 Chr. 14:1
    marker-yv: yv-n
  - type: text
    text: 'for Hiram had always loved David. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 2:3
    marker-yv: yv-n
  - type: text
    text: 'Solomon sent to Hiram, saying:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 28:2, 3
    marker-yv: yv-n
  - type: text
    text: 'You know how my father David could not build a house for the name of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 22:8; 28:3
    marker-yv: yv-n
  - type: text
    text: 'because of the wars which were fought against him on every side, until the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: foes
  - type: text
    text: ' under the soles of his feet.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But now the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God has given me '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 4:24; 1 Chr. 22:9
    marker-yv: yv-n
  - type: text
    text: 'rest on every side; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' neither adversary nor evil occurrence.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 2:4
    marker-yv: yv-n
  - type: text
    text: 'And behold, I propose to build a house for the name of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 7:12, 13; 1 Kin. 6:38; 1 Chr. 17:12; 22:10; 28:6; 2 Chr. 6:2
    marker-yv: yv-n
  - type: text
    text: 'as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to my father David, saying, “Your son, whom I will set on your throne in your place, he shall build the house for My name.”'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now therefore, command that they cut down '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 2:8, 10
    marker-yv: yv-n
  - type: text
    text: 'cedars for me from Lebanon; and my servants will be with your servants, and I will pay you wages for your servants according to whatever you say. For you know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' none among us who has skill to cut timber like the Sidonians.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So it was, when Hiram heard the words of Solomon, that he rejoiced greatly and said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' this day, for He has given David a wise son over this great people!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Hiram sent to Solomon, saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I have considered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: message
  - type: text
    text: ' which you sent me, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I will do all you desire concerning the cedar and cypress logs.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'My servants shall bring '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' down '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezra 3:7
    marker-yv: yv-n
  - type: text
    text: 'from Lebanon to the sea; I will float them in rafts by sea to the place you indicate to me, and will have them broken apart there; then you can take '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' away. And you shall fulfill my desire '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 27:17; Acts 12:20
    marker-yv: yv-n
  - type: text
    text: by giving food for my household.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Hiram gave Solomon cedar and cypress logs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: according
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' all his desire. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 2:10
    marker-yv: yv-n
  - type: text
    text: 'And Solomon gave Hiram twenty thousand kors of wheat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' food for his household, and twenty kors of pressed oil. Thus Solomon gave to Hiram year by year.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave Solomon wisdom, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 3:12
    marker-yv: yv-n
  - type: text
    text: as He had promised him; and there was peace between Hiram and Solomon, and the two of them made a treaty together.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then King Solomon raised up a labor force out of all Israel; and the labor force was thirty thousand men. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he sent them to Lebanon, ten thousand a month in shifts: they were one month in Lebanon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' two months at home; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 12:18
    marker-yv: yv-n
  - type: text
    text: 'Adoniram '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in charge of the labor force. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 9:20–22; 2 Chr. 2:17, 18
    marker-yv: yv-n
  - type: text
    text: 'Solomon had seventy thousand who carried burdens, and eighty thousand who quarried '
  - type: usfm
    marker: it
    children:
    - type: text
      text: stone
  - type: text
    text: ' in the mountains, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'besides three thousand three hundred from the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 9:23
    marker-yv: yv-n
  - type: text
    text: 'chiefs of Solomon’s deputies, who supervised the people who labored in the work. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the king commanded them to quarry large stones, costly stones, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 6:7; 1 Chr. 22:2
    marker-yv: yv-n
  - type: text
    text: 'hewn stones, to lay the foundation of the temple. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So Solomon’s builders, Hiram’s builders, and the Gebalites quarried '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them;
  - type: text
    text: ' and they prepared timber and stones to build the temple.'
