  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But it displeased Jonah exceedingly, and he became angry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So he prayed to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and said, “Ah, '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', was not this what I said when I was still in my country? Therefore I '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jon. 1:3
    marker-yv: yv-n
  - type: text
    text: 'fled previously to Tarshish; for I know that You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 34:6; Num. 14:18; Ps. 86:5, 15; Joel 2:13
    marker-yv: yv-n
  - type: text
    text: 'gracious and merciful God, slow to anger and abundant in lovingkindness, One who relents from doing harm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 19:4; Job 6:8, 9
    marker-yv: yv-n
  - type: text
    text: 'Therefore now, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', please take my life from me, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jon. 4:8
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' better for me to die than to live!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' right for you to be angry?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So Jonah went out of the city and sat on the east side of the city. There he made himself a shelter and sat under it in the shade, till he might see what would become of the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God prepared a plant and made it come up over Jonah, that it might be shade for his head to deliver him from his misery. So Jonah was very grateful for the plant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But as morning dawned the next day God prepared a worm, and it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so
  - type: text
    text: ' damaged the plant that it withered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And it happened, when the sun arose, that God prepared a vehement east wind; and the sun beat on Jonah’s head, so that he grew faint. Then he wished death for himself, and said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jon. 4:3
    marker-yv: yv-n
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: It
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' better for me to die than to live.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then God said to Jonah, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' right for you to be angry about the plant?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: And he said, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: It
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' right for me to be angry, even to death!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “You have had pity on the plant for which you have not labored, nor made it grow, which came up in a night and perished in a night. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And should I not pity Nineveh, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jon. 1:2; 3:2, 3
    marker-yv: yv-n
  - type: text
    text: 'that great city, in which are more than one hundred and twenty thousand persons '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 1:39; Is. 7:16
    marker-yv: yv-n
  - type: text
    text: who cannot discern between their right hand and their left—and much livestock?”
