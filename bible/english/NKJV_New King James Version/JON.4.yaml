    content: Jonah’s Anger and God’s Kindness
  - type: text
    content: 'But it displeased Jonah exceedingly, and he became angry. '
  '10':
  - type: text
    content: 'But the '
  - type: heading
    content: Lord
  - type: text
    content: ' said, “You have had pity on the plant for which you have not labored, nor made it grow, which came up in a night and perished in a night. '
