  '5':
  - type: text
    content: 'So Jonah went out of the city and sat on the east side of the city. There he made himself a shelter and sat under it in the shade, till he might see what would become of the city. '
  '6':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' God prepared a plant and made it come up over Jonah, that it might be shade for his head to deliver him from his misery. So Jonah was very grateful for the plant. '
