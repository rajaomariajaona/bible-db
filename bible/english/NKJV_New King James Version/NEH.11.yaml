document_id: NEH.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The People Dwelling in Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the leaders of the people dwelt at Jerusalem; the rest of the people cast lots to bring one out of ten to dwell in Jerusalem, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 10:18; Matt. 4:5; 5:35; 27:53
    marker-yv: yv-n
  - type: text
    text: 'the holy city, and nine-tenths '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dwell
  - type: text
    text: ' in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' cities. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the people blessed all the men who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 5:9; 2 Chr. 17:16
    marker-yv: yv-n
  - type: text
    text: willingly offered themselves to dwell at Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 9:2, 3
    marker-yv: yv-n
  - type: text
    text: 'These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' the heads of the province who dwelt in Jerusalem. (But in the cities of Judah everyone dwelt in his own possession in their cities—Israelites, priests, Levites, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezra 2:43
    marker-yv: yv-n
  - type: text
    text: 'Nethinim, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezra 2:55
    marker-yv: yv-n
  - type: text
    text: 'descendants of Solomon’s servants.) '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Also '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 9:3
    marker-yv: yv-n
  - type: text
    text: 'in Jerusalem dwelt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' of the children of Judah and of the children of Benjamin.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The children of Judah: Athaiah the son of Uzziah, the son of Zechariah, the son of Amariah, the son of Shephatiah, the son of Mahalalel, of the children of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 38:29
    marker-yv: yv-n
  - type: text
    text: 'Perez; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and Maaseiah the son of Baruch, the son of Col-Hozeh, the son of Hazaiah, the son of Adaiah, the son of Joiarib, the son of Zechariah, the son of Shiloni. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'All the sons of Perez who dwelt at Jerusalem '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' four hundred and sixty-eight valiant men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And these are the sons of Benjamin: Sallu the son of Meshullam, the son of Joed, the son of Pedaiah, the son of Kolaiah, the son of Maaseiah, the son of Ithiel, the son of Jeshaiah; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and after him Gabbai '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Sallai, nine hundred and twenty-eight. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joel the son of Zichri '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' their overseer, and Judah the son of Senuah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' second over the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 9:10
    marker-yv: yv-n
  - type: text
    text: 'Of the priests: Jedaiah the son of Joiarib, and Jachin; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Seraiah the son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the leader of the house of God. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Their brethren who did the work of the house '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' eight hundred and twenty-two; and Adaiah the son of Jeroham, the son of Pelaliah, the son of Amzi, the son of Zechariah, the son of Pashhur, the son of Malchijah, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and his brethren, heads of the fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: houses, were
  - type: text
    text: ' two hundred and forty-two; and Amashai the son of Azarel, the son of Ahzai, the son of Meshillemoth, the son of Immer, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and their brethren, mighty men of valor, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' one hundred and twenty-eight. Their overseer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Zabdiel the son of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' the great men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Also of the Levites: Shemaiah the son of Hasshub, the son of Azrikam, the son of Hashabiah, the son of Bunni; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezra 10:15
    marker-yv: yv-n
  - type: text
    text: 'Shabbethai and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezra 8:33
    marker-yv: yv-n
  - type: text
    text: 'Jozabad, of the heads of the Levites, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had
  - type: text
    text: ' the oversight of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 26:29
    marker-yv: yv-n
  - type: text
    text: 'the business outside of the house of God; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mattaniah the son of Micha, the son of Zabdi, the son of Asaph, the leader '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' began the thanksgiving with prayer; Bakbukiah, the second among his brethren; and Abda the son of Shammua, the son of Galal, the son of Jeduthun. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'All the Levites in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 11:1
    marker-yv: yv-n
  - type: text
    text: 'the holy city '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' two hundred and eighty-four.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moreover the gatekeepers, Akkub, Talmon, and their brethren who kept the gates, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' one hundred and seventy-two.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the rest of Israel, of the priests '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Levites, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in all the cities of Judah, everyone in his inheritance. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 27:3; Neh. 3:26
    marker-yv: yv-n
  - type: text
    text: 'But the Nethinim dwelt in Ophel. And Ziha and Gishpa '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' over the Nethinim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Also the overseer of the Levites at Jerusalem '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Uzzi the son of Bani, the son of Hashabiah, the son of Mattaniah, the son of Micha, of the sons of Asaph, the singers in charge of the service of the house of God. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezra 6:8, 9; 7:20
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the king’s command concerning them that a certain portion should be for the singers, a quota day by day. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Pethahiah the son of Meshezabel, of the children of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 38:30
    marker-yv: yv-n
  - type: text
    text: 'Zerah the son of Judah, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 18:17
    marker-yv: yv-n
  - type: text
    text: the king’s deputy in all matters concerning the people.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The People Dwelling Outside Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And as for the villages with their fields, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' of the children of Judah dwelt in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 14:15
    marker-yv: yv-n
  - type: text
    text: 'Kirjath Arba and its villages, Dibon and its villages, Jekabzeel and its villages; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'in Jeshua, Moladah, Beth Pelet, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hazar Shual, and Beersheba and its villages; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'in Ziklag and Meconah and its villages; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'in En Rimmon, Zorah, Jarmuth, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Zanoah, Adullam, and their villages; in Lachish and its fields; in Azekah and its villages. They dwelt from Beersheba to the Valley of Hinnom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Also the children of Benjamin from Geba '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dwelt
  - type: text
    text: ' in Michmash, Aija, and Bethel, and their villages; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'in Anathoth, Nob, Ananiah; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'in Hazor, Ramah, Gittaim; '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'in Hadid, Zeboim, Neballat; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'in Lod, Ono, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 4:14
    marker-yv: yv-n
  - type: text
    text: 'the Valley of Craftsmen. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Some of the Judean divisions of Levites '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in Benjamin.'
