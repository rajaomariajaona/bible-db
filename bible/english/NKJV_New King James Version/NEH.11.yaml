    content: to
  - type: text
    content: ' '
  - type: text
    content: dwell
  - type: text
    content: ' in '
  - type: text
    content: other
  - type: text
    content: ' cities. '
  '10':
  - type: note
    content: 1 Chr. 9:10
  - type: text
    content: 'Of the priests: Jedaiah the son of Joiarib, and Jachin; '
  '11':
  - type: text
    content: 'Seraiah the son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, '
  - type: text
    content: was
  - type: text
    content: ' the leader of the house of God. '
