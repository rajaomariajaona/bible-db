document_id: NEH.11,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The People Dwelling in Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now the leaders of the people dwelt at Jerusalem; the rest of the people cast lots to bring one out of ten to dwell in Jerusalem, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 10:18; Matt. 4:5; 5:35; 27:53
      marker-yv: yv-n
    - type: text
      text: 'the holy city, and nine-tenths '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dwell
    - type: text
      text: ' in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' cities. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 9:10
      marker-yv: yv-n
    - type: text
      text: 'Of the priests: Jedaiah the son of Joiarib, and Jachin; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Seraiah the son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the leader of the house of God. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Their brethren who did the work of the house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' eight hundred and twenty-two; and Adaiah the son of Jeroham, the son of Pelaliah, the son of Amzi, the son of Zechariah, the son of Pashhur, the son of Malchijah, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and his brethren, heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses, were
    - type: text
      text: ' two hundred and forty-two; and Amashai the son of Azarel, the son of Ahzai, the son of Meshillemoth, the son of Immer, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and their brethren, mighty men of valor, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' one hundred and twenty-eight. Their overseer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Zabdiel the son of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' the great men.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Also of the Levites: Shemaiah the son of Hasshub, the son of Azrikam, the son of Hashabiah, the son of Bunni; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 10:15
      marker-yv: yv-n
    - type: text
      text: 'Shabbethai and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 8:33
      marker-yv: yv-n
    - type: text
      text: 'Jozabad, of the heads of the Levites, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' the oversight of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 26:29
      marker-yv: yv-n
    - type: text
      text: 'the business outside of the house of God; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mattaniah the son of Micha, the son of Zabdi, the son of Asaph, the leader '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' began the thanksgiving with prayer; Bakbukiah, the second among his brethren; and Abda the son of Shammua, the son of Galal, the son of Jeduthun. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'All the Levites in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 11:1
      marker-yv: yv-n
    - type: text
      text: 'the holy city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' two hundred and eighty-four.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Moreover the gatekeepers, Akkub, Talmon, and their brethren who kept the gates, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' one hundred and seventy-two.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the people blessed all the men who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 5:9; 2 Chr. 17:16
      marker-yv: yv-n
    - type: text
      text: willingly offered themselves to dwell at Jerusalem.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And the rest of Israel, of the priests '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Levites, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in all the cities of Judah, everyone in his inheritance. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 27:3; Neh. 3:26
      marker-yv: yv-n
    - type: text
      text: 'But the Nethinim dwelt in Ophel. And Ziha and Gishpa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' over the Nethinim.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Also the overseer of the Levites at Jerusalem '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Uzzi the son of Bani, the son of Hashabiah, the son of Mattaniah, the son of Micha, of the sons of Asaph, the singers in charge of the service of the house of God. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 6:8, 9; 7:20
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the king’s command concerning them that a certain portion should be for the singers, a quota day by day. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Pethahiah the son of Meshezabel, of the children of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 38:30
      marker-yv: yv-n
    - type: text
      text: 'Zerah the son of Judah, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 18:17
      marker-yv: yv-n
    - type: text
      text: the king’s deputy in all matters concerning the people.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The People Dwelling Outside Jerusalem
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And as for the villages with their fields, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of the children of Judah dwelt in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 14:15
      marker-yv: yv-n
    - type: text
      text: 'Kirjath Arba and its villages, Dibon and its villages, Jekabzeel and its villages; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'in Jeshua, Moladah, Beth Pelet, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Hazar Shual, and Beersheba and its villages; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'in Ziklag and Meconah and its villages; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'in En Rimmon, Zorah, Jarmuth, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 9:2, 3
      marker-yv: yv-n
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the heads of the province who dwelt in Jerusalem. (But in the cities of Judah everyone dwelt in his own possession in their cities—Israelites, priests, Levites, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 2:43
      marker-yv: yv-n
    - type: text
      text: 'Nethinim, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 2:55
      marker-yv: yv-n
    - type: text
      text: 'descendants of Solomon’s servants.) '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Zanoah, Adullam, and their villages; in Lachish and its fields; in Azekah and its villages. They dwelt from Beersheba to the Valley of Hinnom.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Also the children of Benjamin from Geba '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dwelt
    - type: text
      text: ' in Michmash, Aija, and Bethel, and their villages; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'in Anathoth, Nob, Ananiah; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'in Hazor, Ramah, Gittaim; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'in Hadid, Zeboim, Neballat; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'in Lod, Ono, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 4:14
      marker-yv: yv-n
    - type: text
      text: 'the Valley of Craftsmen. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Some of the Judean divisions of Levites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in Benjamin.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 9:3
      marker-yv: yv-n
    - type: text
      text: 'in Jerusalem dwelt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of the children of Judah and of the children of Benjamin.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The children of Judah: Athaiah the son of Uzziah, the son of Zechariah, the son of Amariah, the son of Shephatiah, the son of Mahalalel, of the children of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 38:29
      marker-yv: yv-n
    - type: text
      text: 'Perez; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and Maaseiah the son of Baruch, the son of Col-Hozeh, the son of Hazaiah, the son of Adaiah, the son of Joiarib, the son of Zechariah, the son of Shiloni. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'All the sons of Perez who dwelt at Jerusalem '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' four hundred and sixty-eight valiant men.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And these are the sons of Benjamin: Sallu the son of Meshullam, the son of Joed, the son of Pedaiah, the son of Kolaiah, the son of Maaseiah, the son of Ithiel, the son of Jeshaiah; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and after him Gabbai '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Sallai, nine hundred and twenty-eight. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Joel the son of Zichri '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' their overseer, and Judah the son of Senuah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' second over the city.'
