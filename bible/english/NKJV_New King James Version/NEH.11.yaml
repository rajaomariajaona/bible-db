  - type: text
    content: were
  - type: text
    content: ' eight hundred and twenty-two; and Adaiah the son of Jeroham, the son of Pelaliah, the son of Amzi, the son of Zechariah, the son of Pashhur, the son of Malchijah, '
  '13':
  - type: text
    content: 'and his brethren, heads of the fathers’ '
  - type: text
    content: houses, were
  - type: text
    content: ' two hundred and forty-two; and Amashai the son of Azarel, the son of Ahzai, the son of Meshillemoth, the son of Immer, '
  '14':
  - type: text
    content: 'and their brethren, mighty men of valor, '
  - type: text
    content: were
  - type: text
    content: ' one hundred and twenty-eight. Their overseer '
  - type: text
    content: was
  - type: text
    content: ' Zabdiel the son of '
  - type: text
    content: one
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' the great men.'
  '15':
  - type: text
    content: 'Also of the Levites: Shemaiah the son of Hasshub, the son of Azrikam, the son of Hashabiah, the son of Bunni; '
  '16':
  - type: note
    content: Ezra 10:15
  - type: text
    content: 'Shabbethai and '
  - type: note
    content: Ezra 8:33
  - type: text
    content: 'Jozabad, of the heads of the Levites, '
  - type: text
    content: had
  - type: text
    content: ' the oversight of '
  - type: note
    content: 1 Chr. 26:29
  - type: text
    content: 'the business outside of the house of God; '
  '17':
  - type: text
    content: 'Mattaniah the son of Micha, the son of Zabdi, the son of Asaph, the leader '
  - type: text
    content: who
  - type: text
    content: ' began the thanksgiving with prayer; Bakbukiah, the second among his brethren; and Abda the son of Shammua, the son of Galal, the son of Jeduthun. '
  '18':
  - type: text
    content: 'All the Levites in '
  - type: note
    content: Neh. 11:1
  - type: text
    content: 'the holy city '
  - type: text
    content: were
  - type: text
    content: ' two hundred and eighty-four.'
  '19':
  - type: text
    content: 'Moreover the gatekeepers, Akkub, Talmon, and their brethren who kept the gates, '
  - type: text
    content: were
  - type: text
    content: ' one hundred and seventy-two.'
  '2':
  - type: text
    content: 'And the people blessed all the men who '
  - type: note
    content: Judg. 5:9; 2 Chr. 17:16
  - type: text
    content: willingly offered themselves to dwell at Jerusalem.
  '20':
  - type: text
    content: 'And the rest of Israel, of the priests '
  - type: text
    content: and
  - type: text
    content: ' Levites, '
  - type: text
    content: were
  - type: text
    content: ' in all the cities of Judah, everyone in his inheritance. '
  '21':
  - type: note
    content: 2 Chr. 27:3; Neh. 3:26
  - type: text
    content: 'But the Nethinim dwelt in Ophel. And Ziha and Gishpa '
  - type: text
    content: were
  - type: text
    content: ' over the Nethinim.'
  '22':
  - type: text
    content: 'Also the overseer of the Levites at Jerusalem '
  - type: text
    content: was
  - type: text
    content: ' Uzzi the son of Bani, the son of Hashabiah, the son of Mattaniah, the son of Micha, of the sons of Asaph, the singers in charge of the service of the house of God. '
  '23':
  - type: text
    content: 'For '
  - type: note
    content: Ezra 6:8, 9; 7:20
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' the king’s command concerning them that a certain portion should be for the singers, a quota day by day. '
  '24':
  - type: text
    content: 'Pethahiah the son of Meshezabel, of the children of '
  - type: note
    content: Gen. 38:30
  - type: text
    content: 'Zerah the son of Judah, '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 18:17
  - type: text
    content: the king’s deputy in all matters concerning the people.
  - type: heading
    content: The People Dwelling Outside Jerusalem
  '25':
  - type: text
    content: 'And as for the villages with their fields, '
  - type: text
    content: some
  - type: text
    content: ' of the children of Judah dwelt in '
  - type: note
    content: Josh. 14:15
  - type: text
    content: 'Kirjath Arba and its villages, Dibon and its villages, Jekabzeel and its villages; '
  '26':
  - type: text
    content: 'in Jeshua, Moladah, Beth Pelet, '
  '27':
  - type: text
    content: 'Hazar Shual, and Beersheba and its villages; '
  '28':
  - type: text
    content: 'in Ziklag and Meconah and its villages; '
  '29':
  - type: text
    content: 'in En Rimmon, Zorah, Jarmuth, '
  '3':
  - type: note
    content: 1 Chr. 9:2, 3
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the heads of the province who dwelt in Jerusalem. (But in the cities of Judah everyone dwelt in his own possession in their cities—Israelites, priests, Levites, '
  - type: note
    content: Ezra 2:43
  - type: text
    content: 'Nethinim, and '
  - type: note
    content: Ezra 2:55
  - type: text
    content: 'descendants of Solomon’s servants.) '
  '30':
  - type: text
    content: Zanoah, Adullam, and their villages; in Lachish and its fields; in Azekah and its villages. They dwelt from Beersheba to the Valley of Hinnom.
  '31':
  - type: text
    content: 'Also the children of Benjamin from Geba '
  - type: text
    content: dwelt
  - type: text
    content: ' in Michmash, Aija, and Bethel, and their villages; '
  '32':
  - type: text
    content: 'in Anathoth, Nob, Ananiah; '
  '33':
  - type: text
    content: 'in Hazor, Ramah, Gittaim; '
  '34':
  - type: text
    content: 'in Hadid, Zeboim, Neballat; '
  '35':
  - type: text
    content: 'in Lod, Ono, '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 4:14
  - type: text
    content: 'the Valley of Craftsmen. '
  '36':
  - type: text
    content: 'Some of the Judean divisions of Levites '
  - type: text
    content: were
  - type: text
    content: ' in Benjamin.'
  '4':
  - type: text
    content: 'Also '
  - type: note
    content: 1 Chr. 9:3
  - type: text
    content: 'in Jerusalem dwelt '
  - type: text
    content: some
  - type: text
    content: ' of the children of Judah and of the children of Benjamin.'
  - type: text
    content: 'The children of Judah: Athaiah the son of Uzziah, the son of Zechariah, the son of Amariah, the son of Shephatiah, the son of Mahalalel, of the children of '
  - type: note
    content: Gen. 38:29
  - type: text
    content: 'Perez; '
  '5':
  - type: text
    content: 'and Maaseiah the son of Baruch, the son of Col-Hozeh, the son of Hazaiah, the son of Adaiah, the son of Joiarib, the son of Zechariah, the son of Shiloni. '
  '6':
  - type: text
    content: 'All the sons of Perez who dwelt at Jerusalem '
  - type: text
    content: were
  - type: text
    content: ' four hundred and sixty-eight valiant men.'
  '7':
  - type: text
    content: 'And these are the sons of Benjamin: Sallu the son of Meshullam, the son of Joed, the son of Pedaiah, the son of Kolaiah, the son of Maaseiah, the son of Ithiel, the son of Jeshaiah; '
  '8':
  - type: text
    content: 'and after him Gabbai '
  - type: text
    content: and
  - type: text
    content: ' Sallai, nine hundred and twenty-eight. '
  '9':
  - type: text
    content: 'Joel the son of Zichri '
  - type: text
    content: was
  - type: text
    content: ' their overseer, and Judah the son of Senuah '
  - type: text
    content: was
  - type: text
    content: ' second over the city.'
