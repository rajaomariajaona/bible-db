document_id: PSA.104,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Praise to the Sovereign '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for His Creation and Providence'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 103:1
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', O my soul!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, You are very great:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are clothed with honor and majesty,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sends the springs into the valleys;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They flow among the hills.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They give drink to every beast of the field;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The wild donkeys quench their thirst.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By them the birds of the heavens have their home;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They sing among the branches.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 147:8
      marker-yv: yv-n
    - type: text
      text: He waters the hills from His upper chambers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The earth is satisfied with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 10:13
      marker-yv: yv-n
    - type: text
      text: the fruit of Your works.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:29
      marker-yv: yv-n
    - type: text
      text: He causes the grass to grow for the cattle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And vegetation for the service of man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That he may bring forth '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 28:5
      marker-yv: yv-n
    - type: text
      text: food from the earth,
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 9:13; Ps. 23:5; Prov. 31:6; Eccl. 10:19
      marker-yv: yv-n
    - type: text
      text: 'wine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' makes glad the heart of man,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Oil to make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' face shine,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And bread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' strengthens man’s heart.'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The trees of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' are full '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sap,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The cedars of Lebanon which He planted,
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where the birds make their nests;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The stork has her home in the fir trees.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The high hills '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' for the wild goats;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The cliffs are a refuge for the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:5
      marker-yv: yv-n
    - type: text
      text: rock badgers.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:14
      marker-yv: yv-n
    - type: text
      text: He appointed the moon for seasons;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 38:12; Ps. 19:6
      marker-yv: yv-n
    - type: text
      text: sun knows its going down.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who cover '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yourself
    - type: text
      text: ' with light as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' a garment,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who stretch out the heavens like a curtain.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 74:16; Is. 45:7)
      marker-yv: yv-n
    - type: text
      text: You make darkness, and it is night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In which all the beasts of the forest creep about.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 38:39
      marker-yv: yv-n
    - type: text
      text: The young lions roar after their prey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And seek their food from God.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: When
    - type: text
      text: ' the sun rises, they gather together'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And lie down in their dens.
  '23':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Man goes out to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 3:19
      marker-yv: yv-n
    - type: text
      text: his work
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to his labor until the evening.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 40:5; Prov. 3:19; (Jer. 10:12); 51:15
      marker-yv: yv-n
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', how manifold are Your works!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In wisdom You have made them all.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The earth is full of Your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 65:9
      marker-yv: yv-n
    - type: text
      text: possessions—
  '25':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This great and wide sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' innumerable teeming things,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Living things both small and great.
  '26':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There the ships sail about;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: There
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 41:1; Is. 27:1
      marker-yv: yv-n
    - type: text
      text: Leviathan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which You have made to play there.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 36:31; Ps. 136:25
      marker-yv: yv-n
    - type: text
      text: These all wait for You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That You may give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' their food in due season.'
  '28':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: What
    - type: text
      text: ' You give them they gather in;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You open Your hand, they are filled with good.
  '29':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You hide Your face, they are troubled;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 34:15; (Eccl. 12:7)
      marker-yv: yv-n
    - type: text
      text: You take away their breath, they die and return to their dust.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Amos 9:6)
      marker-yv: yv-n
    - type: text
      text: He lays the beams of His upper chambers in the waters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who makes the clouds His chariot,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who walks on the wings of the wind,
  '30':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 32:15
      marker-yv: yv-n
    - type: text
      text: You send forth Your Spirit, they are created;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And You renew the face of the earth.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May the glory of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' endure forever;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'May the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:31; Prov. 8:31
      marker-yv: yv-n
    - type: text
      text: rejoice in His works.
  '32':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He looks on the earth, and it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hab. 3:10
      marker-yv: yv-n
    - type: text
      text: trembles;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 19:18; Ps. 144:5
      marker-yv: yv-n
    - type: text
      text: He touches the hills, and they smoke.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 63:4
      marker-yv: yv-n
    - type: text
      text: 'I will sing to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as long as I live;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing praise to my God while I have my being.
  '34':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'May my '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 19:14
      marker-yv: yv-n
    - type: text
      text: meditation be sweet to Him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will be glad in the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '35':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'May '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:38
      marker-yv: yv-n
    - type: text
      text: sinners be consumed from the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the wicked be no more.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bless the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', O my soul!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who makes His angels spirits,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His ministers a flame of fire.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: You
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' laid the foundations of the earth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' it should not be moved forever,'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:6
      marker-yv: yv-n
    - type: text
      text: 'covered it with the deep as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' a garment;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The waters stood above the mountains.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At Your rebuke they fled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At the voice of Your thunder they hastened away.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They went up over the mountains;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They went down into the valleys,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To the place which You founded for them.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 26:10; Ps. 33:7; (Jer. 5:22)
      marker-yv: yv-n
    - type: text
      text: set a boundary that they may not pass over,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:11–15
      marker-yv: yv-n
    - type: text
      text: That they may not return to cover the earth.
