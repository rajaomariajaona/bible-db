verses:
  '1':
  - type: heading
    content: Praise to the Sovereign Lord for His Creation and Providence
  - type: text
    content: 'Bless '
  - type: note
    content: Ps. 103:1
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ', O my soul!'
  - type: text
    content: 'O '
  - type: heading
    content: Lord
  - type: text
    content: ' my God, You are very great:'
  - type: text
    content: You are clothed with honor and majesty,
  '10':
  - type: text
    content: He sends the springs into the valleys;
  - type: text
    content: They flow among the hills.
  '11':
  - type: text
    content: They give drink to every beast of the field;
  - type: text
    content: The wild donkeys quench their thirst.
  '12':
  - type: text
    content: By them the birds of the heavens have their home;
  - type: text
    content: They sing among the branches.
  '13':
  - type: note
    content: Ps. 147:8
  - type: text
    content: He waters the hills from His upper chambers;
  - type: text
    content: 'The earth is satisfied with '
  - type: note
    content: Jer. 10:13
  - type: text
    content: the fruit of Your works.
  '14':
  - type: note
    content: Gen. 1:29
  - type: text
    content: He causes the grass to grow for the cattle,
  - type: text
    content: And vegetation for the service of man,
  - type: text
    content: 'That he may bring forth '
  - type: note
    content: Job 28:5
  - type: text
    content: food from the earth,
  '15':
  - type: text
    content: 'And '
  - type: note
    content: Judg. 9:13; Ps. 23:5; Prov. 31:6; Eccl. 10:19
  - type: text
    content: 'wine '
  - type: text
    content: that
  - type: text
    content: ' makes glad the heart of man,'
  - type: text
    content: 'Oil to make '
  - type: text
    content: his
  - type: text
    content: ' face shine,'
  - type: text
    content: 'And bread '
  - type: text
    content: which
  - type: text
    content: ' strengthens man’s heart.'
  '16':
  - type: text
    content: 'The trees of the '
  - type: heading
    content: Lord
  - type: text
    content: ' are full '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: sap,
  - type: text
    content: The cedars of Lebanon which He planted,
  '17':
  - type: text
    content: Where the birds make their nests;
  - type: text
    content: The stork has her home in the fir trees.
  '18':
  - type: text
    content: 'The high hills '
  - type: text
    content: are
  - type: text
    content: ' for the wild goats;'
  - type: text
    content: 'The cliffs are a refuge for the '
  - type: note
    content: Lev. 11:5
  - type: text
    content: rock badgers.
  '19':
  - type: note
    content: Gen. 1:14
  - type: text
    content: He appointed the moon for seasons;
  - type: text
    content: 'The '
  - type: note
    content: Job 38:12; Ps. 19:6
  - type: text
    content: sun knows its going down.
  '2':
  - type: text
    content: 'Who cover '
  - type: text
    content: Yourself
  - type: text
    content: ' with light as '
  - type: text
    content: with
  - type: text
    content: ' a garment,'
  - type: text
    content: Who stretch out the heavens like a curtain.
  '20':
  - type: note
    content: (Ps. 74:16; Is. 45:7)
  - type: text
    content: You make darkness, and it is night,
  - type: text
    content: In which all the beasts of the forest creep about.
  '21':
  - type: note
    content: Job 38:39
  - type: text
    content: The young lions roar after their prey,
  - type: text
    content: And seek their food from God.
  '22':
  - type: text
    content: When
  - type: text
    content: ' the sun rises, they gather together'
  - type: text
    content: And lie down in their dens.
  '23':
  - type: text
    content: 'Man goes out to '
  - type: note
    content: Gen. 3:19
  - type: text
    content: his work
  - type: text
    content: And to his labor until the evening.
  '24':
  - type: note
    content: Ps. 40:5; Prov. 3:19; (Jer. 10:12); 51:15
  - type: text
    content: 'O '
  - type: heading
    content: Lord
  - type: text
    content: ', how manifold are Your works!'
  - type: text
    content: In wisdom You have made them all.
  - type: text
    content: 'The earth is full of Your '
  - type: note
    content: Ps. 65:9
  - type: text
    content: possessions—
  '25':
  - type: text
    content: This great and wide sea,
  - type: text
    content: 'In which '
  - type: text
    content: are
  - type: text
    content: ' innumerable teeming things,'
  - type: text
    content: Living things both small and great.
  '26':
  - type: text
    content: There the ships sail about;
  - type: text
    content: There
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' that '
  - type: note
    content: Job 41:1; Is. 27:1
  - type: text
    content: Leviathan
  - type: text
    content: Which You have made to play there.
  '27':
  - type: note
    content: Job 36:31; Ps. 136:25
  - type: text
    content: These all wait for You,
  - type: text
    content: 'That You may give '
  - type: text
    content: them
  - type: text
    content: ' their food in due season.'
  '28':
  - type: text
    content: What
  - type: text
    content: ' You give them they gather in;'
  - type: text
    content: You open Your hand, they are filled with good.
  '29':
  - type: text
    content: You hide Your face, they are troubled;
  - type: note
    content: Job 34:15; (Eccl. 12:7)
  - type: text
    content: You take away their breath, they die and return to their dust.
  '3':
  - type: note
    content: (Amos 9:6)
  - type: text
    content: He lays the beams of His upper chambers in the waters,
  - type: text
    content: Who makes the clouds His chariot,
  - type: text
    content: Who walks on the wings of the wind,
  '30':
  - type: note
    content: Is. 32:15
  - type: text
    content: You send forth Your Spirit, they are created;
  - type: text
    content: And You renew the face of the earth.
  '31':
  - type: text
    content: 'May the glory of the '
  - type: heading
    content: Lord
  - type: text
    content: ' endure forever;'
  - type: text
    content: 'May the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Gen. 1:31; Prov. 8:31
  - type: text
    content: rejoice in His works.
  '32':
  - type: text
    content: 'He looks on the earth, and it '
  - type: note
    content: Hab. 3:10
  - type: text
    content: trembles;
  - type: note
    content: Ex. 19:18; Ps. 144:5
  - type: text
    content: He touches the hills, and they smoke.
  '33':
  - type: note
    content: Ps. 63:4
  - type: text
    content: 'I will sing to the '
  - type: heading
    content: Lord
  - type: text
    content: ' as long as I live;'
  - type: text
    content: I will sing praise to my God while I have my being.
  '34':
  - type: text
    content: 'May my '
  - type: note
    content: Ps. 19:14
  - type: text
    content: meditation be sweet to Him;
  - type: text
    content: 'I will be glad in the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '35':
  - type: text
    content: 'May '
  - type: note
    content: Ps. 37:38
  - type: text
    content: sinners be consumed from the earth,
  - type: text
    content: And the wicked be no more.
  - type: text
    content: 'Bless the '
  - type: heading
    content: Lord
  - type: text
    content: ', O my soul!'
  - type: text
    content: 'Praise the '
  - type: heading
    content: Lord
  - type: text
    content: '!'
  '4':
  - type: text
    content: Who makes His angels spirits,
  - type: text
    content: His ministers a flame of fire.
  '5':
  - type: text
    content: You
  - type: text
    content: ' '
  - type: text
    content: who
  - type: text
    content: ' laid the foundations of the earth,'
  - type: text
    content: 'So '
  - type: text
    content: that
  - type: text
    content: ' it should not be moved forever,'
  '6':
  - type: text
    content: 'You '
  - type: note
    content: Gen. 1:6
  - type: text
    content: 'covered it with the deep as '
  - type: text
    content: with
  - type: text
    content: ' a garment;'
  - type: text
    content: The waters stood above the mountains.
  '7':
  - type: text
    content: At Your rebuke they fled;
  - type: text
    content: At the voice of Your thunder they hastened away.
  '8':
  - type: text
    content: They went up over the mountains;
  - type: text
    content: They went down into the valleys,
  - type: text
    content: To the place which You founded for them.
  '9':
  - type: text
    content: 'You have '
  - type: note
    content: Job 26:10; Ps. 33:7; (Jer. 5:22)
  - type: text
    content: set a boundary that they may not pass over,
  - type: note
    content: Gen. 9:11–15
  - type: text
    content: That they may not return to cover the earth.
