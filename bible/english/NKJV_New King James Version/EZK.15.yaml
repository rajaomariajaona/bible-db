document_id: EZK.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Outcast Vine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the word of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me, saying: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, how is the wood of the vine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: better
  - type: text
    text: ' than any other wood, the vine branch which is among the trees of the forest? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Is wood taken from it to make any object? Or can '
  - type: usfm
    marker: it
    children:
    - type: text
      text: men
  - type: text
    text: ' make a peg from it to hang any vessel on? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Instead, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 15:6)
    marker-yv: yv-n
  - type: text
    text: 'it is thrown into the fire for fuel; the fire devours both ends of it, and its middle is burned. Is it useful for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: any
  - type: text
    text: ' work? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Indeed, when it was whole, no object could be made from it. How much less will it be useful for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: any
  - type: text
    text: ' work when the fire has devoured it, and it is burned?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Therefore thus says the Lord '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: God
  - type: text
    text: ': ‘Like the wood of the vine among the trees of the forest, which I have given to the fire for fuel, so I will give up the inhabitants of Jerusalem; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:17; (Ps. 34:16); Jer. 21:10; Ezek. 14:8
    marker-yv: yv-n
  - type: text
    text: 'I will set My face against them. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 24:18
    marker-yv: yv-n
  - type: text
    text: 'They will go out from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' fire, but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: another
  - type: text
    text: ' fire shall devour them. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 7:4
    marker-yv: yv-n
  - type: text
    text: 'Then you shall know that I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', when I set My face against them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Thus I will make the land desolate, because they have persisted in unfaithfulness,’ says the Lord '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: God
  - type: text
    text: .”
