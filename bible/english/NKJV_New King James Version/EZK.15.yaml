  - type: text
    content: 'Then the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to me, saying: '
  '2':
  - type: text
    content: '“Son of man, how is the wood of the vine '
  - type: text
    content: better
  - type: text
    content: ' than any other wood, the vine branch which is among the trees of the forest? '
  '3':
  - type: text
    content: 'Is wood taken from it to make any object? Or can '
  - type: text
    content: men
  - type: text
    content: ' make a peg from it to hang any vessel on? '
  '4':
  - type: text
    content: 'Instead, '
  - type: note
    content: (John 15:6)
  - type: text
    content: 'it is thrown into the fire for fuel; the fire devours both ends of it, and its middle is burned. Is it useful for '
  - type: text
    content: any
  - type: text
    content: ' work? '
  '5':
  - type: text
    content: 'Indeed, when it was whole, no object could be made from it. How much less will it be useful for '
  - type: text
    content: any
  - type: text
    content: ' work when the fire has devoured it, and it is burned?'
  '6':
  - type: text
    content: '“Therefore thus says the Lord '
  - type: heading
    content: God
  - type: text
    content: ': ‘Like the wood of the vine among the trees of the forest, which I have given to the fire for fuel, so I will give up the inhabitants of Jerusalem; '
  '7':
  - type: text
    content: 'and '
  - type: note
    content: Lev. 26:17; (Ps. 34:16); Jer. 21:10; Ezek. 14:8
  - type: text
    content: 'I will set My face against them. '
  - type: note
