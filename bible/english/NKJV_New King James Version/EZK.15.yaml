  - type: text
    content: 'They will go out from '
  - type: text
    content: one
  - type: text
    content: ' fire, but '
  - type: text
    content: another
  - type: text
    content: ' fire shall devour them. '
  - type: note
    content: Ezek. 7:4
  - type: text
    content: 'Then you shall know that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ', when I set My face against them. '
  '8':
  - type: text
    content: 'Thus I will make the land desolate, because they have persisted in unfaithfulness,’ says the Lord '
  - type: heading
