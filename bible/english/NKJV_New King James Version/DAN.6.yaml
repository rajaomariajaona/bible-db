  - type: text
    content: the law of the Medes and Persians that no decree or statute which the king establishes may be changed.”
  '16':
  - type: text
    content: 'So the king gave the command, and they brought Daniel and cast '
  - type: text
    content: him
  - type: text
    content: ' into the den of lions. '
  - type: text
    content: But
  - type: text
    content: ' the king spoke, saying to Daniel, “Your God, whom you serve continually, He will deliver you.” '
  '17':
  - type: note
    content: Lam. 3:53
  - type: text
    content: 'Then a stone was brought and laid on the mouth of the den, '
  - type: note
    content: Matt. 27:66
  - type: text
    content: and the king sealed it with his own signet ring and with the signets of his lords, that the purpose concerning Daniel might not be changed.
  - type: heading
    content: Daniel Saved from the Lions
  '18':
  - type: text
    content: 'Now the king went to his palace and spent the night fasting; and no musicians were brought before him. '
  - type: note
    content: Esth. 6:1; Ps. 77:4; Dan. 2:1
  - type: text
    content: 'Also his sleep went from him. '
  '19':
  - type: text
    content: 'Then the '
  - type: note
    content: Dan. 3:24
  - type: text
    content: 'king arose very early in the morning and went in haste to the den of lions. '
  '2':
  - type: text
    content: 'and over these, three governors, of whom Daniel '
  - type: text
    content: was
  - type: text
    content: ' one, that the satraps might give account to them, so that the king would suffer no loss. '
  '20':
  - type: text
    content: 'And when he came to the den, he cried out with a lamenting voice to Daniel. The king spoke, saying to Daniel, “Daniel, servant of the living God, '
  - type: note
    content: Gen. 18:14; Num. 11:23; Jer. 32:17; Dan. 3:17; (Luke 1:37)
  - type: text
    content: has your God, whom you serve continually, been able to deliver you from the lions?”
  '21':
  - type: text
    content: 'Then Daniel said to the king, '
  - type: note
    content: Dan. 2:4; 6:6
  - type: text
    content: '“O king, live forever! '
  '22':
  - type: note
    content: Num. 20:16; Is. 63:9; Dan. 3:28; Acts 12:11; (Heb. 1:14)
  - type: text
    content: 'My God sent His angel and '
  - type: note
    content: Ps. 91:11–13; 2 Tim. 4:17; Heb. 11:33
  - type: text
    content: shut the lions’ mouths, so that they have not hurt me, because I was found innocent before Him; and also, O king, I have done no wrong before you.”
  '23':
  - type: text
    content: 'Now the king was exceedingly glad for him, and commanded that they should take Daniel up out of the den. So Daniel was taken up out of the den, and no injury whatever was found on him, '
  - type: note
    content: Heb. 11:33
  - type: text
    content: because he believed in his God.
  - type: heading
    content: Darius Honors God
  '24':
  - type: text
    content: 'And the king gave the command, '
  - type: note
    content: Deut. 19:18, 19; Esth. 7:10
  - type: text
    content: 'and they brought those men who had accused Daniel, and they cast '
  - type: text
    content: them
  - type: text
    content: ' into the den of lions—them, '
  - type: note
    content: Deut. 24:16; 2 Kin. 14:6; Esth. 9:10
  - type: text
    content: their children, and their wives; and the lions overpowered them, and broke all their bones in pieces before they ever came to the bottom of the den.
