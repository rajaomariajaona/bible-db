    text: The Plot Against Daniel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'It pleased Darius to set over the kingdom one hundred and twenty satraps, to be over the whole kingdom; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and over these, three governors, of whom Daniel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' one, that the satraps might give account to them, so that the king would suffer no loss. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then this Daniel distinguished himself above the governors and satraps, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 5:12
    marker-yv: yv-n
  - type: text
    text: 'because an excellent spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in him; and the king gave thought to setting him over the whole realm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eccl. 4:4
    marker-yv: yv-n
  - type: text
    text: 'So the governors and satraps sought to find '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' charge against Daniel concerning the kingdom; but they could find no charge or fault, because he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' faithful; nor was there any error or fault found in him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then these men said, “We shall not find any charge against this Daniel unless we find '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' against him concerning the law of his God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So these governors and satraps thronged before the king, and said thus to him: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 2:3; Dan. 2:4; 6:21
    marker-yv: yv-n
  - type: text
    text: '“King Darius, live forever! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'All the governors of the kingdom, the administrators and satraps, the counselors and advisors, have '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 59:3; 62:4; 64:2–6
    marker-yv: yv-n
  - type: text
    text: 'consulted together to establish a royal statute and to make a firm decree, that whoever petitions any god or man for thirty days, except you, O king, shall be cast into the den of lions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now, O king, establish the decree and sign the writing, so that it cannot be changed, according to the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 1:19; 8:8; Dan. 6:12, 15
    marker-yv: yv-n
  - type: text
    text: 'law of the Medes and Persians, which does not alter.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Therefore King Darius signed the written decree.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Daniel in the Lions’ Den
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now when Daniel knew that the writing was signed, he went home. And in his upper room, with his windows open '
