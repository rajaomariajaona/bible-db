- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Daniel said to the king, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 2:4; 6:6
    marker-yv: yv-n
  - type: text
