      text: Matt. 27:66
    marker-yv: yv-n
  - type: text
    text: and the king sealed it with his own signet ring and with the signets of his lords, that the purpose concerning Daniel might not be changed.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Daniel Saved from the Lions
