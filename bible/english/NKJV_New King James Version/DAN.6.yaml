      text: Mark 6:26
    marker-yv: yv-n
  - type: text
    text: 'was greatly displeased with himself, and set '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' heart on Daniel to deliver him; and he labored till the going down of the sun to deliver him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then these men approached the king, and said to the king, “Know, O king, that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 8:8; Ps. 94:20, 21; Dan. 6:8, 12
    marker-yv: yv-n
  - type: text
    text: the law of the Medes and Persians that no decree or statute which the king establishes may be changed.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So the king gave the command, and they brought Daniel and cast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' into the den of lions. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: But
  - type: text
    text: ' the king spoke, saying to Daniel, “Your God, whom you serve continually, He will deliver you.” '
  - type: usfm
    marker: vlbl
