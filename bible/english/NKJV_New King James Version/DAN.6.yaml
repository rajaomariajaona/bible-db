  '28':
  - type: text
    content: 'So this Daniel prospered in the reign of Darius '
  - type: note
    content: Dan. 1:21
  - type: text
    content: 'and in the reign of '
  - type: note
    content: Ezra 1:1, 2
  - type: text
    content: Cyrus the Persian.
  '3':
  - type: text
    content: 'Then this Daniel distinguished himself above the governors and satraps, '
  - type: note
    content: Dan. 5:12
  - type: text
    content: 'because an excellent spirit '
  - type: text
    content: was
  - type: text
    content: ' in him; and the king gave thought to setting him over the whole realm. '
  '4':
  - type: note
    content: Eccl. 4:4
  - type: text
    content: 'So the governors and satraps sought to find '
  - type: text
    content: some
  - type: text
    content: ' charge against Daniel concerning the kingdom; but they could find no charge or fault, because he '
  - type: text
    content: was
  - type: text
    content: ' faithful; nor was there any error or fault found in him. '
  '5':
  - type: text
    content: 'Then these men said, “We shall not find any charge against this Daniel unless we find '
  - type: text
    content: it
  - type: text
    content: ' against him concerning the law of his God.”'
  '6':
  - type: text
    content: 'So these governors and satraps thronged before the king, and said thus to him: '
  - type: note
    content: Neh. 2:3; Dan. 2:4; 6:21
  - type: text
    content: '“King Darius, live forever! '
  '7':
  - type: text
    content: 'All the governors of the kingdom, the administrators and satraps, the counselors and advisors, have '
  - type: note
    content: Ps. 59:3; 62:4; 64:2–6
  - type: text
    content: 'consulted together to establish a royal statute and to make a firm decree, that whoever petitions any god or man for thirty days, except you, O king, shall be cast into the den of lions. '
  '8':
  - type: text
    content: 'Now, O king, establish the decree and sign the writing, so that it cannot be changed, according to the '
  - type: note
    content: Esth. 1:19; 8:8; Dan. 6:12, 15
  - type: text
    content: 'law of the Medes and Persians, which does not alter.” '
  '9':
  - type: text
    content: Therefore King Darius signed the written decree.
  - type: heading
    content: Daniel in the Lions’ Den
