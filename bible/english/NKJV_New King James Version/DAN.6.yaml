  '1':
  - type: heading
    content: The Plot Against Daniel
  - type: text
    content: 'It pleased Darius to set over the kingdom one hundred and twenty satraps, to be over the whole kingdom; '
  '10':
  - type: text
    content: 'Now when Daniel knew that the writing was signed, he went home. And in his upper room, with his windows open '
  - type: note
    content: 1 Kin. 8:29, 30, 46–48; Ps. 5:7; Jon. 2:4
  - type: text
    content: 'toward Jerusalem, he knelt down on his knees '
  - type: note
    content: Ps. 55:17; Acts 2:1, 2, 15; (Phil. 4:6); 1 Thess. 5:17, 18
  - type: text
    content: three times that day, and prayed and gave thanks before his God, as was his custom since early days.
  '11':
  - type: text
    content: 'Then these men assembled and found Daniel praying and making supplication before his God. '
  '12':
  - type: note
    content: Dan. 3:8–12; Acts 16:19–21
  - type: text
    content: 'And they went before the king, and spoke concerning the king’s decree: “Have you not signed a decree that every man who petitions any god or man within thirty days, except you, O king, shall be cast into the den of lions?”'
  - type: text
    content: 'The king answered and said, “The thing '
  - type: text
    content: is
  - type: text
    content: ' true, '
  - type: note
    content: Esth. 1:19; Dan. 6:8, 15
  - type: text
    content: according to the law of the Medes and Persians, which does not alter.”
  '13':
  - type: text
    content: 'So they answered and said before the king, “That Daniel, '
  - type: note
    content: Dan. 1:6; 5:13
  - type: text
    content: 'who is one of the captives from Judah, '
  - type: note
    content: Esth. 3:8; Dan. 3:12; Acts 5:29
  - type: text
    content: does not show due regard for you, O king, or for the decree that you have signed, but makes his petition three times a day.”
  '14':
  - type: text
    content: 'And the king, when he heard '
  - type: text
    content: these
  - type: text
    content: ' words, '
  - type: note
    content: Mark 6:26
  - type: text
    content: 'was greatly displeased with himself, and set '
  - type: text
    content: his
  - type: text
    content: ' heart on Daniel to deliver him; and he labored till the going down of the sun to deliver him. '
  '15':
  - type: text
    content: 'Then these men approached the king, and said to the king, “Know, O king, that '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
