  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now the king was exceedingly glad for him, and commanded that they should take Daniel up out of the den. So Daniel was taken up out of the den, and no injury whatever was found on him, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. 11:33
    marker-yv: yv-n
  - type: text
