    marker: x
    children:
    - type: text
      text: 1 Kin. 8:29, 30, 46–48; Ps. 5:7; Jon. 2:4
    marker-yv: yv-n
  - type: text
    text: 'toward Jerusalem, he knelt down on his knees '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 55:17; Acts 2:1, 2, 15; (Phil. 4:6); 1 Thess. 5:17, 18
    marker-yv: yv-n
  - type: text
    text: three times that day, and prayed and gave thanks before his God, as was his custom since early days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then these men assembled and found Daniel praying and making supplication before his God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 3:8–12; Acts 16:19–21
    marker-yv: yv-n
  - type: text
    text: 'And they went before the king, and spoke concerning the king’s decree: “Have you not signed a decree that every man who petitions any god or man within thirty days, except you, O king, shall be cast into the den of lions?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The king answered and said, “The thing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' true, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 1:19; Dan. 6:8, 15
    marker-yv: yv-n
  - type: text
    text: according to the law of the Medes and Persians, which does not alter.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So they answered and said before the king, “That Daniel, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 1:6; 5:13
    marker-yv: yv-n
  - type: text
    text: 'who is one of the captives from Judah, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 3:8; Dan. 3:12; Acts 5:29
    marker-yv: yv-n
  - type: text
    text: does not show due regard for you, O king, or for the decree that you have signed, but makes his petition three times a day.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the king, when he heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: these
  - type: text
    text: ' words, '
  - type: usfm
    marker: x
    children:
