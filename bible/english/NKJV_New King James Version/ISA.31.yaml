  - type: text
    content: throw away his idols of silver and his idols of gold—
  - type: note
    content: 1 Kin. 12:30
  - type: text
    content: sin, which your own hands have made for yourselves.
  '8':
  - type: text
    content: '“Then Assyria shall '
  - type: note
