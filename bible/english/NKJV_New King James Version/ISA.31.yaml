  - type: text
    content: He
  - type: text
    content: ' will not be afraid of their voice'
  - type: text
    content: Nor be disturbed by their noise),
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts will come down'
  - type: text
