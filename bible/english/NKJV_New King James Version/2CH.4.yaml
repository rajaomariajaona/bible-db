document_id: 2CH.4,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Furnishings of the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Moreover he made '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 27:1, 2; 2 Kin. 16:14; Ezek. 43:13, 16
      marker-yv: yv-n
    - type: text
      text: 'a bronze altar: twenty cubits was its length, twenty cubits its width, and ten cubits its height.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:39
      marker-yv: yv-n
    - type: text
      text: He set the Sea on the right side, toward the southeast.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:40–51
      marker-yv: yv-n
    - type: text
      text: 'Huram made the pots and the shovels and the bowls. So Huram finished doing the work that he was to do for King Solomon for the house of God: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'the two pillars and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:41
      marker-yv: yv-n
    - type: text
      text: 'the bowl-shaped capitals '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' on top of the two pillars; the two networks covering the two bowl-shaped capitals which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' on top of the pillars; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:20
      marker-yv: yv-n
    - type: text
      text: 'four hundred pomegranates for the two networks (two rows of pomegranates for each network, to cover the two bowl-shaped capitals that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' on the pillars); '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'he also made '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:27, 43
      marker-yv: yv-n
    - type: text
      text: 'carts and the lavers on the carts; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'one Sea and twelve oxen under it; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'also the pots, the shovels, the forks—and all their articles '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:45; 2 Chr. 2:13
      marker-yv: yv-n
    - type: text
      text: 'Huram his master '
    - type: usfm
      marker: it
      children:
      - type: text
        text: craftsman
    - type: text
      text: ' made of burnished bronze for King Solomon for the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'In the plain of Jordan the king had them cast in clay molds, between Succoth and Zeredah. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:47
      marker-yv: yv-n
    - type: text
      text: And Solomon had all these articles made in such great abundance that the weight of the bronze was not determined.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Thus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:48–50
      marker-yv: yv-n
    - type: text
      text: 'Solomon had all the furnishings made for the house of God: the altar of gold and the tables on which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:30
      marker-yv: yv-n
    - type: text
      text: 'the showbread; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:17–21; 1 Kin. 7:23–26
      marker-yv: yv-n
    - type: text
      text: 'Then he made the Sea of cast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bronze,
    - type: text
      text: ' ten cubits from one brim to the other; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' completely round. Its height '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' five cubits, and a line of thirty cubits measured its circumference. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'the lampstands with their lamps of pure gold, to burn '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 27:20, 21
      marker-yv: yv-n
    - type: text
      text: 'in the prescribed manner in front of the inner sanctuary, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:31
      marker-yv: yv-n
    - type: text
      text: 'the flowers and the lamps and the wick-trimmers of gold, of purest gold; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'the trimmers, the bowls, the ladles, and the censers of pure gold. As for the entry of the sanctuary, its inner doors to the Most Holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Place,
    - type: text
      text: ' and the doors of the main hall of the temple, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' gold.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:24–26
      marker-yv: yv-n
    - type: text
      text: 'And under it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the likeness of oxen encircling it all around, ten to a cubit, all the way around the Sea. The oxen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' cast in two rows, when it was cast. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'It stood on twelve '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:25
      marker-yv: yv-n
    - type: text
      text: 'oxen: three looking toward the north, three looking toward the west, three looking toward the south, and three looking toward the east; the Sea '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: set
    - type: text
      text: ' upon them, and all their back parts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pointed
    - type: text
      text: ' inward. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'It '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' a handbreadth thick; and its brim was shaped like the brim of a cup, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' a lily blossom. It contained three thousand baths.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'He also made '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:38, 40
      marker-yv: yv-n
    - type: text
      text: 'ten lavers, and put five on the right side and five on the left, to wash in them; such things as they offered for the burnt offering they would wash in them, but the Sea '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' for the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:19–21
      marker-yv: yv-n
    - type: text
      text: 'priests to wash in. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:49
      marker-yv: yv-n
    - type: text
      text: 'And he made ten lampstands of gold '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:31; 1 Chr. 28:12, 19
      marker-yv: yv-n
    - type: text
      text: 'according to their design, and set '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' in the temple, five on the right side and five on the left. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:48
      marker-yv: yv-n
    - type: text
      text: 'He also made ten tables, and placed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' in the temple, five on the right side and five on the left. And he made one hundred '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 28:17
      marker-yv: yv-n
    - type: text
      text: bowls of gold.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Furthermore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:36
      marker-yv: yv-n
    - type: text
      text: 'he made the court of the priests, and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 21:5
      marker-yv: yv-n
    - type: text
      text: 'great court and doors for the court; and he overlaid these doors with bronze. '
