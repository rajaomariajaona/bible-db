    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And David numbered the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 16:2, 14
      marker-yv: yv-n
    - type: text
      text: 'set captains of thousands and captains of hundreds over them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now a certain man saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' and told Joab, and said, “I just saw Absalom hanging in a terebinth tree!”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So Joab said to the man who told him, “You just saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him!
    - type: text
      text: ' And why did you not strike him there to the ground? I would have given you ten '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of silver and a belt.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But the man said to Joab, “Though I were to receive a thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of silver in my hand, I would not raise my hand against the king’s son. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 14:26
      marker-yv: yv-n
    - type: text
      text: 'For in our hearing the king commanded you and Abishai and Ittai, saying, ‘Beware lest anyone '
    - type: usfm
      marker: it
      children:
      - type: text
        text: touch
    - type: text
      text: ' the young man Absalom!’ '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Otherwise I would have dealt falsely against my own life. For there is nothing hidden from the king, and you yourself would have set yourself against '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me.
    - type: text
      text: ”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then Joab said, “I cannot linger with you.” And he took three spears in his hand and thrust them through Absalom’s heart, while he was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: still
    - type: text
      text: ' alive in the midst of the terebinth tree. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And ten young men who bore Joab’s armor surrounded Absalom, and struck and killed him.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So Joab blew the trumpet, and the people returned from pursuing Israel. For Joab held back the people. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And they took Absalom and cast him into a large pit in the woods, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 18:5
      marker-yv: yv-n
    - type: text
      text: 'laid a very large heap of stones over him. Then all Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 21:20, 21; Josh. 7:26; 8:29
      marker-yv: yv-n
    - type: text
      text: fled, everyone to his tent.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Now Absalom in his lifetime had taken and set up a pillar for himself, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 19:8; 20:1, 22
      marker-yv: yv-n
    - type: text
      text: 'the King’s Valley. For he said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:17
      marker-yv: yv-n
    - type: text
      text: “I have no son to keep my name in remembrance.” He called the pillar after his own name. And to this day it is called Absalom’s Monument.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Hears of Absalom’s Death
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 14:27
      marker-yv: yv-n
    - type: text
      text: 'Ahimaaz the son of Zadok said, “Let me run now and take the news to the king, how the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has avenged him of his enemies.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then David sent out one third of the people under the hand of Joab, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 18:25; Num. 31:14; 1 Sam. 22:7
      marker-yv: yv-n
    - type: text
      text: 'one third under the hand of Abishai the son of Zeruiah, Joab’s brother, and one third under the hand of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 7:16; 1 Sam. 11:11
      marker-yv: yv-n
    - type: text
      text: Ittai the Gittite. And the king said to the people, “I also will surely go out with you myself.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And Joab said to him, “You shall not take the news this day, for you shall take the news another day. But today you shall take no news, because the king’s son is dead.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then Joab said to the Cushite, “Go, tell the king what you have seen.” So the Cushite bowed himself to Joab and ran.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: And Ahimaaz the son of Zadok said again to Joab, “But whatever happens, please let me also run after the Cushite.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Joab said, “Why will you run, my son, since you have no news ready?”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“But whatever happens,” '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: said,
    - type: text
      text: ' “let me run.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he said to him, “Run.” Then Ahimaaz ran by way of the plain, and outran the Cushite.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Now David was sitting between the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:36; 17:17
      marker-yv: yv-n
    - type: text
      text: 'two gates. And the watchman went up to the roof over the gate, to the wall, lifted his eyes and looked, and there was a man, running alone. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then the watchman cried out and told the king. And the king said, “If he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' alone, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' news in his mouth.” And he came rapidly and drew near.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Then the watchman saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: another
    - type: text
      text: ' man running, and the watchman called to the gatekeeper and said, “There is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: another
    - type: text
      text: ' man, running alone!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the king said, “He also brings news.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: So the watchman said, “I think the running of the first is like the running of Ahimaaz the son of Zadok.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king said, “He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a good man, and comes with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 5:11; 2 Sam. 13:34; 2 Kin. 9:17
      marker-yv: yv-n
    - type: text
      text: good news.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'So Ahimaaz called out and said to the king, “All is well!” Then he bowed down with his face to the earth before the king, and said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 1:42
      marker-yv: yv-n
    - type: text
      text: '“Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, who has delivered up the men who raised their hand against my lord the king!”'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The king said, “Is the young man Absalom safe?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahimaaz answered, “When Joab sent the king’s servant and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' your servant, I saw a great tumult, but I did not know what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: about.
    - type: text
      text: ”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:19–22
      marker-yv: yv-n
    - type: text
      text: 'But the people answered, “You shall not go out! For if we flee away, they will not care about us; nor if half of us die, will they care about us. But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' worth ten thousand of us now. For you are now more help to us in the city.”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And the king said, “Turn aside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stand here.” So he turned aside and stood still.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Just then the Cushite came, and the Cushite said, “There is good news, my lord the king! For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has avenged you this day of all those who rose against you.”'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: And the king said to the Cushite, “Is the young man Absalom safe?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Cushite answered, “May the enemies of my lord the king, and all who rise against you to do harm, be like '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' young man!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Mourning for Absalom
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Then the king was deeply moved, and went up to the chamber over the gate, and wept. And as he went, he said thus: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 16:12
      marker-yv: yv-n
    - type: text
      text: '“O my son Absalom—my son, my son Absalom—if only I had died in your place! O Absalom my son, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 12:10
      marker-yv: yv-n
    - type: text
      text: my son!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then the king said to them, “Whatever seems best to you I will do.” So the king stood beside the gate, and all the people went out by hundreds and by thousands. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Now the king had commanded Joab, Abishai, and Ittai, saying, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Deal
    - type: text
      text: ' gently for my sake with the young man Absalom.” '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 21:17
      marker-yv: yv-n
    - type: text
      text: And all the people heard when the king gave all the captains orders concerning Absalom.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So the people went out into the field of battle against Israel. And the battle was in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 18:12
      marker-yv: yv-n
    - type: text
      text: 'woods of Ephraim. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The people of Israel were overthrown there before the servants of David, and a great slaughter of twenty thousand took place there that day. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: For the battle there was scattered over the face of the whole countryside, and the woods devoured more people that day than the sword devoured.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then Absalom met the servants of David. Absalom rode on a mule. The mule went under the thick boughs of a great terebinth tree, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 17:15, 18; 2 Sam. 17:26
      marker-yv: yv-n
    - type: text
      text: 'his head caught in the terebinth; so he was left hanging between heaven and earth. And the mule which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' under him went on. '
