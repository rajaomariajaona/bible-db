  '3':
  - type: note
    content: 2 Sam. 15:19–22
  - type: text
    content: 'But the people answered, “You shall not go out! For if we flee away, they will not care about us; nor if half of us die, will they care about us. But '
  - type: text
    content: you
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
