  '2':
  - type: text
    content: 'Then David sent out one third of the people under the hand of Joab, '
  - type: note
    content: Ex. 18:25; Num. 31:14; 1 Sam. 22:7
  - type: text
    content: 'one third under the hand of Abishai the son of Zeruiah, Joab’s brother, and one third under the hand of '
  - type: note
    content: Judg. 7:16; 1 Sam. 11:11
  - type: text
    content: Ittai the Gittite. And the king said to the people, “I also will surely go out with you myself.”
  '20':
  - type: text
    content: 'And Joab said to him, “You shall not take the news this day, for you shall take the news another day. But today you shall take no news, because the king’s son is dead.” '
  '21':
  - type: text
    content: Then Joab said to the Cushite, “Go, tell the king what you have seen.” So the Cushite bowed himself to Joab and ran.
  '22':
  - type: text
    content: And Ahimaaz the son of Zadok said again to Joab, “But whatever happens, please let me also run after the Cushite.”
  - type: text
    content: So Joab said, “Why will you run, my son, since you have no news ready?”
  '23':
  - type: text
    content: '“But whatever happens,” '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: said,
  - type: text
    content: ' “let me run.”'
  - type: text
    content: So he said to him, “Run.” Then Ahimaaz ran by way of the plain, and outran the Cushite.
