  '30':
  - type: text
    content: 'And the king said, “Turn aside '
  - type: text
    content: and
  - type: text
    content: ' stand here.” So he turned aside and stood still.'
  '31':
  - type: text
    content: 'Just then the Cushite came, and the Cushite said, “There is good news, my lord the king! For the '
  - type: heading
    content: Lord
  - type: text
    content: ' has avenged you this day of all those who rose against you.”'
  '32':
  - type: text
    content: And the king said to the Cushite, “Is the young man Absalom safe?”
  - type: text
    content: 'So the Cushite answered, “May the enemies of my lord the king, and all who rise against you to do harm, be like '
  - type: text
    content: that
  - type: text
    content: ' young man!”'
  - type: heading
    content: David’s Mourning for Absalom
  '33':
  - type: text
    content: 'Then the king was deeply moved, and went up to the chamber over the gate, and wept. And as he went, he said thus: '
  - type: note
    content: 2 Sam. 16:12
  - type: text
    content: '“O my son Absalom—my son, my son Absalom—if only I had died in your place! O Absalom my son, '
  - type: note
    content: 2 Sam. 12:10
  - type: text
    content: my son!”
  '4':
  - type: text
    content: 'Then the king said to them, “Whatever seems best to you I will do.” So the king stood beside the gate, and all the people went out by hundreds and by thousands. '
  '5':
  - type: text
    content: Now the king had commanded Joab, Abishai, and Ittai, saying, “
  - type: text
    content: Deal
  - type: text
    content: ' gently for my sake with the young man Absalom.” '
  - type: note
    content: 2 Sam. 21:17
  - type: text
    content: And all the people heard when the king gave all the captains orders concerning Absalom.
  '6':
  - type: text
    content: 'So the people went out into the field of battle against Israel. And the battle was in the '
  - type: note
    content: 2 Sam. 18:12
  - type: text
    content: 'woods of Ephraim. '
  '7':
  - type: text
    content: 'The people of Israel were overthrown there before the servants of David, and a great slaughter of twenty thousand took place there that day. '
  '8':
  - type: text
    content: For the battle there was scattered over the face of the whole countryside, and the woods devoured more people that day than the sword devoured.
  '9':
  - type: text
    content: 'Then Absalom met the servants of David. Absalom rode on a mule. The mule went under the thick boughs of a great terebinth tree, and '
  - type: note
    content: Josh. 17:15, 18; 2 Sam. 17:26
  - type: text
    content: 'his head caught in the terebinth; so he was left hanging between heaven and earth. And the mule which '
  - type: text
    content: was
  - type: text
    content: ' under him went on. '
