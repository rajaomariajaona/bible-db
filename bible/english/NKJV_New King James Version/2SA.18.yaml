    content: And ten young men who bore Joab’s armor surrounded Absalom, and struck and killed him.
  '16':
  - type: text
    content: 'So Joab blew the trumpet, and the people returned from pursuing Israel. For Joab held back the people. '
  '17':
  - type: text
    content: 'And they took Absalom and cast him into a large pit in the woods, and '
  - type: note
    content: 2 Sam. 18:5
  - type: text
    content: 'laid a very large heap of stones over him. Then all Israel '
  - type: note
    content: Deut. 21:20, 21; Josh. 7:26; 8:29
  - type: text
    content: fled, everyone to his tent.
  '18':
  - type: text
    content: 'Now Absalom in his lifetime had taken and set up a pillar for himself, which '
  - type: text
