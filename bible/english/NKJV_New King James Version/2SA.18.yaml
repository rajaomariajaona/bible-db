  - type: text
    content: “I have no son to keep my name in remembrance.” He called the pillar after his own name. And to this day it is called Absalom’s Monument.
  - type: heading
    content: David Hears of Absalom’s Death
  '19':
  - type: text
    content: 'Then '
  - type: note
    content: 2 Sam. 14:27
  - type: text
    content: 'Ahimaaz the son of Zadok said, “Let me run now and take the news to the king, how the '
  - type: heading
