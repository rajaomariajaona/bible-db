document_id: LUK.20,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus’ Authority Questioned
  - type: text
    content: 'Now '
  - type: note
    content: Matt. 21:23–27; Mark 11:27–33
  - type: text
    content: 'it happened on one of those days, as He taught the people in the temple and preached the gospel, '
  - type: text
    content: that
  - type: text
    content: ' the chief priests and the scribes, together with the elders, confronted '
  - type: text
    content: Him
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Now at '
  - type: text
    content: 'vintage-time he '
  - type: note
    content: 2 Kin. 17:13, 14; 2 Chr. 36:15, 16; (Acts 7:52; 1 Thess. 2:15)
  - type: text
    content: 'sent a servant to the vinedressers, that they might give him some of the fruit of the vineyard. But the vinedressers beat him and sent '
  - type: text
    content: him
  - type: text
    content: ' away empty-handed.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Again he sent another servant; and they beat him also, treated '
  - type: text
    content: him
  - type: text
    content: ' shamefully, and sent '
  - type: text
    content: him
  - type: text
    content: ' away empty-handed.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And again he sent a third; and they wounded him also and cast '
  - type: text
    content: him
  - type: text
    content: ' out.'
  '13':
  - type: text
    content: '“Then the owner of the vineyard said, '
  - type: text
    content: '‘What shall I do? I will send my beloved son. Probably they will respect '
  - type: text
    content: him
  - type: text
    content: ' when they see him.’'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'But when the vinedressers saw him, they reasoned among themselves, saying, ‘This is the '
  - type: note
    content: (Heb. 1:1–3)
  - type: text
    content: 'heir. Come, '
  - type: note
    content: Matt. 27:21–23
  - type: text
    content: 'let us kill him, that the inheritance may be '
  - type: note
    content: John 11:47, 48
  - type: text
    content: ours.’
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'So they cast him out of the vineyard and '
  - type: note
    content: Luke 23:33; Acts 2:22, 23; 3:15
  - type: text
    content: 'killed '
  - type: text
    content: him.
  - type: text
    content: ' Therefore what will the owner of the vineyard do to them?'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'He will come and destroy those vinedressers and give the vineyard to '
  - type: note
    content: (John 1:11–13); Rom. 11:1, 11; 1 Cor. 6:15; Gal. 2:17; 3:21; 6:14
  - type: text
    content: others.”
  - type: text
    content: 'And when they heard '
  - type: text
    content: it
  - type: text
    content: ' they said, “Certainly not!”'
  '17':
  - type: text
    content: 'Then He looked at them and said, '
  - type: text
    content: '“What then is this that is written:'
  - type: note
    content: Ps. 118:22; Matt. 21:42; 1 Pet. 2:7, 8
  - type: text
    content: ‘The stone which the builders rejected
  - type: text
    content: Has become the chief cornerstone’
  - type: text
    content: '?'
  '18':
  - type: text
    content: 'Whoever falls on that stone will be '
  - type: note
    content: Is. 8:14, 15
  - type: text
    content: 'broken; but '
  - type: note
    content: (Dan. 2:34, 35, 44, 45); Matt. 21:44
  - type: text
    content: on whomever it falls, it will grind him to powder.”
  '19':
  - type: text
    content: And the chief priests and the scribes that very hour sought to lay hands on Him, but they feared the people —for they knew He had spoken this parable against them.
  - type: heading
    content: 'The Pharisees: Is It Lawful to Pay Taxes to Caesar?'
  '2':
  - type: text
    content: 'and spoke to Him, saying, “Tell us, '
  - type: note
    content: Acts 4:7; 7:27
  - type: text
    content: by what authority are You doing these things? Or who is he who gave You this authority?”
  '20':
  - type: note
    content: Matt. 22:15
  - type: text
    content: 'So they watched '
  - type: text
    content: Him,
  - type: text
    content: ' and sent spies who pretended to be righteous, that they might seize on His words, in order to deliver Him to the power and the authority of the governor.'
  '21':
  - type: text
    content: 'Then they asked Him, saying, '
  - type: note
    content: Matt. 22:16; Mark 12:14
  - type: text
    content: '“Teacher, we know that You say and teach rightly, and You do not show personal favoritism, but teach the way of God in truth: '
  '22':
  - type: text
    content: Is it lawful for us to pay taxes to Caesar or not?”
  '23':
  - type: text
    content: 'But He perceived their craftiness, and said to them, '
  - type: text
    content: “Why do you test Me?
  - type: text
    content: ' '
  '24':
  - type: text
    content: Show Me a denarius. Whose image and inscription does it have?”
  - type: text
    content: They answered and said, “Caesar’s.”
  '25':
  - type: text
    content: 'And He said to them, '
  - type: note
    content: Matt. 17:24–27; Rom. 13:7; (1 Pet. 2:13–17)
  - type: text
    content: “Render
  - type: text
    content: ' therefore to Caesar the things that are Caesar’s, and to God the things that are God’s.”'
  '26':
  - type: text
    content: But they could not catch Him in His words in the presence of the people. And they marveled at His answer and kept silent.
  - type: heading
    content: 'The Sadducees: What About the Resurrection?'
  '27':
  - type: note
    content: Matt. 22:23–33; Mark 12:18–27
  - type: text
    content: 'Then some of the Sadducees, '
  - type: note
    content: Acts 23:6, 8
  - type: text
    content: 'who deny that there is a resurrection, came to '
  - type: text
    content: Him
  - type: text
    content: ' and asked Him, '
  '28':
  - type: text
    content: 'saying: “Teacher, Moses wrote to us '
  - type: text
    content: that
  - type: text
    content: ' if a man’s brother dies, having a wife, and he dies without children, his brother should take his wife and raise up offspring for his brother. '
  '29':
  - type: text
    content: 'Now there were seven brothers. And the first took a wife, and died without children. '
  '3':
  - type: text
    content: 'But He answered and said to them, '
  - type: text
    content: '“I also will ask you one thing, and answer Me:'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And the second took her as wife, and he died childless. '
  '31':
  - type: text
    content: 'Then the third took her, and in like manner the seven also; and they left no children, and died. '
  '32':
  - type: text
    content: 'Last of all the woman died also. '
  '33':
  - type: text
    content: Therefore, in the resurrection, whose wife does she become? For all seven had her as wife.”
  '34':
  - type: text
    content: 'Jesus answered and said to them, '
  - type: text
    content: “The sons of this age marry and are given in marriage.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'But those who are '
  - type: note
    content: Phil. 3:11
  - type: text
    content: counted worthy to attain that age, and the resurrection from the dead, neither marry nor are given in marriage;
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'nor can they die anymore, for '
  - type: note
    content: (1 Cor. 15:42, 49, 52; 1 John 3:2)
  - type: text
    content: 'they are equal to the angels and are sons of God, '
  - type: note
    content: Rom. 8:23
  - type: text
    content: being sons of the resurrection.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'But even Moses showed in the '
  - type: text
    content: burning
  - type: text
    content: ' bush '
  - type: text
    content: passage
  - type: text
    content: ' that the dead are raised, when he called the Lord '
  - type: note
    content: Ex. 3:1–6, 15; Acts 7:30–32
  - type: text
    content: ‘the God of Abraham, the God of Isaac, and the God of Jacob.’
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'For He is not the God of the dead but of the living, for '
  - type: note
    content: (Rom. 6:10, 11; 14:8, 9; Heb. 11:16)
  - type: text
    content: all live to Him.”
  '39':
  - type: text
    content: 'Then some of the scribes answered and said, “Teacher, You have spoken well.” '
  '4':
  - type: text
    content: 'The '
  - type: note
    content: John 1:26, 31
  - type: text
    content: baptism of John—was it from heaven or from men?”
  '40':
  - type: text
    content: But after that they dared not question Him anymore.
  - type: heading
    content: 'Jesus: How Can David Call His Descendant Lord?'
  '41':
  - type: text
    content: 'And He said to them, '
  - type: note
    content: Matt. 22:41–46; Mark 12:35–37
  - type: text
    content: “How can they say that the Christ is the Son of David?
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Now David himself said in the Book of Psalms:'
  - type: note
    content: Ps. 110:1; Acts 2:34, 35
  - type: text
    content: '‘The '
  - type: heading
    content: Lord
  - type: text
    content: ' said to my Lord,'
  - type: text
    content: “Sit at My right hand,
  '43':
  - type: text
    content: Till I make Your enemies Your footstool.” ’
  '44':
  - type: text
    content: 'Therefore David calls Him '
  - type: text
    content: ‘Lord’
  - type: text
    content: '; '
  - type: note
    content: Acts 13:22, 23; Rom. 1:3; 9:4, 5
  - type: text
    content: how is He then his Son?”
  - type: heading
    content: Beware of the Scribes
  '45':
  - type: note
    content: Matt. 23:1–7; Mark 12:38–40
  - type: text
    content: 'Then, in the hearing of all the people, He said to His disciples, '
  '46':
  - type: note
    content: Matt. 23:5
  - type: text
    content: '“Beware of the scribes, who desire to go around in long robes, '
  - type: note
    content: Luke 11:43; 14:7
  - type: text
    content: love greetings in the marketplaces, the best seats in the synagogues, and the best places at feasts,
  - type: text
    content: ' '
  '47':
  - type: note
    content: Matt. 23:14
  - type: text
    content: 'who devour widows’ houses, and for a '
  - type: note
    content: (Matt. 6:5, 6)
  - type: text
    content: pretense make long prayers. These will receive greater condemnation.”
  '5':
  - type: text
    content: 'And they reasoned among themselves, saying, “If we say, ‘From heaven,’ He will say, ‘Why then did you not believe him?’ '
  '6':
  - type: text
    content: 'But if we say, ‘From men,’ all the people will stone us, '
  - type: note
    content: Matt. 14:5; 21:26; Mark 6:20; Luke 7:24–30
  - type: text
    content: 'for they are persuaded that John was a prophet.” '
  '7':
  - type: text
    content: 'So they answered that they did not know where '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' from.'
  '8':
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: “Neither will I tell you by what authority I do these things.”
  - type: heading
    content: The Parable of the Wicked Vinedressers
  '9':
  - type: text
    content: 'Then He began to tell the people this parable: '
  - type: note
    content: Ps. 80:8; Matt. 21:33–46; Mark 12:1–12
  - type: text
    content: '“A certain man planted a vineyard, leased it to '
  - type: text
    content: vinedressers, and went into a far country for a long time.
  - type: text
    content: ' '
