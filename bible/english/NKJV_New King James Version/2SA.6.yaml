    - type: text
      text: ', over Israel. Therefore I will play '
    - type: usfm
      marker: it
      children:
      - type: text
        text: music
    - type: text
      text: ' before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I will be even more undignified than this, and will be humble in my own sight. But as for the maidservants of whom you have spoken, by them I will be held in honor.”
