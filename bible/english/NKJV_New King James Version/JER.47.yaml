  - type: text
    content: ','
  - type: text
    content: How long until you are quiet?
  - type: text
    content: Put yourself up into your scabbard,
  - type: text
    content: Rest and be still!
  '7':
  - type: text
    content: How can it be quiet,
  - type: text
    content: 'Seeing the '
  - type: heading
    content: Lord
  - type: text
    content: ' has '
  - type: note
    content: Is. 10:6; Ezek. 14:17
  - type: text
    content: given it a charge
  - type: text
    content: Against Ashkelon and against the seashore?
  - type: text
    content: 'There He has '
  - type: note
