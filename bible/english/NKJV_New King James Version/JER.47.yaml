  '1':
  - type: heading
    content: Judgment on Philistia
  - type: text
    content: 'The word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' that came to Jeremiah the prophet '
  - type: note
    content: Is. 14:29–31; Ezek. 25:15–17; Zeph. 2:4, 5; Zech. 9:6
  - type: text
    content: 'against the Philistines, '
  - type: note
    content: Amos 1:6
  - type: text
    content: before Pharaoh attacked Gaza.
  '2':
  - type: text
    content: 'Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: '“Behold, '
  - type: note
    content: Is. 8:7, 8; Jer. 46:7, 8
  - type: text
    content: 'waters rise '
  - type: note
    content: Jer. 1:14
  - type: text
    content: out of the north,
  - type: text
    content: And shall be an overflowing flood;
  - type: text
    content: They shall overflow the land and all that is in it,
  - type: text
    content: The city and those who dwell within;
  - type: text
    content: Then the men shall cry,
  - type: text
    content: And all the inhabitants of the land shall wail.
  '3':
  - type: text
    content: 'At the '
  - type: note
    content: Judg. 5:22; Jer. 8:16; Nah. 3:2
  - type: text
    content: noise of the stamping hooves of his strong horses,
  - type: text
    content: At the rushing of his chariots,
  - type: text
    content: At
  - type: text
    content: ' the rumbling of his wheels,'
  - type: text
    content: 'The fathers will not look back for '
  - type: text
    content: their
  - type: text
    content: ' children,'
  - type: text
    content: Lacking courage,
  '4':
  - type: text
    content: 'Because of the day that comes to plunder all the '
  - type: note
    content: Is. 14:29–31
  - type: text
    content: Philistines,
  - type: text
    content: 'To cut off from '
  - type: note
    content: Is. 23:1–18; Jer. 25:22; Ezek. 26:1–21; 28:20–24; Amos 1:9, 10; Zech. 9:2–4
  - type: text
    content: Tyre and Sidon every helper who remains;
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' shall plunder the Philistines,'
  - type: note
    content: Ezek. 25:16; Amos 1:8
  - type: text
    content: 'The remnant of the country of '
  - type: note
    content: Gen. 10:14; Deut. 2:23; Amos 9:7
  - type: text
    content: Caphtor.
  '5':
  - type: note
    content: Jer. 48:37; Mic. 1:16; Zeph. 2:4
  - type: text
    content: Baldness has come upon Gaza,
  - type: note
    content: Judg. 1:18; Jer. 25:20; Amos 1:7, 8; Zech. 9:5
  - type: text
    content: Ashkelon is cut off
  - type: text
    content: With
  - type: text
    content: ' the remnant of their valley.'
  - type: text
    content: How long will you cut yourself?
  '6':
  - type: text
    content: '“O you '
  - type: note
    content: Deut. 32:41; Judg. 7:20; Jer. 12:12; Ezek. 21:3–5
  - type: text
