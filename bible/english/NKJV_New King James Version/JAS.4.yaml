    - type: text
      text: Job 22:29; Ps. 138:6; Prov. 3:34; Matt. 23:12; 1 Pet. 5:5
    marker-yv: yv-n
  - type: text
    text: “God resists the proud,
- type: usfm
  marker: q2
  children:
