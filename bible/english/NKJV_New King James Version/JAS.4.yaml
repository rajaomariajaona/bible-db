document_id: JAS.4,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pride Promotes Strife
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Where do wars and fights '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' from among you? Do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' from your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: desires
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' pleasure '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 7:23; (Gal. 5:17); 1 Pet. 2:11
      marker-yv: yv-n
    - type: text
      text: 'that war in your members? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 22:29; Luke 14:11; 18:14; 1 Pet. 5:6
      marker-yv: yv-n
    - type: text
      text: Humble yourselves in the sight of the Lord, and He will lift you up.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Do Not Judge a Brother
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 12:20; Eph. 4:31; James 5:9; 1 Pet. 2:1–3
      marker-yv: yv-n
    - type: text
      text: 'Do not speak evil of one another, brethren. He who speaks evil of a brother '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 7:1–5); Rom. 14:4
      marker-yv: yv-n
    - type: text
      text: 'and judges his brother, speaks evil of the law and judges the law. But if you judge the law, you are not a doer of the law but a judge. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There is one Lawgiver, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 10:28)
      marker-yv: yv-n
    - type: text
      text: 'who is able to save and to destroy. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 14:4
      marker-yv: yv-n
    - type: text
      text: Who are you to judge another?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Do Not Boast About Tomorrow
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Come now, you who say, “Today or tomorrow we will go to such and such a city, spend a year there, buy and sell, and make a profit”; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whereas you do not know what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: happen
    - type: text
      text: ' tomorrow. For what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' your life? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 7:7; Ps. 102:3; 1 Pet. 1:24
      marker-yv: yv-n
    - type: text
      text: 'It is even a vapor that appears for a little time and then vanishes away. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Instead you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ought
    - type: text
      text: ' to say, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:21; 1 Cor. 4:19
      marker-yv: yv-n
    - type: text
      text: '“If the Lord wills, we shall live and do this or that.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now you boast in your arrogance. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 5:6
      marker-yv: yv-n
    - type: text
      text: All such boasting is evil.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Luke 12:47); John 9:41; 2 Pet. 2:21
      marker-yv: yv-n
    - type: text
      text: 'to him who knows to do good and does not do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' to him it is sin.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You lust and do not have. You murder and covet and cannot obtain. You fight and war. Yet you do not have because you do not ask. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 27:8, 9
      marker-yv: yv-n
    - type: text
      text: 'You ask and do not receive, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 66:18)
      marker-yv: yv-n
    - type: text
      text: 'because you ask amiss, that you may spend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' on your pleasures. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adulterers and adulteresses! Do you not know that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 8:7; 1 John 2:15
      marker-yv: yv-n
    - type: text
      text: 'friendship with the world is enmity with God? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 1:4
      marker-yv: yv-n
    - type: text
      text: 'Whoever therefore wants to be a friend of the world makes himself an enemy of God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or do you think that the Scripture says in vain, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 6:5
      marker-yv: yv-n
    - type: text
      text: “The Spirit who dwells in us yearns jealously”?
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But He gives more grace. Therefore He says:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 22:29; Ps. 138:6; Prov. 3:34; Matt. 23:12; 1 Pet. 5:5
      marker-yv: yv-n
    - type: text
      text: “God resists the proud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But gives grace to the humble.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Humility Cures Worldliness
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore submit to God. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eph. 4:27; 6:11); 1 Pet. 5:8
      marker-yv: yv-n
    - type: text
      text: 'Resist the devil and he will flee from you. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 15:2; Zech. 1:3; Mal. 3:7; Heb. 7:19
      marker-yv: yv-n
    - type: text
      text: 'Draw near to God and He will draw near to you. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 17:9; Is. 1:16; 1 Tim. 2:8
      marker-yv: yv-n
    - type: text
      text: 'Cleanse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' hands, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' sinners; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 4:14; James 3:17; 1 Pet. 1:22; 1 John 3:3
      marker-yv: yv-n
    - type: text
      text: 'purify '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' hearts, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' double-minded. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 5:4
      marker-yv: yv-n
    - type: text
      text: 'Lament and mourn and weep! Let your laughter be turned to mourning and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' joy to gloom. '
