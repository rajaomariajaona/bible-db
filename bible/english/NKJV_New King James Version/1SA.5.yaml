  - type: text
    content: ' '
  - type: text
    content: was,
  - type: text
    content: ' they said, “The ark of the '
  - type: note
    content: Josh. 15:46, 47
  - type: text
    content: 'God of Israel must not remain with us, for His hand is harsh toward us and Dagon our god.” '
  '8':
  - type: text
    content: 'Therefore they sent and gathered to themselves all the '
  - type: note
