  - type: text
    content: ' was heavy on the people of Ashdod, and He '
  - type: note
    content: Ex. 9:3; Deut. 2:15; 1 Sam. 5:7; 7:13; Ps. 32:4; 145:20; 147:6
  - type: text
    content: 'ravaged them and struck them with '
  - type: note
