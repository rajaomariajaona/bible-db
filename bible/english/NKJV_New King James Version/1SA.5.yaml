verses:
  '1':
  - type: heading
    content: The Philistines and the Ark
  - type: text
    content: 'Then the Philistines took the ark of God and brought it '
  - type: note
    content: Ps. 26:8; 78:61; (Jer. 2:11)
  - type: text
    content: 'from Ebenezer to Ashdod. '
  '10':
  - type: text
    content: 'Therefore they sent the ark of God to Ekron. So it was, as the ark of God came to Ekron, that the Ekronites cried out, saying, “They have brought the ark of the God of Israel to us, to kill us and our people!” '
  '11':
  - type: text
    content: 'So they sent and gathered together all the lords of the Philistines, and said, “Send away the ark of the God of Israel, and let it go back to its own place, so that it does not kill us and our people.” For there was a deadly destruction throughout all the city; the hand of God was very heavy there. '
  '12':
  - type: text
    content: 'And the men who did not die were stricken with the tumors, and the '
  - type: note
    content: Deut. 2:15; 1 Sam. 5:11; 7:13; 12:15
  - type: text
    content: cry of the city went up to heaven.
  '2':
  - type: text
    content: 'When the Philistines took the ark of God, they brought it into the house of '
  - type: note
    content: 1 Sam. 4:1; 7:12
  - type: text
    content: 'Dagon and set it by Dagon. '
  '3':
  - type: text
    content: 'And when the people of Ashdod arose early in the morning, there was Dagon, '
  - type: note
    content: Judg. 16:23–30; 1 Chr. 10:8–10
  - type: text
    content: 'fallen on its face to the earth before the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: '. So they took Dagon and '
  - type: note
    content: Is. 19:1; 46:1, 2
  - type: text
    content: 'set it in its place again. '
  '4':
  - type: text
    content: 'And when they arose early the next morning, there was Dagon, fallen on its face to the ground before the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: Is. 46:7
  - type: text
    content: 'The head of Dagon and both the palms of its hands '
  - type: text
    content: were
  - type: text
    content: ' broken off on the threshold; only Dagon’s '
  - type: text
    content: torso
  - type: text
    content: ' was left of it. '
  '5':
  - type: text
    content: 'Therefore neither the priests of Dagon nor any who come into Dagon’s house '
  - type: note
    content: Jer. 50:2; Ezek. 6:4, 6; Mic. 1:7
  - type: text
    content: tread on the threshold of Dagon in Ashdod to this day.
