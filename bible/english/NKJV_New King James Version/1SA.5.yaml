  - type: text
    content: lords of the Philistines, and said, “What shall we do with the ark of the God of Israel?”
  - type: text
    content: 'And they answered, “Let the ark of the God of Israel be carried away to '
  - type: note
    content: 1 Sam. 6:4
  - type: text
    content: 'Gath.” So they carried the ark of the God of Israel away. '
