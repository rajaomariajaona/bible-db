document_id: 1SA.5,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Philistines and the Ark
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Philistines took the ark of God and brought it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 26:8; 78:61; (Jer. 2:11)
      marker-yv: yv-n
    - type: text
      text: 'from Ebenezer to Ashdod. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore they sent the ark of God to Ekron. So it was, as the ark of God came to Ekron, that the Ekronites cried out, saying, “They have brought the ark of the God of Israel to us, to kill us and our people!” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they sent and gathered together all the lords of the Philistines, and said, “Send away the ark of the God of Israel, and let it go back to its own place, so that it does not kill us and our people.” For there was a deadly destruction throughout all the city; the hand of God was very heavy there. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men who did not die were stricken with the tumors, and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 2:15; 1 Sam. 5:11; 7:13; 12:15
      marker-yv: yv-n
    - type: text
      text: cry of the city went up to heaven.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Philistines took the ark of God, they brought it into the house of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 4:1; 7:12
      marker-yv: yv-n
    - type: text
      text: 'Dagon and set it by Dagon. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the people of Ashdod arose early in the morning, there was Dagon, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 16:23–30; 1 Chr. 10:8–10
      marker-yv: yv-n
    - type: text
      text: 'fallen on its face to the earth before the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. So they took Dagon and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 19:1; 46:1, 2
      marker-yv: yv-n
    - type: text
      text: 'set it in its place again. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they arose early the next morning, there was Dagon, fallen on its face to the ground before the ark of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 46:7
      marker-yv: yv-n
    - type: text
      text: 'The head of Dagon and both the palms of its hands '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' broken off on the threshold; only Dagon’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: torso
    - type: text
      text: ' was left of it. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore neither the priests of Dagon nor any who come into Dagon’s house '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 50:2; Ezek. 6:4, 6; Mic. 1:7
      marker-yv: yv-n
    - type: text
      text: tread on the threshold of Dagon in Ashdod to this day.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zeph. 1:9
      marker-yv: yv-n
    - type: text
      text: 'hand of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was heavy on the people of Ashdod, and He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 9:3; Deut. 2:15; 1 Sam. 5:7; 7:13; Ps. 32:4; 145:20; 147:6
      marker-yv: yv-n
    - type: text
      text: 'ravaged them and struck them with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 6:5
      marker-yv: yv-n
    - type: text
      text: 'tumors, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: both
    - type: text
      text: ' Ashdod and its '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:27; Ps. 78:66
      marker-yv: yv-n
    - type: text
      text: 'territory. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the men of Ashdod saw how '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was,
    - type: text
      text: ' they said, “The ark of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:46, 47
      marker-yv: yv-n
    - type: text
      text: 'God of Israel must not remain with us, for His hand is harsh toward us and Dagon our god.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore they sent and gathered to themselves all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 6:5
      marker-yv: yv-n
    - type: text
      text: lords of the Philistines, and said, “What shall we do with the ark of the God of Israel?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they answered, “Let the ark of the God of Israel be carried away to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 6:4
      marker-yv: yv-n
    - type: text
      text: 'Gath.” So they carried the ark of the God of Israel away. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it was, after they had carried it away, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 11:22
      marker-yv: yv-n
    - type: text
      text: 'the hand of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was against the city with a very great destruction; and He struck the men of the city, both small and great, and tumors broke out on them.'
