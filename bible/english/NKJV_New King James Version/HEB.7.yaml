document_id: HEB.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The King of Righteousness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'For this '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 14:18–20; Heb. 7:6
    marker-yv: yv-n
  - type: text
    text: 'Melchizedek, king of Salem, priest of the Most High God, who met Abraham returning from the slaughter of the kings and blessed him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'to whom also Abraham gave a tenth part of all, first being translated “king of righteousness,” and then also king of Salem, meaning “king of peace,” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: without father, without mother, without genealogy, having neither beginning of days nor end of life, but made like the Son of God, remains a priest continually.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now consider how great this man '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was,
  - type: text
    text: ' to whom even the patriarch Abraham gave a tenth of the spoils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And indeed '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 18:21–26; 2 Chr. 31:4
    marker-yv: yv-n
  - type: text
    text: 'those who are of the sons of Levi, who receive the priesthood, have a commandment to receive tithes from the people according to the law, that is, from their brethren, though they have come from the loins of Abraham; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'but he whose genealogy is not derived from them received tithes from Abraham '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 14:19, 20
    marker-yv: yv-n
  - type: text
    text: 'and blessed '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 4:13)
    marker-yv: yv-n
  - type: text
    text: 'him who had the promises. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now beyond all contradiction the lesser is blessed by the better. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Here mortal men receive tithes, but there he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: receives
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. 5:6; 6:20; (Rev. 1:18)
    marker-yv: yv-n
  - type: text
    text: 'of whom it is witnessed that he lives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Even Levi, who receives tithes, paid tithes through Abraham, so to speak, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: for he was still in the loins of his father when Melchizedek met him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Need for a New Priesthood
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 7:7–14); Gal. 2:21; Heb. 7:18; 8:7
    marker-yv: yv-n
  - type: text
    text: 'Therefore, if perfection were through the Levitical priesthood (for under it the people received the law), what further need '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' that another priest should rise according to the order of Melchizedek, and not be called according to the order of Aaron? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For the priesthood being changed, of necessity there is also a change of the law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For He of whom these things are spoken belongs to another tribe, from which no man has officiated at the altar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' evident that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 49:8–10; Num. 24:17; Is. 1:1; Mic. 5:2; Matt. 1:3; 2:6; Rev. 5:5
    marker-yv: yv-n
  - type: text
    text: 'our Lord arose from '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 1:2
    marker-yv: yv-n
  - type: text
    text: 'Judah, of which tribe Moses spoke nothing concerning priesthood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And it is yet far more evident if, in the likeness of Melchizedek, there arises another priest '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'who has come, not according to the law of a fleshly commandment, but according to the power of an endless life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For He testifies:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 110:4; Heb. 5:6; 6:20; 7:21
    marker-yv: yv-n
  - type: text
    text: '“You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' a priest forever'
- type: usfm
  marker: q2
  children:
  - type: text
    text: According to the order of Melchizedek.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For on the one hand there is an annulling of the former commandment because of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 8:3); Gal. 3:21; Heb. 7:11
    marker-yv: yv-n
  - type: text
    text: 'its weakness and unprofitableness, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Acts 13:39); Rom. 3:20; 7:7; Gal. 2:16; 3:21; Heb. 9:9; 10:1
    marker-yv: yv-n
  - type: text
    text: 'the law made nothing perfect; on the other hand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' bringing in of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. 6:18, 19
    marker-yv: yv-n
  - type: text
    text: 'a better hope, through which '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lam. 3:57; Rom. 5:2; (Eph. 2:18); Heb. 4:16; James 4:8
    marker-yv: yv-n
  - type: text
    text: we draw near to God.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greatness of the New Priest
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And inasmuch as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: made
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: priest
  - type: text
    text: ' without an oath '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '(for they have become priests without an oath, but He with an oath by Him who said to Him:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 110:4; Heb. 5:6; 7:17
    marker-yv: yv-n
  - type: text
    text: '“The '
  - type: usfm
    marker: sc
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Lord
  - type: text
    text: ' has sworn'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And will not relent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: '‘You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' a priest forever'
- type: usfm
  marker: q2
  children:
  - type: text
    text: According to the order of Melchizedek’ ”),
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'by so much more Jesus has become a surety of a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. 8:6
    marker-yv: yv-n
  - type: text
    text: better covenant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Also there were many priests, because they were prevented by death from continuing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But He, because He continues forever, has an unchangeable priesthood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Therefore He is also '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jude 24
    marker-yv: yv-n
  - type: text
    text: 'able to save to the uttermost those who come to God through Him, since He always lives '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 8:34; 1 Tim. 2:5; Heb. 9:24; 1 John 2:1
    marker-yv: yv-n
  - type: text
    text: to make intercession for them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For such a High Priest was fitting for us, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Cor. 5:21); Heb. 4:15
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' holy, harmless, undefiled, separate from sinners, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 1:20
    marker-yv: yv-n
  - type: text
    text: 'and has become higher than the heavens; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'who does not need daily, as those high priests, to offer up sacrifices, first for His '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 9:7; 16:6; Heb. 5:3
    marker-yv: yv-n
  - type: text
    text: 'own sins and then for the people’s, for this He did once for all when He offered up Himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For the law appoints as high priests men who have weakness, but the word of the oath, which came after the law, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: appoints
  - type: text
    text: ' the Son who has been perfected forever.'
