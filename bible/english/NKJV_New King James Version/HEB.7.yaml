verses:
  '1':
  - type: heading
    content: The King of Righteousness
  - type: text
    content: 'For this '
  - type: note
    content: Gen. 14:18–20; Heb. 7:6
  - type: text
    content: 'Melchizedek, king of Salem, priest of the Most High God, who met Abraham returning from the slaughter of the kings and blessed him, '
  '10':
  - type: text
    content: for he was still in the loins of his father when Melchizedek met him.
  - type: heading
    content: Need for a New Priesthood
  '11':
  - type: note
    content: (Rom. 7:7–14); Gal. 2:21; Heb. 7:18; 8:7
  - type: text
    content: 'Therefore, if perfection were through the Levitical priesthood (for under it the people received the law), what further need '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: text
    content: there
  - type: text
    content: ' that another priest should rise according to the order of Melchizedek, and not be called according to the order of Aaron? '
  '12':
  - type: text
    content: 'For the priesthood being changed, of necessity there is also a change of the law. '
  '13':
  - type: text
    content: For He of whom these things are spoken belongs to another tribe, from which no man has officiated at the altar.
  '14':
  - type: text
    content: 'For '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' evident that '
  - type: note
    content: Gen. 49:8–10; Num. 24:17; Is. 1:1; Mic. 5:2; Matt. 1:3; 2:6; Rev. 5:5
  - type: text
    content: 'our Lord arose from '
  - type: note
    content: Matt. 1:2
  - type: text
    content: 'Judah, of which tribe Moses spoke nothing concerning priesthood. '
  '15':
  - type: text
    content: 'And it is yet far more evident if, in the likeness of Melchizedek, there arises another priest '
  '16':
  - type: text
    content: 'who has come, not according to the law of a fleshly commandment, but according to the power of an endless life. '
  '17':
  - type: text
    content: 'For He testifies:'
  - type: note
    content: Ps. 110:4; Heb. 5:6; 6:20; 7:21
  - type: text
    content: '“You '
  - type: text
    content: are
  - type: text
    content: ' a priest forever'
  - type: text
    content: According to the order of Melchizedek.”
  '18':
  - type: text
    content: 'For on the one hand there is an annulling of the former commandment because of '
  - type: note
    content: (Rom. 8:3); Gal. 3:21; Heb. 7:11
  - type: text
    content: 'its weakness and unprofitableness, '
  '19':
  - type: text
    content: 'for '
  - type: note
    content: (Acts 13:39); Rom. 3:20; 7:7; Gal. 2:16; 3:21; Heb. 9:9; 10:1
  - type: text
    content: 'the law made nothing perfect; on the other hand, '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' bringing in of '
  - type: note
    content: Heb. 6:18, 19
  - type: text
    content: 'a better hope, through which '
  - type: note
    content: Lam. 3:57; Rom. 5:2; (Eph. 2:18); Heb. 4:16; James 4:8
  - type: text
    content: we draw near to God.
  - type: heading
    content: Greatness of the New Priest
  '2':
  - type: text
    content: 'to whom also Abraham gave a tenth part of all, first being translated “king of righteousness,” and then also king of Salem, meaning “king of peace,” '
  '20':
  - type: text
    content: 'And inasmuch as '
  - type: text
    content: He
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' not '
  - type: text
    content: made
  - type: text
    content: ' '
  - type: text
    content: priest
  - type: text
    content: ' without an oath '
  '21':
  - type: text
    content: '(for they have become priests without an oath, but He with an oath by Him who said to Him:'
  - type: note
    content: Ps. 110:4; Heb. 5:6; 7:17
  - type: text
    content: '“The '
  - type: heading
    content: Lord
  - type: text
    content: ' has sworn'
  - type: text
    content: And will not relent,
  - type: text
    content: '‘You '
  - type: text
    content: are
  - type: text
    content: ' a priest forever'
  - type: text
    content: According to the order of Melchizedek’ ”),
  '22':
  - type: text
    content: 'by so much more Jesus has become a surety of a '
  - type: note
    content: Heb. 8:6
  - type: text
    content: better covenant.
  '23':
  - type: text
    content: 'Also there were many priests, because they were prevented by death from continuing. '
  '24':
  - type: text
    content: 'But He, because He continues forever, has an unchangeable priesthood. '
  '25':
  - type: text
    content: 'Therefore He is also '
  - type: note
    content: Jude 24
  - type: text
    content: 'able to save to the uttermost those who come to God through Him, since He always lives '
  - type: note
    content: Rom. 8:34; 1 Tim. 2:5; Heb. 9:24; 1 John 2:1
  - type: text
    content: to make intercession for them.
  '26':
  - type: text
    content: 'For such a High Priest was fitting for us, '
  - type: note
    content: (2 Cor. 5:21); Heb. 4:15
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' holy, harmless, undefiled, separate from sinners, '
  - type: note
    content: Eph. 1:20
  - type: text
    content: 'and has become higher than the heavens; '
  '27':
  - type: text
    content: 'who does not need daily, as those high priests, to offer up sacrifices, first for His '
  - type: note
    content: Lev. 9:7; 16:6; Heb. 5:3
  - type: text
    content: 'own sins and then for the people’s, for this He did once for all when He offered up Himself. '
  '28':
  - type: text
    content: 'For the law appoints as high priests men who have weakness, but the word of the oath, which came after the law, '
  - type: text
    content: appoints
  - type: text
    content: ' the Son who has been perfected forever.'
  '3':
  - type: text
    content: without father, without mother, without genealogy, having neither beginning of days nor end of life, but made like the Son of God, remains a priest continually.
  '4':
  - type: text
    content: 'Now consider how great this man '
  - type: text
    content: was,
  - type: text
    content: ' to whom even the patriarch Abraham gave a tenth of the spoils. '
  '5':
  - type: text
    content: 'And indeed '
  - type: note
    content: Num. 18:21–26; 2 Chr. 31:4
  - type: text
    content: 'those who are of the sons of Levi, who receive the priesthood, have a commandment to receive tithes from the people according to the law, that is, from their brethren, though they have come from the loins of Abraham; '
  '6':
  - type: text
    content: 'but he whose genealogy is not derived from them received tithes from Abraham '
  - type: note
    content: Gen. 14:19, 20
  - type: text
    content: 'and blessed '
  - type: note
    content: (Rom. 4:13)
  - type: text
    content: 'him who had the promises. '
  '7':
  - type: text
    content: 'Now beyond all contradiction the lesser is blessed by the better. '
  '8':
  - type: text
    content: 'Here mortal men receive tithes, but there he '
  - type: text
    content: receives
  - type: text
    content: ' '
  - type: text
    content: them,
  - type: text
    content: ' '
  - type: note
    content: Heb. 5:6; 6:20; (Rev. 1:18)
  - type: text
    content: 'of whom it is witnessed that he lives. '
  '9':
  - type: text
    content: 'Even Levi, who receives tithes, paid tithes through Abraham, so to speak, '
