  '17':
  - type: text
    content: 'Then '
  - type: note
    content: Matt. 17:14; Luke 9:38
  - type: text
    content: 'one of the crowd answered and said, “Teacher, I brought You my son, who has a mute spirit. '
  '18':
  - type: text
    content: And wherever it seizes him, it throws him down; he foams at the mouth, gnashes his teeth, and becomes rigid. So I spoke to Your disciples, that they should cast it out, but they could not.”
  '19':
  - type: text
    content: 'He answered him and said, '
  - type: text
    content: '“O '
  - type: note
    content: John 4:48
  - type: text
    content: faithless
  - type: text
    content: ' generation, how long shall I be with you? How long shall I '
  - type: text
    content: bear with you? Bring him to Me.”
  - type: text
    content: ' '
  '2':
  - type: note
    content: Matt. 17:1–8; Luke 9:28–36
  - type: text
    content: 'Now after six days Jesus took Peter, James, and John, and led them up on a high mountain apart by themselves; and He was transfigured before them. '
  '20':
  - type: text
    content: 'Then they brought him to Him. And '
  - type: note
    content: Mark 1:26; Luke 9:42
  - type: text
    content: when he saw Him, immediately the spirit convulsed him, and he fell on the ground and wallowed, foaming at the mouth.
  '21':
  - type: text
    content: 'So He asked his father, '
  - type: text
    content: “How long has this been happening to him?”
  - type: text
    content: 'And he said, “From childhood. '
  '22':
  - type: text
    content: And often he has thrown him both into the fire and into the water to destroy him. But if You can do anything, have compassion on us and help us.”
  '23':
  - type: text
    content: 'Jesus said to him, '
  - type: note
    content: Matt. 17:20; Mark 11:23; Luke 17:6; John 11:40
  - type: text
    content: “If
  - type: text
    content: ' you can believe,'
  - type: text
    content: ' all things '
  - type: text
    content: are
  - type: text
    content: ' possible to him who believes.”'
  '24':
  - type: text
    content: 'Immediately the father of the child cried out and said with tears, “Lord, I believe; '
  - type: note
    content: Luke 17:5
  - type: text
    content: help my unbelief!”
  '25':
  - type: text
    content: 'When Jesus saw that the people came running together, He '
  - type: note
    content: Mark 1:25
  - type: text
    content: 'rebuked the unclean spirit, saying to it: '
  - type: text
    content: “Deaf and dumb spirit, I command you, come out of him and enter him no more!”
  - type: text
    content: ' '
