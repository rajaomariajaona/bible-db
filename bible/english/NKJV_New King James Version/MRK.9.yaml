  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: spirit
  - type: text
    content: ' cried out, convulsed him greatly, and came out of him. And he became as one dead, so that many said, “He is dead.” '
  '27':
  - type: text
    content: But Jesus took him by the hand and lifted him up, and he arose.
  '28':
  - type: note
    content: Matt. 17:19
  - type: text
    content: And when He had come into the house, His disciples asked Him privately, “Why could we not cast it out?”
  '29':
  - type: text
    content: 'So He said to them, '
  - type: text
    content: '“This kind can come out by nothing but '
  - type: note
