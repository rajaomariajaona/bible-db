  - type: text
    content: Elijah has also come, and they did to him whatever they wished, as it is written of him.”
  - type: heading
    content: A Boy Is Healed
  '14':
  - type: note
    content: Matt. 17:14–19; Luke 9:37–42
  - type: text
    content: 'And when He came to the disciples, He saw a great multitude around them, and scribes disputing with them. '
  '15':
  - type: text
    content: 'Immediately, when they saw Him, all the people were greatly amazed, and running to '
  - type: text
    content: Him,
  - type: text
    content: ' greeted Him. '
  '16':
  - type: text
