  '9':
  - type: note
    content: Matt. 17:9–13; Mark 16:6; Luke 24:6, 7, 46
  - type: text
    content: 'Now as they came down from the mountain, He commanded them that they should tell no one the things they had seen, till the Son of Man had risen from the dead. '
