  - type: text
    content: 'He took a little child and set him in the midst of them. And when He had taken him in His arms, He said to them, '
  '37':
  - type: text
    content: '“Whoever receives one of these little children in My name receives Me; and '
  - type: note
    content: Matt. 10:40; Luke 10:16; John 13:20
  - type: text
    content: whoever receives Me, receives not Me but Him who sent Me.”
  - type: heading
