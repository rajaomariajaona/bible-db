  - type: text
    text: Vengeance on the Midianites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 25:17
    marker-yv: yv-n
  - type: text
    text: '“Take vengeance on the Midianites for the children of Israel. Afterward you shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 27:12, 13
    marker-yv: yv-n
  - type: text
    text: be gathered to your people.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Moses spoke to the people, saying, “Arm some of yourselves for war, and let them go against the Midianites to take vengeance for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' on '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 13:21
    marker-yv: yv-n
  - type: text
    text: 'Midian. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A thousand from each tribe of all the tribes of Israel you shall send to the war.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So there were recruited from the divisions of Israel one thousand from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: each
  - type: text
    text: ' tribe, twelve thousand armed for war. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Moses sent them to the war, one thousand from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: each
  - type: text
    text: ' tribe; he sent them to the war with Phinehas the son of Eleazar the priest, with the holy articles and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 10:9
    marker-yv: yv-n
  - type: text
    text: 'the signal trumpets in his hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they warred against the Midianites, just as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 20:13; Judg. 21:11; 1 Sam. 27:9; 1 Kin. 11:15, 16
    marker-yv: yv-n
  - type: text
    text: 'they killed all the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 34:25
    marker-yv: yv-n
  - type: text
    text: 'males. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'They killed the kings of Midian with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rest
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' those who were killed—'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 13:21
    marker-yv: yv-n
  - type: text
    text: 'Evi, Rekem, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 25:15
    marker-yv: yv-n
  - type: text
    text: 'Zur, Hur, and Reba, the five kings of Midian. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 31:16; Josh. 13:22
    marker-yv: yv-n
  - type: text
    text: Balaam the son of Beor they also killed with the sword.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the children of Israel took the women of Midian captive, with their little ones, and took as spoil all their cattle, all their flocks, and all their goods. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They also burned with fire all the cities where they dwelt, and all their forts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 20:14
    marker-yv: yv-n
  - type: text
    text: they took all the spoil and all the booty—of man and beast.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Return from the War
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then they brought the captives, the booty, and the spoil to Moses, to Eleazar the priest, and to the congregation of the children of Israel, to the camp in the plains of Moab by the Jordan, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: across
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from
  - type: text
    text: ' Jericho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Moses, Eleazar the priest, and all the leaders of the congregation, went to meet them outside the camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But Moses was angry with the officers of the army, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' the captains over thousands and captains over hundreds, who had come from the battle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Moses said to them: “Have you kept '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 20:14
    marker-yv: yv-n
  - type: text
    text: 'all the women alive? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Look, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 25:2
    marker-yv: yv-n
  - type: text
    text: 'these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: women
  - type: text
    text: ' caused the children of Israel, through the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 24:14; 2 Pet. 2:15; Rev. 2:14
    marker-yv: yv-n
  - type: text
    text: 'counsel of Balaam, to trespass against the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in the incident of Peor, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 25:9
    marker-yv: yv-n
  - type: text
    text: 'there was a plague among the congregation of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now therefore, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 7:2; 20:16–18; Judg. 21:11
    marker-yv: yv-n
  - type: text
    text: 'kill every male among the little ones, and kill every woman who has known a man intimately. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But keep alive '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 21:10–14
    marker-yv: yv-n
  - type: text
    text: 'for yourselves all the young girls who have not known a man intimately. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And as for you, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 5:2
    marker-yv: yv-n
  - type: text
    text: 'remain outside the camp seven days; whoever has killed any person, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 19:11–22
    marker-yv: yv-n
  - type: text
    text: 'whoever has touched any slain, purify yourselves and your captives on the third day and on the seventh day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Purify every garment, everything made of leather, everything woven of goats’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hair,
  - type: text
    text: ' and everything made of wood.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Eleazar the priest said to the men of war who had gone to the battle, “This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the ordinance of the law which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Only the gold, the silver, the bronze, the iron, the tin, and the lead, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'everything that can endure fire, you shall put through the fire, and it shall be clean; and it shall be purified '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 19:9, 17
    marker-yv: yv-n
  - type: text
    text: 'with the water of purification. But all that cannot endure fire you shall put through water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 11:25
    marker-yv: yv-n
  - type: text
    text: And you shall wash your clothes on the seventh day and be clean, and afterward you may come into the camp.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Division of the Plunder
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“Count up the plunder that was taken—of man and beast—you and Eleazar the priest and the chief fathers of the congregation; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 22:8; 1 Sam. 30:24
    marker-yv: yv-n
  - type: text
    text: 'divide the plunder into two parts, between those who took part in the war, who went out to battle, and all the congregation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And levy a tribute for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' on the men of war who went out to battle: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 31:30, 47
    marker-yv: yv-n
  - type: text
    text: 'one of every five hundred of the persons, the cattle, the donkeys, and the sheep; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'take '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' from their half, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 18:1–5
    marker-yv: yv-n
  - type: text
    text: 'give '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' to Eleazar the priest as a heave offering to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And from the children of Israel’s half you shall take '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 31:42–47
    marker-yv: yv-n
  - type: text
    text: 'one of every fifty, drawn from the persons, the cattle, the donkeys, and the sheep, from all the livestock, and give them to the Levites '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 3:7, 8, 25, 31, 36; 18:3, 4
    marker-yv: yv-n
  - type: text
    text: 'who keep charge of the tabernacle of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'So Moses and Eleazar the priest did as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The booty remaining from the plunder, which the men of war had taken, was six hundred and seventy-five thousand sheep, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'seventy-two thousand cattle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'sixty-one thousand donkeys, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'and thirty-two thousand persons in all, of women who had not known a man intimately. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And the half, the portion for those who had gone out to war, was in number three hundred and thirty-seven thousand five hundred sheep; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'and the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s tribute of the sheep was six hundred and seventy-five. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'The cattle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' thirty-six thousand, of which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s tribute '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' seventy-two. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'The donkeys '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' thirty thousand five hundred, of which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s tribute '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' sixty-one. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'The persons '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' sixteen thousand, of which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s tribute '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' thirty-two persons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'So Moses gave the tribute '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s heave offering to Eleazar the priest, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 5:9, 10; 18:8, 19
    marker-yv: yv-n
  - type: text
    text: 'as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And from the children of Israel’s half, which Moses separated from the men who fought— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'now the half belonging to the congregation was three hundred and thirty-seven thousand five hundred sheep, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'thirty-six thousand cattle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'thirty thousand five hundred donkeys, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'and sixteen thousand persons— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 31:30
    marker-yv: yv-n
  - type: text
    text: 'from the children of Israel’s half Moses took one of every fifty, drawn from man and beast, and gave them to the Levites, who kept charge of the tabernacle of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Then the officers who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' over thousands of the army, the captains of thousands and captains of hundreds, came near to Moses; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'and they said to Moses, “Your servants have taken a count of the men of war who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' under our command, and not a man of us is missing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Therefore we have brought an offering for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', what every man found of ornaments of gold: armlets and bracelets and signet rings and earrings and necklaces, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:12–16
    marker-yv: yv-n
  - type: text
    text: 'to make atonement for ourselves before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'So Moses and Eleazar the priest received the gold from them, all the fashioned ornaments. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'And all the gold of the offering that they offered to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', from the captains of thousands and captains of hundreds, was sixteen thousand seven hundred and fifty shekels. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: usfm
