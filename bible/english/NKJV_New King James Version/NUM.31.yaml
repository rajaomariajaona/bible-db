verses:
  '1':
  - type: heading
    content: Vengeance on the Midianites
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '10':
  - type: text
    content: 'They also burned with fire all the cities where they dwelt, and all their forts. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 20:14
  - type: text
    content: they took all the spoil and all the booty—of man and beast.
  - type: heading
    content: Return from the War
  '12':
  - type: text
    content: 'Then they brought the captives, the booty, and the spoil to Moses, to Eleazar the priest, and to the congregation of the children of Israel, to the camp in the plains of Moab by the Jordan, '
  - type: text
    content: across
  - type: text
    content: ' '
  - type: text
    content: from
  - type: text
    content: ' Jericho. '
  '13':
  - type: text
    content: 'And Moses, Eleazar the priest, and all the leaders of the congregation, went to meet them outside the camp. '
  '14':
  - type: text
    content: 'But Moses was angry with the officers of the army, '
  - type: text
    content: with
  - type: text
    content: ' the captains over thousands and captains over hundreds, who had come from the battle.'
  '15':
  - type: text
    content: 'And Moses said to them: “Have you kept '
  - type: note
    content: Deut. 20:14
  - type: text
    content: 'all the women alive? '
  '16':
  - type: text
    content: 'Look, '
  - type: note
    content: Num. 25:2
  - type: text
    content: 'these '
  - type: text
    content: women
  - type: text
    content: ' caused the children of Israel, through the '
  - type: note
    content: Num. 24:14; 2 Pet. 2:15; Rev. 2:14
  - type: text
    content: 'counsel of Balaam, to trespass against the '
  - type: heading
    content: Lord
  - type: text
    content: ' in the incident of Peor, and '
  - type: note
    content: Num. 25:9
  - type: text
    content: 'there was a plague among the congregation of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Now therefore, '
  - type: note
    content: Deut. 7:2; 20:16–18; Judg. 21:11
  - type: text
    content: 'kill every male among the little ones, and kill every woman who has known a man intimately. '
  '18':
  - type: text
    content: 'But keep alive '
  - type: note
    content: Deut. 21:10–14
  - type: text
    content: 'for yourselves all the young girls who have not known a man intimately. '
  '19':
  - type: text
    content: 'And as for you, '
  - type: note
    content: Num. 5:2
  - type: text
    content: 'remain outside the camp seven days; whoever has killed any person, and '
  - type: note
    content: Num. 19:11–22
  - type: text
    content: 'whoever has touched any slain, purify yourselves and your captives on the third day and on the seventh day. '
  '2':
  - type: note
    content: Num. 25:17
  - type: text
    content: '“Take vengeance on the Midianites for the children of Israel. Afterward you shall '
  - type: note
    content: Num. 27:12, 13
  - type: text
    content: be gathered to your people.”
  '20':
  - type: text
    content: 'Purify every garment, everything made of leather, everything woven of goats’ '
  - type: text
    content: hair,
  - type: text
    content: ' and everything made of wood.”'
  '21':
  - type: text
    content: 'Then Eleazar the priest said to the men of war who had gone to the battle, “This '
  - type: text
    content: is
  - type: text
    content: ' the ordinance of the law which the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses: '
  '22':
  - type: text
    content: 'Only the gold, the silver, the bronze, the iron, the tin, and the lead, '
  '23':
  - type: text
    content: 'everything that can endure fire, you shall put through the fire, and it shall be clean; and it shall be purified '
  - type: note
    content: Num. 19:9, 17
  - type: text
    content: 'with the water of purification. But all that cannot endure fire you shall put through water. '
  '24':
  - type: note
    content: Lev. 11:25
  - type: text
    content: And you shall wash your clothes on the seventh day and be clean, and afterward you may come into the camp.”
  - type: heading
    content: Division of the Plunder
  '25':
  - type: text
    content: 'Now the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '26':
  - type: text
    content: '“Count up the plunder that was taken—of man and beast—you and Eleazar the priest and the chief fathers of the congregation; '
  '27':
  - type: text
    content: 'and '
  - type: note
    content: Josh. 22:8; 1 Sam. 30:24
  - type: text
    content: 'divide the plunder into two parts, between those who took part in the war, who went out to battle, and all the congregation. '
  '28':
  - type: text
    content: 'And levy a tribute for the '
  - type: heading
    content: Lord
  - type: text
    content: ' on the men of war who went out to battle: '
  - type: note
    content: Num. 31:30, 47
  - type: text
    content: 'one of every five hundred of the persons, the cattle, the donkeys, and the sheep; '
  '29':
  - type: text
    content: 'take '
  - type: text
    content: it
  - type: text
    content: ' from their half, and '
  - type: note
    content: Deut. 18:1–5
  - type: text
    content: 'give '
  - type: text
    content: it
  - type: text
    content: ' to Eleazar the priest as a heave offering to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'So Moses spoke to the people, saying, “Arm some of yourselves for war, and let them go against the Midianites to take vengeance for the '
  - type: heading
    content: Lord
  - type: text
    content: ' on '
  - type: note
    content: Josh. 13:21
  - type: text
    content: 'Midian. '
  '30':
  - type: text
    content: 'And from the children of Israel’s half you shall take '
  - type: note
    content: Num. 31:42–47
  - type: text
    content: 'one of every fifty, drawn from the persons, the cattle, the donkeys, and the sheep, from all the livestock, and give them to the Levites '
  - type: note
    content: Num. 3:7, 8, 25, 31, 36; 18:3, 4
  - type: text
    content: 'who keep charge of the tabernacle of the '
  - type: heading
    content: Lord
  - type: text
    content: '.” '
  '31':
  - type: text
    content: 'So Moses and Eleazar the priest did as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '32':
  - type: text
    content: 'The booty remaining from the plunder, which the men of war had taken, was six hundred and seventy-five thousand sheep, '
  '33':
  - type: text
    content: 'seventy-two thousand cattle, '
  '34':
  - type: text
    content: 'sixty-one thousand donkeys, '
  '35':
  - type: text
    content: 'and thirty-two thousand persons in all, of women who had not known a man intimately. '
  '36':
  - type: text
    content: 'And the half, the portion for those who had gone out to war, was in number three hundred and thirty-seven thousand five hundred sheep; '
  '37':
  - type: text
    content: 'and the '
  - type: heading
    content: Lord
  - type: text
    content: '’s tribute of the sheep was six hundred and seventy-five. '
  '38':
  - type: text
    content: 'The cattle '
  - type: text
    content: were
  - type: text
    content: ' thirty-six thousand, of which the '
  - type: heading
    content: Lord
  - type: text
    content: '’s tribute '
  - type: text
    content: was
  - type: text
    content: ' seventy-two. '
  '39':
  - type: text
    content: 'The donkeys '
  - type: text
    content: were
  - type: text
    content: ' thirty thousand five hundred, of which the '
  - type: heading
    content: Lord
  - type: text
    content: '’s tribute '
  - type: text
    content: was
  - type: text
    content: ' sixty-one. '
  '4':
  - type: text
    content: A thousand from each tribe of all the tribes of Israel you shall send to the war.”
  '40':
  - type: text
    content: 'The persons '
  - type: text
    content: were
  - type: text
    content: ' sixteen thousand, of which the '
  - type: heading
    content: Lord
  - type: text
    content: '’s tribute '
  - type: text
    content: was
  - type: text
    content: ' thirty-two persons. '
  '41':
  - type: text
    content: 'So Moses gave the tribute '
  - type: text
    content: which
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: '’s heave offering to Eleazar the priest, '
  - type: note
    content: Num. 5:9, 10; 18:8, 19
  - type: text
    content: 'as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '42':
  - type: text
    content: 'And from the children of Israel’s half, which Moses separated from the men who fought— '
  '43':
  - type: text
    content: 'now the half belonging to the congregation was three hundred and thirty-seven thousand five hundred sheep, '
  '44':
  - type: text
    content: 'thirty-six thousand cattle, '
  '45':
  - type: text
    content: 'thirty thousand five hundred donkeys, '
  '46':
  - type: text
    content: 'and sixteen thousand persons— '
  '47':
  - type: text
    content: 'and '
  - type: note
    content: Num. 31:30
  - type: text
    content: 'from the children of Israel’s half Moses took one of every fifty, drawn from man and beast, and gave them to the Levites, who kept charge of the tabernacle of the '
  - type: heading
    content: Lord
  - type: text
    content: ', as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '48':
  - type: text
    content: 'Then the officers who '
  - type: text
    content: were
  - type: text
    content: ' over thousands of the army, the captains of thousands and captains of hundreds, came near to Moses; '
  '49':
  - type: text
    content: 'and they said to Moses, “Your servants have taken a count of the men of war who '
  - type: text
    content: are
  - type: text
    content: ' under our command, and not a man of us is missing. '
  '5':
  - type: text
    content: 'So there were recruited from the divisions of Israel one thousand from '
  - type: text
    content: each
  - type: text
    content: ' tribe, twelve thousand armed for war. '
  '50':
  - type: text
    content: 'Therefore we have brought an offering for the '
  - type: heading
    content: Lord
  - type: text
    content: ', what every man found of ornaments of gold: armlets and bracelets and signet rings and earrings and necklaces, '
  - type: note
    content: Ex. 30:12–16
  - type: text
    content: 'to make atonement for ourselves before the '
  - type: heading
    content: Lord
  - type: text
    content: '.” '
  '51':
  - type: text
    content: 'So Moses and Eleazar the priest received the gold from them, all the fashioned ornaments. '
  '52':
  - type: text
    content: 'And all the gold of the offering that they offered to the '
  - type: heading
    content: Lord
  - type: text
    content: ', from the captains of thousands and captains of hundreds, was sixteen thousand seven hundred and fifty shekels. '
  '53':
  - type: note
    content: Num. 31:32; Deut. 20:14
  - type: text
    content: '(The men of war had taken spoil, every man for himself.) '
  '54':
  - type: text
    content: 'And Moses and Eleazar the priest received the gold from the captains of thousands and of hundreds, and brought it into the tabernacle of meeting '
  - type: note
    content: Ex. 30:16
  - type: text
    content: 'as a memorial for the children of Israel before the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: 'Then Moses sent them to the war, one thousand from '
  - type: text
    content: each
  - type: text
    content: ' tribe; he sent them to the war with Phinehas the son of Eleazar the priest, with the holy articles and '
  - type: note
    content: Num. 10:9
  - type: text
    content: 'the signal trumpets in his hand. '
  '7':
  - type: text
    content: 'And they warred against the Midianites, just as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses, and '
  - type: note
    content: Deut. 20:13; Judg. 21:11; 1 Sam. 27:9; 1 Kin. 11:15, 16
  - type: text
    content: 'they killed all the '
  - type: note
    content: Gen. 34:25
  - type: text
    content: 'males. '
  '8':
  - type: text
    content: 'They killed the kings of Midian with '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: rest
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' those who were killed—'
  - type: note
    content: Josh. 13:21
  - type: text
    content: 'Evi, Rekem, '
  - type: note
    content: Num. 25:15
  - type: text
    content: 'Zur, Hur, and Reba, the five kings of Midian. '
  - type: note
    content: Num. 31:16; Josh. 13:22
  - type: text
    content: Balaam the son of Beor they also killed with the sword.
  '9':
  - type: text
    content: 'And the children of Israel took the women of Midian captive, with their little ones, and took as spoil all their cattle, all their flocks, and all their goods. '
