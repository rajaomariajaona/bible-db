document_id: DAN.11,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“Also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 9:1
      marker-yv: yv-n
    - type: text
      text: 'in the first year of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 5:31
      marker-yv: yv-n
    - type: text
      text: 'Darius the Mede, I, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' I, stood up to confirm and strengthen him.) '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'However his sons shall stir up strife, and assemble a multitude of great forces; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' shall certainly come '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 8:8; Jer. 46:7, 8; 51:42; Dan. 9:26; 11:26, 40
      marker-yv: yv-n
    - type: text
      text: 'and overwhelm and pass through; then he shall return '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 11:7
      marker-yv: yv-n
    - type: text
      text: to his fortress and stir up strife.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“And the king of the South shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 16:14
      marker-yv: yv-n
    - type: text
      text: 'moved with rage, and go out and fight with him, with the king of the North, who shall muster a great multitude; but the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 33:10, 16)
      marker-yv: yv-n
    - type: text
      text: 'multitude shall be given into the hand of his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: enemy.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When he has taken away the multitude, his heart will be lifted up; and he will cast down tens of thousands, but he will not prevail. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: For the king of the North will return and muster a multitude greater than the former, and shall certainly come at the end of some years with a great army and much equipment.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“Now in those times many shall rise up against the king of the South. Also, violent men of your people shall exalt themselves in fulfillment of the vision, but they shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:13
      marker-yv: yv-n
    - type: text
      text: 'fall. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So the king of the North shall come and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 6:6; Ezek. 4:2; 17:17
      marker-yv: yv-n
    - type: text
      text: 'build a siege mound, and take a fortified city; and the forces of the South shall not withstand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him.
    - type: text
      text: ' Even his choice troops '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' no strength to resist. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But he who comes against him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 8:4, 7
      marker-yv: yv-n
    - type: text
      text: 'shall do according to his own will, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 1:5
      marker-yv: yv-n
    - type: text
      text: no one shall stand against him. He shall stand in the Glorious Land with destruction in his power.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“He shall also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 12:17; 2 Chr. 20:3; Ezek. 4:3, 7
      marker-yv: yv-n
    - type: text
      text: 'set his face to enter with the strength of his whole kingdom, and upright ones with him; thus shall he do. And he shall give him the daughter of women to destroy it; but she shall not stand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 9:26
      marker-yv: yv-n
    - type: text
      text: 'or be for him. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'After this he shall turn his face to the coastlands, and shall take many. But a ruler shall bring the reproach against them to an end; and with the reproach removed, he shall turn back on him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then he shall turn his face toward the fortress of his own land; but he shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 27:2; Jer. 46:6
      marker-yv: yv-n
    - type: text
      text: 'stumble and fall, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 20:8; Ps. 37:36; Ezek. 26:21
      marker-yv: yv-n
    - type: text
      text: and not be found.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And now I will tell you the truth: Behold, three more kings will arise in Persia, and the fourth shall be far richer than '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' all; by his strength, through his riches, he shall stir up all against the realm of Greece. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“There shall arise in his place one who imposes taxes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on
    - type: text
      text: ' the glorious kingdom; but within a few days he shall be destroyed, but not in anger or in battle. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And in his place '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 7:8
      marker-yv: yv-n
    - type: text
      text: 'shall arise a vile person, to whom they will not give the honor of royalty; but he shall come in peaceably, and seize the kingdom by intrigue. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'With the force of a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 9:26
      marker-yv: yv-n
    - type: text
      text: 'flood they shall be swept away from before him and be broken, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 8:10, 11
      marker-yv: yv-n
    - type: text
      text: 'and also the prince of the covenant. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And after the league '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: made
    - type: text
      text: ' with him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 8:25
      marker-yv: yv-n
    - type: text
      text: 'he shall act deceitfully, for he shall come up and become strong with a small '
    - type: usfm
      marker: it
      children:
      - type: text
        text: number
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' people. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'He shall enter peaceably, even into the richest places of the province; and he shall do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' his fathers have not done, nor his forefathers: he shall disperse among them the plunder, spoil, and riches; and he shall devise his plans against the strongholds, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' for a time.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“He shall stir up his power and his courage against the king of the South with a great army. And the king of the South shall be stirred up to battle with a very great and mighty army; but he shall not stand, for they shall devise plans against him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Yes, those who eat of the portion of his delicacies shall destroy him; his army shall be swept away, and many shall fall down slain. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Both these kings’ hearts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' bent on evil, and they shall speak lies at the same table; but it shall not prosper, for the end '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' still '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' at the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 8:19; Hab. 2:3
      marker-yv: yv-n
    - type: text
      text: 'appointed time. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'While returning to his land with great riches, his heart shall be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: moved
    - type: text
      text: ' against the holy covenant; so he shall do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: damage
    - type: text
      text: ' and return to his own land.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Northern King’s Blasphemies
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '“At the appointed time he shall return and go toward the south; but it shall not be like the former or the latter. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 7:6; 8:5
      marker-yv: yv-n
    - type: text
      text: 'a mighty king shall arise, who shall rule with great dominion, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 8:4; 11:16, 36
      marker-yv: yv-n
    - type: text
      text: 'do according to his will. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 10:4; Num. 24:24; Is. 23:1, 12; Jer. 2:10
      marker-yv: yv-n
    - type: text
      text: 'For ships from Cyprus shall come against him; therefore he shall be grieved, and return in rage against the holy covenant, and do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: damage.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So he shall return and show regard for those who forsake the holy covenant. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And forces shall be mustered by him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 8:11–13; 12:11
      marker-yv: yv-n
    - type: text
      text: 'and they shall defile the sanctuary fortress; then they shall take away the daily '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sacrifices,
    - type: text
      text: ' and place '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' the abomination of desolation. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Those who do wickedly against the covenant he shall corrupt with flattery; but the people who know their God shall be strong, and carry out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: great
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: exploits.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And those of the people who understand shall instruct many; yet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: many
    - type: text
      text: ' days they shall fall by sword and flame, by captivity and plundering. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Now when they fall, they shall be aided with a little help; but many shall join with them by intrigue. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of those of understanding shall fall, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 8:16; Prov. 17:3); Dan. 12:10; Zech. 13:9; Mal. 3:2, 3
      marker-yv: yv-n
    - type: text
      text: 'to refine them, purify '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
    - type: text
      text: ' and make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' white, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: until
    - type: text
      text: ' the time of the end; because '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' still for the appointed time.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: '“Then the king shall do according to his own will: he shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 7:8, 25
      marker-yv: yv-n
    - type: text
      text: 'exalt and magnify himself above every god, shall speak blasphemies against the God of gods, and shall prosper till the wrath has been accomplished; for what has been determined shall be done. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'He shall regard neither the God of his fathers nor the desire of women, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 14:13; 2 Thess. 2:4
      marker-yv: yv-n
    - type: text
      text: 'nor regard any god; for he shall exalt himself above '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' all. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'But in their place he shall honor a god of fortresses; and a god which his fathers did not know he shall honor with gold and silver, with precious stones and pleasant things. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Thus he shall act against the strongest fortresses with a foreign god, which he shall acknowledge, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' advance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: its
    - type: text
      text: ' glory; and he shall cause them to rule over many, and divide the land for gain.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Northern King’s Conquests
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And when he has arisen, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 49:36; Ezek. 37:9; Dan. 7:2; 8:8; Zech. 2:6; Rev. 7:1
      marker-yv: yv-n
    - type: text
      text: 'his kingdom shall be broken up and divided toward the four winds of heaven, but not among his posterity '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 8:22
      marker-yv: yv-n
    - type: text
      text: nor according to his dominion with which he ruled; for his kingdom shall be uprooted, even for others besides these.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warring Kings of North and South
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: '“At the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 11:27, 35; 12:4, 9
      marker-yv: yv-n
    - type: text
      text: 'time of the end the king of the South shall attack him; and the king of the North shall come against him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 21:1
      marker-yv: yv-n
    - type: text
      text: 'like a whirlwind, with chariots, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 38:4; Rev. 9:16
      marker-yv: yv-n
    - type: text
      text: 'horsemen, and with many ships; and he shall enter the countries, overwhelm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
    - type: text
      text: ' and pass through. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'He shall also enter the Glorious Land, and many '
    - type: usfm
      marker: it
      children:
      - type: text
        text: countries
    - type: text
      text: ' shall be overthrown; but these shall escape from his hand: '
