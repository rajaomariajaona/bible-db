document_id: JOS.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Cities of Refuge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' also spoke to Joshua, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Speak to the children of Israel, saying: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 21:13; Num. 35:6–34; Deut. 19:2, 9
    marker-yv: yv-n
  - type: text
    text: '‘Appoint for yourselves cities of refuge, of which I spoke to you through Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'that the slayer who kills a person accidentally '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' unintentionally may flee there; and they shall be your refuge from the avenger of blood. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when he flees to one of those cities, and stands at the entrance of the gate of the city, and declares his case in the hearing of the elders of that city, they shall take him into the city as one of them, and give him a place, that he may dwell among them. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 35:12
    marker-yv: yv-n
  - type: text
    text: 'Then if the avenger of blood pursues him, they shall not deliver the slayer into his hand, because he struck his neighbor unintentionally, but did not hate him beforehand. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he shall dwell in that city '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 35:12, 24, 25
    marker-yv: yv-n
  - type: text
    text: 'until he stands before the congregation for judgment, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' until the death of the one who is high priest in those days. Then the slayer may return and come to his own city and his own house, to the city from which he fled.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So they appointed '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 21:32; 1 Chr. 6:76
    marker-yv: yv-n
  - type: text
    text: 'Kedesh in Galilee, in the mountains of Naphtali, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 21:21; 2 Chr. 10:1
    marker-yv: yv-n
  - type: text
    text: 'Shechem in the mountains of Ephraim, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 14:15; 21:11, 13
    marker-yv: yv-n
  - type: text
    text: 'Kirjath Arba (which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' Hebron) in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 1:39
    marker-yv: yv-n
  - type: text
    text: 'the mountains of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And on the other side of the Jordan, by Jericho eastward, they assigned '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 4:43; Josh. 21:36; 1 Chr. 6:78
    marker-yv: yv-n
  - type: text
    text: 'Bezer in the wilderness on the plain, from the tribe of Reuben, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 21:38; 1 Kin. 22:3
    marker-yv: yv-n
  - type: text
    text: 'Ramoth in Gilead, from the tribe of Gad, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 21:27
    marker-yv: yv-n
  - type: text
    text: 'Golan in Bashan, from the tribe of Manasseh. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 35:15
    marker-yv: yv-n
  - type: text
    text: 'These were the cities appointed for all the children of Israel and for the stranger who dwelt among them, that whoever killed a person accidentally might flee there, and not die by the hand of the avenger of blood '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 20:6
    marker-yv: yv-n
  - type: text
    text: until he stood before the congregation.
