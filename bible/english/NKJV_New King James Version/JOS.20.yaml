document_id: JOS.20,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Cities of Refuge
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' also spoke to Joshua, saying, '
  '2':
  - type: text
    content: '“Speak to the children of Israel, saying: '
  - type: note
    content: Ex. 21:13; Num. 35:6–34; Deut. 19:2, 9
  - type: text
    content: '‘Appoint for yourselves cities of refuge, of which I spoke to you through Moses, '
  '3':
  - type: text
    content: 'that the slayer who kills a person accidentally '
  - type: text
    content: or
  - type: text
    content: ' unintentionally may flee there; and they shall be your refuge from the avenger of blood. '
  '4':
  - type: text
    content: 'And when he flees to one of those cities, and stands at the entrance of the gate of the city, and declares his case in the hearing of the elders of that city, they shall take him into the city as one of them, and give him a place, that he may dwell among them. '
  '5':
  - type: note
    content: Num. 35:12
  - type: text
    content: 'Then if the avenger of blood pursues him, they shall not deliver the slayer into his hand, because he struck his neighbor unintentionally, but did not hate him beforehand. '
  '6':
  - type: text
    content: 'And he shall dwell in that city '
  - type: note
    content: Num. 35:12, 24, 25
  - type: text
    content: 'until he stands before the congregation for judgment, '
  - type: text
    content: and
  - type: text
    content: ' until the death of the one who is high priest in those days. Then the slayer may return and come to his own city and his own house, to the city from which he fled.’ ”'
  '7':
  - type: text
    content: 'So they appointed '
  - type: note
    content: Josh. 21:32; 1 Chr. 6:76
  - type: text
    content: 'Kedesh in Galilee, in the mountains of Naphtali, '
  - type: note
    content: Josh. 21:21; 2 Chr. 10:1
  - type: text
    content: 'Shechem in the mountains of Ephraim, and '
  - type: note
    content: Josh. 14:15; 21:11, 13
  - type: text
    content: 'Kirjath Arba (which '
  - type: text
    content: is
  - type: text
    content: ' Hebron) in '
  - type: note
    content: Luke 1:39
  - type: text
    content: 'the mountains of Judah. '
  '8':
  - type: text
    content: 'And on the other side of the Jordan, by Jericho eastward, they assigned '
  - type: note
    content: Deut. 4:43; Josh. 21:36; 1 Chr. 6:78
  - type: text
    content: 'Bezer in the wilderness on the plain, from the tribe of Reuben, '
  - type: note
    content: Josh. 21:38; 1 Kin. 22:3
  - type: text
    content: 'Ramoth in Gilead, from the tribe of Gad, and '
  - type: note
    content: Josh. 21:27
  - type: text
    content: 'Golan in Bashan, from the tribe of Manasseh. '
  '9':
  - type: note
    content: Num. 35:15
  - type: text
    content: 'These were the cities appointed for all the children of Israel and for the stranger who dwelt among them, that whoever killed a person accidentally might flee there, and not die by the hand of the avenger of blood '
  - type: note
    content: Josh. 20:6
  - type: text
    content: until he stood before the congregation.
