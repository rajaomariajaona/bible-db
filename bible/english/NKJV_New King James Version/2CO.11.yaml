verses:
  '1':
  - type: heading
    content: Concern for Their Faithfulness
  - type: text
    content: 'Oh, that you would bear with me in a little '
  - type: note
    content: Matt. 17:17; 2 Cor. 11:4, 16, 19
  - type: text
    content: 'folly—and indeed you do bear with me. '
  '10':
  - type: note
    content: Rom. 1:9; 9:1; 2 Cor. 1:23; (Gal. 2:20)
  - type: text
    content: 'As the truth of Christ is in me, '
  - type: note
    content: 1 Cor. 9:15
  - type: text
    content: 'no one shall stop me from this boasting in the regions of Achaia. '
  '11':
  - type: text
    content: 'Why? '
  - type: note
    content: 2 Cor. 6:11; 12:15
  - type: text
    content: Because I do not love you? God knows!
  '12':
  - type: text
    content: 'But what I do, I will also continue to do, '
  - type: note
    content: 1 Cor. 9:12
  - type: text
    content: 'that I may cut off the opportunity from those who desire an opportunity to be regarded just as we are in the things of which they boast. '
  '13':
  - type: text
    content: 'For such '
  - type: note
    content: Acts 15:24; Rom. 16:18; Gal. 1:7; Phil. 1:15; 2 Pet. 2:1; Rev. 2:2
  - type: text
    content: are
  - type: text
    content: ' false apostles, '
  - type: note
    content: Phil. 3:2; Titus 1:10
  - type: text
    content: 'deceitful workers, transforming themselves into apostles of Christ. '
  '14':
  - type: text
    content: 'And no wonder! For Satan himself transforms himself into '
  - type: note
    content: Gal. 1:8
  - type: text
    content: 'an angel of light. '
  '15':
  - type: text
    content: 'Therefore it is no great thing if his ministers also transform themselves into ministers of righteousness, '
  - type: note
    content: (Phil. 3:19)
  - type: text
    content: whose end will be according to their works.
  - type: heading
    content: Reluctant Boasting
  '16':
  - type: text
    content: 'I say again, let no one think me a fool. If otherwise, at least receive me as a fool, that I also may boast a little. '
  '17':
  - type: text
    content: 'What I speak, '
  - type: note
    content: 1 Cor. 7:6
  - type: text
    content: 'I speak not according to the Lord, but as it were, foolishly, in this confidence of boasting. '
  '18':
  - type: text
    content: 'Seeing that many boast according to the flesh, I also will boast. '
  '19':
  - type: text
    content: 'For you put up with fools gladly, '
  - type: note
    content: 1 Cor. 4:10
  - type: text
    content: 'since you '
  - type: text
    content: yourselves
  - type: text
    content: ' are wise! '
  '2':
  - type: text
    content: 'For I am '
  - type: note
    content: Gal. 4:17
  - type: text
    content: 'jealous for you with godly jealousy. For '
  - type: note
    content: Hos. 2:19; (Eph. 5:26)
  - type: text
    content: 'I have betrothed you to one husband, '
  - type: note
    content: Col. 1:28
  - type: text
    content: 'that I may present '
  - type: text
    content: you
  - type: text
    content: ' '
  - type: note
    content: Lev. 21:13
  - type: text
    content: 'as a chaste virgin to Christ. '
  '20':
  - type: text
    content: 'For you put up with it '
  - type: note
    content: 2 Cor. 1:24; (Gal. 2:4; 4:3, 9; 5:1)
  - type: text
    content: 'if one brings you into bondage, if one devours '
  - type: text
    content: you,
  - type: text
    content: ' if one takes '
  - type: text
    content: from
  - type: text
    content: ' '
  - type: text
    content: you,
  - type: text
    content: ' if one exalts himself, if one strikes you on the face. '
  '21':
  - type: text
    content: 'To '
  - type: text
    content: our
  - type: text
    content: ' shame '
  - type: note
    content: 2 Cor. 10:10
  - type: text
    content: 'I say that we were too weak for that! But '
  - type: note
    content: Phil. 3:4
  - type: text
    content: in whatever anyone is bold—I speak foolishly—I am bold also.
  - type: heading
    content: Suffering for Christ
