  - type: text
    content: 'in labors more abundant, '
  - type: note
    content: Acts 9:16
  - type: text
    content: 'in stripes above measure, in prisons more frequently, '
  - type: note
    content: 1 Cor. 15:30
  - type: text
    content: 'in deaths often. '
  '24':
  - type: text
    content: 'From the Jews five times I received '
  - type: note
