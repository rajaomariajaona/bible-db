  - type: text
    content: 'in knowledge. But '
  - type: note
    content: (2 Cor. 12:12)
  - type: text
    content: we have been thoroughly manifested among you in all things.
  '7':
  - type: text
    content: 'Did I commit sin in humbling myself that you might be exalted, because I preached the gospel of God to you '
  - type: note
    content: Acts 18:3; 1 Cor. 9:18; 2 Cor. 12:13
  - type: text
    content: 'free of charge? '
  '8':
  - type: text
    content: 'I robbed other churches, taking wages '
  - type: text
    content: from
  - type: text
    content: ' '
  - type: text
    content: them
  - type: text
    content: ' to minister to you. '
  '9':
  - type: text
    content: 'And when I was present with you, and in need, '
  - type: note
    content: Acts 20:33
  - type: text
    content: 'I was a burden to no one, for what I lacked '
  - type: note
    content: Phil. 4:10
  - type: text
    content: 'the brethren who came from Macedonia supplied. And in everything I kept myself from being burdensome to you, and so I will keep '
  - type: text
