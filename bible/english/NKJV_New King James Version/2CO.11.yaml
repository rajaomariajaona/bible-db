  - type: text
    content: 'Are they '
  - type: note
    content: Acts 22:3; Rom. 11:1; Phil. 3:4–6
  - type: text
    content: 'Hebrews? So '
  - type: text
    content: am
  - type: text
    content: ' I. Are they Israelites? So '
  - type: text
    content: am
  - type: text
    content: ' I. Are they the seed of Abraham? So '
  - type: text
    content: am
  - type: text
    content: ' I. '
