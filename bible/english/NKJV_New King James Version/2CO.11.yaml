document_id: 2CO.11,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Concern for Their Faithfulness
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Oh, that you would bear with me in a little '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 17:17; 2 Cor. 11:4, 16, 19
      marker-yv: yv-n
    - type: text
      text: 'folly—and indeed you do bear with me. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:9; 9:1; 2 Cor. 1:23; (Gal. 2:20)
      marker-yv: yv-n
    - type: text
      text: 'As the truth of Christ is in me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 9:15
      marker-yv: yv-n
    - type: text
      text: 'no one shall stop me from this boasting in the regions of Achaia. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Why? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 6:11; 12:15
      marker-yv: yv-n
    - type: text
      text: Because I do not love you? God knows!
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But what I do, I will also continue to do, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 9:12
      marker-yv: yv-n
    - type: text
      text: 'that I may cut off the opportunity from those who desire an opportunity to be regarded just as we are in the things of which they boast. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For such '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 15:24; Rom. 16:18; Gal. 1:7; Phil. 1:15; 2 Pet. 2:1; Rev. 2:2
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' false apostles, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 3:2; Titus 1:10
      marker-yv: yv-n
    - type: text
      text: 'deceitful workers, transforming themselves into apostles of Christ. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And no wonder! For Satan himself transforms himself into '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 1:8
      marker-yv: yv-n
    - type: text
      text: 'an angel of light. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Therefore it is no great thing if his ministers also transform themselves into ministers of righteousness, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Phil. 3:19)
      marker-yv: yv-n
    - type: text
      text: whose end will be according to their works.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reluctant Boasting
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'I say again, let no one think me a fool. If otherwise, at least receive me as a fool, that I also may boast a little. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'What I speak, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 7:6
      marker-yv: yv-n
    - type: text
      text: 'I speak not according to the Lord, but as it were, foolishly, in this confidence of boasting. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Seeing that many boast according to the flesh, I also will boast. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For you put up with fools gladly, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 4:10
      marker-yv: yv-n
    - type: text
      text: 'since you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yourselves
    - type: text
      text: ' are wise! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For I am '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 4:17
      marker-yv: yv-n
    - type: text
      text: 'jealous for you with godly jealousy. For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 2:19; (Eph. 5:26)
      marker-yv: yv-n
    - type: text
      text: 'I have betrothed you to one husband, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 1:28
      marker-yv: yv-n
    - type: text
      text: 'that I may present '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 21:13
      marker-yv: yv-n
    - type: text
      text: 'as a chaste virgin to Christ. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For you put up with it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 1:24; (Gal. 2:4; 4:3, 9; 5:1)
      marker-yv: yv-n
    - type: text
      text: 'if one brings you into bondage, if one devours '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you,
    - type: text
      text: ' if one takes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you,
    - type: text
      text: ' if one exalts himself, if one strikes you on the face. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'To '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' shame '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 10:10
      marker-yv: yv-n
    - type: text
      text: 'I say that we were too weak for that! But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 3:4
      marker-yv: yv-n
    - type: text
      text: in whatever anyone is bold—I speak foolishly—I am bold also.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Suffering for Christ
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Are they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 22:3; Rom. 11:1; Phil. 3:4–6
      marker-yv: yv-n
    - type: text
      text: 'Hebrews? So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' I. Are they Israelites? So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' I. Are they the seed of Abraham? So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' I. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Are they ministers of Christ?—I speak as a fool—I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' more: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:10
      marker-yv: yv-n
    - type: text
      text: 'in labors more abundant, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:16
      marker-yv: yv-n
    - type: text
      text: 'in stripes above measure, in prisons more frequently, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:30
      marker-yv: yv-n
    - type: text
      text: 'in deaths often. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'From the Jews five times I received '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 25:3
      marker-yv: yv-n
    - type: text
      text: 'forty '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 6:5
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: stripes
    - type: text
      text: ' minus one. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Three times I was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 16:22, 23; 21:32
      marker-yv: yv-n
    - type: text
      text: 'beaten with rods; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 14:5, 19
      marker-yv: yv-n
    - type: text
      text: 'once I was stoned; three times I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 27:1–44
      marker-yv: yv-n
    - type: text
      text: 'was shipwrecked; a night and a day I have been in the deep; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' journeys often, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' perils of waters, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' perils of robbers, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:23, 24; 13:45, 50; 17:5, 13; 1 Thess. 2:15
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' perils of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' countrymen, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 14:5, 19; 19:23; 27:42
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' perils of the Gentiles, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' perils in the city, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' perils in the wilderness, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' perils in the sea, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' perils among false brethren; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'in weariness and toil, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:31
      marker-yv: yv-n
    - type: text
      text: 'in sleeplessness often, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 4:11; Phil. 4:12
      marker-yv: yv-n
    - type: text
      text: 'in hunger and thirst, in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:9; 13:2, 3; 14:23
      marker-yv: yv-n
    - type: text
      text: 'fastings often, in cold and nakedness— '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'besides the other things, what comes upon me daily: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:18; (Rom. 1:14); 2 Cor. 7:12; 12:20; Gal. 4:11; 1 Thess. 3:10
      marker-yv: yv-n
    - type: text
      text: 'my deep concern for all the churches. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 8:9, 13; 9:22)
      marker-yv: yv-n
    - type: text
      text: 'Who is weak, and I am not weak? Who is made to stumble, and I do not burn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: indignation?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But I fear, lest somehow, as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 3:4, 13; John 8:44; 1 Thess. 3:5; 1 Tim. 2:14; (Rev. 12:9, 15)
      marker-yv: yv-n
    - type: text
      text: 'the serpent deceived Eve by his craftiness, so your minds '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:24
      marker-yv: yv-n
    - type: text
      text: 'may be corrupted from the simplicity that is in Christ. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'If I must boast, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 12:5, 9, 10)
      marker-yv: yv-n
    - type: text
      text: 'I will boast in the things which concern my infirmity. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:9; Gal. 1:20; 1 Thess. 2:5
      marker-yv: yv-n
    - type: text
      text: 'The God and Father of our Lord Jesus Christ, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 9:5
      marker-yv: yv-n
    - type: text
      text: 'who is blessed forever, knows that I am not lying. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:19–25
      marker-yv: yv-n
    - type: text
      text: 'In Damascus the governor, under Aretas the king, was guarding the city of the Damascenes with a garrison, desiring to arrest me; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: but I was let down in a basket through a window in the wall, and escaped from his hands.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For if he who comes preaches another Jesus whom we have not preached, or '
    - type: usfm
      marker: it
      children:
      - type: text
        text: if
    - type: text
      text: ' you receive a different spirit which you have not received, or a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 1:6–8
      marker-yv: yv-n
    - type: text
      text: different gospel which you have not accepted—you may well put up with it!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul and False Apostles
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For I consider that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 15:10); 2 Cor. 12:11; Gal. 2:6
      marker-yv: yv-n
    - type: text
      text: 'I am not at all inferior to the most eminent apostles. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Even though '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 1:17)
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' untrained in speech, yet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 12:8; Eph. 3:4)
      marker-yv: yv-n
    - type: text
      text: 'in knowledge. But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 12:12)
      marker-yv: yv-n
    - type: text
      text: we have been thoroughly manifested among you in all things.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Did I commit sin in humbling myself that you might be exalted, because I preached the gospel of God to you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:3; 1 Cor. 9:18; 2 Cor. 12:13
      marker-yv: yv-n
    - type: text
      text: 'free of charge? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I robbed other churches, taking wages '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to minister to you. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And when I was present with you, and in need, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:33
      marker-yv: yv-n
    - type: text
      text: 'I was a burden to no one, for what I lacked '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 4:10
      marker-yv: yv-n
    - type: text
      text: 'the brethren who came from Macedonia supplied. And in everything I kept myself from being burdensome to you, and so I will keep '
    - type: usfm
