  '27':
  - type: text
    content: 'in weariness and toil, '
  - type: note
    content: Acts 20:31
  - type: text
    content: 'in sleeplessness often, '
  - type: note
    content: 1 Cor. 4:11; Phil. 4:12
  - type: text
    content: 'in hunger and thirst, in '
  - type: note
    content: Acts 9:9; 13:2, 3; 14:23
  - type: text
    content: 'fastings often, in cold and nakedness— '
  '28':
  - type: text
    content: 'besides the other things, what comes upon me daily: '
  - type: note
    content: Acts 20:18; (Rom. 1:14); 2 Cor. 7:12; 12:20; Gal. 4:11; 1 Thess. 3:10
  - type: text
    content: 'my deep concern for all the churches. '
  '29':
  - type: note
    content: (1 Cor. 8:9, 13; 9:22)
  - type: text
    content: 'Who is weak, and I am not weak? Who is made to stumble, and I do not burn '
  - type: text
    content: with
  - type: text
    content: ' '
  - type: text
    content: indignation?
  '3':
  - type: text
    content: 'But I fear, lest somehow, as '
  - type: note
    content: Gen. 3:4, 13; John 8:44; 1 Thess. 3:5; 1 Tim. 2:14; (Rev. 12:9, 15)
  - type: text
    content: 'the serpent deceived Eve by his craftiness, so your minds '
  - type: note
    content: Eph. 6:24
  - type: text
    content: 'may be corrupted from the simplicity that is in Christ. '
  '30':
  - type: text
    content: 'If I must boast, '
  - type: note
    content: (2 Cor. 12:5, 9, 10)
  - type: text
    content: 'I will boast in the things which concern my infirmity. '
  '31':
  - type: note
    content: Rom. 1:9; Gal. 1:20; 1 Thess. 2:5
  - type: text
    content: 'The God and Father of our Lord Jesus Christ, '
  - type: note
    content: Rom. 9:5
  - type: text
    content: 'who is blessed forever, knows that I am not lying. '
  '32':
  - type: note
    content: Acts 9:19–25
  - type: text
    content: 'In Damascus the governor, under Aretas the king, was guarding the city of the Damascenes with a garrison, desiring to arrest me; '
  '33':
  - type: text
    content: but I was let down in a basket through a window in the wall, and escaped from his hands.
  '4':
  - type: text
    content: 'For if he who comes preaches another Jesus whom we have not preached, or '
  - type: text
    content: if
  - type: text
    content: ' you receive a different spirit which you have not received, or a '
  - type: note
    content: Gal. 1:6–8
  - type: text
    content: different gospel which you have not accepted—you may well put up with it!
  - type: heading
    content: Paul and False Apostles
  '5':
  - type: text
    content: 'For I consider that '
  - type: note
    content: (1 Cor. 15:10); 2 Cor. 12:11; Gal. 2:6
  - type: text
    content: 'I am not at all inferior to the most eminent apostles. '
  '6':
  - type: text
