document_id: 1CH.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ammonites and Syrians Defeated
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: It
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 11:1; 2 Sam. 10:1–19
    marker-yv: yv-n
  - type: text
    text: ' happened after this that Nahash the king of the people of Ammon died, and his son reigned in his place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Then David said, “I will show kindness to Hanun the son of Nahash, because his father showed kindness to me.” So David sent messengers to comfort him concerning his father. And David’s servants came to Hanun in the land of the people of Ammon to comfort him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And the princes of the people of Ammon said to Hanun, “Do you think that David really honors your father because he has sent comforters to you? Did his servants not come to you to search and to overthrow and to spy out the land?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Therefore Hanun took David’s servants, shaved them, and cut off their garments in the middle, at their '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 20:4
    marker-yv: yv-n
  - type: text
    text: 'buttocks, and sent them away. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' went and told David about the men; and he sent to meet them, because the men were greatly ashamed. And the king said, “Wait at Jericho until your beards have grown, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: then
  - type: text
    text: ' return.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When the people of Ammon saw that they had made themselves repulsive to David, Hanun and the people of Ammon sent a thousand talents of silver to hire for themselves chariots and horsemen from Mesopotamia, from Syrian Maacah, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 18:5, 9
    marker-yv: yv-n
  - type: text
    text: 'and from Zobah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So they hired for themselves thirty-two thousand chariots, with the king of Maacah and his people, who came and encamped before Medeba. Also the people of Ammon gathered together from their cities, and came to battle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now when David heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it,
  - type: text
    text: ' he sent Joab and all the army of the mighty men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then the people of Ammon came out and put themselves in battle array before the gate of the city, and the kings who had come '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' by themselves in the field.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When Joab saw that the battle line was against him before and behind, he chose some of Israel’s best and put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' in battle array against the Syrians. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the rest of the people he put under the command of Abishai his brother, and they set '
  - type: usfm
    marker: it
    children:
    - type: text
      text: themselves
  - type: text
    text: ' in battle array against the people of Ammon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then he said, “If the Syrians are too strong for me, then you shall help me; but if the people of Ammon are too strong for you, then I will help you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Be of good courage, and let us be strong for our people and for the cities of our God. And may the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' do '
  - type: usfm
    marker: it
    children:
    - type: text
      text: what
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' good in His sight.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So Joab and the people who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' with him drew near for the battle against the Syrians, and they fled before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: When the people of Ammon saw that the Syrians were fleeing, they also fled before Abishai his brother, and entered the city. So Joab went to Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now when the Syrians saw that they had been defeated by Israel, they sent messengers and brought the Syrians who were beyond the River, and Shophach the commander of Hadadezer’s army '
  - type: usfm
    marker: it
    children:
    - type: text
      text: went
  - type: text
    text: ' before them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When it was told David, he gathered all Israel, crossed over the Jordan and came upon them, and set up in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: battle
  - type: text
    text: ' array against them. So when David had set up in battle array against the Syrians, they fought with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the Syrians fled before Israel; and David killed seven thousand charioteers and forty thousand foot soldiers of the Syrians, and killed Shophach the commander of the army. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And when the servants of Hadadezer saw that they were defeated by Israel, they made peace with David and became his servants. So the Syrians were not willing to help the people of Ammon anymore.
