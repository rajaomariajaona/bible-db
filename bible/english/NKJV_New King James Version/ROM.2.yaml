      marker: x
      children:
      - type: text
        text: Rom. 2:7; Heb. 2:7; (1 Pet. 1:7)
      marker-yv: yv-n
    - type: text
      text: 'but glory, honor, and peace to everyone who works what is good, to the Jew first and also to the Greek. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
