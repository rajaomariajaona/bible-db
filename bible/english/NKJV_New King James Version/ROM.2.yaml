  - type: heading
    content: God’s Righteous Judgment
  - type: text
    content: 'Therefore you are '
  - type: note
    content: (Rom. 1:20)
  - type: text
    content: 'inexcusable, O man, whoever you are who judge, '
  - type: note
    content: 2 Sam. 12:5–7; (Matt. 7:1–5; Luke 6:37); John 8:9; Rom. 14:22
  - type: text
    content: 'for in whatever you judge another you condemn yourself; for you who judge practice the same things. '
  '10':
  - type: note
    content: Rom. 2:7; Heb. 2:7; (1 Pet. 1:7)
  - type: text
    content: 'but glory, honor, and peace to everyone who works what is good, to the Jew first and also to the Greek. '
