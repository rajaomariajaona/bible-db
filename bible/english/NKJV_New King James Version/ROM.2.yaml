        text: Ps. 50:16; Matt. 23:3
      marker-yv: yv-n
    - type: text
      text: 'You, therefore, who teach another, do you not teach yourself? You who preach that a man should not steal, do you steal? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You who say, “Do not commit adultery,” do you commit adultery? You who abhor idols, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 3:8
      marker-yv: yv-n
    - type: text
