  - type: text
    content: 'For '
  - type: note
    content: Deut. 10:17; (Job 34:19); Acts 10:34; (Eph. 6:9)
  - type: text
    content: there is no partiality with God.
  '12':
  - type: text
    content: 'For as many as have sinned without law will also perish without law, and as many as have sinned in the law will be judged by the law '
