      marker-yv: yv-n
    - type: text
      text: there is no partiality with God.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For as many as have sinned without law will also perish without law, and as many as have sinned in the law will be judged by the law '
