    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' just in the sight of God, but the doers of the law will be justified; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for when Gentiles, who do not have the law, by nature do the things in the law, these, although not having the law, are a law to themselves, '
  '15':
  - type: usfm
