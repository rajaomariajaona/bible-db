  - type: text
    content: 'and '
  - type: note
    content: Matt. 15:14; John 9:34
  - type: text
    content: 'are confident that you yourself are a guide to the blind, a light to those who are in darkness, '
  '2':
  - type: text
    content: 'But we know that the judgment of God is according to truth against those who practice such things. '
  '20':
  - type: text
    content: 'an instructor of the foolish, a teacher of babes, '
  - type: note
    content: (2 Tim. 3:5)
  - type: text
    content: 'having the form of knowledge and truth in the law. '
  '21':
  - type: note
    content: Ps. 50:16; Matt. 23:3
  - type: text
    content: 'You, therefore, who teach another, do you not teach yourself? You who preach that a man should not steal, do you steal? '
  '22':
  - type: text
    content: 'You who say, “Do not commit adultery,” do you commit adultery? You who abhor idols, '
  - type: note
    content: Mal. 3:8
  - type: text
    content: 'do you rob temples? '
  '23':
  - type: text
    content: 'You who '
  - type: note
    content: Mic. 3:11; John 5:45; Rom. 2:17; 9:4
  - type: text
    content: 'make your boast in the law, do you dishonor God through breaking the law? '
