      children:
      - type: text
        text: Num. 6:5; Judg. 13:5
      marker-yv: yv-n
    - type: text
      text: 'poured out my soul before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Do not consider your maidservant a '
    - type: usfm
