    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 21:1; 30:22
      marker-yv: yv-n
    - type: text
      text: 'went up to offer to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the yearly sacrifice and his vow. '
