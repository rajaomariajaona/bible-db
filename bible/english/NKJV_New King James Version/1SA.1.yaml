  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Hannah spoke in her heart; only her lips moved, but her voice was not heard. Therefore Eli thought she was drunk. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Eli said to her, “How long will you be drunk? Put your wine away from you!”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Hannah answered and said, “No, my lord, I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' a woman of sorrowful spirit. I have drunk neither wine nor intoxicating drink, but have '
    - type: usfm
