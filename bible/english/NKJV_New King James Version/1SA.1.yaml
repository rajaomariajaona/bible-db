  '1':
  - type: heading
    content: The Family of Elkanah
  - type: text
    content: 'Now there was a certain man of Ramathaim Zophim, of the '
  - type: note
    content: 1 Chr. 2:15; Matt. 1:6
  - type: text
    content: 'mountains of Ephraim, and his name '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: Josh. 17:17, 18; 24:33
  - type: text
    content: 'Elkanah the son of Jeroham, the son of Elihu, the son of Tohu, the son of Zuph, '
  - type: note
    content: 1 Chr. 6:27, 33–38
  - type: text
    content: 'an Ephraimite. '
  '10':
  - type: note
    content: 1 Sam. 3:3
  - type: text
    content: 'And she '
  - type: text
    content: was
  - type: text
    content: ' in bitterness of soul, and prayed to the '
  - type: heading
    content: Lord
  - type: text
    content: ' and wept in anguish. '
  '11':
  - type: text
    content: 'Then she '
  - type: note
    content: Job 7:11
  - type: text
    content: 'made a vow and said, “O '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, if You will indeed '
  - type: note
    content: Gen. 28:20; Num. 30:6–11
  - type: text
    content: 'look on the affliction of Your maidservant and '
  - type: note
    content: Ps. 25:18
  - type: text
    content: 'remember me, and not forget Your maidservant, but will give Your maidservant a male child, then I will give him to the '
  - type: heading
    content: Lord
  - type: text
    content: ' all the days of his life, and '
  - type: note
    content: Gen. 8:1
  - type: text
    content: no razor shall come upon his head.”
  '12':
  - type: text
    content: 'And it happened, as she continued praying before the '
  - type: heading
    content: Lord
  - type: text
    content: ', that Eli watched her mouth. '
  '13':
  - type: text
    content: 'Now Hannah spoke in her heart; only her lips moved, but her voice was not heard. Therefore Eli thought she was drunk. '
  '14':
  - type: text
    content: So Eli said to her, “How long will you be drunk? Put your wine away from you!”
  '15':
  - type: text
    content: 'But Hannah answered and said, “No, my lord, I '
  - type: text
    content: am
  - type: text
    content: ' a woman of sorrowful spirit. I have drunk neither wine nor intoxicating drink, but have '
  - type: note
    content: Num. 6:5; Judg. 13:5
  - type: text
    content: 'poured out my soul before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: '“Do not consider your maidservant a '
  - type: note
    content: Job 30:16; Ps. 42:4; 62:8; Lam. 2:19
  - type: text
    content: wicked woman, for out of the abundance of my complaint and grief I have spoken until now.”
  '17':
  - type: text
    content: 'Then Eli answered and said, '
  - type: note
    content: Deut. 13:13
  - type: text
    content: '“Go in peace, and '
  - type: note
    content: Judg. 18:6; 1 Sam. 25:35; 2 Kin. 5:19; Mark 5:34; Luke 7:50
  - type: text
    content: the God of Israel grant your petition which you have asked of Him.”
  '18':
  - type: text
    content: 'And she said, '
  - type: note
    content: Ps. 20:3–5
  - type: text
    content: '“Let your maidservant find favor in your sight.” So the woman '
  - type: note
    content: Gen. 33:15; Ruth 2:13
  - type: text
    content: 'went her way and ate, and her face was no longer '
  - type: text
    content: sad.
  - type: heading
    content: Samuel Is Born and Dedicated
  '19':
  - type: text
    content: 'Then they rose early in the morning and worshiped before the '
  - type: heading
    content: Lord
  - type: text
    content: ', and returned and came to their house at Ramah. And Elkanah '
  - type: note
    content: Prov. 15:13; Eccl. 9:7; Rom. 15:13
  - type: text
    content: 'knew Hannah his wife, and the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Gen. 4:1
  - type: text
    content: 'remembered her. '
  '2':
  - type: text
    content: 'And he had '
  - type: note
    content: Ruth 1:2
  - type: text
    content: 'two wives: the name of one '
  - type: text
    content: was
  - type: text
    content: ' Hannah, and the name of the other Peninnah. Peninnah had children, but Hannah had no children. '
  '20':
  - type: text
    content: 'So it came to pass in the process of time that Hannah conceived and bore a son, and called his name Samuel, '
  - type: text
    content: saying,
  - type: text
    content: ' “Because I have asked for him from the '
  - type: heading
    content: Lord
  - type: text
    content: .”
  '21':
  - type: text
    content: 'Now the man Elkanah and all his house '
  - type: note
    content: Gen. 21:1; 30:22
  - type: text
    content: 'went up to offer to the '
  - type: heading
    content: Lord
  - type: text
    content: ' the yearly sacrifice and his vow. '
  '22':
  - type: text
    content: But Hannah did not go up, for she said to her husband, “
  - type: text
    content: Not
  - type: text
    content: ' until the child is weaned; then I will '
  - type: note
    content: Deut. 12:11; 1 Sam. 1:3
  - type: text
    content: 'take him, that he may appear before the '
  - type: heading
    content: Lord
  - type: text
    content: ' and '
  - type: note
    content: Luke 2:22
  - type: text
    content: 'remain there '
  - type: note
    content: 1 Sam. 1:11, 28
  - type: text
    content: forever.”
  '23':
  - type: text
    content: 'So '
  - type: note
    content: Ex. 21:6
  - type: text
    content: 'Elkanah her husband said to her, “Do what seems best to you; wait until you have weaned him. Only let the '
  - type: heading
    content: Lord
  - type: text
    content: ' establish His word.” Then the woman stayed and nursed her son until she had weaned him.'
  '24':
  - type: text
    content: 'Now when she had weaned him, she '
  - type: note
    content: Num. 30:7, 10, 11
  - type: text
    content: 'took him up with her, with three bulls, one ephah of flour, and a skin of wine, and brought him to '
  - type: note
    content: Num. 15:9, 10; Deut. 12:5, 6
  - type: text
    content: 'the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' in Shiloh. And the child '
  - type: text
    content: was
  - type: text
    content: ' young. '
  '25':
  - type: text
    content: 'Then they slaughtered a bull, and '
  - type: note
    content: Josh. 18:1; 1 Sam. 4:3, 4
  - type: text
    content: 'brought the child to Eli. '
  '26':
  - type: text
    content: 'And she said, “O my lord! '
  - type: note
    content: Luke 2:22
  - type: text
    content: 'As your soul lives, my lord, I '
  - type: text
    content: am
  - type: text
    content: ' the woman who stood by you here, praying to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '27':
  - type: note
    content: 2 Kin. 2:2, 4, 6; 4:30
  - type: text
    content: 'For this child I prayed, and the '
  - type: heading
    content: Lord
  - type: text
    content: ' has granted me my petition which I asked of Him. '
  '28':
  - type: text
    content: 'Therefore I also have lent him to the '
  - type: heading
    content: Lord
  - type: text
    content: '; as long as he lives he shall be lent to the '
  - type: heading
    content: Lord
  - type: text
    content: '.” So they '
  - type: note
    content: (Matt. 7:7)
  - type: text
    content: 'worshiped the '
  - type: heading
    content: Lord
  - type: text
    content: ' there.'
  '3':
  - type: text
    content: 'This man went up from his city '
  - type: note
    content: Deut. 21:15–17
  - type: text
    content: 'yearly '
  - type: note
    content: Ex. 34:14, 23; Judg. 21:19; 1 Sam. 1:21; Luke 2:41
  - type: text
    content: 'to worship and sacrifice to the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts in '
  - type: note
    content: Deut. 12:5–7; 16:16
  - type: text
    content: 'Shiloh. Also the two sons of Eli, Hophni and Phinehas, the priests of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: text
    content: were
  - type: text
    content: ' there. '
  '4':
  - type: text
    content: 'And whenever the time came for Elkanah to make an '
  - type: note
    content: Josh. 18:1
  - type: text
    content: 'offering, he would give portions to Peninnah his wife and to all her sons and daughters. '
  '5':
  - type: text
    content: 'But to Hannah he would give a double portion, for he loved Hannah, '
  - type: note
    content: Deut. 12:17, 18
  - type: text
    content: 'although the '
  - type: heading
    content: Lord
  - type: text
    content: ' had closed her womb. '
  '6':
  - type: text
    content: 'And her rival also '
  - type: note
    content: Gen. 16:1; 30:1, 2
  - type: text
    content: 'provoked her severely, to make her miserable, because the '
  - type: heading
    content: Lord
  - type: text
    content: ' had closed her womb. '
  '7':
  - type: text
    content: 'So it was, year by year, when she went up to the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', that she provoked her; therefore she wept and did not eat.'
  - type: heading
    content: Hannah’s Vow
  '8':
  - type: text
    content: 'Then Elkanah her husband said to her, “Hannah, why do you weep? Why do you not eat? And why is your heart grieved? '
  - type: text
    content: Am
  - type: text
    content: ' I not '
  - type: note
    content: Job 24:21
  - type: text
    content: better to you than ten sons?”
  '9':
  - type: text
    content: 'So Hannah arose after they had finished eating and drinking in Shiloh. Now Eli the priest was sitting on the seat by the doorpost of '
  - type: note
    content: Ruth 4:15
  - type: text
    content: 'the tabernacle of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
