        text: Gen. 16:1; 30:1, 2
      marker-yv: yv-n
    - type: text
      text: 'provoked her severely, to make her miserable, because the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had closed her womb. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it was, year by year, when she went up to the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
