    - type: text
      text: 'two wives: the name of one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Hannah, and the name of the other Peninnah. Peninnah had children, but Hannah had no children. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it came to pass in the process of time that Hannah conceived and bore a son, and called his name Samuel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
    - type: text
      text: ' “Because I have asked for him from the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '21':
