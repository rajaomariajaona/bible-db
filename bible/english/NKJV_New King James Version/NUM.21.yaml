  - type: text
    content: '“Let me pass through your land. We will not turn aside into fields or vineyards; we will not drink water from wells. We will go by the King’s Highway until we have passed through your territory.” '
  '23':
  - type: note
    content: Deut. 29:7
  - type: text
    content: 'But Sihon would not allow Israel to pass through his territory. So Sihon gathered all his people together and went out against Israel in the wilderness, '
  - type: note
