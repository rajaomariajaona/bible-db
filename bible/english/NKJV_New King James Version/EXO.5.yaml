    content: 'And you shall lay on them the quota of bricks which they made before. You shall not reduce it. For they are idle; therefore they cry out, saying, ‘Let us go '
  - type: text
    content: and
  - type: text
    content: ' sacrifice to our God.’ '
  '9':
  - type: text
    content: Let more work be laid on the men, that they may labor in it, and let them not regard false words.”
