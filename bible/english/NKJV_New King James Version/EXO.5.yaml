  - type: text
    content: a feast to Me in the wilderness.’ ”
  '10':
  - type: text
    content: 'And the taskmasters of the people and their officers went out and spoke to the people, saying, “Thus says Pharaoh: ‘I will not give you straw. '
  '11':
  - type: text
    content: 'Go, get yourselves straw where you can find it; yet none of your work will be reduced.’ ” '
  '12':
  - type: text
    content: 'So the people were scattered abroad throughout all the land of Egypt to gather stubble instead of straw. '
  '13':
  - type: text
    content: 'And the taskmasters forced '
  - type: text
