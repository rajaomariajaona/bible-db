  - type: text
    content: many now, and you make them rest from their labor!”
  '6':
  - type: text
    content: 'So the same day Pharaoh commanded the '
  - type: note
    content: Ex. 1:11; 3:7; 5:10, 13, 14
  - type: text
    content: 'taskmasters of the people and their officers, saying, '
  '7':
  - type: text
    content: '“You shall no longer give the people straw to make '
  - type: note
