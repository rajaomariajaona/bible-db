  - type: text
    content: ' and said, “Lord, why have You brought trouble on this people? Why '
  - type: text
    content: is
  - type: text
    content: ' it You have sent me? '
  '23':
  - type: text
    content: For since I came to Pharaoh to speak in Your name, he has done evil to this people; neither have You delivered Your people at all.”
  '3':
  - type: text
    content: 'So they said, '
  - type: note
