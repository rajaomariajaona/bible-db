  - type: text
    content: ' God of your fathers, for you shall not prosper!”'
  '13':
  - type: text
    content: 'But Jeroboam caused an ambush to go around behind them; so they were in front of Judah, and the ambush '
  - type: text
    content: was
  - type: text
    content: ' behind them. '
  '14':
  - type: text
    content: 'And when Judah looked around, to their surprise the battle line '
  - type: text
    content: was
  - type: text
    content: ' at both front and rear; and they '
  - type: note
    content: Josh. 24:7; 2 Chr. 6:34, 35; 14:11
  - type: text
    content: 'cried out to the '
  - type: heading
    content: Lord
  - type: text
    content: ', and the priests sounded the trumpets. '
  '15':
  - type: text
    content: 'Then the men of Judah gave a shout; and as the men of Judah shouted, it happened that God '
  - type: note
    content: 1 Kin. 14:14; 2 Chr. 14:12
  - type: text
    content: 'struck Jeroboam and all Israel before Abijah and Judah. '
  '16':
  - type: text
    content: 'And the children of Israel fled before Judah, and God delivered them into their hand. '
  '17':
  - type: text
    content: 'Then Abijah and his people struck them with a great slaughter; so five hundred thousand choice men of Israel fell slain. '
  '18':
  - type: text
    content: 'Thus the children of Israel were subdued at that time; and the children of Judah prevailed, '
  - type: note
    content: 1 Chr. 5:20; 2 Chr. 14:11; (Ps. 22:5)
  - type: text
    content: 'because they relied on the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of their fathers.'
  '19':
  - type: text
    content: 'And Abijah pursued Jeroboam and took cities from him: Bethel with its villages, Jeshanah with its villages, and '
  - type: note
    content: Josh. 15:9
  - type: text
    content: 'Ephrain with its villages. '
  '2':
  - type: text
    content: 'He reigned three years in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Michaiah the daughter of Uriel of Gibeah.'
  - type: text
    content: 'And there was war between Abijah and Jeroboam. '
  '20':
  - type: text
    content: 'So Jeroboam did not recover strength again in the days of Abijah; and the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 2:6; 25:38; Acts 12:23
  - type: text
    content: 'struck him, and '
  - type: note
    content: 1 Kin. 14:20
  - type: text
    content: he died.
  '21':
  - type: text
    content: 'But Abijah grew mighty, married fourteen wives, and begot twenty-two sons and sixteen daughters. '
  '22':
  - type: text
    content: 'Now the rest of the acts of Abijah, his ways, and his sayings '
  - type: text
    content: are
  - type: text
    content: ' written in '
  - type: note
    content: 2 Chr. 9:29
  - type: text
    content: the annals of the prophet Iddo.
  '3':
  - type: text
    content: Abijah set the battle in order with an army of valiant warriors, four hundred thousand choice men. Jeroboam also drew up in battle formation against him with eight hundred thousand choice men, mighty men of valor.
  '4':
  - type: text
    content: 'Then Abijah stood on Mount '
  - type: note
    content: Josh. 18:22
  - type: text
    content: 'Zemaraim, which '
  - type: text
    content: is
  - type: text
    content: ' in the mountains of Ephraim, and said, “Hear me, Jeroboam and all Israel: '
  '5':
  - type: text
    content: 'Should you not know that the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel '
  - type: note
    content: 2 Sam. 7:8–16
  - type: text
    content: 'gave the dominion over Israel to David forever, to him and his sons, '
  - type: note
    content: Lev. 2:13; Num. 18:19
  - type: text
    content: 'by a covenant of salt? '
  '6':
  - type: text
    content: 'Yet Jeroboam the son of Nebat, the servant of Solomon the son of David, rose up and '
  - type: note
    content: 1 Kin. 11:28; 12:20
  - type: text
    content: 'rebelled against his lord. '
  '7':
  - type: text
    content: 'Then '
  - type: note
    content: Judg. 9:4
  - type: text
    content: 'worthless rogues gathered to him, and strengthened themselves against Rehoboam the son of Solomon, when Rehoboam was '
  - type: note
    content: 2 Chr. 12:13
  - type: text
    content: 'young and inexperienced and could not withstand them. '
  '8':
  - type: text
    content: 'And now you think to withstand the kingdom of the '
  - type: heading
    content: Lord
  - type: text
    content: ', which is in the hand of the sons of David; and you '
  - type: text
    content: are
  - type: text
    content: ' a great multitude, and with you are the gold calves which Jeroboam '
  - type: note
    content: 1 Kin. 12:28; 14:9; 2 Chr. 11:15; (Hos. 8:4–6)
  - type: text
    content: 'made for you as gods. '
  '9':
  - type: note
    content: 2 Chr. 11:13–15
  - type: text
    content: 'Have you not cast out the priests of the '
  - type: heading
    content: Lord
  - type: text
    content: ', the sons of Aaron, and the Levites, and made for yourselves priests, like the peoples of '
  - type: text
