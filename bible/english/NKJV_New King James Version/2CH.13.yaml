document_id: 2CH.13,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abijah Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:1
      marker-yv: yv-n
    - type: text
      text: 'the eighteenth year of King Jeroboam, Abijah became king over '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:17
      marker-yv: yv-n
    - type: text
      text: 'Judah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as for us, the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' our '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 24:15
      marker-yv: yv-n
    - type: text
      text: 'God, and we have not forsaken Him; and the priests who minister to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Aaron, and the Levites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: attend
    - type: text
      text: ' to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' duties. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:38; 2 Chr. 2:4
      marker-yv: yv-n
    - type: text
      text: 'And they burn to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' every morning and every evening burnt sacrifices and sweet incense; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: set
    - type: text
      text: ' the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:30; Lev. 24:5–9
      marker-yv: yv-n
    - type: text
      text: 'showbread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: order
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on
    - type: text
      text: ' the pure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gold
    - type: text
      text: ' table, and the lampstand of gold with its lamps '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 27:20, 21; Lev. 24:2, 3
      marker-yv: yv-n
    - type: text
      text: 'to burn every evening; for we keep the command of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, but you have forsaken Him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now look, God Himself is with us as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 5:13–15; (Heb. 2:10)
      marker-yv: yv-n
    - type: text
      text: 'head, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Num. 10:8–10)
      marker-yv: yv-n
    - type: text
      text: 'and His priests with sounding trumpets to sound the alarm against you. O children of Israel, do not fight against the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of your fathers, for you shall not prosper!”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jeroboam caused an ambush to go around behind them; so they were in front of Judah, and the ambush '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' behind them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Judah looked around, to their surprise the battle line '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' at both front and rear; and they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 24:7; 2 Chr. 6:34, 35; 14:11
      marker-yv: yv-n
    - type: text
      text: 'cried out to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the priests sounded the trumpets. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the men of Judah gave a shout; and as the men of Judah shouted, it happened that God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:14; 2 Chr. 14:12
      marker-yv: yv-n
    - type: text
      text: 'struck Jeroboam and all Israel before Abijah and Judah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel fled before Judah, and God delivered them into their hand. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abijah and his people struck them with a great slaughter; so five hundred thousand choice men of Israel fell slain. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus the children of Israel were subdued at that time; and the children of Judah prevailed, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 5:20; 2 Chr. 14:11; (Ps. 22:5)
      marker-yv: yv-n
    - type: text
      text: 'because they relied on the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of their fathers.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abijah pursued Jeroboam and took cities from him: Bethel with its villages, Jeshanah with its villages, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:9
      marker-yv: yv-n
    - type: text
      text: 'Ephrain with its villages. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He reigned three years in Jerusalem. His mother’s name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Michaiah the daughter of Uriel of Gibeah.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there was war between Abijah and Jeroboam. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jeroboam did not recover strength again in the days of Abijah; and the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 2:6; 25:38; Acts 12:23
      marker-yv: yv-n
    - type: text
      text: 'struck him, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:20
      marker-yv: yv-n
    - type: text
      text: he died.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Abijah grew mighty, married fourteen wives, and begot twenty-two sons and sixteen daughters. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Abijah, his ways, and his sayings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' written in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 9:29
      marker-yv: yv-n
    - type: text
      text: the annals of the prophet Iddo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abijah set the battle in order with an army of valiant warriors, four hundred thousand choice men. Jeroboam also drew up in battle formation against him with eight hundred thousand choice men, mighty men of valor.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abijah stood on Mount '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:22
      marker-yv: yv-n
    - type: text
      text: 'Zemaraim, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in the mountains of Ephraim, and said, “Hear me, Jeroboam and all Israel: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Should you not know that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:8–16
      marker-yv: yv-n
    - type: text
      text: 'gave the dominion over Israel to David forever, to him and his sons, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:13; Num. 18:19
      marker-yv: yv-n
    - type: text
      text: 'by a covenant of salt? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet Jeroboam the son of Nebat, the servant of Solomon the son of David, rose up and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:28; 12:20
      marker-yv: yv-n
    - type: text
      text: 'rebelled against his lord. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 9:4
      marker-yv: yv-n
    - type: text
      text: 'worthless rogues gathered to him, and strengthened themselves against Rehoboam the son of Solomon, when Rehoboam was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 12:13
      marker-yv: yv-n
    - type: text
      text: 'young and inexperienced and could not withstand them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now you think to withstand the kingdom of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', which is in the hand of the sons of David; and you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a great multitude, and with you are the gold calves which Jeroboam '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:28; 14:9; 2 Chr. 11:15; (Hos. 8:4–6)
      marker-yv: yv-n
    - type: text
      text: 'made for you as gods. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 11:13–15
      marker-yv: yv-n
    - type: text
      text: 'Have you not cast out the priests of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the sons of Aaron, and the Levites, and made for yourselves priests, like the peoples of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' lands, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:29–33
      marker-yv: yv-n
    - type: text
      text: 'so that whoever comes to consecrate himself with a young bull and seven rams may be a priest of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 2:11; 5:7
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' not gods? '
