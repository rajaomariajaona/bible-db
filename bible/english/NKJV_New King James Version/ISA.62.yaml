document_id: ISA.62,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Assurance of Zion’s Salvation
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: For Zion’s sake I will not hold My peace,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And for Jerusalem’s sake I will not rest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Until her righteousness goes forth as brightness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And her salvation as a lamp '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' burns.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Go through,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Go through the gates!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 40:3; 57:14
      marker-yv: yv-n
    - type: text
      text: Prepare the way for the people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Build up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Build up the highway!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take out the stones,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 11:12
      marker-yv: yv-n
    - type: text
      text: Lift up a banner for the peoples!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Indeed the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has proclaimed'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To the end of the world:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 9:9; Matt. 21:5; John 12:15
      marker-yv: yv-n
    - type: text
      text: “Say to the daughter of Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Surely your salvation is coming;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Behold, His '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 40:10; (Rev. 22:12)
      marker-yv: yv-n
    - type: text
      text: 'reward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' with Him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And His work before Him.’ ”
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And they shall call them The Holy People,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The Redeemed of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And you shall be called Sought Out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A City Not Forsaken.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 60:3
      marker-yv: yv-n
    - type: text
      text: The Gentiles shall see your righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 102:15, 16; 138:4, 5; 148:11, 13
      marker-yv: yv-n
    - type: text
      text: kings your glory.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 62:4, 12; 65:15
      marker-yv: yv-n
    - type: text
      text: You shall be called by a new name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Which the mouth of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will name.'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'You shall also be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 28:5; Zech. 9:16; 1 Thess. 2:19
      marker-yv: yv-n
    - type: text
      text: a crown of glory
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the hand of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a royal diadem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the hand of your God.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 1:10; 1 Pet. 2:10
      marker-yv: yv-n
    - type: text
      text: 'You shall no longer be termed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 49:14; 54:6, 7
      marker-yv: yv-n
    - type: text
      text: Forsaken,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nor shall your land any more be termed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 54:1
      marker-yv: yv-n
    - type: text
      text: Desolate;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But you shall be called Hephzibah, and your land Beulah;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' delights in you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your land shall be married.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' a young man marries a virgin,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: So
    - type: text
      text: ' shall your sons marry you;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' the bridegroom rejoices over the bride,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 65:19
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: So
    - type: text
      text: ' shall your God rejoice over you.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 52:8; Jer. 6:17; Ezek. 3:17; 33:7
      marker-yv: yv-n
    - type: text
      text: I have set watchmen on your walls, O Jerusalem;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They shall never hold their peace day or night.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You who make mention of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', do not keep silent,'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And give Him no rest till He establishes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And till He makes Jerusalem '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 60:18; 61:11; Jer. 33:9; Zeph. 3:19, 20
      marker-yv: yv-n
    - type: text
      text: a praise in the earth.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sworn by His right hand'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And by the arm of His strength:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“Surely I will no longer '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:16; Deut. 28:31, 33; Judg. 6:3–6; Is. 1:7; Jer. 5:17
      marker-yv: yv-n
    - type: text
      text: give your grain
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' food for your enemies;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the sons of the foreigner shall not drink your new wine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For which you have labored.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: But those who have gathered it shall eat it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And praise the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Those who have brought it together shall drink it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:12; 14:23, 26
      marker-yv: yv-n
    - type: text
      text: in My holy courts.”
