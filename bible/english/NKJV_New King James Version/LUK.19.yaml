  '20':
  - type: text
    content: '“Then another came, saying, '
  - type: text
    content: ‘Master, here is your mina, which I have kept put away in a handkerchief.
  - type: text
    content: ' '
  '21':
  - type: note
    content: Matt. 25:24
  - type: text
    content: 'For I feared you, because you are '
  - type: text
    content: an austere man. You collect what you did not deposit, and reap what you did not sow.’
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And he said to him, '
  - type: note
    content: 2 Sam. 1:16; Job 15:6; (Matt. 12:37)
  - type: text
    content: '‘Out of your own mouth I will judge you, '
  - type: text
    content: you
  - type: text
    content: ' wicked servant. '
  - type: note
    content: Matt. 25:26
  - type: text
