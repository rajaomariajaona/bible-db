  - type: text
    content: ' '
  '14':
  - type: note
    content: (John 1:11)
  - type: text
    content: 'But his citizens hated him, and sent a delegation after him, saying, ‘We will not have this '
  - type: text
    content: man
  - type: text
    content: ' to reign over us.’'
  '15':
  - type: text
    content: “And so it was that when he returned, having received the kingdom, he then commanded these servants, to whom he had given the money, to be called to him, that he might know how much every man had gained by trading.
  - type: text
    content: ' '
