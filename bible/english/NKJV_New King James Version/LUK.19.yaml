  '34':
  - type: text
    content: 'And they said, “The Lord has need of him.” '
  '35':
  - type: text
    content: 'Then they brought him to Jesus. '
  - type: note
    content: 2 Kin. 9:13; Matt. 21:7; Mark 11:7
  - type: text
    content: 'And they threw their own clothes on the colt, and they set Jesus on him. '
  '36':
