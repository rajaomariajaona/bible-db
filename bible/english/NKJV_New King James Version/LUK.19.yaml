  - type: text
    content: ' '
  '23':
  - type: text
    content: Why then did you not put my money in the bank, that at my coming I might have collected it with interest?’
  '24':
  - type: text
    content: '“And he said to those who stood by, ‘Take the mina from him, and give '
  - type: text
    content: it
  - type: text
    content: ' to him who has ten minas.’'
  - type: text
    content: ' '
  '25':
  - type: text
    content: (But they said to him, ‘Master, he has ten minas.’)
  - type: text
    content: ' '
  '26':
  - type: text
    content: '‘For I say to you, '
  - type: note
    content: Matt. 13:12; 25:29; Mark 4:25; Luke 8:18
  - type: text
    content: that to everyone who has will be given; and from him who does not have, even what he has will be taken away from him.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'But bring here those enemies of mine, who did not want me to reign over them, and slay '
  - type: text
    content: them
  - type: text
    content: ' before me.’ ”'
  - type: heading
    content: The Triumphal Entry
  '28':
  - type: text
    content: 'When He had said this, '
  - type: note
    content: Mark 10:32
  - type: text
    content: 'He went on ahead, going up to Jerusalem. '
  '29':
  - type: note
    content: Matt. 21:1; Mark 11:1
