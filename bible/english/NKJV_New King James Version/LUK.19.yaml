  - type: text
    content: 'see who Jesus was, but could not because of the crowd, for he was of short stature. '
  '30':
  - type: text
    content: 'saying, '
  - type: text
    content: '“Go into the village opposite '
  - type: text
    content: you,
  - type: text
    content: ' where as you enter you will find a colt tied, on which no one has ever sat. Loose it and bring '
  - type: text
    content: it here.
  - type: text
    content: ' '
  '31':
