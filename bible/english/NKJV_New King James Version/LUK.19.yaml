  '7':
  - type: text
    content: 'But when they saw '
  - type: text
    content: it,
  - type: text
    content: ' they all complained, saying, '
  - type: note
    content: Matt. 9:11; Luke 5:30; 15:2
  - type: text
    content: “He has gone to be a guest with a man who is a sinner.”
  '8':
  - type: text
