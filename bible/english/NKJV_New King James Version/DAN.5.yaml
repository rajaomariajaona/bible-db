document_id: DAN.5,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Belshazzar’s Feast
  - type: text
    content: 'Belshazzar the king '
  - type: note
    content: Esth. 1:3; Is. 22:12–14
  - type: text
    content: 'made a great feast for a thousand of his lords, and drank wine in the presence of the thousand. '
  '10':
  - type: text
    content: 'The queen, because of the words of the king and his lords, came to the banquet hall. The queen spoke, saying, “O king, live forever! Do not let your thoughts trouble you, nor let your countenance change. '
  '11':
  - type: note
    content: Dan. 2:48; 4:8, 9, 18
  - type: text
    content: 'There is a man in your kingdom in whom '
  - type: text
    content: is
  - type: text
    content: ' the Spirit of the Holy God. And in the days of your father, light and understanding and wisdom, like the wisdom of the gods, were found in him; and King Nebuchadnezzar your father—your father the king—made him chief of the magicians, astrologers, Chaldeans, '
  - type: text
    content: and
  - type: text
    content: ' soothsayers. '
  '12':
  - type: text
    content: 'Inasmuch as an excellent spirit, knowledge, understanding, interpreting dreams, solving riddles, and explaining enigmas were found in this Daniel, '
  - type: note
    content: Dan. 1:7; 4:8
  - type: text
    content: whom the king named Belteshazzar, now let Daniel be called, and he will give the interpretation.”
  - type: heading
    content: The Writing on the Wall Explained
  '13':
  - type: text
    content: Then Daniel was brought in before the king. The king spoke, and said to Daniel, “
  - type: text
    content: Are
  - type: text
    content: ' you that Daniel who is one of the captives from Judah, whom my father the king brought from Judah? '
  '14':
  - type: text
    content: 'I have heard of you, that '
  - type: note
    content: Dan. 4:8, 9, 18; 5:11, 12
  - type: text
    content: 'the Spirit of God '
  - type: text
    content: is
  - type: text
    content: ' in you, and '
  - type: text
    content: that
  - type: text
    content: ' light and understanding and excellent wisdom are found in you. '
  '15':
  - type: text
    content: 'Now '
  - type: note
    content: Dan. 5:7, 8
  - type: text
    content: 'the wise '
  - type: text
    content: men,
  - type: text
    content: ' the astrologers, have been brought in before me, that they should read this writing and make known to me its interpretation, but they could not give the interpretation of the thing. '
  '16':
  - type: text
    content: 'And I have heard of you, that you can give interpretations and explain enigmas. '
  - type: note
    content: Dan. 5:7, 29
  - type: text
    content: 'Now if you can read the writing and make known to me its interpretation, you shall be clothed with purple and '
  - type: text
    content: have
  - type: text
    content: ' a chain of gold around your neck, and shall be the third ruler in the kingdom.”'
  '17':
  - type: text
    content: 'Then Daniel answered, and said before the king, “Let your gifts be for yourself, and give your rewards to another; yet I will read the writing to the king, and make known to him the interpretation. '
  '18':
  - type: text
    content: 'O king, '
  - type: note
    content: Jer. 27:5–7; Dan. 2:37, 38; 4:17, 22, 25
  - type: text
    content: 'the Most High God gave Nebuchadnezzar your father a kingdom and majesty, glory and honor. '
  '19':
  - type: text
    content: 'And because of the majesty that He gave him, '
  - type: note
    content: Jer. 27:7
  - type: text
    content: 'all peoples, nations, and languages trembled and feared before him. Whomever he wished, he '
  - type: note
    content: Dan. 2:12, 13; 3:6
  - type: text
    content: 'executed; whomever he wished, he kept alive; whomever he wished, he set up; and whomever he wished, he put down. '
  '2':
  - type: text
    content: 'While he tasted the wine, Belshazzar gave the command to bring the gold and silver vessels '
  - type: note
    content: 2 Kin. 24:13; 25:15; Ezra 1:7–11; Jer. 52:19; Dan. 1:2
  - type: text
    content: 'which his father Nebuchadnezzar had taken from the temple which '
  - type: text
    content: had
  - type: text
    content: ' '
  - type: text
    content: been
  - type: text
    content: ' in Jerusalem, that the king and his lords, his wives, and his concubines might drink from them. '
  '20':
  - type: note
    content: Ex. 9:17; Job 15:25; Is. 14:13–15; Dan. 4:30, 37
  - type: text
    content: 'But when his heart was lifted up, and his spirit was hardened in pride, he was deposed from his kingly throne, and they took his glory from him. '
  '21':
  - type: text
    content: 'Then he was '
  - type: note
    content: Job 30:3–7; Dan. 4:32, 33
  - type: text
    content: 'driven from the sons of men, his heart was made like the beasts, and his dwelling '
  - type: text
    content: was
  - type: text
    content: ' with the wild donkeys. They fed him with grass like oxen, and his body was wet with the dew of heaven, '
  - type: note
    content: Ex. 9:14–16; Ps. 83:17, 18; Ezek. 17:24; (Dan. 4:17, 34, 35)
  - type: text
    content: till he knew that the Most High God rules in the kingdom of men, and appoints over it whomever He chooses.
  '22':
  - type: text
    content: '“But you his son, Belshazzar, '
  - type: note
    content: Ex. 10:3; 2 Chr. 33:23; 36:12
  - type: text
    content: 'have not humbled your heart, although you knew all this. '
  '23':
  - type: note
    content: Dan. 5:3, 4
  - type: text
    content: 'And you have lifted yourself up against the Lord of heaven. They have brought the '
  - type: note
    content: Ex. 40:9; Num. 18:3; Is. 52:11; Heb. 9:21
  - type: text
    content: 'vessels of His house before you, and you and your lords, your wives and your concubines, have drunk wine from them. And you have praised the gods of silver and gold, bronze and iron, wood and stone, '
  - type: note
    content: Ps. 115:5, 6; Is. 37:19; Hab. 2:18, 19; Acts 17:24–26; Rom. 1:21
  - type: text
    content: 'which do not see or hear or know; and the God who '
  - type: text
    content: holds
  - type: text
    content: ' your breath in His hand '
  - type: note
    content: Ps. 139:3; Prov. 20:24; (Jer. 10:23)
  - type: text
    content: 'and owns all your ways, you have not glorified. '
  '24':
  - type: text
    content: Then the fingers of the hand were sent from Him, and this writing was written.
  '25':
  - type: text
    content: '“And this is the inscription that was written:'
  - type: text
    content: MENE, MENE, TEKEL, UPHARSIN.
  '26':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the interpretation of '
  - type: text
    content: each
  - type: text
    content: ' word. '
  - type: heading
    content: MENE
  - type: text
    content: ': God has numbered your kingdom, and finished it; '
  '27':
  - type: heading
    content: TEKEL
  - type: text
    content: ': '
  - type: note
    content: Job 31:6; Ps. 62:9; Jer. 6:30
  - type: text
    content: 'You have been weighed in the balances, and found wanting; '
  '28':
  - type: heading
    content: PERES
  - type: text
    content: ': Your kingdom has been divided, and given to the '
  - type: note
    content: Is. 21:2; Dan. 5:31; 9:1
  - type: text
    content: 'Medes and '
  - type: note
    content: Dan. 6:28; Acts 2:9
  - type: text
    content: 'Persians.” '
  '29':
  - type: text
    content: 'Then Belshazzar gave the command, and they clothed Daniel with purple and '
  - type: text
    content: put
  - type: text
    content: ' a chain of gold around his neck, and made a proclamation concerning him '
  - type: note
    content: Dan. 5:7, 16
  - type: text
    content: that he should be the third ruler in the kingdom.
  - type: heading
    content: Belshazzar’s Fall
  '3':
  - type: text
    content: 'Then they brought the gold '
  - type: note
    content: 2 Chr. 36:10
  - type: text
    content: 'vessels that had been taken from the temple of the house of God which '
  - type: text
    content: had
  - type: text
    content: ' '
  - type: text
    content: been
  - type: text
    content: ' in Jerusalem; and the king and his lords, his wives, and his concubines drank from them. '
  '30':
  - type: note
    content: Jer. 51:31, 39, 57
  - type: text
    content: 'That very night Belshazzar, king of the Chaldeans, was slain. '
  '31':
  - type: note
    content: Dan. 2:39; 9:1
  - type: text
    content: 'And Darius the Mede received the kingdom, '
  - type: text
    content: being
  - type: text
    content: ' about sixty-two years old.'
  '4':
  - type: text
    content: 'They drank wine, '
  - type: note
    content: Is. 42:8; Dan. 5:23; Rev. 9:20
  - type: text
    content: and praised the gods of gold and silver, bronze and iron, wood and stone.
  '5':
  - type: note
    content: Dan. 4:31
  - type: text
    content: 'In the same hour the fingers of a man’s hand appeared and wrote opposite the lampstand on the plaster of the wall of the king’s palace; and the king saw the part of the hand that wrote. '
  '6':
  - type: text
    content: 'Then the king’s countenance changed, and his thoughts troubled him, so that the joints of his hips were loosened and his '
  - type: note
    content: Ezek. 7:17; 21:7
  - type: text
    content: 'knees knocked against each other. '
  '7':
  - type: note
    content: Dan. 4:6, 7; 5:11, 15
  - type: text
    content: 'The king cried aloud to bring in '
  - type: note
    content: Is. 47:13
  - type: text
    content: 'the astrologers, the Chaldeans, and the soothsayers. The king spoke, saying to the wise '
  - type: text
    content: men
  - type: text
    content: ' of Babylon, “Whoever reads this writing, and tells me its interpretation, shall be clothed with purple and '
  - type: text
    content: have
  - type: text
    content: ' a chain of gold around his neck; '
  - type: note
    content: Dan. 6:2, 3
  - type: text
    content: 'and he shall be the third ruler in the kingdom.” '
  '8':
  - type: text
    content: 'Now all the king’s wise '
  - type: text
    content: men
  - type: text
    content: ' came, '
  - type: note
    content: Gen. 41:8; Dan. 2:27; 4:7; 5:15
  - type: text
    content: 'but they could not read the writing, or make known to the king its interpretation. '
  '9':
  - type: text
    content: 'Then King Belshazzar was greatly '
  - type: note
    content: Job 18:11; Is. 21:2–4; Jer. 6:24; Dan. 2:1; 5:6
  - type: text
    content: troubled, his countenance was changed, and his lords were astonished.
