    children:
    - type: text
      text: '1'
  - type: text
    text: 'Belshazzar the king '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 1:3; Is. 22:12–14
    marker-yv: yv-n
  - type: text
    text: 'made a great feast for a thousand of his lords, and drank wine in the presence of the thousand. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'While he tasted the wine, Belshazzar gave the command to bring the gold and silver vessels '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 24:13; 25:15; Ezra 1:7–11; Jer. 52:19; Dan. 1:2
    marker-yv: yv-n
  - type: text
    text: 'which his father Nebuchadnezzar had taken from the temple which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: been
  - type: text
    text: ' in Jerusalem, that the king and his lords, his wives, and his concubines might drink from them. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then they brought the gold '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 36:10
    marker-yv: yv-n
  - type: text
    text: 'vessels that had been taken from the temple of the house of God which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: been
  - type: text
    text: ' in Jerusalem; and the king and his lords, his wives, and his concubines drank from them. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They drank wine, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 42:8; Dan. 5:23; Rev. 9:20
    marker-yv: yv-n
  - type: text
    text: and praised the gods of gold and silver, bronze and iron, wood and stone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 4:31
    marker-yv: yv-n
  - type: text
    text: 'In the same hour the fingers of a man’s hand appeared and wrote opposite the lampstand on the plaster of the wall of the king’s palace; and the king saw the part of the hand that wrote. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the king’s countenance changed, and his thoughts troubled him, so that the joints of his hips were loosened and his '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 7:17; 21:7
    marker-yv: yv-n
  - type: text
    text: 'knees knocked against each other. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 4:6, 7; 5:11, 15
    marker-yv: yv-n
  - type: text
    text: 'The king cried aloud to bring in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 47:13
    marker-yv: yv-n
  - type: text
    text: 'the astrologers, the Chaldeans, and the soothsayers. The king spoke, saying to the wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: men
  - type: text
    text: ' of Babylon, “Whoever reads this writing, and tells me its interpretation, shall be clothed with purple and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: have
  - type: text
    text: ' a chain of gold around his neck; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 6:2, 3
    marker-yv: yv-n
  - type: text
    text: 'and he shall be the third ruler in the kingdom.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now all the king’s wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: men
  - type: text
    text: ' came, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 41:8; Dan. 2:27; 4:7; 5:15
    marker-yv: yv-n
  - type: text
    text: 'but they could not read the writing, or make known to the king its interpretation. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then King Belshazzar was greatly '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 18:11; Is. 21:2–4; Jer. 6:24; Dan. 2:1; 5:6
    marker-yv: yv-n
  - type: text
    text: troubled, his countenance was changed, and his lords were astonished.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The queen, because of the words of the king and his lords, came to the banquet hall. The queen spoke, saying, “O king, live forever! Do not let your thoughts trouble you, nor let your countenance change. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 2:48; 4:8, 9, 18
    marker-yv: yv-n
  - type: text
    text: 'There is a man in your kingdom in whom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the Spirit of the Holy God. And in the days of your father, light and understanding and wisdom, like the wisdom of the gods, were found in him; and King Nebuchadnezzar your father—your father the king—made him chief of the magicians, astrologers, Chaldeans, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothsayers. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Inasmuch as an excellent spirit, knowledge, understanding, interpreting dreams, solving riddles, and explaining enigmas were found in this Daniel, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 1:7; 4:8
    marker-yv: yv-n
  - type: text
    text: whom the king named Belteshazzar, now let Daniel be called, and he will give the interpretation.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Writing on the Wall Explained
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then Daniel was brought in before the king. The king spoke, and said to Daniel, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Are
  - type: text
    text: ' you that Daniel who is one of the captives from Judah, whom my father the king brought from Judah? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I have heard of you, that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 4:8, 9, 18; 5:11, 12
    marker-yv: yv-n
  - type: text
    text: 'the Spirit of God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' in you, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' light and understanding and excellent wisdom are found in you. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 5:7, 8
    marker-yv: yv-n
  - type: text
    text: 'the wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: men,
  - type: text
    text: ' the astrologers, have been brought in before me, that they should read this writing and make known to me its interpretation, but they could not give the interpretation of the thing. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And I have heard of you, that you can give interpretations and explain enigmas. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 5:7, 29
    marker-yv: yv-n
  - type: text
    text: 'Now if you can read the writing and make known to me its interpretation, you shall be clothed with purple and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: have
  - type: text
    text: ' a chain of gold around your neck, and shall be the third ruler in the kingdom.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Daniel answered, and said before the king, “Let your gifts be for yourself, and give your rewards to another; yet I will read the writing to the king, and make known to him the interpretation. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'O king, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 27:5–7; Dan. 2:37, 38; 4:17, 22, 25
    marker-yv: yv-n
  - type: text
    text: 'the Most High God gave Nebuchadnezzar your father a kingdom and majesty, glory and honor. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And because of the majesty that He gave him, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 27:7
    marker-yv: yv-n
  - type: text
    text: 'all peoples, nations, and languages trembled and feared before him. Whomever he wished, he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 2:12, 13; 3:6
    marker-yv: yv-n
  - type: text
    text: 'executed; whomever he wished, he kept alive; whomever he wished, he set up; and whomever he wished, he put down. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 9:17; Job 15:25; Is. 14:13–15; Dan. 4:30, 37
    marker-yv: yv-n
  - type: text
    text: 'But when his heart was lifted up, and his spirit was hardened in pride, he was deposed from his kingly throne, and they took his glory from him. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then he was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 30:3–7; Dan. 4:32, 33
    marker-yv: yv-n
  - type: text
    text: 'driven from the sons of men, his heart was made like the beasts, and his dwelling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' with the wild donkeys. They fed him with grass like oxen, and his body was wet with the dew of heaven, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 9:14–16; Ps. 83:17, 18; Ezek. 17:24; (Dan. 4:17, 34, 35)
    marker-yv: yv-n
  - type: text
    text: till he knew that the Most High God rules in the kingdom of men, and appoints over it whomever He chooses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“But you his son, Belshazzar, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 10:3; 2 Chr. 33:23; 36:12
    marker-yv: yv-n
  - type: text
    text: 'have not humbled your heart, although you knew all this. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 5:3, 4
    marker-yv: yv-n
  - type: text
    text: 'And you have lifted yourself up against the Lord of heaven. They have brought the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 40:9; Num. 18:3; Is. 52:11; Heb. 9:21
    marker-yv: yv-n
  - type: text
    text: 'vessels of His house before you, and you and your lords, your wives and your concubines, have drunk wine from them. And you have praised the gods of silver and gold, bronze and iron, wood and stone, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 115:5, 6; Is. 37:19; Hab. 2:18, 19; Acts 17:24–26; Rom. 1:21
    marker-yv: yv-n
  - type: text
    text: 'which do not see or hear or know; and the God who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: holds
  - type: text
    text: ' your breath in His hand '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 139:3; Prov. 20:24; (Jer. 10:23)
    marker-yv: yv-n
  - type: text
    text: 'and owns all your ways, you have not glorified. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Then the fingers of the hand were sent from Him, and this writing was written.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“And this is the inscription that was written:'
- type: usfm
  marker: pc
  children:
  - type: text
    text: MENE, MENE, TEKEL, UPHARSIN.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the interpretation of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: each
  - type: text
    text: ' word. '
  - type: usfm
    marker: sls
    children:
    - type: text
      text: MENE
  - type: text
    text: ': God has numbered your kingdom, and finished it; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: sls
    children:
    - type: text
      text: TEKEL
  - type: text
    text: ': '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 31:6; Ps. 62:9; Jer. 6:30
    marker-yv: yv-n
  - type: text
    text: 'You have been weighed in the balances, and found wanting; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: sls
    children:
    - type: text
      text: PERES
  - type: text
    text: ': Your kingdom has been divided, and given to the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 21:2; Dan. 5:31; 9:1
    marker-yv: yv-n
  - type: text
    text: 'Medes and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 6:28; Acts 2:9
    marker-yv: yv-n
  - type: text
    text: 'Persians.” '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Belshazzar gave the command, and they clothed Daniel with purple and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: put
  - type: text
    text: ' a chain of gold around his neck, and made a proclamation concerning him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 5:7, 16
    marker-yv: yv-n
  - type: text
    text: that he should be the third ruler in the kingdom.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Belshazzar’s Fall
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 51:31, 39, 57
    marker-yv: yv-n
  - type: text
    text: 'That very night Belshazzar, king of the Chaldeans, was slain. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 2:39; 9:1
    marker-yv: yv-n
  - type: text
    text: 'And Darius the Mede received the kingdom, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: being
  - type: text
    text: ' about sixty-two years old.'
