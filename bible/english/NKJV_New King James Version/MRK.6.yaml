  '1':
  - type: heading
    content: Jesus Rejected at Nazareth
  - type: text
    content: 'Then '
  - type: note
    content: Matt. 13:54; Luke 4:16
  - type: text
    content: 'He went out from there and came to His own country, and His disciples followed Him. '
  '10':
  - type: note
    content: Matt. 10:11; Luke 9:4; 10:7, 8
  - type: text
    content: 'Also He said to them, '
  - type: text
    content: “In whatever place you enter a house, stay there till you depart from that place.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Matt. 10:14; Luke 10:10
  - type: text
    content: 'And '
  - type: text
    content: whoever
  - type: text
    content: ' will not receive you nor hear you, when you depart from there, '
  - type: note
