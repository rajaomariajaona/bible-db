  - type: text
    content: shake off the dust under your feet as a testimony against them.
  - type: text
    content: ' '
  - type: text
    content: Assuredly, I say to you, it will be more tolerable for Sodom and Gomorrah in the day of judgment than for that city!”
  '12':
  - type: text
    content: 'So they went out and preached that '
  - type: text
    content: people
  - type: text
    content: ' should repent. '
  '13':
  - type: text
    content: 'And they cast out many demons, '
  - type: note
    content: (James 5:14)
  - type: text
    content: 'and anointed with oil many who were sick, and healed '
  - type: text
    content: them.
  - type: heading
    content: John the Baptist Beheaded
  '14':
  - type: note
    content: Matt. 14:1–12; Mark 6:14–16; Luke 9:7–9
  - type: text
    content: 'Now King Herod heard '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: Him,
  - type: text
    content: ' for His name had become well known. And he said, “John the Baptist is risen from the dead, and therefore '
  - type: note
    content: Luke 19:37
  - type: text
    content: these powers are at work in him.”
  '15':
  - type: note
    content: Matt. 16:14; Mark 8:28; Luke 9:19
  - type: text
    content: Others said, “It is Elijah.”
  - type: text
    content: 'And others said, “It is the Prophet, '
  - type: note
    content: Matt. 21:11
  - type: text
    content: or like one of the prophets.”
  '16':
  - type: note
    content: Matt. 14:2; Luke 3:19
  - type: text
    content: 'But when Herod heard, he said, “This is John, whom I beheaded; he has been raised from the dead!” '
  '17':
  - type: text
    content: 'For Herod himself had sent and laid hold of John, and bound him in prison for the sake of Herodias, his brother Philip’s wife; for he had married her. '
  '18':
  - type: text
    content: 'Because John had said to Herod, '
  - type: note
    content: Lev. 18:16; 20:21
  - type: text
    content: “It is not lawful for you to have your brother’s wife.”
  '19':
  - type: text
    content: 'Therefore Herodias held it against him and wanted to kill him, but she could not; '
  '2':
  - type: text
    content: 'And when the Sabbath had come, He began to teach in the synagogue. And many hearing '
  - type: text
    content: Him
  - type: text
    content: ' were '
  - type: note
    content: Matt. 7:28; Luke 4:32; Acts 4:13
  - type: text
    content: 'astonished, saying, '
  - type: note
    content: John 6:42
  - type: text
    content: '“Where '
  - type: text
    content: did
  - type: text
    content: ' this Man '
  - type: text
    content: get
  - type: text
    content: ' these things? And what wisdom '
  - type: text
    content: is
  - type: text
    content: ' this which is given to Him, that such mighty works are performed by His hands! '
  '20':
  - type: text
    content: 'for Herod '
  - type: note
    content: Matt. 14:5; 21:26
  - type: text
    content: 'feared John, knowing that he '
  - type: text
    content: was
  - type: text
    content: ' a just and holy man, and he protected him. And when he heard him, he did many things, and heard him gladly.'
  '21':
  - type: note
    content: Matt. 14:6
  - type: text
    content: 'Then an opportune day came when Herod '
  - type: note
    content: Gen. 40:20
  - type: text
    content: 'on his birthday gave a feast for his nobles, the high officers, and the chief '
  - type: text
    content: men
  - type: text
    content: ' of Galilee. '
  '22':
  - type: text
    content: 'And when Herodias’ daughter herself came in and danced, and pleased Herod and those who sat with him, the king said to the girl, “Ask me whatever you want, and I will give '
  - type: text
    content: it
  - type: text
    content: ' to you.” '
  '23':
  - type: text
    content: 'He also swore to her, '
  - type: note
    content: Esth. 5:3, 6, 7:2
  - type: text
    content: “Whatever you ask me, I will give you, up to half my kingdom.”
  '24':
  - type: text
    content: So she went out and said to her mother, “What shall I ask?”
  - type: text
    content: And she said, “The head of John the Baptist!”
  '25':
  - type: text
    content: Immediately she came in with haste to the king and asked, saying, “I want you to give me at once the head of John the Baptist on a platter.”
  '26':
  - type: note
    content: Matt. 14:9
  - type: text
    content: 'And the king was exceedingly sorry; '
  - type: text
    content: yet,
  - type: text
    content: ' because of the oaths and because of those who sat with him, he did not want to refuse her. '
  '27':
  - type: text
    content: 'Immediately the king sent an executioner and commanded his head to be brought. And he went and beheaded him in prison, '
  '28':
  - type: text
    content: 'brought his head on a platter, and gave it to the girl; and the girl gave it to her mother. '
  '29':
  - type: text
    content: 'When his disciples heard '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: it,
  - type: text
    content: ' they came and '
  - type: note
    content: 1 Kin. 13:29, 30; Matt. 27:58–61; Acts 8:2
  - type: text
    content: took away his corpse and laid it in a tomb.
  - type: heading
    content: Feeding the Five Thousand
  '3':
  - type: text
    content: 'Is this not the carpenter, the Son of Mary, and '
  - type: note
    content: Matt. 12:46; Gal. 1:19
  - type: text
    content: 'brother of James, Joses, Judas, and Simon? And are not His sisters here with us?” So they '
  - type: note
    content: (Matt. 11:6)
  - type: text
    content: were offended at Him.
  '30':
  - type: note
    content: Luke 9:10
  - type: text
    content: 'Then the apostles gathered to Jesus and told Him all things, both what they had done and what they had taught. '
  '31':
  - type: note
    content: Matt. 14:13
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “Come aside by yourselves to a deserted place and rest a while.”
  - type: text
    content: ' For '
  - type: note
    content: Mark 3:20
  - type: text
    content: 'there were many coming and going, and they did not even have time to eat. '
  '32':
  - type: note
    content: Matt. 14:13–21; Luke 9:10–17; John 6:5–13
  - type: text
    content: So they departed to a deserted place in the boat by themselves.
  '33':
  - type: text
    content: 'But the multitudes saw them departing, and many '
  - type: note
    content: (Col. 1:6)
  - type: text
    content: 'knew Him and ran there on foot from all the cities. They arrived before them and came together to Him. '
  '34':
  - type: note
    content: Matt. 9:36; 14:14; (Heb. 5:2)
  - type: text
    content: 'And Jesus, when He came out, saw a great multitude and was moved with compassion for them, because they were like '
  - type: note
    content: Num. 27:17; 1 Kin. 22:17; 2 Chr. 18:16; Zech. 10:2
  - type: text
    content: 'sheep not having a shepherd. So '
  - type: note
    content: (Is. 48:17; 61:1–3); Luke 9:11
  - type: text
    content: 'He began to teach them many things. '
  '35':
  - type: note
    content: Matt. 14:15; Luke 9:12
  - type: text
    content: 'When the day was now far spent, His disciples came to Him and said, “This is a deserted place, and already the hour '
  - type: text
    content: is
  - type: text
    content: ' late. '
  '36':
  - type: text
    content: Send them away, that they may go into the surrounding country and villages and buy themselves bread; for they have nothing to eat.”
  '37':
  - type: text
    content: 'But He answered and said to them, '
  - type: text
    content: “You give them something to eat.”
  - type: text
    content: 'And they said to Him, '
  - type: note
    content: Num. 11:13, 22; 2 Kin. 4:43
  - type: text
    content: '“Shall we go and buy two hundred denarii worth of bread and give them '
  - type: text
    content: something
  - type: text
    content: ' to eat?”'
  '38':
  - type: text
    content: 'But He said to them, '
  - type: text
    content: “How many loaves do you have? Go and see.”
  - type: text
    content: 'And when they found out they said, '
  - type: note
    content: Matt. 14:17; Luke 9:13; John 6:9
  - type: text
    content: “Five, and two fish.”
  '39':
  - type: text
    content: 'Then He '
  - type: note
    content: Matt. 15:35; Mark 8:6
  - type: text
    content: 'commanded them to make them all sit down in groups on the green grass. '
  '4':
  - type: text
    content: 'But Jesus said to them, '
  - type: note
    content: Matt. 13:57; Luke 4:24; John 4:44
  - type: text
    content: “A prophet is not without honor except in his own country, among his own relatives, and in his own house.”
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'So they sat down in ranks, in hundreds and in fifties. '
  '41':
  - type: text
    content: 'And when He had taken the five loaves and the two fish, He '
  - type: note
    content: John 11:41, 42
  - type: text
    content: 'looked up to heaven, '
  - type: note
    content: 1 Sam. 9:13; Matt. 15:36; 26:26; Mark 8:7; Luke 24:30
  - type: text
    content: 'blessed and broke the loaves, and gave '
  - type: text
    content: them
  - type: text
    content: ' to His disciples to set before them; and the two fish He divided among '
  - type: text
    content: them
  - type: text
    content: ' all. '
  '42':
  - type: text
    content: 'So they all ate and were filled. '
  '43':
  - type: text
    content: 'And they took up twelve baskets full of fragments and of the fish. '
  '44':
  - type: text
    content: Now those who had eaten the loaves were about five thousand men.
  - type: heading
    content: Jesus Walks on the Sea
  '45':
  - type: note
    content: Matt. 14:22–32; John 6:15–21
  - type: text
    content: 'Immediately He made His disciples get into the boat and go before Him to the other side, to Bethsaida, while He sent the multitude away. '
  '46':
  - type: text
    content: 'And when He had sent them away, He '
  - type: note
    content: Mark 1:35; Luke 5:16
  - type: text
    content: 'departed to the mountain to pray. '
  '47':
  - type: text
    content: 'Now when evening came, the boat was in the middle of the sea; and He '
  - type: text
    content: was
  - type: text
    content: ' alone on the land. '
  '48':
  - type: text
    content: 'Then He saw them straining at rowing, for the wind was against them. Now about the fourth watch of the night He came to them, walking on the sea, and '
  - type: note
    content: Luke 24:28
  - type: text
    content: 'would have passed them by. '
  '49':
  - type: text
    content: 'And when they saw Him walking on the sea, they supposed it was a '
  - type: note
    content: Matt. 14:26; Luke 24:37
  - type: text
    content: 'ghost, and cried out; '
  '5':
  - type: note
    content: Gen. 19:22; 32:25; Matt. 13:58; (Mark 9:23)
  - type: text
    content: 'Now He could do no mighty work there, except that He laid His hands on a few sick people and healed '
  - type: text
    content: them.
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'for they all saw Him and were troubled. But immediately He talked with them and said to them, '
  - type: note
    content: Matt. 9:2; John 16:33
  - type: text
    content: “Be
  - type: text
    content: ' of good cheer! It is I; do not be '
  - type: note
    content: Is. 41:10
  - type: text
    content: afraid.”
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'Then He went up into the boat to them, and the wind '
  - type: note
    content: Ps. 107:29
  - type: text
    content: 'ceased. And they were greatly '
  - type: note
    content: Mark 1:27; 2:12; 5:42; 7:37
  - type: text
    content: 'amazed in themselves beyond measure, and marveled. '
  '52':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 16:9–11; Mark 8:17, 18
  - type: text
    content: 'they had not understood about the loaves, because their '
  - type: note
    content: Is. 63:17; Mark 3:5; 16:14
  - type: text
    content: heart was hardened.
  - type: heading
    content: Many Touch Him and Are Made Well
  '53':
  - type: note
    content: Matt. 14:34–36; John 6:24, 25
  - type: text
    content: 'When they had crossed over, they came to the land of Gennesaret and anchored there. '
  '54':
  - type: text
    content: 'And when they came out of the boat, immediately the people recognized Him, '
  '55':
  - type: text
    content: 'ran through that whole surrounding region, and began to carry about on beds those who were sick to wherever they heard He was. '
  '56':
  - type: text
    content: 'Wherever He entered, into villages, cities, or the country, they laid the sick in the marketplaces, and begged Him that '
  - type: note
    content: Matt. 9:20; Mark 5:27, 28; (Acts 19:12)
  - type: text
    content: 'they might just touch the '
  - type: note
    content: Num. 15:38, 39
  - type: text
    content: hem of His garment. And as many as touched Him were made well.
  '6':
  - type: text
    content: 'And '
  - type: note
    content: Is. 59:16; Matt. 17:17, 20; (Heb. 3:18, 19; 4:2)
  - type: text
    content: 'He marveled because of their unbelief. '
  - type: note
    content: Matt. 9:35; Luke 13:22; Acts 10:38; Eph. 2:17
  - type: text
    content: Then He went about the villages in a circuit, teaching.
  - type: heading
    content: Sending Out the Twelve
  '7':
  - type: note
    content: Matt. 10:1; 28:19, 20; Mark 3:13, 14; Luke 9:1
  - type: text
    content: 'And He called the twelve to '
  - type: text
    content: Himself,
  - type: text
    content: ' and began to send them out '
  - type: note
    content: (Eccl. 4:9, 10)
  - type: text
    content: 'two '
  - type: text
    content: by
  - type: text
    content: ' two, and gave them power over unclean spirits. '
  '8':
  - type: text
    content: 'He commanded them to take nothing for the journey except a staff—no bag, no bread, no copper in '
  - type: text
    content: their
  - type: text
    content: ' money belts— '
  '9':
  - type: text
    content: 'but '
  - type: note
    content: (Eph. 6:15)
  - type: text
    content: to wear sandals, and not to put on two tunics.
