document_id: ACT.26,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Early Life
  - type: text
    content: Then Agrippa said to Paul, “You are permitted to speak for yourself.”
  - type: text
    content: 'So Paul stretched out his hand and answered for himself: '
  '10':
  - type: note
    content: Acts 8:1–3; 9:13; Gal. 1:13
  - type: text
    content: 'This I also did in Jerusalem, and many of the saints I shut up in prison, having received authority '
  - type: note
    content: Acts 9:14
  - type: text
    content: 'from the chief priests; and when they were put to death, I cast my vote against '
  - type: text
    content: them.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Matt. 10:17; Acts 22:19
  - type: text
    content: 'And I punished them often in every synagogue and compelled '
  - type: text
    content: them
  - type: text
    content: ' to blaspheme; and being exceedingly enraged against them, I persecuted '
  - type: text
    content: them
  - type: text
    content: ' even to foreign cities.'
  - type: heading
    content: Paul Recounts His Conversion
  '12':
  - type: note
    content: Acts 9:3–8; 22:6–11; 26:12–18
  - type: text
    content: '“While thus occupied, as I journeyed to Damascus with authority and commission from the chief priests, '
  '13':
  - type: text
    content: 'at midday, O king, along the road I saw a light from heaven, brighter than the sun, shining around me and those who journeyed with me. '
  '14':
  - type: text
    content: 'And when we all had fallen to the ground, I heard a voice speaking to me and saying in the Hebrew language, '
  - type: text
    content: '‘Saul, Saul, why are you persecuting Me? '
  - type: text
    content: It is
  - type: text
    content: ' hard for you to kick against the goads.’'
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'So I said, ‘Who are You, Lord?’ And He said, '
  - type: text
    content: ‘I am Jesus, whom you are persecuting.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'But rise and stand on your feet; for I have appeared to you for this purpose, '
  - type: note
    content: Acts 22:15; Eph. 3:6–8
  - type: text
    content: to make you a minister and a witness both of the things which you have seen and of the things which I will yet reveal to you.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'I will '
  - type: text
    content: 'deliver you from the '
  - type: text
    content: Jewish
  - type: text
    content: ' people, as well as '
  - type: text
    content: from
  - type: text
    content: ' the Gentiles, '
  - type: note
    content: Acts 22:21
  - type: text
    content: 'to whom I '
  - type: text
    content: now
  - type: text
    content: ' send you,'
  - type: text
    content: ' '
  '18':
  - type: note
    content: Is. 35:5; 42:7, 16; Luke 1:79; (John 8:12; 2 Cor. 4:4); Eph. 1:18; 1 Thess. 5:5
  - type: text
    content: 'to open their eyes, '
  - type: text
    content: in order
  - type: text
    content: ' '
  - type: note
    content: 2 Cor. 6:14; Eph. 4:18; 5:8; (Col. 1:13); 1 Pet. 2:9
  - type: text
    content: 'to turn '
  - type: text
    content: them
  - type: text
    content: ' from darkness to light, and '
  - type: text
    content: from
  - type: text
    content: ' the power of Satan to God, '
  - type: note
    content: Luke 1:77
  - type: text
    content: 'that they may receive forgiveness of sins and '
  - type: note
    content: Eph. 1:11; Col. 1:12
  - type: text
    content: 'an inheritance among those who are '
  - type: note
    content: Acts 20:32
  - type: text
    content: sanctified
  - type: text
    content: ' by faith in Me.’'
  - type: heading
    content: Paul’s Post-Conversion Life
  '19':
  - type: text
    content: '“Therefore, King Agrippa, I was not disobedient to the heavenly vision, '
  '2':
  - type: text
    content: '“I think myself '
  - type: note
    content: (1 Pet. 3:14; 4:14)
  - type: text
    content: 'happy, King Agrippa, because today I shall answer '
  - type: note
    content: (1 Pet. 3:15, 16)
  - type: text
    content: 'for myself before you concerning all the things of which I am '
  - type: note
    content: Acts 21:28; 24:5, 6
  - type: text
    content: 'accused by the Jews, '
  '20':
  - type: text
    content: 'but '
  - type: note
    content: Acts 9:19, 20, 22; 11:26
  - type: text
    content: 'declared first to those in Damascus and in Jerusalem, and throughout all the region of Judea, and '
  - type: text
    content: then
  - type: text
    content: ' to the Gentiles, that they should repent, turn to God, and do '
  - type: note
    content: Matt. 3:8; Luke 3:8
  - type: text
    content: 'works befitting repentance. '
  '21':
  - type: text
    content: 'For these reasons the Jews seized me in the temple and tried to kill '
  - type: text
    content: me.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Therefore, having obtained help from God, to this day I stand, witnessing both to small and great, saying no other things than those '
  - type: note
    content: Luke 24:27; Acts 24:14; 28:23; Rom. 3:21
  - type: text
    content: 'which the prophets and '
  - type: note
    content: John 5:46
  - type: text
    content: 'Moses said would come— '
  '23':
  - type: note
    content: Luke 24:26
  - type: text
    content: 'that the Christ would suffer, '
  - type: note
    content: 1 Cor. 15:20, 23; Col. 1:18; Rev. 1:5
  - type: text
    content: 'that He would be the first to rise from the dead, and '
  - type: note
    content: Is. 42:6; 49:6; Luke 2:32; 2 Cor. 4:4
  - type: text
    content: 'would proclaim light to the '
  - type: text
    content: Jewish
  - type: text
    content: ' people and to the Gentiles.”'
  - type: heading
    content: Agrippa Parries Paul’s Challenge
  '24':
  - type: text
    content: 'Now as he thus made his defense, Festus said with a loud voice, “Paul, '
  - type: note
    content: 2 Kin. 9:11; John 10:20; (1 Cor. 1:23; 2:13, 14; 4:10)
  - type: text
    content: you are beside yourself! Much learning is driving you mad!”
  '25':
  - type: text
    content: 'But he said, “I am not mad, most noble Festus, but speak the words of truth and reason. '
  '26':
  - type: text
    content: 'For the king, before whom I also speak freely, '
  - type: note
    content: Acts 26:3
  - type: text
    content: 'knows these things; for I am convinced that none of these things escapes his attention, since this thing was not done in a corner. '
  '27':
  - type: text
    content: King Agrippa, do you believe the prophets? I know that you do believe.”
  '28':
  - type: text
    content: Then Agrippa said to Paul, “You almost persuade me to become a Christian.”
  '29':
  - type: text
    content: 'And Paul said, '
  - type: note
    content: 1 Cor. 7:7
  - type: text
    content: “I would to God that not only you, but also all who hear me today, might become both almost and altogether such as I am, except for these chains.”
  '3':
  - type: text
    content: especially because you are expert in all customs and questions which have to do with the Jews. Therefore I beg you to hear me patiently.
  '30':
  - type: text
    content: 'When he had said these things, the king stood up, as well as the governor and Bernice and those who sat with them; '
  '31':
  - type: text
    content: 'and when they had gone aside, they talked among themselves, saying, '
  - type: note
    content: Acts 23:9, 29; 25:25
  - type: text
    content: “This man is doing nothing deserving of death or chains.”
  '32':
  - type: text
    content: 'Then Agrippa said to Festus, “This man might have been set '
  - type: note
    content: Acts 28:18
  - type: text
    content: 'free '
  - type: note
    content: Acts 25:11
  - type: text
    content: if he had not appealed to Caesar.”
  '4':
  - type: text
    content: '“My manner of life from my youth, which was spent from the beginning among my own nation at Jerusalem, all the Jews know. '
  '5':
  - type: text
    content: 'They knew me from the first, if they were willing to testify, that according to '
  - type: note
    content: (Acts 22:3; 23:6; 24:15, 21); Phil. 3:5
  - type: text
    content: 'the strictest sect of our religion I lived a Pharisee. '
  '6':
  - type: note
    content: Acts 23:6
  - type: text
    content: 'And now I stand and am judged for the hope of '
  - type: note
    content: (Gen. 3:15; 22:18; 26:4; 49:10; Deut. 18:15; 2 Sam. 7:12; Ps. 132:11; Is. 4:2; 7:14; 9:6; 40:10; Jer. 23:5; 33:14–16; Ezek. 34:23; 37:24; Dan. 9:24); Acts 13:32; Rom. 15:8; (Titus 2:13)
  - type: text
    content: 'the promise made by God to our fathers. '
  '7':
  - type: text
    content: 'To this '
  - type: text
    content: promise
  - type: text
    content: ' '
  - type: note
    content: James 1:1
  - type: text
    content: 'our twelve tribes, earnestly serving '
  - type: text
    content: God
  - type: text
    content: ' '
  - type: note
    content: Luke 2:37; 1 Thess. 3:10; 1 Tim. 5:5
  - type: text
    content: 'night and day, '
  - type: note
    content: Phil. 3:11
  - type: text
    content: 'hope to attain. For this hope’s sake, King Agrippa, I am accused by the Jews. '
  '8':
  - type: text
    content: Why should it be thought incredible by you that God raises the dead?
  '9':
  - type: note
    content: John 16:2; 1 Cor. 15:9; 1 Tim. 1:12, 13
  - type: text
    content: '“Indeed, I myself thought I must do many things contrary to the name of '
  - type: note
    content: Acts 2:22; 10:38
  - type: text
    content: 'Jesus of Nazareth. '
