document_id: ACT.26,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Early Life
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then Agrippa said to Paul, “You are permitted to speak for yourself.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Paul stretched out his hand and answered for himself: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 8:1–3; 9:13; Gal. 1:13
      marker-yv: yv-n
    - type: text
      text: 'This I also did in Jerusalem, and many of the saints I shut up in prison, having received authority '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:14
      marker-yv: yv-n
    - type: text
      text: 'from the chief priests; and when they were put to death, I cast my vote against '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:17; Acts 22:19
      marker-yv: yv-n
    - type: text
      text: 'And I punished them often in every synagogue and compelled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to blaspheme; and being exceedingly enraged against them, I persecuted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' even to foreign cities.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Recounts His Conversion
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:3–8; 22:6–11; 26:12–18
      marker-yv: yv-n
    - type: text
      text: '“While thus occupied, as I journeyed to Damascus with authority and commission from the chief priests, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'at midday, O king, along the road I saw a light from heaven, brighter than the sun, shining around me and those who journeyed with me. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And when we all had fallen to the ground, I heard a voice speaking to me and saying in the Hebrew language, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '‘Saul, Saul, why are you persecuting Me? '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: It is
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' hard for you to kick against the goads.’'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So I said, ‘Who are You, Lord?’ And He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘I am Jesus, whom you are persecuting.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But rise and stand on your feet; for I have appeared to you for this purpose, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 22:15; Eph. 3:6–8
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to make you a minister and a witness both of the things which you have seen and of the things which I will yet reveal to you.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I will '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'deliver you from the '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jewish
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' people, as well as '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: from
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' the Gentiles, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 22:21
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'to whom I '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: now
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' send you,'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 35:5; 42:7, 16; Luke 1:79; (John 8:12; 2 Cor. 4:4); Eph. 1:18; 1 Thess. 5:5
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'to open their eyes, '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: in order
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 6:14; Eph. 4:18; 5:8; (Col. 1:13); 1 Pet. 2:9
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'to turn '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: them
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' from darkness to light, and '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: from
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' the power of Satan to God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 1:77
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'that they may receive forgiveness of sins and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 1:11; Col. 1:12
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'an inheritance among those who are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:32
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: sanctified
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' by faith in Me.’'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Post-Conversion Life
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“Therefore, King Agrippa, I was not disobedient to the heavenly vision, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“I think myself '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Pet. 3:14; 4:14)
      marker-yv: yv-n
    - type: text
      text: 'happy, King Agrippa, because today I shall answer '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Pet. 3:15, 16)
      marker-yv: yv-n
    - type: text
      text: 'for myself before you concerning all the things of which I am '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 21:28; 24:5, 6
      marker-yv: yv-n
    - type: text
      text: 'accused by the Jews, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:19, 20, 22; 11:26
      marker-yv: yv-n
    - type: text
      text: 'declared first to those in Damascus and in Jerusalem, and throughout all the region of Judea, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: then
    - type: text
      text: ' to the Gentiles, that they should repent, turn to God, and do '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 3:8; Luke 3:8
      marker-yv: yv-n
    - type: text
      text: 'works befitting repentance. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For these reasons the Jews seized me in the temple and tried to kill '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Therefore, having obtained help from God, to this day I stand, witnessing both to small and great, saying no other things than those '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:27; Acts 24:14; 28:23; Rom. 3:21
      marker-yv: yv-n
    - type: text
      text: 'which the prophets and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 5:46
      marker-yv: yv-n
    - type: text
      text: 'Moses said would come— '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:26
      marker-yv: yv-n
    - type: text
      text: 'that the Christ would suffer, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:20, 23; Col. 1:18; Rev. 1:5
      marker-yv: yv-n
    - type: text
      text: 'that He would be the first to rise from the dead, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 42:6; 49:6; Luke 2:32; 2 Cor. 4:4
      marker-yv: yv-n
    - type: text
      text: 'would proclaim light to the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jewish
    - type: text
      text: ' people and to the Gentiles.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Agrippa Parries Paul’s Challenge
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Now as he thus made his defense, Festus said with a loud voice, “Paul, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 9:11; John 10:20; (1 Cor. 1:23; 2:13, 14; 4:10)
      marker-yv: yv-n
    - type: text
      text: you are beside yourself! Much learning is driving you mad!”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But he said, “I am not mad, most noble Festus, but speak the words of truth and reason. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For the king, before whom I also speak freely, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 26:3
      marker-yv: yv-n
    - type: text
      text: 'knows these things; for I am convinced that none of these things escapes his attention, since this thing was not done in a corner. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: King Agrippa, do you believe the prophets? I know that you do believe.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Then Agrippa said to Paul, “You almost persuade me to become a Christian.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And Paul said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 7:7
      marker-yv: yv-n
    - type: text
      text: “I would to God that not only you, but also all who hear me today, might become both almost and altogether such as I am, except for these chains.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: especially because you are expert in all customs and questions which have to do with the Jews. Therefore I beg you to hear me patiently.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'When he had said these things, the king stood up, as well as the governor and Bernice and those who sat with them; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'and when they had gone aside, they talked among themselves, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 23:9, 29; 25:25
      marker-yv: yv-n
    - type: text
      text: “This man is doing nothing deserving of death or chains.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Then Agrippa said to Festus, “This man might have been set '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 28:18
      marker-yv: yv-n
    - type: text
      text: 'free '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 25:11
      marker-yv: yv-n
    - type: text
      text: if he had not appealed to Caesar.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“My manner of life from my youth, which was spent from the beginning among my own nation at Jerusalem, all the Jews know. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'They knew me from the first, if they were willing to testify, that according to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 22:3; 23:6; 24:15, 21); Phil. 3:5
      marker-yv: yv-n
    - type: text
      text: 'the strictest sect of our religion I lived a Pharisee. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 23:6
      marker-yv: yv-n
    - type: text
      text: 'And now I stand and am judged for the hope of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 3:15; 22:18; 26:4; 49:10; Deut. 18:15; 2 Sam. 7:12; Ps. 132:11; Is. 4:2; 7:14; 9:6; 40:10; Jer. 23:5; 33:14–16; Ezek. 34:23; 37:24; Dan. 9:24); Acts 13:32; Rom. 15:8; (Titus 2:13)
      marker-yv: yv-n
    - type: text
      text: 'the promise made by God to our fathers. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'To this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: promise
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: James 1:1
      marker-yv: yv-n
    - type: text
      text: 'our twelve tribes, earnestly serving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 2:37; 1 Thess. 3:10; 1 Tim. 5:5
      marker-yv: yv-n
    - type: text
      text: 'night and day, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 3:11
      marker-yv: yv-n
    - type: text
      text: 'hope to attain. For this hope’s sake, King Agrippa, I am accused by the Jews. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Why should it be thought incredible by you that God raises the dead?
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 16:2; 1 Cor. 15:9; 1 Tim. 1:12, 13
      marker-yv: yv-n
    - type: text
      text: '“Indeed, I myself thought I must do many things contrary to the name of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:22; 10:38
      marker-yv: yv-n
    - type: text
      text: 'Jesus of Nazareth. '
