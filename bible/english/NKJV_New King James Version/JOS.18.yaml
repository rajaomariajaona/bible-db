document_id: JOS.18,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Remainder of the Land Divided
  - type: text
    content: 'Now the whole congregation of the children of Israel assembled together '
  - type: note
    content: Josh. 19:51; 21:2; 22:9; Jer. 7:12
  - type: text
    content: 'at Shiloh, and '
  - type: note
    content: Judg. 18:31; 1 Sam. 1:3, 24; 4:3, 4
  - type: text
    content: 'set up the tabernacle of meeting there. And the land was subdued before them. '
  '10':
  - type: text
    content: 'Then Joshua cast '
  - type: note
    content: Acts 13:19
  - type: text
    content: 'lots for them in Shiloh before the '
  - type: heading
    content: Lord
  - type: text
    content: ', and there '
  - type: note
    content: Num. 34:16–29; Josh. 19:51
  - type: text
    content: Joshua divided the land to the children of Israel according to their divisions.
  - type: heading
    content: The Land of Benjamin
  '11':
  - type: note
    content: Judg. 1:21
  - type: text
    content: 'Now the lot of the tribe of the children of Benjamin came up according to their families, and the territory of their lot came out between the children of Judah and the children of Joseph. '
  '12':
  - type: note
    content: Josh. 16:1
  - type: text
    content: 'Their border on the north side began at the Jordan, and the border went up to the side of Jericho on the north, and went up through the mountains westward; it ended at the Wilderness of Beth Aven. '
  '13':
  - type: text
    content: 'The border went over from there toward Luz, to the side of Luz '
  - type: note
    content: Gen. 28:19; Josh. 16:2; Judg. 1:23
  - type: text
    content: '(which '
  - type: text
    content: is
  - type: text
    content: ' Bethel) southward; and the border descended to Ataroth Addar, near the hill that '
  - type: text
    content: lies
  - type: text
    content: ' on the south side '
  - type: note
    content: Josh. 16:3
  - type: text
    content: of Lower Beth Horon.
  '14':
  - type: text
    content: 'Then the border extended around the west side to the south, from the hill that '
  - type: text
    content: lies
  - type: text
    content: ' before Beth Horon southward; and it ended at '
  - type: note
    content: Josh. 15:9
  - type: text
    content: 'Kirjath Baal (which '
  - type: text
    content: is
  - type: text
    content: ' Kirjath Jearim), a city of the children of Judah. This '
  - type: text
    content: was
  - type: text
    content: ' the west side.'
  '15':
  - type: text
    content: 'The south side '
  - type: text
    content: began
  - type: text
    content: ' at the end of Kirjath Jearim, and the border extended on the west and went out to '
  - type: note
    content: Josh. 15:9
  - type: text
    content: 'the spring of the waters of Nephtoah. '
  '16':
  - type: text
    content: 'Then the border came down to the end of the mountain that '
  - type: text
    content: lies
  - type: text
    content: ' before '
  - type: note
    content: Josh. 15:8
  - type: text
    content: 'the Valley of the Son of Hinnom, which '
  - type: text
    content: is
  - type: text
    content: ' in the Valley of the Rephaim on the north, descended to the Valley of Hinnom, to the side of the Jebusite '
  - type: text
    content: city
  - type: text
    content: ' on the south, and descended to '
  - type: note
    content: Josh. 15:7
  - type: text
    content: 'En Rogel. '
  '17':
  - type: text
    content: 'And it went around from the north, went out to En Shemesh, and extended toward Geliloth, which is before the Ascent of Adummim, and descended to '
  - type: note
    content: Josh. 15:6
  - type: text
    content: 'the stone of Bohan the son of Reuben. '
  '18':
  - type: text
    content: 'Then it passed along toward the north side of Arabah, and went down to Arabah. '
  '19':
  - type: text
    content: 'And the border passed along to the north side of Beth Hoglah; then the border ended at the north bay at the '
  - type: note
    content: Josh. 15:2, 5
  - type: text
    content: 'Salt Sea, at the south end of the Jordan. This '
  - type: text
    content: was
  - type: text
    content: ' the southern boundary.'
  '2':
  - type: text
    content: But there remained among the children of Israel seven tribes which had not yet received their inheritance.
  '20':
  - type: text
    content: 'The Jordan was its border on the east side. This '
  - type: text
    content: was
  - type: text
    content: ' the inheritance of the children of Benjamin, according to its boundaries all around, according to their families.'
  '21':
  - type: text
    content: 'Now the cities of the tribe of the children of Benjamin, according to their families, were Jericho, Beth Hoglah, Emek Keziz, '
  '22':
  - type: text
    content: 'Beth Arabah, Zemaraim, Bethel, '
  '23':
  - type: text
    content: 'Avim, Parah, Ophrah, '
  '24':
  - type: text
    content: 'Chephar Haammoni, Ophni, and Gaba: twelve cities with their villages; '
  '25':
  - type: note
    content: Josh. 11:19; 21:17; 1 Kin. 3:4, 5
  - type: text
    content: 'Gibeon, '
  - type: note
    content: Jer. 31:15
  - type: text
    content: 'Ramah, Beeroth, '
  '26':
  - type: text
    content: 'Mizpah, Chephirah, Mozah, '
  '27':
  - type: text
    content: 'Rekem, Irpeel, Taralah, '
  '28':
  - type: text
    content: 'Zelah, Eleph, '
  - type: note
    content: Josh. 15:8, 63
  - type: text
    content: 'Jebus (which '
  - type: text
    content: is
  - type: text
    content: ' Jerusalem), Gibeath, '
  - type: text
    content: and
  - type: text
    content: ' Kirjath: fourteen cities with their villages. This was the inheritance of the children of Benjamin according to their families.'
  '3':
  - type: text
    content: 'Then Joshua said to the children of Israel: '
  - type: note
    content: Judg. 18:9
  - type: text
    content: '“How long will you neglect to go and possess the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of your fathers has given you? '
  '4':
  - type: text
    content: 'Pick out from among you three men for '
  - type: text
    content: each
  - type: text
    content: ' tribe, and I will send them; they shall rise and go through the land, survey it according to their inheritance, and come '
  - type: text
    content: back
  - type: text
    content: ' to me. '
  '5':
  - type: text
    content: 'And they shall divide it into seven parts. '
  - type: note
    content: Josh. 15:1
  - type: text
    content: 'Judah shall remain in their territory on the south, and the '
  - type: note
    content: Josh. 16:1—17:18
  - type: text
    content: 'house of Joseph shall remain in their territory on the north. '
  '6':
  - type: text
    content: 'You shall therefore survey the land in seven parts and bring '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: survey
  - type: text
    content: ' here to me, '
  - type: note
    content: Josh. 14:2; 18:10
  - type: text
    content: 'that I may cast lots for you here before the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God. '
  '7':
  - type: note
    content: Num. 18:7, 20; Josh. 13:33
  - type: text
    content: 'But the Levites have no part among you, for the priesthood of the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' their inheritance. '
  - type: note
    content: Josh. 13:8
  - type: text
    content: 'And Gad, Reuben, and half the tribe of Manasseh have received their inheritance beyond the Jordan on the east, which Moses the servant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' gave them.”'
  '8':
  - type: text
    content: 'Then the men arose to go away; and Joshua charged those who went to survey the land, saying, “Go, walk '
  - type: note
    content: Gen. 13:17
  - type: text
    content: 'through the land, survey it, and come back to me, that I may cast lots for you here before the '
  - type: heading
    content: Lord
  - type: text
    content: ' in Shiloh.” '
  '9':
  - type: text
    content: 'So the men went, passed through the land, and wrote the survey in a book in seven parts by cities; and they came to Joshua at the camp in Shiloh. '
