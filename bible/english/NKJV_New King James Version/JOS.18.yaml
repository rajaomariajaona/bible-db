document_id: JOS.18,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Remainder of the Land Divided
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now the whole congregation of the children of Israel assembled together '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:51; 21:2; 22:9; Jer. 7:12
      marker-yv: yv-n
    - type: text
      text: 'at Shiloh, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 18:31; 1 Sam. 1:3, 24; 4:3, 4
      marker-yv: yv-n
    - type: text
      text: 'set up the tabernacle of meeting there. And the land was subdued before them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then Joshua cast '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:19
      marker-yv: yv-n
    - type: text
      text: 'lots for them in Shiloh before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and there '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 34:16–29; Josh. 19:51
      marker-yv: yv-n
    - type: text
      text: Joshua divided the land to the children of Israel according to their divisions.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land of Benjamin
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:21
      marker-yv: yv-n
    - type: text
      text: 'Now the lot of the tribe of the children of Benjamin came up according to their families, and the territory of their lot came out between the children of Judah and the children of Joseph. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 16:1
      marker-yv: yv-n
    - type: text
      text: 'Their border on the north side began at the Jordan, and the border went up to the side of Jericho on the north, and went up through the mountains westward; it ended at the Wilderness of Beth Aven. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The border went over from there toward Luz, to the side of Luz '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 28:19; Josh. 16:2; Judg. 1:23
      marker-yv: yv-n
    - type: text
      text: '(which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Bethel) southward; and the border descended to Ataroth Addar, near the hill that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lies
    - type: text
      text: ' on the south side '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 16:3
      marker-yv: yv-n
    - type: text
      text: of Lower Beth Horon.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then the border extended around the west side to the south, from the hill that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lies
    - type: text
      text: ' before Beth Horon southward; and it ended at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:9
      marker-yv: yv-n
    - type: text
      text: 'Kirjath Baal (which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Kirjath Jearim), a city of the children of Judah. This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the west side.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The south side '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' at the end of Kirjath Jearim, and the border extended on the west and went out to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:9
      marker-yv: yv-n
    - type: text
      text: 'the spring of the waters of Nephtoah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then the border came down to the end of the mountain that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lies
    - type: text
      text: ' before '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:8
      marker-yv: yv-n
    - type: text
      text: 'the Valley of the Son of Hinnom, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in the Valley of the Rephaim on the north, descended to the Valley of Hinnom, to the side of the Jebusite '
    - type: usfm
      marker: it
      children:
      - type: text
        text: city
    - type: text
      text: ' on the south, and descended to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:7
      marker-yv: yv-n
    - type: text
      text: 'En Rogel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And it went around from the north, went out to En Shemesh, and extended toward Geliloth, which is before the Ascent of Adummim, and descended to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:6
      marker-yv: yv-n
    - type: text
      text: 'the stone of Bohan the son of Reuben. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then it passed along toward the north side of Arabah, and went down to Arabah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the border passed along to the north side of Beth Hoglah; then the border ended at the north bay at the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:2, 5
      marker-yv: yv-n
    - type: text
      text: 'Salt Sea, at the south end of the Jordan. This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the southern boundary.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: But there remained among the children of Israel seven tribes which had not yet received their inheritance.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The Jordan was its border on the east side. This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the inheritance of the children of Benjamin, according to its boundaries all around, according to their families.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Now the cities of the tribe of the children of Benjamin, according to their families, were Jericho, Beth Hoglah, Emek Keziz, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Beth Arabah, Zemaraim, Bethel, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Avim, Parah, Ophrah, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Chephar Haammoni, Ophni, and Gaba: twelve cities with their villages; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 11:19; 21:17; 1 Kin. 3:4, 5
      marker-yv: yv-n
    - type: text
      text: 'Gibeon, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 31:15
      marker-yv: yv-n
    - type: text
      text: 'Ramah, Beeroth, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Mizpah, Chephirah, Mozah, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Rekem, Irpeel, Taralah, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Zelah, Eleph, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:8, 63
      marker-yv: yv-n
    - type: text
      text: 'Jebus (which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Jerusalem), Gibeath, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Kirjath: fourteen cities with their villages. This was the inheritance of the children of Benjamin according to their families.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then Joshua said to the children of Israel: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 18:9
      marker-yv: yv-n
    - type: text
      text: '“How long will you neglect to go and possess the land which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of your fathers has given you? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Pick out from among you three men for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: each
    - type: text
      text: ' tribe, and I will send them; they shall rise and go through the land, survey it according to their inheritance, and come '
    - type: usfm
      marker: it
      children:
      - type: text
        text: back
    - type: text
      text: ' to me. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And they shall divide it into seven parts. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:1
      marker-yv: yv-n
    - type: text
      text: 'Judah shall remain in their territory on the south, and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 16:1—17:18
      marker-yv: yv-n
    - type: text
      text: 'house of Joseph shall remain in their territory on the north. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'You shall therefore survey the land in seven parts and bring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: survey
    - type: text
      text: ' here to me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 14:2; 18:10
      marker-yv: yv-n
    - type: text
      text: 'that I may cast lots for you here before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 18:7, 20; Josh. 13:33
      marker-yv: yv-n
    - type: text
      text: 'But the Levites have no part among you, for the priesthood of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' their inheritance. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 13:8
      marker-yv: yv-n
    - type: text
      text: 'And Gad, Reuben, and half the tribe of Manasseh have received their inheritance beyond the Jordan on the east, which Moses the servant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave them.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then the men arose to go away; and Joshua charged those who went to survey the land, saying, “Go, walk '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 13:17
      marker-yv: yv-n
    - type: text
      text: 'through the land, survey it, and come back to me, that I may cast lots for you here before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in Shiloh.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So the men went, passed through the land, and wrote the survey in a book in seven parts by cities; and they came to Joshua at the camp in Shiloh. '
