  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Safety of Abiding in the Presence of God
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 27:5; 31:20; 32:7
      marker-yv: yv-n
    - type: text
      text: who dwells in the secret place of the Most High
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Shall abide '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 17:8; Is. 25:4; 32:2
      marker-yv: yv-n
    - type: text
      text: under the shadow of the Almighty.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 12:21)
      marker-yv: yv-n
    - type: text
      text: No evil shall befall you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor shall any plague come near your dwelling;
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 34:7; Matt. 4:6; Luke 4:10; (Heb. 1:14)
      marker-yv: yv-n
    - type: text
      text: For He shall give His angels charge over you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To keep you in all your ways.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' hands they shall bear you up,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 4:6; Luke 4:11
      marker-yv: yv-n
    - type: text
      text: Lest you dash your foot against a stone.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You shall tread upon the lion and the cobra,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The young lion and the serpent you shall trample underfoot.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because he has set his love upon Me, therefore I will deliver him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will set him on high, because he has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 9:10)
      marker-yv: yv-n
    - type: text
      text: known My name.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 12:4; Ps. 50:15
      marker-yv: yv-n
    - type: text
      text: call upon Me, and I will answer him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 43:2
      marker-yv: yv-n
    - type: text
      text: with him in trouble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will deliver him and honor him.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With long life I will satisfy him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And show him My salvation.”
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 142:5
      marker-yv: yv-n
    - type: text
      text: 'I will say of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: “He is
    - type: text
      text: ' my refuge and my fortress;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My God, in Him I will trust.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Surely '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 124:7; Prov. 6:5
      marker-yv: yv-n
    - type: text
      text: He shall deliver you from the snare of the fowler
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' from the perilous pestilence.'
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 17:8
      marker-yv: yv-n
    - type: text
      text: He shall cover you with His feathers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And under His wings you shall take refuge;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' shield and buckler.'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 5:19; Ps. 112:7; Is. 43:2)
      marker-yv: yv-n
    - type: text
      text: You shall not be afraid of the terror by night,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nor
    - type: text
      text: ' of the arrow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' flies by day,'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nor
    - type: text
      text: ' of the pestilence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' walks in darkness,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nor
    - type: text
      text: ' of the destruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' lays waste at noonday.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A thousand may fall at your side,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And ten thousand at your right hand;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But
    - type: text
      text: ' it shall not come near you.'
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Only '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:34; Mal. 1:5
      marker-yv: yv-n
    - type: text
      text: with your eyes shall you look,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And see the reward of the wicked.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because you have made the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 91:2
      marker-yv: yv-n
    - type: text
      text: my refuge,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Even
    - type: text
      text: ' the Most High, '
    - type: usfm
