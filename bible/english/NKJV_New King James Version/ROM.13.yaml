  - type: text
    content: 'the authority resists the ordinance of God, and those who resist will bring judgment on themselves. '
  '3':
  - type: text
    content: 'For rulers are not a terror to good works, but to evil. Do you want to be unafraid of the authority? '
  - type: note
    content: 1 Pet. 2:14
  - type: text
    content: 'Do what is good, and you will have praise from the same. '
  '4':
  - type: text
    content: 'For he is God’s minister to you for good. But if you do evil, be afraid; for he does not bear the sword in vain; for he is God’s minister, an avenger to '
  - type: text
