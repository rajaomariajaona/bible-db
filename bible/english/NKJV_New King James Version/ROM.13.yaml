  - type: text
    text: 'Render therefore to all their due: taxes to whom taxes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: due,
  - type: text
    text: ' customs to whom customs, fear to whom fear, honor to whom honor.'
