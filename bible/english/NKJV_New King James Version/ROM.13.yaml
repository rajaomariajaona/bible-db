  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For rulers are not a terror to good works, but to evil. Do you want to be unafraid of the authority? '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Pet. 2:14
    marker-yv: yv-n
  - type: text
    text: 'Do what is good, and you will have praise from the same. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For he is God’s minister to you for good. But if you do evil, be afraid; for he does not bear the sword in vain; for he is God’s minister, an avenger to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: execute
  - type: text
    text: ' wrath on him who practices evil. '
  - type: usfm
    marker: v
    metadata:
