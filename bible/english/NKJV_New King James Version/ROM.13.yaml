    children:
    - type: text
      text: Titus 3:1; 1 Pet. 2:13
    marker-yv: yv-n
  - type: text
    text: 'subject to the governing authorities. For there is no authority except from God, and the authorities that exist are appointed by God. '
  - type: usfm
