  '20':
  - type: text
    content: '“But '
  - type: note
    content: Ex. 10:19
  - type: text
    content: 'I will remove far from you '
  - type: note
    content: Jer. 1:14, 15
  - type: text
    content: 'the northern '
  - type: text
    content: army,
  - type: text
    content: And will drive him away into a barren and desolate land,
  - type: text
