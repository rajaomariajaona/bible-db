  - type: text
    content: And the chewing locust,
  - type: text
    content: My great army which I sent among you.
  '26':
  - type: text
    content: 'You shall '
  - type: note
    content: Lev. 26:5; Deut. 11:15; Is. 62:9
  - type: text
    content: eat in plenty and be satisfied,
  - type: text
    content: 'And praise the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
