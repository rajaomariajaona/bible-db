  - type: text
    content: ' calls.'
  '4':
  - type: note
    content: Rev. 9:7
  - type: text
    content: Their appearance is like the appearance of horses;
  - type: text
    content: And like swift steeds, so they run.
  '5':
  - type: note
    content: Rev. 9:9
  - type: text
    content: With a noise like chariots
  - type: text
    content: Over mountaintops they leap,
  - type: text
    content: Like the noise of a flaming fire that devours the stubble,
  - type: text
    content: Like a strong people set in battle array.
  '6':
  - type: text
