  - type: note
    content: Is. 13:8; Jer. 8:21; Lam. 4:8; Nah. 2:10
  - type: text
    content: All faces are drained of color.
  '7':
  - type: text
    content: They run like mighty men,
  - type: text
    content: They climb the wall like men of war;
  - type: text
    content: Every one marches in formation,
  - type: text
    content: 'And they do not break '
  - type: note
    content: Prov. 30:27
  - type: text
    content: ranks.
  '8':
  - type: text
    content: They do not push one another;
  - type: text
    content: Every one marches in his own column.
  - type: text
    content: Though they lunge between the weapons,
  - type: text
    content: They are not cut down.
  '9':
  - type: text
    content: They run to and fro in the city,
  - type: text
    content: They run on the wall;
  - type: text
    content: They climb into the houses,
  - type: text
    content: 'They '
  - type: note
    content: Jer. 9:21
  - type: text
    content: 'enter at the windows '
  - type: note
