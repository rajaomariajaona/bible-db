  - type: text
    content: grain and new wine and oil,
  - type: text
    content: And you will be satisfied by them;
  - type: text
    content: I will no longer make you a reproach among the nations.
  '2':
  - type: note
    content: Joel 2:10, 31; Amos 5:18; Zeph. 1:15
  - type: text
    content: A day of darkness and gloominess,
  - type: text
    content: A day of clouds and thick darkness,
  - type: text
    content: 'Like the morning '
  - type: text
    content: clouds
  - type: text
    content: ' spread over the mountains.'
  - type: note
    content: Joel 1:6; 2:11, 25
  - type: text
    content: 'A people '
  - type: text
    content: come,
  - type: text
    content: ' great and strong,'
