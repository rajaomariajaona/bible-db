  - type: text
    content: His stench will come up,
  - type: text
    content: And his foul odor will rise,
  - type: text
    content: Because he has done monstrous things.”
  '21':
  - type: text
    content: Fear not, O land;
  - type: text
    content: Be glad and rejoice,
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' has done marvelous things!'
