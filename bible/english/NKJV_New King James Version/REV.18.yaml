document_id: REV.18,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Babylon the Great
  - type: text
    content: After
  - type: note
    content: Rev. 17:1, 7
  - type: text
    content: ' these things I saw another angel coming down from heaven, having great authority, '
  - type: note
    content: Ezek. 43:2
  - type: text
    content: 'and the earth was illuminated with his glory. '
  '10':
  - type: text
    content: 'standing at a distance for fear of her torment, saying, '
  - type: note
    content: Is. 21:9
  - type: text
    content: '‘Alas, alas, that great city Babylon, that mighty city! '
  - type: note
    content: Rev. 18:17, 19
  - type: text
    content: For in one hour your judgment has come.’
  '11':
  - type: text
    content: '“And '
  - type: note
    content: Ezek. 27:27–34
  - type: text
    content: 'the merchants of the earth will weep and mourn over her, for no one buys their merchandise anymore: '
  '12':
  - type: note
    content: Ezek. 27:12–22; Rev. 17:4
  - type: text
    content: 'merchandise of gold and silver, precious stones and pearls, fine linen and purple, silk and scarlet, every kind of citron wood, every kind of object of ivory, every kind of object of most precious wood, bronze, iron, and marble; '
  '13':
  - type: text
    content: 'and cinnamon and incense, fragrant oil and frankincense, wine and oil, fine flour and wheat, cattle and sheep, horses and chariots, and bodies and '
  - type: note
    content: 1 Chr. 5:21; Ezek. 27:13
  - type: text
    content: 'souls of men. '
  '14':
  - type: text
    content: 'The fruit that your soul longed for has gone from you, and all the things which are rich and splendid have gone from you, and you shall find them no more at all. '
  '15':
  - type: text
    content: 'The merchants of these things, who became rich by her, will stand at a distance for fear of her torment, weeping and wailing, '
  '16':
  - type: text
    content: 'and saying, ‘Alas, alas, '
  - type: note
    content: Rev. 17:18
  - type: text
    content: 'that great city '
  - type: note
    content: Rev. 17:4
  - type: text
    content: 'that was clothed in fine linen, purple, and scarlet, and adorned with gold and precious stones and pearls! '
  '17':
  - type: note
    content: Rev. 18:10
  - type: text
    content: 'For in one hour such great riches came to nothing.’ '
  - type: note
    content: Is. 23:14
  - type: text
    content: 'Every shipmaster, all who travel by ship, sailors, and as many as trade on the sea, stood at a distance '
  '18':
  - type: note
    content: Ezek. 27:30
  - type: text
    content: 'and cried out when they saw the smoke of her burning, saying, '
  - type: note
    content: Rev. 13:4
  - type: text
    content: '‘What '
  - type: text
    content: is
  - type: text
    content: ' like this great city?’'
  '19':
  - type: note
    content: Josh. 7:6; Job 2:12; Lam. 2:10; Ezek. 27:30
  - type: text
    content: '“They threw dust on their heads and cried out, weeping and wailing, and saying, ‘Alas, alas, that great city, in which all who had ships on the sea became rich by her wealth! '
  - type: note
    content: Rev. 18:8
  - type: text
    content: For in one hour she is made desolate.’
  '2':
  - type: text
    content: 'And he cried mightily with a loud voice, saying, '
  - type: note
    content: Is. 13:19; 21:9; Jer. 51:8; Rev. 14:8
  - type: text
    content: '“Babylon the great is fallen, is fallen, and '
  - type: note
    content: Is. 13:21; 34:11, 13–15; Jer. 50:39; 51:37; Zeph. 2:14
  - type: text
    content: 'has become a dwelling place of demons, a prison for every foul spirit, and '
  - type: note
    content: Is. 14:23
  - type: text
    content: 'a cage for every unclean and hated bird! '
  '20':
  - type: note
    content: Is. 44:23; 49:13; Jer. 51:48; Rev. 12:12
  - type: text
    content: '“Rejoice over her, O heaven, and '
  - type: text
    content: you
  - type: text
    content: ' holy apostles and prophets, for '
  - type: note
    content: Luke 11:49; Rev. 19:2
  - type: text
    content: God has avenged you on her!”
  - type: heading
    content: Finality of Babylon’s Fall
  '21':
  - type: text
    content: 'Then a mighty angel took up a stone like a great millstone and threw '
  - type: text
    content: it
  - type: text
    content: ' into the sea, saying, '
  - type: note
    content: Jer. 51:63, 64
  - type: text
    content: '“Thus with violence the great city Babylon shall be thrown down, and '
  - type: note
    content: Rev. 12:8; 16:20
  - type: text
    content: 'shall not be found anymore. '
  '22':
  - type: note
    content: Eccl. 12:4; Jer. 7:34; 16:9; 25:10; Rev. 14:1–3
  - type: text
    content: 'The sound of harpists, musicians, flutists, and trumpeters shall not be heard in you anymore. No craftsman of any craft shall be found in you anymore, and the sound of a millstone shall not be heard in you anymore. '
  '23':
  - type: note
    content: Jer. 25:10
  - type: text
    content: 'The light of a lamp shall not shine in you anymore, '
  - type: note
    content: Jer. 7:34; 16:9
  - type: text
    content: 'and the voice of bridegroom and bride shall not be heard in you anymore. For '
  - type: note
    content: Is. 23:8; Rev. 6:15; 18:3
  - type: text
    content: 'your merchants were the great men of the earth, '
  - type: note
    content: 2 Kin. 9:22
  - type: text
    content: 'for by your sorcery all the nations were deceived. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: Rev. 16:6; 17:6
  - type: text
    content: 'in her was found the blood of prophets and saints, and of all who '
  - type: note
    content: Jer. 51:49
  - type: text
    content: were slain on the earth.”
  '3':
  - type: text
    content: 'For all the nations '
  - type: note
    content: Jer. 51:7; Rev. 14:8
  - type: text
    content: 'have drunk of the wine of the wrath of her fornication, the kings of the earth have committed fornication with her, '
  - type: note
    content: Is. 47:15
  - type: text
    content: and the merchants of the earth have become rich through the abundance of her luxury.”
  '4':
  - type: text
    content: 'And I heard another voice from heaven saying, '
  - type: note
    content: Is. 48:20
  - type: text
    content: '“Come out of her, my people, lest you share in her sins, and lest you receive of her plagues. '
  '5':
  - type: note
    content: Gen. 18:20
  - type: text
    content: 'For her sins have reached to heaven, and '
  - type: note
    content: Rev. 16:19
  - type: text
    content: 'God has remembered her iniquities. '
  '6':
  - type: note
    content: Ps. 137:8; Jer. 50:15, 29
  - type: text
    content: 'Render to her just as she rendered to you, and repay her double according to her works; '
  - type: note
    content: Rev. 14:10
  - type: text
    content: 'in the cup which she has mixed, '
  - type: note
    content: Rev. 16:19
  - type: text
    content: 'mix double for her. '
  '7':
  - type: note
    content: Ezek. 28:2–8
  - type: text
    content: 'In the measure that she glorified herself and lived luxuriously, in the same measure give her torment and sorrow; for she says in her heart, ‘I sit '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: note
    content: Is. 47:7, 8; Zeph. 2:15
  - type: text
    content: 'queen, and am no widow, and will not see sorrow.’ '
  '8':
  - type: text
    content: 'Therefore her plagues will come '
  - type: note
    content: Is. 47:9; Jer. 50:31; Rev. 18:10
  - type: text
    content: 'in one day—death and mourning and famine. And '
  - type: note
    content: Rev. 17:16
  - type: text
    content: 'she will be utterly burned with fire, '
  - type: note
    content: Jer. 50:34; Heb. 10:31; Rev. 11:17
  - type: text
    content: 'for strong '
  - type: text
    content: is
  - type: text
    content: ' the Lord God who judges her.'
  - type: heading
    content: The World Mourns Babylon’s Fall
  '9':
  - type: note
    content: Ezek. 26:16; 27:35
  - type: text
    content: '“The kings of the earth who committed fornication and lived luxuriously with her '
  - type: note
    content: Jer. 50:46; Rev. 17:2; 18:3
  - type: text
    content: 'will weep and lament for her, '
  - type: note
    content: Rev. 19:3
  - type: text
    content: 'when they see the smoke of her burning, '
