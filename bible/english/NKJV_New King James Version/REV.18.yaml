document_id: REV.18,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Fall of Babylon the Great
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: After
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 17:1, 7
      marker-yv: yv-n
    - type: text
      text: ' these things I saw another angel coming down from heaven, having great authority, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 43:2
      marker-yv: yv-n
    - type: text
      text: 'and the earth was illuminated with his glory. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'standing at a distance for fear of her torment, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 21:9
      marker-yv: yv-n
    - type: text
      text: '‘Alas, alas, that great city Babylon, that mighty city! '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 18:17, 19
      marker-yv: yv-n
    - type: text
      text: For in one hour your judgment has come.’
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 27:27–34
      marker-yv: yv-n
    - type: text
      text: 'the merchants of the earth will weep and mourn over her, for no one buys their merchandise anymore: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 27:12–22; Rev. 17:4
      marker-yv: yv-n
    - type: text
      text: 'merchandise of gold and silver, precious stones and pearls, fine linen and purple, silk and scarlet, every kind of citron wood, every kind of object of ivory, every kind of object of most precious wood, bronze, iron, and marble; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and cinnamon and incense, fragrant oil and frankincense, wine and oil, fine flour and wheat, cattle and sheep, horses and chariots, and bodies and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 5:21; Ezek. 27:13
      marker-yv: yv-n
    - type: text
      text: 'souls of men. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The fruit that your soul longed for has gone from you, and all the things which are rich and splendid have gone from you, and you shall find them no more at all. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The merchants of these things, who became rich by her, will stand at a distance for fear of her torment, weeping and wailing, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'and saying, ‘Alas, alas, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 17:18
      marker-yv: yv-n
    - type: text
      text: 'that great city '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 17:4
      marker-yv: yv-n
    - type: text
      text: 'that was clothed in fine linen, purple, and scarlet, and adorned with gold and precious stones and pearls! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 18:10
      marker-yv: yv-n
    - type: text
      text: 'For in one hour such great riches came to nothing.’ '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 23:14
      marker-yv: yv-n
    - type: text
      text: 'Every shipmaster, all who travel by ship, sailors, and as many as trade on the sea, stood at a distance '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 27:30
      marker-yv: yv-n
    - type: text
      text: 'and cried out when they saw the smoke of her burning, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 13:4
      marker-yv: yv-n
    - type: text
      text: '‘What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' like this great city?’'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 7:6; Job 2:12; Lam. 2:10; Ezek. 27:30
      marker-yv: yv-n
    - type: text
      text: '“They threw dust on their heads and cried out, weeping and wailing, and saying, ‘Alas, alas, that great city, in which all who had ships on the sea became rich by her wealth! '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 18:8
      marker-yv: yv-n
    - type: text
      text: For in one hour she is made desolate.’
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he cried mightily with a loud voice, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 13:19; 21:9; Jer. 51:8; Rev. 14:8
      marker-yv: yv-n
    - type: text
      text: '“Babylon the great is fallen, is fallen, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 13:21; 34:11, 13–15; Jer. 50:39; 51:37; Zeph. 2:14
      marker-yv: yv-n
    - type: text
      text: 'has become a dwelling place of demons, a prison for every foul spirit, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 14:23
      marker-yv: yv-n
    - type: text
      text: 'a cage for every unclean and hated bird! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 44:23; 49:13; Jer. 51:48; Rev. 12:12
      marker-yv: yv-n
    - type: text
      text: '“Rejoice over her, O heaven, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' holy apostles and prophets, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 11:49; Rev. 19:2
      marker-yv: yv-n
    - type: text
      text: God has avenged you on her!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Finality of Babylon’s Fall
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then a mighty angel took up a stone like a great millstone and threw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' into the sea, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 51:63, 64
      marker-yv: yv-n
    - type: text
      text: '“Thus with violence the great city Babylon shall be thrown down, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 12:8; 16:20
      marker-yv: yv-n
    - type: text
      text: 'shall not be found anymore. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 12:4; Jer. 7:34; 16:9; 25:10; Rev. 14:1–3
      marker-yv: yv-n
    - type: text
      text: 'The sound of harpists, musicians, flutists, and trumpeters shall not be heard in you anymore. No craftsman of any craft shall be found in you anymore, and the sound of a millstone shall not be heard in you anymore. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 25:10
      marker-yv: yv-n
    - type: text
      text: 'The light of a lamp shall not shine in you anymore, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 7:34; 16:9
      marker-yv: yv-n
    - type: text
      text: 'and the voice of bridegroom and bride shall not be heard in you anymore. For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 23:8; Rev. 6:15; 18:3
      marker-yv: yv-n
    - type: text
      text: 'your merchants were the great men of the earth, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 9:22
      marker-yv: yv-n
    - type: text
      text: 'for by your sorcery all the nations were deceived. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 16:6; 17:6
      marker-yv: yv-n
    - type: text
      text: 'in her was found the blood of prophets and saints, and of all who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 51:49
      marker-yv: yv-n
    - type: text
      text: were slain on the earth.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For all the nations '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 51:7; Rev. 14:8
      marker-yv: yv-n
    - type: text
      text: 'have drunk of the wine of the wrath of her fornication, the kings of the earth have committed fornication with her, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 47:15
      marker-yv: yv-n
    - type: text
      text: and the merchants of the earth have become rich through the abundance of her luxury.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And I heard another voice from heaven saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 48:20
      marker-yv: yv-n
    - type: text
      text: '“Come out of her, my people, lest you share in her sins, and lest you receive of her plagues. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 18:20
      marker-yv: yv-n
    - type: text
      text: 'For her sins have reached to heaven, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 16:19
      marker-yv: yv-n
    - type: text
      text: 'God has remembered her iniquities. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 137:8; Jer. 50:15, 29
      marker-yv: yv-n
    - type: text
      text: 'Render to her just as she rendered to you, and repay her double according to her works; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 14:10
      marker-yv: yv-n
    - type: text
      text: 'in the cup which she has mixed, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 16:19
      marker-yv: yv-n
    - type: text
      text: 'mix double for her. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 28:2–8
      marker-yv: yv-n
    - type: text
      text: 'In the measure that she glorified herself and lived luxuriously, in the same measure give her torment and sorrow; for she says in her heart, ‘I sit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 47:7, 8; Zeph. 2:15
      marker-yv: yv-n
    - type: text
      text: 'queen, and am no widow, and will not see sorrow.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Therefore her plagues will come '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 47:9; Jer. 50:31; Rev. 18:10
      marker-yv: yv-n
    - type: text
      text: 'in one day—death and mourning and famine. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 17:16
      marker-yv: yv-n
    - type: text
      text: 'she will be utterly burned with fire, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 50:34; Heb. 10:31; Rev. 11:17
      marker-yv: yv-n
    - type: text
      text: 'for strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the Lord God who judges her.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The World Mourns Babylon’s Fall
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 26:16; 27:35
      marker-yv: yv-n
    - type: text
      text: '“The kings of the earth who committed fornication and lived luxuriously with her '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 50:46; Rev. 17:2; 18:3
      marker-yv: yv-n
    - type: text
      text: 'will weep and lament for her, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 19:3
      marker-yv: yv-n
    - type: text
      text: 'when they see the smoke of her burning, '
