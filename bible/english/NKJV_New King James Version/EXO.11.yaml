  '1':
  - type: heading
    content: Death of the Firstborn Announced
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses, “I will bring one more plague on Pharaoh and on Egypt. '
  - type: note
    content: Ex. 12:31, 33, 39
  - type: text
    content: 'Afterward he will let you go from here. '
  - type: note
    content: Ex. 6:1; 12:39
  - type: text
    content: 'When he lets '
  - type: text
    content: you
  - type: text
    content: ' go, he will surely drive you out of here altogether. '
  '10':
  - type: text
    content: 'So Moses and Aaron did all these wonders before Pharaoh; '
  - type: note
    content: Ex. 7:3; 9:12; 10:1, 20, 27; Josh. 11:20; Is. 63:17; John 12:40; Rom. 2:5
  - type: text
    content: 'and the '
  - type: heading
    content: Lord
  - type: text
    content: ' hardened Pharaoh’s heart, and he did not let the children of Israel go out of his land.'
  '2':
  - type: text
    content: 'Speak now in the hearing of the people, and let every man ask from his neighbor and every woman from her neighbor, articles of silver and '
  - type: note
    content: Ex. 3:22; 12:35, 36
  - type: text
    content: 'articles of gold.” '
  '3':
  - type: note
    content: Ex. 3:21; 12:36; Ps. 106:46
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' gave the people favor in the sight of the Egyptians. Moreover the man '
  - type: note
    content: Deut. 34:10–12; 2 Sam. 7:9; Esth. 9:4
  - type: text
    content: 'Moses '
  - type: text
    content: was
  - type: text
    content: ' very great in the land of Egypt, in the sight of Pharaoh’s servants and in the sight of the people.'
  '4':
  - type: text
    content: 'Then Moses said, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: Ex. 12:12, 23, 29
  - type: text
    content: '‘About midnight I will go out into the midst of Egypt; '
  '5':
  - type: text
    content: 'and '
  - type: note
    content: Ex. 4:23; 12:12, 29; Ps. 78:51; 105:36; 135:8; 136:10; Amos 4:10
  - type: text
    content: 'all the firstborn in the land of Egypt shall die, from the firstborn of Pharaoh who sits on his throne, even to the firstborn of the female servant who '
  - type: text
    content: is
  - type: text
    content: ' behind the handmill, and all the firstborn of the animals. '
  '6':
  - type: note
    content: Ex. 12:30; Amos 5:17
  - type: text
    content: 'Then there shall be a great cry throughout all the land of Egypt, '
  - type: note
    content: Ex. 10:14
  - type: text
    content: 'such as was not like it '
  - type: text
    content: before,
  - type: text
    content: ' nor shall be like it again. '
  '7':
  - type: note
    content: Ex. 8:22
  - type: text
    content: 'But against none of the children of Israel '
  - type: note
    content: Josh. 10:21
  - type: text
    content: 'shall a dog move its tongue, against man or beast, that you may know that the '
  - type: heading
    content: Lord
  - type: text
    content: ' does make a difference between the Egyptians and Israel.’ '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 12:31–33
  - type: text
    content: 'all these your servants shall come down to me and bow down to me, saying, ‘Get out, and all the people who follow you!’ After that I will go out.” '
  - type: note
    content: Ex. 10:29; Heb. 11:27
  - type: text
    content: Then he went out from Pharaoh in great anger.
  '9':
  - type: text
    content: 'But the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: Ex. 3:19; 7:4; 10:1
  - type: text
    content: '“Pharaoh will not heed you, so that '
  - type: note
    content: Ex. 7:3; 9:16
  - type: text
    content: 'My wonders may be multiplied in the land of Egypt.” '
