document_id: EXO.11,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Death of the Firstborn Announced
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “I will bring one more plague on Pharaoh and on Egypt. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:31, 33, 39
      marker-yv: yv-n
    - type: text
      text: 'Afterward he will let you go from here. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 6:1; 12:39
      marker-yv: yv-n
    - type: text
      text: 'When he lets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' go, he will surely drive you out of here altogether. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses and Aaron did all these wonders before Pharaoh; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 7:3; 9:12; 10:1, 20, 27; Josh. 11:20; Is. 63:17; John 12:40; Rom. 2:5
      marker-yv: yv-n
    - type: text
      text: 'and the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' hardened Pharaoh’s heart, and he did not let the children of Israel go out of his land.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Speak now in the hearing of the people, and let every man ask from his neighbor and every woman from her neighbor, articles of silver and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 3:22; 12:35, 36
      marker-yv: yv-n
    - type: text
      text: 'articles of gold.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 3:21; 12:36; Ps. 106:46
      marker-yv: yv-n
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave the people favor in the sight of the Egyptians. Moreover the man '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 34:10–12; 2 Sam. 7:9; Esth. 9:4
      marker-yv: yv-n
    - type: text
      text: 'Moses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' very great in the land of Egypt, in the sight of Pharaoh’s servants and in the sight of the people.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said, “Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:12, 23, 29
      marker-yv: yv-n
    - type: text
      text: '‘About midnight I will go out into the midst of Egypt; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 4:23; 12:12, 29; Ps. 78:51; 105:36; 135:8; 136:10; Amos 4:10
      marker-yv: yv-n
    - type: text
      text: 'all the firstborn in the land of Egypt shall die, from the firstborn of Pharaoh who sits on his throne, even to the firstborn of the female servant who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' behind the handmill, and all the firstborn of the animals. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:30; Amos 5:17
      marker-yv: yv-n
    - type: text
      text: 'Then there shall be a great cry throughout all the land of Egypt, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 10:14
      marker-yv: yv-n
    - type: text
      text: 'such as was not like it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: before,
    - type: text
      text: ' nor shall be like it again. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 8:22
      marker-yv: yv-n
    - type: text
      text: 'But against none of the children of Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 10:21
      marker-yv: yv-n
    - type: text
      text: 'shall a dog move its tongue, against man or beast, that you may know that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' does make a difference between the Egyptians and Israel.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:31–33
      marker-yv: yv-n
    - type: text
      text: 'all these your servants shall come down to me and bow down to me, saying, ‘Get out, and all the people who follow you!’ After that I will go out.” '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 10:29; Heb. 11:27
      marker-yv: yv-n
    - type: text
      text: Then he went out from Pharaoh in great anger.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 3:19; 7:4; 10:1
      marker-yv: yv-n
    - type: text
      text: '“Pharaoh will not heed you, so that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 7:3; 9:16
      marker-yv: yv-n
    - type: text
      text: 'My wonders may be multiplied in the land of Egypt.” '
