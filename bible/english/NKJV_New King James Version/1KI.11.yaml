document_id: 1KI.11,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon’s Heart Turns from the Lord
  - type: text
    content: 'But '
  - type: note
    content: (Neh. 13:26)
  - type: text
    content: 'King Solomon loved '
  - type: note
    content: (Deut. 17:17); 1 Kin. 3:1
  - type: text
    content: 'many foreign women, as well as the daughter of Pharaoh: women of the Moabites, Ammonites, Edomites, Sidonians, '
  - type: text
    content: and
  - type: text
    content: ' Hittites— '
  '10':
  - type: text
    content: 'and '
  - type: note
    content: 1 Kin. 6:12; 9:6, 7
  - type: text
    content: 'had commanded him concerning this thing, that he should not go after other gods; but he did not keep what the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded. '
  '11':
  - type: text
    content: 'Therefore the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Solomon, “Because you have done this, and have not kept My covenant and My statutes, which I have commanded you, '
  - type: note
    content: 1 Kin. 11:31; 12:15, 16
  - type: text
    content: 'I will surely tear the kingdom away from you and give it to your '
  - type: note
    content: 1 Kin. 11:31, 37
  - type: text
    content: 'servant. '
  '12':
  - type: text
    content: 'Nevertheless I will not do it in your days, for the sake of your father David; I will tear it out of the hand of your son. '
  '13':
  - type: note
    content: 2 Sam. 7:15; 1 Chr. 17:13; Ps. 89:33
  - type: text
    content: 'However I will not tear away the whole kingdom; I will give '
  - type: note
    content: 1 Kin. 12:20
  - type: text
    content: 'one tribe to your son '
  - type: note
    content: 2 Sam. 7:15, 16
  - type: text
    content: 'for the sake of My servant David, and for the sake of Jerusalem '
  - type: note
    content: Deut. 12:11; 1 Kin. 9:3; 14:21
  - type: text
    content: which I have chosen.”
  - type: heading
    content: Adversaries of Solomon
  '14':
  - type: text
    content: 'Now the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 5:26
  - type: text
    content: 'raised up an adversary against Solomon, Hadad the Edomite; he '
  - type: text
    content: was
  - type: text
    content: ' a descendant of the king in Edom. '
  '15':
  - type: note
    content: 2 Sam. 8:14; 1 Chr. 18:12, 13
  - type: text
    content: 'For it happened, when David was in Edom, and Joab the commander of the army had gone up to bury the slain, '
  - type: note
    content: Num. 24:18, 19; (Deut. 20:13)
  - type: text
    content: 'after he had killed every male in Edom '
  '16':
  - type: text
    content: '(because for six months Joab remained there with all Israel, until he had cut down every male in Edom), '
  '17':
  - type: text
    content: 'that Hadad fled to go to Egypt, he and certain Edomites of his father’s servants with him. Hadad '
  - type: text
    content: was
  - type: text
    content: ' still a little child. '
  '18':
  - type: text
    content: 'Then they arose from Midian and came to Paran; and they took men with them from Paran and came to Egypt, to Pharaoh king of Egypt, who gave him a house, apportioned food for him, and gave him land. '
  '19':
  - type: text
    content: 'And Hadad found great favor in the sight of Pharaoh, so that he gave him as wife the sister of his own wife, that is, the sister of Queen Tahpenes. '
  '2':
  - type: text
    content: 'from the nations of whom the '
  - type: heading
    content: Lord
  - type: text
    content: ' had said to the children of Israel, '
  - type: note
    content: Ex. 34:16; (Deut. 7:3, 4)
  - type: text
    content: '“You shall not intermarry with them, nor they with you. Surely they will turn away your hearts after their gods.” Solomon clung to these in love. '
  '20':
  - type: text
    content: Then the sister of Tahpenes bore him Genubath his son, whom Tahpenes weaned in Pharaoh’s house. And Genubath was in Pharaoh’s household among the sons of Pharaoh.
  '21':
  - type: note
    content: 1 Kin. 2:10, 34
  - type: text
    content: So when Hadad heard in Egypt that David rested with his fathers, and that Joab the commander of the army was dead, Hadad said to Pharaoh, “Let me depart, that I may go to my own country.”
  '22':
  - type: text
    content: Then Pharaoh said to him, “But what have you lacked with me, that suddenly you seek to go to your own country?”
  - type: text
    content: So he answered, “Nothing, but do let me go anyway.”
  '23':
  - type: text
    content: 'And God raised up '
  - type: text
    content: another
  - type: text
    content: ' adversary against him, Rezon the son of Eliadah, who had fled from his lord, '
  - type: note
    content: 2 Sam. 8:3; 10:16
  - type: text
    content: 'Hadadezer king of Zobah. '
  '24':
  - type: text
    content: 'So he gathered men to him and became captain over a band '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: raiders,
  - type: text
    content: ' '
  - type: note
    content: 2 Sam. 8:3; 10:8, 18
  - type: text
    content: 'when David killed those '
  - type: text
    content: of
  - type: text
    content: ' '
  - type: text
    content: Zobah.
  - type: text
    content: ' And they went to Damascus and dwelt there, and reigned in Damascus. '
  '25':
  - type: text
    content: 'He was an adversary of Israel all the days of Solomon (besides the trouble that Hadad '
  - type: text
    content: caused
  - type: text
    content: ); and he abhorred Israel, and reigned over Syria.
  - type: heading
    content: Jeroboam’s Rebellion
  '26':
  - type: text
    content: 'Then Solomon’s servant, '
  - type: note
    content: 1 Kin. 12:2
  - type: text
    content: 'Jeroboam the son of Nebat, an Ephraimite from Zereda, whose mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Zeruah, a widow, '
  - type: note
    content: 1 Kin. 11:11; 2 Chr. 13:6
  - type: text
    content: 'also '
  - type: note
    content: 2 Sam. 20:21
  - type: text
    content: rebelled against the king.
  '27':
  - type: text
    content: 'And this '
  - type: text
    content: is
  - type: text
    content: ' what caused him to rebel against the king: '
  - type: note
    content: 1 Kin. 9:15, 24
  - type: text
    content: 'Solomon had built the Millo '
  - type: text
    content: and
  - type: text
    content: ' repaired the damages to the City of David his father. '
  '28':
  - type: text
    content: 'The man Jeroboam '
  - type: text
    content: was
  - type: text
    content: ' a mighty man of valor; and Solomon, seeing that the young man was '
  - type: note
    content: (Prov. 22:29)
  - type: text
    content: industrious, made him the officer over all the labor force of the house of Joseph.
  '29':
  - type: text
    content: 'Now it happened at that time, when Jeroboam went out of Jerusalem, that the prophet '
  - type: note
    content: 1 Kin. 12:15; 14:2; 2 Chr. 9:29
  - type: text
    content: 'Ahijah the Shilonite met him on the way; and he had clothed himself with a new garment, and the two '
  - type: text
    content: were
  - type: text
    content: ' alone in the field. '
  '3':
  - type: text
    content: 'And he had seven hundred wives, princesses, and three hundred concubines; and his wives turned away his heart. '
  '30':
  - type: text
    content: 'Then Ahijah took hold of the new garment that '
  - type: text
    content: was
  - type: text
    content: ' on him, and '
  - type: note
    content: 1 Sam. 15:27, 28; 24:5
  - type: text
    content: 'tore it '
  - type: text
    content: into
  - type: text
    content: ' twelve pieces. '
  '31':
  - type: text
    content: 'And he said to Jeroboam, “Take for yourself ten pieces, for '
  - type: note
    content: 1 Kin. 11:11, 13
  - type: text
    content: 'thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ', the God of Israel: ‘Behold, I will tear the kingdom out of the hand of Solomon and will give ten tribes to you '
  '32':
  - type: text
    content: '(but he shall have one tribe for the sake of My servant David, and for the sake of Jerusalem, the city which I have chosen out of all the tribes of Israel), '
  '33':
  - type: note
    content: 1 Sam. 7:3; 1 Kin. 11:5–8
  - type: text
    content: 'because they have forsaken Me, and worshiped Ashtoreth the goddess of the Sidonians, Chemosh the god of the Moabites, and Milcom the god of the people of Ammon, and have not walked in My ways to do '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' right in My eyes and '
  - type: text
    content: keep
  - type: text
    content: ' My statutes and My judgments, as '
  - type: text
    content: did
  - type: text
    content: ' his father David. '
  '34':
  - type: text
    content: 'However I will not take the whole kingdom out of his hand, because I have made him ruler all the days of his life for the sake of My servant David, whom I chose because he kept My commandments and My statutes. '
  '35':
  - type: text
    content: 'But '
  - type: note
    content: 1 Kin. 12:16, 17
  - type: text
    content: 'I will take the kingdom out of his son’s hand and give it to you—ten tribes. '
  '36':
  - type: text
    content: 'And to his son I will give one tribe, that '
  - type: note
    content: (1 Kin. 15:4; 2 Kin. 8:19)
  - type: text
    content: 'My servant David may always have a lamp before Me in Jerusalem, the city which I have chosen for Myself, to put My name there. '
  '37':
  - type: text
    content: 'So I will take you, and you shall reign over all your heart desires, and you shall be king over Israel. '
  '38':
  - type: text
    content: 'Then it shall be, if you heed all that I command you, walk in My ways, and do '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' right in My sight, to keep My statutes and My commandments, as My servant David did, then '
  - type: note
    content: Deut. 31:8; Josh. 1:5
  - type: text
    content: 'I will be with you and '
  - type: note
    content: 2 Sam. 7:11, 27
  - type: text
    content: 'build for you an enduring house, as I built for David, and will give Israel to you. '
  '39':
  - type: text
    content: And I will afflict the descendants of David because of this, but not forever.’ ”
  '4':
  - type: text
    content: 'For it was so, when Solomon was old, '
  - type: note
    content: (Deut. 17:17; Neh. 13:26)
  - type: text
    content: 'that his wives turned his heart after other gods; and his '
  - type: note
    content: 1 Kin. 8:61
  - type: text
    content: 'heart was not loyal to the '
  - type: heading
    content: Lord
  - type: text
    content: ' his God, '
  - type: note
    content: 1 Kin. 9:4
  - type: text
    content: 'as '
  - type: text
    content: was
  - type: text
    content: ' the heart of his father David. '
  '40':
  - type: text
    content: 'Solomon therefore sought to kill Jeroboam. But Jeroboam arose and fled to Egypt, to '
  - type: note
    content: 1 Kin. 11:17; 14:25; 2 Chr. 12:2–9
  - type: text
    content: Shishak king of Egypt, and was in Egypt until the death of Solomon.
  - type: heading
    content: Death of Solomon
  '41':
  - type: text
    content: 'Now '
  - type: note
    content: 2 Chr. 9:29
  - type: text
    content: 'the rest of the acts of Solomon, all that he did, and his wisdom, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the acts of Solomon? '
  '42':
  - type: note
    content: 2 Chr. 9:30
  - type: text
    content: 'And the period that Solomon reigned in Jerusalem over all Israel '
  - type: text
    content: was
  - type: text
    content: ' forty years. '
  '43':
  - type: note
    content: 1 Kin. 2:10; 2 Chr. 9:31
  - type: text
    content: 'Then Solomon rested with his fathers, and was buried in the City of David his father. And Rehoboam his son reigned in his '
  - type: note
    content: 1 Kin. 14:21; 2 Chr. 10:1
  - type: text
    content: place.
  '5':
  - type: text
    content: 'For Solomon went after '
  - type: note
    content: Judg. 2:13; 1 Kin. 11:33
  - type: text
    content: 'Ashtoreth the goddess of the Sidonians, and after '
  - type: note
    content: (Lev. 20:2–5)
  - type: text
    content: 'Milcom the abomination of the '
  - type: note
    content: 2 Kin. 23:13
  - type: text
    content: 'Ammonites. '
  '6':
  - type: text
    content: 'Solomon did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and did not fully follow the '
  - type: heading
    content: Lord
  - type: text
    content: ', as '
  - type: text
    content: did
  - type: text
    content: ' his father David. '
  '7':
  - type: note
    content: Num. 33:52
  - type: text
    content: 'Then Solomon built a high place for '
  - type: note
    content: Num. 21:29; Judg. 11:24
  - type: text
    content: 'Chemosh the abomination of Moab, on '
  - type: note
    content: 2 Kin. 23:13
  - type: text
    content: 'the hill that '
  - type: text
    content: is
  - type: text
    content: ' east of Jerusalem, and for Molech the abomination of the people of Ammon. '
  '8':
  - type: text
    content: And he did likewise for all his foreign wives, who burned incense and sacrificed to their gods.
  '9':
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' became angry with Solomon, because his heart had turned from the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel, '
  - type: note
    content: 1 Kin. 3:5; 9:2
  - type: text
    content: 'who had appeared to him twice, '
