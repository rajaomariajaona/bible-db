document_id: 1KI.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Solomon’s Heart Turns from the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Neh. 13:26)
    marker-yv: yv-n
  - type: text
    text: 'King Solomon loved '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 17:17); 1 Kin. 3:1
    marker-yv: yv-n
  - type: text
    text: 'many foreign women, as well as the daughter of Pharaoh: women of the Moabites, Ammonites, Edomites, Sidonians, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Hittites— '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'from the nations of whom the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had said to the children of Israel, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 34:16; (Deut. 7:3, 4)
    marker-yv: yv-n
  - type: text
    text: '“You shall not intermarry with them, nor they with you. Surely they will turn away your hearts after their gods.” Solomon clung to these in love. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he had seven hundred wives, princesses, and three hundred concubines; and his wives turned away his heart. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For it was so, when Solomon was old, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Deut. 17:17; Neh. 13:26)
    marker-yv: yv-n
  - type: text
    text: 'that his wives turned his heart after other gods; and his '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 8:61
    marker-yv: yv-n
  - type: text
    text: 'heart was not loyal to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 9:4
    marker-yv: yv-n
  - type: text
    text: 'as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the heart of his father David. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For Solomon went after '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 2:13; 1 Kin. 11:33
    marker-yv: yv-n
  - type: text
    text: 'Ashtoreth the goddess of the Sidonians, and after '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Lev. 20:2–5)
    marker-yv: yv-n
  - type: text
    text: 'Milcom the abomination of the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 23:13
    marker-yv: yv-n
  - type: text
    text: 'Ammonites. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Solomon did evil in the sight of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and did not fully follow the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: did
  - type: text
    text: ' his father David. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 33:52
    marker-yv: yv-n
  - type: text
    text: 'Then Solomon built a high place for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 21:29; Judg. 11:24
    marker-yv: yv-n
  - type: text
    text: 'Chemosh the abomination of Moab, on '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 23:13
    marker-yv: yv-n
  - type: text
    text: 'the hill that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' east of Jerusalem, and for Molech the abomination of the people of Ammon. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And he did likewise for all his foreign wives, who burned incense and sacrificed to their gods.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' became angry with Solomon, because his heart had turned from the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Israel, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 3:5; 9:2
    marker-yv: yv-n
  - type: text
    text: 'who had appeared to him twice, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 6:12; 9:6, 7
    marker-yv: yv-n
  - type: text
    text: 'had commanded him concerning this thing, that he should not go after other gods; but he did not keep what the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Therefore the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Solomon, “Because you have done this, and have not kept My covenant and My statutes, which I have commanded you, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:31; 12:15, 16
    marker-yv: yv-n
  - type: text
    text: 'I will surely tear the kingdom away from you and give it to your '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:31, 37
    marker-yv: yv-n
  - type: text
    text: 'servant. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nevertheless I will not do it in your days, for the sake of your father David; I will tear it out of the hand of your son. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 7:15; 1 Chr. 17:13; Ps. 89:33
    marker-yv: yv-n
  - type: text
    text: 'However I will not tear away the whole kingdom; I will give '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 12:20
    marker-yv: yv-n
  - type: text
    text: 'one tribe to your son '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 7:15, 16
    marker-yv: yv-n
  - type: text
    text: 'for the sake of My servant David, and for the sake of Jerusalem '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 12:11; 1 Kin. 9:3; 14:21
    marker-yv: yv-n
  - type: text
    text: which I have chosen.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adversaries of Solomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 5:26
    marker-yv: yv-n
  - type: text
    text: 'raised up an adversary against Solomon, Hadad the Edomite; he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a descendant of the king in Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 8:14; 1 Chr. 18:12, 13
    marker-yv: yv-n
  - type: text
    text: 'For it happened, when David was in Edom, and Joab the commander of the army had gone up to bury the slain, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 24:18, 19; (Deut. 20:13)
    marker-yv: yv-n
  - type: text
    text: 'after he had killed every male in Edom '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '(because for six months Joab remained there with all Israel, until he had cut down every male in Edom), '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'that Hadad fled to go to Egypt, he and certain Edomites of his father’s servants with him. Hadad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' still a little child. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then they arose from Midian and came to Paran; and they took men with them from Paran and came to Egypt, to Pharaoh king of Egypt, who gave him a house, apportioned food for him, and gave him land. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Hadad found great favor in the sight of Pharaoh, so that he gave him as wife the sister of his own wife, that is, the sister of Queen Tahpenes. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then the sister of Tahpenes bore him Genubath his son, whom Tahpenes weaned in Pharaoh’s house. And Genubath was in Pharaoh’s household among the sons of Pharaoh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 2:10, 34
    marker-yv: yv-n
  - type: text
    text: So when Hadad heard in Egypt that David rested with his fathers, and that Joab the commander of the army was dead, Hadad said to Pharaoh, “Let me depart, that I may go to my own country.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then Pharaoh said to him, “But what have you lacked with me, that suddenly you seek to go to your own country?”
- type: usfm
  marker: p
  children:
  - type: text
    text: So he answered, “Nothing, but do let me go anyway.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And God raised up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: another
  - type: text
    text: ' adversary against him, Rezon the son of Eliadah, who had fled from his lord, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 8:3; 10:16
    marker-yv: yv-n
  - type: text
    text: 'Hadadezer king of Zobah. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So he gathered men to him and became captain over a band '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: raiders,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 8:3; 10:8, 18
    marker-yv: yv-n
  - type: text
    text: 'when David killed those '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Zobah.
  - type: text
    text: ' And they went to Damascus and dwelt there, and reigned in Damascus. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He was an adversary of Israel all the days of Solomon (besides the trouble that Hadad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: caused
  - type: text
    text: ); and he abhorred Israel, and reigned over Syria.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeroboam’s Rebellion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then Solomon’s servant, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 12:2
    marker-yv: yv-n
  - type: text
    text: 'Jeroboam the son of Nebat, an Ephraimite from Zereda, whose mother’s name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Zeruah, a widow, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:11; 2 Chr. 13:6
    marker-yv: yv-n
  - type: text
    text: 'also '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 20:21
    marker-yv: yv-n
  - type: text
    text: rebelled against the king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' what caused him to rebel against the king: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 9:15, 24
    marker-yv: yv-n
  - type: text
    text: 'Solomon had built the Millo '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' repaired the damages to the City of David his father. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The man Jeroboam '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a mighty man of valor; and Solomon, seeing that the young man was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Prov. 22:29)
    marker-yv: yv-n
  - type: text
    text: industrious, made him the officer over all the labor force of the house of Joseph.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now it happened at that time, when Jeroboam went out of Jerusalem, that the prophet '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 12:15; 14:2; 2 Chr. 9:29
    marker-yv: yv-n
  - type: text
    text: 'Ahijah the Shilonite met him on the way; and he had clothed himself with a new garment, and the two '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' alone in the field. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then Ahijah took hold of the new garment that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' on him, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 15:27, 28; 24:5
    marker-yv: yv-n
  - type: text
    text: 'tore it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: into
  - type: text
    text: ' twelve pieces. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And he said to Jeroboam, “Take for yourself ten pieces, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:11, 13
    marker-yv: yv-n
  - type: text
    text: 'thus says the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel: ‘Behold, I will tear the kingdom out of the hand of Solomon and will give ten tribes to you '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '(but he shall have one tribe for the sake of My servant David, and for the sake of Jerusalem, the city which I have chosen out of all the tribes of Israel), '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 7:3; 1 Kin. 11:5–8
    marker-yv: yv-n
  - type: text
    text: 'because they have forsaken Me, and worshiped Ashtoreth the goddess of the Sidonians, Chemosh the god of the Moabites, and Milcom the god of the people of Ammon, and have not walked in My ways to do '
  - type: usfm
    marker: it
    children:
    - type: text
      text: what
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' right in My eyes and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: keep
  - type: text
    text: ' My statutes and My judgments, as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: did
  - type: text
    text: ' his father David. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'However I will not take the whole kingdom out of his hand, because I have made him ruler all the days of his life for the sake of My servant David, whom I chose because he kept My commandments and My statutes. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
