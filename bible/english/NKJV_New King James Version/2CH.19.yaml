    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Now therefore, let the fear of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be upon you; take care and do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 18:25; Deut. 32:4); Rom. 9:17
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no iniquity with the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, no '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 10:17, 18; Job 34:19); Acts 10:34; Rom. 2:11; Gal. 2:6; (Eph. 6:9; Col. 3:25)
      marker-yv: yv-n
    - type: text
      text: partiality, nor taking of bribes.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Moreover in Jerusalem, for the judgment of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and for controversies, Jehoshaphat '
    - type: usfm
