      - type: text
        text: 1 Chr. 26:30
      marker-yv: yv-n
    - type: text
      text: 'in all matters of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '; and Zebadiah the son of Ishmael, the ruler of the house of Judah, for all the king’s matters; also the Levites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' officials before you. Behave courageously, and the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Chr. 15:2; 20:17)
      marker-yv: yv-n
    - type: text
