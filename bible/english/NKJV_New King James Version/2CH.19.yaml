      children:
      - type: text
        text: 2 Chr. 17:4, 6
      marker-yv: yv-n
    - type: text
      text: 'good things are found in you, in that you have removed the wooden images from the land, and have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 30:19
      marker-yv: yv-n
    - type: text
      text: prepared your heart to seek God.”
  - type: usfm
