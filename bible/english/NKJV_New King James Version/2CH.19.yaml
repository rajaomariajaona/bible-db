    children:
    - type: text
      text: The Reforms of Jehoshaphat
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So Jehoshaphat dwelt at Jerusalem; and he went out again among the people from Beersheba to the mountains of Ephraim, and brought them back to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 15:8–13
      marker-yv: yv-n
    - type: text
      text: 'fathers. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then he set '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 16:18–20)
      marker-yv: yv-n
    - type: text
      text: 'judges in the land throughout all the fortified cities of Judah, city by city, '
