      children:
      - type: text
        text: Deut. 16:18; 2 Chr. 17:8
      marker-yv: yv-n
    - type: text
      text: 'appointed some of the Levites and priests, and some of the chief fathers of Israel, when they returned to Jerusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
