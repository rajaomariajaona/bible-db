    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 17:8
      marker-yv: yv-n
    - type: text
      text: 'Whatever case comes to you from your brethren who dwell in their cities, whether of bloodshed or offenses against law or commandment, against statutes or ordinances, you shall warn them, lest they trespass against the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:46
      marker-yv: yv-n
    - type: text
      text: 'wrath come upon '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ezek. 3:18)
      marker-yv: yv-n
    - type: text
      text: 'you and your brethren. Do this, and you will not be guilty. '
