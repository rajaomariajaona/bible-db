      children:
      - type: text
        text: Ps. 139:21
      marker-yv: yv-n
    - type: text
      text: 'love those who hate the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '? Therefore the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 32:25
      marker-yv: yv-n
    - type: text
      text: 'wrath of the '
