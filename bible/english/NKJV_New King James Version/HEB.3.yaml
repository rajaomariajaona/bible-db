document_id: HEB.3,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Son Was Faithful
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Therefore, holy brethren, partakers of the heavenly calling, consider the Apostle and High Priest of our confession, Christ Jesus, '
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Therefore I was angry with that generation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And said, ‘They always go astray in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' heart,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they have not known My ways.’
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So I swore in My wrath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘They shall not enter My rest.’ ”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Beware, brethren, lest there be in any of you an evil heart of unbelief in departing from the living God; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'but exhort one another daily, while it is called “Today,” lest any of you be hardened through the deceitfulness of sin. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For we have become partakers of Christ if we hold the beginning of our confidence steadfast to the end, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'while it is said:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 95:7, 8
      marker-yv: yv-n
    - type: text
      text: “Today, if you will hear His voice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not harden your hearts as in the rebellion.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Failure of the Wilderness Wanderers
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:2, 11, 30; Deut. 1:35, 36, 38
      marker-yv: yv-n
    - type: text
      text: 'For who, having heard, rebelled? Indeed, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' not all who came out of Egypt, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: led
    - type: text
      text: ' by Moses? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Now with whom was He angry forty years? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' not with those who sinned, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:22, 23
      marker-yv: yv-n
    - type: text
      text: 'whose corpses fell in the wilderness? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:30
      marker-yv: yv-n
    - type: text
      text: 'to whom did He swear that they would not enter His rest, but to those who did not obey? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So we see that they could not enter in because of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:1–39; 1 Cor. 10:11, 12
      marker-yv: yv-n
    - type: text
      text: unbelief.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'who was faithful to Him who appointed Him, as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:16; Num. 12:7; Heb. 3:5
      marker-yv: yv-n
    - type: text
      text: 'Moses also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: faithful
    - type: text
      text: ' in all His house. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For this One has been counted worthy of more glory than Moses, inasmuch as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 6:12, 13
      marker-yv: yv-n
    - type: text
      text: 'He who built the house has more honor than the house. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For every house is built by someone, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eph. 2:10)
      marker-yv: yv-n
    - type: text
      text: 'He who built all things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:16; Num. 12:7; Heb. 3:2
      marker-yv: yv-n
    - type: text
      text: 'And Moses indeed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' faithful in all His house as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 14:31; Num. 12:7
      marker-yv: yv-n
    - type: text
      text: 'a servant, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 18:15, 18, 19
      marker-yv: yv-n
    - type: text
      text: 'for a testimony of those things which would be spoken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: afterward,
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'but Christ as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 2:7; 110:4; Heb. 1:2
      marker-yv: yv-n
    - type: text
      text: 'a Son over His own house, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 3:16); 1 Tim. 3:15
      marker-yv: yv-n
    - type: text
      text: 'whose house we are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 10:22)
      marker-yv: yv-n
    - type: text
      text: if we hold fast the confidence and the rejoicing of the hope firm to the end.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Be Faithful
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Therefore, as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 1:16
      marker-yv: yv-n
    - type: text
      text: 'the Holy Spirit says:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 95:7–11; Heb. 3:15; 4:7
      marker-yv: yv-n
    - type: text
      text: “Today, if you will hear His voice,
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Do not harden your hearts as in the rebellion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the day of trial in the wilderness,
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Where your fathers tested Me, tried Me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And saw My works forty years.
