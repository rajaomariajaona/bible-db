document_id: NUM.20,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses’ Error at Kadesh
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:21; 33:36
      marker-yv: yv-n
    - type: text
      text: ' the children of Israel, the whole congregation, came into the Wilderness of Zin in the first month, and the people stayed in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:26
      marker-yv: yv-n
    - type: text
      text: 'Kadesh; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 15:20; Num. 26:59
      marker-yv: yv-n
    - type: text
      text: Miriam died there and was buried there.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses and Aaron gathered the assembly together before the rock; and he said to them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 106:33
      marker-yv: yv-n
    - type: text
      text: '“Hear now, you rebels! Must we bring water for you out of this rock?” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses lifted his hand and struck the rock twice with his rod; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 17:6; Deut. 8:15; Ps. 78:16; Is. 48:21; (1 Cor. 10:4)
      marker-yv: yv-n
    - type: text
      text: and water came out abundantly, and the congregation and their animals drank.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses and Aaron, “Because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:28; 27:14; Deut. 1:37; 3:26, 27; 34:5
      marker-yv: yv-n
    - type: text
      text: 'you did not believe Me, to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 10:3; Ezek. 20:41; 36:23; 1 Pet. 3:15
      marker-yv: yv-n
    - type: text
      text: hallow Me in the eyes of the children of Israel, therefore you shall not bring this assembly into the land which I have given them.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 33:8; Ps. 106:32
      marker-yv: yv-n
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the water of Meribah, because the children of Israel contended with the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and He was hallowed among them.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Passage Through Edom Refused
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 11:16, 17
      marker-yv: yv-n
    - type: text
      text: 'Now Moses sent messengers from Kadesh to the king of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 36:31–39
      marker-yv: yv-n
    - type: text
      text: 'Edom. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 2:4; Obad. 10–12
      marker-yv: yv-n
    - type: text
      text: '“Thus says your brother Israel: ‘You know all the hardship that has befallen us, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 46:6; Acts 7:15
      marker-yv: yv-n
    - type: text
      text: 'how our fathers went down to Egypt, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:40
      marker-yv: yv-n
    - type: text
      text: 'and we dwelt in Egypt a long time, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 1:11; Deut. 26:6; Acts 7:19
      marker-yv: yv-n
    - type: text
      text: 'and the Egyptians afflicted us and our fathers. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 2:23; 3:7
      marker-yv: yv-n
    - type: text
      text: 'When we cried out to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', He heard our voice and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 3:2; 14:19
      marker-yv: yv-n
    - type: text
      text: 'sent the Angel and brought us up out of Egypt; now here we are in Kadesh, a city on the edge of your border. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Please '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:22
      marker-yv: yv-n
    - type: text
      text: let us pass through your country. We will not pass through fields or vineyards, nor will we drink water from wells; we will go along the King’s Highway; we will not turn aside to the right hand or to the left until we have passed through your territory.’ ”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 24:18; Ps. 137:7; Ezek. 25:12, 13; Obad. 10–15
      marker-yv: yv-n
    - type: text
      text: 'Edom said to him, “You shall not pass through my '
    - type: usfm
      marker: it
      children:
      - type: text
        text: land,
    - type: text
      text: ' lest I come out against you with the sword.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the children of Israel said to him, “We will go by the Highway, and if I or my livestock drink any of your water, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 2:6, 28
      marker-yv: yv-n
    - type: text
      text: 'then I will pay for it; let me only pass through on foot, nothing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: more.
    - type: text
      text: ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 17:1
      marker-yv: yv-n
    - type: text
      text: 'Now there was no water for the congregation; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:19, 42
      marker-yv: yv-n
    - type: text
      text: 'so they gathered together against Moses and Aaron. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 11:17
      marker-yv: yv-n
    - type: text
      text: '“You shall not pass through.” So Edom came out against them with many men and with a strong hand. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus Edom '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 2:27, 30
      marker-yv: yv-n
    - type: text
      text: 'refused to give Israel passage through his territory; so Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 2:8; Judg. 11:18
      marker-yv: yv-n
    - type: text
      text: turned away from him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Death of Aaron
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the children of Israel, the whole congregation, journeyed from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 33:37
      marker-yv: yv-n
    - type: text
      text: 'Kadesh '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:4
      marker-yv: yv-n
    - type: text
      text: 'and came to Mount Hor. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses and Aaron in Mount Hor by the border of the land of Edom, saying: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Aaron shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 25:8; Deut. 32:50
      marker-yv: yv-n
    - type: text
      text: 'gathered to his people, for he shall not enter the land which I have given to the children of Israel, because you rebelled against My word at the water of Meribah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 33:38; Deut. 32:50
      marker-yv: yv-n
    - type: text
      text: 'Take Aaron and Eleazar his son, and bring them up to Mount Hor; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and strip Aaron of his garments and put them on Eleazar his son; for Aaron shall be gathered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
      text: ' and die there.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses did just as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded, and they went up to Mount Hor in the sight of all the congregation. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:29, 30; Deut. 10:6
      marker-yv: yv-n
    - type: text
      text: 'Moses stripped Aaron of his garments and put them on Eleazar his son; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 33:38
      marker-yv: yv-n
    - type: text
      text: 'Aaron died there on the top of the mountain. Then Moses and Eleazar came down from the mountain. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when all the congregation saw that Aaron was dead, all the house of Israel mourned for Aaron '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 50:3, 10; Deut. 34:8
      marker-yv: yv-n
    - type: text
      text: thirty days.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 17:2; Num. 14:2
      marker-yv: yv-n
    - type: text
      text: 'contended with Moses and spoke, saying: “If only we had died '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 11:1, 33; 14:37; 16:31–35, 49
      marker-yv: yv-n
    - type: text
      text: 'when our brethren died before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 17:3
      marker-yv: yv-n
    - type: text
      text: 'Why have you brought up the assembly of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' into this wilderness, that we and our animals should die here? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And why have you made us come up out of Egypt, to bring us to this evil place? It '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not a place of grain or figs or vines or pomegranates; nor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' there any water to drink.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses and Aaron went from the presence of the assembly to the door of the tabernacle of meeting, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:5; 16:4, 22, 45
      marker-yv: yv-n
    - type: text
      text: 'they fell on their faces. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:10
      marker-yv: yv-n
    - type: text
      text: 'the glory of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to them.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 4:17, 20; 17:5, 6
      marker-yv: yv-n
    - type: text
      text: '“Take the rod; you and your brother Aaron gather the congregation together. Speak to the rock before their eyes, and it will yield its water; thus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 9:15; Ps. 78:15, 16; 105:41; Is. 43:20; 48:21; (1 Cor. 10:4)
      marker-yv: yv-n
    - type: text
      text: 'you shall bring water for them out of the rock, and give drink to the congregation and their animals.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses took the rod '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 17:10
      marker-yv: yv-n
    - type: text
      text: 'from before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as He commanded him.'
