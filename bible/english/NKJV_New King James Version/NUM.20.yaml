document_id: NUM.20,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Moses’ Error at Kadesh
  - type: text
    content: Then
  - type: note
    content: Num. 13:21; 33:36
  - type: text
    content: ' the children of Israel, the whole congregation, came into the Wilderness of Zin in the first month, and the people stayed in '
  - type: note
    content: Num. 13:26
  - type: text
    content: 'Kadesh; and '
  - type: note
    content: Ex. 15:20; Num. 26:59
  - type: text
    content: Miriam died there and was buried there.
  '10':
  - type: text
    content: 'And Moses and Aaron gathered the assembly together before the rock; and he said to them, '
  - type: note
    content: Ps. 106:33
  - type: text
    content: '“Hear now, you rebels! Must we bring water for you out of this rock?” '
  '11':
  - type: text
    content: 'Then Moses lifted his hand and struck the rock twice with his rod; '
  - type: note
    content: Ex. 17:6; Deut. 8:15; Ps. 78:16; Is. 48:21; (1 Cor. 10:4)
  - type: text
    content: and water came out abundantly, and the congregation and their animals drank.
  '12':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron, “Because '
  - type: note
    content: Num. 20:28; 27:14; Deut. 1:37; 3:26, 27; 34:5
  - type: text
    content: 'you did not believe Me, to '
  - type: note
    content: Lev. 10:3; Ezek. 20:41; 36:23; 1 Pet. 3:15
  - type: text
    content: hallow Me in the eyes of the children of Israel, therefore you shall not bring this assembly into the land which I have given them.”
  '13':
  - type: note
    content: Deut. 33:8; Ps. 106:32
  - type: text
    content: 'This '
  - type: text
    content: was
  - type: text
    content: ' the water of Meribah, because the children of Israel contended with the '
  - type: heading
    content: Lord
  - type: text
    content: ', and He was hallowed among them.'
  - type: heading
    content: Passage Through Edom Refused
  '14':
  - type: note
    content: Judg. 11:16, 17
  - type: text
    content: 'Now Moses sent messengers from Kadesh to the king of '
  - type: note
    content: Gen. 36:31–39
  - type: text
    content: 'Edom. '
  - type: note
    content: Deut. 2:4; Obad. 10–12
  - type: text
    content: '“Thus says your brother Israel: ‘You know all the hardship that has befallen us, '
  '15':
  - type: note
    content: Gen. 46:6; Acts 7:15
  - type: text
    content: 'how our fathers went down to Egypt, '
  - type: note
    content: Ex. 12:40
  - type: text
    content: 'and we dwelt in Egypt a long time, '
  - type: note
    content: Ex. 1:11; Deut. 26:6; Acts 7:19
  - type: text
    content: 'and the Egyptians afflicted us and our fathers. '
  '16':
  - type: note
    content: Ex. 2:23; 3:7
  - type: text
    content: 'When we cried out to the '
  - type: heading
    content: Lord
  - type: text
    content: ', He heard our voice and '
  - type: note
    content: Ex. 3:2; 14:19
  - type: text
    content: 'sent the Angel and brought us up out of Egypt; now here we are in Kadesh, a city on the edge of your border. '
  '17':
  - type: text
    content: 'Please '
  - type: note
    content: Num. 21:22
  - type: text
    content: let us pass through your country. We will not pass through fields or vineyards, nor will we drink water from wells; we will go along the King’s Highway; we will not turn aside to the right hand or to the left until we have passed through your territory.’ ”
  '18':
  - type: text
    content: 'Then '
  - type: note
    content: Num. 24:18; Ps. 137:7; Ezek. 25:12, 13; Obad. 10–15
  - type: text
    content: 'Edom said to him, “You shall not pass through my '
  - type: text
    content: land,
  - type: text
    content: ' lest I come out against you with the sword.”'
  '19':
  - type: text
    content: 'So the children of Israel said to him, “We will go by the Highway, and if I or my livestock drink any of your water, '
  - type: note
    content: Deut. 2:6, 28
  - type: text
    content: 'then I will pay for it; let me only pass through on foot, nothing '
  - type: text
    content: more.
  - type: text
    content: ”
  '2':
  - type: note
    content: Ex. 17:1
  - type: text
    content: 'Now there was no water for the congregation; '
  - type: note
    content: Num. 16:19, 42
  - type: text
    content: 'so they gathered together against Moses and Aaron. '
  '20':
  - type: text
    content: 'Then he said, '
  - type: note
    content: Judg. 11:17
  - type: text
    content: '“You shall not pass through.” So Edom came out against them with many men and with a strong hand. '
  '21':
  - type: text
    content: 'Thus Edom '
  - type: note
    content: Deut. 2:27, 30
  - type: text
    content: 'refused to give Israel passage through his territory; so Israel '
  - type: note
    content: Deut. 2:8; Judg. 11:18
  - type: text
    content: turned away from him.
  - type: heading
    content: Death of Aaron
  '22':
  - type: text
    content: 'Now the children of Israel, the whole congregation, journeyed from '
  - type: note
    content: Num. 33:37
  - type: text
    content: 'Kadesh '
  - type: note
    content: Num. 21:4
  - type: text
    content: 'and came to Mount Hor. '
  '23':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron in Mount Hor by the border of the land of Edom, saying: '
  '24':
  - type: text
    content: '“Aaron shall be '
  - type: note
    content: Gen. 25:8; Deut. 32:50
  - type: text
    content: 'gathered to his people, for he shall not enter the land which I have given to the children of Israel, because you rebelled against My word at the water of Meribah. '
  '25':
  - type: note
    content: Num. 33:38; Deut. 32:50
  - type: text
    content: 'Take Aaron and Eleazar his son, and bring them up to Mount Hor; '
  '26':
  - type: text
    content: 'and strip Aaron of his garments and put them on Eleazar his son; for Aaron shall be gathered '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: his
  - type: text
    content: ' '
  - type: text
    content: people
  - type: text
    content: ' and die there.” '
  '27':
  - type: text
    content: 'So Moses did just as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded, and they went up to Mount Hor in the sight of all the congregation. '
  '28':
  - type: note
    content: Ex. 29:29, 30; Deut. 10:6
  - type: text
    content: 'Moses stripped Aaron of his garments and put them on Eleazar his son; and '
  - type: note
    content: Num. 33:38
  - type: text
    content: 'Aaron died there on the top of the mountain. Then Moses and Eleazar came down from the mountain. '
  '29':
  - type: text
    content: 'Now when all the congregation saw that Aaron was dead, all the house of Israel mourned for Aaron '
  - type: note
    content: Gen. 50:3, 10; Deut. 34:8
  - type: text
    content: thirty days.
  '3':
  - type: text
    content: 'And the people '
  - type: note
    content: Ex. 17:2; Num. 14:2
  - type: text
    content: 'contended with Moses and spoke, saying: “If only we had died '
  - type: note
    content: Num. 11:1, 33; 14:37; 16:31–35, 49
  - type: text
    content: 'when our brethren died before the '
  - type: heading
    content: Lord
  - type: text
    content: '! '
  '4':
  - type: note
    content: Ex. 17:3
  - type: text
    content: 'Why have you brought up the assembly of the '
  - type: heading
    content: Lord
  - type: text
    content: ' into this wilderness, that we and our animals should die here? '
  '5':
  - type: text
    content: 'And why have you made us come up out of Egypt, to bring us to this evil place? It '
  - type: text
    content: is
  - type: text
    content: ' not a place of grain or figs or vines or pomegranates; nor '
  - type: text
    content: is
  - type: text
    content: ' there any water to drink.” '
  '6':
  - type: text
    content: 'So Moses and Aaron went from the presence of the assembly to the door of the tabernacle of meeting, and '
  - type: note
    content: Num. 14:5; 16:4, 22, 45
  - type: text
    content: 'they fell on their faces. And '
  - type: note
    content: Num. 14:10
  - type: text
    content: 'the glory of the '
  - type: heading
    content: Lord
  - type: text
    content: ' appeared to them.'
  '7':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '8':
  - type: note
    content: Ex. 4:17, 20; 17:5, 6
  - type: text
    content: '“Take the rod; you and your brother Aaron gather the congregation together. Speak to the rock before their eyes, and it will yield its water; thus '
  - type: note
    content: Neh. 9:15; Ps. 78:15, 16; 105:41; Is. 43:20; 48:21; (1 Cor. 10:4)
  - type: text
    content: 'you shall bring water for them out of the rock, and give drink to the congregation and their animals.” '
  '9':
  - type: text
    content: 'So Moses took the rod '
  - type: note
    content: Num. 17:10
  - type: text
    content: 'from before the '
  - type: heading
    content: Lord
  - type: text
    content: ' as He commanded him.'
