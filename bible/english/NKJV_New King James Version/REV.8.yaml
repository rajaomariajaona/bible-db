document_id: REV.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Seventh Seal: Prelude to the Seven Trumpets'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 6:1
    marker-yv: yv-n
  - type: text
    text: ' He opened the seventh seal, there was silence in heaven for about half an hour. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Matt. 18:10); Luke 1:19
    marker-yv: yv-n
  - type: text
    text: 'And I saw the seven angels who stand before God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 29:25–28
    marker-yv: yv-n
  - type: text
    text: 'and to them were given seven trumpets. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then another angel, having a golden censer, came and stood at the altar. He was given much incense, that he should offer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' with '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 5:8
    marker-yv: yv-n
  - type: text
    text: 'the prayers of all the saints upon '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:1; Rev. 8:3
    marker-yv: yv-n
  - type: text
    text: 'the golden altar which was before the throne. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 141:2; Luke 1:10
    marker-yv: yv-n
  - type: text
    text: 'the smoke of the incense, with the prayers of the saints, ascended before God from the angel’s hand. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the angel took the censer, filled it with fire from the altar, and threw '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' to the earth. And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 19:16; Rev. 11:19; 16:18
    marker-yv: yv-n
  - type: text
    text: 'there were noises, thunderings, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 4:5
    marker-yv: yv-n
  - type: text
    text: 'lightnings, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 22:8; 1 Kin. 19:11; Acts 4:31
    marker-yv: yv-n
  - type: text
    text: and an earthquake.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So the seven angels who had the seven trumpets prepared themselves to sound.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'First Trumpet: Vegetation Struck'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The first angel sounded: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 9:23; Is. 28:2; Ezek. 38:22; Joel 2:30
    marker-yv: yv-n
  - type: text
    text: 'And hail and fire followed, mingled with blood, and they were thrown '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 16:2
    marker-yv: yv-n
  - type: text
    text: 'to the earth. And a third '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 2:13; Rev. 9:4, 15–18
    marker-yv: yv-n
  - type: text
    text: of the trees were burned up, and all green grass was burned up.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Second Trumpet: The Seas Struck'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the second angel sounded: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 51:25; Amos 7:4
    marker-yv: yv-n
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: something
  - type: text
    text: ' like a great mountain burning with fire was thrown into the sea, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 7:17; Rev. 11:6; 16:3
    marker-yv: yv-n
  - type: text
    text: 'and a third of the sea '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 14:19
    marker-yv: yv-n
  - type: text
    text: 'became blood. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 16:3
    marker-yv: yv-n
  - type: text
    text: And a third of the living creatures in the sea died, and a third of the ships were destroyed.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Third Trumpet: The Waters Struck'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then the third angel sounded: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 14:12; Rev. 6:13; 9:1
    marker-yv: yv-n
  - type: text
    text: 'And a great star fell from heaven, burning like a torch, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 14:7; 16:4
    marker-yv: yv-n
  - type: text
    text: 'and it fell on a third of the rivers and on the springs of water. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ruth 1:20
    marker-yv: yv-n
  - type: text
    text: 'The name of the star is Wormwood. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 15:23
    marker-yv: yv-n
  - type: text
    text: A third of the waters became wormwood, and many men died from the water, because it was made bitter.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fourth Trumpet: The Heavens Struck'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 13:10; Joel 2:31; Amos 8:9; Matt. 24:29; Rev. 6:12
    marker-yv: yv-n
  - type: text
    text: 'Then the fourth angel sounded: And a third of the sun was struck, a third of the moon, and a third of the stars, so that a third of them were darkened. A third of the day did not shine, and likewise the night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And I looked, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 14:6; 19:17
    marker-yv: yv-n
  - type: text
    text: 'and I heard an angel flying through the midst of heaven, saying with a loud voice, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 9:12; 11:14; 12:12
    marker-yv: yv-n
  - type: text
    text: “Woe, woe, woe to the inhabitants of the earth, because of the remaining blasts of the trumpet of the three angels who are about to sound!”
