document_id: REV.8,114
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Seventh Seal: Prelude to the Seven Trumpets'
  - type: text
    content: When
  - type: note
    content: Rev. 6:1
  - type: text
    content: ' He opened the seventh seal, there was silence in heaven for about half an hour. '
  '10':
  - type: text
    content: 'Then the third angel sounded: '
  - type: note
    content: Is. 14:12; Rev. 6:13; 9:1
  - type: text
    content: 'And a great star fell from heaven, burning like a torch, '
  - type: note
    content: Rev. 14:7; 16:4
  - type: text
    content: 'and it fell on a third of the rivers and on the springs of water. '
  '11':
  - type: note
    content: Ruth 1:20
  - type: text
    content: 'The name of the star is Wormwood. '
  - type: note
    content: Ex. 15:23
  - type: text
    content: A third of the waters became wormwood, and many men died from the water, because it was made bitter.
  - type: heading
    content: 'Fourth Trumpet: The Heavens Struck'
  '12':
  - type: note
    content: Is. 13:10; Joel 2:31; Amos 8:9; Matt. 24:29; Rev. 6:12
  - type: text
    content: 'Then the fourth angel sounded: And a third of the sun was struck, a third of the moon, and a third of the stars, so that a third of them were darkened. A third of the day did not shine, and likewise the night.'
  '13':
  - type: text
    content: 'And I looked, '
  - type: note
    content: Rev. 14:6; 19:17
  - type: text
    content: 'and I heard an angel flying through the midst of heaven, saying with a loud voice, '
  - type: note
    content: Rev. 9:12; 11:14; 12:12
  - type: text
    content: “Woe, woe, woe to the inhabitants of the earth, because of the remaining blasts of the trumpet of the three angels who are about to sound!”
  '2':
  - type: note
    content: (Matt. 18:10); Luke 1:19
  - type: text
    content: 'And I saw the seven angels who stand before God, '
  - type: note
    content: 2 Chr. 29:25–28
  - type: text
    content: 'and to them were given seven trumpets. '
  '3':
  - type: text
    content: 'Then another angel, having a golden censer, came and stood at the altar. He was given much incense, that he should offer '
  - type: text
    content: it
  - type: text
    content: ' with '
  - type: note
    content: Rev. 5:8
  - type: text
    content: 'the prayers of all the saints upon '
  - type: note
    content: Ex. 30:1; Rev. 8:3
  - type: text
    content: 'the golden altar which was before the throne. '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 141:2; Luke 1:10
  - type: text
    content: 'the smoke of the incense, with the prayers of the saints, ascended before God from the angel’s hand. '
  '5':
  - type: text
    content: 'Then the angel took the censer, filled it with fire from the altar, and threw '
  - type: text
    content: it
  - type: text
    content: ' to the earth. And '
  - type: note
    content: Ex. 19:16; Rev. 11:19; 16:18
  - type: text
    content: 'there were noises, thunderings, '
  - type: note
    content: Rev. 4:5
  - type: text
    content: 'lightnings, '
  - type: note
    content: 2 Sam. 22:8; 1 Kin. 19:11; Acts 4:31
  - type: text
    content: and an earthquake.
  '6':
  - type: text
    content: So the seven angels who had the seven trumpets prepared themselves to sound.
  - type: heading
    content: 'First Trumpet: Vegetation Struck'
  '7':
  - type: text
    content: 'The first angel sounded: '
  - type: note
    content: Ex. 9:23; Is. 28:2; Ezek. 38:22; Joel 2:30
  - type: text
    content: 'And hail and fire followed, mingled with blood, and they were thrown '
  - type: note
    content: Rev. 16:2
  - type: text
    content: 'to the earth. And a third '
  - type: note
    content: Is. 2:13; Rev. 9:4, 15–18
  - type: text
    content: of the trees were burned up, and all green grass was burned up.
  - type: heading
    content: 'Second Trumpet: The Seas Struck'
  '8':
  - type: text
    content: 'Then the second angel sounded: '
  - type: note
    content: Jer. 51:25; Amos 7:4
  - type: text
    content: 'And '
  - type: text
    content: something
  - type: text
    content: ' like a great mountain burning with fire was thrown into the sea, '
  - type: note
    content: Ex. 7:17; Rev. 11:6; 16:3
  - type: text
    content: 'and a third of the sea '
  - type: note
    content: Ezek. 14:19
  - type: text
    content: 'became blood. '
  '9':
  - type: note
    content: Rev. 16:3
  - type: text
    content: And a third of the living creatures in the sea died, and a third of the ships were destroyed.
  - type: heading
    content: 'Third Trumpet: The Waters Struck'
