document_id: ECC.6,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 5:13
      marker-yv: yv-n
    - type: text
      text: ' is an evil which I have seen under the sun, and it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' common among men: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Whatever one is, he has been named '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 1:9; 3:15
      marker-yv: yv-n
    - type: text
      text: already,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For it is known that he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' man;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 9:32; Is. 45:9; Jer. 49:19
      marker-yv: yv-n
    - type: text
      text: And he cannot contend with Him who is mightier than he.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Since there are many things that increase vanity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'How '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' man the better?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For who knows what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good for man in life, all the days of his vain life which he passes like '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 102:11; James 4:14
      marker-yv: yv-n
    - type: text
      text: 'a shadow? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 39:6; Eccl. 3:22
      marker-yv: yv-n
    - type: text
      text: Who can tell a man what will happen after him under the sun?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A man to whom God has given riches and wealth and honor, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 21:10; Ps. 17:14; 73:7
      marker-yv: yv-n
    - type: text
      text: 'so that he lacks nothing for himself of all he desires; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 12:20
      marker-yv: yv-n
    - type: text
      text: 'yet God does not give him power to eat of it, but a foreigner consumes it. This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity, and it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' an evil affliction.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If a man begets a hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: children
    - type: text
      text: ' and lives many years, so that the days of his years are many, but his soul is not satisfied with goodness, or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 9:35; Is. 14:19, 20; Jer. 22:19
      marker-yv: yv-n
    - type: text
      text: 'indeed he has no burial, I say '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 3:16; Ps. 58:8; Eccl. 4:3
      marker-yv: yv-n
    - type: text
      text: 'a stillborn child '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' better than he— '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for it comes in vanity and departs in darkness, and its name is covered with darkness. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Though it has not seen the sun or known '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anything,
    - type: text
      text: ' this has more rest than that man, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'even if he lives a thousand years twice—but has not seen goodness. Do not all go to one '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 2:14, 15
      marker-yv: yv-n
    - type: text
      text: place?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 16:26
      marker-yv: yv-n
    - type: text
      text: 'All the labor of man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' for his mouth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And yet the soul is not satisfied.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For what more has the wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' than the fool?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What does the poor man have,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who knows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: how
    - type: text
      text: ' to walk before the living?'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Better '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 11:9
      marker-yv: yv-n
    - type: text
      text: sight of the eyes than the wandering of desire.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'This also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity and grasping for the wind.'
