document_id: COL.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Not Philosophy but Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'For I want you to know what a great '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 1:30; Col. 1:29; 4:12; 1 Thess. 2:2
    marker-yv: yv-n
  - type: text
    text: 'conflict I have for you and those in Laodicea, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for
  - type: text
    text: ' as many as have not seen my face in the flesh, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'that their hearts may be encouraged, being knit together in love, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: attaining
  - type: text
    text: ' to all riches of the full assurance of understanding, to the knowledge of the mystery of God, both of the Father and of Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 1:24, 30
    marker-yv: yv-n
  - type: text
    text: in whom are hidden all the treasures of wisdom and knowledge.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now this I say '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:18; 2 Cor. 11:13; Eph. 4:14; 5:6
    marker-yv: yv-n
  - type: text
    text: 'lest anyone should deceive you with persuasive words. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 2:17
    marker-yv: yv-n
  - type: text
    text: 'though I am absent in the flesh, yet I am with you in spirit, rejoicing to see '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 14:40
    marker-yv: yv-n
  - type: text
    text: 'your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: good
  - type: text
    text: ' order and the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Pet. 5:9
    marker-yv: yv-n
  - type: text
    text: steadfastness of your faith in Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 4:1
    marker-yv: yv-n
  - type: text
    text: 'As you therefore have received Christ Jesus the Lord, so walk in Him, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 2:21
    marker-yv: yv-n
  - type: text
    text: rooted and built up in Him and established in the faith, as you have been taught, abounding in it with thanksgiving.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Beware lest anyone cheat you through philosophy and empty deceit, according to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gal. 1:14
    marker-yv: yv-n
  - type: text
    text: 'the tradition of men, according to the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gal. 4:3, 9, 10; Col. 2:20
    marker-yv: yv-n
  - type: text
    text: 'basic principles of the world, and not according to Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 1:14); Col. 1:19
    marker-yv: yv-n
  - type: text
    text: 'in Him dwells all the fullness of the Godhead bodily; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and you are complete in Him, who is the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Eph. 1:20, 21; 1 Pet. 3:22)
    marker-yv: yv-n
  - type: text
    text: head of all principality and power.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Not Legalism but Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'In Him you were also '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 10:16
    marker-yv: yv-n
  - type: text
    text: 'circumcised with the circumcision made without hands, by '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 6:6; 7:24; Gal. 5:24; Col. 3:5
    marker-yv: yv-n
  - type: text
    text: 'putting off the body of the sins of the flesh, by the circumcision of Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 6:4
    marker-yv: yv-n
  - type: text
    text: 'buried with Him in baptism, in which you also were raised with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him
  - type: text
    text: ' through '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 1:19, 20
    marker-yv: yv-n
  - type: text
    text: 'faith in the working of God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 2:24
    marker-yv: yv-n
  - type: text
    text: 'who raised Him from the dead. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And you, being dead in your trespasses and the uncircumcision of your flesh, He has made alive together with Him, having forgiven you all trespasses, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Eph. 2:15, 16); Col. 2:20
    marker-yv: yv-n
  - type: text
    text: 'having wiped out the handwriting of requirements that was against us, which was contrary to us. And He has taken it out of the way, having nailed it to the cross. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 53:12; Heb. 2:14)
    marker-yv: yv-n
  - type: text
    text: 'Having disarmed '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 6:12
    marker-yv: yv-n
  - type: text
    text: principalities and powers, He made a public spectacle of them, triumphing over them in it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So let no one '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 14:3
    marker-yv: yv-n
  - type: text
    text: 'judge you in food or in drink, or regarding a festival or a new moon or sabbaths, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. 8:5; 10:1
    marker-yv: yv-n
  - type: text
    text: 'which are a shadow of things to come, but the substance is of Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Let no one cheat you of your reward, taking delight in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'false'
  - type: text
    text: ' humility and worship of angels, intruding into those things which he has not seen, vainly puffed up by his fleshly mind, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and not holding fast to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 4:15
    marker-yv: yv-n
  - type: text
    text: 'the Head, from whom all the body, nourished and knit together by joints and ligaments, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 1:23; 4:16
    marker-yv: yv-n
  - type: text
    text: 'grows with the increase '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' from God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Therefore, if you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 6:2–5
    marker-yv: yv-n
  - type: text
    text: 'died with Christ from the basic principles of the world, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gal. 4:3, 9
    marker-yv: yv-n
  - type: text
    text: 'why, as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: though
  - type: text
    text: ' living in the world, do you subject yourselves to regulations—'
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Tim. 4:3
    marker-yv: yv-n
  - type: text
    text: '“Do not touch, do not taste, do not handle,” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: which all concern things which perish with the using—
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 29:13; Matt. 15:9; Titus 1:14
    marker-yv: yv-n
  - type: text
    text: 'according to the commandments and doctrines of men? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 13:14; 1 Tim. 4:8
    marker-yv: yv-n
  - type: text
    text: 'These things indeed have an appearance of wisdom in self-imposed religion, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'false'
  - type: text
    text: ' humility, and neglect of the body, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' of no value against the indulgence of the flesh.'
