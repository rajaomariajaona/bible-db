verses:
  '1':
  - type: heading
    content: Not Philosophy but Christ
  - type: text
    content: 'For I want you to know what a great '
  - type: note
    content: Phil. 1:30; Col. 1:29; 4:12; 1 Thess. 2:2
  - type: text
    content: 'conflict I have for you and those in Laodicea, and '
  - type: text
    content: for
  - type: text
    content: ' as many as have not seen my face in the flesh, '
  '10':
  - type: text
    content: 'and you are complete in Him, who is the '
  - type: note
    content: (Eph. 1:20, 21; 1 Pet. 3:22)
  - type: text
    content: head of all principality and power.
  - type: heading
    content: Not Legalism but Christ
  '11':
  - type: text
    content: 'In Him you were also '
  - type: note
    content: Deut. 10:16
  - type: text
    content: 'circumcised with the circumcision made without hands, by '
  - type: note
    content: Rom. 6:6; 7:24; Gal. 5:24; Col. 3:5
  - type: text
    content: 'putting off the body of the sins of the flesh, by the circumcision of Christ, '
  '12':
  - type: note
    content: Rom. 6:4
  - type: text
    content: 'buried with Him in baptism, in which you also were raised with '
  - type: text
    content: Him
  - type: text
    content: ' through '
  - type: note
    content: Eph. 1:19, 20
  - type: text
    content: 'faith in the working of God, '
  - type: note
    content: Acts 2:24
  - type: text
    content: 'who raised Him from the dead. '
  '13':
  - type: text
    content: 'And you, being dead in your trespasses and the uncircumcision of your flesh, He has made alive together with Him, having forgiven you all trespasses, '
  '14':
  - type: note
    content: (Eph. 2:15, 16); Col. 2:20
  - type: text
    content: 'having wiped out the handwriting of requirements that was against us, which was contrary to us. And He has taken it out of the way, having nailed it to the cross. '
  '15':
  - type: note
    content: (Is. 53:12; Heb. 2:14)
  - type: text
    content: 'Having disarmed '
  - type: note
    content: Eph. 6:12
  - type: text
    content: principalities and powers, He made a public spectacle of them, triumphing over them in it.
  '16':
  - type: text
    content: 'So let no one '
  - type: note
    content: Rom. 14:3
  - type: text
    content: 'judge you in food or in drink, or regarding a festival or a new moon or sabbaths, '
  '17':
  - type: note
    content: Heb. 8:5; 10:1
  - type: text
    content: 'which are a shadow of things to come, but the substance is of Christ. '
  '18':
  - type: text
    content: 'Let no one cheat you of your reward, taking delight in '
  - type: text
    content: 'false'
  - type: text
    content: ' humility and worship of angels, intruding into those things which he has not seen, vainly puffed up by his fleshly mind, '
  '19':
  - type: text
    content: 'and not holding fast to '
  - type: note
    content: Eph. 4:15
  - type: text
    content: 'the Head, from whom all the body, nourished and knit together by joints and ligaments, '
  - type: note
    content: Eph. 1:23; 4:16
  - type: text
    content: 'grows with the increase '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' from God.'
  '2':
  - type: text
    content: 'that their hearts may be encouraged, being knit together in love, and '
  - type: text
    content: attaining
  - type: text
    content: ' to all riches of the full assurance of understanding, to the knowledge of the mystery of God, both of the Father and of Christ, '
  '20':
  - type: text
    content: 'Therefore, if you '
  - type: note
    content: Rom. 6:2–5
  - type: text
    content: 'died with Christ from the basic principles of the world, '
  - type: note
    content: Gal. 4:3, 9
  - type: text
    content: 'why, as '
  - type: text
    content: though
  - type: text
    content: ' living in the world, do you subject yourselves to regulations—'
  '21':
  - type: note
    content: 1 Tim. 4:3
  - type: text
    content: '“Do not touch, do not taste, do not handle,” '
  '22':
  - type: text
    content: which all concern things which perish with the using—
  - type: note
    content: Is. 29:13; Matt. 15:9; Titus 1:14
  - type: text
    content: 'according to the commandments and doctrines of men? '
  '23':
  - type: note
    content: Rom. 13:14; 1 Tim. 4:8
  - type: text
    content: 'These things indeed have an appearance of wisdom in self-imposed religion, '
  - type: text
    content: 'false'
  - type: text
    content: ' humility, and neglect of the body, '
  - type: text
    content: but
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' of no value against the indulgence of the flesh.'
  '3':
  - type: note
    content: 1 Cor. 1:24, 30
  - type: text
    content: in whom are hidden all the treasures of wisdom and knowledge.
  '4':
  - type: text
    content: 'Now this I say '
  - type: note
    content: Rom. 16:18; 2 Cor. 11:13; Eph. 4:14; 5:6
  - type: text
    content: 'lest anyone should deceive you with persuasive words. '
  '5':
  - type: text
    content: 'For '
  - type: note
    content: 1 Thess. 2:17
  - type: text
    content: 'though I am absent in the flesh, yet I am with you in spirit, rejoicing to see '
  - type: note
    content: 1 Cor. 14:40
  - type: text
    content: 'your '
  - type: text
    content: good
  - type: text
    content: ' order and the '
  - type: note
    content: 1 Pet. 5:9
  - type: text
    content: steadfastness of your faith in Christ.
  '6':
  - type: note
    content: 1 Thess. 4:1
  - type: text
    content: 'As you therefore have received Christ Jesus the Lord, so walk in Him, '
  '7':
  - type: note
    content: Eph. 2:21
  - type: text
    content: rooted and built up in Him and established in the faith, as you have been taught, abounding in it with thanksgiving.
  '8':
  - type: text
    content: 'Beware lest anyone cheat you through philosophy and empty deceit, according to '
  - type: note
    content: Gal. 1:14
  - type: text
    content: 'the tradition of men, according to the '
  - type: note
    content: Gal. 4:3, 9, 10; Col. 2:20
  - type: text
    content: 'basic principles of the world, and not according to Christ. '
  '9':
  - type: text
    content: 'For '
  - type: note
    content: (John 1:14); Col. 1:19
  - type: text
    content: 'in Him dwells all the fullness of the Godhead bodily; '
