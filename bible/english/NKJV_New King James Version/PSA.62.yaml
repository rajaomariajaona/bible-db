document_id: PSA.62,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Calm Resolve to Wait for the Salvation of God
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. To '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 25:1
      marker-yv: yv-n
    - type: text
      text: Jeduthun. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Truly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 33:20
      marker-yv: yv-n
    - type: text
      text: 'my soul silently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: waits
    - type: text
      text: ' for God;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: comes
    - type: text
      text: ' my salvation.'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not trust in oppression,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor vainly hope in robbery;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 31:25; (Mark 10:24; Luke 12:15; 1 Tim. 6:10)
      marker-yv: yv-n
    - type: text
      text: If riches increase,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Do not set '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God has spoken once,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Twice I have heard this:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belongs
    - type: text
      text: ' to God.'
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Also to You, O Lord, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belongs
    - type: text
      text: ' mercy;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 16:27); Rom. 2:6; 1 Cor. 3:8
      marker-yv: yv-n
    - type: text
      text: You render to each one according to his work.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He only '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my rock and my salvation;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: He
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my defense;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I shall not be greatly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 55:22
      marker-yv: yv-n
    - type: text
      text: moved.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will you attack a man?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You shall be slain, all of you,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 30:13
      marker-yv: yv-n
    - type: text
      text: Like a leaning wall and a tottering fence.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They only consult to cast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' down from his high position;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 28:3
      marker-yv: yv-n
    - type: text
      text: delight in lies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They bless with their mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But they curse inwardly.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My soul, wait silently for God alone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For my expectation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' from Him.'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He only '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my rock and my salvation;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: He
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my defense;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I shall not be moved.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Jer. 3:23)
      marker-yv: yv-n
    - type: text
      text: 'In God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my salvation and my glory;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The rock of my strength,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' my refuge, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in God.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trust in Him at all times, you people;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 1:15; Ps. 42:4; Lam. 2:19
      marker-yv: yv-n
    - type: text
      text: Pour out your heart before Him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a refuge for us.'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 7:16; Ps. 39:5; Is. 40:17
      marker-yv: yv-n
    - type: text
      text: 'Surely men of low degree '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a vapor,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Men of high degree '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a lie;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If they are weighed on the scales,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' altogether '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lighter
    - type: text
      text: ' than vapor.'
