document_id: ACT.4,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Peter and John Arrested
  - type: text
    content: 'Now as they spoke to the people, the priests, the captain of the temple, and the '
  - type: note
    content: Matt. 22:23
  - type: text
    content: 'Sadducees came upon them, '
  '10':
  - type: text
    content: 'let it be known to you all, and to all the people of Israel, '
  - type: note
    content: Acts 2:22; 3:6, 16
  - type: text
    content: 'that by the name of Jesus Christ of Nazareth, whom you crucified, '
  - type: note
    content: Acts 2:24
  - type: text
    content: 'whom God raised from the dead, by Him this man stands here before you whole. '
  '11':
  - type: text
    content: 'This is the '
  - type: note
    content: Ps. 118:22; Is. 28:16; Matt. 21:42
  - type: text
    content: '‘stone which was rejected by you builders, which has become the chief cornerstone.’ '
  '12':
  - type: note
    content: Is. 42:1, 6, 7; 53:11; Dan. 9:24; (Matt. 1:21; John 14:6; Acts 10:43; 1 Tim. 2:5, 6)
  - type: text
    content: Nor is there salvation in any other, for there is no other name under heaven given among men by which we must be saved.”
  - type: heading
    content: The Name of Jesus Forbidden
  '13':
  - type: text
    content: 'Now when they saw the boldness of Peter and John, '
  - type: note
    content: Matt. 11:25; (1 Cor. 1:27)
  - type: text
    content: 'and perceived that they were uneducated and untrained men, they marveled. And they realized that they had been with Jesus. '
  '14':
  - type: text
    content: 'And seeing the man who had been healed '
  - type: note
    content: Acts 3:11
  - type: text
    content: 'standing with them, they could say nothing against it. '
  '15':
  - type: text
    content: 'But when they had commanded them to go aside out of the council, they conferred among themselves, '
  '16':
  - type: text
    content: 'saying, '
  - type: note
    content: John 11:47
  - type: text
    content: '“What shall we do to these men? For, indeed, that a notable miracle has been done through them '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: Acts 3:7–10
  - type: text
    content: 'evident to all who dwell in Jerusalem, and we cannot deny '
  - type: text
    content: it.
  - type: text
    content: ' '
  '17':
  - type: text
    content: But so that it spreads no further among the people, let us severely threaten them, that from now on they speak to no man in this name.”
  '18':
  - type: note
    content: Acts 5:28, 40
  - type: text
    content: 'So they called them and commanded them not to speak at all nor teach in the name of Jesus. '
  '19':
  - type: text
    content: 'But Peter and John answered and said to them, '
  - type: note
    content: Acts 5:29
  - type: text
    content: '“Whether it is right in the sight of God to listen to you more than to God, you judge. '
  '2':
  - type: text
    content: 'being greatly disturbed that they taught the people and preached in Jesus the resurrection from the dead. '
  '20':
  - type: note
    content: Acts 1:8; 2:32
  - type: text
    content: 'For we cannot but speak the things which '
  - type: note
    content: Acts 22:15; (1 John 1:1, 3)
  - type: text
    content: 'we have seen and heard.” '
  '21':
  - type: text
    content: 'So when they had further threatened them, they let them go, finding no way of punishing them, '
  - type: note
    content: Matt. 21:26; Luke 20:6, 19; 22:2; Acts 5:26
  - type: text
    content: 'because of the people, since they all '
  - type: note
    content: Matt. 15:31
  - type: text
    content: 'glorified God for '
  - type: note
    content: Acts 3:7, 8
  - type: text
    content: 'what had been done. '
  '22':
  - type: text
    content: For the man was over forty years old on whom this miracle of healing had been performed.
  - type: heading
    content: Prayer for Boldness
  '23':
  - type: text
    content: 'And being let go, '
  - type: note
    content: Acts 2:44–46; 12:12
  - type: text
    content: 'they went to their own '
  - type: text
    content: companions
  - type: text
    content: ' and reported all that the chief priests and elders had said to them. '
  '24':
  - type: text
    content: 'So when they heard that, they raised their voice to God with one accord and said: “Lord, '
  - type: note
    content: Ex. 20:11; 2 Kin. 19:15; Neh. 9:6; Ps. 146:6
  - type: text
    content: 'You '
  - type: text
    content: are
  - type: text
    content: ' God, who made heaven and earth and the sea, and all that is in them, '
  '25':
  - type: text
    content: 'who by the mouth of Your servant David have said:'
  - type: note
    content: Ps. 2:1, 2
  - type: text
    content: ‘Why did the nations rage,
  - type: text
    content: And the people plot vain things?
  '26':
  - type: text
    content: The kings of the earth took their stand,
  - type: text
    content: And the rulers were gathered together
  - type: text
    content: 'Against the '
  - type: heading
    content: Lord
  - type: text
    content: ' and against His Christ.’'
  '27':
  - type: text
    content: '“For '
  - type: note
    content: Matt. 26:3; Luke 22:2; 23:1, 8
  - type: text
    content: 'truly against '
  - type: note
    content: (Luke 1:35)
  - type: text
    content: 'Your holy Servant Jesus, '
  - type: note
    content: Luke 4:18; John 10:36
  - type: text
    content: 'whom You anointed, both Herod and Pontius Pilate, with the Gentiles and the people of Israel, were gathered together '
  '28':
  - type: note
    content: Acts 2:23; 3:18
  - type: text
    content: 'to do whatever Your hand and Your purpose determined before to be done. '
  '29':
  - type: text
    content: 'Now, Lord, look on their threats, and grant to Your servants '
  - type: note
    content: Acts 4:13, 31; 9:27; 13:46; 14:3; 19:8; 26:26; Eph. 6:19
  - type: text
    content: 'that with all boldness they may speak Your word, '
  '3':
  - type: text
    content: 'And they laid hands on them, and put '
  - type: text
    content: them
  - type: text
    content: ' in custody until the next day, for it was already evening. '
  '30':
  - type: text
    content: 'by stretching out Your hand to heal, '
  - type: note
    content: Acts 2:43; 5:12
  - type: text
    content: 'and that signs and wonders may be done '
  - type: note
    content: Acts 3:6, 16
  - type: text
    content: 'through the name of '
  - type: note
    content: Acts 4:27
  - type: text
    content: Your holy Servant Jesus.”
  '31':
  - type: text
    content: 'And when they had prayed, '
  - type: note
    content: Matt. 5:6; Acts 2:2, 4; 16:26
  - type: text
    content: 'the place where they were assembled together was shaken; and they were all filled with the Holy Spirit, '
  - type: note
    content: Acts 4:29
  - type: text
    content: and they spoke the word of God with boldness.
  - type: heading
    content: Sharing in All Things
  '32':
  - type: text
    content: 'Now the multitude of those who believed '
  - type: note
    content: Acts 5:12; Rom. 15:5, 6; 2 Cor. 13:11; Phil. 1:27; 2:2; 1 Pet. 3:8
  - type: text
    content: 'were of one heart and one soul; '
  - type: note
    content: Acts 2:44
  - type: text
    content: 'neither did anyone say that any of the things he possessed was his own, but they had all things in common. '
  '33':
  - type: text
    content: 'And with '
  - type: note
    content: (Acts 1:8)
  - type: text
    content: 'great power the apostles gave '
  - type: note
    content: Acts 1:22
  - type: text
    content: 'witness to the resurrection of the Lord Jesus. And '
  - type: note
    content: Rom. 6:15
  - type: text
    content: 'great grace was upon them all. '
  '34':
  - type: text
    content: 'Nor was there anyone among them who lacked; '
  - type: note
    content: (Matt. 19:21); Acts 2:45
  - type: text
    content: 'for all who were possessors of lands or houses sold them, and brought the proceeds of the things that were sold, '
  '35':
  - type: note
    content: Acts 4:37; 5:2
  - type: text
    content: 'and laid '
  - type: text
    content: them
  - type: text
    content: ' at the apostles’ feet; '
  - type: note
    content: Acts 2:45; 6:1
  - type: text
    content: and they distributed to each as anyone had need.
  '36':
  - type: text
    content: 'And Joses, who was also named Barnabas by the apostles (which is translated Son of Encouragement), a Levite of the country of Cyprus, '
  '37':
  - type: note
    content: Acts 4:34, 35; 5:1, 2
  - type: text
    content: 'having land, sold '
  - type: text
    content: it,
  - type: text
    content: ' and brought the money and laid '
  - type: text
    content: it
  - type: text
    content: ' at the apostles’ feet.'
  '4':
  - type: text
    content: However, many of those who heard the word believed; and the number of the men came to be about five thousand.
  - type: heading
    content: Addressing the Sanhedrin
  '5':
  - type: text
    content: 'And it came to pass, on the next day, that their rulers, elders, and scribes, '
  '6':
  - type: text
    content: 'as well as '
  - type: note
    content: Luke 3:2; John 11:49; 18:13
  - type: text
    content: 'Annas the high priest, Caiaphas, John, and Alexander, and as many as were of the family of the high priest, were gathered together at Jerusalem. '
  '7':
  - type: text
    content: 'And when they had set them in the midst, they asked, '
  - type: note
    content: Ex. 2:14; Matt. 21:23; Acts 7:27
  - type: text
    content: “By what power or by what name have you done this?”
  '8':
  - type: note
    content: Luke 12:11, 12
  - type: text
    content: 'Then Peter, filled with the Holy Spirit, said to them, “Rulers of the people and elders of Israel: '
  '9':
  - type: text
    content: 'If we this day are judged for a good deed '
  - type: text
    content: done
  - type: text
    content: ' to a helpless man, by what means he has been made well, '
