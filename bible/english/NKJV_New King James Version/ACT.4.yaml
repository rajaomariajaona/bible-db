document_id: ACT.4,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter and John Arrested
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now as they spoke to the people, the priests, the captain of the temple, and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 22:23
      marker-yv: yv-n
    - type: text
      text: 'Sadducees came upon them, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'let it be known to you all, and to all the people of Israel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:22; 3:6, 16
      marker-yv: yv-n
    - type: text
      text: 'that by the name of Jesus Christ of Nazareth, whom you crucified, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:24
      marker-yv: yv-n
    - type: text
      text: 'whom God raised from the dead, by Him this man stands here before you whole. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 118:22; Is. 28:16; Matt. 21:42
      marker-yv: yv-n
    - type: text
      text: '‘stone which was rejected by you builders, which has become the chief cornerstone.’ '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 42:1, 6, 7; 53:11; Dan. 9:24; (Matt. 1:21; John 14:6; Acts 10:43; 1 Tim. 2:5, 6)
      marker-yv: yv-n
    - type: text
      text: Nor is there salvation in any other, for there is no other name under heaven given among men by which we must be saved.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Name of Jesus Forbidden
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when they saw the boldness of Peter and John, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 11:25; (1 Cor. 1:27)
      marker-yv: yv-n
    - type: text
      text: 'and perceived that they were uneducated and untrained men, they marveled. And they realized that they had been with Jesus. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And seeing the man who had been healed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 3:11
      marker-yv: yv-n
    - type: text
      text: 'standing with them, they could say nothing against it. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they had commanded them to go aside out of the council, they conferred among themselves, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 11:47
      marker-yv: yv-n
    - type: text
      text: '“What shall we do to these men? For, indeed, that a notable miracle has been done through them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 3:7–10
      marker-yv: yv-n
    - type: text
      text: 'evident to all who dwell in Jerusalem, and we cannot deny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But so that it spreads no further among the people, let us severely threaten them, that from now on they speak to no man in this name.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 5:28, 40
      marker-yv: yv-n
    - type: text
      text: 'So they called them and commanded them not to speak at all nor teach in the name of Jesus. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Peter and John answered and said to them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 5:29
      marker-yv: yv-n
    - type: text
      text: '“Whether it is right in the sight of God to listen to you more than to God, you judge. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'being greatly disturbed that they taught the people and preached in Jesus the resurrection from the dead. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 1:8; 2:32
      marker-yv: yv-n
    - type: text
      text: 'For we cannot but speak the things which '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 22:15; (1 John 1:1, 3)
      marker-yv: yv-n
    - type: text
      text: 'we have seen and heard.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when they had further threatened them, they let them go, finding no way of punishing them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 21:26; Luke 20:6, 19; 22:2; Acts 5:26
      marker-yv: yv-n
    - type: text
      text: 'because of the people, since they all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 15:31
      marker-yv: yv-n
    - type: text
      text: 'glorified God for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 3:7, 8
      marker-yv: yv-n
    - type: text
      text: 'what had been done. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the man was over forty years old on whom this miracle of healing had been performed.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prayer for Boldness
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And being let go, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:44–46; 12:12
      marker-yv: yv-n
    - type: text
      text: 'they went to their own '
    - type: usfm
      marker: it
      children:
      - type: text
        text: companions
    - type: text
      text: ' and reported all that the chief priests and elders had said to them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when they heard that, they raised their voice to God with one accord and said: “Lord, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:11; 2 Kin. 19:15; Neh. 9:6; Ps. 146:6
      marker-yv: yv-n
    - type: text
      text: 'You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' God, who made heaven and earth and the sea, and all that is in them, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who by the mouth of Your servant David have said:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 2:1, 2
      marker-yv: yv-n
    - type: text
      text: ‘Why did the nations rage,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the people plot vain things?
  '26':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The kings of the earth took their stand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the rulers were gathered together
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Against the '
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Lord
    - type: text
      text: ' and against His Christ.’'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 26:3; Luke 22:2; 23:1, 8
      marker-yv: yv-n
    - type: text
      text: 'truly against '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Luke 1:35)
      marker-yv: yv-n
    - type: text
      text: 'Your holy Servant Jesus, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 4:18; John 10:36
      marker-yv: yv-n
    - type: text
      text: 'whom You anointed, both Herod and Pontius Pilate, with the Gentiles and the people of Israel, were gathered together '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:23; 3:18
      marker-yv: yv-n
    - type: text
      text: 'to do whatever Your hand and Your purpose determined before to be done. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, Lord, look on their threats, and grant to Your servants '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:13, 31; 9:27; 13:46; 14:3; 19:8; 26:26; Eph. 6:19
      marker-yv: yv-n
    - type: text
      text: 'that with all boldness they may speak Your word, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they laid hands on them, and put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' in custody until the next day, for it was already evening. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'by stretching out Your hand to heal, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:43; 5:12
      marker-yv: yv-n
    - type: text
      text: 'and that signs and wonders may be done '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 3:6, 16
      marker-yv: yv-n
    - type: text
      text: 'through the name of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:27
      marker-yv: yv-n
    - type: text
      text: Your holy Servant Jesus.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they had prayed, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 5:6; Acts 2:2, 4; 16:26
      marker-yv: yv-n
    - type: text
      text: 'the place where they were assembled together was shaken; and they were all filled with the Holy Spirit, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:29
      marker-yv: yv-n
    - type: text
      text: and they spoke the word of God with boldness.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sharing in All Things
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the multitude of those who believed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 5:12; Rom. 15:5, 6; 2 Cor. 13:11; Phil. 1:27; 2:2; 1 Pet. 3:8
      marker-yv: yv-n
    - type: text
      text: 'were of one heart and one soul; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:44
      marker-yv: yv-n
    - type: text
      text: 'neither did anyone say that any of the things he possessed was his own, but they had all things in common. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 1:8)
      marker-yv: yv-n
    - type: text
      text: 'great power the apostles gave '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 1:22
      marker-yv: yv-n
    - type: text
      text: 'witness to the resurrection of the Lord Jesus. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 6:15
      marker-yv: yv-n
    - type: text
      text: 'great grace was upon them all. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nor was there anyone among them who lacked; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 19:21); Acts 2:45
      marker-yv: yv-n
    - type: text
      text: 'for all who were possessors of lands or houses sold them, and brought the proceeds of the things that were sold, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:37; 5:2
      marker-yv: yv-n
    - type: text
      text: 'and laid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' at the apostles’ feet; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:45; 6:1
      marker-yv: yv-n
    - type: text
      text: and they distributed to each as anyone had need.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joses, who was also named Barnabas by the apostles (which is translated Son of Encouragement), a Levite of the country of Cyprus, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:34, 35; 5:1, 2
      marker-yv: yv-n
    - type: text
      text: 'having land, sold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' and brought the money and laid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' at the apostles’ feet.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: However, many of those who heard the word believed; and the number of the men came to be about five thousand.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Addressing the Sanhedrin
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, on the next day, that their rulers, elders, and scribes, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as well as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 3:2; John 11:49; 18:13
      marker-yv: yv-n
    - type: text
      text: 'Annas the high priest, Caiaphas, John, and Alexander, and as many as were of the family of the high priest, were gathered together at Jerusalem. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they had set them in the midst, they asked, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 2:14; Matt. 21:23; Acts 7:27
      marker-yv: yv-n
    - type: text
      text: “By what power or by what name have you done this?”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 12:11, 12
      marker-yv: yv-n
    - type: text
      text: 'Then Peter, filled with the Holy Spirit, said to them, “Rulers of the people and elders of Israel: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If we this day are judged for a good deed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: done
    - type: text
      text: ' to a helpless man, by what means he has been made well, '
