document_id: PRO.12,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever loves instruction loves knowledge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he who hates correction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' stupid.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 25:4
      marker-yv: yv-n
    - type: text
      text: 'A righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' regards the life of his animal,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the tender mercies of the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' cruel.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 3:19
      marker-yv: yv-n
    - type: text
      text: 'He who tills his land will be satisfied with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 28:19
      marker-yv: yv-n
    - type: text
      text: bread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he who follows frivolity '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 6:32
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' devoid of understanding.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The wicked covet the catch of evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the root of the righteous yields '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fruit.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 18:7
      marker-yv: yv-n
    - type: text
      text: 'The wicked is ensnared by the transgression of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' lips,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Pet. 2:9)
      marker-yv: yv-n
    - type: text
      text: But the righteous will come through trouble.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 13:2; 15:23; 18:20
      marker-yv: yv-n
    - type: text
      text: 'A man will be satisfied with good by the fruit of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' mouth,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 34:11; Prov. 1:31; 24:12; (Is. 3:10, 11); Hos. 4:9
      marker-yv: yv-n
    - type: text
      text: And the recompense of a man’s hands will be rendered to him.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 3:7; Luke 18:11
      marker-yv: yv-n
    - type: text
      text: 'The way of a fool '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' right in his own eyes,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he who heeds counsel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' wise.'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 11:13; 29:11
      marker-yv: yv-n
    - type: text
      text: A fool’s wrath is known at once,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a prudent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' covers shame.'
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 14:5
      marker-yv: yv-n
    - type: text
      text: 'He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' speaks truth declares righteousness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a false witness, deceit.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 57:4; Prov. 4:22; 15:4
      marker-yv: yv-n
    - type: text
      text: There is one who speaks like the piercings of a sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the tongue of the wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: promotes
    - type: text
      text: ' health.'
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The truthful lip shall be established forever,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 52:4, 5); Prov. 19:9
      marker-yv: yv-n
    - type: text
      text: 'But a lying tongue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' but for a moment.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' obtains favor from the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a man of wicked intentions He will condemn.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Deceit is in the heart of those who devise evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But counselors of peace have joy.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 91:10; Prov. 1:33; 1 Pet. 3:13
      marker-yv: yv-n
    - type: text
      text: No grave trouble will overtake the righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the wicked shall be filled with evil.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 6:17; 11:20; Rev. 22:15
      marker-yv: yv-n
    - type: text
      text: 'Lying lips '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' an abomination to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But those who deal truthfully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' His delight.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 13:16
      marker-yv: yv-n
    - type: text
      text: A prudent man conceals knowledge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the heart of fools proclaims foolishness.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 10:4
      marker-yv: yv-n
    - type: text
      text: The hand of the diligent will rule,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the lazy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' will be put to forced labor.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 15:13
      marker-yv: yv-n
    - type: text
      text: Anxiety in the heart of man causes depression,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 50:4
      marker-yv: yv-n
    - type: text
      text: a good word makes it glad.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The righteous should choose his friends carefully,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the way of the wicked leads them astray.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The lazy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' does not roast what he took in hunting,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But diligence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' man’s precious possession.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the way of righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' life,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: its
    - type: text
      text: ' pathway '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no death.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A man is not established by wickedness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 10:25)
      marker-yv: yv-n
    - type: text
      text: root of the righteous cannot be moved.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 31:23; 1 Cor. 11:7
      marker-yv: yv-n
    - type: text
      text: 'An excellent wife '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the crown of her husband,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But she who causes shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 14:30; Hab. 3:16
      marker-yv: yv-n
    - type: text
      text: like rottenness in his bones.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The thoughts of the righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' right,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But
    - type: text
      text: ' the counsels of the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' deceitful.'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 1:11, 18
      marker-yv: yv-n
    - type: text
      text: 'The words of the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are,
    - type: text
      text: ' “Lie in wait for blood,”'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 14:3
      marker-yv: yv-n
    - type: text
      text: But the mouth of the upright will deliver them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:35–37; Prov. 11:21; Matt. 7:24–27
      marker-yv: yv-n
    - type: text
      text: 'The wicked are overthrown and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' no more,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the house of the righteous will stand.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A man will be commended according to his wisdom,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 25:17; Prov. 18:3
      marker-yv: yv-n
    - type: text
      text: But he who is of a perverse heart will be despised.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 13:7
      marker-yv: yv-n
    - type: text
      text: 'Better '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' who is slighted but has a servant,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Than he who honors himself but lacks bread.
