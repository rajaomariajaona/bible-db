document_id: LEV.22,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:33; Lev. 22:13; Num. 3:10
      marker-yv: yv-n
    - type: text
      text: '‘No outsider shall eat the holy offering; one who dwells with the priest, or a hired servant, shall not eat the holy thing. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But if the priest '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:44
      marker-yv: yv-n
    - type: text
      text: 'buys a person with his money, he may eat it; and one who is born in his house may eat his food. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'If the priest’s daughter is married to an outsider, she may not eat of the holy offerings. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But if the priest’s daughter is a widow or divorced, and has no child, and has returned to her father’s house as in her youth, she may eat her father’s food; but no outsider shall eat it.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '‘And if a man eats the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 18:32
      marker-yv: yv-n
    - type: text
      text: 'holy offering unintentionally, then he shall restore a holy offering to the priest, and add one-fifth to it. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'They shall not profane the holy offerings of the children of Israel, which they offer to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'or allow them to bear the guilt of trespass when they eat their holy offerings; for I the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sanctify them.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Offerings Accepted and Not Accepted
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Speak to Aaron and his sons, and to all the children of Israel, and say to them: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:2, 3, 10
      marker-yv: yv-n
    - type: text
      text: '‘Whatever man of the house of Israel, or of the strangers in Israel, who offers his sacrifice for any of his vows or for any of his freewill offerings, which they offer to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as a burnt offering— '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:3; Deut. 15:21
      marker-yv: yv-n
    - type: text
      text: 'you shall offer of your own free will a male without blemish from the cattle, from the sheep, or from the goats. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Speak to Aaron and his sons, that they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 6:3
      marker-yv: yv-n
    - type: text
      text: 'separate themselves from the holy things of the children of Israel, and that they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:21
      marker-yv: yv-n
    - type: text
      text: 'do not profane My holy name by what they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:38; Lev. 16:19; 25:10; Num. 18:32; Deut. 15:19
      marker-yv: yv-n
    - type: text
      text: 'dedicate to Me: I am the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 15:21; 17:1; Mal. 1:8, 14; (Eph. 5:27; Heb. 9:14; 1 Pet. 1:19)
      marker-yv: yv-n
    - type: text
      text: 'Whatever has a defect, you shall not offer, for it shall not be acceptable on your behalf. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:1, 6
      marker-yv: yv-n
    - type: text
      text: 'whoever offers a sacrifice of a peace offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 15:3, 8; Ps. 61:8; 65:1; Eccl. 5:4, 5
      marker-yv: yv-n
    - type: text
      text: 'to fulfill his vow, or a freewill offering from the cattle or the sheep, it must be perfect to be accepted; there shall be no defect in it. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 22:20; Mal. 1:8
      marker-yv: yv-n
    - type: text
      text: 'Those that are blind or broken or maimed, or have an ulcer or eczema or scabs, you shall not offer to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', nor make '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:9, 13; 3:3, 5
      marker-yv: yv-n
    - type: text
      text: 'an offering by fire of them on the altar to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Either a bull or a lamb that has any limb '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 21:18
      marker-yv: yv-n
    - type: text
      text: too long or too short you may offer as a freewill offering, but for a vow it shall not be accepted.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '‘You shall not offer to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' what is bruised or crushed, or torn or cut; nor shall you make any offering of them in your land. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Nor '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 15:15, 16
      marker-yv: yv-n
    - type: text
      text: 'from a foreigner’s hand shall you offer any of these as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 21:6, 17
      marker-yv: yv-n
    - type: text
      text: 'the bread of your God, because their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 1:14
      marker-yv: yv-n
    - type: text
      text: corruption is in them, and defects are in them. They shall not be accepted on your behalf.’ ”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:30
      marker-yv: yv-n
    - type: text
      text: '“When a bull or a sheep or a goat is born, it shall be seven days with its mother; and from the eighth day and thereafter it shall be accepted as an offering made by fire to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Whether it is a cow or ewe, do not kill both her '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 22:6, 7
      marker-yv: yv-n
    - type: text
      text: 'and her young on the same day. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And when you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:12; Ps. 107:22; 116:17; Amos 4:5
      marker-yv: yv-n
    - type: text
      text: 'offer a sacrifice of thanksgiving to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', offer it of your own free will. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Say to them: ‘Whoever of all your descendants throughout your generations, who goes near the holy things which the children of Israel dedicate to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:20, 21; Num. 19:13
      marker-yv: yv-n
    - type: text
      text: 'while he has uncleanness upon him, that person shall be cut off from My presence: I am the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'On the same day it shall be eaten; you shall leave '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:15
      marker-yv: yv-n
    - type: text
      text: 'none of it until morning: I am the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:37; Num. 15:40; Deut. 4:40
      marker-yv: yv-n
    - type: text
      text: '“Therefore you shall keep My commandments, and perform them: I am the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:21
      marker-yv: yv-n
    - type: text
      text: 'You shall not profane My holy name, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 10:3; Matt. 6:9; Luke 11:2
      marker-yv: yv-n
    - type: text
      text: 'I will be hallowed among the children of Israel. I am the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 20:8
      marker-yv: yv-n
    - type: text
      text: 'sanctifies you, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:36, 37; Num. 15:40; Deut. 4:40
      marker-yv: yv-n
    - type: text
      text: 'who brought you out of the land of Egypt, to be your God: I am the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '‘Whatever man of the descendants of Aaron, who is a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 5:2
      marker-yv: yv-n
    - type: text
      text: 'leper or has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:2
      marker-yv: yv-n
    - type: text
      text: 'a discharge, shall not eat the holy offerings '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:2; 15:13
      marker-yv: yv-n
    - type: text
      text: 'until he is clean. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:24–28, 39, 40; Num. 19:11
      marker-yv: yv-n
    - type: text
      text: 'whoever touches anything made unclean by a corpse, or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:16, 17
      marker-yv: yv-n
    - type: text
      text: 'a man who has had an emission of semen, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:23–28
      marker-yv: yv-n
    - type: text
      text: 'whoever touches any creeping thing by which he would be made unclean, or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:7, 19
      marker-yv: yv-n
    - type: text
      text: 'any person by whom he would become unclean, whatever his uncleanness may be— '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'the person who has touched any such thing shall be unclean until evening, and shall not eat the holy offerings unless he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:5
      marker-yv: yv-n
    - type: text
      text: 'washes his body with water. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And when the sun goes down he shall be clean; and afterward he may eat the holy offerings, because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 21:22; Num. 18:11, 13
      marker-yv: yv-n
    - type: text
      text: 'it is his food. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:31; Lev. 7:24; 11:39, 40; 17:15; Ezek. 44:31
      marker-yv: yv-n
    - type: text
      text: 'Whatever dies naturally or is torn by beasts he shall not eat, to defile himself with it: I am the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '‘They shall therefore keep '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:30
      marker-yv: yv-n
    - type: text
      text: 'My ordinance, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:43; Lev. 22:16; Num. 18:22
      marker-yv: yv-n
    - type: text
      text: 'lest they bear sin for it and die thereby, if they profane it: I the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sanctify them.'
