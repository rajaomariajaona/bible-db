document_id: LEV.22,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: note
    content: Ex. 29:33; Lev. 22:13; Num. 3:10
  - type: text
    content: '‘No outsider shall eat the holy offering; one who dwells with the priest, or a hired servant, shall not eat the holy thing. '
  '11':
  - type: text
    content: 'But if the priest '
  - type: note
    content: Ex. 12:44
  - type: text
    content: 'buys a person with his money, he may eat it; and one who is born in his house may eat his food. '
  '12':
  - type: text
    content: 'If the priest’s daughter is married to an outsider, she may not eat of the holy offerings. '
  '13':
  - type: text
    content: But if the priest’s daughter is a widow or divorced, and has no child, and has returned to her father’s house as in her youth, she may eat her father’s food; but no outsider shall eat it.
  '14':
  - type: text
    content: '‘And if a man eats the '
  - type: note
    content: Num. 18:32
  - type: text
    content: 'holy offering unintentionally, then he shall restore a holy offering to the priest, and add one-fifth to it. '
  '15':
  - type: text
    content: 'They shall not profane the holy offerings of the children of Israel, which they offer to the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  '16':
  - type: text
    content: 'or allow them to bear the guilt of trespass when they eat their holy offerings; for I the '
  - type: heading
    content: Lord
  - type: text
    content: ' sanctify them.’ ”'
  - type: heading
    content: Offerings Accepted and Not Accepted
  '17':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '18':
  - type: text
    content: '“Speak to Aaron and his sons, and to all the children of Israel, and say to them: '
  - type: note
    content: Lev. 1:2, 3, 10
  - type: text
    content: '‘Whatever man of the house of Israel, or of the strangers in Israel, who offers his sacrifice for any of his vows or for any of his freewill offerings, which they offer to the '
  - type: heading
    content: Lord
  - type: text
    content: ' as a burnt offering— '
  '19':
  - type: note
    content: Lev. 1:3; Deut. 15:21
  - type: text
    content: 'you shall offer of your own free will a male without blemish from the cattle, from the sheep, or from the goats. '
  '2':
  - type: text
    content: '“Speak to Aaron and his sons, that they '
  - type: note
    content: Num. 6:3
  - type: text
    content: 'separate themselves from the holy things of the children of Israel, and that they '
  - type: note
    content: Lev. 18:21
  - type: text
    content: 'do not profane My holy name by what they '
  - type: note
    content: Ex. 28:38; Lev. 16:19; 25:10; Num. 18:32; Deut. 15:19
  - type: text
    content: 'dedicate to Me: I am the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: note
    content: Deut. 15:21; 17:1; Mal. 1:8, 14; (Eph. 5:27; Heb. 9:14; 1 Pet. 1:19)
  - type: text
    content: 'Whatever has a defect, you shall not offer, for it shall not be acceptable on your behalf. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: Lev. 3:1, 6
  - type: text
    content: 'whoever offers a sacrifice of a peace offering to the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Num. 15:3, 8; Ps. 61:8; 65:1; Eccl. 5:4, 5
  - type: text
    content: 'to fulfill his vow, or a freewill offering from the cattle or the sheep, it must be perfect to be accepted; there shall be no defect in it. '
  '22':
  - type: note
    content: Lev. 22:20; Mal. 1:8
  - type: text
    content: 'Those that are blind or broken or maimed, or have an ulcer or eczema or scabs, you shall not offer to the '
  - type: heading
    content: Lord
  - type: text
    content: ', nor make '
  - type: note
    content: Lev. 1:9, 13; 3:3, 5
  - type: text
    content: 'an offering by fire of them on the altar to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Either a bull or a lamb that has any limb '
  - type: note
    content: Lev. 21:18
  - type: text
    content: too long or too short you may offer as a freewill offering, but for a vow it shall not be accepted.
  '24':
  - type: text
    content: '‘You shall not offer to the '
  - type: heading
    content: Lord
  - type: text
    content: ' what is bruised or crushed, or torn or cut; nor shall you make any offering of them in your land. '
  '25':
  - type: text
    content: 'Nor '
  - type: note
    content: Num. 15:15, 16
  - type: text
    content: 'from a foreigner’s hand shall you offer any of these as '
  - type: note
    content: Lev. 21:6, 17
  - type: text
    content: 'the bread of your God, because their '
  - type: note
    content: Mal. 1:14
  - type: text
    content: corruption is in them, and defects are in them. They shall not be accepted on your behalf.’ ”
  '26':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '27':
  - type: note
    content: Ex. 22:30
  - type: text
    content: '“When a bull or a sheep or a goat is born, it shall be seven days with its mother; and from the eighth day and thereafter it shall be accepted as an offering made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Whether it is a cow or ewe, do not kill both her '
  - type: note
    content: Deut. 22:6, 7
  - type: text
    content: 'and her young on the same day. '
  '29':
  - type: text
    content: 'And when you '
  - type: note
    content: Lev. 7:12; Ps. 107:22; 116:17; Amos 4:5
  - type: text
    content: 'offer a sacrifice of thanksgiving to the '
  - type: heading
    content: Lord
  - type: text
    content: ', offer it of your own free will. '
  '3':
  - type: text
    content: 'Say to them: ‘Whoever of all your descendants throughout your generations, who goes near the holy things which the children of Israel dedicate to the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Lev. 7:20, 21; Num. 19:13
  - type: text
    content: 'while he has uncleanness upon him, that person shall be cut off from My presence: I am the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '30':
  - type: text
    content: 'On the same day it shall be eaten; you shall leave '
  - type: note
    content: Lev. 7:15
  - type: text
    content: 'none of it until morning: I am the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '31':
  - type: note
    content: Lev. 19:37; Num. 15:40; Deut. 4:40
  - type: text
    content: '“Therefore you shall keep My commandments, and perform them: I am the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '32':
  - type: note
    content: Lev. 18:21
  - type: text
    content: 'You shall not profane My holy name, but '
  - type: note
    content: Lev. 10:3; Matt. 6:9; Luke 11:2
  - type: text
    content: 'I will be hallowed among the children of Israel. I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' who '
  - type: note
    content: Lev. 20:8
  - type: text
    content: 'sanctifies you, '
  '33':
  - type: note
    content: Lev. 19:36, 37; Num. 15:40; Deut. 4:40
  - type: text
    content: 'who brought you out of the land of Egypt, to be your God: I am the '
  - type: heading
    content: Lord
  - type: text
    content: .”
  '4':
  - type: text
    content: '‘Whatever man of the descendants of Aaron, who is a '
  - type: note
    content: Num. 5:2
  - type: text
    content: 'leper or has '
  - type: note
    content: Lev. 15:2
  - type: text
    content: 'a discharge, shall not eat the holy offerings '
  - type: note
    content: Lev. 14:2; 15:13
  - type: text
    content: 'until he is clean. And '
  - type: note
    content: Lev. 11:24–28, 39, 40; Num. 19:11
  - type: text
    content: 'whoever touches anything made unclean by a corpse, or '
  - type: note
    content: Lev. 15:16, 17
  - type: text
    content: 'a man who has had an emission of semen, '
  '5':
  - type: text
    content: 'or '
  - type: note
    content: Lev. 11:23–28
  - type: text
    content: 'whoever touches any creeping thing by which he would be made unclean, or '
  - type: note
    content: Lev. 15:7, 19
  - type: text
    content: 'any person by whom he would become unclean, whatever his uncleanness may be— '
  '6':
  - type: text
    content: 'the person who has touched any such thing shall be unclean until evening, and shall not eat the holy offerings unless he '
  - type: note
    content: Lev. 15:5
  - type: text
    content: 'washes his body with water. '
  '7':
  - type: text
    content: 'And when the sun goes down he shall be clean; and afterward he may eat the holy offerings, because '
  - type: note
    content: Lev. 21:22; Num. 18:11, 13
  - type: text
    content: 'it is his food. '
  '8':
  - type: note
    content: Ex. 22:31; Lev. 7:24; 11:39, 40; 17:15; Ezek. 44:31
  - type: text
    content: 'Whatever dies naturally or is torn by beasts he shall not eat, to defile himself with it: I am the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: '‘They shall therefore keep '
  - type: note
    content: Lev. 18:30
  - type: text
    content: 'My ordinance, '
  - type: note
    content: Ex. 28:43; Lev. 22:16; Num. 18:22
  - type: text
    content: 'lest they bear sin for it and die thereby, if they profane it: I the '
  - type: heading
    content: Lord
  - type: text
    content: ' sanctify them.'
