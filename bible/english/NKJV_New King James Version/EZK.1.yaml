document_id: EZK.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezekiel’s Vision of God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it came to pass in the thirtieth year, in the fourth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: month,
    - type: text
      text: ' on the fifth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, as I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' among the captives by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 3:15, 23; 10:15
      marker-yv: yv-n
    - type: text
      text: 'the River Chebar, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 3:16; Mark 1:10; Luke 3:21; Acts 7:56; 10:11; Rev. 4:1; 19:11
      marker-yv: yv-n
    - type: text
      text: 'the heavens were opened and I saw '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 24:10; Num. 12:6; Is. 1:1; 6:1; Ezek. 8:3; Dan. 8:1, 2
      marker-yv: yv-n
    - type: text
      text: 'visions of God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 10:14; Rev. 4:7
      marker-yv: yv-n
    - type: text
      text: 'the likeness of their faces, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: each
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 2:10
      marker-yv: yv-n
    - type: text
      text: 'had the face of a man; each of the four had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 2:3
      marker-yv: yv-n
    - type: text
      text: 'the face of a lion on the right side, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 2:18
      marker-yv: yv-n
    - type: text
      text: 'each of the four had the face of an ox on the left side, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 2:25
      marker-yv: yv-n
    - type: text
      text: 'and each of the four had the face of an eagle. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' their faces. Their wings stretched upward; two '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wings
    - type: text
      text: ' of each one touched one another, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 6:2; Ezek. 1:23
      marker-yv: yv-n
    - type: text
      text: 'two covered their bodies. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 10:11, 22
      marker-yv: yv-n
    - type: text
      text: each one went straight forward; they went wherever the spirit wanted to go, and they did not turn when they went.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the likeness of the living creatures, their appearance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' like burning coals of fire, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 104:4; Rev. 4:5
      marker-yv: yv-n
    - type: text
      text: 'like the appearance of torches going back and forth among the living creatures. The fire was bright, and out of the fire went lightning. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the living creatures ran back and forth, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 4:10; (Matt. 24:27; Luke 17:24)
      marker-yv: yv-n
    - type: text
      text: in appearance like a flash of lightning.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now as I looked at the living creatures, behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 10:9
      marker-yv: yv-n
    - type: text
      text: 'a wheel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' on the earth beside each living creature with its four faces. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 10:9, 10
      marker-yv: yv-n
    - type: text
      text: 'The appearance of the wheels and their workings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 10:6
      marker-yv: yv-n
    - type: text
      text: 'like the color of beryl, and all four had the same likeness. The appearance of their workings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was,
    - type: text
      text: ' as it were, a wheel in the middle of a wheel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they moved, they went toward any one of four directions; they did not turn aside when they went. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for their rims, they were so high they were awesome; and their rims '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 10:12; (Zech. 4:10); Rev. 4:6, 8
      marker-yv: yv-n
    - type: text
      text: 'full of eyes, all around the four of them. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 10:16, 17
      marker-yv: yv-n
    - type: text
      text: 'When the living creatures went, the wheels went beside them; and when the living creatures were lifted up from the earth, the wheels were lifted up. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the fifth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in the fifth year of King Jehoiachin’s captivity, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherever the spirit wanted to go, they went, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: because
    - type: text
      text: ' there the spirit went; and the wheels were lifted together with them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 10:17
      marker-yv: yv-n
    - type: text
      text: 'for the spirit of the living creatures '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in the wheels. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When those went, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' went; when those stood, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' stood; and when those were lifted up from the earth, the wheels were lifted up together with them, for the spirit of the living creatures '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in the wheels.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 10:1
      marker-yv: yv-n
    - type: text
      text: 'The likeness of the firmament above the heads of the living creatures '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' like the color of an awesome '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:6
      marker-yv: yv-n
    - type: text
      text: 'crystal, stretched out '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 10:1
      marker-yv: yv-n
    - type: text
      text: 'over their heads. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And under the firmament their wings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spread
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: out
    - type: text
      text: ' straight, one toward another. Each one had two which covered one side, and each one had two which covered the other side of the body. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 3:13; 10:5
      marker-yv: yv-n
    - type: text
      text: 'When they went, I heard the noise of their wings, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 43:2; Dan. 10:6; Rev. 1:15
      marker-yv: yv-n
    - type: text
      text: 'like the noise of many waters, like '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 37:4, 5; Ps. 29:3, 4; 68:33
      marker-yv: yv-n
    - type: text
      text: 'the voice of the Almighty, a tumult like the noise of an army; and when they stood still, they let down their wings. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A voice came from above the firmament that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' over their heads; whenever they stood, they let down their wings.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 10:1
      marker-yv: yv-n
    - type: text
      text: 'And above the firmament over their heads '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the likeness of a throne, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 24:10, 16; Ezek. 8:4; 11:22, 23; 43:4, 5
      marker-yv: yv-n
    - type: text
      text: 'in appearance like a sapphire stone; on the likeness of the throne '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' a likeness with the appearance of a man high above '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 8:2
      marker-yv: yv-n
    - type: text
      text: 'it. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also from the appearance of His waist and upward '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 8:2
      marker-yv: yv-n
    - type: text
      text: 'I saw, as it were, the color of amber with the appearance of fire all around within it; and from the appearance of His waist and downward I saw, as it were, the appearance of fire with brightness all around. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 9:13); Rev. 4:3; 10:1
      marker-yv: yv-n
    - type: text
      text: 'Like the appearance of a rainbow in a cloud on a rainy day, so '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the appearance of the brightness all around it. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 3:23; 8:4
      marker-yv: yv-n
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the appearance of the likeness of the glory of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezekiel Sent to Rebellious Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when I saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:3; Ezek. 3:23; Dan. 8:17; Acts 9:4; Rev. 1:17
      marker-yv: yv-n
    - type: text
      text: I fell on my face, and I heard a voice of One speaking.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came expressly to Ezekiel the priest, the son of Buzi, in the land of the Chaldeans by the River Chebar; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 18:46; 2 Kin. 3:15; Ezek. 3:14, 22
      marker-yv: yv-n
    - type: text
      text: 'the hand of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was upon him there.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I looked, and behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 21:1; Jer. 23:19; 25:32; Ezek. 13:11, 13
      marker-yv: yv-n
    - type: text
      text: 'a whirlwind was coming '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 1:14
      marker-yv: yv-n
    - type: text
      text: 'out of the north, a great cloud with raging fire engulfing itself; and brightness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' all around it and radiating out of its midst like the color of amber, out of the midst of the fire. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 10:15, 17, 20; Rev. 4:6–8
      marker-yv: yv-n
    - type: text
      text: 'Also from within it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: came
    - type: text
      text: ' the likeness of four living creatures. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 10:8
      marker-yv: yv-n
    - type: text
      text: 'this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' their appearance: they had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 10:14
      marker-yv: yv-n
    - type: text
      text: 'the likeness of a man. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each one had four faces, and each one had four wings. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their legs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' straight, and the soles of their feet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' like the soles of calves’ feet. They sparkled '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 10:6; Rev. 1:15
      marker-yv: yv-n
    - type: text
      text: 'like the color of burnished bronze. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 10:8, 21
      marker-yv: yv-n
    - type: text
      text: 'The hands of a man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' under their wings on their four sides; and each of the four had faces and wings. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their wings touched one another. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: creatures
    - type: text
      text: ' did not turn when they went, but each one went straight '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 1:12; 10:20–22
      marker-yv: yv-n
    - type: text
      text: forward.
