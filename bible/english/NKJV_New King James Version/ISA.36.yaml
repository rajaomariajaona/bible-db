document_id: ISA.36,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Sennacherib Boasts Against the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 18:13, 17; 2 Chr. 32:1
      marker-yv: yv-n
    - type: text
      text: 'it came to pass in the fourteenth year of King Hezekiah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' Sennacherib king of Assyria came up against all the fortified cities of Judah and took them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Have I now come up without the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' against this land to destroy it? The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, ‘Go up against this land, and destroy it.’ ”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Eliakim, Shebna, and Joah said to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' Rabshakeh, “Please speak to your servants in Aramaic, for we understand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it;
    - type: text
      text: ' and do not speak to us in Hebrew in the hearing of the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' on the wall.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' Rabshakeh said, “Has my master sent me to your master and to you to speak these words, and not to the men who sit on the wall, who will eat and drink their own waste with you?”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' Rabshakeh stood and called out with a loud voice in Hebrew, and said, “Hear the words of the great king, the king of Assyria! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus says the king: ‘Do not let Hezekiah deceive you, for he will not be able to deliver you; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nor let Hezekiah make you trust in the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, “The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will surely deliver us; this city will not be given into the hand of the king of Assyria.” ’ '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not listen to Hezekiah; for thus says the king of Assyria: ‘Make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: peace
    - type: text
      text: ' with me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a
    - type: text
      text: ' present and come out to me; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 4:25; Mic. 4:4; Zech. 3:10
      marker-yv: yv-n
    - type: text
      text: 'and every one of you eat from his own vine and every one from his own fig tree, and every one of you drink the waters of his own cistern; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'until I come and take you away to a land like your own land, a land of grain and new wine, a land of bread and vineyards. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Beware
    - type: text
      text: ' lest Hezekiah persuade you, saying, “The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will deliver us.” Has any one of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 19:12; Is. 37:12
      marker-yv: yv-n
    - type: text
      text: 'gods of the nations delivered its land from the hand of the king of Assyria? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the gods of Hamath and Arpad? Where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the gods of Sepharvaim? Indeed, have they delivered '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 17:6
      marker-yv: yv-n
    - type: text
      text: 'Samaria from my hand? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king of Assyria sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' Rabshakeh with a great army from Lachish to King Hezekiah at Jerusalem. And he stood by the aqueduct from the upper pool, on the highway to the Fuller’s Field. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who among all the gods of these lands have delivered their countries from my hand, that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' should deliver Jerusalem from my hand?’ ”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they held their peace and answered him not a word; for the king’s commandment was, “Do not answer him.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Eliakim the son of Hilkiah, who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' over the household, Shebna the scribe, and Joah the son of Asaph, the recorder, came to Hezekiah with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' clothes torn, and told him the words of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' Rabshakeh.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 22:20
      marker-yv: yv-n
    - type: text
      text: 'Eliakim the son of Hilkiah, who was over the household, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 22:15
      marker-yv: yv-n
    - type: text
      text: Shebna the scribe, and Joah the son of Asaph, the recorder, came out to him.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 18:19
      marker-yv: yv-n
    - type: text
      text: 'Then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' Rabshakeh said to them, “Say now to Hezekiah, ‘Thus says the great king, the king of Assyria: “What confidence is this in which you trust? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I say you speak of having plans and power for war; but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' mere words. Now in whom do you trust, that you rebel against me? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Look! You are trusting in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 29:6
      marker-yv: yv-n
    - type: text
      text: 'staff of this broken reed, Egypt, on which if a man leans, it will go into his hand and pierce it. So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Pharaoh king of Egypt to all who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 146:3; Is. 30:3, 5, 7
      marker-yv: yv-n
    - type: text
      text: trust in him.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But if you say to me, ‘We trust in the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God,’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' not He whose high places and whose altars Hezekiah has taken away, and said to Judah and Jerusalem, ‘You shall worship before this altar’?” ’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, I urge you, give a pledge to my master the king of Assyria, and I will give you two thousand horses—if you are able on your part to put riders on them! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How then will you repel one captain of the least of my master’s servants, and put your trust in Egypt for chariots and horsemen? '
