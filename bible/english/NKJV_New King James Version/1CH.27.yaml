    - type: text
      text: ' twenty-four thousand.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Leaders of Tribes
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Furthermore, over the tribes of Israel: the officer over the Reubenites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Eliezer the son of Zichri; over the Simeonites, Shephatiah the son of Maachah; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: over
    - type: text
      text: ' the Levites, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 26:30
      marker-yv: yv-n
    - type: text
      text: 'Hashabiah the son of Kemuel; over the Aaronites, Zadok; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: over
    - type: text
      text: ' Judah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 16:6
      marker-yv: yv-n
    - type: text
      text: 'Elihu, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' of David’s brothers; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: over
    - type: text
      text: ' Issachar, Omri the son of Michael; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: over
    - type: text
      text: ' Zebulun, Ishmaiah the son of Obadiah; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: over
    - type: text
      text: ' Naphtali, Jerimoth the son of Azriel; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Over the first division for the first month '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 11:11
      marker-yv: yv-n
    - type: text
      text: 'Jashobeam the son of Zabdiel, and in his division '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty-four thousand; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: over
    - type: text
      text: ' the children of Ephraim, Hoshea the son of Azaziah; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: over
    - type: text
      text: ' the half-tribe of Manasseh, Joel the son of Pedaiah; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: over
    - type: text
      text: ' the half–'
    - type: usfm
      marker: it
      children:
      - type: text
        text: tribe
    - type: text
      text: ' of Manasseh in Gilead, Iddo the son of Zechariah; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: over
    - type: text
      text: ' Benjamin, Jaasiel the son of Abner; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: over
    - type: text
      text: ' Dan, Azarel the son of Jeroham. These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the leaders of the tribes of Israel.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But David did not take the number of those twenty years old and under, because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 6:3)
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said He would multiply Israel like the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:5; 22:17; 26:4; Ex. 32:13; Deut. 1:10
      marker-yv: yv-n
    - type: text
      text: 'stars of the heavens. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joab the son of Zeruiah began a census, but he did not finish, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 24:12–15; 1 Chr. 21:1–7
      marker-yv: yv-n
    - type: text
      text: wrath came upon Israel because of this census; nor was the number recorded in the account of the chronicles of King David.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Other State Officials
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Azmaveth the son of Adiel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' over the king’s treasuries; and Jehonathan the son of Uzziah was over the storehouses in the field, in the cities, in the villages, and in the fortresses. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ezri the son of Chelub was over those who did the work of the field for tilling the ground. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Shimei the Ramathite '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' over the vineyards, and Zabdi the Shiphmite was over the produce of the vineyards for the supply of wine. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Baal-Hanan the Gederite was over the olive trees and the sycamore trees that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in the lowlands, and Joash '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' over the store of oil. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Shitrai the Sharonite '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' over the herds that fed in Sharon, and Shaphat the son of Adlai was over the herds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in the valleys. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' of the children of Perez, and the chief of all the captains of the army for the first month. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Obil the Ishmaelite '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' over the camels, Jehdeiah the Meronothite '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' over the donkeys, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Jaziz the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 5:10
      marker-yv: yv-n
    - type: text
      text: 'Hagrite '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' over the flocks. All these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the officials over King David’s property.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also Jehonathan, David’s uncle, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' a counselor, a wise man, and a scribe; and Jehiel the son of Hachmoni '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' with the king’s sons. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:12
      marker-yv: yv-n
    - type: text
      text: 'Ahithophel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the king’s counselor, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:32–37
      marker-yv: yv-n
    - type: text
      text: 'Hushai the Archite '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the king’s companion. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Ahithophel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Jehoiada the son of Benaiah, then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 1:7
      marker-yv: yv-n
    - type: text
      text: 'Abiathar. And the general of the king’s army '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 11:6
      marker-yv: yv-n
    - type: text
      text: Joab.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Over the division of the second month '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Dodai an Ahohite, and of his division Mikloth also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the leader; in his division '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty-four thousand. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The third captain of the army for the third month '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 18:17
      marker-yv: yv-n
    - type: text
      text: 'Benaiah, the son of Jehoiada the priest, who was chief; in his division '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty-four thousand. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This was the Benaiah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 23:20–23
      marker-yv: yv-n
    - type: text
      text: 'mighty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: among
    - type: text
      text: ' the thirty, and was over the thirty; in his division '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Ammizabad his son. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The fourth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: captain
    - type: text
      text: ' for the fourth month '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 23:24; 1 Chr. 11:26
      marker-yv: yv-n
    - type: text
      text: 'Asahel the brother of Joab, and Zebadiah his son after him; in his division '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty-four thousand. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The fifth captain for the fifth month '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Shamhuth the Izrahite; in his division were twenty-four thousand. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sixth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: captain
    - type: text
      text: ' for the sixth month '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 11:28
      marker-yv: yv-n
    - type: text
      text: 'Ira the son of Ikkesh the Tekoite; in his division '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' twenty-four thousand. '
