document_id: 1CH.27,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Military Divisions
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel, according to their number, the heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses,
    - type: text
      text: ' the captains of thousands and hundreds and their officers, served the king in every matter of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: military
    - type: text
      text: ' divisions. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: These
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: divisions
    - type: text
      text: ' came in and went out month by month throughout all the months of the year, each division '
    - type: usfm
      marker: it
      children:
      - type: text
        text: having
    - type: text
      text: ' twenty-four thousand.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The seventh '
    - type: usfm
      marker: it
      children:
      - type: text
