    - type: usfm
      marker: it
      children:
      - type: text
        text: captain
    - type: text
      text: ' for the twelfth month '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Heldai the Netophathite, of Othniel; in his division '
    - type: usfm
      marker: it
      children:
      - type: text
