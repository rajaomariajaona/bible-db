document_id: REV.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Introduction and Benediction
  - type: text
    content: 'The Revelation of Jesus Christ, '
  - type: note
    content: John 3:32
  - type: text
    content: 'which God gave Him to show His servants—things which must shortly take place. And '
  - type: note
    content: Rev. 22:6
  - type: text
    content: 'He sent and signified '
  - type: text
    content: it
  - type: text
    content: ' by His angel to His servant John, '
  '10':
  - type: note
    content: Acts 10:10
  - type: text
    content: 'I was in the Spirit on '
  - type: note
    content: Acts 20:7
  - type: text
    content: 'the Lord’s Day, and I heard behind me '
  - type: note
    content: Rev. 4:1
  - type: text
    content: 'a loud voice, as of a trumpet, '
  '11':
  - type: text
    content: 'saying, '
  - type: text
    content: “I am the Alpha and the Omega, the First and the Last,”
  - type: text
    content: ' and, '
  - type: text
    content: '“What you see, write in a book and send '
  - type: text
    content: it
  - type: text
    content: ' to the seven churches '
  - type: text
    content: 'which are in Asia:'
  - type: text
    content: ' to Ephesus, to Smyrna, to Pergamos, to Thyatira, to Sardis, to Philadelphia, and to Laodicea.”'
  '12':
  - type: text
    content: 'Then I turned to see the voice that spoke with me. And having turned '
  - type: note
    content: Ex. 25:37; Zech. 4:2; Rev. 1:20; 2:1
  - type: text
    content: 'I saw seven golden lampstands, '
  '13':
  - type: note
    content: Rev. 2:1
  - type: text
    content: 'and in the midst of the seven lampstands '
  - type: note
    content: Ezek. 1:26; Dan. 7:13; 10:16; Rev. 14:14
  - type: text
    content: One
  - type: text
    content: ' like the Son of Man, '
  - type: note
    content: Dan. 10:5
  - type: text
    content: 'clothed with a garment down to the feet and '
  - type: note
    content: Rev. 15:6
  - type: text
    content: 'girded about the chest with a golden band. '
  '14':
  - type: text
    content: 'His head and '
  - type: note
    content: Dan. 7:9
  - type: text
    content: 'hair '
  - type: text
    content: were
  - type: text
    content: ' white like wool, as white as snow, and '
  - type: note
    content: Dan. 10:6; Rev. 2:18; 19:12
  - type: text
    content: 'His eyes like a flame of fire; '
  '15':
  - type: note
    content: Ezek. 1:7; Dan. 10:6; Rev. 2:18
  - type: text
    content: 'His feet '
  - type: text
    content: were
  - type: text
    content: ' like fine brass, as if refined in a furnace, and '
  - type: note
    content: Ezek. 1:24; 43:2; Rev. 14:2; 19:6
  - type: text
    content: 'His voice as the sound of many waters; '
  '16':
  - type: note
    content: Rev. 1:20; 2:1; 3:1
  - type: text
    content: 'He had in His right hand seven stars, '
  - type: note
    content: Is. 49:2; (Heb. 4:12); Rev. 2:12, 16; 19:15
  - type: text
    content: 'out of His mouth went a sharp two-edged sword, '
  - type: note
    content: Matt. 17:2; Acts 26:13; Rev. 10:1
  - type: text
    content: 'and His countenance '
  - type: text
    content: was
  - type: text
    content: ' like the sun shining in its strength. '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: Ezek. 1:28
  - type: text
    content: 'when I saw Him, I fell at His feet as dead. But '
  - type: note
    content: Dan. 8:18; 10:10, 12
  - type: text
    content: 'He laid His right hand on me, saying to me, '
  - type: text
    content: '“Do not be afraid; '
  - type: note
    content: Is. 41:4; 44:6; 48:12; Rev. 2:8; 22:13
  - type: text
    content: I am the First and the Last.
  - type: text
    content: ' '
  '18':
  - type: note
    content: Rom. 6:9; Rev. 2:8; 10:6; 15:7
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' He who lives, and was dead, and behold, '
  - type: note
    content: Rev. 4:9
  - type: text
    content: 'I am alive forevermore. Amen. And '
  - type: note
    content: Ps. 68:20
  - type: text
    content: 'I have the keys of '
  - type: text
    content: Hades and of Death.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Write
  - type: text
    content: ' the things which you have '
  - type: note
    content: Rev. 1:9–18
  - type: text
    content: 'seen, '
  - type: note
    content: Rev. 2:1
  - type: text
    content: 'and the things which are, '
  - type: note
    content: John 16:13; Rev. 4:1
  - type: text
    content: and the things which will take place after this.
  - type: text
    content: ' '
  '2':
  - type: note
    content: 1 Cor. 1:6
  - type: text
    content: 'who bore witness to the word of God, and to the testimony of Jesus Christ, to all things '
  - type: note
    content: 1 John 1:1
  - type: text
    content: 'that he saw. '
  '20':
  - type: text
    content: 'The '
  - type: text
    content: 'mystery of the seven stars which you saw in My right hand, and the seven golden lampstands: The seven stars are '
  - type: note
    content: Mal. 2:7; Rev. 2:1
  - type: text
    content: 'the '
  - type: text
    content: 'angels of the seven churches, and '
  - type: note
    content: Ex. 25:37; 37:23; Zech. 4:2; Matt. 5:15; Phil. 2:15
  - type: text
    content: 'the seven lampstands '
  - type: text
    content: which you saw
  - type: text
    content: ' are the seven churches.'
  '3':
  - type: note
    content: Luke 11:28; Rev. 22:7
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' he who reads and those who hear the words of this prophecy, and keep those things which are written in it; for '
  - type: note
    content: James 5:8; Rev. 22:10
  - type: text
    content: 'the time '
  - type: text
    content: is
  - type: text
    content: ' near.'
  - type: heading
    content: Greeting the Seven Churches
  '4':
  - type: text
    content: 'John, to the seven churches which are in Asia:'
  - type: text
    content: 'Grace to you and peace from Him '
  - type: note
    content: Ex. 3:14
  - type: text
    content: 'who is and '
  - type: note
    content: John 1:1
  - type: text
    content: 'who was and who is to come, '
  - type: note
    content: (Is. 11:2); Zech. 3:9; Rev. 3:1; 4:5; 5:6
  - type: text
    content: 'and from the seven Spirits who are before His throne, '
  '5':
  - type: text
    content: 'and from Jesus Christ, '
  - type: note
    content: John 8:14; Prov. 14:5
  - type: text
    content: 'the faithful '
  - type: note
    content: Is. 55:4
  - type: text
    content: 'witness, the '
  - type: note
    content: Ps. 89:27; 1 Cor. 15:20; (Col. 1:18)
  - type: text
    content: 'firstborn from the dead, and '
  - type: note
    content: Rev. 17:14
  - type: text
    content: the ruler over the kings of the earth.
  - type: text
    content: 'To Him '
  - type: note
    content: John 13:34
  - type: text
    content: 'who loved us '
  - type: note
    content: Heb. 9:14
  - type: text
    content: 'and washed us from our sins in His own blood, '
  '6':
  - type: text
    content: 'and has '
  - type: note
    content: 1 Pet. 2:5, 9
  - type: text
    content: 'made us kings and priests to His God and Father, '
  - type: note
    content: 1 Tim. 6:16
  - type: text
    content: 'to Him '
  - type: text
    content: be
  - type: text
    content: ' glory and dominion forever and ever. Amen.'
  '7':
  - type: text
    content: 'Behold, He is coming with '
  - type: note
    content: Matt. 24:30
  - type: text
    content: 'clouds, and every eye will see Him, even '
  - type: note
    content: Zech. 12:10–14; John 19:37
  - type: text
    content: they who pierced Him. And all the tribes of the earth will mourn because of Him. Even so, Amen.
  '8':
  - type: note
    content: Is. 41:4; Rev. 21:6; 22:13
  - type: text
    content: '“I am the Alpha and the Omega, '
  - type: text
    content: the
  - type: text
    content: ' Beginning and '
  - type: text
    content: the
  - type: text
    content: ' End,”'
  - type: text
    content: ' says the Lord, '
  - type: note
    content: Rev. 4:8; 11:17
  - type: text
    content: '“who is and who was and who is to come, the '
  - type: note
    content: Is. 9:6
  - type: text
    content: Almighty.”
  - type: heading
    content: Vision of the Son of Man
  '9':
  - type: text
    content: 'I, John, both your brother and '
  - type: note
    content: Phil. 1:7
  - type: text
    content: 'companion in the tribulation and '
  - type: note
    content: (Rom. 8:17; 2 Tim. 2:12)
  - type: text
    content: 'kingdom and patience of Jesus Christ, was on the island that is called Patmos for the word of God and for the testimony of Jesus Christ. '
