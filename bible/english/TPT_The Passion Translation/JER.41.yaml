document_id: JER.41,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Ishmael Assassinates Gedaliah
  - type: text
    content: 'But in the seventh month of that same year, Ishmael the son of Nethaniah, and grandson of Elishama, came to Mizpah with ten of his soldiers. He had been one of the king’s officials and was a member of the royal family. Ishmael and his men had a meal together with Gedaliah in Mizpah. '
  '10':
  - type: text
    content: 'Then Ishmael took captive the king’s daughters and all the people who were left at Mizpah, whom Nebuzaradan, the captain of the guard, had committed to Gedaliah. Ishmael took them captive and crossed over '
  - type: text
    content: the Jordan
  - type: text
    content: ' to join up with the Ammonites.'
  - type: heading
    content: Johanan Rescues the Captives
  '11':
  - type: text
    content: 'But Johanan the son of Kareah and all the army officers with him heard of all the '
  - type: text
    content: murderous
  - type: text
    content: ' evil that Ishmael had done. '
  '12':
  - type: text
    content: 'So they took all their men and went to fight against Ishmael the son of Nethaniah. They caught up with him at the great pool that is in Gibeon. '
  - type: note
    content: See 2 Sam. 2:13.
  '13':
  - type: text
    content: 'And when all the captives who were with Ishmael saw Johanan and all the army officers, they rejoiced. '
  '14':
  - type: text
    content: 'So all Ishmael’s prisoners from Mizpah turned and ran to Johanan '
  - type: text
    content: and the officers
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'But Ishmael escaped from Johanan with eight of his men and went to the Ammonites. '
  '16':
  - type: text
    content: 'So Johanan and all the army officers with him rescued all of Ishmael’s prisoners from Mizpah—the soldiers, women, children, and royal officials taken captive after Ishmael murdered Gedaliah. Johanan brought them all back '
  - type: text
    content: alive
  - type: text
    content: ' from Gibeon. '
  '17':
  - type: text
    content: 'However, they were afraid of the Babylonians because Ishmael had murdered Gedaliah, the king of Babylon’s governor of the land. So, they set out for Egypt in order to avoid the Babylonians. On the way, they stopped at Geruth Chimham, '
  - type: note
    content: Geruth means “inn.” Assuming Chimham is an individual’s name (see 2 Sam. 19:37–40), then the meaning would be “the Chimham Inn.”
  - type: text
    content: near Bethlehem.
  '2':
  - type: text
    content: 'Then '
  - type: text
    content: suddenly
  - type: text
    content: ' Ishmael jumped up with his armed men and killed Gedaliah the son of Ahikam, grandson of Shaphan. They killed Gedaliah, the man whom the king of Babylon had appointed governor in the land. '
  '3':
  - type: text
    content: Ishmael also struck down all the Israelites who were with Gedaliah at Mizpah and the Babylonian soldiers who happened to be there.
  '4':
  - type: text
    content: 'The very next day, before anyone knew of it, '
  '5':
  - type: text
    content: 'eighty men arrived from the towns of Shechem, Shiloh, and Samaria. '
  - type: note
    content: Shechem, Shiloh, and Samaria were all religious centers in the Northern Kingdom of Israel.
  - type: text
    content: 'They were on their way to the temple to offer gifts of grain and incense '
  - type: note
    content: The offerings they brought were bloodless since the temple and the altar had been destroyed. At least some people continued to worship there in Jerusalem where the temple once stood.
  - type: text
    content: 'to '
  - type: text
    content: Yahweh
  - type: text
    content: '. They had shaved off their beards, torn their clothes, and cut themselves because '
  - type: text
    content: they were mourning
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And Ishmael son of Nethaniah went from Mizpah to meet them '
  - type: text
    content: at the town gate, pretending to be
  - type: text
    content: ' weeping as he came. He said to them, “Come in to see Gedaliah the son of Ahikam.” '
  '7':
  - type: text
    content: 'But after they had entered the gates, Ishmael and the men with him slaughtered them and cast their bodies into a cistern. '
  '8':
  - type: text
    content: 'He spared ten of the men who said to Ishmael, “Don’t kill us,” because they offered to give him supplies of wheat, barley, olive oil, and honey they had hidden in a field. '
  '9':
  - type: text
    content: (Now he threw all the bodies, including Gedaliah’s, into the large well that had been dug by King Asa of Judah when he was invaded by King Baasha of Israel.)
  - type: note
    content: See 1 Kings 15:17–22; 2 Chron. 16:1–6.
