document_id: JER.41
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ishmael Assassinates Gedaliah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But in the seventh month of that same year, Ishmael the son of Nethaniah, and grandson of Elishama, came to Mizpah with ten of his soldiers. He had been one of the king’s officials and was a member of the royal family. Ishmael and his men had a meal together with Gedaliah in Mizpah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then '
  - type: usfm
    marker: it
    children:
    - type: text
      text: suddenly
  - type: text
    text: ' Ishmael jumped up with his armed men and killed Gedaliah the son of Ahikam, grandson of Shaphan. They killed Gedaliah, the man whom the king of Babylon had appointed governor in the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ishmael also struck down all the Israelites who were with Gedaliah at Mizpah and the Babylonian soldiers who happened to be there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The very next day, before anyone knew of it, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'eighty men arrived from the towns of Shechem, Shiloh, and Samaria. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Shechem, Shiloh, and Samaria were all religious centers in the Northern Kingdom of Israel.
    marker-yv: yv-n
  - type: text
    text: 'They were on their way to the temple to offer gifts of grain and incense '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The offerings they brought were bloodless since the temple and the altar had been destroyed. At least some people continued to worship there in Jerusalem where the temple once stood.
    marker-yv: yv-n
  - type: text
    text: 'to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. They had shaved off their beards, torn their clothes, and cut themselves because '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they were mourning
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Ishmael son of Nethaniah went from Mizpah to meet them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: at the town gate, pretending to be
  - type: text
    text: ' weeping as he came. He said to them, “Come in to see Gedaliah the son of Ahikam.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But after they had entered the gates, Ishmael and the men with him slaughtered them and cast their bodies into a cistern. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He spared ten of the men who said to Ishmael, “Don’t kill us,” because they offered to give him supplies of wheat, barley, olive oil, and honey they had hidden in a field. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: (Now he threw all the bodies, including Gedaliah’s, into the large well that had been dug by King Asa of Judah when he was invaded by King Baasha of Israel.)
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Kings 15:17–22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Chron. 16:1–6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Ishmael took captive the king’s daughters and all the people who were left at Mizpah, whom Nebuzaradan, the captain of the guard, had committed to Gedaliah. Ishmael took them captive and crossed over '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the Jordan
  - type: text
    text: ' to join up with the Ammonites.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Johanan Rescues the Captives
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But Johanan the son of Kareah and all the army officers with him heard of all the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: murderous
  - type: text
    text: ' evil that Ishmael had done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So they took all their men and went to fight against Ishmael the son of Nethaniah. They caught up with him at the great pool that is in Gibeon. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Sam. 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And when all the captives who were with Ishmael saw Johanan and all the army officers, they rejoiced. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So all Ishmael’s prisoners from Mizpah turned and ran to Johanan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and the officers
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But Ishmael escaped from Johanan with eight of his men and went to the Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Johanan and all the army officers with him rescued all of Ishmael’s prisoners from Mizpah—the soldiers, women, children, and royal officials taken captive after Ishmael murdered Gedaliah. Johanan brought them all back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: alive
  - type: text
    text: ' from Gibeon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'However, they were afraid of the Babylonians because Ishmael had murdered Gedaliah, the king of Babylon’s governor of the land. So, they set out for Egypt in order to avoid the Babylonians. On the way, they stopped at Geruth Chimham, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 41:17–18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Geruth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “inn.” Assuming Chimham is an individual’s name (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Sam. 19:37–40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), then the meaning would be “the Chimham Inn.”
    marker-yv: yv-n
  - type: text
    text: near Bethlehem.
