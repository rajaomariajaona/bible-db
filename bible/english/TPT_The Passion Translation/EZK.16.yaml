  '1':
  - type: heading
    content: A Parable of Yahweh’s Unfaithful Wife
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 16 is the most vivid and shocking chapter in all the Bible in its description of the harlotry of Israel (Jerusalem). It is an expressive parable of God’s queen (see v. 13) becoming a prostitute (see v. 15). Idolatry in God’s eyes is like the unfaithfulness of a wife to her husband. The language is so scandalous and jarring that according to the Mishnah (oral Torah), it should never be read in public. Modern readers will find this chapter full of terms and phrases that are sexually expressive and vulgar, so much so that most modern translations soften the text to help lessen its jolt to our senses. For the most part, the translation team has kept the expressive language as it is stated in the Hebrew text. So, why did God speak so vulgarly to Jerusalem? To shock her out of her complacency and deception. Thankfully, the chapter ends with a promise of grace and restoration (see vv. 59–63).
