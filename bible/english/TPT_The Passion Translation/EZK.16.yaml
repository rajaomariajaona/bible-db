  - type: note
    content: God’s “blessing” in this context may refer to the reduced size of their land.
  - type: text
    content: 'I have put you at the mercy of your enemies, '
  - type: note
    content: Literally “I have given you over to the throat of those who hate you.”
  - type: text
    content: 'the Philistine women, who blushed over your lewd behavior. '
  - type: note
    content: Some scholars suggest that the Philistine women (in the parable of this chapter) were competing with the women of Judah in forming political alliances (also acting like prostitutes with other nations).
  '28':
  - type: text
    content: 'Still unsatisfied, you prostituted yourself to the Assyrians and played the harlot with them. But even then, you were not satisfied. '
  '29':
  - type: text
    content: You committed further acts of fornication with the Babylonians, that nation of merchants, but that still did not satisfy you.’ ”
  - type: heading
    content: Worse Than a Prostitute
  '3':
  - type: text
    content: 'Tell them, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: Your ancestral origins were in the land where the Canaanites lived. Your father was an Amorite '
  - type: note
    content: That is, Jebus, the tribal head of the Jubusites, who once occupied the stronghold that David conquered and established as the city of Jerusalem. Jebus was an Amorite.
  - type: text
    content: 'and your mother a Hittite. '
  '30':
  - type: text
    content: '“ ‘I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say: You make me extremely angry '
  - type: note
    content: 'This verse begins with three Hebrew words that are extremely difficult to translate. Some translations omit them entirely. The meanings fall into four possibilities: (1) “How weak-willed you are!” (2) “How wild is your lust!” (3) “How sick is your heart!” (4) “How angry you make me!” Option 4 seems to be the best interpretation after comparing other Semitic languages and a revocalization of the text.'
  - type: text
    content: 'because of all these things that you have done. You have acted like a brazen prostitute '
  - type: text
    content: who has no shame
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'You built an elevated shrine on every street to worship idols, put up your pavilion in every public square. But you are not like a common prostitute just out for the money. '
  '32':
  - type: text
    content: 'You are an adulterous wife who would rather have sex with strangers '
  - type: note
    content: That is, foreigners (foreign nations).
  - type: text
    content: 'than her husband. '
  '33':
  - type: text
    content: 'Men will pay a prostitute, but you give presents to all your lovers! You bribe them to come from everywhere just to sleep with you. '
  '34':
  - type: text
    content: You are so different from other prostitutes. No one came to ask you for sex. The men you slept with did not pay you, but you paid them. Therefore, you are worse than a prostitute!’ ”
  - type: heading
    content: God Will Punish Jerusalem
  '35':
  - type: text
    content: '“ ‘Very well, '
  - type: text
    content: Jerusalem
  - type: text
    content: ', you whore! Hear the word of '
  - type: text
    content: Yahweh
  - type: text
    content: '! '
  '36':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: You poured out your lust '
  - type: note
    content: 'Or “Your juice was poured out.” (See Moshe Greenberg, Ezekiel 1–20, Anchor Yale Bible Commentaries, vol. 22 [New Haven & London: Yale University Press, 1983], 286.) The meaning of the Hebrew nehushtek is disputed here. It carries the literal meaning of “wealth” or “money,” but some have seen it as an expression of sexual anticipation.'
  - type: text
    content: 'and are ready for sex. As a prostitute, you uncovered your genitals for your lovers and for all those disgusting idols. You killed your children '
  - type: note
    content: Or literally “You gave the blood of your children.”
  - type: text
    content: to honor those false gods.
  - type: note
    content: Or “idols.”
  '37':
  - type: text
    content: “ ‘Behold, I will bring together all your lovers to whom you gave pleasure—all those you loved and all those you hated. Yes, I will bring them from everywhere, and I will strip you naked in front of them and let them see your genitals.
  '38':
  - type: text
    content: '“ ‘I will judge you with the same death sentence of an adulterer or murderer and bring upon you the fury of my burning rage. '
  - type: note
    content: Or “I will bring on you the blood of my rage and zeal.”
  '39':
  - type: text
    content: 'I will hand you over to your “lovers,” and they will destroy your elevated chamber and pull down your sacred shrines. They will strip you of your clothes, take away your lovely jewels, and leave you stark naked. '
  '4':
  - type: text
    content: 'On the day you were born, there was no one there to cut your umbilical cord or wash you clean in water. There was no one there to rub you with salt '
  - type: text
    content: and oil
  - type: text
    content: ' '
  - type: note
    content: 'The addition of oil to the rubbing with salt on a newborn infant is a plausible insertion here, given the citation of Allen in his Ezekiel commentary, where he adduces evidence for such a practice originating in ancient Near Eastern culture (see Leslie C. Allen, Ezekiel 1–19, Word Biblical Commentary, vol. 28 [Grand Rapids, MI: Zondervan, 1987], 223).'
  - type: text
    content: 'or wrap you in a baby blanket. '
  '40':
  - type: text
    content: 'Then they will gather an angry mob against you who will stone you to death and hack you to pieces with their swords. '
  '41':
  - type: text
    content: They will burn down your homes and execute justice on you while many other women look on. I will once and for all put an end to your wicked harlotry—no more paid lovers for you!
  '42':
  - type: text
    content: '“ ‘Once my fury is exhausted with you, I will calm down and let my anger die away. Then I will not be angry anymore. '
  '43':
  - type: text
    content: 'You have entirely forgotten how I treated you when you were young. And you have done nothing but provoke me, so now I, in turn, will cause you to suffer the consequences for your own behavior. '
  - type: note
    content: Or “I will bring your conduct down on your own head!”
  - type: text
    content: 'And haven’t you committed such gross lewdness in addition to all your other shocking sins? I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  - type: heading
    content: Compared with Samaria and Sodom
  '44':
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: says
  - type: text
    content: ', “Behold, all who quote proverbs will surely apply this proverb to you, '
  - type: text
    content: Jerusalem
  - type: text
    content: ': Like mother, like daughter. '
  - type: note
    content: That is, a mother passes on her nature and characteristics to her children. A comparable proverb in English is “the apple doesn’t fall far from the tree.”
  '45':
  - type: text
    content: 'Yes; you are a daughter exactly like your '
  - type: text
    content: pagan
  - type: text
    content: ' mother, '
  - type: note
    content: That is, the Hittites (see v. 3). God is telling the people of Jerusalem that they are as pagan as the Canaanites were when they came into the land.
  - type: text
    content: 'who hated her husband and her children. And you have become exactly like your sisters, '
  - type: note
    content: Although singular in this verse, elsewhere in the chapter it is plural (see vv. 51, 52, 55). The “sisters” are Samaria and Sodom. Jerusalem is as compromised and corrupt as the two cities of Samaria and Sodom (see v. 46).
  - type: text
