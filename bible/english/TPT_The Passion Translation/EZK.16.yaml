  - type: text
    content: for the worship of idols
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'At the entry to every alley you put up your brothel '
  - type: note
    content: As translated from the Syriac, Vulgate, and the Septuagint. The Hebrew is “you put up your lofty place.”
  - type: text
    content: 'and dragged your beauty through the mud. You spread your legs to all who passed by in countless acts of prostitution. '
  '26':
  - type: text
    content: 'You slept with your well-endowed '
  - type: note
    content: Literally “big of flesh” (i.e., like an erect penis).
  - type: text
    content: 'neighbors, the Egyptians, provoking my anger with your lifestyle of a prostitute. '
