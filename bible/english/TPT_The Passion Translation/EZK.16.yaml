    content: '“ ‘Then I passed by, and I saw you there squirming in your blood. And as you lay there covered with blood, I spoke over you: “Live!” '
  '60':
  - type: text
    content: 'But I '
  - type: note
    content: 'The pronoun “I” is emphatic in the Hebrew text: “I, yes, I!”'
  - type: text
    content: 'will remember my covenant that I made with you in the days of your youth. '
  - type: note
    content: “The days of your youth” include the time from the Exodus through the wilderness wanderings. God entered into a marriage covenant with Israel knowing that she would wander and be unfaithful. Yet he still loved her deeply, and he promised to renew his covenant with her. Our “wanderings” will not separate us from God’s love. See Rom. 8:31–39.
  - type: text
    content: 'I will renew that covenant with you, and it will last forever. '
  - type: note
    content: The Hebrew prophets never left God’s people in despair without hope. Today, God’s true prophets likewise must expose sin and bring God’s people to repentance, but they must also leave them with the gracious promise of restoration and hope. Part of the prophetic calling is to bring hope, comfort, and encouragement to God’s people. See 1 Cor. 14:1–5.
  '61':
  - type: text
    content: 'When you get back your older and younger sisters, then you will remember your ways and feel ashamed. I will make them like daughters to you, but not on the basis of my '
  - type: text
    content: new
  - type: text
    content: ' covenant with you. '
  '62':
  - type: text
    content: 'Yes, I will graciously renew my covenant with you, '
  - type: note
    content: This renewal of a broken covenant was not bestowed upon Jerusalem as a reward for her repentance. It was freely given because of God’s grace. In a sense, this is a shadow of the new covenant that we have entered into today based entirely on God’s endless grace and mercy toward us who believe. See Luke 22:20; Eph. 2:8–12; Heb. 8:8, 13; 9:15; 12:24; 1 John 4:10.
  - type: text
