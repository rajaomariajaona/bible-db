  '15':
  - type: text
    content: '“ ‘But you became confident in your own beauty and used your fame to act like a prostitute. You offered your sexual favors to each one who came along—and you became his! '
  '16':
  - type: text
    content: 'You took some of your fine clothes to decorate the tents on the high places where you worked as a prostitute. '
  - type: note
    content: This verse ends with some untranslatable words, which may have been a coarse idiom with sexual meaning, lost in translation. However, some translations suggest what amounts to a divine exhortation inserted into a sordid allegorical discourse, such as, “these things should not happen; they should never occur.”
  '17':
  - type: text
    content: 'You also took your gold and silver jewelry, which I had given you, and made yourself male images and acted like a prostitute with them. '
  '18':
  - type: text
    content: 'You took your embroidered clothes and used these to dress them up, and you offered them my '
  - type: text
    content: sacred
  - type: text
    content: ' oil and my '
  - type: text
    content: sacred
  - type: text
    content: ' incense. '
  '19':
  - type: text
    content: 'I gave you food made with the best flour, olive oil, and honey. But you offered it as a fragrant incense to these idols. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare: that is exactly what you did! '
  '2':
  - type: text
    content: '“Son of man, confront Jerusalem concerning all the despicable things they have done. '
  '20':
  - type: text
    content: 'You even took the sons and daughters I had given you and sacrificed them as food for the idols. As if your prostitution was not bad enough, '
  '21':
  - type: text
    content: 'you slaughtered my children and burned them as offerings to idols! '
  '22':
  - type: text
    content: While you were doing the things I hate and behaving like a prostitute, you entirely forgot how you were when you were young. I found you naked and exposed, squirming in your own blood.
  '23':
  - type: text
    content: '“ ‘Now I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say you are doomed! Not only did you do these evil things, '
  '24':
  - type: text
    content: 'in every city square you built an elevated shrine '
  - type: note
