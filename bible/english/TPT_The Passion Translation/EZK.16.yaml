  - type: text
    content: cities
  - type: text
    content: ' had a Hittite mother and an Amorite father. '
  '46':
  - type: text
    content: Your big sister is Samaria with her daughter-
  - type: text
    content: villages
  - type: text
    content: ' to the north of you. Your little sister is Sodom with her daughter-'
  - type: text
    content: villages
  - type: text
    content: ' to the south of you. '
  - type: note
    content: The Hebrew is literally “at your left hand [north]” and “your right hand [south].” The temple faced east with Samaria on the left hand and Sodom on the right.
  '47':
  - type: text
    content: 'Yet you were not satisfied to live as the people of Samaria and Sodom lived, copying all their wicked ways and imitating their loathsome practices. In very little time, you became more wicked than they were in all your ways. '
  '48':
  - type: text
    content: 'As surely as I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', live, your sister Sodom and her daughters never did the evil that you and your daughters have done. '
  '49':
  - type: text
    content: 'Behold, the guilt of your sister Sodom! She and her daughters were arrogant, gluttonous, and lived in carefree complacency. They never thought to help the poor and needy. '
  '5':
  - type: text
    content: No one did anything to help you. No one felt sorry for you or showed sympathy for you. Instead, you were dumped into an open field and forgotten. From the day you were born you were rejected and unloved.’ ”
  - type: heading
    content: Adopted by God
  '50':
  - type: text
    content: 'They were proud, stubborn, and defiantly evil before me, and so I swept them away as you have seen. '
  - type: note
    content: Or “when I saw it” (see Gen. 18:21).
  '51':
  - type: text
    content: 'And yet Samaria never committed half the sins that you have. You have done more detestable things than they. When compared to all your gross practices, you have made your sisters seem innocent! '
  '52':
  - type: text
    content: So now you will bear the shame of your deeds, which provides a measure of justification for your sisters, since your sins are viler than theirs. They now appear more upright than you are. So, suffer the utter disgrace and humiliation of having made your sisters appear more righteous than you!
  '53':
  - type: text
    content: '“I will restore their fortunes; I will restore Sodom and her daughters. I will restore Samaria and her daughters, and then I will also restore your fortunes along with them. '
  '54':
  - type: text
    content: 'You will be totally ashamed of yourself and bear disgrace for all you have done in giving them comfort. '
  '55':
  - type: text
    content: 'When your sisters, Sodom and her daughter-villages and Samaria and her daughter-villages, are restored to what they were, then you, too, and your surrounding villages will be restored to what you were. '
  '56':
  - type: text
    content: Jerusalem
  - type: text
    content: ', did you not gloat '
  - type: text
    content: in your pride
  - type: text
    content: ' over your sister Sodom '
  '57':
  - type: text
    content: 'before your wickedness was uncovered? '
  - type: note
    content: 'The Hebrew also allows for this sentence to be a statement rather than a rhetorical question: “You did not even talk about your sister Sodom.”'
  - type: text
    content: Now you are just like her!
  - type: text
    content: ' You have become the laughingstock of the Philistines, the Syrians, '
  - type: note
    content: Or “Aram.” Many translations and a few Hebrew manuscripts read “Edom [the Edomites].”
  - type: text
    content: 'and all your neighbors who hate you and heap scorn on you. '
