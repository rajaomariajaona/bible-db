document_id: ISA.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Branch of the Lord
  - type: text
    content: 'The cut-off stump of Jesse '
  - type: note
    content: That is, the royal family line of David. Jesse, the grandson of Boaz, was the father of King David. Jesse means “upright,” “firm,” or “strong.”
  - type: text
    content: will sprout,
  - type: note
    content: Or “go forth.” Notice the contrast with the arrogant “branches” that are cut off (see 10:33–34).
  - type: text
    content: 'and a fruitful Branch will grow from his roots:'
  - type: note
    content: The Hebrew word for “branch” or “twig” is netzer (lit. “to grow green”), the root word for Nazarene, Nazarite, and Nazareth (see Matt. 2:23). Christ is both the root and the offspring of David (see Rev. 5:5; 22:16). This means that the “[scion] Branch” that grows from the roots (his spirit/nature) points to the body of Christ, his church on the earth. Christ in us is the vine and we are his fruitful branches. Jesus Christ branches out through his people, and they grow from his root. Overcomers are the branches that bring forth the fruit of Christ’s life. This sprout will grow to become the rod of God’s power. See Jer. 23:5; 33:15; Zech. 3:8; 6:12; John 15:1–17; Rom. 15:12; Gal. 5:22–23.
  '10':
  - type: text
    content: 'On that day, the root of Jesse '
  - type: note
    content: That is, the royal family line of David (a metonymy). John took this phrase from Isaiah and quoted Jesus referring to himself as the Root of David. See Rev. 5:5; 22:16.
  - type: text
    content: 'will be lifted up '
  - type: note
    content: Or “standing up.” Jesus was “lifted up” on the cross to bring us salvation (John 12:32).
  - type: text
    content: 'as a '
  - type: text
    content: miracle
  - type: text
    content: '-sign to '
  - type: text
    content: rally
  - type: text
    content: ' the people. '
  - type: note
    content: The contemporary Hebrew word nes means “miracle,” while the ancient Hebrew means “sign [signal].” This translation includes both concepts. The Septuagint is “He will arise to rule the nations [gentiles].”
  - type: text
    content: 'Gentiles will diligently seek him, '
  - type: note
    content: Or “Gentiles will put their hope in him” (LXX). See John 12:20–21; Rom. 15:12.
  - type: text
    content: and his resting place will be glorious!
  - type: note
    content: 'Instead of saying “glorious,” the prophet simply employed the noun glory (kabod). The bride of Christ is now his resting place (Song. 1:16–17). The Hebrew word menuḥâ is also found in Psalm 23:2: “He offers a resting place for me. . . . His tracks take me to an oasis of peace.” He had nowhere to lay his head, but the heart of a believer is now his resting place. Glory is found at the place where he rests.'
  '11':
  - type: text
    content: 'On that day, the Lord will extend his hand a second time to restore '
  - type: note
    content: God is a God of restoration, even for those who have miserably failed him.
  - type: text
    content: 'the remnant of his people from Assyria, Egypt, Pathros, '
  - type: note
    content: Possibly a loan word from Egyptian indicating the region of Upper Egypt. Pathros means “desert dryness.”
  - type: text
    content: 'Ethiopia, '
  - type: note
    content: Or “Cush.” Cush means “scorched” or “blackened.”
  - type: text
    content: 'Iran, '
  - type: note
    content: Or “Elam,” a nation-state in the southwestern region of modern-day Iran, whose ancient capital was Susa. Elam means “hidden” or “concealed.”
  - type: text
    content: 'Iraq, '
  - type: note
    content: Or “Shinar [Babylonia].” Shinar means “divided land” or “divided stream.”
  - type: text
    content: 'Syria, '
  - type: note
    content: Or “Hamath,” west-central Syria. Hamath means “walled-up fortress.”
  - type: text
    content: 'and the coastlands of the sea. '
  - type: note
    content: Possibly the “islands of the [Mediterranean?] sea.” These eight regions are eight areas that Christ will restore within the hearts of those who follow him. Eight is the number of a new beginning.
  '12':
  - type: text
    content: 'He will lift up a banner among the nations and will gather the scattered Jews, '
  - type: note
    content: Or “he will gather the dispersed of Judah.”
  - type: text
    content: 'and assemble the outcasts of Israel from the four corners of the earth. '
  '13':
  - type: text
    content: 'Then Ephraim will be cleansed of envy, and those who are hostile to Judah will be cut off. Ephraim will no longer be jealous of Judah, and Judah will no longer be hostile toward Ephraim. '
  - type: note
    content: This is the healing of the divided kingdom. See Jer. 3:18; Ezek. 37:22.
  '14':
  - type: text
    content: 'But they will swoop down on the slopes of Philistia '
  - type: note
    content: Or “on the shoulder of Philistia.” The shoulder becomes a metaphor for the hills.
  - type: text
    content: 'to the west; together they will plunder the people of the east. They will rule over Edom and Moab, and the Ammonites '
  - type: note
    content: The Ammonites lived in modern-day Jordan.
  - type: text
    content: will obey them.
  '15':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' will dry up '
  - type: note
    content: Or “divide” or “destroy.”
  - type: text
    content: 'the gulf of the Egyptian Sea. '
  - type: note
    content: Or “tongue of the Red Sea.”
  - type: text
    content: 'He will raise his hand over the Euphrates, and with the might of his wind, he will split it into seven streams '
  - type: note
    content: Or “wadis.”
  - type: text
    content: 'that can be easily crossed in sandals. '
  '16':
  - type: text
    content: Then there will be a highway leading out of Assyria for his remnant people to return, just as there was for Israel when they were set free from Egypt.
  '2':
  - type: text
    content: 'the Spirit of '
  - type: text
    content: Yahweh
  - type: text
    content: ' will rest upon him,'
  - type: note
    content: The “Spirit of Yahweh” is the Spirit of prophecy, the manifest presence of God resting upon the Lord Jesus. In the Hebrew culture, to say “the Spirit of Yahweh rests upon” someone meant the Spirit of prophecy was upon them. See John 1:32–33.
  - type: text
    content: the Spirit of Extraordinary Wisdom,
  - type: note
    content: Or “the Spirit of Skillfulness.” See Ex. 31:2–4. This gives equipping ability for music, art, business, writing, creativity, and wisdom for judicial decisions. Paul prayed for the churches to receive this “Spirit of wisdom” (Eph. 1:17–19).
  - type: text
    content: the Spirit of Perfect Understanding,
  - type: note
    content: Or “the Spirit of Intelligent Insight.” This imparts the ability to discern the truth, to know the meaning of riddles, and to decipher parables and allegories. This anointing was upon the prophet Daniel. See Dan. 1:17; 5:11–12; 9:21–23.
  - type: text
    content: the Spirit of Wise Strategy,
  - type: note
    content: Or “the Spirit of Guidance.” This is the Hebrew word etsah and is used numerous times in the Old Testament for “counsel,” “advice,” or “purpose.” It is also used for steering (guiding) a ship. This anointing imparts the wisdom and counsel needed for spiritual leadership. See Ex. 18:19.
  - type: text
    content: the Spirit of Mighty Power,
  - type: note
    content: Or “the Spirit of a Mighty Warrior.”
  - type: text
    content: the Spirit of Revelation,
  - type: note
    content: Or “the Spirit of Knowledge.” This is not knowledge that is learned from books or study but knowledge that comes from experiencing intimacy with God.
  - type: text
    content: 'and the Spirit of the Fear of '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '3':
  - type: text
    content: 'He will find his delight '
  - type: note
    content: Or “his smelling [sensing],” a Hebraic figure of speech for finding pleasure in something. The Septuagint reads “He will fill him with the spirit of the fear of the Lord [absolute loyalty to God].” The Aramaic can be translated “He will shine forth with the reverence of the Lord.” The seven Spirits of God mentioned in these verses are also mentioned in Rev. 1:4; 4:4–5; 5:6. The Holy Spirit is one (see Eph. 4:3–4) but revealed in seven dimensions. The golden lampstand in the tabernacle had seven branches. The sevenfold Spirit of God is the illuminating influence over God’s people.
  - type: text
    content: in living
  - type: text
    content: by the Spirit of the Fear of the Lord.
  - type: text
    content: He will neither judge by appearances
  - type: note
    content: Or “by the glance of his eyes.” Jesus, our Messiah, sees clearly into our hearts and knows our every motive.
  - type: text
    content: nor make his decisions based on rumors.
  - type: note
    content: Or “by what is heard by his ears.”
  '4':
  - type: text
    content: 'With righteousness he will uphold justice '
  - type: note
    content: Or “by judging with righteousness.” Isaiah uses this word (Hb. tzedeq) fifty-one times.
  - type: text
    content: for the poor
  - type: text
    content: and defend the lowly of the earth.
  - type: text
    content: His words will be like a scepter of power
  - type: text
    content: that conquers the world,
  - type: note
    content: See Rev. 2:26–28.
  - type: text
    content: 'and with his breath '
  - type: note
    content: Or “spirit.”
  - type: text
    content: he will slay the lawless one.
  - type: note
    content: See 2 Thess. 2:8.
  '5':
  - type: text
    content: Righteousness will be his warrior’s sash
  - type: text
    content: and faithfulness his belt.
  - type: note
    content: That is, fairness and truth will be his clothing. The first five verses of this chapter show us that the Messiah would be from David’s lineage and would have the sevenfold Spirit of God resting upon him. His government would be equitable, full of righteousness, and a demonstration of his loyalty to God. Jesus fulfills all these attributes completely.
  - type: heading
    content: Christ Will Subdue All Things
  '6':
  - type: text
    content: Then
  - type: text
    content: ' the wolf will be '
  - type: text
    content: subdued
  - type: text
    content: ' and live with the '
  - type: text
    content: gentle
  - type: text
    content: ' lamb, '
  - type: note
    content: The list of animals in this section represents various attributes and spiritual conditions within human beings (cf. Calvin). Some are clean and some are unclean; some are wild and some are tame. They typify aspects of human nature (e.g., the nature of a wolf, a lamb, a lion, a leopard) because elsewhere in Scripture they refer to human beings. Each reveals an aspect of the nature of Adam or of the nature of Christ. This figurative passage of Scripture points to the subduing power of the life of Christ within his people, taming the “wolf,” the enemy of a lamb (John 10:12; Acts 20:29–30), to be subdued and to lie down with the lamb (Christ’s nature within us). The Hebrew word for “lamb” (kebes) is taken from a root word meaning “to subdue” or “to dominate.” There are fifteen natures (creatures) mentioned in this passage that are reconciled and rest together. Fifteen is the number of rest in the Bible.
  - type: text
    content: 'and the leopard '
  - type: note
    content: The leopard is mentioned eight times in the Bible, and in every instance, it is used figuratively for an aspect of human beings or of spiritual powers of darkness. It is emblematic of an aspect of human nature that cannot be changed or tamed. See Song. 4:8; Jer. 5:6; 13:23; Dan. 7:6; Hab. 1:8; Rev. 13:2.
  - type: text
    content: 'will lie down '
  - type: note
    content: Or “stretch out.”
  - type: text
    content: 'with the '
  - type: text
    content: gentle
  - type: text
    content: ' lamb. '
  - type: note
    content: Or “kid,” meaning either a male lamb or a male goat (see footnote on Song. 1:8). The Hebrew word for “kid” (gĕdiy) comes from the root word “cut off.” As the Lamb of God, Jesus was cut off from the land of the living for our salvation.
  - type: text
    content: 'The young calf and the ferocious lion '
  - type: note
    content: See 1 Peter 5:8.
  - type: text
    content: 'will be together, '
  - type: text
    content: and as a shepherd drives his flock
  - type: text
    content: ', a small child will guide them along! '
  '7':
  - type: text
    content: 'The cow and the bear will graze alongside each other; '
  - type: note
    content: There is a subtle play on words found in the Hebrew. The word for “graze [feed]” is tir‛ēynâ, and the word for “become friends” is titrā‛ēynâ. So the cow and bear grazing together become friends.
  - type: text
    content: 'cubs and calves will lie down together. The lion, like the ox, will eat straw. '
  '8':
  - type: text
    content: 'The nursing child will play '
  - type: text
    content: safely
  - type: text
    content: ' near the rattlesnake’s den, and the toddler will stretch out his hand and shine light over the serpent. '
  - type: note
    content: The Hebrew word for “hand” is yad and can also be translated “power.” Although many translations render this “a child will put his hand over the serpent’s den,” the Hebrew text uses the word meuwrah, which means “an opening of light.” Jesus told us that unless we become like little children we can never enter heaven’s kingdom reality. Even little children in God’s kingdom have power over the serpent and bring light into its hiding place. The Hebrew word for “toddler” is “weaned child.” This word (gāmûl) is a homophone that can also be translated “ripe fruit,” “reward,” “deal bountifully,” or “do good [to another].” This “weaned child” is the nature of Christ being produced in us. All is subdued and hostility is removed in the kingdom of God. See Phil. 3:21.
  '9':
  - type: text
    content: 'On all my holy mountain of '
  - type: text
    content: Zion
  - type: text
    content: ', '
  - type: note
    content: See Isa. 2:1–5.
  - type: text
    content: 'nothing evil or harmful '
  - type: note
    content: Or “destructive.”
  - type: text
    content: 'will be found. For the earth will be filled '
  - type: note
    content: The Septuagint uses a present-tense verb, “is [presently] filled [to the brim].”
  - type: text
    content: 'with the '
  - type: text
    content: intimate
  - type: text
    content: ' knowledge of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' just as water swells the sea!'
  - type: note
    content: Or “as the waters form a covering for the sea.” See Jer. 31:34; Hab. 2:14; Heb. 8:11.
  - type: heading
    content: The God Who Restores
