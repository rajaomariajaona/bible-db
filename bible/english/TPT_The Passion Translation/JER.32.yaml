document_id: JER.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah Confined
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me in the tenth year of Zedekiah’s reign in Judah, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, 588 BC. In January of that year, the Babylonians laid siege to Jerusalem and they captured the city in July of 586 BC.
    marker-yv: yv-n
  - type: text
    text: 'which was the eighteenth year of Nebuchadnezzar’s reign. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'At that time, the Babylonian army was attacking Jerusalem, and I was confined in the king’s palace guardhouse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'King Zedekiah had imprisoned me because I had prophesied '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s message: “I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', and I am about to let the king of Babylonia conquer Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'King Zedekiah will not escape but will be captured and taken to the king of Babylon, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nebuchadnezzar
  - type: text
    text: ', who will see him face-to-face and speak with him in person. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Zedekiah will be taken captive to Babylon, where he will remain until I am finished with him. If you fight against the Babylonians, you will not succeed. For I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have decreed it.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah Buys a Field
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me and said, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Your cousin
  - type: text
    text: ' Hanamel, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hanamel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “God’s gracious gift.”
    marker-yv: yv-n
  - type: text
    text: 'son of your uncle Shallum, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There are fourteen persons with this name in the Old Testament. This man, Jeremiah’s uncle, is referred to only here.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Shallum
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “completion,” “perfection,” “restoration,” or “prosperity” and is etymologically related to
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shalom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'will come to you and say: ‘Buy my field at Anathoth, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Anathoth was Jeremiah’s birthplace (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1:1
      metadata:
        usfm: JER.1.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'for you have the right of redemption to purchase it.’ ” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Apparently, Hanamel was childless, which gave his next of kin (Jeremiah) the right to redeem the land as his own. It was Jeremiah’s duty to purchase it and keep it in the family. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 25:25–28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ruth 4:1–6
      metadata:
        usfm: RUT.4.1+RUT.4.2+RUT.4.3+RUT.4.4+RUT.4.5+RUT.4.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And it happened just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' had said. My cousin Hanamel came to me in the palace guardhouse and said, “Buy my field at Anathoth in the territory of Benjamin. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: As my nearest relative
  - type: text
    text: ', you have the right of possession and redemption, so buy it.” Then I knew that this was '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s plan.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Babylonian invasion was imminent, yet amid the gloom and doom, the prophet was instructed to buy a field. This field was possibly at that very time occupied by the Babylonian army. Everyone around Jeremiah would have said that the land was worthless and should not be bought. Purchasing the field was a symbolic act that indicated that one day Judah would be delivered from the Babylonians (see v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: JER.32.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). God’s instructions to Jeremiah were a sign of his foreknowledge and a prophecy for a future beyond the one that was now in view. Jeremiah’s obedience was an act of agreement and investment in God’s promises for the future. Jeremiah became a picture of our Lord Jesus who also “bought a field” (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 13:44
      metadata:
        usfm: MAT.13.44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and footnote).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So I bought the field from my cousin Hanamel at Anathoth and weighed out the purchase price to him of seventeen silver shekels. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I signed the deed and sealed it, called in witnesses, and weighed out the silver on the scales. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then I took both the sealed deed of purchase (with the price and conditions of the sale) '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some scholars omit the parenthetical information, believing that it was an early addition to the text.
    marker-yv: yv-n
  - type: text
    text: 'and the unsealed copy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and I handed them over to Baruch '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Baruch was Jeremiah’s amanuensis. In other words, he was a scribe, and he compiled much of Jeremiah’s writings.
    marker-yv: yv-n
  - type: text
    text: 'son of Neriah, grandson of Mahseiah, in the presence of my cousin Hanamel. The witnesses who had signed the deed of purchase and all the people who happened to be in the palace guardhouse were gathered there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'In their presence, I gave Baruch the order, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', God of Israel, Commander of Angel Armies, says: ‘Take the sealed deed of purchase and its open copy and secure them in a clay pot '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The redemption rights of our inheritance have been given to us in Christ (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 1:3–14
      metadata:
        usfm: EPH.1.3+EPH.1.4+EPH.1.5+EPH.1.6+EPH.1.7+EPH.1.8+EPH.1.9+EPH.1.10+EPH.1.11+EPH.1.12+EPH.1.13+EPH.1.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). We are the “clay jars that carry [a] glorious treasure within” (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 4:1–7
      metadata:
        usfm: 2CO.4.1+2CO.4.2+2CO.4.3+2CO.4.4+2CO.4.5+2CO.4.6+2CO.4.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'so that they may be preserved for a long time.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', God of Israel, Commander of Angel Armies, says: ‘People will once again buy houses, fields, and vineyards in this land.’ ”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah’s Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'After I had entrusted the deed of purchase to Baruch son of Neriah, I prayed: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', you stretched out your mighty arm and created the heavens and the earth by your awesome power. Nothing is impossible with you! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Nothing is too wonderful for you!” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 9:6
      metadata:
        usfm: ISA.9.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'You show your loyal, tender love to thousands and thousands. But you also repay the guilt of fathers upon their children. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Christ, all our sins are forgiven, and grace is poured out to enable us to triumph over any generational issue in our family line. God’s love (shown to thousands) and his punishment (shown to the children) are set in stark contrast. The point is to see how much greater his love is. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 34:6–7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 5:9–10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 7:9–10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'You are the great and mighty God, whose name is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: it
    children:
    - type: text
      text: You surpass all
  - type: text
    text: ' with your wise counsel and wise planning. Your miracles reveal your mighty power. Your eyes see everything people do, and you repay each one according to what their ways and actions deserve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'You performed signs and wonders in Egypt as you still do in Israel even to this day. Your name is famous yesterday, today, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and forever
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Your signs and wonders in Egypt resulted in rescuing your people Israel. You stretched out your mighty hand and bared your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: omnipotent
  - type: text
    text: ' arm and terrifying power. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then you gave them this land that you had promised their ancestors, a land flowing with milk and honey. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But when they entered and took possession of it, they would neither listen to your voice nor follow your law. They would do nothing you commanded them to do, so you brought this disaster on them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Look! The Babylonians have already set up siege ramps to take the city! Jerusalem is now within their clutches. The people will suffer from war, food shortages, and disease when they attack the city. What you prophesied has now come true, as you see. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Yet you, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', are the one who told me: ‘Buy the field, pay for it, and get witnesses,’ even though the Babylonians are about to capture the city.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Answers Jeremiah’s Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“Behold, I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', God of all the world. Nothing is impossible with me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Therefore, I say to you, I will hand Jerusalem over to the Babylonians and to Nebuchadnezzar the king, and he will conquer it. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 52
      metadata:
        usfm: JER.52
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; see also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 25:1–11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Chron. 36:17–21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The attacking army of Babylon will seize this city, set it on fire, and burn it to the ground. The people offered sacrifices to Baal on those same rooftops and poured out drink offerings to other idols, provoking my anger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'From their earliest history, the people of Israel and Judah alike have done evil in my presence. In fact, the people of Israel have done nothing but make me angry by their actions, declares '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'From the day they built this city, these people have made me angry and furious. Therefore, I will destroy it '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'because of all the wickedness of the people of Israel and Judah. They have all provoked my anger, their kings, their officials, their priests, their prophets, the people of Judah, and the inhabitants of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'They have turned their backs to me and not their faces. Even though I taught them so untiringly over and over, they would not listen or accept correction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Instead, they have defiled the house that bears my name by placing their detestable idols inside it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And in the Valley of Hinnom, they have built shrines to Baal. They have sacrificed their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: little
  - type: text
    text: ' sons and daughters to Molech '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in the fire
  - type: text
    text: —something I never commanded, nor did it ever enter my thoughts!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Hope-Filled Promise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', God of Israel, says, “You say that because of war, plague, and food shortages that Jerusalem will fall and be handed over to the king of Babylon, but this is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Israel, says: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'I will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: graciously
  - type: text
    text: ' regather '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the people of Jerusalem
  - type: text
    text: ' although I was previously filled with anger and scattered them in foreign countries by my great indignation. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes
  - type: text
    text: ', I will bring them back to this place, and they will live under my protection. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Then they will be my people, and I will be their God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'I will give them one single purpose and one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wonderful
  - type: text
    text: ' way to live so that they will always honor me, for their own good and for the good of their descendants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'I will make an everlasting covenant with them, and I will never stop doing good things for them. I will inspire them to honor and respect me so that they will never walk away from me again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: What delight I will have in doing good things for them! With all my heart and soul, I promise that they will be planted firmly in this land once again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: '“For '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' promises: Just as I have brought great disaster on the people, I will someday do all these great things for them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'People will again buy fields in this land that you call a wasteland without men or animals. I have given it over to the Babylonians. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Yes, people will pay cash for property, draw up deeds, seal them, and have them witnessed in the territory of Benjamin, throughout the villages around Jerusalem, the towns of Judah, the highlands, the western foothills, and the southern desert. For I will restore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: what was lost
  - type: text
    text: ' and bring the captives back to their land,” declares '
