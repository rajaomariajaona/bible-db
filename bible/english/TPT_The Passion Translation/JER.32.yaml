document_id: JER.32,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Confined
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me in the tenth year of Zedekiah’s reign in Judah, '
  - type: note
    content: That is, 588 BC. In January of that year, the Babylonians laid siege to Jerusalem and they captured the city in July of 586 BC.
  - type: text
    content: 'which was the eighteenth year of Nebuchadnezzar’s reign. '
  '10':
  - type: text
    content: 'I signed the deed and sealed it, called in witnesses, and weighed out the silver on the scales. '
  '11':
  - type: text
    content: 'Then I took both the sealed deed of purchase (with the price and conditions of the sale) '
  - type: note
    content: Some scholars omit the parenthetical information, believing that it was an early addition to the text.
  - type: text
    content: 'and the unsealed copy, '
  '12':
  - type: text
    content: 'and I handed them over to Baruch '
  - type: note
    content: Baruch was Jeremiah’s amanuensis. In other words, he was a scribe, and he compiled much of Jeremiah’s writings.
  - type: text
    content: 'son of Neriah, grandson of Mahseiah, in the presence of my cousin Hanamel. The witnesses who had signed the deed of purchase and all the people who happened to be in the palace guardhouse were gathered there. '
  '13':
  - type: text
    content: 'In their presence, I gave Baruch the order, '
  '14':
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Israel, Commander of Angel Armies, says: ‘Take the sealed deed of purchase and its open copy and secure them in a clay pot '
  - type: note
    content: The redemption rights of our inheritance have been given to us in Christ (see Eph. 1:3–14). We are the “clay jars that carry [a] glorious treasure within” (2 Cor. 4:1–7).
  - type: text
    content: 'so that they may be preserved for a long time.’ '
  '15':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Israel, Commander of Angel Armies, says: ‘People will once again buy houses, fields, and vineyards in this land.’ ”'
  - type: heading
    content: Jeremiah’s Prayer
  '16':
  - type: text
    content: 'After I had entrusted the deed of purchase to Baruch son of Neriah, I prayed: '
  '17':
  - type: text
    content: '“Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', you stretched out your mighty arm and created the heavens and the earth by your awesome power. Nothing is impossible with you! '
  - type: note
    content: Or “Nothing is too wonderful for you!” See Isa. 9:6.
  '18':
  - type: text
    content: 'You show your loyal, tender love to thousands and thousands. But you also repay the guilt of fathers upon their children. '
  - type: note
    content: In Christ, all our sins are forgiven, and grace is poured out to enable us to triumph over any generational issue in our family line. God’s love (shown to thousands) and his punishment (shown to the children) are set in stark contrast. The point is to see how much greater his love is. See Ex. 34:6–7; Deut. 5:9–10; 7:9–10.
  - type: text
    content: 'You are the great and mighty God, whose name is '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies. '
  '19':
  - type: text
    content: You surpass all
  - type: text
    content: ' with your wise counsel and wise planning. Your miracles reveal your mighty power. Your eyes see everything people do, and you repay each one according to what their ways and actions deserve. '
  '2':
  - type: text
    content: 'At that time, the Babylonian army was attacking Jerusalem, and I was confined in the king’s palace guardhouse. '
  '20':
  - type: text
    content: 'You performed signs and wonders in Egypt as you still do in Israel even to this day. Your name is famous yesterday, today, '
  - type: text
    content: and forever
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Your signs and wonders in Egypt resulted in rescuing your people Israel. You stretched out your mighty hand and bared your '
  - type: text
    content: omnipotent
  - type: text
    content: ' arm and terrifying power. '
  '22':
  - type: text
    content: 'Then you gave them this land that you had promised their ancestors, a land flowing with milk and honey. '
  '23':
  - type: text
    content: 'But when they entered and took possession of it, they would neither listen to your voice nor follow your law. They would do nothing you commanded them to do, so you brought this disaster on them. '
  '24':
  - type: text
    content: 'Look! The Babylonians have already set up siege ramps to take the city! Jerusalem is now within their clutches. The people will suffer from war, food shortages, and disease when they attack the city. What you prophesied has now come true, as you see. '
  '25':
  - type: text
    content: 'Yet you, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', are the one who told me: ‘Buy the field, pay for it, and get witnesses,’ even though the Babylonians are about to capture the city.”'
  - type: heading
    content: God Answers Jeremiah’s Prayer
  '26':
  - type: text
    content: 'The word of '
  - type: text
    content: Yahweh
  - type: text
    content: ' came to me, saying, '
  '27':
  - type: text
    content: '“Behold, I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', God of all the world. Nothing is impossible with me. '
  '28':
  - type: text
    content: 'Therefore, I say to you, I will hand Jerusalem over to the Babylonians and to Nebuchadnezzar the king, and he will conquer it. '
  - type: note
    content: See Jer. 52; see also 2 Kings 25:1–11; 2 Chron. 36:17–21.
  '29':
  - type: text
    content: 'The attacking army of Babylon will seize this city, set it on fire, and burn it to the ground. The people offered sacrifices to Baal on those same rooftops and poured out drink offerings to other idols, provoking my anger. '
  '3':
  - type: text
    content: 'King Zedekiah had imprisoned me because I had prophesied '
  - type: text
    content: Yahweh
  - type: text
    content: '’s message: “I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', and I am about to let the king of Babylonia conquer Jerusalem. '
  '30':
  - type: text
    content: 'From their earliest history, the people of Israel and Judah alike have done evil in my presence. In fact, the people of Israel have done nothing but make me angry by their actions, declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'From the day they built this city, these people have made me angry and furious. Therefore, I will destroy it '
  '32':
  - type: text
    content: 'because of all the wickedness of the people of Israel and Judah. They have all provoked my anger, their kings, their officials, their priests, their prophets, the people of Judah, and the inhabitants of Jerusalem. '
  '33':
  - type: text
    content: 'They have turned their backs to me and not their faces. Even though I taught them so untiringly over and over, they would not listen or accept correction. '
  '34':
  - type: text
    content: 'Instead, they have defiled the house that bears my name by placing their detestable idols inside it. '
  '35':
  - type: text
    content: 'And in the Valley of Hinnom, they have built shrines to Baal. They have sacrificed their '
  - type: text
    content: little
  - type: text
    content: ' sons and daughters to Molech '
  - type: text
    content: in the fire
  - type: text
    content: —something I never commanded, nor did it ever enter my thoughts!”
  - type: heading
    content: God’s Hope-Filled Promise
  '36':
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Israel, says, “You say that because of war, plague, and food shortages that Jerusalem will fall and be handed over to the king of Babylon, but this is what '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, says: '
  '37':
  - type: text
    content: 'I will '
  - type: text
    content: graciously
  - type: text
    content: ' regather '
  - type: text
    content: the people of Jerusalem
  - type: text
    content: ' although I was previously filled with anger and scattered them in foreign countries by my great indignation. '
  - type: text
    content: Yes
  - type: text
    content: ', I will bring them back to this place, and they will live under my protection. '
  '38':
  - type: text
    content: 'Then they will be my people, and I will be their God. '
  '39':
  - type: text
    content: 'I will give them one single purpose and one '
  - type: text
    content: wonderful
  - type: text
    content: ' way to live so that they will always honor me, for their own good and for the good of their descendants. '
  '4':
  - type: text
    content: 'King Zedekiah will not escape but will be captured and taken to the king of Babylon, '
  - type: text
    content: Nebuchadnezzar
  - type: text
    content: ', who will see him face-to-face and speak with him in person. '
  '40':
  - type: text
    content: 'I will make an everlasting covenant with them, and I will never stop doing good things for them. I will inspire them to honor and respect me so that they will never walk away from me again. '
  '41':
  - type: text
    content: What delight I will have in doing good things for them! With all my heart and soul, I promise that they will be planted firmly in this land once again.
  '42':
  - type: text
    content: '“For '
  - type: text
    content: Yahweh
  - type: text
    content: ' promises: Just as I have brought great disaster on the people, I will someday do all these great things for them. '
  '43':
  - type: text
    content: 'People will again buy fields in this land that you call a wasteland without men or animals. I have given it over to the Babylonians. '
  '44':
  - type: text
    content: 'Yes, people will pay cash for property, draw up deeds, seal them, and have them witnessed in the territory of Benjamin, throughout the villages around Jerusalem, the towns of Judah, the highlands, the western foothills, and the southern desert. For I will restore '
  - type: text
    content: what was lost
  - type: text
    content: ' and bring the captives back to their land,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '5':
  - type: text
    content: 'Then Zedekiah will be taken captive to Babylon, where he will remain until I am finished with him. If you fight against the Babylonians, you will not succeed. For I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have decreed it.”'
  - type: heading
    content: Jeremiah Buys a Field
  '6':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me and said, '
  '7':
  - type: text
    content: “
  - type: text
    content: Your cousin
  - type: text
    content: ' Hanamel, '
  - type: note
    content: Hanamel means “God’s gracious gift.”
  - type: text
    content: 'son of your uncle Shallum, '
  - type: note
    content: There are fourteen persons with this name in the Old Testament. This man, Jeremiah’s uncle, is referred to only here. Shallum means “completion,” “perfection,” “restoration,” or “prosperity” and is etymologically related to shalom.
  - type: text
    content: 'will come to you and say: ‘Buy my field at Anathoth, '
  - type: note
    content: Anathoth was Jeremiah’s birthplace (see 1:1).
  - type: text
    content: 'for you have the right of redemption to purchase it.’ ” '
  - type: note
    content: Apparently, Hanamel was childless, which gave his next of kin (Jeremiah) the right to redeem the land as his own. It was Jeremiah’s duty to purchase it and keep it in the family. See Lev. 25:25–28; Ruth 4:1–6.
  '8':
  - type: text
    content: 'And it happened just as '
  - type: text
    content: Yahweh
  - type: text
    content: ' had said. My cousin Hanamel came to me in the palace guardhouse and said, “Buy my field at Anathoth in the territory of Benjamin. '
  - type: text
    content: As my nearest relative
  - type: text
    content: ', you have the right of possession and redemption, so buy it.” Then I knew that this was '
  - type: text
    content: Yahweh
  - type: text
    content: ’s plan.
  - type: note
    content: The Babylonian invasion was imminent, yet amid the gloom and doom, the prophet was instructed to buy a field. This field was possibly at that very time occupied by the Babylonian army. Everyone around Jeremiah would have said that the land was worthless and should not be bought. Purchasing the field was a symbolic act that indicated that one day Judah would be delivered from the Babylonians (see v. 15). God’s instructions to Jeremiah were a sign of his foreknowledge and a prophecy for a future beyond the one that was now in view. Jeremiah’s obedience was an act of agreement and investment in God’s promises for the future. Jeremiah became a picture of our Lord Jesus who also “bought a field” (see Matt. 13:44 and footnote).
  '9':
  - type: text
    content: 'So I bought the field from my cousin Hanamel at Anathoth and weighed out the purchase price to him of seventeen silver shekels. '
