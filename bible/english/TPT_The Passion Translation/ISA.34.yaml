document_id: ISA.34,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Judges His Enemies
  - type: text
    content: Come close to me, you nations, and listen!
  - type: text
    content: Pay attention to me, you peoples!
  - type: text
    content: Let all the world hear me,
  - type: text
    content: the earth and all that springs from it.
  '10':
  - type: text
    content: Night and day it will never be extinguished;
  - type: text
    content: its smoke will go up forever and ever.
  - type: text
    content: Through the endless ages it will lie desolate;
  - type: text
    content: no one will pass through it forever.
  '11':
  - type: text
    content: 'Nothing but desert hawks and wild animals '
  - type: note
    content: The exact identities of the animals listed here are uncertain. Some translations include hedgehogs, pelicans, porcupines, hawks, and several types of owls.
  - type: text
    content: will live there;
  - type: text
    content: owls and ravens will find a home there.
  - type: text
    content: The Lord will stretch out over it a measuring line of chaos
  - type: text
    content: and the plumb line of emptiness.
  '12':
  - type: text
    content: It will be named No Kingdom There,
  - type: text
    content: and all its rulers and princes will come to nothing.
  - type: note
    content: See 1 Cor. 2:8; Eph. 6:12.
  '13':
  - type: text
    content: Its palaces will be overgrown with thorns,
  - type: text
    content: 'its fortresses '
  - type: note
    content: See 2 Cor. 10:3–6.
  - type: text
    content: with thistles and briars.
  - type: text
    content: 'It will become a haunt for demons '
  - type: note
    content: Or “dragons” or “jackals.”
  - type: text
    content: and an abode for owls.
  - type: note
    content: The Hebrew word for “owls” is uncertain.
  '14':
  - type: text
    content: Wild beasts will mingle with wolves
  - type: text
    content: 'and goat-demons '
  - type: note
    content: Or “satyrs.”
  - type: text
    content: will howl to one another.
  - type: text
    content: 'There too the night-demon '
  - type: note
    content: Or “Lilith,” a female goddess known as the sexually perverse “night-demon.” The Dead Sea Scroll 4Q510-511 lists Lilith among other demonic monsters.
  - type: text
    content: will settle in and find her rest.
  '15':
  - type: text
    content: There the arrow-snake will build her nest, lay her eggs,
  - type: text
    content: and hatch her brood in the shadows.
  - type: text
    content: 'There too the vultures will gather '
  - type: note
    content: See Matt. 24:28.
  - type: text
    content: to breed.
  '16':
  - type: text
    content: 'Seek for '
  - type: text
    content: Yahweh
  - type: text
    content: ’s book and read it carefully.
  - type: text
    content: 'You will learn that none of these '
  - type: text
    content: prophecies
  - type: text
    content: ' will fail;'
  - type: text
    content: 'none will lack a '
  - type: text
    content: fulfillment as its
  - type: text
    content: ' companion.'
  - type: text
    content: For the Lord has issued his decree.
  - type: text
    content: It is his Spirit that has gathered them.
  '17':
  - type: text
    content: He is the one who apportioned it to them by lot,
  - type: text
    content: whose hand measured the share of each.
  - type: note
    content: See Eph. 4:7, 11.
  - type: text
    content: They will possess it for all time
  - type: text
    content: and dwell there throughout the ages.
  '2':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' has turned his anger toward the nations'
  - type: text
    content: and his fury against all their armies.
  - type: text
    content: He has doomed them to destruction
  - type: text
    content: and will annihilate them all.
  '3':
  - type: text
    content: Their slain will be cast out,
  - type: text
    content: the stench of their corpses will rise,
  - type: text
    content: and the mountains will stream with their blood.
  '4':
  - type: text
    content: 'The heavenly powers '
  - type: note
    content: Or “The host of heaven,” which can refer to demonic powers. See 2 Kings 17:16; 21:3, 5; 23:4–5; Eph. 6:10–18.
  - type: text
    content: will fade away to nothing,
  - type: note
    content: The Dead Sea scroll 1QIsaa adds “and the valleys will be split open.”
  - type: text
    content: and the heavens will be rolled up like a scroll.
  - type: text
    content: All their mighty host will wither
  - type: text
    content: as leaves fall from a withered vine
  - type: text
    content: or fruit from a withering fig tree.
  - type: note
    content: See Matt. 24:29; Rev. 6:13–14.
  '5':
  - type: text
    content: The Lord says
  - type: text
    content: ':'
  - type: text
    content: “Indeed, my judgment-sword has appeared in the heavens,
  - type: note
    content: As translated from the Dead Sea scroll 1QIsaa. The Hebrew is “My sword is drenched in the heavens.”
  - type: text
    content: and when it has drunk its fill,
  - type: text
    content: you will see it descend on the people of Edom,
  - type: text
    content: those whom I have doomed to judgment.”
  '6':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has a judgment-sword dripping with blood.'
  - type: text
    content: It is smeared with fat,
  - type: text
    content: dripping with the blood of lambs and goats,
  - type: text
    content: and covered with the fat of rams’ kidneys.
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has a sacrifice in Bozrah'
  - type: note
    content: Bozrah (modern Busaira) was the capital of Edom. See Isa. 63:1–6; Jer. 49:13; Amos 1:12. Bozrah means “sheepfold.” The sacrifice the Lord offered in the sheepfold can point to the supreme sacrifice of Jesus, the Lamb of God.
  - type: text
    content: and a great slaughter in the land of Edom.
  '7':
  - type: text
    content: Cattle and young bulls will also be slain;
  - type: note
    content: This is likely aurochs, an extinct species of wild cattle.
  - type: text
    content: 'their land will be drenched '
  - type: note
    content: Or “drunk.”
  - type: text
    content: with blood
  - type: text
    content: and the dust soaked with fat.
  '8':
  - type: text
    content: 'For Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has a day of vengeance,'
  - type: text
    content: a year of vindication for Zion’s cause.
  '9':
  - type: text
    content: Edom’s streams will be turned to pitch and its soil to sulfur;
  - type: text
    content: her land will become blazing pitch.
