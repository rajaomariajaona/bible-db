document_id: ISA.34,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Judges His Enemies
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come close to me, you nations, and listen!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pay attention to me, you peoples!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all the world hear me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the earth and all that springs from it.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Night and day it will never be extinguished;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: its smoke will go up forever and ever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Through the endless ages it will lie desolate;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no one will pass through it forever.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nothing but desert hawks and wild animals '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The exact identities of the animals listed here are uncertain. Some translations include hedgehogs, pelicans, porcupines, hawks, and several types of owls.
      marker-yv: yv-n
    - type: text
      text: will live there;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: owls and ravens will find a home there.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord will stretch out over it a measuring line of chaos
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the plumb line of emptiness.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be named No Kingdom There,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all its rulers and princes will come to nothing.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 2:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 6:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its palaces will be overgrown with thorns,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'its fortresses '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 10:3–6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: with thistles and briars.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It will become a haunt for demons '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “dragons” or “jackals.”
      marker-yv: yv-n
    - type: text
      text: and an abode for owls.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “owls” is uncertain.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wild beasts will mingle with wolves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and goat-demons '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “satyrs.”
      marker-yv: yv-n
    - type: text
      text: will howl to one another.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There too the night-demon '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Lilith,” a female goddess known as the sexually perverse “night-demon.” The Dead Sea Scroll 4Q510-511 lists Lilith among other demonic monsters.
      marker-yv: yv-n
    - type: text
      text: will settle in and find her rest.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There the arrow-snake will build her nest, lay her eggs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and hatch her brood in the shadows.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There too the vultures will gather '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 24:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: to breed.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Seek for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s book and read it carefully.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You will learn that none of these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: prophecies
    - type: text
      text: ' will fail;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'none will lack a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fulfillment as its
    - type: text
      text: ' companion.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the Lord has issued his decree.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is his Spirit that has gathered them.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is the one who apportioned it to them by lot,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: whose hand measured the share of each.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 4:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will possess it for all time
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and dwell there throughout the ages.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has turned his anger toward the nations'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and his fury against all their armies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has doomed them to destruction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and will annihilate them all.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their slain will be cast out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the stench of their corpses will rise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the mountains will stream with their blood.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The heavenly powers '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The host of heaven,” which can refer to demonic powers. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 17:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 21:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '5'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 23:4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 6:10–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: will fade away to nothing,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Dead Sea scroll 1QIsa
      - type: usfm
        marker: ord
        children:
        - type: text
          text: a
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: adds “and the valleys will be split open.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the heavens will be rolled up like a scroll.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All their mighty host will wither
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as leaves fall from a withered vine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or fruit from a withering fig tree.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 24:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 6:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Lord says
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Indeed, my judgment-sword has appeared in the heavens,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Dead Sea scroll 1QIsa
      - type: usfm
        marker: ord
        children:
        - type: text
          text: a
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Hebrew is “My sword is drenched in the heavens.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and when it has drunk its fill,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will see it descend on the people of Edom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those whom I have doomed to judgment.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has a judgment-sword dripping with blood.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is smeared with fat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dripping with the blood of lambs and goats,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and covered with the fat of rams’ kidneys.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has a sacrifice in Bozrah'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Bozrah (modern Busaira) was the capital of Edom. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 63:1–6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 49:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Amos 1:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bozrah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “sheepfold.” The sacrifice the Lord offered in the sheepfold can point to the supreme sacrifice of Jesus, the Lamb of God.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and a great slaughter in the land of Edom.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cattle and young bulls will also be slain;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is likely aurochs, an extinct species of wild cattle.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'their land will be drenched '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “drunk.”
      marker-yv: yv-n
    - type: text
      text: with blood
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the dust soaked with fat.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has a day of vengeance,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a year of vindication for Zion’s cause.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Edom’s streams will be turned to pitch and its soil to sulfur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: her land will become blazing pitch.
