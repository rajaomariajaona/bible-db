document_id: PRO.24,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom’s Warning
  - type: text
    content: Don’t envy the wealth of the wicked or crave their company.
  '10':
  - type: text
    content: If you faint when under pressure,
  - type: text
    content: you have need of courage.
  - type: note
    content: Or “your strength is limited.” Our weakness often becomes an excuse to quit, but strength and courage come as the result of faithfulness under pressure. Some interpret this to mean “If you fail to help others in their time of need, you will grow too weak to help yourself.”
  '11':
  - type: text
    content: Go and rescue the perishing! Be their savior!
  - type: text
    content: Why would you stand back and watch them stagger to their death?
  '12':
  - type: text
    content: And why would you say, “But it’s none of my business”?
  - type: text
    content: The one who knows you completely and judges your every motive
  - type: text
    content: is also the keeper of souls—and not just yours!
  - type: text
    content: He sees through your excuses and holds you responsible
  - type: text
    content: for failing to help those whose lives are threatened.
  '13':
  - type: text
    content: Revelation-knowledge is a delicacy,
  - type: text
    content: sweet like flowing honey that melts in your mouth.
  - type: text
    content: Eat as much of it as you can, my friend!
  '14':
  - type: text
    content: For then you will perceive what is true wisdom,
  - type: text
    content: your future will be bright,
  - type: note
    content: The Septuagint is “your death will be good.”
  - type: text
    content: and this hope living within you will never disappoint you.
  '15':
  - type: text
    content: Listen up, you wicked, irreverent ones—
  - type: text
    content: don’t harass the lovers of God
  - type: note
    content: Or “the righteous.”
  - type: text
    content: and don’t invade their resting place.
  '16':
  - type: text
    content: For the lovers of God may suffer adversity
  - type: text
    content: and stumble seven times,
  - type: text
    content: but they will continue to rise over and over again.
  - type: text
    content: But the unrighteous are brought down by just one calamity
  - type: text
    content: and will never be able to rise again
  - type: text
    content: .
  - type: note
    content: Implied in the text, as it completes the parallelism.
  '17':
  - type: text
    content: Never gloat when your enemy meets disaster,
  - type: text
    content: and don’t be quick to rejoice if he falls.
  '18':
  - type: text
    content: For the Lord, who sees your heart,
  - type: text
    content: will be displeased with you and will pity your foe.
  '19':
  - type: text
    content: Don’t be angrily offended over evildoers or be agitated by them.
  - type: note
    content: The Septuagint is “Don’t rejoice with those who do evil or be jealous of them.”
  '2':
  - type: text
    content: For they’re obsessed with causing trouble
  - type: text
    content: and their conversations are corrupt.
  '20':
  - type: text
    content: For the wicked have no life and no future—
  - type: text
    content: their light of life will die out.
  - type: note
    content: Not only will they die out, but the implication is they will also have no posterity.
  '21':
  - type: text
    content: 'My child, stand in awe of '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: text
    content: Give counsel to others,
  - type: text
    content: but don’t mingle with those who are rebellious.
  '22':
  - type: text
    content: For sudden destruction will fall upon them
  - type: text
    content: and their lives will be ruined in a moment.
  - type: text
    content: And who knows what retribution they will face!
  - type: note
    content: Verses 21 and 22 are translated from the Aramaic.
  - type: heading
    content: Revelation from the Wise
  '23':
  - type: text
    content: 'Those enlightened with wisdom have spoken these proverbs:'
  - type: text
    content: Judgment must be impartial,
  - type: text
    content: for it is always wrong to be swayed by a person’s status.
  '24':
  - type: text
    content: If you say to the guilty, “You are innocent,”
  - type: text
    content: the nation will curse you and the people will revile you.
  '25':
  - type: text
    content: But when you convict the guilty,
  - type: text
    content: the people will thank you and reward you with favor.
  '26':
  - type: text
    content: Speaking honestly is a sign of true friendship.
  - type: note
    content: The Hebrew is literally “An honest answer is like a kiss on the lips.” In the culture of the day, kissing was a sign of authentic friendship and a mark of relationship, which was often expressed in public among friends.
  '27':
  - type: text
    content: Go ahead, build your career and give yourself to your work.
  - type: text
    content: But if you put me first, you’ll see your family built up!
  - type: note
    content: As translated from the Septuagint.
  '28':
  - type: text
    content: Why would you be a false accuser and slander with your words?
  '29':
  - type: text
    content: Don’t ever spitefully say, “I’ll get even with him!
  - type: text
    content: I’ll do to him what he did to me!”
  '3':
  - type: text
    content: 'Wise people are builders '
  - type: note
    content: Or “A house is built by wisdom.” The house is more than a structure with roof and a floor. It becomes a metaphor for families, churches, businesses, and enterprises.
  - type: text
    content: —
  - type: text
    content: they build families, businesses, communities.
  - type: text
    content: And through intelligence and insight
  - type: text
    content: their enterprises are established and endure.
  '30':
  - type: text
    content: One day I passed by the field of a lazy man,
  - type: text
    content: and I noticed the vineyards of a slacker.
  - type: text
    content: I observed nothing but thorns, weeds, and broken-down walls.
  '32':
  - type: text
    content: So I considered their lack of wisdom,
  - type: text
    content: 'and I pondered the lessons I could learn from this:'
  '33':
  - type: text
    content: Professional work habits prevent poverty from becoming
  - type: text
    content: 'your permanent business partner. And:'
  - type: text
    content: If you put off until tomorrow the work you could do today,
  - type: text
    content: tomorrow never seems to come.
  '4':
  - type: text
    content: Because of their skilled leadership,
  - type: text
    content: 'the hearts '
  - type: note
    content: Or “inner chambers.”
  - type: text
    content: of people are filled with the treasures of wisdom
  - type: text
    content: and the pleasures of spiritual wealth.
  '5':
  - type: text
    content: Wisdom can make anyone into a mighty warrior,
  - type: note
    content: Or “Wisdom makes anyone into a hero.” The Aramaic and the Septuagint read “It’s better to be wise than to be strong.”
  - type: text
    content: and revelation-knowledge increases strength.
  '6':
  - type: text
    content: Wise strategy is necessary to wage war,
  - type: text
    content: and with many astute advisers
  - type: text
    content: you’ll see the path to victory more clearly.
  '7':
  - type: text
    content: 'Wisdom is a treasure too lofty for a quarreling fool '
  - type: note
    content: The Hebrew is actually “Wisdom is coral to a fool.” That is, it is unattainable, deep, and hidden.
  - type: text
    content: —
  - type: text
    content: he’ll have nothing to say when leaders gather together.
  '8':
  - type: text
    content: There is one who makes plans to do evil—
  - type: text
    content: Master Schemer is his name.
  '9':
  - type: text
    content: If you plan to do evil, it’s as wrong as doing it.
  - type: text
    content: And everyone detests a troublemaker.
