document_id: PRO.24,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom’s Warning
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Don’t envy the wealth of the wicked or crave their company.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: If you faint when under pressure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you have need of courage.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “your strength is limited.” Our weakness often becomes an excuse to quit, but strength and courage come as the result of faithfulness under pressure. Some interpret this to mean “If you fail to help others in their time of need, you will grow too weak to help yourself.”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Go and rescue the perishing! Be their savior!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why would you stand back and watch them stagger to their death?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And why would you say, “But it’s none of my business”?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The one who knows you completely and judges your every motive
  - type: usfm
    marker: q1
    children:
    - type: text
      text: is also the keeper of souls—and not just yours!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sees through your excuses and holds you responsible
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for failing to help those whose lives are threatened.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Revelation-knowledge is a delicacy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sweet like flowing honey that melts in your mouth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eat as much of it as you can, my friend!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: For then you will perceive what is true wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your future will be bright,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint is “your death will be good.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and this hope living within you will never disappoint you.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Listen up, you wicked, irreverent ones—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: don’t harass the lovers of God
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the righteous.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and don’t invade their resting place.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: For the lovers of God may suffer adversity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and stumble seven times,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but they will continue to rise over and over again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the unrighteous are brought down by just one calamity
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: and will never be able to rise again
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the text, as it completes the parallelism.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Never gloat when your enemy meets disaster,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and don’t be quick to rejoice if he falls.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: For the Lord, who sees your heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be displeased with you and will pity your foe.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Don’t be angrily offended over evildoers or be agitated by them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint is “Don’t rejoice with those who do evil or be jealous of them.”
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: For they’re obsessed with causing trouble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and their conversations are corrupt.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: For the wicked have no life and no future—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their light of life will die out.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Not only will they die out, but the implication is they will also have no posterity.
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'My child, stand in awe of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give counsel to others,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but don’t mingle with those who are rebellious.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: For sudden destruction will fall upon them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and their lives will be ruined in a moment.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who knows what retribution they will face!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: are translated from the Aramaic.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Revelation from the Wise
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Those enlightened with wisdom have spoken these proverbs:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Judgment must be impartial,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for it is always wrong to be swayed by a person’s status.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: If you say to the guilty, “You are innocent,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the nation will curse you and the people will revile you.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: But when you convict the guilty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the people will thank you and reward you with favor.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Speaking honestly is a sign of true friendship.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is literally “An honest answer is like a kiss on the lips.” In the culture of the day, kissing was a sign of authentic friendship and a mark of relationship, which was often expressed in public among friends.
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Go ahead, build your career and give yourself to your work.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you put me first, you’ll see your family built up!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint.
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Why would you be a false accuser and slander with your words?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Don’t ever spitefully say, “I’ll get even with him!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll do to him what he did to me!”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Wise people are builders '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “A house is built by wisdom.” The house is more than a structure with roof and a floor. It becomes a metaphor for families, churches, businesses, and enterprises.
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they build families, businesses, communities.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And through intelligence and insight
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their enterprises are established and endure.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 30-31
    - type: text
      text: One day I passed by the field of a lazy man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I noticed the vineyards of a slacker.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I observed nothing but thorns, weeds, and broken-down walls.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: So I considered their lack of wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and I pondered the lessons I could learn from this:'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 33-34
    - type: text
      text: Professional work habits prevent poverty from becoming
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'your permanent business partner. And:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you put off until tomorrow the work you could do today,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tomorrow never seems to come.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Because of their skilled leadership,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the hearts '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “inner chambers.”
      marker-yv: yv-n
    - type: text
      text: of people are filled with the treasures of wisdom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the pleasures of spiritual wealth.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Wisdom can make anyone into a mighty warrior,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Wisdom makes anyone into a hero.” The Aramaic and the Septuagint read “It’s better to be wise than to be strong.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and revelation-knowledge increases strength.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Wise strategy is necessary to wage war,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and with many astute advisers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you’ll see the path to victory more clearly.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Wisdom is a treasure too lofty for a quarreling fool '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is actually “Wisdom is coral to a fool.” That is, it is unattainable, deep, and hidden.
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he’ll have nothing to say when leaders gather together.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: There is one who makes plans to do evil—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Master Schemer is his name.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: If you plan to do evil, it’s as wrong as doing it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And everyone detests a troublemaker.
