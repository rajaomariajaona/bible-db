  '7':
  - type: text
    content: 'Jesus continued, '
  - type: text
    content: “After a servant has finished his work in the field or with the livestock, he doesn’t immediately sit down to relax and eat. No, a true servant prepares the food for his master and makes sure his master is served his meal before he sits down to eat his own.
  - type: text
    content: ' '
