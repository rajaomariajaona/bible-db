document_id: LUK.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faith and Forgiveness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'One day Jesus taught his disciples: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Betrayals
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. Other Greek texts use the words “temptation” or “to stumble.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: are inevitable, but great devastation will come to the one guilty of betraying others.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It would be better for him to have a heavy boulder tied around his neck and be hurled into the deepest sea than to face the punishment of betraying one of my dear ones! So be alert to your brother’s condition,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and if you see him going the wrong direction, cry out and correct him. If there is true repentance on his part, forgive him.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: No matter how many times in one day your brother sins against you
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text states explicitly “seven times.” But this is used as a metaphor for unlimited forgiveness.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and says, ‘I’m sorry; I am changing; forgive me,’ you need to forgive him each and every time.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Upon hearing this, the apostles said to Jesus, “Lord, you must increase '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text is literally “add faith to us.”
    marker-yv: yv-n
  - type: text
    text: our measure of faith!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If you have even the smallest measure of faith, it would be powerful enough to say to this large
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text is “mulberry” or “sycamore tree,” which is known to grow to about thirty-five feet high.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: tree, ‘My faith will pull you up by the roots and throw you into the sea,’
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: and it will respond to your faith
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and obey you.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The apostles had faith; they simply needed to use it.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: 'Jesus continued, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “After a servant has finished his work in the field or with the livestock, he doesn’t immediately sit down to relax and eat. No, a true servant prepares the food for his master and makes sure his master is served his meal before he sits down to eat his own.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Does the servant expect to be thanked for doing what is required of him?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'So learn this lesson: After doing all that is commanded of you, simply say, ‘We are mere servants, undeserving of special praise, for we are just doing what is expected of us and fulfilling our duties.’ ”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals Ten Lepers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'On his way to Jerusalem Jesus passed through the border region between Samaria and Galilee. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'As he entered one village, ten men approached him, but they kept their distance, for they were lepers. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'They shouted to him, “Mighty Lord, our wonderful Master! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word used here for “Master” is not the usual word used for “Teacher” or “Master.” It denotes one with supernatural authority and power.
    marker-yv: yv-n
  - type: text
    text: 'Won’t you have mercy on us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and heal us
  - type: text
    text: ?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When Jesus stopped to look at them, he spoke these words: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go to be examined by the Jewish priests.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was what was required. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 13:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 14:1–11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . What a step of faith for these lepers as they stepped out on only the word Jesus spoke to them. They were to go to the priest, who would confirm their healing and declare them ceremonially clean and approved to go into the temple to worship God.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: 'They set off, and they were healed while walking along the way. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'One of them, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a Samaritan
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: For a Samaritan man to give thanks to a Jewish man was indeed peculiar. Since he likely had no “priest,” he turned to the only one he knew to be a priest for him, Jesus Christ.
    marker-yv: yv-n
  - type: text
    text: 'when he discovered that he was completely healed, turned back to find Jesus, shouting out joyous praises and glorifying God. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When he found Jesus, he fell down at his feet and thanked him over and over, saying to him, “You are the Messiah.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: From the Aramaic text.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “So where are the other nine?”
  - type: text
    text: ' Jesus asked. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Weren’t there ten who were healed?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They all refused to return to give thanks and give glory to God except you, a foreigner from Samaria?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Jesus said to the healed man lying at his feet, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Arise and go. It was your faith that brought you salvation and made you whole.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Kingdom Realm within You
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jesus was once asked by the Jewish religious leaders, “When will God’s kingdom come?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “When will God’s kingdom be established?”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “God’s kingdom does not come simply
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: by obeying principles
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the Aramaic text where it states, “observances” (of the law). The same word is found in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 4:10
      metadata:
        usfm: GAL.4.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: referring to “observances” of keeping the law.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: or waiting for signs.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The kingdom is not discovered in one place or another, for God’s kingdom realm is already expanding within some of you.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Translated from the Aramaic text. The implication is that God’s kingdom realm is a person, Jesus Christ. The reality of God’s kingdom appears when Jesus lives within us by faith.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Later, Jesus addressed this again with his apostles, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The time is coming when a great passion will be awakened within you to see me again. Yes, you will long to see the beginning of the days of the Son of Man, but you won’t be able to find me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You will hear reports from some who will say, ‘Look, he has returned,’ ‘He’s over here,’ or, ‘He’s over there!’ Don’t believe it or run after them,
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: for their claims will be false.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The day of the Son of Man will burst forth with the brightness of a lightning strike that shines from one end of the sky to the other, illuminating the earth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But before this takes place, the Son of Man must pass through great suffering and rejection from this generation.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The same things that happened in the days of Noah will take place in the days of the Son of Man.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They were eating, they were drinking, they were marrying, and they were given in marriage until the day Noah boarded the ark and the devastating flood came and swept them all away.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-30
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The days of the Son of Man can also be compared to the days of Lot. The people of that time lived their lives as normal. They got married, raised families, built homes and businesses, yet they were totally unaware of what was coming until the day Lot departed from Sodom. The sky opened up and rained fire and burning sulfur upon them, destroying everyone and everything they had built. So it will be on the day of the unveiling of the Son of Man.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “On that day, if one is outside,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text is literally “on the roof.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: he won’t even have time to go back into the house to gather his belongings. And those toiling in their fields won’t have time to run back home.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Don’t forget the example of Lot’s wife and what happened to her when she turned back.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 19:26
      metadata:
        usfm: GEN.19.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: All who are obsessed with being secure in life will lose it all—including their lives. But those who let go of their lives and surrender them to me will discover true life.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For in that night there will be two lying in their bed; one will be suddenly swept away while the other will be left
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: alive
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-36
  - type: usfm
    marker: wj
    children:
    - type: text
      text: There will be two women working together at household duties; one will be suddenly swept away while the other will be left
  - type: text
    text: ' '
