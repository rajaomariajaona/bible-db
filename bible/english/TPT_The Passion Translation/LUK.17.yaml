  - type: heading
    content: Faith and Forgiveness
  - type: text
    content: 'One day Jesus taught his disciples: '
  - type: text
    content: “Betrayals
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. Other Greek texts use the words “temptation” or “to stumble.”
  - type: text
    content: are inevitable, but great devastation will come to the one guilty of betraying others.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'So learn this lesson: After doing all that is commanded of you, simply say, ‘We are mere servants, undeserving of special praise, for we are just doing what is expected of us and fulfilling our duties.’ ”'
  - type: heading
    content: Jesus Heals Ten Lepers
  '11':
  - type: text
    content: 'On his way to Jerusalem Jesus passed through the border region between Samaria and Galilee. '
  '12':
  - type: text
    content: 'As he entered one village, ten men approached him, but they kept their distance, for they were lepers. '
  '13':
  - type: text
    content: 'They shouted to him, “Mighty Lord, our wonderful Master! '
  - type: note
    content: The Greek word used here for “Master” is not the usual word used for “Teacher” or “Master.” It denotes one with supernatural authority and power.
  - type: text
    content: 'Won’t you have mercy on us '
  - type: text
    content: and heal us
  - type: text
    content: ?”
  '14':
  - type: text
    content: 'When Jesus stopped to look at them, he spoke these words: '
  - type: text
    content: “Go to be examined by the Jewish priests.”
  - type: note
    content: This was what was required. See Lev. 13:19; 14:1–11. What a step of faith for these lepers as they stepped out on only the word Jesus spoke to them. They were to go to the priest, who would confirm their healing and declare them ceremonially clean and approved to go into the temple to worship God.
  - type: text
    content: 'They set off, and they were healed while walking along the way. '
  '15':
  - type: text
    content: 'One of them, '
  - type: text
    content: a Samaritan
  - type: text
    content: ', '
  - type: note
    content: For a Samaritan man to give thanks to a Jewish man was indeed peculiar. Since he likely had no “priest,” he turned to the only one he knew to be a priest for him, Jesus Christ.
  - type: text
    content: 'when he discovered that he was completely healed, turned back to find Jesus, shouting out joyous praises and glorifying God. '
  '16':
  - type: text
    content: When he found Jesus, he fell down at his feet and thanked him over and over, saying to him, “You are the Messiah.”
  - type: note
    content: From the Aramaic text.
  '17':
  - type: text
    content: “So where are the other nine?”
  - type: text
    content: ' Jesus asked. '
  - type: text
    content: “Weren’t there ten who were healed?
  - type: text
    content: ' '
  '18':
  - type: text
    content: They all refused to return to give thanks and give glory to God except you, a foreigner from Samaria?”
  '19':
  - type: text
    content: 'Then Jesus said to the healed man lying at his feet, '
  - type: text
    content: “Arise and go. It was your faith that brought you salvation and made you whole.”
  - type: heading
    content: God’s Kingdom Realm within You
  '2':
  - type: text
    content: It would be better for him to have a heavy boulder tied around his neck and be hurled into the deepest sea than to face the punishment of betraying one of my dear ones! So be alert to your brother’s condition,
  - type: text
    content: ' '
  '20':
  - type: text
    content: Jesus was once asked by the Jewish religious leaders, “When will God’s kingdom come?”
  - type: note
    content: Or “When will God’s kingdom be established?”
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “God’s kingdom does not come simply
  - type: text
    content: ' '
  - type: text
    content: by obeying principles
  - type: text
    content: ' '
  - type: note
    content: Implied in the Aramaic text where it states, “observances” (of the law). The same word is found in Gal. 4:10 referring to “observances” of keeping the law.
  - type: text
    content: or waiting for signs.
  - type: text
    content: ' '
  '21':
  - type: text
    content: The kingdom is not discovered in one place or another, for God’s kingdom realm is already expanding within some of you.”
  - type: note
    content: Translated from the Aramaic text. The implication is that God’s kingdom realm is a person, Jesus Christ. The reality of God’s kingdom appears when Jesus lives within us by faith.
  '22':
  - type: text
    content: 'Later, Jesus addressed this again with his apostles, saying, '
  - type: text
    content: “The time is coming when a great passion will be awakened within you to see me again. Yes, you will long to see the beginning of the days of the Son of Man, but you won’t be able to find me.
  - type: text
    content: ' '
  '23':
  - type: text
    content: You will hear reports from some who will say, ‘Look, he has returned,’ ‘He’s over here,’ or, ‘He’s over there!’ Don’t believe it or run after them,
  - type: text
    content: ' '
  - type: text
    content: for their claims will be false.
  - type: text
    content: ' '
  '24':
  - type: text
    content: The day of the Son of Man will burst forth with the brightness of a lightning strike that shines from one end of the sky to the other, illuminating the earth.
  '25':
  - type: text
    content: “But before this takes place, the Son of Man must pass through great suffering and rejection from this generation.
  - type: text
    content: ' '
  '26':
  - type: text
    content: The same things that happened in the days of Noah will take place in the days of the Son of Man.
  - type: text
    content: ' '
  '27':
  - type: text
    content: They were eating, they were drinking, they were marrying, and they were given in marriage until the day Noah boarded the ark and the devastating flood came and swept them all away.
  '28':
  - type: text
    content: “The days of the Son of Man can also be compared to the days of Lot. The people of that time lived their lives as normal. They got married, raised families, built homes and businesses, yet they were totally unaware of what was coming until the day Lot departed from Sodom. The sky opened up and rained fire and burning sulfur upon them, destroying everyone and everything they had built. So it will be on the day of the unveiling of the Son of Man.
  '3':
  - type: text
    content: and if you see him going the wrong direction, cry out and correct him. If there is true repentance on his part, forgive him.
  - type: text
    content: ' '
  '31':
  - type: text
    content: “On that day, if one is outside,
  - type: text
    content: ' '
  - type: note
    content: The Greek text is literally “on the roof.”
  - type: text
    content: he won’t even have time to go back into the house to gather his belongings. And those toiling in their fields won’t have time to run back home.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Don’t forget the example of Lot’s wife and what happened to her when she turned back.
  - type: text
    content: ' '
  - type: note
    content: See Gen. 19:26.
  '33':
  - type: text
    content: All who are obsessed with being secure in life will lose it all—including their lives. But those who let go of their lives and surrender them to me will discover true life.
  - type: text
    content: ' '
  '34':
  - type: text
    content: For in that night there will be two lying in their bed; one will be suddenly swept away while the other will be left
  - type: text
