    content: 'Jesus responded, '
  - type: text
    content: “If you have even the smallest measure of faith, it would be powerful enough to say to this large
  - type: text
    content: ' '
  - type: note
    content: The Greek text is “mulberry” or “sycamore tree,” which is known to grow to about thirty-five feet high.
  - type: text
