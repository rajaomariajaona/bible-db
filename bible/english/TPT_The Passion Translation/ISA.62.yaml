document_id: ISA.62,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Delights in Zion
  - type: text
    content: For Zion’s sake, how can I keep silent?
  - type: text
    content: For Jerusalem’s sake, how can I remain quiet?
  - type: text
    content: I will keep interceding
  - type: text
    content: ' until her righteousness'
  - type: text
    content: breaks forth like the blazing light of dawn
  - type: text
    content: and her salvation like a burning torch!
  '10':
  - type: text
    content: Pass through, pass through the gates,
  - type: text
    content: and go from old to new
  - type: text
    content: .
  - type: text
    content: Prepare a new path for the people.
  - type: text
    content: 'Build! Build up a highway '
  - type: text
    content: for them to come to me
  - type: text
    content: '!'
  - type: text
    content: Remove every hindrance
  - type: note
    content: Or “stone.”
  - type: text
    content: and unfurl a banner for the nations!
  '11':
  - type: text
    content: 'See? '
  - type: text
    content: Yahweh
  - type: text
    content: ' has proclaimed to the ends of the earth:'
  - type: text
    content: Tell my daughter, Zion,
  - type: text
    content: “Look, here comes your Deliverer!
  - type: text
    content: See? He’s bringing his reward,
  - type: text
    content: and his recompense goes before him.”
  '12':
  - type: text
    content: They will be called His Holy People,
  - type: text
    content: 'The Redeemed of '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: And you will be known as Those Whom God Loves,
  - type: note
    content: John identified himself as the one whom Jesus loved, and so can we. See John 13:23.
  - type: text
    content: A City Not Abandoned.
  '2':
  - type: text
    content: Nations will see your victory-vindication,
  - type: text
    content: 'and every king will witness your '
  - type: text
    content: blinding
  - type: text
    content: ' radiance!'
  - type: text
    content: You will be called by a brand-new name,
  - type: note
    content: A new name signifies a new nature, a new character, and a new authority. See Gen. 32:28; Rev. 2:17; 3:12.
  - type: text
    content: 'given to you from the mouth of '
  - type: text
    content: Yahweh
  - type: text
    content: ' himself.'
  '3':
  - type: text
    content: 'You will be a beautiful crown held '
  - type: text
    content: high
  - type: text
    content: ' in the hand of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: 'a royal crown '
  - type: note
    content: Or “diadem.”
  - type: text
    content: of splendor
  - type: text
    content: held in the open palm of your God!
  '4':
  - type: text
    content: You will never again be called the Abandoned One,
  - type: text
    content: nor will your land be called Deserted.
  - type: text
    content: But you will be called My Delight Is in You,
  - type: note
    content: Or “Hephzibah.” See 2 Kings 21:1.
  - type: text
    content: and your land My Beloved Wife,
  - type: note
    content: In an allegorical sense, Yahweh’s wife (Israel) foreshadows Christ’s relationship with his bride, the church (see 2 Cor. 11:2; Eph. 5:22–23; Rev. 19:7–9).
  - type: text
    content: 'for '
  - type: text
    content: Yahweh
  - type: text
    content: ' finds his delight in you'
  - type: text
    content: and he married your land.
  '5':
  - type: text
    content: 'As a young man marries the young woman '
  - type: text
    content: he loves
  - type: text
    content: ','
  - type: text
    content: 'so your builder-sons '
  - type: note
    content: Isaiah used a homonym that can mean “builders” or “sons.”
  - type: text
    content: will marry you.
  - type: text
    content: 'As the bridegroom finds joy in '
  - type: text
    content: his union with
  - type: text
    content: ' his bride,'
  - type: text
    content: 'so will your God take joy in '
  - type: text
    content: his union with
  - type: text
    content: ' you!'
  - type: heading
    content: Intercession
  '6':
  - type: text
    content: Jerusalem, I have stationed intercessors on your walls
  - type: text
    content: who will never be silent, day or night.
  - type: text
    content: 'You “reminders” '
  - type: note
    content: Or “rememberers”; that is, those who intercede continually to remind God of his promises. Like divine administrators, we remind God of the promises and appointments he must keep.
  - type: text
    content: 'of '
  - type: text
    content: Yahweh
  - type: text
    content: ', take no rest,'
  '7':
  - type: text
    content: 'and '
  - type: text
    content: tirelessly
  - type: text
    content: ' give God no rest,'
  - type: text
    content: until he firmly establishes Jerusalem
  - type: text
    content: and makes her the praise of all the earth!
  '8':
  - type: text
    content: Yahweh
  - type: text
    content: ' swears an oath by the authority of his right hand'
  - type: text
    content: 'and by his mighty arm:'
  - type: text
    content: “I will never again give your new grain as food for your enemies,
  - type: text
    content: nor will foreigners drink your new wine
  - type: text
    content: that you worked hard to produce.
  '9':
  - type: text
    content: Instead, you who harvest it will eat it
  - type: text
    content: 'and offer your praise to '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: and you who gather the grapes
  - type: text
    content: will drink the new wine in my holy courts.”
  - type: note
    content: The grain and the new wine can be symbols of the Word and the Spirit, respectively.
