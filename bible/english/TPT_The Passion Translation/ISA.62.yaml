document_id: ISA.62,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Delights in Zion
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For Zion’s sake, how can I keep silent?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For Jerusalem’s sake, how can I remain quiet?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: I will keep interceding
    - type: text
      text: ' until her righteousness'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: breaks forth like the blazing light of dawn
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and her salvation like a burning torch!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pass through, pass through the gates,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: and go from old to new
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prepare a new path for the people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Build! Build up a highway '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for them to come to me
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remove every hindrance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 62:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “stone.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and unfurl a banner for the nations!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'See? '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has proclaimed to the ends of the earth:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell my daughter, Zion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look, here comes your Deliverer!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See? He’s bringing his reward,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and his recompense goes before him.”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be called His Holy People,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Redeemed of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will be known as Those Whom God Loves,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 62:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: John identified himself as the one whom Jesus loved, and so can we. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 13:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A City Not Abandoned.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nations will see your victory-vindication,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and every king will witness your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: blinding
    - type: text
      text: ' radiance!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be called by a brand-new name,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 62:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A new name signifies a new nature, a new character, and a new authority. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 32:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 2:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'given to you from the mouth of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' himself.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You will be a beautiful crown held '
    - type: usfm
      marker: it
      children:
      - type: text
        text: high
    - type: text
      text: ' in the hand of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'a royal crown '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 62:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “diadem.”
      marker-yv: yv-n
    - type: text
      text: of splendor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: held in the open palm of your God!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will never again be called the Abandoned One,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor will your land be called Deserted.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you will be called My Delight Is in You,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 62:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Hephzibah.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 21:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and your land My Beloved Wife,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 62:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In an allegorical sense,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ’s wife (Israel) foreshadows Christ’s relationship with his bride, the church (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 5:22–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 19:7–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' finds his delight in you'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he married your land.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As a young man marries the young woman '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he loves
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'so your builder-sons '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 62:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah used a homonym that can mean “builders” or “sons.”
      marker-yv: yv-n
    - type: text
      text: will marry you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As the bridegroom finds joy in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his union with
    - type: text
      text: ' his bride,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'so will your God take joy in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his union with
    - type: text
      text: ' you!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intercession
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem, I have stationed intercessors on your walls
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who will never be silent, day or night.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You “reminders” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 62:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “rememberers”; that is, those who intercede continually to remind God of his promises. Like divine administrators, we remind God of the promises and appointments he must keep.
      marker-yv: yv-n
    - type: text
      text: 'of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', take no rest,'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tirelessly
    - type: text
      text: ' give God no rest,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until he firmly establishes Jerusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and makes her the praise of all the earth!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' swears an oath by the authority of his right hand'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and by his mighty arm:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will never again give your new grain as food for your enemies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor will foreigners drink your new wine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that you worked hard to produce.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead, you who harvest it will eat it
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and offer your praise to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you who gather the grapes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will drink the new wine in my holy courts.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 62:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The grain and the new wine can be symbols of the Word and the Spirit, respectively.
      marker-yv: yv-n
