document_id: HAG.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Future Glory of the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the second year of King Darius, the twenty-first day of the seventh month, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about October 17, 520 BC. This was the seventh or last day of the “Feast of Tabernacles” or “Feast of Booths” that began on the fifteenth day of the seventh month (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 23:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Because of the festival, Jerusalem would have been filled with worshipers.
    marker-yv: yv-n
  - type: text
    text: 'the word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' happened '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although most translations read “The Word of the Lord came,” the Hebrew is very dramatic. It is as if the prophet “experiences” the Word of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . It is a collision with the thoughts of God, a “Word event.”
    marker-yv: yv-n
  - type: text
    text: 'through the prophet Haggai as follows, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Go and give this urgent message to Zerubbabel son of Shealtiel, governor of Judah, and the high priest Joshua son of Jehozadak, and all the remnant of the people:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Did anyone from among you see the magnificent glory of the original temple? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This question implies that there were some people old enough to remember Solomon’s Temple, which had been destroyed sixty-six years earlier in 586 BC. This means that those who were over seventy years old would be able to remember it. Haggai may have been one who had seen the glory of Solomon’s Temple.
    marker-yv: yv-n
  - type: text
    text: And how does it look to you now? Does it not seem as nothing in your eyes?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' say to you, Zerubbabel, be courageous! Joshua, son of Jehozadak, high priest, be courageous! All you living in the land, take heart! Go to work, for I am with you, says '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', will keep the covenant that I made with you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the word I cut with you.” The Semitic contract (covenant) involved cutting an animal in two and walking between the halves together. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 15
      metadata:
        usfm: GEN.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: when you came out of Egypt. My Spirit is still present among you, so be fearless.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“For I declare to you: Very soon, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew phrase is literally “Yet once, it is little”; that is, “the action to follow is imminent.”
    marker-yv: yv-n
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, will once again shake the heavens and earth, the land and sea.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 12:26
      metadata:
        usfm: HEB.12.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, will shake every nation, and the treasures '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “desires.”
    marker-yv: yv-n
  - type: text
    text: of the nations will flow in, and I will fill this temple with glory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, declare to you, all the silver and gold is mine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, declare to you, the glory of this new temple will surpass the glory of the original, and I will grant peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and prosperity
  - type: text
    text: ' in this place.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shalom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can mean more than “peace”; it also includes the meanings of “well-being,” “health,” “strength,” and “prosperity.” This is the temple (later restored by Herod) that Christ taught in. The Greek Septuagint adds these words, “and peace of soul, to save all those who laid the foundations for the rebuilding of this temple.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: '“I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, have spoken.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Haggai Consults the Priests
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In the second year of Darius, on the twenty-fourth day of the ninth month, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about December 18, 520 BC.
    marker-yv: yv-n
  - type: text
    text: 'the word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' was spoken to the prophet Haggai as follows: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, say to you: ‘Ask the priests for their ruling on this: '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Ask the priests a Torah saying.” It was one of the duties of priests to give rulings about questions over ritual purity and about the law. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 17:8–12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'If someone holds consecrated meat from a sacrifice and carries it in the fold of his '
  - type: usfm
    marker: it
    children:
    - type: text
      text: priestly
  - type: text
    text: ' robe, could his robe then pass on holiness if it comes into contact with bread, stew, wine, olive oil, or any kind of food at all?’ ”'
- type: usfm
  marker: p
  children:
  - type: text
    text: “No,” the priests replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Haggai then said, “If anyone is ritually unclean by contact with a corpse '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 19:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: and touches any of these things, would it become unclean?”
- type: usfm
  marker: p
  children:
  - type: text
    text: The priests replied, “Yes, it is unclean.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Haggai said, “So it is the same with this people. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' declares: ‘The nation is unclean in my eyes. Everything they produce is unclean to me, and everything they offer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: at the altar
  - type: text
    text: ' is also unclean.’ ”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Promise of Blessing
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Now consider carefully your recent past '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “consider carefully from this day onward.” The Hebrew is literally “Now set your heart from this day and upward.”
    marker-yv: yv-n
  - type: text
    text: 'before you started rebuilding '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s temple. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Stop and remember
  - type: text
    text: ' what condition you were in. You would come expecting to scoop twenty measures of grain but find only ten. You would come expecting to draw fifty measures of wine from a vat but find only twenty. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I struck the produce of your labor by sending hail, hot desert winds to wither your grain, and damp winds to make it rot. Yet you still would not return to me '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew is literally “and there was not with you.” It could possibly mean that they did not bring God an offering of what they had.
    marker-yv: yv-n
  - type: text
    text: '—declares '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Today is the twenty-fourth day of the ninth month, the day the people resumed the building of my temple. So be intentional from today forward. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The seed is still in the storehouse, isn’t it? Until now, the grapevines, fig trees, pomegranate and olive trees have not produced a harvest, but from now on, I will certainly bless you, and your harvest will be plentiful.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Promise to Zerubbabel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'On that same day, the twenty-fourth day of the ninth month, the word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' happened a second time to Haggai, as follows: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“Tell these words to Zerubbabel governor of Judah: ‘I am going to shake the heavens and the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I will topple thrones and destroy the dynasties of foreign kingdoms. I will crash their chariots and their riders. Horses and their riders will die, for their riders will kill one another with the sword. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, declare, when that day comes, I will take you, my servant Zerubbabel son of Shealtiel, and make you like a signet ring. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, God will hold his people close to his heart. The signet ring is also a symbol of God’s authority (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 41:42
      metadata:
        usfm: GEN.41.42
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Est. 3:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 8:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: '10'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Historically, the signet ring was an important possession. It usually contained a small seal or the initial of the owner that would be impressed on wax for sealing important documents (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Kings 21:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The owner of the ring would jealously guard it by wearing it on a cord around his neck (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 38:18–19
      metadata:
        usfm: GEN.38.18+GEN.38.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) or on the finger (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 22:24
      metadata:
        usfm: JER.22.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Haggai was prophesying to Zerubbabel that the royal authority of the lineage of David would be restored to him.
    marker-yv: yv-n
  - type: text
    text: 'For I have chosen you to be mine. I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies have spoken.’ ”'
