document_id: HAG.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Future Glory of the Temple
  - type: text
    content: 'In the second year of King Darius, the twenty-first day of the seventh month, '
  - type: note
    content: That is, about October 17, 520 BC. This was the seventh or last day of the “Feast of Tabernacles” or “Feast of Booths” that began on the fifteenth day of the seventh month (see Lev. 23:34). Because of the festival, Jerusalem would have been filled with worshipers.
  - type: text
    content: 'the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ' happened '
  - type: note
    content: Although most translations read “The Word of the Lord came,” the Hebrew is very dramatic. It is as if the prophet “experiences” the Word of Yahweh. It is a collision with the thoughts of God, a “Word event.”
  - type: text
    content: 'through the prophet Haggai as follows, '
  '10':
  - type: text
    content: 'In the second year of Darius, on the twenty-fourth day of the ninth month, '
  - type: note
    content: That is, about December 18, 520 BC.
  - type: text
    content: 'the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ' was spoken to the prophet Haggai as follows: '
  '11':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, say to you: ‘Ask the priests for their ruling on this: '
  - type: note
    content: Or “Ask the priests a Torah saying.” It was one of the duties of priests to give rulings about questions over ritual purity and about the law. See Deut. 17:8–12.
  '12':
  - type: text
    content: 'If someone holds consecrated meat from a sacrifice and carries it in the fold of his '
  - type: text
    content: priestly
  - type: text
    content: ' robe, could his robe then pass on holiness if it comes into contact with bread, stew, wine, olive oil, or any kind of food at all?’ ”'
  - type: text
    content: “No,” the priests replied.
  '13':
  - type: text
    content: 'Haggai then said, “If anyone is ritually unclean by contact with a corpse '
  - type: note
    content: See Num. 19:13.
  - type: text
    content: and touches any of these things, would it become unclean?”
  - type: text
    content: The priests replied, “Yes, it is unclean.”
  '14':
  - type: text
    content: 'Then Haggai said, “So it is the same with this people. '
  - type: text
    content: Yahweh
  - type: text
    content: ' declares: ‘The nation is unclean in my eyes. Everything they produce is unclean to me, and everything they offer '
  - type: text
    content: at the altar
  - type: text
    content: ' is also unclean.’ ”'
  - type: heading
    content: God’s Promise of Blessing
  '15':
  - type: text
    content: '“Now consider carefully your recent past '
  - type: note
    content: Or “consider carefully from this day onward.” The Hebrew is literally “Now set your heart from this day and upward.”
  - type: text
    content: 'before you started rebuilding '
  - type: text
    content: Yahweh
  - type: text
    content: '’s temple. '
  '16':
  - type: text
    content: Stop and remember
  - type: text
    content: ' what condition you were in. You would come expecting to scoop twenty measures of grain but find only ten. You would come expecting to draw fifty measures of wine from a vat but find only twenty. '
  '17':
  - type: text
    content: 'I struck the produce of your labor by sending hail, hot desert winds to wither your grain, and damp winds to make it rot. Yet you still would not return to me '
  - type: note
    content: The Hebrew is literally “and there was not with you.” It could possibly mean that they did not bring God an offering of what they had.
  - type: text
    content: '—declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '18':
  - type: text
    content: '“Today is the twenty-fourth day of the ninth month, the day the people resumed the building of my temple. So be intentional from today forward. '
  '19':
  - type: text
    content: The seed is still in the storehouse, isn’t it? Until now, the grapevines, fig trees, pomegranate and olive trees have not produced a harvest, but from now on, I will certainly bless you, and your harvest will be plentiful.”
  - type: heading
    content: God’s Promise to Zerubbabel
  '2':
  - type: text
    content: '“Go and give this urgent message to Zerubbabel son of Shealtiel, governor of Judah, and the high priest Joshua son of Jehozadak, and all the remnant of the people:'
  '20':
  - type: text
    content: 'On that same day, the twenty-fourth day of the ninth month, the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ' happened a second time to Haggai, as follows: '
  '21':
  - type: text
    content: '“Tell these words to Zerubbabel governor of Judah: ‘I am going to shake the heavens and the earth. '
  '22':
  - type: text
    content: 'I will topple thrones and destroy the dynasties of foreign kingdoms. I will crash their chariots and their riders. Horses and their riders will die, for their riders will kill one another with the sword. '
  '23':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, declare, when that day comes, I will take you, my servant Zerubbabel son of Shealtiel, and make you like a signet ring. '
  - type: note
    content: That is, God will hold his people close to his heart. The signet ring is also a symbol of God’s authority (see Gen. 41:42; Est. 3:10; 8:2, 10). Historically, the signet ring was an important possession. It usually contained a small seal or the initial of the owner that would be impressed on wax for sealing important documents (see 1 Kings 21:8). The owner of the ring would jealously guard it by wearing it on a cord around his neck (see Gen. 38:18–19) or on the finger (see Jer. 22:24). Haggai was prophesying to Zerubbabel that the royal authority of the lineage of David would be restored to him.
  - type: text
    content: 'For I have chosen you to be mine. I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies have spoken.’ ”'
  '3':
  - type: text
    content: '“Did anyone from among you see the magnificent glory of the original temple? '
  - type: note
    content: This question implies that there were some people old enough to remember Solomon’s Temple, which had been destroyed sixty-six years earlier in 586 BC. This means that those who were over seventy years old would be able to remember it. Haggai may have been one who had seen the glory of Solomon’s Temple.
  - type: text
    content: And how does it look to you now? Does it not seem as nothing in your eyes?
  '4':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ' say to you, Zerubbabel, be courageous! Joshua, son of Jehozadak, high priest, be courageous! All you living in the land, take heart! Go to work, for I am with you, says '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies. '
  '5':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will keep the covenant that I made with you '
  - type: note
    content: Or “the word I cut with you.” The Semitic contract (covenant) involved cutting an animal in two and walking between the halves together. See Gen. 15.
  - type: text
    content: when you came out of Egypt. My Spirit is still present among you, so be fearless.
  '6':
  - type: text
    content: '“For I declare to you: Very soon, '
  - type: note
    content: The Hebrew phrase is literally “Yet once, it is little”; that is, “the action to follow is imminent.”
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, will once again shake the heavens and earth, the land and sea.'
  - type: note
    content: See Heb. 12:26.
  '7':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, will shake every nation, and the treasures '
  - type: note
    content: Or “desires.”
  - type: text
    content: of the nations will flow in, and I will fill this temple with glory.
  '8':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, declare to you, all the silver and gold is mine.'
  '9':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, declare to you, the glory of this new temple will surpass the glory of the original, and I will grant peace '
  - type: text
    content: and prosperity
  - type: text
    content: ' in this place.'
  - type: note
    content: The Hebrew word shalom can mean more than “peace”; it also includes the meanings of “well-being,” “health,” “strength,” and “prosperity.” This is the temple (later restored by Herod) that Christ taught in. The Greek Septuagint adds these words, “and peace of soul, to save all those who laid the foundations for the rebuilding of this temple.”
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, have spoken.”'
  - type: heading
    content: Haggai Consults the Priests
