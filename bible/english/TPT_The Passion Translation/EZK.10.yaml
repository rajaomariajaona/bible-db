document_id: EZK.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Glory Leaves the Temple
  - type: text
    content: 'Then I saw '
  - type: text
    content: a vision
  - type: text
    content: '. On top of the dome over the heads of the cherubim, I saw something that looked like a sapphire throne. '
  '10':
  - type: text
    content: 'Each wheel appeared to be '
  - type: note
    content: The Hebrew text indicates that there was an apparent similarity between the wheels (with each having another wheel inside it). This lack of precise language in the description of the elements of prophetic visions is a common feature of the book of Ezekiel.
  - type: text
    content: identical with another wheel inside it.
  '11':
  - type: text
    content: 'As the wheels moved, they would go in any one of the four directions the living creatures faced, without having to turn around. They went in whatever direction their head faced without turning as they went. '
  '12':
  - type: text
    content: 'Their entire bodies, their backs, their hands, their wings—along with all four of their wheels—were covered with eyes all around. '
  '13':
  - type: text
    content: 'I heard a voice refer to the wheels as “whirling wheels.” '
  '14':
  - type: text
    content: 'Each living creature had four faces; the first was a cherub’s face, the second a human face, the third a lion’s face, and the fourth an eagle’s face. '
  '15':
  - type: text
    content: 'Then the cherubim rose to the sky. They were the same living creatures I had seen by the River Chebar. '
  '16':
  - type: text
    content: 'When the living creatures moved '
  - type: text
    content: as a group in any direction
  - type: text
    content: ', the wheels followed them, and when the living creatures levitated off the ground by spreading their wings, the wheels did not leave their place beside them. '
  '17':
  - type: text
    content: When the living creatures stopped, the wheels stopped; when the former rose, the wheels rose with them, since they shared the same living Spirit.
  - type: note
    content: The living creatures went before the chariot of God’s presence along with a windstorm, clouds, and fire (see Ezek. 1:5–28). The creatures were not yoked to God’s chariot but went before it as the Spirit of God moved them. Ezekiel saw God’s chariot-throne.
  '18':
  - type: text
    content: 'Then the dazzling glory of '
  - type: text
    content: Yahweh
  - type: text
    content: ' departed from the entrance of the temple and hovered over the living creatures. '
  '19':
  - type: text
    content: 'They spread their wings, and before my eyes, I saw them levitate from the ground, with the wheels '
  - type: text
    content: spinning
  - type: text
    content: ' beside them. Then they paused at the entrance to the eastern gate of '
  - type: text
    content: Yahweh
  - type: text
    content: '’s temple, with the dazzling glory of the God of Israel shining over them. '
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ' said to the man dressed in '
  - type: text
    content: white
  - type: text
    content: ' linen, “Go among the whirling wheels below the cherubim and take a handful of burning coals from between the living creatures and scatter them over the city.” '
  - type: note
    content: See Pss. 11:6; 140:10–11; Rev. 8:3–5. Spreading the burning coals around the city of Jerusalem was a prophetic act that prophesied the eventual burning and destruction of the city.
  - type: text
    content: 'While I was watching, he went in '
  - type: text
    content: among the whirling wheels
  - type: text
    content: .
  '20':
  - type: text
    content: 'These were the same living creatures I had seen beneath the '
  - type: text
    content: throne of the
  - type: text
    content: ' God of Israel by the River Chebar; I knew that they were cherubim. '
  '21':
  - type: text
    content: 'Each had four faces, '
  - type: note
    content: The word “four” (’arba‘ah) is written twice—an instance of dittography.
  - type: text
    content: 'four wings, and what appeared to be human hands under their wings. '
  '22':
  - type: text
    content: Each one moved straight ahead. Their faces were identical to those I had seen by the River Chebar.
  '3':
  - type: text
    content: 'The cherubim were on the south side of the temple as the man went in, and the '
  - type: text
    content: billowing glory
  - type: text
    content: ' cloud filled the inner courtyard. '
  - type: note
    content: See Ex. 19:9; 24:15–18; Num. 9:19; 12:10; 1 Kings 8:10; 2 Chron. 5:12–14.
  '4':
  - type: text
    content: 'The dazzling glory of '
  - type: text
    content: Yahweh
  - type: text
    content: ' rose from between the cherubim and rested over the entrance of the temple. The temple was filled with the cloud, and the court was full of the radiance of the glory of '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'The noise of the living creatures’ wings was as loud as the voice of God Almighty! '
  - type: note
    content: Or “El Shaddai.”
  - type: text
    content: The people could even hear it in the outer courtyard!
  '6':
  - type: text
    content: 'Afterward, '
  - type: text
    content: Yahweh
  - type: text
    content: ' commanded the man dressed in white linen to go among the wheels and take fire that was burning among the cherubim. So, the man went among them and stood beside one of the wheels. '
  '7':
  - type: text
    content: One of the living creatures then reached his hand into the fire between the cherubim and took some fire and placed it into the hands of the man dressed in white linen, who took it and left.
  '8':
  - type: text
    content: 'It seemed that the living creatures had what looked like a human hand under their wings. '
  '9':
  - type: text
    content: 'I saw the four wheels by the living creatures, one wheel beside each living creature. And the wheels sparkled like precious gemstones. '
  - type: note
    content: Or “beryl.”
