    children:
    - type: text
      text: '4'
  - type: text
    text: 'The dazzling glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' rose from between the cherubim and rested over the entrance of the temple. The temple was filled with the cloud, and the court was full of the radiance of the glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The noise of the living creatures’ wings was as loud as the voice of God Almighty! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “El Shaddai.”
    marker-yv: yv-n
  - type: text
    text: The people could even hear it in the outer courtyard!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Afterward, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' commanded the man dressed in white linen to go among the wheels and take fire that was burning among the cherubim. So, the man went among them and stood beside one of the wheels. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: One of the living creatures then reached his hand into the fire between the cherubim and took some fire and placed it into the hands of the man dressed in white linen, who took it and left.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'It seemed that the living creatures had what looked like a human hand under their wings. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I saw the four wheels by the living creatures, one wheel beside each living creature. And the wheels sparkled like precious gemstones. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “beryl.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Each wheel appeared to be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text indicates that there was an
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: apparent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarity between the wheels (with each having another wheel inside it). This lack of precise language in the description of the elements of prophetic visions is a common feature of the book of Ezekiel.
    marker-yv: yv-n
  - type: text
    text: identical with another wheel inside it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'As the wheels moved, they would go in any one of the four directions the living creatures faced, without having to turn around. They went in whatever direction their head faced without turning as they went. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Their entire bodies, their backs, their hands, their wings—along with all four of their wheels—were covered with eyes all around. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I heard a voice refer to the wheels as “whirling wheels.” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Each living creature had four faces; the first was a cherub’s face, the second a human face, the third a lion’s face, and the fourth an eagle’s face. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the cherubim rose to the sky. They were the same living creatures I had seen by the River Chebar. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When the living creatures moved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as a group in any direction
  - type: text
    text: ', the wheels followed them, and when the living creatures levitated off the ground by spreading their wings, the wheels did not leave their place beside them. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: When the living creatures stopped, the wheels stopped; when the former rose, the wheels rose with them, since they shared the same living Spirit.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The living creatures went before the chariot of God’s presence along with a windstorm, clouds, and fire (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 1:5–28
      metadata:
        usfm: EZK.1.5+EZK.1.6+EZK.1.7+EZK.1.8+EZK.1.9+EZK.1.10+EZK.1.11+EZK.1.12+EZK.1.13+EZK.1.14+EZK.1.15+EZK.1.16+EZK.1.17+EZK.1.18+EZK.1.19+EZK.1.20+EZK.1.21+EZK.1.22+EZK.1.23+EZK.1.24+EZK.1.25+EZK.1.26+EZK.1.27+EZK.1.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The creatures were not yoked to God’s chariot but went before it as the Spirit of God moved them. Ezekiel saw God’s chariot-throne.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the dazzling glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' departed from the entrance of the temple and hovered over the living creatures. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They spread their wings, and before my eyes, I saw them levitate from the ground, with the wheels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: spinning
  - type: text
    text: ' beside them. Then they paused at the entrance to the eastern gate of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s temple, with the dazzling glory of the God of Israel shining over them. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'These were the same living creatures I had seen beneath the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: throne of the
  - type: text
    text: ' God of Israel by the River Chebar; I knew that they were cherubim. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Each had four faces, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word “four” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: ’arba‘ah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) is written twice—an instance of dittography.
    marker-yv: yv-n
  - type: text
    text: 'four wings, and what appeared to be human hands under their wings. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Each one moved straight ahead. Their faces were identical to those I had seen by the River Chebar.
