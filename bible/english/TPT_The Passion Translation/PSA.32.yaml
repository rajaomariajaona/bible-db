document_id: PSA.32,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Forgiven
  - type: text
    content: A poem of insight and instruction by King David
  - type: note
    content: David wrote this psalm after he seduced the wife of his most loyal soldier, then had him killed to try to keep her pregnancy a secret. This sin with Bathsheba brought great disgrace to David, yet he found complete forgiveness in God’s mercy. The apostle Paul chose the first two verses of Ps. 32 to support the important doctrine of salvation by grace through faith. See Rom. 4:5–8. This was Augustine’s favorite psalm. He had it written on the wall near his bed before he died so he could meditate on it.
  - type: text
    content: What bliss belongs to the one
  - type: text
    content: whose rebellion has been forgiven,
  - type: note
    content: The Hebrew word for “forgiven” means “lifted off.” Sin’s guilt is a burden that must be lifted off our souls. The Septuagint reads “because they have not hidden their sins.”
  - type: text
    content: 'those whose sins are covered '
  - type: text
    content: by blood
  - type: text
    content: .
  '10':
  - type: text
    content: 'So my conclusion is this:'
  - type: text
    content: Many are the sorrows and frustrations
  - type: text
    content: of those who don’t come clean with God.
  - type: text
    content: But when you trust in the Lord for forgiveness,
  - type: text
    content: his wraparound love will surround you.
  '11':
  - type: text
    content: So celebrate the goodness of God!
  - type: text
    content: He shows this kindness to everyone who is his.
  - type: text
    content: Go ahead—shout for joy,
  - type: text
    content: all you upright ones who want to please him!
  '2':
  - type: text
    content: What bliss belongs to those
  - type: text
    content: 'who have confessed their corruption '
  - type: note
    content: 'David used three Hebrew words to describe sin in these first two verses: “rebellion,” “sins” (failures, falling short), and “corruption” (crookedness, the twisting of right standards).'
  - type: text
    content: to God!
  - type: text
    content: For he wipes their slates clean
  - type: text
    content: and removes hypocrisy from their hearts.
  '3':
  - type: text
    content: Before I confessed my sins, I kept it all inside;
  - type: text
    content: my dishonesty devastated my inner life,
  - type: text
    content: causing my life to be filled with frustration,
  - type: text
    content: irrepressible anguish, and misery.
  '4':
  - type: text
    content: The pain never let up, for your hand of conviction
  - type: text
    content: was heavy on my heart.
  - type: text
    content: My strength was sapped, my inner life dried up
  - type: text
    content: like a spiritual drought within my soul.
  - type: text
    content: Pause in his presence
  '5':
  - type: text
    content: Then I finally admitted to you all my sins,
  - type: text
    content: refusing to hide them any longer.
  - type: text
    content: I said, “My life-giving God,
  - type: text
    content: I will openly acknowledge my evil actions.”
  - type: text
    content: And you forgave me!
  - type: text
    content: All at once the guilt of my sin washed away
  - type: text
    content: and all my pain disappeared!
  - type: text
    content: Pause in his presence
  '6':
  - type: text
    content: 'This is what I’ve learned through it all:'
  - type: text
    content: All believers should confess their sins to God;
  - type: text
    content: do it every time God has uncovered you
  - type: text
    content: in the time of exposing.
  - type: text
    content: For if you do this, when sudden storms of life overwhelm,
  - type: text
    content: you’ll be kept safe.
  '7':
  - type: text
    content: Lord, you are my secret hiding place,
  - type: text
    content: protecting me from these troubles,
  - type: text
    content: surrounding me with songs of gladness!
  - type: text
    content: Your joyous shouts of rescue release my breakthrough.
  - type: text
    content: Pause in his presence
  '8':
  - type: text
    content: I hear the Lord saying, “I will stay close to you,
  - type: text
    content: instructing and guiding you along the pathway for your life.
  - type: text
    content: I will advise you along the way
  - type: text
    content: and lead you forth with my eyes as your guide.
  - type: text
    content: So don’t make it difficult; don’t be stubborn
  - type: text
    content: when I take you where you’ve not been before.
  - type: text
    content: Don’t make me tug you and pull you along.
  - type: text
    content: Just come with me!”
