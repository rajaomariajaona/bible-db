document_id: PSA.32,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Forgiven
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A poem of insight and instruction by King David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: David wrote this psalm after he seduced the wife of his most loyal soldier, then had him killed to try to keep her pregnancy a secret. This sin with Bathsheba brought great disgrace to David, yet he found complete forgiveness in God’s mercy. The apostle Paul chose the first two verses of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: to support the important doctrine of salvation by grace through faith. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 4:5–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This was Augustine’s favorite psalm. He had it written on the wall near his bed before he died so he could meditate on it.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What bliss belongs to the one
  - type: usfm
    marker: q1
    children:
    - type: text
      text: whose rebellion has been forgiven,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 32:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “forgiven” means “lifted off.” Sin’s guilt is a burden that must be lifted off our souls. The Septuagint reads “because they have not hidden their sins.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'those whose sins are covered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by blood
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So my conclusion is this:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many are the sorrows and frustrations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of those who don’t come clean with God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when you trust in the Lord for forgiveness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: his wraparound love will surround you.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So celebrate the goodness of God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shows this kindness to everyone who is his.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go ahead—shout for joy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all you upright ones who want to please him!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What bliss belongs to those
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'who have confessed their corruption '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 32:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'David used three Hebrew words to describe sin in these first two verses: “rebellion,” “sins” (failures, falling short), and “corruption” (crookedness, the twisting of right standards).'
      marker-yv: yv-n
    - type: text
      text: to God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he wipes their slates clean
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and removes hypocrisy from their hearts.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before I confessed my sins, I kept it all inside;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my dishonesty devastated my inner life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: causing my life to be filled with frustration,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: irrepressible anguish, and misery.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The pain never let up, for your hand of conviction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: was heavy on my heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My strength was sapped, my inner life dried up
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a spiritual drought within my soul.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I finally admitted to you all my sins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: refusing to hide them any longer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I said, “My life-giving God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will openly acknowledge my evil actions.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you forgave me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All at once the guilt of my sin washed away
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all my pain disappeared!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what I’ve learned through it all:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All believers should confess their sins to God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: do it every time God has uncovered you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the time of exposing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For if you do this, when sudden storms of life overwhelm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you’ll be kept safe.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, you are my secret hiding place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: protecting me from these troubles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: surrounding me with songs of gladness!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your joyous shouts of rescue release my breakthrough.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hear the Lord saying, “I will stay close to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: instructing and guiding you along the pathway for your life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will advise you along the way
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and lead you forth with my eyes as your guide.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So don’t make it difficult; don’t be stubborn
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I take you where you’ve not been before.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t make me tug you and pull you along.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just come with me!”
