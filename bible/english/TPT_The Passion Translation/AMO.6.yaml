document_id: AMO.6,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Party Is Over
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Woe to you living so comfortably in Zion!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to you who live with a false sense of security on Mount Samaria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the elite of this foremost nation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on whom Israel’s people pin their hopes.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: If a relative who is to light a memorial fire for the dead
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comes to carry the bodies out of the house for burial
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and asks, “Is anyone else inside the house with you?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and that person answers, “No,” then the one who asked will say, “Quiet!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We must not mention the name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s Punishment
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Behold, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' strikes with his command:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Houses large and small will be smashed to pieces!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The great house shall be struck down into fragments, and the little house into bits.” The Jewish Targum regards the “great house” as the kingdom of Israel and the “little house” as the kingdom of Judah.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Can horses gallop over rocky cliffs?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can boulder-strewn hills be plowed with oxen?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Of course not!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet you have managed to pervert justice into poison
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sweet
    - type: text
      text: ' fruits of righteousness into bitter fruit.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “into wormwood.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'You rejoice over '
    - type: usfm
      marker: it
      children:
      - type: text
        text: conquering the city of
    - type: text
      text: ' Lo Debar,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saying, “Wasn’t it by our own strength
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that we captured Karnaim for ourselves?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The biting sarcasm of this verse is apparent in the Hebrew, which can be translated, “You rejoice over a no-thing [
      - type: usfm
        marker: it
        children:
        - type: text
          text: loʾ dabar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '] and say, ‘By our own strength we captured horns [Hb.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: qarnayim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; horns are a symbol of strength].’ ”
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: But look, house of Israel,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', God of Angel Armies, declares to you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I will raise up a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mighty
    - type: text
      text: ' nation to come against you,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Assyria.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and they will oppress you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and overrun your land
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the northern to the southern borders of your kingdom.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “from Lebo Hamath [Israel’s northern border] to the brook of the Arabah [Israel’s southern border near the Dead Sea].”
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Travel to the city of Calneh
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Calneh was a city founded by Nimrod.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and see for yourself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what happened
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then go on from there to Hamath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: capital city of the Hittites
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make your way down to Gath in Philistia,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: and ask yourself
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are you better than these kingdoms?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is their territory larger than yours?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Is your territory larger than theirs?”
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You refuse to consider the day when disaster will come,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet all your evil only brings that day closer.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you bring near a seat [throne] of violence,” which could mean something like “you are bringing nearer the time when violent men will reign.”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Lying on luxurious beds inlaid with ivory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and sprawled out on your couches,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The custom of eating while lying down on couches is mentioned here for the first time. By the time of the New Testament, it had become a more general custom. Jewish commentators view “sprawled out on your couches” as a euphemism for lewd behavior and revelry (see Rashi, Malbim).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you feast on lambs from the flock
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and stall-fattened veal.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'You compose songs '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “invent musical instruments.” The Hebrew is ambiguous.
      marker-yv: yv-n
    - type: text
      text: like David
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and strum away on your harps.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You guzzle wine by the bucketful,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and slather yourselves with the finest lotions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet you do not grieve '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew root word for “grieve” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: chalah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which is “to be sick.” They were not heartsick about or grieved over the collapse of their kingdom.'
      marker-yv: yv-n
    - type: text
      text: over
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israel’s impending doom.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “over the ruin of Joseph,” a figure of speech for the kingdom of Israel. Despite the impending disaster, the self-centered, self-indulgent leaders remained unconcerned about the invasion soon to come upon their land.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: That is why they will be the first
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to go into captivity.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their lying around while enjoying the good life
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will come to an end.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Hates Pride
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has sworn by his own being '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 22:16–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 6:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', God of Angel Armies, declares:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I hate the pride of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the people of
    - type: text
      text: ' Jacob,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I despise their strongholds,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “palaces.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will hand over their capital city '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the city of Samaria.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: to their enemies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and everything in it.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Even if there are ten hiding in a house,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will all die.
