document_id: AMO.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Party Is Over
  - type: text
    content: Woe to you living so comfortably in Zion!
  - type: text
    content: Woe to you who live with a false sense of security on Mount Samaria,
  - type: text
    content: the elite of this foremost nation,
  - type: text
    content: on whom Israel’s people pin their hopes.
  '10':
  - type: text
    content: If a relative who is to light a memorial fire for the dead
  - type: text
    content: comes to carry the bodies out of the house for burial
  - type: text
    content: and asks, “Is anyone else inside the house with you?”
  - type: text
    content: and that person answers, “No,” then the one who asked will say, “Quiet!
  - type: text
    content: 'We must not mention the name of '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  - type: heading
    content: Yahweh’s Punishment
  '11':
  - type: text
    content: 'Behold, '
  - type: text
    content: Yahweh
  - type: text
    content: ' strikes with his command:'
  - type: text
    content: “Houses large and small will be smashed to pieces!”
  - type: note
    content: Or “The great house shall be struck down into fragments, and the little house into bits.” The Jewish Targum regards the “great house” as the kingdom of Israel and the “little house” as the kingdom of Judah.
  '12':
  - type: text
    content: Can horses gallop over rocky cliffs?
  - type: text
    content: Can boulder-strewn hills be plowed with oxen?
  - type: text
    content: Of course not!
  - type: text
    content: Yet you have managed to pervert justice into poison
  - type: text
    content: 'and the '
  - type: text
    content: sweet
  - type: text
    content: ' fruits of righteousness into bitter fruit.'
  - type: note
    content: Or “into wormwood.”
  '13':
  - type: text
    content: 'You rejoice over '
  - type: text
    content: conquering the city of
  - type: text
    content: ' Lo Debar,'
  - type: text
    content: saying, “Wasn’t it by our own strength
  - type: text
    content: that we captured Karnaim for ourselves?”
  - type: note
    content: The biting sarcasm of this verse is apparent in the Hebrew, which can be translated, “You rejoice over a no-thing [loʾ dabar] and say, ‘By our own strength we captured horns [Hb. qarnayim; horns are a symbol of strength].’ ”
  '14':
  - type: text
    content: But look, house of Israel,
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Angel Armies, declares to you:'
  - type: text
    content: '“I will raise up a '
  - type: text
    content: mighty
  - type: text
    content: ' nation to come against you,'
  - type: note
    content: That is, Assyria.
  - type: text
    content: 'and they will oppress you '
  - type: text
    content: and overrun your land
  - type: text
    content: from the northern to the southern borders of your kingdom.”
  - type: note
    content: Or “from Lebo Hamath [Israel’s northern border] to the brook of the Arabah [Israel’s southern border near the Dead Sea].”
  '2':
  - type: text
    content: Travel to the city of Calneh
  - type: note
    content: Calneh was a city founded by Nimrod.
  - type: text
    content: 'and see for yourself '
  - type: text
    content: what happened
  - type: text
    content: .
  - type: text
    content: Then go on from there to Hamath,
  - type: text
    content: 'the great '
  - type: text
    content: capital city of the Hittites
  - type: text
    content: .
  - type: text
    content: Make your way down to Gath in Philistia,
  - type: text
    content: and ask yourself
  - type: text
    content: —
  - type: text
    content: are you better than these kingdoms?
  - type: text
    content: Is their territory larger than yours?
  - type: note
    content: Or “Is your territory larger than theirs?”
  '3':
  - type: text
    content: You refuse to consider the day when disaster will come,
  - type: text
    content: yet all your evil only brings that day closer.
  - type: note
    content: Or “you bring near a seat [throne] of violence,” which could mean something like “you are bringing nearer the time when violent men will reign.”
  '4':
  - type: text
    content: Lying on luxurious beds inlaid with ivory
  - type: text
    content: and sprawled out on your couches,
  - type: note
    content: The custom of eating while lying down on couches is mentioned here for the first time. By the time of the New Testament, it had become a more general custom. Jewish commentators view “sprawled out on your couches” as a euphemism for lewd behavior and revelry (see Rashi, Malbim).
  - type: text
    content: you feast on lambs from the flock
  - type: text
    content: and stall-fattened veal.
  '5':
  - type: text
    content: 'You compose songs '
  - type: note
    content: Or “invent musical instruments.” The Hebrew is ambiguous.
  - type: text
    content: like David
  - type: text
    content: and strum away on your harps.
  '6':
  - type: text
    content: You guzzle wine by the bucketful,
  - type: text
    content: and slather yourselves with the finest lotions.
  - type: text
    content: 'Yet you do not grieve '
  - type: note
    content: The Hebrew root word for “grieve” is chalah, which is “to be sick.” They were not heartsick about or grieved over the collapse of their kingdom.
  - type: text
    content: over
  - type: text
    content: Israel’s impending doom.
  - type: note
    content: Or “over the ruin of Joseph,” a figure of speech for the kingdom of Israel. Despite the impending disaster, the self-centered, self-indulgent leaders remained unconcerned about the invasion soon to come upon their land.
  '7':
  - type: text
    content: That is why they will be the first
  - type: text
    content: to go into captivity.
  - type: text
    content: Their lying around while enjoying the good life
  - type: text
    content: will come to an end.
  - type: heading
    content: God Hates Pride
  '8':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has sworn by his own being '
  - type: note
    content: See Gen. 22:16–17; Heb. 6:13.
  - type: text
    content: —
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Angel Armies, declares:'
  - type: text
    content: '“I hate the pride of '
  - type: text
    content: the people of
  - type: text
    content: ' Jacob,'
  - type: text
    content: and I despise their strongholds,
  - type: note
    content: Or “palaces.”
  - type: text
    content: 'I will hand over their capital city '
  - type: note
    content: That is, the city of Samaria.
  - type: text
    content: to their enemies
  - type: text
    content: and everything in it.”
  '9':
  - type: text
    content: Even if there are ten hiding in a house,
  - type: text
    content: they will all die.
