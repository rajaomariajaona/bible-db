document_id: LUK.16,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Dishonest Manager
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jesus taught his disciples using this story:'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Once a very rich man hired a manager to run his business and oversee all his wealth. But soon a rumor spread that the manager was wasting his master’s money.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The one who faithfully manages the little he has been given will be promoted and trusted with greater responsibilities. But those who cheat with the little they have been given will not be considered trustworthy to receive more.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If you have not handled the riches of this world with integrity, why should you be trusted with the eternal treasures of the spiritual world?
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if you’ve not proven yourself faithful with what belongs to another, why should you be given wealth of your own?
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It is impossible for a person to serve two masters at the same time. You will be forced to love one and reject the other. One master will be despised and the other will have your loyal devotion. Your choice between God and the wealth of this world
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word used here is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Mammon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which is money personified as a god and worshiped.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: is no different. You must enthusiastically love one and definitively reject the other.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now, the Jewish religious leaders listening to Jesus were lovers of money. They laughed at what he said and mocked his teachings, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'so Jesus addressed them directly. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You always want to look spiritual in the eyes of others, but you have forgotten the eyes of God, which see what is inside you. The very things that you approve of and applaud are the things God despises.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The law of Moses and the revelation of the prophets have prepared you for the arrival of the kingdom announced by John. Since that time, the wonderful news of God’s kingdom is being preached, and people’s hearts burn with extreme passion to receive it.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Heaven and earth will disintegrate before even the smallest detail of the Law will fail or lose its power.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It is wrong for you to divorce
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “dismiss,” or “send away.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: your wife so that you can marry another—that is adultery. And when you take that one you lusted after as your wife, and contribute to the breakup of her marriage, you commit adultery again.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Rich Man and Lazarus
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Jesus continued. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “There once was a very rich man who had the finest things imaginable,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text is literally “He was dressed in a purple robe.” This is a figure of speech that refers to the luxury that surrounded him. This was the kind of robe worn only by kings.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: living every day enjoying his life of opulent luxury.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So the master called him in and said, ‘Is it true that you are mismanaging my estate? You need to provide me with a complete audit of everything you oversee for me. I’ve decided to dismiss you.’
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Outside the gate of his mansion
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: was a poor beggar named Lazarus.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:20–21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Lazarus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a form of the name Eleazar and means “God helps.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He lay there every day, covered with boils, and all the neighborhood dogs would come and lick his open sores. The only food he had to eat was the garbage that the rich man threw away.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “One day poor Lazarus died, and the angels of God came and escorted his spirit into paradise.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text is literally “Abraham’s bosom,” which is a metaphor for paradise.
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The day came that the rich man also died. In hell he looked up from his torment and saw Abraham in the distance, and Lazarus was standing beside him in the glory.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The rich man shouted, ‘Father Abraham! Father Abraham! Have mercy on me. Send Lazarus to dip his finger in water and come to cool my tongue, for I am in agony in these flames of fire!’
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But Abraham responded, ‘My friend, don’t you remember? While you were alive, you had all you desired. You surrounded yourself in luxury, while Lazarus had nothing. Now Lazarus dwells in the comforts of paradise and you are in agony.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Besides, between us is a huge chasm that cannot be bridged, nor can anyone cross from one realm to the other, even if he wanted.’
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The rich man continued, ‘Then let me ask you, Father Abraham, please send Lazarus to my relatives.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tell him to witness to my five brothers and warn them not to end up where I am in this place of torment.’
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Abraham replied, ‘They’ve already had plenty of warning. They have the teachings of Moses and the
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: revelation of the
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: prophets; let them hear them.’
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The manager thought, ‘Now what am I going to do? I’m finished here. I can’t hide what I’ve done,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The manager’s words include an ancient Aramaic figure of speech, “I can’t dig,” which means it can’t be buried or hidden.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and I’m too proud to beg.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “ ‘What if they’re not listening?’ the rich man added. ‘If someone from the dead were to go and warn them, they would surely repent.’
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Abraham said to him, ‘If they wouldn’t listen to Moses and the prophets, neither would they be convinced if someone
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Translated from the Aramaic. Jesus is that “someone” who rose from the grave, yet many still will not listen and believe.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: were raised from the dead!’ ”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have an idea that will secure my future. It will win me favor and secure friends who can take care of me and help me when I get fired!’
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So the dishonest manager hatched his scheme. He went to everyone who owed his master money, one by one, and asked them, ‘How much do you owe my master?’
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: usfm
      marker: wj
      children:
      - type: text
        text: One debtor owed twenty thousand dollars, so he said to him, ‘Let me see your bill. Pay me now and we’ll settle for twenty percent less.’ The clever manager scratched out the original amount owed and reduced it by twenty percent. And to another who owed two hundred thousand dollars, he said, ‘Pay me now and we’ll reduce your bill by fifty percent.’ And the clever manager scratched out the original amount owed and reduced it by half.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Even though his master was defrauded, when he found out about the shrewd way this manager had feathered his own nest, he congratulated the clever scoundrel for what he’d done to provide for his future.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus continued, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Remember this: The sons of darkness interact more wisely than the sons of'
    - type: text
      text: ' light. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Use the wealth of this world to demonstrate your friendship with God by winning friends and blessing others. Then, when it runs out, your generosity will provide you with an eternal reward.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you will be welcomed to the tents of eternity.”
      marker-yv: yv-n
