document_id: PSA.47,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The King over All the Earth
  - type: text
    content: For the Pure and Shining One by the prophetic singers of Korah’s clan
  - type: text
    content: A poetic song
  - type: text
    content: Go ahead and celebrate!
  - type: text
    content: Come on and clap your hands, everyone!
  - type: text
    content: Shout to God with the raucous sounds of joy!
  '2':
  - type: text
    content: The Lord God Most High is astonishing, awesome beyond words!
  - type: text
    content: He’s the formidable and powerful King over all the earth.
  '3':
  - type: text
    content: He’s the one who conquered the nations before us
  - type: text
    content: and placed them all under our feet.
  '4':
  - type: text
    content: He’s marked out our inheritance ahead of time,
  - type: text
    content: putting us in the front of the line, honoring Jacob, the one he loves.
  - type: note
    content: Or “the pride of Jacob.” The Septuagint reads “the beauty of Jacob.”
  - type: text
    content: Pause in his presence
  '5':
  - type: text
    content: God arises with the earsplitting shout of his people!
  - type: text
    content: God goes up with a trumpet blast!
  '6':
  - type: text
    content: Sing and celebrate! Sing some more, celebrate some more!
  - type: text
    content: Sing your highest song of praise to our King!
  '7':
  - type: text
    content: For God is the triumphant King; all the powers of the earth are his.
  - type: text
    content: So sing your celebration songs of highest praise
  - type: text
    content: to the glorious Enlightened One!
  '8':
  - type: text
    content: Our God reigns over every nation.
  - type: text
    content: He reigns on his holy throne over all.
  '9':
  - type: text
    content: All the nobles and princes,
  - type: text
    content: the loving servants of the God of Abraham,
  - type: text
    content: they all gather to worship.
  - type: text
    content: Every warrior’s shield is now lowered
  - type: text
    content: as surrendered trophies before this King.
  - type: text
    content: He has taken his throne, high and lofty, exalted over all!
