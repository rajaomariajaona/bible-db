document_id: PSA.47
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: The King over All the Earth
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One by the prophetic singers of Korah’s clan
- type: usfm
  marker: d
  children:
  - type: text
    text: A poetic song
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Go ahead and celebrate!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come on and clap your hands, everyone!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shout to God with the raucous sounds of joy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The Lord God Most High is astonishing, awesome beyond words!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’s the formidable and powerful King over all the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He’s the one who conquered the nations before us
- type: usfm
  marker: q1
  children:
  - type: text
    text: and placed them all under our feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He’s marked out our inheritance ahead of time,
- type: usfm
  marker: q1
  children:
  - type: text
    text: putting us in the front of the line, honoring Jacob, the one he loves.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 47:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the pride of Jacob.” The Septuagint reads “the beauty of Jacob.”
    marker-yv: yv-n
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: God arises with the earsplitting shout of his people!
- type: usfm
  marker: q1
  children:
  - type: text
    text: God goes up with a trumpet blast!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sing and celebrate! Sing some more, celebrate some more!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sing your highest song of praise to our King!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For God is the triumphant King; all the powers of the earth are his.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So sing your celebration songs of highest praise
- type: usfm
  marker: q1
  children:
  - type: text
    text: to the glorious Enlightened One!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Our God reigns over every nation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He reigns on his holy throne over all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All the nobles and princes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the loving servants of the God of Abraham,
- type: usfm
  marker: q1
  children:
  - type: text
    text: they all gather to worship.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every warrior’s shield is now lowered
- type: usfm
  marker: q1
  children:
  - type: text
    text: as surrendered trophies before this King.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has taken his throne, high and lofty, exalted over all!
