document_id: HEB.8,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Our Better Covenant
  - type: text
    content: 'Now this is the crowning point of what we are saying: We have a magnificent King-Priest who ministers for us at the right hand of God. He is enthroned with honor next to the throne of the Majesty on high. '
  '10':
  - type: text
    content: 'For here is the covenant I will one day establish with the people of Israel:'
  - type: text
    content: I will embed my laws within their thoughts
  - type: text
    content: and fasten them onto their hearts.
  - type: text
    content: I will be their loyal God and they will be my loyal people.
  '11':
  - type: text
    content: And the result of this will be
  - type: text
    content: that everyone will know me as Lord!
  - type: text
    content: There will be no need at all to teach their fellow-citizens or brothers by saying,
  - type: text
    content: '‘You should know '
  - type: text
    content: Yahweh
  - type: text
    content: ',’'
  - type: text
    content: 'since everyone will know me '
  - type: text
    content: inwardly
  - type: text
    content: ','
  - type: text
    content: from the most unlikely to the most distinguished.
  - type: note
    content: The Aramaic can be translated “from the youngest to the oldest.”
  '12':
  - type: text
    content: For I will demonstrate my mercy to them
  - type: text
    content: 'and will forgive '
  - type: note
    content: The Aramaic can be translated “I will make atonement for their evil.”
  - type: text
    content: their evil deeds,
  - type: text
    content: and never remember again their sins.”
  '13':
  - type: text
    content: This proves that by establishing this new covenant the first is now obsolete, ready to expire, and about to disappear.
  - type: note
    content: Or “is near obliteration.” The old which is “about to disappear,” can also refer to our old life and its old ways of pleasing flesh, the sinful disposition of our hearts. The Aramaic verb for “disappear” can also mean “to give birth.”
  '2':
  - type: text
    content: 'He serves in the holy sanctuary in the true heavenly tabernacle '
  - type: note
    content: Or “tent.”
  - type: text
    content: 'set up by God, and not by men. '
  '3':
  - type: text
    content: 'Since every high priest is appointed to offer both gifts and sacrifices, so the Messiah also had to bring some sacrifice. '
  '4':
  - type: text
    content: 'But since he didn’t qualify to be an earthly priest, and there are already priests who offer sacrifices '
  - type: note
    content: Or “gifts.” The present tense of the verb used here shows that there was still a temple with sacrifices being offered at the time of the writing of Hebrews. This sets the date as before 70 AD when the temple was destroyed by the Roman war.
  - type: text
    content: 'prescribed by the law, '
  - type: text
    content: he offered in heaven a perfect sacrifice
  - type: text
    content: .
  '5':
  - type: text
    content: The priests on earth serve in a temple that is but a copy modeled after the heavenly sanctuary; a shadow of the reality. For when Moses began to construct the tabernacle God warned him and said,
  - type: text
    content: “You must precisely follow the pattern I revealed to you on Mount Sinai.”
  - type: note
    content: See Ex. 25:40.
  '6':
  - type: text
    content: 'But now Jesus the Messiah '
  - type: note
    content: As translated from the Aramaic. The Greek is simply “he.”
  - type: text
    content: 'has accepted a priestly ministry which far surpasses theirs, since he is the catalyst '
  - type: note
    content: As translated from the Aramaic. The Greek is “the covenant that he mediates (as intermediary and guarantor).”
  - type: text
    content: 'of a better covenant which contains far more wonderful promises! '
  '7':
  - type: text
    content: 'For if that first covenant had been faultless no one would have needed a second one to replace it. '
  '8':
  - type: text
    content: But God revealed the defect and limitation of the first when he said to his people,
  - type: note
    content: Some Greek manuscripts have “because he found fault with them” (Israelites).
  - type: text
    content: “Look! The day will come, declares the Lord,
  - type: text
    content: when I will satisfy the people of Israel and Judah
  - type: text
    content: by giving them a new covenant.
  - type: note
    content: As translated from the Aramaic. The Greek is “I will complete a new covenant with the house of Israel and the house of Judah.”
  '9':
  - type: text
    content: It will be an entirely different covenant
  - type: text
    content: than the one I made with their fathers
  - type: text
    content: when I led them by my hand out of Egypt.
  - type: text
    content: For they did not remain faithful to my covenant,
  - type: text
    content: so I rejected them, says the Lord God.
