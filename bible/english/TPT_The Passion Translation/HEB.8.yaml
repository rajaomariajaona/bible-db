document_id: HEB.8,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Our Better Covenant
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now this is the crowning point of what we are saying: We have a magnificent King-Priest who ministers for us at the right hand of God. He is enthroned with honor next to the throne of the Majesty on high. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For here is the covenant I will one day establish with the people of Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will embed my laws within their thoughts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and fasten them onto their hearts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will be their loyal God and they will be my loyal people.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the result of this will be
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that everyone will know me as Lord!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There will be no need at all to teach their fellow-citizens or brothers by saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘You should know '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ',’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'since everyone will know me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: inwardly
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the most unlikely to the most distinguished.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “from the youngest to the oldest.”
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will demonstrate my mercy to them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and will forgive '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “I will make atonement for their evil.”
      marker-yv: yv-n
    - type: text
      text: their evil deeds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and never remember again their sins.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This proves that by establishing this new covenant the first is now obsolete, ready to expire, and about to disappear.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “is near obliteration.” The old which is “about to disappear,” can also refer to our old life and its old ways of pleasing flesh, the sinful disposition of our hearts. The Aramaic verb for “disappear” can also mean “to give birth.”
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He serves in the holy sanctuary in the true heavenly tabernacle '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “tent.”
      marker-yv: yv-n
    - type: text
      text: 'set up by God, and not by men. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since every high priest is appointed to offer both gifts and sacrifices, so the Messiah also had to bring some sacrifice. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But since he didn’t qualify to be an earthly priest, and there are already priests who offer sacrifices '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “gifts.” The present tense of the verb used here shows that there was still a temple with sacrifices being offered at the time of the writing of Hebrews. This sets the date as before 70 AD when the temple was destroyed by the Roman war.
      marker-yv: yv-n
    - type: text
      text: 'prescribed by the law, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he offered in heaven a perfect sacrifice
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The priests on earth serve in a temple that is but a copy modeled after the heavenly sanctuary; a shadow of the reality. For when Moses began to construct the tabernacle God warned him and said,
  - type: usfm
    marker: mi
    children:
    - type: text
      text: “You must precisely follow the pattern I revealed to you on Mount Sinai.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 25:40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now Jesus the Messiah '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is simply “he.”
      marker-yv: yv-n
    - type: text
      text: 'has accepted a priestly ministry which far surpasses theirs, since he is the catalyst '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “the covenant that he mediates (as intermediary and guarantor).”
      marker-yv: yv-n
    - type: text
      text: 'of a better covenant which contains far more wonderful promises! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if that first covenant had been faultless no one would have needed a second one to replace it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But God revealed the defect and limitation of the first when he said to his people,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some Greek manuscripts have “because he found fault with them” (Israelites).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look! The day will come, declares the Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I will satisfy the people of Israel and Judah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by giving them a new covenant.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “I will complete a new covenant with the house of Israel and the house of Judah.”
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be an entirely different covenant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than the one I made with their fathers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I led them by my hand out of Egypt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they did not remain faithful to my covenant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so I rejected them, says the Lord God.
