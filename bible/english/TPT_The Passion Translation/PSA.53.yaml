document_id: PSA.53,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Wickedness of the World
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A contemplative song of instruction To the tune of “The Dancings of Mourning”
  - type: note
    content: Or “The Dance of Mourning.” This could have been a footnote to Ps. 52 instead of an inscription for Ps. 53. If so, read Ps. 52 and imagine the dancing that broke loose when David and his mighty men knew that Doeg had been judged by God for his murderous betrayal.
  - type: text
    content: 'Only the withering soul '
  - type: note
    content: The word often translated as “fool” comes from a Hebrew word meaning “withering.” If we make no room for God, we have withered hearts (or souls), our moral sense of righteousness is put to sleep, and the noble aspirations of the heart shrivel up and die. Ps. 53 clearly speaks of the downfall of those who oppose Israel. Ps. 14 and Ps. 53 are very similar psalms. Ps. 14 deals with God’s verdict, while Ps. 53 speaks of God’s vengeance. If God says it once, it is to believed. If he says it twice, it demands our utmost attention!
  - type: text
    content: would say to himself,
  - type: text
    content: “There’s no God for me!”
  - type: text
    content: Anyone who thinks like that is corrupt and callous;
  - type: text
    content: depraved and detestable, they are devoid of what is good.
  '2':
  - type: text
    content: The Lord looks down in love, bending over heaven’s balcony.
  - type: text
    content: God looks over all of Adam’s sons and daughters,
  - type: text
    content: looking to see if there are any who are wise with insight—
  - type: text
    content: any who search for him, wanting to please him.
  '3':
  - type: text
    content: But no, all have wandered astray, walking stubbornly toward evil.
  - type: text
    content: Not one is good; he can’t even find one!
  '4':
  - type: text
    content: Look how they live in luxury while exploiting my people.
  - type: text
    content: Won’t these workers of wickedness ever learn!
  - type: text
    content: They never even think of praying to God.
  '5':
  - type: text
    content: Soon, unheard-of terror will seize them while in their sins.
  - type: text
    content: God himself will one day scatter the bones
  - type: text
    content: of those who rose up against you.
  - type: note
    content: This could refer to the scattering of the armies of Sennacherib in the days of Hezekiah. See 2 Kings 18–19.
  - type: text
    content: Doomed and rejected, they will be put to shame,
  - type: text
    content: for God has despised them.
  '6':
  - type: text
    content: Oh, I wish our time of rescue were already here.
  - type: text
    content: 'Oh, that God would come forth now '
  - type: note
    content: This is considered to be an ecphonesis, a rhetorical literary device that amplifies the emotion of the text. It is equivalent to an emotional outburst. Clearly, this is a passionate psalm.
  - type: text
    content: —
  - type: text
    content: arising from the midst of his Zion-people
  - type: text
    content: to save and restore his very own.
  - type: text
    content: When God fully restores his people,
  - type: text
    content: Jacob will rejoice, and Israel will be filled with gladness!
