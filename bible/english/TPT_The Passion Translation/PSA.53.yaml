document_id: PSA.53,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: The Wickedness of the World
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: A contemplative song of instruction To the tune of “The Dancings of Mourning”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The Dance of Mourning.” This could have been a footnote to
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 52
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: instead of an inscription for
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 53
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . If so, read
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 52
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and imagine the dancing that broke loose when David and his mighty men knew that Doeg had been judged by God for his murderous betrayal.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Only the withering soul '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 53:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word often translated as “fool” comes from a Hebrew word meaning “withering.” If we make no room for God, we have withered hearts (or souls), our moral sense of righteousness is put to sleep, and the noble aspirations of the heart shrivel up and die.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 53
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: clearly speaks of the downfall of those who oppose Israel.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 53
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: are very similar psalms.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: deals with God’s verdict, while
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 53
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: speaks of God’s vengeance. If God says it once, it is to believed. If he says it twice, it demands our utmost attention!
      marker-yv: yv-n
    - type: text
      text: would say to himself,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “There’s no God for me!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anyone who thinks like that is corrupt and callous;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depraved and detestable, they are devoid of what is good.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The Lord looks down in love, bending over heaven’s balcony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God looks over all of Adam’s sons and daughters,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: looking to see if there are any who are wise with insight—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any who search for him, wanting to please him.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But no, all have wandered astray, walking stubbornly toward evil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not one is good; he can’t even find one!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Look how they live in luxury while exploiting my people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Won’t these workers of wickedness ever learn!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They never even think of praying to God.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Soon, unheard-of terror will seize them while in their sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God himself will one day scatter the bones
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of those who rose up against you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 53:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This could refer to the scattering of the armies of Sennacherib in the days of Hezekiah. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 18–19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doomed and rejected, they will be put to shame,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for God has despised them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Oh, I wish our time of rescue were already here.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh, that God would come forth now '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 53:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is considered to be an ecphonesis, a rhetorical literary device that amplifies the emotion of the text. It is equivalent to an emotional outburst. Clearly, this is a passionate psalm.
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: arising from the midst of his Zion-people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to save and restore his very own.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When God fully restores his people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob will rejoice, and Israel will be filled with gladness!
