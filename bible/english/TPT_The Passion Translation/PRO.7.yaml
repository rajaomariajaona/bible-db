document_id: PRO.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom, Your True Love
  - type: text
    content: Stick close to my instruction, my son,
  - type: text
    content: and follow all my advice.
  '10':
  - type: text
    content: That’s when their rendezvous began.
  - type: text
    content: A woman of the night appeared,
  - type: text
    content: dressed to kill the strength of any man.
  - type: text
    content: She was decked out as a harlot, pursuing her amorous plan.
  '11':
  - type: text
    content: Her voice was seductive, rebellious, and boisterous
  - type: text
    content: as she wandered far from what’s right.
  '12':
  - type: text
    content: Her type can be found soliciting on street corners
  - type: text
    content: on just about any night.
  '13':
  - type: text
    content: She wrapped her arms around the senseless young man
  - type: text
    content: and held him tight—
  - type: text
    content: she enticed him with kisses that seemed so right.
  - type: text
    content: Then, with insolence, she whispered in his ear,
  '14':
  - type: text
    content: “Come with me. It’ll be all right.
  - type: text
    content: I’ve got everything we need for a feast.
  - type: text
    content: I’ll cook you a wonderful dinner.
  - type: note
    content: Or “offered peace offerings and paid my vows [in the temple].” This is a way of saying, “I have lots of meat left over from the sacrifices I’ve offered, enough for a great meal.”
  - type: text
    content: So here I am—I’m all yours!
  '15':
  - type: text
    content: You’re the very one I’ve looked for,
  - type: text
    content: the one I knew I wanted from the moment I saw you.
  - type: text
    content: That’s why I’ve come out here tonight,
  - type: text
    content: so I could meet a man just like you.
  - type: note
    content: Compared to Song. 3:1–4, this seems to be a parodic reversal of the Shulamite who goes out into the city to seek a man, and when she finds him, embraces him. This account of the harlot seems to be the converse of the theme of Song of Songs.
  '16':
  - type: text
    content: I’ve spread my canopy bed with coverings,
  - type: text
    content: lovely multicolored Egyptian linens
  - type: text
    content: ready for you to lie down on.
  '17':
  - type: text
    content: I’ve sprinkled the sheets with intoxicating perfume
  - type: text
    content: made from myrrh, aloes, and sweet cinnamon.
  - type: note
    content: Although these spices are found in the sacred anointing oil, the adulteress (religious system) has only a false anointing with no true power.
  '18':
  - type: text
    content: Come, let’s get comfortable and take pleasure in each other
  - type: text
    content: and make love all night!
  '19':
  - type: text
    content: There’s no one home, for my husband’s away on business.
  '2':
  - type: text
    content: If you do what I say you will live well.
  - type: text
    content: Guard your life with my revelation-truth,
  - type: text
    content: for my teaching is as precious as your eyesight.
  - type: note
    content: Or “like you would the pupil of your eye.” Literally “the little man of the eye,” which is a figure of speech for your most prized possession.
  '20':
  - type: text
    content: He left home loaded with money to spend,
  - type: text
    content: so don’t worry.
  - type: text
    content: He won’t be back until another month ends.”
  - type: note
    content: Or “He left with a bag of money and won’t be back until the new moon.”
  '21':
  - type: text
    content: He was swayed by her sophistication,
  - type: text
    content: enticed by her longing embrace.
  - type: text
    content: She led him down the wayward path right into sin and disgrace.
  - type: text
    content: Quickly he went astray, with no clue
  - type: text
    content: where he was truly headed,
  - type: text
    content: taken like a dumb ox alongside the butcher.
  - type: text
    content: She was like a venomous snake coiled to strike,
  - type: text
    content: so she set her fangs into him!
  - type: note
    content: The last sentence in this verse is arguably difficult to translate, with many variant options. The Aramaic is “taken like a dog to captivity.” The Hebrew can be translated “bounding like a stag to a trap.” Other ancient Jewish commentaries refer to this portion as “rushing like a venomous snake to discipline the foolish one,” meaning that with the swiftness of a snake striking its prey, a fool lunges into his own destruction.
  '23':
  - type: text
    content: He’s like a man about to be executed with an arrow
  - type: text
    content: right through his heart—
  - type: text
    content: like a bird that flies into the net,
  - type: text
    content: unaware of what’s about to happen.
  '24':
  - type: text
    content: So listen to me, you young men.
  - type: text
    content: You’d better take my words seriously!
  '25':
  - type: text
    content: Control your sexual urges and guard your hearts against lust.
  - type: text
    content: Don’t let your passions get out of hand
  - type: text
    content: and don’t lock your eyes onto a beautiful woman.
  - type: text
    content: Why would you want to even get close
  - type: text
    content: to temptation and seduction,
  - type: text
    content: to have an affair with her?
  '26':
  - type: text
    content: She has pierced the souls of multitudes of men—
  - type: text
    content: many mighty ones have fallen
  - type: text
    content: and have been brought down by her.
  - type: note
    content: 'The Aramaic is even more descriptive: “She has slain a multitude of mighty ones; they’ve all been killed by her.”'
  '27':
  - type: text
    content: If you’re looking for the road to hell,
  - type: text
    content: just go looking for her house!
  - type: note
    content: This parable (vv. 6–27) not only warns against the obvious evils of adultery and immorality, but also serves as a warning to the anointed young men in ministry not to be seduced by the religious system. Wisdom looks from the window (revelation and insight—see Ezek. 8) of her house (the true church of Jesus) and sees a young man (not fully mature—see 1 John 2:12–14) who has placed himself in the path of sin. This made him vulnerable to the seduction of the “harlot” system of a works-based religion that enticed him into her bed (partnership, covering, and ordination with her and her system—see Rev. 17–18) covered with Egyptian linens (Egypt is a picture of the world system that holds people in bondage). She is loud and stubborn (the old self-life never dealt with) and will not remain in her house (the true church of Jesus). She lives in the darkness of compromise and her ways are the ways of death. She doesn’t remain faithful to her husband (the Bridegroom-God). The two women of Proverbs are the harlot mentioned here and the virtuous woman found in chapter 31, who speak of two systems of worship. One is true and virtuous; the other is false and seductive.
  '3':
  - type: text
    content: Treasure my instructions, and cherish them within your heart.
  - type: note
    content: Or “Write them upon the tablets of your heart.”
  '4':
  - type: text
    content: Say to wisdom, “I love you,”
  - type: text
    content: and to understanding, “You’re my sweetheart.”
  '5':
  - type: text
    content: “May the two of you protect me, and may we never be apart!”
  - type: text
    content: For they will keep you from the adulteress,
  - type: text
    content: with her smooth words meant to seduce your heart.
  '6':
  - type: text
    content: Looking out the window of my house one day
  '7':
  - type: text
    content: I noticed among the mindless crowd
  - type: text
    content: a simple, naïve young man who was about to go astray.
  '8':
  - type: text
    content: There he was, walking down the street.
  - type: text
    content: Then he turned the corner,
  - type: text
    content: going on his way hurrying to the house of the harlot—
  - type: text
    content: the woman he had planned to meet.
  '9':
  - type: text
    content: There he was in the twilight as darkness fell,
  - type: text
    content: convinced no one was watching
  - type: text
    content: as he entered the black shadows of hell.
  - type: note
    content: Implied from v. 27.
