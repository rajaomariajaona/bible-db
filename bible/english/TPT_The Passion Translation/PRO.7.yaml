document_id: PRO.7,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom, Your True Love
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stick close to my instruction, my son,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and follow all my advice.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s when their rendezvous began.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A woman of the night appeared,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dressed to kill the strength of any man.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She was decked out as a harlot, pursuing her amorous plan.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her voice was seductive, rebellious, and boisterous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as she wandered far from what’s right.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her type can be found soliciting on street corners
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on just about any night.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She wrapped her arms around the senseless young man
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and held him tight—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: she enticed him with kisses that seemed so right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then, with insolence, she whispered in his ear,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Come with me. It’ll be all right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve got everything we need for a feast.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll cook you a wonderful dinner.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “offered peace offerings and paid my vows [in the temple].” This is a way of saying, “I have lots of meat left over from the sacrifices I’ve offered, enough for a great meal.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So here I am—I’m all yours!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re the very one I’ve looked for,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the one I knew I wanted from the moment I saw you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s why I’ve come out here tonight,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so I could meet a man just like you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compared to
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Song. 3:1–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', this seems to be a parodic reversal of the Shulamite who goes out into the city to seek a man, and when she finds him, embraces him. This account of the harlot seems to be the converse of the theme of Song of Songs.'
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve spread my canopy bed with coverings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lovely multicolored Egyptian linens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ready for you to lie down on.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve sprinkled the sheets with intoxicating perfume
  - type: usfm
    marker: q1
    children:
    - type: text
      text: made from myrrh, aloes, and sweet cinnamon.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although these spices are found in the sacred anointing oil, the adulteress (religious system) has only a false anointing with no true power.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, let’s get comfortable and take pleasure in each other
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and make love all night!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s no one home, for my husband’s away on business.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you do what I say you will live well.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guard your life with my revelation-truth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for my teaching is as precious as your eyesight.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “like you would the pupil of your eye.” Literally “the little man of the eye,” which is a figure of speech for your most prized possession.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He left home loaded with money to spend,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so don’t worry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He won’t be back until another month ends.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “He left with a bag of money and won’t be back until the new moon.”
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was swayed by her sophistication,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enticed by her longing embrace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She led him down the wayward path right into sin and disgrace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quickly he went astray, with no clue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: where he was truly headed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: taken like a dumb ox alongside the butcher.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She was like a venomous snake coiled to strike,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so she set her fangs into him!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The last sentence in this verse is arguably difficult to translate, with many variant options. The Aramaic is “taken like a dog to captivity.” The Hebrew can be translated “bounding like a stag to a trap.” Other ancient Jewish commentaries refer to this portion as “rushing like a venomous snake to discipline the foolish one,” meaning that with the swiftness of a snake striking its prey, a fool lunges into his own destruction.
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s like a man about to be executed with an arrow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: right through his heart—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a bird that flies into the net,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: unaware of what’s about to happen.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So listen to me, you young men.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’d better take my words seriously!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Control your sexual urges and guard your hearts against lust.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let your passions get out of hand
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and don’t lock your eyes onto a beautiful woman.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why would you want to even get close
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to temptation and seduction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to have an affair with her?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She has pierced the souls of multitudes of men—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: many mighty ones have fallen
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and have been brought down by her.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Aramaic is even more descriptive: “She has slain a multitude of mighty ones; they’ve all been killed by her.”'
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you’re looking for the road to hell,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: just go looking for her house!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This parable (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6–27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) not only warns against the obvious evils of adultery and immorality, but also serves as a warning to the anointed young men in ministry not to be seduced by the religious system. Wisdom looks from the window (revelation and insight—see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) of her house (the true church of Jesus) and sees a young man (not fully mature—see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 John 2:12–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) who has placed himself in the path of sin. This made him vulnerable to the seduction of the “harlot” system of a works-based religion that enticed him into her bed (partnership, covering, and ordination with her and her system—see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Rev. 17–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) covered with Egyptian linens (Egypt is a picture of the world system that holds people in bondage). She is loud and stubborn (the old self-life never dealt with) and will not remain in her house (the true church of Jesus). She lives in the darkness of compromise and her ways are the ways of death. She doesn’t remain faithful to her husband (the Bridegroom-God). The two women of Proverbs are the harlot mentioned here and the virtuous woman found in chapter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', who speak of two systems of worship. One is true and virtuous; the other is false and seductive.'
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Treasure my instructions, and cherish them within your heart.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Write them upon the tablets of your heart.”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Say to wisdom, “I love you,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to understanding, “You’re my sweetheart.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “May the two of you protect me, and may we never be apart!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they will keep you from the adulteress,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with her smooth words meant to seduce your heart.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Looking out the window of my house one day
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I noticed among the mindless crowd
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a simple, naïve young man who was about to go astray.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There he was, walking down the street.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he turned the corner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: going on his way hurrying to the house of the harlot—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the woman he had planned to meet.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There he was in the twilight as darkness fell,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: convinced no one was watching
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as he entered the black shadows of hell.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
