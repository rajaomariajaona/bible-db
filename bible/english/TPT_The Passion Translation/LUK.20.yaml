document_id: LUK.20,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Day of Controversy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'One day Jesus was teaching in the temple courts and sharing with the people the wonderful news of salvation. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Translated from the Aramaic text.
      marker-yv: yv-n
    - type: text
      text: 'The high priest, the experts of the law, and the prominent men of the city confronted Jesus and asked him, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: At harvest time, the owner sent one of his servants to the tenants to collect the landowner’s share of the harvest, but the tenants sent him away, beaten and empty-handed.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So the owner dispatched another one of his servants to collect his portion, but the tenants treated him the same way. They cursed him, beat him, and sent him away empty-handed.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then the owner sent a third servant, but they brutalized him also with the same treatment.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Finally the owner of the vineyard said to his son, ‘Perhaps if I send you, my own cherished son, they will be ashamed of what they’ve done.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Translated from the Aramaic text.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But when the tenants saw the son coming, they schemed among themselves. ‘This is the heir of the vineyard! If we kill him, the inheritance will be ours.’
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So they threw the son off the property and killed him.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I ask you, what do you think the owner of the vineyard will do to his son’s murderers?
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He will come back and destroy them and give his vineyard to another.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the people heard this story, they all agreed, “This should never happen!”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jesus looked straight at the people and their leaders and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What do you think this verse means? ‘The worthless, rejected stone has become the cornerstone, the most important stone of all.’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 118:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 8:14–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Everyone who falls
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: in humility
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: upon that stone will be broken. But if that stone falls on you, it will grind you to pieces!”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: When the high priests and experts of the law realized that this story was about them, they wanted to have Jesus arrested that very moment, but they were afraid of all the people.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paying Taxes
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “We want to know right now by what authority are you teaching here in the temple? And who gave you the authority to teach these things?”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Later, they sent spies who pretended to be honest seekers, but who wanted an opportunity to entangle Jesus by his words. Their plan was to catch him saying something against the government, so they could hand him over to the jurisdiction of the Roman authorities '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who would execute him for sedition
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'At the right time they asked him this question: “Teacher, we know that all you say is straightforward and what you teach us is right. You give us the true ways of God. You’re one who shows no favoritism to anyone’s status. So we ask you—'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'is it proper or not to pay taxes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to a corrupt government
    - type: text
      text: ?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text states, “to the emperor.”
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jesus saw right through their cunning ploy and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why are you testing me?
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although not found in most Greek manuscripts, it is included in the Aramaic text.
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Show me one of the Roman coins. Whose head is on the coin? Whose title is stamped on it?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They answered, “Why, it’s Caesar’s.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Precisely. The coin
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Actual coins from that era have been found with the emperor’s image and a superscription saying, “Tiberius Caesar Augustus, son of the divine Augustus.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: bears the image of the Emperor Caesar, and you should give back to Caesar all that belongs to him. But you bear the image of God. So give back to God all that belongs to him.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: The imposters were left speechless and amazed in the presence of all the people, unable to trap Jesus with his words.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Question about the Resurrection
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Some of the Sadducees (a religious group that denies there is a resurrection of the dead) came to ask Jesus this question: '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '“Teacher, the law of Moses '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 25:5–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'teaches that if a man dies before he has children, his brother should marry the widow and raise up children for his brother’s family line. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Now suppose there was a family with seven brothers, and the oldest married and died without children. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jesus responded, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “First, let me ask you a question and you tell me right now.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 30-31
    - type: text
      text: 'Then his brother married the widow, and he too died with no children. And it continued to happen, one brother after another brother, until each of the seven had married the widow and died childless. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Then finally, the widow died too. So here’s our dilemma: '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Whose wife will the woman be when she’s resurrected from the dead? Which of the brothers will be her husband, since all seven were once married to her?”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Marriage is meant for this world only.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 35-36
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Those who are worthy of the resurrection from the dead into glory become immortal, like the angels, who never die nor marry. When the dead come to life again, they will be children of God—the children of the resurrection.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Even Moses taught the resurrection of the dead
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: when he wrote of the Lord God who was at the burning bush and said ‘I am the God of Abraham, Isaac, and Jacob.’
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Don’t you agree that God is not the God of the dead, but the God of the living? For in his eyes, Abraham, Isaac, and Jacob are alive forevermore. He is the God who raises the dead.”
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'The experts of the law '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:39
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Historically, these “experts of the law” (Pharisees) were opposed to, and argued with, the Sadducees over their disbelief of a supernatural resurrection.
      marker-yv: yv-n
    - type: text
      text: chimed in, “Yes, Teacher, you speak the truth beautifully.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Did John baptize because he had a commission from heaven or merely from men?”
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: From then on, the religious Sadducees never dared ask Jesus a question again.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Messiah, Both God and Man
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Jesus then posed this question to the people: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How can the experts of the law
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “scribes,” as translated from the Aramaic.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: say that Messiah is David’s son?
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Haven’t you read in the Psalms where David himself wrote:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The Lord
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: wj
        children:
        - type: text
          text: Yahweh
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: said to my Lord,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:42
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A Hebrew translation of this passage would read “
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: said to my Adonai.” Paraphrased it would read “The Lord (God) said to my protecting Lord (Messiah).”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Sit near me in the place of authority
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: until I subdue all your enemies under Your feet!’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:43
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 110:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Translated from the Aramaic and one Greek manuscript. Most Greek texts have “until all your enemies become a footstool under your feet.”
      marker-yv: yv-n
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Jesus explained, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If David calls this one ‘my Lord,’ how can he be his son?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:44
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus is challenging them to consider that the Christ will be both God and man (David’s son and David’s Lord).
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Denounces the Experts of the Law
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
