document_id: LUK.20,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Day of Controversy
  - type: text
    content: 'One day Jesus was teaching in the temple courts and sharing with the people the wonderful news of salvation. '
  - type: note
    content: Translated from the Aramaic text.
  - type: text
    content: 'The high priest, the experts of the law, and the prominent men of the city confronted Jesus and asked him, '
  '10':
  - type: text
    content: At harvest time, the owner sent one of his servants to the tenants to collect the landowner’s share of the harvest, but the tenants sent him away, beaten and empty-handed.
  - type: text
    content: ' '
  '11':
  - type: text
    content: So the owner dispatched another one of his servants to collect his portion, but the tenants treated him the same way. They cursed him, beat him, and sent him away empty-handed.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Then the owner sent a third servant, but they brutalized him also with the same treatment.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Finally the owner of the vineyard said to his son, ‘Perhaps if I send you, my own cherished son, they will be ashamed of what they’ve done.’
  - type: note
    content: Translated from the Aramaic text.
  '14':
  - type: text
    content: “But when the tenants saw the son coming, they schemed among themselves. ‘This is the heir of the vineyard! If we kill him, the inheritance will be ours.’
  - type: text
    content: ' '
  '15':
  - type: text
    content: So they threw the son off the property and killed him.
  - type: text
    content: “I ask you, what do you think the owner of the vineyard will do to his son’s murderers?
  - type: text
    content: ' '
  '16':
  - type: text
    content: He will come back and destroy them and give his vineyard to another.”
  - type: text
    content: When the people heard this story, they all agreed, “This should never happen!”
  '17':
  - type: text
    content: 'Jesus looked straight at the people and their leaders and said, '
  - type: text
    content: “What do you think this verse means? ‘The worthless, rejected stone has become the cornerstone, the most important stone of all.’
  - type: text
    content: ' '
  - type: note
    content: See Ps. 118:22; Isa. 8:14–15; 28:16.
  '18':
  - type: text
    content: Everyone who falls
  - type: text
    content: ' '
  - type: text
    content: in humility
  - type: text
    content: ' '
  - type: text
    content: upon that stone will be broken. But if that stone falls on you, it will grind you to pieces!”
  '19':
  - type: text
    content: When the high priests and experts of the law realized that this story was about them, they wanted to have Jesus arrested that very moment, but they were afraid of all the people.
  - type: heading
    content: Paying Taxes
  '2':
  - type: text
    content: “We want to know right now by what authority are you teaching here in the temple? And who gave you the authority to teach these things?”
  '20':
  - type: text
    content: 'Later, they sent spies who pretended to be honest seekers, but who wanted an opportunity to entangle Jesus by his words. Their plan was to catch him saying something against the government, so they could hand him over to the jurisdiction of the Roman authorities '
  - type: text
    content: who would execute him for sedition
  - type: text
    content: .
  '21':
  - type: text
    content: 'At the right time they asked him this question: “Teacher, we know that all you say is straightforward and what you teach us is right. You give us the true ways of God. You’re one who shows no favoritism to anyone’s status. So we ask you—'
  '22':
  - type: text
    content: 'is it proper or not to pay taxes '
  - type: text
    content: to a corrupt government
  - type: text
    content: ?”
  - type: note
    content: The Greek text states, “to the emperor.”
  '23':
  - type: text
    content: 'Jesus saw right through their cunning ploy and said, '
  - type: text
    content: “Why are you testing me?
  - type: text
    content: ' '
  - type: note
    content: Although not found in most Greek manuscripts, it is included in the Aramaic text.
  '24':
  - type: text
    content: Show me one of the Roman coins. Whose head is on the coin? Whose title is stamped on it?”
  - type: text
    content: They answered, “Why, it’s Caesar’s.”
  '25':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Precisely. The coin
  - type: text
    content: ' '
  - type: note
    content: Actual coins from that era have been found with the emperor’s image and a superscription saying, “Tiberius Caesar Augustus, son of the divine Augustus.”
  - type: text
    content: bears the image of the Emperor Caesar, and you should give back to Caesar all that belongs to him. But you bear the image of God. So give back to God all that belongs to him.”
  '26':
  - type: text
    content: The imposters were left speechless and amazed in the presence of all the people, unable to trap Jesus with his words.
  - type: heading
    content: A Question about the Resurrection
  '27':
  - type: text
    content: 'Some of the Sadducees (a religious group that denies there is a resurrection of the dead) came to ask Jesus this question: '
  '28':
  - type: text
    content: '“Teacher, the law of Moses '
  - type: note
    content: See Deut. 25:5–10.
  - type: text
    content: 'teaches that if a man dies before he has children, his brother should marry the widow and raise up children for his brother’s family line. '
  '29':
  - type: text
    content: 'Now suppose there was a family with seven brothers, and the oldest married and died without children. '
  '3':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “First, let me ask you a question and you tell me right now.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Then his brother married the widow, and he too died with no children. And it continued to happen, one brother after another brother, until each of the seven had married the widow and died childless. '
  '32':
  - type: text
    content: 'Then finally, the widow died too. So here’s our dilemma: '
  '33':
  - type: text
    content: Whose wife will the woman be when she’s resurrected from the dead? Which of the brothers will be her husband, since all seven were once married to her?”
  '34':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Marriage is meant for this world only.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Those who are worthy of the resurrection from the dead into glory become immortal, like the angels, who never die nor marry. When the dead come to life again, they will be children of God—the children of the resurrection.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Even Moses taught the resurrection of the dead
  - type: text
    content: ' '
  - type: note
    content: See Ex. 3:6.
  - type: text
    content: when he wrote of the Lord God who was at the burning bush and said ‘I am the God of Abraham, Isaac, and Jacob.’
  - type: text
    content: ' '
  '38':
  - type: text
    content: Don’t you agree that God is not the God of the dead, but the God of the living? For in his eyes, Abraham, Isaac, and Jacob are alive forevermore. He is the God who raises the dead.”
  '39':
  - type: text
    content: 'The experts of the law '
  - type: note
    content: Historically, these “experts of the law” (Pharisees) were opposed to, and argued with, the Sadducees over their disbelief of a supernatural resurrection.
  - type: text
    content: chimed in, “Yes, Teacher, you speak the truth beautifully.”
  '4':
  - type: text
    content: Did John baptize because he had a commission from heaven or merely from men?”
  '40':
  - type: text
    content: From then on, the religious Sadducees never dared ask Jesus a question again.
  - type: heading
    content: The Messiah, Both God and Man
  '41':
  - type: text
    content: 'Jesus then posed this question to the people: '
  - type: text
    content: “How can the experts of the law
  - type: text
    content: ' '
  - type: note
    content: Or “scribes,” as translated from the Aramaic.
  - type: text
    content: say that Messiah is David’s son?
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Haven’t you read in the Psalms where David himself wrote:'
  - type: text
    content: The Lord
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: said to my Lord,
  - type: note
    content: A Hebrew translation of this passage would read “Yahweh said to my Adonai.” Paraphrased it would read “The Lord (God) said to my protecting Lord (Messiah).”
  - type: text
    content: ‘Sit near me in the place of authority
  '43':
  - type: text
    content: until I subdue all your enemies under Your feet!’ ”
  - type: note
    content: See Ps. 110:1. Translated from the Aramaic and one Greek manuscript. Most Greek texts have “until all your enemies become a footstool under your feet.”
  '44':
  - type: text
    content: 'Jesus explained, '
  - type: text
    content: “If David calls this one ‘my Lord,’ how can he be his son?”
  - type: note
    content: Jesus is challenging them to consider that the Christ will be both God and man (David’s son and David’s Lord).
  - type: heading
    content: Jesus Denounces the Experts of the Law
  '45':
  - type: text
    content: 'Within earshot of all the people, Jesus warned his disciples, '
  '46':
  - type: text
    content: “Don’t follow the example of these pretentious experts of the law! They love to parade around in their religious garments so that people honor them wherever they go. They like to sit right up front in every meeting and push their way to the head table at every banquet.
  - type: text
    content: ' '
  '47':
  - type: text
    content: And for an offering they will pray long religious prayers at the homes of widows,
  - type: text
    content: ' '
  - type: note
    content: Translated from the Aramaic. The implication is that the religious leaders would go and pray at the homes of widows, then intimidate them and ask for offerings.
  - type: text
    content: cheating them out of their very livelihood. Beware of them all, because one day the Judge will strip them of honor, and judge them severely.”
  '5':
  - type: text
    content: 'His interrogators pulled themselves aside to consider how to respond to Jesus. “What should we say? If we say that John’s mandate was from heaven, he will ask us, ‘Then why didn’t you believe him '
  - type: text
    content: and be baptized
  - type: text
    content: '?’ '
  '6':
  - type: text
    content: 'But if we say, ‘John’s mandate was merely from men,’ then all the people around him will stone us, for they believe John was a prophet of God.” '
  '7':
  - type: text
    content: So unable to devise an answer they said to Jesus, “We cannot tell where John’s authority came from.”
  '8':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Then neither will I tell you by what authority I do these things.”
  - type: heading
    content: The Story of the Vine Growers
  '9':
  - type: text
    content: 'Jesus taught the people using this story:'
  - type: text
    content: “A man once planted a vineyard, then leased it out to tenants. Then he left to go abroad and was away for a long time.
  - type: text
    content: ' '
