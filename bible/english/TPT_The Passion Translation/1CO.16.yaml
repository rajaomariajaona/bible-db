document_id: 1CO.16,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: An Offering for Believers in Jerusalem
  - type: text
    content: 'Now, concerning the collection I want you to take for God’s holy believers '
  - type: text
    content: in Jerusalem who are in need
  - type: text
    content: ', '
  - type: note
    content: Although it is implied here, it is made explicit in v. 3 that the offering was for those in Jerusalem.
  - type: text
    content: 'I want you to follow the same instructions I gave the churches of Galatia. '
  - type: note
    content: Galatia is a region of the Anatolia province of central Turkey.
  '10':
  - type: text
    content: 'When Timothy arrives, make sure that he feels at home while he’s with you, for he’s advancing the Lord’s work just as I am. '
  '11':
  - type: text
    content: Don’t let anyone disparage or look down on him, but kindly help him on his way with financial support so that he may come back to me, for I am waiting for him and the brothers to return.
  '12':
  - type: text
    content: 'Now, about our brother Apollos. I’ve tried hard to convince him to come visit you with the other brothers, '
  - type: note
    content: The other brothers may have been those who carried the letter from the Corinthians to Paul, Stephanas, Fortunatus, and Achaicus (1 Cor. 16:17).
  - type: text
    content: 'but it’s simply not the right time for him now. But '
  - type: text
    content: don’t worry
  - type: text
    content: ', he’ll come when he has the opportunity.'
  - type: heading
    content: Paul’s Final Instructions and Greetings
  '13':
  - type: text
    content: 'Remember to stay alert and hold firmly to all that you believe. Be mighty and full of courage. '
  '14':
  - type: text
    content: 'Let love and kindness be the motivation behind all that you do. '
  '15':
  - type: text
    content: 'Dear brothers and sisters, I have a request to make of you. Give special recognition to Stephanas and his family, for they were the first converts in Achaia, '
  - type: note
    content: At the time Paul wrote to the Corinthians, Achaia was a Roman province in southern Greece.
  - type: text
    content: 'and they have fully devoted themselves to serve God’s holy people. '
  - type: note
    content: Whenever we minister to God’s people, we are ministering to the Lord. See Matt. 25:34–46.
  '16':
  - type: text
    content: I urge you to honor and support them, and all those like them who work so diligently for the Lord.
  '17':
  - type: text
    content: 'I was delighted when Stephanas, '
  - type: note
    content: Stephanas means “crowned.” Some believe that he was the Philippian jailor who, along with his household, became the first believers in Philippi.
  - type: text
    content: 'Fortunatus, '
  - type: note
    content: Fortunatus means “blessed.” He is recognized in the Orthodox Church as one of the seventy disciples sent out by Jesus as an apostle.
  - type: text
    content: 'and Achaicus '
  - type: note
    content: Achaicus means “a native of Achaia.” He is recognized in church history as one of the seventy disciples sent out by Jesus as an apostle.
  - type: text
    content: 'arrived, for they’ve made up for your absence. '
  '18':
  - type: text
    content: They have refreshed my spirit in the same way they’ve refreshed yours. Be sure to honor people like this.
  '19':
  - type: text
    content: 'All the churches of western Turkey '
  - type: note
    content: Or “[the Roman province] of Asia.”
  - type: text
    content: 'send their loving greetings to you. Aquila and Prisca '
  - type: note
    content: Prisca was a diminutive form of Priscilla (“long life”). She and her husband, Aquila (“eagle”), were tentmakers like Paul. They were not only business partners but partners with him in ministry. See Acts 18:2, 18, 26; 2 Tim. 4:19.
  - type: text
    content: 'greet you warmly in the Lord with those of their house church. '
  '2':
  - type: text
    content: 'Every Sunday, each of you make a generous offering by taking a portion of whatever God has blessed you with and place it in safekeeping. Then I won’t have to make a special appeal when I come. '
  '20':
  - type: text
    content: 'All of your fellow believers '
  - type: text
    content: here in Ephesus
  - type: text
    content: ' send their greetings. Greet one another with a sacred kiss.'
  - type: note
    content: What makes a kiss holy is that it comes from the love of God. See Song. 1:2.
  '21':
  - type: text
    content: In my own handwriting, I, Paul, add my loving greeting.
  '22':
  - type: text
    content: 'If anyone doesn’t sincerely love the Lord, he deserves to be doomed as an outcast. '
  - type: note
    content: Or “accursed.”
  - type: text
    content: 'Our Lord has come! '
  - type: note
    content: Or “Maranatha!” This is an Aramaic word that can be translated in two ways, “Come, our Lord” or “Our Lord has come.”
  '23':
  - type: text
    content: 'May the grace and favor of our Lord Jesus be with you. '
  '24':
  - type: text
    content: I send my love to all who are joined in the life of Jesus, the Anointed One.
  '3':
  - type: text
    content: 'When I arrive, I will send your gift to the poor in Jerusalem along with a letter of explanation, carried by those whom you approve. '
  '4':
  - type: text
    content: If it seems advisable for me to accompany them, I’ll be glad to have them travel with me.
  - type: heading
    content: Paul’s Plans to Visit Corinth
  '5':
  - type: text
    content: 'I plan to be traveling through Macedonia, and afterward I will visit you '
  '6':
  - type: text
    content: 'and perhaps stay there for a while, or even spend the winter with you. Afterward you can send me on my journey, wherever I go next, with your financial support. '
  '7':
  - type: text
    content: 'For it’s not my desire to just see you in passing, but I would like to spend some time with you if the Lord permits. '
  '8':
  - type: text
    content: 'Regardless, I will remain in Ephesus until '
  - type: text
    content: the feast of
  - type: text
    content: ' Pentecost. '
  '9':
  - type: text
    content: There’s an amazing door of opportunity standing wide open for me to minister here, even though there are many who oppose and stand against me.
  - type: note
    content: See Acts 19.
