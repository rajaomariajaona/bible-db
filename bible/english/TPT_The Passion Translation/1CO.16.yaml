document_id: 1CO.16,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: An Offering for Believers in Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, concerning the collection I want you to take for God’s holy believers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in Jerusalem who are in need
    - type: text
      text: ', '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although it is implied here, it is made explicit in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: that the offering was for those in Jerusalem.
      marker-yv: yv-n
    - type: text
      text: 'I want you to follow the same instructions I gave the churches of Galatia. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Galatia is a region of the Anatolia province of central Turkey.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Timothy arrives, make sure that he feels at home while he’s with you, for he’s advancing the Lord’s work just as I am. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t let anyone disparage or look down on him, but kindly help him on his way with financial support so that he may come back to me, for I am waiting for him and the brothers to return.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, about our brother Apollos. I’ve tried hard to convince him to come visit you with the other brothers, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The other brothers may have been those who carried the letter from the Corinthians to Paul, Stephanas, Fortunatus, and Achaicus (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 16:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'but it’s simply not the right time for him now. But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: don’t worry
    - type: text
      text: ', he’ll come when he has the opportunity.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Final Instructions and Greetings
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remember to stay alert and hold firmly to all that you believe. Be mighty and full of courage. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let love and kindness be the motivation behind all that you do. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear brothers and sisters, I have a request to make of you. Give special recognition to Stephanas and his family, for they were the first converts in Achaia, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: At the time Paul wrote to the Corinthians, Achaia was a Roman province in southern Greece.
      marker-yv: yv-n
    - type: text
      text: 'and they have fully devoted themselves to serve God’s holy people. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Whenever we minister to God’s people, we are ministering to the Lord. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 25:34–46
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I urge you to honor and support them, and all those like them who work so diligently for the Lord.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I was delighted when Stephanas, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Stephanas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “crowned.” Some believe that he was the Philippian jailor who, along with his household, became the first believers in Philippi.
      marker-yv: yv-n
    - type: text
      text: 'Fortunatus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Fortunatus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “blessed.” He is recognized in the Orthodox Church as one of the seventy disciples sent out by Jesus as an apostle.
      marker-yv: yv-n
    - type: text
      text: 'and Achaicus '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Achaicus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “a native of Achaia.” He is recognized in church history as one of the seventy disciples sent out by Jesus as an apostle.
      marker-yv: yv-n
    - type: text
      text: 'arrived, for they’ve made up for your absence. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They have refreshed my spirit in the same way they’ve refreshed yours. Be sure to honor people like this.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the churches of western Turkey '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “[the Roman province] of Asia.”
      marker-yv: yv-n
    - type: text
      text: 'send their loving greetings to you. Aquila and Prisca '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Prisca
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was a diminutive form of Priscilla (“long life”). She and her husband, Aquila (“eagle”), were tentmakers like Paul. They were not only business partners but partners with him in ministry. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 18:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 4:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'greet you warmly in the Lord with those of their house church. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every Sunday, each of you make a generous offering by taking a portion of whatever God has blessed you with and place it in safekeeping. Then I won’t have to make a special appeal when I come. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All of your fellow believers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: here in Ephesus
    - type: text
      text: ' send their greetings. Greet one another with a sacred kiss.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: What makes a kiss holy is that it comes from the love of God. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Song. 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In my own handwriting, I, Paul, add my loving greeting.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If anyone doesn’t sincerely love the Lord, he deserves to be doomed as an outcast. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “accursed.”
      marker-yv: yv-n
    - type: text
      text: 'Our Lord has come! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Maranatha!” This is an Aramaic word that can be translated in two ways, “Come, our Lord” or “Our Lord has come.”
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'May the grace and favor of our Lord Jesus be with you. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I send my love to all who are joined in the life of Jesus, the Anointed One.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I arrive, I will send your gift to the poor in Jerusalem along with a letter of explanation, carried by those whom you approve. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If it seems advisable for me to accompany them, I’ll be glad to have them travel with me.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Plans to Visit Corinth
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I plan to be traveling through Macedonia, and afterward I will visit you '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and perhaps stay there for a while, or even spend the winter with you. Afterward you can send me on my journey, wherever I go next, with your financial support. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it’s not my desire to just see you in passing, but I would like to spend some time with you if the Lord permits. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Regardless, I will remain in Ephesus until '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the feast of
    - type: text
      text: ' Pentecost. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There’s an amazing door of opportunity standing wide open for me to minister here, even though there are many who oppose and stand against me.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
