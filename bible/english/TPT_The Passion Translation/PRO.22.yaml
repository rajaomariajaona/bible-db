document_id: PRO.22,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: How to Live a Life of Wisdom
  - type: text
    content: A beautiful reputation is more to be desired than great riches,
  - type: note
    content: The Hebrew is simply “name preferred to wealth.” The Aramaic indicates it could be “the name [of God].”
  - type: text
    content: and to be esteemed by others is more honorable
  - type: text
    content: than to own immense investments.
  - type: note
    content: Or “silver and gold.” Remember, it is Solomon, one of the richest men to ever live, who penned these words.
  '10':
  - type: text
    content: Say goodbye to a troublemaker and you’ll say goodbye
  - type: text
    content: to quarrels, strife, tension, and arguments,
  - type: text
    content: for a troublemaker traffics in shame.
  - type: note
    content: As translated from the Aramaic.
  '11':
  - type: text
    content: The Lord loves those whose hearts are holy,
  - type: text
    content: and he is the friend of those whose ways are pure.
  - type: note
    content: As translated from the Septuagint. Followers of Jesus enjoy a relationship with our holy King as we live in the light and love to please him.
  '12':
  - type: text
    content: 'God passionately watches '
  - type: note
    content: Or “the eyes of the Lord [watch].” In the church today, prophets become eyes in the body of Christ. They see and reveal God’s heart for his people.
  - type: text
    content: over
  - type: text
    content: 'his deep reservoir '
  - type: note
    content: Although the concept of a reservoir is not found in the Hebrew, this translation adds it for poetic nuance.
  - type: text
    content: of revelation-knowledge,
  - type: text
    content: but he subverts the lies of those who pervert the truth.
  '13':
  - type: text
    content: A slacker always has an excuse for not working—
  - type: text
    content: like “I can’t go to work. There’s a lion outside!
  - type: text
    content: And murderers too!
  - type: text
    content: ”
  - type: note
    content: This humorous verse uses both satire and a metaphor. There’s always an excuse for not working hard. The Aramaic text adds “And murderers too!”
  '14':
  - type: text
    content: Sex with an adulteress is like falling into the abyss.
  - type: text
    content: Those under God’s curse jump right in to their own destruction.
  '15':
  - type: text
    content: 'Although rebellion '
  - type: note
    content: The Aramaic word used here means “senseless.”
  - type: text
    content: is woven into a young man’s heart,
  - type: text
    content: tough discipline can make him into a man.
  '16':
  - type: text
    content: 'There are two kinds of people headed toward poverty:'
  - type: text
    content: those who exploit the poor
  - type: text
    content: and those who bribe the rich.
  - type: note
    content: The Hebrew is literally “Oppressing the poor is gain; giving to the rich is loss. Both end up only in poverty.”
  - type: heading
    content: Sayings of the Wise Sages
  '17':
  - type: text
    content: Listen carefully and open your heart.
  - type: note
    content: From this verse to 24:22 we have a collection of proverbs that lead to virtue. They are especially designed for the young person about to enter a career and start a family.
  - type: text
    content: Drink in the wise revelation that I impart.
  '18':
  - type: text
    content: You’ll become winsome and wise
  - type: text
    content: when you treasure the beauty of my words.
  - type: text
    content: And always be prepared to share them at the appropriate time.
  '19':
  - type: text
    content: For I’m releasing these words to you this day,
  - type: text
    content: yes, even to you, so that your living hope
  - type: text
    content: will be found in God alone,
  - type: text
    content: for he is the only one who is always true.
  '2':
  - type: text
    content: 'The rich and the poor have one thing in common:'
  - type: text
    content: the Lord God created each one.
  '20':
  - type: text
    content: Pay attention to these excellent sayings of three-fold things.
  - type: note
    content: As translated from the Aramaic. Most translators find this verse difficult to convey. The Hebrew can be “I have written excellent things,” “I have written three times,” “I write thirty sayings [proverbs],” “I have written you previously,” or “I have written you generals.” The Septuagint reads “You should copy these things three times.” If the Proverbs contain keys to understanding riddles and mysteries (see Prov. 1:2–6), then we have one of those keys given to us here. God speaks in threes, for he is a triune God. We have a body, soul, and spirit. God lived in a three-room house (the outer court, the Holy Place, and the chamber of the Most Holy Place). These three-fold dimensions are throughout the Bible.
  - type: text
    content: For within my words you will discover true and reliable revelation.
  - type: text
    content: 'They will give you serenity '
  - type: note
    content: Serenity is only found in the Aramaic.
  - type: text
    content: so that you can reveal
  - type: text
    content: the truth of the word of the one who sends you.
  '22':
  - type: text
    content: Never oppress the poor
  - type: text
    content: or pass laws with the motive of crushing the weak.
  '23':
  - type: text
    content: For the Lord will rise to plead their case
  - type: text
    content: and humiliate the one who humiliates the poor.
  - type: note
    content: As translated from the Aramaic. The Hebrew is “he will rob the soul of the one who robs the poor.”
  '24':
  - type: text
    content: Walk away from an angry man
  - type: text
    content: or you’ll embrace a snare in your soul
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: by becoming bad-tempered just like him.
  '26':
  - type: text
    content: Why would you ever guarantee a loan for someone else
  - type: text
    content: or promise to be responsible for someone’s debts?
  '27':
  - type: text
    content: For if you fail to pay you could lose your shirt!
  - type: note
    content: Or “bed.”
  '28':
  - type: text
    content: The previous generation has set boundaries in place.
  - type: text
    content: Don’t you dare move them just to benefit yourself.
  - type: note
    content: This refers to moving property lines of your neighbors to take more land, or it could mean moving landmarks and memorials placed there by ancestors. It also speaks to the moral boundaries that the previous generation modeled—they are to be upheld.
  '29':
  - type: text
    content: If you are uniquely gifted in your work,
  - type: text
    content: you will rise and be promoted.
  - type: text
    content: You won’t be held back—
  - type: text
    content: you’ll stand before kings!
  '3':
  - type: text
    content: A prudent person with insight foresees danger coming
  - type: text
    content: and prepares himself for it.
  - type: note
    content: Wise people solve problems before they happen.
  - type: text
    content: But the senseless rush blindly forward
  - type: text
    content: and suffer the consequences.
  '4':
  - type: text
    content: Laying your life down in tender surrender before the Lord
  - type: text
    content: will bring life, prosperity, and honor as your reward.
  '5':
  - type: text
    content: Twisted and perverse lives are surrounded by demonic influence.
  - type: note
    content: Or “thorns and snares.” This becomes a metaphor for demonic curses and troubles. Thorns are associated with the fall of Adam. Jesus wore a crown of thorns and took away our curse. The snares picture the temptations of evil that the devil places in our path.
  - type: text
    content: If you value your soul, stay far away from them.
  '6':
  - type: text
    content: Dedicate your children to God
  - type: text
    content: and point them in the way that they should go,
  - type: note
    content: Or “train them in the direction they are best suited to go.” Some Jewish scholars teach this means understanding your children’s talents and then seeing that they go into that field.
  - type: text
    content: and the values they’ve learned from you will be with them for life.
  '7':
  - type: text
    content: If you borrow money with interest,
  - type: text
    content: you’ll end up serving the interests of your creditors,
  - type: note
    content: The Septuagint reads “the servant will lend to his own master.”
  - type: text
    content: for the rich rule over the poor.
  '8':
  - type: text
    content: Sin is a seed that brings a harvest;
  - type: text
    content: you’ll reap a heap of trouble with every seed you plant.
  - type: text
    content: For your investment in sins pays a full return—
  - type: text
    content: the full punishment you deserve!
  - type: note
    content: As translated from the Septuagint.
  '9':
  - type: text
    content: 'When you are generous '
  - type: note
    content: The Hebrew word translated here as “generous” actually means “to have a bountiful eye.” It is a figure of speech for generosity, a life of helping others.
  - type: text
    content: to the poor,
  - type: text
    content: you are enriched with blessings in return.
