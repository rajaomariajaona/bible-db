document_id: PRO.22,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: How to Live a Life of Wisdom
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: A beautiful reputation is more to be desired than great riches,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is simply “name preferred to wealth.” The Aramaic indicates it could be “the name [of God].”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to be esteemed by others is more honorable
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than to own immense investments.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “silver and gold.” Remember, it is Solomon, one of the richest men to ever live, who penned these words.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Say goodbye to a troublemaker and you’ll say goodbye
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to quarrels, strife, tension, and arguments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for a troublemaker traffics in shame.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The Lord loves those whose hearts are holy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he is the friend of those whose ways are pure.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. Followers of Jesus enjoy a relationship with our holy King as we live in the light and love to please him.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'God passionately watches '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the eyes of the Lord [watch].” In the church today, prophets become eyes in the body of Christ. They see and reveal God’s heart for his people.
      marker-yv: yv-n
    - type: text
      text: over
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'his deep reservoir '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the concept of a reservoir is not found in the Hebrew, this translation adds it for poetic nuance.
      marker-yv: yv-n
    - type: text
      text: of revelation-knowledge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he subverts the lies of those who pervert the truth.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: A slacker always has an excuse for not working—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like “I can’t go to work. There’s a lion outside!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And murderers too!
    - type: text
      text: ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This humorous verse uses both satire and a metaphor. There’s always an excuse for not working hard. The Aramaic text adds “And murderers too!”
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Sex with an adulteress is like falling into the abyss.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those under God’s curse jump right in to their own destruction.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Although rebellion '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word used here means “senseless.”
      marker-yv: yv-n
    - type: text
      text: is woven into a young man’s heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tough discipline can make him into a man.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'There are two kinds of people headed toward poverty:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who exploit the poor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and those who bribe the rich.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is literally “Oppressing the poor is gain; giving to the rich is loss. Both end up only in poverty.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sayings of the Wise Sages
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Listen carefully and open your heart.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: From this verse to
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: we have a collection of proverbs that lead to virtue. They are especially designed for the young person about to enter a career and start a family.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drink in the wise revelation that I impart.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: You’ll become winsome and wise
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when you treasure the beauty of my words.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And always be prepared to share them at the appropriate time.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: For I’m releasing these words to you this day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yes, even to you, so that your living hope
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be found in God alone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he is the only one who is always true.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The rich and the poor have one thing in common:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the Lord God created each one.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: Pay attention to these excellent sayings of three-fold things.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:20–21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. Most translators find this verse difficult to convey. The Hebrew can be “I have written excellent things,” “I have written three times,” “I write thirty sayings [proverbs],” “I have written you previously,” or “I have written you generals.” The Septuagint reads “You should copy these things three times.” If the Proverbs contain keys to understanding riddles and mysteries (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 1:2–6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), then we have one of those keys given to us here. God speaks in threes, for he is a triune God. We have a body, soul, and spirit. God lived in a three-room house (the outer court, the Holy Place, and the chamber of the Most Holy Place). These three-fold dimensions are throughout the Bible.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For within my words you will discover true and reliable revelation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will give you serenity '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:20–21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Serenity
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is only found in the Aramaic.
      marker-yv: yv-n
    - type: text
      text: so that you can reveal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the truth of the word of the one who sends you.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Never oppress the poor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or pass laws with the motive of crushing the weak.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: For the Lord will rise to plead their case
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and humiliate the one who humiliates the poor.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Hebrew is “he will rob the soul of the one who robs the poor.”
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-25
    - type: text
      text: Walk away from an angry man
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or you’ll embrace a snare in your soul
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:24–25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by becoming bad-tempered just like him.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Why would you ever guarantee a loan for someone else
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or promise to be responsible for someone’s debts?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: For if you fail to pay you could lose your shirt!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “bed.”
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: The previous generation has set boundaries in place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t you dare move them just to benefit yourself.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This refers to moving property lines of your neighbors to take more land, or it could mean moving landmarks and memorials placed there by ancestors. It also speaks to the moral boundaries that the previous generation modeled—they are to be upheld.
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: If you are uniquely gifted in your work,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will rise and be promoted.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You won’t be held back—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you’ll stand before kings!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: A prudent person with insight foresees danger coming
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and prepares himself for it.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Wise people solve problems before they happen.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the senseless rush blindly forward
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and suffer the consequences.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Laying your life down in tender surrender before the Lord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will bring life, prosperity, and honor as your reward.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Twisted and perverse lives are surrounded by demonic influence.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “thorns and snares.” This becomes a metaphor for demonic curses and troubles. Thorns are associated with the fall of Adam. Jesus wore a crown of thorns and took away our curse. The snares picture the temptations of evil that the devil places in our path.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you value your soul, stay far away from them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dedicate your children to God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and point them in the way that they should go,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “train them in the direction they are best suited to go.” Some Jewish scholars teach this means understanding your children’s talents and then seeing that they go into that field.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the values they’ve learned from you will be with them for life.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: If you borrow money with interest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you’ll end up serving the interests of your creditors,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint reads “the servant will lend to his own master.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the rich rule over the poor.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Sin is a seed that brings a harvest;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you’ll reap a heap of trouble with every seed you plant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your investment in sins pays a full return—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the full punishment you deserve!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'When you are generous '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word translated here as “generous” actually means “to have a bountiful eye.” It is a figure of speech for generosity, a life of helping others.
      marker-yv: yv-n
    - type: text
      text: to the poor,
  - type: usfm
    marker: q1
