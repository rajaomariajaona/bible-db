document_id: PSA.54
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Defend Me
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: David’s contemplative song of instruction
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A song of derision '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '54'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word used here and translated in some versions as “stringed instrument” can also be rendered “a song of mocking.” This is a psalm for anyone who feels betrayed, rejected, and stuck in a difficult situation with no one at his or her side.
    marker-yv: yv-n
  - type: text
    text: when the Ziphites betrayed David to Saul, saying, “David is hiding among us; come and get him!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God, deliver me by your mighty name!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come with your glorious power and save me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Listen to my prayer; turn your ears to my cry!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: These violent men have risen up against me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'heartless, ruthless men '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 54:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “foreigners.”
    marker-yv: yv-n
  - type: text
    text: who care nothing about God
- type: usfm
  marker: q1
  children:
  - type: text
    text: seek to take my life.
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But the Lord God has become my divine helper.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He leans into my heart and lays his hands upon '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 54:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word used here can be translated “uphold” or “sustain.” It comes from a root word that means “to lean upon” or “to lay hands upon.” This translation includes both concepts in this verse.
    marker-yv: yv-n
  - type: text
    text: me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: God will see to it that those who sow evil will reap evil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So Lord, in your great faithfulness, destroy them once and for all!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Lord, I will offer myself freely, and everything I am I give to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will worship and praise your name, O Lord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for it is precious to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Through you I’m saved—rescued from every trouble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve seen with my eyes the defeat of my enemies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve triumphed over them all!
