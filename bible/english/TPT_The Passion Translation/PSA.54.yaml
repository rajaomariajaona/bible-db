document_id: PSA.54,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Defend Me
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: David’s contemplative song of instruction
  - type: text
    content: 'A song of derision '
  - type: note
    content: The Hebrew word used here and translated in some versions as “stringed instrument” can also be rendered “a song of mocking.” This is a psalm for anyone who feels betrayed, rejected, and stuck in a difficult situation with no one at his or her side.
  - type: text
    content: when the Ziphites betrayed David to Saul, saying, “David is hiding among us; come and get him!”
  - type: text
    content: God, deliver me by your mighty name!
  - type: text
    content: Come with your glorious power and save me!
  '2':
  - type: text
    content: Listen to my prayer; turn your ears to my cry!
  '3':
  - type: text
    content: These violent men have risen up against me;
  - type: text
    content: 'heartless, ruthless men '
  - type: note
    content: Or “foreigners.”
  - type: text
    content: who care nothing about God
  - type: text
    content: seek to take my life.
  - type: text
    content: Pause in his presence
  '4':
  - type: text
    content: But the Lord God has become my divine helper.
  - type: text
    content: 'He leans into my heart and lays his hands upon '
  - type: note
    content: The word used here can be translated “uphold” or “sustain.” It comes from a root word that means “to lean upon” or “to lay hands upon.” This translation includes both concepts in this verse.
  - type: text
    content: me!
  '5':
  - type: text
    content: God will see to it that those who sow evil will reap evil.
  - type: text
    content: So Lord, in your great faithfulness, destroy them once and for all!
  '6':
  - type: text
    content: Lord, I will offer myself freely, and everything I am I give to you.
  - type: text
    content: I will worship and praise your name, O Lord,
  - type: text
    content: for it is precious to me.
  '7':
  - type: text
    content: Through you I’m saved—rescued from every trouble.
  - type: text
    content: I’ve seen with my eyes the defeat of my enemies.
  - type: text
    content: I’ve triumphed over them all!
