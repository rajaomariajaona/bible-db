document_id: PSA.73
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: God’s Justice
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Asaph’s psalm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '73'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Asaph was one of three Levites that David set over the worship of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . However, it is possible that Asaph was an office not an individual—Asaphites who were part of a prophetic company of composers. The name Asaph means “a harvest” or “fulfilled prophecy.” Asaph possibly comes from a Semitic root word for “portal.” Perhaps the Asaphites were named such because their music opened a portal into the heavenly realm.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: No one can deny it—God is really good to Israel
- type: usfm
  marker: q1
  children:
  - type: text
    text: and to all those with pure hearts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: But I nearly missed seeing it for myself
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Here’s my story: I narrowly missed losing it all.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I was stumbling over what I saw the wicked doing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For when I saw the boasters with such wealth and prosperity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I became jealous over their smug security.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: Indulging in whatever they wanted, going where they wanted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: doing what they wanted, and with no care in the world,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no pain, no problems—they seemed to have it made.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They lived as though life would never end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They didn’t even try to hide their pride and opulence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cruelty and violence are parts of their lifestyle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Pampered and pompous, vice oozes from their souls;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they overflow with vanity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They’re such snobs—looking down their noses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They even scoff at God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are nothing but bullies threatening God’s people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They are loudmouths with no fear of God, pretending to know it all—
- type: usfm
  marker: q1
  children:
  - type: text
    text: windbags full of hot air, impressing only themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Yet the people keep coming back to listen
- type: usfm
  marker: q1
  children:
  - type: text
    text: to more of their nonsense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They tell their cohorts, “God will never know.
- type: usfm
  marker: q1
  children:
  - type: text
    text: See, he has no clue of what we’re doing.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: These are the wicked ones I’m talking about!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They never have to lift a finger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: living a life of ease while their riches multiply.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Have I been foolish to play by the rules and keep my life pure?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Here I am suffering under your discipline day after day.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I feel like I’m being punished all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: If I had given in to my pain and spoken of what I was really feeling,
- type: usfm
  marker: q1
  children:
  - type: text
    text: it would have sounded like unfaithfulness to the next generation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When I tried to understand it all, I just couldn’t.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It was too puzzling—too much of a riddle to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But then one day I was brought into the sanctuaries of God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and in the light of glory, my distorted perspective vanished.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I understood that the destiny of the wicked was near!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They’re the ones who are on the slippery path,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and God will suddenly let them slide off into destruction
- type: usfm
  marker: q1
  children:
  - type: text
    text: to be consumed with terrors forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: It will be an instant end to all their life of ease;
- type: usfm
  marker: q1
  children:
  - type: text
    text: a blink of the eye and they’re swept away by sudden calamity!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re all nothing more than momentary monarchs—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: soon to disappear like a dream when one awakes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the rooster crows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lord God, you’ll despise their life of fantasies.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 73:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “shadows.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: When I saw all of this, what turmoil filled my heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: piercing my opinions with your truth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I was so stupid. I was senseless and ignorant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: acting like a brute beast before you, Lord.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Yet, in spite of all this, I still belong to you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: you hold me by my right hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: You lead me with your secret wisdom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And following you brings me into your brightness and glory!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Whom have I in heaven but you? You’re all I want!
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one on earth means as much to me as you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Lord, so many times I fail; I fall into disgrace.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But when I trust in you, I have a strong and glorious presence
- type: usfm
  marker: q1
  children:
  - type: text
    text: protecting and anointing me. Forever you’re all I need!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Those who abandon the worship of God will perish.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The false and unfaithful will be silenced, never heard from again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But I’ll keep coming closer and closer to you, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: for your name is good to me. I’ll keep telling the world of
- type: usfm
  marker: q1
  children:
  - type: text
    text: your awesome works, my faithful and glorious God!
