document_id: PSA.73,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Justice
  - type: text
    content: Asaph’s psalm
  - type: note
    content: Asaph was one of three Levites that David set over the worship of Yahweh. However, it is possible that Asaph was an office not an individual—Asaphites who were part of a prophetic company of composers. The name Asaph means “a harvest” or “fulfilled prophecy.” Asaph possibly comes from a Semitic root word for “portal.” Perhaps the Asaphites were named such because their music opened a portal into the heavenly realm.
  - type: text
    content: No one can deny it—God is really good to Israel
  - type: text
    content: and to all those with pure hearts.
  - type: text
    content: But I nearly missed seeing it for myself
  - type: text
    content: .
  '10':
  - type: text
    content: Yet the people keep coming back to listen
  - type: text
    content: to more of their nonsense.
  '11':
  - type: text
    content: They tell their cohorts, “God will never know.
  - type: text
    content: See, he has no clue of what we’re doing.”
  '12':
  - type: text
    content: These are the wicked ones I’m talking about!
  - type: text
    content: They never have to lift a finger,
  - type: text
    content: living a life of ease while their riches multiply.
  '13':
  - type: text
    content: Have I been foolish to play by the rules and keep my life pure?
  '14':
  - type: text
    content: Here I am suffering under your discipline day after day.
  - type: text
    content: I feel like I’m being punished all day long.
  '15':
  - type: text
    content: If I had given in to my pain and spoken of what I was really feeling,
  - type: text
    content: it would have sounded like unfaithfulness to the next generation.
  '16':
  - type: text
    content: When I tried to understand it all, I just couldn’t.
  - type: text
    content: It was too puzzling—too much of a riddle to me.
  '17':
  - type: text
    content: But then one day I was brought into the sanctuaries of God,
  - type: text
    content: and in the light of glory, my distorted perspective vanished.
  - type: text
    content: Then I understood that the destiny of the wicked was near!
  '18':
  - type: text
    content: They’re the ones who are on the slippery path,
  - type: text
    content: and God will suddenly let them slide off into destruction
  - type: text
    content: to be consumed with terrors forever!
  '19':
  - type: text
    content: It will be an instant end to all their life of ease;
  - type: text
    content: a blink of the eye and they’re swept away by sudden calamity!
  - type: text
    content: They’re all nothing more than momentary monarchs—
  '2':
  - type: text
    content: 'Here’s my story: I narrowly missed losing it all.'
  '20':
  - type: text
    content: soon to disappear like a dream when one awakes.
  - type: text
    content: When the rooster crows,
  - type: text
    content: Lord God, you’ll despise their life of fantasies.
  - type: note
    content: Or “shadows.”
  '21':
  - type: text
    content: When I saw all of this, what turmoil filled my heart,
  - type: text
    content: piercing my opinions with your truth.
  '22':
  - type: text
    content: I was so stupid. I was senseless and ignorant,
  - type: text
    content: acting like a brute beast before you, Lord.
  '23':
  - type: text
    content: Yet, in spite of all this, I still belong to you;
  - type: text
    content: you hold me by my right hand.
  '24':
  - type: text
    content: You lead me with your secret wisdom.
  - type: text
    content: And following you brings me into your brightness and glory!
  '25':
  - type: text
    content: Whom have I in heaven but you? You’re all I want!
  - type: text
    content: No one on earth means as much to me as you.
  '26':
  - type: text
    content: Lord, so many times I fail; I fall into disgrace.
  - type: text
    content: But when I trust in you, I have a strong and glorious presence
  - type: text
    content: protecting and anointing me. Forever you’re all I need!
  '27':
  - type: text
    content: Those who abandon the worship of God will perish.
  - type: text
    content: The false and unfaithful will be silenced, never heard from again.
  '28':
  - type: text
    content: 'But I’ll keep coming closer and closer to you, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: for your name is good to me. I’ll keep telling the world of
  - type: text
    content: your awesome works, my faithful and glorious God!
  '3':
  - type: text
    content: I was stumbling over what I saw the wicked doing.
  - type: text
    content: For when I saw the boasters with such wealth and prosperity,
  - type: text
    content: I became jealous over their smug security.
  '4':
  - type: text
    content: Indulging in whatever they wanted, going where they wanted,
  - type: text
    content: doing what they wanted, and with no care in the world,
  - type: text
    content: no pain, no problems—they seemed to have it made.
  - type: text
    content: They lived as though life would never end.
  '6':
  - type: text
    content: They didn’t even try to hide their pride and opulence.
  - type: text
    content: Cruelty and violence are parts of their lifestyle.
  '7':
  - type: text
    content: Pampered and pompous, vice oozes from their souls;
  - type: text
    content: they overflow with vanity.
  '8':
  - type: text
    content: They’re such snobs—looking down their noses.
  - type: text
    content: They even scoff at God!
  - type: text
    content: They are nothing but bullies threatening God’s people.
  '9':
  - type: text
    content: They are loudmouths with no fear of God, pretending to know it all—
  - type: text
    content: windbags full of hot air, impressing only themselves.
