document_id: PSA.138,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Divine Presence
  - type: text
    content: By King David
  - type: text
    content: I thank you, Lord, and with all the passion of my heart
  - type: text
    content: I worship you in the presence of angels!
  - type: note
    content: Or “gods.” The Hebrew elohim is literally “mighty ones” and can refer to either angels or the gods of the heathen.
  - type: text
    content: Heaven’s mighty ones will hear my voice
  - type: text
    content: as I sing my loving praise to you.
  '2':
  - type: text
    content: I bow down before your divine presence
  - type: text
    content: and bring you my deepest worship
  - type: text
    content: as I experience your tender love and your living truth.
  - type: text
    content: For your Word and the fame of your name
  - type: text
    content: have been magnified above all else!
  - type: note
    content: Or “You have exalted your Word above all your name.”
  '3':
  - type: text
    content: At the very moment I called out to you, you answered me!
  - type: text
    content: You strengthened me deep within my soul
  - type: text
    content: and breathed fresh courage into me.
  '4':
  - type: text
    content: One day all the kings of the earth
  - type: text
    content: will rise to give you thanks when they hear the living words
  - type: text
    content: that I have heard you speak.
  '5':
  - type: text
    content: They too will sing of your wonderful ways,
  - type: text
    content: for your ineffable glory is great!
  '6':
  - type: text
    content: For though you are lofty and exalted,
  - type: text
    content: you stoop to embrace the lowly.
  - type: text
    content: Yet you keep your distance from those filled with pride.
  '7':
  - type: text
    content: By your mighty power I can walk through any devastation,
  - type: text
    content: and you will keep me alive, reviving me.
  - type: text
    content: Your power set me free from the hatred of my enemies.
  '8':
  - type: text
    content: You keep every promise you’ve ever made to me!
  - type: text
    content: Since your love for me is constant and endless,
  - type: text
    content: I ask you, Lord, to finish every good thing that you’ve begun in me!
