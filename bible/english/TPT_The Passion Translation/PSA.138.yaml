document_id: PSA.138
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: The Divine Presence
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: By King David
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I thank you, Lord, and with all the passion of my heart
- type: usfm
  marker: q1
  children:
  - type: text
    text: I worship you in the presence of angels!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 138:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “gods.” The Hebrew
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: elohim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is literally “mighty ones” and can refer to either angels or the gods of the heathen.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heaven’s mighty ones will hear my voice
- type: usfm
  marker: q1
  children:
  - type: text
    text: as I sing my loving praise to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I bow down before your divine presence
- type: usfm
  marker: q1
  children:
  - type: text
    text: and bring you my deepest worship
- type: usfm
  marker: q1
  children:
  - type: text
    text: as I experience your tender love and your living truth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For your Word and the fame of your name
- type: usfm
  marker: q1
  children:
  - type: text
    text: have been magnified above all else!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 138:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You have exalted your Word above all your name.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: At the very moment I called out to you, you answered me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You strengthened me deep within my soul
- type: usfm
  marker: q1
  children:
  - type: text
    text: and breathed fresh courage into me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: One day all the kings of the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: will rise to give you thanks when they hear the living words
- type: usfm
  marker: q1
  children:
  - type: text
    text: that I have heard you speak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They too will sing of your wonderful ways,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for your ineffable glory is great!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For though you are lofty and exalted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you stoop to embrace the lowly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet you keep your distance from those filled with pride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: By your mighty power I can walk through any devastation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you will keep me alive, reviving me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your power set me free from the hatred of my enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You keep every promise you’ve ever made to me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Since your love for me is constant and endless,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I ask you, Lord, to finish every good thing that you’ve begun in me!
