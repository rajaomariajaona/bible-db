      - type: text
        text: The prophetic act of Isaiah needed to be witnessed by men of stature so that when the fulfillment of the demise of the northern kingdom came to pass, it would be impossible to deny Isaiah’s prophetic message. Perhaps this scroll was unfurled like a banner outside Isaiah’s house or placed over an entrance into the temple area. It would have been publicized in some visible fashion. As the people would pass by this sign, they would wonder what it meant. This was a vivid way to make known the prophecy.
    marker-yv: yv-n
