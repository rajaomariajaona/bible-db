      - type: text
        text: Isaiah and his wife were a prophetic duo. Isaiah spoke the word of the Lord, then the prophetess “gave birth” to it. She would literally give birth to the word of God! At the birth of their son, God spoke again and told them the symbolic name of the child, the same message Isaiah had received earlier and had engraved for all to see. Maher-Shalal-Hash-Baz was a walking sign; a son became a sign.
    marker-yv: yv-n
  - type: text
    text: 'she became pregnant and gave birth to a son. Then the Lord '
