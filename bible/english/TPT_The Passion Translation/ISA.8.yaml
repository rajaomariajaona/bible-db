    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This verse has a dual meaning. Historically, it refers to Isaiah and his sons: Shear-Jashub, “a remnant will return,” and Maher-Shalal-Hash-Baz, “Quickly—to the Plunder! Hurry—to the Loot.” But there is another meaning to all this. In this verse, Isaiah becomes a type or picture of Christ, who would come to the earth (Immanuel).'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hebrews 2:13
      metadata:
        usfm: HEB.2.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: quotes this verse about the Lord Jesus Christ and his children. Christ and his disciples (children) will be for signs and wonders (miracles). The Zion-realm is more than just a place. It is the realm where God and his people walk together in fellowship. God wants to dwell in Zion with his consecrated ones.
    marker-yv: yv-n
- type: usfm
