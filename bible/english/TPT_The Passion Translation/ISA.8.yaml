      - type: text
        text: Or “Shiloah.” Although some see this as a possible reference to one of the streams of the Gihon Spring, it is more likely a metaphor for the loving care, presence, and blessing of the Lord that flowed to them via David’s monarchy. The rejected blessing contrasts with the overflowing flood of the Euphrates (Assyria) that is about to sweep over the land. Because the Euphrates is a figure of speech for Assyria, Shiloah becomes a figure of speech for God’s loving care; a relational God seeks relationship with his people. He longed to be their fountain of peace, flowing within them like a gentle stream.
    marker-yv: yv-n
  - type: text
    text: 'and melt in fear '
  - type: usfm
