document_id: ISA.8,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Son Becomes a Sign
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me, “Take a large tablet '
  - type: note
    content: See also Hab. 2:2.
  - type: text
    content: 'and engrave upon it these words using the stylus of a man: '
  - type: note
    content: Or “in the form of a man” or “with an ordinary stylus.” God can use what is written by man to touch man. Weak, ordinary, frail man has the grace to write and speak for God. It was with the hand of a man that God wrote on the wall for Belshazzar and all his guests to see. See Dan. 5.
  - type: text
    content: 'Quickly—to the Plunder! Hurry—to the Loot! '
  - type: note
    content: This is the meaning of the Hebrew name of Isaiah’s soon-to-be-born son, Maher-Shalal-Hash-Baz.
  '10':
  - type: text
    content: Go ahead, hatch a plot, but it will be foiled!
  - type: text
    content: Go ahead, speak a word,
  - type: text
    content: but it will not stand, for God is with us!
  - type: note
    content: The Hebrew is immanuel.
  - type: heading
    content: A Snare or a Sanctuary
  '11':
  - type: text
    content: Yahweh
  - type: text
    content: '’s mighty hand rested on me, and he gave me a strong warning '
  - type: note
    content: Or “he turned me aside” (Dead Sea scroll 1QIsaa).
  - type: text
    content: 'not to act like '
  - type: note
    content: Or “walk in the way of.”
  - type: text
    content: these people.
  '12':
  - type: text
    content: '“Don’t believe their every conspiracy rumor. And don’t fear what they fear—don’t be moved or terrified. '
  '13':
  - type: text
    content: 'Fear nothing and no one except '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies! Honor him as holy. Be in awe before him with deepest reverence! '
  - type: note
    content: Or “dread.”
  '14':
  - type: text
    content: 'He will become for you a holy sanctuary but for them a stone people trip over. He is a rock that causes the two houses of Israel to stumble—a trap '
  - type: note
    content: Or “a noose.”
  - type: text
    content: 'and a snare for the people of Jerusalem. '
  - type: note
    content: See 1 Peter 2:8.
  '15':
  - type: text
    content: Many will stumble and fall and be broken. Yes, they will be snared and taken away captive.”
  - type: heading
    content: Trust in the Hidden God
  '16':
  - type: text
    content: 'Now, tie up the scroll and preserve it '
  - type: text
    content: as legal evidence
  - type: text
    content: '. Seal my instructions '
  - type: text
    content: for the future
  - type: text
    content: ' for my disciples. '
  '17':
  - type: text
    content: 'I will wait for the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', who hides his face '
  - type: note
    content: See Isa. 45:15.
  - type: text
    content: from the family of Jacob. And I will place all my hope in him!
  '18':
  - type: text
    content: 'Behold—here I stand, and the children whom the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has given me are for signs and wonders '
  - type: note
    content: Or “symbols.” Isaiah’s family was a living prophecy to all who discerned it.
  - type: text
    content: in Israel, sent from the Lord Almighty, Commander of Angel Armies, who is enthroned on Mount Zion!
  - type: note
    content: 'This verse has a dual meaning. Historically, it refers to Isaiah and his sons: Shear-Jashub, “a remnant will return,” and Maher-Shalal-Hash-Baz, “Quickly—to the Plunder! Hurry—to the Loot.” But there is another meaning to all this. In this verse, Isaiah becomes a type or picture of Christ, who would come to the earth (Immanuel). Hebrews 2:13 quotes this verse about the Lord Jesus Christ and his children. Christ and his disciples (children) will be for signs and wonders (miracles). The Zion-realm is more than just a place. It is the realm where God and his people walk together in fellowship. God wants to dwell in Zion with his consecrated ones.'
  - type: heading
    content: Darkness or the Light of Dawn
  '19':
  - type: text
    content: 'Now, suppose someone says, “Consult mediums and spiritists who moan and mutter their incantations in their ritual pits; after all, isn’t it right for people to seek oracles from their gods '
  - type: note
    content: Or “from God.”
  - type: text
    content: by asking the dead about the destiny of the living?”
  '2':
  - type: text
    content: 'Then summon two reliable men, Uriah the priest '
  - type: note
    content: See 2 Kings 16:10. Uriah means “Yahweh is my flame of light.”
  - type: text
    content: and Zechariah, son of Jeberechiah, to act as witnesses.”
  - type: note
    content: The prophetic act of Isaiah needed to be witnessed by men of stature so that when the fulfillment of the demise of the northern kingdom came to pass, it would be impossible to deny Isaiah’s prophetic message. Perhaps this scroll was unfurled like a banner outside Isaiah’s house or placed over an entrance into the temple area. It would have been publicized in some visible fashion. As the people would pass by this sign, they would wonder what it meant. This was a vivid way to make known the prophecy.
  '20':
  - type: text
    content: You are to answer them
  - type: text
    content: ': “Listen to the teaching and instruction of the Lord! If their speech does not line up with his word, they will have no light of dawn! '
  - type: note
    content: Or “dayspring.” The implication for the believer is that we will have a “dawn.” The light of dawn is the hope of Jesus Christ that grows inside of us. The path of the righteous is like the light of a sunrise shining in the eastern sky. From dark to dim to bright, it increases (Prov. 4:18). In times of calamity, make sure you quiet your heart and seal up the Word of God in your soul. The dawning of Christ’s glory is coming. For us, the early rays of morning light are already shining.
  '21':
  - type: text
    content: 'They will wander here and there, distressed and hungry. And when they are famished, they will be enraged and begin to curse their king and their God. '
  - type: note
    content: Or “gods.”
  - type: text
    content: 'If they look to the heavens '
  '22':
  - type: text
    content: or to the earth, they will find only despair and darkness and fearful gloom, and they will be thrust into obscure darkness!”
  - type: note
    content: Or “with no dawn.” The exact meaning of the Hebrew phrase is uncertain.
  '3':
  - type: text
    content: 'Then I slept with '
  - type: text
    content: my wife
  - type: text
    content: ', the prophetess; '
  - type: note
    content: Isaiah and his wife were a prophetic duo. Isaiah spoke the word of the Lord, then the prophetess “gave birth” to it. She would literally give birth to the word of God! At the birth of their son, God spoke again and told them the symbolic name of the child, the same message Isaiah had received earlier and had engraved for all to see. Maher-Shalal-Hash-Baz was a walking sign; a son became a sign.
  - type: text
    content: 'she became pregnant and gave birth to a son. Then the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' told me, “You will name him Quickly—to the Plunder! Hurry—to the Loot! '
  '4':
  - type: text
    content: For before the boy knows how to say ‘my father’ or ‘my mother,’ the wealth of Damascus and Samaria will be plundered and carried away by the king of Assyria!”
  - type: heading
    content: A Flood or a Peaceful Stream
  '5':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me again: '
  '6':
  - type: text
    content: '“Because these people have rejected the gentle flowing stream '
  - type: text
    content: of my loving presence
  - type: text
    content: ' '
  - type: note
    content: Or “Shiloah.” Although some see this as a possible reference to one of the streams of the Gihon Spring, it is more likely a metaphor for the loving care, presence, and blessing of the Lord that flowed to them via David’s monarchy. The rejected blessing contrasts with the overflowing flood of the Euphrates (Assyria) that is about to sweep over the land. Because the Euphrates is a figure of speech for Assyria, Shiloah becomes a figure of speech for God’s loving care; a relational God seeks relationship with his people. He longed to be their fountain of peace, flowing within them like a gentle stream.
  - type: text
    content: 'and melt in fear '
  - type: note
    content: Or “rejoice,” a Hebrew homophone for “melt in fear” or “rejoice.”
  - type: text
    content: 'before Rezin and the son of Remaliah, '
  '7':
  - type: text
    content: 'now, therefore, the Lord is about to bring against them the mighty, massive flood of the Euphrates. The king of Assyria and all his glory '
  - type: note
    content: That is, his vast armies.
  - type: text
    content: 'will overflow on you like a river flooding its channels and running over all its banks! '
  '8':
  - type: text
    content: 'It will flood into Judah, swirling over it, overflowing and reaching up to your neck, O Immanuel, '
  - type: note
    content: Or “God with us.”
  - type: text
    content: 'and spread out its wings '
  - type: note
    content: A possible metaphor for the Assyrian armies spreading over the land. God once spread out his wings over the Hebrew people and carried them to Sinai. Now the Assyrian armies spread out their wings and overwhelm them with destruction.
  - type: text
    content: over your entire land!”
  '9':
  - type: text
    content: 'You will be broken, '
  - type: note
    content: Or “Unite [assemble] yourselves.”
  - type: text
    content: O nations, and will be shattered.
  - type: text
    content: Listen, all you distant nations. Prepare for war,
  - type: note
    content: Or “Gird yourselves.”
  - type: text
    content: though it will backfire on you!
  - type: text
    content: Prepare for war, yet you will be shattered!
