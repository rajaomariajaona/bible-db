document_id: LUK.3,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: John the Baptizer
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'A powerful message from God came to John, Zechariah’s son, when he was living out in the lonely wilderness. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some believe that John may have been a member of the Qumran community of Jewish Essenes, who lived in the wilderness because they viewed the Jewish religious system as corrupt.
      marker-yv: yv-n
    - type: text
      text: 'This prophetic commission came to John during the fifteenth year of the reign of Emperor Tiberius, son of Caesar. Pontius Pilate was governor over Judea at that time. Antipas, son of Herod, was governor over Galilee, Herod’s brother Philip was over the region of Ituraea and Trachonitis, and Lysanias was over Abilene. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Abilene was a region west of Ituraea.
      marker-yv: yv-n
    - type: text
      text: This happened during the days of two high priests, Annas and Caiaphas.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As the forerunner of Jesus Christ, the prophet John was a hinge of human history who forever changed the world. Luke carefully dates this event by giving us six markers. Historians have dated the reign of Tiberius Caesar as beginning in AD 14. The fifteenth year of his reign would be AD 28–29. Regarding Annas and Caiaphas, never in Jewish history had there been two high priests. The priesthood was corrupt. Even though Caiaphas, Annas’ son-in-law, was the high priest, Annas remained the real authoritative leader behind the scenes (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 18:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 4:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The crowd kept asking him, “What then are we supposed to do?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: John told them, “Give food to the hungry, clothe the poor, and bless the needy.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text is literally “The one with two tunics is to share with him who has none, and he who has food is to do likewise.”
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Even the despised tax collectors came to John to be baptized, and they asked him, “What are we to do to prove our hearts have changed?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Be honest,” he replied. “Don’t demand more taxes than what the law requires.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: True repentance is tied to actions, a change of heart and deeds, not just words.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“And us?” asked some soldiers. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The soldiers were likely temple police.
      marker-yv: yv-n
    - type: text
      text: “What about us?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: John answered them, “Be content with what you earn. Never extort money or terrify others by threats of violence or be guilty of accusing the innocent.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: During those days, everyone was gripped with messianic expectations, believing the Messiah could come at any moment, and many began to wonder if John might be the Christ.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But John made it clear by telling them, “There is one coming who is mightier than I. He is supreme. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word translated “supreme” is found only in the Aramaic text. John was a true prophet who pointed others to the Supreme One.
      marker-yv: yv-n
    - type: text
      text: 'In fact, I’m not worthy of even being his slave. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “loose his sandal strap,” which only a slave would do.
      marker-yv: yv-n
    - type: text
      text: 'I can only baptize you in this river, but he will baptize you into the Spirit of holiness and into his raging fire. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic text reads “He will baptize you into the Spirit of the Holy One and in light.” A baptism of light or fire would cleanse and change a life, giving new power to live for God and deal with every issue that hinders love and passion from burning in our hearts. It is the baptism of the Holy Spirit that all believers need today.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'He has in his hands a winnowing fork to clean up his threshing floor! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The text is literally “in his hand is a winnowing fork.” This was a small pitchfork used to separate the chaff from the grain.
      marker-yv: yv-n
    - type: text
      text: He will separate the wheat from the chaff. The wheat he will gather into his barn, but he will burn the chaff in a fire that no one can ever put out!”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'John used many similar warnings as he preached the good news and prepared '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Translated from the Aramaic text.
      marker-yv: yv-n
    - type: text
      text: 'the people. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He even publicly rebuked Antipas, son of Herod, the governor of Galilee, for the many wicked things he had done. He fearlessly reprimanded him for seducing and marrying his sister-in-law, Herodias.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Adding to his many other sins, Herod had John seized and locked up in prison.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Baptism of Jesus
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: 'One day, Jesus came to be baptized '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus identified with sinners, even at his baptism. Although he had no sin, he chose to become one with sinners and was washed by John as a preview of what would happen when he became sin (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 5:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and was judged for our sins at the cross.
      marker-yv: yv-n
    - type: text
      text: 'along with all the others. As he was consumed with the spirit of prayer, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: We read about Jesus praying eight times in Luke’s Gospel. (1) At his baptism Jesus prayed and the heavens were opened, revealing his sonship. Jesus asked the Father to send the Holy Spirit to strengthen him for his wilderness temptations (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (2) Jesus prayed in solitude, and miracles broke loose in his ministry (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:16–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (3) Jesus prayed all night before he chose his twelve companions (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:12–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (4) Jesus prayed for his apostles to receive the full revelation of who he is (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:18–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (5) When Jesus was about to be glorified in splendor on the mountain, he prayed, and his face glowed with a flashing light (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:28–29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (6) Jesus prayed that he would be an example to every one of his disciples (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (7) Jesus prayed for Peter’s restoration and future ministry (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:31–32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (8) Jesus prayed in Gethsemane for strength and glory as the terrors of Calvary lay before him (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:41–46
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'the heavenly realm ripped open above him and the Holy Spirit descended from heaven in the form of a dove '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'What a beautiful picture: a dove resting on a lamb! To have the power of the Spirit (dove), we need to have the nature of the Lamb (Jesus). Although Jesus had the Holy Spirit from his birth, at his baptism he received the abiding presence of the Holy Spirit to fulfill his ministry. God gives more and more of his Spirit to those who love him and obey him.'
      marker-yv: yv-n
    - type: text
      text: 'and landed on him. Then God’s audible voice was heard, saying, “My Son, you are my beloved one. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The heavenly voice confirms the identity of Jesus as Messiah. God quoted
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 2:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 42:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', both of which are considered as speaking of the Christ. God publicly stated that Jesus was the long-awaited and much-loved Son, the Christ. The Trinity is clearly seen in this passage: Jesus, the Holy Spirit, and the Father.'
      marker-yv: yv-n
    - type: text
      text: Through you I am fulfilled.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As translated from the Aramaic text. The Greek text states, “in whom I am greatly pleased.” When the presence of the Holy Spirit came upon the Son of God, those around him heard the voice of the Father. We see from this a picture of the triune God, three in one. The Trinity is clearly seen in this passage: Jesus, the Holy Spirit, and the Father.'
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ancestry of Jesus Christ
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-38
    - type: text
      text: 'Jesus, whom everyone assumed to be Joseph’s son, was about thirty years old when he began his ministry. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:23–38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Old Testament priests could not begin their ministry until they were thirty years old. The number thirty is the biblical number of maturity. Both Joseph and David were promoted to the place of honor when they were thirty.
      marker-yv: yv-n
    - type: text
      text: 'Here are the names of Mary’s '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:23–38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Matthew gives us the genealogy of Jesus from Joseph’s family, while some suggest Luke’s genealogy is from Mary’s side. Luke is the only Gospel writer who gives much attention to women. Neither Matthew nor Luke gives a complete genealogy.
      marker-yv: yv-n
    - type: text
      text: 'ancestors, traced from her father all the way back to Adam:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eli, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:23–38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Matthew identifies Joseph’s father as Jacob (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 1:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), while Luke says he was Eli’s (Heli’s) son (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 3:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The ancient world often referred to a man’s sons-in-law as sons. Thus it is possible that Eli was Mary’s father and Joseph’s father-in-law.
      marker-yv: yv-n
    - type: text
      text: Matthat, Levi, Melki, Jannai, Joseph, Mattathias, Amos, Nahum, Esli, Naggai, Maath, Mattathias, Semein, Josech, Joda, Joanan, Rhesa, Zerubbabel, Shealtiel, Neri, Melchi, Addi, Cosam, Elmadam, Er, Joshua, Eliezer, Jorim, Matthat, Levi, Simeon, Judah, Joseph, Jonam, Eliakim, Melea, Menna, Mattatha, Nathan, David, Jesse, Obed, Boaz, Salmon, Nahshon, Amminadab, Admin, Arni, Hezron, Perez, Judah, Jacob, Isaac, Abraham, Terah, Nahor, Serug, Reu, Peleg, Eber, Shelah, Kenan, Arphaxad, Shem, Noah, Lamech, Methuselah, Enoch, Jared, Mahalaleel, Cainan, Enos, Seth, and Adam, the son of God.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'John went preaching and baptizing throughout the Jordan Valley. He persuaded people to turn away from their sins and turn to God '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The two concepts—“turning from sin” and “turning to God for freedom”—form the definition of repentance. The Aramaic word has the concept of returning to God, to unite with Unity.
      marker-yv: yv-n
    - type: text
      text: 'for the freedom of forgiveness, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: John’s message was revolutionary, for the religion of the day taught that forgiveness could only be found by annually offering sacrifices in the temple (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 10:1–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). John, an Essene, told the people that forgiveness of sin was a heart issue, not gained by an animal sacrifice offered in the corrupt religious system of the day. Repentance, which breaks open the heart, is more important than gaining forgiveness by religious acts.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'fulfilling what was written in the book of the prophet Isaiah:'
  - type: usfm
    marker: mi
    children:
    - type: text
      text: '“Listen! You will hear a thunderous voice in the lonely wilderness telling you to wake up and get your heart ready for the coming of the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'Make straight every twisted thing in your lives. '
  '5':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: Bring into the light every dark way. Make right every wrong. Remove injustice. Every heart of pride will humbly bow before him. Every deception will be exposed and replaced by the truth to prepare everyone everywhere to see the Life of God!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:5–6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text, quoting from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
