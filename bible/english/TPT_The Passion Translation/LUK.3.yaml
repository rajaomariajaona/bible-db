        - type: text
          text: God values reformation over ritual. John’s ministry was to prepare people for the appearing of Jesus Christ through repentance and baptism. Repentance breaks open the heart and changes our attitudes toward God. Baptism was a burial of those who repented, preparing them for the germination of Christ coming to live within by the new birth.
