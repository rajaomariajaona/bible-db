document_id: ISA.24,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaiah’s Apocalypse
  - type: text
    content: ' '
  - type: note
    content: Isaiah 24–27 is known as Isaiah’s Apocalypse because it contains eschatological prophecies that are also found in the book of Revelation.
  - type: text
    content: 'Behold! The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' is about to devastate the earth'
  - type: note
    content: Or “land.” This is the Hebrew word ’erets, used sixteen times in chapter 24. It can be translated “land,” “earth,” or “world.” The context would seem to describe a global judgment. Isaiah prophesied about eleven different nations in chapters 13–23, but here he described a judgment upon the whole world.
  - type: text
    content: and make it desolate.
  - type: text
    content: He will mar its surface and scatter the inhabitants.
  '10':
  - type: text
    content: The city lies in chaos, and no one can enter.
  '11':
  - type: text
    content: Riots break out because there is no wine.
  - type: text
    content: The sun has set on their gladness and joy;
  - type: text
    content: celebrations have disappeared from the earth.
  '12':
  - type: text
    content: The city is left desolate with her gates battered down.
  '13':
  - type: text
    content: As an olive tree is shaken clean of its olives
  - type: text
    content: and a grapevine picked clean of its grapes,
  - type: text
    content: so will be the fate of the nations.
  - type: heading
    content: The Song of the Remnant
  '14':
  - type: text
    content: The remnant
  - type: text
    content: ' '
  - type: note
    content: Or “They.” Verses 14–16 are some of the more difficult verses to translate in Isaiah due to a number of textual variants.
  - type: text
    content: lifts up its voice with a joyful shout.
  - type: text
    content: 'From the west they praise the majesty of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  '15':
  - type: text
    content: 'and in the east '
  - type: note
    content: Or “in the lights [fires],” a possible metaphor for the sunrise (the east).
  - type: text
    content: they give glory to the Lord God!
  - type: text
    content: 'The coastlands magnify the name of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: the Lord God of Israel!
  '16':
  - type: text
    content: From all over the world we hear their songs of praise—
  - type: text
    content: songs of glory and beauty to the Righteous One!
  - type: text
    content: 'But I said, “I '
  - type: text
    content: feel I’m
  - type: text
    content: ' wasting away.'
  - type: text
    content: I’m doomed; I’m wasting away.”
  - type: text
    content: With deception, deceivers deceive!
  - type: text
    content: With treachery, the treacherous betray!
  - type: note
    content: These lines contain a notable wordplay, using five Hebrew words with the identical triliteral root, bgd.
  '17':
  - type: text
    content: Terror, pit, and trap are waiting for you, inhabitants of the earth.
  '18':
  - type: text
    content: The one who flees from the report of terror will fall into the pit.
  - type: text
    content: And whoever crawls out of the pit will be caught by the trap.
  - type: text
    content: Heaven’s floodgates opened and earth’s foundations trembled.
  '19':
  - type: text
    content: The earth is breaking, breaking!
  - type: text
    content: The earth is crumbling, crumbling!
  - type: text
    content: The earth is tottering, tottering!
  '2':
  - type: text
    content: Everyone will experience the same fate—
  - type: text
    content: priests and people, masters and slaves,
  - type: text
    content: their maids and mistresses, buyers and sellers,
  - type: text
    content: lenders and borrowers, rich and poor.
  - type: note
    content: Or “debtor and creditor.” See Rev. 6:15.
  '20':
  - type: text
    content: The earth staggers like a drunkard,
  - type: text
    content: 'as a hut sways '
  - type: text
    content: in a storm
  - type: text
    content: .
  - type: text
    content: Its sin lies heavy upon it; it falls to rise no more.
  - type: heading
    content: The Lord Almighty Will Reign
  '21':
  - type: text
    content: 'In that day, the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' will punish heaven’s host'
  - type: note
    content: In this context, heaven’s host becomes a figure of speech for dark powers that operate in rebellion to God. See Eph. 6:10–14; Col. 2:15.
  - type: text
    content: and the kings of the earth.
  '22':
  - type: text
    content: They will be gathered together
  - type: text
    content: and locked up in a prison like prisoners in a pit,
  - type: text
    content: and after many days, they will be punished.
  - type: note
    content: Or “they will be remembered.”
  '23':
  - type: text
    content: Then the sun and moon will hang their heads in shame,
  - type: text
    content: 'for '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, will reign!'
  - type: note
    content: When God is unveiled in his glory-light, the sun and moon are nothing compared to him.
  - type: text
    content: He will manifest his glory on Mount Zion in Jerusalem,
  - type: text
    content: before all her elders!
  '3':
  - type: text
    content: The earth will be utterly devastated and ruined,
  - type: text
    content: 'for the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has spoken this word!'
  '4':
  - type: text
    content: 'The ground itself mourns '
  - type: note
    content: The Hebrew homonym can mean the ground “mourns [over the sin of its inhabitants]” or “dries up [with drought].” This is a powerful play on words in the Hebrew.
  - type: text
    content: and withers;
  - type: text
    content: the soil languishes over the sins of its people,
  - type: text
    content: and the wealthy elite wither and languish.
  '5':
  - type: text
    content: The people have polluted the earth beneath their feet
  - type: text
    content: by disobeying laws, violating truth,
  - type: note
    content: Or “moving past statutes.” See Mal. 2:5–7.
  - type: text
    content: and breaking the ancient, everlasting covenant.
  - type: note
    content: See Rom. 1:18–32.
  '6':
  - type: text
    content: Therefore a curse devours the earth;
  - type: text
    content: its people suffer under their guilt,
  - type: text
    content: causing earth’s inhabitants to dwindle,
  - type: note
    content: Or “burn up.” The Hebrew homonym kharah can mean “to diminish” or “to burn.”
  - type: text
    content: and their number is reduced to so few.
  '7':
  - type: text
    content: The new wine dries up, the vine withers,
  - type: text
    content: 'and all the party-goers groan '
  - type: text
    content: with disappointment
  - type: text
    content: .
  '8':
  - type: text
    content: The joyful mirth of the tambourines is stilled,
  - type: text
    content: the jubilant noise of the revelers is ended,
  - type: text
    content: and the happy sound of the harp falls silent.
  '9':
  - type: text
    content: No more wine and song!
  - type: text
    content: Hard liquor has become bitter to those who drink it.
