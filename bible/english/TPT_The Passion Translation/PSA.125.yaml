document_id: PSA.125,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: God’s Surrounding Presence
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of the stairway
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who trust in the Lord are as unshakable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as unmovable as mighty Mount Zion!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just as the mountains surround Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'so the Lord’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wraparound
    - type: text
      text: ' presence'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: surrounds his people, protecting them now and forever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked will not always rule over the godly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: provoking them to do what is evil.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, let your goodness be given away to your good people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to all your righteous ones!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But those who turn away from truth—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: them you will turn away from you, to follow their crooked ways.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: You will give them just what they deserve
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May Israel experience peace and prosperity!
