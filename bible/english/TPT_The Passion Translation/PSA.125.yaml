document_id: PSA.125,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Surrounding Presence
  - type: text
    content: A song of the stairway
  - type: text
    content: Those who trust in the Lord are as unshakable,
  - type: text
    content: as unmovable as mighty Mount Zion!
  '2':
  - type: text
    content: Just as the mountains surround Jerusalem,
  - type: text
    content: 'so the Lord’s '
  - type: text
    content: wraparound
  - type: text
    content: ' presence'
  - type: text
    content: surrounds his people, protecting them now and forever.
  '3':
  - type: text
    content: The wicked will not always rule over the godly,
  - type: text
    content: provoking them to do what is evil.
  '4':
  - type: text
    content: God, let your goodness be given away to your good people,
  - type: text
    content: to all your righteous ones!
  '5':
  - type: text
    content: But those who turn away from truth—
  - type: text
    content: them you will turn away from you, to follow their crooked ways.
  - type: text
    content: You will give them just what they deserve
  - type: text
    content: .
  - type: text
    content: May Israel experience peace and prosperity!
