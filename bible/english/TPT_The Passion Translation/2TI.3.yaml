document_id: 2TI.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Characteristics of the Last Days
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But you need to be aware that in the final days the culture of society will become extremely fierce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'People will be self-centered lovers of themselves '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “men will look out only for themselves.”
    marker-yv: yv-n
  - type: text
    text: 'and obsessed with money. They will boast of great things as they strut around in their arrogant pride and mock all that is right. They will ignore their own families. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “disloyal to their people.” The Greek is “disobedient to parents.”
    marker-yv: yv-n
  - type: text
    text: 'They will be ungrateful '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “rejecters of grace.”
    marker-yv: yv-n
  - type: text
    text: and ungodly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They will become addicted to hateful and malicious slander. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Because this phrase is also the description of the devil (the accuser or slanderer), it could be translated “they will be devils.”
    marker-yv: yv-n
  - type: text
    text: 'Slaves to their desires, they will be ferocious, belligerent haters of what is good and right. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: With brutal treachery, they will act without restraint, bigoted and wrapped in clouds of their conceit. They will find their delight in the pleasures of this world more than the pleasures of the loving God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They may pretend to have a respect for God, but in reality they want nothing to do with God’s power. Stay away from people like these! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For they are the ones who worm their way into the hearts of vulnerable women, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An alternate Greek translation could read “they intrude into households and by their heresies, take prisoners of those who are led astray by desires and sins.” The Aramaic, however, is clearly speaking of the gross immorality of the last days.
    marker-yv: yv-n
  - type: text
    text: 'spending the night with those who are captured by their lusts and steeped in sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They are always learning but never discover the revelation-knowledge of truth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: it
    children:
    - type: text
      text: History has given us an example of this with the Egyptian sorcerers
  - type: text
    text: ' Jannes and Jambres, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is a fascinating verse, for Jannes and Jambres are never mentioned by name in Exodus. It simply mentions the sorcerers who wanted to compete with Moses and his authority. These two names are, however, mentioned by Origen, one of the church fathers, who makes reference to the Book of Jannes and Jambres, but no complete copies of these books have ever been found.
    marker-yv: yv-n
  - type: text
    text: who stood against Moses in their arrogance. So it will be in the last days with those who reject the faith with their corrupt minds and arrogant hearts, standing against the truth of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But they will not advance, for everyone will see their madness, just as they did with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jannes and Jambres
  - type: text
    text: '!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the conclusion of Paul’s argument.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Timothy’s Loyalty
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But you, Timothy, have closely followed my example and the truth that I’ve imparted to you. You have modeled your life after the love and endurance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I’ve demonstrated in my ministry by not giving up
  - type: text
    text: '. The faith I have, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you now have
  - type: text
    text: '. What I have hungered for in life has now become '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your longing as well
  - type: text
    text: '. The patience I have with others, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you now demonstrate
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the same persecutions and difficulties I have endured, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you have also endured
  - type: text
    text: '. Yes, you know all about what I had to suffer while in Antioch, Iconium, and Lystra. You’re aware of all the persecution I endured there; yet the Lord delivered me from every single one of them! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For all who choose to live godly as worshipers of Jesus, the Anointed One, will also experience persecution.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But the evil men and sorcerers '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “deceivers.” The Greek word is “sorcerers.”
    marker-yv: yv-n
  - type: text
    text: 'will progress from bad to worse, deceived and deceiving, as they lead people further from the truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Yet you must continue to advance in strength with the truth wrapped around your heart, being assured by God that he’s the One '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: By implication “God.” However, some interpret this as his teachers.
    marker-yv: yv-n
  - type: text
    text: who has truly taught you all these things.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Remember what you were taught from your childhood from the Holy Scrolls '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “sacred Scriptures.”
    marker-yv: yv-n
  - type: text
    text: 'which can impart to you wisdom to experience everlasting life through the faith of Jesus, the Anointed One! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'God has transmitted his very substance into every Scripture, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Keep in mind that when Paul wrote this he was referring to the Torah and all the Old Testament writings. Today, “every Scripture” would include the New Testament as well.
    marker-yv: yv-n
  - type: text
    text: 'for it is God-breathed. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Word of God is inspired. Scripture is not simply a book that tells about God, it actually contains God. His breath is embedded in his Word.
    marker-yv: yv-n
  - type: text
    text: 'It will empower you by its instruction and correction, giving you the strength to take the right direction and lead you deeper into the path of godliness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then you will be God’s servant, fully mature and perfectly prepared to fulfill any assignment God gives you.
