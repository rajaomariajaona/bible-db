document_id: 2TI.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Characteristics of the Last Days
  - type: text
    content: 'But you need to be aware that in the final days the culture of society will become extremely fierce. '
  '10':
  - type: text
    content: 'But you, Timothy, have closely followed my example and the truth that I’ve imparted to you. You have modeled your life after the love and endurance '
  - type: text
    content: I’ve demonstrated in my ministry by not giving up
  - type: text
    content: '. The faith I have, '
  - type: text
    content: you now have
  - type: text
    content: '. What I have hungered for in life has now become '
  - type: text
    content: your longing as well
  - type: text
    content: '. The patience I have with others, '
  - type: text
    content: you now demonstrate
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'And the same persecutions and difficulties I have endured, '
  - type: text
    content: you have also endured
  - type: text
    content: '. Yes, you know all about what I had to suffer while in Antioch, Iconium, and Lystra. You’re aware of all the persecution I endured there; yet the Lord delivered me from every single one of them! '
  '12':
  - type: text
    content: For all who choose to live godly as worshipers of Jesus, the Anointed One, will also experience persecution.
  '13':
  - type: text
    content: 'But the evil men and sorcerers '
  - type: note
    content: Or “deceivers.” The Greek word is “sorcerers.”
  - type: text
    content: 'will progress from bad to worse, deceived and deceiving, as they lead people further from the truth. '
  '14':
  - type: text
    content: 'Yet you must continue to advance in strength with the truth wrapped around your heart, being assured by God that he’s the One '
  - type: note
    content: By implication “God.” However, some interpret this as his teachers.
  - type: text
    content: who has truly taught you all these things.
  '15':
  - type: text
    content: 'Remember what you were taught from your childhood from the Holy Scrolls '
  - type: note
    content: Or “sacred Scriptures.”
  - type: text
    content: 'which can impart to you wisdom to experience everlasting life through the faith of Jesus, the Anointed One! '
  '16':
  - type: text
    content: 'God has transmitted his very substance into every Scripture, '
  - type: note
    content: Keep in mind that when Paul wrote this he was referring to the Torah and all the Old Testament writings. Today, “every Scripture” would include the New Testament as well.
  - type: text
    content: 'for it is God-breathed. '
  - type: note
    content: The Word of God is inspired. Scripture is not simply a book that tells about God, it actually contains God. His breath is embedded in his Word.
  - type: text
    content: 'It will empower you by its instruction and correction, giving you the strength to take the right direction and lead you deeper into the path of godliness. '
  '17':
  - type: text
    content: Then you will be God’s servant, fully mature and perfectly prepared to fulfill any assignment God gives you.
  '2':
  - type: text
    content: 'People will be self-centered lovers of themselves '
  - type: note
    content: The Aramaic can be translated “men will look out only for themselves.”
  - type: text
    content: 'and obsessed with money. They will boast of great things as they strut around in their arrogant pride and mock all that is right. They will ignore their own families. '
  - type: note
    content: Or “disloyal to their people.” The Greek is “disobedient to parents.”
  - type: text
    content: 'They will be ungrateful '
  - type: note
    content: The Aramaic can be translated “rejecters of grace.”
  - type: text
    content: and ungodly.
  '3':
  - type: text
    content: 'They will become addicted to hateful and malicious slander. '
  - type: note
    content: Because this phrase is also the description of the devil (the accuser or slanderer), it could be translated “they will be devils.”
  - type: text
    content: 'Slaves to their desires, they will be ferocious, belligerent haters of what is good and right. '
  '4':
  - type: text
    content: With brutal treachery, they will act without restraint, bigoted and wrapped in clouds of their conceit. They will find their delight in the pleasures of this world more than the pleasures of the loving God.
  '5':
  - type: text
    content: 'They may pretend to have a respect for God, but in reality they want nothing to do with God’s power. Stay away from people like these! '
  '6':
  - type: text
    content: 'For they are the ones who worm their way into the hearts of vulnerable women, '
  - type: note
    content: An alternate Greek translation could read “they intrude into households and by their heresies, take prisoners of those who are led astray by desires and sins.” The Aramaic, however, is clearly speaking of the gross immorality of the last days.
  - type: text
    content: 'spending the night with those who are captured by their lusts and steeped in sin. '
  '7':
  - type: text
    content: They are always learning but never discover the revelation-knowledge of truth.
  '8':
  - type: text
    content: History has given us an example of this with the Egyptian sorcerers
  - type: text
    content: ' Jannes and Jambres, '
  - type: note
    content: This is a fascinating verse, for Jannes and Jambres are never mentioned by name in Exodus. It simply mentions the sorcerers who wanted to compete with Moses and his authority. These two names are, however, mentioned by Origen, one of the church fathers, who makes reference to the Book of Jannes and Jambres, but no complete copies of these books have ever been found.
  - type: text
    content: who stood against Moses in their arrogance. So it will be in the last days with those who reject the faith with their corrupt minds and arrogant hearts, standing against the truth of God.
  '9':
  - type: text
    content: 'But they will not advance, for everyone will see their madness, just as they did with '
  - type: text
    content: Jannes and Jambres
  - type: text
    content: '!'
  - type: note
    content: Implied in the conclusion of Paul’s argument.
  - type: heading
    content: Timothy’s Loyalty
