document_id: PSA.116
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: I’m Saved
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I am passionately in love with God because he listens to me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He hears my prayers and answers them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: As long as I live I’ll keep praying to him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for he stoops down to listen to my heart’s cry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Death once stared me in the face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I was close to slipping into its dark shadows.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was terrified and overcome with sorrow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I cried out to the Lord, “God, come and save me!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He was so kind, so gracious to me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of his passion toward me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: he made everything right and he restored me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So I’ve learned from my experience
- type: usfm
  marker: q1
  children:
  - type: text
    text: that God protects the vulnerable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I was broken and brought low,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but he answered me and came to my rescue!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Now I can say to myself and to all,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Relax and rest, be confident and serene,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the Lord rewards fully those who simply trust in him.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: God has rescued my soul from death’s fear
- type: usfm
  marker: q1
  children:
  - type: text
    text: and dried my eyes of many tears.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’s kept my feet firmly on his path
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: and strengthened me so that I may please him
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 116:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and walk before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' in his fields of life.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: Even when it seems I’m surrounded
- type: usfm
  marker: q1
  children:
  - type: text
    text: by many liars and my own fears,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and though I’m hurting in my suffering and trauma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I still stay faithful to God and speak words of faith.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So now, what can I ever give back to God
- type: usfm
  marker: q1
  children:
  - type: text
    text: to repay him for the blessings he’s poured out on me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I will lift up his cup of salvation and praise him extravagantly
- type: usfm
  marker: q1
  children:
  - type: text
    text: for all that he’s done for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I will fulfill the promise I made to God
- type: usfm
  marker: q1
  children:
  - type: text
    text: in the presence of his gathered people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: When one of God’s holy lovers dies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: it is costly to the Lord, touching his heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lord, because I am your loving servant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you have broken open my life and freed me from my chains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Now I’ll worship you passionately and bring to you
- type: usfm
  marker: q1
  children:
  - type: text
    text: my sacrifice of praise, drenched with thanksgiving!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I’ll keep my promise to you, God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: in the presence of your gathered people, just like I said I would.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I will worship you here in your living presence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: in the temple in Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will worship and sing hallelujah, for I praise you, Lord!
