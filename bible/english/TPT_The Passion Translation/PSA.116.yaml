document_id: PSA.116,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: I’m Saved
  - type: text
    content: I am passionately in love with God because he listens to me.
  - type: text
    content: He hears my prayers and answers them.
  '10':
  - type: text
    content: Even when it seems I’m surrounded
  - type: text
    content: by many liars and my own fears,
  - type: text
    content: and though I’m hurting in my suffering and trauma,
  - type: text
    content: I still stay faithful to God and speak words of faith.
  '12':
  - type: text
    content: So now, what can I ever give back to God
  - type: text
    content: to repay him for the blessings he’s poured out on me?
  '13':
  - type: text
    content: I will lift up his cup of salvation and praise him extravagantly
  - type: text
    content: for all that he’s done for me.
  '14':
  - type: text
    content: I will fulfill the promise I made to God
  - type: text
    content: in the presence of his gathered people.
  '15':
  - type: text
    content: When one of God’s holy lovers dies,
  - type: text
    content: it is costly to the Lord, touching his heart.
  '16':
  - type: text
    content: Lord, because I am your loving servant,
  - type: text
    content: you have broken open my life and freed me from my chains.
  '17':
  - type: text
    content: Now I’ll worship you passionately and bring to you
  - type: text
    content: my sacrifice of praise, drenched with thanksgiving!
  '18':
  - type: text
    content: I’ll keep my promise to you, God,
  - type: text
    content: in the presence of your gathered people, just like I said I would.
  '19':
  - type: text
    content: I will worship you here in your living presence,
  - type: text
    content: in the temple in Jerusalem.
  - type: text
    content: I will worship and sing hallelujah, for I praise you, Lord!
  '2':
  - type: text
    content: As long as I live I’ll keep praying to him,
  - type: text
    content: for he stoops down to listen to my heart’s cry.
  '3':
  - type: text
    content: Death once stared me in the face,
  - type: text
    content: and I was close to slipping into its dark shadows.
  - type: text
    content: I was terrified and overcome with sorrow.
  '4':
  - type: text
    content: I cried out to the Lord, “God, come and save me!”
  '5':
  - type: text
    content: He was so kind, so gracious to me.
  - type: text
    content: Because of his passion toward me,
  - type: text
    content: he made everything right and he restored me.
  '6':
  - type: text
    content: So I’ve learned from my experience
  - type: text
    content: that God protects the vulnerable.
  - type: text
    content: For I was broken and brought low,
  - type: text
    content: but he answered me and came to my rescue!
  '7':
  - type: text
    content: Now I can say to myself and to all,
  - type: text
    content: “Relax and rest, be confident and serene,
  - type: text
    content: for the Lord rewards fully those who simply trust in him.”
  '8':
  - type: text
    content: God has rescued my soul from death’s fear
  - type: text
    content: and dried my eyes of many tears.
  - type: text
    content: He’s kept my feet firmly on his path
  '9':
  - type: text
    content: and strengthened me so that I may please him
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: 'and walk before '
  - type: text
    content: Yahweh
  - type: text
    content: ' in his fields of life.'
