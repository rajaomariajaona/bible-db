document_id: GEN.50
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob’s Funeral
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joseph flung himself over Jacob, kissing him and weeping. And his tears fell on his father’s face. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: usfm
    marker: it
    children:
    - type: text
      text: When he was able to compose himself
  - type: text
    text: ', he ordered the royal physicians to embalm his father. So, they began the required forty-day process. The Egyptians mourned for Israel for seventy days, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and when the weeping period was over, Joseph approached Pharaoh’s officials and said to them, “Please, may I ask a personal favor? Bring my appeal before Pharaoh and tell him: '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A mourner was considered unclean and unable to come directly to Pharaoh, so Joseph made his appeal to Pharaoh’s officials. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Est. 4:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ‘My dying father made me promise that I would bury him in the land of Canaan—in a tomb he had hewn with his own hands. Please give me permission to go and bury my father; then I will return.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Pharaoh said to Joseph, “Go to Canaan, bury your father, and keep your promise to him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Joseph went to Canaan to bury his father, and all the officials of Pharaoh, the elite members of his court, and all of Egypt’s dignitaries accompanied him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'All of Joseph’s household and all his brothers and their father’s household went, too. Only the children and livestock remained behind in Goshen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Many chariots and horsemen—a huge entourage—accompanied Joseph '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to Canaan
  - type: text
    text: ' in a grand procession!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When they arrived at the threshing floor of Atad '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Atad
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “brambles.”
    marker-yv: yv-n
  - type: text
    text: 'on the other side of the Jordan, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The phrase “the other side of the Jordan” usually refers to the Transjordan. It is possible that the funeral procession crossed over the Jordan near Jericho, the place where Joshua would later cross with Israel to take possession of Canaan.
    marker-yv: yv-n
  - type: text
    text: 'they mourned loudly with bitter sorrow for a long time. And Joseph spent seven days there in ceremonial mourning for his father. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A strict custom of a seven-day period of mourning remains in Judaism even to this day. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Sam. 31:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Job 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . For the first time, Joseph returned to what had been his boyhood home for thirty-nine years, sadly, for his father’s funeral.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: When the people of Canaan saw the depth of mourning at the threshing floor of Atad, they said, “This is a solemn occasion of grief for the Egyptians,” and named the place near the Jordan, The Mourning of the Egyptians.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or, in Hebrew, “Abel Mizraim.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So Jacob’s sons did as they were instructed '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and carried his body to the land of Canaan. They buried him there in the cave in the field of Machpelah near Mamre, where Abraham had purchased a burial place from Ephron the Hittite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: After burying his father, Joseph returned to Egypt with his brothers and all who had gone with him to bury his father.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph Comforts His Brothers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When the brothers realized they were now without their father, they said, “What if Joseph still bears a grudge against us and decides to pay us back for all the trouble we brought on him?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So they sent this message to Joseph: “Before he died, your father left us this instruction: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ‘Tell Joseph that I beg him to completely forgive the sin of his brothers who treated him so harshly.’ Now, please forgive us, servants of the God of your father, of the horrible wrong we did to you.” Joseph cried and wept as they read this message to him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: His brothers’ shame brought Joseph to tears. Without hesitation, he offered them reassurance and forgiveness. Joseph spoke kindly to those who hurt him, and he comforted their hearts. He refused to harbor a grudge or treat them differently for what they had done.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then his brothers came and threw themselves down before Joseph’s feet, saying, “We are here as your slaves!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But Joseph '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dried his tears
  - type: text
    text: ' and said, “Don’t be afraid. How could I ever take the place of God? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Only God can judge, for he has perfect love and knows all things. Since we are not in his place, we only have the right to forgive. Many assume the role of a judge when they have someone cornered and vulnerable, but Joseph refused. He understood that God had turned the evil intentions of others into something good. God has power to transform pain into blessing when we love him through it all.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Even though you intended to hurt me, God intended it for good. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: It was his plan all along
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 16:9
      metadata:
        usfm: PRO.16.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:24
      metadata:
        usfm: PRO.20.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 8:28
      metadata:
        usfm: ROM.8.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'to ensure the survival of many people. So, don’t worry. I myself will provide for you all that you need, both for you and your little ones.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: more
  - type: text
    text: ' kind, reassuring words, Joseph comforted his brothers.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph Dies in Egypt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Joseph lived in Egypt along with his father’s family and lived to be one hundred and ten years old. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: From ancient Egyptian writings we learn that Egyptians considered the age of one hundred and ten to be the ideal life span.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He lived to see the third generation of Ephraim’s children. Joseph also lived to see the children of Makir, son of Manasseh; and Joseph gave Makir’s children inheritance rights.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Makir’s children were born on Joseph’s knees,” a figure of speech for being given inheritance rights.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then Joseph declared to his brothers, “I will die one day, but God will certainly come to you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “visit you.”
    marker-yv: yv-n
  - type: text
    text: 'and fulfill his promises to bring you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and your descendants
  - type: text
    text: ' from this land and lead you to the land he promised to Abraham, Isaac, and Jacob.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: So Joseph had his brothers, the sons of Israel, make a solemn oath, saying, “When God comes to you, you will carry my bones up from Egypt.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Even in death, Joseph fixed his eyes on eternity. Joseph foresaw life beyond the grave. By his astonishing declaration about his bones, Joseph proclaimed he lived for the promises rather than temporal concerns; he refused to be identified with his successes, accomplishments, or the blessings on his life, but only with the promises. He proclaimed that his home was not Egypt but the promised land. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 11:22
      metadata:
        usfm: HEB.11.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Joseph died at the age of one hundred and ten. He was embalmed and placed in a coffin in Egypt.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Genesis begins with God and ends with a coffin in Egypt. It begins with God’s command for light to sparkle, thrusting its way throughout the universe, and it ends here with this sad moment as a family grieved over a loved one who had passed away. Genesis ends with the reader longing for the curse of sin and death to be broken. Exodus will bring us closer to seeing the Passover Lamb (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 5:7
      metadata:
        usfm: 1CO.5.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) who would one day be born to take away the sin of the world.
    marker-yv: yv-n
