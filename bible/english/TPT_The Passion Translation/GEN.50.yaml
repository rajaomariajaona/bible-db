document_id: GEN.50,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob’s Funeral
  - type: text
    content: 'Joseph flung himself over Jacob, kissing him and weeping. And his tears fell on his father’s face. '
  '10':
  - type: text
    content: 'When they arrived at the threshing floor of Atad '
  - type: note
    content: Atad means “brambles.”
  - type: text
    content: 'on the other side of the Jordan, '
  - type: note
    content: The phrase “the other side of the Jordan” usually refers to the Transjordan. It is possible that the funeral procession crossed over the Jordan near Jericho, the place where Joshua would later cross with Israel to take possession of Canaan.
  - type: text
    content: 'they mourned loudly with bitter sorrow for a long time. And Joseph spent seven days there in ceremonial mourning for his father. '
  - type: note
    content: A strict custom of a seven-day period of mourning remains in Judaism even to this day. See 1 Sam. 31:13; Job 2:13. For the first time, Joseph returned to what had been his boyhood home for thirty-nine years, sadly, for his father’s funeral.
  '11':
  - type: text
    content: When the people of Canaan saw the depth of mourning at the threshing floor of Atad, they said, “This is a solemn occasion of grief for the Egyptians,” and named the place near the Jordan, The Mourning of the Egyptians.
  - type: note
    content: Or, in Hebrew, “Abel Mizraim.”
  '12':
  - type: text
    content: 'So Jacob’s sons did as they were instructed '
  '13':
  - type: text
    content: 'and carried his body to the land of Canaan. They buried him there in the cave in the field of Machpelah near Mamre, where Abraham had purchased a burial place from Ephron the Hittite. '
  '14':
  - type: text
    content: After burying his father, Joseph returned to Egypt with his brothers and all who had gone with him to bury his father.
  - type: heading
    content: Joseph Comforts His Brothers
  '15':
  - type: text
    content: 'When the brothers realized they were now without their father, they said, “What if Joseph still bears a grudge against us and decides to pay us back for all the trouble we brought on him?” '
  '16':
  - type: text
    content: 'So they sent this message to Joseph: “Before he died, your father left us this instruction: '
  '17':
  - type: text
    content: ‘Tell Joseph that I beg him to completely forgive the sin of his brothers who treated him so harshly.’ Now, please forgive us, servants of the God of your father, of the horrible wrong we did to you.” Joseph cried and wept as they read this message to him.
  - type: note
    content: His brothers’ shame brought Joseph to tears. Without hesitation, he offered them reassurance and forgiveness. Joseph spoke kindly to those who hurt him, and he comforted their hearts. He refused to harbor a grudge or treat them differently for what they had done.
  '18':
  - type: text
    content: Then his brothers came and threw themselves down before Joseph’s feet, saying, “We are here as your slaves!”
  '19':
  - type: text
    content: 'But Joseph '
  - type: text
    content: dried his tears
  - type: text
    content: ' and said, “Don’t be afraid. How could I ever take the place of God? '
  - type: note
    content: Only God can judge, for he has perfect love and knows all things. Since we are not in his place, we only have the right to forgive. Many assume the role of a judge when they have someone cornered and vulnerable, but Joseph refused. He understood that God had turned the evil intentions of others into something good. God has power to transform pain into blessing when we love him through it all.
  '2':
  - type: text
    content: When he was able to compose himself
  - type: text
    content: ', he ordered the royal physicians to embalm his father. So, they began the required forty-day process. The Egyptians mourned for Israel for seventy days, '
  '20':
  - type: text
    content: 'Even though you intended to hurt me, God intended it for good. '
  - type: text
    content: It was his plan all along
  - type: text
    content: ', '
  - type: note
    content: See Prov. 16:9; 20:24; Rom. 8:28.
  - type: text
    content: 'to ensure the survival of many people. So, don’t worry. I myself will provide for you all that you need, both for you and your little ones.” '
  '21':
  - type: text
    content: 'Then with '
  - type: text
    content: more
  - type: text
    content: ' kind, reassuring words, Joseph comforted his brothers.'
  - type: heading
    content: Joseph Dies in Egypt
  '22':
  - type: text
    content: 'Joseph lived in Egypt along with his father’s family and lived to be one hundred and ten years old. '
  - type: note
    content: From ancient Egyptian writings we learn that Egyptians considered the age of one hundred and ten to be the ideal life span.
  '23':
  - type: text
    content: He lived to see the third generation of Ephraim’s children. Joseph also lived to see the children of Makir, son of Manasseh; and Joseph gave Makir’s children inheritance rights.
  - type: note
    content: Or “Makir’s children were born on Joseph’s knees,” a figure of speech for being given inheritance rights.
  '24':
  - type: text
    content: 'Then Joseph declared to his brothers, “I will die one day, but God will certainly come to you '
  - type: note
    content: Or “visit you.”
  - type: text
    content: 'and fulfill his promises to bring you '
  - type: text
    content: and your descendants
  - type: text
    content: ' from this land and lead you to the land he promised to Abraham, Isaac, and Jacob.” '
  '25':
  - type: text
    content: So Joseph had his brothers, the sons of Israel, make a solemn oath, saying, “When God comes to you, you will carry my bones up from Egypt.”
  - type: note
    content: Even in death, Joseph fixed his eyes on eternity. Joseph foresaw life beyond the grave. By his astonishing declaration about his bones, Joseph proclaimed he lived for the promises rather than temporal concerns; he refused to be identified with his successes, accomplishments, or the blessings on his life, but only with the promises. He proclaimed that his home was not Egypt but the promised land. See Heb. 11:22.
  '26':
  - type: text
    content: Joseph died at the age of one hundred and ten. He was embalmed and placed in a coffin in Egypt.
  - type: note
    content: Genesis begins with God and ends with a coffin in Egypt. It begins with God’s command for light to sparkle, thrusting its way throughout the universe, and it ends here with this sad moment as a family grieved over a loved one who had passed away. Genesis ends with the reader longing for the curse of sin and death to be broken. Exodus will bring us closer to seeing the Passover Lamb (see 1 Cor. 5:7) who would one day be born to take away the sin of the world.
  '4':
  - type: text
    content: 'and when the weeping period was over, Joseph approached Pharaoh’s officials and said to them, “Please, may I ask a personal favor? Bring my appeal before Pharaoh and tell him: '
  - type: note
    content: A mourner was considered unclean and unable to come directly to Pharaoh, so Joseph made his appeal to Pharaoh’s officials. See Est. 4:2.
  '5':
  - type: text
    content: ‘My dying father made me promise that I would bury him in the land of Canaan—in a tomb he had hewn with his own hands. Please give me permission to go and bury my father; then I will return.’ ”
  '6':
  - type: text
    content: Pharaoh said to Joseph, “Go to Canaan, bury your father, and keep your promise to him.”
  '7':
  - type: text
    content: 'So Joseph went to Canaan to bury his father, and all the officials of Pharaoh, the elite members of his court, and all of Egypt’s dignitaries accompanied him. '
  '8':
  - type: text
    content: 'All of Joseph’s household and all his brothers and their father’s household went, too. Only the children and livestock remained behind in Goshen. '
  '9':
  - type: text
    content: 'Many chariots and horsemen—a huge entourage—accompanied Joseph '
  - type: text
    content: to Canaan
  - type: text
    content: ' in a grand procession!'
