      marker: fr
      children:
      - type: text
        text: 21:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Elam (
    - type: usfm
      marker: it
      children:
      - type: text
        text: Elam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “hidden” or “concealed”) is the modern-day coastal area of Iran. Media (
    - type: usfm
      marker: it
