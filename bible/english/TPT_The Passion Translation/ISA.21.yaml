        usfm: REV.5.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I continually stand on this watchtower day after day
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you, O Lord.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m stationed at my post throughout the night.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The New Testament ministry of a “watchman” is that of an intercessor. It is important that every church and every city has intercessors to “stand on this watchtower day after day.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Look! Someone’s coming!
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s a man in a chariot with a team of horses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He shouts out, ‘Fallen, fallen, Babylon has fallen!
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the idols of their gods lie shattered on the ground!’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: My people, lying crushed on the threshing floor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I declare to you what I have heard from the God of Israel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
