document_id: ISA.21,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy concerning Babylon
  - type: text
    content: 'Here is a prophecy concerning '
  - type: text
    content: Babylon
  - type: text
    content: ', the Desert by the Sea:'
  - type: note
    content: That is, by the Persian Gulf.
  - type: text
    content: As whirlwinds rushing in from the southland,
  - type: text
    content: an invader
  - type: text
    content: ' '
  - type: note
    content: Or “disaster.”
  - type: text
    content: comes in from the desert, from a land to be feared.
  '10':
  - type: text
    content: My people, lying crushed on the threshing floor,
  - type: text
    content: I declare to you what I have heard from the God of Israel,
  - type: text
    content: Yahweh
  - type: text
    content: ', the Commander of Angel Armies.'
  - type: heading
    content: A Prophecy concerning Dumah (Edom)
  '11':
  - type: text
    content: 'Here is a prophecy about Dumah:'
  - type: note
    content: Dumah is a location in northern Arabia and is a poetic term for Edom, an ancient kingdom situated south of the Dead Sea. Dumah means “stillness [of death].” It was the land of Esau’s descendants. See Gen. 32:3; Num. 24:18. The Hebrew root word for “Edom” is “Adam.”
  - type: text
    content: 'Someone keeps calling me from the land of Edom, '
  - type: note
    content: Or “Seir,” a mountain in Edom. This is another name for the land inhabited by the Edomites. Seir means “hairy goat,” “faun,” or “satyr.” It is found thirty-nine times in the Old Testament.
  - type: text
    content: saying,
  - type: text
    content: “Watchman, how much longer is the night?
  - type: text
    content: Watchman, how much longer is the night?”
  '12':
  - type: text
    content: The watchman answers,
  - type: text
    content: '“Morning comes, but '
  - type: text
    content: a dark
  - type: text
    content: ' night endures.'
  - type: note
    content: Or “Morning [a new day] is coming, but so is night [judgment].”
  - type: text
    content: If you want to ask again, then come back and ask.”
  - type: note
    content: Or “Turn [repent], then come back and ask again.”
  - type: heading
    content: A Prophecy Concerning Arabia
  '13':
  - type: text
    content: 'A prophecy concerning Arabia:'
  - type: text
    content: You caravans from Dedan,
  - type: text
    content: you will camp among the thickets in the desert land of Arabia.
  - type: note
    content: That is, they will be forced off the beaten path to hide from the invading Assyrians. The Dedanites were merchants who shipped their goods to Tyre (Phoenicia). Arabia, or “the land of Arabs,” means “sterility,” “darkened,” “intermixed,” “stranger,” “barren,” or “wild.” Arabia is mentioned six times in the Old Testament. See Gal. 1:17.
  '14':
  - type: text
    content: 'People of Tema, '
  - type: note
    content: Tema was a descendant of Abraham (see 1 Chron. 1:28–30). Tema (modern-day Tayma) is also a city in northern Saudi Arabia. Tema means “sunny,” “good fortune,” or “prosperity.”
  - type: text
    content: come and bring water to the thirsty
  - type: text
    content: and bread for the fugitives.
  '15':
  - type: text
    content: For they have fled from the battle, from the drawn swords,
  - type: text
    content: from the bent bows, and from the weight of warfare.
  '16':
  - type: text
    content: 'This is what the Sovereign God said to me:'
  - type: text
    content: “Within exactly one year,
  - type: note
    content: Or “Within one year according to the years of a hired worker.”
  - type: text
    content: 'all the splendor of Kedar '
  - type: note
    content: Kedar means “dark skinned.” Kedar was a son of Ishmael, and his descendants settled in the Arabian desert. Kedar is likely a metonymy for northern Arabia.
  - type: text
    content: will end.
  '17':
  - type: text
    content: And all the weapons left of Kedar’s warriors will be few,
  - type: text
    content: 'for the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, has spoken.”'
  '2':
  - type: text
    content: 'A terrifying revelation has been given to me:'
  - type: text
    content: The betrayer betrays; the destroyer destroys.
  - type: text
    content: 'Arise, you Elamites! '
  - type: note
    content: Elam (Elam means “hidden” or “concealed”) is the modern-day coastal area of Iran. Media (Media means “middle-land”) is the north-central region of Iran. Both regions made up a major portion of the Persian Empire, which destroyed Babylon in 539 BC.
  - type: text
    content: Lay siege, you Medes!
  - type: note
    content: It is as though God is commanding Babylon’s enemies to betray and destroy her. This prophecy was given to Isaiah two hundred years before it took place.
  - type: text
    content: I will put an end
  - type: text
    content: 'to all the grief she brought '
  - type: text
    content: to the nations
  - type: text
    content: .
  '3':
  - type: text
    content: There’s a churning deep inside me,
  - type: text
    content: like labor pains of a woman about to give birth.
  - type: text
    content: I’m too anguished by what I hear
  - type: text
    content: and too frightened by what I see.
  - type: note
    content: Or “too anguished to hear, too frightened to see.”
  '4':
  - type: text
    content: My mind is reeling; I’m filled with panic.
  - type: text
    content: I longed for twilight, but now I tremble through the night.
  - type: note
    content: The wording of vv. 3–4 seems to indicate that Isaiah is brought into a state of prophetic ecstasy as he shook under the intensity of the weight of the prophetic utterance. See Scott, Vestus Testamentum 2, 1952, 278–282.
  '5':
  - type: text
    content: I see them
  - type: text
    content: ' prepare the table and spread their rugs,'
  - type: text
    content: then they eat and they drink.
  - type: note
    content: It’s as though Isaiah saw prophetically into the room where Belshazzar was feasting, and Belshazzar had no clue his fall was imminent (see Dan. 5).
  - type: text
    content: 'Get up, you military officers! Anoint your shields '
  - type: note
    content: Or “Oil your shields.”
  - type: text
    content: for battle!
  '6':
  - type: text
    content: 'For this is what the Lord said to me:'
  - type: text
    content: “Go post a sentry and have him report what he sees.
  '7':
  - type: text
    content: When he sees them come with chariots
  - type: text
    content: and advancing warriors riding on horses, donkeys, and camels,
  - type: text
    content: let him be alert—extremely alert!”
  '8':
  - type: text
    content: Then the sentry cries out,
  - type: note
    content: Or “He cried out, ‘A lion!’ ” See Rev. 5:5.
  - type: text
    content: “I continually stand on this watchtower day after day
  - type: text
    content: for you, O Lord.
  - type: text
    content: I’m stationed at my post throughout the night.
  - type: note
    content: The New Testament ministry of a “watchman” is that of an intercessor. It is important that every church and every city has intercessors to “stand on this watchtower day after day.”
  '9':
  - type: text
    content: Look! Someone’s coming!
  - type: text
    content: It’s a man in a chariot with a team of horses.
  - type: text
    content: He shouts out, ‘Fallen, fallen, Babylon has fallen!
  - type: text
    content: All the idols of their gods lie shattered on the ground!’ ”
