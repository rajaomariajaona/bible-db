  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: There’s a churning deep inside me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like labor pains of a woman about to give birth.
- type: usfm
  marker: q1
  children:
  - type: text
