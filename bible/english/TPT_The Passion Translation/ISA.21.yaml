      children:
      - type: text
        text: 21:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “too anguished to hear, too frightened to see.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: My mind is reeling; I’m filled with panic.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I longed for twilight, but now I tremble through the night.
  - type: usfm
    marker: f
    children:
