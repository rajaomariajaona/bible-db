    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “middle-land”) is the north-central region of Iran. Both regions made up a major portion of the Persian Empire, which destroyed Babylon in 539 BC.
    marker-yv: yv-n
  - type: text
    text: Lay siege, you Medes!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is as though God is commanding Babylon’s enemies to betray and destroy her. This prophecy was given to Isaiah two hundred years before it took place.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will put an end
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'to all the grief she brought '
  - type: usfm
    marker: it
    children:
    - type: text
