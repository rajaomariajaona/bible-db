document_id: PSA.40,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Joyful Salvation
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A song of poetic praise by King David
  - type: text
    content: I waited and waited and waited some more,
  - type: text
    content: patiently, knowing God would come through for me.
  - type: text
    content: Then, at last, he bent down and listened to my cry.
  '10':
  - type: text
    content: I don’t keep it a secret or hide the truth.
  - type: text
    content: I preach of your faithfulness and kindness,
  - type: text
    content: proclaiming your extravagant love to the largest crowd I can find!
  '11':
  - type: text
    content: So Lord, don’t hold back your love or withhold
  - type: text
    content: your tender mercies from me.
  - type: text
    content: Keep me in your truth and let your compassion overflow to me
  - type: text
    content: no matter what I face.
  '12':
  - type: text
    content: Evil surrounds me; problems greater than I can solve
  - type: text
    content: come one after another.
  - type: text
    content: Without you, I know I can’t make it.
  - type: text
    content: My sins are so many!
  - type: text
    content: I’m so ashamed to lift my face to you.
  - type: text
    content: For my guilt grabs me and stings my soul
  - type: text
    content: until I am weakened and spent.
  '13':
  - type: text
    content: Please, Lord! Come quickly and rescue me!
  - type: text
    content: Take pleasure in showing me your favor and restore me.
  '14':
  - type: text
    content: Let all who seek my life be humiliated!
  - type: text
    content: Let them be confused and ashamed, God.
  - type: text
    content: Scatter those who wish me evil; they just want me dead.
  '15':
  - type: text
    content: Scoff at every scoffer and cause them all to be utter failures.
  - type: text
    content: Let them be ashamed and horrified by their complete defeat.
  '16':
  - type: text
    content: But let all who passionately seek you
  - type: text
    content: erupt with excitement and joy over what you’ve done!
  - type: text
    content: 'Let all your devoted lovers rejoice continually in the Savior, '
  - type: note
    content: This verse contains the root word for Yeshua in Hebrew.
  - type: text
    content: saying,
  - type: text
    content: “How great and glorious is our God!”
  '17':
  - type: text
    content: 'Lord, in my place of weakness and need, I ask again:'
  - type: text
    content: Will you come and help me?
  - type: text
    content: I know I’m always in your thoughts.
  - type: text
    content: You are my true Savior and hero,
  - type: text
    content: so don’t delay to deliver me now, for you are my God.
  '2':
  - type: text
    content: He stooped down to lift me out of danger
  - type: text
    content: from the desolate pit I was in,
  - type: text
    content: out of the muddy mess I had fallen into.
  - type: text
    content: Now he’s lifted me up into a firm, secure place
  - type: text
    content: and steadied me while I walk along his ascending path.
  '3':
  - type: text
    content: A new song for a new day rises up in me
  - type: text
    content: every time I think about how he breaks through for me!
  - type: text
    content: Ecstatic praise pours out of my mouth until
  - type: text
    content: everyone hears how God has set me free.
  - type: text
    content: Many will see his miracles;
  - type: text
    content: they’ll stand in awe of God and fall in love with him!
  '4':
  - type: text
    content: Blessing after blessing comes to those who love and trust the Lord.
  - type: text
    content: They will not fall away,
  - type: text
    content: for they refuse to listen to the lies of the proud.
  '5':
  - type: text
    content: O Lord, our God, no one can compare with you.
  - type: text
    content: Such wonderful works and miracles are all found with you!
  - type: text
    content: And you think of us all the time
  - type: text
    content: with your countless expressions of love—
  - type: text
    content: far exceeding our expectations!
  '6':
  - type: text
    content: It’s not sacrifices that really move your heart.
  - type: text
    content: Burnt offerings, sin offerings—those aren’t what bring you joy.
  - type: text
    content: But when you open my ears and speak to me,
  - type: text
    content: I become your willing servant, your prisoner of love for life.
  - type: note
    content: The Septuagint is “a body you have prepared for me.” The Hebrew reads “You have pierced my ear.” This is a Hebraic reference to being a bond servant whose ear has been pierced by his master to signify the servant’s desire to serve for life. See Ex. 21:1–6; Isa. 50:5; Heb. 10:5.
  '7':
  - type: text
    content: 'So I said, “Here I am! I’m coming '
  - type: text
    content: to you as a sacrifice
  - type: text
    content: ','
  - type: note
    content: Implied in the context. See Heb. 10:5–7.
  - type: text
    content: for in the prophetic scrolls of your book
  - type: text
    content: you have written about me.
  '8':
  - type: text
    content: I delight to fulfill your will, my God,
  - type: text
    content: for your living words are written upon the pages of my heart.”
  '9':
  - type: text
    content: I tell everyone everywhere the truth of your righteousness.
  - type: text
    content: And you know I haven’t held back in telling the message to all.
