document_id: PSA.40
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: A Joyful Salvation
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: A song of poetic praise by King David
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I waited and waited and waited some more,
- type: usfm
  marker: q1
  children:
  - type: text
    text: patiently, knowing God would come through for me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then, at last, he bent down and listened to my cry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He stooped down to lift me out of danger
- type: usfm
  marker: q1
  children:
  - type: text
    text: from the desolate pit I was in,
- type: usfm
  marker: q1
  children:
  - type: text
    text: out of the muddy mess I had fallen into.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now he’s lifted me up into a firm, secure place
- type: usfm
  marker: q1
  children:
  - type: text
    text: and steadied me while I walk along his ascending path.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A new song for a new day rises up in me
- type: usfm
  marker: q1
  children:
  - type: text
    text: every time I think about how he breaks through for me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ecstatic praise pours out of my mouth until
- type: usfm
  marker: q1
  children:
  - type: text
    text: everyone hears how God has set me free.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Many will see his miracles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they’ll stand in awe of God and fall in love with him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Blessing after blessing comes to those who love and trust the Lord.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will not fall away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for they refuse to listen to the lies of the proud.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: O Lord, our God, no one can compare with you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Such wonderful works and miracles are all found with you!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you think of us all the time
- type: usfm
  marker: q1
  children:
  - type: text
    text: with your countless expressions of love—
- type: usfm
  marker: q1
  children:
  - type: text
    text: far exceeding our expectations!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: It’s not sacrifices that really move your heart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Burnt offerings, sin offerings—those aren’t what bring you joy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But when you open my ears and speak to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I become your willing servant, your prisoner of love for life.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 40:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint is “a body you have prepared for me.” The Hebrew reads “You have pierced my ear.” This is a Hebraic reference to being a bond servant whose ear has been pierced by his master to signify the servant’s desire to serve for life. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 21:1–6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 50:5
      metadata:
        usfm: ISA.50.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 10:5
      metadata:
        usfm: HEB.10.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So I said, “Here I am! I’m coming '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to you as a sacrifice
  - type: text
    text: ','
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 40:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the context. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 10:5–7
      metadata:
        usfm: HEB.10.5+HEB.10.6+HEB.10.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: for in the prophetic scrolls of your book
- type: usfm
  marker: q1
  children:
  - type: text
    text: you have written about me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I delight to fulfill your will, my God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for your living words are written upon the pages of my heart.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I tell everyone everywhere the truth of your righteousness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you know I haven’t held back in telling the message to all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I don’t keep it a secret or hide the truth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I preach of your faithfulness and kindness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: proclaiming your extravagant love to the largest crowd I can find!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So Lord, don’t hold back your love or withhold
- type: usfm
  marker: q1
  children:
  - type: text
    text: your tender mercies from me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep me in your truth and let your compassion overflow to me
- type: usfm
  marker: q1
  children:
  - type: text
    text: no matter what I face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Evil surrounds me; problems greater than I can solve
- type: usfm
  marker: q1
  children:
  - type: text
    text: come one after another.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Without you, I know I can’t make it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My sins are so many!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m so ashamed to lift my face to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For my guilt grabs me and stings my soul
- type: usfm
  marker: q1
  children:
  - type: text
    text: until I am weakened and spent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Please, Lord! Come quickly and rescue me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take pleasure in showing me your favor and restore me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Let all who seek my life be humiliated!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them be confused and ashamed, God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Scatter those who wish me evil; they just want me dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Scoff at every scoffer and cause them all to be utter failures.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them be ashamed and horrified by their complete defeat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But let all who passionately seek you
- type: usfm
  marker: q1
  children:
  - type: text
    text: erupt with excitement and joy over what you’ve done!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let all your devoted lovers rejoice continually in the Savior, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 40:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This verse contains the root word for Yeshua in Hebrew.
    marker-yv: yv-n
  - type: text
    text: saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “How great and glorious is our God!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Lord, in my place of weakness and need, I ask again:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will you come and help me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I know I’m always in your thoughts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are my true Savior and hero,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so don’t delay to deliver me now, for you are my God.
