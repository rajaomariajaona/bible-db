document_id: ZEC.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Sixth Vision: The Flying Scroll'
  - type: text
    content: 'Then I had another vision. I looked up and saw a flying scroll. '
  '10':
  - type: text
    content: So I asked the angel who was talking to me, “Where are they taking the barrel?”
  '11':
  - type: text
    content: 'He replied, “To '
  - type: text
    content: the wicked land of
  - type: text
    content: ' Babylon, '
  - type: note
    content: Or “Shinar,” an ancient, poetical name for Babylonia.
  - type: text
    content: where they will build a temple and make a pedestal for it. They will place it there and worship it.”
  - type: note
    content: See Rev. 17–18.
  '2':
  - type: text
    content: The angel
  - type: text
    content: ' asked me, “What do you see?” I replied, “I see a flying scroll. It looks about thirty-five feet long and seventeen feet wide.” '
  - type: note
    content: Or “twenty cubits long and ten cubits wide” (about ten meters long and five meters wide). It is difficult to be precise in the length of a cubit. Generally, a standard cubit is believed to be about 17.5 inches or 0.44 meters. A long cubit was a cubit plus a handbreadth (3.5 inches or 90 millimeters); in total about 21 inches or 0.53 meters. Unless otherwise noted, conversions from cubits to modern units in this translation will be calculated using the long cubit measurement. The measurements of the scroll are identical to the measurements of the porch of Solomon’s Temple (see 1 Kings 6:3).
  '3':
  - type: text
    content: 'Then he explained to me its meaning:'
  - type: text
    content: '“This '
  - type: text
    content: scroll
  - type: text
    content: ' contains God’s curse '
  - type: text
    content: against evildoers
  - type: text
    content: ' sweeping over the whole land. On one side of the scroll, it says that the Lord will banish '
  - type: note
    content: The Hebrew verb found here (naqah) in the Niphal form may carry the underlying sense of “purge” or “empty,” and in this context, “banish” is an appropriate reading. The same translation is employed in the next sentence.
  - type: text
    content: 'every thief. On the other side, it says that he will banish everyone who lies using his name. '
  - type: note
    content: Or “How long the thief has gone unpunished! How long the perjurer has gone unpunished!” Ezekiel also had a vision of a scroll written on both sides (see Ezek. 2:10). To steal and to speak falsely in God’s name are sins against man and God. They represent some major aspects of the Ten Commandments and, collectively, the whole law.
  '4':
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, declares, ‘I will release this curse, and it will enter the house of the thief and of anyone who lies using my name. The curse will remain in his house until it consumes it—walls, beams, and all.’ ”'
  - type: heading
    content: 'Seventh Vision: The Woman in a Barrel'
  '5':
  - type: text
    content: 'Then the angel who was talking to me appeared and said, “Look at what is coming.” '
  '6':
  - type: text
    content: 'I asked, “What is it?” He replied, “It is a barrel, and it is carrying the guilt '
  - type: note
    content: Although the Hebrew text reads “their eye,” most modern translations follow the Greek and Syriac texts, which have “their iniquity” or “their guilt.” Apparently, these ancient translations are based on a Hebrew text that differs by only one letter from the traditional text.
  - type: text
    content: of all the people of the land of Judah.”
  '7':
  - type: text
    content: 'As I looked, the angel removed the '
  - type: text
    content: heavy
  - type: text
    content: ' lid made of lead from the barrel, and a woman was seated inside. '
  '8':
  - type: text
    content: 'The angel said, “This is Lady Wickedness.” '
  - type: note
    content: Or literally “the Great Disturbance.” In the context, Lady Wickedness is associated with idolatry.
  - type: text
    content: And he shoved her back into the barrel and clamped the lead lid over her.
  '9':
  - type: text
    content: 'I looked up and '
  - type: text
    content: suddenly
  - type: text
    content: ' two women appeared, soaring swiftly in the sky with outstretched wings like those of a stork. They lifted the barrel high in the sky and flew away with it. '
