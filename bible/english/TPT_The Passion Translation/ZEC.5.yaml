document_id: ZEC.5,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Sixth Vision: The Flying Scroll'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I had another vision. I looked up and saw a flying scroll. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I asked the angel who was talking to me, “Where are they taking the barrel?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He replied, “To '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the wicked land of
    - type: text
      text: ' Babylon, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Shinar,” an ancient, poetical name for Babylonia.
      marker-yv: yv-n
    - type: text
      text: where they will build a temple and make a pedestal for it. They will place it there and worship it.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Rev. 17–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The angel
    - type: text
      text: ' asked me, “What do you see?” I replied, “I see a flying scroll. It looks about thirty-five feet long and seventeen feet wide.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “twenty cubits long and ten cubits wide” (about ten meters long and five meters wide). It is difficult to be precise in the length of a cubit. Generally, a standard cubit is believed to be about 17.5 inches or 0.44 meters. A long cubit was a cubit plus a handbreadth (3.5 inches or 90 millimeters); in total about 21 inches or 0.53 meters. Unless otherwise noted, conversions from cubits to modern units in this translation will be calculated using the long cubit measurement. The measurements of the scroll are identical to the measurements of the porch of Solomon’s Temple (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 6:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he explained to me its meaning:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: scroll
    - type: text
      text: ' contains God’s curse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: against evildoers
    - type: text
      text: ' sweeping over the whole land. On one side of the scroll, it says that the Lord will banish '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew verb found here (
      - type: usfm
        marker: it
        children:
        - type: text
          text: naqah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) in the Niphal form may carry the underlying sense of “purge” or “empty,” and in this context, “banish” is an appropriate reading. The same translation is employed in the next sentence.
      marker-yv: yv-n
    - type: text
      text: 'every thief. On the other side, it says that he will banish everyone who lies using his name. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “How long the thief has gone unpunished! How long the perjurer has gone unpunished!” Ezekiel also had a vision of a scroll written on both sides (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 2:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). To steal and to speak falsely in God’s name are sins against man and God. They represent some major aspects of the Ten Commandments and, collectively, the whole law.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, declares, ‘I will release this curse, and it will enter the house of the thief and of anyone who lies using my name. The curse will remain in his house until it consumes it—walls, beams, and all.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Seventh Vision: The Woman in a Barrel'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the angel who was talking to me appeared and said, “Look at what is coming.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I asked, “What is it?” He replied, “It is a barrel, and it is carrying the guilt '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the Hebrew text reads “their eye,” most modern translations follow the Greek and Syriac texts, which have “their iniquity” or “their guilt.” Apparently, these ancient translations are based on a Hebrew text that differs by only one letter from the traditional text.
      marker-yv: yv-n
    - type: text
      text: of all the people of the land of Judah.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As I looked, the angel removed the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: heavy
    - type: text
      text: ' lid made of lead from the barrel, and a woman was seated inside. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The angel said, “This is Lady Wickedness.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “the Great Disturbance.” In the context, Lady Wickedness is associated with idolatry.
      marker-yv: yv-n
    - type: text
      text: And he shoved her back into the barrel and clamped the lead lid over her.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I looked up and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: suddenly
    - type: text
      text: ' two women appeared, soaring swiftly in the sky with outstretched wings like those of a stork. They lifted the barrel high in the sky and flew away with it. '
