  - type: text
    text: The Birth of Samson, a Champion-Deliverer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Once again, the Israelites continued doing evil in the sight of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', so he subjected them to Philistine '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word for “philistine” can be translated as “rolling,” “migratory,” “wallowing in the dust,” “wandering,” “deviating off course,” or “rejected.” The Philistines are mentioned thirty-four times in the book of Judges. The Philistines were Israel’s constant foe until David defeated them. In the days of Samson, the Israelites had been content to have them as neighbors in the land.
    marker-yv: yv-n
  - type: text
    text: rule for forty years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'There was a certain man from the tribe of Dan, who lived in the city of Zorah, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zorah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “hornet’s nest.” The birth of a champion-deliverer will always stir up a hornet’s nest.
    marker-yv: yv-n
  - type: text
    text: 'named Manoah. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Manoah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “rest” or “restoring.”
    marker-yv: yv-n
  - type: text
    text: 'His wife was barren and childless, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'but the Angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' appeared to her and said, “Look here! You are no longer barren and childless, for you will conceive and give birth to a son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now be careful not to drink any wine or beer and to eat nothing considered unclean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'You will conceive and will give birth to a son. Raise the boy as one dedicated to God '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “he will be God’s Nazarite.” A Nazarite was a special class of Jewish men who were dedicated to God. They were forbidden to cut their hair, drink alcohol, or touch any dead thing. The word “Nazarite” is taken from the Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nazar
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means “dedicated to God,” “set apart,” “consecrated [as a prince],” or “an unpruned branch.” See'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: from the womb and never cut his hair. He will begin to deliver Israel from Philistine power.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Manoah’s wife went to her husband and said, “A man sent from God came to me! He looked like an angel of God—incredibly awesome. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “very frightening.”
    marker-yv: yv-n
  - type: text
    text: 'I didn’t ask where he came from, and he didn’t tell me his name, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: but he told me, ‘You will become pregnant, and you will have a son. Make sure you don’t drink any wine or beer, and eat nothing unclean, for the boy will be fully devoted to God from the womb to the day he dies!’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Manoah pleaded with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', “O my Lord, please send the man of God back to us. Have him come to instruct us how to raise the son who is to be born.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'God answered Manoah’s prayer and sent the Angel of God to the woman again while she was sitting alone in the field. Her husband Manoah was not with her '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'so she ran at once to tell him the news: “Look! Come quickly! He reappeared—the same man who came to me that day!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So Manoah got up, followed his wife, and went to the man. Manoah said to him, “Are you the man who appeared and spoke to my wife?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “I am,” he said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Manoah replied, “Well, when '
  - type: usfm
    marker: nd
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yahweh
  - type: text
    text: ' fulfills your prophecy, how should we raise the boy, and what is his life mission?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The Angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' answered, “Do everything that I instructed your wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: She must abstain from anything that comes from the grapevine and drink no alcohol, nor should she eat anything unclean. She must do all that I have commanded her.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Manoah said to the Angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', “Please stay here until we cook a young goat for you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The Angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said to Manoah, “Even if you detain me, I will not eat your food. But if you want to prepare a burnt offering, offer it up to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '.” Manoah did not realize that he was speaking with the Angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Stunned
  - type: text
    text: ', Manoah asked the Angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. “What is your name? When '
  - type: usfm
    marker: nd
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yahweh
  - type: text
    text: ' fulfills your prophecy, we want to honor you!”'
- type: usfm
  marker: p
  children:
  - type: usfm
