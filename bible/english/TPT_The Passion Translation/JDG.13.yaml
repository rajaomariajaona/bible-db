      children:
      - type: text
        text: The Hebrew is literally “to strike as a bell.” God’s Spirit moved on Samson powerfully and empowered him.
    marker-yv: yv-n
  - type: text
    text: 'while he was between Zorah and Eshtaol, '
  - type: usfm
