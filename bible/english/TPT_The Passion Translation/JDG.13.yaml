document_id: JDG.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Birth of Samson, a Champion-Deliverer
  - type: text
    content: 'Once again, the Israelites continued doing evil in the sight of '
  - type: text
    content: Yahweh
  - type: text
    content: ', so he subjected them to Philistine '
  - type: note
    content: The word for “philistine” can be translated as “rolling,” “migratory,” “wallowing in the dust,” “wandering,” “deviating off course,” or “rejected.” The Philistines are mentioned thirty-four times in the book of Judges. The Philistines were Israel’s constant foe until David defeated them. In the days of Samson, the Israelites had been content to have them as neighbors in the land.
  - type: text
    content: rule for forty years.
  '10':
  - type: text
    content: 'so she ran at once to tell him the news: “Look! Come quickly! He reappeared—the same man who came to me that day!” '
  '11':
  - type: text
    content: So Manoah got up, followed his wife, and went to the man. Manoah said to him, “Are you the man who appeared and spoke to my wife?”
  - type: text
    content: “I am,” he said.
  '12':
  - type: text
    content: 'Manoah replied, “Well, when '
  - type: text
    content: Yahweh
  - type: text
    content: ' fulfills your prophecy, how should we raise the boy, and what is his life mission?”'
  '13':
  - type: text
    content: 'The Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' answered, “Do everything that I instructed your wife. '
  '14':
  - type: text
    content: She must abstain from anything that comes from the grapevine and drink no alcohol, nor should she eat anything unclean. She must do all that I have commanded her.”
  '15':
  - type: text
    content: 'Manoah said to the Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ', “Please stay here until we cook a young goat for you.”'
  '16':
  - type: text
    content: 'The Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to Manoah, “Even if you detain me, I will not eat your food. But if you want to prepare a burnt offering, offer it up to '
  - type: text
    content: Yahweh
  - type: text
    content: '.” Manoah did not realize that he was speaking with the Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '17':
  - type: text
    content: Stunned
  - type: text
    content: ', Manoah asked the Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: '. “What is your name? When '
  - type: text
    content: Yahweh
  - type: text
    content: ' fulfills your prophecy, we want to honor you!”'
  '18':
  - type: text
    content: 'The Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' replied, “Why ask for my name? It is ‘Wonderfully Hidden!’ ” '
  - type: note
    content: The Angel of Yahweh was God in a human form. His name can be translated “wonderful,” “incomprehensible,” “unknowable,” “beyond understanding,” or “transcendent.”
  '19':
  - type: text
    content: 'So Manoah prepared the young goat and his grain offering and took them to the rock to offer them up to '
  - type: text
    content: Yahweh
  - type: text
    content: ', the wonder-working '
  - type: text
    content: God
  - type: text
    content: '. While Manoah and his wife watched, '
  '2':
  - type: text
    content: 'There was a certain man from the tribe of Dan, who lived in the city of Zorah, '
  - type: note
    content: Zorah means “hornet’s nest.” The birth of a champion-deliverer will always stir up a hornet’s nest.
  - type: text
    content: 'named Manoah. '
  - type: note
    content: Manoah means “rest” or “restoring.”
  - type: text
    content: 'His wife was barren and childless, '
  '20':
  - type: text
    content: 'flames burst from the rock and ascended upward to heaven from the altar. The Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  - type: text
    content: wrapped
  - type: text
    content: ' in the flames of fire, ascended into the sky. '
  - type: note
    content: There is at least a hint here of Jesus’ sacrifice on the cross (burnt offering), his resurrection (grain offering), and ascension into heaven.
  - type: text
    content: 'Dazed, Manoah and his wife fell facedown to the ground '
  - type: text
    content: in worship
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Only then did Manoah realize that he had met the Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: '! He turned to his wife and said, “We’re as good as dead! God has just visited us!”'
  - type: text
    content: 'But his wife said, “If '
  - type: text
    content: Yahweh
  - type: text
    content: ' had planned to kill us, he wouldn’t have accepted our burnt offering and our grain offering. He wouldn’t have revealed all these things to us or have spoken to us as he did just now.” And Manoah and his wife never encountered '
  - type: text
    content: Yahweh
  - type: text
    content: '’s Angel again. '
  '24':
  - type: text
    content: 'Manoah’s wife gave birth to a son, and she named him Samson. '
  - type: note
    content: Samson means “sunbeam,” “little sun,” “sunny,” or, if adjectival, “solar.” He was the twelfth champion-deliverer. Samson is mentioned thirty-eight times in the Bible, including in Heb. 11:32 where he is noted for his faith.
  - type: text
    content: 'The boy grew up with '
  - type: text
    content: Yahweh
  - type: text
    content: '’s blessing on his life. '
  - type: note
    content: Compare 1 Sam. 2:26; Luke 2:52.
  '25':
  - type: text
    content: 'The Spirit of '
  - type: text
    content: Yahweh
  - type: text
    content: ' began to stir his heart '
  - type: note
    content: The Hebrew is literally “to strike as a bell.” God’s Spirit moved on Samson powerfully and empowered him.
  - type: text
    content: 'while he was between Zorah and Eshtaol, '
  - type: note
    content: Eshtaol means “a narrow pass.” God’s Spirit first gripped Samson when he was between a “hornet’s nest” (Zorah) and a “narrow pass” (Eshtaol). We would say that he was between a rock and a hard place.
  - type: text
    content: in the Camp of Dan.
  - type: note
    content: Or “Mahaneh Dan.” This is possibly the place the tribe of Dan camped on their way to take Laish. See 18:11–12.
  '3':
  - type: text
    content: 'but the Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' appeared to her and said, “Look here! You are no longer barren and childless, for you will conceive and give birth to a son. '
  '4':
  - type: text
    content: 'Now be careful not to drink any wine or beer and to eat nothing considered unclean. '
  '5':
  - type: text
    content: 'You will conceive and will give birth to a son. Raise the boy as one dedicated to God '
  - type: note
    content: Or “he will be God’s Nazarite.” A Nazarite was a special class of Jewish men who were dedicated to God. They were forbidden to cut their hair, drink alcohol, or touch any dead thing. The word “Nazarite” is taken from the Hebrew word nazar, which means “dedicated to God,” “set apart,” “consecrated [as a prince],” or “an unpruned branch.” See Num. 6.
  - type: text
    content: from the womb and never cut his hair. He will begin to deliver Israel from Philistine power.”
  '6':
  - type: text
    content: 'So Manoah’s wife went to her husband and said, “A man sent from God came to me! He looked like an angel of God—incredibly awesome. '
  - type: note
    content: Or “very frightening.”
  - type: text
    content: 'I didn’t ask where he came from, and he didn’t tell me his name, '
  '7':
  - type: text
    content: but he told me, ‘You will become pregnant, and you will have a son. Make sure you don’t drink any wine or beer, and eat nothing unclean, for the boy will be fully devoted to God from the womb to the day he dies!’ ”
  '8':
  - type: text
    content: 'Manoah pleaded with '
  - type: text
    content: Yahweh
  - type: text
    content: ', “O my Lord, please send the man of God back to us. Have him come to instruct us how to raise the son who is to be born.”'
  '9':
  - type: text
    content: 'God answered Manoah’s prayer and sent the Angel of God to the woman again while she was sitting alone in the field. Her husband Manoah was not with her '
