    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Angel of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was God in a human form. His name can be translated “wonderful,” “incomprehensible,” “unknowable,” “beyond understanding,” or “transcendent.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So Manoah prepared the young goat and his grain offering and took them to the rock to offer them up to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the wonder-working '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: '. While Manoah and his wife watched, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'flames burst from the rock and ascended upward to heaven from the altar. The Angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wrapped
  - type: text
    text: ' in the flames of fire, ascended into the sky. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is at least a hint here of Jesus’ sacrifice on the cross (burnt offering), his resurrection (grain offering), and ascension into heaven.
    marker-yv: yv-n
  - type: text
    text: 'Dazed, Manoah and his wife fell facedown to the ground '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in worship
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-23
  - type: text
    text: 'Only then did Manoah realize that he had met the Angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '! He turned to his wife and said, “We’re as good as dead! God has just visited us!”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But his wife said, “If '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' had planned to kill us, he wouldn’t have accepted our burnt offering and our grain offering. He wouldn’t have revealed all these things to us or have spoken to us as he did just now.” And Manoah and his wife never encountered '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s Angel again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Manoah’s wife gave birth to a son, and she named him Samson. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Samson
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “sunbeam,” “little sun,” “sunny,” or, if adjectival, “solar.” He was the twelfth champion-deliverer. Samson is mentioned thirty-eight times in the Bible, including in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 11:32
      metadata:
        usfm: HEB.11.32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: where he is noted for his faith.
    marker-yv: yv-n
