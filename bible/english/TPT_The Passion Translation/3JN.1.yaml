document_id: 3JN.1,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Love in Action
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'From the elder '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “presbyter.” This was obviously a self-designated term for the apostle John. He was an elder because of being the only living apostle who was chosen by Jesus.
      marker-yv: yv-n
    - type: text
      text: 'to my dearly loved brother Gaius, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gaius was a convert of John’s and a close friend who likely had a leadership position in the church (location not given). Church tradition states that he was one of the seventy whom Jesus sent out and was later ordained by John as the bishop of Pergamum. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Apostolic Constitutions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (7.46.9; Funk 1, 454). However, there was also a Gaius who became the bishop of Ephesus. There are four mentions of Gaius in the New Testament, although it is unlikely that they were the same person (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 19:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 16:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 1:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The name Gaius means “joyful or happy.” The Latin form of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gaius
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can be translated “lord.”
      marker-yv: yv-n
    - type: text
      text: 'whom I truly love:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “continually love in truth” (reality).
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So if I come, I will address what he’s doing—spreading his malicious slander against us. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “with evil words talking nonsense about us.”
      marker-yv: yv-n
    - type: text
      text: 'And not content with that, he refuses to welcome our brothers, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These would be the itinerant ministers, missionaries who visited their assembly to minister in the region.
      marker-yv: yv-n
    - type: text
      text: and he stands in the way of those who want to receive them and show them hospitality by throwing them out of the church!
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Delightfully loved ones, don’t imitate what is evil, but imitate that which is good. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic gives an entirely different slant to this verse. It can be translated “Beloved, don’t treat him with malice but with blessing” (good deeds).
      marker-yv: yv-n
    - type: text
      text: Whoever does good is of God; whoever does evil has not seen God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This last clause is asyndetic in order to add emphasis.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Devoted Demetrius
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'As for Demetrius, everyone speaks very highly of him, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is possible that Demetrius was one of the “brothers” (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) who was now coming to visit the church and that he was the one who carried this letter to Gaius. This letter served the purpose of being a “letter of recommendation” of Demetrius and his ministry.
      marker-yv: yv-n
    - type: text
      text: and even the truth itself stands by his side. We too wholeheartedly endorse him, and you know that our recommendation is reliable.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Although I have many more subjects I’d like to discuss with you, I’d rather not include them in this letter. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I’d rather not write with ink [pen] and paper.”
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Instead, I hope to visit you and speak with you face-to-face.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “mouth to mouth.”
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Peace to you, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my friend
    - type: text
      text: . Your friends here send their loving greetings to you. Please greet each one of our friends there by name.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Beloved friend, I pray that you are prospering in every way '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: eudōomai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “to be brought along to a smooth and prosperous journey” or “to be continually prospered [unto success] in every way.” The Aramaic can be translated “as much as succeeds you.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 1:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and that you continually enjoy good health, just as your soul is prospering.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: John is praying that Gaius’ physical health would match his spiritual health. God is concerned for both our physical health (he gave our bodies an immune system) and our souls (emotional and spiritual well-being). If physical health and soul “prosperity” were not the will of God, why would John pray that for Gaius?
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I was filled with joy and delight when the brothers arrived and informed me of your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: faithfulness to the
    - type: text
      text: ' truth. They told me how you live continually in the truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Christ
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the words
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jesus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', or'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Christ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', do not appear anywhere in the text of 3 John, they are clearly implied.'
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: It is the greatest joy of my life to hear that my children are consistently living their lives in the ways of truth!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Financially Supporting Missionaries
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'My beloved friend, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I commend you for your demonstration
    - type: text
      text: ' of faithful love by all that you have done for the brothers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on their journey
    - type: text
      text: ', even though they were strangers at the time. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These are traveling missionaries and itinerant speakers who were shown hospitality by Gaius. True hospitality is a lost art in some churches today and needs to be valued anew.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'They have shared publicly with the congregation '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This would likely have been the church where John was ministering (Ephesus, Pergamum, or another unnamed location).
      marker-yv: yv-n
    - type: text
      text: 'about the beautiful acts of love you have shown them. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'Now, if you would be so kind, send them on their way '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with a generous gift
    - type: text
      text: ', in a manner that would honor God. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or “equal to God’s value of them.” Apparently, these missionaries had reported to John, returned to the area where Gaius was living, and then continued on with their missionary journey. The Aramaic is quite different: “You outfitted them like a plank billboard for God”; that is, “The gifts you gave them made them an advertisement for God.”'
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'You see, it was their passion for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the glory of
    - type: text
      text: ' the name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Christ
    - type: text
      text: ' that launched them out, and they’ve not accepted financial support from unbelievers. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “from the gentiles.”
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'They are deserving of all the support we can give them, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: because through our giving
    - type: text
      text: ' we can partner with them for the truth.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: By giving to those who preach the gospel and nurture the people of God, we are partnering with them in their ministry.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Domineering Diotrephes
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I have already written you once about this, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This refers to a lost letter, possibly destroyed by Diotrephes. So the letter we now have is actually 4 John.
      marker-yv: yv-n
    - type: text
      text: 'but Diotrephes, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Diotrephes was most likely an elder in the congregation who saw himself as the most important one, pushing himself forward with a controlling leadership style. He refused the apostolic authority of John and would not accept guest speakers who may have been sent by John. His name means “nourished by Jupiter.” Leaders must view other leaders not as threats but as coworkers. Love is not controlling or tyrannical. It is clear in the New Testament that the local church must have God-appointed ministry in the congregation from pastors, prophets, teachers, evangelists, and apostles (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Additionally, there were itinerant ministers that—if proven authentic—were to be received by the local church authorities and given both opportunities to minister and generous gifts to send them on their way.
      marker-yv: yv-n
    - type: text
      text: 'who loves to be in charge and recognized as first among you, does not acknowledge our authority. '
