document_id: 3JN.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Love in Action
  - type: text
    content: 'From the elder '
  - type: note
    content: Or “presbyter.” This was obviously a self-designated term for the apostle John. He was an elder because of being the only living apostle who was chosen by Jesus.
  - type: text
    content: 'to my dearly loved brother Gaius, '
  - type: note
    content: Gaius was a convert of John’s and a close friend who likely had a leadership position in the church (location not given). Church tradition states that he was one of the seventy whom Jesus sent out and was later ordained by John as the bishop of Pergamum. See Apostolic Constitutions (7.46.9; Funk 1, 454). However, there was also a Gaius who became the bishop of Ephesus. There are four mentions of Gaius in the New Testament, although it is unlikely that they were the same person (Acts 19:29; Rom. 16:23; 1 Cor. 1:14). The name Gaius means “joyful or happy.” The Latin form of Gaius can be translated “lord.”
  - type: text
    content: 'whom I truly love:'
  - type: note
    content: Or “continually love in truth” (reality).
  '10':
  - type: text
    content: 'So if I come, I will address what he’s doing—spreading his malicious slander against us. '
  - type: note
    content: Or “with evil words talking nonsense about us.”
  - type: text
    content: 'And not content with that, he refuses to welcome our brothers, '
  - type: note
    content: These would be the itinerant ministers, missionaries who visited their assembly to minister in the region.
  - type: text
    content: and he stands in the way of those who want to receive them and show them hospitality by throwing them out of the church!
  '11':
  - type: text
    content: 'Delightfully loved ones, don’t imitate what is evil, but imitate that which is good. '
  - type: note
    content: The Aramaic gives an entirely different slant to this verse. It can be translated “Beloved, don’t treat him with malice but with blessing” (good deeds).
  - type: text
    content: Whoever does good is of God; whoever does evil has not seen God.
  - type: note
    content: This last clause is asyndetic in order to add emphasis.
  - type: heading
    content: Devoted Demetrius
  '12':
  - type: text
    content: 'As for Demetrius, everyone speaks very highly of him, '
  - type: note
    content: It is possible that Demetrius was one of the “brothers” (v. 3) who was now coming to visit the church and that he was the one who carried this letter to Gaius. This letter served the purpose of being a “letter of recommendation” of Demetrius and his ministry.
  - type: text
    content: and even the truth itself stands by his side. We too wholeheartedly endorse him, and you know that our recommendation is reliable.
  '13':
  - type: text
    content: 'Although I have many more subjects I’d like to discuss with you, I’d rather not include them in this letter. '
  - type: note
    content: Or “I’d rather not write with ink [pen] and paper.”
  '14':
  - type: text
    content: Instead, I hope to visit you and speak with you face-to-face.
  - type: note
    content: The Aramaic can be translated “mouth to mouth.”
  '15':
  - type: text
    content: 'Peace to you, '
  - type: text
    content: my friend
  - type: text
    content: . Your friends here send their loving greetings to you. Please greet each one of our friends there by name.
  '2':
  - type: text
    content: 'Beloved friend, I pray that you are prospering in every way '
  - type: note
    content: The Greek word eudōomai means “to be brought along to a smooth and prosperous journey” or “to be continually prospered [unto success] in every way.” The Aramaic can be translated “as much as succeeds you.” See Josh. 1:8.
  - type: text
    content: and that you continually enjoy good health, just as your soul is prospering.
  - type: note
    content: John is praying that Gaius’ physical health would match his spiritual health. God is concerned for both our physical health (he gave our bodies an immune system) and our souls (emotional and spiritual well-being). If physical health and soul “prosperity” were not the will of God, why would John pray that for Gaius?
  '3':
  - type: text
    content: 'I was filled with joy and delight when the brothers arrived and informed me of your '
  - type: text
    content: faithfulness to the
  - type: text
    content: ' truth. They told me how you live continually in the truth '
  - type: text
    content: of Christ
  - type: text
    content: '. '
  - type: note
    content: Although the words Jesus, or Christ, do not appear anywhere in the text of 3 John, they are clearly implied.
  '4':
  - type: text
    content: It is the greatest joy of my life to hear that my children are consistently living their lives in the ways of truth!
  - type: heading
    content: Financially Supporting Missionaries
  '5':
  - type: text
    content: 'My beloved friend, '
  - type: text
    content: I commend you for your demonstration
  - type: text
    content: ' of faithful love by all that you have done for the brothers '
  - type: text
    content: on their journey
  - type: text
    content: ', even though they were strangers at the time. '
  - type: note
    content: These are traveling missionaries and itinerant speakers who were shown hospitality by Gaius. True hospitality is a lost art in some churches today and needs to be valued anew.
  '6':
  - type: text
    content: 'They have shared publicly with the congregation '
  - type: note
    content: This would likely have been the church where John was ministering (Ephesus, Pergamum, or another unnamed location).
  - type: text
    content: 'about the beautiful acts of love you have shown them. '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'Now, if you would be so kind, send them on their way '
  - type: text
    content: with a generous gift
  - type: text
    content: ', in a manner that would honor God. '
  - type: note
    content: 'Or “equal to God’s value of them.” Apparently, these missionaries had reported to John, returned to the area where Gaius was living, and then continued on with their missionary journey. The Aramaic is quite different: “You outfitted them like a plank billboard for God”; that is, “The gifts you gave them made them an advertisement for God.”'
  '7':
  - type: text
    content: 'You see, it was their passion for '
  - type: text
    content: the glory of
  - type: text
    content: ' the name '
  - type: text
    content: of Christ
  - type: text
    content: ' that launched them out, and they’ve not accepted financial support from unbelievers. '
  - type: note
    content: Or “from the gentiles.”
  '8':
  - type: text
    content: 'They are deserving of all the support we can give them, '
  - type: text
    content: because through our giving
  - type: text
    content: ' we can partner with them for the truth.'
  - type: note
    content: By giving to those who preach the gospel and nurture the people of God, we are partnering with them in their ministry.
  - type: heading
    content: Domineering Diotrephes
  '9':
  - type: text
    content: 'I have already written you once about this, '
  - type: note
    content: This refers to a lost letter, possibly destroyed by Diotrephes. So the letter we now have is actually 4 John.
  - type: text
    content: 'but Diotrephes, '
  - type: note
    content: Diotrephes was most likely an elder in the congregation who saw himself as the most important one, pushing himself forward with a controlling leadership style. He refused the apostolic authority of John and would not accept guest speakers who may have been sent by John. His name means “nourished by Jupiter.” Leaders must view other leaders not as threats but as coworkers. Love is not controlling or tyrannical. It is clear in the New Testament that the local church must have God-appointed ministry in the congregation from pastors, prophets, teachers, evangelists, and apostles (Eph. 4:11). Additionally, there were itinerant ministers that—if proven authentic—were to be received by the local church authorities and given both opportunities to minister and generous gifts to send them on their way.
  - type: text
    content: 'who loves to be in charge and recognized as first among you, does not acknowledge our authority. '
