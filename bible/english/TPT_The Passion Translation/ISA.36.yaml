  - type: text
    text: 'at the end of the aqueduct where it empties into the upper pool. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was possibly Hezekiah’s “tunnel.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And coming out to meet him were '
  - type: usfm
    marker: it
    children:
    - type: text
      text: three officials of the king
  - type: text
    text: ': Eliakim, son of Hilkiah, the palace administrator; Shebna, the scribe; and Joah, son of Asaph, the secretary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sennacherib’s commander said to them, “Tell Hezekiah, this is what the exalted king, the king of Assyria, says: ‘What makes you so confident? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'You think you have a strategy and defensive might, but mere words are no match '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for my army
  - type: text
    text: '! In whom are you trusting for help that you rebel against me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I know—you are relying on Egypt, that broken staff full of splinters. If anyone leans on it, it will pierce his hand. Pharaoh himself, king of Egypt, is like that splintered staff to those who put their trust in him! But you tell me that you are trusting in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', your God. For Hezekiah went around destroying every sacred altar from the land. Didn’t he insist that Judah and Jerusalem had to worship only at this altar '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in your temple
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now it’s time to make a deal with my master, the king of Assyria. I will give you two thousand horses if you’re able to come up with as many men to ride them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'You’re no match against even one officer of the least of my master’s officials! Why put your confidence in Egypt’s chariots and horsemen? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'What’s more, do you really think I’ve marched against this land to destroy it on my own without '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s approval?’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then Eliakim, Shebna, and Joah replied, “Please speak to us, your servants, in Aramaic, for we understand it. Don’t speak to us in Hebrew, for the people on the wall are listening to us, and they will overhear our conversation.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But the commander answered them, “Do you think I came to deliver this message from my master only to you and your king? It is also meant for the men sitting there on the wall to hear! They are the ones who will eat their own excrement and drink their own urine!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So the commander stood and shouted out in a loud voice in Hebrew '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to the men listening on the wall
  - type: text
    text: ', “Hear the words of the great King '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sennacherib
  - type: text
    text: ', the king of Assyria, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'for he has sent me with these words: ‘Don’t let Hezekiah mislead you, for there is nothing he can do to save you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Don’t be deceived when he tries to persuade you to trust in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', saying to you, “'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will come to our rescue and our city will not be handed over to the king of Assyria.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Don’t listen to Hezekiah, for the king of Assyria says to you, “Make your peace with me and surrender so that you may continue to eat from your own grapes and figs and drink the water from your own cisterns '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'until I come and take you away to a land like your own. It is a good land of grain and wine, bread and vineyards.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Don’t be deceived by Hezekiah’s empty words when he says to you, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will save us.” Has any god ever saved a nation from the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mighty
  - type: text
    text: ' hand of the king of Assyria? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Where were the gods of Hamath '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is modern Hama, a city of west-central Syria.
    marker-yv: yv-n
  - type: text
    text: 'and Arphad? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Arpad,” an ancient city of northwestern Syria.
    marker-yv: yv-n
  - type: text
    text: 'Where were the gods of Sepharvaim? Did any god save '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your northern kingdom of
  - type: text
    text: ' Samaria from me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Where is there a god that could save its people from my mighty hand?’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But they were silent, and no one answered him a word, for King Hezekiah had ordered them, “Do not answer him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: So the three officials of Hezekiah—Eliakim, son of Hilkiah, the palace administrator; Shebna, the scribe; and Joah, son of Asaph the secretary—came to Hezekiah with their clothes torn as a sign of despair and reported what the Assyrian commander had said.
