      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “the thorn laid waste.”
    marker-yv: yv-n
  - type: text
    text: 'king of Assyria, attacked all the fortified cities of Judah and conquered them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: it
    children:
    - type: text
      text: After defeating Lachish
  - type: text
    text: ', Sennacherib sent his chief commander '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Rabshakeh,” a possible title of a military official.
    marker-yv: yv-n
  - type: text
    text: 'with his massive army from there to King Hezekiah in Jerusalem. He took up a position on the road to the Washerman’s Field, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Fuller’s Field,” where cloth was washed and bleached. In
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 9:3
      metadata:
        usfm: MRK.9.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', the Greek text uses the phrase “whiter than any fuller can make them.” See also'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
