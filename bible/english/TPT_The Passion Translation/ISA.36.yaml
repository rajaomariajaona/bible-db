      - type: text
        text: means “strengthened of Yah,” “captured by Yah,” “Yah has made firm,” or “power of Yah.” The prophets who lived during his reign included Isaiah, Micah, and Hosea. Hezekiah ascended Judah’s throne at the age of twenty-five and reigned a total of twenty-nine years. He was considered to be a godly king and released the greatest period of restoration in Israel’s history. He repaired the doors of the temple, cleansed it, and made atonement for the altar. He consecrated the priesthood, ordered the observance of the Feast of Passover, and removed idolatry from the land. He supported the priesthood through tithes and offerings, and the nation prospered. He was buried with great honor in the sepulchers of the sons of David. See
    - type: usfm
