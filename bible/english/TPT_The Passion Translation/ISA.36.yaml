  '1':
  - type: heading
    content: Two Kings
  - type: text
    content: 'In the fourteenth year of King Hezekiah’s reign, '
  - type: note
    content: This would be approximately 701 BC. Hezekiah means “strengthened of Yah,” “captured by Yah,” “Yah has made firm,” or “power of Yah.” The prophets who lived during his reign included Isaiah, Micah, and Hosea. Hezekiah ascended Judah’s throne at the age of twenty-five and reigned a total of twenty-nine years. He was considered to be a godly king and released the greatest period of restoration in Israel’s history. He repaired the doors of the temple, cleansed it, and made atonement for the altar. He consecrated the priesthood, ordered the observance of the Feast of Passover, and removed idolatry from the land. He supported the priesthood through tithes and offerings, and the nation prospered. He was buried with great honor in the sepulchers of the sons of David. See 2 Kings 18–20; 2 Chron. 29–32.
  - type: text
    content: 'Sennacherib, '
  - type: note
    content: Sennacherib means “the thorn laid waste.”
  - type: text
    content: 'king of Assyria, attacked all the fortified cities of Judah and conquered them. '
  '10':
  - type: text
    content: 'What’s more, do you really think I’ve marched against this land to destroy it on my own without '
  - type: text
    content: Yahweh
  - type: text
    content: ’s approval?’ ”
  '11':
  - type: text
    content: Then Eliakim, Shebna, and Joah replied, “Please speak to us, your servants, in Aramaic, for we understand it. Don’t speak to us in Hebrew, for the people on the wall are listening to us, and they will overhear our conversation.”
  '12':
  - type: text
    content: But the commander answered them, “Do you think I came to deliver this message from my master only to you and your king? It is also meant for the men sitting there on the wall to hear! They are the ones who will eat their own excrement and drink their own urine!”
  '13':
  - type: text
    content: 'So the commander stood and shouted out in a loud voice in Hebrew '
  - type: text
    content: to the men listening on the wall
  - type: text
    content: ', “Hear the words of the great King '
  - type: text
    content: Sennacherib
  - type: text
    content: ', the king of Assyria, '
  '14':
  - type: text
    content: 'for he has sent me with these words: ‘Don’t let Hezekiah mislead you, for there is nothing he can do to save you. '
  '15':
  - type: text
    content: 'Don’t be deceived when he tries to persuade you to trust in '
  - type: text
    content: Yahweh
  - type: text
    content: ', saying to you, “'
  - type: text
    content: Yahweh
  - type: text
    content: ' will come to our rescue and our city will not be handed over to the king of Assyria.” '
  '16':
  - type: text
    content: 'Don’t listen to Hezekiah, for the king of Assyria says to you, “Make your peace with me and surrender so that you may continue to eat from your own grapes and figs and drink the water from your own cisterns '
  '17':
  - type: text
    content: 'until I come and take you away to a land like your own. It is a good land of grain and wine, bread and vineyards.” '
  '18':
  - type: text
    content: Don’t be deceived by Hezekiah’s empty words when he says to you, “
  - type: text
    content: Yahweh
  - type: text
    content: ' will save us.” Has any god ever saved a nation from the '
  - type: text
    content: mighty
  - type: text
    content: ' hand of the king of Assyria? '
  '19':
  - type: text
    content: 'Where were the gods of Hamath '
  - type: note
    content: This is modern Hama, a city of west-central Syria.
  - type: text
    content: 'and Arphad? '
  - type: note
    content: Or “Arpad,” an ancient city of northwestern Syria.
  - type: text
    content: 'Where were the gods of Sepharvaim? Did any god save '
  - type: text
    content: your northern kingdom of
  - type: text
    content: ' Samaria from me? '
  '2':
  - type: text
    content: After defeating Lachish
  - type: text
    content: ', Sennacherib sent his chief commander '
  - type: note
    content: Or “Rabshakeh,” a possible title of a military official.
  - type: text
    content: 'with his massive army from there to King Hezekiah in Jerusalem. He took up a position on the road to the Washerman’s Field, '
  - type: note
    content: Or “Fuller’s Field,” where cloth was washed and bleached. In Mark 9:3, the Greek text uses the phrase “whiter than any fuller can make them.” See also Isa. 7:3; Mal. 3:1–3.
  - type: text
    content: 'at the end of the aqueduct where it empties into the upper pool. '
  - type: note
    content: This was possibly Hezekiah’s “tunnel.”
  '20':
  - type: text
    content: Where is there a god that could save its people from my mighty hand?’ ”
  '21':
  - type: text
    content: But they were silent, and no one answered him a word, for King Hezekiah had ordered them, “Do not answer him.”
  '22':
  - type: text
    content: So the three officials of Hezekiah—Eliakim, son of Hilkiah, the palace administrator; Shebna, the scribe; and Joah, son of Asaph the secretary—came to Hezekiah with their clothes torn as a sign of despair and reported what the Assyrian commander had said.
  '3':
  - type: text
    content: 'And coming out to meet him were '
  - type: text
    content: three officials of the king
  - type: text
    content: ': Eliakim, son of Hilkiah, the palace administrator; Shebna, the scribe; and Joah, son of Asaph, the secretary.'
  '4':
  - type: text
    content: 'Sennacherib’s commander said to them, “Tell Hezekiah, this is what the exalted king, the king of Assyria, says: ‘What makes you so confident? '
  '5':
  - type: text
    content: 'You think you have a strategy and defensive might, but mere words are no match '
  - type: text
    content: for my army
  - type: text
    content: '! In whom are you trusting for help that you rebel against me? '
  '6':
  - type: text
    content: 'I know—you are relying on Egypt, that broken staff full of splinters. If anyone leans on it, it will pierce his hand. Pharaoh himself, king of Egypt, is like that splintered staff to those who put their trust in him! But you tell me that you are trusting in '
  - type: text
    content: Yahweh
  - type: text
    content: ', your God. For Hezekiah went around destroying every sacred altar from the land. Didn’t he insist that Judah and Jerusalem had to worship only at this altar '
  - type: text
    content: in your temple
  - type: text
    content: '? '
  '8':
  - type: text
    content: 'Now it’s time to make a deal with my master, the king of Assyria. I will give you two thousand horses if you’re able to come up with as many men to ride them. '
  '9':
  - type: text
    content: 'You’re no match against even one officer of the least of my master’s officials! Why put your confidence in Egypt’s chariots and horsemen? '
