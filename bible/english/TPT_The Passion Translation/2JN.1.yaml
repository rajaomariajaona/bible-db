document_id: 2JN.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loving Truth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'From the elder '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “presbyter.” This was obviously a self-designated term for the apostle John. He was an elder because of being the only living apostle who was chosen by Jesus.
    marker-yv: yv-n
  - type: text
    text: 'to God’s chosen woman '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The letter is addressed to the
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: eklekte kuria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (“elect/chosen/excellent lady”). Most commentators see this as a metaphor for the church and her spiritual children, believing that John wrote this letter to a sister congregation or network of congregations. This has been the majority view since it was first noted by Jerome (Jerome,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ep. Xi. ad Ageruchiam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Still, others see it as a letter to a specific woman, with the conjecture that her name was either Elekta or Kyria. This is a possibility, since one way to read the letter is that John knew this woman and was acquainted with her sister and her children (v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: 2JN.1.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). If this was indeed written to Kyria (feminine of “lord,” meaning a woman in authority), there is a possibility that she was the pastor or overseer of a specific church. But who was the most especially “chosen woman” in the entire Bible? It was Mary, the mother of our Lord Jesus. John was given the commission by Jesus himself in his last moments on the cross to care for Mary as his mother, and we know that Mary had a sister (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 19:25–27
      metadata:
        usfm: JHN.19.25+JHN.19.26+JHN.19.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: 2JN.1.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). What other woman is chosen and loved, not only by John but all the church? Every believer in Jesus rightly honors and reveres his mother, Mary. Throughout church history there have been a few scholars who believe that Mary was the recipient of this letter. (See Knauer,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Stud. U. Krit.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 1833, Part 2, p.452ff.; q.v. J. E. Huther,'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Critical and Exegetical Handbook to the General Epistles of James, Peter, John, and Jude
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', translated from the German, 11 vols., Funk and Wagnalls, 1884.)'
    marker-yv: yv-n
  - type: text
    text: 'and her children:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I love you all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as those who are
  - type: text
    text: ' in the truth. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “whom I love in truth.” John uses the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: love
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sixty-two times in the New Testament, while all the other New Testament writers combined use it a total of 116 times.
    marker-yv: yv-n
  - type: text
    text: 'And I’m not the only one, for all who come to know the truth '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is possible that John is using the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: truth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: as he uses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Gr.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: logos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), as a title for Jesus Christ (“all who know the Truth”).
    marker-yv: yv-n
  - type: text
    text: 'share my love for you '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'because of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: living
  - type: text
    text: ' truth that has a permanent home in us and will be with us forever.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “into the age.” The Aramaic can be translated “because the truth sustains us to the end of the eternity.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Grace, mercy, and peace belong to us, flowing from the presence of God the Father and from Jesus Christ, Son of the Father and from the realm of true love.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “in truth and love.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I was delighted and filled with joy when I learned that your children are consistently living in the truth, just as we have received the command from the Father.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dearest woman, I have a request to make of you. It is not a new commandment but a repetition of the one we have had from the beginning: that we constantly love one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: This love means living in obedience to whatever God commands us. For to walk in love toward one another is the unifying commandment we’ve heard from the beginning.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Warning about False Teachers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Numerous deceivers have surfaced '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from among us
  - type: text
    text: ' and gone out into the world, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In the context of love, John now mentions false teachers. This shows us that love is the safeguard against error. The more that love flows through us as we honor God’s commands, the more we are kept from deception. Our unity, produced by love, enables us to recognize and resist false teachers.
    marker-yv: yv-n
  - type: text
    text: 'people who will not acknowledge Jesus Christ coming as a man. These deceivers are antichrists! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Be on your guard so that you do not lose all that we '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some manuscripts have “you.”
    marker-yv: yv-n
  - type: text
    text: 'have '
  - type: usfm
    marker: it
    children:
    - type: text
      text: diligently
  - type: text
    text: ' worked for but receive a full reward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Anyone who wanders away '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “goes beyond” (the teaching of Christ). The Aramaic implies a visiting minister or itinerant speaker, “whoever passes through.”
    marker-yv: yv-n
  - type: text
    text: 'and does not remain faithful to the teaching of Christ has no relationship with God. But those who remain in the teaching of Christ have a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wonderful
  - type: text
    text: ' relationship with both the Father and the Son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So if anyone comes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: into your fellowship claiming to be a true believer
  - type: text
    text: ' yet doesn’t bring this teaching, you are not to consider him as a fellow believer, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “don’t give him any greeting” (as a believer). Hospitality was such a cultural virtue in the time of John that he actually had to warn them not to show hospitality to false teachers.
    marker-yv: yv-n
  - type: text
    text: 'nor should you welcome him into your homes. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or possibly “house [church].”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For if you welcome him as a believer, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “If you give him a [public] greeting [as a believer].”
    marker-yv: yv-n
  - type: text
    text: you will be partnering with him in his evil agenda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Although I have many more subjects I’d like to discuss with you, I’d rather not include them in this letter. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I’d rather not write with ink [pen] and paper.”
    marker-yv: yv-n
  - type: text
    text: 'But I look forward to coming to visit and speaking with you face-to-face '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “mouth to mouth.”
    marker-yv: yv-n
  - type: text
    text: —for being together will complete our joy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The children of your sister, whom God has chosen, send you their loving greetings. Amen.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Most manuscripts do not include “Amen.”
    marker-yv: yv-n
