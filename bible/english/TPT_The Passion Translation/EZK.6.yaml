  - type: text
    text: '“Son of man, turn toward the mountains of Israel and prophesy against them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Say to them, ‘Mountains of Israel, hear the words of Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '! He prophesies to the mountains and hills, to the ravines and valleys:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The mountains, hills, ravines, and valleys were places where the people had set up altars to false gods, also known as “high places” because they were on raised platforms where the people would offer sacrifices.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘I am wielding a sword against you
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I will demolish your shrines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Your altars will be deserted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and your incense altars will be smashed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will slay your people before your idols.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The term
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gillulim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: only occurs in the plural form. Ezekiel used it some thirty-nine times in his prophecy. The usual meaning indicated in these prophetic contexts is that of “idols.” However, the root sense of the term may denote “logs,” “blocks,” or shapeless things in general. And it even carries the sense of “dung pellets.” It may be argued that the use of this term in Ezekiel’s prophecy is a derisive one.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I will lay the corpses of the Israelites
- type: usfm
  marker: q1
  children:
  - type: text
    text: before their idols,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I will scatter your bones all around your altars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Wherever you live,
- type: usfm
  marker: q1
  children:
  - type: text
    text: your cities will be ruined
- type: usfm
  marker: q1
  children:
  - type: text
    text: and your shrines deserted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All your altars will be destroyed and desecrated,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and your idols shall be broken and banished.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your incense altars will be chopped down,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and all your works wiped out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The slain will lie everywhere in your midst,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and you will know that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“ ‘I will spare some of you who escape the sword when you are scattered among the nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Those who escape will remember me among the nations where they are exiles. They will remember how my '
  - type: usfm
    marker: it
    children:
    - type: text
      text: heart
  - type: text
    text: ' was crushed by their promiscuous ways when they turned their hearts away from me and by their wandering eyes that lusted after idols. They will loathe themselves for the evil things they did and all their detestable practices. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And they will realize that it was no idle threat when I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', declared that I would bring this severe punishment upon them.’ ”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s Punishment for Idolatry
