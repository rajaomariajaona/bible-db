document_id: EZK.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Condemns Idolatry
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me: '
  - type: note
    content: Or “The word of Yahweh came to me.”
  '10':
  - type: text
    content: 'And they will realize that it was no idle threat when I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', declared that I would bring this severe punishment upon them.’ ”'
  - type: heading
    content: Yahweh’s Punishment for Idolatry
  '11':
  - type: text
    content: 'Hear the words of Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ': “Stomp your feet angrily and pound your fist, and say, ‘How awful!’ over all the evil abominations of the people of Israel. For they will fall by the sword, by food shortages, and by plague.'
  '12':
  - type: text
    content: “Those far away will die by the plague,
  - type: text
    content: those nearby shall fall by the sword,
  - type: text
    content: and those who survive will die of hunger.
  - type: text
    content: They will experience the fullness of my fury!
  '13':
  - type: text
    content: '“And you will be convinced that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ' when their corpses lie scattered around their idols and around their altars, on every high hill, on every mountaintop, under every spreading tree, and under every leafy oak—every place where they have offered soothing incense to all their '
  - type: text
    content: lifeless
  - type: text
    content: ' idols. '
  '14':
  - type: text
    content: 'I will stretch out my mighty arm against them and turn the land wherever they live into a complete wasteland from the desert to Riblah. '
  - type: note
    content: As translated from some Hebrew manuscripts. Riblah was a town in Syria, about 95 miles (153 kilometers) north of Damascus (see Num. 34:11; 2 Kings 23:33; 25:6). The majority of manuscripts have “Diblah,” an unknown location.
  - type: text
    content: 'And when this happens, they will be convinced that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '!”'
  '2':
  - type: text
    content: '“Son of man, turn toward the mountains of Israel and prophesy against them. '
  '3':
  - type: text
    content: 'Say to them, ‘Mountains of Israel, hear the words of Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '! He prophesies to the mountains and hills, to the ravines and valleys:'
  - type: note
    content: The mountains, hills, ravines, and valleys were places where the people had set up altars to false gods, also known as “high places” because they were on raised platforms where the people would offer sacrifices.
  - type: text
    content: “ ‘I am wielding a sword against you
  - type: text
    content: and I will demolish your shrines.
  '4':
  - type: text
    content: Your altars will be deserted,
  - type: text
    content: and your incense altars will be smashed.
  - type: text
    content: I will slay your people before your idols.
  - type: note
    content: The term gillulim only occurs in the plural form. Ezekiel used it some thirty-nine times in his prophecy. The usual meaning indicated in these prophetic contexts is that of “idols.” However, the root sense of the term may denote “logs,” “blocks,” or shapeless things in general. And it even carries the sense of “dung pellets.” It may be argued that the use of this term in Ezekiel’s prophecy is a derisive one.
  '5':
  - type: text
    content: I will lay the corpses of the Israelites
  - type: text
    content: before their idols,
  - type: text
    content: and I will scatter your bones all around your altars.
  '6':
  - type: text
    content: Wherever you live,
  - type: text
    content: your cities will be ruined
  - type: text
    content: and your shrines deserted.
  - type: text
    content: All your altars will be destroyed and desecrated,
  - type: text
    content: and your idols shall be broken and banished.
  - type: text
    content: Your incense altars will be chopped down,
  - type: text
    content: and all your works wiped out.
  '7':
  - type: text
    content: The slain will lie everywhere in your midst,
  - type: text
    content: 'and you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  '8':
  - type: text
    content: '“ ‘I will spare some of you who escape the sword when you are scattered among the nations. '
  '9':
  - type: text
    content: 'Those who escape will remember me among the nations where they are exiles. They will remember how my '
  - type: text
    content: heart
  - type: text
    content: ' was crushed by their promiscuous ways when they turned their hearts away from me and by their wandering eyes that lusted after idols. They will loathe themselves for the evil things they did and all their detestable practices. '
