- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hear the words of Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ': “Stomp your feet angrily and pound your fist, and say, ‘How awful!’ over all the evil abominations of the people of Israel. For they will fall by the sword, by food shortages, and by plague.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Those far away will die by the plague,
- type: usfm
  marker: q1
  children:
  - type: text
    text: those nearby shall fall by the sword,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and those who survive will die of hunger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will experience the fullness of my fury!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“And you will be convinced that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' when their corpses lie scattered around their idols and around their altars, on every high hill, on every mountaintop, under every spreading tree, and under every leafy oak—every place where they have offered soothing incense to all their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lifeless
  - type: text
    text: ' idols. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will stretch out my mighty arm against them and turn the land wherever they live into a complete wasteland from the desert to Riblah. '
