document_id: HAB.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Habakkuk’s First Question
  - type: text
    content: 'This is the vision '
  - type: note
    content: Or “burdensome vision.” The Hebrew term massaʾ denotes primarily an “oracle” or “vision” but may also denote a “burden.” It can refer to visionary messages containing either warnings of doom (e.g., Isa. 15:1; 19:1; 22:1) or messages of hope (e.g., Zech. 9:1; 12:1; Mal. 1:1). The text is clear that Habakkuk did not merely receive this vision but “saw” it (Hb. chazah) with his own eyes, perhaps in a trance or an ecstatic prophetic encounter.
  - type: text
    content: 'of Habakkuk the prophet:'
  '10':
  - type: text
    content: They are a people who mock kings
  - type: text
    content: and scoff at those in authority.
  - type: note
    content: See 2 Chron. 36:6.
  - type: text
    content: They laugh at every stronghold;
  - type: text
    content: they pile up earthen siege ramps and capture them.
  '11':
  - type: text
    content: Then they hurry on, like the wind that blows by and disappears.
  - type: text
    content: They are guilty men who worship their own power
  - type: text
    content: as if it were a god.”
  - type: heading
    content: Habakkuk’s Second Question
  '12':
  - type: text
    content: Yahweh
  - type: text
    content: ', have you not always been the everlasting God?'
  - type: text
    content: You are my God, my Holy One, who will not die.
  - type: note
    content: 'As translated from an ancient scribal tradition. The Masoretic Text is “we will not die,” that is, God would not let them be destroyed. The Hebrew phrase is loʾ namut, which translates to “we shall not die.” This phrase “is one of the eighteen passages in the OT called tiqqune sopherim, ‘corrections of the Scribes’ by the Masoretes [producers of the Masoretic Text]. The scribes were supposed to have corrected the original reading. The original reading of the passage was probably loʾ tamut—‘you shall not die,’ referring to God. Even though there is no manuscript or version support for tamut, it is probably the best reading” (Ralph Smith, Micah–Malachi, Word Biblical Commentary, vol. 32 [Dallas, TX: Word Books, 1984], 103; diacritics removed for consistency).'
  - type: text
    content: Yahweh
  - type: text
    content: ', you have appointed the '
  - type: text
    content: Babylonians
  - type: text
    content: ' to execute judgment;'
  - type: text
    content: my Rock, you have raised them up
  - type: text
    content: so they can punish us.
  '13':
  - type: text
    content: Your eyes are so pure that you cannot stand the sight of evil;
  - type: note
    content: Or “Your eyes are too pure to look upon evil [favorably].”
  - type: text
    content: nor do you look on wickedness with favor.
  - type: text
    content: Why then do you tolerate the treacherous?
  - type: text
    content: Why are you so silent while sinners
  - type: text
    content: devour those more righteous than themselves?
  '14':
  - type: text
    content: Have you only made us like fish,
  - type: text
    content: 'to be caught and killed '
  - type: text
    content: by the wicked
  - type: text
    content: ;
  - type: text
    content: 'like swarming '
  - type: text
    content: schools of fish
  - type: text
    content: ' with no ruler?'
  '15':
  - type: text
    content: 'Then the '
  - type: text
    content: Babylonians
  - type: text
    content: ' pull them up with fishhooks'
  - type: text
    content: and drag them in with their nets.
  - type: text
    content: Gleefully, they gather them up in their dragnets,
  - type: text
    content: shouting for joy over their catch.
  - type: note
    content: Or “He gathers [they gather] them up in his dragnet [their dragnets]; therefore, he rejoices [they rejoice] and is [are] glad.” See Isa. 19:8.
  '16':
  - type: text
    content: They even offer sacrifices and burn incense
  - type: text
    content: in honor of their nets, as if these were gods.
  - type: text
    content: 'For their nets '
  - type: note
    content: The nets in this passage are used metaphorically for the weapons of the Babylonians and their military might.
  - type: text
    content: enable them to live luxuriously
  - type: text
    content: and eat the finest food.
  '17':
  - type: text
    content: How long will you allow them
  - type: text
    content: 'to '
  - type: text
    content: fill and
  - type: text
    content: ' empty their throw nets?'
  - type: note
    content: Or “How long are they going to use their swords?”
  - type: text
    content: Will they forever destroy nations without mercy?
  - type: note
    content: See Isa. 14:6.
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ', how long must I cry for help'
  - type: text
    content: and you turn a deaf ear?
  - type: text
    content: My heart cries out, “Save us from this brutality!”
  - type: text
    content: but you do not save.
  '3':
  - type: text
    content: Why do you make me stare at injustice?
  - type: note
    content: It is difficult to find an English word equivalent to ʾawen. It has the nuance of “panting/striving for something for naught”—putting a tremendous amount of work into something and having it unravel before your eyes.
  - type: text
    content: Why do you tolerate such trouble and wrongdoing?
  - type: text
    content: Destruction and violence surround me;
  - type: text
    content: 'strife and conflict '
  - type: note
    content: The word translated “conflict” here (Hb. madon) has a root sense of a capricious, arbitrary use of coercive force by authorities.
  - type: text
    content: are everywhere.
  '4':
  - type: text
    content: Therefore, the law is not enforced,
  - type: note
    content: Or “the law is slack [feeble, crippled]”—that is, twisted justice goes forth.
  - type: text
    content: and so justice never prevails.
  - type: text
    content: The wicked overwhelm the righteous
  - type: text
    content: so that justice is perverted.
  - type: heading
    content: Yahweh’s Answer
  '5':
  - type: text
    content: “Look at the nations and observe—
  - type: text
    content: you’ll be stunned by what you see.
  - type: text
    content: For while you watch
  - type: text
    content: ', I am about to do something'
  - type: text
    content: so surprising in your days that you would not believe it
  - type: text
    content: even if you were told.
  - type: note
    content: See Acts 13:41. This is an example of the Holy Spirit infusing with fresh meaning a passage that seemed one-dimensional to the original recipients. The “something” God was about to do in Habakkuk’s day was to raise up the Babylonians to invade their land. Yet, the Holy Spirit has a “context of inspiration” and has applied the verse to the miracle of Christ’s resurrection as well. We must never limit Scripture to only one interpretation or application.
  '6':
  - type: text
    content: 'I am raising up the Babylonians '
  - type: text
    content: to punish you
  - type: text
    content: ' '
  - type: note
    content: Or “the Chaldeans,” who were originally the inhabitants of southern Babylonia. The Babylonians had lived in lower Mesopotamia for many centuries, but through their recent conquest of Assyria, they had ascended to become a world power for the first time.
  - type: text
    content: —
  - type: text
    content: that fierce and fearsome people,
  - type: text
    content: who sweep across the whole earth
  - type: text
    content: to seize houses they do not own.
  '7':
  - type: text
    content: They are a feared and dreaded people.
  - type: text
    content: In their autocratic arrogance,
  - type: note
    content: Or “In promoting their own honor.”
  - type: text
    content: they become a law unto themselves.
  '8':
  - type: text
    content: Their horses are swifter than leopards,
  - type: text
    content: 'fiercer than wolves '
  - type: text
    content: on the prowl
  - type: text
    content: ' at dusk.'
  - type: note
    content: Or “fiercer than evening wolves.” See Matt. 7:15; Acts 20:29.
  - type: text
    content: Their cavalry charges headlong;
  - type: text
    content: their horsemen come from afar.
  - type: text
    content: They soar swiftly like an eagle swooping to devour.
  '9':
  - type: text
    content: 'Their '
  - type: text
    content: armies
  - type: text
    content: ' invade, intent on violent '
  - type: text
    content: conquest
  - type: text
    content: .
  - type: text
    content: 'Their '
  - type: text
    content: terrifying
  - type: text
    content: ' hordes advance like a desert wind'
  - type: note
    content: The ambiguity of the Hebrew of this line results in uncertainty. The Hebrew term qadimah can either denote the meaning of “forward” or refer to the “wind from the east.” In the Mediterranean world, the east wind originating from the Arabian desert is highly destructive, given that it is very dry and fiercely hot and can wreak havoc on the agricultural lands of Israel and magnify the impact of devastating bushfires.
  - type: text
    content: and gather prisoners as numerous as grains of sand.
