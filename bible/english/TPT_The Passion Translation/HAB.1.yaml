        children:
        - type: text
          text: As translated from an ancient scribal tradition. The Masoretic Text is “we will not die,” that is, God would not let them be destroyed. The Hebrew phrase is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
