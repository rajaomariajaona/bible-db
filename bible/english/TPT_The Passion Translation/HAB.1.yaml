        - type: text
          text: . This is an example of the Holy Spirit infusing with fresh meaning a passage that seemed one-dimensional to the original recipients. The “something” God was about to do in Habakkuk’s day was to raise up the Babylonians to invade their land. Yet, the Holy Spirit has a “context of inspiration” and has applied the verse to the miracle of Christ’s resurrection as well. We must never limit Scripture to only one interpretation or application.
      marker-yv: yv-n
  '6':
