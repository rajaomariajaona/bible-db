      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tiqqune sopherim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ‘corrections of the Scribes’ by the Masoretes [producers of the Masoretic Text]. The scribes were supposed to have corrected the original reading. The original reading of the passage was probably'
      - type: usfm
