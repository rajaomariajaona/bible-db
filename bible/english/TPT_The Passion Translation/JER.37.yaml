document_id: JER.37,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Zedekiah Asks Jeremiah to Pray
  - type: text
    content: 'King Nebuchadnezzar had deported Judah’s King Jehoiachin son of Jehoiakim to Babylon. He then installed Josiah’s son Zedekiah as king in his place. '
  '10':
  - type: text
    content: For even if you were to defeat the entire army of Chaldeans who are fighting against you and only severely wounded men were left lying in their tents, they still would rise up and burn this city to the ground!’ ”
  - type: heading
    content: Jeremiah Accused of Defection
  '11':
  - type: text
    content: 'Now, the Babylonian army had withdrawn from Jerusalem at the approach of Pharaoh’s army. '
  '12':
  - type: text
    content: 'So I set out from Jerusalem to go to '
  - type: text
    content: Anathoth
  - type: text
    content: ' in the territory of Benjamin to settle some affairs regarding my share of an inheritance among my people. '
  '13':
  - type: text
    content: But when I arrived at the Benjamin Gate, the captain of the guard named Irijah, son of Shelemiah, grandson of Hananiah, seized me and accused me of trying to desert to the Babylonians.
  '14':
  - type: text
    content: '“You’re wrong,” I replied. “I’m not a traitor.” But Irijah refused to listen to me. He arrested me and brought me to the officials. '
  '15':
  - type: text
    content: The officials were furious with me, and they beat me and locked me up in the house of Jonathan, the court secretary, which they had made into a prison.
  - type: heading
    content: Jeremiah’s Audience with the King
  '16':
  - type: text
    content: 'After I had been put into the dungeon for a long time, '
  - type: note
    content: Both Joseph and Jeremiah were thrown into a pit (see Gen. 37:24; Jer. 38:6) and a prison (see Gen. 39:20).
  '17':
  - type: text
    content: 'King Zedekiah had me secretly brought to his palace. He asked me, “Has '
  - type: text
    content: Yahweh
  - type: text
    content: ' given you a word '
  - type: text
    content: for me
  - type: text
    content: ?”
  - type: text
    content: “Yes,” I answered. “
  - type: text
    content: Yahweh
  - type: text
    content: ' is going to let you be captured by the king of Babylon. '
  '18':
  - type: text
    content: 'But '
  - type: text
    content: please
  - type: text
    content: ' tell me, what crime have I committed against you, your officials, or these people that you have thrown me in prison? '
  '19':
  - type: text
    content: 'Your ‘prophets’ who told you that the king of Babylonia would not attack you or invade the land, where are they now? '
  '2':
  - type: text
    content: 'But Zedekiah, his officials, and the people paid no attention to the words '
  - type: text
    content: Yahweh
  - type: text
    content: ' had spoken through me.'
  '20':
  - type: text
    content: So now, please hear me, my lord the king. Let my humble plea come before you. Do not send me back to the dungeon at the court secretary Jonathan’s house. That would be my certain death!”
  '21':
  - type: text
    content: So King Zedekiah gave orders to confine me to the palace guardhouse. Each day a loaf of bread from the bakery was given to me until all the bread of the city was gone. So I remained there in the palace courtyard.
  '3':
  - type: text
    content: 'King Zedekiah sent two men to me with a request, Jehucal '
  - type: note
    content: Also spelled “Jucal” (see 38:1).
  - type: text
    content: 'the son of Shelemiah, and Zephaniah the priest, the son of Maaseiah. They said to me, “Please intercede to '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God that he would help us.” '
  '4':
  - type: text
    content: '(Now I was still moving about freely among the people, for I had not yet been put in prison. '
  '5':
  - type: text
    content: 'Meanwhile, Pharaoh '
  - type: note
    content: Pharaoh is a title for the king of Egypt. This pharaoh was Hophra (589–570 BC), also mentioned in 44:30.
  - type: text
    content: and his Egyptian army were on the move. And when the Babylonians who had besieged Jerusalem heard that the Egyptians were on the move against them, they withdrew from the city.)
  '6':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, spoke to me: “This is what you are to say to '
  - type: text
    content: Zedekiah
  - type: text
    content: ', the king of Judah, who asked you to consult with me: ‘Pharaoh’s army that you thought was coming to help you is about to return to Egypt. '
  '8':
  - type: text
    content: 'And the Babylonians will come back and attack this city. They will capture it and burn it down. '
  '9':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', warn you, do not deceive yourselves into thinking, “The Babylonians won’t come back to attack us,” because they surely will. '
