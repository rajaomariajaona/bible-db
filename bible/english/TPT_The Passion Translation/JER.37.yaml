document_id: JER.37
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zedekiah Asks Jeremiah to Pray
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'King Nebuchadnezzar had deported Judah’s King Jehoiachin son of Jehoiakim to Babylon. He then installed Josiah’s son Zedekiah as king in his place. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But Zedekiah, his officials, and the people paid no attention to the words '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' had spoken through me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'King Zedekiah sent two men to me with a request, Jehucal '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Also spelled “Jucal” (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 38:1
      metadata:
        usfm: JER.38.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'the son of Shelemiah, and Zephaniah the priest, the son of Maaseiah. They said to me, “Please intercede to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' our God that he would help us.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '(Now I was still moving about freely among the people, for I had not yet been put in prison. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Meanwhile, Pharaoh '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Pharaoh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is a title for the king of Egypt. This pharaoh was Hophra (589–570 BC), also mentioned in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 44:30
      metadata:
        usfm: JER.44.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: and his Egyptian army were on the move. And when the Babylonians who had besieged Jerusalem heard that the Egyptians were on the move against them, they withdrew from the city.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Israel, spoke to me: “This is what you are to say to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Zedekiah
  - type: text
    text: ', the king of Judah, who asked you to consult with me: ‘Pharaoh’s army that you thought was coming to help you is about to return to Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the Babylonians will come back and attack this city. They will capture it and burn it down. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', warn you, do not deceive yourselves into thinking, “The Babylonians won’t come back to attack us,” because they surely will. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For even if you were to defeat the entire army of Chaldeans who are fighting against you and only severely wounded men were left lying in their tents, they still would rise up and burn this city to the ground!’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah Accused of Defection
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now, the Babylonian army had withdrawn from Jerusalem at the approach of Pharaoh’s army. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So I set out from Jerusalem to go to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Anathoth
  - type: text
    text: ' in the territory of Benjamin to settle some affairs regarding my share of an inheritance among my people. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But when I arrived at the Benjamin Gate, the captain of the guard named Irijah, son of Shelemiah, grandson of Hananiah, seized me and accused me of trying to desert to the Babylonians.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“You’re wrong,” I replied. “I’m not a traitor.” But Irijah refused to listen to me. He arrested me and brought me to the officials. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The officials were furious with me, and they beat me and locked me up in the house of Jonathan, the court secretary, which they had made into a prison.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah’s Audience with the King
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'After I had been put into the dungeon for a long time, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Both Joseph and Jeremiah were thrown into a pit (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 37:24
      metadata:
        usfm: GEN.37.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 38:6
      metadata:
        usfm: JER.38.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and a prison (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 39:20
      metadata:
        usfm: GEN.39.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'King Zedekiah had me secretly brought to his palace. He asked me, “Has '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' given you a word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for me
  - type: text
    text: ?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes,” I answered. “
  - type: usfm
    marker: nd
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yahweh
  - type: text
    text: ' is going to let you be captured by the king of Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: please
  - type: text
    text: ' tell me, what crime have I committed against you, your officials, or these people that you have thrown me in prison? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Your ‘prophets’ who told you that the king of Babylonia would not attack you or invade the land, where are they now? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So now, please hear me, my lord the king. Let my humble plea come before you. Do not send me back to the dungeon at the court secretary Jonathan’s house. That would be my certain death!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So King Zedekiah gave orders to confine me to the palace guardhouse. Each day a loaf of bread from the bakery was given to me until all the bread of the city was gone. So I remained there in the palace courtyard.
