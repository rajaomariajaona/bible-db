document_id: PSA.17,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Cry for Justice
  - type: text
    content: 'A priestly prayer '
  - type: note
    content: This is the Hebrew word tephillah, and it is found in the titles of five Psalms (17; 86; 90; 102; 142).
  - type: text
    content: of David
  - type: heading
    content: Hear Me!
  - type: text
    content: Listen to me, Lord.
  - type: text
    content: Hear the passionate prayer of this honest man.
  - type: text
    content: My cause is just and my need is real.
  - type: text
    content: I’ve done what’s right and my lips speak truth.
  '10':
  - type: text
    content: They are pitiless, heartless—hard as nails,
  - type: text
    content: swollen with pride and filled with arrogance!
  '11':
  - type: text
    content: See how they close in on me,
  - type: text
    content: waiting for the chance to throw me to the ground.
  - type: note
    content: This is also what the soldiers did to Jesus. They threw him to the ground and nailed him to the cross.
  '12':
  - type: text
    content: They’re like lions eager to tear me apart,
  - type: text
    content: like young and fearless lions lurking in secret,
  - type: text
    content: so ferocious and cruel—ready to rip me to shreds.
  - type: heading
    content: Help Me!
  '13':
  - type: text
    content: Arise, God, and confront them!
  - type: text
    content: Challenge them with your might!
  - type: note
    content: The word used here is “sword.” An alternative translation would be “Rescue my soul from the wicked one, who is your sword.” The wicked are sometimes God’s tools to execute his judgments (Isa. 10:5; Jer. 51:20).
  - type: text
    content: Free me from their clutches and rescue me from their rage.
  '14':
  - type: text
    content: Throw them down to the ground,
  - type: text
    content: those who live for only this life on earth.
  - type: text
    content: Thrust them out of their prosperity
  - type: text
    content: and into their portion in eternity,
  - type: text
    content: leaving their wealth and wickedness behind!
  '15':
  - type: text
    content: 'As for me, because I am innocent, I will see '
  - type: note
    content: The Hebrew word for “see,” chaza, means “to see a vision.”
  - type: text
    content: your face
  - type: text
    content: until I see you for who you really are.
  - type: text
    content: 'I will be satisfied in an awakening of your likeness '
  - type: text
    content: in me
  - type: text
    content: '!'
  '2':
  - type: text
    content: Examine and exonerate me.
  - type: text
    content: Vindicate me and show the world I’m innocent.
  '3':
  - type: text
    content: For in a visitation of the night
  - type: text
    content: you inspected my heart and refined my soul in fire
  - type: text
    content: until nothing vile was found in me.
  - type: text
    content: I will not sin with my words.
  '4':
  - type: text
    content: Following your word has kept me from wrong.
  - type: text
    content: Your ways have molded my footsteps, keeping me
  - type: text
    content: from going down the paths of the violent.
  '5':
  - type: text
    content: My steps follow in the tracks of your chariot wheels,
  - type: text
    content: always staying in their path,
  - type: text
    content: never straying from your way.
  '6':
  - type: text
    content: You will answer me, God; I know you always will.
  - type: text
    content: Hear my words like you always do as you listen to my every prayer.
  - type: heading
    content: Hide Me!
  '7':
  - type: text
    content: Magnify the marvels of your mercy to all who seek you.
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: 'You are the '
  - type: text
    content: loving
  - type: text
    content: ' Savior of all who turn aside'
  - type: text
    content: to hide themselves in you.
  '8':
  - type: text
    content: Protect me from harm;
  - type: text
    content: keep an eye on me as you would a child
  - type: note
    content: Or “daughter.”
  - type: text
    content: who is reflected in the twinkling of your eye.
  - type: text
    content: Yes, hide me within the shelter of your embrace,
  - type: text
    content: under your outstretched wings.
  - type: note
    content: This could also be a reference to the mercy seat, where sacred blood was sprinkled in the Holy of Holies. There the golden cherubim overshadowed all who entered the divine chamber (Ex. 25:18–20).
  '9':
  - type: text
    content: Protect me there from all my foes.
  - type: text
    content: For there are many who surround my soul
  - type: text
    content: to completely destroy me.
