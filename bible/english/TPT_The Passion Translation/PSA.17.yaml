verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: A Cry for Justice
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A priestly prayer '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tephillah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', and it is found in the titles of five Psalms ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '86'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '90'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '102'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '142'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: of David
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hear Me!
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Listen to me, Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear the passionate prayer of this honest man.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My cause is just and my need is real.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve done what’s right and my lips speak truth.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They are pitiless, heartless—hard as nails,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: swollen with pride and filled with arrogance!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: See how they close in on me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: waiting for the chance to throw me to the ground.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is also what the soldiers did to Jesus. They threw him to the ground and nailed him to the cross.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They’re like lions eager to tear me apart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like young and fearless lions lurking in secret,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so ferocious and cruel—ready to rip me to shreds.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Help Me!
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Arise, God, and confront them!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Challenge them with your might!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word used here is “sword.” An alternative translation would be “Rescue my soul from the wicked one, who is your sword.” The wicked are sometimes God’s tools to execute his judgments (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 10:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 51:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Free me from their clutches and rescue me from their rage.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Throw them down to the ground,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who live for only this life on earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thrust them out of their prosperity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and into their portion in eternity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leaving their wealth and wickedness behind!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'As for me, because I am innocent, I will see '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “see,”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: chaza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', means “to see a vision.”'
      marker-yv: yv-n
    - type: text
      text: your face
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until I see you for who you really are.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will be satisfied in an awakening of your likeness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in me
    - type: text
      text: '!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Examine and exonerate me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vindicate me and show the world I’m innocent.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For in a visitation of the night
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you inspected my heart and refined my soul in fire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until nothing vile was found in me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not sin with my words.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Following your word has kept me from wrong.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your ways have molded my footsteps, keeping me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from going down the paths of the violent.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: My steps follow in the tracks of your chariot wheels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: always staying in their path,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: never straying from your way.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You will answer me, God; I know you always will.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear my words like you always do as you listen to my every prayer.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hide Me!
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Magnify the marvels of your mercy to all who seek you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You are the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: loving
    - type: text
      text: ' Savior of all who turn aside'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to hide themselves in you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Protect me from harm;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: keep an eye on me as you would a child
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “daughter.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who is reflected in the twinkling of your eye.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, hide me within the shelter of your embrace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: under your outstretched wings.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This could also be a reference to the mercy seat, where sacred blood was sprinkled in the Holy of Holies. There the golden cherubim overshadowed all who entered the divine chamber (
      - type: text
        text: Ex. 25:18–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Protect me there from all my foes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For there are many who surround my soul
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to completely destroy me.
