document_id: ROM.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Love for the Jewish People
  - type: text
    content: 'O Israel, my Jewish family, '
  - type: note
    content: Although implied here, Paul indeed calls them “my people” in v. 3.
  - type: text
    content: 'I feel such great sorrow and heartache for you that never leaves me! God knows these deep feelings within me as I long for you to come to faith in the Anointed One. My conscience will not let me speak anything but the truth. '
  '10':
  - type: text
    content: 'Now, this son was our ancestor, Isaac, who, with his wife, Rebekah, conceived twins. '
  '11':
  - type: text
    content: 'And before her twin sons were born, God spoke to Rebekah and said:'
  - type: text
    content: “The oldest will serve the youngest.”
  - type: note
    content: See Gen. 25:23.
  - type: text
    content: 'God spoke these words before the sons had done anything good or bad, which proves that God calls people not on the basis of their good or bad works, but according to his divine purpose. '
  '13':
  - type: text
    content: 'For in the words of Scripture:'
  - type: text
    content: “Jacob I have chosen, but Esau I have rejected.”
  - type: note
    content: Or “Jacob I loved, Esau I hated.” The love/hate contrast is not merely a matter of God’s emotions, but God’s actions of choosing Jacob and excluding Esau. This Semitic idiom is also found in Jesus’ words of “hating our father, mother . . . even our own life.” It is a “hatred” compared to the love we demonstrate by choosing to follow Jesus. See Mal. 1:2–3; Luke 14:26.
  '14':
  - type: text
    content: 'So, what does all this mean? Are we saying that God is unfair? Of course not! '
  '15':
  - type: text
    content: 'He had every right to say to Moses:'
  - type: text
    content: “I will be merciful to whomever I choose and I will show compassion to whomever I wish.”
  - type: note
    content: See Ex. 33:19.
  '16':
  - type: text
    content: 'Again, this proves that God’s choice doesn’t depend on how badly someone wants it or tries to earn it, '
  - type: note
    content: Or “not of the one willing nor of the one running.”
  - type: text
    content: 'but it depends on God’s kindness and mercy. '
  '17':
  - type: text
    content: 'For just as God said to Pharaoh:'
  - type: text
    content: '“I raised you up '
  - type: note
    content: The Aramaic can be translated “For this reason I ruined you.”
  - type: text
    content: as ruler of Egypt for this reason, that I might make you an example of how I demonstrate my miracle power. For by the example of how I deal with you, my powerful name will be a message proclaimed throughout the earth!”
  - type: note
    content: See Ex. 9:16.
  '18':
  - type: text
    content: 'So again we see that it is entirely up to God to show mercy or to harden '
  - type: note
    content: Although the Greek implies God hardens hearts, the Aramaic is more of a Hebrew idiom, “God gives permission for them to be hardened.” This implies the hardening the heart is from within the individual.
  - type: text
    content: the hearts of whomever he chooses.
  '19':
  - type: text
    content: Well then, one might ask, “If God is in complete control, how could he blame us? For who can resist whatever he wants done?”
  '20':
  - type: text
    content: 'But who do you think you are to second-guess God? How could a human being molded out of clay say to the one who molded him, “Why in the world did you make me this way?” '
  - type: note
    content: By implication Paul is speaking of people who have been made from clay in the hands of the divine Potter. See Isa. 29:16; 45:9.
  '21':
  - type: text
    content: Or are you denying the right of the potter to make out of clay whatever he wants? Doesn’t the potter have the right to make from the same lump of clay an elegant vase or an ordinary pot?
  '22':
  - type: text
    content: 'And in the same way, although God has every right to unleash his anger and demonstrate his power, yet he is extremely patient with those who deserve wrath—vessels prepared for destruction. '
  '23':
  - type: text
    content: 'And doesn’t he also have the right '
  - type: note
    content: Or “This he did to make known.” Although this sentence presents an anacoluthon and is missing the conditional clause, it is more likely that Paul is contrasting “the vessels prepared for destruction” with “the vessels of mercy.” Thus, “And doesn’t he also have the right?”
  - type: text
    content: 'to release the revelation of the wealth of his glory to his vessels of mercy, whom God prepared beforehand to receive his glory? '
  '24':
  - type: text
    content: 'Even for us, whether we are Jews or non-Jews, we are those he has called to experience his glory. '
  '25':
  - type: text
    content: 'Remember the prophecy God gave in Hosea:'
  - type: text
    content: “To those who were rejected and not my people,
  - type: text
    content: 'I will say to them: ‘You are mine.’'
  - type: text
    content: 'And to those who were unloved I will say:'
  - type: text
    content: ‘You are my darling.’ ”
  - type: note
    content: See Hos. 2:23.
  '26':
  - type: text
    content: 'And:'
  - type: text
    content: “In the place where they were told, ‘You are nobody,’
  - type: text
    content: this will be the very place where they will be renamed
  - type: text
    content: ‘Children of the living God.’ ”
  - type: note
    content: See Hos. 1:10.
  '27':
  - type: text
    content: 'And the prophet Isaiah cries out to Israel:'
  - type: text
    content: Though the children of Israel
  - type: text
    content: are as many as the sands of the seashore,
  - type: text
    content: only a remnant will be saved.
  '28':
  - type: text
    content: For the Lord will act
  - type: text
    content: and carry out his word on the earth,
  - type: text
    content: and waste no time to accomplish it!
  - type: note
    content: Or “cutting it short,” a Greek word found only here in the New Testament. See Isa. 10:23.
  '29':
  - type: text
    content: 'Just as Isaiah saw it coming and prophesied:'
  - type: text
    content: If the Lord God had not left us a remnant,
  - type: note
    content: Or “descendants.” See Isa. 1:9.
  - type: text
    content: we would have been destroyed like Sodom
  - type: text
    content: and left desolate like Gomorrah!
  - type: heading
    content: Israel’s Unbelief
  '3':
  - type: text
    content: For my grief is so intense that I wish that I would be accursed, cut off from the Messiah, if it would mean that you, my people, would come to faith in him!
  - type: text
    content: 'You are Israelites, my fellow citizens, and God’s chosen people. '
  - type: note
    content: Or “to you belong the adoption as sons.”
  - type: text
    content: 'To you belong God’s glorious presence, the covenants, the Torah, the temple with its required sacrifices, and the promises of God. '
  '30':
  - type: text
    content: 'So then, what does all this mean? '
  - type: text
    content: Here’s the irony
  - type: text
    content: ': The non-Jewish people, who weren’t even pursuing righteousness, were the ones who seized it—a perfect righteousness that is transferred by faith. '
  '31':
  - type: text
    content: 'Yet Israel, even though pursuing a legal righteousness, '
  - type: note
    content: Or “a righteousness based on the law.”
  - type: text
    content: 'did not attain to it. '
  '32':
  - type: text
    content: 'And why was that? Because they did not pursue the path of faith but insisted on pursuing righteousness by works, '
  - type: note
    content: Or “works of the law.”
  - type: text
    content: 'as if it could be seized another way. '
  - type: text
    content: They were offended by the means of obtaining it
  - type: text
    content: ' and stumbled over the stumbling stone, '
  '33':
  - type: text
    content: 'just as it is written:'
  - type: text
    content: “Be careful! I am setting in Zion a stone
  - type: text
    content: that will cause people to stumble,
  - type: text
    content: 'a rock '
  - type: note
    content: There is a play on words here that is lost in translation. The Aramaic word for “rock” (keefa) is also the word for “teaching” or “faith.” Aramaic speakers today still say that to stand in faith means to stand on a rock. To speak of the message of faith for salvation (versus works) is hidden in the word rock.
  - type: text
    content: of offense that will make them fall,
  - type: text
    content: but believers in him will not experience shame.”
  - type: note
    content: See Isa. 8:14; 28:16. The Hebrew of Isa. 28:16 is “Let the one who believes not expect it soon.” That is, even if a promise delays, we will not be disheartened but will remain steadfast in faith.
  '5':
  - type: text
    content: We trace our beginnings back to the patriarchs, and through their bloodline is the genealogy of the Messiah, who is God over everything. May he be praised through endless ages! Amen!
  '6':
  - type: text
    content: 'Clearly, God has not failed to fulfill his promises to Israel, for that will never happen! But not everyone who has descended from Israel belongs to Israel. '
  '7':
  - type: text
    content: 'Physical descent from Abraham doesn’t guarantee the inheritance, because God has said:'
  - type: text
    content: '“Through Isaac your descendants will be counted '
  - type: text
    content: as part of your lineage
  - type: text
    content: .”
  - type: note
    content: See Gen. 21:12.
  '8':
  - type: text
    content: 'This confirms that it is not merely the natural offspring of Abraham who are considered the children of God; rather, the children born because of God’s promise '
  - type: note
    content: The Aramaic can be translated “the children of the kingdom.” By implication, it is those who can be traced back to a supernatural birth who are regarded as the children of God.
  - type: text
    content: 'are counted as descendants. '
  '9':
  - type: text
    content: 'For God promised Abraham:'
  - type: text
    content: “Now is the time! For in nine months your wife, Sarah, will have a son!”
  - type: note
    content: See Gen. 18:10, 14.
  - type: heading
    content: God’s Freedom of Choice
