document_id: ROM.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Love for the Jewish People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'O Israel, my Jewish family, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:1–2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although implied here, Paul indeed calls them “my people” in v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: ROM.9.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'I feel such great sorrow and heartache for you that never leaves me! God knows these deep feelings within me as I long for you to come to faith in the Anointed One. My conscience will not let me speak anything but the truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: For my grief is so intense that I wish that I would be accursed, cut off from the Messiah, if it would mean that you, my people, would come to faith in him!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'You are Israelites, my fellow citizens, and God’s chosen people. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:3–4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to you belong the adoption as sons.”
    marker-yv: yv-n
  - type: text
    text: 'To you belong God’s glorious presence, the covenants, the Torah, the temple with its required sacrifices, and the promises of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: We trace our beginnings back to the patriarchs, and through their bloodline is the genealogy of the Messiah, who is God over everything. May he be praised through endless ages! Amen!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Clearly, God has not failed to fulfill his promises to Israel, for that will never happen! But not everyone who has descended from Israel belongs to Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Physical descent from Abraham doesn’t guarantee the inheritance, because God has said:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: '“Through Isaac your descendants will be counted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as part of your lineage
  - type: text
    text: .”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 21:12
      metadata:
        usfm: GEN.21.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'This confirms that it is not merely the natural offspring of Abraham who are considered the children of God; rather, the children born because of God’s promise '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “the children of the kingdom.” By implication, it is those who can be traced back to a supernatural birth who are regarded as the children of God.
    marker-yv: yv-n
  - type: text
    text: 'are counted as descendants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For God promised Abraham:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: “Now is the time! For in nine months your wife, Sarah, will have a son!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 18:10
      metadata:
        usfm: GEN.18.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: GEN.18.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Freedom of Choice
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now, this son was our ancestor, Isaac, who, with his wife, Rebekah, conceived twins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'And before her twin sons were born, God spoke to Rebekah and said:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: “The oldest will serve the youngest.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:11–12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 25:23
      metadata:
        usfm: GEN.25.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: 'God spoke these words before the sons had done anything good or bad, which proves that God calls people not on the basis of their good or bad works, but according to his divine purpose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For in the words of Scripture:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: “Jacob I have chosen, but Esau I have rejected.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Jacob I loved, Esau I hated.” The love/hate contrast is not merely a matter of God’s emotions, but God’s actions of choosing Jacob and excluding Esau. This Semitic idiom is also found in Jesus’ words of “hating our father, mother . . . even our own life.” It is a “hatred” compared to the love we demonstrate by choosing to follow Jesus. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal. 1:2–3
      metadata:
        usfm: MAL.1.2+MAL.1.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 14:26
      metadata:
        usfm: LUK.14.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So, what does all this mean? Are we saying that God is unfair? Of course not! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He had every right to say to Moses:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: “I will be merciful to whomever I choose and I will show compassion to whomever I wish.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 33:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Again, this proves that God’s choice doesn’t depend on how badly someone wants it or tries to earn it, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “not of the one willing nor of the one running.”
    marker-yv: yv-n
  - type: text
    text: 'but it depends on God’s kindness and mercy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For just as God said to Pharaoh:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: '“I raised you up '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “For this reason I ruined you.”
    marker-yv: yv-n
  - type: text
    text: as ruler of Egypt for this reason, that I might make you an example of how I demonstrate my miracle power. For by the example of how I deal with you, my powerful name will be a message proclaimed throughout the earth!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 9:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So again we see that it is entirely up to God to show mercy or to harden '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although the Greek implies God hardens hearts, the Aramaic is more of a Hebrew idiom, “God gives permission for them to be hardened.” This implies the hardening the heart is from within the individual.
    marker-yv: yv-n
  - type: text
    text: the hearts of whomever he chooses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Well then, one might ask, “If God is in complete control, how could he blame us? For who can resist whatever he wants done?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But who do you think you are to second-guess God? How could a human being molded out of clay say to the one who molded him, “Why in the world did you make me this way?” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: By implication Paul is speaking of people who have been made from clay in the hands of the divine Potter. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 29:16
      metadata:
        usfm: ISA.29.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 45:9
      metadata:
        usfm: ISA.45.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Or are you denying the right of the potter to make out of clay whatever he wants? Doesn’t the potter have the right to make from the same lump of clay an elegant vase or an ordinary pot?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And in the same way, although God has every right to unleash his anger and demonstrate his power, yet he is extremely patient with those who deserve wrath—vessels prepared for destruction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And doesn’t he also have the right '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “This he did to make known.” Although this sentence presents an anacoluthon and is missing the conditional clause, it is more likely that Paul is contrasting “the vessels prepared for destruction” with “the vessels of mercy.” Thus, “And doesn’t he also have the right?”
    marker-yv: yv-n
  - type: text
    text: 'to release the revelation of the wealth of his glory to his vessels of mercy, whom God prepared beforehand to receive his glory? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Even for us, whether we are Jews or non-Jews, we are those he has called to experience his glory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Remember the prophecy God gave in Hosea:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “To those who were rejected and not my people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will say to them: ‘You are mine.’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And to those who were unloved I will say:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘You are my darling.’ ”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hos. 2:23
      metadata:
        usfm: HOS.2.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “In the place where they were told, ‘You are nobody,’
- type: usfm
  marker: q1
  children:
  - type: text
    text: this will be the very place where they will be renamed
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Children of the living God.’ ”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hos. 1:10
      metadata:
        usfm: HOS.1.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And the prophet Isaiah cries out to Israel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Though the children of Israel
- type: usfm
  marker: q1
  children:
  - type: text
    text: are as many as the sands of the seashore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: only a remnant will be saved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: For the Lord will act
- type: usfm
  marker: q1
  children:
  - type: text
    text: and carry out his word on the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and waste no time to accomplish it!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “cutting it short,” a Greek word found only here in the New Testament. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 10:23
      metadata:
        usfm: ISA.10.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Just as Isaiah saw it coming and prophesied:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: If the Lord God had not left us a remnant,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “descendants.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 1:9
      metadata:
        usfm: ISA.1.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: we would have been destroyed like Sodom
- type: usfm
  marker: q1
  children:
  - type: text
    text: and left desolate like Gomorrah!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s Unbelief
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So then, what does all this mean? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Here’s the irony
  - type: text
    text: ': The non-Jewish people, who weren’t even pursuing righteousness, were the ones who seized it—a perfect righteousness that is transferred by faith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Yet Israel, even though pursuing a legal righteousness, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:31
    - type: usfm
