document_id: PSA.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Coronation of the King
  - type: heading
    content: Act I – The Nations Speak
  - type: text
    content: How dare the nations plan a rebellion.
  - type: text
    content: Their foolish plots are futile!
  - type: note
    content: Or “Why are they devising emptiness?” Some Jewish scholars believe that Ps. 1 and Ps. 2 form one psalm, for the theme of both is the way of the godly versus the way of the ungodly.
  '10':
  - type: text
    content: “Listen to me, all you rebel kings
  - type: text
    content: and all you upstart judges of the earth.
  - type: text
    content: 'Learn your lesson '
  - type: note
    content: Or “Do what is wise.”
  - type: text
    content: while there’s still time
  - type: text
    content: .
  '11':
  - type: text
    content: Serve and worship the awe-inspiring God.
  - type: text
    content: Recognize his greatness and bow before him,
  - type: text
    content: trembling with reverence in his presence.
  - type: note
    content: Or “rejoice with trembling.” The Hebrew word for “rejoice” means “to spin around with excited emotions” or “to twirl.”
  '12':
  - type: text
    content: Fall facedown before him and kiss the Son
  - type: note
    content: Or “be ruled by the Son.” The Hebrew word for “kiss” is nashaq and can also mean “to be ruled by” or “be in subjection to” the Son. Yet another possible translation of this difficult verse is “be armed with purity.”
  - type: text
    content: before his anger is roused against you.
  - type: text
    content: Remember that his wrath can be quickly kindled!
  - type: text
    content: But many blessings are waiting for all
  - type: text
    content: who turn aside to hide themselves in him!”
  '2':
  - type: text
    content: Look at how the power brokers of the world
  - type: text
    content: rise up to hold their summit
  - type: text
    content: as the rulers scheme and confer together
  - type: text
    content: 'against '
  - type: text
    content: Yahweh
  - type: text
    content: ' and his Anointed King, saying:'
  '3':
  - type: text
    content: “Let’s come together and break away from the Creator.
  - type: text
    content: Once and for all let’s cast off these controlling chains
  - type: text
    content: of God and his Christ!”
  - type: note
    content: The word found here for “Christ” is the Hebrew word for “Messiah” or “Anointed One.”
  - type: heading
    content: Act II – God Speaks
  '4':
  - type: text
    content: 'God-Enthroned '
  - type: note
    content: The Aramaic is Maryah, the Aramaic form of YHWH or Lord Yahweh.
  - type: text
    content: merely laughs at them;
  - type: text
    content: the Sovereign One mocks their madness!
  '5':
  - type: text
    content: Then with the fierceness of his fiery anger,
  - type: text
    content: 'he settles the issue '
  - type: note
    content: Or “In good time he drives them away.”
  - type: text
    content: 'and terrifies them to death '
  - type: note
    content: Or “snorts with anger.” The Hebrew word ‘aph (“fiery anger”) has a homonym that means “nose.”
  - type: text
    content: 'with these words:'
  '6':
  - type: text
    content: '“I myself have poured out '
  - type: note
    content: The Hebrew word (nacak) is frequently used for pouring out a drink offering to God. See Num. 28:7. Jesus was “poured out” as a consecrated offering.
  - type: text
    content: 'my King on Zion, '
  - type: note
    content: The word Zion is found 157 times in the Bible and 38 times in the Psalms.
  - type: text
    content: my holy mountain.”
  - type: note
    content: For the believer today, Zion is not only a place but also a realm where Christ is enthroned.
  - type: heading
    content: Act III – The Son Speaks
  '7':
  - type: text
    content: “I will reveal the eternal purpose of God.
  - type: text
    content: For he has decreed over me, ‘You are my favored Son.
  - type: text
    content: And as your Father I have crowned you as my King Eternal.
  - type: text
    content: Today I became your Father.
  '8':
  - type: text
    content: 'Ask me to give you the nations '
  - type: note
    content: Or in the Masoretic Text “Ask wealth of me.”
  - type: text
    content: and I will do it,
  - type: text
    content: and they shall become your legacy.
  - type: text
    content: Your domain will stretch to the ends of the earth.
  '9':
  - type: text
    content: 'And you will shepherd them '
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: with unlimited authority,
  - type: text
    content: 'crushing their rebellion as an iron rod '
  - type: note
    content: God’s “iron rod” can be a metaphor for the power of spiritual truth. See Pss. 23:4; 45:6.
  - type: text
    content: smashes jars of clay!’ ”
  - type: heading
    content: Act IV – The Holy Spirit Speaks
