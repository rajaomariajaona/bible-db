document_id: 1CO.8,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Love Is Greater Than Knowledge
  - type: text
    content: 'Now let me address the issue of food offered in sacrifice to idols. It seems that everyone believes his own opinion is right on this matter. '
  - type: note
    content: Or “we all have knowledge.”
  - type: text
    content: 'How easily we get puffed up over our opinions! But love builds up the structure '
  - type: text
    content: of our new life
  - type: text
    content: '. '
  - type: note
    content: That is, knowledge may make a person look important, but it is only through love that we reach our full maturity. It is simply “Love builds up.” It builds up our lives, our churches, our families, and others. Love is the most powerful substance for building what will last forever.
  '10':
  - type: text
    content: 'For if a believer with a weak conscience sees you, who have a greater understanding, dining in an idol’s temple, won’t this be a temptation to him to violate his own conscience '
  - type: note
    content: Or “have his conscience built up.” Ironically, this is the same Greek word Paul used in v. 1 for love “builds up.” The implication is that the weak believer will be emboldened to violate his conscience by watching a more mature believer freely eating food offered to idols.
  - type: text
    content: 'and eat food offered to idols? '
  '11':
  - type: text
    content: 'So, in effect, by exercising your understanding of freedom, you have ruined this weak believer, '
  - type: note
    content: This is because the “freedom” of the mature could lead the immature believer back into what he feels is idol worship.
  - type: text
    content: 'a brother for whom Christ has died! '
  '12':
  - type: text
    content: 'And when you offend weaker believers by wounding their consciences in this way, you also offend '
  - type: note
    content: That is, “They bring an offense against the teachings of Christ,” as translated from the Aramaic. The Greek is “When you sin against a weaker believer . . . you also sin against Christ.”
  - type: text
    content: the Anointed One!
  '13':
  - type: text
    content: 'So I conclude that if my eating certain food deeply offends '
  - type: note
    content: The Greek word skandalizō (from which we get our English word scandal) means “to throw a snare in front of someone purposely to trip them up.”
  - type: text
    content: my brother and hinders his advance in Christ, I will never eat it again. I don’t want to be guilty of causing my brother or sister to be wounded and defeated.
  '2':
  - type: text
    content: 'If anyone thinks of himself as a know-it-all, he still has a lot to learn. '
  '3':
  - type: text
    content: But if a person passionately loves God, he will possess the knowledge of God.
  - type: note
    content: Explicit in the Aramaic and implied in the Greek, which can also be translated, “is known [acknowledged] by God.”
  '4':
  - type: text
    content: 'Concerning food sacrificed as offerings to idols, we all know that an idol is nothing, for there is no God but one. '
  - type: note
    content: See Deut. 6:4.
  '5':
  - type: text
    content: 'Although there may be many so-called gods in this world, and in heaven there may be many “gods,” “lords,” and “masters,” '
  '6':
  - type: text
    content: yet for us there is only one God—the Father. Out of him is all things, and our lives are lived for him. And there is one Lord, Jesus, the Anointed One, through whom we and all things exist.
  '7':
  - type: text
    content: 'But not everyone has this revelation. For some were formerly idolaters, who consider idols as real and living. That’s why they consider the food offered to that “god” as defiled. And their weak consciences become defiled if they eat it. '
  '8':
  - type: text
    content: 'Yes, we know that what you eat will not bring you closer to God. You are no better if you don’t eat certain foods and no better if you do. '
  '9':
  - type: text
    content: 'But you must be careful that the liberty you exercise in eating food offered to idols doesn’t offend the weak believers. '
