document_id: PSA.130
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Out of the Depths
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A song of the stairway
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lord, I cry out to you out of the depths '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of my despair
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hear my voice, O God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Answer this prayer and hear my plea for mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Lord, if you measured us and marked us with our sins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who would ever have their prayers answered?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But your forgiving love is what makes you so wonderful.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No wonder you are loved and worshiped!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: This is why I wait upon you, expecting your breakthrough,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for your Word brings me hope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I long for you more than any watchman
- type: usfm
  marker: q1
  children:
  - type: text
    text: would long for the morning light.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will watch and wait for you, O God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: throughout the night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: O Israel, keep hoping, keep trusting,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and keep waiting on the Lord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for he is tenderhearted, kind, and forgiving.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has a thousand ways to set you free!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He himself will redeem you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will ransom you from the cruel slavery of your sins!
