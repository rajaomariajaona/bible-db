document_id: PSA.130,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Out of the Depths
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of the stairway
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lord, I cry out to you out of the depths '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of my despair
    - type: text
      text: '!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear my voice, O God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Answer this prayer and hear my plea for mercy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, if you measured us and marked us with our sins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who would ever have their prayers answered?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But your forgiving love is what makes you so wonderful.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No wonder you are loved and worshiped!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is why I wait upon you, expecting your breakthrough,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your Word brings me hope.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I long for you more than any watchman
  - type: usfm
    marker: q1
    children:
    - type: text
      text: would long for the morning light.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will watch and wait for you, O God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: throughout the night.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Israel, keep hoping, keep trusting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and keep waiting on the Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he is tenderhearted, kind, and forgiving.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has a thousand ways to set you free!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He himself will redeem you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will ransom you from the cruel slavery of your sins!
