document_id: PSA.130,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Out of the Depths
  - type: text
    content: A song of the stairway
  - type: text
    content: 'Lord, I cry out to you out of the depths '
  - type: text
    content: of my despair
  - type: text
    content: '!'
  '2':
  - type: text
    content: Hear my voice, O God!
  - type: text
    content: Answer this prayer and hear my plea for mercy.
  '3':
  - type: text
    content: Lord, if you measured us and marked us with our sins,
  - type: text
    content: who would ever have their prayers answered?
  '4':
  - type: text
    content: But your forgiving love is what makes you so wonderful.
  - type: text
    content: No wonder you are loved and worshiped!
  '5':
  - type: text
    content: This is why I wait upon you, expecting your breakthrough,
  - type: text
    content: for your Word brings me hope.
  '6':
  - type: text
    content: I long for you more than any watchman
  - type: text
    content: would long for the morning light.
  - type: text
    content: I will watch and wait for you, O God,
  - type: text
    content: throughout the night.
  '7':
  - type: text
    content: O Israel, keep hoping, keep trusting,
  - type: text
    content: and keep waiting on the Lord,
  - type: text
    content: for he is tenderhearted, kind, and forgiving.
  - type: text
    content: He has a thousand ways to set you free!
  '8':
  - type: text
    content: He himself will redeem you;
  - type: text
    content: he will ransom you from the cruel slavery of your sins!
