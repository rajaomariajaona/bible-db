document_id: PSA.96,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: King of the World
  - type: text
    content: Go ahead—sing your new song to the Lord!
  - type: text
    content: Let everyone in every language sing him a new song.
  - type: note
    content: Every new thing God does requires a new song to make it known.
  '10':
  - type: text
    content: 'Tell the nations plainly that '
  - type: text
    content: Yahweh
  - type: text
    content: ' rules over all!'
  - type: text
    content: He is doing a great job, and nothing will disrupt him,
  - type: text
    content: for he treats everyone fair and square.
  '11':
  - type: text
    content: Let the skies sing for joy! Let the earth join in the chorus.
  - type: text
    content: Let oceans thunder and fields echo this ecstatic praise
  - type: text
    content: until every swaying tree of every forest joins in,
  - type: text
    content: lifting up their songs of joyous praise to him!
  '13':
  - type: text
    content: For here he comes, the Lord God,
  - type: text
    content: and he’s ready to judge the world.
  - type: text
    content: He will do what’s right and can be trusted
  - type: text
    content: to always do what’s fair.
  '2':
  - type: text
    content: Don’t stop! Keep on singing! Make his name famous!
  - type: text
    content: Tell everyone every day how wonderful he is.
  - type: text
    content: Give them the good news of our great Savior.
  - type: text
    content: Take the message of his glory and miracles to every nation.
  - type: text
    content: Tell them about all the amazing things he has done.
  '4':
  - type: text
    content: For the Lord’s greatness is beyond description,
  - type: text
    content: and he deserves all the praise that comes to him.
  - type: text
    content: He is our King-God, and it’s right to be in holy awe of him.
  '5':
  - type: text
    content: 'Other gods '
  - type: note
    content: The Septuagint reads “demons.”
  - type: text
    content: are absolutely worthless.
  - type: text
    content: For the Lord God is Creator-God,
  - type: text
    content: who spread the splendor of the skies!
  '6':
  - type: text
    content: Breathtaking brilliance and awe-inspiring majesty
  - type: text
    content: radiate from his shining presence.
  - type: text
    content: His stunning beauty overwhelms all who come before him.
  - type: note
    content: Or “Strength and beauty are in his sanctuary.”
  '7':
  - type: text
    content: 'Surrender to the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', all you nations and peoples.'
  - type: text
    content: Surrender to him all your pride and strength.
  '8':
  - type: text
    content: 'Confess that '
  - type: text
    content: Yahweh
  - type: text
    content: ' alone deserves all the glory and honor.'
  - type: text
    content: Bring an offering and come celebrate in his courts.
  '9':
  - type: text
    content: Come worship the Lord God wearing the splendor of holiness.
  - type: text
    content: Let everyone wait in wonder as they tremble in awe before him.
