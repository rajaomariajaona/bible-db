document_id: PSA.96
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: King of the World
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Go ahead—sing your new song to the Lord!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let everyone in every language sing him a new song.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 96:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Every new thing God does requires a new song to make it known.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: Don’t stop! Keep on singing! Make his name famous!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell everyone every day how wonderful he is.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give them the good news of our great Savior.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take the message of his glory and miracles to every nation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell them about all the amazing things he has done.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For the Lord’s greatness is beyond description,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he deserves all the praise that comes to him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is our King-God, and it’s right to be in holy awe of him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Other gods '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 96:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint reads “demons.”
    marker-yv: yv-n
  - type: text
    text: are absolutely worthless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the Lord God is Creator-God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who spread the splendor of the skies!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Breathtaking brilliance and awe-inspiring majesty
- type: usfm
  marker: q1
  children:
  - type: text
    text: radiate from his shining presence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His stunning beauty overwhelms all who come before him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 96:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Strength and beauty are in his sanctuary.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Surrender to the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', all you nations and peoples.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Surrender to him all your pride and strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Confess that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' alone deserves all the glory and honor.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring an offering and come celebrate in his courts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Come worship the Lord God wearing the splendor of holiness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let everyone wait in wonder as they tremble in awe before him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tell the nations plainly that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' rules over all!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is doing a great job, and nothing will disrupt him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for he treats everyone fair and square.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: Let the skies sing for joy! Let the earth join in the chorus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let oceans thunder and fields echo this ecstatic praise
- type: usfm
  marker: q1
  children:
  - type: text
    text: until every swaying tree of every forest joins in,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lifting up their songs of joyous praise to him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For here he comes, the Lord God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he’s ready to judge the world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will do what’s right and can be trusted
- type: usfm
  marker: q1
  children:
  - type: text
    text: to always do what’s fair.
