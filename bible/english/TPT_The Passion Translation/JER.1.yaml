          text: ) because of his part in the plot to have Adonijah succeed David as king. Jeremiah possibly descended from Abiathar, accounting for the reference to “one of the priests” in Anathoth. The exact location of ancient Anathoth is uncertain, though most biblical archaeologists identify it with the modern Ras el-Kharrubeh, about a half mile (one kilometer) south of Anata and about three miles (five kilometers) north of Jerusalem.
