  '1':
  - type: heading
    content: Introduction
  - type: text
    content: 'The prophecies '
  - type: note
    content: Or “words,” “message,” “story,” “account,” “deeds,” or “activities.”
  - type: text
    content: 'of Jeremiah, '
  - type: note
    content: Jeremiah means “Yahweh exalts,” “Yahweh establishes [promotes],” or “Yahweh loosens [the womb].” The book of Jeremiah mentions the prophet’s name 122 times, and the New Testament mentions him 2 times (see Matt. 2:17; 16:14). Jeremiah was a tender-hearted prophet who stood for the righteousness of God. In a sense, this book is his autobiography.
  - type: text
    content: the son of Hilkiah.
  - type: note
    content: Hilkiah means “Yahweh is my portion.” Some scholars identify Hilkiah as the high priest who discovered the book of the law in the temple in the days of King Josiah (see 2 Kings 22:3–4, 8). Regardless, Hilkiah was a priest, which would qualify Jeremiah to be a priest. Therefore, Jeremiah was both a prophet and a priest.
  - type: text
    content: 'Jeremiah was one of the priests from '
  - type: text
    content: the village of
  - type: text
    content: ' Anathoth '
  - type: note
    content: God designated Anathoth as a city of refuge and a city given to the Levitical priests (see Josh. 21:18). Anathoth may mean “answers” or “shoutings.” However, some etymologists believe Anathoth derived its name from the goddess Anat (Anath). King Solomon banished Abiathar the high priest to Anathoth (see 1 Kings 2:26) because of his part in the plot to have Adonijah succeed David as king. Jeremiah possibly descended from Abiathar, accounting for the reference to “one of the priests” in Anathoth. The exact location of ancient Anathoth is uncertain, though most biblical archaeologists identify it with the modern Ras el-Kharrubeh, about a half mile (one kilometer) south of Anata and about three miles (five kilometers) north of Jerusalem.
  - type: text
    content: 'in the territory of Benjamin. '
