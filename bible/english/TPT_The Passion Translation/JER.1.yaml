  '15':
  - type: text
    content: 'Listen! I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare that I am about to summon'
  - type: text
    content: all the armies of the northern kingdoms.
  - type: text
    content: Their kings
  - type: text
    content: ' will come and set up their thrones'
  - type: text
    content: 'at the gates '
  - type: note
    content: The gates of an ancient city were double gates, with an inner gate and an outer gate. Built over the gates was an enclosed room and, above that, a lookout post. The space between the gates served as a place of government; here the leaders of the city or kings would sit to make official decisions or pass judgment (e.g., Ruth 4:1–11). Thus, foreign kings placing their thrones at the gates of Jerusalem meant that they were replacing the royal authority of Judah with their own. Metaphorically, the foreign kings could also represent demon principalities usurping God’s authority among his people.
  - type: text
    content: of Jerusalem.
  - type: text
    content: 'They will '
  - type: text
    content: attack
  - type: text
    content: ' its walls'
  - type: text
    content: and all the other cities of Judah.
