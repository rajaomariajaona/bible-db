  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ' began to reveal his message to him '
  - type: note
    content: Or “the word of Yahweh came to him.” The Hebraic way of thinking considers the word of Yahweh to possess life itself and to be an entity that expresses God. For the believer, we know that this Word has now become a Man (see John 1:1–14).
  - type: text
    content: 'in the thirteenth year of King Josiah son of Amon, king of Judah. '
  - type: note
    content: Josiah was king of Judah from 640 to 609 BC; the thirteenth year of his reign would then be 627–626 BC. Josiah came to the throne at the age of eight (see 2 Kings 22:1), and Jeremiah was likely ten at that time. In Josiah’s eighteenth year as king, he initiated a religious reform for which he is famous (see 2 Kings 22:3; 23:1–27). In Jer. 22:15–17, Jeremiah contrasts Josiah with his evil son Jehoiakim. Jeremiah and King Josiah were nearly the same age.
  '3':
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: continued to speak
  - type: text
    content: ' to him throughout the reign of Jehoiakim son of Josiah, king of Judah, until the fifth month of the eleventh year of the reign of Zedekiah, another son of Josiah, king of Judah. '
  - type: note
    content: Jehoiakim reigned from 609 to 598 BC, and afterward, there was a brief reign of Jehoiachin for just three months before Zedekiah (see 2 Kings 24:8), who reigned from 598 to 586 BC. During Zedekiah’s rule, the siege of Jerusalem took place, and in the eleventh year of his reign (586 BC), all Judah fell to the Babylonian army. There is some debate among scholars regarding whether Jerusalem fell in July 587 or 586 BC; the translation team will provide dates using 586 BC as the year Jerusalem fell. The major result of the siege of Jerusalem was the destruction of the temple (the symbol of Yahweh’s presence in the midst of his people).
  - type: text
    content: 'That was when the people of Jerusalem went into captivity '
  - type: text
    content: to Babylon
  - type: text
    content: .
  - type: heading
    content: The Call of Jeremiah
  '4':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke these words to me:'
  '5':
  - type: text
    content: '“Before I shaped you in the womb, '
  - type: note
    content: God creates all human life and gives each human being his image. See Isa. 49:1, 5; Gal. 1:15–16. God loved us and knew us intimately before we were born (see Ps. 139). He predestined us to serve him, accomplishing a pre-designed set of good works chosen for us to do. See Mark 16:20; Rom. 8:30; Eph. 1:4; 2:10; 1 Peter 1:2.
  - type: text
    content: 'I knew you '
  - type: text
    content: intimately
  - type: text
    content: .
  - type: note
    content: Scholars agree that the Hebrew word translated “I knew you intimately” covers a greater meaning than that of intellectual knowledge. It refers to the closest relationship possible. God knows each one with complete understanding of the total person as a thinking, willing, and feeling being.
  - type: text
    content: I had divine plans for you
  - type: text
    content: ' before I gave you life,'
  - type: text
    content: 'and I set you apart '
  - type: text
    content: and chose you to be mine
  - type: text
    content: .
  - type: text
    content: 'You are my prophetic gift '
  - type: note
    content: Although most translations read “I appointed you a prophet,” the Hebrew word means “give.” God gave Jeremiah as a gift. Ministry is more than a call, a task, or a responsibility; it is the outflow of a gift from God.
  - type: text
    content: to the nations.”
  - type: note
    content: Jeremiah was told to proclaim God’s word not only to the Jewish people of his day but also to the nations after the fall of Judah. God knew Jeremiah’s words would live and pierce our hearts today.
  '6':
  - type: text
    content: 'I replied: “But Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', I don’t know how to speak '
  - type: text
    content: in public
  - type: text
    content: '. Besides, I’m too young.” '
  - type: note
    content: Although Jeremiah’s age is impossible to tell with complete certainty, some scholars believe that he was between thirteen and seventeen at this time. Our age never disqualifies us from speaking for God.
  '7':
  - type: text
    content: 'But '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: interrupted
  - type: text
    content: ' me:'
  - type: text
    content: '“Do not use your youth '
  - type: text
    content: as an excuse
  - type: text
    content: ','
  - type: note
    content: Jeremiah, like ourselves, had to learn to see himself as God saw him and not hide behind any excuse.
  - type: text
    content: for you will go wherever I send you,
  - type: text
    content: and you will speak whatever I tell you to say.
  - type: note
    content: Jeremiah focused on his perceived limitations, but God wanted Jeremiah to focus on the Unlimited One who was sending him to proclaim the words of Yahweh. See Ex. 4:10–12; 6:12, 30; Deut. 18:18; 1 Kings 3:7.
  '8':
  - type: text
    content: Fear nothing when you confront the people,
  - type: text
    content: for I am with you, and I will protect you.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  '9':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' reached out with his hand and touched my mouth '
  - type: note
    content: 'One of the seraphim touched Isaiah’s mouth with a burning coal taken from the altar (see Isa. 6:6–7), but Yahweh himself touched Jeremiah’s mouth. The significance of the two actions is quite different: with Isaiah, it is a sign of the purification of his lips from sin; here it is God’s impartation of both revelation and authority to Jeremiah to speak the message God gave him to speak. See Deut. 18:18.'
  - type: text
    content: 'and said to me:'
  - type: text
    content: “Now I have put my words in your mouth.
  - type: note
    content: That is, Yahweh promised Jeremiah that he would have authoritative words to speak for God. The Hebrew verb for “put my words in your mouth” is a Qal perfect conjugation and indicates a completed and perfected action. The implication is that Yahweh promised Jeremiah, “I have put all my words in your mouth that you will ever need.” Today, God still can put his words in the mouths of his true prophets. See 1 Peter 4:11.
