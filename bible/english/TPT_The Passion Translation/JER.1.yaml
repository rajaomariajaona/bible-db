  - type: heading
    content: Two Visions
  '11':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me again: “What do you see, Jeremiah?”'
  - type: note
    content: This is not normal sight, but is from the root word used for the older term for “prophet” (see 1 Sam. 9:9). The prophet is a “see-er.” It is important that those who speak for God answer the question, “What do you see?,” for what you see determines what you preach. Do you only see what is negative? Jeremiah rightly saw the vision of an awakening, a reviving from a cold winter. His second vision was judgment. When we first see that God is the Awakener who watches over every word he has spoken, then we are able to see properly and interpret the coming judgment correctly.
  - type: text
    content: 'I replied: “I see an almond branch.”'
  '12':
  - type: text
    content: '“You have seen '
  - type: text
    content: the vision
  - type: text
    content: ' correctly,” '
  - type: text
    content: Yahweh
  - type: text
    content: ' said. “Now know this: I '
  - type: text
    content: constantly
  - type: text
    content: ' watch over my word to fulfill it.”'
  - type: note
    content: Jeremiah was not dreaming; he saw an open vision. The Hebrew play on words between the word for “almond” (Hb. shaqed) and the word for “watching [wakeful]” (Hb. shoqed) is lost in translation. The almond was also known as “the awakening tree,” for its blooms signaled the change from winter to spring. The word shoqed means that God remains alert and sleepless and is always on the lookout to hasten the fulfillment of his word. The almond tree was known as the tree that doesn’t sleep in the winter since it often blooms in late January. God does not sleep and is always careful to bring his words to pass, though the timing may be mysterious. Even in a bleak winter season, God will bring forth his plans.
  '13':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke these words to me a second time: “Now what do you see?”'
  - type: text
    content: 'I replied, “I see a large boiling pot, '
  - type: note
    content: 'Or “a blown pot,” usually understood as a pot over fire being fanned by the wind. This second revelation summarizes one of the themes of Jeremiah’s message: God will allow an invasion from the north to punish his people. In a sense, Jeremiah himself would be an “almond branch” (awakener) and a “boiling pot” (messenger of judgment).'
  - type: text
    content: tipped toward us from the north.”
  '14':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
