      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shoqed
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is lost in translation. The almond was also known as “the awakening tree,” for its blooms signaled the change from winter to spring. The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shoqed
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means that God remains alert and sleepless and is always on the lookout to hasten the fulfillment of his word. The almond tree was known as the tree that doesn’t sleep in the winter since it often blooms in late January. God does not sleep and is always careful to bring his words to pass, though the timing may be mysterious. Even in a bleak winter season, God will bring forth his plans.
      marker-yv: yv-n
