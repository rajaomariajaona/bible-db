          text: The gates of an ancient city were double gates, with an inner gate and an outer gate. Built over the gates was an enclosed room and, above that, a lookout post. The space between the gates served as a place of government; here the leaders of the city or kings would sit to make official decisions or pass judgment (e.g.,
      - type: usfm
