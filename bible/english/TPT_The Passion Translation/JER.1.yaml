        - type: text
          text: 1:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is not normal sight, but is from the root word used for the older term for “prophet” (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Sam. 9:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The prophet is a “see-er.” It is important that those who speak for God answer the question, “What do you see?,” for what you see determines what you preach. Do you only see what is negative? Jeremiah rightly saw the vision of an awakening, a reviving from a cold winter. His second vision was judgment. When we first see that God is the Awakener who watches over every word he has spoken, then we are able to see properly and interpret the coming judgment correctly.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I replied: “I see an almond branch.”'
