        - type: text
          text: This can be calculated as about August 29, 520 BC (Gregorian calendar). The first day of every month was to be a day of feasting, rejoicing, and bringing special offerings to the Lord. But with no temple standing, there was no way to properly observe this feast of the new moon. See
      - type: usfm
