      - type: text
        text: Ex. 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '—declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' stirred up the spirit of Zerubbabel son of Shealtiel governor of Judah, the spirit of Joshua son of Jehozadak the high priest, and the spirit of the entire remnant of the people, and they came together to rebuild the temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', their God, the Commander of Angel Armies. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: They began their work on the twenty-fourth day of the sixth month.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, September 21, 520 BC. It was only three weeks after Haggai’s initial message to the people before the work on the temple began. Some translations include the words “in the second year of King Darius.” However, the Hebrew text allows for placing those words either with the text that precedes or the text that follows. Since, on a discourse level, it is more convincing to place these words with the text that follows, this translation has done so.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, says this: ‘These people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: procrastinate
    - type: text
      text: ' by saying that this is not the right time to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: finish
    - type: text
      text: ' rebuilding '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s house.’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rebuking the Self-Absorbed
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke the following message to the people using Haggai as his mouthpiece: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Really?
    - type: text
      text: ' Is this the right time for you to be living in your expensive '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “paneled.” The Hebrew root meaning is “covered,” perhaps in contrast to the temple ruins being exposed to open air from above.
      marker-yv: yv-n
    - type: text
      text: 'houses while my house lies in ruins? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Haggai masterfully used the Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: chareb
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the same word for “drought” in v.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Chareb
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can be translated “rubble,” “ruins,” or “drought.” Apparently, the returned exiles had cleared the site of the temple and set up an altar, but they had erected no actual building (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ezra 3:1–6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). There were likely no walls completely constructed, yet the people were warm and cozy in their homes elaborately paneled with cedar. The Lord must be first place in all things (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 6:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). To apply this to believers today, we need to see ourselves as the house, God’s living temple. There is still much “rebuilding” and restoration that God wants to accomplish in his people (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 3:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 6:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 2:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:11–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So now, I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, say to you: You had better be intentional about the path you choose. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You have planted much but harvested very little. You fill your plates, but you are never full. You drink but are still thirsty. You put on clothes but not enough to keep warm. You earn wages, but your money burns a hole in your pocket and quickly runs out.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a figure of speech for prices rising faster than their wages. The cost of inflation had made their hard-earned money lose its value. It was like putting money in a pocket with holes.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, repeat: Be intentional about the path you take. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Now, go up the mountain, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word for “mountain” in Hebrew is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: harar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The feminine form is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hararah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the word used for “pregnant woman.” The identical terminology for pregnant women and mountains is not a comment on size. Instead, it’s because in Jewish culture, when you are on the top of a mountain, you are closer to God, and a pregnant woman was believed to be very close to God as she carried a living child. “Go up the mountain,” taken metaphorically, is an urge to draw close to God. This illustrates how Scripture can carry both concrete and symbolic truth.'
      marker-yv: yv-n
    - type: text
      text: 'cut some timber, and rebuild my house, and I will take pleasure in it and manifest my glory there. It is I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', who say so.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“You hoped for abundant crops, but instead you gathered little. When you brought in your meager harvest, I caused it to spoil. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I blew it away,” a figure of speech for destroying (spoiling) their meager harvest, ensuring that whatever harvest remained would not last.
      marker-yv: yv-n
    - type: text
      text: 'It is I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, asking you, ‘Why?’ It is because my house lies in ruins while each of you runs to his own house. '
