      marker-yv: yv-n
    - type: text
      text: 'and the ground its crops. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: I have called down drought on the land and hills—your grain, oil, and new wine. It has affected both people and animals and spoiled all your attempts to grow food.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The People Obey God’s Command
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then Zerubbabel son of Shealtiel, Joshua son of Jehozadak the high priest, and the entire remnant of the people obeyed the voice of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' their God. They recognized that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' their God had sent Haggai to them, so they obeyed his words. And the people were filled with holy awe toward '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then the messenger of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Haggai, spoke '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s promise to the people: “I am with you '
    - type: usfm
      marker: it
      children:
