        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is Darius I Hystaspes, Persia’s king from 521 to 486 BC after the death of Cambyses.
      marker-yv: yv-n
    - type: text
      text: 'the word of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' was spoken through the prophet Haggai. He delivered this prophecy to the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: appointed
    - type: text
      text: ' governor of Judah, Zerubbabel son of Shealtiel, and to the high priest, Joshua son of Jehozadak.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Haggai’s prophecy was intended for both the civil and religious leaders of the Jewish community. The governor was Zerubbabel the son of Shealtiel, a grandson of Jehoiachin, the king of Judah who was taken into exile in 597 BC (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 24:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; see also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Chron. 3:16–19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Joshua the high priest is also mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zech. 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and in the books of Ezra (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ezra 2:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and Nehemiah (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Neh. 12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '26'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), where his name is spelled in Hebrew “Yeshuwa,” or “Yeshua.” His father, Jehozadak, was the high priest who had been taken into exile when Jerusalem was captured by the Babylonians in 586 BC.
      marker-yv: yv-n
