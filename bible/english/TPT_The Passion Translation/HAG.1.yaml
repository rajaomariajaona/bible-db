      - type: text
        text: '10'
    - type: text
      text: 'That is why the sky has withheld the rain '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:10
      - type: usfm
        marker: ft
