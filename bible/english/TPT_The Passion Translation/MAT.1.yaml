document_id: MAT.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: From Abraham to Christ
  - type: text
    content: 'This is the scroll of the genealogy '
  - type: note
    content: Or “The book of the origin (genesis) of Jesus Christ.” The Greek text has no definite article (“This is the”) and is most likely to be considered as a caption or title. The Son of God is eternal and had no beginning (John 1:1; 1 John 1:1). The entire book of Matthew presents the beginning of the glorious story of Jesus, God’s Anointed One. The genealogy given by Matthew presents the legal claim of Jesus to be King through the lineage of David from Joseph all the way back to the promises given to Abraham. Some believe Luke’s account gives the genealogy of Jesus from Mary’s lineage through David all the way back to Adam.
  - type: text
    content: 'of Jesus, '
  - type: note
    content: The Hebrew name for Jesus is Yeshua and means “Yahweh is salvation.”
  - type: text
    content: the Anointed One, the son of David and descendant of Abraham.
  '10':
  - type: text
    content: 'who had a son named Manasseh, who had a son named Amos, '
  - type: note
    content: Or “Amon.”
  - type: text
    content: 'who had a son named Josiah, '
  '11':
  - type: text
    content: who was the father of Jeconiah.
  - type: note
    content: In Jer. 22:24–30 God pronounced a curse on Jeconiah’s family line, declaring that they were ineligible to sit on the throne as kings. However, Luke’s genealogy goes through David to Mary via Nathan, not Solomon, thus bypassing the curse of Jeconiah’s lineage. Matthew’s genealogy is meant to establish the legal right of Jesus Christ to be king. So Joseph, as Jesus’ adoptive father, passes the right of David’s throne legally to Jesus and avoids the curse of Jeconiah through Mary’s ancestry. Jesus is the Son of God paternally, and the Son of David maternally through Heli, Mary’s father. See footnote at Luke 3:23–38. From the beginning God said that the coming Savior would be the “seed of the woman.” See Gen. 3:15; Gal. 4:4.
  - type: text
    content: 'It was during the days of Jeconiah and his brothers that Israel was taken captive and deported to Babylon. '
  '12':
  - type: text
    content: 'About the time of their captivity in Babylon, Jeconiah had a son named Shealtiel, who had a son named Zerubbabel, '
  '13':
  - type: text
    content: 'who had a son named Abiud, who had a son named Eliakim, '
  '14':
  - type: text
    content: 'who had a son named Azor, who had a son named Zadok, who had a son named Achim, who had a son named Eliud, '
  '15':
  - type: text
    content: 'who had a son named Eleazar, who had a son named Matthan, who had a son named Jacob, '
  '16':
  - type: text
    content: 'who was the father of Joseph, the husband '
  - type: note
    content: Notice that Joseph is named the husband of Mary, not the father of Jesus.
  - type: text
    content: of Mary the mother of Jesus, who is called “the Anointed One.”
  '17':
  - type: text
    content: So from Abraham to David were fourteen generations, and from David to the Babylonian captivity, fourteen generations, and from the Babylonian captivity to Christ, fourteen generations.
  - type: note
    content: This would make a total of forty-two generations from Abraham to Christ. However, when the names are counted, there are only forty-one. There is a missing generation. What could this mean? Jesus gave birth to the forty-second generation when he died on the cross, for out of his side blood and water flowed. Blood and water come forth at birth. The first Adam “birthed” his wife out of his side, and so Jesus gave birth to his bride from his wounded side. Jesus wants to reproduce himself in us. His last name is not Christ. Christ is the title that explains who he is. He is the Anointed One. “Christ” is also now a corporate body, the body of Christ. We, as the body of Christ, are also anointed ones (Christians). See 1 Cor. 12:12.
  - type: heading
    content: An Angel Comes to Joseph
  '18':
  - type: text
    content: This is how the birth of Jesus Christ took place.
  - type: text
    content: 'His mother, Mary, had promised Joseph to be his wife, '
  - type: note
    content: In the Jewish culture the engagement was a prenuptial contract (ketubah), which was entered into before witnesses, that gave legal rights over the girl to the bridegroom. This agreement could only be nullified by going through the formal divorce process. Since the girl still lived with her family, sexual relations were prohibited until after the second event of the public marriage ceremony. This engagement period was usually entered into when the girl turned thirteen. Mary was just a teenager when she gave birth to Jesus.
  - type: text
    content: but while she was still a virgin
  - type: text
    content: ' '
  - type: note
    content: Or “without them being united (sexually).”
  - type: text
    content: 'she became pregnant through the power '
  - type: note
    content: Implied in the text. Although it is the genitive of source, not agency, “the power of the Holy Spirit” is supplied for clarity. See Deut. 20:7.
  - type: text
    content: 'of the Holy Spirit. '
  - type: note
    content: The “Holy Spirit” can also be translated “the Sacred Breath (Spirit-Wind)” or “the Spirit of Holiness.”
  '19':
  - type: text
    content: 'Her fiancé, '
  - type: note
    content: Or “Her husband.” The Hebrew culture makes no distinction between a fiancé and a husband. The engagement period was a vital part of the marriage custom. See Deut. 22:23–28.
  - type: text
    content: 'Joseph, was a righteous man full of integrity and he didn’t want to disgrace her, but when he learned of her pregnancy he secretly planned to break the engagement. '
  - type: note
    content: Or “divorce her.” The Jewish custom of breaking off an engagement was tantamount to a divorce.
  '2':
  - type: text
    content: 'Abraham had a son named Isaac, who had a son named Jacob, who had a son named Judah '
  - type: text
    content: (he and his brothers became the tribes of Israel)
  - type: text
    content: .
  '20':
  - type: text
    content: 'While he was still debating with himself about what to do, '
  - type: note
    content: Or “during his inward passion about these things.”
  - type: text
    content: 'he fell asleep and had a supernatural dream. An angel from the Lord appeared to him and said, “Joseph, descendant of David, don’t hesitate to take Mary into your home as your wife, '
  - type: note
    content: Or “take Miriam your wife.” Once again, the Jewish culture considered the betrothal period as part of the marriage custom.
  - type: text
    content: 'because the power of the Holy Spirit has conceived a child in her womb. '
  '21':
  - type: text
    content: 'She will give birth to a son and you are to name him ‘Savior,’ '
  - type: note
    content: Or “Jesus.” The Hebrew name for Jesus is Yeshua (or Y’hoshua) and means “Yahweh is salvation, restoration, and deliverance.” Implied in the text is that Hebrew (Aramaic) speakers would obviously understand how the name Yeshua and salvation were linked, reinforcing the theory that Matthew was originally written in Hebrew. This is lost in the Greek word Iesous (Jesus).
  - type: text
    content: 'for he is destined to '
  - type: text
    content: give his life
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: to save his people from their sins.”
  '22':
  - type: text
    content: 'This happened to fulfill what the Lord had spoken through his prophet:'
  '23':
  - type: text
    content: 'Listen! A virgin '
  - type: note
    content: See also v. 25, which clarifies that Mary was indeed a virgin.
  - type: text
    content: will be pregnant,
  - type: text
    content: she will give birth to a Son,
  - type: text
    content: and he will be known as “Emmanuel,”
  - type: text
    content: which means in Hebrew,
  - type: text
    content: “God became one of us.”
  - type: note
    content: Or “God with us” or “God among us”; that is, God incarnated. See Isa. 7:14; 8:8, 10 (LXX).
  '24':
  - type: text
    content: 'When Joseph woke from his dream, he did all that the angel of the Lord instructed him to do. He took Mary to be his wife, '
  '25':
  - type: text
    content: but they refrained from having sex until she gave birth to her firstborn son, whom they named “Jesus.”
  '3':
  - type: text
    content: 'Judah and Tamar '
  - type: note
    content: 'Matthew includes four women in this genealogy: Tamar, Rahab, Ruth, and Bathsheba.'
  - type: text
    content: 'had twin sons, Perez and Zerah. Perez had a son named Hezron, who had a son named Ram, '
  '4':
  - type: text
    content: 'who had a son named Amminadab, who had a son named Nashon, '
  '5':
  - type: text
    content: 'who had a son named Salmon, who, along with Rahab, had a son named Boaz. Boaz and Ruth had a son named Obed, who was the father of Jesse, '
  '6':
  - type: text
    content: 'and Jesse had a son named David, '
  - type: text
    content: who became the king
  - type: text
