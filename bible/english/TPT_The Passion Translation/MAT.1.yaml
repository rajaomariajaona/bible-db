      - type: usfm
        marker: ft
        children:
        - type: text
          text: This would make a total of forty-two generations from Abraham to Christ. However, when the names are counted, there are only forty-one. There is a missing generation. What could this mean? Jesus gave birth to the forty-second generation when he died on the cross, for out of his side blood and water flowed. Blood and water come forth at birth. The first Adam “birthed” his wife out of his side, and so Jesus gave birth to his bride from his wounded side. Jesus wants to reproduce himself in us. His last name is not Christ. Christ is the title that explains who he is. He is the Anointed One. “Christ” is also now a corporate body, the body of Christ. We, as the body of Christ, are also anointed ones (Christians). See
      - type: usfm
