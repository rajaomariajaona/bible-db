document_id: PRO.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Searching for Wisdom
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My child, will you treasure my wisdom?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then, and only then, will you acquire it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And only if you accept my advice
- type: usfm
  marker: q1
  children:
  - type: text
    text: and hide it within will you succeed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So train your heart to listen when I speak
- type: usfm
  marker: q1
  children:
  - type: text
    text: and open your spirit wide to expand your discernment—
- type: usfm
  marker: q1
  children:
  - type: text
    text: then pass it on to your sons and daughters.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Yes, cry out for comprehension and intercede for insight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For if you keep seeking it like a man would seek for sterling silver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: searching in hidden places for cherished treasure,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: then you will discover the fear of the Lord
- type: usfm
  marker: q1
  children:
  - type: text
    text: and find the true knowledge of God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Wisdom is a gift from a generous God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and every word he speaks is full of revelation
- type: usfm
  marker: q1
  children:
  - type: text
    text: and becomes a fountain of understanding within you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint adds “found in his presence.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: For the Lord has a hidden storehouse of wisdom
- type: usfm
  marker: q1
  children:
  - type: text
    text: made accessible to his godly ones.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7–8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the righteous.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: He becomes your personal bodyguard as you follow his ways,
- type: usfm
  marker: q1
  children:
  - type: text
    text: protecting and guarding you as you choose what is right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then you will discover all that is just, proper, and fair,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and be empowered to make the right decisions
- type: usfm
  marker: q1
  children:
  - type: text
    text: as you walk into your destiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When wisdom wins your heart and revelation breaks in,
- type: usfm
  marker: q1
  children:
  - type: text
    text: true pleasure enters your soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: If you choose to follow good counsel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: divine design will watch over you
- type: usfm
  marker: q1
  children:
  - type: text
    text: and understanding will protect you
- type: usfm
  marker: q1
  children:
  - type: text
    text: from making poor choices.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It will rescue you from evil in disguise
- type: usfm
  marker: q1
  children:
  - type: text
    text: and from those who speak duplicities.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For they have left the paths of righteousness
- type: usfm
  marker: q1
  children:
  - type: text
    text: and walk in the ways of darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They take pleasure when evil prospers
- type: usfm
  marker: q1
  children:
  - type: text
    text: and thoroughly enjoy a lifestyle of sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But they’re walking on a path to nowhere,
- type: usfm
  marker: q1
  children:
  - type: text
    text: wandering away into deeper deception.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom, the Way of the Pure
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Only wisdom can save you from the flattery
- type: usfm
  marker: q1
  children:
  - type: text
    text: of the promiscuous woman—
- type: usfm
  marker: q1
  children:
  - type: text
    text: she’s such a smooth-talking seductress!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: She left her husband and has forgotten her wedding vows.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Clearly this is a warning to those who would commit adultery, but there is a deeper meaning within this text. Proverbs tells us of two women: the adulteress and the virtuous woman of'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 31
      metadata:
        usfm: PRO.31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Both women speak a parable of two systems in the church. One is religious and alluring, tempting the young anointed ones to come to her “bed” of compromise (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 7:13
      metadata:
        usfm: MRK.7.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The other is the holy bride, virtuous and pure, keeping her first love (“wedding vows”) for Christ alone. Her “house” is the house of the Lord (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 2:18
      metadata:
        usfm: PRO.2.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). One system brings shame and despair; the other brings favor, honor, and glory. It is wisdom that protects us from one and unites us to the other. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Jer. 50–52
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Rev. 17–18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You’ll find her house on the road to hell,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: and all the men who go through her doors
- type: usfm
  marker: q1
  children:
  - type: text
    text: will never come back to the place they were—
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will find nothing but desolation and despair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Follow those who follow wisdom and stay on the right path.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For all my godly lovers will enjoy life to the fullest
- type: usfm
  marker: q1
  children:
  - type: text
    text: and will inherit their destinies.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “shall dwell in the land.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But the treacherous ones who love darkness
- type: usfm
  marker: q1
  children:
  - type: text
    text: will lose not only all they could have had,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but even their own souls!
