document_id: PRO.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Searching for Wisdom
  - type: text
    content: My child, will you treasure my wisdom?
  - type: text
    content: Then, and only then, will you acquire it.
  - type: text
    content: And only if you accept my advice
  - type: text
    content: and hide it within will you succeed.
  '10':
  - type: text
    content: When wisdom wins your heart and revelation breaks in,
  - type: text
    content: true pleasure enters your soul.
  '11':
  - type: text
    content: If you choose to follow good counsel,
  - type: text
    content: divine design will watch over you
  - type: text
    content: and understanding will protect you
  - type: text
    content: from making poor choices.
  '12':
  - type: text
    content: It will rescue you from evil in disguise
  - type: text
    content: and from those who speak duplicities.
  '13':
  - type: text
    content: For they have left the paths of righteousness
  - type: text
    content: and walk in the ways of darkness.
  '14':
  - type: text
    content: They take pleasure when evil prospers
  - type: text
    content: and thoroughly enjoy a lifestyle of sin.
  '15':
  - type: text
    content: But they’re walking on a path to nowhere,
  - type: text
    content: wandering away into deeper deception.
  - type: heading
    content: Wisdom, the Way of the Pure
  '16':
  - type: text
    content: Only wisdom can save you from the flattery
  - type: text
    content: of the promiscuous woman—
  - type: text
    content: she’s such a smooth-talking seductress!
  '17':
  - type: text
    content: She left her husband and has forgotten her wedding vows.
  - type: note
    content: 'Clearly this is a warning to those who would commit adultery, but there is a deeper meaning within this text. Proverbs tells us of two women: the adulteress and the virtuous woman of Prov. 31. Both women speak a parable of two systems in the church. One is religious and alluring, tempting the young anointed ones to come to her “bed” of compromise (see Mark 7:13). The other is the holy bride, virtuous and pure, keeping her first love (“wedding vows”) for Christ alone. Her “house” is the house of the Lord (see Prov. 2:18). One system brings shame and despair; the other brings favor, honor, and glory. It is wisdom that protects us from one and unites us to the other. See Jer. 50–52 and Rev. 17–18.'
  '18':
  - type: text
    content: You’ll find her house on the road to hell,
  '19':
  - type: text
    content: and all the men who go through her doors
  - type: text
    content: will never come back to the place they were—
  - type: text
    content: they will find nothing but desolation and despair.
  '2':
  - type: text
    content: So train your heart to listen when I speak
  - type: text
    content: and open your spirit wide to expand your discernment—
  - type: text
    content: then pass it on to your sons and daughters.
  - type: note
    content: As translated from the Septuagint.
  '20':
  - type: text
    content: Follow those who follow wisdom and stay on the right path.
  '21':
  - type: text
    content: For all my godly lovers will enjoy life to the fullest
  - type: text
    content: and will inherit their destinies.
  - type: note
    content: Literally “shall dwell in the land.”
  '22':
  - type: text
    content: But the treacherous ones who love darkness
  - type: text
    content: will lose not only all they could have had,
  - type: text
    content: but even their own souls!
  '3':
  - type: text
    content: Yes, cry out for comprehension and intercede for insight.
  '4':
  - type: text
    content: For if you keep seeking it like a man would seek for sterling silver,
  - type: text
    content: searching in hidden places for cherished treasure,
  '5':
  - type: text
    content: then you will discover the fear of the Lord
  - type: text
    content: and find the true knowledge of God.
  '6':
  - type: text
    content: Wisdom is a gift from a generous God,
  - type: text
    content: and every word he speaks is full of revelation
  - type: text
    content: and becomes a fountain of understanding within you.
  - type: note
    content: The Septuagint adds “found in his presence.”
  '7':
  - type: text
    content: For the Lord has a hidden storehouse of wisdom
  - type: text
    content: made accessible to his godly ones.
  - type: note
    content: Or “the righteous.”
  - type: text
    content: He becomes your personal bodyguard as you follow his ways,
  - type: text
    content: protecting and guarding you as you choose what is right.
  '9':
  - type: text
    content: Then you will discover all that is just, proper, and fair,
  - type: text
    content: and be empowered to make the right decisions
  - type: text
    content: as you walk into your destiny.
