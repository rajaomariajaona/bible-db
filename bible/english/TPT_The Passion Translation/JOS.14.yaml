    children:
    - type: text
      text: '9'
  - type: text
    text: 'On that day, Moses made an oath and promised me, ‘Every part of the land your feet tread upon shall be an inheritance for you and your descendants forever because you were loyal to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', my God.’'
  - type: usfm
