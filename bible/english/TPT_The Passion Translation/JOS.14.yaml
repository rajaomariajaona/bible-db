document_id: JOS.14,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Division of the Land West of the Jordan
  - type: text
    content: 'Eleazar the priest, '
  - type: note
    content: 'Eleazar was the son and successor of Aaron (see Deut. 10:6). Yahweh had instructed Moses to include the tribal leaders in the allotment of land to the Israelites. See Num. 34:16–29. Eleazar was mentioned before Joshua because the high priest presided over the drawing of lots, for he bore the Urim and Thummim on his breastplate. A traditional account of this event is stated in the Talmud: “Eleazar was wearing the Urim and Thummim, while Joshua and all Israel stood before him. An urn containing the names of the tribes and an urn containing descriptions of the boundaries were placed before him. Animated by the Holy Spirit, he gave directions, exclaiming, ‘Zebulun is coming up and boundaries of Acco came up with it.’ Thereupon, he shook well the urn of the tribes and Zebulun came up in his hand. Likewise, he shook well the urn of the boundaries and boundary of the line of Acco came up in his hand; . . . and so with the other tribes.” (See Bava Batra 122a.)'
  - type: text
    content: 'Joshua son of Nun, and the Israelite tribal leaders divided the land west of the Jordan among the people of Israel as their inheritance. '
  '10':
  - type: text
    content: “
  - type: text
    content: So here I am
  - type: text
    content: '. It’s been forty-five years since '
  - type: text
    content: Yahweh
  - type: text
    content: ' made this promise to Moses, when Israel journeyed through the wilderness. '
  - type: text
    content: Yahweh
  - type: text
    content: ' has preserved me, an eighty-five-year-old man, to this day. '
  '11':
  - type: text
    content: 'I’m still as strong today as on that day when Moses sent me out! I’m just as fit to go out to battle now as I was then. '
  '12':
  - type: text
    content: 'Now give me the hill country that '
  - type: text
    content: Yahweh
  - type: text
    content: ' promised me on that day. You yourself were there and heard the report that the Anakim lived there in strong and fortified cities. I know that with the power of '
  - type: text
    content: Yahweh
  - type: text
    content: ' helping me, I will drive them out, just as '
  - type: text
    content: Yahweh
  - type: text
    content: ' said!”'
  - type: note
    content: Caleb’s courage at eighty-five was incredible! He was neither weary nor intimidated by any giant. He knew God had promised him that land, and no giant was going to get in his way. Caleb was a giant-killer. Some scholars believe that he lived another twenty-five years enjoying his inheritance.
  '13':
  - type: text
    content: 'Joshua spoke '
  - type: text
    content: God’s
  - type: text
    content: ' blessing over Caleb son of Jephunneh and gave him Hebron as his inheritance. '
  '14':
  - type: text
    content: 'So Hebron has belonged to Caleb son of Jephunneh the Kenizzite ever since because he passionately followed '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel. '
  '15':
  - type: text
    content: (Hebron used to be called the City of Arba, after Arba, the most famous of all the Anakim.) Then the land was free of war.
  '2':
  - type: text
    content: 'By drawing lots, Eleazar assigned territory to the nine and a half tribes, as '
  - type: text
    content: Yahweh
  - type: text
    content: ' had commanded Moses. '
  - type: note
    content: See Num. 26:52–56.
  '3':
  - type: text
    content: 'The descendants of Joseph were divided into two tribes, Manasseh and Ephraim. Moses had already granted land east of the Jordan, but the tribe of Levi did not receive land as their inheritance. However, they were assigned cities in which to live and pasturelands for their property and livestock. '
  - type: note
    content: See Num. 35:1–15.
  '5':
  - type: text
    content: 'So the Israelites divided the land as '
  - type: text
    content: Yahweh
  - type: text
    content: ' had commanded Moses.'
  - type: heading
    content: Caleb
  '6':
  - type: text
    content: One day
  - type: text
    content: ', while Israel was encamped at Gilgal, the people of Judah approached Joshua, including Caleb '
  - type: note
    content: The name Caleb can be translated “dog.” However, because the name is actually a compound word in Hebrew, alternate meanings are “faithful,” “devoted,” “wholehearted,” “bold,” and “brave.”
  - type: text
    content: 'son of Jephunneh '
  - type: note
    content: Jephunneh means “he will behold.”
  - type: text
    content: 'from the Kenizzite '
  - type: note
    content: Kenizzite (see Gen. 15:19) means “possessor,” “spear-thrower,” or “hunter.” The descendants of Kenaz (Kenizzites), a non-Israelite people group, were later incorporated into the Judahite genealogy (see Judg. 1:13).
  - type: text
    content: 'clan. Caleb said to Joshua, “Remember what '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to Moses about you and me while we were still at Kadesh Barnea. '
  '7':
  - type: text
    content: 'I was forty years old when Moses, '
  - type: text
    content: Yahweh
  - type: text
    content: '’s servant, sent me from Kadesh Barnea to spy out the land '
  - type: text
    content: of Canaan
  - type: text
    content: ', '
  - type: note
    content: See Num. 13.
  - type: text
    content: 'and I brought back an honest and accurate report. '
  - type: note
    content: Or “as it was in my heart” or “according to my convictions.”
  '8':
  - type: text
    content: 'I have been faithful and obedient to '
  - type: text
    content: Yahweh
  - type: text
    content: ', my God. '
  - type: note
    content: Or “I filled [myself] up with Yahweh, my God.”
  - type: text
    content: 'But my fellow spies who went with me only '
  - type: text
    content: discouraged the people
  - type: text
    content: ' and made their hearts shrink back with fear. '
  '9':
  - type: text
    content: 'On that day, Moses made an oath and promised me, ‘Every part of the land your feet tread upon shall be an inheritance for you and your descendants forever because you were loyal to '
  - type: text
    content: Yahweh
  - type: text
    content: ', my God.’'
  - type: note
    content: See Num. 14:24, 30. Inheritance is based on obedience to the Lord.
