      - type: text
        text: '. Eleazar was mentioned before Joshua because the high priest presided over the drawing of lots, for he bore the Urim and Thummim on his breastplate. A traditional account of this event is stated in the Talmud: “Eleazar was wearing the Urim and Thummim, while Joshua and all Israel stood before him. An urn containing the names of the tribes and an urn containing descriptions of the boundaries were placed before him. Animated by the Holy Spirit, he gave directions, exclaiming, ‘Zebulun is coming up and boundaries of Acco came up with it.’ Thereupon, he shook well the urn of the tribes and Zebulun came up in his hand. Likewise, he shook well the urn of the boundaries and boundary of the line of Acco came up in his hand; . . . and so with the other tribes.” (See Bava Batra 122a.)'
    marker-yv: yv-n
  - type: text
    text: 'Joshua son of Nun, and the Israelite tribal leaders divided the land west of the Jordan among the people of Israel as their inheritance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
