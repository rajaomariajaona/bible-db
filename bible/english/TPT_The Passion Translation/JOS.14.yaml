  - type: text
    text: 'The descendants of Joseph were divided into two tribes, Manasseh and Ephraim. Moses had already granted land east of the Jordan, but the tribe of Levi did not receive land as their inheritance. However, they were assigned cities in which to live and pasturelands for their property and livestock. '
