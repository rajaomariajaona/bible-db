  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: So here I am
  - type: text
    text: '. It’s been forty-five years since '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' made this promise to Moses, when Israel journeyed through the wilderness. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has preserved me, an eighty-five-year-old man, to this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I’m still as strong today as on that day when Moses sent me out! I’m just as fit to go out to battle now as I was then. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now give me the hill country that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' promised me on that day. You yourself were there and heard the report that the Anakim lived there in strong and fortified cities. I know that with the power of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' helping me, I will drive them out, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said!”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Caleb’s courage at eighty-five was incredible! He was neither weary nor intimidated by any giant. He knew God had promised him that land, and no giant was going to get in his way. Caleb was a giant-killer. Some scholars believe that he lived another twenty-five years enjoying his inheritance.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Joshua spoke '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s
  - type: text
    text: ' blessing over Caleb son of Jephunneh and gave him Hebron as his inheritance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So Hebron has belonged to Caleb son of Jephunneh the Kenizzite ever since because he passionately followed '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: (Hebron used to be called the City of Arba, after Arba, the most famous of all the Anakim.) Then the land was free of war.
