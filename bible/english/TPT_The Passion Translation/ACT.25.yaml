document_id: ACT.25,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Appeals to Caesar
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Three days after Festus assumed his duties in Caesarea, he made the journey to Jerusalem. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a journey of about sixty-five miles (over one hundred kilometers).
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul replied, “I am standing here before Caesar’s tribunal. This is where I should be tried. As you well know, I have done no harm to the Jews. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If I have committed a crime worthy of death, I won’t seek to escape the death penalty. But if none of their charges are true, no one has the right to hand me over to them. I appeal to Caesar!”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After conferring with the members of his council, Festus replied, “Since you have appealed to Caesar, to Caesar you will go!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Festus and King Agrippa
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Several days later, King Agrippa and Bernice '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Bernice, a Jewess, was the sister of King Agrippa and the older sister of Drusilla, wife of Felix (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 24:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'arrived at Caesarea for a visit with Festus. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'During their stay of many days, Festus explained Paul’s situation to the king to get his opinion on the matter, saying, “There is a man here whom Felix left as a prisoner. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I was in Jerusalem, the leading priests and Jewish elders pressed charges against him and demanded that I issue a guilty verdict against him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I explained to them that it is not our Roman custom to condemn any man before he has an opportunity to face his accusers and present his defense. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they returned here with me. I didn’t postpone the trial, but convened the court the very next day and ordered the man to be brought before me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I listened to their accusations against him, but they were not what I expected to hear, for he had committed no crime. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rather, their issues centered around disagreements with him over their religion, and about a dead man named Jesus, who Paul claimed was alive. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Religious authorities and prominent leaders among the Jews brought formal charges against Paul before Festus. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because I was perplexed about how to proceed, I asked him if he would be willing to go to Jerusalem to stand trial on these charges. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Paul appealed his case to the emperor for a decision, I ordered him to be held in custody until I could send him to Caesar.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: King Agrippa said to Festus, “I would like to listen to this man myself.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Tomorrow,” he replied, “you will have that opportunity.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul before King Agrippa
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The next day King Agrippa and Bernice entered the audience hall with much pomp and pageantry. Accompanying them were the senior military officers and prominent citizens. Festus ordered that Paul be brought before them all.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Festus said, “King Agrippa, and esteemed guests, here is the man whom the entire Jewish community, both here and in Jerusalem, has asked me to condemn to death. They have screamed and shouted at me, demanding that I end his life. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet upon investigation I couldn’t find one thing that he has done to deserve the death penalty. When he appealed to His Majesty the emperor, I determined to send him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I have nothing concrete to write to His Majesty, so I have now brought him before you all, and especially before you, King Agrippa. After this preliminary hearing I should have something to write, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for it seems absurd to me to send a prisoner without specifying the charges against him.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They came asking him for a favor—that he would transfer Paul from Caesarea to Jerusalem—all the while plotting to ambush and kill Paul along the way.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Festus responded to their request by informing them that he planned to return to Caesarea shortly. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He told them, “Your leaders can come with me to Caesarea. If this man has broken any laws, you can bring charges against him there.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Festus had stayed in Jerusalem no more than eight to ten days, he left for Caesarea. The day after he arrived, he convened the court and took his seat on the bench as judge over the proceedings. After he ordered Paul brought into the courtroom, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the Jewish leaders who came from Jerusalem encircled him and leveled against him many serious charges, which they were unable to substantiate.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In his defense, Paul said by the Holy Spirit, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: '“I have done nothing wrong. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 25:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I have not sinned in anything.”
      marker-yv: yv-n
    - type: text
      text: I’ve committed no offense against Jewish law, or against the temple, or against Caesar.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Festus, because he wanted to curry favor with the Jews, asked Paul, “Are you willing to go with me to Jerusalem and be tried for these charges?”
