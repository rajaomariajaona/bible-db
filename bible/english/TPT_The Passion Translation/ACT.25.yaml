document_id: ACT.25,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Appeals to Caesar
  - type: text
    content: 'Three days after Festus assumed his duties in Caesarea, he made the journey to Jerusalem. '
  - type: note
    content: This was a journey of about sixty-five miles (over one hundred kilometers).
  '10':
  - type: text
    content: 'Paul replied, “I am standing here before Caesar’s tribunal. This is where I should be tried. As you well know, I have done no harm to the Jews. '
  '11':
  - type: text
    content: If I have committed a crime worthy of death, I won’t seek to escape the death penalty. But if none of their charges are true, no one has the right to hand me over to them. I appeal to Caesar!”
  '12':
  - type: text
    content: After conferring with the members of his council, Festus replied, “Since you have appealed to Caesar, to Caesar you will go!”
  - type: heading
    content: Festus and King Agrippa
  '13':
  - type: text
    content: 'Several days later, King Agrippa and Bernice '
  - type: note
    content: Bernice, a Jewess, was the sister of King Agrippa and the older sister of Drusilla, wife of Felix (Acts 24:24).
  - type: text
    content: 'arrived at Caesarea for a visit with Festus. '
  '14':
  - type: text
    content: 'During their stay of many days, Festus explained Paul’s situation to the king to get his opinion on the matter, saying, “There is a man here whom Felix left as a prisoner. '
  '15':
  - type: text
    content: 'When I was in Jerusalem, the leading priests and Jewish elders pressed charges against him and demanded that I issue a guilty verdict against him. '
  '16':
  - type: text
    content: 'I explained to them that it is not our Roman custom to condemn any man before he has an opportunity to face his accusers and present his defense. '
  '17':
  - type: text
    content: 'So they returned here with me. I didn’t postpone the trial, but convened the court the very next day and ordered the man to be brought before me. '
  '18':
  - type: text
    content: 'I listened to their accusations against him, but they were not what I expected to hear, for he had committed no crime. '
  '19':
  - type: text
    content: 'Rather, their issues centered around disagreements with him over their religion, and about a dead man named Jesus, who Paul claimed was alive. '
  '2':
  - type: text
    content: 'Religious authorities and prominent leaders among the Jews brought formal charges against Paul before Festus. '
  '20':
  - type: text
    content: 'Because I was perplexed about how to proceed, I asked him if he would be willing to go to Jerusalem to stand trial on these charges. '
  '21':
  - type: text
    content: When Paul appealed his case to the emperor for a decision, I ordered him to be held in custody until I could send him to Caesar.”
  '22':
  - type: text
    content: King Agrippa said to Festus, “I would like to listen to this man myself.”
  - type: text
    content: “Tomorrow,” he replied, “you will have that opportunity.”
  - type: heading
    content: Paul before King Agrippa
  '23':
  - type: text
    content: The next day King Agrippa and Bernice entered the audience hall with much pomp and pageantry. Accompanying them were the senior military officers and prominent citizens. Festus ordered that Paul be brought before them all.
  '24':
  - type: text
    content: 'Then Festus said, “King Agrippa, and esteemed guests, here is the man whom the entire Jewish community, both here and in Jerusalem, has asked me to condemn to death. They have screamed and shouted at me, demanding that I end his life. '
  '25':
  - type: text
    content: 'Yet upon investigation I couldn’t find one thing that he has done to deserve the death penalty. When he appealed to His Majesty the emperor, I determined to send him. '
  '26':
  - type: text
    content: 'But I have nothing concrete to write to His Majesty, so I have now brought him before you all, and especially before you, King Agrippa. After this preliminary hearing I should have something to write, '
  '27':
  - type: text
    content: for it seems absurd to me to send a prisoner without specifying the charges against him.”
  '3':
  - type: text
    content: They came asking him for a favor—that he would transfer Paul from Caesarea to Jerusalem—all the while plotting to ambush and kill Paul along the way.
  '4':
  - type: text
    content: 'Festus responded to their request by informing them that he planned to return to Caesarea shortly. '
  '5':
  - type: text
    content: He told them, “Your leaders can come with me to Caesarea. If this man has broken any laws, you can bring charges against him there.”
  '6':
  - type: text
    content: 'After Festus had stayed in Jerusalem no more than eight to ten days, he left for Caesarea. The day after he arrived, he convened the court and took his seat on the bench as judge over the proceedings. After he ordered Paul brought into the courtroom, '
  '7':
  - type: text
    content: the Jewish leaders who came from Jerusalem encircled him and leveled against him many serious charges, which they were unable to substantiate.
  '8':
  - type: text
    content: 'In his defense, Paul said by the Holy Spirit, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: '“I have done nothing wrong. '
  - type: note
    content: Or “I have not sinned in anything.”
  - type: text
    content: I’ve committed no offense against Jewish law, or against the temple, or against Caesar.”
  '9':
  - type: text
    content: Festus, because he wanted to curry favor with the Jews, asked Paul, “Are you willing to go with me to Jerusalem and be tried for these charges?”
