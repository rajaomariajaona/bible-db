document_id: JER.19,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Allegory of the Broken Jar
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me, “Go to the pottery shop and buy a clay jar. '
  - type: note
    content: Or “flask.” The Hebrew word baqbuq refers to a narrow-necked bottle and comes from the verb meaning “to make a gurgling sound,” describing what the water did when it came out of the bottle. Archaeological finds indicate that these bottles were from four to ten inches (ten to twenty-five centimeters) in height.
  - type: text
    content: 'Then take along some of the city officials and leading priests '
  '10':
  - type: text
    content: '“Then, smash the clay jar in the sight of the men who go with you '
  '11':
  - type: text
    content: 'and say to them: ‘'
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says to you: '
  - type: text
    content: See this smashed clay jar?
  - type: text
    content: ' That is what I will do to you. I will smash these people and this city as one smashes a potter’s vessel, never to be repaired. You will bury your dead here in Topheth, '
  - type: note
    content: According to Rashi, Topheth was filled with the bones of the victims of human sacrifice. See 2 Kings 23:10.
  - type: text
    content: this unclean place
  - type: text
    content: '; so many of you will die that there won’t be enough room to bury them. '
  '12':
  - type: text
    content: 'That is what I will do to this city and its inhabitants, declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. I will make this '
  - type: text
    content: sanctuary
  - type: text
    content: ' city into a '
  - type: text
    content: cemetery
  - type: text
    content: ' like Topheth. '
  '13':
  - type: text
    content: 'Both the houses of the kings of Judah and the houses of Jerusalem will be defiled like the place of Topheth—all the houses upon whose roofs offerings have been made to the whole host of heaven and drink offerings '
  - type: note
    content: The Hebrew word for “drink offering” is nesek and comes from a verb that means “to pour.” It is not something that one drinks, but is an offering poured out to honor a god.
  - type: text
    content: have been poured out to false gods.’ ”
  '14':
  - type: text
    content: 'When Jeremiah returned from Topheth, where '
  - type: text
    content: Yahweh
  - type: text
    content: ' had sent him to prophesy, he stood in the court of '
  - type: text
    content: Yahweh
  - type: text
    content: '’s temple and said to all the people: '
  '15':
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, the God of Israel, says to you: ‘I am going to bring upon this city and all its nearby villages every disaster that I have decreed against them because they have stubbornly hardened their hearts and refused to listen to my words.’ ”'
  '2':
  - type: text
    content: 'and go to the Hinnom Valley, '
  - type: note
    content: Or “the Valley of Ben Hinnom”; see footnote on 7:31.
  - type: text
    content: 'just outside the Potsherd Gate. '
  - type: note
    content: Or “Harsith Gate.” It is, perhaps, the gate leading into the Hinnom Valley, where broken pottery was dumped. Some scholars, the Targum, and Rashi have identified it with the Dung Gate mentioned in Neh. 2:13; 3:13–14; 12:31.
  - type: text
    content: 'Speak to the people the words I give you. '
  '3':
  - type: text
    content: 'Say to them, ‘Hear the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ', you kings of Judah and inhabitants of Jerusalem! '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, the God of Israel, says to you: I am going to bring such a great disaster upon this place that the ears of all who hear about it will tingle '
  - type: text
    content: with astonishment
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'For they, their ancestors, and the kings of Judah have defiled this place and forsaken me. They have sacrificed here to strange gods, whom they never knew, and have filled this place with the blood of innocent people. '
  '5':
  - type: text
    content: 'They have built altars to Baal and sacrificed their children to the fire as burnt offerings to Baal. This is not something I commanded them to do, nor did it ever enter my mind. '
  '6':
  - type: text
    content: 'Because they have done all this, behold, the time is coming when this place will no longer be called Topheth or the Hinnom Valley, but people will call it Slaughter Valley, declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '7':
  - type: text
    content: '“ ‘And I will also frustrate the plans of Judah and Jerusalem in this place. I will cause their bloodthirsty enemies to triumph over them, and I will give their dead bodies as food to the beasts of the field and birds of the sky. '
  '8':
  - type: text
    content: 'I will make this '
  - type: text
    content: once revered
  - type: text
    content: ' city an object of horror and astonishment; '
  - type: note
    content: Or “something to hiss at.” See footnote on 18:16.
  - type: text
    content: 'everyone who passes by it will be appalled and will make insulting remarks because of all its wounds! '
  '9':
  - type: text
    content: 'I will cause their bloodthirsty enemies to lay siege to their city and cause them great suffering. They will become so desperate that they will '
  - type: text
    content: become cannibals
  - type: text
    content: ', eating their neighbors and even their own children.’'
  - type: note
    content: See Deut. 28:53; Lam. 4:10.
