  - type: text
    text: The Allegory of the Broken Jar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said to me, “Go to the pottery shop and buy a clay jar. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “flask.” The Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: baqbuq
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: refers to a narrow-necked bottle and comes from the verb meaning “to make a gurgling sound,” describing what the water did when it came out of the bottle. Archaeological finds indicate that these bottles were from four to ten inches (ten to twenty-five centimeters) in height.
    marker-yv: yv-n
  - type: text
    text: 'Then take along some of the city officials and leading priests '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and go to the Hinnom Valley, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the Valley of Ben Hinnom”; see footnote on
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:31
      metadata:
        usfm: JER.7.31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'just outside the Potsherd Gate. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Harsith Gate.” It is, perhaps, the gate leading into the Hinnom Valley, where broken pottery was dumped. Some scholars, the Targum, and Rashi have identified it with the Dung Gate mentioned in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Neh. 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 3:13–14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 12:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Speak to the people the words I give you. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Say to them, ‘Hear the word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', you kings of Judah and inhabitants of Jerusalem! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, the God of Israel, says to you: I am going to bring such a great disaster upon this place that the ears of all who hear about it will tingle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with astonishment
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For they, their ancestors, and the kings of Judah have defiled this place and forsaken me. They have sacrificed here to strange gods, whom they never knew, and have filled this place with the blood of innocent people. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They have built altars to Baal and sacrificed their children to the fire as burnt offerings to Baal. This is not something I commanded them to do, nor did it ever enter my mind. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Because they have done all this, behold, the time is coming when this place will no longer be called Topheth or the Hinnom Valley, but people will call it Slaughter Valley, declares '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“ ‘And I will also frustrate the plans of Judah and Jerusalem in this place. I will cause their bloodthirsty enemies to triumph over them, and I will give their dead bodies as food to the beasts of the field and birds of the sky. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I will make this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: once revered
  - type: text
    text: ' city an object of horror and astonishment; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “something to hiss at.” See footnote on
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:16
      metadata:
        usfm: JER.18.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'everyone who passes by it will be appalled and will make insulting remarks because of all its wounds! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I will cause their bloodthirsty enemies to lay siege to their city and cause them great suffering. They will become so desperate that they will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: become cannibals
  - type: text
    text: ', eating their neighbors and even their own children.’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 28:53
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lam. 4:10
      metadata:
        usfm: LAM.4.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Then, smash the clay jar in the sight of the men who go with you '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and say to them: ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, says to you: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: See this smashed clay jar?
  - type: text
    text: ' That is what I will do to you. I will smash these people and this city as one smashes a potter’s vessel, never to be repaired. You will bury your dead here in Topheth, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: According to Rashi, Topheth was filled with the bones of the victims of human sacrifice. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 23:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: this unclean place
  - type: text
    text: '; so many of you will die that there won’t be enough room to bury them. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'That is what I will do to this city and its inhabitants, declares '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. I will make this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sanctuary
  - type: text
    text: ' city into a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: cemetery
  - type: text
    text: ' like Topheth. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Both the houses of the kings of Judah and the houses of Jerusalem will be defiled like the place of Topheth—all the houses upon whose roofs offerings have been made to the whole host of heaven and drink offerings '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “drink offering” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nesek
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and comes from a verb that means “to pour.” It is not something that one drinks, but is an offering poured out to honor a god.
    marker-yv: yv-n
  - type: text
    text: have been poured out to false gods.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When Jeremiah returned from Topheth, where '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' had sent him to prophesy, he stood in the court of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s temple and said to all the people: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, the God of Israel, says to you: ‘I am going to bring upon this city and all its nearby villages every disaster that I have decreed against them because they have stubbornly hardened their hearts and refused to listen to my words.’ ”'
