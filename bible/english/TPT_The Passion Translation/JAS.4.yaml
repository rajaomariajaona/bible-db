document_id: JAS.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Living Close to God
  - type: text
    content: 'What is the cause of your conflicts and quarrels with each other? Doesn’t the battle begin inside of you as you fight to have your own way and fulfill your own desires? '
  '10':
  - type: text
    content: Be willing to be made low before the Lord and he will exalt you!
  '11':
  - type: text
    content: 'Dear friends, as part of God’s family, never speak against another family member, for when you slander a brother or sister you violate '
  - type: note
    content: Or “speak against.”
  - type: text
    content: 'God’s law '
  - type: text
    content: of love
  - type: text
    content: '. And your duty is not to make yourself a judge of the law '
  - type: text
    content: of love
  - type: text
    content: ' '
  - type: note
    content: See also Lev. 19:18; James 4:8.
  - type: text
    content: 'by saying that it doesn’t apply to you, '
  - type: note
    content: Or “to be a judge of the law.”
  - type: text
    content: but your duty is to obey it
  - type: text
    content: '! '
  - type: note
    content: Implied in the argument Jacob makes to refrain from being a judge of the law.
  '12':
  - type: text
    content: There is only one true Lawgiver and Judge, the One who has the power to save and destroy—so who do you think you are to judge your neighbor?
  '13':
  - type: text
    content: 'Listen, those of you who are boasting, “Today or tomorrow we’ll go to another city and spend some time and go into business and make heaps of profit!” '
  '14':
  - type: text
    content: 'But you don’t have a clue what tomorrow may bring. For your fleeting life is but a warm breath of air that is visible in the cold only for a moment and then vanishes! '
  '15':
  - type: text
    content: 'Instead you should say, “Our tomorrows are in the Lord’s hands and if he is willing we will live life to its fullest and do this or that.” '
  '16':
  - type: text
    content: But here you are, boasting in your ignorance, for to be presumptuous about what you’ll do tomorrow is evil!
  '17':
  - type: text
    content: So if you know of an opportunity to do the right thing today, yet you refrain from doing it, you’re guilty of sin.
  '2':
  - type: text
    content: 'You jealously want what others have so you begin to see yourself as better than others. You scheme with envy and harm '
  - type: note
    content: Or “kill,” however, the Greek words for “kill” and “envy” are almost the same.
  - type: text
    content: 'others to selfishly obtain what you crave—that’s why you quarrel and fight. And all the time you don’t obtain what you want because you won’t ask God for it! '
  '3':
  - type: text
    content: 'And if you ask, you won’t receive it for you’re asking with corrupt motives, '
  - type: note
    content: The Greek word for corrupt motives is kakos and can be translated “sick,” or “sickly.” James is exhorting us not to pray “sickly prayers.”
  - type: text
    content: 'seeking only to fulfill your own selfish desires. '
  '4':
  - type: text
    content: You have become spiritual adulterers who are having an affair, an unholy relationship with the world. Don’t you know that flirting with the world’s values places you at odds with God? Whoever chooses to be the world’s friend makes himself God’s enemy!
  '5':
  - type: text
    content: Does the Scripture mean nothing to you that says, “The Spirit that God breathed into our hearts is a jealous Lover who intensely desires to have more and more of us”?
  - type: note
    content: Although it is difficult to find a verse from the Old Testament that reads exactly how Jacob quotes it, the possibility remains that it becomes a general statement of what the Bible teaches, or even a quotation from an older translation not available today. We must always realize that the Holy Spirit pursues us relentlessly and takes it very personally when we turn from him to pursue friendship with the world.
  '6':
  - type: text
    content: 'But he continues to pour out more and more grace '
  - type: note
    content: Or “he gives us a greater gift” or “the grace [favor] he gives us is stronger.”
  - type: text
    content: upon us. For it says,
  - type: text
    content: “God resists you when you are proud
  - type: text
    content: but continually pours out grace when you are humble.”
  - type: note
    content: See Prov. 3:34.
  '7':
  - type: text
    content: 'So then, surrender to God. Stand up to the devil and resist him and he will flee in agony. '
  - type: note
    content: As translated from the Aramaic. The accuser will flee in agony because of the One who stands with you.
  '8':
  - type: text
    content: 'Move your heart closer and closer to God, and he will come even closer to you. '
  - type: note
    content: The Aramaic can be translated “and he will be touching you.”
  - type: text
    content: 'But make sure you cleanse your life, you sinners, and keep your heart pure and stop doubting. '
  - type: note
    content: Or “you double-minded.”
  '9':
  - type: text
    content: 'Feel the pain of your sin, be sorrowful and weep! Let your joking around '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'be turned into mourning and your joy into deep humiliation. '
