verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living Close to God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What is the cause of your conflicts and quarrels with each other? Doesn’t the battle begin inside of you as you fight to have your own way and fulfill your own desires? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Be willing to be made low before the Lord and he will exalt you!
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear friends, as part of God’s family, never speak against another family member, for when you slander a brother or sister you violate '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “speak against.”
      marker-yv: yv-n
    - type: text
      text: 'God’s law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of love
    - type: text
      text: '. And your duty is not to make yourself a judge of the law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of love
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 19:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: James 4:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'by saying that it doesn’t apply to you, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to be a judge of the law.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: but your duty is to obey it
    - type: text
      text: '! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the argument Jacob makes to refrain from being a judge of the law.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There is only one true Lawgiver and Judge, the One who has the power to save and destroy—so who do you think you are to judge your neighbor?
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Listen, those of you who are boasting, “Today or tomorrow we’ll go to another city and spend some time and go into business and make heaps of profit!” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you don’t have a clue what tomorrow may bring. For your fleeting life is but a warm breath of air that is visible in the cold only for a moment and then vanishes! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Instead you should say, “Our tomorrows are in the Lord’s hands and if he is willing we will live life to its fullest and do this or that.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But here you are, boasting in your ignorance, for to be presumptuous about what you’ll do tomorrow is evil!
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So if you know of an opportunity to do the right thing today, yet you refrain from doing it, you’re guilty of sin.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You jealously want what others have so you begin to see yourself as better than others. You scheme with envy and harm '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “kill,” however, the Greek words for “kill” and “envy” are almost the same.
      marker-yv: yv-n
    - type: text
      text: 'others to selfishly obtain what you crave—that’s why you quarrel and fight. And all the time you don’t obtain what you want because you won’t ask God for it! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if you ask, you won’t receive it for you’re asking with corrupt motives, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word for corrupt motives is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kakos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and can be translated “sick,” or “sickly.” James is exhorting us not to pray “sickly prayers.”
      marker-yv: yv-n
    - type: text
      text: 'seeking only to fulfill your own selfish desires. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You have become spiritual adulterers who are having an affair, an unholy relationship with the world. Don’t you know that flirting with the world’s values places you at odds with God? Whoever chooses to be the world’s friend makes himself God’s enemy!
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Does the Scripture mean nothing to you that says, “The Spirit that God breathed into our hearts is a jealous Lover who intensely desires to have more and more of us”?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although it is difficult to find a verse from the Old Testament that reads exactly how Jacob quotes it, the possibility remains that it becomes a general statement of what the Bible teaches, or even a quotation from an older translation not available today. We must always realize that the Holy Spirit pursues us relentlessly and takes it very personally when we turn from him to pursue friendship with the world.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he continues to pour out more and more grace '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he gives us a greater gift” or “the grace [favor] he gives us is stronger.”
      marker-yv: yv-n
    - type: text
      text: upon us. For it says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “God resists you when you are proud
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but continually pours out grace when you are humble.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 3:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So then, surrender to God. Stand up to the devil and resist him and he will flee in agony. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The accuser will flee in agony because of the One who stands with you.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Move your heart closer and closer to God, and he will come even closer to you. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “and he will be touching you.”
      marker-yv: yv-n
    - type: text
      text: 'But make sure you cleanse your life, you sinners, and keep your heart pure and stop doubting. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you double-minded.”
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Feel the pain of your sin, be sorrowful and weep! Let your joking around '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'be turned into mourning and your joy into deep humiliation. '
