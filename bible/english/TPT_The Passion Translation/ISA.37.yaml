document_id: ISA.37
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hezekiah Seeks God’s Help
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Hezekiah heard what the commander had said, he tore his robe, put on sackcloth, and went to the temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he sent Eliakim, the palace administrator; Shebna, the royal scribe; and the leading priests—all clothed in sackcloth—to the prophet Isaiah, son of Amoz. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They told him, “Here is Hezekiah’s message: ‘This is a day of great anguish, rebuke, and humiliation. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: We are desperate
  - type: text
    text: ', as in the day a woman is in heavy labor but has no strength left to give birth. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 66:8
      metadata:
        usfm: ISA.66.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 8:19–21
      metadata:
        usfm: ROM.8.19+ROM.8.20+ROM.8.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Perhaps Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', your God, will take note of all the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: blasphemous
  - type: text
    text: ' words of the Assyrian commander who was sent by his master, the king of Assyria, to ridicule the living God. And may Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', your God, rebuke him for the words he heard him speak. So therefore, we come to ask you to pray for us, the remnant that still survives.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'Isaiah answered the king’s delegation, saying, “Tell your master these words: ‘Here is what Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says about this matter: “Don’t fear or be frightened by the blasphemous words of the servants of the king of Assyria. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I will put in him a mindset '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I will put a spirit [attitude] in him.”
    marker-yv: yv-n
  - type: text
    text: that will cause him, when he hears a certain rumor, to flee back to his own country. And when he returns I will cause him to fall by the sword in his own land.” ’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Meanwhile, the Assyrian commander returned to the king, for he had heard that the king had left Lachish to lay siege against the city of Libnah. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Libnah was one of the thirteen cities allotted to the priests in Israel. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 21:13–21
      metadata:
        usfm: JOS.21.13+JOS.21.14+JOS.21.15+JOS.21.16+JOS.21.17+JOS.21.18+JOS.21.19+JOS.21.20+JOS.21.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now, King Sennacherib had heard a report that the king of Ethiopia, Tirhakah, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had allied with Hezekiah and
  - type: text
    text: ' was coming to fight against him. So when he heard it he sent messengers to Hezekiah with this message:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Don’t let this God in whom you trust mislead you into thinking that Jerusalem will not fall and be delivered into the hand of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mighty
  - type: text
    text: ' king of Assyria. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Certainly you have heard what the kings of Assyria have done to all the lands, destroying them all. Do you really think you’ll be delivered? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Did any of their gods come to their rescue? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Where were the gods
  - type: text
    text: ' of Gozan, Haran, Rezeph, and the people of Eden, who were in Tel Azzar when my predecessors destroyed their lands? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These are cities of northern Mesopotamia located between the Tigris and Euphrates Rivers.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tell me
  - type: text
    text: ', where is the king of Hamath, the king of Arphad, the king of the city of Sepharvaim, or of Hena or Ivva?”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These are cities of Syria.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hezekiah’s Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When the messengers delivered Sennacherib’s message to Hezekiah, he read it and immediately went into the temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' and spread it out before the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he prayed:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“O  '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, the God of Israel, you are enthroned between the wings of the cherubim and you reign supreme as God over all the kingdoms of the world, for you alone are Creator of heaven and earth. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Please lean down to hear my prayer. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', open your eyes and see me here calling out to you. Listen carefully to every blasphemous word Sennacherib has sent to ridicule and insult you, the living God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', truly the Assyrian kings have annihilated all these nations and conquered their lands. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They '
  - type: usfm
    marker: it
    children:
    - type: text
      text: smashed
  - type: text
    text: ' and burned their gods, for they’re not truly gods but mere idols made by human hands shaped from wood and stone. That’s why they could be destroyed. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So now, our loving God, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', save us from the Assyrians so that the whole world will know that you alone are '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Lord God Almighty.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Isaiah’s Prophecy to Hezekiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Isaiah, son of Amoz, sent this message to Hezekiah:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '“Hear the words of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Israel: ‘Because you prayed to me about the taunts of Sennacherib, king of Assyria, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'this is what I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', decree concerning him:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘The virgin daughter of Zion
- type: usfm
  marker: q1
  children:
  - type: text
    text: despises you and ridicules you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My daughter, Jerusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tosses her head back and makes fun of you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Whom do you think you’re mocking and blaspheming?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against whom do you raise your voice?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And whom have you looked down upon in your arrogance?
- type: usfm
  marker: q1
  children:
  - type: text
    text: None other than me, the Holy One of Israel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: You sent your messengers to mock the Lord.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You boast, “My vast number of chariots
- type: usfm
  marker: q1
  children:
  - type: text
    text: has taken me up the highest mountains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: to the heights of Lebanon’s forests.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I cut down its loftiest cedars, its choicest cypresses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I ascended its highest peak and claimed its great forests.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I dug wells and drank foreign water.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Dead Sea scroll 1QIsa
    - type: usfm
      marker: ord
      children:
      - type: text
        text: a
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 19:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: The feet of my armies trampled the Nile delta dry.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “ ‘Have you not learned that I planned all this long ago?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, from ages past I planned it, and now I fulfill it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: that you would conquer fortified cities
- type: usfm
  marker: q1
  children:
  - type: text
    text: and turn them into piles of stones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The inhabitants were frightened and ashamed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They became '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as fragile
  - type: text
    text: ' as weeds and tender grass,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: as short-lived as the grass that grows on the rooftop
- type: usfm
  marker: q1
  children:
  - type: text
    text: and is scorched before the east wind.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Dead Sea scroll 1QIsa
    - type: usfm
      marker: ord
      children:
      - type: text
        text: a
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: I know where you live, every movement you make,
- type: usfm
  marker: q1
  children:
  - type: text
    text: all that you do, and your rage against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: I have heard your arrogant words,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and because you rage against me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will put my hook in your nose and my bit in your mouth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I will make you return by the way you came.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“ ‘Hezekiah, this will be a sign for you: This year you will eat only grain that grows of itself. Next year you will eat what comes of that. Then, in the third year, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: life will be normal again
  - type: text
    text: '. You will sow and reap, plant vineyards and eat their fruit. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Judah’s remnant will flourish again, sending deep roots into the ground and bearing luscious fruit above, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'for a remnant will go out from Mount Zion and Jerusalem. The fiery passion of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, will accomplish this!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '“ ‘Therefore, here is what I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have to say about the king of Assyria: He will neither enter this city, nor shoot even one arrow here, nor raise a warrior’s shield, nor build a siege ramp against Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'I declare that by the way he came, by that same way he will leave. He will not set foot in the city. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: I promise to defend this city and protect it, for the sake of my own honor and for the sake of David, my loving servant.’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Miraculous Deliverance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'That night the angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' came into the Assyrian camp and slaughtered 185,000 soldiers. When morning dawned, there were only dead bodies in the enemy’s camp! '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
