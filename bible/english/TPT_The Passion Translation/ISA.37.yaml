document_id: ISA.37,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah Seeks God’s Help
  - type: text
    content: 'When Hezekiah heard what the commander had said, he tore his robe, put on sackcloth, and went to the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '10':
  - type: text
    content: '“Don’t let this God in whom you trust mislead you into thinking that Jerusalem will not fall and be delivered into the hand of the '
  - type: text
    content: mighty
  - type: text
    content: ' king of Assyria. '
  '11':
  - type: text
    content: 'Certainly you have heard what the kings of Assyria have done to all the lands, destroying them all. Do you really think you’ll be delivered? '
  '12':
  - type: text
    content: 'Did any of their gods come to their rescue? '
  - type: text
    content: Where were the gods
  - type: text
    content: ' of Gozan, Haran, Rezeph, and the people of Eden, who were in Tel Azzar when my predecessors destroyed their lands? '
  - type: note
    content: These are cities of northern Mesopotamia located between the Tigris and Euphrates Rivers.
  '13':
  - type: text
    content: Tell me
  - type: text
    content: ', where is the king of Hamath, the king of Arphad, the king of the city of Sepharvaim, or of Hena or Ivva?”'
  - type: note
    content: These are cities of Syria.
  - type: heading
    content: Hezekiah’s Prayer
  '14':
  - type: text
    content: 'When the messengers delivered Sennacherib’s message to Hezekiah, he read it and immediately went into the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: ' and spread it out before the Lord. '
  '15':
  - type: text
    content: 'And he prayed:'
  '16':
  - type: text
    content: '“O  '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, the God of Israel, you are enthroned between the wings of the cherubim and you reign supreme as God over all the kingdoms of the world, for you alone are Creator of heaven and earth. '
  '17':
  - type: text
    content: 'Please lean down to hear my prayer. '
  - type: text
    content: Yahweh
  - type: text
    content: ', open your eyes and see me here calling out to you. Listen carefully to every blasphemous word Sennacherib has sent to ridicule and insult you, the living God.'
  '18':
  - type: text
    content: '“Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', truly the Assyrian kings have annihilated all these nations and conquered their lands. '
  '19':
  - type: text
    content: 'They '
  - type: text
    content: smashed
  - type: text
    content: ' and burned their gods, for they’re not truly gods but mere idols made by human hands shaped from wood and stone. That’s why they could be destroyed. '
  '2':
  - type: text
    content: 'And he sent Eliakim, the palace administrator; Shebna, the royal scribe; and the leading priests—all clothed in sackcloth—to the prophet Isaiah, son of Amoz. '
  '20':
  - type: text
    content: 'So now, our loving God, '
  - type: text
    content: Yahweh
  - type: text
    content: ', save us from the Assyrians so that the whole world will know that you alone are '
  - type: text
    content: Yahweh
  - type: text
    content: ', Lord God Almighty.”'
  - type: heading
    content: Isaiah’s Prophecy to Hezekiah
  '21':
  - type: text
    content: 'Then Isaiah, son of Amoz, sent this message to Hezekiah:'
  - type: text
    content: '“Hear the words of '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel: ‘Because you prayed to me about the taunts of Sennacherib, king of Assyria, '
  '22':
  - type: text
    content: 'this is what I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', decree concerning him:'
  - type: text
    content: “ ‘The virgin daughter of Zion
  - type: text
    content: despises you and ridicules you.
  - type: text
    content: My daughter, Jerusalem,
  - type: text
    content: tosses her head back and makes fun of you!
  '23':
  - type: text
    content: Whom do you think you’re mocking and blaspheming?
  - type: text
    content: Against whom do you raise your voice?
  - type: text
    content: And whom have you looked down upon in your arrogance?
  - type: text
    content: None other than me, the Holy One of Israel!
  '24':
  - type: text
    content: You sent your messengers to mock the Lord.
  - type: text
    content: You boast, “My vast number of chariots
  - type: text
    content: has taken me up the highest mountains,
  - type: text
    content: to the heights of Lebanon’s forests.
  - type: text
    content: I cut down its loftiest cedars, its choicest cypresses.
  - type: text
    content: I ascended its highest peak and claimed its great forests.
  '25':
  - type: text
    content: I dug wells and drank foreign water.
  - type: note
    content: As translated from the Dead Sea scroll 1QIsaa. See 2 Kings 19:24.
  - type: text
    content: The feet of my armies trampled the Nile delta dry.”
  '26':
  - type: text
    content: “ ‘Have you not learned that I planned all this long ago?
  - type: text
    content: Yes, from ages past I planned it, and now I fulfill it,
  - type: text
    content: that you would conquer fortified cities
  - type: text
    content: and turn them into piles of stones.
  '27':
  - type: text
    content: The inhabitants were frightened and ashamed.
  - type: text
    content: 'They became '
  - type: text
    content: as fragile
  - type: text
    content: ' as weeds and tender grass,'
  - type: text
    content: as short-lived as the grass that grows on the rooftop
  - type: text
    content: and is scorched before the east wind.
  - type: note
    content: As translated from the Dead Sea scroll 1QIsaa.
  '28':
  - type: text
    content: I know where you live, every movement you make,
  - type: text
    content: all that you do, and your rage against me.
  '29':
  - type: text
    content: I have heard your arrogant words,
  - type: text
    content: and because you rage against me,
  - type: text
    content: I will put my hook in your nose and my bit in your mouth,
  - type: text
    content: and I will make you return by the way you came.
  '3':
  - type: text
    content: 'They told him, “Here is Hezekiah’s message: ‘This is a day of great anguish, rebuke, and humiliation. '
  - type: text
    content: We are desperate
  - type: text
    content: ', as in the day a woman is in heavy labor but has no strength left to give birth. '
  - type: note
    content: See Isa. 66:8; Rom. 8:19–21.
  '30':
  - type: text
    content: '“ ‘Hezekiah, this will be a sign for you: This year you will eat only grain that grows of itself. Next year you will eat what comes of that. Then, in the third year, '
  - type: text
    content: life will be normal again
  - type: text
    content: '. You will sow and reap, plant vineyards and eat their fruit. '
  '31':
  - type: text
    content: 'Judah’s remnant will flourish again, sending deep roots into the ground and bearing luscious fruit above, '
  '32':
  - type: text
    content: 'for a remnant will go out from Mount Zion and Jerusalem. The fiery passion of '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, will accomplish this!'
  '33':
  - type: text
    content: '“ ‘Therefore, here is what I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have to say about the king of Assyria: He will neither enter this city, nor shoot even one arrow here, nor raise a warrior’s shield, nor build a siege ramp against Jerusalem. '
  '34':
  - type: text
    content: 'I declare that by the way he came, by that same way he will leave. He will not set foot in the city. '
  '35':
  - type: text
    content: I promise to defend this city and protect it, for the sake of my own honor and for the sake of David, my loving servant.’ ”
  - type: heading
    content: God’s Miraculous Deliverance
  '36':
  - type: text
    content: 'That night the angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' came into the Assyrian camp and slaughtered 185,000 soldiers. When morning dawned, there were only dead bodies in the enemy’s camp! '
  '37':
  - type: text
    content: 'Sennacherib, the '
  - type: text
    content: great
  - type: text
    content: ' king of Assyria, left, returning '
  - type: text
    content: the same way he came
  - type: text
    content: ', and retreated to Nineveh, '
  - type: text
    content: the Assyrian capital
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'Then '
  - type: text
    content: one day
  - type: text
    content: ', as he was worshiping in the temple of his god, Nisroch, his sons, Adrammelech and Sharezer, entered the temple and killed him with swords. They escaped into the land of Ararat and the king’s son Esar-haddon succeeded him.'
  - type: note
    content: See 2 Kings 19:35–37; 2 Chron. 32:21–22.
  '4':
  - type: text
    content: 'Perhaps Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', your God, will take note of all the '
  - type: text
    content: blasphemous
  - type: text
    content: ' words of the Assyrian commander who was sent by his master, the king of Assyria, to ridicule the living God. And may Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', your God, rebuke him for the words he heard him speak. So therefore, we come to ask you to pray for us, the remnant that still survives.’ ”'
  '5':
  - type: text
    content: 'Isaiah answered the king’s delegation, saying, “Tell your master these words: ‘Here is what Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says about this matter: “Don’t fear or be frightened by the blasphemous words of the servants of the king of Assyria. '
  '7':
  - type: text
    content: 'I will put in him a mindset '
  - type: note
    content: Or “I will put a spirit [attitude] in him.”
  - type: text
    content: that will cause him, when he hears a certain rumor, to flee back to his own country. And when he returns I will cause him to fall by the sword in his own land.” ’ ”
  '8':
  - type: text
    content: 'Meanwhile, the Assyrian commander returned to the king, for he had heard that the king had left Lachish to lay siege against the city of Libnah. '
  - type: note
    content: Libnah was one of the thirteen cities allotted to the priests in Israel. See Josh. 21:13–21.
  '9':
  - type: text
    content: 'Now, King Sennacherib had heard a report that the king of Ethiopia, Tirhakah, '
  - type: text
    content: had allied with Hezekiah and
  - type: text
    content: ' was coming to fight against him. So when he heard it he sent messengers to Hezekiah with this message:'
