document_id: GEN.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Divine Encounter
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'As Jacob continued '
  - type: usfm
    marker: it
    children:
    - type: text
      text: toward Canaan
  - type: text
    text: ', the angels of God came to meet him! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When he saw them, he exclaimed, “This is God’s military camp!” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “This is God’s camp,” “This is God’s army,” or “Mahanaim.”
    marker-yv: yv-n
  - type: text
    text: 'So he named that place Two Camps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of Angels
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jacob sent messengers ahead to his brother Esau '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who was living
  - type: text
    text: ' in the land of Seir, the country of Edom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He instructed them, “Give this message from me to my master Esau, ‘I am your servant. I have lived with our uncle Laban all these years '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: and have acquired sheep, cattle, donkeys, and both male and female servants. I send this message to you, my master, in the hope of finding favor in your eyes.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When the messengers returned to Jacob, they informed him, “We gave your brother Esau your message, and he himself is coming here to meet you. In fact, he’s on his way now with four hundred men!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Gripped with fear '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Bound,” “Tied-up,” “Restricted,” implying that Jacob was immobilized by his anxiety.
    marker-yv: yv-n
  - type: text
    text: 'to the point of panic, Jacob split all the people who were with him into two camps, and also the flocks, herds, and camels. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He said to himself, “If Esau attacks the first camp and destroys them, at least the other camp will escape.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then Jacob prayed, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', God of my father Abraham and God of my father Isaac, you said to me, ‘Return to your country and to your family, and I will make you prosper.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I am so unworthy of all the loving-kindness and faithfulness that you have showered upon me, your servant. When I crossed this river Jordan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: years ago
  - type: text
    text: ', all I had to my name was a staff in my hand, and now I have increased to become two camps! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Save me, I pray, from the hand of my brother Esau, for I’m afraid he will come and kill all of us, including the women and children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'You said to me, ‘I will certainly prosper you and make your offspring as innumerable as the sand of the sea.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So he spent the night there.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'From what he had with him, Jacob sent a gift '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Jacob sent from what he had in his hand.”
    marker-yv: yv-n
  - type: text
    text: 'to his brother Esau: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'two hundred female goats and twenty male goats, two hundred ewes and twenty rams, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'thirty female camels and their calves, forty cows and ten bulls, twenty female donkeys and ten male donkeys. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was at least 550 animals, a substantial gift indeed. Perhaps Jacob was attempting to return a portion of the stolen birthright.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He placed them in the care of his servants, each herd by itself. He told them, “Go on ahead of me, and put some space between each herd.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He gave these instructions to the one in the lead, “When my brother Esau meets you, and asks, ‘Who is your master? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “To whom are you?”
    marker-yv: yv-n
  - type: text
    text: 'Where are you going? Who owns these herds you are driving?’ '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Whose are these ahead of you?”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: then you are to say, ‘They belong to your servant Jacob. He’s sent them as a gift to you, my lord Esau, and he is coming behind us.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He likewise instructed the leaders of the second and the third herds and all those following them, “You must say the same thing when you meet Esau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And be sure to say, ‘Your servant Jacob is coming behind us,’ ” because he reasoned, “If I can appease Esau with these gifts before I have to meet him face-to-face, he may accept me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So he sent the gifts on ahead of him, while he spent that night in the camp.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Midnight Wrestling Match
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'During the night, Jacob arose, woke up his two wives, his two maidservants, and eleven sons, and had them cross the ford of the Jabbok River. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The name of this river was a prophecy of what God was doing in his servant.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jabbok
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “emptying.” The Jabbok is known today in Arabic as the Wadi Zerga, which empties into the Jordan twenty-five miles north of the Dead Sea.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He sent them across along with everything he had, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and Jacob was left all alone. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: To be left alone with God is the only true way of coming to self-discovery. This was the turning point for Jacob. His schemes had all failed, and now he faced God alone.
    marker-yv: yv-n
  - type: text
    text: 'Suddenly, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: out of nowhere
  - type: text
    text: ', a man appeared and wrestled '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “wrestle” is related to a word for “dust” or “get dusty,” as two people do when wrestling on the ground. There is an amazing play on words in the Hebrew between the words “he wrestled” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: ye’abeq
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), “Jabbok” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: yabboq
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), and “Jacob” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: yàaqob
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The eyes of Jacob could not discern who was coming out of the shadows, just as Jacob’s father, Isaac, could not discern who it was that received his blessing. It was not Jacob wrestling a man, but a Man wrestling with Jacob. The One whom Jacob saw at the top of the stairway at Bethel had come down to wrestle with him—and roll in the mud of Jacob’s mistakes.
    marker-yv: yv-n
  - type: text
    text: 'with him until daybreak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: When the man saw that he was not winning the match, he struck Jacob’s hip and knocked it out of joint, leaving it wrenched as he continued to wrestle with him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jacob grabbed a heel; God grabbed his hip! Through these private encounters with the Lord, we become those whose names have been changed (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 17:5
      metadata:
        usfm: GEN.17.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 62:2
      metadata:
        usfm: ISA.62.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: ISA.62.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 2:17
      metadata:
        usfm: REV.2.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:12
      metadata:
        usfm: REV.3.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ); we are changed into humbled, transformed ones who are subdued by the power of God (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Phil. 3:21
      metadata:
        usfm: PHP.3.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). Jacob had at least two night encounters with the Lord: one while he rested (see'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 28
      metadata:
        usfm: GEN.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and the other while he wrestled. When he rested, the region got a new name—Luz became Bethel. When he wrestled, he got a new name—Jacob became Israel.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Eventually, the man said to him, “Let me go, for the day is breaking.”
- type: usfm
  marker: p
  children:
  - type: text
    text: But Jacob refused. “No! Not until you bless me!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jacob might have initially thought it was Esau who had come at midnight to wrestle him. But as the night wore on, he realized the Man was a divine being (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hos. 12:4
      metadata:
        usfm: HOS.12.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Perceiving this was a supernatural Man who had the power to bless or to curse, Jacob refused to release him until he pronounced a blessing over him.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“What is your name?” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was a strange question because God knew his name. God touched not only his hip but also his slumbering conscience. When asked this question, Jacob’s imagination took him back over twenty years to the dark tent where his blind, aged father had faced him with the same question and he had answered, “It’s I—Esau”—and got away with it (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 27:19
      metadata:
        usfm: GEN.27.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: )! Now the Lord had come to Jacob insisting he acknowledge that he was the one who took advantage of his father and his brother.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jacob
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means “heel grabber” or “supplanter.” The Lord was insisting that his blessings would only begin when Jacob realized the true need of his heart. By speaking out his name, Jacob confessed his true nature: “I am a deceiver, a cheat. My name is heel grabber.” This confession liberated Jacob and opened the way for inner transformation (see'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 119:116
      metadata:
        usfm: PSA.119.116
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 4:16
      metadata:
        usfm: 2CO.4.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: asked the man.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Jacob,” he replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“Not anymore,” the man said to him. “Your new name is Israel, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “one who struggled with God and prevailed,” “may God [El] preserve,” or “prince with God.”
    marker-yv: yv-n
  - type: text
    text: for you have struggled both with God and with people and have overcome.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Jacob said, “Please, tell me your name.”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Why ask my name?” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: If this is a rhetorical question, it may mean “You should not ask my name.”
    marker-yv: yv-n
  - type: text
    text: 'the man replied, then he spoke a blessing '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This blessing empowered Jacob to succeed and prosper.
    marker-yv: yv-n
  - type: text
    text: over Jacob.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So Jacob named the place Penuel, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Peniel [face of God].” Eight times in the Old Testament this word is spelled “Penuel,” and only once “Peniel.” Since both spellings are in vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '30'
      metadata:
        usfm: GEN.32.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '31'
      metadata:
        usfm: GEN.32.31
    - type: usfm
      marker: ft
      children:
