document_id: GEN.32,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Divine Encounter
  - type: text
    content: 'As Jacob continued '
  - type: text
    content: toward Canaan
  - type: text
    content: ', the angels of God came to meet him! '
  '10':
  - type: text
    content: 'I am so unworthy of all the loving-kindness and faithfulness that you have showered upon me, your servant. When I crossed this river Jordan '
  - type: text
    content: years ago
  - type: text
    content: ', all I had to my name was a staff in my hand, and now I have increased to become two camps! '
  '11':
  - type: text
    content: 'Save me, I pray, from the hand of my brother Esau, for I’m afraid he will come and kill all of us, including the women and children. '
  '12':
  - type: text
    content: 'You said to me, ‘I will certainly prosper you and make your offspring as innumerable as the sand of the sea.’ ” '
  '13':
  - type: text
    content: So he spent the night there.
  - type: text
    content: 'From what he had with him, Jacob sent a gift '
  - type: note
    content: Or “Jacob sent from what he had in his hand.”
  - type: text
    content: 'to his brother Esau: '
  '14':
  - type: text
    content: 'two hundred female goats and twenty male goats, two hundred ewes and twenty rams, '
  '15':
  - type: text
    content: 'thirty female camels and their calves, forty cows and ten bulls, twenty female donkeys and ten male donkeys. '
  - type: note
    content: This was at least 550 animals, a substantial gift indeed. Perhaps Jacob was attempting to return a portion of the stolen birthright.
  '16':
  - type: text
    content: He placed them in the care of his servants, each herd by itself. He told them, “Go on ahead of me, and put some space between each herd.”
  '17':
  - type: text
    content: 'He gave these instructions to the one in the lead, “When my brother Esau meets you, and asks, ‘Who is your master? '
  - type: note
    content: Or “To whom are you?”
  - type: text
    content: 'Where are you going? Who owns these herds you are driving?’ '
  - type: note
    content: Or “Whose are these ahead of you?”
  '18':
  - type: text
    content: then you are to say, ‘They belong to your servant Jacob. He’s sent them as a gift to you, my lord Esau, and he is coming behind us.’ ”
  '19':
  - type: text
    content: 'He likewise instructed the leaders of the second and the third herds and all those following them, “You must say the same thing when you meet Esau. '
  '2':
  - type: text
    content: 'When he saw them, he exclaimed, “This is God’s military camp!” '
  - type: note
    content: Or “This is God’s camp,” “This is God’s army,” or “Mahanaim.”
  - type: text
    content: 'So he named that place Two Camps '
  - type: text
    content: of Angels
  - type: text
    content: .
  '20':
  - type: text
    content: 'And be sure to say, ‘Your servant Jacob is coming behind us,’ ” because he reasoned, “If I can appease Esau with these gifts before I have to meet him face-to-face, he may accept me.” '
  '21':
  - type: text
    content: So he sent the gifts on ahead of him, while he spent that night in the camp.
  - type: heading
    content: A Midnight Wrestling Match
  '22':
  - type: text
    content: 'During the night, Jacob arose, woke up his two wives, his two maidservants, and eleven sons, and had them cross the ford of the Jabbok River. '
  - type: note
    content: The name of this river was a prophecy of what God was doing in his servant. Jabbok means “emptying.” The Jabbok is known today in Arabic as the Wadi Zerga, which empties into the Jordan twenty-five miles north of the Dead Sea.
  '23':
  - type: text
    content: 'He sent them across along with everything he had, '
  '24':
  - type: text
    content: 'and Jacob was left all alone. '
  - type: note
    content: To be left alone with God is the only true way of coming to self-discovery. This was the turning point for Jacob. His schemes had all failed, and now he faced God alone.
  - type: text
    content: 'Suddenly, '
  - type: text
    content: out of nowhere
  - type: text
    content: ', a man appeared and wrestled '
  - type: note
    content: The Hebrew word for “wrestle” is related to a word for “dust” or “get dusty,” as two people do when wrestling on the ground. There is an amazing play on words in the Hebrew between the words “he wrestled” (ye’abeq), “Jabbok” (yabboq), and “Jacob” (yàaqob). The eyes of Jacob could not discern who was coming out of the shadows, just as Jacob’s father, Isaac, could not discern who it was that received his blessing. It was not Jacob wrestling a man, but a Man wrestling with Jacob. The One whom Jacob saw at the top of the stairway at Bethel had come down to wrestle with him—and roll in the mud of Jacob’s mistakes.
  - type: text
    content: 'with him until daybreak. '
  '25':
  - type: text
    content: When the man saw that he was not winning the match, he struck Jacob’s hip and knocked it out of joint, leaving it wrenched as he continued to wrestle with him.
  - type: note
    content: 'Jacob grabbed a heel; God grabbed his hip! Through these private encounters with the Lord, we become those whose names have been changed (see Gen. 17:5; Isa. 62:2, 4; Rev. 2:17; 3:12); we are changed into humbled, transformed ones who are subdued by the power of God (see Phil. 3:21). Jacob had at least two night encounters with the Lord: one while he rested (see Gen. 28) and the other while he wrestled. When he rested, the region got a new name—Luz became Bethel. When he wrestled, he got a new name—Jacob became Israel.'
  '26':
  - type: text
    content: Eventually, the man said to him, “Let me go, for the day is breaking.”
  - type: text
    content: But Jacob refused. “No! Not until you bless me!”
  - type: note
    content: Jacob might have initially thought it was Esau who had come at midnight to wrestle him. But as the night wore on, he realized the Man was a divine being (see Hos. 12:4). Perceiving this was a supernatural Man who had the power to bless or to curse, Jacob refused to release him until he pronounced a blessing over him.
  '27':
  - type: text
    content: '“What is your name?” '
  - type: note
    content: 'This was a strange question because God knew his name. God touched not only his hip but also his slumbering conscience. When asked this question, Jacob’s imagination took him back over twenty years to the dark tent where his blind, aged father had faced him with the same question and he had answered, “It’s I—Esau”—and got away with it (see Gen. 27:19)! Now the Lord had come to Jacob insisting he acknowledge that he was the one who took advantage of his father and his brother. Jacob means “heel grabber” or “supplanter.” The Lord was insisting that his blessings would only begin when Jacob realized the true need of his heart. By speaking out his name, Jacob confessed his true nature: “I am a deceiver, a cheat. My name is heel grabber.” This confession liberated Jacob and opened the way for inner transformation (see Ps. 119:116; 2 Cor. 4:16).'
  - type: text
    content: asked the man.
  - type: text
    content: “Jacob,” he replied.
  '28':
  - type: text
    content: '“Not anymore,” the man said to him. “Your new name is Israel, '
  - type: note
    content: Israel means “one who struggled with God and prevailed,” “may God [El] preserve,” or “prince with God.”
  - type: text
    content: for you have struggled both with God and with people and have overcome.”
  '29':
  - type: text
    content: Jacob said, “Please, tell me your name.”
  - type: text
    content: '“Why ask my name?” '
  - type: note
    content: If this is a rhetorical question, it may mean “You should not ask my name.”
  - type: text
    content: 'the man replied, then he spoke a blessing '
  - type: note
    content: This blessing empowered Jacob to succeed and prosper.
  - type: text
    content: over Jacob.
  '3':
  - type: text
    content: 'Jacob sent messengers ahead to his brother Esau '
  - type: text
    content: who was living
  - type: text
    content: ' in the land of Seir, the country of Edom. '
  '30':
  - type: text
    content: 'So Jacob named the place Penuel, '
  - type: note
    content: Or “Peniel [face of God].” Eight times in the Old Testament this word is spelled “Penuel,” and only once “Peniel.” Since both spellings are in vv. 30 and 31, the translator has chosen to make them identical.
  - type: text
    content: 'saying, “I have seen God face-to-face, yet my life has been spared!” '
  - type: note
    content: Once you have seen the face of God, the faces of those who oppose you will no longer intimidate you. Jacob could now look Esau in the eyes.
  '31':
  - type: text
    content: 'The sun rose upon him as he crossed the Jabbok River from Penuel, limping because of his hip. '
  '32':
  - type: text
    content: To this day, the Israelites do not eat the thigh muscle attached to the hip socket, because the man struck Jacob’s hip socket at the thigh muscle.
  '4':
  - type: text
    content: 'He instructed them, “Give this message from me to my master Esau, ‘I am your servant. I have lived with our uncle Laban all these years '
  '5':
  - type: text
    content: and have acquired sheep, cattle, donkeys, and both male and female servants. I send this message to you, my master, in the hope of finding favor in your eyes.’ ”
  '6':
  - type: text
    content: When the messengers returned to Jacob, they informed him, “We gave your brother Esau your message, and he himself is coming here to meet you. In fact, he’s on his way now with four hundred men!”
  '7':
  - type: text
    content: 'Gripped with fear '
  - type: note
    content: Or “Bound,” “Tied-up,” “Restricted,” implying that Jacob was immobilized by his anxiety.
  - type: text
    content: 'to the point of panic, Jacob split all the people who were with him into two camps, and also the flocks, herds, and camels. '
  '8':
  - type: text
    content: He said to himself, “If Esau attacks the first camp and destroys them, at least the other camp will escape.”
  '9':
  - type: text
    content: Then Jacob prayed, “
  - type: text
    content: Yahweh
  - type: text
    content: ', God of my father Abraham and God of my father Isaac, you said to me, ‘Return to your country and to your family, and I will make you prosper.’ '
