document_id: MAT.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus and John the Baptizer
  - type: text
    content: After Jesus finished giving instructions to his twelve disciples, he went on to minister in different villages throughout the region.
  '10':
  - type: text
    content: 'He was the fulfillment of this Scripture:'
  - type: text
    content: See, I am sending my prophetic messenger
  - type: note
    content: Or “angel.”
  - type: text
    content: who will go ahead of me
  - type: text
    content: and prepare hearts to receive me.
  - type: note
    content: This is quoted from Mal. 3:1.
  '11':
  - type: text
    content: “For I tell you the truth, throughout history there has never been a man who surpasses John the Baptizer. Yet the least of those who now experience heaven’s kingdom will become even greater than he.
  - type: text
    content: ' '
  '12':
  - type: text
    content: From the moment John stepped onto the scene until now, the realm of heaven’s kingdom is bursting forth, and passionate people have taken hold of its power.
  - type: text
    content: ' '
  - type: note
    content: Or “The kingdom of heaven is entered into by force, and violent ones take hold of it.” This is one of the most difficult passages in Matthew to translate from the Greek. When the Greek words are translated into Hebrew it becomes a clear reference to Mic. 2:12–13 and includes the “breaking forth [Hb. peretz].”
  '13':
  - type: text
    content: For all the prophets and the Torah
  - type: text
    content: ' '
  - type: note
    content: That is, the first five books of the Bible (Genesis, Exodus, Leviticus, Numbers, and Deuteronomy).
  - type: text
    content: prophesied until John appeared.
  - type: text
    content: ' '
  '14':
  - type: text
    content: If you can receive this truth, John is the Elijah who was destined to come.
  - type: text
    content: ' '
  '15':
  - type: text
    content: So listen and understand what I’m telling you.
  - type: note
    content: Or “Anyone who has ears to hear, let him hear,” an idiom that means “You’d better listen!”
  '16':
  - type: text
    content: “How could I describe the people of this generation? You’re like children playing games on the playground,
  - type: text
    content: ' '
  - type: note
    content: Or “in the marketplaces.”
  - type: text
    content: yelling at their playmates,
  - type: text
    content: ' '
  '17':
  - type: text
    content: ‘You don’t like it when we want to play Wedding! And you don’t like it when we want to play Funeral! You will neither dance nor mourn.’
  - type: text
    content: ' '
  '18':
  - type: text
    content: Why is it that when John came to you, neither feasting nor drinking wine, you said, ‘He has a demon in him!’?
  - type: text
    content: ' '
  '19':
  - type: text
    content: Yet when the Son of Man came and went to feasts and drank wine, you said, ‘Look at this man! He is nothing but a glutton and a drunkard! He spends all his time with tax collectors and other sinners.’
  - type: text
    content: ' '
  - type: note
    content: As translated from Hebrew Matthew.
  - type: text
    content: But God’s wisdom will become visible by those who embrace it.”
  - type: note
    content: Or more literally “Wisdom is vindicated by all her children” (Gr. teknon) (some manuscripts, “by her deeds”). The Aramaic word can mean either “servant” (disciple) or “works,” which would explain the difference in some Greek manuscripts.
  - type: heading
    content: Jesus Criticizes Unrepentant Cities
  '2':
  - type: text
    content: 'Now, while John the Baptizer was in prison, he heard about the '
  - type: text
    content: wonderful
  - type: text
    content: ' deeds of the Christ, so he sent his disciples to ask him this question: '
  '20':
  - type: text
    content: 'Then Jesus began to openly denounce the cities where he had done most of his mighty miracles, because the people failed to turn away from sin and return to God. '
  '21':
  - type: text
    content: 'He said, '
  - type: text
    content: “How tragic it will be for the city of Korazin! And how horrible for the city of Bethsaida! For if the powerful miracles that I performed in Korazin and Bethsaida had been done in Tyre and Sidon,
  - type: text
    content: ' '
  - type: note
    content: The Hebrew Matthew is “Sodom.”
  - type: text
    content: they would have humbled themselves and repented, and turned from their sins.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Tyre and Sidon
  - type: text
    content: ' '
  - type: note
    content: Tyre and Sidon were two gentile cities on the Mediterranean coast that were known for their wickedness.
  - type: text
    content: will be better off on judgment day than you!
  - type: text
    content: ' '
  '23':
  - type: text
    content: And Capernaum—do you really think you’ll be exalted because of the great miracles I have done there? No! You’ll be brought down to the depths of hell
  - type: text
    content: ' '
  - type: note
    content: See Isa. 14:13–15.
  - type: text
    content: because of your rejection of me. For if the miracles I worked in your streets were done in Sodom, it would still be standing today!
  - type: text
    content: ' '
  '24':
  - type: text
    content: But I tell you, it will be more bearable for the region of Sodom in the day of judgment than it will be for you.”
  - type: heading
    content: Jesus Invites Everyone to Come
  '25':
  - type: text
    content: 'Then Jesus exclaimed, '
  - type: text
    content: “Father, thank you, for you are Lord, the Supreme Ruler over heaven and earth! And you have hidden the great revelation of your authority from those who are proud and think they are wise and unveiled it instead to little children.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Yes, Father, you’ve chosen this gracious plan to extend your kingdom.
  - type: text
    content: ' '
  '27':
  - type: text
    content: You have entrusted me with all that you are and all that you have. No one fully and intimately knows the Son except the Father. And no one fully and intimately knows the Father except the Son. But the Son is able to unveil the Father to anyone he chooses.
  '28':
  - type: text
    content: “Are you weary, carrying a heavy burden? Come to me.
  - type: text
    content: ' '
  - type: note
    content: Many times Jesus said, “Come after (follow) me,” but only here does he say, “Come to me.” See Ex. 33:14; Matt. 23:4.
  - type: text
    content: I will refresh your life, for I am your oasis.
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic.
  '29':
  - type: text
    content: Simply join your life with mine.
  - type: text
    content: ' '
  - type: note
    content: Or “Bend your neck to my yoke.” The metaphor of a yoke is that it joins two animals to work as one. It is not simply work or toil that is the focus here, but union with Christ.
  - type: text
    content: Learn my ways and you’ll discover that I’m gentle,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “tranquil” or “peaceful.”
  - type: text
    content: humble, easy to please. You will find refreshment and rest in me.
  - type: text
    content: ' '
  - type: note
    content: As translated from the Hebrew Matthew. The Aramaic could be translated “Come to me and I will cheer [refresh] you. I am cheerful [refreshing] and humble in heart, and you will find cheer [refreshing] for your soul.”
  '3':
  - type: text
    content: “Are you really the one the prophets said would come, or should we still wait for another?”
  '30':
  - type: text
    content: For all that I require of you will be pleasant
  - type: text
    content: ' '
  - type: note
    content: Or “kind” (or “delightful”).
  - type: text
    content: and easy to bear.”
  - type: note
    content: See Ps. 55:22.
  '4':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: '“Give John this report:'
  - type: text
    content: ' '
  '5':
  - type: text
    content: ‘The blind see again, the crippled walk, lepers are cured, the deaf hear, the dead are raised back to life, and the poor and broken now hear of the hope of salvation!’
  - type: text
    content: ' '
  - type: note
    content: This fulfills many Old Testament references to the coming of the Messiah, including Isa. 29:18–19; 35:5–6; 61:1. Jesus is assuring John that the message he brings is life and salvation, not judgment and wrath.
  '6':
  - type: text
    content: And tell John that the blessing of heaven comes to those who are not offended over me.”
  '7':
  - type: text
    content: 'As they were leaving, Jesus began to speak to the crowd about John. '
  - type: text
    content: “What kind of man did you see when you went out into the wilderness? Did you expect to see a man who would be easily intimidated?
  - type: text
    content: ' '
  - type: note
    content: Or “a reed shaken by the wind?”
  '8':
  - type: text
    content: Who was he? Did you expect to see a man decked out in the splendid fashion of the day?
  - type: text
    content: ' '
  - type: note
    content: See Matt. 3:4.
  - type: text
    content: Those who wear fancy clothes live like kings in palaces.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Or did you encounter a true prophet out in the lonely wilderness? Yes, John was a prophet like those of the past, but he is even more than that!
  - type: text
    content: ' '
