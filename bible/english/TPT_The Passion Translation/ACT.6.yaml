document_id: ACT.6,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Servant Leaders
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'During those days the number of Jesus’ followers kept multiplying greatly. But a complaint was brought against those who spoke Aramaic '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or “the Hebrews” (converts from orthodox Judaism). There was one dominant language in Israel: Aramaic. However, the issue between the two groups was more than merely a language difference. Those who spoke Aramaic were natives, while the Greek-speaking minority were most likely Jews from other nations.'
      marker-yv: yv-n
    - type: text
      text: 'by the Greek-speaking Jews, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Hellenists.” These were Jewish converts who sought to maintain a Greek language and culture and were predominantly Alexandrian Jews. These may have been Jews who were scattered throughout the Roman Empire, including Greece and Alexandria, Egypt.
      marker-yv: yv-n
    - type: text
      text: who felt their widows were being overlooked during the daily distribution of food.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Holy Spirit gave Stephen remarkable wisdom to answer them. His words were prompted by the Holy Spirit, and they could not refute what he said. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the Men Set Free conspired in secret to find those who would bring false accusations against Stephen and lie about him by saying, “We heard this man speak blasphemy against Moses and God.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Men Set Free agitated the crowd, the elders, and the religious scholars, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “scribes.” These were considered the experts in the law of Moses.
      marker-yv: yv-n
    - type: text
      text: 'then seized Stephen and forcefully took him before the supreme council. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One after another, false witnesses stepped forward and accused Stephen, saying, “This man never stops denigrating our temple and our Jewish law. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For we have heard him teach that Jesus of Nazareth will destroy the temple and change the traditions and customs that Moses handed down to us.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “We heard him teach that Jesus the Nazarene is the one who freed our nation and changed the feasts that Moses observed.”
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every member of the supreme council focused his gaze on Stephen, for right in front of their eyes, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: while being falsely accused
    - type: text
      text: ', his face glowed as though he had the face of an angel!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As he faced persecution and martyrdom, Stephen’s face lit up with heaven’s light, shining as an angelic messenger. What manifests in your life when you are opposed and falsely accused?
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The twelve apostles called a meeting of all the believers and told them, “It is not advantageous for us to be pulled away from the word of God to wait on tables. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We want you to carefully select '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “select with awe,” that is, in the presence of the Lord.
      marker-yv: yv-n
    - type: text
      text: 'from among yourselves seven godly men. Make sure they are honorable, full of the Holy Spirit and wisdom, and we will give them the responsibility of this crucial ministry of serving. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That will enable us to give our full attention to prayer and preaching the word of God.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Everyone in the church loved this idea. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “This proposal appeared beautiful.”
      marker-yv: yv-n
    - type: text
      text: 'So they chose seven men. One of them was Stephen, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is most likely that Stephen was not a gentile but a Jewish believer. His Hebrew name,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tzephania
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', is transliterated into Greek as'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Astaphanos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Stephen in English).
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tzephania
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is the name of the prophet Zephaniah. Zephaniah means “Yah has treasured [him].” Stephen was not a gentile proselyte to Judaism but a Greek-speaking Hebrew. He spoke in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and addressed his hearers as “fellow Jews and fathers.” Although he was a powerful minister of the Word, Stephen was humble to accept the task of serving.
      marker-yv: yv-n
    - type: text
      text: 'who was known as a man full of faith and overflowing with the Holy Spirit. Along with him they chose Philip, Prochorus, Nicanor, Timon, Parmenas, and Nicholas from Antioch, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “Nicholas, the hero of Antioch.”
      marker-yv: yv-n
    - type: text
      text: 'who had converted to Judaism. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All seven stood before the apostles, who laid their hands on them and prayed for them, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: commissioning them to this ministry
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The practice of laying on of hands indicates approval, impartation of authority, commissioning, and ordaining. As the Old Testament priest laid hands on a sacrifice and transferred the guilt of sins upon the animal, the New Testament apostles laid their hands on men and appointed them to ministry. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 16:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 27:18–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 6:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God’s word reigned supreme '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: and kept spreading. The number of Jesus’ followers in Jerusalem quickly grew and increased by the day. Even a great number of Jewish priests became believers and were obedient to the faith!
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Stephen, who was a man full of grace and supernatural power, performed many astonishing signs and wonders and mighty miracles among the people. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Stephen was not an apostle, yet he worked miracles of power through his ministry. The miraculous is not for the few, but for the many.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This upset some men belonging to a sect who called themselves the Men Set Free. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the Synagogue of the Freedmen.” Although most expositors view these as former Hebrew slaves, the Aramaic is “Libertines.” It is possible that these were pagan cult members who followed a Roman mythical hero named Liber. From this word we get the English word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: liberty
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . They emphasized drunkenness and promiscuity. They boasted in their freedom from all moral laws as the Men Set Free to do whatever they desired. They were so hedonistic that even other pagans viewed them as wicked. These Libertines were the antithesis to the true freedom that comes through Christ (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 8:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'They were Libyans, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Cyrene,” a region of eastern Libya.
      marker-yv: yv-n
    - type: text
      text: 'Egyptians, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Alexandria,” a large Egyptian city on the Mediterranean.
      marker-yv: yv-n
    - type: text
      text: and Turks.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Cilicia” (southeastern coastal area of Turkey) and “the province of Asia” (that is, Asia Minor, comprised of western and southwestern Turkey). Both regions are included in the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Turks
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They all confronted Stephen to argue '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “word wrestle.”
      marker-yv: yv-n
    - type: text
      text: 'with him. '
