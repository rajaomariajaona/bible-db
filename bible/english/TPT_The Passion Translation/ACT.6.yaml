document_id: ACT.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Servant Leaders
  - type: text
    content: 'During those days the number of Jesus’ followers kept multiplying greatly. But a complaint was brought against those who spoke Aramaic '
  - type: note
    content: 'Or “the Hebrews” (converts from orthodox Judaism). There was one dominant language in Israel: Aramaic. However, the issue between the two groups was more than merely a language difference. Those who spoke Aramaic were natives, while the Greek-speaking minority were most likely Jews from other nations.'
  - type: text
    content: 'by the Greek-speaking Jews, '
  - type: note
    content: Or “Hellenists.” These were Jewish converts who sought to maintain a Greek language and culture and were predominantly Alexandrian Jews. These may have been Jews who were scattered throughout the Roman Empire, including Greece and Alexandria, Egypt.
  - type: text
    content: who felt their widows were being overlooked during the daily distribution of food.
  '10':
  - type: text
    content: 'But the Holy Spirit gave Stephen remarkable wisdom to answer them. His words were prompted by the Holy Spirit, and they could not refute what he said. '
  '11':
  - type: text
    content: So the Men Set Free conspired in secret to find those who would bring false accusations against Stephen and lie about him by saying, “We heard this man speak blasphemy against Moses and God.”
  '12':
  - type: text
    content: 'The Men Set Free agitated the crowd, the elders, and the religious scholars, '
  - type: note
    content: Or “scribes.” These were considered the experts in the law of Moses.
  - type: text
    content: 'then seized Stephen and forcefully took him before the supreme council. '
  '13':
  - type: text
    content: 'One after another, false witnesses stepped forward and accused Stephen, saying, “This man never stops denigrating our temple and our Jewish law. '
  '14':
  - type: text
    content: For we have heard him teach that Jesus of Nazareth will destroy the temple and change the traditions and customs that Moses handed down to us.”
  - type: note
    content: The Aramaic is “We heard him teach that Jesus the Nazarene is the one who freed our nation and changed the feasts that Moses observed.”
  '15':
  - type: text
    content: 'Every member of the supreme council focused his gaze on Stephen, for right in front of their eyes, '
  - type: text
    content: while being falsely accused
  - type: text
    content: ', his face glowed as though he had the face of an angel!'
  - type: note
    content: As he faced persecution and martyrdom, Stephen’s face lit up with heaven’s light, shining as an angelic messenger. What manifests in your life when you are opposed and falsely accused?
  '2':
  - type: text
    content: 'The twelve apostles called a meeting of all the believers and told them, “It is not advantageous for us to be pulled away from the word of God to wait on tables. '
  '3':
  - type: text
    content: 'We want you to carefully select '
  - type: note
    content: The Aramaic is “select with awe,” that is, in the presence of the Lord.
  - type: text
    content: 'from among yourselves seven godly men. Make sure they are honorable, full of the Holy Spirit and wisdom, and we will give them the responsibility of this crucial ministry of serving. '
  '4':
  - type: text
    content: That will enable us to give our full attention to prayer and preaching the word of God.”
  '5':
  - type: text
    content: 'Everyone in the church loved this idea. '
  - type: note
    content: The Aramaic can be translated “This proposal appeared beautiful.”
  - type: text
    content: 'So they chose seven men. One of them was Stephen, '
  - type: note
    content: It is most likely that Stephen was not a gentile but a Jewish believer. His Hebrew name, Tzephania, is transliterated into Greek as Astaphanos (Stephen in English). Tzephania is the name of the prophet Zephaniah. Zephaniah means “Yah has treasured [him].” Stephen was not a gentile proselyte to Judaism but a Greek-speaking Hebrew. He spoke in Acts 7 and addressed his hearers as “fellow Jews and fathers.” Although he was a powerful minister of the Word, Stephen was humble to accept the task of serving.
  - type: text
    content: 'who was known as a man full of faith and overflowing with the Holy Spirit. Along with him they chose Philip, Prochorus, Nicanor, Timon, Parmenas, and Nicholas from Antioch, '
  - type: note
    content: The Aramaic can be translated “Nicholas, the hero of Antioch.”
  - type: text
    content: 'who had converted to Judaism. '
  '6':
  - type: text
    content: 'All seven stood before the apostles, who laid their hands on them and prayed for them, '
  - type: text
    content: commissioning them to this ministry
  - type: text
    content: .
  - type: note
    content: The practice of laying on of hands indicates approval, impartation of authority, commissioning, and ordaining. As the Old Testament priest laid hands on a sacrifice and transferred the guilt of sins upon the animal, the New Testament apostles laid their hands on men and appointed them to ministry. See Lev. 16:21–22; Num. 27:18–20; Heb. 6:2.
  '7':
  - type: text
    content: 'God’s word reigned supreme '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: and kept spreading. The number of Jesus’ followers in Jerusalem quickly grew and increased by the day. Even a great number of Jewish priests became believers and were obedient to the faith!
  '8':
  - type: text
    content: 'Stephen, who was a man full of grace and supernatural power, performed many astonishing signs and wonders and mighty miracles among the people. '
  - type: note
    content: Stephen was not an apostle, yet he worked miracles of power through his ministry. The miraculous is not for the few, but for the many.
  '9':
  - type: text
    content: 'This upset some men belonging to a sect who called themselves the Men Set Free. '
  - type: note
    content: Or “the Synagogue of the Freedmen.” Although most expositors view these as former Hebrew slaves, the Aramaic is “Libertines.” It is possible that these were pagan cult members who followed a Roman mythical hero named Liber. From this word we get the English word liberty. They emphasized drunkenness and promiscuity. They boasted in their freedom from all moral laws as the Men Set Free to do whatever they desired. They were so hedonistic that even other pagans viewed them as wicked. These Libertines were the antithesis to the true freedom that comes through Christ (John 8:36).
  - type: text
    content: 'They were Libyans, '
  - type: note
    content: Or “Cyrene,” a region of eastern Libya.
  - type: text
    content: 'Egyptians, '
  - type: note
    content: Or “Alexandria,” a large Egyptian city on the Mediterranean.
  - type: text
    content: and Turks.
  - type: note
    content: Or “Cilicia” (southeastern coastal area of Turkey) and “the province of Asia” (that is, Asia Minor, comprised of western and southwestern Turkey). Both regions are included in the word Turks.
  - type: text
    content: 'They all confronted Stephen to argue '
  - type: note
    content: The Aramaic is “word wrestle.”
  - type: text
    content: 'with him. '
