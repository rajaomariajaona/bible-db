  children:
  - type: text
    text: Access to the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shining
  - type: text
    text: ' man brought me back to the outer gate of the sanctuary, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the outer gate of the temple area, today known as the “Golden Gate.”
    marker-yv: yv-n
  - type: text
    text: 'which faces east, but it was shut. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said to me, “This gate must be kept shut. No one may open it or enter through it, since '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Israel, has passed through it. Therefore, it must remain shut. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The prince, and only the prince, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Who is this “prince”? Jewish scholars teach that it is the Messiah. Some think it is David himself. Jesus Christ, the Messiah, is called the Prince of Peace in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 9:6–7
      metadata:
        usfm: ISA.9.6+ISA.9.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'may sit inside the gateway to eat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his sacred meal
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 7:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Jesus eats his sacred meal with his disciples and with us. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 26:29
      metadata:
        usfm: MAT.26.29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 22:14–22
      metadata:
        usfm: LUK.22.14+LUK.22.15+LUK.22.16+LUK.22.17+LUK.22.18+LUK.22.19+LUK.22.20+LUK.22.21+LUK.22.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'in the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. He must enter and leave through the porch of the gate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the outer courtyard
  - type: text
    text: .”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rules for Admission to the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shining
  - type: text
    text: ' man led me through the north gate to the front of the temple. And I looked and behold, I saw '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: cloud
  - type: text
    text: ' filling the temple. And I was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: awestruck
  - type: text
    text: ' and fell facedown to the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said to me, “Son of man, set your heart on what I am about to tell you. Look closely and listen carefully to everything I explain regarding all the laws and instructions about my temple. Pay careful attention to the entrance to the temple and all the exits from the sanctuary. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And tell the rebels among the people of Israel, ‘Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says to you: Enough of all your despicable deeds, you people of Israel! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'You have desecrated my temple by admitting gentiles into my sanctuary who are uncircumcised in heart and body, allowing them into '
  - type: usfm
    marker: it
    children:
    - type: text
      text: my presence
  - type: text
    text: ' while you offer the fat and blood of sacrifices to me. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 23:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'You have broken my covenant in addition to all the wicked things you have done. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Instead of keeping charge of my holy things yourselves, you have placed these gentiles in charge of my sanctuary.’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Levites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says, “No gentile, uncircumcised in heart and body, may enter my sanctuary, even the foreigners living among the Israelites. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For the Levites who abandoned me when Israel turned their backs on me to worship their false gods must bear the consequences of their own sin. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They may serve me in my sanctuary by being temple gatekeepers and temple servants. They may kill the animals the people bring to offer as burnt offerings and sacrifices for the people and by serving the worshipers in the temple. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But because they assisted the people of Israel in the worship of their idols and thereby caused them to sin, I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', solemnly swear '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “have raised my hand against them,” a figure of speech for taking an oath.
    marker-yv: yv-n
  - type: text
    text: 'that they will suffer for their sin. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'They will never draw near to me again to fulfill the priestly office in my presence, nor will they ever again touch my holy things—my very, very holy things! They must bear the shame and disgrace of their despicable deeds. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will, however, assign them the responsibility of performing temple duties '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in the outer court
  - type: text
    text: . I will make them responsible for serving the temple and the work to be done in it.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rules for the Priests
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: nd
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yahweh
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: says
  - type: text
    text: ', “The Levitical priests, the sons of Zadok, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 40:46
      metadata:
        usfm: EZK.40.46
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and footnote.
    marker-yv: yv-n
  - type: text
    text: 'who faithfully served in my sanctuary when the rest of the Israelites strayed far from me, they will come near to me to minister to me. I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', declare that they will stand in my presence to offer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the sacrifices of
  - type: text
    text: ' fat and blood. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: They will enter my sanctuary and approach my table to minister to me and to oversee the temple worship.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“When the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Zadokite
  - type: text
    text: ' priests enter the gates of the inner court, they must be wearing linen garments. They are not allowed to wear any wool '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The prohibition of the priests wearing wool seems to suggest that God doesn’t want us to sweat in his presence (see v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: EZK.44.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Linen vestments would be more comfortable and cooler to wear. Wool is a part of the beast (animal) realm. Wool is a symbol of the flesh and fleshly efforts to please God. Gideon offered his wool fleece to God on a threshing floor (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 6:36–40
      metadata:
        usfm: JDG.6.36+JDG.6.37+JDG.6.38+JDG.6.39+JDG.6.40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Linen is a symbol of righteousness (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 19:8
      metadata:
        usfm: REV.19.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'clothing when they are on duty inside the inner court or in the temple. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Their turbans and undergarments must all likewise be of linen. They are not to wear anything that makes them perspire. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “not to belt themselves with sweat.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'When they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: finish their sacred duties
  - type: text
    text: ', before they go out to mingle with the people in the outer court, they must remove their priestly garments they ministered in and leave them in the holy chamber rooms. They then must put on regular clothes so that they will not transmit holiness to the people through their sacred garments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “The priests must not shave their heads nor let their hair grow long, but must keep it properly trimmed.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: To have long, unkempt hair was improper for the priests. Long hair was considered a sign of one in mourning (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 24:17
      metadata:
        usfm: EZK.24.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '23'
      metadata:
        usfm: EZK.24.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Priests must not drink wine before they enter the inner court.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “They may not marry a widow or a divorced woman but only an Israelite virgin. They may, however, marry a widow if she is the widow of a priest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“They must teach my people the difference between what is holy and what is ordinary and make them understand the difference between what is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ritually
  - type: text
    text: ' clean for God’s service and what is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ritually
  - type: text
    text: ' unacceptable.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “If a dispute arises, the priests will judge it consistent with my laws. They must follow my instructions and regulations for all my appointed feasts and honor my holy Sabbaths.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“A priest must not defile himself by going near a dead person; however, if the dead person was his father or mother, son or daughter, brother, or unmarried sister, then he may defile himself. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'After his purification, he must wait seven days. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And the first day he goes back into the inner court to minister in the Holy Place, he must offer his sin offering. I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: God, the Inheritance of the Priests
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the priests
  - type: text
    text: ', “I will be their sole inheritance. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 44:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew is “And it will be their inheritance.” Scholars are divided over what “it” refers to. The Latin Vulgate reads, “The priests have no inheritance.” However, the pronoun more likely refers to the office of the priesthood.
    marker-yv: yv-n
  - type: text
    text: You are not to give them any possession in Israel, for I alone am their sole possession.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“Their food will be the grain offering, the sin offerings, and the guilt offerings. Everything dedicated by vow to God in Israel will be theirs. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'All the best fruits of every kind and all the offerings that the people give to God must go to the priests. And you must also give the first portion of the grain you grind into flour to the priests so that a blessing may rest on your house. '
