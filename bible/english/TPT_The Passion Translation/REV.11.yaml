document_id: REV.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Measuring the Temple
  - type: text
    content: 'Then a measuring rod, like a staff, was given to me and I was told:'
  - type: text
    content: 'Rise and measure God’s temple '
  - type: note
    content: The church is God’s temple, his dwelling place. Presumably, when John wrote this there was no longer a temple standing in Jerusalem. But if John wrote this book earlier, during the time of Nero, it would point to the events of AD 67–70 during the Roman war, which lasted three and a half years.
  - type: text
    content: 'and the altar and count those who worship in it. '
  '10':
  - type: text
    content: 'The entire world will gloat over them and celebrate and exchange gifts, because these two prophets had condemned '
  - type: note
    content: Or “tormented.”
  - type: text
    content: those who dwell on the earth.
  '11':
  - type: text
    content: 'After three and a half days God’s breath of life '
  - type: note
    content: Or “spirit of lives.”
  - type: text
    content: 'entered them and they stood to their feet, terrifying all who saw them. '
  - type: note
    content: The Aramaic can be translated “total paralysis fell on those who saw them.”
  '12':
  - type: text
    content: 'Then they heard a loud shout from heaven saying to them:'
  - type: text
    content: Come up here!
  - type: text
    content: 'The two prophets climbed up into heaven in a cloud while their enemies watched. '
  '13':
  - type: text
    content: At that very moment there was a powerful earthquake and a tenth of the city collapsed, killing seven thousand people. The rest were terrified and gave glory to the God of heaven.
  '14':
  - type: text
    content: Now the second woe has passed and the third is coming swiftly.
  - type: heading
    content: The Seventh Trumpet
  '15':
  - type: text
    content: 'Then the seventh angel sounded his trumpet, and a loud voice broke forth in heaven, saying:'
  - type: text
    content: “The kingdom of the world
  - type: note
    content: That is, the kingdom of finance, culture, and government, both religious and secular.
  - type: text
    content: has become the kingdom of our God
  - type: note
    content: As translated from the Aramaic. The Greek is “the kingdom of our Lord.”
  - type: text
    content: and of his Anointed One!
  - type: note
    content: Or “Christ” (or “Messiah”).
  - type: text
    content: He will reign supreme for an eternity of eternities!”
  '16':
  - type: text
    content: 'Then the twenty-four elders who sit on their thrones before God fell facedown before him and worshiped him, '
  '17':
  - type: text
    content: 'saying:'
  - type: text
    content: “We give thanks to you, Lord God Almighty,
  - type: text
    content: who is, and who was,
  - type: text
    content: because you have established
  - type: note
    content: As translated from the Aramaic. The Greek is “you have taken your great power.”
  - type: text
    content: 'your great '
  - type: text
    content: and limitless
  - type: text
    content: ' power and begun to reign!'
  '18':
  - type: text
    content: The nations were furious, and you became furious,
  - type: note
    content: Or “and your wrath has come.”
  - type: text
    content: and the time for judging the dead has come.
  - type: text
    content: The time has come to reward your servants, the prophets
  - type: text
    content: and the holy ones and all who reverence your name,
  - type: text
    content: both small and great.
  - type: note
    content: The Aramaic can be translated “lords of plenty.”
  - type: text
    content: And the time has come
  - type: text
    content: ' to destroy those'
  - type: text
    content: 'who corrupt '
  - type: note
    content: Or “deprave” or “destroy.”
  - type: text
    content: the earth!”
  '19':
  - type: text
    content: 'Then God’s temple was opened in heaven and the ark of his covenant was '
  - type: text
    content: clearly
  - type: text
    content: ' visible inside his temple. And there were blinding flashes of lightning, voices roaring, startling thunderclaps, a massive earthquake, and a great hailstorm!'
  - type: note
    content: Or “heavy hailstones.”
  '2':
  - type: text
    content: 'But exclude the courtyard outside the temple, for it has been given over to the nations, and for forty-two months '
  - type: note
    content: This was the length of Jesus’ earthly ministry.
  - type: text
    content: 'they will trample on the holy city. '
  '3':
  - type: text
    content: And I will authorize my two witnesses to prophesy, wearing sackcloth for one thousand two hundred and sixty days.
  - type: note
    content: That is, three and a half years, or forty-two months.
  - type: heading
    content: The Two Witnesses
  '4':
  - type: text
    content: 'These '
  - type: text
    content: two witnesses
  - type: text
    content: ' '
  - type: note
    content: See Zech. 4. The two witnesses are interpreted by some scholars to be symbols of the Word and the Spirit. Some see the two olive trees as the Law and the Prophets or Moses and Elijah; others view them as believing Jews and gentiles.
  - type: text
    content: 'are the two olive trees and the two lampstands that stand before the Lord God of the whole earth. '
  '5':
  - type: text
    content: 'If anyone attempts to harm them, fire will flow out of their mouths and consume their foes. All who seek to harm them will die in this way. '
  '6':
  - type: text
    content: They have authority to shut the heavens so that no rain will fall during the days of their prophesying. They have authority over the waters to turn them into blood and to strike the earth with every plague imaginable, as often as they desire.
  '7':
  - type: text
    content: 'When their testimony is completed, the beast that comes up from the bottomless pit will wage war against them and conquer them and kill them. '
  '8':
  - type: text
    content: 'Their dead bodies will lie on the street '
  - type: note
    content: Or “plaza.”
  - type: text
    content: 'of the great city that is symbolically '
  - type: note
    content: Or “spiritually.”
  - type: text
    content: 'called Sodom and Egypt, '
  - type: note
    content: This is viewed as the great city of Jerusalem, where our Lord was crucified, symbolically called Sodom (Isa. 1:9–26) and Egypt. It can also represent the corrupt religious systems of the world.
  - type: text
    content: 'where their Lord was also crucified. '
  '9':
  - type: text
    content: 'For three and a half days people from every ethnicity, tribe, nation, and language will see their corpses, because no one is permitted to bury them. '
