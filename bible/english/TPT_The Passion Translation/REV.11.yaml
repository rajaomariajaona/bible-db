document_id: REV.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Measuring the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then a measuring rod, like a staff, was given to me and I was told:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: 'Rise and measure God’s temple '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The church is God’s temple, his dwelling place. Presumably, when John wrote this there was no longer a temple standing in Jerusalem. But if John wrote this book earlier, during the time of Nero, it would point to the events of AD 67–70 during the Roman war, which lasted three and a half years.
    marker-yv: yv-n
  - type: text
    text: 'and the altar and count those who worship in it. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But exclude the courtyard outside the temple, for it has been given over to the nations, and for forty-two months '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was the length of Jesus’ earthly ministry.
    marker-yv: yv-n
  - type: text
    text: 'they will trample on the holy city. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And I will authorize my two witnesses to prophesy, wearing sackcloth for one thousand two hundred and sixty days.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, three and a half years, or forty-two months.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Two Witnesses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: two witnesses
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Zech. 4
      metadata:
        usfm: ZEC.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The two witnesses are interpreted by some scholars to be symbols of the Word and the Spirit. Some see the two olive trees as the Law and the Prophets or Moses and Elijah; others view them as believing Jews and gentiles.
    marker-yv: yv-n
  - type: text
    text: 'are the two olive trees and the two lampstands that stand before the Lord God of the whole earth. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'If anyone attempts to harm them, fire will flow out of their mouths and consume their foes. All who seek to harm them will die in this way. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They have authority to shut the heavens so that no rain will fall during the days of their prophesying. They have authority over the waters to turn them into blood and to strike the earth with every plague imaginable, as often as they desire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When their testimony is completed, the beast that comes up from the bottomless pit will wage war against them and conquer them and kill them. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Their dead bodies will lie on the street '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “plaza.”
    marker-yv: yv-n
  - type: text
    text: 'of the great city that is symbolically '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “spiritually.”
    marker-yv: yv-n
  - type: text
    text: 'called Sodom and Egypt, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is viewed as the great city of Jerusalem, where our Lord was crucified, symbolically called Sodom (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 1:9–26
      metadata:
        usfm: ISA.1.9+ISA.1.10+ISA.1.11+ISA.1.12+ISA.1.13+ISA.1.14+ISA.1.15+ISA.1.16+ISA.1.17+ISA.1.18+ISA.1.19+ISA.1.20+ISA.1.21+ISA.1.22+ISA.1.23+ISA.1.24+ISA.1.25+ISA.1.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and Egypt. It can also represent the corrupt religious systems of the world.
    marker-yv: yv-n
  - type: text
    text: 'where their Lord was also crucified. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For three and a half days people from every ethnicity, tribe, nation, and language will see their corpses, because no one is permitted to bury them. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The entire world will gloat over them and celebrate and exchange gifts, because these two prophets had condemned '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “tormented.”
    marker-yv: yv-n
  - type: text
    text: those who dwell on the earth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'After three and a half days God’s breath of life '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “spirit of lives.”
    marker-yv: yv-n
  - type: text
    text: 'entered them and they stood to their feet, terrifying all who saw them. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “total paralysis fell on those who saw them.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then they heard a loud shout from heaven saying to them:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: Come up here!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The two prophets climbed up into heaven in a cloud while their enemies watched. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: At that very moment there was a powerful earthquake and a tenth of the city collapsed, killing seven thousand people. The rest were terrified and gave glory to the God of heaven.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Now the second woe has passed and the third is coming swiftly.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Seventh Trumpet
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the seventh angel sounded his trumpet, and a loud voice broke forth in heaven, saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The kingdom of the world
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the kingdom of finance, culture, and government, both religious and secular.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: has become the kingdom of our God
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “the kingdom of our Lord.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and of his Anointed One!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Christ” (or “Messiah”).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will reign supreme for an eternity of eternities!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then the twenty-four elders who sit on their thrones before God fell facedown before him and worshiped him, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “We give thanks to you, Lord God Almighty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who is, and who was,
- type: usfm
  marker: q1
  children:
  - type: text
    text: because you have established
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “you have taken your great power.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'your great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and limitless
  - type: text
    text: ' power and begun to reign!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The nations were furious, and you became furious,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “and your wrath has come.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the time for judging the dead has come.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The time has come to reward your servants, the prophets
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the holy ones and all who reverence your name,
- type: usfm
  marker: q1
  children:
  - type: text
    text: both small and great.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “lords of plenty.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: And the time has come
  - type: text
    text: ' to destroy those'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'who corrupt '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “deprave” or “destroy.”
    marker-yv: yv-n
  - type: text
    text: the earth!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then God’s temple was opened in heaven and the ark of his covenant was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: clearly
  - type: text
    text: ' visible inside his temple. And there were blinding flashes of lightning, voices roaring, startling thunderclaps, a massive earthquake, and a great hailstorm!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “heavy hailstones.”
    marker-yv: yv-n
