    text: They rolled a large stone to seal the entrance of the tomb and left.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Sitting across from the tomb were Mary Magdalene and the other Marys, '
  - type: usfm
    marker: f
    children:
