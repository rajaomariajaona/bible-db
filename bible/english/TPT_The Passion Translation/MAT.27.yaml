document_id: MAT.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Condemned by the Religious Leaders
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Before dawn that morning, all the chief priests and religious leaders resolved to take action against Jesus and decided that he should be executed. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So they bound him and led him away to Pilate, the Roman governor.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judas Commits Suicide
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now, when Judas, the betrayer, saw that Jesus had been sentenced to death, remorse filled his heart. He returned the thirty pieces of silver to the chief priests and religious leaders, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: saying, “I have sinned by betraying an innocent man.”
- type: usfm
  marker: p
  children:
  - type: text
    text: They replied, “Why are you bothering us? That’s your problem.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then Judas flung the silver coins inside the temple and went out and hanged himself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The chief priests, picking up the pieces of silver, said, “We can’t keep this, for it’s unlawful to put blood money into the temple treasury.” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So after some deliberation, they decided to purchase the potter’s field '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of clay
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the historical context. This was the field owned by a potter, used for making clay vessels.
    marker-yv: yv-n
  - type: text
    text: 'to use as a cemetery for burying strangers. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'That’s why that land has been called “The Field of Blood.” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'This fulfilled the prophecy of Zechariah:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Hebrew Matthew. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Zech. 11:12–13
      metadata:
        usfm: ZEC.11.12+ZEC.11.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The Greek manuscripts incorrectly identify the prophecy as from Jeremiah. There is no clear prophecy found in Jeremiah that is quoted here by Matthew. The Aramaic reads simply, “spoken of by the prophet.” The Hebrew Matthew correctly states, “spoken through Zechariah.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: They took the thirty pieces of silver,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Thirty pieces of silver is also the price someone owed if their ox killed a slave (
    - type: text
      text: Ex. 21:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: the price at which he was valued by the people of Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the price of a precious man,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And they bought the potter’s field,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as the Lord directed.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “as the Lord directed me.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Brought before Pilate
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: As Jesus stood in front of the Roman governor, Pilate asked him, “So, you are the king of the Jews?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You have just spoken it.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then he was accused by the chief priests and religious leaders, but he remained silent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Pilate said, “Don’t you hear these allegations?” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But Jesus offered no defense to any of the charges, much to the great astonishment of Pilate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now, every year at Passover it was the custom of the governor to pardon a prisoner and release him to the people—anyone they wanted. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And at that time, Pilate was holding in custody a notorious criminal named Jesus Barabbas. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Hebrew Matthew and a few Greek manuscripts. Most Greek texts have only Barabbas. The name Barabbas is Aramaic and means “son of a father” or “son who is like his father.” He becomes a picture of every son of Adam, our father. Some believe this is a figure of speech, a nickname for one who was born an illegitimate son, with no known father. The true Son of the Father was crucified that day.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So as the crowds of people assembled outside of Pilate’s residence, he went out and offered them a choice. He asked them, “Who would you want me to release to you today, Jesus who is called Barabbas, or Jesus who is called the Anointed One?” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: (Now, Pilate was fully aware that the religious leaders had handed Jesus over to him because of their bitter jealousy.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Just then, as Pilate was presiding over the tribunal, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “sat on the judgment seat.”
    marker-yv: yv-n
  - type: text
    text: 'his wife sent him an urgent message: “Don’t harm that holy man, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: for I suffered a horrible nightmare last night about him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Meanwhile, the chief priest and the religious leaders were inciting the crowd to ask for Barabbas to be freed and to have Jesus killed. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So Pilate asked them again, “Which of the two men would you like me to release for you?”
- type: usfm
  marker: p
  children:
  - type: text
    text: They shouted, “Barabbas.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Pilate asked them, “Then what would you have me to do with Jesus who is called the Anointed One?”
- type: usfm
  marker: p
  children:
  - type: text
    text: They all shouted back, “Crucify him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Why?” Pilate asked. “What has he done wrong?”
- type: usfm
  marker: p
  children:
  - type: text
    text: But they kept shouting out, “Crucify him!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Condemned to Death
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When Pilate realized that a riot was about to break out and that it was useless to try to reason with the crowd, he sent for a basin of water. After washing his hands '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 21:6–7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'in front of the people, he said, “I am innocent of the blood of this righteous man. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Hebrew Matthew and the Aramaic.
    marker-yv: yv-n
  - type: text
    text: The responsibility for his death is now yours!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “You do as you please!”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And the crowd replied, “Let his blood be on us and on our children!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'So he released Barabbas to the people. He ordered that Jesus be beaten with a whip of leather straps embedded with metal, and afterward be crucified. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then the guards took him into their military compound, where a detachment of nearly six hundred soldiers surrounded him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'They stripped off his clothing '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ekduo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “to fully undress.” This was an act meant to shame and humiliate.
    marker-yv: yv-n
  - type: text
    text: 'and placed a scarlet robe on him to make fun of him. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then they braided a crown of thorns and forcefully shoved it onto his head. After placing a reed staff in his right hand, they knelt down before him and mocked him, saying, “Hail, king of the Jews!” '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then they spat in his face and took the reed staff from his hand and hit him repeatedly on his head, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: driving the crown of thorns deeper
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'When they finished ridiculing him, they took off the scarlet robe and put his own clothes back on him and led him away to be crucified. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And as they came out of the city, they stopped an African man named Simon, from Libya, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “from Cyrene,” which is present-day Tripoli, Libya.
    marker-yv: yv-n
  - type: text
    text: and compelled him to carry the cross for Jesus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Crucifixion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'They brought Jesus to Golgotha, which means “Skull Hill.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Golgotha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is, in Latin,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: calvaria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', or Calvary. Origen, an early church father (185–253 AD), recorded that Jesus was crucified at the place where Adam was buried and where his skull was found. David brought Goliath’s head (Goliath and Golgotha are taken from the same root word) and buried it outside of Jerusalem. Some believe this is where it got its name, Golgotha (the place of the skull). The cross has to pierce the place of the skull for our minds to submit to the revelation of the cross.'
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And there the soldiers offered him a mild painkiller, a drink of wine mixed with gall, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 69:21
      metadata:
        usfm: PSA.69.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Jesus was twice offered a painkiller on the cross and did not drink it. He knew he was to drink the cup of suffering the Father had given him. He did that for you.
    marker-yv: yv-n
  - type: text
    text: but after tasting it, he refused to drink it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then they crucified Jesus, nailing his hands and feet to the cross. The soldiers divided his clothing among themselves by rolling dice to see who would win them. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And the soldiers stood there to watch what would happen and to keep guard over him. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Above his head they placed a sign that read, “This is Jesus of Nazareth, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:37
    - type: usfm
