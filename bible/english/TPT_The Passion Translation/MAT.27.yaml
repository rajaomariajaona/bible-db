      metadata:
        usfm: LUK.23.50+LUK.23.51
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . It is possible that Joseph may have lost a son the age of Jesus when Herod killed the infants.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'approached Pilate and asked if he could take custody of the body of Jesus. So Pilate consented and ordered that the body be given to him. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Then Joseph wrapped the body in a shroud of fine linen and placed it in his own unused tomb, which had only recently been cut into the rock. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
