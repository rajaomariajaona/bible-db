  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Some who were standing near the cross misunderstood and said, “He’s calling for Elijah.” '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'One bystander ran and got a sponge, soaked it with sour wine, then put it on a stick and held it up for Jesus to drink. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: But the rest said, “Leave him alone! Let’s see if Elijah comes to rescue him.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:49
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A few Greek manuscripts have an additional sentence: “A soldier took a lance and pierced him in the side and blood and water poured out.” It is not found in the Aramaic and many Greek texts of Matthew. If included, it would mean the soldier took Jesus’ life with his lance. However, Jesus said that no man could take his life from him. The evidence is compelling that it was not part of the original text, but was taken from'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
