- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'The next day, the day after Preparation Day for Passover, the chief priests and the Pharisees went together to Pilate. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'They said to him, “Our master, we remember that this imposter claimed that he would rise from the dead after three days. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: So please, order the tomb to be sealed until after the third day. Seal it so that his disciples can’t come and steal the corpse and tell people he rose from the dead. Then the last deception would be worse than the first!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: '“I will send soldiers to guard the tomb,” Pilate replied. “Go with them and make the tomb as secure as possible.” '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'So they left and sealed the stone, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:66
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This official seal, if broken, would bring the death penalty to the offender.
    marker-yv: yv-n
  - type: text
    text: and Pilate’s soldiers secured the tomb.
