  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:53
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Perhaps one was Joseph, for he had asked that his bones be buried in the promised land. He saw a resurrection coming and didn’t want to be left out. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 11:22
      metadata:
        usfm: HEB.11.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Jesus’ resurrection was so powerful that many were instantly raised back to life again along with him.
    marker-yv: yv-n
