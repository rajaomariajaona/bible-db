  marker: ms4
  children:
  - type: text
    text: The Golden Secret
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A precious song, engraved in gold, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word used in the inscription is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: michtam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. There are many variations of translation for this word. Here are the major ones: “golden,” “graven,” “a permanent writing,” “precious,” “hidden,” “a spiritual secret,” or “jewel.” The Septuagint renders this “a sculptured writing of gold”; other translations call it a “golden poem.” Perhaps the most accepted translation of'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: michtam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is “engraved in gold.” This speaks of the divine nature engraved into our hearts by the Word. A new humanity is now stamped with God-life, engraved in his golden glory.
    marker-yv: yv-n
  - type: text
    text: by David
- type: usfm
  marker: s1
  children:
  - type: text
    text: My Protection
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Keep me safe, O mighty God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I run to you, my safe place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I said to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are my Maker and my Master.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any good thing you find in me has come from you.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: it
    children:
    - type: text
      text: And he said to me
  - type: text
    text: ', “My holy lovers'
- type: usfm
  marker: q1
  children:
  - type: text
    text: in the land are my glorious ones,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who fulfill all my desires.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Yet there are those who yield to their weakness,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they will have troubles unending.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I never gather with such ones,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor give them honor in any way.
- type: usfm
  marker: s1
  children:
  - type: text
    text: My Portion
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', you alone are my inheritance.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are my prize, my pleasure, and my portion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You hold my destiny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and its timing
  - type: text
    text: ' in your hands.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Your pleasant path '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “boundary lines.”
    marker-yv: yv-n
  - type: text
    text: leads me to pleasant places.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m overwhelmed by the privileges
- type: usfm
  marker: q1
  children:
  - type: text
    text: that come with following you!
- type: usfm
  marker: s1
  children:
  - type: text
    text: My Praise
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The way you counsel me makes me praise you more,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for your whispers in the night give me wisdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: showing me what to do next.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Because I set '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shava
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: carries the sense of being equal or similar. David was not saying he was equal to
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', but that he thought the way God thought. David had made his heart and mind to be identical with the heart and mind of God. Always before himself, before anything, were the desires of God. It was the heart and mind of God that had first place in David’s heart and thoughts.'
    marker-yv: yv-n
  - type: text
    text: 'you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', always close to me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: my confidence will never be weakened,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is possible to translate this section as “I have determined in my heart to be identical with the mind and heart of God, and I will not let my resolve be weakened.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: for I experience your wraparound presence every moment.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “because he is at my right hand.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: My heart and soul explode with joy—full of glory!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even my body will rest confident and secure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For you will not abandon me to the realm of death,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor will you allow your Faithful One to experience corruption.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the pit.” This is likely a metaphor for Sheol.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Because of you, I know the path of life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as I taste the fullness of joy in your presence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'At your right side '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus was pierced in his side with the spear of man’s hatred. Eternal pleasures are found hidden in the wounds of Christ, where Jesus responded to the world’s hatred with sacred blood and water flowing from his side. Forgiveness and grace splashed on the dirt. We are now seated with Christ at his right side.
    marker-yv: yv-n
  - type: text
    text: 'I experience '
  - type: usfm
    marker: it
    children:
    - type: text
      text: divine
  - type: text
    text: ' pleasures forevermore!'
