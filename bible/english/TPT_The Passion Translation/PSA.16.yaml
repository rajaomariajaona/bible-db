document_id: PSA.16,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Golden Secret
  - type: text
    content: 'A precious song, engraved in gold, '
  - type: note
    content: 'The Hebrew word used in the inscription is michtam. There are many variations of translation for this word. Here are the major ones: “golden,” “graven,” “a permanent writing,” “precious,” “hidden,” “a spiritual secret,” or “jewel.” The Septuagint renders this “a sculptured writing of gold”; other translations call it a “golden poem.” Perhaps the most accepted translation of michtam is “engraved in gold.” This speaks of the divine nature engraved into our hearts by the Word. A new humanity is now stamped with God-life, engraved in his golden glory.'
  - type: text
    content: by David
  - type: heading
    content: My Protection
  - type: text
    content: Keep me safe, O mighty God.
  - type: text
    content: I run to you, my safe place.
  '10':
  - type: text
    content: For you will not abandon me to the realm of death,
  - type: text
    content: nor will you allow your Faithful One to experience corruption.
  - type: note
    content: Or “the pit.” This is likely a metaphor for Sheol.
  '11':
  - type: text
    content: Because of you, I know the path of life,
  - type: text
    content: as I taste the fullness of joy in your presence.
  - type: text
    content: 'At your right side '
  - type: note
    content: Jesus was pierced in his side with the spear of man’s hatred. Eternal pleasures are found hidden in the wounds of Christ, where Jesus responded to the world’s hatred with sacred blood and water flowing from his side. Forgiveness and grace splashed on the dirt. We are now seated with Christ at his right side.
  - type: text
    content: 'I experience '
  - type: text
    content: divine
  - type: text
    content: ' pleasures forevermore!'
  '2':
  - type: text
    content: 'I said to '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: “You are my Maker and my Master.
  - type: text
    content: Any good thing you find in me has come from you.”
  '3':
  - type: text
    content: And he said to me
  - type: text
    content: ', “My holy lovers'
  - type: text
    content: in the land are my glorious ones,
  - type: text
    content: who fulfill all my desires.”
  '4':
  - type: text
    content: Yet there are those who yield to their weakness,
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: and they will have troubles unending.
  - type: text
    content: I never gather with such ones,
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: nor give them honor in any way.
  - type: heading
    content: My Portion
  '5':
  - type: text
    content: Yahweh
  - type: text
    content: ', you alone are my inheritance.'
  - type: text
    content: You are my prize, my pleasure, and my portion.
  - type: text
    content: 'You hold my destiny '
  - type: text
    content: and its timing
  - type: text
    content: ' in your hands.'
  '6':
  - type: text
    content: 'Your pleasant path '
  - type: note
    content: Or “boundary lines.”
  - type: text
    content: leads me to pleasant places.
  - type: text
    content: I’m overwhelmed by the privileges
  - type: text
    content: that come with following you!
  - type: heading
    content: My Praise
  '7':
  - type: text
    content: The way you counsel me makes me praise you more,
  - type: text
    content: for your whispers in the night give me wisdom,
  - type: text
    content: showing me what to do next.
  '8':
  - type: text
    content: 'Because I set '
  - type: note
    content: The Hebrew word shava carries the sense of being equal or similar. David was not saying he was equal to Yahweh, but that he thought the way God thought. David had made his heart and mind to be identical with the heart and mind of God. Always before himself, before anything, were the desires of God. It was the heart and mind of God that had first place in David’s heart and thoughts.
  - type: text
    content: 'you, '
  - type: text
    content: Yahweh
  - type: text
    content: ', always close to me,'
  - type: text
    content: my confidence will never be weakened,
  - type: note
    content: It is possible to translate this section as “I have determined in my heart to be identical with the mind and heart of God, and I will not let my resolve be weakened.”
  - type: text
    content: for I experience your wraparound presence every moment.
  - type: note
    content: Or “because he is at my right hand.”
  '9':
  - type: text
    content: My heart and soul explode with joy—full of glory!
  - type: text
    content: Even my body will rest confident and secure.
