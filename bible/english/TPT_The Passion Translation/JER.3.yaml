document_id: JER.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Unfaithful Judah
  - type: text
    content: 'Here’s what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “If a man divorces his wife
  - type: text
    content: and she marries another,
  - type: text
    content: would he return to her again?
  - type: note
    content: See Deut. 24:1–4.
  - type: text
    content: Doing that would thoroughly defile the land.
  - type: note
    content: Or “the woman” (LXX).
  - type: text
    content: 'And you, '
  - type: text
    content: Israel
  - type: text
    content: ', have prostituted yourself with many lovers,'
  - type: text
    content: yet now you want to come back to me?
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '10':
  - type: text
    content: 'Even after all this, Israel’s treacherous sister, Judah, refused to return to me with her whole heart; instead, she came with only deceitful lies,” '
  - type: note
    content: See Isa. 29:13.
  - type: text
    content: 'declared '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '11':
  - type: text
    content: 'And '
  - type: text
    content: Yahweh
  - type: text
    content: ' continued, “Even unfaithful Israel has shown herself more righteous than treacherous Judah. '
  '12':
  - type: text
    content: 'Go and carry this message to those living in the north:'
  - type: text
    content: “ ‘
  - type: text
    content: Yahweh
  - type: text
    content: ' is speaking to you, unfaithful Israel:'
  - type: text
    content: 'Return to me. '
  - type: text
    content: For my faithful love for you never ends.
  - type: text
    content: No frown of mine awaits you,
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: I will not remain angry with you forever,
  - type: text
    content: 'for I am merciful, declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '13':
  - type: text
    content: Only admit your guilt!
  - type: text
    content: 'You have rebelled against '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God.'
  - type: text
    content: 'You have lavished your love on foreign '
  - type: text
    content: gods
  - type: text
    content: ' under every green tree.'
  - type: text
    content: You have not listened to my voice.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  '14':
  - type: text
    content: “ ‘I say to you,
  - type: text
    content: 'Come back to me, my wayward '
  - type: note
    content: Or “faithless.”
  - type: text
    content: children,
  - type: text
    content: 'and '
  - type: text
    content: I will restore you
  - type: text
    content: .
  - type: text
    content: I will take you, one from each city and two from each clan,
  - type: text
    content: and bring you home to Zion
  - type: note
    content: To the Jewish people, Zion is representative of the land of Israel, a section of the city of Jerusalem, and the location of the temple, and thus the representation of Yahweh’s presence among his people. However, there is a spiritual Zion that believers have already come to (see Heb. 12:22). Zion etymologically has many possible meanings. Zion can mean “conspicuous,” “sunny,” “clear,” “unobstructed,” “sunshine,” “set up,” “placed,” “established,” “constituted,” “commanded,” “fortress,” “monument,” “column,” or “landmark.”
  - type: text
    content: because I alone am your true husband.’ ”
  - type: note
    content: 'Or “master.” The Hebrew verb in this phrase derives from the same stem as the word for “Baal”: baalti, which means “I am married.” Thus, this is a play on words. See Hos. 2:16.'
  - type: heading
    content: The Promise of True Shepherds
  '15':
  - type: text
    content: '“ ‘I will give you '
  - type: text
    content: 'true'
  - type: text
    content: ' shepherds who follow my heart, '
  - type: note
    content: Or “whose thinking is like mine.” See 1 Sam. 13:14. Godly leaders who follow God’s heart are the key to the restoration taught in this chapter. See Ps. 23:1–6; Isa. 1:26; Ezek. 34:11–16; Obad. 21; John 10:1–21; 1 Cor. 12:28; Eph. 4:11.
  - type: text
    content: and they will feed you with revelation-knowledge and deep understanding.’ ”
  '16':
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “When '
  - type: text
    content: my children
  - type: text
    content: ' have increased and prospered in the land, then no one will mention the ark of the covenant of '
  - type: text
    content: Yahweh
  - type: text
    content: '. It will never even come to mind. No one will remember it, miss it, or make another one. '
  - type: note
    content: Scripture nowhere even hints that the ark of the covenant is to be found, rebuilt, or used again in the worship of Yahweh. The people of God will be like the ark in God’s presence (see v. 17). This points to the new covenant with an ever-increasing glory. See Jer. 31:1–40; 2 Cor. 3:7–18.
  '17':
  - type: text
    content: 'When that day comes, they will call Jerusalem the throne of '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: note
    content: That is, the mercy seat.
  - type: text
    content: 'All nations will be drawn there '
  - type: text
    content: to be
  - type: text
    content: ' in the presence of '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: note
    content: Or “in the name of Yahweh.” The name of Yahweh represents Yahweh himself. Being in God’s presence, in spirit and in truth, is the true spiritual worship of Yahweh. See John 4:21–24.
  - type: text
    content: 'They will no longer stubbornly follow their own evil hearts. '
  '18':
  - type: text
    content: 'In those days, the nation of Judah will unite with the nation of Israel. And together, they will return from the northern lands '
  - type: note
    content: The northern lands include both Assyria and Babylonia, reflecting the fall of Samaria in 722 BC and the fall of Jerusalem in 586 BC. These were the lands from which Israel and Judah returned after their exile.
  - type: text
    content: to the land that I gave your ancestors as your own inheritance.”
  - type: heading
    content: The Return of the Prodigal Son
  '19':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', said:'
  - type: text
    content: '“ ‘What '
  - type: text
    content: bliss
  - type: text
    content: ' would fill my heart to treat you like an honored son!'
  - type: text
    content: 'What '
  - type: text
    content: joy
  - type: text
    content: ' would fill my heart to give you a land of delights,'
  - type: text
    content: the most glorious and beautiful inheritance among the nations.’
  - type: text
    content: I longed for the day when you would call me ‘Father’
  - type: text
    content: and not turn away from me.
  '2':
  - type: text
    content: '“Look up to the barren heights '
  - type: note
    content: The phrase “barren heights” refers to the high places where Israel worshiped false gods.
  - type: text
    content: 'and carefully consider:'
  - type: text
    content: Is there any place where you have not offered yourself as a prostitute?
  - type: text
    content: You have sat by the roadside waiting for lovers,
  - type: text
    content: sitting like a nomad in the desert.
  - type: text
    content: You have defiled the land with your prostitution and wickedness.
  '20':
  - type: text
    content: Instead, as a treacherous wife betrays her husband,
  - type: text
    content: so, you, nation of Israel, have betrayed me.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  '21':
  - type: text
    content: I hear the sound of voices echoing from the barren hills,
  - type: note
    content: See v. 2.
  - type: text
    content: 'the bitter weeping of the sons of Israel pleading '
  - type: text
    content: for mercy
  - type: text
    content: because they lost their moral way
  - type: text
    content: 'and have forgotten '
  - type: text
    content: Yahweh
  - type: text
    content: ' their God.'
  '22':
  - type: text
    content: “Come back to me, you unfaithful ones!
  - type: text
    content: Let me heal your waywardness and restore your faithfulness.”
  - type: text
    content: “
  - type: text
    content: We’re here!
  - type: text
    content: 'We’re coming back to you, '
  - type: text
    content: Yahweh
  - type: text
    content: ', because you are our God.'
  '23':
  - type: text
    content: We see it now.
  - type: text
    content: Our idolatrous worship on the high places
  - type: text
    content: and our noisy commotion on the mountains
  - type: text
    content: were nothing but delusions.
  - type: text
    content: 'Only you, '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God, can save us.'
  '24':
  - type: text
    content: Ever since we were young,
  - type: text
    content: Baal, the god
  - type: text
    content: ' of shame,'
  - type: note
    content: Or “the shameful thing,” a euphemistic way of describing their worship of Baal.
  - type: text
    content: has robbed us of the abundance our ancestors labored for—
  - type: text
    content: 'their flocks and herds, their '
  - type: text
    content: precious
  - type: text
    content: ' sons and daughters.'
  '25':
  - type: text
    content: We deserve to lie down in our shame
  - type: text
    content: and be covered by our disgrace.
  - type: text
    content: Ever since we were young,
  - type: text
    content: we and our ancestors have sinned
  - type: text
    content: 'against our God, '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: 'We failed to really listen to your voice, '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God.”'
  '3':
  - type: text
    content: Therefore, I have withheld the rains,
  - type: text
    content: and the spring showers have not come.
  - type: note
    content: See Deut. 11:16–17.
  - type: text
    content: Yet, there you sit with the shameless, brazen look of a prostitute
  - type: note
    content: Or “you have the forehead of a prostitute.”
  - type: text
    content: who refuses to blush.
  - type: note
    content: See Jer. 6:15; 8:12.
  '4':
  - type: text
    content: And yet you have the nerve to say to me,
  - type: text
    content: ‘Father! You’ve been my trusted companion as long as I’ve lived.
  '5':
  - type: text
    content: Surely, you won’t hold a grudge against me forever, right?
  - type: text
    content: You won’t always be angry with me, will you?’
  - type: text
    content: This is only what you say,
  - type: text
    content: but you keep on doing all the evil you can get away with!”
  - type: heading
    content: Two Unfaithful Sisters
  '6':
  - type: text
    content: 'During Josiah’s '
  - type: note
    content: Josiah is mentioned twenty times in Jeremiah, almost always favorably.
  - type: text
    content: 'reign as king of Judah, '
  - type: text
    content: Yahweh
  - type: text
    content: ' asked me, “Did you see what unfaithful '
  - type: note
    content: Or “faithless.” The prophets consistently employed adultery as a metaphor for idolatry.
  - type: text
    content: 'Israel has done? '
  - type: text
    content: Like an adulterous wife, she has turned away from me.
  - type: text
    content: ' In every high place and under every green tree, she has prostituted herself '
  - type: text
    content: to worship other gods
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'I thought that after all she had done, she would return to me, but she did not return. Meanwhile her treacherous sister, Judah, looked on. '
  '8':
  - type: text
    content: 'She saw me give unfaithful Israel her divorce papers and send her away because of her continued adultery. Her treacherous sister, Judah, likewise had no fear; she, too, acted like a prostitute. '
  '9':
  - type: text
    content: 'Her infidelity mattered little to her. She polluted the land and committed adultery by worshiping idolatrous stone and wood pillars. '
