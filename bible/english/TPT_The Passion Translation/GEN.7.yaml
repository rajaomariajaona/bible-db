        usfm: SNG.4.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . As our inward lives sprout and bring forth fruit, it has the power of a subterranean fountain.
    marker-yv: yv-n
  - type: text
    text: 'of the subterranean deep cracked open and burst up through the ground. Heaven’s floodgates were opened, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is as though God returned the earth back to the chaos of ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '1'
      metadata:
        usfm: GEN.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . He once separated the waters and raised up the dry ground; now he was covering the earth again with water and removing the separation that he spoke into existence (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
