    - type: text
      text: Lev. 11:1–12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'both male and female, and one pair of all the unclean animals, both male and female. '
  - type: usfm
