    children:
    - type: text
      text: '5'
  - type: text
    text: 'Noah obeyed all that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' had commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Noah was six hundred years old when the great flood came on the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Noah and his wife and his sons and their wives boarded the ark to escape the flood. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'Two of each animal, the male and female, clean and unclean, large and small, along with birds and crawling things, entered the ark with Noah as God had commanded. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then seven days later, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: massive
  - type: text
    text: ' floodwaters covered the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'It started in the six hundredth year of Noah’s life, in the second month on the seventeenth day. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The exact date of the deluge is given, a miracle pointing to the divine inspiration of Scripture. God noted and had recorded the exact day the flood began. He gave us amazing details of these events as they happened. The flood began, according to the Jewish scribes, in the year 1656 from creation.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: On that day
  - type: text
    text: ', all the fountains '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word
    - type: usfm
