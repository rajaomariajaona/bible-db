    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: and heavy rains fell on the earth for forty days and forty nights.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God, at creation, had fixed a “boundary” for the waters (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 104:9
      metadata:
        usfm: PSA.104.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), setting doors and bars in place that the waters could not pass (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Job 38:8–11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Now he simply removed those restraints, and the waters gushed forth and flooded the earth as they had done at first (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 1:9
      metadata:
        usfm: GEN.1.9
    - type: usfm
      marker: ft
      children:
      - type: text
