    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'On that very day, Noah and his wife, their sons, Ham, Shem, and Japheth, and their wives, entered safely into the ark. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: 'Pairs of every species of animal entered with them—wild animals, domesticated animals, large and small, and every species of bird and winged creatures—every animal that has the breath of life came into the ark with Noah. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Both male and female went inside as God had commanded Noah; and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' himself shut them in.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Closing the door of the ark was a supernatural act of God. It was Elohim (“the Mighty One”) who commanded Noah to enter the ark, and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (the covenant-keeping God, the Friend of Sinners) who shut him in. The God of Israel is known by both names.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For forty days, the flood engulfed the earth. The swelling floodwaters lifted up the ark until it rose high above the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The '
  - type: usfm
    marker: it
    children:
    - type: text
      text: raging
  - type: text
    text: ' flood completely inundated the earth, but the ark floated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: safely
  - type: text
    text: ', drifting upon the surface of the water, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'until the highest mountains were completely submerged beneath the rising waters. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The waters rose over twenty-two feet '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fifteen cubits [22.5 feet; 6.86 meters].” Waters covered the earth at a depth of three miles above sea level. All the mountains of the pride of man were covered up. Who measured all these things? Who knew the mountains were covered by fifteen cubits? It could not have been Noah or Moses, unless God showed them. The amazing details of the account of the flood all point to the divine inspiration of Scripture.
    marker-yv: yv-n
  - type: text
    text: 'above the highest mountains. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This indicates a universal flood, not just a regional one. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
