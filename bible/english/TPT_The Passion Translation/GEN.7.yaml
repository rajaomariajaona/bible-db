    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Every living thing on the earth perished—domesticated animals, wild animals, birds, everything that moved on the earth, and all mankind perished. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Everything perished—every animal on earth with the breath of life in its nostrils died. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'All life on earth was blotted out—all that he had made, animals large and small, wild and domesticated, birds and reptiles, including humanity, was wiped off the face of the earth. Only Noah was left behind, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In the days of Noah, the wicked were taken away, swept off the earth by the flood. It was the righteous who were left behind to inherit the earth. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 24:37–41
      metadata:
        usfm: MAT.24.37+MAT.24.38+MAT.24.39+MAT.24.40+MAT.24.41
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 17:27
      metadata:
        usfm: LUK.17.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and those who were in the ark with him. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And the waters covered the earth for 150 days.
