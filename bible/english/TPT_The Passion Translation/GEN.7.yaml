document_id: GEN.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Great Flood
  - type: text
    content: The day came when
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to Noah, '
  - type: note
    content: How did God speak to Noah? Did he come in human form? Perhaps he appeared in a burning bush, or as an angel, or in a dream. God is able to speak in whatever way he chooses. We have a God who speaks to those whose ways are blameless. Noah moved with faith and acted on the revelation given to him. Do you respond when God speaks?
  - type: text
    content: '“Come '
  - type: note
    content: The implication is that God was in the ark waiting for Noah to enter and come to him. He has always gone before us and knows what we will face. This Hebrew word for “come” is used in contemporary Jewish weddings and songs—“come to me.”
  - type: text
    content: 'into the ark, you and your entire household, for I have found you to be the only one righteous in my eyes in this generation. '
  - type: note
    content: This statement shows that the sons of Seth could not rightly be called the sons of God (see Gen. 6:2), for only Noah was righteous. God needed Noah. There had to be a righteous man who would save mankind. When God comes down, he comes looking for human vessels he can use to bring deliverance and salvation (see 1 Sam. 16:7; 2 Chron. 16:9).
  '10':
  - type: text
    content: 'Then seven days later, '
  - type: text
    content: massive
  - type: text
    content: ' floodwaters covered the earth.'
  '11':
  - type: text
    content: 'It started in the six hundredth year of Noah’s life, in the second month on the seventeenth day. '
  - type: note
    content: The exact date of the deluge is given, a miracle pointing to the divine inspiration of Scripture. God noted and had recorded the exact day the flood began. He gave us amazing details of these events as they happened. The flood began, according to the Jewish scribes, in the year 1656 from creation.
  - type: text
    content: On that day
  - type: text
    content: ', all the fountains '
  - type: note
    content: The Hebrew word mayanot, or “fountains,” here has the same root as mayan in Song. 4:15. As our inward lives sprout and bring forth fruit, it has the power of a subterranean fountain.
  - type: text
    content: 'of the subterranean deep cracked open and burst up through the ground. Heaven’s floodgates were opened, '
  - type: note
    content: It is as though God returned the earth back to the chaos of ch. 1. He once separated the waters and raised up the dry ground; now he was covering the earth again with water and removing the separation that he spoke into existence (see Gen. 1:6–10).
  '12':
  - type: text
    content: and heavy rains fell on the earth for forty days and forty nights.
  - type: note
    content: God, at creation, had fixed a “boundary” for the waters (Ps. 104:9), setting doors and bars in place that the waters could not pass (see Job 38:8–11). Now he simply removed those restraints, and the waters gushed forth and flooded the earth as they had done at first (see Gen. 1:9). The floodgates of the heavens were similarly opened up.
  '13':
  - type: text
    content: 'On that very day, Noah and his wife, their sons, Ham, Shem, and Japheth, and their wives, entered safely into the ark. '
  '14':
  - type: text
    content: 'Pairs of every species of animal entered with them—wild animals, domesticated animals, large and small, and every species of bird and winged creatures—every animal that has the breath of life came into the ark with Noah. '
  '16':
  - type: text
    content: 'Both male and female went inside as God had commanded Noah; and '
  - type: text
    content: Yahweh
  - type: text
    content: ' himself shut them in.'
  - type: note
    content: Closing the door of the ark was a supernatural act of God. It was Elohim (“the Mighty One”) who commanded Noah to enter the ark, and Yahweh (the covenant-keeping God, the Friend of Sinners) who shut him in. The God of Israel is known by both names.
  '17':
  - type: text
    content: 'For forty days, the flood engulfed the earth. The swelling floodwaters lifted up the ark until it rose high above the ground. '
  '18':
  - type: text
    content: 'The '
  - type: text
    content: raging
  - type: text
    content: ' flood completely inundated the earth, but the ark floated '
  - type: text
    content: safely
  - type: text
    content: ', drifting upon the surface of the water, '
  '19':
  - type: text
    content: 'until the highest mountains were completely submerged beneath the rising waters. '
  '2':
  - type: text
    content: 'Take with you seven pairs of all the clean animals, '
  - type: note
    content: Seven pairs of clean animals (ritually acceptable) were spared so that Noah could use them for sacrifices. See Lev. 11:1–12.
  - type: text
    content: 'both male and female, and one pair of all the unclean animals, both male and female. '
  '20':
  - type: text
    content: 'The waters rose over twenty-two feet '
  - type: note
    content: Or “fifteen cubits [22.5 feet; 6.86 meters].” Waters covered the earth at a depth of three miles above sea level. All the mountains of the pride of man were covered up. Who measured all these things? Who knew the mountains were covered by fifteen cubits? It could not have been Noah or Moses, unless God showed them. The amazing details of the account of the flood all point to the divine inspiration of Scripture.
  - type: text
    content: 'above the highest mountains. '
  - type: note
    content: This indicates a universal flood, not just a regional one. See Ps. 104:6; 2 Peter 3:5–7.
  '21':
  - type: text
    content: 'Every living thing on the earth perished—domesticated animals, wild animals, birds, everything that moved on the earth, and all mankind perished. '
  '22':
  - type: text
    content: 'Everything perished—every animal on earth with the breath of life in its nostrils died. '
  '23':
  - type: text
    content: 'All life on earth was blotted out—all that he had made, animals large and small, wild and domesticated, birds and reptiles, including humanity, was wiped off the face of the earth. Only Noah was left behind, '
  - type: note
    content: In the days of Noah, the wicked were taken away, swept off the earth by the flood. It was the righteous who were left behind to inherit the earth. See Matt. 24:37–41; Luke 17:27.
  - type: text
    content: 'and those who were in the ark with him. '
  '24':
  - type: text
    content: And the waters covered the earth for 150 days.
  '3':
  - type: text
    content: 'Take seven pairs of flying birds of all kinds, male and female, to make sure they survive on the earth. '
  '4':
  - type: text
    content: 'For in seven days I will send rain and flood the earth for forty days and forty nights. '
  - type: note
    content: The number forty is a symbolic number in the Bible that represents testing and purification. See Ex. 16:35; Num. 14:34; Deut. 25:2–3; Jonah 3:4; Mark 1:13.
  - type: text
    content: Every living thing that I made I will wipe off the face of the earth.”
  - type: note
    content: In the days of Noah, the flood took away the wicked and left behind the righteous. See Matt. 24:37–41; Luke 17:27.
  '5':
  - type: text
    content: 'Noah obeyed all that '
  - type: text
    content: Yahweh
  - type: text
    content: ' had commanded him.'
  '6':
  - type: text
    content: 'Noah was six hundred years old when the great flood came on the earth. '
  '7':
  - type: text
    content: 'Noah and his wife and his sons and their wives boarded the ark to escape the flood. '
  '8':
  - type: text
    content: 'Two of each animal, the male and female, clean and unclean, large and small, along with birds and crawling things, entered the ark with Noah as God had commanded. '
