    - type: usfm
      marker: ft
      children:
      - type: text
        text: How did God speak to Noah? Did he come in human form? Perhaps he appeared in a burning bush, or as an angel, or in a dream. God is able to speak in whatever way he chooses. We have a God who speaks to those whose ways are blameless. Noah moved with faith and acted on the revelation given to him. Do you respond when God speaks?
    marker-yv: yv-n
  - type: text
    text: '“Come '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The implication is that God was in the ark waiting for Noah to enter and come to him. He has always gone before us and knows what we will face. This Hebrew word for “come” is used in contemporary Jewish weddings and songs—“come to me.”
    marker-yv: yv-n
  - type: text
    text: 'into the ark, you and your entire household, for I have found you to be the only one righteous in my eyes in this generation. '
