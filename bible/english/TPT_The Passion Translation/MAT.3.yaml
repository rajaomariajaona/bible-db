      - type: text
        text: 'Or “fulfill all righteousness [complete every righteous requirement].” This was the presentation of the Lamb of God as the sacrifice for sins. It was important that John publicly wash the Lamb of God and fulfill the requirements of the law, proving to Israel that the Lamb that was soon to be offered was spotless and without blemish. There are four baptisms in this chapter: (1) John baptizing with water, (2) Father God baptizing Jesus with the power of heaven, (3) Jesus will baptize believers with the same Holy Spirit, (4) the baptism of fire.'
    marker-yv: yv-n
  - type: text
