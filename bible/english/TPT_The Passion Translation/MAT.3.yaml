      - type: text
        text: There is an interesting word-play in the Hebrew and Aramaic that is lost in an English translation. The Hebrew words for sons (
    - type: usfm
      marker: it
      children:
      - type: text
        text: bĕnayyā
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and stones (
    - type: usfm
      marker: it
      children:
      - type: text
        text: ’abnayyā
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) are similar. God builds his house with sons, not stones. John baptized the people at the place of the crossing of the Jordan during the time of Joshua. After their miracle crossing of the Jordan they were instructed to set up twelve stones, representing the twelve sons of Israel, as a memorial. Perhaps John the Baptizer was referencing those very stones from which God could raise up sons.
    marker-yv: yv-n
