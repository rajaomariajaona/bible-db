        text: ', which is really a reference to a scorpion. When a male scorpion mates it quickly dies. The mother scorpion dies when giving birth, so every scorpion is born into this world as an orphan without the guidance of a set of parents. The dual meaning is simply this: The Pharisees were indeed cunning as vipers, but they were also spiritual orphans. John implied in using the word'
