    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus would have been about thirty years old, the age when Levitical priests were ordained and qualified to serve. This was his ordination as the High Priest over the household of faith. Jesus’ baptism was a form of dedication. Like Solomon, who dedicated the temple, John now dedicates the temple of Jesus’ body, the dwelling place of God. In a sense, John was the true high priest who was ordaining his replacement. Jesus was not repenting, but offering himself as God’s sinless Lamb.
