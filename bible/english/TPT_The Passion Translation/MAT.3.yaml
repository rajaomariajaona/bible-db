document_id: MAT.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptizer
  - type: text
    content: 'It was at this time that John the Baptizer '
  - type: note
    content: Or “John the Immerser.” The name John means “Yahweh has graced him.”
  - type: text
    content: 'began to preach in the desert of Judah. '
  - type: note
    content: This was the desert region west of the Dead Sea including the lower Jordan. The prophet John was of a priestly family and possibly a member of the Qumran community of the Essenes.
  - type: text
    content: 'His message was this: '
  '10':
  - type: text
    content: 'The axe '
  - type: note
    content: The “axe” becomes a metaphor of the word of truth that judges hearts and nations.
  - type: text
    content: 'is now ready to cut down the trees at their very roots. Every fruitless, rotten tree will be chopped down and thrown into the fire. '
  '11':
  - type: text
    content: 'Those who repent I baptize with water, but there is coming a man after me who is more powerful than I. In fact, I’m not even worthy enough to pick up his sandals. He will submerge you into union with the Spirit of Holiness and with a raging fire! '
  - type: note
    content: The text is somewhat ambiguous as to what fire is spoken of. Some see it as the fire of judgment, yet Jesus sent us the Holy Spirit, who baptized his church in fire at Pentecost. This last clause is a hendiadys and could be translated “He will baptize you in the raging fire of the Holy Spirit!”
  '12':
  - type: text
    content: 'He comes with a winnowing fork '
  - type: note
    content: This winnowing fork was like a pitchfork that would thresh grain by throwing it into the air so the wind could blow away the chaff.
  - type: text
    content: 'in his hands and comes to his threshing floor to sift what is worthless from what is pure. And he is ready to sweep out his threshing floor and gather his wheat into his granary, '
  - type: note
    content: See Isa. 41:15–16.
  - type: text
    content: but the straw he will burn up with a fire that can’t be extinguished!”
  '13':
  - type: text
    content: 'Then Jesus left Galilee to come to the Jordan to be baptized by John. '
  '14':
  - type: text
    content: But when he waded into the water, John resisted him, saying, “Why are you doing this? I’m the one who needs to be baptized by you, and yet you come to be baptized by me?”
  '15':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “It is only right to do all that God requires.”
  - type: text
    content: ' '
  - type: note
    content: 'Or “fulfill all righteousness [complete every righteous requirement].” This was the presentation of the Lamb of God as the sacrifice for sins. It was important that John publicly wash the Lamb of God and fulfill the requirements of the law, proving to Israel that the Lamb that was soon to be offered was spotless and without blemish. There are four baptisms in this chapter: (1) John baptizing with water, (2) Father God baptizing Jesus with the power of heaven, (3) Jesus will baptize believers with the same Holy Spirit, (4) the baptism of fire.'
  - type: text
    content: 'Then John baptized Jesus. '
  - type: note
    content: Jesus would have been about thirty years old, the age when Levitical priests were ordained and qualified to serve. This was his ordination as the High Priest over the household of faith. Jesus’ baptism was a form of dedication. Like Solomon, who dedicated the temple, John now dedicates the temple of Jesus’ body, the dwelling place of God. In a sense, John was the true high priest who was ordaining his replacement. Jesus was not repenting, but offering himself as God’s sinless Lamb.
  '16':
  - type: text
    content: 'And as '
  - type: note
    content: 'There are Latin manuscripts and external evidence dating to Jerome indicating that the Hebrew Matthew included this sentence: “A great light flashed from the water, so that all who had gathered there were afraid.” (Diatessaron and Romanos Melodos, First Hymn on the Epiphany, XVI.14.7–10.)'
  - type: text
    content: 'Jesus rose up out of the water, the heavenly realm opened up over him '
  - type: note
    content: See also Acts 7:56.
  - type: text
    content: 'and he saw the Holy Spirit descend out of the heavens and rest upon him in the form of a dove. '
  - type: note
    content: The dove is a symbol for both meekness and purity. Two gentle animals are pictured at the baptism of Jesus, a dove resting upon a lamb. If you want the presence of the Dove you need to have the nature of the Lamb. The implication is that the Holy Spirit came upon Jesus and never left him.
  '17':
  - type: text
    content: 'Then suddenly the voice of the Father shouted from the sky, saying, “This is my Son—the Beloved! '
  - type: note
    content: Jesus Christ is the Beloved referred to in the Song of Songs (Song. 1:13, 14; 2:3, 8, 9, 10; 6:10; 7:10).
  - type: text
    content: My greatest delight is in him.”
  - type: note
    content: 'Or “In him I find my delight.” See also Ps. 2:7; Isa. 42:1. The church historian Jerome affirms that additional words were spoken by the Father: “My Son, in all the prophets I was waiting for you, that you might come and I might rest in you. For you are my rest and my firstborn Son, who reigns forever!” (The Gospel of Matthew for the Hebrews and Commentary on Isaiah Chapter 4. Throckmorton: 14 fn. Nicholson: 43. OMG II: 156 et seq.)'
  '2':
  - type: text
    content: '“Heaven’s kingdom '
  - type: note
    content: Or “the kingdom realm of heaven.” The word heaven is found 238 times in the New Testament and hell 23 times.
  - type: text
    content: is about to appear—so you’d better keep turning away from evil and turn back to God!”
  - type: note
    content: Or “repent.” John was preaching in Aramaic, the language of the day. The word for “repent” in both Hebrew and Aramaic means “to return to God [and leave your sins behind].” This is much more than simply changing your mind; it is a powerful term for turning your life around and coming back to the holy God.
  '3':
  - type: text
    content: 'Isaiah was referring to John when he prophesied:'
  - type: text
    content: A thunderous voice! One will be crying out in the wilderness,
  - type: text
    content: “Prepare yourself for the Lord’s coming
  - type: text
    content: and level a straight path inside your hearts for him.”
  - type: note
    content: See Isa. 40:3, which is quoted in all four Gospels. The Aramaic has in place of Lord, “Lord Yahweh,” an obvious implication of the deity of Christ. Isaiah’s prophecy is more than a road-construction project. He uses the metaphor of clearing a path as a parable of cleansing our hearts and being prepared in our hearts to receive the Christ.
  '4':
  - type: text
    content: 'Now, John wore clothing made from camel’s hair, tied at his waist with a leather strap, and his food consisted of dried locusts '
  - type: note
    content: See Lev. 11:22; 2 Kings 1:8; Joel 1:4; Zech. 13:4; Mal. 4:5–6; Matt. 11:14.
  - type: text
    content: 'and wild honey. '
  '5':
  - type: text
    content: 'A steady stream of people from Jerusalem, all the surrounding countryside, '
  - type: note
    content: Or “Judea.”
  - type: text
    content: 'and the region near the Jordan came out to the wilderness to be baptized by him. '
  '6':
  - type: text
    content: And while they were publicly confessing their sins, he would immerse them in the Jordan River.
  '7':
  - type: text
    content: 'But when he saw many coming from among the wealthy elite of Jewish society '
  - type: note
    content: Or “the Sadducees.”
  - type: text
    content: 'and many of the religious leaders known as Pharisees '
  - type: note
    content: Or “separated ones.” The Pharisees and Sadducees were two of the sects of Judaism of that day.
  - type: text
    content: 'coming to witness the baptism, he began to denounce them, saying, “You offspring of vipers! '
  - type: note
    content: 'The word viper in the Aramaic is akidneh, which is really a reference to a scorpion. When a male scorpion mates it quickly dies. The mother scorpion dies when giving birth, so every scorpion is born into this world as an orphan without the guidance of a set of parents. The dual meaning is simply this: The Pharisees were indeed cunning as vipers, but they were also spiritual orphans. John implied in using the word akidneh that Abraham died giving them birth and they have lost his guidance. But if the Pharisees would only turn to their true loving Father, Elohim, they would no longer be orphans.'
  - type: text
    content: 'Who warned you '
  - type: text
    content: to slither away like snakes from the fire of God’s judgment
  - type: text
    content: '? '
  - type: note
    content: John is telling them they can’t escape the fire of judgment just by getting wet.
  '8':
  - type: text
    content: 'You must prove your repentance by a changed life. '
  '9':
  - type: text
    content: 'And don’t presume you can get away with merely saying to yourselves, ‘But we’re Abraham’s descendants!’ For I tell you, God can awaken these stones to become sons of Abraham! '
  - type: note
    content: There is an interesting word-play in the Hebrew and Aramaic that is lost in an English translation. The Hebrew words for sons (bĕnayyā) and stones (’abnayyā) are similar. God builds his house with sons, not stones. John baptized the people at the place of the crossing of the Jordan during the time of Joshua. After their miracle crossing of the Jordan they were instructed to set up twelve stones, representing the twelve sons of Israel, as a memorial. Perhaps John the Baptizer was referencing those very stones from which God could raise up sons.
