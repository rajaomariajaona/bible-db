      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'They left Egypt and went back home to their father Jacob in Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: it
    children:
    - type: text
      text: When they arrived
  - type: text
    text: ', they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ran to their father and
  - type: text
    text: ' announced, “Joseph is still alive! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Not only that
  - type: text
    text: ', he is the ruler of all Egypt!” The news so stunned Jacob that he nearly fainted. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 45:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
