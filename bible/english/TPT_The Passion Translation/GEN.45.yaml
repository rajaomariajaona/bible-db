  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“My brothers, you each can see for yourselves, and Benjamin can too, that I really am Joseph, for I’m speaking to you face-to-face in our own language. '
  - type: usfm
