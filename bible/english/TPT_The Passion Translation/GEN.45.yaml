    marker-yv: yv-n
  - type: text
    text: 'He could not believe his ears! '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But when they told him all that Joseph had said to them, and when he saw the wagons Joseph had sent to take him to Egypt, he recovered from the shock. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “My son Joseph is still alive!” Israel said. “Now I’m convinced! I must go to see him before I die.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 45:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Why did Joseph wait for nine years before he sent for his father Jacob? He could have sent chariots to Canaan before now, bringing his father to Egypt to share his wealth and power. Why did he wait so many years until now? Was it because he did not care? No, Joseph cared deeply for his family; something else kept him back. Joseph was a man who chose to bear the pain of separation from his father rather than run ahead of God. He was an enthroned prince, yet he placed God’s interests over his. He knew that the plan of God must be fulfilled, not just his own desires. So he waited and waited again. Instead of initiating contact with his father and brothers, he stayed within the timing of the Lord. Even when it was in his power, Joseph waited nine years before his loneliness was removed. The dreams of his youth included Jacob, his father, bowing before him also. More than anything else, Joseph longed to see his father, but for nine years he did nothing. Even when the time came, he himself did not go; he waited until the others brought Jacob back. He was restricted to the will of God. This is why Joseph was a ruler and a prince. If you are unable to rule yourself, you will not be a good ruler over others.
    marker-yv: yv-n
