  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Joseph threw his arms around Benjamin’s neck, sobbing, and Benjamin wept on Joseph’s neck. '
  - type: usfm
    marker: v
    metadata:
