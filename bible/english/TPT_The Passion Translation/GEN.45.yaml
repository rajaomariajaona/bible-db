  children:
  - type: text
    text: Pharaoh’s Invitation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The news reached Pharaoh’s house: “Joseph’s brothers have come.” Pharaoh and his officials were greatly pleased when they heard it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Pharaoh said to Joseph, “Tell your brothers: ‘Load your donkeys and return to Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Get your father and your families and come back to me. I will give you the best of the land in Egypt, and you will enjoy the fat of the land.’ '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tell them also: ‘Take Egyptian wagons with you for your wives and little ones and bring their father with them. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Give no thought to leaving your possessions behind; the best of all the land of Egypt will be yours.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Israel’s sons did as they were instructed. Joseph gave them wagons, as the king had ordered, and provided food for their journey. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'He gave each of them a set of garments, and to Benjamin he also gave three hundred pieces of silver and five sets of garments. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He sent his father ten donkeys loaded with the best Egyptian goods and ten female donkeys loaded with grain, bread, and other provisions for the journey. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then he sent his brothers off, admonishing them, “Don’t quarrel '
  - type: usfm
    marker: f
    children:
    - type: usfm
