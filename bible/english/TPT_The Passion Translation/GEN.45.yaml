    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 45:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: All that transpired that amazing day was a prophetic portrayal of the glorious reconciliation that one day will occur between Jesus and his alienated Jewish brothers (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
