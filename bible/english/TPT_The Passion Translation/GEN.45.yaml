  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You must tell father everything you have seen here and how greatly I am honored in Egypt. But hurry and bring my father here to me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
