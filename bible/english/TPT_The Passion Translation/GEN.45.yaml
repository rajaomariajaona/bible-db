segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph Reveals Himself to His Brothers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joseph could no longer contain his pent-up feelings, so he cried out to his attendants, “Leave the room!” So no one was there when Joseph revealed his identity to his brothers. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 45:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The family secret was a secret no more! Having held this secret for nearly a year, Joseph could contain himself no longer. He had to reveal himself to those he loved. All the Egyptians and the interpreter were ordered to leave. Joseph waited for the last Egyptian to file out of the room, then his long-buried emotions surfaced.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He began to weep so loudly that the Egyptians heard it—even as far away as Pharaoh’s house! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 45:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “[word] reached Pharaoh’s house.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Joseph, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: through his tears
  - type: text
    text: ', said to his brothers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in Hebrew
  - type: text
    text: ': “I am Joseph! Is father still alive?” His brothers stood there stunned, scared, and speechless.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Joseph said to his brothers, “Please, come close to me.” Inching forward, they came close to him. Then Joseph said, “It’s me—your brother—whom you sold into slavery in Egypt. I am Joseph! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now don’t be grieved. Don’t blame yourselves because you sold me here. It was God who sent me ahead of you in order to save lives. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The famine has now endured for two years, and the land will not bear fruit for five more years. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'God sent me ahead of you to ensure that you would live '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 45:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to preserve you for a remnant on earth.”
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: and have descendants
  - type: text
    text: '. He has saved your lives through this marvelous act of deliverance. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So it was God, not you, who sent me here. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 45:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joseph’s compassion for his brothers ran deep. For the third time, he told them that it was God, not they, who orchestrated all the events to bring him to the throne. Once painfully betrayed by them, Joseph now began to encourage his brothers. His words flowed from a loving, forgiving heart, and Joseph’s kindness washed over them. Their guilt was overruled by Joseph’s mercy. Through his tears, he convinced them not to dwell on their sin but on how God had worked through it all. Joseph had been sent by God ahead of them to preserve their lives. Though they did not realize it, Joseph’s brothers were helping the Lord fulfill his promise to Abraham (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 12:1–3
      metadata:
        usfm: GEN.12.1+GEN.12.2+GEN.12.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Today, we must learn to see that even those who hurt us the most may be those who move us toward the throne. If you see yourself in the hands of a loving God, not of others, you will not be offended. If Joseph’s brothers had not sold him into slavery, how would his dreams have been fulfilled? Some of your dreams will never come true until you can handle both mistreatment and betrayal with forgiving love (see
    - type: usfm
