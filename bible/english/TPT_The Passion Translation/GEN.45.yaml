      - type: text
        text: ). Through the last two thousand years, he has been unrecognizable to many of the Jewish people in his “gentile garb,” as it were. But one day the time will come when hearts will soften in repentance toward the Father and Jesus will reveal his full identity as their long-lost Jewish brother and Messiah. See
    - type: usfm
