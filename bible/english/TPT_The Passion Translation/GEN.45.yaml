type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph Reveals Himself to His Brothers
  - type: text
    content: 'Joseph could no longer contain his pent-up feelings, so he cried out to his attendants, “Leave the room!” So no one was there when Joseph revealed his identity to his brothers. '
  - type: note
    content: The family secret was a secret no more! Having held this secret for nearly a year, Joseph could contain himself no longer. He had to reveal himself to those he loved. All the Egyptians and the interpreter were ordered to leave. Joseph waited for the last Egyptian to file out of the room, then his long-buried emotions surfaced.
  '10':
  - type: text
    content: 'You will settle in the land of Goshen, '
  - type: note
    content: Goshen means “drawing near.” It was a fertile area in the eastern part of the Nile delta that today is called Wadi Tumilat. It was known as a place for grazing livestock (see Gen. 46:32–34; 47:6, 11). Joseph’s palace was apparently near Goshen.
  - type: text
    content: 'where you will be near me—you and all your children and your grandchildren, your flocks and herds and all that you possess. '
  '11':
  - type: text
    content: For there will be five more years of famine, but I will provide all that you need to live in Goshen. You, your household, and all that you have will not live in poverty.” ’
  '12':
  - type: text
    content: '“My brothers, you each can see for yourselves, and Benjamin can too, that I really am Joseph, for I’m speaking to you face-to-face in our own language. '
  - type: note
    content: Or “that it is my mouth that speaks with you.”
  '13':
  - type: text
    content: You must tell father everything you have seen here and how greatly I am honored in Egypt. But hurry and bring my father here to me.”
  '14':
  - type: text
    content: 'Then Joseph threw his arms around Benjamin’s neck, sobbing, and Benjamin wept on Joseph’s neck. '
  '15':
  - type: text
    content: 'With tears streaming down his face, Joseph kissed each brother, one by one. After '
  - type: text
    content: their tearful, emotional embrace
  - type: text
    content: ', they took time to speak brother-to-brother.'
  - type: note
    content: All that transpired that amazing day was a prophetic portrayal of the glorious reconciliation that one day will occur between Jesus and his alienated Jewish brothers (see Rom. 11:25; Eph. 4:18). Through the last two thousand years, he has been unrecognizable to many of the Jewish people in his “gentile garb,” as it were. But one day the time will come when hearts will soften in repentance toward the Father and Jesus will reveal his full identity as their long-lost Jewish brother and Messiah. See Rom. 9–11.
  - type: heading
    content: Pharaoh’s Invitation
  '16':
  - type: text
    content: 'The news reached Pharaoh’s house: “Joseph’s brothers have come.” Pharaoh and his officials were greatly pleased when they heard it.'
  '17':
  - type: text
    content: 'Pharaoh said to Joseph, “Tell your brothers: ‘Load your donkeys and return to Canaan. '
  '18':
  - type: text
    content: 'Get your father and your families and come back to me. I will give you the best of the land in Egypt, and you will enjoy the fat of the land.’ '
  '19':
  - type: text
    content: 'Tell them also: ‘Take Egyptian wagons with you for your wives and little ones and bring their father with them. '
  '2':
  - type: text
    content: 'He began to weep so loudly that the Egyptians heard it—even as far away as Pharaoh’s house! '
  - type: note
    content: Or “[word] reached Pharaoh’s house.”
  '20':
  - type: text
    content: Give no thought to leaving your possessions behind; the best of all the land of Egypt will be yours.’ ”
  '21':
  - type: text
    content: 'Israel’s sons did as they were instructed. Joseph gave them wagons, as the king had ordered, and provided food for their journey. '
  '22':
  - type: text
    content: 'He gave each of them a set of garments, and to Benjamin he also gave three hundred pieces of silver and five sets of garments. '
  '23':
  - type: text
    content: 'He sent his father ten donkeys loaded with the best Egyptian goods and ten female donkeys loaded with grain, bread, and other provisions for the journey. '
  '24':
  - type: text
    content: 'Then he sent his brothers off, admonishing them, “Don’t quarrel '
  - type: note
    content: Or “be trembling [with anxiety].”
  - type: text
    content: along the way.” And they departed.
  '25':
  - type: text
    content: 'They left Egypt and went back home to their father Jacob in Canaan. '
  '26':
  - type: text
    content: When they arrived
  - type: text
    content: ', they '
  - type: text
    content: ran to their father and
  - type: text
    content: ' announced, “Joseph is still alive! '
  - type: text
    content: Not only that
  - type: text
    content: ', he is the ruler of all Egypt!” The news so stunned Jacob that he nearly fainted. '
  - type: note
    content: Or “his heart was numb.”
  - type: text
    content: 'He could not believe his ears! '
  '27':
  - type: text
    content: 'But when they told him all that Joseph had said to them, and when he saw the wagons Joseph had sent to take him to Egypt, he recovered from the shock. '
  '28':
  - type: text
    content: “My son Joseph is still alive!” Israel said. “Now I’m convinced! I must go to see him before I die.”
  - type: note
    content: Why did Joseph wait for nine years before he sent for his father Jacob? He could have sent chariots to Canaan before now, bringing his father to Egypt to share his wealth and power. Why did he wait so many years until now? Was it because he did not care? No, Joseph cared deeply for his family; something else kept him back. Joseph was a man who chose to bear the pain of separation from his father rather than run ahead of God. He was an enthroned prince, yet he placed God’s interests over his. He knew that the plan of God must be fulfilled, not just his own desires. So he waited and waited again. Instead of initiating contact with his father and brothers, he stayed within the timing of the Lord. Even when it was in his power, Joseph waited nine years before his loneliness was removed. The dreams of his youth included Jacob, his father, bowing before him also. More than anything else, Joseph longed to see his father, but for nine years he did nothing. Even when the time came, he himself did not go; he waited until the others brought Jacob back. He was restricted to the will of God. This is why Joseph was a ruler and a prince. If you are unable to rule yourself, you will not be a good ruler over others.
  '3':
  - type: text
    content: 'Joseph, '
  - type: text
    content: through his tears
  - type: text
    content: ', said to his brothers '
  - type: text
    content: in Hebrew
  - type: text
    content: ': “I am Joseph! Is father still alive?” His brothers stood there stunned, scared, and speechless.'
  '4':
  - type: text
    content: 'Joseph said to his brothers, “Please, come close to me.” Inching forward, they came close to him. Then Joseph said, “It’s me—your brother—whom you sold into slavery in Egypt. I am Joseph! '
  '5':
  - type: text
    content: 'Now don’t be grieved. Don’t blame yourselves because you sold me here. It was God who sent me ahead of you in order to save lives. '
  '6':
  - type: text
    content: 'The famine has now endured for two years, and the land will not bear fruit for five more years. '
  '7':
  - type: text
    content: 'God sent me ahead of you to ensure that you would live '
  - type: note
    content: Or “to preserve you for a remnant on earth.”
  - type: text
    content: and have descendants
  - type: text
    content: '. He has saved your lives through this marvelous act of deliverance. '
  '8':
  - type: text
    content: 'So it was God, not you, who sent me here. '
  - type: note
    content: Joseph’s compassion for his brothers ran deep. For the third time, he told them that it was God, not they, who orchestrated all the events to bring him to the throne. Once painfully betrayed by them, Joseph now began to encourage his brothers. His words flowed from a loving, forgiving heart, and Joseph’s kindness washed over them. Their guilt was overruled by Joseph’s mercy. Through his tears, he convinced them not to dwell on their sin but on how God had worked through it all. Joseph had been sent by God ahead of them to preserve their lives. Though they did not realize it, Joseph’s brothers were helping the Lord fulfill his promise to Abraham (see Gen. 12:1–3). Today, we must learn to see that even those who hurt us the most may be those who move us toward the throne. If you see yourself in the hands of a loving God, not of others, you will not be offended. If Joseph’s brothers had not sold him into slavery, how would his dreams have been fulfilled? Some of your dreams will never come true until you can handle both mistreatment and betrayal with forgiving love (see Mark 11:25; Luke 23:34).
  - type: text
    content: God has made me a father to Pharaoh, the master of his entire household, and the ruler over all of Egypt.
  '9':
  - type: text
    content: '“Hurry back to my father '
  - type: text
    content: and tell him that you have found me alive
  - type: text
    content: '. Tell him, ‘This is what your son Joseph says, “God has made me ruler '
  - type: note
    content: The brothers once asked in Gen. 37:8, “Do you actually think you’re destined to rule over us?” Joseph’s words, no doubt, would have reminded them of their question.
  - type: text
    content: 'of all Egypt. Come to me without delay. '
