document_id: GEN.22,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Tests Abraham’s Faith
  - type: text
    content: Some time later, God tested Abraham.
  - type: note
    content: See Heb. 11:17–19. A new revelation (seeing God as El Olam) will always bring a new test. There is no indication that Abraham knew he was being tested. The word for “tested” is most commonly translated “proved.” The purpose of God’s tests are not so that we will fail, but that he will prove that we are faithful. The Midrash shows the word for “tested” is derived etymologically from a word that means “[elevated] banner,” like a flag flying high above a ship or a victory banner elevated over an army. This means that God elevated Abraham and made him great by testing—test upon test, greatness after greatness. He does the same thing today with the spiritual seed of Abraham. We all want Abraham’s faith, but do we want Abraham’s trial to perfect our faith? Tests are God’s vote of confidence in our future. The budding qualities of Christlikeness are brought forth in every test of our faith. Someday, you may call a “blessing” what you once called a “burden.”
  - type: text
    content: He said, “Abraham!”
  - type: note
    content: God had spoken many, many times to Abraham. Perhaps this time he spoke by an audible voice or by a dream.
  - type: text
    content: “Yes, I’m here,” Abraham answered.
  '10':
  - type: text
    content: 'Then Abraham took the knife in his hand to plunge it into his son, '
  '11':
  - type: text
    content: 'but the angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' called to him from heaven, saying, “Abraham! Abraham!”'
  - type: text
    content: “Yes, I’m here,” he answered.
  '12':
  - type: text
    content: '“Do not lay a hand on the boy or harm him,” he said, “for now, I know you are fully dedicated to me, '
  - type: note
    content: Or “that you fear God.”
  - type: text
    content: 'since you did not withhold your son, your beloved son, '
  - type: note
    content: As translated from the Septuagint. The Hebrew is “your only son.”
  - type: text
    content: from me.”
  '13':
  - type: text
    content: 'As Abraham looked up, his eyes fell upon a ram caught by its horns in a nearby thicket. Abraham took the ram and sacrificed it on the altar as a burnt offering in Isaac’s place. '
  - type: note
    content: The ram caught in the thicket is a picture of Christ, who was “caught in the thicket” of our sins. Here we have the doctrine of substitution. Christ became our Substitute, just as the ram became a substitute for Isaac. See Isa. 52:13–53:12; Matt. 20:28; John 6:51; 10:11–18; 11:50–52; 15:13; Rom. 4:25; 5:6–8; 14:15; 1 Cor. 15:3; 2 Cor. 5:14–21; Heb. 2:9–18.
  '14':
  - type: text
    content: 'So Abraham named that place '
  - type: text
    content: Yahweh
  - type: text
    content: ' Appears. '
  - type: note
    content: Or “Yahweh Sees [to it]” or “Yahweh Provides.” However, the verb in the descriptive clause is pointed, or can be translated as a passive, reading “Yahweh Appears.” Also, the Septuagint renders it “On the mount the Lord appears.”
  - type: text
    content: 'Even to this day, it is said, “On '
  - type: text
    content: Yahweh
  - type: text
    content: ’s Mountain there is vision.”
  - type: note
    content: Or “On Yahweh’s mountain there is vision.” On Yahweh’s mountain (Golgotha) we see clearly the vision of God placing our sins upon his Son. Our salvation is already provided for us through the blood of Jesus’ cross. Solomon’s Temple was built on Moriah (see 2 Chron. 3:1). This was also the site where David purchased Araunah’s threshing floor (see 2 Sam. 24; 1 Chron. 21).
  '15':
  - type: text
    content: Yahweh
  - type: text
    content: '’s angel spoke a second time from heaven:'
  '16':
  - type: text
    content: “ ‘I solemnly promise you,
  - type: text
    content: 'by '
  - type: text
    content: the glory
  - type: text
    content: ' of my own name,’ decrees '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: ‘because you have obeyed my voice
  - type: text
    content: 'and did not withhold from me your son—your beloved son '
  - type: note
    content: There is a hint in the test of Abraham offering his son that one day God would require a human sacrifice to take away the sins of the world. See Rom. 8:32.
  - type: text
    content: —
  - type: text
    content: I will greatly bless you!
  - type: text
    content: I will make sure your seed becomes as numerous
  - type: text
    content: as the stars of heaven and as the sand of the seashore.
  - type: text
    content: Your offspring will take possession of the city gates of their enemies.
  - type: note
    content: “Tak[ing] possession of the city gates of their enemies” is a figurative expression that refers to conquering, defeating, and taking possession of the enemy’s city. Here, it means simply that the seed of Abraham will have great authority to conquer cities.
  '18':
  - type: text
    content: Because you have obeyed me,
  - type: text
    content: the entire world will be blessed through your seed.’ ”
  - type: note
    content: The “seed” has his life, his life of faith.
  '19':
  - type: text
    content: 'So Abraham '
  - type: text
    content: and Isaac
  - type: text
    content: ' returned to the waiting servants, and they departed for Beersheba, where Abraham had settled.'
  - type: note
    content: 'Behind the testing of Abraham lies the wisdom of God. Notice these four divine principles of God’s tests: (1) When God tests us, his requirements of us often make no sense at the time. Therefore, faith is needed. Faith yields to God, even when it does not make sense. (2) Faith is never brought to maturity without a measure of suffering attached. Even Jesus was made perfect through sufferings (see Acts 14:22; Heb. 2:10; 5:8). Faith will carry you through even the most severe trial. (3) We must obey the Holy Spirit even before we know all the details of what is involved. We must be willing to not know where God is taking us. Obedience is always one moment, one step at a time. (4) Others may not be permitted to know what God is doing with us. Abraham left the two servants behind, he left Sarah behind, and only he, Isaac, and God would see this test. Often, God will bring you to a lonely place where others cannot intrude; they wouldn’t understand anyway!'
  - type: heading
    content: The Children of Nahor
  '2':
  - type: text
    content: 'God said, “Please '
  - type: note
    content: “Please (Hb. na’) take your son.” God’s merciful, understanding heart is seen by the word “please.”
  - type: text
    content: 'take your son, your only son, Isaac, whom '
  - type: text
    content: I know
  - type: text
    content: ' you dearly love, '
  - type: note
    content: As every detail of God’s instruction was revealed, Abraham’s task became more and more challenging. Ishmael was his only son with Hagar, but when God spoke Isaac’s name, Abraham’s heart sank. Then, God added “whom I know you dearly love.” What a test this was of our father of faith, Abraham! Early Jewish tradition holds that Abraham concealed this encounter with God from Sarah so that she would not hinder him from doing as God commanded. See Josephus, Ant. 1.12.2.
  - type: text
    content: 'and go to the land of Moriah. '
  - type: note
    content: Moriah means “chosen by Yahweh” and comes from a root word meaning “sight” or “vision.” Abraham was told to go to the mountain of Clear Vision. Moriah is inside the city walls of modern Jerusalem and is part of the historic site of the Temple Mount. The temple of the Lord will always be built at the place of sacrifice.
  - type: text
    content: 'Offer him up to me as a burnt offering on one of the mountains which I will show you.” '
  '20':
  - type: text
    content: Some time later Abraham heard the news, “
  - type: text
    content: You’re an uncle!
  - type: text
    content: ' Milcah and your brother Nahor have eight sons: Uz, their firstborn, Buz '
  - type: note
    content: Buz means “contempt” and is mentioned in Jer. 25:23. Elihu, Job’s fourth friend, was called a “Buzite” (Job 32:2).
  - type: text
    content: 'his brother, Kemuel the father of Aram, '
  - type: note
    content: Aram was the ancestor of the Syrians.
  - type: text
    content: 'Chesed, '
  - type: note
    content: Chesed means “increase” and is thought to be the name from which his eponymous ancestors, the Chaldeans (Hb. kasdim), got their name.
  - type: text
    content: 'Hazo, '
  - type: note
    content: The name Hazo means “vision” and was found in an ancient inscription. Hazo possibly represents the Hazu region in northern Arabia, known from the records of Esarhaddon’s campaigns. Uz, Buz, and Hazo likely settled in the land north of Edom.
  - type: text
    content: 'Phildash, Jidlaph, and Bethuel the father of Rebekah.” '
  - type: note
    content: Rebekah was the wife-to-be of Isaac. Her name is derived from a Hebrew root meaning “to loop a cord over the head of a lamb or kid”; thus, some etymologists define the meaning of her name as “captivating [beauty]” or “beauty that ensnares.”
  '24':
  - type: text
    content: 'Moreover, Nahor had another wife, '
  - type: note
    content: Or “concubine,” a term referring to a wife with secondary status in the family. She may have been either taken as a captive in war or purchased. Wives taken as captives in war were given certain protection from exploitation (see Deut. 21:10–17). This list contains the names of twelve Aramaean tribes traced to Nahor, the same number associated with Ishmael (see Gen. 25:13–15) and Jacob (see Gen. 49).
  - type: text
    content: 'Reumah, who also had four sons: Tebah, Gaham, Tahash, and Maacah.'
  '3':
  - type: text
    content: Early the next morning, Abraham cut the wood for the burnt offering, loaded it on his donkey, and set out for the distant place God had shown him. He took with him two of his servants, and his son Isaac.
  '4':
  - type: text
    content: 'On the third day, '
  - type: note
    content: So many wonderful things happen “on the third day.” See Hos. 6:2; Matt. 12:40; Luke 18:33; John 2:1; 1 Cor. 15:4. Keep in mind, a journey like this would have been difficult for an aged man. Think about what heart-breaking agony he must have endured for these three days. Truly, Abraham is “the father of faith” (Rom. 4:11–24).
  - type: text
    content: 'Abraham looked up and saw the place in the distance. '
  '5':
  - type: text
    content: '“Stay here with the donkey,” Abraham told the young men. “Isaac '
  - type: note
    content: Or “The boy,” a noun that encompasses a wide age range from infancy to young adulthood. Scholars speculate Isaac’s age at this time as around twenty; however, Josephus, the Jewish historian, has his age at twenty-five (Ant. 1.13.2), while others calculate he was thirty-seven.
  - type: text
    content: 'and I will go up and worship; '
  - type: note
    content: 'This is the first use of the Hebrew word for worship (shachah) in the Bible. Abraham freely offered his beloved son to God and called it worship. True worship always involves a sacrifice. The first reference in the New Testament to worship is found with men bowing down before a child and offering sacrificial gifts to Jesus—gold, frankincense, and myrrh. The biblical concept of worship includes freely bowing down before God, bringing our gifts (sacrifices of praise) to honor and adore him. The Hebrew language has meaning attached to every letter, not just every word. Often, the meaning of the word is the combination of the meaning of each individual letter. For example, the Hebrew word for “worship” (shachah) means “to bow down in adoration.” It’s the combination of only three letters in Hebrew: shin-chet-hei. Shin = “fiery passion.” Chet = “joining with God in a secret place or bridal chamber.” Hei = “in the presence of God.” Thus, worship could be defined as “experiencing God’s fiery passion as we come into his presence in the bridal chamber.” See Scherman, Nosson/Zlotowitz, Meir, Rabbis: Wisdom in the Hebrew Alphabet, 1988, p. 88.'
  - type: text
    content: 'then we '
  - type: note
    content: Notice the faith of Abraham. He knew that God, if he had to, would resurrect Isaac so that both Isaac and his father would return to where they left the servants. See Rom. 4:20–21; Heb. 11:17–19.
  - type: text
    content: 'will return to you.” '
  '6':
  - type: text
    content: 'So Abraham took the wood for the burnt offering and placed it on Isaac’s back. '
  - type: note
    content: Isaac carrying the wood foreshadowed Christ carrying his cross. See John 19:17; Phil. 2:5–8.
  - type: text
    content: 'Abraham carried the knife and the fire, '
  - type: note
    content: That is, a “fire [stone],” most likely a flint rock to strike and build a fire.
  - type: text
    content: and the two of them walked up the mountain together.
  '7':
  - type: text
    content: “Father?” Isaac broke the silence.
  - type: text
    content: “Yes, my son,” Abraham replied.
  - type: text
    content: “We have the wood and the fire,” Isaac said, “but where is the lamb for the burnt offering?”
  '8':
  - type: text
    content: 'Abraham answered, “My son, God himself will provide '
  - type: note
    content: Or “God will see for himself.”
  - type: text
    content: the lamb for an offering.” So they went on together.
  '9':
  - type: text
    content: 'When they arrived at the place '
  - type: text
    content: on Mount Moriah
  - type: text
    content: ' that God had shown him, Abraham built an altar and stacked the wood on it. He tied up his son Isaac and laid him on top of the wood on the altar. '
