          text: 'Behind the testing of Abraham lies the wisdom of God. Notice these four divine principles of God’s tests: (1) When God tests us, his requirements of us often make no sense at the time. Therefore, faith is needed. Faith yields to God, even when it does not make sense. (2) Faith is never brought to maturity without a measure of suffering attached. Even Jesus was made perfect through sufferings (see'
