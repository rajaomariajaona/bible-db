        children:
        - type: text
          text: ). Faith will carry you through even the most severe trial. (3) We must obey the Holy Spirit even before we know all the details of what is involved. We must be willing to not know where God is taking us. Obedience is always one moment, one step at a time. (4) Others may not be permitted to know what God is doing with us. Abraham left the two servants behind, he left Sarah behind, and only he, Isaac, and God would see this test. Often, God will bring you to a lonely place where others cannot intrude; they wouldn’t understand anyway!
