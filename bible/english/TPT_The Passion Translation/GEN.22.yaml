        - type: text
          text: . A new revelation (seeing God as El Olam) will always bring a new test. There is no indication that Abraham knew he was being tested. The word for “tested” is most commonly translated “proved.” The purpose of God’s tests are not so that we will fail, but that he will prove that we are faithful. The Midrash shows the word for “tested” is derived etymologically from a word that means “[elevated] banner,” like a flag flying high above a ship or a victory banner elevated over an army. This means that God elevated Abraham and made him great by testing—test upon test, greatness after greatness. He does the same thing today with the spiritual seed of Abraham. We all want Abraham’s faith, but do we want Abraham’s trial to perfect our faith? Tests are God’s vote of confidence in our future. The budding qualities of Christlikeness are brought forth in every test of our faith. Someday, you may call a “blessing” what you once called a “burden.”
      marker-yv: yv-n
