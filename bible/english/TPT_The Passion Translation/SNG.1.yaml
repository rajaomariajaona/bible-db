document_id: SNG.1,1849
type_code: eng
verses:
  '1':
  - type: text
    content: The most amazing song of all, by King Solomon.
  - type: heading
    content: The Shulamite The word for “Shulamite” and the word for “Solomon” are taken from the same Hebrew root word; one is masculine, the other feminine. The name Solomon occurs seven times in this book, which points us to the perfect King, Jesus Christ. We are one spirit with our King, united with him. You and I have become the Shulamite.
  '10':
  - type: text
    content: Your tender cheeks are beautiful
  - type: text
    content: ' '
  - type: note
    content: Her cheeks represent her emotions, revealed by her countenance. Her emotional life is alive and pleasing to the king.
  - type: text
    content: —
  - type: text
    content: your earrings and gem-laden necklaces
  - type: note
    content: Or “your neck is beautiful with strings of jewels.” The ornaments upon her point us to the gifts and graces of the Holy Spirit. Your adornments are on the inside (1 Peter 3:3–4).
  - type: text
    content: set them ablaze.
  '11':
  - type: text
    content: We will
  - type: text
    content: ' '
  - type: text
    content: enhance your beauty
  - type: text
    content: ','
  - type: note
    content: This is possibly the Trinity (“we”), which will be involved in making every Shulamite holy and radiant.
  - type: text
    content: with golden ornaments studded with silver.
  - type: note
    content: Gold always points us to the divine. God’s golden love and grace adorn her now with beauty. The concept of silver in the Bible always points to redemption, the price paid to set us free. The cross is a “stud of silver” planted into Calvary’s hill that opened the grace fountain for all the world to drink from.
  - type: heading
    content: The Shulamite
  '12':
  - type: text
    content: As the king surrounded me at his table,
  - type: note
    content: This points to our enjoyment of the Lord as we have communion at the Lord’s Table.
  - type: text
    content: the sweet fragrance of spikenard
  - type: note
    content: See Mark 14:1–11; John 12:1–11.
  - type: text
    content: awakened the night.
  '13':
  - type: text
    content: A sachet of myrrh is my lover,
  - type: text
    content: 'like a tied-up bundle of myrrh '
  - type: note
    content: This tied-up bundle of myrrh is an incredible picture of the cross. Myrrh, known as an embalming spice, was always associated with suffering. The suffering love of Jesus would be over the Shulamite’s heart for the rest of her days. We have the revelation of our Beloved tied onto the cross like a bundle of myrrh.
  - type: text
    content: resting over my heart.
  '14':
  - type: text
    content: He is like a bouquet of henna blossoms—
  - type: text
    content: henna plucked near the vines at the fountain of the Lamb.
  - type: note
    content: Or “at En-gedi.” En-gedi means “fountain of the Lamb.” The Hebrew word for “henna” has a homonym that can mean “atonement” or “redeeming grace.”
  - type: text
    content: I will hold him and never let him part.
  - type: heading
    content: The Shepherd-King
  '15':
  - type: text
    content: My darling,
  - type: text
    content: you are so lovely!
  - type: text
    content: You are beauty itself
  - type: text
    content: ' '
  - type: note
    content: The Hebrew word for “beautiful,” yāpāh, is used five times to describe the Shulamite, and three times she is called hayyāpāh bannāšîm (the most beautiful of women). Eight times her beauty is extolled. Eight is the number for new creation life. Hebrew linguists link this word for “beauty” to yapha’, which means “to radiate,” “to burst forth,” or “to emerge from darkness to project beauty.” It is also related to the word yaphat, which means “to create a sense of awe and wonder” or “to be something special.” When we trace this word yāpāh to its Semitic roots, we find it has the idea of a specialness or a uniqueness.
  - type: text
    content: to me.
  - type: text
    content: Your passionate eyes are like gentle doves.
  - type: note
    content: The Hebrew text literally means “Your eyes are doves.” Some see this as a hypocorism, but the dove points us to the Holy Spirit. She is commended for seeing him with spiritual revelation as she perceives the glory of the cross with its “myrrh” (see footnote on v. 13).
  - type: heading
    content: The Shulamite
  '16':
  - type: text
    content: My beloved one,
  - type: note
    content: The Hebrew word dôḏî, usually translated “beloved,” is taken from a root word that means “to boil.” The implication is that the beloved causes her heart to boil over with passion. In Matt. 3:17, the Father reveals his Son as “the Beloved.” Paul likewise describes him as “the Beloved” (Eph. 1:6).
  - type: text
    content: both handsome and winsome,
  - type: text
    content: you are pleasing beyond words.
  - type: text
    content: 'Our resting place '
  - type: note
    content: Or “canopied bed” or “luxuriant couch.”
  - type: text
    content: is anointed and flourishing,
  - type: text
    content: like a green forest meadow bathed in light.
  '17':
  - type: text
    content: Rafters of cedar branches are over our heads
  - type: text
    content: and balconies of pleasant-smelling pines.
  - type: note
    content: Or “cypresses.” Cedar and cypress were the two most common woods used in the construction of Solomon’s Temple.
  '2':
  - type: text
    content: 'Let him '
  - type: note
    content: To enter the doorway of Jesus’ heart we must begin by saying, “Let him.” We only bring him a yielded heart and must “let him” do the rest. God’s loving grace means that he will be enough for us. We can “let him” be everything to us. We don’t begin by doing but by yielding.
  - type: text
    content: smother me with kisses—his Spirit-kiss divine.
  - type: note
    content: This Spirit-kiss is what made Adam, the man of clay, into a living expression of God. Dust and deity met when the Maker kissed his Spirit-Wind into Adam. The Word of God is the kiss from the mouth of our Beloved, breathing upon us the revelation of his love. The Shulamite doesn’t ask him for power, position, or promotion, but for a kiss. Intimacy with Jesus Christ is more important than anything else he can give us.
  - type: text
    content: So kind are your caresses,
  - type: note
    content: Or “your breasts” or “your loves.” This speaks of his saving love, keeping love, forgiving love, and embracing love. The love of Jesus cannot be singular; it is so infinite it must be described in the plural.
  - type: text
    content: I drink them in like the sweetest wine!
  - type: note
    content: There is a wordplay in the Hebrew, similar to a pun. The word for “kisses” and the word for “take a drink [wine]” is nearly the same. The implication, as seen by ancient expositors, is that God’s lovers will be drunk with love, the intoxicating kisses of his mouth. The Hebrew word for “kiss” is nashaq, which can also mean “to equip” or “to arm (for battle).” We need his kisses to become equipped warriors for him.
  '3':
  - type: text
    content: Your presence releases a fragrance so pleasing—
  - type: text
    content: over and over poured out.
  - type: text
    content: For your lovely name is “Flowing Oil.”
  - type: note
    content: The Hebrew contains a wordplay with the words “name” (shem) and “oil” (shemen).
  - type: text
    content: No wonder the brides-to-be adore you.
  - type: note
    content: Because of the order of the consonants, some Jewish sources translate this as “The maidens love you unto death.” (See Goldin, Song, 116; J. Sason, “On Pope’s Song,” 191.)
  '4':
  - type: text
    content: Draw me into your heart.
  - type: text
    content: We will run away together into the king’s cloud-filled chamber.
  - type: note
    content: The Hebrew text literally means “the king’s chamber inside of a chamber.” This points us to the Holy of Holies inside the temple chamber.
  - type: heading
    content: The Chorus of Friends
  - type: text
    content: We will remember your love, rejoicing and delighting in you,
  - type: note
    content: The Hebrew word for “love” (ahav) is found seven times in the Song of Songs (1:3, 4, 7; 3:1, 2, 3, 4). The Hebrew root word for “rejoice” (gyl) is a homonym for “spinning in a circle or dance.” The implication is that we dance for joy when we remember his love.
  - type: text
    content: celebrating your every kiss as better than wine.
  - type: text
    content: No wonder righteousness adores you!
  - type: note
    content: The kiss of God pours out blessing over our hearts. It is the warmth of his love that convinces us that his heart is turned forever toward us. The most common word for worship in the New Testament is proskuneo, which means to fall on your knees before him to kiss him. Our worship, with deep affection, is his reward.
  - type: heading
    content: The Shulamite
  '5':
  - type: text
    content: Jerusalem maidens, in this twilight darkness
  - type: note
    content: Or “black.” The Hebrew root word used here for “black” or “dark” means “twilight darkness” or “morning gray.”
  - type: text
    content: I know I am so unworthy—so in need.
  - type: heading
    content: The Shepherd-King
  - type: text
    content: Yet you are so lovely!
  - type: heading
    content: The Shulamite
  - type: text
    content: I feel as dark and dry as the desert tents
  - type: text
    content: of the wandering nomads.
  - type: note
    content: Literally “dark as the tent curtains of Kedar.” There is a wordplay in the Hebrew, as the word Kedar means “a dark one” or “a dark place.” This was the name of one of the sons of Ishmael and represents our old Adam-life. See Ps. 120:5.
  - type: heading
    content: The Shepherd-King
  - type: text
    content: Yet you are so lovely—
  - type: text
    content: like the fine linen tapestry hanging in the Holy Place.
  - type: heading
    content: The Shulamite to Her Friends
  '6':
  - type: text
    content: Please don’t stare in scorn
  - type: text
    content: because of my dark and sinful ways.
  - type: note
    content: Or “Many morning suns have darkened [stared at] me.”
  - type: text
    content: My angry brothers quarreled with me
  - type: text
    content: and appointed me guardian of their ministry vineyards,
  - type: text
    content: yet I’ve not tended my vineyard within.
  '7':
  - type: text
    content: Won’t you tell me, lover of my soul,
  - type: text
    content: where do you feed your flock?
  - type: text
    content: Where do you lead your beloved ones
  - type: note
    content: She sees her beloved as a shepherd. This is a metaphor of the role he takes in her eyes. We need not develop a literal story line of a lover and a shepherd, but understand it as a representation of the relationship between us and our Beloved, which cannot be described by one symbol or role.
  - type: text
    content: to rest in the heat of the day?
  - type: text
    content: Why should I be like a veiled woman
  - type: text
    content: as I wander among the flocks of your shepherds?
  - type: note
    content: The Hebrew uses the verb ‘atah, which means “to wrap [cloak/veil].” The Aramaic and Latin Vulgate use the verb meaning “to wander.” This translation has included both concepts.
  - type: heading
    content: The Shepherd-King
  '8':
  - type: text
    content: Listen, my radiant one—
  - type: text
    content: if you ever lose sight of me,
  - type: text
    content: just follow in my footsteps where I lead my lovers.
  - type: text
    content: Come with your burdens and cares.
  - type: text
    content: Come to the place near the sanctuary of my shepherds.
  - type: note
    content: Or “graze your goats by the shepherds’ tents.” This is a metaphor that speaks of her responsibilities and labors.
  '9':
  - type: text
    content: My dearest one,
  - type: note
    content: Or “darling.” The Hebrew word r’yh is found ten times in the Bible and nine of them are in the Song of Songs. The Hebrew wordplay is seen in that the words for “tend the flock” and “darling” are homonyms.
  - type: text
    content: let me tell you how I see you—
  - type: text
    content: you are so thrilling to me.
  - type: text
    content: To gaze upon you is like looking
  - type: text
    content: at one of Pharaoh’s finest horses
  - type: text
    content: ' '
  - type: note
    content: The finest horses in Solomon’s stables were imported from Egypt. See 2 Chron. 1:14–17.
  - type: text
    content: —
  - type: text
    content: a strong, regal steed pulling his royal chariot.
