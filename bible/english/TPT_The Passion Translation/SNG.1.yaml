verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The most amazing song of all, by King Solomon.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Shulamite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word for “Shulamite” and the word for “Solomon” are taken from the same Hebrew root word; one is masculine, the other feminine. The name Solomon occurs seven times in this book, which points us to the perfect King, Jesus Christ. We are one spirit with our King, united with him. You and I have become the Shulamite.
      marker-yv: yv-n
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your tender cheeks are beautiful
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Her cheeks represent her emotions, revealed by her countenance. Her emotional life is alive and pleasing to the king.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: —
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: your earrings and gem-laden necklaces
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “your neck is beautiful with strings of jewels.” The ornaments upon her point us to the gifts and graces of the Holy Spirit. Your adornments are on the inside (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Peter 3:3–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: set them ablaze.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: We will
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: enhance your beauty
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ','
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is possibly the Trinity (“we”), which will be involved in making every Shulamite holy and radiant.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: with golden ornaments studded with silver.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gold always points us to the divine. God’s golden love and grace adorn her now with beauty. The concept of silver in the Bible always points to redemption, the price paid to set us free. The cross is a “stud of silver” planted into Calvary’s hill that opened the grace fountain for all the world to drink from.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Shulamite
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: As the king surrounded me at his table,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This points to our enjoyment of the Lord as we have communion at the Lord’s Table.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the sweet fragrance of spikenard
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 14:1–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 12:1–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: awakened the night.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: A sachet of myrrh is my lover,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'like a tied-up bundle of myrrh '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This tied-up bundle of myrrh is an incredible picture of the cross. Myrrh, known as an embalming spice, was always associated with suffering. The suffering love of Jesus would be over the Shulamite’s heart for the rest of her days. We have the revelation of our Beloved tied onto the cross like a bundle of myrrh.
      marker-yv: yv-n
    - type: text
      text: resting over my heart.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He is like a bouquet of henna blossoms—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: henna plucked near the vines at the fountain of the Lamb.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “at En-gedi.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: En-gedi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “fountain of the Lamb.” The Hebrew word for “henna” has a homonym that can mean “atonement” or “redeeming grace.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will hold him and never let him part.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The Shepherd-King
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: My darling,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: you are so lovely!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You are beauty itself
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “beautiful,”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: yāpāh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', is used five times to describe the Shulamite, and three times she is called'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hayyāpāh bannāšîm
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (the most beautiful of women). Eight times her beauty is extolled. Eight is the number for new creation life. Hebrew linguists link this word for “beauty” to
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: yapha’
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “to radiate,” “to burst forth,” or “to emerge from darkness to project beauty.” It is also related to the word'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: yaphat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “to create a sense of awe and wonder” or “to be something special.” When we trace this word'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: yāpāh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: to its Semitic roots, we find it has the idea of a specialness or a uniqueness.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to me.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your passionate eyes are like gentle doves.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text literally means “Your eyes are doves.” Some see this as a hypocorism, but the dove points us to the Holy Spirit. She is commended for seeing him with spiritual revelation as she perceives the glory of the cross with its “myrrh” (see footnote on v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Shulamite
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: My beloved one,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: dôḏî
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', usually translated “beloved,” is taken from a root word that means “to boil.” The implication is that the beloved causes her heart to boil over with passion. In'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the Father reveals his Son as “the Beloved.” Paul likewise describes him as “the Beloved” ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 1:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: both handsome and winsome,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you are pleasing beyond words.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Our resting place '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “canopied bed” or “luxuriant couch.”
      marker-yv: yv-n
    - type: text
      text: is anointed and flourishing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a green forest meadow bathed in light.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Rafters of cedar branches are over our heads
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and balconies of pleasant-smelling pines.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “cypresses.” Cedar and cypress were the two most common woods used in the construction of Solomon’s Temple.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Let him '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To enter the doorway of Jesus’ heart we must begin by saying, “Let him.” We only bring him a yielded heart and must “let him” do the rest. God’s loving grace means that he will be enough for us. We can “let him” be everything to us. We don’t begin by doing but by yielding.
      marker-yv: yv-n
    - type: text
      text: smother me with kisses—his Spirit-kiss divine.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This Spirit-kiss is what made Adam, the man of clay, into a living expression of God. Dust and deity met when the Maker kissed his Spirit-Wind into Adam. The Word of God is the kiss from the mouth of our Beloved, breathing upon us the revelation of his love. The Shulamite doesn’t ask him for power, position, or promotion, but for a kiss. Intimacy with Jesus Christ is more important than anything else he can give us.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So kind are your caresses,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “your breasts” or “your loves.” This speaks of his saving love, keeping love, forgiving love, and embracing love. The love of Jesus cannot be singular; it is so infinite it must be described in the plural.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I drink them in like the sweetest wine!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is a wordplay in the Hebrew, similar to a pun. The word for “kisses” and the word for “take a drink [wine]” is nearly the same. The implication, as seen by ancient expositors, is that God’s lovers will be drunk with love, the intoxicating kisses of his mouth. The Hebrew word for “kiss” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nashaq
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which can also mean “to equip” or “to arm (for battle).” We need his kisses to become equipped warriors for him.'
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Your presence releases a fragrance so pleasing—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: over and over poured out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your lovely name is “Flowing Oil.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew contains a wordplay with the words “name” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: shem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and “oil” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: shemen
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No wonder the brides-to-be adore you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Because of the order of the consonants, some Jewish sources translate this as “The maidens love you unto death.” (See Goldin, Song, 116; J. Sason, “On Pope’s Song,” 191.)
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Draw me into your heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We will run away together into the king’s cloud-filled chamber.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text literally means “the king’s chamber inside of a chamber.” This points us to the Holy of Holies inside the temple chamber.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Chorus of Friends
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We will remember your love, rejoicing and delighting in you,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “love” (
      - type: usfm
        marker: it
