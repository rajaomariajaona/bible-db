  - type: text
    text: Moving On into Full Maturity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'We have much to say about this topic although it is difficult to explain, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “We have so much more to say about Melchizedek, but his manifestation overwhelms us and makes it difficult to explain.”
    marker-yv: yv-n
  - type: text
    text: 'because you have become too dull and sluggish to understand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For you should already be professors instructing others by now; but instead, you need to be taught from the beginning the basics of God’s prophetic oracles! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the elements of the beginnings of the oracles of God.” That is, how Jesus is the substance and fulfillment of the oracles (message) of God.
    marker-yv: yv-n
  - type: text
    text: 'You’re like children '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:12
    - type: usfm
      marker: ft
