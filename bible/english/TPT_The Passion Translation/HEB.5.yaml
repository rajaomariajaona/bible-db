        usfm: PSA.110.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: a King-Priest forever!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'During Christ’s days on earth '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “During the days when Christ wore flesh.”
    marker-yv: yv-n
  - type: text
    text: 'he pleaded with God, praying with passion and with tearful agony that God would spare him from death. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, from a premature death in Gethsemane. The text clearly states that Jesus was spared from death. What death? He gave his life on the cross for us. This seems to reveal that Jesus prayed in the garden to be spared from death that night and live long enough to die on the cross, and not prematurely die in the garden. Most expositors believe this was the “cup” of God’s wrath that was the sin payment. Yet it is possible that the “cup” he was asking God to let pass from him was the cup of premature death in the garden, not the death he would experience the next day on the cross. He had already sweat drops of blood, but the prophecies had to be fulfilled of being pierced on a cross for our transgressions. God answered his cry and he lived through the agony of Gethsemane so that he could be our sacrifice for sin on Calvary. Jesus did not waver in the garden. We have a brave Savior! See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 18:11
      metadata:
        usfm: JHN.18.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'And because of his perfect devotion his prayer was answered and he was delivered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But even though he was a wonderful Son, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'he learned to listen '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word for obedience,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hupakoe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', means “to hearken” or “to listen for the knock on the door” or “to pay attention.” Also in v.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: HEB.5.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . (See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Strong’s Concordance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Gr. 5218 and 5219.) Jesus’ sufferings were seen as lessons of listening to and obeying God.'
    marker-yv: yv-n
  - type: text
    text: 'and obey through all his sufferings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And after being proven perfect in this way he has now become the source of eternal salvation to all those who listen to him and obey. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For God has designated him as the King-Priest who is over the priestly order of Melchizedek.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. Jesus, our magnificent King-Priest, has made us kings and priests that serve him and extend his kingdom on the earth. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
