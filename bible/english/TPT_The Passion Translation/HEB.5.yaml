document_id: HEB.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A King-Priest like Melchizedek
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'For every High Priest was chosen from among the people and appointed to represent them before God by presenting their gifts to God and offering sacrifices on their behalf. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Since the High Priest is also one who is clothed in weakness, he humbles himself '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. There is an alternate translation of the Aramaic which reads “He [Christ] humbled himself and took the sorrows of those who knew nothing and were lost, for he was also clothed in frailty [humanity].”
    marker-yv: yv-n
  - type: text
    text: 'by showing compassion to those who are ignorant of God’s ways and stray from them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And for this reason, he has to not only present the sin offerings of others, but also to bring a sin offering for himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And no one takes this honor upon himself by being self-appointed, but God is the one who calls each one, just as Aaron was called.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So also, Christ was not self-appointed and did not glorify himself by becoming a high priest, but God called and glorified him! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Apparently, many Jewish believers were having difficulty with Jesus being our High Priest, since he was not of Aaron’s lineage from the tribe of Levi. The Holy Spirit is showing us that his priesthood is not on the basis of lineage, but the supernatural calling of God, much like Melchizedek. The meaning of the name Melchizedek is “king of righteousness.”
    marker-yv: yv-n
  - type: text
    text: For the Father said to him,
- type: usfm
  marker: mi
  children:
  - type: text
    text: “You are my favored Son. Today I have fathered you.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Every day I beget you.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 2:7
      metadata:
        usfm: PSA.2.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: PSA.2.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 1:5
      metadata:
        usfm: HEB.1.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And in another Scripture he says about this new priestly order,
- type: usfm
  marker: mi
  children:
  - type: text
    text: '“You are a Priest like Melchizedek, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “in the succession of Melchizedek.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
