        text: are presented with third-person pronouns; however, it is not abstract truth, but spoken directly to Jesus’ disciples. This is why the translation is in the second person. The implication of this verse is that the poor in spirit have only one remedy, and that is trusting in God. This total reliance upon God is the doorway into the kingdom realm. Notice the obvious parallel between
