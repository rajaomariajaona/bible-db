  - type: text
    text: 'One day Jesus saw a vast crowd of people gathering to hear him, so he went up the slope of a hill and sat down. With his followers and disciples spread over the hillside, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jesus began to teach them:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It should be noted that
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Matt. 5–7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', commonly known as the Sermon on the Mount, is the messianic Torah (law or teaching) and the Constitution of the kingdom of heaven. Jesus begins with giving his followers a superior way to live than the Ten Commandments of Moses. It is a superior version of all that God expects and provides for those who yield to him. Jesus gives us more than laws; he gives us promises of power to fulfill all that he asks of us. The emphasis is not on outward duty but on the inward transformation of our hearts by grace. God’s kingdom is offered to those who will learn the ways of Christ and offer themselves to him in full surrender.'
    marker-yv: yv-n
