document_id: MAT.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus’ Sermon on the Hillside
  - type: text
    content: 'One day Jesus saw a vast crowd of people gathering to hear him, so he went up the slope of a hill and sat down. With his followers and disciples spread over the hillside, '
  '10':
  - type: text
    content: “How enriched you are when persecuted
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “being rejected.”
  - type: text
    content: for doing what is right!
  - type: text
    content: ' '
  - type: note
    content: See Ps. 38:20; Isa. 66:5; Acts 5:41; 1 Peter 3:14. The Hebrew Matthew is “for the Righteous One.”
  - type: text
    content: For then you experience the realm of heaven’s kingdom.
  '11':
  - type: text
    content: “How blessed you are when people insult
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “criticize you” (1 Peter 3:14; Acts 5:41). The Hebrew Matthew is “for the Righteous One.”
  - type: text
    content: and persecute you and speak all kinds of cruel lies about you because of your love for me!
  - type: text
    content: ' '
  - type: note
    content: See Ps. 119:85–87. We are to live in such a way that people have to lie when they speak evil of a believer in Christ.
  '12':
  - type: text
    content: So leap for joy—since your heavenly reward is great. For you are being rejected the same way the prophets were before you.
  '13':
  - type: text
    content: “Your lives are like salt among the people. But if you, like salt, become bland, how can your ‘saltiness’ be restored? Flavorless salt is good for nothing
  - type: text
    content: ' '
  - type: note
    content: 'Or “Salt that has lost its flavor is foolish.” Both Greek and Aramaic use a word that can mean either “good for nothing” or “foolish.” If salt that has lost its flavor is foolish, then salt that keeps its flavor is wise. Rabbinical literature equates salt with wisdom. After speaking of salt, Jesus speaks of lighting a lamp. It was a common practice in the time of Jesus to put salt on the wick of a lamp to increase its brightness. The “salt” of wisdom will make our lights shine even brighter. (Eduard Schweizer, The Good News According to Matthew, Atlanta: John Knox Press, 1975. W. A. Elwell and P. W. Comfort, Tyndale Bible Dictionary, Wheaton, Ill.: Tyndale House, Tyndale reference library, 2001, Lamp, Lampstand. 797–8.)'
  - type: text
    content: and will be thrown out and trampled on by others.
  '14':
  - type: text
    content: “Your lives light up the world. For how can you hide a city that stands on a hilltop?
  - type: text
    content: ' '
  - type: note
    content: See Isa. 49:6.
  '15':
  - type: text
    content: And who would light a lamp and then hide it in an obscure place?
  - type: text
    content: ' '
  - type: note
    content: Or “under a basket.”
  - type: text
    content: Instead, it’s placed where everyone in the house can benefit from its light.
  - type: text
    content: ' '
  '16':
  - type: text
    content: So don’t hide your light!
  - type: text
    content: ' '
  - type: note
    content: The Aramaic word for “light” (noohra) is often used as a metaphor for teachings that bring enlightenment and revelation into the hearts of men. Light can also represent the presence of God (“the light of his countenance”). Jesus is the light of God within us.
  - type: text
    content: Let it shine brightly before others, so that your commendable works
  - type: text
    content: ' '
  - type: note
    content: Light and works are intertwined. We need the light of Christ in order to do good works. Our good works are like light shining upon their hearts.
  - type: text
    content: will shine as light upon them, and then they will give their praise to your Father in heaven.”
  - type: heading
    content: Fulfillment of the Law
  '17':
  - type: text
    content: “If you think I’ve come to set aside the law of Moses or the writings of the prophets, you’re mistaken. I have come to bring to perfection all that has been written.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Indeed, I assure you, as long as heaven and earth endure, not even the smallest detail
  - type: text
    content: ' '
  - type: note
    content: Or “not even one letter or even a part of the letter of the law.”
  - type: text
    content: of the Law will be done away with until its purpose is complete.
  - type: text
    content: ' '
  - type: note
    content: Or “All its teachings come true.”
  '19':
  - type: text
    content: So whoever violates
  - type: text
    content: ' '
  - type: note
    content: Or “whoever loosens” (diminishes).
  - type: text
    content: even the least important of the commandments,
  - type: text
    content: ' '
  - type: note
    content: Or “these implanted goals.”
  - type: text
    content: and teaches others to do so, will be called least in heaven’s kingdom. But whoever obeys them and teaches their truths to others will be called great in heaven’s kingdom.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Jesus began to teach them:'
  - type: note
    content: It should be noted that Matt. 5–7, commonly known as the Sermon on the Mount, is the messianic Torah (law or teaching) and the Constitution of the kingdom of heaven. Jesus begins with giving his followers a superior way to live than the Ten Commandments of Moses. It is a superior version of all that God expects and provides for those who yield to him. Jesus gives us more than laws; he gives us promises of power to fulfill all that he asks of us. The emphasis is not on outward duty but on the inward transformation of our hearts by grace. God’s kingdom is offered to those who will learn the ways of Christ and offer themselves to him in full surrender.
  '20':
  - type: text
    content: For I tell you, unless your lives are more pure and full of integrity
  - type: text
    content: ' '
  - type: note
    content: Or “your deeds of righteousness.”
  - type: text
    content: than the religious scholars
  - type: text
    content: ' '
  - type: note
    content: Or “scribes,” who were considered to be the expert theologians of the Scriptures.
  - type: text
    content: and the Pharisees, you will never enter heaven’s kingdom.”
  - type: heading
    content: Anger
  '21':
  - type: text
    content: '“You’re familiar with the commandment taught to those of old: ‘Do not murder or you will be judged.’'
  - type: text
    content: ' '
  - type: note
    content: See Ex. 20:13; Deut. 5:17.
  '22':
  - type: text
    content: But I’m telling you, if you hold anger in your heart
  - type: text
    content: ' '
  - type: note
    content: Some manuscripts add, “without a cause.” See 1 John 3:15. Both Aramaic and Hebrew Matthew read “if you provoke a fellow believer to anger,” or “if you cause offense to the spirit of your brother.”
  - type: text
    content: toward a fellow believer, you are subject to judgment.
  - type: text
    content: ' '
  - type: note
    content: The implication is that you would be judged as a murderer. Anger and murder are equally odious in God’s eyes. Angry words kill.
  - type: text
    content: And whoever demeans and insults
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is raca and can mean “spittle” or “lunatic.” It is a word that could imply calling a fellow believer demon-possessed. The Greek is “worthless fool, imbecile.”
  - type: text
    content: a fellow believer is answerable to the congregation.
  - type: text
    content: ' '
  - type: note
    content: Or “council” (Sanhedrin).
  - type: text
    content: And whoever calls down curses upon a fellow believer
  - type: text
    content: ' '
  - type: note
    content: Or “whoever calls him a worthless fool.” It is a word that could imply calling a fellow believer demon-possessed.
  - type: text
    content: is in danger of being sent to a fiery hell.
  - type: note
    content: Or “the Gehenna of fire.” Gehenna, which was an actual place where garbage was burned outside of Jerusalem, became a figure of speech for hell in the days of Jesus. It used to be the site of child sacrifice to the god Molech. See 2 Chron. 33:6.
  '23':
  - type: text
    content: “So then, if you are presenting a gift before the altar and suddenly you remember a quarrel you have with a fellow believer,
  - type: text
    content: ' '
  '24':
  - type: text
    content: leave your gift there in front of the altar and go at once to apologize to the one who is offended. Then, after you have reconciled,
  - type: text
    content: ' '
  - type: note
    content: A true heart of repentance means attempting to heal severed relationships, not just empty words.
  - type: text
    content: come to the altar and present your gift.
  - type: text
    content: ' '
  '25':
  - type: text
    content: It is always better to come to terms with the one who wants to sue you before you go to trial, or you may be found guilty by the judge, and he will hand you over to the officers, who will throw you into prison.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Believe me, you won’t get out of prison until you have paid the full amount!”
  - type: heading
    content: Adultery
  '27':
  - type: text
    content: “Your ancestors have been taught, ‘Never commit adultery.’
  - type: text
    content: ' '
  - type: note
    content: See Ex. 20:14.
  '28':
  - type: text
    content: However, I say to you, if you look with lust in your eyes at a woman who is not your wife, you’ve already committed adultery in your heart.
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is speaking of more than adultery with a married woman; it uses the word for any sex act outside of marriage. Jesus elevates the standard of righteousness. He is holy, and when he comes to live within the believer, his holiness is the fulfillment of what God requires of us.
  '29':
  - type: text
    content: If your right eye seduces you to fall into sin,
  - type: text
    content: ' '
  - type: note
    content: The Greek word skandalizo means to “entice to sin,” “offend,” or “set a trap.”
  - type: text
    content: then go blind in your right eye!
  - type: text
    content: ' '
  - type: note
    content: Or “pluck out your eye and throw it away.”
  - type: text
    content: For you’re better off losing sight in one eye than to have your whole body thrown into hell.
  - type: text
    content: ' '
  '3':
  - type: text
    content: “What happiness comes to you
  - type: text
    content: ' '
  - type: note
    content: Or, “Blessed are they.” The Aramaic word toowayhon means “enriched, happy, fortunate, delighted, blissful, content, blessed.” Our English word blessed can indeed fit here, but toowayhon implies more—great happiness, prosperity, abundant goodness, and delight! The word bliss captures all of this meaning. Toowayhon means to have the capacity to enjoy union and communion with God. Because the meaning of the word goes beyond merely being “blessed,” this translation uses different phrases for each of the Beatitudes. Verses 3–10 are presented with third-person pronouns; however, it is not abstract truth, but spoken directly to Jesus’ disciples. This is why the translation is in the second person. The implication of this verse is that the poor in spirit have only one remedy, and that is trusting in God. This total reliance upon God is the doorway into the kingdom realm. Notice the obvious parallel between Isa. 61:1–2 and these “beatitudes.”
  - type: text
    content: when you feel your spiritual poverty!
  - type: text
    content: ' '
  - type: note
    content: Or, “humble in spirit,” or, “poor in spirit,” which means to be humble and totally dependent upon God for everything. It is synonymous with “pious” or “saintly,” not just in the sense of those who possess nothing. It could be translated “Delighted are those who have surrendered completely to God and trust only in him.” See also Isa. 41:17; 57:15; 66:2.
  - type: text
    content: For yours is the realm of heaven’s kingdom.
  '30':
  - type: text
    content: And if your right hand entices you to sin, let it go limp and useless!
  - type: text
    content: ' '
  - type: note
    content: Or “cut it off and throw it away.” Verses 29 and 30 use obvious hyperbole to help us understand how intent we must be to guard our lives from sin.
  - type: text
    content: For you’re better off losing a part of your body than to have it all thrown into hell.
  - type: note
    content: 'Jesus is using an obvious figure of speech when he instructs us to “pluck out” our eyes or “cut off” our hands. The metaphor is clear: we are to end every evil habit that will lead us to destruction.'
  '31':
  - type: text
    content: “It has been said, ‘Whoever divorces
  - type: text
    content: ' '
  - type: note
    content: In this verse and in v. 32 the Greek word for divorce (apolyo) can also mean “to loose,” “to dismiss,” “to send away.”
  - type: text
    content: his wife must give her legal divorce papers.’
  - type: text
    content: ' '
  - type: note
    content: See Deut. 24:1. By serving her divorce papers, a husband was required to return his wife’s dowry. The divorced woman would then leave his house and receive back her dowry.
  '32':
  - type: text
    content: However, I say to you, if anyone divorces his wife for any reason, except for infidelity, he causes her to commit adultery, and whoever marries a divorced
  - type: text
    content: ' '
  - type: note
    content: The Aramaic can be translated “whoever marries a woman who is separated and not divorced.”
  - type: text
    content: woman commits adultery.”
  - type: heading
    content: Making Oaths
  '33':
  - type: text
    content: “Again, your ancestors were taught, ‘Never swear an oath that you don’t intend to keep,
  - type: text
    content: ' '
  - type: note
    content: That is, don’t perjure yourself.
  - type: text
    content: but keep your vows to the Lord God.’
  - type: text
    content: ' '
  - type: note
    content: See Lev. 19:12; Isa. 66:1.
  '34':
  - type: text
    content: However, I say to you, don’t bind yourself by taking an oath at all. Don’t swear by heaven, for heaven is where God’s throne is placed.
  - type: text
    content: ' '
  - type: note
    content: In the days of Jesus and in the Middle Eastern cultural setting of Israel, taking oaths and swearing by something greater than oneself was a common practice. Jesus’ words trump culture and our bondage to doing things according to the expected norms of society. He instructs us to be faithful and true with our words.
  '35':
  - type: text
    content: Don’t swear an oath by the earth, because it is the rug under God’s feet,
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek is “his footstool.”
  - type: text
    content: and not by Jerusalem, because it is the city of the Great King.
  - type: text
    content: ' '
  - type: note
    content: See Ps. 48:2.
  '36':
  - type: text
    content: And why would you swear by your own head, because it’s not in your power to turn a single hair white or black?
  - type: text
    content: ' '
  - type: text
    content: But just let your words ring true.
  - type: text
    content: ' '
  - type: note
    content: Our words must be fulfilled by actions. All four things Jesus mentioned were considered sacred to the Jewish people—heaven, earth, Jerusalem, and a person’s head. But Jesus teaches us that words of truth make our lives sacred. See James 5:12.
  '37':
  - type: text
    content: A simple ‘Yes’ or ‘No’ will suffice. Anything beyond this springs from a deceiver.
  - type: note
    content: As translated from the Aramaic. See Eccl. 5:4–7.
  '38':
  - type: text
    content: “Your ancestors have also been taught, ‘Take an eye in exchange for an eye and a tooth in exchange for a tooth.’
  - type: text
    content: ' '
  - type: note
    content: See Ex. 21:24.
  '39':
  - type: text
    content: However, I say to you, don’t repay an evil act with another evil act.
  - type: text
    content: ' '
  - type: note
    content: As translated from Hebrew Matthew. The Greek is “Do not resist evil (or evil doer).”
  - type: text
    content: But whoever insults you by slapping you on the right cheek, turn the other to him as well.
  - type: text
    content: ' '
  - type: note
    content: That is, simply stand and take it without responding in return with violence. In the cultural setting of the days of Jesus, to slap someone was the greatest insulting physical blow you could give a person. It is better to respond with kindness. This robs the oppressor of his ability to humiliate. See Prov. 15:1; 24:29; Isa. 50:6; Lam. 3:30.
  '4':
  - type: text
    content: “What delight comes to you when you wait upon the Lord!
  - type: text
    content: ' '
  - type: note
    content: As translated from the Hebrew Matthew. (See also Ps. 27:14.) The Greek is “mourn (grieve).” The Hebrew word for “wait” and for “mourn” is almost identical.
  - type: text
    content: For you will find what you long for.
  - type: note
    content: As translated from the Aramaic word for comfort, nethbayoon, which can mean “to see the face of what (or who) you long for.” The Greek is “They shall be comforted.”
  '40':
  - type: text
    content: If someone is determined to sue you for your coat, give him the shirt off your back as a gift in return.
  - type: text
    content: ' '
  '41':
  - type: text
    content: And should people in authority take advantage of you, do more than what they demand.
  - type: text
    content: ' '
  - type: note
    content: “If someone forces you to go a mile with him, go two.” This is in reference to the Roman authorities, who often compelled the Jewish men to carry their heavy items for them. In v. 40 we are challenged to give up our rights, in v. 41 to surrender our freedom, and in v. 42 to surrender our prosperity.
  '42':
  - type: text
    content: Learn to generously share what you have with those who ask for help, and don’t close your heart to the one who comes to borrow from you.”
  - type: note
    content: The Aramaic can be “If someone wants to benefit from you, do not stop him.” In the agrapha sayings of Jesus, as quoted by early church fathers, an additional line is found here that reads, “It is more blessed to give than to receive.” See also Acts 20:35.
  - type: heading
    content: Love Your Enemies
  '43':
  - type: text
    content: “Your ancestors have also been taught ‘Love your neighbors
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “your relatives.” This phrase is found in the Torah; the following phrase is from oral tradition. See Lev. 19:18.
  - type: text
    content: and hate the one who hates you.’
  - type: text
    content: ' '
  '44':
  - type: text
    content: However, I say to you, love your enemy, bless the one who curses you, do something wonderful for the one who hates you,
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The previous two clauses are not found in some reliable Greek manuscripts.
  - type: text
    content: and respond to the very ones who persecute you by praying for them.
  - type: text
    content: ' '
  '45':
  - type: text
    content: For that will reveal your identity as children of your heavenly Father. He is kind to all by bringing the sunrise to warm and rainfall to refresh whether a person does what is good or evil.
  - type: text
    content: ' '
  '46':
  - type: text
    content: What reward do you deserve if you only love the loveable? Don’t even the tax collectors
  - type: text
    content: ' '
  - type: note
    content: The Hebrew Matthew is “transgressors.”
  - type: text
    content: do that?
  - type: text
    content: ' '
  '47':
  - type: text
    content: How are you any different from others if you limit your kindness
  - type: text
    content: ' '
  - type: note
    content: Or “ask for the peace of your brothers” (Hebrew Matthew and Aramaic).
  - type: text
    content: only to your friends? Don’t even the ungodly
  - type: text
    content: ' '
  - type: note
    content: Or “gentiles” (who worship other gods).
  - type: text
    content: do that?
  - type: text
    content: ' '
  '48':
  - type: text
    content: Since you are children of a perfect Father in heaven, become perfect
  - type: text
    content: ' '
  - type: note
    content: The Greek and Aramaic words for “perfect” can also mean “whole, complete, fully mature, lacking nothing, all-inclusive, well rounded, and spiritually mature.”
  - type: text
    content: like him
  - type: text
    content: .”
  '5':
  - type: text
    content: “What blessing comes to you when gentleness
  - type: text
    content: ' '
  - type: note
    content: Or “meekness.” Jesus is saying that when you claim nothing as yours, everything will be given to you. The Aramaic word, makeekheh, implies being both gentle and flexible.
  - type: text
    content: lives in you! For you will inherit the earth.
  - type: note
    content: See Pss. 37:11; 149:4.
  '6':
  - type: text
    content: “How enriched you are when you crave righteousness!
  - type: text
    content: ' '
  - type: note
    content: Or “goodness” or “justice.”
  - type: text
    content: For you will be satisfied.
  - type: note
    content: See Ps. 11:3–7; Zeph. 2:3.
  '7':
  - type: text
    content: “How blessed you are when you demonstrate tender mercy!
  - type: text
    content: ' '
  - type: note
    content: Or “merciful to forgive.” The Hebraic and Aramaic concept of mercy is that it comes from our innermost being. The root word for “mercy” is the root word for “womb.” See 2 Sam. 22:26; Ps. 18:25; Prov. 14:21; James 2:13.
  - type: text
    content: For tender mercy will be demonstrated to you.
  '8':
  - type: text
    content: “What bliss you experience when your heart is pure!
  - type: text
    content: ' '
  - type: note
    content: Or “when your heart is full of innocence.” See Pss. 15:1–2; 24:4; 51:10.
  - type: text
    content: For then your eyes will open to see more and more of God.
  - type: note
    content: The Aramaic word used for “see” is nahzon and can be translated either in the present tense (“They see God”) or the future tense (“They will see God”). The Greek is “They will progressively see God.” See also Ps. 17:15.
  '9':
  - type: text
    content: “How joyful you are when you make peace! For then you will be recognized as a true child of God.
  - type: note
    content: See Pss. 72:3–7; 122:8–9; Isa. 26:12.
