    - type: text
      text: ' The concept of the day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' (the phrase is often translated as “the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ”) is a common one throughout much of the prophetic literature and is likewise a major theme in the book of Obadiah. It has a twofold application, one profoundly negative and the other sublimely positive. Negatively speaking, Edom has a “day” in store for her judgment (v. 8), since she stood by on the “day” that her neighbor, Judah, was attacked—most likely at the hands of the invading Babylonian armies during the period 605–586 BC (vv. 11–14). Additionally, verse 15 records that all the nations have a bitter “day” of judgment coming to them.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'However, the theme of deliverance brings us to the second application of this powerful motif, namely the wonderfully positive application of divine blessing and renewal. This is explicitly recorded in verses 17–21, where the day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' promises to usher in an era of restoration and renewal for the people of God. First, they will be restored to the land of promise, and Mount Zion, symbolizing the city of Jerusalem, will once again be renewed in holiness. Second, the nation of Edom will be totally eradicated at the hands of the house of Jacob, and God’s people will have no more enemies from that source ever again. This manifestation of the day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will also result in the reestablishing of the kingdom of God for all the people of God and, by implication and extension, the rest of the world. It will truly be a universal kingdom.'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Edom and Adam.
    - type: text
      text: ' The Hebrews originally wrote without vowel markers. Thus, the words '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Edom
    - type: text
      text: ' and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Adam
    - type: text
      text: ' would look exactly the same ('
    - type: usfm
      marker: it
      children:
      - type: text
        text: ʾdm
    - type: text
      text: ) to the original readers of the book of Obadiah. We don’t want to read too much into this, but one can make the case that the first part of the book deals with the nation of Edom, while the second part deals with surrounding nations and, by extension, all humankind, the descendants of Adam. In other words, God speaks to all of us, all of the time, in his Word.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Seeing Jesus in the Book.
    - type: text
      text: ' The prophetic anticipation of the coming of Jesus Christ is found in the book of Obadiah, as it is throughout the entire Old Testament canon. The Christological focus here is embedded in the theme of the day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', where restoration and renewal are promised to the people of God. It is promised both that the covenant people of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will themselves be rendered holy again and that the land of promise itself will be resanctified and returned to God’s people. This will result eventually in the reestablishing and expansion of the kingdom of God for the entire world. The ultimate mechanism by which this divine transformation will be accomplished is the coming of the Messianic King, Jesus Christ, the Son of God, our Redeemer. The redeeming sacrifice of Christ on the cross will bring about ultimate renewal, resulting in the once-for-all eradication of sin and death for all who trust in him. And the renewal of the land of promise, the land of Canaan, is an earthly foretaste of the new heavens and the new earth, which will constitute the divine re-creation of the cosmos, where God the Father, the risen Christ, and his people from all over the world will one day live forever in the eternal kingdom of heaven.'
