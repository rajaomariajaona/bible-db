document_id: LAM.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Zion’s Punishment
  - type: text
    content: How the gold has lost its luster!
  - type: text
    content: How the pure gold has lost its value!
  - type: text
    content: 'The sacred stones '
  - type: note
    content: The “gold,” “pure gold,” and “sacred stones” are references to the people of Jerusalem. See 1 Peter 2:5.
  - type: text
    content: lie scattered
  - type: text
    content: at the corner of every street.
  '10':
  - type: text
    content: The hands of caring women
  - type: text
    content: cooked their own children;
  - type: note
    content: See Deut. 28:52–53.
  - type: text
    content: they became their food
  - type: text
    content: when my beloved people were destroyed.
  '11':
  - type: text
    content: 'At the peak of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s wrath,
  - type: text
    content: he vented his fierce anger!
  - type: text
    content: He lit a fire in Zion
  - type: text
    content: and burned it down to the ground.
  '12':
  - type: text
    content: No king believed,
  - type: text
    content: nor anyone anywhere,
  - type: text
    content: that a hostile foe could ever break through
  - type: text
    content: the gates of Jerusalem.
  '13':
  - type: text
    content: Yet this happened because of the sins of her prophets
  - type: text
    content: and the crimes of her priests,
  - type: text
    content: who shed innocent blood
  - type: text
    content: in the heart of the city.
  '14':
  - type: text
    content: They wandered blindly through the city
  - type: text
    content: and were so defiled with blood
  - type: text
    content: that no one dared
  - type: text
    content: to even touch their clothes.
  '15':
  - type: text
    content: “Get away! Unclean!” people shouted at them.
  - type: text
    content: “Keep back! Keep back! Don’t touch!”
  - type: text
    content: 'So, they fled '
  - type: text
    content: Jerusalem
  - type: text
    content: ' and wandered to the nations,'
  - type: text
    content: but they were not welcome to stay there either.
  '16':
  - type: text
    content: 'The face of '
  - type: text
    content: Yahweh
  - type: text
    content: ' scattered them;'
  - type: text
    content: he will look on them no more.
  - type: text
    content: They had no respect for the priests,
  - type: text
    content: no honor for her leaders.
  - type: heading
    content: The Lament of the People of Jerusalem
  '17':
  - type: text
    content: We strained our eyes continually and looked,
  - type: text
    content: watching for help that never came.
  - type: text
    content: 'From our watchtowers we waited '
  - type: text
    content: for a nation to help
  - type: text
    content: ','
  - type: text
    content: for a nation that could not save us.
  '18':
  - type: text
    content: Men stalked us
  - type: text
    content: so that we could not walk on our streets.
  - type: text
    content: Our end drew near, our time ran out,
  - type: text
    content: for our end had come.
  '19':
  - type: text
    content: Our pursuers were swifter
  - type: text
    content: than eagles in the sky;
  - type: note
    content: See Deut. 28:49.
  - type: text
    content: they hunted us on the mountains
  - type: text
    content: and lay in ambush for us in the wilderness.
  '2':
  - type: text
    content: The precious children of Zion,
  - type: text
    content: once worth their weight in the finest gold,
  - type: text
    content: are now regarded as jars of clay
  - type: text
    content: made by a potter’s hands.
  '20':
  - type: text
    content: 'They captured '
  - type: text
    content: Yahweh
  - type: text
    content: '’s anointed '
  - type: text
    content: leader
  - type: text
    content: ', '
  - type: text
    content: our king
  - type: text
    content: ;
  - type: note
    content: This was Zedekiah, the last king of Judah, taken away to Babylonia in 586 BC.
  - type: text
    content: 'the hope of our survival '
  - type: note
    content: Or “the breath of our life.”
  - type: text
    content: was caught in their traps.
  - type: text
    content: We thought that under his protective shadow
  - type: text
    content: we would live among the nations.
  - type: heading
    content: Warning to the People of Edom and Uz
  '21':
  - type: text
    content: Go ahead
  - type: text
    content: ', you people of Edom and Uz,'
  - type: text
    content: laugh on and be glad like nothing will happen to you!
  - type: note
    content: Edom was a Babylonian ally, next-door neighbor to Judah. The prophet warned Edom not to gloat. See Jer. 49:7–22.
  - type: text
    content: Your day is coming to drink from this cup;
  - type: note
    content: See Obad. 16; Rev. 14:10; 16:19.
  - type: text
    content: you will get drunk and stagger naked.
  '22':
  - type: text
    content: Your punishment is over, fair daughter of Zion.
  - type: note
    content: This verse seems to be addressed to those who had been taken into exile after the fall of Jerusalem.
  - type: text
    content: Yahweh
  - type: text
    content: ' will never send you away into exile again.'
  - type: text
    content: But people of Edom, he will punish your wickedness
  - type: text
    content: and expose your sins.
  '3':
  - type: text
    content: 'Even the '
  - type: text
    content: vicious
  - type: text
    content: ' jackal'
  - type: note
    content: Or “dragon” (MT, LXX).
  - type: text
    content: is kind enough to nurse her young,
  - type: text
    content: but the daughter of my people is as cruel
  - type: text
    content: as the desert ostrich.
  - type: note
    content: The proverbial cruelty of the ostrich is also found in Job 39:13–18. It was assumed that the ostrich laid her eggs and abandoned them to be stepped on, just as the women of Israel abandoned their children when the city was conquered.
  '4':
  - type: text
    content: The nursing babies have such thirst
  - type: text
    content: that their tongues stick to the roofs of their mouths.
  - type: text
    content: Little children ask for bread,
  - type: text
    content: but no one gives them a crumb.
  '5':
  - type: text
    content: Those who used to feast on delicacies
  - type: text
    content: now lie dying in the streets.
  - type: text
    content: Those who were raised in luxury
  - type: note
    content: Or “reared in scarlet [purple].” Scarlet and purple were the colors of robes worn by kings and are associated with luxury and royalty. See Judg. 8:26; Song. 7:5.
  - type: text
    content: now huddle in garbage dumps.
  '6':
  - type: text
    content: The punishment of my beloved people
  - type: note
    content: Or “The iniquity of the daughter of my people.”
  - type: text
    content: exceeded the judgment of sinful Sodom,
  - type: text
    content: which was suddenly destroyed
  - type: text
    content: without an army attacking her.
  - type: note
    content: Or “without a hand laid on her” or “with no one to help her” or “without a hand twisting.”
  '7':
  - type: text
    content: Israel’s
  - type: text
    content: ' nobility '
  - type: note
    content: 'Although the Hebrew word is a variant of “nazirites,” it is more likely a reference to princes: those who wore a crown or wreath (Hb. nezer).'
  - type: text
    content: was once brighter than snow,
  - type: text
    content: whiter than milk;
  - type: text
    content: their bodies glowed with health
  - type: text
    content: and glistened like jewels.
  '8':
  - type: text
    content: Now their faces are emaciated;
  - type: note
    content: Or “their form is blacker than soot.”
  - type: text
    content: they are not even recognized in the streets.
  - type: text
    content: Their skin has shriveled on their bones,
  - type: text
    content: as dry as a stick.
  '9':
  - type: text
    content: Better are those killed by the sword
  - type: text
    content: than those killed by famine.
  - type: text
    content: They slowly starve to death
  - type: text
    content: for lack of food.
