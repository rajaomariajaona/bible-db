document_id: LAM.4,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zion’s Punishment
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: How the gold has lost its luster!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How the pure gold has lost its value!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The sacred stones '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “gold,” “pure gold,” and “sacred stones” are references to the people of Jerusalem. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Peter 2:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: lie scattered
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the corner of every street.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The hands of caring women
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cooked their own children;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 28:52–53
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they became their food
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when my beloved people were destroyed.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'At the peak of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s wrath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he vented his fierce anger!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He lit a fire in Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and burned it down to the ground.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: No king believed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor anyone anywhere,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that a hostile foe could ever break through
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the gates of Jerusalem.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Yet this happened because of the sins of her prophets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the crimes of her priests,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who shed innocent blood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the heart of the city.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: They wandered blindly through the city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and were so defiled with blood
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that no one dared
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to even touch their clothes.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “Get away! Unclean!” people shouted at them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Keep back! Keep back! Don’t touch!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So, they fled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jerusalem
    - type: text
      text: ' and wandered to the nations,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they were not welcome to stay there either.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The face of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' scattered them;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will look on them no more.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They had no respect for the priests,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no honor for her leaders.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Lament of the People of Jerusalem
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: We strained our eyes continually and looked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: watching for help that never came.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From our watchtowers we waited '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for a nation to help
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for a nation that could not save us.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Men stalked us
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that we could not walk on our streets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our end drew near, our time ran out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for our end had come.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Our pursuers were swifter
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than eagles in the sky;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 28:49
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they hunted us on the mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lay in ambush for us in the wilderness.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The precious children of Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: once worth their weight in the finest gold,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are now regarded as jars of clay
  - type: usfm
    marker: q2
    children:
    - type: text
      text: made by a potter’s hands.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'They captured '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s anointed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leader
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our king
    - type: text
      text: ;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was Zedekiah, the last king of Judah, taken away to Babylonia in 586 BC.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the hope of our survival '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the breath of our life.”
      marker-yv: yv-n
    - type: text
      text: was caught in their traps.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We thought that under his protective shadow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we would live among the nations.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warning to the People of Edom and Uz
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Go ahead
    - type: text
      text: ', you people of Edom and Uz,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: laugh on and be glad like nothing will happen to you!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Edom was a Babylonian ally, next-door neighbor to Judah. The prophet warned Edom not to gloat. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 49:7–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your day is coming to drink from this cup;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Obad. 16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 14:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will get drunk and stagger naked.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Your punishment is over, fair daughter of Zion.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse seems to be addressed to those who had been taken into exile after the fall of Jerusalem.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
    - type: text
      text: ' will never send you away into exile again.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But people of Edom, he will punish your wickedness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and expose your sins.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Even the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: vicious
    - type: text
      text: ' jackal'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “dragon” (MT, LXX).
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is kind enough to nurse her young,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the daughter of my people is as cruel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the desert ostrich.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The proverbial cruelty of the ostrich is also found in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Job 39:13–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . It was assumed that the ostrich laid her eggs and abandoned them to be stepped on, just as the women of Israel abandoned their children when the city was conquered.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The nursing babies have such thirst
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that their tongues stick to the roofs of their mouths.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Little children ask for bread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but no one gives them a crumb.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Those who used to feast on delicacies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now lie dying in the streets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who were raised in luxury
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “reared in scarlet [purple].” Scarlet and purple were the colors of robes worn by kings and are associated with luxury and royalty. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 8:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Song. 7:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now huddle in garbage dumps.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The punishment of my beloved people
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The iniquity of the daughter of my people.”
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: exceeded the judgment of sinful Sodom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: which was suddenly destroyed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without an army attacking her.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “without a hand laid on her” or “with no one to help her” or “without a hand twisting.”
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel’s
    - type: text
      text: ' nobility '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Although the Hebrew word is a variant of “nazirites,” it is more likely a reference to princes: those who wore a crown or wreath (Hb.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nezer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: was once brighter than snow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whiter than milk;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their bodies glowed with health
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and glistened like jewels.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Now their faces are emaciated;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “their form is blacker than soot.”
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are not even recognized in the streets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their skin has shriveled on their bones,
  - type: usfm
    marker: q2
    children:
    - type: text
