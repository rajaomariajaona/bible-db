document_id: PSA.104,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Our Creator’s Compassion This psalm, attributed to David in the Septuagint, can be seen as an exposition of the days of creation: first day: vv. 1–2; second day: vv. 3–4; third day: vv. 5–17; fourth day: vv. 18–23; fifth day: vv. 24–26; sixth day: vv. 27–30.'
  - type: text
    content: Everything I am will praise and bless the Lord!
  - type: text
    content: O Lord, my God, your greatness takes my breath away,
  - type: text
    content: overwhelming me by your majesty, beauty, and splendor!
  - type: note
    content: See Job 40:10.
  '10':
  - type: text
    content: You sent springs cascading through the valleys,
  - type: text
    content: flowing freely between the mountains and hills.
  '11':
  - type: text
    content: You provide drink for every living thing;
  - type: text
    content: 'men and beasts '
  - type: note
    content: Or “wild donkeys.”
  - type: text
    content: have their thirst quenched because of you.
  '12':
  - type: text
    content: The birds build nests near the tranquil streams,
  - type: text
    content: chirping their joyous songs from the branches above.
  '13':
  - type: text
    content: From your kindness you send the rain to water the mountains
  - type: text
    content: from the upper rooms of your palace.
  - type: text
    content: 'Your goodness '
  - type: note
    content: Or “your works.”
  - type: text
    content: brings forth fruit for all to enjoy.
  '14':
  - type: text
    content: Your compassion brings the earth’s harvest, feeding the hungry.
  - type: text
    content: You cause the grass to grow for livestock,
  - type: text
    content: along with the fruit, grains, and vegetables to feed mankind.
  '15':
  - type: text
    content: You provide sweet wine to gladden hearts.
  - type: text
    content: You give us daily bread to sustain life,
  - type: text
    content: giving us glowing health for our bodies.
  - type: note
    content: Or “oil for our faces to shine.”
  '16':
  - type: text
    content: The trees of the Lord drink until they’re satisfied.
  - type: text
    content: Lebanon’s lofty trees stand tall right where you planted them.
  '17':
  - type: text
    content: Within their branches you provide for birds
  - type: text
    content: a place to build their nests;
  - type: text
    content: even herons find a home in the cypress trees.
  '18':
  - type: text
    content: You make the high mountains a home for wild goats
  - type: text
    content: and the rocky crag where the rock badgers burrow.
  '19':
  - type: text
    content: You made the moon to mark the months
  - type: text
    content: and the sun to measure the days.
  '2':
  - type: text
    content: You wrap yourself with a shimmering, glistening light.
  - type: text
    content: You wear sunshine like a garment of glory.
  - type: text
    content: You stretch out the starry skies like a tapestry.
  '20':
  - type: text
    content: You turn off the light and it becomes night,
  - type: text
    content: and all the beasts of the forest come out to prowl.
  '21':
  - type: text
    content: The mighty lions roar for their dinner,
  - type: text
    content: but it’s you, God, who feeds them all.
  '22':
  - type: text
    content: At sunrise they slink back to their dens
  - type: text
    content: to crouch down in the shadows.
  '23':
  - type: text
    content: Then man goes out to his labor and toil,
  - type: text
    content: working from dawn to dusk.
  '24':
  - type: text
    content: O Lord, what an amazing variety of all you have created!
  - type: text
    content: Wild and wonderful is this world you have made,
  - type: text
    content: while wisdom was there at your side.
  - type: text
    content: This world is full of so many creatures, yet each belongs to you!
  '25':
  - type: text
    content: And then there is the sea! So vast! So wide and deep—
  - type: text
    content: swarming with countless forms of sea life, both small and great.
  '26':
  - type: text
    content: Trading ships glide through the high seas.
  - type: text
    content: And look! There are the massive whales
  - type: text
    content: bounding upon the waves.
  '27':
  - type: text
    content: All the creatures wait expectantly for you
  - type: text
    content: to give them their food as you determine.
  '28':
  - type: text
    content: You come near and they all gather around,
  - type: text
    content: feasting from your open hands,
  - type: text
    content: and each is satisfied from your abundant supply.
  '29':
  - type: text
    content: But if you were to withhold from them and turn away,
  - type: text
    content: they all would panic.
  - type: text
    content: And when you choose to take away their breath,
  - type: text
    content: each one dies and returns to the dust.
  '3':
  - type: text
    content: You build your balconies with light beams
  - type: text
    content: and ride as King in a chariot you made from clouds.
  - type: text
    content: You fly upon the wings of the wind.
  '30':
  - type: text
    content: When you release your Spirit-Wind, life is created,
  - type: text
    content: ready to replenish life upon the earth.
  '31':
  - type: text
    content: May God’s glorious splendor endure forever!
  - type: text
    content: May the Lord take joy and pleasure in all that he has made.
  '32':
  - type: text
    content: For the earth’s overseer has the power to make it tremble;
  - type: text
    content: just a touch of his finger and volcanoes erupt
  - type: text
    content: as the earth shakes and melts.
  '33':
  - type: text
    content: I will sing my song to the Lord as long as I live!
  - type: text
    content: Every day I will sing my praises to God.
  '34':
  - type: text
    content: May you be pleased with every sweet thought I have about you,
  - type: text
    content: for you are the source of my joy and gladness.
  '35':
  - type: text
    content: Now, let all the sinners be swept from the earth.
  - type: text
    content: But I will keep on praising you, my Lord, with all that is within me.
  - type: text
    content: My joyous, blissful shouts of “Hallelujah” are all because of you!
  '4':
  - type: text
    content: You make your messengers into winds of the Spirit,
  - type: text
    content: and all your ministers become flames of fire.
  '5':
  - type: text
    content: You, our Creator, formed the earth,
  - type: text
    content: and you hold it all together so it will never fall apart.
  '6':
  - type: text
    content: You poured the ocean depths over the planet,
  - type: text
    content: submerging mountains beneath.
  '7':
  - type: text
    content: Yet at the sound of your thunder-shout
  - type: text
    content: the waters all fled away, filling the deep with seas.
  '8':
  - type: text
    content: The mountains rose and valleys sank
  - type: text
    content: to the levels you decreed for them.
  '9':
  - type: text
    content: Then you set a boundary line for the seas
  - type: text
    content: and commanded them not to trespass.
