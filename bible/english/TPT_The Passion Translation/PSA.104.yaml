      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This psalm, attributed to David in the Septuagint, can be seen as an exposition of the days of creation: first day: vv.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; second day: vv.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; third day: vv.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; fourth day: vv.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; fifth day: vv.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24–26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; sixth day: vv.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27–30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything I am will praise and bless the Lord!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Lord, my God, your greatness takes my breath away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: overwhelming me by your majesty, beauty, and splendor!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 104:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Job 40:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You sent springs cascading through the valleys,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: flowing freely between the mountains and hills.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You provide drink for every living thing;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'men and beasts '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 104:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “wild donkeys.”
      marker-yv: yv-n
    - type: text
      text: have their thirst quenched because of you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The birds build nests near the tranquil streams,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chirping their joyous songs from the branches above.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From your kindness you send the rain to water the mountains
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the upper rooms of your palace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your goodness '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 104:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “your works.”
      marker-yv: yv-n
    - type: text
      text: brings forth fruit for all to enjoy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your compassion brings the earth’s harvest, feeding the hungry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You cause the grass to grow for livestock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: along with the fruit, grains, and vegetables to feed mankind.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You provide sweet wine to gladden hearts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You give us daily bread to sustain life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: giving us glowing health for our bodies.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 104:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “oil for our faces to shine.”
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The trees of the Lord drink until they’re satisfied.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lebanon’s lofty trees stand tall right where you planted them.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Within their branches you provide for birds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a place to build their nests;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even herons find a home in the cypress trees.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You make the high mountains a home for wild goats
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the rocky crag where the rock badgers burrow.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You made the moon to mark the months
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the sun to measure the days.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You wrap yourself with a shimmering, glistening light.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You wear sunshine like a garment of glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You stretch out the starry skies like a tapestry.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You turn off the light and it becomes night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all the beasts of the forest come out to prowl.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mighty lions roar for their dinner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but it’s you, God, who feeds them all.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At sunrise they slink back to their dens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to crouch down in the shadows.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then man goes out to his labor and toil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: working from dawn to dusk.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Lord, what an amazing variety of all you have created!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wild and wonderful is this world you have made,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while wisdom was there at your side.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This world is full of so many creatures, yet each belongs to you!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then there is the sea! So vast! So wide and deep—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: swarming with countless forms of sea life, both small and great.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trading ships glide through the high seas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And look! There are the massive whales
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bounding upon the waves.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the creatures wait expectantly for you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to give them their food as you determine.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You come near and they all gather around,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: feasting from your open hands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and each is satisfied from your abundant supply.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you were to withhold from them and turn away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they all would panic.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And when you choose to take away their breath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: each one dies and returns to the dust.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You build your balconies with light beams
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and ride as King in a chariot you made from clouds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You fly upon the wings of the wind.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you release your Spirit-Wind, life is created,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ready to replenish life upon the earth.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May God’s glorious splendor endure forever!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the Lord take joy and pleasure in all that he has made.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the earth’s overseer has the power to make it tremble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: just a touch of his finger and volcanoes erupt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as the earth shakes and melts.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing my song to the Lord as long as I live!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every day I will sing my praises to God.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May you be pleased with every sweet thought I have about you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you are the source of my joy and gladness.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now, let all the sinners be swept from the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I will keep on praising you, my Lord, with all that is within me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My joyous, blissful shouts of “Hallelujah” are all because of you!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You make your messengers into winds of the Spirit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all your ministers become flames of fire.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You, our Creator, formed the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you hold it all together so it will never fall apart.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You poured the ocean depths over the planet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: submerging mountains beneath.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet at the sound of your thunder-shout
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the waters all fled away, filling the deep with seas.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mountains rose and valleys sank
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to the levels you decreed for them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you set a boundary line for the seas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and commanded them not to trespass.
