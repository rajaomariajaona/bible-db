segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Our Creator’s Compassion
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '104'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This psalm, attributed to David in the Septuagint, can be seen as an exposition of the days of creation: first day: vv.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1–2
      metadata:
        usfm: PSA.104.1+PSA.104.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; second day: vv.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3–4
      metadata:
        usfm: PSA.104.3+PSA.104.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; third day: vv.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5–17
      metadata:
        usfm: PSA.104.5+PSA.104.6+PSA.104.7+PSA.104.8+PSA.104.9+PSA.104.10+PSA.104.11+PSA.104.12+PSA.104.13+PSA.104.14+PSA.104.15+PSA.104.16+PSA.104.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; fourth day: vv.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18–23
      metadata:
        usfm: PSA.104.18+PSA.104.19+PSA.104.20+PSA.104.21+PSA.104.22+PSA.104.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; fifth day: vv.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24–26
      metadata:
        usfm: PSA.104.24+PSA.104.25+PSA.104.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; sixth day: vv.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27–30
      metadata:
        usfm: PSA.104.27+PSA.104.28+PSA.104.29+PSA.104.30
    - type: usfm
