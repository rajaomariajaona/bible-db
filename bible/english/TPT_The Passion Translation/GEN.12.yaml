document_id: GEN.12,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Appears to Abram
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said to Abram,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The God of glory appeared to Abram and spoke with him (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 7:2–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). God’s appearance to Abram was sudden and without warning. The same voice of creation now proclaims a message of hope and blessing to all the world. Abram had no burning bush to inspire him, no tablets of stone to guide him, and no ark of the covenant as a centerpiece of worship. Neither did Abram have a temple to worship in, a Bible to read, or a priest to counsel him. Nor did Abram have a pastor to pray for him, or a prophet to prophesy to him. But Abram had a divine encounter.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Leave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it all behind
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Go yourself,” from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lech-lecha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which is a Hebrew play on words. The implication is that although Abram must undergo a traumatic departure from his native land, he was actually traveling to find his more authentic self. Perhaps “Go and find yourself” conveys the meaning.'
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your native land,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ’eretz
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is etymologically linked to the Canaanite word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ratzon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “firmness of will” or “stubbornness.” God was saying to Abram, with double meaning, leave your country but also leave your own will behind in order to enter God’s plan. We need to leave it all behind, including our ideas of how God will work.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your father’s household,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God was calling Abram out from more than just his relatives. He was calling Abram out from specific deity worship connected to nations, clans, and ancestors.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and go to the land that I will show you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Leaving all that is familiar was an incredible act of faith on Abram’s part (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 11:8–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). He was told to go into an unknown land, but it would result in the seven-fold blessing of vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'At that time, a severe famine struck the land of Canaan, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the promised land was a land flowing (flourishing) with milk and honey (
      - type: text
        text: Ex. 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), all three patriarchs (Abraham, Isaac, Jacob) and Joseph experienced a famine (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 26:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 41:54
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 42:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 43:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Faith will always be tested. This famine tested Abram’s faith. So often when we set out for our promised land, we encounter a famine. You can be right where God wants you to be and still be faced with severe trials. It is better to suffer in God’s path than to be at ease in Satan’s.
      marker-yv: yv-n
    - type: text
      text: 'forcing Abram to travel down to Egypt and live there '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as a foreigner
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'When he drew near to Egypt, he said to his wife Sarai, “Look, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I’m worried
    - type: text
      text: ' because I know that you are a beautiful, gorgeous woman. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When the Egyptian men take one look at you, they will say, ‘She is his wife.’ Then they will kill me in order to have you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Just tell them you are my sister '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In fact, Sarai was his half sister (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 20:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). If the Egyptians were to kill Abram, it would leave Sarai vulnerable to the men of Egypt. This was, in fact, a troubling moral dilemma for Abram. By calling her his “sister,” any interaction with her culturally required a negotiation with her “brother.”
      marker-yv: yv-n
    - type: text
      text: so that they will treat me well for your sake and spare my life.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'When Abram entered Egypt, everyone noticed Sarai’s stunning beauty. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sarai was at least sixty-five at this time, ten years younger than Abram.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When Pharaoh’s dignitaries spotted her, they went to Pharaoh and raved about her beauty. Then they took Sarai into the palace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and made her part of Pharaoh’s harem
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Because she pleased Pharaoh, Abram got along very well in Egypt and received royal treatment: he was given sheep, cattle, male and female donkeys, camels, and male and female slaves.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: All of Pharaoh’s gifts were signs of great wealth imparted to Abram by the king. It was the great wealth and many possessions that caused Lot to want to separate from Abram (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 13:6–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). There were many people who accompanied Abram both into Egypt and back into Canaan. He had the converts he acquired in Haran (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 12:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), plus 318 trained soldiers who were born under Abram’s care (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 14:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) who also had wives and children. It is possible that Abram had several thousand people who accompanied him.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' struck Pharaoh and his household with terrible diseases because he had taken Abram’s wife, Sarai. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'So Pharaoh sent for Abram and said, “How could you do this to me? Why didn’t you tell me she was your wife? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Somehow, perhaps by a dream, God showed Pharaoh his sin.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And why did you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lie to me
    - type: text
      text: ' by saying, ‘She’s my sister,’ so that I took her as my wife? Now, here’s your wife back; take her and begone!” '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Follow me
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will make you into a great nation.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This would take a miracle, for Sarai was barren. This would have greatly stretched Abram’s faith, yet he believed. Because he had left his nation, God would make Abram into a great nation. God gave creative ability to Abram, not only to produce offspring, but also to apply creative ability to form lasting enterprises that would shape a nation. God gave the ability to create community to Abram and his seed.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will exceedingly bless and prosper you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will make you famous,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I will make your name great,” which in the ancient Near East also implied being highly esteemed for his character. The building of the Tower of Babel was so that men could “make a name” for themselves. This was intended to be the gift of God and not something to be seized for oneself.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'so that you will be a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tremendous source of
    - type: text
      text: ' blessing for others.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Then Pharaoh gave strict orders to his men to escort them out of Egypt along with everything they had.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Besides great possessions, Abram also acquired servants in Egypt, and Hagar was one of them (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 16:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
