document_id: GEN.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Appears to Abram
  - type: text
    content: 'Now '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to Abram,'
  - type: note
    content: The God of glory appeared to Abram and spoke with him (see Acts 7:2–5). God’s appearance to Abram was sudden and without warning. The same voice of creation now proclaims a message of hope and blessing to all the world. Abram had no burning bush to inspire him, no tablets of stone to guide him, and no ark of the covenant as a centerpiece of worship. Neither did Abram have a temple to worship in, a Bible to read, or a priest to counsel him. Nor did Abram have a pastor to pray for him, or a prophet to prophesy to him. But Abram had a divine encounter.
  - type: text
    content: '“Leave '
  - type: text
    content: it all behind
  - type: text
    content: ' '
  - type: note
    content: Or “Go yourself,” from lech-lecha, which is a Hebrew play on words. The implication is that although Abram must undergo a traumatic departure from his native land, he was actually traveling to find his more authentic self. Perhaps “Go and find yourself” conveys the meaning.
  - type: text
    content: —
  - type: text
    content: your native land,
  - type: note
    content: The Hebrew word ’eretz is etymologically linked to the Canaanite word ratzon, which means “firmness of will” or “stubbornness.” God was saying to Abram, with double meaning, leave your country but also leave your own will behind in order to enter God’s plan. We need to leave it all behind, including our ideas of how God will work.
  - type: text
    content: your people,
  - type: text
    content: your father’s household,
  - type: note
    content: God was calling Abram out from more than just his relatives. He was calling Abram out from specific deity worship connected to nations, clans, and ancestors.
  - type: text
    content: and go to the land that I will show you.
  - type: note
    content: Leaving all that is familiar was an incredible act of faith on Abram’s part (see Heb. 11:8–10). He was told to go into an unknown land, but it would result in the seven-fold blessing of vv. 2–3.
  '10':
  - type: text
    content: 'At that time, a severe famine struck the land of Canaan, '
  - type: note
    content: Although the promised land was a land flowing (flourishing) with milk and honey (Ex. 3:17), all three patriarchs (Abraham, Isaac, Jacob) and Joseph experienced a famine (see Gen. 26:1; 41:54; 42:1; 43:1). Faith will always be tested. This famine tested Abram’s faith. So often when we set out for our promised land, we encounter a famine. You can be right where God wants you to be and still be faced with severe trials. It is better to suffer in God’s path than to be at ease in Satan’s.
  - type: text
    content: 'forcing Abram to travel down to Egypt and live there '
  - type: text
    content: as a foreigner
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'When he drew near to Egypt, he said to his wife Sarai, “Look, '
  - type: text
    content: I’m worried
  - type: text
    content: ' because I know that you are a beautiful, gorgeous woman. '
  '12':
  - type: text
    content: 'When the Egyptian men take one look at you, they will say, ‘She is his wife.’ Then they will kill me in order to have you. '
  '13':
  - type: text
    content: 'Just tell them you are my sister '
  - type: note
    content: In fact, Sarai was his half sister (see Gen. 20:12). If the Egyptians were to kill Abram, it would leave Sarai vulnerable to the men of Egypt. This was, in fact, a troubling moral dilemma for Abram. By calling her his “sister,” any interaction with her culturally required a negotiation with her “brother.”
  - type: text
    content: so that they will treat me well for your sake and spare my life.”
  '14':
  - type: text
    content: 'When Abram entered Egypt, everyone noticed Sarai’s stunning beauty. '
  - type: note
    content: Sarai was at least sixty-five at this time, ten years younger than Abram.
  '15':
  - type: text
    content: 'When Pharaoh’s dignitaries spotted her, they went to Pharaoh and raved about her beauty. Then they took Sarai into the palace '
  - type: text
    content: and made her part of Pharaoh’s harem
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Because she pleased Pharaoh, Abram got along very well in Egypt and received royal treatment: he was given sheep, cattle, male and female donkeys, camels, and male and female slaves.'
  - type: note
    content: All of Pharaoh’s gifts were signs of great wealth imparted to Abram by the king. It was the great wealth and many possessions that caused Lot to want to separate from Abram (see Gen. 13:6–7). There were many people who accompanied Abram both into Egypt and back into Canaan. He had the converts he acquired in Haran (see Gen. 12:5), plus 318 trained soldiers who were born under Abram’s care (see Gen. 14:14) who also had wives and children. It is possible that Abram had several thousand people who accompanied him.
  '17':
  - type: text
    content: 'But '
  - type: text
    content: Yahweh
  - type: text
    content: ' struck Pharaoh and his household with terrible diseases because he had taken Abram’s wife, Sarai. '
  '18':
  - type: text
    content: 'So Pharaoh sent for Abram and said, “How could you do this to me? Why didn’t you tell me she was your wife? '
  - type: note
    content: Somehow, perhaps by a dream, God showed Pharaoh his sin.
  '19':
  - type: text
    content: 'And why did you '
  - type: text
    content: lie to me
  - type: text
    content: ' by saying, ‘She’s my sister,’ so that I took her as my wife? Now, here’s your wife back; take her and begone!” '
  '2':
  - type: text
    content: Follow me
  - type: text
    content: ','
  - type: text
    content: and I will make you into a great nation.
  - type: note
    content: This would take a miracle, for Sarai was barren. This would have greatly stretched Abram’s faith, yet he believed. Because he had left his nation, God would make Abram into a great nation. God gave creative ability to Abram, not only to produce offspring, but also to apply creative ability to form lasting enterprises that would shape a nation. God gave the ability to create community to Abram and his seed.
  - type: text
    content: I will exceedingly bless and prosper you,
  - type: text
    content: and I will make you famous,
  - type: note
    content: Or “I will make your name great,” which in the ancient Near East also implied being highly esteemed for his character. The building of the Tower of Babel was so that men could “make a name” for themselves. This was intended to be the gift of God and not something to be seized for oneself.
  - type: text
    content: 'so that you will be a '
  - type: text
    content: tremendous source of
  - type: text
    content: ' blessing for others.'
  '20':
  - type: text
    content: Then Pharaoh gave strict orders to his men to escort them out of Egypt along with everything they had.
  - type: note
    content: Besides great possessions, Abram also acquired servants in Egypt, and Hagar was one of them (see Gen. 16:3).
  '3':
  - type: text
    content: I will bless all who bless you
  - type: text
    content: and curse all who curse you.
  - type: note
    content: Or “all who cause you harm I will punish.” See Num. 24:9.
  - type: text
    content: And through you all the families of the earth will be blessed.”
  - type: note
    content: Or “And by you all the families of the earth will bless themselves” or “Every nation will long for me to bless them as I have blessed you.” See Isa. 49:6; Gal. 3:8.
  '4':
  - type: text
    content: 'So Abram obeyed '
  - type: text
    content: Yahweh
  - type: text
    content: ' and left; and Lot went with him.'
  - type: text
    content: 'Now Abram was seventy-five years old when he departed from Haran '
  - type: text
    content: after his father died
  - type: text
    content: '. '
  - type: note
    content: See Acts 7:4.
  '5':
  - type: text
    content: 'He took his wife Sarai, his nephew Lot, and all the possessions and people '
  - type: note
    content: Or “souls.” Jewish tradition states that Abram preached the revelation of Yahweh, the true God. Also, Abram was wealthy before Pharaoh gave him gifts (see Gen. 12:16).
  - type: text
    content: 'he had acquired in Haran; and they departed for the land of Canaan. When they arrived in the land of Canaan, '
  '6':
  - type: text
    content: 'Abram passed through the land and stopped at the sacred site of Shechem, '
  - type: note
    content: The Hebrew word maqom (a generic place) is never used to describe a city. In this context it is likely linked to the Arabic word maqam, which means “sacred site.” The word Shechem means “between the shoulders.” The shoulder represents all power and authority (see Isa. 9:6; 22:22; Luke 15:4–5). The site of Shechem was the physical center of modern Israel and is mentioned as a sacred place (see Gen. 35:4; Josh. 24:25; Judg. 9:6, 37).
  - type: text
    content: 'famous for the great oak tree of Moreh. '
  - type: note
    content: Or “the oak [cluster of oaks] of Moreh [oracle giver, instruction].” Undoubtedly, this was a place of mystery, and it was so famous that people used the tree as a landmark. See Deut. 11:30. At the great tree of Moreh, Yahweh taught Abram to walk by faith, not by sight. God will lead us to a place of true strength (Shechem) and instruct our hearts (Moreh) to trust in him alone.
  - type: text
    content: At that time, the Canaanites were also in the land.
  '7':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' appeared '
  - type: note
    content: Or “made himself visible.” Scripture records at least nine appearances of God (theophanies) to Abraham (see Acts 7:2). The first was while he was still in Ur (see Gen. 12:1–3). See also Gen. 13:14–16; 15; 17; 18; 21:12–13; 22:1–2, 15–18.
  - type: text
    content: 'before Abram and said, “This is the land I will personally deliver to your seed.” '
  - type: note
    content: Or “to your future descendants.” God’s divine declaration assigned the land of Israel to Abram and his descendants. See Rom. 4:13; Heb. 11:12.
  - type: text
    content: 'So Abram erected an altar there to '
  - type: text
    content: Yahweh
  - type: text
    content: ', who had appeared before him. '
  '8':
  - type: text
    content: 'From there, he journeyed on toward the hill country east of Bethel '
  - type: note
    content: Bethel means “House of God.” This is modern Beitin, a city about eleven miles north of Jerusalem. It is clear Abram adored Yahweh and was faithful to his voice.
  - type: text
    content: 'and pitched his tent '
  - type: note
    content: While Abram lived in a tent without foundations, he was looking and waiting for a city with unshakable foundations (see Heb. 11:10). Likewise, we are living in the “tent” of church life today, waiting for its ultimate consummation—the New Jerusalem, the City of God with foundations. Paul, the Abraham of the New Testament, was a tentmaker.
  - type: text
    content: 'with Bethel on the west and Ai '
  - type: note
    content: Ai means “the heap of ruins.” It is often identified as et-Tell, which was about a mile from ancient Bethel. See Josh. 7:2–8:28. Bethel is the House of God; Ai (the world) is a heap of ruins. The House of God is drawing us in. We must turn our backs forever on the old creation life, which is nothing more than a heap of ruins!
  - type: text
    content: 'on the east. And there he built '
  - type: text
    content: another
  - type: text
    content: ' altar to '
  - type: text
    content: Yahweh
  - type: text
    content: ' where he prayed and worshiped '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: note
    content: Or “and he called upon the name of Yahweh,” which implies both prayer and offering a sacrifice.
  '9':
  - type: text
    content: Then Abram journeyed from there by stages through the southern desert region.
  - type: note
    content: That is, the Negev. Abram had traversed the entire length of Israel from north to south.
  - type: heading
    content: Abram Detours to Egypt
