document_id: PSA.29,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Glory-God Thunders
  - type: text
    content: King David’s poetic praise to God for the last days
  - type: text
    content: The Feast of Tabernacles
  - type: note
    content: The additional words of the inscription are found in the Septuagint. Ps. 29 is one of the loveliest poems ever written. It is pure and unrestrained praise. The name Yahweh is found eighteen times in eleven verses. David was a prophetic seer, and this psalm can properly be interpreted to speak of God’s majesty revealed in the last days.
  - type: text
    content: 'Proclaim his majesty, all you mighty sons of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: note
    content: Mighty sons of Yahweh in Hebrew is beni ‘elim. ‘Elim is from the root word elah, which is the word for “God,” “gods,” “mighty warriors,” “mighty men,” “heroes,” “angels,” and “heavenly beings,” and could be used to describe anyone who shows any strength or power.
  - type: text
    content: giving all the glory and strength back to him!
  '10':
  - type: text
    content: 'Above the furious flood, '
  - type: note
    content: The Hebrew word for “flood” is found thirteen times in the Bible and is always used in connection to man’s rebellion and turning away from God. Thirteen is the biblical number signifying apostasy. Sitting as King, he rules even over the dark flood of evil to make it end.
  - type: text
    content: the Enthroned One reigns,
  - type: text
    content: the King-God rules with eternity at his side.
  '11':
  - type: text
    content: This is the one who gives his strength and might to his people.
  - type: text
    content: This is the Lord giving us his kiss of peace.
  - type: note
    content: In Jewish synagogues this psalm is read on the first day of the Feast of Pentecost. The Christian church was born on Pentecost two thousand years ago when the mighty “storm” of the Spirit came into the upper room. See Acts 2. The last word of this psalm is “peace.” It begins with a storm, but God brings his people peace even in the midst of storms.
  '2':
  - type: text
    content: Be in awe before his majesty.
  - type: text
    content: Be in awe before such power and might!
  - type: text
    content: 'Come worship wonderful '
  - type: text
    content: Yahweh
  - type: text
    content: ', arrayed in all his splendor,'
  - type: text
    content: bowing in worship as he appears in the beauty of holiness.
  - type: text
    content: Give him the honor due his name.
  - type: text
    content: Worship him wearing the glory-garments
  - type: text
    content: of your holy, priestly calling!
  '3':
  - type: text
    content: The voice of the Lord echoes through the skies and seas.
  - type: text
    content: The Glory-God reigns as he thunders in the clouds.
  - type: text
    content: So powerful is his voice, so brilliant and bright—
  - type: text
    content: how majestic as he thunders over the great waters!
  - type: note
    content: The sea (“great waters”) is a term often used in the Bible to symbolize the sea of humanity. See Isa. 57:20; Rev. 17:15.
  '5':
  - type: text
    content: His tympanic thunder topples the strongest of trees.
  - type: note
    content: Trees in the Bible are symbols used for men. The strongest of men are toppled and bowed down when the Glory-God speaks.
  - type: text
    content: His symphonic sound splinters the mighty forests.
  '6':
  - type: text
    content: 'Now he moves Zion’s '
  - type: note
    content: Or “Sirion” (Mount Hermon), an ancient term for Mount Zion. See Ps. 133.
  - type: text
    content: mountains by the might of his voice,
  - type: text
    content: shaking the snowy peaks with his earsplitting sound!
  '7':
  - type: text
    content: The lightning-fire flashes, striking as he speaks.
  '8':
  - type: text
    content: God reveals himself when he makes the fault lines quake,
  - type: text
    content: shaking deserts, speaking his voice.
  '9':
  - type: text
    content: God’s mighty voice makes the deer to give birth.
  - type: note
    content: Or “God’s mighty voice makes the oaks to whirl.”
  - type: text
    content: His thunderbolt-voice lays the forest bare.
  - type: text
    content: In his temple all fall before him with each one shouting,
  - type: text
    content: “Glory, glory, the God of glory!”
  - type: note
    content: The Septuagint reads “Those who give him glory he carries to his house.”
