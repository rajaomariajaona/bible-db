document_id: PSA.59,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Protect Me
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: King David’s song of instruction composed when Saul set an ambush for him at his home
  - type: note
    content: This incident is recorded in 1 Sam. 19:11–18.
  - type: text
    content: To the tune of “Do Not Destroy”
  - type: text
    content: My God, protect me!
  - type: text
    content: Keep me safe from all my enemies, for they’re coming to kill me.
  - type: text
    content: Put me in a high place out of their reach—
  - type: text
    content: a place so high that these assassins will never find me.
  '10':
  - type: text
    content: The God of passionate love will meet with me.
  - type: text
    content: My God will empower me to rise in triumph over my foes.
  '11':
  - type: text
    content: Don’t kill them; stagger them all with a vivid display of power
  - type: text
    content: and scatter them with your armies of angels,
  - type: text
    content: O mighty God, our protector!
  - type: text
    content: Use your awesome power to make them wanderers and vagabonds
  - type: text
    content: and then bring them down.
  '12':
  - type: text
    content: They are nothing but proud, cursing liars.
  - type: text
    content: They sin in every word they speak, boasting in their blasphemies!
  '13':
  - type: text
    content: May your wrath be kindled to destroy them; finish them off!
  - type: text
    content: Make an end of them and their deeds until they are no more!
  - type: text
    content: Let them all know and learn
  - type: text
    content: that God is the ruler over Jacob,
  - type: text
    content: the God-King over all the earth!
  - type: text
    content: Pause in his presence
  '14':
  - type: text
    content: Here they come again—
  - type: text
    content: prowling, growling like a pack of stray dogs in the city.
  '15':
  - type: text
    content: Drifting, devouring, and coming in for the kill,
  - type: text
    content: they refuse to sleep until they’ve eaten their fill.
  '16':
  - type: text
    content: But as for me, your strength shall be my song of joy.
  - type: text
    content: At each and every sunrise, my lyrics of your love will fill the air!
  - type: text
    content: For you have been my glory-fortress,
  - type: text
    content: a stronghold in my day of distress.
  '17':
  - type: text
    content: O my strength, I sing with joy your praises.
  - type: text
    content: O my stronghold, I sing with joy your song!
  - type: text
    content: O my Savior, I sing with joy the lyrics of your faithful love for me!
  '2':
  - type: text
    content: Save me from these murdering men, these bloodthirsty killers.
  '3':
  - type: text
    content: See how they set an ambush for my life.
  - type: text
    content: They’re fierce men ready to launch their attack against me.
  - type: text
    content: 'O Lord, I’m innocent; '
  - type: text
    content: protect me
  - type: text
    content: '!'
  '4':
  - type: text
    content: I’ve done nothing to deserve this,
  - type: text
    content: yet they are already plotting together to kill me.
  - type: text
    content: Arise, Lord, see what they’re scheming, and come and meet with me.
  '5':
  - type: text
    content: Awaken, O God of Israel!
  - type: text
    content: Commander of Angel Armies,
  - type: text
    content: arise to punish these treacherous people who oppose you!
  - type: text
    content: Don’t go soft on these hard-core killers!
  - type: text
    content: Pause in his presence
  '6':
  - type: text
    content: After dark they came to spy, sneaking around the city,
  - type: text
    content: snarling, prowling like a pack of stray dogs in the night—
  '7':
  - type: text
    content: boiling over with rage, shouting out their curses,
  - type: text
    content: convinced that they’ll never get caught.
  '8':
  - type: text
    content: But you, Lord, break out laughing at their plans,
  - type: text
    content: amused by their arrogance, scoffing at their sinful ways.
  '9':
  - type: text
    content: My strength is found when I wait upon you.
  - type: text
    content: Watch over me, God, for you are my mountain fortress;
  - type: text
    content: you set me on high!
