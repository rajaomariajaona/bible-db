document_id: PSA.59,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Protect Me
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: King David’s song of instruction composed when Saul set an ambush for him at his home
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '59'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This incident is recorded in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Sam. 19:11–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the tune of “Do Not Destroy”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My God, protect me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep me safe from all my enemies, for they’re coming to kill me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put me in a high place out of their reach—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a place so high that these assassins will never find me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The God of passionate love will meet with me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My God will empower me to rise in triumph over my foes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t kill them; stagger them all with a vivid display of power
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and scatter them with your armies of angels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O mighty God, our protector!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Use your awesome power to make them wanderers and vagabonds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and then bring them down.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are nothing but proud, cursing liars.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sin in every word they speak, boasting in their blasphemies!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May your wrath be kindled to destroy them; finish them off!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make an end of them and their deeds until they are no more!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them all know and learn
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that God is the ruler over Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the God-King over all the earth!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Here they come again—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prowling, growling like a pack of stray dogs in the city.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drifting, devouring, and coming in for the kill,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they refuse to sleep until they’ve eaten their fill.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But as for me, your strength shall be my song of joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At each and every sunrise, my lyrics of your love will fill the air!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you have been my glory-fortress,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a stronghold in my day of distress.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O my strength, I sing with joy your praises.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O my stronghold, I sing with joy your song!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O my Savior, I sing with joy the lyrics of your faithful love for me!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me from these murdering men, these bloodthirsty killers.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See how they set an ambush for my life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re fierce men ready to launch their attack against me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O Lord, I’m innocent; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: protect me
    - type: text
      text: '!'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve done nothing to deserve this,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet they are already plotting together to kill me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arise, Lord, see what they’re scheming, and come and meet with me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Awaken, O God of Israel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Commander of Angel Armies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: arise to punish these treacherous people who oppose you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t go soft on these hard-core killers!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: After dark they came to spy, sneaking around the city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: snarling, prowling like a pack of stray dogs in the night—
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: boiling over with rage, shouting out their curses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: convinced that they’ll never get caught.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you, Lord, break out laughing at their plans,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amused by their arrogance, scoffing at their sinful ways.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My strength is found when I wait upon you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Watch over me, God, for you are my mountain fortress;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you set me on high!
