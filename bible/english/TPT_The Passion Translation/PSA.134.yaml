document_id: PSA.134,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: The Night Watch
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of the stairway
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: All his loving priests who serve and sing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: come and sing your song of blessing to God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come and stand before him in the house of God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: throughout the night watch,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: lifting up your hands in holy worship; come and bless the Lord!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: May the Lord, whom you worship,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the mighty maker of heaven and earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bless you from Zion’s glory!
