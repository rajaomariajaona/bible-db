document_id: PSA.134,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Night Watch
  - type: text
    content: A song of the stairway
  - type: text
    content: All his loving priests who serve and sing,
  - type: text
    content: come and sing your song of blessing to God.
  - type: text
    content: Come and stand before him in the house of God
  - type: text
    content: throughout the night watch,
  '2':
  - type: text
    content: lifting up your hands in holy worship; come and bless the Lord!
  '3':
  - type: text
    content: May the Lord, whom you worship,
  - type: text
    content: the mighty maker of heaven and earth,
  - type: text
    content: bless you from Zion’s glory!
