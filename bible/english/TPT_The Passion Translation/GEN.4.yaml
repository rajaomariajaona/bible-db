  - type: text
    content: ' was not pleased, '
  - type: note
    content: Cain’s heart and character were not right with God (see footnote on Prov. 15:8). Some believe Cain picked inferior portions of produce (no mention of firstfruits) to offer to God, much like trying to please God with good works without faith. The curse could not be broken by a product of the curse. See Rom. 4:4–5; Heb. 11:6.
