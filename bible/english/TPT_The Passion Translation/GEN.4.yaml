    content: 'outside the door '
  - type: text
    content: of your heart
  - type: text
    content: .
  - type: text
    content: It desires to have you, yet you must be its master.”
  '8':
  - type: text
    content: One day
  - type: text
    content: ' Cain said to his brother, “Let’s go out into the field.” '
  - type: note
    content: The words of Cain are missing from most Hebrew manuscripts but are found in the Samaritan Pentateuch, Septuagint, Vulgate, and Syriac.
  - type: text
    content: When they arrived at the field, Cain rose and attacked and killed his brother Abel.
  '9':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to Cain, “Where is your brother Abel?”'
  - type: text
    content: He answered, “How do I know? Am I my brother’s keeper?”
  - type: note
    content: Or “guardian.” In a sense, Cain was saying about his shepherd-brother, “Am I the shepherd’s shepherd?”
