  - type: note
    content: Or “to gaze upon [with favor and devotion].” It is possible that fire from heaven consumed Abel’s offering as a sign that God was pleased and accepted Abel’s blood sacrifice (see Lev. 9:24; Judg. 6:21). God also gazed upon Abel’s heart and saw his longings and was pleased, for Abel offered a sacrifice to God with faith. See Heb. 11:4.
  - type: text
