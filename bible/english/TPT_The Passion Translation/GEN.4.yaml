        text: Or “bloods” or “drops of blood.” Blood crying is a symbol of the soul crying out for the right to live, demanding for the punishment of the murderer. Bloodguilt calls for justice, even from the ground. It is as if the face of the earth blushes as it becomes stained by blood. Blood (spilled) outside the body is always plural in Hebrew, “Your brother’s bloods.” This speaks of his descendants that could have lived—their blood, too, cried out against Cain. The blood of Abel cried out for vengeance, but the blood of Christ cries out for mercy and pardon. Therefore the blood of Christ speaks a better word than the blood of Abel (see
