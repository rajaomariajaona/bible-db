  '7':
  - type: text
    content: If you offer what is right, won’t you be accepted?
  - type: note
    content: Or literally, “If you do well, uplifting?” Scholars consider this verse to be one of the more difficult verses in Genesis to translate. The implication is that God would lift up Cain with favor (forgiveness) and accept Cain if he did well by bringing an acceptable offering. This is not condemnation, but an invitation for Cain to change his ways. The Hebrew word for “uplifting” is taken from the root word nasa’, which means “to carry away,” “to take away,” “to lift up,” “to bear [iniquity],” or “to forgive.” Abel’s works were righteous, and Cain’s works were evil. See 1 John 3:12.
  - type: text
    content: But if you refuse to offer what is right,
  - type: text
    content: 'sin, '
  - type: text
    content: the predator
  - type: text
    content: ', is crouching in wait '
  - type: note
    content: Or “crouching” or “resting outside the portal.” The Akkadian word for “crouching” (rabisu) is frequently associated with a demon. Sin is seen as a demon-beast crouching at the door of Cain’s heart. However, the word for “sin” can also mean “sin offering.” God could be telling Cain that there is a sin offering, as a resting lamb, lying outside his door to be the acceptable sacrifice. They were opening a portal to the presence of God. If the sacrifice was accepted, the portal (Hb. patach) to God’s presence would open. Both sin and Jesus are knocking on our hearts’ doors waiting to come in. See Rev. 3:20.
