  - type: text
    content: ' and pray to him.'
  - type: note
    content: Or “call upon his name,” a biblical description of prayer that includes praise and worship. The name Yahweh expresses his personality, “He who Is and Causes to Be,” and reveals his desire to commune with human beings.
  '3':
  - type: text
    content: 'After some time passed, '
  - type: note
    content: Or literally, “From the end days.” In contrast, Abel brought the firstfruits (firstborn), while Cain brought the leftovers. He gave Yahweh his leftovers after he had satisfied himself. This is one reason why his offering was rejected.
  - type: text
    content: 'Cain presented an offering to '
  - type: text
