  - type: text
    content: ' from the produce of the land. '
  '4':
  - type: text
    content: 'Abel also brought his offering, from among the finest '
  - type: note
    content: Or “fattest.” Many Jewish scholars believe it was a lamb that Abel sacrificed to God. Sheep were not used for food prior to the flood (see Gen. 1:29), only for sacrifice.
  - type: text
