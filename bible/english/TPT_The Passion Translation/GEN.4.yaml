  '1':
  - type: heading
    content: The Story of Cain and Abel
  - type: text
    content: 'Now Adam had slept '
  - type: note
    content: Or “knew his wife.” The Hebrew word for “knew” is yada’ and carries the implication of knowing intimately and experientially and implies a special relationship (i.e., sexually). It is possible that Eve’s conception of Cain had taken place while they were still in the garden, which is also implied in Gen. 3:20.
  - type: text
    content: 'with his wife, and she conceived and bore a son named Cain. '
  - type: note
    content: Cain means “possessed” or “smith [fabricator].” Some have surmised that since God prophesied a coming “seed” of the woman, Eve believed that Cain was that promised deliverer. The triliteral root of the Hebrew verb qanah is the same root for the name Cain. Although the meaning of Cain is uncertain, some believe it could mean “acquired [one]” or “possession.” Some Hebrew scholars believe a more accurate translation would read “I have brought forth a man-Yahweh [the God-man],” meaning Eve believed the promise about her “seed” (Gen. 3:15) and presumed that Cain was the promised one. What a disappointment when Cain became a murderer!
  - type: text
    content: 'She said, “By '
  - type: text
    content: the grace of
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: Or “Together with Yahweh” or “By the help of Yahweh”; or literally, “I gained a man-Yahweh” or “I brought him from Yahweh.” This utterance by Eve is the first time anyone speaks the divine name in Scripture.
  - type: text
    content: 'I have birthed a man!” '
  '10':
  - type: text
    content: Yahweh
  - type: text
    content: ' said, “Listen—the voice of your brother’s blood '
  - type: note
    content: Or “bloods” or “drops of blood.” Blood crying is a symbol of the soul crying out for the right to live, demanding for the punishment of the murderer. Bloodguilt calls for justice, even from the ground. It is as if the face of the earth blushes as it becomes stained by blood. Blood (spilled) outside the body is always plural in Hebrew, “Your brother’s bloods.” This speaks of his descendants that could have lived—their blood, too, cried out against Cain. The blood of Abel cried out for vengeance, but the blood of Christ cries out for mercy and pardon. Therefore the blood of Christ speaks a better word than the blood of Abel (see Heb. 12:24).
  - type: text
    content: 'is crying out to me from the ground! What have you done? '
  '11':
  - type: text
    content: 'Now you are banished '
  - type: note
    content: Or “cursed [punished].”
  - type: text
    content: 'from the land, from the very ground that drank your brother’s blood from your hand! '
  - type: note
    content: Bloodguilt not only stains the conscience but also defiles the ground. See Num. 35:33. We are told to avoid the way of Cain (Judah [Jude] 11), which would include (1) offering God what is cursed, (2) jealous anger toward another, (3) refusing to repent, (4) murder, and (5) wandering away from God’s presence.
  '12':
  - type: text
    content: 'When you try to cultivate the ground it will no longer produce crops '
  - type: note
    content: Or “yield its strength.”
  - type: text
    content: for you; and you will be a fugitive, a homeless wanderer!”
  - type: note
    content: Or “you will be a totterer and a wanderer.” Alienation from God is the ultimate consequence of sin.
  '13':
  - type: text
    content: 'Cain said to '
  - type: text
    content: Yahweh
  - type: text
    content: ', “My punishment is more than I can bear! '
  - type: note
    content: Or “Is my sin too great to be forgiven?” (LXX). The Hebrew word ‘avon refers to sin and its punishment. The Hebrew can be translated “My sin [or “my punishment”] is too great to bear.”
  '14':
  - type: text
    content: Look—you’ve thrown me off the land today, and now I must hide from your presence. As a fugitive and wanderer on the earth, anyone who meets me may choose to kill me!”
  '15':
  - type: text
    content: Yahweh
  - type: text
    content: ' responded, “Not so! If anyone kills you, I promise the seven-fold '
  - type: note
    content: That is, seven times over—seven lives will be taken to avenge Cain’s death. Or it could mean seven generations will be avenged. The next murderer we find in Scripture is Lamech, the seventh generation from Cain. Jewish sages believe it was Lamech who killed his ancestor Cain.
  - type: text
    content: 'vengeance of Cain will be released upon him!” So, '
  - type: text
    content: Yahweh
  - type: text
    content: ' put an '
  - type: text
    content: identifying
  - type: text
    content: ' sign '
  - type: note
    content: Or “mark.” It could have been a visible mark upon Cain as a warning that he was under divine protection. See Ezek. 9:4, 6. However, it is also possible that God showed a supernatural, authenticating sign to confirm to Cain that he would not be harmed. Ancient rabbis taught that the mark of Cain was a horn that grew on his head.
  - type: text
    content: 'on Cain as a warning so that no one would dare kill him. '
  '16':
  - type: text
    content: 'Then Cain left the presence of '
  - type: text
    content: Yahweh
  - type: text
    content: ' and journeyed to the Land of Wandering, '
  - type: note
    content: Or “Nod,” the Hebrew word for “wandering,” likely a symbolic place. There was a span of 130 years from the creation of Adam to the murder of Abel, which would have allowed for other sons and daughters of Adam to have spread over the earth. Some have calculated there could have been over half a million people alive at that time. See Gen. 4:25; 5:3. Scripture does not mention the line of Cain after this chapter nor mention Cain’s death. Within Jewish tradition there is a reference to Cain marrying his sister. See Jubilees 4:9; Sanhedrin 58b.
  - type: text
    content: east of Eden.
  - type: heading
    content: The Family Line of Cain
  '17':
  - type: text
    content: 'Cain slept with his wife and she conceived and bore Enoch. '
  - type: note
    content: Enoch means “dedicated,” “teacher,” or “initiated.”
  - type: text
    content: 'Cain was building a city '
  - type: note
    content: Or “walled village.” God banished Cain to wander as a fugitive, but instead he built a city in rebellion to God.
  - type: text
    content: 'at the time, so he named it the Village of Enoch, after his son. '
  '18':
  - type: text
    content: 'Enoch’s son was Irad, '
  - type: note
    content: Irad means “city of witness,” “wild donkey,” or “fugitive.”
  - type: text
    content: 'and Irad’s son was Mehujael, '
  - type: note
    content: Mehujael means “God is combatting” or “smitten by God.” The Akkadian word mahlu means “ecstatic (seer).”
  - type: text
    content: 'and Mehujael’s son was Methushael, '
  - type: note
    content: Methushael means “my god is husband” or “man of god.” Some suggest it is taken from a word in Ugaritic, mutba’al, which means “man of Baal.” Others view it as “man of Shael” or “man of Sheol,” the underworld.
  - type: text
    content: and Methushael’s son was Lamech.
  - type: note
    content: Lamech means “overthrower” or “one who brings low.” The Arabic meaning of Lamech is “strongman.” Lamech, the first polygamist, was the seventh from Adam in the line of Cain. He denotes the antichrist spirit with his prideful boasting.
  '19':
  - type: text
    content: 'Lamech married two women, Dawn '
  - type: note
    content: Or “Adah,” which means “dawn,” possibly related to the Hebrew word ‘adi, meaning “jewel.”
  - type: text
    content: 'and Dusk. '
  - type: note
    content: Or “Zillah,” which means “dusk” or “shadow.”
  '2':
  - type: text
    content: 'Then later, she gave birth to Cain’s brother Abel. '
  - type: note
    content: Adam and Eve had many sons and daughters (see Gen. 5:4), but Cain and Abel seem to have been the two eldest. Jewish tradition holds that they were twins. Abel means “vanity,” “puff of air,” or “fading away to nothingness.” Perhaps this is because their hope for the Messiah had faded. Or maybe they saw from the thorns and thistles and hard ground that life was much more difficult outside the garden than inside, and their joy faded away. Paul tells us in Rom. 8:20 that the world was made subject to vanity (or “futility”). Adam and Eve saw this vanity firsthand and named their son Abel. The Syriac name for Abel means “herdsman.”
  - type: text
    content: 'Abel grew up to be a shepherd, and Cain became a farmer, working the ground. '
  - type: note
    content: Cain chose to work the ground, which was under the curse.
  '20':
  - type: text
    content: 'Dawn gave birth to Jabal, '
  - type: note
    content: Jabal means “nomad” or “flowing.”
  - type: text
    content: 'the first '
  - type: note
    content: Or “the father,” used also in v. 21.
  - type: text
    content: 'of those who lived in tents and raised livestock. '
  '21':
  - type: text
    content: 'Jabal’s brother was Jubal, '
  - type: note
    content: Jubal means “joyful sound.”
  - type: text
    content: 'the first of '
  - type: text
    content: musicians
  - type: text
    content: ' who played instruments. '
  - type: note
    content: Or “the harp [stringed instrument] and flute [wind instrument].” The Hebrew word for play means “to hold” or “to handle” and later became associated with “to play skillfully.” Jubal invented musical instruments and taught others to play them. See Job 21:12; 30:31. Musicians today should dedicate their gifts and talents to God for him to be glorified.
  '22':
  - type: text
    content: 'Dusk gave birth to Tubalcain, '
  - type: note
    content: Tubalcain means “flowing from Cain.” He invented and taught others metallurgy.
  - type: text
    content: the first of blacksmiths who forged all kinds of bronze and iron tools. His sister was Naamah.
  - type: note
    content: Naamah means “pleasant” or “gracious.” The triliteral root, n-‘-m can also mean “to sing.” At least one Targum reference describes her as a professional singer. Ancient Jewish writings suggest that Naamah became Noah’s wife.
  '23':
  - type: text
    content: 'Lamech boasted to his wives:'
  - type: note
    content: The form of v. 23–24 is the first example of poetry in the Bible, known as parallelism. Many Jewish scholars view this “Song of Lamech” as a summary of a larger poetic composition describing the exploits of Lamech.
  - type: text
    content: “Listen to me, Dawn and Dusk!
  - type: text
    content: Mark my words, O wives of Lamech!
  - type: text
    content: I have killed a man for wounding me,
  - type: text
    content: and a young man for bruising me.
  - type: note
    content: Or “I would kill a man for my wounding, in fact a boy for a bruise.” There is a Jewish legend that states that Lamech killed Cain. If Lamech was boasting that killing others will be his practice, he became the world’s first terrorist.
  '24':
  - type: text
    content: If killing Cain costs seven lives,
  - type: text
    content: for Lamech, it will cost seventy-seven!”
  - type: note
    content: See Matt. 18:21.
  '25':
  - type: text
    content: 'Adam slept with his wife again and she bore a son whom she named Seth, meaning “appointed,” for she declared, “God has appointed for me another son '
  - type: note
    content: Or “seed.”
  - type: text
    content: 'to replace Abel, because Cain killed him.” '
  '26':
  - type: text
    content: After many years
  - type: text
    content: ' Seth had a son named Enosh. '
  - type: note
    content: Enosh means “mortal” or “frail [man].” Seth humbly named his son Enosh, emphasizing the frailty of man.
  - type: text
    content: 'During his lifetime, people '
  - type: note
    content: Or “he [Enosh].” With Enosh and his family line, we see the restoration of a longing to commune with God.
  - type: text
