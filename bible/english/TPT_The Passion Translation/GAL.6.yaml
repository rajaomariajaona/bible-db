document_id: GAL.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Carry Each Other’s Burdens
  - type: text
    content: 'My beloved friends, if you see a believer who is overtaken with a fault, '
  - type: note
    content: Or “mistake.”
  - type: text
    content: 'the one who is in the Spirit should seek to restore him in the Spirit of gentleness. But keep watch over your own heart so that you won’t be tempted to exalt yourself over him. '
  - type: note
    content: Or “keep you from being harassed by the enemy.”
  '10':
  - type: text
    content: 'Take advantage of every opportunity to be a blessing to others, '
  - type: note
    content: The Greek text implies giving finances.
  - type: text
    content: especially to our brothers and sisters in the family of faith!
  - type: heading
    content: Summary and Conclusion
  '11':
  - type: text
    content: 'I’ve written this letter to you with my own handwriting—see how large I have to make the letters? '
  - type: note
    content: Evidently, Paul had to write using large letters due to an eye problem (ch. 4:15). Some Greek texts imply that only beginning with v. 11 does Paul write in his own handwriting. The Aramaic indicates the entire letter was written in his handwriting.
  '12':
  - type: text
    content: 'All those who insist that you be circumcised are recruiting you so they can boast in their own achievement. They seek to avoid the persecution that comes with preaching the liberating message of the cross of Messiah! '
  '13':
  - type: text
    content: Not even those who are circumcised keep every detail of the written law. Yet they push you to be circumcised so that they can boast that you have become like them.
  - type: note
    content: Or “so that they can boast about your flesh.”
  '14':
  - type: text
    content: 'May my only boast be found in the cross of our Lord Jesus Christ. In him I have been crucified to this natural realm; '
  - type: note
    content: Or “the world.”
  - type: text
    content: 'and the natural realm is dead to me '
  - type: text
    content: and no longer dominates my life
  - type: text
    content: .
  '15':
  - type: text
    content: 'Whether a man is circumcised or uncircumcised is meaningless to me. What really matters is the transforming power of this new creation life. '
  '16':
  - type: text
    content: And all those who live in agreement with this standard will have true peace and God’s delight, for they are the Israel of God.
  - type: note
    content: See ch. 3:7, 9, 29; Rom. 2:29; 4:12; 9:6–8; Phil. 3:3.
  '17':
  - type: text
    content: 'From now on, let no one cause me to suffer further, for I am carrying the very scars '
  - type: note
    content: The Aramaic word for “scars” can also mean “death marks” or “stigmata.”
  - type: text
    content: 'of our Lord Jesus in my body. '
  '18':
  - type: text
    content: 'Finally my beloved ones—may the wonderful grace of our Lord Jesus, the Anointed One, be flowing in your spirit. '
  - type: note
    content: Or “with your spirits.” See 2 Tim. 4:22.
  - type: text
    content: So shall it be!
  - type: text
    content: In Messiah’s love
  - type: text
    content: ','
  - type: text
    content: Paul
  '2':
  - type: text
    content: Love empowers us to
  - type: text
    content: ' fulfill the law of the Anointed One as we carry each other’s troubles. '
  '3':
  - type: text
    content: If you think you are somebody too important to stoop down to help another (when really you are not), you are living in deception.
  '4':
  - type: text
    content: 'Let everyone be devoted to fulfill the work God has given them to do with excellence, and their joy will be in doing what’s right and being themselves, and not in '
  - type: text
    content: being affirmed by
  - type: text
    content: ' others. '
  '5':
  - type: text
    content: 'Every believer is ultimately responsible for his or her own conscience. '
  - type: note
    content: As translated from the Aramaic.
  '6':
  - type: text
    content: And those who are taught the Word must share all good things with their teacher.
  - type: heading
    content: We Harvest What We Plant
  '7':
  - type: text
    content: 'God will never be mocked! For what you plant will always be the very thing you harvest. '
  '8':
  - type: text
    content: The harvest you reap reveals the seed that you planted
  - type: text
    content: '. If you plant the corrupt seeds of self-life into this natural realm, you can expect a harvest of corruption. If you plant the good seeds '
  - type: note
    content: These “good seeds” would include prayer, Bible study, speaking wise words, giving, loving, and dropping “seeds” of love and truth every day from our new creation life.
  - type: text
    content: 'of Spirit-life you will reap '
  - type: text
    content: beautiful fruits that grow
  - type: text
    content: ' from the everlasting life of the Spirit.'
  '9':
  - type: text
    content: 'And don’t allow yourselves to be weary in planting good seeds, for the season of reaping the wonderful harvest you’ve planted is coming! '
