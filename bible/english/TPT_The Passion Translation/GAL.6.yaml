document_id: GAL.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Carry Each Other’s Burdens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'My beloved friends, if you see a believer who is overtaken with a fault, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “mistake.”
    marker-yv: yv-n
  - type: text
    text: 'the one who is in the Spirit should seek to restore him in the Spirit of gentleness. But keep watch over your own heart so that you won’t be tempted to exalt yourself over him. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “keep you from being harassed by the enemy.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Love empowers us to
  - type: text
    text: ' fulfill the law of the Anointed One as we carry each other’s troubles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: If you think you are somebody too important to stoop down to help another (when really you are not), you are living in deception.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Let everyone be devoted to fulfill the work God has given them to do with excellence, and their joy will be in doing what’s right and being themselves, and not in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: being affirmed by
  - type: text
    text: ' others. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Every believer is ultimately responsible for his or her own conscience. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And those who are taught the Word must share all good things with their teacher.
- type: usfm
  marker: s1
  children:
  - type: text
    text: We Harvest What We Plant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'God will never be mocked! For what you plant will always be the very thing you harvest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: it
    children:
    - type: text
      text: The harvest you reap reveals the seed that you planted
  - type: text
    text: '. If you plant the corrupt seeds of self-life into this natural realm, you can expect a harvest of corruption. If you plant the good seeds '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These “good seeds” would include prayer, Bible study, speaking wise words, giving, loving, and dropping “seeds” of love and truth every day from our new creation life.
    marker-yv: yv-n
  - type: text
    text: 'of Spirit-life you will reap '
  - type: usfm
    marker: it
    children:
    - type: text
      text: beautiful fruits that grow
  - type: text
    text: ' from the everlasting life of the Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And don’t allow yourselves to be weary in planting good seeds, for the season of reaping the wonderful harvest you’ve planted is coming! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Take advantage of every opportunity to be a blessing to others, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text implies giving finances.
    marker-yv: yv-n
  - type: text
    text: especially to our brothers and sisters in the family of faith!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Summary and Conclusion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I’ve written this letter to you with my own handwriting—see how large I have to make the letters? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Evidently, Paul had to write using large letters due to an eye problem (ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:15
      metadata:
        usfm: GAL.4.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Some Greek texts imply that only beginning with v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: GAL.6.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: does Paul write in his own handwriting. The Aramaic indicates the entire letter was written in his handwriting.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'All those who insist that you be circumcised are recruiting you so they can boast in their own achievement. They seek to avoid the persecution that comes with preaching the liberating message of the cross of Messiah! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Not even those who are circumcised keep every detail of the written law. Yet they push you to be circumcised so that they can boast that you have become like them.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “so that they can boast about your flesh.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'May my only boast be found in the cross of our Lord Jesus Christ. In him I have been crucified to this natural realm; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the world.”
    marker-yv: yv-n
  - type: text
    text: 'and the natural realm is dead to me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and no longer dominates my life
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Whether a man is circumcised or uncircumcised is meaningless to me. What really matters is the transforming power of this new creation life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And all those who live in agreement with this standard will have true peace and God’s delight, for they are the Israel of God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
