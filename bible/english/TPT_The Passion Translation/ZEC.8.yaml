document_id: ZEC.8,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Promise of Restoration
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Zechariah uses this divine name,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: yahweh tsebaʾot
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', forty-seven times, seventeen times in this chapter alone. This name emphasizes God’s power, majesty, and sovereignty over not only the nations of earth but also the angelic armies of heaven.'
      marker-yv: yv-n
    - type: text
      text: 'spoke to me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For up till now, there was no money to hire men or animals; neither has there been security for people to come and go because I had turned them against each other. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now, I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, will not treat the remnant of this people as I have in the past. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For now they will plant in peace. Fresh dew will fall from the sky, and the soil will be fertile. Their vineyards will be lush and fruitful. I will grant the remnant of my people all these things. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Judah and Jerusalem, your names have been used as curses among all the nations, but now you will become the symbol of a blessing. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yes
    - type: text
      text: ', I will save you to be a blessing, so do not be afraid. Let your hearts be brave!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“For I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, say to you: Just as I determined to bring calamity when your ancestors made me angry and I showed no pity, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so now I have determined to treat Judah and Jerusalem well and make them prosperous. So do not be afraid!
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Here is what you must do: Speak the truth to one another. Pursue justice in your courts, and hand down verdicts that are sound. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Have no evil scheme in your hearts against one another. Do not take delight in committing perjury, for these are things that I hate, declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Answer to the Question on Fasting
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, spoke these words to me: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, say this to you: Instead of having days of fasting in the fourth, fifth, seventh, and tenth months, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, early summer, midsummer, autumn, and winter. Each of these fast days lamented catastrophic events surrounding the destruction of Jerusalem and the invasion of the land of Judah by Nebuchadnezzar and the Babylonian armies (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 52:6–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', fourth month;'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 25:8–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', fifth month;'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 41:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', seventh month;'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 39:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', tenth month).'
      marker-yv: yv-n
    - type: text
      text: the people of Judah are to have cheerful, joy-filled festivals. Simply live together peacefully and love truth.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prospect of Salvation
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, say to you: My heart burns with passion '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “jealousy.” For the English reader,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: jealousy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: often carries a negative connotation. Here we see God’s passion and caring love for Jerusalem and his people, but their waywardness has kept him from pouring his love out upon them.
      marker-yv: yv-n
    - type: text
      text: 'for Zion, and my jealousy for her makes me red-hot with anger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: toward her enemies
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, says this, “In the future, people from many nations and cities will come '
    - type: usfm
      marker: it
      children:
      - type: text
        text: streaming to Jerusalem
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Citizens of one city will say to the people of another city: ‘We must certainly go and worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, and seek his blessing. I am determined to go.’ ” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes, many peoples and many nations will worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, in Jerusalem and seek his blessing.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, says this, “In that day, there will be ten men who take hold of the robe of a Jew. They will come from all nations, speaking every language, and will say: ‘We have heard that God is with you! We want to go with you.’ ”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have this to say: I will return to Jerusalem and live there on Mount Zion. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I have returned to Jerusalem and live in Zion.”
      marker-yv: yv-n
    - type: text
      text: 'Then Jerusalem will be known as my faithful city '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, “the city filled with faithful people,” or “the city of truth.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 1:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
