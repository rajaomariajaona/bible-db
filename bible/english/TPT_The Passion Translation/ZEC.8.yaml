        children:
        - type: text
          text: '26'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and Zion as my holy mountain, the mountain of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, say to you: Men and women will once again sit in the parks and squares of Jerusalem, each with a staff '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to lean on
    - type: text
      text: ' because of their great age. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the parks and squares of the city will bustle with boys and girls playing outside.
  '6':
