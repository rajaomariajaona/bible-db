document_id: ZEC.8,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Promise of Restoration
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, '
  - type: note
    content: Zechariah uses this divine name, yahweh tsebaʾot, forty-seven times, seventeen times in this chapter alone. This name emphasizes God’s power, majesty, and sovereignty over not only the nations of earth but also the angelic armies of heaven.
  - type: text
    content: 'spoke to me, saying, '
  '10':
  - type: text
    content: 'For up till now, there was no money to hire men or animals; neither has there been security for people to come and go because I had turned them against each other. '
  '11':
  - type: text
    content: 'But now, I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, will not treat the remnant of this people as I have in the past. '
  '12':
  - type: text
    content: 'For now they will plant in peace. Fresh dew will fall from the sky, and the soil will be fertile. Their vineyards will be lush and fruitful. I will grant the remnant of my people all these things. '
  '13':
  - type: text
    content: 'Judah and Jerusalem, your names have been used as curses among all the nations, but now you will become the symbol of a blessing. '
  - type: text
    content: Yes
  - type: text
    content: ', I will save you to be a blessing, so do not be afraid. Let your hearts be brave!'
  '14':
  - type: text
    content: '“For I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, say to you: Just as I determined to bring calamity when your ancestors made me angry and I showed no pity, '
  '15':
  - type: text
    content: so now I have determined to treat Judah and Jerusalem well and make them prosperous. So do not be afraid!
  '16':
  - type: text
    content: '“Here is what you must do: Speak the truth to one another. Pursue justice in your courts, and hand down verdicts that are sound. '
  '17':
  - type: text
    content: 'Have no evil scheme in your hearts against one another. Do not take delight in committing perjury, for these are things that I hate, declares '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  - type: heading
    content: The Answer to the Question on Fasting
  '18':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, spoke these words to me: '
  '19':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, say this to you: Instead of having days of fasting in the fourth, fifth, seventh, and tenth months, '
  - type: note
    content: That is, early summer, midsummer, autumn, and winter. Each of these fast days lamented catastrophic events surrounding the destruction of Jerusalem and the invasion of the land of Judah by Nebuchadnezzar and the Babylonian armies (see Jer. 52:6–7, fourth month; 2 Kings 25:8–10, fifth month; Jer. 41:1–3, seventh month; Jer. 39:1, tenth month).
  - type: text
    content: the people of Judah are to have cheerful, joy-filled festivals. Simply live together peacefully and love truth.”
  - type: heading
    content: A Prospect of Salvation
  '2':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, say to you: My heart burns with passion '
  - type: note
    content: Or “jealousy.” For the English reader, jealousy often carries a negative connotation. Here we see God’s passion and caring love for Jerusalem and his people, but their waywardness has kept him from pouring his love out upon them.
  - type: text
    content: 'for Zion, and my jealousy for her makes me red-hot with anger '
  - type: text
    content: toward her enemies
  - type: text
    content: .
  '20':
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says this, “In the future, people from many nations and cities will come '
  - type: text
    content: streaming to Jerusalem
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Citizens of one city will say to the people of another city: ‘We must certainly go and worship '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, and seek his blessing. I am determined to go.’ ” '
  '22':
  - type: text
    content: 'Yes, many peoples and many nations will worship '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, in Jerusalem and seek his blessing.'
  '23':
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says this, “In that day, there will be ten men who take hold of the robe of a Jew. They will come from all nations, speaking every language, and will say: ‘We have heard that God is with you! We want to go with you.’ ”'
  '3':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have this to say: I will return to Jerusalem and live there on Mount Zion. '
  - type: note
    content: Or “I have returned to Jerusalem and live in Zion.”
  - type: text
    content: 'Then Jerusalem will be known as my faithful city '
  - type: note
    content: That is, “the city filled with faithful people,” or “the city of truth.” See Isa. 1:21, 26.
  - type: text
    content: 'and Zion as my holy mountain, the mountain of '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  '4':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, say to you: Men and women will once again sit in the parks and squares of Jerusalem, each with a staff '
  - type: text
    content: to lean on
  - type: text
    content: ' because of their great age. '
  '5':
  - type: text
    content: And the parks and squares of the city will bustle with boys and girls playing outside.
  '6':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, have this to say: If this seems too marvelous for the remnant of my people to believe today, remember this—is there anything too marvelous for me? '
  - type: note
    content: Or “It may seem marvelous to the remnant of this people in that day, but will it not seem marvelous to me?” See Gen. 18:14; Jer. 32:17, 27.
  - type: text
    content: 'For I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, have spoken.'
  '7':
  - type: text
    content: '“Here is what I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, say to you: Behold, I will rescue my people from the countries of the east and the west. '
  - type: note
    content: Babylonia and Persia were in the east with Egypt and Assyria in the west. However, east and west may stand for nations in every direction (see Pss. 50:1; 113:3; Isa. 59:19; Mal. 1:11).
  '8':
  - type: text
    content: 'I will bring them back to live in the heart of Jerusalem, and they will be my '
  - type: text
    content: beloved
  - type: text
    content: ' people, and I will be their faithful God.'
  - type: note
    content: This verse implies the restoration of the covenant between Yahweh and Israel. See Lev. 26:12; Jer. 7:23; 11:4; 24:7; Ezek. 11:20; 36:28; 37:23, 27.
  '9':
  - type: text
    content: '“This is what I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, have to say: '
  - type: text
    content: Be encouraged
  - type: text
    content: ', you who now hear these words spoken by the prophets who were there when the foundation was laid for the house of '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies. May your hearts be brave '
  - type: note
    content: Or “your hands be strengthened,” likely a figure of speech. See v. 13.
  - type: text
    content: 'so that the temple may be built. '
