document_id: MRK.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Handed Over to Pilate
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Before dawn that morning, the ruling priests, elders, religious scholars, and the entire Jewish council set in motion their plan against Jesus. They bound him in chains, took him away, and handed him over to Pilate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: it
    children:
    - type: text
      text: As Jesus stood in front of the Roman governor
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic identifies him as the Roman governor; the Greek is simply Pilate.
    marker-yv: yv-n
  - type: text
    text: Pilate asked him, “So, are you really the king of the Jews?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You have just spoken it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then the ruling priests, over and over, made bitter accusations against him, but he remained silent.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 53:7
      metadata:
        usfm: ISA.53.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Peter 2:23
      metadata:
        usfm: 1PE.2.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Pilate questioned him again. “Have you nothing to say? Don’t you hear these many allegations they’re making against you?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But Jesus offered no defense to any of the charges, much to the astonishment of Pilate.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus and Barabbas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Every year at Passover, it was the custom of the governor to pardon a prisoner and release him to the people—anyone they wanted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now, Pilate was holding in custody a notorious criminal named Barabbas, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The name Bar-Abbas is Aramaic and means “son of a father” or “son who is like his father.” He becomes a picture of every son of Adam, our father. The true Son of the Father was crucified that day. One man wanted a political revolution, the other a revolution of love filling the hearts of all men.
    marker-yv: yv-n
  - type: text
    text: 'one of the assassins '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “revolutionaries.”
    marker-yv: yv-n
  - type: text
    text: 'who had committed murder in an uprising. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The crowds gathered in front of Pilate’s judgment bench and asked him to release a prisoner to them, as was his custom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So he asked them, “Do you want me to release to you the king of the Jews?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: (Pilate was fully aware that the religious leaders had handed Jesus over to him because of spite and envy.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But the ruling priests stirred up the crowd to incite them to ask for Barabbas instead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So Pilate asked them, “What do you want me to do with this one you call the king of the Jews?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They all shouted back, “Crucify him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Why?” Pilate asked. “What evil thing has he done wrong to deserve that?” But they kept shouting out with a deafening roar, “Crucify him at once!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Because he wanted to please the people, Pilate released Barabbas to them. After he had Jesus severely beaten with a whip made of leather straps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and embedded with metal
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was a tortuous beating with a leather whip that had sharp pieces of bone and metal at the end of its lashes, designed to inflict severe pain.
    marker-yv: yv-n
  - type: text
    text: he sentenced him to be crucified.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Jewish death penalty was by stoning. It was the Roman practice to crucify only the worst of criminals. To have Jesus crucified was not only the fulfillment of Old Testament prophecies (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 3:13
      metadata:
        usfm: GAL.3.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 53:5–8
      metadata:
        usfm: ISA.53.5+ISA.53.6+ISA.53.7+ISA.53.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) but also the fulfillment of Jesus’ own words concerning the mode of his death (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 3:14
      metadata:
        usfm: JHN.3.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:28
      metadata:
        usfm: JHN.8.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:32
      metadata:
        usfm: JHN.12.32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), which would not have been fulfilled by stoning.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Soldiers Mock Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The soldiers took Jesus into the headquarters of the governor’s compound '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “praetorium.”
    marker-yv: yv-n
  - type: text
    text: 'and summoned a military unit of nearly six hundred men. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, a Roman cohort (battalion), which was the tenth part of a Roman legion of about six thousand men.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'They placed a purple robe on him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to make fun of him
  - type: text
    text: '. Then they braided a victor’s crown, a wreath made of thorns, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Thorns are an emblem of the curse of sin. Jesus took the curse for us. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 3:17–18
      metadata:
        usfm: GEN.3.17+GEN.3.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 3:13
      metadata:
        usfm: GAL.3.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and set it on his head. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And with a mock salute they repeatedly cried out, “Hail, your majesty, king of the Jews!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They spit in his face and hit him repeatedly on his head with a reed staff, driving the crown of thorns deep into his brow. They knelt down before him in mockery, pretending to pay him homage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When they finished ridiculing him, they took off the purple robe, put his own clothes back on him, and led him away to be crucified.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Crucifixion of Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'As they came out of the city, they stopped an African man named Simon, a native of Libya. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “from Cyrene,” which is present-day Tripoli, Libya. Cyrene was a Greek colony that had a great number of Jews who had been forced to live there during the reign of Ptolemy Soter (323–285 BC). Church tradition states that Simon’s two sons became powerful missionaries for Jesus Christ. Their mention here might indicate that they were notable among the early Christians. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 16:13
      metadata:
        usfm: ROM.16.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . It is also possible that Simon himself could be linked to the “believers from Cyprus and Cyrene” who were evangelists to the Syrians, mentioned in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 11:20
      metadata:
        usfm: ACT.11.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'He was passing by, just coming in from the countryside with his two sons, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the father of two sons,” who, by implication, were with him at that time. Church tradition states that their names were Rufus and Alexander who became missionaries preaching the message of Christ. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 16:13
      metadata:
        usfm: ROM.16.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alexander and Rufus, and the soldiers forced him to carry the heavy crossbeam for Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'They brought Jesus to the execution site called Golgotha, which means “Skull Hill.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word is “Golgotha” (Mark uses a variant dialectic form, “Gajultha”). This is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: calvaria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: in Latin, or “Calvary.” David took Goliath’s head (Goliath and Golgotha are taken from the same root word) and buried it outside of Jerusalem (
    - type: text
      text: 1 Sam. 17:54
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Some believe this is where the hill got its name, Golgotha (the place of the skull). The cross has to pierce the place of the skull for our minds to submit to the revelation of the cross.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'There they offered him a mild painkiller, a drink of wine mixed with gall, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 69:21
      metadata:
        usfm: PSA.69.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: but he refused to drink it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'They nailed his hands and feet to the cross. The soldiers divided his clothing among themselves by rolling dice '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, they cast lots. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 22:18
      metadata:
        usfm: PSA.22.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'to see who would win them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'It was nine o’clock in the morning '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the third hour” (of the day).
    marker-yv: yv-n
  - type: text
    text: 'when they finally crucified him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Above his head they placed a sign with the inscription of the charge against him, which read, “This is the King of the Jews.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Two criminals were also crucified with Jesus, one on each side of him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'This fulfilled the Scripture that says:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: He was considered to be a criminal.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 53:12
      metadata:
        usfm: ISA.53.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Although this verse is not found in some of the early and reliable Greek manuscripts, the majority of manuscripts do include it, and it is also found in the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Those who passed by shook their heads and spitefully ridiculed him, saying, “Aha! You boasted that you could destroy the temple and rebuild it in three days. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus never said that he would destroy the temple, but that it would be destroyed by others.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Why don’t you save yourself now? Just come down from the cross!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Even the ruling priests and the religious scholars joined in the mockery '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pss. 22:17
      metadata:
        usfm: PSA.22.17
    - type: usfm
      marker: ft
      children:
