      text: 'them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with kindness
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They remember you and cherish your ways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You showed your anger
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when we sinned again and again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet we can be saved.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 64:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or, as a question, “How can we be saved?” There is no verse in Isaiah that is more perplexing and difficult to translate than this one. The exact Hebrew meaning is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sin Is Our Problem
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have all become contaminated with sin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you see our self-righteousness as nothing better
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than a menstrual rag.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are all like fallen leaves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and our sins sweep us away like the wind.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 64:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The implication is that we are whirled along by the wind of our sins.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one calls on your name
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or presses in to lay hold of you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you have hidden your face from us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have let us be ruined '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 64:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “melted.”
      marker-yv: yv-n
    - type: text
      text: by our own sins.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Master Potter
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet still, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', you are our Father.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are like clay and you are our Potter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Each one of us is the creative, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: artistic
    - type: text
      text: ' work of your hands.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', don’t be angry with us!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t remember our sins again forever!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Please look at us; we are your people.
