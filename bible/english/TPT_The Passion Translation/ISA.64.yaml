  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who delight in doing what is right—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'you go out to meet '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 64:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
