  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you did amazing wonders we didn’t expect,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you came down,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and mountains shuddered in your presence!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These amazing things had never been heard of before;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you did things never dreamed of!
  - type: usfm
