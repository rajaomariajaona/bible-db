document_id: ISA.64,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Cry for Revival
  - type: text
    content: God
  - type: text
    content: ', if only you would tear open'
  - type: text
    content: the heavenly realm and come down!
  - type: text
    content: How the mountains would tremble
  - type: note
    content: See Judg. 5:5; Hab. 3:6. Mountains can also symbolize governments and kingdoms. There is one King and one kingdom that rises above every other mountain (see Isa. 2:1–5).
  - type: text
    content: 'in your '
  - type: text
    content: awesome
  - type: text
    content: ' presence!'
  - type: note
    content: Or “before your faces.”
  '10':
  - type: text
    content: 'Your sacred cities are '
  - type: text
    content: abandoned
  - type: text
    content: ' like a desert;'
  - type: text
    content: Zion is a wasteland; Jerusalem sits in ruins.
  '11':
  - type: text
    content: Our holy temple, our source of pride,
  - type: text
    content: where our ancestors sang your praise,
  - type: text
    content: has been consumed by fire.
  - type: text
    content: All that we held dear has been destroyed.
  '12':
  - type: text
    content: 'Now, '
  - type: text
    content: Yahweh
  - type: text
    content: ', after all this, are you still unmoved?'
  - type: text
    content: Will you continue to stand silently by
  - type: text
    content: and afflict us so severely?
  '2':
  - type: text
    content: In the same way that fire sets kindling to blaze
  - type: text
    content: and causes water to boil,
  - type: text
    content: let the fire of your presence
  - type: text
    content: ' '
  - type: note
    content: Fire is a frequent metaphor for the presence of God. See Gen. 3:24; Ex. 3:1–2; Isa. 4:5; 6:6; 10:16–17; 29:6; 30:27, 30; 31:9; 33:14; 66:15–16; Acts 2:3; Heb. 12:29.
  - type: text
    content: come down.
  - type: text
    content: Reveal to your enemies your mighty name
  - type: text
    content: and cause the nations to tremble before you!
  '3':
  - type: text
    content: When you did amazing wonders we didn’t expect,
  - type: text
    content: you came down,
  - type: text
    content: and mountains shuddered in your presence!
  '4':
  - type: text
    content: These amazing things had never been heard of before;
  - type: text
    content: you did things never dreamed of!
  - type: text
    content: 'No one perceived '
  - type: text
    content: your greatness
  - type: text
    content: .
  - type: text
    content: No eye has ever seen a God like you,
  - type: note
    content: See 1 John 1:1–4.
  - type: text
    content: who intervenes for those
  - type: note
    content: Or “who works on behalf of those.”
  - type: text
    content: 'who wait and long '
  - type: note
    content: The Hebrew word chakah implies waiting with trusting anticipation (longing).
  - type: text
    content: for you!
  - type: note
    content: Or “him.” See Isa. 40:31; 1 Cor. 2:9–10.
  '5':
  - type: text
    content: Those who delight in doing what is right—
  - type: text
    content: 'you go out to meet '
  - type: note
    content: Or “you attack them [with kindness].”
  - type: text
    content: 'them '
  - type: text
    content: with kindness
  - type: text
    content: .
  - type: text
    content: They remember you and cherish your ways.
  - type: text
    content: You showed your anger
  - type: text
    content: when we sinned again and again,
  - type: text
    content: yet we can be saved.
  - type: note
    content: Or, as a question, “How can we be saved?” There is no verse in Isaiah that is more perplexing and difficult to translate than this one. The exact Hebrew meaning is uncertain.
  - type: heading
    content: Sin Is Our Problem
  '6':
  - type: text
    content: We have all become contaminated with sin,
  - type: text
    content: and you see our self-righteousness as nothing better
  - type: text
    content: than a menstrual rag.
  - type: text
    content: We are all like fallen leaves,
  - type: text
    content: and our sins sweep us away like the wind.
  - type: note
    content: The implication is that we are whirled along by the wind of our sins.
  '7':
  - type: text
    content: No one calls on your name
  - type: text
    content: or presses in to lay hold of you,
  - type: text
    content: for you have hidden your face from us.
  - type: text
    content: 'You have let us be ruined '
  - type: note
    content: Or “melted.”
  - type: text
    content: by our own sins.
  - type: heading
    content: The Master Potter
  '8':
  - type: text
    content: 'Yet still, '
  - type: text
    content: Yahweh
  - type: text
    content: ', you are our Father.'
  - type: text
    content: We are like clay and you are our Potter.
  - type: text
    content: 'Each one of us is the creative, '
  - type: text
    content: artistic
  - type: text
    content: ' work of your hands.'
  '9':
  - type: text
    content: Yahweh
  - type: text
    content: ', don’t be angry with us!'
  - type: text
    content: Don’t remember our sins again forever!
  - type: text
    content: Please look at us; we are your people.
