  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zion is a wasteland; Jerusalem sits in ruins.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our holy temple, our source of pride,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: where our ancestors sang your praise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: has been consumed by fire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All that we held dear has been destroyed.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now, '
    - type: usfm
      marker: nd
      children:
      - type: text
