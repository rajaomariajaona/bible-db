document_id: REV.16,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Seven Bowls Are Poured Out
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then I heard a loud voice from within the sanctuary telling the seven angels, “Go and pour out on the earth the seven bowls of the wrath '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word can be translated “passion.”
      marker-yv: yv-n
    - type: text
      text: of God.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The fifth angel poured his bowl on the throne of the wild beast, and its kingdom was plunged into darkness. People were in agony and gnawed their tongues '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and cursed the God of heaven because of their painful sores, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “because of their pains and sores.”
      marker-yv: yv-n
    - type: text
      text: refusing to repent of their deeds.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The sixth angel poured his bowl on “the good and abounding river,” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Euphrates,” which means “the good and abounding river.”
      marker-yv: yv-n
    - type: text
      text: 'and it completely dried up in order to prepare the way for the kings of the east. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “for the kings from the rising of the sun.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then I saw three unclean spirits like frogs belched from the mouths of the dragon, the wild beast, and the false prophet. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'They were demonic spirits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “demon-gods.”
      marker-yv: yv-n
    - type: text
      text: performing signs, and they entered into the kings of the world to draw them into battle on the great day of God, the Almighty.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Behold, I come
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “continually [repeatedly] come.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: like a thief! God’s blessing is with the one who remains awake and fully clothed
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: in me
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and will not walk about naked, exposed to disgrace.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The demonic spirits assembled the kings together at the place called in Hebrew the “Mount of the Governor.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Armageddon.” The Greek word for “Armageddon” comes from the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: meged
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which can be translated “precious fruit,” “excellent,” “choice things,” “pleasant things.” Armageddon can also be viewed as a realm where both good and evil is gathered together. The battle on God’s great day includes the war within the hearts of mankind.'
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The seventh angel poured out his bowl into the air, and a loud voice came out from the temple and from the throne, saying:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Here it comes!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “It has come to be” as in “to give birth.” The Greek word is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ginomai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (similar to our English word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: genome
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and is translated three times in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 7:3–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: as “married.”
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then there were flashes of lightning, voices, crashes of thunder, and a massive earthquake—the most severe to shake the earth since the creation of man, so tremendous was that earthquake! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'It split the great city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Babylon
    - type: text
      text: ' into three parts, and other cities of the nations collapsed. For God remembered great Babylon and her winecup filled with his fiery wrath. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: So the first angel poured his bowl upon the earth, causing ugly and painful sores to break out on the people who had the mark of the wild beast and worshiped his image.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Every island fled away and the mountains were no more. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Enormous hailstones, each weighing nearly one hundred pounds, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “weighing about a talent.” A talent was a monetary measure of gold, silver, or brass, believed to weigh about ninety-five pounds.
      marker-yv: yv-n
    - type: text
      text: fell from the sky and struck the people, yet they continued to curse God because of the horrendous plague of hail.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Then the second angel poured his bowl into the sea, and it became like the blood of the dead—every living thing in the sea died.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The third angel poured his bowl into the rivers and springs of water, and they became blood. And I heard the angel of the waters say:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “O holy One, who are and were, you are righteous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you have judged these things,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “because you have passed these judgments.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: because they shed the blood of your saints and prophets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They got what they deserved,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you gave them blood to drink!”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then I heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a voice from before
    - type: text
      text: ' the altar reply:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yes, O Lord God, the Almighty!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every judicial verdict you make is just and right.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then the fourth angel poured out his bowl on the sun, and it began to burn the people with a scorching heat. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Though they endured the fierce heat, yet the people continued to blaspheme God. They cursed the name of God, who had authority over these plagues, and refused to repent and give him glory.
