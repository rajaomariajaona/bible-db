document_id: REV.16,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Seven Bowls Are Poured Out
  - type: text
    content: 'Then I heard a loud voice from within the sanctuary telling the seven angels, “Go and pour out on the earth the seven bowls of the wrath '
  - type: note
    content: The Aramaic word can be translated “passion.”
  - type: text
    content: of God.”
  '10':
  - type: text
    content: 'The fifth angel poured his bowl on the throne of the wild beast, and its kingdom was plunged into darkness. People were in agony and gnawed their tongues '
  '11':
  - type: text
    content: 'and cursed the God of heaven because of their painful sores, '
  - type: note
    content: Or “because of their pains and sores.”
  - type: text
    content: refusing to repent of their deeds.
  '12':
  - type: text
    content: 'The sixth angel poured his bowl on “the good and abounding river,” '
  - type: note
    content: Or “Euphrates,” which means “the good and abounding river.”
  - type: text
    content: 'and it completely dried up in order to prepare the way for the kings of the east. '
  - type: note
    content: Or “for the kings from the rising of the sun.”
  '13':
  - type: text
    content: 'Then I saw three unclean spirits like frogs belched from the mouths of the dragon, the wild beast, and the false prophet. '
  '14':
  - type: text
    content: 'They were demonic spirits '
  - type: note
    content: Or “demon-gods.”
  - type: text
    content: performing signs, and they entered into the kings of the world to draw them into battle on the great day of God, the Almighty.
  '15':
  - type: text
    content: “Behold, I come
  - type: text
    content: ' '
  - type: note
    content: Or “continually [repeatedly] come.”
  - type: text
    content: like a thief! God’s blessing is with the one who remains awake and fully clothed
  - type: text
    content: ' '
  - type: text
    content: in me
  - type: text
    content: ' '
  - type: text
    content: and will not walk about naked, exposed to disgrace.”
  '16':
  - type: text
    content: The demonic spirits assembled the kings together at the place called in Hebrew the “Mount of the Governor.”
  - type: note
    content: Or “Armageddon.” The Greek word for “Armageddon” comes from the word meged, which can be translated “precious fruit,” “excellent,” “choice things,” “pleasant things.” Armageddon can also be viewed as a realm where both good and evil is gathered together. The battle on God’s great day includes the war within the hearts of mankind.
  '17':
  - type: text
    content: 'The seventh angel poured out his bowl into the air, and a loud voice came out from the temple and from the throne, saying:'
  - type: text
    content: “Here it comes!”
  - type: note
    content: Or “It has come to be” as in “to give birth.” The Greek word is ginomai (similar to our English word genome) and is translated three times in Rom. 7:3–4 as “married.”
  '18':
  - type: text
    content: 'Then there were flashes of lightning, voices, crashes of thunder, and a massive earthquake—the most severe to shake the earth since the creation of man, so tremendous was that earthquake! '
  '19':
  - type: text
    content: 'It split the great city '
  - type: text
    content: Babylon
  - type: text
    content: ' into three parts, and other cities of the nations collapsed. For God remembered great Babylon and her winecup filled with his fiery wrath. '
  '2':
  - type: text
    content: So the first angel poured his bowl upon the earth, causing ugly and painful sores to break out on the people who had the mark of the wild beast and worshiped his image.
  '20':
  - type: text
    content: 'Every island fled away and the mountains were no more. '
  '21':
  - type: text
    content: 'Enormous hailstones, each weighing nearly one hundred pounds, '
  - type: note
    content: Or “weighing about a talent.” A talent was a monetary measure of gold, silver, or brass, believed to weigh about ninety-five pounds.
  - type: text
    content: fell from the sky and struck the people, yet they continued to curse God because of the horrendous plague of hail.
  '3':
  - type: text
    content: Then the second angel poured his bowl into the sea, and it became like the blood of the dead—every living thing in the sea died.
  '4':
  - type: text
    content: 'The third angel poured his bowl into the rivers and springs of water, and they became blood. And I heard the angel of the waters say:'
  '5':
  - type: text
    content: “O holy One, who are and were, you are righteous,
  - type: text
    content: for you have judged these things,
  - type: note
    content: Or “because you have passed these judgments.”
  '6':
  - type: text
    content: because they shed the blood of your saints and prophets.
  - type: text
    content: They got what they deserved,
  - type: text
    content: for you gave them blood to drink!”
  '7':
  - type: text
    content: 'Then I heard '
  - type: text
    content: a voice from before
  - type: text
    content: ' the altar reply:'
  - type: text
    content: “Yes, O Lord God, the Almighty!
  - type: text
    content: Every judicial verdict you make is just and right.”
  '8':
  - type: text
    content: 'Then the fourth angel poured out his bowl on the sun, and it began to burn the people with a scorching heat. '
  '9':
  - type: text
    content: Though they endured the fierce heat, yet the people continued to blaspheme God. They cursed the name of God, who had authority over these plagues, and refused to repent and give him glory.
