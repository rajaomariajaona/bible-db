document_id: EZK.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Ezekiel Shaves His Hair
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: said
  - type: text
    content: ', “Son of man, take a sharp sword; use it like a barber’s razor and shave your head and beard. '
  - type: note
    content: The sharp sword is a metaphor for the king of Babylon. The hair of a priest was a mark of his consecration to serve God (see Lev. 19:27; 21:5). Shaving the head was a sign of humiliation (see 2 Sam. 10:4–5), catastrophe (see Jer. 41:5), and mourning (see Job 1:20; Isa. 22:12; Jer. 7:29).
  - type: text
    content: 'Then take scales and divide the hair '
  - type: text
    content: into three piles
  - type: text
    content: '. '
  '10':
  - type: text
    content: As a result, those of you who are parents will eat their children, and children will eat their parents. I will punish you and scatter what remains of you to the winds.
  '11':
  - type: text
    content: '“For as surely as I live, I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare: because you have defiled my sanctuary with all your horrible and loathsome practices, I will withdraw from you and will not even glance on you with pity or spare you. '
  '12':
  - type: text
    content: 'Inside Jerusalem, a third of your people will die of plague or starvation. Outside the city, a third will fall by the sword. And a third I will scatter to the winds and pursue with my sword. '
  '13':
  - type: text
    content: 'Then my anger will come to an end '
  - type: note
    content: Or literally “I will make my fury quiet.”
  - type: text
    content: 'and be fully spent against them, and then my '
  - type: text
    content: justice
  - type: text
    content: ' will have been satisfied. When I have carried out my anger against them, they will know how jealous I am for them. Afterward, they will know that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken in my zeal.'
  '14':
  - type: text
    content: '“Moreover, I will reduce you to a heap of ruins, an object of scorn to the surrounding nations, in the eyes of all who pass by. '
  '15':
  - type: text
    content: 'You will be mocked and insulted. Your downfall will be an appalling lesson to the surrounding nations. This will happen when I execute judgment on you in my furious anger and with my furious punishment. I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '16':
  - type: text
    content: '“I will release against them the deadly arrows of famine—arrows of destruction! Then I will make the famine even worse and cut off your food supply. '
  '17':
  - type: text
    content: 'I will send severe famine and wild animals against you to rob you of your children. Sickness and bloodshed will overtake you, and I will bring the sword down upon you. I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  '2':
  - type: text
    content: 'When the days of your siege are over, burn up a third in the midst of the city '
  - type: text
    content: of Jerusalem
  - type: text
    content: '. '
  - type: note
    content: The third of his hair that Ezekiel burns represents the people who will die at the time Jerusalem is destroyed (see 7:15).
  - type: text
    content: 'Take another third and chop it up with the sword around the perimeter of the tile-city. '
  - type: note
    content: This third of his hair represents those who will die by the sword when trying to escape Jerusalem.
  - type: text
    content: 'Then scatter the last third to the wind. I will pursue '
  - type: text
    content: those who escape the city
  - type: text
    content: ' with my sword. '
  - type: note
    content: This third of his hair represents those who escape Jerusalem, are scattered among the nations, but will later be killed (see Lev. 26:33).
  '3':
  - type: text
    content: 'Also keep back a few hairs and wrap them up in the folds of your cloak. '
  - type: note
    content: These few hairs represent the remnant that is spared (see Isa. 4:3).
  '4':
  - type: text
    content: 'And of those, take just a few hairs and throw them on the fire and burn them. '
  - type: note
    content: These few hairs represent some of the exiles who will still be destroyed.
  - type: text
    content: That fire will spread to all the people of Israel.”
  - type: note
    content: That is, God will continue to punish the people of Israel.
  - type: heading
    content: God Promises to Destroy Jerusalem
  '5':
  - type: text
    content: 'Listen to what the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: “This '
  - type: text
    content: represents
  - type: text
    content: ' Jerusalem. I have placed her in the center of the nations, encircled by foreign countries. '
  '6':
  - type: text
    content: 'Yet she has rebelled more wickedly against my ways '
  - type: note
    content: Or “regulations,” “decisions,” or “judgments.”
  - type: text
    content: and against my laws than the gentile nations that surround her. Indeed, she has deliberately rejected my commands and not kept my laws.”
  '7':
  - type: text
    content: 'Therefore, the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “Because you acted more wickedly than the nations around you, since you do not keep my laws or respect my commands, and since you do not respect even the moral standards of the surrounding nations, '
  - type: note
    content: As translated from the most reliable Hebrew manuscripts. However, a number of Hebrew manuscripts and the Syriac read “You have acted according to the laws of the nations around you.” That is, Israel not only exceeded the other nations in wickedness, but they also added heathen customs to their apostasy. See 11:12.
  '8':
  - type: text
    content: 'therefore, behold—I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare that I am against you. And I will pass my judgment on you for all the nations to see. '
  '9':
  - type: text
    content: 'Because of all your loathsome practices, I am coming against you more severely than I have ever done before or will ever do again. '
