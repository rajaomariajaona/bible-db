  - type: text
    text: Ezekiel Shaves His Hair
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: nd
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yahweh
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: said
  - type: text
    text: ', “Son of man, take a sharp sword; use it like a barber’s razor and shave your head and beard. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The sharp sword is a metaphor for the king of Babylon. The hair of a priest was a mark of his consecration to serve God (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 19:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 21:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Shaving the head was a sign of humiliation (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Sam. 10:4–5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), catastrophe (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 41:5
      metadata:
        usfm: JER.41.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), and mourning (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Job 1:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 22:12
      metadata:
        usfm: ISA.22.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 7:29
      metadata:
        usfm: JER.7.29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Then take scales and divide the hair '
  - type: usfm
    marker: it
    children:
    - type: text
      text: into three piles
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When the days of your siege are over, burn up a third in the midst of the city '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of Jerusalem
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The third of his hair that Ezekiel burns represents the people who will die at the time Jerusalem is destroyed (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:15
      metadata:
        usfm: EZK.7.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Take another third and chop it up with the sword around the perimeter of the tile-city. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This third of his hair represents those who will die by the sword when trying to escape Jerusalem.
    marker-yv: yv-n
  - type: text
    text: 'Then scatter the last third to the wind. I will pursue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: those who escape the city
  - type: text
    text: ' with my sword. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This third of his hair represents those who escape Jerusalem, are scattered among the nations, but will later be killed (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 26:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Also keep back a few hairs and wrap them up in the folds of your cloak. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These few hairs represent the remnant that is spared (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 4:3
      metadata:
        usfm: ISA.4.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And of those, take just a few hairs and throw them on the fire and burn them. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These few hairs represent some of the exiles who will still be destroyed.
    marker-yv: yv-n
  - type: text
    text: That fire will spread to all the people of Israel.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, God will continue to punish the people of Israel.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Promises to Destroy Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Listen to what the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says: “This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: represents
  - type: text
    text: ' Jerusalem. I have placed her in the center of the nations, encircled by foreign countries. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Yet she has rebelled more wickedly against my ways '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “regulations,” “decisions,” or “judgments.”
    marker-yv: yv-n
  - type: text
    text: and against my laws than the gentile nations that surround her. Indeed, she has deliberately rejected my commands and not kept my laws.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore, the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says, “Because you acted more wickedly than the nations around you, since you do not keep my laws or respect my commands, and since you do not respect even the moral standards of the surrounding nations, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the most reliable Hebrew manuscripts. However, a number of Hebrew manuscripts and the Syriac read “You have acted according to the laws of the nations around you.” That is, Israel not only exceeded the other nations in wickedness, but they also added heathen customs to their apostasy. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:12
      metadata:
        usfm: EZK.11.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'therefore, behold—I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', declare that I am against you. And I will pass my judgment on you for all the nations to see. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Because of all your loathsome practices, I am coming against you more severely than I have ever done before or will ever do again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: As a result, those of you who are parents will eat their children, and children will eat their parents. I will punish you and scatter what remains of you to the winds.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“For as surely as I live, I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', declare: because you have defiled my sanctuary with all your horrible and loathsome practices, I will withdraw from you and will not even glance on you with pity or spare you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Inside Jerusalem, a third of your people will die of plague or starvation. Outside the city, a third will fall by the sword. And a third I will scatter to the winds and pursue with my sword. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then my anger will come to an end '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “I will make my fury quiet.”
    marker-yv: yv-n
  - type: text
    text: 'and be fully spent against them, and then my '
  - type: usfm
    marker: it
    children:
    - type: text
      text: justice
  - type: text
    text: ' will have been satisfied. When I have carried out my anger against them, they will know how jealous I am for them. Afterward, they will know that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken in my zeal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Moreover, I will reduce you to a heap of ruins, an object of scorn to the surrounding nations, in the eyes of all who pass by. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You will be mocked and insulted. Your downfall will be an appalling lesson to the surrounding nations. This will happen when I execute judgment on you in my furious anger and with my furious punishment. I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“I will release against them the deadly arrows of famine—arrows of destruction! Then I will make the famine even worse and cut off your food supply. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I will send severe famine and wild animals against you to rob you of your children. Sickness and bloodshed will overtake you, and I will bring the sword down upon you. I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.”'
