    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “Of course he does,” Peter answered.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Peter walked into the house, and before he had a chance to speak, Jesus spoke up and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Peter, I have a question for you. Who pays tolls or taxes to a king? Is tax collected from the king’s own children, or from his subjects?”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “From his subjects,” Peter answered.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “That’s right. The children get off free without paying taxes.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But so that we don’t offend them, go to the lake and throw out your hook, and the first fish that rises up
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This miracle is a picture of the death and resurrection of our Lord Jesus. The depth of the sea speaks to us of the depth of suffering Jesus passed through for us on the cross. Note that the fish rose to the surface on its own; it was not “caught.” In the mouth of our Lord Jesus is the full price of our sin debt, for he has declared the work of redemption finished, and our “tax” has been paid in full. Now we have that same message in our mouths.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will have a coin in its mouth. It will be the exact amount you need to pay the temple tax for both of us.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peter made a presumptuous statement to the tax collectors that Jesus would pay the temple tax. But Peter didn’t ask Jesus first; he just said to them, “Of course!” Yet Jesus still backed up Peter’s word and performed a miracle to pay the tax. In this somewhat amusing account, Jesus got Peter “off the hook” by having him hook a fish with the exact amount of the tax for both Jesus and Peter. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then suddenly, Moses and Elijah appeared, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Moses represented the Law and Elijah represented the Prophets. Both Moses and Elijah were associated with Mount Sinai (Horeb), both had a ministry of performing astounding miracles, and both had unusual circumstances surrounding their passing from this life into glory.
      marker-yv: yv-n
    - type: text
      text: and they spoke with Jesus.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Peter blurted out, “Lord, it’s so wonderful that we are all here together! If you want, I’ll construct three shrines, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “tabernacles,” which speaks of the booths made to celebrate the Feast of Tabernacles.
      marker-yv: yv-n
    - type: text
      text: one for you, one for Moses, and one for Elijah.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew Matthew adds this line: “because he [Peter] did not know what he was saying.”'
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
