      marker-yv: yv-n
    - type: text
      text: 'He has epilepsy, and he suffers horribly from seizures. He often falls into the cooking fire or into the river. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew Matthew is “He grinds his teeth and foams at the mouth.”
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: I brought him to your followers, but they weren’t able to heal him.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Where is your faith? Can’t you see how wayward and wrong this generation is?
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew Matthew adds a sentence here: “Woe to those who deny me!”'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How much longer do I stay with you and put up with your doubts? Bring your son to me.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Then Jesus rebuked the demon and it came out of him and the boy was instantly healed!
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Later the disciples came to him privately and asked, “Why couldn’t we cast out the demon?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then Jesus’ appearance was dramatically altered. A radiant light as bright as the sun poured from his face. And his clothing became luminescent—dazzling like lightning. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “white as light.”
      marker-yv: yv-n
    - type: text
      text: 'He was transfigured '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Moses also went up Sinai’s mountain and received an impartation of glory. His face shone and had to be veiled. The transfiguration of Jesus is also part of our destiny, for the same Greek word is used twice for believers being transfigured by the renewing of our minds and by the glory of Christ within us that will complete our transformation into Christ’s image. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 12:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 3:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'before their very eyes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'He told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It was because of your lack of faith. I promise you, if you have faith inside of you no bigger than the size of a small mustard seed, you can say to this mountain, ‘Move away from here and go over there,’ and you will see it move!
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus compares faith to a small seed that grows into a large shrub. Faith will grow as it feeds on spiritual truth found in the Bible. A mountain can also be a symbol of a kingdom. Mountain-moving faith brings the power of God’s kingdom to the earth. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 13:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: There is nothing you couldn’t do!
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Nothing will be beyond your power.” The Aramaic can be translated “Nothing is higher or stronger than you.”
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But this kind is cast out only through prayer and fasting.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Hebrew Matthew, Aramaic, and some Greek manuscripts. Many reliable Greek manuscripts do not have this verse, and it is not included in many modern translations.
      marker-yv: yv-n
