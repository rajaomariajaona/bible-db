verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus’ Glorious Transfiguration
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Six days later Jesus took Peter and the two brothers, Jacob and John, and hiked up a high mountain to be alone. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: His disciples asked him, “Why do all the religious scholars insist that Elijah must first appear before the Anointed One comes?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'He answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “They’re right. Elijah must come first and restore all things.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But Elijah has already appeared. And yet they didn’t recognize him, so they did to him whatever they pleased. And the Son of Man is destined to suffer the same abuse as what they did to him.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then the disciples realized that Jesus was referring to John the Baptizer all along.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus was comparing Elijah with John the Baptist. John was not Elijah reincarnated, but the Spirit upon Elijah was the Spirit upon John. John, the forerunner, ministered in the spirit and power of Elijah. The same anointing of Elijah is present today to restore all things. (See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 3:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .) The Bible scholars had properly concluded that Elijah must come first, but failed to interpret it figuratively. This is often repeated today with biblical prophecies. We need the Spirit of Christ to help us understand even the basic truths of the Bible.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Unbelief Hinders Healing
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
