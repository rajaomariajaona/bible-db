document_id: ACT.26,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Defense before King Agrippa
  - type: text
    content: King Agrippa said to Paul, “You may now state your case.” Paul motioned with his hand for silence, then began his defense.
  - type: note
    content: An alternate reading of the Aramaic is “The [Holy] Spirit issued from his mouth.”
  '10':
  - type: text
    content: 'And that’s exactly what I did in Jerusalem, for I not only imprisoned many of the holy believers by the authority of the chief priests, I also cast my vote against them, sentencing them to death. '
  '11':
  - type: text
    content: I punished them often in every Jewish meeting hall and attempted to force them to blaspheme. I boiled with rage against them, hunting them down in distant foreign cities to persecute them.
  '12':
  - type: text
    content: '“For that purpose I went to Damascus, with the authority granted to me by the chief priests. '
  '13':
  - type: text
    content: 'While traveling on the road at noon, Your Highness, I saw a light brighter than the sun flashing from heaven all around me and those who were with me. '
  '14':
  - type: text
    content: 'We all fell to the ground, and I heard a voice speaking to me in Aramaic, saying, '
  - type: text
    content: ‘Saul, Saul, why are you persecuting me? You are only hurting yourself when you resist your calling.’
  - type: note
    content: Or “Why are you hurting yourself by kicking against the ox-goads?”
  '15':
  - type: text
    content: “I asked, ‘Who are you, Lord?’
  - type: text
    content: '“And the Lord replied, '
  - type: text
    content: ‘I am Jesus,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “Jesus, the Victorious.” See Acts 22:8 and footnote.
  - type: text
    content: the one you are persecuting.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Get up and stand to your feet, for I have appeared to you
  - type: text
    content: ' '
  - type: text
    content: to reveal your destiny and to commission you
  - type: text
    content: ' '
  - type: text
    content: as my assistant.
  - type: text
    content: ' '
  - type: note
    content: The Greek word hypēretēs is also used for John Mark as the “assistant” to Barnabas in Acts 13:5.
  - type: text
    content: You will be a witness to what you have seen and to the things I will reveal whenever I appear to you.
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic, which is literally “a witness that you have seen me and are going to see me again.” The Greek is “to what shall yet appear before your eyes” or “to the things in which I will appear to you.” Both Greek and Aramaic are somewhat combined in the translation of this verse. Jesus promised future appearances to Paul.
  '17':
  - type: text
    content: I will rescue you from the persecution of your own people and from the hostility of the other nations that I will send you to.
  - type: text
    content: ' '
  '18':
  - type: text
    content: And you will open their eyes to their true condition, so that they may turn from darkness to the Light
  - type: text
    content: ' '
  - type: note
    content: See Isa. 35:5; 42:6–7, 16.
  - type: text
    content: and from the power
  - type: text
    content: ' '
  - type: note
    content: Or “authority” or “dominion.”
  - type: text
    content: of Satan to the power of God. By placing their faith in me they will receive the total forgiveness
  - type: text
    content: ' '
  - type: note
    content: Or “cancellation of sins.”
  - type: text
    content: of sins and be made holy,
  - type: text
    content: ' '
  - type: text
    content: taking hold of the inheritance that I give to my children
  - type: text
    content: '!’'
  '19':
  - type: text
    content: '“So you see, King Agrippa, I have not been disobedient to what was revealed to me from heaven. '
  '2':
  - type: text
    content: '“King Agrippa, I consider myself highly favored to stand before you today and answer the charges made against me by the Jews. '
  '20':
  - type: text
    content: 'For it was in Damascus that I first declared the truth. And then I went to Jerusalem and throughout our nation, '
  - type: note
    content: Or “Judea.”
  - type: text
    content: 'and even to other nations, telling people everywhere that they must repent and turn to God and demonstrate it with a changed life. '
  - type: note
    content: Or “with fruits in keeping with repentance.”
  '21':
  - type: text
    content: That’s why the Jews seized me when I was in the temple and tried to murder me.
  '22':
  - type: text
    content: '“But in spite of all this, I have experienced the supernatural help of God up to this very moment. So I’m standing here saying the same thing that I’ve shared with everyone, from the least to the greatest. For I teach nothing but what '
  '23':
  - type: text
    content: 'Moses and the prophets have said was destined to happen: that our Messiah had to suffer and die and be the first to rise from the dead, '
  - type: note
    content: The Aramaic is “to inaugurate [or ‘be the origin of’] the resurrection from the dead.”
  - type: text
    content: to release the bright light of truth both to our people and to the non-Jewish nations.”
  - type: note
    content: See Luke 2:32.
  '24':
  - type: text
    content: 'Festus interrupted Paul’s defense, '
  - type: note
    content: The Aramaic can be translated “As the Holy Spirit spoke through Paul, Festus interrupted.”
  - type: text
    content: blurting out, “You’re out of your mind! All this great learning of yours is driving you crazy.”
  - type: note
    content: Or “So much Scripture has made you senseless!”
  '25':
  - type: text
    content: 'Paul replied, “No, Your Excellency Festus, I am not crazy. I speak the words of truth and reason. '
  - type: note
    content: Or “words of sober truth.”
  '26':
  - type: text
    content: 'King Agrippa, I know I can speak frankly and freely with you, for you understand these matters well, and none of these things have escaped your notice. After all, it’s not like it was a secret! '
  '27':
  - type: text
    content: Don’t you believe the prophets, King Agrippa? I know that you do.”
  '28':
  - type: text
    content: Agrippa responded, “In such a short time you are nearly persuading me to become a Christian.”
  '29':
  - type: text
    content: Paul replied, “I pray to God that both you and those here listening to me would one day become the same as I am, except, of course, without these chains.”
  '3':
  - type: text
    content: Because you, more than anyone else, are very familiar with the customs and controversies among the Jewish people, I now ask for your patience as I state my case.
  - type: note
    content: An alternate reading of the Aramaic is “I beg you to allow the Spirit to flow so that you can hear me.”
  '30':
  - type: text
    content: 'The king, the governor, Bernice, and all the others got up. '
  '31':
  - type: text
    content: As they were leaving the chamber, they commented to one another, “This man has done nothing that deserves death or even imprisonment.”
  '32':
  - type: text
    content: King Agrippa said to Festus, “If he hadn’t appealed to Caesar, he could have been released.”
  '4':
  - type: text
    content: '“All the Jews know how I have been raised as a young man, living among my own people from the beginning and in Jerusalem. '
  '5':
  - type: text
    content: 'If my accusers are willing to testify, they must admit that they’ve known me all along as a Pharisee, a member of the most strict and orthodox sect within Judaism. '
  - type: note
    content: The Aramaic is “I have lived by the elite knowledge of the Pharisees.”
  '6':
  - type: text
    content: 'And now, here I am on trial because I believe in the hope '
  - type: note
    content: The Aramaic can also be translated “good news.”
  - type: text
    content: 'of God’s promises made to our ancestors. '
  '7':
  - type: text
    content: This is the promise the twelve tribes of our people hope to see fulfilled as they sincerely strive to serve God with prayers night and day.
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: '“So, Your Highness, it is because of this hope that the Jews are accusing me. '
  '8':
  - type: text
    content: 'And how should you judge this matter? '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'Why is it that any of you think it unbelievable that God raises the dead? '
  '9':
  - type: text
    content: 'I used to think that I should do all that was in my power to oppose the name of Jesus of Nazareth. '
