document_id: LUK.21,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Widow’s Offering
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jesus observed all the wealthy coming into the temple courts wanting to be noticed as they came with their offerings. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jesus continued, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: There will be upheavals of every kind.
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Nations will go to war against each other, and kingdom against kingdom.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: There will be terrible earthquakes and seismic events of epic proportion that result in famines in one place after another. There will be horrible plagues and epidemics, cataclysmic storms
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. Only one Greek manuscript adds, “great storms.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: on the earth, and astonishing signs and cosmic disturbances in the heavens. But before all of this happens, you will be hunted down and arrested, persecuted by both civil and religious authorities, and thrown into prison.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And because you follow me, you will be on trial before kings and governmental leaders as an opportunity to testify to them in my name.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yet determine in your hearts not to prepare for your own defense. Simply speak with the words of wisdom that I will give you that moment, and none of your persecutors will be able to withstand the grace and wisdom that comes from your mouths.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You can expect betrayal even by your parents, your brothers, your relatives and friends—and yes, some of you will die as martyrs.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You will be hated by all because
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: of my life in you.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek says, “because of my name.”
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But don’t worry. My grace will never desert you or depart from your life.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although quite different from the Greek manuscripts, this is the literal translation of the Aramaic figure of speech, “Grace will not leave your head.”
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Stand firm with patient endurance and you will find your souls’ deliverance.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Destruction of Jerusalem
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He noticed a very poor widow who dropped two small copper coins in the offering box. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When you see Jerusalem surrounded by armies, you will know for sure that its devastation is imminent.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was fulfilled in AD 70 when the Roman armies sacked Jerusalem. Some historians estimate that the Romans slaughtered more than one million Jews at that time and took captive up to one hundred thousand to other nations. Jews today still mourn the destruction of the temple on the fast of Tisha B’Av, the ninth day of the fifth month.
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: At that time all who are living in Judea must flee to the mountains. Those who live inside the city gates, leave and flee, and those who live outside the city must not enter it seeking refuge.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For these will be the days of God’s vengeance to fulfill what has been written
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 9:6–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 9:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hos. 9:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The book of Lamentations expresses grief over the loss of the city and the temple.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: against Jerusalem.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It will be extremely difficult for pregnant women and for those nursing little ones in that day, for great persecution and wrath will rise against this nation.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Many will be cut down by the sword or scattered as prisoners to many countries. And Jerusalem shall be trampled down by nations until the days of world empires come to an end.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Coming of the Son of Man
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Expect to witness amazing and perplexing signs with the sun, the moon, and the stars.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 13:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 32:7–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joel 2:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The raging of the sea will bring desperation and turmoil to many nations.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Earthquakes
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: earthquakes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is found only in Aramaic manuscripts.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will bring panic and disaster. What men see coming to the earth will cause the fear of doom to grip their hearts, for they will even see the powers of the heavenly realm shaken!
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-28
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And at last, when you see how the Son of Man
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:27–28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The title “Son of Man” was used frequently when Jesus spoke of himself. Note that he is not the “son of a man,” but the Son of God who became a man.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: comes—surrounded with a cloud, with great power and miracles, in the radiance of his splendor, and with great glory and praises
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:27–28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Praises” is only found in Aramaic manuscripts.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: —it will make you jump for joy! For the time of your full transformation
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:27–28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word is “redemption” or “liberation.” It speaks of the total transformation of our body, soul, and spirit when we see him as he is (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 John 3:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: has arrived.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Lesson of the Fig Tree
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 29-30
    - type: text
      text: 'Jesus gave his disciples this parable:'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Haven’t you observed that when the fig tree, or any tree, buds and blooms, the season is changing and summer is near?
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Listen to me,”
    - type: text
      text: ' he said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “This poor widow has given a larger offering than any of the wealthy.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In the same way, when you see these prophetic signs occurring, you realize the earth is yielding to
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: the fullness of
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: God’s kingdom.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I assure you, the end of this age will not come until all I have spoken has come to pass.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Earth and sky will wear out and fade away before one word I speak loses its power or fails to accomplish its purpose.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guard Your Hearts
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Be careful that you never allow your hearts to grow cold. Be careful that you are not caught off guard,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic text says, “Beware that your hearts never grow cold.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: or your hearts will be weighed down with carousing, drunkenness, and the worries of this life, and that day will come upon you suddenly like a trap. Don’t let me come and find you drunk or living carelessly like everyone else.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For that day will come as a shocking surprise to all.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Keep a constant watch over your soul, and pray for the courage and grace to prevail over these things that are destined to occur and that you will stand before the presence of the Son of Man
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: with a clear conscience
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .”
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Each day, Jesus taught in the temple and spent his nights on the Mount of Olives. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And all the people came early to the temple courts to listen to the words '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: logos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: he taught.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For the rich only gave out of their surplus, but she sacrificed out of her poverty and gave to God all that she had to live on.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Signs of the End of the Age
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Some of the disciples remarked about the beauty of the temple. They pointed out all the lovely adornments and how it was built with excellence from the gifts given to God.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The day of utter destruction will come to everything you admire here. It will all become a heap of rubble!”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Master, tell us,” they asked, “when exactly will this happen? Can you tell us what warning sign to look for when it is about to take place?”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
