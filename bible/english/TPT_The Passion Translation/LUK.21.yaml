document_id: LUK.21,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Widow’s Offering
  - type: text
    content: 'Jesus observed all the wealthy coming into the temple courts wanting to be noticed as they came with their offerings. '
  '10':
  - type: text
    content: 'Jesus continued, '
  - type: text
    content: “
  - type: text
    content: There will be upheavals of every kind.
  - type: text
    content: ' '
  - type: text
    content: Nations will go to war against each other, and kingdom against kingdom.
  - type: text
    content: ' '
  '11':
  - type: text
    content: There will be terrible earthquakes and seismic events of epic proportion that result in famines in one place after another. There will be horrible plagues and epidemics, cataclysmic storms
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. Only one Greek manuscript adds, “great storms.”
  - type: text
    content: on the earth, and astonishing signs and cosmic disturbances in the heavens. But before all of this happens, you will be hunted down and arrested, persecuted by both civil and religious authorities, and thrown into prison.
  - type: text
    content: ' '
  '12':
  - type: text
    content: And because you follow me, you will be on trial before kings and governmental leaders as an opportunity to testify to them in my name.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Yet determine in your hearts not to prepare for your own defense. Simply speak with the words of wisdom that I will give you that moment, and none of your persecutors will be able to withstand the grace and wisdom that comes from your mouths.
  '16':
  - type: text
    content: “You can expect betrayal even by your parents, your brothers, your relatives and friends—and yes, some of you will die as martyrs.
  - type: text
    content: ' '
  '17':
  - type: text
    content: You will be hated by all because
  - type: text
    content: ' '
  - type: text
    content: of my life in you.
  - type: text
    content: ' '
  - type: note
    content: The Greek says, “because of my name.”
  '18':
  - type: text
    content: But don’t worry. My grace will never desert you or depart from your life.
  - type: text
    content: ' '
  - type: note
    content: Although quite different from the Greek manuscripts, this is the literal translation of the Aramaic figure of speech, “Grace will not leave your head.”
  '19':
  - type: text
    content: Stand firm with patient endurance and you will find your souls’ deliverance.”
  - type: heading
    content: The Destruction of Jerusalem
  '2':
  - type: text
    content: 'He noticed a very poor widow who dropped two small copper coins in the offering box. '
  '20':
  - type: text
    content: “When you see Jerusalem surrounded by armies, you will know for sure that its devastation is imminent.
  - type: text
    content: ' '
  - type: note
    content: This was fulfilled in AD 70 when the Roman armies sacked Jerusalem. Some historians estimate that the Romans slaughtered more than one million Jews at that time and took captive up to one hundred thousand to other nations. Jews today still mourn the destruction of the temple on the fast of Tisha B’Av, the ninth day of the fifth month.
  '21':
  - type: text
    content: At that time all who are living in Judea must flee to the mountains. Those who live inside the city gates, leave and flee, and those who live outside the city must not enter it seeking refuge.
  - type: text
    content: ' '
  '22':
  - type: text
    content: For these will be the days of God’s vengeance to fulfill what has been written
  - type: text
    content: ' '
  - type: note
    content: See 1 Kings 9:6–9; Dan. 9:26; Hos. 9:7; Mic. 3:12. The book of Lamentations expresses grief over the loss of the city and the temple.
  - type: text
    content: against Jerusalem.
  - type: text
    content: ' '
  '23':
  - type: text
    content: It will be extremely difficult for pregnant women and for those nursing little ones in that day, for great persecution and wrath will rise against this nation.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Many will be cut down by the sword or scattered as prisoners to many countries. And Jerusalem shall be trampled down by nations until the days of world empires come to an end.”
  - type: heading
    content: The Coming of the Son of Man
  '25':
  - type: text
    content: “Expect to witness amazing and perplexing signs with the sun, the moon, and the stars.
  - type: text
    content: ' '
  - type: note
    content: See Isa. 13:10; Ezek. 32:7–8; Joel 2:10.
  - type: text
    content: The raging of the sea will bring desperation and turmoil to many nations.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Earthquakes
  - type: text
    content: ' '
  - type: note
    content: The word earthquakes is found only in Aramaic manuscripts.
  - type: text
    content: will bring panic and disaster. What men see coming to the earth will cause the fear of doom to grip their hearts, for they will even see the powers of the heavenly realm shaken!
  '27':
  - type: text
    content: “And at last, when you see how the Son of Man
  - type: text
    content: ' '
  - type: note
    content: The title “Son of Man” was used frequently when Jesus spoke of himself. Note that he is not the “son of a man,” but the Son of God who became a man.
  - type: text
    content: comes—surrounded with a cloud, with great power and miracles, in the radiance of his splendor, and with great glory and praises
  - type: text
    content: ' '
  - type: note
    content: “Praises” is only found in Aramaic manuscripts.
  - type: text
    content: —it will make you jump for joy! For the time of your full transformation
  - type: text
    content: ' '
  - type: note
    content: The Greek word is “redemption” or “liberation.” It speaks of the total transformation of our body, soul, and spirit when we see him as he is (1 John 3:2).
  - type: text
    content: has arrived.”
  - type: heading
    content: The Lesson of the Fig Tree
  '29':
  - type: text
    content: 'Jesus gave his disciples this parable:'
  - type: text
    content: “Haven’t you observed that when the fig tree, or any tree, buds and blooms, the season is changing and summer is near?
  - type: text
    content: ' '
  '3':
  - type: text
    content: “Listen to me,”
  - type: text
    content: ' he said. '
  - type: text
    content: “This poor widow has given a larger offering than any of the wealthy.
  - type: text
    content: ' '
  '31':
  - type: text
    content: In the same way, when you see these prophetic signs occurring, you realize the earth is yielding to
  - type: text
    content: ' '
  - type: text
    content: the fullness of
  - type: text
    content: ' '
  - type: text
    content: God’s kingdom.
  - type: text
    content: ' '
  '32':
  - type: text
    content: I assure you, the end of this age will not come until all I have spoken has come to pass.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Earth and sky will wear out and fade away before one word I speak loses its power or fails to accomplish its purpose.”
  - type: heading
    content: Guard Your Hearts
  '34':
  - type: text
    content: “Be careful that you never allow your hearts to grow cold. Be careful that you are not caught off guard,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic text says, “Beware that your hearts never grow cold.”
  - type: text
    content: or your hearts will be weighed down with carousing, drunkenness, and the worries of this life, and that day will come upon you suddenly like a trap. Don’t let me come and find you drunk or living carelessly like everyone else.
  - type: text
    content: ' '
  '35':
  - type: text
    content: For that day will come as a shocking surprise to all.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Keep a constant watch over your soul, and pray for the courage and grace to prevail over these things that are destined to occur and that you will stand before the presence of the Son of Man
  - type: text
    content: ' '
  - type: text
    content: with a clear conscience
  - type: text
    content: .”
  '37':
  - type: text
    content: 'Each day, Jesus taught in the temple and spent his nights on the Mount of Olives. '
  '38':
  - type: text
    content: 'And all the people came early to the temple courts to listen to the words '
  - type: note
    content: The Greek text is logos.
  - type: text
    content: he taught.
  '4':
  - type: text
    content: For the rich only gave out of their surplus, but she sacrificed out of her poverty and gave to God all that she had to live on.”
  - type: heading
    content: The Signs of the End of the Age
  '5':
  - type: text
    content: Some of the disciples remarked about the beauty of the temple. They pointed out all the lovely adornments and how it was built with excellence from the gifts given to God.
  - type: text
    content: 'Jesus said, '
  '6':
  - type: text
    content: “The day of utter destruction will come to everything you admire here. It will all become a heap of rubble!”
  '7':
  - type: text
    content: “Master, tell us,” they asked, “when exactly will this happen? Can you tell us what warning sign to look for when it is about to take place?”
  '8':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “Deception will run rampant and many will appear on the scene, saying I have sent them, or saying about themselves, ‘I am the Messiah!’
  - type: text
    content: ' '
  - type: note
    content: Translated from the Aramaic, where it literally states, “I Am! The Messiah!”
  - type: text
    content: These doomsday deceivers will say, ‘The end of the age is now here!’ But listen to me. Don’t let any of these imposters fool you.
  '9':
  - type: text
    content: “There will also be many wars and revolutions on every side, with rumors of more wars to come. Don’t panic or give in to your fears, for these things are bound to happen. This is still not the end yet.”
