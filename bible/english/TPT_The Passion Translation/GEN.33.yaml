document_id: GEN.33,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Brothers Reconcile
  - type: text
    content: 'When Jacob '
  - type: note
    content: Jacob’s name had been changed, but like us, he was slow to realize his new identity. It was not until Rachel died that Israel journeyed onward (see Gen. 35:19–21). Jacob entered his promised inheritance with a limp. When he walked toward Esau and bowed down, he was limping. Esau did not see a whole Jacob; he saw a crippled Jacob.
  - type: text
    content: 'looked up, he saw Esau approaching with four hundred men. '
  - type: note
    content: Esau came with four hundred men; Jacob came with four women and his children. Jacob divided his children by their mothers and sent them to Esau one group at a time. The most loved of all to Jacob were Rachel and Joseph, so he reserved them for last, just in case the anger of Esau broke out against him and his family. Jacob was a clever, thoughtful man, but he was still walking in man’s wisdom. Because he anticipated vengeance from the hand of Esau, he exposed those whom he cared about the least to the first stroke of that vengeance.
  - type: text
    content: 'So he '
  - type: text
    content: quickly
  - type: text
    content: ' divided the children among Leah, Rachel, and the two maidservants. '
  '10':
  - type: text
    content: 'Jacob replied, “No, please. If I have found favor in your eyes, please take the gifts. For truly, seeing your face '
  - type: text
    content: after all these years
  - type: text
    content: ', it’s like looking upon the face of God! '
  - type: note
    content: Jacob again saw that same glorious face of God (see Gen. 32:30) through the mending of his relationship with his brother. How sweet is forgiveness, how pleasant to the soul when we are made one again with those we love! It is like gazing on the face of God. We see God most clearly as we touch mercy and forgiveness. Are there some in your life that need to see the face of God in your countenance?
  - type: text
    content: 'Since you have received me so warmly, '
  '11':
  - type: text
    content: 'please accept the blessing I have brought to you, for God has poured his grace over me, and I have everything I want!” '
  - type: note
    content: Jacob was offering to share the blessing he took away from Esau many years earlier.
  - type: text
    content: So with these words Jacob urged him, and Esau accepted the gifts.
  '12':
  - type: text
    content: Then Esau said, “Let’s start out on our journey, and I’ll walk alongside you.”
  '13':
  - type: text
    content: 'But Jacob replied, “My lord, you can see how tired the children are, and all our flocks and herds are nursing their young. If we drive them too hard for even a day, they will die. '
  '14':
  - type: text
    content: 'Please, my lord, go ahead of your servant. Let me move along slowly with my flocks and herds, '
  - type: text
    content: to give them a chance to graze
  - type: text
    content: . I must think of my children, too, so go ahead of me, my lord, until I catch up with you in Seir.”
  '15':
  - type: text
    content: Esau said, “Well, at least let me leave you with some of my men.”
  - type: text
    content: “You’re so kind,” Jacob replied, “but there’s no need to do so.”
  '16':
  - type: text
    content: 'So that very day Esau '
  - type: text
    content: and his men
  - type: text
    content: ' left to return to Seir, '
  '17':
  - type: text
    content: 'but Jacob went '
  - type: text
    content: the opposite direction
  - type: text
    content: ' to Succoth instead, '
  - type: note
    content: Succoth means “booths,” “shelter,” “huts,” or “stalls.” There is a large tell, or archeological mound, called Deir ’Allah located in the center of the Jordan Valley that is now identified as Succoth.
  - type: text
    content: and built himself a house there. He also built shelters for his livestock, and that is why Jacob named the place Succoth.
  - type: heading
    content: Jacob Builds an Altar at Shechem
  '18':
  - type: text
    content: 'Jacob’s journey home from Paddan-Aram finally brought him safe and sound to the Canaanite city of Shechem, '
  - type: note
    content: Shechem lies about forty miles north of Jerusalem and is the site where Abram first built an altar in the promised land (see Gen. 12:7). Joseph was eventually buried on this parcel of land (see Josh. 24:32). In John 4 Jesus encountered a woman of Samaria in the vicinity of Sychar (Shechem). The well was on a piece of land which was bought by Jacob and given to his son Joseph (see John 4:5–8). The well mentioned in John 4 was Jacob’s well. Jesus sat on top of the very place where Jacob dwelt at Shechem. At that time, Jacob had no clue that his seed would indeed sit upon that well someday. There, the long-awaited Messiah patiently won the soul of a sinful woman. The Mighty God of Israel visited Jacob’s well at Shechem!
  - type: text
    content: 'where he camped just outside of the city. '
  '19':
  - type: text
    content: 'He purchased the field where he pitched his tent from the clan of Hamor, '
  - type: note
    content: Hamor means “donkey.”
  - type: text
    content: 'Shechem’s father, for one hundred pieces of silver. '
  - type: note
    content: Some ancient manuscripts have “one hundred sheep” as the purchase price.
  '2':
  - type: text
    content: 'He lined up the maidservants and their children in front, then Leah and her children, then Rachel and Joseph last of all. '
  '20':
  - type: text
    content: 'There he set up an altar '
  - type: note
    content: Or “a pillar.”
  - type: text
    content: 'and named it To the '
  - type: text
    content: 'True'
  - type: text
    content: ' God, the God of Israel.'
  - type: note
    content: Or “El-Elohe-Israel” or “Mighty is the God of Israel.”
  '3':
  - type: text
    content: 'Then Jacob went ahead of them '
  - type: text
    content: to face Esau
  - type: text
    content: '. As he approached his brother, he bowed down to the ground seven times '
  - type: note
    content: It is hard to miss the irony here, for Isaac’s prophecy was that Esau would be ruled by Jacob and bow down to him (see Gen. 27:29), but here we see Jacob bowing down before his estranged brother.
  - type: text
    content: before reaching him.
  '4':
  - type: text
    content: 'But Esau ran to Jacob and hugged him! He threw his arms around Jacob’s neck, he kissed him, and they wept in each other’s arms. '
  - type: note
    content: Imagine the sense of emotional release Jacob (Israel) must have felt as he stood there hugging Esau. Jacob had deceitfully kissed his father, pretending to be Esau (see Gen. 27:26). Now the two brothers shared the kiss of restoration. Their tears released and washed away the emotional pain of their past! Reconciliation between brothers always pleases God (see Ps. 133). Remember that, in a moment, God can turn enemies into friends. Remember that God turned Saul into Paul (see Acts 13:9)! Our hearts must always be postured to reconcile with others who have distanced themselves from us.
  '5':
  - type: text
    content: When Esau looked up and saw the women and the children, he said to Jacob, “Who are all these coming behind you?”
  - type: text
    content: 'Jacob replied, “These are the children, '
  - type: text
    content: your niece and nephews
  - type: text
    content: ', whom God has so graciously given '
  - type: note
    content: This word comes from a Hebrew verb meaning to “be gracious,” “show favor,” or “be kind to.” Indeed, children are a gracious gift from God. See Ps. 127:3.
  - type: text
    content: 'your servant.” '
  '6':
  - type: text
    content: 'Then the maidservants came forward with their children and bowed low before Esau. '
  '7':
  - type: text
    content: 'Leah likewise came forward with her children and bowed down. Finally, Rachel '
  - type: text
    content: and Joseph
  - type: text
    content: ' came forward and they bowed down to the ground before Esau.'
  '8':
  - type: text
    content: Esau asked Jacob, “Why did you send all these animals to me?”
  - type: text
    content: “I was hoping to find favor with you, my lord,” Jacob replied.
  '9':
  - type: text
    content: “But my brother,” Esau laughed, “I have plenty. Keep what you have for yourself.”
