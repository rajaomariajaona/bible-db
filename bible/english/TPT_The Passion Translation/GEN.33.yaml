document_id: GEN.33,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Brothers Reconcile
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When Jacob '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jacob’s name had been changed, but like us, he was slow to realize his new identity. It was not until Rachel died that Israel journeyed onward (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 35:19–21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Jacob entered his promised inheritance with a limp. When he walked toward Esau and bowed down, he was limping. Esau did not see a whole Jacob; he saw a crippled Jacob.
      marker-yv: yv-n
    - type: text
      text: 'looked up, he saw Esau approaching with four hundred men. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Esau came with four hundred men; Jacob came with four women and his children. Jacob divided his children by their mothers and sent them to Esau one group at a time. The most loved of all to Jacob were Rachel and Joseph, so he reserved them for last, just in case the anger of Esau broke out against him and his family. Jacob was a clever, thoughtful man, but he was still walking in man’s wisdom. Because he anticipated vengeance from the hand of Esau, he exposed those whom he cared about the least to the first stroke of that vengeance.
      marker-yv: yv-n
    - type: text
      text: 'So he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: quickly
    - type: text
      text: ' divided the children among Leah, Rachel, and the two maidservants. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jacob replied, “No, please. If I have found favor in your eyes, please take the gifts. For truly, seeing your face '
    - type: usfm
      marker: it
      children:
      - type: text
        text: after all these years
    - type: text
      text: ', it’s like looking upon the face of God! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jacob again saw that same glorious face of God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 32:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) through the mending of his relationship with his brother. How sweet is forgiveness, how pleasant to the soul when we are made one again with those we love! It is like gazing on the face of God. We see God most clearly as we touch mercy and forgiveness. Are there some in your life that need to see the face of God in your countenance?
      marker-yv: yv-n
    - type: text
      text: 'Since you have received me so warmly, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'please accept the blessing I have brought to you, for God has poured his grace over me, and I have everything I want!” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jacob was offering to share the blessing he took away from Esau many years earlier.
      marker-yv: yv-n
    - type: text
      text: So with these words Jacob urged him, and Esau accepted the gifts.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then Esau said, “Let’s start out on our journey, and I’ll walk alongside you.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But Jacob replied, “My lord, you can see how tired the children are, and all our flocks and herds are nursing their young. If we drive them too hard for even a day, they will die. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Please, my lord, go ahead of your servant. Let me move along slowly with my flocks and herds, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to give them a chance to graze
    - type: text
      text: . I must think of my children, too, so go ahead of me, my lord, until I catch up with you in Seir.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Esau said, “Well, at least let me leave you with some of my men.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You’re so kind,” Jacob replied, “but there’s no need to do so.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So that very day Esau '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and his men
    - type: text
      text: ' left to return to Seir, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'but Jacob went '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the opposite direction
    - type: text
      text: ' to Succoth instead, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Succoth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “booths,” “shelter,” “huts,” or “stalls.” There is a large tell, or archeological mound, called Deir ’Allah located in the center of the Jordan Valley that is now identified as Succoth.
      marker-yv: yv-n
    - type: text
      text: and built himself a house there. He also built shelters for his livestock, and that is why Jacob named the place Succoth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Builds an Altar at Shechem
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Jacob’s journey home from Paddan-Aram finally brought him safe and sound to the Canaanite city of Shechem, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Shechem lies about forty miles north of Jerusalem and is the site where Abram first built an altar in the promised land (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 12:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Joseph was eventually buried on this parcel of land (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 24:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). In
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus encountered a woman of Samaria in the vicinity of Sychar (Shechem). The well was on a piece of land which was bought by Jacob and given to his son Joseph (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 4:5–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The well mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was Jacob’s well. Jesus sat on top of the very place where Jacob dwelt at Shechem. At that time, Jacob had no clue that his seed would indeed sit upon that well someday. There, the long-awaited Messiah patiently won the soul of a sinful woman. The Mighty God of Israel visited Jacob’s well at Shechem!
      marker-yv: yv-n
    - type: text
      text: 'where he camped just outside of the city. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'He purchased the field where he pitched his tent from the clan of Hamor, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hamor
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “donkey.”
      marker-yv: yv-n
    - type: text
      text: 'Shechem’s father, for one hundred pieces of silver. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some ancient manuscripts have “one hundred sheep” as the purchase price.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He lined up the maidservants and their children in front, then Leah and her children, then Rachel and Joseph last of all. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'There he set up an altar '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a pillar.”
      marker-yv: yv-n
    - type: text
      text: 'and named it To the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'True'
    - type: text
      text: ' God, the God of Israel.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “El-Elohe-Israel” or “Mighty is the God of Israel.”
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then Jacob went ahead of them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to face Esau
    - type: text
      text: '. As he approached his brother, he bowed down to the ground seven times '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is hard to miss the irony here, for Isaac’s prophecy was that Esau would be ruled by Jacob and bow down to him (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 27:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), but here we see Jacob bowing down before his estranged brother.
      marker-yv: yv-n
    - type: text
      text: before reaching him.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But Esau ran to Jacob and hugged him! He threw his arms around Jacob’s neck, he kissed him, and they wept in each other’s arms. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Imagine the sense of emotional release Jacob (Israel) must have felt as he stood there hugging Esau. Jacob had deceitfully kissed his father, pretending to be Esau (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 27:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Now the two brothers shared the kiss of restoration. Their tears released and washed away the emotional pain of their past! Reconciliation between brothers always pleases God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 133
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Remember that, in a moment, God can turn enemies into friends. Remember that God turned Saul into Paul (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 13:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: )! Our hearts must always be postured to reconcile with others who have distanced themselves from us.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: When Esau looked up and saw the women and the children, he said to Jacob, “Who are all these coming behind you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob replied, “These are the children, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your niece and nephews
    - type: text
      text: ', whom God has so graciously given '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This word comes from a Hebrew verb meaning to “be gracious,” “show favor,” or “be kind to.” Indeed, children are a gracious gift from God. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 127:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'your servant.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then the maidservants came forward with their children and bowed low before Esau. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Leah likewise came forward with her children and bowed down. Finally, Rachel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and Joseph
    - type: text
      text: ' came forward and they bowed down to the ground before Esau.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Esau asked Jacob, “Why did you send all these animals to me?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I was hoping to find favor with you, my lord,” Jacob replied.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “But my brother,” Esau laughed, “I have plenty. Keep what you have for yourself.”
