document_id: JHN.18,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus in the Garden of Gethsemane
  - type: text
    content: 'After Jesus finished this prayer; he left with his disciples and went across the Kidron Valley '
  - type: note
    content: The Kidron ravine is the path David took when he was forced to flee Jerusalem because of the betrayal of his son Absalom. David went up the Mount of Olives weeping. Jesus went up also in sorrow. David went up to save himself; Jesus went up to save the people of the world.
  - type: text
    content: 'to a place where there was a garden. '
  - type: note
    content: This is the garden of Gethsemane, which means “olive press.” Jesus not only went to the garden to pray, but to be captured. He knew full well the Father’s plan. Just as Adam fell in a garden of paradise, Jesus stood faithful in a garden of betrayal.
  '10':
  - type: text
    content: 'Suddenly, Peter took out his sword and struck the high priest’s servant, slashing off his right ear! '
  - type: note
    content: This event is a vivid picture of what happens when we act impetuously and in anger. We hinder people’s ability to hear our message (we cut off their ear) when we walk in angry offense toward others.
  - type: text
    content: The servant’s name was Malchus.
  - type: note
    content: Malchus’ name means “king.” Perhaps at the moment of healing his ear, Jesus personally revealed himself to Malchus in a supernatural way, the King who healed a king. Jesus is the true servant to the High Priest. We can imagine Jesus reaching out his hand to help Malchus up. And in an instant, Malchus believes. Malchus’ ears, both of them, are healed.
  '11':
  - type: text
    content: 'Jesus ordered Peter, '
  - type: text
    content: “Put your sword away! Do you really think I will avoid the suffering
  - type: text
    content: ' '
  - type: note
    content: Or “Shall I not drink the cup (of suffering) assigned me by the Father?”
  - type: text
    content: which my Father has assigned to me?”
  - type: heading
    content: Jesus Is Taken before Annas
  '12':
  - type: text
    content: 'Then the soldiers and their captain, along with the Jewish officers, seized Jesus and tied him up. '
  '13':
  - type: text
    content: 'They took him first to Annas, '
  - type: note
    content: John is the only Gospel account that inserts this pre-trial meeting with Annas. He was the retired and illegal high priest.
  - type: text
    content: 'as he was the father-in-law of Caiaphas, the high priest that year. '
  - type: note
    content: Or “close friend to the high priest.” The priesthood was corrupt in the time of Jesus. It was not proper for two men to hold the office of high priest at the same time, as it apparently was done in Jesus’ day. They both were called high priest in this narrative. See John 18:19, 24.
  '14':
  - type: text
    content: Caiaphas was the one who had persuaded the Jewish leaders that it would be better off to have one person die for the sake of the people.
  - type: note
    content: See John 11:49–51.
  - type: heading
    content: Peter’s First Denial
  '15':
  - type: text
    content: 'Peter and another disciple followed along behind them as they took Jesus into the courtyard of Annas’ palace. Since the other disciple was well known to the high priest, he entered in, '
  - type: note
    content: Although it is impossible to determine who exactly was this other disciple, some have surmised it was John himself, or Nicodemus. If it was Nicodemus, as a leader among the Pharisees, this would explain his inclusion into the proceedings taking place that night.
  '16':
  - type: text
    content: 'but Peter was left standing outside by the gate. Then the other disciple came back out to the servant girl who was guarding the gate and convinced her to allow Peter inside. '
  '17':
  - type: text
    content: As he passed inside, the young servant girl guarding the gate took a look at Peter and said to him, “Aren’t you one of his disciples?”
  - type: text
    content: He denied it, saying, “No! I’m not!”
  '18':
  - type: text
    content: Now because it was cold, the soldiers and guards made a charcoal fire and were standing around it to keep warm. So Peter huddled there with them around the fire.
  - type: heading
    content: Jesus Interrogated by Annas
  '19':
  - type: text
    content: 'The high priest interrogated Jesus concerning his disciples '
  - type: note
    content: It is interesting that Annas was concerned about Jesus’ disciples. The religious spirit is always concerned with impressive numbers and influence. Jesus only had twelve disciples who were always with him.
  - type: text
    content: and his teachings.
  '2':
  - type: text
    content: 'Judas, the traitor, knew where this place was, for Jesus had gone there often with his disciples. '
  '20':
  - type: text
    content: 'Jesus answered Annas’ questions by saying, '
  - type: text
    content: “I have said nothing in secret. At all times I have taught openly and publicly in a synagogue, in the temple courts, and wherever the people assemble.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Why would you ask me for evidence to condemn me? Ask those who have heard what I’ve taught. They can tell you.”
  '22':
  - type: text
    content: 'Just then one of the guards standing near Jesus punched him in the face with his fist '
  - type: note
    content: The Greek is simply “struck him.” This could have been with a rod, for the verb has an etymological connection to the word for “rod.” Most translators have chosen to use “struck [or ‘slapped’] with his hand.” Regardless, Jesus was beaten everywhere he went that night and the next morning until he was finally crucified.
  - type: text
    content: and said, “How dare you answer the high priest like that!”
  '23':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “If my words are evil, then prove it. But if I haven’t broken any laws, then why would you hit me?”
  '24':
  - type: text
    content: Then Annas sent Jesus, still tied up, across the way to the high priest Caiaphas.
  - type: heading
    content: Peter’s Second and Third Denials
  '25':
  - type: text
    content: 'Meanwhile, Peter was still standing in the courtyard by the fire. And one of the guards standing there said to him, “Aren’t you one of his disciples? I know you are!” Peter swore '
  - type: note
    content: As translated from the Aramaic. This is a very strong word that can also be translated “blasphemed.” God’s loving grace forgave Peter’s sin—and our sin.
  - type: text
    content: 'and said, “I am not his disciple!” '
  '26':
  - type: text
    content: 'But one of the servants of the high priest, a relative to the man whose ear Peter had cut off, looked at him and said, “Wait! Didn’t I see you out there in the garden with Jesus?” '
  '27':
  - type: text
    content: Then Peter denied it the third time and said, “No!”—and at that very same moment, a rooster crowed nearby.
  - type: heading
    content: Pilate Questions Jesus’ Arrest
  '28':
  - type: text
    content: 'Before dawn they took Jesus from his trial before Caiaphas to the Roman governor’s palace. '
  - type: note
    content: The Greek is Praetorium, which is the transliteration of the Latin word meaning “general’s tent.” It became used for the Roman governor’s official residence.
  - type: text
    content: 'Now the Jews refused to go into the Roman governor’s residence to avoid ceremonial defilement before eating the Passover meal. '
  '29':
  - type: text
    content: 'So Pilate came outside where they waited and asked them pointedly, “Tell me, what exactly is the accusation '
  - type: note
    content: The Aramaic word for “accusation” is similar to the word devil (“accuser”). Pilate is saying, “What the devil do you have against this man?”
  - type: text
    content: that you bring against this man? What has he done?”
  '3':
  - type: text
    content: 'The Pharisees and the leading priests had given Judas a large detachment '
  - type: note
    content: The Greek and Aramaic word used for this company of soldiers implies quite a large number, up to five or six hundred men sent to arrest Jesus. Even his enemies knew his power was great.
  - type: text
    content: 'of Roman soldiers and temple police to seize Jesus. Judas guided them to the garden, all of them carrying torches and lanterns and armed '
  - type: text
    content: with swords and spears
  - type: text
    content: '. '
  - type: note
    content: The Greek word is “foot-soldiers’ weapons.”
  '30':
  - type: text
    content: 'They answered, “We wouldn’t be coming here to hand over '
  - type: note
    content: The Aramaic word for “hand over” can also be translated “betray.”
  - type: text
    content: this ‘criminal’ to you if he wasn’t guilty of some wrongdoing!”
  '31':
  - type: text
    content: Pilate said, “Very well, then you take him yourselves and go pass judgment on him according to your Jewish laws!”
  - type: text
    content: 'But the Jewish leaders complained and said, “We don’t have legal authority to put anyone to death. '
  - type: text
    content: You should have him crucified!
  - type: text
    content: '” '
  - type: note
    content: Implied in the context and made explicit to clarify the illegality of the Jews to crucify Jesus. The Jewish law permitted death by stoning, not by crucifixion. The Scriptures had prophesied that he would be pierced and crucified. This was the cruel manner of death used by the Romans to execute the worst of criminals. For this reason they wanted Pilate to order his crucifixion. See John 12:32–34.
  '32':
  - type: text
    content: (This was to fulfill the words of Jesus when he predicted the manner of death that he would die.)
  - type: heading
    content: Pilate Interrogates Jesus
  '33':
  - type: text
    content: Upon hearing this, Pilate went back inside his palace and summoned Jesus. Looking him over, Pilate asked him, “Are you really the king of the Jews?”
  '34':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Are you asking because you really want to know,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “Have you spoken this from your soul?”
  - type: text
    content: or are you only asking this because others have said it about me?”
  '35':
  - type: text
    content: Pilate responded, “Only a Jew would care about this; do I look like a Jew? It’s your own people and your religious leaders that have handed you over to me. So tell me, Jesus, what have you done wrong?”
  '36':
  - type: text
    content: 'Jesus looked at Pilate and said, '
  - type: text
    content: “The royal power of my kingdom realm doesn’t come from this world. If it did, then my followers would be fighting to the end to defend me from the Jewish leaders. My kingdom realm authority is not
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “not yet from here.”
  - type: text
    content: from this realm.”
  - type: note
    content: The Greek text is not “world,” but literally “this side” or “this realm.” The Aramaic word used here can be translated “not of this age.”
  '37':
  - type: text
    content: Then Pilate responded, “Oh, so then you are a king?”
  - type: text
    content: “You are right.”
  - type: text
    content: ' Jesus said, '
  - type: text
    content: “I was born a King, and I have come into this world to prove what truth really is. And everyone who loves the truth
  - type: text
    content: ' '
  - type: note
    content: Or “everyone who is not deaf to the truth.” The Aramaic is “everyone who came from the truth.”
  - type: text
    content: will receive my words.”
  '38':
  - type: text
    content: Pilate looked at Jesus and said, “What is truth?”
  - type: note
    content: The Aramaic could be translated “Who is truth?” or “Who is the true prince?” This skepticism is still voiced today in postmodernism.
  - type: text
    content: 'As silence filled the room, Pilate went back out to where the Jewish leaders were waiting and said to them, “He’s not guilty. I couldn’t even find one fault with him. '
  - type: note
    content: As translated from the Aramaic.
  '39':
  - type: text
    content: Now, you do know that we have a custom that I release one prisoner every year at Passover—shall I release your king—the king of the Jews?”
  - type: note
    content: Pilate was not a saint. He was considered to be a corrupt and violent leader who would execute people without a trial. (Philo, De Legatione ad Caium, ed. Mangey, ii.590). He stole money from the temple treasury and brought pagan statues into Jerusalem, which caused riots and death to many. It was reported by the church father Eusebius (History Eccl. ii 7) that he was later banished to Vienna in Gaul, where he committed suicide.
  '4':
  - type: text
    content: 'Jesus, knowing full well what was about to happen, went out to the garden entrance to meet them. Stepping forward, he asked, '
  - type: text
    content: “Who are you looking for?”
  '40':
  - type: text
    content: 'They shouted out over and over, “No, not him! Give us Barabbas!” '
  - type: note
    content: Barabbas is an Aramaic name that means “son of the father.” He becomes a picture of every son of Adam, our father. Some believe this is a figure of speech, a nickname for one who has no known father, an illegitimate son. Both in Greek and Aramaic the word for “thief” or “robber” can also mean “one who leads an insurrection.”
  - type: text
    content: (Now Barabbas was a robber and a troublemaker.)
  '5':
  - type: text
    content: '“Jesus of Nazareth,” '
  - type: note
    content: Or “Jesus, the Nazarene.” This is the Aramaic word nussraya, which means “victorious one” or “heir of a powerful family.” The Hebrew word for “Nazareth” comes from the root word netzer, which means “branch.” See Isa. 4:2; 11:1.
  - type: text
    content: they replied. (Now Judas, the traitor, was among them.)
  - type: text
    content: 'He replied, '
  - type: text
    content: “I am he.”
  '6':
  - type: text
    content: 'And the moment Jesus spoke the words, '
  - type: text
    content: “I am he,”
  - type: text
    content: ' the mob fell backward to the ground!'
  - type: note
    content: This was a stunning event as the great I Am spoke his name before those who sought to seize him. It is obvious in the text that they did not trip over each other in surprise, for every one of these strong men fell backward to the ground by the power of God. Jesus was in charge that night as the captain of the host of the Lord. They could not seize him unless he permitted them to do so. What a wonderful Savior who willingly submitted to the hands of cruel men to bring us the gift of salvation.
  '7':
  - type: text
    content: 'So once more, Jesus asked them, '
  - type: text
    content: “Who are you looking for?”
  - type: text
    content: As they stood up, they answered, “Jesus of Nazareth.”
  '8':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I told you that I am the one you’re looking for, so if you want me, let these men go home.”
  - type: note
    content: “These men” were the eleven disciples who were with Jesus in the garden.
  '9':
  - type: text
    content: 'He said this to fulfill the prophecy he had spoken, '
  - type: text
    content: “Father, not one of those you have given me has been lost.”
  - type: note
    content: See John 6:39; 17:12.
