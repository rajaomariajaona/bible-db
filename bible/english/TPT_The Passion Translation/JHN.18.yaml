document_id: JHN.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus in the Garden of Gethsemane
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After Jesus finished this prayer; he left with his disciples and went across the Kidron Valley '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Kidron ravine is the path David took when he was forced to flee Jerusalem because of the betrayal of his son Absalom. David went up the Mount of Olives weeping. Jesus went up also in sorrow. David went up to save himself; Jesus went up to save the people of the world.
    marker-yv: yv-n
  - type: text
    text: 'to a place where there was a garden. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the garden of Gethsemane, which means “olive press.” Jesus not only went to the garden to pray, but to be captured. He knew full well the Father’s plan. Just as Adam fell in a garden of paradise, Jesus stood faithful in a garden of betrayal.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Judas, the traitor, knew where this place was, for Jesus had gone there often with his disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The Pharisees and the leading priests had given Judas a large detachment '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek and Aramaic word used for this company of soldiers implies quite a large number, up to five or six hundred men sent to arrest Jesus. Even his enemies knew his power was great.
    marker-yv: yv-n
  - type: text
    text: 'of Roman soldiers and temple police to seize Jesus. Judas guided them to the garden, all of them carrying torches and lanterns and armed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with swords and spears
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word is “foot-soldiers’ weapons.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus, knowing full well what was about to happen, went out to the garden entrance to meet them. Stepping forward, he asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who are you looking for?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Jesus of Nazareth,” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Jesus, the Nazarene.” This is the Aramaic word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nussraya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means “victorious one” or “heir of a powerful family.” The Hebrew word for “Nazareth” comes from the root word'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: netzer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means “branch.” See'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 4:2
      metadata:
        usfm: ISA.4.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:1
      metadata:
        usfm: ISA.11.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: they replied. (Now Judas, the traitor, was among them.)
- type: usfm
  marker: p
  children:
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am he.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the moment Jesus spoke the words, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am he,”
  - type: text
    text: ' the mob fell backward to the ground!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was a stunning event as the great I Am spoke his name before those who sought to seize him. It is obvious in the text that they did not trip over each other in surprise, for every one of these strong men fell backward to the ground by the power of God. Jesus was in charge that night as the captain of the host of the Lord. They could not seize him unless he permitted them to do so. What a wonderful Savior who willingly submitted to the hands of cruel men to bring us the gift of salvation.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So once more, Jesus asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who are you looking for?”
- type: usfm
  marker: p
  children:
  - type: text
    text: As they stood up, they answered, “Jesus of Nazareth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I told you that I am the one you’re looking for, so if you want me, let these men go home.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “These men” were the eleven disciples who were with Jesus in the garden.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He said this to fulfill the prophecy he had spoken, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Father, not one of those you have given me has been lost.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 6:39
      metadata:
        usfm: JHN.6.39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:12
      metadata:
        usfm: JHN.17.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Suddenly, Peter took out his sword and struck the high priest’s servant, slashing off his right ear! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This event is a vivid picture of what happens when we act impetuously and in anger. We hinder people’s ability to hear our message (we cut off their ear) when we walk in angry offense toward others.
    marker-yv: yv-n
  - type: text
    text: The servant’s name was Malchus.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Malchus’ name means “king.” Perhaps at the moment of healing his ear, Jesus personally revealed himself to Malchus in a supernatural way, the King who healed a king. Jesus is the true servant to the High Priest. We can imagine Jesus reaching out his hand to help Malchus up. And in an instant, Malchus believes. Malchus’ ears, both of them, are healed.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jesus ordered Peter, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Put your sword away! Do you really think I will avoid the suffering
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Shall I not drink the cup (of suffering) assigned me by the Father?”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: which my Father has assigned to me?”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Is Taken before Annas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then the soldiers and their captain, along with the Jewish officers, seized Jesus and tied him up. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'They took him first to Annas, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: John is the only Gospel account that inserts this pre-trial meeting with Annas. He was the retired and illegal high priest.
    marker-yv: yv-n
  - type: text
    text: 'as he was the father-in-law of Caiaphas, the high priest that year. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “close friend to the high priest.” The priesthood was corrupt in the time of Jesus. It was not proper for two men to hold the office of high priest at the same time, as it apparently was done in Jesus’ day. They both were called high priest in this narrative. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 18:19
      metadata:
        usfm: JHN.18.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '24'
      metadata:
        usfm: JHN.18.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Caiaphas was the one who had persuaded the Jewish leaders that it would be better off to have one person die for the sake of the people.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 11:49–51
      metadata:
        usfm: JHN.11.49+JHN.11.50+JHN.11.51
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter’s First Denial
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Peter and another disciple followed along behind them as they took Jesus into the courtyard of Annas’ palace. Since the other disciple was well known to the high priest, he entered in, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although it is impossible to determine who exactly was this other disciple, some have surmised it was John himself, or Nicodemus. If it was Nicodemus, as a leader among the Pharisees, this would explain his inclusion into the proceedings taking place that night.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'but Peter was left standing outside by the gate. Then the other disciple came back out to the servant girl who was guarding the gate and convinced her to allow Peter inside. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: As he passed inside, the young servant girl guarding the gate took a look at Peter and said to him, “Aren’t you one of his disciples?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He denied it, saying, “No! I’m not!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Now because it was cold, the soldiers and guards made a charcoal fire and were standing around it to keep warm. So Peter huddled there with them around the fire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Interrogated by Annas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The high priest interrogated Jesus concerning his disciples '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is interesting that Annas was concerned about Jesus’ disciples. The religious spirit is always concerned with impressive numbers and influence. Jesus only had twelve disciples who were always with him.
    marker-yv: yv-n
  - type: text
    text: and his teachings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jesus answered Annas’ questions by saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I have said nothing in secret. At all times I have taught openly and publicly in a synagogue, in the temple courts, and wherever the people assemble.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Why would you ask me for evidence to condemn me? Ask those who have heard what I’ve taught. They can tell you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Just then one of the guards standing near Jesus punched him in the face with his fist '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek is simply “struck him.” This could have been with a rod, for the verb has an etymological connection to the word for “rod.” Most translators have chosen to use “struck [or ‘slapped’] with his hand.” Regardless, Jesus was beaten everywhere he went that night and the next morning until he was finally crucified.
    marker-yv: yv-n
  - type: text
    text: and said, “How dare you answer the high priest like that!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If my words are evil, then prove it. But if I haven’t broken any laws, then why would you hit me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Then Annas sent Jesus, still tied up, across the way to the high priest Caiaphas.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter’s Second and Third Denials
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Meanwhile, Peter was still standing in the courtyard by the fire. And one of the guards standing there said to him, “Aren’t you one of his disciples? I know you are!” Peter swore '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. This is a very strong word that can also be translated “blasphemed.” God’s loving grace forgave Peter’s sin—and our sin.
    marker-yv: yv-n
  - type: text
    text: 'and said, “I am not his disciple!” '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But one of the servants of the high priest, a relative to the man whose ear Peter had cut off, looked at him and said, “Wait! Didn’t I see you out there in the garden with Jesus?” '
  - type: usfm
    marker: v
