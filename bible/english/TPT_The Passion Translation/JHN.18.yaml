        text: Barabbas is an Aramaic name that means “son of the father.” He becomes a picture of every son of Adam, our father. Some believe this is a figure of speech, a nickname for one who has no known father, an illegitimate son. Both in Greek and Aramaic the word for “thief” or “robber” can also mean “one who leads an insurrection.”
