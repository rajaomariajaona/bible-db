document_id: SNG.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Bridegroom-King
  - type: text
    content: I have gathered from your heart,
  - type: text
    content: my equal, my bride,
  - type: text
    content: I have gathered from my garden
  - type: text
    content: all my sacred spices—even my myrrh.
  - type: text
    content: I have tasted and enjoyed my wine within you.
  - type: text
    content: I have tasted with pleasure my pure milk, my honeycomb,
  - type: text
    content: which you yield to me.
  - type: text
    content: I delight in gathering my sacred spice,
  - type: text
    content: all the fruits of my life I have
  - type: text
    content: gathered from within you, my paradise garden.
  - type: text
    content: Come, all my friends—
  - type: text
    content: feast upon my bride, all you revelers of my palace.
  - type: text
    content: Feast on her, my lovers!
  - type: text
    content: Drink and drink, and drink again,
  - type: text
    content: until you can take no more.
  - type: text
    content: Drink the wine of her love.
  - type: text
    content: Take all you desire, you priests.
  - type: text
    content: My life within her will become your feast.
  - type: note
    content: The beautiful bride overflowing with the bridegroom’s life is to be given to others, even as Jesus was given to us by the Father. She has become a feast for the nations, and wine to cheer the hearts of others.
  - type: heading
    content: The Shulamite Bride
  '10':
  - type: text
    content: He alone is my beloved.
  - type: text
    content: He shines in dazzling splendor yet is still so approachable—
  - type: text
    content: without equal as he stands above all others,
  - type: text
    content: outstanding among ten thousand!
  - type: note
    content: Or “waving his banner to myriads.” Jesus stands above all others.
  '11':
  - type: text
    content: The way he leads me is divine.
  - type: text
    content: His leadership—so pure and dignified
  - type: text
    content: as he wears his crown of gold.
  - type: text
    content: Upon this crown are letters of black written
  - type: text
    content: on a background of glory.
  - type: note
    content: Many Jewish interpreters have seen the phrase “His locks are wavy [like a palm branch] and black as a raven” as pointing us to the letters of the law written in heaven. Jewish rabbis teach that the precepts of the Word of God (Torah) are written in the heavenly realm, with black letters on top of white flames of glory fire. (Hebrew letters can appear as locks of hair.)
  '12':
  - type: text
    content: He sees everything with pure understanding.
  - type: text
    content: How beautiful his insights—without distortion.
  - type: text
    content: His eyes rest upon the fullness of the river of revelation,
  - type: text
    content: flowing so clean and pure.
  '13':
  - type: text
    content: Looking at his gentle face, I see such fullness of emotion.
  - type: text
    content: 'Like a lovely garden where fragrant spices grow '
  - type: note
    content: The Hebrew text is literally “like a tower of fragrance.” These beds of spices would picture a garden of emotion and sweetness coming forth from the bride’s beloved.
  - type: text
    content: —
  - type: text
    content: what a man!
  - type: text
    content: 'No one speaks words so anointed as this one '
  - type: note
    content: See Ps. 45:2, a psalm with an inscription stating it was written to the “melody of ‘Lilies.’ ”
  - type: text
    content: —
  - type: text
    content: words that both pierce and heal,
  - type: text
    content: words like lilies dripping with myrrh.
  '14':
  - type: text
    content: See how his hands hold unlimited power!
  - type: text
    content: But he never uses it in anger,
  - type: text
    content: for he is always holy, displaying his glory.
  - type: text
    content: His innermost place is a work of art—
  - type: text
    content: so beautiful and bright.
  - type: text
    content: How magnificent and noble is this one—
  - type: text
    content: covered in majesty!
  '15':
  - type: text
    content: He’s steadfast in all he does.
  - type: text
    content: His ways are the ways of righteousness,
  - type: text
    content: based on truth and holiness.
  - type: text
    content: None can rival him,
  - type: text
    content: but all will be amazed by him.
  - type: note
    content: Or “He looks like Lebanon, choice as its cedars.” The Hebrew word for “choice” (bahur) has a homonym that means “young man.”
  '16':
  - type: text
    content: Most sweet are his kisses, even his whispers of love.
  - type: text
    content: He is delightful in every way
  - type: text
    content: and perfect from every viewpoint.
  - type: text
    content: If you ask me why I love him so, O brides-to-be,
  - type: text
    content: it’s because there is none like him to me.
  - type: text
    content: Everything about him fills me with holy desire!
  - type: text
    content: And now he is my beloved—my friend forever.
  '2':
  - type: text
    content: After this I let my devotion slumber,
  - type: text
    content: but my heart for him stayed awake.
  - type: text
    content: I had a dream.
  - type: text
    content: I dreamed of my beloved—
  - type: text
    content: he was coming to me in the darkness of night.
  - type: text
    content: The melody of the man I love awakened me.
  - type: text
    content: I heard his knock at my heart’s door
  - type: text
    content: 'as he pleaded with me:'
  - type: heading
    content: The Bridegroom-King
  - type: text
    content: Arise, my love.
  - type: text
    content: Open your heart, my darling, deeper still to me.
  - type: text
    content: Will you receive me this dark night?
  - type: text
    content: There is no one else but you, my friend, my equal.
  - type: text
    content: I need you this night to arise and come be with me.
  - type: text
    content: You are my pure, loyal dove, a perfect partner for me.
  - type: text
    content: My flawless one, will you arise?
  - type: text
    content: For my heaviness and tears are more than I can bear.
  - type: text
    content: I have spent myself for you throughout the dark night.
  - type: note
    content: The Hebrew text literally means “My head is filled with dew and my hair with the drops of the night.” This is clearly a picture of Jesus as the Gethsemane Man, the one who prayed all night for us (see John 17). This translation takes the liberty of taking the implicit and making it explicit in order to express the dynamic equivalent and aid the reader in understanding the scene.
  - type: heading
    content: The Sleeping Bride
  '3':
  - type: text
    content: I have already laid aside my own garments for you.
  - type: text
    content: How could I take them up again
  - type: text
    content: since I’ve yielded my righteousness to yours?
  - type: note
    content: Garments in the Bible are frequently used as a picture of righteousness. Filthy garments are a symbol of unrighteousness or self-righteousness. Clean white garments are a picture of the righteousness of Christ. Laying aside her garments is a symbolic picture of what happens when we come to know Jesus as Savior—we lay aside our self-righteousness and take up his garments of true righteousness.
  - type: text
    content: You have cleansed my life and taken me so far.
  - type: text
    content: Isn’t that enough?
  '4':
  - type: text
    content: My beloved reached into me to unlock my heart.
  - type: text
    content: The core of my very being trembled at his touch.
  - type: text
    content: How my soul melted when he spoke to me!
  '5':
  - type: text
    content: My spirit arose to open for more of his touch.
  - type: text
    content: As I surrendered to him, I began to sense his fragrance—
  - type: text
    content: the fragrance of his suffering love!
  - type: text
    content: It was the sense of myrrh flowing all through me!
  '6':
  - type: text
    content: I opened my soul to my beloved, but suddenly he was gone!
  - type: text
    content: And my heart was torn out in longing for him.
  - type: text
    content: I sought his presence, his fragrance,
  - type: text
    content: but could not find him anywhere.
  - type: text
    content: I called out for him, yet he did not answer me.
  - type: text
    content: I will arise and search for him until I find him.
  '7':
  - type: text
    content: As I walked throughout the city in search of him,
  - type: text
    content: the overseers stopped me as they made their rounds.
  - type: text
    content: They beat me and bruised me until I could take no more.
  - type: text
    content: They wounded me deeply
  - type: text
    content: and removed my covering from me.
  '8':
  - type: text
    content: 'Nevertheless, make me this promise, you brides-to-be:'
  - type: text
    content: if you find my beloved one,
  - type: text
    content: please tell him I endured all travails for him.
  - type: text
    content: I’ve been pierced through by love,
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: and I will not be turned aside!
  - type: heading
    content: Jerusalem Maidens, Brides-to-Be
  '9':
  - type: text
    content: What love is this?
  - type: text
    content: How could you continue to care so deeply for him?
  - type: text
    content: Isn’t there another who could steal away your heart?
  - type: text
    content: We see now your beauty, more beautiful than all the others.
  - type: text
    content: What makes your beloved better than any other?
  - type: text
    content: What is it about him
  - type: text
    content: that makes you ask us to promise you this?
  - type: heading
    content: The Shulamite Bride
