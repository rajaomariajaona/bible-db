document_id: SNG.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Bridegroom-King
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I have gathered from your heart,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: my equal, my bride,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I have gathered from my garden
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: all my sacred spices—even my myrrh.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I have tasted and enjoyed my wine within you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I have tasted with pleasure my pure milk, my honeycomb,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: which you yield to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I delight in gathering my sacred spice,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: all the fruits of my life I have
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: gathered from within you, my paradise garden.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Come, all my friends—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: feast upon my bride, all you revelers of my palace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Feast on her, my lovers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Drink and drink, and drink again,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: until you can take no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Drink the wine of her love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Take all you desire, you priests.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: My life within her will become your feast.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The beautiful bride overflowing with the bridegroom’s life is to be given to others, even as Jesus was given to us by the Father. She has become a feast for the nations, and wine to cheer the hearts of others.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Shulamite Bride
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: After this I let my devotion slumber,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but my heart for him stayed awake.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I had a dream.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I dreamed of my beloved—
- type: usfm
  marker: q1
  children:
  - type: text
    text: he was coming to me in the darkness of night.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The melody of the man I love awakened me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I heard his knock at my heart’s door
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'as he pleaded with me:'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Bridegroom-King
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Arise, my love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Open your heart, my darling, deeper still to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Will you receive me this dark night?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: There is no one else but you, my friend, my equal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I need you this night to arise and come be with me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You are my pure, loyal dove, a perfect partner for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: My flawless one, will you arise?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For my heaviness and tears are more than I can bear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I have spent myself for you throughout the dark night.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text literally means “My head is filled with dew and my hair with the drops of the night.” This is clearly a picture of Jesus as the Gethsemane Man, the one who prayed all night for us (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 17
      metadata:
        usfm: JHN.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). This translation takes the liberty of taking the implicit and making it explicit in order to express the dynamic equivalent and aid the reader in understanding the scene.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sleeping Bride
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I have already laid aside my own garments for you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How could I take them up again
- type: usfm
  marker: q1
  children:
  - type: text
    text: since I’ve yielded my righteousness to yours?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Garments in the Bible are frequently used as a picture of righteousness. Filthy garments are a symbol of unrighteousness or self-righteousness. Clean white garments are a picture of the righteousness of Christ. Laying aside her garments is a symbolic picture of what happens when we come to know Jesus as Savior—we lay aside our self-righteousness and take up his garments of true righteousness.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have cleansed my life and taken me so far.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isn’t that enough?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: My beloved reached into me to unlock my heart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The core of my very being trembled at his touch.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How my soul melted when he spoke to me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My spirit arose to open for more of his touch.
- type: usfm
  marker: q1
  children:
  - type: text
    text: As I surrendered to him, I began to sense his fragrance—
- type: usfm
  marker: q1
  children:
  - type: text
    text: the fragrance of his suffering love!
- type: usfm
  marker: q1
  children:
  - type: text
    text: It was the sense of myrrh flowing all through me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I opened my soul to my beloved, but suddenly he was gone!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my heart was torn out in longing for him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I sought his presence, his fragrance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but could not find him anywhere.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I called out for him, yet he did not answer me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will arise and search for him until I find him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: As I walked throughout the city in search of him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the overseers stopped me as they made their rounds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They beat me and bruised me until I could take no more.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They wounded me deeply
- type: usfm
  marker: q1
  children:
  - type: text
    text: and removed my covering from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nevertheless, make me this promise, you brides-to-be:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: if you find my beloved one,
- type: usfm
  marker: q1
  children:
  - type: text
    text: please tell him I endured all travails for him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve been pierced through by love,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I will not be turned aside!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jerusalem Maidens, Brides-to-Be
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: What love is this?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How could you continue to care so deeply for him?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isn’t there another who could steal away your heart?
- type: usfm
  marker: q1
  children:
  - type: text
    text: We see now your beauty, more beautiful than all the others.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What makes your beloved better than any other?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What is it about him
- type: usfm
  marker: q1
  children:
  - type: text
    text: that makes you ask us to promise you this?
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Shulamite Bride
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He alone is my beloved.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He shines in dazzling splendor yet is still so approachable—
- type: usfm
  marker: q1
  children:
  - type: text
    text: without equal as he stands above all others,
- type: usfm
  marker: q1
  children:
  - type: text
    text: outstanding among ten thousand!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “waving his banner to myriads.” Jesus stands above all others.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The way he leads me is divine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His leadership—so pure and dignified
- type: usfm
  marker: q1
  children:
  - type: text
    text: as he wears his crown of gold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Upon this crown are letters of black written
- type: usfm
  marker: q1
  children:
  - type: text
    text: on a background of glory.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Many Jewish interpreters have seen the phrase “His locks are wavy [like a palm branch] and black as a raven” as pointing us to the letters of the law written in heaven. Jewish rabbis teach that the precepts of the Word of God (Torah) are written in the heavenly realm, with black letters on top of white flames of glory fire. (Hebrew letters can appear as locks of hair.)
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He sees everything with pure understanding.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How beautiful his insights—without distortion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His eyes rest upon the fullness of the river of revelation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: flowing so clean and pure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Looking at his gentle face, I see such fullness of emotion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Like a lovely garden where fragrant spices grow '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text is literally “like a tower of fragrance.” These beds of spices would picture a garden of emotion and sweetness coming forth from the bride’s beloved.
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q1
  children:
  - type: text
    text: what a man!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'No one speaks words so anointed as this one '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 45:2
      metadata:
        usfm: PSA.45.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a psalm with an inscription stating it was written to the “melody of ‘Lilies.’ ”'
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q1
  children:
  - type: text
    text: words that both pierce and heal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: words like lilies dripping with myrrh.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: See how his hands hold unlimited power!
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he never uses it in anger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for he is always holy, displaying his glory.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His innermost place is a work of art—
- type: usfm
  marker: q1
  children:
  - type: text
    text: so beautiful and bright.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How magnificent and noble is this one—
- type: usfm
  marker: q1
  children:
  - type: text
    text: covered in majesty!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He’s steadfast in all he does.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His ways are the ways of righteousness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: based on truth and holiness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: None can rival him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but all will be amazed by him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “He looks like Lebanon, choice as its cedars.” The Hebrew word for “choice” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: bahur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) has a homonym that means “young man.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Most sweet are his kisses, even his whispers of love.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is delightful in every way
- type: usfm
  marker: q1
  children:
  - type: text
    text: and perfect from every viewpoint.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you ask me why I love him so, O brides-to-be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: it’s because there is none like him to me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everything about him fills me with holy desire!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And now he is my beloved—my friend forever.
