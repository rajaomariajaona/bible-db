document_id: PSA.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Song of the Steadfast
  - type: text
    content: For the Pure and Shining One by King David
  - type: heading
    content: The Advice to Flee
  - type: text
    content: 'My faith shelters my soul continually in '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: 'Why would you say to me:'
  - type: text
    content: “
  - type: text
    content: Run away while you can!
  - type: text
    content: 'Fly away like a bird to hide in the mountains '
  - type: text
    content: for safety
  - type: text
    content: .
  '2':
  - type: text
    content: For your enemies have prepared a trap for you!
  - type: text
    content: Can’t you see them hiding
  - type: text
    content: in their place of darkness and shadows?
  - type: text
    content: They’re set against all those who live upright lives.
  '3':
  - type: text
    content: What can the righteous accomplish
  - type: text
    content: when truth’s pillars are destroyed and law and order collapse?”
  - type: heading
    content: The Answer of Faith
  '4':
  - type: text
    content: Yet
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: is never shaken
  - type: text
    content: ' '
  - type: note
    content: This is an implied contrast made explicit from the text. This psalm shows the contrast between what can be shaken and what is unshakable.
  - type: text
    content: —
  - type: text
    content: he is still found in his temple of holiness,
  - type: text
    content: 'reigning as King '
  - type: text
    content: Yahweh
  - type: text
    content: ' over all.'
  - type: text
    content: He closely watches and examines everything man does.
  - type: text
    content: 'With a glance, his eyes '
  - type: note
    content: The actual Hebrew is “his eyelids.” Some see the “eyelid” as the lid of the ark of the covenant, which was the mercy seat.
  - type: text
    content: examine every heart,
  - type: text
    content: for his heavenly rule will prevail over all.
  '5':
  - type: text
    content: Yahweh
  - type: text
    content: ' tests both the righteous '
  - type: text
    content: and the wicked
  - type: text
    content: .
  - type: text
    content: God’s very soul detests lovers of violence.
  '6':
  - type: text
    content: 'He will '
  - type: note
    content: Or “May he.”
  - type: text
    content: rain down upon them judgment for their sins.
  - type: text
    content: A scorching wind will be their lot in life.
  '7':
  - type: text
    content: 'But remember this: '
  - type: text
    content: Yahweh
  - type: text
    content: ' is the Righteous One who loves'
  - type: text
    content: justice, and every godly one
  - type: text
    content: will gaze upon his face!
