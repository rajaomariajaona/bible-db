document_id: PSA.38,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: A Groan before the Throne
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A poetic lament to remember, by King David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint has in the inscription “To be remembered on the Sabbath.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Lord, don’t punish me angrily for what I’ve done.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let my sin inflame your wrath against me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart beats wildly, my strength is sapped,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the light of my eyes is going out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My friends stay far away from me, avoiding me like the plague.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even my family wants nothing to do with me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Meanwhile my enemies are out to kill me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plotting my ruin, speaking of my doom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as they spend every waking moment
  - type: usfm
    marker: q1
    children:
    - type: text
      text: planning how to finish me off.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m like a deaf man who no longer hears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I can’t even speak up, and words fail me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have no argument to counter their threats.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, the only thing I can do is wait and put my hope in you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I wait for your help, my God.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So hear my cry and put an end to their strutting in pride,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to those who gloat when I stumble in pain.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m slipping away and on the verge of a breakdown,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with nothing but sorrow and sighing.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 38:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint reads “I am prepared for all of their whips—prepared to suffer.”
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I confess all my sin to you; I can’t hold it in any longer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My agonizing thoughts punish me for my wrongdoing;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I feel condemned as I consider all I’ve done.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My enemies are many.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They hate me and persecute me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: though I’ve done nothing against them to deserve it.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the arrows of your conviction have pierced me deeply.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your blows have struck my soul and crushed me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I show goodness to them and get paid evil in return.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they hate me even more when I stand for what is right.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So don’t forsake me now, Lord!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t leave me in this condition.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, hurry to help me. Run to my rescue!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you’re my Savior and my only hope!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now my body is sick.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My health is totally broken because of your anger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and it’s all due to my sins!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m overwhelmed, swamped, and submerged
  - type: usfm
    marker: q1
    children:
    - type: text
      text: beneath the heavy burden of my guilt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It clings to me and won’t let me go.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My rotting wounds are a witness against me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are severe and getting worse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: reminding me of my failure and folly.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am completely broken because of what I’ve done.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gloom is all around me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My sins have bent me over to the ground.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My inner being is shriveled up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my self-confidence crushed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sick with fever, I’m left exhausted.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I’m as cold as a corpse, and nothing is left inside me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but great groaning filled with anguish.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, you know all my desires and deepest longings.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My tears are liquid words, and you can read them all.
