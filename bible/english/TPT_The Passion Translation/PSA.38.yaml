document_id: PSA.38,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Groan before the Throne
  - type: text
    content: A poetic lament to remember, by King David
  - type: note
    content: The Septuagint has in the inscription “To be remembered on the Sabbath.”
  - type: text
    content: O Lord, don’t punish me angrily for what I’ve done.
  - type: text
    content: Don’t let my sin inflame your wrath against me.
  '10':
  - type: text
    content: My heart beats wildly, my strength is sapped,
  - type: text
    content: and the light of my eyes is going out.
  - type: text
    content: My friends stay far away from me, avoiding me like the plague.
  - type: text
    content: Even my family wants nothing to do with me.
  '12':
  - type: text
    content: Meanwhile my enemies are out to kill me,
  - type: text
    content: plotting my ruin, speaking of my doom
  - type: text
    content: as they spend every waking moment
  - type: text
    content: planning how to finish me off.
  '13':
  - type: text
    content: I’m like a deaf man who no longer hears.
  - type: text
    content: I can’t even speak up, and words fail me;
  - type: text
    content: I have no argument to counter their threats.
  '15':
  - type: text
    content: Lord, the only thing I can do is wait and put my hope in you.
  - type: text
    content: I wait for your help, my God.
  '16':
  - type: text
    content: So hear my cry and put an end to their strutting in pride,
  - type: text
    content: to those who gloat when I stumble in pain.
  '17':
  - type: text
    content: I’m slipping away and on the verge of a breakdown,
  - type: text
    content: with nothing but sorrow and sighing.
  - type: note
    content: The Septuagint reads “I am prepared for all of their whips—prepared to suffer.”
  '18':
  - type: text
    content: I confess all my sin to you; I can’t hold it in any longer.
  - type: text
    content: My agonizing thoughts punish me for my wrongdoing;
  - type: text
    content: I feel condemned as I consider all I’ve done.
  '19':
  - type: text
    content: My enemies are many.
  - type: text
    content: They hate me and persecute me,
  - type: text
    content: though I’ve done nothing against them to deserve it.
  '2':
  - type: text
    content: For the arrows of your conviction have pierced me deeply.
  - type: text
    content: Your blows have struck my soul and crushed me.
  '20':
  - type: text
    content: I show goodness to them and get paid evil in return.
  - type: text
    content: And they hate me even more when I stand for what is right.
  '21':
  - type: text
    content: So don’t forsake me now, Lord!
  - type: text
    content: Don’t leave me in this condition.
  '22':
  - type: text
    content: God, hurry to help me. Run to my rescue!
  - type: text
    content: For you’re my Savior and my only hope!
  '3':
  - type: text
    content: Now my body is sick.
  - type: text
    content: My health is totally broken because of your anger,
  - type: text
    content: and it’s all due to my sins!
  '4':
  - type: text
    content: I’m overwhelmed, swamped, and submerged
  - type: text
    content: beneath the heavy burden of my guilt.
  - type: text
    content: It clings to me and won’t let me go.
  '5':
  - type: text
    content: My rotting wounds are a witness against me.
  - type: text
    content: They are severe and getting worse,
  - type: text
    content: reminding me of my failure and folly.
  '6':
  - type: text
    content: I am completely broken because of what I’ve done.
  - type: text
    content: Gloom is all around me.
  - type: text
    content: My sins have bent me over to the ground.
  '7':
  - type: text
    content: My inner being is shriveled up;
  - type: text
    content: my self-confidence crushed.
  - type: text
    content: Sick with fever, I’m left exhausted.
  - type: text
    content: Now I’m as cold as a corpse, and nothing is left inside me
  - type: text
    content: but great groaning filled with anguish.
  '9':
  - type: text
    content: Lord, you know all my desires and deepest longings.
  - type: text
    content: My tears are liquid words, and you can read them all.
