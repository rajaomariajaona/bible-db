        children:
        - type: text
          text: .
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I’m ready to boast of such an experience, but for my own good I refuse to boast unless it concerns my weaknesses. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “afflictions.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: However, if I were to boast, it wouldn’t be ridiculous at all, for I would be speaking the truth. Yet I will refrain, lest others think higher of me than what I demonstrate with my life and teaching.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s “Thorn”
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The extraordinary level of the revelations I’ve received is no reason for anyone to exalt me. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The true character of spiritual revelations is that they exalt Christ, not people. It is a paradox that the greater our understanding of God, the less we truly know and the more humble we become. Paul refused to be exalted in the eyes of others. This is the nature of true apostolic ministry.
      marker-yv: yv-n
    - type: text
      text: 'For this is why a thorn in my flesh was given to me, the Adversary’s messenger sent to harass me, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to slap my face” or “to box my ears.” Paul did not have a demon, though it was possible that a demon followed him to harass and hinder. This is more likely a metaphor of the harassment he endured, the constant misunderstanding and persecution that came to him because of his faith in Jesus. There is no indication that this “thorn” was a sickness. In Paul’s list of hardships (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 11:23–27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) he does not mention a sickness or disease.
      marker-yv: yv-n
    - type: text
      text: 'keeping me from becoming arrogant. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Three times I pleaded with the Lord to relieve me of this. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he answered me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My grace is always more than enough for you,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “My grace is continuously sufficient in you” (to ward it off).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and my power finds its full expression through your weakness.”
    - type: text
      text: ' So I will celebrate my weaknesses, for when I’m weak I sense more deeply the mighty power of Christ living in me. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The power of Christ rests upon me like a tent or tabernacle” (providing me shelter).
      marker-yv: yv-n
