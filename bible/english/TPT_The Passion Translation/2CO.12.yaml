document_id: 2CO.12,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Visions and Revelations
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Although it may not accomplish a thing, I need to move on and boast about supernatural visions and revelations of the Lord. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “from the Lord.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I’m '
    - type: usfm
      marker: it
      children:
      - type: text
        text: not defeated
    - type: text
      text: ' by my weakness, but delighted! For when I feel my weakness and endure mistreatment—when I’m surrounded with troubles on every side and face persecution '
    - type: usfm
      marker: it
      children:
      - type: text
        text: because of my love
    - type: text
      text: ' for Christ—I am made yet stronger. For my weakness becomes a portal to God’s power.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Signs of an Apostle
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have become foolish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to boast like this
    - type: text
      text: ', but you have forced me to do it, when you should have boasted in me instead. For there is nothing I lack compared to these “super-apostles” of yours, even though I am nothing. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The things that distinguish a true apostle were performed among you with great perseverance—supernatural signs, startling wonders, and awesome miracles.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Furthermore, how were you treated worse than the other churches, except that I didn’t burden you financially—forgive me for depriving you! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul appears to be addressing a complaint that he had treated the Corinthians differently than the other churches when, in fact, he had refused their financial support and was helped instead by the Philippians, who aided him financially while in Corinth, and for this he should have been commended by them. The five marks of Paul being a true apostle are (1) supernatural signs attesting to God’s presence and authority, (2) wonderful deeds that could be explained only by a supernatural God, (3) powerful miracles that point to Christ, (4) treating the churches with respect and not wanting to burden them if at all possible, and (5) becoming a true spiritual father to the churches (see v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now here I am, ready to come to you for the third time, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It was during Paul’s third visit to Corinth that he wrote the letter to the Romans.
      marker-yv: yv-n
    - type: text
      text: 'and I still refuse to be a burden to you. For what I really want is your hearts, not your money. After all, children should not have to accumulate resources for their parents, but parents do this for their children. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And as a spiritual father to you
    - type: text
      text: ', I will gladly spend all that I have and all that I am for you! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “for your souls.”
      marker-yv: yv-n
    - type: text
      text: If I love you more, will you respond by loving me less?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts indicate that this is not a rhetorical clause but make it into a concessive clause subordinate to the first half of the verse, effectively changing the meaning to “I will gladly spend all that I am for you, even though you love me less for doing so.” Sacrificial love is always the key to opening the hearts of people we minister to and serve.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be that as it may, I haven’t been a burden to you at all, yet you say of me, “He’s a scoundrel and a trickster!” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But let me ask you this
    - type: text
      text: '. Did I somehow cheat or trick you through any of the men I sent your way? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I was the one who insisted that Titus and our brother come '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and help you
    - type: text
      text: '. Did Titus take advantage of you? Didn’t we all come to you in the same spirit, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: following in the ways of integrity
    - type: text
      text: '?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I hope that you don’t assume that all this time we have simply been justifying ourselves in your eyes? Beloved ones, we have been speaking to you in the sight of God as those joined to Christ, and everything we do is meant to build you up and make you stronger in your faith. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Someone I’m acquainted with, who is in union with Christ, was swept away fourteen years ago in an ecstatic experience. He was taken into the third heaven, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although there are Jewish traditions that present a cosmology of seven levels of heaven, most scholars conclude that the third heaven is the highest realm of the immediate presence of God.
      marker-yv: yv-n
    - type: text
      text: 'but I’m not sure if he was in his body or out of his body—only God knows. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now I’m afraid that when I come to you I may find you different than I desire you to be, and you may find me different than you would like me to be. I don’t want to find you in disunity, with jealousy and angry outbursts, with selfish ambition, slander, gossip, arrogance, and turmoil. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I’m actually afraid that on my next visit my God will humble me in front of you as I shed tears over those who keep sinning without repenting of their impurity, sexual immorality, and perversion.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I know that this man '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There are a number of compelling reasons to conclude that the “man” Paul refers to in vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'is himself: (1) He knew the exact time this ecstatic experience took place. (2) He knew that what was overheard in the third heaven was “inexpressible” and not to be repeated. (3) He was not certain about what state he was in (embodied/disembodied). (4) In v.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: he uses the first-person pronoun
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: me
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (“a thorn in the flesh was given to me”) as a counterbalance to the high level of revelation that Paul had received. It was a common literary device, a rhetorical ploy, to avoid speaking of oneself directly in this fashion and by using the phrase “Someone I’m acquainted with” (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) when he, in fact, was referring to himself. It is a sign of Paul’s humility and integrity that he did not “boast” of this event that took place fourteen years earlier. Many today who have experiences with God are quick to tell what happened. Paul veiled his heavenly encounters with God and waited to share them only when it was appropriate and faith-building for others. Not every experience we have is meant to be shared immediately. This is what got Joseph the dreamer thrown into a pit by his jealous brothers.
      marker-yv: yv-n
    - type: text
      text: '(again, I’m not sure if he was still in his body or taken out of his body—God knows) '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'was caught up in an ecstatic experience and brought into paradise, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: What Paul described as the third heaven in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is now called paradise. It is possible that Paul is recounting two different experiences, or possibly one experience in which he ascended into two levels or two realms of encounter (third heaven and then paradise/seventh heaven). The third possibility is that it was one and the same place, described with different terms. For more on the term
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: paradise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Hb.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: pardes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Aramaic'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: pardesa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Gr.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: paradeisos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 2:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 23:43
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 2:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'where he overheard many wondrous and inexpressible secrets '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “words” or “matters” or “things.” Paul was privileged to see and hear of mysteries that are beyond the reach of human language and unable to be spoken by human lips.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: that were so sacred
    - type: text
      text: ' that no mortal is permitted to repeat them. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 10:4
      - type: usfm
