    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I know all that you’ve done for me—you have worked hard and persevered. I know that you don’t tolerate evil. You have tested those who claimed to be apostles and
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: proved
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: they are not,
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: for they were imposters.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I also know how you have bravely endured
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: trials and persecutions
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: because of my name, yet you have not become discouraged.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Aramaic can be translated “You endured suffering without complaining.” Every church should be known for these five qualities: (1) working for the kingdom, (2) persevering, (3) not being tolerant of sin, (4) examining the claims of ministries, and (5) enduring trials bravely. Yet doing all this without a passionate love for Jesus Christ weakens our power and witness in the world.'
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But I have this against you: you have abandoned the passionate love you had for me at the beginning.'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “you have abandoned your first love.” The Greek word for “first” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: protos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) means “foremost,” “best,” “paramount,” “supreme,” “crowning,” “number one.” Jesus is referring to exclusive love that has first place in our hearts above all else. Our first love is the love God has for us! We love God because he first loved us. Being loved deeply and eternally is the definition of our “first love.” It is a love that will be expressed by our passionate devotion to Jesus Christ, and seen in our relationships with others.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Think about how far you have fallen! Repent
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word for “repent” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: metanoia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and means more than simply changing one’s mind. It means “to take another mind.” Every believer needs to turn from his or her error and take “another mind,” the mind of Christ.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and do the works
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: of love
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you did at first.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, “Return to your passion for me that motivated you at the first.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I will come to you and remove your lampstand from its place
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: of influence
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: if you do not repent.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Although, to your credit, you despise the practices of the Nicolaitans, which I also despise.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek meaning of “Nicolaitans” is “to rule [conquer] over people.” Many see in this term the beginning of the movement of every believer from being a priest to being part of a special class of clergy who ruled over the church. There is also a case to be made that the Aramaic word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: niaqleidto
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can be translated “the performing of rituals,” which would make the verse read “You despise the performing of rituals, which I also despise.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The one whose heart is open let him listen carefully to what the Spirit is saying now to all the churches.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This shows that the message to these seven churches is for everyone today, not just a specific church or for a specific period of church history.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: To the one who overcomes
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “subdues,” “vanquishes,” “prevails,” “experiences victory.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I will give access to feast on the fruit of the Tree of Life that is found in the paradise of God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The paradise of God is now found within the hearts of Jesus’ loving followers. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Song. 4:11–15
      metadata:
        usfm: SNG.4.11+SNG.4.12+SNG.4.13+SNG.4.14+SNG.4.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The Tree of Life is Christ within us, the hope of glory. The fruit of that tree is reserved for those who overcome.
    marker-yv: yv-n
