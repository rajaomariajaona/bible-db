      - type: text
        text: Ancient church tradition states that Antipas was a disciple of John who was ordained by John to be the bishop of Pergamum during the reign of the emperor Domitian. He was believed to have been martyred in AD 92 after refusing to deny his faith and make a sacrifice to the gods. He was dragged to the temple of Diana and placed inside a bronze, bull-like altar and roasted alive. Eastern tradition states that Antipas was one of the seventy disciples whom Jesus sent out.
    marker-yv: yv-n
