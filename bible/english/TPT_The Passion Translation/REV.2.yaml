  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But to the rest of you in Thyatira who don’t adhere to the teachings of Jezebel and have not been initiated into deep satanic secrets,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “have not known the deep things of Satan.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I say to you (without laying upon you any other burden):'
  - type: text
    text: ' '
