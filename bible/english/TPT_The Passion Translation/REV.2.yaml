    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And written upon the white stone is inscribed his new name, known only to the one who receives it.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: We see that there are personal mysteries imparted to God’s people; that is, secrets that are between the believer and Jesus. Only someone devoted to God is to know the meaning of the shining white stone and the name written upon it. In the first century AD, the white stone became an engagement stone. It later took on the form of an engagement ring with the white stone being represented as a diamond. A bridegroom would give his bride a white stone with a special name engraved upon it, a pet name of endearment as lovers for life. Such names could be embarrassing and thus were kept secret and used only between themselves. Only one person in the world could call a woman by that special name, and that would be her husband, her beloved.
    marker-yv: yv-n
