    children:
    - type: text
      text: For these are the words of the one who holds the seven stars firmly in his right hand,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is good to remember that church leaders are “stars” who are firmly held in the right hand (authority and power) of Jesus Christ. He cares for both his churches and his leaders.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'who walks among the seven golden lampstands:'
- type: usfm
  marker: mi
