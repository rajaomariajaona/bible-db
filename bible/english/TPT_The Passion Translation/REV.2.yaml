    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (present-day Izmir, Turkey) means “sweet smelling” and comes from the word for “myrrh,” an embalming spice. It is seen throughout Scripture as an emblem for suffering. Like myrrh, the Smyrna church, known as the suffering church, was crushed by Roman persecution but gave off the most fragrant perfume.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For these are the words of the one who is the Beginning and the End, the one who became a corpse, but came back to life:'
