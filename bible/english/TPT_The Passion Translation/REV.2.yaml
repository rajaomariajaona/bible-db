        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I have waited for her to repent from her vile immorality, but she willingly refuses to do so.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now I will lay her low
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may be an idiom for a severe illness. The Aramaic can be translated “I will throw her down into a coffin.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: with terrible distress
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “great tribulation.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: along with all her adulterous partners if they do not repent.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Thyatira was known as the center of many guilds or trade societies that required their members to participate in idolatry (often involving sexual immorality). This would make it very difficult for the believers to remain morally pure in an immoral and idolatrous culture.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And I will strike down her followers with a deadly plague.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I will strike dead her children.” Her “children” would be a metaphor for her followers. Although the Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thanatos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means death, in some contexts it refers to deadly disease and is often translated “pestilence” in the Septuagint. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Greek-English Lexicon of the New Testament and Other Early Christian Literature
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 3rd ed., 443.'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then all the congregations will realize that I am the one who thoroughly searches the most secret thought
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “every emotion” (or “affection”).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and the innermost being.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “I am the guardian of hearts and souls.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I will give to each one what their works deserve.
  - type: text
    text: ' '
  - type: usfm
    marker: v
