      text: that has come against you from those who claim to be Jews but are not, for they are a satanic congregation.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:9
    - type: usfm
