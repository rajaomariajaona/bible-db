      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: of those in Jerusalem
    - type: text
      text: ', it will cause them to give glory to God—all because of your loyal support and allegiance to the gospel of Christ, as well as your generous-hearted partnership with them toward those in need. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because of this extraordinary grace, which God has lavished on you, they will affectionately remember you in their prayers. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Praise God for his astonishing gift, which is far too great for words!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek and Aramaic texts have a clean break at this point. This has caused some scholars to conclude that chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 10–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: may have originally been separated from the earlier chapters, which could imply that the following four chapters make up the missing letter of Paul to the Corinthians. If this is so, when reading 2 Corinthians, one could begin with chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 10–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Paul’s missing letter), then read from chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The term for this is “appending”; that is, taking an earlier document and adding a later manuscript to it. Yet in this case, the earlier document is appended.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for I already know that you are on board and eager to help. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “I know the goodness of your impulses” (or “intentions”). Paul was not hesitant to point out the obvious qualities and virtues of others.
      marker-yv: yv-n
    - type: text
      text: 'I keep boasting to the churches of Macedonia about your passion to give, telling them that the believers of Corinth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Achaia,” the Roman province where Corinth was situated.
      marker-yv: yv-n
    - type: text
      text: 'have been preparing to give for a year. Your enthusiasm is contagious—it has stirred many of them to do likewise. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Still, I thought it would be best to send these brothers to receive the offering that you’ve prepared, so that our boasting about how you were ready to give would not be found hollow. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if, after boasting of our confidence in you, some of the Macedonians were to come with me and find that you were not prepared, we would be embarrassed—to say nothing of you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That’s why I’ve requested that the brothers come before I do and make arrangements in advance for the substantial offering you pledged. Then it will be seen as a matter of generosity and not under pressure, as something you felt forced to do.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hilarious Generosity
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here’s my point. A stingy sower '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “the one who sows with a storehouse of seed” (remaining). This describes a farmer who is stingy with his sowing. Since he has a storehouse of seed, he can afford to sow liberally.
      marker-yv: yv-n
    - type: text
      text: 'will reap a meager harvest, but the one who sows from a generous spirit will reap an abundant harvest. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let giving flow from your heart, not from a sense of religious duty. Let it spring up freely from the joy of giving—all because God loves hilarious generosity! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
