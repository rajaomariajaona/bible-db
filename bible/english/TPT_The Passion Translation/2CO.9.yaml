        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes, God is more than ready to overwhelm you with every form of grace, so that you will have more than enough of everything '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
