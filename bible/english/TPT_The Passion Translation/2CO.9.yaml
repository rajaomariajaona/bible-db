      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(LXX). There are seven things in the Bible that God loves: (1) the resident foreigner or immigrant ('
      - type: text
