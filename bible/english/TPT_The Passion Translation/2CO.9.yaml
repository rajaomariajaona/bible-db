        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1. 8, 14.
      marker-yv: yv-n
    - type: text
      text: '—every moment and in every way. He will make you overflow with abundance in every good thing you do. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just as the Scriptures say '
    - type: usfm
      marker: it
      children:
      - type: text
        text: about the one who trusts in him
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because he has sown extravagantly and given to the poor,
  - type: usfm
