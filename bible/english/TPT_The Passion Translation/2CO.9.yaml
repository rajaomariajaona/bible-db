        - type: text
          text: is used in Greek literature for someone who pays all expenses for the drama/choir (production), plus more, providing income for those who take part. God is seen as the leader of the divine choir, orchestrating everything and providing all that is needed to bring forth the sounds of his glory on the earth.
      marker-yv: yv-n
