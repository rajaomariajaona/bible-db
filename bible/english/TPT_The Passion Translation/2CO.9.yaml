document_id: 2CO.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Offering for Needy Believers
  - type: text
    content: 'Actually, there’s no need to write to you about this contribution for the holy believers '
  - type: text
    content: in Jerusalem
  - type: text
    content: ', '
  '10':
  - type: text
    content: 'This generous God who supplies abundant seed '
  - type: note
    content: The Greek word epichorēgeo is used in Greek literature for someone who pays all expenses for the drama/choir (production), plus more, providing income for those who take part. God is seen as the leader of the divine choir, orchestrating everything and providing all that is needed to bring forth the sounds of his glory on the earth.
  - type: text
    content: 'for the farmer, '
  - type: text
    content: which becomes
  - type: text
    content: ' bread for our meals, '
  - type: note
    content: See Isa. 55:10.
  - type: text
    content: 'is even more extravagant toward you. First he supplies '
  - type: note
    content: The Greek word is chorēgeo (see the first footnote on this verse).
  - type: text
    content: 'every need, plus more. Then he multiplies the seed '
  - type: text
    content: as you sow it
  - type: text
    content: ', so that the harvest of your generosity '
  - type: note
    content: Or “righteousness,” used in this context as “generosity” (or “righteous works” of benevolence).
  - type: text
    content: 'will grow. '
  '11':
  - type: text
    content: 'You will be abundantly enriched in every way as you give generously on every occasion, '
  - type: note
    content: Or “You will always be rich enough to be generous at all times.”
  - type: text
    content: 'for when we take your gifts to those in need, '
  - type: note
    content: Or “through us.”
  - type: text
    content: it causes many to give thanks to God.
  '12':
  - type: text
    content: 'The priestly ministry '
  - type: note
    content: The Greek word leitourgia (similar to “liturgy”) is used in Luke 1:23 for the priestly ministry of Zechariah in the temple.
  - type: text
    content: 'you are providing through your offering not only supplies what is lacking for God’s people, it inspires an outpouring '
  - type: note
    content: Or “a superabounding.”
  - type: text
    content: 'of praises and thanksgiving to God himself. '
  '13':
  - type: text
    content: 'For as your extremely generous offering meets the approval '
  - type: note
    content: Or “passes the test.”
  - type: text
    content: of those in Jerusalem
  - type: text
    content: ', it will cause them to give glory to God—all because of your loyal support and allegiance to the gospel of Christ, as well as your generous-hearted partnership with them toward those in need. '
  '14':
  - type: text
    content: 'Because of this extraordinary grace, which God has lavished on you, they will affectionately remember you in their prayers. '
  '15':
  - type: text
    content: Praise God for his astonishing gift, which is far too great for words!
  - type: note
    content: The Greek and Aramaic texts have a clean break at this point. This has caused some scholars to conclude that chs. 10–13 may have originally been separated from the earlier chapters, which could imply that the following four chapters make up the missing letter of Paul to the Corinthians. If this is so, when reading 2 Corinthians, one could begin with chs. 10–13 (Paul’s missing letter), then read from chs. 1–9. The term for this is “appending”; that is, taking an earlier document and adding a later manuscript to it. Yet in this case, the earlier document is appended.
  '2':
  - type: text
    content: 'for I already know that you are on board and eager to help. '
  - type: note
    content: The Aramaic can be translated “I know the goodness of your impulses” (or “intentions”). Paul was not hesitant to point out the obvious qualities and virtues of others.
  - type: text
    content: 'I keep boasting to the churches of Macedonia about your passion to give, telling them that the believers of Corinth '
  - type: note
    content: Or “Achaia,” the Roman province where Corinth was situated.
  - type: text
    content: 'have been preparing to give for a year. Your enthusiasm is contagious—it has stirred many of them to do likewise. '
  '3':
  - type: text
    content: 'Still, I thought it would be best to send these brothers to receive the offering that you’ve prepared, so that our boasting about how you were ready to give would not be found hollow. '
  '4':
  - type: text
    content: 'For if, after boasting of our confidence in you, some of the Macedonians were to come with me and find that you were not prepared, we would be embarrassed—to say nothing of you. '
  '5':
  - type: text
    content: That’s why I’ve requested that the brothers come before I do and make arrangements in advance for the substantial offering you pledged. Then it will be seen as a matter of generosity and not under pressure, as something you felt forced to do.
  - type: heading
    content: Hilarious Generosity
  '6':
  - type: text
    content: 'Here’s my point. A stingy sower '
  - type: note
    content: The Aramaic can be translated “the one who sows with a storehouse of seed” (remaining). This describes a farmer who is stingy with his sowing. Since he has a storehouse of seed, he can afford to sow liberally.
  - type: text
    content: 'will reap a meager harvest, but the one who sows from a generous spirit will reap an abundant harvest. '
  '7':
  - type: text
    content: 'Let giving flow from your heart, not from a sense of religious duty. Let it spring up freely from the joy of giving—all because God loves hilarious generosity! '
  - type: note
    content: 'See Prov. 22:8 (LXX). There are seven things in the Bible that God loves: (1) the resident foreigner or immigrant (Deut. 10:19), (2) righteousness in our affairs with others (Ps. 11:7), (3) justice (Ps. 37:28), (4) the gates of Zion (Ps. 87:2), (5) his righteous people (Ps. 146:8), (6) a hilarious or cheerful giver (2 Cor. 9:7), and (7) those he disciplines (Heb. 12:6).'
  '8':
  - type: text
    content: 'Yes, God is more than ready to overwhelm you with every form of grace, so that you will have more than enough of everything '
  - type: note
    content: The Greek word Paul uses is autarkeia, and it is found in classical Greek as meaning “independently wealthy, needing nothing.” See Aristotle, Pol. 1. 8, 14.
  - type: text
    content: '—every moment and in every way. He will make you overflow with abundance in every good thing you do. '
  '9':
  - type: text
    content: 'Just as the Scriptures say '
  - type: text
    content: about the one who trusts in him
  - type: text
    content: ':'
  - type: text
    content: Because he has sown extravagantly and given to the poor,
  - type: text
    content: his kindness and generous deeds will never be forgotten.
  - type: note
    content: See Ps. 112:9.
