document_id: ACT.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ethnic Barriers Broken
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The news traveled fast and soon reached the apostles and the believers living in Judea that non-Jewish people were also receiving God’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: message of new life
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When Peter finally arrived in Jerusalem, the Jewish believers called him to task, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Why did you stay in the home of people who aren’t Jewish? You even ate your meals with them!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Peter explained what had happened, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“One day when I was in the city of Joppa, while I was praying I fell into an ecstatic trance and I went into another realm. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See footnote on
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 10:10
      metadata:
        usfm: ACT.10.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'I saw in a vision something like a linen tablecloth descending out of heaven, being let down by its four corners, and it got close to me. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'As I examined it I saw many four-footed animals, wild animals, reptiles, and wild birds. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then I heard a voice say to me, ‘Get up, Peter. Kill and eat them.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “I said, ‘I can’t do that, Lord! For I’ve never eaten anything that is forbidden or impure according to our Jewish laws.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “The voice spoke to me again, saying, ‘Nothing is unclean if God declares it to be clean.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“The vision repeated itself three times. Then suddenly the linen sheet was snatched back up into heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'At that moment three men from Caesarea, who had been sent for me, approached the house where I was staying. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The Spirit told me to accompany them with no questions asked. These six brothers here with me made the trip, and we entered into the home of the man who had sent for me. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He shared with us about the angel who appeared to him and told him to send messengers to Joppa to find Simon, the Rock. The angel had told him, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ‘He will tell you and your family the message of how you can be saved!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Shortly after I began to speak, the Holy Spirit was poured out upon them, just like what happened to us at the beginning. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And I remembered the words the Lord had told us: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘John immersed you in water, but you will be immersed in the Holy Spirit.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: So I concluded that if God is pleased to give them the same gift of the Holy Spirit that he gave us after they believed in the Lord Jesus Christ, who am I to stand in the way of God?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When they heard this, their objections were put to rest and they all glorified God, saying, “Look what God has done! He’s giving the gift of repentance that leads to life to people who aren’t even Jews.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Church at Antioch
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Because of the persecution triggered by Stephen’s death in Jerusalem, many of the believers were scattered. Some reached as far as the coast of Lebanon, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Phoenicia.”
    marker-yv: yv-n
  - type: text
    text: 'the island of Cyprus, and Antioch of Syria, but they were still only preaching the word to Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'However, some of the believers from Cyprus and Cyrene, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A city on the coast of Libya. Some have linked the man who carried the cross of Jesus, Simon of Cyrene, to this group of missionary evangelists.
    marker-yv: yv-n
  - type: text
    text: 'who had come to Antioch in Syria, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Antioch was important from both a commercial and a military point of view. It was the seat of the Roman governor-general, with large garrisons and military supplies stored there. It was also a center of art and culture, known for its beauty and recognized as the capital of the Syrian kingdom. The church prospered greatly in Antioch, and it became a Christian hub and headquarters for the apostles. For many centuries in church history, Antioch remained a strong witness for evangelization, sending missionaries into Persia and throughout the Roman Empire.
    marker-yv: yv-n
  - type: text
    text: 'preached to the non-Jews living there, proclaiming the message of salvation in the Lord Jesus. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In the early days of the church, every believer was a missionary. There was a great cost involved with following Christ. They laid their lives down to serve him and to make him known among the nations. Not just the apostles, but all of the believers did their part in spreading the teachings of Jesus wherever they went.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The mighty power of the Lord was with them as they ministered, and a large number of people believed and turned their hearts to the Lord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'News of what was happening in Antioch reached the church of Jerusalem, so the apostles sent Barnabas to Antioch as their emissary. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'When he got there and witnessed for himself God’s marvelous grace, he was enthused and overjoyed. He encouraged '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Barnabas was given the nickname “Encourager.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 4:36–37
      metadata:
        usfm: ACT.4.36+ACT.4.37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the believers to remain faithful and cling to the Lord with passionate hearts. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “He begged them to imitate the Lord with all their hearts.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Barnabas was a good man, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “He was a blessed man.”
    marker-yv: yv-n
  - type: text
    text: full of the Spirit of holiness, and he exuded a life of faith. Because of his ministry even more crowds of people were brought to the Lord!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Barnabas left for Tarsus to find Saul and bring him back to Antioch. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Together Saul and Barnabas ministered there for a full year, equipping the growing church and teaching the vast number of new converts. It was in Antioch that the followers of Jesus were first revealed as “anointed ones.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Christians.” The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chrematizo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “supernaturally revealed” (imparted), more than simply “called.” It was first in Antioch that the revelation came that the believers were anointed ones. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 2:12
      metadata:
        usfm: MAT.2.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', where the term is used as God giving revelation in a dream.'
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Agabus Prophesies a Coming Famine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'At that time there were prophets in the church of Jerusalem, and some of them came to Antioch. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'One of them, named Agabus, stood up in one of the meetings and prophesied by the Holy Spirit that a severe famine was about to come over Israel. (This prophecy was fulfilled during the reign of Claudius Caesar.) '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This would have been about AD 45–46.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'So they determined that each believer, according to his or her ability, would give an offering to send as relief to the brothers living in Judea. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'They set aside the gifts and entrusted the funds to Barnabas and Saul to take to the elders '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “priests.”
    marker-yv: yv-n
  - type: text
    text: of the church in Jerusalem.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Upon hearing the prophecy of a famine coming, the church of Antioch determined to receive an offering for the Judean believers, for the gospel came to them from Jerusalem. They gave back to the place where the gospel was sent to them.
    marker-yv: yv-n
