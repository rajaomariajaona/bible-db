    - type: text
      text: The Allegory of the Potter
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here is the word '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to Jeremiah: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but that nation does evil in my eyes and does not listen to my voice, then I will relent concerning the good that I planned to show it.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “So now, go say to the people of Judah and Jerusalem, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says: Listen, I am '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a potter
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 18:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The verb for “shaping” comes from the same Hebrew root as the noun for “potter,” an obvious play on words.
      marker-yv: yv-n
    - type: text
      text: shaping punishment for you and working on a plan against you. Turn back, each person, from the evil way you live and the evil things you do!’
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But they will answer: ‘It’s too late! We’ll live as we choose and be just as stubborn and evil as we want to be.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The People Reject '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Ask the people of every nation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and find out if they have ever heard
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of such a horrible sin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'as what you, virgin Israel, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 18:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Virgin Israel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a term used to highlight the need for Israel to keep herself pure for her heavenly husband and not be defiled by the worship of false gods. Scripture speaks of the virgin daughter of Israel (see “virgin daughter of Zion” in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
