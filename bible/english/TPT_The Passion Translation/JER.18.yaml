  - type: text
    content: ' spoke to Jeremiah: '
  '10':
  - type: text
    content: but that nation does evil in my eyes and does not listen to my voice, then I will relent concerning the good that I planned to show it.
  '11':
  - type: text
    content: “So now, go say to the people of Judah and Jerusalem, ‘
  - type: text
    content: Yahweh
  - type: text
    content: ' says: Listen, I am '
  - type: text
    content: a potter
  - type: text
    content: ' '
  - type: note
    content: The verb for “shaping” comes from the same Hebrew root as the noun for “potter,” an obvious play on words.
  - type: text
    content: shaping punishment for you and working on a plan against you. Turn back, each person, from the evil way you live and the evil things you do!’
  '12':
  - type: text
    content: '“But they will answer: ‘It’s too late! We’ll live as we choose and be just as stubborn and evil as we want to be.’ ”'
  - type: heading
    content: The People Reject Yahweh
  '13':
  - type: text
    content: 'Therefore '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “Ask the people of every nation
  - type: text
    content: and find out if they have ever heard
  - type: text
    content: of such a horrible sin
  - type: text
    content: 'as what you, virgin Israel, '
  - type: note
    content: Virgin Israel is a term used to highlight the need for Israel to keep herself pure for her heavenly husband and not be defiled by the worship of false gods. Scripture speaks of the virgin daughter of Israel (see “virgin daughter of Zion” in Isa. 37:22), the virgin birth of Christ (see Matt. 1:23), and the virgin bride of Christ (see 2 Cor. 11:2).
  - type: text
    content: 'have done '
  - type: text
    content: to betray me
  - type: text
    content: .
  '14':
  - type: text
    content: Does the snow on Lebanon’s mountains
  - type: text
    content: ever melt away?
  - type: note
    content: The meaning of the Hebrew cannot be understood with certainty.
  - type: text
    content: Do the cold mountain streams
  - type: text
    content: ever run dry?
  - type: note
    content: Or “Are foreign waters plucked up?”
  '15':
  - type: text
    content: But my people have forgotten me
  - type: text
    content: and burn incense to gods who are nothing,
  - type: text
    content: who make my people stumble in their ways.
  - type: text
    content: They no longer follow
  - type: text
    content: 'the ways '
  - type: text
    content: of blessing
  - type: text
    content: ' they knew before'
  - type: text
    content: but have followed paths that lead them nowhere.
  - type: note
    content: Or “They abandon the old reliable paths of their ancestors. They have left them to walk on side roads, roads that are not smooth and level.”
  '16':
  - type: text
    content: Their homeland is a wasteland,
  - type: text
    content: and everyone who passes by is horrified
  - type: note
    content: Or “a thing [land] to be hissed at forever.” To “hiss at” something was often associated with the feeling of being horrified or, perhaps, amazed.
  - type: text
    content: and trembles with fear.
  '17':
  - type: text
    content: Like a strong wind from the east,
  - type: text
    content: I will blow them away before their enemies.
  - type: text
    content: Since they have turned their back on me
  - type: text
    content: ','
  - type: text
    content: I will turn my back on them
  - type: text
    content: and refuse to help them in their day of trouble.”
  - type: heading
    content: A Plot against Jeremiah
  '18':
  - type: text
    content: 'Then the people said: “Come on, let’s plan a scheme against Jeremiah! There are always priests and wise ones who can give us instruction. We will still have prophets to give us '
  - type: text
    content: Yahweh
  - type: text
    content: ’s
  - type: text
    content: ' message. Come on, let’s attack his reputation and drum up phony charges against him. '
  - type: note
    content: Or “let us strike him with the tongue” (Hebrew) or “let us destroy him by his own tongue” (Syriac).
  - type: text
    content: And let’s pay no attention to anything he says.”
  '19':
  - type: text
    content: So I prayed
  - type: text
    content: ','
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ', hear my cry!'
  - type: text
    content: Can’t you hear the voice of my adversaries?
  '2':
  - type: text
    content: '“Arise and go to the potter’s workshop, and I will speak to you there.” '
  '20':
  - type: text
    content: Good should not be repaid with evil,
  - type: text
    content: but look! They are digging a pit for me.
  - type: text
    content: Remember how I made intercession for them,
  - type: text
    content: pleading in your presence
  - type: text
    content: to turn away your wrath from them?
  - type: note
    content: See 15:11. Jeremiah provides us with an example of interceding even for those who hate us and persecute us. See Matt. 5:44.
  '21':
  - type: text
    content: Therefore, may their children experience food shortages,
  - type: text
    content: and let them be killed by the sword.
  - type: text
    content: May death and warfare take away the men and youths,
  - type: text
    content: leaving the women as childless widows.
  '22':
  - type: text
    content: May cries be heard from their homes
  - type: text
    content: as you suddenly bring raiders upon them without warning.
  - type: text
    content: For they’ve dug a pit to catch me
  - type: text
    content: and hidden snares for my feet.
  '23':
  - type: text
    content: 'Yet, you know, '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: all their plots to kill me.
  - type: text
    content: Do not pardon their sin
  - type: text
    content: or blot out their guilt!
  - type: text
    content: Let them stumble before you.
  - type: text
    content: 'Deal with them '
  - type: text
    content: severely
  - type: text
    content: ' in the time of your anger.”'
  '3':
  - type: text
    content: 'So I went to the potter’s workshop, and there was the potter spinning his wheel. '
  '4':
  - type: text
    content: 'And whenever a piece of pottery turned out flawed, he reworked '
  - type: note
    content: Or “restored [to the starting point].” Restoration is one of the themes of Jeremiah. The potter’s workshop is a picture of the human heart. The potter worked with two wheels in order to form a vessel.
  - type: text
    content: 'it into another vessel, '
  - type: note
    content: The primitive root word for the Hebrew word for “vessel” (kalah) is klh, a homonym for the word for “bride.” As vessels of honor, we become the bride of Christ, shaped in love (see Gen. 2:22) by the Master Potter to be fit for a King. Jeremiah used the word kalah twenty-one times in his book.
  - type: text
    content: as seemed good to the potter.
  - type: note
    content: The potter’s work is a picture of grace. If there was a blemish in the clay or it was flawed in some way, the potter did not get angry and throw the clay away. Instead, he reshaped and reformed the clay into the vessel he wanted to create. In the same way, God, if he finds a blemish in his work in us, reshapes us in his hands and makes us new. Flaws do not hinder the work of God; he will restore and heal until he finds a vessel of honor to serve his purpose. God is the Master Potter of his creation.
  '5':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' began to speak to me. '
  '6':
  - type: text
    content: '“Can I not do with the people of Israel just as the potter has done with the clay?” declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. “Listen, people of Israel. You are clay that I shape in my hands like the clay in the potter’s hands. '
  - type: note
    content: See Rom. 9:20–24.
  '7':
  - type: text
    content: 'If I speak of uprooting, breaking down, or destroying a nation or a kingdom, '
  '8':
  - type: text
    content: 'and that nation turns back from its wicked ways, then I will turn back from the disaster that I planned against it. '
  '9':
  - type: text
    content: 'And at another time, if I speak of planting or building a nation or a kingdom, '
