          text: ).
      marker-yv: yv-n
    - type: text
      text: 'have done '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to betray me
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does the snow on Lebanon’s mountains
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ever melt away?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 18:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew cannot be understood with certainty.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do the cold mountain streams
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ever run dry?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 18:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Are foreign waters plucked up?”
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But my people have forgotten me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and burn incense to gods who are nothing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who make my people stumble in their ways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They no longer follow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the ways '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of blessing
    - type: text
      text: ' they knew before'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but have followed paths that lead them nowhere.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 18:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “They abandon the old reliable paths of their ancestors. They have left them to walk on side roads, roads that are not smooth and level.”
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their homeland is a wasteland,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and everyone who passes by is horrified
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 18:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a thing [land] to be hissed at forever.” To “hiss at” something was often associated with the feeling of being horrified or, perhaps, amazed.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and trembles with fear.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a strong wind from the east,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will blow them away before their enemies.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Since they have turned their back on me
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will turn my back on them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and refuse to help them in their day of trouble.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Plot against Jeremiah
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the people said: “Come on, let’s plan a scheme against Jeremiah! There are always priests and wise ones who can give us instruction. We will still have prophets to give us '
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
    - type: usfm
      marker: it
      children:
      - type: text
        text: ’s
    - type: text
      text: ' message. Come on, let’s attack his reputation and drum up phony charges against him. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 18:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “let us strike him with the tongue” (Hebrew) or “let us destroy him by his own tongue” (Syriac).
      marker-yv: yv-n
    - type: text
      text: And let’s pay no attention to anything he says.”
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: So I prayed
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', hear my cry!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can’t you hear the voice of my adversaries?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Arise and go to the potter’s workshop, and I will speak to you there.” '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Good should not be repaid with evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but look! They are digging a pit for me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember how I made intercession for them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pleading in your presence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to turn away your wrath from them?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 18:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Jeremiah provides us with an example of interceding even for those who hate us and persecute us. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 5:44
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, may their children experience food shortages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and let them be killed by the sword.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May death and warfare take away the men and youths,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leaving the women as childless widows.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May cries be heard from their homes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as you suddenly bring raiders upon them without warning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they’ve dug a pit to catch me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and hidden snares for my feet.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet, you know, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all their plots to kill me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not pardon their sin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or blot out their guilt!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them stumble before you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Deal with them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: severely
    - type: text
      text: ' in the time of your anger.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I went to the potter’s workshop, and there was the potter spinning his wheel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And whenever a piece of pottery turned out flawed, he reworked '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 18:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “restored [to the starting point].” Restoration is one of the themes of Jeremiah. The potter’s workshop is a picture of the human heart. The potter worked with two wheels in order to form a vessel.
      marker-yv: yv-n
    - type: text
      text: 'it into another vessel, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 18:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The primitive root word for the Hebrew word for “vessel” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: kalah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: klh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a homonym for the word for “bride.” As vessels of honor, we become the bride of Christ, shaped in love (see'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 2:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) by the Master Potter to be fit for a King. Jeremiah used the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kalah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: twenty-one times in his book.
      marker-yv: yv-n
    - type: text
      text: as seemed good to the potter.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 18:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The potter’s work is a picture of grace. If there was a blemish in the clay or it was flawed in some way, the potter did not get angry and throw the clay away. Instead, he reshaped and reformed the clay into the vessel he wanted to create. In the same way, God, if he finds a blemish in his work in us, reshapes us in his hands and makes us new. Flaws do not hinder the work of God; he will restore and heal until he finds a vessel of honor to serve his purpose. God is the Master Potter of his creation.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' began to speak to me. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Can I not do with the people of Israel just as the potter has done with the clay?” declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. “Listen, people of Israel. You are clay that I shape in my hands like the clay in the potter’s hands. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 18:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 9:20–24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If I speak of uprooting, breaking down, or destroying a nation or a kingdom, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and that nation turns back from its wicked ways, then I will turn back from the disaster that I planned against it. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And at another time, if I speak of planting or building a nation or a kingdom, '
