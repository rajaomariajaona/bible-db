        children:
        - type: text
          text: ), the virgin birth of Christ (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 1:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and the virgin bride of Christ (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 11:2
      - type: usfm
