  '13':
  - type: text
    content: The Pharisees were immediately offended and said, “You’re just boasting about yourself! Since we only have your word on this, it makes your testimony invalid!”
  '14':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “Just because I am the one making these claims doesn’t mean they’re invalid.
  - type: text
    content: ' '
  - type: text
    content: For I absolutely know who I am
  - type: text
    content: ', where I’ve come from, and where I’m going. But you Pharisees have no idea about what I’m saying.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: For you’ve set yourselves up as judges of others based on outward appearances, but I certainly never judge others in that way.
  - type: text
    content: ' '
  '16':
  - type: text
    content: For I discern the truth. And I am not alone in my judgments, for my Father and I have the same understanding in all things, and he has sent me to you.
  '17':
  - type: text
    content: “Isn’t it written in the law of Moses that the testimony of two men is trustworthy?
  - type: text
    content: ' '
  - type: note
    content: See Deut. 17:6.
  '18':
  - type: text
    content: Then what I say about who I am is true, for I am not alone in my testimony—my Father is the other witness, and we testify together of the truth.”
  '19':
  - type: text
    content: Then they asked, “Just who is this ‘Father’ of yours? Where is he?”
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “You wouldn’t ask that question if you knew who I am, or my Father. For if you knew me, you would recognize my Father too.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Then at dawn Jesus appeared in the temple courts again, and soon all the people gathered around to listen to his words, so he sat down and taught them. '
  '20':
  - type: text
    content: '(Jesus taught all these things while standing '
  - type: text
    content: in the treasure room of the temple
  - type: text
    content: '. '
  - type: note
    content: Jesus unlocks that “treasure room” to us, his temple. When we receive him as our life-giving light, we see the treasures that have been given to us by grace.
  - type: text
    content: And no one dared to arrest him, for it wasn’t yet his time to surrender to men.)
  - type: heading
    content: “I Am Not from This World”
  '21':
  - type: text
    content: 'One day Jesus said again, '
  - type: text
    content: “I am about to leave you. You will want to find me, but you will still die in your sins.
  - type: text
    content: ' '
  - type: note
    content: Jesus gave a stern warning of dying before you have turned away from sin and put your faith in the Savior.
  - type: text
    content: You won’t be able to come where I am going.”
  '22':
  - type: text
    content: This so confused the Jewish leaders that they began to say, “Is he planning to commit suicide? What’s he talking about—‘You won’t be able to come where I am going’?”
  '23':
  - type: text
    content: 'Jesus spoke up and said, '
  - type: text
    content: “You are all from the earth; I am from above. I am not from this world like you are.
  - type: text
    content: ' '
  '24':
  - type: text
    content: That’s why I’ve told you that you will all die in your sins if you fail to believe that I AM who I AM.”
  - type: note
    content: Believing the truth that Jesus Christ is the “I AM,” God who became a man, is an essential part of our faith as followers of Christ.
  '25':
  - type: text
    content: So they asked him plainly, “Who are you?”
  - type: text
    content: “I am the One I’ve always claimed to be.”
  - type: text
    content: ' Jesus replied. '
  '26':
  - type: text
    content: “And I still have many more things to pronounce in judgment about you. For I will testify to the world of the truths that I have heard from my Father, and the Father who sent me is trustworthy.”
  - type: text
    content: ' '
  '27':
  - type: text
    content: (Even after all of this, they still didn’t realize that he was speaking about his heavenly Father.)
  '28':
  - type: text
    content: “You will know me as ‘I AM’ after you have lifted me up from the earth
  - type: text
    content: ' '
  - type: note
    content: There is a dual meaning in these words. To honor Jesus and exalt him reveals his true identity to our hearts. The word for “lifted up” can also mean “to exalt” and therefore “to honor.” However, Jesus was “lifted up” on a cross, suspended between heaven and earth, and died for the sins of all mankind. Both of these implications are found in these words of Jesus.
  - type: text
    content: as the Son of Man. Then you will realize that I do nothing on my own initiative, but I only speak the truth that the Father has revealed to me.
  - type: text
    content: ' '
  '29':
  - type: text
    content: I am his messenger and he is always with me, for I only do that which delights his heart.”
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “I only do what adorns [beautifies] him.”
  '3':
  - type: text
    content: 'Then in the middle of his teaching, the religious scholars '
  - type: note
    content: Or “scribes.” The scribes were not merely professional copyists, they were the scholarly experts who were to be consulted over the details of the written law of Moses.
  - type: text
    content: 'and the Pharisees broke through the crowd and brought a woman who had been caught in the act of committing adultery and made her stand '
  - type: text
    content: in the middle
  - type: text
    content: ' of everyone.'
  '30':
  - type: text
    content: 'These words caused many '
  - type: text
    content: respected Jews
  - type: text
    content: ' to believe in him.'
  - type: heading
    content: The Son Gives Freedom
  '31':
  - type: text
    content: 'Jesus said to those Jews who believed in him, '
  - type: text
    content: “When you continue to embrace all that I teach, you prove that you are my true followers.
  - type: text
    content: ' '
  '32':
  - type: text
    content: For if you embrace the truth, it will release true freedom into your lives.”
  - type: note
    content: The truth Jesus gives us releases us from the bondage of our past, the bondage of our sins, and the bondage of religion. Jesus was speaking these words to those who were not fully free from man’s traditions. Truth must be embraced and worked out through the divine process of spiritual maturity. The Greek word for “truth” is reality. To embrace the reality of Christ brings more freedom into your life. See the book of Galatians for a clear explanation of the freedom Jesus referred to here.
  '33':
  - type: text
    content: 'Surprised by this, they said, “But we’re the descendants of Abraham and we’re already free. We’ve never been in bondage '
  - type: note
    content: The Greek is translated “slavery.” However, the Aramaic word used here (abdota) refers not to slavery but to paying off debts (indentured servants). The Jews were not forgetting their slavery in Egypt, but rather saying that they were not in bondage to serve anyone as free sons of Abraham. Jesus reminded them that ancestral lineage does not guarantee spiritual freedom.
  - type: text
    content: to anyone. How could you say that we will be released into more freedom?”
  - type: note
    content: The Aramaic is translated “released as children of freedom.”
  '34':
  - type: text
    content: “I speak eternal truth,”
  - type: text
    content: ' Jesus said. '
  - type: text
    content: “When you sin you are not free. You’ve become a slave in bondage to your sin.
  - type: text
    content: ' '
  '35':
  - type: text
    content: And slaves have no permanent standing in a family, like a son does, for a son is a part of the family forever.
  - type: text
    content: ' '
  '36':
