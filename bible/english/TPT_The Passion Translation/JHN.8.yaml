  - type: text
    content: No, you people are doing what your father has taught you!”
  - type: text
    content: Indignant, they responded, “What are you talking about? We only have one Father, God himself! We’re not illegitimate!”
  '42':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Then if God were really your father, you would love me, for I’ve come from his presence. I didn’t come here on my own, but God sent me to you.
  - type: text
    content: ' '
