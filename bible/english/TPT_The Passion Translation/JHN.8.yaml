      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Named for the many olive trees on its slopes, the Mount of Olives was a high slope just east of Jerusalem across the Kidron Valley.
      marker-yv: yv-n
    - type: text
      text: 'near the city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: where he spent the night
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Until finally, Jesus was left alone with the woman still standing there in front of him. So he stood back up and said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Dear woman, where are your accusers? Is there no one here to condemn you?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Looking around, she replied, “I see no one, Lord.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic contains a powerful testimony from this woman. Apparently the woman had the revelation of who Jesus really was, for she addressed Jesus with the divine name in the Aramaic,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: MarYah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Lord'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '! See also'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 12:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Greek texts use the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kurios
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: for “Lord,” which can also mean “sir” or “landowner.”
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then I certainly
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek has the emphatic use of the personal pronoun.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: don’t condemn you either.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “Neither do I put you down” (or “oppress you”). The Torah required two witnesses. There were none left!
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Go, and from now on, be free from a life of sin.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “no longer be sinning.” It should be noted that this entire episode (referred to commonly as the “Pericope Adulterae”) is missing in the majority of the most reliable Greek manuscripts. There are some manuscripts that have this story at the end of the book of John and at least two that include it in the Gospel of Luke. Many scholars surmise that this episode in the ministry of Jesus was added after the Gospel of John had been completed. However, it is the conclusion of this translation that the above text is indeed an inspired account of the ministry of Jesus and may have been deleted by many translators and copyists who doubted that Jesus could tell an adulterer that he would not condemn her. Augustine, one of the early church fathers, mentioned this story and stated that many translators had removed it because they interpreted it as Jesus giving license to immorality. God’s grace always seems to startle the religious (Augustine,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: De Conjug. Adult.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', II:6.)'
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus, the Light of the World
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Again we see Jesus using the words “I Am,” which is the name of God.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: light to the world, and those who embrace me will experience life-giving light, and they will never
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word is a double negative, emphatically saying, “never, no never!”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: walk
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “they will never be driven (pushed) by the darkness.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in darkness.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The Pharisees were immediately offended and said, “You’re just boasting about yourself! Since we only have your word on this, it makes your testimony invalid!”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jesus responded, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Just because I am the one making these claims doesn’t mean they’re invalid.
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: For I absolutely know who I am
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', where I’ve come from, and where I’m going. But you Pharisees have no idea about what I’m saying.'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For you’ve set yourselves up as judges of others based on outward appearances, but I certainly never judge others in that way.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For I discern the truth. And I am not alone in my judgments, for my Father and I have the same understanding in all things, and he has sent me to you.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Isn’t it written in the law of Moses that the testimony of two men is trustworthy?
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 17:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then what I say about who I am is true, for I am not alone in my testimony—my Father is the other witness, and we testify together of the truth.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then they asked, “Just who is this ‘Father’ of yours? Where is he?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You wouldn’t ask that question if you knew who I am, or my Father. For if you knew me, you would recognize my Father too.”
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then at dawn Jesus appeared in the temple courts again, and soon all the people gathered around to listen to his words, so he sat down and taught them. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '(Jesus taught all these things while standing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the treasure room of the temple
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus unlocks that “treasure room” to us, his temple. When we receive him as our life-giving light, we see the treasures that have been given to us by grace.
      marker-yv: yv-n
    - type: text
      text: And no one dared to arrest him, for it wasn’t yet his time to surrender to men.)
  - type: usfm
    marker: s1
    children:
    - type: text
      text: “I Am Not from This World”
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'One day Jesus said again, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am about to leave you. You will want to find me, but you will still die in your sins.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus gave a stern warning of dying before you have turned away from sin and put your faith in the Savior.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You won’t be able to come where I am going.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: This so confused the Jewish leaders that they began to say, “Is he planning to commit suicide? What’s he talking about—‘You won’t be able to come where I am going’?”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jesus spoke up and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You are all from the earth; I am from above. I am not from this world like you are.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: That’s why I’ve told you that you will all die in your sins if you fail to believe that I AM who I AM.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Believing the truth that Jesus Christ is the “I AM,” God who became a man, is an essential part of our faith as followers of Christ.
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: So they asked him plainly, “Who are you?”
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am the One I’ve always claimed to be.”
    - type: text
      text: ' Jesus replied. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And I still have many more things to pronounce in judgment about you. For I will testify to the world of the truths that I have heard from my Father, and the Father who sent me is trustworthy.”
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: (Even after all of this, they still didn’t realize that he was speaking about his heavenly Father.)
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You will know me as ‘I AM’ after you have lifted me up from the earth
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is a dual meaning in these words. To honor Jesus and exalt him reveals his true identity to our hearts. The word for “lifted up” can also mean “to exalt” and therefore “to honor.” However, Jesus was “lifted up” on a cross, suspended between heaven and earth, and died for the sins of all mankind. Both of these implications are found in these words of Jesus.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: as the Son of Man. Then you will realize that I do nothing on my own initiative, but I only speak the truth that the Father has revealed to me.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am his messenger and he is always with me, for I only do that which delights his heart.”
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “I only do what adorns [beautifies] him.”
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then in the middle of his teaching, the religious scholars '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “scribes.” The scribes were not merely professional copyists, they were the scholarly experts who were to be consulted over the details of the written law of Moses.
      marker-yv: yv-n
    - type: text
      text: 'and the Pharisees broke through the crowd and brought a woman who had been caught in the act of committing adultery and made her stand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the middle
    - type: text
      text: ' of everyone.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'These words caused many '
    - type: usfm
      marker: it
      children:
      - type: text
        text: respected Jews
    - type: text
      text: ' to believe in him.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Son Gives Freedom
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Jesus said to those Jews who believed in him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When you continue to embrace all that I teach, you prove that you are my true followers.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For if you embrace the truth, it will release true freedom into your lives.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The truth Jesus gives us releases us from the bondage of our past, the bondage of our sins, and the bondage of religion. Jesus was speaking these words to those who were not fully free from man’s traditions. Truth must be embraced and worked out through the divine process of spiritual maturity. The Greek word for “truth” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: reality
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . To embrace the reality of Christ brings more freedom into your life. See the book of Galatians for a clear explanation of the freedom Jesus referred to here.
      marker-yv: yv-n
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Surprised by this, they said, “But we’re the descendants of Abraham and we’re already free. We’ve never been in bondage '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek is translated “slavery.” However, the Aramaic word used here (
      - type: usfm
        marker: it
        children:
        - type: text
          text: abdota
      - type: usfm
        marker: ft
