  '10':
  - type: text
    content: 'Until finally, Jesus was left alone with the woman still standing there in front of him. So he stood back up and said to her, '
  - type: text
    content: “Dear woman, where are your accusers? Is there no one here to condemn you?”
  '11':
  - type: text
    content: Looking around, she replied, “I see no one, Lord.”
  - type: note
    content: The Aramaic contains a powerful testimony from this woman. Apparently the woman had the revelation of who Jesus really was, for she addressed Jesus with the divine name in the Aramaic, MarYah, Lord Yahweh! See also 1 Cor. 12:3. The Greek texts use the word kurios for “Lord,” which can also mean “sir” or “landowner.”
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Then I certainly
  - type: text
    content: ' '
  - type: note
    content: The Greek has the emphatic use of the personal pronoun.
  - type: text
    content: don’t condemn you either.
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “Neither do I put you down” (or “oppress you”). The Torah required two witnesses. There were none left!
  - type: text
    content: Go, and from now on, be free from a life of sin.”
  - type: note
    content: Or “no longer be sinning.” It should be noted that this entire episode (referred to commonly as the “Pericope Adulterae”) is missing in the majority of the most reliable Greek manuscripts. There are some manuscripts that have this story at the end of the book of John and at least two that include it in the Gospel of Luke. Many scholars surmise that this episode in the ministry of Jesus was added after the Gospel of John had been completed. However, it is the conclusion of this translation that the above text is indeed an inspired account of the ministry of Jesus and may have been deleted by many translators and copyists who doubted that Jesus could tell an adulterer that he would not condemn her. Augustine, one of the early church fathers, mentioned this story and stated that many translators had removed it because they interpreted it as Jesus giving license to immorality. God’s grace always seems to startle the religious (Augustine, De Conjug. Adult., II:6.)
  - type: heading
    content: Jesus, the Light of the World
