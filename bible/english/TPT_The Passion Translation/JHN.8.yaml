  - type: text
    content: 'Then they said to Jesus, “Teacher, we caught this woman in the very act of adultery. '
  '40':
  - type: text
    content: I’ve only told you the truth that I’ve heard in my Father’s presence, but now you are wanting me dead—is that how Abraham acted?
  - type: text
    content: ' '
