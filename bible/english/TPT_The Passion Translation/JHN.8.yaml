    content: So if the Son sets you free from sin, then become a true son and be unquestionably free!
  - type: text
    content: ' '
  '37':
  - type: text
    content: Even though you are descendants of Abraham, you desire to kill me because the message I bring has not found a home in your hearts.
  - type: text
    content: ' '
