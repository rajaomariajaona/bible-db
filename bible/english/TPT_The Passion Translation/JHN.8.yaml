  '44':
  - type: text
    content: “You are the offspring of your father, the devil,
  - type: text
    content: ' '
  - type: note
    content: The word for “devil” in Greek means “slanderer-accuser.” The Aramaic word is akelqarsa, or “adversary.” It is taken from a root word that means “to ridicule” or “to gnaw.” See v. 48 where the Jewish leaders ridiculed Jesus’ words.
  - type: text
    content: and you serve your father very well, passionately carrying out his desires. He’s been a murderer right from the start! He never stood with the truth, for he’s full of nothing but lies—lying is his native tongue.
  - type: text
    content: ' '
  - type: note
    content: Or “when he lies he’s only doing what is natural to him.”
  - type: text
    content: He is a master of deception and the father of lies!
  - type: text
    content: ' '
  '45':
  - type: text
    content: But I am the true Prince who speaks nothing but the truth, yet you refuse to believe and you want nothing to do with me.
  - type: text
    content: ' '
  '46':
  - type: text
    content: Can you name one sin that I’ve committed? Then if I am telling you only the truth, why don’t you believe me?
  - type: text
    content: ' '
  '47':
  - type: text
    content: If you really knew God, you would listen, receive, and respond with faith to his words. But since you don’t listen and respond to what he says, it proves you don’t belong to him and you have no room for him in your hearts.”
  '48':
  - type: text
    content: “See! We were right all along!” some of the Jewish leaders shouted. “You’re nothing but a demon-possessed Samaritan!”
  - type: note
    content: They are obviously scorning Jesus by calling him “a demon-possessed Samaritan.” The Jews despised their northern cousins, the Samaritans, for their ancestors had come from Assyria and occupied Israel’s lands. The three major groups in Israel at that time were Judeans (Jews), Galileans, and Samaritans. The Jerusalem Jews saw themselves as superior and more faithful to the God of the Hebrews than their northern neighbors. Jesus was a Galilean, having come from Nazareth. But Nazareth was part of the northern region looked down upon by the Jews. The Aramaic can be translated “You’re a crazy Samaritan.”
  '49':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “It is not a demon that would cause me to honor my Father. I live my life for his honor, even though you insult me for it.
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “you curse me.”
  '5':
  - type: text
    content: 'Doesn’t Moses’ law command us to stone to death a woman like this? '
  - type: note
    content: See Lev. 20:10 and Deut. 22:22–24, where it is clear that both the man and woman were to be stoned to death.
  - type: text
    content: 'Tell us, what do you say we should do with her?” '
  '50':
  - type: text
    content: I never have a need to seek my own glory, for the Father will do that for me, and he will judge those who do not.
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'I speak to you this eternal truth: whoever cherishes my words and keeps them will never experience death.”'
  '52':
  - type: text
    content: 'This prompted the Jewish leaders to say, “Now we know for sure that you’re demon possessed! You just said that those who keep watch over your words will never experience death, but Abraham and all the prophets have died! '
  '53':
  - type: text
    content: Do you think you’re greater than our father Abraham and all the prophets? You are so delusional about yourself that you make yourself greater than you are!”
  '54':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “If I were to tell you how great I am, it would mean nothing. But my Father is the One who will prove it and will glorify me. Isn’t he the One you claim is your God?
  - type: text
    content: ' '
  '55':
  - type: text
    content: But in reality, you’ve never embraced him as your own. I know him, and I would be a liar, like yourselves, if I told you anything less than that. I have fully embraced him, and I treasure his every word.
  - type: text
    content: ' '
  '56':
  - type: text
    content: And not only that, Abraham, your ancestor, was overjoyed when he received the revelation of my coming to earth. Yes, he foresaw me coming and was filled with delight!”
  - type: note
    content: This refers to the prophetic insight God gave to Abraham about the coming Messiah. Many Hebrew scholars believe this was given to Abraham on the day of “binding.” That is, the day he tied his son, Isaac, to the altar to offer him as a sacrifice. It was then that God showed him a ram that was caught in a thicket nearby to be the substitute for Isaac. See Gal. 3:16; Heb. 11:13, 17–19.
  '57':
  - type: text
    content: But many of the Jewish leaders doubted him and said, “What are you talking about? You’re not even fifty years old yet. You talk like you’ve seen Abraham!”
  '58':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: '“I give you this eternal truth: I have existed long before Abraham was born, for I AM!”'
  - type: note
    content: Proper English grammar would be, “Before Abraham was born, I Was.” However, Jesus indentified himself with the “I AM that I AM” of Ex. 3:14, when Yahweh appeared to Moses in the flames of the sacred shrub.
  '59':
  - type: text
    content: 'When they heard this, they picked up rocks to stone him, but Jesus concealed himself as he passed through the crowd '
  - type: note
    content: Some reliable Greek texts present Jesus’ exit in a less than supernatural way. But the Aramaic and many other Greek manuscripts make it clear that it was a supernatural exit from the Jewish leaders who wanted to kill him. See also Luke 4:30 for another incident of Jesus walking through a hostile crowd. Chapter 8 begins with the self-righteous wanting to stone the adulterous woman and ends with them wanting to stone the sinless Messiah.
  - type: text
    content: and went away from there.
  '6':
  - type: text
    content: 'They were only testing Jesus because they hoped to trap him with his own words and accuse him '
  - type: text
    content: of breaking the laws of Moses
  - type: text
    content: .
  - type: text
    content: 'But Jesus didn’t answer them. Instead he simply bent down and wrote in the dust with his finger. '
  - type: note
    content: This is not the first time God wrote with his finger. See Ex. 31:18.
  '7':
  - type: text
    content: 'Angry, they kept insisting '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'that he answer their question, so Jesus stood up and looked at them and said, '
  - type: text
    content: “Let’s have the man who has never had a sinful desire
  - type: text
    content: ' '
  - type: note
    content: The Greek word anamartetos means more than simply “sin,” but is best translated “a sinful desire.”
  - type: text
    content: throw the first stone at her.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: And then he bent over again and wrote some more words in the dust.
  - type: note
    content: See Jer. 17:13. Jesus wrote in the dust to fulfill Jeremiah’s prophecy that those who forsake God (spiritual adultery) will be written in the dust. All of the accusers were guilty of having forsaken God, the fountain of living water, and yet were so anxious to stone this woman to death. The same finger that wrote the Ten Commandments in stone also wrote the names of each of the accusers, or perhaps he wrote Jer. 17:13 in the dirt in front of their eyes, pointing to their hypocrisy.
  '9':
  - type: text
    content: 'Upon hearing that, her accusers slowly left the crowd one at a time, beginning with the oldest to the youngest, '
  - type: note
    content: The Aramaic can be translated “starting with the priests.”
  - type: text
    content: 'with a convicted conscience. '
