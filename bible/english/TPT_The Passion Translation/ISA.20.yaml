    - type: text
      text: A Prophecy concerning Egypt and Cush
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the year that the Assyrian king Sargon '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Sargon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “sun prince.” He was the father of Sennacherib.
      marker-yv: yv-n
    - type: text
      text: 'sent his supreme commander to attack Ashdod, he came and captured it. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ashdod
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “stronghold, fortress,” or “oppressor.”
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said to Isaiah, the son of Amoz, “Take off your clothes '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sackcloth,” a coarse, durable fabric used mainly to make sacks for carrying goods on the backs of animals but sometimes worn during fasts or by prophets.
      marker-yv: yv-n
    - type: text
      text: and sandals.” Isaiah did as he was told and walked about naked and barefoot.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the only symbolic action recorded about Isaiah. He became a walking parable. Scholars are divided over whether Isaiah was completely or partially nude. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Sam. 6:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 1:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said, “Just as my servant Isaiah has walked naked and barefoot for three years '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah’s three-year ministry of walking about naked is a type of the ministry of Jesus, who did as he was told by his Father (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 5:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'as a prophetic sign and a wonder as a warning of what is coming to Egypt and Cush, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so will the king of Assyria lead away the captives of Egypt and Cush, both young and old. They will be stripped and barefoot, with buttocks bared, to publicly humiliate Egypt. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And those who put their hope in ‘glorious Cush’ and ‘mighty Egypt,’ will be shattered and totally ashamed.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When that day comes, those who live in the coastal region '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Philistia
    - type: text
      text: ' will say, “Oh no! If this is what happened to those we hoped would come and rescue us from the Assyrian king, what chance do we have of escape?”'
