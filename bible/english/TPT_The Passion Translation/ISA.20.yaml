document_id: ISA.20,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy concerning Egypt and Cush
  - type: text
    content: 'In the year that the Assyrian king Sargon '
  - type: note
    content: Sargon means “sun prince.” He was the father of Sennacherib.
  - type: text
    content: 'sent his supreme commander to attack Ashdod, he came and captured it. '
  - type: note
    content: Ashdod means “stronghold, fortress,” or “oppressor.”
  '2':
  - type: text
    content: 'At that time the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to Isaiah, the son of Amoz, “Take off your clothes '
  - type: note
    content: Or “sackcloth,” a coarse, durable fabric used mainly to make sacks for carrying goods on the backs of animals but sometimes worn during fasts or by prophets.
  - type: text
    content: and sandals.” Isaiah did as he was told and walked about naked and barefoot.
  - type: note
    content: This is the only symbolic action recorded about Isaiah. He became a walking parable. Scholars are divided over whether Isaiah was completely or partially nude. See 2 Sam. 6:20; Mic. 1:8.
  '3':
  - type: text
    content: 'Then the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' said, “Just as my servant Isaiah has walked naked and barefoot for three years '
  - type: note
    content: Isaiah’s three-year ministry of walking about naked is a type of the ministry of Jesus, who did as he was told by his Father (see John 5:19).
  - type: text
    content: 'as a prophetic sign and a wonder as a warning of what is coming to Egypt and Cush, '
  '4':
  - type: text
    content: 'so will the king of Assyria lead away the captives of Egypt and Cush, both young and old. They will be stripped and barefoot, with buttocks bared, to publicly humiliate Egypt. '
  '5':
  - type: text
    content: And those who put their hope in ‘glorious Cush’ and ‘mighty Egypt,’ will be shattered and totally ashamed.”
  '6':
  - type: text
    content: 'When that day comes, those who live in the coastal region '
  - type: text
    content: of Philistia
  - type: text
    content: ' will say, “Oh no! If this is what happened to those we hoped would come and rescue us from the Assyrian king, what chance do we have of escape?”'
