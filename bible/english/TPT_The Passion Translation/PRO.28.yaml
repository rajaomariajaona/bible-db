document_id: PRO.28,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Lovers of God
  - type: text
    content: Guilty criminals experience paranoia
  - type: text
    content: even though no one threatens them.
  - type: text
    content: But the innocent lovers of God,
  - type: text
    content: because of righteousness,
  - type: text
    content: 'will have the boldness '
  - type: note
    content: Or “confidence.”
  - type: text
    content: of a young, ferocious lion!
  '10':
  - type: text
    content: Those who tempt the lovers of God with an evil scheme
  - type: text
    content: will fall into their own traps.
  - type: text
    content: But the innocent who resist temptation will experience reward.
  '11':
  - type: text
    content: The wealthy in their conceit presume to be wise,
  - type: text
    content: but a poor person with discernment can see right through them.
  '12':
  - type: text
    content: The triumphant joy of God’s lovers releases great glory.
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: But when the wicked rise to power, everyone goes into hiding.
  - type: note
    content: Or “people become victims.”
  '13':
  - type: text
    content: If you cover up your sin you’ll never do well.
  - type: text
    content: But if you confess your sins and forsake them,
  - type: text
    content: you will be kissed by mercy.
  '14':
  - type: text
    content: Overjoyed is the one who with tender heart trembles before God,
  - type: text
    content: but the stubborn, unyielding heart will experience even greater evil.
  '15':
  - type: text
    content: Ruthless rulers can only be compared
  - type: text
    content: to raging lions and roaming bears.
  - type: note
    content: David, before he killed Goliath, went after the lion and the bear. See 1 Sam. 17:34–37. These beasts represented demonic forces of evil over the land. Daniel also mentions the world’s ruthless leaders as lions and bears. See Dan. 7:1–8.
  '16':
  - type: text
    content: Abusive leaders fail to employ wisdom,
  - type: text
    content: but leaders who despise corruption
  - type: note
    content: Or “injustice.”
  - type: text
    content: will enjoy a long and full life.
  - type: note
    content: Or “enjoy a long reign.”
  '17':
  - type: text
    content: A murderer’s conscience will torment him—
  - type: text
    content: a fugitive haunted by guilt all the way to the grave
  - type: text
    content: with no one to support him.
  '18':
  - type: text
    content: The pure will be rescued from failure,
  - type: text
    content: but the perverse will suddenly fall into ruin.
  '19':
  - type: text
    content: Work hard and you’ll have all you desire,
  - type: text
    content: 'but chase a fantasy '
  - type: note
    content: Or “an empty dream.” The Septuagint is “the one who pursues leisure.”
  - type: text
    content: and you could end up with nothing.
  '2':
  - type: text
    content: A rebellious nation is thrown into chaos,
  - type: note
    content: Or “A rebellious nation will have one leader after another.”
  - type: text
    content: but leaders anointed with wisdom will restore law and order.
  '20':
  - type: text
    content: Life’s blessings drench the honest and faithful person,
  - type: text
    content: but punishment rains down upon the greedy and dishonest.
  '21':
  - type: text
    content: Giving favoritism to the rich and powerful is disgusting,
  - type: text
    content: and this is done by the type of judge who would betray a man for a bribe.
  - type: note
    content: As translated from the Aramaic.
  '22':
  - type: text
    content: 'A greedy man '
  - type: note
    content: Both the Aramaic and Hebrew have “The man with an evil eye.” This is a figure of speech for a stingy or greedy man. A person who shuts his heart to the poor is said to have an evil eye. A person with a good eye is someone who looks on the poor with generosity.
  - type: text
    content: is in a race to get rich,
  - type: text
    content: but he forgets that he could lose what’s most important
  - type: text
    content: and end up with nothing.
  - type: note
    content: As translated from the Aramaic. The Aramaic text sounds very similar to what Jesus says about gaining the world but losing our souls. See Mark 8:36.
  '23':
  - type: text
    content: If you correct someone with constructive criticism,
  - type: text
    content: in the end he will appreciate it more than flattery.
  '24':
  - type: text
    content: 'A person who would reject his own parents '
  - type: note
    content: As translated from the Septuagint. The Hebrew is “the one who steals from his own parents.”
  - type: text
    content: and say,
  - type: text
    content: “What’s wrong with that?” is as bad as a murderer.
  '25':
  - type: text
    content: To make rash, hasty decisions
  - type: text
    content: shows that you are not trusting the Lord.
  - type: text
    content: But when you rely totally on God,
  - type: text
    content: you will still act carefully and prudently.
  - type: note
    content: As translated from the Septuagint. The Hebrew is “The greedy person stirs up trouble, but the one who trusts in the Lord will prosper.”
  '26':
  - type: text
    content: 'Self-confident know-it-alls '
  - type: note
    content: Or “those who trust their instincts.”
  - type: text
    content: will prove to be fools.
  - type: text
    content: But when you lean on the wisdom from above,
  - type: text
    content: you will have a way to escape the troubles of your own making.
  '27':
  - type: text
    content: You will never go without if you give to the poor.
  - type: text
    content: But if you’re heartless, stingy, and selfish,
  - type: note
    content: Or “if you hide your eyes from the poor.”
  - type: text
    content: you invite curses upon yourself.
  '28':
  - type: text
    content: When wicked leaders rise to power,
  - type: text
    content: good people go into hiding.
  - type: text
    content: But when they fall from power,
  - type: text
    content: the godly take their place.
  '3':
  - type: text
    content: 'When a pauper '
  - type: note
    content: This pauper can also be one who is spiritually poor. Some Jewish expositors believe it refers to corrupt judges.
  - type: text
    content: oppresses the destitute,
  - type: text
    content: it’s like a flash flood that sweeps away their last hope.
  '4':
  - type: text
    content: Those who turn their backs on what they know is right
  - type: note
    content: The Hebrew word is “the Torah.” See vv. 7, 9.
  - type: text
    content: will no longer be able to tell right from wrong.
  - type: text
    content: But those who love the truth strengthen their souls.
  - type: note
    content: As translated from the Aramaic. The Septuagint is “build a wall to protect themselves.”
  '5':
  - type: text
    content: Justice never makes sense to men devoted to darkness,
  - type: text
    content: but those tenderly devoted to the Lord
  - type: text
    content: can understand justice perfectly.
  '6':
  - type: text
    content: It’s more respectable to be poor and pure than rich and perverse.
  '7':
  - type: text
    content: To be obedient to what you’ve been taught
  - type: note
    content: Or “the Torah.”
  - type: text
    content: proves you’re an honorable child,
  - type: text
    content: but to socialize with the lawless brings shame to your parents.
  '8':
  - type: text
    content: Go ahead and get rich on the backs of the poor,
  - type: text
    content: but all the wealth you gather will one day be given
  - type: text
    content: to those who are kind to the needy.
  '9':
  - type: text
    content: If you close your heart and refuse to listen to God’s instruction,
  - type: note
    content: Or “the Torah.”
  - type: text
    content: even your prayer will be despised.
