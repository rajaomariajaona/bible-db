document_id: PRO.28,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lovers of God
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Guilty criminals experience paranoia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even though no one threatens them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the innocent lovers of God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because of righteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'will have the boldness '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “confidence.”
      marker-yv: yv-n
    - type: text
      text: of a young, ferocious lion!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Those who tempt the lovers of God with an evil scheme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will fall into their own traps.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the innocent who resist temptation will experience reward.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The wealthy in their conceit presume to be wise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but a poor person with discernment can see right through them.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The triumphant joy of God’s lovers releases great glory.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when the wicked rise to power, everyone goes into hiding.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “people become victims.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: If you cover up your sin you’ll never do well.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you confess your sins and forsake them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will be kissed by mercy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Overjoyed is the one who with tender heart trembles before God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the stubborn, unyielding heart will experience even greater evil.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ruthless rulers can only be compared
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to raging lions and roaming bears.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: David, before he killed Goliath, went after the lion and the bear. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Sam. 17:34–37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . These beasts represented demonic forces of evil over the land. Daniel also mentions the world’s ruthless leaders as lions and bears. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 7:1–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Abusive leaders fail to employ wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but leaders who despise corruption
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “injustice.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will enjoy a long and full life.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “enjoy a long reign.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: A murderer’s conscience will torment him—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a fugitive haunted by guilt all the way to the grave
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with no one to support him.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The pure will be rescued from failure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the perverse will suddenly fall into ruin.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Work hard and you’ll have all you desire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'but chase a fantasy '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “an empty dream.” The Septuagint is “the one who pursues leisure.”
      marker-yv: yv-n
    - type: text
      text: and you could end up with nothing.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: A rebellious nation is thrown into chaos,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “A rebellious nation will have one leader after another.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but leaders anointed with wisdom will restore law and order.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Life’s blessings drench the honest and faithful person,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but punishment rains down upon the greedy and dishonest.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Giving favoritism to the rich and powerful is disgusting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and this is done by the type of judge who would betray a man for a bribe.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'A greedy man '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Both the Aramaic and Hebrew have “The man with an evil eye.” This is a figure of speech for a stingy or greedy man. A person who shuts his heart to the poor is said to have an evil eye. A person with a good eye is someone who looks on the poor with generosity.
      marker-yv: yv-n
    - type: text
      text: is in a race to get rich,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he forgets that he could lose what’s most important
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and end up with nothing.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Aramaic text sounds very similar to what Jesus says about gaining the world but losing our souls. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 8:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: If you correct someone with constructive criticism,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the end he will appreciate it more than flattery.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'A person who would reject his own parents '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew is “the one who steals from his own parents.”
      marker-yv: yv-n
    - type: text
      text: and say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What’s wrong with that?” is as bad as a murderer.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: To make rash, hasty decisions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: shows that you are not trusting the Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when you rely totally on God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will still act carefully and prudently.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew is “The greedy person stirs up trouble, but the one who trusts in the Lord will prosper.”
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Self-confident know-it-alls '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “those who trust their instincts.”
      marker-yv: yv-n
    - type: text
      text: will prove to be fools.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when you lean on the wisdom from above,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will have a way to escape the troubles of your own making.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: You will never go without if you give to the poor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you’re heartless, stingy, and selfish,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “if you hide your eyes from the poor.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you invite curses upon yourself.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: When wicked leaders rise to power,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: good people go into hiding.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when they fall from power,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the godly take their place.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When a pauper '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This pauper can also be one who is spiritually poor. Some Jewish expositors believe it refers to corrupt judges.
      marker-yv: yv-n
    - type: text
      text: oppresses the destitute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it’s like a flash flood that sweeps away their last hope.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Those who turn their backs on what they know is right
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word is “the Torah.” See vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will no longer be able to tell right from wrong.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But those who love the truth strengthen their souls.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Septuagint is “build a wall to protect themselves.”
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Justice never makes sense to men devoted to darkness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but those tenderly devoted to the Lord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: can understand justice perfectly.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: It’s more respectable to be poor and pure than rich and perverse.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: To be obedient to what you’ve been taught
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the Torah.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: proves you’re an honorable child,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but to socialize with the lawless brings shame to your parents.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Go ahead and get rich on the backs of the poor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but all the wealth you gather will one day be given
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to those who are kind to the needy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: If you close your heart and refuse to listen to God’s instruction,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the Torah.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even your prayer will be despised.
