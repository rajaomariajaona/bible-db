document_id: 1CO.10,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Learning from Israel’s Failures
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My dear fellow believers, you need to understand that all of our Jewish ancestors '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who walked through a wilderness long ago
    - type: text
      text: ' were under the glory cloud '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The cloud of glory is a picture of the Holy Spirit.
      marker-yv: yv-n
    - type: text
      text: 'and passed through the waters of the sea on both sides. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we must not embrace their ways by complaining—grumbling with discontent, as many of them did, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the Pentateuch there are at least sixteen occasions of the people of Israel murmuring. Believers today have even more spiritual blessings than Israel experienced in the wilderness, which would make our complaining even more odious.
      marker-yv: yv-n
    - type: text
      text: and were killed by the destroyer!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the destroying angel.”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the tests they endured on their way through the wilderness are a symbolic picture, an example that provides us with a warning so that we can learn through what they experienced. For we live in a time when the purpose of all the ages past is now completing its goal within us. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “The end of the ages has arrived upon us.”
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So beware if you think it could never happen to you, lest your pride becomes your downfall.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Way of Escape
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We all experience '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “which has fastened onto you.”
      marker-yv: yv-n
    - type: text
      text: 'times of testing, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “temptation.”
      marker-yv: yv-n
    - type: text
      text: 'which is normal for every human being. But God will be faithful to you. He will screen and filter the severity, nature, and timing of every test or trial you face '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, God’s faithfulness and grace will limit the severity of every test and prevent you from being tested beyond your ability to cope. Unlimited grace is available for every believer who faces hardship, temptations, and seasons of difficulty.
      marker-yv: yv-n
    - type: text
      text: 'so that you can bear it. And each test is an opportunity to trust him more, for along with every trial God has provided for you a way of escape '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “an exodus.” Trust in God’s faithfulness is the way of escape that empowers us to overcome every difficulty we may experience. We are not told that every difficulty will be removed from our lives, but that God’s grace provides an exit path.
      marker-yv: yv-n
    - type: text
      text: that will bring you out of it victoriously.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “God bears up under you to take you out of danger” (Gr.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hupophero
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) or “God provides a way of escape so that you may be empowered to endure it.” God’s faithfulness gives us both a way of escape and the power to endure.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Communion
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My cherished friends, keep on running far away from idolatry. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I know I am writing to thoughtful people, so carefully consider what I say. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For when we pray for the blessing of the communion cup, isn’t this our co-participation with the blood of Jesus? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “the presence of the blood of Jesus.” There is no indication that the communion elements are “symbols.” Life is not imparted by partaking of a dead symbol or emblem. When we take communion (common-union) we participate in the reality and substance of the blood and body of our Lord Jesus.
      marker-yv: yv-n
    - type: text
      text: 'And the bread that we distribute, isn’t this the bread of our co-participation with the body of Christ? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “the presence of the body of the Messiah.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For although we’re many, we become one loaf of bread and one body as we feast together '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “We are nourished by that one loaf of bread.”
      marker-yv: yv-n
    - type: text
      text: on one loaf.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Consider the people of Israel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when they fell into idolatry
    - type: text
      text: '. When they ate the sacrifices offered to the gods, weren’t they becoming communal participants in what was sacrificed? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, am I saying that idols and the sacrifices offered to them have any value? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were all baptized '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or “baptized themselves.” There are at least eight distinct baptisms mentioned in the New Testament: (1) the baptism of John ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 1:31–33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), (2) Christ’s baptism (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 3:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), (3) a baptism of suffering (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 12:50
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), (4) a baptism into the cloud of glory (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 10:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), (5) a baptism into the sea (a picture of redemption—
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 10:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), (6) believer’s baptism in water (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 28:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 2:38–41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), (7) baptism into Christ and into his body (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 12:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 3:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and (8) baptism in the Holy Spirit (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 3:11–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:2–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 6:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'into the cloud of glory, into the fellowship of Moses, and into the sea. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Absolutely not! However, I am implying that when an unbeliever offers a sacrifice to an idol, it is not offered to the true God but to a demon. I don’t want you to be participants with demons! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You can’t drink from the cup of the Lord and the cup of demons. You can’t feast at the table of the Lord and feast '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “participate,” which is the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: metaecho
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', or “echo with.”'
      marker-yv: yv-n
    - type: text
      text: 'at the table of demons. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Who would ever want to arouse the Lord’s jealousy? Is that something you think you’re strong enough to endure?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Are we really stronger than he is?”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living for God’s Glory
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: You say
    - type: text
      text: ', “'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Under grace
    - type: text
      text: ' there are no rules and we’re free to do anything we please.” Not exactly. Because not everything promotes growth in others. Your slogan, “We’re allowed to do anything we choose,” may be true—but not everything causes the spiritual advancement of others. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So don’t always seek what is best for you at the expense of another. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes, you are free to eat anything without worrying about your conscience, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for the earth and all its abundance belongs to the Lord.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pss. 24:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 50:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 89:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So if an unbeliever invites you to dinner, go ahead and eat whatever is served, without asking questions concerning where it came from. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “questions of conscience.”
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if he goes out of his way to inform you that the meat was actually an offering sacrificed to idols, then you should pass, not only for his sake but because of his conscience. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I’m talking about someone else’s conscience, not yours. What good is there in doing what you please if it’s condemned by someone else?
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They all ate the same heavenly manna '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “spiritual food.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 78:24–25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 6:31–48
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So if I voluntarily participate, why should I be judged for celebrating my freedom? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “eating food that I gave thanks for.”
      marker-yv: yv-n
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whether you eat or drink, live your life in a way that glorifies and honors God. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And make sure you’re not offending Jews or Greeks or any part of God’s assembly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: over your personal preferences
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Follow my example
    - type: text
      text: ', for I try to please everyone in all things, rather than putting my liberty first. I sincerely attempt to do anything I can so that others may be saved.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and drank water from the same spiritual rock '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 17:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 20:7–21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 78:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'that traveled with them—and that Rock '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Christ is the anointed Rock of truth and the Rock of shelter. The people drank of his living water. The miracle of the Rock of Christ provided them with water wherever they journeyed. He is a fountain that never runs dry, for he will never leave us alone in a wilderness.
      marker-yv: yv-n
    - type: text
      text: 'was Christ himself. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet God was not pleased with most of them, and their dead bodies were scattered around the wilderness.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:5
      - type: usfm
        marker: ft
