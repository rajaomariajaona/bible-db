      marker: fr
      children:
      - type: text
        text: 10:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “accomplished.” The mystery of God is a description of the whole content of the book of Revelation.
    marker-yv: yv-n
  - type: text
    text: just as he announced to his servants the prophets.
- type: usfm
