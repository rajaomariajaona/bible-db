    marker-yv: yv-n
  - type: text
    text: 'say to me:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: Don’t write a word, but place a seal on what the seven thunders have spoken.
- type: usfm
  marker: p
  children:
