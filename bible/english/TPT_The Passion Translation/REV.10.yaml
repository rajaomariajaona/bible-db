    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the heavenly voice spoke to me again:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: Go, take the open scroll from the hand of the angel who is standing on the sea and on the land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I went up to the angel who stood on the sea and the land and told him to give me the little scroll. Then he said to me, “Take it, and eat it. It will be sour in your stomach '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “innermost being” or “womb.” The message of the unrolled scroll would be bittersweet.
    marker-yv: yv-n
  - type: text
    text: but sweet as honey in your mouth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
