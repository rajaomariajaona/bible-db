document_id: REV.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Rainbow Messenger
  - type: text
    content: 'Then I saw another extremely powerful messenger '
  - type: note
    content: This mighty messenger is Jesus Christ, whose face shines as bright as the sun (Matt. 17:1–2).
  - type: text
    content: 'coming out of heaven, robed in a cloud. There was '
  - type: text
    content: a halo
  - type: text
    content: ' over his head like a rainbow; '
  - type: note
    content: The Aramaic can be translated “a rainbow of heaven was over his head.”
  - type: text
    content: 'his face '
  - type: text
    content: shined bright
  - type: text
    content: ' like the sun, and his legs like pillars of fire. '
  - type: note
    content: This extremely powerful messenger is Christ (Dan. 10:5–6; Rev. 1:12–16). He holds the scroll (Rev. 5–8) and now gives it to John. He is like the roaring Lion of Judah (Isa. 31:4–5; Jer. 25:29–36; Hos. 11:10–11; Joel 3:16; Amos 3:8) and will give the two witnesses their power (Rev. 11:3).
  '10':
  - type: text
    content: 'I took the little scroll from the hand of the mighty angel and ate it. Indeed, it was sweet as honey to taste, '
  - type: note
    content: Honey is a picture of revelation-knowledge (Ps. 19:7–13). See also Ezek. 2:8–9; 3:1–3.
  - type: text
    content: but after I had eaten it, my stomach turned bitter.
  '11':
  - type: text
    content: 'Then they '
  - type: note
    content: Some Greek manuscripts read “he.”
  - type: text
    content: 'said to me, “You must '
  - type: text
    content: go back and
  - type: text
    content: ' prophesy again to many peoples, and nations, and languages, and kings!”'
  - type: note
    content: See Jer. 1:10. This was an encouragement to John that he would be freed from his exile on Patmos to yet prophesy to us today through his writings.
  '2':
  - type: text
    content: 'He held an opened scroll '
  - type: note
    content: Although some manuscripts have “little book/scroll,” it is likely the same scroll opened by the Lamb in chapters 5–7.
  - type: text
    content: 'in his hand. He set his right foot on the sea and his left foot on the land '
  '3':
  - type: text
    content: 'and gave a tremendous shout, like a lion’s roar. When he shouted, the seven thunders responded, rumbling out '
  - type: text
    content: their messages
  - type: text
    content: '. '
  - type: note
    content: Or “with their own voices.” See Ps. 29. The seven thunders are the complete message of God sent out by the seven Spirits of God. This is the thunderous voice of God (John 12:28–29).
  '4':
  - type: text
    content: 'I was about to write the messages of the seven thunders, but I heard a heavenly voice '
  - type: note
    content: The Aramaic can be translated “I heard a voice from the seventh heaven.”
  - type: text
    content: 'say to me:'
  - type: text
    content: Don’t write a word, but place a seal on what the seven thunders have spoken.
  '5':
  - type: text
    content: 'Then the mighty angel whom I saw astride the sea and the land raised his right hand to heaven '
  '6':
  - type: text
    content: 'and swore an oath by him who lives for an eternity of eternities, the Creator of heaven and earth and sea and all that is in them:'
  - type: text
    content: 'No more delay! '
  - type: note
    content: Or “You will not have to wait any longer” or “Time’s up!”
  '7':
  - type: text
    content: 'For in the day when the seventh angel is to sound his trumpet, the mystery of God will be fulfilled, '
  - type: note
    content: Or “accomplished.” The mystery of God is a description of the whole content of the book of Revelation.
  - type: text
    content: just as he announced to his servants the prophets.
  - type: heading
    content: John Eats the Scroll
  '8':
  - type: text
    content: 'Then the heavenly voice spoke to me again:'
  - type: text
    content: Go, take the open scroll from the hand of the angel who is standing on the sea and on the land.
  '9':
  - type: text
    content: 'I went up to the angel who stood on the sea and the land and told him to give me the little scroll. Then he said to me, “Take it, and eat it. It will be sour in your stomach '
  - type: note
    content: Or “innermost being” or “womb.” The message of the unrolled scroll would be bittersweet.
  - type: text
    content: but sweet as honey in your mouth.”
