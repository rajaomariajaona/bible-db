        text: Prophetic Scriptures often have multiple meanings and interpretations. The Talmud teaches that these scattered bones were the bones of the young Hebrew men that King Nebuchadnezzar had executed. Apparently, the Jewish young men taken into captivity were so handsome that the Babylonian women were falling head over heels for them. So, Nebuchadnezzar had them executed, their bodies mutilated, and their bones scattered. The Talmud also teaches that this was not only a vision but reality as well. God instructed Ezekiel to speak to these dry bones and they would come together and live again. Not only was this a prophetic sign, but, according to Talmudic literature, it actually took place as these now resurrected men went on to marry and live out a full life. See
