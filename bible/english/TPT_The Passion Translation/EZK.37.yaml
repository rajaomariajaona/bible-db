  - type: text
    content: ', have spoken.’ ”'
  - type: heading
    content: Two Become One
  '15':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
  - type: note
    content: In this section of Ezekiel, God promises to reunite the Northern Kingdom of Israel with the Southern Kingdom of Israel, known as Judah.
  '16':
  - type: text
    content: '“Son of man, take a stick and carve on it the words, ‘For Judah and all the Israelites with him.’ '
  - type: note
    content: That is, the Benjamites, who were part of the Southern Kingdom of Judah.
  - type: text
    content: 'Then take another stick and carve on it the words, ‘The stick of Ephraim, '
  - type: note
    content: That is, the northern tribes of Israel, also called “Joseph,” or the name of his son, “Ephraim.” Ephraim was the most powerful of the northern tribes; Judah was the leader of the southern tribes.
  - type: text
    content: 'for Joseph and all the Israelites with him.’ '
  - type: note
    content: This refers to the other nine tribes that, along with Ephraim, comprised the Northern Kingdom of Israel.
  '17':
  - type: text
    content: 'Now join them together to make a single piece of wood to become one stick in your hand. '
  '18':
  - type: text
    content: 'And when your fellow exiles ask, ‘Won’t you tell us what you mean by this?’ '
  '19':
  - type: text
    content: 'answer them, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: Behold, I will take the stick of Joseph that belongs to Ephraim and those tribes loyal to him and join them to the stick of Judah. I will make two sticks into one, a single stick in my hand.’'
  - type: note
    content: This is a hint of two offices coming together in the church—the king and the priest. Caleb was from the tribe of Judah, and Joshua was from the tribe of Ephraim. Judah was the tribe that gave us the King, Jesus. Ephraim (Ephraim means “doubly fruitful”) reveals the fruitfulness of priestly ministry. Joseph was a “fruitful vine [branch]” (Gen. 49:22). Furthermore, the two kingdoms becoming one also points to the church being made up of Jews and gentiles in unity—a new humanity (see Eph. 2:11–22).
  '2':
  - type: text
    content: He made me walk all around the valley among all the vast piles of bones. There in the valley there were very many, very dry bones.
  - type: note
    content: The “very dry” bones meant that the people had been dead for a long time.
  '20':
  - type: text
    content: '“Now, show the people the pieces of wood you have written on, '
  '21':
  - type: text
    content: 'and tell them, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says this: I will gather the Israelites from the nations where they have gone. I will gather them together from everywhere and bring them to their homeland. '
  '22':
  - type: text
    content: 'And I will make them into a single nation in the mountainous land of Israel '
  - type: note
    content: For over 350 years, from the end of Solomon’s reign, Israel was divided into two kingdoms, two nations. Here God promises not only to raise them from their graves and resettle them in their land but also that the divisions between the Northern and Southern Kingdoms would be removed. When God brings back the exiles to the land, they will form one nation.
  - type: text
    content: 'and give them one king to be king over them all. They will never again be divided into two nations nor split into two separate kingdoms. '
  '23':
  - type: text
    content: 'Never again will they defile themselves with their disgusting idols, their detestable things, and rebellions. I will save them from always turning back and repeating their old sins. '
  - type: note
    content: As translated from a few Hebrew manuscripts. The Masoretic Text reads “I will save them from their dwelling [places] in which they have sinned.”
  - type: text
    content: I will cleanse and purify them. They will be my people, and I shall be their God.
  '24':
  - type: text
    content: '“ ‘My '
  - type: text
    content: beloved
  - type: text
    content: ' servant David '
  - type: note
    content: This cannot be understood literally, for David had died nearly four hundred years earlier. This is a prophecy of one like David, a Son of David, who would take the throne and rule over Israel and all the nations. It is clearly a Messianic prophecy of the coming of King Jesus to take David’s throne. Jesus is the Prince of Peace (see v. 25).
  - type: text
