  '1':
  - type: heading
    content: The Valley of Dry Bones
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 37 constitutes panel E1 in the chiastic structure of the book. It deals with the allegorical vision of a valley of dry bones, with the theme of new life and the promise of covenant renewal. This chapter serves as a contrasting parallel with chs. 18–19 (panel E), which deal with the covenant curse against Israel and the divine exhortation to new life and heart renewal.
  - type: text
    content: Yahweh
  - type: text
    content: '’s powerful presence was upon me, '
  - type: note
    content: Or “the [mighty] hand of Yahweh was upon me.”
  - type: text
    content: 'and his Spirit '
  - type: text
    content: lifted me up
  - type: text
    content: ' and carried me away. He set me down in the middle of a valley '
  - type: note
    content: See Ezek. 3:22–23; 8:4. This was the valley where Ezekiel saw the glory of Yahweh. It was the Valley of Vision. See Isa. 22:1.
  - type: text
    content: 'floor that was covered with countless bones. '
  - type: note
    content: This section of the book of Ezekiel focuses on the restoration of Israel. The valley of dry bones was likely an ecstatic vision that showed the prophet the utter devastation of Israel. The nation was lifeless, dead as dry bones. Nevertheless, God’s promise is that he will revive his people and bring them back to life. The Hebrew word ‘asamot, meaning “bones,” is derived from the verb ‘asam, a word that means “to be strong, mighty, and great.” So, bones are something that can be made strong again with God’s breath. Your dry bones speak of hope, not defeat. The “skeletons in your closet” that bring you shame God sees as the beginning of a new life that he will build within you.
  '10':
  - type: text
    content: 'So I prophesied as he had told me, and the breath entered their bodies. They came alive, '
  - type: note
    content: See Isa. 26:19; Hos. 6:2; 13:14. The Valley of Death became the Valley of Life.
  - type: text
    content: got up from the ground
  - type: text
    content: ', and stood to their feet—a very great, immense army.'
  '11':
  - type: text
    content: 'Then he said to me, “Son of man, these bones represent the entire house of Israel. '
  - type: note
    content: Although the direct fulfillment of this prophecy involves the regathered nation of Israel, believers today can find in this prophecy a promise for us as well (see Gal. 6:16). We may be disjointed and unconnected in differing ministries, yet God’s plan is to unite us under our Prince (see Ezek. 37:25; John 17:21). The dry bones will rise again as a mighty end-time army (see Joel 2:1–11). Every joint will supply a resource for the body of Christ as we move into maturity. See Eph. 4:11–16.
  - type: text
    content: They keep saying, ‘We are as dry as these dead bones. Our nation has been completely destroyed, and we have lost all hope.’
  '12':
  - type: text
    content: '“So, prophesy to them, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: Behold! I am now going to open your graves! '
  - type: note
    content: Figuratively, the graves could represent the many nations in which the Jews had been exiled and kept from their own land.
  - type: text
    content: 'My people, I will resurrect you out of your graves and lead you home to the land of Israel. '
  '13':
  - type: text
    content: 'And when I open your graves and raise you up, then, my people, you will be convinced that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'And I will put my '
  - type: text
    content: Holy
  - type: text
    content: ' Spirit within you, and you will live again. I will resettle you on your own soil. Then you will know that it is I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', who spoke to you, and I do what I say. I, Lord '
  - type: text
