        text: For over 350 years, from the end of Solomon’s reign, Israel was divided into two kingdoms, two nations. Here God promises not only to raise them from their graves and resettle them in their land but also that the divisions between the Northern and Southern Kingdoms would be removed. When God brings back the exiles to the land, they will form one nation.
    marker-yv: yv-n
  - type: text
    text: 'and give them one king to be king over them all. They will never again be divided into two nations nor split into two separate kingdoms. '
  - type: usfm
    marker: vlbl
