  - type: text
    content: I will make flesh grow on you.
  - type: text
    content: I will cover you with skin.
  - type: text
    content: I am going to breathe into you,
  - type: text
    content: and you will live again.
  - type: text
    content: 'And you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  - type: heading
    content: The Bones Come Together
  '7':
  - type: text
    content: 'So I prophesied as I had been told. And as I was prophesying, I began to hear a commotion. Behold! It was the clattering '
  - type: note
    content: Or “earthquake.”
  - type: text
    content: 'of these many skeletons coming together, bone to bone! '
  '8':
