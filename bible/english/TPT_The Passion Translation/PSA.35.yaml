document_id: PSA.35,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Rescue Me
  - type: text
    content: A poetic song by King David
  - type: note
    content: This is the first of seven Psalms in which David cried out for vengeance upon his enemies (see Pss. 52; 58; 59; 69; 109; 137).
  - type: heading
    content: Part One – David, a Warrior
  - type: text
    content: O Lord, fight for me! Harass the hecklers; accuse my accusers.
  - type: text
    content: Fight those who fight against me.
  '10':
  - type: text
    content: 'Everything inside of me will shout it out:'
  - type: text
    content: “There’s no one like you, Lord!”
  - type: text
    content: For look at how you protect the weak and helpless
  - type: text
    content: from the strong and heartless who oppress them.
  - type: heading
    content: Part Two – David, a Witness
  '11':
  - type: text
    content: They are malicious men, hostile witnesses of wrong.
  - type: text
    content: They rise up against me, accusers appearing out of nowhere.
  '12':
  - type: text
    content: When I show them mercy, they bring me misery.
  - type: text
    content: I’m forsaken and forlorn, like a motherless child.
  '13':
  - type: text
    content: I even prayed over them when they were sick.
  - type: text
    content: I was burdened and bowed low with fasting
  - type: text
    content: and interceded for their healing,
  - type: text
    content: and I didn’t stop praying.
  '14':
  - type: text
    content: I grieved for them, heavyhearted,
  - type: text
    content: as though they were my dearest family members
  - type: text
    content: or my good friends who were sick,
  - type: text
    content: nearing death, needing prayer.
  '15':
  - type: text
    content: But when I was the one who tripped up and stumbled,
  - type: text
    content: they came together to slander me,
  - type: text
    content: rejoicing in my time of trouble, tearing me to shreds
  - type: text
    content: with their lies and betrayal.
  '16':
  - type: text
    content: These nameless ruffians,
  - type: text
    content: mocking me like godless fools at a feast—
  - type: text
    content: how they delight in throwing mud on my name.
  '17':
  - type: text
    content: God, how long can you just stand there doing nothing?
  - type: text
    content: Now is the time to act.
  - type: text
    content: Rescue me from these brutal men,
  - type: text
    content: for I am being torn to shreds by these beasts
  - type: text
    content: who are out to get me.
  - type: text
    content: Save me from their rage, their cruel grasp.
  '18':
  - type: text
    content: Then I will praise you wherever I go.
  - type: text
    content: And when everyone gathers for worship,
  - type: text
    content: I will lift up your praise with a shout
  - type: text
    content: in front of the largest crowd I can find!
  - type: heading
    content: Part Three – David, a Worshiper
  '19':
  - type: text
    content: Don’t let those who fight me for no reason be victorious.
  - type: text
    content: Don’t let them succeed, these heartless haters
  - type: text
    content: who come against me with their gloating sneers.
  '2':
  - type: text
    content: Put on your armor, Lord; take up your shield and protect me.
  - type: text
    content: Rise up, mighty God! Grab your weapons of war
  - type: text
    content: and block the way of the wicked who come to fight me.
  - type: text
    content: Stand for me when they stand against me!
  - type: text
    content: 'Speak over my soul: “I am your strong Savior!”'
  - type: note
    content: The Aramaic word used here is found thirty-three times in the Psalms and clearly means “Savior.” Although a New Testament concept, David had a deep understanding almost one thousand years before the Savior was born that God would become his Savior. The Hebrew word for “Savior,” Yasha, is very similar to the name Jesus, Yeshua.
  '20':
  - type: text
    content: They are the ones who would never seek peace as friends,
  - type: text
    content: for they are ever devising deceit against the innocent ones
  - type: text
    content: who mind their own business.
  '21':
  - type: text
    content: They open their mouths with ugly grins,
  - type: text
    content: gloating with glee over my every fault.
  - type: text
    content: “Look,” they say, “we caught him red-handed!
  - type: text
    content: We saw him fall with our own eyes!”
  '22':
  - type: text
    content: Yahweh
  - type: text
    content: ', my caring God, you have been there all along.'
  - type: text
    content: You have seen their hypocrisy.
  - type: text
    content: Yahweh
  - type: text
    content: ', don’t let them get away with this.'
  - type: text
    content: Don’t walk away without doing something.
  '23':
  - type: text
    content: Now is the time to awake! Rise up, Lord!
  - type: text
    content: Vindicate me, my Lord and my God!
  '24':
  - type: text
    content: You have every right to judge me, Lord,
  - type: text
    content: according to your righteousness,
  - type: text
    content: but don’t let them rejoice over me when I stumble.
  '25':
  - type: text
    content: Let them all be ashamed of themselves,
  - type: text
    content: humiliated when they rejoice over my every blunder.
  - type: text
    content: Shame them, Lord, when they say, “We saw what he did.
  - type: text
    content: Now we have him right where we want him.
  - type: text
    content: Let’s get him while he’s down!”
  - type: text
    content: Make them look ridiculous when they exalt themselves over me.
  - type: text
    content: May they all be disgraced and dishonored!
  '27':
  - type: text
    content: But let all my true friends shout for joy,
  - type: text
    content: all those who know and love what I do for you.
  - type: text
    content: Let them all say, “The Lord is great,
  - type: text
    content: and he delights in the prosperity of his servant.”
  '28':
  - type: text
    content: Then I won’t be able to hold it in—
  - type: text
    content: everyone will hear my joyous praises all day long!
  - type: text
    content: Your righteousness will be the theme of my glory-song of praise!
  '4':
  - type: text
    content: Humiliate those who seek my harm. Defeat them all!
  - type: text
    content: Frustrate their plans to defeat me and drive them back.
  - type: text
    content: Disgrace them all as they have devised their plans to disgrace me.
  '5':
  - type: text
    content: Blow them away like dust in the wind,
  - type: text
    content: with the angel of Almighty God driving them back!
  '6':
  - type: text
    content: Make the road in front of them nothing but slippery darkness,
  - type: text
    content: 'with the angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' behind them, chasing them away!'
  '7':
  - type: text
    content: For though I did nothing wrong to them, they set a trap for me,
  - type: text
    content: wanting me to fail and fall.
  '8':
  - type: text
    content: Surprise them with your ambush, Lord,
  - type: text
    content: and catch them in the very trap they set for me.
  - type: text
    content: Let them be the ones to fail and fall into destruction!
  '9':
  - type: text
    content: Then my fears will dissolve into limitless joy;
  - type: text
    content: my whole being will overflow with gladness
  - type: text
    content: because of your mighty deliverance.
